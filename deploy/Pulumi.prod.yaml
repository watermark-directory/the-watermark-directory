# Committed stack config — NON-SECRET values only.
#
# Operator-specific / late-bound keys are NOT committed; set them out of band:
#   pulumi config set bosc-deploy:cloudflareAccountId <account-id>   # REQUIRED
#   pulumi config set bosc-deploy:siteDomain watermark.example.org   # when the name is chosen
#   pulumi config set bosc-deploy:route53ZoneId Z0123456789ABC       # the zone that owns siteDomain
#   pulumi config set bosc-deploy:pagesProject bosc                  # only if not "bosc"
#
# Auth / Cognito (#924):
#   pulumi config set bosc-deploy:authEnabled true                   # provisions Cognito (DESTRUCTIVE to remove)
#   pulumi config set bosc-deploy:cognitoDomainPrefix watermark-auth # Hosted UI prefix (default "watermark-auth")
#   pulumi config set bosc-deploy:cognitoRegion us-east-1           # must match AWS provider region
#
# `siteDomain` + `route53ZoneId` together drive the Route53↔Cloudflare exchange (decided
# shape: a subdomain CNAME — see index.ts / docs/submissions-api.md). Until `siteDomain`
# is set the stack manages KV + R2 + Turnstile only. Until `authEnabled` is true the
# Cognito pool is not created (KV namespaces for auth are always created).
#
# The Cloudflare API token is supplied via the CLOUDFLARE_API_TOKEN env var (or the
# `cloudflare:apiToken` Pulumi secret); AWS uses the standard credential chain. Never
# add a token/secret here.
config:
  # Preview hostnames the Turnstile widget may serve on; `siteDomain` is folded in
  # automatically when set, so this stays the pages.dev preview default.
  bosc-deploy:siteDomains:
    - watermark.pages.dev
