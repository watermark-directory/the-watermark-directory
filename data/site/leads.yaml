    in three groups of 38 + 36 cooling towers in three groups of 12 → **≈ three data halls**) but carries
    **no plot-plan attachment and no floor area**. So compute **Method 3** (`docs/COMPUTE.md`) stays the
    flagged-weak **land-area envelope**, not real floor area.


    **To get.** The **architectural site-plan sheets** (CI Design / WSP / EMH&T) showing the data-hall
    building footprints, or the permit''s plot-plan attachment if one exists. The committed plan set is
    a single grading & storm sheet (`1A-C-3104`) showing only ancillary SSS/GPS buildings on piers — the
    data-hall footprints sit on sheets not in hand.


    **Acceptance.**

    - Data-hall floor area documented from a primary source; Method 3 re-grounded from land-area envelope
    to floor area in `docs/COMPUTE.md` + `bosc.facility`.


    **Refs.** `corpus-completeness-audit.md` §4; `docs/COMPUTE.md`; #33.'
  source: watermark-directory/the-watermark-directory#160
  issue: 160
