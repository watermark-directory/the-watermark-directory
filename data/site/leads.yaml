- id: GH-144
  kind: claim
  status: review
  tag: inference
  title: Follow up on Allen SWCD request items 3 & 4 (wetland determinations + tile drainage)
  detail: '**Context.** In the Allen SWCD PRR production (merged in #142) the District answered **item
    3** (wetland / floodplain / water-resource determinations) and **item 4** (tile / field-tile / agricultural-drainage
    system affected by construction) with *"no responsive records"* — each qualified *"unless your request
    also implicates the previously identified sets of plans"* (which it withheld).


    **Worth a second look.** The inspection forms the SWCD *did* produce speak directly to both subjects:


    - **Item 3 (wetland).** Inspections from **2025-12-08** onward record *"the existing wetland was mitigated."*
    The on-site isolated-wetland 401 permit **DSW401251760W** (issued 2025-08-12) and its **2025-08-18
    Mitigation Purchase Agreement** are already in-corpus (`permits/3788677.epa.yaml`, `permits/3796349.epa.yaml`).

    - **Item 4 (tile drainage).** The **2026-06-05** inspection documents an **east farm-tile diversion
    swale** failure — *"the tile is no longer exposed and only bubbling up through soil"* — with a labeled
    photo (*"East farm tile bypass,"* bundle p9).


    **Follow-ups.**

    1. Pin down the scope of the "no records" answers — do they exclude the produced inspection forms
    and/or the withheld plan sets? (The qualifier suggests the determinations may have been folded into
    the withheld plans.)

    2. Pursue the determination record sets elsewhere: Ohio EPA''s 401 / Isolated Wetland Permit file
    for **DSW401251760W** and pending **DSW401252260W** (applied 2025-12-09); Army Corps if a federal
    nexus exists; and the County Engineer / Sanitary tile-drainage & as-built records for item 4.

    3. Roll the breached-tile + creek-west-of-site dewatering finding into the hydrology/discharge axis.


    **Refs.**

    - `data/extracted/legal/prr-mandamus/bosc-prr-production-2026-06-12-aswcd.response-index.yaml` — items
    3 & 4 + findings `wetland-mitigated-vs-no-records`, `farm-tile-impact-vs-no-records`

    - `data/extracted/legal/corpus-completeness-audit.md` §1 (Allen SWCD production)

    - Outstanding-records trackin…'
  source: watermark-directory/the-watermark-directory#144
  issue: 144
- id: GH-155
  kind: question
  status: unanswered
  tag: open
  title: Track the disposition of the Level-2 wetland permit DSW401252260W (incomplete 2025-12-23)
  detail: '## Context


    Open question surfaced by the permit-vs-disturbance sequence reconstruction (#150 / #153), observation
    **`level2-401-after-clearing`** in [`bosc-site-permit-sequence.yaml`](../blob/main/data/extracted/legal/prr-mandamus/bosc-site-permit-sequence.yaml).


    ## The question


    Was the broader **Level-2** isolated-wetland fill at the BOSC site authorized before the fill area
    was disturbed — and what is its current disposition?


    ## What the records show

    - The narrow **Category-1** isolated wetlands (0.33 ac) *were* authorized first: DSW401251760W, granted
    **2025-08-12** (before disturbance) — in-corpus (`permits/3788677`, `/3796349`).

    - The **Level-2** application (DSW401252260W) was received **2025-12-09** — the day after the first
    inspection records clearing/grubbing underway — and Ohio EPA declared it **INCOMPLETE** on **2025-12-23**
    (no practicable on-site alternatives analysis "for the entire site"; the delineation covers ~358 ac).
    In-corpus: `permits/3949585`.

    - **The corpus contains no later disposition** of DSW401252260W (a grep finds only the 2025-12-23
    incompleteness letter).


    ## Deliverable

    Acquire the subsequent Ohio EPA 401/Wetlands/Mitigation correspondence for **DSW401252260W**: was
    a revised application submitted, and was it **granted or denied** — when, and at what fill scope?
    Add the disposition event(s) to the chronology in `bosc-site-permit-sequence.yaml` and ingest the
    record under `data/extracted/permits/`.


    ## Source

    Ohio EPA DSW 401/Wetlands/Mitigation Section (the same Joe Loucek / Heather Allamon / Rachel Secrest
    contacts on the in-corpus letters); or the Bistrozzi-permits production set. Content-verify the date;
    no source bytes altered. Analysis, not a legal conclusion.

    '
  source: watermark-directory/the-watermark-directory#155
  issue: 155
- id: GH-160
