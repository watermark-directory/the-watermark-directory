- id: GH-34
  kind: signal
  status: unanswered
  tag: open
  title: Acquire the GLRI / Ohio EPA Lost Creek grant instruments (subaward, design, load-reduction table,
    monitoring)
  detail: 'The corpus holds a **secondary** Allen SWCD summary of a \$650,000 ag-runoff retention/treatment
    grant (Project `ALLENSWCD-FDFARM22`) on **Lost Creek HUC12 041000070305** (a Maumee headwater 2.7
    mi east of I-75) — baseline nutrient-burden context for the hydrology axis. The funding source is
    verified (GLRI subaward via Ohio EPA, OSU portion \$327,450, 2023-2025), but the primary instruments
    are not in hand.


    ### Scope — documents still owed (see audit §2 table)

    - **Grant agreement / award instrument** — the signed GLRI / Ohio EPA subaward (deliverables, match,
    reporting). Source: Ohio EPA GLRI files; Allen SWCD; PRR.

    - **OSU application & conceptual design** — engineering basis for the BMPs (berm/wetland/forebay/pump-vault;
    saturated buffer). Source: OSU FABE (Dr. V. Shedekar).

    - **Load-reduction estimate table** — referenced on the captured page ("table below") but **not transcribed**
    in `data/extracted/watershed/osu-lima-ag-runoff-treatment.capture.yaml`. Re-capture the full page
    / SWCD project file.

    - **OSU monitoring data** — continuous flow + water quality (3 sites, ISCO6712 samplers).


    ### Acceptance

    - Primary instrument(s) committed under `data/documents/watershed/` (or the load-reduction table transcribed
    into the existing capture YAML), with the audit §2 rows flipped to "in hand".


    Source: `data/extracted/legal/corpus-completeness-audit.md` §2; `docs/HYDROLOGY.md`.'
  source: watermark-directory/the-watermark-directory#34
  issue: 34
- id: GH-35
  kind: signal
  status: withheld
  tag: open
  title: 'Pursue outstanding PRR records: item 4 cost-benefit + items 5-15 county wastewater universe'
  detail: 'Two outstanding clusters from the county PRR production tracker (cover letter 2026-06-05).
    Production is rolling ("every Friday"); these are the items to watch in subsequent batches. This is
    an external-dependency tracking issue, not an engineering task.


    ### Item 4 — Project BOSC cost-benefit analysis (WITHHELD)

    Cost-benefit analysis / projected tax-revenue impact / public-ROI inputs & assumptions — withheld
    "being reviewed by our legal counsel for compliance with R.C. 149.43 and R.C. 9.66." Watch for release
    in later productions.


    ### Items 5-15 — county wastewater works (DEFERRED to the Sanitary Engineer)

    BOSC pump-station/forcemain **RFP + bids**; permits **SWPTI-260294** & **DSW-6756**; **Shawnee II
    Phase 2** (12.6 MGD) design; **MS Consultants forcemain feasibility** (Res #113-26 / #136-26); **1996
