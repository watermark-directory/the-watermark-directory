    internal contradiction already documented: Res #113-26 / #136-26 sit in the Commissioners own minutes
    (`M021926.pdf:3`, `M022626.pdf:3`). Consider a fresh PRR directed to the Allen County Sanitary Engineer.


    ### Acceptance

    - Track each Friday production; as records land, ingest them (NPDES/EPA/plan kinds) and update `corpus-completeness-audit.md`
