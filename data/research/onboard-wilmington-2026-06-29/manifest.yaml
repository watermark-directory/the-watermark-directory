proposals:
- title: Ingest and extract the 6 fetched OEPA permit PDFs for Wilmington
  dedupe_key: ingest-and-extract-the-6-fetched-oepa-permit-pdfs-for-wilmington
  labels:
  - status:agent-proposed
  - status:needs-triage
  - extraction
  - permits
  - oepa
  rationale: Zero extractions is the primary blocker preventing any downstream modeling,
    hypothesis population, or site promotion for Wilmington.
  body: '## Context

    During the Wilmington onboarding sweep, 6 OEPA permit PDFs were fetched to `data/documents/oepa/wilmington/`
    (permit IDs: `1PD00013`, `1PX00010`, `1MP00060`, `1PV00089`, `1IW00240`, `1II00129`),
    but `data/extracted/wilmington/oepa/` does not exist and `list_extractions` returns
    zero results for the site. The findings confirm: "Extracted: zero" and "extraction
    backlog = 6 PDFs (+ 2 uncaptured DAM artifacts)".


    ## Grounding

    - Findings §1 (NPDES / permit profile): all 6 permits are `[new]`, `0 committed`,
    none ingested.

    - Findings §5 (Extracted corpus vs. source documents): `list_extractions` → "No
    extractions found under `data/extracted/wilmington`".

    - Lima parity: `oepa/oepa/oepa-2PH00006-american-ii-fact-sheet.npdes.yaml` et
    al. show the expected output format.

    - Blocking gap #3 in findings: "Ingest + extract the 6 fetched OEPA permits to
    `data/extracted/wilmington/oepa/*.npdes.yaml`, and identify each facility/receiving
    water from the document."


    ## Acceptance Criteria

    - `data/extracted/wilmington/oepa/` contains one `.npdes.yaml` per permit (6 files
    minimum).

    - Each YAML correctly identifies the permitted facility name, permit type, and
    receiving water body (sourced from the document text — not assumed).

    - `list_extractions` for site `wilmington` returns at least 6 records.

    - No Lima facility names are inherited by default.'
- title: Capture the two missing DAM artifacts for permit 1PD00013 (fact sheet and
    draft public notice)
  dedupe_key: capture-the-two-missing-dam-artifacts-for-permit-1pd00013-fact-s
  labels:
  - status:agent-proposed
  - status:needs-triage
  - extraction
  - permits
  - oepa
  rationale: Fact sheets and draft public notices contain design-flow assumptions
    and receiving-water limits that are essential for the hydrology and sanitary-basis
    models and are not duplicated in the primary permit.
  body: '## Context

    The OEPA DAM sweep (`discover_oepa_permits`) found 8 artifacts / 6 unique permit
    IDs for Wilmington. The primary `fetch_oepa_permit` call retrieved only the primary
    permit PDF for `1PD00013`, leaving the associated fact sheet (`1PD00013.fs.pdf`)
    and draft public notice (`1PD00013` DraftPN) uncaptured. The findings note: "the
    fact sheet (`1PD00013.fs.pdf`) and draft public notice (`1PD00013` DraftPN) were
    *not* captured."


    ## Grounding

    - Findings §1: "Still missing: the fact sheet (`1PD00013.fs.pdf`) and draft public
    notice (`1PD00013` DraftPN) were not captured — `fetch_oepa_permit` is by-ID and
    pulled only the primary permit."

    - Lima parity: `oepa/oepa/oepa-2PH00006-american-ii-fact-sheet.npdes.yaml`, `…-draft-pn-…`,
    plus the permit are extracted separately, establishing the expected three-artifact
    pattern.

    - Findings §5: "extraction backlog = 6 PDFs (+ 2 uncaptured DAM artifacts)."


    ## Acceptance Criteria

    - `1PD00013.fs.pdf` and the `1PD00013` DraftPN PDF are fetched and stored under
    `data/documents/oepa/wilmington/` with SHA-256 recorded and `filename-map.yaml`
    updated.

    - Both artifacts are subsequently extracted to `data/extracted/wilmington/oepa/`
    in the same pattern as the Lima fact-sheet and draft-PN YAMLs.

    - `list_documents` (once wilmington is served) reflects all 8 DAM artifacts, not
    just 6.'
- title: Verify and populate the Wilmington SiteProfile registration (nwis_sites,
    eia861_utility_number, GIS URLs, corpus_relpaths)
  dedupe_key: verify-and-populate-the-wilmington-siteprofile-registration-nwis
  labels:
  - status:agent-proposed
  - status:needs-triage
  - entities
  - infrastructure
  - grid
  rationale: An incomplete or absent SiteProfile silently misconfigures every downstream
    connector and model surface, and can cause Lima data to appear under Wilmington
    without any error signal.
  body: '## Context

    The onboarding sweep confirmed that `hydrology_balance`, `sanitary_basis`, `stormwater_runoff`,
    `hydrology_scenario`, and `storm_plan_inventory` all return the `#424` empty sentinel
    for Wilmington, and that EIA-861 utility number, BA interchange, LMP/LMP zone,
    NWIS gauges, and GIS URLs are all "not found." However, the findings explicitly
    caution: "grid/GIS/`SiteProfile` status above is ''not found via the read-only
    tools available,'' not a positive finding of absence in the codebase — those knobs
    aren''t introspectable through MCP."


    ## Grounding

    - Findings §2: "The `SiteProfile` registration (whether `wilmington` is even in
    `watermark.sites.SITES` with grid knobs) is **not introspectable via the read-only
    MCP tools available**; flag for direct code check."

    - Findings §2: "EIA-861 utility number — not found; BA interchange — not found;
    LMP/LMP zone — not found. `[open]`"

    - Findings §3: "NWIS gauges configured — not found; 7Q10 / water-balance — not
    found."

    - Blocking gap #2: "Confirm the `SiteProfile` is registered in `watermark.sites.SITES`
    with the verifiable knobs… Per the bundle-per-site memo, a non-Lima site that
    omits `corpus_relpaths` silently inherits Lima feeds."


    ## Acceptance Criteria

    - A direct code inspection of `watermark.sites.SITES` confirms whether `wilmington`
    has an entry.

    - If absent or incomplete: `nwis_sites`, `eia861_utility_number`, GIS endpoint
    URLs, and `corpus_relpaths` are populated with verified values and committed.

    - If present: each field is documented as confirmed-populated or confirmed-intentionally-blank
    with a rationale.

    - The silent Lima-feed-inheritance risk is resolved (either `corpus_relpaths`
    is set, or the inheritance is explicitly documented as intentional).'
- title: Run watermark onboard wilmington to scaffold hydrology connectors and portable
    reach data
  dedupe_key: run-watermark-onboard-wilmington-to-scaffold-hydrology-connector
  labels:
  - status:agent-proposed
  - status:needs-triage
  - hydrology
  - infrastructure
  rationale: The onboard command is the upstream prerequisite for every hydrology,
    sanitary, and stormwater model surface; running it unblocks the majority of the
    remaining gaps in a single step.
  body: '## Context

    Every hydrology-related model surface for Wilmington returns the `#424` empty
    sentinel. The findings attribute this directly to the onboard command never having
    been run: "the portable reach connectors that `watermark onboard <slug>` runs
    (NWIS gauges, NOAA Atlas-14, 7Q10, water balance) have not been run for wilmington."
    This is listed as blocking gap #1.


    ## Grounding

    - Findings §3: "`hydrology_balance`, `sanitary_basis`, `stormwater_runoff`, `hydrology_scenario`,
    `storm_plan_inventory` — all return the `#424` empty sentinel. `[verified]`-empty."

    - Findings §3: "NWIS gauges configured — not found; 7Q10 / water-balance — not
    found; WWTP sanitary design basis — not found."

    - Blocking gap #1: "Run `watermark onboard wilmington` (scaffolds data dirs, runs
    portable reach connectors). This is the upstream unblock for hydrology + the per-site
    scaffolding."

    - Lima parity: receiving-water characterization, design flows, and 7Q10 are present
    in `watershed/…`, `fort-wayne/bosc-site-footprint.yaml`, and `legal/…bosc-site-permit-sequence.yaml`.


    ## Acceptance Criteria

    - `watermark onboard wilmington` completes without error.

    - `hydrology_balance` and `stormwater_runoff` return non-sentinel data for the
    site.

    - At least one NWIS gauge is associated with the Wilmington receiving water and
    its 7Q10 / water-balance values are populated.

    - `sanitary_basis` returns a WWTP design-flow record (or a documented "not applicable"
    if no WWTP permit applies).'
- title: File the Wilmington NPDES triage lead as a real GitHub issue (GITHUB_TOKEN
    was absent during agent run)
  dedupe_key: file-the-wilmington-npdes-triage-lead-as-a-real-github-issue-git
  labels:
  - status:agent-proposed
  - status:needs-triage
  - permits
  - oepa
  rationale: Without a real GitHub issue, the extraction backlog for Wilmington's
    6 OEPA permits has no tracking record and risks being dropped from the work queue.
  body: '## Context

    During the onboarding sweep, the agent called `report_novel_finding` with labels
    `type:gap, area:evidence, status:agent-proposed, site:wilmington` to record the
    NPDES extraction backlog as a triage lead, but the call returned `"No GITHUB_TOKEN
    — issue not filed"`. The lead body was drafted but never posted. The findings
    explicitly flag this as a manual action required.


    ## Grounding

    - Findings §1: "Filed as a triage lead via `report_novel_finding`… ⚠️ Returned
    ''No GITHUB_TOKEN — issue not filed'': the lead body is drafted but **not actually
    posted**; it must be filed manually or with a token present."

    - Blocking gap #6: "File the NPDES triage lead for real — `report_novel_finding`
    could not post (no `GITHUB_TOKEN`). Re-file so the extraction backlog is tracked."

    - The lead covers: 8 DAM artifacts / 6 unique permit IDs all `[new]`, 0 committed,
    6 PDFs fetched but not extracted, 2 DAM artifacts not yet fetched.


    ## Acceptance Criteria

    - A GitHub issue is posted with labels `type:gap`, `area:evidence`, `status:agent-proposed`,
    `site:wilmington`.

    - The issue body references the 6 permit IDs (`1PD00013`, `1PX00010`, `1MP00060`,
    `1PV00089`, `1IW00240`, `1II00129`), the 2 missing DAM artifacts (`1PD00013.fs.pdf`,
    `1PD00013` DraftPN), and the zero-extraction state of `data/extracted/wilmington/`.

    - The issue is linked from this onboarding review thread so the extraction backlog
    is formally tracked.'
