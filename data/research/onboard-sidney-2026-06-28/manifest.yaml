- title: Run `watermark onboard sidney` to scaffold site directories and portable
    reach connectors
  dedupe_key: run-watermark-onboard-sidney-to-scaffold-site-directories-and-po
  labels:
  - status:agent-proposed
  - status:needs-triage
  - onboarding
  - infrastructure
  rationale: This is the single action that unblocks every other subsystem gap identified
    in the review; nothing else can populate until it is run.
  body: '## Context

    The onboarding review (2026-06-28) confirms that `sidney` is fully greenfield:
    every BOSC tool returns the `#424` non-substitution message, `data/extracted/sidney`
    does not exist, and no connector outputs exist for the site. The findings explicitly
    identify `watermark onboard sidney` as the single highest-priority blocking action.


    ## Grounding

    From the findings (§ Prioritized checklist, item 1):

    > **Run `watermark onboard sidney`** — scaffold per-site data dirs, set `corpus_relpaths`,
    and execute the portable reach connectors. Without this, every bundle feed inherits
    Lima or falls empty (the documented onboarding gotcha). *(Blocks all of §1–6.)*


    ## Acceptance Criteria

    - `watermark onboard sidney` completes without error.

    - `data/extracted/sidney/` directory is scaffolded and `corpus_relpaths` is set.

    - Portable reach connectors execute and produce initial (possibly empty-but-non-null)
    outputs for all six subsystems (NPDES, grid, hydrology, GIS, corpus, hypotheses).

    - No BOSC tool for `sidney` returns the `#424` non-substitution message after
    onboarding.'
- title: Identify Great Miami NWIS gauges near Sidney and establish receiving-water
    7Q10 baseline
  dedupe_key: identify-great-miami-nwis-gauges-near-sidney-and-establish-recei
  labels:
  - status:agent-proposed
  - status:needs-triage
  - hydrology
  - data-gap
  rationale: The receiving-water 7Q10 is the hydrology spine; no downstream water-balance,
    scenario, or stormwater computation can be verified without it.
  body: '## Context

    The onboarding review confirms that every hydrology tool (`hydrology_balance`,
    `hydrology_scenario`, `sanitary_basis`, `stormwater_runoff`, `tier1_swmm`) returns
    site-scoped empty for `sidney`. The Lima reference build uses a 7Q10 low-flow
    screen against the Ottawa River; sidney''s receiving water is the Great Miami
    system and Lima''s hydrology constants must **not** be inherited.


    ## Grounding

    From the findings (§3 Hydrology):

    > **sidney status:** every hydrology tool site-scoped empty. No NWIS gauges configured,
    no 7Q10, no water balance, no stormwater run.

    > **Gap:** configure `nwis_sites` for the Great Miami reach near Sidney, establish
    the receiving-water 7Q10, and run the portable reach connectors via `watermark
    onboard sidney`.


    Also from § Status at a glance:

    > Its receiving water is the Great Miami system, **not** Lima''s Ottawa River;
    do not inherit Lima''s hydrology constants.


    ## Acceptance Criteria

    - At least one USGS NWIS gauge on the Great Miami River reach near Sidney, OH
    is identified and configured in the site profile.

    - A 7Q10 low-flow value for that reach is computed or retrieved and recorded.

    - `hydrology_balance` returns a non-empty result for `sidney` using the Great
    Miami 7Q10 (not the Ottawa River value).'
- title: Identify Sidney-area WWTP NPDES permit IDs, ingest OEPA fact sheets, and
    run `watermark dmr`
  dedupe_key: identify-sidney-area-wwtp-npdes-permit-ids-ingest-oepa-fact-shee
  labels:
  - status:agent-proposed
  - status:needs-triage
  - permits
  - extraction
  - NPDES
  rationale: The NPDES permit profile is required to perform any effluent-load or
    water-quality analysis and to populate the site's regulatory evidence anchor.
  body: '## Context

    The onboarding review finds zero NPDES/permit data for `sidney`: no fact sheets,
    no public notices, no DMR records. The Lima reference build has a multi-plant
    OEPA NPDES record (`data/extracted/oepa/`) covering American II WWTP (`OH0037338`),
    American Bath WWTP (`OH0023841`), and Shawnee II WWTP (`OH0023850`), established
    as the baseline pattern.


    ## Grounding

    From the findings (§1 NPDES / permit profile):

    > **sidney status:** nothing pulled. No fact sheets, no public notices, no DMR.

    > **Gap:** sidney needs its WWTP NPDES inventory identified (OEPA permit IDs for
    the Sidney-area plant(s) discharging to the Great Miami), the fact-sheet/public-notice
    PDFs ingested under `oepa/` (Ohio jurisdiction), and `watermark dmr` run for the
    actual-vs-design flow record. Also the basin NPDES inventory (`watermark npdes
    --basin <miami>`) for the receiving reach.


    The Lima DMR pattern uses `watermark dmr <id>` (e.g., peer Fort Wayne `IN0032191`).


    ## Acceptance Criteria

    - OEPA permit ID(s) for the Sidney-area WWTP(s) discharging to the Great Miami
    are identified and recorded.

    - Corresponding fact-sheet and public-notice PDFs are ingested under `data/extracted/sidney/oepa/`.

    - `watermark dmr <permit_id>` is run and actual-vs-design flow records are available
    for the site.

    - `watermark npdes --basin <miami>` is run and results are recorded for the receiving
    reach context.'
- title: Resolve Sidney's serving electric utility and EIA-861 number, including muni
    short-form check
  dedupe_key: resolve-sidney-s-serving-electric-utility-and-eia-861-number-inc
  labels:
  - status:agent-proposed
  - status:needs-triage
  - grid
  - utilities
  - data-gap
  rationale: Without the correct utility identity and EIA-861 number, grid demand
    and energy-cost analyses will either fail or silently inherit incorrect Lima values.
  body: '## Context

    The onboarding review finds no grid profile data for `sidney`: no `SiteProfile`
    grid knobs are verifiable as populated, and no `sidney`-scoped grid reference
    outputs exist. The Lima reference build uses `eia861_utility_number`, BA interchange
    (PJM-930), and an LMP/pricing zone. The findings flag a specific risk: Sidney
    may be a home-rule municipal utility requiring the EIA-861S short-form fallback.


    ## Grounding

    From the findings (§2 Grid / utility profile):

    > **Gap:** identify Sidney''s serving utility and its EIA-861 number (watch the
    **muni short-form** case — Sidney is a home-rule municipal possibility; see the
    EIA-861S fallback precedent), confirm the **AEP/PJM** BA and the correct LMP zone,
    then run the grid/consumer-energy connectors.


    ## Acceptance Criteria

    - Sidney''s serving electric utility is identified and its EIA-861 (or EIA-861S
    short-form) utility number is recorded in the site profile.

    - The BA (expected AEP/PJM) and LMP pricing zone are confirmed and recorded.

    - Grid and consumer-energy connectors are run and produce non-empty outputs for
    `sidney`.

    - The muni short-form case is explicitly documented as resolved (applicable or
    not applicable).'
- title: Wire Shelby County OGRIP parcel/zoning GIS for Sidney after verifying situs
    city and state
  dedupe_key: wire-shelby-county-ogrip-parcel-zoning-gis-for-sidney-after-veri
  labels:
  - status:agent-proposed
  - status:needs-triage
  - GIS
  - entities
  - data-gap
  rationale: Wiring the wrong county due to the same-name-county-wrong-state hazard
    would silently corrupt all parcel and zoning lookups for the site.
  body: '## Context

    The onboarding review finds no GIS data for `sidney`: no parcel/zoning connectors
    are wired, no footprint geometry exists, and no recorder deeds are present. The
    Lima reference build uses Allen County OGRIP parcel/zoning and recorder deeds
    (`data/extracted/recorder/`). The findings call out a specific hazard: "Shelby
    County" exists in multiple states, and the situs must be verified from a live
    sample before wiring.


    ## Grounding

    From the findings (§4 GIS):

    > **Gap:** wire Sidney''s county (Shelby County, OH) parcel/zoning GIS — **verify
    situs city + state from a live sample before wiring** (the same-name-county-wrong-state
    hazard); OGRIP `County=''Shelby''` is the OH parcel substitute. Footprint `parcel_acres`/developed/impervious
    stay `[open]` pending a recorded assemblage or stormwater permit. If no project
    site is yet identified for Sidney, this is a candidate-siting task, not a transcription
    task.


    ## Acceptance Criteria

    - A live sample from the Shelby County, OH OGRIP parcel layer is retrieved and
    the situs (city=Sidney, state=OH) is confirmed before any connector is wired.

    - The Shelby County OGRIP parcel/zoning connector is wired in the site profile
    using `County=''Shelby''` (OH).

    - If a project site has been identified, `parcel_acres` and zoning classification
    are recorded; if not, the task is re-scoped as candidate-siting and tracked accordingly.'
