- title: Verify troy-piqua SiteProfile registration in `watermark.sites.SITES`
  dedupe_key: verify-troy-piqua-siteprofile-registration-in-watermark-sites-si
  labels:
  - agent-proposed
  - needs-triage
  - entities
  - onboarding
  rationale: Registration in `watermark.sites.SITES` is identified as a prerequisite
    that precedes all other onboarding work — if it is absent, no downstream artifact
    promotion is possible.
  body: '## Context

    The onboarding review confirms that all MCP-accessible artifact surfaces for `troy-piqua`
    return empty, but the read-only BOSC tools do not expose `watermark.sites.SITES`
    registration or slug-scoped reach-connector outputs under `data/site/`. The findings
    note that epic #440 (Miami-basin expansion) lists troy-piqua as "onboarded" in
    the "thin sense" (profile + portable reach connectors), but this cannot be confirmed
    through MCP tools.


    ## Grounding

    From the findings: *"Per the Miami-basin expansion record (epic #440), troy-piqua
    was ''onboarded'' in the thin sense (profile + portable reach connectors). Each
    ''verify in producer layer'' item below flags that boundary honestly rather than
    asserting past it."* and *"Verify the SiteProfile is registered in `watermark.sites.SITES`
    with `*_relpath`s, `nwis_sites`, `rsei_fips`, `eia861_utility_number`, GIS URLs.
    Not visible to these read-only tools — confirm in the producer layer; if absent,
    this precedes all of the above."*


    ## Acceptance Criterion

    - Confirm (or create) a `watermark.sites.SITES` entry for `troy-piqua` with all
    required fields populated: `*_relpath`s, `nwis_sites`, `rsei_fips`, `eia861_utility_number`,
    and GIS URLs.

    - If the entry is absent, create it and cross-reference epic #440 for intended
    scope.

    - Document the result in a follow-up comment on this issue.'
- title: Ingest troy-piqua source documents to bootstrap the extraction corpus
  dedupe_key: ingest-troy-piqua-source-documents-to-bootstrap-the-extraction-c
  labels:
  - agent-proposed
  - needs-triage
  - extraction
  rationale: Without a source corpus, no extraction, entity, hypothesis, or hydrology
    artifact can exist — this is the single foundational blocker for all other onboarding
    tasks.
  body: '## Context

    The onboarding review confirms that `list_documents` returns "No committed source
    documents for site ''troy-piqua'' yet" and `list_extractions` returns "No extractions
    found under data/extracted/troy-piqua." The corpus index holds no troy-piqua chunks
    (`retrieve_corpus(site="troy-piqua")` → "No results found."). All downstream artifact
    surfaces (entities, timeline, program_overview, hydrology, sanitary_basis, storm_plan_inventory)
    are empty as a direct consequence.


    ## Grounding

    From the findings: *"No source corpus at all. Everything downstream (entities,
    timeline, program overview) is empty as a consequence. Blocking at the foundational
    level — needs source-document ingest before any extraction work."* The Lima baseline
    demonstrates the expected artifact tree: recorder deeds, commissioners resolution
    ledger + minutes, LACRPC zoning + collection index, AEDG Tetra Tech OPC program,
    and a `legal/` PRR layer.


    ## Acceptance Criterion

    - At least one source document is committed under a `troy-piqua` document tree
    and indexed.

    - `retrieve_corpus(site="troy-piqua")` returns at least one chunk.

    - `list_documents` no longer returns the empty stub for this site.

    - A follow-up `retrieve_corpus` sweep is run to identify any indexed chunks that
    lack a `data/extracted/troy-piqua/` peer (per the process note in the findings).'
- title: Identify troy-piqua receiving-water WWTP(s), ingest OEPA NPDES fact sheet/PN,
    and pull ECHO DMR
  dedupe_key: identify-troy-piqua-receiving-water-wwtp-s-ingest-oepa-npdes-fac
  labels:
  - agent-proposed
  - needs-triage
  - extraction
  - hydrology
  - entities
  rationale: The WWTP NPDES ID is a hard dependency for both the sanitary basis and
    the hydrology water-balance, making it a critical path item for site promotion.
  body: '## Context

    The onboarding review confirms no OEPA NPDES fact sheets, public notices, or ECHO
    DMR outputs exist for `troy-piqua`. The receiving-water WWTP(s) for the Troy/Piqua
    reach are entirely unidentified in any committed artifact.


    ## Grounding

    From the findings (§1): *"receiving-water WWTP NPDES ID(s) not established; no
    fact-sheet/PN ingest; no DMR pull. Blocking — sanitary basis and `hydrology_balance`
    both depend on a cited design flow + 7Q10 receptor."* The Lima baseline pattern
    includes `extracted/oepa/oepa-2PH00006-american-ii-fact-sheet.npdes.yaml`, `extracted/oepa/oepa-2PH00007-american-bath-fact-sheet.npdes.yaml`,
    and `extracted/oepa/oepa-2PK00002-shawnee-ii-draft-pn-2026-03.npdes.yaml`, plus
    ECHO DMR pulls regenerable via `watermark dmr <NPDES_ID> --start … --design-flow
    …`.


    ## Acceptance Criterion

    - At least one Troy/Piqua area WWTP NPDES ID is identified and documented.

    - Corresponding OEPA fact sheet and/or public notice is ingested as `extracted/oepa/…npdes.yaml`
    following the Lima naming pattern.

    - An ECHO DMR connector output (`.dmr.yaml`) is committed for the identified NPDES
    ID(s).

    - `sanitary_basis` and `hydrology_balance` surfaces are unblocked for subsequent
    population.'
- title: Configure NWIS gauge IDs, establish 7Q10, and run `hydrology_balance` for
    troy-piqua
  dedupe_key: configure-nwis-gauge-ids-establish-7q10-and-run-hydrology-balanc
  labels:
  - agent-proposed
  - needs-triage
  - hydrology
  rationale: The assimilative-screen thesis — the analytical core of the BOSC network
    — cannot be evaluated for troy-piqua until a 7Q10 and water balance are established.
  body: '## Context

    Both `hydrology_balance` and `hydrology_scenario` return the empty `[scope]` stub
    for `troy-piqua`. No 7Q10 value, water-balance, or scenario is committed. It is
    also unconfirmed whether `nwis_sites` are configured on the SiteProfile and whether
    reach connectors have run.


    ## Grounding

    From the findings (§3): *"`hydrology_balance` and `hydrology_scenario` both return
    the empty `[scope]` stub. No committed 7Q10, no water-balance, no scenario. `[open]`
    whether `nwis_sites` are configured on the profile and whether reach connectors
    have run (slug-scoped outputs not visible here)."* Gaps: *"confirm Great Miami
    / Mad River NWIS gauge IDs on the profile; establish 7Q10 for the receiving reach;
    run the water balance once a WWTP receptor (§1) exists. Blocking for the assimilative-screen
    thesis that anchors the network."* The Lima baseline uses `nwis_sites` to drive
    live USGS NWIS pulls and screens each WWTP design flow against a cited 7Q10.


    ## Acceptance Criterion

    - Great Miami and/or Mad River NWIS gauge ID(s) are confirmed on the troy-piqua
    SiteProfile `nwis_sites` field.

    - A cited 7Q10 value for the receiving reach is committed.

    - `hydrology_balance` returns a populated result (not the `[scope]` stub) once
    the WWTP receptor from the NPDES task is available.

    - This issue should be worked after the WWTP NPDES ID task is resolved.'
- title: Confirm troy-piqua serving utility, EIA-861 number (check short-form path),
    and wire OH parcel/zoning GIS for a footprint record
  dedupe_key: confirm-troy-piqua-serving-utility-eia-861-number-check-short-fo
  labels:
  - agent-proposed
  - needs-triage
  - extraction
  - hydrology
  - entities
  rationale: Grid and footprint data are jointly blocking for stormwater runoff modeling
    and the power/cooling basis needed for the hydrology scenario, and the municipal
    short-form utility path requires explicit verification to avoid misidentification.
  body: '## Context

    No committed grid artifact or footprint geometry exists for `troy-piqua`. It is
    unconfirmed whether `eia861_utility_number`, `rsei_fips`, or LMP zone are set
    on the SiteProfile, and no parcel/zoning extraction has been committed. Both gaps
    are identified as mostly or fully blocking for a complete profile.


    ## Grounding

    From the findings (§2): *"confirm serving utility + EIA-861 number (watch the
    municipal EIA-861S short-form fallback — Troy and Piqua are both candidates for
    municipal/home-rule utilities, per the Bryan precedent); confirm PJM vs. correct
    RTO/LMP zone; no power basis recorded. Mostly blocking for a complete profile."*
    From §4: *"identify the candidate parcel assemblage; wire OH parcel/zoning GIS
    (OGRIP `County=''Miami''`/`''Shelby''` substitute as needed); produce a footprint
    record (assemblage-based is acceptable, with `developed`/`impervious` `[open]`).
    Blocking for stormwater runoff."* The findings also flag a same-name-county hazard:
    *"verify situs city/state from a live sample before wiring any discovered parcel/zoning
    endpoint."* The Fort Wayne precedent (`idem/47378f.idem.yaml`) documents how to
    handle a non-disclosing permit for power basis.


    ## Acceptance Criterion

    - The serving electric utility for Troy/Piqua is identified; the EIA-861 (or EIA-861S
    short-form) utility number is confirmed and set on the SiteProfile.

    - The correct RTO/LMP zone (PJM or otherwise) is documented.

    - OH parcel/zoning GIS endpoints (OGRIP `County=''Miami''` and/or `''Shelby''`)
    are wired on the profile, with situs city/state verified from a live sample.

    - A `bosc-site-footprint.yaml` (or equivalent) is committed with the parcel assemblage;
    `developed`/`impervious` may be left `[open]` following the Fort Wayne pattern.

    - `hydrology_scenario` is unblocked for subsequent population once §3 is also
    resolved.'
