# Canonical identity registry for all Watermark network sites (tracking → live).
# This file is the single source of truth for site identity — the authoritative record for
# slug, place, basin display label, receiving water, state, status, map defaults, and the
# frontend badge (codename / mono). See docs/onboarding.md for the field guide.
#
# Usage:
#   - Python: watermark.sites loads this at import time; SiteProfile back-fills identity fields.
#   - TypeScript: `bosc sites sync` writes web/src/lib/sites-registry.json from this file.
#   - CI gate: `bosc sites check` validates both registries stay in sync with this file.
#
# Shared identity fields (authoritative here):
#   slug         kebab-case registry key
#   place        display name for the city / area
#   basin_label  receiving-water / sub-basin display string (TypeScript `basin` field)
#   receiving_water  Python receiving_water_name on the active NPDES (null for tracking-only)
#   state        two-letter abbreviation (OH, IN)
#   codename     switcher badge codename (null = use mono)
#   mono         three-letter fallback badge
#   status       live | building | queued | tracking
#   selectable   true only for a site whose full build is deployed
#   issue        GitHub issue number (string, no #; null for lima)
#   map_lat/lon/zoom  default DeckGL viewport (null for tracking-only sites with no profile yet)

