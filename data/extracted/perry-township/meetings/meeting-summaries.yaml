  summary: At the April 16, 2024 Perry Township Trustees meeting, two residents —
    Cathy Clementz and Gary Shaw — raised questions about the data center project
    during the public comment portion. Cathy Clementz stated she had been researching
    data centers and asked about maximum decibel noise levels at certain distances,
    to which the Trustees replied they had no further information on sound issues
    yet. Gary Shaw asked whether the data center would have its own electrical substation
    or would cause power issues for residents, and it was noted that lawyers at a
    prior meeting forum stated it would most likely have its own substation.
  corridor_relevance: This meeting is connected to the corridor project because community
    members directly questioned the Trustees about the data center's noise levels
    and power infrastructure, reflecting ongoing public concern about the hyperscale
    data center development in the area.
