  summary: 'At the July 15, 2025 Perry Township Trustees regular meeting, Zoning Inspector
    John Brewster noted that a prior motion accepting data centers in the zoning books
    needed to be converted to a formal resolution for recording purposes. The Board
    subsequently passed Resolution #2025.0715-02, formally adopting language into
    the Perry Township Zoning Resolution to permit data centers under I-2 zoning (section
    11.1.6), and concurrently rescinded the original motion from 9/5/2024 on the same
    subject. During public comment, a resident asked about the data center going into
    American Township, prompting Trustee Kessen to clarify that Microsoft had pulled
    out of the Perry project and Chairman Cox stated that other data centers are still
    investigating the property in Perry Township.'
