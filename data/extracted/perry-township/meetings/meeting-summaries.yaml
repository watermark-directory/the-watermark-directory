  summary: At the May 21, 2024 Perry Township Trustees meeting, representatives from
    AEDG and associated legal counsel presented the case for a hyperscale data center
    proposed for a site between Breese and Hume Road, already zoned I-2, seeking the
    township to initiate a zoning amendment to permit data centers. Projected tax
    revenue figures were shared, including an estimated $125,000 annually to Perry
    Township and nearly $400,000 to Perry Schools per building, with a 6-building
    project potentially generating over $2.4 million for schools and approximately
    $750,000 for the township. The Trustees discussed the zoning amendment process
    at length but no vote on the data center zoning matter was taken; Chairperson
    Larry Sidener declined to call for a vote that evening.
  corridor_relevance: This meeting directly addresses the proposed hyperscale data
    center (a Fortune 500 company's project) on a site between Breese and Hume Road
    in Perry Township, with presenters requesting the township initiate I-2 zoning
    amendments to permit data centers and trustees deliberating whether to begin that
    process.
  decisions:
  - Greg made a motion to accept the meeting minutes from May 7th, 2024; 2nd Kevin
    Cox; rollcall passed.
  - Kevin Cox made a motion to pay bills of $73,000.59; 2nd Greg Kessen; rollcall
    passed.
  - Greg Kessen made a motion to accept the April Bank Reconciliation for 2024; 2nd
    Kevin Cox; rollcall passed.
  - Greg Kessen made a motion to accept the updated credit card policy; 2nd Kevin
    Cox; rollcall passed.
  - Greg Kessen made a motion to have a budget meeting on June 18th at 6:30 PM; 2nd
    Kevin Cox; rollcall passed.
  - Larry Sidener made a motion to rescind the Friday morning workshops; 2nd Greg
    Kessen; Larry Sidener YES, Kevin Cox NO, Greg Kessen YES; motion passed.
  - Greg Kessen made a motion to approve the purchase request for the MARCS radios
    from Commercial Communications in the amount of $3,411; 2nd Kevin Cox; rollcall
    passed.
  - Greg Kessen made motion to adjourn at 9:23 PM; 2nd Kevin Cox; rollcall passed.
  - No vote was called on the data center zoning amendment; Larry Sidener stated he
    is not calling for a vote tonight.
