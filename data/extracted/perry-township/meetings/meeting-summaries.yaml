  summary: Perry Township Trustees held a special meeting on October 29, 2024 to announce
    their decision on rezoning two parcels from Agricultural to Industrial, a process
    that had been initiated in connection with a prospective data center project.
    The trustees discussed the rezoning applications following a completed public
    hearing, noting that Microsoft had dropped out of the project; opinions were divided
    on whether the parcels should be rezoned to I-2 Industrial or remain Agricultural.
    By a 2-1 vote, the trustees denied the Zoning Commission's recommendation to rezone
    the two parcels, with Trustee Cox dissenting, and affirmed their continued interest
    in marketing the existing approximately 325 acres already zoned I-2.
  corridor_relevance: This meeting directly concerns the data center corridor project,
    as the rezoning of two parcels from Agricultural to Industrial had been pursued
    in connection with a prospective data center (referenced as a Microsoft prospect),
    and the trustees' denial of that rezoning was explicitly tied to Microsoft's withdrawal
    from the project.
  decisions:
  - Larry Sidener made a motion to deny the recommendation from the Zoning Board to
    rezone the entire two parcels from Agricultural to Industrial; 2nd Greg Kessen;
    Sidener-Yes, Cox-No, Kessen-Yes. Motion passed. The zoning request is denied.
  - Larry Sidener made motion to adjourn at 5:53PM; 2nd Greg Kessen; Larry Sidener-Yes,
    Kevin Cox-Yes, Greg Kessen-Yes.
