    until after the Microsoft open house scheduled for September 12th at Perry Elementary
    cafeteria. The Trustees also retained attorney Blaine Brock specifically for zoning
    purposes and held two executive sessions for legal zoning discussion, reflecting
    the active public hearing process tied to the proposed data center.
