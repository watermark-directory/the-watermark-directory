  summary: A guest, Dave Stombaugh, raised the topic of a moratorium on data centers
    that Shawnee Township had passed, prompting the Perry Township Trustees to discuss
    whether they need a temporary hold on alternative energy. Zoning-related concerns
    about data centers and water usage were also raised, specifically that data centers
    should be required to tap into a hydrant system or municipal water rather than
    digging deep water wells that could deplete residents' wells. The trustees also
    discussed that Shawnee Township now has 1½ years to develop a plan for data centers,
    and that small nuclear plants to power data centers were also being considered.
  corridor_relevance: This meeting connects to the corridor project through a guest's
    inquiry about Shawnee Township's data center moratorium, prompting Perry Township
    Trustees to discuss whether they should impose a similar temporary hold and explore
    zoning regulations related to water sourcing for data centers.
  decisions:
