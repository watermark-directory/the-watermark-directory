  summary: The June 18, 2024 Perry Township Trustees regular meeting was dominated
    by public discussion of a proposed hyperscale data center on approximately 358
    acres of industrially-zoned land in the township, with residents and officials
    debating noise, property taxes, zoning language changes, and potential tax abatements.
    Zoning Inspector John Brewster announced a June 27th zoning commission meeting
    to begin discussions on adding "data centers" as a permitted use under industrial
    zoning, with public comment hearings to follow at a later date. Allen Economic
    Development Group (AEDG) representatives Dave Stratton and Cindy Leis addressed
    residents, clarifying that the company's identity cannot yet be disclosed, that
    no tax abatement has been agreed upon, and that any abatement would include a
    PILOT agreement to keep school revenue whole. Community members raised concerns
    about noise, road impacts, acreage (figures cited ranged from 350 to 800 acres),
    conflicts of interest, eminent domain, and the identity of the unnamed company,
    with one resident referencing "Apple" by name.
  corridor_relevance: This meeting connects directly to the corridor project because
    it centers on a proposed data center development on industrially-zoned Perry Township
    land, with AEDG officials, the zoning inspector, trustees, and numerous residents
    debating the process for amending zoning language to permit data centers and the
    project's community impacts.
  decisions:
  - Zoning Inspector John Brewster scheduled a zoning commission meeting for Thursday,
    June 27th at 6:30 PM at the Township Administration Building to discuss possibly
    adding data centers to industrial zoning; public is welcome but no public comments
    or questions will be taken at that meeting.
  - Trustees indicated there will be two future public comment meetings before any
    final decision.
  - Larry Sidener stated he would check into whether his son's farming relationship
    with South Warsaw Farms constitutes an ethics violation.
  - Trustees agreed to look into the traffic/parking issue at the Pepsi plant on Greeley
    Chapel and 4th Street.
  - Greg Kessen stated the roads department and police may be able to close Charledon
    Road between 8th and 9th on Saturday, July 6th from 4 PM to approximately 10 or
    11 PM for a private party; Kevin Cox stated that would not be out of line.
