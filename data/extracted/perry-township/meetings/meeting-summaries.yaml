  summary: At the May 7, 2024 Perry Township Trustees regular meeting, residents and
    trustees raised questions about a potential data center project in the area. Trustee
    Larry Sidener reported taking a drive to New Albany to observe existing data centers,
    noting significant construction, equipment, and two power substations. Discussion
    included whether to pursue zoning amendments or rezoning in connection with the
    project, with trustees ultimately deciding not to make any zoning amendments at
    this time, and a suggestion was made for a meeting among Cindy Leis, Kayla, Jill,
    John, and Larry to discuss next steps.
