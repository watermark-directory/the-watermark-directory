  summary: At the June 3, 2025 Perry Township Trustees regular meeting, Cindy Leis
    presented on development activity in and around Perry Township, including updates
    on the Perry Industrial Site and data center interest. She noted that the Port
    Authority has reassigned approximately 196 acres to Thor Equities for data center
    clients, that a real estate developer is conducting due diligence including a
    power study on those acres, and that the American Township data center project
    is moving forward and expected to be announced soon with city treated water service
