  summary: Perry Township Trustees held a special public hearing on September 5, 2024
    to consider amending the township zoning resolution to add "data centers" as a
    permitted use. After public comment and trustee deliberation, the board voted
    unanimously to modify the recommendation from I-1 to I-2 industrial zoning and
    adopt the data center language under section 11.1.6 "for the purpose of storing
    and saving computer data on servers and similar equipment." The meeting also referenced
    two properties currently undergoing rezoning from Agricultural to I-2 for the
    same project, and noted that Microsoft has been in contact with AEP regarding
    power commitments.
  corridor_relevance: This meeting directly concerns the hyperscale data center corridor
    project, with trustees amending Perry Township's zoning resolution to add data
    center language to I-2 industrial zoning, and references to Microsoft as the named
    company and two parcels being rezoned from Agricultural to I-2 for the same project.
