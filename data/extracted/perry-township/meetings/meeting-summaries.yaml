  summary: At the April 2, 2024 Perry Township Trustees regular meeting, attorney
    Jill Hageman, representing an unnamed Fortune 500 data center company through
    Allen Economic Development, gave a presentation on a proposed hyperscale data
    center project to be located south of Breese Road and east of St. Johns Road,
    encompassing approximately 350 acres. The company intends to build 7–8 warehouse-style
    buildings over a 6–8 year construction timeline, employing roughly 30–50 people
    per building, and has stated it will not accept tax abatements that impact the
    local school district. Residents raised concerns about taxes, property values,
    emissions, water usage, and transparency, while the company's representatives
    indicated the project name would be released once environmental studies return
    favorable results and the zoning process advances.
  corridor_relevance: This meeting is directly connected to the corridor project because
    attorney Jill Hageman appeared on behalf of an unnamed Fortune 500 data center
    client, facilitated by Allen Economic Development, to present a proposal for a
    hyperscale data center on approximately 350 acres in Perry Township south of Breese
    Road and east of St. Johns Road.
