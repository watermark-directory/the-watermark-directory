  summary: At the July 16, 2024 Perry Township Trustees meeting, the Zoning Inspector
    reported that rezoning variance applications for the Henderson and Cira properties
    (approximately 70 acres each) from Agricultural to I-2 Industrial were submitted
    by the property owners and would follow the same process as the data center zoning
    change. Cindy Leis, representing the unnamed company, confirmed the company remains
    interested in the site and indicated the company's name may be revealed during
    upcoming public hearings, with a community open house planned at a future date.
    Community members raised questions about noise levels, tax abatements, and incentives
    related to the proposed data center, with trustees and Cindy Leis providing explanations
    about the abatement review process.
  corridor_relevance: This meeting directly addresses the hyperscale data center corridor
    project through discussion of related rezoning applications for the Henderson
    and Cira properties, a status update from project representative Cindy Leis confirming
    continued company interest, and community Q&A on noise, taxes, and abatements
    tied to the proposed data center.
