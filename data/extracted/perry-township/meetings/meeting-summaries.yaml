  summary: The June 4, 2024 Perry Township Trustees regular meeting was dominated
    by extensive public comment and trustee discussion regarding a proposed data center
    (referred to as a "data plant" or "data center") on I-2 industrially zoned land
    in the township, with residents and officials both supporting and opposing the
    project. The central question before the trustees was whether to initiate a zoning
    text amendment to add data centers as a permitted use within I-2 General Industry
    zones. Trustees Larry Sidener and Greg Kessen both stated they wished to defer
    any decision until at least the next meeting, pending the return of the zoning
    inspector and further research. The meeting also addressed routine township business
    including bills, insurance payments, road maintenance, and banking options.
  corridor_relevance: This meeting directly concerns the proposed hyperscale data
    center project, as trustees, residents, landowners, and regional officials debated
    whether to amend Perry Township's I-2 zoning text to permit data centers, with
    Rex Huffman of the Port Authority of Allen County and Wood County, Cindy Leis,
    and Lima Mayor Sharetta Smith among those advocating for the zoning amendment
    process to begin.
  decisions:
  - Kevin Cox made a motion to accept the meeting minutes from May 21, 2024; Greg
    Kessen 2nd; rollcall.
  - Greg Kessen made a motion to pay bills of $73,701.00; Kevin Cox 2nd; rollcall.
  - Greg Kessen made a motion to pay VFIS Insurance of $38,372.00; Kevin Cox 2nd;
    rollcall.
  - Motion to adjourn at 8:59 PM; 2nd by Kevin Cox; rollcall.
  - Trustees Larry Sidener and Greg Kessen both stated they want to wait until at
    least the next meeting before making a decision on the zoning amendment for data
    centers (no formal vote taken on zoning amendment).
