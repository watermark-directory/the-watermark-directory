    to I-1 zoning (from 7/18/2024), and the board set a public hearing for September
    5th at 6PM to discuss the amendment. Cindy Leis read an email from the data center
    client identifying the proposed data center as Microsoft, with an open house tentatively
    scheduled for September 12th at Perry School Cafeteria. The trustees also noted
    a Zoning Board meeting on August 28th to discuss the rezoning of the CIRA and
    Henderson properties, with planned access to the site from State Route 65, Hume
    Road, and a secondary entrance on Greeley at the CIRA property.
  corridor_relevance: This meeting directly addresses the data-center corridor project
