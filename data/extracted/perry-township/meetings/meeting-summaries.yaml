  summary: At the December 5, 2023 Perry Township Trustees regular meeting, routine
    township business was conducted including equipment purchases, personnel matters,
    and zoning updates. During the guest comments portion, resident Doug Mooney asked
    whether the trustees had heard anything about Google coming to Lima; the trustees
    responded that they had not. No corridor-related action, discussion, or information
    was presented beyond this single exchange.
