# Structured extraction of the IDEM Title V air permit for the Hatchworks LLC /
# Project Zodiac data center (Fort Wayne, IN). Source bytes: data/documents/idem/
# fort-wayne/47378f.pdf (chain of custody — see that dir's filename-map.yaml).
# Tag vocabulary: [verified] = stated verbatim in the permit; [inference] = derived
# here with the stated assumption. Page cites are 0-based PDF pages of 47378f.pdf
# (the permit's own section ids, e.g. A.2, are given alongside).
meta:
  subject: Hatchworks LLC (Project Zodiac) — IDEM Title V air permit, power basis
  kind: idem
  source_document: data/documents/idem/fort-wayne/47378f.pdf
  permit_number: 003-47378-00530
  permit_level: Title V New Source Construction (Minor PSD/EO)
  issued: 2024-09-06
  issuing_agency: Indiana DEM, Office of Air Quality
  facility_ai_id: '133680'
  oaq_stationary_source_id: '1800300530'
  extracted_at: 2026-06-27
  method: hand extraction from the PDF text layer (pypdf); figures verbatim unless tagged [inference]

facility:
  operator_description: '[verified] "The Permittee owns and operates a stationary data center" (A.1, p6)'
  source_address: 7510 Zodiac Way, Fort Wayne, Indiana 46816 (Allen County)  # [verified] A.1, p6
  sic_code: '7374'  # [verified] Computer Processing and Data Preparation (A.1, p6) — confirms data center
  general_source_phone: (650) 495-3224  # [verified] A.1, p6 — a 650 (Mountain View) area code
  source_status:  # [verified] A.1, p6
    - Part 70 Operating Permit Program
    - Minor Source under PSD and Emission Offset Rules
    - Minor Source, Section 112 of the Clean Air Act

emission_units:
  emergency_generators:
    count: 34  # [verified] "Thirty-four (34) diesel-fired emergency generators, identified as
               # Gen 1 through Gen 34, approved in 2024 for construction" (A.2, p6)
    ids: Gen 1 .. Gen 34
    fuel: diesel
    duty: emergency  # [verified] emergency-use engines (NSPS 40 CFR 60 Subpart IIII; NESHAP 40 CFR 63 Subpart ZZZZ)
    heat_input_mmbtu_hr_each: 26.4  # [verified] "each with a maximum heat input capacity of 26.4 MMBTU per hour" (A.2, p6)
    stacks: SV 1 .. SV 34  # [verified] A.2, p6
    control: none  # [verified] "using no control" (A.2, p6)
  insignificant_activities:  # [verified] A.3, p6 — not part of the data-hall backup fleet
    - id: DEGH1
      description: one diesel-fired emergency guard-house generator (approved 2024)
    - id: DEP1
      description: one diesel-fired emergency fire pump (approved 2024)

limits:
  nox_tpy_combined: 240  # [verified] "combined NOx emissions from the thirty-four (34) ... emergency
                         # generators shall not exceed 240 tons per twelve (12) consecutive month period" (D.1.1, p26/p35)

# Power basis for SiteProfile.facility (bosc.facility.power.derive_power_basis). The permit discloses
# heat input, NOT an electrical rating, so genset_mw is DERIVED — unlike Lima (disclosed ekW).
power_basis:
  genset_count: 34  # [verified] the Gen 1..34 data-hall backup fleet (excludes DEGH1/DEP1)
  genset_mw_each: 3.0  # [inference] 26.4 MMBTU/hr HHV heat input / engine; at a large-diesel full-load
                       # electrical efficiency of ~38-43% (HHV) -> ~2.9-3.3 MWe, central ~3.0 MWe.
  genset_mw_low: 2.9   # [inference] 38% HHV efficiency
  genset_mw_high: 3.3  # [inference] 43% HHV efficiency
  backup_mw_total: 102  # [inference] 34 x ~3.0 MWe
  it_load_mw: 90   # [inference] N+1: IT ~= 0.88 x backup (Lima convention 275/313); ~90 MW central
  it_load_low_mw: 80   # [inference] low genset rating x lower IT/backup ratio
  it_load_high_mw: 100  # [inference] high genset rating x higher IT/backup ratio
  note: >-
    A materially smaller campus than Lima (114 gensets, ~313 MW backup, IT 250-300 MW). The IT
    figures are a layered inference (heat-input -> electrical -> N+1 IT); refine if the engine
    nameplate (ekW/bhp) surfaces in the application, the Part 70 significant modification
    (003-48739, data/documents/idem/fort-wayne/48739d.pdf), or a later final permit.
