  summary: >-
    NPDES construction-stormwater (SWP3) plan for the Beery Rd. & Cole St. roundabout
    and the co-located BOSC Storm Outfall channel — operator George J. Igel & Co.,
    engineer WSP USA (Thomas C. Campbell, P.E.), prepared 2026-04-16, construction
    2026-05-15 → 2027-12-31. Total disturbed 5.71 ac (roundabout 5.6 + outfall 1.56,
    overlapping). The site drains via tile to Pike Run → Ottawa; the BOSC Storm Outfall
    channel discharges to Pike Run. This is a roadwork-program (AEDG/PAAC roundabout)
    plan that also builds the data-center campus's storm outfall.
  note: 'Ohio EPA eDocument 4091286. Stormwater Pollution Prevention Plan (SWP3) for
    the Beery Road & Cole Street Roundabout / BOSC Storm Outfall, American Township
    (Lima), Allen County, OH (40.794819, -84.128202). Prepared for George J. Igel &
    Company, Inc. (operator/contractor; Christopher A. Batdorff) by WSP USA Inc.
    (Thomas C. Campbell, P.E., Indianapolis), project E-80410, dated 2026-04-16;
    estimated construction 2026-05-15 to 2027-12-31. New oval roundabout (140 ft x
    160 ft, 15 ft center truck apron) on new alignment plus the BOSC Storm Outfall
    channel and new storm sewers; 5.71 ac disturbed total (roundabout 5.6 ac + outfall
    1.56 ac, overlapping; property 5.87 ac). Receiving water Pike Run (tributary of
    the Ottawa River) — the BOSC Storm Outfall channel terminates at Pike Run. No
    on-site streams/wetlands within the LOD (a PUBGx pond nearby is not impacted); a
    Surface Water Impact Determination letter is in Appendix I and no Section 401 /
    antidegradation review is required. The NOI + Ohio EPA CGP authorization are in
    Appendix A but the coverage number is not printed in the narrative body. Two new
    corridor parties surface here: George J. Igel & Co. (contractor) and WSP USA
    (engineer — also named on the campus architectural sheets per docs/COMPUTE.md).'
