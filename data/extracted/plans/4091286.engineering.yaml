  key_features:
  - 'Existing land use: open agricultural row crops; existing drainage east-to-west,
    largely subsurface tile, ultimately to Pike Run → Ottawa River.'
  - No on-site streams or wetlands within the Limits of Disturbance. A PUBGx freshwater
    pond sits west of the roundabout / north of the BOSC Storm Outfall channel and
    will not be impacted.
  - Surface Water Impact Determination letter included (Appendix I); no activities
    require Section 401 authorization or antidegradation review by Ohio EPA.
  - 'Soils (NRCS): TkA Thackery loam, AkA Alvada loam (hydric), WeA Westland-Rensselaer
    (hydric), SrA Sloan silty clay loam (frequently flooded), SfB Shawtown loam, HrB
    Houcktown loam (hydric), GaB Gallman loam — HSG mostly B/D.'
  - 'BMP sequence: Storm Outfall Phase 1-2 (start 2026-05-15, end 2026-12-31) then
