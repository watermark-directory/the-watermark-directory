relevance:
  tags: [verified, watershed, maumee-headwater, nutrient-loading, public-grant]
  note: >-
    Watershed-burden context for the hydrology axis. The same Maumee headwater
    system (Lost Creek HUC12, east of I-75) already carries an agricultural
    nutrient load heavy enough to warrant a $650k public retention/treatment
    grant — a baseline against which any new large consumptive/discharge load in
    the basin is additive. Cross-refs the ECHO Maumee discharger inventory
    (data/reference/echo/) and HYDROLOGY's "burden already maxed" finding.

