practices:
  - name: Runoff capture / retention / reuse — fields 7 and 27 (via field 4)
    elements:
      - floodplain access via berm/dike installation and/or excavation
      - water-retention & treatment wetland with irrigation reuse (electrical service)
      - forebay, wetland, and pump "vault"; maintenance access
    floodplain_acres: ~3.5      # "3-4 acres" — approximate
    row_crop_acres_captured: ~40
    wetland_retention_buffer_acres: ~5
    status: ON-GOING CONSTRUCTION
    contractor: VTF Excavation LLC
    expected_completion: '2024-08-31'
  - name: Saturated buffer — OSU-Lima field 17
    elements:
      - drainage control structure diverts subsurface tile water to a parallel drainpipe under a vegetated buffer
      - denitrification + phosphorus reduction; little maintenance; no yield impact
    cropland_drainage_acres_treated: ~12
    installed: '2022-08-16'
    status: COMPLETED IN AUGUST 2022

