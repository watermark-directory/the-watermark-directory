trade_secret:
  authority: OAC 3745-49-03; ORC 3734.12(G)
  granted_by: Marc Glasgow, Supervising Attorney, Ohio EPA (CC Robert Hodanbosi, Chief DAPC; Andrea Moore, DAPC NWDO)
  applications_covered: [A0080278, PBR21722]
  justification: Trinity Consultants for Bistrozzi LLC (signed Michael Montfort, WSGR), to John Pasquarette (Ohio EPA NWDO), 2025-10-02 (eDoc 3859888)
  withheld_categories:
    - Size / rating of emergency generators and fire pumps
    - Cooling system flowrates
    - Internal layout details
  located_in: confidential version only — application narrative Sections 1, 3, 5 + Appendices A, B, C, E
  basis_claimed: >-
    Competitors could "calculate the size and utilization of the facility," its data-center "capacity," and
    infer Bistrozzi's "design philosophy," "business strategy and market plan for the US market."
  secrecy_measures: contractor confidentiality agreements; internal design docs confidential; restricted visitor access; "claimed this same information as trade secret in all past air permit applications."
  key_admission: >-
    "The air permit is the only public document that requests the size of the emergency generators be
    provided. As such, by preventing this information from becoming public via the air permitting process,
    the facility has taken a significant step to ensure the confidentiality of this information." So the
    sole public disclosure path for the per-engine size has been deliberately closed.

surviving_public_brackets:   # from the un-redacted NSPS/NESHAP applicability discussion in 3859888 (pp11-14)
  main_generators_and_hub: ">= 560 kW (>= 750 hp) each — NSPS IIII Tier 2 (40 CFR 1039 App. I)"
  smaller_emergency_generators: "130-560 kW — Tier 3"
  fire_pump_engines: "225-450 kW — NSPS IIII Table 4 (model year 2009+)"
  operating_basis: "each emergency generator <= 500 hr/yr (annual PTE basis); 50 hr/yr non-emergency cap"
  note: >-
    Regulatory size FLOORS / brackets only (these survive in the public version); the exact per-engine ekW
    (~2,750 in the draft public notice) is NOT disclosed. ">= 560 kW" is consistent with, but does not
    confirm, a 2,750 ekW unit.

finding_159: >-
  RESOLVES #159 by its second acceptance criterion. The per-engine ekW is CBI / trade-secret-locked at the
  application stage too — formally granted by Ohio EPA on 2025-10-08 (this document). The
  2,750 ekW x 114 ~= 313 MW per-unit basis therefore remains the DRAFT public-notice figure
  (permits/3987141, /3987144) and cannot be put on a primary footing absent a legal challenge to the
  trade-secret designation. The surviving public brackets (main gensets >= 560 kW / >= 750 hp) are
  consistent with but do not confirm ~2,750 ekW.

bearing_on_160: >-
  "Internal layout details" are among the withheld categories — so the data-hall footprint / emission-unit
  plot plan sought in #160 is ALSO trade-secret-shielded at the DAPC level, reinforcing that blocker
  (it adds to the County/ASWCD R.C. 149.433 + 1333.61 withholding of the campus plan sets).

bearing_on_cooling: >-
  "Cooling system flowrates" are withheld too — the cooling-water design basis (docs/HYDROLOGY.md;
  watermark.hydrology.cooling) cannot be primary-sourced from the air permit, so the WUE / blowdown estimates
  stay derived / assumption-tagged.

