timing_determination:        # resolves #154
  question: Did campus earth disturbance (>1 ac) begin before NPDES CGP coverage attached?
  finding: >-
    NO, on the documented record. Coverage 2GC08468*AG was effective 2025-11-10; the earliest DOCUMENTED
    earth disturbance is 2025-12-08 (ASWCD ESC #177506). Coverage preceded documented disturbance by ~4
    weeks. The persistent "Site NPDES Number: TBD" on the ASWCD ESC forms (2025-12-08 -> 2026-06-05) was a
    RECORDING gap on the SWCD's own forms, not an absence of coverage — confirming the alternative
    hypothesis the permit-sequence flagged (Turner held coverage the SWCD simply did not record). Analysis,
    not a legal conclusion.
  caveat: >-
    The NOI's declared "Proposed Project Start Date" (2025-11-03) is 7 days before the *AG effective date,
    but is a planning date on the form, not evidence of actual commencement; no earth disturbance is
    documented before 2025-12-08.

