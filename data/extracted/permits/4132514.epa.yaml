action:
  confidence: high
  warnings:
  - This is the FINAL Air Pollution Permit-to-Install (DAPC), issued 2026-05-28 — it
    supersedes the 2025-12-10 DRAFT of the same permit number P0138965 already in the
    corpus (eDocs 3987141, 3987144). Action recorded as 'issued'.
  - Air Pollution permit (Division of Air Pollution Control), not Division of Surface
    Water / 401 / wetland — outside the typical DSW scope of the EpaPermitAction schema;
    air-specific substance captured in the extra structured fields below.
  - 'Per-engine nameplate power is NOT stated in this final permit — engine make/model/size
    is redacted as Confidential Business Information / trade secret (Comments 16, 19;
    Response 16). The ~2,750 ekW/engine figure behind the ~313 MW backup total comes
    from the DRAFT public notice (eDocs 3987141/3987144), not this document. This permit
    confirms the unit COUNT (114 hall gensets + 1 HUBGEN = 115) and emission RATES,
    not the per-unit ekW.'
  - The draft extractions flagged a 114-vs-115 generator discrepancy; the final permit
    resolves it — 115 emissions units P001-P115, of which P001-P114 are identical data-hall
    gensets and P115 is a separate, smaller HUBGEN (distinct emission rates, Table 1/2).
  - Manual review (dpi=0 sentinel). Dollar/limit figures are high-confidence (printed
    in the issued permit body, not OCR); see pages cited inline.
