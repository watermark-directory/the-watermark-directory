  note: 'FINAL Ohio EPA Air Pollution Permit-to-Install P0138965 for Bistrozzi LLC
    (Project BOSC), Facility ID 0302022054, Allen County — issued and effective 2026-05-28,
    permit fee $71,755, applications A0080713 (12/02/2025) + A0080278. Authorizes a
    data center with 115 diesel-fired emergency generators (P001-P115: 114 identical
    data-hall gensets in three groups of 38 + one HUBGEN) and 36 non-contact cooling
    towers (P120-P155, three groups of 12) — the three-group emission-unit structure
    corroborates a three-data-hall campus. Federally enforceable synthetic-minor caps
    keep the facility under major-source NSR: NOx 235.62 tpy and CO 96.06 tpy (rolling
    12-month, combined), demonstrated by per-engine hours-at-load recordkeeping (Table
    1/2 rates). Engines are Tier 2 CI ICE > 560 kW under 40 CFR 60 Subpart IIII (0.20
    g PM, 6.4 g NOx+NMHC, 3.5 g CO per kW-hr), fueled on ULSD or HVO renewable diesel
    (<= 15 ppm S). Cooling towers limited to ~4.0 tpy PM10 / ~1.4 tpy PM2.5 combined
    via 0.001% drift eliminators. The facility is MAJOR for Title V (operating-permit
    app due within 12 months of commencing operation). Engine make/model/size is withheld
    as trade secret (Comments 16/19), so the per-engine ekW (and thus the ~313 MW backup
    figure) is NOT in this document — it derives from the draft public notice. Document
    includes a 64-item Response to Comments (public notice 2026-02-09; hearing 2026-03-11;
    comment period closed 2026-03-25). Supersedes the 2025-12-10 DRAFT of the same permit
    (eDocs 3987141/3987144). Source eDocument 4132514 (Ohio EPA eDocument/eBusiness;
    Facility 0302022054).'
