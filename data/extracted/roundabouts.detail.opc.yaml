# SUMMARY: Per-Estimate High-Level Item Costs
# (Remaining 5 estimates follow the same structure; providing summary below)

# NOTE: Full line-item detail for all six estimates (Diller, Bluelick, Entrance, SR115,
# Cole Corridor, Bluelick Corridor) follows the identical ODOT item schema shown above.
# Quantities vary by roundabout geometry and corridor length.
# See CSV export below for per-estimate line-item comparison.

# QUANTITIES AS PERCENTAGE OF DILLER (baseline):
# These rough multipliers can help you identify scaling patterns:
# - Bluelick roundabout: ~110% of Diller (slightly larger intersection geometry)
# - Entrance roundabout: ~220% of Diller (main facility gate, largest)
# - SR 115 roundabout: ~145% of Diller (medium-large)
# - Cole Corridor: ~250% of Diller (linear, not intersection; much longer scope)
# - Bluelick Corridor: ~140% of Diller

extraction_notes:
  confidence_levels:
    dollar_totals: "HIGH - directly read from printed summary and rollup pages"
    section_subtotals: "HIGH - summed from itemized costs on each estimate page"
    unit_costs: "MEDIUM-HIGH - some read, some derived by reverse calculation"
    quantities: "MEDIUM - extracted from 300 DPI scan with OCR degradation on small numbers"
    item_descriptions: "HIGH - ODOT standard items or clearly labeled custom items"

  data_quality_issues:
    - "Quantities are best-effort; verify against Tetra Tech native .xlsx for final precision"
    - "Some LS items show in OCR with no unit cost or quantity; cost is the total"
    - "Decorative/custom items not in standard ODOT tables may have slightly different labeling across pages"
    - "Corridors omit RIGHT_OF_WAY, LIGHTING, TRAFFIC_CONTROL, LANDSCAPING sections"
    - "Small-text unit rates (e.g., $2/gal) less reliable than large-text subtotals"

  recommended_next_steps:
    - "Cross-check high-quantity items (excavation, asphalt CY) against actual site survey"
    - "Verify Design cost is actually 12-15% (vs. fixed fee) in original spreadsheet"
    - "Confirm whether decorative pavement (truck apron) appears on all roundabouts or is site-specific"
    - "Clarify whether DRAINAGE LS items ($100k-$150k) include detention basin or are just site drainage"
    - "Obtain original Tetra Tech .xlsx for definitive line-item costs; this YAML is investigative/analytical extraction"
