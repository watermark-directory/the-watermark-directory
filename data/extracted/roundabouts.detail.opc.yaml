# Tetra Tech "Opinion of Probable Project Cost" — Project BOSC
# DETAILED LINE-ITEM EXTRACTION
# Source: Pages 319-328, scanned at 300 DPI, read by visual inspection
# Confidence: High on dollar totals; Medium-High on unit quantities (OCR degradation);
#           High on item descriptions and unit types.
#
# METHODOLOGY:
# - Examined high-resolution cost-column crops ($UnitAmount, $TotalAmount) for each page
# - Cross-referenced description/item-number column for item coding
# - Quantities derived by reverse calculation (TotalAmount / UnitAmount = Qty) where reliable
# - Flagged uncertain quantities with ~estimate notation
#
# STRUCTURE: under each page's `line_items`, every section is a mapping with
#   `items:` (a list of line items) and `subtotal:` (the section roll-up), plus
#   an optional `note:`. Sections with illegible line detail carry `items: []`.
#
# CAVEATS FOR ANALYSIS:
# 1. Some unit quantities are approximations from 300 DPI scan text
# 2. Lump-sum (LS) items have no unit price; total is the estimating value
# 3. Quantities vary per roundabout/corridor based on geometry/scope
# 4. All estimates include ODOT standard items; non-standard items labeled as "custom"
# 5. Design/Survey/Construction Admin are typically LS items with no detailed breakdown

estimate_template:
  estimator: "Tetra Tech (RJS, checked AMD)"
  date: "2025-07-11"
  basis: "CONCEPTUAL"
  contingency_rate: 0.25  # 25% applied to construction subtotal
  sections:
    - ROADWAY
    - EROSION_CONTROL
    - DRAINAGE
    - PAVEMENT
    - WATER_WORK
    - LIGHTING
    - TRAFFIC_CONTROL
    - LANDSCAPING
    - RIGHT_OF_WAY  # (roundabouts only; corridors omit this section)
    - INCIDENTALS
    - DESIGN_SURVEY_INSPECTION

