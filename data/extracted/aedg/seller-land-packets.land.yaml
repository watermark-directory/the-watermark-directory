relevance:
  tags: [verified, aedg, land-assembly, bistrozzi, google, cauv, records-withholding, public-ledger]
  note: >-
    The land-assembly chain for the BOSC/Google campus: PAAC optioned Neff (eff 2023-06-21), Brenneman
    ($1,000 option, 81.03 ac), and Miller/Pike Run ($2,000 option, 54.94 ac), then assigned all options
    to Bistrozzi LLC on 2025-07-03 (Vorys/Tangeman), closing 2025-07-14; the Neighbors 5.0-ac parcel
    was a direct $600,000 PAAC purchase. The purchase prices are withheld -- recorded deeds say only
    "valuable consideration" and the DTE-100 transfer-tax forms were produced with the dollar fields
    blank -- making the assembly cost opaque. CAUV recoupment applies (farmland conversion; Elida LSD).
