key_finding_prices_withheld:
  finding: >-
    The actual purchase prices for the assembled data-center land are NOT disclosed in the production.
    The recorded deeds (data/extracted/recorder/) state only "valuable consideration paid", and the
    DTE-100 Real Property Conveyance Fee Statements for the Brenneman and Neff transfers -- the forms
    that legally report the sale price for the transfer tax -- were produced with the consideration /
    total-value dollar fields (lines 7a-7i) left BLANK. The only land price disclosed anywhere is the
    Neighbors parcel: $600,000 for 5.0 acres (a direct PAAC purchase contract, not an option).
  significance: >-
    The land-assembly cost (a core input to "what was paid to assemble the ~350-acre campus, and by
    whom") is opaque even in the transfer-tax records that are supposed to carry it. A blank DTE-100 on
    a recorded conveyance is itself a records-completeness flag. Combined with the $600K/5ac Neighbors
    benchmark (~$120K/ac, 2x appraisal), the missing prices are a quantifiable gap for the public-ledger
    thread. [the blank-form + Neighbors figures are document; the assembly-cost framing is inference.]

cauv_recoupment:
  finding: >-
    The Brenneman and Neff parcels were enrolled in Current Agricultural Use Valuation (CAUV, R.C.
    5713.31) -- the farmland property-tax break. Their DTE-102 forms acknowledge that converting the
    land out of agricultural use triggers a CAUV RECOUPMENT charge (up to 3 years of tax savings,
    R.C. 5713.30/.34). Taxing district: Elida L.S.D.
  significance: "A one-time tax clawback on conversion, and a marker that productive farmland is being taken out of CAUV for the data center -- relevant to the tax/public-ledger and land-use story."

