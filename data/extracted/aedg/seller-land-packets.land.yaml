mechanism: >-
  The Port Authority of Allen County (PAAC) took 3-year Option-to-Purchase agreements (with a 3-year
  renewal) on the farm parcels in 2023-2024, then on 2025-07-03 ASSIGNED all the options to Bistrozzi
  LLC (Vorys / Jill S. Tangeman drove the assignments + exercises); Bistrozzi exercised and closed
  ~2025-07-14. Each option's Section 21 gave PAAC "the unrestricted right to assign its rights ... to
  a nominee of its choice." The Neighbors parcel was instead a direct 2025-10 PAAC purchase contract,
  later assigned to Bistrozzi (2025-10/2026-02).

