relevance:
  tags: [verified, regulatory, npdes, construction-stormwater, general-permit, swp3, framework, bosc-site, ohc000006]
  note: >-
    Statewide framework instrument (not a site record). Read from the PDF text layer. Establishes the
    1-acre / larger-common-plan applicability threshold, the 21-day-prior NOI + approval-letter-effective
    coverage rule, and the SWP3 content requirements — the standard the BOSC site disturbance sequence is
    read against. The dispositive site coverage record remains owed (#143).
