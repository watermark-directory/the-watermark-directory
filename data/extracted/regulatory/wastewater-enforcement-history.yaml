relevance:
  tags: [verified, regulatory, wastewater, consent-decree, sso, capacity, shawnee-ii, american-bath, ratepayer]
  note: >-
    The enforcement + capacity backstory for the BOSC-1A receiving plants. A 1996 federal CWA consent
    decree (3:96 CV 7134, DJ 90-5-1-1-3841) for effluent violations at American Bath (2PH00007) and
    Shawnee No.2 (2PK00002); a 2005 OEPA agreement to end sanitary-sewer bypassing by 2015; and a
    $35M sanitary CIP (doubling rates) that rebuilt American No.2 (2PH00006) 0.80 -> 1.2 MGD. The data
    center's sanitary load lands on this system. Connects PRR items 8/9/14/15 to the TMDL/assimilative
    threads.
