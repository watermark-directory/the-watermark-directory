new_findings:
  - id: data-center-flows-treatment-evaluation
    finding: >
      Res #679-24 / MS Consultants Task Order #5 (2024-08-22, $47,600) is a "WWTP Data Center Flows
      Treatment Evaluation" — a primary engineering instrument evaluating the data center's BLOWDOWN
      flow stream (demands, flows over a typical year, water-quality parameters) for storage + treatment
      at the American Bath WWTP, with the County to gather data from "the developer and data center
      manufacturer."
    implication: >
      First primary record linking the campus cooling system to the sanitary system. Anchors
      watermark.hydrology.cooling + sanitary-economics on a document (not a secondhand citation). The
      "developer and data center manufacturer" language corroborates the code-named-shell pattern.
  - id: bosc-cmar-procurement-chain-complete
    finding: >
      The full BOSC PS/forcemain delivery chain is now in primary records: #469-25 (engineering ad,
      2025-06-12, est. $20.25M) -> #137-26 (CMAR RFQ, 2026-02-26, est. $29.83M) -> #378-26 (Peterson
      Construction CMAR pre-construction contract, 2026-05-14, $108k) + the ConsensusDocs 500 CM-at-Risk
      agreement.
    implication: Closes issue #134. The CMAR is Peterson Construction; ms consultants is the design professional.
  - id: construction-cost-escalation
    finding: The BOSC PS/forcemain construction-cost estimate rose from $20,250,000 (2025-06 engineering ad) to $29,834,256 (2026-02 CMAR RFQ) — a ~47% increase in ~8 months.
    implication: Worth flagging in any public-ROI / cost-benefit analysis (ties to the withheld item 4).
  - id: forcemain-routing
    finding: >
      BOSC PS routes via a 10-inch forcemain to the American Bath WWTP (splitting to 8-inch onward) AND
      a parallel 16-inch forcemain to the City of Lima's existing 78-inch gravity sewer at Woodward Ave
      & Grand Ave (~20,100 LF + ~17,900 LF).
    implication: The campus discharges into TWO receiving systems (American Bath WWTP + the Lima interceptor) — relevant to the cooling/sanitary load split and Lima's capacity.
  - id: res-135-136-two-distinct-wpclf-loans
    finding: >
      #135-26 and #136-26 (both 2026-02-26) are TWO DISTINCT WPCLF principal-forgiveness loans, confirmed
      by reading pages 79-82 of the source: #135-26 = ON BEHALF OF THE HAMLET OF HUME, grant form $2,000,000
      (p82); #136-26 = ON BEHALF OF AN UNINCORPORATED AREA OF SHAWNEE TOWNSHIP (Shawnee Rd / Hume Rd /
      "Shawnee Oaks subdivision"), grant form $1,600,000 (p80).
    corrects: >
      The prior minutes-README/ledger note recorded a SINGLE "$2M Hamlet of Hume" loan for #135/#136 and
      labeled #113-26/#136-26 "forcemain feasibility." Both are wrong: there are two loans ($2.0M Hume +
      $1.6M Shawnee Twp/Oaks), and #113-26 is the Shawnee Oaks ENGINEERING contract (Access, $161k).
    implication: Fix bosc-resolution-ledger.yaml (#136-26 thread/figure; add the $1.6M loan) + commissioners/minutes/README.md reconciliation_note.

