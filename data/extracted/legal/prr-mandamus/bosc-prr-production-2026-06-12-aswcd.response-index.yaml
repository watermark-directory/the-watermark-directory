new_findings:
  - id: npdes-coverage-number-tbd
    finding: >
      All four ESC inspections — 2025-12-08, 2026-02-18, 2026-03-18, 2026-06-05 — carry "Site NPDES Number: TBD."
      A ~335-ac parcel (~195 ac developed) has been mass-graded since clearing/grubbing in Dec 2025 with the
      NPDES Construction General Permit COVERAGE NUMBER unrecorded on the jurisdiction's own inspection forms.
    implication: >
      Directly responsive to item 1; the SWCD does not produce the coverage number and points to Ohio EPA. The
      "TBD" persisting 6+ months into earth-disturbance is itself the finding for the NPDES-coverage question.
      (NPDES responsibility is assigned to Turner Construction per the permit application, p53.)
  - id: wetland-mitigated-vs-no-records
    finding: >
      Item 3 ("wetland determinations") answered "no responsive records," yet the produced inspections record
      "the existing wetland was mitigated" (2025-12-08 onward). The on-site isolated wetland's 401 permit
      (DSW401251760W, issued 2025-08-12) and its 2025-08-18 Mitigation Purchase Agreement are already in-corpus.
    implication: A produced record contains the very determination the "no records" answer disclaims. Corroborates the wetland-mitigation timeline (permits/3788677, /3796349).
  - id: farm-tile-impact-vs-no-records
    finding: >
      Item 4 ("tile drainage affected by construction") answered "no responsive records," yet the 2026-06-05
      inspection documents an EAST FARM-TILE diversion swale failure ("tile no longer exposed... bubbling up
      through soil") with a labeled photo ("East farm tile bypass").
    implication: A produced record squarely on item 4's subject. Worth flagging in any completeness/adequacy challenge.
  - id: sixty-inch-storm-outfall
    finding: >
      The "60-inch storm outfall" / "60-inch bypass storm sewer" is the load-bearing element of the BOSC
      stormwater design — explicitly carried unchanged through Mass-Ex Revision 1 (2026-03/04) and under
      construction by Feb 2026 (site job trailer off Cole Street).
    implication: Engineering keystone for the stormwater/discharge axis; ties to the plans/lma1a storm inventory and the "creek west of site" discharge pathway.
  - id: site-cost-and-footprint-figures
    finding: >
      Discrete primary figures: SW1225 mass-grading stormwater permit fee $5,800 (check #637852, 2025-11-10);
      water install/inspection ROM $69,103 (4/02 utilities kickoff); applicant-declared footprint ~335-ac parcel,
      ~195 ac developed, ~115 ac permanently impervious, 9-month mass-grading window.
    implication: Feeds the cost/impervious-area inputs for the hydrology + ROI axes; ~115 ac of new impervious is a stormwater-runoff driver.
  - id: plan-review-and-governance-handoff
    finding: >
      The BOSC stormwater plan review was run by the ALLEN COUNTY ENGINEER (Joe Gearing) — mass-grading approval
      2025-11-14, SW1225 permit, HUB plan approved-for-stamping 2026-05-27 — with EMH&T as engineer of record and
      Mannik & Smith Group as third-party storm reviewer. Private-development plan review transfers to the SWCD
      on 2026-07-01 (Gearing email, 2026-06-03).
    implication: Clarifies the AHJ map for the site (County Engineer for stormwater/drainage; SWCD for ESC inspection; Sanitary Eng for sewer) and dates a jurisdictional handoff.
  - id: aswcd-new-withholding-ground
    finding: >
      The SWCD withholds the plan sets on a ground NOT used in the County's productions: R.C. 149.433
      INFRASTRUCTURE RECORDS (25-yr exemption + statutory "express statement" the plans carry) AND R.C. 1333.61
      TRADE SECRETS (via 149.43(A)(1)(v); State ex rel. Besser v. OSU). The asserted secret is "Construction and
      water and wastewater usage for a data center." It also redacted plan-share links + one plan-text quote.
    implication: A THIRD agency adds a NEW statutory layer to the withholding architecture — distinct from the County's NDA/CRA/RDA/4582.58 stack. Folded into records-withholding-map.yaml as layer 7.

