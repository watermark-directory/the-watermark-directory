# ----------------------------------------------------------------------------------------------
# What the ordered record raises — framed as open questions, not conclusions.
# ----------------------------------------------------------------------------------------------
observations:
  - id: npdes-cgp-coverage-timing
    question: >
      Was earth disturbance (>1 ac) underway before NPDES Construction General Permit coverage
      attached to the site?
    governing_standard: >
      OHC000006 (now in-corpus, regulatory/ohc000006-construction-stormwater-gp.yaml): a complete NOI
      is due "at least 21 days … prior to the commencement of construction activity" (Part I.F.1.a) and
      "Coverage under this permit is not effective until an approval letter granting coverage from the
      director of Ohio EPA is received by the applicant" (Part I.F.2). This is the standard the dates
      below are measured against — the framework is now primary-source, the site's coverage record is not.
    records_show: >
      Active clearing/grubbing + mass grading documented from 2025-12-08, continuing through at
      least 2026-06-05, on a 195-ac developed footprint — well above the 1-ac CGP threshold —
      while every produced ESC inspection records the Site NPDES Number as "TBD."
    resolved: >
      RESOLVED 2026-06-16 — coverage PRECEDED disturbance. The campus coverage record was acquired
      (permits/lma1a-npdes-cgp-coverage.epa.yaml): Turner's initial coverage 2GC08468*AG was approved
      effective 2025-11-10 (NOI submitted 2025-10-29), ~4 weeks BEFORE the earliest documented earth
      disturbance (2025-12-08). The persistent "Site NPDES Number: TBD" on the ASWCD ESC forms was
      therefore a RECORDING gap on the SWCD's own forms, not an absence of coverage — confirming the
      alternative hypothesis flagged here ("Turner may have held coverage the SWCD simply did not
      record"). Analysis, not a legal conclusion. Closes #143 (record acquired) and #154 (timing
      determined).
    caveat: >
      The NOI's declared "Proposed Project Start Date" (2025-11-03) is 7 days before the *AG effective
      date (2025-11-10), but is a planning date on the form, not evidence of actual commencement; no
      disturbance is documented before 2025-12-08. The *AG→*BG suffix mechanics are inferred (the
      continuous-coverage-from-2025-11-10 finding does not depend on them).

  - id: level2-401-after-clearing
    question: >
      Was the broader (Level-2) wetland fill authorized before the fill area was disturbed?
    records_show: >
      The Level-2 isolated-wetland application (DSW401252260W) was received 2025-12-09 — the day
      after the first inspection records clearing/grubbing underway — and was declared INCOMPLETE
      by Ohio EPA on 2025-12-23 for want of a practicable-alternatives analysis covering the whole
      ~358-ac site.
    distinction: >
      The narrow Category-1 isolated wetlands (0.33 ac) WERE authorized first (DSW401251760W,
      2025-08-12, before disturbance). The Level-2 (larger) authorization is the one that was
      still pending/incomplete as disturbance proceeded.
    why_open: >
      The corpus does not contain a subsequent grant (or denial) of DSW401252260W; its disposition
      after the 2025-12-23 incompleteness letter is unknown from these records.

  - id: bosc-outfall-separate-swp3
    question: >
      Does the corridor's NPDES construction-stormwater coverage appear anywhere on the record,
      even though every campus mass-grading inspection reads "TBD"?
    records_show: >
      Yes, for an adjacent piece. A separate SWP3 (Ohio EPA eDoc 4091286, prepared 2026-04-16 by
      WSP USA for operator George J. Igel & Co.) covers the Beery Rd./Cole St. roundabout AND the
      BOSC Storm Outfall — the project's storm-discharge channel, which it carries to Pike Run
      (tributary of the Ottawa). That SWP3 lists a Notice of Intent and an Ohio EPA CGP
      Authorization Email/Approval Letter as its Appendix A — i.e., for the outfall/roundabout the
      coverage process is documented.
    distinction: >
      A DIFFERENT project, permittee, and timeframe from the campus mass-grading: a 5.71-ac
      roundabout+outfall build (Igel/WSP; construction 2026-05-15 → 2027-12-31), not the 195-ac
      campus mass-grading (Turner/EMH&T, SW1225, disturbance from 2025-12-08). It does NOT resolve
      the campus "TBD" — but it shows the same corridor's stormwater coverage documented elsewhere,
      which makes the campus inspections' persistent "TBD" more conspicuous.
    resolved: >
      RESOLVED 2026-06-16. The outfall SWP3's Appendix A was acquired as companion eDoc 4091289 — the
      Ohio EPA NPDES CGP Approval Letter (April 22, 2026, signed Director John Logue): the NOI was
      APPROVED and the site's Ohio EPA Facility Permit Number is 2GC08747*AG, effective 2026-04-22,
      expiring 2028-04-22, under OHC000006. (Note the per-site number format is 2GC..*AG, not an OHC..
      number.) For the OUTFALL, coverage thus attached 2026-04-22 — BEFORE the SWP3's 2026-05-15
      estimated start — i.e. coverage preceded disturbance, the clean contrast to the campus thread.
    bearing_on_campus: >
      This does NOT resolve the campus #143: it is a different project, permittee (Igel/WSP, not
      Turner), and footprint (5.71 ac roundabout+outfall, not the 195-ac campus mass-grading). But it
      removes the parallel outfall gap and sharpens the campus contrast — the corridor's CGP process is
      now documented end-to-end for the outfall (NOI → approval → number), while the campus inspections
      still read "TBD."
    source: data/extracted/plans/4091286.engineering.yaml (record.npdes_coverage; companion plans/4091289.pdf)

