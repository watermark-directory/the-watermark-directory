# Project BOSC site (4110 N. Cole St.) — permit / approval vs earth-disturbance SEQUENCE.
#
# A cross-document reconstruction (#150) of the ORDER in which the site's environmental
# authorizations attached relative to the documented start of earth disturbance, assembled
# from records already in the corpus: the two Ohio EPA isolated-wetland (401) permits, the
# Allen County stormwater permit (SW1225), and the Allen SWCD ESC site-inspection series.
#
# This is an ORDERING ANALYSIS, not a legal conclusion. It does not assert a violation; it
# lays the sequence the records support and flags the one record that would resolve the open
# question (the NPDES Construction General Permit coverage, which the SWCD left "TBD" and
# pointed to Ohio EPA — being pursued separately under issue #143). Every date is
# content-verified from the cited extraction (text layer / OCR / produced form), never from a
# filename or outside knowledge.
meta:
  subject: Project BOSC — site permit/approval vs earth-disturbance sequence (4110 N. Cole St.)
  matter: BOSC public-records / mandamus corpus (Project BOSC; OEPA Facility ID 0302022054)
  scope: >
    The 4110 N. Cole St. data-center campus earth-disturbance authorizations only. The BOSC-1A
    pump-station / forcemain corridor (permits 4074527/4074529/4074551) is a separate alignment
    with its own sequence and is out of scope here.
  disclaimer: >
    Analysis, not legal advice or a determination. The sequence is what the produced records
    show; it does not establish that any authorization was or was not required, obtained, or
    timely. The dispositive NPDES Construction General Permit coverage record is NOT in the
    corpus (see gap below) — the timing question stays open pending that record (#143).
  relator: Cory Parent
  npdes_cgp_context: >
    Ohio's NPDES Construction General Permit (the current generation is OHC000006, now committed at
    regulatory/ohc000006-construction-stormwater-gp.yaml) requires the permittee to obtain coverage
    BEFORE commencing earth-disturbing activity on a site of 1 or more acres (or part of a larger
    common plan that will), and to keep a SWP3. In the permit's own words: a complete NOI must be
    submitted "at least 21 days … prior to the commencement of construction activity" (Part I.F.1.a),
    and "Coverage under this permit is not effective until an approval letter granting coverage from
    the director of Ohio EPA is received by the applicant" (Part I.F.2). The site's per-site coverage
    number is the "Ohio EPA Facility Permit Number" (format 2GC…*AG, NOT an OHC… number — OHC000006 is
    the general permit). The SW1225 permit application assigns "NPDES Program = Turner Construction"
    (p53), so Turner is the CGP permittee of record, and every produced ESC inspection lists "Site
    NPDES Number: TBD." RESOLVED 2026-06-16: the campus coverage record was acquired (permits/
    lma1a-npdes-cgp-coverage.epa.yaml) — Turner's initial coverage 2GC08468*AG was effective
    2025-11-10, ~4 weeks BEFORE the earliest documented disturbance (2025-12-08); the "TBD" was a
    recording gap on the SWCD forms, not an absence of coverage.
  prepared_from:
    - data/extracted/permits/3788677.epa.yaml                                   # 401 Level-1 grant
    - data/extracted/permits/3796349.epa.yaml                                   # 401 mitigation agreement
    - data/extracted/permits/3949585.epa.yaml                                   # 401 Level-2 (incomplete)
    - data/extracted/legal/prr-mandamus/bosc-prr-production-2026-06-12-aswcd.response-index.yaml
    - data/extracted/regulatory/ohc000006-construction-stormwater-gp.yaml       # the governing statewide CGP (the standard; not the site record)
    - data/extracted/permits/lma1a-npdes-cgp-coverage.epa.yaml                   # the campus coverage record 2GC08468*AG (eff. 2025-11-10) — resolves #143/#154

