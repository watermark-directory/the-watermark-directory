# ----------------------------------------------------------------------------
# Synthesis vs Parent's thesis
# ----------------------------------------------------------------------------
synthesis:
  headline: >-
    Round two's decisive moment is Sen. Blackshear's point-blank 'is there a reason NOT to
    publicly disclose electric and water usage?' The panel splits — Microsoft 'no reason'
    and will report, Google already reports, AWS reports water site-by-site but guards
    energy as 'cloud market share' it 'competes on vigorously,' Meta argues for aggregation.
    This fractures the categorical confidentiality premise underlying R.C. 9.66(D): the
    information is voluntarily published by some, and where withheld the asserted interest is
    COMMERCIAL market share, not the economic-development public interest the statute invokes.
  reinforces_am_session: >-
    Confirms and sharpens the AM findings: cost-causation is real but conditional (operators
    themselves want a separate SSO to insulate residential ratepayers); the
    'who is the customer' / government-demand thread persists (Claggett's 'deals among
    various government agencies'); and the industry again endorses a statutory FLOOR
    ('holding those new players to that same standard') — i.e., Parent's 'make it statutory,
    not voluntary.'
  legal_hook: >-
    For mandamus-analysis.md §II: the strongest record evidence that §9.66(D)'s confidentiality
    is neither industry-universal nor public-interest-grounded. Microsoft's 'no reason' and the
    'market share' rationale are quotable against a categorical-confidentiality defense, and
    support a narrowing/aggregation-based disclosure standard (Meta's own suggested middle path).
  cross_refs:
    - "data/extracted/legal/bosc-committee-hearing-2026-06-04-am.index.yaml (round one + panel testimony)"
    - "docs/legal/mandamus-analysis.md §II (R.C. 9.66(D) confidentiality)"
    - "docs/legal/proponent-analysis.md (mismatched-basis pattern)"
    - "data/extracted/legal/bosc-committee-testimony-2026-06-04 (Parent's own slot)"
    - "docs/HYDROLOGY.md (PFAS / source-water / cooling-water basis)"
