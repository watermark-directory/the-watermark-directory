# Allen County, OH government-entity website vendor audit — structured findings.
# Derived from the original records at data/documents/legal/allen-county-web-audit/.
# Confidence: credited = explicit in-page vendor credit and/or outbound vendor link;
#             inferred = template/version/registrar match to a credited cluster, no in-page credit;
#             platform_only = self-service builder or CMS detected, no human vendor named;
#             undetermined = JS-rendered or blocked at capture time.
