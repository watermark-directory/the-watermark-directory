  relevance: >
    BOSC PRR Ex. C seeks the county website CMS audit logs. This audit identifies the
    private third parties that build/host these governments' sites and CMS — i.e. who
    would actually hold those logs. Headline: the county's own offices and the AEDG
    (the entity steering the Google/BOSC project) share one vendor, CorpComm Group.

