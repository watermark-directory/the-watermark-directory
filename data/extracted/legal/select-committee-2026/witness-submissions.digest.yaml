relevance:
  tags: [verified, legal, select-committee, witnesses, google, qts, ratepayer, water, dcte, records-withholding, transparency]
  note: >-
    The 16 witness submissions to Ohio's 2026 data-center committee. Most BOSC-material: Google's own
    testimony omits Lima/BOSC; ELPC/OCC/PUCO give concrete ratepayer figures contradicting Google's
    rate-relief claim; ODNR admits no visibility into data-center water use; ODOD describes the DCTE
    sales-tax exemption (a second subsidy layer beyond the CRA); Ohio EPA confirms the route-to-POTW
    wastewater pattern; and a governance expert urges repealing ORC 9.66(D) -- the exact shield behind
    the withheld cost-benefit analysis.
