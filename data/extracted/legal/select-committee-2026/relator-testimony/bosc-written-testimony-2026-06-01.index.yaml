significance: >-
  This is the substantive core of the 'present the draft as evidence to the General Assembly'
  move: a disciplined, heavily-sourced interested-party submission that (1) names the BOSC NDA/
  shell-company gap as the motivating case, (2) reframes the defense-cloud angle as an economic-
  disclosure problem (who can even USE the facility) rather than a speculation, holding the same
  'site-level end use is unknown' discipline as the corpus, and (3) lands six concrete legislative
  asks. Notably advances beyond the oral testimony: the two-state fiscal contrast (Ohio vs
  Loudoun), the refresh-cycle critique of the exemption forecast, the HB 646 capture risk, and the
  FERC/state-line note on HB 706. The companion Google Slides deck is a candidate next ingest.
