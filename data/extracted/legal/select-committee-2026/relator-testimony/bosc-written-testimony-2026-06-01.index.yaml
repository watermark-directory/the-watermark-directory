# ----------------------------------------------------------------------------
# Argument structure
# ----------------------------------------------------------------------------
sections:
  - title: "The Gap — Ohio subsidizes developers it cannot name"
    summary: >-
      Abatements (Dept. of Development), public water/power, and infrastructure go to entities
      that never disclose ultimate ownership. The BOSC case stated directly: ~$500M, ~15 months
      under an NDA with a Delaware shell, developer identity withheld, and key engineering specs
      redacted from a public environmental permit as proprietary.
    ties: ["mandamus-analysis.md (the records fight)", "watch-items: Bistrozzi Addition LLC / Tilted Gate"]
  - title: "A common definition the whole code can use"
    summary: >-
      Only RC definition of 'computer data center' is R.C. 122.175(A)(2) — program-bound, no
      size/load/function. Proposed constitutional amendment uses a >25 MW peak/aggregate-load
      threshold. Recommends one capacity-based, technology-neutral, ownership-aggregating
      definition across the Code.
  - title: "Why disclosure is the foundational fix"
    summary: >-
      Cost causation (PUCO tariff, HB 706), OCC anti-speculation forecasting, and PJM's
      NDA-with-identity-sharing reform all depend on knowing who the load is. The 25 MW threshold
      can't aggregate to a common owner without disclosure; hyperscale routes around per-parcel
      ceilings by design. 'Cloaked in secrecy.'
  - title: "What ownership hides — the government-cloud premium"
    summary: >-
      GovCloud runs ~20-30% above commercial; FedRAMP + DoD impact-level ladder (IL4/5/6).
      IL5/IL6 require dedicated, isolated infra + U.S.-persons staffing -> NOT the shared capacity
      an abatement forecast assumes. Ohio's defense footprint (Wright-Patterson) makes high-auth
      hosting realistic. Such a facility may be capacity the community is STRUCTURALLY BARRED from
      using, and a sealed enclave that exports value rather than seeding a local cluster.
    ties: ["mandamus-analysis.md §III-IV [DEF] strand", "bosc-committee-testimony-2026-06-04 (oral defense Q&A)"]
  - title: "Two-state contrast (the stakes)"
    summary: >-
      Ohio: 13 deals through Sep 2024 (~$5.1B) -> 356 jobs, $31.6M payroll vs ~$281.9M revenue
      loss (~$1M/job w/ local sales tax). Virginia/Loudoun (taxes equipment as business personal
      property): ~38% of general fund from data centers on ~4% of parcels, residential rate cut
      every year for a decade. No Ohio community benefits agreement yet exists.
  - title: "Technical caution — the sales-tax exemption forecast"
    summary: >-
      Exempted equipment refreshes on a 3-5 yr cycle; AI-class per-rack cost up an order of
      magnitude. Foregone-revenue figures scored on initial fit-out will understate the realized
      exemption substantially and compound each refresh.
    ties: ["mandamus-analysis.md §II (122.175 tax-exemption pause)"]
  - title: "Where the bills get it right / stop short"
    summary: >-
      HB 706 (Thomas/Rader) strongest vehicle; HB 646 study commission risks capture without
      independent facility-level data; EFIA addresses speculation. All incomplete without
      disclosure. HB 706 should stay on the state side of the FERC/Federal Power Act line.
  - title: "Disclosure and Standing"
    summary: >-
      Witness filed local zoning comment before these facts were public; discloses a recently
      incorporated govtech startup whose thesis is transparency. Recommendations rest on
      public-record structural facts.

# ----------------------------------------------------------------------------
# The six recommendations
# ----------------------------------------------------------------------------
recommendations:
  - "1. Condition any public incentive/abatement/infrastructure commitment on disclosure of the developer's beneficial owner + controlling parent (cf. Corporate Transparency Act; Ohio procurement). The foundational fix."
  - "2. Advance HB 706 anchored in retail service terms, aligned with FERC's PJM framework."
  - "3. Use HB 646's commission to close the water-visibility gap (Director Mertz) — facility-level water metering/reporting — and a load standard on local grid headroom, not a flat MW figure."
  - "4. Require near-real-time facility-level WUE/PUE reporting + disclosure of federal authorization posture (FedRAMP/DoD impact level, government-hosted equipment/capacity)."
  - "5. Build on forecasting/anti-speculation work so investment rests on demonstrated need; protect existing consumers from stranded costs."
  - "6. Treat each abatement as a negotiation: condition incentives on enforceable community benefits (employment, resource use, local investment)."

