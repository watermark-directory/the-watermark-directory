# "Who manages the county website" is not one vendor but THREE distinct layers — the original audit
# (vendor-only framing) answered "CorpComm" and missed the host and the in-house hands. Corrected model:
web_custody_model:
  layers:
    - layer: developer / theme
      who: CorpComm Group, Inc. (DISSOLVED 2023-06-05)
      evidence: footer credits + bespoke child themes (ALC, twentyseventeenCCG, AEDG2021) on main/Recorder/Engineer/Clerk/AEDG
    - layer: host / managed IT
      who: AhelioTech Services, Ltd. (Powell, OH; Eric Hullibarger)
      evidence: "commissioners minutes — 'transition of county website to AhelioTech for hosting' (2023-10-24, ACC-M102423.pdf:5); 9-12 hits across the 2024 minutes"
    - layer: in-house admin / author
      who: Brian Mauk, Allen County IT Director
      evidence: >
        WordPress author 'b_mauk' on allencountyohauditor.com (title "Brian Mauk – Allen County Auditor",
        byline "by Brian Mauk"). Confirmed as IT Director by Res #447-23 (M061523.pdf, 2023-06-15).
      caveat: >
        Authorship CONFIRMED on the Auditor site only; not yet confirmed on commissioners.allencountyohio.com
        (the exact site item 16 concerns) — its author archive did not resolve. In-house access proven at the
        office level, strongly suggestive but not proven for the Commissioners' own host.
  infra_note: >
    Entire county cluster is one GoDaddy hosting account (160.153.0.x /24): main .4, clerk .61,
    commissioners .225, auditor .236 — all WordPress 6.9.4. AhelioTech manages; GoDaddy is the underlying host.
  item_16_implication: >
    The county's "Commissioners do not manage the county website... no access" (PRR item 16) sits against a
    web of locally-connected hands — a dissolved Lima developer, a Columbus host with Allen-County family roots,
    and a county IT Director who is a WordPress author within the same install. CMS audit logs are reachable
    via the host (AhelioTech) and would name the in-house user (b_mauk). Finding of fact; legal effect not asserted.

