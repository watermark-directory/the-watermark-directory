# ----------------------------------------------------------------------------
# Why this matters to the BOSC record
# ----------------------------------------------------------------------------
significance: >-
  This is the §II "present the draft as evidence to the General Assembly" move,
  executed. The witness testified as a fact witness to §9.66(D)'s effect (records
  withheld behind a 15-month NDA on a $500M subsidized project) and reports that the
  mandamus petition is what broke the logjam — validating both the leverage thesis
  (§I.5) and the legislative-venue thesis (§II). It also puts the defense nexus
  (Google IL-6, JSMC, EO 14265) and the compute-as-water/power framing (mirroring the
  hydrology model) directly into the legislative record. The six written
  recommendations + sources referenced at 05:08 are a separate submission not in this
  recording — a candidate next record to index.
