# Status vocabulary: produced | no_records | pending_9.66_review | deferred_to_sanitary_eng
request_response:
  category_A: Project BOSC — confidentiality & commitment instruments (items 1-4)
  category_B: County wastewater works — engineering & design (items 5-15)
  category_C: County website change records (items 16-17)
  category_D: Address & engineer of record (items 18-19)
  items:
    - n: 1
      category: A
      ask: NDA / confidentiality / common-interest agreements w/ AEDG, Bistrozzi, Google, Vorys/Ziance re American Twp facility.
      status: produced
      produced: Mutual NDA (NDA.pdf) — Resolution #417-25 (2025-05-27); executed 2025-07-01 (Ziance) / Winegardner.
      significance: Direct confirmation of NDA-by-default pattern (memo §III). Pre-2026-03-20 record -> §1.48 wedge applies; county produced it.
    - n: 2
      category: A
      ask: County <-> DoD / federal contractor / General Dynamics (GDIT, GDLS) comms re American Twp facility or the American Twp–Shawnee Twp corridor.
      status: no_records
      county_position: >
        No records concerning the "Bistrozzi/Google Data center facility." County narrows "American Township
        facility" to that facility and asks relator to define "American Township-Shawnee Township corridor"
        and supply a date range. Deemed fulfilled.
      significance: Defense nexus returns nothing; memo's "open question" framing (§IV) holds — county asserts none.
    - n: 3
      category: A
      ask: CRA / Enterprise Zone / TIF / tax-abatement instruments + school-district notice/compensation agreement.
      status: produced
      produced: >
        CRA Agreement w/ Bistrozzi LLC (CRA.pdf, Res #548-25, 2025-07-10; executed 2025-08-26) + school-district
        notices to Elida Local & Apollo Career Center (Res #494-25, 2025-06-24; AEDG letters 2025-06-25).
      key_terms: "15-yr / 75% real-property abatement; ~$500M capital; ~50 jobs / ~$4M payroll by 2030; M-2 zoning; Conditional Use Permit 2025-02-04; CRA #003-99003-396."
      significance: Deal locked mid-2025; school districts affected = Elida Local + Apollo (JVSD).
    - n: 4
      category: A
      ask: Cost-benefit analysis / projected tax-revenue impact / public ROI evaluation + underlying inputs/assumptions.
      status: pending_9.66_review
      county_position: '"being reviewed by our legal counsel for compliance with R.C. 149.43 and R.C. 9.66" — NOT fulfilled.'
      significance: >
        §9.66(D) invoked on the county's OWN work product — the weakest categorical fit (memo §II) — and the
        records are 2025-dated, so §1.48 also applies. The single best record-by-record contest point.
    - n: "5-15"
      category: B
      ask: BOSC pump-station/forcemain RFP + bids + permits (SWPTI-260294/DSW-6756), Shawnee II Phase 2 12.6 MGD capacity, MS Consultants forcemain feasibility (Res #113-26 / #136-26), 1996 CWA consent decree, Cridersville WWTP, etc.
      status: deferred_to_sanitary_eng
      county_position: Forwarded to the Allen County Sanitary Engineering Department; "better suited for the Sanitary Engineer." NOT fulfilled.
      significance: Wastewater universe split to a different custodian; production not yet made. Watch future Friday batches.
    - n: 16
      category: C
      ask: County website CMS audit trail / edit history / version-control for the Sanitary Engineering project pages, 2025-01-01 to date (RIMS GS Series ID acceptable).
      status: no_records
      county_position: '"the Commissioners do not manage the county website and therefore do not have access to the information this request seeks… no records to provide." Deemed fulfilled.'
      significance: >
        Direct tie to data/extracted/legal/allen-county-web-vendor-audit — the county disclaims control of its
        own site; CMS audit logs would be held by CorpComm Group, Inc. (the vendor). Confirms the third-party-
        processor custody theory. NB the county simultaneously cites commissioners.allencountyohio.com
        agendas/minutes/legal-notices as a records source — disclaims managing the site yet points to it.
    - n: 17
      category: C
      ask: Internal comms re addition/modification/removal of any reference to BOSC, the pump-station RFP, Bistrozzi LLC, or Shawnee II figures on any county-managed website.
      status: no_records
      county_position: No responsive records. Deemed fulfilled.
    - n: 18
      category: D
      ask: Records indexed to 4110 N. Cole Street, Lima (the permitted Bistrozzi/Project BOSC address) not captured by entity/project name above.
      status: no_records
      county_position: No responsive records, "as it pertains to the categories fulfilled by this request" (partial).
    - n: 19
      category: D
      ask: County <-> EMH&T (engineer of record on Bistrozzi's OEPA permit filings) comms.
      status: no_records
      county_position: Commissioners have no responsive records; will supplement from Sanitary Engineering if any. Deemed fulfilled (as to Commissioners).

new_findings:
  - id: two-bistrozzi-entities
    finding: >
      "Bistrozzi LLC" (Delaware; Vorys/Ziance) — the NDA (2025-05-27) and CRA (2025-07-10) counterparty — is a
      DISTINCT entity from "Bistrozzi Addition LLC" (registered 2026-04-06, per memo §III/timeline). The County
      executed a 75% CRA abatement and an NDA with "Bistrozzi LLC" in mid-2025 — ~9 months BEFORE the public
      Google confirmation (2026-03-16) and ~10 months before "Bistrozzi Addition LLC" was even registered.
    implication: Sharpens the opacity narrative (memo §III) and predates the timeline materially. The memo currently names only "Bistrozzi Addition LLC" — distinguish the two.
  - id: cms-custody-confirmed
    finding: County (item 16) expressly disclaims managing its own website; CMS audit logs therefore sit with the web vendor (CorpComm Group, Inc.).
    implication: Confirms the records-custody point in data/extracted/legal/allen-county-web-vendor-audit.{md,yaml}. A §149.43 request for CMS logs implicates the third-party processor.
  - id: nine-66-distinction
    finding: CRA §19 "R.C. 9.66 Covenants" is the pre-existing clawback/false-statement covenant, NOT the new §9.66(D) confidentiality provision (HB 184). Only item 4's response invokes the (D) shield.
    implication: Keep §9.66 (covenant) and §9.66(D) (confidentiality) distinct in any filing.

