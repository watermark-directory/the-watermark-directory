records_relevance: >-
  Quantifies the wastewater thread the County deferred on PRR items 5-15. The BOSC sanitary load
  (0.13 MGD @ 83 F interim) lands on a system already strained (Elm St 45->250), is funded by a $32M
  developer pump station + a ~$3.125M capital permit fee, and is bundled with a revenue-capture reroute
  of Cridersville/Shawnee Oaks to the County's Shawnee plant ($1M 0% loan; ends a $102k/yr outflow).
  Feeds the ledger ratepayer/benefit analysis and the TMDL thermal/assimilative thread.

