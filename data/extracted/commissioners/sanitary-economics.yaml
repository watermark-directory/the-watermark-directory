kind: sanitary_economics
subject: Allen County sanitary-system economics around the BOSC load — fees, reroutes, capacity, and revenue capture

provenance:
  source_index: data/extracted/commissioners/minutes/
  source_raw: data/documents/commissioners/meetings/
  method: "Windowed extraction over the committed OCR text layer (meeting-pages.parquet); figures transcribed from the minutes' discussion items and cross-checked across meetings."
  content_verified: '2026-06-08'
  caveat: >-
    Dollar and flow figures appear in DISCUSSION items (not formal resolutions) and are OCR-approximate
    -- verify against the source PDF before quoting. The "$" OCR is generally reliable; decimals less so.

thesis: >-
  The County is restructuring its sanitary economics around the data-center load with a clear
  revenue-capture logic: BOSC pays a large capital permit fee (~$3.125M) and funds the new pump
  station/force main (~$32M from the developer), while the County simultaneously moves to REROUTE the
  Cridersville-treated Shawnee Oaks flow onto its OWN Shawnee plant (ending a ~$102k/yr payment OUT to
  Cridersville) and to RAISE capital-permit/tap fees. The same Shawnee II / Hamlet of Hume buildout
  that serves BOSC also lets the County recapture treatment revenue it currently exports. [figures are
  document (discussion items); the "revenue-capture strategy" framing is inference.]

bosc_sanitary_load:                   # the data center's wastewater, in the County's own words
  interim_flow: >-
    "discussion on being able to handle 0.13 MGD at 83 degrees Fahrenheit -- temporary until PS and FM
    are complete" (2025-07-29, M072925.pdf). The interim BOSC sanitary discharge is ~0.13 MGD at 83 F
    -- a warm (cooling-derived) flow. The County is "trying to develop a solution to treat the flow,
    or at least a portion of it, on a permanent basis to keep as much revenue as possible with the County."
  flow_mgd: 0.13
  flow_temp_f: 83
  permanent_works: "BOSC Pump Station + Force Main (PS+FM) -- engineering #469-25 -> MS Consultants #713-25 -> CMAR RFQ #137-26/#138-26 (see bosc-resolution-ledger.yaml)."
  developer_pump_station_usd: 32000000    # "$32M will be put toward the pump station from the developer" (2026-02-17)
  capital_permit_fee_usd: 3125000         # "current capital permit fee is estimated to be $3.125M" for BOSC (2026-02-17, M021726.pdf)
  note: >-
    The 0.13 MGD @ 83 F interim figure is the first explicit BOSC sanitary-flow number in the corpus;
    the warm temperature is relevant to the thermal/assimilative thread on the Ottawa (low-flow)
    receiving water. The permanent capacity is larger (the PS+FM and Shawnee II Phase 2 sizing).
  treatment_evaluation: >-
    Res #679-24 (2024-08-22) / MS Consultants Task Order #5 ($47,600) -- a "WWTP Data Center Flows
    Treatment Evaluation": evaluate the campus BLOWDOWN flow stream (demands, flows, water-quality
    parameters) and recommend storage + treatment at the American Bath WWTP, with the County to gather
    data from "the developer and data center manufacturer." The engineering instrument behind the
    "develop a solution to treat the flow / keep revenue with the County" discussion above.
    [primary record: bosc-prr-production-2026-06-12 p1-4]
  forcemain_construction_estimate_usd: 29834256   # CMAR RFQ #137-26 (2026-02-26); was $20.25M in the 2025-06 ad (#469-25)

cridersville_shawnee_oaks_reroute:    # the County stops paying OUT and captures the revenue
  current_cost: >-
    "the Village of Cridersville charges the county $102,000.00 a year for wastewater treatment for
    flow from the Shawnee Oaks area" for ~233 customers; "treatment fees from Cridersville for 233 have
    been increasing significantly over the last decade" (2025-05-08, M050825.pdf). Earlier the year's
    bill was put at ~$101,000 (2025-03-04).
  county_response:
    - "Prosecutor's Office reviewing the current Cridersville agreement to see if termination is possible (2025-05-29)."
    - "Install a County lift station + force main to reroute Shawnee Oaks flow to the Shawnee WWTP; the Sanitary Engineering Dept would then collect the revenue and 'break even within six (6) to seven (7) years' (2025-03-04)."
    - "Res #113-26 (2026-02-19): $161,000 contract w/ Garmann/Miller (Access Engineering) for the Shawnee Oaks Sewer System ENGINEERING (PO #18640 'Shawnee Oaks Reroute Engineering') — reroutes Cridersville/Shawnee Oaks flow to Shawnee II. [confirmed primary: batch-2 PRR]"
    - "Res #137-26 (2026-02-26): $1,000,000 at 0% interest; project adds 200+ homes to the system AND moves current Cridersville customers to Shawnee."
  reroute_also_frees_capacity: "Rerouting Shawnee Oaks to Shawnee WWTP 'would also allow room for an additional 35-40 homes' (2025-05-29)."

capacity_strain:                      # the system the BOSC load lands on
  elm_street: "The Elm Street-area pump station 'was originally designed for 45 homes and is currently serving nearly 250' (2025-05-29) -- a >5x overload; 'looking into possible solutions.'"
  shawnee_ii_phase_2: "The Shawnee II Phase 2 POTW expansion (2023-2024 buildout; see bosc-2023-backfill.yaml) is the receiving-plant capacity behind the reroute + the BOSC load."
  indianbrook_ps: "Indianbrook Pump Station upgrades ~$600,000 (2026-02-17); AEP 3-phase power conversion (Res #974-25)."

fees_and_rates:                       # the ratepayer levers
  capital_permit_fees: >-
    Sanitary Engineer Brad Niemeyer "would like to look into increasing said [Capital Permit] fees"
    (2025-05-29); recurring "general discussion on Capital Permit Fees" through 2025-2026. The BOSC
    capital permit fee (~$3.125M) is the headline application of this fee.
  billing: >-
    The system "currently operates on flat rate billing"; the Sanitary Engineer discussed "different
    billing mechanisms for different zones" and "possible rate increases for customers with low
    pressure systems," wanting "to implement rate increases in 2025" (2024-02-06).

