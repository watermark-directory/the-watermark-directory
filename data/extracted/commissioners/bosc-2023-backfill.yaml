  hamlet_of_hume_sewer_origin:        # the corridor sewer project's start, in 2023 (OCR'd minutes)
    note: "Confirms the Hamlet of Hume sewer project began in 2023 (Access Engineering), predating BOSC; later WPCLF $2M #135-26/#136-26 (see closed-deliberation-and-corridor.yaml)."
    list:
      - {date: '2023-02-14', file: M021423.pdf, event: "Update on Hamlet of Hume; issues near McClain Rd; planning to study the area."}
      - {date: '2023-05-09', file: M050923.pdf, event: "Hamlet of Hume design contract approved by the Commissioners; preliminary engineering started by Access Engineering."}
