kind: backfill_audit
subject: Allen County Commissioners — 2023 minutes/agenda backfill (the pre-BOSC baseline year)

provenance:
  source_raw: data/documents/commissioners/meetings/   # the 299-file 2023 backfill (153 agendas + 146 minutes); connector-sourced since the #133 cutover
  scope: "All 299 calendar-2023 documents (filename [AM]MMDDYY ending '23'), which the parquet index does NOT cover (index = 2024-2026 only)."
  method: >-
    Agendas (153 A* files) carry a native text layer -- read directly with pypdf. Minutes (146 M* files)
    are image-only scans -- OCR'd ad-hoc with pdftoppm (200 DPI) + tesseract for this mining pass
    (145/146 produced text; M121123-Special.pdf produced none -- blank/short scan). The OCR was used
    only to SEARCH the 2023 minutes; it is NOT committed and does NOT update the meeting-pages parquet.
  content_verified: '2026-06-07'
  caveat: >-
    Ad-hoc OCR is approximate and uncommitted; the authoritative re-index (folding 2023 into the
    parquet bundle) remains the external pipeline task noted in
    data/extracted/commissioners/minutes/README.md. Resolution numbers/titles here are from the
    native-text AGENDAS (high-confidence); minutes were searched, not transcribed.

headline_finding: >-
  THE COUNTY'S COMPLETE 2023 RECORD IS SILENT ON THE DATA CENTER. Across all 153 agendas (native text)
  and 145/146 OCR'd minutes, there are ZERO references to "data center", Microsoft, Nadella, Bistrozzi,
  Project BOSC, hyperscale, or Google, and ZERO economic-development executive sessions under ORC
  121.22(G)(8). The data-center project does not enter the Commissioners' public record until 2024
  (Microsoft/Perry Township) and 2025 (BOSC/American Township) -- see bosc-resolution-ledger.yaml. The
  silence is consistent with the project being held off the public record in 2023 (the PAAC codename
  era began mid-2023 per paac-board-minutes.minutes.yaml). [the absence is verified by search; the
  "deliberately held off-record" reading is inference.]

negative_controls:                    # terms checked that did NOT yield project content
  data_center: 0
  microsoft: 0
  nadella: 0
  bistrozzi: 0
  project_bosc: 0
  google: 0
  general_dynamics: 0
  econdev_executive_session_G8: 0
  amazon_note: >-
    "Amazon" appears in 6 minutes but ALL are mundane retail/IT: Amazon gift cards for a Garner Program
    test (M033023); purchases of "miscellaneous IT items from Amazon" for Juvenile / Common Pleas Court
    (M042023/M042723/M052323); and Res #350-23 registering an "Amazon Business Account for the
    Commissioner's Office" (M050423). NONE relate to the Amazon warehouse / VTRE / data-center corridor.
    [confirms the warehouse project is also absent from the 2023 county record.]

precursor_threads:                    # what the 2023 record DOES contain -- the infrastructure/econ-dev BOSC later plugs into
  shawnee_ii_phase_2:                 # the receiving-plant expansion, active a year+ before BOSC
    resolutions:
      - {res: '202-23', date: '2023-03-16', title: "Warrant of transfer from Sanitary Engineering Surplus Fund 5035 to the Shawnee II Capital Fund 5401."}
      - {res: '228-23', date: '2023-03-23', title: "Memorandum of Understanding with the Allen County Sanitary Engineering Department re allocation of monies for the Shawnee II Phase 2 POTW Improvement Project."}
      - {res: '383-23', date: '2023-05-18', title: "Warrant of transfer from the General Fund 1001 to the Shawnee II Fund 5401."}
      - {res: '395-23', date: '2023-05-18', title: "Grant easement to American Electric Power for electrical services for the Phase II Shawnee II Wastewater Treatment Plant."}
    also: "Early bid packages (UV; generator/transfer switch) and Peterson Construction GMP work referenced on Jan-Feb 2023 agendas; year-end engineering design services (Dec 2023). Continues into 2024 as #220-24/#251-24/#739-24 (see bosc-resolution-ledger.yaml)."
  aedg_econdev_contract:              # the annual machinery, now traced to 2023
    note: "Same annual AEDG contract renewed as #45-24 (2024) and #62-25 (2025). The AEDG econ-dev/CRA apparatus that fronts the developer shield is a standing County arrangement, not a BOSC creation."
    list:
      - {res: '42-23', date: '2023-01-19', title: "Renew a contract with Allen Economic Development Group for Enterprise Zone / Community Reinvestment Area Technical Assistance (2023)."}
      - {res: '43-23', date: '2023-01-19', title: "Renew an agreement with the Allen Economic Development Group for the provision of Economic Development Services."}
  routine_abatement_pipeline:         # context: BOSC/Nutrien are part of a steady abatement stream
    - {res: '74-23', date: '2023-01-26', title: "Enter into an Enterprise Zone Agreement (AEDG tax-abatement)."}
    - {res: '171-23', date: '2023-03-07', title: "Assignment of an Enterprise Zone Agreement with 571 Commerce Holdings, LLC."}
    - {res: '354-23', date: '2023-05-04', title: "Enter into an Enterprise Zone Agreement with Rode's Meats, LLC."}
    - {res: '600-23', date: '2023-08-24', title: "Enter into an Enterprise Zone Agreement with Diamond Manufacturing of Bluffton, LTD."}
  emht_and_stormwater:
    note: "EMH&T (later the BOSC engineer-of-record, Res #994-25 / PRR item 19) was already on County contract in 2023 for stormwater."
    list:
      - {res: '254-23', date: '2023-03-28', title: "MOU with the Allen Soil and Water Conservation District for the MS4 Stormwater Program."}
      - {res: '326-23', date: '2023-04-25', title: "Contract with EMH&T, Inc. for professional services to update the Allen County Stormwater Management Plan."}
