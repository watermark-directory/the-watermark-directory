  biosolids:
    - {res: '882-23', date: '2023-12-05', title: "Enter into a Process Wastewater Biosolids Agreement with the City of Lima."}

records_relevance: >-
  Two uses. (1) Timeline/transparency: the 2023 silence sets the baseline -- the data center is wholly
  absent from the County's 2023 public record, so the project's 2023 groundwork (PAAC codename era)
  happened outside the Commissioners' minutes. (2) Wastewater thread: the Shawnee II Phase 2 expansion
  and the Hamlet of Hume sewer were already underway in 2023, which matters to the PRR items 5-15
  capacity questions -- the receiving system was being built out before the data-center load was
  publicly acknowledged.

