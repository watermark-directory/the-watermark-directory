records_relevance: >-
  Concrete rebuttal to the PRR production posture: items 5-15 (BOSC pump-station/forcemain RFP+bids,
  Shawnee II Phase 2, MS Consultants forcemain feasibility) were DEFERRED to the Sanitary Engineer,
  but the authorizing resolutions are in the Commissioners' own minutes -- #469-25 (advertise for PE),
  #575-25 (Sanitary Sewer Developer Agreement), #713-25 (MS Consultants contract), #975-25 (first
  amendment), #137-26/#138-26 (CMAR RFQ + evaluation committee). The CRA/NDA/RDA legislative acts are
  #417-25 / #548-25 / #588-25. The producing body legislated all of it.

reconciliation_note: >-
  DISCREPANCY to resolve, flagged not guessed: the completeness audit and the minutes README
  characterize "#113-26 / #136-26" as "the forcemain-feasibility items the county pushed to the
  Sanitary Engineer" (M021926.pdf:3 / M022626.pdf:3). The VERBATIM resolution titles read differently
  -- #113-26 (2026-02-19) = "Garman/Miller & Associates ... for the Shawnee Oaks Sewer System
  Project"; #135-26 / #136-26 (2026-02-26) = the WPCLF $2M principal-forgiveness loan "on behalf of
  the Hamlet of Hume." The BOSC pump-station/forcemain procurement is #137-26 / #138-26 (CMAR RFQ +
  evaluation committee, 2026-02-26), and a separate $161,000 Cridersville-reroute feasibility study
  was approved 2026-02-19. The earlier label appears to conflate adjacent sanitary items; the
  verbatim titles above are authoritative. Re-verify all three against the source PDFs and correct the
  audit/README characterization.

