kind: resolution_ledger
subject: Allen County Commissioners — Project BOSC resolution ledger + event timeline (from the Board's own minutes)

provenance:
  source_index: data/extracted/commissioners/minutes/   # parquet OCR bundle (meeting-pages, 2,283 pp, 2024-2026)
  source_raw: data/documents/commissioners/meetings/  # the authoritative PDFs (filename = meeting date, [AM]MMDDYY); connector-sourced since the #133 cutover
  method: >-
    Windowed keyword extraction over the committed OCR text layer (meeting-pages.parquet), then each
    resolution number + title transcribed and cross-checked against the agenda (A*) and minutes (M*)
    pages. Resolution NUMBERS, TITLES, dates, and movers are high-confidence (they appear verbatim in
    the formal resolution lists). Narrative discussion text is OCR-approximate.
  content_verified: '2026-06-07'
  caveat: >-
    The OCR text layer is machine-extracted and approximate (e.g. "Commissures" for "Commissioners").
    Dollar figures in DISCUSSION items are OCR-approximate — verify against the source PDF before
    quoting in a filing. Coverage is 2024-2026 only (the 2023 raw backfill is not yet OCR'd/indexed).

thesis: >-
  The Allen County Board of Commissioners' OWN public minutes contain the full legislative spine of
  Project BOSC -- the NDA, the CRA, the Sanitary Sewer Developer Agreement and its amendment, the
  Roadway Development Agreement, the BOSC Fund, and the pump-station/forcemain engineering and CMAR
  procurement. This matters directly to the records case: the county DEFERRED PRR items 5-15 (the
  wastewater-works universe) to the Sanitary Engineer and WITHHELD item 4 (cost-benefit), yet the
  authorizing resolutions for exactly those works sit in the producing body's own record. The
  legislative acts plainly exist where the request was directed. [resolutions are document; the
  "production gap" framing cross-refs the completeness audit.]

codename_phases:                      # the project's evolution in the County record
  microsoft_perry_township_2024: >-
    Through 2024 the data-center discussions concern a MICROSOFT project in PERRY TOWNSHIP (codename
    Nadella elsewhere in the corpus): "Microsoft Data Center Project in Perry Township -- sewer lines
    will need to be extended" (2024-08-20, M082024); Norm Capps asks the Commissioners' encouragement
    for "a proposed Microsoft Data Center" (2024-08-22, M082224); "60% of the jobs in the data center
    would be skilled trades" + Microsoft/Apollo partnerships (2024-09-12, M091224).
  bosc_american_township_2025: >-
    By Feb 2025 the live project is a CRA "for a potential Data Center in American Township" (2025-02-14
    special) -- i.e. Project BOSC / Bistrozzi LLC. (Microsoft/Nadella was terminated 2024-10-24 per the
    PAAC minutes.) NOTE: the County's INTERNAL IT "Data Center" (Brian Mauk / Keith Cheney / Nutanix /
    backup storage) is a DIFFERENT thing and is excluded from this ledger.

