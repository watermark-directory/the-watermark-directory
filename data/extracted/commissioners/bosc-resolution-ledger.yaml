executive_sessions:
  cra_econdev_session: >-
    2025-05-27 (M052725): the Board entered EXECUTIVE SESSION "for consideration of a CRA Agreement
    pursuant to ORC 121.22(G)(8)" -- the open-meetings ECONOMIC-DEVELOPMENT confidentiality exemption
    (trade secrets / to consider confidential economic-development info). Present: Cindy Leis (AEDG),
    John Stock, John Willamowski Jr. This is the OPEN-MEETINGS analog of the records-withholding stack
    (NDA §6 / CRA §22 / RDA §9.13 / R.C. 4582.58): the Board deliberated the BOSC CRA non-publicly.
    [verified from the minutes; the "analog of the records shield" framing is inference.]
  routine_note: >-
    The large majority of the Board's executive sessions in the OCR'd range are routine personnel /
    compensation matters under ORC 121.22(G)(1) (or (G)(2) property acquisition); the (G)(8) CRA
    session is the BOSC-specific one. (A full executive-session log across 269 hits is a follow-up.)

