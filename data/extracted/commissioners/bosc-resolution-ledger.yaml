records_relevance: >-
  Concrete rebuttal to the PRR production posture: items 5-15 (BOSC pump-station/forcemain RFP+bids,
  Shawnee II Phase 2, MS Consultants forcemain feasibility) were DEFERRED to the Sanitary Engineer,
  but the authorizing resolutions are in the Commissioners' own minutes -- #469-25 (advertise for PE),
  #575-25 (Sanitary Sewer Developer Agreement), #713-25 (MS Consultants contract), #975-25 (first
  amendment), #137-26/#138-26 (CMAR RFQ + evaluation committee). The CRA/NDA/RDA legislative acts are
  #417-25 / #548-25 / #588-25. The producing body legislated all of it.

reconciliation_note: >-
  RESOLVED 2026-06-12 by the batch-2 PRR production (bosc-prr-production-2026-06-12), whose primary
  records (read from the source PDF) settle the #113/#135/#136 question the audit + minutes README had
  flagged: #113-26 (2026-02-19) = Garmann/Miller dba ACCESS ENGINEERING contract for the Shawnee Oaks
  Sewer System ($161,000; PO #18640 "C-Shawnee Oaks Reroute Engineering") -- engineering, NOT a
  "forcemain feasibility" study. #135-26 (2026-02-26) = WPCLF principal-forgiveness loan, Hamlet of
  Hume, $2.0M (grant form). #136-26 (2026-02-26) = WPCLF principal-forgiveness loan, unincorporated
  Shawnee Township / "Shawnee Oaks subdivision," $1.6M (grant form) -- a SEPARATE loan, not a duplicate
  of the Hume $2M. The BOSC pump-station/forcemain procurement is #469-25 (advertise) -> #137-26/#138-26
  (CMAR RFQ + committee) -> #378-26 (Peterson CMAR pre-construction contract, 2026-05-14). The earlier
  "forcemain feasibility" / "$2M Hume" labels conflated adjacent sanitary items and are superseded.

