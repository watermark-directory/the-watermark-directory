# Canonical-name / date map for malformed minutes & agenda filenames.
#
# The source binaries — connector-sourced under data/documents/commissioners/meetings/
# since the 2026-06-12 cutover (formerly minutes/raw/; see civic_cutover) — keep their
# AS-RECEIVED names (chain of custody). This map records the corpus-canonical
# name (M<MMDDYY>.pdf minutes / A<MMDDYY>.pdf agenda, "-Special" for special
# sessions) and the meeting date VERIFIED from each file's own content, so the
# indexer can pair them without renaming evidence. Produced by the corpus
# completeness audit — see ../../legal/corpus-completeness-audit.md §3.
#
# evidence: native_text = PDF text layer (pdftotext) | ocr = tesseract on a 200dpi
#           render of page 1 | filename = unambiguous date already in the name.
meta:
  subject: Commissioners minutes/agenda filename normalization
  generated_at: 2026-06-06
  source_dir: data/documents/commissioners/meetings/   # retired from minutes/raw/ in the 2026-06-12 cutover — see civic_cutover below
  method: per-file date read from page 1 (text layer or OCR); collisions checked
  policy: non-destructive — originals kept in place; this is an alias layer only

aliases:
