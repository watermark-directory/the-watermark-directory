# Project Zodiac (Hatchworks LLC) data-center site — footprint record for Fort Wayne, IN.
# UNLIKE Lima's footprint (which is document-transcribed developed/impervious acreages from the
# stormwater permit), Fort Wayne's stormwater permit is not yet in the corpus, so the boundary
# here is the RECORDED OWNERSHIP ASSEMBLAGE (the 11 Hatchworks parcels), not a surveyed developed
# footprint. parcel_acres is the GIS-measured planar area; developed/impervious stay [open] pending
# the deed/rezoning/stormwater-permit extraction (#360/#362). Source tags: reference = committed
# GIS reference dataset; connector = a live public-data read; assumption = a stated modeling input.
site: 7510 Zodiac Way, Fort Wayne, IN 46816 (Allen County); IDEM AI ID 133680
operator: Hatchworks LLC (Google "Project Zodiac" data center)
boundary_basis: >-
  Recorded ownership assemblage — the 11 parcels owned by Hatchworks LLC, committed as
  data/reference/fort-wayne/bosc-parcels.geojson (catalogued bosc-parcels). NOT a surveyed
  earth-disturbance boundary; see watermark.sites _FORT_WAYNE and the IDEM air-permit extraction
  (data/extracted/idem/fort-wayne/47378f.idem.yaml).

parcel_acres:
  value: 855.8
  unit: acre
  source: reference
  citation: >-
    bosc-parcels.geojson — UTM-16N (EPSG:32616) planar area of the 11 recorded Hatchworks LLC
    parcels (watermark.hydrology.geo.parcels_total_acres). CORROBORATED: the IDEM §401 WQC001454 states
    an "858-acre parcel" (wqc001454.idem.yaml) — within ~0.3% of the GIS measure. Larger than the
    publicly-reported ~700-ac campus because the anchor deed spans multiple section-halves.
  confidence: high

building_footprint_acres:
  value: 46
  unit: acre
  source: document
  citation: >-
    [inference] Measured from the §401 WQC001454 site plan (notice_20260403_401_wqc001454.pdf,
    Exhibit 7 "Alternative B", scale 1"=200'): the seven data-center building footprints (DC-01..07
    + hubs, the tan building fill), color-segmented and scaled. The firmest sub-component of the
    impervious estimate; ~46 ac ≈ 2.0M sf over 7 buildings (~290k sf each, typical hyperscale).
  confidence: medium

impervious_acres:
  value: 226
  unit: acre
  source: document
  citation: >-
    [inference] Measured from §401 WQC001454 Exhibit 7 (Alternative B, 1"=200'): building footprints
    (~46 ac, tan fill) + paved/developed surface (~180 ac gray fill: parking, internal drives,
    equipment yards) = ~226 ac impervious on the 858-ac permit area (~26%, vs Lima's 34%; lower
    because the FW parcel preserves extensive wetland/buffer area). Raster color-segmentation +
    scale-bar calibration; method uncertainty ~±15-20%. SUPERSEDES the prior [open]; confirm against
    the SWPPP / IDEM Rule 5 construction stormwater permit (the regulatory figure) when available.
  confidence: medium

developed_acres:
  value: null
  source: assumption
  citation: >-
    [open] The total disturbed/developed area is >= impervious_acres (~226 ac) — it adds the
    detention basins and graded-pervious areas (not separately tabulated on Exhibit 7). The precise
    developed/disturbed figure needs the SWPPP / Rule 5 construction stormwater permit.
  confidence: null

dominant_hsg:
  value: C
  source: connector
  citation: >-
    [verified] USDA NRCS SSURGO via Soil Data Access (SDA), 30-point grid sample over
    bosc-parcels.geojson (watermark.hydrology.connectors.ssurgo.dominant_hsg, 2026-06-27): 50% C/D +
    50% D (Pewamo/Blount-Glynwood lake-plain clays). hydrologic soil group C on the drained basis
    (= profile dominant_hsg "C", confirmed); undrained these soils are group D — high runoff,
    material for the stormwater model.
  confidence: high

receiving_water: >-
  [verified] Adams Ditch (an unnamed tributary of Doctor Ditch), Maumee watershed HUC 04100005 —
  the campus stormwater receptor, per the IDEM §401 Water Quality Certification WQC001454
  (data/extracted/idem/fort-wayne/wqc001454.idem.yaml; Phase 3 permanently relocates 3,415 lf of
  Adams Ditch). DISTINCT from the Fort Wayne WWTP receptor (IN0032191 → Baldwin Ditch → Maumee mainstem).

notes:
  - 'The air permit (47378f.idem.yaml) discloses 34 diesel emergency generators (26.4 MMBTU/hr each) — the data-hall backup fleet — but no developed-area or impervious-area figure; those require the stormwater permit.'
  - 'A surveyed developed footprint (and the developed/impervious split the Tier-0 stormwater model needs) remains the open dependency; this record commits the boundary + measured acreage + the SSURGO-validated HSG so the HSG onboarding step no longer skips.'
