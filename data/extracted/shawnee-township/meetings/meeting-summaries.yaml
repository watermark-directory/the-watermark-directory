  - datacenter
  summary: At the March 9, 2026 Regular Meeting, Jim Thompson addressed the Shawnee
    Township Board of Trustees regarding the potential of data centers in Shawnee
    Township, the Township Comprehensive Plan, and requested that the Trustees pass
    a resolution imposing a temporary moratorium on data centers in agricultural districts.
    The Trustees declined to act immediately, stating they wished to review the data
    and proposed resolution and have it reviewed by legal counsel. No moratorium resolution
    was passed at this meeting.
  corridor_relevance: The meeting is connected to the data-center corridor project
    because a resident, Jim Thompson, formally addressed the Board requesting a temporary
    moratorium on data centers in agricultural districts in Shawnee Township, prompting
    a discussion that the Trustees tabled pending legal review.
  decisions:
  - Trustee Gross motioned to accept the February 23, 2026 Regular meeting minutes;
    Trustee Recker seconded; passed 3-0.
  - 'Resolution 42-26: Accepted Memorandum of Understanding with Lima Allen County
    Regional Planning Commission for Safe Routes to School; passed 3-0.'
  - 'Resolution 43-26: Authorized Todd Lause to represent Shawnee Township for the
    Safe Routes to School Program at $25.00 per hour effective March 9, 2026; passed
    3-0.'
  - 'Resolution 44-26: Accepted Service Agreement with Clemans Nelson and Associates
    as management consultant effective March 1, 2026; passed 3-0.'
  - 'Resolution 45-26: Authorized hiring of Albert Hughes IV as part-time civilian
    Police Department employee at $20.00 per hour effective March 9, 2026; passed
    3-0.'
  - 'Resolution 46-26: Authorized purchase of a double-sided, full color, 6mm EMC
    CIRRUS sign from New Signs Ohio LLC at a cost of $27,429.00; passed 3-0.'
  - 'Resolution 47-26: Accepted resignation of full-time Police Officer Aaron Baker
    effective March 8, 2026; passed 3-0.'
  - 'Resolution 48-26: Appointed Briley Hillard as acting Police Sergeant effective
    March 8, 2026; passed 3-0.'
  - Motion to pay the bills passed 3-0.
  - Motion to accept reports passed 3-0.
  - Motion to recess into Executive Session to discuss complaints against a public
    employee passed 3-0; no business taken upon reconvening.
  - Motion for adjournment passed 3-0.
  - Trustees declined to immediately pass a moratorium resolution on data centers,
    stating they would review the data and proposed resolution and have it reviewed
    by legal counsel.
