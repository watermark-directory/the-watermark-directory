- date: '2026-04-13'
  kind: other
  filename: 2026-04-13-Miuntes.pdf
  hits:
  - bess
  - datacenter
  summary: At its April 13, 2026 Regular Meeting, the Shawnee Township Board of Trustees
    passed Resolution 65-26, accepting the Shawnee Township Zoning Commission's recommendation
    to implement a moratorium on Data Centers, Battery Energy Storage Systems (BESS),
    and Commercial Renewable Energy Facilities in Shawnee Township. The Board also
    passed Resolutions 66-26 and 67-26 to begin updating the 2009 Shawnee Township
    Comprehensive Plan, appointing a Representative Liaison and entering into a Memorandum
    of Understanding with the Lima Allen County Regional Planning Commission (LACRPC)
    to guide the process.
  corridor_relevance: This meeting directly connects to the data-center corridor project
    through Resolution 65-26, which enacts a moratorium on Data Centers, BESS, and
    Commercial Renewable Energy Facilities in Shawnee Township, as recommended by
    the Shawnee Township Zoning Commission.
