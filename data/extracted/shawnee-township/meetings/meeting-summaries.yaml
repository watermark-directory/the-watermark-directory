- date: '2026-03-23'
  kind: minutes
  filename: 2026-03-23-Minutes.pdf
  hits:
  - datacenter
  - solar
  summary: At the March 23, 2026 Regular Meeting of the Shawnee Township Board of
    Trustees, community member Jim Thompson raised concerns about a potential data
    center in Shawnee Township, referencing secrecy, non-disclosure agreements, and
    comparisons to the Birch Solar experience, and formally requested the Trustees
    confirm or deny any out-of-public-meeting discussions with data center interests.
    Both Trustee Neff and Trustee Recker stated on the record that they have had no
    conversations with anyone regarding data centers in Shawnee Township. Thompson
    advocated for a moratorium on data centers until safeguards are in place, and
    Trustee Neff noted that current zoning regulations require data centers to be
    located in industrial zoning districts. Resolution 52-26 and an associated Presentation
    were removed from the agenda by motion before the meeting proceeded.
  corridor_relevance: This meeting connects to the data-center corridor project through
    a public comment by Jim Thompson explicitly raising concerns about a potential
    large-scale data center in Shawnee Township, referencing community anxieties about
    secrecy and NDAs, and requesting on-the-record denials from the Trustees of any
    private discussions with data center interests.
  decisions:
  - Trustee Recker motioned to remove Resolution 52-26 and the Presentation from the
    agenda; Trustee Neff seconded; passed 2-0.
  - Trustee Recker motioned to accept the agenda as amended; Trustee Neff seconded;
    passed 2-0.
  - Trustee Neff stated on the record that the trustees have not had any discussion
    with any data center.
  - Trustee Recker stated on the record that he has not had any conversations with
    anyone regarding data centers in Shawnee Township.
  - Resolution 49-26 (Promotion of Briley Hillard to Police Sergeant) approved 2-0.
  - Resolution 50-26 (MOU with IAFF Local 2550 Regarding Lateral Transfers) approved
    2-0.
  - Resolution 51-26 (Authorization to Appoint Kris Browning as Fire Department Chaplain)
    approved 2-0.
  - Resolution 53-26 (Authorization to Hire Full-time Firefighter Kevin Rader) approved
    2-0.
  - Resolution 54-26 (Authorization to Hire Full-time Firefighter Brock Profit) failed
    to get a motion.
  - Resolution 55-26 (PPM Language Regarding Flex-time) approved 2-0.
  - Resolution 56-26 (Officer Training Reimbursement Agreement for Albert Hughes IV)
    approved 2-0.
  - Motion to pay the bills passed 2-0.
  - Motion to recess into Executive Session to discuss complaints against a public
    employee passed 2-0.
  - Motion to reconvene the regular meeting passed 2-0.
  - Motion for adjournment passed 2-0.
