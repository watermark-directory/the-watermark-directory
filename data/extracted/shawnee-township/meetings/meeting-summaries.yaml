    Harter (March 17–21, 2026); passed 3-0.'
  - 'Resolution 59-26: Authorized Family Medical Leave for Full-time Firefighter Christie
    Kerby (beginning April 12, 2026); passed 3-0.'
  - 'Resolution 60-26: Authorized purchase of 8 Dell computer systems at a cost of
    $7,264.00 for the Shawnee Township Police Department; passed 3-0.'
  - 'Resolution 61-26: Accepted the MORE grant through OTARMA in the amount of $1,000.00
    for the Shawnee Police Department; passed 3-0.'
  - 'Resolution 62-26: Accepted the 2026 Road Program at an amount not to exceed $60,161.93;
    passed 3-0.'
  - 'Resolution 63-26: Created the position of Assistant Road Superintendent; passed
    3-0.'
  - 'Resolution 64-26: Appointed James (Chris) Jordan as Assistant Road Superintendent
    effective March 8, 2026, with an 8% hourly wage increase; passed 3-0.'
  - 'Resolution 65-26: Accepted the Shawnee Township Zoning Commission''s recommendation
    to implement a moratorium on Data Centers, Battery Energy Storage Systems (BESS),
