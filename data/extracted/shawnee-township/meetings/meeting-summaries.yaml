  - 'Resolution 66-26: Appointed Todd Lause as Representative Liaison for the Shawnee
    Township Comprehensive Plan at $25.00 per hour; passed 3-0.'
  - 'Resolution 67-26: Accepted MOU with Lima Allen County Regional Planning Commission
    (LACRPC) for guidance in creating an updated Comprehensive Plan; passed 3-0.'
  - 'Resolution 68-26: Accepted MOU with Lima Allen County Regional Planning Commission
    (LACRPC) for support as the Metropolitan Planning Organization for Shawnee Township;
