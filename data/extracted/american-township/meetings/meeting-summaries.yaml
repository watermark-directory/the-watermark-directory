  summary: 'American Township Trustees held a regular session at which Zoning Inspector
    Bishop presented a Conditional Use Permit application (Case # BZA2024-12) filed
    on November 14, 2024, by Cindy Leis of AEDG on behalf of Project BOSC (c/o Jill
    Tangeman, Esq., Vorys, Sater, Seymour and Pease LLP), seeking to use 162.5 acres
    off Cole Street for a hyperscale data center complex — including three data center
    units, a main office building, security office, mounding areas, two water basins,
    and an AEP substation — on land owned by Neff Farms LLC and currently zoned M-2
    Manufacturing. Numerous residents raised concerns about transparency, public participation
    rights, noise, flooding, and whether the proposed use is legally compatible with
    the M-2 zoning designation. The Board of Zoning Appeals was scheduled to hold
    a public hearing on December 11, 2024, to discuss and vote on the conditional
    use permit.'
  corridor_relevance: This meeting directly concerns Project BOSC, the codename for
    the hyperscale data center development, as the trustees received, discussed, and
    referred to the Board of Zoning Appeals a Conditional Use Permit application filed
    by Project BOSC c/o Jill Tangeman, Esq. for construction of data centers on 162.5
    acres in American Township.
  decisions:
  - Motion by Trustee Basinger, second by Trustee Mohler to accept the minutes of
    the November 11, 2024 meeting as presented. Roll call, all yes.
  - Motion by Trustee Mohler, second by Trustee Basinger to approve payment of the
    warrants as presented by the Fiscal Officer. Roll call, all yes.
  - Motion by Trustee Mohler, second by Trustee Basinger to cancel the December 30th
    meeting and to set 1/2/25 at 4 pm for the reorganization meeting for the new calendar
    year 2025. Roll call, all yes.
  - Motion by Trustee Mohler, second by Trustee Harmon to adjourn. Roll call, all
    yes.
  - 'Zoning Board of Appeals scheduled to hold a public hearing on 12/11/24 at 7pm
    to discuss and vote on the conditional use permit (Case # BZA2024-12).'
  - Legal Counsel Huffman to look into whether trustees may have a right to vote on
    allowing the conditional use permit to pass or not, and report back to the trustees
    as soon as possible.
