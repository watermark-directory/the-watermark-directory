  summary: At the American Township Trustees regular meeting, multiple residents addressed
    the board during privilege of the floor to voice concerns about a proposed data
    center project, citing issues including noise, flooding, stress impacts, and lack
    of township noise ordinances. Zoning Inspector Bishop provided context on zoning
    regulations and explained that a public Board of Zoning Appeals hearing was scheduled
    for December 11, 2024 at 7pm. Legal Counsel Huffman clarified that the Trustees
    are legally prohibited from attempting to influence the Board of Zoning Appeals
    on the matter.
  corridor_relevance: This meeting connects to the data-center corridor project through
    extensive public comment from neighboring residents opposing a proposed data center,
    and through Zoning Inspector Bishop's explanation of the upcoming Board of Zoning
    Appeals hearing on December 11, 2024 that will address the project's zoning matters.
  decisions:
  - Motion by Trustee Harmon second by Trustee Mohler to approve the minutes of the
    November 25, 2024 meeting as presented. Roll call, all yes.
  - Motion by Trustee Basinger second by Trustee Harmon to approve payment of the
    warrants as presented by the Fiscal Officer. Roll call, all yes.
  - Motion by Trustee Basinger second by Trustee Mohler to accept the reports as presented.
    Roll call, all yes.
  - Motion by Trustee Harmon second by Trustee Mohler to name LACRPC as the Metropolitan
    Planning Organization for American Township for 2025. Roll call, all yes.
  - Motion by Trustee Mohler second by Trustee Basinger to pay the member dues for
    the trustees, fiscal officer, and board members for the upcoming year. Roll call,
    all yes.
  - Motion by Trustee Mohler second by Trustee Harmon to continue to contract for
    the Township's MCO; continue to meet on the 2nd and last Monday of each month
    at 7:30pm; authorize expenditures from Township funds for medical, dental, life,
    cancer, and intensive care insurance for elected officials and full time workers;
    offer cash in lieu of benefits up to 25% of total cost; pay Township officials
    in 12 equal installments on a salary basis; appoint the Fiscal Officer and the
    Chairman to the Audit/Records Commission; pay Township Trustees and Fiscal Officer
    state convention fees and expenses; continue with sick, vacation, and comp time
    policies; appoint the chairman as representative for CDL drug testing program.
    Roll call, all yes.
  - Motion by Trustee Basinger second by Trustee Mohler to renew the bonds for the
    trustees and the fiscal officer through OTARMA. Roll call, all yes.
  - Motion by Trustee Harmon second by Trustee Basinger to accept Ralph Long, Ron
    Patterson and Kevin Weiging as seasonal snow plow operators for 2024-25 at a rate
    of $150/day. Roll call, all yes.
  - Motion by Trustee Basinger second by Trustee Harmon to accept the donation from
    the Lima Eagles for MARCS Radios for ATPD in the amount of $3618.62. Roll call,
    all yes.
  - Motion by Trustee Mohler second by Trustee Harmon to go into executive session
    for employee benefits.
  - Motion by Trustee Mohler second by Trustee [unnamed] to enter an agreement with
    Aetna Health Insurance and Delta Dental through Stolly Insurance Services as the
    Township's Broker for 2025 American Township Health Insurance Providers. Roll
    call, all yes.
  - Motion by Trustee Basinger second by Trustee Harmon to adjourn. Roll call, all
    yes.
