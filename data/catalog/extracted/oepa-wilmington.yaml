notes: All seven Wilmington-area OEPA permits extracted. 1MP00060 is a Land Application
  Management Plan (LAMP) permit for Wilmington Nursery — not a standard discharge permit;
  receiving water is northern/southern swales draining to an agricultural pond (2065 Rombach
  Ave). 1PT00125 (Clinton County Board of Developmental Disabilities) ingested separately
  — initial fetch failed on a stale versioned URL. Receiving water for the NPDES discharge
  permits is Todd Fork into the Little Miami River (National and State Scenic River). Add
  the 1PD00013 fact sheet / draft PN to storage as produced.
