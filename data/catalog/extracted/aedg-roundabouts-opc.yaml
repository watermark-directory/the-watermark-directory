notes: >-
  The reference extraction target — the six Tetra Tech opinion-of-probable-cost (OPC)
  estimates rendered from `data/documents/aedg/PRR-01-bundle.ocr.pdf` by the hybrid
  vision pipeline (OCR hint + 300 DPI render → Tetra Tech `Profile` → forced-tool-use
  vision read → Pydantic `Estimate`). Figures come from the page image, never the garbled
  OCR text layer. `summary` is the assembled summary sheet; `detail` adds per-section line
  items. Static: a fixed public record, regenerable but not refreshed.
