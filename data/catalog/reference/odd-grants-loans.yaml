notes: >-
  33,371 rows; one row per purchase-order distribution line for every ODD grant or loan
  disbursement. Covers budget periods 2010–2026. Filter on SERVICE_LOCATION_DESCR for
  per-county analysis (e.g. 'ALLEN COUNTY' = 522 rows, ~$103.5M). Dominant Allen County
  recipient is West Ohio Community Action Partnership ($41.7M, HEAP/CSBG utility assistance).
  Also covers infrastructure grants to Allen County Port Authority ($7.5M) and the Allen
  County Land Reutilization Corp ($5.5M land bank). See data/reference/odd/README.md.
