notes: >-
  Technical specification for the Ohio connected/autonomous vehicle system, prepared by
  AECOM for DriveOhio (Ohio DOT). Defines Core Services CS-1 through CS-7: Core
  Authorization, Data Distribution, Infrastructure Management, Location and Time, Map
  Management, Object Registration and Discovery, Privacy Protection. CS-3-18 explicitly
  requires horizontal scaling at the data center layer. Connects Ohio's roadway
  infrastructure investment to data center demand as a formal state requirement.
  Deliverable item 15 in the DriveOhio system design package.
