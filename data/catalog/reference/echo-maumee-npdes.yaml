id: echo-maumee-npdes
title: Maumee-basin NPDES discharger inventory (EPA ECHO)
scope: reference
status: reviewed
producer:
  kind: connector
  command: npdes --basin maumee
  connector_ref: bosc.hydrology.connectors.echo
  source: EPA ECHO — cwa_rest_services (CWA v2017-10-13)
  external_url: https://echo.epa.gov/tools/web-services
license: U.S. Government work (public domain)
access_tier: throttled
site_scope: basin-shared
storage:
  - relpath: reference/echo/maumee-wwtp.all-npdes.yaml
    media_type: application/x-yaml
  - relpath: reference/echo/maumee-wwtp.potw.yaml
    media_type: application/x-yaml
  - relpath: reference/echo/maumee-wwtp.huc-counts.yaml
    media_type: application/x-yaml
refresh:
  cadence: quarterly
  ttl_days: 180
provenance: connector
schema_ref: bosc.hydrology.connectors.echo.Facility
tags:
  - npdes
  - cwa
  - maumee
  - wastewater
notes: >-
  Verified inventory of active CWA-permitted dischargers across the Maumee's seven HUC-8
  subbasins (subregion 0410, Western Lake Erie), pulled one subbasin at a time via ECHO
  `p_huc` and deduplicated to one record per facility by FRS Registry ID. Every facility,
  NPDES ID, and value was returned by the ECHO API — nothing is fabricated or inferred;
  `null` is a genuine ECHO null. ECHO throttles at ~300 requests/hour (HTTP 429), hence the
  `throttled` tier. Shared across all Maumee sites. See data/reference/echo/README.md.
