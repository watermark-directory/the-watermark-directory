notes: >-
  Four Ohio Tax Credit Authority meeting minutes covering January 2025 through March 2026.
  Key data-center entries: (1) June 2025 — ark data centers, LLC JCTC terminated with
  company's written consent, no credits issued; Cologix, Inc. added Lambada, Inc. as
  co-grantee. (2) March 2026 — Vantage Data Centers Management Company added Vantage
  Data Centers OH21, LLC and Lancaster Newark Road OH 21, LLC as grantees (FEIN
  85-1505619), locating a Vantage facility in the Fairfield/Licking County corridor.
  Also March 2026: Vertiv Corporation new 10-yr JCTC in Ironton (520 jobs) plus Westerville
  extension. January 2025: Anduril Industries/Arsenal-1 (Pickaway Co.) 30-yr JCTC,
  4,008 jobs, $530M annual payroll — the largest single JCTC term in this batch.
  See data/documents/odd/tca/README.md.
