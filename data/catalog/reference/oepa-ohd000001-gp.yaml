notes: >-
  Ohio's first statewide General NPDES Permit class specifically for data center facilities.
  Permit No. OHD000001. Draft issued October 31, 2025; public hearing December 17, 2025;
  effective date TBD. Covers cooling water (once-through and recirculated), low-volume
  wastewaters (cooling tower blowdown, boiler blowdown, air compressor condensate), and
  stormwater. SIC code 7374. Antidegradation provision D(1)(j) invoked (social/economic
  development carve-out; no alternatives analysis required). Key exclusion: facilities
  within 500 yards upstream of a public water supply intake are ineligible — directly
  relevant to any data center sited near Lima's Ottawa River intake. Three-document set:
  31-page draft permit + 2-page public notice (No. 215991) + 7-page fact sheet. Contact:
  Allison Cycyk, 330-963-1132.
