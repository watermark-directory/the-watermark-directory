id: eia-grid-profile
title: Per-Site Campus Grid Profile — Serving Utility, BA & Load Share (EIA-861/930)
scope: reference
status: reviewed
producer:
  kind: connector
  command: grid
  connector_ref: watermark.grid.utility
  source: U.S. EIA — Form EIA-861 (AEP Ohio retail sales) + Form EIA-930 (PJM hourly demand)
  external_url: https://www.eia.gov/electricity/data/eia861/
license: U.S. Government work (public domain)
access_tier: keyed
site_scope: slug-scoped
storage:
- relpath: reference/eia/grid-profile.yaml
  media_type: application/x-yaml
  lfs: false
- relpath: reference/eia/{site}/grid-profile.yaml
  media_type: application/x-yaml
  lfs: false
refresh:
  cadence: annual
provenance: connector
schema_ref: watermark.grid.model.GridProfile
tags:
- eia
- grid
- electricity
- pjm
- aep-ohio
- indiana-michigan-power
notes: >-
  Per-site (slug-scoped): identifies the active site's serving utility (corpus-grounded + EIA-861
  confirmation) and BA, expressing campus load as a share of the utility retail, BA total, and state
  retail. Denominators + labels are site-derived (Lima = AEP Ohio / Ohio; Fort Wayne = Indiana
  Michigan Power / Indiana). Fort Wayne's load_share is now populated from the IDEM-air-permit power
  basis (#360); a site with no documented facility carries the grid backdrop without a load share.
