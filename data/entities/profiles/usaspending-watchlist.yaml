meta:
  subject: USASpending federal-award watchlist — corridor real-party-in-interest
  description: >-
    Recipients to resolve against the USASpending federal-award API ("who benefits
    from federal dollars" behind the corridor). Each recipient is PINNED by its
    verified USASpending recipient_id + UEI (Unique Entity Identifier); resolution
    fetches the recipient profile by that id and asserts the returned UEI equals the
    pinned one (never a fuzzy match), so the committed reference is litigation-clean.
    The recipient_ids were obtained by exact-name recipient search. Totals are
    all-time prime-award obligations (`year=all`). Regenerate with `bosc usaspending`.
  source: USASpending.gov API (api.usaspending.gov), U.S. Treasury; public domain
