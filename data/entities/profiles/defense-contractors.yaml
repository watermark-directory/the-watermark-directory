# Defense-contractor seed list — a curated entity input (data/entities/profiles/).
#
# Origin: imported from the Periplus (`../gis`) fork at the spin-out point, where
# it seeded a `flag_defense_contractor` anomaly flag over parcel owner names. In
# BOSC it is loaded by `bosc.candidates.load_defense_contractors` and matched,
# case-insensitively, against (a) the corpus entity graph
# (`bosc.pipeline.entities`) and (b) Allen County parcel owner names from the
# `allen_gis` connector. A match LIGHTS UP a party as DoD-prime-adjacent without
# changing its entity-graph classification — the flag is orthogonal to category.
#
# What this is NOT.
#   - Not a classification. The entity-graph kinds/classifications
#     (individual / corporate / government / trust / facility / water) are
#     unaffected; a hit just adds a `defense_contractor` annotation.
#   - Not a public accusation. A hit means "this name matches a known DoD
#     prime contractor pattern" — a lead to verify, nothing more.
#   - Not a list of every defense-adjacent vendor. Only the major primes;
#     sub-tier suppliers are out of scope.
#
# Matching semantics.
#   - CASE-INSENSITIVE SUBSTRING match of each pattern against the upper-cased
#     candidate name. Patterns SHOULD be uppercase (the matcher upper-cases
#     both sides defensively, but uppercase keeps intent obvious here).
#   - Substring, not regex. Do NOT use regex metacharacters.
#   - Be conservative about overly-broad patterns. "BOEING" alone is fine
#     because the word is essentially unique to the company. "DEFENSE"
#     alone would match every name containing the word "defense" — do not.
#   - Multiple subsidiaries of one parent get listed under that parent's
#     entry, in the same `patterns` list, so the grouping stays intact.
#
# How to add a new contractor.
#   1. Confirm the entity is a DoD prime, not a sub-tier supplier. Check
#      the most recent Top 100 DoD contractor list (FY22+ federal awards
#      data, or the DoD's own annual list).
#   2. Add a new entry under `defense_contractors:` with `name`, optional
#      `note`, and a `patterns` list.
#   3. Patterns must be specific enough to avoid false positives. Prefer
#      "GENERAL DYNAMICS CORPORATION" over "GENERAL". Prefer
#      "L3HARRIS" over "HARRIS" (which would catch every Harris family
#      parcel in the county).
#   4. In Allen County, GDLS / GDIT / JSMC / TACOM appear as Army-controlled
#      land at the Lima tank plant (JSMC). The parent-level patterns below
#      still usefully catch OTHER subsidiaries of the same parent.
#
# Dual-use note. Some companies here (Honeywell most notably) have substantial
# commercial businesses alongside defense work, so commercial-only parcels will
# also match. That is judged acceptable: the flag is orthogonal to category, and
# the cost of MISSING a defense-related parcel outweighs over-flagging a
# commercial one. A flag is a starting point, not a conclusion.

meta:
  subject: Defense-contractor seed list (DoD primes) for entity-graph + parcel owner matching
  origin: Imported from the Periplus (../gis) fork at the BOSC spin-out point; promoted to a first-class curated entity input.
  marker: defense_contractor
  what_this_is_not: >-
    NOT a classification and NOT a public accusation. A match means a name fits a
    known DoD-prime pattern — a lead to verify, not a verdict. The entity-graph
    classification of a matched party is unchanged.

defense_contractors:
  - name: "Lockheed Martin"
    patterns:
      - "LOCKHEED MARTIN"
      - "LOCKHEED-MARTIN"
      - "LOCKHEED CORP"
      - "SIKORSKY AIRCRAFT"

  - name: "Boeing"
    patterns:
      - "BOEING"

  - name: "RTX (Raytheon Technologies)"
    note: "Raytheon merged with United Technologies in 2020; subsidiaries include Pratt & Whitney and Collins Aerospace."
    patterns:
      - "RAYTHEON"
      - "RTX CORPORATION"
      - "RTX CORP"
      - "PRATT & WHITNEY"
      - "PRATT AND WHITNEY"
      - "COLLINS AEROSPACE"
      - "ROCKWELL COLLINS"

  - name: "Northrop Grumman"
    patterns:
      - "NORTHROP GRUMMAN"
      - "NORTHROP-GRUMMAN"

  - name: "General Dynamics (broader)"
    note: "GDLS, GDIT, GD Ordnance, and TACOM/JSMC are caught by the Allen overlay's government_military patterns. This entry catches the parent and other GD subsidiaries (Bath Iron Works, Electric Boat, Gulfstream, NASSCO, Mission Systems) that may show up on parcels with no Allen-specific government role."
    patterns:
      - "GENERAL DYNAMICS CORPORATION"
      - "GENERAL DYNAMICS CORP"
      - "GENERAL DYNAMICS MISSION"
      - "BATH IRON WORKS"
      - "ELECTRIC BOAT CORP"
      - "GULFSTREAM AEROSPACE"
      - "NASSCO"

  - name: "L3Harris Technologies"
    note: "Bare 'HARRIS' is intentionally excluded — it would match thousands of parcels held by Harris-surnamed individuals."
    patterns:
      - "L3HARRIS"
      - "L-3 COMMUNICATIONS"
      - "L3 TECHNOLOGIES"
      - "L-3 TECHNOLOGIES"

  - name: "BAE Systems"
    patterns:
      - "BAE SYSTEMS"

  - name: "Booz Allen Hamilton"
    patterns:
      - "BOOZ ALLEN HAMILTON"
      - "BOOZ ALLEN"
      - "BOOZ-ALLEN"

  - name: "Leidos"
    patterns:
      - "LEIDOS"

  - name: "SAIC (Science Applications International)"
    patterns:
      - "SCIENCE APPLICATIONS INTERNATIONAL"
      - "SAIC INC"
      - "SAIC CORPORATION"
      - "SAIC CORP"

  - name: "CACI International"
    patterns:
      - "CACI INTERNATIONAL"
      - "CACI INC"
      - "CACI, INC"

  - name: "ManTech"
    patterns:
      - "MANTECH"

  - name: "Honeywell"
    note: "DUAL-USE. Honeywell has substantial commercial (HVAC, building controls, industrial automation) and aerospace/defense businesses. Included because Honeywell Federal Manufacturing & Technologies operates Kansas City National Security Campus on behalf of the NNSA, and Honeywell Aerospace is a top DoD prime. Reviewers should treat a Honeywell hit as a starting point, not a conclusion."
    patterns:
      - "HONEYWELL"

  - name: "Huntington Ingalls Industries"
    patterns:
      - "HUNTINGTON INGALLS"
      - "NEWPORT NEWS SHIPBUILDING"
      - "INGALLS SHIPBUILDING"

  - name: "Textron"
    note: "Includes Bell (helicopters) and Textron Systems."
    patterns:
      - "TEXTRON"
      - "BELL HELICOPTER"
      - "BELL TEXTRON"

  - name: "Oshkosh Defense"
    note: "Bare 'OSHKOSH' is left out to avoid matching unrelated entities named after the Wisconsin city; the corporate parent typically appears as 'OSHKOSH CORPORATION' or 'OSHKOSH DEFENSE'."
    patterns:
      - "OSHKOSH DEFENSE"
      - "OSHKOSH CORPORATION"
      - "OSHKOSH CORP"

  - name: "Anduril Industries"
    patterns:
      - "ANDURIL"

  - name: "Palantir Technologies"
    patterns:
      - "PALANTIR"

  - name: "Peraton"
    patterns:
      - "PERATON"
