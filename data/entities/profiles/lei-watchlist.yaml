    Corridor / RSEI facility parent companies to resolve against the GLEIF Legal
    Entity Identifier registry ("who owns whom"). Each LEI is PINNED by verified
    20-char ID and fetched by exact lookup (never a fuzzy name match), so the
    committed reference is litigation-clean. Entities whose correct legal entity is
    ambiguous are listed without a pinned LEI as unresolved leads. Regenerate the
    resolved records with `bosc lei`.
  source: GLEIF (AWS Open Data s3://gleif), REST API api.gleif.org; license CC0
