meta:
  subject: Cloud-consumer candidate entities — I-75 / I-70 / US-68 corridor demand-fit inventory
  compiled: 2026-06
  marker: cloud_consumer_candidate
  what_this_is: >-
    A curated list of corridor operations that have at least one workload class an
    entity like the American Township facility could serve. Each is marked a
    cloud_consumer_candidate purely on demand-fit (the nature of the business from
    public descriptions).
  what_this_is_not: >-
    NOT a list of customers, prospects, or parties connected to Project BOSC. No
    entity here is asserted to use, plan to use, or have been approached about any
    data-center capacity. "candidate" == demand-fit only; connection is unestablished.
  workload_classes:
    industrial_telemetry: Industrial telemetry / predictive maintenance (sensor + equipment data)
    vision_ml: Vision / ML on a line or in a yard (quality inspection, logistics automation)
    erp_data_warehouse: ERP / data-warehouse modernization (enterprise data consolidation)
    low_latency_edge: Low-latency edge (vehicles, distribution, time-critical control)
    regulated_data: Regulated-data compute (defense, healthcare, financial)
  confirmed_cloud_relationship_note: >-
    Where a public cloud relationship is documented it is recorded verbatim and is
    typically corporate-level, not a Lima/Allen-County-specific project. Absence of a
    value means none is asserted here.

