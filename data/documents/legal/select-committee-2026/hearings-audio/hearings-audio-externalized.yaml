# Hearing audio — externalized from git (chain-of-custody record).
#
# The Select Committee on Data Centers (2026-06-04) hearing audio is too large to keep
# in the repo (multi-GB; ~4.2 GiB across four WAVs). On 2026-06-10 the WAVs were removed
# from Git/Git-LFS tracking and added to .gitignore. The bytes are retained locally (in
# the Git-LFS object store + the working tree) pending upload to an evidence bucket; this
# manifest is the durable record that the audio was captured and remains integrity-
# verifiable by the recorded sha256 (the exact Git-LFS oids).
#
# Provenance: these WAVs are time-sliced segments of a single raw original recording that
# was never committed to git (local-only). The transcripts derived from this audio are
# the committed, reviewed artifact (see ../hearings-audio/*.transcript.md and the nav).
#
# Re-link: do NOT `git lfs prune` until these are safely in the bucket — history still
# references the oids, so the objects stay in .git/lfs/objects and can be restored with
# `git lfs checkout <path>` against an earlier commit, or read from .git/lfs/objects.

