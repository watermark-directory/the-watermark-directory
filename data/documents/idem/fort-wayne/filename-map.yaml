# Canonical-name / date map for the IDEM (Indiana) air-permit source files.
#
# The source binaries keep their AS-RECEIVED names (chain of custody) — the names
# IDEM's PermitStatusSearch portal serves, which are the permit/document number plus
# a one-letter stage suffix (e.g. "f" = final issuance, "d" = draft / public notice).
# This non-destructive alias layer records the corpus-canonical name + the date
# VERIFIED from each file's own content (PDF text layer), so the indexer can pair
# them without renaming evidence.
#
# Source: Indiana Department of Environmental Management (IDEM), Office of Air Quality —
#         https://apps.idem.in.gov/PermitStatusSearch/
# Facility: Hatchworks LLC (the Google "Project Zodiac" data-center campus),
#           7510 Zodiac Way, Fort Wayne, IN 46816 (Allen County). IDEM AI ID 133680;
#           OAQ Stationary Source ID 1800300530. See bosc.sites _FORT_WAYNE (#360/#362).
#
# evidence: native_text = PDF text layer (pypdf) | filename = unambiguous id in the name.
# policy: non-destructive — originals kept in place; this is an alias layer only.
