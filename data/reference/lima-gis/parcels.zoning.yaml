meta:
  subject: City of Lima zoning for cited corpus parcels (jurisdiction scan)
  source: City of Lima GIS — ArcGIS REST, CitywideMaps/Lima_Zoning, layer 6, joined
    by PARCEL_NO to corpus-cited parcel ids
  n_cited: 48
  n_in_city: 0
  finding: 0 of 48 cited corpus parcels fall within the City of Lima zoning jurisdiction
    — the corridor (data-center campus + JSMC) sits in American/county townships,
    so it is NOT subject to the City of Lima zoning code. Allen County GIS publishes
    no county/township zoning layer (only Tax and School districts), so land-use authority
    here is township/county, not GIS-mapped.
  caveats:
  - Coverage is Lima CITY LIMITS ONLY; in_city=false is a verified outside-city result,
    not a missing lookup.
  - Parcel ids are scanned from data/extracted; normalized to the dashless PARCEL_NO
    the GIS join uses.
