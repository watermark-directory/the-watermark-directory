# Rack power density bands + datacenter overhead assumptions.
#
# Vendored reference data (see README.md). The rack-density bands are reproduced
# from the IN-CORPUS relator data appendix (which cites NVIDIA HGX guidance via
# IntuitionLabs); the overhead/PUE/footprint figures are stated modeling
# assumptions, NOT facility disclosures. Consumed by bosc.facility.compute.

# AI rack power density by accelerator class (kW per rack). Source: in-corpus
# relator data appendix (data/extracted/legal/select-committee-2026/
# relator-testimony/bosc-data-appendix-2026-06-01.md, table "Power density"),
# citing NVIDIA HGX data-center physical-requirements guidance via IntuitionLabs.
rack_density_kw:
  enterprise: [5, 15]      # traditional enterprise rack (air) — context only
  h100_class: [40, 50]     # H100-class AI rack (air/liquid)
  b200_class: [60, 60]     # B200-class AI rack (liquid); ">=60" stated as a floor
  gb200_nvl72: [120, 140]  # GB200 NVL72 rack-scale (liquid mandatory)
# Generic AI-rack band used by the footprint method when the chip is unspecified.
ai_rack_kw_band: [40, 140]

# Datacenter power overhead. PUE = total facility power / IT power. WUE/PUE
# context figures are in the relator appendix (WUE ~1.8-1.9 L/kWh industry avg).
# The air permit's ~313 MW backup is sized to the IT + mechanical load (N+1), so
# the genset-derived IT figure in bosc.facility.power already nets most overhead;
# PUE here is for translating an IT-power figure to total-facility draw, not used
# to inflate the accelerator count.
pue_band: [1.1, 1.3]       # hyperscale evaporative/liquid PUE (assumption)

# Share of IT power that reaches the ACCELERATORS (vs CPU host, storage, network,
# in-rack conversion). The remainder is non-accelerator IT load. Assumption with a
# wide band — this is the single largest lever in the power method.
accelerator_power_fraction: [0.50, 0.70]  # low / high (central = mean)

# Footprint method (WEAKEST — see README + compute.py). The assembled campus LAND
# area is ~340-350 acres (data/reference/periplus/bosc-parcels.geojson, recorded
# Bistrozzi parcels). LAND IS NOT FLOOR AREA. No building footprint or data-hall
# white-space area is documented in the 95% SPS plans (sheet 1A-C-3104 is grading
# & storm only; no floor schedule). The fractions below are stated assumptions used
# only to show what floorspace WOULD imply — they are not measurements.
footprint:
  building_coverage_fraction: [0.15, 0.30]  # building footprint / campus land (assumption)
  whitespace_fraction: [0.40, 0.55]         # data-hall raised-floor / building area (assumption)
  rack_area_sqft: 30.0                       # floor area per rack incl. aisles (assumption)
  campus_land_geojson: "data/reference/periplus/bosc-parcels.geojson"
