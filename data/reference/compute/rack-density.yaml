# Rack power density bands + datacenter overhead assumptions.
#
# Vendored reference data (see README.md). The rack-density bands are reproduced
# from the IN-CORPUS relator data appendix (which cites NVIDIA HGX guidance via
# IntuitionLabs); the overhead/PUE/footprint figures are stated modeling
# assumptions, NOT facility disclosures. Consumed by watermark.facility.compute.

# AI rack power density by accelerator class (kW per rack). Source: in-corpus
# relator data appendix (data/extracted/legal/select-committee-2026/
# relator-testimony/bosc-data-appendix-2026-06-01.md, table "Power density"),
# citing NVIDIA HGX data-center physical-requirements guidance via IntuitionLabs.
rack_density_kw:
  enterprise: [5, 15]      # traditional enterprise rack (air) — context only
  h100_class: [40, 50]     # H100-class AI rack (air/liquid)
  b200_class: [60, 60]     # B200-class AI rack (liquid); ">=60" stated as a floor
  gb200_nvl72: [120, 140]  # GB200 NVL72 rack-scale (liquid mandatory)
# Generic AI-rack band used by the footprint method when the chip is unspecified.
ai_rack_kw_band: [40, 140]

# Datacenter power overhead. PUE = total facility power / IT power. WUE/PUE
# context figures are in the relator appendix (WUE ~1.8-1.9 L/kWh industry avg).
# The air permit's ~313 MW backup is sized to the IT + mechanical load (N+1), so
# the genset-derived IT figure in watermark.facility.power already nets most overhead;
# PUE here translates an IT-power figure to total-facility draw (a first-class
# `facility_draw` output on PowerBasis, issue #87), and is NOT used to inflate the
# accelerator count. Ceiling raised to 1.43 to admit cooling-dominated designs: a
# 2026-06-10 facility-design call indicated cooling can reach ~30% of FACILITY
# power, i.e. IT/total ~= 0.70 -> PUE ~= 1.43 (cooling share = (PUE-1)/PUE).
pue_band: [1.1, 1.43]      # hyperscale evaporative/liquid PUE; 1.43 = ~30% cooling (assumption)

# Share of IT power that reaches the ACCELERATORS (vs CPU host, storage, network,
# in-rack conversion). The remainder is non-accelerator IT load. Assumption with a
# wide band — this is the single largest lever in the power method.
accelerator_power_fraction: [0.50, 0.70]  # low / high (central = mean)

# Data-center profiles (issue #89). The chip-level overhead (chip TDP -> all-in
# per-accelerator power, the host CPU / NIC / PSU / in-rack-conversion share) differs
# by deployment: an air-cooled HGX rack carries more host + network overhead than a
# liquid GB200 NVL72 with an integrated Grace CPU and an internal NVLink domain. Each
# profile splits the overhead into a HOST and a NETWORK share — the network share
# reflects the 1 InfiniBand + 1 Ethernet NIC complement from the rack_profile below
# (issue #88) — and names the cooling + PUE it pairs with (issue #87). The accelerator
# chain in compute.py runs per profile as labeled SCENARIOS; the global
# host_overhead_factor in accelerators.yaml (1.30) remains the DEFAULT. Every figure
# is an ASSUMPTION — no deployment is disclosed. total overhead = host x network.
datacenter_profiles:
  - name: air-hgx
    label: "Air-cooled HGX (H100/H200)"
    host_overhead: 1.20       # CPU/PSU/storage share on top of chip TDP
    network_overhead: 1.09    # 1 IB + 1 Ethernet NIC + top-of-rack switch share (air fabric)
    cooling: "air"
    pue: 1.43                 # air cooling sits at the cooling-dominated PUE end (#87)
  - name: liquid-h100
    label: "Liquid HGX (H100/H200/B200)"
    host_overhead: 1.18
    network_overhead: 1.07    # tighter liquid fabric; lower switch/NIC share
    cooling: "liquid"
    pue: 1.25
  - name: liquid-gb200-nvl72
    label: "Liquid GB200 NVL72 (rack-scale)"
    host_overhead: 1.10       # Grace CPU integrated in the superchip; less external host
    network_overhead: 1.05    # 72-GPU NVLink domain is internal; less top-of-rack network
    cooling: "liquid (mandatory)"
    pue: 1.15

# Footprint method (WEAKEST — see README + compute.py). The assembled campus LAND
# area is ~340-350 acres (data/reference/periplus/bosc-parcels.geojson, recorded
# Bistrozzi parcels). LAND IS NOT FLOOR AREA. No building footprint or data-hall
# white-space area is documented in the 95% SPS plans (sheet 1A-C-3104 is grading
# & storm only; no floor schedule). The fractions below are stated assumptions used
# only to show what floorspace WOULD imply — they are not measurements.
footprint:
  building_coverage_fraction: [0.15, 0.30]  # building footprint / campus land (assumption)
  whitespace_fraction: [0.40, 0.55]         # data-hall raised-floor / building area (assumption)
  rack_area_sqft: 30.0                       # FALLBACK floor area per rack if rack_profile absent
  campus_land_geojson: "data/reference/periplus/bosc-parcels.geojson"

# Rack physical profile (issue #88). No rack layout is disclosed in the 95% SPS plans
# (sheet 1A-C-3104 is grading/storm only) — every figure is an ASSUMPTION from the
# 2026-06-10 facility-design call: "build around 32U+ racks with one NVIDIA InfiniBand
# and one network card; non-standard depth for housing the GPU / cooling layouts." The
# per-rack floor area used by the footprint method is DERIVED from depth x width x
# aisle_factor (superseding the bare footprint.rack_area_sqft scalar): an extended
# depth raises the floor area per rack, shrinking the rack count the land could hold.
# aisle_factor is tuned so the STANDARD depth reproduces the legacy ~30 sqft/rack.
rack_profile:
  height_u: 48              # >=32U; tall AI rack (call said "32U+")
  width_mm: 600            # standard 19" rack width
  depth_mm: 1200           # NON-STANDARD / extended depth for GPU trays + liquid manifolds
  standard_depth_mm: 1070  # the standard rack depth this exceeds (~42")
  non_standard_depth: true # extended depth vs standard ~1070mm
  aisle_factor: 4.3        # floor-area multiplier for hot/cold aisles + service clearance
  nics_per_node:
    infiniband: 1          # NVIDIA InfiniBand compute-fabric NIC (feeds network overhead, #89)
    ethernet: 1            # storage / management NIC
