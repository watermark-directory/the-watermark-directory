meta:
  subject: Allen County, Ohio political subdivisions — public-meeting records registry
  description: >-
    The county's townships, municipalities, and meeting-holding special districts,
    each with the verbatim governing-body meeting cadence and contact carried in the
    committed county rosters, plus a `publishing:` block recording where (and on what
    platform) the body posts its minutes/agendas online. The grounded roster facts
    are immutable source; the `publishing:` block is filled by the discovery pass
    (`bosc subdivisions discover`) and carries its own `discovered:` provenance.
  grounded_sources:
    # Verbatim facts (name, type, governing body, meeting cadence, office) come from
    # these committed county-published rosters — never from outside knowledge.
    - id: township-trustees-fiscal-officers
      file: data/documents/commissioners/reference/Township-Trustees-Fiscal-Officers.pdf
      title: 2025 Allen County Township Trustees & Fiscal Officers
      asof: "2025-04-02"
    - id: mayors-and-zoning-persons
      file: data/documents/commissioners/reference/Mayors-and-Zoning-Persons.pdf
      title: Mayors in Allen County / Allen County Zoning Persons
      asof: "2024-07-12"
    - id: govt-structure-org-chart
      file: data/documents/commissioners/reference/Govt.-Structure-Org-Chart-1.pdf
      title: Allen County Government (org chart, boards & commissions)
  caveats:
    - "Meeting cadence is transcribed verbatim from the roster; it is the standing
      schedule, not a guarantee any given date met (cancellations/special meetings
      are resolved against the actual posted records)."
    - "`publishing.platform: unknown` WITH a `discovered:` block = the body was looked
      at but its CMS wasn't fingerprinted (or its site blocked the fetch). `unknown`
      WITHOUT a `discovered:` block = not yet looked. Neither ever means the body
      withholds records, and a null `records_url` is never evidence of withholding."
    - "`platform: request_only` = no online posting was found (records-request route);
      `platform: facebook` = the only web presence is a Facebook page. Beware the
      same-named-township trap: several decoy sites belong to other Ohio counties
      (notes record the specific decoys ruled out)."
    - "A `discovered:` block records a live-web finding with its date; the underlying
      site can move (Shawnee Twp already migrated shawneetownship.com -> .gov).
      Re-run discovery to refresh."
    - "Bluffton and Delphos straddle county lines (Bluffton: Allen/Hancock;
      Delphos: Allen/Van Wert). They are included as Allen County seats of record."

# platform vocabulary (publishing.platform):
#   civicplus      CivicPlus / CivicEngage "Agenda Center" (structured agendas+minutes)
#   granicus       Granicus / Legistar / GovAccess meeting portal
#   boarddocs      Diligent BoardDocs (go.boarddocs.com)
#   civicclerk     CivicClerk meeting portal (now CivicPlus)
#   revize         Revize municipal CMS
#   wordpress      WordPress site (typically PDF links on a "minutes" page)
#   wix            Wix site builder
#   squarespace    Squarespace site builder
#   govoffice      GovOffice / govoffice.com
#   facebook       Posts to a Facebook page only (no records page found)
#   request_only   No online posting found; obtain via public-records request
#   unknown        Not yet discovered, or CMS not fingerprinted / site blocked the fetch

