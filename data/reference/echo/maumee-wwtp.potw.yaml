    '04100003': St. Joseph
    '04100004': St. Marys
    '04100005': Upper Maumee
    '04100006': Tiffin
    '04100007': Auglaize
    04100008: Blanchard
    04100009: Lower Maumee
  dedup_key: FRS RegistryID
  count: 129
  caveats:
  - ECHO's CWA facility service has no CWNS column; the POTW flag rests on CWPFacilityTypeIndicator.
  - Facilities link to HUCs via WATERS (FacDerivedHuc); a permit that didn't geocode
    can be missed.
  - Four subbasins cross into IN/MI — cross-check Ohio EPA / IDEM / EGLE for completeness.
  - design_flow_mgd is null where ECHO returned no value; it is never estimated.
  - ottawa_discharge keys on the sparse receiving_water field and undercounts (e.g.
    Lima WWTP).
  - "receiving_water is null for OH0027910 (Van Wert WWTP) in ECHO; corrected to
    Town Creek per NPDES fact sheet 2PD00006 (data/documents/oepa/van-wert/2PD00006.fs.pdf),
    Table 12 — outfall 2PD00006001 at River Mile 13.87."
