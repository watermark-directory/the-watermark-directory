  subject: Little Miami-watershed NPDES wastewater dischargers
  scope: POTWs only (CWPFacilityTypeIndicator == POTW)
  source: EPA ECHO — cwa_rest_services (CWA v2017-10-13)
  watershed: Little Miami River — 1 HUC-8 subbasin, subregion 0509 (Ohio River tributary,
    Scenic River)
  huc8s:
    05090202: Little Miami
  dedup_key: FRS RegistryID
  count: 37
  caveats:
  - ECHO's CWA facility service has no CWNS column; the POTW flag rests on CWPFacilityTypeIndicator.
  - Facilities link to HUCs via WATERS (FacDerivedHuc); a permit that didn't geocode
    can be missed.
  - design_flow_mgd is null where ECHO returned no value; it is never estimated.
  - Mill Creek (05090203, the Cincinnati urban drainage) is the adjacent 0509 basin
    and is excluded; cross-check Ohio EPA near the basin mouth for completeness.
  - Todd Fork (the Wilmington / Clinton County tributary) is ungaged — the at-site
    dilution screen relies on the downstream Little Miami integrator at Milford.
