note: 'FERC regulatory seam (#97). The FERC<->PUCO boundary is the wholesale/retail
  line of the Federal Power Act: FERC = wholesale + interstate transmission + PJM
  market rules (and behind-the-meter co-location at FERC-jurisdictional generators);
  PUCO = Ohio retail service, distribution, and retail rates. The campus is most likely
  PUCO-retail (grid-served customer of AEP Ohio, #94). This determines which regulator
  sets the campus''s price - PUCO retail vs FERC wholesale - the regulatory backdrop
  the consumer-cost thread (#91) sits under. Dockets and the Form-1 pointer are public
  records captured as cited evidence, flagged for verification against FERC eLibrary
  / FERC Online.'
