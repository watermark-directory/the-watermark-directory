boundary:
  ferc_scope:
    value: FERC governs wholesale sales of electricity, interstate transmission, and
      RTO/ISO market rules (PJM) - including co-location / behind-the-meter arrangements
      at FERC-jurisdictional generators
    source: reference
    citation: Federal Power Act sections 205/206 (16 U.S.C. 824d/824e); FERC jurisdiction
      over wholesale sales in interstate commerce and interstate transmission
    confidence: high
  puco_scope:
    value: PUCO governs Ohio retail electric service, local distribution, and retail
      rates / tariffs (intrastate)
    source: reference
    citation: Federal Power Act section 201(b) reserves retail sales and local distribution
      to the states; Ohio retail electric service is PUCO-regulated (intrastate)
    confidence: high
  campus_arrangement:
    value: 'PUCO retail (grid-served), unless behind-the-meter co-location: the campus
      is a retail tariff customer of AEP Ohio, so its service and rate fall under
      PUCO retail jurisdiction; a behind-the-meter co-location at a FERC-jurisdictional
      generator would instead implicate FERC'
    source: reference
    citation: 'serving utility identified in #94 (watermark.grid.utility): AEP Ohio (Ohio
      Power Company), a PJM transmission zone, PUCO-regulated at retail; classification
      of the campus''s likely arrangement - verify against the campus''s actual service
      agreement / tariff filing'
    confidence: medium
  note: 'The FERC<->PUCO line is the wholesale/retail boundary of the Federal Power
    Act (general law, high confidence). The campus''s classification as PUCO retail
    is the most likely arrangement (grid-served retail customer of AEP Ohio per #94);
    a behind-the-meter co-location would move the seam to FERC and is the live policy
    question the captured dockets address.'
