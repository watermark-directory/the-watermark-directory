- number: '3513.32'
  heading: Primary preceding special election
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'When a special election is found necessary to fill a vacancy, the date of
    the primary election shall be fixed at the same time and in the same manner as
    that of the election, by the authority calling such special election. The primary
    election shall be held at least fifteen days prior to the time fixed for such
    special election. Declaration of candidacy and certificates for such primary shall
    be filed and fees shall be paid at least ten days before the date for holding
    such primary election.

    A primary election preceding a special election to fill a vacancy in an office
    shall be eliminated if no valid declaration of candidacy is filed for such office,
    or if the number of persons filing such declarations of candidacy as candidates
    of one political party does not exceed the number of candidates which such political
    party is entitled to nominate for election to such office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.32
- number: '3513.33'
  heading: Notice of prohibited campaign practices
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: At the time a person files a declaration of candidacy, nominating petition,
    or declaration of intent to be a write-in candidate, the secretary of state or
    the board of elections shall furnish that person with a copy of section 3517.21
    of the Revised Code. Each person who receives the copy shall acknowledge its receipt
    in writing.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.33
- number: '3515.01'
  heading: Eligibility for recount
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'Any person for whom votes were cast in a primary election for nomination
    as a candidate for election to an office who was not declared nominated may file
    with the board of elections of a county a written application for a recount of
    the votes cast at such primary election in any precinct in such county for all
    persons for whom votes were cast in such precinct for such nomination.

    Any person who was a candidate at a general, special, or primary election for
    election to an office or postion who was not declared elected may file with the
    board of a county a written application for a recount of the votes cast at such
    election in any precinct in such county for all candidates for election to such
    office or position.

    Any group of five or more qualified electors may file with the board of a county
    a written application for a recount of the votes cast at an election in any precinct
    in such county upon any question or issue, provided that the members of such group
    shall state in such application either that they voted "Yes" or in favor of such
    question or issue and that such question or issue was declared defeated or rejected,
    or that they voted "No" or against such question or issue and that such question
    or issue was declared carried or adopted. Such group of electors shall, in such
    application, designate one of the members of the group as chairman, and shall
    indicate therein the voting residence of each member of such group. In all such
    applications the person designated as chairman is the applicant for the purposes
    of sections 3515.01 to 3515.07 of the Revised Code, and all notices required by
    section 3515.03 of the Revised Code to be given to an applicant for a recount
    shall be given to such person.

    In the recount of absentee ballots that are tallied by county instead of by precinct,
    as provided in section 3509.06 of the Revised Code, the county shall be considered
    a separate precinct for purposes of recounting such absentee ballots.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.01
- number: '3515.011'
  heading: Recounts ordered by board
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'If the number of votes cast in any county or municipal election for the declared
    winning nominee, candidate, question, or issue does not exceed the number of votes
    cast for the declared defeated nominee, candidate, question, or issue by a margin
    of one-half of one per cent or more of the total vote, the appropriate board of
    elections shall order a recount which shall be conducted as provided in sections
    3515.04 and 3515.05 of the Revised Code.

    If the number of votes cast in any district election for the declared winning
    nominee, candidate, question, or issue does not exceed the number of votes cast
    for the declared defeated nominee, candidate, question, or issue by a margin of
    one-half of one per cent or more of the total vote, the secretary of state shall
    order a recount which shall be conducted as provided in sections 3515.04 and 3515.05
    of the Revised Code.

    If the number of votes cast in any statewide election for the declared winning
    nominee, candidate, question, or issue does not exceed the number of votes cast
    for the declared defeated nominee, candidate, question, or issue by a margin of
    one-fourth of one per cent or more of the total vote, the secretary of state shall
    order a recount which shall be conducted as provided in sections 3515.04 and 3515.05
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.011
- number: '3515.02'
  heading: Application for recount
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'If the nomination or the candidacy for election, or the question or issue,
    concerning which a recount is applied for was submitted only to electors within
    a county, the application for recount shall be filed within five days after the
    day upon which the board of elections of such county declares the results of such
    election.

    If the nomination or the candidacy for election, or the question or issue, concerning
    which a recount is applied for was submitted only to electors of a district comprised
    of more than one county but less than all of the counties of the state, the application
    shall be filed within five days after the day upon which the board of the most
    populous county in such district declares the results of such election.

    If the nomination or the candidacy for election, or the question or issue, concerning
    which a recount is applied for was submitted to electors throughout the entire
    state, the application shall be filed within five days after the day upon which
    the secretary of state declares the results of such election.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.02
- number: '3515.03'
  heading: Contents of application for recount
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'Each application for recount shall separately list each precinct as to which
    a recount of the votes is requested, and the person filing the application shall,
    at the same time, deposit with the board of elections fifty dollars in currency,
    bank money order, bank cashier''s check, or certified check for each precinct
    so listed as security for the payment of charges for making the recount applied
    for, which charges shall be fixed by the board as provided in section 3515.07
    of the Revised Code.

    Upon the filing of an application, or upon declaration by the board or secretary
    of state that the number of votes cast in any election for the declared winning
    nominee, candidate, question, or issue does not exceed the number of votes cast
    for the defeated nominee, candidate, question, or issue, by the margins set forth
    in section 3515.011 of the Revised Code, the board shall promptly fix the time,
    method, and the place at which the recount will be made, which time shall be not
    later than ten days after the day upon which such application is filed or such
    declaration is made. If the recount involves a candidate for election to an office
    comprising more than one county, the director of the board shall promptly mail
    notice of the time and place for such recount to the board of the most populous
    county of the district. If the contest involves a state office, the director shall
    promptly notify the secretary of state of the filing for such recount.

    The director of the board shall mail notice of the time and place so fixed to
    any applicant and to each person for whom votes were cast for such nomination
    or election. Such notice shall be mailed by certified mail not later than the
    fifth day before the day fixed for the commencement of the recount. Persons entitled
    to have such notice mailed to them may waive their right to have it mailed by
    filing with the director a written waiver to that effect. Each person entitled
    to receive such notice may attend and observe the recount and may have any person
    whom the candidate designates attend and observe the recount. At any time after
    a winning nominee or candidate is declared but before the time for a recount pursuant
    to section 3515.011 of the Revised Code commences, the declared losing nominee
    or candidate may file with the board a written request to stop the recount from
    commencing. In the case of more than one declared losing candidate or nominee,
    each of whom is entitled to a recount pursuant to section 3515.011 of the Revised
    Code, each such declared losing candidate or nominee must file with the board
    such written request to stop the recount from commencing. The board shall grant
    such request and shall not commence the recount.

    In the case of a recount of votes cast upon a question or issue, any group of
    five or more qualified electors, who voted upon such question or issue and whose
    votes were in opposition to the votes of the members of the group of electors
    who applied for the recount, or for whom the recount was required by section 3515.011
    of the Revised Code, may file with the board a written statement to that effect,
    shall designate in it one of their number as chairperson of such group, may appoint
    an attorney at law as their legal counsel, and may request that the persons so
    designated be permitted to attend and observe the recount. Thereupon, the persons
    so designated may attend and observe the recount.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.03
- number: '3515.04'
  heading: Recount procedure
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'At the time and place fixed for making a recount, the board of elections,
    in the presence of all observers who may be in attendance, shall open the sealed
    containers containing the ballots to be recounted, and shall recount them. Ballots
    shall be handled only by the members of the board or by the director or other
    employees of the board. Observers shall be permitted to see the ballots, but they
    shall not be permitted to touch them, and the board shall not permit the counting
    or tabulation of votes shown on the ballots for any nomination, or for election
    to any office or position, or upon any question or issue, other than the votes
    shown on such ballots for the nomination, election, question, or issue concerning
    which a recount of ballots was applied for.

    At any time before the ballots from all of the precincts listed in an application
    for the recount or involved in a recount pursuant to section 3515.011 of the Revised
    Code have been recounted, the applicant or declared losing candidate or nominee
    or each of the declared losing candidates or nominees entitled to file a request
    prior to the commencement of a recount, as provided in section 3515.03 of the
    Revised Code, may file with the board a written request to stop the recount and
    not recount the ballots from the precincts so listed that have not been recounted
    prior to the time of the request. If, upon the request, the board finds that results
    of the votes in the precincts recounted, if substituted for the results of the
    votes in those precincts as shown in the abstract of the votes in those precincts,
    would not cause the applicant, if a person for whom votes were cast for nomination
    or election, to be declared nominated or elected or if an election upon a question
    or issue would not cause a result contrary to the result as declared prior to
    such recount, it shall grant the request and shall not recount the ballots of
    the precincts listed in the application for recount that have not been recounted
    prior to that time. If the board finds otherwise, it shall deny the request and
    shall continue to recount ballots until the ballots from all of the precincts
    listed in the application for recount have been recounted; provided that, if the
    request is denied, it may be renewed from time to time. Upon any such renewal,
    the board shall consider and act upon the request in the same manner as provided
    in this section in connection with an original request.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.04
- number: '3515.041'
  heading: Recount for presidential electors no later than six days before meeting
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: As required by 3 U.S.C. 5, any recount of votes conducted under this chapter
    for the election of presidential electors shall be completed not later than six
    days before the time fixed under federal law for the meeting of those presidential
    electors.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.041
- number: '3515.05'
  heading: Duties of board upon completion of recount
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'Upon completion of the recount of the ballots of all precincts listed in
    an application for a recount, or upon stopping the recount prior to such time,
    or in the case of a recount as provided in section 3515.011 of the Revised Code,
    the board of elections shall promptly prepare and certify an amended abstract
    showing the votes cast in each precinct in its county in which the nomination,
    election, or question or issue was submitted to electors, which amended abstract
    shall embody the votes of the precincts, the ballots of which were recounted,
    as shown by such recount. Copies of such certified amended abstracts shall be
    mailed to such other boards or election officials as required in the case of the
    original abstract which such amended abstract amends.

    If the nomination, election, or question or issue concerning which such recount
    was made was submitted only to electors within a county, the board shall make
    an amended declaration of the result of such election in the same manner required
    in the making of its original declaration of the result of such election.

    If the nomination, election, or question or issue concerning which a recount was
    made was submitted only to electors of a district comprised of more than one county
    but less than all of the counties of the state, the board of the most populous
    county in such district shall canvass the amended abstracts received from the
    board of each county in such district in which a recount was made, and shall make
    an amended declaration of the results of such election in such district in the
    same manner required in the making of its original declaration of the result of
    such election.

    If the nomination, election, or question or issue concerning which a recount was
    made was submitted only to electors of a subdivision located in more than one
    county, the board of the county in which the major portion of the population of
    such subdivision is located shall canvass the amended abstracts received from
    the board of each county in which a portion of the population of such subdivision
    is located and in which a recount was made, and shall make an amended declaration
    of the results of such election in such subdivision in the same manner required
    in the making of its original declaration of the result of such election.

    If the nomination, election, or question or issue concerning which a recount was
    made was submitted to electors throughout the entire state, the secretary of state
    shall canvass all amended abstracts received from the board of each county in
    the state in which a recount was made, and shall make an amended declaration of
    the results of such election throughout the entire state in the same manner required
    in the making of his original declaration of the result of such election.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.05
- number: '3515.06'
  heading: Recount in precincts not recounted
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'If, pursuant to section 3515.04 of the Revised Code, a person was declared
    nominated as a candidate for election to an office or elected to an office or
    position in an election and if it subsequently appears by the amended declaration
    of the results of such election made following a recount of votes cast in such
    election that such person was not so nominated or elected, such person may, within
    five days after the date of such amended declaration of the results of such election,
    file an application with the board of elections for a recount of the votes cast
    at such election for such nomination or election in any precinct, the ballots
    of which have not been recounted.

    If, following a recount of votes cast in an election upon any question or issue,
    the amended declaration of the results of such election shows the result of such
    election to be contrary to the result thereof as declared in the original declaration
    of the results thereof, any group of five or more qualified electors which has
    filed a statement with the board as provided in the third paragraph of section
    3515.03 of the Revised Code may, within five days after the date of the amended
    declaration, file an application with the board for a recount of the votes cast
    at such election upon such question or issue in any precinct of the county, the
    votes of which have not been recounted.

    Sections 3515.01 and 3515.02 to 3515.05 of the Revised Code are applicable to
    any application provided for in this section and to the recount had pursuant thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.06
- number: '3515.07'
  heading: Charges for recounts
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'The charges for making a recount of votes of precincts listed in an application
    for a recount filed with the board of elections shall be fixed by the board and
    shall include all expenses incurred by the board because of the application other
    than the regular operating expenses that the board would have incurred if the
    application had not been filed. The total amount of charges so fixed divided by
    the number of precincts listed in the application, the votes of which were recounted,
    shall be the charge per precinct for the recount of the votes of the precincts
    listed in the application, the votes of which were recounted; provided that the
    charges per precinct so fixed shall not be more than fifty or less than five dollars
    for each precinct the votes of which were recounted.

    Such charge per precinct shall be deducted by the board from the money deposited
    with the board by the applicant for the recount at the time of filing the application,
    and the balance of the money so deposited shall be returned to the applicant;
    provided that no such charge per precinct shall be deducted by the board from
    the money deposited for a recount of votes cast for a nomination or for an election
    to an office or position in any precinct, if the total number of votes cast in
    such precinct for the applicant, as recorded by the recount, is more than four
    per cent larger than the number of votes for the applicant in that precinct recorded
    in the original certified abstract, nor shall any charge per precinct be deducted
    for a recount of votes cast in any precinct upon a question or issue if the total
    number of votes in that precinct on the same side of that question or issue as
    the side represented by the applicant, as recorded by the recount, is more than
    four per cent larger than the number of votes in that precinct on the same side
    of that question or issue recorded in the original certified abstract. No such
    charge per precinct shall be deducted if upon the completion of a recount concerning
    a nomination or election the applicant is declared nominated or elected, or if
    upon the completion of a recount concerning a question or issue the result of
    that election is declared to be opposite to the original declaration of the result
    of that election.

    All moneys deposited with a board by an applicant shall be deposited in a special
    depository fund with the county treasurer. The expenses of the recount and refunds
    shall be paid from that fund upon order of the board of elections. Any balance
    remaining in that fund shall be paid into the general fund of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.07
- number: '3515.071'
  heading: Expenses of recounts
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'If the board of elections in a county orders a recount in any county or municipal
    election pursuant to section 3515.011 of the Revised Code, the expense of the
    recount shall be paid from the county treasury in the same manner as other expenses
    of the board under section 3501.17 of the Revised Code.

    If the secretary of state orders a recount as provided in section 3515.011 of
    the Revised Code, the expense of the recount shall be paid from funds appropriated
    to the secretary of state, who may apply to the controlling board for funds to
    avert any deficiency that thereby would be created in current appropriations.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.071
- number: '3515.072'
  heading: Biennial adjustment of charges for recounts
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: '(A) In January of each odd-numbered year, the secretary of state, in accordance
    with this division and division (B) of this section, shall adjust each amount
    specified in sections 3515.03 and 3515.07 of the Revised Code. The adjustment
    shall be based on the yearly average of the previous two years of the Consumer
    Price Index for All Urban Consumers or its successive equivalent, as determined
    by the United States department of labor, bureau of labor statistics, or its successor
    in responsibility, for all items, Series A. Using the 2005 yearly average as the
    base year, the secretary of state shall compare the most current average consumer
    price index with that determined in the preceding odd-numbered year, and shall
    determine the percentage increase or decrease. The percentage increase or decrease
    shall be multiplied by each actual dollar figure specified in sections 3515.03
    and 3515.07 of the Revised Code as determined in the previous odd-numbered year,
    and the product shall be added to or subtracted from its corresponding actual
    dollar figure, as necessary, for that previous odd-numbered year.

    If the resulting amount is less than five dollars, the secretary of state shall
    retain a record of the resulting amount and the manner in which it was calculated,
    but shall not make an adjustment unless the resulting amount, when added to the
    resulting amount calculated in each prior odd-numbered year since the last adjustment
    was made, equals or exceeds five dollars.

    (B)(1) The secretary of state shall calculate the adjustment under division (A)
    of this section and shall report the calculations and necessary materials to the
    auditor of state, on or before the thirty-first day of January of each odd-numbered
    year. The secretary of state shall base the adjustment on the most current consumer
    price index that is described in division (A) of this section and that is in effect
    as of the first day of January of each odd-numbered year.

    (2) The calculations made by the secretary of state under divisions (A) and (B)(1)
    of this section shall be certified by the auditor of state on or before the fifteenth
    day of February of each odd-numbered year.

    (3) On or before the twenty-fifth day of February of each odd-numbered year, the
    secretary of state shall prepare a report setting forth the amount required to
    be deposited with a board of elections at the time a recount application is filed
    for each precinct to be recounted under section 3515.03 of the Revised Code and
    the minimum and maximum per precinct charge for a recount under section 3515.07
    of the Revised Code. The report and all documents relating to the calculations
    contained in the report are public records. The report shall contain an indication
    of the period in which the deposit amounts and the minimum and maximum per precinct
    charges apply, a summary of how the deposit amounts and the minimum and maximum
    per precinct charges were calculated, and a statement that the report and all
    related documents are available for inspection and copying at the office of the
    secretary of state.

    (4) On or before the twenty-fifth day of February of each odd-numbered year, the
    secretary of state shall transmit the report to the general assembly and shall
    send the report by electronic mail or other form of electronic communication to
    the board of elections of each county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.072
- number: '3515.08'
  heading: Election contest
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: '(A) Except as otherwise provided in this division, the nomination or election
    of any person to any public office or party position or the approval or rejection
    of any issue or question, submitted to the voters, may be contested by qualified
    electors of the state or a political subdivision. The nomination or election of
    any person to any federal office, including the office of elector for president
    and vice president and the office of member of congress, shall not be subject
    to a contest of election conducted under this chapter. Contests of the nomination
    or election of any person to any federal office shall be conducted in accordance
    with the applicable provisions of federal law.

    (B) In the case of an office to be filled or an issue to be determined by the
    voters of the entire state, or for judicial offices higher than that of court
    of common pleas, or for an office to be filled or an issue to be determined by
    the voters of a district larger than a county, a contest shall be heard and determined
    by the chief justice of the supreme court or a justice of the supreme court assigned
    for that purpose by the chief justice; except that, in a contest for the office
    of chief justice of the supreme court, the contest shall be heard by a justice
    of the supreme court designated by the governor.

    (C) In the case of all other offices or issues, except judicial offices, contests
    shall be heard and determined by a judge of the court of common pleas of the county
    in which the contest arose. In the case of a contest for a judicial office within
    a county, the contest shall be heard by the court of appeals of the district in
    which that county is located. If any contestant alleges prejudice on the part
    of the judges of the court of appeals or the court of common pleas assigned to
    hear a contest, the chief justice of the supreme court, upon application of any
    such contestant and for good cause shown, may assign judges from another court
    to hear the contest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.08
- number: '3515.09'
  heading: Filing election contest petition
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'A contest of election shall be commenced by the filing of a petition with
    the clerk of the appropriate court signed by at least twenty-five voters who voted
    at the last election for or against a candidate for the office or for or against
    the issue being contested, or by the defeated candidate for said nomination or
    election, within fifteen days after the results of any such nomination or election
    have been ascertained and announced by the proper authority, or if there is a
    recount, within ten days after the results of the recount of such nomination or
    election have been ascertained and announced by the proper authority. Such petition
    shall be verified by the oath of at least two such petitioners, or by the oath
    of the defeated candidate filing the petition, and shall set forth the grounds
    for such contest.

    Said petition shall be accompanied by a bond with surety to be approved by the
    clerk of the appropriate court in a sum sufficient, as determined by him, to pay
    all the costs of the contest. The contestor and the person whose right to the
    nomination or election to such office is being contested, to be known as the contestee,
    shall be liable to the officers and witnesses for the costs made by them respectively;
    but if the results of the nomination or election are confirmed or the petition
    is dismissed or the prosecution fails, judgment shall be rendered against the
    contestor for the costs; and if the judgment is against the contestee or if the
    results of the nomination or election are set aside, the county shall pay the
    costs as other election expenses are paid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.09
- number: '3515.10'
  heading: Time for hearing election contest
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: The court with which a petition to contest an election is filed shall fix
    a suitable time for hearing such contest, which shall be not less than fifteen
    nor more than thirty days after the filing of the petition. Such court shall have
    a copy of the contestor's petition served upon the contestee or upon the chairman
    of the committee taking the other side in advocacy of or opposition to any issue,
    in the same manner as a summons in a civil action. The contestee shall have ten
    days from the time service has been made upon him in which to answer the petition,
    and the contestor shall have five days in which to reply to the answer of the
    contestee. All parties may be represented by counsel and the hearing shall proceed
    at the time fixed, unless postponed by the judge hearing the case for good cause
    shown by either party by affidavit or unless the judge adjourns to another time,
    not more than thirty days thereafter, of which adjournment the parties interested
    shall take notice.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.10
- number: '3515.11'
  heading: Proceedings at trial of contest of election
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: The proceedings at the trial of the contest of an election shall be similar
    to those in judicial proceedings, in so far as practicable, and shall be under
    the control and direction of the court which shall hear and determine the matter
    without a jury, with power to order or permit amendments to the petition or proceedings
    as to form or substance. Such court may allow adjournments for not more than thirty
    days, for the benefit of either party, on such terms as to costs and otherwise
    as seem reasonable to the court, the grounds for such adjournment being shown
    by affidavit. The hearing shall proceed expeditiously and the total of such adjournments
    shall not exceed thirty days after the date set for the original hearing.
  history: null
