- number: '3513.192'
  heading: Forfeiting nomination
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: Any candidate nominated at a party primary election who votes in that primary
    election as a member of a political party different from the party that nominated
    the candidate shall forfeit the nomination, and the vacancy so created shall be
    filled in accordance with section 3513.31 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.192
- number: '3513.20'
  heading: Effect of challenge to voter at primary
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'Before any challenged person shall be allowed to vote at a primary election,
    the person shall make a statement, under penalty of election falsification, before
    one of the precinct officials, blanks for which shall be furnished by the board
    of elections, giving name, age, residence, length of residence in the precinct,
    county, and state; stating that the person desires to be affiliated with and supports
    the principles of the political party whose ballot the person desires to vote;
    and giving all other facts necessary to determine whether the person is entitled
    to vote in that primary election. The statement shall be returned to the office
    of the board with the pollbooks and tally sheets.

    If a person challenged refuses to make that statement under penalty of election
    falsification, the person shall be permitted to vote a provisional ballot under
    section 3505.181 of the Revised Code. If a majority of the precinct officials
    finds that the statements of a person challenged or the person''s voting record
    or other evidence shows that the person lacks any of the qualifications required
    to make the person a qualified elector at the primary election or that the person
    is not affiliated with or is not a member of the political party whose ballot
    the person desires to vote, the person shall be permitted to vote a provisional
    ballot under section 3505.181 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.20
- number: '3513.21'
  heading: Counting and return of ballots
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'At the close of the polls in a primary election, the precinct election officials
    shall proceed without delay to canvass the vote, sign and seal it, and make returns
    thereof to the board of elections forthwith on the forms to be provided by the
    board. The provisions of Title XXXV of the Revised Code relating to the accounting
    for and return of all ballots at general elections apply to primary ballots.

    If there is any disagreement as to how a ballot should be counted it shall be
    submitted to all of the precinct election officials. If three of the precinct
    election officials do not agree as to how any part of the ballot shall be counted,
    that part of such ballot which three of the officials do agree shall be counted
    and a notation made upon the ballot indicating what part has not been counted,
    and shall be placed in an envelope provided for that purpose, marked "Disputed
    Ballots" and returned to the board.

    The board shall, on the day when the vote is canvassed, open such sealed envelopes,
    determine what ballots and for whom they should be counted, and proceed to count
    and tally the votes on such ballots.'
