- number: '3517.105'
  heading: Identification of source of political advertising
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A)(1) As used in this section, "public political advertising" means advertising
    to the general public through a broadcasting station, newspaper, magazine, poster,
    yard sign, or outdoor advertising facility, by direct mail, or by any other means
    of advertising to the general public.

    (2) For purposes of this section and section 3517.20 of the Revised Code, a person
    is a member of a political action committee if the person makes one or more contributions
    to that political action committee, and a person is a member of a political contributing
    entity if the person makes one or more contributions to, or pays dues, membership
    fees, or other assessments to, that political contributing entity.

    (B)(1) Whenever a candidate, a campaign committee, a political action committee
    or political contributing entity with ten or more members, or a legislative campaign
    fund makes an independent expenditure, or whenever a political action committee
    or political contributing entity with fewer than ten members makes an independent
    expenditure in excess of one hundred dollars for a local candidate, in excess
    of two hundred fifty dollars for a candidate for the office of member of the general
    assembly, or in excess of five hundred dollars for a statewide candidate, for
    the purpose of financing communications advocating the election or defeat of an
    identified candidate or solicits without the candidate''s express consent a contribution
    for or against an identified candidate through public political advertising, a
    statement shall appear or be presented in a clear and conspicuous manner in the
    advertising that does both of the following:

    (a) Clearly indicates that the communication or public political advertising is
    not authorized by the candidate or the candidate''s campaign committee;

    (b) Clearly identifies the candidate, campaign committee, political action committee,
    political contributing entity, or legislative campaign fund that has paid for
    the communication or public political advertising in accordance with section 3517.20
    of the Revised Code.

    (2)(a) Whenever any campaign committee, legislative campaign fund, political action
    committee, political contributing entity, or political party makes an independent
    expenditure in support of or opposition to any candidate, the committee, entity,
    fund, or party shall report the independent expenditure and identify the candidate
    on a statement prescribed by the secretary of state and filed by the committee,
    entity, fund, or party as part of its statement of contributions and expenditures
    pursuant to division (A) of section 3517.10 and division (A) of section 3517.11
    of the Revised Code.

    (b) Whenever any individual, partnership, or other entity, except a corporation,
    labor organization, campaign committee, legislative campaign fund, political action
    committee, political contributing entity, or political party, makes one or more
    independent expenditures in support of or opposition to any candidate, the individual,
    partnership, or other entity shall file with the secretary of state in the case
    of a statewide candidate, or with the board of elections in the county in which
    the candidate files the candidate''s petitions for nomination or election for
    district or local office, not later than the dates specified in divisions (A)(1),
    (2), (3), and (4) of section 3517.10 of the Revised Code, and, except as otherwise
    provided in that section, a statement itemizing all independent expenditures made
    during the period since the close of business on the last day reflected in the
    last previously filed such statement, if any. The statement shall be made on a
    form prescribed by the secretary of state or shall be filed by electronic means
    of transmission pursuant to division (E) of section 3517.106 of the Revised Code
    as authorized or required by that division. The statement shall indicate the date
    and the amount of each independent expenditure and the candidate on whose behalf
    it was made and shall be made under penalty of election falsification.

    (C)(1) Whenever a corporation, labor organization, campaign committee, political
    action committee with ten or more members, or legislative campaign fund makes
    an independent expenditure, or whenever a political action committee with fewer
    than ten members makes an independent expenditure in excess of one hundred dollars
    for a local ballot issue or question, or in excess of five hundred dollars for
    a statewide ballot issue or question, for the purpose of financing communications
    advocating support of or opposition to an identified ballot issue or question
    or solicits without the express consent of the ballot issue committee a contribution
    for or against an identified ballot issue or question through public political
    advertising, a statement shall appear or be presented in a clear and conspicuous
    manner in the advertising that does both of the following:

    (a) Clearly indicates that the communication or public political advertising is
    not authorized by the identified ballot issue committee;

    (b) Clearly identifies the corporation, labor organization, campaign committee,
    legislative campaign fund, or political action committee that has paid for the
    communication or public political advertising in accordance with section 3517.20
    of the Revised Code.

    (2)(a) Whenever any corporation, labor organization, campaign committee, legislative
    campaign fund, political party, or political action committee makes an independent
    expenditure in support of or opposition to any ballot issue or question, the corporation
    or labor organization shall report the independent expenditure in accordance with
    division (C) of section 3599.03 of the Revised Code, and the campaign committee,
    legislative campaign fund, political party, or political action committee shall
    report the independent expenditure and identify the ballot issue or question on
    a statement prescribed by the secretary of state and filed by the committee, fund,
    or party as part of its statement of contributions and expenditures pursuant to
    division (A) of section 3517.10 and division (A) of section 3517.11 of the Revised
    Code.

    (b) Whenever any individual, partnership, or other entity, except a corporation,
    labor organization, campaign committee, legislative campaign fund, political action
    committee, or political party, makes one or more independent expenditures in excess
    of one hundred dollars in support of or opposition to any ballot issue or question,
    the individual, partnership, or other entity shall file with the secretary of
    state in the case of a statewide ballot issue or question, or with the board of
    elections in the county that certifies the issue or question for placement on
    the ballot in the case of a district or local issue or question, not later than
    the dates specified in divisions (A)(1), (2), (3), and (4) of section 3517.10
    of the Revised Code, and, except as otherwise provided in that section, a statement
    itemizing all independent expenditures made during the period since the close
    of business on the last day reflected in the last previously filed such statement,
    if any. The statement shall be made on a form prescribed by the secretary of state
    or shall be filed by electronic means of transmission pursuant to division (E)
    of section 3517.106 of the Revised Code as authorized or required by that division.
    The statement shall indicate the date and the amount of each independent expenditure
    and the ballot issue or question in support of or opposition to which it was made
    and shall be made under penalty of election falsification.

    (3) No person, campaign committee, legislative campaign fund, political action
    committee, corporation, labor organization, or other organization or association
    shall use or cause to be used a false or fictitious name in making an independent
    expenditure in support of or opposition to any candidate or any ballot issue or
    question. A name is false or fictitious if the person, campaign committee, legislative
    campaign fund, political action committee, corporation, labor organization, or
    other organization or association does not actually exist or operate, if the corporation,
    labor organization, or other organization or association has failed to file a
    fictitious name or other registration with the secretary of state, if it is required
    to do so, or if the person, campaign committee, legislative campaign fund, or
    political action committee has failed to file a designation of the appointment
    of a treasurer, if it is required to do so by division (D)(1) of section 3517.10
    of the Revised Code.

    (D) Any expenditure by a political party for the purpose of financing communications
    advocating the election or defeat of a candidate for judicial office shall be
    deemed to be an independent expenditure subject to the provisions of this section.'
