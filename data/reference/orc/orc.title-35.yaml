- number: '3513.03'
  heading: Election officials for primary elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: The board of elections shall have all the powers and perform all the duties
    in connection with primary elections which are imposed by the provisions of Title
    XXXV of the Revised Code governing general elections. The election officials for
    primary elections shall be designated from those appointed under section 3501.22
    of the Revised Code, and shall have the same powers, perform the same duties,
    and be subject to the same penalties as are provided by such title for the conduct
    of general elections.
