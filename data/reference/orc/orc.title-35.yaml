- number: '3506.20'
  heading: Ballots on demand voting system requirements
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A)(1) The secretary of state shall adopt standards for the security and
    integrity of ballots on demand voting systems. Except as otherwise provided in
    division (B) of this section, no ballots on demand voting system shall be approved
    by the board of voting systems examiners, certified by the secretary of state,
    or acquired by the secretary of state or a board of elections, unless it meets
    those standards.

    (2) The standards adopted under division (A)(1) of this section shall do both
    of the following:

    (a) Require that each ballot printed by the system include a tracking number;

    (b) Require that the board of elections provide ballots for each precinct in accordance
    with division (B) of section 3505.11 of the Revised Code.

    (B) Notwithstanding any contrary provision of this chapter, a county that used
    a ballots on demand voting system before the effective date of this section may
    continue to use that system until the county acquires a new ballots on demand
    voting system, which shall meet the requirements of this chapter.'
