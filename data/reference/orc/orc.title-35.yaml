- number: '3511.011'
  heading: Poll list to identify electors requesting absent voter's ballot
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: 'Any section of the Revised Code to the contrary notwithstanding, any person
    who qualifies as a uniformed services voter or an overseas voter who will be eighteen
    years of age or more on the day of a general or special election and who is a
    citizen of the United States may vote uniformed services or overseas absent voter''s
    ballots in such general or special election as follows:

    (A) If an absent uniformed services member is the voter, the service member may
    vote only in the precinct in which the service member has a voting residence in
    the state, and that voting residence shall be that place in the precinct in which
    the service member resided immediately preceding the commencement of such service,
    provided that the time during which the service member continuously resided in
    the state immediately preceding the commencement of such service plus the time
    subsequent to such commencement and prior to the day of such general, special,
    or primary election is equal to or exceeds thirty days.

    (B) If the spouse or dependent of an absent uniformed services member is the voter,
    the spouse or dependent may vote only in the precinct in which the spouse or dependent
    has a voting residence in the state, and that voting residence shall be that place
    in the precinct in which the spouse or dependent resided immediately preceding
    the time of leaving the state for the purpose of being with or near the service
    member, provided that the time during which the spouse or dependent continuously
    resided in the state immediately preceding the time of leaving the state for the
    purpose of being with or near the service member plus the time subsequent to such
    leaving and prior to the day of such general, special, or primary election is
    equal to or exceeds thirty days.

    (C) If an absent uniformed services member or the service member''s spouse or
    dependent establishes a permanent residence in a precinct other than the precinct
    in which the person resided immediately preceding the commencement of the service
    member''s service, the voting residence of both the service member and the service
    member''s spouse or dependent shall be the precinct of such permanent residence,
    provided that the time during which the service member continuously resided in
    the state immediately preceding the commencement of such service plus the time
    subsequent to such commencement and prior to the day of such general, special,
    or primary election is equal to or exceeds thirty days.

    (D)(1) Except as otherwise provided in division (D)(2) of this section, if an
    overseas voter who is not an absent uniformed services voter or the spouse or
    dependent of an absent uniformed services voter is the voter, the overseas voter
    may vote only in the precinct in which the overseas voter has a voting residence
    in the state, and that voting residence shall be that place in the precinct in
    which the overseas voter resided immediately before leaving the United States,
    provided that the time during which the overseas voter continuously resided in
    the state immediately preceding such departure and prior to the day of such general,
    special, or primary election is equal to or exceeds thirty days.

    (2) A person who was born outside of the United States and who meets the definition
    of "overseas voter" under division (B)(3) of section 3511.01 of the Revised Code
    shall be deemed to have a voting residence in this state at that place in the
    precinct in which the person''s parent or guardian last resided immediately before
    leaving the United States, provided that the time during which the person''s parent
    or guardian continuously resided in the state immediately preceding such departure
    and prior to the day of the general, special, or primary election is equal to
    or exceeds thirty days.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.011
- number: '3511.02'
  heading: Application for registration and absent voter's ballot
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: '(A) Notwithstanding any section of the Revised Code to the contrary, whenever
    any person applies for registration as a voter on a form adopted in accordance
    with federal regulations relating to the "Uniformed and Overseas Citizens Absentee
    Voting Act," 100 Stat. 924, 52 U.S.C.A. 20301, this application shall be sufficient
    for voter registration and as a request for an absent voter''s ballot. Uniformed
    services or overseas absent voter''s ballots may be obtained by any person meeting
    the requirements of section 3511.011 of the Revised Code by applying electronically
    to the secretary of state or to the board of elections of the county in which
    the person''s voting residence is located in accordance with section 3511.021
    of the Revised Code or by applying to the board of elections of the county in
    which the person''s voting residence is located, in one of the following ways:

    (1) That person may make written application for those ballots. The person may
    personally deliver the application to the office of the board or may mail it,
    send it by facsimile machine, send it by electronic mail, send it through internet
    delivery if such delivery is offered by the board of elections or the secretary
    of state, or otherwise send it to the board. Except as otherwise provided in division
    (B) of this section, the application shall be on a form prescribed by the secretary
    of state and shall contain all of the following information:

    (a) The elector''s name;

    (b) The elector''s signature;

    (c) The address at which the elector is registered to vote;

    (d) The elector''s date of birth;

    (e) One of the following:

    (i) The elector''s Ohio driver''s license or state identification card number;

    (ii) The last four digits of the elector''s social security number;

    (iii) A copy of the elector''s photo identification.

    (f) A statement identifying the election for which absent voter''s ballots are
    requested;

    (g) A statement that the person requesting the ballots is a qualified elector;

    (h) A statement that the elector is an absent uniformed services voter or overseas
    voter as defined in 52 U.S.C. 20310;

    (i) A statement of the elector''s length of residence in the state immediately
    preceding the commencement of service, immediately preceding the date of leaving
    to be with or near the service member, or immediately preceding leaving the United
    States, or a statement that the elector''s parent or legal guardian resided in
    this state long enough to establish residency for voting purposes immediately
    preceding leaving the United States, whichever is applicable;

    (j) If the request is for primary election ballots, the elector''s party affiliation;

    (k) If the elector desires ballots to be mailed to the elector, the address to
    which those ballots shall be mailed;

    (l) If the elector desires ballots to be sent to the elector by facsimile machine,
    the telephone number to which they shall be so sent;

    (m) If the elector desires ballots to be sent to the elector by electronic mail
    or, if offered by the board of elections or the secretary of state, through internet
    delivery, the elector''s electronic mail address or other internet contact information.

    (2) A voter or any relative of a voter listed in division (A)(3) of this section
    may use a single federal post card application to apply for uniformed services
    or overseas absent voter''s ballots for use at the primary and general elections
    in a given year and any special election to be held on the day in that year specified
    by division (E) of section 3501.01 of the Revised Code for the holding of a primary
    election, designated by the general assembly for the purpose of submitting constitutional
    amendments proposed by the general assembly to the voters of the state. A single
    federal postcard application shall be processed by the board of elections pursuant
    to section 3511.04 of the Revised Code the same as if the voter had applied separately
    for uniformed services or overseas absent voter''s ballots for each election.

    (3) Application to have uniformed services or overseas absent voter''s ballots
    mailed or sent by facsimile machine to such a person may be made by the spouse,
    father, mother, father-in-law, mother-in-law, grandfather, grandmother, brother
    or sister of the whole blood or half blood, son, daughter, adopting parent, adopted
    child, stepparent, stepchild, daughter-in-law, son-in-law, uncle, aunt, nephew,
    or niece of such a person. The application shall be in writing upon a blank form
    furnished only by the board or on a single federal post card as provided in division
    (A)(2) of this section. The form of the application shall be prescribed by the
    secretary of state. The board shall furnish that blank form to any of the relatives
    specified in this division desiring to make the application, only upon the request
    of such a relative made in person at the office of the board or upon the written
    request of such a relative mailed to the office of the board. Except as otherwise
    provided in division (B) of this section, the application, subscribed and sworn
    to by the applicant, shall contain all of the following:

    (a) The full name of the elector for whom ballots are requested;

    (b) A statement that the elector is an absent uniformed services voter or overseas
    voter as defined in 52 U.S.C. 20310;

    (c) The address at which the elector is registered to vote;

    (d) A statement identifying the elector''s length of residence in the state immediately
    preceding the commencement of service, immediately preceding the date of leaving
    to be with or near a service member, or immediately preceding leaving the United
    States, or a statement that the elector''s parent or legal guardian resided in
    this state long enough to establish residency for voting purposes immediately
    preceding leaving the United States, as the case may be;

    (e) The elector''s date of birth;

    (f) One of the following:

    (i) The elector''s Ohio driver''s license or state identification card number;

    (ii) The last four digits of the elector''s social security number;

    (iii) A copy of the elector''s photo identification.

    (g) A statement identifying the election for which absent voter''s ballots are
    requested;

    (h) A statement that the person requesting the ballots is a qualified elector;

    (i) If the request is for primary election ballots, the elector''s party affiliation;

    (j) A statement that the applicant bears a relationship to the elector as specified
    in division (A)(3) of this section;

    (k) The address to which ballots shall be mailed, the telephone number to which
    ballots shall be sent by facsimile machine, the electronic mail address to which
    ballots shall be sent by electronic mail, or, if internet delivery is offered
    by the board of elections or the secretary of state, the internet contact information
    to which ballots shall be sent through internet delivery;

    (l) The signature and address of the person making the application.

    (B) If the elector has a confidential voter registration record, as described
    in section 111.44 of the Revised Code, the application may include the elector''s
    program participant identification number instead of the address at which the
    elector is registered to vote.

    (C) Each application for uniformed services or overseas absent voter''s ballots
    shall be delivered to the office of the board not earlier than the first day of
    January of the year of the elections for which the uniformed services or overseas
    absent voter''s ballots are requested or not earlier than ninety days before the
    day of the election at which the ballots are to be voted, whichever is earlier.
    An application to receive uniformed services or overseas absent voter''s ballots
    by mail or by another method permitted under section 3511.021 of the Revised Code
    shall be delivered to the office of the board not later than the close of business
    on the seventh day preceding the day of the election.

    (D) If the voter for whom the application is made is entitled to vote for presidential
    and vice-presidential electors only, the applicant shall submit to the board,
    in addition to the requirements of division (A) of this section, a statement to
    the effect that the voter is qualified to vote for presidential and vice-presidential
    electors and for no other offices.

    (E) Except as permitted under section 111.31 of the Revised Code, no public office,
    and no public official or employee who is acting in an official capacity, shall
    do either of the following:

    (1) Prepay the return postage for an application for absent voter''s ballots;

    (2) Mail or otherwise deliver an unsolicited application for absent voter''s ballots
    to any person.

    (F)(1) Except as otherwise provided in divisions (A)(2) and (3) and (F)(2) of
    this section and in sections 3505.24 and 3509.08 of the Revised Code, no person
    shall fill out any portion of a federal post card application or other application
    for absent voter''s ballots on behalf of an applicant.

    (2) The secretary of state or a board of elections may preprint only an applicant''s
    name and address on a federal post card application or other application for absent
    voter''s ballots before mailing that application to the applicant, except that
    if the applicant has a confidential voter registration record, the secretary of
    state or the board of elections shall not preprint the applicant''s address on
    the application.

    (3) A completed application for absent voter''s ballots is not valid if any portion
    of it has been completed by any person other than the applicant in violation of
    division (F) of this section.'
