- number: '3517.171'
  heading: '[Former R.C. 3517.993, amended and renumbered as R.C. 3517.171 by H.B.
    96, 136th General Assembly, effective 9/30/2025] Administrative fines'
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A)(1) Except as otherwise provided in divisions (A)(2) and (D) of this section,
    when section 3517.17 of the Revised Code authorizes the imposition of an administrative
    fine, the secretary of state or the Ohio election integrity commission, as applicable,
    may impose an administrative fine for each violation that does not exceed the
    maximum fine a court could impose for the violation.

    (2) When section 3517.17 of the Revised Code authorizes the imposition of an administrative
    fine for a violation of a provision in sections 3501.35, 3599.13, 3599.14, or
    3599.21, division (A) of section 3599.11, or division (A)(1) or (2) of section
    3599.12 of the Revised Code, the secretary of state or the commission, as applicable,
    may impose an administrative fine of up to one thousand dollars for each violation.

    (B)(1) The secretary of state or the commission, as applicable, shall consider
    any of the following circumstances in determining whether to impose a maximum
    fine under division (A) of this section:

    (a) Whether the violator has been found guilty of any other violation of section
    145.054, 742.043, 3307.073, 3309.073, or 5505.045 or Title XXXV of the Revised
    Code;

    (b) Whether the violation was made knowingly or purposely;

    (c) Whether any relevant statements, addenda, or affidavits required to be filed
    have not been filed;

    (d) Whether the violator has any outstanding fines imposed for a violation of
    section 145.054, 742.043, 3307.073, 3309.073, or 5505.045 or Title XXXV of the
    Revised Code;

    (e) Whether the violation occurred during the course of a campaign.

    (2) The secretary of state or the commission, as applicable, shall consider any
    of the following circumstances in determining whether to impose a lesser fine
    under division (A) of this section:

    (a) Whether the violator previously has not been found guilty of any other violation
    of section 145.054, 742.043, 3307.073, 3309.073, or 5505.045 or Title XXXV of
    the Revised Code;

    (b) Whether the violator has promptly corrected the violator''s violation;

    (c) Whether the nature and circumstances of the violation merit a lesser fine;

    (d) Whether there are substantial grounds tending to excuse or justify the violation,
    although failing to establish a defense to the violation;

    (e) Whether the violation was not purposely committed.

    (3) The circumstances set forth in divisions (B)(1) and (2) of this section shall
    be considered by, but shall not control the decision of, the secretary of state
    or the commission, as applicable, in imposing a fine.

    (D) Notwithstanding divisions (A), (B), and (C) of this section, when section
    3517.17 of the Revised Code authorizes the imposition of an administrative fine
    with respect to an act or failure to act that occurred before the effective date
    of this section, the secretary of state or the commission, as applicable, shall
    impose the fine authorized under the Revised Code and, if applicable, under the
    rules of the Ohio elections commission, as they existed at the time of the violation.

    (E)(1) Fines imposed under this section shall be deposited into the Ohio election
    integrity commission fund created by section 111.29 of the Revised Code.

    (2) The secretary of state shall certify to the attorney general for collection
    under section 131.02 of the Revised Code the amount of any fine imposed by the
    secretary of state, by the Ohio election integrity commission, or by the Ohio
    elections commission under this section or under a former version of this section
    that is not paid within forty-five days after it is imposed.'
