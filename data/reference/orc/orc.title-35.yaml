- number: '3506.07'
  heading: Automatic tabulating equipment
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: No automatic tabulating equipment shall be approved by the board of voting
    systems examiners or certified by the secretary of state, or be purchased, rented,
    or otherwise acquired, or used, unless it has been or is capable of being manufactured
    for use and distribution beyond a prototype and can be set by election officials,
    to examine ballots and to count votes accurately for each candidate, question,
    and issue, excluding any ballots marked contrary to the instructions printed on
    such ballots, provided that such equipment shall not be required to count write-in
    votes or the votes on any ballots that have been voted other than at the regular
    polling place on election day.
