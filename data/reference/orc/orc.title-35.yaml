- number: '3506.16'
  heading: Voter registration system requirements
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A) The secretary of state shall adopt standards for the security and integrity
    of voter registration systems. Except as otherwise provided in division (B) of
    this section, no voter registration system shall be approved by the board of voting
    systems examiners, certified by the secretary of state, or acquired by the secretary
    of state or a board of elections, unless it meets those standards.

    (B) Notwithstanding any contrary provision of this chapter, a county that used
    a voter registration system before the effective date of this section may continue
    to use that system until the county acquires a new voter registration system,
    which shall meet the requirements of this chapter.'
