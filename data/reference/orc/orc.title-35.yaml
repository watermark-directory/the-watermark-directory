- number: '3517.12'
  heading: Itemized statement of expenditures on issues
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A) Prior to receiving a contribution or making an expenditure, the circulator
    or committee in charge of an initiative or referendum petition, or supplementary
    petition for additional signatures, for the submission of a constitutional amendment,
    proposed law, section, or item of any law shall appoint a treasurer and shall
    file with the secretary of state, on a form prescribed by the secretary of state,
    a designation of that appointment, including the full name and address of the
    treasurer and of the circulator or committee.

    (B) The circulator or the committee in charge of an initiative or referendum petition,
    or supplementary petition for additional signatures, for the submission of a constitutional
    amendment, proposed law, section, or item of any law shall, within thirty days
    after those petition papers are filed, file with the secretary of state, on a
    form prescribed by the secretary of state, an itemized statement, made under penalty
    of election falsification, showing in detail the following:

    (1) All money or things of value paid, given, promised, or received for circulating
    the petitions;

    (2) All appointments, promotions, or increases in salary, in positions which were
    given, promised, or received, or to obtain which assistance was given, promised,
    or received as a consideration for work done in circulating petitions;

    (3) Full names and addresses, including street, city, and state, of all persons
    to whom such payments or promises were made and of all persons from whom such
    payments or promises were received;

    (4) Full names and addresses, including street, city, and state, of all persons
    who contributed anything of value to be used in circulating the petitions, and
    the amounts of those contributions;

    (5) Time spent and salaries earned while soliciting signatures to petitions by
    persons who were regular salaried employees of some person or whom that employer
    authorized to solicit as part of their regular duties.

    If no money or things of value were paid or received or if no promises were made
    or received as a consideration for work done in circulating a petition, the statement
    shall contain words to that effect.

    (C) The treasurer designated under division (A) of this section shall file statements
    of contributions and expenditures in accordance with section 3517.10 of the Revised
    Code regarding all contributions made or received and all expenditures made by
    that treasurer or the circulator or committee in connection with the initiative
    or referendum petition, or supplementary petition for additional signatures, for
    the submission of a constitutional amendment, proposed law, section, or item of
    any law.'
