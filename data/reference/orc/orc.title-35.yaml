- number: '3506.12'
  heading: County board to combine, rearrange or enlarge precincts - counting stations
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: 'In counties where marking devices, automatic tabulating equipment, voting
    machines, or any combination of these are in use or are to be used, the board
    of elections:

    (A) May combine, rearrange, and enlarge precincts; but the board shall arrange
    for a sufficient number of these devices to accommodate the number of electors
    in each precinct as determined by the number of votes cast in that precinct at
    the most recent election for the office of governor, taking into consideration
    the size and location of each selected polling place, available parking, accessibility
    for persons with disabilities and other accessibility to the polling place, and
    the number of candidates and issues to be voted on. Notwithstanding section 3501.22
    of the Revised Code, the board may appoint more than four precinct officers to
    each precinct if this is made necessary by the number of voting machines to be
    used in that precinct.

    (B) Except as otherwise provided in this division, shall establish one or more
    counting stations to receive voted ballots and other precinct election supplies
    after the polling precincts are closed. Those stations shall be under the supervision
    and direction of the board of elections. Processing and counting of voted ballots,
    and the preparation of summary sheets, shall be done in the presence of observers
    approved by the board. A certified copy of the summary sheet for the precinct
    shall be posted at each counting station immediately after completion of the summary
    sheet.'
