    petition the office to which he seeks such nomination shall, if two or more judges
    of the same court are to be elected at any one election, designate the term of
    the office for election to which he seeks such nomination by stating therein,
    if a full term, the date of the commencement of such term as follows: "Full term
    commencing ____________________________(Date) ___________________________," or
    by stating therein, if an unexpired term, the date on which such unexpired term
    will end as follows: "Unexpired term ending ____________________________ (Date)
    __________________________," and such candidate shall be nominated only for the
    term so designated.

    Each independent candidate for the unexpired term of any office shall designate
    in his statement of candidacy the date on which such unexpired term will end.'
