- number: '3513.122'
  heading: Electing delegates and alternates to other national conventions or conferences
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'Political parties shall be eligible to elect delegates and alternates to
    national conventions or conferences of their respective political parties, other
    than conventions provided for in section 3513.12 of the Revised Code, if they
    notify the secretary of state that they will elect such delegates. Such notification
    must be made prior to the one hundred fifth day before the day of the primary
    election which occurs in any year at which national convention or conference delegates
    and alternates are elected.

    Petitions of candidacy for such delegates shall be filed in the form and manner
    provided by the secretary of state.

    Any political party electing delegates to a national convention or conference
    under this section in an odd-numbered year in which a statewide primary election
    is not otherwise required shall pay all expenses of that election.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.122
- number: '3513.13'
  heading: Separate primary election ballots for political parties
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'Separate primary election ballots shall be provided by the board of elections
    for each political party having candidates for nomination or election in a primary
    election. Section 3505.08 of the Revised Code governing the kind of paper, the
    kind of ink, and the size and style of type to be used in the printing of ballots
    for general elections shall apply in the printing of ballots for primary elections.

    Primary election ballots shall have printed on the back thereof "Official ____________
    (name of party) __________ primary ballot," the date of the election, and the
    facsimile signatures of the members of the board.

    Such ballots shall have stubs attached at the top thereof as required on ballots
    for general elections.

    On the back of every ballot used there shall be a solid black line printed opposite
    the blank rectangular space that is used to mark the choice of the voter. This
    line shall be printed wide enough so that the mark in the blank rectangular space
    will not be visible from the back side of the ballot.

    Such ballots shall have printed at the top thereof and below the stubs "Official
    __________ (name of party) ___________ primary ballot" and instructions to the
    voter to the effect that to vote for a candidate the voter shall record the vote
    in the manner provided on the ballot next to the name of such candidate, except
    as provided in section 3513.151 of the Revised Code, and that if he tears, soils,
    defaces, or erroneously marks the ballot he may return it to the precinct election
    officers and obtain another ballot.

    Except as provided in section 3513.151 of the Revised Code, primary election ballots
    shall contain the names of all persons whose declarations of candidacy and petitions
    have been determined to be valid. The name of each candidate for nomination for,
    or election to, an office or position shall be printed in an enclosed rectangular
    space at the left of which an enclosed blank rectangular space shall be provided.
    The names of candidates shall be printed on the ballot immediately below the title
    of the office or position for nomination or election to which the candidate seeks
    nomination or election. The order in which offices and positions shall be listed
    on the ballot shall be prescribed by and shall be certified to each board by the
    secretary of state, and shall be the same, to the extent the secretary of state
    deems practicable, as is provided for the listing of offices on general election
    ballots.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.13
- number: '3513.131'
  heading: Candidates with identical surnames
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'In the event two or more persons with identical surnames run for the same
    office in a primary election on the same ballot, the names of the candidates shall
    be differentiated on the ballot by varying combinations of first and middle names
    and initials. Within twenty-four hours after the final date for filing declarations
    of candidacy or petitions for candidacy, the director of the board of elections
    for local, municipal, county, general, or special elections, or the director of
    the board of elections of the most populous county for district, general, or special
    elections, or the secretary of state for state-wide general and special elections
    shall notify the persons with identical given names and surnames that the names
    of such persons will be differentiated on the ballot. If one of the candidates
    is an incumbent who is a candidate to succeed self for the office the incumbent
    occupies, the incumbent shall have first choice of the name by which the incumbent
    is designated on the ballot. If an incumbent does not make a choice within two
    days after notification or if none of the candidates is an incumbent, the board
    of elections within three days after notification shall designate the names by
    which the candidates are identified on the ballot. In case of a district candidate
    the board of elections in the most populous county shall make the determination.
    In case of state-wide candidates, or in the case any board of elections fails
    to make a designation within three days after notification, the secretary of state
    shall immediately make the determination.

    "Notification" as required by this section shall be by the director of the board
    of elections or secretary of state by certified mail at the candidate''s address
    listed in the candidate''s declaration or petition of candidacy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.131
- number: '3513.14'
  heading: Primary election ballot form
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'Except in elections for which the board of elections has received no valid
    declarations of intent to be a write-in candidate under section 3513.041 of the
    Revised Code, immediately below the title of each office for which nominations
    are to be made and the names of candidates for such nomination printed thereunder,
    there shall be provided on each primary election ballot as many blank spaces as,
    but not more than, the number of nominations to be made for such office, in which
    the voter may write the names of persons for whose nomination he desires to vote,
    provided that inasmuch as candidates for the office of delegate and alternate
    to the national and state conventions, member of the state central committee,
    and member of the county central committee are elected at the primary election
    no blank space shall be left on the ballot after the names of the candidates for
    such office, and no vote shall be counted for any person whose name has been written
    in on said ballot for any of such offices. If no person files and qualifies as
    a candidate for the office of member of the state central committee or member
    of the county central committee such office shall not appear on the ballot.

    The face of the ballot below the stub shall be substantially in the following
    form:

    OFFICIAL ____________(name of party)__________

    PRIMARY BALLOT

    (A) To vote for a candidate record your vote in the manner provided next to the
    name of such candidate.

    (B) If you tear, soil, deface, or erroneously mark this ballot return it to the
    election officials and obtain another.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.14
- number: '3513.141'
  heading: Ranked choice voting in primaries prohibited
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) Except as otherwise permitted under Article X or Article XVIII, Ohio
    Constitution, no primary election shall be conducted in this state using ranked
    choice voting or instant runoff voting.

    (B) If the secretary of state determines that a county or municipal corporation
    has, by resolution or ordinance, approved the use of ranked choice voting or instant
    runoff voting in a primary election, then the county or municipal corporation
    is ineligible to receive any local government fund distributions from the state
    during the period beginning with the month following the adoption of the resolution
    or ordinance and ending with the month following the last day it is in effect.
    Upon making that determination, the secretary of state promptly shall notify the
    tax commissioner of the county or municipal corporation''s ineligibility.

    (C) Upon determining that a county or municipal corporation has, by resolution
    or ordinance, rescinded previous approval for the use of ranked choice voting
    that resulted in notice to the tax commissioner under division (B) of this section,
    the secretary of state shall promptly notify the tax commissioner of the rescission.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.141
- number: '3513.15'
  heading: Rotating names of candidates on ballot
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'The names of the candidates in each group of two or more candidates seeking
    the same nomination or election at a primary election, except delegates and alternates
    to the national convention of a political party, shall be rotated and printed
    as provided in section 3505.03 of the Revised Code, except that no indication
    of membership in or affiliation with a political party shall be printed after
    or under the candidate''s name. When the names of the first choices for president
    of candidates for delegate and alternate are not grouped with the names of such
    candidates, the names of the first choices for president shall be rotated in the
    same manner as the names of candidates. The specific form and size of the ballot
    shall be prescribed by the secretary of state in compliance with this chapter.

    It shall not be necessary to have the names of candidates for member of a county
    central committee printed on the ballots provided for absentee voters, and the
    board may cause the names of such candidates to be written on said ballots in
    the spaces provided therefor.

    The secretary of state shall prescribe the procedure for rotating the names of
    candidates on the ballot and the form of the ballot for the election of delegates
    and alternates to the national convention of a political party in accordance with
    section 3513.151 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.15
- number: '3513.151'
  heading: Arrangement of names of candidates for delegate and alternate to national
    convention of political party
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) Candidates for delegate and alternate to the national convention of a
    political party shall be represented on the ballot, or their names shall appear
    on the ballot, in accordance with this section, but only in a manner that enables
    an elector to record the vote in the space provided for it by the name of the
    first choice for president so that the recording of the vote is counted as a vote
    cast for each candidate for delegate or alternate who has declared such person
    as that candidate''s first choice for president.

    (B) The names of candidates for delegate at large and alternate at large to the
    national convention of a political party shall not appear on the ballot. Such
    candidates shall be represented on the ballot by their stated first choice for
    president.

    (C) The state central committee of each major political party, through its chairperson,
    not later than ninety days prior to the date of the presidential primary election,
    shall file with the secretary of state a statement that stipulates, in accordance
    with rules adopted by each state central committee at a meeting open to all members
    of the committee''s party, whether or not the names of candidates for district
    delegate and district alternate to the national convention of that chairperson''s
    party are to be printed on the ballot. The secretary of state shall prescribe
    the form of the ballot for the election of district delegates and district alternates
    of each political party in accordance with such statement. If the state central
    committee of a political party fails to so provide such statement, the secretary
    of state shall prescribe a form of ballot on which the names of candidates for
    delegate and alternate to such national convention do not appear on the ballot.
    Only the names of the presidential first choices of such candidates for delegates
    and alternates shall appear on the ballot. If only the names of presidential first
    choices are printed, the ballot shall provide the opportunity for an elector to
    record the vote in the appropriate space provided beside such names and such a
    vote cast shall be counted as a vote for each candidate for delegate and alternate
    who has declared such person as that candidate''s first choice for president.

    If the number of candidates for district delegate or for district alternate to
    the national convention of a political party exceeds the number to be elected,
    the names of such candidates, when required to appear on the ballot, shall not
    be rotated, but shall be printed in a group on the ballot in alphabetical order
    immediately below or beside first choice for president. This form of the ballot
    shall be prescribed by the secretary so that the recording of the vote in the
    space provided beside the name of such choice for president shall be a vote for
    each candidate whose name is included in the grouping.

    (D) Candidates, grouped by first choice for president, shall be rotated in the
    same manner as though each grouping were a separate candidate. As many series
    of ballots shall be printed as the number of groups to be rotated, with the total
    number of ballots to be printed divided by the number of series to be printed
    in order to determine the number of ballots to be printed of each series. On the
    first series of ballots, the candidates shall be alphabetically grouped by their
    first choice for president. On each succeeding series, the group of candidates
    that was the first in the preceding series shall be last and each of the other
    groups shall be moved up one place. The ballots shall be rotated and printed as
    provided in section 3505.03 of the Revised Code, except that no indication of
    membership in or affiliation with a political party shall be printed after or
    under the candidate''s name.

    (E) The state central committee of each major political party, through its chairperson,
    not later than the fifteenth day prior to the date of the presidential primary
    election, shall file with the secretary of state the rules of its political party
    adopted by the state central committee at a meeting open to all members of the
    committee''s party, which affect the issuance of certificates of election to candidates
    for delegate or alternate to its party nominating convention, and the secretary
    of state shall issue certificates of election in accordance with such rules.

    (F) If party rules prescribe that fewer than all such candidates for delegate
    and alternate are to be elected, certificates of election shall be issued in the
    order preferred by the first choice for president and in such numbers that the
    number of delegates and alternates certified as elected reflects, as nearly as
    possible, the proportion to be elected under the party rules.

    (G) If the state central committee of a political party fails to file the rules
    with the secretary of state pursuant to this section, certificates of election
    shall be issued to the candidates for delegate and alternate receiving the highest
    number of votes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.151
- number: '3513.16'
  heading: Designation of term for judge of court of common pleas on primary ballot
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: When two or more judges of the court of common pleas are to be elected in
    a county at any one election, the name of each candidate shall be placed upon
    the primary ballot under the designation of the term for which he is a candidate.
    Such designation shall correspond to that required by section 3513.08 of the Revised
    Code. The candidates for each term so designated shall be candidates for that
    term only, unless two or more new judgeships have been created, in which case
    from all candidates for a newly-created judgeship those receiving the highest
    number of votes shall be nominated.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.16
- number: '3513.17'
  heading: Death of candidate before primary election
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'If a person who has filed a declaration of candidacy, whose candidacy is
    to be submitted at a primary election to the electors of the entire state, dies
    prior to the tenth day before the day of such primary election, the secretary
    of state, upon proof of the death of such candidate, shall make certification
    of such death to the boards of elections of the state, and the name of such deceased
    candidate shall not appear on the ballots.

    If a person who has filed a declaration of candidacy, whose candidacy is to be
    submitted at a primary election to the electors of a district comprised of more
    than one county but less than all the counties of the state, dies prior to the
    tenth day before the day of such primary election, the board of the most populous
    county of such district shall, upon proof of the death of such candidate, make
    certification of such death to the boards of such district, and the name of such
    deceased candidate shall not appear on the ballots.

    If a person who has filed a declaration of candidacy, whose candidacy is to be
    submitted at a primary election to the electors of a subdivision smaller than
    a county but situated in more than one county, dies prior to the tenth day before
    the day of such primary election, the board of the county in which the major portion
    of the population of such subdivision is located shall, upon proof of the death
    of such candidate, make certification of such death to the boards of the other
    counties in which portions of the population of such subdivision are located,
    and the name of such deceased candidate shall not appear on the ballots.

    If a person who has filed a declaration of candidacy, whose candidacy is to be
    submitted at a primary election to the electors of a county, or district or subdivision
    within a county, dies prior to the fifth day before the day of such primary election,
    upon proof of the death of such candidate to the board, the name of such deceased
    candidate shall not appear on the ballots.

    If, at the time such certification or proof of death of a candidate is received
    by a board, ballots carrying the name of the deceased candidate have been printed,
    such board shall cause strips of paper to be pasted on such ballots so as to cover
    the name of the deceased candidate before such ballots are delivered to electors;
    except that in voting places using marking devices, the board shall cause strips
    of paper bearing the revised list of candidates for the office, after eliminating
    the deceased candidate''s name, to be pasted on such ballot cards so as to cover
    the name or names formerly shown, before such ballot cards are delivered to the
    electors.

    In no case shall votes cast for a deceased candidate be counted or recorded.'
  history: null
