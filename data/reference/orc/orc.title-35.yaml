- number: '3511.09'
  heading: Voting procedure
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: '(A) Upon receiving uniformed services or overseas absent voter''s ballots,
    the elector shall cause the questions on the face of the identification envelope
    to be answered, and, by writing the elector''s usual signature in the proper place
    on the identification envelope, the elector shall declare under penalty of election
    falsification that the answers to those questions are true and correct to the
    best of the elector''s knowledge and belief. Then, the elector shall note whether
    there are any voting marks on the ballot. If there are any voting marks, the ballot
    shall be returned immediately to the board of elections; otherwise, the elector
    shall cause the ballot to be marked, folded separately so as to conceal the markings
    on it, deposited in the identification envelope, and securely sealed in the identification
    envelope. The elector shall sign the identification envelope not later than the
    close of the polls on the day of the election. The elector then shall cause the
    identification envelope to be placed within the return envelope, sealed in the
    return envelope, and mailed to the board of elections to which it is addressed.

    (B) The elector shall provide one of the following:

    (1) The elector''s Ohio driver''s license or state identification card number
    on the statement of voter on the identification envelope;

    (2) The last four digits of the elector''s social security number on the statement
    of voter on the identification envelope;

    (3) A copy of the elector''s photo identification in the return envelope with
    the identification envelope.

    (C) Every uniformed services or overseas absent voter''s ballot identification
    envelope shall be accompanied by the following statement in boldface capital letters:
    WHOEVER COMMITS ELECTION FALSIFICATION IS GUILTY OF A FELONY OF THE FIFTH DEGREE.

    (D) The elector shall cause the uniformed services or overseas absent voter''s
    ballots to be returned to the office of the board of elections in a manner described
    in division (C) of section 3509.05 of the Revised Code, provided that the elector
    shall not be required to prepay the postage on the return envelope if, under 39
    U.S.C. 3406, no postage is required.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.09
- number: '3511.10'
  heading: Voting at board of elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: A uniformed services or overseas absent voter may cast absent voter's ballots
    in person at the office of the board of elections in accordance with section 3509.051
    of the Revised Code. If thereafter, and before the close of business on the seventh
    day preceding such election, the board provides additional separate official issue
    or special election ballots, as provided for in section 3511.04 of the Revised
    Code, the board shall promptly, and not later than the close of business on the
    seventh day preceding the day of election, mail such additional ballots to such
    person at the address specified by that person for that purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.10
- number: '3511.11'
  heading: Procedure upon board receiving ballots
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: '(A) Uniformed services or overseas absent voter''s ballots delivered to the
    office of the board of elections not later than the close of the polls on election
    day shall be processed and counted in the manner provided in section 3509.06 of
    the Revised Code.

    (B) A return envelope is not required to be postmarked in order for a uniformed
    services or overseas absent voter''s ballot contained in it to be valid. Except
    as otherwise provided in this division, whether or not the return envelope containing
    the ballot is postmarked, contains a late postmark, or contains an illegible postmark,
    a uniformed services or overseas absent voter''s ballot that is received by mail
    after the close of the polls on election day through the fourth day after the
    election day shall be processed and counted on the fifth day after the election
    day at the office of the board of elections in the manner provided in section
    3509.06 of the Revised Code if the voter signed the identification envelope by
    the close of the polls on election day. However, if a return envelope containing
    a uniformed services or overseas absent voter''s ballot is so received, but the
    identification envelope in it is signed after the close of the polls on election
    day, the uniformed services or overseas absent voter''s ballot shall not be counted.

    (C) The following types of uniformed services or overseas absent voter''s ballots
    shall not be counted:

    (1) Uniformed services or overseas absent voter''s ballots that are received by
    the board of elections after the close of the polls on the day of the election,
    and that contain an identification envelope that is signed after the close of
    the polls on election day;

    (2) Uniformed services or overseas absent voter''s ballots that are received after
    the fourth day following the election.

    The uncounted ballots shall be preserved in their identification envelopes unopened
    until the time provided by section 3505.31 of the Revised Code for the destruction
    of all other ballots used at the election for which ballots were provided, at
    which time they shall be destroyed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.11
- number: '3511.12'
  heading: Counting armed service absent voter's ballots
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: In counting uniformed services or overseas absent voter's ballots pursuant
    to section 3511.11 of the Revised Code, the name of each voter, followed by "Uniformed
    Services or Overseas Absent Voter's Ballot," shall be written in the poll book
    or poll list together with such notations as will indicate the kinds of ballots
    the envelope contained, except that if the voter has a confidential voter registration
    record, as described in section 111.44 of the Revised Code, that information shall
    be marked in the voter's registration record but not in the poll book or poll
    list. If any challenge is made and sustained, the identification envelope of such
    voter shall not be opened and shall be indorsed "not counted" with the reasons
    therefor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.12
- number: '3511.13'
  heading: Poll list to identify electors requesting armed services absent voter's
    ballot
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: '(A) The poll list or signature pollbook for each precinct shall identify
    each registered elector in that precinct who has requested a uniformed services
    or overseas absent voter''s ballot for that election or cast absent voter''s ballots
    in person under section 3509.051 of the Revised Code, other than an elector who
    has a confidential voter registration record, as described in section 111.44 of
    the Revised Code.

    (B) If a registered elector appears to vote and that elector has requested or
    cast a uniformed services or overseas absent voter''s ballot for that election,
    the elector shall be permitted to cast a provisional ballot under section 3505.181
    of the Revised Code.

    (C)(1) In counting uniformed services or overseas absent voter''s ballots under
    section 3511.11 of the Revised Code, the board of elections shall compare the
    signature of each elector from whom the board has received a sealed identification
    envelope purporting to contain that elector''s voted uniformed services or overseas
    absent voter''s ballots for that election to the signature on the elector''s registration
    form. Except as otherwise provided in division (C)(3) of this section, if the
    board of elections determines that the uniformed services or overseas absent voter''s
    ballot in the sealed identification envelope is valid, it shall be counted. If
    the board of elections determines that the signature on the sealed identification
    envelope purporting to contain the elector''s voted uniformed services or overseas
    absent voter''s ballot does not match the signature on the elector''s registration
    form, the ballot shall be set aside and the board shall examine, during the time
    prior to the beginning of the official canvass, the poll list or signature pollbook
    from the precinct in which the elector is registered to vote to determine if the
    elector also cast a provisional ballot under section 3505.181 of the Revised Code.

    (2) The board of elections shall count the provisional ballot, instead of the
    uniformed services or overseas absent voter''s ballot, of an elector from whom
    the board has received an identification envelope purporting to contain that elector''s
    voted uniformed services or overseas absent voter''s ballots, if both of the following
    apply:

    (a) The board of elections determines that the signature of the elector on the
    outside of the identification envelope in which the uniformed services or overseas
    absent voter''s ballots are enclosed does not match the signature of the elector
    on the elector''s registration form;

    (b) The elector cast a provisional ballot in the election.

    (3) If the board of elections does not receive the sealed identification envelope
    purporting to contain the elector''s voted uniformed services or overseas absent
    voter''s ballot by the applicable deadline established under section 3511.11 of
    the Revised Code, the provisional ballot cast under section 3505.181 of the Revised
    Code shall be counted as valid, if that provisional ballot is otherwise determined
    to be valid pursuant to section 3505.183 of the Revised Code.

    (D) If the board of elections counts a provisional ballot under division (C)(2)
    or (3) of this section, the returned identification envelope of that elector shall
    not be opened, and the ballot within that envelope shall not be counted. The identification
    envelope shall be endorsed "Not Counted" with the reason the ballot was not counted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.13
- number: '3511.14'
  heading: Acceptance and processing of federal write-in ballots
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: '(A) A board of elections shall accept and process federal write-in absentee
    ballots for all elections for office and for all ballot questions and issues as
    required under "The Uniformed and Overseas Citizens Absentee Voting Act," Pub.
    L. No. 99-410, 100 Stat. 924, 42 U.S.C. 1973ff, et seq., as amended.

    (B) A uniformed services or overseas voter may use the declaration accompanying
    a federal write-in absentee ballot to apply to register to vote simultaneously
    with the submission of the federal write-in absentee ballot, if the declaration
    is received not later than thirty days before the day of the election. If the
    declaration is received after that date, the declaration shall be considered an
    application to register to vote for all subsequent elections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.14
- number: '3511.15'
  heading: Emergency absentee voting procedures
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: If an international, national, state, or local emergency or other situation
    arises that makes substantial compliance with the "Uniformed and Overseas Citizens
    Absentee Voting Act," 42 U.S.C. 1973ff, et seq., as amended, impossible or impracticable,
    as confirmed by the existence of armed conflict involving United States armed
    forces or the mobilization of those forces, including Ohio national guard and
    reserve component members of this state, or by the occurrence of a natural disaster
    or the existence of a state of emergency, civil unrest, war, or other exigency
    in a foreign country, or by an official declaration by the governor that a state
    of emergency exists, the governor directly, or by delegation to the secretary
    of state, may prescribe, by emergency order or rule, a special procedure or requirement
    as may be necessary to facilitate absent voting by those absent uniformed services
    voters or overseas voters directly affected who are eligible to vote in this state.
    The secretary of state shall take reasonable steps to provide absent uniformed
    services or overseas voters with timely notice of any special procedure or requirement
    prescribed under this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.15
- number: '3511.16'
  heading: Election notice to be used with federal write-in absentee ballot
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: '(A) At least one hundred days before the day of a regularly scheduled election
    and as soon as practicable before an election that is not regularly scheduled,
    the board of elections of each county shall prepare an election notice for each
    precinct in which the election is to be conducted, to be used in conjunction with
    a federal write-in absentee ballot. The election notice shall contain a list of
    all of the ballot questions and issues and all federal, state, and local offices
    that, as of that date, the board expects to be on the ballot at that election.
    The notice also shall contain specific instructions on how a uniformed services
    or overseas voter is to indicate on the federal write-in absentee ballot the voter''s
    choice for each office to be filled and for each ballot question and issue to
    be contested.

    (B) A uniformed services or overseas voter may request a copy of an election notice
    prepared under division (A) of this section. The board of elections shall send
    the notice to the voter by facsimile transmission, electronic mail, or regular
    mail, as the voter requests.

    (C) As soon as the form of the ballot is certified, and not later than the date
    uniformed services and overseas ballots are required to be transmitted to voters
    under section 3509.01 of the Revised Code, the board shall update the notice with
    the certified candidates for each office and ballot questions and issues and make
    the updated notice publicly available.

    (D) A board of elections that maintains an internet web site shall make the election
    notice prepared under division (A) of this section and updated versions of the
    election notice regularly available on that web site.'
