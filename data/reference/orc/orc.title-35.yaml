- number: '3501.381'
  heading: Compensation regarding signature gathering activities - forms to be filed
    with secretary of state
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A)(1) Any person who will receive compensation for supervising, managing,
    or otherwise organizing any effort to obtain signatures for a declaration of candidacy,
    nominating petition, or declaration of intent to be a write-in candidate for a
    person seeking to become a statewide candidate, for a statewide initiative petition
    or a statewide referendum petition, or for a party formation petition described
    in division (A)(1)(b) of section 3517.01 of the Revised Code shall file a statement
    to that effect with the office of the secretary of state before any signatures
    are obtained for the petition or before the person is engaged to supervise, manage,
    or otherwise organize the effort to obtain signatures for the petition, whichever
    is later.

    (2) Any person who will compensate a person for supervising, managing, or otherwise
    organizing any effort to obtain signatures for a declaration of candidacy, nominating
    petition, or declaration of intent to be a write-in candidate for a person seeking
    to become a statewide candidate, for a statewide initiative or a statewide referendum
    petition, or for a party formation petition described in division (A)(1)(b) of
    section 3517.01 of the Revised Code shall file a statement to that effect with
    the office of the secretary of state before any signatures are obtained for the
    petition or before the person engages a person to supervise, manage, or otherwise
    organize the effort to obtain signatures for the petition, whichever is later.

    (B) The secretary of state shall prescribe the form and content of the statements
    required under division (A) of this section.

    (C) Whoever violates division (A) of this section is guilty of a misdemeanor of
    the first degree, and the petition for which a person was compensated for supervising,
    managing, or otherwise organizing the effort to obtain signatures shall be deemed
    invalid.

    (D) As used in this section, "statewide candidate" means the joint candidates
    for the offices of governor and lieutenant governor or a candidate for the office
    of secretary of state, auditor of state, treasurer of state, or attorney general.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.381
- number: '3501.382'
  heading: Attorney in fact may sign for disabled voter
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A)(1) A registered voter who, by reason of disability, is unable to physically
    sign the voter''s name as a candidate, signer, or circulator on a declaration
    of candidacy and petition, nominating petition, other petition, or other document
    under Title XXXV of the Revised Code may authorize a legally competent resident
    of this state who is eighteen years of age or older as an attorney in fact to
    sign that voter''s name to the petition or other election document, at the voter''s
    direction and in the voter''s presence, in accordance with either of the following
    procedures:

    (a) The voter may file with the board of elections of the voter''s county of residence
    a notarized form that includes or has attached all of the following:

    (i) The name of the voter who is authorizing an attorney in fact to sign petitions
    or other election documents on that voter''s behalf, at the voter''s direction
    and in the voter''s presence;

    (ii) An attestation of the voter that the voter, by reason of disability, is unable
    to sign physically petitions or other election documents and that the voter desires
    the attorney in fact to sign them on the voter''s behalf, at the direction of
    the voter and in the voter''s presence;

    (iii) The name, residence address, date of birth, and, if applicable, Ohio supreme
    court registration number of the attorney in fact authorized to sign on the voter''s
    behalf, at the voter''s direction and in the voter''s presence. A photocopy of
    the attorney in fact''s driver''s license or state identification card issued
    under section 4507.50 of the Revised Code shall be attached to the notarized form.

    (iv) The form of the signature that the attorney in fact will use in signing petitions
    or other election documents on the voter''s behalf, at the voter''s direction
    and in the voter''s presence.

    (b) The voter may acknowledge, before an election official, and file with the
    board of elections of the voter''s county of residence a form that includes or
    has attached all of the following:

    (i) The name of the voter who is authorizing an attorney in fact to sign petitions
    or other election documents on that voter''s behalf, at the voter''s direction
    and in the voter''s presence;

    (ii) An attestation of the voter that the voter, by reason of disability, is physically
    unable to sign petitions or other election documents and that the voter desires
    the attorney in fact to sign them on the voter''s behalf, at the direction of
    the voter and in the voter''s presence;

    (iii) An attestation from a licensed physician, clinical nurse specialist, or
    certified nurse practitioner that the voter is disabled and, by reason of that
    disability, is physically unable to sign petitions or other election documents;

    (iv) The name, residence address, date of birth, and, if applicable, Ohio supreme
    court registration number of the attorney in fact authorized to sign on the voter''s
    behalf, at the voter''s direction and in the voter''s presence. A photocopy of
    the attorney in fact''s driver''s license or state identification card issued
    under section 4507.50 of the Revised Code shall be attached to the notarized form.

    (v) The form of the signature that the attorney in fact will use in signing petitions
    or other election documents on the voter''s behalf, at the voter''s direction
    and in the voter''s presence.

    (2) In addition to performing customary notarial acts with respect to the power
    of attorney form described in division (A)(1)(a) of this section, the notary public
    shall acknowledge that the voter in question affirmed in the presence of the notary
    public the information listed in divisions (A)(1)(a)(i), (ii), and (iii) of this
    section. A notary public shall not perform any notarial acts with respect to such
    a power of attorney form unless the voter first gives such an affirmation. Only
    a notary public satisfying the requirements of section 147.01 of the Revised Code
    may perform notarial acts with respect to such a power of attorney form.

    (B) A board of elections that receives a form under division (A)(1) of this section
    from a voter shall do both of the following:

    (1) Use the signature provided in accordance with division (A)(1)(a)(iv) or (A)(1)(b)(v)
    of this section for the purpose of verifying the voter''s signature on all declarations
    of candidacy and petitions, nominating petitions, other petitions, or other documents
    signed by that voter under Title XXXV of the Revised Code;

    (2) Cause the poll list or signature pollbook for the relevant precinct to identify
    the voter in question as having authorized an attorney in fact to sign petitions
    or other election documents on the voter''s behalf, at the voter''s direction
    and in the voter''s presence.

    (C) Notwithstanding division (D) of section 3501.38 or any other provision of
    the Revised Code to the contrary, an attorney in fact authorized to sign petitions
    or other election documents on a disabled voter''s behalf, at the direction of
    and in the presence of that voter, in accordance with division (A) of this section
    may sign that voter''s name to any petition or other election document under Title
    XXXV of the Revised Code after the power of attorney has been filed with the board
    of elections in accordance with division (A)(1) of this section. The signature
    shall be deemed to be that of the disabled voter, and the voter shall be deemed
    to be the signer.

    (D)(1) Notwithstanding division (F) of section 3501.38 or any other provision
    of the Revised Code to the contrary, the circulator of a petition may knowingly
    permit an attorney in fact to sign the petition on a disabled voter''s behalf,
    at the direction of and in the presence of that voter, in accordance with division
    (A)(1) of this section.

    (2) Notwithstanding division (F) of section 3501.38 or any other provision of
    the Revised Code to the contrary, no petition paper shall be invalidated on the
    ground that the circulator knowingly permitted an attorney in fact to write a
    name other than the attorney in fact''s own name on a petition paper, if that
    attorney in fact signed the petition on a disabled voter''s behalf, at the direction
    of and in the presence of that voter, in accordance with division (C) of this
    section.

    (E) The secretary of state shall prescribe the form and content of the form for
    the power of attorney prescribed under division (A)(1) of this section and also
    shall prescribe the form and content of a distinct form to revoke such a power
    of attorney.

    (F) As used in this section, "unable to physically sign" means that the person
    with a disability cannot comply with the provisions of section 3501.011 of the
    Revised Code. A person is not "unable to physically sign" if the person is able
    to comply with section 3501.011 through reasonable accommodation, including the
    use of assistive technology or augmentative devices.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.382
- number: '3501.39'
  heading: Grounds for rejection of petition or declaration of candidacy
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The secretary of state or a board of elections shall accept any petition
    described in section 3501.38 of the Revised Code unless one of the following occurs:

    (1) A written protest against the petition or candidacy, naming specific objections,
    is filed, a hearing is held, and a determination is made by the election officials
    with whom the protest is filed that the petition is invalid, in accordance with
    any section of the Revised Code providing a protest procedure.

    (2) A written protest against the petition or candidacy, naming specific objections,
    is filed, a hearing is held, and a determination is made by the election officials
    with whom the protest is filed that the petition violates any requirement established
    by law.

    (3) In the case of an initiative petition received by the board of elections,
    the petition falls outside the scope of authority to enact via initiative or does
    not satisfy the statutory prerequisites to place the issue on the ballot, as described
    in division (M) of section 3501.38 of the Revised Code. The petition shall be
    invalid if any portion of the petition is not within the initiative power.

    (4) The candidate''s candidacy or the petition violates the requirements of this
    chapter, Chapter 3513. of the Revised Code, or any other requirements established
    by law.

    (B) Except as otherwise provided in division (C) of this section or section 3513.052
    of the Revised Code, a board of elections shall not invalidate any declaration
    of candidacy or nominating petition under division (A) (4) of this section after
    the sixtieth day prior to the election at which the candidate seeks nomination
    to office, if the candidate filed a declaration of candidacy, or election to office,
    if the candidate filed a nominating petition.

    (C)(1) If a petition is filed for the nomination or election of a candidate in
    a charter municipal corporation with a filing deadline that occurs after the ninetieth
    day before the day of the election, a board of elections may invalidate the petition
    within fifteen days after the date of that filing deadline.

    (2) If a petition for the nomination or election of a candidate is invalidated
    under division (C)(1) of this section, that person''s name shall not appear on
    the ballots for any office for which the person''s petition has been invalidated.
    If the ballots have already been prepared, the board of elections shall remove
    the name of that person from the ballots to the extent practicable in the time
    remaining before the election. If the name is not removed from the ballots before
    the day of the election, the votes for that person are void and shall not be counted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.39
- number: '3501.40'
  heading: Public officials' orders concerning elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'Except as permitted under section 161.09 of the Revised Code, and notwithstanding
    any other contrary provision of the Revised Code, no public official shall cause
    an election to be conducted other than in the time, place, and manner prescribed
    by the Revised Code.

    As used in this section, "public official" means any elected or appointed officer,
    employee, or agent of the state or any political subdivision, board, commission,
    bureau, or other public body established by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.40
- number: '3501.90'
  heading: Civil action by elector for harassment
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) As used in this section:

    (1) "Harassment in violation of the election law" means either of the following:

    (a) Any of the following types of conduct in or about a polling place or a place
    of registration or election: obstructing access of an elector to a polling place;
    another improper practice or attempt tending to obstruct, intimidate, or interfere
    with an elector in registering or voting at a place of registration or election;
    molesting or otherwise engaging in violence against observers in the performance
    of their duties at a place of registration or election; or participating in a
    riot, violence, tumult, or disorder in and about a place of registration or election;

    (b) A violation of division (A)(1), (2), (3), or (5) or division (B) of section
    3501.35 of the Revised Code.

    (2) "Person" has the same meaning as in division (C) of section 1.59 of the Revised
    Code and also includes any organization that is not otherwise covered by that
    division.

    (3) "Trier of fact" means the jury or, in a nonjury action, the court.

    (B) An elector who has experienced harassment in violation of the election law
    has a cause of action against each person that committed the harassment in violation
    of the election law. In any civil action based on this cause of action, the elector
    may seek a declaratory judgment, an injunction, or other appropriate equitable
    relief. The civil action may be commenced by an elector who has experienced harassment
    in violation of the election law either alone or as a party to a class action
    under Civil Rule 23.

    (C)(1) In addition to the equitable relief authorized by division (B) of this
    section, an elector who has experienced harassment in violation of the election
    law may be entitled to relief under division (C)(2) or (3) of this section.

    (2) If the harassment in violation of the election law involved intentional or
    reckless threatening or causing of bodily harm to the elector while the elector
    was attempting to register to vote, to obtain an absent voter''s ballot, or to
    vote, the elector may seek, in a civil action based on the cause of action created
    by division (B) of this section, monetary damages as prescribed in this division.
    The civil action may be commenced by the elector who has experienced harassment
    in violation of the election law either alone or as a party to a class action
    under Civil Rule 23. Upon proof by a preponderance of the evidence in the civil
    action that the harassment in violation of the election law involved intentional
    or reckless threatening or causing of bodily harm to the elector, the trier of
    fact shall award the elector the greater of three times of the amount of the elector''s
    actual damages or one thousand dollars. The court also shall award a prevailing
    elector reasonable attorney''s fees and court costs.

    (3) Whether a civil action on the cause of action created by division (B) of this
    section is commenced by an elector who has experienced harassment in violation
    of the election law alone or as a party to a class action under Civil Rule 23,
    if the defendant in the action is an organization that has previously been determined
    in a court of this state to have engaged in harassment in violation of the election
    law, the elector may seek an order of the court granting any of the following
    forms of relief upon proof by a preponderance of the evidence:

    (a) Divestiture of the organization''s interest in any enterprise or in any real
    property;

    (b) Reasonable restrictions upon the future activities or investments of the organization,
    including, but not limited to, prohibiting the organization from engaging in any
    harassment in violation of the election law;

    (c) The dissolution or reorganization of the organization;

    (d) The suspension or revocation of any license, permit, or prior approval granted
    to the organization by any state agency;

    (e) The revocation of the organization''s authorization to do business in this
    state if the organization is a foreign corporation or other form of foreign entity.

    (D) It shall not be a defense in a civil action based on the cause of action created
    by division (B) of this section, whether commenced by an elector who has experienced
    harassment in violation of the election law alone or as a party to a class action
    under Civil Rule 23, that no criminal prosecution was commenced or conviction
    obtained in connection with the conduct alleged to be the basis of the civil action.

    (E) In a civil action based on the cause of action created by division (B) of
    this section, whether commenced by an elector who has experienced harassment in
    violation of the election law alone or as a party to a class action under Civil
    Rule 23, the elector may name as defendants each individual who engaged in conduct
    constituting harassment in violation of the election law as well as any person
    that employs, sponsors, or uses as an agent any such individual or that has organized
    a common scheme to cause harassment in violation of the election law.'
