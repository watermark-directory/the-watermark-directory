- number: '3501.23'
  heading: Special elections precinct officials
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: A board of elections shall, by the adoption of a resolution, provide that,
    at any special election at which no candidates are to be elected, or at any primary
    election when only one party primary is to be held for the nomination of candidates
    for municipal office which is to be held in its county, the precinct officials
    at any such election shall consist of not more than four judges who shall perform
    all the duties prescribed for the proper conduct of an election by precinct officials.
    Such precinct officials shall be well qualified for the performance of their duties
    and said precinct officials for any special election shall be selected from among
    those regularly appointed under section 3501.22 of the Revised Code, but the precinct
    officials for any party primary election shall be selected from among those regularly
    appointed under such section, provided that such officials shall be equally divided
    between the two major political parties.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.23
- number: '3501.26'
  heading: Procedure upon closing of polls
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'When the polls are closed after a primary, general, or special election,
    the receiving officials shall, in the presence of the counting officials and attending
    observers, proceed as follows:

    (A) Count the number of electors who voted, as shown on the poll books;

    (B) Count the unused ballots without removing stubs;

    (C) Count the soiled and defaced ballots;

    (D) Insert the totals of divisions (A), (B), and (C) of this section on the report
    forms provided therefor in the poll books;

    (E) Count the voted ballots. If the number of voted ballots exceeds the number
    of voters whose names appear upon the poll books, the voting location manager
    shall enter on the poll books an explanation of that discrepancy, and that explanation,
    if agreed to, shall be subscribed to by all of the precinct election officials.
    Any precinct official having a different explanation shall enter it in the poll
    books and subscribe to it.

    (F) Put the unused ballots with stubs attached, and soiled and defaced ballots
    with stubs attached, in the envelopes or containers provided therefor, and certify
    the number.

    The receiving officials shall deliver to and place in the custody of the counting
    officials all the supplies provided for the conduct of that election and the ballots
    that are to be counted and tallied, and take a receipt for the same, which receipt
    shall appear in and be a part of the poll books of such precinct. Having performed
    their duties, the receiving officials shall immediately depart.

    Having receipted for the ballots, the counting officials shall proceed to count
    and tally the vote as cast in the manner prescribed by section 3505.27 of the
    Revised Code and certify the result of the election to the board of elections.'
