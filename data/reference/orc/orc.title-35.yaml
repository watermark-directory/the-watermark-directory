- number: '3501.141'
  heading: Insurance coverage of board members and employees
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The board of elections of any county may contract, purchase, or otherwise
    procure and pay all or any part of the cost of group insurance policies that may
    provide benefits for hospitalization, surgical care, major medical care, disability,
    dental care, eye care, medical care, hearing aids, or prescription drugs, and
    that may provide sickness and accident insurance, or group life insurance, or
    a combination of any of the foregoing types of insurance or coverage for the full-time
    employees of such board and their immediate dependents, whether issued by an insurance
    company or a health insuring corporation, duly authorized to do business in this
    state. The authority granted under this division applies only when the board of
    county commissioners, by resolution, denies coverage described in this division
    to full-time employees of the board of elections.

    (B) The board of elections of any county, with the approval of the board of county
    commissioners, may procure and pay all or any part of the cost of group hospitalization,
    surgical, major medical, or sickness and accident insurance or a combination of
    any of the foregoing types of insurance or coverage for the members appointed
    to the board of elections under section 3501.06 of the Revised Code and their
    immediate dependents when each member''s term begins, whether issued by an insurance
    company or a health insuring corporation, duly authorized to do business in this
    state.'
