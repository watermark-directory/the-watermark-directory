- number: '3519.18'
  heading: Power of board in hearing protests
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: In the performance of the duties required of the boards of elections, the
    boards may subpoena witnesses, compel the production of books, records, and other
    evidence, administer oaths, and take evidence.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.18
- number: '3519.21'
  heading: Ballot title and order
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: 'The order in which all propositions, issues, or questions, including proposed
    laws and constitutional amendments, shall appear on the ballot and the ballot
    title of all such propositions, issues, or questions shall be determined by the
    secretary of state in case of propositions to be voted upon in a district larger
    than a county, and by the board of elections in a county in the case of a proposition
    to be voted upon in a county or a political subdivision thereof. In preparing
    such a ballot title the secretary of state or the board shall give a true and
    impartial statement of the measures in such language that the ballot title shall
    not be likely to create prejudice for or against the measure. The person or committee
    promoting such measure may submit to the secretary of state or the board a suggested
    ballot title, which shall be given full consideration by the secretary of state
    or board in determining the ballot title.

    Except as otherwise provided by law, all propositions, issues, or questions submitted
    to the electors and receiving an affirmative vote of a majority of the votes cast
    thereon are approved.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.21
- number: '3519.22'
  heading: Election not affected by insufficient signatures - number of signatures
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: 'No measure submitted to the electors and receiving an affirmative majority
    of the votes cast on the measure shall be held ineffective or void on account
    of the insufficiency of the petitions by which such submission was procured.

    The basis upon which the required number of petitioners in any case is determined
    shall be the total number of votes cast for the office of governor, in the case
    of state, county, or municipal referendum, at the most recent election therefor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.22
- number: '3521.01'
  heading: Congressional district apportionment
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3521'
    name: Congressional Districts
  text: '(A) As used in sections 3521.01 to 3521.0115 of the Revised Code, "census
    block" and "county" have the same meanings and describe the same geographical
    boundaries as used by the United States department of commerce, bureau of the
    census, in reporting the 2020 decennial census of Ohio. The official report of
    the 2020 decennial census of Ohio and all official documents relating to that
    report of that census are hereby incorporated by reference into sections 3521.01
    to 3521.0115 of the Revised Code.

    (B) For the purpose of election of representatives to congress, the state is divided
    into districts as described in sections 3521.011 to 3521.0115 of the Revised Code.
    Any county or part of a county of the state that has not been described as included
    in one of those districts is included within the district that contains the least
    population according to the 2020 decennial census referred to in this section
    and that is contiguous to that county or part of that county.'
