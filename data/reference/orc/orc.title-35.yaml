- number: '3517.011'
  heading: Petition form
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: The petition required in section 3517.01 of the Revised Code shall be on a
    form prescribed by the secretary of state. The petition may be presented in separate
    parts but each part shall contain a full and correct copy of the declaration.
    Such petition or part petition shall be circulated and signed as required by section
    3501.38 of the Revised Code.
