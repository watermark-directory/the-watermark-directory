- number: '3513.22'
  heading: Canvass and certification of votes
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) Not earlier than the fifth day or later than the fifteenth day after
    a primary election, the board of elections shall begin to canvass the election
    returns from the precincts in which electors were entitled to vote at that election
    and shall continue the canvass daily until it is completed.

    The board shall complete the canvass not later than the twenty-first day after
    the day of the election. Eighty-one days after the day of the election, the canvass
    of election returns shall be deemed final, and no amendments to the canvass may
    be made after that date. The secretary of state may specify an earlier date upon
    which the canvass of election returns shall be deemed final, and after which amendments
    to the final canvass may not be made, if so required by federal law.

    (B) The county executive committee of each political party that participated in
    the election, and each committee designated in a petition to represent the petitioners
    pursuant to which a question or issue was submitted at the election, may designate
    a qualified elector who may be present at and may observe the making of the canvass.
    Each person for whom votes were cast in the election may also be present at and
    observe the making of the canvass.

    (C) When the canvass of the election returns from all of the precincts in the
    county in which electors were entitled to vote at the election has been completed,
    the board shall determine and declare the results of the elections determined
    by the electors of the county or of a district or subdivision within the county.
    If more than the number of persons to be nominated for or elected to an office
    received the largest and an equal number of votes, the tie shall be resolved by
    lot by the chairperson of the board in the presence of a majority of the members
    of the board. The declaration shall be in writing and shall be signed by at least
    a majority of the members of the board. It shall bear the date of the day upon
    which it is made, and a copy of it shall be posted by the board in a conspicuous
    place in its office. The board shall keep the copy posted for a period of at least
    five days.

    The board shall promptly certify abstracts of the results of the elections within
    its county upon forms the secretary of state prescribes. One certified copy of
    each abstract shall be kept in the office of the board, and one certified copy
    of each abstract shall promptly be sent to the secretary of state. The board shall
    also promptly send a certified copy of that part of an abstract that pertains
    to an election in which only electors of a district comprised of more than one
    county but less than all of the counties of the state voted to the board of the
    most populous county in the district. It shall also promptly send a certified
    copy of that part of an abstract that pertains to an election in which only electors
    of a subdivision located partly within the county voted to the board of the county
    in which the major portion of the population of the subdivision is located.

    If, after certifying and sending abstracts and parts of abstracts, a board finds
    that any abstract or part of any abstract is incorrect, it shall promptly prepare,
    certify, and send a corrected abstract or part of an abstract to take the place
    of each incorrect abstract or part of an abstract previously certified and sent.

    (D)(1) When certified copies of abstracts are received by the secretary of state,
    the secretary of state shall canvass those abstracts and determine and declare
    the results of all elections in which electors throughout the entire state voted.
    If more than the number of persons to be nominated for or elected to an office
    received the largest and an equal number of votes, the tie shall be resolved by
    lot by the secretary of state in the presence of the governor, the auditor of
    state, and the attorney general, who at the request of the secretary of state
    shall assemble to witness the drawing of the lot. The declaration of results by
    the secretary of state shall be in writing and shall be signed by the secretary
    of state. It shall bear the date of the day upon which it is made, and a copy
    of it shall be posted by the secretary of state in a conspicuous place in the
    secretary of state''s office. The secretary of state shall keep the copy posted
    for a period of at least five days.

    (2) When certified copies of parts of abstracts are received by the board of the
    most populous county in a district from the boards of all of the counties in the
    district, the board receiving those abstracts shall canvass them and determine
    and declare the results of the elections in which only electors of the district
    voted. If more than the number of persons to be nominated for or elected to an
    office received the largest and equal number of votes, the tie shall be resolved
    by lot by the chairperson of the board in the presence of a majority of the members
    of the board. The declaration of results by the board shall be in writing and
    shall be signed by at least a majority of the members of the board. It shall bear
    the date of the day upon which it is made, and a copy of it shall be posted by
    the board in a conspicuous place in its office. The board shall keep the copy
    posted for a period of at least five days.

    (3) When certified copies of parts of abstracts are received by the board of a
    county in which the major portion of the population of a subdivision located in
    more than one county is located from the boards of each county in which other
    portions of that subdivision are located, the board receiving those abstracts
    shall canvass them and determine and declare the results of the elections in which
    only electors of that subdivision voted. If more than the number of persons to
    be nominated for or elected to an office received the largest and an equal number
    of votes, the tie shall be resolved by lot by the chairperson of the board in
    the presence of a majority of the members of the board. The declaration of results
    by the board shall be in writing and shall be signed by at least a majority of
    the members of the board. It shall bear the date of the day upon which it is made,
    and a copy of it shall be posted by the board in a conspicuous place in its office.
    The board shall keep the copy posted for a period of at least five days.

    (E) Election officials, who are required to declare the results of primary elections,
    shall issue to each person declared nominated for or elected to an office, an
    appropriate certificate of nomination or election, provided that the boards required
    to determine and declare the results of the elections for candidates for nomination
    to the office of representative to congress from a congressional district shall,
    in lieu of issuing a certificate of nomination, certify to the secretary of state
    the names of the candidates nominated, and the secretary of state, upon receipt
    of that certification, shall issue a certificate of nomination to each person
    whose name is so certified. Certificates of nomination or election issued by boards
    to candidates and certifications to the secretary of state shall not be issued
    before the expiration of the time within which applications for recounts of votes
    may be filed or before recounts of votes, which have been applied for, are completed.'
