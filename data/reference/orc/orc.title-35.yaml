- number: '3506.24'
  heading: Elected official ownership interest in voting system manufacturer
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A) As used in this section:

    (1) "Elected official" means an elected officer of the state, any political subdivision,
    or the United States, other than a member of a central committee of a political
    party.

    (2) "Voter registration system" means software and any related equipment used
    by a board of elections or the secretary of state to process, store, organize,
    maintain, or retrieve voter registration records.

    (B)(1) No voter registration system, voting machine, marking device, or automatic
    tabulating equipment shall be used for the purpose of conducting elections in
    this state if an elected official or the spouse of an elected official is a partner,
    owner, or member of the person or entity that manufactured, assembled, or otherwise
    made the system, machine, device, or equipment or of the person or entity from
    which the system, machine, device, or equipment is acquired.

    (2) For purposes of division (B)(1) of this section, an elected official or the
    spouse of an elected official is not considered an owner of a publicly traded
    person or entity if the elected official''s and the spouse''s combined ownership
    interest in the person or entity is less than ten per cent.'
