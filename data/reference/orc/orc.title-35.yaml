- number: '3501.30'
  heading: Polling place supplies
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The board of elections shall provide for each polling place the necessary
    ballot box, official ballots, cards of instructions, registration forms, pollbooks
    or poll lists, tally sheets, forms on which to make summary statements, writing
    implements, paper, and all other supplies necessary for casting and counting the
    ballots and recording the results of the voting at the polling place. The pollbooks
    or poll lists shall have certificates appropriately printed on them for the signatures
    of all the precinct officials, by which they shall certify that, to the best of
    their knowledge and belief, the pollbooks or poll lists correctly show the names
    of all electors who voted in the polling place at the election indicated in the
    pollbooks or poll lists.

    All of the following shall be included among the supplies provided to each polling
    place:

    (1) A large map of each appropriate precinct, which shall be displayed prominently
    to assist persons who desire to register or vote on election day. Each map shall
    show all streets within the precinct and contain identifying symbols of the precinct
    in bold print.

    (2) Any materials, postings, or instructions required to comply with state or
    federal laws;

    (3) A flag of the United States approximately two and one-half feet in length
    along the top, which shall be displayed outside the entrance to the polling place
    during the time it is open for voting;

    (4) Two or more small flags of the United States approximately fifteen inches
    in length along the top, which shall be placed at a distance of one hundred feet
    from the polling place on the thoroughfares or walkways leading to the polling
    place, to mark the distance within which persons other than election officials,
    observers, police officers, and electors waiting to mark, marking, or casting
    their ballots shall not loiter, congregate, or engage in any kind of election
    campaigning. Where small flags cannot reasonably be placed one hundred feet from
    the polling place, the voting location manager shall place the flags as near to
    one hundred feet from the entrance to the polling place as is physically possible.
    Police officers and all election officials shall see that this prohibition against
    loitering and congregating is enforced.

    When the period of time during which the polling place is open for voting expires,
    all of the flags described in this division shall be taken into the polling place
    and shall be returned to the board together with all other election supplies required
    to be delivered to the board.

    (B) The board of elections shall follow the instructions and advisories of the
    secretary of state in the production and use of polling place supplies.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.30
- number: '3501.301'
  heading: Supplies other than ballots
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: A contract involving a cost in excess of twenty-five thousand dollars for
    printing and furnishing the supplies, other than the official ballots, required
    in section 3501.30 of the Revised Code, shall not be let until the board of elections
    has caused notice to be published once in a newspaper of general circulation within
    the county or upon notice given by mail, addressed to the responsible suppliers
    within the state. The board of elections may require that each bid be accompanied
    by a bond, with at least two individual sureties, or a surety company, satisfactory
    to the board, in a sum double the amount of the bid, conditioned upon the faithful
    performance of the contract awarded and for the payment as damages by such bidder
    to the board of any excess of cost over the bid which it may be required to pay
    for such work by reason of the failure of the bidder to complete the contract.
    The contract shall be let to the lowest and best bidder.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.301
- number: '3501.302'
  heading: Agreements for the bulk purchase of election supplies
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'The secretary of state may enter into agreements for the bulk purchase of
    election supplies in order to reduce the costs for such purchases by individual
    boards of elections. A board of elections desiring to participate in such purchase
    agreements shall file with the secretary of state a written request for inclusion.
    A request for inclusion shall include an agreement to be bound by such terms and
    conditions as the secretary of state prescribes and to make direct payments to
    the vendor under each purchase agreement.

    Nothing in this section prohibits a board of elections from purchasing election
    supplies through the department of administrative services under section 125.04
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.302
- number: '3501.31'
  heading: Notice of election mailed to precinct officials
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'The board of elections shall mail to each precinct election official notice
    of the date, hours, and place of holding each election in the official''s respective
    precinct at which it desires the official to serve. Each of such officials shall
    notify the board immediately upon receipt of such notice of any inability to serve.

    The election official designated as voting location manager under section 3501.22
    of the Revised Code shall call at the office of the board at such time before
    the day of the election, not earlier than the tenth day before the day of the
    election, as the board designates to obtain the ballots, pollbooks, registration
    forms and lists, and other material to be used in the official''s polling place
    on election day.

    The board may also provide for the delivery of such materials to polling places
    in a municipal corporation by members of the police department of such municipal
    corporation; or the board may provide for the delivery of such materials to the
    voting location manager not earlier than the tenth day before the election, in
    any manner it finds to be advisable.

    On election day the precinct election officials shall punctually attend the polling
    place one-half hour before the time fixed for opening the polls. Each of the precinct
    election officials shall thereupon make and subscribe to a statement which shall
    be as follows:

    "State of Ohio

    County of _______________

    I do solemnly swear under the penalty of perjury that I will support the constitution
    of the United States of America and the constitution of the state of Ohio and
    its laws; that I have not been convicted of a felony or any violation of the election
    laws; that I will discharge to the best of my ability the duties of precinct election
    official in and for precinct ____________________ in the ____________________
    (township) or (ward and city or village) ____________________ in the county of
    ____________________, in the election to be held on the __________ day of _______________,
    _____, as required by law and the rules and instructions of the board of elections
    of said county; and that I will endeavor to prevent fraud in such election, and
    will report immediately to said board any violations of the election laws which
    come to my attention, and will not disclose any information as to how any elector
    voted which is gained by me in the discharge of my official duties.

    ____________________________________________________________

    ____________________________________________________________

    ____________________________________________________________

    ____________________________________________________________

    ____________________________________________________________

    ____________________________________________________________

    (Signatures of precinct election officials)"

    If any of the other precinct election officials is absent at that time, the voting
    location manager, with the concurrence of a majority of the precinct election
    officials present, shall appoint a qualified elector who is a member of the same
    political party as the political party of which such absent precinct election
    official is a member to fill the vacancy until the board appoints a person to
    fill such vacancy and the person so appointed reports for duty at the polling
    place. The voting location manager shall promptly notify the board of such vacancy
    by telephone or otherwise. The voting location manager also shall assign the precinct
    election officials to their respective duties and shall have general charge of
    the polling place.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.31
- number: '3501.32'
  heading: Hours for polling places
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) Except as otherwise provided in division (B) of this section, on the
    day of the election the polls shall be opened by proclamation by the voting location
    manager, or in the manager''s absence by a voting location manager chosen by the
    precinct election officials, at six-thirty a.m. and shall be closed by proclamation
    at seven-thirty p.m. unless there are voters waiting in line to cast their ballots,
    in which case the polls shall be kept open until such waiting voters have voted.

    (B) On the day of the election, any polling place located on an island not connected
    to the mainland by a highway or a bridge may close earlier than seven-thirty p.m.
    if all registered voters in the precinct have voted. When a polling place closes
    under division (B) of this section the voting location manager shall immediately
    notify the board of elections of the closing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.32
- number: '3501.33'
  heading: Authority of precinct officials
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: All precinct election officials shall enforce peace and good order in and
    about the place of registration or election. They shall especially keep the place
    of access of the electors to the polling place open and unobstructed and prevent
    and stop any improper practices or attempts tending to obstruct, intimidate, or
    interfere with any elector in registering or voting. They shall protect observers
    against molestation and violence in the performance of their duties, and may eject
    from the polling place any observer for violation of any provision of Title XXXV
    of the Revised Code. They shall prevent riots, violence, tumult, or disorder.
    In the discharge of these duties, they may call upon the sheriff, police, or other
    peace officers to aid them in enforcing the law. They may order the arrest of
    any person violating Title XXXV of the Revised Code, but such an arrest shall
    not prevent the person from registering or voting if the person is entitled to
    do so. The sheriff, all constables, police officers, and other officers of the
    peace shall immediately obey and aid in the enforcement of any lawful order made
    by the precinct election officials in the enforcement of Title XXXV of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.33
- number: '3501.34'
  heading: Duties of police as to elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: The officer or authority having command of the police force of any municipal
    corporation or the sheriff of any county, on requisition of the board of elections
    or the secretary of state, shall promptly detail for service at the polling place
    in any precinct of such municipal corporation or county such force as the board
    or secretary of state considers necessary. On every day of election such officer
    or authority shall have a special force in readiness for any emergency and for
    assignment to duty in the precinct polling places. At least one policeman shall
    be assigned to duty in each precinct on each day of an election, when requested
    by the board or the secretary of state. Such police officer shall have access
    at all times to the polling place, and he shall promptly place under arrest any
    person found violating any provisions of Title XXXV of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.34
- number: '3501.35'
  heading: No loitering or congregating near polling places
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) During an election and the counting of the ballots, no person shall do
    any of the following:

    (1) Loiter, congregate, or engage in any kind of election campaigning within the
    area between the polling place and the small flags of the United States placed
    on the thoroughfares and walkways leading to the polling place, and if the line
    of electors waiting to vote extends beyond those small flags, within ten feet
    of any elector in that line;

    (2) In any manner hinder or delay an elector in reaching or leaving the place
    fixed for casting the elector''s ballot;

    (3) Give, tender, or exhibit any ballot or ticket to any person other than the
    elector''s own ballot to the precinct election officials within the area between
    the polling place and the small flags of the United States placed on the thoroughfares
    and walkways leading to the polling place, and if the line of electors waiting
    to vote extends beyond those small flags, within ten feet of any elector in that
    line;

    (4) Exhibit any ticket or ballot which the elector intends to cast;

    (5) Solicit or in any manner attempt to influence any elector in casting the elector''s
    vote.

    (B)(1) Except as otherwise provided in division (B)(2) of this section and division
    (C) of section 3503.23 of the Revised Code, no person who is not an election official,
    employee, observer, or police officer shall be allowed to enter the polling place
    during the election, except for the purpose of voting or assisting another person
    to vote as provided in section 3505.24 of the Revised Code.

    (2) Notwithstanding any provision of this section to the contrary, a journalist
    shall be allowed reasonable access to a polling place during an election. As used
    in this division, "journalist" has the same meaning as in division (B)(2) of section
    2923.129 of the Revised Code.

    (C) No more electors shall be allowed to approach the voting shelves at any time
    than there are voting shelves provided.

    (D) The precinct election officials and the police officer shall strictly enforce
    the observance of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.35
- number: '3501.36'
  heading: Fees and mileage for officials delivering or returning election supplies
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: Each precinct election official who before the day of an election in his precinct
    obtains ballots, pollbooks, or other materials to be used in his polling place
    on the day of such election and delivers such materials to his polling place on
    the day of such election as required by section 3501.31 of the Revised Code and
    the orders of the board of elections, and each precinct election official who
    delivers such materials and the returns and records of an election from the polling
    place to the office of the board after an election, as required by section 3505.31
    of the Revised Code and the orders of the board, may receive, in addition to the
    compensation provided under section 3501.28 of the Revised Code, a sum not to
    exceed five dollars for each trip to the polling place and five dollars for each
    trip from the polling place to the office of the board, plus mileage for each
    trip at the rate provided by rules governing travel adopted by the office of budget
    and management in accordance with Chapter 119. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.36
- number: '3501.37'
  heading: Safekeeping of election booths and equipment
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: After each election, the precinct election officials of each precinct, except
    when the board of elections assumes the duty, shall see that the movable booths
    and other equipment are returned for safekeeping to the fiscal officer of the
    township or to the clerk or auditor of the municipal corporation in which the
    precinct is situated. The fiscal officer, clerk, or auditor shall have booths
    and equipment on hand and in place at the polling places in each precinct before
    the time for opening the polls on election days, and for this service the board
    may allow the necessary expenses incurred. In cities, this duty shall devolve
    on the board.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.37
- number: '3501.38'
  heading: General rules for petitions and declarations of candidacy
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'All declarations of candidacy, nominating petitions, or other petitions presented
    to or filed with the secretary of state or a board of elections or with any other
    public office for the purpose of becoming a candidate for any nomination or office
    or for the holding of an election on any issue shall, in addition to meeting the
    other specific requirements prescribed in the sections of the Revised Code relating
    to them, be governed by the following rules:

    (A) Only electors qualified to vote on the candidacy or issue which is the subject
    of the petition shall sign a petition. Each signer shall be a registered elector
    pursuant to section 3503.01 of the Revised Code. The facts of qualification shall
    be determined as of the date when the petition is filed.

    (B) Signatures shall be affixed in ink. Each signer may also print the signer''s
    name, so as to clearly identify the signer''s signature.

    (C) Each signer shall place on the petition after the signer''s name the date
    of signing and the location of the signer''s voting residence, including the street
    and number if in a municipal corporation or the rural route number, post office
    address, or township if outside a municipal corporation. The voting address given
    on the petition shall be the address appearing in the registration records at
    the board of elections.

    (D) Except as otherwise provided in section 3501.382 of the Revised Code, no person
    shall write any name other than the person''s own on any petition. Except as otherwise
    provided in section 3501.382 of the Revised Code, no person may authorize another
    to sign for the person. If a petition contains the signature of an elector two
    or more times, only the first signature shall be counted.

    (E)(1) On each petition paper, the circulator shall indicate the number of signatures
    contained on it, and shall sign a statement made under penalty of election falsification
    that the circulator witnessed the affixing of every signature, that all signers
    were to the best of the circulator''s knowledge and belief qualified to sign,
    and that every signature is to the best of the circulator''s knowledge and belief
    the signature of the person whose signature it purports to be or of an attorney
    in fact acting pursuant to section 3501.382 of the Revised Code. On the circulator''s
    statement for a declaration of candidacy or nominating petition for a person seeking
    to become a statewide candidate, for a statewide initiative or a statewide referendum
    petition, or for a party formation petition described in division (A)(1)(b) of
    section 3517.01 of the Revised Code, the circulator shall identify the circulator''s
    name, the address of the circulator''s permanent residence, and the name and address
    of the person employing the circulator to circulate the petition, if any.

    (2) As used in division (E) of this section, "statewide candidate" means the joint
    candidates for the offices of governor and lieutenant governor or a candidate
    for the office of secretary of state, auditor of state, treasurer of state, or
    attorney general.

    (F) Except as otherwise provided in section 3501.382 of the Revised Code, if a
    circulator knowingly permits an unqualified person to sign a petition paper or
    permits a person to write a name other than the person''s own on a petition paper,
    that petition paper is invalid; otherwise, the signature of a person not qualified
    to sign shall be rejected but shall not invalidate the other valid signatures
    on the paper.

    (G) The circulator of a petition may, before filing it in a public office, strike
    from it any signature the circulator does not wish to present as a part of the
    petition.

    (H) Any signer of a petition or an attorney in fact acting pursuant to section
    3501.382 of the Revised Code on behalf of a signer may remove the signer''s signature
    from that petition at any time before the petition is filed in a public office
    by striking the signer''s name from the petition; no signature may be removed
    after the petition is filed in any public office.

    (I)(1) No alterations, corrections, or additions may be made to a petition after
    it is filed in a public office.

    (2)(a) No declaration of candidacy, nominating petition, or other petition for
    the purpose of becoming a candidate may be withdrawn after it is filed in a public
    office. Nothing in this division prohibits a person from withdrawing as a candidate
    as otherwise provided by law.

    (b) No petition presented to or filed with the secretary of state, a board of
    elections, or any other public office for the purpose of the holding of an election
    on any question or issue may be resubmitted after it is withdrawn from a public
    office or rejected as containing insufficient signatures. Nothing in this division
    prevents a question or issue petition from being withdrawn by the filing of a
    written notice of the withdrawal by a majority of the members of the petitioning
    committee with the same public office with which the petition was filed prior
    to the sixtieth day before the election at which the question or issue is scheduled
    to appear on the ballot.

    (J) All declarations of candidacy, nominating petitions, or other petitions under
    this section shall be accompanied by the following statement in boldface capital
    letters: WHOEVER COMMITS ELECTION FALSIFICATION IS GUILTY OF A FELONY OF THE FIFTH
    DEGREE.

    (K) All separate petition papers shall be filed at the same time, as one instrument.

    (L) If a board of elections distributes for use a petition form for a declaration
    of candidacy, nominating petition, or any type of question or issue petition that
    does not satisfy the requirements of law as of the date of that distribution,
    the board shall not invalidate the petition on the basis that the petition form
    does not satisfy the requirements of law, if the petition otherwise is valid.
    Division (L) of this section applies only if the candidate received the petition
    from the board within ninety days of when the petition is required to be filed.

    (M)(1) Upon receiving an initiative petition, or a petition filed under section
    307.94 or 307.95 of the Revised Code, concerning a ballot issue that is to be
    submitted to the electors of a county or municipal political subdivision, the
    board of elections shall examine the petition to determine:

    (a) Whether the petition falls within the scope of a municipal political subdivision''s
    authority to enact via initiative, including, if applicable, the limitations placed
    by Sections 3 and 7 of Article XVIII of the Ohio Constitution on the authority
    of municipal corporations to adopt local police, sanitary, and other similar regulations
    as are not in conflict with general laws, and whether the petition satisfies the
    statutory prerequisites to place the issue on the ballot. The petition shall be
    invalid if any portion of the petition is not within the initiative power; or

    (b) Whether the petition falls within the scope of a county''s authority to enact
    via initiative, including whether the petition conforms to the requirements set
    forth in Section 3 of Article X of the Ohio Constitution, including the exercise
    of only those powers that have vested in, and the performance of all duties imposed
    upon counties and county officers by law, and whether the petition satisfies the
    statutory prerequisites to place the issue on the ballot. The finding of the board
    shall be subject to challenge by a protest filed pursuant to division (B) of section
    307.95 of the Revised Code.

    (2) After making a determination under division (M)(1)(a) or (b) of this section,
    the board of elections shall promptly transmit a copy of the petition and a notice
    of the board''s determination to the office of the secretary of state. Notice
    of the board''s determination shall be given to the petitioners and the political
    subdivision.

    (3) If multiple substantially similar initiative petitions are submitted to multiple
    boards of elections and the determinations of the boards under division (M)(1)(a)
    or (b) of this section concerning those petitions differ, the secretary of state
    shall make a single determination under division (M)(1)(a) or (b) of this section
    that shall apply to each such initiative petition.'
  history: null
