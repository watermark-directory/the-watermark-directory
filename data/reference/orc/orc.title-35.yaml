- number: '3517.09'
  heading: Coercing political contributions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A) No person or committee shall solicit, ask, invite, or demand, directly
    or indirectly, orally or in writing, a contribution, subscription, or payment
    from a candidate for nomination or election or from the campaign committee of
    that candidate, and no person shall solicit, ask, invite, or demand that a candidate
    for nomination or election or the campaign committee of that candidate subscribe
    to the support of a club or organization, buy tickets to an entertainment, ball,
    supper, or other meeting, or pay for space in a book, program, or publication.
    This division does not apply to any of the following:

    (1) Regular advertisements in periodicals having an established circulation;

    (2) Regular payments to civic, political, fraternal, social, charitable, or religious
    organizations of which the candidate was a member or contributor six months before
    the candidate''s candidacy;

    (3) Regular party assessments made by a party against its own candidates.

    (B) No person shall coerce, intimidate, or cause harm to another person by an
    act or failure to act, or shall threaten to coerce, intimidate, or cause harm
    to another person, because that other person makes or does not make a contribution
    to a candidate, campaign committee, political party, legislative campaign fund,
    political action committee, political contributing entity, or person making disbursements
    to pay the direct costs of producing or airing electioneering communications.

    (C) An employer or labor organization, directly or through another person, may
    obtain contributions for a candidate, campaign committee, political action committee,
    legislative campaign fund, political party, or person making disbursements to
    pay the direct costs of producing or airing electioneering communications from
    an employee or member from whom the employer or labor organization was not obtaining
    contributions for that candidate, campaign committee, political action committee,
    legislative campaign fund, political party, or person making disbursements to
    pay the direct costs of producing or airing electioneering communications before
    March 31, 2005, on an automatic basis pursuant to a payroll deduction plan only
    if the employee or member who is contributing to that candidate, campaign committee,
    political action committee, legislative campaign fund, political party, or person
    making disbursements to pay the direct costs of producing or airing electioneering
    communications affirmatively consents to the contribution in writing.

    (D) In addition to the laws listed in division (A) of section 4117.10 of the Revised
    Code that prevail over conflicting agreements between employee organizations and
    public employers, this section prevails over any conflicting provisions of agreements
    between labor organizations and public employers that are entered into on or after
    March 31, 2005, pursuant to Chapter 4117. of the Revised Code.'
