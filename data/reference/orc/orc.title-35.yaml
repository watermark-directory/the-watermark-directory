- number: '3506.08'
  heading: Printed ballot card specifications
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: 'When a marking device designed for use with printed ballot cards has been
    approved by the secretary of state pursuant to section 3506.05 of the Revised
    Code, the secretary of state shall for each election prescribe specifications
    for the printing of such ballot cards that will present to voters the same information
    with respect to candidates, offices, questions, and issues obtainable from paper
    ballots for the same election prepared pursuant to Chapter 3505. of the Revised
    Code.

    Each ballot card shall have attached two stubs, each of the width of the ballot
    and each at least one-half inch in length, except that, if the board of elections
    has an alternate method to account for the ballots that the secretary of state
    has authorized, each ballot card may have only one stub that shall be the width
    of the ballot and not less than one-half inch in length. In the case of ballot
    cards with two stubs, the stubs shall be separated from the ballot card and from
    each other by perforated lines. One stub shall be known as Stub A and shall have
    printed on its face "Stub A" and "Consecutive Number _____" The other stub shall
    be known as Stub B and shall have printed on its face "Stub B" and "Consecutive
    Number _____" and the instructions to the voter which shall be printed in upper
    and lower case ten point type. Each ballot card of each kind of ballot provided
    for use in each precinct shall be numbered consecutively by printing such number
    upon both of the stubs attached thereto. The board of elections may order the
    ballot type, part, rotation series, and the precinct designation printed and pre-punched
    at the top of each ballot card. This information shall be separated from the remaining
    portion of the ballot card.

    The secretary of state shall further prescribe the supplementary means, whether
    paper ballots, ballot envelopes, or other, by which a voter may write in the names
    of candidates whose names do not appear on the ballot.'
