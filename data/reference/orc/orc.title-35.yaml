    name: Campaigns; Political Parties
  text: Section 3513.191 of the Revised Code does not apply to persons desiring to
    become candidates for party nomination of a newly formed political party meeting
    the requirements of sections 3517.011 and 3517.012 of the Revised Code for a period
    of four calendar years from the date of the party formation.
