  url: https://codes.ohio.gov/ohio-revised-code/section-3517.013
- number: '3517.014'
  heading: Candidate of new party not disqualified at first primary election after
    formation
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: Those provisions of section 3513.19 of the Revised Code relating to the determination
    of membership in or political affiliation with a party do not apply to persons
    desiring to become candidates for party nomination of a newly formed political
    party meeting the requirements of sections 3517.011 and 3517.012 of the Revised
    Code at the first primary held by that party in the even-numbered year occurring
    subsequent to the formation of that party.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3517.014
- number: '3517.016'
  heading: New party primary vote not barred by prior party affiliation
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: At the first primary election held by a newly formed political party meeting
    the requirements of sections 3517.011 and 3517.012 of the Revised Code, any qualified
    elector who desires to vote the new party primary ballot is not subject to section
    3513.19 of the Revised Code and shall be allowed to vote the new party primary
    ballot regardless of prior political party affiliation.
