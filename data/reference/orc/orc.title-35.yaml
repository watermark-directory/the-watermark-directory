  url: https://codes.ohio.gov/ohio-revised-code/section-3517.06
- number: '3517.07'
  heading: Parties or groups advocating overthrow of government by force or violence
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: 'No political party or group which advocates, either directly or indirectly,
    the overthrow, by force or violence, of our local, state, or national government
    or which carries on a program of sedition or treason by radio, speech, or press
    or which has in any manner any connection with any foreign government or power
    or which in any manner has any connection with any group or organization so connected
    or so advocating the overthrow, by force or violence, of our local, state, or
    national government or so carrying on a program of sedition or treason by radio,
    speech, or press shall be recognized or be given a place on the ballot in any
    primary or general election held in the state or in any political subdivision
    thereof.

    Any party or group desiring to have a place on the ballot shall file with the
    secretary of state and with the board of elections in each county in which it
    desires to have a place on the ballot an affidavit made by not less than ten members
    of such party, not less than three of whom shall be executive officers thereof,
    under oath stating that it does not advocate, either directly or indirectly, the
    overthrow, by force or violence, of our local, state, or national government;
    that it does not carry on any program of sedition or treason by radio, speech,
    or press; that it has no connection with any foreign government or power; that
    it has no connection with any group or organization so connected or so advocating,
    either directly or indirectly, the overthrow, by force or violence, of our local,
    state, or national government or so carrying on a program of sedition or treason
    by radio, speech, or press.

    Said affidavit shall be filed not less than six nor more than nine months prior
    to the primary or general election in which the party or group desires to have
    a place on the ballot. The secretary of state shall investigate the facts appearing
    in the affidavit and shall within sixty days after the filing thereof find and
    certify whether or not this party or group is entitled under this section to have
    a place on the ballot.

    Any qualified member of such party or group or any elector of this state may appeal
    from the finding of the secretary of state to the supreme court of Ohio.

    This section does not apply to any political party or group which has had a place
    on the ballot in each national and gubernatorial election since the year 1900.'
