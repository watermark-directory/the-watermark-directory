- number: '3511.07'
  heading: Mailing precautions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: When mailing unsealed identification envelopes and unsealed return envelopes
    to persons, the board of elections shall insert a sheet of waxed paper or other
    appropriate insert between the gummed flap and the back of each of such envelopes
    to minimize the possibility that the flap may become firmly stuck to the back
    of the envelope by reason of moisture, humid atmosphere, or other conditions to
    which they may be subjected. If the flap on either of such envelopes should be
    so firmly stuck to the back of the envelope when it is received by the voter as
    to require forcible opening of the envelope in order to use it, the voter shall
    open such envelope in the manner least injurious to it, and, after marking the
    voter's ballots and enclosing them in the envelope for mailing to the director,
    the voter shall reclose such envelope in the most practicable way, by sealing
    it or otherwise, and shall sign the blank form printed on the back of such envelope.
