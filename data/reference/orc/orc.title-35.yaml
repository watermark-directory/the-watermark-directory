- number: '3501.011'
  heading: Legal mark of registered elector
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) Except as otherwise provided in divisions (B) and (C) of this section,
    and except as otherwise provided in any section of Title XXXV of the Revised Code
    to the contrary, as used in the sections of the Revised Code relating to elections
    and political communications, whenever a person is required to sign or affix a
    signature to a declaration of candidacy, nominating petition, declaration of intent
    to be a write-in candidate, initiative petition, referendum petition, recall petition,
    or any other kind of petition, or to sign or affix a signature on any other document
    that is filed with or transmitted to a board of elections or the office of the
    secretary of state, "sign" or "signature" means that person''s written, cursive-style
    legal mark written in that person''s own hand.

    (B) For persons who do not use a cursive-style legal mark during the course of
    their regular business and legal affairs, "sign" or "signature" means that person''s
    other legal mark that the person uses during the course of that person''s regular
    business and legal affairs that is written in the person''s own hand.

    (C) Any voter registration record requiring a person''s signature shall be signed
    using the person''s legal mark used in the person''s regular business and legal
    affairs. For any purpose described in division (A) of this section, the legal
    mark of a registered elector shall be considered to be the mark of that elector
    as it appears on the elector''s voter registration record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.011
- number: '3501.012'
  heading: Voter application not to be refused due to specified requirements
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: Notwithstanding any provision of the Revised Code to the contrary, the secretary
    of state or a board of elections shall not refuse to accept and process an otherwise
    valid voter registration application, absent voter's ballot application, uniformed
    services and overseas absent voter's ballot application, returned absent voter's
    ballot, returned uniformed services and overseas absent voter's ballot, or federal
    write-in absentee ballot from an individual who is eligible to vote as a uniformed
    services voter or an overseas voter in accordance with 42 U.S.C. 1973ff-6 due
    to any requirements regarding notarization, paper type, paper weight and size,
    envelope type, or envelope weight and size.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.012
- number: '3501.02'
  heading: General election - time for holding
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'General elections in the state and its political subdivisions shall be held
    as follows:

    (A) For the election of electors of president and vice-president of the United
    States, in the year of 1932 and every four years thereafter;

    (B) For the election of a member of the senate of the United States, in the years
    1932 and 1934, and every six years after each of such years; except as otherwise
    provided for filling vacancies;

    (C) For the election of representatives in the congress of the United States and
    of elective state and county officers, in the even-numbered years; except as otherwise
    provided for filling vacancies;

    (D) For municipal and township officers, members of boards of education, judges
    and clerks of municipal courts, in the odd-numbered years;

    (E) Proposed constitutional amendments or proposed measures submitted by the general
    assembly or by initiative or referendum petitions to the voters of the state at
    large may be submitted to the general election in any year occurring at least
    one hundred twenty-five days subsequent to the filing of the petitions therefor.
    Proposed constitutional amendments submitted by the general assembly to the voters
    of the state at large may be submitted at a special election occurring on the
    day in any year specified by division (E) of section 3501.01 of the Revised Code
    for the holding of a primary election, when a special election on that date is
    designated by the general assembly in the resolution adopting the proposed constitutional
    amendment.

    No special election shall be held on a day other than the day of a general election,
    unless a law or charter provides otherwise, regarding the submission of a question
    or issue to the voters of a county, township, city, village, or school district.

    (F)(1) Notwithstanding any provision of the Revised Code to the contrary, any
    question or issue, except a candidacy, to be voted upon at an election shall be
    certified, for placement upon the ballot, to the board of elections not later
    than four p.m. of the ninetieth day before the day of the election.

    (2) Any question or issue that is certified for placement on a ballot on or after
    July 2, 2010, shall be certified not later than the ninetieth day before the day
    of the applicable election, notwithstanding any deadlines appearing in any section
    of the Revised Code governing the placement of that question or issue on the ballot.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.02
- number: '3501.021'
  heading: Certification in electronic or paper form
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: Notwithstanding any provision of the Revised Code to the contrary, a political
    subdivision or other entity that certifies a question or issue to a board of elections
    for placement on the ballot may make that certification in electronic or paper
    form.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.021
- number: '3501.022'
  heading: When August special election may be held
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) A political subdivision or taxing authority may hold a special election
    on the first Tuesday after the first Monday in August for an office, question,
    or issue if the political subdivision is under a fiscal emergency under section
    118.03 of the Revised Code, or the taxing authority that is a school district
    is under a fiscal emergency under division (B) of section 3316.03 of the Revised
    Code, at the time the board of elections certifies the office, question, or issue
    for placement on the ballot for that special election.

    (B) The deadlines applicable to a special election held by a political subdivision
    or taxing authority under division (A) of this section shall be the same as the
    deadlines specified to place the office, question, or issue on the ballot on the
    day of a primary or general election.

    (C) The entire cost of a special election held under division (A) of this section
    shall be charged to the political subdivision or taxing authority in accordance
    with division (D) of section 3501.17 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.022
- number: '3501.03'
  heading: Notice of election
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'At least ten days before the time for holding an election the board of elections
    shall give public notice by a proclamation, posted in a conspicuous place in the
    courthouse and city hall, or by one insertion in a newspaper of general circulation
    in the county.

    The board shall have authority to publicize information relative to registration
    or elections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.03
- number: '3501.04'
  heading: Secretary of state is chief election officer
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: The secretary of state is the chief election officer of the state, with such
    powers and duties relating to the registration of voters and the conduct of elections
    as are prescribed in Title XXXV of the Revised Code. He shall perform these duties,
    in addition to other duties imposed upon him by law, without additional compensation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.04
- number: '3501.05'
  heading: Election duties of secretary of state
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'The secretary of state shall do all of the following:

    (A) Appoint all members of boards of elections;

    (B) Issue instructions by directives and advisories in accordance with section
    3501.053 of the Revised Code to members of the boards as to the proper methods
    of conducting elections.

    (C) Prepare rules and instructions for the conduct of elections;

    (D) Publish and furnish to the boards from time to time a sufficient number of
    indexed copies of all election laws then in force;

    (E) Edit and issue all pamphlets concerning proposed laws or amendments required
    by law to be submitted to the voters;

    (F) Prescribe the form of registration cards, blanks, and records;

    (G) Determine and prescribe the forms of ballots and the forms of all blanks,
    cards of instructions, pollbooks, tally sheets, certificates of election, and
    forms and blanks required by law for use by candidates, committees, and boards;

    (H) Prepare the ballot title or statement to be placed on the ballot for any proposed
    law or amendment to the constitution to be submitted to the voters of the state;

    (I) Except as otherwise provided in section 3519.08 of the Revised Code, certify
    to the several boards the forms of ballots and names of candidates for state offices,
    and the form and wording of state referendum questions and issues, as they shall
    appear on the ballot;

    (J) Except as otherwise provided in division (I)(2)(b) of section 3501.38 of the
    Revised Code, give final approval to ballot language for any local question or
    issue approved and transmitted by boards of elections under section 3501.11 of
    the Revised Code;

    (K) Receive all initiative and referendum petitions on state questions and issues
    and determine and certify to the sufficiency of those petitions;

    (L) Require such reports from the several boards as are provided by law, or as
    the secretary of state considers necessary;

    (M) Compel the observance by election officers in the several counties of the
    requirements of the election laws;

    (N)(1) Except as otherwise provided in division (N)(2) of this section, through
    the election integrity unit created under section 3501.055 of the Revised Code,
    investigate the administration of election laws, frauds, and irregularities in
    elections in any county, and report violations of election laws to the attorney
    general or prosecuting attorney, or both, for prosecution;

    (2) Receive and process complaints regarding any alleged violation of a provision
    of law over which the Ohio election integrity commission has jurisdiction, in
    accordance with sections 3517.14 to 3517.18 of the Revised Code.

    (O) Make an annual report to the governor containing the results of elections,
    the cost of elections in the various counties, a tabulation of the votes in the
    several political subdivisions, and other information and recommendations relative
    to elections the secretary of state considers desirable;

    (P) Prescribe and distribute to boards of elections a list of instructions indicating
    all legal steps necessary to petition successfully for local option elections
    under sections 4301.32 to 4301.41, 4303.29, 4305.14, and 4305.15 of the Revised
    Code;

    (Q) Adopt rules pursuant to Chapter 119. of the Revised Code for the removal by
    boards of elections of ineligible voters from the statewide voter registration
    database and, if applicable, from the poll list or signature pollbook used in
    each precinct, which rules shall provide for all of the following:

    (1) A process for the removal of voters who have changed residence, which shall
    be uniform, nondiscriminatory, and in compliance with the Voting Rights Act of
    1965 and the National Voter Registration Act of 1993, including a program that
    uses the national change of address service provided by the United States postal
    system through its licensees;

    (2) A process for the removal of ineligible voters under section 3503.21 of the
    Revised Code;

    (3) A uniform system for marking or removing the name of a voter who is ineligible
    to vote from the statewide voter registration database and, if applicable, from
    the poll list or signature pollbook used in each precinct and noting the reason
    for that mark or removal.

    (R)(1) Prescribe a general program for registering voters or updating voter registration
    information, such as name and residence changes, by boards of elections, designated
    agencies, public high schools and vocational schools, public libraries, and offices
    of county treasurers consistent with the requirements of section 3503.09 of the
    Revised Code;

    (2) Prescribe a general program for registering voters or updating voter registration
    information through the registrar of motor vehicles and deputy registrars, consistent
    with the requirements of section 3503.11 of the Revised Code.

    (S) Prescribe a program of distribution of voter registration forms through boards
    of elections, designated agencies, offices of the registrar and deputy registrars
    of motor vehicles, public high schools and vocational schools, public libraries,
    and offices of county treasurers;

    (T) To the extent feasible, provide copies, at no cost and upon request, of the
    voter registration form in post offices in this state;

    (U) Adopt rules pursuant to section 111.15 of the Revised Code for the purpose
    of implementing the programs for registering voters through boards of elections,
    designated agencies, and the offices of the registrar and deputy registrars of
    motor vehicles consistent with this chapter;

    (V) Establish the full-time position of Americans with Disabilities Act coordinator
    within the office of the secretary of state to do all of the following:

    (1) Assist the secretary of state with ensuring that there is equal access to
    polling places for persons with disabilities;

    (2) Assist the secretary of state with ensuring that each voter may cast the voter''s
    ballot in a manner that provides the same opportunity for access and participation,
    including privacy and independence, as for other voters;

    (3) Advise the secretary of state in the development of standards for the certification
    of voting machines, marking devices, and automatic tabulating equipment.

    (W) Establish and maintain a computerized statewide database of all legally registered
    voters under section 3503.15 of the Revised Code that complies with the requirements
    of the "Help America Vote Act of 2002," Pub. L. No. 107-252, 116 Stat. 1666, and
    provide training in the operation of that system;

    (X) Ensure that all directives, advisories, other instructions, or decisions issued
    or made during or as a result of any conference or teleconference call with a
    board of elections to discuss the proper methods and procedures for conducting
    elections, to answer questions regarding elections, or to discuss the interpretation
    of directives, advisories, or other instructions issued by the secretary of state
    are posted on a web site of the office of the secretary of state as soon as is
    practicable after the completion of the conference or teleconference call, but
    not later than the close of business on the same day as the conference or teleconference
    call takes place.

    (Y) Publish a report on a web site of the office of the secretary of state not
    later than one month after the completion of the canvass of the election returns
    for each primary and general election, identifying, by county, the number of absent
    voter''s ballots cast and the number of those ballots that were counted, and the
    number of provisional ballots cast and the number of those ballots that were counted,
    for that election. The secretary of state shall maintain the information on the
    web site in an archive format for each subsequent election.

    (Z) Conduct voter education outlining voter identification, absent voters ballot,
    provisional ballot, and other voting requirements;

    (AA) Establish a procedure by which a registered elector may make available to
    a board of elections a more recent signature to be used in the poll list or signature
    pollbook produced by the board of elections of the county in which the elector
    resides;

    (BB) Disseminate information, which may include all or part of the official explanations
    and arguments, by means of direct mail or other written publication, broadcast,
    or other means or combination of means, as directed by the Ohio ballot board under
    division (F) of section 3505.062 of the Revised Code, in order to inform the voters
    as fully as possible concerning each proposed constitutional amendment, proposed
    law, or referendum;

    (CC) Be the single state office responsible for the implementation of the "Uniformed
    and Overseas Citizens Absentee Voting Act," Pub. L. No. 99-410, 100 Stat. 924,
    42 U.S.C. 1973ff, et seq., as amended, in this state. The secretary of state may
    delegate to the boards of elections responsibilities for the implementation of
    that act, including responsibilities arising from amendments to that act made
    by the "Military and Overseas Voter Empowerment Act," Subtitle H of the "National
    Defense Authorization Act for Fiscal Year 2010," Pub. L. No. 111-84, 123 Stat.
    3190.

    (DD) Adopt rules, under Chapter 119. of the Revised Code, to establish procedures
    and standards for determining when a board of elections shall be placed under
    the official oversight of the secretary of state, placing a board of elections
    under the official oversight of the secretary of state, a board that is under
    official oversight to transition out of official oversight, and the secretary
    of state to supervise a board of elections that is under official oversight of
    the secretary of state.

    (EE) Perform other duties required by law.

    Whenever a primary election is held under section 3513.32 of the Revised Code
    or a special election is held under section 3521.03 of the Revised Code to fill
    a vacancy in the office of representative to congress, the secretary of state
    shall establish a deadline, notwithstanding any other deadline required under
    the Revised Code, by which any or all of the following shall occur: the filing
    of a declaration of candidacy and petitions or a statement of candidacy and nominating
    petition together with the applicable filing fee; the filing of protests against
    the candidacy of any person filing a declaration of candidacy or nominating petition;
    the filing of a declaration of intent to be a write-in candidate; the filing of
    campaign finance reports; the preparation of, and the making of corrections or
    challenges to, precinct voter registration lists; the receipt of applications
    for absent voter''s ballots or uniformed services or overseas absent voter''s
    ballots; the supplying of election materials to precincts by boards of elections;
    the holding of hearings by boards of elections to consider challenges to the right
    of a person to appear on a voter registration list; and the scheduling of programs
    to instruct or reinstruct election officers.

    In the performance of the secretary of state''s duties as the chief election officer,
    the secretary of state may administer oaths, issue subpoenas, summon witnesses,
    compel the production of books, papers, records, and other evidence, and fix the
    time and place for hearing any matters relating to the administration and enforcement
    of the election laws, including for the purposes described in division (N)(2)
    of this section.

    In any controversy involving or arising out of the adoption of registration or
    the appropriation of funds for registration, the secretary of state may, through
    the attorney general, bring an action in the name of the state in the court of
    common pleas of the county where the cause of action arose or in an adjoining
    county, to adjudicate the question.

    In any action involving the laws in Title XXXV of the Revised Code wherein the
    interpretation of those laws is in issue in such a manner that the result of the
    action will affect the lawful duties of the secretary of state or of any board
    of elections, the secretary of state may, on the secretary of state''s motion,
    be made a party.

    The secretary of state may apply to any court that is hearing a case in which
    the secretary of state is a party, for a change of venue as a substantive right,
    and the change of venue shall be allowed, and the case removed to the court of
    common pleas of an adjoining county named in the application or, if there are
    cases pending in more than one jurisdiction that involve the same or similar issues,
    the court of common pleas of Franklin county.

    Public high schools and vocational schools, public libraries, and the office of
    a county treasurer shall implement voter registration programs as directed by
    the secretary of state pursuant to this section.'
