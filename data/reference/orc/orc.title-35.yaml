- number: '3506.01'
  heading: Voting and tabulation equipment definitions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: 'As used in this chapter and Chapters 3501., 3503., 3505., 3509., 3511., 3513.,
    3515., 3517., 3519., 3521., 3523., and 3599. of the Revised Code:

    (A) "Marking device" means an apparatus operated by a voter to record the voter''s
    choices through the marking of ballots enabling them to be examined and counted
    by automatic tabulating equipment.

    (B) "Ballot" means the official election presentation of offices and candidates,
    including write-in candidates, and of questions and issues, and the means by which
    votes are recorded.

    (C) "Automatic tabulating equipment" means a machine or electronic device, or
    interconnected or interrelated machines or electronic devices, that will automatically
    examine and count votes recorded on ballots. Automatic tabulating equipment may
    allow for the voter''s selections to be indicated by marks made on a paper record
    by an electronic marking device.

    (D) "Central counting station" means a location, or one of a number of locations,
    designated by the board of elections for the automatic examining, sorting, or
    counting of ballots.

    (E) "Voting machines" means mechanical or electronic equipment for the direct
    recording and tabulation of votes.

    (F) "Direct recording electronic voting machine" means a voting machine that records
    votes by means of a ballot display provided with mechanical or electro-optical
    components that can be actuated by the voter, that processes the data by means
    of a computer program, and that records voting data and ballot images in internal
    or external memory components. A "direct recording electronic voting machine"
    produces a tabulation of the voting data stored in a removable memory component
    and in printed copy. "Direct recording electronic voting machine" does not include
    a voting machine that captures votes by means of a ballot display but that transfers
    those votes onto an optical scan ballot or other paper record for tabulation.

    (G) "Help America Vote Act of 2002" means the "Help America Vote Act of 2002,"
    Pub. L. No. 107-252, 116 Stat. 1666.

    (H) "Voter verified paper audit trail" means a physical paper printout on which
    the voter''s ballot choices, as registered by a direct recording electronic voting
    machine, are recorded. The voter shall be permitted to visually or audibly inspect
    the contents of the physical paper printout. The physical paper printout shall
    be securely retained at the polling place until the close of the polls on the
    day of the election; the secretary of state shall adopt rules under Chapter 119.
    of the Revised Code specifying the manner of storing the physical paper printout
    at the polling place. After the physical paper printout is produced, but before
    the voter''s ballot is recorded, the voter shall have an opportunity to accept
    or reject the contents of the printout as matching the voter''s ballot choices.
    If a voter rejects the contents of the physical paper printout, the system that
    produces the voter verified paper audit trail shall invalidate the printout and
    permit the voter to recast the voter''s ballot. On and after the first federal
    election that occurs after January 1, 2006, unless required sooner by the Help
    America Vote Act of 2002, any system that produces a voter verified paper audit
    trail shall be accessible to disabled voters, including visually impaired voters,
    in the same manner as the direct recording electronic voting machine that produces
    it.

    (I) "Voter registration system" means software and any related equipment used
    by a board of elections or the secretary of state to process, store, organize,
    maintain, or retrieve voter registration records.

    (J) "Ballots on demand voting system" means a system that utilizes ballots printed
    as needed by election officials at the board of elections for distribution to
    electors, either in person or by mail.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3506.01
- number: '3506.02'
  heading: Manner of adopting voting machines, marking devices, and automatic tabulating
    equipment
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: 'Voting machines, marking devices, and automatic tabulating equipment may
    be adopted for use in elections in any county in the following manner:

    (A) By the board of elections;

    (B) By the board of county commissioners of such county on the recommendation
    of the board of elections;

    (C) By the affirmative vote of a majority of the electors of such county voting
    upon the question of the adoption of such equipment in such county.

    If a petition signed by electors equal in number to two per cent of the total
    votes cast in the county for the office of governor at the most recent general
    election for that office is filed with the board of elections, such board shall
    submit to the electors of such county at the next general election occurring not
    less than ninety days thereafter the question "Shall voting machines, marking
    devices, and automatic tabulating equipment be adopted in the county of ________________________?"
    Upon the filing of such petition, the board of elections shall forthwith notify
    the board of county commissioners, and the board of county commissioners shall
    forthwith determine whether it would prefer to purchase or lease such equipment
    in whole or in part for cash and if so whether it will be necessary or advisable
    to issue bonds to provide funds for the purchase of such equipment, if adopted.
    If the board of county commissioners determines that it is necessary or advisable
    to issue bonds therefor, it shall by resolution provide for the submission on
    the same ballot, but as a separate issue, the question of issuing such bonds.
    The question of issuing such bonds shall be submitted as required by division
    (A) of section 3506.03 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3506.02
- number: '3506.021'
  heading: Use of electronic pollbook
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A) A board of elections may adopt the use of any electronic pollbook that
    has been certified for use in this state in accordance with section 3506.05 of
    the Revised Code, instead of using poll lists or signature pollbooks. A board
    of elections that opts to use electronic pollbooks shall notify the secretary
    of state of that decision.

    (B) The secretary of state shall provide each board of elections that adopts the
    use of electronic pollbooks under division (A) of this section with rules, instructions,
    directives, and advisories regarding the examination, testing, and use of electronic
    pollbooks, including rules regarding the sealing of the information in those pollbooks
    as required under section 3505.31 of the Revised Code.

    (C) As used in this section, "electronic pollbook" has the same meaning as in
    section 3506.05 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3506.021
- number: '3506.03'
  heading: Acquisition of equipment
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: 'Upon the adoption of voting machines, marking devices, and automatic tabulating
    equipment either by the action of the board of elections or by the board of county
    commissioners, on the recommendation of the board of elections or by the affirmative
    vote of a majority of the electors voting on the question of the adoption of such
    equipment, such board of county commissioners shall acquire the equipment by any
    one or by any combination of the following methods:

    (A) By purchasing in whole or in part such equipment and paying the purchase price
    therefor in cash; or out of the proceeds of the issuance and sale of bonds, provided
    the question of issuing bonds for such purpose was submitted to the vote of the
    electors of the county pursuant to section 133.18 of the Revised Code and provided
    the issuance of such bonds was approved;

    (B) By purchasing in whole or in part such equipment and paying the purchase price
    in a series of consecutive annual approximately equal installments the number
    of which shall not exceed the estimated number of years of usefulness of such
    equipment, as determined by the fiscal officer of the county and by issuing to
    the seller negotiable promissory notes of the county, evidencing the annual installments
    to become due, specifying the terms of purchase, and bearing interest at a rate
    not exceeding the rate determined as provided in section 9.95 of the Revised Code,
    which notes shall be public obligations as defined in division (GG)(2) of section
    133.01 of the Revised Code and shall not be subject to Chapter 133. of the Revised
    Code, provided the legislation authorizing the issuance of such notes shall make
    provision for levying and collecting annually by taxation amounts sufficient to
    pay the interest on such notes and to provide for the payment of the principal
    thereof when due, and provided that the amounts of such tax so levied each year
    may be reduced by the amount by which revenues available for appropriation for
    the payment of the expenses of conducting elections are appropriated for, and
    applied to, the payment of such interest and principal of such notes;

    (C) By leasing such equipment in whole or in part under contract of lease which
    shall provide for the rental, and also may provide for an option to purchase them
    or parts of them at a fixed price with the rentals paid to be applied to the purchase
    price, and payments under such contracts of lease may be made by the county out
    of funds of the county not otherwise appropriated; or which may be appropriated
    by the board of county commissioners, out of funds appropriated by the board of
    county commissioners to the board of elections for the costs and expenses of elections,
    with the approval of the board of elections; or out of the funds the board of
    county commissioners is authorized to provide by a levy and collection thereof
    annually by taxation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3506.03
- number: '3506.04'
  heading: Acquisition of equipment in stages
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A) If it is impracticable to supply each election precinct with voting machines
    or marking devices for use at the next election following the adoption of such
    equipment, as many shall be supplied for that election and the succeeding elections
    as it is practicable to procure either by purchase or lease, or by a combination
    of both, and such equipment may be used in election precincts within the county
    as the board of elections directs until such time as it is practicable to provide
    the total number of voting machines or marking devices necessary to supply all
    precincts within the county, provided that the total number of voting machines
    or marking devices necessary to supply all precincts shall be procured by purchase
    or lease, or by a combination of both as soon as practicable after their adoption.

    (B) The board of elections shall be charged with the custody of all equipment
    acquired by the county, and shall see that all such equipment is kept in proper
    working order and in good repair. The board of county commissioners of any county
    or the board of elections, upon recommendation of the board of elections, may,
    prior to the adoption of such equipment, acquire by purchase or lease or by loan,
    for the experimental use in a limited number of precincts, such equipment, and
    such experimental use shall be valid for all purposes as if such equipment had
    been formally adopted, provided that such equipment has been approved by the board
    of voting systems examiners for experimental use.

    (C) All equipment acquired by any county by any of the methods provided for in
    this section shall be exempt from levy and taxation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3506.04
- number: '3506.05'
  heading: Certification of voting and tabulating equipment
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A) As used in this section:

    (1) "Electronic pollbook" means an electronic list of registered voters for a
    particular precinct or polling location that may be transported to a polling location.

    (2) Except when used as part of the phrase "tabulating equipment" or "automatic
    tabulating equipment," "equipment" means a voting machine, marking device, automatic
    tabulating equipment, software, an electronic pollbook, a voter registration system,
    or a ballots on demand voting system.

    (3) "Vendor" means the person that owns, manufactures, distributes, or has the
    legal right to control the use of equipment, or the person''s agent.

    (B) Except as otherwise provided in division (B) of section 3506.16 and in division
    (B) of section 3506.20 of the Revised Code, none of the following shall be purchased,
    leased, put in use, or continued to be used, except for experimental use as provided
    in division (B) of section 3506.04 of the Revised Code, unless it, a manual of
    procedures governing its use, and training materials, service, and other support
    arrangements have been certified by the secretary of state and unless any board
    of elections that will use the equipment has assured that a demonstration of the
    use of the equipment has been made available to all interested electors of the
    county:

    (1) A voting machine;

    (2) A marking device;

    (3) Automatic tabulating equipment;

    (4) Software used for the purpose of casting or tabulating votes or for communication
    among systems involved in the tabulation, storage, or casting of votes;

    (5) An electronic pollbook;

    (6) A voter registration system;

    (7) A ballots on demand voting system.

    (C)(1) The secretary of state shall appoint a board of voting systems examiners
    to examine and approve equipment and its related manuals and support arrangements.

    (2)(a) The board shall consist of four voting members, who shall be appointed
    as follows:

    (i) Two members appointed by the secretary of state;

    (ii) One member appointed by either the speaker of the house of representatives
    or the minority leader of the house of representatives, whichever is a member
    of the opposite political party from the one to which the secretary of state belongs;

    (iii) One member appointed by either the president of the senate or the minority
    leader of the senate, whichever is a member of the opposite political party from
    the one to which the secretary of state belongs.

    (b) The secretary of state also shall appoint a cybersecurity expert, who shall
    serve as a nonvoting member of the board.

    (3) In all cases of a tie vote or a disagreement in the board, if no decision
    can be arrived at, the board shall submit the matter in controversy to the secretary
    of state, who shall summarily decide the question, and the secretary of state''s
    decision shall be final. Each member of the board shall be a competent and experienced
    election officer or a person who is knowledgeable about the operation of voting
    equipment and shall serve during the secretary of state''s term. Any vacancy on
    the board shall be filled in the same manner as the original appointment. The
    secretary of state shall provide staffing assistance to the board, at the board''s
    request.

    (4) For the member''s service, each member of the board shall receive three hundred
    dollars per day for each combination of equipment examined and reported, but in
    no event shall a member receive more than six hundred dollars to examine and report
    on any one item of equipment. Each member of the board shall be reimbursed for
    expenses the member incurs during an examination or during the performance of
    any related duties that may be required by the secretary of state. Reimbursement
    of these expenses shall be made in accordance with, and shall not exceed, the
    rates provided for under section 126.31 of the Revised Code.

    (5) Neither the secretary of state nor the board, nor any public officer who participates
    in the authorization, examination, testing, or purchase of equipment, shall have
    any pecuniary interest in the equipment or any affiliation with the vendor.

    (D)(1) A vendor who desires to have the secretary of state certify equipment shall
    first submit the equipment, all current related procedural manuals, and a current
    description of all related support arrangements to the board of voting systems
    examiners for examination, testing, and approval. The submission shall be accompanied
    by a fee of two thousand four hundred dollars and a detailed explanation of the
    construction and method of operation of the equipment, a full statement of its
    advantages, and a list of the patents and copyrights used in the crucial operations
    of the equipment as determined by the board. An additional fee, in an amount to
    be set by rules promulgated by the board, may be imposed to pay for the costs
    of alternative testing or testing by persons other than board members, record-keeping,
    and other extraordinary costs incurred in the examination process. Moneys not
    used shall be returned to the person or entity submitting the equipment for examination.

    (2) Fees collected by the secretary of state under this section shall be deposited
    into the state treasury to the credit of the board of voting systems examiners
    fund, which is hereby created. All moneys credited to this fund shall be used
    solely for the purpose of paying for the services and expenses of each member
    of the board or for other expenses incurred relating to the examination, testing,
    reporting, or certification of equipment, the performance of any related duties
    as required by the secretary of state, or the reimbursement of any person submitting
    an examination fee as provided in this chapter.

    (E) Within sixty days after the submission of the equipment and payment of the
    fee, or as soon thereafter as is reasonably practicable, but in any event within
    not more than ninety days after the submission and payment, the board of voting
    systems examiners shall examine the equipment and file with the secretary of state
    a written report on the equipment with its recommendations and, if applicable,
    its determination or condition of approval regarding whether the equipment, manual,
    and other related materials or arrangements meet the applicable criteria and can
    be safely used by the voters at elections under the conditions prescribed in Title
    XXXV of the Revised Code, or a written statement of reasons for which testing
    requires a longer period. The board may grant temporary approval for the purpose
    of allowing experimental use of equipment. If the board finds that the equipment
    meets the applicable criteria, can be used safely and, if applicable, can be depended
    upon to record and count accurately and continuously the votes of electors, and
    has the capacity to be warranted, maintained, and serviced, it shall approve the
    equipment and recommend that the secretary of state certify the equipment. The
    secretary of state shall notify all boards of elections of any such certification.
    Equipment of the same model and make, if it operates in an identical manner, may
    then be adopted for use.

    (F) The vendor shall notify the secretary of state, who shall then notify the
    board of voting systems examiners, of any enhancement and any significant adjustment
    to the hardware or software that could result in a patent or copyright change
    or that significantly alters the crucial operations of the equipment as determined
    by the board. The vendor shall provide the secretary of state with an updated
    operations manual for the equipment, and the secretary of state shall forward
    the manual to the board. Upon receiving such a notification and manual, the board
    may require the vendor to submit the equipment to an examination and test in order
    for the equipment to remain certified. The board or the secretary of state shall
    periodically examine, test, and inspect certified equipment to determine continued
    compliance with all applicable requirements and the initial certification. Any
    examination, test, or inspection conducted for the purpose of continuing certification
    of any equipment in which a significant problem has been uncovered or in which
    a record of continuing problems exists shall be performed pursuant to divisions
    (D) and (E) of this section, in the same manner as the examination, test, or inspection
    is performed for initial approval and certification.

    (G) If, at any time after the certification of equipment, the board of voting
    systems examiners or the secretary of state is notified by a board of elections
    of any significant problem with the equipment or determines that the equipment
    fails to meet the requirements necessary for approval or continued compliance
    with all applicable requirements, or if the board of voting systems examiners
    determines that there are significant enhancements or adjustments to the hardware
    or software, or if notice of such enhancements or adjustments has not been given
    as required by division (F) of this section, the secretary of state shall notify
    the users and vendors of that equipment that certification of the equipment may
    be withdrawn.

    (H)(1) The notice given by the secretary of state under division (G) of this section
    shall be in writing and shall specify both of the following:

    (a) The reasons why the certification may be withdrawn;

    (b) The date on which certification will be withdrawn unless the vendor takes
    satisfactory corrective measures or explains why there are no problems with the
    equipment or why the enhancements or adjustments to the equipment are not significant.

    (2) A vendor who receives a notice under division (G) of this section shall, within
    thirty days after receiving it, submit to the board of voting systems examiners
    in writing a description of the corrective measures taken and the date on which
    they were taken, or the explanation required under division (H)(1)(b) of this
    section.

    (3) Not later than fifteen days after receiving a written description or explanation
    under division (H)(2) of this section from a vendor, the board shall determine
    whether the corrective measures taken or the explanation is satisfactory to allow
    continued certification of the equipment, and the secretary of state shall send
    the vendor a written notice of the board''s determination, specifying the reasons
    for it. If the board has determined that the measures taken or the explanation
    given is unsatisfactory, the notice shall include the effective date of withdrawal
    of the certification. This date may be different from the date originally specified
    in division (H)(1)(b) of this section.

    (4) A vendor who receives a notice under division (H)(3) of this section indicating
    a decision to withdraw certification may, within thirty days after receiving it,
    request in writing that the board hold a hearing to reconsider its decision. Any
    interested party shall be given the opportunity to submit testimony or documentation
    in support of or in opposition to the board''s recommendation to withdraw certification.
    Failure of the vendor to take appropriate steps as described in division (H)(1)(b)
    or to comply with division (H)(2) of this section results in a waiver of the vendor''s
    rights under division (H)(4) of this section.

    (I)(1) The secretary of state, in consultation with the board of voting systems
    examiners, shall establish, by rule, guidelines for the approval, certification,
    and continued certification of the equipment to be used under Title XXXV of the
    Revised Code. The guidelines shall establish procedures requiring vendors or computer
    software developers to place in escrow with an independent escrow agent approved
    by the secretary of state a copy of all source code and related documentation,
    together with periodic updates as they become known or available. The secretary
    of state shall require that the documentation include a system configuration and
    that the source code include all relevant program statements in low- or high-level
    languages. As used in this division, "source code" does not include variable codes
    created for specific elections.

    (2) Nothing in any rule adopted under division (I) of this section shall be construed
    to limit the ability of the secretary of state to follow or adopt, or to preclude
    the secretary of state from following or adopting, any guidelines proposed by
    the federal election commission, any entity authorized by the federal election
    commission to propose guidelines, the election assistance commission, or any entity
    authorized by the election assistance commission to propose guidelines.

    (3)(a) Before the initial certification of any direct recording electronic voting
    machine with a voter verified paper audit trail, and as a condition for the continued
    certification and use of those machines, the secretary of state shall establish,
    by rule, standards for the certification of those machines. Those standards shall
    include, but are not limited to, all of the following:

    (i) A definition of a voter verified paper audit trail as a paper record of the
    voter''s choices that is verified by the voter prior to the casting of the voter''s
    ballot and that is securely retained by the board of elections;

    (ii) Requirements that the voter verified paper audit trail shall not be retained
    by any voter and shall not contain individual voter information;

    (iii) A prohibition against the production by any direct recording electronic
    voting machine of anything that legally could be removed by the voter from the
    polling place, such as a receipt or voter confirmation;

    (iv) A requirement that paper used in producing a voter verified paper audit trail
    be sturdy, clean, and resistant to degradation;

    (v) A requirement that the voter verified paper audit trail shall be capable of
    being optically scanned for the purpose of conducting a recount or other audit
    of the voting machine and shall be readable in a manner that makes the voter''s
    ballot choices obvious to the voter without the use of computer or electronic
    codes;

    (vi) A requirement, for office-type ballots, that the voter verified paper audit
    trail include the name of each candidate selected by the voter;

    (vii) A requirement, for questions and issues ballots, that the voter verified
    paper audit trail include the title of the question or issue, the name of the
    entity that placed the question or issue on the ballot, and the voter''s ballot
    selection on that question or issue, but not the entire text of the question or
    issue.

    (b) The secretary of state, by rule adopted under Chapter 119. of the Revised
    Code, may waive the requirement under division (I)(3)(a)(v) of this section, if
    the secretary of state determines that the requirement is cost prohibitive.

    (4)(a) Except as otherwise provided in divisions (I)(4)(b) and (c) of this section,
    any equipment used in this state shall meet, as a condition of continued certification
    and use, the voting system standards adopted by the federal election commission
    in 2002 or the voluntary voting system guidelines most recently adopted by the
    federal election assistance commission. Equipment initially certified or acquired
    on or after December 1, 2008, also shall have the most recent federal certification
    number issued by the election assistance commission.

    (b) Division (I)(4)(a) of this section does not apply to any equipment that the
    federal election assistance commission does not certify as part of its testing
    and certification program.

    (c) A county that acquires additional voting machines, marking devices, or automatic
    tabulating equipment on or after December 1, 2008, shall not be considered to
    have acquired those machines, devices, or equipment on or after December 1, 2008,
    for the purpose of division (I)(4)(a) of this section if all of the following
    apply:

    (i) The voting machines, marking devices, or automatic tabulating equipment acquired
    are the same as the machines, devices, or equipment currently used in that county.

    (ii) The acquisition of the voting machines, marking devices, or automatic tabulating
    equipment does not replace or change the primary voting system used in that county.

    (iii) The acquisition of the voting machines, marking devices, or automatic tabulating
    equipment is for the purpose of replacing inoperable machines, devices, or equipment
    or for the purpose of providing additional machines, devices, or equipment required
    to meet the allocation requirements established pursuant to division (I) of section
    3501.11 of the Revised Code.'
