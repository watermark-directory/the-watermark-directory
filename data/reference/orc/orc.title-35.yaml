- number: '3506.11'
  heading: Rotation of candidates' names
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: The names of all candidates for an office shall be arranged in a group under
    the title of the office and printed on labels so that they may be rotated on the
    voting machine as provided in section 3505.03 of the Revised Code. Under the name
    of each candidate nominated at a primary election, nominated by petition under
    section 3517.012 of the Revised Code, or certified by a party committee to fill
    a vacancy under section 3513.31 of the Revised Code, the name of the political
    party that nominated or certified the candidate shall be printed in less prominent
    typeface than that in which the candidate's name is printed.
