- number: '3519.05'
  heading: Form of petitions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: '(A) If the measure to be submitted proposes a constitutional amendment, the
    heading of each part of the petition shall be prepared in the following form,
    and printed in capital letters in type of the approximate size set forth:

    "INITIATIVE PETITION

    Amendment to the Constitution

    Proposed by Initiative Petition

    To be submitted directly to the electors"

    "Amendment" printed in fourteen-point boldface type shall precede the title, which
    shall be briefly expressed and printed in eight-point type. The summary shall
    then be set forth printed in ten-point type, and then shall follow the certification
    of the attorney general, under proper date, which shall also be printed in ten-point
    type. The petition shall then set forth the names and addresses of the committee
    of not less than three nor more than five to represent the petitioners in all
    matters relating to the petition or its circulation.

    Immediately above the heading of the place for signatures on each part of the
    petition the following notice shall be printed in boldface type:

    "NOTICE

    Whoever knowingly signs this petition more than once; except as provided in section
    3501.382 of the Revised Code, signs a name other than one''s own on this petition;
    or signs this petition when not a qualified voter, is liable to prosecution."

    The heading of the place for signatures shall be substantially as follows:

    "(Sign with ink. Your name, residence, and date of signing must be given.)

    _______________________________________________________________


    Rural Route or other Post- SignatureCountyTownshipoffice AddressMonthDayYear

    _______________________________________________________________

    (Voters who do not live in a municipal corporation should fill in the information
    called for by headings printed above.)

    (Voters who reside in municipal corporations should fill in the information called
    for by headings printed below.)

    _______________________________________________________________


    CityStreet orand SignatureCountyVillageNumberWardPrecinctMonthDayYear"

    _______________________________________________________________

    The text of the proposed amendment shall be printed in full, immediately following
    the place for signatures, and shall be prefaced by "Be it resolved by the people
    of the State of Ohio." Immediately following the text of the proposed amendment
    must appear the following form:

    "I, _________, declare under penalty of election falsification that I am the circulator
    of the foregoing petition paper containing the signatures of _________ electors,
    that the signatures appended hereto were made and appended in my presence on the
    date set opposite each respective name, and are the signatures of the persons
    whose names they purport to be or of attorneys in fact acting pursuant to section
    3501.382 of the Revised Code, and that the electors signing this petition did
    so with knowledge of the contents of same. I am employed to circulate this petition
    by ________________________________ (Name and address of employer). (The preceding
    sentence shall be completed as required by section 3501.38 of the Revised Code
    if the circulator is being employed to circulate the petition.)

    (Signed) ________________________

    (Address of circulator''s permanent

    residence in this state)

    __________________________________

    WHOEVER COMMITS ELECTION FALSIFICATION IS GUILTY OF A FELONY OF THE FIFTH DEGREE."

    (B) If the measure proposes a law, the heading of each part of the petition shall
    be prepared as follows:

    "INITIATIVE PETITION

    Law proposed by initiative petition first to be submitted to the General Assembly."

    In all other respects, the form shall be as provided for the submission of a constitutional
    amendment, except that the text of the proposed law shall be prefaced by "Be it
    enacted by the people of the state of Ohio."

    The form for a supplementary initiative petition shall be the same as that provided
    for an initiative petition, with the exception that "supplementary" shall precede
    "initiative" in the title thereof.

    (C) The general provisions set forth in this section relative to the form and
    order of an initiative petition shall be, so far as practical, applicable to a
    referendum petition, the heading of which shall be as follows:

    "REFERENDUM PETITION

    To be submitted to the electors for their approval or rejection"

    The title, which follows the heading, shall contain a brief legislative history
    of the law, section, or item of law to be referred. The text of the law so referred
    shall be followed by the certification of the secretary of state, in accordance
    with division (B)(2)(b) of section 3519.01 of the Revised Code, that it has been
    compared with the copy of the enrolled act, on file in the secretary of state''s
    office, containing such law, section, or item of law, and found to be correct.

    (D) The secretary of state shall prescribe a form for part petitions to be submitted
    during the ten-day period beginning on the first day following the date that the
    secretary of state notifies the chairperson of the committee interested in the
    petition that the petition has an insufficient number of valid signatures. The
    secretary of state shall provide to each particular committee a different form
    that contains a unique identifier and that is separate from the forms prescribed
    in divisions (A), (B), and (C) of this section. The secretary of state shall make
    the form available to the committee only as described in division (F) of section
    3519.16 of the Revised Code. The form shall not be considered a public record
    until after the secretary of state makes it available to the committee under that
    division.

    The form shall comply with the requirements of Section 1g of Article II, Ohio
    Constitution and, except as otherwise provided in this division, with the requirements
    of divisions (A), (B), and (C) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.05
- number: '3519.051'
  heading: Original ink signatures required for initiative and referendum
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: Each signature of a voter who signs an initiative or referendum petition shall
    be an original signature of that voter in ink. Only initiative and referendum
    petitions containing those original signatures in ink shall be filed with the
    office of the secretary of state or a board of elections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.051
- number: '3519.06'
  heading: Verification of petition
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: 'No initiative or referendum part-petition is properly verified if it appears
    on the face thereof, or is made to appear by a satisfactory evidence:

    (A) That the statement required by section 3519.05 of the Revised Code is not
    properly filled out;

    (B) That the statement is not properly signed;

    (C) That the statement is altered by erasure, interlineation, or otherwise;

    (D) That the statement is false in any respect;

    (E) That any one person has affixed more than one signature thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.06
- number: '3519.07'
  heading: Web site postings required for initiative or referendum proposals
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: '(A) The secretary of state shall post each of the following on the web site
    of the office of the secretary of state:

    (1) The full text of each state law or constitutional amendment proposed by initiative
    petition that has been approved for the ballot;

    (2) The certified title and summary of each state law or constitutional amendment
    proposed by initiative petition that has been approved for the ballot;

    (3) The ballot language of each state law or constitutional amendment proposed
    by initiative petition;

    (4) The arguments or explanations in favor of or against each state law or constitutional
    amendment proposed by initiative petition that has been approved for the ballot.

    (B) When publishing or posting on the web site of the office of the secretary
    of state arguments or explanations in favor of or against any state law or constitutional
    amendment proposed by initiative petition that has been approved for the ballot,
    the secretary of state shall include the names of the persons who prepared the
    argument or explanation. The names of the persons shall not be considered part
    of the argument or explanation for purposes of the prohibition against arguments
    and explanations exceeding three hundred words under section 3519.03 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.07
- number: '3519.08'
  heading: Withdrawal of petition - ballot procedure
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: '(A) Notwithstanding division (I)(2) of section 3501.38 of the Revised Code,
    at any time prior to the seventieth day before the day of an election at which
    an initiative or referendum is scheduled to appear on the ballot, a majority of
    the members of the committee named to represent the petitioners in the petition
    proposing that initiative or referendum under section 3519.02 of the Revised Code
    may withdraw the petition by giving written notice of the withdrawal to the secretary
    of state.

    (B) After a majority of the members of the committee named to represent the petitioners
    gives notice to the secretary of state that the petition proposing the initiative
    or referendum is withdrawn under division (A) of this section, all of the following
    shall apply:

    (1) If the Ohio ballot board has not already certified the ballot language at
    the time a majority of the members of the committee gives the written notice of
    withdrawal, the board shall not certify ballot language for that proposed initiative
    or referendum to the secretary of state.

    (2) The secretary of state shall not certify a ballot form or wording to the boards
    of elections under sections 3501.05 and 3505.01 of the Revised Code that includes
    ballot language for that proposed initiative or referendum.

    (3) The proposed initiative or referendum shall not appear on the ballot.

    (C) No petition that has been filed, and subsequently withdrawn under this section,
    may be resubmitted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.08
- number: '3519.10'
  heading: Qualifications of signers - format of signing
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: Each signer of any initiative or referendum petition must be a qualified elector
    of the state. He shall place on such petition after his name the date of signing
    and the location of his voting residence, including the street and number in which
    such voting residence is located, if in a municipal corporation, and the rural
    route or other post-office address and township in which such voting residence
    is located, if outside a municipal corporation. Each signer may also print his
    name so as to clearly identify his signature. Each part-petition which is filed
    shall contain signatures of electors of only one county. Petitions containing
    signatures of electors of more than one county shall not thereby be declared invalid.
    In case petitions containing signatures of electors of more than one county are
    filed, the secretary of state shall determine the county from which the majority
    of signatures came, and only signatures from such county shall be counted. Signatures
    from any other county shall be invalid.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.10
- number: '3519.14'
  heading: Minimum number of signatures
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: The secretary of state shall not accept for filing any initiative or referendum
    petition which does not purport to contain at least the minimum number of signatures
    required for the submission of the amendment, proposed law, or law to be submitted
    under the initiative or referendum power.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.14
- number: '3519.15'
  heading: Part-petitions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: 'Whenever any initiative or referendum petition has been filed with the secretary
    of state, he shall forthwith separate the part-petitions by counties and transmit
    such part-petitions to the boards of elections in the respective counties. The
    several boards shall proceed at once to ascertain whether each part-petition is
    properly verified, and whether the names on each part-petition are on the registration
    lists of such county, or whether the persons whose names appear on each part-petition
    are eligible to vote in such county, and to determine any repetition or duplication
    of signatures, the number of illegal signatures, and the omission of any necessary
    details required by law. The boards shall make note opposite such signatures and
    submit a report to the secretary of state indicating the sufficiency or insufficiency
    of such signatures and indicating whether or not each part-petition is properly
    verified, eliminating, for the purpose of such report, all signatures on any part-petition
    that are not properly verified.

    In determining the sufficiency of such a petition, only the signatures of those
    persons shall be counted who are electors at the time the boards examine the petition.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.15
- number: '3519.16'
  heading: Jurisdiction over challenges to petitions; part-petitions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: '(A) Pursuant to Section 1g of Article II, Ohio Constitution, the supreme
    court of Ohio shall have exclusive original jurisdiction in all challenges to
    initiative and referendum petitions.

    (B) The committee interested in a petition shall include upon each part-petition
    filed with the secretary of state a designation of the county in which the part-petition
    was circulated and a number for the part-petition. In any county where part-petitions
    are circulated, each part-petition shall be numbered sequentially. The committee
    shall sort the part-petitions by county. Upon filing the petition with the secretary
    of state, the committee also shall file the following:

    (1) An electronic copy of the petition along with a verification that the electronic
    copy is a true representation of the original filed paper petition;

    (2) A summary of the number of part-petitions filed per county, and the number
    of signatures on each part-petition;

    (3) An index of the electronic copy of the petition.

    (C) From the time the petition is initially filed with the secretary of state
    and until the part-petitions are returned to the secretary of state by the boards
    of elections after a determination of sufficiency under section 3519.15 of the
    Revised Code, any request for the inspection or copying of the original petition
    filed with the secretary of state under Chapter 149. of the Revised Code is fulfilled
    if the secretary of state permits the inspection of or provides copies of the
    electronic copy of the petition filed by the circulator.

    (D) Discrepancies between the electronic copy of a petition filed under division
    (B)(1) of this section and the original paper petition filed with the secretary
    of state shall not render the petition invalid. Such discrepancies, if the product
    of fraud, shall be subject to criminal penalties under section 3599.36 of the
    Revised Code.

    (E) The properly verified part-petitions, together with an electronic copy of
    the part-petitions, shall be returned to the secretary of state not less than
    one hundred ten days before the election, provided that, in the case of an initiated
    law to be presented to the general assembly, the boards shall promptly check and
    return the petitions together with their report. The secretary of state shall
    determine the sufficiency of the signatures not later than one hundred five days
    before the election. The secretary of state promptly shall notify the chairperson
    of the committee in charge of the circulation as to the sufficiency or insufficiency
    of the petition and the extent of the insufficiency.

    (F) If the petition is found insufficient because of an insufficient number of
    valid signatures, the committee shall be allowed ten additional days after the
    notification by the secretary of state for the collection and filing of additional
    signatures to the petition. When the secretary of state makes that notification,
    the secretary of state simultaneously shall provide the chairperson with both
    a paper copy and an electronic copy of the unique petition form described in division
    (D) of section 3519.05 of the Revised Code. At that time, the secretary of state
    also shall make the form available to the public on the secretary of state''s
    official web site and shall transmit the form electronically to the boards of
    elections. Upon request, a board of elections shall provide a paper or electronic
    copy of the form to any person.

    No additional signatures shall be collected or submitted to the secretary of state
    by the committee interested in the petition, or by any person acting on behalf
    of the committee, during the period beginning on the date that the petition is
    initially submitted to the secretary of state and ending on the date that the
    secretary of state notifies the chairperson of the committee that the petition
    has an insufficient number of valid signatures. If the committee, or any person
    acting on behalf of the committee, submits additional signatures, the signatures
    must be on the form provided by the secretary of state under this division and
    only signatures that were signed and collected during the ten-day period to collect
    and submit additional signatures may be submitted.

    If additional signatures are filed, the secretary of state shall determine the
    sufficiency of those additional signatures not later than sixty-five days before
    the election. The part-petitions of the supplementary petition that appear to
    the secretary of state to be properly verified, upon their receipt by the secretary
    of state, shall forthwith be forwarded to the boards of the several counties together
    with the part-petitions of the original petition that have been properly verified.
    They shall be immediately examined and passed upon as to the validity and sufficiency
    of the signatures on them by each of the boards and returned within eight days
    to the secretary of state with the report of each board. No signature on a supplementary
    part-petition that is the same as a signature on an original part-petition shall
    be counted. The number of signatures in both the original and supplementary petitions,
    properly verified, shall be used by the secretary of state in determining the
    total number of signatures to the petition that the secretary of state shall record
    and announce. If they are sufficient, the amendment, proposed law, or law shall
    be placed on the ballot as required by law. If the petition is found insufficient,
    the secretary of state shall notify the committee in charge of the circulation
    of the petition.'
