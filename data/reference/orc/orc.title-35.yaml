- number: '3517.121'
  heading: Contributions and expenditures by foreign nationals
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: 'Notwithstanding any contrary provision of the Revised Code:

    (A) As used in this section:

    (1) "Electioneering communication" has the same meaning as in section 3517.1011
    of the Revised Code.

    (2) "Foreign national" means any of the following, as applicable:

    (a) In the case of an individual, an individual who is not a United States citizen
    or national;

    (b) A government of a foreign country or of a political subdivision of a foreign
    country;

    (c) A foreign political party;

    (d) A person, other than an individual, that is organized under the laws of, or
    has its principal place of business in, a foreign country.

    (B) No foreign national shall, directly or indirectly through any person or entity,
    do any of the following:

    (1) Make a contribution, expenditure, or independent expenditure in support of
    or opposition to a candidate for any elective office in this state, including
    an office of a political party;

    (2) Make a contribution, expenditure, or independent expenditure in support of
    or opposition to a statewide ballot issue or question, regardless of whether the
    ballot issue or question has yet been certified to appear on the ballot;

    (3) Make a disbursement for the direct cost of producing or airing an electioneering
    communication;

    (4) Make a contribution to a candidate, campaign committee, political action committee,
    political contributing entity, legislative campaign fund, state candidate fund,
    political party, or separate segregated fund, to any committee created to support
    or oppose a ballot issue or question, or, to the maximum extent permitted by law
    and by the constitutions of the United States and of this state, to a continuing
    association;

    (5) Promise, either expressly or implicitly, to make a contribution, expenditure,
    independent expenditure, or disbursement described in division (B)(1), (2), (3),
    or (4) of this section.

    (C) No individual, candidate, campaign committee, political action committee,
    political contributing entity, legislative campaign fund, state candidate fund,
    political party, separate segregated fund, or committee created to support or
    oppose a ballot issue or question and, to the maximum extent permitted by law
    and by the constitutions of the United States and of this state, no continuing
    association shall, directly or indirectly through any other person or entity,
    knowingly do either of the following:

    (1) Solicit, accept, or receive any funds from a foreign national for any purpose
    described in division (B) of this section;

    (2) Make a contribution, expenditure, or independent expenditure using any funds
    the person knows were received from a foreign national for any purpose described
    in division (B) of this section.

    (D) No person shall knowingly aid or facilitate a violation of division (B) or
    (C) of this section.

    (E) Any complaint that alleges a violation of division (W) of section 3517.13
    of the Revised Code shall be treated as instead alleging a violation of this section.

    (F)(1) Whoever knowingly violates division (B) of this section is guilty of a
    misdemeanor of the first degree on a first offense and is guilty of a felony of
    the fifth degree on a second or subsequent offense. The violator also shall be
    fined an amount equal to three times the amount involved in the violation or ten
    thousand dollars, whichever amount is greater.

    (2) Whoever knowingly violates division (C) of this section is guilty of a misdemeanor
    of the first degree on a first offense and is guilty of a felony of the fifth
    degree on a second or subsequent offense. The violator also shall be fined an
    amount equal to three times the amount involved in the violation or ten thousand
    dollars, whichever amount is greater, and shall be required to return the total
    amount accepted in violation of that division to the foreign national from whom
    it was accepted.

    (3) Whoever knowingly violates division (D) of this section is guilty of a misdemeanor
    of the first degree and shall be fined one thousand dollars.

    (G)(1)(a) Except as otherwise provided in division (G)(1)(b) of this section,
    the attorney general has exclusive authority to prosecute a violation of this
    section and has exclusive supervision and control of all investigations, prosecutions,
    and enforcement proceedings under this section.

    (b) If the attorney general is a victim or witness or otherwise involved in an
    alleged violation of this section, the attorney general shall refer the matter
    to the appropriate prosecutor, as determined under division (C) of section 3517.17
    of the Revised Code, except that if applicable, the attorney general shall make
    the determination described in division (B)(2) of that section instead of the
    Ohio election integrity commission.

    (2) Upon the occurrence of either of the following, the attorney general shall
    investigate an alleged violation of this section in consultation with the secretary
    of state:

    (a) The submission of a written request to the attorney general by the governor,
    the secretary of state, the general assembly, or the Ohio election integrity commission,
    alleging a violation of this section;

    (b) The filing of a complaint with the attorney general by an elector of this
    state, alleging a violation of this section.

    (3) If it appears to the attorney general, after conducting an investigation under
    division (G)(2) of this section, that there is probable cause to believe that
    a violation of this section has occurred, the attorney general may prosecute the
    violation in a court of competent jurisdiction.

    (H) When proceeding under this section, the attorney general and any assistant
    or special counsel designated by the attorney general for that purpose have all
    the rights, privileges, and powers conferred by law on prosecuting attorneys,
    including the power to appear before grand juries and to interrogate witnesses
    before such grand juries. These powers of the attorney general are in addition
    to any other applicable powers of the attorney general.'
