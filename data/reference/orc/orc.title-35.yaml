- number: '3506.15'
  heading: Secretary of state to promulgate rules for equipment and conduct of elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: 'The secretary of state shall provide each board of elections with rules,
    instructions, directives, and advisories regarding the examination, testing, and
    use of the voting machine and tabulating equipment, the assignment of duties of
    booth officials, the procedure for casting a vote on the machine, and how the
    vote shall be tallied and reported to the board, and with other rules, instructions,
    directives, and advisories the secretary of state finds necessary to ensure the
    adequate care and custody of voting equipment, and the accurate registering, counting,
    and canvassing of the votes as required by this chapter. The boards of elections
    shall be charged with the responsibility of providing for the adequate instruction
    of voters and election officials in the proper use of the voting machine and marking
    devices.

    The secretary of state''s rules, instructions, directives, and advisories provided
    under this section shall comply, insofar as practicable, with this chapter. The
    provisions of Title XXXV of the Revised Code, not inconsistent with the provisions
    relating to voting machines, apply in any county using a voting machine.'
  history: null
