- number: '3511.01'
  heading: Definitions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: 'As used in this chapter:

    (A) "Dependent" means a person who is recognized as a dependent by one of the
    uniformed services.

    (B) "Overseas voter" means any of the following:

    (1) A person who is outside of the United States and who, before leaving the United
    States, was last eligible to vote in this state, who may be considered a state
    resident using the standards for residency established in sections 3503.02 and
    3511.011 of the Revised Code, and who otherwise satisfies the requirements to
    vote in this state;

    (2) A person who is outside of the United States and who, before leaving the United
    States, would have been eligible to vote in this state had the person then been
    eighteen years of age or older, who may be considered a state resident using the
    standards for residency established in sections 3503.02 and 3511.011 of the Revised
    Code, and who otherwise satisfies the requirements to vote in this state;

    (3) A person who was born outside of the United States, who may be considered
    a state resident using the standards for residency established in sections 3503.02
    and 3511.011 of the Revised Code, and who otherwise satisfies the requirements
    to vote in this state, if both of the following apply:

    (a) The last place where the person''s parent or legal guardian was, or would
    have been, eligible to vote before leaving the United States is within this state;
    and

    (b) The person has not previously registered to vote in any other state.

    (C) "Uniformed services" means:

    (1) Active and reserve components of the army, navy, air force, marine corps,
    space force, or coast guard of the United States;

    (2) The merchant marine, the commissioned corps of the public health service,
    or the commissioned corps of the national oceanic and atmospheric administration
    of the United States;

    (3) The national guard and the organized militia.

    (D) "Uniformed services voter" means an individual who is qualified to vote in
    this state and who is:

    (1) A member of one of the uniformed services described in division (C)(1) or
    (2) of this section;

    (2) A member of one of the uniformed services described in division (C)(3) of
    this section who is on activated status.

    (3) A spouse or dependent of a uniformed services voter.'
