- number: '3506.19'
  heading: Disability-accessible electronic voting machine to be required at each
    polling place
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: On and after the first federal election that occurs after January 1, 2006,
    unless required sooner by the Help America Vote Act of 2002, each polling location
    shall have available for use at all elections at least one direct recording electronic
    voting machine or marking device that is accessible for individuals with disabilities,
    including nonvisual accessibility for persons who are blind and visually impaired,
    in a manner that provides the same opportunity for access and participation, including
    privacy and independence, as for other voters.
