- number: '3515.12'
  heading: Witnesses - subpoenas
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: The court with which a petition to contest an election is filed may summon
    and compel the attendance of witnesses, including officers of such election, and
    compel the production of all ballot boxes, marking devices, lists, books, ballots,
    tally sheets, and other records, papers, documents, and materials which may be
    required at the hearing. The style and form of summons and subpoenas and the manner
    of service and the fees of officers and witnesses shall be the same as are provided
    in other cases, in so far as the nature of the proceedings admits. The court may
    require any election officer to answer any questions pertinent to the issue relating
    to the conduct of the election or the counting of the ballots and the making of
    the returns. Any witness who voted at the election may be required to answer touching
    his qualification as a voter and for whom he voted.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.12
- number: '3515.13'
  heading: Contest of election involving recount
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: If any contest of election involves a recount of the ballots in any precincts,
    the court shall immediately order the ballots of the precincts in which the recount
    is demanded to be sent to the court in such manner as the court designates, and
    such court may appoint two master commissioners of opposite political parties
    to supervise the making of the recount. The attorneys representing the contestor
    and the prosecuting attorney of the county or the attorney general or one of the
    attorney general's assistants representing the contestee shall be present at all
    hearings on such recount. Such commissioners shall receive ten dollars each per
    day and their actual traveling expenses when approved by the presiding judges.
    The compensation of such clerks as are deemed necessary by the court shall be
    determined by the court on the basis of similar compensation in other public offices
    for like work. Both the contestor and contestee may appoint one observer who shall
    be allowed to see all ballots and tally sheets and observe the recount. If the
    court finds that the difference in the count from the original count by the election
    authorities was the result of fraud, gross negligence, or willfulness on the part
    of any election officer or other person, the court shall forthwith transmit a
    copy of its decision and of the evidence to the prosecuting attorney of the county
    in which the fraud or gross negligence was found with directions to present the
    same to the next grand jury in the county or to the attorney general, in the case
    of state or federal offices, with directions to prosecute the cases on behalf
    of the state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.13
- number: '3515.14'
  heading: Judgment on contest
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: 'Upon completion of the trial of a contest of election, the court shall pronounce
    judgment as to which candidate was nominated or elected or whether the issue was
    approved or rejected by the voters; except that in the case of the contest of
    election of a member of the general assembly such judgment shall not be pronounced
    by the court but a transcript of all testimony taken and all evidence adduced
    in such contest shall be filed with the clerk or executive secretary of the branch
    of the legislative body to which the contestee was declared elected, which shall
    determine the election and qualification of its own members.

    Any person declared nominated or elected by the court shall be entitled to his
    certificate of nomination or election. A certified copy of the order of such court
    constitutes such certificate. If the judgment is against the contestee or incumbent
    and he has already received a certificate of nomination or election, the judgment
    of the court shall work a cancellation of such certificate.

    If the court decides that the election resulted in a tie vote, such decision shall
    be certified to the board of elections having jurisdiction and said board shall
    publicly determine by lot which of such persons shall be declared elected. If
    the court finds that no person was elected, the judgment shall be that the election
    be set aside.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.14
- number: '3515.15'
  heading: Appeal to supreme court
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: The person against whom judgment is rendered in a contest of election may
    appeal on questions of law, within twenty days, to the supreme court; but such
    appeal shall not supersede the execution of the judgment of the court. Such appeal
    takes precedence over all other causes upon the calendar, and shall be set down
    for hearing and determination at the earliest convenient date. The laws and rules
    of the court governing appeals apply in the appeal of contested election cases.
    If the judgment of the lower court is affirmed, the supreme court shall order
    the judgment of such lower court to be enforced, if the party against whom the
    judgment is rendered is in possession of the office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3515.15
- number: '3515.16'
  heading: Form of testimony in supreme court
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3515'
    name: Recount; Contest Of Elections
  text: In a contest of election in the supreme court, all testimony shall be in the
    form of depositions. The contestor shall take and file his testimony within twenty
    days from the date of filing the petition, unless further time is allowed by the
    court or judge hearing the contest. The contestee or the committee defending the
    issue shall file its testimony within twenty days from the expiration of the contestor's
    time, unless such court or judge allows further time. The court may render such
    judgments and make such orders as the law and facts warrant, including judgment
    of ouster and induction, and the judgment of the supreme court shall be decisive
    of the contest.
