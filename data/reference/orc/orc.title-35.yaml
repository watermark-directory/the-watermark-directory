- number: '3513.256'
  heading: Procedures for a nonpartisan primary election
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) Notwithstanding any provision of the Revised Code to the contrary, for
    the purpose of nominating candidates for a position as a member of the board of
    education of a city, local, or exempted village school district or a position
    as a member of a governing board of an educational service center, the board may
    adopt, by resolution upon a three-fifths majority vote of its total membership,
    procedures for a nonpartisan primary election. Such procedures shall specify the
    following:

    (1) That the primary election for nominating candidates for a position as a member
    of that board shall be held on the same day as the primary election for nominating
    all other candidates for public office in that year;

    (2) That nominating petitions shall be filed with the board of elections not later
    than four p.m. of the ninetieth day before the day of the primary election;

    (3) That the primary election shall take place only if the number of candidates
    for nomination for a position on that board, as verified by the board of elections,
    is at least one more than two times the number of available positions on that
    board at the general election;

    (4) That the number of candidates advancing from the primary election to the general
    election shall equal two times the number of available positions on that board
    at the general election.

    The board shall notify the board of elections upon adoption of a resolution under
    this division. No such resolution shall apply for a particular election unless
    the resolution is adopted at least one hundred twenty days prior to the deadline
    specified in the resolution to become a candidate for nomination at that election.
    Subject to division (B) of this section, the resolution shall apply to all subsequent
    nominations for a position as a member of that board.

    (B) Not earlier than five years after the adoption of a resolution under division
    (A) of this section, the board of education of a city, local, or exempted village
    school district or the governing board of an educational service center may rescind
    that resolution by subsequent resolution upon a three-fifths majority vote of
    its total membership.

    The board shall notify the board of elections of any resolution adopted under
    this division. No such resolution shall apply to a particular election unless
    the resolution is adopted at least one hundred twenty days prior to the deadline
    to become a candidate for nomination at that election under the nomination procedures
    the resolution is rescinding. Subject to division (D) of this section, the requirements
    of Chapter 3513. of the Revised Code shall apply to all subsequent nominations
    for a position as a member of that board.

    (C) Any candidate nominated pursuant to a resolution adopted under division (A)
    of this section shall appear on the nonpartisan ballot at the general election
    as prescribed in sections 3505.04, 3513.254, and 3513.255 of the Revised Code.

    (D) Nothing in this section prohibits or shall be construed to prohibit the board
    of education of a city, local, or exempted village school district or the governing
    board of an educational service center that has rescinded a resolution under division
    (B) of this section from subsequently adopting the same or different procedures
    for a nonpartisan primary election by adopting a resolution under division (A)
    of this section.'
