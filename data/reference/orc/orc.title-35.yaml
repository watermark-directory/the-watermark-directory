- number: '3501.06'
  heading: County board of elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) There shall be in each county of the state a board of elections consisting
    of four qualified electors of the county, who shall be appointed by the secretary
    of state, as the secretary''s representatives.

    (B)(1) On the first day of March in the years 2014 and 2016, the secretary of
    state shall appoint two of such board members for a term of three years. One of
    those board members shall be from the political party which cast the highest number
    of votes for the office of governor at the most recent regular state election,
    and the other shall be from the political party which cast the next highest number
    of votes for the office of governor at such election.

    (2) Beginning in 2017, on the first day of March in odd-numbered years, the secretary
    of state shall appoint two of such board members for a term of four years. One
    of those board members shall be from the political party which cast the highest
    number of votes for the office of governor at the most recent regular state election,
    and the other shall be from the political party which cast the next highest number
    of votes for the office of governor at such election. Thereafter, all appointments
    shall be made on the first day of March in odd-numbered years for a term of four
    years.

    (C) All vacancies filled for unexpired terms and all appointments to new terms
    shall be made from the political party to which the vacating or outgoing member
    belonged, unless there is a third political party which cast a greater number
    of votes in the state at the most recent regular state election for the office
    of governor than did the party to which the retiring member belonged, in which
    event the vacancy shall be filled from such third party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.06
- number: '3501.07'
  heading: Filling vacancies on county boards of elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'At a meeting held not more than sixty nor less than fifteen days before the
    expiration date of the term of office of a member of the board of elections, or
    within fifteen days after a vacancy occurs in the board, the county executive
    committee of the major political party entitled to the appointment may make and
    file a recommendation with the secretary of state for the appointment of a qualified
    elector. The secretary of state shall appoint such elector, unless the secretary
    of state has reason to believe that the elector would not be a competent member
    of such board. In such cases the secretary of state shall so state in writing
    to the chairperson of such county executive committee, with the reasons therefor,
    and such committee may either recommend another elector or may apply for a writ
    of mandamus to the supreme court to compel the secretary of state to appoint the
    elector so recommended. In such action the burden of proof to show the qualifications
    of the person so recommended shall be on the committee making the recommendation.
    If no such recommendation is made, the secretary of state shall make the appointment.

    If a vacancy on the board of elections is to be filled by a minor political party,
    authorized officials of that party may within fifteen days after the vacancy occurs
    recommend a qualified person to the secretary of state for appointment to such
    vacancy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.07
- number: '3501.08'
  heading: Oath of members
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: Before entering upon the duties of his office, each member of the board of
    elections shall appear before a person authorized to administer oaths and take
    and subscribe to an oath that he will support the constitutions of the United
    States and of the state, will perform the duties of the office to the best of
    his ability, will enforce the election laws, and will protect and preserve the
    records and property pertaining to elections. Such oath shall be filed with the
    clerk of the court of common pleas of the county wherein the officer resides within
    fifteen days from the date of appointment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.08
- number: '3501.09'
  heading: Organization of county board
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'Biennially, within five days after the appointments to the board of elections
    are made by the secretary of state, the members of the board shall meet and organize
    by selecting one of their number as chairperson, who shall preside at all meetings.
    They shall, upon careful consideration of each such person''s qualifications,
    select a resident elector of the county, other than a member of the board, as
    director, and a resident elector of the county as deputy director. All such officers
    shall continue in office, at the pleasure of the board, for two years. The balloting
    for such officers shall commence on the day of the convening and be taken until
    such organization is effected or five ballots have been cast. The director shall
    first be selected by the votes of at least three members. If, after five ballots,
    no person is agreed upon as director, the names of all persons voted for on the
    fifth ballot, together with the names of the board members who nominated them,
    shall be certified to the secretary of state, who shall designate therefrom one
    of such persons to serve as director, unless the secretary of state has reason
    to believe that no person nominated is qualified. In this case the secretary of
    state shall so state in writing to the board, and the board shall nominate other
    persons, in the manner in which the original persons were nominated, and select
    from those nominated another person as director. If, after five ballots, no person
    is agreed upon as director, the names of all persons voted for on the fifth ballot,
    together with the names of the board members who nominated them, shall be certified
    to the secretary of state, who shall designate therefrom one of such nominees
    to serve as director and another such nominee to serve as deputy director. If
    the board fails to nominate another person as director, the office shall be filled
    in accordance with the procedures of section 3501.16 of the Revised Code.

    The director and deputy director shall be of opposite political parties, and each
    such officer shall have been nominated by a board member of the political party
    to which he belongs, but the board may decide by the affirmative vote of at least
    three members that the services of a deputy director are unnecessary and such
    deputy director then shall not be employed. After the selection of the director
    and deputy director, the chairman shall be selected from the members of the board
    of opposite politics to that of the director. If, upon the first ballot, no person
    is agreed upon as chairman, the member of opposite politics to the director having
    the shortest term to serve shall be chairman, and shall preside at all meetings.
    When such organization is perfected, the director shall forthwith report it to
    the secretary of state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.09
- number: '3501.091'
  heading: Chairman or director replaced with member of opposite party
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: At any time after the organization of the board of elections is perfected
    and reported to the secretary of state under section 3501.09 of the Revised Code,
    the board may decide by the affirmative vote of at least three members to replace
    the board's present chairman or director with a person belonging to the opposite
    political party from the one to which the present officer belongs. After such
    a vote, the members of the board shall reselect all officers of the board in accordance
    with the procedures set forth in section 3501.09 of the Revised Code. An officer
    selected through this process shall serve as an officer for the remainder of the
    term for which the outgoing officer was selected to serve as an officer. A reselection
    of officers under this section does not increase or decrease the length of any
    person's term as a member of the board. The director and deputy director shall
    be of opposite political parties, and the chairman shall be selected from the
    members of the board of opposite politics from those of the director.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.091
- number: '3501.10'
  heading: Offices and records of board
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The board of elections shall, as an expense of the board, provide suitable
    rooms for its offices and records and the necessary and proper furniture and supplies
    for those rooms. The board may lease such offices and rooms, necessary to its
    operation, for the length of time and upon the terms the board deems in the best
    interests of the public, provided that the term of any such lease shall not exceed
    fifteen years.

    Thirty days prior to entering into such a lease, the board shall notify the board
    of county commissioners in writing of its intent to enter into the lease. The
    notice shall specify the terms and conditions of the lease. Prior to the thirtieth
    day after receiving that notice and before any lease is entered into, the board
    of county commissioners may reject the proposed lease by a majority vote. After
    receiving written notification of the rejection by the board of county commissioners,
    the board of elections shall not enter into the lease that was rejected, but may
    immediately enter into additional lease negotiations, subject to the requirements
    of this section.

    The board of elections in any county may, by resolution, request that the board
    of county commissioners submit to the electors of the county, in accordance with
    section 133.18 of the Revised Code, the question of issuing bonds for the acquisition
    of real estate and the construction on it of a suitable building with necessary
    furniture and equipment for the proper administration of the duties of the board
    of elections. The resolution declaring the necessity for issuing such bonds shall
    relate only to the acquisition of real estate and to the construction, furnishing,
    and equipping of a building as provided in this division.

    (B) The board of elections in each county shall keep its offices, or one or more
    of its branch registration offices, open for the performance of its duties until
    nine p.m. on the last day of registration before a general or primary election.
    At all other times during each week, the board shall keep its offices and rooms
    open for a period of time that the board considers necessary for the performance
    of its duties.

    (C) The board of elections may maintain permanent or temporary branch offices
    at any place within the county, provided that, if the board of elections permits
    electors to vote at a branch office, electors shall not be permitted to vote at
    any other branch office or any other office of the board of elections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.10
- number: '3501.11'
  heading: Board duties
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'Each board of elections shall exercise by a majority vote all powers granted
    to the board by Title XXXV of the Revised Code, shall perform all the duties imposed
    by law, and shall do all of the following:

    (A) Establish, define, provide, rearrange, and combine election precincts;

    (B) Fix and provide the places for registration and for holding primaries and
    elections;

    (C) Provide for the purchase, preservation, and maintenance of booths, ballot
    boxes, books, maps, flags, blanks, cards of instructions, and other forms, papers,
    and equipment used in registration, nominations, and elections;

    (D) Appoint and remove its director, deputy director, and employees and all registrars,
    precinct election officials, and other officers of elections, fill vacancies,
    and designate the ward or district and precinct in which each shall serve;

    (E) Make and issue rules and instructions, not inconsistent with law or the rules,
    directives, or advisories issued by the secretary of state, as it considers necessary
    for the guidance of election officers and voters;

    (F) Advertise and contract for the printing of all ballots and other supplies
    used in registrations and elections;

    (G) Provide for the issuance of all notices, advertisements, and publications
    concerning elections, except as otherwise provided in division (G) of section
    3501.17 and divisions (F) and (G) of section 3505.062 of the Revised Code;

    (H) Provide for the delivery of ballots, pollbooks, and other required papers
    and material to the polling places;

    (I) Cause the polling places to be suitably provided with voting machines, marking
    devices, automatic tabulating equipment, stalls, and other required supplies.
    In fulfilling this duty, each board of a county that uses voting machines, marking
    devices, or automatic tabulating equipment shall conduct a full vote of the board
    during a public session of the board on the allocation and distribution of voting
    machines, marking devices, and automatic tabulating equipment for each precinct
    in the county.

    (J) Investigate irregularities, nonperformance of duties, or violations of Title
    XXXV of the Revised Code by election officers and other persons; administer oaths,
    issue subpoenas, summon witnesses, and compel the production of books, papers,
    records, and other evidence in connection with any such investigation; and report
    the facts to the prosecuting attorney or the secretary of state;

    (K)(1) Review, examine, and certify the sufficiency and validity of petitions
    and nomination papers, and, after certification, return to the secretary of state
    all petitions and nomination papers that the secretary of state forwarded to the
    board;

    (2) Examine each initiative petition, or a petition filed under section 307.94
    or 307.95 of the Revised Code, received by the board to determine whether the
    petition falls within the scope of authority to enact via initiative and whether
    the petition satisfies the statutory prerequisites to place the issue on the ballot,
    as described in division (M) of section 3501.38 of the Revised Code. The petition
    shall be invalid if any portion of the petition is not within the initiative power.

    (L) Receive the returns of elections, canvass the returns, make abstracts of them,
    and transmit those abstracts to the proper authorities;

    (M) Issue certificates of election on forms to be prescribed by the secretary
    of state;

    (N) Make an annual report to the secretary of state, on the form prescribed by
    the secretary of state, containing a statement of the number of voters registered,
    elections held, votes cast, appropriations received, expenditures made, and other
    data required by the secretary of state;

    (O) Prepare and submit to the proper appropriating officer a budget estimating
    the cost of elections for the ensuing fiscal year;

    (P) Perform other duties as prescribed by law or the rules, directives, or advisories
    of the secretary of state;

    (Q) Investigate and determine the residence qualifications of electors;

    (R) Administer oaths in matters pertaining to the administration of the election
    laws;

    (S) Prepare and submit to the secretary of state, whenever the secretary of state
    requires, a report containing the names and residence addresses of all incumbent
    county, municipal, township, and board of education officials serving in their
    respective counties;

    (T) Establish and maintain a voter registration database of all qualified electors
    in the county who offer to register;

    (U) Maintain voter registration records, make reports concerning voter registration
    as required by the secretary of state, and remove ineligible electors from voter
    registration lists in accordance with law and directives of the secretary of state;

    (V) Give approval to ballot language for any local question or issue and transmit
    the language to the secretary of state for the secretary of state''s final approval;

    (W) Prepare and cause the following notice to be displayed in a prominent location
    in every polling place:

    "NOTICE

    Ohio law prohibits any person from voting or attempting to vote more than once
    at the same election.

    Violators are guilty of a felony of the fourth degree and shall be imprisoned
    and additionally may be fined in accordance with law."

    (X) In all cases of a tie vote or a disagreement in the board, if no decision
    can be arrived at, the director or chairperson shall submit the matter in controversy,
    not later than fourteen days after the tie vote or the disagreement, to the secretary
    of state, who shall summarily decide the question, and the secretary of state''s
    decision shall be final.

    (Y) Assist each designated agency, deputy registrar of motor vehicles, public
    high school and vocational school, public library, and office of a county treasurer
    in the implementation of a program for registering voters at all voter registration
    locations as prescribed by the secretary of state. Under this program, each board
    of elections shall direct to the appropriate board of elections any voter registration
    applications for persons residing outside the county where the board is located
    within five days after receiving the applications.

    (Z) On any day on which an elector may vote in person at the office of the board
    or at another site designated by the board, consider the board or other designated
    site a polling place for that day. All requirements or prohibitions of law that
    apply to a polling place shall apply to the office of the board or other designated
    site on that day.

    (AA) Perform any duties with respect to voter registration and voting by uniformed
    services and overseas voters that are delegated to the board by law or by the
    rules, directives, or advisories of the secretary of state.

    (BB) Prepare an election administration plan and submit it to the secretary of
    state not later than seventy-five days before each presidential primary election
    and not later than one hundred twenty days before each general election held in
    an even-numbered year. The election administration plan shall be on a template
    prescribed by the secretary of state and shall include all of the following:

    (1) Precinct election official recruitment, training, and accountability;

    (2) Resource allocation;

    (3) Communication before and on the day of the election;

    (4) Materials;

    (5) Contingencies and continuity planning;

    (6) Security;

    (7) Voter registration;

    (8) Absent voting;

    (9) Polling places and accessibility;

    (10) Ballot preparation;

    (11) Pre-election testing;

    (12) Reconciliation and audits;

    (13) A master calendar;

    (14) Any other topic prescribed by the secretary of state.'
