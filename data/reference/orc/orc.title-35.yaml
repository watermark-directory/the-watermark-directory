- number: '3506.22'
  heading: Direct recording electronic voting machines after 2012
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A) Beginning in the year 2013 and thereafter, a county that selects direct
    recording electronic voting machines as the primary voting system to be used in
    the county and not only for accessibility for individuals with disabilities as
    required under the Help America Vote Act of 2002 and section 3506.19 of the Revised
    Code shall acquire, if needed, sufficient direct recording electronic voting machines
    to meet the minimum number of direct recording electronic voting machines required
    to be established by the secretary of state under division (B) of this section.

    (B) Beginning in the year 2013 and every eight years thereafter, the secretary
    of state shall establish, for each county, a minimum number of direct recording
    electronic voting machines that the county shall be required to have if it elects
    to use direct recording electronic voting machines as the primary voting system
    in the county. The minimum number for each county shall be calculated as follows:

    (1) The total number of registered voters in the county as of the October deadline
    for voter registration for the last presidential election or the average of the
    total number of registered voters in the county as of the October deadline for
    voter registration for the last two presidential elections, whichever number is
    higher, minus the total number of absent voter''s ballots cast and counted at
    the last presidential election, shall be determined.

    (2) The number resulting from the determination under division (B)(1) of this
    section shall be divided by one hundred seventy-five.

    (3) Any fraction resulting from the calculation under division (B)(2) of this
    section shall be rounded up to the next whole number.

    (C) A county that selects direct recording electronic voting machines as the primary
    voting system to be used in the county and not only for accessibility for individuals
    with disabilities as required under the Help America Vote Act of 2002 and section
    3506.19 of the Revised Code after May 2, 2006, but before the year 2013 shall
    do so in accordance with the formula set forth in Section 514.03 of Am. Sub. H.B.
    66 of the 126th general assembly.'
