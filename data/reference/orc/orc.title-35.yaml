- number: '3517.15'
  heading: '[Former R.C. 3517.153, amended and renumbered as R.C. 3517.15 by H.B.
    96, 136th General Assembly, effective 9/30/2025] Jurisdiction and powers of commission'
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A)(1) No prosecution shall commence for a violation of a provision in sections
    145.054, 742.043, 3307.073, 3309.073, 3517.08 to 3517.12, 3517.13, 3517.20 to
    3517.22, 3599.03, 3599.031, or 5505.045 of the Revised Code unless a complaint
    has been filed with the secretary of state under section 3517.16 of the Revised
    Code and all proceedings under sections 3517.16 to 3517.18 of the Revised Code
    are completed.

    (2) A complaint may be filed with the secretary of state under section 3517.16
    of the Revised Code for a violation of a provision in sections 3501.35, 3599.13,
    3599.14, or 3599.21, division (A) of section 3599.11, or division (A)(1) or (2)
    of section 3599.12 of the Revised Code that occurs on or after the effective date
    of this amendment. A prosecution may commence for a violation of such a provision
    at any time before or after a complaint has been filed with the secretary of state
    under section 3517.16 of the Revised Code.

    (B)(1) The Ohio election integrity commission shall hear all matters referred
    to the commission by the secretary of state under division (E)(3) of section 3517.16
    of the Revised Code.

    (2) The commission may recommend legislation and render advisory opinions concerning
    the provisions of the Revised Code listed in division (A) of this section for
    persons over whose acts the commission has or may have jurisdiction. When the
    commission renders an advisory opinion relating to a specific set of circumstances
    involving any of those sections stating that there is no violation of a provision
    in those sections, the person to whom the opinion is directed or a person who
    is similarly situated may reasonably rely on the opinion and is immune from criminal
    prosecution and a civil action, including, without limitation, a civil action
    for removal from public office or employment, based on facts and circumstances
    covered by the opinion. An advisory opinion issued by the Ohio elections commission
    that is in effect as of the effective date of this amendment is considered an
    advisory opinion of the Ohio election integrity commission, unless and until the
    Ohio election integrity commission amends or rescinds the advisory opinion.

    (C) The secretary of state and the boards of elections shall furnish the information
    that the commission requests. The commission or a member of the commission may
    administer oaths, and the commission may issue subpoenas to any person in the
    state compelling the attendance of witnesses and the production of relevant papers,
    books, accounts, and reports. Section 101.42 of the Revised Code governs the issuance
    of subpoenas insofar as applicable. Upon the refusal of any person to obey a subpoena
    or to be sworn or to answer as a witness, the commission may apply to the court
    of common pleas of Franklin county under section 2705.03 of the Revised Code.
    The court shall hold proceedings in accordance with Chapter 2705. of the Revised
    Code.

    (D) The Ohio election integrity commission shall establish a web site on which
    it shall post, at a minimum, all decisions and advisory opinions issued by the
    commission, all decisions and advisory opinions issued by the Ohio elections commission
    before the effective date of this amendment, and copies of each election law as
    it is amended by the general assembly. The Ohio election integrity commission
    shall update the web site regularly to reflect any changes to those decisions
    and advisory opinions and any new decisions and advisory opinions.'
