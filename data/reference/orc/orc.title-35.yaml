- number: '3519.03'
  heading: Argument or explanation of petitions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: '(A) The committee named in a initiative petition may prepare the argument
    or explanation, or both, in favor of the measure proposed, and the committee named
    in a referendum petition may prepare the argument or explanation, or both, against
    any law or section or item of law. The persons who prepare the argument or explanation,
    or both, in opposition to the initiated proposal, or the argument or explanation,
    or both, in favor of the measure to be referred shall be named by the general
    assembly, if it is in session, or by the governor, if the general assembly is
    not in session. Such argument or explanation, or both, shall not exceed three
    hundred words and shall be filed with the secretary of state at least eighty days
    prior to the date of the election at which the measure is to be voted upon.

    (B)(1) If the committee named in an initiative petition, the committee named in
    a referendum petition, or other persons designated under division (A) of this
    section fail to prepare and file their arguments or explanations by the eightieth
    day before the date of the election, the secretary of state shall notify the Ohio
    ballot board that those arguments or explanations have not been so prepared and
    filed. The board then shall prepare the missing arguments or explanations or designate
    a group of persons to prepare those arguments or explanations. All arguments or
    explanations prepared under this division shall be filed with the secretary of
    state no later than seventy-five days before the date of the election. No argument
    or explanation shall exceed three hundred words.

    (2) If the Ohio ballot board fails to provide for the preparation of missing arguments
    or explanations under division (B)(1) of this section after being notified by
    the secretary of state that one or more arguments or explanations have not been
    timely prepared and filed, the positions of the four appointed members of the
    board shall be considered vacant, and new members shall be appointed in the manner
    provided for original appointments.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3519.03
- number: '3519.04'
  heading: Estimate of annual expenditure of public funds proposed and annual yield
    of proposed taxes
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3519'
    name: Initiative; Referendum
  text: 'Within two days after receipt, under division (A) of section 3519.01 of the
    Revised Code, of the verified copy of a proposed state law or constitutional amendment
    proposing the levy of any tax or involving a matter that will necessitate the
    expenditure of any funds of the state or any political subdivision of the state,
    the secretary of state shall request of the office of budget and management an
    estimate of any annual expenditure of public funds proposed and of the tax commissioner
    the annual yield of any proposed taxes. The office of budget and management, on
    receipt of a request for an estimate of the annual expenditure of public funds
    proposed, shall prepare the estimate and file it in the office of the secretary
    of state. The tax commissioner, on receipt of a request for an estimate of the
    annual yield of any proposed taxes, shall prepare the estimate and file it in
    the office of the secretary of state. The office of budget and management and
    the tax commissioner may issue a joint estimate if the proposed state law or constitutional
    amendment necessitates both the expenditure of public funds and a levy of any
    tax.

    Upon receipt of an estimate of the annual expenditure of public funds proposed
    from the office of budget and management, an estimate of the annual yield of any
    proposed taxes from the tax commissioner, or a joint estimate of the annual expenditure
    of public funds proposed and the annual yield of any proposed taxes from the office
    of budget and management and the tax commissioner, the secretary of state shall
    post the estimate on a web site of the office of secretary of state for thirty
    days before the election at which the proposed state law or constitutional amendment
    will be voted upon.'
