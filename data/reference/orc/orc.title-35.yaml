- number: '3501.12'
  heading: Compensation of board members
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The annual compensation of members of the board of elections shall be
    determined on the basis of the population of the county according to the next
    preceding federal census, and shall be paid monthly out of the appropriations
    made to the board and upon vouchers or payrolls certified by the chairperson,
    or a member of the board designated by it, and countersigned by the director or
    in the director''s absence by the deputy director. Upon presentation of any such
    voucher or payroll, the county auditor shall issue a warrant upon the county treasurer
    for the amount thereof as in the case of vouchers or payrolls for county offices
    and the treasurer shall pay such warrant.

    (B) In calendar year 2018, the amount of annual compensation of each member of
    the board of elections shall be the greater of the following:

    (1) The sum of the following:

    (a) One hundred two dollars and forty-one cents for each full one thousand of
    the first one hundred thousand population;

    (b) Forty-eight dollars and seventy-nine cents for each full one thousand of the
    second one hundred thousand population;

    (c) Twenty-six dollars and fifty cents for each full one thousand of the third
    one hundred thousand population;

    (d) Eight dollars and thirteen cents for each full one thousand above three hundred
    thousand population.

    (2) Six thousand dollars.

    (C) The annual compensation of each member of the board shall be computed after
    increasing the dollar amounts specified in divisions (B)(1) and (2) of this section
    as follows:

    (1) In calendar year 2019 and in each calendar year thereafter through calendar
    year 2025, by one and three-quarters per cent;

    (2) In calendar year 2026 and in each calendar year thereafter through calendar
    year 2029, by five per cent.

    (D) For the purposes of this section, members of boards of elections shall be
    deemed to be appointed and not elected, and therefore not subject to Section 20
    of Article II of the Ohio Constitution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.12
- number: '3501.13'
  heading: Duties of director
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The director of the board of elections shall keep a full and true record
    of the proceedings of the board and of all moneys received and expended; file
    and preserve in the board''s office all orders and records pertaining to the administration
    of registrations, primaries, and elections; receive and have the custody of all
    books, papers, and property belonging to the board; and perform other duties in
    connection with the office of director and the proper conduct of elections as
    the board determines.

    (B) Before entering upon the duties of the office, the director shall subscribe
    to an oath that the director will support the Constitution of the United States
    and the Ohio Constitution, perform all the duties of the office to the best of
    the director''s ability, enforce the election laws, and preserve all records,
    documents, and other property pertaining to the conduct of elections placed in
    the director''s custody.

    (C) The director may administer oaths to persons required by law to file certificates
    or other papers with the board, to precinct election officials, to witnesses who
    are called to testify before the board, and to voters filling out blanks at the
    board''s offices. Except as otherwise provided by state or federal law, the records
    of the board and papers and books filed in its office are public records and open
    to inspection under such reasonable regulations as shall be established by the
    board. The following notice shall be posted in a prominent place at each board
    office:

    "Except as otherwise provided by state or federal law, records filed in this office
    of the board of elections are open to public inspection during normal office hours,
    pursuant to the following reasonable regulations: (the board shall here list its
    regulations). Whoever prohibits any person from inspecting the public records
    of this board is subject to the penalties of section 3599.161 of the Revised Code."

    (D) Upon receipt of a written declaration of intent to retire as provided for
    in section 145.38 of the Revised Code, the director shall provide a copy to each
    member of the board of elections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.13
- number: '3501.14'
  heading: Compensation of director, deputy director, and employees of board
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: 'The board of elections shall, by a vote of not less than three of its members,
    fix the annual compensation of its director and deputy director who are selected
    in accordance with section 3501.09 of the Revised Code.

    The board may, when necessary, appoint a deputy director, who shall not be a member
    of the same political party of which the director is a member, and other employees,
    prescribe their duties, and, by a vote of not less than three of its members,
    fix their compensation.

    The director, deputy director, and other employees of the board are not public
    officers and shall serve, during their term of office, at the discretion of the
    board. The board may summarily remove the director or the deputy director by a
    vote of not less than three of its members and may remove any other employee by
    a majority vote of its membership.

    The deputy director and all other election officials shall take and subscribe
    to the same oath for the faithful performance of their duties as is required of
    the director of the board. The deputy director shall have the same power as the
    director to administer oaths. The board may also employ additional employees,
    when necessary, for part time only at the prevailing rate of pay for such services.

    A tie vote or disagreement in the board on the amount of compensation to be paid
    to a director, deputy director, or any employee shall not be submitted to the
    secretary of state.'
