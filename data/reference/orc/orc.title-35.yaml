- number: '3517.107'
  heading: Federal political committee registration
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A) As used in this section, "federal political committee" means a political
    committee, as defined in the Federal Election Campaign Act, that is registered
    with the federal election commission under that act.

    (B) Any federal political committee may make contributions, expenditures, or independent
    expenditures from its federal account in connection with any state or local election
    in Ohio. Prior to making any such contribution, expenditure, or independent expenditure,
    the federal political committee shall register with the secretary of state by
    filing a copy of its most recent federal statement of organization. A federal
    political committee registered with the secretary of state under this division
    shall file with the secretary of state any amendment to its statement of organization
    that is required under the Federal Election Campaign Act to be reported to the
    federal election commission.

    (C) When, during any federal reporting period under the Federal Election Campaign
    Act, a federal political committee makes a contribution, expenditure, or independent
    expenditure from its federal account in connection with a state or local election
    in Ohio, the committee shall file with the secretary of state not later than the
    date on which its report is required to be filed with the appropriate federal
    office or officer under the Federal Election Campaign Act, copies of the following
    pages from that report:

    (1) The summary page;

    (2) The detailed summary page;

    (3) The page or pages that contain an itemized list of the contributions, expenditures,
    and independent expenditures made in connection with state and local elections
    in Ohio.

    The total amount of contributions, expenditures, and independent expenditures
    made in connection with state and local elections in Ohio shall be reflected on
    the summary page or on a form that the secretary of state shall prescribe.

    (D) When, during any calendar year, a federal political committee makes a contribution
    from its federal account in connection with a state or local election in Ohio
    to a state or local political action committee that is required under section
    3517.11 of the Revised Code to file any statement prescribed by section 3517.10
    of the Revised Code, and the federal political committee and state or local political
    action committee are established, financed, maintained, or controlled by the same
    corporation, organization, continuing association, or other person, including
    any parent, subsidiary, division, department, or unit of that corporation, organization,
    continuing association, or other person, the federal political committee shall
    file a statement with the secretary of state not later than the last business
    day of January of the next calendar year. The statement shall be on a form prescribed
    by the secretary of state and shall include a list of the names and addresses
    of contributors that are residents of Ohio that made contributions to the federal
    political committee during the calendar year covered by the statement and, for
    each name listed, the aggregate total amount contributed by each contributor during
    the reporting period.'
