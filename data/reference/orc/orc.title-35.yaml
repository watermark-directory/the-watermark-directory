  url: https://codes.ohio.gov/ohio-revised-code/section-3513.10
- number: '3513.11'
  heading: State convention of major political parties
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'In the year 1952 and in each second year thereafter, each major political
    party in the state may hold a state convention. If a major political party holds
    a state convention, it shall comply with the requirements of this section. A state
    convention of a major political party shall be composed of delegates who are its
    candidates for election to state offices, except judicial offices; its candidates
    for election to the office of member of the senate of the United States, member
    of the house of representatives of the United States, and member of the general
    assembly of Ohio; the members of its state central and executive committees, and
    the chairman of its county central and executive committees; and five hundred
    delegates to be apportioned by the state central committee of the respective parties
    among the several counties of the state in proportion to its party''s vote for
    governor cast in the several counties at the most recent general election; provided
    that in any even-numbered year in which no election is to be held to elect successors
    to incumbents of any of the offices mentioned in this section, except judicial
    offices, each such incumbent shall also be a delegate to the state convention
    of his political party. The delegates to such convention apportioned to each county
    by the state central committee of the respective parties shall be selected by
    the county executive committees of the respective parties.

    At each convention of a major political party, the state platform of such party
    for such year shall be formulated.

    The state central committee of each political party shall fix the time and place
    for holding the convention of its party, except that the state convention shall
    be held no later than forty days prior to the general election.

    At the state convention of each major political party held in 1952, and in each
    fourth year thereafter, persons shall be nominated as candidates for election
    as presidential electors to be voted for at the succeeding general election. Within
    five days after the holding of each such convention, the chairman and secretary
    thereof shall certify in writing to the secretary of state the names of all persons
    nominated at such convention as candidates for election as presidential electors.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.11
- number: '3513.111'
  heading: Nominating candidates for election as presidential electors
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) Any major political party that does not hold a state convention under
    section 3513.11 of the Revised Code shall nominate candidates for election as
    presidential electors in accordance with this section.

    (B) In accordance with party rules, in 1992 and in each fourth year thereafter,
    the executive committee of the state central committee of a major political party
    described in division (A) of this section shall nominate candidates for election
    as presidential electors to be voted for at the general election to be held that
    year. The nomination of these candidates shall occur no later than forty days
    prior to the general election. Within five days after these candidates are nominated,
    the chairman or secretary of the executive committee, or, in the absence of the
    chairman or secretary, a member of the committee designated by a majority of the
    other members of the committee, shall certify in writing to the secretary of state
    the names of all persons so nominated.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.111
- number: '3513.12'
  heading: Delegates to national party convention
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'At a presidential primary election, which shall be held as provided in division
    (E)(2) of section 3501.01 of the Revised Code, delegates and alternates to the
    national conventions of the different major political parties shall be chosen
    by direct vote of the electors as provided in this chapter. Candidates for delegate
    and alternate shall be qualified and the election shall be conducted in the manner
    prescribed in this chapter for the nomination of candidates for state and district
    offices, except as provided in section 3513.151 of the Revised Code and except
    that whenever any group of candidates for delegate at large or alternate at large,
    or any group of candidates for delegates or alternates from districts, file with
    the secretary of state statements as provided by this section, designating the
    same persons as their first and second choices for president of the United States,
    such a group of candidates may submit a group petition containing a declaration
    of candidacy for each of such candidates. The group petition need be signed only
    by the number of electors required for the petition of a single candidate. No
    group petition shall be submitted except by a group of candidates equal in number
    to the whole number of delegates at large or alternates at large to be elected
    or equal in number to the whole number of delegates or alternates from a district
    to be elected.

    Each person seeking to be elected as delegate or alternate to the national convention
    of the person''s political party shall file with the person''s declaration of
    candidacy and certificate a statement in writing signed by the person in which
    the person shall state the person''s first and second choices for nomination as
    the candidate of the person''s party for the presidency of the United States.
    The secretary of state shall not permit any declaration of candidacy and certificate
    of a candidate for election as such delegate or alternate to be filed unless accompanied
    by such statement in writing. The name of a candidate for the presidency shall
    not be so used without the candidate''s written consent.

    A person who is a first choice for president of candidates seeking election as
    delegates and alternates shall file with the secretary of state, prior to the
    day of the election, a list indicating the order in which certificates of election
    are to be issued to delegate or alternate candidates to whose candidacy the person
    has consented, if fewer than all of such candidates are entitled under party rules
    to be certified as elected. Each candidate for election as such delegate or alternate
    may also file along with the candidate''s declaration of candidacy and certificate
    a statement in writing signed by the candidate in the following form:

    "Statement of Candidate

    For Election as ____________ (Delegate) (Alternate) to the

    ____________ (name of political party) National Convention

    I hereby declare to the voters of my political party in the State of Ohio that,
    if elected as ____________ (delegate) (alternate) to their national party convention,
    I shall, to the best of my judgment and ability, support that candidate for President
    of the United States who shall have been selected at this primary by the voters
    of my party in the manner provided in Chapter 3513. of the Ohio Revised Code,
    as their candidate for such office.

    ___________________________ (name),

    Candidate for _____________

    (Delegate) (Alternate)"

    The procedures for the selection of candidates for delegate and alternate to the
    national convention of a political party set forth in this section and in section
    3513.121 of the Revised Code are alternative procedures, and if the procedures
    of this section are followed, the procedures of section 3513.121 of the Revised
    Code need not be followed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.12
- number: '3513.121'
  heading: Delegates to national party convention alternative procedures
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) Any candidate for the presidency of the United States who has raised
    at least five thousand dollars for the primary election in each of twenty states
    from individuals, with a maximum of two hundred fifty dollars per contributor
    counting toward the threshold, may file with the secretary of state a declaration
    of candidacy not later than four p.m. of the ninetieth day before the presidential
    primary election. Such declaration of candidacy shall be accompanied by a reasonable
    accounting proving eligibility and a statement from the candidate''s registered
    principal campaign committee treasurer, meeting the standards of 28 U.S.C. sec.
    1746, certifying that the candidate has met the contribution requirements of this
    division. Any candidate who files a declaration of candidacy pursuant to this
    division shall also file, or shall cause to be filed by a person authorized in
    writing to represent the candidate, not later than four p.m. of the ninetieth
    day before the same primary election, a list of candidates for district delegate
    and alternate to the national convention of the candidate''s political party who
    have been selected in accordance with rules adopted by the state central committee
    of the candidate''s political party. The candidates for district delegate and
    alternate whose names appear on this list shall be represented on the ballot in
    accordance with section 3513.151 of the Revised Code in every congressional district
    that the presidential candidate named in the presidential candidate''s declaration
    of candidacy, provided that such candidates meet the other requirements of this
    section.

    (B) Candidates for delegate at large and alternate at large to the national convention
    of a political party for a presidential candidate who submits a declaration of
    candidacy in accordance with division (A) of this section shall be selected in
    accordance with rules adopted by the state central committee of the presidential
    candidate''s political party.

    (C) Each candidate for district delegate and alternate to the national convention
    of a political party selected pursuant to division (A) of this section shall file
    or shall cause to be filed with the secretary of state, not later than four p.m.
    of the ninetieth day before the presidential primary election in which the person
    is a candidate, both of the following:

    (1) A declaration of candidacy in the form prescribed in section 3513.07 of the
    Revised Code, but not the petition prescribed in that section;

    (2) A statement in writing signed by the candidate in which the candidate states
    the candidate''s first and second choices for nomination as the candidate of the
    candidate''s party for the presidency of the United States.

    (D) A declaration of candidacy filed pursuant to division (A) of this section
    shall be in substantially the form prescribed in section 3513.07 of the Revised
    Code except that the secretary of state shall modify that form to include spaces
    for a presidential candidate to indicate in which congressional districts the
    candidate wishes the candidate''s candidacy to be submitted to the electors and
    shall modify it in any other ways necessary to adapt it to use by presidential
    candidates. A candidate who files a declaration of candidacy pursuant to division
    (A) of this section shall not file the petition prescribed in section 3513.07
    of the Revised Code.

    (E) Section 3513.151 of the Revised Code applies in regard to candidates for delegate
    and alternate to the national convention of a political party selected pursuant
    to this section. The state central committee of the political party of any presidential
    candidate who files a declaration of candidacy pursuant to division (A) of this
    section shall file with the secretary of state the rules of its political party
    in accordance with division (E) of section 3513.151 of the Revised Code.

    (F) The procedures for the selection of candidates for delegate and alternate
    to the national convention of a political party set forth in this section and
    in section 3513.12 of the Revised Code are alternative procedures, and if the
    procedures of this section are followed, the procedures of section 3513.12 of
    the Revised Code need not be followed.'
