- number: '3517.082'
  heading: Political action committee - separate segregated fund
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A) Any corporation, any nonprofit corporation, or any labor organization
    may establish, administer, and solicit contributions from the persons listed in
    division (B) of this section, to either or both of the following:

    (1) A political action committee of the corporation or labor organization with
    respect to state and local elections;

    (2) A separate segregated fund pursuant to the Federal Election Campaign Act.

    (B)(1) A corporation and a nonprofit corporation may solicit contributions from
    its stockholders, officers, directors, trustees that are not corporations or labor
    organizations, and employees.

    (2) A nonprofit corporation also may solicit contributions from:

    (a) Its members that are not corporations or labor organizations;

    (b) Officers, directors, trustees that are not corporations or labor organizations,
    and employees of any members of the nonprofit corporation.

    (3) A labor organization may solicit contributions from its members, officers,
    and employees.

    (C) A corporation, nonprofit corporation, or labor organization shall report to
    a political action committee, or to a separate segregated fund with respect to
    state and local elections, the following costs expended by the corporation, nonprofit
    corporation, or labor organization that are associated with establishing, administering,
    and soliciting contributions to the political action committee or separate segregated
    fund pursuant to division (A) of this section:

    (1) Mailing and printing expenses for direct solicitation of contributions pursuant
    to this section;

    (2) The portion of an employee''s salary or wages attributable to time the employee
    spends in activities related to establishing, administering, and soliciting contributions
    to a political action committee or separate segregated fund, if that time exceeds
    during a reporting period fifty per cent of the time for which the employee is
    compensated by the corporation, nonprofit corporation, or labor organization;

    (3) The cost associated with the purchase, lease, operation, and use of equipment
    for activities related to establishing, administering, and soliciting contributions
    to a political action committee or separate segregated fund if during a reporting
    period more than fifty per cent of the use of the equipment is for those activities;

    (4) Professional fees paid by the corporation, nonprofit corporation, or labor
    organization for establishing, administering, and soliciting contributions to
    a political action committee or separate segregated fund.

    The political action committee shall itemize the amounts and purposes of those
    costs expended by the corporation, nonprofit corporation, or labor organization
    and file them as part of the statement required of political action committees
    under division (A) of section 3517.10 of the Revised Code. The separate segregated
    fund with respect to state and local elections shall file with the secretary of
    state a copy of the portion of each report and statement required under the Federal
    Election Campaign Act that applies to state and local elections at the same time
    that the entire original report is filed in accordance with that act.

    (D) A corporation, nonprofit corporation, or labor organization may obtain contributions
    for a political action committee or a separate segregated fund under this section
    from an individual described in division (B) of this section from whom the corporation,
    nonprofit corporation, or labor organization was not obtaining contributions for
    that political action committee or separate segregated fund before the effective
    date of this amendment on an automatic basis pursuant to a payroll deduction plan
    only if the individual who is contributing to that political action committee
    or separate segregated fund affirmatively consents to the contribution in writing.

    (E) In addition to the laws listed in division (A) of section 4117.10 of the Revised
    Code that prevail over conflicting agreements between employee organizations and
    public employers, this section prevails over any conflicting provisions of agreements
    between labor organizations and public employers that are entered into on or after
    the effective date of this amendment pursuant to Chapter 4117. of the Revised
    Code.'
