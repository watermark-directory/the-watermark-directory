- number: '3517.1012'
  heading: Political parties to establish restricted funds - deposits and disbursements
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A)(1) Each state and county political party shall establish a restricted
    fund that is separate from all other accounts of the political party.

    (2) A state or county political party shall deposit into its restricted fund all
    gifts that are made to or accepted by the political party from a corporation or
    labor organization subject to the applicable limitations prescribed in division
    (X) of section 3517.13 of the Revised Code. A state or county political party
    may deposit into its restricted fund any gifts that are made to or accepted by
    the political party from a source other than a corporation or labor organization.

    (3) Moneys in a state or county political party''s restricted fund may be disbursed
    to pay costs incurred for any of the following purposes:

    (a) The defraying of operating and maintenance costs associated with political
    party headquarters, including rental or leasing costs, staff salaries, office
    equipment and supplies, postage, and the purchase, lease, or maintenance of computer
    hardware and software;

    (b) The organization of voter registration programs and get-out-the-vote campaigns
    and the costs associated with voter registration and get-out-the-vote activities,
    including, but not limited to, rental costs for booth spaces at fairs, festivals,
    or similar events if voter registration forms are available at those booths, printing
    costs for registration forms, mailing costs for communications soliciting voter
    registration, and payments for the services of persons conducting voter registration
    and get-out-the-vote activities;

    (c) The administration of party fund-raising drives;

    (d) Direct mail campaigns or other communications with the registered voters of
    a party that are not related to any particular candidate or election;

    (e) The preparation of reports required by law.

    (B) Except as otherwise provided in this division, a state or county political
    party shall file deposit and disbursement statements, in the same manner as the
    party is required to file statements of contributions and expenditures under section
    3517.10 of the Revised Code, regarding all deposits made into, and all disbursements
    made from, the party''s restricted fund. Deposit and disbursement statements filed
    in accordance with this division by a county political party shall be filed by
    electronic means of transmission to the office of the secretary of state at the
    times specified in division (A) of section 3517.10 of the Revised Code for the
    filing of statements of contributions and expenditures if the county political
    party accepts gifts from a corporation or labor organization under division (A)(2)
    of this section.'
