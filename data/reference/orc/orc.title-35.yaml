- number: '3501.051'
  heading: Simulated election programs for minors
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) Notwithstanding any other section of the Revised Code, the secretary
    of state may authorize, in one or more precincts in one or more counties, a program
    allowing individuals under the age of eighteen to enter the polling place and
    vote in a simulated election held at the same time as a general election. Any
    individual working in or supervising at a simulated election may enter the polling
    place and remain within it during the entire period the polls are open.

    (B) A program established under division (A) of this section shall require all
    of the following:

    (1) That the duties imposed on precinct election officials and peace officers
    under section 3501.33 of the Revised Code be performed by those officials and
    officers in regard to simulated elections and all activities related to simulated
    elections;

    (2) That volunteers provide the personnel necessary to conduct the simulated election,
    except that employees of the secretary of state, employees or members of boards
    of elections, and precinct election officials may aid in operating the program
    to the extent permitted by the secretary of state;

    (3) That individuals under the age of fourteen be accompanied to the simulated
    election by an individual eighteen years of age or over;

    (4) Any other requirements the secretary of state considers necessary for the
    orderly administration of the election process.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.051
- number: '3501.052'
  heading: State officials not to serve as campaign officials
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The secretary of state shall not serve as campaign treasurer or in any
    other official capacity for any campaign committee for any state or local office
    other than an office to which the secretary of state is seeking election.

    (B) The secretary of state shall not serve as campaign treasurer or in any other
    official capacity for any principal campaign committee or other authorized committee
    for any federal office other than an office to which the secretary of state is
    seeking election.

    (C) The secretary of state shall not serve as a treasurer or in any other official
    capacity for any committee named in an initiative petition, any committee named
    in a referendum petition, any person making disbursements for the direct costs
    of producing or airing electioneering communications, or any other committee regulated
    under Chapter 3517. of the Revised Code.

    (D) The attorney general shall not serve as a treasurer or in any other official
    capacity for any committee named in an initiative petition or any committee named
    in a referendum petition.

    (E) As used in this section:

    (1) "Authorized committee" and "principal campaign committee" have the same meanings
    as in the Federal Election Campaign Act.

    (2) "Campaign committee," "campaign treasurer," and "Federal Election Campaign
    Act" have the same meanings as in section 3517.01 of the Revised Code.

    (3) "Electioneering communication" has the same meaning as in section 3517.1011
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.052
- number: '3501.053'
  heading: Instructions regarding conduct of elections - web publication
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) The secretary of state may issue instructions as to the proper method
    of conducting elections to members of the boards of elections by permanent or
    temporary directives.

    (1) The secretary of state shall establish a process to allow public review and
    public comment of proposed directives. Prior to issuing any permanent directive,
    the secretary of state shall provide reasonable notice of the issuance of the
    directive and allow a reasonable amount of time for public review and public comment
    of the proposed directive under this division.

    No permanent directive shall be issued during the period beginning ninety days
    prior to the day of an election and ending on the fortieth day following the day
    of that election.

    (2) Temporary directives shall only be issued, and shall only have effect, during
    the period beginning ninety days prior to the day of an election and ending on
    the fortieth day following the day of that election. Temporary directives shall
    not be subject to public review and public comment under division (A)(1) of this
    section.

    A temporary directive shall not become a permanent directive unless the temporary
    directive is proposed as a permanent directive and subject to public review and
    public comment under division (A)(1) of this section.

    If the situation prompting the establishment of a temporary directive appears
    likely to recur, the secretary of state shall establish a permanent directive
    addressing the situation.

    (B) In addition to any other publication of directives and advisories issued by
    the secretary of state, the secretary of state shall publish those directives
    and advisories on a web site of the office of the secretary of state as soon as
    is practicable after they are issued, but not later than the close of business
    on the same day as a directive or advisory is issued. The secretary of state shall
    not remove from the web site any directives and advisories so posted. The secretary
    of state shall provide on that web site access to all directives and advisories
    currently in effect and maintain an archive of all directives and advisories previously
    published on that web site.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.053
- number: '3501.054'
  heading: Public officials and election-related activities
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) As used in this section, "public official" means any elected or appointed
    officer, employee, or agent of the state or any political subdivision, board,
    commission, bureau, or other public body established by law.

    (B) No public official that is responsible for administering or conducting an
    election in this state shall collaborate with, or accept or expend any money from,
    a nongovernmental person or entity for any costs or activities related to voter
    registration, voter education, voter identification, get-out-the-vote, absent
    voting, election official recruitment or training, or any other election-related
    purpose, other than the following:

    (1) The collection of any fee that is authorized by law;

    (2) The use of any building to conduct an election, including as a polling place;

    (3) The donation of food for precinct election officials at a polling place on
    election day.

    (C) This section does not apply to any money to be deposited in the address confidentiality
    program fund established under section 111.48 of the Revised Code or the women''s
    suffrage centennial commission fund established under Section 1 of S.B. 30 of
    the 132nd general assembly, as amended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.054
- number: '3501.055'
  heading: Election integrity unit
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: '(A) There is in the office of the secretary of state the election integrity
    unit.

    (B) Under the direction of the secretary of state, the election integrity unit
    shall do all of the following:

    (1) Investigate alleged violations of Title XXXV of the Revised Code on the unit''s
    own initiative, upon receiving a complaint under this section, or upon the filing
    of a complaint with the secretary of state under section 3517.16 of the Revised
    Code;

    (2) Allow the public to submit allegations of violations of Title XXXV of the
    Revised Code to the unit;

    (3) Submit a report to the governor and the general assembly not later than the
    fifteenth day of January of each year. The report shall include all of the following
    with respect to the previous calendar year:

    (a) The number of allegations the unit received from members of the public;

    (b) The number of allegations the unit investigated on its own initiative;

    (c) The number of allegations the unit referred to another agency for further
    investigation or prosecution;

    (d) All of the following concerning each allegation:

    (i) The general nature of the allegation;

    (ii) The county in which the violation is alleged to have occurred;

    (iii) Whether the allegation has been referred to another agency for further investigation
    or prosecution, and if so, to which agency;

    (iv) The current status of the investigation or any resulting criminal or civil
    proceeding.

    (C) In performing its duties, the election integrity unit may administer oaths,
    issue subpoenas, summon witnesses, compel the production of books, papers, records,
    and other evidence, and hold hearings.

    (D) Within one year after receiving a referral for further investigation or prosecution
    from the election integrity unit, the prosecuting attorney shall either prosecute
    the violation or provide to the election integrity unit a written statement declining
    to prosecute the referral or requesting any additional evidence needed. If the
    prosecuting attorney requests additional evidence, the election integrity unit
    shall provide such evidence, if available, within ninety days after receiving
    the request. Within one hundred eighty days after receiving the additional evidence,
    the prosecuting attorney either shall prosecute the violation or provide a written
    statement to the election integrity unit explaining a reason for declining to
    prosecute. If the prosecuting attorney fails to provide this statement within
    one hundred eighty days after receiving the additional evidence, the election
    integrity unit may refer the violation to the attorney general for further investigation
    or prosecution.'
