- number: '3513.311'
  heading: Withdrawal, disqualification, or death of governor or lieutenant governor
    candidate prior to general election
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) If a candidate for lieutenant governor dies, withdraws, or is disqualified
    as a candidate prior to the seventieth day before the day of a primary election,
    the vacancy on the ballot shall be filled by appointment by the joint candidate
    for the office of governor. Such candidate for governor shall certify in writing
    and under oath to the secretary of state not later than the sixty-fifth day before
    the day of such election the name and residence address of the person selected
    to fill such vacancy.

    (B) If a candidate for governor dies, withdraws, or is disqualified as a candidate
    prior to the seventieth day before the day of a primary election, the vacancy
    on the ballot shall be filled by appointment by the joint candidate for the office
    of lieutenant governor. Such candidate for lieutenant governor shall certify in
    writing and under oath to the secretary of state not later than the sixty-fifth
    day before the day of such election the name and residence address of the person
    selected to fill such vacancy.

    (C) If a candidate for the office of lieutenant governor dies on or after the
    seventieth day, but prior to the tenth day, before a primary election, the vacancy
    so created shall be filled by appointment by the joint candidate for the office
    of governor. Such candidate for governor shall certify in writing and under oath
    to the secretary of state not later than the fifth day before the day of such
    election the name and residence address of the person selected to fill such vacancy.

    (D) If a candidate for the office of governor dies on or after the seventieth
    day, but prior to the tenth day, before a primary election, the vacancy so created
    shall be filled by appointment by the joint candidate for the office of lieutenant
    governor. Such candidate for lieutenant governor shall certify in writing and
    under oath to the secretary of state not later than the fifth day before the day
    of such election the name and residence address of the person selected to fill
    such vacancy.

    (E) If a person nominated in a primary election or nominated by petition under
    section 3517.012 of the Revised Code as a candidate for election to the office
    of governor or lieutenant governor at the next general election withdraws as such
    candidate prior to the ninetieth day before the day of the general election or
    dies prior to the tenth day before the day of such general election, the vacancy
    so created shall be filled in the manner provided for by section 3513.31 of the
    Revised Code.

    (F) If a person nominated by petition as an independent candidate for election
    to the office of governor or lieutenant governor withdraws as such candidate prior
    to the ninetieth day before the day of the general election or dies prior to the
    tenth day before the day of such general election, the vacancy so created shall
    be filled by the candidates'' committee in the manner provided for, as in the
    case of death, by section 3513.31 of the Revised Code, except that, in the case
    of withdrawal of candidacy, the name and residence address of the replacement
    candidate shall be certified in writing and under oath to the secretary of state
    not later than the eighty-sixth day before the day of the general election.

    (G) If the vacancy in a joint candidacy for governor and lieutenant governor can
    be filled in accordance with this section and is not so filled, the joint candidacy
    which has not been vacated shall be invalidated and shall not be presented for
    election.

    (H) Any replacement candidate appointed or selected pursuant to this section shall
    be one who has the qualifications of an elector.'
