- number: '3513.254'
  heading: Nomination for members of board of education
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) The name of each candidate for member of a city, local, or exempted village
    board of education shall appear on the nonpartisan ballot. Nominating petitions
    of candidates for member of a board of education of a local or exempted village
    school district shall be signed by twenty-five qualified electors of the school
    district. Nominating petitions for candidates for member of a board of education
    of a city school district having a population of less than twenty thousand, as
    ascertained by the next preceding federal census, shall be signed by twenty-five
    qualified electors of the school district. Nominating petitions for candidates
    for member of a board of education of a city school district having a population
    of twenty thousand or more but less than fifty thousand, as ascertained by the
    next preceding federal census, shall be signed by seventy-five qualified electors
    of the school district. Nominating petitions for candidates for member of a board
    of education of a city school district having a population of fifty thousand or
    more but less than one hundred thousand, as ascertained by the next preceding
    federal census, shall be signed by one hundred fifty qualified electors of the
    school district. Nominating petitions for candidates for member of a board of
    education of a city school district having a population of one hundred thousand
    or more, as ascertained by the next preceding federal census, shall be signed
    by three hundred qualified electors of the school district.

    (B) Nominating petitions shall be filed with the board of elections not later
    than four p.m. of the ninetieth day before the day of the general election, provided
    that no such petition shall be accepted for filing if it appears to contain signatures
    aggregating in number more than three times the minimum number of signatures required
    by this section. A board of elections shall not accept for filing a nominating
    petition of a person if that person, for the same election, has already filed
    a declaration of candidacy, a declaration of intent to be a write-in candidate,
    or a nominating petition, or has become a candidate through party nomination at
    a primary election or by the filling of a vacancy under section 3513.30 or 3513.31
    of the Revised Code for any other position as a member of a city, local, or exempted
    village board of education or position as a member of a governing board of an
    educational service center, or for a municipal or township office. When a petition
    of a candidate has been accepted for filing by a board of elections, the petition
    shall not be deemed invalid if, upon verification of signatures contained in the
    petition, the board of elections finds the number of signatures accepted exceeds
    three times the minimum number of signatures required. A board of elections may
    discontinue verifying petitions when the number of verified signatures equals
    the minimum required number of qualified signatures.

    (C) This section is subject to section 3513.256 of the Revised Code.'
