- number: '3517.22'
  heading: Infiltration of campaign - false statements in campaign materials - issues
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A) No person during the course of any campaign in advocacy of or in opposition
    to the adoption of any proposition or issue submitted to the voters shall knowingly
    and with intent to affect the outcome of such campaign do any of the following:

    (1) Serve, or place another person to serve, as an agent or employee in the election
    campaign organization of a committee which advocates or is in opposition to the
    adoption of any ballot proposition or issue for the purpose of acting to impede
    the conduct of the campaign on the proposition or issue or of reporting information
    to the employee''s employer or the agent''s principal without the knowledge of
    the committee;

    (2) Promise, offer, or give any valuable thing or valuable benefit to any person
    who is employed by or is an agent of a committee in advocacy of or in opposition
    to the adoption of any ballot proposition or issue, for the purpose of influencing
    the employee or agent with respect to the improper discharge of the employee''s
    or agent''s campaign duties or to obtain information about the committee''s campaign
    organization.

    (B) No person, during the course of any campaign in advocacy of or in opposition
    to the adoption of any ballot proposition or issue, by means of campaign material,
    including sample ballots, an advertisement on radio or television or in a newspaper
    or periodical, a public speech, a press release, or otherwise, shall knowingly
    and with intent to affect the outcome of such campaign do any of the following:

    (1) Falsely identify the source of a statement, issue statements under the name
    of another person without authorization, or falsely state the endorsement of or
    opposition to a ballot proposition or issue by a person or publication;

    (2) Post, publish, circulate, distribute, or otherwise disseminate, a false statement,
    either knowing the same to be false or acting with reckless disregard of whether
    it was false or not, that is designed to promote the adoption or defeat of any
    ballot proposition or issue.'
