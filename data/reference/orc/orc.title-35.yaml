- number: '3501.15'
  heading: Election officials not to be candidates - exceptions
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: No person shall serve as a member, director, deputy director, or employee
    of the board of elections who is a candidate for any office to be filled at an
    election, except the office of delegate or alternate to a convention, member of
    the board of directors of a county agricultural society, presidential elector,
    or a member of a party committee. No person who is a candidate for an office or
    position to be voted for by the electors of a precinct, except for a candidate
    for county central committee who is not opposed by any other candidate in that
    election and precinct, shall serve as a precinct election officer in said precinct.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.15
- number: '3501.16'
  heading: Secretary of state may remove or suspend from office
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: The secretary of state may summarily remove or suspend any member of a board
    of elections, or the director, deputy director, or any other employee of the board,
    for neglect of duty, malfeasance, misfeasance, or nonfeasance in office, for any
    willful violation of Title XXXV of the Revised Code, or for any other good and
    sufficient cause. Except as otherwise provided in section 3501.161 of the Revised
    Code, vacancies in the office of chairperson, director, or deputy director shall
    be filled in the same manner as original selections are made, from persons belonging
    to the same political party as that to which the outgoing officer belonged. If
    those vacancies cannot be filled in that manner, they shall be filled by the secretary
    of state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3501.16
- number: '3501.161'
  heading: Filling vacancy in office of chairman or director with member of opposite
    party
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3501'
    name: Election Procedure; Election Officials
  text: The board may decide by the affirmative vote of at least three members to
    fill a vacancy in the office of chairman or director with a person belonging to
    the opposite political party from that to which the outgoing officer belonged.
    After such a vote, the vacancy shall be filled and all other officers shall be
    reselected in accordance with the procedures set forth in section 3501.09 of the
    Revised Code. An officer filling a vacancy and an officer who becomes or remains
    an officer after the reselection shall serve as an officer for the remainder of
    the term for which the outgoing officer was selected to serve as an officer. A
    reselection of officers under this section does not increase or decrease the length
    of any person's term as member of the board. The director and deputy director
    shall be of opposite political parties, and the chairman shall be selected from
    the members of the board of opposite politics from those of the director.
