- number: '3506.18'
  heading: Electronic voting machine - verified paper audit trail as official ballot
    in recount
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: '(A) For any recount of an election in which ballots are cast using a direct
    recording electronic voting machine with a voter verified paper audit trail, the
    voter verified paper audit trail shall serve as the official ballot to be recounted.

    (B) Voter verified paper audit trails shall be preserved in the same manner and
    for the same time period as paper ballots are preserved under section 3505.31
    of the Revised Code.

    (C) A voter verified paper audit trail shall be treated as are other ballots for
    purposes of section 149.43 of the Revised Code and shall be retained in accordance
    with the county records retention schedule established under section 149.38 of
    the Revised Code after the relevant time period prescribed for its preservation
    in section 3505.31 of the Revised Code, or as ordered by the secretary of state
    or a court of competent jurisdiction.

    (D) If a voter verified paper audit trail is made available to the public, any
    information on that voter verified paper audit trail that identifies the particular
    direct recording electronic voting machine that produced it shall be redacted.'
  history: null
