- number: '3517.23'
  heading: Rules for administration of campaign finance and advertising
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: The secretary of state shall adopt rules in accordance with Chapter 119. of
    the Revised Code that are necessary for the administration and enforcement of
    sections 3517.08 to 3517.13, 3517.20 to 3517.22, 3599.03, and 3599.031 of the
    Revised Code and shall provide each candidate, political action committee, political
    contributing entity, legislative campaign fund, political party, and person making
    disbursements to pay the direct costs of producing or airing electioneering communications
    with written instructions and explanations in order to ensure compliance with
    sections 3517.08 to 3517.13, 3517.20 to 3517.22, 3599.03, and 3599.031 of the
    Revised Code.
