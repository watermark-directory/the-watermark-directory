- number: '3513.18'
  heading: Primary election pollbooks
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'Party primaries shall be held at the same place and time, but there shall
    be separate pollbooks and tally sheets provided at each polling place for each
    party participating in the election.

    If a special election on a question or issue is held on the day of a primary election,
    there shall be provided in the pollbooks pages on which shall be recorded the
    names of all electors voting on said question or issue and not voting in such
    primary. It shall not be necessary for electors desiring to vote only on the question
    or issue to declare their political affiliation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3513.18
- number: '3513.19'
  heading: Challenges at primary elections
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: '(A) It is the duty of any precinct election official, whenever any such official
    doubts that a person attempting to vote at a primary election is legally entitled
    to vote at that election, to challenge the right of that person to vote. The right
    of a person to vote at a primary election may be challenged upon the following
    grounds:

    (1) That the person whose right to vote is challenged is not a legally qualified
    elector;

    (2) That the person has received or has been promised some valuable reward or
    consideration for the person''s vote;

    (3) That the person is not affiliated with or is not a member of the political
    party whose ballot the person desires to vote. Such party affiliation shall be
    determined by examining the elector''s voting record for the current year and
    the immediately preceding two calendar years as shown on the voter''s registration
    card, using the standards of affiliation specified in the seventh paragraph of
    section 3513.05 of the Revised Code. Division (A)(3) of this section and the seventh
    paragraph of section 3513.05 of the Revised Code do not prohibit a person who
    holds an elective office for which candidates are nominated at a party primary
    election from doing any of the following:

    (a) If the person voted as a member of a different political party at any primary
    election within the current year and the immediately preceding two calendar years,
    being a candidate for nomination at a party primary held during the times specified
    in division (C)(2) of section 3513.191 of the Revised Code provided that the person
    complies with the requirements of that section;

    (b) Circulating the person''s own petition of candidacy for party nomination in
    the primary election.

    (B) When the right of a person to vote is challenged upon the ground set forth
    in division (A)(3) of this section, membership in or political affiliation with
    a political party shall be determined by the person''s statement, made under penalty
    of election falsification, that the person desires to be affiliated with and supports
    the principles of the political party whose primary ballot the person desires
    to vote.'
  history: null
