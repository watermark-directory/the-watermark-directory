- number: '3513.255'
  heading: Petitions for member of governing board of educational service center
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3513'
    name: Primaries; Nominations
  text: 'This section is subject to section 3513.256 of the Revised Code. The name
    of each candidate for election as a member of a governing board of an educational
    service center shall appear on the nonpartisan ballot. Each nominating petition
    shall be signed by fifty qualified electors who reside in one of the following,
    as applicable:

    (A) The school districts over which the educational service center governing board
    has jurisdiction, in the case of any candidate running for a position on any educational
    service center governing board other than a governing board established in accordance
    with section 3311.054 of the Revised Code;

    (B) The subdistrict in which the candidate is running, in the case of a position
    on a governing board of an educational service center established in accordance
    with section 3311.054 of the Revised Code.

    Each nominating petition shall be filed with the board of elections of the county
    in which the central administrative offices of the educational service center
    governing board are located not later than four p.m. of the ninetieth day before
    the day of the general election, provided that no such petition shall be accepted
    for filing if it appears to contain signatures aggregating in number more than
    three times the minimum number of signatures required by this section. A board
    of elections shall not accept for filing a nominating petition of a person if
    that person, for the same election, has already filed a declaration of candidacy,
    a declaration of intent to be a write-in candidate, or a nominating petition,
    or has become a candidate through party nomination at a primary election or by
    the filling of a vacancy under section 3513.30 or 3513.31 of the Revised Code
    for any other position as a member of a governing board of an educational service
    center or position as a member of a city, local, or exempted village board of
    education, or for a municipal or township office. When a petition of a candidate
    has been accepted for filing by a board of elections, the petition shall not be
    deemed invalid if, upon verification of signatures contained in the petition,
    the board of elections finds the number of signatures accepted exceeds three times
    the minimum signatures required. A board of elections may discontinue verifying
    petitions when the number of verified signatures equals the minimum required number
    of qualified signatures.'
