- number: '3517.104'
  heading: Contribution limitations adjustments
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A) In January of each odd-numbered year, the secretary of state, in accordance
    with this division and division (B) of this section, shall adjust each amount
    specified in section 3517.102, in division (B)(4)(e) of section 3517.10, and in
    division (B) of section 3517.101 of the Revised Code. The adjustment shall be
    based on the yearly average of the previous two years of the Consumer Price Index
    for All Urban Consumers or its successive equivalent, as determined by the United
    States department of labor, bureau of labor statistics, or its successor in responsibility,
    for all items, Series A. Using the 1996 yearly average as the base year, the secretary
    of state shall compare the most current average consumer price index with that
    determined in the preceding odd-numbered year, and shall determine the percentage
    increase or decrease. The percentage increase or decrease shall be multiplied
    by the actual dollar figure for each office or entity specified in section 3517.102
    of the Revised Code and by each actual dollar figure specified in division (B)(4)(e)
    of section 3517.10 and in division (B) of section 3517.101 of the Revised Code
    as determined in the previous odd-numbered year, and the product shall be added
    to or subtracted from its corresponding actual dollar figure, as necessary, for
    that previous odd-numbered year.

    The resulting amount shall be rounded to the nearest twenty-five dollars if the
    calculations are made regarding the amounts specified in division (B)(4)(e) of
    section 3517.10 of the Revised Code.

    If the calculations are made regarding the amounts specified in section 3517.101
    or 3517.102 of the Revised Code, the resulting amount shall not be rounded. If
    that resulting amount is less than one hundred dollars, the secretary of state
    shall retain a record of the resulting amount and the manner in which it was calculated,
    but shall not make an adjustment unless the resulting amount, when added to the
    resulting amount calculated in each prior odd-numbered year since the last adjustment
    was made, equals or exceeds one hundred dollars.

    (B)(1) The secretary of state shall calculate the adjustment under division (A)
    of this section and shall report the calculations and necessary materials to the
    auditor of state, on or before the thirty-first day of January of each odd-numbered
    year. The secretary of state shall base the adjustment on the most current consumer
    price index that is described in division (A) of this section and that is in effect
    as of the first day of January of each odd-numbered year.

    (2) The calculations made by the secretary of state under divisions (A) and (B)(1)
    of this section shall be certified by the auditor of state on or before the fifteenth
    day of February of each odd-numbered year.

    (3) On or before the twenty-fifth day of February of each odd-numbered year, the
    secretary of state shall prepare a report setting forth the maximum contribution
    limitations under section 3517.102 of the Revised Code, the maximum amounts, if
    any, of contributions permitted to be kept under that section, the amounts required
    under division (B)(4)(e) of section 3517.10 of the Revised Code for reporting
    contributions and in-kind contributions at social or fund-raising activities and
    contributions from amounts deducted from an employee''s wages and salary, and
    the maximum office facility gift limitations under section 3517.101 of the Revised
    Code, as calculated and certified pursuant to divisions (A) and (B)(1) and (2)
    of this section. The report and all documents relating to the calculations contained
    in the report are public records. The report shall contain an indication of the
    period in which the limitations, the maximum contribution or gift amounts, and
    the reporting amounts apply, a summary of how the limitations, the maximum contribution
    or gift amounts, and the reporting amounts were calculated, and a statement that
    the report and all related documents are available for inspection and copying
    at the office of the secretary of state.

    (4) On or before the twenty-fifth day of February of each odd-numbered year, the
    secretary of state shall transmit the report to the general assembly and shall
    send the report by mail to the board of elections of each county.

    (5) The secretary of state shall send the report by mail to each person who files
    a declaration of candidacy or nominating petition with the secretary of state
    for the office of governor, lieutenant governor, secretary of state, auditor of
    state, treasurer of state, attorney general, chief justice of the supreme court,
    or justice of the supreme court. The report shall be mailed on or before the tenth
    day after the filing.

    (6) A board of elections shall send the report by mail to each person who files
    a declaration of candidacy or nominating petition with the board for the office
    of state representative or state senator. The report shall be mailed on or before
    the tenth day after the filing.'
