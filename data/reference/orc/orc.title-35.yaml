  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3511.03
- number: '3511.04'
  heading: Ballot sent by mail, facsimile machine or other means
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: '(A) If a board of elections receives an application for uniformed services
    or overseas absent voter''s ballots that does not contain all of the required
    information or is not submitted on an appropriate form, the board promptly shall
    notify the applicant of the additional information required to be provided by
    the applicant to complete that application, direct the applicant to use an appropriate
    form, or both, as applicable.

    (B) Not later than the forty-sixth day before the day of each general or primary
    election, and at the earliest possible time before the day of a special election
    held on a day other than the day on which a general or primary election is held,
    the board of elections shall mail, send by facsimile machine, send by electronic
    mail, send through internet delivery if such delivery is offered by the board
    of elections or the secretary of state, or otherwise send uniformed services or
    overseas absent voter''s ballots then ready for use as provided for in section
    3511.03 of the Revised Code and for which the board has received valid applications
    prior to that time. Thereafter, and until the close of business on the seventh
    day preceding the day of election, the board shall promptly, upon receipt of valid
    applications for them, mail, send by facsimile machine, send by electronic mail,
    send through internet delivery if such delivery is offered by the board of elections
    or the secretary of state, or otherwise send to the proper persons all uniformed
    services or overseas absent voter''s ballots then ready for use.

    If, after the seventieth day before the day of a general or primary election,
    any other question, issue, or candidacy is lawfully ordered submitted to the electors
    voting at the general or primary election, the board shall promptly provide a
    separate official issue, special election, or other election ballot for submitting
    the question, issue, or candidacy to those electors, and the board shall promptly
    mail, send by facsimile machine, send by electronic mail, send through internet
    delivery if such delivery is offered by the board of elections or the secretary
    of state, or otherwise send each such separate ballot to each person to whom the
    board has previously mailed or sent other uniformed services or overseas absent
    voter''s ballots.

    No public office, and no public official or employee who is acting in an official
    capacity, shall prepay the return postage for any absent voter''s ballots. In
    mailing uniformed services or overseas absent voter''s ballots, the board shall
    use the fastest mail service available, but the board shall not mail them by certified
    mail.'
