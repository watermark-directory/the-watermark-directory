- number: '3511.03'
  heading: Form of ballots
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3511'
    name: Armed Services Absent Voter's Ballots
  text: The board of elections of each county shall provide uniformed services or
    overseas absent voter's ballots for use at each election. Such ballots for general
    or primary elections shall be prescribed on the seventieth day before the day
    of such elections and shall be the same as provided for absent voters in section
