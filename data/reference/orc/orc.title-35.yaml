- number: '3506.13'
  heading: Challengers and witnesses in precincts where marking devices, automatic
    tabulating equipment, voting machines, or any combination of these are used
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3506'
    name: Voting And Tabulating Equipment
  text: 'In precincts where marking devices, automatic tabulating equipment, voting
    machines, or any combination of these are used, observers may be appointed as
    prescribed in section 3505.21 of the Revised Code. The duties and privileges of
    observers in such precincts during the hours the polls are open shall be as provided
    in section 3505.21 of the Revised Code.

    Observers shall be allowed to remain in the polling place after the polls close
    and may observe the processing of the ballots and the sealing and signing of the
    envelopes or containers or both containing the voted ballots.'
