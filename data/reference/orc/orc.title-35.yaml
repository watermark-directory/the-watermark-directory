- number: '3517.18'
  heading: '[Former R.C. 3517.157, amended and renumbered as R.C. 3517.18 by H.B.
    96, 136th General Assembly, effective 9/30/2025] Procedural requirements'
  title:
    num: '35'
    name: Elections
  chapter:
    num: '3517'
    name: Campaigns; Political Parties
  text: '(A) A complaint shall be filed with the secretary of state under section
    3517.16 of the Revised Code within two years after the occurrence of the act or
    failure to act that is the subject of the complaint, except that if the act or
    failure to act involves fraud, concealment, or misrepresentation and was not discovered
    during that two-year period, a complaint may be filed within one year after discovery
    of such act or failure to act.

    (B) Whoever files a complaint with the secretary of state under section 3517.16
    of the Revised Code may withdraw it at any time.

    (C) A party adversely affected by a final determination of the commission, including
    the secretary of state, may appeal from the determination under section 119.12
    of the Revised Code.

    (D) The members of the commission shall not do either of the following except
    at a meeting of the commission subject to section 121.22 of the Revised Code:

    (1) Discuss among themselves a complaint pending before the commission;

    (2) Discuss a complaint pending before the commission with a party to the complaint,
    an attorney representing a party to the complaint, or an attorney appointed to
    hear the complaint.'
