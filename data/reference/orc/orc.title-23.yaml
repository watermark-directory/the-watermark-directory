- number: '2307.382'
  heading: Personal jurisdiction
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) A court may exercise personal jurisdiction over a person who acts directly
    or by an agent, as to a cause of action arising from the person''s:

    (1) Transacting any business in this state;

    (2) Contracting to supply services or goods in this state;

    (3) Causing tortious injury by an act or omission in this state;

    (4) Causing tortious injury in this state by an act or omission outside this state
    if the person regularly does or solicits business, or engages in any other persistent
    course of conduct, or derives substantial revenue from goods used or consumed
    or services rendered in this state;

    (5) Causing injury in this state to any person by breach of warranty expressly
    or impliedly made in the sale of goods outside this state when the person might
    reasonably have expected such person to use, consume, or be affected by the goods
    in this state, provided that the person also regularly does or solicits business,
    or engages in any other persistent course of conduct, or derives substantial revenue
    from goods used or consumed or services rendered in this state;

    (6) Causing tortious injury in this state to any person by an act outside this
    state committed with the purpose of injuring persons, when the person might reasonably
    have expected that some person would be injured thereby in this state;

    (7) Causing tortious injury to any person by a criminal act, any element of which
    takes place in this state, which the person commits or in the commission of which
    the person is guilty of complicity.

    (8) Having an interest in, using, or possessing real property in this state;

    (9) Contracting to insure any person, property, or risk located within this state
    at the time of contracting.

    (B) For purposes of this section, a person who enters into an agreement, as a
    principal, with a sales representative for the solicitation of orders in this
    state is transacting business in this state. As used in this division, "principal"
    and "sales representative" have the same meanings as in section 1335.11 of the
    Revised Code.

    (C) In addition to a court''s exercise of personal jurisdiction under division
    (A) of this section, a court may exercise personal jurisdiction over a person
    on any basis consistent with the Ohio Constitution and the United States Constitution.'
