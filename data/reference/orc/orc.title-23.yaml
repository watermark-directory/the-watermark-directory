- number: '2317.561'
  heading: View of ultrasound image of fetus prior to abortion
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'In addition to the requirements in section 2317.56 of the Revised Code, if
    an obstetric ultrasound examination is performed at any time prior to the performance
    or inducement of an abortion or the physician performing or inducing the abortion
    determines that an ultrasound examination will be performed as part of the abortion
    procedure, the physician shall do both of the following prior to the performance
    or inducement of the abortion:

    (A) Provide the pregnant woman receiving the abortion the opportunity to view
    the active ultrasound image of the embryo or fetus;

    (B) Offer to provide the pregnant woman with a physical picture of the ultrasound
    image of the embryo or fetus.

    The requirements of division (A) of this section shall be performed at no additional
    charge to the pregnant woman.'
  history: null
