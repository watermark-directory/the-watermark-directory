- number: '2307.65'
  heading: Civil action to recover benefits improperly paid
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) The attorney general may bring a civil action in the Franklin county
    court of common pleas on behalf of the department of medicaid, and the prosecuting
    attorney of the county in which a violation of division (B) of section 2913.401
    of the Revised Code occurs may bring a civil action in the court of common pleas
    of that county on behalf of the county department of job and family services,
    against a person who violates division (B) of section 2913.401 of the Revised
    Code for the recovery of the amount of benefits paid on behalf of a person that
    either department would not have paid but for the violation minus any amounts
    paid in restitution under division (C)(2) of section 2913.401 of the Revised Code
    and for reasonable attorney''s fees and all other fees and costs of litigation.

    (B) In a civil action brought under division (A) of this section, if the defendant
    failed to disclose a transfer of property in violation of division (B)(3) of section
    2913.401 of the Revised Code, the court may also grant any of the following relief
    to the extent permitted by the "Social Security Act," section 1917, 42 U.S.C.
    1396p:

    (1) Avoidance of the transfer of property that was not disclosed in violation
    of division (B)(3) of section 2913.401 of the Revised Code to the extent of the
    amount of benefits the department would not have paid but for the violation;

    (2) An order of attachment or garnishment against the property in accordance with
    Chapter 2715. or 2716. of the Revised Code;

    (3) An injunction against any further disposition by the transferor or transferee,
    or both, of the property the transfer of which was not disclosed in violation
    of division (B)(3) of section 2913.401 of the Revised Code or against the disposition
    of other property by the transferor or transferee;

    (4) Appointment of a receiver to take charge of the property transferred or of
    other property of the transferee;

    (5) Any other relief that the court considers just and equitable.

    (C) To the extent permitted by the "Social Security Act," section 1917, 42 U.S.C.
    1396p, the department of medicaid or the county department of job and family services
    may enforce a judgment obtained under this section by levying on property the
    transfer of which was not disclosed in violation of division (B)(3) of section
    2913.401 of the Revised Code or on the proceeds of the transfer of that property
    in accordance with Chapter 2329. of the Revised Code.

    (D) The remedies provided in divisions (B) and (C) of this section do not apply
    if the transferee of the property the transfer of which was not disclosed in violation
    of division (B)(3) of section 2913.401 of the Revised Code acquired the property
    in good faith and for fair market value.

    (E) The remedies provided in this section are not exclusive and do not preclude
    the use of any other criminal or civil remedy for any act that is in violation
    of section 2913.401 of the Revised Code.

    (F) Amounts of medicaid services paid and recovered in an action brought under
    this section shall be credited to the general revenue fund, and any applicable
    federal share shall be returned to the appropriate agency or department of the
    United States.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.65
- number: '2307.66'
  heading: Civil action for dissemination of images
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) A victim of a violation of section 2917.211 of the Revised Code has and
    may commence a civil cause of action against the offender for any of the following,
    in addition to reasonable attorney''s fees and the costs of bringing the civil
    action:

    (1) An injunction or a temporary restraining order prohibiting further dissemination
    of the image that is the subject of the violation;

    (2) Compensatory and punitive damages for harm resulting from the violation.

    (B) The victim shall be presumed to have suffered harm as a result of the nonconsensual
    dissemination of private sexual images or the nonconsensual dissemination of fabricated
    sexual images.

    (C) A civil action brought under division (A) of this section shall be brought
    within four years after the victim discovers the private sexual image or fabricated
    sexual image.

    (D) The cause of action created by this section is in addition to any other cause
    of action available under statutory or common law.

    (E) As used in this section, "victim" has the same meaning as in section 2930.01
    of the Revised Code.

    (F) "Fabricated sexual image" means a created, adapted, or modified image that
    depicts another person, the other person is recognizable in the image by the other
    person''s face, likeness, or other distinguishing characteristic, and the other
    person depicted in the image is in a state of nudity or is engaged in a sexual
    act.'
