- number: '2319.09'
  heading: Uniform Interstate Depositions and Discovery Act
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2319'
    name: Affidavits; Depositions
  text: '(A) This section may be cited as the "Uniform Interstate Depositions and
    Discovery Act."

    (B) As used in this section:

    (1) "Foreign jurisdiction" means a state other than Ohio.

    (2) "Foreign subpoena" means a subpoena issued under authority of a court of record
    of a foreign jurisdiction.

    (3) "Person" means an individual, corporation, business trust, estate, trust,
    partnership, limited liability company, association, joint venture, public corporation,
    government, or governmental subdivision, agency, or instrumentality, or any other
    legal or commercial entity.

    (4) "State" means a state of the United States, the District of Columbia, Puerto
    Rico, the United States Virgin Islands, a federally recognized Indian tribe, or
    any territory or insular possession subject to the jurisdiction of the United
    States.

    (5) "Subpoena" means a document, however denominated, issued under authority of
    a court of record requiring a person to do any of the following:

    (a) Attend and give testimony at a deposition;

    (b) Produce and permit inspection and copying of designated books, documents,
    records, electronically stored information, or tangible things in the possession,
    custody, or control of the person;

    (c) Permit inspection of premises under the control of the person.

    (C)(1) To request issuance of a subpoena under this section, a party shall submit
    a foreign subpoena to a clerk of court in the county in which discovery is sought
    to be conducted in this state. A request for the issuance of a subpoena under
    this section does not constitute an appearance in the courts of this state.

    (2) When a party submits a foreign subpoena to a clerk of court in this state,
    the clerk, in accordance with that court''s procedure, shall promptly issue a
    subpoena for service upon the person to which the foreign subpoena is directed.

    (3) A subpoena issued under division (C)(2) of this section shall do both of the
    following:

    (a) Incorporate the terms used in the foreign subpoena;

    (b) Contain or be accompanied by the names, addresses, and telephone numbers of
    all counsel of record in the proceeding to which the subpoena relates and of any
    party not represented by counsel.

    (D) A subpoena issued by a clerk of court under division (C) of this section shall
    be served in compliance with any rule of court or statute relating to the service
    of a subpoena issued in this state.

    (E) The Ohio Rules of Civil Procedure and any statutes relating to service of
    subpoenas and compliance with subpoenas to attend and give testimony, produce
    designated books, documents, records, electronically stored information, or other
    tangible things, or to allow inspection of premises shall apply to subpoenas issued
    under division (C) of this section.

    (F) An application to the court for a protective order or to enforce, quash, or
    modify a subpoena issued by a clerk of court under division (C) of this section
    shall comply with the Ohio Rules of Civil Procedure and be submitted to the court
    in the county in which discovery is to be conducted.

    (G) In applying and construing this section, consideration shall be given to the
    need to promote uniformity of the law with respect to its subject matter among
    states that enact a substantially similar statute or rule.

    (H) This section applies to requests for discovery in cases pending on the effective
    date of this act.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2319.09
- number: '2319.11'
  heading: Officers authorized to take depositions for use outside of state
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2319'
    name: Affidavits; Depositions
  text: Depositions taken in and to be used in this state must be taken by an officer
    or person whose authority is derived within the state; but, if for use elsewhere,
    they may be taken before a commissioner or officer who derives his authority from
    the state, district, or territory in which they are to be used.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2319.11
- number: '2319.27'
  heading: Fees for taking depositions - lien
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2319'
    name: Affidavits; Depositions
  text: 'Except as section 147.08 of the Revised Code governs the fees chargeable
    by a notary public for services rendered in connection with depositions, the fees
    and expenses chargeable for the taking and certifying of a deposition by a person
    who is authorized to do so in this state, including, but not limited to, a reporter,
    stenographer, or person described in Civil Rule 28, may be established by that
    person subject to the qualification specified in this section, and may be different
    than the fees and expenses charged for the taking and certifying of depositions
    by similar persons in other areas of this state. Unless, prior to the taking and
    certifying of a deposition, the parties who request it agree that the fees or
    expenses to be charged may exceed the usual and customary fees or expenses charged
    in the particular community for similar services, such a person shall not charge
    fees or expenses in connection with the taking and certifying of the deposition
    that exceed those usual and customary fees and expenses.

    The person taking and certifying a deposition may retain the deposition until
    the fees and expenses that the person charged are paid. The person also shall
    tax the costs, if any, of a sheriff or other officer who serves any process in
    connection with the taking of a deposition and the fees of the witnesses, and,
    if directed by a person entitled to those costs or fees, may retain the deposition
    until those costs or fees are paid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2319.27
- number: '2321.01'
  heading: Appellate review without motion for new trial
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2321'
    name: New Trial
  text: 'A motion for a new trial is not necessary as a prerequisite to obtain appellate
    review of the sufficiency or weight of the evidence submitted to the trial court
    where such evidence to be considered appears as a part of the record filed in
    the appellate court.

    This section applies to any action or proceeding pending in the courts on October
    27, 1949.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2321.01
- number: '2321.04'
  heading: Stating objection
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2321'
    name: New Trial
  text: The objection made in the trial court with the ruling thereon must be stated,
    with the facts, or so much of the evidence as is necessary to explain it, and
    no more, and the whole as briefly as possible.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2321.04
- number: '2321.18'
  heading: New trial or reversal granted only once
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2321'
    name: New Trial
  text: The same trial court shall not grant more than one new trial on the weight
    of the evidence against the same party in the same case, nor shall the same court
    grant more than one judgment of reversal on the weight of the evidence against
    the same party in the same case.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2321.18
- number: '2321.21'
  heading: Application may be made after term
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2321'
    name: New Trial
  text: When, with reasonable diligence, the grounds for a new trial could not be
    discovered before but are discovered after the term at which the journal entry
    of a final order, judgment, or decree has been approved by the trial court in
    writing and filed with the clerk of the court for journalization, the application
    for a new trial may be by petition, filed not later than the second term after
    the discovery, nor more than one year after the final order, judgment, or decree
    was rendered, on which a summons must issue, be returnable, and be served, or
    publication made, as in other cases.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2321.21
- number: '2321.22'
  heading: Facts in petition considered and case heard and decided
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2321'
    name: New Trial
  text: The facts stated in the petition mentioned in section 2321.21 of the Revised
    Code, shall be considered as denied, without answer. If the service is complete
    in vacation, the case shall be heard and summarily decided at the ensuing term,
    and when completed in term, within twenty days after service. The case shall be
    placed on the trial docket, and the witnesses examined in open court, or their
    depositions taken as in other cases.
  history: null
