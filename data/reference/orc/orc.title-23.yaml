  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.14
- number: '2305.15'
  heading: Tolling during defendant's absence, concealment or imprisonment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A)(1) Except as provided in division (A)(2) of this section, when a cause
    of action accrues against a person, if the person is out of the state, has absconded,
    or conceals self, the period of limitation for the commencement of the action
    as provided in sections 2305.04 to 2305.14, 1302.98, and 1304.35 of the Revised
    Code does not begin to run until the person comes into the state or while the
    person is so absconded or concealed. After the cause of action accrues if the
    person departs from the state, absconds, or conceals self, the time of the person''s
    absence or concealment shall not be computed as any part of a period within which
    the action must be brought.

    (2) Division (A)(1) of this section does not apply to statutes of repose, including,
    but not limited to, those contained in any of the following:

    (a) Division (C) of section 2305.10 of the Revised Code;

    (b) Division (C) or (D) of section 2305.113 of the Revised Code;

    (c) Division (B) of section 2305.115 of the Revised Code;

    (d) Division (B) or (C) of section 2305.117 of the Revised Code;

    (e) Section 2305.131 of the Revised Code.

    (B) When a person is imprisoned for the commission of any offense, the time of
    the person''s imprisonment shall not be computed as any part of any period of
    limitation, as provided in section 2305.09, 2305.10, 2305.11, 2305.113, or 2305.14
    of the Revised Code, within which any person must bring any action against the
    imprisoned person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.15
- number: '2305.16'
  heading: Tolling due to minority or unsound mind
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: 'Unless otherwise provided in sections 1302.98, 1304.35, and 2305.04 to 2305.14
    of the Revised Code, if a person entitled to bring any action mentioned in those
    sections, unless for penalty or forfeiture, is, at the time the cause of action
    accrues, within the age of minority or of unsound mind, the person may bring it
    within the respective times limited by those sections, after the disability is
    removed. When the interests of two or more parties are joint and inseparable,
    the disability of one shall inure to the benefit of all.

    After the cause of action accrues, if the person entitled to bring the action
    becomes of unsound mind and is adjudicated as such by a court of competent jurisdiction
    or is confined in an institution or hospital under a diagnosed condition or disease
    which renders the person of unsound mind, the time during which the person is
    of unsound mind and so adjudicated or so confined shall not be computed as any
    part of the period within which the action must be brought.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.16
- number: '2305.17'
  heading: Commencement of action
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: An action is commenced within the meaning of sections 2305.03 to 2305.22 and
    sections 1302.98 and 1304.35 of the Revised Code by filing a petition in the office
    of the clerk of the proper court together with a praecipe demanding that summons
    issue or an affidavit for service by publication, if service is obtained within
