- number: '2305.236'
  heading: Immunity concerning domestic violence shelter definitions
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: 'As used in sections 2305.236 to 2305.239 of the Revised Code:

    (A) "Conduct" means actions or omissions.

    (B) "Domestic violence," "shelter," and "shelter for victims of domestic violence"
    have the same meanings as in section 3113.33 of the Revised Code.

    (C) "Perpetrator" means a person who allegedly has committed domestic violence
    and who bears one of the relationships specified in division (B) of section 3113.33
    of the Revised Code to a victim of domestic violence who is a shelter client.

    (D) "Harm" means injury, death, or loss to person or property.

    (E) "Political subdivision" has the same meaning as in section 2744.01 of the
    Revised Code.

    (F) "Tort action" means a civil action for damages for injury, death, or loss
    to person or property other than a civil action for damages for a breach of contract
    or another agreement between persons.

    (G) "Volunteer" means an individual who provides any service at a shelter for
    victims of domestic violence without the expectation of receiving and without
    receiving any compensation or other form of remuneration, either directly or indirectly,
    for the provision of the service.

    (H) "Shelter client" means a person who is a victim of domestic violence and who
    is seeking to use or is using the services or facilities of a shelter for victims
    of domestic violence.

    (I) "Victim advocate" means a person from a crime victim service organization
    who provides support and assistance for a victim of a crime during court proceedings
    and recovery efforts related to the crime.

    (J) "Crime victim service organization" means any organization that is not organized
    for profit and that is organized and operated to provide, or to contribute to
    the support of organizations or institutions organized and operated to provide,
    services and assistance for victims of crime.'
