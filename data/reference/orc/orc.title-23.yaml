- number: '2325.03'
  heading: Bona fide purchaser unaffected
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2325'
    name: Relief After Judgment
  text: 'The title to property, which title is the subject of a final judgment or
    order sought to be vacated, modified, or set aside by any type of proceeding or
    attack and which title has, by, in consequence of, or in reliance upon the final
    judgment or order, passed to a purchaser in good faith, shall not be affected
    by the proceeding or attack; nor shall the title to property that is sold before
    judgment under an attachment be affected by the proceeding or attack. "Purchaser
    in good faith," as used in this section, includes a purchaser at a duly confirmed
    judicial sale.

    This section does not apply if in the proceeding resulting in the judgment or
    order sought to be vacated, modified, or set aside, the person then holding the
    title in question was not lawfully served with process or notice, as required
    by the law or Civil Rules applicable to the proceeding.'
  history: null
