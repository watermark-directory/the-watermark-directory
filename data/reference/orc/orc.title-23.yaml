- number: '2301.031'
  heading: Computerizing court of paying cost of computerized legal research
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A)(1) The domestic relations judges of a domestic relations division created
    by section 2301.03 of the Revised Code may determine that, for the efficient operation
    of their division, additional funds are required to computerize the division,
    to make available computerized legal research services, or both. Upon making a
    determination that additional funds are required for either or both of those purposes,
    the judges shall do one of the following:

    (a) Authorize and direct the clerk or a deputy clerk of the division to charge
    one additional fee not to exceed three dollars on the filing of each cause of
    action or appeal under division (A), (Q), or (U) of section 2303.20 of the Revised
    Code;

    (b) If the clerk of the court of common pleas serves as the clerk of the division,
    authorize and direct the clerk of the court of common pleas to charge one additional
    fee not to exceed three dollars on the filing of each cause of action or appeal
    under division (A), (Q), or (U) of section 2303.20 of the Revised Code.

    (2) All moneys collected under division (A)(1) of this section shall be paid to
    the county treasurer. The treasurer shall place the moneys from the fees in a
    separate fund to be disbursed either upon an order of the domestic relations judges,
    subject to an appropriation by the board of county commissioners, or upon an order
    of the domestic relations judge, subject to the court making an annual report
    available to the public listing the use of all such funds, in an amount no greater
    than the actual cost to the division of procuring and maintaining computerization
    of the court, computerized legal research services, or both.

    (3) If the court determines that the funds in the fund described in division (A)(2)
    of this section are more than sufficient to satisfy the purpose for which the
    additional fee described in division (A)(1) of this section was imposed, the court
    may declare a surplus in the fund and, subject to an appropriation by the board
    of county commissioners, expend those surplus funds, or upon an order of the court,
    subject to the court making an annual report available to the public listing the
    use of all such funds, expend those surplus funds, for other appropriate technological
    expenses of the court.

    (B)(1) If the clerk of the court of common pleas is not serving as the clerk of
    a juvenile or domestic relations division created by section 2301.03 of the Revised
    Code, the juvenile or domestic relations judges may determine that, for the efficient
    operation of their division, additional funds are required to computerize the
    office of the clerk of their division and, upon that determination, may authorize
    and direct the clerk or a deputy clerk of their division to charge an additional
    fee, not to exceed ten dollars, on the filing of each cause of action or appeal,
    on the filing, docketing, and endorsing of each certificate of judgment, or on
    the docketing and indexing of each aid in execution or petition to vacate, revive,
    or modify a judgment under divisions (A), (P), (Q), (T), and (U) of section 2303.20
    of the Revised Code. Subject to division (B)(2) of this section, all moneys collected
    under this division shall be paid to the county treasurer to be disbursed, upon
    an order of the juvenile or domestic relations judges and subject to appropriation
    by the board of county commissioners, in an amount no greater than the actual
    cost to the juvenile or domestic relations division of procuring and maintaining
    computer systems for the clerk''s office.

    (2) If juvenile or domestic relations judges make the determination described
    in division (B)(1) of this section, the board of county commissioners may issue
    one or more general obligation bonds for the purpose of procuring and maintaining
    the computer systems for the office of the clerk of the juvenile or domestic relations
    division. In addition to the purposes stated in division (B)(1) of this section
    for which the moneys collected under that division may be expended, the moneys
    additionally may be expended to pay debt charges on and financing costs related
    to any general obligation bonds issued pursuant to this division as they become
    due. General obligation bonds issued pursuant to this division are Chapter 133.
    securities.'
  history: null
