- number: '2305.46'
  heading: False identifying information
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) No person, with purpose to deceive, shall provide, wear, use, or possess
