- number: '2329.18'
  heading: Copy of appraisement to be left with clerk
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) If a court has ordered or the clerk of a court has issued an order for
    the sheriff to advertise and sell the real estate for which the appraised value
    has been determined pursuant to section 2329.17 of the Revised Code, the sheriff
    shall deposit a copy of the appraisal with the clerk of the court from which the
    writ was issued, and immediately advertise and sell such real estate in conformity
    with sections 2329.01 to 2329.61 of the Revised Code.

    (B) If the court has ordered or the clerk of the court has issued an order for
    a private selling officer to advertise and sell the real estate for which the
    appraised value has been determined pursuant to section 2329.17 of the Revised
    Code, the private selling officer shall immediately advertise and sell the real
    estate in conformity with sections 2329.01 to 2329.61 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.18
- number: '2329.19'
  heading: Extent of lien of judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Upon the determination of the appraised value pursuant to section 2329.17
    of the Revised Code, if it appears that two-thirds of the appraised value of the
    lands and tenements levied upon is sufficient to satisfy the execution, with costs,
    the judgment on which the execution issued shall not operate as a lien on the
    residue of the debtor's estate to the prejudice of any other judgment creditor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.19
- number: '2329.191'
  heading: Preliminary judicial report by petitioner
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) As used in this section, "title insurance company" has the same meaning
    as in section 3953.01 of the Revised Code.

    (B) In every action demanding the judicial sale of residential real estate consisting
    of one to four single-family units, the party seeking that judicial sale shall
    file with the clerk of the court of common pleas within fourteen days after filing
    the pleadings requesting relief a preliminary judicial report on a form that is
    approved by the department of insurance that is prepared and issued by a duly
    licensed title insurance agent on behalf of a licensed title insurance company
    or by a title insurance company that is authorized by the department of insurance
    to transact business in this state. The preliminary judicial report shall be effective
    within thirty days prior to the filing of the complaint or other pleading requesting
    a judicial sale and shall include at least all of the following:

    (1) A legal description of each parcel of real estate to be sold at the judicial
    sale;

    (2) The street address of the real estate or, if there is no street address, the
    name of the street or road upon which the real estate fronts together with the
    names of the streets or roads immediately to the north and south or east and west
    of the real estate;

    (3) The county treasurer''s permanent parcel number or other tax identification
    number of the real estate;

    (4) The name of the owners of record of the real estate to be sold;

    (5) A reference to the volume and page or instrument number of the recording by
    which the owners acquired title to the real estate;

    (6) A description of the record title to the real estate; however, easements,
    restrictions, setback lines, declarations, conditions, covenants, reservations,
    and rights-of-way that were filed for record prior to the lien being foreclosed
    are not required to be included;

    (7) The name and address of each lienholder and the name and address of each lienholder''s
    attorney, if any, as shown on the recorded lien of the lienholder.

    Prior to submitting any order or judgment entry to a court that would order the
    sale of the residential real estate, the party submitting the order or judgment
    entry shall file with the clerk of the court of common pleas a final judicial
    report that updates the state of the record title to that real estate from the
    effective date of the preliminary judicial report through the date of lis pendens
    and includes a copy of the court''s docket for the case. The cost of the title
    examination necessary for the preparation of both the preliminary judicial report
    and the final judicial report together with the premiums for those reports computed
    as required by the department of insurance, based on the fair market value of
    the real estate, or in the case of a foreclosure, the principal balance of the
    mortgage or other lien being foreclosed on or any other additional amount as may
    be ordered by the court shall be taxed as costs in the case.

    (C) In every action demanding the judicial sale of residential real estate consisting
    of more than four single-family units or of commercial real estate, the party
    seeking that judicial sale shall file with the clerk of the court of common pleas
    within fourteen days after filing the pleadings requesting relief either a preliminary
    judicial report or a commitment for an owner''s fee policy of title insurance
    on the form approved by the department of insurance that is prepared and issued
    by a duly licensed title insurance agent on behalf of a licensed title insurance
    company. Division (B) of this section applies if the party seeking the judicial
    sale files a preliminary judicial report. If the party seeking the judicial sale
    files a commitment for an owner''s fee policy of title insurance, the commitment
    shall have an effective date within fourteen days prior to the filing of the complaint
    or other pleading requesting a judicial sale and shall contain at least all of
    the information required in divisions (B)(1) to (7) of this section. The commitment
    shall cover each parcel of real estate to be sold, shall include the amount of
    the successful bid at the judicial sale, shall show the purchaser at the judicial
    sale as the proposed insured, and shall not expire until thirty days after the
    recordation of the deed by the officer who makes the sale to that purchaser. After
    the officer''s return of the order of sale and prior to the confirmation of the
    sale, the party requesting the order of sale shall cause an invoice for the cost
    of the title insurance policy, commitment cost related expenses, and cancellation
    fees, if any, to be filed with the clerk of the court of common pleas. The amount
    of the invoice shall be taxed as costs in the case. The purchaser at the judicial
    sale may, by paying the premium for the title insurance policy, obtain the issuance
    of title insurance in accordance with the commitment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.191
- number: '2329.192'
  heading: State lienholder as party defendant in judicial sale; proceeds of sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) As used in this section:

    (1) "State lien" means a lien upon real estate, including lands and tenements,
    of persons indebted to the state for debt, taxes, or in any other manner recorded
    by a state agency in any office of the clerk of a county court or the county recorder.

    (2) "State lienholder" means the department, agency, or other division of the
    state in whose name a state lien has been filed or recorded.

    (B) In every action seeking the judicial sale of real estate that is subject to
    a state lien, all of the following apply:

    (1) The party seeking a judicial sale shall include the state lienholder as a
    party defendant and shall serve that state lienholder with a copy of the preliminary
    judicial report or commitment for an owner''s fee policy of title insurance filed
    in accordance with section 2329.191 of the Revised Code.

    (2) A state lienholder shall not be made a party defendant if no state lien has
    been recorded against the owner of the real estate for which the judicial sale
    is sought.

    (3) The appearance of the state lienholder shall be presumed for purposes of jurisdiction,
    and the court shall take judicial notice that the state has a lien against the
    real estate.

    (4) A state lienholder may, but is not required to, file an answer to the complaint
    or any other pleading in the action if the amount, validity, or priority of the
    state lien is not identified in the pleadings as disputed and shall file an answer
    to the complaint or any other pleading in the action if the amount, validity,
    or priority of the state lien is identified in the pleadings as disputed. If a
    state lien is not identified as disputed, unless the state files an answer or
    other responsive pleading, the party seeking the judicial sale is not required
    to serve the state lienholder with any answer or subsequent pleadings in the action
    for judicial sale.

    (5) As part of any order confirming the sale of the real estate that is subject
    to any undisputed state lien or distributing the proceeds of any judicial sale
    of real estate, the undisputed state lien shall be protected as if the state had
    appeared in the action and filed an answer asserting the validity of the state
    lien as recorded in the office of the clerk of the county court or the office
    of the county recorder.

    (6) Any party asserting a dispute as to the amount, validity, or priority of the
    state lien or of any lien or other interest that has priority over the state lien
    shall serve the state lienholder and the attorney general with notice of the dispute,
    and the state lienholder shall be permitted to file a responsive pleading and
    participate in the proceedings as if the state lienholder had been served with
    a summons on the date the state lienholder received notice of the dispute.

    (C) Upon the judicial sale of the real estate that is the subject of an action
    under division (B) of this section, the interest of any undisputed state lien
    shall transfer to the proceeds of the sale of the real estate, and the state lienholder
    shall be entitled to payment from the proceeds of the sale of the real estate
    in accordance with the state lienholder''s priority as set forth in the final
    judicial report or commitment for an owner''s fee policy of title insurance filed
    in accordance with section 2329.191 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.192
- number: '2329.20'
  heading: Land not to be sold for less than two thirds of appraised value
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Except as otherwise provided in this section or sections 2329.51 and 2329.52
    of the Revised Code, no tract of land shall be sold for less than two-thirds the
    amount of the appraised value as determined pursuant to section 2329.17 of the
    Revised Code. In all cases in which a junior mortgage or other junior lien is
    sought to be enforced against real estate by an order, judgment, or decree of
    court, subject to a prior lien thereon, and such prior lien, and the claims or
    obligations secured thereby, are unaffected by such order, judgment, or decree,
    the court making such order, judgment, or decree, may determine the minimum amount
    for which such real estate may be sold. In such a case, the minimum amount shall
    be not less than two-thirds of the difference between the appraised value of the
    real estate as determined in that section, and the amount remaining unpaid on
    the claims or obligations secured by such prior lien.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.20
- number: '2329.21'
  heading: Purchaser to add enough to pay costs in certain cases
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If the sum bid by the purchaser for the real estate sold under section 2329.20
    of the Revised Code relating to the enforcement of junior liens is insufficient
    to pay the costs, allowances, and taxes, which the court has determined prior
    to such sale should be paid out of the proceeds thereof, pursuant to the terms
    of the mortgage or lien sought to be enforced, then the purchaser, in addition
    to the amount of the purchaser's bid, must pay a sum which, with the amount so
    bid will be sufficient to pay the costs, allowances, and taxes. The court may
    fix the amount remaining unpaid on such claims or obligations for the purpose
    of the sale, and to that end require the parties to the suit to furnish to it
    satisfactory evidence of such unpaid amount. The advertisement for the sale of
    real estate sold under section 2329.20 of the Revised Code shall state that the
    purchaser shall be responsible for those costs, allowances, and taxes that the
    proceeds of the sale are insufficient to cover.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.21
- number: '2329.211'
  heading: Sale deposit
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A)(1) In every action demanding the judicial or execution sale of residential
    property, if the judgment creditor is the purchaser at the sale, the purchaser
    shall not be required to make a sale deposit. All other purchasers shall make
    a sale deposit as follows:

    (a) If the appraised value of the residential property is less than or equal to
    ten thousand dollars, the deposit shall be two thousand dollars.

    (b) If the appraised value of the residential property is greater than ten thousand
    dollars but less than or equal to two hundred thousand dollars, the deposit shall
    be five thousand dollars.

    (c) If the appraised value of the residential property is greater than two hundred
    thousand dollars, the deposit shall be ten thousand dollars.

    (2) The timing of the deposit and other payment requirements shall be established
    by the court or the person conducting the sale and included in the advertisement
    of the sale. If the purchaser fails to meet the timing or other requirements of
    the deposit, the sale shall be invalid and the residential property may be brought
    to sale on the provisional second sale date, if any, described in division (B)
    of section 2329.52 of the Revised Code, and included in the notice required by
    division (A)(1)(a)(i) of section 2329.26 of the Revised Code.

    (3) If the sale is held online, the deposit may be made by a financial transaction
    device as defined in section 301.28 of the Revised Code.

    (B) In every action demanding the judicial or execution sale of commercial property,
    the purchaser at the sale shall make a deposit pursuant to the requirements, if
    any, established for the sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.211
- number: '2329.22'
  heading: Rule as to sale of lands by state
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Sections 2329.19 to 2329.21, inclusive, of the Revised Code do not affect
    the sale of lands by the state. All lands, the property of individuals, indebted
    to the state for debt, taxes, or in any other manner shall be sold without valuation
    for the discharge of such debt or taxes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.22
- number: '2329.23'
  heading: Notices of sale of lands
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: All notices and advertisements for the sale of lands and tenements located
    in a municipal corporation, made by virtue of the proceedings in a court of record,
    in addition to a description of the lands and tenements, shall contain the street
    number of the buildings erected on the lands, or the street number of the lots
    offered for sale. If no such number exists, then the notice or advertisement shall
    contain the name of the street or road upon which the lands and tenements are
    located together with the names of the streets or roads immediately north and
    south or east and west of the lands and tenements that cross or intersect the
    street or road upon which they are located. The notice or advertisement shall,
    if applicable, include the web site address of the officer who makes the sale
    that allows a person to obtain a complete legal description of the lands and tenements.
