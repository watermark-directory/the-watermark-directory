  heading: Itemized bill of costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In all cases, when demanded by a person liable for the payment of any fees
    or costs to an officer, such officer, without charge, shall make, sign, and deliver
    to the person an itemized bill of such fees or costs. No person shall, after such
