  text: Sections 2305.03 to 2305.21, 1302.98, and 1304.35 of the Revised Code, respecting
    lapse of time as a bar to suit, do not apply in the case of an action by a vendee
    of real property, in possession thereof, to obtain a conveyance of the real property.
