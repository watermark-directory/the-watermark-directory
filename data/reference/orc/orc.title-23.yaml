- number: '2317.03'
  heading: Cases in which a party shall not testify
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'A party shall not testify when the adverse party is the guardian or trustee
    of an incompetent person, or of a child of a deceased person, or is an executor
    or administrator, or claims or defends as heir, grantee, assignee, devisee, or
    legatee of a deceased person except:

    (A) As to facts which occurred after the appointment of the guardian or trustee
    of an incompetent person, and, in the other cases, after the time the decedent,
    grantor, assignor, or testator died;

    (B) When the action or proceeding relates to a contract made through an agent
    by a person since deceased, and the agent is competent to testify as a witness,
    a party may testify on the same subject;

    (C) If a party, or one having a direct interest, testifies to transactions or
    conversations with another party, the latter may testify as to the same transactions
    or conversations;

    (D) If a party offers evidence of conversations or admissions of the opposite
    party, the latter may testify concerning the same conversations or admissions;
    and, if evidence of declarations against interest made by an incompetent or deceased
    person has been admitted, then any oral or written declaration made by such incompetent
    or deceased person concerning the same subject to which any such admitted evidence
    relates, and which but for this provision would be excluded as self-serving, shall
    be admitted in evidence if it be proved to the satisfaction of the trial judge
    that the declaration was made at a time when the declarant was competent to testify,
    concerning a subject matter in issue, and, when no apparent motive to misrepresent
    appears;

    (E) In an action or proceeding by or against a partner or joint contractor, the
    adverse party shall not testify to transactions with, or admissions by, a partner
    or joint contractor since deceased, unless they were made in the presence of the
    surviving partner or joint contractor, and this rule applies without regard to
    the character in which the parties sue or are sued;

    (F) If the claim or defense is founded on a book account, a party may testify
    that the book is the party''s account book, that it is a book of original entries,
    that the entries therein were made in the regular course of business by the party
    personally, a person since deceased, or a disinterested person, and the book is
    then competent evidence in any case, without regard to the parties, upon like
    proof by any competent witness;

    (G) If after testifying orally, a party dies, the evidence may be proved by either
    party on a further trial of the case, whereupon the opposite party may testify
    to the same matters;

    (H) If a party dies and the party''s deposition is offered in evidence, the opposite
    party may testify as to all competent matters therein.

    This section does not apply to actions for causing death, or actions or proceedings
    involving the validity of a deed, will or codicil. When a case is plainly within
    the reason and spirit of this section and sections 2317.01 and 2317.02 of the
    Revised Code, though not within the strict letter, their principles shall be applied.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.03
- number: '2317.04'
  heading: Impartial report of proceedings privileged
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: The publication of a fair and impartial report of the proceedings before state
    or municipal legislative bodies, or before state or municipal executive bodies,
    boards, or officers, or the whole or a fair synopsis of any bill, ordinance, report,
    resolution, bulletin, notice, petition, or other document presented, filed, or
    issued in any proceeding before such legislative or executive body, board, or
    officer, shall be privileged, unless it is proved that such publication was made
    maliciously.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.04
- number: '2317.05'
  heading: Impartial report of indictment, warrant, affidavit, or arrest privileged
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: The publication of a fair and impartial report of the return of any indictment,
    the issuing of any warrant, the arrest of any person accused of crime, or the
    filing of any affidavit, pleading, or other document in any criminal or civil
    cause in any court of competent jurisdiction, or of a fair and impartial report
    of the contents thereof, is privileged, unless it is proved that the same was
    published maliciously, or that the defendant has refused or neglected to publish
    in the same manner in which the publication complained of appeared, a reasonable
    written explanation or contradiction thereof by the plaintiff, or that the publisher
    has refused, upon request of the plaintiff, to publish the subsequent determination
    of such suit or action. This section and section 2317.04 of the Revised Code do
    not authorize the publication of blasphemous or indecent matter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.05
- number: '2317.06'
  heading: Proving testimony of absent witness
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: '(A) If a party or witness, after testifying orally, dies, is beyond the jurisdiction
    of the court, cannot be found after diligent search, is unable to testify because
    of any physical or mental infirmity, or has been summoned but appears to have
    been kept away by the adverse party and if the evidence of the party or witness
    has been taken down by an official stenographer, the evidence so taken may be
    read in evidence by either party on the further trial of the case and shall be
    prima-facie evidence of what the deceased party or witness testified to orally
    on the former trial. If the evidence has not been taken by an official stenographer,
    it may be proved by witnesses who were present at the former trial, having knowledge
    of the testimony. All testimony so offered shall be open to all objections that
    might be taken if the witness was personally present.

    (B)(1) If it is necessary in a civil action before the court to procure the testimony
    of a person who is imprisoned in a workhouse, juvenile detention facility, jail,
    or state correctional institution within this state, or who is in the custody
    of the department of youth services, the court shall require that the person''s
    testimony be taken by deposition pursuant to the Civil Rules at the place of the
    person''s confinement, unless the court determines that the interests of justice
    demand that the person be brought before the court for the presentation of the
    person''s testimony.

    (2) If the court determines that the interests of justice demand that a person
    specified in division (B)(1) of this section be brought before the court for the
    presentation of the person''s testimony, the court shall order the person to be
    brought before it under the procedures set forth in division (B) or (C) of section
    2945.47 of the Revised Code.

    (C) When a person''s deposition is taken pursuant to division (B)(1) of this section,
    the person shall remain in the custody of the officer who is in charge of the
    person, and the officer shall provide reasonable facilities for the taking of
    the deposition.

    (D) The person requesting the testimony of the person whose deposition is taken
    pursuant to division (B)(1) of this section shall pay the expense of taking the
    deposition, except that the court may tax the expense as court costs in appropriate
    cases.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.06
- number: '2317.07'
  heading: Examination of party
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: At the instance of the adverse party, a party may be examined as if under
    cross-examination, orally, by way of deposition, like any other witness, by way
    of written interrogatories filed in the action or proceeding, or by any one or
    more of such methods. The party calling for such examination shall not thereby
    be concluded but may rebut it by evidence.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.07
- number: '2317.21'
  heading: Attachment of witness who disobeys subpoena
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: When a witness, except a witness who has demanded and has not been paid his
    traveling fees and fee for one day's attendance when a subpoena is served upon
    him, as authorized by the provisions of section 2317.18 of the Revised Code, fails
    to obey a subpoena personally served, the court or officer, before whom his attendance
    is required, may issue to the sheriff or a constable of the county, a writ of
    attachment, commanding him to arrest and bring the person named in the writ before
    such court or officer at the time and place the writ fixes, to give his testimony
    and answer for the contempt. If such writ does not require the witness to be immediately
    brought, he may give bond for a sum fixed by the court of common pleas or the
    court which issued the subpoena, with surety, for his appearance, which sum shall
    be endorsed on the back of the writ, except that, if no sum is so endorsed, it
    shall be one hundred dollars. When the witness was not personally served, the
    court, by a rule, may order him to show cause why such writ should not issue against
    him.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.21
- number: '2317.22'
  heading: Punishment for contempt
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'Punishment for the acts of contempt specified in section 2317.20 of the Revised
    Code shall be as follows: When the witness fails to attend in obedience to a subpoena,
    the court or officer may fine him not more than fifty dollars; in other cases,
    not more than fifty dollars nor less than five dollars; or the court or officer
    may imprison such witness in the county jail, there to remain until he submits
    to be sworn, testifies, or gives his deposition.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.22
- number: '2317.23'
  heading: Disposition of fines
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: A fine imposed under section 2317.22 of the Revised Code by the court shall
    be paid into the county treasury; that imposed by an officer shall be for the
    use of the party for whom the witness was subpoenaed. The witness also shall be
    liable to the party injured for any damages occasioned by his failure to attend,
    or refusal to be sworn, to testify, or to give his deposition.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.23
- number: '2317.24'
  heading: Release of witness from imprisonment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: A witness imprisoned by an officer under section 2317.22 of the Revised Code
    may apply to a judge of the supreme court, court of appeals, court of common pleas,
    or probate court, who may discharge him if it appears that such imprisonment is
    illegal.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.24
- number: '2317.25'
  heading: Contents of attachment or order to commit
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: Every attachment for the arrest or order to commit a witness to prison by
    a court or officer, pursuant to sections 2317.21 and 2317.22 of the Revised Code,
    must be under seal of the court or official seal of the officer, if he has one,
    and must particularly specify the cause of the arrest or commitment. When committed
    for a refusal to answer a question, the question must be stated in the order.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.25
- number: '2317.26'
  heading: Order of commitment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: The order of commitment mentioned in section 2317.25 of the Revised Code may
    be directed to the sheriff or a constable of the county where the witness resides,
    or is at the time, and shall be executed by committing him to the jail of such
    county, and delivering a copy of it to the jailer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.26
- number: '2317.29'
  heading: May not sue or serve witness out of his county
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: A witness shall not be liable to be sued, in a county in which he does not
    reside, by being served with a summons in such county while going, returning or
    attending in obedience to a subpoena.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.29
- number: '2317.30'
  heading: Oath of witness
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: Before testifying, a witness shall be sworn to testify the truth, the whole
    truth, and nothing but the truth.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.30
- number: '2317.36'
  heading: Admissible reports
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: A written report or finding of facts prepared by an expert who is not a party
    to the cause, nor an employee of a party, except for the purpose of making such
    report or finding, nor financially interested in the result of the controversy,
    and containing the conclusions resulting wholly or partly from written information
    furnished by the co-operation of several persons acting for a common purpose,
    shall, in so far as the same is relevant, be admissible when testified to by the
    person, or one of the persons, making such report or finding without calling as
    witnesses the persons furnishing the information, and without producing the books
    or other writings on which the report or finding is based, if, in the opinion
    of the court, no substantial injustice will be done the opposite party.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.36
- number: '2317.37'
  heading: Cross-examination by adverse party
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: Any person who has furnished information on which a report or finding mentioned
    in section 2317.36 of the Revised Code is based may be cross-examined by the adverse
    party, but the fact that his testimony is not obtainable shall not render the
    report or finding inadmissible, unless the trial court finds that substantial
    injustice would be done to the adverse party by its admission.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.37
- number: '2317.38'
  heading: Notice of intention to offer report
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'The report or finding mentioned in section 2317.36 of the Revised Code is
    not admissible unless the party offering it has given notice to the adverse party
    a reasonable time before trial of his intention to offer it, together with a copy
    of the report or finding, or so much thereof as relates to the controversy, and
    has afforded him a reasonable opportunity to inspect and copy any records or other
    documents in the offering party''s possession or control, on which the report
    or finding was based, and also the names of all persons furnishing facts upon
    which the report or finding was based.

    This section and sections 2317.36 and 2317.37 of the Revised Code shall be so
    interpreted and construed as to effectuate their general purpose to make the law
    of this state uniform with those states which enact similar legislation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.38
- number: '2317.39'
  heading: Report of investigations conducted by court made available to all parties
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'Whenever an investigation into the facts of any case, civil or criminal,
    pending at the time of such investigation in any court, is made, conducted, or
    participated in, directly or indirectly, by any court or any department thereof,
    through public employees, paid private investigators, social workers, friends
    of the court, or any other persons, and a report of such investigation is prepared
    for submission to the court, the contents of such report shall not be considered
    by any judge of the court wherein such case is pending either before the trial
    of the case or at any stage of the proceedings prior to final disposition thereof,
    unless the full contents of such report have been made readily available and accessible
    to all parties to the case or their counsel. The parties or their counsel shall
    be notified in writing of the fact that an investigation has been made, that a
    report has been submitted, and that the contents of the report are available for
    examination. Such notice shall be given at least five days prior to the time the
    contents of any report are to be considered by any judge of the court wherein
    the case is pending. In the event that a report following any investigation is
    prepared for submission orally, such oral report shall be reduced to writing prior
    to the issuance of notice of the availability of such report for examination.

    This section does not apply only to the utilization of the contents of such reports
    as testimony, but shall prevent any judge from familiarizing himself with such
    contents in any manner unless this section has been fully complied with.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.39
- number: '2317.40'
  heading: Records as evidence
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'As used in this section "business" includes every kind of business, profession,
    occupation, calling, or operation of institutions, whether carried on for profit
    or not.

    A record of an act, condition, or event, in so far as relevant, is competent evidence
    if the custodian or the person who made such record or under whose supervision
    such record was made testifies to its identity and the mode of its preparation,
    and if it was made in the regular course of business, at or near the time of the
    act, condition, or event, and if, in the opinion of the court, the sources of
    information, method, and time of preparation were such as to justify its admission.

    This section shall be so interpreted and construed as to effectuate its general
    purpose to make the law of this state uniform with those states which enact similar
    legislation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.40
- number: '2317.41'
  heading: Photographic copies of records admissible as competent evidence
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: '"Photograph" as used in this section includes but is not limited to microphotograph,
    a roll or strip of film, a roll or strip of microfilm, a photostatic copy, or
    an optically-imaged copy.

    To the extent that a record would be competent evidence under section 2317.40
    of the Revised Code, a photograph of such record shall be competent evidence if
    the custodian of the photograph or the person who made such photograph or under
    whose supervision such photograph was made testifies to the identity of and the
    mode of making such photograph, and if, in the opinion of the trial court, the
    record has been destroyed or otherwise disposed of in good faith in the regular
    course of business, and the mode of making such photograph was such as to justify
    its admission. If a photograph is admissible under this section, the court may
    admit the whole or a part thereof.

    Such photograph shall be admissible only if the party offering it has delivered
    a copy of it, or so much thereof as relates to the controversy, to the adverse
    party a reasonable time before trial, unless in the opinion of the court the adverse
    party has not been unfairly surprised by the failure to deliver such copy. No
    such photograph need be submitted to the adverse party as prescribed in this section
    unless the original instrument would be required to be so submitted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.41
- number: '2317.42'
  heading: Reports or certified copies to be admitted
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: Official reports made by officers of this state, or certified copies of the
    same, on a matter within the scope of their duty as defined by statute, shall,
    in so far as relevant, be admitted as evidence of the matters stated therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.42
- number: '2317.421'
  heading: Prima-facie evidence of the reasonableness of medical bills
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: In an action for damages arising from personal injury or wrongful death, a
    written bill or statement, or any relevant portion thereof, itemized by date,
    type of service rendered, and charge, shall, if otherwise admissible, be prima-facie
    evidence of the reasonableness of any charges and fees stated therein for medication
    and prosthetic devices furnished, or medical, dental, hospital, and funeral services
    rendered by the person, firm, or corporation issuing such bill or statement, provided,
    that such bill or statement shall be prima-facie evidence of reasonableness only
    if the party offering it delivers a copy of it, or the relevant portion thereof,
    to the attorney of record for each adverse party not less than five days before
    trial.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.421
- number: '2317.422'
  heading: Authentication of nursing, rest, community alternative home and residential
    care facilities records
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: '(A) Notwithstanding sections 2317.40 and 2317.41 of the Revised Code but
    subject to division (B) of this section, the records, or copies or photographs
    of the records, of a hospital, homes required to be licensed pursuant to section
    3721.01 of the Revised Code, and residential facilities licensed pursuant to section
    5119.34 of the Revised Code that provides accommodations, supervision, and personal
    care services for three to sixteen unrelated adults, in lieu of the testimony
    in open court of their custodian, person who made them, or person under whose
    supervision they were made, may be qualified as authentic evidence if any such
    person endorses thereon the person''s verified certification identifying such
    records, giving the mode and time of their preparation, and stating that they
    were prepared in the usual course of the business of the institution. Such records,
    copies, or photographs may not be qualified by certification as provided in this
    section unless the party intending to offer them delivers a copy of them, or of
    their relevant portions, to the attorney of record for each adverse party not
    less than five days before trial. Nothing in this section shall be construed to
    limit the right of any party to call the custodian, person who made such records,
    or person under whose supervision they were made, as a witness.

    (B) Division (A) of this section does not apply to any certified copy of the results
    of any test given to determine the presence or concentration of alcohol, a drug
    of abuse, a combination of them, a controlled substance, or a metabolite of a
    controlled substance in a patient''s whole blood, blood serum or plasma, breath,
    or urine at any time relevant to a criminal offense that is submitted in a criminal
    action or proceeding in accordance with division (B)(2)(b) or (B)(3)(b) of section
    2317.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.422
- number: '2317.43'
  heading: Medical liability action - admissibility of certain communications
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: '(A) (1) In any civil action brought by an alleged victim of an unanticipated
    outcome of medical care or in any arbitration proceeding related to such a civil
    action, any and all statements, affirmations, gestures, or conduct expressing
    apology, sympathy, commiseration, condolence, compassion, error, fault, or a general
    sense of benevolence that are made by a health care provider, an employee of a
    health care provider, or a representative of a health care provider to the alleged
    victim, a relative of the alleged victim, or a representative of the alleged victim,
    and that relate to the discomfort, pain, suffering, injury, or death of the alleged
    victim as the result of the unanticipated outcome of medical care are inadmissible
    as evidence of an admission of liability or as evidence of an admission against
    interest.

    (2) If any statements, affirmations, gestures, or conduct that are described in
    division (A)(1) of this section or any reference to them are included in the medical
    record pertaining to the victim of an unanticipated outcome of medical care, only
    the portions of the medical record that include those statements, affirmations,
    gestures, or conduct or any reference to them are inadmissible as evidence of
    an admission of liability or as evidence of an admission against interest.

    (B) (1) When made as part of a review conducted in good faith by the health care
    provider, an employee of the health care provider, or a representative of the
    health care provider into the cause of or reasons for an unanticipated outcome
    of medical care, the following communications are inadmissible as evidence in
    any civil action brought by an alleged victim of an unanticipated outcome of medical
    care, in any arbitration proceeding related to such a civil action, or in any
    other civil proceeding, unless the communications are recorded in the medical
    record of the alleged victim, subject to division (A)(2) of this section:

    (a) Any communications made by a health care provider, an employee of a health
    care provider, or a representative of a health care provider to the alleged victim,
    a relative or acquaintance of the alleged victim, or a representative of the alleged
    victim;

    (b) Any communications made by an alleged victim, a relative or acquaintance of
    the alleged victim, or a r epresentative of the alleged victim to the health care
    provider, an employee of a health care provider, or a representative of a health
    care provider.

    (2) Nothing in this section requires a review to be conducted.

    (C) For purposes of this section, unless the context otherwise requires:

    (1) "Health care provider" has the same meaning as in division (B)(5) of section
    2317.02 of the Revised Code.

    (2) "Relative" means a victim''s spouse, parent, grandparent, stepfather, stepmother,
    child, grandchild, brother, sister, half brother, half sister, or spouse''s parents.
    The term includes said relationships that are created as a result of adoption.
    In addition, "relative" includes any person who has a family-type relationship
    with a victim.

    (3) "Representative of an alleged victim " means a legal guardian, attorney, person
    designated to make decisions on behalf of a patient under a medical power of attorney,
    or any person recognized in law or custom as a patient''s agent.

    (4) "Representative of a health care provider" means an attorney, health care
    provider, employee of a health care provider, or other person designated by a
    health care provider or an employee of a health care provider to participate in
    a review conducted by a health care provider or employee of a health care provider.

    (5) "Review" means the policy, procedures, and activities undertaken by or at
    the direction of a health care provider, employee of a health care provider, or
    person designated by a health care provider or employee of a health care provider
    with the purpose of determining the cause of or reasons for an unanticipated outcome,
    and initiated and completed during the first forty-five days following the occurrence
    or discovery of an unanticipated outcome. A review shall be initiated by verbal
    communication to the patient, relative of the patient, or representative of the
    patient by the health care provider, employee of a health care provider, or person
    designated by a health care provider or employee of a health care provider. The
    verbal communication shall be followed by a written document explaining the review
    process. A review may be extended for a longer period if necessary upon written
    notice to the patient, relative of the patient, or representative of the patient.

    (6) "Unanticipated outcome" means the outcome of a medical treatment or procedure
    that differs from an expected result or any outcome that is adverse or not satisfactory
    to the patient.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.43
- number: '2317.44'
  heading: Admissibility of guidelines, regulations, or standards
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: '(A) As used in this section:

    (1) "Health care provider" means any person or entity against whom a medical claim
    may be asserted in a civil action.

    (2) "Medical claim" has the same meaning as in section 2305.113 of the Revised
    Code.

    (B) Any guideline, regulation, or other standard under any provision of the "Patient
    Protection and Affordable Care Act," 124 Stat. 119 (2010), 42 U.S.C. 18001 et
    seq., as amended, Title XVIII of the "Social Security Act," 42 U.S.C. 1395 et
    seq., as amended, and Title XIX of the "Social Security Act," 42 U.S.C. 1396 et
    seq., as amended, shall not be construed to establish the standard of care or
    duty of care owed by a health care provider to a patient in a medical claim and
    is not admissible as evidence for or against any party in any civil action based
    upon the medical claim or in any civil or administrative action involving the
    licensing or licensure status of the health care provider.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.44
- number: '2317.45'
  heading: Admissibility of reimbursement policies or determinations
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: '(A) As used in this section:

    (1) "Health care provider" means any person or entity against whom a medical claim
    may be asserted in a civil action.

    (2) "Insurer" means any public or private entity doing or authorized to do any
    insurance business in this state. "Insurer" includes a self-insuring employer
    and the United States centers for medicare and medicaid services.

    (3) "Medical claim" has the same meaning as in section 2305.113 of the Revised
    Code.

    (4) "Reimbursement determination" means an insurer''s determination of whether
    the insurer will reimburse a health care provider for health care services and
    the amount of that reimbursement.

    (5) "Reimbursement policies" means an insurer''s policies and procedures governing
    its decisions regarding the reimbursement of a health care provider for health
    care services and the method of reimbursement.

    (B) Any insurer''s reimbursement policies or reimbursement determination or regulations
    issued by the United States centers for medicare and medicaid services or the
    Ohio department of medicaid regarding the health care services provided to the
    patient in any civil action based on a medical claim are not admissible as evidence
    for or against any party in the action and may not be used to establish a standard
    of care or breach of that standard of care in the action.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.45
- number: '2317.47'
  heading: Blood tests by court order
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: Whenever it is relevant in a civil or criminal action or proceeding to determine
    the paternity or identity of any person, the trial court on motion shall order
    any party to the action and any person involved in the controversy or proceeding
    to submit to one or more blood-grouping tests, to be made by qualified physicians,
    clinical nurse specialists, or certified nurse practitioners or other qualified
    persons, not to exceed three, to be selected by the court and under such restrictions
    or directions as the court or judge deems proper. In cases where exclusion is
    established, the results of the tests together with the findings of the experts
    of the fact of nonpaternity are receivable in evidence. Such experts shall be
    subject to cross-examination by both parties after the court has caused them to
    disclose their findings to the court or to the court and jury. Whenever the court
    orders such blood-grouping tests to be taken and one of the parties refuses to
    submit to such test, such fact shall be disclosed upon the trial unless good cause
    is shown to the contrary. The court shall determine how and by whom the costs
    of such examination shall be paid.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.47
- number: '2317.48'
  heading: Action for discovery
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: When a person claiming to have a cause of action or a defense to an action
    commenced against him, without the discovery of a fact from the adverse party,
    is unable to file his complaint or answer, he may bring an action for discovery,
    setting forth in his complaint in the action for discovery the necessity and the
    grounds for the action, with any interrogatories relating to the subject matter
    of the discovery that are necessary to procure the discovery sought. Unless a
    motion to dismiss the action is filed under Civil Rule 12, the complaint shall
    be fully and directly answered under oath by the defendant. Upon the final disposition
    of the action, the costs of the action shall be taxed in the manner the court
    deems equitable.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.48
- number: '2317.52'
  heading: Cross-examination of agent or employee
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'When the action or proceeding relates to a transaction or occurrence in which
    it has been shown or it is admitted that the adverse party acted either in whole
    or in part through an agent or employee, such agent or employee of the adverse
    party may be called as a witness and examined as if under cross-examination upon
    any matters at issue between the parties which are shown or admitted to have been
    within the scope of such agent''s or employee''s authority or employment.

    The party calling for such examination shall not thereby be concluded but may
    rebut such agent''s or employee''s testimony by counter testimony.

    The party whose agent or employee is called as a witness by the adverse party
    and whose agent or employee is examined as if under cross-examination shall not
    thereby be concluded but may rebut such agent''s or employee''s testimony by counter
    testimony.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2317.52
- number: '2317.54'
  heading: Informed consent to surgical or medical procedure or course of procedures
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: 'No hospital, home health agency, ambulatory surgical facility, or provider
    of a hospice care program, pediatric respite care program, or pediatric transition
    care program shall be held liable for a physician''s failure to obtain an informed
    consent from the physician''s patient prior to a surgical or medical procedure
    or course of procedures, unless the physician is an employee of the hospital,
    home health agency, ambulatory surgical facility, or provider of a hospice care
    program, pediatric respite care program, or pediatric transition care program.

    Written consent to a surgical or medical procedure or course of procedures shall,
    to the extent that it fulfills all the requirements in divisions (A), (B), and
    (C) of this section, be presumed to be valid and effective, in the absence of
    proof by a preponderance of the evidence that the person who sought such consent
    was not acting in good faith, or that the execution of the consent was induced
    by fraudulent misrepresentation of material facts, or that the person executing
    the consent was not able to communicate effectively in spoken and written English
    or any other language in which the consent is written. Except as herein provided,
    no evidence shall be admissible to impeach, modify, or limit the authorization
    for performance of the procedure or procedures set forth in such written consent.

    (A) The consent sets forth in general terms the nature and purpose of the procedure
    or procedures, and what the procedures are expected to accomplish, together with
    the reasonably known risks, and, except in emergency situations, sets forth the
    names of the physicians who shall perform the intended surgical procedures.

    (B) The person making the consent acknowledges that such disclosure of information
    has been made and that all questions asked about the procedure or procedures have
    been answered in a satisfactory manner.

    (C) The consent is signed by the patient for whom the procedure is to be performed,
    or, if the patient for any reason including, but not limited to, competence, minority,
    or the fact that, at the latest time that the consent is needed, the patient is
    under the influence of alcohol, hallucinogens, or drugs, lacks legal capacity
    to consent, by a person who has legal authority to consent on behalf of such patient
    in such circumstances, including either of the following:

    (1) The parent, whether the parent is an adult or a minor, of the parent''s minor
    child;

    (2) An adult whom the parent of the minor child has given written authorization
    to consent to a surgical or medical procedure or course of procedures for the
    parent''s minor child.

    Any use of a consent form that fulfills the requirements stated in divisions (A),
    (B), and (C) of this section has no effect on the common law rights and liabilities,
    including the right of a physician to obtain the oral or implied consent of a
    patient to a medical procedure, that may exist as between physicians and patients
    on July 28, 1975.

    As used in this section the term "hospital" has the same meaning as in section
    2305.113 of the Revised Code; "ambulatory surgical facility" has the same meaning
    as in section 3702.30 of the Revised Code; "hospice care program," "pediatric
    respite care program," and "pediatric transition care program" have the same meanings
    as in section 3712.01 of the Revised Code, and "home health agency" has the same
    meaning as in section 3740.01 of the Revised Code. The provisions of this division
    apply to hospitals, doctors of medicine, doctors of osteopathic medicine, and
    doctors of podiatric medicine.'
