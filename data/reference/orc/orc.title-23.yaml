- number: '2303.29'
  heading: Appropriations for issuing motor vehicle titles
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: '(A) A clerk of the court of common pleas may, or upon the request of the
    board of county commissioners by the first day of June shall, submit a request
    for an appropriation to the board of county commissioners detailing the costs
    required to administer his responsibilities under Chapter 4505. of the Revised
    Code. If such a request is submitted, the request shall include an itemized schedule
    of personnel and supply costs. In addition, the request shall include a summary
    of the cost of administering Chapter 4505. of the Revised Code during the most
    recent appropriation period; a detailed estimate of new costs that will result
    from new responsibilities pursuant to Substitute House Bill 275 of the 114th general
    assembly or from any subsequent legislation changing fees or poundage established
    under Chapter 4505. of the Revised Code. If such a request is submitted, it shall
    be filed with the clerk of the board of county commissioners not later than the
    first day of November. The board of county commissioners shall consider the request
    of the clerk and the intent of the legislature prior to adopting the appropriation
    resolution pursuant to section 5705.28 of the Revised Code.

    (B) The board of county commissioners shall budget and appropriate funds for the
    operation of the office of the clerk of the court of common pleas in an amount
    sufficient for the prompt discharge of the clerk''s duties under Chapter 4505.
    of the Revised Code.'
