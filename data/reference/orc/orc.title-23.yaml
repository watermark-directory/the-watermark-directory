  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.37
- number: '2335.38'
  heading: Records shall be kept
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: Each clerk of the court of common pleas, probate judge, or sheriff shall keep
    a book, which shall be a record of his office, showing in detail all the moneys
    paid by him into the county treasury, with proper references showing where each
    item may be found on the respective cashbooks and dockets, and giving the names
    of the parties, in alphabetical order, to whom such money belongs. A detailed
    statement of each item shall be furnished the county auditor, and no clerk, probate
    judge, or sheriff, shall receive from his successor in office any fees earned
    by him, which have come into the hands of such successor, until settlements are
    all fully made.
