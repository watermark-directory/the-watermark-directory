- number: '2313.06'
  heading: Annual compilation of jury source list
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) The commissioners of jurors shall compile a new and complete jury source
    list annually in accordance with both of the following:

    (1) ( a) Except as otherwise provided in division (A)(1) (b) of this section,
    on a date ordered by the court of common pleas, the board of elections for each
    county shall compile and file with the commissioners of jurors of the county a
    certified, current list containing the names, addresses, and dates of birth of
    all the electors of the county shown on the registration lists for the most recent
    general election. The board of elections shall remove from the list of all electors
    those electors who have failed to vote at least once during the preceding four
    consecutive years. The voter list so compiled shall be the current voter list.

    (b) The current voter list shall not include any elector who has a confidential
    voter registration record, as described in section 111.44 of the Revised Code.

    (2) ( a) Except as otherwise provided in division (A)(2) (b) of this section,
    on a date ordered by the court of common pleas of any particular county, the registrar
    of motor vehicles shall compile and file with the commissioners of jurors of each
    county a certified, current list containing the names, addresses, dates of birth,
    and citizenship of all residents of the particular county who have been issued,
    on or after January 1, 1984, a commercial driver''s license pursuant to Chapter
    4506. or a driver''s license or identification card pursuant to Chapter 4507.
    of the Revised Code that is valid and current on the date of the compilation of
    the list, who are or will be eighteen years of age or older as of the day of the
    general election of the year in which the list is filed, and who, regardless of
    whether they actually are registered to vote, would be electors if they were registered
    to vote.

    (b) The list compiled under division (A)(2)(a) of this section shall not include
    any person who has provided to the registrar of motor vehicles an address designated
    by the secretary of state to use as the person''s address because the person is
    a program participant in the address confidentiality program described in sections
    111.41 to 111.99 of the Revised Code.

    (B) In compiling the annual jury source list, the commissioners, unless otherwise
    ordered by the court of common pleas, shall include all names from the current
    voter list and may include all names for the certified, current list of all names
    provided to the commissioners from the registrar of motor vehicles; provided that,
    upon merging the lists, any duplication shall be eliminated. The commissioners
    shall exclude from the annual jury source list the names of any jurors permanently
    excused under section 2313.14 of the Revised Code and the names of any jurors
    discharged under section 2313.21 of the Revised Code.

    (C) The annual jury source list so compiled shall be certified by the commissioners
    and filed in their office before the beginning of each jury year. The names shall
    be entered in a suitable book or record, to be known as the "annual jury source
    list," and shall be arranged alphabetically. With each name shall be recorded
    the place of residence, date of birth, and citizenship of the person as nearly
    as they can be ascertained. A duplicate of the list shall be certified by the
    commissioners and filed in the office of the clerk of the court of common pleas.

    (D) ( 1) Except as otherwise provided in division (D) ( 2) of this section, the
    commissioners may, by order of the court, supplement the annual jury source list
    with the names of persons who, after the list has been filed, are discovered to
    be qualified to serve as jurors. The commissioners shall certify any supplemental
    jury source list and file it in their office and in the office of the clerk of
    the court of common pleas. Any supplemental jury source list shall be added to
    the annual jury source list, and the supplemented annual jury source list shall
    be used for the rest of the jury year.

    (2) A supplemental jury source list shall not include any person who appears to
    the commissioners to be a program participant in the address confidentiality program
    described in sections 111.41 to 111.99 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.06
- number: '2313.07'
  heading: Number of jurors drawn
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) The number of jurors to be drawn for the jury year, and each separate
    part of a jury year, or for any special term of a court of record, at which issues
    of facts are triable by jury, shall be fixed by a general order of the court for
    which such jurors are drawn. The order shall be filed in the office of the clerk
    of the court for which the jurors are to be drawn. If the number has not been
    fixed at the time of the drawing, the commissioners of jurors shall fix a number
    they determine necessary for the business of the court for such jury year or such
    part of a jury year.

    (B) At any time during the jury year, the court may order an additional number
    of jurors to be drawn by the commissioners of jurors for the jury year or for
    a part of a jury year at which the order is made or for immediate service in a
    particular case. The order shall specify the number to be drawn.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.07
- number: '2313.08'
  heading: Notice of drawing; collection of forfeiture
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) At least six days before the drawing of jurors under section 2313.09
    of the Revised Code, the commissioners of jurors shall publish notice of the drawing
    in at least one newspaper of general circulation in the county. They shall also
    serve written notice upon the clerk of the court of common pleas and at least
    one judge of the court of common pleas of the county.

    (B) All drawings of jurors shall be public on a day designated by the commissioners
    of jurors. A commissioner or a designated deputy commissioner, a judge of the
    court of common pleas or the judge''s designated representative, and the clerk
    of the court of common pleas or the clerk''s deputy or other designated representative
    shall attend at the office of the commissioners to supervise the jury list selection
    process.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.08
- number: '2313.09'
  heading: Methods for drawing jurors; certification and filing of list
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) To conduct a drawing of jurors, the commissioners of jurors may use any
    manual, electronic, or automated method that provides each person on the annual
    or supplemental jury source list with an equal, random probability of selection.
    The commissioners shall document the method used. The list drawn shall be the
    annual jury list or supplemental annual jury list.

    (B) The commissioners shall certify and file in their office the annual jury list
    or supplemental annual jury list. The commissioners shall enter the names on the
    list alphabetically in a suitable book or record to be known as the annual jury
    list or supplemental annual jury list and record with each name the person''s
    place of residence, date of birth, and citizenship, as nearly as they can be ascertained.
    The commissioners shall certify and file in the office of the clerk of the court
    of common pleas a duplicate of the list.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.09
- number: '2313.10'
  heading: Commissioner may establish electronic juror notification system
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) The commissioners of jurors may send to a juror whose name is drawn a
    printed notice informing the juror that the juror has been drawn for jury duty
    and will be summoned by the sheriff or commissioners of jurors. The notice may
    contain copies of the portions of Chapter 2313. of the Revised Code that the commissioners
    consider advisable.

    (B) The commissioners of jurors may establish an electronic notification system
    to allow a person who has been drawn as a juror to be notified electronically
    that the juror shall attend in person the jury year or part of the jury year specified
    in the notice. The types of electronic notification include, but are not limited
    to, cellular telephone, pager, e-mail, or other forms of telecommunication. If
    the commissioners of jurors establish an electronic notification system, the commissioners
    shall establish a procedure for implementing the system, a procedure for the juror
    to select the method of electronic notification that is applicable to the juror,
    and a procedure for the juror to opt in or opt out of the electronic notification
    system, whichever is applicable.

    (C) If under division (B) of this section the commissioners of jurors establish
    a procedure for the electronic notification of a person who has been drawn as
    a juror, the notice addressed to the juror and served pursuant to division (B)
    of this section shall specify the procedure for electronically notifying the juror.

    (D) The sheriff, commissioners of jurors, or clerk of the court of common pleas
    shall summon each juror to attend in person or electronically the jury year, part
    of a jury year, or specified date within a part of the jury year for which the
    juror was drawn by serving upon the juror at least six days before the commencement
    of the jury year, part of a jury year, or specified date within a part of the
    jury year a summons addressed to the juror stating that the juror has been drawn
    and is required to attend in person the jury year, part of a jury year, or specified
    date within a part of the jury year specified in the notice. The jury commissioners
    or sheriff shall serve the summons by mail or by leaving it at the juror''s residence
    or usual place of business.

    (E) When the sheriff is interested in a cause in any court of record, only the
    jury commissioners shall summon the jurors.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.10
- number: '2313.11'
  heading: Summoning jurors
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) When, by reason of challenge or other cause, enough jurors to make up
    the panel, either of the grand or petit jury, are not present, or if the array
    is set aside, upon order of the court the sheriff or commissioners of jurors shall
    immediately summon as many persons having the qualifications of a juror as, in
    the opinion of the court, are necessary. The summoned jurors shall appear forthwith
    or at such times as the court fixes.

    (B) No person known to be in or about the courthouse shall be summoned without
    the consent of both parties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.11
- number: '2313.12'
  heading: Obligation to serve as juror
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: It is the policy of this state that every qualified citizen has an obligation
    to serve on petit juries when summoned by the courts of this state unless the
    citizen is excused as provided in Chapter 2313. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.12
- number: '2313.13'
  heading: Race or color shall not disqualify a juror
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: No officer or other person charged with a duty in compiling the jury source
    list or the annual jury list or summoning jurors shall exclude or fail to summon
    a citizen as a grand or petit juror on account of race or color, provided such
    citizen possesses all other qualifications required by law for jurors.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.13
- number: '2313.14'
  heading: Juror may be excused
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) Except as provided by section 2313.15 of the Revised Code, the court
    of common pleas or the commissioners of jurors shall not excuse a person who is
    liable to serve as a juror and who is drawn and notified, unless it is shown to
    the satisfaction of the judge or commissioners by either the juror or another
    person acquainted with the facts that one or more of the following applies:

    (1) The interests of the public will be materially injured by the juror''s attendance.

    (2) The juror''s spouse or a near relative of the juror or the juror''s spouse
    has recently died or is dangerously ill.

    (3) The juror is a cloistered member of a religious organization.

    (4) The prospective juror has a mental or physical condition that causes the prospective
    juror to be incapable of performing jury service. The court or commissioners may
    require the prospective juror to provide the court with documentation, from a
    physician licensed to practice medicine or a certified nurse-midwife, clinical
    nurse specialist, or certified nurse practitioner, verifying that a mental or
    physical condition renders the prospective juror unfit for jury service for the
    remainder of the jury year.

    (5) Jury service would otherwise cause undue or extreme physical or financial
    hardship to the prospective juror or a person under the care or supervision of
    the prospective juror. A judge of the court for which the prospective juror was
    called to jury service shall make undue or extreme physical or financial hardship
    determinations. The judge may delegate the authority to make these determinations
    to an appropriate court employee appointed by the court.

    (6) The juror is over seventy-five years of age, and the juror requests to be
    excused.

    (7) The prospective juror is an active member of a recognized Amish sect and requests
    to be excused because of the prospective juror''s sincere belief that as a result
    of that membership the prospective juror cannot pass judgment in a judicial matter.

    (8) The prospective juror is on active duty pursuant to an executive order of
    the president of the United States, an act of the congress of the United States,
    or section 5919.29 or 5923.21 of the Revised Code.

    (B)(1) A prospective juror who requests to be excused from jury service under
    this section shall take all actions necessary to obtain a ruling on that request
    by not later than the date on which the prospective juror is scheduled to appear
    for jury duty.

    (2) A prospective juror who requests to be excused as provided in division (A)(6)
    of this section shall inform the appropriate court employee appointed by the court
    of the prospective juror''s request to be so excused by not later than the date
    on which the prospective juror is scheduled to appear for jury duty. The prospective
    juror shall inform that court employee of the request to be so excused by appearing
    in person before the employee or contacting the employee by telephone, in writing,
    or by electronic mail.

    (C)(1) For purposes of this section, undue or extreme physical or financial hardship
    is limited to circumstances in which any of the following apply:

    (a) The prospective juror would be required to abandon a person under the prospective
    juror''s personal care or supervision due to the impossibility of obtaining an
    appropriate substitute caregiver during the period of participation in the jury
    pool or on the jury.

    (b) The prospective juror would incur costs that would have a substantial adverse
    impact on the payment of the prospective juror''s necessary daily living expenses
    or on those for whom the prospective juror provides the principal means of support.

    (c) The prospective juror would suffer physical hardship that would result in
    illness or disease.

    (d) The prospective juror is a mother who is breast-feeding her baby, and the
    baby is one year of age or younger.

    (2) Undue or extreme physical or financial hardship does not exist solely based
    on the fact that a prospective juror will be required to be absent from the prospective
    juror''s place of employment.

    (D)(1) A prospective juror who asks a judge to grant an excuse based on undue
    or extreme physical or financial hardship shall provide the judge with documentation
    that the judge finds to clearly support the request to be excused. If a prospective
    juror fails to provide satisfactory documentation, the court may deny the request
    to be excused.

    (2) A signed affidavit that a prospective juror described in division (C)(1)(d)
    of this section provides to the judge and states that the prospective juror is
    a mother who is breast-feeding her baby is satisfactory documentation to support
    the prospective juror''s request to be excused based on undue or extreme physical
    or financial hardship.

    (E) An excuse, whether permanent or not, approved pursuant to this section shall
    not extend beyond that jury year. Every approved excuse shall be recorded and
    filed with the commissioners of jurors. A person is excused from jury service
    permanently only when the deciding judge determines that the underlying grounds
    for being excused are of a permanent nature.

    (F) No person shall be exempted or excused from jury service or be granted a postponement
    of jury service by reason of any financial contribution to any public or private
    organization.

    (G) The commissioners shall keep a record of all proceedings before them or in
    their office, of all persons who are granted an excuse or postponement, and of
    the time of and reasons for each excuse.'
