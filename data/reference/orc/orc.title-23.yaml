  url: https://codes.ohio.gov/ohio-revised-code/section-2301.57
- number: '2301.571'
  heading: Inmate responsibility for medical expenses
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) A person who has been convicted of or pleaded guilty to an offense and
    who is confined in a community-based correctional facility or district community-based
    correctional facility is financially responsible for the payment of any medical
    expense or service requested by and provided to that person.

    (B) No person confined in a community-based correctional facility or district
    community-based correctional facility shall be denied any necessary medical care
    because of inability to pay for medical treatment or service.

    (C) Nothing in this section shall cause a community-based correctional facility
    or district community-based correctional facility to be responsible for the payment
    of any medical or other health care expenses incurred in connection with an offender
    who is serving a term in the facility pursuant to section 2929.16 of the Revised
    Code.'
