  url: https://codes.ohio.gov/ohio-revised-code/section-2307.80
- number: '2307.81'
  heading: Dissemination of false information about the safety of Ohio's food supply
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) The general assembly finds that the production of agricultural and aquacultural
    food products constitutes an important and significant portion of the economy
    of this state. Further, the general assembly finds that the dissemination in this
    state of false information about the safety of Ohio''s food supply would be extremely
    detrimental to Ohio''s economy, the welfare of the consuming public, and the producers
    of agricultural and aquacultural food products. Accordingly, it is the intent
    of the general assembly in enacting section 2307.81 of the Revised Code to benefit
    all the citizens of this state and protect the vitality of the agricultural and
    aquacultural economy by providing a cause of action for producers of perishable
    agricultural and aquacultural food products to recover damages for the disparagement
    of such food products.

    (B) As used in this section:

    (1) "Disparagement" means the dissemination to the public in any manner of any
    false information that a perishable agricultural or aquacultural food product
    is not safe for human consumption.

    (2) "False information" means any information that is not based upon reasonable
    and reliable scientific inquiry, facts, or data, and that directly indicates that
    a perishable agricultural or aquacultural product is not safe for human consumption.

    (3) "Perishable agricultural or aquacultural food product" means any food product
    or commodity of agriculture or aquaculture that is grown, raised, produced, distributed,
    or sold within this state in a form that will perish or decay beyond marketability
    within a reasonable period of time.

    (4) "Producer" means a person who grows, raises, produces, distributes, or sells
    a perishable agricultural or aquacultural food product.

    (C) Any producer of perishable agricultural or aquacultural food products that
    suffers damage as a result of another person''s disparagement of any such perishable
    agricultural or aquacultural food product or any association representing producers
    of perishable agricultural or aquacultural food products that have suffered damage
    as a result of another person''s disparagement of any such perishable agricultural
    or aquacultural food product may bring an action for damages and for any other
    relief a court having jurisdiction considers appropriate. If the plaintiff establishes
    that the disseminator knew or should have known that the information was false,
    damages may be awarded, including compensatory and punitive damages, reasonable
    attorney''s fees, and costs of the action.

    (D) In any action maintained under division (C) of this section by an association
    representing producers of perishable agricultural or aquacultural food products,
    the court shall direct written individual notice to the members of the association
    that have suffered damages as a result of another person''s disparagement of any
    such perishable agricultural or aquacultural food product. The notice shall advise
    each member that:

    (1) The court will exclude the member from the action if the member so requests
    by a specified date;

    (2) The judgment, whether favorable or not, will include all members who have
    received the notice and who do not request exclusion;

    (3) Any member who does not request exclusion may enter an appearance through
    the member''s counsel.

    The judgment in an action maintained under division (C) of this section by an
    association representing producers of perishable agricultural or aquacultural
    food products, whether favorable to the association, shall include and specify
    or describe those members to whom the notice provided in division (D) of this
    section was directed, and who did not request exclusion. If the judgment is favorable
    to the association, the court shall require the association to submit a plan for
    the distribution to the association and the members of the association included
    in the judgment of any award of monetary damages under division (C) or (E) of
    this section. The court may accept or modify the plan of the association and shall
    enter a written order for the distribution of any award of monetary damages.

    (E) Notwithstanding any contrary provisions of section 2315.21 of the Revised
    Code, any person who intentionally disparages a perishable agricultural or aquacultural
    food product for the purpose of harming the producers of that product, in addition
    to any award of punitive damages, is liable for damages in an amount up to three
    times the amount of compensatory damages awarded under division (C) of this section.

    (F) Notwithstanding any contrary statute of limitations prescribed by section
    2305.11 of the Revised Code, an action under division (C) of this section shall
    be commenced no later than two years after the last disparagement of the perishable
    agricultural or aquacultural food product occurs.

    (G) The cause of action established in this section is in addition to all other
    causes of action available under common law or under any other section of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.81
- number: '2307.84'
  heading: Silicosis or mixed dust disease claims - definitions
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: 'As used in sections 2307.84 to 2307.90 and 2307.901 of the Revised Code:

    (A) "AMA guides to the evaluation of permanent impairment" means the American
    medical association''s guides to the evaluation of permanent impairment (fifth
    edition 2000) as may be modified by the American medical association.

    (B) "Board-certified internist" means a medical doctor who is currently certified
    by the American board of internal medicine.

    (C) "Board-certified occupational medicine specialist" means a medical doctor
    who is currently certified by the American board of preventive medicine in the
    specialty of occupational medicine.

    (D) "Board-certified oncologist" means a medical doctor who is currently certified
    by the American board of internal medicine in the subspecialty of medical oncology.

    (E) "Board-certified pathologist" means a medical doctor who is currently certified
    by the American board of pathology.

    (F) "Board-certified pulmonary specialist" means a medical doctor who is currently
    certified by the American board of internal medicine in the subspecialty of pulmonary
    medicine.

    (G) "Certified B-reader" means an individual qualified as a "final" or "B-reader"
    as defined in 42 C.F.R. section 37.51(b), as amended.

    (H) "Civil action" means all suits or claims of a civil nature in a state or federal
    court, whether cognizable as cases at law or in equity or admiralty. "Civil action"
    does not include any of the following:

    (1) A civil action relating to any workers'' compensation law;

    (2) A civil action alleging any claim or demand made against a trust established
    pursuant to 11 U.S.C. section 524(g);

    (3) A civil action alleging any claim or demand made against a trust established
    pursuant to a plan of reorganization confirmed under Chapter 11 of the United
    States Bankruptcy Code, 11 U.S.C. Chapter 11.

    (I) "Competent medical authority" means a medical doctor who is providing a diagnosis
    for purposes of constituting prima-facie evidence of an exposed person''s physical
    impairment that meets the requirements specified in section 2307.85 or 2307.86
    of the Revised Code, whichever is applicable, and who meets the following requirements:

    (1) The medical doctor is a board-certified internist, pulmonary specialist, oncologist,
    pathologist, or occupational medicine specialist.

    (2) The medical doctor is actually treating or has treated the exposed person
    and has or had a doctor-patient relationship with the person.

    (3) As the basis for the diagnosis, the medical doctor has not relied, in whole
    or in part, on any of the following:

    (a) The reports or opinions of any doctor, clinic, laboratory, or testing company
    that performed an examination, test, or screening of the claimant''s medical condition
    in violation of any law, regulation, licensing requirement, or medical code of
    practice of the state in which that examination, test, or screening was conducted;

    (b) The reports or opinions of any doctor, clinic, laboratory, or testing company
    that performed an examination, test, or screening of the claimant''s medical condition
    that was conducted without clearly establishing a doctor-patient relationship
    with the claimant or medical personnel involved in the examination, test, or screening
    process;

    (c) The reports or opinions of any doctor, clinic, laboratory, or testing company
    that performed an examination, test, or screening of the claimant''s medical condition
    that required the claimant to agree to retain the legal services of the law firm
    sponsoring the examination, test, or screening.

    (4) The medical doctor spends not more than twenty-five per cent of the medical
    doctor''s professional practice time in providing consulting or expert services
    in connection with actual or potential tort actions, and the medical doctor''s
    medical group, professional corporation, clinic, or other affiliated group earns
    not more than twenty per cent of its revenues from providing those services.

    (J) "Exposed person" means either of the following, whichever is applicable:

    (1) A person whose exposure to silica is the basis for a silicosis claim under
    section 2307.85 of the Revised Code;

    (2) A person whose exposure to mixed dust is the basis for a mixed dust disease
    claim under section 2307.86 of the Revised Code.

    (K) "ILO scale" means the system for the classification of chest x-rays set forth
    in the international labour office''s guidelines for the use of ILO international
    classification of radiographs of pneumoconioses (2000), as amended.

    (L) "Lung cancer" means a malignant tumor in which the primary site of origin
    of the cancer is inside the lungs.

    (M) "Mixed dust" means a mixture of dusts composed of silica and one or more other
    fibrogenic dusts capable of inducing pulmonary fibrosis if inhaled in sufficient
    quantity.

    (N) "Mixed dust disease claim" means any claim for damages, losses, indemnification,
    contribution, or other relief arising out of, based on, or in any way related
    to inhalation of, exposure to, or contact with mixed dust. "Mixed dust disease
    claim" includes a claim made by or on behalf of any person who has been exposed
    to mixed dust, or any representative, spouse, parent, child, or other relative
    of that person, for injury, including mental or emotional injury, death, or loss
    to person, risk of disease or other injury, costs of medical monitoring or surveillance,
    or any other effects on the person''s health that are caused by the person''s
    exposure to mixed dust.

    (O) "Mixed dust pneumoconiosis" means the interstitial lung disease caused by
    the pulmonary response to inhaled mixed dusts.

    (P) "Nonmalignant condition" means a condition, other than a diagnosed cancer,
    that is caused or may be caused by either of the following, whichever is applicable:

    (1) Silica, as provided in section 2307.85 of the Revised Code;

    (2) Mixed dust, as provided in section 2307.86 of the Revised Code.

    (Q) "Pathological evidence of mixed dust pneumoconiosis" means a statement by
    a board-certified pathologist that more than one representative section of lung
    tissue uninvolved with any other disease process demonstrates a pattern of peribronchiolar
    and parenchymal stellate (star-shaped) nodular scarring and that there is no other
    more likely explanation for the presence of the fibrosis.

    (R) "Pathological evidence of silicosis" means a statement by a board-certified
    pathologist that more than one representative section of lung tissue uninvolved
    with any other disease process demonstrates a pattern of round silica nodules
    and birefringent crystals or other demonstration of crystal structures consistent
    with silica (well-organized concentric whorls of collagen surrounded by inflammatory
    cells) in the lung parenchyma and that there is no other more likely explanation
    for the presence of the fibrosis.

    (S) "Physical impairment" means any of the following, whichever is applicable:

    (1) A nonmalignant condition that meets the minimum requirements of division (B)
    of section 2307.85 of the Revised Code or lung cancer of an exposed person who
    is a smoker that meets the minimum requirements of division (C) of section 2307.85
    of the Revised Code;

    (2) A nonmalignant condition that meets the minimum requirements of division (B)
    of section 2307.86 of the Revised Code or lung cancer of an exposed person who
    is a smoker that meets the minimum requirements of division (C) of section 2307.86
    of the Revised Code.

    (T) "Premises owner" means a person who owns, in whole or in part, leases, rents,
    maintains, or controls privately owned lands, ways, or waters, or any buildings
    and structures on those lands, ways, or waters, and all privately owned and state-owned
    lands, ways, or waters leased to a private person, firm, or organization, including
    any buildings and structures on those lands, ways, or waters.

    (U) "Radiological evidence of mixed dust pneumoconiosis" means a chest x-ray showing
    bilateral rounded or irregular opacities in the upper lung fields graded by a
    certified B-reader as at least 1/1 on the ILO scale.

    (V) "Radiological evidence of silicosis" means a chest x-ray showing bilateral
    small rounded opacities (p, q, or r) in the upper lung fields graded by a certified
    B-reader as at least 1/1 on the ILO scale.

    (W) "Regular basis" means on a frequent or recurring basis.

    (X) "Silica" means a respirable crystalline form of silicon dioxide, including,
    but not limited to, alpha quartz, cristobalite, and trydmite.

    (Y) "Silicosis claim" means any claim for damages, losses, indemnification, contribution,
    or other relief arising out of, based on, or in any way related to inhalation
    of, exposure to, or contact with silica. "Silicosis claim" includes a claim made
    by or on behalf of any person who has been exposed to silica, or any representative,
    spouse, parent, child, or other relative of that person, for injury, including
    mental or emotional injury, death, or loss to person, risk of disease or other
    injury, costs of medical monitoring or surveillance, or any other effects on the
    person''s health that are caused by the person''s exposure to silica.

    (Z) "Silicosis" means an interstitial lung disease caused by the pulmonary response
    to inhaled silica.

    (AA) "Smoker" means a person who has smoked the equivalent of one-pack year, as
    specified in the written report of a competent medical authority pursuant to section
    2307.85 or 2307.86 and section 2307.87 of the Revised Code, during the last fifteen
    years.

    (BB) "Substantial contributing factor" means both of the following:

    (1) Exposure to silica or mixed dust is the predominate cause of the physical
    impairment alleged in the silicosis claim or mixed dust disease claim, whichever
    is applicable.

    (2) A competent medical authority has determined with a reasonable degree of medical
    certainty that without the silica or mixed dust exposures the physical impairment
    of the exposed person would not have occurred.

    (CC) "Substantial occupational exposure to silica" means employment for a cumulative
    period of at least five years in an industry and an occupation in which, for a
    substantial portion of a normal work year for that occupation, the exposed person
    did any of the following:

    (1) Handled silica;

    (2) Fabricated silica-containing products so that the person was exposed to silica
    in the fabrication process;

    (3) Altered, repaired, or otherwise worked with a silica-containing product in
    a manner that exposed the person on a regular basis to silica;

    (4) Worked in close proximity to other workers engaged in any of the activities
    described in division (CC)(1), (2), or (3) of this section in a manner that exposed
    the person on a regular basis to silica.

    (DD) "Substantial occupational exposure to mixed dust" means employment for a
    cumulative period of at least five years in an industry and an occupation in which,
    for a substantial portion of a normal work year for that occupation, the exposed
    person did any of the following:

    (1) Handled mixed dust;

    (2) Fabricated mixed dust-containing products so that the person was exposed to
    mixed dust in the fabrication process;

    (3) Altered, repaired, or otherwise worked with a mixed dust-containing product
    in a manner that exposed the person on a regular basis to mixed dust;

    (4) Worked in close proximity to other workers engaged in any of the activities
    described in division (DD)(1), (2), or (3) of this section in a manner that exposed
    the person on a regular basis to mixed dust.

    (EE) "Tort action" means a civil action for damages for injury, death, or loss
    to person. "Tort action" includes a product liability claim that is subject to
    sections 2307.71 to 2307.80 of the Revised Code. "Tort action" does not include
    a civil action for damages for a breach of contract or another agreement between
    persons.

    (FF) "Veterans'' benefit program" means any program for benefits in connection
    with military service administered by the veterans'' administration under title
    38 of the United States Code.

    (GG) "Workers'' compensation law" means Chapters 4121., 4123., 4127., and 4131.
    of the Revised Code.'
