- number: '2329.10'
  heading: Preference between writs of execution
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When two or more writs of execution against the same debtor are delivered
    to the officer to whom they are directed on the same day, no preference shall
    be given to either of such writs. If a sufficient sum of money is not made to
    satisfy all such executions, the amount made shall be distributed to the several
    creditors in proportion to the amounts of their respective demands. In all other
    cases the writ of execution first delivered to the officer shall be the first
    satisfied. The officer shall indorse on every writ of execution the time when
    he received it. This section does not affect any preferable lien which a judgment
    on which execution issued has on the lands of the debtor.
  history: null
