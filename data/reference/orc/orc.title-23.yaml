  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2303.23
- number: '2303.26'
  heading: Duties of clerk
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: 'The clerk of the court of common pleas shall exercise the powers conferred
    and perform the duties enjoined upon the clerk by statute and by the common law;
    and in the performance of official duties the clerk shall be under the direction
    of the court. The clerk shall not restrict, prohibit, or otherwise modify the
    rights of parties to seek service on party defendants allowed by the Rules of
    Civil Procedure, either singularly or concurrently.

    In furtherance of the performance of the duties enjoined upon the clerk by statute,
    common law, and the Rules of Superintendence for the Courts of Ohio, the clerk
    of the court of common pleas shall be responsible for determining the best means
    and methods for storing, maintaining, and retrieving all papers delivered to the
    clerk, whether delivered in writing or in electronic form, in compliance with
    Rule 26 of the Rules of Superintendence for the Courts of Ohio. Once determined
    by the clerk of court of common pleas, the clerk shall be responsible for implementing
    the means and methods for storage, maintenance, and retrieval.'
