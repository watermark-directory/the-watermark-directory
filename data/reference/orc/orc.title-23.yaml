- number: '2329.071'
  heading: Property unsold twelve months after decree
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) If a decree of foreclosure has been entered with respect to residential
    real property but the property has not been sold or a sale of the property is
    not underway, then, beginning twelve months after the entry of the decree of foreclosure,
    either of the following may occur:

    (1) The local political subdivision may request, by motion or resolution, or by
    other means, that the county prosecuting attorney file a motion with the court
    for the sale of the property.

    (2) Upon receiving such a request, or upon the prosecuting attorney''s own motion,
    the prosecuting attorney of the county in which the action was filed may file
    a motion with the court for authorization to sell the property in the same manner
    as if the prosecuting attorney were the attorney for the party in whose favor
    the decree of foreclosure and order of sale was entered.

    (B)(1) The prosecuting attorney, pursuant to division (A) of this section, shall
    serve a copy of the motion on all parties who entered an appearance in the foreclosure
    action in accordance with the Rules of Civil Procedure.

    (2) The court shall decide the motion described in division (A) of this section
    not sooner than thirty days after the date of the filing of the motion. Unless
    the court finds good cause as to why the property should not be sold, the court
    shall grant the motion and order the prosecuting attorney to issue a praecipe
    for order of sale and sell the property at the next available public auction with
    the minimum bid set pursuant to division (B)(3) of this section and in accordance
    with the terms of the order of sale and applicable provisions of the Revised Code.

    (3) The minimum bid for the sale under division (B)(2) of this section shall be
    equal to the total amount of the unpaid taxes and court costs. If that amount
    is greater than the appraised value of the property, the court shall determine
    the minimum bid, which shall not exceed the appraised value of the property. If
    the property is sold for less than the unpaid taxes and court costs, then the
    court shall order the county auditor to discharge all unpaid taxes and court costs.

    (C) The judgment creditor in the foreclosure action has the right to redeem the
    property within fourteen days after the sale by paying the purchase price. The
    judgment creditor shall pay the purchase price to the clerk of the court in which
    the judgment was rendered or the order of sale was made. Upon timely payment,
    the court shall proceed as described in section 2329.31 of the Revised Code, with
    the judgment creditor considered the successful purchaser at sale.'
