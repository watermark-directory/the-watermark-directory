- number: '2301.13'
  heading: Use of psychiatrists by municipal courts
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: In counties in which one or more psychiatrists, psychologists, or other examiners
    or investigators have been appointed pursuant to section 2301.12 of the Revised
    Code, the judges of the court of common pleas may enter into an agreement with
    the judges of any municipal court located in such county for the participation
    by such municipal judges in the services made available by the employment of such
    psychiatrists, psychologists, or other examiners or investigators upon such terms
    as are mutually agreed upon.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.13
- number: '2301.14'
  heading: Taxing costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: The clerk of the court of common pleas in which the service of a court interpreter
    is rendered shall tax in the cost bill in such case, to be collected as other
    costs, the sum of three dollars for each day of service of such interpreter, which
    fees shall be paid into the county treasury to the credit of the county fund.
    If the party taxed with costs is indigent, the clerk shall not tax the interpreter's
    fees as costs, and the county shall pay the interpreter's fees.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.14
- number: '2301.141'
  heading: Documentation of criminal convictions and guilty pleas to be retained in
    admissible form
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: Notwithstanding section 149.38 of the Revised Code, each clerk of a court
    of common pleas shall retain documentation regarding each criminal conviction
    and plea of guilty involving a case that is or was before the court. The documentation
    shall be in a form that is admissible as evidence in a criminal proceeding as
    evidence of a prior conviction or that is readily convertible to or producible
    in a form that is admissible as evidence in a criminal proceeding as evidence
    of a prior conviction and may be retained in any form authorized by section 9.01
    of the Revised Code. The clerk shall retain this documentation for a period of
    fifty years after the entry of judgment in the case, except that documentation
    regarding cases solely concerned with minor misdemeanor offenses or minor misdemeanor
    traffic offenses shall be retained as provided in divisions (A) and (B) of section
    1901.41 of the Revised Code, and documentation regarding other misdemeanor traffic
    offenses shall be retained for a period of twenty-five years after the entry of
    judgment in the case. This section shall apply to records currently retained and
    to records created on or after September 23, 2004.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.141
- number: '2301.15'
  heading: Duties of criminal bailiff - costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: The criminal bailiff shall act for the sheriff in criminal cases and matters
    of a criminal nature in the court of common pleas and the probate court of the
    county. Under the direction of the sheriff, he shall be present during trials
    of criminal cases in those courts and during such trials perform all the duties
    as are performed by the sheriff. The criminal bailiff shall conduct prisoners
    to and from the jail of the county and for that purpose shall have access to the
    jail and to the courtroom, whenever ordered by such courts, and have care and
    charge of such prisoners when so doing. Under the direction of the sheriff, the
    criminal bailiff shall convey to state correctional institutions all persons sentenced
    thereto. He shall receive and collect from the treasurer of state all costs in
    such criminal cases in the same manner as the sheriff is required to do, and pay
    the amount so collected to the sheriff of such county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.15
- number: '2301.16'
  heading: Bailiff shall give bond
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: Before entering upon the discharge of his duties, the criminal bailiff shall
    give a bond to the sheriff in the sum of five thousand dollars, with good and
    sufficient sureties, conditioned for the faithful discharge of his duties. The
    judges of the court of common pleas shall fix a compensation for his services,
    payable monthly from the fee fund, upon the warrant of the county auditor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.16
- number: '2301.17'
  heading: Additional temporary bailiff
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: On the application of the sheriff, in a criminal case, if the court of common
    pleas is satisfied that the administration of justice requires an additional criminal
    bailiff to execute process, it may appoint such additional bailiff, whose powers
    and duties shall cease when such case is determined.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.17
- number: '2301.18'
  heading: Appointment of official and assistant reporters - term - oath
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: The court of common pleas shall appoint a reporter as the official reporter
    of the court for a term not exceeding three years, unless removed by the court
    after good cause shown for neglect of duty, misconduct in office, or incompetency.
    The court may appoint assistant reporters as the business of the court requires
    for terms not exceeding three years under one appointment. The official reporter
    and assistant reporters shall take an oath faithfully and impartially to discharge
    the duties of their positions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.18
- number: '2301.20'
  heading: Recording of actions; preservation of records
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: 'All civil and criminal actions in the court of common pleas shall be recorded.
    The reporter shall take accurate notes of or electronically record the oral testimony.
    The notes and electronic records shall be filed in the office of the official
    reporter and carefully preserved for either of the following periods of time:

    (A) If the action is not a capital case, the notes and electronic records shall
    be preserved for the period of time specified by the court of common pleas, which
    period of time shall not be longer than the period of time that the other records
    of the particular action are required to be kept.

    (B) If the action is a capital case, the notes and electronic records shall be
    preserved for the longer of ten years or until the final disposition of the action
    and exhaustion of all appeals.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.20
- number: '2301.21'
  heading: Fees for reporters
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: In every case recorded as provided in section 2301.20 of the Revised Code,
    there shall be taxed for each day's service of the official or assistant reporters
    a fee of twenty-five dollars, to be collected as other costs in the case. The
    fees so collected shall be paid quarterly by the clerk of the court of common
    pleas in which the cases were tried into the treasury of the county and shall
    be credited by the county treasurer to the general fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.21
- number: '2301.22'
  heading: Reporters - compensation
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: 'Each reporter shall receive the compensation that the court of common pleas
    making the appointment fixes. That compensation shall be in place of all per diem
    compensation in those courts. In case the appointment is for a term of less than
    one year, the court may allow a per diem compensation to be fixed by the court,
    plus actual and necessary expenses incurred, for each day the reporter is actually
    engaged in taking testimony or performing other duties under the orders of the
    court, which allowance shall be in full payment for all services so rendered.

    The county auditor shall issue warrants on the county treasurer for the payment
    of the compensation under this section in equal monthly installments if the compensation
    is allowed annually, and in case of services per diem, for the amount of the bill
    approved by the court, from the general fund upon the presentation of a certified
    copy of the journal entry of appointment and compensation of the reporters.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.22
- number: '2301.23'
  heading: Furnishing of transcripts or electronic reporting of testimony as requested
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: 'When notes have been taken or an electronic recording has been made in a
    case as provided in section 2301.20 of the Revised Code, if the court or either
    party to the suit requests written transcripts of any portion of the proceeding,
    the reporter reporting the case shall make full and accurate transcripts of the
    notes or electronic recording. The court may direct the official reporter to furnish
    to the court and the parties copies of decisions rendered and charges delivered
    by the court in pending cases.

    When the compensation for transcripts, copies of decisions, or charges is taxed
    as a part of the costs, the transcripts, copies of decisions, and charges shall
    remain on file with the papers of the case.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.23
- number: '2301.24'
  heading: Compensation for making transcripts and copies
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: The compensation of reporters for making written transcripts as provided in
    section 2301.23 of the Revised Code shall be fixed by the court of common pleas
    of the county in which the trial is held. If more than one transcript of the same
    testimony or proceeding is ordered, the reporter shall make copies of the transcript
    at cost pursuant to division (B)(1) of section 149.43 of the Revised Code or shall
    provide an electronic copy of the transcript free of charge. The compensation
    shall be paid by the party for whose benefit a transcript is made. The compensation
    for transcripts requested by the prosecuting attorney or an indigent defendant
    in criminal cases or by the trial judge in either civil or criminal cases, and
    for copies of decisions and charges furnished by direction of the court shall
    be paid from the county treasury and taxed and collected as costs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.24
- number: '2301.25'
  heading: Costs of transcripts
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: When ordered by the prosecuting attorney or the defendant in a criminal case
    or when ordered by a judge of the court of common pleas in either civil or criminal
    cases, the costs of transcripts shall be taxed as costs in the case, collected
    as other costs, whether the transcripts have been prepaid or not, as provided
    by section 2301.24 of the Revised Code, paid by the clerk of the court of common
    pleas quarterly into the county treasury, and credited to the general fund. If,
    upon final judgment, the costs or any part of the costs are adjudged against a
    defendant in a criminal case, the defendant shall be allowed credit on the cost
    bill of the amount paid for the transcript the defendant ordered and, if the costs
    are finally adjudged against the state, the defendant shall have the defendant's
    deposit refunded. All transcripts shall be taken and received as prima-facie evidence
    of their correctness. If the testimony of witnesses is taken before the grand
    jury by reporters, they shall receive for the transcripts the same compensation
    and be paid in the same manner as provided in this section and section 2301.24
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.25
- number: '2301.26'
  heading: Reporters as referees
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: Reporters appointed under section 2301.18 of the Revised Code may be appointed
    referees to take and report evidence in causes pending in any of the courts of
    this state. In the taking of evidence as referees, the reporters may administer
    oaths to witnesses. They shall be furnished by the board of county commissioners
    with a suitable room in the courthouse, and with supplies and equipment necessary
    for the proper discharge of their duties and for the preservation of their notes
    and electronic records. The notes and electronic records shall be the property
    of the county and carefully preserved in the office of the reporters.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.26
- number: '2301.27'
  heading: Probation and supervisory services
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A)(1)(a) The court of common pleas may establish a county department of
    probation. The establishment of the department shall be entered upon the journal
    of the court, and the clerk of the court of common pleas shall certify a copy
    of the journal entry establishing the department to each elective officer and
    board of the county. The department shall consist of a chief probation officer
    and the number of other probation officers and employees, clerks, and stenographers
    that is fixed from time to time by the court. The court shall appoint those individuals,
    fix their salaries, and supervise their work.

    (b) When appointing a chief probation officer, the court shall do all of the following:

    (i) Publicly advertise the position on the court''s web site, including, but not
    limited to, the job description, qualifications for the position, and the application
    requirements;

    (ii) Conduct a competitive hiring process that adheres to state and federal equal
    employment opportunity laws;

    (iii) Review applicants who meet the posted qualifications and comply with the
    application requirements.

    (c) The court shall not appoint as a probation officer any person who does not
    possess the training, experience, and other qualifications prescribed by the adult
    parole authority created by section 5149.02 of the Revised Code or the department
    of youth services, as applicable. Probation officers have all the powers of regular
    police officers and shall perform any duties that are designated by the judge
    or judges of the court. All positions within the department of probation, except
    positions held by probation officers in the juvenile division of a court of common
    pleas, shall be in the classified service of the civil service of the county.

    (2) If two or more counties desire to jointly establish a probation department
    for those counties, the judges of the courts of common pleas of those counties
    may establish a probation department for those counties. If a probation department
    is established pursuant to division (A)(2) of this section to serve more than
    one county, the judges of the courts of common pleas that established the department
    shall designate the county treasurer of one of the counties served by the department
    as the treasurer to whom probation fees paid under section 2951.021 of the Revised
    Code are to be appropriated and transferred under division (A)(2) of section 321.44
    of the Revised Code for deposit into the multicounty probation services fund established
    under division (B) of section 321.44 of the Revised Code.

    The cost of the administration and operation of a probation department established
    for two or more counties shall be prorated to the respective counties on the basis
    of population.

    (3) Probation officers shall receive, in addition to their respective salaries,
    their necessary and reasonable travel and other expenses incurred in the performance
    of their duties. Their salaries and expenses shall be paid monthly from the county
    treasury in the manner provided for the payment of the compensation of other appointees
    of the court.

    (4) Adult probation officers shall be trained in accordance with a set of minimum
    standards that are established by the adult parole authority of the department
    of rehabilitation and correction. Probation officers in the juvenile division
    of a court of common pleas shall be trained in accordance with a set of minimum
    standards that are established by the department of youth services.

    (B)(1)(a) In lieu of establishing a county department of probation under division
    (A) of this section and in lieu of entering into an agreement with the adult parole
    authority as described in division (B) of section 2301.32 of the Revised Code,
    the court of common pleas may request the board of county commissioners to contract
    with, and upon that request the board may contract with, any nonprofit, public
    or private agency, association, or organization for the provision of probation
    services and supervisory services for persons placed under community control sanctions.
    The contract shall specify that each individual providing the probation services
    and supervisory services shall possess the training, experience, and other qualifications
    prescribed by the adult parole authority or the department of youth services,
    as applicable. The individuals who provide the probation services and supervisory
    services shall not be included in the classified or unclassified civil service
    of the county.

    (b) A court of common pleas that has established a county probation department
    or has entered into an agreement with the adult parole authority as described
    in division (A) or (B) of section 2301.32 of the Revised Code may request the
    board of county commissioners to contract with, and upon that request the board
    may contract with, any nonprofit, public or private agency, association, or organization
    for the provision of probation services and supervisory services, including the
    preparation of presentence investigation reports to supplement the probation services
    and supervisory services provided by the county probation department or adult
    parole authority, as applicable. The contract shall specify that each individual
    providing the probation services and supervisory services shall possess the training,
    experience, and other qualifications prescribed by the adult parole authority.
    The individuals who provide the probation services and supervisory services shall
    not be included in the classified or unclassified civil service of the county.
    A nonprofit, public or private agency, association, or organization providing
    probation services or supervisory services under this division is hereby designated
    a criminal justice agency in the provision of those services, and as such is authorized
    by this state to apply for access to the computerized databases administered by
    the national crime information center or the law enforcement automated data system
    in Ohio and to other computerized databases administered for the purpose of making
    criminal justice information accessible to state criminal justice agencies.

    (2)(a) In lieu of establishing a county department of probation under division
    (A) of this section and in lieu of entering into an agreement with the adult parole
    authority as described in division (B) of section 2301.32 of the Revised Code,
    the courts of common pleas of two or more adjoining counties jointly may request
    the boards of county commissioners of those counties to contract with, and upon
    that request the boards of county commissioners of two or more adjoining counties
    jointly may contract with, any nonprofit, public or private agency, association,
    or organization for the provision of probation services and supervisory services
    for persons placed under community control sanctions for those counties. The contract
    shall specify that each individual providing the probation services and supervisory
    services shall possess the training, experience, and other qualifications prescribed
    by the adult parole authority or the department of youth services, as applicable.
    The individuals who provide the probation services and supervisory services shall
    not be included in the classified or unclassified civil service of any of those
    counties.

    (b) The courts of common pleas of two or more adjoining counties that have jointly
    established a probation department for those counties or have entered into an
    agreement with the adult parole authority as described in division (A) or (B)
    of section 2301.32 of the Revised Code may jointly request the board of county
    commissioners of each county to contract with, and upon that request the board
    may contract with, any nonprofit, public or private agency, association, or organization
    for the provision of probation services and supervisory services, including the
    preparation of presentence investigation reports to supplement the probation services
    and supervisory services provided by the probation department or adult parole
    authority, as applicable. The contract shall specify that each individual providing
    the probation services and supervisory services shall possess the training, experience,
    and other qualifications prescribed by the adult parole authority. The individuals
    who provide the probation services and supervisory services shall not be included
    in the classified or unclassified civil service of the county. A nonprofit, public
    or private agency, association, or organization providing probation services or
    supervisory services under this division is hereby designated a criminal justice
    agency in the provision of those services, and as such is authorized by this state
    to apply for access to the computerized databases administered by the national
    crime information center or the law enforcement automated data system in Ohio
    and to other computerized databases administered for the purpose of making criminal
    justice information accessible to state criminal justice agencies.

    (C) The chief probation officer may grant permission to a probation officer to
    carry firearms when required in the discharge of official duties if the probation
    officer has successfully completed a basic firearm training program that is approved
    by the executive director of the Ohio peace officer training commission. A probation
    officer who has been granted permission to carry a firearm in the discharge of
    official duties, annually shall successfully complete a firearms requalification
    program in accordance with section 109.801 of the Revised Code.

    (D) As used in this section and sections 2301.28 to 2301.32 of the Revised Code,
    "community control sanction" has the same meaning as in section 2929.01 of the
    Revised Code.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
