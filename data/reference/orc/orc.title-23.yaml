  url: https://codes.ohio.gov/ohio-revised-code/section-2329.84
- number: '2329.85'
  heading: Trial of right to goods and chattels
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If at the hearing under section 2329.84 of the Revised Code the judge of the
    court of common pleas, municipal court, or county court finds that the right to
    the goods and chattels, in whole or part, is in the claimant, the judge also shall
    find the value of the goods and chattels. The judge shall render judgment on such
    finding for the claimant that the claimant recover the claimant's costs against
    the plaintiff in execution or other party for whose benefit the writ of execution
    is issued, and also have restitution of the goods and chattels, or any part of
    them, according to the finding of the judge. If the judge finds that no right
    to any part of the goods and chattels is in the claimant, the judge shall render
    judgment on such finding in favor of the plaintiff in execution or other party
    for whose benefit the writ of execution is issued, and against the claimant, for
    costs, and award execution on the judgment. Unless a bond is executed as provided
    in section 2329.86 of the Revised Code, a judgment for the claimant shall be a
    justification of the officer in returning "no goods" to the writ by virtue of
    which the levy was made, as to the part of the goods and chattels that were found
    to belong to the claimant. The same fees shall be allowed and taxed by the judge,
    for self, officers, and witnesses, that are allowed by law for similar services.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.85
- number: '2329.86'
  heading: Finding of judge
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If the judge at the hearing under section 2329.84 of the Revised Code finds
    that the right to the property or a part of it is in the claimant, and the plaintiff
    in execution within three days after the hearing tenders to the officer having
    the property in the officer's custody, a bond in double the amount of its value
    as assessed by the judge, with good and sufficient sureties, payable to the claimant,
    to the effect that they will pay all damages sustained by reason of the detention
    or sale of the property, the officer shall deliver such bond to the claimant,
    sell the property as if no hearing of the right to the property had taken place,
    and shall not be liable to the claimant for the property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.86
- number: '2329.90'
  heading: Uniform foreign country money judgments recognition act definitions
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: 'As used in sections 2329.90 to 2329.94 of the Revised Code:

    (A) "Foreign country" means a governmental unit other than the United States and
    other than a state, district, commonwealth, territory, or insular possession of
    the United States.

    (B) "Foreign country judgment" means any judgment of a foreign country that grants
    or denies the recovery of a sum of money, other than the following types of judgments:

    (1) A judgment for taxes;

    (2) A judgment imposing a fine or other monetary penalty;

    (3) A judgment for support involving matrimonial or family matters.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.90
- number: '2329.91'
  heading: Enforcement of foreign country judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Except as provided in sections 2329.92 and 2329.93 of the Revised Code,
    any foreign country judgment that is final, conclusive, and enforceable where
    rendered shall be recognized and enforced by the courts of this state, even though
    an appeal from the judgment is pending or the judgment is subject to an appeal.
    Such a foreign country judgment is enforceable in this state in the same manner
    as a judgment of another state that is entitled to full faith and credit.

    (B) For purposes of division (A) of this section, a foreign country judgment is
    conclusive between the parties to the extent that it grants or denies the recovery
    of a sum of money, except that, if any of the following applies, a foreign country
    judgment is not conclusive:

    (1) The judgment was rendered under a system that does not provide impartial tribunals
    or procedures that are compatible with the requirements of the due process of
    law;

    (2) Subject to divisions (C) and (D) of this section, the foreign court did not
    have personal jurisdiction over the defendant;

    (3) The foreign court did not have jurisdiction over the subject matter.

    (C) A foreign country judgment shall be considered conclusive, and shall not be
    refused recognition and enforcement for lack of personal jurisdiction, if any
    of the following applies:

    (1) The defendant was personally served in the foreign country;

    (2) The defendant voluntarily appeared in the proceedings other than for the purpose
    of protecting seized property or property threatened with seizure in the proceedings,
    or other than to contest the jurisdiction of the foreign court over him;

    (3) Prior to the commencement of the proceedings, the defendant agreed to submit
    to the jurisdiction of the foreign court with respect to the subject matter involved;

    (4) The defendant was domiciled in the foreign country when the proceedings were
    commenced or, if the defendant was a corporation, it had its principal place of
    business, was incorporated, or otherwise had acquired corporate status in the
    foreign country;

    (5) The defendant had a business office in the foreign country and the proceedings
    in the foreign court involved a claim for relief that arose out of the business
    done by the defendant through that office;

    (6) The defendant operated a motor vehicle or airplane in the foreign country
    and the proceedings involved a claim for relief that arose out of that operation.

    (D) A court of this state may recognize bases for jurisdiction over a defendant
    that are not listed in division (C) of this section and that have been recognized
    by the courts of this state or the general assembly.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.91
- number: '2329.92'
  heading: When judgment not enforceable - reciprocity
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) A foreign country judgment shall not be recognized and enforced pursuant
    to section 2329.91 of the Revised Code if the judge determines that any of the
    following are true:

    (1) The defendant in the proceedings in the foreign court did not receive notice
    of the proceedings in sufficient time to enable him to defend;

    (2) The foreign country judgment was obtained by fraud;

    (3) The claim for relief on which the foreign country judgment is based is repugnant
    to the public policy of this state;

    (4) The foreign country judgment conflicts with another final and conclusive judgment;

    (5) The proceedings in the foreign court were contrary to an agreement between
    the parties under which the dispute in question was to be settled otherwise than
    by proceedings in that court;

    (6) If jurisdiction was based only on personal service, the foreign court was
    a seriously inconvenient forum for the trial of the action.

    (B) A foreign country judgment rendered in a foreign country that does not have
    a procedure for recognizing judgments made by courts of other countries and their
    political subdivisions in its statutes, rules, or common law that is substantially
    similar to sections 2329.90 to 2329.94 of the Revised Code may be recognized and
    enforced pursuant to section 2329.91 of the Revised Code in the discretion of
    the court.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.92
- number: '2329.93'
  heading: Stay pending appeal
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: A court of this state may stay proceedings under sections 2329.90 to 2329.94
    of the Revised Code to recognize and enforce a foreign country judgment if the
    defendant satisfies the court that an appeal is pending or that he is entitled
    and intends to appeal the foreign country judgment. The stay may be granted only
    until the appeal has been determined or until the expiration of a time period
    sufficient to enable the defendant to prosecute an appeal.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.93
- number: '2329.94'
  heading: Scope and construction
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Sections 2329.90 to 2329.94 of the Revised Code do not prevent courts
    from recognizing judgments in situations not covered by those sections.

    (B) Sections 2329.90 to 2329.94 of the Revised Code shall be construed so as to
    effectuate the general purpose to make uniform the laws of the states that enact
    similar provisions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.94
- number: '2331.01'
  heading: Execution against person
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: An execution against the person of a judgment debtor shall require the officer
    to arrest such debtor and commit him to the jail of the county until he pays the
    judgment, or is discharged according to law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.01
- number: '2331.02'
  heading: Execution may issue
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: 'An execution against the person of a debtor may be issued upon any judgment
    for the payment of money:

    (A) When the judgment debtor has removed, or begun to remove, any of his property
    out of the jurisdiction of the court, with intent to prevent the collection of
    the money due on the judgment;

    (B) When the judgment debtor has property, rights in action, evidences of debt,
    or interest or stock in a corporation or company, which he fraudulently conceals
    with like intent;

    (C) When the judgment debtor has assigned or disposed of any of his property or
    rights in action, or has converted them into money, with intent to defraud his
    creditors, or with the intent to prevent such property from being taken in execution;

    (D) When the judgment debtor fraudulently contracted the debt or incurred the
    obligation upon which the judgment was rendered;

    (E) When the judgment was rendered for money, or other valuable thing, lost by
    playing at any game or by means of any bet or wager;

    (F) When the judgment debtor was arrested on an order before judgment and has
    not been discharged as an insolvent debtor, or the order has not been set aside.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.02
- number: '2331.03'
  heading: Allowance of execution
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: An execution against the person of the debtor, except as prescribed in section
    2331.05 of the Revised Code, can be issued only when allowed by the supreme court,
    court of appeals, court of common pleas, probate court, or any judge of such courts,
    upon being satisfied, by the affidavit of the judgment creditor or his attorney,
    and such other evidence as is presented, of the existence of one or more of the
    particulars mentioned in section 2331.02 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.03
- number: '2331.04'
  heading: Execution issued by county court judge
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: A judge of a county court may issue an execution against the person of a judgment
    debtor, upon being satisfied of the existence of one or more of the particulars
    mentioned in section 2331.02 of the Revised Code, by affidavit and evidence as
    required in section 2331.03 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.04
- number: '2331.05'
  heading: Execution issued as a matter of course
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: When the judgment debtor was arrested before judgment and has not been released
    from imprisonment by an application for relief as an insolvent debtor, and the
    order for such arrest has not been adjudged improper, an execution against the
    person of such judgment debtor may issue as a matter of course.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.05
- number: '2331.06'
  heading: Discharge by delivery of property
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: A person taken in execution as provided in sections 2331.01 to 2331.05, inclusive,
    of the Revised Code, must be discharged by delivering or setting off to the officer
    who serves the writ, if issued from a court of record, real or personal property,
    or if issued by a judge of a county court, personal property only, sufficient
    to satisfy the judgment and costs for which the writ was issued.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.06
- number: '2331.07'
  heading: Execution may issue against property
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: A person imprisoned under sections 2331.01 to 2331.10, inclusive, of the Revised
    Code, is entitled to prison bounds, as prescribed by sections 2331.15 and 2331.16
    of the Revised Code. In case the person is out of jail in prison bounds, the judgment
    creditor, upon whose judgment he was imprisoned, is entitled to execution against
    the lands and tenements, and goods, and chattels of the debtor, and all other
    remedies prescribed by law for the collection of debts.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.07
- number: '2331.08'
  heading: Death of debtor no satisfaction of judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: The death of a person under arrest in an action shall not satisfy the judgment,
    but an execution may issue thereon as if no arrest had been made.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.08
- number: '2331.09'
  heading: One arrested before judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: If a person who is imprisoned under an order of arrest made before judgment
    is not charged in execution within ten days after judgment, he shall be discharged
    from such imprisonment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.09
- number: '2331.10'
  heading: Debtor may be discharged
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: A person imprisoned under sections 2331.01 to 2331.10, inclusive, of the Revised
    Code, or upon an order of arrest before judgment in civil cases, who is unable
    to perform the act or endure the imprisonment, may be discharged therefrom upon
    such terms as are just by the court out of which the process was issued, or a
    judge thereof, or by the court in which the judgment was or might have been rendered,
    or a judge thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.10
- number: '2331.11'
  heading: Privilege from arrest
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: '(A) The following persons are privileged from arrest:

    (1) Members, the chief administrative officer of the house of representatives,
    the clerk of the house of representatives, clerks, sergeants at arms, and staff
    of the senate and house of representatives, during the sessions of the general
    assembly, and while traveling to and from such sessions;

    (2) Electors, while going to, returning from, or in attendance at elections;

    (3) Judges of the courts, while attending court, and also during the time necessarily
    employed in going to, holding, and returning from the court that it is their duty
    to attend;

    (4) Attorneys, bailiffs, clerks of courts, sheriffs, coroners, constables, plaintiffs,
    defendants, jurors, and witnesses, and other officers or employees of the court,
    while going to, attending, or returning from court;

    (5) Persons who, on their traditional day of worship, are within, going to, or
    returning from their place of worship, are worshipping at a service, or are going
    to or returning from a service.

    (B) Whoever arrests a person in violation of division (A) of this section shall
    pay one hundred dollars, to be recovered by civil action, in the name and for
    the use of the person injured.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.11
- number: '2331.12'
  heading: Days on which arrests may not be made
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: No person shall be arrested during a sitting of the senate or house of representatives,
    within the hall where such session is being held, or in any court of justice,
    during the sitting of such court, or on Sunday, or on the fourth day of July.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.12
- number: '2331.13'
  heading: Application
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: Sections 2331.11 to 2331.14, inclusive, of the Revised Code do not extend
    to cases of treason, felony, or breach of the peace, nor do they privilege any
    person specified in such sections from being served with a summons or notice to
    appear. Arrests not contrary to such sections made in any place or on any river
    or watercourse within or bounding upon this state are lawful.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.13
- number: '2331.14'
  heading: Discharging prisoner
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: A person arrested contrary to sections 2331.11 to 2331.14, inclusive, of the
    Revised Code, shall be discharged by a writ of habeas corpus, or in a summary
    way, by motion before the court from which the process issued, at the cost of
    the party who sued out the process.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.14
- number: '2331.15'
  heading: Prison bounds fixed
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: A person imprisoned for debt is entitled to the privilege of prison bounds,
    which shall be coextensive with the limits of the county. Such prisoner shall
    not pass over or without such limits.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.15
- number: '2331.16'
  heading: Prisoner entitled to benefit of prison bounds
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2331'
    name: Execution Against The Person
  text: A prisoner is not entitled to the privilege of prison bounds until he gives
    bond to the creditors, with two or more sureties, resident in the county, approved
    by the judge or mayor who issued the process, or, in other cases, by the probate
    judge, in double the sum for which he stands committed, for his safe continuance
    in the custody of the jailer within the limits of the prison bounds, until legally
    discharged, which bond shall be deposited with the sheriff until the creditor
    demands it. When the condition of the bond is broken, the creditor may put it
    in suit and have judgment entered against the sureties for the debt, interest,
    and costs for which the prisoner stands committed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2331.16
- number: '2335.01'
  heading: Fees of commissioners and appraisers
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: 'Each commissioner appointed to make partition of lands or to assign dower,
    for the time so engaged, and in going to and returning from such lands, shall
    receive not to exceed ten dollars each, per parcel of land, as the court determines.

    A parcel of personal property is to include all the articles included in one action,
    execution, replevin, or attachment. Each person called by an officer to appraise
    real or personal property, on execution, replevin, or attachment, or to fix the
    value of exempt property shall receive not more than ten dollars per parcel and
    necessary expenses, provided, that in the appraisal of real estate the court may
    fix compensation at more than ten dollars per parcel.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.01
- number: '2335.02'
  heading: Compensation of appraisers and arbitrators
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In any cause, matter, or proceeding arising in any court of record, where
    appraisers, commissioners, or arbitrators are appointed by such court to make
    or procure an appraisement or valuation of any property, real or personal, such
    appraisers, commissioners, or arbitrators shall receive, on application to such
    court, such compensation as the court deems reasonable and proper in addition
    to the amount specified by law and such compensation shall be taxed in the costs
    of such cause, matter, or proceeding in the same manner as other costs are now
    taxed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.02
- number: '2335.021'
  heading: Appointment of licensed auctioneer - compensation, reimbursement
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: Any court of record may appoint an auctioneer licensed under Chapter 4707.
    of the Revised Code to conduct any public auction of goods, chattels, or lands
    required to be sold by an officer of the court. Such auctioneer shall receive
    such compensation and reimbursement for the expenses of advertising such public
    auction as the court finds reasonable and proper. Such compensation and advertising
    expenses shall be charged as costs in the action or proceeding in which such sale
    is ordered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.021
- number: '2335.03'
  heading: Assignment commissioners
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: The judges of the court of common pleas of any county where two or more such
    judges hold court at the same time, may, in joint session, appoint assignment
    commissioners to attend to the assignment of all cases for trial and to discharge
    such other duties as the court requires. Such assignment commissioners shall be
    allowed such compensation for their services as the court appointing them determines,
    and shall be paid monthly from the county treasury. An entry shall be made in
    the court journal designating the persons appointed as assignment commissioners,
    and fixing their compensation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.03
- number: '2335.04'
  heading: Assignment commissioner in county having one judge
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: When the business of the court of common pleas requires, such court, in any
    county having not more than one judge of the court of common pleas, may appoint
    an assignment commissioner whose duty it will be to make assignments of cases
    to be tried in the court under the direction of the judge holding such court.
    Such commissioner shall hold office during the pleasure of the court making the
    appointment and shall receive such compensation as is fixed by the court making
    the appointment, which amount shall not exceed three thousand dollars per year,
    payable monthly.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.04
- number: '2335.05'
  heading: Witness fees and mileage
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In all cases or proceedings not specified in sections 2335.06 and 2335.08
    of the Revised Code, except as otherwise provided in section 2335.061 of the Revised
    Code, each person subpoenaed as a witness shall be allowed one dollar for each
    day's attendance and the mileage allowed in courts of record. If not subpoenaed
    each person called upon to testify in a case or proceeding shall receive twenty-five
    cents. Such fee shall be taxed in the bill of costs, and if incurred in a state
    or ordinance case, or in a proceeding before a public officer, board, or commission,
    the fee shall be paid out of the proper public treasury, upon the certificate
    of the court, officer, board, or commission conducting the proceeding.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.05
- number: '2335.06'
  heading: Witness fees in civil cases
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: '(A) Except as otherwise provided in section 2335.061 of the Revised Code,
    each witness in civil cases shall receive the following fees:

    (1) Twelve dollars for each full day''s attendance and six dollars for each half
    day''s attendance at a court of record, mayor''s court, or before a person authorized
    to take depositions, to be taxed in the bill of costs. Each witness shall also
    receive reimbursement for each mile necessarily traveled to and from the witness''s
    place of residence to the place of giving testimony, to be taxed in the bill of
    costs. The board of county commissioners of each county shall set the reimbursement
    rate for each mile necessarily traveled by a witness in a civil case in the common
    pleas court, any division of the common pleas court, a county court, or a county-operated
    municipal court. The rate shall not exceed fifty and one-half cents for each mile.

    (2) For attending a coroner''s inquest, the same fees and mileage provided by
    division (A)(1) of this section, payable from the county treasury on the certificate
    of the coroner.

    (B) As used in this section, "full day''s attendance" means a day on which a witness
    is required or requested to be present at proceedings before and after twelve
    noon regardless of whether the witness actually testifies; "half day''s attendance"
    means a day on which a witness is required or requested to be present at proceedings
    either before or after twelve noon, but not both, regardless of whether the witness
    actually testifies.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.06
- number: '2335.061'
  heading: Testimony of coroner or deputy coroner; fees
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: '(A) As used in this section:

    (1) "Coroner" has the same meaning as in section 313.01 of the Revised Code, and
    includes the following:

    (a) The coroner of a county other than a county in which the death occurred or
    the dead human body was found if the coroner of that other county performed services
    for the county in which the death occurred or the dead human body was found;

    (b) A medical examiner appointed by the governing authority of a county to perform
    the duties of a coroner set forth in Chapter 313. of the Revised Code.

    (2) "Deputy coroner" means a pathologist serving as a deputy coroner.

    (3) "Expert testimony" means testimony given by a coroner or deputy coroner as
    an expert witness pursuant to this section and the Rules of Evidence.

    (4) "Fact testimony" means testimony given by a coroner or deputy coroner regarding
    the performance of the duties of the coroner as set forth in Chapter 313. of the
    Revised Code. "Fact testimony" does not include expert testimony.

    (B)(1) A party may subpoena a coroner or deputy coroner to give expert testimony
    at a trial, hearing, or deposition in a civil action only upon filing with the
    court a notice that includes all of the following:

    (a) The name of the coroner or deputy coroner whose testimony is sought;

    (b) A brief statement of the issues upon which the party seeks expert testimony
    from the coroner or deputy coroner;

    (c) An acknowledgment by the party that the giving of expert testimony by the
    coroner or deputy coroner at the trial, hearing, or deposition is governed by
    this section and that the party will comply with all of the requirements of this
    section;

    (d) A statement of the obligations of the coroner or deputy coroner under division
    (C) of this section.

    (2) The notice under division (B)(1) of this section shall be served together
    with the subpoena.

    (C) A party that obtains the expert testimony of a coroner or deputy coroner at
    a trial, hearing, or deposition in a civil action pursuant to division (B) or
    (D) of this section shall pay to the treasury of the county in which the coroner
    or deputy coroner holds office or is appointed or employed a fee of three hundred
    fifty dollars per hour spent preparing for and giving expert testimony at a trial,
    hearing, or deposition in a civil action, within thirty days after receiving the
    statement described in this division. Upon the conclusion of the coroner''s or
    deputy coroner''s expert testimony, the coroner or deputy coroner shall file a
    statement with the court on behalf of the county in which the coroner or deputy
    coroner holds office or is appointed or employed showing the fee due and how the
    coroner or deputy coroner calculated the fee. The coroner or deputy coroner shall
    serve a copy of the statement on each of the parties.

    (D) For good cause shown, the court may permit a coroner or deputy coroner who
    has not been served with a subpoena under division (B) of this section to give
    expert testimony at a trial, hearing, or deposition in a civil action. Unless
    good cause is shown, the failure of a party to file with the court the notice
    described in division (B)(1) of this section prohibits the party from having a
    coroner or deputy coroner subpoenaed to give expert testimony at a trial, hearing,
    or deposition in a civil action or from otherwise calling the coroner or a deputy
    coroner to give expert testimony at a trial, hearing, or deposition in a civil
    action.

    (E) In the event of a dispute as to the contents of the notice filed by a party
    under division (B) of this section or as to the nature of the testimony sought
    from or given by a coroner or a deputy coroner at a trial, hearing, or deposition
    in a civil action, the court shall determine whether the testimony sought from
    or given by the coroner or deputy coroner is expert testimony or fact testimony.
    In making this determination, the court shall consider all of the following:

    (1) The definitions of "expert testimony" and "fact testimony" set forth in this
    section;

    (2) All applicable rules of evidence;

    (3) Any other information that the court considers relevant.

    (F) Nothing in this section shall be construed to alter, amend, or supersede the
    requirements of the Rules of Civil Procedure or the Rules of Evidence.'
