- number: '2307.96'
  heading: Asbestos claim - multiple defendants - substantial factor test
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) If a plaintiff in a tort action alleges any injury or loss to person
    resulting from exposure to asbestos as a result of the tortious act of one or
    more defendants, in order to maintain a cause of action against any of those defendants
    based on that injury or loss, the plaintiff must prove that the conduct of that
    particular defendant was a substantial factor in causing the injury or loss on
    which the cause of action is based.

    (B) A plaintiff in a tort action who alleges any injury or loss to person resulting
    from exposure to asbestos has the burden of proving that the plaintiff was exposed
    to asbestos that was manufactured, supplied, installed, or used by the defendant
    in the action and that the plaintiff''s exposure to the defendant''s asbestos
    was a substantial factor in causing the plaintiff''s injury or loss. In determining
    whether exposure to a particular defendant''s asbestos was a substantial factor
    in causing the plaintiff''s injury or loss, the trier of fact in the action shall
    consider, without limitation, all of the following:

    (1) The manner in which the plaintiff was exposed to the defendant''s asbestos;

    (2) The proximity of the defendant''s asbestos to the plaintiff when the exposure
    to the defendant''s asbestos occurred;

    (3) The frequency and length of the plaintiff''s exposure to the defendant''s
    asbestos;

    (4) Any factors that mitigated or enhanced the plaintiff''s exposure to asbestos.

    (C) This section applies only to tort actions that allege any injury or loss to
    person resulting from exposure to asbestos and that are brought on or after the
    effective date of this section.'
