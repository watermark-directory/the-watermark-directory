  chapter:
    num: '2325'
    name: Relief After Judgment
  text: When a judgment, including judgments rendered by a judge of a county court
    or mayor, a transcript of which has been filed in the court of common pleas for
    execution, is dormant, or when a finding for money in equitable proceedings remains
    unpaid in whole or in part, under the order of the court therein made, such judgment
    may be revived, or such finding made subject to execution as judgments at law
    are, in the manner prescribed for reviving actions before judgment, or by action
    in the court in which such judgment was rendered or finding made, or in which
    transcript of judgment was filed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2325.15
- number: '2325.16'
  heading: Service by publication
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2325'
    name: Relief After Judgment
  text: When either party to the dormant judgment or finding mentioned in section
    2325.15 of the Revised Code, his agent or attorney, makes affidavit showing that
    the adverse party is not a resident of the state, that such judgment or finding
    remains unsatisfied in whole or part and the amount owing thereon, service may
    be made by publication, as provided in section 2703.18 of the Revised Code, but
    only for judgments or findings in which personal service originally was made on
    the adverse party.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2325.16
- number: '2325.17'
  heading: Time a lien attaches when a dormant judgment is revived
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2325'
    name: Relief After Judgment
  text: If sufficient cause is not shown to the contrary, the judgment or finding
    mentioned in section 2325.15 of the Revised Code shall stand revived, and thereafter
    may be made to operate as a lien upon the lands and tenements of each judgment
    debtor for the amount which the court finds to be due and unsatisfied thereon
    to the same extent and in the same manner as judgments or findings rendered in
    any other action.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2325.17
- number: '2325.18'
  heading: Limitation
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2325'
    name: Relief After Judgment
  text: '(A) An action to revive a judgment can only be brought within ten years from
    the time it became dormant, unless the party entitled to bring that action, at
    the time the judgment became dormant, was within the age of minority, of unsound
    mind, or imprisoned, in which cases the action may be brought within ten years
    after the disability is removed.

    (B) For the purpose of calculating interest due on a revived judgment, interest
    shall not accrue and shall not be computed from the date the judgment became dormant
    to the date the judgment is revived.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2325.18
- number: '2325.19'
  heading: New parties to and revivor of judgment on death of party
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2325'
    name: Relief After Judgment
  text: In case of the death of either or both parties after judgment rendered, and
    before its satisfaction, his or their representatives may be made parties to the
    judgment, and it may be revived by an action brought for that purpose; or they
    may be made parties thereto in the manner prescribed for the revival of actions
    before judgment. Such judgment may be rendered and execution awarded as might
    or should have been given or awarded against the representative of such deceased
    party.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2325.19
- number: '2325.20'
  heading: Judgment remanded for execution by court of common pleas may be revived
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2325'
    name: Relief After Judgment
  text: When a judgment or decree has been rendered in the court of appeals and a
    mandate directed to the court of common pleas to carry it into execution, on the
    death of either or both parties thereto before its satisfaction, it may be revived
    in such court of common pleas in conformity with section 2325.19 of the Revised
    Code.
  history: null
