  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.17
- number: '2305.18'
  heading: Summons on corporation in hands of a receiver
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: If a defendant is a corporation, either foreign or domestic, and whether its
    charter prescribes the manner and place of service, or either, and before the
    expiration of the sixty days referred to in section 2305.17 of the Revised Code
    it passes into the hands of a receiver, then, following such attempt to commence
    an action, within such sixty days service may be made upon such receiver, or his
    cashier, treasurer, secretary, clerk, or managing agent, or if none of these can
    be found, by a copy of the summons left at the office or usual place of business
    of such agents or officers of such receiver, with the person in charge thereof.
    If such corporation is a railroad company, summons may be served upon any regular
    ticket or freight agent of the receiver, or, if there is no such agent, then on
    any conductor of such receiver, in any county in the state in which the company's
    railroad is located. The summons shall be returned as if served upon the defendant.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.18
- number: '2305.19'
  heading: Saving in case of reversal
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) In any action that is commenced or attempted to be commenced, if in due
    time a judgment for the plaintiff is reversed or if the plaintiff fails otherwise
    than upon the merits, the plaintiff or, if the plaintiff dies and the cause of
    action survives, the plaintiff''s representative may commence a new action within
    one year after the date of the reversal of the judgment or the plaintiff''s failure
    otherwise than upon the merits or within the period of the original applicable
    statute of limitations, whichever occurs later. This division applies to any claim
    asserted in any pleading by a defendant.

    (B) If the defendant in an action described in division (A) of this section is
    a foreign or domestic corporation, and whether its charter prescribes the manner
    or place of service of process on the defendant, and if it passes into the hands
    of a receiver before the expiration of the one year period or the period of the
    original applicable statute of limitations, whichever is applicable, as described
    in that division, then service to be made within one year following the original
    service or attempt to begin the action may be made upon that receiver or the receiver''s
    cashier, treasurer, secretary, clerk, or managing agent, or if none of these officers
    can be found, by a copy left at the office or the usual place of business of any
    of those agents or officers of the receiver with the person having charge of the
    office or place of business. If that corporation is a railroad company, summons
    may be served on any regular ticket or freight agent of the receiver, and if there
    is no regular ticket or freight agent of the receiver, then upon any conductor
    of the receiver, in any county in the state in which the railroad is located.
    The summons shall be returned as if served on that defendant corporation.

    (C) This section does not apply to an action or proceeding arising under section
    2106.22, 2107.76, 2109.35, 2115.16, 5806.04, or 5810.05 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.19
- number: '2305.21'
  heading: Survival of actions
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: In addition to the causes of action which survive at common law, causes of
    action for mesne profits, or injuries to the person or property, or for deceit
    or fraud, also shall survive; and such actions may be brought notwithstanding
    the death of the person entitled or liable thereto.
