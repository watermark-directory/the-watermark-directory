- number: '2329.01'
  heading: Property subject to levy and sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Lands and tenements, including vested legal interests therein, permanent
    leasehold estates renewable forever, and goods and chattels, not exempt by law,
    shall be subject to the payment of debts, and liable to be taken on execution
    and sold as provided in sections 2329.02 to 2329.61 of the Revised Code.

    (B) As used in sections 2329.02 to 2329.61 of the Revised Code:

    (1) "Commercial property" means any property that is not residential property.

    (2) "Private selling officer" means a resident of this state licensed as both
    an auctioneer under Chapter 4707. of the Revised Code and as a real estate broker
    or real estate salesperson under Chapter 4735. of the Revised Code.

    (3) "Residential mortgage loan" and "residential property" have the same meanings
    as in section 2308.01 of the Revised Code.

    (4) "Judgment debtor" includes any individual, corporation, business trust, estate,
    trust, partnership, or association.'
  history: null
