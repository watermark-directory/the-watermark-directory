- number: '2301.04'
  heading: Temporary location of division in event of emergency
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) In the event of a natural or man-made disaster, civil disorder, or any
    extraordinary circumstance that interrupts or threatens to interrupt the orderly
    operation of a division of a court of common pleas within the territorial jurisdiction
    of the division, the administrative judge of the division may issue an order authorizing
    the division to operate at a temporary location inside or outside the territorial
    jurisdiction of the division. The order shall identify the temporary location
    at which the division shall operate and the date on which operations shall commence
    at the temporary location. The division shall operate at the temporary location
    until the administrative judge withdraws, cancels, or rescinds the order.

    (B) The authority of an administrative judge of a division of a court of common
    pleas to issue an order authorizing the division to operate at a temporary location
    pursuant to division (A) of this section is independent of and shall not be conditioned
    upon a declaration of a judicial emergency issued by the chief justice of the
    supreme court pursuant to Rule 14 of the Rules of Superintendence for the Courts
    of Ohio.

    (C) For the period during which a division of a court of common pleas operates
    in a temporary location pursuant to division (A) of this section, the division
    shall continue to have the territorial jurisdiction set forth in section 2301.01
    of the Revised Code and the court shall have jurisdiction to hear actions and
    conduct proceedings the same as if the division were operating within that territorial
    jurisdiction.

    (D) As soon as practicable following issuance of an order pursuant to division
    (A) of this section, both of the following shall occur:

    (1) The administrative judge of the division of the court of common pleas shall
    provide notice and a copy of the order by regular or electronic mail to all of
    the following:

    (a) The chief justice and administrative director of the supreme court;

    (b) The legislative authorities of the local funding authorities of the court;

    (c) All appropriate law enforcement agencies, prosecuting authorities, public
    defender agencies, and local bar associations within the territorial jurisdiction
    of the court.

    (2) If the division operates and maintains a web site, the web site shall provide
    notification of the operation of the division at the temporary location, including
    the site of the temporary location and the date on which operations shall commence
    at the temporary location.

    (E) As soon as practicable following the withdrawal, cancellation, or rescission
    of an order issued pursuant to division (A) of this section, each of the following
    shall occur:

    (1) The administrative judge of the division of the court of common pleas shall
    provide notice by regular or electronic mail to all of the following:

    (a) The chief justice and administrative director of the supreme court;

    (b) The legislative authorities of the local funding authorities of the court;

    (c) All appropriate law enforcement agencies, prosecuting authorities, public
    defender agencies, and local bar associations within the territorial jurisdiction
    of the court.

    (2) If the division operates and maintains a web site, the web site shall provide
    notification of the operation of the division at the permanent location of the
    division, including the site of the permanent location and the date on which operations
    shall commence at the permanent location.'
