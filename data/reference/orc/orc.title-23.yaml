  url: https://codes.ohio.gov/ohio-revised-code/section-2303.01
- number: '2303.02'
  heading: Bond of clerk
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: Except as otherwise provided in section 3.061 of the Revised Code, before
    entering upon the discharge of official duties, the clerk of the court of common
    pleas shall give a bond signed by a bonding or surety company authorized to do
    business in this state, or, at the clerk's option, by two or more freeholders
    having real estate in the value of double the amount of the bond over and above
    all encumbrances to the state in a sum not less than ten thousand nor more than
    forty thousand dollars, to be fixed by the board of county commissioners, and
    the surety company to be approved by the board. The bond shall be conditioned
    that such clerk will enter and record all the orders, decrees, judgments, and
    proceedings of the courts of which such clerk is the clerk, pay over all moneys
    received by the clerk in an official capacity, and faithfully and impartially
    discharge the official duties of the clerk's office. The expense or premium for
    such bond shall be paid by the board and charged to the general fund of the county.
    Such bond, with the oath of office and the approval of the board indorsed thereon,
    shall be deposited with the county treasurer and kept in the treasurer's office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2303.02
- number: '2303.03'
  heading: Clerk of court of appeals
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: '(A) The clerk of the court of common pleas in each county also shall be clerk
    of the court of appeals of the county and, subject to division (B) of this section
    and while acting as the clerk of the court of appeals of the county and assuming
    the duties of that office, shall collect the same fees that the clerk otherwise
    collects and perform the same general duties that the clerk otherwise performs.
    In addition to the annual compensation that the clerk receives pursuant to sections
    325.08 and 325.18 of the Revised Code for the performance of the duties of the
    clerk of the court of common pleas, the clerk, for acting as the clerk of the
    court of appeals of the county and assuming the duties of that office, shall receive
    an additional amount equal to one-eighth of the annual compensation that the clerk
    receives pursuant to sections 325.08 and 325.18 of the Revised Code, as determined
    by the population of the county and the rates set forth in those sections. The
    additional amount shall be payable from the state treasury upon the certificate
    of the presiding or administrative judge of the district in which the clerk serves
    in the same manner that the compensation of other employees of the court of appeals
    is paid pursuant to section 2501.17 of the Revised Code.

    (B) Under the circumstances described in sections 2969.21 to 2969.27 of the Revised
    Code, the clerk of the court of common pleas, while acting as the clerk of the
    court of appeals, shall charge the fees and perform the other duties specified
    in those sections.'
