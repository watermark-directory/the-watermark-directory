    name: Expedited Foreclosure On Vacant And Abandoned Properties
  text: '(A) No person shall use plywood to secure real property that is deemed vacant
    and abandoned under section 2308.02 of the Revised Code.

    (B) Division (A) of this section shall not apply to any person that uses plywood
    to secure real property that is deemed vacant and abandoned under section 2308.02
    of the Revised Code prior to the effective date of this section .'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2308.031
- number: '2308.04'
  heading: Penalty
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2308'
    name: Expedited Foreclosure On Vacant And Abandoned Properties
  text: '(A) A person is guilty of criminal mischief in violation of division (A)(1)
    of section 2909.07 of the Revised Code if all of the following apply:

    (1) The person knowingly and with purpose to diminish the value or enjoyment of
    the residential real property moves, defaces, damages, destroys, or otherwise
    improperly tampers with the person''s own residential real property.

    (2) The residential real property is subject to a mortgage.

    (3) The person has been served with a summons and complaint in a pending residential
    mortgage loan foreclosure action relating to that residential real property.

    (B) As used in this section, "pending" includes the time between the filing of
    the foreclosure action and confirmation of sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2308.04
- number: '2309.19'
  heading: Cross demands compensated
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2309'
    name: Pleadings
  text: When cross demands have existed between persons under such circumstances that
    if one had brought an action against the other a counterclaim could have been
    set up, neither can be deprived of the benefit thereof by assignment by the other,
    or by his death. The two demands must be deemed compensated so far as they equal
    each other.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2309.19
- number: '2309.59'
  heading: Reviewing court to disregard certain errors
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2309'
    name: Pleadings
  text: In every stage of an action, the court shall disregard any error or defect
    in the pleadings or proceedings which does not affect the substantial rights of
    the adverse party. No final judgment or decree shall be reversed or affected by
    reason of such error or defect. In the judgment of any reviewing court upon any
    appeal in any civil action, when it is sought to reverse any final judgment or
    decree or obtain a new trial upon the issues joined in the pleadings, the reviewing
    court shall certify on its journal whether, in its opinion, substantial justice
    has been done the party complaining, as shown by the record of the proceedings
    and final judgment or decree under review. If the reviewing court determines and
    certifies that, in its opinion, substantial justice has been done to the party
    complaining as shown by the record, all alleged errors or defects occurring at
    the trial shall be deemed not prejudicial to the party complaining and shall be
    disregarded, and the final judgment or decree under review shall be affirmed,
    or it shall be modified if, in the opinion of such reviewing court, a modification
    of it will do more complete justice to the party complaining. If the reviewing
    court determines and certifies that, in its opinion, substantial justice has not
    been done to the party complaining as shown by the record, such court shall reverse
    the final judgment or decree and render, or remand the case to the lower court
    with instructions to render, the final judgment or decree that should have been
    rendered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2309.59
- number: '2313.01'
  heading: Commissioners of jurors; examination of jurors
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) The judges of the general division of the court of common pleas shall
    appoint two persons, neither of whom shall be an attorney at law nor more than
    one of whom shall be of the same political party, and either or both of whom may
    be court employees, to be commissioners of jurors for the county. The appointments
    shall be made in writing, by the judge or a majority of all the judges in those
    counties where there is more than one judge, and shall be filed in the office
    of the clerk of the court of common pleas of the county and entered upon the journal
    of the court. The commissioners shall hold office at the pleasure of the judges
    of the court of common pleas in the county of their appointment. The judges may
    at any time, by a vote of a majority of all their number, remove any commissioner
    and appoint a successor. Upon a vacancy occurring in the office of commissioners
    of jurors, for any cause, the judges shall, as soon as practicable, in like manner
    appoint a successor. The successor so appointed shall be of the same political
    party as the commissioner whose place is to be filled. The commissioners shall
    be officers of the courts of common pleas in such county.

    (B) The commissioners may examine under oath any juror called for trial as to
    that person''s qualifications to serve as a juror.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.01
- number: '2313.02'
  heading: Compensation - appointment of deputies; administration of oaths or affirmations
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) The commissioners of jurors shall receive compensation fixed by the court
    of common pleas payable out of the county treasury. They may appoint and remove,
    with the consent of the court, expressed in writing, as many deputy commissioners
    as are necessary to carry out Chapter 2313. of the Revised Code. The deputy commissioners
    shall receive compensation fixed by the court of common pleas payable out of the
    county treasury. Such compensation may at any time be changed by the court. All
    appointments made under this section shall be filed in the office of the clerk
    of the court of common pleas and entered on the journal of the court.

    (B) The commissioners of jurors may, in writing, authorize a deputy to perform
    any duty or class of duties that a commissioner may perform. The commissioners
    or any deputy may administer an oath or affirmation in relation to any matter
    governed by Chapter 2313. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.02
- number: '2313.03'
  heading: Oath of office
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: 'Before entering upon the duties of their office, the commissioners of jurors
    and any deputy commissioners shall take and subscribe to the following oath of
    office, and file it with the clerk of the court of common pleas:

    "I do solemnly swear (or affirm) that I will honestly and faithfully discharge
    the duties of a commissioner of jurors (or deputy commissioner of jurors) without
    fear or favor; and that I will report to the court the names of any and all persons
    who, in any manner, seek by request, hint, or suggestion to influence me in the
    selection of jurors; and this I do as I shall answer to God" (or, "and this I
    do under the pains and penalties of perjury").'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.03
- number: '2313.04'
  heading: Office and supplies
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: The board of county commissioners shall provide a suitable office for the
    commissioners of jurors on the order of the court of common pleas and shall make
    provision for supplying all equipment, stationery, postage, advertisement expenses,
    computer software, and other supplies as are necessary for the proper and convenient
    conduct of the commissioners in discharging the duties imposed by Chapter 2313.
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.04
- number: '2313.05'
  heading: Establishment of jury year
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: The court of common pleas shall establish the date on which the jury year
    shall begin. The court may divide each jury year into parts.
  history: null
