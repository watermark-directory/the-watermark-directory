- number: '2305.44'
  heading: Duty to search for identifying device or identification card
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) When examining or treating an incapacitated person, an emergency medical
    service provider or health care practitioner may make a prompt and reasonable
    search for an identifying device or identification card. If found, the emergency
    medical service provider or health care practitioner may scan or examine it for
    emergency information, including by inspecting both sides of the identifying device
    or identification card.

    (B) A cause of action against an emergency medical service provider or health
    care practitioner does not arise from making a reasonable search of an incapacitated
    person to locate an identifying device or identification card, even though the
    person is not wearing an identifying device or carrying an identification card.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.44
- number: '2305.45'
  heading: Duty of others
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) A person, other than an emergency medical service provider, health care
    practitioner, or law enforcement officer, who finds an incapacitated person shall
    make a reasonable effort to notify an emergency medical service provider, health
    care practitioner, or law enforcement officer. If an emergency medical service
    provider, health care practitioner, or law enforcement officer is not present,
    a person who finds an incapacitated person may do either or both of the following:

    (1) Make a reasonable search for an identifying device;

    (2) If the identifying device is found, do all of the following:

    (a) Inspect both sides of the identifying device;

    (b) Scan the identifying device, if it contains a bar code or quick response code;

    (c) Make a reasonable search for an identification card and, if found, inspect
    both sides of the card.

    If a device or card is located, the person making the search shall attempt promptly
    to bring the device or card and its contents to the attention of an emergency
    medical service provider, health care practitioner, or law enforcement officer.

    (B) A cause of action does not arise from a reasonable search to locate an identifying
    device or identification card as authorized by division (A) of this section.'
  history: null
