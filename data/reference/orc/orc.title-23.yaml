- number: '2307.06'
  heading: Suit on bond
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: When a person forfeits his bond, or renders his sureties liable thereon, a
    person injured thereby, or who is entitled to the benefit of the security, may
    bring an action thereon, in his own name, against the person and his sureties,
    to recover the amount to which he is entitled by reason of the delinquency, which
    action may be prosecuted on a certified copy of the bond. A judgment for one delinquency
    does not preclude the same for another person from bringing an action on the instrument
    for another delinquency.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.06
- number: '2307.07'
  heading: Copy of bond
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: On tender of the proper fee, the custodian of the bond referred to in section
    2307.06 of the Revised Code shall deliver a copy thereof to a person claiming
    to be injured. The requirements of such section are not imperative, if other provision
    is made by law.
