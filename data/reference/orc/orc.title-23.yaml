- number: '2303.13'
  heading: Entries on appearance docket and their effect
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: The clerk of the court of common pleas shall enter upon the appearance docket
    at the time of the commencement of an action or proceeding, the names of the parties
    in full, with names of counsel, and forthwith index the case direct and reverse
    in the name of each plaintiff and defendant. In like manner and at the time it
    occurs, he shall also index the name of each person who becomes a party to such
    action or proceeding. At the time it occurs and under the case so docketed, he
    shall also enter the issue of the summons or other mesne process or order and
    the filing of each paper, and he shall record in full the return of such writ
    or order with the date of its return to the court, which entry shall be evidence
    of such service.
