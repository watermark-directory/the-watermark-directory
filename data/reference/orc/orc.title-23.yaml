- number: '2307.711'
  heading: Assumption of risk as affirmative defense to product liability claim
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Subject to divisions (B)(1), (2), and (3) of this section, sections 2315.32
    to 2315.36 of the Revised Code apply to a product liability claim that is asserted
    pursuant to sections 2307.71 to 2307.80 of the Revised Code.

    (B)(1) Express or implied assumption of the risk may be asserted as an affirmative
    defense to a product liability claim under sections 2307.71 to 2307.80 of the
    Revised Code, except that express or implied assumption of the risk may not be
    asserted as an affirmative defense to an intentional tort claim.

    (2) Subject to division (B)(3) of this section, if express or implied assumption
    of the risk is asserted as an affirmative defense to a product liability claim
    under sections 2307.71 to 2307.80 of the Revised Code and if it is determined
    that the claimant expressly or impliedly assumed a risk and that the express or
    implied assumption of the risk was a direct and proximate cause of harm for which
    the claimant seeks to recover damages, the express or implied assumption of the
    risk is a complete bar to the recovery of those damages.

    (3) If implied assumption of the risk is asserted as an affirmative defense to
    a product liability claim against a supplier under division (A)(1) of section
    2307.78 of the Revised Code, sections 2315.32 to 2315.36 of the Revised Code are
    applicable to that affirmative defense and shall be used to determine whether
    the claimant is entitled to recover compensatory damages based on that claim and
    the amount of any recoverable compensatory damages.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.711
- number: '2307.72'
  heading: Civil action for product liability claim
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Any recovery of compensatory damages based on a product liability claim
    is subject to sections 2307.71 to 2307.79 of the Revised Code.

    (B) Any recovery of punitive or exemplary damages in connection with a product
    liability claim is subject to sections 2307.71 to 2307.80 of the Revised Code.

    (C) Any recovery of compensatory damages for economic loss based on a claim that
    is asserted in a civil action, other than a product liability claim, is not subject
    to sections 2307.71 to 2307.79 of the Revised Code, but may occur under the common
    law of this state or other applicable sections of the Revised Code.

    (D)(1) Sections 2307.71 to 2307.80 of the Revised Code do not supersede, modify,
    or otherwise affect any statute, regulation, or rule of this state or of the United
    States, or the common law of this state or of the United States, that relates
    to liability in compensatory damages or punitive or exemplary damages for injury,
    death, or loss to person or property, or to relief in the form of the abatement
    of a nuisance, civil penalties, cleanup costs, cost recovery, an injunction or
    temporary restraining order, or restitution, that arises, in whole or in part,
    from contamination or pollution of the environment or a threat of contamination
    or pollution of the environment, including contamination or pollution or a threat
    of contamination or pollution from hazardous or toxic substances.

    (2) Consistent with the Rules of Civil Procedure, in the same civil action against
    the same defendant or different defendants, a claimant may assert both of the
    following:

    (a) A product liability claim, including a claim for the recovery of punitive
    or exemplary damages in connection with a product liability claim;

    (b) A claim for the recovery of compensatory damages or punitive or exemplary
    damages for injury, death, or loss to person or property, or for relief in the
    form of the abatement of a nuisance, civil penalties, cleanup costs, cost recovery,
    an injunction or temporary restraining order, or restitution, that arises, in
    whole or in part, from contamination or pollution of the environment or a threat
    of contamination or pollution of the environment, including contamination or pollution
    or a threat of contamination or pollution from hazardous or toxic substances.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.72
- number: '2307.73'
  heading: Liability of manufacturer - enterprise liability rejected
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) A manufacturer is subject to liability for compensatory damages based
    on a product liability claim only if the claimant establishes, by a preponderance
    of the evidence, all of the following:

    (1) Subject to division (B) of this section, the manufacturer''s product in question
    was defective in manufacture or construction as described in section 2307.74 of
    the Revised Code, was defective in design or formulation as described in section
    2307.75 of the Revised Code, was defective due to inadequate warning or instruction
    as described in section 2307.76 of the Revised Code, or was defective because
    it did not conform to a representation made by its manufacturer as described in
    section 2307.77 of the Revised Code;

    (2) A defective aspect of the manufacturer''s product in question as described
    in division (A)(1) of this section was a proximate cause of harm for which the
    claimant seeks to recover compensatory damages;

    (3) The manufacturer designed, formulated, produced, constructed, created, assembled,
    or rebuilt the actual product that was the cause of harm for which the claimant
    seeks to recover compensatory damages.

    (B) If a claimant is unable because the manufacturer''s product in question was
    destroyed to establish by direct evidence that the manufacturer''s product in
    question was defective or if a claimant otherwise is unable to establish by direct
    evidence that the manufacturer''s product in question was defective, then, consistent
    with the Rules of Evidence, it shall be sufficient for the claimant to present
    circumstantial or other competent evidence that establishes, by a preponderance
    of the evidence, that the manufacturer''s product in question was defective in
    any one of the four respects specified in division (A)(1) of this section.

    (C) Proof that a manufacturer designed, formulated, produced, constructed, created,
    assembled, or rebuilt the type of product in question is not proof that the manufacturer
    designed, formulated, produced, constructed, created, assembled, or rebuilt the
    actual defective product in the product liability claim. A manufacturer may not
    be held liable in a product liability action based on market share, enterprise,
    or industrywide liability.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.73
- number: '2307.74'
  heading: Product defective in manufacture or construction
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: A product is defective in manufacture or construction if, when it left the
    control of its manufacturer, it deviated in a material way from the design specifications,
    formula, or performance standards of the manufacturer, or from otherwise identical
    units manufactured to the same design specifications, formula, or performance
    standards. A product may be defective in manufacture or construction as described
    in this section even though its manufacturer exercised all possible care in its
    manufacture or construction.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.74
- number: '2307.75'
  heading: Product defective in design or formulation
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Subject to divisions (D), (E), and (F) of this section, a product is
    defective in design or formulation if, at the time it left the control of its
    manufacturer, the foreseeable risks associated with its design or formulation
    as determined pursuant to division (B) of this section exceeded the benefits associated
    with that design or formulation as determined pursuant to division (C) of this
    section.

    (B) The foreseeable risks associated with the design or formulation of a product
    shall be determined by considering factors including, but not limited to, the
    following:

    (1) The nature and magnitude of the risks of harm associated with that design
    or formulation in light of the intended and reasonably foreseeable uses, modifications,
    or alterations of the product;

    (2) The likely awareness of product users, whether based on warnings, general
    knowledge, or otherwise, of those risks of harm;

    (3) The likelihood that that design or formulation would cause harm in light of
    the intended and reasonably foreseeable uses, modifications, or alterations of
    the product;

    (4) The extent to which that design or formulation conformed to any applicable
    public or private product standard that was in effect when the product left the
    control of its manufacturer;

    (5) The extent to which that design or formulation is more dangerous than a resonably
    prudent consumer would expect when used in an intended or reasonably foreseeable
    manner.

    (C) The benefits associated with the design or formulation of a product shall
    be determined by considering factors including, but not limited to, the following:

    (1) The intended or actual utility of the product, including any performance or
    safety advantages associated with that design or formulation;

    (2) The technical and economic feasibility, when the product left the control
    of its manufacturer, of using an alternative design or formulation;

    (3) The nature and magnitude of any foreseeable risks associated with an alternative
    design or formulation.

    (D) An ethical drug or ethical medical device is not defective in design or formulation
    because some aspect of it is unavoidably unsafe, if the manufacturer of the ethical
    drug or ethical medical device provides adequate warning and instruction under
    section 2307.76 of the Revised Code concerning that unavoidably unsafe aspect.

    (E) A product is not defective in design or formulation if the harm for which
    the claimant seeks to recover compensatory damages was caused by an inherent characteristic
    of the product which is a generic aspect of the product that cannot be eliminated
    without substantially compromising the product''s usefulness or desirability and
    which is recognized by the ordinary person with the ordinary knowledge common
    to the community.

    (F) A product is not defective in design or formulation if, at the time the product
    left the control of its manufacturer, a practical and technically feasible alternative
    design or formulation was not available that would have prevented the harm for
    which the claimant seeks to recover compensatory damages without substantially
    impairing the usefulness or intended purpose of the product.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.75
- number: '2307.76'
  heading: Product defective due to inadequate warning or instruction
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Subject to divisions (B) and (C) of this section, a product is defective
    due to inadequate warning or instruction if either of the following applies:

    (1) It is defective due to inadequate warning or instruction at the time of marketing
    if, when it left the control of its manufacturer, both of the following applied:

    (a) The manufacturer knew or, in the exercise of reasonable care, should have
    known about a risk that is associated with the product and that allegedly caused
    harm for which the claimant seeks to recover compensatory damages;

    (b) The manufacturer failed to provide the warning or instruction that a manufacturer
    exercising reasonable care would have provided concerning that risk, in light
    of the likelihood that the product would cause harm of the type for which the
    claimant seeks to recover compensatory damages and in light of the likely seriousness
    of that harm.

    (2) It is defective due to inadequate post-marketing warning or instruction if,
    at a relevant time after it left the control of its manufacturer, both of the
    following applied:

    (a) The manufacturer knew or, in the exercise of reasonable care, should have
    known about a risk that is associated with the product and that allegedly caused
    harm for which the claimant seeks to recover compensatory damages;

    (b) The manufacturer failed to provide the post-marketing warning or instruction
    that a manufacturer exercising reasonable care would have provided concerning
    that risk, in light of the likelihood that the product would cause harm of the
    type for which the claimant seeks to recover compensatory damages and in light
    of the likely seriousness of that harm.

    (B) A product is not defective due to lack of warning or instruction or inadequate
    warning or instruction as a result of the failure of its manufacturer to warn
    or instruct about an open and obvious risk or a risk that is a matter of common
    knowledge.

    (C) An ethical drug is not defective due to inadequate warning or instruction
    if its manufacturer provides otherwise adequate warning and instruction to the
    physician or other legally authorized person who prescribes or dispenses that
    ethical drug for a claimant in question and if the federal food and drug administration
    has not provided that warning or instruction relative to that ethical drug is
    to be given directly to the ultimate user of it.'
