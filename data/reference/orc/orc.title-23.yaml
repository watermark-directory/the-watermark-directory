- number: '2329.021'
  heading: Foreign judgment defined
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: As used in sections 2329.021 to 2329.027 of the Revised Code, "foreign judgment"
    means any judgment, decree, or order of a court of the United States, or of any
    court of another state, that is entitled to full faith and credit in this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.021
- number: '2329.022'
  heading: Filing and status of foreign judgments
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: A copy of any foreign judgment authenticated in accordance with section 1738
    of Title 28 of the United States Code, 62 Stat. 947 (1948), may be filed with
    the clerk of any court of common pleas. The clerk shall treat the foreign judgment
    in the same manner as a judgment of a court of common pleas. A foreign judgment
    filed pursuant to this section has the same effect and is subject to the same
    procedures, defenses, and proceedings for reopening, vacating, or staying as a
    judgment of a court of common pleas and may be enforced or satisfied in same manner
    as a judgment of a court of common pleas.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.022
- number: '2329.023'
  heading: Notice of filing
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) When a foreign judgment is filed pursuant to section 2329.022 of the
    Revised Code, the judgment creditor or his attorney shall make and file with the
    clerk of the court in which the foreign judgment is filed an affidavit setting
    forth the name and last known address of the judgment debtor and of the judgment
    creditor.

    (B) Upon the filing of a foreign judgment pursuant to section 2329.022 of the
    Revised Code and the affidavit pursuant to division (A) of this section, the judgment
    creditor or his attorney shall file with the clerk of the court a praecipe instructing
    the clerk to issue a notice of the filing of the foreign judgment to the judgment
    debtor at the address given in the affidavit. The clerk shall enter a note of
    the mailing in the docket. The notice shall include the name and address of the
    judgment creditor, and of the judgment creditor''s attorney, if any, in this state.
    In addition, the judgment creditor may mail a notice of the filing of the foreign
    judgment to the judgment debtor and may file proof of mailing with the clerk.
    The failure of the clerk to mail to the judgment debtor notice of the filing of
    the foreign judgment does not affect the enforcement proceedings with respect
    to the foreign judgment, if the judgment creditor has filed proof that he mailed
    a notice of the filing to the judgment debtor.

    (C) No execution or other process for enforcement of a foreign judgment that is
    filed pursuant to section 2329.022 of the Revised Code shall issue until thirty
    days after the date the foreign judgment is filed pursuant to that section.'
