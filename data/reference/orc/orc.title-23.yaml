- number: '2305.29'
  heading: No civil liability for breach of a promise to marry, alienation of affections,
    or criminal conversation
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: No person shall be liable in civil damages for any breach of a promise to
    marry, alienation of affections, or criminal conversation, and no person shall
    be liable in civil damages for seduction of any person eighteen years of age or
    older who is not incompetent, as defined in section 2111.01 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.29
- number: '2305.31'
  heading: Promisee indemnified against damage liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: A covenant, promise, agreement, or understanding in, or in connection with
    or collateral to, a contract or agreement relative to the design, planning, construction,
    alteration, repair, or maintenance of a building, structure, highway, road, appurtenance,
    and appliance, including moving, demolition, and excavating connected therewith,
    pursuant to which contract or agreement the promisee, or its independent contractors,
    agents or employees has hired the promisor to perform work, purporting to indemnify
    the promisee, its independent contractors, agents, employees, or indemnitees against
    liability for damages arising out of bodily injury to persons or damage to property
    initiated or proximately caused by or resulting from the negligence of the promisee,
    its independent contractors, agents, employees, or indemnitees is against public
    policy and is void. Nothing in this section shall prohibit any person from purchasing
    insurance from an insurance company authorized to do business in the state of
    Ohio for his own protection or from purchasing a construction bond.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.31
- number: '2305.32'
  heading: Sponsoring employer in ridesharing arrangements not liable
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Ridesharing arrangement" means the transportation of persons in a motor vehicle
    where such transportation is incidental to another purpose of a volunteer driver
    and includes ridesharing arrangements known as carpools, vanpools, and buspools.

    (2) "Employer" has the same meaning as in section 4123.01 of the Revised Code.

    (B) An employer shall not be liable for injuries to passengers and other persons
    resulting from the operation or use of a motor vehicle, not owned, leased, or
    contracted for by the employer, in a ridesharing arrangement.

    (C) An employer shall not be liabile for injuries to passengers and other persons
    because the employer provides information, incentives, or otherwise encourages
    his employees to participate in ridesharing arrangements.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.32
- number: '2305.321'
  heading: Certain equine activities no liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Equine" means a horse, pony, mule, donkey, hinny, zebra, zebra hybrid, or
    alpaca.

    (2)(a) "Equine activity" means any of the following:

    (i) An equine show, fair, competition, performance, or parade that involves an
    equine and an equine discipline, including, but not limited to, dressage, a hunter
    and jumper show, grand prix jumping, a three-day event, combined training, a rodeo,
    driving, pulling, cutting, reining, team penning, barrel racing, polo, steeplechasing,
    English or western performance riding, endurance or nonendurance trail riding,
    western games, hunting, packing, and recreational riding;

    (ii) An equine or rider training, teaching, instructing, testing, or evaluating
    activity, including, but not limited to, a clinic, seminar, or symposium;

    (iii) The boarding or an equine, including, but not limited to, normal daily care
    of an equine;

    (iv) The trailering, loading, unloading, or transporting of an equine;

    (v) The riding, inspecting, or evaluating of an equine owned by another person,
    regardless of whether the owner has received anything of value for the use of
    the equine or is permitting a prospective purchaser of the equine to ride, inspect,
    or evaluate it;

    (vi) A ride, trip, hunt, branding, roundup, cattle drive, or other activity that
    involves an equine and that is sponsored by an equine activity sponsor, regardless
    of whether the activity is formal, informal, planned, or impromptu;

    (vii) The placing or replacing of horseshoes on an equine, the removing of horseshoes
    from an equine, or the trimming of the hooves of an equine;

    (viii) The provision of or assistance in the provision of veterinary treatment
    or maintenance care for an equine;

    (ix) The conducting of procedures or assistance in the conducting of procedures
    necessary to breed an equine by means of artificial insemination or otherwise.

    (b) "Equine activity" does not include horse or mule racing.

    (3) "Equine activity participant" means a person who engages in any of the following
    activities, regardless of whether the person is an amateur or a professional or
    whether a fee is paid to participate in the particular activity:

    (a) Riding, training, driving, or controlling in any manner an equine, whether
    the equine is mounted or unmounted;

    (b) Being a passenger upon an equine;

    (c) Providing medical treatment to an equine;

    (d) Conducting procedures of assisting in conducting procedures necessary to breed
    an equine by means of artificial insemination or otherwise;

    (e) Assisting a person who is engaged in an activity described in division (A)(3)(a),
    (b), (c), or (d) of this section;

    (f) Sponsoring an equine activity;

    (g) Being a spectator at an equine activity.

    (4) "Equine activity sponsor" means either of the following persons:

    (a) A person who, for profit or not for profit, sponsors, organizes, or provides
    a facility for an equine activity, including, but not limited to, a pony club,
    4-H club, hunt club, riding club, or therapeutic riding program, or a class, program,
    or activity that is sponsored by a school, college, or university;

    (b) An operator or promoter of, or an instructor at, an equine facility, such
    as a stable, clubhouse, pony ride, fair training facility, show ground, or arena
    at which an equine activity is held.

    (5) "Equine professional" means a person who engages for compensation in any of
    the following activities:

    (a) Training, teaching, instructing, testing, or evaluating an equine or an equine
    activity participant;

    (b) Renting to an equine activity participant an equine for the purpose of riding,
    driving, or being a passenger upon an equine;

    (c) Renting equipment or tack to an equine activity participant for use in an
    equine activity;

    (d) Providing daily care to an equine boarded at an equine activity;

    (e) Providing or assisting in providing veterinary treatment or maintenance care
    to an equine;

    (f) Conducting procedures or assisting in conducting procedures necessary to breed
    an equine by means of artificial insemination or otherwise.

    (6) "Harm" means injury, death, or loss to person or property.

    (7) "Inherent risk of an equine activity" means a danger or condition that is
    an integral part of an equine activity, including, but not limited to, any of
    the following:

    (a) The propensity of an equine to behave in ways that may result in injury, death,
    or loss to persons on or around the equine;

    (b) The unpredictability of an equine''s reaction to sounds, sudden movement,
    unfamiliar objects, persons, or other animals;

    (c) Hazards, including, but not limited to, surface or subsurface conditions;

    (d) A collision with another equine, another animal, a person, or an object;

    (e) The potential of an equine activity participant to act in a negligent manner
    that may contribute to injury, death, or loss to the person of the participant
    or to other persons, including, but not limited to, failing to maintain control
    over an equine or failing to act within the ability of the participant.

    (8) "Person" has the same meaning as in section 1.59 of the Revised Code and additionally
    includes governmental entities.

    (9) "Tort action" means a civil action for damages for injury, death, or loss
    to person or property. "Tort action" does not include a civil action for damages
    for a breach of contract or another agreement between persons.

    (10) "Veterinarian" means a person who is licensed to practice veterinary medicine
    in this state pursuant to chapter 4741. of the Revised Code.

    (B)(1) Except as provided in division (B)(2) of this section and subject to division
    (C) of this section, an equine activity sponsor, equine activity participant,
    equine professional, veterinarian, farrier, or other person is not liable in damages
    in a tort or other civil action for harm that an equine activity participant allegedly
    sustains during an equine activity and that results from an inherent risk of an
    equine activity. Except as provided in division (B)(2) of this section and subject
    to division (C) of this section, an equine activity participant or the personal
    representative of an equine activity participant does not have a claim or cause
    of action upon which a recovery of damages may be based against, and may not recover
    damages in a tort or other civil action against, an equine activity sponsor, another
    equine activity participant, an equine professional, a veterinarian, a farrier,
    or another person for harm that the equine activity participant allegedly sustained
    during an equine activity and that resulted from an inherent risk of an equine
    activity.

    (2) The immunity from tort or other civil liability conferred by division (B)(1)
    of this section is forfeited if any of the following circumstances applies:

    (a) An equine activity sponsor, equine activity participant, equine professional,
    veterinarian, farrier, or other person provides to an equine activity participant
    faulty or defective equipment or tack and knows or should know that the equipment
    or tack is faulty or defective, and the fault or defect in the equipment or tack
    proximately causes the harm involved.

    (b) An equine activity sponsor, equine activity participant, equine professional,
    veterinarian, farrier, or other person provides an equine to an equine activity
    participant and fails to make reasonable and prudent efforts to determine the
    equine activity participant''s ability to safely engage in the equine activity
    or to safely manage the equine based on the equine activity participant''s representations
    of the participant''s ability, the equine activity participant fails to safely
    engage in the equine activity or to safely manage the equine, and that failure
    proximately causes the harm involved.

    (c) The harm involved is proximately caused by a dangerous latent condition of
    the land on which or the premises at which the harm occurs, and equine activity
    sponsor, equine activity participant, equine professional, veterinarian, farrier,
    or other person owns, leases, rents, or otherwise lawfully possesses and controls
    the land or premises and knows or should know of the dangerous latent condition,
    but does not post conspicuously prior to the time of the harm involved one or
    more signs that warn of the dangerous latent condition.

    (d) An act or omission of an equine activity sponsor, equine activity participant,
    equine professional, veterinarian, farrier, or other person constitutes a willful
    or wanton disregard for the safety of an equine activity participant and proximately
    causes the harm involved.

    (e) An equine activity sponsor, equine activity participant, equine professional,
    veterinarian, farrier, or other person intentionally causes the harm involved.

    (C)(1) Notwithstanding the immunity conferred by division (B)(1) of this section
    and the grounds for its forfeiture specified in division (B)(2) of this section,
    subject to divisions (C)(2)(b) and (3) of this section, an equine activity sponsor,
    equine activity participant, equine professional, veterinarian, farrier, or other
    person is not liable in damages in a tort or other civil action for harm that
    an equine activity participant allegedly sustains during an equine activity and
    that results from an inherent risk of an equine activity if that equine activity
    participant or a parent, guardian, custodian, or other legal representative of
    that equine activity participant voluntarily executes, prior to the occurrence
    of the harm involved, a written waiver as described in division (C)(2) of this
    section. Subject to divisions (C)(2)(b) and (C)(3) of this section, the equine
    activity participant who is the subject of that waiver or the parent, guardian,
    custodian, or other legal representative of the equine activity participant who
    is the subject of that waiver does not have a claim or cause of action upon which
    a recovery of damages may be based against, and may not recover damages in a tort
    or other civil action against, and equine activity sponsor, another equine activity
    participant, an equine professional, a veterinarian, a farrier, or another person
    in whose favor the waiver was executed.

    (2)(a) A valid waiver for purposes of division (C)(1) of this section shall be
    in writing and subscribed by the equine activity participant or the parent, guardian,
    custodian, or other legal representative of the equine activity participant, and
    shall specify at least each inherent risk of an equine activity that is listed
    in divisions (A)(7)(a) to (e) of this section and that will be a subject of the
    waiver of tort or other civil liability.

    (b) A waiver in the form described in division (C)(2)(a) of this section shall
    remain valid until it is revoked in the manner described in division (C)(3) of
    this section. Unless so revoked, such a waiver that pertains to equine activities
    sponsored by a school, college, or university shall apply to all equine activities
    in which the equine activity participant who is the subject of the waiver is involved
    during the twelve-month period following the execution of the waiver.

    (3) A valid waiver in the form described in division (C)(2)(a) of this section
    may be revoked in writing by the equine activity participant or the parent, guardian,
    custodian, or other legal representative of the equine activity participant who
    executed the waiver. The revocation of the waiver does not affect the availability
    of the immunity conferred by division (B)(1) of this section.

    (D)(1) This section does not create a new cause of action or substantive legal
    right against an equine activity sponsor, equine activity participant, equine
    professional, veterinarian, farrier, or other person.

    (2) This section does not affect the availability in appropriate circumstances
    of a civil action based on a product liability claim under sections 2307.71 to
    2307.801 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.321
- number: '2305.33'
  heading: Physician reporting to public transportation employer employee's use of
    a drug of abuse no liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Bus" has the same meaning as in section 4511.78 of the Revised Code.

    (2) "Business of public transportation" means a business that includes among its
    functions the transporting of passengers in interstate or intrastate commerce
    by aircraft, railroad train, school or other bus, taxicab, or other type of common
    carrier, whether or not a charge is imposed for the transportation. "Business
    of public transportation" includes, but is not limited to, an Ohio transit system.

    (3) "Civil action" means a tort or contract action for damages for harm.

    (4) "Employee" means an individual who is employed by an employer to operate any
    aircraft, railroad train, school or other bus, taxicab, or other type of common
    carrier.

    (5) "Employer" means a person that is engaged in the business of public transportation.

    (6) "Harm" means injury, death, or loss to person or property.

    (7) "Ohio transit system" means a county transit system operated in accordance
    with sections 306.01 to 306.13 of the Revised Code, a regional transit authority
    operated in accordance with sections 306.30 to 306.71 of the Revised Code, a regional
    transit commission operated in accordance with sections 306.80 to 306.90 of the
    Revised Code, any municipally owned transportation system, and any mass transit
    company that operates exclusively within the territorial limits of a municipal
    corporation, or within the territorial limits of a municipal corporation and one
    or more municipal corporations immediately contiguous to that municipal corporation.

    (8) "Physician" means a person who is licensed pursuant to Chapter 4731. of the
    Revised Code to practice medicine or surgery or osteopathic medicine and surgery.

    (9) "Prescription" has the same meaning as in section 4729.01 of the Revised Code.

    (10) "School bus" has the same meaning as in section 4511.01 of the Revised Code.

    (11) "Tort action" means a civil action for damages for injury, death, or loss
    to person or property, other than a civil action for damages for a breach of contract
    or another agreement between persons. "Tort action" includes, but is not limited
    to, a civil action for damages against a physician on the ground of a breach of
    the confidentiality of the physician-patient relationship.

    (B) A physician is not liable in damages in a civil action for harm that allegedly
    is incurred by an employee as a result of the physician reporting any of the following
    to the employer of the employee:

    (1) The physician has determined that the employee is using a drug of abuse dispensed
    pursuant to a prescription and that the employee''s use of the drug of abuse represents
    a potential risk of harm to passengers on any aircraft, railroad train, school
    or other bus, taxicab, or other type of common carrier operated by the employee;

    (2) The physician has determined that the employee is using a drug of abuse otherwise
    than pursuant to a prescription.

    (3) The physician has determined that the employee has a condition, other than
    one involving the use of a drug of abuse, that represents a potential risk of
    harm to passengers on any aircraft, railroad train, school or other bus, taxicab,
    or other type of common carrier operated by the employee.

    (C)(1) This section does not create, and shall not be construed as creating, a
    new cause of action or substantive legal right against a physician and in favor
    of an employee who was a patient of the physician, who was the subject of a report
    described in division (B) of this section, and who allegedly sustained harm as
    a result of the report, or in favor of any other person who allegedly sustained
    harm as a result of the report.

    (2) This section does not impose, and shall not be construed as imposing, a duty
    upon a physician to make a report as described in division (B) of this section
    to an employer of an employee who the physician determines is using a drug of
    abuse dispensed pursuant to a prescription or is using a drug of abuse other than
    pursuant to a prescription, or who the physician determines has a condition, other
    than one involving the use of a drug of abuse, that represents a potential risk
    of harm to passengers on the type of common carrier operated by the employee.

    (3) This section does not affect and shall not be construed as affecting, any
    immunities from civil liability or defenses established by another section of
    the Revised Code or available at common law, to which a physician may be entitled.

    (D) In the event that a physician makes a report described in division (B) of
    this section, the physician also shall make a report to the employee who was the
    subject of the report. If the report to the employer is in writing, the report
    to the employee shall be in writing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.33
- number: '2305.34'
  heading: Hydrant failure of nonprofit corporation or water and sewer district no
    liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) Neither a nonprofit corporation organized under Chapter 1702. of the
    Revised Code that owns or operates a water supply or waterworks that regularly
    serves persons located outside a municipal corporation nor a regional water and
    sewer district organized under Chapter 6119. of the Revised Code is liable in
    damages in a civil action for injury, death, or loss to person or property that
    allegedly arises from the failure of a hydrant controlled by the corporation or
    district to provide a sufficient quantity of water or sufficient water pressure
    to adequately suppress a fire of any size, regardless of whether the hydrant was
    designed for use as a fire hydrant or whether a fire department uses the hydrant
    with the permission of the corporation or district. All low-pressure hydrants
    in a municipal corporation or regional water and sewer district shall be designated
    as such by being painted a conspicuous color distinguishing low-pressure hydrants
    from high-pressure hydrants in the municipal corporation or regional water and
    sewer district.

    (B) This section does not create, and shall not be construed as creating, a new
    cause of action against or substantive legal right against a nonprofit corporation
    described in division (A) of this section or a regional water and sewer district.

    (C) This section does not affect, and shall not be construed as affecting, any
    immunities from civil liability or defenses established by any other provisions
    of the Revised Code, including, without limitation, Chapter 2744. of the Revised
    Code in the case of a regional water and sewer district, or any immunities from
    civil liability or defenses available at common law, to which a nonprofit corporation
    described in division (A) of this section or a regional water and sewer district
    may be entitled under circumstances not covered by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.34
- number: '2305.35'
  heading: Donor not liable for injuries to gleaner
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Agency" has the same meaning as in section 2305.37 of the Revised Code.

    (2) "Donor" means an owner, lessee, renter, or operator of a farm or other real
    property who gives permission to a gleaner to enter the property to salvage free-of-charge
    food items remaining on the property for subsequent donations of the food items
    to, or subsequent distributions of the food items by, an agency or nonprofit organization.

    (3) "Gleaner" means any person that, with the permission of the owner, lessee,
    renter, or operator of a farm or other real property, enters the property to salvage
    free-of-charge food items remaining on the property for subsequent donations of
    the food items to, or subsequent distributions of the food items by, an agency
    or nonprofit organization.

    (4) "Hazard" means a risk of serious physical harm to persons or property.

    (5) "Nonprofit organization" means a corporation, association, group, institution,
    society, or other organization that is exempt from federal income taxation under
    section 501(c)(3) of the "Internal Revenue Code of 1986," 100 Stat. 2085, 26 U.S.C.
    501(c)(3), as amended.

    (6) "Tort action" means a civil action for damages for injury, death, or loss
    to person or property. "Tort action" includes a product liability claim that is
    subject to sections 2307.71 to 2307.80 of the Revised Code but does not include
    a civil action for damages for a breach of contract or another agreement between
    persons.

    (B)(1) Except as provided in division (B)(2) of this section, a donor is not liable
    in damages to any person in a tort action for injury, death, or loss to person
    or property sustained by a gleaner as a result of any of the following:

    (a) Any condition of the farm or other real property on which the gleaner is salvaging
    food items;

    (b) Any normal agricultural operations occurring on the farm or other real property
    on which the gleaner is salvaging food items;

    (c) Any risks of physical harm to persons or property involved in salvaging the
    food items the gleaner is salvaging.

    (2) The immunity described in division (B)(1) of this section does not apply to
    a donor in a tort action for injury, death, or loss to person or property sustained
    by a gleaner as a result of any condition, operations, or risks described in division
    (B)(1)(a), (b), or (c) of this section if the injury, death, or loss to person
    or property sustained by the gleaner was caused by any of the following actions
    or omissions:

    (a) An action or omission of the donor that constitutes negligence, if that negligence
    involves one or both of the following:

    (i) The failure of the donor to warn the gleaner of a hazard of which the donor
    had actual knowledge prior to the gleaner entering the property;

    (ii) The creation or enhancement of a hazard by the donor prior to the gleaner
    entering the property.

    (b) An action or omission of the donor that constitutes willful or wanton misconduct
    or intentionally tortious conduct;

    (c) An action or omission of an employee of the donor, a family member of the
    donor or another person associated with the donor that is imputable to the donor
    and that constitutes negligence, if that negligence involves one or both of the
    following:

    (i) The failure of the employee, family member, or other associated person to
    warn the gleaner of a hazard of which the employee, family member, or other associated
    person had actual knowledge prior to the gleaner entering the property;

    (ii) The creation or enhancement of a hazard by the employee, family member, or
    other associated person prior to the gleaner entering the property.

    (d) An action or omission of an employee of the donor, a family member of the
    donor, or another person associated with the donor, that is imputable to the donor
    and that constitutes willful or wanton misconduct.

    (C)(1) This section does not create a new cause of action or substantive legal
    right against donors.

    (2) This section does not affect any immunities from or defenses to tort liability
    established by another section of the Revised Code or available at common law,
    to which donors may be entitled under circumstances not covered by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.35
- number: '2305.36'
  heading: Limited immunity for injury due to cumulative consumption, weight gain,
    or obesity
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Cumulative consumption" means, with respect to a health condition, any health
    condition, including, but not limited to, increased cholesterol, heart disease,
    or high blood pressure, that is caused by successive consumption of a qualified
    product.

    (2) "Person engaged in the business" means a person who manufactures, markets,
    distributes, advertises, or sells a qualified product in the regular course of
    the person''s trade or business.

    (3) "Manufacturer" and "supplier" have the same meanings as in section 2307.71
    of the Revised Code.

    (4) "Qualified product" means all of the following:

    (a) Articles used for food or drink for a human being or other animal;

    (b) Chewing gum;

    (c) Articles used for components of any article listed in division (A)(4)(a) or
    (b) of this section.

    (5) "Seller" means, with respect to a qualified product, a person lawfully engaged
    in the business of marketing, distributing, advertising, or selling the product.

    (6) "Trade association" means any association or business organization that is
    not operated for profit and in which two or more members of the trade association
    are manufacturers, marketers, distributors, advertisers, or sellers of a qualified
    product.

    (B) Except as provided in division (D) of this section, no manufacturer, seller,
    or supplier of a qualified product and no trade association is liable for injury,
    death, or loss to person or property for damages, is subject to an action for
    declaratory judgment, injunctive relief, or declaratory relief, or is responsible
    for restitution, damages, or other relief arising out of, resulting from, or related
    to cumulative consumption, weight gain, obesity, or any health condition that
    is related to cumulative consumption, weight gain, or obesity.

    (C) A party that prevails on a motion to dismiss an action under division (B)
    of this section may recover reasonable attorney''s fees and costs that the party
    incurred in connection with the motion to dismiss.

    (D) The immunity from liability provided in division (B) of this section does
    not apply to any of the following if it, alone or in combination with any of the
    following, was the predominate proximate cause of the claim of injury, death,
    or loss resulting from cumulative consumption, weight gain, obesity, or any health
    condition that is related to cumulative consumption, weight gain, or obesity:

    (1) The misbranding of the qualified product involved;

    (2) Any knowing and willful violation of state or federal law that applies to
    the qualified product involved;

    (3) Any breach of express contract or breach of express warranty in connection
    with the purchase of the qualified product involved.

    (E) Nothing in this section shall be construed as creating any new cause of action
    for a claim of injury, death, or loss resulting from a person''s cumulative consumption,
    weight gain, obesity, or any health condition that is related to cumulative consumption,
    weight gain, or obesity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.36
- number: '2305.37'
  heading: Person donating perishable food for distribution to needy individuals not
    liable for harm
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Agency" means any nonhospital, charitable nonprofit corporation that is organized
    and operated pursuant to Chapter 1702. of the Revised Code and that satisfies
    all of the following, or any nonhospital, charitable association, group, institution,
    organization, or society that is not organized and not operated for profit and
    that satisfies all of the following:

    (a) It distributes consumer goods or perishable food, directly or indirectly,
    to individuals in need.

    (b) It does not charge or accept any form of compensation from the individuals
    in need for the distribution of the consumer goodsto them.

    (c) It does not charge for the distribution of perishable food to individuals
    in need, or it does not charge individuals in need more than an amount sufficient
    to cover the cost of handling the perishable food distributed to them.

    (2) "At-cost" means the perishable food handling costs incurred by an agency.

    (3) "Consumer goods" means items of tangible personal property other than food
    that are used primarily for personal, family, or household purposes.

    (4) "Food service operation" has the same meaning as in section 3717.01 of the
    Revised Code.

    (5) "Food that is gleaned" means perishable food that remains on a farm or other
    real property and that the owner, lessee, renter, or operator of the property
    permits one or more persons to salvage free-of-charge for subsequent donation
    to one or more agencies.

    (6) "Harm" means injury, death, or loss to person or property.

    (7) "Hospital" has the same meaning as in section 3701.01, 3727.01, or 5122.01
    of the Revised Code.

    (8) "Individuals in need" means those persons who an agency determines are eligible
    to receive free distributions of consumer goods or free or at-cost distributions
    of perishable food because of poverty, illness, disability, infancy, or other
    conditions or circumstances that may result in persons having a need to receive
    such distributions.

    (9) "Perishable food" means any food that may spoil or otherwise become unfit
    for human consumption because of its nature, age, or physical condition. "Perishable
    food" includes, but is not limited to, fresh meats, processed meats, poultry,
    fish and other seafood, dairy products, bakery products, eggs in the shell, fresh
    fruits, fresh vegetables, food that is gleaned, food that is packaged, refrigerated,
    or frozen, food that is canned, and prepared or other food that has not been served
    by a restaurant, cafeteria, hospital, hotel, caterer, or other food service operation
    to any customer, patient, or other person in the ordinary course of business,
    by a public or private school, college, university, or other educational institution
    to a student or another person on the premises in the ordinary course of the operation
    of the institution, or by a fraternal, veteran''s, or other organization to its
    members or other persons on the premises in the ordinary course of the operation
    of the organization.

    (10) "Person" has the same meaning as in section 1.59 of the Revised Code and
    additionally includes governmental entities and federal instrumentalities.

    (11) "Sale date" means the date by which the manufacturer, processor, or packager
    of a packaged food product recommends that the food product be sold for consumption
    based on the food product''s quality assurance period.

    (12) "Tort action" means a civil action for damages for injury, death, or loss
    to person or property. "Tort action" includes a product liability claim that is
    subject to sections 2307.71 to 2307.80 of the Revised Code but does not include
    a civil action for a breach of contract or another agreement between persons.

    (B) Notwithstanding Chapter 3715. of the Revised Code, a person who, in good faith,
    donates perishable food to an agency is not liable in damages in a tort action
    for harm that allegedly arises because that perishable food, when distributed
    by the agency or any other agency to a particular individual in need, is not fit
    for human consumption, if both of the following apply:

    (1) Prior to the donation of the perishable food to the agency, the person determines
    that the perishable food will be fit for human consumption at the time of its
    donation. A presumption favoring liability does not arise because the perishable
    food is donated to an agency on or after an applicable sale date.

    (2) The person does not make the determination that the perishable food will be
    fit for human consumption at the time of its donation to the agency in a manner
    that constitutes gross negligence or willful or wanton misconduct.

    (C) A person who, in good faith, donates consumer goods to an agency is not liable
    in damages in a tort action for harm that allegedly arises because those consumer
    goods are not fit for use at the time the agency or any other agency distributes
    them to a particular individual in need, if both of the following apply:

    (1) Prior to the donation of the consumer goods to the agency, the person determines
    that the consumer goods will be fit for use at the time of their donation. A presumption
    favoring liability does not arise because the consumer goods are in packaging
    that has been damaged.

    (2) The person does not make the determination that the consumer goods will be
    fit for use at the time of their donation to the agency in a manner that constitutes
    gross negligence or willful or wanton misconduct.

    (D) Notwithstanding Chapter 3715. of the Revised Code, an agency that, in good
    faith, distributes consumer goods or perishable food to a particular individual
    in need is not liable in damages in a tort action for harm that allegedly arises
    because those consumer goods are not fit for use or that perishable food is not
    fit for human consumption if both of the following apply:

    (1) Prior to the distribution of the consumer goods or perishable food to the
    individual, the agency determines that the consumer goods will be fit for use
    or the perishable food will be fit for human consumption at the time of its distribution.
    A presumption favoring liability does not arise because the consumer goods are
    in packaging that has been damaged or because the perishable food is distributed
    to an individual on or after an applicable sale date.

    (2) The agency does not make the determination that the consumer goods will be
    fit for use or the perishable food will be fit for human consumption at the time
    of its distribution to the individual in a manner that constitutes gross negligence
    or willful or wanton misconduct.

    (E)(1) This section does not create a new cause of action or substantive legal
    right against persons who donate consumer goods or perishable food to an agency
    or against agencies that distribute consumer goods or perishable food to an individual
    in need.

    (2) This section does not affect any immunities from or defenses to tort liability
    established by another section of the Revised Code or available at common law
    to which persons who donate consumer goods or perishable food other than to agencies,
    or to which agencies that distribute consumer goods or perishable food other than
    to individuals in need, may be entitled.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.37
- number: '2305.38'
  heading: Uncompensated volunteers of nonprofit charitable organizations no liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Charitable organization" means either of the following:

    (a) Any charitable nonprofit corporation that is organized and operated pursuant
    to Chapter 1702. of the Revised Code, including, but not limited to, any such
    corporation whose articles of incorporation specify that it is organized and to
    be operated for an education-related purpose;

    (b) Any charitable association, group, institution, or society that is not organized
    and not operated for profit, including, but not limited to, any such association,
    group, institution, or society that is organized and operated for any education-related
    purpose.

    (2) "Compensation" does not include actual and necessary expenses that are incurred
    by a volunteer in connection with the services that the volunteer performs for
    a charitable organization, and that are reimbursed to the volunteer or otherwise
    paid.

    (3) "Corporate services" means services that are performed by a volunteer who
    is associated with a charitable organization as defined in division (A)(1)(a)
    of this section and that reflect duties or responsibilities arising under Chapter
    1702. of the Revised Code.

    (4) "Supervisory services" means services that are performed by a volunteer who
    is associated with a charitable organization as defined in division (A)(1)(a)
    or (b) of this section and that involve duties and responsibilities in connection
    with the supervision of one or more officers, employees, trustees, or other volunteers
    of that charitable organization.

    (5) "Volunteer" means an officer, trustee, or other person who performs services
    for a charitable organization but does not receive compensation, either directly
    or indirectly, for those services.

    (B) A volunteer is not liable in damages in a civil action for injury, death,
    or loss to person or property that arises from the actions or omissions of any
    of the officers, employees, trustees, or other volunteers of the charitable organization
    for which the volunteer performs services, unless either of the following applies:

    (1) With prior knowledge of an action or omission of a particular officer, employee,
    trustee, or other volunteer, the volunteer authorizes, approves, or otherwise
    actively participates in that action or omission.

    (2) After an action or omission of a particular officer, employee, trustee, or
    other volunteer, the volunteer, with full knowledge of that action or omission,
    ratifies it.

    (C) A volunteer is not liable in damages in a civil action for injury, death,
    or loss to person or property that arises from the volunteer''s actions or omissions
    in connection with any supervisory or corporate services that the volunteer performs
    for the charitable organization, unless either of the following applies:

    (1) An action or omission of the volunteer involves conduct as described in division
    (B)(1) or (2) of this section;

    (2) An action or omission of the volunteer constitutes willful or wanton misconduct
    or intentionally tortious conduct.

    (D) A volunteer is not liable in damages in a civil action for injury, death,
    or loss to person or property that arises from the volunteer''s actions or omissions
    in connection with any nonsupervisory or noncorporate services that the volunteer
    performs for the charitable organization, unless either of the following applies:

    (1) An action or omission of the volunteer involves conduct as described in division
    (B)(1) or (2) of this section;

    (2) An action or omission of the volunteer constitutes negligence, willful or
    wanton misconduct, or intentionally tortious conduct.

    (E)(1) This section does not create a new cause of action or substantive legal
    right against a volunteer.

    (2) This section does not affect any immunities from civil liability or defenses
    established by another section of the Revised Code or available at common law,
    to which a volunteer may be entitled under circumstances not covered by this section.
    This section does not diminish in any respect the immunities provided in section
    2305.251 of the Revised Code. The immunities conferred upon volunteers in this
    section are not intended to affect the liability of a charitable organization
    in a civil action for injury, death, or loss to person or property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.38
- number: '2305.39'
  heading: Non-responsible persons responding to oil spill not liable
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Damages" means damages of any kind for which liability may exist under the
    laws of this state resulting from, arising out of, or related to the discharge
    or threatened discharge of oil.

    (2) "Discharge" means an intentional or unintentional emission of oil into or
    upon the navigable waters located within this state or the adjoining shorelines
    of such navigable waters, including spilling, leaking, pumping, pouring, emitting,
    emptying, or dumping. "Discharge" does not include natural seepage.

    (3) "Federal on-scene coordinator" means the federal official designated in the
    national contingency plan.

    (4) "National contingency plan" means the plan prepared and published under the
    "Federal Water Pollution Control Act," 33 U.S.C.A. 1321(d), as amended by the
    "Oil Pollution Act of 1990," Pub. L. No. 101-380, 104 Stat. 484.

    (5) "Oil" means oil of any kind or in any form, including petroleum, fuel oil,
    sludge, oil refuse, and oil mixed with wastes other than dredged spoil. "Oil"
    does not include petroleum, including crude oil or any fraction thereof that is
    specifically a hazardous substance identified or listed in rules adopted under
    division (B)(1)(c) of section 3750.02 of the Revised Code.

    (6) "Person" has the same meaning as in section 1.59 of the Revised Code and additionally
    includes governmental entities.

    (7) "Removal costs" means the costs of containing and removing oil that are incurred
    after a discharge of oil has occurred or, when there is a substantial threat of
    a discharge of oil, the costs of preventing, minimizing, or mitigating oil pollution
    arising from the incident, including the costs of taking other actions as may
    be necessary to minimize or mitigate damage to the public health or welfare, and
    damage to fish, shellfish, wildlife, and public and private property, including
    shorelines and beaches.

    (8) "Responsible party" has the same meaning as in the "Oil Pollution Act of 1990,"
    Pub. L. No. 101-380, 104 Stat. 486, 33 U.S.C.A. 2701.

    (9) "Navigable waters" has the same meaning as in the "Federal Water Pollution
    Act Amendments of 1972," 86 Stat. 816, 33 U.S.C.A. 1251, as amended.

    (B) Notwithstanding any other provision of law, a person, other than a responsible
    party, is not liable for removal costs or damages that result from an act or omission
    in the course of rendering care, assistance, or advice consistent with the national
    contingency plan, or as otherwise directed by the federal on-scene coordinator
    or by a state official with responsibility for responding to a discharge. Division
    (B) of this section does not apply to acts or omissions of the person constituting
    gross negligence or reckless or willful misconduct.

    (C)(1) This section does not limit or affect the liability of a responsible party.
    A responsible party is liable for removal costs or damages resulting from the
    act or omission of a person who is relieved of liability under division (B) of
    this section.

    (2) This section does not limit or affect the liability of any person for personal
    injury or wrongful death.

    (3) This section does not create a new cause of action or substantive legal right
    against any person resulting from an act or omission in the course of responding
    to a discharge.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.39
- number: '2305.40'
  heading: Owner, lessee, or renter of real property not liable to trespasser
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Firearm" has the same meaning as in section 2923.11 of the Revised Code.

    (2) "Tort action" means a civil action for damages for injury, death, or loss
    to person or property other than a civil action for damages for a breach of contract
    or another agreement between persons.

    (3) "Vehicle" has the same meaning as in section 4501.01 of the Revised Code.

    (B)(1) The owner, lessee, or renter of real property or a member of the owner''s,
    lessee''s, or renter''s family who resides on the property is not liable in damages
    to a trespasser on the property, to a member of the family of the trespasser,
    or to any other person in a tort action for injury, death, or loss to person or
    property of the trespasser that allegedly is caused by the owner, lessee, renter,
    or family member if, at the time the injury, death, or loss to person or property
    allegedly is caused, all of the following apply:

    (a) The owner, lessee, renter, or family member is inside a building or other
    structure on the property that is maintained as a permanent or temporary dwelling;

    (b) The trespasser has made, is making, or is attempting to make an unlawful entry
    into the building or other structure described in division (B)(1)(a) of this section;

    (c) The owner, lessee, renter, or family member uses reasonably necessary force
    to repel the trespasser from the building or other structure described in division
    (B)(1)(a) of this section or to prevent the trespasser from making the unlawful
    entry into that building or other structure.

    (2) For purposes of the immunity created by division (B)(1) of this section, reasonably
    necessary force to repel a trespasser from a building or other structure that
    is maintained as a permanent or temporary dwelling or to prevent a trespasser
    from making an unlawful entry into a building or other structure of that nature
    may include the taking of or attempting to take the trespasser''s life, or causing
    or attempting to cause physical harm or serious physical harm to the person of
    the trespasser, if the owner, lessee, or renter of real property or a member of
    the owner''s, lessee''s, or renter''s family who resides on the property has a
    reasonable good faith belief that the owner, lessee, or renter or a member of
    the owner''s, lessee''s, or renter''s family is in imminent danger of death or
    serious physical harm to person and that the only means to escape from the imminent
    danger is to use deadly force or other force that likely will cause physical harm
    or serious physical harm to the person of the trespasser, even if the owner, lessee,
    renter, or family member is mistaken as to the existence or imminence of the danger
    of death or serious physical harm to person.

    (3) In order to qualify for the immunity created by division (B)(1) of this section,
    an owner, lessee, or renter of real property or a member of the owner''s, lessee''s,
    or renter''s family who resides on the property is not required to retreat from
    a building or other structure that is maintained as a permanent or temporary dwelling
    prior to using reasonably necessary force to repel a trespasser from the building
    or other structure or to prevent a trespasser from making an unlawful entry into
    the building or other structure.

    (C) The owner, lessee, or renter of real property or a member of the owner''s,
    lessee''s, or renter''s family who resides on the property is not liable in damages
    to a trespasser on the property, to a member of the family of the trespasser,
    or to any other person in a tort action for injury, death, or loss to person or
    property of the trespasser that allegedly is caused by the owner, lessee, renter,
    or family member under circumstances not covered by division (B)(1) of this section
    if, at the time the injury, death, or loss to person or property allegedly is
    caused, none of the following applies:

    (1) The injury, death, or loss to person or property is caused by a physical assault
    of the owner, lessee, renter, or family member upon the trespasser other than
    in self-defense or defense of a third person.

    (2) Self-defense or defense of a third person is not involved, and the injury,
    death, or loss to person or property is caused by a vehicle driven or otherwise
    set in motion, a firearm shot, or any other item of tangible personal property
    held, driven, set in motion, projected, or thrown by the owner, lessee, renter,
    or family member with the intent to cause injury, death, or loss to person or
    property of the trespasser or with the intent to cause the trespasser to believe
    that the owner, lessee, renter, or family member would cause injury, death, or
    loss to person or property of the trespasser.

    (3) Under circumstances not described in division (C)(1) or (2) of this section,
    self-defense or defense of a third person is not involved, and the owner, lessee,
    renter, or family member intends to create a risk of injury, death, or loss to
    person or property of any trespasser by direct or indirect means, including, but
    not limited to, the use of spring guns, traps, or other dangerous instrumentalities.

    (D)(1) This section does not create a new cause of action or substantive legal
    right against the owner, lessee, or renter of real property or a member of the
    owner''s, lessee''s, or renter''s family who resides on the property.

    (2) This section does not affect any civil liability under another section of
    the Revised Code or the common law of this state of an owner, lessee, or renter
    of real property or a member of the owner''s, lessee''s, or renter''s family who
    resides on the property with respect to individuals other than trespassers, including,
    but not limited to, civil liability to invitees or licensees.

    (3) This section does not affect any immunities from or defenses to civil liability
    established by another section of the Revised Code or available at common law
    to which the owner, lessee, or renter of real property or a member of the owner''s,
    lessee''s, or renter''s family who resides on the property may be entitled with
    respect to individuals other than trespassers, including, but not limited to,
    immunities from or defenses to civil liability to invitees or licensees.

    (4) This section does not affect any criminal liability that the owner, lessee,
    or renter of real property or a member of the owner''s, lessee''s, or renter''s
    family who resides on the property may have for injury, death, or loss to person
    or property of a trespasser, invitee, or licensee on the property.

    (5) This section does not affect any immunities from or defenses to civil liability
    established by another section of the Revised Code or available at common law
    to which an individual other than the owner, lessee, or renter of real property
    or a member of the owner''s, lessee''s, or renter''s family who resides on the
    property may be entitled in connection with injury, death, or loss to person or
    property of a trespasser on real property owned, leased, or rented by another
    person, including, but not limited to, self-defense or defense of third persons.'
