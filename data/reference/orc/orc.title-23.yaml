  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.33
- number: '2335.34'
  heading: Lists of unclaimed costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: On the first Monday of January, each year, the clerk of each court of common
    pleas and court of appeals, each probate judge, and each sheriff shall make two
    certified lists of causes in which money has been paid and has remained in the
    hands of that person or in the hands of a former clerk, probate judge, or sheriff,
    for one year next preceding that first Monday of January. The lists shall designate
    the amount of money and in whose hands it remains. One list shall be set up in
    a conspicuous place by the officer, in the officer's office, for the period of
    thirty days, and the other list shall be posted at a public area of the courthouse
    or published on the web site of the court or officer, on the second Monday of
    January, for the same period of time.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.34
- number: '2335.35'
  heading: Disposition of unclaimed fees and costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: '(A) All moneys, fees, costs, debts, and damages, remaining in the hands of
    the clerk of the court of common pleas or probate judge, and all unclaimed moneys,
    other than costs, remaining in the hands of the sheriff from the expiration of
    thirty days from the ending of the time of advertisement as provided by section
    2335.34 of the Revised Code, shall be paid by such officer or such officer''s
    successor to the county treasurer, on the order of the county auditor, except
    for unclaimed moneys that are for restitution payments for crime victims. Each
    such officer shall indicate each item in the officer''s cashbook and docket the
    disposition made thereof. Upon ceasing to be such officer, each clerk, probate
    judge, and sheriff shall immediately pay to the clerk''s, probate judge''s, or
    sheriff''s successor all money on hand as such officer.

    (B) All the moneys remaining unclaimed that are for restitution payments for crime
    victims shall be sent to the reparations fund created under section 2743.191 of
    the Revised Code, with a list from the clerk or other officer responsible for
    the collection and distribution of restitution payments specifying the amounts
    and individual identifying information of the funds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.35
