- number: '2305.26'
  heading: Action to enforce lien - limitations - notice of continuation
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) An action by the state or an agency or political subdivision of the state
    to enforce a lien upon real or personal property created under and by virtue of
    section 1901.21, 2505.13, 2937.25, 4123.76, 4123.78, 4141.23, 4509.60, or 5719.04
    of the Revised Code shall be brought within fifteen years from the date when the
    lien or notice of continuation of the lien has been filed in the office of the
    county recorder. The fifteen-year limitation period applies to liens and notices
    of continuation of liens filed before, on, or after the effective date of the
    amendment of this section by H.B. 699 of the 126th general assembly.

    (B)(1) Except as otherwise provided in division (B)(2) of this section, beginning
    February 1, 2007, a notice of continuation of lien may be filed in the office
    of the county recorder within six months prior to the expiration of the fifteen-year
    period following the original filing of the lien or the filing of the notice of
    continuation of the lien as specified in division (A) of this section. The notice
    must identify the original notice of lien and state that the original lien is
    still effective. Upon timely filing of a notice of continuation of lien, the effectiveness
    of the original lien is continued for fifteen years after the last date on which
    the lien was effective, whereupon it lapses, unless another notice of continuation
    of lien is filed prior to the lapse. Succeeding notices of continuation of lien
    may be filed in the same manner to continue the effectiveness of the original
    lien.

    (2) As used in division (B)(2) of this section, "interim period" means the period
    beginning September 26, 2003, and ending September 27, 2006.

    Division (B)(2) of this section applies only to liens enforceable by an action
    subject to the limitation of division (A) of this section on September 25, 2003,
    as this section existed on that date, and notice of continuation of which would
    have had to have been filed under division (B) of this section, as this section
    existed on that date, during the interim period if this section had been in effect
    during the interim period.

    Notice of continuation of such a lien may be filed as otherwise provided in division
    (B)(1) of this section, except the notice shall be filed within six months prior
    to the expiration of fifteen years following the expiration of the six-year period
    within which such notice was required to have been filed under this section as
    this section existed on September 25, 2003.

    (C) The recorder shall mark each notice of continuation of lien with a consecutive
    file number and with the date of filing and shall hold the notice open for public
    inspection. In addition, the recorder shall index the notices according to the
    names of the person against whom they are effective, and shall note in the index
    the file numbers of the notices. Except in cases of liens arising under section
    5719.04 of the Revised Code, the recorder shall mark the record of the original
    lien "continued" and note thereon the date on which the notice of continuation
    of lien was filed. The recorder may remove a lapsed lien or lapsed notice of continuation
    of lien from the file and destroy it.

    (D) A notice of continuation of lien must be signed and filed by the clerk of
    the court or the magistrate in cases of liens arising under sections 1901.21,
    2505.13, and 2937.25 of the Revised Code, by the industrial commission in cases
    of liens arising under sections 4123.76 and 4123.78 of the Revised Code, by the
    director of job and family services in cases of liens arising under section 4141.23
    of the Revised Code, by the registrar of motor vehicles in cases of liens arising
    under section 4509.60 of the Revised Code, and by the county auditor in cases
    of liens arising under section 5719.04 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.26
- number: '2305.28'
  heading: Peer or professional standards review committee or counseling and assistance
    committee of a professional organization not liable for actions taken
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section, "counseling and assistance committee" means
    a committee of a professional organization whose purpose is to render counseling
    and assistance to members of the profession whose personal or professional lives
    are or reasonably appear to be impaired by reason of substance abuse, chemical
    dependency, or mental illness.

    (B) No member or employee of a peer review committee, professional standards review
    committee, or counseling and assistance committee of a state or local professional
    organization composed of doctors of chiropractic, doctors of veterinary medicine,
    attorneys at law, real estate brokers, architects, professional engineers, certified
    public accountants, public accountants, or registered nurses is liable to any
    person for any action taken or recommendation made within the scope of the functions
    of the committee, if the committee member or employee acts without malice and
    in the reasonable belief that the action or recommendation is warranted by the
    facts known to him after reasonable effort to obtain the facts of the matter as
    to which the action is taken or recommendation is made.

    (C) Division (B) of this section also shall apply to any member or employee of
    a nonprofit corporation that is engaged in performing the functions of a peer
    review committee, professional standards review committee, or counseling and assistance
    committee of a state or local professional organization composed of doctors of
    chiropractic, doctors of veterinary medicine, attorneys at law, real estate brokers,
    architects, professional engineers, certified public accountants, public accountants,
    or registered nurses.

    (D) No person who provides information to a peer review committee, professional
    standards review committee, or counseling and assistance committee of a state
    or local professional organization as described in division (B) of this section,
    to a nonprofit corporation as described in division (C) of this section, or to
    a member or employee of such a peer review committee, professional standards review
    committee, counseling and assistance committee, or nonprofit corporation, without
    malice and in the reasonable belief that the information is warranted by the facts
    known to him is liable in damages in a civil action as a result of providing that
    information.'
  history: null
