    designated by this division as judges of the court of common pleas of Champaign
    county, domestic relations-juvenile-probate division, and the successors to those
    judges, shall have all the powers relating to probate courts in addition to the
    powers previously specified in this division and shall exercise jurisdiction over
    all matters that are within the jurisdiction of probate courts under Chapter 2101.,
    and other provisions, of the Revised Code in addition to the jurisdiction of the
    domestic relations-juvenile-probate division otherwise specified in division (DD)(1)
    of this section.

    (2) On and after February 9, 2009, all references in law to "the probate court,"
    "the probate judge," "the juvenile court," or "the judge of the juvenile court"
    shall be construed with respect to Champaign county as being references to the
    "domestic relations-juvenile-probate division" and as being references to the
    "judge of the domestic relations-juvenile-probate division." On and after February
    9, 2009, all references in law to "the clerk of the probate court" shall be construed
    with respect to Champaign county as being references to the judge who is serving
    pursuant to Rule 4 of the Rules of Superintendence for the Courts of Ohio as the
    administrative judge of the court of common pleas, domestic relations-juvenile-probate
    division.

    (EE) In Delaware county, the judge of the court of common pleas whose term begins
    on January 1, 2017, and successors, shall have the same qualifications, exercise
    the same powers and jurisdiction, and receive the same compensation as the other
    judges of the court of common pleas of Delaware county and shall be elected and
    designated as the judge of the court of common pleas, division of domestic relations.
    Divorce, dissolution of marriage, legal separation, and annulment cases, including
    any post-decree proceedings, and cases involving questions of paternity, custody,
    visitation, child support, and the allocation of parental rights and responsibilities
    for the care of children, regardless of whether those matters arise in post-decree
    proceedings or involve children born between unmarried persons, shall be assigned
    to that judge, except cases that for some special reason are assigned to another
    judge of the court of common pleas.

    (FF) In Hardin county:

    (1) The judge of the court of common pleas whose term begins on January 1, 2023,
    and successors, shall have the same qualifications, exercise the same powers and
    jurisdiction, and receive the same compensation as the other judge of the court
    of common pleas of Hardin county and shall be elected and designated as the judge
    of the court of common pleas, division of domestic relations. The judge shall
    have all of the powers relating to juvenile courts, and all cases under Chapter
    2151. or 2152. of the Revised Code, all parentage proceedings arising under Chapter
    3111. of the Revised Code over which the juvenile court has jurisdiction, all
    divorce, dissolution of marriage, legal separation, and annulment cases, civil
    protection orders issued under sections 2903.214 and 3113.31 of the Revised Code,
    all proceedings involving child support, the allocation of parental rights and
    responsibilities for the care of children and the designation for the children
    of a place of residence and legal custodian, parenting time, and visitation, and
    all post-decree proceedings and matters arising from those cases and proceedings
    shall be assigned to that judge, except in cases that for some special reason
    are assigned to the other judge of the court of common pleas.

    (2) The judge of the court of common pleas, general division, whose term begins
    on February 9, 2027, and successors, shall have assigned to the judge, in addition
    to all matters that are within the jurisdiction of the general division of the
    court of common pleas, all matters that are within the jurisdiction of the probate
    court under Chapter 2101., and other provisions, of the Revised Code.

    (GG) In Adams county:

    (1) Subject to division (GG)(2) of this section, the judge of the court of common
    pleas whose term begins on February 9, 2027, and successors, shall have the same
    qualifications, exercise the same powers and jurisdiction, and receive the same
    compensation as the other judge of the court of common pleas of Adams county.

    (2) Beginning on February 9, 2029, the judge of the court of common pleas whose
    term begins on February 9, 2027, and successors shall be designated as the judge
    of the court of common pleas, probate and juvenile division. The judge shall have
    all of the powers relating to juvenile courts, all cases under Chapter 2151. or
    2152. of the Revised Code, all parentage proceedings arising under Chapter 3111.
    of the Revised Code over which the juvenile court has jurisdiction, all of the
    powers relating to probate courts, and all matters that are within the jurisdiction
    of the probate court under Chapter 2101., and other provisions, of the Revised
    Code.

    On and after February 9, 2029, all references in law to "the probate court," "the
    probate judge," "the juvenile court," or "the judge of the juvenile court" shall
    be construed, with respect to Adams county, as being references to "the probate
    and juvenile division" and as being references to "the judge of the probate and
    juvenile division."

    (HH) If a judge of the court of common pleas, division of domestic relations,
    or juvenile judge, of any of the counties mentioned in this section is sick, absent,
    or unable to perform that judge''s judicial duties or the volume of cases pending
    in the judge''s division necessitates it, the duties of that judge shall be performed
    by another judge of the court of common pleas of that county, assigned for that
    purpose by the presiding judge of the court of common pleas of that county to
    act in place of or in conjunction with that judge, as the case may require.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
