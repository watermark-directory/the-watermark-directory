- number: '2313.24'
  heading: Jurors in inferior courts not affected
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: Chapters 2313. and 2315. of the Revised Code do not contravene or affect any
    section of the Revised Code relating to jurors in the inferior courts in any county
    of the state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.24
- number: '2313.99'
  heading: Penalty
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) Whoever violates section 2313.18, 2313.19, or 2313.20 of the Revised
    Code may be punished as for contempt of court pursuant to Chapter 2705. of the
    Revised Code.

    (B) Whoever violates section 2313.13 of the Revised Code shall be fined not less
    than fifty nor more than five hundred dollars, imprisoned not less than thirty
    nor more than ninety days, or both.

    (C) Any fine assessed for a contempt against a person summoned or who has qualified
    as a juror may be collected by execution and shall be paid into the county treasury
    and disbursed as other fines.'
  history: null
