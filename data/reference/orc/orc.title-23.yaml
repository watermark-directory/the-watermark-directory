- number: '2305.41'
  heading: Duties to incapacitated persons - definitions
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: 'As used in sections 2305.41 to 2305.49 of the Revised Code:

    (A) "Certified nurse practitioner," "clinical nurse specialist," and "registered
    nurse" have the same meanings as in section 4723.01 of the Revised Code.

    (B) "Emergency medical service provider" means an individual who holds a current,
    valid certificate issued under section 4765.30 of the Revised Code to practice
    as an emergency medical technician-basic, emergency medical technician-intermediate,
    emergency medical technician-paramedic, or first responder.

    (C) "Emergency symbol" means the caduceus inscribed within a six-barred cross
    used by the American medical association to denote emergency information.

    (D) "Health care practitioner" means a physician, physician assistant, certified
    nurse practitioner, clinical nurse specialist, or registered nurse.

    (E) "Identifying device" means an identifying bracelet, necklace, metal tag, chain,
    other piece of jewelry, or similar device that meets either or both of the following:

    (1) Bears the emergency symbol and medical information needed in an emergency;

    (2) Contains on its front or back side a bar code or quick response code that
    may be scanned to determine medical information needed in an emergency.

    (F) "Identification card" means any card containing the holder''s name, type of
    medical condition, physician''s name, and other medical information. "Identification
    card" does not include any license or permit issued pursuant to Chapter 4507.
    of the Revised Code.

    (G) "Incapacitated condition" means the condition of being unconscious, semiconscious,
    incoherent, or otherwise incapacitated to communicate.

    (H) "Incapacitated person" means a person in an incapacitated condition.

    (I) "Physician" means an individual authorized under Chapter 4731. of the Revised
    Code to practice medicine and surgery or osteopathic medicine and surgery.

    (J) "Physician assistant" means an individual licensed under Chapter 4730. of
    the Revised Code to practice as a physician assistant.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.41
- number: '2305.42'
  heading: Identifying devices
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) A person who has epilepsy, diabetes, a cardiac condition, or any other
    type of illness, whether physical or mental, that causes temporary blackouts,
    semiconscious periods, or complete unconsciousness, or who has a condition requiring
    specific medication or medical treatment, is allergic to certain medications or
    items used in medical treatment, wears contact lenses, has religious objections
    to certain forms of medication or medical treatment, or is unable to communicate
    coherently or effectively in the English language, is authorized and encouraged
    to wear an identifying device.

    (B) Any person may carry an identification card.

    (C) By wearing an identifying device, a person gives consent for any emergency
    medical service provider, health care practitioner, or law enforcement officer
    who finds the person in an incapacitated condition to do either or both of the
    following:

    (1) Make a reasonable search of the person''s clothing or other effects for an
    identification card;

    (2) Scan the person''s identifying device, if it contains a bar code or quick
    response code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.42
- number: '2305.43'
  heading: Duty of law enforcement officer
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) A law enforcement officer who finds an incapacitated person shall make
    a diligent effort to determine whether the person has a physical or mental illness
    that would cause the incapacitated condition. Whenever feasible, this effort shall
    be made before the person is charged with a crime or taken to a place of detention.

    (B) In seeking to determine whether an incapacitated person has an illness, a
    law enforcement officer may make a prompt and reasonable search for an identifying
    device and identification card. The law enforcement officer may not search for
    an identifying device or identification card in a manner or to an extent that
    would appear to a reasonable person in the circumstances to cause an unreasonable
    risk of worsening the incapacitated person''s condition.

    If an identifying device or identification card is found, the law enforcement
    officer may scan or examine it for emergency information. In doing so, the law
    enforcement officer may inspect both sides of the device or card.

    (C) A law enforcement officer who finds an incapacitated person without an identifying
    device or identification card is not relieved of the duty to that person to make
    a diligent effort to ascertain the existence of any illness causing the incapacitated
    condition.

    (D) A cause of action against a law enforcement officer does not arise from the
    officer making a reasonable search of the incapacitated person to locate an identifying
    device or identification card, even though the person is not wearing an identifying
    device or carrying an identification card.

    (E) A law enforcement officer who determines or has reason to believe that an
    incapacitated person has an illness causing the person''s condition shall promptly
    notify the person''s physician, if practicable. If the officer is unable to ascertain
    the physician''s identity or to communicate with the physician, the officer shall
    make a reasonable effort to cause the incapacitated person to be transported immediately
    to a health care practitioner or facility where medical treatment is available.
    If the officer believes it unduly dangerous to move the incapacitated person,
    the officer shall make a reasonable effort to obtain the assistance of an emergency
    medical service provider or health care practitioner.'
  history: null
