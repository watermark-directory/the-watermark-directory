  url: https://codes.ohio.gov/ohio-revised-code/section-2307.66
- number: '2307.67'
  heading: Civil action - critical infrastructure facility
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) As used in this section:

    (1) "Compensation" means money, thing of value, or financial benefit. "Compensation"
    does not include bail, fines, or court costs.

    (2) "Critical infrastructure facility" has the same meaning as in section 2911.21
    of the Revised Code.

    (3) "Organization" has the same meaning as in section 2901.23 of the Revised Code.

    (B) An owner or operator of a critical infrastructure facility may elect to commence
    a civil action under division (A) of section 2307.60 or section 2307.61 of the
    Revised Code or under this section against any person who willfully causes damage
    to the critical infrastructure facility. The plaintiff may recover compensatory
    damages equal to the replacement value of the property that was damaged. The plaintiff
    also may recover reasonable attorney''s fees, court costs, and other reasonable
    expenses incurred in maintaining the civil action under this section.

    (C) A person or organization may only be held vicariously liable for a judgment
    the plaintiff obtains against the person who damaged the critical infrastructure
    facility if the person or organization did either of the following:

    (1) Directed, authorized, facilitated, or encouraged the person to cause damage
    to the critical infrastructure facility;

    (2) Provided compensation to the person for damaging the critical infrastructure
    facility.

    (D) In a civil action to recover damages under this section, the trier of fact
    may determine that the defendant willfully caused damage to the critical infrastructure
    facility, regardless of whether the defendant has been charged with any related
    criminal offense, has pleaded guilty to or been convicted of a criminal offense,
    or has been adjudicated a delinquent child in connection with the property damage.

    (E) This section does not affect any criminal prosecution or any action to obtain
    a delinquent child adjudication in connection with the property damage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.67
- number: '2307.70'
  heading: Civil action for damages for vandalism, desecration or ethnic intimidation
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Any person who suffers injury or loss to person or property as a result
    of an act committed in violation of section 2909.05, 2927.11, or 2927.12 of the
    Revised Code has a civil action against the offender and may recover in that action
    full compensatory damages, including, but not limited to, damages for emotional
    distress, and may recover punitive or exemplary damages, court costs, other reasonable
    expenses incurred in maintaining that action, and the reasonable attorney''s fees
    incurred in maintaining that action.

    (B)(1) Any person who suffers injury or loss to person or property as a result
    of an act committed in violation of section 2909.05, 2927.11, or 2927.12 of the
    Revised Code by a minor child has a civil action against the parent of the minor
    child and may recover in that action compensatory damages not to exceed fifteen
    thousand dollars, court costs, other reasonable expenses incurred in maintaining
    that action, and reasonable attorney''s fees incurred in maintaining that action.
    A parent and the parent''s minor child are jointly and severally liable as specified
    in this division for the injury or loss to person or property caused by the minor
    child''s act committed in violation of section 2909.05, 2927.11, or 2927.12 of
    the Revised Code. If a person recovers compensatory damages from a parent of a
    minor child pursuant to this division, that recovery does not preclude the person
    from maintaining a civil action against the minor child pursuant to division (A)
    of this section.

    (2) As used in division (B) of this section:

    (a) "Minor child" means a person who is under eighteen years of age and who is
    not married at the time of the commission of an act in violation of section 2909.05,
    2927.11, or 2927.12 of the Revised Code that gives rise to a civil action under
    division (B) of this section.

    (b) "Parent" has the same meaning as in section 3109.09 of the Revised Code.

    (C) The monetary limitation upon compensatory damages set forth in section 3109.09
    or 3109.10 of the Revised Code does not apply to a civil action brought pursuant
    to division (A) or (B) of this section.

    (D) A civil action may be maintained under division (A) or (B) of this section
    whether or not the person who committed an act in violation of section 2909.05,
    2927.11, or 2927.12 of the Revised Code has been charged by an indictment, information,
    or complaint with a violation of any of those sections, has been convicted of
    or pleaded guilty to a violation of any of those sections, has been charged by
    a complaint with being a delinquent child for committing an act that is a violation
    of any of those sections, or has been adjudicated a delinquent child for having
    committed an act of that nature.

    (E) No record of conviction, unless obtained by confession in open court, or delinquent
    child adjudication shall be used as evidence in a civil action brought pursuant
    to division (A) or (B) of this section.'
