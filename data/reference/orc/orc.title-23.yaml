  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.114
- number: '2305.115'
  heading: Assault or battery actions against mental health professional based on
    sexual conduct or contact
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) Except as provided in division (C) of this section, an action for assault
    or battery shall be brought within two years after the cause of action accrues,
    except as provided in division (B) of this section, if all of the following apply
    regarding the action, the cause of the action, and the parties to the action:

    (1) The action is brought against a mental health professional.

    (2) The assault or battery claim asserted in the action is that, while the plaintiff
    was a mental health client or patient of the mental health professional, the mental
    health professional engaged in sexual conduct with, had sexual contact with, or
    caused one or more other persons to have sexual contact with the plaintiff.

    (3) At the time of the sexual conduct or sexual contact described in division
    (A)(2) of this section, the plaintiff was not the spouse of the mental health
    professional.

    (B) If the mental health service relationship between the plaintiff in an action
    for assault or battery that is described in division (A) of this section and the
    mental health professional continues after the date on which the cause of action
    accrues, the two-year period specified in division (A) of this section does not
    begin to run until the date on which that mental health service relationship is
    terminated by either or both of the parties.

    (C) An action for assault or battery brought by a victim of childhood sexual abuse
    that is based on childhood sexual abuse, as defined in section 2305.111 of the
    Revised Code, shall be brought as provided in division (C) of that section. In
    all other cases, unless division (A) or (B) of this section applies, an action
    for assault or battery shall be brought as provided in division (B) of section
    2305.111 of the Revised Code.

    (D) As used in this section:

    (1) "Mental health client or patient" and "mental health service" have the same
    meanings as in section 2305.51 of the Revised Code.

    (2) "Mental health professional" has the same meaning as in section 2305.51 of
    the Revised Code and also includes an individual who is not licensed, certified,
    or registered under the Revised Code, or otherwise authorized in this state, but
    who regularly provides or purports to provide mental health services for compensation
    or remuneration at an established place of business.

    (3) "Mental health service relationship" means the relationship between a mental
    health professional and a mental health client or patient of the mental health
    professional that exists for purposes of the mental health professional''s provision
    of mental health services to the mental health client or patient.

    (4) "Sexual conduct" and "sexual contact" have the same meanings as in section
    2907.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.115
- number: '2305.116'
  heading: No cause of action for failure to perform abortion
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) No person has a civil action or may receive an award of damages in a
    civil action, and no other person shall be liable in a civil action, upon a medical
    claim that because of an act or omission by the other person the person was not
    aborted.

    (B) No person has a civil action or may receive an award of damages in a civil
    action, and no other person shall be liable in a civil action, upon a medical
    claim that because of an act or omission by the other person a child was not aborted.

    (C) Nothing in this section shall preclude a person from bringing a civil action
    or from receiving an award of damages in a medical claim based upon an intentional
    or willful misrepresentation or omission of information related to medical diagnosis,
    care, or treatment.

    (D) As used in this section, "medical claim" has the same meaning as in section
    2305.113 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.116
- number: '2305.117'
  heading: Action upon a legal malpractice claim
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) Except as otherwise provided in this section, an action upon a legal
    malpractice claim against an attorney or a law firm or legal professional association
    shall be commenced within one year after the cause of action accrued.

    (B) Except as to persons within the age of minority or of unsound mind as provided
    by section 2305.16 of the Revised Code, and except as provided in divisions (C)
    and (D) of this section, both of the following apply:

    (1) No action upon a legal malpractice claim against an attorney or a law firm
    or legal professional association shall be commenced more than four years after
    the occurrence of the act or omission constituting the alleged basis of the legal
    malpractice claim.

    (2) If an action upon a legal malpractice claim against an attorney or a law firm
    or legal professional association is not commenced within four years after the
    occurrence of the act or omission constituting the alleged basis of the claim,
    then, any action upon that claim is barred.

    (C)(1) If a person making a legal malpractice claim against an attorney or a law
    firm or legal professional association, in the exercise of reasonable care and
    diligence, could not have discovered the injury resulting from the act or omission
    constituting the alleged basis of the claim within three years after the occurrence
    of the act or omission, but, in the exercise of reasonable care and diligence,
    discovers the injury resulting from that act or omission before the expiration
    of the four-year period specified in division (B)(1) of this section, the person
    may commence an action upon the claim not later than one year after the person
    discovers the injury resulting from that act or omission.

    (2) A person who commences an action upon a legal malpractice claim under the
    circumstances described in division (C)(1) of this section has the affirmative
    burden of proving, by clear and convincing evidence, that the person, with reasonable
    care and diligence, could not have discovered the injury resulting from the act
    or omission constituting the alleged basis of the claim within the three-year
    period described in that division.

    (D) An action upon a legal malpractice claim against an attorney or a law firm
    or legal professional association arising from an act or omission related to the
    attorney''s, law firm''s, or legal professional association''s issuance of an
    opinion of title issued prior to June 16, 2021, shall be commenced within one
    year after the cause of action accrued without regard to when the act or omission
    constituting the alleged basis of the legal malpractice claim occurred.'
