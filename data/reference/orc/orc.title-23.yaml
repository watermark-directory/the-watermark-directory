- number: '2337.01'
  heading: Uniform foreign-money claims act definitions
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: 'As used in sections 2337.01 to 2337.14 of the Revised Code:

    (A) "Action" means a judicial proceeding or arbitration in which a payment in
    money may be awarded or enforced with respect to a foreign-money claim.

    (B) "Bank-offered spot rate" means the spot rate of exchange at which a bank will
    sell foreign money at a spot rate.

    (C) "Conversion date" means the banking day next preceding the date on which money,
    in accordance with sections 2337.01 to 2337.15 of the Revised Code, is:

    (1) Paid to a claimant in an action or distribution proceeding;

    (2) Paid to the official designated by law to enforce a judgment or award on behalf
    of a claimant; or

    (3) Used to recoup, set-off, or counterclaim in different moneys in an action
    or distribution proceeding.

    (D) "Distribution proceeding" means a judicial or nonjudicial proceeding for the
    distribution of a fund in which one or more foreign-money claims is asserted and
    includes an accounting, an assignment for the benefit of creditors, a foreclosure,
    the liquidation or rehabilitation of a corporation or other entity, and the distribution
    of an estate, trust, or other fund.

    (E) "Foreign money" means money other than money of the United States.

    (F) "Foreign-money claim" means a claim upon an obligation to pay, or a claim
    for recovery of a loss, expressed in or measured by a foreign money.

    (G) "Money" means a medium of exchange for the payment of obligations or a store
    of value authorized or adopted by a government or by intergovernmental agreement.

    (H) "Money of the claim" means the money determined as proper pursuant to section
    2337.04 of the Revised Code.

    (I) "Person" means an individual, a corporation, government or governmental subdivision
    or agency, business trust, estate, trust, joint venture, partnership, association,
    two or more persons having a joint or common interest, or any other legal or commercial
    entity.

    (J) "Rate of exchange" means the rate at which money of one country may be converted
    into money of another country in a free financial market convenient to or reasonably
    usable by a person obligated to pay or to state a rate of conversion. If separate
    rates of exchange apply to different kinds of transactions, the term means the
    rate applicable to the particular transaction giving rise to the foreign-money
    claim.

    (K) "Spot rate" means the rate of exchange at which foreign money is sold by a
    bank or other dealer in foreign exchange for immediate or next day availability
    or for settlement by immediate payment in cash or equivalent, by charge to an
    account, or by an agreed delayed settlement not exceeding two days.

    (L) "State" has the same meaning as in section 1.59 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.01
- number: '2337.02'
  heading: When provisions apply
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) Sections 2337.01 to 2337.15 of the Revised Code apply only to a foreign-money
    claim in an action or distribution proceeding.

    (B) Sections 2337.01 to 2337.15 of the Revised Code apply to foreign-money issues
    even if other law under the conflict of laws rules of this state applies to other
    issues in the action or distribution proceeding.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.02
- number: '2337.03'
  heading: Variation by agreement
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) The effect of sections 2337.01 to 2337.15 of the Revised Code may be
    varied by agreement of the parties made before or after commencement of an action
    or distribution proceeding or the entry of judgment.

    (B) Parties to a transaction may agree upon the money to be used in a transaction
    giving rise to a foreign-money claim and may agree to use different moneys for
    different aspects of the transaction. Stating the price in a foreign money for
    one aspect of a transaction does not alone require the use of that money for other
    aspects of the transaction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.03
- number: '2337.04'
  heading: Determining money of claim
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) The money in which the parties to a transaction have agreed that payment
    is to be made is the proper money of the claim for payment.

    (B) If the parties to a transaction have not otherwise agreed, the proper money
    of the claim, as in each case may be appropriate, is the money:

    (1) Regularly used between the parties as a matter of usage or course of dealing;

    (2) Used at the time of a transaction in international trade, by trade usage or
    common practice, for valuing or settling transactions in the particular commodity
    or service involved; or

    (3) In which the loss was ultimately felt or will be incurred by the party claimant.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.04
- number: '2337.05'
  heading: Determining amount of money of certain contract claims
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) If an amount contracted to be paid in a foreign money is measured by
    a specified amount of a different money, the amount to be paid is determined on
    the conversion date.

    (B) If an amount contracted to be paid in a foreign money is to be measured by
    a different money at the rate of exchange prevailing on a date before default,
    that rate of exchange applies only to payments made within a reasonable time after
    default, not exceeding thirty days. Thereafter, conversion is made at the bank-offered
    spot rate on the conversion date.

    (C) A monetary claim is neither usurious nor unconscionable because the agreement
    on which it is based provides that the amount of the debtor''s obligation to be
    paid in the debtor''s money, when received by the creditor, must equal a specified
    amount of the foreign money of the country of the creditor. If, because of unexcused
    delay in payment of a judgment or award, the amount received by the creditor does
    not equal the amount of the foreign money specified in the agreement, the court
    or arbitrator shall amend the judgment or award accordingly.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.05
- number: '2337.06'
  heading: Asserting and defending foreign money claim
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) A person may assert a claim in a specified foreign money. If a foreign-money
    claim is not asserted, the claimant makes the claim in United States dollars.

    (B) An opposing party may allege and prove that a claim, in whole or in part,
    is in a different money than that asserted by the claimant.

    (C) A person may assert a defense, set-off, recoupment, or counterclaim in any
    money without regard to the money of other claims.

    (D) The determination of the proper money of the claim is a question of law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.06
- number: '2337.07'
  heading: Judgments and awards on foreign-money claims - times of money conversion
    - form of judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) Except as provided in division (C) of this section, a judgment or award
    on a foreign-money claim must be stated in an amount of the money of the claim.

    (B) A judgment or award on a foreign-money claim is payable in that foreign money
    or, at the option of the debtor, in the amount of United States dollars which
    will purchase that foreign money on the conversion date at a bank-offered spot
    rate.

    (C) Assessed costs must be entered in United States dollars.

    (D) Each payment in United States dollars must be accepted and credited on a judgment
    or award on a foreign-money claim in the amount of the foreign money that could
    be purchased by the dollars at a bank-offered spot rate of exchange at or near
    the close of business on the conversion date for that payment.

    (E) A judgment or award made in an action or distribution proceeding on both a
    defense, set-off, recoupment, or counterclaim and the adverse party''s claim,
    must be netted by converting the money of the smaller into the money of the larger,
    and by subtracting the smaller from the larger, and specify the rates of exchange
    used.

    (F) A judgment substantially in the following form complies with division (A)
    of this section:

    "It is adjudged and ordered, that Defendant _______________ pay to Plaintiff __________
    the sum of __________ (amount in foreign money) plus interest on that sum at the
    rate of _____ per cent a year or, at the option of the judgment debtor, the number
    of United States dollars which will purchase the __________ (name of foreign money)
    with interest due, at a bank-offered spot rate at or near the close of business
    on the banking day next before the day of payment, together with assessed costs
    of __________ (amount) United States dollars."

    (G) If a contract claim is of the type covered by division (A) or (B) of section
    2337.05 of the Revised Code, the judgment or award must be entered for the amount
    of money stated to measure the obligation to be paid in the money specified for
    payment or, at the option of the debtor, the number of United States dollars which
    will purchase the computed amount of the money of payment on the conversion date
    at a bank-offered spot rate.

    (H) A judgment must be filed and indexed in foreign money in the same manner,
    and has the same effect as a lien, as other judgments. It may be discharged by
    payment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.07
- number: '2337.08'
  heading: Conversions of foreign money in distribution proceeding
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: The rate of exchange prevailing at or near the close of business on the day
    the distribution proceeding is initiated governs all exchanges of foreign money
    in a distribution proceeding. A foreign-money claimant in a distribution proceeding
    shall assert its claim in the named foreign money and show the amount of United
    States dollars resulting from a conversion as of the date the proceeding was initiated.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.08
- number: '2337.09'
  heading: Pre-judgment and judgment interest
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) With respect to a foreign-money claim, recovery of prejudgment or preaward
    interest and the rate of interest to be applied in the action or distribution
    proceeding, except as provided in division (B) of this section, are matters of
    the substantive law governing the right to recovery under the conflict-of-laws
    rules of this state.

    (B) The court or arbitrator shall increase or decrease the amount of prejudgment
    or preaward interest otherwise payable in a judgment or award in foreign money
    to the extent required by the law of this state governing a failure to make or
    accept an offer of settlement or offer of judgment, or conduct by a party or its
    attorney causing undue delay or expense.

    (C) A judgment or award on a foreign-money claim bears interest at the rate applicable
    to judgments of this state.'
