- number: '2303.08'
  heading: General duties
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: The clerk of the court of common pleas shall indorse on each pleading or paper
    in a cause filed in the clerk's office the time of filing, enter all orders, decrees,
    judgments, and proceedings of the courts of which such individual is the clerk,
    make a complete record when ordered on the journal to do so, and pay over to the
    proper parties all moneys coming into the clerk's hands as clerk. The clerk may
    refuse to accept for filing any pleading or paper submitted for filing by a person
    who has been found to be a vexatious litigator under section 2323.52 of the Revised
    Code and who has failed to obtain leave to proceed under that section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2303.08
- number: '2303.081'
  heading: Filing pleadings or documents
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: '(A) Pleadings or documents may be filed with the clerk of court either in
    paper format or in electronic format.

    (B)(1) The clerk shall determine whether the filing of pleadings or documents
    in electronic format may be accomplished either by electronic mail or through
    the use of an online platform.

    (2) The fee for filing pleadings or documents in electronic format may be paid
    after the filing. The clerk shall not require that any fee for the filing of pleadings
    or documents in electronic format be paid before the filing, unless the clerk
    has provided for an electronic payment system for such filing.

    (3) The clerk shall not require a fee for the filing of pleadings or documents
    in electronic format that is greater than the applicable fee for the filing of
    pleadings or documents in paper format.

    (4) Divisions (B)(1), (2), and (3) of this section do not apply to the filing
    of pleadings or documents in a probate court or juvenile court.

    (C) Pleadings and documents filed in paper format may be converted to an electronic
    format. Documents created by the clerk of court in the exercise of the clerk''s
    duties may be created in an electronic format.

    (D) When pleadings or documents are received or created in, or converted to, an
    electronic format as provided in this section, the pleadings or documents in that
    format shall be considered the official version of the record.'
