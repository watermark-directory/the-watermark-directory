  url: https://codes.ohio.gov/ohio-revised-code/section-2307.86
- number: '2307.87'
  heading: Silicosis or mixed dust disease claim - filing of evidence of physical
    impairment - challenge - administrative dismissal
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) The plaintiff in any tort action who alleges a silicosis claim or a mixed
    dust disease claim shall file, within thirty days after filing the complaint or
    other initial pleading, a written report and supporting test results constituting
    prima-facie evidence of the exposed person''s physical impairment that meets the
    minimum requirements specified in division (B), (C), or (D) of section 2307.85
    or division (B), (C), or (D) of section 2307.86 of the Revised Code, whichever
    is applicable. The defendant in the case shall be afforded a reasonable opportunity,
    upon the defendant''s motion, to challenge the adequacy of the proffered prima-facie
    evidence of the physical impairment for failure to comply with the minimum requirements
    specified in division (B), (C), or (D) of section 2307.85 or division (B), (C),
    or (D) of section 2307.86 of the Revised Code, whichever is applicable. The defendant
    has one hundred twenty days from the date the prima-facie evidence of the exposed
    person''s physical impairment is proffered to challenge the adequacy of that prima-facie
    evidence. If the defendant makes that challenge and uses a physician to do so,
    the physician must meet the requirements specified in divisions (I)(1), (3), and
    (4) of section 2307.84 of the Revised Code.

    (B) If the defendant challenges the adequacy of the prima-facie evidence of the
    exposed person''s physical impairment as provided in division (A) of this section,
    the court shall determine from all of the evidence submitted whether the proffered
    prima-facie evidence meets the minimum requirements specified in division (B),
    (C), or (D) of section 2307.85 or division (B), (C), or (D) of section 2307.86
    of the Revised Code, whichever is applicable. The court shall resolve the issue
    of whether the plaintiff has made the prima-facie showing required by any of those
    divisions as applicable, by applying the standard for resolving a motion for summary
    judgment.

    (C) The court shall administratively dismiss the plaintiff''s claim without prejudice
    upon a finding of failure to make the prima-facie showing required by division
    (B), (C), or (D) of section 2307.85 or division (B), (C), or (D) of section 2307.86
    of the Revised Code, whichever is applicable. The court shall maintain its jurisdiction
    over any case that is administratively dismissed under this division. Any plaintiff
    whose case has been administratively dismissed under this division may move to
    reinstate the plaintiff''s case if the plaintiff makes a prima-facie showing that
    meets the minimum requirements specified in any of those divisions as applicable.

    (D) This section applies only to tort actions that allege a silicosis claim or
    a mixed dust disease claim and that are filed on or after the effective date of
    this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.87
- number: '2307.88'
  heading: Silicosis or mixed dust disease claim - tolling of statute of limitations
    - nonmalignant and cancer claims distinct
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Notwithstanding any other provision of the Revised Code, with respect
    to any silicosis claim or mixed dust disease claim based upon a nonmalignant condition
    that is not barred as of the effective date of this section, the period of limitations
    shall not begin to run until the exposed person discovers, or through the exercise
    of reasonable diligence should have discovered, that the person has a physical
    impairment due to a nonmalignant condition. A silicosis claim or a mixed dust
    disease claim based upon a nonmalignant condition that is filed before the cause
    of action pursuant to this division arises is preserved for purposes of the period
    of limitations.

    (B) A silicosis claim or a mixed dust disease claim that arises out of a nonmalignant
    condition shall be a distinct cause of action from a silicosis claim or a mixed
    dust disease claim, as the case may be, relating to the same exposed person that
    arises out of silica-related cancer or mixed dust-related cancer. No damages shall
    be awarded for fear or risk of cancer in any tort action asserting only a silicosis
    claim or a mixed dust disease claim for a nonmalignant condition.

    (C) No settlement of a silicosis claim or a mixed dust disease claim for a nonmalignant
    condition that is concluded after the effective date of this section shall require,
    as a condition of settlement, the release of any future claim for silica-related
    cancer or mixed dust-related cancer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.88
- number: '2307.89'
  heading: Silicosis or mixed dust disease claim against premises owner
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: 'The following apply to all tort actions for silicosis or mixed dust disease
    claims brought against a premises owner to recover damages or other relief for
    exposure to silica or mixed dust on the premises owner''s property:

    (A) A premises owner is not liable for any injury to any individual resulting
    from silica or mixed dust exposure unless that individual''s alleged exposure
    occurred while the individual was at the premises owner''s property.

    (B) If exposure to silica or mixed dust is alleged to have occurred before January
    1, 1972, it is presumed that a premises owner knew that this state had adopted
    safe levels of exposure for silica or mixed dust and that products containing
    silica or mixed dust were used on its property only at levels below those safe
    levels of exposure. To rebut this presumption, the plaintiff must prove by a preponderance
    of the evidence that the premises owner knew or should have known that the levels
    of silica or mixed dust in the immediate breathing zone of the plaintiff regularly
    exceeded the threshold limit values adopted by this state and that the premises
    owner allowed that condition to persist.

    (C)(1) A premises owner is presumed to be not liable for any injury to any invitee
    who was engaged to work with, install, or remove products containing silica or
    mixed dust on the premises owner''s property if the invitee''s employer held itself
    out as qualified to perform the work. To rebut this presumption, the plaintiff
    must demonstrate by a preponderance of the evidence that the premises owner had
    actual knowledge of the potential dangers of the products containing silica or
    mixed dust at the time of the alleged exposure that was superior to the knowledge
    of both the invitee and the invitee''s employer.

    (2) A premises owner that hired a contractor before January 1, 1972, to perform
    the type of work at the premises owner''s property that the contractor was qualified
    to perform cannot be liable for any injury to any individual resulting from silica
    or mixed dust exposure caused by any of the contractor''s employees or agents
    on the premises owner''s property unless the premises owner directed the activity
    that resulted in the injury or gave or denied permission for the critical acts
    that led to the individual''s injury.

    (3) If exposure to silica or mixed dust is alleged to have occurred after January
    1, 1972, a premises owner is not liable for any injury to any individual resulting
    from that exposure caused by a contractor''s employee or agent on the premises
    owner''s property unless the plaintiff establishes the premises owner''s intentional
    violation of an established safety standard that was in effect at the time of
    the exposure and that the alleged violation was in the plaintiff''s breathing
    zone and was the proximate cause of the plaintiff''s medical condition.

    (D) As used in this section:

    (1) "Threshold limit values" means the maximum allowable concentration of silica,
    or other dust, set forth in regulation 247 of the "regulations for the prevention
    and control of diseases resulting from exposure to toxic fumes, vapors, mists,
    gases, and dusts in order to preserve and protect the public health," as adopted
    by the former public health council of the department of health on January 1,
    1947, and set forth by the industrial commission of Ohio in bulletin no. 203,
    "specific requirements and general safety standards of the industrial commission
    of Ohio for work shops and factories, chapter XV, ventilation and exhausts," effective
    January 3, 1955.

    (2) "Established safety standard" means that, for the years after 1971, the concentration
    of silica or mixed dust in the breathing zone of the worker does not exceed the
    maximum allowable exposure limits for the eight-hour time-weighted average airborne
    concentration as promulgated by the occupational safety and health administration
    (OSHA) in effect at the time of the alleged exposure.

    (3) "Employee" means an individual who performs labor or provides construction
    services pursuant to a construction contract, as defined in section 4123.79 of
    the Revised Code, or a remodeling or repair contract, whether written or oral,
    if at least ten of the following criteria apply:

    (a) The individual is required to comply with instructions from the other contracting
    party regarding the manner or method of performing services.

    (b) The individual is required by the other contracting party to have particular
    training.

    (c) The individual''s services are integrated into the regular functioning of
    the other contracting party.

    (d) The individual is required to perform the work personally.

    (e) The individual is hired, supervised, or paid by the other contracting party.

    (f) A continuing relationship exists between the individual and the other contracting
    party that contemplates continuing or recurring work even if the work is not full
    time.

    (g) The individual''s hours of work are established by the other contracting party.

    (h) The individual is required to devote full time to the business of the other
    contracting party.

    (i) The individual is required to perform the work on the premises of the other
    contracting party.

    (j) The individual is required to follow the order of work set by the other contracting
    party.

    (k) The individual is required to make oral or written reports of progress to
    the other contracting party.

    (l) The individual is paid for services on a regular basis, including hourly,
    weekly, or monthly.

    (m) The individual''s expenses are paid for by the other contracting party.

    (n) The individual''s tools and materials are furnished by the other contracting
    party.

    (o) The individual is provided with the facilities used to perform services.

    (p) The individual does not realize a profit or suffer a loss as a result of the
    services provided.

    (q) The individual is not performing services for a number of employers at the
    same time.

    (r) The individual does not make the same services available to the general public.

    (s) The other contracting party has a right to discharge the individual.

    (t) The individual has the right to end the relationship with the other contracting
    party without incurring liability pursuant to an employment contract or agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.89
- number: '2307.90'
  heading: Silicosis or mixed dust disease claim - operation of other laws unaffected
    - exhumation not required
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Nothing in sections 2307.84 to 2307.90 of the Revised Code is intended
    to do, and nothing in any of those sections is interpreted to do, either of the
    following:

    (1) Affect the rights of any party in bankruptcy proceedings;

    (2) Affect the ability of any person who is able to make a showing that the person
    satisfies the claim criteria for compensable claims or demands under a trust established
    pursuant to a plan of reorganization under Chapter 11 of the United States Bankruptcy
    Code, 11 U.S.C. Chapter 11, to make a claim or demand against that trust.

    (B) Sections 2307.84 to 2307.90 of the Revised Code shall not affect the scope
    or operation of any workers'' compensation law or veterans'' benefit program or
    the exclusive remedy of subrogation under the provisions of that law or program
    and shall not authorize any lawsuit that is barred by any provision of any workers''
    compensation law.

    (C) Nothing in sections 2307.85, 2307.86, 2307.87, and 2307.88 of the Revised
    Code shall require or permit the exhumation of bodies in making the prima-facie
    showing as required by section 2307.85 or 2307.86 of the Revised Code or rebutting
    the presumption as provided in section 2307.85 or 2307.86 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.90
- number: '2307.901'
  heading: Silicosis or mixed dust disease claim - multiple defendants - substantial
    factor test
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) If a plaintiff in a tort action alleges any injury or loss to person
    resulting from exposure to silica or mixed dust as a result of the tortious act
    of one or more defendants, in order to maintain a cause of action against any
    of those defendants based on that injury or loss, the plaintiff must prove that
    the conduct of that particular defendant was a substantial factor in causing the
    injury or loss on which the cause of action is based.

    (B) A plaintiff in a tort action who alleges any injury or loss to person resulting
    from exposure to silica or mixed dust has the burden of proving that the plaintiff
    was exposed to silica or mixed dust that was manufactured, supplied, installed,
    or used by the defendant in the action and that the plaintiff''s exposure to the
    defendant''s silica or mixed dust was a substantial factor in causing the plaintiff''s
    injury or loss. In determining whether exposure to a particular defendant''s silica
    or mixed dust was a substantial factor in causing the plaintiff''s injury or loss,
    the trier of fact in the action shall consider, without limitation, all of the
    following:

    (1) The manner in which the plaintiff was exposed to the defendant''s silica or
    mixed dust;

    (2) The proximity of the defendant''s silica or mixed dust to the plaintiff when
    the exposure to the defendant''s silica or mixed dust occurred;

    (3) The frequency and length of the plaintiff''s exposure to the defendant''s
    silica or mixed dust;

    (4) Any factors that mitigated or enhanced the plaintiff''s exposure to silica
    or mixed dust.

    (C) This section applies only to tort actions that allege any injury or loss to
    person resulting from exposure to silica or mixed dust and that are brought on
    or after the effective date of this section.'
