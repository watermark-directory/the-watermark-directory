- number: '2307.09'
  heading: Married woman may sue and be sued
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: A married woman may sue and be sued as if she were unmarried, and her husband
    may be joined with her only when the cause of action is in favor of or against
    both.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.09
- number: '2307.10'
  heading: Wife's right to defend
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: When husband and wife are sued together, the wife may defend for her own right;
    and if the husband neglects to defend she also may defend for his right.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.10
- number: '2307.12'
  heading: Next friend liable for costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: The next friend shall be liable for the costs of the action brought by him.
