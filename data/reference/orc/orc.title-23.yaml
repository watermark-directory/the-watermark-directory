- number: '2301.551'
  heading: null
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) Within a reasonable time prior to a prisoner who is serving a sentence
    within a community-based correctional facility and program or a district community-based
    correctional facility and program successfully completing the programming at that
    facility, the facility shall attempt to verify the prisoner''s age and identity
    in order to satisfy the requirements of section 4507.51 of the Revised Code.

    (B) The facility shall provide each prisoner who does not have a current valid
    and unexpired state issued identification card or driver''s license with the application
    described in section 4507.51 of the Revised Code. The facility shall submit any
    completed application, along with a color photograph of the prisoner and documentary
    evidence of the prisoner''s age and identity, to the registrar of motor vehicles
    in accordance with the process established by the registrar under sections 4507.50
    and 4507.51 of the Revised Code.'
