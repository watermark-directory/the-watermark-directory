- number: '2335.07'
  heading: Return of miles by officers
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: The sheriff or other officer serving a writ or subpoena shall indorse thereon
    the number of miles to which each witness is entitled as provided by sections
    2335.05 and 2335.06 of the Revised Code. Each judicial officer returning witnesses
    under recognizance to any court for the trial of criminal causes shall indorse
    on his transcript the number of miles to which each such witness is entitled.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.07
- number: '2335.08'
  heading: Witness fees in criminal cases
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: 'Each witness attending, under recognizance or subpoena issued by order of
    the prosecuting attorney or defendant, before the grand jury or the common pleas
    court, any division of the common pleas court, a county court, or a county-operated
    municipal court, in criminal causes, shall be allowed the same fees as provided
    by section 2335.06 of the Revised Code in civil causes, to be taxed in only one
    cause when such witness is attending in more causes than one on the same days,
    unless otherwise directed by special order of the court. When certified to the
    county auditor by the clerk of the court, such fees shall be paid from the county
    treasury, and except as to the grand jury, taxed in the bill of costs. In state
    cases such fees shall be paid out of the county treasury, and in ordinance cases
    they shall be paid out of the treasury of the municipal corporation, upon the
    certificates of the judge or magistrate, and they shall be taxed in the bill of
    costs.

    When the fees enumerated by this section have been collected from the judgment
    debtor, they shall be paid to the public treasury from which such fees were advanced.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.08
- number: '2335.09'
  heading: Interpreter
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: Whenever, in any criminal proceeding or prosecution for the violation of an
    ordinance, or in a hearing before a coroner, an interpreter is necessary, the
    judge, magistrate, or coroner may appoint interpreters, who shall receive fees
    as witnesses in the case or proceeding. Such fees shall be taxed and paid as provided
    by sections 2335.05 to 2335.08 of the Revised Code for other witness fees. If
    the party taxed with costs is indigent, interpreter's fees shall not be taxed
    as costs, and the county or, if the court is a municipal court that is not a county-operated
    municipal court, the municipal corporation in which the court is located shall
    pay the interpreter's fees. This section shall not apply if, by law, an interpreter
    is otherwise provided.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.09
- number: '2335.10'
  heading: Expenses in pursuit of felon
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: The board of county commissioners may allow and pay the necessary expenses
    incurred by an officer in pursuit of a person charged with a felony, who has signed
    a formal waiver of interstate extradition or fled the country.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.10
- number: '2335.11'
  heading: Payment of fees and costs in felonies and minor state cases
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: 'In felony cases in which the defendant is convicted, the fees of the various
    magistrates and their officers, the witness fees, and interpreter''s fees shall
    be inserted in the judgment of conviction and, when collected shall be disbursed
    by the clerk of the court of common pleas to the persons entitled thereto. In
    minor state cases, which have come to the court of common pleas through such magistrate''s
    courts, the fees enumerated by this section shall be inserted in the judgment
    of conviction and, when collected shall be disbursed by the clerk to the persons
    entitled thereto. In both felonies and minor state cases, such clerk shall pay
    the witness and interpreter''s fees into the county treasury, monthly.

    If the defendant is indigent, the interpreter''s fees shall not be inserted in
    the judgment of conviction, and the county shall pay the interpreter''s fees.

    In all cases in which recognizances are taken, forfeited, and collected, the amount
    recovered shall be paid into the county treasury, and if no conviction is had,
    such costs shall be paid by the county upon the allowance of the county auditor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.11
- number: '2335.12'
  heading: Necessary expenses for salaried officers
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In all states cases, any wholly salaried minor court officer, charged with
    the execution of a warrant to arrest or order of commitment, shall receive from
    the county treasury the actual necessary expense of executing such writs upon
    specifically itemized bills, verified by the oath of such officer, and certified
    to by the proper magistrate, court, or clerk thereof. Such expense shall, in a
    like manner, be paid from the municipal treasury when incurred in ordinance cases.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.12
- number: '2335.13'
  heading: Allowance wherein state fails or defendant is insolvent
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In felony cases in which the state fails, and in misdemeanor cases in which
    the defendant proves insolvent, the board of county commissioners, at its first
    meeting in January, shall make an allowance to constables, in the place of fees,
    but in no year shall the aggregate allowance to such officer exceed the fees legally
    taxed to him in such causes, nor, in any calendar year, shall the aggregate amount
    allowed such officer and his successor exceed one hundred dollars. If there is
    a successor, such amount shall be prorated on the basis of lost fees.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.13
- number: '2335.14'
  heading: Inclusion of officer's fees in ascertaining the amount of fees taxed
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In ascertaining the amount of fees taxed by a judge of a county court in order
    to make the allowance provided by section 2335.13 of the Revised Code, in cases
    in which such judge was authorized to take security for costs, it must appear
    that he exercised reasonable care in taking such security. Until satisfied by
    the certificate of such judge or by other proof, to the satisfaction of the board
    of county commissioners, that the prosecuting witness was indigent and unable
    to pay the costs or procure security thereof, and that the officer exercised due
    care in taking such security, the fees of such officer in such cases shall not
    be included in ascertaining the amount to be so allowed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.14
- number: '2335.15'
  heading: Insufficient security for costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: Where a judge of a county court takes security for costs that at the time
    of taking is insufficient, the board of county commissioners, in making allowance
    to him, shall not take into account his fees in such case.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.15
- number: '2335.16'
  heading: Taxing of costs by county court judge
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: 'In all causes in which a judge of a county court may fine a person charged
    with the commission of an offense, such judge shall render judgment for such fine,
    and shall tax such costs for himself, the constable, and witnesses as are allowed
    by law.

    In any misdemeanor case, all fees due any such officers, if collected, shall be
    paid into the county treasury, unless the amount of such fees was not taken into
    account in estimating the allowance to such officer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.16
- number: '2335.17'
  heading: Witness fees of policemen
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: No police officer is entitled to witness fees in a cause prosecuted under
    an ordinance of a city before a magistrate. In all prosecutions under a criminal
    law of the state involving a felony, municipal police officers shall be allowed
    the same fees for attendance as are allowed by section 2335.06 of the Revised
    Code. Such fees shall be taxed in the bill of costs and deposited, by municipal
    police officers, with the treasurer of the municipal corporation, to the credit
    of the general fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.17
- number: '2335.18'
  heading: Costs of each party
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: The costs of the parties in all actions, motions, and proceedings, in any
    of the courts of this state, shall be taxed and entered of record separately.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.18
- number: '2335.19'
  heading: Certificate of judgment for costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: '(A) On the rendition of judgment in any cause in any court, the costs of
    the party recovering, together with the party''s debt or damages, shall be carried
    into the party''s judgment, and the costs of the party against whom that judgment
    is rendered shall be separately stated in the record or docket entry. No party
    in whose favor judgment for costs is rendered in a cause may release, satisfy,
    or discharge, in whole or in part, any of those costs, unless that party previously
    has paid those costs to the clerk of the court or unless those costs have been
    paid to the person entitled to those costs or have been legally assigned or transferred
    to that party by the persons in whose names those costs stand taxed upon the record
    or docket.

    (B) An entry of judgment that includes a grant of judgment for costs is an order
    that authorizes the clerk of the court, in accordance with division (C) of this
    section, to issue a certificate of judgment for all costs including any interest
    due on the judgment for costs, any cost incurred by the clerk in collecting the
    judgment for costs, and any fee a public agency or private vendor charges the
    clerk pursuant to a contract entered into under division (B)(1) of section 2335.24
    of the Revised Code for collecting the judgment for costs against the person who
    is liable for the payment of those costs.

    (C) The clerk of a court who wishes to issue a certificate of judgment for costs
    pursuant to a judgment for costs shall provide an itemized bill of fees and costs
    to the person who is liable for costs under the judgment, either upon the request
    of the person as specified in section 2335.32 of the Revised Code or without a
    request. If the person does not pay the fees and costs within thirty days after
    the clerk provides the itemized bill, the clerk shall send the person a first
    notice requesting payment of the fees and costs as stated in the itemized bill.
    If the person does not respond to the first notice with the full payment of the
    fees and costs within thirty days, the clerk shall send the person a second notice
    requesting payment of the fees and costs. If ninety days elapse from the date
    that the clerk provides the itemized bill and if the person has not paid the full
    amount of the fees and costs pursuant to the itemized bill and the notices, the
    clerk may issue a certificate of judgment for costs against the person for the
    fees and costs. After issuing a certificate of judgment for costs, the clerk may
    assess the interest accrued from the date the clerk sends the first notice requesting
    payment of the fees and costs as stated in the itemized bill to the date of collection
    of the judgment at the rate established in section 1343.03 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.19
- number: '2335.20'
  heading: Indorsement on execution of costs of party condemned
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: The clerk of the court or the judge of a county court, issuing execution for
    a judgment as provided by section 2335.19 of the Revised Code, shall indorse thereon
    the amount of the costs of the party condemned, which costs shall be collected
    by the officer to whom such writ is directed, in the same manner and at the same
    time as the judgment mentioned in the execution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.20
- number: '2335.21'
  heading: Special execution may issue for costs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: 'When the party recovering judgment in a cause neglects to sue out execution
    immediately, or after such execution has been returned without satisfaction of
    costs, the clerk of the court, for his own benefit, may, or at the instance of
    a person entitled to fees in the bill of costs taxed against either party, shall
    issue against the party indebted to such clerk or other person for such fees,
    whether plaintiff or defendant, an execution to compel the party to pay his own
    costs. Such execution shall be in the following form:

    (Form of execution to compel either party to pay his own costs.)

    The State of Ohio, ______________county, ss:

    To the sheriff of ______________county, greeting:

    Whereas, in a certain civil action lately prosecuted in the _________ court of
    ______________ county, wherein _____________ was plaintiff and ________________was
    defendant, the costs of said ______________ were taxed at __________ dollars,
    __________ cents: You are therefore commanded, that, of the goods and chattels,
    or, for the want of goods and chattels, of the lands and tenements of the said
    _____________ in your county, you cause to be made the costs aforesaid, with interest
    thereon from the _______ day of __________, A.D. ______ (the date of the judgment)
    until paid, and costs that may accrue: And, if you shall levy and make said costs
    and interests, do you have the same before the ________ court of __________ county,
    within sixty days from the date hereof, to render unto the persons entitled to
    the same; and have you then and there this writ.

    Witness my hand and the seal of the _________ court, this ______ day of ____________
    A.D. _________

    A. B., Clerk.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.21
- number: '2335.22'
  heading: Costs on amendments, continuance, or under special rule
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: 'The costs adjudged against either party on continuances, amendments, or under
    a special rule may be collected by process, at any time after judgment or order
    of court awarding such costs to be issued from the court in which the judgment
    or order is made, in the form of execution prescribed by section 2335.21 of the
    Revised Code, with the following alteration: After the asterisk, instead of the
    word "of," these words shall be inserted: "adjudged against the said _________
    on continuance," or "amendment," or otherwise, as the case may be. If the special
    rule for payment of costs is in the court of appeals, the writ shall be so altered
    as to make it returnable to that court.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.22
- number: '2335.23'
  heading: Costs to be taxed separately - costs in court of appeals
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In transcripts given by clerks and judges of county courts, the costs of each
    party shall be stated and set forth separately. In causes taken from the court
    of common pleas to the court of appeals on appeal, the clerk of the court of common
    pleas shall certify to the court of appeals the costs of each party, separately.
    The clerk of the court of appeals shall, in like manner, certify in the mandate
    to the court of common pleas, for execution, the costs in such court of appeals
    of each party, separately. The costs of the losing party in the court of appeals
    as well as the costs of the successful party shall, except as provided in section
    2335.22 of the Revised Code, be collected, by process, from the court of common
    pleas in the manner prescribed in section 2335.21 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.23
- number: '2335.24'
  heading: Collection of costs - contracts for collection
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: '(A) In all causes in any court, except as otherwise provided in section 2969.23
    of the Revised Code, costs taxed and entered as provided by sections 2335.18 to
    2335.23 of the Revised Code may be collected by the process provided by those
    sections.

    (B)(1) The clerk of a court may enter into contracts with one or more public agencies
    or private vendors for the collection of amounts due under judgments for costs.
    The contracts shall comply with division (B)(2) of this section. The amounts may
    include any interest that also is due on a judgment for costs. Before entering
    into or renewing a contract of that nature, the clerk of a court shall do all
    of the following:

    (a) Comply with the provisions of sections 307.86 to 307.92 of the Revised Code
    that pertain to required competitive bidding. For purposes of complying with those
    sections, the clerk of the court shall be considered the contracting authority.

    (b) Obtain the approval of the terms of the contract by the legislative authority
    associated with the court.

    (2) A contract entered into or renewed by the clerk of a court pursuant to division
    (B)(1) of this section shall include all of the following terms:

    (a) A requirement that the contracting public agency or private vendor must disburse
    the full amount collected by the agency or vendor that is due under the judgment
    for costs, including any interest that is also due on that judgment, to the contracting
    clerk of a court for disbursement to the appropriate entity as designated by the
    Revised Code;

    (b) A provision that prohibits the contracting public agency or private vendor
    from deducting any fees or expenses that the agency or vendor incurs in the collection
    of the judgment from the amount collected that is due under the judgment including
    interest.

    (3) As used in division (B) of this section, "legislative authority" has the same
    meaning as in division (B) of section 1901.03 of the Revised Code, if the clerk
    of the court involved is the clerk of a municipal court, and means a board of
    county commissioners, if the clerk of the court involved is the clerk of a county
    court or a court of common pleas.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.24
- number: '2335.241'
  heading: Use of certain interest on certificates of judgment for computerization
    of clerk's office
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: In order to provide funds to support the effective use of computerization
    within the office of the clerk of the court of common pleas, upon the request
    of the clerk of the court of common pleas, the board of county commissioners,
    by a resolution adopted on an annual basis prior to the thirty-first day of January
    in any year, may authorize the clerk of court to deposit in a fund for that purpose
    all or a portion of the interest that is due on certificates of judgment issued
    by that clerk pursuant to division (C) of section 2335.19 of the Revised Code
    and that the clerk receives during that calendar year. The clerk of the court
    shall pay to the county treasurer the interest authorized by the resolution of
    the board of county commissioners to be used for computerization within the office
    of the clerk. The treasurer shall deposit the money from this interest into any
    fund previously established under division (B)(1) of section 2303.021 of the Revised
    Code if a fund has been established for funds collected under that division. If
    a fund has not been established under that division, the treasurer shall deposit
    the money from this interest into a separate fund to be distributed after appropriation
    by the board of county commissioners in an amount no greater than the actual cost
    of a computerization project recommended by the clerk of the court of common pleas
    and approved by the board of county commissioners. The board of county commissioners,
    with the consent of the clerk of the court of common pleas, may determine at any
    time that the separate fund established is no longer necessary and may terminate
    that fund. Notwithstanding sections 5705.14 to 5705.16 of the Revised Code, if
    that fund is terminated, the treasurer shall transfer any moneys that remain in
    the fund to the general fund of the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.241
- number: '2335.25'
  heading: Cashbooks of costs; clerk shall receive moneys payable at office
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: 'Each clerk of a court of record, the sheriff, and the prosecuting attorney
    shall enter in a journal or cashbook, provided at the expense of the county, an
    accurate account of all moneys collected or received in the clerk''s, sheriff''s,
    or prosecuting attorney''s official capacity, on the days of the receipt, and
    in the order of time so received, with a minute of the date and suit, or other
    matter, on account of which the money was received. The cashbook shall be a public
    record of the office, and shall, on the expiration of the term of each such officer,
    be delivered to the officer''s successor. The clerk shall be the receiver of all
    moneys payable into the clerk''s office, whether collected by public officers
    of court or tendered by other persons, and, on request, shall pay the moneys to
    the persons entitled to receive them.

    The clerk of the court of common pleas or of the county court may deposit moneys
    payable into the clerk''s office in a bank, as defined in section 1101.01 of the
    Revised Code, subject to section 131.11 of the Revised Code. Any interest received
    upon the deposits shall be paid into the treasury of the county for which the
    clerk performs official duties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.25
- number: '2335.26'
  heading: Courts may require clerks to give additional bonds
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: If, at any time, in the opinion of the court, the official bond of its clerk,
    is not sufficient in form, or becomes insufficient, for want of responsible sureties
    to secure the payment of the sum specified in such bond, the court, on motion,
    shall order its clerk to give additional bond, with responsible sureties, in the
    sum required by law, with the proper conditions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2335.26
- number: '2335.27'
  heading: Costs collected by prosecuting attorney
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2335'
    name: Fees; Costs
  text: On the first day of November of each year, the prosecuting attorney shall
    file with the clerk of the court of common pleas a certified report of all costs
    collected by him, or that are in the process of collection, in felony cases. The
    report shall state the amount received in each case, the date received, and when
    the amount was paid to the county treasurer. At the same time, the prosecuting
    attorney shall file a like report of all costs and fines that are collected by
    him in misdemeanors and that he is required to pay into the county treasury.
  history: null
