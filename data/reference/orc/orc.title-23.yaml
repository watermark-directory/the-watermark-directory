- number: '2305.23'
  heading: Liability for emergency care
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: 'No person shall be liable in civil damages for administering emergency care
    or treatment at the scene of an emergency outside of a hospital, doctor''s office,
    or other place having proper medical equipment, for acts performed at the scene
    of such emergency, unless such acts constitute willful or wanton misconduct.

    Nothing in this section applies to the administering of such care or treatment
    where the same is rendered for remuneration, or with the expectation of remuneration,
    from the recipient of such care or treatment or someone on his behalf. The administering
    of such care or treatment by one as a part of his duties as a paid member of any
    organization of law enforcement officers or fire fighters does not cause such
    to be a rendering for remuneration or expectation of remuneration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.23
- number: '2305.231'
  heading: Immunity of health professionals volunteering services to school athletic
    program
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) As used in this section:

    (1) "Dentist" means a person who is licensed under Chapter 4715. of the Revised
    Code to practice dentistry.

    (2) "Physician" means a person authorized under Chapter 4731. of the Revised Code
    to practice medicine and surgery, osteopathic medicine and surgery, or podiatric
    medicine and surgery.

    (3) "Registered nurse" means a nurse who is licensed as a registered nurse under
    Chapter 4723. of the Revised Code.

    (4) "Therapeutic recreation" means adoptive recreation services to persons with
    illnesses or disabling conditions in order to do any of the following:

    (a) Restore, remediate, or rehabilitate;

    (b) Improve functioning and independence;

    (c) Reduce or eliminate the effects of illness or disability.

    (B) No physician who volunteers the physician''s services as a team physician
    or team podiatrist to a school''s athletics program, no dentist who volunteers
    the dentist''s services as a team dentist to a school''s athletics program, and
    no registered nurse who volunteers the registered nurse''s services as a team
    nurse to a school''s athletics program is liable in damages in a civil action
    for administering emergency medical care, emergency dental care, other emergency
    professional care, or first aid treatment to a participant in an athletic event
    involving the school, at the scene of the event or while the participant is being
    transported to a hospital, physician''s or dentist''s office, or other medical
    or dental facility, or for acts performed in administering the care or treatment,
    unless the acts of the physician, dentist, or registered nurse constitute willful
    or wanton misconduct.

    (C)(1) No physician who volunteers the physician''s services as a camp physician
    at a camp that specializes in therapeutic recreation, and no registered nurse
    who volunteers the registered nurse''s services at such a camp, is liable in damages
    in a civil action for either of the following:

    (a) Administering medical care, or emergency professional care, or first aid treatment
    to a participant in the camp or while the participant is being transported to
    a hospital, physician''s or dentist''s office, or other medical or dental facility;

    (b) Acts performed in administering that care or treatment.

    (2) Division (C)(1) of this section does not apply if the acts of the physician
    or registered nurse constitute willful or wanton misconduct.

    (D) This section does not apply if the administration of emergency medical care,
    emergency dental care, other emergency professional care, or first aid treatment
    is rendered for remuneration, or with the expectation of remuneration, from the
    recipient of the care or treatment or from someone on the recipient''s behalf.'
