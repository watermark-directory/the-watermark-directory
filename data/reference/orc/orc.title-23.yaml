- number: '2325.12'
  heading: Recovery of excess of amount claimed in pleading
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2325'
    name: Relief After Judgment
  text: When, by mistake of the pleader, the amount claimed in the pleading and recovered
    is less than the true amount then due, the party injured by the mistake may recover
    the balance by civil action, without costs.
