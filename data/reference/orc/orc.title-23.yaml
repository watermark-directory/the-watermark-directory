- number: '2313.17'
  heading: Causes for challenge of persons called as jurors
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) Any person called as a juror for the trial of any cause shall be examined
    under oath or upon affirmation as to the person''s qualifications. A person is
    qualified to serve as a juror if the person is eighteen years of age or older,
    is a resident of the county, and is an elector or would be an elector if the person
    were registered to vote, regardless of whether the person actually is registered
    to vote.

    (B) The following are good causes for challenge to any person called as a juror:

    (1) That the person has been convicted of a crime that by law renders the person
    disqualified to serve on a jury;

    (2) That the person has an interest in the cause;

    (3) That the person has an action pending between the person and either party;

    (4) That the person formerly was a juror in the same cause;

    (5) That the person is the employer, the employee, or the spouse, parent, son,
    or daughter of the employer or employee, counselor, agent, steward, or attorney
    of either party;

    (6) That the person is subpoenaed in good faith as a witness in the cause;

    (7) That the person is akin by consanguinity or affinity within the fourth degree
    to either party or to the attorney of either party;

    (8) That the person or the person''s spouse, parent, son, or daughter is a party
    to another action then pending in any court in which an attorney in the cause
    then on trial is an attorney, either for or against any such party to another
    such action;

    (9) That the person discloses by the person''s answers that the person cannot
    be a fair and impartial juror or will not follow the law as given to the person
    by the court.

    (C) Each challenge listed in division (B) of this section shall be considered
    as a principal challenge, and its validity tried by the court.

    (D) In addition to the causes listed in division (B) of this section, any petit
    juror may be challenged on suspicion of prejudice against or partiality for either
    party, or for want of a competent knowledge of the English language, or other
    cause that may render the juror at the time an unsuitable juror. The validity
    of the challenge shall be determined by the court and be sustained if the court
    has any doubt as to the juror''s being entirely unbiased.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.17
- number: '2313.18'
  heading: Failure to testify; request for in-camera hearing
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) No prospective juror shall fail to answer any legal and pertinent question
    put to the prospective juror by the court or commissioners of jurors.

    (B) If a prospective juror is required to answer written questions during the
    voir dire process, the questionnaire shall contain a prominent legend advising
    the prospective juror that the juror has the right to request and have an in-camera
    hearing on the record with counsel for the parties present regarding any legitimate
    privacy interest of the prospective juror.

    (C) The court shall inform a prospective juror that if a question put to the prospective
    juror involves a legitimate privacy interest of that prospective juror the prospective
    juror has the right to request and have an in-camera hearing on the record with
    counsel for the parties present to respond to that question.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.18
- number: '2313.19'
  heading: Employer may not penalize employee for being called to jury duty
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) No employer shall discharge, threaten to discharge, or take any disciplinary
    action that could lead to the discharge of any permanent employee who is summoned
    to serve as a juror pursuant to Chapter 2313. of the Revised Code if the employee
    gives reasonable notice to the employer of the summons prior to the commencement
    of the employee''s service as a juror and if the employee is absent from employment
    because of the actual jury service.

    (B) No employer shall require or request an employee to use annual, vacation,
    or sick leave for time spent responding to a summons for jury duty, time spent
    participating in the jury selection process, or for time spent actually serving
    on a jury. Nothing in this division requires an employer to provide annual, vacation,
    or sick leave to employees under the provisions of this section who otherwise
    are not entitled to those benefits under the employer''s policies.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.19
- number: '2313.20'
  heading: Mandatory attendance
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: No person whose name is drawn and who is notified to attend a jury year, part
    of a jury year, or specified date within a part of a jury year as a juror or who
    has had the person's jury service postponed shall fail to attend at the time specified
    in the notice or from day to day.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.20
- number: '2313.21'
  heading: Discharge for past service
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) A person who is summoned as a juror and who has actually served as a
    juror in any county of the state under Chapter 2313. of the Revised Code for two
    consecutive calendar weeks shall be discharged by the court, except that the person
    shall not be so discharged until the close of a trial in which the person may
    be serving when the person''s jury term expires.

    (B) A person who is discharged as prescribed in this section is thereafter prohibited
    from jury service in any court of the state until the second jury year after the
    day of the person''s last service, except that in counties of less than one hundred
    thousand population the court shall make rules in the county applicable to subsequent
    jury service by persons of that nature.

    (C) Whenever the certificates of the clerk of the court of common pleas show that
    a person is entitled to a discharge as prescribed in this section, the commissioners
    of jurors upon request shall certify to that fact. No person shall be exempted
    from jury service for any reason, but a person may be excused from jury service
    or have the person''s jury service postponed in accordance with Chapter 2313.
    of the Revised Code and the general statutes of the state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.21
- number: '2313.22'
  heading: Compensation of jurors
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: '(A) The board of county commissioners by resolution shall fix the compensation
    of each juror payable out of the county treasury.

    (B) After ten days of actual service, except as otherwise authorized by this division,
    the compensation of a juror shall be fixed for each additional day of actual service
    at an amount equal to the greater of fifteen dollars or one and one-half times
    the compensation fixed pursuant to division (A) of this section. The board of
    county commissioners by resolution may set the compensation at a greater amount
    that shall not exceed two times the compensation fixed pursuant to division (A)
    of this section.

    (C) Residents of townships that are composed entirely of islands shall be reimbursed
    for the additional transportation costs they incur to serve as a juror, in the
    amount certified to be due by a judge of the court in which the jury service is
    performed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2313.22
- number: '2313.23'
  heading: Retention of documents and electronic media
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2313'
    name: Commissioners Of Jurors
  text: The court of common pleas of a county by general order filed with the clerk
    of the court shall determine the retention period for all documents and electronic
    media filed with the commissioners of jurors in compliance with applicable rules
    of superintendence for the courts of Ohio.
