- number: '2301.271'
  heading: Minimum standards for the training of adult probation officers
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) The adult parole authority of the department of rehabilitation and correction
    shall develop minimum standards for the training of adult probation officers as
    provided by section 2301.27 of the Revised Code. The adult parole authority shall
    consult and collaborate with the supreme court in developing the standards. The
    department of youth services shall develop minimum standards for the training
    of probation officers who supervise juvenile offenders.

    (B) Within six months after September 30, 2011, the department of rehabilitation
    and correction and, within six months after the effective date of this amendment,
    the department of youth services shall make available a copy of the minimum standards
    developed by the department, as applicable, to the following entities:

    (1) Every municipal court, county court, and court of common pleas;

    (2) Every probation department.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.271
- number: '2301.28'
  heading: Legal control or supervision person placed on probation
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: 'The court of common pleas of a county in which a county department of probation
    has been established under division (A) of section 2301.27 of the Revised Code,
    in addition to employing the department in investigation and in the administration
    of its own orders imposing community control sanctions, shall receive into the
    legal control or supervision of the department any person who is a resident of
    the county and who has been placed under a community control sanction by order
    of any other court exercising criminal jurisdiction in this state, whether within
    or without the county in which the department of probation is located, upon the
    request of the other court and subject to its continuing jurisdiction. The court
    of common pleas also shall receive into the legal custody or supervision of the
    department any person who is paroled, released under a post-release control sanction,
    or conditionally pardoned from a state correctional institution and who resides
    or remains in the county, if requested by the adult parole authority created by
    section 5149.02 of the Revised Code or any other authority having power to parole
    or release from any institution of that nature.

    As used in this section and section 2301.30 of the Revised Code, "post-release
    control sanction" has the same meaning as in section 2967.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.28
- number: '2301.29'
  heading: Rules of adult parole authority to govern - local court rules
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: 'In all cases in which the county department of probation provided for in
    division (A) of section 2301.27 of the Revised Code acquires legal custody of
    or supervision over a person who is granted a conditional pardon or a parole from
    a state correctional institution, the court of common pleas and the department
    shall be governed by the rules of the adult parole authority created by section
    5149.02 of the Revised Code that are applicable to those cases and by the laws
    of the state applicable to those cases. In the case of other persons placed in
    its legal control or under its supervision, the department shall administer the
    orders and conditions of the authority so placing those persons. The court may
    exercise supervision over the department by adopting rules that are not inconsistent
    with law or with the rules of the adult parole authority and that shall be observed
    and enforced by the probation officers of the department.

    As used in this section "pardon," "parole," and "state correctional institution"
    have the same meanings as in section 2967.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.29
- number: '2301.30'
  heading: County department of probation - duties
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: 'The court of common pleas of a county in which a county department of probation
    is established under division (A) of section 2301.27 of the Revised Code shall
    require the department, in the rules through which the supervision of the department
    is exercised or otherwise, to do all of the following:

    (A) Furnish to each person under a community control sanction or post-release
    control sanction or on parole under its supervision or in its custody, a written
    statement of the conditions of the community control sanction, post-release control
    sanction, or parole and instruct the person regarding the conditions;

    (B) Keep informed concerning the conduct and condition of each person in its custody
    or under its supervision by visiting, the requiring of reports, and otherwise;

    (C) Use all suitable methods, not inconsistent with the conditions of the community
    control sanction, post-release control sanction, or parole, to aid and encourage
    the persons under its supervision or in its custody and to bring about improvement
    in their conduct and condition;

    (D) Establish policies regarding the supervision of probationers that shall include,
    but not be limited to, all of the following:

    (1) The minimum number of supervision contacts required for probationers, based
    on each probationer''s risk to reoffend as determined by the single validated
    risk assessment tool selected by the department of rehabilitation and correction
    under section 5120.114 of the Revised Code, under which higher risk probationers
    receive the greatest amount of supervision;

    (2) A graduated response policy to govern which types of violations a probation
    officer may respond to administratively and which type require a violation hearing
    by the court.

    (E) Keep detailed records of the work of the department, keep accurate and complete
    accounts of all moneys collected from persons under its supervision or in its
    custody, and keep or give receipts for those moneys;

    (F) Make reports to the adult parole authority created by section 5149.02 of the
    Revised Code that it requires.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.30
- number: '2301.31'
  heading: Arrest of parolees without warrant
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) If a person on parole is in the custody of a county department of probation
    provided for in division (A) of section 2301.27 of the Revised Code, any probation
    officer of that department may arrest the person without a warrant for any violation
    of any condition of parole, as defined in section 2967.01 of the Revised Code,
    or of any rule governing persons on parole. If a person on parole is in the custody
    of a county department of probation provided for in division (A) of section 2301.27
    of the Revised Code, any probation officer or peace officer shall arrest the person
    without a warrant for any violation of any condition of parole or any rule governing
    persons on parole upon the written order of the chief probation officer of that
    department. Any peace officer may arrest the person without a warrant, in accordance
    with section 2941.46 of the Revised Code, if the peace officer has reasonable
    ground to believe that the person has violated or is violating any of the following
    that is a condition of the person''s parole:

    (1) A condition that prohibits ownership, possession, or use of a firearm, deadly
    weapon, ammunition, or dangerous ordnance;

    (2) A condition that prohibits the person from being within a specified structure
    or geographic area;

    (3) A condition that confines the person to a residence, facility, or other structure;

    (4) A condition that prohibits the person from contacting or communicating with
    any specified individual;

    (5) A condition that prohibits the person from associating with a specified individual.

    (B) A person who is arrested as provided in this section may be confined in the
    jail or juvenile detention facility, as the case may be, of the county in which
    the person is arrested, until released or removed to the proper institution. Upon
    making an arrest under this section, the arresting probation officer or peace
    officer or the arresting officer''s department or agency promptly shall notify
    the chief probation officer of the county department of probation with custody
    of the person or the chief probation officer''s designee that the person has been
    arrested.

    Upon the written order of the chief probation officer of the county department
    with custody of the person, the person may be released on parole or reimprisoned
    or recommitted to the proper institution. An appeal from an order of reimprisonment
    or recommitment may be taken to the adult parole authority created by section
    5149.02 of the Revised Code, and the decision of the authority on the appeal shall
    be final. The manner of taking an appeal of that nature and the disposition of
    the appellant pending the making and determination of the appeal shall be governed
    by the rules and orders of the adult parole authority.

    (C) Nothing in this section limits the powers of arrest granted to certain law
    enforcement officers and citizens under sections 2935.03 and 2935.04 of the Revised
    Code.

    (D) As used in this section:

    (1) "Peace officer" has the same meaning as in section 2935.01 of the Revised
    Code.

    (2) "Firearm," "deadly weapon," and "dangerous ordnance" have the same meanings
    as in section 2923.11 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.31
- number: '2301.32'
  heading: Supplemental investigation or supervisory services from adult parole authority
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) In any county in which a county department of probation has been established
    under division (A) of section 2301.27 of the Revised Code and complies with standards
    and conditions prescribed by the adult parole authority created by section 5149.02
    of the Revised Code, an agreement may be entered into between the court of common
    pleas and the authority under which the county department of probation may receive
    supplemental investigation or supervisory services from the authority.

    (B) In any county in which a county department of probation has not been established
    under division (A) of section 2301.27 of the Revised Code, an agreement may be
    entered into between the court of common pleas of that county and the adult parole
    authority under which the court of common pleas may place defendants under a community
    control sanction in charge of the authority, and, in consideration of those placements,
    the county shall pay to the state from time to time the amounts that are provided
    for in the agreement.

    (C) In lieu of an agreement made under division (A) or (B) of this section, the
    adult parole authority may offer a county funding for probation services, provided
    that the general assembly has appropriated sufficient funds for that purpose.
    If the county accepts funds under this section, the adult parole authority is
    relieved of its duties to supervise offenders placed on community control by courts
    of that county under division (A)(2) of section 2929.15 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.32
- number: '2301.33'
  heading: Common pleas judge not to act as attorney in county court
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: No judge of a court of common pleas shall act as attorney, counsel, or advocate
    for another in a county court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.33
- number: '2301.51'
  heading: Community-based correctional proposals
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A)(1) Any county that has a population of two hundred thousand or more is
    eligible to formulate a community-based correctional proposal pursuant to this
    section that, upon implementation, would provide a community-based correctional
    facility and program for the use of that county''s court of common pleas in accordance
    with sections 2301.51 to 2301.58 of the Revised Code. Any county that has a population
    of two hundred thousand or more is eligible to formulate more than one community-based
    correctional proposal pursuant to this section upon approval of the director of
    rehabilitation and correction. In determining whether to grant approval to formulate
    more than one proposal, the director shall consider the rate at which the county
    commits felony offenders to the state correctional system. If a county formulates
    more than one proposal, each proposal shall be for a separate community-based
    correctional facility and program.

    (2) Two or more adjoining or neighboring counties that have an aggregate population
    of two hundred thousand or more are eligible to formulate a district community-based
    correctional proposal pursuant to this section that, upon implementation, would
    provide a district community-based correctional facility and program for the use
    of those counties'' courts of common pleas in accordance with sections 2301.51
    to 2301.58 of the Revised Code. Two or more adjoining or neighboring counties
    that have an aggregate population of two hundred thousand or more are eligible
    to formulate more than one district community-based correctional proposal upon
    approval of the director of rehabilitation and correction. In determining whether
    to grant approval for more than one proposal, the director shall consider the
    rate at which the counties commit felony offenders to the state correctional system.
    If two or more adjoining or neighboring counties formulate more than one proposal,
    each proposal shall be for a separate district community-based correctional facility
    and program.

    (3)(a) The formulation of a proposal for a community-based correctional facility
    or a district community-based correctional facility shall begin by the establishment
    of a judicial advisory board by judgment entry. The judicial advisory board shall
    consist of not less than three judges. Each general division judge of the court
    of common pleas in the county or counties wishing to formulate a proposal or to
    continue operation of an existing facility is eligible to become a member of the
    judicial advisory board but is not required to do so. In addition, a judicial
    advisory board may invite a non-general division judge of a court of common pleas
    from within the county or counties proposing the creation of a community-based
    correctional facility or district community-based correctional facility or a general
    division judge of a court of common pleas from outside the county or counties
    proposing the creation of a community-based correctional facility or district
    community-based correctional facility who regularly sends offenders to its facility
    to become a member of that judicial advisory board.

    (b) A judge shall not receive any additional compensation for service on a judicial
    advisory board, but a judge may be reimbursed for reasonable and necessary expenses
    incurred as a result of service on the board. Service of a judge on a judicial
    advisory board pursuant to this section is a judicial function.

    (c) There shall be a facility governing board for each community-based correctional
    facility and program or district community-based correctional facility and program,
    whose members shall be appointed in accordance with division (E) of this section.

    The judicial advisory board shall meet at least once a year to provide advice
    to the facility governing board regarding the public safety needs of the community,
    admission criteria for any community-based correctional facility and program or
    district community-based correctional facility and program, and the general requirements
    of the community-based correctional facility and program or district community-based
    correctional facility and program. The judicial advisory board may meet as often
    as considered necessary by its members, may communicate directly with the division
    of parole and community services of the department of rehabilitation and correction,
    and may provide advice to the facility governing board specifically regarding
    the agreement entered into between the facility governing board and the division
    of parole and community services pursuant to section 5120.112 of the Revised Code.

    (4) A facility governing board shall formulate the proposal for a community-based
    correctional facility and program or district community-based correctional facility
    and program and shall govern the facility.

    (5) Chapter 2744. of the Revised Code applies to the county or counties served
    by a community-based correctional facility and program or district community-based
    correctional facility and program established and operated under sections 2301.51
    to 2301.58 of the Revised Code, to the community-based correctional facility and
    program or district community-based correctional facility and program so established
    and operated, and to the facility governing board of the community-based correctional
    facility and program or district community-based correctional facility and program
    so established and operated.

    (6) The members of the judicial advisory board and of the facility governing board
    of a community-based correctional facility and program or district community-based
    correctional facility and program established and operated under sections 2301.51
    to 2301.58 of the Revised Code shall be considered to be public officials or employees
    for purposes of Chapter 102. of the Revised Code and public officials or public
    servants for purposes of sections 2921.42 and 2921.43 of the Revised Code.

    (7) Each member of a facility governing board of a community-based correctional
    facility and program or district community-based correctional facility and program
    established and operated under sections 2301.51 to 2301.58 of the Revised Code
    shall attend orientation training developed by the judicial advisory board of
    the community-based correctional facility and program or district community-based
    correctional facility and program, as well as annual ethics training developed
    by the judicial advisory board in consultation with the Ohio ethics commission
    or provided by the Ohio ethics commission.

    (8) A community-based correctional facility and program or a district community-based
    correctional facility and program established by a judicial corrections board
    under a prior version of this section shall continue to exist under its existing
    contractual arrangements but, on and after the effective date of this amendment,
    shall be governed by a facility governing board and advised by a judicial advisory
    board created according to this section. Appointments to the facility governing
    board shall be made in accordance with the appointment procedure set forth in
    division (E) of this section. The judicial advisory board and the board or boards
    of county commissioners of the member counties shall make their respective appointments
    within thirty days after the effective date of this amendment.

    (B)(1) Each proposal for the establishment of a community-based correctional facility
    and program or district community-based correctional facility and program that
    is formulated pursuant to division (A) of this section shall be submitted by the
    facility governing board to the division of parole and community services for
    its approval under section 5120.10 of the Revised Code.

    (2) No person shall be sentenced to or placed in a community-based correctional
    facility and program or to a district community-based correctional facility and
    program by a court pursuant to section 2929.16 or 2929.17 of the Revised Code
    or by the parole board pursuant to section 2967.28 of the Revised Code, or otherwise
    committed or admitted to a facility and program of that type until after the proposal
    for the establishment of the facility and program has been approved by the division
    of parole and community services under section 5120.10 of the Revised Code. A
    person shall be sentenced to a facility and program of that type only pursuant
    to a sanction imposed by a court pursuant to section 2929.16 or 2929.17 of the
    Revised Code as the sentence or as any part of the sentence of the person or otherwise
    shall be committed or referred to a facility and program of that type only when
    authorized by law.

    (C) Upon the approval by the division of parole and community services of a proposal
    for the establishment of a community-based correctional facility and program or
    district community-based correctional facility and program submitted to it under
    division (B) of this section, the facility governing board that submitted the
    proposal may establish and operate the facility and program addressed by the proposal
    in accordance with the approved proposal and division (B)(2) of this section.
    The facility governing board may submit a request for funding of some or all of
    its community-based correctional facilities and programs or district community-based
    correctional facilities and programs to the board of county commissioners of the
    county, if the facility governing board serves a community-based correctional
    facility and program, or to the boards of county commissioners of all of the member
    counties, if the facility governing board serves a district community-based correctional
    facility and program. The board or boards may appropriate, but are not required
    to appropriate, a sum of money for funding all aspects of each facility and program
    as outlined in sections 2301.51 to 2301.58 of the Revised Code. The facility governing
    board has no recourse against a board or boards of county commissioners if the
    board or boards of county commissioners do not appropriate money for funding any
    facility and program or if they appropriate money for funding a facility and program
    in an amount less than the total amount of the submitted request for funding.

    (D)(1) If a court of common pleas that is being served by a community-based correctional
    facility and program established pursuant to division (C) of this section determines
    that it no longer wants to be served by the facility and program, the facility
    governing board, upon the advice of the judicial advisory board, may dissolve
    the facility and program by notifying, in writing, the division of parole and
    community services of the determination to dissolve the facility and program.
    If the court is served by more than one community-based correctional facility
    and program, the facility governing board, upon the advice of the judicial advisory
    board, may dissolve some or all of the facilities and programs and, if it does
    not dissolve all of the facilities and programs, the facility governing board
    shall continue the operation of the remaining facilities and programs.

    (2) If all of the courts of common pleas being served by any district community-based
    correctional facility and program established pursuant to division (C) of this
    section determine that they no longer want to be served by the facility and program,
    the facility governing board, upon the advice of the judicial advisory board,
    may dissolve the facility and program by notifying, in writing, the division of
    parole and community services of the determination to dissolve the facility and
    program. If the courts are served by more than one district community-based correctional
    facility and program, the facility governing board, upon the advice of the judicial
    advisory board, may dissolve some or all of the facilities and programs, and,
    if it does not dissolve all of the facilities and programs, it shall continue
    the operation of the remaining facilities and programs.

    (3) If at least one, but not all, of the courts of common pleas being served by
    one or more district community-based correctional facilities and programs established
    pursuant to division (C) of this section determines that it no longer wants to
    be served by the facilities and programs, the court may terminate its involvement
    with each of the facilities and programs by entering upon the journal of the court
    the fact of the determination to terminate its involvement with the facilities
    and programs and by the court notifying, in writing, the division of parole and
    community services of the determination to terminate its involvement with the
    facilities and programs.

    If at least one, but not all, of the courts of common pleas being served by one
    or more district community-based correctional facilities and programs terminates
    its involvement with each of the facilities and programs in accordance with this
    division, the other courts of common pleas being served by the facilities and
    programs may continue to be served by each of the facilities and programs. A court
    may use a facility and program by remaining as a member county of the district
    community-based correctional facility and program or by making a written service
    agreement with the facility governing board without remaining as a member county.

    (E) A facility governing board of a community-based correctional facility and
    program shall consist of at least six members, each member serving a three-year
    term. A facility governing board of a district community-based correctional facility
    and program shall consist of at least six members, each member serving a three-year
    term, except that not more than one-half of the members shall be from any one
    county.

    The judicial advisory board shall appoint two-thirds of the members, and the board
    or boards of county commissioners of the member counties shall appoint the remaining
    one-third, or portion thereof, of the members. Of the initial appointments, one-third
    of the members shall be appointed for a one-year term, one-third of the members
    shall be appointed for a two-year term, and the remaining one-third or portion
    thereof of the members shall be appointed for a three-year term. Thereafter, terms
    of persons appointed to the facility governing board shall be for a three-year
    term, with each term ending on the same day of the same month of the year as did
    the term it succeeds.

    (F) Any member of a facility governing board may be reappointed to serve additional
    terms. Vacancies on the board shall be filled in the same manner as provided for
    original appointments. Any member of the board who is appointed to fill a vacancy
    occurring before the expiration of the term for which the member''s predecessor
    was appointed shall hold office for the remainder of the predecessor''s term.
    Members of the board shall not receive compensation for their services but may
    be reimbursed for reasonable and necessary expenses incurred as a result of service
    on the board.

    (G) Nothing in this section, sections 2301.52 to 2301.58, or section 5120.10,
    5120.111, or 5120.122 of the Revised Code modifies or affects or shall be interpreted
    as modifying or affecting sections 5149.30 to 5149.37 of the Revised Code.'
