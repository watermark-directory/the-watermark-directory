- number: '2301.58'
  heading: Resident program fund - commissary
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) Upon approval of the facility governing board, the director of the community-based
    correctional facility or district community-based correctional facility may establish
    a resident program fund. The director shall deposit in the fund all revenues received
    by the facility from commissions on telephone systems, commissary operations,
    reimbursable costs such as per diem and medical services, and similar services.
    The money in the fund shall only be used to pay for the costs of the following
    expenses:

    (1) The purchase of materials, supplies, and equipment used in any library program,
    educational program, vocational program, rehabilitative program, religious program,
    medical services program, or recreational program operated by the facility for
    the benefit of the residents;

    (2) The construction, alteration, repair, or reconstruction of a facility under
    the control of the facility governing board for use in any library program, educational
    program, vocational program, rehabilitative program, religious program, medical
    services program, or recreational program operated by the facility for the benefit
    of the residents;

    (3) The payment of salaries, wages, and other compensation to employees of the
    facility who are employed in any library program, educational program, vocational
    program, rehabilitative program, religious program, medical services program,
    or recreational program operated by the facility for the benefit of the residents;

    (4) The compensation of vendors that contract with the facility for the provision
    of services for any library program, educational program, vocational program,
    rehabilitative program, religious program, medical services program, or recreational
    program for the benefit of the residents;

    (5) The purchase of other goods and the payment of other services that are determined,
    at the discretion of the director, to be goods and services that may provide additional
    benefit to the residents;

    (6) The costs for the auditing of the resident program fund.

    (B) If a commissary is established by the community-based correctional facility
    or the district community-based correctional facility, all persons confined in
    the facility shall receive commissary privileges, and the commissary shall provide
    for the distribution of necessary hygiene articles and writing materials to indigent
    residents.

    (C) The director shall establish rules, to be approved by the facility governing
    board, for the operation of the resident program fund that follow guidelines established
    by the auditor of state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.58
