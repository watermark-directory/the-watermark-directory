    name: Commissioners Of Jurors
  text: A challenge to the array may be made by any party. The whole array may be
    set aside by the court when the jury, grand or petit, was not selected, drawn,
    or summoned as required by Chapter 2313. of the Revised Code or if any group protected
    by section 2313.13 of the Revised Code is systematically excluded from the jury
    selection process. No indictment shall be quashed or verdict set aside for any
    irregularity in the selection of jurors if the jurors possessed the requisite
    qualifications to act as jurors.
  history: null
