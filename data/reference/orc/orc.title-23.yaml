- number: '2329.03'
  heading: Lien without filing of certificate
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Lands and tenements of a judgment debtor shall be bound with a lien for the
    satisfaction of any judgment of any court of general jurisdiction, including district
    courts of the United States, within this state, without the filing of the certificate
    provided for in section 2329.02 of the Revised Code, from the time when the same
    are seized in execution. Goods and chattels of a judgment debtor shall be bound
    from the time they are seized in execution.
