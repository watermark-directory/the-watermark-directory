- number: '2307.131'
  heading: Appointment of trustee of interest of person not yet born - representing
    future interest of charitable trust
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: 'If in any action it shall appear that any persons not yet born are or may
    become entitled to, or may upon coming into being claim to be entitled to, any
    future interest, legal or equitable, whether arising by way of remainder, reversion,
    possibility of reverter, executory devise, upon the happening of a condition subsequent,
    or otherwise, in any property, real or personal, involved in such suit, the court
    may, and upon the application of any party to the action shall, appoint some competent
    and disinterested person as trustee of the interest of such persons not yet born,
    to appear for and represent in such cause such future interest and to defend the
    suit for and on behalf of such persons not yet born; and any judgment or decree
    rendered in such suit shall be as binding and effectual for all purposes as though
    such persons were born and were parties to such suit. Such persons not yet born
    need not be served by publication.

    In case the beneficiary of any such future interest is a charitable trust, not
    in being, service shall be made upon the attorney general who shall represent
    such interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.131
- number: '2307.14'
  heading: Compensation and replacement of guardian ad litem or trustee
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: The court shall require a guardian ad litem, or a trustee appointed under
    section 2307.131 of the Revised Code, faithfully to discharge the guardian ad
    litem's or trustee's duty, and upon failure to do so, may remove the guardian
    ad litem or trustee, and appoint another. The court may fix a compensation for
    the guardian ad litem's or trustee's services, which shall be taxed in the costs
    against the minor or the unborn persons.
  history: null
