- number: '2305.04'
  heading: Recovery of real estate
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: An action to recover the title to or possession of real property shall be
    brought within twenty-one years after the cause of action accrued, but if a person
    entitled to bring the action is, at the time the cause of action accrues, within
    the age of minority or of unsound mind, the person, after the expiration of twenty-one
    years from the time the cause of action accrues, may bring the action within ten
    years after the disability is removed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.04
- number: '2305.041'
  heading: Action for breach of oil or gas lease or license
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: With respect to a lease or license by which a right is granted to operate
    or to sink or drill wells on land in this state for natural gas or petroleum and
    that is recorded in accordance with section 5301.09 of the Revised Code, an action
    alleging breach of any express or implied provision of the lease or license concerning
    the calculation or payment of royalties shall be brought within the time period
    that is specified in section 1302.98 of the Revised Code. An action alleging a
    breach with respect to any other issue that the lease or license involves shall
    be brought within the time period specified in section 2305.06 of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.041
- number: '2305.05'
  heading: Real estate dedicated to public uses
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: If a street or alley, or any part thereof, laid out and shown on the recorded
    plat of a municipal corporation, has not been opened to the public use and occupancy
    of the citizens thereof, or other persons, and has been enclosed with a fence
    by the owners of the inlots, lots, or outlots lying on, adjacent to, or along
    such street or alley, or part thereof, and has remained in the open, uninterrupted
    use, adverse possession, and occupancy of such owners for the period of twenty-one
    years, and if such street, alley, inlot, or outlot is a part of the tract of land
    so laid out by the original proprietors, the public easement therein shall be
    extinguished and the right of such municipal corporation, the citizens thereof,
    or other persons, and the legislative authority of such municipal corporation
    and the legal authorities thereof, to use, control, or occupy so much of such
    street or alley as has been fenced, used, possessed, and occupied, shall be barred,
    except to the owners of such inlots or outlots lying on, adjacent to, or along
    such streets or alleys who have occupied them in the manner mentioned in this
    section.
  history: null
