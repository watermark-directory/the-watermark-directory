- number: '2329.12'
  heading: Bond for delivery of goods and chattels
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When a sheriff, coroner, or other officer, by virtue of an execution, levies
    upon goods and chattels which afterward remain upon his hands unsold for want
    of bidders, for the want of time to advertise and sell, or for other reasonable
    cause, for his own security, he may take of the defendant a bond with security
    in such sum as he deems sufficient, to the effect that the property shall be delivered
    to the officer holding an execution for the sale of it at the time and place appointed
    by such officer, either by notice given in writing to the defendant in execution,
    or by advertisement published in a newspaper published in the county, naming therein
    the day and place of sale. If the defendant fails to deliver the goods and chattels
    at the time and place mentioned in the notice, or to pay to the officer holding
    the execution the full value of such goods and chattels, or the amount of the
    debt and costs, the bond shall be considered as broken, and may be proceeded on
    as in other cases.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.12
- number: '2329.13'
  heading: Notice of sale of goods on execution - setting aside or confirmation of
    sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Goods and chattels levied upon by virtue of an execution of a court of
    record shall not be sold until both of the following occur:

    (1)(a) Except as otherwise provided in division (A)(1)(b) of this section, the
    judgment creditor who seeks the sale of the goods and chattels or the judgment
    creditor''s attorney does both of the following:

    (i) Causes a written notice of the date, time, and place of the sale to be served
    in accordance with divisions (A) and (B) of Civil Rule 5 upon the judgment debtor
    and upon each other party to the action in which the judgment giving rise to the
    execution was rendered;

    (ii) At least three calendar days prior to the date of the sale, files with the
    clerk of the court that rendered the judgment giving rise to the execution a copy
    of the written notice described in division (A)(1)(a)(i) of this section with
    proof of service endorsed on the copy in the form described in division (D) of
    Civil Rule 5.

    (b) Service of the written notice described in division (A)(1)(a)(i) of this section
    is not required to be made upon any party who is in default for failure to appear
    in the action in which the judgment giving rise to the execution was rendered.

    (2)(a) Subject to division (A)(2)(b) of this section, the officer who levies upon
    the goods and chattels gives public notice of the date, time, and place of the
    sale for at least ten days before the day of sale by advertisement in a newspaper
    published in and of general circulation in the county. The court ordering the
    sale may designate in the order of sale the newspaper in which this public notice
    shall be published.

    (b) If the goods to be sold are merchandise or inventory used in connection with
    a trade or business and if the sale is to satisfy a judgment in favor of the state
    or one of its political subdivisions for delinquent taxes, public notice of the
    sale shall be given by advertisement in a newspaper published in and of general
    circulation in the county once a week for three weeks preceding the date of the
    sale. In the case of a sale of goods used in connection with a trade or business,
    notice of the location, date, and nature of that sale also shall be conspicuously
    posted on the premises where the trade or business is carried on and on the premises
    where the goods to be sold are kept if they are located elsewhere.

    (B)(1) A sale of goods and chattels levied upon by virtue of an execution of a
    court of record may be set aside in accordance with division (B)(2) of this section.

    (2) Subject to divisions (B)(3) and (4) of this section, all sales of goods and
    chattels levied upon by virtue of an execution of a court of record that are made
    without compliance with the written notice requirements of division (A)(1)(a)
    of this section and the public notice requirements of division (A)(2) of this
    section shall be set aside, on motion, by the court to which the execution is
    returnable.

    (3) Proof of service endorsed upon a copy of the written notice required by division
    (A)(1)(a) of this section shall be conclusive evidence of the service of the written
    notice in compliance with the requirements of that division, unless, prior to
    the confirmation of the sale of the goods and chattels as described in division
    (B)(4) of this section, a party files a motion to set aside the sale pursuant
    to division (B)(1) of this section and establishes by a preponderance of the evidence
    that the proof of service is fraudulent.

    (4) If the court to which the execution is returnable enters its order confirming
    the sale of the goods and chattels, the order has both of the following effects:

    (a) The order shall be deemed to constitute a judicial finding as follows:

    (i) That the sale of the goods and chattels complied with the written notice requirements
    of division (A)(1)(a) of this section and the public notice requirements of division
    (A)(2) of this section, or that compliance of that nature did not occur but the
    failure to give a written notice to a party entitled to notice under division
    (A)(1)(a) of this section has not prejudiced that party;

    (ii) That all parties entitled to notice under division (A)(1)(a) of this section
    received adequate notice of the date, time, and place of the sale of the goods
    and chattels.

    (b) The order bars the filing of any further motions to set aside the sale of
    the goods and chattels.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.13
- number: '2329.14'
  heading: Execution against unsold goods
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When goods and chattels levied upon by execution cannot be sold for want of
    bidders or for want of time, the officer who makes the return shall annex to the
    execution a true inventory of the goods and chattels remaining unsold. The plaintiff
    in that execution may have another execution issued directing the sale of the
    goods and chattels levied upon. The goods and chattels shall not be so sold unless
    the written notice requirements of division (A)(1)(a) of section 2329.13 of the
    Revised Code and the public notice requirements of division (A)(2) of that section
    first have been satisfied. Division (B) of that section also applies to any sale
    of goods and chattels levied upon by virtue of a subsequent execution of a court
    of record under this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.14
- number: '2329.15'
  heading: Public and private sale of goods on execution
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: 'All sales of goods and chattels shall be at public auction unless the court
    from which an execution or order of sale issues, or a judge thereof in vacation,
    for good cause shown, on application of either party and due notice to the adverse
    party, makes an order directing the sheriff, or other officer holding the process,
    to sell them at private sale for cash, specifying the time, not beyond the return
    day of the process, during which such sale will continue. Before such sale, public
    or private, is made, the court shall order the property to be appraised by three
    disinterested persons; and it shall not be sold for less than two thirds of its
    appraised value.

    In the case of a sale to satisfy a judgment in favor of the state, or one of its
    political subdivisions for delinquent taxes, if the sum bid by the purchaser for
    goods sold pursuant to this section is insufficient to pay the costs which the
    court has determined prior to such sale shall be paid out of the proceeds thereof,
    then the purchaser, in addition to the amount of his bid, must pay a sum which,
    with the amount so bid will be sufficient to pay the costs. The court may fix
    the amount remaining unpaid on such claims or obligations for the purpose of the
    sale, and to that end require the parties to the suit to furnish satisfactory
    evidence of such unpaid amount.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.15
- number: '2329.151'
  heading: Conduct of judicial sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: 'Except as provided in sections 2329.152 to 2329.154 of the Revised Code,
    all public auctions of goods, chattels, or lands levied upon by execution shall
    be conducted personally by one of the following:

    (A) An officer of the court;

    (B) For the public auction of goods and chattels, a resident of this state licensed
    as an auctioneer under Chapter 4707. of the Revised Code;

    (C) For the public auction of lands, a private selling officer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.151
- number: '2329.152'
  heading: Authorization of private selling officer
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) In every action demanding the judicial or execution sale of real estate,
    the county sheriff shall sell the real estate at a public auction, unless the
    judgment creditor files a motion with the court for an order authorizing a specified
    private selling officer to sell the real estate at a public auction. If the court
    authorizes a private selling officer to sell the real estate, the judgment creditor
    may seek to have the property sold by the private selling officer authorized by
    the court or by the county sheriff. If the judgment creditor elects to have the
    property sold by the private selling officer authorized by the court, the judgment
    creditor shall file with the clerk of the court a praecipe requesting the issuance
    of an order of appraisal to the sheriff and an order of sale to the private selling
    officer authorized by the court. Upon the filing of that praecipe, the clerk of
    the court shall immediately issue both of the following:

    (1) An order of appraisal to the sheriff, who shall obtain an appraisal of the
    real estate in conformity with sections 2329.17 and 2329.18 of the Revised Code;

    (2) An order of sale to the private selling officer, who, after the return or
    determination of the appraisal, shall advertise and sell the real estate in conformity
    with applicable provisions of sections 2329.01 to 2329.61 of the Revised Code.

    (B)(1) As used in this division:

    (a) "Business day" means a calendar day that is not a Saturday or Sunday or a
    legal holiday as defined in section 1.14 of the Revised Code.

    (b) "Remote bid" means a bid submitted in writing via facsimile, electronic mail,
    or overnight delivery or courier.

    (2) If the sale of the real estate is conducted at a physical location and not
    online, then each judgment creditor and lienholder who was a party to the action
    may submit a remote bid to the sheriff or the private selling officer. Each sheriff
    and private selling officer shall establish and maintain a facsimile number or
    an electronic mail address for use by judgment creditors and lienholders in submitting
    remote bids. Each remote bid shall be of a fixed maximum amount and shall be delivered
    to the sheriff or private selling officer on or before four-thirty p.m. on the
    business day immediately preceding the date of the sale.

    (3) Before the sale, the sheriff or the private selling officer shall confirm
    receipt of the remote bid by sending notice of such receipt via facsimile or electronic
    mail to the judgment creditor or lienholder who submitted the remote bid. During
    the sale, the sheriff or the private selling officer shall place the remote bid
    on behalf of the judgment creditor or lienholder who submitted the remote bid.
    After the sale, the sheriff or the private selling officer shall provide notice
    of the results of the sale not later than the close of business on the day of
    the sale to all judgment creditors and lienholders who submitted remote bids.
    Such notice shall be sent via facsimile or electronic mail to the judgment creditor
    or lienholder or by posting the results of the sale on a public web site.

    (4) If a sheriff or private selling officer fails to place a remote bid on behalf
    of a judgment creditor or lienholder to the prejudice of the judgment creditor
    or lienholder, then, upon the filing of a motion to vacate the sale within ten
    business days after the sale date, the sale shall be vacated.

    (C)(1) A judgment creditor that obtains a court order authorizing a specified
    private selling officer to sell the real estate at a public auction pursuant to
    division (A) of this section may instruct the private selling officer to postpone
    the sale of the real estate one or more times, provided, however that all rescheduled
    sale dates shall be within one hundred eighty days of the initial sale date. Upon
    receiving this instruction, the private selling officer shall postpone the sale
    of the real estate by announcing that the sale is postponed. If the sale is at
    a physical location, this announcement shall be made at the sale and shall include
    the date, time, and place of the rescheduled sale of the real estate. If the sale
    is online, this announcement shall be made on the auction web site and shall include
    the date of the rescheduled sale of real estate. Each such announcement shall
    be deemed to meet the notice requirement in section 2329.26 of the Revised Code.

    (2) If the judgment creditor does not wish to postpone the sale of the real estate,
    the judgment creditor may instruct the private selling officer to cancel the sale
    of the real estate. Upon receiving this instruction, the private selling officer
    shall cancel the sale of the real estate by announcing that the sale is canceled.
    If the sale is at a physical location, this announcement shall be made at the
    sale. If the sale is online, this announcement shall be made on the auction web
    site and shall remain posted there until at least the end of the seven-calendar-day
    bidding period described in division (E)(1)(a) of section 2329.152 of the Revised
    Code.

    (3) If the sale of the real estate is postponed or canceled as described in divisions
    (C)(1) and (2) of this section, all bids made on the real estate prior to the
    postponement or cancellation of the sale shall be void.

    (D)(1) If the judgment creditor obtains a court order to have the real estate
    sold by a private selling officer, then:

    (a) The cost of the appraisal required by section 2329.17 of the Revised Code
    shall be taxed as costs in the case.

    (b) The cost of the advertisement required by section 2329.26 of the Revised Code
    shall be taxed as costs in the case.

    (c) The fee charged by the private selling officer and all costs incurred by the
    private selling officer other than the costs described in divisions (D)(1)(a)
    and (b) of this section shall be taxed as costs in the case up to an amount equal
    to one and one-half per cent of the sale price of the real estate. To the extent
    the fees and costs described in division (D)(1)(c) of this section exceed one
    and one-half per cent of the sale price of the real estate, they shall not be
    included in the amount necessary to redeem real estate under section 2329.33 of
    the Revised Code or in the calculation of any deficiency judgment under section
    2329.08 of the Revised Code but rather shall be paid by the buyer of the property,
    the judgment creditor, or from the judgment creditor''s portion of the proceeds
    of the sale.

    (2) The private selling officer shall file with the court that issued the order
    of sale an itemized report of all appraisal, publication, marketing, and other
    expenses of a sale conducted under this section and all fees charged by the private
    selling officer for marketing the real estate or conducting the sale of the real
    estate, including the fee charged by the title agent or title insurance company
    for administrative services, if applicable, and title, escrow, and closing services.

    (E)(1) The private selling officer who conducts a sale under this section may
    do any of the following:

    (a) Market the real estate and conduct the public auction of the real estate online
    or at any physical location in the county in which the real estate is situated.
    If the auction occurs online, the auction shall be open for bidding for a minimum
    of seven calendar days, counted by excluding the day the auction is first open
    for bidding and, notwithstanding section 1.14 of the Revised Code, including all
    subsequent days.

    (b) Hire a title insurance agent licensed under Chapter 3953. of the Revised Code
    or title insurance company authorized to do business under that chapter to assist
    the private selling officer in performing administrative services;

    (c) Execute to the purchaser, or to the purchaser''s legal representatives, a
    deed of conveyance of the real estate sold;

    (d) Record on behalf of the purchaser the deed conveying title to the real estate
    sold, notwithstanding that the deed may not actually have been delivered to the
    purchaser prior to its recording.

    (2) By placing a bid at a sale conducted pursuant to this section, a purchaser
    appoints the private selling officer who conducts the sale as agent of the purchaser
    for the sole purpose of accepting delivery of the deed.

    (3) The private selling officer who conducts the sale shall hire a title insurance
    agent licensed under Chapter 3953. of the Revised Code or title insurance company
    authorized to do business under that chapter to perform title, escrow, and closing
    services related to the sale of the real estate.

    (F) The fee charged by the title agent or title insurance company for services
    provided under divisions (E)(1)(b) and (3) of this section shall be taxed as costs
    in the case provided they are reasonable. Fees less than or equal to five hundred
    dollars are presumed to be reasonable. Fees exceeding five hundred dollars shall
    be paid only if authorized by a court order.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.152
- number: '2329.153'
  heading: Official public sheriff sale web site; integrated auction management system
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Not later than ninety days after the effective date of this section,
    the department of administrative services shall solicit competitive sealed proposals
    for the creation, operation, and maintenance of the official public sheriff sale
    web site and an integrated auction management system. The official public sheriff
    sale web site and integrated auction management system shall be a single statewide
    system for use by all county sheriffs in accordance with the requirements of this
    section.

    (B) The official public sheriff sale web site shall meet the following minimum
    requirements:

    (1) The web site shall have a domain name relevant to the judicial sale of real
    property.

    (2) The web site shall be limited to the judicial sale of real property located
    in this state.

    (3) The web site shall not charge a fee for members of the public to view properties
    for sale.

    (4) The web site shall allow each county sheriff to add text, images, or graphics
    to the web site for the purpose of identifying the county or sheriff conducting
    the sale.

    (5) The web site shall include industry-standard features and functionality, including
    user guides, online financial transaction device payments, anti-snipe functionality,
    watch lists, electronic mail notifications, maximum bid limits, automatic incremental
    bidding, and search and map features that allow users to search by county, zip
    code, address, parcel number, appraised value, party name, case number, and other
    variables relevant to the judicial sale of real property. As used in this section,
    "financial transaction device" has the same meaning as in section 301.28 of the
    Revised Code.

    (6) The web site shall include features that allow for the cancellation of sales
    as required by law or court order and the postponement of sales in accordance
    with divisions (E)(2) and (3) of this section.

    (7) The web site shall provide a secure payment processing system that accepts
    online payments for property sold via the web site and, in an efficient and costeffective
    manner, transfers those payments to the appropriate county official or account.

    (8) The web site shall include the ability for an attorney or law firm to enter
    a bid in a representative capacity.

    (9) The web site shall be integrated with the auction management system described
    in division (C) of this section.

    (C) The auction management system shall meet the following minimum requirements:

    (1) The auction management system shall have a role-based workflow engine to assist
    in conducting sales on the web site, capturing data, complying with all relevant
    laws, and managing administrative processes related to the judicial sale of real
    property in a timely, secure, and accurate manner.

    (2) The auction management system shall record the data necessary to meet the
    reporting requirements of section 2329.312 of the Revised Code.

    (3) The auction management system shall be able to generate documents required
    by the court ordering the sale or related to the judicial sale of real property.

    (4) The auction management system shall be able to record fees, costs, deposits,
    and other money items with the objective of ensuring an accurate accounting of
    moneys received and disbursed in each judicial sale of real property.

    (5) The auction management system shall be integrated with the web site described
    in division (B) of this section.

    (D) The license fee for the creation, operation, and maintenance of the official
    public sheriff sale web site and integrated auction management system shall be
    determined using a per-transaction license fee model or a per-use license fee
    model. The addition of a property to the official public sheriff sale web site
    or the auction management system shall each be deemed a transaction for purposes
    of determining the license fee. The license fee applicable to each judicial sale
    of real property shall be taxed as costs in the case. No additional license fees
    shall be assessed to the county sheriff.

    (E)(1) Not later than one year after the effective date of this section, in all
    cases in which the sheriff is ordered to conduct a judicial sale of real property,
    the following shall occur:

    (a) For residential property, the sale may be conducted on the official public
    sheriff sale web site for a five-year period beginning on the date the online
    system is fully operational. After this five-year period sales shall be conducted
    on the official public sheriff sale web site.

    (b) For commercial property, the sale may be conducted on the official public
    sheriff sale web site.

    All sales conducted on the official public sheriff sale web site shall be open
    for bidding for at least seven days.

    (2) If the sale of the real property is to be conducted on the official public
    sheriff sale web site, the judgment creditor may instruct the sheriff to postpone
    the sale of the real property one time for up to one hundred eighty days after
    the initial sale date. Upon receiving such instruction for postponement, the sheriff
    shall postpone the sale of the property by announcing on the official public sheriff
    sale web site that the sale is postponed and giving notice of the rescheduled
    sale date. This announcement shall be deemed to meet the notice requirement of
    section 2329.26 of the Revised Code.

    (3) If the judgment creditor does not wish to postpone the sale of the real property,
    the judgment creditor may instruct the sheriff to cancel the sale of the property.
    Upon receiving this instruction, the sheriff shall cancel the sale of the property
    by announcing on the official public sheriff sale web site that the sale is canceled.
    This announcement shall remain posted on the official public sheriff sale web
    site until at least the end of the seven-day bidding period described in division
    (E)(1) of this section.

    (4) If the sale of the real property is postponed or canceled according to divisions
    (E)(2) and (3) of this section, all bids made on the real property prior to the
    postponement or cancellation of the sale shall be void.

    (F) Pursuant to their authority in section 9.482 of the Revised Code, counties
    may elect to enter into a shared services agreement relating to the judicial sale
    of real property on the official public sheriff sale web site. The shared services
    agreement may seek to improve efficiency and reduce costs in the judicial sale
    of real property by consolidating administrative functions and processes.'
