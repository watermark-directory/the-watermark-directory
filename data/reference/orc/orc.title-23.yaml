  url: https://codes.ohio.gov/ohio-revised-code/section-2307.60
- number: '2307.601'
  heading: No duty to retreat in residence or vehicle
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) As used in this section:

    (1) "Residence" has the same meaning as in section 2901.05 of the Revised Code.

    (2) "Tort action" has the same meaning as in section 2307.60 of the Revised Code.

    (B) For purposes of determining the potential liability of a person in a tort
    action related to the person''s use of force alleged to be in self-defense, defense
    of another, or defense of the person''s residence, the person has no duty to retreat
    before using force in self-defense, defense of another, or defense of that person''s
    residence if that person is in a place in which the person lawfully has a right
    to be.

    (C) A trier of fact shall not consider the possibility of retreat as a factor
    in determining whether or not a person who used force in self-defense, defense
    of another, or defense of that person''s residence reasonably believed that the
    force was necessary to prevent injury, loss, or risk to life or safety.'
