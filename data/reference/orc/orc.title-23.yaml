- number: '2303.16'
  heading: Deposit of fees for foreign writ
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: The clerk of the court of common pleas shall not issue a writ in a civil action
    to another county until the party requiring the issuing thereof has deposited
    with him sufficient funds to pay the officer to whom it is directed for executing
    it, and the clerk shall indorse thereon the words, "Funds deposited to pay for
    the execution of this writ." On the return thereof, the clerk shall pay to such
    officer the fees for executing such writ, and no officer shall be required to
    serve such writ unless it is so indorsed.
  history: null
