- number: '2305.02'
  heading: Wrongful imprisonment claim
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: The court of common pleas in the county where the underlying criminal action
    was initiated has exclusive, original jurisdiction to hear and determine an action
    or proceeding that is commenced by an individual who satisfies divisions (A)(1)
    to (5) of section 2743.48 of the Revised Code and that seeks a determination by
    the court that an error in procedure of the type described in division (A)(5)
    of that section occurred, that the offense of which the individual was found guilty,
    including all lesser included offenses, was not committed by the individual, or
    that no offense was committed by any person. If the court enters the requested
    determination, it shall comply with division (B) of that section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2305.02
- number: '2305.03'
  heading: Lapse of time a bar
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) Except as provided in division (B) of this section and unless a different
    limitation is prescribed by statute, a civil action may be commenced only within
    the period prescribed in sections 2305.04 to 2305.22 of the Revised Code. If interposed
    by proper plea by a party to an action mentioned in any of those sections, lapse
    of time shall be a bar to the action.

    (B) No tort action, as defined in section 2305.236 of the Revised Code, that is
    based upon a cause of action that accrued in any other state, territory, district,
    or foreign jurisdiction may be commenced and maintained in this state if the period
    of limitation that applies to that action under the laws of that other state,
    territory, district, or foreign jurisdiction has expired or the period of limitation
    that applies to that action under the laws of this state has expired.

    (C) No action upon a specialty or an agreement, contract, or promise in writing,
    other than an action described in division (C) of section 2305.07 of the Revised
    Code, that seeks post-default interest at a rate governed by or provided in the
    substantive laws of any other state, territory, district, or foreign jurisdiction,
    and in excess of the rate of interest provided by section 5703.47 of the Revised
    Code, may be commenced and maintained in this state if the period of limitation
    that applies to that action under the laws of that other state, territory, district,
    or foreign jurisdiction has expired or the period of limitation that applies to
    that action under the laws of this state has expired.

    (D) No action described in division (C) of section 2305.07 of the Revised Code
    that seeks post charge-off interest at a rate governed by or provided in the substantive
    laws of any other state, territory, district, or foreign jurisdiction, and in
    excess of the rate of interest provided by section 5703.47 of the Revised Code,
    may be commenced and maintained in this state if the period of limitation that
    applies to that action under the laws of that other state, territory, district,
    or foreign jurisdiction has expired or the period of limitation that applies to
    that action under the laws of this state has expired.'
