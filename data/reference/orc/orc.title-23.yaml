- number: '2307.22'
  heading: Joint and several tort liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Subject to sections 2307.23 and 2307.24 and except as provided in division
    (B) of section 2307.70, division (B) of section 4507.07, section 4399.02, or another
    section of the Revised Code that expressly establishes joint and several tort
    liability for specified persons, joint and several tort liability shall be determined
    as follows:

    (1) In a tort action in which the trier of fact determines that two or more persons
    proximately caused the same injury or loss to person or property or the same wrongful
    death and in which the trier of fact determines that more than fifty per cent
    of the tortious conduct is attributable to one defendant, that defendant shall
    be jointly and severally liable in tort for all compensatory damages that represent
    economic loss.

    (2) If division (A)(1) of this section is applicable, each defendant who is determined
    by the trier of fact to be legally responsible for the same injury or loss to
    person or property or the same wrongful death and to whom fifty per cent or less
    of the tortious conduct is attributable shall be liable to the plaintiff only
    for that defendant''s proportionate share of the compensatory damages that represent
    economic loss. The proportionate share of a defendant shall be calculated by multiplying
    the total amount of the economic damages awarded to the plaintiff by the percentage
    of tortious conduct as determined pursuant to section 2307.23 of the Revised Code
    that is attributable to that defendant.

    (3) In a tort action in which the trier of fact determines that two or more persons
    proximately caused the same injury or loss to person or property or the same wrongful
    death and in which the trier of fact determines that fifty per cent or less of
    the tortious conduct is attributable to any defendant against whom an intentional
    tort claim has been alleged and established, that defendant shall be jointly and
    severally liable in tort for all compensatory damages that represent economic
    loss.

    (4) If division (A)(3) of this section is applicable, each defendant against whom
    an intentional tort claim has not been alleged and established, who is determined
    by the trier of fact to be legally responsible for the same injury or loss to
    person or property or the same wrongful death, and to whom fifty per cent or less
    of the tortious conduct is attributable shall be liable to the plaintiff only
    for that defendant''s proportionate share of the compensatory damages that represent
    economic loss. The proportionate share of a defendant shall be calculated by multiplying
    the total amount of the economic damages awarded to the plaintiff by the percentage
    of tortious conduct as determined pursuant to section 2307.23 of the Revised Code
    that is attributable to that defendant.

    (B) Except as otherwise provided in divisions (A)(3) and (4) of this section,
    in a tort action in which the trier of fact determines that two or more persons
    proximately caused the same injury or loss to person or property or the same wrongful
    death and in which the trier of fact determines that fifty per cent or less of
    the tortious conduct is attributable to each defendant, each defendant shall be
    liable to the plaintiff only for that defendant''s proportionate share of the
    compensatory damages that represent economic loss. The proportionate share of
    a defendant shall be calculated by multiplying the total amount of the economic
    damages awarded to the plaintiff by the percentage of tortious conduct as determined
    pursuant to section 2307.23 of the Revised Code that is attributable to that defendant.

    (C) In a tort action in which the trier of fact determines that two or more persons
    proximately caused the same injury or loss to person or property or the same wrongful
    death, each defendant who is determined by the trier of fact to be legally responsible
    for the same injury or loss to person or property or for the same wrongful death
    shall be liable to the plaintiff only for that defendant''s proportionate share
    of the compensatory damages that represent noneconomic loss. The proportionate
    share of a defendant shall be calculated by multiplying the total amount of the
    noneconomic damages awarded to the plaintiff by the percentage of tortious conduct
    as determined pursuant to section 2307.23 of the Revised Code that is attributable
    to that defendant.

    (D) Sections 2307.25 to 2307.29 of the Revised Code shall apply to joint and several
    tort liability that is described in division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.22
- number: '2307.221'
  heading: Immunity from tort liability - nonprofit corporations
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) As used in this section, "tort action" has the same meaning as in section
    2307.60 of the Revised Code.

    (B) No person is liable in a tort action for injury, death, or loss to person
    or property allegedly caused by the person''s act of self-defense or defense of
    another when performed during the commission, or imminent commission, of an offense
    of violence to protect the members or guests, including the person''s self, of
    a nonprofit corporation against the commission, or imminent commission, of that
    offense of violence, unless the person''s act constitutes willful or wanton misconduct.

    (C) Nothing in this section shall be construed to affect any right to bring a
    civil action under section 2307.60 of the Revised Code or any other section of
    the Revised Code.

    (D) This section does not affect, and shall not be construed as affecting, any
    immunity from civil liability or defense established by another section of the
    Revised Code or available at common law, to which the person may be entitled under
    circumstances not covered by this section.

    (E) Subject to division (B) of this section, there is a presumption that a person
    who approaches or enters a nonprofit corporation''s premises or event with intent
    to commit an offense of violence is liable for any injury, death, or loss to person
    or property resulting from an act of self-defense or defense of another against
    that person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.221
- number: '2307.23'
  heading: Determining percentage of tortious conduct attributable to party in tort
    action
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) In determining the percentage of tortious conduct attributable to a party
    in a tort action under section 2307.22 or sections 2315.32 to 2315.36 of the Revised
    Code, the court in a nonjury action shall make findings of fact, and the jury
    in a jury action shall return a general verdict accompanied by answers to interrogatories,
    that shall specify all of the following:

    (1) The percentage of tortious conduct that proximately caused the injury or loss
    to person or property or the wrongful death that is attributable to the plaintiff
    and to each party to the tort action from whom the plaintiff seeks recovery in
    this action;

    (2) The percentage of tortious conduct that proximately caused the injury or loss
    to person or property or the wrongful death that is attributable to each person
    from whom the plaintiff does not seek recovery in this action.

    (B) The sum of the percentages of tortious conduct as determined pursuant to division
    (A) of this section shall equal one hundred per cent.

    (C) For purposes of division (A)(2) of this section, it is an affirmative defense
    for each party to the tort action from whom the plaintiff seeks recovery in this
    action that a specific percentage of the tortious conduct that proximately caused
    the injury or loss to person or property or the wrongful death is attributable
    to one or more persons from whom the plaintiff does not seek recovery in this
    action. Any party to the tort action from whom the plaintiff seeks recovery in
    this action may raise an affirmative defense under this division at any time before
    the trial of the action.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.23
- number: '2307.24'
  heading: Joint and several liability that is not based in tort
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Sections 2307.22 and 2307.23 of the Revised Code do not affect joint
    and several liability that is not based in tort.

    (B) Sections 2307.22 and 2307.23 of the Revised Code do not affect any other section
    of the Revised Code or the common law of this state to the extent that the other
    section or common law makes a principal, master, or other person vicariously liable
    for the tortious conduct of an agent, servant, or other person. For purposes of
    section 2307.22 of the Revised Code, a principal and agent, a master and servant,
    or other persons having a vicarious liability relationship shall constitute a
    single party when determining percentages of tortious conduct in a tort action
    in which vicarious liability is asserted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.24
- number: '2307.241'
  heading: Tort actions alleging vicarious liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) As used in this section, "chiropractic claim," "chiropractor," "dental
    claim," "dentist," "medical claim," "optometric claim," "optometrist," "physical
    therapist," "physician," and "podiatrist" have the same meanings as in section
    2305.113 of the Revised Code.

    (B) In a tort action alleging respondeat superior or vicarious liability, the
    following apply:

    (1) If liability arises against both a principal and agent, master and servant,
    employer and employee, or other persons having a vicarious liability relationship,
    the injured party may sue either the primarily liable agent, servant, employee,
    or person or the secondarily liable principal, master, employer, or person, or
    both.

    (2) For the injured party to prevail in a tort action alleging respondeat superior
    or vicarious liability against a secondarily liable principal, master, employer,
    or other person, both of the following apply:

    (a) A primarily liable agent, servant, employee, or person committed the act or
    omission on which the tort action is based, while in the course of, and within
    the scope of, that agent''s, servant''s, employee''s, or person''s agency or servant
    relationship with, or employment by, the secondarily liable principal, master,
    employer, or other person.

    (b) A primarily liable agent, servant, employee, or person is not a necessary
    party to the tort action alleging respondeat superior or vicarious liability against
    a secondarily liable principal, master, employer, or other person, unless the
    tort action is any of the following:

    (i) An action upon a medical claim against a physician, podiatrist, or physical
    therapist;

    (ii) An action upon a dental claim against a dentist;

    (iii) An action upon an optometric claim against an optometrist;

    (iv) An action upon a chiropractic claim against a chiropractor;

    (v) An action upon a legal malpractice claim against an attorney.

    (C) Nothing in this section modifies the legal principle that the respondeat superior
    or vicarious liability of a principal, master, employer, or person is derivative
    of the liability of an agent, servant, employee, or person. In order for a principal,
    master, employer, or person to be found liable for the act or omission on which
    a tort action is based, an agent, servant, employee, or person shall have committed
    such act or omission while in the course of, or within the scope of, the agent''s,
    servant''s, employee''s, or person''s agency or servant relationship with, or
    employment by, the principal, master, employer, or other person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.241
- number: '2307.25'
  heading: Right of contribution
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Except as otherwise provided in sections 2307.25 to 2307.28 of the Revised
    Code, if one or more persons are jointly and severally liable in tort for the
    same injury or loss to person or property or for the same wrongful death, there
    may be a right of contribution even though judgment has not been recovered against
    all or any of them. The right of contribution exists only in favor of a tortfeasor
    who has paid more than that tortfeasor''s proportionate share of the common liability,
    and that tortfeasor''s total recovery is limited to the amount paid by that tortfeasor
    in excess of that tortfeasor''s proportionate share. No tortfeasor may be compelled
    to make contribution beyond that tortfeasor''s own proportionate share of the
    common liability. There is no right of contribution in favor of any tortfeasor
    against whom an intentional tort claim has been alleged and established.

    (B) A tortfeasor who enters into a settlement with a claimant is not entitled
    to contribution from another tortfeasor whose liability for the injury or loss
    to person or property or the wrongful death is not extinguished by the settlement,
    or in respect to any amount paid in a settlement that is in excess of what is
    reasonable.

    (C) A liability insurer that by payment has discharged in full or in part the
    liability of a tortfeasor and has discharged in full by the payment its obligation
    as insurer is subrogated to the tortfeasor''s right of contribution to the extent
    of the amount it has paid in excess of the tortfeasor''s proportionate share of
    the common liability. This division does not limit or impair any right of subrogation
    arising from any other relationship.

    (D) This section does not impair any right of indemnity under existing law. If
    one tortfeasor is entitled to indemnity from another, the right of the indemnity
    obligee is for indemnity and not contribution, and the indemnity obligor is not
    entitled to contribution from the obligee for any portion of the indemnity obligation.

    (E) This section does not apply to breaches of trust or of other fiduciary obligations.

    (F) The proportionate shares of tortfeasors in the common liability shall be based
    upon their relative degrees of legal responsibility. If equity requires the collective
    liability of some as a group, the group shall constitute a single share, and principles
    of equity applicable to contribution generally shall apply.

    (G) Whether or not judgment has been entered in an action against two or more
    tortfeasors for the same injury or loss to person or property or for the same
    wrongful death, contribution may be enforced by separate action.

    (H) Whenever the provisions of the "Federal Tort Claims Act," 60 Stat. 842 (1946),
    28 U.S.C. 2671 et seq., are applicable to a tort and the United States is held
    liable in tort, the United States has no right of contribution under this section
    against the state pursuant to the waiver of sovereign immunity contained in Chapter
    2743. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.25
- number: '2307.26'
  heading: Enforcing contribution one or more tortfeasors
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: 'If a judgment that imposes joint and several liability has been entered in
    an action against one or more tortfeasors for the same injury or loss to person
    or property or for the same wrongful death, contribution may be enforced in that
    action by judgment in favor of one against other judgment debtors, by motion,
    upon notice to all parties to the action. If there is a judgment for the injury
    or loss to person or property or the wrongful death against the tortfeasor seeking
    contribution, that tortfeasor shall commence any separate action to enforce contribution
    within one year after the judgment has become final by lapse of time for appeal
    or after appellate review.

    If there is no judgment for the injury or loss to person or property or the wrongful
    death against the tortfeasor seeking contribution, that tortfeasor''s right of
    contribution is barred unless either of the following applies:

    (A) That tortfeasor has discharged by payment the common liability within the
    statute of limitations period applicable to the claimant''s right of action against
    that tortfeasor and has commenced that tortfeasor''s action for contribution within
    one year after the payment.

    (B) That tortfeasor has agreed while an action is pending against that tortfeasor
    to discharge the common liability and has paid within one year after the agreement
    the common liability and commenced that tortfeasor''s action for contribution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.26
- number: '2307.27'
  heading: Satisfying judgment - apportioning liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) The recovery of a judgment for an injury or loss to person or property
    or a wrongful death against one tortfeasor does not of itself discharge the other
    tortfeasors from liability for the injury, loss, or wrongful death unless the
    judgment is satisfied. The satisfaction of the judgment does not impair any right
    of contribution.

    (B) Valid answers to interrogatories by a jury or findings of fact by a court
    sitting without a jury in determining the percentage of liability of several defendants
    for an injury or loss to person or property or a wrongful death shall be binding
    as among those defendants in determining their right to contribution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.27
- number: '2307.28'
  heading: Release or a covenant not to sue or not to enforce judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: 'When a release or a covenant not to sue or not to enforce judgment is given
    in good faith to one of two or more persons for the same injury or loss to person
    or property or the same wrongful death, both of the following apply:

    (A) The release or covenant does not discharge any of the other tortfeasors from
    liability for the injury, loss, or wrongful death unless its terms otherwise provide,
    but it reduces the claim against the other tortfeasors to the extent of the greater
    of any amount stipulated by the release or the covenant or the amount of the consideration
    paid for it, except that the reduction of the claim against the other tortfeasors
    shall not apply in any case in which the reduction results in the plaintiff recovering
    less than the total amount of the plaintiff''s compensatory damages awarded by
    the trier of fact and except that in any case in which the reduction does not
    apply the plaintiff shall not recover more than the total amount of the plaintiff''s
    compensatory damages awarded by the trier of fact.

    (B) The release or covenant discharges the person to whom it is given from all
    liability for contribution to any other tortfeasor.'
