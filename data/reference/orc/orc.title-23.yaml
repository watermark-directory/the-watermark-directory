- number: '2305.01'
  heading: Jurisdiction in civil cases - trial transfer
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: 'Except as otherwise provided by this section or section 2305.03 of the Revised
    Code, the court of common pleas has original jurisdiction in all civil cases in
    which the sum or matter in dispute exceeds the exclusive original jurisdiction
    of county courts and appellate jurisdiction from the decisions of boards of county
    commissioners. The court of common pleas shall not have jurisdiction, in any tort
    action to which the amounts apply, to award punitive or exemplary damages that
    exceed the amounts set forth in section 2315.21 of the Revised Code. The court
    of common pleas shall not have jurisdiction in any tort action to which the limits
    apply to enter judgment on an award of compensatory damages for noneconomic loss
    in excess of the limits set forth in section 2315.18 of the Revised Code.

    The court of common pleas may on its own motion transfer for trial any action
    in the court to any municipal court in the county having concurrent jurisdiction
    of the subject matter of, and the parties to, the action, if the amount sought
    by the plaintiff does not exceed one thousand dollars and if the judge or presiding
    judge of the municipal court concurs in the proposed transfer. Upon the issuance
    of an order of transfer, the clerk of courts shall remove to the designated municipal
    court the entire case file. Any untaxed portion of the common pleas deposit for
    court costs shall be remitted to the municipal court by the clerk of courts to
    be applied in accordance with section 1901.26 of the Revised Code, and the costs
    taxed by the municipal court shall be added to any costs taxed in the common pleas
    court.

    The court of common pleas has jurisdiction in any action brought pursuant to division
    (I) of section 4781.40 of the Revised Code if the residential premises that are
    the subject of the action are located within the territorial jurisdiction of the
    court.

    The courts of common pleas of Adams, Athens, Belmont, Brown, Clermont, Columbiana,
    Gallia, Hamilton, Jefferson, Lawrence, Meigs, Monroe, Scioto, and Washington counties
    have jurisdiction beyond the north or northwest shore of the Ohio river extending
    to the opposite shore line, between the extended boundary lines of any adjacent
    counties or adjacent state. Each of those courts of common pleas has concurrent
    jurisdiction on the Ohio river with any adjacent court of common pleas that borders
    on that river and with any court of Kentucky or of West Virginia that borders
    on the Ohio river and that has jurisdiction on the Ohio river under the law of
    Kentucky or the law of West Virginia, whichever is applicable, or under federal
    law.'
