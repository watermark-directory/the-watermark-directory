- number: '2308.03'
  heading: Securing and protecting vacant and abandoned property
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2308'
    name: Expedited Foreclosure On Vacant And Abandoned Properties
  text: '(A) I f a residential property is found to be vacant and abandoned under
    section 2308.02 of the Revised Code, a mortgagee on the residential property may
    enter that property to secure and protect it from damage.

    (B) A mortgagee that has not filed a residential mortgage loan foreclosure action
    on a property for which the mortgagee holds a mortgage may enter and secure that
    property only if the mortgage contract or other documents provide for such an
    entry.

    (C) The equitable and statutory rights to redemption of a mortgage on a property
    found to be vacant and abandoned pursuant to section 2308.02 of the Revised Code
    expire upon the confirmation of sale of the property.'
