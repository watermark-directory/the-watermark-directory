- number: '2307.41'
  heading: Venue for aircraft negligence
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: Actions for injury to a person or property caused by the negligence of the
    pilot, operator, legal or equitable owner, lessor, or lessee of an aircraft may
    be brought by the person injured against such pilot, operator, legal or equitable
    owner, lessor, or lessee in the county in which such injury occurred, or in any
    county on or over which the aircraft passes in the course of the voyage. A summons
    in such action against any defendant shall be issued to the sheriff of any county
    within this state in which such defendant resides and shall be served as in other
    civil actions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.41
- number: '2307.44'
  heading: Hazing civil liability
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: 'Any person who is subjected to hazing, as defined in division (A) of section
    2903.31 of the Revised Code, may commence a civil action for injury or damages,
    including mental and physical pain and suffering, that result from the hazing.
    The action may be brought against any participants in the hazing, any organization
    whose local or national directors, trustees, or officers authorized, requested,
    commanded, or tolerated the hazing, and any local or national director, trustee,
    or officer of the organization who authorized, requested, commanded, or tolerated
    the hazing. If the hazing involves students in a primary, secondary, or post-secondary
    school, university, college, or any other educational institution, an action may
    also be brought against any administrator, employee, or faculty member of the
    school, university, college, or other educational institution who knew or reasonably
    should have known of the hazing and who did not make reasonable attempts to prevent
    it and against the school, university, college, or other educational institution.
    If an administrator, employee, or faculty member is found liable in a civil action
    for hazing, then notwithstanding Chapter 2743. of the Revised Code, the school,
    university, college, or other educational institution that employed the administrator,
    employee, or faculty member may also be held liable.

    The negligence or consent of the plaintiff or any assumption of the risk by the
    plaintiff is not a defense to an action brought pursuant to this section. In an
    action against a school, university, college, or other educational institution,
    it is an affirmative defense that the school, university, college, or other institution
    was actively enforcing a policy against hazing at the time the cause of action
    arose.'
