- number: '2317.022'
  heading: Written statement requesting release of drug or alcohol test records
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2317'
    name: Evidence
  text: '(A) As used in this section:

    (1) "Health care provider" has the same meaning as in section 2317.02 of the Revised
    Code.

    (2) "Drug of abuse" has the same meaning as in section 4506.01 of the Revised
    Code.

    (B) If an official criminal investigation has begun regarding a person or if a
    criminal action or proceeding is commenced against a person, any law enforcement
    officer who wishes to obtain from any health care provider a copy of any records
    the provider possesses that pertain to any test or the result of any test administered
    to the person to determine the presence or concentration of alcohol, a drug of
    abuse, or alcohol and a drug of abuse in the person''s blood, breath, oral fluid,
    or urine at any time relevant to the criminal offense in question shall submit
    to the health care facility a written statement in the following form:

    "WRITTEN STATEMENT REQUESTING THE RELEASE OF RECORDS

    To: ____________________ (insert name of the health care provider in question).

    I hereby state that an official criminal investigation has begun regarding, or
    a criminal action or proceeding has been commenced against, ____________________
    (insert the name of the person in question), and that I believe that one or more
    tests has been administered to that person by this health care provider to determine
    the presence or concentration of alcohol, a drug of abuse, a combination of them,
    a controlled substance, or a metabolite of a controlled substance in that person''s
    whole blood, blood serum or plasma, breath, oral fluid, or urine at a time relevant
    to the criminal offense in question. Therefore, I hereby request that, pursuant
    to division (B)(2) of section 2317.02 of the Revised Code, this health care provider
    supply me with copies of any records the provider possesses that pertain to any
    test or the results of any test administered to the person specified above to
    determine the presence or concentration of alcohol, a drug of abuse, a combination
    of them, a controlled substance, or a metabolite of a controlled substance in
    that person''s whole blood, blood serum or plasma, breath, oral fluid, or urine
    at any time relevant to the criminal offense in question.

    _____________________________________

    (Name of officer)

    _____________________________________

    (Officer''s title)

    _____________________________________

    (Officer''s employing agency)

    _____________________________________

    (Officer''s telephone number)

    _____________________________________

    _____________________________________

    _____________________________________

    (Agency''s address)

    _____________________________________

    (Date written statement submitted)"

    (C) A health care provider that receives a written statement of the type described
    in division (B) of this section shall comply with division (B)(2) of section 2317.02
    of the Revised Code relative to the written statement.'
