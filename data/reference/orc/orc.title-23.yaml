- number: '2303.22'
  heading: Clerk shall receive and pay over all costs and fees taxed upon writs
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: The clerk of the court of common pleas shall receive from the sheriff, or
    other officer of the court, all costs taxed upon any writ or order issued from
    the court, such as appraisers' fees, printers' fees, or any other fees necessarily
    incurred in the execution of such writ or order, and on demand pay them to the
    persons entitled thereto. The sheriff, or other officer of the court, shall tax
    such costs and collect and pay them to the clerk of the court from which the writ
    or order issued, giving the name of each individual, and the amount which each
    is entitled to receive.
