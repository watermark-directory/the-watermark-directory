- number: '2319.01'
  heading: Methods of taking testimony
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2319'
    name: Affidavits; Depositions
  text: 'The testimony of witnesses may be taken:

    (A) By affidavit;

    (B) By deposition;

    (C) By oral examination.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2319.01
- number: '2319.02'
  heading: Affidavit, deposition, oral testimony defined
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2319'
    name: Affidavits; Depositions
  text: An affidavit is a written declaration under oath, made without notice to the
    adverse party. A deposition is a written declaration under oath, made upon notice
    to the adverse party. Oral testimony is that delivered from the lips of the witness.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2319.02
- number: '2319.03'
  heading: Use of affidavit
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2319'
    name: Affidavits; Depositions
  text: An affidavit may be used to verify a pleading, to prove the service of the
    summons, notice, or other process in an action; or to obtain a provisional remedy,
    an examination of a witness, a stay of proceedings, or upon a motion, and in any
    other case permitted by law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2319.03
- number: '2319.04'
  heading: Before whom affidavit may be made
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2319'
    name: Affidavits; Depositions
  text: 'An affidavit may be made in or out of this state before any person authorized
    to take depositions, and unless it is a verification of a pleading it must be
    authenticated in the same way as a deposition.

    Such affidavit may be made before any person authorized to administer oaths whether
    an attorney in the case or not.'
