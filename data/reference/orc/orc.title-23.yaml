  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.29
- number: '2307.30'
  heading: Separate composition of joint debtor with creditor
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) A joint debtor may make a separate composition or compromise with any
    creditor. Any composition or compromise shall be a full and effectual discharge
    to the debtor who makes it, but only to that person, from all liability to the
    creditor with whom it is made, according to its terms. A debtor who makes such
    a composition or compromise may take from the creditor a note or memorandum in
    writing exonerating the debtor from all individual liability incurred by reason
    of the joint debt. That note or memorandum may be given in evidence to bar the
    creditor''s right of recovery against the debtor. If joint liability is by judgment
    in a court of record in this state, on production to and filing of the note or
    memorandum with the clerk of the court, the clerk shall discharge the judgment
    of record as far as the compromising debtor is concerned.

    (B) A compromise or composition with one joint debtor shall not discharge other
    joint debtors or impair the right of the creditor to proceed against other joint
    debtors who have not been discharged. A joint debtor who is proceeded against
    may counterclaim against the creditor for any demand that could have been asserted
    as a counterclaim had the suit by the creditor been brought against all of the
    joint debtors.

    (C) A compromise or discharge of one joint debtor does not prevent the other joint
    debtors from availing themselves of any defense, except that they shall not set
    up the discharge of one debtor as a discharge of the others unless it appears
    that all were intended to be discharged. The discharge of one debtor is deemed
    a payment to the creditor equal to the proportionate liability of the discharged
    debtor.

    (D) A compromise or composition by a joint debtor with a creditor does not affect
    any right the other joint debtors have to call on the discharged debtor for that
    person''s ratable portion of the joint debt.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.30
- number: '2307.34'
  heading: Cause of action for contribution in favor of primary insurer against secondary
    insurer
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) As used in this section:

    (1) "Leased motor vehicle" means a motor vehicle that is the subject of a lease
    agreement governed by Chapter 4901:2-3 of the Ohio Administrative Code or 49 C.F.R.
    1057.

    (2) "Nontrucking activity," as used in relation to the operation of a leased motor
    vehicle, means any of the following:

    (a) Any operation of the leased motor vehicle that is not for the benefit of the
    lessee;

    (b) Any operation of the leased motor vehicle by anyone other than an operator
    who previously has been qualified and authorized by the lessee or authorized agents
    of the lessee to operate the vehicle;

    (c) Any operation of the leased motor vehicle for the purpose of conducting any
    personal or business affairs of the vehicle owner or his agents or employees,
    if the operation results in a diversion of the vehicle, while transporting property
    for the lessee, from its normal or reasonable route between its point of origin
    and point of destination and all scheduled pick-up or delivery stops en route
    thereto;

    (d) Any operation of the leased vehicle by any person to transport property without
    the prior knowledge and consent of the lessee.

    (3) "Primary insurer," as used in relation to the operation of a leased motor
    vehicle, means an insurance company authorized to do business in this state that
    issues or delivers a policy of motor vehicle liability insurance to a motor carrier
    authorized by the public utilities commission to conduct operations in this state.

    (4) "Secondary insurer," as used in relation to the operation of a leased motor
    vehicle, means an insurance company authorized to do business in this state that
    issues or delivers a policy of motor vehicle liability insurance to the owner
    of a motor vehicle leased to a motor carrier authorized by the public utilities
    commission to conduct operations in this state.

    (B) A cause of action for contribution in favor of a primary insurer against a
    secondary insurer exists if all of the following apply:

    (1) The primary insurer issues a policy of motor vehicle liability insurance to
    a motor carrier to pay any final judgment recovered against the motor carrier
    for the death of any person or an injury to or loss to person or property of any
    person resulting from the negligent operation, maintenance, or use of motor vehicles
    displaying the identification placards of the motor carrier, as required by the
    interstate commerce commission or the public utilities commission;

    (2) The motor carrier enters into a lease agreement with the owner of a motor
    vehicle not owned by the motor carrier, that provides that an operator not employed
    by the motor carrier will, during the duration of the lease, operate the motor
    vehicle in service to the motor carrier and will display on the motor vehicle
    the required identification placards;

    (3) Due to the negligent operation by the operator of the leased motor vehicle
    an accident involving the leased motor vehicle occurs while the operator is engaged
    in a nontrucking activity, resulting in the death of any person or in an injury
    to or loss to person or property of any person, and the operator is not an employee
    of the motor carrier;

    (4) The primary insurer pays a final judgment to compensate a party for the death
    of any person as the result of the accident or for an injury or loss to person
    or property of the party as the result of the accident;

    (5) At the time of the accident, a secondary insurer had issued to the owner of
    the motor vehicle a policy of motor vehicle liability insurance to pay any final
    judgment recovered against the owner for the death of any person or an injury
    to or loss to person or property of any person resulting from the negligent operation,
    maintenance, or use of the motor vehicle while it is being operated during a nontrucking
    activity.

    (C) No motor carrier authorized by the public utilities commission to conduct
    operations in this state shall be liable in civil damages for any death, injury,
    or loss caused by a motor vehicle not owned by the motor carrier, or caused by
    an operator not employed by the motor carrier, unless the motor vehicle is being
    operated in service of the motor carrier pursuant to a valid lease agreement at
    the time the injury or damage occurs. The unauthorized display of a motor carrier''s
    name on a motor vehicle not owned by the motor carrier shall not be grounds for
    imposing any civil liability on the motor carrier.'
