- number: '2301.52'
  heading: Minimum provisions for community-based correctional proposals
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: 'Each proposal for a community-based correctional facility and program or
    a district community-based correctional facility and program shall provide for
    or contain at least the following:

    (A) The designation of a physical facility that will be used for the confinement
    of persons sentenced to the facility and program by a court pursuant to section
    2929.16 or 2929.17 of the Revised Code or persons otherwise committed or admitted
    pursuant to law to the facility and program. The designated facility shall satisfy
    all of the following:

    (1) Be a secure facility that contains lockups and other measures sufficient to
    ensure the safety of the surrounding community;

    (2) Provide living space and accommodations that are suitable and adequate for
    the housing of persons sentenced, or otherwise admitted with the consent of the
    facility governing board, to the facility and program;

    (3) Be constructed or modified, and maintained and operated, so that it complies
    with the rules adopted pursuant to Chapter 119. of the Revised Code by the division
    of parole and community services of the department of rehabilitation and correction
    for community-based correctional facilities and programs and district community-based
    correctional facilities and programs.

    (B) The designation of a program that will be applied individually to each person
    sentenced to the facility and program by a court pursuant to section 2929.16 or
    2929.17 of the Revised Code or otherwise committed or admitted pursuant to law
    to the facility and program. The designated program shall include, but not be
    limited to, education, treatment, or work release.

    (C) A provision that each person sentenced, or otherwise admitted with the consent
    of the facility governing board, to a facility shall be provided an orientation
    period of at least thirty days, during which period the person is not permitted
    to leave the facility and is evaluated in relation to the person''s placement
    in rehabilitative programs;

    (D) Provisions to ensure that the facility and program will be staffed to ensure
    security and the effective delivery of services;

    (E) Provisions for the facility governing board, upon the advice of the judicial
    advisory board, to set standards for the screening and admission of each felony
    offender who is referred by a court pursuant to section 2929.16 or 2929.17 of
    the Revised Code or by the parole board pursuant to section 2967.28 of the Revised
    Code;

    (F) A statement that a good faith effort will be made to ensure that the persons
    who staff and operate the facility and program proportionately represent the racial,
    ethnic, and cultural diversity of the persons released, sentenced, or otherwise
    committed or admitted to the facility and program.'
