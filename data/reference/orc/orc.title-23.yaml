- number: '2329.154'
  heading: Online registration
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) If property is sold online, the sheriff or private selling officer shall
    require persons seeking to bid to register online with the web site as a condition
    of being authorized to bid. The registration form shall include information relevant
    to the objective of enabling the sheriff or private selling officer to identify
    the bidder, contact the bidder, and complete the sale of the property.

    (B) If an attorney or a law firm that represents the plaintiff or a party to the
    action bids on property in a representative capacity, the attorney or law firm
    shall register as the representative of the plaintiff or party, either as an individual
    or entity.

    (C)(1) If the person registering to bid is an individual, the information required
    by division (A) of this section shall include the individual''s name, mailing
    address, which shall not be a post office box address, electronic mail address,
    telephone number, and, if applicable, financial transaction device information.

    (2) If the person registering to bid is an entity, the information required by
    division (A) of this section shall include the entity''s legal name, trade name
    if different from its legal name, state and date of formation, active status with
    the office of the secretary of state, mailing address, telephone number, financial
    transaction device information if applicable, the name of an individual contact
    person for the entity, and the contact person''s title, mailing address, which
    shall not be a post office box address, electronic mail address, and telephone
    number.

    (D) The registration form on the web site shall require the person registering
    to bid to state, to the best of the person''s knowledge and belief, that the information
    provided by the person is true, correct, and complete under penalties of perjury.

    (E) The electronic mail address, telephone number, and, if applicable, financial
    transaction device information required in division (C) of this section are confidential
    and not public records for purposes of section 149.43 of the Revised Code.

    (F) As used in this section, "financial transaction device" has the same meaning
    as in section 301.28 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.154
- number: '2329.16'
  heading: Another levy allowed
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When a writ is issued directing the sale of property previously taken in execution,
    the officer who issues the writ, if requested by the person entitled to the benefit
    thereof, his agent or attorney, shall add thereto a command to the officer to
    whom it is directed, that if, in his opinion, the property remaining in his hands
    not sold is insufficient to satisfy the judgment, he shall levy the writ upon
    lands and tenements, goods and chattels, or either, of the judgment debtor, as
    the law permits, sufficient to satisfy the debt.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.16
- number: '2329.17'
  heading: Lands to be appraised
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) When execution is levied upon lands and tenements, the sheriff shall
    call an inquest of three disinterested freeholders, who are residents of, and
    real property owners in, the county where the lands taken in execution are situated,
    who shall appraise the property so levied upon, upon actual view.

    (B) If the property to be appraised is residential property, the freeholders selected
    by the sheriff shall return to the sheriff an estimate of the value of the property
    in money within twenty-one calendar days of the issuance of the order of appraisal
    by the clerk of the court.

    If the court has ordered or the clerk of the court has issued an order for a private
    selling officer to advertise and sell the appraised property, the freeholders
    selected by the sheriff shall also deliver a copy of their appraisal to the private
    selling officer contemporaneously with their delivery of their appraisal to the
    sheriff.

    (C) If the freeholders selected by the sheriff under division (B) of this section
    do not deliver their appraisal within twenty-one calendar days of the issuance
    of the order of appraisal by the clerk of the court as required by division (B)
    of this section, then all of the following shall occur:

    (1) The cost of the appraisal by the freeholders shall not be payable to the freeholders
    or taxed as costs in the case.

    (2) The appraised value of the property shall be the most recent appraised value
    of the property as shown on the records of the county auditor, unless, for good
    cause shown, the court authorizes a separate appraisal of the property.

    (3) The advertisement and sale of the property shall proceed immediately in accordance
    with the order of advertisement and sale issued by the clerk of the court.

    If a separate appraisal of the property is obtained, the cost of the appraisal
    shall be included as an expense of the sale pursuant to division (D) of section
    2329.152 of the Revised Code.

    (D) If the property to be appraised is commercial property, the freeholders selected
    by the sheriff shall return to the sheriff an estimate of the value of the property
    in money in accordance with the timing or other requirements, if any, that may
    be established for the sale.

    (E) The municipal corporation or township in which the real property is situated
    may inspect prior to the judicial sale any structures located on lands subject
    to a writ of execution.'
  history: null
