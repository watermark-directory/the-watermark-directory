- number: '2301.57'
  heading: Health insurance claims of inmates - medical tests
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) For each person who is confined in a community-based correctional facility
    or district community-based correctional facility as provided in sections 2301.51
    to 2301.58 of the Revised Code, the facility may make a determination as to whether
    the person is covered under a health insurance or health care policy, contract,
    or plan and, if the person has such coverage, what terms and conditions are imposed
    by it for the filing and payment of claims.

    (B) If, pursuant to division (A) of this section, it is determined that the person
    is covered under a policy, contract, or plan and, while that coverage is in force,
    the correctional facility renders or arranges for the rendering of health care
    services to the person in accordance with the terms and conditions of the policy,
    contract, or plan, the person, facility, or provider of the health care services,
    as appropriate under the terms and conditions of the policy, contract, or plan,
    shall promptly submit a claim for payment for the health care services to the
    appropriate third-party payer and shall designate, or make any other arrangement
    necessary to ensure, that payment of any amount due on the claim be made to the
    facility or provider, as the case may be.

    (C) This section also applies to any person who is under the custody of a law
    enforcement officer, as defined in section 2901.01 of the Revised Code, prior
    to the person''s confinement in the correctional facility.

    (D) Notwithstanding any contrary provision in this section or section 2929.18,
    2929.21, 2929.26, or 2929.37 of the Revised Code, the facility governing board
    may establish a policy that complies with section 2929.38 of the Revised Code
    and that requires any person who is not indigent and who is confined in the community-based
    correctional facility or district community-based correctional facility to pay
    a reception fee.

    (E) If a person who has been convicted of or pleaded guilty to an offense is confined
    in a community-based correctional facility or district community-based correctional
    facility, the person in charge of the facility''s operation may cause the offender,
    at the time of reception and at other times the person in charge of the operation
    of the facility determines to be appropriate, to be examined and tested for tuberculosis,
    HIV infection, hepatitis, including, but not limited to, hepatitis A, B, and C,
    and other contagious diseases. The person in charge of the facility''s operation
    may cause an offender in the facility who refuses to be tested or treated for
    tuberculosis, HIV infection, hepatitis, including, but not limited to, hepatitis
    A, B, and C, or another contagious disease to be tested and treated involuntarily.'
