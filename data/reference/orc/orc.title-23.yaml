  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.45
- number: '2307.46'
  heading: Request for confidentiality by woman bringing civil action based on abortion
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) In any civil action based on or related to any injury, death, or loss
    to person or property suffered as a result of the performance or inducement of
    an abortion or suffered as a result of an attempt to perform or induce an abortion,
    the woman upon whom the abortion was allegedly performed, induced, or attempted,
    at the time of the filing of the complaint in the civil action, may file a motion
    with the court requesting that her identity only be revealed to the defendant
    and to the court and that in all other respects the civil action be conducted
    in a manner that maintains her confidentiality. The motion shall set forth the
    reasons for the requested confidentiality. Prior to service of the complaint,
    the court shall conduct an ex parte hearing in a timely manner to determine whether
    sufficient cause exists to require that the confidentiality of the movant be maintained
    in the civil action. The decision of the court on the motion is final and is not
    subject to appeal.

    (B) The supreme court shall prescribe rules to implement division (A) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.46
- number: '2307.50'
  heading: Civil action to recover damages for interference with the parental or guardianship
    interest
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) As used in this section:

    (1) "Child stealing crime" means a violation of sections 2905.01, 2905.02, 2905.03,
    and 2919.23 of the Revised Code or section 2905.04 of the Revised Code as it existed
    prior to the effective date of this amendment.

    (2) "Minor" means a person under eighteen years of age.

    (3) "Parental or guardianship interest" means that a parent of a minor is the
    residential parent and legal custodian of the minor and has the rights corresponding
    to that capacity, that a parent of a minor is the parent other than the residential
    parent of the minor and has a right of access to the minor, that the parents of
    a minor have parental rights and responsibilities for the care of the minor and
    are the residential parents and legal custodians of the child, or that any other
    person has a right of custody or access to a minor as his guardian or other custodian.

    (B) Except as provided in division (D) of this section, if a minor is the victim
    of a child stealing crime and if, as a result of that crime, the minor''s parents,
    parent who is the residential parent and legal custodian, parent who is not the
    residential parent and legal custodian, guardian, or other custodian is deprived
    of a parental or guardianship interest in the minor, the parents, parent who is
    the residential parent and legal custodian, parent who is not the residential
    parent and legal custodian, guardian, or other custodian may maintain a civil
    action against the offender to recover damages for interference with the parental
    or guardianship interest. In the civil action, the plaintiffs may recover all
    of the following:

    (1) Full compensatory damages, including, but not limited to, damages for the
    mental suffering and anguish incurred by the plaintiffs, damages for the loss
    of society of the minor, and, if applicable, damages for the loss of the minor''s
    services and damages for expenses incurred by the plaintiffs in locating or recovering
    the minor;

    (2) Punitive damages;

    (3) Reasonable attorney''s fees;

    (4) Costs of bringing the civil action.

    (C) In a civil action brought pursuant to this section, the trier of fact may
    determine that the minor was the victim of a child stealing crime and that the
    defendant committed the crime, regardless of whether the defendant has been convicted
    of or pleaded guilty to a child stealing crime.

    (D) This section does not create a civil action for one parent against the other
    parent who commits a child stealing crime against the parent''s own child.'
