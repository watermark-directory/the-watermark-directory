- number: '2329.024'
  heading: Stay
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) If the judgment debtor shows the court of common pleas that an appeal
    is pending or will be taken from a foreign judgment that is filed pursuant to
    section 2329.022 of the Revised Code, or that a stay of execution of the foreign
    judgment has been granted and if proof is given to the court that the judgment
    debtor has furnished the security for the satisfaction of the foreign judgment
    that is required by the jurisdiction in which the foreign judgment was rendered,
    the court shall stay enforcement of the foreign judgment until the appeal is concluded,
    the time for appeal expires, or the stay of execution expires or is vacated.

    (B) If the judgment debtor shows the court of common pleas any ground upon which
    enforcement of a judgment of a court of common pleas would by stayed, the court
    shall, upon requiring the same security for satisfaction of the judgment that
    is required in this state, stay enforcement of a foreign judgment that is filed
    pursuant to section 2329.022 of the Revised Code for an appropriate period.'
