  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.25
- number: '2329.26'
  heading: Notice of date, time and place of sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Lands and tenements taken in execution shall not be sold until all of
    the following occur:

    (1)(a) Except as otherwise provided in division (A)(1)(b) of this section, the
    judgment creditor who seeks the sale of the lands and tenements or the judgment
    creditor''s attorney does both of the following:

    (i) Causes a written notice to be served in accordance with divisions (A) and
    (B) of Civil Rule 5 upon the judgment debtor and upon each other party to the
    action in which the judgment giving rise to the execution was rendered. Such notice
    shall include the date, time, and place of the sale if the sale is to be held
    at a physical location or the start date and web site address of the sale if the
    sale is to be held online. Such notice shall also include the provisional second
    sale date described in division (B) of section 2329.52 of the Revised Code, if
    applicable.

    (ii) At least seven calendar days prior to the date of the sale, files with the
    clerk of the court that rendered the judgment giving rise to the execution a copy
    of the written notice described in division (A)(1)(a)(i) of this section with
    proof of service endorsed on the copy in the form described in division (B) of
    Civil Rule 5.

    (b) Service of the written notice described in division (A)(1)(a)(i) of this section
    is not required to be made upon any party who is in default for failure to appear
    in the action in which the judgment giving rise to the execution was rendered.

    (2) One of the following applies:

    (a) The officer taking the lands and tenements gives public notice once a week
    for at least three consecutive weeks before the day of sale if the sale is to
    be held at a physical location or the start date of the sale if the sale is to
    be conducted online.

    Such notice shall be by advertisement in a newspaper of general circulation in
    the county. The newspaper shall meet the requirements of section 7.12 of the Revised
    Code. The court ordering the sale may designate in the order of sale the newspaper
    in which this public notice shall be published.

    The notice shall include all the following information:

    (i) The date, time, and place of the sale if the sale is to be held at a physical
    location;

    (ii) The start date, the minimum duration, and web site address of the sale if
    the sale is to be held online;

    (iii) The deposit required by section 2329.211 of the Revised Code;

    (iv) That the purchaser shall be responsible for those costs, allowances, and
    taxes that the proceeds of the sale are insufficient to cover;

    (v) The provisional second sale date described in division (B) of section 2329.52
    of the Revised Code, if applicable; provided, however, that no sale shall be invalid,
    nor shall the court vacate any sale, if the notice described in division (A)(1)(a)(i)
    of this section or the public notice described in division (A)(2) of this section
    fails to include the provisional date for a second sale of the property and the
    property is sold on the initial sale date.

    (b) If a private selling officer has been ordered to sell the lands and tenements,
    the private selling officer shall give the public notice described in division
    (A)(2)(a) of this section in the newspaper designated by the court. If the court
    has not designated a newspaper, the private selling officer shall give this public
    notice in the newspaper customarily used or designated by the county sheriff.
    No sale that otherwise complies with division (A)(2) of this section shall be
    invalid.

    (B) The officer taking the lands and tenements shall collect the purchaser''s
    information required by section 2329.271 of the Revised Code.

    (C) A sale of lands and tenements taken in execution may be set aside in accordance
    with division (A) or (B) of section 2329.27 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.26
- number: '2329.261'
  heading: Notify land banks of foreclosure sales
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) As used in this section:

    (1) "Levying officer" means the officer who makes the public sale of the residential
    property subject to this section. "Levying officer" includes a private selling
    officer.

    (2) "Electing subdivision," "county land reutilization corporation," and "land
    reutilization program" have the same meanings as in section 5722.01 of the Revised
    Code.

    (3) "Manufactured home" has the same meaning as in section 3781.06 of the Revised
    Code.

    (4) "Qualifying residential property" means single-family residential property,
    including a single unit in a multi-unit property containing not more than ten
    units but excluding manufactured homes, that has at least one thousand square
    feet of habitable space per unit.

    (B) If qualifying residential property sold at public sale pursuant to this chapter
    is located within the territory of a land reutilization program, the levying officer
    shall notify the electing subdivision or county land reutilization corporation
    that operates the program of the sale.

    (C) The levying officer shall maintain a web site and telephone number to provide
    information on applicable properties.

    (D) A levying officer may use any web site maintained to satisfy any other provision
    of this chapter, including the official public sheriff sale web site established
    pursuant to section 2329.153 of the Revised Code, to satisfy the requirements
    of division (C) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.261
- number: '2329.27'
  heading: Public notice requirements - setting aside or confirmation of sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) When the public notice required by division (A)(2) of section 2329.26
    of the Revised Code is made in a newspaper published weekly, it is sufficient
    to insert it for three consecutive weeks. If both a daily and weekly edition of
    the paper are published and the circulation of the daily in the county exceeds
    that of the weekly in the county, or if the lands and tenements taken in execution
    are situated in a city, both a daily and weekly edition of the paper are published,
    and the circulation of the daily in that city exceeds the circulation of the weekly
    in that city, it is sufficient to publish the public notice in the daily once
    a week for three consecutive weeks before the day of sale, each insertion to be
    on the same day of the week. The expense of that publication in a daily shall
    not exceed the cost of publishing it in a weekly.

    (B)(1) Subject to divisions (B)(2) and (3) of this section, all sales of lands
    and tenements taken in execution that are made without compliance with the written
    notice requirements of division (A)(1)(a) of section 2329.26 of the Revised Code,
    the public notice requirements of division (A)(2) of that section, the notice
    requirements of section 2329.261 of the Revised Code, the purchaser information
    requirements of section 2329.271 of the Revised Code, and division (A) of this
    section shall be set aside, on motion by any interested party, by the court to
    which the execution is returnable.

    (2) Proof of service endorsed upon a copy of the written notice required by division
    (A)(1)(a) of section 2329.26 of the Revised Code shall be conclusive evidence
    of the service of the written notice in compliance with the requirements of that
    division, unless a party files a motion to set aside the sale of the lands and
    tenements pursuant to division (B)(1) of this section and establishes by a preponderance
    of the evidence that the proof of service is fraudulent.

    (3) If the court to which the execution is returnable enters its order confirming
    the sale of the lands and tenements, the order shall have both of the following
    effects:

    (a) The order shall be deemed to constitute a judicial finding as follows:

    (i) That the sale of the lands and tenements complied with the written notice
    requirements of division (A)(1)(a) of section 2329.26 of the Revised Code and
    the public notice requirements of division (A)(2) of that section, section 2329.261
    of the Revised Code, and division (A) of this section, or that compliance of that
    nature did not occur but the failure to give a written notice to a party entitled
    to notice under division (A)(1)(a) of section 2329.26 of the Revised Code has
    not prejudiced that party;

    (ii) That all parties entitled to notice under division (A)(1)(a) of section 2329.26
    of the Revised Code received adequate notice of the date, time, and place of the
    sale of the lands and tenements;

    (iii) That the purchaser has submitted the contact information required by section
    2329.271 of the Revised Code.

    (b) The order bars the filing of any further motions to set aside the sale of
    the lands and tenements.'
  history: null
