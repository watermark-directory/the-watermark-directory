- number: '2305.09'
  heading: Four years - certain torts
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: 'Except as provided for in division (C) of this section, an action for any
    of the following causes shall be brought within four years after the cause thereof
    accrued:

    (A) For trespassing upon real property;

    (B) For the recovery of personal property, or for taking or detaining it;

    (C) For relief on the ground of fraud, except when the cause of action is a violation
    of section 2913.49 of the Revised Code, in which case the action shall be brought
    within five years after the cause thereof accrued;

    (D) For an injury to the rights of the plaintiff not arising on contract nor enumerated
    in sections 1304.35, 2305.10 to 2305.12, and 2305.14 of the Revised Code;

    (E) For relief on the grounds of a physical or regulatory taking of real property.

    If the action is for trespassing under ground or injury to mines, or for the wrongful
    taking of personal property, the causes thereof shall not accrue until the wrongdoer
    is discovered; nor, if it is for fraud, until the fraud is discovered.

    An action for professional negligence against a registered surveyor shall be commenced
    within four years after the completion of the engagement on which the cause of
    action is based.'
