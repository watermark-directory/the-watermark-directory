  url: https://codes.ohio.gov/ohio-revised-code/section-2305.101
- number: '2305.11'
  heading: Time limitations for bringing certain actions
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2305'
    name: Jurisdiction; Limitation Of Actions
  text: '(A) An action for libel, slander, malicious prosecution, or false imprisonment,
    an action for malpractice other than an action upon a medical, dental, optometric,
    or chiropractic claim, an action for legal malpractice against an attorney or
    a law firm or legal professional association, or an action upon a statute for
    a penalty or forfeiture shall be commenced within one year after the cause of
    action accrued, provided that an action by an employee for the payment of unpaid
    minimum wages, unpaid overtime compensation, or liquidated damages by reason of
    the nonpayment of minimum wages or overtime compensation shall be commenced within
    two years after the cause of action accrued.

    (B) A civil action for unlawful abortion pursuant to section 2919.12 of the Revised
    Code, a civil action authorized by division (H) of section 2317.56 of the Revised
    Code, a civil action pursuant to division (B) of section 2307.52 of the Revised
    Code for terminating or attempting to terminate a human pregnancy after viability
    in violation of division (A) of section 2919.17 of the Revised Code, and a civil
    action for terminating or attempting to terminate a human pregnancy of a pain-capable
    unborn child in violation of division (E) of section 2919.201 of the Revised Code
    shall be commenced within one year after the performance or inducement of the
    abortion or within one year after the attempt to perform or induce the abortion
    in violation of division (A) of section 2919.17 of the Revised Code or division
    (E) of section 2919.201 of the Revised Code.

    (C) As used in this section, "medical claim," "dental claim," "optometric claim,"
    and "chiropractic claim" have the same meanings as in section 2305.113 of the
    Revised Code.'
