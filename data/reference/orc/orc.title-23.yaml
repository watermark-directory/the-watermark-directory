- number: '2337.10'
  heading: Enforcement of foreign judgments
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) If an action is brought to enforce a judgment of another jurisdiction
    expressed in a foreign money and the judgment is recognized in this state as enforceable,
    the enforcing judgment must be entered as provided in section 2337.07 of the Revised
    Code, whether or not the foreign judgment confers an option to pay in an equivalent
    amount of United States dollars.

    (B) A foreign judgment may be filed in accordance with any rule or statute of
    this state providing a procedure for its recognition and enforcement.

    (C) A satisfaction or partial payment made upon the foreign judgment, on proof
    thereof, must be credited against the amount of foreign money specified in the
    judgment, notwithstanding the entry of judgment in this state.

    (D) A judgment entered on a foreign-money claim only in United States dollars
    in another state must be enforced in this state in United States dollars only.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.10
- number: '2337.11'
  heading: Determining United States dollar value of foreign-money claims for limited
    purposes
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) Computations under this section are for the limited purposes of the section
    and do not affect computation of the United States dollar equivalent of the money
    of the judgment for the purpose of payment.

    (B) For the limited purpose of facilitating the enforcement of provisional remedies
    in an action, the value in United States dollars of assets to be seized or restrained
    pursuant to a writ of attachment, garnishment, execution, or other legal process,
    the amount of United States dollars at issue for assessing costs, or the amount
    of United States dollars involved for a surety bond or other court-required undertaking,
    must be ascertained as provided in divisions (C) and (D) of this section.

    (C) A party seeking process, costs, bond, or other undertaking under division
    (B) of this section shall compute in United States dollars the amount of the foreign
    money claimed from a bank-offered spot rate prevailing at or near the close of
    business on the banking day next preceding the filing of a request or application
    for the issuance of process or for the determination of costs, or an application
    for a bond or other court-required undertaking.

    (D) A party seeking the process, costs, bond, or other undertaking under division
    (B) of this section shall file with each request or application an affidavit or
    certificate executed in good faith by its counsel or a bank officer, stating the
    market quotation used and how it was obtained, and setting forth the calculation.
    Affected court officials incur no liability, after a filing of the affidavit or
    certificate, for acting as if the judgment were in the amount of United States
    dollars stated in the affidavit or certificate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.11
- number: '2337.12'
  heading: Effect of currency revalorization
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: '(A) If, after an obligation is expressed or a loss is incurred in a foreign
    money, the country issuing or adopting that money substitutes a new money in place
    of that money, the obligation or the loss is treated as if expressed or incurred
    in the new money at the rate of conversion the issuing country establishes for
    the payment of like obligations or losses denominated in the former money.

    (B) If substitution under division (A) of this section occurs after a judgment
    or award is entered on a foreign-money claim, the court or arbitrator shall amend
    the judgment or award by a like conversion of the former money.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2337.12
- number: '2337.13'
  heading: Supplementary general principles of law
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2337'
    name: Uniform Foreign-money Claims Act
  text: Unless displaced by particular provisions of sections 2337.01 to 2337.15 of
    the Revised Code, the principles of law and equity, including the law merchant,
    and the law relative to capacity to contract, principal and agent, estoppel, fraud,
    misrepresentation, duress, coercion, mistake, bankruptcy, or other validating
    or invalidating causes, supplement these sections.
