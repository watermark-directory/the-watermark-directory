  url: https://codes.ohio.gov/ohio-revised-code/section-2307.91
- number: '2307.92'
  heading: Asbestos claim - prima facie showing - evidence of physical impairment
    - effect of decision
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) For purposes of section 2305.10 and sections 2307.92 to 2307.95 of the
    Revised Code, "bodily injury caused by exposure to asbestos" means physical impairment
    of the exposed person, to which the person''s exposure to asbestos is a substantial
    contributing factor.

    (B) No person shall bring or maintain a tort action alleging an asbestos claim
    based on a nonmalignant condition in the absence of a prima-facie showing, in
    the manner described in division (A) of section 2307.93 of the Revised Code, that
    the exposed person has a physical impairment, that the physical impairment is
    a result of a medical condition, and that the person''s exposure to asbestos is
    a substantial contributing factor to the medical condition. That prima-facie showing
    shall include all of the following minimum requirements:

    (1) Evidence verifying that a competent medical authority has taken a detailed
    occupational and exposure history of the exposed person from the exposed person
    or, if that person is deceased, from the person who is most knowledgeable about
    the exposures that form the basis of the asbestos claim for a nonmalignant condition,
    including all of the following:

    (a) All of the exposed person''s principal places of employment and exposures
    to airborne contaminants;

    (b) Whether each principal place of employment involved exposures to airborne
    contaminants, including, but not limited to, asbestos fibers or other disease
    causing dusts, that can cause pulmonary impairment and, if that type of exposure
    is involved, the general nature, duration, and general level of the exposure.

    (2) Evidence verifying that a competent medical authority has taken a detailed
    medical and smoking history of the exposed person, including a thorough review
    of the exposed person''s past and present medical problems and the most probable
    causes of those medical problems;

    (3) A diagnosis by a competent medical authority, based on a medical examination
    and pulmonary function testing of the exposed person, that all of the following
    apply to the exposed person:

    (a) The exposed person has a permanent respiratory impairment rating of at least
    class 2 as defined by and evaluated pursuant to the AMA guides to the evaluation
    of permanent impairment.

    (b) Either of the following:

    (i) The exposed person has asbestosis or diffuse pleural thickening, based at
    a minimum on radiological or pathological evidence of asbestosis or radiological
    evidence of diffuse pleural thickening. The asbestosis or diffuse pleural thickening
    described in this division, rather than solely chronic obstructive pulmonary disease,
    is a substantial contributing factor to the exposed person''s physical impairment,
    based at a minimum on a determination that the exposed person has any of the following:

    (I) A forced vital capacity below the predicted lower limit of normal and a ratio
    of FEV1 to FVC that is equal to or greater than the predicted lower limit of normal;

    (II) A total lung capacity, by plethysmography or timed gas dilution, below the
    predicted lower limit of normal;

    (III) A chest x-ray showing small, irregular opacities (s, t) graded by a certified
    B-reader at least 2/1 on the ILO scale.

    (ii) If the exposed person has a chest x-ray showing small, irregular opacities
    (s, t) graded by a certified B-reader as only a 1/0 on the ILO scale, then in
    order to establish that the exposed person has asbestosis, rather than solely
    chronic obstructive pulmonary disease, that is a substantial contributing factor
    to the exposed person''s physical impairment the plaintiff must establish that
    the exposed person has both of the following:

    (I) A forced vital capacity below the predicted lower limit of normal and a ratio
    of FEV1 to FVC that is equal to or greater than the predicted lower limit of normal;

    (II) A total lung capacity, by plethysmography or timed gas dilution, below the
    predicted lower limit of normal.

    (C)(1) No person shall bring or maintain a tort action alleging an asbestos claim
    based upon lung cancer of an exposed person who is a smoker, in the absence of
    a prima-facie showing, in the manner described in division (A) of section 2307.93
    of the Revised Code, that the exposed person has a physical impairment, that the
    physical impairment is a result of a medical condition, and that the person''s
    exposure to asbestos is a substantial contributing factor to the medical condition.
    That prima-facie showing shall include all of the following minimum requirements:

    (a) A diagnosis by a competent medical authority that the exposed person has primary
    lung cancer and that exposure to asbestos is a substantial contributing factor
    to that cancer;

    (b) Evidence that is sufficient to demonstrate that at least ten years have elapsed
    from the date of the exposed person''s first exposure to asbestos until the date
    of diagnosis of the exposed person''s primary lung cancer. The ten-year latency
    period described in this division is a rebuttable presumption, and the plaintiff
    has the burden of proof to rebut the presumption.

    (c) Either of the following:

    (i) Evidence of the exposed person''s substantial occupational exposure to asbestos;

    (ii) Evidence of the exposed person''s exposure to asbestos at least equal to
    25 fiber per cc years as determined to a reasonable degree of scientific probability
    by a scientifically valid retrospective exposure reconstruction conducted by a
    certified industrial hygienist or certified safety professional based upon all
    reasonably available quantitative air monitoring data and all other reasonably
    available information about the exposed person''s occupational history and history
    of exposure to asbestos.

    (2) If a plaintiff files a tort action that alleges an asbestos claim based upon
    lung cancer of an exposed person who is a smoker, alleges that the plaintiff''s
    exposure to asbestos was the result of living with another person who, if the
    tort action had been filed by the other person, would have met the requirements
    specified in division (C)(1)(c) of this section, and alleges that the plaintiff
    lived with the other person for the period of time specified in division (GG)
    of section 2307.91 of the Revised Code, the plaintiff is considered as having
    satisfied the requirements specified in division (C)(1)(c) of this section.

    (D)(1) No person shall bring or maintain a tort action alleging an asbestos claim
    that is based upon a wrongful death, as described in section 2125.01 of the Revised
    Code of an exposed person in the absence of a prima-facie showing, in the manner
    described in division (A) of section 2307.93 of the Revised Code, that the death
    of the exposed person was the result of a physical impairment, that the death
    and physical impairment were a result of a medical condition, and that the deceased
    person''s exposure to asbestos was a substantial contributing factor to the medical
    condition. That prima-facie showing shall include all of the following minimum
    requirements:

    (a) A diagnosis by a competent medical authority that exposure to asbestos was
    a substantial contributing factor to the death of the exposed person;

    (b) Evidence that is sufficient to demonstrate that at least ten years have elapsed
    from the date of the deceased exposed person''s first exposure to asbestos until
    the date of diagnosis or death of the deceased exposed person. The ten-year latency
    period described in this division is a rebuttable presumption, and the plaintiff
    has the burden of proof to rebut the presumption.

    (c) Either of the following:

    (i) Evidence of the deceased exposed person''s substantial occupational exposure
    to asbestos;

    (ii) Evidence of the deceased exposed person''s exposure to asbestos at least
    equal to 25 fiber per cc years as determined to a reasonable degree of scientific
    probability by a scientifically valid retrospective exposure reconstruction conducted
    by a certified industrial hygienist or certified safety professional based upon
    all reasonably available quantitative air monitoring data and all other reasonably
    available information about the deceased exposed person''s occupational history
    and history of exposure to asbestos.

    (2) If a person files a tort action that alleges an asbestos claim based on a
    wrongful death, as described in section 2125.01 of the Revised Code, of an exposed
    person, alleges that the death of the exposed person was the result of living
    with another person who, if the tort action had been filed by the other person,
    would have met the requirements specified in division (D)(1)(c) of this section,
    and alleges that the exposed person lived with the other person for the period
    of time specified in division (GG) of section 2307.91 of the Revised Code in order
    to qualify as a substantial occupational exposure to asbestos, the exposed person
    is considered as having satisfied the requirements specified in division (D)(1)(c)
    of this section.

    (3) No court shall require or permit the exhumation of a decedent for the purpose
    of obtaining evidence to make, or to oppose, a prima-facie showing required under
    division (D)(1) or (2) of this section regarding a tort action of the type described
    in that division.

    (E) No prima-facie showing is required in a tort action alleging an asbestos claim
    based upon mesothelioma.

    (F) Evidence relating to physical impairment under this section, including pulmonary
    function testing and diffusing studies, shall comply with the technical recommendations
    for examinations, testing procedures, quality assurance, quality control, and
    equipment incorporated in the AMA guides to the evaluation of permanent impairment
    and reported as set forth in 20 C.F.R. Pt. 404, Subpt. P, App. 1, Part A, Sec.
    3.00 E. and F., and the interpretive standards set forth in the official statement
    of the American thoracic society entitled "lung function testing: selection of
    reference values and interpretive strategies" as published in American review
    of respiratory disease, 1991:144:1202-1218.

    (G) All of the following apply to the court''s decision on the prima-facie showing
    that meets the requirements of division (B), (C), or (D) of this section:

    (1) The court''s decision does not result in any presumption at trial that the
    exposed person has a physical impairment that is caused by an asbestos-related
    condition.

    (2) The court''s decision is not conclusive as to the liability of any defendant
    in the case.

    (3) The court''s findings and decisions are not admissible at trial.

    (4) If the trier of fact is a jury, the court shall not instruct the jury with
    respect to the court''s decision on the prima-facie showing, and neither counsel
    for any party nor a witness shall inform the jury or potential jurors of that
    showing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.92
- number: '2307.93'
  heading: Asbestos claim - filing of evidence of physical impairment - challenge
    - administrative dismissal
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A)(1) The plaintiff in any tort action who alleges an asbestos claim shall
    file, within thirty days after filing the complaint or other initial pleading,
    a written report and supporting test results constituting prima-facie evidence
    of the exposed person''s physical impairment that meets the minimum requirements
    specified in division (B), (C), or (D) of section 2307.92 of the Revised Code,
    whichever is applicable. The defendant in the case shall be afforded a reasonable
    opportunity, upon the defendant''s motion, to challenge the adequacy of the proffered
    prima-facie evidence of the physical impairment for failure to comply with the
    minimum requirements specified in division (B), (C), or (D) of section 2307.92
    of the Revised Code. The defendant has one hundred twenty days from the date the
    specified type of prima-facie evidence is proffered to challenge the adequacy
    of that prima-facie evidence. If the defendant makes that challenge and uses a
    physician to do so, the physician must meet the requirements specified in divisions
    (Z)(1), (3), and (4) of section 2307.91 of the Revised Code.

    (2) With respect to any asbestos claim that is pending on the effective date of
    this section, the plaintiff shall file the written report and supporting test
    results described in division (A)(1) of this section within one hundred twenty
    days following the effective date of this section. Upon motion and for good cause
    shown, the court may extend the one hundred twenty-day period described in this
    division.

    (3)(a) For any cause of action that arises before the effective date of this section,
    the provisions set forth in divisions (B), (C), and (D) of section 2307.92 of
    the Revised Code are to be applied unless the court that has jurisdiction over
    the case finds both of the following:

    (i) A substantive right of a party to the case has been impaired.

    (ii) That impairment is otherwise in violation of Section 28 of Article II, Ohio
    Constitution.

    (b) If a finding under division (A)(3)(a) of this section is made by the court
    that has jurisdiction over the case, then the court shall determine whether the
    plaintiff has failed to provide sufficient evidence to support the plaintiff''s
    cause of action or the right to relief under the law that is in effect prior to
    the effective date of this section.

    (c) If the court that has jurisdiction of the case finds that the plaintiff has
    failed to provide sufficient evidence to support the plaintiff''s cause of action
    or right to relief under division (A)(3)(b) of this section, the court shall administratively
    dismiss the plaintiff''s claim without prejudice. The court shall maintain its
    jurisdiction over any case that is administratively dismissed under this division.
    Any plaintiff whose case has been administratively dismissed under this division
    may move to reinstate the plaintiff''s case if the plaintiff provides sufficient
    evidence to support the plaintiff''s cause of action or the right to relief under
    the law that was in effect when the plaintiff''s cause of action arose.

    (B) If the defendant in an action challenges the adequacy of the prima-facie evidence
    of the exposed person''s physical impairment as provided in division (A)(1) of
    this section, the court shall determine from all of the evidence submitted whether
    the proffered prima-facie evidence meets the minimum requirements specified in
    division (B), (C), or (D) of section 2307.92 of the Revised Code. The court shall
    resolve the issue of whether the plaintiff has made the prima-facie showing required
    by division (B), (C), or (D) of section 2307.92 of the Revised Code by applying
    the standard for resolving a motion for summary judgment.

    (C) The court shall administratively dismiss the plaintiff''s claim without prejudice
    upon a finding of failure to make the prima-facie showing required by division
    (B), (C), or (D) of section 2307.92 of the Revised Code. The court shall maintain
    its jurisdiction over any case that is administratively dismissed under this division.
    Any plaintiff whose case has been administratively dismissed under this division
    may move to reinstate the plaintiff''s case if the plaintiff makes a prima-facie
    showing that meets the minimum requirements specified in division (B), (C), or
    (D) of section 2307.92 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.93
- number: '2307.931'
  heading: Asbestos claim - plaintiff to file specified disclosures
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) The plaintiff in any tort action who alleges an asbestos claim shall,
    within sixty days after filing any complaint, provide all parties with a sworn
    statement specifying the basis for each asbestos claim against each defendant,
    including the following:

    (1) The name, address, date of birth, marital status, occupation, smoking history,
    current and past worksites, and current and past employers of the exposed person
    and any person through whom the exposed person was exposed to asbestos;

    (2) The name and address of each person who is knowledgeable regarding the exposed
    person''s exposures to asbestos;

    (3) The asbestos-containing product for each defendant to which the exposed person
    was exposed or to which the other person was exposed if the exposure was through
    another person;

    (4) The sites that establish the direct connection between the exposed person,
    or the other person if the exposure was through another person, and each defendant;

    (5) The beginning and ending dates of each exposure to asbestos or an asbestos-containing
    product for the exposed person or the other person if the exposure was through
    another person;

    (6) The asbestos-related disease that is alleged;

    (7) Any supporting documentation relating to the information required under division
    (A) of this section.

    (B) The sworn statement required under division (A) of this section is in addition
    to other requirements for asbestos claims under sections 2307.91 to 2307.98 of
    the Revised Code.

    (C) A plaintiff in a tort action alleging an asbestos claim has a continuing duty
    to supplement the information that is required to be disclosed under division
    (A) of this section, including when the plaintiff receives new exposure history
    information or becomes aware that a prior disclosure was inaccurate or incomplete.

    (D) Except as provided in division (E) of this section, on a motion by a defendant,
    the court shall dismiss the plaintiff''s asbestos claim without prejudice if the
    defendant''s asbestos-containing product or site is not identified in the disclosures
    required under division (A) of this section or the plaintiff fails to comply with
    division (A) of this section.

    (E) The court may not dismiss a plaintiff''s claim under division (D) of this
    section upon a showing of good cause by the plaintiff.

    (F) This section does not apply to a claim for workers'' compensation or a claim
    for veterans'' benefits.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.931
- number: '2307.94'
  heading: Asbestos claim - tolling of statute of limitations - nonmalignant and cancer
    claims distinct
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Notwithstanding any other provision of the Revised Code, with respect
    to any asbestos claim based upon a nonmalignant condition that is not barred as
    of the effective date of this section, the period of limitations shall not begin
    to run until the exposed person has a cause of action for bodily injury pursuant
    to section 2305.10 of the Revised Code. An asbestos claim based upon a nonmalignant
    condition that is filed before the cause of action for bodily injury pursuant
    to that section arises is preserved for purposes of the period of limitations.

    (B) An asbestos claim that arises out of a nonmalignant condition shall be a distinct
    cause of action from an asbestos claim relating to the same exposed person that
    arises out of asbestos-related cancer. No damages shall be awarded for fear or
    risk of cancer in any tort action asserting only an asbestos claim for a nonmalignant
    condition.

    (C) No settlement of an asbestos claim for a nonmalignant condition that is concluded
    after the effective date of this section shall require, as a condition of settlement,
    the release of any future claim for asbestos-related cancer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.94
- number: '2307.941'
  heading: Asbestos claim against premises owner
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) The following apply to all tort actions for asbestos claims brought against
    a premises owner to recover damages or other relief for exposure to asbestos on
    the premises owner''s property:

    (1) A premises owner is not liable for any injury to any individual resulting
    from asbestos exposure unless that individual''s alleged exposure occurred while
    the individual was at the premises owner''s property.

    (2) If exposure to asbestos is alleged to have occurred before January 1, 1972,
    it is presumed that a premises owner knew that this state had adopted safe levels
    of exposure for asbestos and that products containing asbestos were used on its
    property only at levels below those safe levels of exposure. To rebut this presumption,
    the plaintiff must prove by a preponderance of the evidence that the premises
    owner knew or should have known that the levels of asbestos in the immediate breathing
    zone of the plaintiff regularly exceeded the threshold limit values adopted by
    this state and that the premises owner allowed that condition to persist.

    (3)(a) A premises owner is presumed to be not liable for any injury to any invitee
    who was engaged to work with, install, or remove asbestos products on the premises
    owner''s property if the invitee''s employer held itself out as qualified to perform
    the work. To rebut this presumption, the plaintiff must prove by a preponderance
    of the evidence that at the time of the exposure to asbestos that is alleged the
    premises owner had actual knowledge of the potential dangers of the asbestos products
    at the time of the alleged exposure that was superior to the knowledge of both
    the invitee and the invitee''s employer.

    (b) A premises owner that hired a contractor before January 1, 1972, to perform
    the type of work at the premises owner''s property that the contractor was qualified
    to perform cannot be liable for any injury to any individual resulting from asbestos
    exposure caused by any of the contractor''s employees or agents on the premises
    owner''s property unless the premises owner directed the activity that resulted
    in the injury or gave or denied permission for the critical acts that led to the
    individual''s injury.

    (c) If exposure to asbestos is alleged to have occurred on or after January 1,
    1972, a premises owner is not liable for any injury to any individual resulting
    from that exposure caused by a contractor''s employee or agent on the premises
    owner''s property unless the plaintiff establishes the premises owner''s intentional
    violation of an established safety standard that was in effect at the time of
    the exposure and that the alleged violation was in the plaintiff''s breathing
    zone and was the proximate cause of the plaintiff''s medical condition.

    (B) As used in this section:

    (1) "Threshold limit values" means that, for the years 1946 through 1971, the
    concentration of asbestos in a worker''s breathing zone did not exceed the following
    maximum allowable exposure limits for the eight-hour time-weighted average airborne
    concentration:

    (a) Asbestos: five million particles per cubic foot;

    (b) Cadmium: 0.10 milligrams per cubic meter;

    (c) Chromic acid and chromates (calculated as chromic oxide): 0.10 milligrams
    per cubic meter;

    (d) Lead: 0.15 milligrams per cubic meter;

    (e) Manganese: 6.0 milligrams per cubic meter;

    (f) Mercury: 0.10 milligrams per cubic meter;

    (g) Zinc oxide: 15.0 milligrams per cubic meter;

    (h) Chlorinated diphenyls: 1.0 milligram per cubic meter;

    (i) Chlorinated naphthalenes (trichlornaphthalene): 5.0 milligrams per cubic meter;

    (j) Chlorinated naphthalenes (pentachlornaphthalene): 0.50 milligrams per cubic
    meter.

    (2) "Established safety standard" means that, for the years after 1971, the concentration
    of asbestos in the breathing zone of a worker does not exceed the maximum allowable
    exposure limits for the eight-hour time-weighted average airborne concentration
    as promulgated by the occupational safety and health administration (OSHA) in
    effect at the time of the alleged exposure.

    (3) "Employee" means an individual who performs labor or provides construction
    services pursuant to a construction contract as defined in section 4123.79 of
    the Revised Code, or a remodeling or repair contract, whether written or oral,
    if at least ten of the following criteria apply:

    (a) The individual is required to comply with instructions from the other contracting
    party regarding the manner or method of performing services.

    (b) The individual is required by the other contracting party to have particular
    training.

    (c) The individual''s services are integrated into the regular functioning of
    the other contracting party.

    (d) The individual is required to perform the work personally.

    (e) The individual is hired, supervised, or paid by the other contracting party.

    (f) A continuing relationship exists between the individual and the other contracting
    party that contemplates continuing or recurring work even if the work is not full
    time.

    (g) The individual''s hours of work are established by the other contracting party.

    (h) The individual is required to devote full time to the business of the other
    contracting party.

    (i) The person is required to perform the work on the premises of the other contracting
    party.

    (j) The individual is required to follow the order of work set by the other contracting
    party.

    (k) The individual is required to make oral or written reports of progress to
    the other contracting party.

    (l) The individual is paid for services on a regular basis, including hourly,
    weekly, or monthly.

    (m) The individual''s expenses are paid for by the other contracting party.

    (n) The individual''s tools and materials are furnished by the other contracting
    party.

    (o) The individual is provided with the facilities used to perform services.

    (p) The individual does not realize a profit or suffer a loss as a result of the
    services provided.

    (q) The individual is not performing services for a number of employers at the
    same time.

    (r) The individual does not make the same services available to the general public.

    (s) The other contracting party has a right to discharge the individual.

    (t) The individual has the right to end the relationship with the other contracting
    party without incurring liability pursuant to an employment contract or agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.941
- number: '2307.95'
  heading: Asbestos claim - operation of other laws unaffected
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Nothing in sections 2307.92 to 2307.95 of the Revised Code is intended
    to do, and nothing in any of those sections shall be interpreted to do, either
    of the following:

    (1) Affect the rights of any party in bankruptcy proceedings;

    (2) Affect the ability of any person who is able to make a showing that the person
    satisfies the claim criteria for compensable claims or demands under a trust established
    pursuant to a plan of reorganization under Chapter 11 of the United States Bankruptcy
    Code, 11 U.S.C. Chapter 11, to make a claim or demand against that trust.

    (B) Sections 2307.91 to 2307.95 of the Revised Code shall not affect the scope
    or operation of any workers'' compensation law or veterans'' benefit program or
    the exclusive remedy of subrogation under the provisions of that law or program
    and shall not authorize any lawsuit that is barred by any provision of any workers''
    compensation law.

    (C) Except as provided in division (D) of section 2307.92 of the Revised Code
    and in other provisions that relate to the application of that division and the
    procedures and criteria it contains, nothing in sections 2307.92, 2307.93, 2307.94,
    and 2307.95 of the Revised Code is intended, and nothing in any of those sections
    shall be interpreted, to affect any wrongful death claim, as described in section
    2125.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.95
- number: '2307.951'
  heading: Definitions for RC sections 2307.952 to 2307.954
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: 'As used in this section and sections 2307.952 to 2307.954 of the Revised
    Code:

    (A) "Asbestos," "asbestos claim," and "tort action" have the same meanings as
    in section 2307.91 of the Revised Code.

    (B) "Asbestos tort action" means a tort action based on an asbestos claim.

    (C) Except as otherwise provided in division (E) of section 2307.954 of the Revised
    Code, "asbestos trust" means and encompasses all trust entities, claims agents,
    or claims processing facilities that are created pursuant to the jurisdiction
    of a United States bankruptcy court and section 524(g) of Chapter 11 of the United
    States Bankruptcy Code, 11 U.S.C. 524(g), or other applicable provision of law,
    that are formed for the purpose of compensating claimants asserting eligible asbestos
    claims, and that are in existence on the date initially set for trial in the asbestos
    tort action.

    (D) "Asbestos trust claim" means any claim for compensation by an exposed person
    or the exposed person''s representative against any asbestos trust.

    (E) "Cancer" means a malignant condition.

    (F) "Claimant" means any person asserting an asbestos claim or asbestos trust
    claim. "Claimant" includes a plaintiff, counterclaimant, cross-claimant, or third-party
    plaintiff.

    (G) "Exposed person" means any person whose exposure to asbestos or to asbestos-containing
    products is the basis for an asbestos claim.

    (H) "Noncancer" means a nonmalignant condition.

    (I) "Proof of claim" means any form of documentation that a potential claimant
    against an asbestos trust submits or provides to the asbestos trust that attests
    to or asserts the existence of any liquidated or unliquidated asbestos claim that
    the claimant may have against the asbestos trust or its predecessors under any
    theory of law.

    (J) "Trust claims material" means documents constituting an asbestos trust claim,
    including, but not limited to, claim forms, proofs of claim, and informational
    material required by an asbestos trust to be submitted by a claimant in order
    to have the claim evaluated by the asbestos trust and relied upon by the asbestos
    trust in making its compensation determination.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.951
- number: '2307.952'
  heading: Disclosures pertaining to asbestos trust claims
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A)(1)(a) Within thirty days after the commencement of discovery in an asbestos
    tort action that is not otherwise barred or deferred under applicable law or within
    thirty days of the effective date of this section with respect to an asbestos
    tort action that is pending on that effective date and in which discovery has
    commenced, a claimant shall provide to all of the parties in the action a sworn
    statement by the claimant, under penalty of perjury, identifying all existing
    asbestos trust claims made by or on behalf of the claimant and all trust claims
    material pertaining to each identified asbestos trust claim. The sworn statement
    shall disclose the date on which each asbestos trust claim against the relevant
    asbestos trust was made and whether any request for a deferral, delay, suspension,
    or tolling of the asbestos trust claims process has been submitted.

    (b) The submission of the sworn statement under division (A)(1)(a) of this section
    shall be in addition to any disclosure requirements otherwise imposed by law,
    civil rule, court order or ruling, applicable agreement or stipulation, local
    rule, or case management order.

    (2) If the claimant, subsequent to the submission of the sworn statement under
    division (A)(1)(a) of this section, files with or submits to any asbestos trust
    additional asbestos trust claims not previously disclosed, the claimant shall
    provide to all of the parties in the asbestos tort action an amendment updating
    the sworn statement and identifying the additional asbestos trust claims. The
    claimant shall provide any amendment under division (A)(2) of this section within
    thirty days of filing an additional asbestos trust claim with, or submitting an
    additional asbestos trust claim to, any asbestos trust.

    (3) With respect to any asbestos trust claim that a claimant discloses under division
    (A)(2) of this section in an amendment to the sworn statement, the claimant shall
    provide to all of the parties in the asbestos tort action all trust claims material
    pertaining to each additional asbestos trust claim identified in that amendment.
    The claimant shall provide the trust claims materials under division (A)(3) of
    this section within thirty days of filing or submitting each additional asbestos
    trust claim.

    (B) Failure to provide to all of the parties in the asbestos tort action all trust
    claims material as required by this section in a timely manner shall constitute
    grounds for the court to decline to assign an initial trial date or extend the
    date set for trial in the action.

    (C) Nothing in this section prevents a court of competent jurisdiction from requiring
    any disclosures in addition to the disclosures required under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.952
- number: '2307.953'
  heading: Motion to stay proceedings in asbestos tort action
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) Not less than seventy-five days prior to the commencement of trial, any
    defendant in an asbestos tort action may file a motion with the court, with notice
    to the claimant and to all of the parties in the action, for an order to stay
    the proceedings. A defendant''s motion to stay the proceedings shall set forth
    credible evidence that demonstrates all of the following:

    (1) The identities of all asbestos trusts not previously disclosed by the claimant
    pursuant to section 2307.952 of the Revised Code against which the claimant has
    not made any asbestos trust claims but against which the defendant in good faith
    believes the claimant may make a successful asbestos trust claim;

    (2) The information that the defendant believes supports the additional asbestos
    trust claims described in division (A)(1) of this section;

    (3) A description of the information sufficient to meet the asbestos trust claim
    requirements of the asbestos trusts described in division (A)(1) of this section.

    (B) Notwithstanding any other provision in this section, if the claimant produces
    additional asbestos exposure information that supports the filing of an additional
    asbestos trust claim, the defendant may file a motion to stay the proceedings
    under division (A) of this section within seven days of receiving the additional
    asbestos exposure information.

    (C)(1) Within fourteen days after the filing of the defendant''s motion for an
    order to stay the proceedings under division (A) of this section, the claimant
    may do any of the following:

    (a) File the asbestos trust claims with or submit them to the asbestos trusts
    identified in the defendant''s motion for an order to stay the proceedings. The
    submission to the court and to all of the parties in the asbestos tort action
    of proof demonstrating that the asbestos trust claims identified in the defendant''s
    motion to stay the proceedings have been filed with or submitted to the appropriate
    asbestos trusts is dispositive of the defendant''s motion for an order to stay
    the proceedings. Alternatively, the defendant may withdraw the motion brought
    under division (A) of this section.

    (b) File with the court a response to the defendant''s motion for an order to
    stay the proceedings requesting a determination by the court that the information
    supporting the asbestos trust claims against the asbestos trusts identified in
    the defendant''s motion for an order to stay the proceedings should be modified
    prior to the filing of an asbestos trust claim with, or the submission of an asbestos
    trust claim to, an asbestos trust or that there is insufficient information to
    file or submit the asbestos trust claim identified in the defendant''s motion
    for an order to stay the proceedings.

    (c) File with the court a response to the defendant''s motion for an order to
    stay the proceedings requesting a determination by the court that the claimant''s
    or attorney''s fees and expenses to prepare the asbestos claim form and file or
    submit the asbestos trust claim identified in the defendant''s motion for an order
    to stay the proceedings exceed the claimant''s reasonably anticipated recovery
    from the asbestos trust claim.

    (2) A submission by the claimant under division (C)(1)(b) or (c) of this section
    does not constitute a waiver of the attorney-client privilege or work product
    privilege.

    (D)(1) If the defendant has met its burden under division (A) of this section
    and if the claimant files a response pursuant to division (C)(1)(b) of this section,
    the court shall determine by a preponderance of the evidence if a successful asbestos
    trust claim could be submitted in good faith to each asbestos trust identified
    in the defendant''s motion for an order to stay the proceedings brought under
    division (A) of this section. The claimant has the burden of proof, by a preponderance
    of the evidence, to demonstrate that the information set forth by the defendant
    pursuant to divisions (A)(2) and (3) of this section should be modified prior
    to the filing of an asbestos trust claim with, or the submission of an asbestos
    trust claim to, each asbestos trust identified in the defendant''s motion or that
    the asbestos trust claim should not be filed with or submitted to the asbestos
    trust because a successful asbestos trust claim cannot be made in good faith.

    (2) If the defendant files a motion to stay the proceedings and if the claimant
    files a response pursuant to division (C)(1)(c) of this section, the court shall
    determine if the claimant''s or attorney''s fees and expenses to prepare the asbestos
    claim form and file or submit the asbestos trust claim identified in the defendant''s
    motion for an order to stay the proceedings exceed the claimant''s reasonably
    anticipated recovery from the asbestos trust claim. If the court determines that
    the claimant''s or attorney''s fees and expenses exceed the claimant''s reasonably
    anticipated recovery from the asbestos trust claim, the court shall require the
    claimant to file with the court a verified statement of the claimant''s exposure
    history to the asbestos products covered by that asbestos trust.

    (E) If the court determines that there is a good faith basis for filing an asbestos
    trust claim with, or submitting an asbestos trust claim to, an asbestos trust
    identified in the defendant''s motion for an order to stay the proceedings brought
    under division (A) of this section, the court shall stay the proceedings until
    the claimant files the asbestos trust claims with or submits them to the asbestos
    trusts identified in the defendant''s motion for an order to stay the proceedings
    and has otherwise met the obligations set forth in this section and section 2307.952
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2307.953
- number: '2307.954'
  heading: Disclosure of noncancer asbestos trust claims and cancer asbestos trust
    claims
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2307'
    name: Civil Actions
  text: '(A) A noncancer asbestos trust claim and a cancer asbestos trust claim are
    based on distinct injuries caused by a person''s exposure to asbestos. A noncancer
    asbestos trust claim that is subject to disclosure under section 2307.952 or 2307.953
    of the Revised Code or is identified in this section means the noncancer asbestos
    claim that is the subject of the asbestos tort action in which the defendant seeks
    discovery pursuant to sections 2307.951 to 2307.954 of the Revised Code. If a
    claimant previously filed a noncancer asbestos trust claim with, or submitted
    a noncancer asbestos trust claim to, an asbestos trust and subsequently filed
    an asbestos tort action based on a cancer asbestos claim, a cancer asbestos trust
    claim that is subject to disclosure under section 2307.952 or 2307.953 of the
    Revised Code or is identified in this section means both the earlier filed noncancer
    asbestos trust claim and the cancer asbestos claim that is the subject of the
    subsequent asbestos tort action.

    (B) Asbestos trust claims and the information that is the subject of disclosure
    under section 2307.952 or 2307.953 of the Revised Code are presumed to be authentic,
    relevant to, and discoverable in an asbestos tort action. Notwithstanding any
    agreement or confidentiality provision, trust claims material are presumed to
    not be privileged. The parties in the asbestos tort action may introduce at trial
    any trust claims material to prove alternative causation for the exposed person''s
    claimed injury, death, or loss to person, to prove a basis to allocate responsibility
    for the claimant''s claimed injury, death, or loss to person, and to prove issues
    relevant to an adjudication of the asbestos claim, unless the exclusion of the
    trust claims material is otherwise required by the rules of evidence.

    (C) In addition to the disclosure requirements set forth in sections 2307.952
    and 2307.953 of the Revised Code, the parties to the asbestos tort action may
    seek additional disclosure and discovery of information relevant to the action
    by any mechanism provided by any applicable section of the Revised Code, the Rules
    of Civil Procedure, any local rule, or any case management order. In addition
    to the disclosure described in this division, any defendant in the asbestos tort
    action also may seek discovery of the claimant''s asbestos trust claims directly
    from the asbestos trusts involved.

    (D) In an asbestos tort action, upon the filing by a defendant or judgment debtor
    of an appropriate motion seeking sanctions or other relief, the court may impose
    any sanction provided by a law of this state, including, but not limited to, vacating
    a judgment rendered in an asbestos tort action for a claimant''s failure to comply
    with the disclosure requirements of this section and sections 2307.952 and 2307.953
    of the Revised Code.

    (E)(1) If subsequent to obtaining a judgment in an asbestos tort action in this
    state a claimant files any additional asbestos trust claim with, or submits any
    additional asbestos trust claim to, an asbestos trust that was in existence at
    the time the claimant obtained that judgment, the trial court, upon the filing
    by a defendant or judgment debtor of an appropriate motion seeking sanctions or
    other relief, has jurisdiction to reopen its judgment in the asbestos tort action
    and do either of the following:

    (a) Adjust the judgment by the amount of any subsequent asbestos trust payments
    obtained by the claimant;

    (b) Order any other relief to the parties that the court considers just and proper.

    (2) As used in division (E) of this section, "asbestos trust" means and encompasses
    all trust entities, claims agents, or claims processing facilities that are created
    pursuant to the jurisdiction of a United States bankruptcy court and section 524(g)
    of Chapter 11 of the United States Bankruptcy Code, 11 U.S.C. 524(g), or other
    applicable provision of law and that are formed for the purpose of compensating
    claimants asserting eligible asbestos claims.

    (F) A defendant or judgment debtor shall file any motion under this section within
    a reasonable time and not more than one year after the judgment was entered or
    taken.'
