  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2301.05
- number: '2301.10'
  heading: Order for accused to appear for fingerprinting
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) If a sheriff or chief of police has not taken, or caused to be taken,
    a person''s or child''s fingerprints in accordance with division (A)(1) of section
    109.60 of the Revised Code with respect to a crime or act set forth in that division
    by the time of the arraignment or first appearance of the person or child with
    respect to that crime or act, the court of common pleas shall order the person
    or child to appear before the sheriff or chief of police within twenty-four hours
    of the arraignment or first appearance to have the person''s or child''s fingerprints
    taken as provided in division (A)(2) of section 109.60 of the Revised Code.

    (B) If the court of common pleas has jurisdiction over a case involving a person
    or child with respect to whom division (A)(1) or (2) of section 109.60 of the
    Revised Code requires a sheriff or chief of police to take the person''s or child''s
    fingerprints, the court of common pleas shall inquire at the time of the person''s
    or child''s sentencing or adjudication for the crime or act for which the fingerprints
    were required to be taken whether or not the person or child has been fingerprinted
    pursuant to division (A)(1) or (2) of section 109.60 of the Revised Code for the
    original arrest or court appearance upon which the sentence or adjudication is
    based. If a person or child was not fingerprinted for the original arrest or court
    appearance, the court of common pleas shall order the person or child to appear
    before the sheriff or chief of police within twenty-four hours to have the person''s
    or child''s fingerprints taken as provided in division (A)(3) of section 109.60
    of the Revised Code.

    (C) Pursuant to an order issued under division (A) or (B) of this section, the
    sheriff or chief of police shall take the person''s or child''s fingerprints,
    or cause the fingerprints to be taken, as provided in division (A)(3) of section
    109.60 of the Revised Code or shall provide written notification to the court
    if the person or child failed to appear or provide impressions of the person''s
    or child''s fingerprints.'
  history: null
