- number: '2303.18'
  heading: Indexes of judgments not dormant
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: Each clerk of the court of common pleas shall make an alphabetical index of
    the names of all plaintiffs and defendants to pending suits and living judgments,
    showing therein in separate columns the names, court, and number of the suit or
    execution. When there is more than one suit or judgment for or against the same
    party, it shall be sufficient to index the name but once and make entries opposite
    thereto, of the court and the number of the suit or execution. No such index shall
    be made in counties where it has already been done.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2303.18
- number: '2303.19'
  heading: Index to be made
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: All suits shall be indexed at the time of the filing of the petition and all
    judgments shall be indexed at the time of the entry on the journal, revival, or
    the filing of a transcript thereof as required by section 2303.18 of the Revised
    Code. Whenever the court of common pleas of a county directs, the clerk of the
    court of common pleas shall make a re-index, in the manner provided in such section,
    of all pending suits and living judgments, then on the dockets of either the court
    of common pleas or the court of appeals, in which re-index all new suits and judgments
    shall be indexed at the time provided in this section.
  history: null
