- number: '2329.272'
  heading: Open house of property prior to sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) The officer who will make the sale of lands and tenements that are delinquent
    vacant tenements or premises or abandoned tenements or premises may hold an open
    house of the delinquent vacant tenements or premises or abandoned tenements or
    premises to allow any person to view the delinquent vacant tenements or premises
    or abandoned tenements or premises prior to the sale. The officer may include
    a notice of the open house in the public notice of the date, time, and place of
    the sale pursuant to section 2329.26 of the Revised Code. The officer is not required
    to give those persons who view the delinquent vacant tenements or premises or
    abandoned tenements or premises any advice regarding the tenements or premises.

    (B) The officer who makes the sale of lands and tenements shall deduct any costs
    associated with holding the open house from the proceeds of the sale of the lands
    and tenements.

    (C) The officer who holds the open house is not liable as provided in Chapter
    2744. of the Revised Code for injury, death, or loss to person or property that
    occurs at the open house.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.272
- number: '2329.28'
  heading: The return of the writ and record thereof
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The levying officer shall indorse on the writ of execution the officer's proceedings
    thereon, and the clerk of the court of common pleas, upon the return thereof,
    immediately shall record all such indorsements at length, in the execution docket,
    or other docket provided for that purpose. Electronic indorsements shall be deemed
    valid. That record shall be a part of the record of the court of common pleas.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.28
- number: '2329.29'
  heading: Disposition of money made without sale of real estate
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If the sheriff collects any part of a judgment by virtue of an execution without
    the sale of real estate, he shall pay it to the judgment creditor, or his attorney,
    upon demand made therefor at the sheriff's office. If the execution is fully satisfied,
    the sheriff shall return it within three days after he collected the money thereon.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.29
- number: '2329.30'
  heading: Failure of purchaser to pay
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The court from which an execution or order of sale issues, upon notice and
    motion of the officer who makes the sale or of an interested party, may punish
    any purchaser of lands and tenements who fails to pay within thirty days of the
    confirmation of the sale the balance due on the purchase price of the lands and
    tenements by forfeiting the sale of the lands and tenements and returning any
    deposit paid in connection with the sale of the lands and tenements, by forfeiting
    any deposit paid in connection with the sale of the lands and tenements, as for
    contempt, or in any other manner the court considers appropriate. Upon motion,
    the court may order the return of any remaining portion of the deposit of the
    purchaser, less the costs of a subsequent sale and any other remedy the court
    considers appropriate. An order for contempt for failure of the purchaser to pay
    voids the confirmation of sale and transfer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.30
- number: '2329.31'
  heading: Confirmation and order for deed
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Upon the return of any writ of execution for the satisfaction of which
    lands and tenements have been sold, on careful examination of the proceedings
    of the officer making the sale, if the court of common pleas finds that the sale
    was made, in all respects, in conformity with sections 2329.01 to 2329.61 of the
    Revised Code, it shall, within thirty days of the return of the writ, direct the
    clerk of the court of common pleas to make an entry on the journal that the court
    is satisfied of the legality of such sale. Nothing in this section prevents the
    court of common pleas from staying the confirmation of the sale to permit a property
    owner time to redeem the property or for any other reason that it determines is
    appropriate. In those instances, the sale shall be confirmed within thirty days
    after the termination of any stay of confirmation.

    (B) The officer making the sale shall require the purchaser to pay within thirty
    days of the confirmation of the sale the balance due on the purchase price of
    the lands and tenements.

    (C)(1) The officer making the sale shall record the prepared deed required by
    section 2329.36 of the Revised Code within fourteen days after the confirmation
    of sale and payment of the balance due.

    (2)(a) If the deed is not prepared and recorded within the fourteen-day period,
    the purchaser may file a motion with the court to proceed with the transfer of
    title. If the court finds that a proper sale was made, it shall enter an order
    transferring the title of the lands and tenements to the purchaser, ordering the
    plaintiff to present a certified copy of the order to the county recorder for
    recording, and ordering the county recorder to record the order in the record
    of deeds. The order, when filed with the county recorder, shall have the same
    effect as a deed prepared pursuant to section 2329.36 of the Revised Code.

    (b) Upon the issuance of the court order described in division (C)(2)(a) of this
    section, the plaintiff, or the plaintiff''s attorney, shall present a certified
    copy of the order to be recorded in the office of the county recorder. The county
    recorder shall record the order in the record of deeds.

    (c) The clerk shall issue a copy of the court order to the county auditor to transfer
    record ownership of the lands and tenements for the purpose of real estate taxes.
    Real estate taxes coming due after the date of the sale shall not prohibit the
    auditor from transferring ownership of the lands and tenements on its records
    or cause the recorder to deny recording. The real estate taxes shall become the
    responsibility of the new title holder of the lands and tenements. The sheriff
    shall not require the confirmation of sale to be amended for taxes not due and
    payable as of the date of the sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.31
- number: '2329.311'
  heading: Sale of property with no minimum bid; right to redeem
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) In sales of residential properties taken in execution or order of sale
    that are sold at an auction with the minimum bid pursuant to division (B) of section
    2329.52 of the Revised Code, the judgment creditor and the first lienholder each
    have the right to redeem the property within fourteen days after the sale by paying
    the purchase price. The redeeming party shall pay the purchase price to the clerk
    of the court in which the judgment was rendered or the order of sale was made.
    Upon timely payment, the court shall proceed as described in section 2329.31 of
    the Revised Code, with the redeeming party considered the successful purchaser
    at the sale.

    (B) If the judgment creditor and the first lienholder each seek to redeem the
    property, pursuant to division (A) of this section, the court shall resolve the
    conflict in favor of the first lienholder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.311
- number: '2329.312'
  heading: Reports by levying officers
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) All levying officers appointed or authorized by a court under this chapter
    to conduct the judicial or execution sale of residential property consisting of
    one to four single-family units shall submit quarterly reports to the attorney
    general. The reports shall include data on each such sale conducted by the officer,
    including data showing whether or not the deadlines required under division (E)
    of section 2308.02, division (B) of section 2329.17, and sections 2329.30 and
    2329.31 of the Revised Code are met.

    (B) The attorney general shall make the information included in the reports described
    in division (A) of this section publicly available.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.312
- number: '2329.32'
  heading: Officer may retain purchase money until sale confirmed
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The officer, on making the sale of property of a judgment debtor, may retain
    the purchase money in his hands until the court examines his proceedings, when
    he shall pay it to the person entitled thereto, under the order of the court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.32
- number: '2329.33'
  heading: Redemption by judgment debtor
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Except as provided in division (C) of section 2308.03 or any other section
    of the Revised Code, in sales of real estate on execution or order of sale, at
    any time before the confirmation thereof, the debtor may redeem it from sale by
    depositing in the hands of the clerk of the court of common pleas to which such
    execution or order is returnable, the amount of the judgment or decree upon which
    such lands were sold, with all costs, including poundage, and interest at the
    rate of eight per cent per annum on the purchase money from the day of sale to
    the time of such deposit, except where the judgment creditor is the purchaser,
    the interest at such rate on the excess above the judgment creditor's claim. The
    court of common pleas thereupon shall make an order setting aside such sale, and
    apply the deposit to the payment of such judgment or decree and costs, and award
    such interest to the purchaser, who shall receive from the officer making the
    sale the purchase money paid by the purchaser, and the interest from the clerk.
    This section does not take away the power of the court to set aside such sale
    for any reason for which it might have been set aside prior to April 16, 1888.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.33
- number: '2329.34'
  heading: Conveyance by commissioner
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: 'Real property may be conveyed by a master commissioner or special master
    only:

    (A) When, by an order or a judgment in an action or proceeding, a party is required
    to convey such property to another, and the party neglects or refuses to do so,
    and the master is directed to convey on the party''s failure;

    (B) When specific real property is sold by a master under an order or judgment
    of the court appointing the master. No court shall make or issue an order to a
    master for the sale of real estate except in response to a motion by a judgment
    creditor, which motion shall be granted only if there exists some special reason
    why the sale should not be made by the sheriff of the county where the decree
    or order was made or by a private selling officer. If the court finds any such
    reason to exist, that reason shall be embodied in and made part of the judgment,
    order, or decree for such sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.34
- number: '2329.35'
  heading: Sheriff may act for master commissioner
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: A master commissioner or special master who sells real property shall have
    the same power to administer oaths that is conferred upon sheriffs. A sheriff
    may act as a master commissioner. On notice, and for a reasonable compensation
    to be paid him by a master out of his fees, the sheriff shall attend and make
    sale for a master who, by reason of sickness, is unable to attend. Sales made
    by a master must conform to the laws regulating sales of lands upon execution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.35
- number: '2329.36'
  heading: Deed of sheriff, master
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) The attorney who files the writ of execution shall, not later than seven
    days after the filing of the order of confirmation of sale pursuant to section
    2329.31 of the Revised Code, make to the purchaser a deed, containing the names
    of the parties to the judgment, the names of the owners of the property sold,
    a reference to the volume and page of the recording of the next preceding recorded
    instrument by or through which the owners claim title, the date and amount of
    the judgment, the substance of the execution or order on which the property was
    sold, the substance of the officer''s return thereon, and the order of confirmation
    and deliver the deed to the officer who sold the real property. The deed shall
    be executed, acknowledged, and recorded as other deeds. The officer or the officer''s
    legal representative may review and approve or reject the deed for form and substance.

    (B) By placing a bid at a sale conducted pursuant to this chapter, the purchaser
    appoints the officer who makes the sale as agent of the purchaser for the sole
    purpose of accepting delivery of the deed described in division (A) of this section.

    (C) The officer who sells the real property shall record the deed, or for registered
    land file the documents required by section 5309.64 of the Revised Code, with
    the county recorder within fourteen business days of the date the purchaser pays
    the balance due on the purchase price of the lands and tenements. The officer
    shall charge the purchaser a fee to cover the actual costs of recording the deed
    or filing the documents.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.36
- number: '2329.37'
  heading: Effect of deed
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The deed provided for in section 2329.36 of the Revised Code shall be prima
    facie evidence of the legality and regularity of the sale. All the estate and
    interest of the person whose property the officer so professed to sell and convey,
    whether it existed at the time the property became liable to satisfy the judgment,
    or was acquired afterward, shall be vested in the purchaser by such sale.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.37
- number: '2329.38'
  heading: Printer's fee
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The officer who makes a levy, or holds an order of sale, before giving notice
    of the sale, may demand of the plaintiff, his agent or attorney, the fees of the
    printer for publishing such notice. The officer need not make such publication
    until the fees are paid.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.38
- number: '2329.39'
  heading: Place of sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Except as provided in sections 2329.152 and 2329.153 of the Revised Code,
    sale of lands or tenements under execution or order of sale must be held in the
    county in which they are situated and at the courthouse, unless otherwise ordered
    by the court. Purchase of real or personal property, by the officer making the
    sale thereof, or by an appraiser of such property, shall be fraudulent and void.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.39
- number: '2329.40'
  heading: Alias execution
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If lands and tenements levied on, or ordered to be sold, are not sold upon
    execution, other executions may be issued to sell them.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.40
- number: '2329.41'
  heading: Separate levies directed on separate tracts
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When two or more executions come to the hands of an officer, and it is necessary
    to levy on real estate to satisfy them, and either of the judgment creditors,
    or his assignee , requires him to make a separate levy to satisfy his executions,
    the officer shall obey the direction. The officer who makes the levy on behalf
    of the creditor whose execution, is entitled to a preference by sections 2329.01
    to 2329.61, inclusive, of the Revised Code, has the choice of such part of the
    real property of the judgment debtor as, at two thirds of the appraised value,
    will be sufficient to satisfy it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.41
- number: '2329.42'
  heading: Two or more executions to same officer
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If two or more executions entitled to no preference as to each other are put
    in the hands of the same officer, when required, he must levy them on separate
    parcels of the real property of the judgment debtor if, in the opinion of the
    appraisers, they can be divided without material injury. If the real property
    of such debtor is not sufficient, at two thirds of its appraised value, to satisfy
    all the executions chargeable thereon, such part of it must be levied on, to satisfy
    each execution, as bears the same proportion in value to the whole as the amount
    due on the execution bears to the amount of all the executions chargeable thereon,
    as near as may be, according to the appraised value of each separate parcel.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.42
- number: '2329.43'
  heading: Deeds for lands sold may be made by a sheriff's successor
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If the term of service of the officer who makes a sale of lands and tenements
    expires, or if he dies, is absent, or otherwise unable to make a deed of conveyance
    of the property sold, on receiving a certificate from the court from which execution
    issued for such sale, signed by the clerk of such court, by order of the court,
    setting forth that sufficient proof has been made that the sale was fair and legal,
    on tender of the purchase money, or if it or a part thereof has been paid, then,
    on proof of such payment and tender of the balance, any of the successors of such
    officer may execute to the purchaser, or his legal representatives, a deed of
    conveyance of the lands and tenements sold. Such deed shall be as valid in law
    as if the officer who made the sale had executed it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.43
- number: '2329.44'
  heading: Excess payable to debtor; notice to debtor
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) On a sale made pursuant to this chapter, if the officer who makes the
    sale receives from the sale more money than is necessary to satisfy the writ of
    execution, with interest and costs, the officer who made the sale shall deliver
    any balance remaining after satisfying the writ of execution, with interest and
    costs, to the clerk of the court that issued the writ of execution not later than
    forty-five days after confirmation of the sale. The clerk then shall do one of
    the following:

    (1)(a) If the balance is five hundred dollars or more, send to the judgment debtor
    whose property was the subject of the sale a notice that indicates the amount
    of the balance, informs the judgment debtor that the judgment debtor is entitled
    to receive the balance, and sets forth the procedure that the judgment debtor
    is required to follow to obtain the balance. Subject to divisions (A)(1)(b) and
    (c) of this section, this notice shall be sent in the following manner:

    (i) To the judgment debtor at the address of the judgment debtor in the caption
    on the judgment or at any different address the judgment debtor may have provided,
    by certified mail, return receipt requested, within ninety days after the sale.

    (ii) If the certified mail envelope sent under division (A)(1)(a)(i) of this section
    is returned with an endorsement showing failure or refusal of delivery, the clerk
    immediately shall send the judgment debtor, at the address of the judgment debtor
    in the caption on the judgment or any different address the judgment debtor may
    have provided, a similar notice by ordinary mail.

    (iii) If the ordinary mail envelope sent under division (A)(1)(a)(ii) of this
    section is returned for any reason, the clerk immediately shall give a similar
    notice to the judgment debtor that includes the case number, the name of the judgment
    debtor, if known, and information on how to contact the clerk by an advertisement
    in a newspaper published in and of general circulation in the county, which advertisement
    shall run at least once, a posting on the clerk''s web site, a text message to
    the judgment debtor, or a posting in a conspicuous place in the court where the
    action was commenced.

    (b) If the address of the judgment debtor is not known, the clerk shall not send
    a notice by mail under division (A)(1)(a)(i) or (ii) of this section, but shall
    comply with division (A)(1)(a)(iii) of this section.

    (c) If the name of the judgment debtor is not known, but the address of the judgment
    debtor is known, the clerk shall send the notice required under division (A)(1)(a)
    of this section in the manner prescribed by division (A)(1)(a)(i), (ii), or (iii)
    of this section.

    (d) If the balance remains unclaimed for ninety days following the last mailing,
    publication, posting, or text message required under division (A)(1)(a), (b),
    or (c) of this section, the clerk shall dispose of the balance in the same manner
    as unclaimed money is disposed of under sections 2335.34 and 2335.35 of the Revised
    Code.

    (2)(a) If the balance is less than five hundred dollars, send to the judgment
    debtor whose property was the subject of the sale a notice that indicates the
    amount of the balance, informs the judgment debtor that the judgment debtor is
    entitled to receive the balance, and sets forth the procedure that the judgment
    debtor is required to follow to obtain the balance. This notice shall be sent
    to the judgment debtor in the following manner:

    (i) At the address of the judgment debtor in the caption on the judgment or at
    any different address the judgment debtor may have provided, by ordinary mail;

    (ii) If the address of the judgment debtor is not known, the clerk shall notify
    the judgment debtor in the same manner prescribed by division (A)(1)(a)(iii) of
    this section.

    (iii) If the name of the judgment debtor is not known, but the address of the
    judgment debtor is known, the clerk shall notify the judgment debtor in the manner
    prescribed by either division (A)(2)(a)(i) or (A)(1)(a)(iii) of this section.

    (b) If the balance remains unclaimed for ninety days following the date of the
    last mailing, publication, posting, or text message required by division (A)(2)(a)
    of this section, the clerk shall dispose of the balance in the same manner as
    unclaimed money is disposed of under sections 2335.34 and 2335.35 of the Revised
    Code.

    (B)(1) Subject to division (B)(2) of this section, the clerk of the court that
    issued the writ of execution, on demand and whether or not the notice required
    by division (A)(1) or (2) of this section is provided as prescribed, shall pay
    the balance to the judgment debtor or the judgment debtor''s legal representatives.

    (2) The clerk of the court that issued the writ of execution is not required to
    pay the balance to the judgment debtor or the judgment debtor''s legal representatives
    pursuant to division (B)(1) of this section until the judgment debtor or the legal
    representatives pay to the clerk the actual costs incurred in the provision of
    the notice required by division (A)(1) or (2) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.44
- number: '2329.45'
  heading: Reversal of judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If a judgment in satisfaction of which lands or tenements are sold is reversed
    on appeal, such reversal shall not defeat or affect the title of the purchaser.
    In such case restitution in an amount equal to the money for which such lands
    or tenements were sold, with interest from the day of sale, must be made by the
    judgment creditor. In ordering restitution, the court shall take into consideration
    all persons who lost an interest in the property by reason of the judgment and
    sale and the order of the priority of those interests.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.45
- number: '2329.46'
  heading: Remedy of purchaser if sale invalid
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: 'Upon the sale of property on execution, if the title of the purchaser is
    invalid by reason of a defect in the proceedings, he may be subrogated to the
    right of the creditor against the debtor to the extent of the money paid and applied
    to the debtor''s benefit, and, to the same extent, may have a lien on the property
    sold, as against all persons, except bona fide purchasers without notice. This
    section does not require the creditor to refund the purchase money by reason of
    the invalidity of such sales.

    This section applies to sales by order of court, sales by executors, administrators,
    guardians, and assignees, and to sales for taxes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.46
- number: '2329.47'
  heading: Proceedings to vacate satisfaction of judgment
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When a plaintiff in execution or his agent , in good faith, has ordered a
    levy of execution upon property not subject thereto, and which has been sold,
    applied on his judgment, and a recovery therefor had against him by the owner
    of the property, such plaintiff, having paid the amount so recovered, on motion
    in the court having control of the judgment, on giving the judgment defendant
    notice thereof, may have the satisfaction so made from the sale of the property
    vacated, and may collect the judgment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.47
- number: '2329.48'
  heading: Relief of officer who levies upon and sells wrong property in good faith
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When an officer to whom an execution issues on a judgment levies it in good
    faith upon property not subject to levy, sells it, applies the proceeds in satisfaction
    in whole or part of the judgment, and a recovery is had against him for its value,
    upon payment thereof, on motion before the court having control of the judgment
    and a showing that due notice of such motion was given to the defendant in the
    execution, such officer may have the satisfaction of such judgment vacated, and
    execution shall issue therefor for his use as if such levy and sale had not been
    made.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.48
- number: '2329.49'
  heading: Remedy when one of cosureties pays for such property
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When a defendant in a judgment, or his surety or cosurety , by mistake has
    directed an execution issued on the judgment to be levied on property not liable
    thereto, thereby causing such judgment to be wholly or in part satisfied, and
    has been compelled to pay the owner of the property therefor, he has the same
    rights against a codefendant in such judgment, and against a cosurety or principal
    in respect of the debts on which such judgment is founded, as though such satisfaction,
    by due process of law, had been made out of the property of such defendant, surety,
    or cosurety so directing such levy.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.49
- number: '2329.50'
  heading: Supreme court and court of appeals judgments
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: In all cases in which judgment is rendered in the court of appeals or supreme
    court and a special mandate is directed to the court of common pleas to carry
    it into execution, the lien of the judgment creditor shall continue for one year
    after it is so entered. In computing such period of one year, the time covered
    by an appeal of the case, or by an injunction against the execution, or by a vacancy
    in the office of sheriff and coroner, or by the inability of such officers, shall
    be excluded.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.50
- number: '2329.51'
  heading: New appraisement
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When real estate taken on execution and appraised, advertised, and offered
    for sale is unsold for want of bidders, the court from which the execution issued,
    on motion of the plaintiff, shall set aside such appraisement and order a new
    appraisement to be made, or shall set aside the levy and appraisement and award
    a new execution to issue. When such real estate or a part of it has been two times
    appraised and thereafter advertised and offered for sale, and is unsold for want
    of bidders, the court may direct the amount for which it shall be sold.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.51
- number: '2329.52'
  heading: New appraisement - sale of part - terms of sale
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Except as otherwise provided in division (B) of this section, when premises
    are ordered to be sold, if said premises, or a part thereof, remain unsold for
    want of bidders after having been once appraised, advertised, and offered for
    sale, the court from which the order of sale issued may, on motion of the plaintiff
    or defendant and from time to time until said premises are disposed of, order
    a new appraisement and sale or direct the amount for which said premises, or a
    part thereof, may be sold.

    The court may order that the premises be sold as follows: One third cash in hand,
    one third in nine months from the day of sale, and the remaining one third in
    eighteen months from the day of sale, the deferred payments to draw interest at
    six per cent and be secured by a mortgage on the premises.

    (B) (1) When a residential property is ordered to be sold pursuant to a residential
    mortgage loan foreclosure action, if the property remains unsold after the first
    auction, then a second auction shall be held and the property shall be sold to
    the highest bidder without regard to the minimum bid requirement in section 2329.20
    of the Revised Code, but subject to section 2329.21 of the Revised Code relating
    to costs, allowances, and real estate taxes. This second auction shall be held
    not earlier than seven days and not later than thirty days after the first auction.
    A residential property that remains unsold after two auctions may be subsequently
    offered for sale without regard to the minimum bid requirement in section 2329.20
    of the Revised Code, but subject to section 2329.21 of the Revised Code relating
    to costs, allowances, and real estate taxes, or disposed of in any other manner
    pursuant to this chapter or any other provision of the Revised Code.

    (2) For purposes of division (B)(1) of this section, the first day an online auction
    is open for bidding shall be considered the date of the auction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.52
- number: '2329.53'
  heading: Return day of writ of execution
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The officer to whom a writ of execution is directed shall return such writ
    to the court to which it is returnable within sixty days from its date.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.53
- number: '2329.54'
  heading: Entry of judgment against principal and surety
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When judgment is rendered in a court of record in this state upon an instrument
    in writing in which two or more persons are jointly or severally bound, and it
    appears to the court, by parol or other testimony, that one or more of the persons
    so bound signed it as surety or bail for his codefendant, the clerk of such court,
    in recording the judgment thereon, must certify which of the defendants is principal
    debtor and which is the surety or bail. Such clerk shall issue execution on such
    judgment, commanding the officer to levy on the goods, chattels, lands, and tenements,
    of the principal debtor, or, for want of sufficient property of his to make it,
    to levy on the goods, chattels, lands, and tenements, of the surety or bail. The
    property, personal and real, of the principal debtor, within the jurisdiction
    of the court, shall be exhausted before any of the property of the surety or bail
    is taken in execution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.54
- number: '2329.56'
  heading: Penalty for neglecting to serve as appraiser
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When a freeholder, summoned as an appraiser, fails to appear at the time and
    place appointed by the officers ordering the freeholder's appearance and discharge
    the duty as such, on complaint made to a judge of the county court in the district
    in which such freeholder resides, unless the freeholder has a reasonable excuse,
    the freeholder shall pay fifty dollars for each neglect, which shall be collected
    by the judge, and paid into the county treasury for the use of the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.56
- number: '2329.57'
  heading: Execution issued to another county may be returned by mail
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When execution is issued in a county and directed to the sheriff or coroner
    of another county, the sheriff or coroner having the execution, after discharging
    all the duties required of him, may transmit it by mail to the clerk of the court
    who issued the writ. On proof by such sheriff or coroner that it was mailed soon
    enough to reach the office where it was issued within the time prescribed by law,
    he shall not be liable to amercement or penalty if it does not reach the office
    in due time.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.57
- number: '2329.58'
  heading: Money not to be forwarded by mail
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: No sheriff or coroner shall forward by mail any money made on an execution,
    unless he is specially instructed to do so by the plaintiff, his agent, or attorney
    of record.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.58
- number: '2329.59'
  heading: Entries on execution docket
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The clerk of the court of common pleas shall enter upon the execution docket
    the names in full of parties to the cause in which an execution is issued, the
    number of the cause on the appearance docket, number of the execution, date of
    its issue, amount of the judgment, the costs due each person or officer, the time
    when the judgment was rendered, and the date of the return. The return shall be
    recorded upon the execution docket in full.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.59
- number: '2329.60'
  heading: Index to execution docket
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The clerk of the court of common pleas shall keep an index to the execution
    docket, showing, in separate columns, the names of all parties against whom and
    in whose favor an execution has been issued, the number of the execution, and
    the number of the cause upon the execution docket.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.60
- number: '2329.61'
  heading: Order of sale issued in case not on trial docket
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: If an order of sale is issued in a case not on the trial docket, the clerk
    of the court of common pleas shall enter it on the execution docket and enter
    the subsequent proceedings in pursuance thereof in the manner that executions
    and proceedings thereon are entered. When a sale of real estate is made under
    such order, it shall be confirmed as are sales on executions. After the sale,
    the officer shall be governed by the law relating to sales on execution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.61
- number: '2329.63'
  heading: Beneficiary funds exempt
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: A beneficiary fund, not exceeding five thousand dollars, set apart, appropriated,
    or paid by a benevolent association or society, according to its rules, regulations,
    or bylaws, to the family of a deceased member, or to a member of such family,
    is not liable to be taken by process or proceedings, legal or equitable, to pay
    any debt of such deceased member.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.63
- number: '2329.64'
  heading: Certain property of benevolent societies exempt
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: The regalia, insignia of office, journals of proceedings, account books, and
    the private work belonging to a benevolent society in this state is exempt from
    seizure or sale to satisfy any judgment or decree rendered against such society.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.64
- number: '2329.65'
  heading: Property kept to put out fires exempt
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Property used, or kept to be used, by a municipal corporation or fire company
    for the purpose of extinguishing fire is exempt from execution or sale to satisfy
    any judgment or order arising upon contract or otherwise, but the owner thereof
    may create valid liens thereon by bill of sale or mortgage.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.65
- number: '2329.66'
  heading: Exempted interests and rights
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: '(A) Every person who is domiciled in this state may hold property exempt
    from execution, garnishment, attachment, or sale to satisfy a judgment or order,
    as follows:

    (1)(a) In the case of a judgment or order regarding money owed for health care
    services rendered or health care supplies provided to the person or a dependent
    of the person, one parcel or item of real or personal property that the person
    or a dependent of the person uses as a residence. Division (A)(1)(a) of this section
    does not preclude, affect, or invalidate the creation under this chapter of a
    judgment lien upon the exempted property but only delays the enforcement of the
    lien until the property is sold or otherwise transferred by the owner or in accordance
    with other applicable laws to a person or entity other than the surviving spouse
    or surviving minor children of the judgment debtor. Every person who is domiciled
    in this state may hold exempt from a judgment lien created pursuant to division
    (A)(1)(a) of this section the person''s interest, not to exceed one hundred twenty-five
    thousand dollars, in the exempted property.

    (b) In the case of all other judgments and orders, the person''s interest, not
    to exceed one hundred twenty-five thousand dollars, in one parcel or item of real
    or personal property that the person or a dependent of the person uses as a residence.

    (c) For purposes of divisions (A)(1)(a) and (b) of this section, "parcel" means
    a tract of real property as identified on the records of the auditor of the county
    in which the real property is located.

    (2) The person''s interest, not to exceed three thousand two hundred twenty-five
    dollars, in one motor vehicle;

    (3) The person''s interest, not to exceed four hundred dollars, in cash on hand,
    money due and payable, money to become due within ninety days, tax refunds, and
    money on deposit with a bank, savings and loan association, credit union, public
    utility, landlord, or other person, other than personal earnings.

    (4)(a) The person''s interest, not to exceed five hundred twenty-five dollars
    in any particular item or ten thousand seven hundred seventy-five dollars in aggregate
    value, in household furnishings, household goods, wearing apparel, appliances,
    books, animals, crops, musical instruments, firearms, and hunting and fishing
    equipment that are held primarily for the personal, family, or household use of
    the person;

    (b) The person''s aggregate interest in one or more items of jewelry, not to exceed
    one thousand three hundred fifty dollars, held primarily for the personal, family,
    or household use of the person or any of the person''s dependents.

    (5) The person''s interest, not to exceed an aggregate of two thousand twenty-five
    dollars, in all implements, professional books, or tools of the person''s profession,
    trade, or business, including agriculture;

    (6)(a) The person''s interest in a beneficiary fund set apart, appropriated, or
    paid by a benevolent association or society, as exempted by section 2329.63 of
    the Revised Code;

    (b) The person''s interest in contracts of life or endowment insurance or annuities,
    as exempted by section 3911.10 of the Revised Code;

    (c) The person''s interest in a policy of group insurance or the proceeds of a
    policy of group insurance, as exempted by section 3917.05 of the Revised Code;

    (d) The person''s interest in money, benefits, charity, relief, or aid to be paid,
    provided, or rendered by a fraternal benefit society, as exempted by section 3921.18
    of the Revised Code;

    (e) The person''s interest in the portion of benefits under policies of sickness
    and accident insurance and in lump sum payments for dismemberment and other losses
    insured under those policies, as exempted by section 3923.19 of the Revised Code.

    (7) The person''s professionally prescribed or medically necessary health aids;

    (8) The person''s interest in a burial lot, including, but not limited to, exemptions
    under section 517.09 or 1721.07 of the Revised Code;

    (9) The person''s interest in the following:

    (a) Moneys paid or payable for maintenance or rights, as exempted by section 3304.19
    of the Revised Code;

    (b) Workers'' compensation, as exempted by section 4123.67 of the Revised Code;

    (c) Unemployment compensation benefits, as exempted by section 4141.32 of the
    Revised Code;

    (d) Cash assistance payments under the Ohio works first program, as exempted by
    section 5107.75 of the Revised Code;

    (e) Benefits and services under the prevention, retention, and contingency program,
    as exempted by section 5108.08 of the Revised Code;

    (f) Payments under section 24 or 32 of the "Internal Revenue Code of 1986," 100
    Stat. 2085, 26 U.S.C. 1, as amended.

    (10)(a) Except in cases in which the person was convicted of or pleaded guilty
    to a violation of section 2921.41 of the Revised Code and in which an order for
    the withholding of restitution from payments was issued under division (C)(2)(b)
    of that section, in cases in which an order for withholding was issued under section
    2907.15 of the Revised Code, in cases in which an order for forfeiture was issued
    under division (A) or (B) of section 2929.192 of the Revised Code, and in cases
    in which an order was issued under section 2929.193 or 2929.194 of the Revised
    Code, and only to the extent provided in the order, and except as provided in
    sections 3105.171, 3105.63, 3119.80, 3119.81, 3121.02, 3121.03, and 3123.06 of
    the Revised Code, the person''s rights to or interests in a pension, benefit,
    annuity, retirement allowance, or accumulated contributions, the person''s rights
    to or interests in a participant account in any deferred compensation program
    offered by the public employees retirement board, a government unit, or a municipal
    corporation, or the person''s other accrued or accruing rights or interests, as
    exempted by section 143.11, 145.56, 146.13, 148.09, 742.47, 3307.41, 3309.66,
    or 5505.22 of the Revised Code, and the person''s rights to or interests in benefits
    from the Ohio public safety officers death benefit fund;

    (b) Except as provided in sections 3119.80, 3119.81, 3121.02, 3121.03, and 3123.06
    of the Revised Code, the person''s rights to receive or interests in receiving
    a payment or other benefits under any pension, annuity, or similar plan or contract,
    not including a payment or benefit from a stock bonus or profit-sharing plan or
    a payment included in division (A)(6)(b) or (10)(a) of this section, on account
    of illness, disability, death, age, or length of service, to the extent reasonably
    necessary for the support of the person and any of the person''s dependents, except
    if all the following apply:

    (i) The plan or contract was established by or under the auspices of an insider
    that employed the person at the time the person''s rights or interests under the
    plan or contract arose.

    (ii) The payment is on account of age or length of service.

    (iii) The plan or contract is not qualified under the "Internal Revenue Code of
    1986," 100 Stat. 2085, 26 U.S.C. 1, as amended.

    (c) Except for any portion of the assets that were deposited for the purpose of
    evading the payment of any debt and except as provided in sections 3119.80, 3119.81,
    3121.02, 3121.03, and 3123.06 of the Revised Code, the person''s rights or interests
    in the assets held in, or to directly or indirectly receive any payment or benefit
    under, any individual retirement account, individual retirement annuity, "Roth
    IRA," account opened pursuant to a program administered by a state under section
    529 or 529A of the "Internal Revenue Code of 1986," 100 Stat. 2085, 26 U.S.C.
    1, as amended, or education individual retirement account that provides payments
    or benefits by reason of illness, disability, death, retirement, or age or provides
    payments or benefits for purposes of education or qualified disability expenses,
    to the extent that the assets, payments, or benefits described in division (A)(10)(c)
    of this section are attributable to or derived from any of the following or from
    any earnings, dividends, interest, appreciation, or gains on any of the following:

    (i) Contributions of the person that were less than or equal to the applicable
    limits on deductible contributions to an individual retirement account or individual
    retirement annuity in the year that the contributions were made, whether or not
    the person was eligible to deduct the contributions on the person''s federal tax
    return for the year in which the contributions were made;

    (ii) Contributions of the person that were less than or equal to the applicable
    limits on contributions to a Roth IRA or education individual retirement account
    in the year that the contributions were made;

    (iii) Contributions of the person that are within the applicable limits on rollover
    contributions under subsections 219, 402(c), 403(a)(4), 403(b)(8), 408(b), 408(d)(3),
    408A(c)(3)(B), 408A(d)(3), and 530(d)(5) of the "Internal Revenue Code of 1986,"
    100 Stat. 2085, 26 U.S.C.A. 1, as amended;

    (iv) Contributions by any person into any plan, fund, or account that is formed,
    created, or administered pursuant to, or is otherwise subject to, section 529
    or 529A of the "Internal Revenue Code of 1986," 100 Stat. 2085, 26 U.S.C. 1, as
    amended.

    (d) Except for any portion of the assets that were deposited for the purpose of
    evading the payment of any debt and except as provided in sections 3119.80, 3119.81,
    3121.02, 3121.03, and 3123.06 of the Revised Code, the person''s rights or interests
    in the assets held in, or to receive any payment under, any Keogh or "H.R. 10"
    plan that provides benefits by reason of illness, disability, death, retirement,
    or age, to the extent reasonably necessary for the support of the person and any
    of the person''s dependents.

    (e) The person''s rights to or interests in any assets held in, or to directly
    or indirectly receive any payment or benefit under, any individual retirement
    account, individual retirement annuity, "Roth IRA," account opened pursuant to
    a program administered by a state under section 529 or 529A of the "Internal Revenue
    Code of 1986," 100 Stat. 2085, 26 U.S.C. 1, as amended, or education individual
    retirement account that a decedent, upon or by reason of the decedent''s death,
    directly or indirectly left to or for the benefit of the person, either outright
    or in trust or otherwise, including, but not limited to, any of those rights or
    interests in assets or to receive payments or benefits that were transferred,
    conveyed, or otherwise transmitted by the decedent by means of a will, trust,
    exercise of a power of appointment, beneficiary designation, transfer or payment
    on death designation, or any other method or procedure.

    (f) The exemptions under divisions (A)(10)(a) to (e) of this section also shall
    apply or otherwise be available to an alternate payee under a qualified domestic
    relations order (QDRO) or other similar court order.

    (g) A person''s interest in any plan, program, instrument, or device described
    in divisions (A)(10)(a) to (e) of this section shall be considered an exempt interest
    even if the plan, program, instrument, or device in question, due to an error
    made in good faith, failed to satisfy any criteria applicable to that plan, program,
    instrument, or device under the "Internal Revenue Code of 1986," 100 Stat. 2085,
    26 U.S.C. 1, as amended.

    (11) The person''s right to receive spousal support, child support, an allowance,
    or other maintenance to the extent reasonably necessary for the support of the
    person and any of the person''s dependents;

    (12) The person''s right to receive, or moneys received during the preceding twelve
    calendar months from, any of the following:

    (a) An award of reparations under sections 2743.51 to 2743.72 of the Revised Code,
    to the extent exempted by division (D) of section 2743.66 of the Revised Code;

    (b) A payment on account of the wrongful death of an individual of whom the person
    was a dependent on the date of the individual''s death, to the extent reasonably
    necessary for the support of the person and any of the person''s dependents;

    (c) Except in cases in which the person who receives the payment is an inmate,
    as defined in section 2969.21 of the Revised Code, and in which the payment resulted
    from a civil action or appeal against a government entity or employee, as defined
    in section 2969.21 of the Revised Code, a payment, not to exceed twenty thousand
    two hundred dollars, on account of personal bodily injury, not including pain
    and suffering or compensation for actual pecuniary loss, of the person or an individual
    for whom the person is a dependent;

    (d) A payment in compensation for loss of future earnings of the person or an
    individual of whom the person is or was a dependent, to the extent reasonably
    necessary for the support of the debtor and any of the debtor''s dependents.

    (13) Except as provided in sections 3119.80, 3119.81, 3121.02, 3121.03, and 3123.06
    of the Revised Code, personal earnings of the person owed to the person for services
    in an amount equal to the greater of the following amounts:

    (a) If paid weekly, thirty times the current federal minimum hourly wage; if paid
    biweekly, sixty times the current federal minimum hourly wage; if paid semimonthly,
    sixty-five times the current federal minimum hourly wage; or if paid monthly,
    one hundred thirty times the current federal minimum hourly wage that is in effect
    at the time the earnings are payable, as prescribed by the "Fair Labor Standards
    Act of 1938," 52 Stat. 1060, 29 U.S.C. 206(a)(1), as amended;

    (b) Seventy-five per cent of the disposable earnings owed to the person.

    (14) The person''s right in specific partnership property, as exempted by the
    person''s rights in a partnership pursuant to section 1776.50 of the Revised Code,
    except as otherwise set forth in section 1776.50 of the Revised Code;

    (15) A seal and official register of a notary public, as exempted by section 147.04
    of the Revised Code;

    (16) The person''s interest in a tuition unit or a payment under section 3334.09
    of the Revised Code pursuant to a tuition payment contract, as exempted by section
    3334.15 of the Revised Code;

    (17) Any other property that is specifically exempted from execution, attachment,
    garnishment, or sale by federal statutes other than the "Bankruptcy Reform Act
    of 1978," 92 Stat. 2549, 11 U.S.C.A. 101, as amended;

    (18) The person''s aggregate interest in any property, not to exceed one thousand
    seventy-five dollars, except that division (A)(18) of this section applies only
    in bankruptcy proceedings.

    (B) On April 1, 2010, and on the first day of April in each third calendar year
    after 2010, the Ohio judicial conference shall adjust each dollar amount set forth
    in this section to reflect any increase in the consumer price index for all urban
    consumers, as published by the United States department of labor, or, if that
    index is no longer published, a generally available comparable index, for the
    three-year period ending on the thirty-first day of December of the preceding
    year. Any adjustments required by this division shall be rounded to the nearest
    twenty-five dollars.

    The Ohio judicial conference shall prepare a memorandum specifying the adjusted
    dollar amounts. The judicial conference shall transmit the memorandum to the director
    of the legislative service commission, and the director shall publish the memorandum
    in the register of Ohio. (Publication of the memorandum in the register of Ohio
    shall continue until the next memorandum specifying an adjustment is so published.)
    The judicial conference also may publish the memorandum in any other manner it
    concludes will be reasonably likely to inform persons who are affected by its
    adjustment of the dollar amounts.

    (C) As used in this section:

    (1) "Disposable earnings" means net earnings after the garnishee has made deductions
    required by law, excluding the deductions ordered pursuant to section 3119.80,
    3119.81, 3121.02, 3121.03, or 3123.06 of the Revised Code.

    (2) "Insider" means:

    (a) If the person who claims an exemption is an individual, a relative of the
    individual, a relative of a general partner of the individual, a partnership in
    which the individual is a general partner, a general partner of the individual,
    or a corporation of which the individual is a director, officer, or in control;

    (b) If the person who claims an exemption is a corporation, a director or officer
    of the corporation; a person in control of the corporation; a partnership in which
    the corporation is a general partner; a general partner of the corporation; or
    a relative of a general partner, director, officer, or person in control of the
    corporation;

    (c) If the person who claims an exemption is a partnership, a general partner
    in the partnership; a general partner of the partnership; a person in control
    of the partnership; a partnership in which the partnership is a general partner;
    or a relative in, a general partner of, or a person in control of the partnership;

    (d) An entity or person to which or whom any of the following applies:

    (i) The entity directly or indirectly owns, controls, or holds with power to vote,
    twenty per cent or more of the outstanding voting securities of the person who
    claims an exemption, unless the entity holds the securities in a fiduciary or
    agency capacity without sole discretionary power to vote the securities or holds
    the securities solely to secure to debt and the entity has not in fact exercised
    the power to vote.

    (ii) The entity is a corporation, twenty per cent or more of whose outstanding
    voting securities are directly or indirectly owned, controlled, or held with power
    to vote, by the person who claims an exemption or by an entity to which division
    (C)(2)(d)(i) of this section applies.

    (iii) A person whose business is operated under a lease or operating agreement
    by the person who claims an exemption, or a person substantially all of whose
    business is operated under an operating agreement with the person who claims an
    exemption.

    (iv) The entity operates the business or all or substantially all of the property
    of the person who claims an exemption under a lease or operating agreement.

    (e) An insider, as otherwise defined in this section, of a person or entity to
    which division (C)(2)(d)(i), (ii), (iii), or (iv) of this section applies, as
    if the person or entity were a person who claims an exemption;

    (f) A managing agent of the person who claims an exemption.

    (3) "Participant account" has the same meaning as in section 148.01 of the Revised
    Code.

    (4) "Government unit" has the same meaning as in section 148.06 of the Revised
    Code.

    (D) For purposes of this section, "interest" shall be determined as follows:

    (1) In bankruptcy proceedings, as of the date a petition is filed with the bankruptcy
    court commencing a case under Title 11 of the United States Code;

    (2) In all cases other than bankruptcy proceedings, as of the date of an appraisal,
    if necessary under section 2329.68 of the Revised Code, or the issuance of a writ
    of execution.

    An interest, as determined under division (D)(1) or (2) of this section, shall
    not include the amount of any lien otherwise valid pursuant to section 2329.661
    of the Revised Code.'
