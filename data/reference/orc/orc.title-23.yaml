- number: '2329.04'
  heading: Judgments of inferior courts - stay of execution - certificate in lieu
    of transcript
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: Judgments of probate courts, municipal courts, county courts, and other courts
    inferior to the court of common pleas may be made liens upon lands and tenements
    of a judgment debtor within any county of this state only in the manner provided
    in section 2329.02 of the Revised Code. The certificate of such judgment shall
    be made by the clerk of any such court or judge of a county court except that
    as to all judgments mentioned in section 5309.54 of the Revised Code, when the
    certificate is to be filed in the office of the county recorded in order to obtain
    a lien upon registered lands, the same shall be procured and issued as provided
    in said sections. When any certificate of a judgment of any such court made by
    the clerk of such court or judge of a county court has been filed in the office
    of the clerk of the court of common pleas of any county, and docketed and indexed
    therein, execution may be issued out of such court of common pleas upon such judgment,
    and such further proceedings to enforce said judgment may be had as if the same
    had been rendered in such court of common pleas. If stay of execution of any such
    judgment is obtained, such facts shall be certified by the clerk of the court
    rendering the decision or the judge of a county court, to the clerk of the court
    of common pleas, who shall enter a memorandum of such stay upon the judgment docket.
    Such certificate of judgment shall be used instead of a transcript in every case
    where it is or has been provided by law that a transcript of a judgment shall
    be filed in order to obtain a lien upon the lands.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.04
- number: '2329.05'
  heading: Judgment of supreme court
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: A judgment of the supreme court for money shall bind the lands and tenements
    of the judgment debtor in any county from the time there is filed, docketed, and
    indexed, in the office of the clerk of the court of common pleas of such county,
    a certificate of such judgment, issued by the clerk of the supreme court or by
    the clerk of the court to which the mandate of the supreme court is directed or
    to which such judgment is finally remanded for execution, in like manner as is
    provided in sections 2329.02 and 2329.04 of the Revised Code. The goods and chattels
    of the judgment debtor shall be bound from the time they are seized in execution.
    This section does not affect the lien of any judgment which, having attached to
    property of a judgment debtor in any county, is preserved pending the review of
    such judgment upon appeal in the court of appeals or the supreme court.
