- number: '2303.17'
  heading: Clerk shall make complete record
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2303'
    name: Clerk of the Court of Common Pleas
  text: When ordered on the journal to do so, the clerk of the court of common pleas
    shall make a complete record within six months after final judgment or order of
    the proper court. On his failing to make such record within such time, the clerk
    may be removed by the court of common pleas.
  history: null
