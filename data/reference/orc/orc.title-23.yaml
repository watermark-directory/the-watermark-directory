- number: '2329.06'
  heading: Lien of a judgment when action removed to supreme court
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2329'
    name: Execution Against Property
  text: When a certificate is filed as provided in section 2329.02 of the Revised
    Code, the lien of a judgment of the court of common pleas in an action which is
    appealed by the judgment debtor to the court of appeals and thence removed into
    the supreme court shall not thereby be divested or vacated, but shall be continued
