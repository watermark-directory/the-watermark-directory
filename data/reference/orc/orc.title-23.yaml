- number: '2301.03'
  heading: Designation domestic relations, juvenile and probate duties
  title:
    num: '23'
    name: Courts-Common Pleas
  chapter:
    num: '2301'
    name: Organization
  text: '(A) In Franklin county, the judges of the court of common pleas whose terms
    begin on January 1, 1953, January 2, 1953, January 5, 1969, January 5, 1977, January
    2, 1997, January 9, 2019, and January 3, 2021, and successors, shall have the
    same qualifications, exercise the same powers and jurisdiction, and receive the
    same compensation as other judges of the court of common pleas of Franklin county
    and shall be elected and designated as judges of the court of common pleas, division
    of domestic relations. They shall have all the powers relating to juvenile courts,
    and all cases under Chapters 2151. and 2152. of the Revised Code, all parentage
    proceedings under Chapter 3111. of the Revised Code over which the juvenile court
    has jurisdiction, and all divorce, dissolution of marriage, legal separation,
    and annulment cases shall be assigned to them. In addition to the judge''s regular
    duties, the judge who is senior in point of service shall serve on the children
    services board and the county advisory board and shall be the administrator of
    the domestic relations division and its subdivisions and departments.

    (B) In Hamilton county:

    (1) The judge of the court of common pleas, whose term begins on January 1, 1957,
    and successors, and the judge of the court of common pleas, whose term begins
    on February 14, 1967, and successors, shall be the juvenile judges as provided
    in Chapters 2151. and 2152. of the Revised Code, with the powers and jurisdiction
    conferred by those chapters.

    (2) The judges of the court of common pleas whose terms begin on January 5, 1957,
    January 16, 1981, and July 1, 1991, and successors, shall be elected and designated
    as judges of the court of common pleas, division of domestic relations, and shall
    have assigned to them all divorce, dissolution of marriage, legal separation,
    and annulment cases coming before the court. On or after the first day of July
    and before the first day of August of 1991 and each year thereafter, a majority
    of the judges of the division of domestic relations shall elect one of the judges
    of the division as administrative judge of that division. If a majority of the
    judges of the division of domestic relations are unable for any reason to elect
    an administrative judge for the division before the first day of August, a majority
    of the judges of the Hamilton county court of common pleas, as soon as possible
    after that date, shall elect one of the judges of the division of domestic relations
    as administrative judge of that division. The term of the administrative judge
    shall begin on the earlier of the first day of August of the year in which the
    administrative judge is elected or the date on which the administrative judge
    is elected by a majority of the judges of the Hamilton county court of common
    pleas and shall terminate on the date on which the administrative judge''s successor
    is elected in the following year.

    In addition to the judge''s regular duties, the administrative judge of the division
    of domestic relations shall be the administrator of the domestic relations division
    and its subdivisions and departments and shall have charge of the employment,
    assignment, and supervision of the personnel of the division engaged in handling,
    servicing, or investigating divorce, dissolution of marriage, legal separation,
    and annulment cases, including any referees considered necessary by the judges
    in the discharge of their various duties.

    The administrative judge of the division of domestic relations also shall designate
    the title, compensation, expense allowances, hours, leaves of absence, and vacations
    of the personnel of the division, and shall fix the duties of its personnel. The
    duties of the personnel, in addition to those provided for in other sections of
    the Revised Code, shall include the handling, servicing, and investigation of
    divorce, dissolution of marriage, legal separation, and annulment cases and counseling
    and conciliation services that may be made available to persons requesting them,
    whether or not the persons are parties to an action pending in the division.

    The board of county commissioners shall appropriate the sum of money each year
    as will meet all the administrative expenses of the division of domestic relations,
    including reasonable expenses of the domestic relations judges and the division
    counselors and other employees designated to conduct the handling, servicing,
    and investigation of divorce, dissolution of marriage, legal separation, and annulment
    cases, conciliation and counseling, and all matters relating to those cases and
    counseling, and the expenses involved in the attendance of division personnel
    at domestic relations and welfare conferences designated by the division, and
    the further sum each year as will provide for the adequate operation of the division
    of domestic relations.

    The compensation and expenses of all employees and the salary and expenses of
    the judges shall be paid by the county treasurer from the money appropriated for
    the operation of the division, upon the warrant of the county auditor, certified
    to by the administrative judge of the division of domestic relations.

    The summonses, warrants, citations, subpoenas, and other writs of the division
    may issue to a bailiff, constable, or staff investigator of the division or to
    the sheriff of any county or any marshal, constable, or police officer, and the
    provisions of law relating to the subpoenaing of witnesses in other cases shall
    apply insofar as they are applicable. When a summons, warrant, citation, subpoena,
    or other writ is issued to an officer, other than a bailiff, constable, or staff
    investigator of the division, the expense of serving it shall be assessed as a
    part of the costs in the case involved.

    (3) The judge of the court of common pleas of Hamilton county whose term begins
    on January 3, 1997, and the successors to that judge shall each be elected and
    designated as the drug court judge of the court of common pleas of Hamilton county.

    Eligibility for admission of a case into the drug court shall be set forth in
    a local rule adopted by the court of common pleas of Hamilton county. The local
    rule specifying eligibility shall not permit referral to the drug court of a case
    that involves a felony of the first or second degree, a violation of any prohibition
    contained in Chapter 2907. of the Revised Code that is a felony of the third degree,
    or a violation of section 2903.01 or 2903.02 of the Revised Code.

    (4) If the administrative judge of the court of common pleas of Hamilton county
    determines that the volume of cases pending before the drug court judge does not
    constitute a sufficient caseload for the drug court judge, the administrative
    judge, in accordance with the Rules of Superintendence for Courts of Common Pleas,
    shall assign individual cases to the drug court judge from the general docket
    of the court. If the assignments so occur, the administrative judge shall cease
    the assignments when the administrative judge determines that the volume of cases
    pending before the drug court judge constitutes a sufficient caseload for the
    drug court judge.

    (C)(1) In Lorain county:

    (a) The judges of the court of common pleas whose terms begin on January 3, 1959,
    January 4, 1989, and January 2, 1999, and successors, and the judge of the court
    of common pleas whose term begins on February 9, 2009, shall have the same qualifications,
    exercise the same powers and jurisdiction, and receive the same compensation as
    the other judges of the court of common pleas of Lorain county and shall be elected
    and designated as the judges of the court of common pleas, division of domestic
    relations. The judges of the court of common pleas whose terms begin on January
    3, 1959, January 4, 1989, and January 2, 1999, and successors, shall have all
    of the powers relating to juvenile courts, and all cases under Chapters 2151.
    and 2152. of the Revised Code, all parentage proceedings over which the juvenile
    court has jurisdiction, and all divorce, dissolution of marriage, legal separation,
    and annulment cases shall be assigned to them, except cases that for some special
    reason are assigned to some other judge of the court of common pleas. From February
    9, 2009, through September 28, 2009, the judge of the court of common pleas whose
    term begins on February 9, 2009, shall have all the powers relating to juvenile
    courts, and cases under Chapters 2151. and 2152. of the Revised Code, parentage
    proceedings over which the juvenile court has jurisdiction, and divorce, dissolution
    of marriage, legal separation, and annulment cases shall be assigned to that judge,
    except cases that for some special reason are assigned to some other judge of
    the court of common pleas.

    (b) From January 1, 2006, through September 28, 2009, the judges of the court
    of common pleas, division of domestic relations, in addition to the powers and
    jurisdiction set forth in division (C)(1)(a) of this section, shall have jurisdiction
    over matters that are within the jurisdiction of the probate court under Chapter
    2101. and other provisions of the Revised Code.

    (c) The judge of the court of common pleas, division of domestic relations, whose
    term begins on February 9, 2009, is the successor to the probate judge who was
    elected in 2002 for a term that began on February 9, 2003. After September 28,
    2009, the judge of the court of common pleas, division of domestic relations,
    whose term begins on February 9, 2009, shall be the probate judge.

    (2)(a) From February 9, 2009, through September 28, 2009, with respect to Lorain
    county, all references in law to the probate court shall be construed as references
    to the court of common pleas, division of domestic relations, and all references
