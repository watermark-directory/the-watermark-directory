    name: Board of County Commissioners - Generally
  text: The board of county commissioners shall fix the compensation of all persons
    appointed or employed under sections 305.13 to 305.16, inclusive, of the Revised
    Code, which, with their reasonable expenses, shall be paid from the county treasury
    upon the allowance of the board. No law requiring a certificate that the money
