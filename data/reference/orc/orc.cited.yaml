- number: '5709.85'
  heading: Tax incentive review council
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) The legislative authority of a county, township, or municipal corporation
    that grants an exemption from taxation under Chapter 725. or 1728. or under section
    3735.67, 5709.28, 5709.40, 5709.41, 5709.45, 5709.62, 5709.63, 5709.632, 5709.73,
    or 5709.78 of the Revised Code shall create a tax incentive review council. The
    council shall consist of the following members:

    (1) In the case of a municipal corporation eligible to designate a zone under
    section 5709.62 or 5709.632 of the Revised Code, the chief executive officer or
    that officer''s designee; a member of the legislative authority of the municipal
    corporation, appointed by the president of the legislative authority or, if the
    chief executive officer of the municipal corporation is the president, appointed
    by the president pro tempore of the legislative authority; the county auditor
    or the county auditor''s designee; the chief financial officer of the municipal
    corporation or that officer''s designee; an individual appointed by the board
    of education of each city, local, exempted village, and joint vocational school
    district to which the instrument granting the exemption applies; and two members
    of the public appointed by the chief executive officer of the municipal corporation
    with the concurrence of the legislative authority. At least four members of the
    council shall be residents of the municipal corporation, and at least one of the
    two public members appointed by the chief executive officer shall be a minority.
    As used in division (A)(1) of this section, a "minority" is an individual who
    is African-American, Hispanic, or Native American.

    (2) In the case of a county or a municipal corporation that is not eligible to
    designate a zone under section 5709.62 or 5709.632 of the Revised Code, three
    members appointed by the board of county commissioners; two members from each
    municipal corporation to which the instrument granting the tax exemption applies,
    appointed by the chief executive officer with the concurrence of the legislative
    authority of the respective municipal corporations; two members of each township
    to which the instrument or agreement granting the tax exemption applies, appointed
    by the board of township trustees of the respective townships; the county auditor
    or the county auditor''s designee; and an individual appointed by the board of
    education of each city, local, exempted village, and joint vocational school district
    to which the instrument or agreement granting the tax exemption applies. At least
    two members of the council shall be residents of the municipal corporations or
    townships to which the instrument or agreement granting the tax exemption applies.

    (3) In the case of a township, the board of township trustees; the county auditor
    or the county auditor''s designee; and an individual appointed by the board of
    education of each city, local, exempted village, and joint vocational school district
    to which the instrument or agreement granting the exemption applies.

    (B) The county auditor or the county auditor''s designee shall serve as the chairperson
    of the council. The council shall meet at the call of the chairperson. At the
    first meeting of the council, the council shall select a vice-chairperson. Attendance
    by a majority of the members of the council constitutes a quorum to conduct the
    business of the council.

    (C)(1) Annually, the tax incentive review council shall review all agreements
    granting exemptions from property taxation under Chapter 725. or 1728. or under
    section 3735.671, 5709.28, 5709.62, 5709.63, or 5709.632 of the Revised Code,
    and any performance or audit reports required to be submitted pursuant to those
    agreements. The review shall include agreements granting such exemptions that
    were entered into prior to July 22, 1994, that continue to be in force and applicable
    to the current year''s property taxes.

    With respect to each agreement, other than an agreement entered into under section
    5709.28 of the Revised Code, the council shall determine whether the owner of
    the exempted property has complied with the agreement, and may take into consideration
    any fluctuations in the business cycle unique to the owner''s business.

    With respect to an agreement entered into under section 5709.28 of the Revised
    Code, the council shall consist of the members described in division (A)(2) of
    this section and shall determine whether the agreement complies with the requirements
    of section 5709.28 of the Revised Code and whether a withdrawal, removal, or conversion
    of land from an agricultural security area established under Chapter 931. of the
    Revised Code has occurred in a manner that makes the exempted property no longer
    eligible for the exemption.

    On the basis of the determinations, on or before the first day of September of
    each year, the council shall submit to the legislative authority written recommendations
    for continuation, modification, or cancellation of each agreement.

    (2) Annually, the tax incentive review council shall review all exemptions from
    property taxation resulting from the declaration of public purpose improvements
    pursuant to section 5709.40, 5709.41, 5709.45, 5709.73, or 5709.78 of the Revised
    Code. The review shall include such exemptions that were granted prior to July
    22, 1994, that continue to be in force and applicable to the current year''s property
    taxes. With respect to each improvement for which an exemption is granted, the
    council shall determine the increase in the true value of parcels of real property
    on which improvements have been undertaken as a result of the exemption; the value
    of improvements exempted from taxation as a result of the exemption; and the number
    of new employees or employees retained on the site of the improvement as a result
    of the exemption.

    Upon the request of a tax incentive review council, the county auditor, the housing
    officer appointed pursuant to section 3735.66 of the Revised Code, the owner of
    a new or remodeled structure or improvement, and the legislative authority of
    the county, township, or municipal corporation granting the exemption shall supply
    the council with any information reasonably necessary for the council to make
    the determinations required under division (C) of this section, including returns
    or reports filed pursuant to sections 5711.02, 5711.13, and 5727.08 of the Revised
    Code.

    (D) Annually, the tax incentive review council shall review the compliance of
    each recipient of a tax exemption under Chapter 725. or 1728. or section 3735.67,
    5709.40, 5709.41, 5709.45, 5709.62, 5709.63, 5709.632, 5709.73, or 5709.78 of
    the Revised Code with the nondiscriminatory hiring policies developed by the county,
    township, or municipal corporation under section 5709.832 of the Revised Code.
    Upon the request of the council, the recipient shall provide the council any information
    necessary to perform its review. On the basis of its review, the council may submit
    to the legislative authority written recommendations for enhancing compliance
    with the nondiscriminatory hiring policies.

    (E) A legislative authority that receives from a tax incentive review council
    written recommendations under division (C)(1) or (D) of this section shall, within
    sixty days after receipt, hold a meeting and vote to accept, reject, or modify
    all or any portion of the recommendations.

    (F) A tax incentive review council may request from the recipient of a tax exemption
    under Chapter 725. or 1728. or section 3735.67, 5709.28, 5709.40, 5709.41, 5709.45,
    5709.62, 5709.63, 5709.632, 5709.73, or 5709.78 of the Revised Code any information
    reasonably necessary for the council to perform its review under this section.
    The request shall be in writing and shall be sent to the recipient by certified
    mail. Within ten days after receipt of the request, the recipient shall provide
    to the council the information requested.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
