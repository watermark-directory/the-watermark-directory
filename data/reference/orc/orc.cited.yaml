- number: '3745.07'
  heading: Proposed actions - mailing lists
  title:
    num: '37'
    name: Health-Safety-Morals
  chapter:
    num: '3745'
    name: Environmental Protection Agency
  text: 'Before issuing, denying, modifying, revoking, or renewing any permit, license,
    or variance under Chapter 3704., 3714., 3734., or 6111. of the Revised Code, the
    director of environmental protection may issue a proposed action to the applicant
    that indicates the director''s intent with regard to the issuance, denial, modification,
    revocation, or renewal of the permit, license, or variance. The director shall
    maintain a current mailing list of persons who, annually, subscribe for notification
    of all proposed actions, issuances, denials, modifications, revocations, and renewals
    of permits, licenses, and variances, verified complaints received, and all hearings
    and public meetings to be conducted under Chapters 3704., 3714., 3734., and 6111.
    of the Revised Code. The director shall mail notice to each subscriber of a proposed
    action or an issuance, denial, modification, revocation, or renewal of a permit,
    license, or variance within one week after issuance thereof, of a verified complaint
    within one week after receipt thereof, and of a hearing or public meeting at least
    two weeks before the hearing or public meeting. Failure to mail notice to any
    person subscribing to the mailing list shall not invalidate any proceeding or
    action of the director.

    If the director receives a written objection to a proposed action, within thirty
    days of the date of issuance of the proposed action, from an officer of an agency
    of the state or of a political subdivision acting in a representative capacity
    or any person who would be aggrieved or adversely affected by the issuance or
    renewal of a permit, license, or variance, the director shall conduct an adjudication
    hearing on the proposed action in accordance with sections 119.09 and 119.10 of
    the Revised Code, at which hearing the persons who submit objections shall be
    parties. The director shall give notice of the hearing to all persons submitting
    objections, by certified mail at least thirty days before the hearing. Notwithstanding
    section 119.07 of the Revised Code, the director may schedule the adjudication
    hearing at any reasonable time not later than sixty days after receipt of the
    request for an adjudication hearing or receipt of an objection to a proposed action.

    The director shall cause notice of each proposed action, each issuance, denial,
    modification, revocation, or renewal of a permit, license, or variance for which
    no proposed action was issued, each verified complaint received, and each hearing
    or public meeting to be published in a newspaper of general circulation in the
    county where the permit, license, or variance is sought or violation is alleged,
    within fifteen days after the date of the proposed action, the issuance, denial,
    modification, revocation, or renewal of a permit, license, or variance, or the
    receipt of the verified complaint, and at least thirty days prior to a hearing
    or public meeting.

    The director shall collect from each subscriber an annual subscription fee of
    seventy dollars to cover the expenses of notification by mail and by publication.
    All fees collected under this section shall be deposited in the general revenue
    fund.

    If the director issues, denies, modifies, revokes, or renews a permit, license,
    or variance without issuing a proposed action, an officer of an agency of the
    state or of a political subdivision, acting in a representative capacity, or any
    person who would be aggrieved or adversely affected thereby, may appeal to the
    environmental review appeals commission within thirty days of the issuance, denial,
    modification, revocation, or renewal.'
