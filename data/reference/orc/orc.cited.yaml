- number: '5302.07'
  heading: Limited warranty deed form
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: 'A deed in substance following the form set forth in this section, when duly
    executed in accordance with Chapter 5301. of the Revised Code, has the force and
    effect of a deed in fee simple to the grantee, the grantee''s heirs, assigns,
    and successors, to the grantee''s and the grantee''s heirs'', assigns'', and successors''
    own use, with covenants on the part of the grantor with the grantee, the grantee''s
    heirs, assigns, and successors, that, at the time of the delivery of that deed
    the premises were free from all encumbrances made by the grantor, and that the
    grantor does warrant and will defend the same to the grantee and the grantee''s
    heirs, assigns, and successors, forever, against the lawful claims and demands
    of all persons claiming by, through, or under the grantor, but against none other.

    "LIMITED WARRANTY DEED

    __________ (marital status), of ____________ County, _____________ for valuable
    consideration paid, grant(s), with limited warranty covenants, to ___________,
    whose tax-mailing address is ___________, the following real property:

    (description of land or interest therein and encumbrances, reservations, and exceptions,
    if any)

    Prior Instrument Reference: Volume _____, Page _____

    ___________, wife (husband) of said grantor, releases to said grantee all rights
    of dower therein.

    Executed this _______________ day of __________________

    ______________________________

    (Signature of Grantor)

    (Execution in accordance with Chapter 5301. of the Revised Code)"'
