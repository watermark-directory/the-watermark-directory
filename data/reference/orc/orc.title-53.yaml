- number: '5301.80'
  heading: Environmental covenants - definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'As used in sections 5301.80 to 5301.92 of the Revised Code:

    (A) "Activity and use limitations" means restrictions or obligations created under
    sections 5301.80 to 5301.92 of the Revised Code with respect to real property.

    (B) "Agency" means the environmental protection agency or any other state or federal
    agency that determines or approves the environmental response project pursuant
    to which an environmental covenant is created.

    (C) "Common interest community" means a condominium, a cooperative, or other real
    property with respect to which a person, by virtue of the person''s ownership
    of a parcel of real property, is obligated to pay property taxes or insurance
    premiums or to pay for maintenance or improvement of other real property described
    in a recorded covenant that creates the common interest community.

    (D) "Environmental covenant" means a servitude arising under an environmental
    response project that imposes activity and use limitations and that meets the
    requirements established in section 5301.82 of the Revised Code.

    (E) "Environmental response project" means a plan or work performed for environmental
    remediation of real property or for protection of ecological features associated
    with real property and conducted as follows:

    (1) Under a federal or state program governing environmental remediation of real
    property that is subject to agency review or approval, including property that
    is the subject of any of the following:

    (a) A corrective action, closure, or post-closure pursuant to the "Resource Conservation
    and Recovery Act of 1976," 90 Stat. 2806, 42 U.S.C.A. 6921, et seq., as amended,
    or any regulation adopted under that act, or Chapter 3714. or 3734. of the Revised
    Code or any rule adopted under those chapters, including the use or reservation
    of soil to be used in the performance of the corrective action, closure, or post-closure
    care;

    (b) A removal or remedial action pursuant to the "Comprehensive Environmental
    Response, Compensation, and Liability Act of 1980," 94 Stat. 2767, 42 U.S.C.A.
    9601, et seq., as amended, or any regulation adopted under that act, or Chapter
    3734. or 6111. of the Revised Code or any rule adopted under those chapters;

    (c) A no further action letter submitted with a request for a covenant not to
    sue pursuant to section 3746.11 of the Revised Code;

    (d) A corrective action pursuant to section 3737.88, 3737.882, or 3737.89 of the
    Revised Code or any rule adopted under those sections.

    (2) Pursuant to a mitigation requirement associated with the section 401 water
    quality certification program or the isolated wetland program as required by Chapter
    6111. of the Revised Code;

    (3) Pursuant to a grant commitment or loan agreement entered into pursuant to
    section 6111.036 or 6111.037 of the Revised Code;

    (4) Pursuant to a supplemental environmental project embodied in orders issued
    by the director of environmental protection pursuant to Chapter 6111. of the Revised
    Code.

    (F) "Holder" means a grantee of an environmental covenant as specified in division
    (A) of section 5301.81 of the Revised Code.

    (G) "Person" includes the state, a political subdivision, another state or local
    entity, the United States and any agency or instrumentality of it, and any legal
    entity defined as a person under section 1.59 of the Revised Code.

    (H) "Record," when used as a noun, means information that is inscribed on a tangible
    medium or that is stored in an electronic or other medium and is retrievable in
    perceivable form.'
