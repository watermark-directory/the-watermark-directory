- number: '5323.02'
  heading: Filing of information by owner with county auditor
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5323'
    name: Residential Rental Property
  text: '(A) An owner of residential rental property shall file with the county auditor
    of the county in which the property is located the following information:

    (1) The name, address, and telephone number of the owner;

    (2) If the residential rental property is owned by a trust, business trust, estate,
    partnership, limited partnership, limited liability company, association, corporation,
    or any other business entity, the name, address, and telephone number of the following:

    (a) A trustee, in the case of a trust or business trust;

    (b) The executor or administrator, in the case of an estate;

    (c) A general partner, in the case of a partnership or a limited partnership;

    (d) A member, manager, or officer, in the case of a limited liability company;

    (e) An associate, in the case of an association;

    (f) An officer, in the case of a corporation;

    (g) A member, manager, or officer, in the case of any other business entity.

    (3) The street address and permanent parcel number of the residential rental property.

    (B) The information required under division (A) of this section shall be filed
    and maintained on the tax list or the real property record.

    (C) An owner of residential rental property shall update the information required
    under division (A) of this section within sixty days after any change in the information
    occurs.

    (D) The county auditor shall provide an owner of residential rental property located
    in a county that has a population of more than two hundred thousand according
    to the most recent decennial census with notice pursuant to division (B) of section
    323.131 of the Revised Code of the requirement to file the information required
    under division (A) of this section and the requirement to update that information
    under division (C) of this section.

    (E) The owner of residential real property shall comply with the requirements
    under divisions (A) and (C) of this section within sixty days after receiving
    the notice provided under division (D) of this section, division (E) of section
    319.202, or division (B) of section 323.131 of the Revised Code.

    (F) Any agent designated by the owner to manage the property on the owner''s behalf
    may file or update any information, or do anything otherwise required by this
    section, on the owner''s behalf.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5323.02
- number: '5323.03'
  heading: Designation of filing agent by out-of-state owner
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5323'
    name: Residential Rental Property
  text: 'An owner of residential rental property who resides outside the state shall
    designate, in a manner to be determined by the county auditor of the county in
    which the property is located, an individual who resides in the state to serve
    as the owner''s agent for the acceptance of service of process on behalf of the
    owner in any legal action or proceeding in the state, unless the owner previously
    designated and continues to maintain a statutory agent for the service of process
    with the secretary of state as a condition of being authorized to engage in business
    in this state pursuant to another section of the Revised Code.

    An owner who designates an agent pursuant to this section shall file in writing
    with the relevant county auditor the name, address, and telephone number of the
    agent. An owner who previously designated and continues to maintain a statutory
    agent for the service of process with the secretary of state as a condition of
    being authorized to engage in business in this state pursuant to another section
    of the Revised Code shall file in writing with the county auditor of the county
    in which the residential rental property is located a certified copy of the document
    filed with the secretary of state containing that designation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5323.03
- number: '5323.04'
  heading: Filed information as public record
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5323'
    name: Residential Rental Property
  text: '(A) All information filed with a county auditor under this chapter is a public
    record under section 149.43 of the Revised Code.

    (B) An owner of residential rental property who complies with the requirements
    of this chapter shall be deemed to be in full compliance with any request by the
    state or any political subdivision to that owner for information that is identical
    to the information filed with the county auditor under this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5323.04
- number: '5323.99'
  heading: Failure to comply with chapter - penalty
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5323'
    name: Residential Rental Property
  text: No owner of residential rental property shall fail to comply with the filing
    or updating of information requirements of section 5323.02 of the Revised Code
    or shall fail to satisfy the designation of agent requirement or the filing of
    the appropriate designation of agent document requirement of section 5323.03 of
    the Revised Code. The county auditor may impose upon any person who violates this
    section a special assessment on the residential rental property that is the subject
    of the violation that is not less than fifty dollars or more than one hundred
    fifty dollars. Such special assessment may be appealed to the county board of
    revision.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5323.99
