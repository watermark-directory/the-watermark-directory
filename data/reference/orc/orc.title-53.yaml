    the environmental covenant is located;

    (5) Any other person that the agency requires.

    (B) The validity of an environmental covenant is not affected by failure to provide
    a copy of the environmental covenant as required under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.83
- number: '5301.84'
  heading: Obligations under environmental covenant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: An agency is bound by any obligation that it expressly assumes in an environmental
    covenant, but an agency does not assume obligations merely by signing an environmental
    covenant. Any other person that signs an environmental covenant is bound by the
    obligations that the person assumes in the environmental covenant, but signing
    the environmental covenant does not change obligations, rights, or protections
    that are granted or imposed under law other than sections 5301.80 to 5301.92 of
    the Revised Code, except as provided in the environmental covenant.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.84
- number: '5301.85'
  heading: Environmental covenant runs with land - enforceability
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) An environmental covenant that complies with sections 5301.80 to 5301.92
    of the Revised Code runs with the land.

    (B) An environmental covenant that is otherwise effective is valid and enforceable
    even if any of the following limitations on enforcement of interests applies:

    (1) It is not appurtenant to an interest in real property.

    (2) It can be or has been assigned to a person other than the original holder.

    (3) It is not of a character that has been recognized traditionally at common
    law.

    (4) It imposes a negative burden.

    (5) It imposes an affirmative obligation on a person having an interest in the
    real property or on the holder.

    (6) The benefit or burden of the environmental covenant does not touch or concern
    real property.

    (7) There is no privity of estate or contract.

    (8) The holder dies, ceases to exist, resigns, or is replaced.

    (9) The owner of an interest that is subject to the environmental covenant and
    the holder are the same person.

    (C) An instrument that creates restrictions or obligations with respect to real
    property that would qualify as activity and use limitations except for the fact
    that the instrument was recorded before the effective date of sections 5301.80
    to 5301.92 of the Revised Code is not invalid or unenforceable because of any
    of the limitations on enforcement of interests described in division (B) of this
    section or because it was identified as an easement, servitude, deed restriction,
    or other interest. Sections 5301.80 to 5301.92 of the Revised Code do not apply
    in any other respect to such an instrument.

    (D) Sections 5301.80 to 5301.92 of the Revised Code do not invalidate or render
    unenforceable any interest, whether designated as an environmental covenant or
    other interest, that is otherwise enforceable under the laws of this state.

    (E) Nothing in sections 5301.80 to 5301.92 of the Revised Code shall be construed
    to restrict, affect, or impair the rights of any person under the Revised Code
    or common law to enter into or record a restrictive covenant, institutional control,
    easement, servitude, or other restriction on the use of property that does not
    satisfy the requirements of division (A) of section 5301.82 of the Revised Code
    and does not have the permission, approval, or consent of an agency, political
    subdivision, regulatory body, or other unit of government. However, a restrictive
    covenant, institutional control, easement, servitude, or other restriction on
    the use of property entered into or recorded without such permission, approval,
    or consent is not an environmental covenant and is not binding on an agency, political
    subdivision, regulatory body, or other unit of government.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.85
- number: '5301.86'
  heading: Antecedent interests in real property - subordination agreement
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'With respect to interests in real property in existence at the time that
    an environmental covenant is created or amended, all of the following apply:

    (A) An interest that has priority under other law is not affected by an environmental
    covenant unless the person that owns the interest agrees to subordinate that interest
    to the environmental covenant.

    (B) Sections 5301.80 to 5301.92 of the Revised Code do not require a person that
    owns a prior interest to subordinate that interest to an environmental covenant
    or to agree to be bound by the covenant.

    (C) A subordination agreement may be contained in an environmental covenant or
    in a separate record. If the environmental covenant covers commonly owned property
    in a common interest community, the record may be signed by any person who is
    authorized by the common interest community.

    (D) An agreement by a person to subordinate a prior interest to an environmental
    covenant affects the priority of that persons''s interest, but does not by itself
    impose any affirmative obligation on the person with respect to the environmental
    covenant.'
