- number: '5301.256'
  heading: Registry of persons prohibited from acquiring agricultural land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) As used in this section:

    (1) "Agriculture" has the same meaning as in section 1.61 of the Revised Code.

    (2) "Agricultural land" means land suitable for use in agriculture and includes
    water on and upon and air space over and above the land and natural products and
    deposits that are unsevered from the land.

    (3) "Person" includes all of the following:

    (a) Individuals;

    (b) Firms, companies, business trusts, estates, trusts, sole proprietorships,
    partnerships, general partnerships, limited liability companies, associations,
    corporations, and any other business entities;

    (c) Governments other than the government of the United States, its states, subdivisions,
    territories, or possessions;

    (d) Legal or commercial entities, organizations, joint ventures, and nonprofits.

    (B)(1) On or after the effective date of this section, no person listed in the
    registry published by the secretary of state under division (G) of this section,
    and no agent, trustee, or fiduciary of such a person, shall purchase or otherwise
    acquire agricultural land in this state.

    (2) A person, agent, trustee or fiduciary subject to division (B)(1) of this section
    that owns or holds agricultural land in this state as described in division (B)(1)
    of this section before the effective date of this section may continue to own
    or hold the agricultural land, but shall not purchase or otherwise acquire additional
    agricultural land in this state that is subject to the restriction in division
    (B)(1) of this section unless an exception described in division (C) of this section
    applies.

    (C) The restriction on acquiring agricultural land set forth in division (B)(1)
    of this section does not apply to any of the following:

    (1) Agricultural land acquired by devise or descent. However, a person listed
    in the registry published by the secretary of state under division (G) of this
    section, or an agent, trustee, or fiduciary thereof, that acquires the agricultural
    land, or an interest in agricultural land, by devise or descent on or after the
    effective date of this section shall divest itself of all right, title, and interest
    in the agricultural land within two years from the date of acquisition.

    (2) Agricultural land that is acquired by a process of law in the collection of
    debts, by a deed in lieu of foreclosure, pursuant to a forfeiture of a contract
    for deed, or by any procedure for the enforcement of a lien or claim on the agricultural
    land, whether created by mortgage or otherwise. Agricultural land so acquired
    shall be sold or otherwise disposed of within two years after title is transferred.
    Agricultural land, pending sale or disposition, shall not be used for any purpose
    other than agriculture, and the land shall not be used for agriculture under lease
    to an individual, trust, corporation, partnership, or other business entity subject
    to the restrictions under division (B)(1) of this section.

    (D) A person listed in the registry published by the secretary of state under
    division (G) of this section, or an agent, trustee, or fiduciary of such a person,
    shall not transfer title to or interest in agricultural land to another person
    listed in that registry, or an agent, trustee, or fiduciary thereof, except by
    devise or descent.

    (E) A person that purchases or otherwise acquires agricultural land in this state
    described in division (B)(1) of this section, other than by devise or descent,
    after the effective date of this section, and that is subsequently added to the
    registry published by the secretary of state under division (G) of this section,
    shall divest itself of all right, title, and interest in the agricultural land
    within two years from the date the person is added to the registry.

    (F)(1) If the secretary of state finds that a person listed on the registry published
    under division (G) of this section, or an agent, trustee, or fiduciary thereof,
    has acquired, or holds title to, or interest in, agricultural land in this state
    in violation of this section, the secretary of state shall report the violation
    to the attorney general.

    (2) Upon receipt of the report from the secretary of state, the attorney general
    shall initiate an action in the court of common pleas of any county in which the
    agricultural land is located seeking relief in accordance with this section. If
    the agricultural land is located in more than one county, or adjoining tracts
    of agricultural land are located in more than one county, the county in which
    the majority of the agricultural land is located shall have territorial jurisdiction
    over agricultural land that is the subject of the action. The attorney general
    may initiate an action in the court of common pleas of more than one county, if
    necessary, in which case, the court of common pleas in that county shall have
    jurisdiction over the action in matters as it relates to the portion of the agricultural
    land that is located in that county.

    (3) The attorney general shall file a notice of the pendency of the action with
    the county recorder of each county in which any of the agricultural land is located.

    (4) If the court finds that the agricultural land in question has been acquired
    or held in violation of this section, it shall do all of the following:

    (a) Enter an order so declaring;

    (b) File a copy of the order with the county recorder of each county in which
    any portion of the agricultural land is located;

    (c) Declare the agricultural land escheated to the state;

    (d) Order that the escheated agricultural land be sold pursuant to Chapter 2329.
    of the Revised Code in the same manner as a foreclosure on a mortgage, except
    that there shall be no opportunity for redemption under section 2329.33 of the
    Revised Code.

    (5) Upon receiving an order under division (F)(4) of this section, the clerk of
    the court shall notify the governor that the title to the agricultural land is
    vested in the state by decree of the court. After the sale, the proceeds of the
    sale shall be paid as follows:

    (a) The proceeds shall first be used to pay court costs related to the action
    or actions initiated pursuant to division (F)(2) of this section;

    (b) The remaining proceeds, if any, shall be paid to the person whose agricultural
    land escheated, but only in an amount not exceeding the actual cost paid by the
    person for that agricultural land;

    (c) The proceeds remaining after payments have been made pursuant to divisions
    (F)(5)(a) and (b) of this section shall be paid to the general fund of each county
    in which the agricultural land is located, proportionally, based on the percentage
    of the territory located in each county.

    (G) The secretary of state shall compile and periodically update a registry of
    persons that, based on the best information available to the secretary of state,
    constitute a threat to the agricultural production of this state, or the United
    States, if permitted to acquire agricultural land described in division (B)(1)
    of this section. The registry shall be published on the secretary of state''s
    web site. The secretary of state shall consult all of the following in compiling
    the registry:

    (1) The list of persons determined to be foreign adversaries by the secretary
    of commerce of the United States under 15 C.F.R. 7.4;

    (2) The terrorist exclusion list compiled by the secretary of state of the United
    States in consultation with the attorney general of the United States under 8
    U.S.C. 1182;

    (3) The list of countries determined by the secretary of state of the United States
    that have repeatedly provided support for acts of international terrorism under
    50 U.S.C. 4813(c) and 22 U.S.C. 2780(d);

    (4) The list of individual and entities designated by, or in accordance with Executive
    Order 13224, issued by the president of the United States on September 23, 2021,
    or Executive Order 13268, issued by the president of the United States on July
    2, 2002.

    (H) The purpose of establishing the restrictions as set forth in this section
    is to recognize that the state has a substantial and compelling interest in protecting
    its agricultural production.'
