- number: '5309.02'
  heading: Jurisdiction of the court of common pleas and the probate court
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Concurrent jurisdiction, except as otherwise provided, is hereby conferred
    upon the court of common pleas and the probate court in all maters arising under
    sections 5309.02 to 5310.21, inclusive, of the Revised Code. The probate court
    shall have all the powers at law and in equity of a court of general jurisdiction
    as to such matters. In counties having three or more judges of the court of common
    pleas, such judges may select one or more from their own number who shall act
    as judges in land registration cases and matters. If the judges so selected are
    unable to perform the duties on account of interest, absence, or other disability,
    or in case of emergency, any other judge of the court of common pleas for the
    same county may perform them. The court of common pleas in any county may appoint
    one or more deputy clerks to assist the clerk in attending to land registration
    cases and matters. Such court may inquire into the condition of the title to all
    interests in land, legal or equitable, or any lien, charge, or encumbrance thereon,
    and make all orders, judgments, and decrees necessary to settle, as against all
    persons known and unknown, in being or unborn, such title, or interest, and all
    liens and encumbrances existing therein, and their order and preference, and remove
    clouds from such title and forever quiet and settle the title.
