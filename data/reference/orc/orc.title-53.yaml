  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.19
- number: '5301.20'
  heading: Reversion to owner of land conveyed to state
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'When a conveyance of lands or tenements made to the state contains a condition
    that the real estate so conveyed shall revert to the grantor on the payment of
    a certain sum of money, or on the performance of other conditions, and the money,
    with legal interest thereon, from the time it was due or payable, is paid to the
    treasurer of state, or other person authorized to receive it, or the other conditions
    stated in such deed are performed according to the stipulations contained therein,
    on receiving a certificate from the proper officer of such payment or other performance,
    the governor shall execute and deliver to the grantor, his heirs, or assigns,
    a deed or release for the property so conveyed.

    When there has been a foreclosure of the equity of redemption for the nonperformance
    of the conditions stated in any such deed of conveyance, this section and section
    5301.19 of the Revised Code are inoperative as to such case.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.20
- number: '5301.21'
  heading: Adjoining owners may fix corner or line
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'When the owners of adjoining tracts of land, or of lots in a municipal corporation,
    agree upon the site of a corner or line common to such tracts or lots, in a written
    instrument containing a pertinent description thereof, either with or without
    a plat, executed, acknowledged, and recorded as are deeds, such corner or line
    thenceforth shall be established as between the parties to such agreement, and
    all persons subsequently deriving title from them.

    Such agreement shall be recorded by the county recorder in the official records.
    The original agreement, after being so recorded, or a certified copy thereof from
    the record, is competent evidence in any court in this state against a party thereto,
    or person in privity with a party.

    When a tract of land is owned by the state, the officer or board having administrative
    control thereof, with the approval of the attorney general, may execute said written
    instrument and following recording in the county where the land is situated, said
    instrument shall be filed with the director of administrative services with the
    evidence of title to the land affected.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.21
- number: '5301.22'
  heading: Effect of agreement with a guardian
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'As used in this section, "incompetent person" means a person who is so mentally
    impaired, as a result of a mental or physical illness or disability, as a result
    of an intellectual disability, or as a result of chronic substance abuse, that
    the person is incapable of taking proper care of the person''s self or property
    or fails to provide for the person''s family or other persons for whom the person
    is charged by law to provide.

    No agreement described in section 5301.21 of the Revised Code shall be executed
    by a minor or incompetent person, but it may be executed and delivered for record,
    on such a person''s behalf, by the person''s guardian. When executed, acknowledged,
    delivered for record, and recorded, such agreement shall be as effectual against
    such minor or incompetent person, as if the person had been under no disability,
    and had performed such acts personally. An owner, not under any of such disabilities,
    may perform all such acts by an attorney in fact. The power of such attorney must
    be in writing and first recorded in the county recorder''s office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.22
- number: '5301.23'
  heading: Mortgage effective dates
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) All properly executed mortgages shall be recorded in the office of the
    county recorder of the county in which the mortgaged premises are situated and
    shall take effect at the time they are delivered to the recorder for record. If
    two or more mortgages pertaining to the same premises are presented for record
    on the same day, they shall take effect in the order of their presentation. The
    first mortgage presented shall be the first recorded, and the first mortgage recorded
    shall have preference.

    (B) A mortgage that is presented for record shall contain the then current mailing
    address of the mortgagee. The omission of this address or the inclusion of an
    incorrect address shall not affect the validity of the instrument or render it
    ineffective for purposes of constructive notice.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.23
- number: '5301.231'
  heading: Effective dates of amendments, supplements, modifications or extensions
    of mortgages, or of debt secured by mortgages,
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) All amendments or supplements of mortgages, or modifications or extensions
    of mortgages or of the debt secured by mortgages, that have been executed in the
    manner provided in section 5301.01 of the Revised Code shall be recorded in the
    office of the county recorder of the county in which the mortgaged premises are
    situated and shall take effect at the time they are delivered to the recorder
    for record. Sections 317.08, 5301.23, and 5301.231 of the Revised Code do not
    affect the enforceability, validity, or legal effect of instruments recorded in
    those mortgage records prior to October 10, 1963.

    (B) An amendment or supplement of a mortgage, or a modification or extension of
    a mortgage or of the debt secured by a mortgage, that is presented for record
    shall contain the then current mailing address of the mortgagee. The omission
    of this address or the inclusion of an incorrect address shall not affect the
    validity of the instrument or render it ineffective for purposes of constructive
    notice.'
