- number: '5311.09'
  heading: Unit owners association records
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A)(1) The unit owners association shall keep all of the following:

    (a) Correct and complete books and records of account that specify the receipts
    and expenditures relating to the common elements and other common receipts and
    expenses;

    (b) Records showing the allocation, distribution, and collection of the common
    profits, losses, and expenses among and from the unit owners;

    (c) Minutes of the meetings of the association and the board of directors;

    (d) Records of the names and addresses of the unit owners and their respective
    undivided interests in the common elements.

    (2) Within thirty days after a unit owner obtains a condominium ownership interest,
    the unit owner shall provide the following information in writing to the unit
    owners association through the board of directors:

    (a) The home address, home and business mailing addresses, and the home and business
    telephone numbers of the unit owner and all occupants of the unit;

    (b) The name, business address, and business telephone number of any person who
    manages the owner''s unit as an agent of that owner.

    (3) Within thirty days after a change in any information that division (A)(2)
    of this section requires, a unit owner shall notify the association, through the
    board of directors, in writing of the change. When the board of directors requests,
    a unit owner shall verify or update the information.

    (B)(1) When elected members of a board of directors of a unit owners association
    take control of the association, the declarant or developer shall deliver to the
    board correct and complete copies of all of the following:

    (a) The books, records, and minutes referred to in division (A) of this section;

    (b) The declaration, the bylaws, the drawings prepared pursuant to section 5311.07
    of the Revised Code, as recorded, and any articles of incorporation of the unit
    owners association, as recorded;

    (c) Except in the case of a conversion condominium, documents, information, and
    sources of information concerning the location of underground utility lines, and
    plans and specifications that are not proprietary or copyrighted, of the buildings,
    other improvements, and structures of the condominium property that are reasonably
    available to the developer, but only in connection with condominium developments
    declared on or after the effective date of this amendment and condominium developments
    that are declared prior to that date but originally built or constructed on or
    after that date.

    (2) The board of directors may commence a civil action on behalf of the unit owners
    association in the court of common pleas of the county in which the condominium
    property is located to obtain injunctive relief or recover damages for harm resulting
    from the declarant''s or developer''s failure to comply with division (B)(1) of
    this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.09
- number: '5311.091'
  heading: Examination of books, records, minutes
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Except as otherwise prohibited by this section, any member of a unit
    owners association may examine and copy the books, records, and minutes described
    in division (A) of section 5311.09 of the Revised Code pursuant to reasonable
    standards set forth in the declaration, bylaws, or rules the board promulgates,
    which may include, but are not limited to, standards governing the type of documents
    that are subject to examination and copying, the times and locations at which
    those documents may be examined or copied, and the specification of a reasonable
    fee for copying the documents.

    (B) Unless approved by the board of directors, a unit owner may not examine or
    copy any books, records, or minutes that meet either of the following conditions:

    (1) Date back more than five years prior to the date of the request;

    (2) Contain any of the following:

    (a) Information that pertains to condominium property-related personnel matters;

    (b) Communications with legal counsel or attorney work product pertaining to pending
    litigation or other condominium property-related matters;

    (c) Information that pertains to contracts or transactions currently under negotiation,
    or information that is contained in a contract or other agreement containing confidentiality
    requirements and that is subject to those requirements;

    (d) Information that relates to the enforcement of the declaration, bylaws, or
    rules of the unit owners association against unit owners;

    (e) Information the disclosure of which is prohibited by state or federal law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.091
- number: '5311.10'
  heading: Description of units in deed, mortgage, lease, other instrument of conveyance
    or encumbrance and lien
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: In any deed, mortgage, lease, or other instrument of conveyance or encumbrance
    of, or by which a lien is created upon any interest or estate in any unit of condominium
    property, it is sufficient to describe the unit by setting forth the name of the
    condominium property, the number or other designation of the unit, and the numbers
    of the volumes and initial pages of the records of the declaration and drawings
    of the condominium property. This section does not require reference by volume
    and page to amendments to the declaration or the drawings of the condominium property
    that accompany an amendment, and the omission of any reference to amendments does
    not affect the validity of any deed, mortgage, lease, or other instrument referred
    to in this section.
