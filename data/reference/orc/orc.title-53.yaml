- number: '5301.99'
  heading: Penalty
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) Any individual, corporation, or other business entity that violates section
    5301.254 of the Revised Code shall be fined not less than five thousand dollars
    nor more than an amount equal to twenty-five percent of the market value of the
    real property or mineral or mining rights about which information must be filed
    with the secretary of state pursuant to section 5301.254 of the Revised Code.

    (B) Whoever violates section 5301.61 of the Revised Code is guilty of a misdemeanor
    of the first degree.'
  history: null
