  heading: Release of mortgage to the state
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: When lands or tenements are mortgaged to the state to secure the payment of
    money due the state, and the money so secured, together with the legal interest
    due thereon, is paid to the treasurer of state, or other person authorized to
    receive it, the governor shall sign and deliver to the mortgagor, his heirs, or
