  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.12
- number: '5321.13'
  heading: Terms prohibited in rental agreement
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) No provision of this chapter may be modified or waived by any oral or
    written agreement except as provided in division (F) of this section.

    (B) No warrant of attorney to confess judgment shall be recognized in any rental
    agreement or in any other agreement between a landlord and tenant for the recovery
    of rent or damages to the residential premises.

    (C) No agreement to pay the landlord''s or tenant''s attorney''s fees shall be
    recognized in any rental agreement for residential premises or in any other agreement
    between a landlord and tenant.

    (D) No agreement by a tenant to the exculpation or limitation of any liability
    of the landlord arising under law or to indemnify the landlord for that liability
    or its related costs shall be recognized in any rental agreement or in any other
    agreement between a landlord and tenant.

    (E) A rental agreement, or the assignment, conveyance, trust deed, or security
    instrument of the landlord''s interest in the rental agreement may not permit
    the receipt of rent free of the obligation to comply with section 5321.04 of the
    Revised Code.

    (F) The landlord may agree to assume responsibility for fulfilling any duty or
    obligation imposed on a tenant by section 5321.05 of the Revised Code, other than
    the obligation specified in division (A)(9) of that section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.13
- number: '5321.131'
  heading: Display of certain flags
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) No landlord shall include any restriction in a rental agreement against,
    or otherwise prohibit on a tenant''s rental property, any of the following:

    (1) The display of the flag of the United States or the national league of families
    POW/MIA flag if the flag is displayed in accordance with any of the following:

    (a) The patriotic customs set forth in 4 U.S.C. 5-10, and 36 U.S.C. 902, governing
    the display and use of the flag;

    (b) Federal law, state law, or any local ordinance or resolution;

    (c) A proclamation of the president of the United States or the governor of the
    state.

    (2) The display of the state flag as defined in section 5.01 of the Revised Code
    if the flag is displayed in accordance with state law, any local ordinance or
    resolution, or proclamation by the governor of the state;

    (3) The display of a service flag approved by the United States secretary of defense
    for display in a window of the residence of a member of the immediate family of
    an individual serving in the armed forces of the United States. A service flag
    includes a blue star banner, a gold star banner, and any other flag the secretary
    of defense designates as a service flag.

    (B)(1) A tenant who requests to display the flag of the United States or the national
    league of families POW/MIA flag at the rental property as provided in division
    (A)(1) of this section through the use of a flag pole shall contact the landlord
    with reasonable notice before installation of the flag pole to discuss the following:

    (a) Placement in compliance with any local zoning restrictions and the required
    underground utility service requests (OUPS);

    (b) Cost of the materials and installation;

    (c) Installation in a workerlike manner if installed at the tenant''s request
    and expense;

    (d) Any lighting required to comply with division (A)(1)(a) of this section;

    (e) The appropriate size of the flag and flag pole, which shall be consistent
    with the size and character of the building.

    (2) A tenant who requests to display the flag of the United States or the national
    league of families POW/MIA flag at the rental property as provided in division
    (A)(1) of this section through the use of a bracket to be permanently affixed
    to the unit, shall contact the landlord with reasonable notice before installation
    of the bracket to discuss the following:

    (a) Placement in compliance with any local zoning restrictions;

    (b) Cost of the materials and installation;

    (c) Preferred location of the bracket with installation to be performed in a workerlike
    manner if installed at the tenant''s request and expense;

    (d) Any lighting required to comply with division (A)(1)(a) of this section;

    (e) The appropriate size of the flag and flag pole, which shall be consistent
    with the size and character of the building.

    (C) A landlord who does not receive the notifications required under division
    (B) of this section is not liable for any damages, fines, or costs associated
    with any issues arising from the placement of the flag pole or the bracket by
    the tenant.

    (D) Any violation of this section is against public policy and unenforceable.
    Any provision of a rental agreement that violates this section is an unconscionable
    term under section 5321.14 of the Revised Code.

    (E) Nothing in division (B) of this section exempts a tenant from a provision
    in a lease agreement that requires a tenant, at the termination of a lease, to
    return the premises in the same condition as they were in when the tenant took
    possession.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.131
- number: '5321.14'
  heading: Unconscionable terms
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) If the court as a matter of law finds a rental agreement, or any clause
    thereof, to have been unconscionable at the time it was made, it may refuse to
    enforce the rental agreement or it may enforce the remainder of the rental agreement
    without the unconscionable clause, or it may so limit the application of any unconscionable
    clause as to avoid any unconscionable result.

    (B) When it is claimed or appears to the court that the rental agreement, or any
    clause thereof, may be unconscionable, the parties shall be afforded a reasonable
    opportunity to present evidence as to its setting, purpose, and effect to aid
    the court in making the determination.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.14
- number: '5321.15'
  heading: Acts of landlord prohibited if residential property involved
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) No landlord of residential premises shall initiate any act, including
    termination of utilities or services, exclusion from the premises, or threat of
    any unlawful act, against a tenant, or a tenant whose right to possession has
    terminated, for the purpose of recovering possession of residential premises,
    other than as provided in Chapters 1923., 5303., and 5321. of the Revised Code.

    (B) No landlord of residential premises shall seize the furnishings or possessions
    of a tenant, or of a tenant whose right to possession has terminated, for the
    purpose of recovering rent payments, other than in accordance with an order issued
    by a court of competent jurisdiction.

    (C) A landlord who violates this section is liable in a civil action for all damages
    caused to a tenant, or to a tenant whose right to possession has terminated, together
    with reasonable attorneys fees.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.15
- number: '5321.16'
  heading: Procedures for security deposits
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) Any security deposit in excess of fifty dollars or one month''s periodic
    rent, whichever is greater, shall bear interest on the excess at the rate of five
    per cent per annum if the tenant remains in possession of the premises for six
    months or more, and shall be computed and paid annually by the landlord to the
    tenant.

    (B) Upon termination of the rental agreement any property or money held by the
    landlord as a security deposit may be applied to the payment of past due rent
    and to the payment of the amount of damages that the landlord has suffered by
    reason of the tenant''s noncompliance with section 5321.05 of the Revised Code
    or the rental agreement. Any deduction from the security deposit shall be itemized
    and identified by the landlord in a written notice delivered to the tenant together
    with the amount due, within thirty days after termination of the rental agreement
    and delivery of possession. The tenant shall provide the landlord in writing with
    a forwarding address or new address to which the written notice and amount due
    from the landlord may be sent. If the tenant fails to provide the landlord with
    the forwarding or new address as required, the tenant shall not be entitled to
    damages or attorneys fees under division (C) of this section.

    (C) If the landlord fails to comply with division (B) of this section, the tenant
    may recover the property and money due him, together with damages in an amount
    equal to the amount wrongfully withheld, and reasonable attorneys fees.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.16
- number: '5321.17'
  heading: Termination of tenancy
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) Except as provided in division (C) of this section, the landlord or the
    tenant may terminate or fail to renew a week-to-week tenancy by notice given the
    other at least seven days prior to the termination date specified in the notice.

    (B) Except as provided in division (C) of this section, the landlord or the tenant
    may terminate or fail to renew a month-to-month tenancy by notice given the other
    at least thirty days prior to the periodic rental date.

    (C) If a tenant violates division (A)(9) of section 5321.05 of the Revised Code
    and if the landlord has actual knowledge of or has reasonable cause to believe
    that the tenant, any person in the tenant''s household, or any person on the residential
    premises with the consent of the tenant previously has or presently is engaged
    in a violation as described in division (A)(6)(a)(i) of section 1923.02 of the
    Revised Code, the landlord shall terminate the week-to-week tenancy, month-to-month
    tenancy, or other rental agreement with the tenant by giving a notice of termination
    to the tenant in accordance with this division. The notice shall specify that
    the tenancy or other rental agreement is terminated three days after the giving
    of the notice, and the landlord may give the notice whether or not the tenant
    or other person has been charged with, has pleaded guilty to or been convicted
    of, or has been determined to be a delinquent child for an act that, if committed
    by an adult, would be a violation as described in division (A)(6)(a)(i) of section
    1923.02 of the Revised Code. If the tenant fails to vacate the premises within
    three days after the giving of that notice, then the landlord promptly shall comply
    with division (A)(9) of section 5321.04 of the Revised Code. For purposes of this
    division, actual knowledge or reasonable cause to believe as described in this
    division shall be determined in accordance with division (A)(6)(a)(i) of section
    1923.02 of the Revised Code.

    (D) This section does not apply to a termination based on the breach of a condition
    of a rental agreement or the breach of a duty and obligation imposed by law, except
    that it does apply to a breach of the obligation imposed upon a tenant by division
    (A)(9) of section 5321.05 of the Revised Code.'
  history: null
