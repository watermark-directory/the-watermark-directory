- number: '5301.26'
  heading: Vendor's lien
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: As between the vendor and vendee of land the vendor shall have a lien for
    so much of the purchase money as remains unpaid. Such lien shall not be effective
    as against a purchaser, mortgagee, judgment creditor, or other encumbrancer, unless
    there is a recital or a reservation of the lien in the deed, or in some instrument
    of record executed with the same formalities as are required for the execution
    of deeds and mortgages of land. The vendor waives his lien by taking a mortgage
    for any unpaid purchase money on the land conveyed or any part thereof, and the
    filing for record of such a mortgage with the county recorder of the county in
    which said land is located shall be constructive notice of the waiver of the vendor's
    lien.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.26
- number: '5301.27'
  heading: Conditional grants or devises of real estate
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'When any lands are left encumbered, by a deed, will, or other instrument
    of record, with the payment of money, or the performance of any acts by the grantee
    or devisee, such grantee or devisee or his heirs or assigns, upon the payment
    of the money or the performance of the acts, may present the receipt of such payment,
    or the proof of the performance of such acts, to the probate court of the county
    in which such lands are situated. The court must enter such payments and the proof
    of the performance of such acts on its journal, record the receipts and the proof
    of the performance of such acts on the margin of the will record in which such
    encumbrances are created, and order that this be done in like manner on the margin
    of the deed record by the county recorder. Such lands will then be relieved from
    the encumbrances except for fraud.

    No such record of receipts or orders may be made by the probate judge nor shall
    he enter proof of the performance of such acts until notice thereof has been given
    as is required by sections 2109.32 and 2109.33 of the Revised Code.'
