    name: Land Installment Contracts
  text: 'Every vendor under a land installment contract shall, at least once a year
    or on demand of the vendee, but no more than twice a year, furnish a statement
    to the vendee showing the following:

    (A) The amount credited to principal and interest;

    (B) The balance due.

    A land contract passbook issued by the vendor or a financial institution shall
    be sufficient compliance with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.03
- number: '5313.04'
  heading: Vendee to enforce chapter provisions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: Upon the failure of any vendor to comply with Chapter 5313. of the Revised
    Code, the vendee may enforce such provisions in a municipal court, county court,
    or court of common pleas. Upon the determination of the court that the vendor
    has failed to comply with these provisions, the court shall grant appropriate
    relief.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.04
- number: '5313.05'
  heading: Default of vendee
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: When the vendee of a land installment contract defaults in payment, forfeiture
    of the interest of the vendee under the contract may be enforced only after the
    expiration of thirty days from the date of the default. A vendee in default may,
    prior to the expiration of the thirty-day period, avoid the forfeiture of his
    interest under the contract by making all payments currently due under the contract
    and by paying any fees or charges for which he is liable under the contract. If
    such payments are made within the thirty-day period, forfeiture of the interest
    of the vendee shall not be enforced.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.05
- number: '5313.06'
  heading: Notice of forfeiture
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: 'Following expiration of the period of time provided in section 5313.05 of
    the Revised Code, forfeiture of the interest of a vendee in default under a land
    installment contract shall be initiated by the vendor or by his successor in interest,
    by serving or causing to be served on the vendee or his successor in interest,
    if known to the vendor or his successor in interest, a written notice which:

    (A) Reasonably identifies the contract and describes the property covered by it;

    (B) Specifies the terms and conditions of the contract which have not been complied
    with;

    (C) Notifies the vendee that the contract will stand forfeited unless the vendee
    performs the terms and conditions of the contract within ten days of the completed
    service of notice and notifies the vendee to leave the premises.

    Such notice shall be served by the vendor or his successor in interest by handing
    a written copy of the notice to the vendee or his successor in interest in person,
    or by leaving it at his usual place of abode or at the property which is the subject
    of the contract or by registered or certified mail by mailing to the last known
    address of the vendee or his successor in interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.06
- number: '5313.07'
  heading: Proceeding for foreclosure and judicial sale
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: 'If the vendee of a land installment contract has paid in accordance with
    the terms of the contract for a period of five years or more from the date of
    the first payment or has paid toward the purchase price a total sum equal to or
    in excess of twenty per cent thereof, the vendor may recover possession of his
    property only by use of a proceeding for foreclosure and judicial sale of the
    foreclosed property as provided in section 2323.07 of the Revised Code. Such action
    may be commenced after expiration of the period of time prescribed by sections
    5313.05 and 5313.06 of the Revised Code. In such an action, as between the vendor
    and vendee, the vendor shall be entitled to proceeds of the sale up to and including
    the unpaid balance due on the land installment contract.

    Chapter 5313. of the Revised Code does not prevent the vendor or vendee of a land
    installment contract from commencing a quiet title action to establish the validity
    of his claim to the property conveyed under a land installment contract nor from
    bringing an action for unpaid installments.

    Chapter 5313. of the Revised Code does not prevent the vendor and vendee from
    cancelling their interest in a land installment contract under section 5301.331
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.07
- number: '5313.08'
  heading: Action for forfeiture and restitution
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: If the contract has been in effect for less than five years, in addition to
    any other remedies provided by law and after the expiration of the periods prescribed
    by sections 5313.05 and 5313.06 of the Revised Code, if the vendee is still in
    default of any payment the vendor may bring an action for forfeiture of the vendee's
    rights in the land installment contract and for restitution of his property under
    Chapter 1923. of the Revised Code. When bringing the action under Chapter 1923.
    of the Revised Code, the vendor complies with the notice requirement of division
    (A) of section 1923.04 of the Revised Code by serving notice pursuant to section
    5313.06 of the Revised Code. The court may also grant any other claim arising
    out of the contract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.08
- number: '5313.09'
  heading: Instrument of cancellation of land contract
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: '(A) A judgment for the vendor shall operate to cancel the land installment
    contract as of a date to be specified by the court. The clerk of the county or
    municipal court in which such judgment is rendered shall transmit an authenticated
    copy of such dated judgment to the county recorder of the county in which the
    property is located.

    The county recorder of such county shall record such authenticated judgment as
    an instrument of cancellation under section 5301.331 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.09
- number: '5313.10'
  heading: Terminating land installment contract is exclusive remedy
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: The election of the vendor to terminate the land installment contract by an
    action under section 5313.07 or 5313.08 of the Revised Code is an exclusive remedy
    which bars further action on the contract unless the vendee has paid an amount
    less than the fair rental value plus deterioration or destruction of the property
    occasioned by the vendee's use. In such case the vendor may recover the difference
    between the amount paid by the vendee on the contract and the fair rental value
    of the property plus an amount for the deterioration or destruction of the property
    occasioned by the vendee's use.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.10
- number: '5315.01'
  heading: Definitions; creation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5315'
    name: D.o.l.l.a.r. Deed Program
  text: '(A) As used in this chapter :

    (1) "Borrower" means the person who receives a l oan from a lender secured by
    a mortgage on real property to which the borrower holds legal title and who is
    an applicant of the D.O.L.L.A.R. deed program. "Borrower" includes the original
    borrower''s successor in interest.

    (2) "D.O.L.L.A.R. d eed in lieu of foreclosure" means a transaction in which a
    borrower, after default on a loan s ecured by a mortgage on real property, conveys
    to the l ender by deed that satisfies t he minimum requirements of section 5302.11
    of the Revised Code, title to the real property pledged as security for the r
    elated note of indebtedness.

    (3) "Home affordable modification program" means the home affordable modification
    program established by the United States departments of the treasury and housing
    and urban development pursuant to 12 U.S.C. 5219.

    (4) "Lender" means the mortgagee and holder of t he note secured by the mortgage
    or an agent on behalf of the holder of the note, regardless of whether the holder
    of the note is the original mortgagee. "Lender" includes the person entitled to
    enforce the instrument secured by the mortgage under division (A)(1) or (2) of
    section 1303.31 of the Revised Code or a mortgagee with the right to enforce the
    obligation secured by the mortgage pursuant to law outside of Chapter 1303. of
    the Revised Code.

    (5) "Mortgage" means the instrument securing an obligation to pay a sum of money
    evidenced by a note of indebtedness and secured by a lien on the borrower''s real
    property.

    (6) " Note" or " note of i ndebtedness" means an obligation to pay a sum of money
    secured by a mortgage on b orrower''s real property.

    (B) There is hereby created the D.O.L.L.A.R. deed program. The program shall provide
    a loss mitigation alternative for borrowers who are in default on a mortgage encumbering
    real property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5315.01
- number: '5315.02'
  heading: Rules
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5315'
    name: D.o.l.l.a.r. Deed Program
  text: 'To assist in the establishment of the D.O.L.L.A.R. deed program, the Ohio
    housing finance agency shall adopt in rule all of the following:

    (A) A model form by which a person may apply to participate in the program;

    (B) A model for the deed, which act shall as the deed in lieu of foreclosure described
    in division (A)(1) of section 5315.04 of the Revised Code;

    (C) A model for the lease with option to purchase agreement described in divisions
    (A)(2) and (3) of section 5315.04 of the Revised Code;

    (D) Any other rules necessary to implement this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5315.02
- number: '5315.03'
  heading: Application; qualifications; participation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5315'
    name: D.o.l.l.a.r. Deed Program
  text: '(A) An applicant to the D.O.L.L.A.R. deed program shall submit both of the
    following to the loss mitigation department of the lender of the mortgage that
    is in default:

    (1) An application form as set forth in section 5315.02 of the Revised Code;

    (2) A request for modification and affidavit form developed under the home affordable
    modification program.

    (B) To qualify for the program, all of the following shall apply:

    (1) The applicant need not be eligible for another mortgage loss mitigation alternative
    or program.

    (2) The applicant''s front-end and back-end debt-to-income ratios must fall below
    the current ratios set for the home affordable modification program at the time
    the application is submitted to the lender.

    (3) The applicant must occupy the residence.

    (C) The lender shall respond to the applicant in writing not later than thirty
    days after the date the lender receives all application documents.

    (D) The lender is not required to participate in the program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5315.03
- number: '5315.04'
  heading: Execution of deed in lieu of foreclosure; documents
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5315'
    name: D.o.l.l.a.r. Deed Program
  text: '(A) If a lender approves a borrower applicant to the D.O.L.L.A.R. deed program,
    the borrower and lender shall execute all of the following:

    (1) A deed in lieu of foreclosure that transfers to the lender all of the borrower''s
    right, title, and interest in and to the real property that is the subject of
    the mortgage. The deed in lieu of foreclosure shall be an absolute conveyance
    and, upon delivery of the executed deed in lieu of foreclosure to the lender,
    the borrower conveys all of its right, title, and interest in the real property
    and rights associated therewith including, but not limited to, any equity and
    right of redemption.

    (2) A notarized estoppel affidavit, which shall be included in the deed, that
    shall affirm all of the following:

    (a) That the mortgage and title to the real property are not merged;

    (b) That the lender retains its lien position and its right to foreclose on any
    junior lienholders after the transfer;

    (c) That the transfer by deed in lieu of foreclosure is an absolute conveyance
    of title to the real property, free and clear of any rights or claim of redemption;

    (d) That the transfer is the free act and will of the borrower;

    (e) That the transfer is not made under duress or coercion;

    (f) That the transfer is made for valuable consideration in the form of the lease
    with option to purchase contract granted by the lender to purchase the real property
    as further defined in this section.

    (3) A lease with option to purchase agreement, which shall be the consideration
    for the borrower applicant''s deed in lieu of foreclosure, whereby the former
    lender leases to the former borrower the real property that is the subject of
    the mortgage in default;

    (a) The lease with option to purchase agreement term shall be for the shorter
    of the period of time necessary for the former borrower to be approved for financing
    or other mortgage assistance by the federal housing administration or two years
    from the date of the lease with option to purchase agreement.

    (b) The rent shall be on a monthly basis and shall be one-twelfth of an amount
    that shall be not less than the sum of all of the following annualized items with
    respect to the real property:

    (i) Real property taxes;

    (ii) Homeowner''s insurance premiums for homeowner''s insurance, which shall reflect
    the market rate for homeowner''s insurance based on the market value of the real
    property;

    (iii) Any homeowner''s association or condominium dues.

    (c) The option to purchase contained within the lease shall allow the former borrower
    the opportunity to purchase the real property that is the subject of the mortgage
    and the lease with option to purchase agreement at a specified price until the
    termination of the lease described in this section.

    (B) The documents required under division (A) of this section shall be provided
    to the borrower at least ten business days before the documents are signed by
    both parties.

    (C) If the former borrower does not exercise the option to purchase the real property
    within the time permitted under the lease with option to purchase agreement, the
    right to purchase terminates. The lease with option to purchase may be renewed
    by mutual written agreement between the former borrower and former lender, but
    such renewal is not effective until it is recorded.

    (D) If a borrower conveys to a lender a deed of the type described in division
    (A)(1) of this section, and the former borrower and former lender enter into a
    lease with option to purchase agreement of the type described in divisions (A)(2)
    and (3) of this section, the lender''s mortgage is not extinguished and does not
    merge with the former borrower''s interest conveyed.

    (E) All of the following documents relating to the D.O.L.L.A.R. deed program entered
    into under sections 5315.01 to 5315.05 of the Revised Code shall be recorded in
    the real property records of the office of the county recorder of the county in
    which the subject real property is located:

    (1) A deed in lieu of foreclosure;

    (2) A lease with option to purchase agreement;

    (3) The renewal of a lease with option to purchase aggreement;

    (4) The termination of a lease with option to purchase agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5315.04
- number: '5315.05'
  heading: Parties to lease with option to purchase agreement
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5315'
    name: D.o.l.l.a.r. Deed Program
  text: '(A) A former borrower and a former lender who are party to a lease with option
    to purchase agreement under divisions (A)(2) and (3) of section 5315.04 of the
    Revised Code are governed by Chapter 5321. of the Revised Code.

    (1) The former borrower-lessee is responsible for all of the obligations of a
    tenant under section 5321.05 of the Revised Code as well as the duties under divisions
    (A)(1) to (6) of section 5321.04 of the Revised Code.

    (2) Divisions (A)(1) to (6) of section 5321.04 of the Revised Code do not apply
    to a lender-lessor participating in the D.O.L.L.A.R. deed program in accordance
    with this chapter.

    (B) A former borrower-lessee who defaults or otherwise fails to meet the terms
    of a lease with option to purchase agreement executed pursuant to this chapter
    forfeits the former borrower-lessee''s right to purchase the real property under
    division (B) of section 5315.04 of the Revised Code and has no further right of
    possession or occupancy and shall be subject to a forcible entry and detainer
    action under section 5321.03 and Chapter 1923. of the Revised Code.'
