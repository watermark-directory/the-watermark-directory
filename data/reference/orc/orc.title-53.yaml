- number: '5301.15'
  heading: Governor may execute new deed to supply lost conveyance
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'When a deed executed for land purchase from the state is lost or destroyed,
    or when a person who has an interest in such land, by the use of diligence cannot
    find it, and no record exists from which a certified copy can be made to supply
    the evidence of such deed, or when a certificate of the purchase of land sold
    at a land office of this state, or any other contract, bond, or memorandum evidencing
    a purchase of land has been lost or destroyed, or when from any cause the owner
    of such land, by the use of diligence, cannot find such certificate, contract,
    bond, or memorandum, the governor, when satisfied that the original purchase money
    for such land has been fully paid, shall execute a deed therefor in the name of
    the original purchaser which must recite the facts authorizing its making. Such
    deed shall be recorded in the office of the director of administrative services
    who shall transmit it to the present claimant.

    Such deed has the same effect as the original deed, had it been preserved and
    recorded, or as a deed would have had, made to the original purchaser upon the
    date of the full payment of the purchase money.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.15
- number: '5301.16'
  heading: Execution of conveyance by state when purchaser dies before deed made
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: When the purchaser of land from the state dies before a deed is made, and
    the lands pass to another by descent or devise, and the title still remains in
    him, or when the person to whom the lands have so passed has conveyed them or
    his interest therein to another person, by deed of general warranty or quitclaim,
    upon the proof of such facts being made to him and the attorney general, the governor
    shall execute the deed directly to the person entitled to the lands, although
    such person derives his title through one or more successive conveyances from
    the person to whom the lands passed by descent or devise.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.16
- number: '5301.17'
  heading: New deed from state to correct errors
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: When, from satisfactory evidence, it appears to the governor and attorney
    general that an error has occurred in a deed executed and delivered in the name
    of the state, or in the certificate of any public officer, upon which, if correct,
    a conveyance would be required from the state, the governor shall correct such
    error by the execution of a correct title deed, according to the intent and object
    of the original purchase or conveyance, to the party entitled to it, his heirs,
    or legal assigns, and take from such party a release to the state of the property
    erroneously conveyed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.17
