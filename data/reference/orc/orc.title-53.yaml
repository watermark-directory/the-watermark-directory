- number: '5321.051'
  heading: Eviction of tenant allowing sex or child victim offenders to occupy premises
    near school, child care facility
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A)(1) No tenant of any residential premises located within one thousand
    feet of any school premises, preschool or child care center premises, children''s
    crisis care facility premises, or residential infant care center premises shall
    allow any person to occupy those residential premises if both of the following
    apply regarding the person:

    (a) The person''s name appears on the state registry of sex offenders and child-victim
    offenders maintained under section 2950.13 of the Revised Code.

    (b) The state registry of sex offenders and child-victim offenders indicates that
    the person was convicted of or pleaded guilty to either a sexually oriented offense
    that is not a registration-exempt sexually oriented offense or a child-victim
    oriented offense in a criminal prosecution and was not sentenced to a serious
    youthful offender dispositional sentence for that offense.

    (2) If a tenant allows occupancy in violation of this section or a person establishes
    a residence or occupies residential premises in violation of section 2950.034
    of the Revised Code, the landlord for the residential premises that are the subject
    of the rental agreement or other tenancy may terminate the rental agreement or
    other tenancy of the tenant and all other occupants.

    (B) If a landlord is authorized to terminate a rental agreement or other tenancy
    pursuant to division (A) of this section but does not so terminate the rental
    agreement or other tenancy, the landlord is not liable in a tort or other civil
    action in damages for any injury, death, or loss to person or property that allegedly
    results from that decision.

    (C) As used in this section, "children''s crisis care facility premises" and "residential
    infant care center premises" have the same meanings as in section 2950.034 of
    the Revised Code.'
