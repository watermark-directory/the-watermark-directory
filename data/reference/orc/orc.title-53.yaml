- number: '5321.18'
  heading: Written rental agreement for residential premises provisions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) Every written rental agreement for residential premises shall contain
    the name and address of the owner and the name and address of the owner''s agent,
    if any. If the owner or the owner''s agent is a corporation, partnership, limited
    partnership, association, trust, or other entity, the address shall be the principal
    place of business in the county in which the residential property is situated
    or if there is no place of business in such county then its principal place of
    business in this state, and shall include the name of the person in charge thereof.

    (B) If the rental agreement is oral, the landlord, at the commencement of the
    term of occupancy, shall deliver to tenant a written notice containing the information
    required in division (A) of this section.

    (C) If the landlord fails to provide the notice of the name and address of the
    owner and owner''s agent, if any, required under division (A) or (B) of this section,
    the notices to the landlord required under division (A) of section 5321.07 and
    division (A) of section 5321.08 of the Revised Code shall be waived by the landlord
    and his agent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.18
- number: '5321.19'
  heading: Effect of chapter on political subdivisions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) Except as provided in division (B) of this section, no political subdivision
    may enact, adopt, renew, maintain, enforce, or continue in existence any charter
    provision, ordinance, resolution, rule, or other measure that is in conflict with
    this chapter, or that regulates the rights and obligations of parties to a rental
    agreement that are regulated by this chapter, including, without limitation, by
    any way imposing or requiring rent control or rent stabilization.

    (B) This chapter does not preempt any of the following:

    (1) Housing, building, health, or safety code, or any ordinance as described in
    division (A)(9) of section 5321.04 of the Revised Code, of any political subdivision;

    (2) Charter provision, ordinance, resolution, rule, or other measure of a political
    subdivision that regulates, or has the effect of regulating in any way, rent charged
    or paid for the use of residential premises that such political subdivision owns
    or operates;

    (3) A political subdivision from adopting any charter provision, ordinance, resolution,
    rule, or other measure to implement a plan to use voluntary incentives or agreements
    that regulates, or has the effect of regulating in any way, rent charged or paid
    for the use of residential premises so long as such regulating is related to voluntary
    incentives or agreements to increase or maintain the supply or improve the quality
    of available residential premises, including, without limitation, incentives authorized
    by federal law, the incentives set forth in sections 3735.65 to 3735.70 of the
    Revised Code, tax abatements, tax credit financing, bond or other financing, or
    loans or grants from the political subdivision.'
