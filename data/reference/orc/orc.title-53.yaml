- number: '5302.02'
  heading: Rules and definitions applicable to all instruments relating to real estate
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: The rules and definitions contained in sections 5302.03, 5302.04, 5302.06,
    5302.08, 5302.10, 5302.13, 5302.17, 5302.18, 5302.19, 5302.20, and 5302.21 of
    the Revised Code apply to all deeds or other instruments relating to real estate,
    whether the statutory forms or other forms are used, where the instruments are
    executed on or after October 1, 1965. The rules and definitions contained in section
    5302.22 of the Revised Code, as it existed prior to the effective date of this
    amendment, apply to instruments executed on or after August 29, 2000, and prior
    to the effective date of this amendment. The rules and definitions contained in
    section 5302.22 of the Revised Code apply to instruments executed on or after
    the effective date of this amendment.
  history: null
