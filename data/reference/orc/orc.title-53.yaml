- number: '5321.10'
  heading: Release of part of rent
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) If a landlord brings an action for the release of rent deposited with
    a clerk of court, the court may, during the pendency of the action, upon application
    of the landlord, release part of the rent on deposit for payment of the periodic
    interest on a mortgage on the premises, the periodic principal payments on a mortgage
    on the premises, the insurance premiums for the premises, real estate taxes on
    the premises, utility services, repairs, and other customary and usual costs of
    operating the premises as a rental unit.

    (B) In determining whether to release rent for the payments described in division
    (A) of this section, the court shall consider the amount of rent the landlord
    receives from other rental units in the buildings of which the residential premises
    are a part, the cost of operating those units, and the costs which may be required
    to remedy the condition contained in the notice given pursuant to division (A)
    of section 5321.07 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.10
- number: '5321.11'
  heading: Failure of tenant to fulfill obligations - remedies of landlord
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: If the tenant fails to fulfill any obligation imposed upon him by section
    5321.05 of the Revised Code that materially affects health and safety, other than
    the obligation described in division (A)(9) of that section, the landlord may
    deliver a written notice of this fact to the tenant specifying the act or omission
    that constitutes noncompliance with the pertinent obligations and specifying that
    the rental agreement will terminate upon a date specified in the notice, not less
    than thirty days after receipt of the notice. If the tenant fails to remedy the
    condition specified in the notice, the rental agreement shall terminate as provided
    in the notice.
