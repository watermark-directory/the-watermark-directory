- number: '5301.75'
  heading: Unfair service agreement definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'As used in sections 5301.75 to 5301.78 of the Revised Code:

    (A) "Consumer" means an individual that receives services from a service provider.

    (B) "Major home system" includes plumbing, heating, ventilation, air conditioning,
    and electrical wiring.

    (C) "Residential real estate" means real property located in this state that is
    used primarily for personal, family, or household purposes and is improved by
    one to four dwelling units.

    (D) "Service agreement" means a contract under which a person agrees to provide
    services in connection with the maintenance, purchase, or sale of residential
    real estate.

    (E) "Service provider" means a person that provides services to another person.

    (F) "Unfair service agreement" means an agreement that is void and unenforceable
    under division (B) of section 5301.76 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.75
- number: '5301.76'
  heading: Unfair service agreement prohibited, void, and unenforceable; exemptions;
    enforcement
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) Subject to division (C) of this section, on and after the effective date
    of this section, no service provider shall enter into, amend, or renew a service
    agreement with a consumer if both of the following apply:

    (1) The service subject to the agreement is not to be performed within one year
    after the date the parties enter into the agreement.

    (2) The service agreement has any of the following characteristics:

    (a) The service agreement purports to run with the land or to be binding on future
    owners of interests in the residential real estate.

    (b) The service agreement allows for assignment of the right to provide the service
    subject to the agreement without notice to and consent of the owner of the residential
    real estate.

    (c) The service agreement purports to create a lien, encumbrance, or other security
    interest in the residential real estate.

    (B) Subject to division (C) of this section, an unfair service agreement described
    under division (A) of this section that is entered into, amended, or renewed on
    or after the effective date of this section is void and unenforceable.

    (C) Sections 5301.75 to 5301.78 of the Revised Code do not apply to any of the
    following:

    (1) A home warranty or similar product that covers the cost of maintenance of
    a major home system for a fixed period;

    (2) An insurance contract;

    (3) An option to purchase or right of refusal;

    (4) A declaration created in the formation of a planned community, as defined
    in section 5312.01 of the Revised Code, or a condominium development, as defined
    in section 5311.01 of the Revised Code, or any amendment to such a declaration;

    (5) A maintenance or repair agreement entered by an owners association, as defined
    by section 5312.01 of the Revised Code, or a unit owners association, as defined
    by section 5311.01 of the Revised Code;

    (6) A mortgage loan or a commitment to make or receive a mortgage loan;

    (7) A security agreement made pursuant to Chapter 1309. or 1310. of the Revised
    Code relating to the sale or rental of personal property or fixtures;

    (8) Water, sewer, electrical, telephone, cable, or other regulated utility service
    providers.

    (D) A violation of division (A) of this section is an unfair and deceptive act
    or practice in violation of section 1345.02 of the Revised Code. All powers and
    remedies available to the attorney general to enforce sections 1345.01 to 1345.13
    of the Revised Code are available to the attorney general to enforce this section.

    (E) Nothing in this section shall be construed to interfere with any provision
    of Chapter 1311. of the Revised Code concerning mechanics'' liens.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.76
- number: '5301.77'
  heading: Unfair service agreement recording prohibited
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) No person shall record or cause to be recorded in this state an unfair
    service agreement or a notice or memorandum of an unfair service agreement.

    (B) A county recorder shall not accept for recording an unfair service agreement
    or a notice or memorandum of an unfair service agreement.

    (C) If an unfair service agreement or a notice or memorandum of an unfair service
    agreement is recorded in violation of this section, it does not provide actual
    or constructive notice against an otherwise bona fide purchaser of the residential
    real estate or any other individual or entity that may obtain an interest in the
    residential real estate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.77
- number: '5301.78'
  heading: Unfair service agreement civil action
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A)(1) If an unfair service agreement or a notice or memorandum of an unfair
    service agreement is recorded in this state in violation of section 5301.77 of
    the Revised Code, any party with an interest in the residential real estate that
    is the subject of that agreement may commence a civil action in a court of competent
    jurisdiction in the county in which the agreement, notice, or memorandum is recorded.

    (2) If the court determines that the recorded instrument is an unfair service
    agreement or a notice or memorandum of an unfair service agreement, the court
    shall do both of the following:

    (a) Issue a judgment declaring the service agreement, notice, or memorandum to
    be unenforceable;

    (b) Award to any party with an interest in the residential real estate that is
    the subject of that agreement all of the following:

    (i) Actual economic damages;

    (ii) Court costs and fees;

    (iii) Reasonable attorney''s fees.

    (B) When an unfair service agreement or notice or memorandum of an unfair service
    agreement is declared unenforceable by a judgment under division (A)(2)(a) of
    this section, any party with an interest in the residential real estate may obtain
    a certified copy of the judgment declaring the service agreement, notice, or memorandum
    to be unenforceable and present the certified copy of the judgment to the county
    recorder''s office for recording within the chain of title to the property.'
