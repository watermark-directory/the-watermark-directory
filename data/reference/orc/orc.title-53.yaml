  url: https://codes.ohio.gov/ohio-revised-code/section-5312.01
- number: '5312.02'
  heading: Applicability of chapter; establishment of planned community
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A) Any planned community in this state is subject to this chapter. No person
    shall establish a planned community unless that person files and records a declaration
    and bylaws for that planned community in the office of the recorder of the county
    or counties in which the planned community is located.

    (B) Any declaration for a planned community shall be accompanied by bylaws that
    provide for the operation of the planned community. Except as provided in division
    (A)(1) of section 5312.03 of the Revised Code, the declaration and bylaws shall
    provide for all of the following:

    (1) The election of the board of directors of the owners association;

    (2) The number of persons constituting the board;

    (3) The terms of the directors, with not less than one-fifth to expire annually;

    (4) The powers and duties of the board;

    (5) The method of removal of directors from office;

    (6) Whether the services of a manager or managing agent may be engaged;

    (7) The method of amending the declaration and bylaws;

    (8) The time and place for holding meetings and the manner of and authority for
    calling meetings, conducting meetings, and giving notice of meetings, which notice
    may be sent by electronic mail, provided the association has received the prior,
    written authorization from the owner;

    (9) The common expenses for which assessments may be made and the manner of collecting
    from the owners their respective shares of the common expenses;

    (10) Any other matters the original declarant or the owners association deem necessary
    and appropriate.

    (C) Nothing in this chapter invalidates any provision of a document that governs
    a planned community if that provision was in the document at the time the document
    was recorded and the document was recorded prior to the original effective date
    of this chapter, September 10, 2010.

    (D)(1) The board of directors of the owners association of any planned community
    that is in existence on the original effective date of this chapter, September
    10, 2010, shall file and record the bylaws of that planned community that are
    in effect on that effective date in the office of the recorder of the county or
    counties in which the planned community is located within one hundred eighty days
    after that effective date.

    (2) The board of directors of the owners association of any planned community
    that is in existence on the original effective date of this chapter, September
    10, 2010, shall file and record the bylaws that are adopted by the owners association
    on or after that effective date in the office of the recorder of the county or
    counties in which the planned community is located within ninety days after the
    date of adoption of the bylaws.

    (3) The board of directors of the owners association of any planned community
    that adopts an amendment to the bylaws of that planned community shall file and
    record the amendment in the office of the recorder of the county or counties in
    which the planned community is located within sixty days after the date of adoption
    of the amendment.

    (4) Nothing in division (D)(1) or (2) of this section shall require the board
    of directors or owners association of any planned community that is in existence
    on the original effective date of this chapter, September 10, 2010, to adopt bylaws
    of that planned community.

    (5) No board of directors of the owners association of a planned community that
    is in existence on the original effective date of this chapter, September 10,
    2010, shall pursue any civil action against any person based upon any provision
    of the bylaws of that planned community or upon any amendments to the bylaws until
    the bylaws or amendments are filed and recorded under division (D)(1), (2), or
    (3) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.02
- number: '5312.03'
  heading: Administration; owners association; board of directors
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A)(1) An owners association shall administer a planned community, and a
    board of directors the owners elect from among the owners and their spouses shall
    exercise all power and authority of the owners association. If an owner is not
    an individual, any principal, member of a limited liability company, partner,
    director, officer, trustee, or employee of the owner may be elected to the board.
    The majority of the board shall not consist of owners or representatives from
    the same lot unless authorized by a resolution adopted by the board of directors
    prior to the board majority being comprised of owners or representatives from
    the same lot.

    (2) Unless otherwise provided, a board of directors may carry out any action this
    chapter requires or allows an owners association to take, subject to any vote
    required of the owners.

    (B) A declarant shall establish an owners association not later than the date
    upon which the first lot in the planned community is conveyed to a bona fide purchaser
    for value. The owners association shall be organized as a nonprofit corporation
    pursuant to Chapter 1702. of the Revised Code.

    (C)(1) If provided in the declaration, a declarant may control the owners association
    for the period of time the declaration specifies. During the time of declarant
    control, the declarant or the declarant''s designee may appoint and remove the
    members of the board. The period of declarant control shall terminate not later
    than the time at which all of the lots have been transferred to owners.

    (2) Not later than the termination of any period of declarant control, the owners
    shall elect a board of directors comprised of the number of members the declaration
    or bylaws specify.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.03
- number: '5312.04'
  heading: Election of officers; powers; meetings
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A) A board of directors of an owners association shall elect officers from
    the members of the board, to include a president, secretary, treasurer, and other
    officers as the board designates.

    (B) A board may act in all instances on behalf of an association unless otherwise
    provided in this chapter, the declaration, or bylaws. The board may appoint persons
    to fill vacancies in its membership for the unexpired portion of any term.

    (C) Except during a period of declarant control, the board shall call a meeting
    of the owners association at least once each year. Special meetings may be called
    by the president, a majority of the board, owners representing fifty per cent
    of the voting power in the owners association, or any lower share of the voting
    power as the declaration or bylaws specify.

    (D) The board may hold a meeting by any method of communication, including electronic
    or telephonic communication, provided that each member of the board can hear or
    read in real time and participate and respond to every other member of the board.

    (E) In lieu of conducting a meeting, the board may take an action with the unanimous
    written consent of the members of the board. Any written consent shall be filed
    with the minutes of the meetings of the board.

    (F) No owner other than a director may attend or participate in any discussion
    or deliberation of a meeting of the board of directors unless the board expressly
    authorizes that owner to attend or participate.

    (G) The board of directors of an owners association shall comply with all applicable
    state and federal laws concerning prohibitions against discrimination on the basis
    of race, color, religion, sex, military status, national origin, disability, age,
    or ancestry, including, but not limited to, Chapter 4112. of the Revised Code.
    No private right of action additional to those conferred by the applicable state
    and federal anti-discrimination laws is conferred on any aggrieved individual
    by the preceding sentence.'
