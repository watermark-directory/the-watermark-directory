- number: '5321.07'
  heading: Failure of landlord to fulfill obligations - remedies of tenant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) If a landlord fails to fulfill any obligation imposed upon him by section
    5321.04 of the Revised Code, other than the obligation specified in division (A)(9)
    of that section, or any obligation imposed upon him by the rental agreement, if
    the conditions of the residential premises are such that the tenant reasonably
    believes that a landlord has failed to fulfill any such obligations, or if a governmental
    agency has found that the premises are not in compliance with building, housing,
    health, or safety codes that apply to any condition of the premises that could
    materially affect the health and safety of an occupant, the tenant may give notice
    in writing to the landlord, specifying the acts, omissions, or code violations
    that constitute noncompliance. The notice shall be sent to the person or place
    where rent is normally paid.

    (B) If a landlord receives the notice described in division (A) of this section
    and after receipt of the notice fails to remedy the condition within a reasonable
    time considering the severity of the condition and the time necessary to remedy
    it, or within thirty days, whichever is sooner, and if the tenant is current in
    rent payments due under the rental agreement, the tenant may do one of the following:

    (1) Deposit all rent that is due and thereafter becomes due the landlord with
    the clerk of the municipal or county court having jurisdiction in the territory
    in which the residential premises are located;

    (2) Apply to the court for an order directing the landlord to remedy the condition.
    As part of the application, the tenant may deposit rent pursuant to division (B)(1)
    of this section, may apply for an order reducing the periodic rent due the landlord
    until the landlord remedies the condition, and may apply for an order to use the
    rent deposited to remedy the condition. In any order issued pursuant to this division,
    the court may require the tenant to deposit rent with the clerk of court as provided
    in division (B)(1) of this section.

    (3) Terminate the rental agreement.

    (C) This section does not apply to any landlord who is a party to rental agreements
    that cover three or fewer dwelling units and who provides notice of that fact
    in a written rental agreement or, in the case of an oral tenancy, delivers written
    notice of that fact to the tenant at the time of initial occupancy by the tenant.

    (D) This section does not apply to a dwelling unit occupied by a student tenant.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.07
- number: '5321.08'
  heading: Rent deposits - duty of clerk of court
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) Whenever a tenant deposits rent with the clerk of a court as provided
    in section 5321.07 of the Revised Code, the clerk shall give written notice of
    this fact to the landlord and to his agent, if any.

    (B) The clerk shall place all rent deposited with him in a separate rent escrow
    account in the name of the clerk in a bank or building and loan association domiciled
    in this state.

    (C) The clerk shall keep in a separate docket an account of each deposit, with
    the name and address of the tenant, and the name and address of the landlord and
    of his agent, if any.

    (D) For his costs, the clerk may charge a fee of one per cent of the amount of
    the rent deposited, which shall be assessed as court costs.

    (E) All interest that has accrued on the rent deposited by the clerk of a county
    court under division (B) of this section shall be paid into the treasury of the
    political subdivision for which the clerk performs his duties. All interest that
    has accrued on the rent deposited by the clerk of a municipal court under division
    (B) of this section shall be paid into the city treasury as defined in division
    (B) of section 1901.03 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.08
- number: '5321.09'
  heading: Landlord application for release of rent
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5321'
    name: Landlords And Tenants
  text: '(A) A landlord who receives notice that rent due him has been deposited with
    a clerk of a municipal or county court pursuant to section 5321.07 of the Revised
    Code, may do any of the following:

    (1) Apply to the clerk of the court for release of the rent on the ground that
    the condition contained in the notice given pursuant to division (A) of section
    5321.07 of the Revised Code has been remedied. The clerk shall forthwith release
    the rent, less costs, to the landlord if the tenant gives written notice to the
    clerk that the condition has been remedied.

    (2) Apply to the court for release of the rent on the ground that the tenant did
    not comply with the notice requirement of division (A) of section 5321.07 of the
    Revised Code, or that the tenant was not current in rent payments due under the
    rental agreement at the time the tenant initiated rent deposits with the clerk
    of the court under division (B)(1) of section 5321.07 of the Revised Code.

    (3) Apply to the court for release of the rent on the ground that there was no
    violation of any obligation imposed upon the landlord by section 5321.04 of the
    Revised Code, other than the obligation specified in division (A)(9) of that section,
    any obligation imposed upon him by the rental agreement, or any obligation imposed
    upon him by any building, housing, health, or safety code, or that the condition
    contained in the notice given pursuant to division (A) of section 5321.07 of the
    Revised Code has been remedied.

    (B) The tenant shall be named as a party to any action filed by the landlord under
    this section, and shall have the right to file an answer and counterclaim, as
    in other civil actions. A trial shall be held within sixty days of the date of
    the filing of the landlord''s complaint, unless, for good cause shown, the court
    continues the period for trial.

    (C) If the court finds that there was no violation of any obligation imposed upon
    the landlord by section 5321.04 of the Revised Code, other than the obligation
    specified in division (A)(9) of that section, any obligation imposed upon him
    by the rental agreement, or any obligation imposed upon him by any building, housing,
    health, or safety code, that the condition contained in the notice given pursuant
    to division (A) of section 5321.07 of the Revised Code has been remedied, that
    the tenant did not comply with the notice requirement of division (A) of section
    5321.07 of the Revised Code, or that the tenant was not current in rent payments
    at the time the tenant initiated rent deposits with the clerk of court under division
    (B)(1) of section 5321.07 of the Revised Code, the court shall order the release
    to the landlord of rent on deposit with the clerk, less costs.

    (D) If the court finds that the condition contained in the notice given pursuant
    to division (A) of section 5321.07 of the Revised Code was the result of an act
    or omission of the tenant, or that the tenant intentionally acted in bad faith
    in proceeding under section 5321.07 of the Revised Code, the tenant shall be liable
    for damages caused to the landlord and costs, together with reasonable attorney''s
    fees if the tenant intentionally acted in bad faith.'
  history: null
