- number: '5302.03'
  heading: Use of word grant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: In a conveyance of real estate or any interest therein, the word "grant" is
    a sufficient word of conveyance without the use of more words. No covenant shall
    be implied from the use of the word "grant."
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5302.03
- number: '5302.04'
  heading: All interest conveyed unless otherwise stated in instrument
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: In a conveyance of real estate or any interest therein, all rights, easements,
    privileges, and appurtenances belonging to the granted estate shall be included
    in the conveyance, unless the contrary is stated in the deed, and it is unnecessary
    to enumerate or mention them either generally or specifically.
