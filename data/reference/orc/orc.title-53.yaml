  url: https://codes.ohio.gov/ohio-revised-code/section-5301.231
- number: '5301.232'
  heading: Open-end mortgages
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) Whether or not it secures any other debt or obligation, a mortgage may
    secure unpaid balances of loan advances made after the mortgage is delivered to
    the recorder for record, to the extent that the total unpaid loan indebtedness,
    exclusive of interest thereon, does not exceed the maximum amount of loan indebtedness
    which the mortgage states may be outstanding at any time. With respect to such
    unpaid balances, division (B) of this section is applicable if the mortgage states,
    in substance or effect, that the parties thereto intend that the mortgage shall
    secure the same, the maximum amount of unpaid loan indebtedness, exclusive of
    interest thereon, which may be outstanding at any time, and contains at the beginning
    thereof the words "OPEN-END MORTGAGE."

    (B) A mortgage complying with division (A) of this section and securing unpaid
    balances of loan advances referred to in such division is a lien on the premises
    described therein from the time such mortgage is delivered to the recorder for
    record for the full amount of the total unpaid loan indebtedness, including the
    unpaid balances of such advances that are made under such mortgage, plus interest
    thereon, regardless of the time when such advances are made. If such an advance
    is made after the holder of the mortgage receives written notice of a lien or
    encumbrance on the mortgaged premises which is subordinate to the lien of the
    mortgage, and if such holder is not obligated to make such advance at the time
    such notice is received, then the lien of the mortgage for the unpaid balance
    of the advance so made is subordinate to such lien or encumbrance. If an advance
    is made after the holder of the mortgage receives written notice of work or labor
    performed or to be performed or machinery, material, or fuel furnished or to be
    furnished for the construction, alteration, repair, improvement, enhancement,
    or embellishment of any part of the mortgaged premises and if such holder is not
    obligated to make such advance at the time such notice is received, then the lien
    of the mortgage for the unpaid balance of the advance so made is subordinate to
    a valid mechanic''s lien for the work or labor actually performed or machinery,
    material, or fuel actually furnished as specified in such notice.

    (C) The mortgagor may limit the loan indebtedness secured by the mortgage to that
    in existence at the time of the delivery of a written notice to that effect to
    the recorder for record, if such notice is executed by the mortgagor in the manner
    provided in section 5301.01 of the Revised Code, states the volume and initial
    page of the record or the recorder''s file number of the mortgage, and a copy
    thereof is served upon the holder of the mortgage prior to the delivery of such
    notice to the recorder for record. Any such notice shall be recorded and indexed
    by the recorder as an amendment of the mortgage. Such right of the mortgagor to
    limit loan indebtedness secured by the mortgage is not applicable to interest
    subsequently accruing on loan indebtedness, loan advances the holder of the mortgage
    is obligated to make, or loan advances made after the delivery of any such notice
    to the recorder for record in order to pay for the cost of completing any construction,
    alteration, repair, improvement, enhancement, or embellishment of any part of
    the mortgaged premises the financing of which, in whole or in part, the mortgage
    was given to secure.

    (D) The written notices provided for in division (B) of this section shall be
    signed by the holder of the lien or encumbrance or the person who has performed
    or intends to perform work or labor or who has furnished or intends to furnish
    machinery, material, or fuel, or by his agent or attorney, and shall set forth
    a description of the real property to which the notice relates, the date, parties
    to, the volume and initial page of the record or the recorder''s file number of
    the mortgage over which priority is claimed for the lien or encumbrance, and the
    amount and nature of the claim to which the lien or encumbrance relates or the
    nature of the work or labor performed or to be performed or machinery, material,
    or fuel furnished or to be furnished and the amount claimed or to be claimed therefor.
    The written notices provided for in divisions (B) and (C) of this section shall
    be deemed to have been received by or served upon the holder of the mortgage when
    delivered to such holder personally or by registered or certified mail at the
    address of such holder appearing in the mortgage or an assignment thereof or,
    if no address is so given, at the principal place of business or residence of
    such holder or the statutory agent of such holder within this state or, if such
    holder has no principal place of business or residence or a statutory agent within
    this state, when posted in some conspicuous place on the mortgaged premises.

    (E) As used in this section:

    (1) "Mortgage" includes a mortgage, deed of trust, or other instrument in the
    nature of a mortgage.

    (2) "Mortgagor" includes the mortgagor''s successors in interest as disclosed
    by the records of the recorder or recorders of the county or counties in which
    the mortgaged premises are situated.

    (3) "Holder of the mortgage" means the holder of the mortgage as disclosed by
    the records of the recorder or recorders of the county or counties in which the
    mortgaged premises are situated.

    (4) A holder of a mortgage is "obligated" to make an advance if such holder or
    the person to whom the repayment of such advance is owed has a contractual commitment
    to do so, even though the making of such advance may be conditioned upon the occurrence
    or existence, or the failure to occur or exist, of any event or fact.

    (5) "Statutory agent" means the statutory agent of a corporation as disclosed
    by the records of the secretary of state and provided for in sections 1701.07,
    1702.06, and 1703.041 of the Revised Code.

    (6) "Loan indebtedness" does not include unpaid balances of advances made for
    the payment of taxes, assessments, insurance premiums, and costs incurred for
    the protection of the mortgaged premises.

    (F) This section is not exclusive, does not apply to any mortgage filed or recorded
    in conformity with section 1701.66 of the Revised Code, and does not prohibit
    the use of other types of mortgages permitted by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.232
- number: '5301.233'
  heading: Mortgage may secure unpaid balances of advances made
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: In addition to any other debt or obligation, a mortgage may secure unpaid
    balances of advances made, with respect to the mortgaged premises, for the payment
    of taxes, assessments, insurance premiums, or costs incurred for the protection
    of the mortgaged premises, if such mortgage states that it shall secure such unpaid
    balances. A mortgage complying with this section is a lien on the premises described
    therein from the time such mortgage is delivered to the recorder for record for
    the full amount of the unpaid balances of such advances that are made under such
    mortgage, plus interest thereon, regardless of the time when such advances are
    made.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.233
- number: '5301.234'
  heading: Mortgage subrogation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) A mortgage encumbering real property granted to secure the repayment
    of funds used to satisfy a mortgage or lien on such real property shall be subrogated
    to the priority of the mortgage or lien that was satisfied to the extent of the
    amount satisfied if both of the following apply:

    (1) The intent of the parties to the new mortgage is that the new mortgage would
    have the priority of the mortgage or lien satisfied.

    (2) The expectation of the holder of a subordinate mortgage or lien at the time
    that it received its interest was that it would be junior to the mortgage or lien
    that was satisfied.

    (B) A mortgagee seeking to be subrogated pursuant to division (A) of this section
    to the priority of a lien that the mortgagee has satisfied shall not be denied
    subrogation for any of the following reasons:

    (1) The mortgagee meets any of the following criteria:

    (a) The mortgagee is engaged in the business of lending.

    (b) The mortgagee had actual knowledge or constructive notice of the mortgage
    or lien over which the mortgagee would gain priority through subrogation.

    (c) The mortgagee or a third party committed a mistake or was negligent.

    (2) The lien for which the mortgagee seeks to be subrogated was released.

    (3) The mortgagee obtained a title insurance policy.

    (C) Notwithstanding division (A) of this section, the holder of a subordinate
    mortgage or lien shall retain the same subordinate position that such person would
    have had if the prior mortgage or lien had not been satisfied.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.234
- number: '5301.24'
  heading: Acquisition of property by state not to affect mortgage lien - state, a
    party
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'The lien or priority of any existing valid mortgage or lien shall not be
    affected by reason of the fact that this state or any political subdivision thereof
    acquires the property on which said lien exists, unless said property is acquired
    by regular judicial proceedings. The state, or any board or commission of the
    state, may be made a party in any court of common pleas or probate court, to any
    foreclosure proceedings, or other proceedings to sell real estate and marshal
    liens, to secure an adjudication concerning any claim, mortgage, or other lien
    which the state has or claims on the premises involved.

    Service of summons shall be made by the clerk of the court who shall, by registered
    mail, send service of summons and a copy of the petition to the attorney general.
    The answer day and other proceedings thereafter shall be the same as though a
    personal service had been made as of the date the return receipt is signed, and
    thereafter the procedure shall be the same as though a private corporation had
    been sued under the laws of this state.

    No subsequent statute shall modify or change this section unless such statute
    specifically provides that it is modifying or changing this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.24
- number: '5301.25'
  heading: Recording in county where real estate situated - survey form
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) All deeds, land contracts referred to in division (A)(21) of section
    317.08 of the Revised Code, and instruments of writing properly executed for the
    conveyance or encumbrance of lands, tenements, or hereditaments, other than as
    provided in division (C) of this section and section 5301.23 of the Revised Code,
    shall be recorded in the office of the county recorder of the county in which
    the premises are situated. Until so recorded or filed for record, they are fraudulent
    insofar as they relate to a subsequent bona fide purchaser having, at the time
    of purchase, no knowledge of the existence of that former deed, land contract,
    or instrument.

    (B) Whenever a survey is made of lands that are being conveyed, the county auditor
    shall require that the name of the person who made the survey appear in the deed.
    The name shall either be printed, typewritten, stamped, or signed in a legible
    manner. An instrument is in compliance with this division if it contains a statement
    in the following form:

    "A survey of this property was made by _______________"

    (Name)

    This division does not apply to any court decree, order, judgment, or writ, to
    any instrument executed or acknowledged outside of this state, or to any instrument
    executed within this state prior to September 20, 1965.

    (C) All tax certificates sold pursuant to section 5721.32 or 5721.33 of the Revised
    Code, or memoranda thereof, may be recorded in the office of the county recorder
    of the county in which the premises are situated, as provided in division (B)
    of section 5721.35 of the Revised Code; provided, however, that the first and
    superior lien of the state and its taxing districts conveyed to the holder of
    the tax certificate, as provided in division (A) of section 5721.35 of the Revised
    Code, shall in no way be diminished or adversely affected if the tax certificate
    evidencing the conveyance of such first and superior lien, or memorandum thereof,
    is not recorded as provided in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.25
- number: '5301.251'
  heading: Memorandum of lease recording
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'In lieu of the recording of a lease, there may be recorded a memorandum of
    that lease, executed and acknowledged in accordance with section 5301.01 of the
    Revised Code. The memorandum of lease shall contain the names of the lessor and
    the lessee and their addresses as set forth in the lease, a reference to the lease
    with its date of execution, a description of the leased premises with such certainty
    as to identify the property, including the reference provided for in section 5301.011
    of the Revised Code, the term of the lease, together with any rights of renewal
    or extension of the lease, and the date of commencement of the term or the manner
    of determining the commencement of the term as set forth in the lease.

    A memorandum of lease that is entitled to be so recorded also may set forth any
    other provisions contained in the lease, or the substance of those provisions,
    and shall be constructive notice of only that information contained in the memorandum.

    Sections 317.08, 5301.251, and 5301.33 of the Revised Code shall not be construed
    to affect the enforceability, validity, or legal effect of instruments recorded
    in those lease records prior to August 9, 1963.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.251
- number: '5301.252'
  heading: Recording affidavit relating to title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) An affidavit stating facts relating to the matters set forth under division
    (B) of this section that may affect the title to real estate in this state, made
    by any person having knowledge of the facts or competent to testify concerning
    them in open court, may be recorded in the office of the county recorder in the
    county in which the real estate is situated. When so recorded, such affidavit,
    or a certified copy, shall be evidence of the facts stated, insofar as such facts
    affect title to real estate.

    (B) The affidavits provided for under this section may relate to the following
    matters:

    (1) Age, sex, birth, death, capacity, relationship, family history, heirship,
    names, identity of parties, marriage, residence, or service in the armed forces;

    (2) Possession;

    (3) The happening of any condition or event that may create or terminate an estate
    or interest;

    (4) The existence and location of monuments and physical boundaries, such as fences,
    streams, roads, and rights of way;

    (5) In an affidavit of a registered surveyor, facts reconciling conflicts and
    ambiguities in descriptions of land in recorded instruments.

    (C) The county recorder for the county where such affidavit is offered for record
    shall receive and cause the affidavit to be recorded as deeds are recorded, and
    collect the same fees for recording such affidavit as for recording deeds.

    (D) Every affidavit provided for under this section shall include a description
    of the land, title to which may be affected by facts stated in such affidavit,
    and a reference to an instrument of record containing such description, and shall
    state the name of the person appearing by the record to be the owner of such land
    at the time of the recording of the affidavit. The recorder shall index the affidavit
    in the name of such record owner.

    (E) Any person who knowingly makes any false statement in any affidavit provided
    for in this section is guilty of falsification under division (A)(6) of section
    2921.13 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.252
- number: '5301.253'
  heading: Written notice of code violations prior to entering into agreement for
    transfer of title to property
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) The owner of any property who has received written notice that the property
    is in violation of any building or housing code shall give the purchaser or grantee
    of the property written notice of the code violations prior to entering into an
    agreement for the transfer of title to the property, or if the owner does not
    enter into a written agreement for the transfer, prior to the filing for record
    of a deed to the property. Any notice or order of a court or of a housing or building
    authority of the state or a political subdivision that relates to a violation
    of the building or housing code of the state or any political subdivision and
    that appears on the public records of the issuing authority is notice to all subsequent
    purchasers, transferees, or any other persons who acquire any interest in the
    real property in which the violation exists and may be enforced against their
    interest in the real property without further notice or order to them.

    (B) The transfer of title to, or any interest in, real property in which a housing
    or building code violation exists shall not be grounds for dismissal of charges
    in any court against a previous owner of the real property for failure to comply
    with a notice for correction of a housing or building code violation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.253
- number: '5301.254'
  heading: Filing information with secretary of state by nonresident alien acquiring
    interest in real property
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) For the purposes of this section, "nonresident alien" means any individual
    who is not a citizen of, and is not domiciled in, the United States.

    (B) Every nonresident alien who acquires any interest either in his own name or
    in the name of another, in real property located in this state that is in excess
    of three acres or that has a market value greater than one hundred thousand dollars
    or any interest in and to minerals, and any mining or other rights appurtenant
    thereto or in connection therewith that has a market value in excess of fifty
    thousand dollars shall, within thirty days of the acquisition of the interest
    in the property, together with a filing fee of five dollars, submit to the secretary
    of state on forms prescribed by him all of the following information:

    (1) Name, address, and telephone number;

    (2) Country of citizenship;

    (3) Location and amount of acreage of real property;

    (4) Intended use of real property at the time of filing.

    (C) Every corporation or other business entity that is created or organized under
    the laws of any state or a foreign nation or that has its principal place of business
    in a foreign nation, in which a nonresident alien acquires at least ten per cent
    of the shares of stock or other interests or in which any number of nonresident
    aliens acquire at least forty per cent of the shares of stock or other interests,
    and which acquires any interest either in its own name or in the name of another,
    in real property located in this state that is in excess of three acres or that
    has a market value greater than one hundred thousand dollars or any interest in
    and to minerals, and any mining or other rights appurtenant thereto or exercisable
    in connection therewith that has a market value in excess of fifty thousand dollars
    shall, within thirty days of acquisition of the interest in the property, together
    with a filing fee of twenty-five dollars, submit to the secretary of state on
    forms prescribed by him all of the following information:

    (1) Name, address of principal place of business, and address of principal Ohio
    office;

    (2) Name, address, telephone number, and country of citizenship of each nonresident
    alien who owns at least ten per cent of the shares of stock or other interests,
    if any;

    (3) The percentage, within five percentage points, of shares of stock or other
    interests controlled by the nonresident aliens of each country represented by
    them if such interests exceed five per cent;

    (4) Location and amount of acreage of real property;

    (5) Principal business of corporation or entity;

    (6) Intended use of real property at the time of filing;

    (7) Chairman of the governing board, if any, chief executive, if any, and partners,
    if any;

    (8) Corporation''s or entity''s agent in this state;

    (9) Place of incorporation, if a corporation;

    (10) Number of persons who own shares of stock or other interests.

    (D) If the ownership or control of a corporation or other business entity that
    is required in division (C) of this section to file with the secretary of state
    changes in such a way that the information contained on the filing form is no
    longer accurate, the corporation or other business entity shall notify the secretary
    of state in writing of such change within thirty days of the occurrence of the
    change.

    If the ownership or control of a corporation or other business entity that owns
    real property in an amount larger than three acres or that has a market value
    greater than one hundred thousand dollars or that owns any interest in and to
    minerals, and any mining or other rights appurtenant thereto or exercisable in
    connection therewith that has a market value in excess of fifty thousand dollars
    changes in such a way that a nonresident alien acquires at least ten per cent
    of the shares of stock or other interests or any number of nonresident aliens
    acquire at least forty per cent of the shares of stock or other interests, the
    corporation or other business entity shall file with the secretary of state as
    required in division (C) of this section within thirty days of the occurrence
    of the change.

    If a nonresident alien who is required to file with the secretary of state in
    division (B) of this section becomes a resident alien or a citizen of the United
    States, he shall notify the secretary of state in writing of the change in his
    status within thirty days of the change.

    If a nonresident alien or a corporation or other business entity that is required
    to file with the secretary of state pursuant to this section sells the real property
    or mineral or mining rights that were reported to the secretary of state, the
    nonresident alien or corporation or other business entity shall notify the secretary
    of state in writing of the sale within thirty days of the sale.

    (E) The secretary of state shall:

    (1) Prescribe all forms and make all rules that are necessary for the implementation
    of this section;

    (2) Maintain accurate records of the information that he receives pursuant to
    this section and make such information available to the public;

    (3) Annually report this information, itemized by county, to the general assembly.

    (F) No nonresident alien or corporation or other business entity that is required
    to file with the secretary of state pursuant to this section shall fail to comply
    with this section. Either the county prosecutor of the county in which the real
    property or the mineral or mining rights are located or the attorney general may
    bring action against any alleged offender. The secretary of state may request
    a county prosecutor or the attorney general to bring such an action.

    (G) The filing of the information required by this section shall not be construed
    to perfect any interests permitted to be perfected under Title XIII of the Revised
    Code by filing with the secretary of state.'
