- number: '5302.15'
  heading: Master mortgage form
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: An instrument containing a form or forms of covenants, conditions, obligations,
    powers, and other clauses of a mortgage may be recorded in the official records
    of any county. Every such instrument shall be entitled "Master Mortgage Form Recorded
    By (name of the person causing the instrument to be recorded)" and shall be dated
    and signed by the person causing it to be recorded, but need not be acknowledged.
    Upon presentation for record and payment of the fees provided in section 317.32
    of the Revised Code, the county recorder shall record any such master mortgage
    form in the official records of the county and shall index it in the direct and
    reverse indexes under the name appearing in the title, in the same manner as mortgages
    of real property.
