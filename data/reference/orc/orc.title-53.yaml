  text: No occupant shall use a self-service storage facility for residential purposes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5322.04
- number: '5322.05'
  heading: Late fees for failure to pay rent when due for use of self-service storage
    facility
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5322'
    name: Storage Facilities
  text: '(A) Subject to division (B) of this section, a reasonable late fee may be
    imposed and collected by an owner for each service period that an occupant does
    not pay rent when due under a rental agreement, provided that the due date for
    the rental payment is not earlier than the day before the first day of the service
    period to which the rental payment applies. However, no late fee shall be imposed
    or collected if the occupant makes a rental payment in full by the third day after
    the due date under the rental agreement.

    (B) No late fee may be collected pursuant to division (A) of this section unless
    the amount of that fee and the conditions for imposing that fee are stated in
    the rental agreement or an addendum to that agreement.

    (C) For purposes of division (A) of this section, a late fee of twenty dollars
    for each late rental payment, or twenty per cent of the amount of each late rental
    payment, whichever is greater, is deemed reasonable and does not constitute a
    penalty. However, the contract may provide for a late fee in a greater amount
    if that amount is reasonable. The owner has the burden of proof that the late
    fee in the greater amount is reasonable.

    (D) Any reasonable expense incurred in rent collection or lien enforcement by
    an owner may be charged to the occupant in addition to the late fees permitted
    by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5322.05
- number: '5322.06'
  heading: Maximum value of stored property
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5322'
    name: Storage Facilities
  text: '(A) Except as otherwise provided in this section, if the rental agreement
    entered into between the owner and the occupant contains a provision placing a
    limit on the value of personal property that may be stored in the occupant''s
    storage space, that limit is the maximum value of the stored property, provided
    that the provision is printed in bold type or underlined in the rental agreement.

    (B) A limit on the value of personal property under division (A) of this section
    shall not be less than one thousand dollars.

    (C) The rental agreement may provide that the occupant may increase the limit
    on the value of property with the written permission of the owner.

    (D) Nothing in a rental agreement shall limit an occupant''s claim for damages
    based on the loss or destruction of personal property stored in the occupant''s
    storage space, when those damages are the result of negligence by, or on behalf
    of the owner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5322.06
- number: '5323.01'
  heading: Residential rental property definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5323'
    name: Residential Rental Property
  text: 'As used in this chapter:

    (A) "Hotel" has the same meaning as in section 3731.01 of the Revised Code.

    (B) "Manufactured home" has the same meaning as in section 3781.06 of the Revised
    Code.

    (C) "Mobile home" and "recreational vehicle" have the same meanings as in section
    4501.01 of the Revised Code.

    (D) "Political subdivision" means a county that has a population of more than
    two hundred thousand according to the most recent decennial census or a township,
    municipal corporation, or other body corporate and politic that is located in
    a county that has a population of more than two hundred thousand according to
    the most recent decennial census and is responsible for government activities
    in a geographic area smaller than that of the state.

    (E) "Residential rental property" means real property that is located in a county
    that has a population of more than two hundred thousand according to the most
    recent decennial census and on which is located one or more dwelling units leased
    or otherwise rented to tenants solely for residential purposes, or a mobile home
    park or other permanent or semipermanent site at which lots are leased or otherwise
    rented to tenants for the parking of a manufactured home, mobile home, or recreational
    vehicle that is used solely for residential purposes. "Residential rental property"
    does not include a hotel or a college or university dormitory.'
