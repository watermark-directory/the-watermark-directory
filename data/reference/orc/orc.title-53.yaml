- number: '5302.31'
  heading: Private selling officer's deed; form
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: 'A deed in substance following the form set forth in this section, when duly
    executed in accordance with Chapter 5301. of the Revised Code, has the force and
    effect of a deed in fee simple to the grantee, the grantee''s heirs, assigns,
    and successors, to the grantee''s and the grantee''s heirs'', assigns'', and successors''
    own use, with covenants on the part of the grantor with the grantee, the grantee''s
    heirs, assigns, and successors, that, at the time of the delivery of that deed,
    the grantor was duly appointed, qualified, and acting in the fiduciary capacity
    described in that deed, and was duly authorized to make the sale and conveyance
    of the premises; and that in all of the grantor''s proceedings in the sale of
    the premises the grantor has complied with the requirements of the statutes in
    such case provided.

    "Private Selling Officer''s Deed

    Ohio Revised Code § 2329.152

    Case No. _____________________

    I, __________________________, a private selling officer as defined in section
    2329.01 of the Revised Code, pursuant to the Order of Sale entered on __________________,
    the Confirmation of Sale entered on _______________, and in consideration of the
    sum of $______________________, the receipt whereof is hereby acknowledged, do
    hereby grant, sell, and convey unto ____________________, tax mailing address
    ________________________, all the rights, title, and interest of the parties in
    Court of Common Pleas, ________________ County, Ohio, Case No. ________________,
    ___________________ vs. _____________________, and all pleadings therein incorporated
    herein by reference in and to the following Lands and Tenements situated in the
    County of ___________________ and State of Ohio, known and described as follows,
    to-wit:

    (description of land or interest therein)

    This deed does not reflect any restrictions, conditions, or easements of record.

    Prior Owner: ______________________________

    Prior Instrument Reference: ______________________________

    Executed this _______ day of ___________________, ____________________________________

    (signature of private selling officer)

    Auctioneer License # ______________________________

    Real Estate Broker License #______________________________

    (Execution in accordance with Chapter 5301. of the Revised Code)"'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5302.31
- number: '5303.01'
  heading: Action to quiet title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: 'An action may be brought by a person in possession of real property, by himself
    or tenant, against any person who claims an interest therein adverse to him, for
    the purpose of determining such adverse interest. Such action may be brought also
    by a person out of possession, having, or claiming to have, an interest in remainder
    or reversion in real property, against any person who claims to have an interest
    therein, adverse to him, for the purpose of determining the interests of the parties
    therein.

    Whenever the state or any agency or political subdivision thereof has, or appears
    to have, an interest in real property adverse to the person in possession claiming
    the right thereto, the state or such agency or such political subdivision may
    be made a party in any action brought under this section.

    The clerk of the court shall cause to be recorded in the deed records of each
    county in which any part of the real property lies, a certified copy of the judgment
    or decree determining the interests of the parties. The usual fees of the clerk
    and recorder shall be taxed as part of the costs of the case.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.01
- number: '5303.02'
  heading: Vendee may recoup
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: In actions to recover the purchase money of real estate by vendor against
    vendee, the vendee, notwithstanding his continued possession, may by way of counterclaim
    set up any breach of the covenants of title acquired by him from the plaintiff,
    and make any person claiming an adverse interest therein a party to the action.
    Upon the hearing, he may recoup against the plaintiff's demand the present worth
    of any existing lien or encumbrance thereon. If the adverse interest of the claimant
    is an estate in reversion or remainder, or contingent upon a future event, with
    his assent, the court of common pleas may order the vendee to surrender possession
    to his vendor upon the repayment of so much of the purchase money as has been
    paid, with interest, or direct the payment of the purchase money claimed in the
    action, upon the plaintiff's giving bond in double its amount with two or more
    sureties to be approved by the court, for the payment thereof with interest, if
    by reason of the defect the defendant or his privies are subsequently evicted.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.02
- number: '5303.03'
  heading: Petition in action for land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: In an action for the recovery of real property, it is sufficient if the plaintiff
    states in his petition that he has a legal estate therein and is entitled to the
    possession thereof, describing it with such certainty as to identify the property,
    and that the defendant unlawfully keeps him out of the possession. It is not necessary
    to state how the plaintiff's estate or ownership is derived.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.03
- number: '5303.04'
  heading: Answer to action for land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: In an action for the recovery of real property, it is sufficient if in his
    answer the defendant denies generally the title alleged in the petition, or that
    he withholds the possession. If he denies the title only, possession by him shall
    be taken as admitted. When he does not defend for the whole premises, the answer
    shall describe the particular part for which defense is made. The defendant also
    may set forth in his answer other grounds of defense and counterclaim, as in any
    other form of action.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.04
- number: '5303.05'
  heading: Petition by tenant against cotenant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: In an action by a tenant in common of real property against a cotenant, the
    plaintiff must state, in addition to what is required in section 5303.03 of the
    Revised Code, that the defendant either denied the plaintiff's right, or did some
    act amounting to such denial.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.05
- number: '5303.06'
  heading: Recovery when right terminates during the action
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: In an action for the recovery of real property, when the plaintiff shows a
    right to recover at the time the action was begun, but during its pendency his
    right has terminated, the verdict and judgment must be according to the fact,
    and the plaintiff may recover for the withholding of the property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.06
- number: '5303.07'
  heading: Occupying claimant law
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: In an action for the recovery of real property the parties may avail themselves
    of the benefit of sections 5303.08 to 5303.17, inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.07
- number: '5303.08'
  heading: Cases in which occupying claimant is paid for improvements
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: 'A person who, without fraud or collusion on his part, obtained title to and
    is in the quiet possession of lands or tenements, claiming to own them, shall
    not be evicted or turned out of possession by any person who sets up and proves
    an adverse and better title, until the occupying claimant, or his heirs, is paid
    the value of lasting improvements made by the occupying claimant on the land,
    or by the person under whom he holds, before the commencement of suit on the adverse
    claim by which such eviction may be effected, unless the occupying claimant refuses
    to pay to the party establishing a better title the value of the lands without
    such improvements, on demand by him or his heirs, when such occupying claimant
    holds:

    (A) Under a plain and connected title, in law or equity, derived from the records
    of a public office;

    (B) By deed, devise, descent, contract, bond, or agreement, from and under a person
    claiming a plain and connected title, in law or equity, derived from the records
    of a public office, or by deed authenticated and recorded;

    (C) Under sale on execution against a person claiming a plain and connected title,
    in law or equity, derived from the records of a public office, or by deed authenticated
    and recorded;

    (D) Under a sale for taxes authorized by the laws of this state;

    (E) Under a sale and conveyance made by executors, administrators, or guardians,
    or by any other person, in pursuance of an order or decree of court, where lands
    are directed to be sold.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.08
- number: '5303.09'
  heading: Title under a sale for taxes
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: In cases of lands sold for taxes the title by which the successful claimant
    succeeds against the occupying claimant is an adverse and better title under section
    5303.08 of the Revised Code, whether it is the title under which the taxes were
    due and for which the land was sold, or any other title or claim. The occupying
    claimant holding possession of land sold for taxes, having the deed of a county
    auditor therefor, or a certificate of such sale from a county treasurer, or claiming
    under the person who holds such deed or certificate, has sufficient title to the
    land to demand the value of improvements under such section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.09
- number: '5303.10'
  heading: Entry of claim against occupying claimant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: The court rendering judgment against the occupying claimant in any case provided
    for in sections 5303.08 to 5303.17, inclusive, of the Revised Code, at the request
    of either party, shall cause a journal entry thereof to be made, and the action
    shall then proceed as other civil actions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.10
- number: '5303.11'
  heading: Conduct of case
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: For the trial of a question of fact remaining undisposed of, a jury shall
    be impaneled and sworn, and shall at once proceed to view the premises in question.
    After viewing the premises, the jury shall return to the courthouse and the trial
    shall proceed. After hearing the testimony produced by either party, the jury
    shall determine the rights of the parties under the direction of the court. From
    such view and the testimony, the jury shall ascertain and find in its verdict
    the reasonable value of permanent and valuable improvements made on the land previous
    to the occupying claimant's receipt of actual notice of the adverse claim of the
    plaintiff, the damages the land has sustained by waste, including the value of
    timber or other valuable material removed or destroyed, and the net annual value,
    rents, and profits of the land accruing after the occupying claimant received
    notice of claim by service of summons. The jury shall find the value of the land
    at the time the judgment was rendered with the improvements thereon, and its value
    without the improvements or damages sustained by waste, including the removal
    or destruction of the timber or other valuable material, and return its verdict
    in open court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.11
- number: '5303.12'
  heading: Setting verdict aside
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: If either party is aggrieved by an assessment or valuation made by a jury
    under section 5303.11 of the Revised Code, he may apply to the court during the
    term at which the trial was had, by a motion to set aside the verdict, assessment,
    and valuation, and, upon good cause shown, it may set aside such assessment, valuation,
    and verdict, order a new valuation and another jury to be drawn, which shall proceed
    as provided in such section. Either party may challenge jurors as in other civil
    actions. If more than three witnesses are examined by either party on the same
    point in the same case, the judge may tax the costs of such additional witnesses
    to the party calling them.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.12
- number: '5303.13'
  heading: Judgment and execution on verdict for plaintiff
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: If, under section 5303.11 of the Revised Code, the jury reports a sum in favor
    of the plaintiff in ejectment on the assessment and valuation of the valuable
    and lasting improvements, the assessment of damages for waste, and the net annual
    value of the rents and profits, the court shall render a judgment therefor, without
    pleadings, and issue execution thereon as in other cases. In such case, or in
    cases in which no such excess is reported, such plaintiff is barred from having
    or maintaining an action for mesne profits.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.13
- number: '5303.14'
  heading: Proceedings if verdict is for occupying claimant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: If, under section 5303.11 of the Revised Code, the jury reports a sum in favor
    of the occupying claimant, on the assessment and valuation of the valuable and
    lasting improvements, deducting therefrom the damages, sustained by waste, together
    with the net annual value of the rents and profits which the defendant received
    after commencement of the action, the successful claimant, or his heirs, or, if
    they are minors, their guardians, may demand of the occupying claimant the value
    of the land without the improvements so assessed and tender a deed of it to him,
    or pay him the sum so allowed by the jury in his favor, within such reasonable
    time as the court allows.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.14
- number: '5303.15'
  heading: Writ of possession
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: If the successful claimant, his heirs, or their guardians, elect to, and do
    pay to the occupying claimant, the sum reported in his favor by the jury, within
    the time allowed therefor, then a writ of possession shall issue in favor of him,
    his heirs, or their guardians.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.15
- number: '5303.16'
  heading: Election by successful claimant to receive value of land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: If the successful claimant, his heirs, or their guardians, elect to receive
    the value of the land without the improvements assessed under section 5303.11
    of the Revised Code, to be paid by the occupying claimant, and tender a general
    warranty deed of the land conveying such adverse or better title, within the time
    allowed by the court for the payment of the money, and the occupying claimant
    refuses or neglects to pay it to him, his heirs, or their guardians within such
    time, a writ of possession shall be issued in favor of the successful claimant,
    his heirs, or their guardians.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.16
- number: '5303.17'
  heading: Action by occupying claimant after election
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: When an application is made for the value of improvements to land, the occupying
    claimant or his heirs shall not be evicted from the possession of such land except
    as provided in sections 5303.15 and 5303.16 of the Revised Code. When an election
    has been made by the successful claimant, his heirs, or their guardians, to surrender
    the land, if the occupying claimant or his heirs, within the time allowed, pay
    into court its value, without improvements, thereafter they may bring suit in
    the courts which gave judgment of eviction, and obtain judgment for the title
    to the land, if it was not previously conveyed to such occupant.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.17
- number: '5303.18'
  heading: Authority to convey
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: When two or more persons who own an interest in land become bound in writing
    for the sale and conveyance thereof, and one dies before the land is conveyed,
    the survivors, by petition against the purchaser, and the heirs or devisees of
    such deceased party, may be authorized to complete such contract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.18
- number: '5303.19'
  heading: Petition to convey land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: The petition provided for in section 5303.18 of the Revised Code must set
    forth the names of all the contracting parties, describe the lands contracted
    for, state the time the contract was made, that it has been fully performed by
    the purchaser, and have a copy of the contract annexed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.19
- number: '5303.20'
  heading: Judgment and deed to convey land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: If the court finds the allegations of the petition provided for in section
    5303.18 of the Revised Code to be true, it may make an order authorizing the survivors
    to complete the contract by conveying the land. The deed shall recite the order,
    and shall convey as complete and perfect a title, and have the same effect, as
    if executed by all the owners.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.20
- number: '5303.21'
  heading: Sale of entailed and other estates
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: '(A) In an action by the tenant in tail or for life, or in an action by the
    grantee or devisee of a qualified or conditional fee, or of any other qualified,
    conditional, or determinable interest, or in an action by a person claiming under
    such tenant, grantee, or devisee, or in an action by the trustee or beneficiaries,
    if the estate is held in trust, courts of common pleas may, subject to division
    (B) of this section, authorize the sale of any estate, whether it was created
    by will, deed, or contract, or came by descent, when satisfied that such sale
    would be for the benefit of the person holding the first and present estate, interest,
    or use, and do no substantial injury to the heirs in tail, or others in expectancy,
    succession, reversion, or remainder. This division does not extend to estates
    in dower.

    (B) If an estate is held in trust and if the trustee is authorized by the trust
    instrument to sell real property, a court of common pleas shall not authorize
    the sale of the estate pursuant to division (A) of this section unless the trustee
    consents to the sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.21
- number: '5303.211'
  heading: Estate held in trust sale or lease
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: 'Where the estate sought to be sold or leased is held in trust under the jurisdiction
    of a probate court, an action may be brought by the trustee in the probate court
    of the county in which he was appointed or in which the estate subject to sale
    or lease or any part thereof is situated; and the sale or lease of such estate
    may be authorized by such court which shall have the same jurisdiction and power
    as is provided for courts of common pleas in sections 5303.21 to 5303.31, inclusive,
    of the Revised Code.

    If the action is brought in a county other than that in which the estate or a
    part thereof is situated, a certified transcript of the record of all proceedings
    had therein shall be filed with and recorded by the probate court of each county
    in which such estate or any part thereof is situated.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.211
- number: '5303.22'
  heading: Petition and defendants
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: The petition for a sale of an estate described in section 5303.21 of the Revised
    Code shall contain a description of such estate, a clear statement of the interest
    of the plaintiff therein, and a copy of the will, deed, or other instrument of
    writing by which the estate is created. All persons in being who are interested
    in the estate, or who may, by the terms of the will, deed, other instrument creating
    the entailment or other estate, thereafter become interested therein as heir,
    reversioner, or otherwise, shall be made parties to the action. If the names or
    residence of persons who should be made parties are unknown to the plaintiff,
    that fact shall be verified by affidavit of the plaintiff, whereupon the sale
    may be ordered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.22
- number: '5303.23'
  heading: Order for sale and effect
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: Upon the hearing, if it is proved that a sale of an estate described in section
    5303.21 of the Revised Code would be for the benefit of the tenant in tail, or
    for life, and do no substantial injury to the heirs in tail, or others in expectancy,
    succession, reversion, or remainder, the court shall direct a sale to be made,
    the manner thereof and appoint some suitable person to make it. Such sale shall
    vest the estate sold in the purchaser, free from the entailment, limitation, or
    condition.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.23
- number: '5303.24'
  heading: Sale may be had by consent
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: All parties in interest may appear voluntarily, and consent in writing to
    a sale of an estate described in section 5303.21 of the Revised Code. Testamentary
    guardians, and guardians appointed by the probate court, in the place of their
    wards, also may assent to the sale.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.24
- number: '5303.25'
  heading: Report and confirmation of sale and deed
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: A sale of an estate described in section 5303.21 of the Revised Code shall
    be reported to the court of common pleas authorizing such sale. On examination
    thereof, if it appears that the sale was fairly conducted and made, and that the
    price obtained is the reasonable value of the estate sold, the court shall confirm
    the sale and direct a deed of conveyance of the premises sold to be made to the
    purchaser on payment of the purchase money, or on securing its payment as the
    court approves.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.25
- number: '5303.26'
  heading: Proceeds of sale
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: All money arising from a sale of an estate described in section 5303.21 of
    the Revised Code, for purposes of descent, succession, reversion, or remainder,
    has the same character and is governed by the same principles as the estate sold,
    and passes according to the terms of the deed, will, or other instrument creating
    the estate.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.26
- number: '5303.27'
  heading: Investing money from sale of entailed estates - insurance
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: Under the direction and approval of the court of common pleas, money arising
    from the sale of an estate described in section 5303.21 of the Revised Code and
    from the notes given for purchase money shall be invested in the bonds or other
    interest-bearing obligations of this state, any political subdivision of this
    state, or the United States, or in bonds or notes secured by a mortgage on unencumbered
    real estate located in this state, of double the value of the money secured. The
    buildings on such real estate shall be well insured against loss by fire and windstorm,
    and so kept by the mortgagor for the benefit of the mortgagee, until the debt
    is paid. The mortgagee shall so insure the buildings if the mortgagor fails to
    do so, and the expense of the insurance shall be repaid by the mortgagor and be
    a lien on the property concurrent with the mortgage; or the court may order the
    money reinvested in other real estate within this state under such restrictions
    as it prescribes, which investments shall be reported to the court and be subject
    to its approval and confirmation. For purposes of descent, succession, reversion,
    or remainder, the real estate in which the money is reinvested has the same character
    and is governed by the same principles as the estate sold, and passes according
    to the terms of the deed, will, or other instrument creating the estate sold.
    The court also may authorize the investment of any such funds in securities, interest-bearing
    obligations, or contract or deposit accounts which are legal for the investment
    of funds held by testamentary trustees as provided by sections 2109.37, 2109.371,
    and 2109.372 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.27
- number: '5303.28'
  heading: Trustees for entailed estates
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: 'The court of common pleas shall appoint competent trustees to invest and
    manage the money referred to in section 5303.27 of the Revised Code. Such trustees,
    from time to time, must report to the court their proceedings and the condition
    of the fund. The court shall require of such trustees security for the faithful
    discharge of their duties, from time to time may require additional security,
    remove them for cause or reasonable apprehension thereof, accept the resignation
    of a trustee, and fill a vacancy by a new appointment.

    Where a trustee has been appointed and qualified in a court of probate all money
    arising from the sale of an estate described in section 5303.21 or 5303.211 of
    the Revised Code and from the notes given for the purchase money shall be ordered
    by the court authorizing such sale to be delivered to said trustee to be invested
    as provided by section 5303.27 of the Revised Code and the investment and management
    of such money shall thereafter be under the exclusive jurisdiction of the court
    of probate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.28
- number: '5303.29'
  heading: Consolidation of actions or trusts
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: Under the direction and approval of the court of common pleas, money arising
    from a sale of an estate described in section 5303.21 of the Revised Code, may
    be invested in bonds which are either a portion or the whole or an issue secured
    by a first mortgage or trust deed upon the real estate so sold, under such restrictions
    as the court prescribes, which investment must be reported to the court and be
    subject to its approval and confirmation. When parts of the same entailed estate
    have been or are sought to be sold in separate actions, the court may, before
    or after the sale in any action, or at any time during the continuance of the
    trusts, consolidate any two or more such actions or the trusts created thereunder.
    The court may make all orders and decrees necessary or proper to effect consolidation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.29
- number: '5303.30'
  heading: Income - payment of taxes and expenses
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: The net income accruing from a sale of an estate described in section 5303.21
    of the Revised Code shall be paid to the person who would be entitled to the use
    or income of the estate were it unsold. Taxes and the expenses of the investment
    and management of the fund shall be paid by the person entitled to the income
    thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.30
- number: '5303.31'
  heading: Estates may be leased
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: '(A) Upon like proceedings as for the sale of an estate described in section
    5303.21 of the Revised Code, but subject to division (B) of this section, the
    court of common pleas may direct that such estate be leased for a term of years,
    renewable or otherwise, with or without an option on the part of the lessee to
    purchase the estate leased, as appears most beneficial, and on such terms as appear
    just and equitable. The rents and profits shall be paid to the person who might
    otherwise be entitled to the use and occupancy of the estate or the income of
    it.

    (B) If an estate is held in trust and if the trustee is authorized by the trust
    instrument of lease real property, a court of common pleas shall not direct pursuant
    to division (A) of this section that the estate be leased unless the trustee consents
    to the lease.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.31
- number: '5303.32'
  heading: Sale of property given for a religious use
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: When real estate, except burial grounds or cemeteries, has been donated, bequeathed,
    or otherwise entrusted to, or purchased by any person or trustee, for public religious
    use, but not to or for the use of a specific or particular religious society or
    denomination, or when it has been donated, bequeathed, or entrusted to, or purchased
    by a particular religious society or denomination, and abandoned for such use,
    the court of common pleas of the county in which it is located, on good cause
    shown, upon the petition of a citizen of the vicinity, may make an order for the
    sale of such property, whether or not it has been built upon or otherwise improved,
    and make such order as to costs and the disposition of the proceeds of the sale
    to such religious or other public use as is just and equitable. The purchaser
    shall be invested with as full and complete a title thereto as the character of
    the original grant for such religious use permits.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.32
- number: '5303.33'
  heading: Necessary parties to proceeding
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: All persons who have vested, contingent, or reversionary interest in the real
    estate referred to in section 5303.32 of the Revised Code, and the trustees or
    other temporal officers of the religious society then using it, shall be made
    parties to such petition, and be notified of its filing, as in a civil action.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.33
- number: '5303.34'
  heading: Unlawfully extracting or exploiting minerals of another
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5303'
    name: Actions Relating To Realty
  text: '(A) As used in this section, "bad faith" means a trespass committed with
    either of the following:

    (1) Actual knowledge that the entry onto, and the extraction of minerals from,
    the property was unlawful;

    (2) Willful or wanton disregard for the lawful property or mineral rights of another
    person and with the intent of depriving the lawful owner of the owner''s minerals.

    "Bad faith" shall not be presumed and does not include an entry onto property
    based on a reasonable belief that such entry, or the extraction occurring after
    such entry, was lawful.

    (B) In an action brought by a person who owns mineral rights against any person
    who trespasses on the land containing such minerals and unlawfully extracts, exploits,
    or otherwise converts the minerals, damages shall be equal to one of the following:

    (1) In the case of minerals, such as coal, stone, or ore, that are extracted by
    underground or surface mining methods, the revenue received from the sale of the
    minerals measured at the mouth of the mine, less the cost of extraction, less
    any sums previously paid;

    (2) In the case of minerals, such as hydrocarbons, in liquid or gaseous states
    that are extracted by drilling, the revenue received from the sale of such minerals
    measured at the wellhead, less the cost of extraction, less any sums previously
    paid.

    (C) When calculating damages under division (B)(1) or (2) of this section, if
    the person who trespassed is determined to have trespassed on the land in bad
    faith, no reduction for the cost of extraction shall be allowed, and the damaged
    party is entitled to the full revenue received from the sale of the minerals measured
    at the mouth of the mine or at the wellhead, as applicable, regardless of extraction
    method, less any sums previously paid. The damaged party is not entitled to punitive
    damages.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.34
- number: '5305.01'
  heading: Assignment of dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When the lands of a deceased person are not encumbered by mortgage, or by
    judgment obtained against such decedent during life, the heir, guardian of an
    heir, or other person having the next immediate estate of inheritance, may assign
    in writing to the surviving spouse, dower therein, particularly describing such
    estate, which, if approved in writing on the deed of assignment by the probate
    judge of the county, and also by the probate judge of the county appointing such
    guardian, and accepted by such spouse, in writing thereon, shall be a valid assignment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.01
- number: '5305.02'
  heading: Petition for dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: A surviving spouse may file a petition for dower in the court of common pleas,
    against the heir, or other person having the next immediate estate of inheritance
    or other estate or interest therein, setting forth the right thereto, and describing
    the tracts of land in which dower is claimed. On the hearing the court shall render
    such judgment as appears just and consistent with the rights of the parties interested.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.02
- number: '5305.03'
  heading: Encumbrances presented
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When the rights of a lessee or lienor are shown by cross-petition filed before
    judgment, such rights and liens shall be regarded by the court of common pleas,
    and no inequality shall be allowed or injustice done to such lessee or lienor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.03
- number: '5305.04'
  heading: Land situated in different counties
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When the lands in which dower is claimed lie in several counties, the petition
    for dower may be filed by the surviving spouse in any county in which a part of
    the estate is situated. The court of common pleas of such county has complete
    jurisdiction, and may order the whole dower of such spouse to be assigned in one
    or more of such counties, and out of one or more of such tracts of land, if it
    may be done without prejudice to the rights of any person claiming title to or
    holding a lien on the land.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.04
- number: '5305.05'
  heading: Death of plaintiff before assignment
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When a plaintiff in an action to assign dower dies before the assignment,
    or before entry of the final judgment, the action may be revived in the name of
    the executor or administrator. The court of common pleas shall determine, if not
    before decided, whether the plaintiff was entitled to dower in such action. If
    the plaintiff was so entitled, the court shall adjudge in favor of such executor
    or administrator a sum equal to one third of the rental value of the real estate
    in which the plaintiff was entitled to dower, from the filing of the petition
    until death, after deducting one third of the necessary expenses. The sum so adjudged
    in favor of such executor or administrator is a lien upon such real estate, and
    its payment may be enforced by sale as upon execution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.05
- number: '5305.06'
  heading: Appointment of commissioners to assign dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When dower is adjudged, the court of common pleas shall appoint three judicious,
    disinterested men of the county in which the action to assign dower is pending,
    who are not of kin to either of the parties interested, to be commissioners. The
    court shall issue its order to the sheriff of that county, commanding him that
    by the oaths of the commissioners which may be administered by him, he cause such
    dower to be set off and assigned to the plaintiff in the manner set forth in the
    judgment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.06
- number: '5305.07'
  heading: Proceedings upon return of assignment of dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: The commissioners provided for in section 5305.06 of the Revised Code and
    the sheriff shall obey the order to assign dower, and return their proceedings
    thereon to the court of common pleas at such time as it appoints. If the court
    approves the assignment, it shall be entered on its records, and thenceforth the
    assignment is valid. Thereupon execution shall be issued, directing the sheriff
    to put the surviving spouse in full possession of the dower assigned.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.07
- number: '5305.08'
  heading: Assignment of dower when estate indivisible
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When an estate of which a surviving spouse is dowable is entire, and no division
    of it can be made by metes and bounds, dower shall be assigned as of a third part
    of the rents, issues, and profits thereof, to be computed and ascertained by the
    commissioners provided for in section 5305.06 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.08
- number: '5305.09'
  heading: Timberlands or other unimproved lands or lots
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When an estate of which a surviving spouse is dowable, or in which such spouse
    owns a dower interest assigned to or vested in such spouse, consists in whole
    or in part of timberlands or other unimproved lands or lots, the commissioners,
    appointed as provided in section 5305.06 of the Revised Code, shall return to
    the court of common pleas a true appraisement of such lands in money, and also
    a true appraisement of their annual rental value. Upon the hearing of such report,
    if it appears to the court that the assignment of dower in such lands, either
    by metes and bounds, or as of the rents, issues, and profits, cannot be or has
    not been made so as to provide such surviving spouse with an income from the lands
    or lots so charged commensurate with their value, as fixed by such commissioners,
    the court shall determine the value of such dower in money, and make an order
    directing the sheriff to advertise and sell such lands, or so much thereof as
    is necessary, as upon execution. The sheriff shall not cause the lands to be appraised,
    but their value as returned by the commissioners shall be the appraised value,
    and they shall not be sold for less than two thirds of that value. Upon the confirmation
    of such sale, the court shall order the payment to the surviving spouse out of
    the money arising therefrom the value of the dower so determined by it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.09
- number: '5305.10'
  heading: Election by owner of lands to pay value of dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: The person owning lands or lots mentioned in section 5305.09 of the Revised
    Code, at the time the order for the sale of such lands is made, may elect to pay
    to the surviving spouse the value of the dower. If such payment is made within
    ten days or such further reasonable time as the court of common pleas grants not
    exceeding ninety days from such election, the court shall make a decree divesting
    such spouse of any interest by way of dower in such lands. A surviving spouse
    owning a dower interest in timber lands or other unimproved lots or lands assigned
    to or vested in such spouse may maintain an action for relief in accordance with
    section 5305.09 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.10
- number: '5305.11'
  heading: Dower during pendency of petition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When the commissioners provided for in section 5305.06 of the Revised Code
    have set off and assigned dower, they shall make a true appraisement of the yearly
    value, after deducting necessary expenses, of the real estate in which the surviving
    spouse is entitled to dower, estimating such value from the day of filing the
    petition for dower to the day of assigning dower, and return such appraisement
    and assignment. The court of common pleas shall adjudge the payment of one third
    of the whole sum so returned to the surviving spouse out of the real estate not
    covered by the dower, upon which judgment execution may issue. This section does
    not require execution to be issued against such of the defendants in dower as
    are minors. In such cases the dower shall operate as a lien upon the real estate,
    for their proportion of the judgment, until it is paid.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.11
- number: '5305.12'
  heading: Exemptions in estimating yearly value of dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: In making the appraisement of the yearly value of the real estate provided
    for in section 5305.11 of the Revised Code, the commissioners must exclude all
    permanent or valuable improvements made thereon after the deceased consort of
    the surviving spouse ceased to be its owner.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.12
- number: '5305.13'
  heading: Minor heir not to be prejudiced by collusive assignment of dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: During the minority of an heir, if dower is assigned to a surviving spouse
    not entitled thereto, or, if such dower was recovered by the default, fraud, or
    collusion of the guardian, such heir, on coming of age, may have an action against
    such spouse to recover the lands wrongfully awarded.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.13
- number: '5305.14'
  heading: Costs
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: If the petition of a person claiming dower is contested, and the court of
    common pleas finds that such person is entitled to dower as claimed therein, the
    defendant so contesting shall pay all costs of the suit. If the petition is not
    contested, the plaintiff shall pay one third, and the legal owner of the real
    estate two thirds of the costs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.14
- number: '5305.15'
  heading: Surviving spouse may elect to be endowed out of proceeds of sale
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: In actions for partition, when an estate cannot be divided, and is ordered
    to be sold, and in actions for the sale of real estate by executors, administrators,
    guardians, and assignees, acting under a general assignment for the benefit of
    creditors, and in all other actions and proceedings in which the court orders
    the sale of real estate to satisfy a judgment or decree, the surviving spouse
    who has a dower interest in such real estate, and is a party, may file an answer,
    waive the assignment of dower by metes and bounds, and ask to have the estate
    sold free of dower and to be allowed, in lieu thereof, such money out of the proceeds
    of sale as the court deems the just value of the dower interest therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.15
- number: '5305.16'
  heading: Election by answer is a release of dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: The answer of a surviving spouse under section 5305.15 of the Revised Code
    has the same effect, in all respects, as a deed of release to the purchaser of
    such estate of the dower interest therein of such spouse.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.16
- number: '5305.17'
  heading: Guardian may elect for surviving spouse
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: 'As used in this section and sections 5305.18 to 5305.22 of the Revised Code,
    "incompetent person" means a person who is so mentally impaired, as a result of
    a mental or physical illness or disability, as a result of an intellectual disability,
    or as a result of chronic substance abuse, that the person is incapable of taking
    proper care of the person''s self or property or fails to provide for the person''s
    family or other persons for whom the person is charged by law to provide.

    The guardian of a surviving spouse who has been adjudged to be an incompetent
    person may appear and answer for such incompetent person in an action under section
    5305.15 of the Revised Code, subject to the approval of the court in which it
    is pending. Such answer has the same effect as if such spouse answered personally.
    The guardian shall be liable to such spouse, or the heirs, for all damage or loss
    sustained by the guardian''s fraud or collusion, notwithstanding the approval
    of the court.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.17
- number: '5305.18'
  heading: Petition to discharge land of dower of incompetent person
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: A person owning real property in this state, encumbered by the contingent
    or vested right of dower of an incompetent person, may apply, by petition to the
    court of common pleas of the county in which the real estate, or any part thereof,
    is situated, making defendants thereto such incompetent person, and the spouse
    and guardian, if such incompetent person has either or both, for leave to sell
    any part of such real property, discharged and unencumbered of such contingent
    or vested right of dower. The petition must set forth the grounds for the incompetency
    of the person, together with a description of the land proposed to be sold. Thereupon
    the court shall appoint a committee of six competent individuals, of whom at least
    three are physicians, who, under oath, shall inquire into the competence of such
    person, and hear testimony to be produced by the spouse or guardian, or, if there
    is no such guardian, by a guardian ad litem to be appointed in the action. The
    committee shall make a report, in writing, of the result of its investigation,
    signed by its members.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.18
- number: '5305.19'
  heading: Inquest of competence
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: If the committee provided for in section 5305.18 of the Revised Code unanimously
    reports that the person having a contingent or vested right of dower, in its opinion,
    is a permanently incompetent person, the court of common pleas shall appoint three
    judicious freeholders to appraise the real estate described in the petition mentioned
    in said section, whether or not such real estate is in one or several counties.
    Such freeholders shall report in writing the value of each tract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.19
- number: '5305.20'
  heading: Proceedings on report of inquest of competence
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When the report provided for in section 5305.19 of the Revised Code is filed,
    the court of common pleas may direct the petitioner, by a sufficient deed of conveyance,
    to convey to the incompetent person, to be held by such person in fee, such proportion
    of the real estate described in the petition as seems just, or the court may assign
    to such incompetent person, to be held by the incompetent person during life,
    after the death of the spouse of such person, such proportion of the real estate
    described in the petition as seems just, for the incompetent person's support,
    or the court may order the petitioner to invest an amount by it fixed, in the
    stock of a company, or stocks created by the laws of this state, as the court
    designates, the profits, and dividends or distributions, arising from such investment
    to be applied to the support and maintenance of the incompetent person after the
    death of the spouse of such person. The petitioner, upon compliance with the order
    of the court, may sell all the real property the petitioner is possessed of, described
    in the petition, free and unencumbered of the contingent or vested right of dower
    of such incompetent person.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.20
- number: '5305.21'
  heading: Dower of incompetent person may be barred
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: When the spouse of an incompetent person conveys real estate in this state,
    in which such person has a contingent or vested right of dower, and the incompetent
    person does not join the spouse in the conveyance, the spouse may apply by petition
    to the court of common pleas of the county in which the incompetent person resides,
    or, if such incompetent person resides out of the state, then in the county in
    which the real estate is situated, for leave to have part or all of such real
    estate so conveyed, released of the dower right therein. Such petition shall set
    forth the grounds for incompetency of the incompetent person, and a description
    of the land proposed to be affected. The incompetent person, guardian, if there
    is one, and all persons in interest, shall be made defendants, and the action
    shall be proceeded with as prescribed in sections 5305.18 to 5305.20 of the Revised
    Code, except that instead of ordering the petitioner to sell the real estate or
    to convey or assign to such incompetent person any part of it, the court shall
    direct the petitioner to make such investment as is provided in section 5305.20
    of the Revised Code, or require the petitioner to secure the amount to the use
    of the incompetent person by mortgage of unencumbered real estate of at least
    double the value thereof. Upon compliance by the petitioner with the order made,
    the court shall enter a judgment releasing and discharging the real estate from
    the encumbrance of such right of dower, and adjudge the holder of the legal title,
    or other party liable, to pay to the petitioner any sum withheld or retained as
    indemnity against such dower right.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.21
- number: '5305.22'
  heading: Real estate may be conveyed free from dower if spouse incompetent
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5305'
    name: Dower
  text: '(A) Any real estate or interest in real estate coming to a person by purchase,
    inheritance, or otherwise, after the spouse of the person is adjudged a person
    with a mental illness subject to court order and admitted to either a hospital
    for persons with mental illness in this or any other state of the United States
    or the psychiatric department of any hospital of the United States, may be conveyed
    by the person while the person''s spouse who is a person with a mental illness
    subject to court order remains a patient of that hospital, free and clear from
    any dower right or expectancy of the person''s spouse who is a person with a mental
    illness subject to court order. Dower shall not attach to any real estate so acquired
    and conveyed during the time described in this section in favor of such spouse
    who is a person with a mental illness subject to court order. The indorsement
    upon the instrument of conveyance, by the superintendent of the hospital to which
    the spouse was admitted, that the spouse of the person conveying the real estate
    is a person with a mental illness subject to court order who has been admitted
    to that hospital, stating when received in that hospital and signed officially
    by the superintendent, shall be sufficient evidence of the fact that the spouse
    of the person conveying the real estate is a person with a mental illness subject
    to court order. This indorsement shall be a part of the instrument of conveyance.

    (B) As used in this section, "person with a mental illness subject to court order"
    has the same meaning as in section 5122.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5305.22
- number: '5307.01'
  heading: Persons compelled to partition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: Tenants in common, survivorship tenants, and coparceners, of any estate in
    lands, tenements, or hereditaments within the state, may be compelled to make
    or suffer partition thereof as provided in sections 5307.01 to 5307.25 of the
    Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.01
- number: '5307.02'
  heading: Place of partition proceedings
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: When the estate is situated in one county, the proceedings for partition shall
    be had in that county. When the estate is situated in two or more counties, such
    proceedings may be had in any county in which a part of such estate is situated.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.02
- number: '5307.03'
  heading: Filing of petition - contents
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: A person entitled to partition of an estate may file his petition therefor
    in the court of common pleas, setting forth the nature of his title, a pertinent
    description of the lands, tenements, or hereditaments of which partition is demanded,
    and naming each tenant in common, coparcener, or other person interested therein,
    as defendant. When the title to such estate came to such person by descent or
    devise upon the death of an inhabitant of this state, a partition thereof shall
    not be ordered by the court within one year from the date of the death of such
    decedent, unless the petition sets forth and it is proved that all claims against
    the estate of such decedent have been paid, or secured to be paid, or that the
    personal property of the deceased is sufficient to pay them.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.03
- number: '5307.04'
  heading: Order of partition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: If the court of common pleas finds that the plaintiff in an action for partition
    has a legal right to any part of the estate, it shall order partition of the estate
    in favor of the plaintiff or all interested parties, appoint one suitable disinterested
    person to be the commissioner to make the partition, and issue a writ of partition.
    The court on its own motion may, and upon motion of a party or any other interested
    person shall, appoint one or two additional suitable persons to be commissioners.
    If the estate to be partitioned extends beyond the county in which the action
    is commenced, the court may appoint a separate commissioner or commissioners,
    not to exceed three, to make the partition of that portion of the estate located
    in the other county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.04
- number: '5307.041'
  heading: Share of survivorship tenants
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: If partition is granted among survivorship tenants, the court shall determine
    the share to which each is entitled as if the tenants were tenants in common.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.041
- number: '5307.05'
  heading: Writ of partition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: 'A writ of partition issued under section 5307.04 of the Revised Code may
    be directed to the sheriff of any of the counties in which any part of the estate
    lies and shall command the sheriff that, by the oaths of the commissioner or commissioners,
    the sheriff shall cause to be set off and divided to the plaintiff or each interested
    party, whatever part and proportion of the estate as the court of common pleas
    orders.

    The oaths of the commissioner or commissioners may be administered by the sheriff.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.05
- number: '5307.06'
  heading: Duty of commissioners in making partition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: 'In making a partition, the commissioner or commissioners shall view and examine
    the estate and, on their oaths and having due regard to the improvements, situation,
    and quality of the different parts, set it apart in lots that will be most advantageous
    and equitable.

    If the commissioner or commissioners set the estate apart in lots, it shall be
    surveyed and platted in compliance with sections 711.001 to 711.15 of the Revised
    Code and with rules adopted pursuant to those sections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.06
- number: '5307.07'
  heading: Partition of multiple tracts
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: When partition of more than one tract is demanded, the commissioner or commissioners
    shall set off to each plaintiff or interested party the plaintiff's or interested
    party's proper proportion in each of the several tracts unless the tracts are
    owned by the same proprietors in like proportion in each tract, in which case
    the share of any proprietor, in all the tracts, may be set off to the proprietor
    according to the best discretion of the commissioner or commissioners. If the
    commissioner or commissioners divide any tract, it shall be surveyed and platted
    in compliance with sections 711.001 to 711.15 of the Revised Code and with rules
    adopted pursuant to those sections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.07
- number: '5307.08'
  heading: Amicable partition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: Before a writ of partition is issued under section 5307.04 of the Revised
    Code, the person of whom partition is demanded may appear in the court of common
    pleas in person or by attorney and consent to a partition of the estate agreeable
    to the prayer and facts set forth in the petition, which amicable partition, when
    made and recorded, shall be valid and binding between the parties to the partition.
    In cases in which a requested partition is consented to under this section and
    in all cases in which the lands are divided among the parties by the commissioner
    or commissioners, the court shall order the sheriff to execute and deliver a deed
    to each person entitled to a deed for the portion set off and assigned to the
    person. Land divided pursuant to this section shall be surveyed and platted in
    compliance with sections 711.001 to 711.15 of the Revised Code and with rules
    adopted pursuant to those sections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.08
- number: '5307.09'
  heading: Proceedings where estate cannot be divided without loss of value
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: When the commissioner or commissioners are of opinion that the estate cannot
    be divided according to the demand of the writ of partition without manifest injury
    to its value, the commissioner or commissioners shall return that fact to the
    court of common pleas with a just valuation of the estate. If the court approves
    the return and if one or more of the parties elects to take the estate at the
    appraised value, it shall be adjudged to them, upon their paying to the other
    parties their proportion of its appraised value, according to their respective
    rights, or securing it as provided in section 5307.10 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.09
- number: '5307.10'
  heading: Terms of payment when estate taken by party - execution of conveyance
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: If one or more of the parties in the action for partition elects to take the
    estate at the appraised value, unless on good cause shown by special order the
    court of common pleas directs the entire payment to be made in cash, or all the
    parties in interest agree thereon, the terms of payment shall be one third cash,
    one third in one year, and one third in two years, with interest, the deferred
    payments to be secured to the satisfaction of the court. On payment being made
    in full, or in part, with sufficient security for the remainder, as provided in
    this section, according to the order of the court the sheriff shall make and execute
    a conveyance to the parties electing to take it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.10
- number: '5307.11'
  heading: Sale of estate when no election made
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: 'If no party elects to take the estate, at the insistence of a party, the
    court of common pleas may order a sale of the estate at public auction by one
    of the following:

    (A) The sheriff who executed the writ of partition or the sheriff''s successor
    in office;

    (B) An auctioneer who is licensed under Chapter 4707. of the Revised Code and
    who is qualified under section 4707.021 of the Revised Code to conduct an auction
    of real property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.11
- number: '5307.12'
  heading: Conduct of sale - terms
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: '(A) A sale of an estate under section 5307.11 of the Revised Code shall be
    made as follows:

    (1) If the sale is made by a sheriff, the sale shall be made at the door of the
    courthouse, unless for good cause the court of common pleas directs it to be made
    on the premises. The sale shall be conducted as upon execution, except that it
    is unnecessary to appraise the estate.

    (2) If the sale is made by a licensed auctioneer, the sale shall be made pursuant
    to Chapter 4707. of the Revised Code.

    (B) No property shall be sold for less than two thirds of the value returned by
    the commissioner or commissioners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.12
- number: '5307.13'
  heading: Confirmation of sale and execution of conveyance
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: On the return of the proceedings to sell the estate, the court of common pleas
    shall examine them. If a sale has been made, and the court approves it, the sheriff
    shall execute and deliver a deed to the purchaser on receiving payment of the
    consideration money, or taking sufficient security for that payment, to the satisfaction
    of the court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.13
- number: '5307.14'
  heading: Distribution of proceeds; auctioneer's compensation and reimbursement for
    expenses; sheriff's liability
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: '(A) Subject to division (B) of this section, the money or securities arising
    from a sale of, or an election to take an estate, shall be distributed and paid,
    by order of the court of common pleas, to the parties entitled to the money or
    securities, in lieu of their respective parts and proportions of the estate, according
    to their rights in the estate.

    (B) When a sale is made by a licensed auctioneer, the auctioneer shall receive
    compensation and reimbursement for expenses as described in section 2335.021 of
    the Revised Code, that the court shall apportion as costs to the parties as the
    court finds reasonable and proper.

    (C) All receipts of money or securities by the sheriff arising from a sale or
    election are in the sheriff''s official capacity, and the sureties on the sheriff''s
    official bond are liable for any misapplication of those receipts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.14
- number: '5307.15'
  heading: Proceedings when estate has been once offered and not sold
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: When the estate has been offered once and not sold, alias writs for its sale
    may issue as often as need be. The court of common pleas may order a revaluation
    by up to three suitable disinterested persons and direct a sale of the estate
    at not less than two thirds of the revaluation, or, if deemed for the interest
    of the parties, the court may order a sale without a revaluation, at not less
    than a sum it fixes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.15
- number: '5307.16'
  heading: Execution and delivery by sheriff or officer performing duties of sheriff
    where property not conveyed
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: If an officer or auctioneer has not conveyed land sold or elected to be taken
    in a proceeding for partition, the court of common pleas on being first satisfied
    that such sale or election was regularly made, and that the purchase money has
    been fully paid or secured, on motion, may order the sheriff of the county, or
    officer performing the duties of sheriff, to execute and deliver to the purchaser,
    or person electing to take the property, a deed for the property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.16
- number: '5307.17'
  heading: Dower assigned to widow - exceptions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: '(A) When a widow is entitled to dower in an estate of which partition is
    sought, dower must be assigned her in the estate, except in the following cases:

    (1) When an assignment of dower already has been made;

    (2) When, by answer, she has elected to be endowed out of the proceeds of a sale
    of the estate, and the commissioner or commissioners do not make partition but
    return a valuation of it;

    (3) When the right of dower extends only to an undivided interest in the estate.

    (B) In cases in which the right of dower extends only to an undivided interest
    in the estate, and in cases in which an undivided interest is subject to a life
    estate, and the tenant for life has not, by answer, elected to receive the value
    of the tenant for life''s estate out of the proceeds of a sale of such interest,
    if an appraisement of the estate is to be returned, the commissioner or commissioners
    may assign the dower or set off the life estate, or, if the commissioner or commissioners
    find it for the interest of the parties to do so, the commissioner or commissioners
    may appraise the whole interest, and the widow and the tenant for life shall receive
    the value of their interests out of the proceeds of a sale of it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.17
- number: '5307.18'
  heading: Commissioners to set off dower
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: The commissioner or commissioners shall set off to a widow her dower in the
    estate under section 5307.17 of the Revised Code. In the performance of that duty,
    the commissioner or commissioners shall be governed by, and the proceedings shall
    conform to, sections 5305.01 to 5305.22 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.18
- number: '5307.19'
  heading: Power of guardian to act for ward in partition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: 'As used in this section and section 5307.20 of the Revised Code, "incompetent
    person" means a person who is so mentally impaired, as a result of a mental or
    physical illness or disability, as a result of an intellectual disability, or
    as a result of chronic substance abuse, that the person is incapable of taking
    proper care of the person''s self or property or fails to provide for the person''s
    family or other persons for whom the person is charged by law to provide.

    The guardian of a minor or incompetent person, on behalf of the guardian''s ward,
    may perform any act, matter, or thing respecting the partition of an estate which
    such ward could do under sections 5307.01 to 5307.25 of the Revised Code, if the
    ward were of age and of sound mind. On behalf of such ward, the guardian may elect
    to take the estate, when it cannot be divided without injury, and make payments
    therefor on the ward''s behalf.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.19
- number: '5307.20'
  heading: Powers of foreign guardian
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: A person appointed according to the laws of any other state or country to
    take charge of the estate of an incompetent person not a resident of this state,
    upon being authorized in this state to take charge of such estate situated therein,
    may act in the partition of the estate the same as the guardian of an incompetent
    person is authorized to do by section 5307.19 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.20
- number: '5307.21'
  heading: Actions by one coparcener against another
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: One tenant in common, or coparcener, may recover from another tenant in common,
    or coparcener his share of rents and profits received by such tenant in common
    or coparcener from the estate, according to the justice and equity of the case.
    One coparcener may maintain an action of waste against another coparcener. No
    coparcener shall have any privileges over another coparcener, in any election,
    division, partition, or matter to be made or done, concerning lands which have
    descended.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.21
- number: '5307.22'
  heading: Partition of property belonging to religious corporations
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: When two or more religious denominations, or other societies, or associations,
    have united in a corporation, and as such corporation acquire title to real estate
    in this state, and they subsequently agree to separate and form two or more corporations
    under the laws of this state, either corporation, after such separate organization,
    may file its petition for partition under section 5307.03 of the Revised Code
    of such property so acquired and held.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.22
- number: '5307.23'
  heading: Partition of property belonging to religious societies
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: When two or more religious societies or congregations, by gift or purchase
    have acquired land upon which to erect a house of public worship, and other buildings
    for church or school purposes, and for a cemetery, in common, and either of such
    societies or congregations desires to abandon the joint use of such house of worship,
    or other erections, it may commence an action for the partition of the use of
    such common property, except the cemetery, which may continue to be used in common.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.23
- number: '5307.24'
  heading: Effect of partition of religious property
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: If the court of common pleas finds that partition, in cases mentioned in section
    5307.23 of the Revised Code, can be so made as to occasion no confusion or inconvenience
    to either party in the separate use of the common property, it may order the partition
    thereof. The judgment shall specify for what purpose partition of the use is made,
    and how and for what purpose the use of the premises allotted to each party are
    to be occupied. In no case shall such property, or any part thereof be occupied
    for any other purpose than the erection of a house of worship, and other erections
    connected therewith.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.24
- number: '5307.25'
  heading: Costs and expenses to be equitably taxed
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5307'
    name: Partition
  text: Having regard to the interest of the parties, the benefit each may derive
    from a partition, and according to equity, the court of common pleas shall tax
    the costs and expenses which accrue in the action, including reasonable counsel
    fees, which must be paid to plaintiff's counsel unless the court awards some part
    thereof to other counsel for services in the case for the common benefit of all
    the parties; and execution may issue therefor as in other cases.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5307.25
- number: '5309.01'
  heading: Registration of land title definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'As used in this chapter and Chapter 5310. of the Revised Code:

    (A) "Certificate of title" includes all memorials and notations noted under a
    certificate of title.

    (B) "Trust deed in the nature of a mortgage" is a mortgage and subject to the
    same rules as a mortgage.

    (C) "Probate court" has the same meaning as in section 2101.01 of the Revised
    Code.

    (D) "Registered land" means any land registered under this chapter and Chapter
    5310. of the Revised Code.

    (E) "Housing accommodations" and "restrictive covenant" have the same meanings
    as in section 4112.01 of the Revised Code.'
  history: null
