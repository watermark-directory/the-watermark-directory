- number: '5301.28'
  heading: Release of mortgage - assignment
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'When the mortgagee of property within this state, or the party to whom the
    mortgage has been assigned, either by a separate instrument, or in writing on
    that mortgage, or on the margin of the record of the mortgage, which assignment,
    if in writing on the mortgage or on the margin of the record of the mortgage,
    need not be acknowledged, receives payment of any part of the money due the holder
    of the mortgage, and secured by the mortgage, and enters satisfaction or a receipt
    for the payment, either on the mortgage or its record, that satisfaction or receipt,
    when entered on the record, or copied on the record from the original mortgage
    by the county recorder, will release the mortgage to the extent of the receipt.
    In all cases when a mortgage has been assigned in writing on that mortgage, the
    recorder shall copy the assignment from the original mortgage upon the margin
    of the record of the mortgage before the satisfaction or receipt is entered upon
    the record of the mortgage.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code, the county recorder may require
    that all satisfactions of mortgages be made by separate instrument. The original
    instrument bearing the proper endorsement may be used as such a separate instrument.
    That separate instrument shall be recorded in the county recorder''s official
    records. The county recorder shall charge the fee for the recording as provided
    by section 317.32 of the Revised Code for recording mortgages.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.28
- number: '5301.29'
  heading: Releases of mortgages made valid
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'When any release, cancellation, or satisfaction of a mortgage of real estate
    has been of record for more than twenty-one years in the office of the county
    recorder of the county in which such real estate is situated, and the record thereof
    shows that there is a defect in such release, cancellation, or satisfaction, such
    release, cancellation, or satisfaction and the record thereof shall be cured of
    such defect, if such defect is due to any of the following:

    (A) It purports to be signed by an agent or attorney of the mortgagee or a trustee,
    and no power of attorney or other evidence of authority so to release, cancel,
    or satisfy such mortgage is of record.

    (B) It was signed by less than all of two or more executors, administrators, guardians,
    assignees in insolvency, or trustees.

    (C) The record of such release, cancellation, or satisfaction is not attested
    by the recorder.

    (D) The release, cancellation, or satisfaction by a corporation is executed by
    officers thereof without signing the name of the corporation thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.29
- number: '5301.291'
  heading: Mortgage release, cancellation, or satisfaction not defective
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'No real estate mortgage release, cancellation, or satisfaction of record
    in the office of the county recorder of the county within this state in which
    such real estate is situated shall be deemed defective because:

    (A) The executor, administrator, guardian, assignee, or trustee signed it individually
    instead of in his representative or official capacity.

    (B) The release, cancellation, or satisfaction is by separate instrument, and
    the certificate of acknowledgment is not on the same sheet of paper as the release,
    cancellation, or satisfaction.

    (C) A satisfaction was not recorded within ninety days as required by division
    (B) of section 5301.36 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.291
- number: '5301.30'
  heading: Expiration of mortgage lien - limitation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: The record of any mortgage which remains unsatisfied or unreleased of record
    for more than twenty-one years after the date of the mortgage or twenty-one years
    after the stated maturity date of the principal sum, if a stated date of maturity
    is provided in the mortgage, whichever is later, secured as shown in the record
    of such mortgage, does not give notice to or put on inquiry any person dealing
    with the land described in such mortgage that such mortgage debt remains unpaid
    or has been extended or renewed. As to subsequent bona fide purchasers, mortgagees,
    and other persons dealing with such land for value, the lien of such mortgage
    has expired. The mortgage creditor may at any time refile in the county recorder's
    office the mortgage or a sworn copy thereof for record, together with an affidavit
    stating the amount remaining due thereon and the due date thereof, whether or
    not such date has been extended. Subject to the rights of bona fide purchasers,
    mortgagees, and other persons dealing with such land for value, whose rights were
    acquired or vested between such expiration and refiling, such refiling is constructive
    notice of such mortgage only for a period of twenty-one years after such refiling,
    or for twenty-one years after the stated maturity of the debt, whichever is the
    longer period.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.30
- number: '5301.31'
  heading: Assignment or partial release in margin of original record
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'Except in counties in which a separate instrument is required to assign or
    partially release a mortgage as described in section 5301.32 of the Revised Code,
    a mortgage may be assigned or partially released by the holder of the mortgage,
    by writing the assignment or partial release on the original mortgage or upon
    the margin of the record of the original mortgage and signing it. The assignment
    or partial release need not be acknowledged, but, if it is written upon the margin
    of the record of the original mortgage, the signing shall be attested by the county
    recorder. The assignment, whether it is upon the original mortgage, upon the margin
    of the record of the original mortgage, or by separate instrument, shall transfer
    not only the lien of the mortgage but also all interest in the land described
    in the mortgage. An assignment of a mortgage shall contain the then current mailing
    address of the assignee. The signature of a person on the assignment or partial
    release may be a facsimile of that person''s signature. A facsimile of a signature
    on an assignment or partial release is equivalent to and constitutes the written
    signature of the person for all requirements regarding mortgage assignments or
    partial releases.

    For entering an assignment or partial release of a mortgage upon the margin of
    the record of the original mortgage or for attesting it, the recorder shall be
    entitled to the fee provided by section 317.32 of the Revised Code for recording
    the assignment and satisfaction of mortgages.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.31
- number: '5301.32'
  heading: Assignment or partial release by separate instrument
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'A mortgage may be assigned or partially released by a separate instrument
    of assignment or partial release, acknowledged as provided by section 5301.01
    of the Revised Code. The separate instrument of assignment or partial release
    shall be recorded in the county recorder''s official records. The county recorder
    shall be entitled to charge the fee for that recording as provided by section
    317.32 of the Revised Code for recording deeds. The signature of a person on the
    assignment or partial release may be a facsimile of that person''s signature.
    A facsimile of a signature on an assignment or partial release is equivalent to
    and constitutes the written signature of the person for all requirements regarding
    mortgage assignments or partial releases.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code, the county recorder may require
    that all assignments and partial releases of mortgages be by separate instruments.
    The original instrument bearing the proper endorsement may be used as the separate
    instrument.

    An assignment of a mortgage shall contain the then current mailing address of
    the assignee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.32
- number: '5301.33'
  heading: Cancellation, release, and assignment of leases
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'Except in counties where deeds or other separate instruments are required
    as provided in this section, a lease, whether or not renewable forever, that is
    recorded in any county recorder''s office, may be canceled or partially released
    by the lessor and lessee, or assigned by either of them, by writing the cancellation,
    partial release, or assignment on the original lease, or upon the margin of the
    record of the original lease, and by signing it. That cancellation, partial release,
    or assignment need not be acknowledged, but if written on the margin of the record,
    the signing shall be attested to by the county recorder. The assignment by the
    lessee, whether it is upon the lease, or upon the margin of the record of the
    lease, or by separate instrument, shall transfer all interest held by the lessee
    under the lease in the premises described in the lease, unless otherwise stated
    in the lease or in the assignment. For copying the cancellation, partial release,
    or assignment upon the margin of the record, if written upon the original instrument,
    or for attesting it, if written upon the margin of the record, the county recorder
    shall charge the fee provided by section 317.32 of the Revised Code for recording
    the assignment and satisfaction of mortgages.

    A lease, whether or not renewable forever, that is recorded in any county recorder''s
    office, also may be canceled, partially released, or assigned by deed or by other
    separate instrument acknowledged as provided in section 5301.01 of the Revised
    Code. Unless in the form of a deed, a separate instrument of cancellation, partial
    release, or assignment shall be recorded in the official records provided for
    by section 317.08 of the Revised Code. The county recorder shall charge the fee
    for that recording as provided in section 317.32 of the Revised Code for recording
    deeds.

    If a lease has been canceled, partially released, or assigned by deed or by other
    separate instrument and that deed or other separate instrument recites the county
    recorder''s file number of the original lease or the volume and page of the record
    in which the original lease is recorded, the county recorder shall note on the
    margin of the record of the original lease the county recorder''s file number
    of the deed or other separate instrument or the volume and page of the record
    in which the same is recorded.

    "Lessor" and "lessee" as used in this section include an assignee of the interest
    of either. "Lease" as used in this section includes a memorandum of lease provided
    for by section 5301.251 of the Revised Code. This section does not permit the
    assignment of any lease if the assignment is prohibited by the terms of the lease.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code, the county recorder may require
    that all cancellations, partial releases, and assignments of leases be by deed
    or other separate instrument. The original instrument bearing the proper endorsement
    may be used as such separate instrument.'
