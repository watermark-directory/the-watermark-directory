- number: '5301.54'
  heading: Effect of changes
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: Nothing contained in sections 5301.47 to 5301.56, inclusive, of the Revised
