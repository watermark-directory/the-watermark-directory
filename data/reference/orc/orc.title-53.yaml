- number: '5302.21'
  heading: Prior tenancy by the entireties or survivorship tenancy
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: '(A) Sections 5302.17 to 5302.20 of the Revised Code do not affect deeds that
    were executed and recorded prior to the effective date of this section and that
    created a tenancy by the entireties in a husband and wife pursuant to section
    5302.17 of the Revised Code as it existed prior to the effective date of this
    section. If spouses covered by such deeds are tenants by the entireties on the
    day prior to the effective date of this section, such deeds continue to be valid
    on and after such effective date, and, unless they choose to do so, the spouses
    do not have to prepare a deed, as described in section 5302.17 of the Revised
    Code as effective on the effective date of this section, creating in themselves
    a survivorship tenancy.

    (B) Sections 5302.17 to 5302.20 of the Revised Code do not affect conveyances
    or devises of real property to two or more persons for their joint lives and then
    to the survivor or survivors of them, that occurred prior to the effective date
    of this section and that did not involve tenancies by the entireties. These conveyances
    and devises, if they are valid on the effective date of this section, continue
    to be valid on and after that date. Unless persons so holding property choose
    to do so, they do not have to prepare a deed, as described in section 5302.17
    of the Revised Code as effective on the effective date of this section, creating
    in themselves a survivorship tenancy.'
