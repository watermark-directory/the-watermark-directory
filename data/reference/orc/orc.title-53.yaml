- number: '5309.10'
  heading: Assent by spouse
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: If the application to register the title to land or to any interest in land
    is made by a married person, the spouse of that person shall signify the spouse's
    assent to the registration as prayed for by endorsement on the application acknowledged
    as a deed, or by a separate instrument so acknowledged and filed with the application.
    If the spouses are separated and living apart, or either one refuses to consent
    to the application of the other, the assent of the nonapplicant spouse is not
    necessary, and in that case the nonapplicant spouse shall be treated and named
    as a party defendant to the application.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.10
- number: '5309.11'
  heading: Application by nonresident
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: If the application to register the title to land or to any interest therein
    is made by a nonresident of the state, he shall, in his petition, or in a separate
    paper to be filed in the case, give the name, residence, and post-office address
    of someone residing in the state, upon whom, as his agent, service of notice can
    be made in relation to any matter arising under or in connection with said application,
    and agree that such service on such agent shall have the same effect as if made
    on the applicant or owner personally within the state. Upon the death, removal,
    or incapacity of such agent for service, such nonresident shall appoint another
    in his stead and in default thereof the application may be dismissed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.11
- number: '5309.12'
  heading: Parties
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'The applicant desiring to register the title to land or to any interest therein
    shall be regarded as plaintiff and all other persons named in the application
    and to be affected by the decree shall by name be entered in the caption of the
    petition and treated as defendants, and all persons not so named, whether mentioned
    in the application or not, shall be included and considered as defendants under
    the designation, which shall appear in the caption of the petition, "all other
    persons, if any, having any right or interest in or lien upon the lands, or any
    part thereof, described herein."

    When the names of any persons or heirs or devisees of a deceased person, necessary
    or proper to be made parties defendant to an application, are unknown to the applicant
    after diligent inquiry and research, the character and extent of which shall be
    stated, or if the applicant is unable to ascertain whether a person who is a necessary
    party is living or dead, or if dead whether he died testate or intestate, the
    applicant shall so state and allege in his application or any amendment thereof
    and such persons and their heirs or devisees shall thereupon be included and considered
    as defendants to such application under the term and designation, "all other persons,
    if any, having any right or interest in or lien upon land or any part thereof
    described herein," or under the designation, "unknown heirs, and devisees of __________"
    as the case may require, and notified by publication as provided in section 5309.15
    of the Revised Code. When the place of residence or post-office address of any
    person, whose residence or post-office address is required to be given, is unknown,
    it shall be so stated and alleged, if the applicant also alleges that upon diligent
    inquiry and research, stating of what such inquiry and research consisted, he
    has been unable to ascertain such residence or address. Thereupon such person
    shall be notified by publication as provided in such section, as one whose residence
    and post-office address are unknown.

    If any person named as a defendant is known by the plaintiff to be under disability
    of any kind, that fact and the nature thereof, and the name, place of residence,
    and post-office address of the guardian or trustee of such person shall be stated
    in the application or an amendment thereof, or reason given for the omission of
    such information.

    The probate court or the court of common pleas may order an application to be
    amended in any particular, not inconsistent with sections 5309.02 to 5310.21,
    inclusive, of the Revised Code, but all amendments shall be in writing signed
    and sworn to the same as the original.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.12
- number: '5309.13'
  heading: Record and index of applications
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: After the filing of the application to register the title to land or to any
    interest therein and before registration, the land described in such application
    may be dealt with and instruments relating thereto may be recorded and indexed,
    in the same manner as if no such application had been filed. As soon as an application
    is disposed of, the clerk of the probate court or the clerk of the court of common
    pleas shall make a memorandum stating the disposition of the case and shall send
    it to the county recorder, who shall record it in the official records.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.13
- number: '5309.14'
  heading: Application referred to examiner of titles for investigation - report
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Immediately after the filing of the application to register the title to land
    or to any interest therein, the probate court or the court of common pleas shall
    enter an order referring it to one of the examiners of titles, who shall search
    the records and investigate all facts stated and all allegations made in the petition,
    or otherwise brought to his notice. Such examiner shall investigate particularly
    whether the land or any part thereof is occupied by, or is in the possession,
    actual or constructive, of any person other than the applicant and if so, by whom,
    the nature of the occupation or possession, and by what right; and whether the
    boundaries and monuments or objects called for marking such land, as shown by
    the record title, appear to be reasonably certain and definite. Such examiner
    shall file in the case a report on his investigation, concluding with a certificate
    of his opinion upon the title and the necessity for a resurvey of the land and
    giving the names, residences, and post-office addresses, if known or ascertainable
    by reasonable diligence, of any persons in addition to those named in the petition
    which in the opinion of the examiner are necessary or proper parties to a complete
    determination of the case and to the settling and determination by the court of
    all apparent or real interests in or liens or charges upon the lands described
    in the application or any part thereof. Such persons shall be made additional
    parties defendant to the application by amendment or by order of the court before
    the publication of the notice provided for in section 5309.15 of the Revised Code.
    The examiner may require the applicant to file with him affidavits or other evidence
    relating to the title. Every report of an examiner shall be based upon a personal
    inspection and examination of the record or of a certified copy of the record
    of every instrument or proceeding affecting the title to said land for a period
    of at least seventy-five years prior to the filing of the application if the record
    title extends back that far. The clerk of the probate court or the clerk of the
    court of common pleas shall give notice to the applicant or his attorney of the
    filing of such report. If the opinion of the examiner is adverse to the applicant,
    such applicant shall, except in cases provided for in section 5309.66 of the Revised
    Code, be allowed a reasonable time by the court in which to elect to proceed further
    or to withdraw his application. The election shall be made in writing and filed
    with the clerk.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.14
- number: '5309.15'
  heading: Publication of notice of filing and substance of application
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'After the investigation authorized by section 5309.14 of the Revised Code,
    if, in the opinion of the examiner of titles, the applicant has a good title as
    alleged, and proper for registration, or if the applicant after an adverse opinion
    of the examiner elects to proceed further, the clerk of the probate court or the
    clerk of the court of common pleas shall, upon the filing of the examiner''s report
    or the applicant''s election, cause notice of the filing, substance, and prayer
    of the application to be published once a week for three consecutive weeks in
    a newspaper, which may be designated by the applicant, published and of general
    circulation in each county where any portion of the land lies, or if no newspaper
    is published in any of such counties, then in a newspaper so designated, published,
    and of general circulation in an adjoining county. The expense of such publication
    shall be paid by the applicant and taxed as costs in the case. The notice shall
    be issued by order of the court, attested by the clerk, and shall be in form substantially
    as follows:

    "________________ Court of __________ County, Ohio.

    A. B.,

    plaintiff,

    vs. APPLICATION TO REGISTER TITLE TO LAND.

    C. D. et al,

    defendants

    To (here insert the names, residences, and addresses of all the defendants so
    far as known), and to all persons having any interest in or lien or charge upon
    the lands or any part thereof described herein. You are hereby notified that an
    application has been filed in said court by _________________ to settle, determine,
    and remove all clouds from and register such person''s (or such persons'') title
    in and to, and to settle, determine, and register all lesser or other estates
    and interests in, and all liens and charges upon, the following described land
    (insert description).

    You are hereby required to answer said application on or before the _______ day
    of ________, __________ and show cause, if any you have, why the prayer of said
    application should not be granted. And unless you appear at said court on or before
    the time aforesaid and make answer or other plea to said application, your default
    will be recorded, the said application will be taken as confessed, and you will
    be forever barred from contesting said application or any decree entered thereon.

    WITNESS ___________________ Judge of said Court, this ________ day of _______,
    _____

    Attest:"

    The form of said notice in cases mentioned in section 5309.66 of the Revised Code
    may be varied as the facts require.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.15
- number: '5309.16'
  heading: Answer day
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'The answer day of the notice set forth in section 5309.15 of the Revised
    Code shall be the third Saturday after the publication is completed. The probate
    court or the court of common pleas shall within seven days after the first publication
    of said notice in a newspaper, cause a copy of such published notice to be served
    on the defendants by registered letter, mailed by the clerk of the probate court
    or the clerk of the court of common pleas, with a five day return card thereon,
    to every defendant named in said notice whose address is given or known.

    The court shall cause a copy of the notice attested by the clerk to be posted
    by the sheriff in a conspicuous place on each parcel of land included in the application,
    at least fourteen days before the answer day of such notice. Such sheriff''s return
    shall be proof of such posting. The court may cause additional notice of the application
    to be given or additional persons to be made parties and served as provided by
    law in civil actions. The court shall, so far as it considers it possible, require
    proof of actual notice to all adjoining owners and to all persons resident of
    the state who appear to be in possession or occupancy of, or to have any interest
    in or claim to, or lien or charge upon the land, or any part thereof, included
    in the application. If any registered letter containing such published notice,
    mailed by the clerk to a defendant named as a resident of the state, is returned
    undelivered, such notice shall be remailed by the clerk to any other address of
    such party of which the plaintiff is able to learn and which he shall designate
    by amendment of his application filed in the case. If there is no other address,
    or if said letter is again returned undelivered, the clerk shall thereupon, on
    the praecipe of the plaintiff, issue summons for such defendant as in other cases.
    Such summons shall be directed to the sheriff of each of the counties in which
    the plaintiff, in his application or any amendment thereof, states that such defendant
    resides. Such summons shall have attached thereto an attested copy of said published
    notice. If said summons and notice are returned unserved because the defendant
    cannot be found, then such defendant may be regarded as having been served by
    such published notice as a person whose place of residence and post-office address
    are unknown. In all cases, whether of original registration or subsequently arising
    in any way in reference to registered land or any interest in or lien or charge
    upon it, in which notice is required or may be ordered by the court to be given
    to parties by the clerk by publishing or mailing, or both, the certificate of
    the clerk, stating that he has served the notices as required or as directed by
    the court and stating which of the letters mailed by him containing said notices
    have been returned to him undelivered, shall be filed in the case before any order
    or decree is taken or made and shall be proof of such service.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.16
- number: '5309.17'
  heading: Guardian ad litem - duties, compensation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When proof of service of all orders of notice issued and when the probate
    court or the court of common pleas is satisfied that all necessary defendants
    are properly before the court, the court shall appoint a disinterested person,
    other than the examiner of titles by whom the title was examined and reported
    upon, to act as guardian ad litem for persons under any disability, and for all
    persons not in being, unascertained, unknown, or out of the state, who may have
    an interest, which is vested, contingent, in expectancy, or otherwise. The compensation
    of the guardian under the schedule of fees set forth in section 5310.15 of the
    Revised Code shall be determined by the court and paid as part of the costs in
    the case. Such guardian shall file an answer in the case and actively ascertain
    and protect, so far as is reasonably possible, the interests of all persons for
    whom he was appointed guardian for the suit and particularly represent, act for,
    and protect the interests and rights of all persons not in being.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.17
- number: '5309.18'
  heading: Answer or cross-petition in land registration case
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Any person who claims an interest in, or who may be affected by the judgment
    in a land registration case, whether or not named in the notice required by section
    5309.15 of the Revised Code, may appear and file an answer or other pleas on or
    before the answer day, or within such further time as the probate court or the
    court of common pleas allows. Such answer shall state all objections to the application,
    shall set forth the interest claimed by the person who files it, and shall be
    signed and sworn to by him or by a person in his behalf . Any person claiming
    an interest in the land may by answer or other plea oppose the application for
    registration of the land as belonging to the plaintiff, or may by cross-petition
    set up a demand to have the title claimed by the plaintiff registered in the name
    of the cross-petitioner. If a person answering claims an interest in, or lien
    upon the property separate from that claimed by the plaintiff, such person may
    ask to have his title to such interest or lien registered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.18
- number: '5309.19'
  heading: Order of default and decree of title and registration - final order
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: If no person appears and answers or files other plea to an application in
    a land registration case within the time allowed, after the appointment of a guardian
    ad litem and the filing of an answer by him as required in section 5309.17 of
    the Revised Code, the probate court or the court of common pleas may upon motion
    of the applicant, no reason to the contrary appearing, order a general default
    to be recorded and the application to be taken for confessed and a decree to be
    entered confirming the title of the applicant and ordering registration of such
    title. The court shall in no case, either upon default or after a hearing, make
    a final order directing the registration of title to land until there is filed
    in the case the certificate of an examiner of titles to whom the matter shall
    be referred for that purpose, stating that all necessary and proper persons to
    a complete determination of the case have been made parties and properly brought
    before the court, and that the entry of such order would be correct. The court
    shall not be bound by the report of such examiner but may require further proof.
    By the description in the application and published notice, "all persons having
    any interest in or lien upon the land or any part thereof," all the world, except
    defendants personally served, shall be regarded as having been made parties defendant
    and properly served.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.19
- number: '5309.20'
  heading: Cause may be referred to examiner of titles for hearing and report
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'If, in any land registration case, an answer is filed raising an issue, the
    cause shall be set down for hearing on the motion of either party. The probate
    court or the court of common pleas may refer the cause or any part thereof to
    one of the examiners of titles as master, to hear the parties and their evidence,
    and make report of such evidence and his findings on it to the court. Such examiner''s
    report shall have the same effect as that of a master appointed by the court in
    other cases and he shall proceed according to the rules of said court applicable
    to masters, except as such rules are modified by sections 5309.02 to 5310.21,
    inclusive, of the Revised Code, or by special or general orders of the court.
    The court may before decree, require a survey to be made by the county engineer
    for the purpose of determining boundaries and a more accurate and definite description
    of the land to be prepared and may order durable monuments to be set by said engineer
    and referred to in such description.

    The expense of the survey and monuments shall be taxed in the costs of the case
    and may be apportioned among the parties as justice requires. If no persons appear
    to oppose the application to register, such expense shall be borne by the applicant.
    If a survey is ordered, the clerk of the probate court or the clerk of the court
    of common pleas shall, at least five days prior to the time such survey is to
    be made, mail a notice thereof to each owner and occupant of adjoining lands at
    the addresses given in the application or any amendments thereof. Said engineer
    may call witnesses at the time and place of making such survey or at such other
    time and place as he may appoint, administer oaths, and take and report to the
    court evidence pertinent to said survey and boundaries, and may adjourn the making
    of said survey and the taking of said evidence from time to time until such survey
    is completed. Said engineer''s report shall state whether any of the boundary
    lines are in dispute.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.20
- number: '5309.21'
  heading: Effect of decree dismissing application
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: In a land registration case, if the probate court or the court of common pleas
    finds that the applicant does not have a title proper for registration, a decree
    shall be entered dismissing the application. Such decree may be ordered to be
    without prejudice, in whole or in part; but unless it is so ordered it shall bind
    the parties, their privies, and the land in respect to any issue of fact or law
    which has been tried and determined. The dismissal of the application of the plaintiff
    shall in no way affect any cross-petition filed in the case, but the issues raised
    by such cross-petition may be tried and determined by the court notwithstanding
    such dismissal, and all parties, their privies, and the land shall be bound by
    such determination. All statutes of limitation relating to the recovery of possession
    or title to any interest in land, or the enforcement of any lien or charge on
    such land, shall apply and be given effect only in favor of and against the applicant
    or plaintiff, in all actions or proceedings under sections 5309.02 to 5310.21,
    inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.21
- number: '5309.22'
  heading: Death of applicant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: If the applicant in a land registration case dies between the filing of the
    application and the final decree thereon, the proceedings shall not abate, but
    shall be completed in the name of the widow or widower and heirs and devisees
    of the applicant. If the probate court or the court of common pleas orders the
    land registered, such court shall order that the certificate issue to such widow
    or widower and heirs and devisees of the applicant, according to their respective
    rights and interests, but subject to the right of the creditors of the deceased
    to have said land sold to pay his debts and subject to the right to contest any
    will of such deceased applicant. The personal representative of the deceased,
    the relict, or any of said heirs or devisees may by supplemental petition set
    up the facts relating to the transmission of the title to said land by reason
    of the death of the original applicant and cause all necessary new persons to
    be made parties and properly brought before the court as upon the filing of an
    application, or by summons or other process as provided by law in civil actions
    as the court directs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.22
- number: '5309.23'
  heading: Decree of confirmation and registration - effect
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: If the probate court or the court of common pleas after a hearing in a land
    registration case finds that the applicant has title in whole or in part as stated
    in his application, and proper for registration, then to the extent of the title
    so found a decree of confirmation and registration shall be entered, which shall
    have the effect of a decree in rem and, subject only to the exceptions stated
    in section 5309.28 of the Revised Code, shall bind the land and all interests
    and rights therein and liens and charges thereon. After the expiration of the
    time for appeal and except as otherwise provided in sections 5309.02 to 5310.21,
    inclusive, of the Revised Code, such decree of confirmation and registration shall
    be absolutely conclusive against all persons, including the state or any political
    subdivision thereof, whether mentioned by name in the application, notice, or
    other papers in the case, or as unknown heirs and devisees, or included in the
    general description "all other persons, if any, having any right or interest in
    or lien upon the lands or any part thereof," and whether under disability, not
    in being, unknown, or unascertained. After the expiration of the time for appeal,
    except as otherwise provided in such sections, no such person shall in any of
    the courts of this state assert by suit or otherwise any claim to an interest
    in or lien or charge upon registered land in derogation of or contrary to the
    purport of such decree. Such decree shall not, after the expiration of the time
    for appeal, be opened because of the absence, infancy, or other disability of
    any person affected thereby, or by any suit or proceeding at law or in equity
    for opening up judgments or decrees because a party has not had actual notice
    of the suit or proceedings. Any person deprived of land or of any interest therein
    or lien or charge thereon by a decree of registration obtained by fraud may file
    a petition in the case to open up and review such case within one year after the
    entry of the decree, provided no innocent purchaser for value, mortgagee, or other
    lien holder has acquired an interest. If there is any such purchaser, mortgagee,
    or other lien holder, the decree of registration shall not as to them or any person
    holding under them be opened, but shall remain in effect forever, subject only
    to the right of appeal. Any person who is aggrieved by such decree may pursue
    his remedy by action of tort against the applicant or against any other person
    for fraud in procuring the decree.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.23
- number: '5309.24'
  heading: Contents of decree of registration
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) Every decree of registration in land registration cases shall bear the
    year, month, day, hour, and minute of its entry and shall be signed by the clerk
    of the probate court. It shall give the place of residence and post-office address
    of the owner of the land registered, state whether the owner is married or unmarried,
    and, if the owner is married, state the name of the owner''s spouse. If the owner
    is under disability, the decree shall state the nature of the disability and,
    if the owner is a minor, shall state the minor''s age. The decree shall contain
    an accurate description and plat of each separate parcel of the land as finally
    determined and adopted by the probate court, shall set forth the estate of the
    owner, and, in a manner that shows their relative priority, but subject to division
    (B) of this section, shall set forth all particular estates, mortgages, easements,
    liens, attachments, and other encumbrances, including rights of spouses, to which
    the land or the owner''s estate is subject, all suits pending by or against the
    owner or any of the owner''s predecessors in title in any court of record in the
    county the judgments in which might affect the land or the owner''s title to the
    land, and all suits of that nature elsewhere pending if they were brought to the
    attention of the probate court by the pleadings or evidence in the case. The decree
    may contain any other matter properly to be determined by the court under this
    chapter and Chapter 5310. of the Revised Code. The decree shall be stated in a
    form convenient for physical transcription upon, transcription by any of the applicable
    nonpaper means referred to in division (D) of section 5309.031 of the Revised
    Code upon, or binding in the register of titles described in section 5309.25 of
    the Revised Code, shall be in a form suitable to constitute the decree as a certificate
    of title, and shall give insofar as possible the full name, place of residence,
    and post-office address of each owner and holder of any interest in or lien, charge,
    or encumbrance upon the lands or any part of the lands, except as provided in
    division (B) of this section. The clerk, under the direction of the court, shall
    make and keep indexes of all applications and of all decrees of registration.

    (B) On and after March 30, 1999, a decree of registration in a land registration
    case shall not set forth pursuant to division (A) of this section any restrictive
    covenant that appears to apply to the land or any part of the land, if any inclusion
    of the restrictive covenant in a transfer, rental, or lease of housing accommodations,
    any honoring or exercising of the restrictive covenant, or any attempt to honor
    or exercise the restrictive covenant constitutes an unlawful discriminatory practice
    under division (H)(9) of section 4112.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.24
- number: '5309.25'
  heading: Register of titles - duties of county recorder and clerk
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) Immediately upon the entry of the decree of registration as provided
    in sections 5309.23 and 5309.24 of the Revised Code, the clerk of the probate
    court or the clerk of the court of common pleas shall send a certified copy of
    the decree, under the seal of the court, to the county recorder for the county
    in which the land or any part of the land lies. The recorder shall transcribe
    or bind the decree in a book to be called the register of titles, in which leaves
    in consecutive order shall be devoted exclusively to each title, with appropriate
    blanks for the entry of memorials and notations. The recorder shall note in the
    register the day, hour, and minute when the decree is filed with the recorder.

    The entry made by the recorder in the register in each case shall be the original
    certificate of title and shall be signed by the recorder. Each certificate of
    title with its blanks for memorials and notations shall constitute a separate
    folium of the register. All memorials and notations that may be entered upon the
    register under this chapter or Chapter 5310. of the Revised Code shall be entered
    upon the folium constituted by the last certificate of title of the land to which
    they relate.

    All certificates of title shall be numbered consecutively, beginning with number
    one. The recorder shall in each case make an exact physical duplicate of the original
    certificate, put on the duplicate "Owner''s duplicate certificate," and deliver
    it to the owner or to the owner''s authorized attorney. In case of a variance
    between the owner''s duplicate certificate and the original certificate, the original
    shall prevail.

    The certified copy of the decree of registration shall, in case it is transcribed
    into the register, be filed and numbered by the recorder, with a reference noted
    on it to the place of record of the original certificate of title. The recorder
    may rebind or retranscribe the certificates in new volumes of the register containing
    respectively canceled and uncanceled certificates and prepare new indexes for
    the uncanceled certificates.

    If an application includes land lying in more than one county, the court shall
    cause the part lying in each county to be platted and described separately by
    metes and bounds or other definite description in the decree of registration;
    the clerk shall send to the recorder for each county a copy of the decree containing
    a plat and description of the land within that county; and the recorder shall
    register it and issue an owner''s duplicate certificate of title; thereafter,
    for all matters pertaining to registration, the portion in each county shall be
    treated as a separate parcel of land. If more than one entire and distinct parcel
    of land lying wholly in the county is included in the application and decree,
    the clerk shall, if required by the applicant, send the recorder certified copies
    of the decree insofar as it relates to each of the separate and distinct parcels,
    giving plat and description of each parcel; separate registration of each parcel
    shall be made accordingly by the recorder.

    The clerk shall, at once in every cause, make a final record of the cause and
    immediately thereafter deliver to the recorder all papers in the case, taking
    the recorder''s receipt for those papers. The recorder shall file, index, and
    carefully preserve, and note on the original certificate in the recorder''s office,
    the filing and the number or other designation under which those papers may be
    found.

    (B) If the county recorder maintains registered land records by nonpaper means
    under section 5309.031 of the Revised Code, the record that the recorder designates
    under division (C)(1)(c) of that section shall be deemed the original certificate
    of title for the registered land.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.25
- number: '5309.26'
  heading: Entering original certificate of title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'The certificate of title first registered in pursuance of a decree of registration
    in regard to any parcel of land shall, in the register of titles, be entitled
    "Original certificate of title, entered pursuant to decree of the _________ court,
    dated at _______ (stating time and place of entry of decree and the number of
    the case)." Such certificate shall relate back to and take effect from the date
    of the order or decree directing registration, and all dealings with the land,
    and all statutory or other liens upon it subsequent to the filing of the application,
    shall be subject to and shown by such order or decree of the probate court or
    the court of common pleas. Subsequent certificates relating to the same land shall
    be in like form, but shall be entitled "Transfer from No. ______" (the number
    of the last previous certificate relating to the same land), and also "Originally
    registered" (date, volume, and page of registration) and shall take effect from
    and be dated the exact time of filing and noting in the county recorder''s office
    of the instrument of transfer pursuant to to which the certificate is issued.
    The recorder shall make out and deliver to the proper parties duplicates of all
    subsequent certificates.

    Duplicate certificates may be issued to each person holding a lesser estate but
    the recorder shall note in the register of titles and on each duplicate to whom
    such duplicate was issued. All certificates of title shall contain an accurate
    plat and description of the lands covered thereby.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.26
- number: '5309.27'
  heading: Certificates to owners as tenants in common - duplicate certificates
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'If two or more persons are registered owners as tenants in common, or otherwise,
    of undivided interests in land, one owner''s duplicate certificate of title may
    be issued for the whole land, or the owner of a separate or undivided interest
    may, upon the return and cancellation or proper notation upon the outstanding
    certificate, have a separate registration of his interest and a duplicate certificate
    of title issued to him.

    A registered owner who holds one duplicate certificate for several distinct parcels
    of land may surrender such certificate and have separate registration and duplicate
    certificates for portions thereof, or if he holds separate duplicate certificates
    for several distinct parcels he may surrender them and have registration made
    of and take out a single duplicate certificate for the whole land, or several
    registration and duplicate certificates for different portions thereof. If a new
    or different plat and description is to be given in any new certificate so issued,
    such plat and description must be definite and certain and in conformity with
    the previously registered plat and descriptions and must be subject to the approval
    of the county recorder, who may in any case require the same to be approved by
    the court.

    An owner who subdivides a tract of registered land into lots shall file with the
    clerk of the probate court or the clerk of the court of common pleas a plan thereof,
    when applying for a new certificate, and the probate court or the court of common
    pleas, before ordering such certificate to be issued, shall cause the plan to
    be certified and filed with the recorder and recorded, and require that all boundaries,
    streets, and passageways shall be distinctly and accurately delineated thereon.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.27
- number: '5309.28'
  heading: Holder of certificate of title holds free from encumbrances - exceptions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) Every applicant in a land registration case who, without fraud on the
    applicant''s part, receives a certificate of title in pursuance of a decree of
    registration and every subsequent purchaser of registered land who takes a certificate
    of title for value and in good faith shall hold the registered land free from
    all estates, encumbrances, and rights except those noted on the certificate and
    except any of the following estates, encumbrances, and rights that may exist:

    (1) Liens, claims, or rights arising or existing under the laws or constitution
    of the United States that the statutes of this state cannot require to appear
    of record in the county recorder''s office;

    (2) Taxes and assessments levied by the United States, this state, or any taxing
    district of this state;

    (3) Any highway, public way, or private way laid out or acquired by law or otherwise,
    unless the certificate of title states that the nonexistence of the way or the
    boundaries of the way, if any boundaries exist, have been determined by the court;

    (4) Any lease for a term not exceeding three years, when there is actual possession
    under the lease;

    (5) Right of appeal within thirty days after decree of registration;

    (6) If there are easements or other rights appurtenant to a parcel of registered
    land that are not subject to section 5309.281 of the Revised Code and that for
    any reason have not been registered, those easements or rights shall remain appurtenant
    notwithstanding the failure to register them and shall be held to pass with the
    land.

    (B) This section shall be printed or written on all duplicate certificates of
    title before delivery by the county recorder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.28
- number: '5309.281'
  heading: Restrictive covenants constituting unlawful discriminatory practices
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'On and after the effective date of this section, no county recorder shall
    do any of the following:

    (A) Transcribe or bind in the register of titles and, if applicable, file a certified
    copy of a decree of registration sent by the clerk of a probate court pursuant
    to section 5309.25 of the Revised Code, if the decree sets forth any restrictive
    covenant that appears to apply to the land involved and any inclusion of the restrictive
    covenant in a transfer, rental, or lease of housing accommodations, any honoring
    or exercising of the restrictive covenant, or any attempt to honor or exercise
    the restrictive covenant constitutes an unlawful discriminatory practice under
    division (H)(9) of section 4112.02 of the Revised Code;

    (B) Make and deliver to the owner of land or that owner''s authorized attorney
    an owner''s duplicate certificate pursuant to section 5309.25 of the Revised Code,
    if division (A) of this section prohibits the transcribing or binding of the certified
    copy of the decree of registration in the register of titles;

    (C) Issue any duplicate certificate of title to registered land, any certified
    copy of a lost or destroyed duplicate certificate of title to registered land,
    or any new certificate of title to registered land under any provision of this
    chapter and Chapter 5310. of the Revised Code and under circumstances not described
    in division (B) of this section, without first deleting in the duplicate certificate
    of title, certified copy of the lost or destroyed duplicate certificate of title,
    or new certificate of title any reference to any restrictive covenant described
    in division (A) of this section;

    (D) Initially enter any memorial, notation, or memorandum to the extent that it
    refers to any restrictive covenant described in division (A) of this section;

    (E) Notwithstanding any contrary provision of this chapter or Chapter 5310. of
    the Revised Code, carry forward in connection with the registration of a transfer
    of registered land any memorial, notation, or memorandum to the extent that it
    refers to any restrictive covenant described in division (A) of this section;

    (F) Notwithstanding any contrary provision of this chapter, file any instrument
    or paper that relates to registered land and that refers to any restrictive covenant
    described in division (A) of this section;

    (G) Notwithstanding any contrary provision of this chapter, enter and index any
    instrument or paper with a reference to a certificate of title, if the instrument
    or paper refers to any restrictive covenant described in division (A) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.281
- number: '5309.29'
  heading: Decree and certificate of title run with the land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'The obtaining of a decree of registration and receiving a certificate of
    title is an agreement running with the land that the land shall, unless the owner
    complies with the provisions of section 5309.68 of the Revised Code or unless
    a resolution of abolition is implemented under section 5310.38 of the Revised
    Code, remain registered land and be subject to sections 5309.02 to 5310.21 of
    the Revised Code. Such agreement is binding on the applicant and the successors
    in title. All dealings with the land or any interest therein, after such land
    has been brought under such sections, and all liens, encumbrances, and charges
    upon such land shall be made only subject to such sections.

    If any involuntary interest in registered land has come into existence by executory
    devise, executory limitation, or otherwise since the issuing of any certificate
    of title, the registered owner or the person claiming such interest may apply
    to the court by petition, to which all persons in interest shall be made parties
    and brought before the probate court or the court of common pleas, as provided
    in original registration or as in other civil actions, to have such interest registered.
    The court upon a hearing shall make such order as the case requires and direct
    the county recorder to make registration accordingly.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.29
- number: '5309.30'
  heading: Signature and address of owner taken and preserved
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: The county recorder shall take from the owner of any registered property,
    right, interest, lien, or charge, in every case in which it is practicable to
    do so, the owner's receipt or signature card, giving the residence and post-office
    address, for the certificate of title, or whatever paper is issued or delivered
    to or filed by the owner, signed by the owner in person and witnessed. If the
    receipt or signature card is signed in the recorder's office, it may be witnessed
    by the recorder or a deputy. If signed elsewhere, the receipt or signature card
    shall be acknowledged before an officer authorized to take acknowledgment of deeds.
    When signed, witnessed or acknowledged, and filed with the recorder, the receipt
    shall be regarded as containing the genuine signature of that person.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.30
- number: '5309.31'
  heading: Lost or destroyed certificate of title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: If a duplicate certificate of title is lost or destroyed, the owner, together
    with other persons having knowledge of the circumstances, may make affidavit before
    the county recorder, stating the facts of the case, the names and residences of
    the registered owners, and such other matters that the recorder requires. If the
    recorder is satisfied as to the truth of such affidavit, and the bona fides of
    the transaction, he shall issue to the owner a certified copy of the original
    certificate, with the memorials and notations appearing upon the register, and
    shall note upon the register the fact, cause, and date of such issue, and shall
    also mark upon such certified copy "owner's certified copy issued in the place
    of lost (or destroyed, as the case may be) duplicate certificate." Such certified
    copy shall stand in the place of and have like effect as the missing certificate.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.31
- number: '5309.32'
  heading: Records of surveys of registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: The county recorder shall keep books to be known as "records of surveys of
    registered land," in which the recorder shall accurately copy each survey ordered
    by the probate court or the court of common pleas in the original or any subsequent
    registration. The volume and page of such book where such survey is recorded shall
    be entered on the register of land titles on each certificate of title to said
    land thereafter issued.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.32
- number: '5309.33'
  heading: Tract and alphabetical indexes
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) The county recorder shall keep tract indexes if the board of county commissioners
    orders the recorder to do so and provides the proper records for those indexes.
    In those indexes, the recorder shall enter the lands registered in the numerical
    order of the townships, ranges, and sections, or original surveys, and, in the
    case of subdivisions, the blocks and lots in the subdivisions; the name of the
    owners; and a reference to the volume and folium of the register in which the
    lands are registered. The recorder shall keep alphabetical indexes in which shall
    be entered in alphabetical order the names of all registered owners and all other
    persons interested in, or holding charges upon, registered land, a short description
    of the land, the nature of the dealing, and a reference to the volume and folium
    of the register in which the land is registered.

    (B) In connection with any transfer of registered land that occurs on and after
    the effective date of this amendment in accordance with this chapter and Chapter
    5310. of the Revised Code, the county recorder shall delete from the indexes maintained
    under this section all references to any restrictive covenant that appears to
    apply to the transferred registered land, if any inclusion of the restrictive
    covenant in a transfer, rental, or lease of housing accommodations, any honoring
    or exercising of the restrictive covenant, or any attempt to honor or exercise
    the restrictive covenant constitutes an unlawful discriminatory practice under
    division (H)(9) of section 4112.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.33
- number: '5309.34'
  heading: Transferee of registered land not on notice or inquiry
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Except in case of fraud, and except as provided in sections 5309.02 to 5310.21,
    inclusive, of the Revised Code, no person taking a transfer of registered land,
    or any interest therein, or of any charge upon such land, from the registered
    owner, need inquire into the circumstances under which, or the consideration for
    which such owner or any previous registered owner was registered. Such transferee
    shall not be affected with notice, actual or constructive, of any unregistered
    trust, lien, claim, demand, or interest. The knowledge that any unregistered trust,
    lien, claim, demand, or interest is in existence shall not of itself be imputed
    to such transferee as fraud. No unregistered estate, interest, power, right, claim,
    contract, or trust shall prevail against the title of a registered owner taken
    bona fide for valuable consideration or of any person bona fide claiming through
    or under him.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.34
- number: '5309.35'
  heading: Record of trusts and exceptional estates in registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Deeds and other instruments relating to registered land, which create or declare
    trusts, or contain unusual or exceptional covenants, restrictions, or conditions,
    or create unusual or exceptional interests, may, upon the demand of a party in
    interest and the payment of the proper fees, be recorded by the county recorder
    in books to be kept for that purpose in his office and known as the "record of
    trusts and exceptional estates in registered land." The number of the page of
    the record shall be noted on the folium of the register of land titles in which
    the land affected is entered, and such reference shall be made to such number
    in the certificate of title or memorial.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.35
- number: '5309.36'
  heading: Certificate notation carried until cancellation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Subject to division (E) of section 5309.281 of the Revised Code, if a memorial
    or notation has been entered as permitted by this chapter and Chapter 5310. of
    the Revised Code, the county recorder shall carry the memorial or notation forward
    upon all certificates of title until those certificates are canceled in some manner
    authorized by this chapter or Chapter 5310. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.36
- number: '5309.37'
  heading: Transfers of registered land - certificate as to taxes and special assessments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'Transfers of registered land shall be made or entered in the office of the
    county auditor, subject to the same requirements and on payment of the same fees
    as provided by law for unregistered land.

    Upon demand and upon payment of the fee provided in section 5310.15 of the Revised
    Code, at the time of issuing any certificate of title to registered land, or of
    making any transfer of registered land, or of entry upon the register of titles
    of any memorial of a mortgage or other lien on registered land, the county recorder
    shall examine the county treasurer''s tax duplicates and issue a certificate as
    to the taxes and special assessments shown thereon to be a lien upon the premises
    registered in said certificate of title.

    Such certificate as to taxes and special assessment shall show in whose name the
    premises are listed for taxation, the total sum due for taxes and special assessments,
    and what general taxes are a lien, as such items appear by the last treasurer''s
    tax duplicate.

    Such certificate as to taxes and special assessments shall be issued subject to
    special assessments which are not yet entered upon the last treasurer''s tax duplicate,
    and subject to any additional sum which the treasurer is authorized to collect.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.37
- number: '5309.38'
  heading: Entry book
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'Each county recorder shall keep an entry book in which the recorder shall
    enter and number in the order of their reception all deeds and other voluntary
    instruments, all involuntary instruments, and copies of writs or other papers
    that are filed with the recorder and that relate to registered land. Except as
    provided in section 5309.281 of the Revised Code, the recorder shall note in the
    entry book the year, month, day, hour, and minute of reception of all instruments
    or papers in the order in which they are received and shall enter at the same
    time the number of an instrument or paper in the appropriate blank space on the
    registered certificate of title for the land to which it relates. Except as provided
    in section 5309.281 of the Revised Code, the instruments and papers shall be regarded
    as registered and become effective for the purposes intended from the time they
    are so filed and noted, and certificates of title and the memorial of each instrument
    or paper when made on the registered certificate of title or duplicate certificate
    of title to which it relates shall bear the same date, except as provided in this
    chapter and Chapter 5310. of the Revised Code.

    Every deed or other voluntary or involuntary instrument and every paper that is
    filed with the recorder shall be numbered and endorsed over the official signature
    of the recorder with the time of filing and, subject to section 5309.281 of the
    Revised Code, shall be entered and indexed with a reference to the proper certificate
    of title. All records, instruments, and papers relative to registered land in
    the office of the recorder shall be open to the public in the same manner as other
    public records, subject to reasonable regulations that the recorder makes under
    the direction of the probate court.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.38
- number: '5309.39'
  heading: Instruments shall be filed under proper numbers
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: All duplicate certificates of title and all instruments and memorandums in
    any way affecting the title to registered land, surrendered to the county recorder
    for cancellation, and all other instruments, notices, and papers required or permitted
    under sections 5309.02 to 5310.21, inclusive, of the Revised Code, to be filed
    with the recorder, shall be filed under their proper file numbers of other designation
    and carefully preserved.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.39
- number: '5309.40'
  heading: Transfer of estate by registered owner in fee
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: A registered owner in fee of real property, in order to transfer the owner's
    whole interest in the property or in any part of the property or to transfer any
    undivided interest in the property shall execute to the intended transferee a
    deed or instrument of conveyance that, in case of transfer of the whole of the
    property, may be on the duplicate certificate of title. The deed or instrument
    of conveyance may be in any form authorized by law. When the transferee presents
    the deed or instrument of conveyance to the county recorder of the county in which
    the property is situated, the recorder shall file the deed or instrument of conveyance,
    and, if the recorder finds that the transferor is entitled to make the transfer
    under this chapter and Chapter 5310. of the Revised Code, the recorder shall register
    the title, in accordance with the deed or instrument of conveyance, in the name
    of the transferee upon a new folium in the register of titles, shall enter on
    the new folium in a manner consistent with section 5309.281 of the Revised Code
    all memorials, notations, and memoranda to which the property is subject at the
    time of the transfer, and shall issue a new certificate of title to the transferee
    that states the transferee's full name, place of residence, and post-office address,
    whether the transferee is married, and, if the transferee is married, the name
    of the transferee's spouse. If the transferee is a minor, the transferee's exact
    age must be given on the new certificate of title, or, if the transferee is under
    another disability, the nature and character of that disability must be stated
    on the new certificate of title. Before a transfer can be registered, the transferor
    or the transferee shall deliver to the recorder the duplicate certificate of title
    of the transferor, and the recorder shall enter upon the folium of the register
    in which the title of the transferor is registered and upon the duplicate certificate
    of title a memorial or memorandum canceling it, in whole or in part, as the interest
    of the transferee may appear from the deed or other instrument of conveyance,
    with the particulars of the transfer that may be necessary for identification,
    the date of transfer, the name, place of residence, and post-office address of
    the transferee, and the volume and folium of the register in which the transferee's
    title is registered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.40
- number: '5309.41'
  heading: Canceled instruments shall be preserved
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'In all cases in which a certificate of title, or any other instrument or
    memorandum affecting registered land, is wholly canceled, it shall be retained
    by the county recorder and filed in his office under its proper file number and
    carefully preserved.

    In all cases where part of the land described in a certificate of title is transferred,
    the county recorder shall issue a new certificate of title to the transferee for
    the part of the land transferred, and shall indorse on the transferor''s registered
    and duplicate certificates, a notation partially canceling the same, and the reasons
    therefor, stating the number of the new certificate for the transferred land.
    The county recorder shall maintain as active the transferor''s registered and
    duplicate certificates for the residue of the land not transferred without issuing
    a new certificate to the transferor for the residue.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.41
- number: '5309.42'
  heading: Transfer of an estate less than a fee
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: No new certificate of title shall be entered or issued upon any transfer of
    registered land which does not divest the title in fee from the registered owner
    or some one of the registered owners. When a registered owner desires to transfer
    to another a lesser estate than the fee, as an estate for life, for years, or
    other term, or any other kind of lesser estate than a fee, he may do so by executing
    to the transferee a deed, lease, or other proper instrument of conveyance or transfer
    of such estate, in any form authorized by law, giving the number of his certificate
    and other requirements of identification. When such transferee presents such deed,
    lease, or other instrument of transfer to the county recorder of the county where
    the land is situated, together with the owner's duplicate certificate of title,
    the recorder shall file such instrument and indorse thereon the exact time of
    such filing. If upon examination it appears to the recorder that the transferor
    is entitled to make such conveyance, the recorder shall register the same by indorsing
    upon the folium of the register where such title is registered and upon the duplicate
    certificate of title, a memorial of such transfer, giving the exact time of filing,
    name, residence, and post-office address of the transferee, nature and kind of
    estate transferred, and such other material matter as is contained in said instrument
    of transfer, and shall indorse on the instrument of transfer the volume and folium
    of the register where registered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.42
- number: '5309.43'
  heading: Questions as to instruments presented for registration referred to court
    of common pleas or to examiner of titles
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'If the county recorder is in doubt upon any question, or if any person in
    interest does not agree as to the proper memorandum to be made in pursuance of
    any deed, mortgage, or other voluntary instrument presented for registration,
    the question may, on the certificate of the recorder stating the question upon
    which the recorder is in doubt or upon which the person in interest does not agree,
    be referred to the court of common pleas for decision. The court, after notice
    to all parties and a hearing, shall enter an order directing the action of and
    prescribing the form of memorandum to be made by the recorder, who shall make
    registration or otherwise act in accordance therewith, and such order shall be
    final.

    The recorder may refer such question to an examiner of titles, and upon receipt
    of his report thereon the recorder shall notify the parties interested and fix
    a time for hearing. The recorder shall on such hearing make such disposition of
    said question as to him seems just and proper and in accordance with law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.43
- number: '5309.44'
  heading: New certificate of title issued
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'No new certificate of title shall be entered, and no memorandum shall be
    made upon the register of any certificate of title by the county recorder in pursuance
    of any deed or other voluntary instrument, unless the owner''s duplicate certificate
    is presented with such instrument, except in cases expressly provided for in sections
    5309.02 to 5310.21, inclusive, of the Revised Code, or upon the order of the probate
    court or the court of common pleas, for cause shown. Whenever such order is made,
    a memorandum thereof shall be entered on the new certificate of title and on the
    owner''s duplicate. The production of the owner''s duplicate, whenever a voluntary
    instrument is presented for registration, is authority from the registered owner
    to the recorder to enter a new certificate or to make a memorial of registration
    in accordance with such instrument, and the new certificate or memorial shall
    be binding upon the registered owner and upon all persons claiming under him,
    in favor of every purchaser and holder for value and in good faith and in favor
    of all persons holding under such purchaser and holder. In all cases of registration
    which are procured by fraud, the owner may pursue all his legal and equitable
    remedies against the parties to such fraud, without prejudice to the rights of
    any innocent holder for value of a certificate of title or any person holding
    under such innocent holder.

    After the entering and issuing of a certificate of title by the recorder on the
    decree of registration under the original application, any subsequent registration
    which is procured by the presentation of a forged duplicate certificate, or of
    a forged deed or other instrument, shall be void. In case of the loss or theft
    of an owner''s duplicate certificate, notice shall be sent by the owner, or by
    a person in his behalf, to the recorder of the county in which the land lies,
    as soon as the loss or theft is discovered.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.44
- number: '5309.45'
  heading: Application for registration on the death of registered owner
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'Upon the death of a registered owner of land, one or more of his heirs or
    devisees, or the assignee for the benefit of creditors, or administrators or executors,
    or holder of an involuntary lien or charge against the interest of any such heir
    or devisee or their heirs or devisees, or an heir, devisee, administrator, or
    executor of a deceased heir or devisee of such heir or devisee of a deceased registered
    owner, may at any time after the expiration of thirty days from such owner''s
    death, if he died intestate, or from the probate of such owner''s will and the
    election of the relict thereunder, if he died testate, make application to the
    probate court or the court of common pleas for registration of the title of the
    deceased in such heirs and devisees according to their respective rights and interests.
    The application shall be sworn to and shall set forth the lands of which such
    registered owner died seized, giving reference to the certificate therefor, whether
    he left a will, and if so a copy of such will, shall state the name in full, residence,
    and post-office address of the relict, and of each devisee and heir, and of each
    relict, heir, or devisee of any deceased heir or devisee, and of each person then
    holding any interest, present or future, vested or contingent, in said lands derived
    by devise or inheritance from such deceased owner or by descent or devise from
    any person subsequent to his death, so far as the applicants after diligent research
    and inquiry, have been able to ascertain the same, and that to the knowledge,
    information, and belief of the applicants, no other persons, whether in being
    or unborn, have any interest or estate, present or future, vested or contingent,
    in said premises, except as stated. If any persons in interest are under disability
    of any kind, the nature thereof shall be stated and the name, residence, and post-office
    address of their guardians or trustees given, and if minors, their ages stated.
    All persons in interest not joining in the application shall be made defendants
    thereto and may be notified and brought before the court, either in the manner
    provided for in original registration or by summons or other process as in civil
    actions, as the court directs. If there appears, from the application or otherwise,
    to be any doubt as to persons then holding interests in such land, or if the name
    or residence of any such person is unknown, then by name if known, and if not,
    under the designation of "all persons having an interest in the land herein described,"
    all persons whomsoever shall be made parties to the application and served by
    publication of notice as provided for in sections 5309.14 and 5309.15 of the Revised
    Code, or as provided in civil actions, as the court directs. A guardian ad litem
    shall be appointed by the court as provided in section 5309.17 of the Revised
    Code with like duties as in cases of initial registration. The decree of registration
    and certificates issued under such decree shall be in like form and number and
    have like effect as in original registration, except that such decree and certificates,
    in case they are issued before the estate of the deceased owner is finally settled,
    or before the time for contesting his will has expired, or before the final determination
    of any suit to contest or set aside his will, shall expressly state that they
    are entered and issued by transfer from the last registered owner, by descent
    or devise, subject to final settlement of the estate and right to contest the
    will of such deceased owner. After the final settlement of the estate in the probate
    court, and the expiration of the time for contest of the will or the final determination
    of suit to contest the will, the heirs at law, or devisees, or other persons in
    interest may petition the probate court or the court of common pleas for an order
    to cancel the memorandum upon such certificate, stating that the same is subject
    to final settlement of the estate and right to contest the will. The court, after
    notice and a hearing, may grant the petition; but the liability of heirs of registered
    land for claims against the estate of the deceased shall not in any way be diminished
    or changed. No voluntary instrument or deed of an administrator, executor, assignee
    for the benefit of creditors, sheriff, master commissioner, or other officer purporting
    to transfer or create a lien or charge upon any interest of such devisee or heir
    in such registered land or to authorize the same to be done, shall have any effect
    in law or equity to accomplish such purpose until the title of such heir or devisee
    is registered as provided in this section. An involuntary lien, charge, or lis
    pendens against the interest of a relict, heir, or devisee in the lands of a deceased
    registered owner can, prior to the registration of the title of such relict, heir,
    or devisee, only be obtained by filing the proper papers with the county recorder
    as in other cases and the recorder making entry thereof as a memorial on the registered
    certificate of title of such deceased owner giving the name, residence, and post-office
    address of the relict, heir, or devisee against whom said lien, charge, or lis
    pendens is to operate.

    This section does not in any way affect or impair the jurisdiction of the probate
    court to authorize an executor or administrator to sell or convey registered land
    for any purpose for which authority may be granted in the case of unregistered
    land. The transferee who takes a deed which is executed in pursuance of such authority
    to sell or convey shall be entitled to a new certificate of title, or memorandum
    of registration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.45
- number: '5309.46'
  heading: Title acquired through executor
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When the will of a deceased registered owner of real property, or any right
    or interest therein, empowers the executor to sell, encumber or otherwise deal
    with such property, right, or interest, such executor need not be registered as
    the owner thereof; but any person who acquires title by virtue of the execution
    of such power may have such title registered, by application to and order of the
    probate court or the court of common pleas made after notice to all persons in
    interest to be given by the clerk of said court by registered mail or otherwise
    as the court directs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.46
- number: '5309.47'
  heading: Encumbrances on registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Whenever any registered land or interest therein is intended to be charged
    or made security in favor of any mortgagee, the mortgagor shall execute a mortgage
    deed. Whenever any such land is intended to be charged with, or made security
    for the payment of an annuity, rent charge, sum of money, or any other charge
    or lien, in favor of any encumbrancer or lien holder, the encumberer shall execute
    an instrument of encumbrance. Every mortgage deed and instrument of encumbrance
    shall contain a pertinent description of the land and an accurate statement of
    the interest intended to be mortgaged, charged, or encumbered, and when registered
    shall operate as a lien or charge upon and bind the land covered thereby for the
    period ending twenty-one years after the maturity of the last secured debt or
    obligation. Thereafter, as to subsequent bona fide purchasers, mortgagees, and
    other persons dealing with such land for value, the lien of such mortgage shall
    expire. The mortgage creditor, may, at any time within one year next preceding
    the expiration of such period of twenty-one years, refile in the county recorder's
    office the mortgage or a sworn copy thereof, together with an affidavit thereon,
    stating the amount remaining due and the due date, as extended if it is extended,
    and thereupon such refiling, after registration has been made upon the certificate
    of title, shall operate as a lien or charge upon and bind the land then covered
    thereby only for a period of twenty-one years after the expiration of such prior
    period of twenty-one years.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.47
- number: '5309.48'
  heading: Mortgage, encumbrance entered - mortgagee's duplicate certificate
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When a mortgage, encumbrance, or other instrument intended to create a lien
    upon or charge against registered land, as provided in section 5309.47 of the
    Revised Code, is filed in the county recorder's office, and the owner's duplicate
    certificate of title is produced, and it appears to the recorder that the person
    intending to create the lien or charge set forth in such instrument, has such
    right, and that the person in whose favor the same is sought to be created is
    entitled under sections 5309.02 to 5310.21, inclusive, of the Revised Code, to
    have such instrument entered as a memorial upon the register, the recorder shall
    enter upon the proper folium of the register, where such title is registered,
    and upon the owner's duplicate certificate of title, a memorial accurately stating
    the purport and nature of the lien or charge created, the date of filing the instrument,
    and its file number. The recorder shall note upon the instrument filed with him
    the volume and folium of the register in which the memorial is entered. The recorder
    shall at any time after registration of a mortgage, upon the request of the mortgagee
    and the tender of the proper fee therefor, make and deliver to the mortgagee a
    duplicate of the owner's registered certificate of title but having indorsed,
    stamped, or printed thereon in large letters "Mortgagee's Duplicate Certificate"
    instead of "Owner's Duplicate Certificate." The recorder shall note on the registered
    certificate of title the fact and date of making and delivering such duplicate
    and to whom delivered. In case of the loss or destruction of such mortgagee's
    duplicate certificate, another may be issued to him as provided in section 5309.31
    of the Revised Code in reference to the loss or destruction of an owner's duplicate
    certificate.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.48
- number: '5309.49'
  heading: Filing and notation of instruments affecting registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'When any mortgage, lease, or other instrument affecting registered land,
    or any interest therein, is in duplicate, triplicate, or more parts, only one
    of the parts need be filed and kept in the county recorder''s office, but the
    recorder shall note upon the register whether such instrument is in duplicate,
    triplicate, or more parts, and shall mark upon such other parts "mortgagee''s
    duplicate," "lessor''s duplicate," "lessee''s duplicate," "encumberer''s duplicate,"
    or as the case may be, and shall note upon such other parts the date of filing
    and the volume and folium of the register where the memorial is entered, and deliver
    such other parts to the persons entitled thereto.

    Certified copies of all instruments which are filed and registered may be obtained
    at any time, upon the payment of the recorder''s fees. A mortgagee may obtain
    a certified copy of the mortgage which shall have stamped or printed in large
    letters across its face "Mortgagee''s Certified Copy of Mortgage." The issuance
    of such certified copy shall be noted on the registered memorial of the mortgage,
    which certified copy may be used by such mortgagee for all purposes of assignment
    and release for which the original mortgage could have been used if retained by
    him.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.49
- number: '5309.50'
  heading: Records in addition to registration
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: The county recorder, upon the written request of a lessee, mortgagee, or encumbrancer,
    and payment of the proper fees, shall record the instrument filed in his office
    in volumes to be known respectively as "records of liens on registered land" and
    "record of leases on registered land," and shall note on such instrument and on
    the volume and folium of the register containing the certificate of title the
    fact of such record and the volume and page where recorded, with the exact time
    of such recording. The recorder shall deliver such instrument after such record
    and notation to the party named as mortgagee, lessee, or encumbrancer, and take
    his receipt therefor, with his residence and post-office address, which receipt
    shall either be written in or pasted or bound in a book kept for that purpose
    and properly indexed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.50
- number: '5309.51'
  heading: Assignment of lease, encumbrance, or lien upon registered land - registration
    of waivers of priority of lien
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'The holder of any mortgage, encumbrance, lease, charge, or lien upon registered
    land may execute to a transferee an assignment for the whole or any part of the
    mortgage, encumbrance, lease, charge, or lien, by endorsement of the assignment
    on the original instrument of encumbrance, the holder''s duplicate, the mortgagee''s
    certified copy of a mortgage, or by a separate instrument acknowledged as required
    by section 5301.01 of the Revised Code. The assignment of only a part of the mortgage,
    encumbrance, lease, charge, or lien shall state whether the part transferred is
    to be given priority, be deferred, or rank equally with the remaining part. When
    that assignment is filed with the county recorder and the assignor produces the
    instrument of encumbrance that the assignor holds, if that instrument is the original
    instrument or one of the original duplicates of the instrument, and in the case
    of a mortgage when the assignor produces the "mortgagee''s certified copy," if
    that copy was issued and delivered, the recorder, being satisfied that the assignment
    is properly made and should be registered, shall register the assignment by entering
    a memorial of the part transferred, the date of transfer, the name, residence,
    and post-office address of the transferee, how the part transferred is to rank
    with the remaining part, and the file number upon the register in which the instrument
    creating the charge is registered, and in case of assignment by separate instrument,
    upon the original instrument. The recorder shall endorse on the instrument of
    assignment the exact time of filing and the volume and folium of the register
    in which the assignment is registered. If the original instrument of encumbrance,
    or one of the duplicates of the instrument, is recorded, the assignee, on payment
    of the recorder''s fees, may have that assignment copied on the margin of the
    record of the instrument assigned, or copied in a separate volume and noted on
    the margin of the record of the instrument assigned, if the recorder keeps any
    such separate volume for the record of assignments and transfers. The record of
    that assignment shall be noted on the indexes of the instrument assigned. If the
    original instrument of encumbrance or one of the original duplicates of the instrument,
    endorsed by the recorder, or a mortgagee''s certified copy of the mortgage, is
    outstanding in the hands of the encumbrancer, lessee, or their assigns, no entry
    or memorial of an assignment or transfer of that instrument or security of any
    part of the instrument shall be made by the recorder without the production of
    the original instrument, or the endorsed original duplicate of the instrument,
    or the mortgagee''s certified copy.

    Waivers of the priority of lien of mortgages may be registered subject to the
    requirements of this section as to assignments.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.51
- number: '5309.52'
  heading: Entry of release or discharge of encumbrance
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When any registered mortgage, encumbrance, lien, charge, or lesser estate,
    vested, contingent, expectant, or inchoate, is satisfied, released, extinguished,
    or terminated, in any manner in whole or in part, the mortgagee, encumbrancer,
    assignee, owner of lesser estate, or his legal representative , holder of lien,
    or other person authorized to discharge or release such encumbrance, shall forthwith
    file with the county recorder or deliver to the encumberer or owner such satisfaction,
    release, or discharge, in whole or in part. The recorder shall enter such satisfaction,
    release, or discharge upon the registered certificate of title, upon the original
    instrument on file or the margin of the record thereof, if recorded, and properly
    note such cancellation in all the indexes of such mortgage, encumbrance, lien,
    or charge. If an original instrument, or one of the original duplicates thereof,
    or a mortgagee's certified copy, indorsed by the recorder, is outstanding in the
    hands of the encumbrancer or his assigns, no entry or memorial of satisfaction
    of such instrument shall, except upon notice and a hearing, be made by the recorder
    without the production of said original instrument or original duplicate or mortgagee's
    certified copy. If the encumbrancer, owner of a lesser estate or his legal representative,
    or other person, fails to file such satisfaction or release with the recorder
    or deliver it to the encumberer, or if such satisfaction or release has been delivered
    to the encumberer or transferor and become lost or destroyed or from any other
    cause cannot be produced, then the encumberer, transferor, or other person entitled
    to such discharge or release may present proof of the same before the recorder,
    ten days' notice having been given to the person holding the security or lesser
    estate or to his personal and legal representatives and all persons in interest
    as shown by the records, or as known. When the recorder is convinced that such
    mortgage, encumbrance, or other charge has been satisfied, or that said lesser
    estate has been extinguished or terminated as claimed, he shall enter such satisfaction,
    release, extinguishment, or termination on the instrument on file with him or
    the record thereof, if recorded, and indorse the same upon the registered and
    also on the owner's duplicate certificate of title; or application in such cases
    may be made to the probate court or the court of common pleas by petition and
    the court upon notice and hearing shall make such order as is appropriate and
    the recorder shall act in accordance therewith, and the entry of such discharge,
    satisfaction, release, extinguishment, or termination by the recorder pursuant
    to his finding or the order of the court, subject to proceedings on appeal, is
    conclusive evidence thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.52
- number: '5309.53'
  heading: Decree or order of court a lien upon registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: No judgment or decree or order of a court shall be a lien upon or affect registered
    land, or any interest therein, until a certificate under the hand and official
    seal of the clerk of the court in which the case is entered, or of record, stating
    the date and purport of the judgment, decree, or order, or other action taken
    by the court, giving the number of the case, the full names of the parties, plaintiff
    and defendant, and the volume and page of the journal or record in which it is
    entered, or certified copy of such judgment, decree, order, or action of the court,
    stating the facts required by this section, is filed and noted in the office of
    the county recorder. When such filing is completed, a memorial of such filing
    shall be entered by the recorder upon the folium of the register in which the
    title to the land to be affected is last registered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.53
- number: '5309.54'
  heading: Judgment of county court judge, mayor or other officer a lien upon registered
    land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Whenever any transcript from the docket of a judge of a county court or mayor,
    or other officer or tribunal which may render judgments, is filed in the office
    of the clerk of the court of common pleas for a lien, the party, or his agent
    or attorney, filing such transcript shall notify the clerk whether the land upon
    which the lien is sought is registered. If such land is registered, in addition
    to the fee required for such filing, such party shall pay such clerk's fee for
    a certificate which the clerk shall thereupon issue to such party under such clerk's
    hand and the seal of the court of common pleas stating the number of the case,
    parties, date of the judgment, amount of judgment, and costs, and the exact time
    when filed in his office, and the volume and page where entered. The party receiving
    such certificate shall file it with the county recorder, who shall make notation
    of the filing and enter a memorial thereof on the last registered certificate
    of title for such land. No lien shall attach to any registered land under such
    transcript until such certificate is filed with the recorder and noted by him.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.54
- number: '5309.55'
  heading: Lien attaches in proceedings in execution and attachment
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When any registered land is levied upon or seized by virtue of any writ of
    attachment, execution, or other process, the officer making such levy or seizure
    shall forthwith file with the county recorder a certificate of the fact of such
    levy or seizure, stating the court from which it was issued, the number of the
    case, parties to the suit, amount of the claim, the precise date of the attachment,
    levy, seizure, or other action taken, with a pertinent description of the land,
    a memorial of which shall forthwith be entered by the recorder upon the registered
    certificate of title for such land. No lien shall attach to or be created upon
    any registered land by reason of such attachment, levy, or seizure, or other action
    taken, until the filing of such certificate with the recorder and his notation
    thereof on the last registered certificate of title, any notice thereof, actual
    or constructive, to the contrary notwithstanding.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.55
- number: '5309.56'
  heading: Writ issued from county other than where land situated
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Whenever a sheriff or other officer seizes or levies upon any registered land
    by virtue of an execution, order of attachment, or other writ issued to him from
    a county other than the county in which the land is situated, such sheriff shall
    forthwith file with the county recorder a certified copy of the writ, and the
    things such sheriff has done under such writ, and the return made by him as such
    sheriff thereon, which return shall show the exact time when the seizure or levy
    was made. The sheriff shall indorse on said writ, and as a part of his return,
    "land seized (levied upon or attached) is registered land," and that he filed
    such copy with the recorder, giving the exact time of filing. Upon the receipt
    of the copy of such writ and return, the recorder shall forthwith file and make
    notation of the same and enter a memorial thereof upon the appropriate folium
    of the register containing the last registered certificate of title for such land,
    with the exact time of filing. Until such required certified copy of the writ
    and return is filed with the recorder and noted by him on the last registered
    certificate of title for such land, the land is not bound by such seizure or levy
    or any lien obtained thereby.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.56
- number: '5309.57'
  heading: Accounts of mechanics or laborers constitute lien
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'Whenever any attested account to obtain a mechanic''s, material supplier''s,
    or laborer''s lien is filed in the office of the county recorder by which a lien
    is sought to be obtained upon any registered land, the county recorder shall forthwith
    make notation and enter a memorial thereof upon the folium of the register where
    the last certificate of title to the land is registered, stating the name of the
    claimant, amount claimed, volume and folium of the record where recorded, and
    the exact time when said memorial was entered. No lien shall attach to said land
    until such notation is entered by the recorder.

    The recorder may, upon written application of the registered owner, cancel from
    any certificate of title, a mechanic''s lien which has remained uncanceled for
    six years and one day from the date of registration of said lien, provided that
    no notice of any suit affecting said lien has been noted upon the register.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.57
- number: '5309.58'
  heading: Action or proceeding lis pendens
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'No suit, action, or proceeding, pending in any court, affecting registered
    land or any interest therein or charge upon such land is lis pendens, or notice
    to any person dealing with such land, until a certificate of the pendency of such
    suit, bill, or proceeding, under the hand and official seal of the clerk of the
    court in which it is pending, is filed with the county recorder, and a memorial
    thereof entered by him upon the last registered certificate of title to the land
    to be affected. This section does not apply to attachment or other proceedings,
    in which the officer making the attachment or levy, under sections 5309.02 to
    5310.21, inclusive, of the Revised Code, is required to file and has filed with
    the recorder a certificate of the things such officer has done under the writ
    in his hands.

    When any suit, bill, or proceeding has been dismissed or otherwise disposed of,
    or any judgment, decree, or order has been satisfied, released, reversed, or modified,
    or any levy of execution, attachment, or other process has been released, discharged,
    or otherwise disposed of, the sheriff, or the clerk of the court in which such
    proceedings were pending or had, shall forthwith under his hand, and if the clerk,
    under the seal of the court, certify to and file with the recorder an instrument
    showing such discharge, release, dismissal, or final disposition. When such instrument
    is filed with him, the recorder shall enter a memorial thereof on the last registered
    certificate of title opposite or under the memorial registering such suit, bill,
    proceeding, or charge. The costs of such certificate and memorial shall be taxed
    as other costs in the case.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.58
- number: '5309.59'
  heading: Certificate of sale must be presented to recorder - notation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: The holder of any certificate of sale of registered land, or any interest
    therein, for any tax, assessment, or imposition, shall forthwith present such
    certificate to the county recorder, who shall thereupon enter upon the registered
    certificate of title of the land a memorial thereof, stating the amount and day
    of sale, the date of presentation, and shall enter upon the certificate of sale
    the date of presentation and book and folium of the register where the memorial
    is entered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.59
- number: '5309.60'
  heading: No registration or certificate of title shall issue upon tax deed except
    on order of court
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: A tax deed of registered land, or an interest therein, issued in pursuance
    of any sale for a tax, assessment, or other imposition, shall have only the effect
    of an agreement for the transfer of the title upon the register. Before any person
    dealing with such land is affected by such tax deed such deed must be filed in
    the county recorder's office and a memorial of such filing be made by the recorder
    on the registered certificate of title for such land. No registration of title
    under such tax deed shall be made, or certificate of title issued thereon, unless
    the tax deed is filed within sixty days after its date, or in any case except
    upon the order of the probate court or the court of common pleas, on application
    therefor by petition to which all persons in interest shall be made parties and
    brought before the court. Any person interested in the land may show, as cause
    why such certificate shall not issue, any fact that might be shown at law or in
    equity on his behalf to set aside such tax deed. The party named in the tax deed
    must show affirmatively that the law entitling him to a deed has been strictly
    complied with. In such suit the court may decree such deed and tax sale under
    which the same was issued to be invalid for the purposes of entitling the purchaser
    or grantee to a transfer of the title to said land and order the same to be canceled
    upon the payment by any party in interest to said purchaser or grantee of the
    amount paid by him on such tax sale and subsequently as taxes on the property,
    together with interest on all such sums.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.60
- number: '5309.61'
  heading: Partition and sale confirmed only on report of examiner of titles
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: In any suit or proceeding in any of the courts of record in this state in
    which registered land may be partitioned or sold, or the title to any part thereof,
    or to any interest in, or lien or charge upon such land may be transferred or
    affected by the orders or judgment of the court, no confirmation of such partition,
    sale, or transfer shall be made by the court, or decree settling or affecting
    title entered, until there is first filed in the case the report of an examiner
    of titles to whom the matter shall be referred by the court for that purpose,
    showing that all persons necessary to such suit or proceeding have been made parties
    and properly brought before the court and that the proceedings and sale have in
    all respects been regular and pursuant to law and the orders of the court. The
    court shall not be bound by the report of such examiner but may inquire into its
    correctness.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.61
- number: '5309.62'
  heading: Certificates of title issued to allottees in partition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: On the confirmation of the report of commissioners setting off registered
    lands in proceedings for partition, the parties to whom the lands are allotted
    shall cause a certified copy of the judgment or decree to be filed with the county
    recorder. Thereupon the recorder shall transfer such lands upon the register and
    issue new certificates of title to the respective allottees. Title in severalty
    shall not vest until such registration.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.62
- number: '5309.63'
  heading: Liens attach to lands set off in partition proceedings
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When any lien or interest exists upon or in an undivided interest in land,
    and such interest is set off in severalty in proceedings for partition, such lien
    or interest shall attach only to the lands so set off, and the county recorder
    shall note the same upon the register of the new certificates of title, and shall
    indorse a memorandum of the partition upon the instrument creating such lien or
    other interest before a new certificate of title shall issue to the allottee.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.63
- number: '5309.64'
  heading: Transfer of title under order of sale
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) Whenever registered land is sold to satisfy any judgment, decree, or
    order of a court, or the title is transferred or affected by a decree or judgment
    of a court, the purchaser, or the person in whose favor such decree was rendered,
    on filing with the county recorder a certificate that the terms of sale have been
    complied with and a certified copy of the order of sale and return thereof and
    confirmation, or a certified copy of the decree of the court transferring or affecting
    the title, as the case may be, is entitled to have the property transferred to
    the purchaser or person in whose favor the decree was rendered and the title registered
    accordingly and a new certificate of title issued therefor.

    (B) When registered land is sold by the sheriff under order of a court, the sheriff
    shall file with the county recorder a certificate that the terms of sale have
    been complied with and a certified copy of the order of sale and return thereof
    and confirmation. The purchaser is thereafter entitled to have the property transferred
    to the purchaser and the title registered accordingly and a new certificate of
    title issued therefor.

    (C) This section and its applications are not superseded, negated, or amended,
    in whole or in part, by section 5309.61 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.64
- number: '5309.65'
  heading: Transfer of title by assignee or trustee - procedure
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Before an assignee or trustee for the benefit of creditors, receiver, master
    commissioner, special master commissioner, executor, or other person appointed
    by a court, shall deal with or transfer registered land, or any interest therein,
    such person shall file in the county recorder's office a certified copy of the
    deed, order of the court, will, or other authority showing that such person is
    authorized to deal with or transfer such land or interest, and shall present to
    the recorder the duplicate certificate of title for such land. The recorder shall
    enter upon the registered certificate and on the duplicate certificate of title,
    a memorial thereof, with a reference to such deed, order of the court, will, or
    other authority by its file number. In case of a deed of the land in fee simple
    to the assignee, receiver, or other officer, the recorder shall register the title
    in the name of such transferee and issue to him a certificate of title, stating
    therein the purpose for which the land was transferred to him.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.65
- number: '5309.66'
  heading: Optional registration of title to land sold in partition or by assignee
    or administrator
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: In all suits to sell an estate in fee in the whole of unregistered land brought
    by an assignee or trustee for the benefit of creditors, commissioners of insolvents,
    receiver, master commissioner, administrator, executor, or other person appointed
    by a court, and in all suits to partition unregistered land held in fee, proper
    allegations and parties necessary to a decree for original registration of the
    title to said estate may be made in the petition, such allegations to be included
    in a separate cause of action. Such title, before any order of sale or partition
    is made or entered in the case, may, with the approval of the court in which such
    action is pending, be registered in the name of the person, living or dead, whose
    title is sought to be sold, or in the names of the tenants in common. If the legal
    title is in any such assignee, trustee, receiver, or other person appointed by
    a court, such title may be so registered and the purposes for which said legal
    title is held stated in the decree and certificate of title. Upon any such sale
    or partition and confirmation thereof the title may be transferred to and registered
    in the name of the purchasers or allottees as in other cases of judicial sales
    or partition of registered land. If such land is not sold the person entitled
    thereto may procure a transfer and certificate therefor to be made to him by application
    to and order of the probate court or the court of common pleas, made after hearing
    upon notice to all persons in interest to be given by the clerk of said court
    by registered mail or otherwise as the court directs. In any such suit where registration
    of title to land is prayed for all parties shall for all purposes of the case
    be brought before the court in the manner provided for in original registration.
    The court may for good cause shown, in any case provided for in this section,
    enter an order dispensing with registration or permit the withdrawal of the application
    to register.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.66
- number: '5309.67'
  heading: Nonconformity does not void proceedings
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: No decree or order of sale or partition whether made before or after June
    8, 1915, in any suit, action, or proceeding mentioned in section 5309.66 of the
    Revised Code, and no sale, conveyance, or partition, or decree confirming the
    same made in any such suit, action, or proceeding shall be void or affected in
    any way by want of conformity of such suit, action, or proceeding to such section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.67
- number: '5309.68'
  heading: Certificate of title - surrender - withdrawal
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Any person owning real estate, the title to which is registered, may request
    the withdrawal of such real estate from registration by presenting to the county
    recorder an affidavit of intention to withdraw. The affidavit shall describe the
    real estate, shall be properly executed and signed, and shall have attached to
    it the owner's duplicate certificate of title. Thereupon the county recorder shall
    register or record the affidavit and, upon order of the court, cancel said certificate
    of record and record the court's order in the unregistered land official records.
    Thereafter, said title shall be considered the same as other unregistered lands.
    A registration certificate that has been surrendered as herein provided shall
    be recorded according to law, and thereafter the lands conveyed therein shall
    be considered the same as other unregistered lands.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.68
- number: '5309.69'
  heading: Declaring trusts upon registered land - negotiations
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Trusts may be declared upon registered land, or upon any interest therein,
    by deed or other instrument in writing, fully and clearly defining the trusts,
    conditions, and limitations, and the powers and duties of the trustee and giving
    his name, residence, and post-office address and the name, residence, and post-office
    address of each beneficiary. When such deed of trust or other instrument is filed
    with the county recorder, accompanied with the owner's duplicate certificate of
    title, if the recorder finds that the grantor had the right to make such grant,
    and the trustee had the right to receive it, and the instrument conforms to sections
    5309.02 to 5310.21, inclusive, of the Revised Code, he shall register such instrument
    as other instruments are registered. The recorder shall enter on the registered
    and duplicate certificate of title, memorials of the terms, conditions and limitations
    of the trust, and also in plain letters the words "in trust," and record such
    deed of trust in the "record of trusts and exceptional estates" and note the volume
    and folium where such instrument is recorded. Thereafter no transfer, charge,
    or other dealing with the land, estate or interest, shall be registered, unless
    the opinion of the probate court or the court of common pleas, certified to the
    recorder, is first obtained, that such transfer or dealing is in accordance with
    the true intent and meaning of the trust. If the court has doubt as to the true
    intent and meaning of the trust, the court shall order an issue to be made up
    and all parties in interest notified, and the court shall hear and determine the
    matter and make an order in accordance with law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.69
- number: '5309.70'
  heading: Attachment of rights of dower and homestead
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Rights of dower and to an exemption under division (A)(1) of section 2329.66
    of the Revised Code shall attach to registered land, subject to the limitations
    contained in sections 5309.02 to 5310.21 of the Revised Code, but unless it appears
    on the last registered certificate of title that such rights are so attached before
    any person has acquired an interest in the land in good faith and for a valuable
    consideration, the person shall not be prejudiced.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.70
- number: '5309.71'
  heading: Proceedings in eminent domain
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'When registered land, or any interest therein, is sought to be taken in the
    exercise of the right of eminent domain, notice of the proceedings with a pertinent
    description of the lands sought to be appropriated together with the name of the
    owner, shall be filed with the county recorder, and a memorial made on the last
    registered certificate of title of the lands sought to be appropriated.

    No title to such lands shall pass until a certified copy of the order of appropriation
    made by the probate court or the court of common pleas, setting forth by whom,
    from whom, and the amount of land appropriated, with an accurate description and
    plat of such lands, and that the damages assessed have been paid or secured to
    be paid, is filed with the recorder under the seal of the court. When such order,
    description, and plat are filed, the recorder shall note on the last registered
    certificate of title of the owner whose lands have been appropriated, the amount
    appropriated, in exact terms, and shall register in the name of the person, corporation,
    or other body entitled thereto, the title of the land taken, and issue a certificate
    therefor. If land which was taken for a public use reverts by operation of law
    to the owner from whom it was taken, or to his heirs or asigns, the court upon
    petition of the person entitled to the benefit of the reversion, after notice
    and a hearing, may order the entry of a new certificate of title to him.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.71
- number: '5309.72'
  heading: Proceedings by adverse claimant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Any person asserting any interest, claim, or lien, not shown upon the register,
    in or against registered land adverse to the title of any registered owner, when
    no provision is made by sections 5309.02 to 5310.21, inclusive, of the Revised
    Code, for registering such interest, claim, or lien in the county recorder's office,
    may make affidavit thereto, setting forth his interest, right, title, claim, lien,
    charge, or demand, and how and under whom derived, and the character and nature
    thereof. The affiant shall state his full name, place of residence, and post-office
    address and shall designate a place within the state at which all notices relating
    thereto may be served upon him. If the affiant is a nonresident of the state,
    such affiant shall state the name, residence, and post-office address of some
    person residing within the state upon whom service may be made as his agent, and
    by which service he will be bound the same as if such service is made upon him
    within the state. When such affidavit is filed in the recorder's office, the recorder
    shall enter forthwith a memorial thereof, upon the registered certificate of title,
    stating the exact time when said affidavit was filed and the purport and nature
    thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.72
- number: '5309.73'
  heading: Notice by claimant to registered owner
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: In all cases provided for in section 5309.72 of the Revised Code the claimant
    shall, within ten days after filing an affidavit described in such section, notify
    the registered owner by registered letter with five days' return card thereon,
    directed to such owner's registered address, of the filing of such affidavit and
    claim and make proof thereof to the satisfaction of the county recorder. Every
    claimant failing to serve such notice within said ten days, or to make proof of
    such notice within thirty days after such filing, releases said claim and waives
    his right to have such claim appear upon the register, and the recorder shall
    cancel it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.73
- number: '5309.74'
  heading: Power of attorney must be filed with county recorder - revocation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Before any person can convey, transfer, charge, or deal with any registered
    land, or any interest therein, as an attorney in fact for another, the deed or
    instrument empowering such person to so act shall be filed with the county recorder,
    and a memorial thereof entered upon the registered certificate of title giving
    the exact time of the filing. Such power of attorney may be revoked by revocation
    in writing, but such revocation shall not take effect until it is filed with the
    recorder and noted as a memorial on the register of title. Death shall not effect
    a revocation of such power of attorney until notice of the death is filed with
    the recorder and entered on the certificate of title.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.74
- number: '5309.75'
  heading: Statements in instrument constituting a person an attorney in fact
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'The deed or instrument constituting a person an attorney in fact shall contain:

    (A) The full name of the party appointing, and of the person appointed, and the
    residence and post-office address of each;

    (B) The number of the outstanding certificate of title, and the volume and folium
    of the register;

    (C) A description of the land that shall be the same as given in the certificate
    of title;

    (D) A brief statement of the powers conferred upon the attorney in fact.

    That deed or instrument shall be signed by the person making it and acknowledged
    as provided in section 5301.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.75
- number: '5309.76'
  heading: Alterations or erasures not permitted - exceptions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) After a title is registered and a certificate of title is issued for
    the registered land or after a memorandum, notation, or memorial is made on the
    register of titles and attested, no alteration or erasure shall be made in the
    register except in the manner provided in this section and as required by section
    5309.281 of the Revised Code.

    (B) A person whose name changes after the issuing of a registered certificate
    of title, who is registered as married but whose marriage has terminated, or whose
    name by mistake is wrongly stated in a registered certificate of title, upon satisfying
    the county recorder of the facts, shall surrender that person''s duplicate certificate
    of title and take out a new certificate of title in that person''s correct or
    changed name. The recorder shall enter and attest on the register of titles a
    memorandum of that change or correction and its date. This division applies to
    every person holding a registered interest in or upon land, and no transfer or
    assignment shall be registered until a change or correction described in this
    division is made.

    (C) When it appears that there is an error or omission in any certificate of title,
    memorandum, or memorial, that any memorandum or memorial was made, entered, and
    endorsed or any certificate of title was entered or issued by mistake, or that
    any certificate of title, memorandum, or memorial by mistake or otherwise was
    improperly canceled or improperly removed from the register of titles, the county
    recorder, on the recorder''s own motion or upon the application of any interested
    person, may summon all persons registered as interested in the lands to which
    the certificate of title, memorandum, or memorial relates to appear at an appointed
    time and to produce their certificates of title or registered instruments. If,
    at the appointed time, the recorder finds an error, omission, mistake, improper
    cancellation, or improper removal as described in this division and that no rights
    of bona fide purchasers or lienholders for value have intervened by which their
    estate or interest will be impaired by the correction of the error, omission,
    or mistake or by the restoration to the register of any improperly canceled or
    improperly removed certificate of title, memorandum, or memorial, the recorder
    shall correct the error or mistake, supply the omission, correct the cancellation
    of the certificate of title, memorandum, or memorial, or restore to the register
    the improperly removed certificate of title, memorandum, or memorial, provided
    that, in correcting any error or mistake, the original words shall not be erased
    or rendered illegible. The recorder shall attest the corrections and restorations
    by affixing the recorder''s initials or name and the date of the corrections or
    restorations.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.76
- number: '5309.77'
  heading: Effect of instruments dealing with registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: A deed, mortgage, lease or other instrument purporting to convey, transfer,
    mortgage, lease, charge, or otherwise deal with registered land, or any interest
    therein, or charge upon such land, other than a will, or a lease for a term not
    exceeding three years when the land is in the actual possession of the lessee
    or his assigns, shall take effect only as a contract between the parties thereto
    and as authority to the county recorder to register the transfer, mortgage, lease,
    charge, or other dealing upon compliance with sections 5309.02 to 5310.21, inclusive,
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.77
- number: '5309.78'
  heading: Application for continuation and certification of duplicate certificate
    of title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: The holder of a duplicate certificate of title may at any time present such
    duplicate certificate to the county recorder and request him to continue such
    duplicate certificate to date and enter thereon all memorials and notations on
    the registered certificate of title, not appearing on such duplicate certificate,
    and also enter references to all instruments filed and noted, but not yet entered
    as memorials on the registered certificate of title. Thereupon the recorder shall
    make and certify such entries giving the minute, hour, day, and year of such certification.
    At the time of making application for such continuation and certification of a
    duplicate certificate of title, the registered owner may file with the recorder
    an affidavit that said application is made in good faith for the purpose of closing
    up a bona fide transfer or encumbrance of the land or some part thereof described
    in such duplicate certificate, naming the proposed transferee or encumbrancer,
    and thereupon the recorder shall note upon the registered certificate and also
    upon the duplicate certificate of title a stay of registration for the period
    of twenty-four hours of all instruments and papers affecting said land other than
    those relating to, or connected with such proposed transfer or encumbrance. All
    such other instruments and papers so filed within said twenty-four hours shall
    be registered after and subordinate to such instruments relating to, or connected
    with such proposed transfer or encumbrance provided the latter are filed within
    said twenty-four hours.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.78
- number: '5309.79'
  heading: References required in instruments transferring title or creating or discharging
    liens
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Every voluntary instrument intended to be used in transferring any title or
    estate in registered land, or in creating any lien or charge thereon, or assigning,
    releasing, or discharging any lien or charge, in whole or in part, and every certificate
    or other paper filed with the county recorder for the purpose of acquiring or
    creating an involuntary lien, interest, or charge upon registered land, shall
    at least refer by number to the certificate of title covering such land or containing
    a memorial of such interest, lien, or charge. Such reference shall be contained
    in the body of all voluntary instruments, and in the case of such certificate
    or papers so filed to acquire involuntary interests, liens, or charges, such reference
    shall be either in the body of such certificate or papers or indorsed thereon
    and the indorsement shall be signed by the proper officer or a person in interest.
    Each of such instruments referred to in the preceding sentence shall also have
    the words "REGISTERED LAND" conspicuously typed or printed in capital letters
    on the reverse side of the last page of the instrument, which page is also known
    as the caption page or the backing of the instrument. If only a part of the land
    covered by such certificate of title is sought to be affected, and accurate description
    of such part enabling it to be definitely located and platted shall be given in
    such voluntary instrument, or in or upon such certificate or paper so filed, in
    addition to such reference to the certificate of title by number.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.79
- number: '5309.80'
  heading: Statements or indorsements contained in instruments presented for registration
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'Every deed or other voluntary instrument which is presented for registration,
    and every instrument or paper filed with the county recorder by any person or
    officer under sections 5309.02 to 5310.21, inclusive, of the Revised Code, or
    any amendment thereof, for the purpose of acquiring or affecting in any way an
    involuntary interest in, or lien or charge upon registered land, shall contain
    or have indorsed upon it the full name, county of residence, and post-office address
    of the grantee or other person who acquires, or claims, or is seeking to acquire
    or claim, an interest under such instrument, or to affect thereby some estate
    or interest in, or lien or charge upon said registered land. Every deed shall
    state whether the grantor and also the grantee are married or unmarried, and if
    married, the name in full of the husband or wife.

    Any change in the residence or post-office address of any such person shall, by
    sworn statement of the party or his authorized agent or attorney, immediately
    be filed with the recorder, who shall indorse such sworn change on the original
    instrument and on the record thereof if recorded. The names, residences, and addresses
    of all such persons, and all sworn changes thereof, shall also be entered on all
    certificates of title in the register.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.80
- number: '5309.81'
  heading: Parties to suit or proceeding involving registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: In all suits and proceedings in any of the courts of this state in which any
    estate or interest in, or lien or charge upon registered land is in any way involved
    or affected, or any registered land is to be sold, or the title otherwise transferred,
    all persons shown by the registered certificate of title to have any interest
    in the subject matter of the suit or proceeding, and all other persons known or
    appearing to have an interest, shall be made parties and brought before the court
    and shall be bound by the orders, judgments, and decrees of the court in the same
    manner and to the same extent as in the initial registration of title to land
    as provided in sections 5309.02 to 5310.21, inclusive, of the Revised Code. The
    residence and post-office address of any party in interest as shown by the certificate
    of title, or memorials, or memorandums indorsed thereon in the office of the county
    recorder, unless known by the plaintiff or party required to cause notice to be
    given to be incorrect, may be regarded as the correct residence and address of
    such party in interest and service made accordingly whether he resides within
    or without the state. In any matter or proceeding before the recorder in relation
    to registered land, or any interest in, or lien or charge upon such land, when
    notice is required to be or may be given, such residence and address, in the absence
    of knowledge to the contrary, may be regarded as correct and service made accordingly.
    In all such suits and proceedings in any court of the state or matters or proceedings
    before a recorder relating to registered land, or any interest in, or lien or
    charge upon such land, service of summons or notice may be made on any party in
    interest by the clerk of such court or recorder by mailing to such party such
    summons or notice in a registered letter with a five days' return card thereon,
    directed to his post-office address as shown by the registered certificate of
    title, or if not so shown, to his known post-office address. If said letter is
    not returned by the postal authorities to the officer mailing it, such service
    is deemed to have been made. If said letter is so returned, upon the filing of
    an affidavit of the plaintiff, or other party required to give notice, or his
    attorney, that he does not know and after diligent research has been unable to
    learn of any other residence and address of such party in interest than those
    stated in the registered certificate of title, or that he has been unable to learn
    the residence and address of any person in interest whose name, residence, and
    address is not so shown by the registered certificate of title, if such person
    in interest is shown by the registered certificate or is known to be a resident
    of this state, summons as provided in civil actions shall be issued for him to
    the sheriff of the county of his residence as so shown or known, and if returned
    "not found," such person and also such like person not so shown or known to reside
    in the state, may be served by publication as in other cases, or as in original
    registration, as one whose residence is unknown. Unknown heirs and devisees, and
    all other unknown persons, whether in being or not, under the designation of "whom
    it may concern" may be made parties and served by publication as in original registration
    or as in other civil cases, and all such persons so made parties and so served
    shall be bound by the judgment or decree with no right to question such judgment
    or decree except upon appeal, or for fraud of the successful party in procuring
    such judgment or decree to be asserted only against persons not bona fide purchasers
    or encumbrancers, or persons holding under them, by suit to be brought within
    one year from the entry of such judgment or decree.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.81
- number: '5309.82'
  heading: Notice to registered owner upon the filing of instruments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When any voluntary instrument of transfer, encumbrance, assignment, release,
    or satisfaction is filed, the county recorder shall at once give notice of such
    filing to the registered owner or holder by letter mailed to his registered address,
    unless such registered owner or holder is personally present at the time of such
    filing. When any paper for the purpose of acquiring an involuntary lien, charge,
    or interest on, or in registered land is filed, the recorder shall at once give
    like notice to the registered owner.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.82
- number: '5309.83'
  heading: Notice of appeal - petition, bond, and transcript
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Any person feeling himself aggrieved by the action, finding, or decision of
    the county recorder, or by his refusal to act, in any matter pertaining to the
    first registration of land, or any subsequent transfer, or charge, lien, interest,
    or estate in or upon such land, or by the recorder's filing, failing, neglecting,
    or refusing to file any instrument, or entering or canceling or failing, neglecting,
    or refusing to enter or cancel any memorial or notation, or by his wrongfully
    doing, or by his failing, neglecting, or refusing to do any other thing required
    of him by sections 5309.02 to 5310.21, inclusive, of the Revised Code, may, within
    three days thereafter, file with the recorder a written notice of intention to
    appeal, and shall, within ten days thereafter, file in the court of common pleas
    a petition setting forth the matter complained of and making the recorder and
    other persons whose interest may be affected, parties defendant, who shall be
    notified by summons or other process as provided by law in civil actions, or by
    registered mail and other process as provided in cases of original registration.
    Such person shall also file with his petition a bond with sureties to the approval
    of the clerk of the court of common pleas in such sum as may be fixed by a judge
    of said court or of the probate court conditioned for the due prosecution of such
    proceeding and payment of all costs and of all damages which any person in interest
    may suffer if the judgment of the court should be against the appellant. The recorder
    shall forthwith after the filing of such bond, file with such clerk a statement
    or transcript of the things the recorder has done in the matter complained of
    in the petition. The court shall proceed therein as in other cases and make such
    order or decree as is according to law and equity in the premises and sections
    5309.02 to 5310.21, inclusive of the Revised Code. The clerk of the court making
    such order shall under the seal of the court, make and deliver a certified copy
    thereof to the recorder who shall file and make entry of such order and other
    wise act in pursuance of and according to the terms of such order Such order shall
    be final.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.83
- number: '5309.84'
  heading: Right to appeal on questions of law and fact or on questions of law to
    court of appeals
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Except as otherwise provided in this chapter or Chapter 5310. of the Revised
    Code, the parties agrieved by the final order, judgment, or decree of the probate
    court or the court of common pleas provided for in any matters, proceedings, suits,
    or actions under those chapters, may appeal on questions of law to the court of
    appeals pursuant to the Rules of Appellate Procedure and, to the extent not in
    conflict with those rules, Chapter 2505. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.84
- number: '5309.85'
  heading: Burdens and incidents of registered land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Registered land, and ownership therein, except as otherwise provided in sections
    5309.02 to 5310.21, inclusive, of the Revised Code, shall in all respects be subject
    to the same burdens and incidents which attach by law to unregistered land. Such
    sections shall not relieve registered land or the owners thereof from any rights
    incident to the relation of husband or wife, or from liability to attachment or
    mesne process or levy, on execution, or from liability to any lien of any description
    established by law on land and the buildings thereon, or the interest of the owner
    in such land or buildings, or change the laws of descent, or the rights of partition
    between co-tenants, or the rights to take such land or buildings by eminent domain,
    or relieve such land from liability to be recovered by an assignee in insolvency
    under the laws relative to preferences, or change or affect in any way any other
    rights or liabilities created by law and applicable to unregistered land, except
    as otherwise expressly provided in sections 5309.02 to 5310.21, inclusive, of
    the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.85
- number: '5309.86'
  heading: Signature of county recorder on paper and electronic instruments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) Every memorial, notation, or cancellation of such memorial or notation,
    made on any certificate of title or duplicate thereof that is kept by paper means
    shall be signed by the county recorder or the recorder''s authorized deputy or
    clerk.

    (B) If a county recorder maintains registered land records by nonpaper means in
    the manner authorized by section 5309.031 of the Revised Code, the signature and
    seal of the county recorder or the recorder''s authorized deputy or clerk may
    be reproduced by electronic facsimile on a certificate of title or duplicate thereof.
    Any prior memorial, notation, or cancellation of such memorial or notation on
    a certificate of title or duplicate thereof shall note only the name of the prior
    recorder and need not be signed by the county recorder or the recorder''s authorized
    deputy or clerk.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.86
- number: '5309.87'
  heading: Mistakes
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: No petition, order, affidavit, certificate, registration, or other proceeding
    under sections 5309.02 to 5310.21, inclusive, of the Revised Code, shall be invalid
    by reason of any informality, mistake, or technical irregularity therein not affecting
    the substantial justice of the proceedings, or the substantial rights of any party
    in interest.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.87
- number: '5309.88'
  heading: Death of maker before registration
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: If any person, whether grantor, grantee, mortgagor, mortgagee, lessor, lessee,
    or other person in interest, dies after the execution of any instrument affecting
    land and before registration thereof, the registration of such instrument may
    be proceeded with in accordance with sections 5309.02 to 5310.21, inclusive, of
    the Revised Code, and shall be valid notwithstanding such death.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.88
- number: '5309.89'
  heading: Title by prescription or adverse possession
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: No title to registered real property in derogation of that of the registered
    owner shall be acquired by prescription or adverse possession.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.89
- number: '5309.91'
  heading: Enforcement of charges
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: All charges upon registered land, or any interest in such land may be enforced
    as provided by law, except as provided by sections 5309.02 to 5310.21, inclusive,
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.91
- number: '5309.92'
  heading: Transfers
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'Voluntary transfer or encumbrance of a registered estate or any interest
    therein shall be made only as prescribed by sections 5309.02 to 5310.21 of the
    Revised Code, and by entry on the register of land titles. No estate, legal or
    equitable, in registered land, shall pass by a mere assignment or delivery of
    a duplicate certificate of title or other instrument.

    This section does not apply upon implementation of a resolution of abolition under
    section 5310.38 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.92
- number: '5309.93'
  heading: Effective liens
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: No statutory or other lien except taxes and assessments, lawfully levied,
    and liens, claims, or rights arising or existing under the laws or constitution
    of the United States prior to October 4, 1933, shall affect the title to registered
    land, until after such lien is noted upon the registered certificate of title.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.93
- number: '5309.94'
  heading: Serving and waiver of notices
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'All notices required under sections 5309.02 to 5310.21, inclusive, of the
    Revised Code, shall be served in the same manner as required by law for service
    of summons or like notices.

    In any suit or proceeding for registering land, or any interest therein, or lien
    thereon, or in relation to registered land, or any interest in, or lien or charge
    on such registered land, parties may waive notice and enter appearance as in civil
    actions and in all such cases service of notice may be dispensed with.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.94
- number: '5309.95'
  heading: Materials furnished by board of county commissioners
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: All books, blanks, papers, and other things necessary for administering this
    chapter and Chapter 5310. of the Revised Code, including, but not limited to,
    equipment, machines, and materials related to the registered land functions of
    a county recorder and the maintenance of registered land records by nonpaper means
    under division (A) of section 5309.031 of the Revised Code, shall be furnished
    by the board of county commissioners.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.95
- number: '5309.96'
  heading: Instruments shall not be taken from office - copies
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'No record, instrument, paper, or other document required by this chapter
    or Chapter 5310. of the Revised Code to be filed or kept in the office of the
    county recorder, including, but not limited to, any registered land record maintained
    by nonpaper means under division (A) of section 5309.031 of the Revised Code,
    shall be taken or otherwise caused to be removed from the recorder''s office except
    by a subpoena duces tecum issued for and served upon the recorder by a court of
    record. When any record, instrument, paper, or other document is registered, the
    recorder, on demand and the tendering of the proper fee for it, shall deliver
    to any person a copy of the record, instrument, paper, or other document with,
    when applicable, all memoranda, memorials, and notations on it, certified under
    the recorder''s hand and seal of office. The recorder shall endorse, in writing,
    across the face of all such copies, in red ink, "copy; no rights conveyed hereby."

    Every copy of original records, instruments, papers, or other documents, certified
    as provided in this section, shall be received in all cases in place of the original
    record, instrument, paper, or other document and shall have the same effect in
    evidence as the original record, instrument, paper, or other document.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.96
- number: '5309.98'
  heading: Rules of practice and procedure
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: Except for registered land records maintained by nonpaper means under division
    (A) of section 5309.031 of the Revised Code, which shall be governed by the rules
    adopted under division (C) of that section, the court of appeals in any appellate
    district may prescribe rules of practice and procedure for the guidance of each
    county recorder, and the conduct of proceedings in the probate courts or courts
    of common pleas, within the district, in any matter arising under this chapter
    or Chapter 5310. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.98
- number: '5310.01'
  heading: Acceptance of fees and employment by county recorder prohibited
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: No county recorder or deputy, while in office, shall directly or indirectly
    accept any employment, or be interested in fees arising from such employment,
    as attorney, agent, or otherwise, from an applicant to register land, or other
    person connected with or concerned in the registration of land, or any lien, or
    charge thereon, or other matter in any way connected with the registration of
    land.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.01
- number: '5310.02'
  heading: Priority of persons entering claims on registered certificate of title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: Every transferee, mortgagee, lessee, and encumbrancer of registered land or
    any part thereof, or any interest therein, holds his title or lien subject to
    the interests and estates, mortgages, encumbrances, and all liens and memorials
    which have been entered upon the registered certificate of title prior to such
    transfer of the land or mortgage, lease, or encumbrance thereof, unless it is
    expressly otherwise provided in the instrument of transfer, mortgage, lease, or
    encumbrance.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.02
- number: '5310.03'
  heading: Certificates of title and copies shall be received in evidence
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: The original certificate of title in the register of titles, any copy of it
    certified under the signature of the county recorder, and the owner's duplicate
    of the original certificate of title shall be received as evidence in all the
    courts of the state and shall be conclusive as to all matters contained in it,
    except as provided in this chapter or Chapter 5309. of the Revised Code. All subsequent
    certificates of title and memorials on them shall be conclusive in favor of bona
    fide owners and holders except subsequent certificates and memorials on them procured
    by forgery.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.03
- number: '5310.04'
  heading: Powers of courts
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: The county recorder and the probate court and the court of common pleas on
    the application of any party in interest, in any matter, suit, or proceeding in
    any way relating to registered land, or to any estate or interest therein, or
    lien or charge thereon, may compel by punishment as for a contempt the production
    and delivery to said recorder or courts of any duplicate or owner's certificate
    of title, duplicate or original mortgage, lease, or other paper pertaining to
    such land, or any estate therein, or lien or charge thereon. Said recorder and
    courts may by like means compel the release and discharge by the proper party
    of any lien or charge upon such land, or any part thereof, and may compel the
    performance of any act or thing required by sections 5309.02 to 5310.21, inclusive,
    of the Revised Code to be performed by any person.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.04
- number: '5310.15'
  heading: Fees
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'On filing an application for registration, the applicant shall pay to the
    clerk of the probate court or the clerk of the court of common pleas ten dollars,
    which is full payment for all clerk''s fees and charges in such proceeding on
    behalf of the applicant. Any defendant, except a guardian ad litem, on entering
    an appearance by filing a pleading of any kind, shall pay to the clerk five dollars,
    which is full payment for all clerk''s fees on behalf of such defendant. When
    any number of defendants enter their appearance at the same time in one pleading
    by filing a pleading of any kind, one fee shall be paid.

    Every required publication in a newspaper shall be paid for by the party on whose
    application the order of publication is made, in addition to the fees prescribed
    in the first paragraph of this section. The party at whose request, or on whose
    behalf, any notice is issued, shall pay for the service of such notice except
    when such notice is sent by mail by the clerk or the county recorder.

    Examiners of titles shall receive for examining title or original reference, and
    making report on all matters arising under the application, including final certificate
    as to all necessary parties being made and properly brought before the probate
    court or the court of common pleas, and as to the proceedings being regular and
    legal, one half of one per cent of the appraised tax value, the fee in no case
    to be less than seventy-five or more than two hundred fifty dollars, for each
    separate and distinct parcel of land included in the application although made
    up of more than one tract.

    Upon a reference to an examiner of titles or to any other person upon a hearing
    to take evidence and make report to the court, the fee of the referee shall be
    fixed by the court at not more than fifteen dollars per day for the time actually
    employed.

    For a certificate of an examiner of titles that all necessary parties are before
    the court, and the proceedings are regular and legal in a suit for partition,
    foreclosure of mortgage, marshalling of liens, or other suit or proceeding affecting
    the title of any interest in, or lien or charge upon registered lands, the fees
    shall be fixed by the court, and shall not be more than twenty-five dollars for
    each separate and distinct parcel of land included in the petition or application
    although such parcel is made up of more than one tract.

    Guardians for the suit in original registration shall receive three dollars when
    there is no contest in which the guardian participates. In other cases such guardians
    shall receive such fees as the court fixes, but not more than twenty-five dollars.

    For certifying pending suits, judgments, liens, attachments, executions, or levies,
    the officers certifying them to the recorder shall receive a fee of twenty-five
    cents to be paid by the party interested and taxed in the costs of the case.

    For serving summons, notice, or other paper provided for in sections 5309.02 to
    5310.21 of the Revised Code, the sheriff or other officer shall receive the same
    fees as in other similar cases.

    The recorder shall receive the following fees, to include base fees for services
    and housing trust fund fees pursuant to section 317.36 of the Revised Code:

    (A) For original registration of title, issuing duplicate certificate, entering
    memorials and memorandums, as directed by the decree, and indexing it, a base
    fee of thirty dollars and a housing trust fund fee of thirty dollars;

    (B) For examining and registering each transfer of registered land, including
    the filing of all papers therewith, entering memorials, issuing new duplicate
    certificate of title and indexing it, a base fee of thirty dollars and a housing
    trust fund fee of thirty dollars for the first distinct body or parcel of land
    contained in such certificate, and a base fee of two dollars and a housing trust
    fund fee of two dollars for each additional distinct body or parcel of land contained
    in such certificate;

    (C) For filing, examining, and entering a memorial of each mortgage or lease,
    upon registered land, and indexing it, for each separately registered parcel,
    a base fee of ten dollars and a housing trust fund fee of ten dollars;

    (D) For filing, examining, and entering a memorial of each lien, charge, or demand
    upon registered land, and indexing it, for each separately registered parcel of
    land, a base fee of five dollars and a housing trust fund fee of five dollars;

    (E) For cancellation of any memorial or memorandum, a base fee of five dollars
    and a housing trust fund fee of five dollars; for entry of change of address,
    or notice of dower, for each separately registered parcel, a base fee of five
    dollars and a housing trust fund fee of five dollars;

    (F) For each certified copy of a registered certificate, or issuing a mortgagee''s
    duplicate certificate, or issuing a new owner''s duplicate certificate to replace
    one which has been lost or destroyed, a base fee of fifteen dollars and a housing
    trust fund fee of fifteen dollars;

    (G) For filing, examining, and entering a memorial of each release, assignment,
    or waiver of priority of a mortgage, lease, lien, charge, or demand upon registered
    land and indexing it, for each separately registered parcel, a base fee of five
    dollars and a housing trust fund fee of five dollars;

    (H) For filing, examining, and entering a memorial of each official certificate
    of pending suit, judgment, lien, attachment, execution, or levy, upon registered
    land and indexing it, for each separately registered parcel, a base fee of five
    dollars and a housing trust fund fee of five dollars;

    (I) For continuing an owner''s duplicate certificate, or mortgagee''s duplicate
    certificate and entering and certifying memorials and notations thereon, a base
    fee of five dollars and a housing trust fund fee of five dollars;

    (J) For certificate as to taxes and special assessments, for each separately registered
    parcel, a base fee of ten dollars and a housing trust fund fee of ten dollars;

    (K) For filing, recording, and indexing any papers or instruments other than those
    provided in this section, any certified copy of record, or of any instrument on
    file in the recorder''s office, the same fees allowed by law for like services;

    (L) For issuing subpoenas and notices and swearing witnesses, the same fees allowed
    the clerk for like services.

    Costs as provided in this section may be taxed and by the court ordered to be
    paid by the parties in such manner as is just.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.15
- number: '5310.16'
  heading: Conviction no bar to civil action
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: No proceedings or conviction for any crime relating to the administration
    of Chapters 5309. and 5310. of the Revised Code, shall affect any remedy which
    any person aggrieved or injured by such act has at law or in equity against the
    person who has committed such act, or against his estate , or against the county
    recorder, or examiner of titles, or the sureties on their official bonds.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.16
- number: '5310.21'
  heading: Construction
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: Sections 5309.02 to 5310.21, inclusive, of the Revised Code shall be construed
    liberally for the purpose of effecting its general intent.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.21
- number: '5310.31'
  heading: Abolition of registration definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'As used in sections 5310.31 to 5310.54 of the Revised Code:

    (A) "Conclusive effect" means the conclusive effect of the notations on a certificate
    of title with regard to conveyances or encumbrances affecting registered land,
    as provided in sections 5309.06, 5309.24, 5309.28, 5309.34, 5309.93, 5310.02,
    and 5310.03 of the Revised Code or in any other statute having a similar effect.

    (B) "Date of implementation" means the date, set by the county recorder under
    section 5310.38 of the Revised Code, as the date upon which implementation of
    a resolution of abolition is to begin.

    (C) "Land registration" and "land registration system" mean the system of registering
    titles and conveyances and encumbrances of land provided for in Chapter 5309.
    and sections 5310.01 to 5310.21 of the Revised Code.

    (D) "Nonabolishing county" means, in the case of a parcel of registered land that
    lies partly in two or more counties, one of which counties has abolished land
    registration, the county or counties that have not abolished land registration.

    (E) "Resolution of abolition" means a resolution, adopted by a board of county
    commissioners under section 5310.36 of the Revised Code, that requires abolition
    of land registration in the county.

    (F) "Traditional recordation" and "traditional recordation system" mean the system
    of recording deeds and other instruments for the conveyance or encumbrance of
    land contemplated by sections 317.08 and 5301.25 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.31
- number: '5310.32'
  heading: County resolution to consider merits of abolishment of land registration
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: A board of county commissioners may adopt a resolution to consider the merits
    of abolishing land registration in the county. When a resolution of abolition
    has previously failed of adoption, it is not in order for the board to adopt a
    resolution under this section unless two years have elapsed since the date on
    which the last resolution of abolition failed of adoption.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.32
- number: '5310.33'
  heading: Costs and benefits of maintaining land registration system
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: After adopting a resolution to consider the merits of abolishing land registration,
    the board of county commissioners shall collect evidence with regard to the costs
    and benefits of maintaining a land registration system in the county. The board
    shall collect the evidence by means of a public hearing, and by means of independent
    studies, investigations, interviews, surveys, and other research that it conducts
    or causes to be conducted. The board shall conduct the public hearing as provided
    in section 5310.35 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.33
- number: '5310.34'
  heading: Relevant evidence of costs and benefits of maintaining land registration
    system
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'Evidence relevant to the costs and benefits of maintaining a land registration
    system in a county includes, but is not limited to, evidence with regard to the
    following:

    (A) The monetary cost to a landowner of initially registering land in the county;

    (B) The monetary cost to a landowner or other person of registering subsequent
    conveyances and encumbrances in the county, as compared to the monetary cost to
    a landowner or other person of traditionally recording a conveyance or encumbrance
    in the county;

    (C) The monetary cost to the county of maintaining separate sets of records, one
    for land registration and one for traditional recordation;

    (D) The monetary cost to the county of winding up land registration if a resolution
    of abolition were implemented;

    (E) The frequency with which land registration is used in the county, as compared
    to the frequency with which traditional recordation is used in the county;

    (F) The time and steps required to initially register land in the county;

    (G) The time and steps required to register a subsequent conveyance or encumbrance
    under the land registration system, as compared to the time and steps required
    to record a conveyance or encumbrance under the traditional recordation system;

    (H) The number of officers and employees required to administer both the land
    registration system and the traditional recordation system in the county, and
    the number of officers and employees that would be needed if the land registration
    system were abolished in the county;

    (I) The degree to which the county''s officers and employees who process land
    conveyances are familiar with, and knowledgeable about, the land registration
    system, and the degree to which the county''s officers and employees who process
    land conveyances are familiar with, and knowledgeable about, the traditional recordation
    system;

    (J) The county recorder''s ability, as an officer having duties that are principally
    ministerial in nature, to properly carry out his duties under Chapter 5309. and
    sections 5310.01 to 5310.21 of the Revised Code;

    (K) Instances of misfilings as between the land registration and traditional recordation
    systems;

    (L) Liabilities for fraud, negligence, omission, mistake, or misfeasance that
    have been incurred by the county recorder or his deputies, any examiner of titles,
    or any of the recorder''s assistants or clerks in connection with the land registration
    and traditional recordation systems;

    (M) The advantages commonly cited by proponents of land registration, and the
    degree to which operation of the county''s land registration system has achieved
    those advantages;

    (N) The disadvantages commonly cited by opponents of land registration, and the
    degree to which operation of the county''s land registration system has borne
    out those disadvantages;

    (O) The degree to which other devices, such as quiet title actions, marketable
    title statutes, and title insurance, have tended to make the claimed advantages
    of land registration superfluous in the county;

    (P) The level of popular support among the county''s landowners for the county''s
    land registration system, and reasons such landowners state for supporting or
    opposing the county''s land registration system;

    (Q) The importance to the county''s landowners of the conclusive effect of a certificate
    of title, and of the conclusive right to possession afforded by land registration,
    as opposed to risk of ouster and risk of acquisition of rights by prescription
    or adverse possession under the traditional recordation system;

    (R) The degree to which the land registration and traditional recordation systems
    respectively lend themselves to microfilming and data processing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.34
- number: '5310.35'
  heading: Public hearing
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'The board of county commissioners shall conduct the public hearing required
    by section 5310.33 of the Revised Code in accordance with this section.

    (A)(1) The board shall prepare a notice of the hearing that includes each of the
    following:

    (a) A statement that the board is considering abolishing land registration in
    the county, that abolition would require the deregistration of all registered
    land in the county, and that after abolition all land in the county would have
    to be dealt with as nonregistered land;

    (b) A statement that the board seeks evidence with regard to the matters listed
    in section 5310.34 of the Revised Code;

    (c) The date, time, and place of the hearing, which shall be not earlier than
    two nor later than three months after the resolution to consider the merits of
    abolishing land registration was adopted by the board;

    (d) A statement that any person affected by the proposed abolition of land registration
    may appear at the hearing and present evidence as provided in division (B) of
    this section.

    (2) The board shall serve the notice by publication twice a week for two consecutive
    weeks in a newspaper of general circulation in the county or as provided in section
    7.16 of the Revised Code. Publication of the notice shall be completed at least
    one month prior to the date set for the hearing.

    (B) At the date, time, and place specified in the notice, the board shall conduct
    a hearing, which may be adjourned from day to day until complete, at which any
    person affected by the proposed abolition of land registration may appear in person,
    by attorney, or both, and present evidence, orally or in writing, with regard
    to the costs and benefits of maintaining land registration in the county. Any
    person who presents evidence may also present evidence refuting any evidence offered
    in opposition to the person''s evidence.

    The board shall cause a stenographic record to be made of the hearing. The president
    of the board, or a member the president designates, shall preside at the hearing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.35
- number: '5310.36'
  heading: Determination to abolish land registration system
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'Within one month after conclusion of the public hearing required by section
    5310.33 of the Revised Code, the board of county commissioners shall review and
    assess the evidence presented at the public hearing, as well as any other evidence
    that has been obtained by the board as a result of its independent studies, investigations,
    interviews, surveys, and other research.

    The board shall determine, as a result of this review and assessment, whether
    the costs exceed the benefits of maintaining a land registration system in the
    county. If the board so finds, it may adopt a resolution of abolition that makes
    specific findings with regard to the costs and benefits and requires abolition
    of land registration in the county. If such a resolution of abolition is adopted,
    abolition of land registration shall be implemented as provided in section 5310.38
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.36
- number: '5310.38'
  heading: Implementation of resolution of abolition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: '(A) A resolution of abolition shall not be implemented later than one month
    following its adoption.

    (B) Within ten days after adoption of the resolution by the board of county commissioners,
    the recorder shall notify the board, the clerk of the court of common pleas, and
    the clerk of the probate court in writing of the adoption of the resolution of
    abolition and set the date upon which implementation of abolition of land registration
    in the county is to begin. The date thus set, which is the "date of implementation,"
    shall be not later than one month after the day upon which the resolution was
    adopted.

    If one or more parcels of land registered in the county lie partly in another
    county or counties, the recorder shall send a copy of the notice required by the
    preceding paragraph to the recorder, clerk of the court of common pleas, and clerk
    of the probate court of each such other county.

    (C) Beginning on the date of implementation, winding up of land registration shall
    proceed to completion in the county, and to the extent required in any nonabolishing
    county, as provided in sections 5310.41 to 5310.54 of the Revised Code. Except
    as necessary for the winding up of land registration, Chapter 5309. and sections
    5310.01 to 5310.21 of the Revised Code do not apply in the county on and after
    the date of implementation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.38
- number: '5310.41'
  heading: Registered land after abolition of system
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: Subject to sections 5310.44 and 5310.47 of the Revised Code, on and after
    the date of implementation, registered land in a county that has abolished land
    registration shall be dealt with the same as if it were not registered land, and
    instruments for its conveyance or encumbrance shall be recorded in the traditional
    recordation system, not in the land registration system. Until there has been
    a conveyance of the entire fee of such land, in preparing the prior instrument
    reference on each such instrument of conveyance or encumbrance, the certificate
    of title that pertains to the land shall be identified as the prior instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.41
- number: '5310.42'
  heading: Certificate of title of registered land effect after abolition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'A certificate of title that is transcribed or bound in the register of titles
    on the date of implementation in a county that has abolished land registration
    has the following effects on and after such date:

    (A) Conclusive effect as to conveyances and encumbrances occurring before the
    date of implementation and noted on the certificate;

    (B) Conclusive effect as to conveyances and encumbrances occurring before the
    date of implementation that, as of the date of implementation were not noted on
    the certificate, but the instruments for which had been filed for such notation;

    (C) No conclusive effect with regard to conveyances or encumbrances occurring
    on or after the date of implementation.

    The period of limitations prescribed in section 2305.04 of the Revised Code begins
    to run on the date of implementation with regard to any registered land in a county
    that has abolished land registration, the title to which land would, prior to
    the date of implementation, have been subject to acquisition by prescription or
    adverse possession but for section 5309.89 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.42
- number: '5310.43'
  heading: Pending cases involving application for registration effect after abolition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'No case involving an application for the registration of land that is pending
    on the date of implementation, including, but not limited to, cases arising under
    section 5309.05, 5309.29, 5309.45, 5309.46, 5309.60, or 5309.66 of the Revised
    Code, is affected by the abolition of land registration in the county. The case
    shall proceed, in the same manner, and with the same effects, as if land registration
    had not been abolished, to the entry of either a decree requiring registration
    or a decree dismissing the application for registration. A party aggrieved by
    the decree in such a case may appeal as provided in section 5309.84 of the Revised
    Code.

    A certificate of title issued pursuant to a decree requiring registration relates
    back to and takes effect from the date of the decree, as provided in section 5309.26
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.43
- number: '5310.44'
  heading: Pending proceeding relating to registered land effect after abolition
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: No proceeding relating to registered land that is pending before any court,
    the county recorder, or an examiner of titles on the date of implementation, including,
    but not limited to, proceedings arising under section 5309.27, 5309.43, 5309.44,
    5309.52, 5309.61, 5309.69, 5309.71, 5309.76, 5309.81, 5309.83, or 5309.84 of the
    Revised Code, is affected by the abolition of land registration in the county.
    The proceeding shall be carried through to completion in the same manner, with
    the same effects, and with the same rights of appeal, as if land registration
    had not been abolished in the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.44
- number: '5310.45'
  heading: Certificates of title resulting from pending proceedings
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: On and after the effective date of a certificate of title issued as the result
    of any proceeding contemplated by section 5310.43 or 5310.44 of the Revised Code,
    land registered under the certificate shall be dealt with the same as if it were
    not registered land, and instruments for its conveyance or encumbrance shall be
    recorded in the traditional recordation system, not in the land registration system.
    Until there has been a conveyance of the entire fee of such land, in preparing
    the prior instrument reference on each such instrument of conveyance or encumbrance,
    the certificate of title that pertains to the land shall be identified as the
    prior instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.45
- number: '5310.46'
  heading: Effects of certificate of title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'A certificate of title issued as the result of any proceeding contemplated
    by section 5310.43 or 5310.44 of the Revised Code has the following effects:

    (A) Conclusive effect as to conveyances and encumbrances occurring before the
    effective date of the certificate;

    (B) No conclusive effect with regard to any conveyance or encumbrance occurring
    on or after the effective date of the certificate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.46
- number: '5310.47'
  heading: Abolition of land registration does not bar certain actions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: Abolition of land registration in a county does not bar a person who is deprived
    of land, any interest therein, or any encumbrance thereon as the result of a decree
    obtained by fraud in a case relating to registered land or to the initial registration
    of land from filing a complaint to open up and review the case as provided in
    section 5309.23 or 5309.81 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.47
- number: '5310.48'
  heading: Duplicate certificate of title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'On and after the date of implementation, with regard to registered land in
    a county that has abolished land registration:

    (A) A duplicate certificate of title has no use other than as a copy of the certificate
    that is transcribed or bound in the register of titles;

    (B) No person shall present, and the county recorder shall not accept, the duplicate
    as the instrument of any conveyance or encumbrance of the land to which it pertains.

    The holder of a duplicate certificate of title that pertains to land in a county
    that has abolished land registration may present the duplicate to the county recorder
    with a request for its continuation. Upon receiving such a presentation and request,
    the recorder shall continue the certificate by entering thereon all notations
    that appear on the registered title but not on the duplicate, as well as notations
    of all conveyances or encumbrances occurring before the date of implementation,
    the instruments for which, as of the date of implementation, had been filed for
    notation, but as of receipt of the request for continuation, have not been noted
    on the registered title.

    The recorder shall issue a replacement duplicate certificate of title, as provided
    in section 5309.31 of the Revised Code, for any certificate of title that is recorded
    in the traditional recordation system under section 5310.50 or 5310.51 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.48
- number: '5310.49'
  heading: Jurisdiction after abolition of land registration system
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'Except to the extent necessary to carry out the purposes of sections 5310.43,
    5310.44, and 5310.47 of the Revised Code, on and after the date of implementation
    in a county that has abolished land registration:

    (A) The court of common pleas and probate court of the county have no jurisdiction
    under Chapter 5309. or sections 5310.01 to 5310.21 of the Revised Code;

    (B) No person shall file, and the clerk of the court of common pleas or clerk
    of the probate court of the county shall not accept, any application, pleading,
    or other paper commencing any action or proceeding arising under Chapter 5309.
    or sections 5310.01 to 5310.21 of the Revised Code except as contemplated by section
    5310.44 or 5310.47 of the Revised Code.

    On and after the date of implementation, the court of common pleas of the county
    shall phase out the office of examiner of titles. The court shall continue examiners
    in their positions only insofar as their services are required in matters contemplated
    by sections 5310.43, 5310.46, and 5310.47 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.49
- number: '5310.50'
  heading: County recorder duties
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'Beginning on the date of implementation in a county that has abolished land
    registration, the county recorder shall:

    (A) Continue all certificates of title that, on the date of implementation, were
    transcribed or bound in the register of titles, to reflect both of the following:

    (1) Conveyances and encumbrances occurring prior to the date of implementation
    that, as of the date of implementation were not noted on the certificate, but
    the instruments for which had been filed for such notation;

    (2) Matters subject to determination as the result of proceedings contemplated
    by section 5310.44 of the Revised Code.

    (B) When the continuation of a certificate of title is complete, duplicate the
    certificate and record the duplicate as a muniment of title in the traditional
    recordation system. A duplicate certificate of title, filed in the traditional
    recordation system under this division, has the same effects under section 5310.42
    of the Revised Code as the identical certificate bound or transcribed in the register
    of titles.

    (C) Archive, in a safe, secure, and readily accessible place, the register of
    titles and the several other files, books, indexes, and other records that pertain
    to registered land;

    (D) Record, as muniments of title in the traditional recordation system, instruments
    for the conveyance or encumbrance of registered land that, on and after the date
    of implementation, are filed for recordation in the traditional recordation system
    as provided in sections 5310.41 and 5310.45 of the Revised Code, rather than issuing
    a new certificate of title or entering a notation upon the certificate of title
    that pertains to the land.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.50
- number: '5310.51'
  heading: Certificates of title resulting from pending actions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'The county recorder, with regard to a certificate of title issued as the
    result of any proceeding contemplated by section 5310.43 or 5310.44 of the Revised
    Code, shall do both of the following:

    (A) Transcribe or bind the certificate in the register of titles, the same as
    if land registration had not been abolished in the county. The recorder shall
    issue duplicates of such a certificate of title as provided in sections 5309.25
    to 5309.27 of the Revised Code.

    (B) Duplicate the certificate of title and record the duplicate as a muniment
    of title in the traditional recordation system. A duplicate certificate of title,
    filed in the traditional recordation system under this division, has the same
    effects under section 5310.46 of the Revised Code as the identical certificate
    bound or transcribed in the register of titles.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.51
- number: '5310.52'
  heading: Parcel lying partly in nonabolishing county
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'If a parcel of registered land lies partly in two or more counties, and one
    of the counties abolishes land registration, the portion lying in the nonabolishing
    county is subject to the following on and after the date of implementation:

    (A) The portion shall be dealt with, and instruments for its conveyance or encumbrance
    recorded, as provided in sections 317.14 and 5310.41 of the Revised Code;

    (B) The certificate of title pertaining to the portion has the effects stated
    in section 5310.42 of the Revised Code;

    (C) Any proceedings pertaining to the portion as contemplated by section 5310.44
    of the Revised Code that are pending on the date of implementation shall be carried
    through to completion as provided in that section. Upon conclusion of such proceedings,
    the portion shall be dealt with, and instruments for its conveyance or encumbrance
    recorded, as provided in section 5310.45 of the Revised Code. Any certificate
    of title that results from such proceedings has the effects stated in section
    5310.46 of the Revised Code.

    (D) Any person who has a cause of action with regard to the portion as contemplated
    by section 5310.47 of the Revised Code may commence and prosecute an action as
    provided in that section;

    (E) Section 5310.48 of the Revised Code applies to any duplicate certificate of
    title that pertains to the portion;

    (F) The court of common pleas and probate court of the nonabolishing county have
    jurisdiction with regard to the portion only as provided in section 5310.49 of
    the Revised Code;

    (G) Subject to section 5310.54 of the Revised Code, the county recorder of the
    nonabolishing county shall proceed to deregister the portion in his county in
    the manner prescribed in sections 5310.50 and 5310.51 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.52
- number: '5310.53'
  heading: Portion lying partly in nonabolishing county
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: 'If, as the result of a proceeding contemplated by section 5310.43 of the
    Revised Code, a decree is entered requiring registration of a parcel of land that
    lies partly in two or more counties, the portion lying in each county shall be
    registered as provided in section 5309.25 and division (A) of section 5310.51
    of the Revised Code, except that the portion lying in the nonabolishing county
    is subject to the following on and after its initial registration:

    (A) The portion shall be dealt with, and instruments for its conveyance or encumbrance
    recorded, as provided in sections 317.14 and 5310.45 of the Revised Code;

    (B) The certificate of title pertaining to the portion has the effects stated
    in section 5310.46 of the Revised Code;

    (C) Any person who has a cause of action with regard to the portion as contemplated
    by section 5310.47 of the Revised Code may commence and prosecute an action as
    provided in that section;

    (D) Section 5310.48 of the Revised Code applies to any duplicate certificate of
    title that pertains to the portion;

    (E) The court of common pleas and probate court of the nonabolishing county have
    jurisdiction with regard to the portion only as provided in section 5310.49 of
    the Revised Code;

    (F) Subject to section 5310.54 of the Revised Code, the county recorder of the
    nonabolishing county shall proceed to deregister the portion in the manner prescribed
    in section 5310.51 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.53
- number: '5310.54'
  heading: Nonabolishing county's land registration system
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5310'
    name: Registration Of Land Titles
  text: A nonabolishing county's land registration system, except insofar as required
    to carry out sections 5310.52 and 5310.53 of the Revised Code, shall remain intact
    and fully operational.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5310.54
- number: '5311.01'
  heading: Condominium property definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: 'As used in this chapter, except as otherwise provided:

    (A) "Agent" means any person who represents a developer or who acts for or on
    behalf of a developer in selling or offering to sell any ownership interest in
    a condominium development. "Agent" does not include an attorney whose representation
    of a developer consists solely of rendering legal services.

    (B) "Additional property" means land, including surface and air rights, or improvements
    to land that are described in an original declaration and that may be added in
    the future to an expandable condominium property.

    (C) "Affiliate of a developer" means any person who controls a developer or is
    controlled by a developer. For the purposes of this division:

    (1) A person "controls" a developer if any of the following applies:

    (a) The person is a general partner, officer, member, manager, director, or employer
    of the developer.

    (b) The person owns, controls, holds with power to vote, or holds proxies representing
    more than twenty per cent of the voting interest in the developer, doing so either
    directly or indirectly, acting in concert with one or more other persons, or through
    one or more subsidiaries.

    (c) The person controls, in any manner, the election of a majority of the developer''s
    directors.

    (d) The person has contributed more than twenty per cent of the developer''s capital.

    (2) A person "is controlled by" a developer if any of the following applies:

    (a) The developer is a general partner, member, manager, officer, director, or
    employer of the person.

    (b) The developer owns, controls, holds with power to vote, or holds proxies representing
    more than twenty per cent of the voting interest in the person, doing so either
    directly or indirectly, acting in concert with one or more other persons, or through
    one or more subsidiaries.

    (c) The developer controls, in any manner, the election of a majority of the person''s
    directors.

    (d) The developer has contributed more than twenty per cent of the person''s capital.

    (3) "Control" does not exist for purposes of division (C)(1) or (2) of this section
    if a person or developer holds any power described in either of those divisions
    solely as security for an obligation and that power is not exercised.

    (D) "Body of water" means a stream, lake, pond, marsh, river, or other body of
    natural or artificial surface water.

    (E) "Common assessments" means assessments that are charged proportionately against
    all units for common purposes.

    (F) "Common elements" means, unless otherwise provided in the declaration, the
    following parts of the condominium property:

    (1) The land described in the declaration;

    (2) All other areas, facilities, places, and structures that are not part of a
    unit, including, but not limited to, the following:

    (a) Foundations, columns, girders, beams, supports, supporting walls, roofs, halls,
    corridors, lobbies, stairs, stairways, fire escapes, entrances, and exits of buildings;

    (b) Basements, yards, gardens, parking areas, garages, and storage spaces;

    (c) Premises for the lodging of janitors or persons in charge of the property;

    (d) Installations of central services, including, but not limited to, power, light,
    gas, hot and cold water, heating, refrigeration, air conditioning, and incinerating;

    (e) Elevators, tanks, pumps, motors, fans, compressors, ducts, and, in general,
    all apparatus and installations existing for common use;

    (f) Community and commercial facilities that are not listed in division (F)(2)(a),
    (b), (c), (d), or (e) of this section but provided for in the declaration;

    (g) All parts of the condominium property that are not listed in division (F)(2)(a),
    (b), (c), (d), (e), or (f) of this section that are necessary or convenient to
    its existence, maintenance, and safety, that are normally in common use, or that
    have been designated as common elements in the declaration or drawings.

    (G) "Common expenses" means expenses designated as common expenses in this chapter
    or in the declaration.

    (H) "Common losses" means the amount by which the common expenses during any period
    of time exceeds the common assessments and common profits during that period.

    (I) "Common profits" means the amount by which the total income received from
    any of the following exceeds expenses allocable to the particular income, rental,
    fee, or charge:

    (1) Assessments charged for special benefits to specific units;

    (2) Rents received from the rental of equipment or space in common elements;

    (3) Any other fee, charge, or income other than common assessments.

    (J) "Common surplus" means the amount by which common assessments collected during
    any period exceed common expenses.

    (K) "Condominium" means a form of real property ownership in which a declaration
    has been filed submitting the property to the condominium form of ownership pursuant
    to this chapter and under which each owner has an individual ownership interest
    in a unit with the right to exclusive possession of that unit and an undivided
    ownership interest with the other unit owners in the common elements of the condominium
    property.

    (L) "Condominium development" means a condominium property in which two or more
    individual residential or water slip units, together with their undivided interests
    in the common elements of the property, are offered for sale pursuant to a common
    promotional plan.

    (M) "Condominium instruments" means the declaration and accompanying drawings
    and plans, the bylaws of the unit owners association, the condominium development
    disclosure statement described in section 5311.26 of the Revised Code, any contracts
    pertaining to the management of the condominium property, and any other documents,
    contracts, or instruments establishing ownership of or exerting control over a
    condominium property or unit.

    (N) "Condominium ownership interest" means a fee simple estate or a ninety-nine-year
    leasehold estate, renewable forever, in a unit, together with an appurtenant undivided
    interest in the common elements.

    (O) "Condominium property" means all real and personal property submitted to the
    provisions of this chapter, including land, the buildings, improvements, and structures
    on that land, the land under a water slip, the buildings, improvements, and structures
    that form or that are utilized in connection with that water slip, and all easements,
    rights, and appurtenances belonging to the land or to the land under a water slip.

    (P) "Conversion condominium development" means a condominium development that
    was operated as a rental property and occupied by tenants immediately prior to
    the submission of the property to the provisions of this chapter.

    (Q) "Convertible unit" means a unit that may be converted into one or more units
    and common elements, including limited common elements.

    (R) "Declaration" means the instrument by which property is submitted to the provisions
    of this chapter. "Declaration" includes all amendments to that declaration.

    (S) "Developer" means any person who directly or indirectly sells or offers for
    sale condominium ownership interests in a condominium development. "Developer"
    includes the declarant of a condominium development and any successor to that
    declarant who stands in the same relation to the condominium development as the
    declarant.

    (T) "Exclusive use area" means common elements that the declaration reserves for
    delegation by the board of directors to the use of a certain unit or units, to
    the exclusion of other units.

    (U) "Expandable condominium property" means a condominium property in which the
    original declaration reserves the right to add additional property.

    (V) "Leasehold condominium development" means a condominium development in which
    each unit owner owns a ninety-nine-year leasehold estate, renewable forever, in
    the owner''s unit, in the land upon which that unit is situated, or in both, together
    with an undivided leasehold interest in the common elements, with all leasehold
    interests due to expire at the same time.

    (W) "Limited common elements" means the common elements that the declaration designates
    as being reserved for use by a certain unit or units, to the exclusion of the
    other units.

    (X) "Offer" includes any inducement or solicitation to encourage a person to acquire
    a condominium ownership interest in a condominium development.

    (Y) "Par value" means a number, expressed in dollars, points, or as a percentage
    or fraction, attached to a unit by the declaration.

    (Z) "Purchaser" means a person who purchases a condominium ownership interest
    for consideration pursuant to an agreement for the conveyance or transfer of that
    interest for consideration.

    (AA) "Sale of a condominium ownership interest" means the execution by both parties
    of an agreement for the conveyance or transfer for consideration of a condominium
    ownership interest. "Sale of a condominium ownership interest" does not include
    a transfer of one or more units from the developer to another developer, a subsidiary
    of the developer, or a financial institution for the purpose of facilitating the
    sale or development of the remaining or unsold portion of the condominium property
    or additional property.

    (BB) "Unit" means the part of the condominium property that is designated as a
    unit in the declaration, is delineated as a unit on the drawings prepared pursuant
    to section 5311.07 of the Revised Code, and is one of the following:

    (1) A residential unit, in which the designated part of the condominium property
    is devoted in whole or in part to use as a residential dwelling consisting of
    one or more rooms on one or more floors of a building. A "residential unit" may
    include exterior portions of the building, spaces in a carport, and parking spaces
    as described and designated in the declaration and drawings.

    (2) A water slip unit, which consists of the land that is under the water in a
    water slip and the land that is under the piers or wharves that form the water
    slip, and that is used for the mooring of watercraft.

    (3) A commercial unit in which the property is designated for separate ownership
    or occupancy solely for commercial purposes, industrial purposes, or other nonresidential
    or nonwater slip use.

    (CC) "Unit owner" means a person who owns a condominium ownership interest in
    a unit.

    (DD) "Unit owners association" means the organization that administers the condominium
    property and that consists of all the owners of units in a condominium property.

    (EE) "Watercraft" has the same meaning as in section 1546.01 of the Revised Code.

    (FF) "Water slip" means a channel of water between piers or wharves.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.01
- number: '5311.02'
  heading: Chapter applicable to condominium property
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: Chapter 5311. of the Revised Code applies only to property that is specifically
    submitted to its provisions by the execution and filing for record of a declaration
    by the owner, as provided in this chapter. In every instance, any property so
    submitted shall be either a fee simple estate or a ninety-nine year leasehold,
    renewable forever. Neither the submission of property to the provisions of this
    chapter, nor the conveyance or transfer of a condominium ownership interest constitutes
    a subdivision within the meaning of, or is subject to, Chapter 711. of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.02
- number: '5311.03'
  heading: Condominium units deemed real property
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Each unit of a condominium property, together with the undivided interest
    in the common elements appurtenant to it, is real property for all purposes and
    is real estate within the meaning of all provisions of the Revised Code.

    (B) A unit owner is entitled to the exclusive ownership and possession of the
    unit and to ownership of an undivided interest in the common elements as expressed
    in the declaration.

    (C)(1) Each residential and commercial unit shall have a direct exit to a public
    street or highway, to a common element leading to a public street or highway,
    or to a permanent easement leading to a public street or highway.

    (2) Each water slip unit shall have a direct exit to a body of water, to a common
    element leading to a body of water, or to a permanent easement leading to a body
    of water. Each water slip unit also shall have a direct exit to a public street
    or highway or to a common element leading to a public street or highway.

    (D) Unless otherwise provided in the declaration or drawings:

    (1) The boundaries of residential and commercial units are the interior surfaces
    of the perimeter walls, floors, and ceilings.

    (2) Windows and doors, sashes, thresholds, frames, jambs, and hardware in the
    perimeter walls, floors, or ceilings of the unit are part of the unit.

    (3) Supporting walls, fixtures, and other parts of the building that are within
    the boundaries of the unit but that are necessary for the existence, support,
    maintenance, safety, or comfort of any other part of the condominium property
    are not part of the unit.

    (E)(1) Ownership of a residential unit includes the right to exclusive possession,
    use, and enjoyment of the interior surfaces of the perimeter walls, floors, and
    ceilings and of the supporting walls, fixtures, and other parts of the building
    within its boundaries, including the right to paint, tile, wax, paper, or otherwise
    finish, refinish, or decorate the unit.

    (2) Ownership of a water slip unit includes the exclusive right to moor a watercraft
    in the portion of water above the water slip unit and the right to exclusive possession,
    use, and enjoyment of the piers or wharves that are within the boundaries of the
    water slip unit.

    (3) Ownership of a commercial unit includes the right to exclusive possession,
    use, and enjoyment of the unit within the unit''s boundaries.

    (F) Each unit is subject to the right of access for the purpose of maintenance,
    repair, or service of any common element located within its boundaries or of any
    portion of the unit itself by persons authorized by the board of directors of
    the unit owners association. No maintenance, repair, or service of any portion
    of a unit shall be authorized, however, unless it is necessary in the opinion
    of the board of directors for public safety or in order to prevent damage to or
    destruction of any other part of the condominium property.'
