    name: Conveyances; Encumbrances
  text: '(A) A copy of an environmental covenant shall be provided to all of the following
    in a manner required by the applicable agency:

    (1) Each person that signed the environmental covenant;

    (2) Each person holding a recorded interest in the real property that is subject
    to the environmental covenant;

