- number: '5302.222'
  heading: Transfer of deceased's real property; Recording; Affidavit of confirmation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: '(A) The transfer of a deceased owner''s real property or interest in real
    property as designated in a transfer on death designation affidavit provided in
    section 5302.22 of the Revised Code shall be recorded by presenting to the county
    auditor of the county in which the real property is located and filing with the
    county recorder of that county an affidavit of confirmation executed by any transfer
    on death beneficiary to whom the transfer is made. The affidavit of confirmation
    shall be verified before a person authorized to administer oaths and shall be
    accompanied by a certified copy of the death certificate for the deceased owner.
    The affidavit of confirmation shall contain all of the following information:

    (1) The name and address of each transfer on death beneficiary who survived the
    deceased owner or that is in existence on the date of death of the deceased owner.
    If a named beneficiary was designated as a transfer on death beneficiary solely
    in that person''s capacity as a trustee of a trust and that trustee subsequently
    has been replaced by a successor trustee, the affidavit of confirmation shall
    include the name and address of the successor trustee and shall be accompanied
    by a copy of the recorded successor trustee affidavit described in section 5302.171
    of the Revised Code.

    (2) The date of death of the deceased owner;

    (3) A description of the subject real property or interest in real property;

    (4) The name of each transfer on death beneficiary who has not survived the deceased
    owner or that is not in existence on the date of death of the deceased owner.

    (B) The affidavit of confirmation shall be accompanied by a certified copy of
    the death certificate for each transfer on death beneficiary who has not survived
    the deceased owner.

    (C) The county recorder shall record in the official records any affidavit of
    confirmation filed under this section.

    (D) Upon the death of any individual holding real property or an interest in real
    property that is the subject of a transfer on death designation affidavit as provided
    in section 5302.22 of the Revised Code, if the title to the real property is registered
    pursuant to Chapter 5309. of the Revised Code, the procedure for the transfer
    of the interest of the deceased owner to the transfer on death beneficiary or
    beneficiaries designated in the affidavit shall be pursuant to section 5309.081
    of the Revised Code.

    (E) Any person who knowingly makes any false statement in an affidavit of confirmation
    is guilty of falsification under division (A)(6) of section 2921.13 of the Revised
    Code.'
