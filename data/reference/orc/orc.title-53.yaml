  url: https://codes.ohio.gov/ohio-revised-code/section-5311.03
- number: '5311.031'
  heading: Relocation and reallocation of boundaries
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Except as otherwise provided in the declaration, the boundaries between
    adjoining units and appurtenant limited common elements may be relocated and the
    undivided interests in the common elements appurtenant to those units may be reallocated
    by an amendment to the declaration pursuant to the following procedures:

    (1)(a) The owners of the adjoining units shall submit to the board of directors
    of the unit owners association a written application for the relocation and reallocation.
    The application shall be accompanied by the written consents of the holders of
    all liens on those units, except liens for real estate taxes and assessments not
    due and payable.

    (b) In the application, the owners of the adjoining units may request a specific
    reallocation of their undivided interests in the common elements allocated to
    the adjoining units.

    (2) Unless the board of directors finds any requested reallocation of the undivided
    interests in the common elements to be unreasonable, within thirty days after
    the board receives the application, the association shall prepare, at the expense
    of the owners of the adjoining units, an amendment to the declaration that is
    executed by the owners of the affected units and that includes all of the following:

    (a) Identification of the affected units;

    (b) Words of conveyance between the owners of the units;

    (c) A specification of the undivided interests in the common elements, the proportionate
    shares of common surplus and common expenses, and the voting powers of each unit
    resulting from the relocation and reallocation, the total of which shall equal
    the interests, shares, and powers of the former adjoining units.

    (3) At the expense of the owners of the affected units, the association shall
    record the amendment to the declaration together with both of the following:

    (a) Any drawing, plat, or plans necessary to show the altered boundaries of the
    affected units;

    (b) The dimensions and identifying number of each unit that results from the relocation
    and reallocation.

    (B) Existing liens automatically shall attach to each unit that results from the
    relocation and reallocation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.031
- number: '5311.032'
  heading: Reallocation of rights to use of limited common elements
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Except as otherwise provided in the declaration, rights to the use of
    limited common elements may be reallocated between or among units by an amendment
    to the declaration pursuant to the following procedures:

    (1) The owners of the affected units shall prepare and execute at their expense
    an amendment to the declaration that identifies the affected units and specifies
    the reallocated rights to the affected limited common elements.

    (2) The owners of the affected units shall submit to the board of directors of
    the unit owners association the amendment, accompanied by the written consents
    of the owners of all affected units and the holders of all liens on those units
    except liens for real estate taxes and assessments not due and payable.

    (3) At the expense of the owners of the affected units, the unit owners association
    shall record the submitted amendment to the declaration.

    (B)(1) If the declaration reserves any common element as an exclusive use area,
    the board of directors may delegate that common element to the use of a certain
    unit or units, to the exclusion of other units. The delegation of a common element
    may be subject to criteria that the unit owners association establishes, including
    the payment of an additional fee that is part of each benefited unit''s common
    expenses and that is only to be used for the delegated common element.

    (2) Nothing in division (B)(1) of this section affects a unit owner''s right to
    exclusive use of any common element that the declaration designates as a limited
    common element appurtenant to the owner''s unit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.032
- number: '5311.033'
  heading: Conversion of convertible units
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A)(1) Except as otherwise provided in the declaration, all or any portion
    of a convertible unit may be converted into one or more units or common elements,
    including limited common elements.

    (2)(a) To cause the conversion, the owner shall prepare and execute an amendment
    to the declaration that describes the conversion and record the amendment together
    with the drawings described in division (E) of section 5311.07 of the Revised
    Code.

    (b) The amendment shall specify the undivided interests in the common elements,
    proportionate shares of common surplus and common expenses, and the voting powers
    of each unit resulting from the conversion, the total of which shall equal the
    interest, share, and power of the unit that was converted. The amendment to the
    declaration shall assign an identifying number to each unit formed, allocate to
    each unit a portion of the undivided interest in the common elements appurtenant
    to the convertible unit, describe or delineate the limited common elements formed
    out of the convertible unit, and show or designate each unit to which those limited
    common elements are reserved.

    (3) The conversion of a convertible unit pursuant to this section is deemed to
    occur at the time that all appropriate instruments are recorded in accordance
    with division (A)(2) of this section and division (E) of section 5311.07 of the
    Revised Code.

    (B) A convertible unit that, in whole or in part, is not converted in accordance
    with this section shall be treated as a single unit until it is so converted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.033
- number: '5311.04'
  heading: Common areas and facilities
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) The common elements of a condominium property are owned by the unit owners
    as tenants in common, and the ownership shall remain undivided. No action for
    partition of any part of the common elements may be commenced, except as provided
    in section 5311.14 of the Revised Code, and no unit owner otherwise may waive
    or release any rights in the common elements.

    (B) The declaration shall set forth the undivided interest in the common elements
    appurtenant to each unit.

    (1) For units in condominium properties other than expandable condominium properties,
    the undivided interest in the common elements shall be computed in the proportion
    that the fair market value of the unit bears to the aggregate fair market value
    of all units on the date that the declaration is originally filed for record,
    shall be based on the size or par value of the unit, or shall be computed on an
    equal basis.

    (2) Except as provided in division (D) of this section, the interest in the common
    elements appurtenant to units in expandable condominium properties may be computed
    in any proportion or on any basis that is the same for units submitted by the
    declaration as originally filed and those submitted later by the addition of additional
    property and that uniformly reallocates undivided interests of units previously
    submitted when additional property is submitted.

    (C) If a par value is assigned to any unit, a par value shall be assigned to every
    unit. Substantially identical units shall be assigned the same par value, but
    units located at substantially different heights above the ground or having substantially
    different views, amenities, or other characteristics that might result in differences
    in fair market value may be considered substantially identical. If par value is
    stated in terms of dollars, it need not reflect or relate in any way to the sale
    price or fair market value of any unit, and no opinion, appraisal, or market transaction
    at a different figure affects the par value of any unit.

    (D) The declaration for an expandable condominium property shall not allocate
    interest in the common elements on the basis of par value, unless the declaration
    as originally filed does either of the following:

    (1) Requires that all units created on any additional property that is added to
    the condominium property be substantially identical to the units created on the
    condominium property previously submitted;

    (2) Describes the types of units that may be created on any additional property
    and states the par value that will be assigned to every unit that is created.

    (E) Except as provided in sections 5311.031 to 5311.033 and 5311.051 of the Revised
    Code, the undivided interest in the common elements of each unit as expressed
    in the original declaration shall not be altered except by an amendment to the
    declaration unanimously approved by all unit owners affected. The undivided interest
    in the common elements shall not be separated from the unit to which it appertains
    and is deemed conveyed or encumbered with the unit even though that interest is
    not expressly mentioned or described in the deed, mortgage, lease, or other instrument
    of conveyance or encumbrance.

    (F) Each unit owner may use the common elements in accordance with the purposes
    for which they are intended. No unit owner may hinder or encroach upon the lawful
    rights of the other unit owners in the common elements.

    (G) Subject to rules the board of directors adopts pursuant to division (B)(5)
    of section 5311.081 of the Revised Code, the board may authorize the use of limited
    common elements, as distinguished from the common elements and exclusive use areas,
    for the construction of open, unenclosed patios, hedges, decks, fences, or similar
    improvements provided that the improvements are maintained and insured by the
    owner of the unit to which the limited common area is appurtenant. The construction
    of an addition to or an expansion of a unit into limited common elements or common
    elements may not be authorized without the consent of all unit owners.

    (H)(1) Subject to the bylaws and the declaration, the unit owners association
    may purchase, hold title to, and sell real property that is not declared to be
    part of the condominium property.

    (2) Any transaction pursuant to division (H)(1) of this section that takes place
    prior to the date that the unit owners other than the developer assume control
    of the unit owners association requires the approval of the developer, the approval
    of the unit owners other than the developer who exercise not less than seventy-five
    per cent of the voting power of the unit owners association, and the authorization
    of the board of directors.

    (3) Any transaction pursuant to division (H)(1) of this section that takes place
    after the unit owners assume control of the unit owners association requires the
    approval of the unit owners who exercise not less than seventy-five per cent of
    the voting power of the unit owners association and the authorization of the board
    of directors.

    (4) Expenses incurred in connection with any transaction pursuant to division
    (H)(1) of this section are common expenses.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.04
- number: '5311.041'
  heading: Common expenses
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) All costs of the administration, operation, maintenance, repair, and
    replacement of common elements are common expenses.

    (B)(1) The declaration, either as filed and recorded by the declarant pursuant
    to section 5311.06 of the Revised Code or as amended by a vote of the unit owners
    exercising not less than ninety per cent of the voting power of the unit owners
    association, may provide that, regardless of undivided interests, the following
    common expenses shall be computed on an equal per unit basis:

    (a) Expenses that arise out of the administration, operation, maintenance, repair,
    and replacement of security, telecommunications, rubbish removal, roads, entrances,
    recreation facilities, landscaping, and grounds care;

    (b) Legal, accounting, and management expenses.

    (2) Expenses not included in division (B)(1) of this section shall be computed
    on the basis of the undivided interest in the common elements allocated to each
    unit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.041
- number: '5311.05'
  heading: Condominium declaration
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) A declaration submitting property to the provisions of this chapter shall
    be signed and acknowledged by the owner before a judge or clerk of a court of
    record, county auditor, county engineer, notary public, or mayor, who shall certify
    the acknowledgment and subscribe the certificate of acknowledgment.

    (B) A declaration shall contain all of the following:

    (1) A legal description of the land or, for a water slip condominium property,
    of the land and the land under the water area, submitted to the provisions of
    this chapter;

    (2) The name of the condominium property, which shall include the word "condominium";

    (3) The purpose of the condominium property, the units and recreational and commercial
    facilities situated in the condominium property, and any restrictions upon the
    use of the condominium property;

    (4) A general description of buildings submitted to the provisions of this chapter,
    stating the principal construction materials and the number of stories, basements,
    and units. The declaration for a water slip property shall also contain a general
    description of each water slip and of the piers and wharves forming each water
    slip submitted to the provisions of this chapter;

    (5) The unit designation of each unit submitted to the provisions of this chapter
    and a statement of its location, approximate area, the immediate common element
    or limited common element to which it has access, and any other information necessary
    for its proper identification;

    (6) A description of the common elements and limited common elements submitted
    to the provisions of this chapter, the undivided interest in those elements appurtenant
    to each unit, the basis upon which those appurtenant undivided interests are allocated,
    and the procedures whereby the undivided interests appertaining to each unit may
    be altered. The undivided interests, basis, and procedures shall be in accordance
    with sections 5311.031 to 5311.033 and 5311.04 of the Revised Code;

    (7) A statement that each unit owner is a member of a unit owners association
    established for the administration of the condominium property;

    (8) The name of a person to receive service of process for the unit owners association,
    together with the person''s residence or place of business located in this state;

    (9) A statement of any membership requirement if the unit owners association or
    any unit owners are required to be members of a not-for-profit organization that
    provides facilities or recreation, education, or social services to owners of
    property other than the condominium property;

    (10) The method by which the declaration may be amended, which, except as provided
    in division (E) of this section, division (E) of section 5311.04, division (B)
    of section 5311.041, and sections 5311.031 to 5311.033 and 5311.051 of the Revised
    Code, requires the affirmative vote of unit owners exercising not less than seventy-five
    per cent of the voting power;

    (11) Any further provisions deemed desirable.

    (C) The declaration for an expandable condominium property shall contain all of
    the following in addition to the requirements of division (B) of this section:

    (1) The explicit reservation of the declarant''s option to expand the condominium
    property;

    (2) A statement of any limitations on that option to expand, including a statement
    as to whether the consent of any unit owner is required, and how that consent
    is to be ascertained; or a statement that there are no limitations on the option
    to expand;

    (3)(a) The time at which the option to expand the condominium development expires,
    which shall not exceed seven years from the date the declaration is filed for
    record;

    (b) A statement that the declarant may, during the six months prior to the time
    that the option expires, extend the option for an additional seven years with
    the consent of the holders of a majority of the voting power of the unit owners
    other than the declarant;

    (c) A statement of any circumstances that will terminate the option to expand
    prior to the time established pursuant to division (C)(3)(a) or (b) of this section.

    (4) A legal description of all additional property that, through exercise of the
    option, may be submitted to the provisions of this chapter and added to the condominium
    property;

    (5) A statement that specifies all of the following:

    (a) Whether the addition of all or a particular portion of the additional property
    is mandatory;

    (b) If the addition of additional property is not mandatory, whether all or a
    particular portion of the additional property must be added if any other additional
    property is added;

    (c) Whether or not there are any limitations on portions of additional property
    that may be added.

    (6) A statement of whether portions of the additional property may be added at
    different times and a statement that sets forth any limitations on the addition
    of additional property at different times, including the legal descriptions of
    the boundaries of portions that may be added and specifications on the order in
    which those portions may be added to the condominium property or a statement that
    there are no limitations on the addition of additional property;

    (7) A statement of any limitations on the location of any improvements that may
    be made on any portion of the additional property added to the condominium property,
    or a statement that there are no limitations of that kind;

    (8) A statement of the maximum number of units that may be created on the additional
    property. If portions of the additional property may be added to the condominium
    property and the boundaries of those portions are fixed in accordance with division
    (C)(6) of this section, the declaration also shall state the maximum number of
    units that may be created on each portion added to the condominium property. If
    portions of the additional property may be added to the condominium property and
    the boundaries of those portions are not fixed in accordance with division (C)(6)
    of this section, the declaration also shall state the maximum number of units
    per acre that may be created on any portion added to the condominium property.

    (9) Except when the original condominium property contained no units restricted
    to residential use, a statement of the maximum percentage of the aggregate land
    area and the maximum percentage of aggregate floor area that may be devoted to
    units not restricted to residential use on any additional property added to the
    condominium property;

    (10) A statement of the extent to which any structures erected on any portion
    of the additional property added to the condominium property will be compatible
    with structures on the submitted property in terms of quality of construction,
    the principal materials to be used, and architectural style, or a statement that
    the structures need not be compatible in those respects;

    (11) With respect to all improvements to any portion of additional property added
    to the condominium property, other than structures, a statement setting forth
    both of the following:

    (a) A description of the improvements that must be made or a statement that no
    other improvements must be made;

    (b) Any restrictions or limitations on the improvements that may be made or a
    statement that there are no restrictions or limitations on improvements.

    (12) With respect to all units created on any portion of additional property added
    to the condominium property, a statement setting forth both of the following:

    (a) Whether all units of that kind must be substantially identical to units on
    previously submitted property;

    (b) Any limitations on the types of units that may be created on the additional
    property or a statement that there are no limitations of that kind.

    (13) A description of any reserved right of the declarant to create limited common
    elements within any portion of the additional property added to the condominium
    property or to designate common elements within each portion. The description
    shall specify the types, sizes, and maximum number of limited common elements
    in each portion that may subsequently be assigned to units;

    (14) Drawings and plans that the declarant considers appropriate in supplementing
    the requirements of division (C) of this section;

    (15) A statement that a successor owner of the condominium property or of additional
    property added to the condominium property who is not an affiliate of the developer
    and who is a bona fide purchaser of the property for value, or a purchaser who
    acquires the property at a sheriff''s sale or by deed in lieu of a foreclosure,
    is not liable in damages for harm caused by an action or omission of the developer
    or a breach of an obligation by the developer.

    (D) The declaration for a leasehold condominium development shall contain all
    of the following in addition to the requirements of division (B) of this section:

    (1) With respect to any ground lease or other leases, the expiration or termination
    of which could terminate or reduce the amount of condominium property, a statement
    setting forth the county in which the lease is recorded and the volume and page
    of the record;

    (2) A statement setting forth the date upon which each lease referred to in division
    (D)(1) of this section expires;

    (3)(a) A statement of whether the unit owners own any land or improvements of
    the condominium property in fee simple, and if so, a description of the improvements
    and a legal description of the land;

    (b) A statement of any rights the unit owners have to remove any improvements
    within a reasonable time after the expiration or termination of any ninety-nine
    year lease, or a statement that they have no rights of that nature.

    (4) A statement of the rights that the unit owners have to redeem the reversion
    or any of the reversions, or a statement that they have no rights of that nature;

    (5) A statement that, subsequent to the recording of the declaration, no lessor
    who executed it and no successor in interest to that lessor has any right or power
    to terminate any part of the leasehold interest of any unit owner who makes timely
    payment of the unit owner''s share of the rent to the person designated in the
    declaration for the receipt of that rent and who otherwise complies with all covenants
    that, if violated, entitle the lessor to terminate the lease.

    (E)(1) Without a vote of the unit owners, the board of directors may amend the
    declaration in any manner necessary for any of the following purposes:

    (a) To meet the requirements of institutional mortgagees, guarantors and insurers
    of first mortgage loans, the federal national mortgage association, the federal
    home loan mortgage corporation, the federal housing administration, the veterans
    administration, and similar institutions;

    (b) To meet the requirements of insurance underwriters;

    (c) To bring the declaration into compliance with this chapter;

    (d) To correct clerical or typographical errors or obvious factual errors in the
    declaration or an exhibit to the declaration;

    (e) To designate a successor to the person named to receive service of process
    for the unit owners association. If the association is incorporated in this state,
    this may be accomplished by filing with the secretary of state an appropriate
    change of statutory agent designation;

    (f) To permit notices to owners, as required by the declaration or bylaws, to
    be sent by electronic mail and, if returned undeliverable, by regular mail, provided
    the association has received the prior, written authorization from the owner;

    (g) To delete as void, any provision within the declaration or bylaws, or in any
    applicable restriction or covenant, that prohibits or limits the conveyance, encumbrance,
    rental, occupancy, or use of property subject to this chapter on the basis of
    race, color, national origin, sex, religion, or familial status.

    (2) Division (E)(1) of this section applies to condominium properties submitted
    to this chapter prior to, on, or after July 20, 2004.

    (3) Any unit owner who is aggrieved by an amendment to the declaration that the
    board of directors makes pursuant to division (E)(1) of this section may commence
    a declaratory judgment action to have the amendment declared invalid as violative
    of division (E)(1) of this section. Any action filed pursuant to division (E)(3)
    of this section shall be filed in the appropriate court of common pleas within
    one year from the date of the recordation of the amendment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.05
- number: '5311.051'
  heading: Expandable condominium property
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: Land and improvements on the property of an expandable condominium property
    are considered added to the condominium property and submitted to the provisions
    of this chapter upon the declarant and all owners and lessees of the added land
    executing and filing for record pursuant to sections 5311.06 and 5311.07 of the
    Revised Code, an amendment to the declaration that contains the information, drawings,
    and plans with respect to the additional property and improvements required by
    those sections and by divisions (A) and (B) of section 5311.05 of the Revised
    Code. The amendment, pursuant to the declaration and section 5311.04 of the Revised
    Code, shall allocate and reallocate undivided interests in the common elements
    of the condominium property appertaining to each unit of the condominium property.
    The execution and filing for record of an amendment submitting additional property
    to an expandable condominium property is an effective amendment of the declaration
    without a vote of the unit owners.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.051
- number: '5311.052'
  heading: Action to contest change in percentage interests in common areas and facilities
    of unit owners
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: If a condominium property for which the declaration was filed with a county
    recorder prior to October 1, 1978, has been expanded by the addition of units
    in accordance with the declaration, and if the unit owners do not commence an
    action to contest the change in the undivided interests in the common elements
    in a court of competent jurisdiction within two years after the date that the
    amendment was filed with the county recorder, each of the unit owners of the condominium
    property as expanded is deemed to have assented to and ratified the amendment,
    and the undivided interests in the common elements of the unit owners is no longer
    contestable.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.052
- number: '5311.06'
  heading: Declaration of condominium property filed and recorded
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A)(1) A declaration of condominium property shall be filed and recorded
    in the office of the recorder of the county or counties in which the land or water
    slips described in the declaration are situated. All original declarations when
    filed shall be accompanied by a set of drawings of the condominium property as
    required by section 5311.07 of the Revised Code and a true copy of the bylaws
    of the unit owners association as required by section 5311.08 of the Revised Code.

    (2) Any amendment to the declaration that effects any change in the bylaws or
    drawings, including an amendment to add additional land or an improvement to the
    condominium property, shall be accompanied by a true copy of the change in the
    bylaws and drawings.

    (B) A recorder shall not accept any declaration or amendment and any bylaws and
    drawings for recording until a copy of the declaration or amendment and the bylaws
    and drawings have been filed with the auditor of the county and the declaration
    or amendment contains the auditor''s certification that a copy of the declaration
    or amendment and any bylaws and drawings have been filed with the auditor.

    (C) No interest in a unit shall be conveyed until the declaration, bylaws, and
    drawings, certified as required by this section, have been filed for record. Errors
    or omissions in the declaration, bylaws, or drawings do not affect the title of
    a grantee of a unit.

    (D) This section does not prohibit a developer and a purchaser from entering into
    an agreement for the sale of a condominium ownership interest prior to filing
    the documents that create that condominium ownership interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.06
- number: '5311.07'
  heading: Condominium drawings
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A)(1) A set of drawings shall be prepared for every condominium property
    that graphically shows the boundaries, location, designation, length, width, and
    height of each unit; the boundaries, location, designation, and dimensions of
    the common elements and the limited common elements and exclusive use areas; and
    the location and dimensions of all appurtenant easements or encroachments.

    (2) If the condominium property is not contiguous, the drawings shall show the
    distances between parcels of land or water slips.

    (3) The drawings for commercial units that do not have wall surfaces shall show
    the monumental perimeter boundaries of those units.

    (4) The drawings need not show interior walls or partitions that are not load-bearing.

    (B) Each drawing shall bear both of the following:

    (1) The certified statement of a registered architect or registered professional
    engineer that the drawing accurately shows each building or water slip as built
    or constructed;

    (2) The certified statement of a registered professional surveyor that the drawing
    accurately reflects the location of improvements and recorded easements.

    (C) If some, but not all, portions of the condominium property are to be held
    by unit owners in a leasehold estate, the drawings shall show the location and
    dimensions of each portion and shall label the portion as leased land or as leased
    property. If there is more than one portion of leased land or leased property,
    the drawings shall label each portion in a manner that is different from the labels
    designating any other portions of the leased land or leased property and different
    from the identifying number of any unit.

    (D) If the condominium property contains any improvements other than units, the
    drawings or amendments shall indicate which, if any, of the improvements have
    been begun but have not been substantially completed by the use of the phrase
    "(NOT YET COMPLETED)."

    (E)(1) If any owner of a convertible unit converts all or any portion of a convertible
    unit into one or more units and common elements, including limited common elements,
    the owner shall prepare, file, and record drawings as described in divisions (E)(2)
    and (3) of this section that pertain to the portion of the building, improvement,
    or structure that constituted the former convertible unit.

    (2) The drawings shall show the boundaries, location, designation, length, width,
    and height of each unit formed out of the former convertible unit; the boundaries,
    location, designation, and dimensions of the limited common elements appurtenant
    to each unit; and the boundaries, location, designation, and dimensions of any
    common element formed out of the former convertible unit.

    (3) Each drawing shall bear the certified statement of a registered architect
    or registered professional engineer that the drawing accurately shows the units,
    common elements, and appurtenant limited common elements formed out of the former
    convertible unit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.07
- number: '5311.08'
  heading: Unit owners association
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A)(1) Every condominium property shall be administered by a unit owners
    association. All power and authority of the unit owners association shall be exercised
    by a board of directors, which the unit owners shall elect from among the unit
    owners or the spouses of unit owners. If a unit owner is not an individual, that
    unit owner may nominate for the board of directors any principal, member of a
    limited liability company, partner, director, officer, or employee of that unit
    owner. The majority of the board shall not consist of unit owners or representatives
    from the same unit unless authorized by a resolution adopted by the board of directors
    prior to the board majority being comprised of owners or representatives from
    the same unit.

    (2) The board of directors shall elect a president, secretary, treasurer, and
    other officers that the board may desire.

    (3) Unless otherwise provided in the declaration or the bylaws, all meetings of
    the unit owners association are open to the unit owners, and those present in
    person or by proxy when action is taken during a meeting of the unit owners association
    constitute a sufficient quorum.

    (4)(a) A meeting of the board of directors may be held by any method of communication,
    including electronic or telephonic communication provided that each member of
    the board can hear, participate, and respond to every other member of the board.

    (b) In lieu of conducting a meeting, the board of directors may take action with
    the unanimous written consent of the members of the board. Those written consents
    shall be filed with the minutes of the meetings of the board.

    (B) Except as provided in division (A)(1) of this section, the unit owners association
    shall be governed by bylaws. No modification of or amendment to the bylaws is
    valid unless it is set forth in an amendment to the declaration, and the amendment
    to the declaration is filed for record. Unless otherwise provided by the declaration,
    the bylaws shall provide for the following:

    (1)(a) The election of the board of directors of the unit owners association;

    (b) The number of persons constituting the board;

    (c) The terms of the directors, with not less than one-fifth to expire annually;

    (d) The powers and duties of the board;

    (e) The compensation of the directors;

    (f) The method of removal of directors from office;

    (g) The election of officers of the board;

    (h) Whether or not the services of a manager or managing agent may be engaged.

    (2) The time and place for holding meetings; the manner of and authority for calling,
    giving notice of, and conducting meetings; and the requirement, in terms of undivided
    interests in the common elements, of a quorum for meetings of the unit owners
    association;

    (3) By whom and the procedure by which maintenance, repair, and replacement of
    the common elements may be authorized;

    (4) The common expenses for which assessments may be made and the manner of collecting
    from the unit owners their respective shares of the common expenses;

    (5) The method of distributing the common profits;

    (6) By whom and the procedure by which administrative rules governing the operation
    and use of the condominium property or any portion of the property may be adopted
    and amended. These rules may govern any aspect of the condominium property that
    is not required to be governed by bylaws and may include standards governing the
    type and nature of information and documents that are subject to examination and
    copying by unit owners pursuant to section 5311.091 of the Revised Code, including
    the times and location at which items may be examined or copied and any required
    fee for copying the information or documents.

    (C)(1) The unit owners association shall be established not later than the date
    that the deed or other evidence of ownership is filed for record following the
    first sale of a condominium ownership interest in a condominium development. Membership
    in the unit owners association shall be limited to unit owners, and all unit owners
    shall be members. Until the unit owners association is established, the developer
    shall act in all instances in which action of the unit owners association or its
    officers is authorized or required by law or the declaration.

    (2)(a) Not later than sixty days after the developer has sold and conveyed condominium
    ownership interests appertaining to twenty-five per cent of the undivided interests
    in the common elements in a condominium development, the unit owners association
    shall meet, and the unit owners other than the developer shall elect not less
    than one-third of the members of the board of directors.

    (b) When computing undivided interests in expandable condominium properties for
    purposes of divisions (C) and (D) of this section, the undivided interests in
    common elements shall be computed by comparing the number of units sold and conveyed
    to the maximum number of units that may be created, as stated in the declaration
    pursuant to division (C)(8) of section 5311.05 of the Revised Code.

    (D)(1) Except as provided in division (C) of this section, the declaration or
    bylaws of a condominium development may authorize the developer or persons the
    developer designates to appoint and remove members of the board of directors of
    the unit owners association and to exercise the powers and responsibilities otherwise
    assigned by law, the declaration, or the bylaws to the unit owners association
    or to the board of directors. The authorization for developer control may extend
    from the date the unit owners association is established until sixty days after
    the sale and conveyance to purchasers in good faith for value of condominium ownership
    interests to which seventy-five per cent of the undivided interests in the common
    elements appertain, except that in no case may the authorization extend for more
    than five years after the unit owners association is established if the declaration
    includes expandable condominium property or more than three years after the unit
    owners association is established if the declaration does not include expandable
    condominium property.

    (2) If there is a unit owner other than the developer, the declaration of a condominium
    development shall not be amended to increase the scope or the period of the developer''s
    control.

    (3) Within sixty days after the expiration of the period during which the developer
    has control pursuant to division (D)(1) of this section, the unit owners association
    shall meet and elect all members of the board of directors of the association.
    The persons elected shall take office at the end of the meeting during which they
    are elected and shall, as soon as reasonably possible, appoint officers.

    (E) The board of directors, or the developer while in control of the association,
    may take any measures necessary to incorporate the unit owners association as
    a not-for-profit corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.08
- number: '5311.081'
  heading: Powers and duties of board of directors
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) The unit owners association, through the board of directors, shall do
    both of the following:

    (1) Annually, adopt and amend an estimated budget for revenues and expenditures.
    The budget shall include reserves in an amount adequate to repair and replace
    major capital items in the normal course of operations without the necessity of
    special assessments, unless either of the following applies:

    (a) The declaration or bylaws include language limiting the ability of the board
    of directors to increase assessments for common expenses without a vote of the
    unit owners;

    (b) The unit owners, exercising not less than a majority of the voting power of
    the unit owners association, waive the reserve requirement in writing annually.

    (2) Collect assessments for common expenses from unit owners.

    (B) Unless otherwise provided in the declaration, the unit owners association,
    through the board of directors, may exercise all powers of the association, including
    the power to do the following:

    (1) Hire and fire managing agents, attorneys, accountants, and other independent
    contractors and employees that the board determines are necessary or desirable
    in the management of the condominium property and the association;

    (2) Commence, defend, intervene in, settle, or compromise any civil, criminal,
    land use planning, or administrative action or proceeding that is in the name
    of, or threatened against, the unit owners association, the board of directors,
    or the condominium property, or that involves two or more unit owners , impacts
    zoning, or otherwise relates to matters affecting the condominium property;

    (3) Enter into contracts and incur liabilities relating to the operation of the
    condominium property;

    (4) Regulate the use, maintenance, repair, replacement, modification, and appearance
    of the condominium property;

    (5) Adopt rules that regulate the use or occupancy of units, the maintenance,
    repair, replacement, modification, and appearance of units, common elements, and
    limited common elements when the actions regulated by those rules affect common
    elements or other units;

    (6) Cause additional improvements to be made as part of the common elements;

    (7) Purchase, encumber, and convey units, and, subject to any restrictions in
    the declaration or bylaws and with the approvals required by division (H)(2) or
    (3) of section 5311.04 of the Revised Code, acquire an interest in other real
    property and encumber or convey that interest. All expenses incurred in connection
    with the acquisition, encumbrance, use, and operation of that interest are common
    expenses.

    (8) Acquire, encumber, and convey or otherwise transfer personal property;

    (9) Hold in the name of the unit owners association the real property and personal
    property acquired pursuant to divisions (B)(7) and (8) of this section;

    (10) Grant easements, leases, licenses, and concessions through or over the common
    elements;

    (11) Impose and collect fees or other charges for all of the following:

    (a) The use, rental, or operation of the common elements;

    (b) Services provided to unit owners;

    (c) To the extent provided in the declaration or bylaws, social activities or
    charitable contributions on behalf of the owners association;

    (12) Impose interest and late charges for the late payment of assessments; impose
    returned check charges; and, pursuant to division (C) of this section, impose
    reasonable enforcement assessments for violations of the declaration, the bylaws,
    and the rules of the unit owners association, and reasonable charges for damage
    to the common elements or other property;

    (13) Adopt and amend rules that regulate the collection of delinquent assessments
    and the application of payments of delinquent assessments;

    (14) Subject to applicable laws, adopt and amend rules that regulate the termination
    of utility or other service to a commercial unit if the unit owner is delinquent
    in the payment of an assessment that pays, in whole or in part, the cost of that
    service;

    (15) Impose reasonable charges for preparing, recording, or copying amendments
    to the declaration, resale certificates, or statements of unpaid assessments;

    (16) Enter a unit for bona fide purposes when conditions exist that involve an
    imminent risk of damage or harm to common elements, another unit, or to the health
    or safety of the occupants of that unit or another unit;

    (17) To the extent provided in the declaration or bylaws, assign the unit owners
    association''s rights to common assessments, or other future income, to a lender
    as security for a loan to the unit owners association;

    (18) Suspend the voting privileges and use of recreational facilities of a unit
    owner who is delinquent in the payment of assessments for more than thirty days;

    (19) Purchase insurance and fidelity bonds the directors consider appropriate
    or necessary;

    (20) Invest excess funds in investments that meet standards for fiduciary investments
    under Ohio law;

    (21) Exercise powers that are:

    (a) Conferred by the declaration or the bylaws of the unit owners association
    or the board of directors;

    (b) Necessary to incorporate the unit owners association as a not-for-profit corporation;

    (c) Permitted to be exercised in this state by a not-for-profit corporation;

    (d) Necessary and proper for the government and operation of the unit owners association.

    (C)(1) Prior to imposing a charge for damages or an enforcement assessment pursuant
    to division (B)(12) of this section, the board of directors shall give the unit
    owner a written notice, which may be in the form of electronic mail to an electronic
    mail address previously provided by the owner in writing, that includes all of
    the following:

    (a) A description of the property damage or violation;

    (b) The amount of the proposed charge or assessment;

    (c) A statement that the owner has a right to a hearing before the board of directors
    to contest the proposed charge or assessment;

    (d) A statement setting forth the procedures to request a hearing pursuant to
    division (C)(2) of this section;

    (e) A reasonable date by which the unit owner must cure the violation to avoid
    the proposed charge or assessment.

    (2)(a) To request a hearing, the owner shall deliver a written notice to the board
    of directors not later than the tenth day after receiving the notice required
    by division (C)(1) of this section. If the owner fails to make a timely request
    for a hearing, the right to that hearing is waived, and the board may immediately
    impose a charge for damages or an enforcement assessment pursuant to division
    (C) of this section.

    (b) If a unit owner requests a hearing, at least seven days prior to the hearing
    the board of directors shall provide the unit owner with a written notice that
    includes the date, time, and location of the hearing.

    (3) The board of directors shall not levy a charge or assessment before holding
    any hearing requested pursuant to division (C)(2) of this section.

    (4) The unit owners, through the board of directors, may allow a reasonable time
    to cure a violation described in division (B)(12) of this section before imposing
    a charge or assessment.

    (5) Within thirty days following a hearing at which the board of directors imposes
    a charge or assessment, the unit owners association shall deliver a written notice
    of the charge or assessment to the unit owner.

    (6) Any written notice that division (C) of this section requires shall be delivered
    to the unit owner or any occupant of the unit by personal delivery, by certified
    mail, return receipt requested, or by regular mail.'
