- number: '5301.692'
  heading: Holding land or interests in land for purpose of retaining use of land
    predominantly in agriculture
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: The legislative authority of a municipal corporation, board of county commissioners
    of a county, or board of township trustees of a township, in addition to the legislative
    authority's or board's other powers, may hold land or interests in land for the
    purpose of retaining the use of the land predominantly in agriculture. The authority
    and boards may do all things necessary or appropriate to achieve that purpose,
    including, without limitation, performing any of the activities described in division
    (A)(1) or (2) of section 5713.30 of the Revised Code or entering into contracts
    to lease or rent the land or interests in land so held to persons or governmental
    entities who will use the land predominantly in agriculture.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.692
- number: '5301.70'
  heading: Enforcement of conservation easement
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'Conservation easements are not unenforceable for lack of privity of contract
    or estate or lack of benefit to a particular dominant estate. Conservation easements
    are assignable to another entity authorized to hold conservation easements. Nothing
    in sections 5301.67 to 5301.70 of the Revised Code affects the enforceability
    of any article of dedication, restriction, easement, covenant, or condition that
    does not meet the requirements of those sections.

    The terms of a conservation easement may be enforced by injunction or in any other
    civil action by the holder of the easement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.70
- number: '5301.71'
  heading: Termination of agricultural leases
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) As used in this section:

    (1) "Agricultural lease agreement" means an agreement or lease, written or oral,
    that establishes or modifies the terms, conditions, rules, or any other provisions
    between a landlord and tenant concerning the use and occupancy of real property
    by one of the parties for agricultural purposes.

    (2) "Agricultural purposes" means the use and occupancy of real property for the
    planting, growing, and harvesting of crops and all practices necessary for that
    planting, growing, and harvesting. It does not mean the use and occupancy of real
    property for pasture, timber, farm buildings, horticultural buildings, or leases
    solely for equipment.

    (3) "Landlord" means the owner or lessor of real property used for agricultural
    purposes that is authorized to receive remuneration from a tenant under an agricultural
    lease agreement, and has entered into, or has actual or constructive knowledge
    of, an agricultural lease agreement.

    (4) "Tenant" means the person entitled under an agricultural lease agreement to
    use real property for agricultural purposes to the exclusion of all others.

    (B)(1) Notwithstanding anything in Chapter 1335. of the Revised Code, if an agricultural
    lease agreement does not provide for a termination date or method for notice of
    termination of the agricultural lease agreement, the landlord shall provide the
    tenant with written notice of termination. The written notice shall be delivered
    on or before the first day of September, in the year the termination is to be
    effective, by personal delivery, facsimile, or electronic mail.

    (2) If notice of termination of an agricultural lease agreement is given pursuant
    to division (B)(1) of this section, the termination date for the agricultural
    lease agreement shall be the earlier of the following, unless otherwise agreed
    to, in writing, by the landlord and tenant:

    (a) The date harvesting or removal of crops is complete;

    (b) The thirty-first day of December in the year in which the notice was given.

    (C) This section does not affect the requirements of section 5301.01 of the Revised
    Code.'
