sections:
- number: '5301.01'
  heading: Acknowledgment of deed, mortgage, land contract, lease or memorandum of
    trust
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) A deed, mortgage, land contract as referred to in division (A) (21) of
    section 317.08 of the Revised Code, or lease of any interest in real property
    and a memorandum of trust as described in division (A) of section 5301.255 of
    the Revised Code shall be signed by the grantor, mortgagor, vendor, or lessor
    in the case of a deed, mortgage, land contract, or lease or shall be signed by
    the trustee in the case of a memorandum of trust. The signing shall be acknowledged
    by the grantor, mortgagor, vendor, or lessor, or by the trustee, before a judge
    or clerk of a court of record in this state, or a county auditor, county engineer,
    notary public, or mayor, who shall certify the acknowledgement and subscribe the
    official''s name to the certificate of the acknowledgement.

    (B)(1) If a deed, mortgage, land contract as referred to in division (A) (21)
    of section 317.08 of the Revised Code, lease of any interest in real property,
    or a memorandum of trust as described in division (A) of section 5301.255 of the
    Revised Code was executed prior to February 1, 2002, and was not acknowledged
    in the presence of, or was not attested by, two witnesses as required by this
    section prior to that date, both of the following apply:

    (a) The instrument is deemed properly executed and is presumed to be valid unless
    the signature of the grantor, mortgagor, vendor, or lessor in the case of a deed,
    mortgage, land contract, or lease or of the settlor and trustee in the case of
    a memorandum of trust was obtained by fraud.

    (b) The recording of the instrument in the office of the county recorder of the
    county in which the subject property is situated is constructive notice of the
    instrument to all persons, including without limitation, a subsequent purchaser
    in good faith or any other subsequent holder of an interest in the property, regardless
    of whether the instrument was recorded prior to, on, or after February 1, 2002.

    (2) Division (B)(1) of this section does not affect any accrued substantive rights
    or vested rights that came into existence prior to February 1, 2002.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.01
- number: '5301.011'
  heading: Recorded instrument to contain volume and page reference
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: A recorded grant, reservation, or agreement creating an easement or a recorded
    lease of any interest in real property shall contain a reference by volume and
    page to the record of the deed or other recorded instrument under which the grantor
    claims title, but the omission of such reference shall not affect the validity
    of the same.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.011
- number: '5301.012'
  heading: Identification of agency for whose use and benefit interest in real property
    is acquired
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) As used in this section, "agency" means every organized body, office,
    or agency established by the laws of the state for the exercise of any function
    of state government.

    (B) Any instrument by which the state or an agency of the state acquires an interest
    in real property, including any deed, transfer, grant, reservation, agreement
    creating an easement, or lease, shall identify the agency for whose use and benefit
    the interest in the real property is acquired.

    (C)(1) If the instrument conveys less than a fee simple interest in real property
    and if the agency has authority to hold an interest in property in its own name,
    the instrument shall state that the interest in the real property is conveyed
    "to __________ (the name of the agency)." Otherwise, the instrument shall state
    that the interest in the real property is conveyed "to the State of Ohio for the
    use and benefit of __________ (name of agency)."

    (2) If the instrument conveys a fee simple interest in real property and if the
    agency has authority to hold a fee simple interest in real property in its own
    name, the instrument shall state that the interest in the real property is conveyed
    "to the __________ (name of agency) and its successors and assigns." Otherwise,
    the instrument that conveys a fee simple interest in the real property shall state
    "to the State of Ohio and its successors and assigns for the use and benefit of
    __________ (name of agency)."

    (D) The purpose of specifying the name of the agency in the instrument is to identify
    the agency that has the use and benefit of the real property. The identification
    of the agency pursuant to this section does not confer on that agency any additional
    property rights in regard to the real property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.012
- number: '5301.02'
  heading: Words necessary to create a fee simple estate
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: The use of terms of inheritance or succession are not necessary to create
    a fee simple estate, and every grant, conveyance, or mortgage of lands, tenements,
    or hereditaments shall convey or mortgage the entire interest which the grantor
    could lawfully grant, convey, or mortgage, unless it clearly appears by the deed,
    mortgage, or instrument that the grantor intended to convey or mortgage a less
    estate.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.02
- number: '5301.03'
  heading: Grantee as trustee or agent
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '"Trustees," "as trustee," or "agent," or words of similar import, following
    the name grantee in any deed of conveyance or mortgage of land executed and recorded,
    without other language showing a trust or expressly limiting the grantee''s or
    mortgagee''s powers, or for whose benefit the same is made, or other recorded
    instrument showing such trust and its terms, do not give notice to or put upon
    inquiry any person dealing with said land that a trust or agency exists, or that
    there are beneficiaries of said conveyance or mortgage other than the grantee
    and those persons disclosed by the record, or that there are any limitations on
    the power of the grantee to convey or mortgage said land, or to assign or release
    any mortgage held by such grantee. As to all subsequent bona fide purchasers,
    mortgagees, lessees, and assignees for value, a conveyance, mortgage, assignment,
    or release of mortgage by such grantee, whether or not his name is followed by
    "trustee," "as trustee," "agent," or words of similar import, conveys a title
    or lien free from the claims of any undisclosed beneficiaries, and free from any
    obligation on the part of any purchaser, mortgagee, lessee, or assignee to see
    to the application of any purchase money. This section does not apply to suits
    brought prior to July 16, 1927, in which any such deeds of conveyance, leases,
    or mortgages are called in question, or in which the rights of any beneficiaries
    in the lands described therein are involved. This section does not prevent the
    original grantor, trustor, undisclosed beneficiary, or anyone claiming under them,
    from bringing suits other than suits affecting land which is the subject of such
    conveyance or mortgage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.03
- number: '5301.04'
  heading: Deed, mortgage, or lease of a married person
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: A deed, mortgage, or lease of any interest of a married person in real property
    shall be signed, acknowledged, and certified as provided in section 5301.01 of
    the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.04
- number: '5301.05'
  heading: Discriminatory restrictive covenants - void
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) Discriminatory restrictive covenants in deeds limiting the transfer or
    lease of real property to individuals against whom discrimination is prohibited
    by division (H)(1) of section 4112.02 of the Revised Code are void. If an attorney,
    in preparing a deed, discovers a discriminatory covenant that is void under this
    section, the attorney may omit the discriminatory restrictive covenant from the
    new deed with immunity from civil liability.

    (B) Omission of a discriminatory restrictive covenant from a deed pursuant to
    division (A) of this section does not affect the validity of the deed. No county
    recorder shall refuse to record a deed pursuant to division (B) of section 317.13
    of the Revised Code due to such omission.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.05
- number: '5301.057'
  heading: Transfer fee covenant
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) As used in this section:

    (1) "Environmental covenant" means

    (a) A servitude that imposes activity and use limitations on real property and
    meets the requirements of section 5301.82 of the Revised Code;

    (b) A conservation easement or agricultural easement as defined in section 5301.67
    of the Revised Code.

    (2) "Transfer" means the sale, gift, conveyance, assignment, inheritance, or other
    transfer of an ownership interest in real property located in this state.

    (3) "Transfer fee" means a fee or charge required by a transfer fee covenant and
    payable upon the transfer of an interest in real property, or payable for the
    right to make or accept such a transfer, regardless of whether the fee or charge
    is a fixed amount or is determined as a percentage of the value of the property,
    the purchase price, or other consideration given for the transfer. The following
    are not transfer fees for purposes of this section:

    (a) Any consideration payable by the grantee to the grantor for the interest in
    real property being transferred. For the purposes of division (A)(3)(a) of this
    section, an interest in real property includes a separate mineral estate and its
    appurtenant surface access rights.

    (b) Any commission payable to a licensed real estate broker for the transfer of
    real property pursuant to an agreement between the broker and the grantor or the
    grantee, including any subsequent additional commission for that transfer payable
    by the grantor or the grantee based upon any subsequent appreciation, development,
    or sale of real property;

    (c) Any interest, charges, fees, or other amounts payable by a borrower to a lender
    pursuant to a loan secured by a mortgage against real property;

    (d) Any rent, reimbursement, charge, fee, or other amount payable by a lessee
    to a lessor under a lease;

    (e) Any consideration payable to the holder of an option to purchase an interest
    in real property or the holder of a right of first refusal or first offer to purchase
    an interest in real property for waiving, releasing, or not exercising the option
    or right upon the transfer of the property to another person;

    (f) Any tax, fee, charge, assessment, fine, or other amount payable to or imposed
    by a governmental authority;

    (g) Any fee, charge, assessment, fine, or other amount payable to a homeowners,
    condominium, cooperative, mobile home, or property owners association pursuant
    to a declaration or covenant or law applicable to the association;

    (h) Any payment required pursuant to an environmental covenant.

    (4) "Transfer fee covenant" means a declaration or covenant recorded against the
    title to real property that requires or purports to require the payment of a transfer
    fee to the declarant or other person specified in the declaration or covenant
    or to their successors or assigns upon a subsequent transfer of an interest in
    the real property.

    (B) A transfer fee covenant recorded in this state on or after September 13, 2010,
    does not run with the title to real property and is not binding on or enforceable
    against any subsequent owner, purchaser, or mortgagee of any interest in real
    property as an equitable servitude or otherwise.

    (C) Any lien purporting to secure the payment of a transfer fee under a transfer
    fee covenant that is recorded in this state on or after September 13, 2010, is
    void.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.057
- number: '5301.06'
  heading: Instruments executed according to law of place where made
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: All deeds, mortgages, powers of attorney, and other instruments of writing
    for the conveyance or encumbrance of lands, tenements, or hereditaments situated
    within this state, executed and acknowledged, or proved, in any other state, territory,
    or country in conformity with the laws of such state, territory, or country, or
    in conformity with the laws of this state, are as valid as if executed within
    this state, in conformity with sections 1337.01 to 1337.03, inclusive, and 5301.01
    to 5301.04, inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.06
- number: '5301.07'
  heading: Delivery and acceptance of real property instrument; presumptions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) As used in this section, "real property instrument" means a deed, mortgage,
    and installment contract, lease, memorandum of trust, power of attorney, or any
    instrument accepted by the county recorder under section 317.08 of the Revised
    Code.

    (B)(1) When a real property instrument is delivered to and accepted by the county
    recorder of the county in which the real property is situated, and is signed and
    acknowledged by a person with an interest in the real property that is described
    in the instrument, the instrument raises both of the following:

    (a) A rebuttable presumption that the instrument conveys, encumbers, or is enforceable
    against the interest of the person who signed the instrument;

    (b) A rebuttable presumption that the instrument is valid, enforceable, and effective
    as if in all respects the instrument was legally made, executed, acknowledged,
    and recorded.

    (2) The presumptions described in division (B)(1) of this section may be rebutted
    by clear and convincing evidence of fraud, undue influence, duress, forgery, incompetency,
    or incapacity.

    (C) When a real property instrument is of record for more than four years from
    the date of recording of the instrument, and the record shows that there is a
    defect in the making, execution, or acknowledgment of the instrument, the instrument
    and the record thereof shall be cured of the defect and be effective in all respects
    as if the instrument had been legally made, executed, acknowledged, and recorded.
    The defects may include but are not limited to the following:

    (1) The instrument was not properly witnessed.

    (2) The instrument contained no certificate of acknowledgment.

    (3) The certificate of acknowledgment is defective in any respect.

    (4) The name of the person with an interest in the real property does not appear
    in the granting clause of the instrument, but the person signed the instrument
    without limitation.

    (D) A real property instrument when delivered to the county recorder of the county
    in which the real property is situated and filed in the chain of title to the
    real property provides constructive notice to all third parties of the instrument
    notwithstanding any defect in the making, execution, or acknowledgment of the
    real property instrument.

    (E) Nothing contained in this section operates to discharge the obligation to
    comply with all provisions of sections 5301.47 to 5301.56 and section 5301.332
    of the Revised Code before the extinguishment, abandonment, or forfeiture of an
    interest in real estate as may be authorized by those sections.

    (F) Except as otherwise provided in division (E) of this section, this section
    applies to all real property instruments notwithstanding any other provision of
    the Revised Code. To the extent that a conflict exists between this section and
    any other section of the Revised Code, including but not limited to section 1301.401
    of the Revised Code, this section controls with respect to any matters addressed
    in this section.

    (G) This section shall be given retroactive effect to the fullest extent permitted
    under Section 28 of Article II, Ohio Constitution. This section shall not be given
    retroactive effect if to do so would affect any accrued substantive right or vested
    rights in any person or in any real property instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.07
- number: '5301.071'
  heading: Validity of instruments not affected by certain actions or omissions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'No instrument conveying real property, or any interest in real property,
    and of record in the office of the county recorder of the county within this state
    in which that real property is situated shall be considered defective nor shall
    the validity of that conveyance be affected because of any of the following:

    (A) The dower interest of the spouse of any grantor was not specifically released,
    but that spouse executed the instrument in the manner provided in section 5301.01
    of the Revised Code.

    (B) The officer taking the acknowledgment of the instrument having an official
    seal did not affix that seal to the certificate of acknowledgment.

    (C) The certificate of acknowledgment is not on the same sheet of paper as the
    instrument.

    (D) The executor, administrator, guardian, assignee, attorney in fact, or trustee
    making the instrument signed or acknowledged the same individually instead of
    in a representative or official capacity.

    (E)(1) The grantor or grantee of the instrument is a trust rather than the trustee
    or trustees of the trust if the trust named as grantor or grantee has been duly
    created under the laws of the state of its existence at the time of the conveyance
    and a memorandum of trust that complies with section 5301.255 of the Revised Code
    and contains a description of the real property conveyed by that instrument is
    recorded in the office of the county recorder in which the instrument of conveyance
    is recorded. Upon compliance with division (E)(1) of this section, a conveyance
    to a trust shall be considered to be a conveyance to the trustee or trustees of
    the trust in furtherance of the manifest intention of the parties.

    (2) Except as otherwise provided in division (E)(2) of this section, division
    (E)(1) of this section shall be given retroactive effect to the fullest extent
    permitted under section 28 of Article II, Ohio Constitution. Division (E) of this
    section shall not be given retroactive or curative effect if to do so would invalidate
    or supersede any instrument that conveys real property, or any interest in the
    real property, recorded in the office of the county recorder in which that real
    property is situated prior to the date of recording of a curative memorandum of
    trust or March 22, 2012, whichever event occurs later.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.071
- number: '5301.072'
  heading: Deed restrictions prohibiting placement of flag unenforceable
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) No covenant, condition, or restriction set forth in a deed, and no rule,
    regulation, bylaw, or other governing document or agreement of a homeowners, neighborhood,
    civic, or other association, shall prohibit or be construed to prohibit any of
    the following:

    (1) The placement on any property of a flagpole that is to be used for the purpose
    of displaying the flag of the United States, the flag of the state as defined
    in section 5.01 of the Revised Code, or the national league of families POW/MIA
    flag provided the flag and flag pole shall be of an appropriate size, consistent
    with the size and character of the buildings that are subject to the requirements
    or agreements of a homeowner, neighborhood, civic, or other association;

    (2) The display on any property of the flag of the United States or the national
    league of families POW/MIA flag if the flag is displayed in accordance with any
    of the following:

    (a) The patriotic customs set forth in 4 U.S.C. 5-10, and 36 U.S.C. 902 governing
    the display and use of the flag;

    (b) The consent of the property''s owner or of any person having lawful control
    of the property;

    (c) The recommended flagpole standards set forth in "Our Flag," published pursuant
    to S.C.R. 61 of the 105th Congress, 1st Session (1998);

    (d) Any federal law, proclamation of the president of the United States or the
    governor, section of the Revised Code, or local ordinance or resolution.

    (3) The display on any property of the state flag as defined in section 5.01 of
    the Revised Code if the flag is displayed in accordance with any of the following:

    (a) The consent of the property''s owner or of any person having lawful control
    of the property;

    (b) Any state law, local ordinance or resolution, or proclamation by the governor
    of the state.

    (4) The display of a service flag approved by the United States secretary of defense
    for display in a window of the residence of a member of the immediate family of
    an individual serving in the armed forces of the United States. A service flag
    includes a blue star banner, a gold star banner, and any other flag the secretary
    of defense designates as a service flag.

    (B) A covenant, condition, restriction, rule, regulation, bylaw, governing document,
    or agreement or a construction of any of these items that violates division (A)
    of this section is against public policy and unenforceable in any court of this
    state to the extent it violates that division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.072
- number: '5301.08'
  heading: Certain leases unaffected
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: Sections 5301.01 to 5301.45 of the Revised Code do not affect the validity
    of any lease of lands appropriated by congress for the support of schools or for
    ministerial purposes for any term not exceeding ten years or of any other lands
    for any term not exceeding three years or require that lease to be acknowledged
    or recorded.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.08
- number: '5301.09'
  heading: Recording lease of natural gas and petroleum
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'In recognition that such leases and licenses create an interest in real estate,
    all leases, licenses, and assignments thereof, or of any interest therein, given
    or made concerning lands or tenements in this state, by which any right is granted
    to operate or to sink or drill wells thereon for natural gas and petroleum or
    either, or pertaining thereto, shall be filed for record and recorded in such
    lease record without delay, and shall not be removed until recorded. No such lease
    or assignment thereof shall be accepted for record after September 24, 1963, unless
    it contains the mailing address of both the lessor and lessee or assignee. If
    the county in which the land subject to any such lease is located maintains permanent
    parcel numbers or sectional indexes pursuant to section 317.20 of the Revised
    Code, no such lease shall be accepted for record after December 31, 1984, unless
    it contains the applicable permanent parcel number and the information required
    by section 317.20 of the Revised Code to index such lease in the sectional indexes;
    and, in the event any such lease recorded after December 31, 1984, is subsequently
    assigned in whole or in part, and the county in which the land subject thereto
    is located maintains records by microfilm or other microphotographic process,
    the assignment shall contain the same descriptive information required to be included
    in the original lease by this sentence, but the omission of the information required
    by this section does not affect the validity of any lease. Whenever any such lease
    is forfeited for failure of the lessee, the lessee''s successors or assigns to
    abide by specifically described covenants provided for in the lease, or because
    the term of the lease has expired, the lessee, the lessee''s successors or assigns,
    shall have such lease released of record in the county where such land is situated
    without cost to the owner thereof.

    No such lease or license is valid until it is filed for record, except as between
    the parties thereto, unless the person claiming thereunder is in actual and open
    possession.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.09
- number: '5301.10'
  heading: Parties defendant in suits to cancel leases
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: The plaintiff in an action to cancel a lease or license mentioned in section
    5301.09 of the Revised Code, or in any way involving it, in order to finally adjudicate
    and determine all questions involving such lease or license in such action, need
    only make those persons defendants, so far as such lease or license is involved,
    who claim thereunder and are in actual and open possession, and those who then
    appear of record, or by the files in such office, to own or have an interest in
    such lease or license. If there is no claimant in actual and open possession,
    and no persons whose interest appears of record or file, then so far as such lease
    or license is involved, it will only be necessary to make the original lessee
    or licensee defendant in order to finally adjudicate and determine all questions
    concerning such lease or license.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.10
- number: '5301.11'
  heading: Effect of destruction of building upon lessee
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: The lessee of a building which, without fault or neglect on his part, is destroyed
    or so injured as to be unfit for occupancy, is not liable to pay rent to the lessor
    or owner thereof, after such destruction or injury, unless otherwise expressly
    provided by written agreement or covenant. The lessee thereupon must surrender
    possession of such premises.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.11
- number: '5301.12'
  heading: Purchaser at tax sale
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: When real estate is sold at tax sale, and the purchaser has received a deed
    therefor, and it has been placed upon the tax duplicate in his name, or those
    claiming under him, who openly and notoriously claim the title and ownership to
    such property, and pay the taxes thereon, as against any title acquired by deed
    executed after such tax sale, such facts are prima-facie evidence of the possession
    of such real estate by such purchaser, or those holding under him, from the date
    of such sale until it is set aside or redeemed. The knowledge, by a person acquiring
    title by deed executed after such tax sale, of the payment of taxes, and the claim
    of title and ownership shall, as to him, be conclusive proof of possession.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.12
- number: '5301.13'
  heading: Mode of conveyance by state
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: All conveyances of real estate, or any interest therein, sold on behalf of
    the state shall be drafted by the director of administrative services, executed
    in the name of the state, signed by the governor, countersigned by the secretary
    of state, and sealed with the great seal of the state. The director of administrative
    services thereupon must record such conveyance in books to be kept by the director
    of administrative services for that purpose, deliver them to the persons entitled
    thereto, and keep a record of such delivery, showing to whom delivered and the
    date thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.13
- number: '5301.14'
  heading: Copy of record of lost deed to be evidence
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: When a title deed, recorded by the director of administrative services as
    required by section 5301.13 of the Revised Code, or recorded in the office of
    the secretary of state, the record of which is required to be kept in the office
    of the director of administrative services, has been lost or destroyed by accident,
    without having been recorded in the county recorder's office, on demand and tender
    of the fees therefor, the director of administrative services shall furnish to
    any person a copy of such deed certified under the director of administrative
    services' official seal, which copy shall be received everywhere in this state
    as prima-facie evidence of the existence of the deed, and in all respects shall
    have the effect of certified copies from the official records of the county where
    such lands are situated.
  history: null
