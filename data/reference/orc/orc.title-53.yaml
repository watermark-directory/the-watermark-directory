- number: '5312.07'
  heading: Examination of books and records
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A) Unless otherwise prohibited by this section, any owner may examine and
    copy the books, records, and minutes of the owners association that division (C)
    of section 5312.06 of the Revised Code describes, pursuant to reasonable standards
    set forth in the declaration, bylaws, or rules the board promulgates. The standards
    may include, but are not limited to, standards governing the type of documents
    that are subject to examination and copying, the times and locations at which
    those documents may be examined or copied, and the specification of a reasonable
    fee for copying the documents.

    (B) Unless approved by the board of directors, an owner may not examine or copy
    any books, records, or minutes that meet either of the following conditions:

    (1) Date back more than five years prior to the date of the request;

    (2) Contain any of the following:

    (a) Information that pertains to property-related personnel matters;

    (b) Communications with legal counsel or attorney work product pertaining to potential,
    threatened or pending litigation, or other property-related matters;

    (c) Information that pertains to contracts or transactions currently under negotiation,
    or information that is contained in a contract or other agreement containing confidentiality
    requirements and that is subject to those requirements;

    (d) Information that relates to the enforcement of the declaration, bylaws, or
    rules of the owners association against other owners;

    (e) Information, the disclosure of which is prohibited by state or federal law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.07
- number: '5312.08'
  heading: Common elements; maintenance, repair and replacement
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A) Unless otherwise provided by the declaration, the owners association
    is responsible for reasonable maintenance, repair, and replacement of the common
    elements, and each owner is responsible for maintenance, repair, and replacement
    of the owner''s lot and improvements to that lot, including the dwelling unit
    and the utility lines serving that dwelling unit.

    (B) An owner shall permit agents or employees of the owners association and other
    owners access through the owner''s lot and dwelling unit for the purpose of fulfilling
    the association''s duties and obligations. Any damage to the common elements,
    lot, or dwelling unit due to that access is the responsibility of the owner that
    caused the damage or the owners association if it is responsible for the damage.
    That owner, or the owners association, is liable for the prompt repair of any
    damage and, if not repairable, for the value of the damaged property or item as
    it existed immediately prior to that damage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.08
- number: '5312.09'
  heading: Assignment or conveyance of rights or interest in common elements
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A)(1) The owners association may not assign the right to common assessments,
    or the future income from those assessments, or convey any fee interest or any
    security interest in any portion of the common elements unless the declaration
    specifically provides for such a conveyance or seventy-five per cent of the voting
    power of the owners association, or any larger percentage the declaration specifies,
    approves the conveyance.

    (2) The owners association may not convey any fee interest in a limited common
    element or subject a limited common element to a security interest without the
    approval of all of the owners of the lots to which the limited common element
    is allocated. Any proceeds of the conveyance of a limited common element are an
    asset of the owners association.

    (B) No contract to convey or subject a common element or a limited common element
    to a security interest is enforceable against the owners association unless it
    complies with division (A) of this section. The board of directors, on behalf
    of the owners association, has all powers necessary and appropriate to effect
    a conveyance or encumbrance that division (A) of this section permits, including
    the power to execute a deed or other instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.09
- number: '5312.10'
  heading: Common expense liability
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A)(1) In accordance with its declaration, all costs the owners association
    incurs in the administration, governance, and maintenance of a planned community
    are common expenses. Unless otherwise provided in the declaration, all costs of
    the administration, operation, maintenance, repair, and replacement of the common
    elements are common expenses.

    (2) The common expense liability of each lot shall be allocated in accordance
    with the allocation set forth in the declaration. If the declaration does not
    establish any allocation, the common expense liability shall be allocated equally
    among all the lots.

    (3) The board of directors shall assess the common expense liability for each
    lot at least annually, based on a budget the board adopts at least annually.

    (B) The board shall charge interest on any past due assessment or installment
    at the rate the board establishes, not to exceed any maximum rate permitted by
    law.

    (C)(1) The board may not charge assessments for common expenses unless the declaration
    provides for or contemplates the charging of such assessments.

    (2) The board may not increase any assessment for common expenses when the declaration
    limits the amount of such assessments unless the owners amend the declaration
    as provided in division (A) of section 5312.05 of the Revised Code to allow the
    increased amount.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.10
- number: '5312.11'
  heading: Individual lot assessments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A) An owners association may assess an individual lot for any of the following:

    (1) Enforcement assessments and individual assessments for utility service that
    are imposed or levied in accordance with the declaration, as well as expenses
    the board incurs in collecting those assessments;

    (2) Costs of maintenance, repair, or replacement incurred due to the willful or
    negligent act of an owner or occupant of a lot or their family, tenants, guests,
    or invitees, including, but not limited to, attorney''s fees, court costs, and
    other expenses;

    (3) Costs associated with the enforcement of the declaration or the rules and
    regulations of the owners association, including, but not limited to, attorney''s
    fees, court costs, and other expenses;

    (4) Costs or charges the declaration or bylaws permit.

    (B) Unless otherwise provided by the declaration, bylaws, or rules, the owners
    association shall credit any amount it receives from a lot owner pursuant to this
    section in the following order:

    (1) To interest owed to the owners association;

    (2) To administrative late fees or enforcement assessments owed to the owners
    association;

    (3) To collection costs, attorney''s fees, and paralegal fees the owners association
    incurred in collecting the assessment;

    (4) To the oldest principal amounts the owner owes to the owners association for
    the common expenses chargeable against the dwelling unit or lot.

    (C) Prior to imposing a charge for damages or an enforcement assessment pursuant
    to this section, the board of directors shall give the owner a written notice,
    which may be in the form of electronic mail to an electronic mail address previously
    provided by the owner in writing, that includes all of the following:

    (1) A description of the property damage or violation;

    (2) The amount of the proposed charge or assessment;

    (3) A statement that the owner has a right to a hearing before the board to contest
    the proposed charge or assessment;

    (4) A statement setting forth the procedures to request a hearing;

    (5) A reasonable date by which the owner must cure a continuing violation to avoid
    the proposed charge or assessment, if such an opportunity to cure is applicable.

    (D)(1) To request a hearing, the owner shall deliver a written notice to the board
    not later than the tenth day after receiving the notice this division requires.
    If the owner fails to make a timely request for a hearing, the right to that hearing
    is waived, and the board immediately may impose a charge for damages or an enforcement
    assessment pursuant to this section.

    (2) If an owner requests a hearing, at least seven days prior to the hearing the
    board shall provide the owner with a written notice that includes the date, time,
    and location of the hearing.

    (3) The board shall not levy a charge or assessment before holding any hearing
    requested pursuant to this section.

    (4) Within thirty days following a hearing at which the board imposes a charge
    or assessment, the owners association shall deliver a written notice of the charge
    or assessment to the owner.

    (5) Any written notice that this section requires shall be delivered to the owner
    or any occupant of the dwelling unit by personal delivery, by certified mail,
    return receipt requested, or by regular mail.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.11
- number: '5312.12'
  heading: Liens
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A) The owners association has a lien upon the estate or interest in any
    lot for the payment of any assessment or charge levied in accordance with section
    5312.11 of the Revised Code, as well as any related interest, administrative late
    fees, enforcement assessments, collection costs, attorney''s fees, and paralegal
    fees, that are chargeable against the lot and that remain unpaid ten days after
    any portion has become due and payable.

    (B) All of the following apply to a lien charged against a property pursuant to
    this section:

    (1) The lien is effective on the date that a certificate of lien is filed for
    record in the office of the recorder of the county or counties in which the lot
    is situated, pursuant to authorization by the board of directors of the owners
    association. The certificate shall contain a description of the lot, the name
    of the record owner of the lot, and the amount of the unpaid assessment or charge.
    It shall be subscribed to by the president of the board or other designated representative
    of the owners association.

    (2) The lien is a continuing lien upon the lot against which each assessment or
    charge is made, subject to automatic subsequent adjustments reflecting any additional
    unpaid interest, administrative late fees, enforcement assessments, collection
    costs, attorney''s fees, paralegal fees, and court costs.

    (3) The lien is valid for a period of five years from the date of filing, unless
    it is sooner released or satisfied in the same manner provided by law for the
    release and satisfaction of mortgages on real property or unless it is discharged
    by the final judgment or order of a court in an action brought to discharge the
    lien as provided in this section.

    (4) The lien is prior to any lien or encumbrance subsequently arising or created,
    except liens for real estate taxes and assessments of political subdivisions and
    liens of first mortgages that have been filed for record prior to the recording
    of the lien, and may be foreclosed in the same manner as a mortgage on real property
    in an action brought by the owners association.

    (C)(1) In any foreclosure action that the holder of a lien commences, the holder
    shall name the owners association as a defendant in the action. The owners association
    or the holder of the lien is entitled to the appointment of a receiver to collect
    rental payments due on the property. Any rental payment a receiver collects during
    the pendency of the foreclosure action shall be applied first to the payment of
    the portion of the common expenses chargeable to the lot during the foreclosure
    action.

    (2) Unless prohibited by the declaration or the bylaws, following any foreclosure
    action, the owners association or an agent the board authorizes is entitled to
    become a purchaser at the foreclosure sale.

    (3) A mortgage on a lot may contain a provision that secures the mortgagee''s
    advances for the payment of the portion of the common expenses chargeable against
    the lot upon which the mortgagee holds the mortgage.

    (D) An owner may commence an action for the discharge of the lien in the court
    of common pleas of the county in which all or a part of the property is situated
    if the owner believes that the liability for the unpaid assessment or charge for
    which the owners association filed a certificate of lien was improperly charged.
    In the action, if it is finally determined that the unpaid amount of the assessment
    or charge was improperly charged to the owner or the lot, the court shall enter
    an order that it determines to be just, which may provide for a discharge of record
    of all or a portion of the lien and an award of attorney''s fees to the owner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.12
- number: '5312.13'
  heading: Compliance with covenants, conditions and restrictions; action for damages
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: The owners association and all owners, residents, tenants, and other persons
    lawfully in possession and control of any part of an ownership interest shall
    comply with any covenant, condition, and restriction set forth in any recorded
    document to which they are subject, and with the bylaws and the rules of the owners
    association, as lawfully amended. Any violation is grounds for the owners association
    or any owner to commence a civil action for damages, injunctive relief, or both,
    and an award of court costs and reasonable attorney's fees in both types of action.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.13
- number: '5312.14'
  heading: Service of process
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: In any action relating to the common elements or to any right, duty, or obligation
    possessed or imposed upon the owners association by statute or otherwise, the
    owners association may sue or be sued as a separate legal entity. Service of summons
    or other process may be made upon the owners association by serving the process
    personally upon the president of the board of directors or the person named as
    statutory agent of the association if it is an incorporated entity. Any action
    brought by or on behalf of the owners association shall be pursuant to authority
    granted by the board of directors.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.14
- number: '5312.15'
  heading: Construction of chapter
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: This chapter shall be construed to establish a uniform framework for the operation
    and management of planned communities in this state and to supplement any planned
    community governing document that is in existence on the effective date of this
    chapter. In the event of a specific conflict between this chapter and express
    requirements or restrictions in such a governing document, the governing document
    shall control. This chapter shall control if any governing document is silent
    with respect to any provision of this chapter.
