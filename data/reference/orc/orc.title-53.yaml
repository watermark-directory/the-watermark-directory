  url: https://codes.ohio.gov/ohio-revised-code/section-5301.63
- number: '5301.67'
  heading: Conservation, agricultural easement definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'As used in sections 5301.67 to 5301.70 of the Revised Code:

    (A) "Conservation easement" means an incorporeal right or interest in land that
    is held for the public purpose of retaining land, water, or wetland areas predominantly
    in their natural, scenic, open, or wooded condition, including, without limitation,
    the use of land in agriculture when consistent with and in furtherance of the
    purpose of retaining those areas in such a condition, or retaining their use predominantly
    as suitable habitat for fish, plants, or wildlife; that imposes any limitations
    on the use or development of the areas that are appropriate at the time of creation
    of the conservation easement to achieve one or more of those purposes; and that
    includes appropriate provisions for the holder to enter the property subject to
    the easement at reasonable times to ensure compliance with its provisions.

    (B) "Agriculture" means those activities occurring on land devoted exclusively
    to agricultural use, as defined in section 5713.30 of the Revised Code, or on
    land that constitutes a homestead.

    (C) "Agricultural easement" means an incorporeal right or interest in land that
    is held for the public purpose of retaining the use of land predominantly in agriculture;
    that imposes any limitations on the use or development of the land that are appropriate
    at the time of creation of the easement to achieve that purpose; that is in the
    form of articles of dedication, easement, covenant, restriction, or condition;
    and that includes appropriate provisions for the holder to enter the property
    subject to the easement at reasonable times to ensure compliance with its provisions.

    (D) "Homestead" means the portion of a farm on which is located a dwelling house,
    yard, or outbuildings such as a barn or garage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.67
- number: '5301.68'
  heading: Granting conservation or agricultural easement
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'An owner of land may grant a conservation easement to the department of natural
    resources, a park district created under Chapter 1545. of the Revised Code, a
    township park district created under section 511.18 of the Revised Code, a conservancy
    district created under Chapter 6101. of the Revised Code, a soil and water conservation
    district created under Chapter 940. of the Revised Code, a regional water and
    sewer district created under Chapter 6119. of the Revised Code, a county, a township,
    a municipal corporation, or a charitable organization that is authorized to hold
    conservation easements by division (B) of section 5301.69 of the Revised Code,
    in the form of articles of dedication, easement, covenant, restriction, or condition.
    An owner of land also may grant an agricultural easement to the director of agriculture;
    to a municipal corporation, county, township, or soil and water conservation district;
    or to a charitable organization described in division (B) of section 5301.69 of
    the Revised Code. An owner of land may grant an agricultural easement only on
    land that is valued for purposes of real property taxation at its current value
    for agricultural use under section 5713.31 of the Revised Code or that constitutes
    a homestead when the easement is granted.

    All conservation easements and agricultural easements shall be executed and recorded
    in the same manner as other instruments conveying interests in land.'
