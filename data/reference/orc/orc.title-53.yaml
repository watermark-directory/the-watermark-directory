  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.87
- number: '5301.88'
  heading: Filing and recording of environmental covenants
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) Except as otherwise provided in division (B) of this section, an environmental
    covenant and any amendment or termination of the environmental covenant shall
    be filed in the office of the county recorder of each county in which the real
    property that is subject to the environmental covenant is located and shall be
    recorded in the same manner as a deed to the property. For purposes of indexing,
    a holder shall be treated as a grantee.

    (B) Pursuant to Chapter 5309. of the Revised Code, an environmental covenant and
    any amendment or termination of the environmental covenant in connection with
    registered land, as defined in section 5309.01 of the Revised Code, shall be entered
    as a memorial on the page of the register where the title of the owner is registered.

    (C) Except as otherwise provided in division (C) of section 5301.89 of the Revised
    Code, an environmental covenant is subject to the laws of this state governing
    recording and priority of interest in real property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.88
- number: '5301.89'
  heading: Environmental covenant perpetual - exceptions - judicial termination -
    limitation
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) An environmental covenant is perpetual unless any of the following applies:

    (1) The environmental covenant is limited by its terms to a specific duration
    or is terminated by its terms by the occurrence of a specific event.

    (2) The environmental covenant is terminated by consent pursuant to section 5301.90
    of the Revised Code.

    (3) The environmental covenant is terminated pursuant to division (B) of this
    section.

    (4) The environmental covenant is terminated by foreclosure of an interest that
    has priority over the environmental covenant.

    (5) The environmental covenant is terminated or modified in an eminent domain
    proceeding, but only if all of the following apply:

    (a) The agency that signed the environmental covenant is a party to the proceeding.

    (b) All persons identified in divisions (A) and (B) of section 5301.90 of the
    Revised code are given notice of the pendency of the proceeding.

    (c) The court determines, after a hearing, that the termination or modification
    will not adversely affect human health or safety or the environment.

    (B) If the agency that signed an environmental covenant has determined that the
    intended benefits of the environmental covenant can no longer be realized, a court,
    under the doctrine of changed circumstances, in an action in which all persons
    identified in divisions (A) and (B) of section 5301.90 of the Revised Code have
    been given notice, may terminate the environmental covenant or reduce its burden
    on the real property that is subject to the environmental covenant.

    (C) Except as otherwise provided in divisions (A) and (B) of this section, an
    environmental covenant may not be extinguished, limited, or impaired through issuance
    of a tax deed, foreclosure of a tax lien, or application of the doctrine of adverse
    possession, prescription, abandonment, waiver, lack of enforcement, or acquiescence
    or a similar doctrine.

    (D) An environmental covenant may not be extinguished, limited, or impaired by
    application of sections 5301.47 to 5301.56 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.89
- number: '5301.90'
  heading: Amendment or termination of environmental covenant by consent - assignment
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) An environmental covenant may be amended or terminated by consent only
    if the amendment or termination is signed by all of the following:

    (1) The applicable agency;

    (2) Unless waived by that agency, the current owner of the fee simple of the real
    property that is subject to the environmental covenant;

    (3) Each person that originally signed the environmental covenant unless one or
    more of the following apply:

    (a) The person waived in a signed record the right to consent;

    (b) A court finds that the person no longer exists or cannot be located or identified
    with the exercise of reasonable diligence;

    (c) The applicable agency finds that the signature of the person is not necessary.

    (4) Except as otherwise provided in division (D)(2) of this section, each holder.

    (B) If an interest in real property is subject to an environmental covenant, the
    interest is not affected by an amendment of the environmental covenant unless
    the current owner of the interest consents in writing to the amendment or has
    waived in a signed record the right to consent to amendments.

    (C) Except for an assignment undertaken pursuant to a governmental reorganization,
    assignment of an environmental covenant to a new holder is an amendment of the
    environmental covenant.

    (D) Except as otherwise provided in an environmental covenant, both of the following
    apply:

    (1) A holder may not assign its interest without consent of the other parties
    to the environmental covenant specified in division (A) of this section.

    (2) A holder may be removed and replaced by agreement of the other parties specified
    in division (A) of this section.

    (E) A court of competent jurisdiction may fill a vacancy in the position of holder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.90
- number: '5301.91'
  heading: Civil action for violation - regulatory authority - liability
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) A civil action for injunctive or other equitable relief for violation
    of an environmental covenant may be maintained by any of the following:

    (1) A party to the environmental covenant specified in division (A) of section
    5301.90 of the Revised Code that is not otherwise specified in divisions (A)(2)
    to (7) of this section;

    (2) The environmental protection agency;

    (3) The applicable agency if it is other than the environmental protection agency;

    (4) Any person to whom the environmental covenant expressly grants the authority
    to maintain such an action;

    (5) A person whose interest in the real property or whose collateral or liability
    may be affected by the alleged violation of the environmental covenant;

    (6) A unit of local government in which the real property that is subject to the
    environmental covenant is located;

    (7) An original signatory of the environmental covenant who is no longer an owner
    of the real property that is subject to the environmental covenant in fee simple.

    (B) Sections 5301.80 to 5301.92 of the Revised Code do not limit the regulatory
    authority of the applicable agency or the environmental protection agency if it
    is not the applicable agency under any law other than sections 5301.80 to 5301.92
    of the Revised Code with respect to an environmental response project.

    (C) A person is not responsible for or subject to liability for environmental
    remediation solely because it has the right to enforce an environmental covenant.'
