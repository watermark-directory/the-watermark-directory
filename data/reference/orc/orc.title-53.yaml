- number: '5302.01'
  heading: Statutory forms
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: The forms set forth in sections 5302.05, 5302.07, 5302.09, 5302.11, 5302.12,
    5302.14, 5302.17, and 5302.31 of the Revised Code may be used and shall be sufficient
    for their respective purposes. They shall be known as "Statutory Forms" and may
    be referred to as such. They may be altered as circumstances require, and the
    authorization of those forms shall not prevent the use of other forms. Wherever
    the phrases defined in sections 5302.06, 5302.08, 5302.10, and 5302.13 of the
    Revised Code are to be incorporated in instruments by reference, the method of
    incorporation as indicated in the statutory forms shall be sufficient, but shall
    not preclude other methods.
  history: null
