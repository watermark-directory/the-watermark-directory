- number: '5301.331'
  heading: Land contract cancellation, partial release, or assignment
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'Except in counties where deeds or other instruments are required as provided
    in this section, a land contract that is recorded in the office of the county
    recorder may be cancelled, partially released by the vendor and vendee, or assigned
    by either of them by writing the cancellation, partial release, or assignment
    on the original land contract or upon the margin of the record of the original
    land contract, and by signing it. That cancellation, partial release, or assignment
    need not be acknowledged, but if written on the margin of the record, the signing
    shall be attested to by the county recorder. The assignment by the vendee, whether
    it is on the land contract or upon the margin of the record of that contract,
    or by separate instrument, shall transfer the right held by the vendee under the
    land contract in the premises described in the contract unless otherwise stated
    in the land contract or in the assignment. For copying the cancellation, partial
    release, or assignment upon the margin of the record, or for attesting it, if
    written upon the margin of the record, the county recorder shall charge the fee
    provided by section 317.32 of the Revised Code for recording the assignment and
    satisfaction of mortgages.

    A land contract that is recorded in the office of the county recorder may also
    be cancelled, partially released, or assigned by deed or by other separate instrument,
    acknowledged as provided in section 5301.01 of the Revised Code. Unless in the
    form of a deed, a separate instrument of cancellation, partial release, or assignment
    shall be recorded in the county recorder''s official records. The county recorder
    shall charge the fee for that record as provided for in section 317.32 of the
    Revised Code for record fees.

    If a land contract has been cancelled, partially released, or assigned by deed
    or other separate instrument, and that deed or other separate instrument recites
    the county recorder''s file number of the original land contract or the volume
    and page of the record in which the original land contract is recorded, the county
    recorder shall note on the margin of the original land contract the county recorder''s
    file number of the deed or other separate instrument or the volume and page of
    the record in which the same is recorded.

    "Vendor" and "vendee" as used in this section include an assignee of the interest
    of either. This section does not permit the assignment of any land contract if
    the assignment is prohibited by the terms of the land contract.

    In a county where the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code, the county recorder may require
    that all cancellations, partial releases, and assignments of land contracts be
    by deed or other separate instrument. The original instrument bearing the proper
    endorsement may be used as such separate instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.331
- number: '5301.332'
  heading: Forfeiture for failure of lessee, successors or assigns to abide by specifically
    described covenants
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A)(1) Whenever leases of natural gas and oil lands recorded under section
    5301.09 of the Revised Code concerning lands upon which there are no producing
    or drilling oil or gas wells become forfeited for failure of the lessee or the
    lessee''s successors or assigns to abide by specifically described covenants provided
    for in the lease, or because the term of the lease has expired, the lessor or
    the lessor''s successors or assigns may file for record an affidavit of forfeiture
    with the county recorder after serving notice by certified mail, return receipt
    requested, to the lessee or the lessee''s successors or assigns, at the lessee''s
    or the lessee''s successors'' or assigns'' last known address, or if service is
    not obtained by certified mail, by giving notice by publication at least once
    in a newspaper of general circulation in the county in which the land is located
    of the lessor''s intent to declare the lease forfeited.

    (2) The notice or publication shall be addressed to the lessee or the lessee''s
    successors or assigns, and shall contain the name of the lessee; a general description
    of the land; the number of acres; the date of the lease; the volume and page of
    the lease record where the lease is recorded; the cause of the forfeiture; and
    shall state the intention of the lessor to file for record an affidavit of forfeiture
    with the county recorder if the lessee does not have the lease released of record
    within thirty days from the date of receipt of the notice or of publication.

    (B) After thirty days and not more than sixty days from the date of proof of mailing
    or publication of the notice, the lessor or the lessor''s successors or assigns
    may file with the county recorder an affidavit of forfeiture setting forth that
    such person is the lessor of an oil or gas lease; the file number or volume and
    page of the lease record where the oil or gas lease is recorded; that the lessee
    or the lessee''s successors or assigns, have failed and neglected to comply with
    specifically described covenants provided for in the lease, reciting the facts
    constituting such failure, or that the term of the lease has expired; that there
    are no producing or drilling oil or gas wells on the leased premises; that the
    lease has been forfeited and is void; and that notice was served on the lessee
    or the lessee''s successors or assigns, or that publication was made, and the
    manner and time thereof.

    (C) If the lessee or the lessee''s successors or assigns claims that the lease
    is in full force and effect, the lessee or the lessee''s successors or assigns
    shall, within sixty days after the mailing or publication of the notice of the
    lessor of the lessor''s intention to declare the lease forfeited, notify the person
    who filed the affidavit of forfeiture of the claim, and file for record an affidavit
    with the office of the county recorder of the county in which the land is situated
    stating that the lease has not been forfeited and that the lessee or the lessee''s
    successors or assigns still claim that the lease is in full force and effect.

    (D) If the lessee or the lessee''s successors or assigns do not give such notice
    in writing to the lessor at any time prior to the sixtieth day after the mailing
    or publication of the notice of the lessor of the lessor''s intention to declare
    the lease forfeited, then the lessor shall file for record with the county recorder
    a notice of failure to file. The notice shall contain all of the following:

    (1) A statement that the person filing the notice is the lessor or the lessor''s
    successors or assigns;

    (2) The document number or volume and page of the lease record where the oil or
    gas lease is recorded;

    (3) A general description of the land;

    (4) The statement: "This lease cancelled pursuant to affidavit of forfeiture recorded
    as Document Number _____, or Official Record/Lease Vol. _____, Page _____"

    Thereafter, the record of the lease shall not be notice to the public of the existence
    of the lease or of any interest therein or rights thereunder and the record shall
    not be received in evidence in any court of the state on behalf of the lessee
    or the lessee''s successors or assigns, or against the lessor or the lessor''s
    successors or assigns.

    (E) For recording the affidavit of forfeiture, the affidavit giving notice that
    the lease has not been forfeited, and the notice of failure to file, the county
    recorder shall charge the fees provided by section 317.32 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.332
- number: '5301.34'
  heading: Release of mortgage on certificate of mortgagee or assignee
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: A mortgage shall be discharged upon the record of the mortgage by the county
    recorder when there is presented to the county recorder a certificate executed
    by the mortgagee or the mortgagee's assigns, acknowledged as provided in section
    5301.01 of the Revised Code, or when there is presented to the recorder a deed
    of release executed by the governor as provided in section 5301.19 of the Revised
    Code, certifying that the mortgage has been fully paid and satisfied. In addition
    to the discharge on the records by the county recorder, such certificate shall
    be recorded in the official records kept by the county recorder. The county recorder
    is entitled to the fees for such recording as provided by section 317.32 of the
    Revised Code for recording deeds.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.34
- number: '5301.35'
  heading: Waiver of priority of mortgages - execution and recording - fees
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'The priority of the lien of a mortgage may be waived to the extent specified
    by the holder of the lien in favor of any lien, mortgage, lease, easement, or
    other interest in the property covered by the mortgage, by writing the waiver
    of priority on the original mortgage and signing it, by writing the waiver of
    priority upon the margin of the record of that mortgage and signing it, or by
    a separate instrument acknowledged as provided by section 5301.01 of the Revised
    Code. That waiver, when recorded upon the margin of the record of the mortgage,
    or when recorded as a separate instrument, is constructive notice to all persons
    dealing with either the property described in that mortgage or the mortgage itself
    from the date of filing the waiver for record. The waiver, if written upon the
    mortgage or upon the margin of the record of the mortgage, need not be acknowledged,
    but if written upon the margin of the record, the signing shall be attested by
    the county recorder.

    If the waiver of priority is by separate instrument, it shall be recorded in the
    official records of the county recorder. For the recording, the county recorder
    may charge the fee as provided by section 317.32 of the Revised Code for recording
    deeds. For entering any waiver of priority upon the margin of the record of the
    mortgage, or for attesting it, the county recorder is entitled to the fees for
    recording those waivers of priority that are charged for assignments or satisfactions
    of mortgages under section 317.32 of the Revised Code.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code, the county recorder may require
    that all waivers of priority of mortgages be made by separate instrument. The
    original instrument bearing the proper endorsement may be used as such separate
    instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.35
- number: '5301.36'
  heading: Entry of satisfaction
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) Except in a county in which the county recorder has elected to require
    that all satisfactions of mortgages be recorded by separate instrument as allowed
    under section 5301.28 of the Revised Code, when recording a mortgage, county recorders
    shall leave space on the margin of the record for the entry of satisfaction, and
    record therein the satisfaction made on the mortgage, or permit the owner of the
    claim secured by the mortgage to enter such satisfaction. Such record shall have
    the same effect as the record of a release of the mortgage.

    (B) Within ninety days from the date of the satisfaction of a mortgage, the mortgagee
    shall record a release of the mortgage evidencing the fact of its satisfaction
    in the appropriate county recorder''s office and pay any fees required for the
    recording. The mortgagee may, by contract with the mortgagor, recover the cost
    of the fees required for the recording of the satisfaction by the county recorder.

    (C)(1) Except as provided in division (C)(2) of this section, if the mortgagee
    fails to comply with division (B) of this section, the mortgagor of the unrecorded
    satisfaction and the current owner of the real property to which the mortgage
    pertains may recover, in a civil action, damages of two hundred fifty dollars.
    This division does not preclude or affect any other legal remedies or damages
    that may be available to the mortgagor.

    (2) A mortgagor or current owner of the real property shall not be eligible to
    collect the damages described in division (C)(1) of this section via a class action
    for violations of division (B) of this section that occurred in calendar year
    2020. This division does not preclude or affect any other legal remedies or damages
    that may be available to the mortgagor or current owner.

    (D)(1) If upon the expiration of the ninety-day period described in division (B)
    of this section, the satisfaction of mortgage remains unrecorded, the current
    owner of the real property shall provide the mortgagee written notice, in accordance
    with the Rules of Civil Procedure, of the failure to enter the release of the
    mortgage of record. The notice shall be in substantially the following form:

    "OHIO LAW REQUIRES A MORTGAGEE, WHETHER THE ORIGINAL MORTGAGEE OR ANY SUCCESSOR
    TO THE INTEREST OF THE ORIGINAL MORTGAGEE, TO RECORD A RELEASE OF A MORTGAGE EVIDENCING
    ITS SATISFACTION IN THE APPROPRIATE COUNTY RECORDER''S OFFICE AND TO PAY ANY FEES
    REQUIRED FOR THE RECORDING WITHIN A CERTAIN TIME PERIOD. (Name of mortgagor)''S
    MORTGAGE LOAN, (loan number or other loan identification), FOR PROPERTY LOCATED
    AT (property address), WAS SATISFIED ON (date of satisfaction). IT APPEARS YOU
    HAVE YET TO RECORD A RELEASE OF THIS MORTGAGE. FAILURE TO RECORD THE RELEASE WITHIN
    15 DAYS OF RECEIVING THIS NOTICE MAY RESULT IN A CIVIL ACTION FILED AGAINST YOU
    TO RECOVER REASONABLE ATTORNEYS'' FEES AND COSTS INCURRED IN SUCH AN ACTION OR
    OTHERWISE TO OBTAIN THE RECORDING, PLUS DAMAGES OF $100 FOR EACH DAY OF NONCOMPLIANCE
    NOT TO EXCEED $5,000 IN TOTAL DAMAGES."

    (2) Within fifteen days after delivery of the notice described in division (D)(1)
    of this section, the mortgagee shall record a release of the mortgage evidencing
    the fact of its satisfaction in the appropriate county recorder''s office and
    pay any fees required for the recording. The mortgagee may, by contract with the
    mortgagor or current owner of the real property, recover the cost of the fees
    required for the recording of the satisfaction by the county recorder.

    (E) If the mortgagee fails to comply with division (D)(2) of this section after
    receiving the notice in accordance with division (D)(1) of this section, the current
    owner of the real property may recover, in a civil action, reasonable attorneys''
    fees and costs incurred in such an action or otherwise to obtain the recording
    of a satisfaction of mortgage plus damages of one hundred dollars for each day
    of noncompliance, not to exceed five thousand dollars in total damages.

    This division does not preclude or affect any other legal remedies or damages
    that may be available to the current owner.

    (F) A mortgagee that records a release of a mortgage evidencing the fact of its
    satisfaction within the time periods required by this section shall not be in
    violation of this section, or subject to damages or fees, due to the failure of
    a county recorder to timely process that release of mortgage.

    (G) A current owner may combine the civil actions described in divisions (C) and
    (E) of this section by bringing one action to collect for both damages, or may
    bring separate actions.

    (H) As used in this section:

    (1) "Mortgagee" includes the original mortgagee or any successor to or assignee
    of the original mortgagee.

    (2) "Satisfaction" means that the obligation secured by a mortgage has been paid
    in full and the underlying obligation terminated, with no opportunities for future
    advancements.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.36
- number: '5301.361'
  heading: Unreleased mortgages; liability for damages for failure to record
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A)(1) With respect to an unreleased commercial mortgage that has been satisfied
    more than ninety days prior to the effective date of this section, but not recorded,
    the mortgagee shall not be subject to a civil action or damages as described in
    division (C) of section 5301.36 of the Revised Code.

    (2) The current owner of the real property to which such a mortgage pertains shall
    provide the mortgagee the written notice described in division (D)(1) of section
    5301.36 of the Revised Code not sooner than on the effective date of this section
    and may recover damages in a civil action for failure to comply with division
    (D)(2) of that section pursuant to division (E) of that section.

    (B)(1) With respect to an unreleased commercial mortgage that has been satisfied
    less than ninety days prior to the effective date of this section , but not recorded,
    the mortgagee shall not be subject to a civil action or damages as described in
    division (C) of section 5301.36 of the Revised Code.

    (2) The current owner of the real property to which such a mortgage pertains shall
    provide the mortgagee the written notice described in division (D)(1) of section
    5301.36 of the Revised Code not sooner than on the ninetieth day after the mortgage
    was satisfied and may recover damages in a civil action for failure to comply
    with division (D)(2) of that section pursuant to division (E) of that section.

    (C)(1) With respect to an unreleased residential mortgage that has been satisfied,
    but not recorded, prior to the effective date of this section , the mortgagee
    shall be subject to a civil action or damages as described in division (C) of
    section 5301.36 of the Revised Code for failure to comply with division (B) of
    that section.

    (2) If such a mortgage was satisfied more than ninety days prior to the effective
    date of this section , the current owner of the real property to which the mortgage
    pertains shall provide the mortgagee the written notice described in division
    (D)(1) of section 5301.36 of the Revised Code not sooner than on the effective
    date of this section and may recover damages in a civil action for failure to
    comply with division (D)(2) of that section pursuant to division (E) of that section.
    If such a mortgage was satisfied less than ninety days prior to the effective
    date of the section , the current owner shall provide the mortgagee the written
    notice described in division (D)(1) of section 5301.36 of the Revised Code not
    sooner than on the ninetieth day after the mortgage was satisfied and may recover
    damages in a civil action for failure to comply with division (D)(2) of that section
    pursuant to division (E) of that section.

    (D) As used in this section, "mortgagee" has the same meaning as in section 5301.36
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.361
- number: '5301.37'
  heading: Recording of separate instruments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: Whenever the county recorder in making photostatic or photographic records
    leaves no margin suitable for the entering or recording of assignments, cancellations,
    or further transactions relating to the instruments so recorded, or whenever such
    margin is completely filled with assignments, cancellations, or further transactions
    relating to the instruments so recorded, such transactions shall be effected by
    separate instruments executed and recorded according to law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.37
- number: '5301.38'
  heading: Record of patents, copies, and exemplifications
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'Patents for lands lying within this state, granted to any person by the president
    of the United States, and copies of such patents, certified under the official
    seal of the commissioner of the general land office of the United States, and
    exemplifications of the record of the general land office of any patent recorded
    there, may be recorded in the office of the county recorder of the county in which
    such lands, or a part thereof, are situated.

    The recorder shall be paid the fees for recording such patents as provided in
    section 317.32 of the Revised Code for recording deeds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.38
- number: '5301.39'
  heading: When court to order clerk to make entry on record of mortgage
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'The court in which proceedings are commenced, relative to a mortgage or other
    lien, change of title, or partition of lands, the final judgment, order, or decree
    in which is to release or declare such mortgage or other lien void, in whole or
    in part, or require the judicial sale of property included in the mortgage or
    other lien, in case of failure to pay the amount secured thereby, or when the
    title has been changed by judgment or decree, or partition made and confirmed
    between tenants in common, at the rendition of such final judgment, order, or
    decree, shall make the necessary order for the proper entry of a memorandum, release,
    or satisfaction, by the clerk of such court, on the record of such mortgage or
    other lien, and in cases of change of title or partition, for the record of so
    much of the decree in the records in the office of the county recorder, as is
    necessary to show such change of title or partition.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code and has elected to require a separate
    instrument for satisfactions and other actions affecting mortgages and other liens
    on real property, the court order for proper entry as referred to in this section,
    or certified copy thereof, may constitute the separate instrument and shall be
    recorded according to the type of action involved.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.39
- number: '5301.40'
  heading: Mortgage or lien satisfied by suit
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'When a mortgage or other lien is satisfied or declared void, in whole or
    in part, by a judgment, final order, or decree, the clerk of the court in which
    the proceedings are had shall enter upon the record of the mortgage or other lien,
    in the county recorder''s office where it is recorded, a memorandum of the character
    of the proceedings, giving also the volume and page of the record where they are
    recorded.

    The clerk may tax in the bill of costs the fees of the recorder provided by law
    for the entry of the memorandum, release, satisfaction, or record, including a
    fee to himself for making the entry as provided for in division (K) of section
    2303.20 of the Revised Code, and the fees provided by law for official copies
    of records.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code and has elected to require a separate
    instrument for satisfactions of mortgages and other liens, the judgment, final
    order, or decree may constitute the separate instrument and shall be recorded
    as appropriate for the type of action involved.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.40
- number: '5301.41'
  heading: Effect of reversal of judgment
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: If the final judgment, order, or decree referred to in section 5301.39 of
    the Revised Code, upon which the entry of release, satisfaction, change of title,
    or partition is based, or in which the order for release, satisfaction, or record
    is included, is reversed, vacated, or modified, such reversal, vacation, or modification,
    so far as it applies to such memorandum, release, or satisfaction of such mortgage
    or other lien, record of change of title, or partition, will vacate or modify
    the entry and record.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.41
- number: '5301.42'
  heading: Effect of entry by clerk
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: Sections 5301.39 to 5301.41, inclusive, of the Revised Code do not give to
    any judgment, order, or decree an effect, by reason of the entry thereof in the
    county recorder's office, other than that which it would have had without such
    entry.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.42
- number: '5301.43'
  heading: Certified copy of record of instrument as evidence
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: A copy of the record of a deed or other instrument of writing, certified by
    the county recorder with his official seal affixed thereto, shall be received
    in all courts and places within this state, as prima-facie evidence of the existence
    of such instrument, and as conclusive evidence of the existence of such record.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.43
- number: '5301.44'
  heading: Certified copy of record in action to cure defects
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: When a conveyance of real estate has been executed in which there is a mistake,
    defect, or omission in the description of the lands, execution, acknowledgment,
    or otherwise, and it has been recorded in the county recorder's office of the
    county where the lands are or were situated at the time of such record, the record
    or a certified copy thereof in an action to cure or supply such defect, mistake,
    or omission, or to compel the execution of a valid conveyance of such real estate,
    may be read in evidence, and shall be prima-facie evidence that such instrument
    was executed and existed as shown by such record.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.44
- number: '5301.45'
  heading: Instrument executed and acknowledged upon different sheets
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: When a deed, mortgage, lease, or other instrument of writing intended to convey
    or encumber an interest in real estate is not printed or written on a single sheet,
    or when the certificate of acknowledgment thereof is not printed or written on
    the same sheet with the instrument, and such defective conveyance is corrected
    by the judgment of a court, or by the voluntary act of the parties thereto, such
    judgment or act shall relate back so as to be operative from the time of filing
    the original conveyance in the county recorder's office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.45
- number: '5301.46'
  heading: Assignment, release, or cancellation of interest made by separate instrument
    to contain description
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) As used in this section, "separate instrument" means an instrument other
    than the writing in which was created the interest in real property that is being
    assigned, released, or canceled.

    (B) In any county that maintains sectional indexes pursuant to section 317.20
    of the Revised Code, each assignment, release, or cancellation of an interest
    in real property that is made by a separate instrument shall contain a description
    of the real property that is subject to the interest sufficient to enable the
    county recorder to index the assignment, release, or cancellation correctly, and
    the description shall include all of the following:

    (1) The permanent parcel number, if there is one, for the real property;

    (2) The section, range, tract, subdivision, addition, lot, quarter, and municipal
    corporation, town, or township associated with the real property.

    (C) If division (B) of this section requires a description of the subject real
    property to be contained in an assignment, release, or cancellation of an interest
    in real property that is made by a separate instrument, the omission in the assignment,
    release, or cancellation of any part of the description does not invalidate that
    instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.46
- number: '5301.47'
  heading: Marketable title definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'As used in sections 5301.47 to 5301.56, inclusive, of the Revised Code:

    (A) "Marketable record title" means a title of record, as indicated in section
    5301.48 of the Revised Code, which operates to extinguish such interests and claims,
    existing prior to the effective date of the root of title, as are stated in section
    5301.50 of the Revised Code.

    (B) "Records" includes probate and other official public records, as well as records
    in the office of the recorder of the county in which all or part of the land is
    situate.

    (C) "Recording," when applied to the official public records of the probate or
    other court, includes filing.

    (D) "Person dealing with land" includes a purchaser of any estate or interest
    therein, a mortgagee, a levying or attaching creditor, a land contract vendee,
    or any other person seeking to acquire an estate or interest therein, or impose
    a lien thereon.

    (E) "Root of title" means that conveyance or other title transaction in the chain
    of title of a person, purporting to create the interest claimed by such person,
    upon which he relies as a basis for the marketability of his title, and which
    was the most recent to be recorded as of a date forty years prior to the time
    when marketability is being determined. The effective date of the "root of title"
    is the date on which it is recorded.

    (F) "Title transaction" means any transaction affecting title to any interest
    in land, including title by will or descent, title by tax deed, or by trustee''s,
    assignee''s, guardian''s, executor''s, administrator''s, or sheriff''s deed, or
    decree of any court, as well as warranty deed, quit claim deed, or mortgage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.47
- number: '5301.48'
  heading: Unbroken chain of title of record
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'Any person having the legal capacity to own land in this state, who has an
    unbroken chain of title of record to any interest in land for forty years or more,
    has a marketable record title to such interest as defined in section 5301.47 of
    the Revised Code, subject to the matters stated in section 5301.49 of the Revised
    Code.

    A person has such an unbroken chain of title when the official public records
    disclose a conveyance or other title transaction, of record not less than forty
    years at the time the marketability is to be determined, which said conveyance
    or other title transaction purports to create such interest, either in:

    (A) The person claiming such interest; or

    (B) Some other person from whom, by one or more conveyances or other title transactions
    of record, such purported interest has become vested in the person claiming such
    interest; with nothing appearing of record, in either case, purporting to divest
    such claimant of such purported interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.48
- number: '5301.49'
  heading: Record marketable title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'Such record marketable title shall be subject to:

    (A) All interests and defects which are inherent in the muniments of which such
    chain of record title is formed; provided that a general reference in such muniments,
    or any of them, to easements, use restrictions, or other interests created prior
    to the root of title shall not be sufficient to preserve them, unless specific
    identification be made therein of a recorded title transaction which creates such
    easement, use restriction, or other interest; and provided that possibilities
    of reverter, and rights of entry or powers of termination for breach of condition
    subsequent, which interests are inherent in the muniments of which such chain
    of record title is formed and which have existed for forty years or more, shall
    be preserved and kept effective only in the manner provided in section 5301.51
    of the Revised Code;

    (B) All interests preserved by the filing of proper notice or by possession by
    the same owner continuously for a period of forty years or more, in accordance
    with section 5301.51 of the Revised Code;

    (C) The rights of any person arising from a period of adverse possession or user,
    which was in whole or in part subsequent to the effective date of the root of
    title;

    (D) Any interest arising out of a title transaction which has been recorded subsequent
    to the effective date of the root of title from which the unbroken chain of title
    or record is started; provided that such recording shall not revive or give validity
    to any interest which has been extinguished prior to the time of the recording
    by the operation of section 5301.50 of the Revised Code;

    (E) The exceptions stated in section 5301.53 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.49
- number: '5301.50'
  heading: Interests prior to effective date of root of title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: Subject to the matters stated in section 5301.49 of the Revised Code, such
    record marketable title shall be held by its owner and shall be taken by any person
    dealing with the land free and clear of all interests, claims, or charges whatsoever,
    the existence of which depends upon any act, transaction, event, or omission that
    occurred prior to the effective date of the root of title. All such interests,
    claims, or charges, however denominated, whether legal or equitable, present or
    future, whether such interests, claims, or charges are asserted by a person sui
    juris or under a disability, whether such person is within or without the state,
    whether such person is natural or corporate, or is private or governmental, are
    hereby declared to be null and void.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.50
- number: '5301.51'
  heading: Preservation of interest in land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) Any person claiming an interest in land may preserve and keep effective
    the interest by filing for record during the forty-year period immediately following
    the effective date of the root of title of the person whose record title would
    otherwise be marketable, a notice in compliance with section 5301.52 of the Revised
    Code. No disability or lack of knowledge of any kind on the part of anyone suspends
    the running of the forty-year period. The notice may be filed for record by the
    claimant or by any other person acting on behalf of any claimant who is:

    (1) Under a disability;

    (2) Unable to assert a claim on his own behalf; or

    (3) One of a class, but whose identity cannot be established or is uncertain at
    the time of filing the notice of claim for record.

    (B) If the same record owner of any possessory interest in land has been in possession
    of the land continuously for a period of forty years or more, during which period
    no title transaction with respect to such interest appears of record in his chain
    of title, and no notice has been filed by him on his behalf as provided in division
    (A) of this section, and such possession continues to the time when marketability
    is being determined, the period of possession is equivalent to the filing of the
    notice immediately preceding the termination of the forty-year period described
    in division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.51
- number: '5301.52'
  heading: Notice and filing of claim of interest in land
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) To be effective and entitled to recording, the notice referred to in
    section 5301.51 of the Revised Code shall satisfy all of the following:

    (1) Be in the form of an affidavit;

    (2) State the nature of the claim to be preserved and the names and addresses
    of the persons for whose benefit the notice is being filed;

    (3) Contain an accurate and full description of all land affected by the notice,
    which description shall be set forth in particular terms and not by general inclusions,
    except that if the claim is founded upon a recorded instrument, the description
    in the notice may be the same as that contained in such recorded instrument;

    (4) State the name of each record owner of the land affected by the notice, at
    the time of its recording, together with the recording information of the instrument
    by which each record owner acquired title to the land;

    (5) Be made by any person who has knowledge of the relevant facts or is competent
    to testify concerning them in court.

    (B) The notice shall be filed for record in the office of the county recorder
    of the county or counties where the land described in it is situated. The county
    recorder of each county shall accept all such notices presented that describe
    land situated within the county, and shall enter and record them in the official
    records of that county, and shall index each notice in the direct index under
    the names of the claimants appearing in that notice and in the reverse index under
    the names of the record owners appearing in that notice. If the county recorder
    maintains indexes under section 317.20 of the Revised Code, the notices also shall
    be indexed under the description of the real estate involved. The county recorder
    shall charge the same fees for the recording of such notices as are charged for
    recording deeds.

    (C) A notice prepared, executed, and recorded in conformity with the requirements
    of this section, or a certified copy of it, shall be accepted as evidence of the
    facts stated insofar as they affect title to the land affected by that notice.

    (D) Any person who knowingly makes any false statement in a notice executed under
    this section is guilty of perjury under section 2921.11 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.52
- number: '5301.53'
  heading: Certain rights not barred or extinguished
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: 'The provisions of sections 5301.47 to 5301.56 of the Revised Code shall not
    be applied to bar or extinguish any of the following:

    (A) Any lessor or his successor as reversioner of his right to possession on the
    expiration of any lease, or any lessee or his successor of his rights in and to
    any lease, except as may be permitted under section 5301.56 of the Revised Code;

    (B) Any easement or interest in the nature of an easement created or held for
    any railroad or public utility purpose;

    (C) Any easement or interest in the nature of an easement, the existence of which
    is clearly observable by physical evidence of its use;

    (D) Any easement or interest in the nature of an easement, or any rights granted,
    excepted, or reserved by the instrument creating such easement or interest, including
    any rights for future use, if the existence of such easement or interest is evidenced
    by the location beneath, upon, or above any part of the land described in such
    instrument of any pipe, valve, road, wire, cable, conduit, duct, sewer, track,
    pole, tower, or other physical facility and whether or not the existence of such
    facility is observable;

    (E) Any right, title, estate, or interest in coal, and any mining or other rights
    pertinent to or exercisable in connection with any right, title, estate, or interest
    in coal;

    (F) Any mortgage recorded in conformity with section 1701.66 of the Revised Code;

    (G) Any right, title, or interest of the United States, of this state, or of any
    political subdivision, body politic, or agency of the United States or this state.'
