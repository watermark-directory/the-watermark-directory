- number: '5309.03'
  heading: Powers of the county recorder
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: To carry out sections 5309.02 to 5310.21, inclusive, of the Revised Code,
    the county recorder may administer oaths, issue subpoenas, summons, and other
    process, serve and cause notices to be served, enforce the attendance of and examine
    witnesses, compel the production of papers and evidence, order surveys and appoint
    competent surveyors to make them, and conduct hearings and make such orders as
    are appropriate and in accordance with such sections.
