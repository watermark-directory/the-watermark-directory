- number: '5302.171'
  heading: Affidavit for successor trustee
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: 'Upon the death, resignation, removal, or other event terminating the appointment
    of a trustee of a trust, which trustee holds title to real property, the successor
    trustee or any co-trustee of the trust shall file with the county auditor and
    the county recorder of the county in which the real property is located, as soon
    as is practical, an affidavit reciting the name of the immediately preceding trustee
    and any co-trustees, the addresses of all trustees, a reference to the deed or
    other instrument vesting title in the trustees, and a legal description of the
    real property. The affidavit shall be recorded in the official records of the
    county recorder, and indexed in the direct and reverse indexes provided for in
    section 317.18 of the Revised Code.

    The affidavit described in this section shall not be required if the original
    trust instrument naming the trustees and successors and containing relevant facts
    pertaining to the succession of trustees, or if a memorandum of trust in compliance
    with section 5301.255 of the Revised Code that contains relevant facts pertaining
    to the succession of trustees, is recorded in the office of the county recorder.

    Failure to file the affidavit required by this section does not affect title to
    real property in the one or more trustees.'
