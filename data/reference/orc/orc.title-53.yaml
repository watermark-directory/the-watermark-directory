  url: https://codes.ohio.gov/ohio-revised-code/section-5301.55
- number: '5301.56'
  heading: Mineral interests - vesting in surface owner
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5301'
    name: Conveyances; Encumbrances
  text: '(A) As used in this section:

    (1) "Holder" means the record holder of a mineral interest, and any person who
    derives the person''s rights from, or has a common source with, the record holder
    and whose claim does not indicate, expressly or by clear implication, that it
    is adverse to the interest of the record holder.

    (2) "Drilling or mining permit" means a permit issued under Chapter 1509., 1513.,
    or 1514. of the Revised Code to the holder to drill an oil or gas well or to mine
    other minerals.

    (3) "Mineral interest" means a fee interest in at least one mineral regardless
    of how the interest is created and of the form of the interest, which may be absolute
    or fractional or divided or undivided.

    (4) "Mineral" means gas, oil, coal, coalbed methane gas, other gaseous, liquid,
    and solid hydrocarbons, sand, gravel, clay, shale, gypsum, halite, limestone,
    dolomite, sandstone, other stone, metalliferous or nonmetalliferous ore, or another
    material or substance of commercial value that is excavated in a solid state from
    natural deposits on or in the earth.

    (5) "Owner of the surface of the lands subject to the interest" includes the owner''s
    successors and assignees.

    (B) Any mineral interest held by any person, other than the owner of the surface
    of the lands subject to the interest, shall be deemed abandoned and vested in
    the owner of the surface of the lands subject to the interest if the requirements
    established in division (E) of this section are satisfied and none of the following
    applies:

    (1) The mineral interest is in coal, or in mining or other rights pertinent to
    or exercisable in connection with an interest in coal, as described in division
    (E) of section 5301.53 of the Revised Code. However, if a mineral interest includes
    both coal and other minerals that are not coal, the mineral interests that are
    not in coal may be deemed abandoned and vest in the owner of the surface of the
    lands subject to the interest.

    (2) The mineral interest is held by the United States, this state, or any political
    subdivision, body politic, or agency of the United States or this state, as described
    in division (G) of section 5301.53 of the Revised Code.

    (3) Within the twenty years immediately preceding the date on which notice is
    served or published under division (E) of this section, one or more of the following
    has occurred:

    (a) The mineral interest has been the subject of a title transaction that has
    been filed or recorded in the office of the county recorder of the county in which
    the lands are located.

    (b) There has been actual production or withdrawal of minerals by the holder from
    the lands, from lands covered by a lease to which the mineral interest is subject,
    from a mine a portion of which is located beneath the lands, or, in the case of
    oil or gas, from lands pooled, unitized, or included in unit operations, under
    sections 1509.26 to 1509.28 of the Revised Code, in which the mineral interest
    is participating, provided that the instrument or order creating or providing
    for the pooling or unitization of oil or gas interests has been filed or recorded
    in the office of the county recorder of the county in which the lands that are
    subject to the pooling or unitization are located.

    (c) The mineral interest has been used in underground gas storage operations by
    the holder.

    (d) A drilling or mining permit has been issued to the holder, provided that an
    affidavit that states the name of the permit holder, the permit number, the type
    of permit, and a legal description of the lands affected by the permit has been
    filed or recorded, in accordance with section 5301.252 of the Revised Code, in
    the office of the county recorder of the county in which the lands are located.

    (e) A claim to preserve the mineral interest has been filed in accordance with
    division (C) of this section.

    (f) In the case of a separated mineral interest, a separately listed tax parcel
    number has been created for the mineral interest in the county auditor''s tax
    list and the county treasurer''s duplicate tax list in the county in which the
    lands are located.

    (C)(1) A claim to preserve a mineral interest from being deemed abandoned under
    division (B) of this section may be filed for record by its holder. Subject to
    division (C)(3) of this section, the claim shall be recorded in accordance with
    division (H) of this section and sections 317.18 to 317.20 and 5301.52 of the
    Revised Code, and shall consist of a notice that does all of the following:

    (a) States the nature of the mineral interest claimed and any recording information
    upon which the claim is based;

    (b) Otherwise complies with section 5301.52 of the Revised Code;

    (c) States that the holder does not intend to abandon, but instead to preserve,
    the holder''s rights in the mineral interest.

    (2) A claim that complies with division (C)(1) of this section or, if applicable,
    divisions (C)(1) and (3) of this section preserves the rights of all holders of
    a mineral interest in the same lands.

    (3) Any holder of an interest for use in underground gas storage operations may
    preserve the holder''s interest, and those of any lessor of the interest, by a
    single claim, that defines the boundaries of the storage field or pool and its
    formations, without describing each separate interest claimed. The claim is prima-facie
    evidence of the use of each separate interest in underground gas storage operations.

    (D)(1) A mineral interest may be preserved indefinitely from being deemed abandoned
    under division (B) of this section by the occurrence of any of the circumstances
    described in division (B)(3) of this section, including, but not limited to, successive
    filings of claims to preserve mineral interests under division (C) of this section.

    (2) The filing of a claim to preserve a mineral interest under division (C) of
    this section does not affect the right of a lessor of an oil or gas lease to obtain
    its forfeiture under section 5301.332 of the Revised Code.

    (E) Before a mineral interest becomes vested under division (B) of this section
    in the owner of the surface of the lands subject to the interest, the owner of
    the surface of the lands subject to the interest shall do both of the following:

    (1) Serve notice by certified mail, return receipt requested, to each holder or
    each holder''s successors or assignees, at the last known address of each, of
    the owner''s intent to declare the mineral interest abandoned. If service of notice
    cannot be completed to any holder, the owner shall publish notice of the owner''s
    intent to declare the mineral interest abandoned at least once in a newspaper
    of general circulation in each county in which the land that is subject to the
    interest is located. The notice shall contain all of the information specified
    in division (F) of this section.

    (2) At least thirty, but not later than sixty days after the date on which the
    notice required under division (E)(1) of this section is served or published,
    as applicable, file in the office of the county recorder of each county in which
    the surface of the land that is subject to the interest is located an affidavit
    of abandonment that contains all of the information specified in division (G)
    of this section.

    (F) The notice required under division (E)(1) of this section shall contain all
    of the following:

    (1) The name of each holder and the holder''s successors and assignees, as applicable;

    (2) A description of the surface of the land that is subject to the mineral interest.
    The description shall include the volume and page number of the recorded deed
    or other recorded instrument under which the owner of the surface of the lands
    claims title or otherwise satisfies the requirements established in division (A)(3)
    of section 5301.52 of the Revised Code.

    (3) A description of the mineral interest to be abandoned. The description shall
    include the volume and page number of the recorded instrument on which the mineral
    interest is based.

    (4) A statement attesting that nothing specified in division (B)(3) of this section
    has occurred within the twenty years immediately preceding the date on which notice
    is served or published under division (E) of this section;

    (5) A statement of the intent of the owner of the surface of the lands subject
    to the mineral interest to file in the office of the county recorder an affidavit
    of abandonment at least thirty, but not later than sixty days after the date on
    which notice is served or published, as applicable.

    (G) An affidavit of abandonment shall contain all of the following:

    (1) A statement that the person filing the affidavit is the owner of the surface
    of the lands subject to the interest;

    (2) The volume and page number of the recorded instrument on which the mineral
    interest is based;

    (3) A statement that the mineral interest has been abandoned pursuant to division
    (B) of this section;

    (4) A recitation of the facts constituting the abandonment;

    (5) A statement that notice was served on each holder or each holder''s successors
    or assignees or published in accordance with division (E) of this section.

    (H)(1) If a holder or a holder''s successors or assignees claim that the mineral
    interest that is the subject of a notice under division (E) of this section has
    not been abandoned, the holder or the holder''s successors or assignees, not later
    than sixty days after the date on which the notice was served or published, as
    applicable, shall file in the office of the county recorder of each county where
    the land that is subject to the mineral interest is located one of the following:

    (a) A claim to preserve the mineral interest in accordance with division (C) of
    this section;

    (b) An affidavit that identifies an event described in division (B)(3) of this
    section that has occurred within the twenty years immediately preceding the date
    on which the notice was served or published under division (E) of this section.

    The holder or the holder''s successors or assignees shall notify the person who
    served or published the notice under division (E) of this section of the filing
    under this division.

    (2) If a holder or a holder''s successors or assignees who claim that the mineral
    interest that is the subject of a notice under division (E) of this section has
    not been abandoned fails to file a claim to preserve the mineral interest, files
    such a claim more than sixty days after the date on which the notice was served
    or published under division (E) of this section, fails to file an affidavit that
    identifies an event described in division (B)(3) of this section that has occurred
    within the twenty years immediately preceding the date on which the notice was
    served or published under division (E) of this section, or files such an affidavit
    more than sixty days after the date on which the notice was served or published
    under that division, the owner of the surface of the lands subject to the interest
    who is seeking to have the interest deemed abandoned and vested in the owner shall
    file in the office of the county recorder of each county where the land that is
    subject to the mineral interest is located a notice of failure to file. The notice
    shall contain all of the following:

    (a) A statement that the person filing the notice is the owner of the surface
    of the lands subject to the mineral interest;

    (b) A description of the surface of the land that is subject to the mineral interest;

    (c) The statement: "This mineral interest abandoned pursuant to affidavit of abandonment
    recorded in volume ____, page _____"

    Immediately after the notice of failure to file a mineral interest is recorded,
    the mineral interest shall vest in the owner of the surface of the lands formerly
    subject to the interest, and the record of the mineral interest shall cease to
    be notice to the public of the existence of the mineral interest or of any rights
    under it. In addition, the record shall not be received as evidence in any court
    in this state on behalf of the former holder or the former holder''s successors
    or assignees against the owner of the surface of the lands formerly subject to
    the interest. However, the abandonment and vesting of a mineral interest pursuant
    to divisions (E) to (I) of this section only shall be effective as to the property
    of the owner that filed the affidavit of abandonment under division (E) of this
    section.

    (I) For purposes of a recording under this section, a county recorder shall charge
    the fee established under section 317.32 of the Revised Code.'
