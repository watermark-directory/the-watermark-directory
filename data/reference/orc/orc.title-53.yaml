- number: '5312.16'
  heading: Solar energy collection devices
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5312'
    name: Ohio Planned Community Law
  text: '(A) Unless specifically prohibited in the declaration, any owner may install
    a solar energy collection device on the owner''s dwelling unit or other location
    within the owner''s lot if either of the following conditions apply:

    (1) The cost to insure, maintain, repair, and replace the unit''s roof or alternative
    location within the lot is not a common expense of the owners association and
    is instead the owner''s responsibility.

    (2) The declaration specifically allows for and regulates the types and installation
    of solar energy collection devices within the planned community and establishes
    responsibility for the cost to insure, maintain, repair, and replace such devices.

    (B) Notwithstanding division (A) of this section, an owners association may establish
    reasonable restrictions concerning the size, place, and manner of placement of
    solar energy collection devices.

    (C) Prior to imposing a charge for damages or an enforcement assessment pursuant
    to this section, the board of directors shall give the owner a written notice,
    which may be in the form of electronic mail to an electronic mail address previously
    provided by the owner in writing that includes all of the following:

    (1) A description of the property damage or violation;

    (2) The amount of the proposed charge or assessment;

    (3) A statement that the owner has a right to a hearing before the board of directors
    to contest the proposed charge or assessment;

    (4) A statement setting forth the procedures to request a hearing;

    (5) A reasonable date by which the unit owner must cure the violation to avoid
    the proposed charge or assessment.

    (D) As used in this section, "solar energy collection device" has the same meaning
    as in section 5311.192 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5312.16
- number: '5313.01'
  heading: Land installment contract definitions
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: 'As used in Chapter 5313. of the Revised Code:

    (A) "Land installment contract" means an executory agreement which by its terms
    is not required to be fully performed by one or more of the parties to the agreement
    within one year of the date of the agreement and under which the vendor agrees
    to convey title in real property located in this state to the vendee and the vendee
    agrees to pay the purchase price in installment payments, while the vendor retains
    title to the property as security for the vendee''s obligation. Option contracts
    for the purchase of real property are not land installment contracts.

    (B) "Property" means real property located in this state improved by virtue of
    a dwelling having been erected on the real property.

    (C) "Vendor" means any individual, partnership, corporation, association, trust,
    or any other group of individuals however organized making a sale of property
    by means of a land installment contract.

    (D) "Vendee" means the person who acquires an interest in property pursuant to
    a land installment contract, or any legal successor in interest to that person.

    (E) "Legal description" means a description of the property by metes and bounds
    or lot numbers of a recorded plat including a description of any portion of the
    property subject to an easement or reservation, if any.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.01
- number: '5313.02'
  heading: Required provisions of land installment contracts
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5313'
    name: Land Installment Contracts
  text: '(A) Every land installment contract shall be executed in duplicate, and a
    copy of the contract shall be provided to the vendor and the vendee. The contract
    shall contain at least the following provisions:

    (1) The full names and then current mailing addresses of all the parties to the
    contract;

    (2) The date when the contract was signed by each party;

    (3) A legal description of the property conveyed;

    (4) The contract price of the property conveyed;

    (5) Any charges or fees for services that are includable in the contract separate
    from the contract price;

    (6) The amount of the vendee''s down payment;

    (7) The principal balance owed, which is the sum of the specified in divisions
    (A)(4) and (5) of this section less the specified in division (A)(6) of this section;

    (8) The amount and due date of each installment payment;

    (9) The interest rate on the unpaid balance and the method of computing the rate;

    (10) A statement of any encumbrances against the property conveyed;

    (11) A statement requiring the vendor to deliver a general warranty deed on completion
    of the contract, or another deed that is available when the vendor is legally
    unable to deliver a general warranty deed;

    (12) A provision that the vendor provide evidence of title in accordance with
    the prevailing custom in the area in which the property is located;

    (13) A provision that, if the vendor defaults on any mortgage on the property,
    the vendee can pay on the mortgage and receive credit on the land installment
    contract;

    (14) A provision that the vendor shall cause a copy of the contract to be recorded;

    (15) A requirement that the vendee be responsible for the payment of taxes, assessments,
    and other charges against the property from the date of the contract, unless agreed
    to the contrary;

    (16) A statement of any pending order of any public agency against the property.

    (B) No vendor shall hold a mortgage on property sold by a land installment contract
    in an amount greater than the balance due under the contract, except a mortgage
    that covers real property in addition to the property that is the subject of the
    contract where the vendor has made written disclosure to the vendee of the amount
    of the mortgage and the release price, if any, attributable to the property in
    question.

    No vendor shall place a mortgage on the property in an amount greater than the
    balance due on the contract without the consent of the vendee.

    (C) Within twenty days after a land installment contract has been signed by both
    the vendor and the vendee, the vendor shall cause a copy of the contract to be
    recorded as provided in section 5301.25 of the Revised Code and a copy of the
    contract to be delivered to the county auditor.

    (D) Every land installment contract shall conform to the formalities required
    by law for the execution of deeds and mortgages. The vendor of any land installment
    contract that contains a metes and bounds legal description shall have that description
    reviewed by the county engineer. The county engineer shall indicate his approval
    of the description on the contract.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
