- number: '5302.16'
  heading: Master mortgage form incorporated by reference
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5302'
    name: Statutory Forms Of Land Conveyance
  text: 'The provisions of a master mortgage form recorded pursuant to section 5302.15
    of the Revised Code may be incorporated by reference in any mortgage of real property
    situated in the county where such master mortgage form is recorded, by stating
    in such mortgage the volume and page number of the record of mortgages where such
    master mortgage form is recorded, and, if only a part of such master mortgage
    form is to be incorporated in the mortgage, the part or parts to be excluded.
    A copy of such master mortgage form shall be furnished to the mortgagors prior
    to the execution of the mortgage, and receipt thereof shall be noted in such mortgage.

    Any part or all of a master mortgage form incorporated by reference pursuant to
    this section in a mortgage of real property is a part of such mortgage the same
    as if fully rewritten therein, and need not be recorded with such mortgage to
    be effective.'
