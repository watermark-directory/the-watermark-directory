    num: '5311'
    name: Condominium Property
  text: Each unit of a condominium property and the undivided interest in the common
    elements appurtenant to it is deemed a separate parcel for all purposes of taxation
    and assessment of real property, and no other unit or other part of the condominium
    property shall be charged with the payment of those taxes and assessments.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.11
- number: '5311.12'
  heading: Liens and encumbrances paid prior to conveyance
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: No owner of property submitted to the provisions of this chapter shall convey
    fee title to any unit of the condominium property until all liens and encumbrances,
    except taxes and assessments of political subdivisions not then due and payable,
    affecting both the unit and any other part of the condominium property are paid
    and satisfied, the unit is released from the operation of those liens and encumbrances,
    or the purchaser of the unit assumes the lien.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.12
- number: '5311.13'
  heading: Liens and encumbrances procedure
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Liens and encumbrances arise with respect to and affect a unit of a condominium
    property and the undivided interest in the common elements appurtenant to it in
    the same manner and under the same conditions as liens and encumbrances arise
    with respect to and affect any other real estate, except as provided in this section.

    (B) Any person who does work or labor upon or furnishes machinery, material, or
    fuel for the alteration or repair of any unit without the consent or authorization
    of any owner or lessee of any interest in the unit or the owner''s or lessee''s
    authorized agent nevertheless is entitled to a lien to secure payment for the
    work, labor, machinery, material, or fuel on the estate or interest in the unit
    of the owner, pursuant to sections 1311.01 to 1311.38 of the Revised Code, if
    the work, labor, alteration, or repair was duly authorized or directed by the
    board of directors of the unit owners association and necessary in the opinion
    of the board of directors for public safety or to prevent damage to or destruction
    of any other part of the condominium property.

    (C) Any person who does work or labor upon or furnishes machinery, material, or
    fuel for the construction, alteration, repair, improvement, enhancement, or embellishment
    of any part of the common elements of any condominium property is entitled to
    a lien to secure payment for the work, labor, machinery, material, or fuel on
    the estates or interests of all owners in all units and their respective undivided
    interests in the common elements, pursuant to sections 1311.01 to 1311.38 of the
    Revised Code, if the work, labor, construction, alteration, repair, improvement,
    enhancement, or embellishment was duly authorized or directed by the board of
    directors of the unit owners association.

    (D) If a lien or encumbrance arises with respect to and affects any estate or
    interest in two or more units, the proportionate amount of the obligation secured
    or evidenced by the lien or encumbrance that is attributable to the estate or
    interest in any unit shall be in the ratio that the undivided interests in the
    common elements appurtenant to that unit bears to the total undivided interests
    in the common elements appurtenant to all units. An estate or interest in a unit
    may be released and discharged from the operation of the lien or encumbrance,
    in the same manner and to the same extent that a lien or encumbrance is released
    and discharged with respect to any separate parcel of real estate, by payment
    to the lienholder or encumbrancer of the proportionate amount of the obligation
    secured or evidenced by the lien or encumbrance that is attributable to the estate
    or interest.

    (E)(1) When a lien exists under Chapter 1311. of the Revised Code to secure payment
    for work or labor done or machinery, material, or fuel furnished for property
    that subsequently becomes condominium property through the filing and recording
    of a declaration under section 5311.06 of the Revised Code, regardless of the
    property to which the lien originally attached, after the declaration is filed
    for record, the lien is enforceable as to condominium property only against units
    and their appurtenant interests in the common elements that the developer owned
    or conveyed, other than as described in division (F) of this section.

    (2) Foreclosure of a lien described in division (E)(1) of this section does not
    of itself terminate the condominium property.

    (3) Divisions (E)(1) and (2) of this section do not limit the right to enforce
    a lien arising under Chapter 1311. of the Revised Code against property that does
    not become condominium property through the filing and recording of a declaration
    under section 5311.06 of the Revised Code.

    (F) No lien acquired under Chapter 1311. of the Revised Code is enforceable against
    any purchaser in good faith for value of a unit and its appurtenant interest in
    the common elements from the developer unless the affidavit required by section
    1311.06 of the Revised Code is filed for record before the deed or other instrument
    of conveyance of the unit is filed for record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.13
- number: '5311.14'
  heading: Repair or restoration of damages - sale
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Unless provided otherwise in the declaration, damage to or destruction
    of all or any part of the common elements of a condominium property shall be promptly
    repaired and restored by the board of directors of the unit owners association.
    The cost of the repairs and restoration shall be paid from the proceeds of insurance,
    if any, payable because of the damage or destruction, and the balance of that
    cost is a common expense.

    (B)(1) Unless provided otherwise in the declaration, in the event of damage to
    or destruction of all or any part of the common elements of a condominium property,
    the unit owners, by the affirmative vote of those entitled to exercise not less
    than seventy-five per cent of the voting power or a greater per cent if provided
    in the declaration, may elect not to repair or restore the damaged or destroyed
    common elements.

    (2) Upon an election not to repair or restore, all of the condominium property
    is subject to an action for sale as upon partition at the suit of unit owners
    exercising a majority of the voting power of unit owners. If the condominium property
    is sold pursuant to division (B)(2) of this section, any net proceeds of the sale,
    the net proceeds of insurance, and any other indemnity arising because of the
    damage or destruction are considered as one fund for distribution to all unit
    owners in proportion to the undivided interests in the common elements appurtenant
    to their units.

    No unit owner is entitled to receive any portion of those proceeds until all liens
    and encumbrances on the unit, except taxes and assessments of political subdivisions
    not then due and payable, are paid, released, or discharged.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.14
- number: '5311.16'
  heading: Condominium insurance
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: 'Unless otherwise provided by the declaration or bylaws, the board of directors
    shall maintain, with the cost to be a common expense, all of the following:

    (A) Liability insurance for all unit owners, their tenants, and all persons lawfully
    in possession or control of any part of the condominium property in an amount
    that it determines for personal injury or property damage arising from or relating
    to the common elements;

    (B) For the benefit of all unit owners, fire and extended coverage insurance on
    all buildings and structures of the condominium property in an amount not less
    than ninety per cent of the replacement cost;

    (C)(1) Blanket fidelity, crime, or dishonesty insurance coverage for any person
    who controls or disburses association funds. As used in division (C)(1) of this
    section, "person who controls or disburses association funds" means any individual
    with authority or access to sign checks, conduct electronic transfers, or otherwise
    withdraw funds from any association account or deposit, including the following:

    (a) A management company''s principals and employees;

    (b) A bookkeeper;

    (c) The president, secretary, treasurer, any other board member, or employee of
    the unit owners association.

    (2) All of the following apply to the insurance coverage required under division
    (C)(1) of this section:

    (a) Coverage shall be for the maximum amount of funds that will be in the custody
    of the association or its designated agent at any one time plus three months of
    operating expenses.

    (b) The insurance shall be the property of and for the sole benefit of the association
    and shall protect against theft, embezzlement, misappropriation, or any other
    unauthorized taking or loss of association funds.

    (c) The policy shall include in its definition of "employee" the manager and the
    managing agent of the association''s funds or provide for this inclusion by an
    endorsement to the policy.

    (d) The policy shall name the association as the insured party and shall include
    a provision requiring the issuer of the policy to provide a ten-day written notice
    to the association''s president or manager in the event of cancellation or substantial
    modification of the policy. The manager or managing agent, if any, of the association
    shall be the designated agent on the policy.

    (e) If there is a change in the manager or the managing agent of the association,
    then within ten days of the effective start date, the new manager or managing
    agent shall notify the insurer of such change.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.16
- number: '5311.17'
  heading: Removing condominium property from provisions of condominium law
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Unless otherwise provided by the declaration or division (B) of section
    5311.14 of the Revised Code, the unit owners, by the affirmative vote of all unit
    owners, may elect to remove condominium property from the provisions of this chapter.
    In the event of that election, all liens and encumbrances, except taxes and assessments
    of political subdivisions not then due and payable, upon all or any part of the
    condominium property, shall be paid, released, modified, or discharged. A certificate
    setting forth that the election was made shall be filed with the recorder of the
    county or counties in which the condominium property is situated and recorded
    by each recorder. The certificate shall be signed as follows:

    (1) By the president or other chief officer of the unit owners association, who
    shall certify in the certificate under oath that all liens and encumbrances, except
    taxes and assessments of political subdivisions not then due and payable, upon
    all or any part of the common elements have been paid, released, modified, or
    discharged;

    (2) By the unit owners, each of whom shall certify in the certificate under oath
    that all liens and encumbrances on the owner''s unit or units have been paid,
    released, modified, or discharged, except taxes and assessments of political subdivisions
    not then due and payable.

    (B) A recorder shall not accept for recording any certificate pursuant to this
    section until a copy is filed with the auditor of the same county, and the certificate
    contains the auditor''s endorsement that a copy is filed with the auditor.

    (C) A condominium property is deemed removed from the provisions of this chapter
    upon the filing of the certificate with the recorder or recorders, and upon that
    removal, the property is owned in common by the unit owners. The undivided interest
    in the property owned by each unit owner is the undivided interest in the common
    elements appurtenant to the units in the condominium property previously owned
    by each owner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.17
- number: '5311.18'
  heading: Lien for common expenses
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A)(1) Unless otherwise provided by the declaration or the bylaws, the unit
    owners association has a continuing lien upon the estate or interest of the owner
    in any unit and the appurtenant undivided interest in the common elements for
    the payment of any of the following expenses that are chargeable against the unit
    and that remain unpaid for ten days after any portion has become due and payable:

    (a) The portion of the common expenses chargeable against the unit;

    (b) Interest, administrative late fees, enforcement assessments, and collection
    costs, attorney''s fees, and paralegal fees the association incurs if authorized
    by the declaration, the bylaws, or the rules of the unit owners association and
    if chargeable against the unit.

    (2) Unless otherwise provided by the declaration, the bylaws, or the rules of
    the unit owners association, the association shall credit payments made by a unit
    owner for the expenses described in divisions (A)(1)(a) and (b) of this section
    in the following order of priority:

    (a) First, to interest owed to the association;

    (b) Second, to administrative late fees owed to the association;

    (c) Third, to collection costs, attorney''s fees, and paralegal fees incurred
    by the association;

    (d) Fourth, to the principal amounts the unit owner owes to the association for
    the common expenses or penalty assessments chargeable against the unit.

    (3) The lien described in division (A)(1) of this section is effective on the
    date that a certificate of lien in the form described in division (A)(3) of this
    section is filed for record in the office of the recorder of the county or counties
    in which the condominium property is situated pursuant to an authorization given
    by the board of directors of the unit owners association. The certificate shall
    contain a description of the unit, the name of the record owner of the unit, and
    the amount of the unpaid portion of the common expenses and, subject to subsequent
    adjustments, any unpaid interest, administrative late fees, enforcement assessments,
    collection costs, attorney''s fees, and paralegal fees. The certificate shall
    be subscribed by the president or other designated representative of the association.

    (4) The lien described in division (A)(1) of this section is valid for a period
    of five years from the date of filing, unless it is sooner released or satisfied
    in the same manner provided by law for the release and satisfaction of mortgages
    on real property or unless it is discharged by the final judgment or order of
    a court in an action brought to discharge the lien as provided in division (C)
    of this section.

    (B)(1) The lien described in division (A)(1) of this section is prior to any lien
    or encumbrance subsequently arising or created except liens for real estate taxes
    and assessments of political subdivisions and liens of first mortgages that have
    been filed for record and may be foreclosed in the same manner as a mortgage on
    real property in an action brought on behalf of the unit owners association as
    authorized by the board of directors.

    (2) In a foreclosure action a unit owners association commences pursuant to division
    (B)(1) of this section or a foreclosure action the holder of a first mortgage
    or other lien on a unit commences, the owner of the unit, as the defendant in
    the action, shall be required to pay a reasonable rental for the unit during the
    pendency of the action. The unit owners association or the holder of the lien
    is entitled to the appointment of a receiver to collect the rental. Each rental
    payment a receiver collects during the pendency of the foreclosure action shall
    be applied first to the payment of the portion of the common expenses chargeable
    to the unit during the foreclosure action.

    (3) In a foreclosure action the holder of a lien on a unit commences, the holder
    of that lien shall name the unit owners association as a defendant in the action.

    (4) Unless prohibited by the declaration or the bylaws, following a foreclosure
    action a unit owners association commences pursuant to division (B)(1) of this
    section or a foreclosure action the holder of a lien on a unit commences, the
    association or its agent duly authorized by action of the board of directors,
    is entitled to become a purchaser at the foreclosure sale.

    (5) A mortgage on a unit may contain a provision that secures the mortgagee''s
    advances for the payment of the portion of the common expenses chargeable against
    the unit upon which the mortgagee holds the mortgage.

    (6) In any foreclosure action, it is not a defense, set off, counterclaim, or
    crossclaim that the unit owners association has failed to provide the unit owner
    with any service, goods, work, or material, or failed in any other duty.

    (C) A unit owner who believes that the portion of the common expenses chargeable
    to the unit, for which the unit owners association files a certificate of lien
    pursuant to division (A) of this section, has been improperly charged may commence
    an action for the discharge of the lien in the court of common pleas of the county
    in which all or a part of the condominium property is situated. In the action,
    if it is finally determined that the portion of the common expenses was improperly
    charged to the unit owner or the unit, the court shall enter an order that it
    determines to be just, which may provide for a discharge of record of all or a
    portion of the lien.'
