- number: '5309.031'
  heading: Maintain registered land records by use of photographic, magnetic, electronic,
    or certain other processes means, or displays
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) Notwithstanding any provision of this chapter or Chapter 5310. of the
    Revised Code to the contrary, and in accordance with the rules adopted by the
    county recorder under division (C) of this section, the recorder may perform any
    of the following functions by nonpaper means:

    (1) Transcribe a certified copy of a decree of registration sent by the clerk
    of a probate court pursuant to section 5309.25 of the Revised Code;

    (2) Enter any memorial, notation, or memorandum pertaining to registered land;

    (3) Register a subsequent transfer of registered land and carry forward in connection
    with the registration any memorial, notation, or memorandum;

    (4) Enter, index, and, if applicable, file any registered land record, including,
    but not limited to, documents relating to cancellations, releases, discharges,
    or satisfactions;

    (5) Maintain each of the following:

    (a) The register of titles kept pursuant to section 5309.25 of the Revised Code;

    (b) The records of surveys of registered land kept pursuant to section 5309.32
    of the Revised Code;

    (c) The tract indexes, if any, required by the board of county commissioners pursuant
    to section 5309.33 of the Revised Code and the alphabetical indexes kept pursuant
    to that section;

    (d) The record of trusts and exceptional estates in registered land kept pursuant
    to section 5309.35 of the Revised Code;

    (e) The entry book kept pursuant to section 5309.38 of the Revised Code;

    (f) The records of liens on registered land kept pursuant to section 5309.50 of
    the Revised Code and the record of leases on registered land kept pursuant to
    that section.

    (6) Fulfill any other requirement of this chapter or Chapter 5310. of the Revised
    Code concerning the recorder''s maintenance of registered land records.

    (B) If a county recorder maintains registered land records by nonpaper means under
    division (A) of this section, all of the following shall apply:

    (1) The recorder shall keep and have readily available the machines and equipment
    necessary to permit the inspection of, or to reproduce copies of, the registered
    land records maintained at the recorder''s office, to fulfill requests made under
    section 149.43 of the Revised Code.

    (2) Photographs, microphotographs, films, or microfilms shall be placed and kept
    in conveniently accessible, fireproof, and insulated files, cabinets, or containers.

    (3) Notwithstanding any rules adopted by a county records commission under section
    149.38 of the Revised Code specifying the length of time original paper records
    must be retained in that format, the recorder may dispose of the register of titles
    kept in book format and any other original paper registered land record provided
    for in section 5309.25 of the Revised Code after it has been transcribed, registered,
    entered, indexed, or filed by nonpaper means under division (A) of this section,
    in accordance with the rules adopted under division (C) of this section. The recorder
    shall adhere to all other applicable records retention rules adopted by a county
    records commission under section 149.38 of the Revised Code.

    (C)(1) A county recorder choosing to maintain registered land records by nonpaper
    means under division (A) of this section shall adopt rules for implementing this
    section. These rules shall be subject to approval by the board of county commissioners
    and shall do all of the following:

    (a) Specify the type of nonpaper means that the county recorder will use to perform
    registered land functions;

    (b) Identify the registered land functions that the county recorder will perform,
    and the registered land records that the county recorder will maintain, by nonpaper
    means;

    (c) Specify the form of the record maintained by nonpaper means that will be deemed
    the original certificate of title under division (B) of section 5309.25 of the
    Revised Code;

    (d) Provide for preserving, safekeeping, using, examining, exhibiting, projecting,
    and enlarging photographs, microphotographs, films, and microfilms;

    (e) Provide for secure storage and maintenance of nonpaper records, including,
    but not limited to, requiring daily backups of records stored on computer to reflect
    daily changes made to those records;

    (f) Specify the manner in which the recorder will sign an original certificate
    of title or other registered land record that is entered, indexed, or filed by
    nonpaper means;

    (g) Provide for any other policies, procedures, or practices necessary for the
    maintenance of registered land records by nonpaper means.

    (2) All registered land functions of a county recorder and all registered land
    records maintained by nonpaper means under division (A) of this section shall
    comply with the otherwise applicable requirements of this chapter and Chapter
    5310. of the Revised Code.

    (3) Any rules adopted under division (C)(1) of this section dealing with secure
    storage and computer or other security processes for nonpaper records may be approved
    in an executive session of a board of county commissioners.

    (D) As used in this section and sections 5309.24, 5309.25, 5309.95, 5309.96, and
    5309.98 of the Revised Code, "nonpaper means" means at least one process from
    each of the following categories, which process provides a medium of copying,
    recording, or reproducing applicable registered land records, including, but not
    limited to, memoranda, certificates, affidavits, or decrees:

    (1) Any photostatic, photographic, miniature photographic, film, microfilm, or
    microphotographic process;

    (2) Perforated tape, magnetic tape, or other magnetic means, electronic data processing
    or other electronic means, machine readable means, or graphic or video display.'
