- number: '5309.05'
  heading: Persons permitted to have title to land registered
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: The persons who, singly or collectively, claim to own and to be seized of,
    or to have the power of appointing or disposing of, the legal or equitable estate
    in fee in and to the whole of any parcel of land, may personally or through an
    attorney in fact, authorized by an instrument signed, acknowledged, and recorded
    as a deed, have their title to that estate in that land, or the whole title to
    that land, registered in the county where the land is situated. A corporation
    may apply by its agent or attorney, authorized by vote of its board of directors,
    and any person under disability may apply by the person's legal guardian or trustee.
    All persons in whose behalf the application is made shall be named as the applicants
    or plaintiffs, except in cases mentioned in section 5309.66 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.05
- number: '5309.06'
  heading: Estates or interests which may be registered - procedure
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'No estate less than a fee simple and no mortgage, lien, or charge of any
    kind shall be registered unless the fee in possession, remainder, or reversion
    or other character of fee in and to the land has been registered first or is registered
    at the same time. If the estate of the applicant is subject to any outstanding
    lesser estate, including life estates, estates for years, conditional limitations,
    executory devises or uses, springing or shifting uses, or other future estate,
    interest, or limitation, whether vested or contingent, is subject to any private
    easement or other estate or interest of any kind, or is subject to any mortgage,
    lien, or charge, each lesser estate, private easement, other estate or interest,
    mortgage, lien, or charge shall be noted on the certificate of title and duplicate
    of the certificate of title, except taxes not due, leases for less than three
    years, and restrictive covenants described in division (B) of section 5309.24
    of the Revised Code. The title to the estate so registered and certified shall
    be subject only to the lesser estates, private easements, other estates or interests,
    mortgages, liens, and charges so noted, except as provided in section 5309.28
    of the Revised Code. A perpetual leasehold, for purposes of this chapter and Chapter
    5310. of the Revised Code, shall be treated as an estate in fee, and the possible
    reversion or remainder in fee under the leasehold shall be treated as the lesser
    estate.

    No parcel of land that lies partly in two or more counties shall be registered
    if one or more of the counties in which the parcel lies have abolished their land
    registration systems.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.06
- number: '5309.07'
  heading: Tax deed entitled to be registered
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: No title derived from any tax sale or tax deed may be registered unless it
    appears that title under said tax sale or tax deed has been established and confirmed,
    or acquired, by a valid judgment or decree of a court of competent jurisdiction,
    or that the applicant and those from whom the applicant claims title have been
    in the actual, undisputed, and adverse possession of the land under such title
    for at least twenty-one years and have paid all taxes and assessments legally
    levied thereon for at least ten successive years next preceding the filing of
    the application.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.07
- number: '5309.08'
  heading: Application to register title
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: 'Application to register the title to land or to any interest therein shall
    be made by petition, as in the commencement of a civil action, filed in the probate
    court or court of common pleas of the county in which the land is situated. When
    the application is filed, the clerk of the probate court or the clerk of the court
    of common pleas shall forthwith file in the office of the county recorder of said
    county and in the office of the recorder of each county in which any part of the
    land lies a memorandum stating that application for registration has been filed,
    the date and place of filing, and a copy of the description of the land contained
    in the application. Such memorandum shall be recorded and indexed by the recorder.

    The applicant may include in his application all lands in the county owned by
    him in fee, but when more than one distinct parcel of land is included, each separate
    parcel shall be separately described and numbered and the allegations and statements
    of fact made in reference to it as provided in section 5309.09 of the Revised
    Code. A public or private way, when the applicant owns the fee subject thereto,
    shall not be regarded as separating land into parcels.

    If more than one person joins in the application, each person must have a common
    and like interest in all the property included therein.

    If any separate parcel of land lies partly in two or more counties, the application
    may be filed in the probate court or the court of common pleas of any of such
    counties and the title registered in each county in which any part of such parcel
    of land lies, under the decree obtained in the court in which such application
    is filed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.08
- number: '5309.081'
  heading: Death of survivorship tenant transfer of interest
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: When an interest in title to registered land is vested in two or more persons
    as a survivorship tenancy and one of the survivorship tenants dies, the interest
    of the decedent shall be transferred by presenting to the county auditor and filing
    with the county recorder either a certificate of transfer as provided in section
    2113.61 of the Revised Code, or an affidavit accompanied by a certified copy of
    a death certificate and by an owner's duplicate of the relevant certificate of
    title. The affidavit shall certify that the owner of a survivorship tenancy interest
    in the title to a parcel or parcels of registered land has died and recite the
    names of the surviving tenants, the current residence address of each surviving
    tenant, the date of death of the decedent, a description of the land, and the
    number of the certificate of title where the land is registered. The county recorder
    shall register the title in the surviving tenants, upon a new folium in the register
    of titles; enter all memorials, notations, and memoranda to which the land is
    subject at the time of transfer; and issue a new certificate of title to the surviving
    tenants setting forth all of the information as to each required to be shown pursuant
    to section 5309.40 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5309.081
- number: '5309.082'
  heading: Survivorship tenant medicaid estate recovery form
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5309'
    name: Registration Of Land Titles
  text: '(A) As used in this section:

    "Estate" has the same meaning as in section 5162.21 of the Revised Code.

    "Medicaid estate recovery program" means the program instituted under section
    5162.21 of the Revised Code.

    (B) The administrator of the medicaid estate recovery program shall prescribe
    a form on which a surviving tenant under a survivorship tenancy or such a surviving
    tenant''s representative is to indicate both of the following:

    (1) Whether the deceased survivorship tenant was either of the following:

    (a) A decedent subject to the medicaid estate recovery program;

    (b) The spouse of a decedent subject to the medicaid estate recovery program.

    (2) Whether the registered land under a survivorship tenancy was part of the estate
    of a decedent subject to the medicaid estate recovery program.

    (C) A county recorder shall obtain a properly completed form prescribed under
    division (B) of this section from the surviving tenant under a survivorship tenancy
    or the surviving tenant''s representative and send a copy of the form to the administrator
    of the medicaid estate recovery program before registering the title in the surviving
    tenants under section 5309.081 of the Revised Code.'
