  url: https://codes.ohio.gov/ohio-revised-code/section-5311.18
- number: '5311.19'
  heading: Compliance with deed restrictions, declaration, bylaws and administrative
    rules and regulations
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) All unit owners, their tenants, all persons lawfully in possession and
    control of any part of a condominium property, and the unit owners association
    of a condominium property shall comply with all covenants, conditions, and restrictions
    set forth in a deed to which they are subject or in the declaration, the bylaws,
    or the rules of the unit owners association, as lawfully amended. Violations of
    those covenants, conditions, or restrictions shall be grounds for the unit owners
    association or any unit owner to commence a civil action for damages, injunctive
    relief, or both, and an award of court costs and reasonable attorney''s fees in
    both types of action.

    (B)(1) Except as otherwise provided in the declaration or the bylaws, a unit owners
    association may initiate eviction proceedings, pursuant to Chapters 5321. and
    1923. of the Revised Code, to evict a tenant for a violation of division (A) of
    this section. The action shall be brought by the unit owners association, as the
    unit owner''s agent, in the name of the unit owner.

    (2) In addition to any procedures required by Chapters 5321. and 1923. of the
    Revised Code, the unit owners association shall give the unit owner at least ten
    days written notice of the intended eviction action.

    (3) The costs of any eviction action brought pursuant to division (B)(1) of this
    section, including reasonable attorney''s fees, shall be charged to the unit owner
    and shall be the subject of a special assessment against the offending unit and
    made a lien against that unit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.19
- number: '5311.191'
  heading: Condominium declaration prohibiting placement of flag unenforceable
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) No declaration, bylaw, rule, regulation, or agreement of a condominium
    property or construction of any of these items by the board of managers of its
    unit owners association shall prohibit any of the following:

    (1) The placement of a flagpole that is to be used for the purpose of displaying,
    or the display of the flag of the United States or the national league of families
    POW/MIA flag on or within the limited common areas and facilities of a unit owner
    or on the immediately adjacent exterior of the building in which the unit of a
    unit owner is located, if the flag is displayed in accordance with any of the
    following:

    (a) The patriotic customs set forth in 4 U.S.C. 5-10, and 36 U.S.C. 902, governing
    the display and use of the flag;

    (b) The recommended flagpole standards set forth in "Our Flag," published pursuant
    to S.C.R. 61 of the 105th Congress, 1st Session (1998);

    (c) Any federal law, proclamation of the president of the United States or the
    governor, section of the Revised Code, or local ordinance or resolution.

    (2) T he placement of a flagpole that is to be used for the purpose of displaying,
    or the display of the flag of the state as defined in section 5.01 of the Revised
    Code on or within the limited common areas and facilities of a unit owner or on
    the immediately adjacent exterior of the building in which the unit of a unit
    owner is located, if the flag is displayed in accordance with a ny state law,
    local ordinance or resolution, or proclamation by the governor of the state ;

    (3) The display of a service flag approved by the United States secretary of defense
    for display in a window of the residence of a member of the immediate family of
    an individual serving in the armed forces of the United States. A service flag
    includes a blue star banner, a gold star banner, and any other flag the secretary
    of defense designates as a service flag.

    (B) Any display of the flag of the United States or the national league of families
    POW/MIA flag, shall use a flag or flag pole of an appropriate size, consistent
    with the size and character of the condominium buildings and common areas.

    (C) A declaration, bylaw, rule, regulation, or agreement or the construction of
    any of these items that violates division (A) of this section is against public
    policy and unenforceable in any court of this state to the extent it violates
    that division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.191
- number: '5311.192'
  heading: Solar energy collection devices
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Unless specifically prohibited in the declaration, any owner of a solar
    appropriate unit may install a solar energy collection device on the roof of that
    unit if either of the following conditions apply:

    (1) The unit, as defined by the declaration, includes the roof, for which the
    cost to insure, maintain, repair, and replace is not a common expense and is instead
    the owner''s responsibility.

    (2) The declaration specifically allows for and regulates the types and installation
    of solar energy collection devices in the common or limited common elements and
    establishes responsibility for the cost to insure, maintain, repair, and replace
    such devices.

    (B) Notwithstanding division (A) of this section, a unit owners association may
    establish reasonable restrictions concerning the size, place, and manner of placement
    of solar energy collection devices.

    (C) As used in this section:

    (1) "Solar appropriate unit" means a condominium unit that does not have any other
    condominium units directly above or below it.

    (2) "Solar energy collection device" means any device manufactured and sold for
    the sole purpose of facilitating the collection and beneficial use of solar energy,
    including passive heating panels or building components and solar photovoltaic
    apparatus.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.192
- number: '5311.20'
  heading: Unit owners association may sue or be sued
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: In any action relating to the common elements or to any right, duty, or obligation
    possessed or imposed upon the unit owners association by statute or otherwise,
    the unit owners association may sue or be sued as a separate legal entity. In
    any action of that nature, service of summons or other process may be made upon
    the unit owners association by serving the process personally upon the president
    or other designated representative of the unit owners association named in the
    declaration to receive service of process, or the person named as statutory agent
    of the association if it is an incorporated entity, or by leaving the process
    at the residence or place of business of a person named in the declaration or
    named as statutory agent. Any action brought by or on behalf of the unit owners
    association shall be pursuant to authority granted by the board of directors.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.20
- number: '5311.21'
  heading: Common profits and expenses distributed
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: Unless retained by the board of directors as reserves, the common profits
    of a condominium property shall be distributed among, and, except as provided
    in division (B) of section 5311.041 of the Revised Code, the common expenses shall
    be charged to the unit owners according to the undivided interests in the common
    elements appurtenant to their respective units.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.21
- number: '5311.22'
  heading: Voting
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Unless otherwise provided in the declaration or bylaws, each unit owner
    may exercise that percentage of the total voting power of all unit owners on any
    question for which the vote of unit owners is permitted or required that is equivalent
    to the undivided interest in the common elements appurtenant to the owner''s unit.

    (B) Fiduciaries who are owners of record of a unit or units may vote their respective
    interests as unit owners. Unless otherwise provided in the declaration or bylaws,
    if two or more persons, whether fiduciaries, tenants in common, or otherwise,
    own undivided interests in a unit, each person may exercise the proportion of
    the voting power of all of the owners of the unit that is equivalent to the person''s
    proportionate undivided interest in the unit.

    (C) A fiduciary for a unit owner or of the estate of a unit owner may vote as
    though the fiduciary were the unit owner when the fiduciary has furnished to the
    unit owners association proof, satisfactory to it, of the fiduciary''s appointment
    and qualification as an executor under the last will of a deceased unit owner,
    an administrator of the estate of a deceased unit owner, a guardian, committee,
    or conservator of the estate of a minor or incompetent who is a unit owner, a
    trustee in bankruptcy of a unit owner, a statutory or judicial receiver or liquidator
    of the estate or affairs of a unit owner, or an assignee for the benefit of creditors
    of a unit owner.

    (D) When any fiduciary or representative of a unit owner who is not described
    in division (C) of this section has furnished the unit owners association with
    satisfactory proof of authority, that person may vote as though a unit owner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.22
- number: '5311.23'
  heading: Failure to comply with lawful provision of condominium instruments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) A declarant, developer, agent, or unit owner or any person entitled to
    occupy a unit is liable in damages in a civil action for harm caused to any person
    or to the unit owners association by that individual''s failure to comply with
    any lawful provision of the condominium instruments.

    (B) Any interested person, including a unit owners association, may commence an
    action for a declaratory judgment to determine that person''s legal relations
    under the condominium instruments or to obtain an injunction against a declarant,
    developer, agent, unit owner, or person entitled to occupy a unit who refuses
    to comply, or threatens to refuse to comply, with a provision of the condominium
    instruments.

    (C) In connection with either type of action described in this section, one or
    more unit owners may bring a class action on behalf of all unit owners. The lawful
    provisions of the condominium instruments, if necessary to carry out their purposes,
    may be enforced in either type of action against the condominium property or any
    person who owns or previously has owned any estate or interest in the condominium
    property.

    (D) An action by the unit owners association under this section may be commenced
    by the association in its own name, in the name of the board of directors, or
    in the name of the association''s managing agent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.23
- number: '5311.24'
  heading: Exceptions to requirements for written instruments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A) Sections 5311.25 to 5311.27 of the Revised Code do not apply to any of
    the following, unless the method of disposing of the condominium property is adopted
    for the purpose of evading their provisions:

    (1) The sale of a condominium ownership interest solely for commercial or industrial
    purposes or uses;

    (2) The sale of real estate under or pursuant to court order;

    (3) The sale of real estate by the United States, by this state or any political
    subdivision of this state, or by any of their agencies or instrumentalities;

    (4) The sale of condominium ownership interests in individual dwelling units or
    individual water slip units and in their appurtenant common elements for the account
    of a person other than a declarant, developer, or agent when the sale is not conducted
    pursuant to the common promotional plan of the developer for sales in a condominium
    development.

    (B) A sale or offer to sell a condominium ownership interest does not exist when
    a reservation agreement is entered into that does not legally require a prospective
    purchaser to purchase a condominium ownership interest and under which the prospective
    purchaser may relinquish all rights and receive a full refund of all deposits,
    without penalty, at any time prior to entering into a contract to purchase a condominium
    ownership interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5311.24
- number: '5311.25'
  heading: Required provisions for condominium instruments
  title:
    num: '53'
    name: Real Property
  chapter:
    num: '5311'
    name: Condominium Property
  text: '(A)(1) Except as provided in division (A)(2) of this section, any deposit
    or down payment made in connection with the sale of a condominium ownership interest
    shall be held in trust or escrow until delivered at settlement, returned to or
    otherwise credited to the purchaser, or forfeited to the developer. If a deposit
    or down payment of more than two thousand dollars is held for more than ninety
    days and is not withdrawn pursuant to division (A)(2) of this section, interest
    at a rate equal to the prevailing rate payable by federally insured financial
    institutions in the county of the condominium property on daily interest accounts
    for any period exceeding ninety days shall be credited to the purchaser at settlement
    or upon return or other credit made to the purchaser or added to any forfeiture
    to the developer. Interest is payable only on the amount of the deposit or down
    payment that exceeds two thousand dollars.

    (2)(a) If a contract for the sale of a condominium ownership interest contains
    the legend described in division (A)(2)(b) of this section, a developer may, in
    accordance with the contractual provisions, withdraw a deposit or down payment
    from trust or escrow upon the commencement of construction of the structure of
    the condominium property in which the purchaser''s unit will be located and use
    the moneys in the actual construction and development of the condominium property.
    The developer shall not use the moneys for advertising purposes or for the salaries,
    commissions, or expenses of agents.

    (b) A contract that permits withdrawals of a deposit or down payment for the purposes
    described in division (A)(2)(a) of this section shall include the following legend
    conspicuously printed or stamped in boldface type on the contract''s first page
    and immediately above the signature of the purchaser: "Purchaser acknowledges
    that, pursuant to this contract, the developer may withdraw and then use for construction
    and development of the condominium property any deposit or down payment that the
    purchaser makes prior to closing."

    (3) Deposits and down payments held in trust or escrow in accordance with division
    (A)(1) of this section are not subject to attachment, garnishment, or other legal
    process by creditors of the developer, agents, or the purchaser of the condominium
    ownership interest.

    (B) Except in the capacity as a unit owner of unsold condominium ownership interests,
    the developer or agent shall not retain a property interest in any of the common
    elements after unit owners other than the developer assume control of the unit
    owners association except as follows:

    (1) In a leasehold condominium development, the developer or agent may retain
    the same interest in the common elements as the developer or agent retains in
    the entire condominium development.

    (2) In an expandable condominium property, the developer may retain an interest
    consistent with the declaration and necessary to ensure both of the following,
    whether or not the condominium property is expanded to include the additional
    property:

    (a) Ingress and egress over the common elements for the benefit of the additional
    property;

    (b) The availability of utilities from and to the common elements for the benefit
    of the additional property.

    (3) The developer may retain the right to enter upon the condominium property
    to fulfill any warranty obligations to the unit owners association or to unit
    owners.

    (C) The owners of condominium ownership interests that have been sold by the developer
    or an agent shall assume control of the common elements and of the unit owners
    association as prescribed in divisions (C) and (D) of section 5311.08 of the Revised
    Code.

    (D) Unless a contract or other agreement is renewed by a vote of the unit owners
    exercising a majority of the voting power of the unit owners association, neither
    the unit owners association nor the unit owners shall be subject to either of
    the following:

    (1) For more than ninety days subsequent to the date that the unit owners other
    than the developer assume control of the unit owners association, any management
    contract executed prior to that assumption of control;

    (2) For more than one year subsequent to an assumption of control, any other contract
    executed prior to that assumption of control, except for contracts for necessary
    utility services.

    (E)(1) Except as provided in division (E)(4) of this section, the developer shall
    furnish both of the following:

    (a) A minimum of a two-year warranty covering the full cost of labor and materials
    for any repair or replacement of roof and structural components, and mechanical,
    electrical, plumbing, and common service elements serving the condominium property
    or additional property as a whole, occasioned or necessitated by a defect in material
    or workmanship;

    (b) A one-year warranty covering the full cost of labor and materials for any
    repair or replacement of structural, mechanical, and other elements pertaining
    to each unit occasioned or necessitated by a defect in material or workmanship.

    (2) The two-year warranty shall commence as follows:

    (a) For a condominium development other than an expandable condominium development,
    on the date the deed or other evidence of ownership is filed for record following
    the sale of the first condominium ownership interest in the development to a purchaser
    in good faith for value;

    (b)(i) For an expandable condominium development, for property submitted by the
    original declaration, on the date the deed or other evidence of ownership is filed
    for record following the sale of the first condominium ownership interest in the
    property to a purchaser in good faith for value;

    (ii) For an expandable condominium development, for any additional property submitted
    by amendment to the declaration, on the date the deed or other evidence of ownership
    is filed for record following the sale of the first condominium ownership interest
    in the additional property to a purchaser in good faith for value.

    (3) The one-year warranty for each unit shall commence on the date the deed or
    other evidence of ownership is filed for record following the developer''s sale
    and conveyance of the condominium ownership interest in the unit to a purchaser
    in good faith for value.

    (4) The valid assignment by the developer of the express and implied warranty
    of the manufacturer satisfies the developer''s obligation under this section with
    respect to ranges, refrigerators, washing machines, clothes dryers, hot water
    heaters, and other similar appliances installed and furnished as part of the unit
    by the developer. The developer''s warranty under division (E)(1) of this section
    is limited to the installation of the appliances.

    (5) All warranties made to the developer that exceed time periods specified in
    division (E)(1) of this section with respect to any part of a unit shall be assigned
    to the purchaser of that unit and warranties with respect to any part of the common
    elements shall be assigned to the unit owners association.

    (F) The developer shall assume the rights and obligations of a unit owner in the
    developer''s capacity as owner of condominium ownership interests not yet sold,
    including the obligation to pay common expenses attaching to those interests,
    from the date the declaration is filed for record even if the construction of
    the units and the appurtenant common elements subject to the condominium ownership
    interests has not started or is not complete.

    (G) In a conversion condominium development, the developer shall offer each tenant
    an option, exercisable within not less than ninety days after notice, to purchase
    a condominium ownership interest in the development that the tenant occupies and
    at a price that is not greater than the price at which the unit will be offered
    to the general public for the subsequent one hundred eighty-day period. The developer
    shall give each tenant written notice of not less than one hundred twenty days
    prior to the conversion or intended conversion, during which time the tenant may
    not be evicted to accommodate or facilitate the sale of any unit if the tenant
    is not in default under the tenant''s terms of tenancy. The ninety-day and one
    hundred twenty-day notice periods may run concurrently and may be waived in writing
    by a tenant. If two or more tenants occupy a unit in a conversion condominium
    development, the option to purchase shall be given jointly to those tenants.

    (H) Except as provided in section 5311.24 of the Revised Code, no developer or
    agent, directly or indirectly, shall sell or offer to sell a condominium ownership
    interest in a condominium development unless the condominium instruments include
    a statement that sets forth the requirements of this section and sections 5311.26
    and 5311.27 of the Revised Code.'
