- number: '1707.35'
  heading: Securities authorized before July 22, 1929
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'All securities which were "certificated" by the division of securities before
    July 22, 1929, are, if the "certification" remained unrevoked on such date, qualified
    for all purposes under sections 1707.01 to 1707.50, inclusive, of the Revised
    Code.

    All securities authorized to be sold by reason of the filing of information relative
    thereto before July 22, 1929, shall for all purposes be deemed registered by description
    under such sections, but the division shall have the same power to require further
    information with respect to the further sale of such securities as with respect
    to the further sale of securities registered by description or by qualification
    under sections 1707.01 to 1707.50, inclusive, of the Revised Code.'
