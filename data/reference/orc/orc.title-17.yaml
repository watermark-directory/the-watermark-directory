- number: '1706.513'
  heading: Complying name for registration
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A foreign limited liability company whose name does not comply with section
    1706.07 of the Revised Code may not file a registration as a foreign limited liability
    company until it adopts, for the purpose of transacting business in this state,
    an assumed name that complies with section 1706.07 of the Revised Code. A foreign
    limited liability company that adopts an assumed name under this division and
    then files a registration as a foreign limited liability company under that assumed
    name need not file a name registration when transacting business under that assumed
    name. After filing the registration as a foreign limited liability company under
    an assumed name, a foreign limited liability company shall transact business in
    this state under the assumed name unless the foreign limited liability company
    has filed a name registration under another name and is authorized to transact
    business in this state under such name.

    (B) If a foreign limited liability company to which a registration as a foreign
    limited liability company has been filed changes its name to one that does not
    comply with section 1706.07 of the Revised Code, it may not thereafter transact
    business in this state until it complies with division (A) of this section by
    filing a certificate of correction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.513
- number: '1706.514'
  heading: Cancellation of registration with Secretary of State
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A foreign limited liability company that has a registration as a foreign
    limited liability company in the records of the secretary of state may cancel
    its registration as a limited liability company by delivering for filing a certificate
    of cancellation of registration of a foreign limited liability company to the
    secretary of state.

    (B) A certificate of cancellation of registration of a foreign limited liability
    company shall set forth all of the following:

    (1) The name and registration number of the foreign limited liability company,
    any assumed name adopted for use in this state, and the name of the jurisdiction
    under whose law it is organized;

    (2) The name and street address of the statutory agent, or if a statutory agent
    is no longer to be maintained, a statement that the foreign limited liability
    company will not maintain a statutory agent, and the street address to which service
    of process may be mailed pursuant to section 1706.09 of the Revised Code;

    (3) That the foreign limited liability company, and all series thereof, will no
    longer transact business in this state and that it relinquishes its authority
    to transact business in this state;

    (4) That the foreign limited liability company is canceling its registration as
    a foreign limited liability company;

    (5) That any statement of assumed name it has on file in the records of the secretary
    of state and any assumed name with respect to the foreign limited liability company,
    are withdrawn upon the effective date of the cancellation of registration of a
    foreign limited liability company.

    (C) The cancellation of registration of a foreign limited liability company shall
    be effective upon filing by the secretary of state, whereupon the registration
    as a foreign limited liability company shall be canceled and the foreign limited
    liability company, and all series thereof, shall be without authority to transact
    business in this state.

    (D) Cancellation of a registration as a foreign limited liability company shall
    not terminate the authority of any statutory agent appointed by the foreign limited
    liability company.'
