- number: '1707.45'
  heading: Burden of proof
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: In any indictment, complaint, or information under section 1707.44 of the
    Revised Code, it shall not be necessary to negative the existence of facts which
    would bring a security within section 1707.02 of the Revised Code, or would bring
    a transaction within section 1707.03, 1707.04, or 1707.06 of the Revised Code,
    or to negative the existence of facts which would bring a transaction within the
    exceptions of section 1707.34 of the Revised Code. The burden of proof shall be
    upon the party claiming the benefits of any of such sections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.45
- number: '1707.46'
  heading: Duties of commissioner of securities
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'The principal executive officer of the division of securities shall be the
    commissioner of securities, who shall be appointed by the director of commerce.
    The commissioner of securities shall enforce all the laws and administrative rules
    enacted or adopted to regulate the sale of bonds, stocks, and other securities
    and to prevent fraud in such sales. The commissioner also shall enforce all the
    laws and administrative rules enacted or adopted to regulate investment advisers,
    investment adviser representatives, state retirement system investment officers,
    and the bureau of workers'' compensation chief investment officer and to prevent
    fraud in their acts, practices, and transactions.

    The commissioner shall be paid at a rate not less than pay range 47 set out in
    schedule E-2 of section 124.152 of the Revised Code, to be paid as other operating
    expenses of the division.'
