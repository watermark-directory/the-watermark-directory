- number: '1706.722'
  heading: Conversion certificate and effective date
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) After a declaration of conversion is approved, both of the following
    apply:

    (1) A converting limited liability company shall deliver to the secretary of state
    for filing a certificate of conversion. The certificate of conversion shall be
    signed as provided in division (A) of section 1706.17 of the Revised Code and
    shall include all of the following:

    (a) A statement that the converting limited liability company has been converted
    into the converted entity;

    (b) The name and form of the converted entity and the jurisdiction of its governing
    statute;

    (c) The date the conversion is effective under the governing statute of the converted
    entity;

    (d) A statement that the conversion was approved as required by this chapter;

    (e) A statement that the conversion was approved as required by the governing
    statute of the converted entity;

    (f) If the converted entity is a foreign entity not authorized to transact business
    in this state, the street address of its statutory agent for the purposes of division
    (B) of section 1706.723 of the Revised Code.

    (2) If the converted entity is a limited liability company, the converting entity
    shall deliver to the secretary of state for filing articles of organization which
    shall include, in addition to the information required by division (A) of section
    1706.16 of the Revised Code, all of the following:

    (a) A statement that the converted entity was converted from the converting entity;

    (b) The name and form of the converting entity and the jurisdiction of the converting
    entity''s governing statute;

    (c) A statement that the conversion was approved as required by the governing
    statute of the converting entity.

    (B) A conversion shall become effective as follows:

    (1) If the converted entity is a limited liability company, when the articles
    of organization take effect;

    (2) If the converted entity is not a limited liability company, as provided by
    the governing statute of the converted entity.'
