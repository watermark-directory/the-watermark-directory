- number: '1746.10'
  heading: Interests in property
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: '(A) A business trust may take, hold, and dispose of any estate or interest
    in real or personal property in its business name, or in the name of one or more
    of its trustees, or in the name of one or more of its nominees. A conveyance to
    a business trust in its business name shall recite that the grantee is a business
    trust, and the estate or interest so acquired can be conveyed by the business
    trust only in its business name. Any estate or interest in real or personal property
    taken, held, or disposed of by a business trust in its business name prior to
    the effective date of this section is hereby confirmed as if the conveyance thereof
    had been made pursuant to the authority of this section.

    (B) The fact that a recorded deed, mortgage, or other conveyance of an estate
    or interest in real or personal property designates a business trust or one or
    more trustees or nominees of a business trust as the grantee does not give notice
    to or put upon inquiry any person dealing with the property that there are any
    limitations on the power of such business trust, trustees, or nominees to dispose
    of or encumber the estate or interest specified in such conveyance, unless such
    conveyance specifically contains such limitations or incorporates by reference
    another instrument of record in the same county which specifically contains such
    limitations. As to all bona fide purchasers and encumbrancers of the property,
    a conveyance, release, or encumbrance by such business trust, trustees, or nominees
    transfers or releases the estate or interest in the property specified free from
    the claims of the holders of shares of beneficial interest in the trust estate
    and free from any obligation on the part of such purchaser or encumbrancer to
    see to the application of any purchase money or other consideration.'
