- number: '1751.32'
  heading: Annual report
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'Each health insuring corporation, annually, on or before the first day of
    March, shall file a report with the superintendent of insurance, covering the
    preceding calendar year.

    The report shall be verified by an officer of the health insuring corporation,
    shall be in the form the superintendent prescribes, and shall include:

    (A) A financial statement of the health insuring corporation, including its balance
    sheet and receipts and disbursements for the preceding year, which reflect, at
    a minimum:

    (1) All premium rate and other payments received for health care services rendered;

    (2) Expenditures with respect to all categories of providers, facilities, insurance
    companies, and other persons engaged to fulfill obligations of the health insuring
    corporation arising out of its health care policies, contracts, certificates,
    and agreements;

    (3) Expenditures for capital improvements or additions thereto, including, but
    not limited to, construction, renovation, or purchase of facilities and equipment.

    (B) A description of the enrollee population and composition, group and nongroup;

    (C) A summary of enrollee written complaints and their disposition;

    (D) A statement of the number of subscriber policies, contracts, certificates,
    and agreements that have been terminated by action of the health insuring corporation,
    including the number of enrollees affected;

    (E) A summary of the information compiled pursuant to division (A)(5) of section
    1751.04 of the Revised Code;

    (F) A current report of the names and addresses of the persons responsible for
    the conduct of the affairs of the health insuring corporation as required by section
    1751.03 of the Revised Code. Additionally, the report shall include the amount
    of wages, expense reimbursements, and other payments to these persons for services
    to the health insuring corporation, and shall include a full disclosure of the
    financial interests related to the operations of the health insuring corporation
    acquired by these persons during the preceding year.

    (G) An actuarial opinion in the form prescribed by the superintendent by rule;

    (H) Any other information relating to the performance of the health insuring corporation
    that is necessary to enable the superintendent to carry out the superintendent''s
    duties under this chapter.'
