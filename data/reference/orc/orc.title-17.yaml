- number: '1782.64'
  heading: Conversion to limited liability limited partnership
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A limited partnership may become a limited liability limited partnership
    by doing all of the following:

    (1) Obtaining approval of the terms and conditions of the limited partnership
    becoming a limited liability limited partnership by the vote necessary to amend
    the limited partnership agreement. When a limited partnership agreement expressly
    considers contribution obligations, the required vote is the vote necessary to
    amend those provisions.

    (2) Filing a statement of qualification under division (C) of section 1776.81
    of the Revised Code;

    (3) Complying with the name requirements of section 1776.82 of the Revised Code.

    (B) A limited liability limited partnership continues to be the same entity that
    existed before the filing of a statement of qualification under division (C) of
    section 1776.81 of the Revised Code.

    (C) Division (C) of section 1776.36 and division (B) of section 1776.37 of the
    Revised Code apply to both general and limited partners of a limited liability
    limited partnership.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.64
- number: '1782.65'
  heading: Persons performing services to partnership or partners
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) Absent an express agreement to the contrary, a person providing goods
    to or performing services for a domestic or foreign limited partnership owes no
    duty to, incurs no liability or obligation to, and is not in privity with the
    general partners, limited partners, or creditors of the limited partnership by
    reason of providing goods to or performing services for the limited partnership.

    (B) Absent an express agreement to the contrary, a person providing goods to or
    performing services for a general or limited partner or a group of general or
    limited partners of a limited domestic or foreign limited partnership owes no
    duty to, incurs no liability or obligation to, and is not in privity with the
    limited partnership, any other general or limited partners of the limited partnership,
    or the creditors of the limited partnership by reason of providing goods to or
    performing services for the general or limited partner or group of general or
    limited partners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.65
- number: '1783.01'
  heading: Limited partnership associations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1783'
    name: Limited Partnership Associations
  text: 'When any number of persons, not less than three nor more than twenty-five,
    desire to form a limited partnership association for the purpose of conducting
    any business or occupation within the United States or elsewhere, except for dealing
    in real estate or for banking, whose principal office or place of business will
    be established and maintained in this state, by subscribing and contributing capital
    to such association, which capital shall alone be liable for its debts, such persons
    may sign and acknowledge a statement, in writing, before some officer competent
    to take the acknowledgment of deeds, in which must be set forth the full names
    of such persons; the amount of capital subscribed for by each; the total amount
    of capital, one third of which shall be paid within thirty days of the filing
    of their statement with the county recorder as provided in this section and two
    thirds of which shall be paid within twelve months thereafter; the character of
    the business to be conducted, and its location; the name of the association, with
    "limited" as part of it; the contemplated duration of the association, which in
    no case shall exceed twenty years; and the names of the officers of the association,
    selected in conformity with sections 1783.01 to 1783.12, inclusive, of the Revised
    Code. Any amendment of such statement shall be made only in like manner. Such
    statement and amendments must be recorded in the office of the county recorder
    of the proper county.

    Such association shall not loan its credit, its name, or its capital to any person
    or corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1783.01
- number: '1783.02'
  heading: Name of firm
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1783'
    name: Limited Partnership Associations
  text: '"Limited" shall be the last word of the name of every limited partnership
    association formed under sections 1783.01 to 1783.12, inclusive, of the Revised
    Code. Every such association must paint or affix, and keep painted or affixed,
    its name on the outside of every office or place in which its business is carried
    on, in a conspicuous position and in letters easily legible, and must have its
    full name mentioned in legible characters in all notices, advertisements, and
    other of its official publications, and in all bills of exchange, promissory notes,
    checks, orders for money, bills of lading, invoices, receipts, letters, and other
    writings used in the transaction of its business.

    The omission of "limited," in the use of the name of the association, shall render
    every person participating in such omission, or knowingly acquiescing therein,
    liable for any indebtedness or liabilities arising therefrom.'
