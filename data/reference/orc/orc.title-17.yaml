- number: '1726.07'
  heading: Number of votes
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: Each shareholder shall have one vote, in person or by proxy, for each share
    of capital stock held by him, and each member shall have one vote, in person or
    by proxy, except that any member having a loan limit of more than one thousand
    dollars shall have one additional vote, in person or by proxy, for each additional
    one thousand dollars which such member is authorized to have outstanding on loans
    to a corporation incorporated under Chapter 1726. of the Revised Code at any one
    time as determined under division (C) of section 1726.06 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.07
- number: '1726.08'
  heading: Board of directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: 'The board of directors of a corporation incorporated under Chapter 1726.
    of the Revised Code shall be of such number in multiples of three as shall be
    determined in the first instance by the incorporators and thereafter by the shareholders
    and shall be elected in the first instance by the incorporators, and thereafter
    at each annual meeting of the corporation, or, if no annual meeting is held in
    any year at the time fixed by the bylaws, at a special meeting held in lieu thereof,
    the members of the corporation shall elect two-thirds of the board of directors
    and the shareholders shall elect the remaining directors. The directors shall
    hold office until the next annual meeting of the corporation or special meeting
    held in lieu of the annual meeting after their election, and until their successors
    are elected and qualified unless sooner removed in accordance with the provisions
    of the bylaws.

    Any vacancy in the office of a director elected by the members shall be filled
    by the directors elected by the members, and any vacancy in the office of a director
    elected by the shareholders shall be filled by the directors elected by the shareholders.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.08
- number: '1726.09'
  heading: Net earnings, surplus
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: Each year a corporation incorporated under Chapter 1726. of the Revised Code
    shall set apart as earned surplus not less than ten per cent of its net earnings
    for the preceding fiscal year until such surplus is equal in value to one-half
    of the amount paid in on the shares of the corporation then outstanding. Whenever
    the amount of such surplus becomes impaired, it shall be built up again to the
    required amount in the manner provided for its original accumulation. Net earnings
    and surplus shall be determined by the board of directors, after providing for
    such reserves as said directors deemed desirable, and the directors' determination
    made in good faith shall be conclusive on all persons.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.09
- number: '1726.10'
  heading: Designation of depository
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: A corporation incorporated under Chapter 1726. of the Revised Code shall not
    deposit any of its funds in any banking institution unless such institution has
    been designated as a depository by a vote of a majority of the directors present
    at an authorized meeting of the board of directors, exclusive of any director
    who is an officer or director of the depository so designated. The corporation
    shall not receive money on deposit.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.10
- number: '1726.11'
  heading: Annual financial reports - audits
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: 'Each development corporation incorporated under this chapter shall prepare
    an annual financial report that conforms to rules prescribed by the auditor of
    state pursuant to section 117.20 of the Revised Code, that is prepared according
    to generally accepted accounting principles, and that is certified by the board
    of trustees of the corporation or its treasurer or other chief fiscal officer.
    The financial report shall be filed with the auditor of state within one hundred
    twenty days following the last day of the corporation''s fiscal year, unless the
    auditor of state extends that deadline. The auditor of state may establish terms
    and conditions for granting any extension of that deadline.

    Each development corporation shall submit to audits by the auditor of state, the
    scope and frequency of which shall be in accordance with section 117.11 of the
    Revised Code as if the corporation were a public office subject to that section.
    However, a development corporation may request in accordance with section 117.115
    of the Revised Code, as if the corporation were a public office subject to that
    section, the performance of any of those audits by an independent certified public
    accountant.

    The auditor of state is authorized to receive and file the annual financial reports
    required by this section and the reports of all audits performed in accordance
    with this section. The auditor of state shall analyze those annual financial reports
    and the reports of those audits to determine whether the activities of the development
    corporation involved are in accordance with this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.11
- number: '1726.12'
  heading: Cancellation of articles of incorporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: If any development corporation fails to prepare an annual financial report
    as required by section 1726.11 of the Revised Code and to file that report with
    the auditor of state within ninety days of the time prescribed for that filing
    by that section, or if the auditor of state determines by applying the standards
    applicable to a public office under section 117.41 of the Revised Code that any
    development corporation cannot be audited and declares it to be unauditable and
    the corporation fails to then prepare an annual financial report as required by
    section 1726.11 of the Revised Code and to file that report with the auditor of
    state within ninety days of the time that the auditor of state declared the corporation
    to be unauditable, or if any annual financial report discloses that any development
    corporation has failed to begin business for a period of three years from the
    effective date of the filing of its articles of incorporation, the auditor of
    state shall certify that fact to the secretary of state. The secretary of state
    then shall cancel the articles of the development corporation involved by appropriate
    entry upon the margin of the record of the articles. All the powers, privileges,
    and franchises conferred upon that development corporation by those articles of
    incorporation then shall cease. The secretary of state shall immediately notify
    that development corporation of the action taken.
