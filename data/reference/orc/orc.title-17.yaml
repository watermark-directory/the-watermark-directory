    name: Ohio Revised Limited Liability Company Act
  text: A series may be dissolved and its activities and affairs may be wound up without
    causing the dissolution of the limited liability company. The dissolution and
    winding up of a series does not abate, suspend, or otherwise affect the limitation
    on liabilities of the series provided by section 1706.761 of the Revised Code.
  history: null
