- number: '1702.02'
  heading: Notice requirements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Unless another form of notice is required by the articles, the regulations,
    the bylaws, or by applicable law, any notice required by this chapter shall be
    in writing and shall be delivered personally or sent by telegram, by the use of
    authorized communications equipment, or by United States mail, express mail, or
    courier service, with postage or fees prepaid.

    (B) In computing the period of time for the giving of a notice required or permitted
    under this chapter, or under the articles, the regulations, or the bylaws of a
    corporation, or a resolution of its members or directors, the day on which the
    notice is given shall be excluded, and the day when the act for which notice is
    given is to be done shall be included, unless the instrument calling for the notice
    otherwise provides. If notice is given by personal delivery or transmitted by
    telegram or by the use of authorized communications equipment, the notice shall
    be deemed to have been given when delivered or transmitted. If notice is sent
    by United States mail, express mail, or courier service, the notice shall be deemed
    to have been given when deposited in the mail or with the courier service.

    (C) A written notice or report delivered as part of a newsletter, magazine, or
    other publication regularly sent to members shall constitute a written notice
    or report if addressed or delivered to the member''s address shown in the corporation''s
    current list of members, or, in the case of members who are residents of the same
    household and who have the same address in the corporation''s current list of
    members, if addressed or delivered to one of those members at the address appearing
    on the corporation''s current list of members.'
