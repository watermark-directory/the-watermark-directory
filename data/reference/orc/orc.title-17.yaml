- number: '1782.60'
  heading: Application and construction of chapter
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) This chapter shall be applied and construed to effectuate its general
    purpose to make uniform the law with respect to the subject of this chapter among
    states enacting the Uniform Limited Partnership Act (1985), national conference
    of commissioners on uniform state laws, except to the extent that the provisions
    of this chapter differ from those of that uniform act.

    (B) In any case not provided for in this chapter, the provisions of Chapter 1775.
    or 1776. of the Revised Code govern.'
