- number: '1707.24'
  heading: Contempt proceedings
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: In case any person fails to file any statement or report, to obey any subpoena,
    to give testimony, to answer questions, or to produce any books, records, or papers
    as required by the division of securities under sections 1707.01 to 1707.50, inclusive,
    of the Revised Code, the court of common pleas of any county in the state, upon
    application made to it by the division and upon proof made to it by the division
    of such failure, may make an order awarding process of subpoena or subpoena duces
    tecum for such person to appear and testify before the division, and may order
    any person to give testimony and answer questions, and to produce books, records,
    or papers, as required by the division. Upon the filing of such order in the office
    of the clerk of the court of common pleas, said clerk, under the seal of said
    court, shall issue process of subpoena for such person to appear before the division
    at a time and place named in such subpoena, and thereafter from day to day until
    the examination of such person is completed. Such subpoena may contain a direction
    that such witness bring with the witness to such examination any books, records,
    or papers mentioned in such subpoena. Said clerk shall also issue, under the seal
    of said court, such other orders, in reference to such examination, appearance,
    and production of books, records, or papers, as said court directs. If any person
    so summoned by subpoena fails to obey such subpoena, to give testimony, to answer
    questions as required, to produce any books, records, or papers so required, or
    to obey an order of the court, the court, on motion supported by proof, may order
    an attachment for contempt to be issued against the person charged with disobedience
    of any order or injunction issued by such court under sections 1707.01 to 1707.50,
    inclusive, of the Revised Code. If such person is brought before the court by
    virtue of said attachment, and if upon a hearing such disobedience appears, such
    court may order such offender to be committed and kept in close custody.
