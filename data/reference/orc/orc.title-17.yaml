- number: '1753.13'
  heading: Obtaining covered obstetric and gynecological services without referral
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1753'
    name: Physician-health Plan Partnership Act; Risk-based Capital For Insurers Model
      Act
  text: 'Every individual or group health insuring corporation policy, contract, or
    agreement that provides basic health care services but does not allow direct access
    to obstetricians or gynecologists shall permit a female enrollee to obtain covered
    obstetric and gynecological services from a participating obstetrician or gynecologist
    without obtaining a referral from the enrollee''s primary care provider.

    No individual or group health insuring corporation policy, contract, or agreement
    may limit the number of allowable visits to a participating obstetrician or gynecologist.
    A health insuring corporation may require a participating obstetrician or gynecologist
    to comply with the health insuring corporation''s coverage protocols and procedures,
    including utilization review, for obstetric and gynecological services.

    A health insuring corporation policy, contract, or agreement may not impose additional
    copayments for directly accessed obstetric and gynecological services, unless
    the policy, contract, or agreement imposes additional copayments for direct access
    to any participating provider other than a primary care provider.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1753.13
- number: '1753.14'
  heading: Procedures for standing referrals to specialists
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1753'
    name: Physician-health Plan Partnership Act; Risk-based Capital For Insurers Model
      Act
  text: '(A) A health insuring corporation that does not allow direct access to all
    specialists shall establish and implement a procedure by which an enrollee may
    receive a standing referral to a specialist. The procedure shall provide for a
    standing referral to a specialist if a primary care provider determines in consultation
    with a specialist that an enrollee needs continuing care from a specialist. The
    referral shall be made pursuant to a treatment plan approved by the health insuring
    corporation in consultation with the primary care provider, a specialist, and
    the enrollee. The treatment plan may limit the number of visits to the specialist,
    limit the period of time that the visits are authorized, or require that the specialist
    provide the primary care provider with regular reports on the health care provided
    to the enrollee.

    (B) A health insuring corporation shall establish and implement a procedure by
    which an enrollee with a condition or disease that requires specialized medical
    care over a prolonged period of time and is life-threatening, degenerative, or
    disabling may receive a referral to a specialist who has expertise in treating
    the condition or disease for the purpose of having the specialist coordinate the
    enrollee''s health care. The procedure shall provide for such a referral if a
    primary care provider determines in consultation with the specialist that the
    enrollee needs the specialist''s expertise. The referral shall be made pursuant
    to a treatment plan approved by the health insuring corporation in consultation
    with the primary care provider, the specialist, and the enrollee. After the referral
    is made, the specialist is authorized to provide health care services to the enrollee
    in the same manner as the enrollee''s primary care provider, subject to the terms
    of the treatment plan.

    (C) The determinations described in divisions (A) and (B) of this section shall
    be made within three business days after a request for the determination is made
    by the enrollee or the enrollee''s primary care provider and all appropriate medical
    records and other items of information necessary to make the determination have
    been provided.

    (D) Once a determination in favor of a referral is made, the referral shall be
    made within four business days after the determination. This time period does
    not apply to standing referrals involving a rare or unusual condition for which
    appropriate specialists are limited in number or otherwise difficult to identify.

    Divisions (A) and (B) of this section do not require a health insuring corporation
    to permit an enrollee to elect referral to a specialist who is not employed by
    or under contract with the health insuring corporation for the provision of health
    care services to the health insuring corporation''s enrollees.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1753.14
- number: '1753.16'
  heading: Retroactively denying authorization
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1753'
    name: Physician-health Plan Partnership Act; Risk-based Capital For Insurers Model
      Act
  text: A health insuring corporation or utilization review organization that authorizes
    a proposed admission, treatment, or health care service by a participating provider
    based upon the complete and accurate submission of all necessary information relative
    to an eligible enrollee shall not retroactively deny this authorization if the
    provider renders the health care service in good faith and pursuant to the authorization
    and all of the terms and conditions of the provider's contract with the health
    insuring corporation.
  history: null
