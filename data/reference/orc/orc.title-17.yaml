- number: '1716.14'
  heading: Prohibited acts and practices - noncomplying solicitation is a nuisance
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A) The following acts and practices are hereby prohibited and declared unlawful
    as applied to the planning, conducting, or executing of any solicitation of contributions
    for a charitable organization or charitable purpose or to the planning, conducting,
    or executing of a charitable sales promotion:

    (1) Committing any deceptive act or practice;

    (2) Misleading any person as to any material fact concerning the solicitation
    of contributions for a charitable organization or charitable purpose or concerning
    a charitable sales promotion;

    (3) Using any representation that implies that the contribution is for or on behalf
    of a charitable organization, or using any emblem, device, or printed matter belonging
    to or associated with a charitable organization, without first having been authorized
    in writing to do so by the charitable organization;

    (4) Using a name, symbol, or statement that is so closely related or similar to
    that used by another charitable organization, public official, or public agency
    in such a manner that the use of the name, symbol, or statement tends to confuse
    or mislead a person being solicited for contributions, except that the name, symbol,
    or statement may be used if written permission is obtained from the other charitable
    organization, public official, or public agency and filed with the attorney general
    prior to any solicitation for a charitable purpose or prior to engaging in any
    charitable sales promotion;

    (5) Misleading any person in any manner in the belief, or making or using any
    representation to any person that implies, that the organization on whose behalf
    a solicitation or charitable sales promotion is being conducted is a charitable
    organization or that the proceeds of the solicitation or charitable sales promotion
    will be used for a charitable purpose if either of those is not the fact;

    (6) Misleading any person in any manner in the belief, or making or using any
    representation to any person that implies, that any other person sponsors, endorses,
    or approves of the solicitation or charitable sales promotion when that other
    person has not given its consent in writing to that representation or to the use
    of its name for any of those purposes;

    (7) Using or exploiting the fact of registration in such a manner as to lead any
    person to believe that the registration in any manner constitutes an endorsement
    or approval by the state;

    (8) Representing directly or by implication that a charitable organization will
    receive a fixed or estimated percentage of the gross revenue from a solicitation
    campaign that is greater than that set forth in the contract filed with the attorney
    general pursuant to section 1716.08 of the Revised Code, or that a charitable
    organization will receive an actual or estimated dollar amount or percentage per
    unit of goods or services purchased or used in a charitable sales promotion, that
    is greater than that agreed to by the commercial co-venturer and the charitable
    organization pursuant to section 1716.09 of the Revised Code;

    (9) Filing false or misleading information in any document required to be filed
    with the attorney general under this chapter;

    (10) Filing false or misleading information in response to a request from the
    attorney general under section 1716.15 of the Revised Code;

    (11) Failing to provide complete and timely payment to a charitable organization
    of the proceeds from a solicitation campaign or a charitable sales promotion;

    (12) Initiating an outbound telephone call that delivers a prerecorded message
    in violation of 16 C.F.R. 310.4(b)(1)(v);

    (13) Operating in violation of, or failing to comply with, any of the requirements
    of this chapter or any rule adopted under this chapter.

    (B) The act of soliciting contributions for any charitable organization or charitable
    purpose or engaging in a charitable sales promotion without complying with the
    requirements of this chapter or any rule adopted pursuant to this chapter, is
    a nuisance.'
