- number: '1761.26'
  heading: Criminal records check to be requested by superintendent
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: Whenever the approval of the superintendent of credit unions is required under
    this chapter, or under an order or supervisory action issued or taken under this
    chapter, for a person to serve as an organizer, incorporator, director, or executive
    officer of a credit union share guaranty corporation, or to otherwise participate
    in the management of such a corporation, the superintendent shall request the
    superintendent of the bureau of criminal identification and investigation, or
    a vendor approved by the bureau, to conduct a criminal records check based on
    the person's fingerprints in accordance with section 109.572 of the Revised Code.
    The superintendent of credit unions shall request that criminal record information
    from the federal bureau of investigation be obtained as part of the criminal records
    check. Any fee required under division (C)(3) of section 109.572 of the Revised
    Code shall be paid by the person who is the subject of the request.
