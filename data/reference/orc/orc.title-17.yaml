- number: '1707.22'
  heading: Appeals - effect of order
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'Whenever a dealer''s, salesperson''s, investment adviser''s, investment adviser
    representative''s, bureau of workers'' compensation chief investment officer''s,
    or state retirement system investment officer''s license has been refused, suspended,
    or revoked, or a renewal thereof has been denied, by the division of securities,
    or whenever the division has refused to qualify securities or has suspended or
    revoked the registration of any particular security by description or by qualification,
    or the right to buy, sell, or deal in any particular security whether it is registered
    or qualified or exempt, or whether the transactions in it are registered or exempt,
    the aggrieved party may appeal in accordance with Chapter 119. of the Revised
    Code.

    An order sustaining the refusal of the division to grant or renew a dealer''s,
    salesperson''s, investment adviser''s, investment adviser representative''s, bureau
    of workers'' compensation chief investment officer''s, or state retirement system
    investment officer''s license or to grant qualification of securities, or an order
    sustaining the division in suspending or revoking a dealer''s, salesperson''s,
    investment adviser''s, investment adviser representative''s, bureau of workers''
    compensation chief investment officer''s, or state retirement system investment
    officer''s license, the registration of any particular security by description
    or by qualification, or the right to buy, sell, or deal in any particular security,
    shall not bar, after ten days from the order, a new registration by description,
    or a new application of the plaintiff for such a license or qualification or for
    a withdrawal of a revocation or suspension; nor shall an order in favor of the
    plaintiff prevent the division, after proper notice and hearing, from thereafter
    revoking or suspending such license, registration, or right to buy, sell, or deal
    in a particular security, for any proper cause which may, after the order, accrue
    or be discovered.'
