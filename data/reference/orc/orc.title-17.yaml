- number: '1707.201'
  heading: Federal provisions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'Notwithstanding any provision of the Revised Code, if the "Securities Act
    of 1933," the "Securities Exchange Act of 1934," the "Investment Company Act of
    1940," the "Investment Advisers Act of 1940," and any amendments to any of those
    federal acts, if any rule, regulation, release, statement, or position promulgated
    or adopted under the authority of any of those federal acts, and any amendments
    to those federal acts, or if any rule, regulation, or guideline of a self-regulatory
    organization registered under the "Securities Exchange Act of 1934," and any amendments
    to that act, contains a provision that is not contained in this chapter or the
    rules adopted under this chapter and that affects any matter within the scope
    of this chapter, the division of securities by rule may promulgate a similar provision.

    A rule adopted under the authority granted in this section becomes effective on
    the later of the date on which the division issues the rule or the date on which
    the federal statute or the rule, regulation, release, statement, or position on
    which the division''s rule is based becomes effective. The division, upon thirty
    days'' written notice, may revoke any rule adopted under the authority granted
    in this section. A rule adopted under the authority granted in this section, and
    not revoked by the commissioner of securities, lapses and has no further force
    and effect eighteen months after the rule''s effective date.'
