  chapter:
    num: '1724'
    name: Community Improvement Corporations
  text: Any corporation organized prior to August 17, 1961 and having similar purposes
    may be brought under Chapter 1724. of the Revised Code by the required vote of
    its members or shareholders adopting amended articles of incorporation. Said amended
    articles of incorporation shall provide for a change in the corporate title and
    powers in conformity with Chapter 1724. of the Revised Code and shall contain
    a statement that the amended articles supersede the existing articles of incorporation.
    In the case of any corporation organized with shares of stock, the amended articles
    of incorporation shall also provide for the cancellation of all outstanding shares
    and the terms and considerations, if any, for such cancellation.
