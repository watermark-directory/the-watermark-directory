- number: '1723.05'
  heading: Functions of hydraulic company
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1723'
    name: Appropriation Of Property By Certain Corporations
  text: A company described in section 1723.01 of the Revised Code may transport,
    store, insure, and ship natural gas, petroleum, coal or its derivatives, or water,
    and may transport and store water for the purpose of furnishing it to engineers
    employed in developing for petroleum, or to engineers employed in the production
    and transportation of petroleum; and for such purpose such company may lay down,
    construct, and maintain the necessary pipes, tubing, tanks, machinery, and arrangements.
