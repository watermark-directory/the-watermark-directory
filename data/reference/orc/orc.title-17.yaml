  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.05
- number: '1709.06'
  heading: Effect of designation of transfer-on-death
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: The designation of a transfer-on-death beneficiary on a registration in beneficiary
    form has no effect on ownership until the death of the owner of a security. A
    registration in beneficiary form of a security may be canceled or changed at any
    time by the sole owner or all of the then surviving owners of the security, without
    the consent of the beneficiary.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.06
- number: '1709.07'
  heading: Death of sole owner or last to die of all multiple owners
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: Subject to the limitations of section 5731.39 of the Revised Code, on the
    death of a sole owner or the last to die of all multiple owners, ownership of
    a security registered in beneficiary form shall pass to the beneficiary or beneficiaries
    who survived all owners. On proof of death of all owners and compliance with any
    applicable requirements of the registering entity, but subject to the limitations
    of section 5731.39 of the Revised Code, a security registered in beneficiary form
    may be reregistered in the name of the beneficiary or beneficiaries who survived
    the death of all owners. Until division of the security after the death of all
    owners, multiple beneficiaries surviving the death of all owners hold their interests
    as tenants in common. If no beneficiary survives the death of all owners, the
    security shall be included in the estate of the deceased sole owner of it or the
    estate of the last to die of all multiple owners of it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.07
- number: '1709.08'
  heading: Registering entity
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: '(A) A registering entity is not required to offer or to accept requests for
    security registration in beneficiary form. If a registration in beneficiary form
    is offered by a registering entity, the owner requesting registration in beneficiary
    form assents to the protections given to the registering entity by sections 1709.01
    to 1709.11 of the Revised Code.

    (B) By accepting a request for registration in beneficiary form of a security,
    a registering entity agrees that the registration will be implemented as provided
    in sections 1709.01 to 1709.11 of the Revised Code.

    (C) A registering entity is discharged from all claims to a security by the estate,
    creditors, heirs, or devisees of a deceased owner if it registers a transfer of
    a security in accordance with section 1709.07 of the Revised Code and does so
    in a good faith reliance on the registration, on sections 1709.01 to 1709.11 of
    the Revised Code, and on information provided to it by an affidavit of the personal
    representative of the deceased owner or by the surviving beneficiary or the representatives
    of the surviving beneficiary or on other information available to the registering
    entity. The protections of sections 1709.01 to 1709.11 of the Revised Code do
    not extend to a reregistration or payment made after a registering entity has
    received a written notice from any claimant to any interest in the security that
    objects to the implementation of a registration in beneficiary form. No other
    notice or other information available to the registering entity shall affect its
    right to protection under sections 1709.01 to 1709.11 of the Revised Code.

    (D) The protection provided by sections 1709.01 to 1709.11 of the Revised Code
    to the registering entity of a security does not affect the rights of beneficiaries
    in disputes between themselves and other claimants to ownership of the security
    transferred or its value or proceeds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.08
- number: '1709.09'
  heading: Transfer-on-death is not testamentary
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: '(A) Any transfer-on-death resulting from a registration in beneficiary form
    is effective by reason of the contract regarding the registration between the
    owner of the security and the registering entity and by reason of sections 1709.01
    to 1709.11 of the Revised Code and is not testamentary.

    (B) Sections 1709.01 to 1709.11 of the Revised Code do not limit the rights of
    creditors of the owners of securities against beneficiaries and other transferees
    under other laws of this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.09
- number: '1709.10'
  heading: Establish terms and conditions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: '(A) A registering entity offering to accept registrations in beneficiary
    form may establish the terms and conditions under which it will receive and implement
    requests for registration in that form, including requests for cancellation of
    previously registered transfer-on-death beneficiary designations and requests
    for reregistration to effect a change of beneficiary. The terms and conditions
    so established may provide for proving death, avoiding or resolving any problems
    concerning fractional shares, designating primary and contingent beneficiaries,
    and substituting descendants of a named beneficiary to take in place of the named
    beneficiary when he dies.

    (B) Substitution may be indicated by appending to the name of the primary beneficiary
    the letters "LDPS," standing for lineal descendants per stirpes. This designation
    substitutes the descendants of a deceased beneficiary who survive the owner of
    a security for a beneficiary who fails to so survive, the descendants to be identified
    and to share in accordance with the law of the domicile of the beneficiary, at
    the time of the death of the owner, governing inheritance by descendants of an
    intestate.

    (C) Other forms of identifying beneficiaries who are to take on one or more contingencies,
    and rules for providing proofs and assurances needed to satisfy reasonable concerns
    by registering entities regarding conditions and identities relevant to accurate
    implementation of registrations in beneficiary form, may be contained in the terms
    and conditions of a registering entity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.10
- number: '1709.11'
  heading: Uniform Transfer-on-Death Security Registration Act
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: '(A) Sections 1709.01 to 1709.11 of the Revised Code shall be known as and
    may be cited as the "uniform transfer-on-death security registration act."

    (B) Sections 1709.01 to 1709.11 of the Revised Code shall be liberally construed
    and applied to promote their underlying purposes and policy and to make uniform
    the laws with respect to the subject of those sections among states enacting similar
    laws.

    (C) Unless displaced by particular provisions of sections 1709.01 to 1709.11 of
    the Revised Code, the principles of law and equity supplement their provisions.

    (D) Sections 1709.01 to 1709.11 of the Revised Code apply to registrations of
    securities in beneficiary form made prior to, on, or after the effective date
    of this section, by decedents dying prior to, on, or after that date.'
