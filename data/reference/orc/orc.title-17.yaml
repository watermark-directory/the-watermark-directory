- number: '1701.67'
  heading: Using facsimile signatures
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: When any note, bond, or other evidence of indebtedness of a corporation is
    authenticated or countersigned by an incorporated trustee, the signature of any
    officer of the corporation authorized to sign any such instrument may be facsimile,
    engraved, stamped, or printed. Although any officer of the corporation whose manual
    or facsimile signature is affixed to any such instrument ceases to be such officer
    before the instrument is delivered, such instrument nevertheless shall be effective
    in all respects when delivered.
  history: null
