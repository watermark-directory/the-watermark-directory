    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: Any business trust may be a party, with one or more other entities, to an
    agreement of merger, consolidation, or sale, or other disposition of all or substantially
    all of its assets, provided that the agreement of merger, consolidation, or sale,
    or other disposition is approved in the manner set forth in the trust instrument
    or, if the trust instrument contains no procedure for such approval, by the holders
    of a majority of the shares of the business trust at a meeting held for such purpose.
