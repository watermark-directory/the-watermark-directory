- number: '1706.62'
  heading: Member suit against other members
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) Subject to division (B) of this section, a member may maintain a direct
    action against another member or members or the limited liability company, or
    a series thereof, to enforce the member''s rights and otherwise protect the member''s
    interests, including rights and interests under the operating agreement or this
    chapter or arising independently of the membership relationship.

    (B) A member maintaining a direct action under division (A) of this section must
    plead and prove an actual or threatened injury that is not solely the result of
    an injury suffered or threatened to be suffered by the limited liability company,
    or series thereof.

    (C)(1) A member may maintain a direct action to enforce a right of a limited liability
    company if all members at the time of suit are parties to the action.

    (2) A member associated with a series may maintain a direct action to enforce
    a right of the series if all members associated with the series at the time of
    suit are parties to the action.'
