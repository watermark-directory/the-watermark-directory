    name: Foreign Corporations
  text: A foreign corporation holding an unexpired and uncanceled license under sections
    1703.01 to 1703.31, inclusive, of the Revised Code, shall not be subject to process
    of attachment under any law of this state on the ground that it is a foreign corporation
    nonresident of this state.
