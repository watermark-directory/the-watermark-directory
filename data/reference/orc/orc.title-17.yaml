- number: '1707.36'
  heading: Attorney-inspector - control-bid attorneys
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) There is hereby created in the division of securities a position to be
    known as attorney-inspector, which shall be held only by an attorney at law. The
    duties of this position are to investigate and report upon all complaints and
    alleged violations of this chapter or rules adopted under this chapter by the
    division and to represent the division in prosecutions and other matters arising
    from such complaints and alleged violations.

    The office of the attorney-inspector is hereby designated a criminal justice agency
    in investigating reported violations of law relating to securities and investment
    advice, and as such is authorized by this state to apply for access to the computerized
    databases administered by the national crime information center or the law enforcement
    automated data system in Ohio, and to other computerized databases administered
    for the purpose of making criminal justice information accessible to state criminal
    justice agencies.

    (B) There is hereby created in the division of securities two positions to be
    known as control-bid attorneys, which shall be held only by attorneys at law.
    The duties of these positions are to investigate and report upon all matters relating
    to control-bids and related matters and to represent the division in the regulatory
    matters arising under the Ohio control-bid law.

    (C) The attorney-inspector and each control-bid attorney shall be paid at a rate
    not less than pay range 47 set out in schedule E-2 of section 124.152 of the Revised
    Code, to be paid as other operating expenses of the division.'
