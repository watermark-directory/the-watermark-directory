- number: '1701.041'
  heading: Exemptions for disaster workers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) As used in this section, "critical infrastructure," "disaster response
    period," "disaster work," a nd "qualifying employee" have the same meanings as
    in section 5703.94 of the Revised Code.

    (B) No person shall be required to file articles of incorporation or any other
    documents or applications with the secretary of state as established in sections
    111.16, 1329.01, 1701.04, or elsewhere in the Revised Code or otherwise comply
    with the requirements of Title XVII of the Revised Code as a condition precedent
    to engaging in business in this state for any of the following activities:

    (1) Disaster work performed in this state by an out-of- state disaster business
    during a disaster response period pursuant to a qualifying solicitation received
    by the business;

    (2) Disaster work performed in this state by a qualifying employee described in
    division (A)(14)(a) of section 5703.94 of the Revised Code during a disaster response
    period pursuant to a qualifying solicitation received by the employee''s employer;

    (3) Disaster work performed in this state by a qualifying employee described in
    division (A) (14)(b) of section 5703.94 of the Revised Code during a disaster
    response period on critical infrastructure owned or used by the employee''s employer.'
