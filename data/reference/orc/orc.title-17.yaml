- number: '1703.26'
  heading: Appeals
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: A foreign corporation licensed before the effective date of this amendment
    and having authority on that date to transact business in this state may appeal
    from any decision, finding, determination, or action by the secretary of state
    under sections 1703.01 to 1703.31 of the Revised Code, to a board of review consisting
    of the auditor of state, the treasurer of state, and the attorney general, or
    their authorized representatives, by filing notice of such appeal with the auditor
    of state. The auditor of state shall thereupon notify the corporation of the date
    of the hearing before the board at least ten days prior to the date of the hearing,
    and at the hearing the corporation shall be entitled to be heard. The decision
    of a majority of the members of the board shall be final. The decision shall be
    in writing and shall be transmitted to the secretary of state. The secretary of
    state shall thereupon mail to the corporation a copy of the decision.
