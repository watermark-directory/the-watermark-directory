    name: Nonprofit Corporation Law
  text: No person shall exercise or attempt to exercise any rights, privileges, immunities,
    powers, franchises, or authority under the articles of a domestic corporation
    after such articles have been canceled or after such corporation has been dissolved
    or after the period of existence of the corporation specified in its articles
    has expired, except such acts as are incident to the winding up of the affairs
    of such corporation, or are required to obtain reinstatement of the articles in
    accordance with section 1702.06, 1702.59, or 1724.06 of the Revised Code, or are
    permitted upon reinstatement by division (C) of section 1702.60 of the Revised
    Code.
