- number: '1703.07'
  heading: Certificate of merger or consolidation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: 'If a foreign corporation has merged or consolidated with one or more foreign
    corporations, it shall file with the secretary of state a certificate setting
    forth the fact of merger or consolidation, certified by the secretary of state,
    or other proper official, of the state under the laws of which the foreign corporation
    was incorporated.

    The secretary of state, before filing a certificate evidencing a foreign corporation''s
    merger or consolidation, shall charge and collect from the foreign corporation
    a filing fee as required by section 111.16 of the Revised Code.'
