- number: '1711.12'
  heading: Certain activities forbidden
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: During an Ohio state fair or county or independent agricultural society fair,
    no person shall cry, hawk, sell, or expose for sale any merchandise except the
    official fair or race program upon any public road at any point within one thousand
    feet of any entrance or exit of the fairground or, within the fairground, engage
    in any solicitation more than four feet from a concession or booth assigned to
    such person, except that vendors under contract may solicit within the immediate
    area of a grandstand or coliseum for the purpose of vending food, soft drinks,
    and souvenirs directly related to the program attraction.
  history: null
