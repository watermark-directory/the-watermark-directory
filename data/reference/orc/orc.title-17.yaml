  url: https://codes.ohio.gov/ohio-revised-code/section-1701.911
- number: '1701.92'
  heading: Certified copies as evidence of incorporation, articles and proceedings
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) A copy of the articles or amended articles filed in the office of the
    secretary of state, certified by the secretary of state, shall be conclusive evidence,
    except as against the state, that the corporation has been incorporated under
    the laws of this state. A copy duly certified by the secretary of state of any
    certificate of amendment or other certificate filed in the secretary of state''s
    office shall be prima-facie evidence of the amendment or of the facts stated in
    any such certificate and of the observance and performance of all antecedent conditions
    necessary to the action which such certificate purports to evidence.

    (B) A copy of amended articles filed in the office of the secretary of state,
    certified by the secretary of state, shall be accepted in this state and other
    jurisdictions in lieu of the original articles, amendments thereto, and prior
    amended articles.

    (C) The original or a copy of the record of minutes of the proceedings of the
    incorporators of a corporation, or of the proceedings or meetings of the shareholders
    or any class of shareholders, or of the directors, or of any committee thereof,
    including any written consent, waiver, release, or agreement entered in the record
    of minutes, or the original or a copy of a statement that no specified proceeding
    was had or that no specified consent, waiver, release, or agreement exists, shall,
    when certified to be true by the secretary or an assistant secretary of a corporation,
    be received in the courts as prima-facie evidence of the facts stated therein.
    Every meeting referred to in the certified original or copy shall be deemed duly
    called and held, all motions and resolutions adopted and proceedings had at such
    meeting shall be deemed duly adopted and had, and all elections of directors and
    all elections or appointments of officers chosen at such meeting shall be deemed
    valid, until the contrary is proved. Whenever a person who is not a shareholder
    of a corporation has acted in good faith in reliance upon any certified original
    or copy, it is conclusive in the person''s favor.

    (D) A certificate issued by the secretary of state confirming that a corporation
    is in good standing, as defined in division (E) of this section, is, for seven
    days after the date on the certificate, conclusive evidence of both of the following:

    (1) The authority of a domestic corporation has not been limited as described
    in section 1701.88 or 1701.91 of the Revised Code, provided that both of the following
    apply:

    (a) The person relying on the certificate had no knowledge that the corporation''s
    articles had been canceled.

    (b) The certificate is not presented as evidence against the state.

    (2) The license authorizing a foreign corporation to transact business in this
    state has not expired, been cancelled, or been surrendered.

    (E) For purposes of division (D) of this section, "good standing" means that the
    authority of the corporation to carry on business is not limited by section 1701.88
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.92
- number: '1701.921'
  heading: Persons performing services to corporation or shareholders
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Absent an express agreement to the contrary, a person providing goods
    to or performing services for a domestic or foreign corporation owes no duty to,
    incurs no liability or obligation to, and is not in privity with the shareholders
    or creditors of the corporation by reason of providing goods to or performing
    services for the corporation.

    (B) Absent an express agreement to the contrary, a person providing goods to or
    performing services for a shareholder or group of shareholders of a domestic or
    foreign corporation owes no duty to, incurs no liability or obligation to, and
    is not in privity with the corporation, any other shareholders of the corporation,
    or the creditors of the corporation by reason of providing goods to or performing
    services for the shareholder or group of shareholders.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.921
- number: '1701.922'
  heading: Restoring rights, privileges and franchises upon reinstatement
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Except as otherwise provided in this division, upon reinstatement of
    a corporation''s or professional association''s articles of incorporation in accordance
    with section 1701.07, 1785.06, 5703.93, or 5733.22 of the Revised Code, the rights,
    privileges, and franchises, including all real or personal property rights and
    credits and all contract and other rights, of the corporation or association existing
    at the time its articles of incorporation were canceled shall be fully vested
    in the corporation or association as if the articles had not been canceled, and
    the corporation or association shall again be entitled to exercise the rights,
    privileges, and franchises authorized by its articles of incorporation. The name
    of a corporation whose articles have been canceled shall be reserved for a period
    of one year after the date of cancellation. If the reinstatement is not made within
    one year after the date of the cancellation of its articles of incorporation and
    it appears that a corporate name, limited liability company name, limited liability
    partnership name, limited partnership name, or trade name has been filed, the
    name of which is not distinguishable upon the record as provided in section 1701.05
    of the Revised Code, the secretary of state shall require the applicant for reinstatement,
    as a condition prerequisite to such reinstatement, to amend its articles by changing
    its name.

    (B) Upon reinstatement of a corporation''s or association''s articles in accordance
    with section 1701.07, 1785.06, 5703.93, or 5733.22 of the Revised Code, both of
    the following apply to the exercise of or an attempt to exercise any rights, privileges,
    or franchises, including entering into or performing any contracts, on behalf
    of the corporation or association by an officer, agent, or employee of the corporation
    or association, after cancellation and prior to reinstatement of the articles
    of incorporation:

    (1) The exercise of or an attempt to exercise any rights, privileges, or franchises
    on behalf of the corporation or association by the officer, agent, or employee
    of the corporation or association has the same force and effect that the exercise
    of or an attempt to exercise the right, privilege, or franchise would have had
    if the corporation''s or association''s articles had not been canceled, if both
    of the following apply:

    (a) The exercise of or an attempt to exercise the right, privilege, or franchise
    was within the scope of the corporation''s or association''s articles of incorporation
    that existed prior to cancellation;

    (b) The officer, agent, or employee had no knowledge that the corporation''s or
    association''s articles of incorporation had been canceled.

    (2) The corporation or association is liable exclusively for the exercise of or
    an attempt to exercise any rights, privileges, or franchises on behalf of the
    corporation or association by an officer, agent, or employee of the corporation
    or association, if the conditions set forth in divisions (B)(1)(a) and (b) of
    this section are met.

    (C) Upon reinstatement of a corporation''s or association''s articles of incorporation
    in accordance with section 1701.07, 1785.06, 5703.93, or 5733.22 of the Revised
    Code, the exercise of or an attempt to exercise any rights, privileges, or franchises
    on behalf of the corporation or association by an officer, agent, or employee
    of the corporation or association, after cancellation and prior to reinstatement
    of the articles of incorporation, does not constitute a failure to comply with
    division (A) of section 1701.88 or a violation of section 1701.97 of the Revised
    Code, if the conditions set forth in divisions (B)(1)(a) and (b) of this section
    are met.

    (D) This section is remedial in nature and is to be construed liberally to accomplish
    the purpose of providing full reinstatement of a corporation''s or association''s
    articles of incorporation retroactive, in accordance with this section, to the
    time of the cancellation of the articles.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.922
- number: '1701.93'
  heading: False statement or entry
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) No officer, director, employee, or agent of a corporation shall, either
    alone or with another or others, with intent to deceive:

    (1) Make, issue, deliver, publish, or send by mail or by any other means of communication
    any prospectus, report, circular, certificate, statement, balance sheet, exhibit,
    or document, respecting the shares, assets, liabilities, capital, business, dividends
    or distributions, earnings, or accounts of a corporation, that is false in any
    material respect, knowing the statement to be false;

    (2) Having charge of any books, minutes, records, or accounts of a corporation,
    make in them any entry that is false in any material respect, knowing the entry
    to be false, or remove, erase, alter, or cancel any entry in them, knowing that
    the entries resulting from them will be false.

    (B) Whoever violates this section shall be personally liable, jointly and severally,
    with all other persons participating with the offender in any act of that type,
    to any person for any damage actually suffered and proximately resulting from
    the act.

    (C) No action to enforce a liability under this section shall be brought after
    four years from the time of the act complained of.

    (D) Remedies under this section are not exclusive of other remedies at common
    law or under other statutes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.93
- number: '1701.94'
  heading: Forfeiture by corporation for failure to comply with certain requirements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Every corporation that fails to:

    (1) Keep the books of account, minutes of proceedings, or records of shareholders
    as required by section 1701.37 of the Revised Code;

    (2) Comply with division (C) of section 1701.11 of the Revised Code with respect
    to mailing a copy of an amendment to, or copy of new, regulations;

    (3) Perform the obligation imposed on it by division (C) of section 1701.25 of
    the Revised Code;

    (4) Send to any shareholder making written request therefor, within the period
    provided for in division (C) of section 1701.38 of the Revised Code, a copy of
    any financial statement, written statement, or report, as applicable, referred
    to in that section;

    (5) Lay before the shareholders or make available in the manner provided for in
    division (D) of section 1701.38 of the Revised Code at a proper meeting of shareholders,
    upon request of any shareholder at such meeting, such financial statement, written
    statement, or report, as applicable;

    (6) Produce at a meeting of shareholders, upon request of any shareholder at such
    meeting, the list or lists of shareholders required by section 1701.37 of the
    Revised Code; shall be subject to a forfeiture of one hundred dollars and in cases
    under paragraphs (1), (2), (3), and (4) to a further forfeiture of ten dollars
    for every day that such failure continues, beginning, in cases under paragraphs
    (1) or (2), with the fifth day after written request by a shareholder that the
    corporation comply with said respective paragraphs, and in cases under paragraphs
    (3) and (4) beginning with the day following the day on which the corporation
    becomes delinquent in complying with said paragraph, which amount shall be paid
    to every shareholder making such request. The right of a shareholder to enforce
    any such forfeiture is in addition to all other remedies.

    (B) If any officer charged with one of the duties specified in division (A) of
    this section fails to perform such duty after written request by any shareholder,
    the officer shall be subject to a forfeiture of one hundred dollars, and to the
    further forfeiture of ten dollars for every day that such default continues, beginning
    in cases under paragraphs (1), (2), (3), and (4) of division (A) on the same respective
    days as are provided for in division (A), which amount shall be paid to each shareholder
    making such request. The right of each shareholder to enforce any such forfeiture
    is in addition to all other remedies.

    (C) The court in which an action is brought to enforce any forfeiture under this
    section may reduce, remit, or suspend such forfeiture on such terms as it deems
    reasonable when it appears that the failure was excusable or that the imposition
    of the full forfeiture would be unreasonable or unjust.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.94
- number: '1701.95'
  heading: Liability for unlawful loans, dividends, distribution of assets
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A)(1) In addition to any other liabilities imposed by law upon directors
    of a corporation and except as provided in division (B) of this section, directors
    shall be jointly and severally liable to the corporation as provided in division
    (A)(2) of this section if they vote for or assent to any of the following:

    (a) The payment of a dividend or distribution, the making of a distribution of
    assets to shareholders, or the purchase or redemption of the corporation''s own
    shares, contrary in any such case to law or the articles;

    (b) A distribution of assets to shareholders during the winding up of the affairs
    of the corporation, on dissolution or otherwise, without the payment of all known
    obligations of the corporation or without making adequate provision for their
    payment;

    (c) The making of a loan, other than in the usual course of business, to an officer,
    director, or shareholder of the corporation, other than in either of the following
    cases:

    (i) In the case of a savings and loan association or of a corporation engaged
    in banking or in the making of loans generally;

    (ii) At the time of the making of the loan, a majority of the disinterested directors
    of the corporation voted for the loan and, taking into account the terms and provisions
    of the loan and other relevant factors, determined that the making of the loan
    could reasonably be expected to benefit the corporation.

    (2)(a) In cases under division (A)(1)(a) of this section, directors shall be jointly
    and severally liable up to the amount of the dividend, distribution, or other
    payment, in excess of the amount that could have been paid or distributed without
    violation of law or the articles but not in excess of the amount that would inure
    to the benefit of the creditors of the corporation if it was insolvent at the
    time of the payment or distribution or there was reasonable ground to believe
    that by that action it would be rendered insolvent, plus the amount that was paid
    or distributed to holders of shares of any class in violation of the rights of
    holders of shares of any other class.

    (b) In cases under division (A)(1)(b) of this section, directors shall be jointly
    and severally liable to the extent that the obligations of the corporation that
    are not otherwise barred by statute are not paid or for the payment of which adequate
    provision has not been made.

    (c) In cases under division (A)(1)(c) of this section, directors shall be jointly
    and severally liable for the amount of the loan with interest on it at the rate
    specified in section 1343.03 of the Revised Code until the amount has been paid.

    (B)(1) A director is not liable under division (A)(1)(a) or (b) of this section
    if, in determining the amount available for any dividend, purchase, redemption,
    or distribution to shareholders, the director in good faith relied on a financial
    statement of the corporation prepared by an officer or employee of the corporation
    in charge of its accounts or certified by a public accountant or firm of public
    accountants, the director in good faith considered the assets to be of their book
    value, or the director followed what the director believed to be sound accounting
    and business practice.

    (2) A director is not liable under division (A)(1)(c) of this section for making
    any loan to, or guaranteeing any loan to or other obligation of, an employee stock
    ownership plan, as defined in section 4975(e)(7) of the Internal Revenue Code.

    (C) A director who is present at a meeting of the directors or a committee of
    the directors at which action on any matter is authorized or taken and who has
    not voted for or against the action shall be presumed to have voted for the action
    unless that director''s written dissent from the action is filed, either during
    the meeting or within a reasonable time after the adjournment of the meeting,
    with the person acting as secretary of the meeting or with the secretary of the
    corporation.

    (D) A shareholder who knowingly receives any dividend, distribution, or payment
    made contrary to law or the articles shall be liable to the corporation for the
    amount received by that shareholder that is in excess of the amount that could
    have been paid or distributed without violation of law or the articles.

    (E) A director against whom a claim is asserted under or pursuant to this section
    and who is held liable on the claim shall be entitled to contribution, on equitable
    principles, from other directors who also are liable. In addition, any director
    against whom a claim is asserted under or pursuant to this section or who is held
    liable shall have a right of contribution from the shareholders who knowingly
    received any dividend, distribution, or payment made contrary to law or the articles,
    and those shareholders as among themselves also shall be entitled to contribution
    in proportion to the amounts received by them respectively.

    (F) No action shall be brought by or on behalf of a corporation upon any cause
    of action arising under division (A)(1)(a) or (b) of this section at any time
    after two years from the day on which the violation occurs.

    (G) Nothing contained in this section shall preclude a creditor whose claim is
    unpaid from exercising the rights that that creditor otherwise would have by law
    to enforce that creditor''s claim against assets of the corporation paid or distributed
    to shareholders.

    (H) The failure of a corporation to observe corporate formalities relating to
    meetings of directors or shareholders in connection with the management of the
    corporation''s affairs shall not be considered a factor tending to establish that
    the shareholders have personal liability for corporate obligations.'
