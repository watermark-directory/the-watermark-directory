- number: '1715.54'
  heading: Delegation of authority
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1715'
    name: Religious And Benevolent Organizations
  text: '(A)(1) Subject to any specific limitation set forth in a gift instrument
    or in any other provision of law, an institution may delegate to an external agent
    the management and investment of an institutional fund to the extent that an institution
    could prudently delegate under the circumstances. An institution shall act in
    good faith, with the care that an ordinarily prudent person in a like position
    would exercise under similar circumstances, in doing all of the following:

    (a) Selecting an agent;

    (b) Establishing the scope and terms of the delegation, consistent with the purposes
    of the institution and the institutional fund;

    (c) Periodically reviewing the agent''s actions to monitor the agent''s performance
    and compliance with the scope and terms of the delegation.

    (2) An agent, in performing a delegated function, shall owe a duty to the institution
    to exercise reasonable care to comply with the scope and terms of the delegation.
    By accepting delegation of a management or investment function from an institution
    that is subject to the laws of this state, an agent submits to the jurisdiction
    of the courts of this state in all proceedings arising from or related to the
    delegation or the performance of the delegated function.

    (3) An institution that complies with division (A)(1) of this section is not liable
    for the decisions or actions of an agent to which the function was delegated.

    (B) An institution may delegate management and investment functions to its committees,
    officers, or employees as otherwise provided by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1715.54
- number: '1715.55'
  heading: Releasing restriction on use or investment of institutional fund
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1715'
    name: Religious And Benevolent Organizations
  text: '(A) If a donor consents in a record, an institution may release or modify,
    in whole or in part, a restriction contained in a gift instrument on the management,
    investment, or purpose of an institutional fund. A release or modification shall
    not, however, permit a fund to be used for a purpose other than a charitable purpose
    of the institution.

    (B) The appropriate court, upon application of an institution, may modify a restriction
    contained in a gift instrument regarding the management or investment of an institutional
    fund if the restriction has become impracticable or wasteful, if it impairs the
    management or investment of the fund, or if, because of circumstances not anticipated
    by the donor, a modification of a restriction will further the purposes of the
    fund. The attorney general is a necessary party to and shall be served with process
    in all proceedings pertaining to an application of that nature. To the extent
    practicable, any modification shall be made in accordance with the donor''s probable
    intention.

    (C) The court, upon application of an institution, may modify the charitable purpose
    of an institutional fund or a restriction contained in a gift instrument on the
    use of the fund if the particular charitable purpose or restriction becomes unlawful,
    impracticable, impossible to achieve, or wasteful. The attorney general is a necessary
    party to and shall be served with process in all proceedings pertaining to an
    application of that nature. Any modification shall be made in a manner consistent
    with the charitable purposes expressed in the gift instrument.

    (D) If an institution determines that a restriction contained in a gift instrument
    on the management, investment, or purpose of an institutional fund is unlawful,
    impracticable, impossible to achieve, or wasteful, the institution may, after
    providing sixty-days advanced notice to the attorney general''s charitable law
    section by certified mail on a form prescribed by the attorney general, release
    or modify the restriction, in whole or in part, if all of the following conditions
    are met:

    (1) The institutional fund subject to the restriction has a total value of less
    than two hundred fifty thousand dollars;

    (2) More than ten years have elapsed since the fund was established;

    (3) The institution uses the property in a manner consistent with the charitable
    purposes expressed in the gift instrument.

    (E) The attorney general may extend for a period of up to an additional sixty
    days the effective date of a release or modification of a restriction that is
    proposed under division (D) of this section and shall provide notice of that extension
    to the institution that proposed the release or modification. The notice shall
    set forth the reasons necessitating the extension. The attorney general shall
    notify the institution prior to the effective date of the proposed release or
    modification of any objection to the proposed release or modification of the restriction.'
