  url: https://codes.ohio.gov/ohio-revised-code/section-1751.07
- number: '1751.08'
  heading: Inapplicability of insurance laws
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Except as otherwise specifically provided in this chapter or Title XXXIX
    of the Revised Code, provisions of Title XXXIX of the Revised Code shall not be
    applicable to any health insuring corporation holding a certificate of authority
    under this chapter. This division shall not apply to an insurer licensed and regulated
    pursuant to Title XXXIX of the Revised Code except with respect to its health
    insuring corporation activities authorized and regulated pursuant to this chapter.

    (B) For the purpose of clarifying jurisdiction under the "Bankruptcy Reform Act
    of 1978," 92 Stat. 2549, 11 U.S.C.A. 101, and in recognition of the right of this
    state to regulate domestic insurance companies under the "McCarran-Ferguson Act,"
    59 Stat. 33 (1945), 15 U.S.C.A. 1011, a health insuring corporation is deemed
    to be a domestic insurance company.

    (C) Solicitation of enrollees by a health insuring corporation holding a certificate
    of authority under this chapter, or its representatives, shall not be construed
    to violate any provision of law relating to solicitation or advertising by health
    professionals.

    (D) Any health insuring corporation holding a certificate of authority under this
    chapter shall not be considered to be practicing medicine.'
