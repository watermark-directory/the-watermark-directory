- number: '1710.05'
  heading: Notice for meetings -method for voting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: Except as otherwise provided in this chapter, the articles of incorporation
    or the code of regulations governing the nonprofit corporation shall provide for
    the method by which notice for meetings of the membership of the special improvement
    district is to be given and the method for voting by the membership of the district.
