- number: '1715.02'
  heading: Sale of cemetery grounds no longer usable
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1715'
    name: Religious And Benevolent Organizations
  text: 'When a religious or educational corporation or society holds lands within
    the limits of a municipal corporation which have been used as a cemetery, and
    interments in such lands have been prohibited by the ordinances of such municipal
    corporation, the trustees, wardens, vestry, or other officers entrusted with the
    management of the property of such corporation or society may file a petition
    in the court of common pleas of the county where such property is situated, setting
    forth a description of such property, the existence of such ordinance, and the
    names of all persons holding burial privileges in such cemetery, so far as known
    to the petitioners. If such privileges are held by persons whose names are unknown
    to such petitioners, the petition must also include the facts as to such privileges,
    and requests for the court''s determination of their value, for its direction
    as to the removal of the bodies interred in such cemetery to other cemeteries,
    and for an order to sell such property free from burial privileges.

    Notice of the filing of such petition shall be given by publication in some newspaper
    published in and of general circulation in the county where it is filed, for four
    consecutive weeks, setting forth the object and prayer of the petition, and that
    any persons claiming an interest in its subject matter or claiming burial privileges
    in such cemetery may appear and file an answer to such petition within six weeks
    from the date of the first publication of such notice. After said six weeks have
    elapsed, the case will stand for hearing.

    Upon final hearing of the case, the court, with or without the aid of a jury,
    as the parties appearing elect, shall determine the value of such burial privileges,
    and shall order the corporation or society to pay any amount so ascertained to
    the holder of such privilege. The court may also order the cemetery property sold
    free from such burial privileges, and may direct a subdivision of it into lots
    for the purpose of sale. The court shall direct the application of the money arising
    from such sale to such uses, by such corporation or society, for pious or educational
    purposes, as its trustees, wardens, vestry, or other officers conceive to be most
    for its interest. Such sale shall not be made until the bodies interred in the
    grounds to be sold are removed to other cemeteries, as directed by the court on
    the final hearing of the case.

    A holder of a burial privilege who did not appear in such proceeding, and who
    has not waived his right to receive compensation for it, may assert his right
    to receive such compensation from such society or corporation within five years
    after the final entry of such proceeding.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1715.02
- number: '1715.03'
  heading: Transfer of cemetery land to cemetery association
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1715'
    name: Religious And Benevolent Organizations
  text: 'When a religious or benevolent society or association owning real estate
    used or occupied as a burial place, the title to which real estate is vested in
    such society or association, or the trustees thereof, desires to transfer such
    real estate to a cemetery association incorporated under any law of this state,
    the trustees or other officers entrusted with the management of the affairs of
    such society or association may file, in the court of common pleas of the county
    in which such real estate is situated, a petition stating how and by whom the
    title to such real estate is held and that such society or association desires
    to make such transfer, and asking for an order therefor.

    Notice of the filing of such petition shall be given by publication, in some newspaper
    published in and of general circulation in the county where it is filed, for four
    consecutive weeks, setting forth the object and prayer of the petition and that
    persons claiming an interest in the subject matter thereof may appear and file
    an answer thereto within six weeks from the first publication of such notice.

    At the expiration of such six weeks the case will stand for hearing, and if the
    court is satisfied that such transfer is desired by the members of such society
    or association, it may authorize the trustees or other officers thereof to make
    a deed therefor to such cemetery association. Such association shall assume all
    legal debts against the real estate so transferred.'
