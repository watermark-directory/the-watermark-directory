- number: '1703.13'
  heading: Temporary license
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: Any foreign corporation which would be entitled to make application for and
    procure a license to transact business in this state under sections 1703.01 to
    1703.31 of the Revised Code, may procure from the secretary of state a temporary
    license to transact business in this state upon filing with the secretary of state
    the application and certificate of good standing or subsistence required by such
    sections and paying to him a filing fee of one hundred twenty-five dollars. Such
    license shall be evidenced by a license certificate issued by the secretary of
    state entitling such corporation to transact business in this state for a period
    of six months from the date of such certificate. A corporation so licensed shall
    not be required to file any other reports or pay any other fees required by sections
    1703.01 to 1703.31 of the Revised Code, but shall be subject to all other provisions
    of such sections. No foreign corporation shall be granted more than two temporary
    licenses within any period of three years.
