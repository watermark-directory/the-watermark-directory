- number: '1711.18'
  heading: Issuance of county bonds to pay debts of county society
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'In a county in which there is a county agricultural society indebted fifteen
    thousand dollars or more, and such society has purchased a fairground or title
    to such fairground is vested in fee in the county, the board of county commissioners,
    upon the presentation of a petition signed by not less than five hundred resident
    electors of the county praying for the submission to the electors of the county
    of the question whether or not county bonds shall be issued and sold to liquidate
    such indebtedness, shall, by resolution within ten days thereafter, fix a date,
    which shall be within thirty days, upon which the question of issuing and selling
    such bonds, in the necessary amount and denomination, shall be submitted to the
    electors of the county. The board also shall cause a copy of such resolution to
    be certified to the county board of elections and such board of elections, within
    ten days after such certification, shall proceed to make the necessary arrangements
    for the submission of such question to such electors at the time fixed by such
    resolution.

    Such election shall be held at the regular places of voting in the county and
    shall be conducted, canvassed, and certified, except as otherwise provided by
    law, as are elections of county officers. The county board of elections must give
    fifteen days'' notice of such submission by publication in a newspaper of general
    circulation in the county once a week for two consecutive weeks or as provided
    in section 7.16 of the Revised Code, stating the amount of bonds to be issued,
    the purpose for which they are to be issued, and the time and places of holding
    such election. Those who vote in favor of the proposition shall have written or
    printed on their ballots "for the issue of bonds" and those who vote against it
    shall have written or printed on their ballots "against the issue of bonds." If
    a majority of those voting upon the question of issuing the bonds vote in favor
    thereof, then and only then shall they be issued and the tax provided for in section
    1711.20 of the Revised Code be levied.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.18
- number: '1711.19'
  heading: Bonds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'If a majority of the voters of a county voting upon the question of issuing
    bonds under section 1711.18 of the Revised Code vote in favor thereof, the board
    of county commissioners, for the purpose of liquidating the county agricultural
    society''s indebtedness, shall issue and sell bonds of the county in the amount
    necessary. Such bonds shall bear interest at not more than the rate provided in
    section 9.95 of the Revised Code, payable semiannually, and shall be issued for
    a period of not less than ten nor more than twenty years.

    From the proceeds arising from the sale of such bonds, the board shall pay off
    the indebtedness for which such bonds were sold.'
