- number: '1782.62'
  heading: Pre-existing foreign limited partnerships
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'A foreign limited partnership that filed a copy of its certificate of limited
    partnership in the office of a county recorder and was transacting business in
    this state immediately prior to April 4, 1985, is deemed to be registered as a
    foreign limited partnership in this state within the meaning of sections 1782.49
    to 1782.53 of the Revised Code. It may continue to transact business in this state
    in accordance with all of the following:

    (A) A pre-existing foreign limited partnership is not subject to the provisions
    of section 1782.51 of the Revised Code with respect to its name as set forth in
    its certificate of limited partnership on or after April 4, 1985. It becomes subject
    to such provisions if, and at the time, any change in its name is made on or after
    April 4, 1985.

    (B) A pre-existing foreign limited partnership is not subject to the provisions
    of division (C) of section 1782.49 of the Revised Code until the execution and
    filing of a restated certificate of limited partnership. At such time, the general
    partners of a pre-existing foreign limited partnership shall appoint and thereafter
    continuously maintain an agent for service of process as provided in division
    (C) of section 1782.49 of the Revised Code.

    (C) A pre-existing foreign limited partnership that does not file an application
    and register in accordance with sections 1782.49 to 1782.53 of the Revised Code
    but relies on this section is deemed to have appointed the secretary of state
    as its agent for service of process as provided in division (D) of section 1782.49
    of the Revised Code.'
  history: null
