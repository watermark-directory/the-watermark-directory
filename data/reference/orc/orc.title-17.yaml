- number: '1701.811'
  heading: Filing of certificate of conversion - effective date
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Upon the adoption of a declaration of conversion pursuant to section
    1701.782 or 1701.792 of the Revised Code, or at a later time as authorized by
    the declaration of conversion, a certificate of conversion that is signed by an
    authorized representative of the converting entity shall be filed with the secretary
    of state. The certificate shall be on a form prescribed by the secretary of state
    and shall set forth only the information required by this section.

    (B)(1) The certificate of conversion shall set forth all of the following:

    (a) The name and the form of entity of the converting entity and the state under
    the laws of which the converting entity exists;

    (b) A statement that the converting entity has complied with all of the laws under
    which it exists and that the laws permit the conversion;

    (c) The name and mailing address of the person or entity that is to provide a
    copy of the declaration of conversion in response to any written request made
    by a shareholder, partner, or member of the converting entity;

    (d) The effective date of the conversion, which date may be on or after the date
    of the filing of the certificate pursuant to this section;

    (e) The signature of the representative or representatives authorized to sign
    the certificate on behalf of the converting entity and the office held or the
    capacity in which the representative is acting;

    (f) A statement that the declaration of conversion is authorized on behalf of
    the converting entity and that each person signing the certificate on behalf of
    the converting entity is authorized to do so;

    (g) The name and the form of the converted entity and the state under the laws
    of which the converted entity will exist;

    (h) If the converted entity is a foreign entity that will not be licensed in this
    state, the name and address of the statutory agent upon whom any process, notice,
    or demand may be served.

    (2) In the case of a conversion into a new domestic corporation, limited liability
    company, limited partnership, or other partnership, any organizational document,
    including a designation of agent, that would be filed upon the creation of the
    new entity shall be filed with the certificate of conversion.

    (3) If the converted entity is a foreign entity that desires to transact business
    in this state, the certificate of conversion shall be accompanied by the information
    required by division (B)(8), (9), or (10) of section 1701.791 of the Revised Code.

    (4) If a foreign or domestic corporation licensed to transact business in this
    state is the converting entity, the certificate of conversion shall be accompanied
    by the affidavits, receipts, certificates, or other evidence required by division
    (H) of section 1701.86 of the Revised Code with respect to a converting domestic
    corporation, or by the affidavits, receipts, certificates, or other evidence required
    by division (C) or (D) of section 1703.17 of the Revised Code with respect to
    a foreign corporation.

    (C) If the converting entity or the converted entity is organized or formed under
    the laws of a state other than this state or under any chapter of the Revised
    Code other than this chapter, all documents required to be filed in connection
    with the conversion by the laws of that state or that chapter shall be filed in
    the proper office.

    (D) Upon the filing of a certificate of conversion and other filings required
    by division (C) of this section or at any later date that the certificate of conversion
    specifies, the conversion is effective, subject to the limitation that no conversion
    will be effective if there are reasonable grounds to believe that the conversion
    would render the converted entity unable to pay its obligations as they become
    due in the usual course of its affairs.

    (E) The secretary of state shall furnish, upon request and payment of the fee
    specified in division (K)(2) of section 111.16 of the Revised Code, the secretary
    of state''s certificate setting forth all of the following:

    (1) The name and form of entity of the converting entity and the state under the
    laws of which it existed prior to the conversion;

    (2) The name and the form of entity of the converted entity and the state under
    the laws of which it will exist;

    (3) The date of filing of the certificate of conversion with the secretary of
    state and the effective date of the conversion.

    (F) The certificate of the secretary of state, or a copy of the certificate of
    conversion certified by the secretary of state, may be filed for record in the
    office of the recorder of any county in this state and, if filed, shall be recorded
    in the official records of that county. For the recording, the county recorder
    shall charge and collect the same fee as in the case of deeds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.811
- number: '1701.82'
  heading: Conditions following merger or consolidation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) When a merger or consolidation becomes effective, all of the following
    apply:

    (1) The separate existence of each constituent entity other than the surviving
    entity in a merger shall cease, except that whenever a conveyance, assignment,
    transfer, deed, or other instrument or act is necessary to vest property or rights
    in the surviving or new entity, the officers, general partners, or other authorized
    representatives of the respective constituent entities shall execute, acknowledge,
    and deliver those instruments and do those acts. For these purposes, the existence
    of the constituent entities and the authority of their respective officers, directors,
    general partners, or other authorized representatives is continued notwithstanding
    the merger or consolidation.

    (2) In the case of a consolidation, the new entity exists when the consolidation
    becomes effective and, if it is a domestic corporation, the articles contained
    in or provided for in the agreement of consolidation shall be its original articles.
    In the case of a merger in which the surviving entity is a domestic corporation,
    the articles of the domestic surviving corporation in effect immediately prior
    to the time the merger becomes effective shall continue as its articles after
    the merger except as otherwise provided in the agreement of merger.

    (3) The surviving or new entity possesses all assets and property of every description,
    and every interest in the assets and property, wherever located, and the rights,
    privileges, immunities, powers, franchises, and authority, of a public as well
    as of a private nature, of each constituent entity, and, subject to the limitations
    specified in section 2307.97 of the Revised Code, all obligations belonging to
    or due to each constituent entity, all of which are vested in the surviving or
    new entity without further act or deed. Title to any real estate or any interest
    in the real estate vested in any constituent entity shall not revert or in any
    way be impaired by reason of such merger or consolidation.

    (4) Subject to the limitations specified in section 2307.97 of the Revised Code,
    the surviving or new entity is liable for all the obligations of each constituent
    entity, including liability to dissenting shareholders. Any claim existing or
    any action or proceeding pending by or against any constituent entity may be prosecuted
    to judgment, with right of appeal, as if the merger or consolidation had not taken
    place, or the surviving or new entity may be substituted in its place.

    (5) Subject to the limitations specified in section 2307.97 of the Revised Code,
    all the rights of creditors of each constituent entity are preserved unimpaired,
    and all liens upon the property of any constituent entity are preserved unimpaired,
    on only the property affected by those liens immediately prior to the effective
    date of the merger or consolidation. If a general partner of a constituent partnership
    is not a general partner of the entity surviving or the new entity resulting from
    the merger or consolidation, then the former general partner shall have no liability
    for any obligation incurred after the merger or consolidation except to the extent
    that a former creditor of the constituent partnership in which the former general
    partner was a partner extends credit to the surviving or new entity reasonably
    believing that the former general partner continued as a general partner of the
    surviving or new entity.

    (B) If a general partner of a constituent partnership is not a general partner
    of the entity surviving or the new entity resulting from the merger or consolidation,
    the provisions of division (B) of section 1782.434 of the Revised Code shall apply.

    (C) In the case of a merger of a domestic constituent corporation into a foreign
    surviving corporation, limited liability company, or limited partnership that
    is not licensed or registered to transact business in this state or in the case
    of a consolidation of a domestic constituent corporation into a new foreign corporation,
    limited liability company, or limited partnership, if the surviving or new entity
    intends to transact business in this state and the certificate of merger or consolidation
    is accompanied by the information described in division (B)(4) of section 1701.81
    of the Revised Code, then, on the effective date of the merger or consolidation,
    the surviving or new entity shall be considered to have complied with the requirements
    for procuring a license or for registering to transact business in this state
    as a foreign corporation, limited liability company, or limited partnership, as
    the case may be. In such a case, a copy of the certificate of merger or consolidation
    certified by the secretary of state constitutes the license certificate prescribed
    by the laws of this state for a foreign corporation transacting business in this
    state or the application for registration prescribed for a foreign limited partnership
    or limited liability company.

    (D) Any action to set aside any merger or consolidation on the ground that any
    section of the Revised Code applicable to the merger or consolidation has not
    been complied with shall be brought within ninety days after the effective date
    of that merger or consolidation or be forever barred.

    (E) As used in this section, "corporation" or "entity" applies to both domestic
    and foreign corporations and entities where the context so permits. In the case
    of a foreign constituent entity or a foreign new entity, this section is subject
    to the laws of the state under the laws of which the entity exists or in which
    it has property.'
