- number: '1701.71'
  heading: Shareholders may adopt amendments
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A)(1)(a) Except as otherwise provided in divisions (A)(1)(b), (c), and (d)
    of this section or division (A)(2) of this section, the shareholders, at a meeting
    held for that purpose, may adopt an amendment, including any amendment that could
    be adopted by the directors, by the affirmative vote of the holders of shares
    entitling them to exercise two-thirds of the voting power of the corporation on
    the proposal or, if the articles provide or permit, by the affirmative vote of
    a greater or lesser proportion, but not less than a majority, of such voting power,
    and by the affirmative vote of the holders of shares of any particular class that
    is required by the articles.

    (b) Any amendment that would change or eliminate the classification of directors
    of an issuing public corporation whose directors are classified pursuant to section
    1701.57 of the Revised Code shall be adopted by the shareholders only at a meeting
    expressly held for that purpose, by the affirmative votes required under division
    (A)(1)(a) of this section, and also by the affirmative vote of the holders of
    at least a majority of disinterested shares voted on the proposal determined as
    specified in division (C)(9) of section 1704.01 of the Revised Code.

    (c) Any amendment that would provide that section 1701.831 of the Revised Code
    does not apply to control share acquisitions of shares of an issuing public corporation
    shall be adopted:

    (i) Upon the recommendation by the affirmative vote of a majority of the authorized
    number of directors of the issuing public corporation in favor of such amendment;
    and

    (ii) By the shareholders only at a meeting expressly held for the purpose, by
    the affirmative votes required under division (A)(1)(a) of this section.

    (d) If, at the time an amendment to eliminate cumulative voting rights permitted
    by division (B)(10) of section 1701.69 of the Revised Code is acted upon by the
    shareholders, a corporation does not have issued and outstanding shares that are
    listed on a national securities exchange or are regularly quoted in an over-the-counter
    market by one or more members of a national or affiliated securities association,
    that amendment shall not be adopted if the votes of a sufficient number of shares
    are cast against the amendment that, if cumulatively voted at an election of all
    the directors, or all the directors of a particular class, as the case may be,
    would at the time the amendment is acted upon by the shareholders be sufficient
    to elect at least one director.

    (2) Whenever under division (B) of this section the holders of shares of any particular
    class are entitled to vote as a class on the adoption of an amendment, the amendment,
    in order to be adopted, must receive the affirmative vote of the holders of at
    least two-thirds of the shares of that class or, if the articles provide or permit,
    a greater or lesser proportion, but not less than a majority, of the shares of
    that class. If the proposed amendment would authorize any particular corporate
    action that, under any applicable provision of law or under the existing articles,
    could be authorized only by or pursuant to a specified vote of shareholders, the
    amendment, in order to be adopted, must receive the affirmative vote so specified.

    (B) Regardless of limitations or restrictions in the articles on the voting rights
    of the shares of any class, the holders of shares of a particular class, and in
    the cases specified in divisions (B)(6), (7), and (8) of this section the holders
    of shares of every class, shall be entitled to vote as a class on the adoption
    of an amendment that does any of the following:

    (1) Increases or decreases the par value of the issued shares of the particular
    class, except in the case of an amendment to the articles adopted by the directors
    pursuant to division (B)(10) of section 1701.70 of the Revised Code;

    (2) Changes issued shares of the particular class, whether with or without par
    value, into a lesser number of shares of the same class or into the same or a
    different number of shares of any other class, with or without par value, previously
    or then authorized;

    (3) Changes the express terms, or adds express terms, of the shares of the particular
    class in any manner substantially prejudicial to the holders of the shares;

    (4) Changes the express terms of issued shares of any class senior to the particular
    class in any manner substantially prejudicial to the holders of shares of the
    particular class;

    (5) Authorizes shares of another class that are convertible into, or authorizes
    the conversion of shares of another class into, shares of the particular class,
    or authorizes the directors to fix or alter conversion rights of shares of another
    class that are convertible into shares of the particular class; provided, however,
    both of the following apply:

    (a) The failure to obtain the shareholders'' approval only prevents the conversion
    of the shares until the shareholders'' approval is obtained and does not otherwise
    affect the authorization or any other express terms of the shares;

    (b) The articles may provide that no vote of the holders of common shares, as
    a class, is required in connection with the authorization of shares of any class
    that are convertible into common shares.

    (6) Provides, in the case of an amendment described in division (B)(1) or (2)
    of this section, that the stated capital of the corporation shall be reduced or
    eliminated as a result of the amendment, or provides, in the case of an amendment
    described in division (B)(5) of this section, that the stated capital of the corporation
    shall be reduced or eliminated upon the exercise of such conversion rights, provided
    that any reduction or elimination is consistent with section 1701.30 of the Revised
    Code;

    (7) Changes substantially the purposes of the corporation, or provides that a
    subsequent amendment to the articles may be adopted that changes substantially
    the purposes of the corporation;

    (8) Changes a corporation into a nonprofit corporation.

    (C) An amendment that changes a corporation into a nonprofit corporation shall
    contain a statement of purposes proper in the case of a nonprofit corporation
    and a statement that, after the effective date of the amendment, the corporation
    shall be subject to the provisions of the Revised Code relating to nonprofit corporations.
    In the case of a corporation formed on or after June 9, 1927, the amendment also
    shall provide for the cancellation of all outstanding shares and the terms and
    considerations, if any, for the cancellation. In the case of a corporation formed
    prior to June 9, 1927, the amendment may provide for the cancellation of outstanding
    shares, but if it does not so provide, the amendment shall contain a provision
    forbidding the payment of dividends or distributions on any shares after the effective
    date of the amendment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.71
- number: '1701.72'
  heading: Amended articles
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) The incorporators, the directors, and the shareholders, in the cases
    where they are respectively authorized to adopt an amendment to the articles,
    may, in addition thereto or in lieu thereof, adopt amended articles by the same
    action or vote as that required to adopt the amendment.

    (B) The directors may adopt amended articles to consolidate the original articles
    and all previously adopted amendments to the articles that are in force at the
    time, or the shareholders at a meeting held for such purpose may adopt such amended
    articles by the affirmative vote of the holders of shares entitling them to exercise
    a majority of the voting power of the corporation on such proposal.

    (C) Except as provided in division (D) of this section, amended articles shall
    set forth all such provisions as are required in, and only such provisions as
    may properly be in, original articles or amendments to articles filed at the time
    of adopting the amended articles and shall contain a statement that they supersede
    the existing articles; provided, however, that amended articles adopted by the
    directors or the shareholders need not contain any statement with respect to initial
    stated capital.

    (D) Where by amended articles a corporation is changed into a non-profit corporation,
    the amended articles shall set forth all such provisions as are required in, and
    may set forth such other provisions as may properly be in, original articles of
    a non-profit corporation filed at the time of adopting such amended articles,
    other than with respect to the initial trustees, and shall set forth all such
    further provisions as are required in an amendment to change the corporation into
    a non-profit corporation, together with a statement that the amended articles
    supersede the existing articles.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.72
- number: '1701.73'
  heading: Filing and signing of certificate of amendment or amended articles
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A)(1) Upon the adoption of any amendment or amended articles, a certificate
    containing a copy of the resolution adopting the amendment or amended articles,
    a statement of the manner of its adoption, and, in the case of adoption of the
    resolution by the incorporators or directors, a statement of the basis for such
    adoption, shall be filed with the secretary of state, and thereupon the articles
    shall be amended accordingly, any change of shares provided for in the amendment
    or amended articles shall become effective, and the amended articles shall supersede
    the existing articles.

    (2) Except as provided in division (A)(3) of this section, when an amendment or
    amended articles are adopted by the directors pursuant to section 1701.70 of the
    Revised Code, the corporation shall send notice of the amendment or amended articles,
    and a copy or summary of the amendment or amended articles, by mail, overnight
    delivery service, or any other means of communication authorized by the shareholder
    to whom the notice and copy or summary are sent, to each shareholder of the corporation
    of record as of the date on which the directors approved the amendment or amended
    articles. The notice shall be sent to the shareholders within twenty days after
    the filing of the certificate required by division (A)(1) of this section.

    (3) Any corporation that files periodic reports with the United States securities
    and exchange commission pursuant to section 13 of the "Securities Exchange Act
    of 1934," 48 Stat. 881, 15 U.S.C. 78m, as amended, or section 15(d) of the "Securities
    Exchange Act of 1934," 48 Stat. 881, 15 U.S.C. 78o(d), as amended, may satisfy
    the notice to shareholders of record requirement of division (A)(2) of this section
    by including a copy or summary of the amendment or amended articles in a report
    filed in accordance with those provisions within twenty days after the filing
    of the certificate required by division (A)(1) of this section.

    (B) When an amendment or amended articles are adopted by the incorporators, the
    certificate described in division (A)(1) of this section shall be signed by each
    of them.

    (C) When an amendment or amended articles are adopted by the directors or by the
    shareholders, the certificate described in division (A)(1) of this section shall
    be signed by any authorized officer.

    (D) A copy of an amendment or amended articles changing the name of a corporation
    or its principal office in this state, certified by the secretary of state, may
    be filed for record in the office of the county recorder of any county in this
    state, and for such recording, the county recorder shall charge and collect the
    same fee as provided for in division (A)(1) of section 317.32 of the Revised Code.
    The copy shall be recorded in the official records of the county recorder.'
