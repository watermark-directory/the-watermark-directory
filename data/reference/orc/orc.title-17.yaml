- number: '1716.17'
  heading: Fiduciary duties
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: 'Every person who solicits, collects, or expends contributions on behalf of
    a charitable organization or for a charitable purpose, or who conducts a charitable
    sales promotion, and every officer, director, trustee, or employee of that person
    who is concerned with the solicitation, collection, or expenditure of those contributions
    shall be considered a fiduciary and as acting in a fiduciary capacity.

    This section does not supersede or otherwise alter the standard of care or the
    limitations on the liability of volunteers under section 1702.30 or 2305.38 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.17
- number: '1716.21'
  heading: Reporting or filing requirements on charitable organizations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A)(1) Except as provided in division (B) of this section or as specifically
    required or authorized by federal law, no agency or official of this state shall
    impose any filing or reporting requirement on a charitable organization, regulated
    or specifically exempted from regulation under Chapter 1716. of the Revised Code,
    that is more stringent, restrictive, or expansive than the requirements explicitly
    authorized by the Revised Code.

    (2) Division (A)(1) of this section shall not be construed as repealing or otherwise
    negating any rule or requirement already in existence as of the effective date
    of this section .

    (3) Division (A)(1) of this section shall not be construed as negating or limiting
    any of the following:

    (a) Any civil or criminal right, claim, or defense that the attorney general may
    assert under the Revised Code or common law;

    (b) The authority of the attorney general to institute and prosecute an action
    to enforce any provision of the Revised Code the attorney general is authorized
    to enforce;

    (c) The independent authority of the attorney general to protect charitable assets
    in this state.

    (B) This section does not apply to any of the following:

    (1) State grants and contracts;

    (2) Fraud investigations;

    (3) Any enforcement action taken against a specific charitable organization;

    (4) Settlement agreements;

    (5) Assurances of discontinuance;

    (6) Court judgments;

    (7) Entities operating under Chapter 2915. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.21
- number: '1716.99'
  heading: Penalty
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A) Whoever violates any provision of sections 1716.02 to 1716.17 of the
    Revised Code, other than division (A)(1) of section 1716.14 of the Revised Code,
    is guilty of a misdemeanor of the first degree.

    Each occurrence of a solicitation of a contribution from any person in violation
    of any provision of sections 1716.02 to 1716.17 of the Revised Code, other than
    division (A)(1) of section 1716.14 of the Revised Code, is considered a separate
    offense.

    (B)(1) Whoever violates division (A)(1) of section 1716.14 of the Revised Code
    is guilty of solicitation fraud and shall be punished as provided in divisions
    (B)(2) to (4) of this section.

    (2) Except as otherwise provided in division (B)(4) of this section, division
    (B)(3) of this section applies to solicitation fraud, and solicitation fraud is
    one of the following:

    (a) Except as otherwise provided in divisions (B)(2)(b) to (d) of this section,
    a misdemeanor of the first degree or, if the offender previously has been convicted
    of or pleaded guilty to a theft offense or a violation of division (A)(1) of section
    1716.14 of the Revised Code, a felony of the fifth degree.

    (b) If the value of the contribution or contributions made in the violation is
    one thousand dollars or more but less than seven thousand five hundred dollars,
    a felony of the fifth degree or, if the offender previously has been convicted
    of or pleaded guilty to a theft offense or a violation of division (A)(1) of section
    1716.14 of the Revised Code, a felony of the fourth degree.

    (c) If the value of the contribution or contributions made in the violation is
    seven thousand five hundred dollars or more but less than one hundred fifty thousand
    dollars, a felony of the fourth degree or, if the offender previously has been
    convicted of or pleaded guilty to a theft offense or a violation of division (A)(1)
    of section 1716.14 of the Revised Code, a felony of the third degree.

    (d) If the value of the contribution or contributions made in the violation is
    one hundred fifty thousand dollars or more, a felony of the third degree.

    (3) When an offender commits a series of offenses in violation of division (A)(1)
    of section 1716.14 of the Revised Code as part of a common scheme or plan to defraud
    multiple victims, all of the offenses may be tried as a single offense. If the
    offenses are tried as a single offense, the value of the contributions for purposes
    of determining the value as required by division (B)(2) of this section is the
    aggregate value of all contributions involved in all offenses in the common scheme
    or plan to defraud multiple victims. In prosecuting a single offense under this
    division, it is not necessary to separately allege and prove each offense in the
    series. Rather, it is sufficient to allege and prove that the offender, within
    a given span of time, committed one or more offenses as part of a common scheme
    or plan to defraud multiple victims as described in this division.

    (4) If the victim of the offense is an elderly person or disabled adult, division
    (B)(4) of this section and section 2913.61 of the Revised Code apply to solicitation
    fraud, and solicitation fraud is one of the following:

    (a) Except as otherwise provided in divisions (B)(4)(b) to (d) of this section,
    a felony of the fifth degree;

    (b) If the value of the contributions made in the violation is one thousand dollars
    or more and is less than seven thousand five hundred dollars, a felony of the
    fourth degree;

    (c) If the value of the contributions made in the violation is seven thousand
    five hundred dollars or more and is less than thirty-seven thousand five hundred
    dollars, a felony of the third degree;

    (d) If the value of the contributions made in the violation is thirty-seven thousand
    five hundred dollars or more, a felony of the second degree.

    (C) Any person who is found guilty of any act or omission prohibited under this
    chapter shall forfeit the bond described in section 1716.07 of the Revised Code
    to the state treasury to the credit of the charitable law fund established under
    section 109.32 of the Revised Code and shall be prohibited from registering with
    the attorney general or from serving as a fund-raising counsel or professional
    solicitor in this state for a period of five years after conviction.'
