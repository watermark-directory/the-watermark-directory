- number: '1707.053'
  heading: Offerings-certification from purchasers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'The certification obtained by the portal operator from each prospective purchaser
    through an OhioInvests portal shall, at a minimum, state the following:

    "I UNDERSTAND AND ACKNOWLEDGE THAT:

    If I make an investment in an offering through this OhioInvests portal, it is
    very likely that I am investing in a high-risk, speculative business venture that
    could result in the complete loss of my investment, and I need to be able to afford
    such a loss.

    This offering has not been reviewed or approved by any state or federal securities
    commission or division or other regulatory authority and that no such person or
    authority has confirmed the accuracy or determined the adequacy of any disclosure
    made to me relating to this offering.

    If I make an investment in an offering through this OhioInvests portal, it is
    very likely that the investment will be difficult to transfer or sell and, accordingly,
    I may be required to hold the investment indefinitely.

    By entering into this transaction with the company, I am affirmatively representing
    myself as being an Ohio resident at the time that this contract is formed, and
    if this representation is subsequently shown to be false, the contract is void."'
