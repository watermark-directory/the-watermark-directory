- number: '1702.55'
  heading: Liability of members, directors and officers of corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) The members, the directors, and the officers of a corporation shall not
    be personally liable for any obligation of the corporation.

    (B) In addition to any other liabilities imposed by law upon directors of a corporation
    and except as provided in division (D) of this section, directors shall be jointly
    and severally liable to the corporation as provided in division (C) of this section
    if they vote for or assent to any of the following:

    (1) A distribution of assets to members contrary to law or the articles;

    (2) A distribution of assets to persons other than creditors during the winding
    up of the affairs of the corporation, on dissolution or otherwise, without the
    payment of all known obligations of the corporation, or without making adequate
    provision therefor;

    (3) The making of loans, other than in the usual conduct of its affairs or in
    accordance with provisions therefor in the articles, to an officer or director
    of the corporation other than if, at the time of the making of the loan, a majority
    of the disinterested directors of the corporation voted for the loan and, taking
    into account the terms and provisions of the loan and other relevant factors,
    determined that the making of the loan could reasonably be expected to benefit
    the corporation.

    (C)(1) In cases under division (B)(1) of this section, up to the amount of such
    distribution in excess of the amount that could have been distributed without
    violation of law or the articles, but not in excess of the amount that would inure
    to the benefit of the creditors of the corporation if it was insolvent at the
    time of the distribution or there was reasonable ground to believe that by such
    action it would be rendered insolvent, or to the benefit of the members other
    than members of the class in respect of which the distribution was made;

    (2) In cases under division (B)(2) of this section, to the extent that such obligations
    (not otherwise barred by statute) are not paid, or for the payment of which adequate
    provision has not been made;

    (3) In cases under division (B)(3) of this section, for the amount of the loan
    with interest thereon at the rate specified in section 1343.03 of the Revised
    Code until the amount has been paid.

    (D) A director shall not be liable under divisions (B)(1) and (C)(1) or divisions
    (B)(2) and (C)(2) of this section if in determining the amount available for any
    such distribution, the director in good faith relied on a financial statement
    of the corporation prepared by an officer or employee of the corporation in charge
    of its accounts or certified by a public accountant or firm of public accountants,
    or in good faith the director considered the assets to be of their book value,
    or the director followed what the director believed to be sound accounting and
    business practice.

    (E) A director who is present at a meeting of the directors or a committee thereof
    at which action on any matter is authorized or taken and who has not voted for
    or against such action shall be presumed to have voted for the action unless the
    director''s written dissent therefrom is filed either during the meeting or within
    a reasonable time after the adjournment thereof, with the person acting as secretary
    of the meeting or with the secretary of the corporation.

    (F) A member who knowingly receives any distribution made contrary to law or the
    articles shall be liable to the corporation for the amount received by the member
    that is in excess of the amount that could have been distributed without violation
    of law or the articles.

    (G) A director against whom a claim is asserted under or pursuant to this section
    and who is held liable thereon shall be entitled to contribution, on equitable
    principles, from other directors who also are liable; and in addition, any director
    against whom a claim is asserted under or pursuant to this section or who is held
    liable shall have a right of contribution from the members who knowingly received
    any distribution made contrary to law or the articles, and such members as among
    themselves shall also be entitled to contribution in proportion to the amounts
    received by them respectively.

    (H) The fact that a loan is made in violation of this section does not affect
    the borrower''s liability on the loan.

    (I) No action shall be brought by or on behalf of a corporation upon any cause
    of action arising under division (B)(1) or (2) of this section at any time after
    two years from the day on which the violation occurs.

    (J) Nothing contained in this section shall preclude any creditor whose claim
    is unpaid from exercising such rights as the creditor otherwise would have by
    law to enforce the creditor''s claim against assets of the corporation distributed
    to members or other persons.'
