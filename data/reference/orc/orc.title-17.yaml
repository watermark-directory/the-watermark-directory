- number: '1711.13'
  heading: Nature and powers of county society
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'County agricultural societies are hereby declared bodies corporate and politic,
    and as such they are capable of suing and being sued and of holding in fee simple
    any real estate purchased by them as sites for their fairs. In addition, they
    may do either or both of the following:

    (A) Mortgage their grounds for the purpose of renewing or extending pre-existing
    debts, and for the purpose of furnishing money to purchase additional land, but
    if the board of county commissioners has caused money to be paid out of the county
    treasury to aid in the purchase of the grounds, no mortgage shall be given without
    the consent of the board.

    Deeds, conveyances, and agreements in writing, made to and by such societies,
    for the purchase of real estate as sites for their fairs, shall vest a title in
    fee simple to the real estate described in those documents, without words of inheritance.

    (B) Subject to section 1711.33 of the Revised Code, enter into agreements to obtain
    loans and credit for expenses related to the purposes of the county agricultural
    society, provided that the agreements are in writing and are first approved by
    the board of directors of the society. The total annual payments for debt obligation
    incurred by a county agricultural society pursuant to this division shall not
    exceed an amount equal to twenty-five per cent of its prior three-year average
    of annual revenues.'
