  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.321
- number: '1751.33'
  heading: Information to be provided to subscribers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Each health insuring corporation shall provide to its subscribers a description
    of the health insuring corporation, its method of operation, its service area,
    its most recent provider list, its complaint procedure established pursuant to
    section 1751.19 of the Revised Code, and a description of its utilization review,
    internal review, and external review processes established under sections 1751.77
    to 1751.83 and Chapter 3922. of the Revised Code. A health insuring corporation
    may satisfy this requirement by delivering to its subscribers a document that
    identifies a web site where the subscriber may view this information. At the request
    of the subscriber, a health insuring corporation shall provide this information
    in hard copy by mail. A health insuring corporation providing basic health care
    services or supplemental health care services shall provide this information annually.
    A health insuring corporation providing only specialty health care services shall
    provide this information biennially.

    (B) Each health insuring corporation, upon the request of a subscriber, shall
    make available its most recent statutory financial statement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.33
- number: '1751.34'
  heading: Examinations by superintendent and director
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Each health insuring corporation and each applicant for a certificate
    of authority under this chapter shall be subject to examination by the superintendent
    of insurance in accordance with section 3901.07 of the Revised Code. Section 3901.07
    of the Revised Code shall govern every aspect of the examination, including the
    circumstances under and frequency with which it is conducted, the authority of
    the superintendent and any examiner or other person appointed by the superintendent,
    the liability for the assessment of expenses incurred in conducting the examination,
    and the remittance of the assessment to the department of insurance operating
    fund.

    (B) The superintendent shall make an examination concerning the matters subject
    to the superintendent''s consideration in section 1751.04 of the Revised Code
    as often as the superintendent considers it necessary for the protection of the
    interests of the people of this state. The expenses of such examinations shall
    be assessed against the health insuring corporation being examined in the manner
    in which expenses of examinations are assessed against an insurance company under
    section 3901.07 of the Revised Code. Nothing in this division requires the superintendent
    to make an examination of any of the following:

    (1) A health insuring corporation that covers solely medicaid recipients;

    (2) A health insuring corporation that covers solely medicare beneficiaries;

    (3) A health insuring corporation that covers solely medicaid recipients and medicare
    beneficiaries.

    (C) An examination, pursuant to section 3901.07 of the Revised Code, of an insurance
    company holding a certificate of authority under this chapter to organize and
    operate a health insuring corporation shall include an examination of the health
    insuring corporation pursuant to this section and the examination shall satisfy
    the requirements of divisions (A) and (B) of this section.

    (D) The superintendent may conduct market conduct examinations pursuant to section
    3901.011 of the Revised Code of any health insuring corporation as often as the
    superintendent considers it necessary for the protection of the interests of subscribers
    and enrollees. The expenses of such market conduct examinations shall be assessed
    against the health insuring corporation being examined. All costs, assessments,
    or fines collected under this division shall be paid into the state treasury to
    the credit of the department of insurance operating fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.34
- number: '1751.35'
  heading: Suspension or revocation of certificate of authority
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) The superintendent of insurance may suspend or revoke any certificate
    of authority issued to a health insuring corporation under this chapter if the
    superintendent finds that:

    (1) The health insuring corporation is operating in contravention of its articles
    of incorporation, its health care plan or plans, or in a manner contrary to that
    described in and reasonably inferred from any other information submitted under
    section 1751.03 of the Revised Code, unless amendments to such submissions have
    been filed and have taken effect in compliance with this chapter.

    (2) The health insuring corporation fails to issue evidences of coverage in compliance
    with the requirements of section 1751.11 of the Revised Code.

    (3) The contractual periodic prepayments or premium rates used do not comply with
    the requirements of section 1751.12 of the Revised Code.

    (4) The health insuring corporation enters into a contract, agreement, or other
    arrangement with any health care facility or provider, that does not comply with
    the requirements of section 1751.13 of the Revised Code, or the corporation fails
    to provide an annual certificate as required by section 1751.13 of the Revised
    Code.

    (5) The superintendent determines, after a hearing conducted in accordance with
    Chapter 119. of the Revised Code, that the health insuring corporation no longer
    meets the requirements of section 1751.04 of the Revised Code.

    (6) The health insuring corporation is no longer financially responsible and may
    reasonably be expected to be unable to meet its obligations to enrollees or prospective
    enrollees.

    (7) The health insuring corporation has failed to implement the complaint system
    that complies with the requirements of section 1751.19 of the Revised Code.

    (8) The health insuring corporation, or any agent or representative of the corporation,
    has advertised, merchandised, or solicited on its behalf in contravention of the
    requirements of section 1751.31 of the Revised Code.

    (9) The health insuring corporation has unlawfully discriminated against any enrollee
    or prospective enrollee with respect to enrollment, disenrollment, or price or
    quality of health care services.

    (10) The continued operation of the health insuring corporation would be hazardous
    or otherwise detrimental to its enrollees.

    (11) The health insuring corporation has submitted false information in any filing
    or submission required under this chapter or any rule adopted under this chapter.

    (12) The health insuring corporation has otherwise failed to substantially comply
    with this chapter or any rule adopted under this chapter.

    (13) The health insuring corporation is not operating a health care plan.

    (14) The health insuring corporation has failed to comply with any of the requirements
    of sections 1751.77 to 1751.87 or Chapter 3922. of the Revised Code.

    (B) A certificate of authority shall be suspended or revoked only after compliance
    with the requirements of Chapter 119. of the Revised Code.

    (C) When the certificate of authority of a health insuring corporation is suspended,
    the health insuring corporation, during the period of suspension, shall not enroll
    any additional subscribers or enrollees except newborn children or other newly
    acquired dependents of existing subscribers or enrollees, and shall not engage
    in any advertising or solicitation whatsoever.

    (D) When the certificate of authority of a health insuring corporation is revoked,
    the health insuring corporation, following the effective date of the order of
    revocation, shall conduct no further business except as may be essential to the
    orderly conclusion of the affairs of the health insuring corporation. The health
    insuring corporation shall engage in no further advertising or solicitation whatsoever.
    The superintendent, by written order, may permit such further operation of the
    health insuring corporation as the superintendent may find to be in the best interest
    of enrollees, to the end that enrollees will be afforded the greatest practical
    opportunity to obtain continuing health care coverage.'
