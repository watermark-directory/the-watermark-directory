- number: '1707.151'
  heading: Application for and issuance of investment adviser's license
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) Application for an investment adviser''s license shall be made in accordance
    with this section and by filing with the division of securities the information,
    materials, and forms specified in rules adopted by the division.

    (B)(1) The division may investigate any applicant for a license and may require
    any additional information as it considers necessary to determine the applicant''s
    business repute and qualifications to act as an investment adviser.

    (2) If the application for any license involves investigation outside of this
    state, the applicant may be required by the division to advance sufficient funds
    to pay any of the actual expenses of the examination. The division shall furnish
    the applicant with an itemized statement of such expenses that the applicant is
    required to pay.

    (C) The division shall by rule require a natural person who is an applicant for
    an investment adviser''s license to pass an examination designated by the division
    or achieve a specified professional designation.

    (D) An investment adviser licensed under section 1707.141 of the Revised Code
    shall employ only investment adviser representatives licensed, or exempted from
    licensure, under section 1707.161 of the Revised Code.

    (E)(1) Except as provided in division (E)(2) of this section, if the division
    finds that the applicant is of good business repute, appears to be qualified to
    act as an investment adviser, and has complied with this chapter and rules adopted
    under this chapter by the division, the division, upon payment of the fees prescribed
    by division (B) of section 1707.17 of the Revised Code, shall issue to the applicant
    a license authorizing the applicant to act as an investment adviser.

    (2) The division shall issue a license to act as an investment adviser in accordance
    with Chapter 4796. of the Revised Code to an applicant if either of the following
    applies:

    (a) The applicant holds a license in another state.

    (b) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as an investment adviser
    in a state that does not issue that license.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.151
- number: '1707.16'
  heading: Application for and issuance of salesperson's license
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) Every salesperson of securities must be licensed by the division of securities
    and shall be employed, authorized, or appointed only by the licensed dealer specified
    in the salesperson''s license. If the relationship between the salesperson and
    the dealer is severed, the salesperson''s license shall be void.

    (B) Application for a salesperson''s license shall be made in accordance with
    this section and by filing with the division the information, materials, and forms
    specified in rules adopted by the division, along with all of the following information:

    (1) The name and complete residence and business addresses of the applicant;

    (2) The name of the dealer who is employing the applicant or who intends to employ
    the applicant;

    (3) The applicant''s age and education, and the applicant''s experience in the
    sale of securities; whether the applicant has ever been licensed by the division,
    and if so, when; whether the applicant has ever been refused a license by the
    division; and whether the applicant has ever been licensed or refused a license
    or any similar permit by any division or commissioner of securities, whatsoever
    name known or designated, anywhere.

    (C) The division shall by rule require an applicant to pass an examination designated
    by the division.

    (D)(1) Except as provided in division (D)(2) of this section, if the division
    finds that the applicant is of good business repute, appears to be qualified to
    act as a salesperson of securities, and has fully complied with this chapter,
    and that the dealer named in the application is a licensed dealer, the division
    shall, upon payment of the fees prescribed by section 1707.17 of the Revised Code,
    issue a license to the applicant authorizing the applicant to act as salesperson
    for the dealer named in the application.

    (2) The division shall issue a license to act as a salesperson of securities in
    accordance with Chapter 4796. of the Revised Code to an applicant if either of
    the following applies:

    (a) The applicant holds a license in another state.

    (b) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a salesperson of securities
    in a state that does not issue that license.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.16
- number: '1707.161'
  heading: Investment adviser representative's license required - exceptions - application
    for and issuance of investment adviser representative's license
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) No person shall act as an investment adviser representative, unless one
    of the following applies:

    (1) The person is licensed as an investment adviser representative by the division
    of securities.

    (2) The person is a natural person who is licensed as an investment adviser by
    the division, and does not act as an investment adviser representative for another
    investment adviser; however, a natural person who is licensed as an investment
    adviser by the division may act as an investment adviser representative for another
    investment adviser if the natural person also is licensed by the division, or
    is properly excepted from licensure, as an investment adviser representative of
    the other investment adviser.

    (3) The person is employed by or associated with an investment adviser registered
    under section 203 of the "Investment Advisers Act of 1940," 15 U.S.C. 80b-3, and
    does not have a place of business in this state.

    (4) The person is employed by or associated with an investment adviser that is
    excepted from licensure pursuant to division (A)(3), (4), (5), or (6) of section
    1707.141 of the Revised Code or excepted from notice filing pursuant to division
    (B)(3) of section 1707.141 of the Revised Code.

    (B)(1) No investment adviser representative required to be licensed under this
    section shall act as an investment adviser representative for more than two investment
    advisers. An investment adviser representative that acts as an investment adviser
    representative for two investment advisers shall do so only after the occurrence
    of both of the following:

    (a) Being properly licensed, or properly excepted from licensure under this section,
    as an investment adviser representative for both investment advisers;

    (b) Complying with the requirements set forth in rules adopted by the division
    regarding consent of both investment advisers and notice.

    (2) Nothing in this section shall be construed to prohibit a natural person from
    being licensed by the division as both an investment adviser and an investment
    adviser representative.

    (3) Nothing in this section shall be construed to prohibit a natural person from
    being licensed by the division as both a salesperson and an investment adviser
    representative.

    (4) Nothing in this section shall be construed to prohibit a natural person from
    being licensed by the division as both a dealer and an investment adviser representative.

    (C) An investment adviser representative''s license issued under this section
    shall not be effective during any period when the investment adviser representative
    is not employed by or associated with an investment adviser that is licensed by
    the division or that is in compliance with the notice filing requirements of division
    (B) of section 1707.141 of the Revised Code. Notice of the commencement and termination
    of the employment or association of an investment adviser representative licensed
    under this section shall be given to the division within thirty days after the
    commencement or termination by either of the following:

    (1) The investment adviser, in the case of an investment adviser representative
    licensed under this section and employed by or associated with, or formerly employed
    by or associated with, an investment adviser licensed under section 1707.141 of
    the Revised Code;

    (2) The investment adviser representative, in the case of an investment adviser
    representative licensed under this section and employed by or associated with,
    or formerly employed by or associated with, an investment adviser that is subject
    to the notice filings requirements of division (B) of section 1707.141 of the
    Revised Code.

    (D)(1) Application for an investment adviser representative license shall be made
    in accordance with this section and by filing with the division the information,
    materials, and forms specified in rules adopted by the division.

    (2) The division shall by rule require an applicant to pass an examination designated
    by the division or achieve a specified professional designation.

    (3) Prior to issuing the investment adviser representative license, the division
    may require the applicant to reimburse the division for the actual expenses incurred
    in investigating the applicant. An itemized statement of any such expenses that
    the applicant is required to pay shall be furnished to the applicant by the division.

    (E)(1) Except as provided in division (E)(2) of this section, if the division
    finds that the applicant is of good business repute, appears to be qualified to
    act as an investment adviser representative, and has complied with sections 1707.01
    to 1707.50 of the Revised Code and the rules adopted under those sections by the
    division, the division, upon payment of the fees prescribed by division (B) of
    section 1707.17 of the Revised Code, shall issue to the applicant a license authorizing
    the applicant to act as an investment adviser representative for the investment
    adviser, or investment advisers that are under common ownership or control, named
    in the application.

    (2) The division shall issue a license to act as an investment adviser representative
    in accordance with Chapter 4796. of the Revised Code to an applicant if either
    of the following applies:

    (a) The applicant holds a license in another state.

    (b) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as an investment adviser
    representative in a state that does not issue that license.'
