- number: '1702.59'
  heading: Filing of verified statement of continued existence
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Every nonprofit corporation, incorporated under the general corporation
    laws of this state, or previous laws, or under special provisions of the Revised
    Code, or created before September 1, 1851, which corporation has expressedly or
    impliedly elected to be governed by the laws passed since that date, and whose
    articles or other documents are filed with the secretary of state, shall file
    with the secretary of state a verified statement of continued existence, signed
    by a director, officer, or three members in good standing, setting forth the corporate
    name, the place where the principal office of the corporation is located, the
    date of incorporation, the fact that the corporation is still actively engaged
    in exercising its corporate privileges, and the name and address of its agent
    appointed pursuant to section 1702.06 of the Revised Code.

    (B) Each corporation required to file a statement of continued existence shall
    file it with the secretary of state within each five years after the date of incorporation
    or of the last corporate filing.

    (C) Corporations specifically exempted by division (N) of section 1702.06 of the
    Revised Code, or whose activities are regulated or supervised by another state
    official, agency, bureau, department, or commission are exempted from this section.

    (D) The secretary of state shall give notice by ordinary or electronic mail and
    provide a form for compliance with this section to each corporation required by
    this section to file the statement of continued existence, such notice and form
    to be mailed to the last known physical or electronic mail address of the corporation
    as it appears on the records of the secretary of state or which the secretary
    of state may ascertain upon a reasonable search.

    (E) If any nonprofit corporation required by this section to file a statement
    of continued existence fails to file the statement required every fifth year,
    then the secretary of state shall cancel the articles of such corporation, make
    a notation of the cancellation on the records, and mail to the corporation a certificate
    of the action so taken.

    (F) A corporation whose articles have been canceled may be reinstated by filing,
    within two years of the cancellation, an application for reinstatement and paying
    to the secretary of state the fee specified in division (Q) of section 111.16
    of the Revised Code. The name of a corporation whose articles have been canceled
    shall be reserved for a period of one year after the date of cancellation. If
    the reinstatement is not made within one year from the date of the cancellation
    of its articles of incorporation and it appears that a corporate name, limited
    liability company name, limited liability partnership name, limited partnership
    name, or trade name has been filed, the name of which is not distinguishable upon
    the record as provided in section 1702.06 of the Revised Code, the applicant for
    reinstatement shall be required by the secretary of state, as a condition prerequisite
    to such reinstatement, to amend its articles by changing its name. A certificate
    of reinstatement may be filed in the recorder''s office of any county in the state,
    for which the recorder shall charge and collect a base fee of one dollar for services
    and a housing trust fund fee of one dollar pursuant to section 317.36 of the Revised
    Code. The rights, privileges, and franchises of a corporation whose articles have
    been reinstated are subject to section 1702.60 of the Revised Code.

    (G) The secretary of state shall furnish the tax commissioner a list of all corporations
    failing to file the required statement of continued existence.'
