- number: '1701.29'
  heading: Organizing and financing expenses
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: A corporation may pay as cost of organization or reorganization the reasonable
    expenses incident thereto, and it may also pay or allow reasonable expenses, compensation,
    or discount for the sale, underwriting, or purchase of any of its shares; such
    payment or allowance shall not have the effect of rendering shares not fully paid
    and nonassessable.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.29
- number: '1701.30'
  heading: Stated capital
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Every corporation shall have and shall carry upon its books a stated
    capital for each class of outstanding shares with par value and for each class
    of outstanding shares having preference in the event of the involuntary liquidation
    of the corporation. Every corporation may have and, if it does have, shall carry
    upon its books a stated capital for any other class of outstanding shares. The
    stated capital of each outstanding share with par value shall be not less than
    its par value. The stated capital of the corporation shall be the aggregate stated
    capital of all classes of outstanding shares. If a particular class has stated
    capital, the stated capital of every share of that class outstanding at a particular
    time shall be identical.

    (B) Subject to division (A) of this section:

    (1) The stated capital of shares with stated capital that are issued or disposed
    of otherwise than upon conversion, change, exchange, merger, consolidation, or
    reorganization is the amount of consideration for such shares, unless prior to
    the execution and delivery of the certificates for such shares, the incorporators,
    directors, or shareholders, as the case may be, who fix the consideration or otherwise
    determine the value of any consideration for such shares, specify, in a manner
    not inconsistent with this section, the portion of the consideration that constitutes
    stated capital, whereupon any excess over such portion (except to the extent entered
    on the books of a transferee corporation as earned surplus in the manner provided
    in division (H)(3) of section 1701.32 of the Revised Code upon a combination)
    is capital surplus; except that in the case of shares having preference in the
    event of involuntary liquidation of the corporation, the portion of the consideration
    that constitutes stated capital shall be not less than the lesser of the entire
    consideration for such shares or the amount of such preference.

    (2) Unless the express terms of convertible shares provide that upon the exercise
    of conversion rights the stated capital of the corporation shall be determined
    otherwise than as provided in this section and in a manner not inconsistent with
    this section, the stated capital, if any, of the shares issued upon the exercise
    of such conversion rights shall be the stated capital, if any, of the convertible
    shares so converted.

    (3) Unless the terms of convertible obligations provide that upon the exercise
    of conversion rights the stated capital, if any, of the corporation shall be determined
    otherwise than as provided in this section and in a manner not inconsistent with
    this section, the stated capital, if any, of the shares issued upon the exercise
    of such conversion rights shall be an amount equal to the principal amount of
    the convertible obligations so converted.

    (4) Unless the amendment to the articles that effects any change in outstanding
    shares provides that upon such change the stated capital of the corporation shall
    be created, increased, reduced, or eliminated in a manner not inconsistent with
    this section, the stated capital, if any, of the shares issued upon such change
    shall be the stated capital, if any, of the shares so changed.

    (5) Unless the terms of an exchange of shares provide that upon such exchange
    the stated capital of the corporation shall be created, increased, reduced, or
    eliminated in a manner not inconsistent with this section, the stated capital,
    if any, of the shares issued upon such exchange shall be the stated capital, if
    any, of the shares so exchanged.

    (6) The stated capital, if any, of each class of shares to be outstanding at the
    time a merger, consolidation, or reorganization becomes effective shall be the
    amount set forth or provided for, in a manner not inconsistent with this section,
    in the agreement of merger, agreement of consolidation, or plan of reorganization.

    (C) The stated capital of a class of outstanding shares with or without par value
    may be created or increased by a transfer from any surplus however created to
    stated capital by order of the directors for the purpose of creating or increasing
    such stated capital or upon payment of dividends or distributions in shares of
    such class, and may be reduced or eliminated in any way provided for in section
    1701.31 of the Revised Code.

    (D) When a corporation having outstanding shares of more than one class has a
    stated capital applicable to two or more of the classes and the amount of stated
    capital of a particular class cannot otherwise be readily determined, the directors
    of the corporation may make such determination, subject to division (A) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.30
- number: '1701.31'
  heading: Reduction of stated capital
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: 'A corporation shall not take any action which will require or result in reduction
    of the stated capital of each outstanding share with par value, to less than the
    par value of such share. Subject to such limitation and to such provisions as
    are set forth in the articles or in any contract or obligation:

    (A) Whenever an outstanding redeemable share is redeemed by the corporation, or
    an outstanding share is purchased or otherwise acquired by the issuing corporation
    (otherwise than upon conversion, change, or exchange), the stated capital, if
    any, of the class to which such redeemed, purchased, or acquired share belongs
    shall thereby be reduced by an amount equal to the stated capital, if any, of
    such share;

    (B) Whenever an outstanding share is released from subscription, the stated capital,
    if any, of the class to which such share belongs shall thereby be reduced by an
    amount equal to the stated capital, if any, of such share;

    (C) Upon the exercise of conversion rights of convertible shares, the stated capital,
    if any, of the corporation shall be reduced if and to the extent that the express
    terms of such shares so provide;

    (D) The stated capital of the corporation shall be reduced or eliminated, in a
    manner not inconsistent with section 1701.30 of the Revised Code, to the extent
    and in the manner that such reduction or elimination is provided for in an amendment
    to the articles described in division (B)(8) of section 1701.69 of the Revised
    Code;

    (E) The stated capital, if any, of a particular class of shares may also be reduced
    or eliminated, in a manner not inconsistent with section 1701.30 of the Revised
    Code, by resolution adopted at a meeting of shareholders held for such purpose,
    by the affirmative vote of the holders of two-thirds of the shares of each class,
    regardless of limitations or restrictions in the articles on the voting rights
    of the shares of any such class, or, if the articles so provide or permit, a greater
    or lesser proportion, but not less than a majority of the shares of any class.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.31
- number: '1701.32'
  heading: Surplus
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) The surplus of a corporation is the excess of its assets over its liabilities
    plus stated capital, if any. The earned surplus of a corporation is the net balance
    of its net profits, income, gains, and losses from the date of incorporation,
    except as otherwise provided in this section, or from the latest date on which
    a deficit in earned surplus was eliminated by application of capital surplus or
    otherwise, after deducting distributions to shareholders and transfers to stated
    capital and capital surplus to the extent that such distributions and transfers
    are made out of earned surplus. Surplus other than earned surplus is capital surplus.

    Determinations under this section may be based upon financial statements prepared
    on the basis of accounting practices and principles that are reasonable in the
    circumstances, and may make use of the equity method of accounting.

    (B) Capital surplus shall be classified according to its derivation and so shown
    on the books of the corporation, and each balance sheet shall show separately
    any capital surplus arising from unrealized appreciation of assets, other capital
    surplus, and earned surplus.

    (C) If a corporation accepts a voluntary contribution of property other than its
    own issued shares, the directors may order all or a part of the fair value of
    such property to the corporation, as determined by the directors, to be entered
    on its books, and thereby create or add to capital surplus.

    (D) In addition to any determination permitted under division (A) of this section,
    if the directors of a corporation determine that tangible or intangible assets
    of the corporation have a fair value to it in excess of the amount at which they
    are carried on its books, they may order all or a part of such excess so determined
    to be entered on its books, and thereby create or add to capital surplus.

    (E) In addition to any determination permitted under division (A) of this section,
    the directors of a corporation that owns shares in another domestic or foreign
    corporation may, if they believe in good faith that the books of the issuing corporation
    are kept according to generally accepted accounting principles, order such shares
    to be carried on the books of the corporation owning them at the value shown on
    the books of the issuing corporation, and thereby create or add to the capital
    surplus of the corporation owning such shares. When shares are carried on such
    basis, the balance sheets of the corporation owning them shall contain a statement
    to that effect.

    (F) The directors may order transfers from any surplus however created to stated
    capital of shares with or without par value, and from earned surplus to capital
    surplus.

    (G) Pursuant to a resolution adopted by the affirmative vote of the holders of
    two-thirds of the shares of each class, regardless of limitations or restrictions
    in the articles on the voting rights of the shares of any such class or, if the
    articles so provide or permit, a greater or lesser proportion, but not less than
    a majority, of the shares of any class, a corporation may apply all or any part
    of capital surplus to the reduction or writing off of any deficit in earned surplus,
    or to the creation of a reserve for any proper purpose, and thereby make available
    for dividends or distributions, without notice to the shareholders as to the source
    of such dividends or distributions, any earned surplus remaining, or thereafter
    arising, but in case such action is taken, a record of it shall be made on the
    books of the corporation and shall appear on each balance sheet of the corporation
    for a period of not less than five years thereafter.

    (H)(1) In the case of a merger of one or more domestic or foreign corporations
    into a domestic surviving corporation, the directors of the surviving corporation
    may order entered on its books all or part of the earned surplus of the other
    constituent corporations, diminished by any deficit in earned surplus of any constituent
    corporation, and thereby create, add to, or diminish the earned surplus of the
    surviving corporation.

    (2) In the case of a consolidation of a domestic corporation with one or more
    domestic or foreign corporations into a new domestic corporation, the directors
    of the new corporation may order entered on its books all or part of the earned
    surplus of each of the constituent corporations, diminished by any deficit in
    earned surplus of any constituent corporation, and thereby create earned surplus
    of the new corporation.

    (3) In the case of a combination, the directors of the acquiring corporation may
    order entered on its books all or part of the earned surplus of the transferor
    corporations, diminished by any deficit in earned surplus of any such corporation,
    and thereby create, add to, or diminish the earned surplus of the acquiring corporation.

    (4) In the case of a dissolution of a domestic or foreign subsidiary corporation,
    all shares of which are owned by a domestic corporation, the directors of the
    parent corporation may order entered on its books all or part of the earned surplus
    of the subsidiary and thereby create or add to the earned surplus of the parent.

    (5) The action of the directors of a corporation in creating or adding to earned
    surplus, as provided in this division, must be taken, if at all, not later than
    ninety days after the end of the fiscal year of such corporation in which the
    merger, consolidation, combination, or dissolution becomes effective.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.32
- number: '1701.33'
  heading: Dividends and distributions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: 'The directors may declare dividends and distributions on outstanding shares
    of the corporation, subject to the following provisions:

    (A) A dividend or distribution may be paid in cash, property, or shares of the
    corporation. The dividend or distribution shall not exceed the combination of
    the surplus of the corporation and the difference between the following:

    (1) The reduction in surplus that results from the immediate recognition of the
    transition obligation under statement of financial accounting standards no. 106
    (SFAS no. 106), issued by the financial accounting standards board;

    (2) The aggregate amount of the transition obligation that would have been recognized
    as of the date of the declaration of a dividend or distribution if the corporation
    had elected to amortize its recognition of the transition obligation under statement
    of financial accounting standards no. 106.

    (B) A dividend or distribution may be paid in treasury shares or in authorized
    but unissued shares. If paid in shares with par value, there shall be transferred
    from any surplus, however created, to stated capital, the amount, if any, that
    is necessary in order that the stated capital represented by the outstanding shares
    with par value, after giving effect to the dividend or distribution, will be equal
    to the aggregate par value of the shares, or, if the directors so determine, a
    greater amount shall be so transferred. If paid in shares without par value, there
    shall be transferred from any surplus, however created, to stated capital, only
    the amount, if any, that the directors determine.

    (C) No dividend or distribution shall be paid to the holders of shares of any
    class in violation of the rights of the holders of shares of any other class,
    or when the corporation is insolvent or there is reasonable ground to believe
    that by such payment it would be rendered insolvent.

    (D) No dividend or distribution on shares of any class shall be paid in shares
    of another class if any of the authorized shares of the latter class are already
    outstanding, unless either the articles so provide or the payment is authorized
    by the affirmative vote of the holders of at least two-thirds of the shares of
    the class in which payment is to be made.

    (E) If the articles of a corporation engaged in whole or in part in the exploitation
    of mines, timber, oil wells, gas wells, quarries, or other natural resources so
    provide, the corporation may compute its surplus for the purpose of paying dividends
    and distributions without making any deduction or allowance for the depletion
    of such assets incidental to the exploitation and sale of them.

    (F) When any portion of a dividend or distribution is paid out of capital surplus,
    the corporation, at the time of paying the dividend or distribution, shall notify
    the shareholders receiving the dividend or distribution as to the kind of surplus
    out of which the dividend or distribution is paid.

    (G) When a dividend or distribution is to be paid in authorized but unissued shares
    of the corporation, the directors may provide that the dividend or distribution
    shall also be paid on treasury shares of the same class.

    (H) The effect of a dividend or distribution is measured as of the date the dividend
    or distribution is authorized if the payment occurs one hundred twenty days or
    less after the date of authorization or as of the date the payment is made if
    it occurs more than one hundred twenty days after the date of authorization. If
    a corporation pays a dividend or distribution by delivering an obligation or other
    evidence of indebtedness, the date of the delivery is the date upon which the
    effect of the dividend or distribution is measured.

    (I) A corporation''s indebtedness to a shareholder incurred by reason of a dividend
    or distribution made in accordance with this section is at parity with the corporation''s
    indebtedness to its general, unsecured creditors, except to the extent subordinated
    by agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.33
- number: '1701.34'
  heading: Recovery of unclaimed dividend or distribution
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: If a corporation has declared a cash dividend or distribution on any shares
    and has mailed to a shareholder at his address appearing on the records of the
    corporation a valid check in the amount of the dividend or distribution to which
    such shareholder is entitled, and such check would have been honored if duly presented
    to the bank on which it is drawn, no action for the recovery of such dividend
    or distribution or the amount thereof shall be brought by the shareholder or other
    person entitled to such dividend or distribution more than six years after the
    date of mailing the check.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.34
- number: '1701.35'
  heading: Purchase of own shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) A corporation by its directors may purchase shares of any class issued
    by it, in any of the following instances:

    (1) When the articles authorize the redemption of such shares and do not prohibit
    such purchase;

    (2) To collect or compromise a debt, claim, or controversy in good faith;

    (3) From a subscriber whose shares have not been paid for in full, or in settlement
    or compromise of a subscription;

    (4) For offering and sale, or the grant of options with respect thereto, to any
    or all of the employees of the corporation or of subsidiary corporations or to
    a trustee on their behalf, under any plan adopted or to be adopted by the directors
    for that purpose;

    (5) From a person who has purchased such shares from the corporation under an
    agreement reserving to the corporation the right to repurchase or obligating it
    to repurchase;

    (6) To avoid the issuance of or to eliminate fractional shares;

    (7) When the articles in substance provide that the corporation shall have a right
    to repurchase if and when any shareholder desires to, or on the happening of any
    event is required to, sell such shares;

    (8) From a shareholder who by reason of dissent is entitled to be paid the fair
    cash value of his shares;

    (9) When authorized by the shareholders at a meeting called for such purpose,
    by the affirmative vote of the holders of two-thirds of the shares of each class,
    regardless of limitations or restrictions in the articles on the voting rights
    of the shares of any such class, or if the articles so provide or permit, a greater
    or lesser proportion, but not less than a majority, of the shares of any class;

    (10) When authorized by the articles or by such vote or consent of holders of
    such proportion of shares, though less than a majority, of any one or more classes
    as is provided in the articles.

    (B) A corporation shall not purchase its own shares except as provided in this
    section, nor shall a corporation purchase or redeem its own shares if immediately
    thereafter its assets would be less than its liabilities plus its stated capital,
    if any, or if the corporation is insolvent, or if there is reasonable ground to
    believe that by such purchase or redemption it would be rendered insolvent.

    (C) Shares issued by a corporation which owns or controls shares entitling it
    to elect a majority of the directors of another corporation may be purchased by
    such last mentioned corporation only when and if such shares could be purchased
    by the issuing corporation pursuant to division (A)(9) or (10) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.35
- number: '1701.36'
  heading: Shares deemed retired
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Whenever convertible shares are converted into shares of another class,
    the shares surrendered upon such conversion shall be deemed retired and shall
    not be reissued as convertible shares.

    (B) Whenever redeemable shares are redeemed, purchased, or otherwise acquired
    by the corporation, such shares shall be deemed retired.

    (C) Shares released from subscription shall be deemed retired.

    (D) Unless otherwise provided in the articles, the directors may retire treasury
    shares.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.36
- number: '1701.37'
  heading: Corporation to keep books and records of account, minutes of proceedings
    and records of shareholders
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Each corporation shall keep correct and complete books and records of
    account, together with minutes of the proceedings of its incorporators, shareholders,
    directors, and committees of the directors, and records of its shareholders showing
    their names and addresses and the number and class of shares issued or transferred
    of record to or by them from time to time.

    (B) Upon request of any shareholder at any meeting of shareholders, there shall
    be produced at such meeting an alphabetically arranged list, or classified lists,
    of the shareholders of record as of the applicable record date, who are entitled
    to vote, showing their respective addresses and the number and class of shares
    held by each. Such list or lists when certified by the officer or agent in charge
    of the transfers of shares shall be prima-facie evidence of the facts shown therein.
    If the meeting is to be held solely or in part by means of communications equipment,
    then the corporation shall make the list or lists open to the examination of any
    shareholder or proxyholder during the whole time of the meeting on a reasonably
    accessible electronic network. The directors may adopt guidelines and procedures
    to permit the corporation to verify that any person accessing the list or lists
    is a shareholder or proxyholder.

    (C) Any shareholder of the corporation, upon written demand stating the specific
    purpose thereof, shall have the right to examine in person or by agent or attorney
    at any reasonable time and for any reasonable and proper purpose, the articles
    of the corporation, its regulations, its books and records of account, minutes,
    and records of shareholders aforesaid, and voting trust agreements, if any, on
    file with the corporation, and to make copies or extracts thereof. Any written
    demand by an acquiring person to examine the records of shareholders for the purpose
    of communicating with shareholders of the issuing public corporation in connection
    with a meeting of shareholders called pursuant to section 1701.831 of the Revised
    Code shall be deemed to have been made by a shareholder of the issuing public
    corporation for a reasonable and proper purpose.

    (D) Unless otherwise prohibited by law, if a shareholder has authorized the corporation
    to deliver notices of shareholder meetings required by section 1701.41 of the
    Revised Code to the shareholder by any means other than mail and has not rescinded
    that authorization, the corporation shall include the electronic mail address
    or other electronic contact information necessary to deliver the notice on any
    list or lists of shareholders prepared pursuant to division (B) or (C) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.37
- number: '1701.38'
  heading: Annual report
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) At the annual meeting of shareholders, or the meeting held in lieu of
    it, every corporation, except a banking corporation, shall lay before the shareholders
    financial statements, which may be consolidated, and, as applicable, written statements
    or reports, consisting of:

    (1) A balance sheet containing a summary of the assets, liabilities, stated capital,
    if any, and surplus (showing separately any capital surplus arising from unrealized
    appreciation of assets, other capital surplus, and earned surplus) as of the end
    of the corporation''s most recent fiscal year, except that, if consolidated financial
    statements are laid before the shareholders, the consolidated balance sheet shall
    show separately or disclose by a note the amount of consolidated surplus that
    does not constitute under the Revised Code earned surplus of the corporation or
    any of its subsidiaries and that is not classified as stated capital or capital
    surplus on the consolidated balance sheet;

    (2) A statement of profit and loss and surplus, including a summary of profits,
    dividends or distributions paid, and other changes in the surplus accounts, for
    the period commencing with the date marking the end of the period for which the
    last preceding statement of profit and loss required under this section was made
    and ending with the date of the balance sheet or, in the case of the first statement
    of profit and loss, for the period commencing with the date of incorporation of
    the corporation and ending with the date of the balance sheet;

    (3) If the corporation is a benefit corporation, any written statement or report
    required by the articles, regulations, or a written agreement of the benefit corporation
    concerning the beneficial purposes of the benefit corporation and the activities
    of the benefit corporation toward those beneficial purposes and related provisions
    set forth in the corporation''s articles.

    (B) The financial statements shall have appended to them an opinion signed by
    the president or a vice-president or the treasurer or an assistant treasurer of
    the corporation or by a public accountant or firm of public accountants to the
    effect that the financial statement presents fairly the financial position of
    the corporation and the results of its operations in conformity with generally
    accepted accounting principles applied on a basis consistent with that of the
    preceding period, or to the effect that the financial statements have been prepared
    on the basis of accounting practices and principles that are reasonable in the
    circumstances.

    (C) Upon request of any shareholder made in writing or by any other means of communication
    authorized by the corporation prior to the date of the meeting described in division
    (A) of this section, the corporation shall send a copy of any financial statements,
    written statements, and reports, as applicable, laid or to be laid before the
    shareholders at the meeting to the shareholder by mail, overnight delivery service,
    or any other means of communication authorized by the shareholder to whom the
    copy is sent on or before the later of the following:

    (1) The fifth day after the receipt of the written request;

    (2) The earlier of the following:

    (a) The fifth day before the date of the meeting;

    (b) The fifth day after the expiration of four months from the date of the balance
    sheet described in division (A)(1) of this section.

    (D) If the meeting described in division (A) of this section is to be held solely
    by means of communications equipment, the corporation shall make the financial
    statements, written statements, and reports described in that division, as applicable,
    open to the examination of any shareholder or proxyholder during the whole time
    of the meeting on a reasonably accessible electronic network. The directors may
    adopt guidelines and procedures to permit the corporation to verify that any person
    accessing the financial statements, written statements, or reports is a shareholder
    or proxyholder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.38
- number: '1701.39'
  heading: Annual meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: An annual meeting of shareholders for the election of directors and the consideration
    of reports to be laid before such meeting shall be held on a date designated by,
    or in the manner provided for in, the articles or in the regulations. In the absence
    of such designation, the annual meeting shall be held on the first Monday of the
    fourth month following the close of each fiscal year of the corporation. When
    the annual meeting is not held or directors are not elected thereat, they may
    be elected at a special meeting called for that purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.39
- number: '1701.40'
  heading: Calling meeting of shareholders
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Meetings of shareholders may be called by any of the following:

    (1) The chairperson of the board, the president, or, in case of the president''s
    absence, death, or disability, the vice-president authorized to exercise the authority
    of the president;

    (2) The directors by action at a meeting, or a majority of the directors acting
    without a meeting;

    (3) Persons who hold twenty-five per cent of all shares outstanding and entitled
    to vote at the meeting, unless the articles, the regulations adopted by the shareholders,
    or the regulations adopted by the directors pursuant to division (A)(1) of section
    1701.10 of the Revised Code specify for that purpose a smaller or larger proportion
    but not in excess of fifty per cent;

    (4) Such other officers or persons as the articles or the regulations authorize
    to call the meetings.

    (B) Meetings of shareholders may be held either within or without this state if
    so provided in the articles or the regulations. The articles or regulations may
    authorize the directors to determine that the meeting shall not be held at any
    physical place, but instead may be held solely by means of communications equipment
    as authorized by division (C) of this section. If the corporation is an issuing
    public corporation and the articles or regulations do not require that a meeting
    be held at a particular physical place and also authorize the directors to fix
    the place of the meeting, the directors may determine that the meeting shall not
    be held at any physical place, but instead may be held solely by means of communications
    equipment as authorized by division (C) of this section. In the absence of any
    such provision, all meetings shall be held at the principal office of the corporation
    in this state.

    (C) If authorized by the directors, the shareholders and proxyholders who are
    not physically present at a meeting of shareholders may attend a meeting of shareholders
    by use of communications equipment that enables the shareholder or proxyholder
    an opportunity to participate in the meeting and to vote on matters submitted
    to the shareholders, including an opportunity to read or hear the proceedings
    of the meeting and to speak or otherwise participate in the proceedings contemporaneously
    with those physically present. Any shareholder using communications equipment
    will be deemed present in person at the meeting whether the meeting is to be held
    at a designated place or solely by means of communications equipment. The directors
    may adopt guidelines and procedures for the use of communications equipment in
    connection with a meeting of shareholders to permit the corporation to verify
    that a person is a shareholder or proxyholder and to maintain a record of any
    vote or other action.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.40
- number: '1701.41'
  heading: Notice of meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Written notice stating the time, place, if any, and purposes of a meeting
    of the shareholders, and the means, if any, by which shareholders can be present
    and vote at the meeting through the use of communications equipment shall be given
    either by personal delivery or by mail, overnight delivery service, or any other
    means of communication authorized by the shareholder to whom the notice is given,
    not less than seven nor more than sixty days before the date of the meeting unless
    the articles, the regulations adopted by the shareholders, or the regulations
    adopted by the directors pursuant to division (A)(1) of section 1701.10 of the
    Revised Code specify a longer period: (1) to every shareholder of record entitled
    to notice of the meeting; (2) by or at the direction of the president or the secretary
    or any other person required or permitted by the regulations to give that notice.
    If mailed or sent by overnight delivery service, the notice shall be sent to the
    shareholder at the shareholder''s address as it appears on the records of the
    corporation. If sent by another means of communication authorized by the shareholder,
    the notice shall be sent to the address furnished by the shareholder for those
    transmissions. Notice of adjournment of a meeting need not be given if the time
    and place, if any, to which it is adjourned and the means, if any, by which shareholders
    can be present and vote at the adjourned meeting through the use of communications
    equipment are fixed and announced at the meeting.

    (B) Upon request in writing delivered either in person or by registered mail to
    the president or the secretary by any persons entitled to call a meeting of shareholders,
    that officer shall forthwith cause to be given to the shareholders entitled to
    notice of a meeting to be held on a date not less than seven nor more than sixty
    days after the receipt of the request, as the officer may fix, unless the articles,
    the regulations adopted by the shareholders, or the regulations adopted by the
    directors pursuant to division (A)(1) of section 1701.10 of the Revised Code specify
    a longer period for this purpose. If the notice is not given within fifteen days
    after the delivery or mailing of the request, or that shorter or longer period
    as the articles, the regulations adopted by the shareholders, or the regulations
    adopted by the directors pursuant to division (A)(1) of section 1701.10 of the
    Revised Code specify for this purpose, the persons calling the meeting may fix
    the time of meeting and give notice of the time of meeting as provided in division
    (A) of this section, or cause the notice to be given by any designated representative.

    (C) Any authorization by a shareholder to send notices given pursuant to this
    chapter by any means other than in person or by mail or overnight delivery service
    is revocable by written notice to the corporation either by personal delivery
    or by mail, overnight delivery service, or any other means of communication authorized
    by the corporation. If sent by another means of communication authorized by the
    corporation, the notice shall be sent to the address furnished by the corporation
    for those transmissions. Any authorization by a shareholder to send notices given
    pursuant to this chapter by any means other than in person or by mail or overnight
    delivery service will be deemed to have been revoked by the shareholder if (1)
    the corporation has attempted to make delivery of two consecutive notices in accordance
    with that authorization, and (2) the secretary or an assistant secretary of the
    corporation, or other person responsible for giving of notice, has received notice
    that, or otherwise believes that, delivery has not occurred. However, an inadvertent
    failure to treat the inability to deliver notice as a revocation will not invalidate
    any meeting of shareholders or other action.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.41
- number: '1701.42'
  heading: Waiver of notice
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: Notice of the time, place, if any, and purposes of any meeting of shareholders
    or directors, as the case may be, whether required by law, the articles, the regulations,
    or (in the case of directors) the bylaws, may be waived in writing, either before
    or after the holding of such meeting, by any shareholder, or by any director,
    which writing shall be filed with or entered upon the records of the meeting.
    The attendance of any shareholder or any director at any such meeting without
    protesting, prior to or at the commencement of the meeting, the lack of proper
    notice shall be deemed to be a waiver by the shareholder or director of notice
    of such meeting. A telegram, cablegram, electronic mail, or an electronic or other
    transmission capable of authentication that appears to have been sent by a person
    described in this section and that contains a waiver by that person is a writing
    for the purposes of this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.42
- number: '1701.43'
  heading: Notice requirements may be dispensed with
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: Any requirement imposed by law, the articles, the regulations, or the bylaws,
    with respect to the giving or sending of any notice or communication to any shareholder
    or director as such whose address as it appears upon the records of the corporation
    is outside of the United States, may be dispensed with, and no action taken shall
    be affected or invalidated by the failure to give or send any such notice or communication
    in so far as compliance with any such requirement is at the time prohibited by,
    or dependent upon the obtaining of a license or consent under, any act of congress
    or any rules, regulations, proclamations, or executive orders issued under authority
    of any such act.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.43
- number: '1701.44'
  heading: Qualifications of voters
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Except to the extent that the voting rights of the shares of any class
    are increased, limited, or denied by the express terms of such shares, and except
    as provided in scrip issued in lieu of a certificate for a fraction of a share,
    each outstanding share regardless of class shall entitle the holder thereof to
    one vote on each matter properly submitted to the shareholders for their vote,
    consent, waiver, release, or other action, subject to the provisions with respect
    to cumulative voting in section 1701.55 of the Revised Code.

    (B) Unless the articles, the regulations adopted by the shareholders, the regulations
    adopted by the directors pursuant to division (A)(1) of section 1701.10 of the
    Revised Code, or the contract of subscription for shares otherwise provides, a
    shareholder shall be entitled to vote even though the shareholder''s shares have
    not been fully paid, but shares upon which an installment of the consideration
    for such shares is overdue and unpaid shall not be voted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.44
- number: '1701.45'
  heading: Director to fix record date
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) For any lawful purpose, including, without limitation, the determination
    of the shareholders who are entitled: (1) to receive notice of or to vote at a
    meeting of shareholders; (2) to receive payment of any dividend or distribution;
    (3) to receive or exercise rights of purchase of or subscription for, or exchange
    or conversion of, shares or other securities, subject to contract rights with
    respect to the shares or securities; or (4) to participate in the execution of
    written consents, waivers, or releases; the directors may fix a record date which
    shall not be a date earlier than the date on which the record date is fixed and,
    in the cases provided for in clauses (1), (2) and (3) above, shall not be more
    than sixty days, unless the articles or the regulations specify a shorter or a
    longer period for that purpose, preceding the date of the meeting of the shareholders,
    or the date fixed for the payment of any dividend or distribution, or the date
    fixed for the receipt or the exercise of rights, as the case may be.

    (B) If a meeting of the shareholders is called by persons entitled to call the
    meeting or action is taken by shareholders without a meeting, and if the directors
    fail or refuse, within the time that the persons calling the meeting or initiating
    other action may request, to fix a record date for the purpose of clause (1) or
    (4) of division (A) of this section, then the persons calling the meeting or initiating
    other action may fix a record date for either of those purposes, subject to the
    limitations set forth in division (A) of this section.

    (C) The record date for the purpose of clause (1) of division (A) of this section
    shall continue to be the record date for all adjournments of such meeting, unless
    the directors or the persons who fixed the original record date, subject to the
    limitations set forth in division (A) of this section, fix another record date,
    and in case a new record date is so fixed, notice of the record date and of the
    date to which the meeting has been adjourned shall be given to shareholders of
    record as of that date in accordance with the same requirements as those applying
    to a meeting newly called.

    (D) The directors may close the share transfer books against transfers of shares
    during the whole or any part of the period provided for in division (A) of this
    section, including the date of the meeting of the shareholders and the period
    ending with the date, if any, to which the meeting is adjourned.

    (E) If no record date is fixed, the record date for determining the shareholders
    who are entitled to receive notice of, or who are entitled to vote at, a meeting
    of shareholders shall be the date next preceding the day on which notice is given,
    or the date next preceding the day on which the meeting is held, as the case may
    be.

    (F) The record date for a change of shares shall be the time when the certificate
    of amendment or of amended articles effecting the change is filed in the office
    of the secretary of state.

    (G) If the directors do not fix a record date for determining shareholders entitled
    to payment of any dividend or distribution, the record date is the date that the
    directors authorize the dividend or distribution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.45
- number: '1701.46'
  heading: Voting by fiduciaries and minors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) As used in this section, "consent" includes, without limitation, waivers,
    releases, and also writings signed by holders of shares in lieu of taking action
    at meetings of shareholders. Objections to consents, in order to be effective
    for the purposes of this section, must be filed with the corporation before the
    consents in question had been acted upon.

    (B) Fiduciaries and minors may vote and execute consents in respect of shares
    which stand of record in their respective names.

    (C) When any person has furnished to the issuing corporation proof, satisfactory
    to it, of his appointment and qualification as: executor under the last will of
    a deceased holder of record of its shares; an administrator of the estate of such
    a holder; a guardian, committee, or conservator of the estate of a ward or incompetent
    who is holder of record of its shares; a trustee in bankruptcy of such a holder;
    or a statutory or judicial receiver or liquidator of the estate or affairs of
    such a holder; such fiduciary may vote and execute consents with respect to such
    shares as though he were the holder of record thereof.

    (D) When any other fiduciary has furnished to the issuing corporation proof, satisfactory
    to it, of his authority to do so, he may vote and execute consents and objections
    to consents with respect to shares not of record in his name.

    (E) If shares stand of record in the names of two or more persons, whether fiduciaries,
    joint tenants, tenants in common, or otherwise, or if two or more persons have
    the same fiduciary relationship respecting such shares, then in the absence of
    proof satisfactory to the issuing corporation to the contrary, (1) with respect
    to voting and executing consents and objections to consents, if more than one
    person attends the meeting, a majority of those attending if they concur in any
    action may act for all; if more than one acts in executing consents or objections
    to consents and the number executing consents shall exceed the number executing
    objections to consents, the former may act for all; and likewise if the number
    executing objections to consents shall exceed the number executing consents, the
    greater number may act for all; if only one of said persons attends the meeting,
    or executes a consent and no other of said persons executes an objection to such
    consent, then that one may act for all; and if an even number attend the meeting
    and a majority of all the persons so attending do not agree on any particular
    issue, or if one or more execute consents and a like number execute objections
    to consents, each person so attending or executing consents or objections to consents
    may act with respect to an equal number of shares; (2) in the exercise of any
    other rights of ownership with respect to such shares, a majority of all such
    persons may act for all.

    (F) This section does not enlarge or affect the rights or obligations of a holder
    of record of shares or of a fiduciary or a minor with respect to any person other
    than the corporation issuing such shares and its agents or representatives, including,
    without limitation, inspectors of election, concerned with the exercise of the
    powers referred to in this section.

    (G) A holder of record of shares and a fiduciary who is not a holder of record
    of shares may not vote or execute consents or objections to consents contrary
    to the order of a court of competent jurisdiction in a proceeding to which the
    corporation is a party, or contrary to a judgment, order, or decree of a court
    of competent jurisdiction terminating, suspending, or restricting such rights
    of the holder of record of such shares or the fiduciary relationship with respect
    thereto, or the competency or authority of such holder or fiduciary, or transferring
    to or vesting in another person such relationships or rights of ownership of such
    shares, or directing the manner in which the powers of such holder or fiduciary
    shall be exercised, a certified copy of which judgment, order, or decree shall
    have been filed with the corporation prior to the exercise of the powers in question.

    (H) The powers referred to in this section, of a minor and, in the absence of
    proof satisfactory to the issuing corporation to the contrary, of a fiduciary,
    may be exercised in person or by proxy appointed in writing, and such proxy may
    be vested with discretionary authority.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.46
- number: '1701.47'
  heading: Voting by corporations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) When any domestic corporation, non-profit or for profit, holds shares
    of a domestic or foreign corporation, the chairman of the board, the president,
    any vice-president, the secretary, or the treasurer of the corporation holding
    such shares, and any such officer or cashier or trust officer of a banking or
    trust corporation holding shares of a domestic or foreign corporation, and any
    like officer of a foreign corporation, non-profit or for profit, or of a foreign
    banking or trust corporation, holding shares of a domestic corporation, shall
    conclusively be deemed to have authority to vote on behalf of the corporation
    holding such shares, and to appoint proxies and to execute consents, waivers,
    and releases on its behalf, unless before a vote is taken or a consent, waiver,
    or release is acted upon it appears by a certified copy of the regulations, the
    bylaws, or a resolution of the trustees, directors, or executive committee of
    said corporation that such authority does not exist or is vested in some other
    officer or person.

    (B) For the purposes of this section, a person exercising such authority as such
    officer is prima-facie deemed to be duly elected, qualified, and acting as such
    officer.

    (C) No corporation shall directly or indirectly vote any shares issued by it.
    Shares which under this division of this section are not entitled to be voted
    shall not be considered as outstanding for the purpose of computing the voting
    power of the corporation or of shares of any class.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.47
- number: '1701.48'
  heading: Voting by proxy
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) A person who is entitled to attend a shareholders'' meeting, to vote
    at a shareholders'' meeting, or to execute consents, waivers, or releases may
    be represented at the meeting or vote at the meeting, may execute consents, waivers,
    and releases, and may exercise any of the person''s other rights, by proxy or
    proxies appointed by a writing signed by the person or appointed by a verifiable
    communication authorized by the person.

    (B) Any transmission that creates a record capable of authentication, including,
    but not limited to, a telegram, a cablegram, electronic mail, or an electronic,
    telephonic, or other transmission, that appears to have been transmitted by a
    person described in division (A) of this section, and that appoints a proxy is
    a sufficient verifiable communication to appoint a proxy. A photographic, photostatic,
    facsimile transmission, or equivalent reproduction of a writing that is signed
    by a person described in division (A) of this section and that appoints a proxy
    is a sufficient writing to appoint a proxy.

    (C) No appointment of a proxy is valid after the expiration of eleven months after
    it is made unless the writing or verifiable communication specifies the date on
    which it is to expire or the length of time it is to continue in force. No proxy
    appointed for or in connection with the shareholder authorization of a control
    share acquisition pursuant to section 1701.831 of the Revised Code is valid if
    it provides that it is irrevocable or if it is sought, appointed, and received
    other than both:

    (1) In accordance with all applicable requirements of the law of this state and
    the law of the United States;

    (2) Separate and apart from the sale or purchase, contract or tender for sale
    or purchase, or request or invitation for tender for sale or purchase, of shares
    of the issuing public corporation.

    (D) Every appointment of a proxy shall be revocable unless that appointment is
    coupled with an interest, except that, as provided in division (C) of this section,
    proxies appointed for or in connection with the shareholder authorization of a
    control share acquisition pursuant to section 1701.831 of the Revised Code shall
    be revocable at all times prior to the obtaining of that shareholder authorization,
    whether or not coupled with an interest. A revocation of a revocable appointment
    may be made only as provided in this section. Without affecting any vote previously
    taken, the person appointing a proxy may revoke a revocable appointment by a later
    appointment received by the corporation or by giving notice of revocation to the
    corporation in writing, in a verifiable communication, or in open meeting. The
    presence at a meeting of the person appointing a proxy does not revoke the appointment.

    (E) A revocable appointment of a proxy is not revoked by the death or incompetency
    of the maker unless, before the vote is taken or the authority granted is otherwise
    exercised, written notice of the death or incompetency of the maker is received
    by the corporation from the executor or administrator of the estate of the maker
    or from the fiduciary having control of the shares in respect of which the proxy
    was appointed.

    (F) Unless the writing or verifiable communication appointing a proxy otherwise
    provides:

    (1) Each proxy has the power of substitution, and, if three or more proxies are
    appointed, a majority of them or of their substitutes may appoint one or more
    substitutes to act for all.

    (2) If more than one proxy is appointed, then (a) with respect to voting or executing
    consents, waivers, or releases, or objections to consents at a shareholders''
    meeting, a majority of the proxies that attend the meeting, or if only one attends
    then that one, may exercise all the voting and consenting authority at the meeting;
    and if one or more attend and a majority do not agree on any particular issue,
    each proxy so attending shall be entitled to exercise that authority with respect
    to an equal number of shares; (b) with respect to exercising any other authority,
    a majority may act for all.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.48
- number: '1701.49'
  heading: Voting trusts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) By written agreement certificates for shares of a corporation may be
    deposited within or without this state by any holder or holders thereof with one
    or more persons as trustees, or with any depositary designated by or pursuant
    to such agreement to act for such trustees, for the purpose and with the effect
    of granting to such trustees or a majority of them, or to such persons as may
    be designated by or pursuant to such agreement, all the voting, consenting, or
    other rights in respect of the shares represented by such certificates, or such
    of these rights as may be specified in the agreement, or for such other lawful
    purposes as may be specified in the agreement, for such period and upon such terms
    as may be stated therein.

    In the case of uncertificated securities, the deposit of the shares may be accomplished
    by registration in the name of the trustee or trustees as provided in division
    (F) of this section.

    (B) No such agreement which grants the voting or consenting rights in respect
    of shares shall be irrevocable for a period of more than ten years, unless the
    voting or consenting rights granted thereby are coupled with an interest in the
    shares to which such rights relate, except that, if the agreement so provides,
    such irrevocable grant may be extended for additional periods of not more than
    ten years each, upon the affirmative vote or assent of the beneficial owners of
    not less than a majority of the shares deposited under the agreement. Such rights
    shall be deemed coupled with an interest in the shares if granted in connection
    with: an option, authority, or contract to buy or sell the shares or a part thereof;
    a pledge of the shares to secure the performance or nonperformance of any act;
    the performance or nonperformance of any act, or agreement for an act, by the
    corporation issuing the shares; or any other act or thing constituting an interest
    sufficient in law to support a power coupled therewith.

    (C) The trustees under the agreement may issue, or cause to be issued by their
    depositary or agent, voting trust certificates registered in the name of the owners
    thereof. So far as consistent with the agreement and the voting trust certificates
    issued thereunder, the provisions of Chapter 1308., and of sections 1701.01 to
    1701.99 of the Revised Code, with respect to the transfer of certificates for
    shares shall apply to transfers of such voting trust certificates.

    Voting trust certificates must be in certificated form, and interests in a voting
    trust shall not be eligible for treatment as uncertificated securities.

    (D) The agreement may include any terms not repugnant to law, including provisions
    defining, limiting, or regulating the exercise of the authority, and the liability
    of, the trustees, or of such persons as are designated by or pursuant to any such
    agreement to exercise the voting, consenting, or other rights in respect of the
    deposited shares or to act as depositary thereunder.

    (E) An executed counterpart of the agreement may be filed with the secretary of
    the corporation, and upon such filing shall be open to inspection by any shareholder
    at the office of the corporation at all reasonable times.

    (F) The certificates for shares so deposited may be surrendered to and canceled
    by the issuing corporation, and if this is done new certificates therefor shall
    be issued by the corporation in the names of the trustees or of such persons as
    are designated by or pursuant to the agreement, as specified in a writing signed
    by the trustees and delivered to the issuing corporation. The new certificates
    shall be delivered to the trustees, or to any depositary, as the trustees may
    direct. The new certificates shall be issued in such manner that it shall appear
    that they are issued pursuant to the agreement, and in the entry of ownership
    in the proper books of the corporation that fact shall also be noted.

    If the corporation has elected to issue uncertificated securities, shares in uncertificated
    form may be deposited, with the effect provided by division (A) of this section,
    by registration in the name of the trustee or trustees or of such persons as are
    designated by or pursuant to the agreement, in accordance with Chapter 1308. of
    the Revised Code.

    (G) Shares issued by a foreign corporation may be made the subject of an agreement
    under this section.

    (H) The rights conferred by this section are in addition to rights at common law,
    and no limitation established by this section shall limit rights at common law.

    (I) Any such agreement shall be conclusively deemed to have been made under the
    common law, and not under this section, if the agreement so states.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.49
- number: '1701.50'
  heading: Inspectors of elections
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Unless the articles or the regulations otherwise provide:

    (1) The directors, in advance of any meeting of shareholders, may appoint inspectors
    of election to act at such meeting or any adjournment thereof;

    (2) If inspectors are not so appointed, the officer or person acting as chairman
    of any such meeting may, and on the request of any shareholder or his proxy shall,
    make such appointment;

    (3) In case any person appointed as inspector fails to appear or to act, the vacancy
    may be filled by appointment made by the directors in advance of the meeting,
    or at the meeting by the officer or person acting as chairman.

    (B) If there are three or more inspectors, the decision, act, or certificate of
    a majority of them shall be effective in all respects as the decision, act, or
    certificate of all.

    (C) The inspectors shall determine the number of shares outstanding, the voting
    rights with respect to each, the shares represented at the meeting, the existence
    of a quorum, and the authenticity, validity, and effect of proxies; receive votes,
    ballots, consents, waivers, or releases; hear and determine all challenges and
    questions arising in connection with the vote; count and tabulate all votes, consents,
    waivers, and releases; determine and announce the result; and do such acts as
    are proper to conduct the election or vote with fairness to all shareholders.

    (D) On request, the inspectors shall make a report in writing of any challenge,
    question, or matter determined by them and execute a certificate of any fact found
    by them.

    (E) The certificate of the inspectors shall be prima-facie evidence of the facts
    stated therein and of the vote as certified by them.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.50
- number: '1701.51'
  heading: Quorum at shareholders' meetings
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Unless the articles, the regulations adopted by the shareholders, or
    the regulations adopted by the directors pursuant to division (A)(1) of section
    1701.10 of the Revised Code otherwise provide, the shareholders present in person,
    by proxy, or by the use of communications equipment at any meeting of shareholders
    shall constitute a quorum for such meeting, but no action required by law, the
    articles, or the regulations to be authorized or taken by the holders of a designated
    proportion of the shares of any particular class or of each class, may be authorized
    or taken by a lesser proportion.

    (B) Unless the articles or the regulations otherwise provide, the holders of a
    majority of the voting shares represented at a meeting, whether or not a quorum
    is present, may adjourn such meeting from time to time.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.51
- number: '1701.52'
  heading: Vote of shareholders required - proportion
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: Notwithstanding any provision in sections 1701.01 to 1701.98, inclusive, of
    the Revised Code requiring for any purpose the vote, consent, waiver, or release
    of the holders of a designated proportion (but less than all) of the shares of
    any particular class or of each class, the articles may provide that for such
    purpose the vote, consent, waiver, or release of the holders of a greater or lesser
    proportion of the shares of such particular class or of each class shall be required,
    but unless otherwise expressly permitted by such sections such proportion shall
    be not less than a majority.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.52
- number: '1701.53'
  heading: Vote of shareholders required for rescission or revocation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: The authorization or taking of any action by vote, consent, waiver, or release
    of the shareholders may be rescinded or revoked by the same vote, consent, waiver,
    or release as at the time of rescission or revocation would be required to authorize
    or take such action in the first instance, subject to the contract rights of other
    persons.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.53
- number: '1701.54'
  heading: Action by shareholders or directors without a meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Unless the articles, the regulations adopted by the shareholders, or
    the regulations adopted by the directors pursuant to division (A)(1) of section
    1701.10 of the Revised Code prohibit the authorization or taking of any action
    of the shareholders or of the directors without a meeting, any action that may
    be authorized or taken at a meeting of the shareholders or of the directors, as
    the case may be, may be authorized or taken without a meeting with the affirmative
    vote or approval of, and in a writing or writings signed by all the shareholders
    who would be entitled to notice of a meeting of the shareholders held for such
    purpose, or all the directors, respectively, which writing or writings shall be
    filed with or entered upon the records of the corporation. Any certificate with
    respect to the authorization or taking of any such action that is required to
    be filed in the office of the secretary of state shall recite that the authorization
    or taking of such action was in a writing or writings approved and signed as specified
    in this section.

    (B) A telegram, cablegram, electronic mail, or an electronic or other transmission
    capable of authentication that appears to have been sent by a person described
    in division (A) of this section and that contains an affirmative vote or approval
    of that person is a signed writing for the purposes of this section. The date
    on which that telegram, cablegram, electronic mail, or electronic or other transmission
    is sent is the date on which the writing is signed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.54
- number: '1701.55'
  heading: Election of directors - cumulative voting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) At a meeting of shareholders at which directors are to be elected, only
    persons nominated as candidates shall be eligible for election as directors.

    (B) Unless the articles set forth alternative election standards, at all elections
    of directors, the candidates receiving the greatest number of votes shall be elected.

    (C) Unless the articles provide that no shareholder of a corporation may cumulate
    the shareholder''s voting power, each shareholder has the right to vote cumulatively
    if notice in writing is given by any shareholder to the president, a vice-president,
    or the secretary of a corporation, not less than forty-eight hours before the
    time fixed for holding a meeting of the shareholders for the purpose of electing
    directors if notice of the meeting has been given at least ten days before the
    meeting, and, if the ten days'' notice has not been given, not less than twenty-four
    hours before the meeting time, that the shareholder desires that the voting at
    such election shall be cumulative, provided that an announcement of the giving
    of that notice is made upon the convening of the meeting by the chairperson or
    secretary or by or on behalf of the shareholder giving the notice.

    (D) Unless the articles provide that no shareholder of a corporation may cumulate
    the shareholder''s voting power, each shareholder has the right, subject to the
    notice requirements contained in division (C) of this section, to cumulate the
    voting power the shareholder possesses and to give one candidate as many votes
    as the number of directors to be elected multiplied by the number of the shareholder''s
    votes equals, or to distribute the shareholder''s votes on the same principle
    among two or more candidates, as the shareholder sees fit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.55
- number: '1701.56'
  heading: Number and qualifications of directors - provisional director
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Except as provided in division (B) of this section and section 1701.911
    of the Revised Code:

    (1) The number of directors may be fixed by the articles or the regulations, but
    the number so fixed shall not be less than one.

    (2) Unless the articles or the regulations fix the number of directors or provide
    the manner in which such number may be fixed or changed by the shareholders, the
    number may be fixed or changed to a number not less than one at a meeting of the
    shareholders called for the purpose of electing directors at which a quorum is
    present, by the affirmative vote of the holders of a majority of the shares which
    are represented at the meeting and entitled to vote on the proposal. In addition
    to the authority of the shareholders to fix or change the number of directors
    and the manner in which such number may be fixed or changed, the articles or the
    regulations may authorize the directors to change the number of directors, may
    specify the manner in which the directors are to change the number of directors
    and limitations upon the directors'' use of this authority, and may authorize
    the directors who are in office to fill any director''s office that is created
    by an increase in the number of directors. No reduction in the number of directors
    shall of itself have the effect of shortening the term of any incumbent director.

    (3) The directors shall be natural persons of at least eighteen years of age and
    shall have such qualifications, if any, as are stated in the articles or the regulations.

    (4) The directors may elect a chairperson of the board who shall be a director.
    Unless otherwise provided in the articles or regulations or in a resolution of
    the directors, the chairperson of the board is not an officer of the corporation.

    (B) The court of common pleas of the county in which a corporation maintains its
    principal office may, pursuant to division (A) of section 1701.911 of the Revised
    Code, order the appointment of a provisional director for the corporation without
    regard to the number or qualifications of directors stated in the articles or
    regulations of the corporation.'
