- number: '1711.01'
  heading: County agricultural societies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) A county agricultural society is created when both of the following occur:

    (1) Thirty or more persons who are residents of the same county adopt a constitution
    and bylaws governing the society.

    (2) The residents described in division (A) of this section elect a board of directors
    in accordance with section 1711.08 of the Revised Code.

    (B) A county agricultural society created under this section shall operate in
    accordance with this chapter and the rules adopted by the director of agriculture.

    (C) A county agricultural society shall consist solely of members who are residents
    of the county in which the society is organized.

    (D)(1) A member of a county agricultural society shall pay an annual membership
    fee in an amount fixed by each society or its board of directors. The member shall
    pay the fee to the society''s secretary or treasurer as the society''s bylaws
    direct.

    (2) A county agricultural society shall issue a printed certificate of membership
    to each member who pays the required fee. The society shall issue the certificates
    from a book in which duplicate stubs of the certificates are properly filled out.
    The society shall keep each stub for not less than five years after the date on
    which the corresponding certificate is issued. The society shall ensure that all
    certificates are numbered consecutively.

    (E) No person shall pay for or secure more than one membership. No person shall
    secure a membership for any other person.

    (F) A society shall keep a list of the members of the society in the office of
    the society secretary. The society shall make the list available for public inspection
    upon request.

    (G)(1) The county auditor of the county in which a county agricultural society
    has been created shall request the county treasurer to transfer sixteen hundred
    dollars to the society each year. The county treasurer shall transfer the money
    if all of the following have occurred:

    (a) The society has held an annual exhibition in accordance with sections 1711.04
    and 1711.05 of the Revised Code.

    (b) The society has made a report to the director of agriculture in accordance
    with section 1711.06 of the Revised Code.

    (c) The director of agriculture presents a certificate to the county auditor indicating
    that the society has complied with the applicable laws of this state and the applicable
    rules adopted by the director.

    (2) The county auditor shall not transfer an amount under division (C)(1) of this
    section that exceeds the amount paid in regular class premiums by the county agricultural
    society under section 1711.04 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.01
- number: '1711.02'
  heading: Independent agricultural societies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) An independent agricultural society is created if both of the following
    occur:

    (1) Thirty or more persons of the same county, or of not more than three contiguous
    counties, adopt a constitution and bylaws governing the society.

    (2) The persons described in division (A)(1) of this section elect a board of
    directors in accordance with section 1711.08 of the Revised Code.

    (B) An independent agricultural society created under division (A) of this section
    shall operate in accordance with this chapter and applicable rules adopted by
    the director of agriculture.

    (C)(1) For purposes of division (C)(2) of this section, "appropriate amount" means
    the share of the sum of sixteen hundred dollars, calculated in proportion to the
    populations of the respective counties according to the last federal census before
    the annual payment is made, but not exceeding the amount paid in regular class
    premiums. If the independent agricultural society is located in only one county,
    the appropriate amount is the amount paid in regular class premiums not exceeding
    sixteen hundred dollars.

    (2) The auditor of a county in which an independent agricultural society is located
    annually shall request the county treasurer to transfer the appropriate amount
    to the independent agricultural society and the treasurer shall so transfer such
    money if all of the following have occurred:

    (a) The society has held an annual exhibition in accordance with sections 1711.04
    and 1711.05 of the Revised Code.

    (b) The society has made a report to the director of agriculture in accordance
    with section 1711.06 of the Revised Code.

    (c) The director of agriculture presents a certificate to the county auditor indicating
    that the society has complied with the laws of this state and the rules adopted
    by the director.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.02
- number: '1711.03'
  heading: Reimbursement to agricultural societies for junior club work
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A)(1) The board of county commissioners of a county, in which a county or
    independent agricultural society is located that receives state or county aid,
    annually shall appropriate an amount determined by the board for the society''s
    junior club. The board shall ensure that the amount appropriated is at least one
    hundred dollars. The board shall certify the amount appropriated to the county
    auditor.

    (2) The county auditor shall request the county treasurer to pay the certified
    amount to the appropriate county or independent agricultural society. Upon receipt
    of the request, the county treasurer shall pay the requested amount to the society.

    (B)(1) In any county in which there is no agricultural society that is then receiving
    state or county aid, the board of county commissioners of the county annually
    may appropriate to any society, either county or independent, located in an adjoining
    county, an amount of money for the purpose of encouraging junior club work in
    the county having no society. The board shall certify the amount appropriated
    to the county auditor.

    (2) The county auditor shall request the county treasurer to pay the certified
    amount to the appropriate county or independent agricultural society. Upon receipt
    of the request, the county treasurer shall pay the requested amount to the society.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.03
- number: '1711.04'
  heading: Premiums
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'Every society formed under sections 1711.01 and 1711.02 of the Revised Code
    shall annually offer and award premiums for the improvement of grains, fruits,
    vegetables, livestock, articles of domestic industry, public school displays,
    and such other articles, productions, and improvements as it deems proper, and
    may perform any acts best calculated to promote the agricultural interests and
    household manufacturing interests of the counties concerned and of the state.
    It shall regulate the amount of premiums, and their different grades, so that
    all may have an opportunity to compete for them.

    Persons offering to compete for premiums on improved methods of production of
    crops or other articles shall, before such a premium is adjudged, deliver to the
    awarding committee, if required to do so by such committee, a full and correct
    statement of the process, expense, and value of the method of production, with
    a view to showing accurately the profits derived or expected to be derived therefrom.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.04
- number: '1711.05'
  heading: Annual financial report and report of proceedings
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'Every county agricultural society annually shall do all of the following:

    (A) Make a report of its proceedings during the year;

    (B) File a financial report, in accordance with section 117.38 of the Revised
    Code and forward it to the director of agriculture at or before the annual meeting
    of the directors of the society with the director of agriculture, as provided
    for in section 1711.06 of the Revised Code. No payment after such date shall be
    made from the county treasury to such society unless a certificate from the director
    is presented to the county auditor showing that the report has been made;

    (C) Publish an announcement in either a newspaper of general circulation in the
    county or on the society''s web site for not less than two weeks that contains
    all of the following:

    (1) A statement indicating that the annual financial report has been filed in
    accordance with division (B) of this section;

    (2) A statement indicating that any person who wishes to obtain a copy of the
    report may contact the treasurer of the society;

    (3) The treasurer of the society''s contact information that a person may use
    to obtain a copy of the report.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.05
- number: '1711.06'
  heading: '[Former R.C. 901.06, amended and renumbered by H.B. 665, 133rd General
    Assembly, effective 4-12-2021] Director''s annual meeting with county societies'
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) Prior to the first day of December of each year, the director of agriculture
    shall set a date in January of the following year, on which the director shall
    meet with the presidents or other authorized delegates of agricultural societies
    which conduct fairs in compliance with this chapter and regulations of the department
    of agriculture. At such meeting the director shall consult with such presidents
    and delegates about the wants, prospects, and conditions of agricultural societies
    throughout the state.

    (B) Each society shall prepare and deliver an annual report to the director at
    or before each meeting required by division (A) of this section.

    (C) The director shall do both of the following:

    (1) Notify the president and the secretary of each society of the date of the
    annual meeting at least thirty days prior to the meeting;

    (2) Adopt rules in accordance with Chapter 119. of the Revised Code that provide
    for both of the following:

    (a) A uniform method for the election of the directors and officers of all agricultural
    societies that receive any support out of the state or county treasuries, except
    the date for holding the election;

    (b) Any other rules that the director determines are necessary to carry out this
    chapter.

    (D) Except for section 1711.11 of the Revised Code, references made in this chapter
    to rules adopted by the director mean rules adopted under division (C) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.06
- number: '1711.07'
  heading: Board of directors of county or independent agricultural society
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) The board of directors of a county or independent agricultural society
    shall consist of at least eight members. An employee of the OSU extension shall
    serve with the board as a nonvoting member. The director of agriculture shall
    determine the terms of office for members of the board in accordance with rules
    adopted by the director of agriculture.

    (B) The board may fill any vacancy on the board caused by death, resignation,
    refusal to qualify, removal from county, or other cause until the society''s next
    annual election. At that election, a new director shall be elected for the unexpired
    term.

    (C)(1) There shall be an annual election of directors by ballot at a time and
    a place fixed by the board. The election shall be held by the fifteenth day of
    November each year.

    (2) The secretary of the society shall give notice of the election, for three
    weeks prior to the election, by doing one of the following:

    (a) Publishing the notice in a newspaper of general circulation in the county
    or as provided in section 7.16 of the Revised Code;

    (b) Mailing the notice to each member of the society;

    (c) Publishing the notice on the society''s web site.

    (D) Only the following persons may vote in an election held in accordance with
    this section:

    (1) Those who hold membership certificates at the close of the annual county fair,
    or at least fifteen calendar days before the date of election, as may be fixed
    by the board;

    (2) Those who hold membership certificates on the date and hour of the election
    if the election is held on the fairground during the fair. When the election is
    to be held during the fair, notice of the election also shall be prominently mentioned
    in the premium list.

    (E) The terms of office of the retiring directors shall expire, and those of the
    directors-elect shall begin, not later than the thirtieth day of November each
    year.

    (F) The secretary of the society shall send, within ten days after the election,
    both of the following to the director:

    (1) The name and address of each member of its board;

    (2) A copy of the document containing the member''s signature verifying that the
    member voted in the election.

    (G) A candidate for director shall not count or record votes in any election conducted
    in accordance with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.07
- number: '1711.071'
  heading: Agricultural society treasurer's duties
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: The treasurer of a county or independent agricultural society, or a person
    under the supervision of the treasurer, shall collect, account for, record, deposit,
    and disburse all funds of the society.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.071
- number: '1711.08'
  heading: Election of officers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) The board of directors of a county or independent agricultural society
    shall annually meet not later than the thirtieth day of November. At such meeting,
    the board shall elect a president, a vice-president, a treasurer, a secretary,
    and such other officers as it may deem proper.

    (B) The president, the vice-president, and the treasurer shall serve one year,
    and the secretary not more than three years as the board may determine, and until
    their successors are elected and qualified. The president and the vice-president
    shall be directors. The secretary and the treasurer may be directors. Before election
    of officers the newly elected directors shall qualify by taking oath or affirmation
    before a competent authority, and in electing officers the board shall conform
    to the rules adopted by the director of agriculture.'
