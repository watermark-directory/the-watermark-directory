    name: Ohio Revised Limited Liability Company Act
  text: '(A) Subject to division (C) of section 1706.769 of the Revised Code, after
    dissolution of a series, the remaining members associated with the series, if
    any, and if none, a person appointed by all holders of the membership interest
    last assigned by the last person to have been a member associated with the series,
    may wind up the series'' activities.

    (B) The appropriate tribunal may order supervision of the winding up of a dissolved
    series, including the appointment of a person to wind up the series'' activities
