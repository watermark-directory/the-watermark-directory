- number: '1782.52'
  heading: Certificate correcting application information - statement of correction
    of agent's address
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'If any statement in the application for registration of a foreign limited
    partnership was materially false when made or if any arrangements or other facts
    described have changed, thereby making the application inaccurate in any material
    respect, the foreign limited partnership shall file promptly with the secretary
    of state a certificate correcting the application on a form prescribed by the
    secretary of state and shall be signed by a general partner.

    If the designated agent changes the agent''s address from that appearing in the
    registration application or any subsequent correction of the registration application,
    the foreign limited liability partnership, or the designated agent on its behalf,
    shall file promptly with the secretary of state, on a form prescribed by the secretary
    of state, a statement of correction setting forth the new address.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.52
- number: '1782.53'
  heading: Cancellation of registration
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: A foreign limited partnership may cancel its registration by filing with the
    secretary of state a certificate of cancellation, which shall be on a form prescribed
    by the secretary of state and shall be signed by a general partner. A cancellation
    does not terminate the authority of the secretary of state to accept service of
    process on the foreign limited partnership with respect to causes of action arising
    out of the transactions of business in this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.53
- number: '1782.54'
  heading: Failure to register of foreign limited partnership
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A foreign limited partnership transacting business in this state may
    not maintain any action, suit, or proceeding in any court of this state until
    it has registered in this state.

    (B) The failure of a foreign limited partnership to register in this state does
    not impair the validity of any contract or act of the foreign limited partnership
    or prevent the foreign limited partnership from defending any action, suit, or
    proceeding in any court of this state.

    (C) A limited partner of a foreign limited partnership is not liable as a general
    partner of the foreign limited partnership solely by reason of the foreign limited
    partnership having transacted business in this state without registration.

    (D) A foreign limited partnership, by transacting business in this state without
    registration, hereby appoints the secretary of state as its agent for service
    of process with respect to causes of action arising out of the transaction of
    business in this state.'
