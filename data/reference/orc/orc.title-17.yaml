- number: '1713.31'
  heading: Attorney general may enforce duties of officers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: On application in writing to the attorney general by five citizens of the
    proper county, verified by the oath or affirmation of one of them, setting forth
    specific charges against any of the fiscal or other agents or trustees of a corporation
    referred to in section 1713.28 of the Revised Code involving a breach of trust
    or duty, the attorney general shall give notice thereof to the trustees or agents
    complained of, and inquire into the truth of such charges. For this purpose he
    may receive affidavits or enforce, by process from the court of common pleas of
    Franklin county, the production of papers and the attendance of witnesses before
    him. If, on testimony or other evidence, he believes any of the charges to be
    true, he shall proceed by action in that court, in the name of the state, against
    the delinquent trustees, or fiscal agents, and, on the hearing the court may direct
    the performance of any duty or the removal of any agents or trustees, and decree
    such other and further relief as is equitable.
