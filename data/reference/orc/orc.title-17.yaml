- number: '1731.05'
  heading: Insurers submitting proposals to alliance
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: 'If a qualified alliance, or an alliance that, based upon evidence of interest
    satisfactory to the superintendent of insurance, will be a qualified alliance
    within a reasonable time, submits a request for a proposal on a health benefit
    plan to at least three insurers and does not receive at least one reasonably responsive
    proposal within ninety days from the date the last such request is submitted,
    the superintendent, at the request of such alliance, may require that insurers
    offer proposals to such alliance for health benefit plans for the small employers
    within such alliance. Such proposals shall include such coverage and benefits
    for such premiums, as shall take into account the functions provided by the alliance
    and the economies of scale, and have other terms and provisions as are approved
    by the superintendent, consistent with the purposes and standards set forth in
    section 1731.02 of the Revised Code. Any insurer that does not submit a proposal
    when required to do so by the superintendent hereunder, shall be deemed to be
    in violation of section 3901.20 of the Revised Code and shall be subject to all
    of the provisions of section 3901.22 of the Revised Code, including division (D)(1)
    of section 3901.22 of the Revised Code as if it provided that the superintendent
    may suspend or revoke an insurer''s license to engage in the business of insurance.

    Nothing in this section shall be construed as requiring an insurer to enter into
    an agreement with an alliance under contractual terms that are not acceptable
    to the insurer or to authorize the superintendent to require an insurer to enter
    into an agreement with an alliance under contractual terms that are not acceptable
    to the insurer.

    This section applies beginning eighteen months after its effective date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1731.05
- number: '1731.06'
  heading: Applying other laws
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: '(A) No health benefit plan offered or provided by an insurer to a small employer
    under a qualified alliance program is subject to any law that does any of the
    following:

    (1) Inhibits the insurer from selectively contracting with providers or groups
    of providers with respect to health care service or benefits;

    (2) Imposes any restrictions on the ability of the insurer to negotiate with providers
    regarding the level or method of reimbursing for care or services;

    (3) Requires the insurer either to include a specific provider or class of providers,
    or to exclude any class of providers that are generally authorized by law to provide
    such care, in connection with health care services or benefits under such health
    benefit plan;

    (4) Limits the financial incentives that a health benefit plan may require a beneficiary
    to pay when a nonplan provider is used on a nonemergency basis;

    (5) Prohibits utilization review of any or all treatments and conditions;

    (6) Requires the use of specified standards of health care practice in such reviews
    or requires the disclosure of the specific criteria used in such reviews;

    (7) Requires payments to providers for the expenses of responding to utilization
    review requests;

    (8) Imposes liability for delays in performing such review.

    (B) Notwithstanding division (A) of this section, every health benefit plan offered
    or provided by an insurer, other than a health insuring corporation, to a small
    employer under a qualified alliance program is subject to sections 3923.23, 3923.231,
    3923.232, 3923.233, and 3923.234 of the Revised Code and any other provision of
    the Revised Code that requires the reimbursement, utilization, or consideration
    of a specific category of licensed or certified health care practitioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1731.06
- number: '1731.07'
  heading: Premiums exempt from taxation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: The premiums or other charges received by an insurer from or on behalf of
    an enrolled small employer and eligible employees or retirees under a health benefit
    plan provided by the insurer under a qualified alliance program shall not be considered
    "premiums received" or "premium rate payments received" for purposes of division
    (A) of section 5725.18 and division (A) of section 5729.03 of the Revised Code,
    and are exempt from any other tax or excise in this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1731.07
- number: '1731.08'
  heading: Premiums fully deductible
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: 'The premiums or other charges paid by an enrolled small employer to an insurer
    for health benefit plan coverage under a qualified alliance program are fully
    deductible in determining taxes payable by such small employer in this state on
    or measured by net income. Without limiting the foregoing:

    (A) With respect to such a small employer that is subject to the income tax imposed
    by section 5747.02 of the Revised Code, such premiums are to be deducted in determining
    adjusted gross income under division (A) of section 5747.01 of the Revised Code
    to the extent such premiums are not allowable as a deduction in determining adjusted
    gross income for federal income tax purposes.

    (B) With respect to such a small employer that is subject to the corporation franchise
    tax imposed by section 5733.06 of the Revised Code, such premiums are to be deducted
    in determining the small employer''s net income under division (B) of section
    5733.05 of the Revised Code to the extent such premiums are not allowable as a
    deduction in determining taxable income for federal income tax purposes.

    (C) With respect to such a small employer that is subject to any income tax levied
    by a political subdivision or taxing district in this state, such premiums are
    to be deducted from taxable income or earnings to the extent not otherwise deductible
    in determining the amount of the tax.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1731.08
- number: '1731.09'
  heading: Application of chapter 3924 - alliance business class
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: '(A) Nothing contained in this chapter is intended to or shall inhibit or
    prevent the application of the provisions of Chapter 3924. of the Revised Code
    to any health benefit plan or insurer to which they would otherwise apply in the
    absence of this chapter, except as otherwise specified in divisions (B) and (C)
    of this section or unless such application conflicts with the provisions of section
    1731.05 of the Revised Code.

    (B) An insurer may establish one or more separate classes of business solely comprised
    of one or more alliances. All of the following shall apply to health plans covering
    small employers in each class of business established pursuant to this division:

    (1) The premium rate limitations set forth in section 3924.04 of the Revised Code
    apply to each class of business separate and apart from the insurer''s other business;

    (2) For purposes of applying sections 3924.01 to 3924.06 of the Revised Code to
    a class of business, the base premium rate and midpoint rate shall be determined
    with respect to each class of business separate and apart from the insurer''s
    other business.

    (3) The midpoint rate for a class of business shall not exceed the midpoint rate
    for any other class of business or the insurer''s non-alliance business by more
    than fifteen per cent.

    (4) The insurer annually shall file with the superintendent of insurance an actuarial
    certification consistent with section 3924.06 of the Revised Code for each class
    of business demonstrating that the underwriting and rating methods of the insurer
    do all of the following:

    (a) Comply with accepted actuarial practices;

    (b) Are uniformly applied to health benefit plans covering small employers within
    the class of business;

    (c) Comply with the applicable provisions of this section and sections 3924.01
    to 3924.06 of the Revised Code.

    (5) An insurer shall apply sections 3924.01 to 3924.06 of the Revised Code to
    the insurer''s non-alliance business and coverage sold through alliances not established
    as a separate class of business.

    (6) An insurer shall file with the superintendent a notification identifying any
    alliance or alliances to be treated as a separate class of business at least sixty
    days prior to the date the rates for that class of business take effect.

    (7) Any application for a certificate of authority filed pursuant to section 1731.021
    of the Revised Code shall include a disclosure as to whether the alliance will
    be underwritten or rated as part of a separate class of business.

    (C) As used in this section:

    (1) "Class of business" means a group of small employers, as defined in section
    3924.01 of the Revised Code, that are enrolled employers in one or more alliances.

    (2) "Actuarial certification," "base premium rate," and "midpoint rate" have the
    same meanings as in section 3924.01 of the Revised Code.'
