- number: '1707.47'
  heading: Ohio investor recovery fund
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) As used in this section and section 1707.471 of the Revised Code:

    (1) "Claimant" means a person that files an application for restitution assistance
    on behalf of a victim.

    (2) "Final order" means a final administrative order issued by the division of
    securities or a final court order in a civil or criminal proceeding initiated
    by the division.

    (3) "Victim" means a purchaser identified in a final order that has suffered a
    pecuniary loss as the result of a violation of this chapter or any rules adopted
    thereunder, or, in the case of a deceased purchaser so identified, the purchaser''s
    surviving spouse or dependent children.

    (B) There is hereby created in the state treasury the Ohio investor recovery fund,
    which shall consist of all cash transfers from the division of securities fund,
    created in section 1707.37 of the Revised Code. Money in the Ohio investor recovery
    fund shall be used for the purposes identified in division (C) of this section.

    (C) The division shall use the Ohio investor recovery fund only to pay awards
    of restitution assistance and any expenses incurred in administering this section.

    (D)(1) If the Ohio investor recovery fund is reduced below two hundred fifty thousand
    dollars due to payment in full of restitution assistance awards that become final
    during a month, the division shall suspend payment of further claims that become
    final during that month and the following two months.

    (2) At the end of the suspension period described in division (D)(1) of this section,
    the division shall pay the suspended claims. If the Ohio investor recovery fund
    would be exhausted by payment in full of the suspended claims, the amount paid
    to each claimant shall be prorated according to the amount remaining in the Ohio
    investor recovery fund at the end of the suspension period.

    (E) The state shall not be liable for a determination made by the division under
    this section except to the extent that money is available in the Ohio investor
    recovery fund on the date the award is calculated.

    (F) The following victims are eligible for restitution assistance:

    (1) A natural person who is a resident of this state;

    (2) A person, other than a natural person, that is domiciled in Ohio.

    (G) The division shall not award restitution assistance as follows:

    (1) To more than one claimant per victim;

    (2) To a claimant on behalf of a victim that has received the full amount of restitution
    owed from the person ordered to pay restitution to the victim in the final order
    before the application for restitution assistance from the fund is filed;

    (3) To a claimant if the final order identifies no pecuniary loss to the victim
    on whose behalf the application is made;

    (4) To a claimant on behalf of a victim that assisted in the commission of the
    violation of this chapter;

    (5) If the portion of the final order giving rise to a restitution order or otherwise
    establishing a pecuniary loss to the victim is overturned on appeal.

    (H) If, after the division has made a restitution assistance award from the Ohio
    investor recovery fund under this section, the restitution award in the final
    order is overturned on appeal and all legal remedies have been exhausted, then
    the claimant shall forfeit the restitution assistance award.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.47
- number: '1707.471'
  heading: Restitution assistance awards from Ohio investor recovery fund
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) A person that is eligible for a restitution assistance award under section
    1707.47 of the Revised Code may submit an application for restitution assistance
    to the division in a manner and form prescribed by the division of securities.

    (B) To receive a restitution assistance award, the claimant shall submit an application
    to the division within one hundred eighty days after the date of the final order.
    The division may grant an extension for good cause shown by the claimant. In no
    case shall the division accept an application that is received more than two years
    after the date of the final order.

    (C) The maximum award from the Ohio investor recovery fund created in section
    1707.47 of the Revised Code for each claimant shall be the lesser of twenty-five
    thousand dollars or twenty-five per cent of the amount of monetary injury suffered
    by the victim as specified in the final order.

    (D) The state is subrogated to the rights of the person awarded restitution assistance
    under section 1707.47 of the Revised Code to the extent of the award. The subrogation
    rights are against the person that committed the securities violation or a person
    liable for the pecuniary loss.

    (E) The state may obtain a lien on the restitution assistance award in a separation
    action brought by the state or through state intervention in an action brought
    by or on behalf of the victim.

    (F)(1) No claimant shall knowingly file or cause to be filed an application for
    restitution assistance or documents supporting the application that contain false,
    incomplete, or misleading information in any material respect.

    (2) A claimant that violates division (F)(1) of this section shall forfeit all
    restitution assistance provided from the fund and shall be fined not more than
    ten thousand dollars by the division.

    (3) Notwithstanding section 1707.28 of the Revised Code, a proceeding to determine
    whether a violation of division (F)(1) of this section occurred shall be commenced
    not later than two years after the date on which the division discovered the violation
    or through reasonable diligence should have discovered the violation, whichever
    is earlier.

    (G) The division shall adopt rules as necessary to implement sections 1707.47
    and 1707.471 of the Revised Code, including rules governing the processes for
    both of the following:

    (1) Reviewing applications for restitution assistance awards;

    (2) Suspending awards or making a prorated payment of awards when the fund balance
    approaches or reaches a balance below two hundred fifty thousand dollars.'
