- number: '1707.26'
  heading: Injunction against violations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: Whenever it appears to the division of securities, upon complaint or otherwise,
    that any person has engaged in, is engaging in, or is about to engage in, any
    deceptive, fraudulent, or manipulative act, practice, or transaction, in violation
    of sections 1707.01 to 1707.50 of the Revised Code, the director of commerce may
