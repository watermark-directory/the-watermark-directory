- number: '1782.02'
  heading: Name
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) The name of any limited partnership, as set forth in its certificate
    of limited partnership, shall include "Limited Partnership," "L.P.," "Limited,"
    or "Ltd." and shall not contain the name of a limited partner unless either of
    the following are true:

    (1) It is also the name of a general partner;

    (2) The business of the limited partnership had been carried on under that name
    before the admission of that limited partner.

    (B) The name of a limited partnership shall be distinguishable upon the records
    in the office of the secretary of state from all of the following:

    (1) The name of any other limited partnership registered in the office of the
    secretary of state pursuant to this chapter, whether domestic or foreign;

    (2) The name of any domestic corporation that is formed under Chapter 1701. or
    1702. of the Revised Code or any foreign corporation that is registered pursuant
    to Chapter 1703. of the Revised Code;

    (3) The name of any limited liability company registered in the office of the
    secretary of state pursuant to Chapter 1705. or 1706. of the Revised Code, whether
    domestic or foreign;

    (4) The name of any limited liability partnership registered in the office of
    the secretary of state pursuant to Chapter 1775. or 1776. of the Revised Code,
    whether domestic or foreign;

    (5) Any trade name the exclusive right to which is at the time in question registered
    in the office of the secretary of state pursuant to Chapter 1329. of the Revised
    Code.'
