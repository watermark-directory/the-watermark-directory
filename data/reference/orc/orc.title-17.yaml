  text: No foreign corporation not excepted from sections 1703.01 to 1703.31 of the
    Revised Code, shall transact business in this state unless it holds an unexpired
    and uncanceled license to do so issued by the secretary of state. To procure such
    a license, a foreign corporation shall file an application, pay a filing fee,
    and comply with all other requirements of law respecting the maintenance of the
