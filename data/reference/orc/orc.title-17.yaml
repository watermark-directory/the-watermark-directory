- number: '1701.60'
  heading: Contract, action or transaction not void or voidable
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Unless otherwise provided in the articles or the regulations:

    (1) No contract, action, or transaction shall be void or voidable with respect
    to a corporation for the reason that it is between or affects the corporation
    and one or more of its directors or officers, or between or affects the corporation
    and any other person in which one or more of its directors or officers are directors,
    trustees, or officers, or have a financial or personal interest, or for the reason
    that one or more interested directors or officers participate in or vote at the
    meeting of the directors or a committee of the directors that authorizes such
    contract, action, or transaction, if in any such case any of the following apply:

    (a) The material facts as to his or their relationship or interest and as to the
    contract, action, or transaction are disclosed or are known to the directors or
    the committee and the directors or committee, in good faith reasonably justified
    by such facts, authorizes the contract, action, or transaction by the affirmative
    vote of a majority of the disinterested directors, even though the disinterested
    directors constitute less than a quorum of the directors or the committee;

    (b) The material facts as to his or their relationship or interest and as to the
    contract, action, or transaction are disclosed or are known to the shareholders
    entitled to vote thereon and the contract, action, or transaction is specifically
    approved at a meeting of the shareholders held for such purpose by the affirmative
    vote of the holders of shares entitling them to exercise a majority of the voting
    power of the corporation held by persons not interested in the contract, action,
    or transaction; or

    (c) The contract, action, or transaction is fair as to the corporation as of the
    time it is authorized or approved by the directors, a committee of the directors,
    or the shareholders;

    (2) Common or interested directors may be counted in determining the presence
    of a quorum at a meeting of the directors, or of a committee of the directors
    that authorizes the contract, action, or transaction;

    (3) The directors, by the affirmative vote of a majority of those in office, and
    irrespective of any financial or personal interest of any of them, shall have
    authority to establish reasonable compensation, that may include pension, disability,
    and death benefits, for services to the corporation by directors and officers,
    or to delegate such authority to one or more officers or directors.

    (B) Nothing contained in divisions (A)(1) and (2) of this section shall limit
    or otherwise affect the liability of directors under section 1701.95 of the Revised
    Code.

    (C) For purposes of division (A) of this section, a director is not an interested
    director solely because the subject of the contract, action, or transaction may
    involve or affect a change in control of the corporation or his continuation in
    office as a director of that corporation.

    (D) For purposes of this section, "action" means a resolution adopted by the directors
    or a committee of the directors of a corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.60
- number: '1701.61'
  heading: Meetings of directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: 'Unless otherwise provided in the articles, the regulations, or the bylaws,
    and subject to the exceptions, applicable during an emergency as that term is
    defined in section 1701.01 of the Revised Code, for which provision is made in
    division (F) of section 1701.11 of the Revised Code:

    (A) Meetings of the directors may be called by the chairperson of the board, the
    president, any vice-president, or any two directors.

    (B) Meetings of the directors may be held at any place within or without the state
    and, unless the articles or the regulations prohibit participation by directors
    at a meeting by means of communications equipment, meetings of the directors may
    be held through any communications equipment if all persons participating can
    hear each other and participation in a meeting pursuant to this division shall
    constitute presence at the meeting.

    (C) Notice of the place, if any, and time of each meeting of the directors shall
    be given to each director either by personal delivery or by mail, telegram, cablegram,
    overnight delivery service, or any other means of communication authorized by
    the director at least two days before the meeting. The notice need not specify
    the purposes of the meeting.

    (D) Notice of adjournment of a meeting need not be given if the time and place
    to which it is adjourned are fixed and announced at the meeting.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.61
- number: '1701.62'
  heading: Quorum for directors' meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: Unless the articles, the regulations adopted by the shareholders, or the regulations
    adopted by the directors pursuant to division (A)(1) of section 1701.10 of the
    Revised Code otherwise provide, and subject to the exceptions applicable during
    an emergency, as that term is defined in section 1701.01 of the Revised Code,
    for which provision is made in division (F) of section 1701.11 of the Revised
    Code, a majority of the whole authorized number of directors is necessary to constitute
    a quorum for a meeting of the directors, except that a majority of the directors
    in office constitutes a quorum for filling a vacancy in the board. The act of
    a majority of the directors present at a meeting at which a quorum is present
    is the act of the board, unless the act of a greater number is required by the
    articles, the regulations adopted by the shareholders, the regulations adopted
    by the directors pursuant to division (A)(1) of section 1701.10 of the Revised
    Code, or the bylaws.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.62
- number: '1701.63'
  heading: Executive and other committees of directors - subcommittees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) The regulations may provide for the creation by the directors of an executive
    committee or any other committee of the directors, to consist of one or more directors,
    and may authorize the delegation to any such committee of any of the authority
    of the directors, however conferred, other than the authority of filling vacancies
    among the directors or in any committee of the directors and other than the authority
    to adopt, amend, or repeal regulations.

    (B) The directors may appoint one or more directors as alternate members of any
    committee described in division (A) of this section, who may take the place of
    any absent member or members at any meeting of the particular committee.

    (C) Each committee described in division (A) of this section shall serve at the
    pleasure of the directors, shall act only in the intervals between meetings of
    the directors, and shall be subject to the control and direction of the directors.

    (D) Unless otherwise provided in the regulations or ordered by the directors,
    any committee described in division (A) of this section may act by a majority
    of its members at a meeting or by a writing or writings signed by all of its members.

    (E) Unless participation by members of any committee described in division (A)
    of this section at a meeting by means of communications equipment is prohibited
    by the articles, the regulations, or an order of the directors, meetings of the
    particular committee may be held through any communications equipment if all persons
    participating can hear each other. Participation in a meeting pursuant to this
    division constitutes presence at the meeting.

    (F) An act or authorization of an act by any committee described in division (A)
    of this section within the authority delegated to it shall be as effective for
    all purposes as the act or authorization of the directors.

    (G) Unless otherwise provided in the articles, the regulations, or the resolution
    of the directors creating a committee described in division (A) of this section,
    a committee described in division (A) of this section may create one or more subcommittees,
    each subcommittee to consist of one or more members of the committee, and may
    delegate to a subcommittee any or all of the powers and authority of the committee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.63
- number: '1701.64'
  heading: Officers - authority and removal
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) The officers of a corporation shall consist of a president, a secretary,
    a treasurer, and, if desired, one or more vice-presidents and such other officers
    and assistant officers as may be deemed necessary. The officers shall be elected
    by the directors. None of the officers need be a director unless the articles
    or the regulations otherwise provide or the directors determine that there is
    to be a chairperson of the board who is to be an officer. Any two or more offices
    may be held by the same person, but no officer shall execute, acknowledge, or
    verify any instrument in more than one capacity if such instrument is required
    by law or by the articles, the regulations, or the bylaws to be executed, acknowledged,
    or verified by two or more officers. Unless the articles or the regulations otherwise
    provide, all officers shall be elected annually.

    (B) Unless the articles or the regulations otherwise provide, and subject to the
    exceptions, applicable during an emergency, as that term is defined in section
    1701.01 of the Revised Code, for which provision is made in division (F) of section
    1701.11 of the Revised Code:

    (1) All officers, as between themselves and the corporation, shall respectively
    have such authority and perform such duties as are determined by the directors;

    (2) Any officer may be removed, with or without cause, by the directors without
    prejudice to the contract rights of such officer. The election or appointment
    of an officer for a given term, or a general provision in the articles, the regulations,
    or the bylaws with respect to term of office, shall not be deemed to create contract
    rights;

    (3) The directors may fill any vacancy in any office occurring from whatever reason.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.64
- number: '1701.641'
  heading: Fiduciary duties of officers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Unless the articles, the regulations, or a written agreement with an
    officer establishes additional fiduciary duties, the only fiduciary duties of
    an officer are the duties to the corporation set forth in division (B) of this
    section.

    (B) An officer shall perform the officer''s duties to the corporation in good
    faith, in a manner the officer reasonably believes to be in or not opposed to
    the best interests of the corporation, and with the care that an ordinarily prudent
    person in a like position would use under similar circumstances. In performing
    an officer''s duties, an officer is entitled to rely on information, opinions,
    reports, or statements, including financial statements and other financial data,
    that are prepared or presented by any of the following:

    (1) One or more directors, officers, or employees of the corporation who the officer
    reasonably believes are reliable and competent in the matters prepared or presented;

    (2) Counsel, public accountants, or other persons as to matters that the officer
    reasonably believes are within the person''s professional or expert competence.

    (C) For purposes of this section, both of the following apply:

    (1) In any action brought against an officer, the officer shall not be found to
    have violated the officer''s duties under division (B) of this section unless
    it is proved by clear and convincing evidence that the officer has not acted in
    good faith, in a manner the officer reasonably believes to be in or not opposed
    to the best interests of the corporation, or with the care that an ordinarily
    prudent person in a like position would use under similar circumstances.

    (2) An officer shall not be considered to be acting in good faith if the officer
    has knowledge concerning the matter in question that would cause reliance on information,
    opinions, reports, or statements that are prepared or presented by any of the
    persons described in division (B)(1) or (2) of this section to be unwarranted.

    (D) An officer shall be liable in damages for a violation of the officer''s duties
    under division (B) of this section only if it is proved by clear and convincing
    evidence in a court of competent jurisdiction that the officer''s action or failure
    to act involved an act or omission undertaken with deliberate intent to cause
    injury to the corporation or undertaken with reckless disregard for the best interests
    of the corporation. This division does not apply if, and only to the extent that,
    at the time of an officer''s act or omission that is the subject of the complaint,
    either of the following is true:

    (1) The articles or the regulations of the corporation state by specific reference
    to division (D) of this section that the provisions of this division do not apply
    to the corporation.

    (2) A written agreement between the officer and the corporation states by specific
    reference to division (D) of this section that the provisions of this division
    do not apply to the officer.

    (E) Nothing in this section affects the duties of an officer who acts in any capacity
    other than the officer''s capacity as an officer. Nothing in this section affects
    any contractual obligations of an officer to the corporation.'
  history: null
