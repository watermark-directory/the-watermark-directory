- number: '1706.412'
  heading: Effect of dissociation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A person who has dissociated as a member shall have no right to participate
    as a member in the activities and affairs of the limited liability company and
    is entitled only to receive the distributions to which that member would have
    been entitled if the member had not dissociated.

    (B) Upon a person''s dissociation, the member''s duty of loyalty and duty of care
    under divisions (C) and (D) of section 1706.31 of the Revised Code continue only
    with regard to matters arising and events occurring before the member''s dissociation,
    unless the member participates in winding up the limited liability company''s
    business pursuant to section 1706.472 of the Revised Code.

    (C) A person''s dissociation as a member does not of itself discharge the person
    from any debt, obligation, or liability to a limited liability company or the
    other members that the person incurred while a member.'
