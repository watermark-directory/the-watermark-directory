- number: '1711.09'
  heading: Forbidden activities
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) Except as otherwise provided in this section, county agricultural societies,
    independent agricultural societies, and the Ohio expositions commission shall
    not permit during any fair, or for one week before or three days after any fair,
    any dealing in spirituous liquors, or at any time allow or tolerate immoral shows,
    lottery devices, games of chance, or gambling of any kind, including pool selling
    and paddle wheels, anywhere on the fairground.

    (B) A county or independent agricultural society or the Ohio expositions commission
    shall not permit a person at any time to operate any side show, amusement, game,
    or device, or offer for sale any novelty by auction or solicitation, on the fairground
    who has not first obtained from the director of agriculture a license under section
    1711.11 of the Revised Code.

    (C) This section does not prohibit the sale of lottery tickets by the state lottery
    commission pursuant to Chapter 3770. of the Revised Code at the state fairground
    during the state fair. In addition, a county or independent agricultural society
    may permit, at any time except during a fair or for one week before or three days
    after a fair, a charitable organization to conduct in accordance with Chapter
    2915. of the Revised Code games of chance or bingo on the fairground of any county.
    A charitable organization may lease all or part of the fairground from the agricultural
    society for that purpose.

    (D) Any sales of intoxicating liquor transacted on the fairground is subject to
    Chapters 4301., 4303., and 4399. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.09
- number: '1711.091'
  heading: Sale of seasonal tickets, fundraisers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) Any member of a county or independent agricultural society may sell seasonal
    tickets or passes for the society''s annual exhibition. The sale of such tickets
    or passes need not be conducted on the premises of the fairgrounds.

    (B) Any person may sell tickets for fundraisers held by a county or independent
    agricultural society, or for the benefit of the society, during the society''s
    annual exhibition.

    (C) The treasurer of the society shall deposit any funds generated from ticket
    sales under this section in an appropriate fund used by or for the benefit of
    the society.'
