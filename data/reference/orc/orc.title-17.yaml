- number: '1707.40'
  heading: Civil liabilities
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: Except as provided in section 1707.261 of the Revised Code, sections 1707.01
    to 1707.50 of the Revised Code create no new civil liabilities, and do not limit
    or restrict common law liabilities for deception or fraud other than as specified
    in sections 1707.042, 1707.043, 1707.41, 1707.42, and 1707.43 of the Revised Code,
    and there is no civil liability for noncompliance with orders, requirements, rules,
    or regulations made by the division of securities under sections 1707.19, 1707.20,
    1707.201, and 1707.23 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.40
- number: '1707.41'
  heading: Civil liability of seller for fraud
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) In addition to the other liabilities imposed by law, any person that,
    by a written or printed circular, prospectus, or advertisement, offers any security
    for sale, or receives the profits accruing from such sale, is liable, to any person
    that purchased the security relying on the circular, prospectus, or advertisement,
    for the loss or damage sustained by the relying person by reason of the falsity
    of any material statement contained therein or for the omission of material facts,
    unless the offeror or person that receives the profits establishes that the offeror
    or person had no knowledge of the publication prior to the transaction complained
    of, or had just and reasonable grounds to believe the statement to be true or
    the omitted facts to be not material.

    (B)(1) Whenever a corporation is liable as described in division (A) of this section,
    each director of the corporation is likewise liable unless the director shows
    that the director had no knowledge of the publication complained of, or had just
    and reasonable grounds to believe the statement therein to be true or the omission
    of facts to be not material.

    (2) Any director, upon the payment by the director of a judgment so obtained against
    the director, shall be subrograted to the rights of the plaintiff against the
    corporation, and shall have the right of contribution for the payment of the judgment
    against the director''s fellow directors as would be individually liable under
    this section.

    (C) For purposes of this section, lack of reasonable diligence in ascertaining
    the fact of a publication or the falsity of any statement contained in it or of
    the omission of a material fact shall be deemed knowledge of the publication and
    of the falsity of any untrue statement in it or of the omission of material facts.

    (D) No action brought against any director, based upon the liability imposed by
    this section, shall be brought unless it is brought within two years after the
    plaintiff knew, or had reason to know, of the facts by reason of which the actions
    of the person or the director were unlawful, or within five years after the purchase
    of the securities, whichever is the shorter period, or, in the case of an action
    to enforce a right of contribution under this section, the action is brought within
    two years after the payment of the judgment for which contribution is sought.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.41
- number: '1707.42'
  heading: Civil liability of adviser
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) Whoever, with intent to secure financial gain to self, advises and procures
    any person to purchase any security, and receives any commission or reward for
    the advice or services without disclosing to the purchaser the fact of the person''s
    agency or interest in such sales, shall be liable to the purchaser for the amount
    of the purchaser''s damage thereby, upon tender of the security to, and suit brought
    against, the adviser, by the purchaser. No suit shall be brought more than one
    year subsequent to the purchase.

    (B) Whoever acts as an investment adviser or investment adviser representative
    in violation of Chapter 1707. of the Revised Code shall be liable for damages
    resulting from the violation in an action at law in a court of competent jurisdiction.
    Damages may include consideration paid for the advice, any loss due to the advice,
    and all court costs, less the amount of any income received from the advice. No
    person may bring an action under this division more than five years after the
    rendering of investment advice or two years after discovery of facts constituting
    the violation, whichever is the shorter period.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.42
- number: '1707.43'
  heading: Remedies of purchaser in unlawful sale
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) Subject to divisions (B) and (C) of this section, every sale or contract
    for sale made in violation of Chapter 1707. of the Revised Code, is voidable at
    the election of the purchaser. The person making such sale or contract for sale,
    and every person that has participated in or aided the seller in any way in making
    such sale or contract for sale, are jointly and severally liable to the purchaser,
    in an action at law in any court of competent jurisdiction, upon tender to the
    seller of the securities sold or of the contract made, for the full amount paid
    by the purchaser and for all taxable court costs, unless the court determines
    that the violation did not materially affect the protection contemplated by the
    violated provision.

    (B) No action for the recovery of the purchase price as provided for in this section,
    and no other action for any recovery based upon or arising out of a sale or contract
    for sale made in violation of Chapter 1707. of the Revised Code, shall be brought
    more than two years after the plaintiff knew, or had reason to know, of the facts
    by reason of which the actions of the person or director were unlawful, or more
    than five years from the date of such sale or contract for sale, whichever is
    the shorter period.

    (C) No purchaser is entitled to the benefit of this section who has failed to
    accept, within thirty days from the date of such offer, an offer in writing made
    after two weeks from the date of the sale or contract of sale, by the seller or
    by any person that has participated in or aided the seller in any way in making
    the sale or contract of sale, to take back the security in question and to refund
    the full amount paid by the purchaser.'
