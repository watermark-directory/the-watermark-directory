- number: '1703.28'
  heading: Forfeiture for transacting business without license
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: 'Any foreign corporation required to be licensed under sections 1703.01 to
    1703.31, inclusive, of the Revised Code, which transacts business in this state
    without being so licensed, or when its license has expired or been canceled and
    has not been reinstated, shall forfeit not less than two hundred fifty dollars
    nor more than ten thousand dollars. Such forfeiture shall be recovered in an action
    in the name of the state brought in the court of common pleas of Franklin county,
    or in any county in which the corporation has transacted business or has property
    or a place of business, by the attorney general or by the prosecuting attorney.
    If such action is brought by the attorney general such forfeiture shall on collection
    be paid into the state treasury to the credit of the general revenue fund, and
    if brought by the prosecuting attorney one half of such forfeiture shall on collection
    be paid to the treasurer of the county in which such action was brought and one
    half shall be paid into the state treasury to the credit of the general revenue
    fund. In addition to such forfeiture the court shall require that the corporation
    pay all amounts it should have paid under sections 1703.01 to 1703.31, inclusive,
    of the Revised Code, as a filing fee and as annual franchise taxes, plus interest
    thereon at the rate of six per cent per annum, for all years in which the court
    determines it was transacting business in this state without being so licensed
    and shall render judgment for such amount. Proceedings for the recovery of such
    forfeiture, filing fee, and annual franchise taxes must be commenced not later
    than five years after such corporation has ceased to transact any business in
    this state.

    For good cause shown, the secretary of state, with the consent of the attorney
    general, may remit the forfeiture or a part thereof, with or without bringing
    suit and before or after judgment, and the court in which an action is pending
    for the collection of a forfeiture, may remit all or part of the forfeiture for
    good cause shown.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1703.28
- number: '1703.29'
  heading: Unlicensed foreign corporation contracts not affected - corporation cannot
    maintain an action
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: '(A) The failure of any corporation to obtain a license under sections 1703.01
    to 1703.31 of the Revised Code, does not affect the validity of any contract with
    such corporation, but no foreign corporation that should have obtained such license
    shall maintain any action in any court until it has obtained such license. Before
    any such corporation shall maintain such action on any cause of action arising
    at the time when it was not licensed to transact business in this state, it shall
    pay to the secretary of state a forfeiture of two hundred fifty dollars and file
    in the secretary of state''s office the papers required by divisions (B) or (C)
    of this section, whichever is applicable.

    (B) If such corporation has not been previously licensed to do business in this
    state or if its license has been surrendered it shall file as required by division
    (A) of this section:

    (1) Its application for a license certificate, together with the filing fee, with
    such information as the secretary of state requires as to the time it began to
    transact business in this state and as to the number of its issued shares represented
    in this state, and with the license fees on its shares represented in this state
    plus a forfeiture of fifteen per cent thereon.

    (2) A certificate from the tax commissioner that the corporation has paid all
    taxes that it should have paid had it qualified to do business in this state at
    the time it began to do so, plus any penalties assessable on said taxes on account
    of failure to pay them within the time prescribed by law, or a certificate of
    the commissioner that the corporation has furnished security satisfactory to the
    commissioner for the payment of all such taxes and penalties.

    (C) If such corporation has been previously licensed to transact business in this
    state and its license has expired or has been canceled by the secretary of state
    upon order of the commissioner, or for failure to designate an agent for service
    of process, it shall file, within two years of the cancellation or expiration,
    with the secretary of state its application for reinstatement, as provided by
    law, together with the proper reinstatement fee plus a forfeiture of fifteen per
    cent thereon.

    Upon the filing of such application and payment of such fees and penalties or
    forfeitures, the secretary of state shall issue to such corporation a license
    certificate.'
