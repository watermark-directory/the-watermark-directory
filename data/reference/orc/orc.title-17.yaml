- number: '1707.17'
  heading: Renewal - license fees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A)(1) The license of every dealer in and salesperson of securities shall
    expire on the thirty-first day of December of each year, and may be renewed upon
    the filing with the division of securities of an application for renewal, and
    the payment of the fee prescribed in this section. The division shall give notice,
    without unreasonable delay, of its action on any application for renewal of a
    dealer''s or salesperson''s license.

    (2) The license of every investment adviser and investment adviser representative
    licensed under section 1707.141 or 1707.161 of the Revised Code shall expire on
    the thirty-first day of December of each year. The licenses may be renewed upon
    the filing with the division of an application for renewal, and the payment of
    the fee prescribed in division (B) of this section. The division shall give notice,
    without unreasonable delay, of its action on any application for renewal.

    (3) An investment adviser required to make a notice filing under division (B)
    of section 1707.141 of the Revised Code annually shall file with the division
    the notice filing and the fee prescribed in division (B) of this section, no later
    than the thirty-first day of December of each year.

    (4) The license of every state retirement system investment officer licensed under
    section 1707.163 of the Revised Code and the license of a bureau of workers''
    compensation chief investment officer issued under section 1707.165 of the Revised
    Code shall expire on the thirtieth day of June of each year. The licenses may
    be renewed on the filing with the division of an application for renewal, and
    the payment of the fee prescribed in division (B) of this section. The division
    shall give notice, without unreasonable delay, of its action on any application
    for renewal.

    (5) The license of every portal operator licensed under section 1707.054 of the
    Revised Code shall expire on the thirty-first day of December of each year. The
    license may be renewed upon the filing with the division an application for renewal,
    and payment of the fee prescribed in division (B) of this section. The division
    shall give notice, without unreasonable delay, of its action on any application
    for renewal.

    (B)(1) The fee for each dealer''s license, and for each annual renewal thereof,
    shall be two hundred dollars.

    (2) The fee for each salesperson''s license, and for each annual renewal thereof,
    shall be sixty dollars.

    (3) The fee for each investment adviser''s license, and for each annual renewal
    thereof, shall be one hundred dollars.

    (4) The fee for each investment adviser notice filing required by division (B)
    of section 1707.141 of the Revised Code shall be one hundred dollars.

    (5) The fee for each investment adviser representative''s license, and for each
    annual renewal thereof, shall be thirty-five dollars.

    (6) The fee for each state retirement system investment officer''s license, and
    for each annual renewal thereof, shall be fifty dollars.

    (7) The fee for a bureau of workers'' compensation chief investment officer''s
    license, and for each annual renewal thereof, shall be fifty dollars.

    (8) The fee for a portal operator license, and for each annual renewal thereof,
    shall be one hundred dollars.

    (C) A dealer''s, salesperson''s, investment adviser''s, investment adviser representative''s,
    bureau of workers'' compensation chief investment officer''s, state retirement
    system investment officer''s, or portal operator''s license may be issued at any
    time for the remainder of the calendar year. In that event, the annual fee shall
    not be reduced.

    (D) The division may, by rule or order, waive, in whole or in part, any of the
    fee requirements of this section for any person or class of persons if, in the
    same calendar year, the person or class of persons is required to pay an additional
    fee as a result of changes in federal law and regulations implemented under Title
    IV of the "Dodd-Frank Wall Street Reform and Consumer Protection Act of 2010,"
    124 Stat. 1576 (2010), 15 U.S.C. 80b-3a(a), under which a person or class of persons
    formerly subject to regulation under the United States securities and exchange
    commission is subject to state regulation under Chapter 1707. of the Revised Code.'
