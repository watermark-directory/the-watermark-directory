- number: '1701.02'
  heading: Computation of time for notice
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: In computing the period of time for the giving of a notice required or permitted
    under sections 1701.01 to 1701.98, inclusive, of the Revised Code, or under the
    articles, the regulations, or the bylaws of a corporation, or a resolution of
    its shareholders or directors, the day on which the notice is given shall be excluded,
    and the day when the act for which notice is given is to be done shall be included,
    unless the instrument calling for the notice otherwise provides. If notice is
    permitted to be given by mail, the notice shall be deemed to have been given when
    deposited in the mail.
