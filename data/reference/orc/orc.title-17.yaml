- number: '1704.06'
  heading: Contents of articles of incorporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1704'
    name: Transactions Involving Interested Shareholders
  text: '(A) If the original articles of an issuing public corporation state, or if
    the articles of an issuing public corporation have been amended to state, by specific
    reference to this chapter, that this chapter does not apply to the corporation,
    the corporation may amend its articles, in compliance with the provisions of section
    1701.70, 1701.71, or 1701.72 of the Revised Code, to eliminate or modify that
    statement.

    (B) For any corporation, whether or not it is an issuing public corporation, regulations
    of the corporation may be adopted or amended, in compliance with the provisions
    of section 1701.11 of the Revised Code, to include both a statement that the provisions
    of this chapter apply to the corporation, whether or not it is or continues to
    be an issuing public corporation, in a transaction that would be a Chapter 1704.
    transaction for a corporation that is an issuing public corporation, and reasonable
    sanctions for failure to comply with the provisions of this chapter.'
