  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1746.11
- number: '1746.12'
  heading: Shares of beneficial interest
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: '(A) Unless otherwise provided in the trust instrument, shares of beneficial
    interest need not be evidenced by certificates.

    (B) For purposes of Title XIII of the Revised Code, shares of beneficial interest,
    however designated, in a business trust shall be treated as personal property,
    notwithstanding the nature of the property of which the business trust shall consist,
    and shall be subject to attachment and execution. Unless otherwise provided in
    the trust instrument, such shares may be pledged by the holders thereof.

    (C) A share of a beneficial interest in the trust estate of a business trust is
    a security subject to Chapter 1707. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1746.12
- number: '1746.13'
  heading: Liability to third persons - insurance
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: '(A) Liability to third persons for any act, omission, or obligation of a
    business trust that has made the filings described in section 1746.04 of the Revised
    Code or a trustee or trustees of a business trust when acting in such capacity,
    shall extend to the whole of the trust estate held by such trustee or trustees,
    or so much thereof as may be necessary to discharge such liability, but no such
    liability shall attach to the trustees, officers, employees, agents, or the holders
    of the shares of beneficial interest in such business trust for any such act,
    omission, or obligation.

    (B) A business trust that has made the filings described in section 1746.04 of
    the Revised Code may purchase and maintain insurance on behalf of any person who
    is or was a trustee, officer, employee, shareholder, or agent of the business
    trust, or is or was serving at the request of the business trust as a director,
    trustee, officer, employee, or agent of another business trust, corporation, domestic
    or foreign, nonprofit or for profit, partnership, joint venture, trust, or other
    enterprise against any liability asserted against him and incurred by him in any
    such capacity, or arising out of his status as such, whether or not the trust
    instrument of the business trust contains provisions for indemnification of such
    person against such liability by the business trust.

    (C) The trust estate of a business trust that has made the filings described in
    section 1746.04 of the Revised Code is not liable for any act, omission, or obligation
    of either of the following:

    (1) Any holder of its shares of beneficial interest;

    (2) Any trustee when not acting in such capacity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1746.13
- number: '1746.14'
  heading: Perpetual period of existence
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: Unless otherwise stated in the trust instrument, a business trust that has
    made the filings described in section 1746.04 of the Revised Code has a perpetual
    period of existence and is not affected by any rule against perpetuities. Nothing
    contained in this section shall be construed or interpreted to limit, prohibit,
    or invalidate any provision of a trust instrument providing that such business
    trust may be terminated at any time by action of the trustees or by the vote of
    a specified percentage in interest of the beneficial owners thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1746.14
- number: '1746.15'
  heading: Withdrawal from state
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: Any business trust that has made the filings described in section 1746.04
    of the Revised Code may withdraw from this state at any time by filing in the
    office of the secretary of state a verified copy of a resolution duly adopted
    by its trustees declaring its intention to withdraw and surrender its authority,
    accompanied by the fee specified in division (T) of section 111.16 of the Revised
    Code.
