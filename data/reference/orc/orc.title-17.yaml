    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: 'The secretary of state shall keep a record of all foreign corporations licensed
    to transact business in this state.

    Once a month the secretary of state shall prepare and deliver to the tax commissioner
    a list of all foreign corporations licensed to transact business in this state
    during the preceding month, showing the location and addresses of their principal
    offices and of their principal offices in this state, and the names and addresses
    of their statutory agents, together with a list of all foreign corporations previously
    admitted to transact business in this state whose licenses to do so have expired
    or been canceled.'
