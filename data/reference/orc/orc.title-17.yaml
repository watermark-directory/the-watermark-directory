- number: '1710.021'
  heading: Time period for transfer of property
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: 'Any owner of an interest in real property that is located within a proposed
    or existing special improvement district who enters into a contract to transfer
    the interest shall give to the transferee of the interest within the specified
    period of time both of the following:

    (A) Within five days after entering into the contract, each notice that the owner
    received under this chapter within ninety days prior to entering into the contract;

    (B) Within five days after its receipt, each notice that the owner receives under
    this chapter after entering into the contract until the contract is completely
    performed or terminated.'
