- number: '1751.59'
  heading: Coverage of adopted children
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'No individual or group health insuring corporation policy, contract, or agreement
    that makes family coverage available may be delivered, issued for delivery, or
    renewed in this state, unless the policy, contract, or agreement covers adopted
    children of the subscriber on the same basis as other dependents.

