- number: '1701.19'
  heading: Determination of fair value of property or services
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) When a determination of the fair value to a corporation is made by the
    incorporators, directors, or shareholders with respect to consideration, other
    than cash, paid or to be paid to the corporation for shares; or made by the directors
    with respect to property voluntarily contributed to the corporation; or made by
    the directors with respect to physical assets of the corporation that are reckoned
    by the directors to have a fair value to the corporation in excess of the amount
    at which they are carried on its books; or provided for in a decree or order as
    provided in section 1701.75 of the Revised Code or set forth in an agreement of
    merger or consolidation adopted as provided in section 1701.78, 1701.79, 1701.80,
    or 1701.801 of the Revised Code, then the determination shall be conclusive in
    any action or proceeding in which it is claimed that the fair value to the corporation
    of such consideration or property is or was less than the value so determined,
    unless the party asserting a claim affirmatively proves by clear and convincing
    evidence, and otherwise than by proving the difference between the value of such
    consideration or property and the fair value so determined, that the determination
    was knowingly and intentionally made, by the persons making the determination,
    at a value greater than the fair value of such consideration or property to the
    corporation.

    (B) The making of an agreement to issue or dispose of shares for property or consideration
    other than cash or the issuance or disposition of shares in consummation of any
    agreement or transaction referred to in division (A) of this section shall be
    held to be a determination that the property or other consideration involved has
    a fair value to the corporation not less than the value required to justify the
    issuance or disposition of such shares.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.19
- number: '1701.20'
  heading: Enforcing payment for shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) When no provision as to time of payment for shares of a corporation is
    made in the contract of subscription or purchase, they shall be paid for on the
    call of the directors.

    (B) In case of default in the payment of any contract of subscription or purchase,
    the corporation may collect the amount unpaid, and in addition to other remedies,
    unless the contract of subscription or purchase otherwise provides, the corporation,
    thirty days after notice setting forth such default and the time and place of
    the proposed sale of his shares has been given to the subscriber or purchaser
    by registered mail, may sell his shares at public auction. Notice of the time
    and place of sale shall be published once, at least fifteen days prior to such
    sale, in a newspaper of general circulation in the county in which the principal
    office of the corporation is located. Any proceeds remaining after paying the
    amount due on the shares and the cost of sale shall be paid to the subscriber
    or purchaser.

    (C) If a receiver with power to collect debts due the corporation or a trustee
    in bankruptcy of the corporation has been appointed, all amounts unpaid on any
    contract of subscription or purchase shall be paid at such times and in such installments
    as such receiver or trustee, or the court appointing him, may direct, subject
    to the provisions of the contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.20
- number: '1701.21'
  heading: Conversion of shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) By the express terms of shares of any class or series, such shares may
    be convertible into the same or a different number of shares of any other class
    or series. Such express terms may contain any statements not repugnant to law
    for the protection of such conversion rights, including, without limiting the
    generality of such authority: restrictions upon the authorization or issuance
    of additional shares; provisions for the adjustment of the conversion price or
    ratio; provisions concerning rights in the event of reorganization, merger, consolidation,
    or lease, sale, exchange, transfer or other disposition of all, or substantially
    all, of the assets of the corporation; provisions for the reservation of authorized
    but unissued shares to satisfy such conversion rights; and restrictions upon the
    declaration or payment of dividends or distributions. Such express terms may also
    include statements, not inconsistent with the provisions of section 1701.30 of
    the Revised Code, to provide that upon the exercise of conversion rights the stated
    capital of the corporation shall be created, increased, reduced, or eliminated
    in the manner, at the rate, or to the extent provided therein.

    (B) The corporation shall not issue any shares, with or without par value, which
    are convertible into shares having an aggregate par value greater than the aggregate
    stated capital of such convertible shares unless in each case immediately after
    the issuing of any of the convertible shares the corporation will have a surplus
    not less in amount than the excess of the aggregate par value of all the shares
    into which such convertible shares may be converted over the aggregate stated
    capital of all the outstanding convertible shares; and during the entire period
    that such conversion rights may be exercised, the corporation shall reserve from
    its surplus, solely for transfer to stated capital upon the exercise of such conversion
    rights, an amount equal at the time to the excess of the aggregate par value of
    all the shares into which the then outstanding convertible shares may be converted
    over the aggregate stated capital of such convertible shares; provided that the
    failure or inability of the corporation to maintain such reserve shall not affect
    the conversion rights of any outstanding convertible shares.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.21
- number: '1701.22'
  heading: Conversion rights
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Unless the articles otherwise provide, a corporation by its directors
    may, subject to the provisions of this section, confer on the holder of any obligations
    of the corporation the right to convert such obligations into shares of any authorized
    class or series, on such terms as are set forth in the instrument evidencing such
    conversion rights. Such terms may include any statements not repugnant to law
    for the protection of such conversion rights, including, but without limiting
    the generality of such authority: restrictions upon the authorization or issuance
    of additional shares; provisions for the adjustment of the conversion price or
    ratio; provisions concerning rights in the event of reorganization, merger, consolidation,
    or lease, sale, exchange, transfer, or other disposition of all, or substantially
    all, of the assets of the corporation; provisions for the reservation of authorized
    but unissued shares to satisfy such conversion rights; and restrictions upon the
    declaration or payment of dividends or distributions. Such terms may also include
    statements, not inconsistent with the provisions of section 1701.30 of the Revised
    Code, to provide that upon the exercise of conversion rights the stated capital
    of the corporation shall be created or increased in the manner, at the rate, or
    to the extent provided therein.

    (B) If the shares into which such obligations are convertible would be subject
    to pre-emptive rights if issued for cash, the conferring of the conversion rights
    must be authorized by such vote or consent of the shareholders or holders of shares
    of particular classes as would then be required to waive or release such pre-emptive
    rights; and such vote or consent shall release the pre-emptive rights to the shares
    required to satisfy such conversion rights if and when exercised.

    (C) If at the time of conferring such conversion rights the corporation does not
    have authorized and unissued shares sufficient to satisfy such rights if and when
    exercised, the conferring of such rights must be authorized by such vote of the
    shareholders or holders of shares of particular classes as would then be required
    to adopt an amendment to the articles for the purpose of increasing the authorized
    number of such shares, and the shares required to be issued upon the exercise
    of such conversion rights shall be provided by an amendment concurrently or thereafter
    adopted by the shareholders or the directors.

    (D) The corporation shall not issue any obligations which are convertible into
    shares having an aggregate par value greater than the principal amount of such
    obligations, unless in each case immediately after the issuing of any of the convertible
    obligations, the corporation will have a surplus not less in amount than the excess
    of the aggregate par value of all the shares into which such convertible obligations
    may be converted over the aggregate principal amount of the outstanding convertible
    obligations; and during the entire period that such conversion rights may be exercised,
    the corporation shall reserve, from its surplus, solely for transfer to stated
    capital upon the exercise of such conversion rights an amount equal at the time
    to the excess of the aggregate par value of all the shares into which the then
    outstanding convertible obligations may be converted over the aggregate principal
    amount of such convertible obligations; provided that the failure or inability
    of the corporation to maintain such reserve shall not affect the conversion rights
    of any oustanding convertible obligations.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.22
- number: '1701.23'
  heading: Redemption of shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) By the express terms of shares of any class or series, such shares may
    be redeemable, in whole at one time or in part from time to time, at the option
    of the corporation, or at a specified time or event, in such manner and upon such
    conditions, price, and notice as are provided in said express terms. The exercise
    of such right of redemption shall, however, be subject to the limitations provided
    in section 1701.35 of the Revised Code.

    (B) Unless otherwise provided in the articles, redemption of a part only of the
    outstanding shares on call shall be pro rata or by lot in such manner as the directors
    deem equitable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.23
- number: '1701.24'
  heading: Certificates for shares - fractional shares - uncertificated shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) The shares of a corporation are personal property.

    (B) Unless the articles, the regulations adopted by the shareholders, or the regulations
    adopted by the directors pursuant to division (A)(1) of section 1701.10 of the
    Revised Code provide otherwise, a holder of shares is entitled to one or more
    certificates, signed by the chairperson of the board or the president or a vice-president
    and by the secretary, an assistant secretary, the treasurer, or an assistant treasurer
    of the corporation, that shall certify the number and class of shares held by
    the holder in the corporation, but no certificate for shares shall be executed
    or delivered until those shares are fully paid. When the certificate is countersigned
    by an incorporated transfer agent or registrar, the signature of any of those
    officers of the corporation may be facsimile, engraved, stamped, or printed. Although
    any officer of the corporation whose manual or facsimile signature is affixed
    to the certificate ceases to be such officer before the certificate is delivered,
    the certificate nevertheless shall be effective in all respects when delivered.

    (C) A corporation is not obligated to but may issue fractional shares. The holder
    of a fractional share is entitled to exercise the rights of a shareholder, including
    the right to vote, to receive dividends, and to participate in the assets of the
    corporation upon liquidation. In the case of uncertificated securities, the corporation
    may proceed as provided in divisions (C)(1) and (2) of this section. In the case
    of certificated securities, the corporation may execute and deliver a certificate
    for or including a fraction of a share or, in lieu thereof, may do any of the
    following:

    (1) Pay to the person otherwise entitled to become a holder of a fraction of a
    share an amount in cash specified as the value of the fraction of a share in the
    articles, a resolution of the directors, or other agreement or instrument pursuant
    to which that fraction of a share otherwise would be issued, or, if not so specified,
    then the amount determined for that purpose by the directors of the issuing corporation,
    or the amount realized upon sale of the fraction of a share;

    (2) Provide reasonable means to afford to the person the opportunity, on specified
    terms and conditions, to purchase or sell fractional interests in shares, to the
    exclusion of all rights the person otherwise might have;

    (3) Execute and deliver registered or bearer scrip over the manual or facsimile
    signature of an officer of the corporation or of its agent for that purpose, exchangeable
    as provided in the scrip for full shares, but such scrip shall not entitle the
    holder to any rights as a shareholder except as provided in the scrip. The scrip
    may provide that it shall become void unless the rights of the holders are exercised
    within a specified period and may contain any other provisions that the corporation
    deems advisable. Whenever any such scrip ceases to be exchangeable for full shares,
    the shares that otherwise would have been issuable as provided in the scrip shall
    be deemed to be treasury shares unless the scrip contains other provision for
    their disposition.

    (D) A joint estate with the incidents of a joint estate as at common law, including
    the right of survivorship, may be created in shares by registering the same in
    the case of uncertificated securities, or by executing and delivering a certificate
    in the case of certificated securities to two or more persons with the words "as
    joint tenants" or "as joint tenants with right of survivorship and not as tenants
    in common" following their names. Upon receipt by the corporation of proof satisfactory
    to it of the death of one or more joint tenants, it may register the transfer
    to, or execute and deliver a new certificate to, the survivor or survivors.

    (E) Whenever a corporation has determined that any outstanding certificates for
    shares should be canceled and exchanged for other certificates, the corporation
    may order and require the holders of the outstanding certificates to surrender
    them for that purpose within a reasonable time to be fixed by the corporation.
    The order may provide that, until compliance with the order, any or all rights
    as a shareholder of the holder of any certificate so required to be surrendered
    shall be suspended with respect to the shares represented by the certificate.
    Not less than ten days before the order is to become effective, the corporation
    shall give notice of the order by mail to each shareholder affected by the order
    at the shareholder''s address as it appears on the records of the corporation.

    (F) The articles of a corporation, the regulations adopted by the shareholders
    of a corporation, or the regulations adopted by the directors of a corporation
    pursuant to division (A)(1) of section 1701.10 of the Revised Code may provide
    that some or all of any or all classes and series of shares of that corporation
    shall be uncertificated shares. Unless otherwise provided by the articles or regulations,
    the directors may provide by resolution that some or all of any or all classes
    and series of shares of a corporation shall be uncertificated shares, provided
    that the resolution shall not apply to shares represented by a certificate until
    the certificate is surrendered to the corporation and that the resolution shall
    not apply to a certificated security issued in exchange for an uncertificated
    security. Within a reasonable time after the issuance or transfer of uncertificated
    shares, the corporation shall send to the registered owner of the shares a written
    notice containing the information required to be set forth or stated on certificates
    pursuant to division (A) of section 1701.25 of the Revised Code. Except as otherwise
    expressly provided by law, the rights and obligations of the holders of uncertificated
    shares and the rights and obligations of the holders of certificates representing
    shares of the same class and series shall be identical.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.24
- number: '1701.25'
  heading: Statements on certificate for shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Each certificate for shares of a corporation shall state:

    (1) That the corporation is organized under the laws of this state;

    (2) The name of the person to whom the shares represented by the certificate are
    issued;

    (3) The number of shares represented by the certificate;

    (4) If the shares of the corporation are classified, the designation of the class,
    and the series, if any, of the shares represented by the certificate;

    (5) On the face or the back of the certificate:

    (a) The express terms, if any, of the shares represented by the certificate and
    of the other class or classes and series of shares, if any, which the corporation
    is authorized to issue; or

    (b) A summary of such express terms; or

    (c) That the corporation will send to the shareholder a copy of such express terms
    without charge within five days after receipt of written request therefor; or

    (d) That a copy of such express terms is attached to and by reference made a part
    of such certificate and that the corporation will send to the shareholder a copy
    of such express terms without charge within five days after receipt of written
    request therefor if the copy has become detached from the certificate.

    (B) No restriction on the right to transfer shares and no reservation of lien
    on shares shall be effective against a transferee of such shares unless there
    has been compliance with section 1308.11 of the Revised Code, and unless, as to
    certificated securities, there is set forth on the face or the back of the certificate
    therefor:

    (1) A statement of the terms of such restriction or reservation; or

    (2) A summary of the terms of such restriction or reservation and a statement
    that the corporation will send to the shareholder a copy of such restriction or
    reservation without charge within five days after receipt of written request therefor;
    or

    (3) If such restriction or reservation is contained in the articles or regulations
    of the corporation, or in an instrument in writing to which the corporation is
    a party, a statement to that effect and a statement that the corporation will
    send to the shareholder a copy of such restriction or reservation without charge
    within five days after receipt of written request therefor; or

    (4) If such restriction or reservation is contained in an instrument in writing
    (other than the articles or regulations of the corporation or an instrument in
    writing to which the corporation is a party), a statement to that effect identifying
    the instrument by title, date, and parties.

    (C) A corporation shall send to a shareholder without charge within five days
    after receipt of written request therefor the copy or copies referred to in divisions
    (A)(5)(c) and (d) and (B)(2) and (3) of this section by mail, overnight delivery
    service, or any other means of communication authorized by the shareholder to
    whom the copy or copies are sent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.25
- number: '1701.26'
  heading: Transfer agents and registrars
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: A corporation may open transfer books in any state for the purpose of transferring
    shares issued by it, and it may employ agents to keep the records of its shares,
    or to transfer or to register shares, or both, in any state, and the acts of such
    agents shall be binding on the corporation. The duties and liabilities of such
    agents shall be such as are agreed to by the corporation. If no such transfer
    agent is appointed by it to act in this state, the corporation shall keep an office
    in this state at which shares are transferable, and at which it keeps books in
    which are recorded the names and addresses of all shareholders and all transfers
    of shares.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.26
- number: '1701.27'
  heading: Replacement of lost, stolen or destroyed certificate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) In case a certificate for shares is lost, stolen, or destroyed, the court
    of common pleas or the probate court of the county in which the principal office
    of the corporation is located shall have jurisdiction to hear and determine all
    questions respecting such loss, theft, or destruction, the person interested therein,
    the bond required to be given to protect the corporation or any person injured
    by the execution and delivery of a new certificate, the terms on which a new certificate
    shall be executed and delivered, and the costs and counsel fees, if any, to be
    allowed to the corporation.

    (B) A corporation which voluntarily and in good faith executes and delivers a
    new certificate in lieu of one believed to have been lost, stolen, or destroyed,
    or which executes and delivers a new certificate in compliance with an order of
    a court of competent jurisdiction, may recognize the person named in the new certificate,
    or any certificate thereafter executed and delivered in exchange or substitution
    for such new certificate, as the owner of the shares described therein for all
    purposes, until the owner of the original certificate, or a transferee thereof
    without notice and for value, enjoins the corporation and the holder of any new
    certificate, or any certificate executed and delivered in exchange or substitution
    for such new certificate, from so acting.

    (C) Special provisions in section 1308.41 of the Revised Code relating to the
    replacement of lost, apparently destroyed, or wrongfully taken securities shall
    govern to the exclusion of the provisions of this section on this subject, except
    where it clearly appears that a special provision is cumulative, in which case
    it and the provisions of this section on the same subject shall apply.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.27
- number: '1701.28'
  heading: Recognizing record ownership of shares or other securities
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) As used in this section "security" means scrip issued in lieu of fractional
    shares, warrants, and rights to purchase or subscribe for shares, and promissory
    obligations of a corporation in registered form.

    (B) A corporation shall incur no liability if:

    (1) In executing and delivering a certificate for shares or other securities of
    such corporation, whether upon original issue or transfer thereof, or in transferring
    on its records such shares or other securities, it adds to the name of the person
    inscribed as the owner of record of the shares or other securities such words
    of description, limitation, or qualification as, in the case of an original issue,
    are specified by the purchaser or subscriber or, in the case of transfer, as are
    specified in the indorsement, assignment, or instrument relative thereto;

    (2) It treats any person in whose name shares or other securities stand of record
    on its books as the absolute owner thereof, with full competency, capacity, and
    authority to exercise all rights of ownership thereof irrespective of any knowledge
    or notice to the contrary, or any description, limitation, or qualification, or
    reference to any other instrument, or to the rights of any other person, appearing
    upon its records or upon the certificate for shares or such other securities;

    (3) When any person has furnished to the issuing corporation proof, satisfactory
    to it, of his appointment and qualifications as:

    (a) executor under the last will of a deceased holder of record of its shares
    or such other securities;

    (b) an administrator of the estate of such a holder;

    (c) a guardian, committee, or conservator of the estate of a ward or incompetent
    who is a holder of record of its shares or such other securities;

    (d) a trustee in bankruptcy of such a holder;

    (e) a statutory or judicial receiver or liquidator of the estate or affairs of
    such a holder; it treats such a fiduciary as the absolute owner of such shares
    or securities to the same extent as though such fiduciary were the holder of record
    thereof;

    (4) When any other fiduciary has furnished to the corporation proof, satisfactory
    to it, of his authority to exercise any rights with respect to shares or such
    other securities of the corporation which do not stand of record in his name,
    it treats such fiduciary as entitled to exercise such rights;

    (5) When two or more fiduciaries claim to be entitled to the same rights with
    respect to the same shares or securities, it refuses to treat any of them as entitled
    to such rights unless proof, satisfactory to it, is furnished as to which of such
    fiduciaries is entitled to the rights in question.

    (C) The corporation is not obligated to inquire into the existence of, or to see
    to the performance or observance of, any duty or obligation to a third person
    by a holder of record of any of its shares or other securities or by anyone whom
    it may, as provided in this section, treat as the absolute owner thereof.

    (D) When the corporation has treated a minor as entitled to exercise any rights
    of ownership in its shares or other securities, no subsequent disaffirmance or
    avoidance is effective as against the corporation.

    (E) The rights, privileges, and immunities afforded to the corporation in this
    section extend also to each transfer agent and to each registrar of its shares
    or other securities, to its inspectors of election, and to all agents of the corporation
    concerned with the exercise of any rights by any of its shareholders or security
    holders.

    (F) This section does not enlarge or affect the competency, authority, rights,
    privileges, immunities, or obligations of any holder of record of shares or other
    securities or of any fiduciary with respect to any person other than the corporation
    issuing such shares or other securities and its agents or representatives described
    in division (E) of this section; and this section does not relieve the corporation
    from any liability which it otherwise would have for breach by it of a contract
    to which it is a party, or for violation of lawful provisions in the articles
    or the regulations, or for participating in bad faith with a fiduciary in the
    breach of any duty of the latter, or from any liability by reason of transactions
    by the corporation involving the acquisition or disposition by it of any of its
    shares or other securities.

    (G) A corporation is not entitled to the rights, privileges, and immunities otherwise
    afforded to it under this section in respect of any particular actions referred
    to in this section, in the event and to the extent that such action was taken
    contrary to the order of a court of competent jurisdiction in a proceeding to
    which the corporation was a party, or contrary to a judgment, order, or decree
    of a court of competent jurisdiction terminating, suspending, or restricting the
    particular rights of the holder of record of such shares or other securities or
    the fiduciary relationship with respect thereto, or the competency or authority
    of such holder or fiduciary, or transferring to or vesting in another person such
    relationships or rights of ownership of the shares or other securities, or directing
    the manner in which the authority of such holder or fiduciary shall be exercised,
    a certified copy of which judgment, order, or decree has been filed with the corporation
    prior to the taking of such action.'
