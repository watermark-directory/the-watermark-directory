- number: '1782.48'
  heading: Laws governing foreign partnerships
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'Except as otherwise provided in the Ohio Constitution:

    (A) The laws of the state under which a foreign limited partnership is organized
    govern its organization and internal affairs and the liability of its limited
    partners;

    (B) Except as provided in section 1782.51 of the Revised Code, a foreign limited
    partnership may not be denied registration by reason of any difference between
    those laws and the laws of this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.48
- number: '1782.49'
  heading: Application for registration of foreign limited partnership
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'Before transacting business in this state, a foreign limited partnership
    shall register with the secretary of state. In order to register, a foreign limited
    partnership shall submit to the secretary of state an application for registration
    as a foreign limited partnership. The application shall be on a form prescribed
    by the secretary of state, shall be signed by a general partner, and shall set
    forth all of the following:

    (A) The name of the foreign limited partnership;

    (B) The state and date of its formation;

    (C) The name and address of the agent for service of process on the foreign limited
    partnership, whom the foreign limited partnership shall appoint. The agent shall
    be one of the following:

    (1) A natural person who is a resident of this state;

    (2) A domestic or foreign corporation, nonprofit corporation, limited liability
    company, partnership, limited partnership, limited liability partnership, limited
    partnership association, professional association, business trust, or unincorporated
    nonprofit association that has a business address in this state. If the agent
    is an entity other than a domestic corporation, the agent shall meet the requirements
    of Title XVII of the Revised Code for an entity of the agent''s type to transact
    business or exercise privileges in this state.

    (D) A statement that the secretary of state is appointed the agent of the foreign
    limited partnership for service of process if an agent has not been appointed
    under division (C) of this section, or, if an agent is appointed, the agent''s
    authority has been revoked or the agent is not found or served after the exercise
    of reasonable diligence;

    (E) The address of the office required to be maintained in the state of its organization
    by the laws of that state or, if not so required, of the principal office of the
    foreign limited partnership;

    (F) The names and business or residence addresses of the general partners;

    (G) The address of the office at which is kept a list of the names and business
    or residence addresses of the limited partners and their capital contributions,
    together with an undertaking by the foreign limited partnership to keep those
    records until the registration of the foreign limited partnership in this state
    is canceled or withdrawn.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.49
- number: '1782.50'
  heading: Acceptance of application by secretary of state
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) Upon receipt of an application for registration of a foreign limited
    partnership as described in section 1782.49 of the Revised Code and all filing
    fees required by law, the secretary of state shall accept the application for
    filing and shall make a copy of the application by microfilm or by any authorized
    photostatic or digitized process. Evidence of the filing shall be returned to
    the person who filed it.

    (B) Upon having been filed as provided in division (A) of this section, an application
    for registration as a foreign limited partnership shall be deemed to be the applicant''s
    certificate of registration as a foreign limited partnership in this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.50
