- number: '1707.25'
  heading: Injunction against issuance, sale, acting as an investment adviser or acting
    as an investment adviser representative
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'In case any person fails to file any statement or report required by sections
    1707.01 to 1707.50 of the Revised Code, to obey any subpoena the issuance of which
    is provided for in those sections, or to produce books, records, or papers, give
    testimony, or answer questions, as required by those sections, the director of
    commerce may apply to a court of common pleas of any county for, and upon proof
    of such failure the court may grant, an injunction restraining the acting as an
    investment adviser, investment adviser representative, bureau of workers'' compensation
    chief investment officer, or state retirement system investment officer, or the
    issuance, sale, or offer for sale of any securities by the person or by its agents,
    employees, partners, officers, directors, or shareholders, until such failure
    has been remedied and other relief as the facts may warrant has been had. Such
    injunctive relief is available in addition to the other remedies provided for
    in sections 1707.01 to 1707.50 of the Revised Code.

    Where the person refusing to comply with such order of court is an issuer of securities,
    the court may enjoin the sale by any dealer of any securities of the issuer, and
    the division of securities may revoke the qualification of the securities of the
    issuer, or suspend or revoke the sale of any securities of the issuer which have
    been registered by description, and such securities shall not thereafter be sold
    by any dealer until the order of the court or of the division is withdrawn.'
