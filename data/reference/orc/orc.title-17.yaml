- number: '1751.55'
  heading: Effect of workers compensation coverage
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: A health insuring corporation policy, contract, or agreement shall not be
    construed to exclude illness or injury upon the ground that the subscriber might
    have elected to have such illness or injury covered by workers' compensation under
    Chapter 4123. of the Revised Code unless the policy, contract, or agreement clearly
    excludes work or occupational related illness or injury, or the policy, contract,
    or agreement, or a separate writing signed by the subscriber, informs the subscriber
    that such coverage is excluded and may be available to the subscriber under workers'
    compensation as the sole proprietor of a business, a member of a partnership,
    or an officer of a family farm corporation.
  history: null
