- number: '1713.34'
  heading: Medical colleges or embalming board may receive bodies for study or dissection
    - procedure
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: Superintendents of city hospitals, directors or superintendents of city infirmaries,
    county homes, or other charitable institutions, directors or superintendents of
    workhouses, founded and supported in whole or in part at public expense, superintendents
    or managing officers of state benevolent institutions, boards of township trustees,
    sheriffs, or coroners, in possession of bodies not claimed or identified, or which
    must be buried at the expense of the state, county, or township, before burial,
    shall notify the professor of anatomy in a college which by its charter is empowered
    to teach anatomy, or the secretary of the board of embalmers and funeral directors
    of this state, of the fact that such bodies are being so held. If after a period
    of thirty-six hours the body has not been accepted by friends or relatives for
    burial at their expense, such superintendent, director, or other officer, on the
    written application of such professor, or the secretary of the board of embalmers
    and funeral directors, shall deliver to such professor or secretary, for the purpose
    of medical or surgical study or dissection or for the study of embalming, the
    body of any such person who died in any of such institutions from any disease
    which is not infectious. The expense of the delivery of the body shall be borne
    by the parties in whose keeping the body was placed.
