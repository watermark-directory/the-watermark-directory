- number: '1704.04'
  heading: Determining fair market value of shares on date in question
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1704'
    name: Transactions Involving Interested Shareholders
  text: '(A) For purposes of this chapter, the fair market value on the date in question
    of shares shall be determined as follows:

    (1) If that class or series of shares is listed on a United States securities
    exchange registered under the Exchange Act, the fair market value shall be the
    simple arithmetic average closing sale price during the thirty calendar days immediately
    before the date in question of a share of that class or series on the principal
    such exchange on which that class or series is listed;

    (2) If that class or series of shares is not listed on an exchange described in
    division (A)(1) of this section, the fair market value shall be the simple arithmetic
    average closing bid quotation during the thirty calendar days immediately before
    the date in question for a share of that class or series on the national association
    of securities dealers automated quotation system or any similar system then in
    use;

    (3) If no quotations described in division (A)(1) or (2) of this section are available,
    the fair market value shall be determined in good faith by the directors of the
    issuing public corporation.

    (B) For purposes of this chapter, the fair market value on the date in question
    of property other than cash or shares shall be determined in good faith by the
    directors of the issuing public corporation.'
