- number: '1701.05'
  heading: Corporate name - transfer - reservation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Except as provided in this section, and in sections 1701.75, 1701.78,
    and 1701.82 of the Revised Code, which sections relate to the reorganization,
    merger, and consolidation of corporations, the corporate name of a domestic corporation
    shall comply with all of the following:

    (1) It shall end with or include the word or abbreviation "company," "co.," "corporation,"
    "corp.," "incorporated," or "inc."

    (2) It shall not include the word "benefit" or "b-" in its name as a prefix to
    "company," "co.," "corporation," "corp," "incorporated," or "inc.," unless the
    corporation is a benefit corporation or had a name that included such combination
    of words prior to the effective date of this amendment .

    (3) It shall be distinguishable upon the records in the office of the secretary
    of state from all of the following:

    (a) The name of any other corporation, whether nonprofit or for profit and whether
    that of a domestic or of a foreign corporation authorized to do business in this
    state;

    (b) The name of any limited liability company registered in the office of the
    secretary of state pursuant to Chapter 1705. or 1706. of the Revised Code, whether
    domestic or foreign;

    (c) The name of any limited liability partnership registered in the office of
    the secretary of state pursuant to Chapter 1775. or 1776. of the Revised Code,
    whether domestic or foreign;

    (d) The name of any limited partnership registered in the office of the secretary
    of state pursuant to Chapter 1782. of the Revised Code, whether domestic or foreign;

    (e) Any trade name the exclusive right to which is at the time in question registered
    in the office of the secretary of state pursuant to Chapter 1329. of the Revised
    Code.

    (4) It shall not contain any language that indicates or implies that the corporation
    is connected with a government agency of this state, another state, or the United
    States.

    (B) The secretary of state shall determine for purposes of this section whether
    a name is "distinguishable" from another name upon the secretary of state''s records.
    Without excluding other names that may not constitute distinguishable names in
    this state, a name is not considered distinguishable from another name for purposes
    of this section solely because it differs from the other name in only one or more
    of the following manners:

    (1) The use of the word "corporation," "company," "incorporated," "limited," or
    any abbreviation of any of those words;

    (2) The use of any article, conjunction, contraction, abbreviation, or punctuation;

    (3) The use of a different tense or number of the same word.

    (C) A corporation may apply to the secretary of state for authorization to use
    a name that is not distinguishable upon the secretary of state''s records from
    the name of any other corporation, limited liability company, limited liability
    partnership, or limited partnership, or from a registered trade name, if there
    also is filed in the office of the secretary of state, on a form prescribed by
    the secretary of state, the consent of the other entity or, in the case of a registered
    trade name, the person in whose name is registered the exclusive right to use
    the name, which consent is evidenced in a writing signed by any authorized officer
    or any authorized representative of the other entity or person.

    (D) In case of judicial sale or judicial transfer, by sale or transfer of good
    will or otherwise, of the right to use the name of a corporation, whether nonprofit
    or for profit, and whether that of a domestic corporation or of a foreign corporation
    authorized to exercise its corporate privileges in this state or to do business
    in this state, the secretary of state, at the instance of the purchaser or transferee
    of such right, shall accept for filing articles of a corporation with a name the
    same as or similar to the name of such other corporation, if there also is filed
    in the office of the secretary of state a certified copy of the decree or order
    of court confirming or otherwise evidencing the purchase or transfer.

    (E) Any person who wishes to reserve a name for a proposed new corporation, or
    any corporation intending to change its name, may submit to the secretary of state
    a written application, on a form prescribed by the secretary of state, for the
    exclusive right to use a specified name as the name of a corporation. If the secretary
    of state finds that, under this section, the specified name is available for such
    use, the secretary of state shall file the application and, from the date of the
    filing, the applicant shall have the exclusive right for one hundred eighty days
    to use the specified name as the name of a corporation, counting the date of such
    filing as the first of one hundred eighty days. The right so obtained may be transferred
    by the applicant or other holder thereof by the filing in the office of the secretary
    of state of a written transfer, on a form prescribed by the secretary of state,
    stating the name and address of the transferee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.05
- number: '1701.06'
  heading: Express terms of shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) The express terms of shares may include statements specifying any of
    the following:

    (1) Dividend or distribution rights, which may be cumulative or noncumulative;
    at a specified rate, amount, or proportion; with or without further participation
    rights; and in preference to, junior to, or on a parity in whole or in part with
    dividend or distribution rights of shares of any other class;

    (2) Liquidation rights, preferences, and price;

    (3) Redemption rights and price;

    (4) Sinking fund requirements, which may require the corporation to provide a
    sinking fund out of earnings or otherwise for the purchase or redemption of the
    shares or for dividends or distributions on them;

    (5) Voting rights, which may be full, limited, or denied, except as otherwise
    required by law;

    (6) Pre-emptive rights, or the denial or limitation of them;

    (7) Conversion rights;

    (8) Restrictions on the issuance of shares;

    (9) Rights of alteration of express terms;

    (10) The division of any class of shares into series;

    (11) The designation and authorized number of shares of each series;

    (12) The right of the directors, subject to any limitations that may be stated,
    to adopt amendments to the articles determining, in whole or in part, the express
    terms, within the limits set forth in this chapter, of any class of shares before
    the issuance of any shares of that class, or of one or more series within a class
    before the issuance of any shares of that series;

    (13) Any other relative, participating, optional, or other special rights and
    privileges of, and qualifications or restrictions on, the rights of holders of
    shares of any class or series.

    (B) Each series of a class shall be given a distinguishing designation. All shares
    of a series shall have express terms identical with those of other shares of the
    same series. Any of the express terms of any class or series of shares may be
    made dependent upon facts ascertainable outside the articles or any amendment
    to those articles, provided that the manner in which the facts operate upon the
    express terms is set forth in the articles or any amendment to those articles.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.06
- number: '1701.07'
  heading: Statutory agent - cancellation and reinstatement of articles
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Every corporation shall have and maintain an agent, sometimes referred
    to as the "statutory agent," upon whom any process, notice, or demand required
    or permitted by statute to be served upon a corporation may be served. The agent
    shall be one of the following:

    (1) A natural person who is a resident of this state;

    (2) A domestic or foreign corporation, nonprofit corporation, limited liability
    company, partnership, limited partnership, limited liability partnership, limited
    partnership association, professional association, business trust, or unincorporated
    nonprofit association that has a business address in this state. If the agent
    is an entity other than a domestic corporation, the agent shall meet the requirements
    of Title XVII of the Revised Code for an entity of the agent''s type to transact
    business or exercise privileges in this state.

    (B) The secretary of state shall not accept original articles for filing unless
    there is filed with the articles a written appointment of an agent that is signed
    by the incorporators of the corporation or a majority of them and a written acceptance
    of the appointment that is signed by the agent. In all other cases, the corporation
    shall appoint the agent and shall file in the office of the secretary of state
    a written appointment of the agent that is signed by any authorized officer of
    the corporation and a written acceptance of the appointment that is either the
    original acceptance signed by the agent or a photocopy, facsimile, or similar
    reproduction of the original acceptance signed by the agent.

    (C)(1) The written appointment of an agent shall set forth the name and address
    in this state of the agent, including the street and number of the agent''s primary
    residence in this state or, if the agent is not a natural person, the agent''s
    usual place of business in this state, and shall otherwise be in such form as
    the secretary of state prescribes. The secretary of state shall keep a record
    of the names of corporations, and the names and addresses of their respective
    agents.

    (2) As used in division (C)(1) of this section, "usual place of business" means
    a place in this state that is customarily open during normal business hours and
    where an individual is generally present who is authorized to perform the services
    of a registered agent, including accepting service of process and other notifications
    for the person serving as a statutory agent. "Usual place of business" does not
    include a post office box, regardless of whether that post office box has an associated
    street address.

    (D) If any agent dies, removes from the state, or resigns, the corporation shall
    forthwith appoint another agent and file with the secretary of state, on a form
    prescribed by the secretary of state, a written appointment of the agent.

    (E) If the agent changes the agent''s address from that appearing upon the record
    in the office of the secretary of state, the corporation or the agent shall forthwith
    file with the secretary of state, on a form prescribed by the secretary of state,
    a written statement setting forth the new address.

    (F) An agent may resign by filing with the secretary of state, on a form prescribed
    by the secretary of state, a written notice to that effect that is signed by the
    agent and by sending a copy of the notice to the corporation at the current or
    last known address of its principal office on or prior to the date the notice
    is filed with the secretary of state. The notice shall set forth the name of the
    corporation, the name and current address of the agent, the current or last known
    address, including the street and number or other particular description, of the
    corporation''s principal office, the resignation of the agent, and a statement
    that a copy of the notice has been sent to the corporation within the time and
    in the manner prescribed by this division. Upon the expiration of thirty days
    after the filing, the authority of the agent shall terminate.

    (G) A corporation may revoke the appointment of an agent by filing with the secretary
    of state, on a form prescribed by the secretary of state, a written appointment
    of another agent and a statement that the appointment of the former agent is revoked.

    (H) Any process, notice, or demand required or permitted by statute to be served
    upon a corporation may be served upon the corporation by delivering a copy of
    it to its agent, if a natural person, or by delivering a copy of it at the address
    of its agent in this state, as the address appears upon the record in the office
    of the secretary of state. If (1) the agent cannot be found, or (2) the agent
    no longer has that address, or (3) the corporation has failed to maintain an agent
    as required by this section, and if in any such case the party desiring that the
    process, notice, or demand be served, or the agent or representative of the party,
    shall have filed with the secretary of state an affidavit stating that one of
    the foregoing conditions exists and stating the most recent address of the corporation
    that the party after diligent search has been able to ascertain, then service
    of process, notice, or demand upon the secretary of state, as the agent of the
    corporation, may be initiated by delivering to the secretary of state or at the
    secretary of state''s office quadruplicate copies of such process, notice, or
    demand and by paying to the secretary of state a fee of five dollars. The secretary
    of state shall forthwith give notice of the delivery to the corporation at its
    principal office as shown upon the record in the secretary of state''s office
    and at any different address shown on its last franchise tax report filed in this
    state, or to the corporation at any different address set forth in the above mentioned
    affidavit, and shall forward to the corporation at said addresses, by certified
    mail, with request for return receipt, a copy of the process, notice, or demand;
    and thereupon service upon the corporation shall be deemed to have been made.

    (I) The secretary of state shall keep a record of each process, notice, and demand
    delivered to the secretary of state or at the secretary of state''s office under
    this section or any other law of this state that authorizes service upon the secretary
    of state, and shall record the time of the delivery and the action thereafter
    with respect thereto.

    (J) This section does not limit or affect the right to serve any process, notice,
    or demand upon a corporation in any other manner permitted by law.

    (K) Except when an original appointment of an agent is filed with the original
    articles, a written appointment of an agent or a written statement filed by a
    corporation with the secretary of state shall be signed by any authorized officer
    of the corporation or by the incorporators of the corporation or a majority of
    them if no directors have been elected.

    (L) For filing a written appointment of an agent other than one filed with original
    articles, and for filing a statement of change of address of an agent, the secretary
    of state shall charge and collect the fee specified in division (R) of section
    111.16 of the Revised Code.

    (M) Upon the failure of a corporation to appoint another agent or to file a statement
    of change of address of an agent, the secretary of state shall give notice thereof
    by ordinary or electronic mail to the corporation at the electronic mail address
    provided to the secretary of state, or at the address set forth in the notice
    of resignation or on the last franchise tax return filed in this state by the
    corporation. Unless the default is cured within thirty days after the mailing
    by the secretary of state of the notice or within any further period of time that
    the secretary of state grants, upon the expiration of that period of time from
    the date of the mailing, the articles of the corporation shall be canceled without
    further notice or action by the secretary of state. The secretary of state shall
    make a notation of the cancellation on the secretary of state''s records.

    A corporation whose articles have been canceled may be reinstated by filing, within
    two years of the cancellation, on a form prescribed by the secretary of state,
    an application for reinstatement and the required appointment of agent or required
    statement, and by paying the filing fee specified in division (Q) of section 111.16
    of the Revised Code. The rights, privileges, and franchises of a corporation whose
    articles have been reinstated are subject to section 1701.922 of the Revised Code.
    The secretary of state shall furnish the tax commissioner a monthly list of all
    corporations canceled and reinstated under this division.

    (N) This section does not apply to banks, trust companies, insurance companies,
    or any corporation defined under the laws of this state as a public utility for
    taxation purposes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.07
- number: '1701.08'
  heading: Acceptance of articles of incorporation and other certificates - filing
    not constructive notice of contents
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) When articles of incorporation and other certificates relating to the
    corporation are submitted to the secretary of state, the secretary of state shall,
    after finding that they comply with the provisions of sections 1701.01 to 1701.98
    of the Revised Code, accept the articles and other certificates for filing and
    make a copy of the articles and other certificates by microfilm or by any authorized
    photostatic or digitized process. Evidence of the filing shall be returned to
    the person filing the articles or certificate.

    (B) All persons shall have the opportunity of acquiring knowledge of the contents
    of the articles and other certificates filed and recorded in the office of the
    secretary of state, but no person dealing with the corporation shall be charged
    with constructive notice of the contents of any such articles or certificates
    by reason of such filing or recording.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.08
- number: '1701.09'
  heading: Subscriptions for shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) After the articles have been filed, the incorporators or a majority of
    them may receive subscriptions for shares at such time and place that they determine.

    (B) Unless the articles fix the consideration for which subscriptions are to be
    received, all of the following apply:

    (1) If subscriptions are to be received for shares without par value, the incorporators
    shall fix the consideration for which they will receive subscriptions for such
    shares.

    (2) If subscriptions are to be received for shares with par value, the consideration
    for the shares shall be the par value or the greater consideration that the incorporators
    fix.

    (3) If any subscriptions are to be payable otherwise than in money, the incorporators
    may determine the fair value to the corporation of the consideration for the shares.

    (C) No subscriptions for shares shall be received by the incorporators if the
    articles name the initial directors or after the meeting of the shareholders or
    incorporators at which the initial election of directors occurs.

    (D) The failure of incorporators of a corporation formed or attempted to be formed
    under the laws of this state then in effect to file in the office of the secretary
    of state a certificate of subscription required by those laws to be filed does
    not make the existence of the corporation or any of its acts subject to question.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.09
- number: '1701.10'
  heading: Initial directors holding organizational meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) After incorporation, all of the following apply:

    (1) If the initial directors are named in the articles, the initial directors
    shall hold an organizational meeting, at the call of a majority of the directors,
    to complete the organization of the corporation by receiving subscriptions, appointing
    officers, adopting regulations, and carrying on any other business brought before
    the meeting.

    (2) If the initial directors are not named in the articles, the incorporator or
    incorporators either shall receive subscriptions as provided in division (A) of
    section 1701.09 of the Revised Code or shall hold an organizational meeting at
    the call of a majority of the incorporators to elect directors who shall complete
    the organization of the corporation as provided in division (A)(1) of this section.
    If subscriptions for shares are received by the incorporators, the incorporators,
    or a majority of them, shall give not less than seven days'' written notice to
    the shareholders, unless written notice is waived by the shareholders, to meet
    at a specified time and place for the purposes of adopting regulations, electing
    directors, and transacting any other business. The shareholders shall meet for
    those purposes at the time and place specified.

    (3) Notwithstanding divisions (A)(1) and (2) of this section, if regulations have
    not been adopted within ninety days after the formation of the corporation, regulations
    may be adopted only as provided in section 1701.11 of the Revised Code.

    (B) Action required or permitted by this chapter to be taken by the incorporators
    at an organizational meeting may be taken without a meeting if the action taken
    is evidenced by one or more written consents describing the action taken and signed
    by each incorporator.

    (C) An organizational meeting may be held in or out of this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.10
- number: '1701.11'
  heading: Adopting, amending, and repealing regulations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A)(1) Regulations for the government of a corporation, the conduct of its
    affairs, and the management of its property, consistent with law and the articles,
    may be adopted, amended, or repealed in any of the following ways:

    (a) Within ninety days after the corporation is formed, by the directors in accordance
    with division (A)(1) of section 1701.10 of the Revised Code;

    (b) By the shareholders at a meeting held for that purpose, by the affirmative
    vote of the holders of shares entitling them to exercise a majority of the voting
    power of the corporation on the proposal, or if the articles or regulations that
    have been adopted so provide, by the affirmative vote of the holders entitling
    them to exercise a greater proportion than a majority of the voting power of the
    corporation on the proposal;

    (c) Without a meeting, by the written consent of the holders of shares entitling
    them to exercise two-thirds of the voting power of the corporation on the proposal,
    or if the articles or regulations that have been adopted so provide or permit,
    by the written consent of the holders of shares entitling them to exercise a greater
    or lesser proportion but not less than a majority of the voting power of the corporation
    on the proposal;

    (d) If and to the extent that the articles or regulations so provide or permit
    and unless a provision of the Revised Code reserves such authority to shareholders,
    by the directors, provided that no provision or permission in the articles or
    regulations may divest shareholders of the power, or limit the shareholders''
    power, to adopt, amend, or repeal regulations.

    (2) Any amendment of regulations and any amended or new regulations adopted by
    shareholders of an issuing public corporation whose directors are classified pursuant
    to section 1701.57 of the Revised Code that would change or eliminate the classification
    of directors shall be adopted only by the shareholders at a meeting held for that
    purpose, by the affirmative vote of holders of shares entitling them to exercise
    the voting power of the corporation that is required for shareholders at a meeting
    under division (A)(1)(b) of this section, and also by the affirmative vote of
    the holders of a majority of disinterested shares voted on the proposal determined
    as specified in division (C)(9) of section 1704.01 of the Revised Code.

    (3) Any amendment of regulations and any amended or new regulations adopted by
    shareholders of an issuing public corporation that would provide that section
    1701.831 of the Revised Code does not apply to control share acquisitions of shares
    of the issuing public corporation shall be adopted:

    (a) Upon the recommendation by the affirmative vote of a majority of the authorized
    number of directors of the issuing public corporation in favor of such amendment
    or new regulation; and

    (b) By the shareholders at a meeting held for that purpose, by the affirmative
    vote of holders of shares entitling them to exercise the voting power of the corporation
    that is required for shareholders at a meeting under division (A)(1)(b) of this
    section.

    (B) Without limiting the generality of the authority described in division (A)
    of this section, the regulations may include provisions with respect to all of
    the following:

    (1) The place, if any, and time for holding, the manner of and authority for calling,
    giving notice of, and conducting, and the requirements of a quorum for, meetings
    of shareholders;

    (2) The taking of a record of shareholders or the temporary closing of books against
    transfers of shares;

    (3) The number, classification, manner of fixing or changing the number, qualifications,
    term of office, and compensation or manner of fixing compensation, of directors;

    (4) The place, if any, and time for holding, the manner of and authority for calling,
    giving notice of, and conducting, and the requirements of a quorum for, meetings
    of the directors;

    (5) The appointment of an executive and other committees of the directors, and
    their authority;

    (6) The titles, qualifications, duties, term of office, compensation or manner
    of fixing compensation, and the removal, of officers;

    (7) The terms on which new certificates for shares may be issued in the place
    of lost, stolen, or destroyed certificates;

    (8) The manner in which and conditions upon which a certificated security, and
    the conditions upon which an uncertificated security, and the shares represented
    by a certificated or uncertificated security, may be transferred, restrictions
    on the right to transfer the shares, and reservations of liens on the shares;

    (9)(a) Restrictions on the transfer and the right to transfer shares of either
    of the following:

    (i) An issuing public corporation to any person in a control share acquisition;

    (ii) A corporation with fifty or more shareholders to any person in an acquisition
    that would be a control share acquisition if the corporation were an issuing public
    corporation.

    (b) The restrictions on the transfer and the right to transfer shares described
    in division (B)(9)(a)(i) and (ii) of this section may include requirements and
    procedures for consent to an acquisition of the shares by directors based on a
    determination by the directors of the best interests of the corporation and its
    shareholders, consent to an acquisition of the shares by shareholders, and reasonable
    sanctions for a violation of those requirements, including the right of the corporation
    to refuse to transfer, to redeem, or to deny voting or other shareholder rights
    appurtenant to shares acquired in an acquisition of the shares.

    (10) Defining, limiting, or regulating the exercise of the authority of the corporation,
    the directors, or the officers;

    (11) Defining, limiting, or regulating the exercise of the authority of the shareholders;
    provided, that any amendment of the regulations that would change or eliminate
    any such provision shall be adopted only by the shareholders.

    (C) The shareholders of a corporation may adopt and may authorize the directors
    to adopt, either before or during an emergency, as that term is defined in division
    (U) of section 1701.01 of the Revised Code, emergency regulations that shall be
    operative only during an emergency. The emergency regulations may include any
    provisions that are authorized to be included in regulations by divisions (A)
    and (B) of this section. In addition, unless expressly prohibited by the articles
    or the regulations, the emergency regulations may make any provision, notwithstanding
    any different provisions in this chapter and notwithstanding any different provisions
    in the articles or the regulations that are not expressly stated to be operative
    during an emergency, that may be practical or necessary with respect to the following:

    (1) The place, if any, and time for holding, the manner of and authority for calling,
    giving notice of, and conducting, and the requirements of a quorum for, meetings
    of the directors;

    (2) The creation and appointment of an executive and other committees of the directors
    and the delegation of authority to the committees by the board;

    (3) The creation, existence, and filling of vacancies, including temporary vacancies,
    in the office of director;

    (4) The selection, by appointment, election, or otherwise, of officers and other
    persons to serve as directors for a meeting of the board in the absence from the
    meeting of one or more of the directors;

    (5) The creation, existence, and filling of vacancies, including temporary vacancies,
    in any office;

    (6) The order of rank and the succession to the duties and authority of officers.

    (D)(1) Unless the corporation complies with division (D)(2) of this section, if
    the regulations are amended or new regulations are adopted other than by the shareholders
    at a meeting held for that purpose, the secretary of the corporation shall send
    a copy of the amendment or the new regulations by mail, overnight delivery service,
    or any other means of communication authorized by the shareholder to whom a copy
    of the amendment or new regulations is sent, to each shareholder of record as
    of the date of the adoption of the amendment or the new regulations.

    (2) Any corporation that files periodic reports with the United States securities
    and exchange commission pursuant to section 13 of the "Securities Exchange Act
    of 1934," 48 Stat. 881, 15 U.S.C. 78m, as amended, or section 15(d) of the "Securities
    Exchange Act of 1934," 48 Stat. 881, 15 U.S.C. 78o(d), as amended, may satisfy
    the notice to shareholders of record requirement of division (D)(1) of this section
    by including a copy of the amendment or the new regulations in a report filed
    in accordance with those sections within twenty days after the adoption of the
    amendment or the new regulations.

    (E) No person dealing with the corporation shall be charged with constructive
    notice of the regulations.

    (F) Unless expressly prohibited by the articles or the regulations or unless otherwise
    provided by the emergency regulations, the following special rules shall be applicable
    during an emergency notwithstanding any different provision elsewhere in this
    chapter:

    (1) Meetings of the directors may be called by any officer or director.

    (2) Notice of the time and place of each meeting of the directors shall be given
    to such of the directors as it may be feasible to reach at the time and by the
    means of communication, written or oral, personal or mass, as may be practicable
    at the time.

    (3) The director or directors present at any meeting of the directors that has
    been duly called and notice of which has been duly given shall constitute a quorum
    for the meeting, and, in the absence of one or more of the directors, the director
    or directors present may appoint one or more of the officers of the corporation
    directors for the meeting.

    (4) If none of the directors attends a meeting of the directors that has been
    duly called and notice of which has been duly given, the officers of the corporation
    who are present, not exceeding three, in order of rank, shall be directors for
    the meeting, shall constitute a quorum for the meeting, and may appoint one or
    more of the other officers of the corporation directors for the meeting.

    (5) If the chief executive officer dies, is missing, or for any other reason is
    temporarily or permanently incapable of discharging the duties of the office,
    the next ranking officer who is available shall assume the duties and authority
    of the office of the deceased, missing, or incapacitated chief executive officer
    until such time as the directors otherwise order.

    (6) The offices of secretary and treasurer shall be deemed to be of equal rank,
    and, within the same office and as between the offices of secretary and treasurer,
    rank shall be determined by priority in time of the first election to the office
    or, if two or more persons have been first elected to the office at the same time,
    by seniority in age.'
