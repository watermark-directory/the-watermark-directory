    num: '1702'
    name: Nonprofit Corporation Law
  text: An annual meeting of voting members for the election of directors and the
    consideration of reports to be laid before such meeting shall be held on a date
    designated by or in the manner provided for in the articles or the regulations.
    In the absence of such a designation, the annual meeting shall be held on the
    first Monday of the fourth month following the close of each fiscal year of the
    corporation. When the annual meeting is not held or directors are not elected
    thereat, they may be elected at a special meeting called for that purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.16
- number: '1702.17'
  heading: Meetings of voting members - calling and place of meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Meetings of voting members may be called by any of the following:

    (1) The chairperson of the board, the president, or, in case of the president''s
    absence, death, or disability, the vice-president authorized to exercise the authority
    of the president;

    (2) The directors by action at a meeting, or a majority of the directors acting
    without a meeting;

    (3) The lesser of (a) ten per cent of the voting members or (b) twenty-five of
    the voting members, unless the articles or the regulations specify for such purpose
    a smaller or larger proportion or number, but not in excess of fifty per cent
    of the voting members;

    (4) Any other officers or persons that the articles or the regulations authorize
    to call such meetings.

    (B) If so provided in the articles or the regulations, meetings of voting members
    may be held either within or without this state or solely by means of authorized
    communications equipment.

    (C) Unless the articles or regulations provide otherwise, the voting members and
    proxyholders who are not physically present at a meeting of voting members may
    attend the meeting by the use of authorized communications equipment that enables
    the voting members and proxyholders an opportunity to participate in the meeting
    and to vote on matters submitted to the voting members, including an opportunity
    to read or hear the proceedings of the meeting, participate in the proceedings,
    and contemporaneously communicate with the persons who are physically present
    at the meeting. Any voting member who uses authorized communications equipment
    under this division is deemed to be present in person at the meeting whether the
    meeting is held at a designated place or solely by means of authorized communications
    equipment. The directors may adopt procedures and guidelines for the use of authorized
    communications equipment in connection with a meeting of voting members to permit
    the corporation to verify that a person is a voting member or proxyholder and
    to maintain a record of any vote or other action taken at the meeting.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.17
- number: '1702.18'
  heading: Notice of meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: 'Unless the articles or the regulations provide for notice of meetings otherwise
    than as provided in this section, written notice stating the place, if any, and
    the time of a meeting and the means, if any, by which the voting members can be
    present and vote at the meeting through the use of authorized communications equipment,
    and, in case of a special meeting, the purpose or purposes for which the meeting
    is called, shall be given in the manner described in section 1702.02 of the Revised
    Code, not less than ten or not more than sixty days before the date of the meeting:
    (A) to each member entitled to notice of the meeting; (B) by or at the direction
    of the president or the secretary or any other person required or permitted by
    the regulations to give notice or the officers or persons calling the meeting.
    If mailed or sent by overnight delivery service, that notice shall be addressed
    to the member at the member''s address as it appears on the records of the corporation.
    If sent by means of authorized communications equipment, that notice shall be
    sent to the address furnished by the voting member for transmissions by authorized
    communications equipment. Notice of adjournment of a meeting need not be given
    if the place, if any, and the time to which it is adjourned and the procedure
    by which the voting members can be present and vote at the adjourned meeting through
    the use of authorized communications equipment are fixed and announced at the
    meeting.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.18
- number: '1702.19'
  heading: Waiver of notice
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Notice of the place, if any, the time, and the purposes of any meeting
    of voting members or directors, as the case may be, whether required by law, the
    articles, the regulations, or (in the case of directors) the bylaws, may be waived
    in writing, either before or after the holding of such meeting, by any member,
    or by any director, which writing shall be filed with or entered upon the records
    of the meeting. A transmission by authorized communications equipment that contains
    a waiver is a writing for purposes of this division.

    (B) If a member or director attends a meeting described in division (A) of this
    section without protesting prior to or at the commencement of the meeting, then
    the lack of proper notice shall be deemed to be a waiver by the member or director
    of notice of the meeting.

    (C) Unless the articles or regulations provide otherwise, a member shall be considered
    in attendance at a meeting described in division (A) of this section if the member
    is present in person, by the use of authorized communications equipment, by mail,
    or, if permitted, by proxy. Unless the articles or regulations provide otherwise,
    a director shall be considered in attendance at a meeting described in division
    (A) of this section if the director is present in person or by the use of authorized
    communications equipment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.19
- number: '1702.20'
  heading: Voting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Except as otherwise provided in the articles or the regulations, each
    member, regardless of class, shall be entitled to one vote on each matter properly
    submitted to the members for their vote, consent, waiver, release, or other action.

    (B) Unless the articles or the regulations provide otherwise, voting at elections
    and votes on other matters may be conducted by mail or by the use of authorized
    communications equipment.

    (C) Participation by a member in a meeting through the use of any of the means
    of communication described in division (B) of this section constitutes presence
    in person of that member at the meeting. The directors may adopt procedures and
    guidelines for the use of authorized communications equipment to permit the corporation
    to verify that a person is a voting member and to maintain a record of any vote.

    (D) Unless the articles or the regulations otherwise provide, no member who is
    a natural person shall vote or act by proxy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.20
- number: '1702.21'
  heading: Voting of membership in corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) When any domestic corporation or domestic business corporation holds
    membership in a domestic or foreign corporation, the chairperson of the board,
    the president, any vice-president, the secretary, or the treasurer of the corporation
    or business corporation holding such membership, and any such officer or cashier
    or trust officer of a banking or trust corporation holding such membership, and
    any like officer of a foreign corporation or foreign business corporation, or
    of a foreign banking or trust corporation, holding membership in a domestic corporation,
    shall conclusively be deemed to have authority to vote on behalf of that corporation
    or business corporation, and to appoint proxies and execute written consents,
    waivers, and releases on its behalf, unless, before a vote is taken or a consent,
    waiver, or release is acted upon, it appears by a certified copy of the regulations,
    the bylaws, or a resolution of the directors, or executive committee of that corporation
    or business corporation that such authority does not exist or is vested in some
    other officer or person.

    (B) When any domestic or foreign limited liability company holds membership in
    a domestic or foreign corporation, any manager or member of the limited liability
    company holding that membership shall conclusively be deemed to have authority
    to vote on behalf of that limited liability company and to appoint proxies and
    execute written consents, waivers, and releases on its behalf, unless before a
    vote is taken or a consent, waiver, or release is acted upon, it appears by a
    certified copy of the articles of organization, operating agreement, or a resolution
    of the managers or the members of that limited liability company that such authority
    does not exist or is vested in some other representative or person.

    (C) For the purpose of this section, a person exercising authority as an officer,
    representative, or other person entitled to vote and acting in that capacity is
    prima-facie deemed to be duly elected, qualified, and acting as that officer,
    representative, or other person entitled to vote and acting in that capacity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.21
- number: '1702.22'
  heading: Quorum of voting members
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: 'Unless the articles or the regulations otherwise provide:

    (A)(1) The voting members present in person, by the use of authorized communications
    equipment, by mail, or, if permitted, by proxy at any meeting of voting members
    shall constitute a quorum for the meeting.

    (2) The affirmative vote of a majority of the voting members present at a meeting
    at which a quorum is present as provided in division (A)(1) of this section shall
    be necessary for the authorization or taking of any action voted upon by the members,
    except that no action required by law, the articles, or the regulations to be
    authorized or taken by a specified proportion or number of the voting members
    or of any class of voting members may be authorized or taken by a lesser proportion
    or number.

    (B) A majority of the voting members present at a meeting, whether or not a quorum
    is present, may adjourn the meeting from time to time.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.22
- number: '1702.23'
  heading: Controlling provisions of articles or regulations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: Whenever, with respect to the authorization or taking of any action by the
    members or the directors, the articles or the regulations require the vote, consent,
    waiver, or release of a greater proportion or number of the members or the directors
    than that otherwise required by law with respect thereto, the provisions of the
    articles or the regulations shall control.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.23
- number: '1702.24'
  heading: Vote of members required for rescission or revocation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: The authorization or taking of any action by vote, consent, waiver, or release
    of the members may be rescinded or revoked by the same vote, consent, waiver,
    or release as at the time of rescission or revocation would be required to authorize
    or take such action in the first instance, subject to the contract rights of other
    persons.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.24
- number: '1702.25'
  heading: Action by members or directors without a meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Unless the articles or the regulations prohibit the authorization or
    taking of any action of the incorporators, the members, or the directors without
    a meeting, any action that may be authorized or taken at a meeting of the incorporators,
    the members, or the directors, as the case may be, may be authorized or taken
    without a meeting with the affirmative vote or approval of, and in a writing or
    writings signed by, all of the incorporators, all of the members, or all of the
    directors, as the case may be, who would be entitled to notice of a meeting for
    that purpose, or, in the case of members, any other proportion or number of voting
    members, not less than a majority, that the articles or the regulations permit.
    Any such writing shall be filed with or entered upon the records of the corporation.
    Any certificate with respect to the authorization or taking of any action described
    in this division that is required to be filed in the office of the secretary of
    state shall recite that the authorization or taking of that action was in a writing
    or writings approved and signed as specified in this section.

    (B) Any transmission by authorized communications equipment that contains an affirmative
    vote or approval of the person described in division (A) of this section is a
    signed writing for purposes of this section. The date on which that transmission
    by authorized communications equipment is sent is the date on which the writing
    is signed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.25
- number: '1702.26'
  heading: Election of directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) At a meeting of members at which directors are to be elected, only persons
    nominated as candidates shall be eligible for election as directors.

    (B) At all elections of directors the candidates receiving the greatest number
    of votes shall be elected.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.26
- number: '1702.27'
  heading: Number and qualifications of directors - ex officio directors - provisional
    director
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Except as provided in division (B) of this section and section 1702.521
    of the Revised Code:

    (1) The number of directors as fixed by the articles or the regulations shall
    be not less than three or, if not so fixed, the number shall be three, except
    that if there are only one or two members of the corporation, the number of directors
    may be less than three but not less than the number of members.

    (2)(a) Subject to division (A)(2)(c) of this section, unless the articles or the
    regulations fix the number of directors or provide the manner in which that number
    may be fixed or changed by the voting members, the number may be fixed or changed
    at a meeting of the voting members called for the purpose of electing directors,
    if a quorum is present, by the affirmative vote of a majority of the voting members
    present in person, by the use of authorized communications equipment, by mail,
    or, if permitted, by proxy.

    (b) For purposes of division (A)(2)(a) of this section, participation by a voting
    member in a meeting through the use of any of the means of communication described
    in that division constitutes presence in person of that voting member at the meeting
    for purposes of determining a quorum.

    (c) No reduction in the number of directors shall of itself have the effect of
    shortening the term of any incumbent director.

    (3) Each director shall be a natural person and shall have the qualifications,
    if any, that are stated in the articles or the regulations.

    (4) The articles or the regulations may provide that persons occupying certain
    positions within or without the corporation shall be ex officio directors, but,
    unless otherwise provided in the articles or the regulations, such ex officio
    directors shall not be considered for quorum purposes and shall have no vote.

    (B) The court of common pleas of the county in which the corporation maintains
    its principal office may, pursuant to division (A) of section 1702.521 of the
    Revised Code, order the appointment of a provisional director for the corporation
    without regard to the number or qualifications of directors stated in the articles
    or regulations of the corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.27
- number: '1702.28'
  heading: Term and classification of directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Unless the articles or the regulations provide for a different term,
    each director shall hold office until the next annual meeting of voting members
    and until the director''s successor is elected, or until the director''s earlier
    resignation, removal from office, or death.

    (B) The articles or the regulations may provide for the classification of directors
    into classes and that the terms of office of the several classes need not be uniform.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.28
- number: '1702.29'
  heading: Removal of directors and filling vacancies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) The office of a director becomes vacant if the director dies or resigns,
    which resignation shall take effect immediately or at such other time as the director
    may specify.

    (B) A director may be removed from office pursuant to any procedure therefor provided
    in the articles or in the regulations and such removal shall create a vacancy
    in the board.

    (C) Unless the articles or the regulations otherwise provide, the remaining directors,
    though less than a majority of the whole authorized number of directors, may,
    by the vote of a majority of their number, fill any vacancy in the board for the
    unexpired term. Within the meaning of this section, a vacancy exists in case the
    voting members increase the authorized number of directors but fail at the meeting
    at which such increase is authorized, or an adjournment thereof, to elect the
    additional directors provided for, or in case the voting members fail at any time
    to elect the whole authorized number of directors.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.29
- number: '1702.30'
  heading: Authority of directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Except where the law, the articles, or the regulations require that action
    be otherwise authorized or taken, all of the authority of a corporation shall
    be exercised by or under the direction of its directors. For their own government,
    the directors may adopt bylaws that are not inconsistent with the articles or
    the regulations.

    (B) A director shall perform the director''s duties as a director, including the
    duties as a member of any committee of the directors upon which the director may
    serve, in good faith, in a manner the director reasonably believes to be in or
    not opposed to the best interests of the corporation, and with the care that an
    ordinarily prudent person in a like position would use under similar circumstances.
    A director serving on a committee of directors is acting as a director.

    (C) In performing a director''s duties, a director is entitled to rely on information,
    opinions, reports, or statements, including financial statements and other financial
    data, that are prepared or presented by any of the following:

    (1) One or more directors, officers, or employees of the corporation who the director
    reasonably believes are reliable and competent in the matters prepared or presented;

    (2) Counsel, public accountants, or other persons as to matters that the director
    reasonably believes are within the person''s professional or expert competence;

    (3) A committee of the directors upon which the director does not serve, duly
    established in accordance with a provision of the articles or the regulations,
    as to matters within its designated authority, which committee the director reasonably
    believes to merit confidence.

    (D) For purposes of division (B) of this section, the following apply:

    (1) A director shall not be found to have violated the director''s duties under
    division (B) of this section, unless it is proved, by clear and convincing evidence
    that the director has not acted in good faith, in a manner the director reasonably
    believes to be in or not opposed to the best interests of the corporation, or
    with the care that an ordinarily prudent person in a like position would use under
    similar circumstances in any action brought against a director, including actions
    involving or affecting any of the following:

    (a) A change or potential change in control of the corporation;

    (b) A termination or potential termination of the director''s service to the corporation
    as a director;

    (c) The director''s service in any other position or relationship with the corporation.

    (2) A director shall not be considered to be acting in good faith if the director
    has knowledge concerning the matter in question that would cause reliance on information,
    opinions, reports, or statements that are prepared or presented by the persons
    described in divisions (C)(1) to (3) of this section, to be unwarranted.

    (3) Nothing in this division limits relief available under section 1702.301 of
    the Revised Code.

    (E) A director shall be liable in damages for any action that the director takes
    or fails to take as a director only if it is proved by clear and convincing evidence
    in a court of competent jurisdiction that the director''s action or failure to
    act involved an act or omission undertaken with deliberate intent to cause injury
    to the corporation or undertaken with a reckless disregard for the best interests
    of the corporation.

    Nothing in this division affects the liability of directors under section 1702.55
    of the Revised Code.

    This division does not apply if, and only to the extent that, at the time of a
    director''s act or omission that is the subject of complaint, the articles or
    the regulations of the corporation state by specific reference to this division
    that the provisions of this division do not apply to the corporation.

    (F) For purposes of this section, a director, in determining what the director
    reasonably believes to be in the best interests of the corporation, shall consider
    the purposes of the corporation and, in the director''s discretion, may consider
    any of the following:

    (1) The interests of the corporation''s employees, suppliers, creditors, and customers;

    (2) The economy of this state and nation;

    (3) Community and societal considerations;

    (4) The long-term as well as short-term interests of the corporation, including
    the possibility that these interests may be best served by the continued independence
    of the corporation.

    (G) Nothing in division (D) or (E) of this section affects the duties of a director
    who acts in any capacity other than in the capacity as a director.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.30
- number: '1702.301'
  heading: Interest of director or officer in contract
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Unless otherwise provided in the articles or the regulations:

    (1) No contract, action, or transaction is void or voidable with respect to a
    corporation because the contract, action, or transaction is between or affects
    the corporation and one or more of its directors or officers, or is between or
    affects the corporation and any other person in which one or more of the corporation''s
    directors or officers are directors or officers, or in which one or more of the
    corporation''s directors or officers have a financial or personal interest, or
    because one or more interested directors or officers participate in or vote at
    the meeting of the directors or a committee of the directors that authorizes the
    contract, action, or transaction, if any of the following applies:

    (a) The material facts as to the director''s relationship or interest and as to
    the contract, action, or transaction are disclosed or are known to the directors
    or the committee, and the directors or committee, in good faith reasonably justified
    by the material facts, authorizes the contract, action, or transaction by the
    affirmative vote of a majority of the disinterested directors, even though the
    disinterested directors constitute less than a quorum of the directors or the
    committee;

    (b) The material facts as to the director''s relationship or interest and as to
    the contract, action, or transaction are disclosed or are known to the members
    entitled to vote on the contract, action, or transaction, and the contract, action,
    or transaction is specifically approved at a meeting of the members held for the
    purpose of voting on the contract, action, or transaction, by the affirmative
    vote of a majority of the voting members of the corporation who are not interested
    in the contract, action, or transaction;

    (c) The contract, action, or transaction is fair as to the corporation as of the
    time it is authorized or approved by the directors, a committee of the directors,
    or the members.

    (2) Common or interested directors may be counted in determining the presence
    of a quorum at a meeting of the directors, or of a committee of the directors,
    that authorizes such a contract, action, or transaction.

    (3) The directors, by the affirmative vote of a majority of those in office, and
    irrespective of any financial or personal interest of any of the directors, shall
    have authority to establish reasonable compensation, which may include pension,
    disability, and death benefits, for services to the corporation by directors and
    officers, or to delegate that authority to establish reasonable compensation to
    one or more officers or directors.

    (B) Divisions (A)(1) and (2) of this section do not limit or otherwise affect
    the liability of directors under section 1702.55 of the Revised Code.

    (C) For purposes of division (A) of this section, a director is not an interested
    director solely because the subject of a contract, action, or transaction may
    involve or effect a change in control of the corporation or the director''s continuation
    in office as a director of the corporation.

    (D) For purposes of this section, "action" means a resolution that is adopted
    by the directors or a committee of the directors.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.301
- number: '1702.31'
  heading: Meetings of directors - notice
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: 'Unless otherwise provided in the articles, regulations, or bylaws, and subject
    to the exceptions applicable during an emergency for which provision is made in
    division (G) of section 1702.11 of the Revised Code:

    (A) Meetings of the directors may be called by the chairperson of the board, the
    president, any vice-president, or any two directors.

    (B) Meetings of the directors may be held at any place within or without the state,
    including by means of authorized communications equipment, unless the articles
    or regulations prohibit participation by directors at a meeting by means of authorized
    communications equipment. Participation in a meeting pursuant to this division
    constitutes presence at that meeting.

    (C) Notice of the place, if any, and time of each meeting of the directors shall
    be given to each director either by personal delivery or by mail, by overnight
    delivery service, or by means of authorized communications equipment at least
    two days before the meeting. That notice need not specify the purposes of the
    meeting.

    (D) Notice of adjournment of a meeting need not be given if the time and place
    to which it is adjourned are fixed and announced at that meeting.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.31
- number: '1702.32'
  heading: Quorum for directors' meeting
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: Unless the articles or the regulations otherwise provide, and subject to the
    exceptions applicable during an emergency for which provision is made in division
    (G) of section 1702.11 of the Revised Code, a majority of the whole authorized
    number of directors is necessary to constitute a quorum for a meeting of the directors,
    except that a majority of the directors in office constitutes a quorum for filling
    a vacancy in the board. The act of a majority of the directors present at a meeting
    at which a quorum is present is the act of the board, unless the act of a greater
    number is required by the articles, the regulations, or the bylaws.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.32
- number: '1702.33'
  heading: Executive and other committees of directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) The regulations may provide for the creation by the directors of an executive
    committee or any other committee of the directors, to consist of one or more directors,
    and may authorize the delegation to any such committee of any of the authority
    of the directors, however conferred.

    (B) The directors may appoint one or more directors as alternate members of any
    committee described in division (A) of this section, who may take the place of
    any absent member or members at any meeting of the particular committee.

    (C) Each committee described in division (A) of this section shall serve at the
    pleasure of the directors, shall act only in the intervals between meetings of
    the directors, and shall be subject to the control and direction of the directors.

    (D) Unless otherwise provided in the regulations or ordered by the directors,
    any committee described in division (A) of this section may act by a majority
    of its members at a meeting or by a writing or writings signed by all of its members.

    (E) Meetings of committees described in division (A) of this section may be held
    by any means of authorized communications equipment, unless participation by members
    of the committee at a meeting by means of authorized communications equipment
    is prohibited by the articles, the regulations, or an order of the directors.
    Participation in a meeting pursuant to this division constitutes presence at the
    meeting.

    (F) An act or authorization of an act by any committee described in division (A)
    of this section within the authority delegated to it shall be as effective for
    all purposes as the act or authorization of the directors.

    (G) Unless otherwise provided in the articles, the regulations, or the resolution
    of the directors creating a committee described in division (A) of this section,
    a committee described in division (A) of this section may do both of the following:

    (1) Create one or more subcommittees, each of which consists of one or more members
    of the committee;

    (2) Delegate to a subcommittee any or all of the powers and authority of the committee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.33
- number: '1702.34'
  heading: Officers - authority and removal
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) The officers of a corporation shall consist of a president, a secretary,
    a treasurer, and, if desired, a chairperson of the board, one or more vice-presidents,
    and such other officers and assistant officers as may be deemed necessary, each
    of whom may be designated by such other titles as may be provided in the articles,
    the regulations, the bylaws, or resolutions of the directors. Unless the articles
    or the regulations otherwise provide, none of the officers need be a director.
    Any two or more offices may be held by the same person. The officers shall be
    elected or appointed at such time, in such manner, and for such terms as may be
    prescribed in the articles or the regulations. In the absence of any such provision,
    all officers shall be elected annually by the directors.

    (B) Unless the articles or the regulations otherwise provide, and subject to the
    exceptions applicable during an emergency for which provision is made in division
    (G) of section 1702.11 of the Revised Code:

    (1) All officers, as between themselves and the corporation, shall respectively
    have such authority and perform such duties as are determined by the persons authorized
    to elect or appoint them;

    (2) Any officer may be removed, with or without cause, by the persons authorized
    to elect or appoint the officer without prejudice to the contract rights of such
    officer. The election or appointment of an officer for a given term, or a general
    provision in the articles, the regulations, or the bylaws with respect to term
    of office, shall not be deemed to create contract rights;

    (3) The persons authorized to elect or appoint officers may fill any vacancy in
    any office occurring from whatever reason.'
