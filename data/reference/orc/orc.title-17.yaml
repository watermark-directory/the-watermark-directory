- number: '1706.762'
  heading: Separate asset series-how assets held
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) Assets of a series may be held directly or indirectly, including in the
    name of the series, in the name of the limited liability company, through a nominee,
    or otherwise.

    (B) If the records of a series are maintained in a manner so that the assets of
    the series can be reasonably identified by specific listing, category, type, quantity,
    or computational or allocational formula or procedure, including a percentage
    or share of any assets, or by any other method in which the identity of the assets
    can be objectively determined, the records are considered to satisfy the requirement
    of division (B)(1) of section 1706.761 of the Revised Code.'
