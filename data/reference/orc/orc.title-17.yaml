- number: '1707.99'
  heading: Penalty
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'Whoever commits any act described in division (A) of section 1707.042 or
    section 1707.44 of the Revised Code is guilty of a violation of sections 1707.01
    to 1707.50 of the Revised Code and the following apply to the offender:

    (A) If the value of the funds or securities involved in the offense or the loss
    to the victim is less than one thousand dollars, the offender is guilty of a felony
    of the fifth degree, and the court may impose upon the offender an additional
    fine of not more than two thousand five hundred dollars.

    (B) If the value of the funds or securities involved in the offense or the loss
    to the victim is one thousand dollars or more but less than seven thousand five
    hundred dollars, the offender is guilty of a felony of the fourth degree, and
    the court may impose upon the offender an additional fine of not more than five
    thousand dollars.

    (C) If the value of the funds or securities involved in the offense or the loss
    to the victim is seven thousand five hundred dollars or more but less than thirty-seven
    thousand five hundred dollars, the offender is guilty of a felony of the third
    degree, and the court may impose upon the offender an additional fine of not more
    than ten thousand dollars.

    (D) If the value of the funds or securities involved in the offense or the loss
    to the victim is thirty-seven thousand five hundred dollars or more but less than
    one hundred fifty thousand dollars, the offender is guilty of a felony of the
    second degree, and the court may impose upon the offender an additional fine of
    not more than fifteen thousand dollars.

    (E) If the value of the funds or securities involved in the offense or the loss
    to the victim is one hundred fifty thousand dollars or more, the offender is guilty
    of a felony of the first degree, and the court may impose upon the offender an
    additional fine of not more than twenty thousand dollars.'
