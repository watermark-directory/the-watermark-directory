- number: '1706.616'
  heading: Payment of expenses
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: 'On termination of the derivative action the court may do any of the following:

    (A) Order the limited liability company to pay the plaintiff''s reasonable expenses,
    including attorney fees, incurred by the plaintiff in the derivative action if
    the court finds that the derivative action has resulted in a substantial benefit
    to the limited liability company;

    (B) Order a series to pay the plaintiff''s reasonable expenses, including attorney
    fees, incurred by the plaintiff in the derivative action if the court finds that
    the derivative action has resulted in a substantial benefit to the series;

    (C) Order the plaintiff to pay any defendant''s reasonable expenses, including
    attorney fees, incurred by the defendant in defending the derivative action if
    it finds that the derivative action was commenced or maintained without reasonable
    cause or for an improper purpose;

    (D) Order a party to pay an opposing party''s expenses incurred because of the
    filing of a pleading, motion, or other paper, if it finds both of the following:

    (1) That the pleading, motion, or other paper was not well grounded in fact, after
    reasonable inquiry, or not warranted by existing law or a good faith argument
    for the extension, modification, or reversal of existing law.

    (2) That the pleading, motion, or other paper was interposed for an improper purpose,
    such as to harass or cause unnecessary delay or needless increase in the cost
    of litigation.'
