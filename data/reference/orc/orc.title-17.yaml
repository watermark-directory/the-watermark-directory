  text: '(A) Any business trust that transacts business in this state in violation
    of this chapter shall forfeit not less than one thousand nor more than ten thousand
    dollars. Such forfeiture shall be recovered in an action in the name of the state
    brought in the court of common pleas of Franklin county, or in the court of common
    pleas of any county in which the business trust has transacted business or has
    property or a place of business, by the attorney general or the prosecuting attorney.
    If such action is brought by the attorney general, such forfeiture shall on collection
    be paid into the state treasury to the credit of the general revenue fund. If
    brought by the prosecuting attorney, one-half of such forfeiture shall on collection
    be paid to the treasurer of the county in which action was brought and one-half
    shall be paid into the state treasury to the credit of the general revenue fund.
    In addition to such forfeiture, the court shall render a judgment that the business
    trust pay the filing fees required by division (B) of section 1746.04 of the Revised
    Code, plus interest on the fees at the rate of eight per cent per annum for the
    time during which the court determines that the business trust transacted business
    in this state in violation of section 1746.03 of the Revised Code. An action for
    the recovery of such forfeiture and filing fee shall be brought within five years
    after the business trust has ceased to transact business in this state.

    (B) For good cause shown, the secretary of state, with the consent of the attorney
    general, before or after judgment, or the court in which an action is pending
    for the collection of a forfeiture, may remit all or part of the forfeiture.'
