- number: '1724.04'
  heading: Articles of incorporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1724'
    name: Community Improvement Corporations
  text: 'A county that elects under section 5722.02 of the Revised Code to adopt and
    implement the procedures set forth in sections 5722.02 to 5722.15 of the Revised
    Code may organize a county land reutilization corporation under this chapter and
    Chapter 1702. of the Revised Code for the purpose of exercising the powers granted
    to a county under Chapter 5722. of the Revised Code. The county treasurer of the
    county for the benefit of which the corporation is being organized shall be the
    incorporator of the county land reutilization corporation. The form of the articles
    of incorporation of the corporation shall be approved by resolution of the board
    of county commissioners of the county.

    When the articles of incorporation of any community improvement corporation, or
    any amendment, amended articles, merger, or consolidation which provides for the
    creation of such a corporation, are deposited for filing and recording in the
    office of the secretary of state, the secretary of state shall submit them to
    the attorney general for examination. If such articles, amendment, amended articles,
    merger, or consolidation, are found by the attorney general to be in accordance
    with Chapter 1724. of the Revised Code, and not inconsistent with the constitution
    and laws of the United States and of this state, the attorney general shall endorse
    thereon the attorney general''s approval and deliver them to the secretary of
    state, who shall file and record them pursuant to section 1702.07 of the Revised
    Code.'
