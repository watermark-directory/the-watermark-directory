- number: '1701.911'
  heading: Provisional director - appointment, duties, qualifications
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Upon the complaint of not less than one-fourth of the directors of a
    corporation or upon the complaint of the holders of shares entitling them to exercise
    not less than one-fifth of the voting power of a corporation in the election of
    directors, the court of common pleas of the county in which the corporation maintains
    its principal office may order the appointment of a provisional director for that
    corporation if the articles or regulations of the corporation expressly provide
    for such an appointment. No appointment shall be made until a hearing is held
    by the court. Notice of the hearing shall be given to each director and the secretary
    of the corporation in any manner that the court may direct. If directed by the
    court, the notice also shall be given to each of the shareholders. The complainants
    shall establish at the hearing that, because of irreconcilable differences among
    the existing directors or because there are no directors and the shareholders
    are unable to elect any directors, the continued operation of the corporation
    has been substantially impeded or made impossible.

    (B) A provisional director shall have the same rights and duties as other directors
    and shall serve until removed by the appointing court or by the holders of shares
    entitling them to exercise a majority of the voting power of the corporation in
    the election of directors, or until the provisional director''s earlier resignation
    or death. If the provisional director dies or resigns, the court, pursuant to
    divisions (A) and (C) of this section, may appoint a replacement provisional director,
    upon its own motion and without the filing of a complaint for the appointment
    of a provisional director. If the appointing court finds that the irreconcilable
    differences no longer exist, it shall order the removal of the provisional director.

    (C) No person shall be appointed as a provisional director unless the person is
    generally conversant with corporate affairs, has no legal or equitable interest
    in the shares or obligations of the corporation of which the person is to be appointed
    a director, and is not indebted to such corporation. The compensation of a provisional
    director shall be determined by agreement with the corporation for which the provisional
    director is serving, subject to the approval of the appointing court, except that
    the appointing court may fix the provisional director''s compensation in the absence
    of agreement or in the event of disagreement between the provisional director
    and the corporation.

    (D) A proceeding concerning the appointment of a provisional director of a corporation
    is a special proceeding, and final orders issued in the proceeding may be vacated,
    modified, or reversed on appeal pursuant to the Rules of Appellate Procedure and,
    to the extent not in conflict with those rules, Chapter 2505. of the Revised Code.'
