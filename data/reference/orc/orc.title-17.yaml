  url: https://codes.ohio.gov/ohio-revised-code/section-1702.03
- number: '1702.04'
  heading: Articles of incorporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) Any person, singly or jointly with others, and without regard to residence,
    domicile, or state of incorporation, may form a corporation by signing and filing
    with the secretary of state articles of incorporation, which shall set forth the
    following:

    (1) The name of the corporation;

    (2) The place in this state where the principal office of the corporation is to
    be located;

    (3) The purpose or purposes for which the corporation is formed.

    (B) The articles also may set forth the following:

    (1) The names of individuals who are to serve as the initial directors;

    (2) The names of any persons or the designation of any group of persons who are
    to be the initial members;

    (3) Any qualification of membership and the classification of members;

    (4) A provision to the effect that the corporation shall be subordinate to and
    subject to the authority of any head or national association, lodge, order, beneficial
    association, fraternal or beneficial society, foundation, federation, or any other
    nonprofit corporation, society, organization, or association;

    (5) Any lawful provision for the purpose of defining, limiting, or regulating
    the exercise of the authority of the corporation, the incorporators, the directors,
    the officers, the members, or any class of members, or creating or defining rights
    and privileges of the members among themselves or in the property of the corporation,
    or governing the distribution of assets on dissolution;

    (6) Any provision that may be set forth in the regulations;

    (7) A provision specifying the period of existence of the corporation if it is
    to be otherwise than perpetual;

    (8) Any additional provision permitted by this chapter.

    (C) A written appointment of a statutory agent for the purposes set forth in section
    1702.06 of the Revised Code shall be filed with the articles, unless the corporation
    belongs to one of the classes mentioned in division (N) of that section.

    (D) The legal existence of the corporation begins upon the filing of the articles
    or on a later date specified in the articles that is not more than ninety days
    after the filing, and, unless the articles otherwise provide, its period of existence
    shall be perpetual.'
