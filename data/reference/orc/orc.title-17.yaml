- number: '1706.47'
  heading: Dissolution
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: 'A limited liability company is dissolved, and its activities shall be wound
    up, upon the occurrence of any of the following:

    (A) An event or circumstance that the operating agreement states causes dissolution;

    (B) The consent of all the members;

    (C) A limited liability company with canceled articles has failed to cure the
    grounds for cancellation for three years or more and any member or person authorized
    pursuant to section 1706.18 of the Revised Code consents to the dissolution;

    (D) The passage of ninety consecutive days after the occurrence of the dissociation
    of the last remaining member; provided that upon dissociation of the last remaining
    member pursuant to division (E) of section 1706.411 of the Revised Code, the limited
    liability company shall not be dissolved if either of the following applies:

    (1) The operating agreement provides for the admission of a substitute member
    effective prior to the passage of such time period;

    (2) A substitute member has been admitted, as evidenced by a written record, prior
    to the passage of such time period, which admission is to be effective as of the
    date of such dissociation.

    (E) On application by a member, the entry by the appropriate court of an order
    dissolving the limited liability company on the grounds that it is not reasonably
    practicable to carry on the limited liability company''s activities in conformity
    with the operating agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.47
- number: '1706.471'
  heading: Effect of dissolution
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A dissolved limited liability company continues its existence as a limited
    liability company but may not carry on any activities except as is appropriate
    to wind up and liquidate its activities and affairs. Appropriate activities include
    all of the following:

    (1) Collecting its assets;

    (2) Disposing of its properties that will not be distributed in kind to persons
    owning membership interests;

    (3) Discharging or making provisions for discharging its liabilities;

    (4) Distributing its remaining property in accordance with section 1706.475 of
    the Revised Code;

    (5) Doing every other act necessary to wind up and liquidate its activities and
    affairs.

    (B) In winding up its activities, a limited liability company may do any of the
    following:

    (1) Deliver to the secretary of state for filing, on a form prescribed by the
    secretary of state, a certificate of dissolution setting forth all of the following:

    (a) The name and registration number of the limited liability company;

    (b) That the limited liability company has dissolved;

    (c) The effective date of the certificate of dissolution if it is not to be effective
    upon the filing. Such an effective date shall be a date certain and shall not
    be a date prior to the date of filing.

    (d) A copy of the notice it will publish pursuant to division (A) of section 1706.474
    of the Revised Code.

    (e) Any other information the limited liability company considers proper.

    (2) Preserve the limited liability company''s activities and property as a going
    concern for a reasonable time;

    (3) Prosecute, defend, or settle actions or proceedings whether civil, criminal,
    or administrative;

    (4) Make an assignment of the limited liability company''s property;

    (5) Resolve disputes by mediation or arbitration;

    (6) Merge or convert in accordance with sections 1706.71 to 1706.74 of the Revised
    Code.

    (C) A limited liability company''s dissolution, in itself:

    (1) Is not an assignment of the limited liability company''s property;

    (2) Does not prevent the commencement of a proceeding by or against the limited
    liability company in its limited liability company name;

    (3) Does not abate or suspend a proceeding pending by or against the limited liability
    company on the effective date of dissolution;

    (4) Does not terminate the authority of its statutory agent;

    (5) Does not abate, suspend, or otherwise alter the application of section 1706.26
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.471
- number: '1706.472'
  heading: Winding up of limited liability company activities
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) Subject to division (C)(5) of section 1706.471 of the Revised Code, after
    dissolution, the remaining members, if any, and if none, a person appointed by
    all holders of the membership interest last assigned by the last person to have
    been a member, may wind up the limited liability company''s activities.

    (B) The appropriate tribunal may order supervision of the winding up of a dissolved
    limited liability company, including the appointment of a person to wind up the
    limited liability company''s activities as follows:

    (1) On application of a member, if the applicant establishes good cause;

    (2) On application of an assignee, if both of the following apply:

    (a) The limited liability company does not have any members;

    (b) Within a reasonable time following the dissolution, a person has not been
    appointed pursuant to division (A) of this section.

    (3) In connection with a proceeding under division (E) of section 1706.47 of the
    Revised Code.'
