- number: '1703.041'
  heading: Designated agent
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: '(A) Every foreign corporation for profit that is licensed to transact business
    in this state, and every foreign nonprofit corporation that is licensed to exercise
    its privileges in this state, shall have and maintain an agent, sometimes referred
    to as the "designated agent," upon whom process against the corporation may be
    served within this state. The agent shall be one of the following:

    (1) A natural person who is a resident of this state;

    (2) A domestic or foreign corporation, nonprofit corporation, limited liability
    company, partnership, limited partnership, limited liability partnership, limited
    partnership association, professional association, business trust, or unincorporated
    nonprofit association that has a business address in this state. If the agent
    is an entity other than a domestic corporation, the agent shall meet the requirements
    of Title XVII of the Revised Code for an entity of the agent''s type to transact
    business or exercise privileges in this state.

    (B)(1) The written appointment of a designated agent shall set forth the name
    and address of the agent, including the street and number of the agent''s primary
    residence in this state or, if the agent is not a natural person, the agent''s
    usual place of business in this state, and shall otherwise be in such form as
    the secretary of state prescribes. The secretary of state shall keep a record
    of the names of such foreign corporations and the names and addresses of their
    respective agents.

    (2) As used in division (B)(1) of this section, "usual place of business" means
    a place in this state that is customarily open during normal business hours and
    where an individual is generally present who is authorized to perform the services
    of a registered agent, including accepting service of process and other notifications
    for the person serving as a statutory agent. "Usual place of business" does not
    include a post office box, regardless of whether that post office box has an associated
    street address.

    (C) If the designated agent dies, removes from the state, or resigns, the foreign
    corporation shall forthwith appoint another agent and file in the office of the
    secretary of state, on a form prescribed by the secretary of state, a written
    appointment of the new agent.

    (D) If the designated agent changes the agent''s address from that appearing upon
    the record in the office of the secretary of state, the foreign corporation or
    the designated agent in its behalf shall forthwith file with the secretary of
    state, on a form prescribed by the secretary of state, a written statement setting
    forth the agent''s new address.

    (E) A designated agent may resign by filing with the secretary of state, on a
    form prescribed by the secretary of state, a signed statement to that effect.
    The secretary of state shall forthwith mail a copy of the statement to the foreign
    corporation at its principal office as shown by the record in the secretary of
    state''s office. Upon the expiration of sixty days after the filing, the authority
    of the agent shall terminate.

    (F) A foreign corporation may revoke the appointment of a designated agent by
    filing with the secretary of state, on a form prescribed by the secretary of state,
    a written appointment of another agent and a statement that the appointment of
    the former agent is revoked.

    (G) Process may be served upon a foreign corporation by delivering a copy of it
    to its designated agent, if a natural person, or by delivering a copy of it at
    the address of its agent in this state, as the address appears upon the record
    in the office of the secretary of state.

    (H) This section does not limit or affect the right to serve process upon a foreign
    corporation in any other manner permitted by law.'
