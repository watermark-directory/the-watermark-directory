- number: '1761.21'
  heading: Information to be kept confidential
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) All conferences and administrative proceedings under sections 1761.18
    and 1761.19 of the Revised Code, the fact of their actual or anticipated occurrence,
    and all notices, agreements, hearings, orders, records, evidence, transcripts,
    and other writings, happenings, or things pertaining to those conferences or proceedings
    shall be kept confidential as among the superintendent of insurance, the superintendent
    of credit unions, the director of commerce, the deputy director of financial institutions,
    the governor, a credit union share guaranty corporation or a director, officer,
    or employee of the corporation who is party to the conference or proceedings,
    witnesses in the conference or proceedings, and other persons specifically designated
    by the superintendent of credit unions for those conferences and proceedings set
    by him or the superintendent of insurance for those conferences and proceedings
    set by him. In designating specific persons who may be present or acquire knowledge
    of matters made confidential by this division, the superintendent shall not exclude
    attorneys or other suitable representatives of the corporation, director, officer,
    or employee who is party to the conference or proceedings. If the conference or
    proceedings apply to a director, officer, or employee, the superintendent shall
    not exclude suitable representatives of the credit union of which such regulated
    individual is an officer, director, or employee.

    (B) Division (A) of this section ceases to apply upon the occurrence of any of
    the following:

    (1) An action is brought to recover a forfeiture for the violation of an agreement
    concluded, or a final or summary cease-and-desist order issued, under section
    1761.18 or 1761.19 of the Revised Code. A forfeiture, in the absence of such an
    action for recovery, does not waive division (A) of this section except insofar
    as the forfeiture must be reflected or reported in the financial records or reports
    of the credit union or regulated individual.

    (2) Information made confidential by division (A) of this section is needed as
    evidence in a criminal proceeding or in the work of a committee of the general
    assembly;

    (3) The superintendent of credit unions or the superintendent of insurance furnishes
    information made confidential by division (A) of this section to the applicable
    insurer recognized under section 1733.041 of the Revised Code.

    (C) No officer or employee of the division of credit unions, of the department
    of commerce or any of its other divisions, or of the governor''s office shall
    violate division (A) of this section.'
