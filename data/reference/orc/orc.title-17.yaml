  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.63
- number: '1751.65'
  heading: Health insuring corporation - prohibited activities
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) As used in this section, "genetic screening or testing" means a laboratory
    test of a person''s genes or chromosomes for genotypes, mutations, or chromosomal
    changes, including carrier status, that are linked to physical or mental disorders
    or impairments, or that indicate a susceptibility to illness, disease, or other
    disorders, whether physical or mental, which test is a direct test for genotypes,
    mutations, or chromosomal changes, and not an indirect manifestation of genetic
    disorders.

    (B) No health insuring corporation shall do either of the following:

    (1) Consider any information obtained from genetic screening or testing in processing
    an application for coverage for health care services under an individual or group
    policy, contract, or agreement or in determining insurability under such a policy,
    contract, or agreement;

    (2) Inquire, directly or indirectly, into the results of genetic screening or
    testing or use such information, in whole or in part, to cancel, refuse to issue
    or renew, limit benefits under, or set premiums for, an individual or group policy,
    contract, or agreement.

    (C) Any health insuring corporation that has engaged in, is engaged in, or is
    about to engage in a violation of division (B) of this section is subject to the
    jurisdiction of the superintendent of insurance under section 3901.04 of the Revised
    Code.'
