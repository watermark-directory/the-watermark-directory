- number: '1716.02'
  heading: Charitable organizations to file annual registration statement - contents
    - fees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A) Every charitable organization, except those exempted under section 1716.03
    of the Revised Code, that intends to solicit contributions in this state by any
    means or have contributions solicited in this state on its behalf by any other
    person, charitable organization, commercial co-venturer, or professional solicitor,
    or that participates in a charitable sales promotion, prior to engaging in any
    of these activities and annually thereafter, shall file a registration statement
    with the attorney general upon a form prescribed by the attorney general. Each
    chapter, branch, or affiliate of a charitable organization that is required to
    file a registration statement under this section either shall file a separate
    registration statement or report the necessary information to its parent charitable
    organization that then shall file a consolidated registration statement. The annual
    registration statement shall be refiled on or before the fifteenth day of the
    fifth calendar month after the close of each fiscal year in which the charitable
    organization solicited in this state, or by the date of any applicable extension
    of the federal filing date, whichever is later. No charitable organization that
    is required to register under this chapter prior to registration, shall solicit
    contributions in this state by any means, have contributions solicited in this
    state on its behalf by any other person, charitable organization, commercial co-venturer,
    or professional solicitor, or participate in a charitable sales promotion.

    (B) The registration statement shall be signed and sworn to under penalties of
    perjury by the treasurer or chief fiscal officer of the charitable organization
    and shall contain the following information:

    (1) The name of the charitable organization, the purpose for which it is organized,
    and the name or names under which it intends to solicit contributions;

    (2) The address and telephone number of the principal place of business of the
    charitable organization and the address and telephone number of every office,
    chapter, branch, or affiliate of the charitable organization located in this state
    or, if the charitable organization does not maintain an office in this state,
    the name, address, and telephone number of the person that has custody of its
    financial records;

    (3) The names and addresses of the officers, directors, trustees, and executive
    personnel of the charitable organization;

    (4) The annual financial report of the charitable organization for the immediately
    preceding fiscal year as required under section 1716.04 of the Revised Code;

    (5) The last day of the fiscal year for the charitable organization;

    (6) A statement of whether the charitable organization is registered with or otherwise
    authorized by any other governmental authority in this state or another state
    to solicit contributions;

    (7) A statement of whether the charitable organization has had its registration
    or authority denied, suspended, revoked, or enjoined by any court or other governmental
    authority in this state or another state;

    (8) A statement of whether the charitable organization intends to solicit contributions
    from the public directly by using its own resources or to have solicitations made
    on its behalf through the use of another charitable organization, fund-raising
    counsel, professional solicitors, or commercial co-venturers;

    (9) The names, addresses, and the telephone numbers of any other charitable organization,
    fund-raising counsel, professional solicitors, and commercial co-venturers who
    act or will act on behalf of the charitable organization, together with a statement
    setting forth the specific terms of the arrangements for salaries, bonuses, commissions,
    expenses, or other remunerations to be paid the other charitable organization,
    fund-raising counsel, professional solicitors, and commercial co-venturers. If
    any of the information required by division (B)(9) of this section is not available
    at the time of registration, that information shall be submitted to the attorney
    general at a later date but before any solicitation occurs.

    (10) The charitable purpose or purposes for which the contributions to be solicited
    will be used;

    (11) The names, addresses, and telephone numbers of the persons within the charitable
    organization that will have final responsibility for the custody of the contributions;

    (12) The names of the persons within the charitable organization that will be
    responsible for the final distribution of the contributions;

    (13) The period of time during which, and the counties in which, the solicitation
    is planned to be conducted;

    (14) A schedule of the activities carried on by the charitable organization in
    the performance of its purposes;

    (15) Any other information that the attorney general may, by rule, require.

    (C)(1) With the initial registration only, every charitable organization that
    is required to register under this chapter also shall file with the attorney general
    the following:

    (a) A copy of the current charter, articles of incorporation, agreement of association,
    instrument of trust, constitution, or other organizational instrument, and a copy
    of the bylaws of the charitable organization;

    (b) A statement setting forth the place where and the date when the charitable
    organization was legally established, the form of its organization, and its tax
    exempt status, with a copy of its federal tax exemption determination letter.

    (2)(a) With the next annual registration statement filed after its adoption, the
    charitable organization shall file with the attorney general a copy of any amendment
    to its organizational instrument as specified in division (C)(1)(a) of this section
    and a copy of any amendment to its bylaws.

    (b) Within thirty days after its receipt, the charitable organization shall file
    with the attorney general a copy of any federal tax exemption determination letter
    or any correspondence rescinding its tax exempt status that is received after
    the initial registration. Not later than thirty days after being notified by the
    internal revenue service of any challenge to or investigation of its continued
    entitlement to federal tax exemption, the charitable organization shall notify
    the attorney general of this fact.

    (D)(1) Except as otherwise provided in division (D)(2) of this section, every
    charitable organization that is required to register under this chapter shall
    pay the following fees with each registration:

    (a) Fifty dollars, if the contributions received for the last calendar or fiscal
    year were five thousand dollars or more but less than twenty-five thousand dollars;

    (b) One hundred dollars, if the contributions received for the last calendar or
    fiscal year were twenty-five thousand dollars or more but less than fifty thousand
    dollars;

    (c) Two hundred dollars, if the contributions received for the last calendar or
    fiscal year were fifty thousand dollars or more.

    (2) A charitable organization that is required to register under this chapter
    and whose contributions received for the last calendar or fiscal year were less
    than five thousand dollars shall not pay any registration fee.

    (3) The amount of registration fees that a charitable organization is required
    to pay under division (D)(1) of this section shall be based on the amount of contributions
    that it receives from persons in this state. If, for any reporting year, a charitable
    organization cannot determine from its records the exact amount of contributions
    it received from persons in this state, it shall compute the amount of the registration
    fee upon the estimated amount of contributions it received from persons in this
    state, with the estimated amount to be explained in writing at the time the registration
    fee is paid. At the request of the attorney general, the charitable organization
    shall substantiate the estimated amount of contributions it received from persons
    in this state.

    (4) All registration fees shall be paid into the state treasury to the credit
    of the charitable law fund established under section 109.32 of the Revised Code.

    (5) Any charitable organization that fails to pay the fee required by this section
    at the time required shall pay an additional fee of two hundred dollars, except
    that the attorney general may waive the two-hundred-dollar fee upon a showing
    that the charitable organization failed to pay the fee for filing the annual registration
    statement at the time required by this section for reasons that were beyond the
    control of the charitable organization. If the charitable organization is required
    to pay an additional fee under section 109.31 of the Revised Code, the charitable
    organization is exempt from paying the additional fee in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.02
- number: '1716.03'
  heading: Organizations not required to file registration statement
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: 'The following shall not be required to file a registration statement as provided
    in section 1716.02 of the Revised Code:

    (A) Any religious agencies and organizations, and charities, agencies, and organizations
    operated, supervised, or controlled by a religious organization;

    (B) Any charitable organization that meets all of the following requirements:

    (1) It has been in continuous existence in this state for a period of at least
    two years;

    (2) It has received from the internal revenue service a determination letter that
    is currently in effect, stating that the charitable organization is exempt from
    federal income taxation under subsection 501(a) and described in subsection 501(c)(3)
    of the Internal Revenue Code;

    (3) It has registered with the attorney general as a charitable trust pursuant
    to section 109.26 of the Revised Code;

    (4) It has filed an annual report with and paid the required fee to the attorney
    general pursuant to section 109.31 of the Revised Code.

    (C) Any educational institution, when solicitation of contributions is confined
    to alumni, faculty, trustees, or the student membership and their families;

    (D) Every person other than an individual, when solicitation of contributions
    for a charitable purpose or on behalf of a charitable organization is confined
    to its existing membership, present or former employees, or present or former
    trustees;

    (E) Any public primary or secondary school, when solicitation of contributions
    is confined to alumni, faculty, or the general population of the local school
    district;

    (F) Any booster club that is organized and operated in conjunction with and for
    the benefit of students of public primary or secondary schools;

    (G) Any charitable organization that does not receive gross revenue, excluding
    grants or awards from the government or an organization that is exempt from federal
    income taxation under section 501(a) and described in section 501(c)(3) of the
    Internal Revenue Code, in excess of twenty-five thousand dollars during its immediately
    preceding fiscal year, if the organization does not compensate any person primarily
    to solicit contributions.

    If the gross revenue, excluding grants or awards from the government or an organization
    that is exempt from federal income taxation under section 501(a) and described
    in section 501(c)(3) of the Internal Revenue Code, of any charitable organization
    received during any fiscal year exceeds twenty-five thousand dollars, the charitable
    organization, within thirty days after the receipt of the revenue, shall file
    a registration statement with the attorney general pursuant to section 1716.02
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.03
- number: '1716.04'
  heading: Annual report
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A) Every charitable organization that is required to register pursuant to
    this chapter shall file an annual financial report with the attorney general upon
    a form prescribed by him. The report shall include all of the following:

    (1) A balance sheet;

    (2) A statement of support, revenue, and expenses, and any changes in the fund
    balance;

    (3) The names and addresses of the charitable organizations, fund-raising counsel,
    professional solicitors, and commercial co-venturers used, if any, and the amounts
    of money received from each of them, if any.

    (4) A statement of functional expenses that shall include, but not be limited
    to, expenses of the following categories:

    (a) Program;

    (b) Management and general;

    (c) Fund-raising.

    (5) Any other information that the attorney general, by rule, may require.

    (B) The attorney general shall accept a copy or duplicate original of a financial
    statement, report, or return filed by the charitable organization with the internal
    revenue service. The attorney general, by rule, may require additional information
    as part of the annual financial report. Any consolidated financial report filed
    with the attorney general shall include information about the parent charitable
    organization as such and the financial information arising out of the activities
    of each chapter, branch, or affiliate of the charitable organization in this state
    that is covered by the financial statement, report, or return filed by the charitable
    organization with the internal revenue service.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.04
- number: '1716.05'
  heading: Fund-raising counsel requirements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A) No person shall act as a fund-raising counsel unless the person first
    has complied with the requirements of this chapter and any rules adopted under
    this chapter.

    (B) Any fund-raising counsel that at any time has custody of contributions from
    a solicitation shall do all of the following:

    (1) Not later than ninety days after a solicitation campaign has been completed
    and on the anniversary of the commencement of a solicitation campaign lasting
    more than one year, furnish an accounting of all contributions collected and expenses
    paid, to the charitable organization with which the fund-raising counsel has contracted.
    The accounting shall be in writing and shall be retained by the charitable organization
    for three years. The fund-raising counsel shall file a copy of the accounting
    with the attorney general not later than seven days after it is furnished to the
    charitable organization.

    (2) Not later than two days after receipt of each contribution, deposit the entire
    amount of the contribution in an account at a bank or other federally insured
    financial institution which shall be in the name of the charitable organization
    with which the fund-raising counsel has contracted. Each contribution collected
    by the fund-raising counsel shall be solely in the name of that charitable organization.
    The charitable organization shall have sole control of all withdrawals from the
    account and the fund-raising counsel shall not be given the authority to withdraw
    any deposited funds from the account.

    (3) During each solicitation campaign and for not less than three years after
    its completion, maintain the following records that shall be made available to
    the attorney general upon the attorney general''s request:

    (a) A record of each contribution that at any time is in the custody of the fund-raising
    counsel, including the name and address of each contributor and the date and amount
    of the contribution, provided that the attorney general shall not disclose that
    information except to the extent necessary for investigative or law enforcement
    purposes;

    (b) The location of each bank or financial institution in which the fund-raising
    counsel has deposited revenue from the solicitation campaign and the account number
    of each account in which the deposits were made.

    (C) Unless otherwise provided in this section, any change in any information filed
    with the attorney general pursuant to this section shall be reported in writing
    to the attorney general within seven days after the change occurs.

    (D) No person shall serve as a fund-raising counsel, or be a member, officer,
    employee, or agent of any fund-raising counsel, who has been convicted of a disqualifying
    offense as determined in accordance with section 9.79 of the Revised Code.

    (E) The information provided under this section to the attorney general by a fund-raising
    counsel shall be included in the reports and files required to be compiled and
    maintained by the attorney general pursuant to divisions (E) and (F) of section
    1716.08 of the Revised Code.

    (F) If a fund-raising counsel fails to comply in a timely or complete manner with
    any of the requirements under this section, the fund-raising counsel is liable
    for and, in addition to any fee required in this section, shall pay two hundred
    dollars for each late filing. Each accounting shall be considered a separate filing
    for the purposes of this section. Any fees required by this section are in addition
    to, and not in place of, penalties prescribed in this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.05
- number: '1716.06'
  heading: Collection receptacles
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: 'The operator of a collection receptacle shall display all of the following
    information on the collection receptacle in letters that are at least three inches
    in height and not less than one-half inch in width, are on a permanent sign or
    label placed on every side of the collection receptacle, and are in a color that
    contrasts with the color of the collection receptacle:

    (A) The name, address, and telephone number of the charitable organization that
    will receive goods collected in the collection receptacle;

    (B) If the collection receptacle is operated by a professional solicitor, the
    name, address, and telephone number of the professional solicitor;

    (C) If the collection receptacle is operated by a professional solicitor, a statement
    that the contract disclosing the financial arrangements between the professional
    solicitor and the charitable organization is on file with and available from the
    attorney general.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.06
- number: '1716.07'
  heading: Professional solicitors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A) No professional solicitor shall engage in any solicitation unless it
    has complied with the requirements of this chapter and any rules adopted under
    this chapter.

    (B) Every professional solicitor, before engaging in any solicitation, shall register
    with the attorney general. Applications for registration or renewal of registration
    shall be in writing, under oath, and in the form prescribed by the attorney general,
    and shall be accompanied by a fee in the amount of two hundred dollars. Any corporation,
    partnership, association, or other entity that intends to act as a professional
    solicitor may register for and pay a single fee of two hundred dollars on behalf
    of all its members, officers, employees, agents, and solicitors. In that case,
    the names and addresses of all the officers, employees, and agents of the professional
    solicitor and all other persons with whom the professional solicitor has contracted
    to work under its direction, including solicitors, shall be listed in the application
    or furnished to the attorney general within five days of the date of employment
    or contractual arrangement. The application shall contain any other information
    that the attorney general may require. The registration shall be for a period
    of one year or part of one year and shall expire on the thirty-first day of March
    of each year. Upon application and payment of the fee specified in this division
    and filing of the bond prescribed in division (C) of this section, the registration
    may be renewed for additional one-year periods. All fees prescribed in this division
    shall be paid into the state treasury to the credit of the charitable law fund
    established under section 109.32 of the Revised Code.

    (C) At the time of making an application for registration or renewal of registration,
    the professional solicitor shall file with and have approved by the attorney general
    a bond in which the professional solicitor shall be the principal obligor, in
    the sum of twenty-five thousand dollars, with one or more sureties authorized
    to do business in this state. The professional solicitor shall maintain the bond
    in effect as long as the registration is in effect; however, the liability of
    the surety under the bond shall not exceed an all-time aggregate liability of
    twenty-five thousand dollars. The bond, which may be in the form of a rider to
    a larger blanket liability bond, shall run to the state and to any person who
    may have a cause of action against the principal obligor of the bond for any liability
    arising out of a violation by the obligor of any provision of this chapter or
    any rule adopted pursuant to this chapter.

    (D)(1) Prior to the commencement of any solicitation campaign, the professional
    solicitor shall pay to the attorney general a fee of two hundred dollars and file
    with the attorney general, and the attorney general may publish, all of the following:

    (a) A completed document called "Solicitation Notice" upon a form prescribed by
    the attorney general and containing all of the information specified in division
    (D)(2) of this section;

    (b) A copy of the contract described in division (A) of section 1716.08 of the
    Revised Code;

    (c) A sworn statement by the charitable organization on whose behalf the professional
    solicitor is acting certifying that the solicitation notice and any accompanying
    material are true and correct to the best of its knowledge.

    (2) The solicitation notice shall include all of the following:

    (a) The fund-raising methods to be used;

    (b) The projected dates when the solicitation campaign will commence and terminate,
    which period of time shall not exceed four years;

    (c) The location and telephone number from where the solicitation campaign will
    be conducted if it will be conducted by telephone;

    (d) The location of each collection receptacle used in connection with the solicitation
    campaign;

    (e) The name and residence address of each person responsible for directing and
    supervising the conduct of the solicitation campaign;

    (f) A statement of whether the professional solicitor will at any time have custody
    of any contributions;

    (g) A full and fair description of the charitable program for which the solicitation
    campaign is being carried out;

    (h) The written and signed consent of every charitable organization on whose behalf
    the professional solicitor will be soliciting contributions or whose name will
    be mentioned during the solicitation campaign.

    (E) Not later than ninety days after a solicitation campaign has been completed
    and on the anniversary of the commencement of a solicitation campaign lasting
    more than one year, the professional solicitor shall provide to the charitable
    organization and file with the attorney general a financial report of the campaign,
    including the gross revenue received, the total weight of items collected in each
    collection receptacle if a collection receptacle was used and the value received
    for the sale of such items collected, and an itemization of all expenses incurred.
    The report shall be completed on a form prescribed by the attorney general and
    signed by an authorized official of the professional solicitor who shall certify
    under oath that the report is true and correct.

    (F) Each contribution collected by or in the custody of the professional solicitor
    shall be solely in the name of the charitable organization on whose behalf the
    contribution was solicited. Not later than two days after receipt of each contribution,
    the professional solicitor shall deposit the entire amount of the contribution
    in an account at a bank or other federally insured financial institution, which
    shall be in the name of that charitable organization. The charitable organization
    shall have sole control of all withdrawals from the account and the professional
    solicitor shall not be given the authority to withdraw any deposited funds from
    the account.

    (G)(1) During each solicitation campaign and for not less than three years after
    its completion, the professional solicitor shall maintain the following records:

    (a) The name and, if known to the professional solicitor, the address and telephone
    number of each contributor and the date and amount of the contribution, provided
    that the attorney general shall not disclose that information except to the extent
    necessary for investigative or law enforcement purposes;

    (b) The name and residence address of each employee, agent, and any other person,
    however designated, who is involved in the solicitation campaign, the amount of
    compensation paid to each, and the dates on which the payments were made;

    (c) A record of all contributions that at any time are in the custody of the professional
    solicitor;

    (d) A record of all expenses incurred by the professional solicitor for the payment
    of which the professional solicitor is liable;

    (e) A record of all expenses incurred by the professional solicitor for the payment
    of which the charitable organization is liable;

    (f) The location of each bank or financial institution in which the professional
    solicitor has deposited revenue from the solicitation campaign and the account
    number of each account in which the deposits were made;

    (g) A copy of each pitch sheet or solicitation script used during the solicitation
    campaign;

    (h) If a refund of a contribution has been requested, the name and address of
    each person requesting the refund, and if a refund was made, its amount and the
    date it was made.

    (i) An audio recording of each telephone solicitation the professional solicitor
    makes;

    (j) Any other record of such information as the attorney general may require.

    (2) If the professional solicitor sells tickets to any event and represents that
    the tickets will be donated for use by another person, the professional solicitor
    also shall maintain for the same period as specified in division (G)(1) of this
    section the following records:

    (a) The name and address of each contributor that purchases or donates tickets
    and the number of tickets purchased or donated by the contributor;

    (b) The name and address of each organization that receives the donated tickets
    for the use of others, and the number of tickets received by the organization.

    (3) Any of the records described in divisions (G)(1) and (2) of this section shall
    be made available to the attorney general upon the attorney general''s request
    and shall be furnished to the attorney general within ten days of the request.

    (H) Unless otherwise provided in this section or section 1716.08 of the Revised
    Code, any change in any information filed with the attorney general pursuant to
    this section and section 1716.08 of the Revised Code shall be reported in writing
    to the attorney general within seven days after the change occurs.

    (I) No person shall serve as a professional solicitor, or be a member, officer,
    employee, or agent of any professional solicitor, who has been convicted of a
    disqualifying offense determined in accordance with section 9.79 of the Revised
    Code.

    (J) If a professional solicitor fails to comply in a timely or complete manner
    with any of the requirements under this section, the professional solicitor is
    liable for and, in addition to any fee required in this section, shall pay two
    hundred dollars for each late filing. Each registration, renewal of registration,
    bond, solicitation notice, contract, sworn statement, or financial report shall
    be considered a separate filing for the purposes of this section. Any fees required
    by this section are in addition to, and not in place of, penalties prescribed
    in this chapter.'
