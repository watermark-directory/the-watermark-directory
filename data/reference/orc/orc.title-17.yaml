- number: '1706.161'
  heading: Amendments to articles of organization
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) The articles of organization may be amended at any time.

    (B) The articles of organization may be restated with or without amendment at
    any time.

    (C) To amend its articles of organization, a limited liability company shall deliver
    to the secretary of state for filing, on a form prescribed by the secretary of
    state, a certificate of amendment containing both of the following information:

    (1) The name and registration number of the limited liability company;

    (2) The changes the amendment makes to the articles of organization as most recently
    amended or restated.

    (D) Restated articles of organization shall be delivered to the secretary of state
    for filing in the same manner as an amendment. Restated articles of organization
    shall be designated as such in the heading and state in the heading or in an introductory
    paragraph the limited liability company''s name and the date of the filing of
    its articles of organization. Any amendment or change effected in connection with
    the restatement of the articles of organization shall be subject to any other
    provision of this chapter, not inconsistent with this section, which would apply
    if a separate certificate of amendment were filed to effect the amendment or change.

    (E) The original articles of organization, as amended or supplemented, shall be
    superseded by the restated articles of organization. Thereafter, the articles
    of organization, including any further amendment or changes made thereby, shall
    be the articles of organization of the limited liability company, but the original
    effective date of formation shall remain unchanged.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.161
- number: '1706.17'
  heading: Filed records of a limited liability company to be signed
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A record delivered to the secretary of state for filing pursuant to this
    chapter shall be signed as provided by this section.

    (1) A limited liability company''s initial articles of organization shall be signed
    by at least one person.

    (2) A record signed on behalf of a limited liability company shall be signed by
    a person authorized by the limited liability company.

    (3) A record filed on behalf of a dissolved limited liability company that has
    no members shall be signed by the person winding up the limited liability company''s
    activities under division (A) of section 1706.472 of the Revised Code or a person
    appointed under division (B) of section 1706.472 of the Revised Code to wind up
    those activities.

    (4) A statement of denial by a person under section 1706.20 of the Revised Code
    shall be signed by that person.

    (5) Any other record shall be signed by the person on whose behalf the record
    is delivered to the secretary of state.

    (B) Any record to be filed under this chapter may be signed by an agent, including
    an attorney-in-fact. Powers of attorney relating to the signing of the record
    need not be delivered to the secretary of state.'
