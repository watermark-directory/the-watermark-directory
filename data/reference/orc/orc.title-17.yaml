    name: Educational Corporations
  text: 'No superintendent of a city hospital, city infirmary, county home, workhouse,
    hospital for persons with mental illnesses, or other charitable institution founded
    and supported in whole or in part at public expense, coroner, infirmary director,
    sheriff, or township trustee, shall fail to deliver a body of a deceased person
