- number: '1701.65'
  heading: Corporate mortgages
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: The directors may authorize any mortgage, pledge, or deed of trust of all
    or any of the property of the corporation of any description, or any interest
    therein, for the purpose of securing the payment or performance of any obligation
    or contract. Unless otherwise provided in the articles, no vote or consent of
    shareholders is necessary for such action.
