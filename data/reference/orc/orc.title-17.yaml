- number: '1702.53'
  heading: Certified copies as evidence
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) A copy of the articles or amended articles filed in the office of the
    secretary of state, certified by the secretary of state, shall be conclusive evidence,
    except as against the state, that the corporation has been incorporated under
    the laws of this state; and a copy duly certified by the secretary of state of
    any certificate of amendment or other certificate filed in the secretary of state''s
    office shall be prima-facie evidence of such amendment or of the facts stated
    in any such certificate, and of the observance and performance of all antecedent
    conditions necessary to the action which such certificate purports to evidence.

    (B) A copy of amended articles filed in the office of the secretary of state,
    certified by the secretary of state, shall be accepted in this state and other
    jurisdictions in lieu of the original articles, amendments thereto, and prior
    amended articles.

    (C) The original or a copy of the record of minutes of the proceedings of the
    incorporators of a corporation, or of the proceedings or meetings of the members
    or any class of members, or of the directors, or of any committee thereof, including
    any written consent, waiver, release, or agreement entered in such record or minutes,
    or the original or a copy of a statement that no specified proceeding was had
    or that no specified consent, waiver, release, or agreement exists, shall, when
    certified to be true by the secretary or an assistant secretary of a corporation,
    be received in the courts as prima-facie evidence of the facts stated therein.
    Every meeting referred to in such certified original or copy shall be deemed duly
    called and held, and all motions and resolutions adopted and proceedings had at
    such meeting shall be deemed duly adopted and had, and all elections of directors
    and all elections or appointments of officers chosen at such meeting shall be
    deemed valid, until the contrary is proved; and whenever a person who is not a
    member of a corporation has acted in good faith in reliance upon any such certified
    original or copy, it is conclusive in the person''s favor.

    (D)(1) A certificate issued by the secretary of state confirming that a corporation
    is in good standing is, for seven days after the date on the certificate, conclusive
    evidence of both of the following:

    (a) That the authority of a domestic corporation has not been limited as described
    in section 1702.49 or 1702.52 of the Revised Code, provided that both of the following
    apply:

    (i) The person relying on the certificate had no knowledge that the corporation''s
    articles had been canceled.

    (ii) The certificate is not presented as evidence against the state.

    (b) That the license authorizing a foreign corporation to transact business in
    this state has not expired, been canceled, or been surrendered.

    (2) For purposes of division (D) of this section, "good standing" means that the
    authority of the corporation to carry on business is not limited by section 1702.49
    of the Revised Code.'
