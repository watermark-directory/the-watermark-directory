- number: '1751.141'
  heading: Dependent children living outside health insuring corporation's approved
    service area
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: A health insuring corporation shall provide coverage, in accordance with the
    terms of the contract, for a subscriber's dependent children living outside the
    health insuring corporation's approved service area if a court order requires
    the subscriber to provide health care coverage to the dependent children.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.141
- number: '1751.18'
  heading: Cancelling or failing to renew coverage
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A)(1) No health insuring corporation shall cancel or fail to renew the coverage
    of a subscriber or enrollee because of any health status-related factor in relation
    to the subscriber or enrollee, the subscriber''s or enrollee''s requirements for
    health care services, or for any other reason designated under rules adopted by
    the superintendent of insurance.

    (2) Unless otherwise required by state or federal law, no health insuring corporation,
    or health care facility or provider through which the health insuring corporation
    has made arrangements to provide health care services, shall discriminate against
    any individual with regard to enrollment, disenrollment, or the quality of health
    care services rendered, on the basis of the individual''s race, color, sex, age,
    religion, military status as defined in section 4112.01 of the Revised Code, or
    status as a recipient of medicare or medicaid, or any health status-related factor
    in relation to the individual. However, a health insuring corporation shall not
    be required to accept a recipient of medicare or medical assistance, if an agreement
    has not been reached on appropriate payment mechanisms between the health insuring
    corporation and the governmental agency administering these programs. Further,
    except as provided in section 1751.65 of the Revised Code, a health insuring corporation
    may reject an applicant for nongroup enrollment on the basis of any health status-related
    factor in relation to the applicant.

    (B) A health insuring corporation may cancel or decide not to renew the coverage
    of an enrollee if the enrollee has performed an act or practice that constitutes
    fraud or intentional misrepresentation of material fact under the terms of the
    coverage and if the cancellation or nonrenewal is not based, either directly or
    indirectly, on any health status-related factor in relation to the enrollee.

    (C) An enrollee may appeal any action or decision of a health insuring corporation
    taken pursuant to section 2742(b) to (e) of the "Health Insurance Portability
    and Accountability Act of 1996," Pub. L. No. 104-191, 110 Stat. 1955, 42 U.S.C.A.
    300gg-42, as amended. To appeal, the enrollee may submit a written complaint to
    the health insuring corporation pursuant to section 1751.19 of the Revised Code.
    The enrollee may, within thirty days after receiving a written response from the
    health insuring corporation, appeal the health insuring corporation''s action
    or decision to the superintendent.

    (D) As used in this section, "health status-related factor" means any of the following:

    (1) Health status;

    (2) Medical condition, including both physical and mental illnesses;

    (3) Claims experience;

    (4) Receipt of health care;

    (5) Medical history;

    (6) Genetic information;

    (7) Evidence of insurability, including conditions arising out of acts of domestic
    violence;

    (8) Disability.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.18
- number: '1751.19'
  heading: Complaint system
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) A health insuring corporation shall establish and maintain a complaint
    system that has been approved by the superintendent of insurance to provide adequate
    and reasonable procedures for the expeditious resolution of written complaints
    initiated by subscribers or enrollees concerning any matter relating to services
    provided, directly or indirectly, by the health insuring corporation, including,
    but not limited to, complaints regarding cancellations or nonrenewals of coverage.
    Complaints regarding a health insuring corporation''s decision to deny, reduce,
    or terminate coverage for health care services are subject to section 1751.83
    of the Revised Code.

    (B) A health insuring corporation shall provide a timely written response to each
    written complaint it receives.

    (C)(1) Copies of complaints and responses, including medical records related to
    those complaints, shall be available to the superintendent for inspection for
    three years. Any document or information provided to the superintendent pursuant
    to this division that contains a medical record is confidential, and is not a
    public record subject to section 149.43 of the Revised Code.

    (2) Notwithstanding division (C)(1) of this section, the superintendent may share
    documents and information that contain a medical record in connection with the
    investigation or prosecution of any illegal or criminal activity with the chief
    deputy rehabilitator, the chief deputy liquidator, other deputy rehabilitators
    and liquidators, and any other person employed by, or acting on behalf of, the
    superintendent pursuant to Chapter 3901. or 3903. of the Revised Code, with other
    local, state, federal, and international regulatory and law enforcement agencies,
    with local, state, and federal prosecutors, and with the national association
    of insurance commissioners and its affiliates and subsidiaries, provided that
    the recipient agrees to maintain the confidential or privileged status of the
    confidential or privileged document or information and has authority to do so.

    (3) Nothing in this section shall prohibit the superintendent from receiving documents
    and information in accordance with section 3901.045 of the Revised Code.

    (4) The superintendent may enter into agreements governing the sharing and use
    of documents and information consistent with the requirements of this section.

    (5) No waiver of any applicable privilege or claim of confidentiality in the documents
    and information described in division (C)(1) of this section occurs as a result
    of sharing or receiving documents and information as authorized in divisions (C)(2)
    and (3) of this section.

    (D) A health insuring corporation shall establish and maintain a procedure to
    accept complaints over the telephone or in person. These complaints are not subject
    to the reporting requirement under division (C) of section 1751.32 of the Revised
    Code.

    (E) A health insuring corporation may comply with this section and section 1751.83
    of the Revised Code by establishing one system for receiving and reviewing complaints
    and requests for internal review from enrollees and subscribers if the system
    meets the requirements of both sections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.19
- number: '1751.20'
  heading: Unfair, untrue, misleading, or deceptive acts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) No health insuring corporation, or agent, employee, or representative
    of a health insuring corporation, shall use any advertisement or solicitation
    document, or shall engage in any activity, that is unfair, untrue, misleading,
    or deceptive.

    (B) No health insuring corporation shall use a name that is deceptively similar
    to the name or description of any insurance or surety corporation doing business
    in this state.

    (C) All solicitation documents, advertisements, evidences of coverage, and enrollee
    identification cards used by a health insuring corporation shall contain the health
    insuring corporation''s name. The use of a trade name, an insurance group designation,
    the name of a parent company, the name of a division of an affiliated insurance
    company, a service mark, a slogan, a symbol, or other device, without the name
    of the health insuring corporation as stated in its articles of incorporation,
    shall not satisfy this requirement if the usage would have the capacity and tendency
    to mislead or deceive persons as to the true identity of the health insuring corporation.

    (D) No solicitation document or advertisement used by a health insuring corporation
    shall contain any words, symbols, or physical materials that are so similar in
    content, phraseology, shape, color, or other characteristic to those used by an
    agency of the federal government or this state, that prospective enrollees may
    be led to believe that the solicitation document or advertisement is connected
    with an agency of the federal government or this state.

    (E) A health insuring corporation that provides basic health care services may
    use the phrase "health maintenance organization" or the abbreviation "HMO" in
    its marketing name, advertising, solicitation documents, or marketing literature,
    or in reference to the phrase "doing business as" or the abbreviation "DBA."

    (F) This section does not apply to the coverage of beneficiaries enrolled in medicare
    pursuant to a medicare risk contract or medicare cost contract, or to the coverage
    of beneficiaries enrolled in the federal employee health benefits program pursuant
    to 5 U.S.C.A. 8905, or to the coverage of medicaid recipients or to the coverage
    of beneficiaries under any federal health care program regulated by a federal
    regulatory body, or to the coverage of beneficiaries under any contract covering
    officers or employees of the state that has been entered into by the department
    of administrative services.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.20
- number: '1751.21'
  heading: Peer review committee
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) A peer review committee of a hospital or other health care facility or
    provider, or of an intermediary organization or health delivery network, with
    which a health insuring corporation has a contract for health care services may
    provide to a peer review committee of the health insuring corporation any information,
    documents, testimony, or other records relating to any matter that is the subject
    of evaluation or review by the peer review committees, if consent is provided
    by the health care facility and any physician or other provider whose professional
    qualifications or activities are the subject of evaluation or review.

    (B) Any immunity from liability for damages that is provided under section 2305.251
    of the Revised Code and that would otherwise apply with respect to the conduct
    of any peer review committee described in division (A) of this section shall continue
    to apply, notwithstanding the provision of information as permitted under division
    (A) of this section.

    (C) The information, documents, testimony, or other records described in division
    (A) of this section, if otherwise protected under section 2305.252 of the Revised
    Code, shall not be construed as being available for discovery or for use in any
    civil action solely on the basis that they were provided by the peer review committee
    as permitted under division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.21
- number: '1751.25'
  heading: Investment of funds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Except as provided in division (B) of this section, the funds of a health
    insuring corporation shall be invested only in securities or other investments
    or assets that constitute permissible investments under section 1751.26 or 3925.08
    of the Revised Code.

    (B) A health insuring corporation may seek permission from the superintendent
    of insurance to invest funds under Chapter 3906. of the Revised Code and may invest
    funds under that chapter if such permission is granted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.25
- number: '1751.26'
  heading: Investments in real estate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) For purposes of this section, real estate used for "the accommodation
    of the health insuring corporation''s business operations" includes the health
    insuring corporation''s home office, branch office, medical facilities, and field
    office operations.

    (B) No health insuring corporation shall purchase, hold, or convey real estate,
    or any interest in real estate, to be used as an investment for the production
    of income, to be developed for the production of income, or to be otherwise used
    for purposes other than the accommodation of the health insuring corporation''s
    business operations, without the prior approval of the superintendent of insurance.

    (C)(1) No health insuring corporation shall invest, without the prior approval
    of the superintendent, an amount that exceeds forty per cent of its admitted assets
    as of the immediately preceding thirty-first day of December in real estate used
    for the accommodation of the health insuring corporation''s business operations
    from which the health insuring corporation provides health care services.

    (2) No health insuring corporation shall invest, without the prior approval of
    the superintendent, an amount that exceeds twenty-five per cent of its admitted
    assets as of the immediately preceding thirty-first day of December in real estate
    used for the accommodation of the health insuring corporation''s business operations
    from which the health insuring corporation does not provide health care services.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.26
- number: '1751.27'
  heading: Deposit of securities with superintendent or custodian
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Each health insuring corporation holding a certificate of authority to
    operate in this state shall have deposited securities with the superintendent
    of insurance or an approved custodian in the amount required by this division.

    (1) Each health insuring corporation authorized to provide basic health care services
    shall maintain a deposit of not less than two hundred fifty thousand dollars.

    (2) Each health insuring corporation authorized to provide only supplemental health
    care services shall maintain a deposit of not less than one hundred fifty thousand
    dollars.

    (3) Each health insuring corporation authorized to provide only specialty health
    care services shall maintain a deposit of not less than seventy-five thousand
    dollars.

    (4) Each health insuring corporation authorized to provide both basic health care
    services and supplemental health care services shall maintain a deposit of not
    less than four hundred thousand dollars.

    (5) Each health insuring corporation authorized to provide both basic health care
    services and specialty health care services shall maintain a deposit of not less
    than three hundred twenty-five thousand dollars.

    (B) The securities deposited under division (A) of this section shall be held
    as security for the fulfillment of the obligations of the health insuring corporation
    to its enrollees under this chapter.

    (C) The interest from the deposit made under division (A) of this section shall
    accrue to the health insuring corporation that made the deposit. The deposit shall
    be considered to be an admitted asset of the health insuring corporation.

    (D) The superintendent shall adopt rules setting forth the qualifications and
    responsibilities of an approved custodian.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.27
- number: '1751.271'
  heading: Medicaid providers - performance bond
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Each health insuring corporation that provides coverage to medicaid recipients
    shall post a performance bond in the amount of three million dollars as security
    to fulfill the obligations of the health insuring corporation to pay claims of
    contracted providers for covered health care services provided to medicaid recipients.
    The bond shall be payable to the department of insurance in the event that the
    health insuring corporation is placed in rehabilitation or liquidation proceedings
    under Chapter 3903. of the Revised Code, and shall become a special deposit subject
    to section 3903.14 or 3903.421 of the Revised Code, as applicable. In lieu of
    the performance bond, a medicaid health insuring corporation may deposit securities
    with the superintendent of insurance, acceptable to the superintendent, in the
    amount of three million dollars, to satisfy the bonding requirements of this section.
    Upon rehabilitation or liquidation, the securities shall become a special deposit
    subject to sections 3903.14 and 3903.421 of the Revised Code, as applicable. The
    health insuring corporation shall receive the interest on the deposited securities
    as long as the health insuring corporation remains solvent.

    (B) The bond shall be issued by a surety company licensed with the department
    of insurance. The bond or deposit, or any replacement bond or deposit, shall be
    in a form acceptable to the superintendent, and shall remain in effect during
    the duration of the medicaid health insuring corporation''s license and thereafter
    until all claims against the medicaid health insuring corporation have been paid
    in full.

    (C) Documentation of the bond acceptable to the superintendent of insurance shall
    be filed with the superintendent prior to the issuance of a certificate of authority.
    Annually, thirty days prior to the renewal of its certificate of authority, every
    medicaid health insuring corporation shall furnish the superintendent of insurance
    with evidence that the required bond is still in effect.

    (D) As used in this section:

    (1) "Contracted provider" means a provider that has a contract with a medicaid
    health insuring corporation to provide covered health care services to medicaid
    recipients.

    (2) "Medicaid health insuring corporation" means a health insuring corporation
    that provides health insurance coverage or otherwise assumes claims liabilities
    for medicaid recipients.

    (3) "Medicaid recipient" means a person enrolled in the medicaid program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.271
- number: '1751.28'
  heading: Admitted assets held in corporation's name and free and clear of encumbrances,
    pledges, or hypothecation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A)(1) Every health insuring corporation authorized to provide basic health
    care services, which health insuring corporation is not a provider sponsored organization,
    shall maintain total admitted assets equal to at least one hundred ten per cent
    of the liabilities of the corporation. However, at no time shall the corporation''s
    net worth be less than one million two hundred thousand dollars.

    (2) Every health insuring corporation authorized to provide only supplemental
    health care services shall maintain total admitted assets equal to at least one
    hundred ten per cent of the liabilities of the corporation. However, at no time
    shall the corporation''s net worth be less than five hundred thousand dollars.

    (3) Every health insuring corporation authorized to provide only specialty health
    care services shall maintain total admitted assets equal to at least one hundred
    ten per cent of the liabilities of the corporation. However, at no time shall
    the corporation''s net worth be less than two hundred fifty thousand dollars.

    (4) Every health insuring corporation authorized to provide both basic health
    care services and supplemental health care services, which health insuring corporation
    is not a provider sponsored organization, shall maintain total admitted assets
    equal to at least one hundred ten per cent of the liabilities of the corporation.
    However, at no time shall the corporation''s net worth be less than one million
    seven hundred thousand dollars.

    (5) Every health insuring corporation authorized to provide both basic health
    care services and specialty health care services, which health insuring corporation
    is not a provider sponsored organization, shall maintain total admitted assets
    equal to at least one hundred ten per cent of the liabilities of the corporation.
    However, at no time shall the corporation''s net worth be less than one million
    four hundred fifty thousand dollars.

    (6) Every health insuring corporation authorized to provide basic health care
    services, which health insuring corporation is a provider sponsored organization,
    shall maintain total admitted assets equal to at least one hundred ten per cent
    of the liabilities of the corporation. However, at no time shall the corporation''s
    net worth be less than one million dollars.

    (7) Every health insuring corporation authorized to provide both basic health
    care services and supplemental health care services, which health insuring corporation
    is a provider sponsored organization, shall maintain total admitted assets equal
    to at least one hundred ten per cent of the liabilities of the corporation. However,
    at no time shall the corporation''s net worth be less than one million five hundred
    thousand dollars.

    (8) Every health insuring corporation authorized to provide both basic health
    care services and specialty health care services, which health insuring corporation
    is a provider sponsored organization, shall maintain total admitted assets equal
    to at least one hundred ten per cent of the liabilities of the corporation. However,
    at no time shall the corporation''s net worth be less than one million two hundred
    fifty thousand dollars.

    (B) The net worth otherwise required by this section shall be reduced by an amount
    representing credit given to reserve liabilities when a health insuring corporation
    carries reinsurance with an admitted reinsurer. However, such an amount shall
    not affect the minimum amounts set forth in this section and section 1751.27 of
    the Revised Code.

    (C) A health insuring corporation may only consider those admitted assets in connection
    with this section that are consistent with the forms, instructions, and manuals
    for the preparation and reporting of statutory financial statements and other
    financial information set forth in section 1751.47 of the Revised Code and any
    rules adopted under that section.

    (D) All health insuring corporations must comply with this section, as amended,
    for calendar year 2004 and each calendar year thereafter.'
