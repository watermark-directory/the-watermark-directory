  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.07
- number: '1782.08'
  heading: Certificate of limited partnership required - filing, contents
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) To form a limited partnership, a certificate of limited partnership shall
    be executed and filed with the secretary of state, as provided in section 1782.13
    of the Revised Code. The certificate shall be on a form prescribed by the secretary
    of state and shall set forth all of the following:

    (1) The name of the limited partnership;

    (2) The address of the principal place of business of the limited partnership;

    (3) The name and business or residence address of each general partner;

    (4) Any other matters that the general partners determine to include in the certificate.

    (B) A written appointment of a statutory agent for the purpose set forth in section
    1782.04 of the Revised Code shall be filed with the certificate of limited partnership.

    (C) A limited partnership is an entity formed at the time of filing the certificate
    of limited partnership pursuant to section 1782.13 of the Revised Code or at any
    later time specified in the certificate if, in either case, there has been substantial
    compliance with the requirements of divisions (A) and (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.08
- number: '1782.09'
  heading: Certificate of amendment - restatement of certificate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A certificate of limited partnership shall be amended by filing a certificate
    of amendment with the secretary of state. The certificate of amendment shall be
    on a form prescribed by the secretary of state and shall state all of the following:

    (1) The name of the limited partnership and the file number assigned to it by
    the secretary of state;

    (2) The date of the first filing of the certificate of limited partnership and,
    if different, the date of the first filing by the partnership with the secretary
    of state pursuant to section 1782.63 of the Revised Code;

    (3) The amendment to the certificate of limited partnership.

    (B) Within thirty days after the occurrence of any of the following events, an
    amendment to a certificate of limited partnership reflecting the occurrence of
    the event shall be filed pursuant to division (A) of this section:

    (1) A new general partner is admitted;

    (2) A general partner withdraws;

    (3) The business is continued pursuant to section 1782.44 of the Revised Code
    after an event of withdrawal of a general partner;

    (4) The address of the principal place of business of the limited partnership
    changes;

    (5) The name of the limited partnership changes.

    (C) A general partner who becomes aware that any statement in the certificate
    of limited partnership was materially false when made or that any arrangements
    or other facts described have changed, thereby making the certificate materially
    inaccurate, promptly shall amend the certificate.

    (D) A certificate of limited partnership may be amended at any time for any other
    proper purpose the general partners determine.

    (E) A person is not liable because an amendment to a certificate of limited partnership
    has not been filed to reflect the occurrence of an event referred to in division
    (B) of this section if the amendment is filed within the thirty-day period specified
    in that division.

    (F) A certificate of limited partnership may be restated at any time by filing
    a restatement of the certificate of limited partnership with the secretary of
    state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.09
- number: '1782.10'
  heading: Certificate of cancellation - amendment
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A certificate of limited partnership shall be canceled upon the dissolution
    and the commencement of the winding up of the partnership or at any other time
    there are no limited partners.

    (B) A certificate of cancellation shall be filed with the secretary of state on
    a form prescribed by the secretary of state. It shall set forth all of the following:

    (1) The name of the limited partnership and the file number assigned to it by
    the secretary of state;

    (2) The date of the first filing of its certificate of limited partnership and,
    if different, the date of the first filing by the partnership with the secretary
    of state pursuant to section 1782.63 of the Revised Code;

    (3) The reason for filing the certificate of cancellation;

    (4) The effective date of cancellation, which shall be a date certain that is
    not earlier than the date of filing, if it is not to be effective upon the filing
    of the certificate;

    (5) If a person other than any shown on a certificate of limited partnership as
    a general partner is winding up the limited partnership''s affairs, the name and
    the business, residence, or mailing address of each liquidating trustee;

    (6) Any other information the persons filing the certificate wish to include,
    provided that the portion of the certificate containing the other information
    shall not exceed three additional pages.

    (C) If a person other than any shown on a certificate of limited partnership as
    a general partner is winding up the affairs of the limited partnership, each liquidating
    trustee shall execute and file a certificate of cancellation under this section.

    (D) Within thirty days after the occurrence of any of the following events, an
    amendment to a certificate of cancellation reflecting the occurrence of the event
    shall be filed with the secretary of state on a form prescribed by the secretary
    of state:

    (1) A new liquidating trustee is named;

    (2) A liquidating trustee ceases to serve as such;

    (3) The address of a liquidating trustee changes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.10
- number: '1782.11'
  heading: Execution of certificate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A certificate required by this chapter to be filed with the secretary
    of state shall be executed in the following manner:

    (1) An original certificate of limited partnership shall be signed by all general
    partners;

    (2) A certificate of amendment shall be signed by at least one general partner
    and by each other general partner designated in the certificate as a new general
    partner;

    (3) A certificate of cancellation shall be signed by all general partners or,
    if the general partners are not winding up the affairs of the limited partnership,
    by all liquidating trustees, provided that if the limited partners are winding
    up the affairs of the limited partnership, a certificate of cancellation need
    be signed only by a majority in number of the limited partners.

    (4) An amendment to a certificate of cancellation under division (D) of section
    1782.10 of the Revised Code shall be signed by all liquidating trustees who will
    serve after the filing of the amendment and by all liquidating trustees who are
    named in the amendment as ceasing to serve as liquidating trustees.

    (5) A certificate of disclaimer of general partner status under section 1782.20
    of the Revised Code shall be signed by the limited partner who claims to have
    been inaccurately referred to as a general partner.

    (6) A certificate of cancellation of disclaimer of general partner status under
    section 1782.20 of the Revised Code shall be signed by the person identified,
    pursuant to division (B)(3)(c) of that section, on the certificate of disclaimer
    of general partner status that is to be canceled.

    (B) Any person may sign a certificate by an attorney-in-fact. A power of attorney
    to sign a certificate relating to the admission of a general partner shall specifically
    describe the admission.'
  history: null
