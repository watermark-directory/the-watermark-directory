- number: '1704.07'
  heading: Other applicable laws
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1704'
    name: Transactions Involving Interested Shareholders
  text: '(A) The requirements of this chapter are in addition to the requirements
    of other applicable law, including the provisions of Chapters 1701. and 1707.
    of the Revised Code.

    (B) Except to the extent specifically provided to the contrary by this chapter,
    nothing in this chapter shall limit or affect the application of any provision
    of Chapter 1701. or 1707. of the Revised Code that is not inconsistent with, in
    conflict with, or contrary to the provisions of this chapter.

    (C) Except as otherwise provided in this chapter, nothing in this chapter shall
    be construed to affect or impair any right, remedy, obligation, duty, power, or
    authority of any interested shareholder, any issuing public corporation, the directors
    of any interested shareholder or any issuing public corporation, or any other
    person under the laws of this or any other state or of the United States.

    (D) If any application of any provision of this chapter is for any reason held
    to be illegal or invalid, the illegality or invalidity shall not affect any legal
    and valid provision or application of this chapter, and the parts and applications
    of this chapter shall be severable.'
