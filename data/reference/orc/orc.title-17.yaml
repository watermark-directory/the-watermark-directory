    class of a domestic converting corporation to vote as a class on the adoption
    of an amendment as provided in division (B) of section 1701.71 of the Revised
    Code, the declaration of conversion also must be adopted by the affirmative vote
    of the holders of at least two-thirds of the shares of such class, or a different
    proportion as the articles provide, but not less than a majority. However, if
    the declaration of conversion would have an effect that, if accomplished through
    an amendment to the articles, would entitle the holders of shares of any particular
    class of a domestic converting corporation to vote as a class on the adoption
    of an amendment pursuant to division (B)(2) or (4) of section 1701.71 of the Revised
    Code solely because those shares are to be converted into or substituted for the
    same number of shares of a class of a different corporation having express terms
    identical in all material respects to those of the class of shares so converted
    or substituted, the declaration of conversion does not need to be adopted by the
    affirmative vote of the holders of shares of that particular class voting as a
    class.

    If the declaration of conversion would authorize any particular corporate action
    that under any applicable provision of law or the articles could be authorized
    only by or pursuant to a specified vote of shareholders, the declaration of conversion
    also must be adopted by the same affirmative vote as required for such action.

    (G)(1) At any time before the filing of the certificate of conversion pursuant
    to section 1701.811 of the Revised Code, the conversion may be abandoned by the
    directors of the converting corporation, if the directors are authorized to do
    so by the declaration of conversion, or by the same vote of the shareholders as
    was required to adopt the declaration of conversion.

    (2) The declaration of conversion may contain a provision authorizing the directors
    of the converting corporation to amend the declaration of conversion at any time
    before the filing of the certificate of conversion pursuant to section 1701.811
    of the Revised Code, except that, after the adoption of the declaration of conversion
    by the stockholders of the converting corporation, the directors may not amend
    the declaration of conversion to do any of the following:

    (a) Alter or change the amount or kind of interests, shares, evidences of indebtedness,
    other securities, cash, rights, or any other property to be received by the shareholders
    of the converting corporation in conversion of, or substitution for, their shares;

    (b) Alter or change any term of the organizational documents of the converted
    entity except for alterations or changes that are adopted with the vote or action
    of the persons, the vote or action of which would be required for the alteration
    or change after the conversion;

    (c) Alter or change any other terms and conditions of the declaration of conversion
    if any of the alterations or changes, alone or in the aggregate, materially and
    adversely would affect the holders of any class or series of shares of the converting
    corporation.'
