- number: '1716.09'
  heading: Charitable sales promotions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: '(A) Prior to the commencement of any charitable sales promotion in this state
    conducted by a commercial co-venturer on behalf of a charitable organization,
    the commercial co-venturer shall obtain the written consent of the charitable
    organization whose name will be used during the charitable sales promotion.

    (B) In conducting a charitable sales promotion, if the actual dollar amount or
    percentage per unit of goods or services purchased or used that will benefit the
    charitable organization or charitable purpose has been determined, the commercial
    co-venturer shall disclose that amount or percentage in each advertisement for
    the charitable sales promotion. If the actual dollar amount or percentage per
    unit of goods or services purchased or used that will benefit the charitable organization
    or charitable purpose cannot reasonably be determined prior to the beginning of
    the charitable sales promotion, the commercial co-venturer shall disclose an estimated
    amount or percentage in each advertisement for the charitable sales promotion.
    The estimate shall be reasonable and shall be based on all the relevant facts
    known to the commercial co-venturer and the charitable organization.

    (C) A commercial co-venturer shall keep a final accounting for each charitable
    sales promotion that it conducts for a period of three years following the completion
    of the charitable sales promotion. A commercial co-venturer shall provide a final
    accounting for each charitable sales promotion that it conducts to the charitable
    organization on whose behalf the charitable sales promotion was conducted not
    later than ten days after the charitable organization requests it. A commercial
    co-venturer shall provide to the attorney general a copy of the final accounting
    for each charitable sales promotion that it conducts not later than ten days after
    the attorney general requests it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.09
- number: '1716.10'
  heading: Required disclosures at the point of solicitation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: 'Every charitable organization, whether or not required to register pursuant
    to this chapter, that directly solicits contributions in this state shall make
    the following disclosures at the point of solicitation:

    (A) The name of the charitable organization and the city of the principal place
    of business of the charitable organization;

    (B) If the charitable organization has not received a determination letter from
    the internal revenue service that is currently in effect, stating that the organization
    is exempt from federal income taxation under section 501(a) and described in section
    501(c)(3) of the Internal Revenue Code, the particular charitable purpose or purposes
    to be advanced with the funds raised.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1716.10
- number: '1716.11'
  heading: Maintaining records of solicitation activities
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1716'
    name: Charitable Organizations
  text: Every charitable organization, fundraising counsel, professional solicitor,
    and commercial co-venturer, whether or not required to register pursuant to this
    chapter, shall keep true records of solicitation activities that are covered by
    this chapter or any rule adopted under this chapter. The records shall be made
    available to the attorney general for inspection and shall be furnished to him
    not later than ten days after his request. The records shall be retained for a
    period of at least three years.
