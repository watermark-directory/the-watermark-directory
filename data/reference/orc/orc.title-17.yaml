- number: '1782.12'
  heading: Petition for execution of certificate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'If a person who is required by section 1782.11 of the Revised Code to execute
    any certificate fails or refuses to do so, any other person who is adversely affected
    by the failure or refusal may petition the court of common pleas to direct the
    execution of the certificate.

    If the court finds that it is proper for the certificate to be executed and that
    any person so designated failed or refused to execute the certificate, it shall
    order the secretary of state to record an appropriate certificate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.12
- number: '1782.13'
  heading: Filing of documents with secretary of state
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A)(1) Subject to section 1782.63 of the Revised Code, one signed copy of
    the certificate of limited partnership, any certificate of amendment, cancellation,
    amendment of certificate of cancellation, disclaimer of general partner status,
    or cancellation of disclaimer of general partner status, or any judicial decree
    of amendment or cancellation shall be filed with the secretary of state.

    (2) A person who executes a certificate as described in division (A)(1) of this
    section as an agent or fiduciary is not required to exhibit evidence of the person''s
    authority as a prerequisite to filing that certificate.

    (3) Upon receipt of all filing fees required by law, the secretary of state shall
    accept a certificate or other document executed as described in division (A)(1)
    of this section for filing and shall make a copy of the certificate or other document
    by microfilm or by any other authorized photostatic or digitized process. Evidence
    of the filing shall be returned to the person filing the certificate or document.

    (B) Upon the filing of a certificate of amendment or judicial decree of amendment
    with the secretary of state, the certificate of limited partnership shall be amended
    as set forth in the certificate or decree of amendment. Upon the effective date
    of a certificate of cancellation or a judicial decree of cancellation, the certificate
    of limited partnership shall be canceled.

    (C) The duties imposed upon the secretary of state by this chapter are ministerial.
    The secretary of state shall not make any determination regarding the legal sufficiency
    of any certificate or other document presented for filing that appears on its
    face to be legally sufficient.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.13
- number: '1782.14'
  heading: Liability for false statement in certificate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'If any certificate of limited partnership, amendment, or cancellation contains
    a false statement of a material fact, one who suffers loss by reasonable reliance
    on the statement may recover damages for the loss from all of the following:

    (A) Any person who executes the certificate, or causes another to execute it on
    his behalf, and knew, and any general partner who knew or should have known, that
    the statement was materially false at the time the certificate was executed;

    (B) Any general partner who knows or should have known that the statement had
    become materially false and who did not cancel or amend the certificate, or file
    a petition for its cancellation or amendment, within a sufficient time before
    the certificate was reasonably relied upon by another.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.14
- number: '1782.15'
  heading: Filing is notice of certain fact
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: The fact that a certificate of limited partnership is on file in the office
    of a county recorder or with the secretary of state is notice that the partnership
    is a limited partnership and that the persons designated in the certificate as
    general partners are general partners. It is not notice of any other fact. Any
    certificate filed with the secretary of state on or after July 1, 1994, shall
    supersede all certificates filed in the office of a county recorder pursuant to
    this chapter or pursuant to the law governing limited partnerships that was in
    effect prior to April 4, 1985, with respect to such partnership.
