- number: '1709.02'
  heading: Obtaining registration in beneficiary form
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: Only individuals whose registration of a security shows sole ownership by
    one individual or multiple ownership by two or more individuals with a right of
    survivorship, rather than ownership as tenants in common, may obtain registration
    in beneficiary form. Multiple owners of a security registered in beneficiary form
    hold as joint tenants with a right of survivorship and not as tenants in common.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.02
- number: '1709.03'
  heading: Reciprocity
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1709'
    name: Uniform Transfer-on-death Security Registration Act
  text: A security may be registered in beneficiary form if the form is authorized
    by sections 1709.01 to 1709.11 of the Revised Code or similar laws of the state
    of organization of its issuer or registering entity, the state in which the principal
    office of the registering entity is located, the state in which the office of
    the transfer agent or the office making the registration is located, or the state
    listed as the address of the owner at the time of registration. A registration
    governed by the laws of a jurisdiction in which a law similar to sections 1709.01
    to 1709.11 of the Revised Code is not in force or was not in force when a registration
    in beneficiary form was made is nevertheless presumed to be valid and authorized
    as a matter of contract law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1709.03
- number: '1709.04'
  heading: When security is registered in beneficiary form
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
