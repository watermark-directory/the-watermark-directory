- number: '1761.08'
  heading: Assessing financial condition and performance of credit union
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A)(1) In order to permit the credit union share guaranty corporation to
    assess the financial condition and performance of a credit union, upon the written
    request of the corporation, the superintendent of credit unions or other credit
    union supervisory authority or the national credit union administration may furnish
    to the corporation a copy of unaudited financial statements filed by a participating
    credit union or a credit union making application to participate in the corporation
    pursuant to divisions (B) and (C) of section 1733.32 of the Revised Code or a
    comparable state or federal statute or of any examination reports of the superintendent
    or other credit union supervisory authority which were prepared pursuant to division
    (A) of section 1733.32 of the Revised Code or a comparable state or federal statute.

    (2) There shall be no liability on the part of, and no cause of action of any
    nature shall arise against this state or any state, the superintendent of credit
    unions or other credit union supervisory authority, or the national credit union
    administration for the release of any information furnished to the corporation
    pursuant to this division.

    (3) Financial statements and analyses furnished to the corporation pursuant to
    division (A) of this section are not public documents, and the information contained
    therein is privileged and confidential to the corporation for its sole use in
    carrying out its statutory functions.

    (B)(1) Each participating credit union shall submit to the credit union share
    guaranty corporation quarterly, or more frequently as considered necessary by
    the corporation, a copy of its financial statements, delinquent loan report, and
    any other information considered necessary by the credit union share guaranty
    corporation in order to assess the financial performance of the participating
    credit union. The corporation may require that participating credit unions submit
    financial information in the format required by the corporation.

    (2) Financial statements submitted to the corporation by participating credit
    unions pursuant to division (B)(1) of this section are public documents.

    (C) Each participating credit union shall submit to the credit union share guaranty
    corporation upon written request of the corporation any other information as is
    necessary to effect the corporation''s purposes.

    (D)(1) In addition to other powers conferred in this chapter a credit union share
    guaranty corporation may do the following:

    (a) Appoint an independent certified public accountant or public accountant to
    prepare an audit report containing audited financial statements together with
    such other information as the corporation, in good faith, requires regarding the
    financial condition of any participating credit union;

    (b) Upon notification to its participating credit union and after notice to the
    superintendent of credit unions, or other credit union supervisory authority,
    or the national credit union administration, send a specialized employee to investigate
    the operations of a participating credit union.

    (2) Costs and expenses for an audit report or special investigation report under
    division (D)(1)(a) of this section shall be paid by the corporation.

    (E)(1) Upon determination by the superintendent of credit unions or the credit
    union share guaranty corporation that a participating credit union is operating
    in an unsafe or unsound manner, or that financial statements, delinquent loan
    reports, and other data received or examined by the corporation is unreliable
    or the participating credit union investment in the corporation is in excess of
    five per cent of the corporation''s fund, the corporation shall require that an
    audit of the books and records of the participating credit union be conducted.
    The audit shall be completed in accordance with generally accepted auditing standards,
    and include such testing of the records necessary to render an opinion of an independent
    certified public accountant.

    (2) If the report, certificate, or opinion of the independent accountant, as described
    in division (E)(1) of this section, is in any way qualified, the corporation shall
    require the credit union to take such action as the corporation considers necessary
    to permit an independent accountant to remove such qualification from the report,
    certificate, or opinion. If such qualification is not remedied within the time
    period designated, the corporation shall report such qualification in writing
    to the superintendent within three days thereof.

    (3) In addition to other action described in this division, the corporation may
    do the following:

    (a) Recommend appropriate corrective measures to the operational policies and
    procedures of the participating credit unions;

    (b) Enter into a written agreement of corrective action with any participating
    credit union, which agreement may include the superintendent or appropriate credit
    union supervisory authority or the national credit union administration;

    (c) Make appropriate recommendations to the superintendent or appropriate credit
    union supervisory authority or the national credit union administration including
    the recommendation that the participating credit union be liquidated or consolidated;

    (d) Submit reports and make recommendations to the superintendent of credit unions,
    other credit union supervisory authority, or the national credit union administration
    regarding the financial condition of any participating credit union. Such reports
    and recommendations are not public documents.

    (4) There shall be no liability on the part of, and no cause of action of any
    nature shall arise against, the corporation or its participating credit unions,
    directors, officers, employees, or agents, or the superintendent or other credit
    union supervisory authority or the national credit union administration, for any
    statements made by them in any reports or recommendations made in accordance with
    division (E) of this section.

    (F) When an examination or investigation of any participating credit union is
    considered necessary for good cause shown by the superintendent of credit unions
    under this chapter, the corporation shall pay to the superintendent of credit
    unions the cost thereof, including the salary or other compensation paid to the
    persons making the examination or rendering special services and overhead cost
    incurred in connection with the examination or investigation as fixed by the superintendent.
    In determining the costs of services or examinations, the superintendent may use
    the estimated hourly cost for all persons performing services for, or examinations
    of, the corporation for the fiscal year. Travel expenses shall be paid by the
    division of financial institutions.

    (G) Neither the corporation nor any participating credit union, as an agent of
    the corporation or of its participating credit unions, or any other person shall
    use information obtained under division (A), (B), (C), (D), or (E) of this section
    for any purpose not authorized by this section. The conviction for violation of
    this division by any person located outside this state shall be reported to the
    appropriate credit union supervisory authority or the national credit union administration
    for prosecution under the laws of that jurisdiction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.08
- number: '1761.09'
  heading: Guarantees for share accounts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) Each credit union share account of an individual member or, as described
    in division (B)(2) of section 1761.02 of the Revised Code, a nonmember of a participating
    credit union shall be guaranteed in amounts established from time to time by the
    credit union share guaranty corporation. Such primary guaranteed amount shall
    not be less than the amount of the credit union share account but, in no event,
    shall exceed two hundred fifty thousand dollars or the primary guaranteed amount
    insured by the national credit union administration, whichever is greater.

    (B) In addition to the primary guaranteed amount, the corporation may establish
    an excess coverage guarantee for the benefit of those participating credit unions
    that voluntarily elect to obtain such additional guarantee.

    (C) The guarantees provided pursuant to this chapter do not apply to credit union
    share accounts until the credit union has applied for and been admitted as a participating
    credit union, and cease to apply to the share accounts of any credit union upon
    the later of any of the following:

    (1) The termination of the credit union''s participation in the corporation pursuant
    to section 1761.12 of the Revised Code;

    (2) The completion of the liquidation of the credit union;

    (3) The withdrawal of the credit union from participation in the corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.09
- number: '1761.10'
  heading: Guarantee fund
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A)(1) A credit union share guaranty corporation shall establish and maintain
    a guarantee fund. The fund shall be maintained at a normal operating level as
    defined by the board of directors of the corporation and approved by the superintendent
    of insurance, except that the normal operating level shall at all times be no
    less than one per cent of the aggregate share capital of participating credit
    unions, irrespective of how denominated. The fund of the corporation shall be
    comprised of the following:

    (a) The account for each participating credit union;

    (b) Retained and undivided earnings;

    (c) Any reserves required by statute or order of the superintendent of credit
    unions;

    (d) Borrowings made in accordance with section 3901.72 of the Revised Code.

    (2)(a) Each participating credit union shall contribute to and maintain with the
    corporation a capital contribution to be credited to its account, in an amount
    equal to at least one per cent of its aggregate share capital as is established
    as the normal operating level of the fund by the board of directors pursuant to
    division (A)(1) of this section and approved by the superintendent of insurance.
    Each participating credit union''s account shall be adjusted annually to reflect
    changes in the participating credit union''s aggregate share capital in accordance
    with procedures adopted by the board of directors and may be adjusted more frequently
    if an increase in the aggregate share capital or a change in the financial condition
    of the participating credit union warrants such adjustment. Those credit unions
    participating in excess coverage shall pay a premium as prescribed by the board
    of directors of the corporation and as filed and approved under Chapter 3937.
    of the Revised Code.

    (b) The approval of the superintendent of insurance concerning the normal operating
    level of the guarantee fund expires upon written determination by the superintendent
    of insurance that there is cause for additions to the guarantee fund. This determination
    is not subject to any hearing requirement under Chapter 119. of the Revised Code,
    provided a credit union guaranty corporation may request a supervisory conference
    under section 1761.19 of the Revised Code.

    (3) If, at the close of a fiscal year, the guarantee fund exceeds the normal operating
    level determined by the board of directors of a credit union share guaranty corporation,
    the board of directors may make a distribution of the excess to participating
    credit unions. Any distribution shall be made to each participating credit union
    in the proportion that each participating credit union''s account bears to the
    total aggregate participating credit union accounts of the corporation. No determination
    by the board of directors is effective until approved by the superintendent of
    insurance. No distribution shall be made, nor shall it confer any rights, until
    approved by the superintendent of insurance.

    (4) The amount of the account of each participating credit union shall be carried
    on the books of the individual participant as a deposit with the corporation.

    (5) Notwithstanding any other provision of this chapter, the corporation shall
    require the participating credit unions to make capital contributions to maintain
    the normal operating level set by division (A)(1) of this section during any calendar
    year in which the fund has been reduced below the minimum operating level as a
    result of payment of any deficiencies in credit union share accounts.

    (B)(1) The corporation may annually or more frequently levy and collect additions
    to the capital contribution as the board of directors of the corporation considers
    appropriate, if the superintendent of credit unions and the superintendent of
    insurance approve of such additions. Whenever the superintendent of credit unions
    or the superintendent of insurance considers it necessary for the maintenance
    of the normal operating level of the fund, the superintendent shall order the
    corporation to levy and collect additions to the capital contributions. Such order
    shall specify the amount of the addition and the reasons upon which the order
    is based.

    (2) The corporation shall send a written notice of capital contributions required
    pursuant to division (B)(1) of this section to each participating credit union
    within ten days after the levy of any capital contributions. Capital contributions
    shall be paid to the corporation by each participating credit union not later
    than thirty days following mailing of written notice of any required capital contribution.

    (C)(1) In the event of potential impairment of the fund, a special assessment
    of the fund may be levied by the corporation with the approval of the superintendent
    of credit unions or the superintendent of insurance. Impairment for this purpose
    is deemed to exist when the corporation''s liabilities and share capital exceed
    its assets. Whenever the superintendent of credit unions or the superintendent
    of insurance considers it necessary to avoid an impairment of the fund, the superintendent
    shall order the corporation to levy a special assessment. Such order shall specify
    the amount of the assessment and the reasons upon which the order is based.

    (2) The corporation shall send a written notice of the special assessment required
    pursuant to division (C)(1) of this section to each participating credit union
    within ten days after the levy thereof. Special assessments shall be paid to the
    corporation by each participating credit union not later than thirty days following
    mailing of written notice of any special assessment unless for good cause shown
    the time period is extended.

    (D)(1) The corporation may annually, or more frequently, levy on and collect special
    premium assessments from participating credit unions as the board of directors
    of the corporation considers necessary when the guarantee fund has experienced,
    or is expected to experience, a net loss for any one year, if the superintendent
    of credit unions and the superintendent of insurance approve of the special premium
    assessment.

    (2) The corporation shall send a written notice of the special premium assessment
    levied under division (D)(1) of this section to each participating credit union
    within thirty days after receipt of the approval of the superintendent of credit
    unions and the superintendent of insurance to charge the assessment. Special premium
    assessments shall be paid to the corporation by each participating credit union
    not later than thirty days after receipt of the notice of the assessment.

    (3)(a) With the written approval of the superintendent of insurance, the corporation
    may declare and pay a cash dividend to those participating credit unions that
    are participating credit unions as of the date of the declaration and that have
    paid special premium assessments to the corporation. The amount of the dividend
    allocable to a participating credit union shall be determined based on the proportion
    of the special premium assessments paid by the credit union as compared to the
    total of all special premium assessments collected by the corporation.

    (b) The superintendent shall approve or disapprove a corporation''s request for
    approval to pay a cash dividend as provided in division (D)(3)(a) of this section
    within thirty days after receiving the corporation''s request for approval.

    (E) A report of each capital contribution that may be required pursuant to division
    (B) of this section shall be made to the superintendent of credit unions and the
    superintendent of insurance within ninety days of the special assessment levy.
    A report of each special assessment or special premium assessment that is required
    pursuant to division (C) or (D) of this section shall be made to the superintendent
    of credit unions and the superintendent of insurance within ten days after mailing
    the written notice thereof to participating credit unions.

    (F)(1) In the event any participating credit union fails to pay an annual capital
    contribution when due, the corporation shall report such default in writing to
    the superintendent of credit unions and the superintendent of insurance and the
    appropriate credit union supervisory authority or the national credit union administration
    within twenty-four hours of such default, and shall revoke after thirty days''
    notice the participating credit union''s participation in the corporation, unless
    good cause is shown for the delay.

    (2) In the event any participating credit union fails to pay any additional capital
    contribution, premium, fee, or assessment when due, the corporation shall report
    such default in writing to the superintendent of credit unions and the superintendent
    of insurance and the appropriate credit union supervisory authority or the national
    credit union administration within twenty-four hours of such default, and shall
    revoke after thirty days'' notice the participating credit union''s participation
    in the corporation, unless good cause is shown for the delay.

    (3) The thirty-day notice of revocation required under divisions (F)(1) and (2)
    of this section does not apply to the revocation of excess coverage.

    (G) Any participating credit union that is voluntarily liquidated, any participating
    credit union that withdraws from participation in the corporation and obtains
    a different form of share guaranty or insurance pursuant to section 1733.041 of
    the Revised Code or similar state statute, or any participating credit union that
    merges with another credit union that becomes the surviving credit union whose
    shares are guaranteed or insured by a different form of guaranty or insurance
    may be refunded in an amount equal to the balance of its capital contribution
    account. Such reimbursement of a participating credit union''s capital contribution
    account balance shall be paid only if and when the guarantee fund exceeds its
    normal operating level as calculated without the account of the withdrawing credit
    union.

    (H) In the event of a merger of two or more participating credit unions where
    the surviving credit union is to be insured by the corporation, the funds in the
    capital contribution account of each credit union shall be transferred to the
    account of the surviving credit union.

    (I) If a credit union share guaranty corporation is dissolved, the net assets
    after settling any recorded, contingent, and contractual liabilities, and all
    costs of dissolution shall be distributed to the participating credit unions in
    accordance with their share balances, less any outstanding debts owed to the corporation.'
