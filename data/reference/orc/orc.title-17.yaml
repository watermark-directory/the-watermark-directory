- number: '1706.27'
  heading: Admission as a member of a limited liability company
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) In connection with the formation of a limited liability company, a person
    is admitted as a member of the limited liability company upon the occurrence of
    either of the following:

    (1) If the organizer was authorized by one or more persons intending to be members
    of the limited liability company to file the articles of organization on their
    behalf, the formation of the limited liability company;

    (2) If the organizer was not authorized by any other person intending to be members
    of the limited liability company, each organizer shall have the authority of a
    member of the limited liability company upon the formation of the limited liability
    company until the admission of the initial member of the limited liability company.

    (B) After formation of a limited liability company, a person may be admitted as
    a member of the limited liability company in any of the following manners:

    (1) As provided in the operating agreement;

    (2) As the result of a transaction effective under sections 1706.71 to 1706.74
    of the Revised Code;

    (3) With the consent of all the members or in the case of a limited liability
    company having only one member, the consent of the member;

    (4) If, within ninety consecutive days after the occurrence of the dissociation
    of the last remaining member, both of the following occur:

    (a) All holders of the membership interest last assigned by the last person to
    have been a member consent to the designation of a person to be admitted as a
    member;

    (b) The designated person consents to be admitted as a member effective as of
    the date the last person to have been a member ceased to be a member.

    (C) A person may be admitted as a member without acquiring a membership interest
    and without making or being obligated to make a contribution to the limited liability
    company. A person may be admitted as the sole member without acquiring a membership
    interest and without making or being obligated to make a contribution to the limited
    liability company.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.27
- number: '1706.28'
  heading: Contributions of members of a limited liability company
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: A contribution of a member to a limited liability company, or a series thereof,
    may consist of cash, property, services rendered, or a promissory note or other
    binding obligation to contribute cash or property or to perform services.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.28
- number: '1706.281'
  heading: Obligation to make a contribution
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A promise by a member to make a contribution to a limited liability company,
    or a series thereof, is not enforceable unless set forth in a writing signed by
    the member.

    (B) A member''s obligation to make a contribution to a limited liability company,
    or a series thereof, is not excused by the member''s death, disability, or other
    inability to perform personally. If a member does not make a contribution required
    by an enforceable promise, the member or the member''s estate is obligated, at
    the election of the limited liability company, or a series thereof, to contribute
    money equal to the value of the portion of the contribution that has not been
    made. The election shall be in addition to, and not in lieu of, any other rights,
    including the right to specific performance, that the limited liability company,
    or a series thereof, may have under the operating agreement or applicable law.

    (C)(1) The obligation of a member to make a contribution to a limited liability
    company may be compromised only by consent of all the members. A conditional obligation
    of a member to make a contribution to a limited liability company may not be enforced
    unless the conditions of the obligation have been satisfied or waived as to or
    by that member. Conditional obligations include contributions payable upon a discretionary
    call of a limited liability company before the time the call occurs.

    (2) The obligation of a member associated with a series to make a contribution
    to the series may be compromised only by consent of all the members associated
    with that series. A conditional obligation of a member to make a contribution
    to a series may not be enforced unless the conditions of the obligation have been
    satisfied or waived as to or by that member. Conditional obligations include contributions
    payable upon a discretionary call of that series before the time the call occurs.

    (3) Division (C)(1) of this section shall not apply to a member''s obligation
    to make a contribution to a series of a limited liability company.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.281
- number: '1706.29'
  heading: Distributions of limited liability company
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A)(1) All members shall share equally in any distributions made by a limited
    liability company before its dissolution and winding up.

    (2) A member has a right to a distribution before the dissolution and winding
    up of a limited liability company as provided in the operating agreement. A decision
    to make a distribution before the dissolution and winding up of the limited liability
    company is a decision in the ordinary course of activities of the limited liability
    company. A member''s dissociation does not entitle the dissociated member to a
    distribution.

    (3) A member does not have a right to demand and receive a distribution from a
    limited liability company in any form other than money. Except as otherwise provided
    in division (C) of section 1706.475 of the Revised Code, a limited liability company
    may distribute an asset in kind if each member receives a percentage of the asset
    in proportion to the member''s share of contributions.

    (4) If a member becomes entitled to receive a distribution, the member has the
    status of, and is entitled to all remedies available to, a creditor of the limited
    liability company with respect to the distribution.

    (B)(1) All members associated with a series shall share equally in any distributions
    made by the series before its dissolution and winding up.

    (2) A member associated with a series has a right to a distribution before the
    dissolution and winding up of the series as provided in the operating agreement.
    A decision of the series to make a distribution before the dissolution and winding
    up of the series is a decision in the ordinary course of activities of the series.
    A member''s dissociation from a series with which the member is associated does
    not entitle the dissociated member to a distribution from the series.

    (3) A member associated with a series does not have a right to demand and receive
    a distribution from the series in any form other than money. Except as otherwise
    provided in division (C) of section 1706.7613 of the Revised Code, a series may
    distribute an asset in kind if each member associated with the series receives
    a percentage of the asset in proportion to the member''s share of distributions
    from the series.

    (4) If a member associated with a series becomes entitled to receive a distribution
    from the series, the member has the status of, and is entitled to all remedies
    available to, a creditor of the series with respect to the distribution.

    (C) Division (A) of this section does not apply to a distribution made by a series.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.29
- number: '1706.30'
  heading: Direction and oversight of a limited liability company
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A)(1) The activities and affairs of the limited liability company shall
    be under the direction, and subject to the oversight, of its members.

    (2) The activities and affairs of a series shall be under the direction, and subject
    to the oversight, of the members associated with the series.

    (3) Division (A)(1) of this section shall not apply to the activities and affairs
    of a series.

    (B)(1) Except as provided in division (C) of this section, a matter in the ordinary
    course of activities of the limited liability company may be decided by a majority
    of the members.

    (2) Except as provided in division (C) of this section, a matter in the ordinary
    course of activities of a series may be decided by a majority of the members associated
    with the series.

    (3) Division (B)(1) of this section shall not apply to matters of a series.

    (C)(1) The consent of all members is required to do any of the following:

    (a) Amend the operating agreement;

    (b) File a petition of the limited liability company for relief under Title 11
    of the United States Code, or a successor statute of general application, or a
    comparable federal, state, or foreign law governing insolvency;

    (c) Undertake any act outside the ordinary course of the limited liability company''s
    activities;

    (d) Undertake, authorize, or approve any other act or matter for which this chapter
    requires the consent of all members.

    (2) The consent of all members associated with a series is required to do either
    of the following:

    (a) Undertake any act outside the ordinary course of the series'' activities;

    (b) Undertake, authorize, or approve any other act or matter for which this chapter
    requires the consent of all the members associated with a series.

    (D) Any matter requiring the consent of members may be decided without a meeting,
    and a member may appoint a proxy or other agent to consent or otherwise act for
    the member by signing an appointing record, personally or by the member''s agent.

    (E) This chapter does not entitle a member to remuneration for services performed
    for a limited liability company.'
