  url: https://codes.ohio.gov/ohio-revised-code/section-1701.88
- number: '1701.881'
  heading: Notice of rejection of claim; offer of security
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) A corporation that has given notice under division (A) of section 1701.87
    of the Revised Code may reject, in whole or in part, any matured claim made by
    a claimant by sending notice of the rejection by certified or registered mail,
    return receipt requested, to the claimant within ninety days after receipt of
    the claim and at least thirty days before the expiration of the five-year period
    specified in division (A) of section 1701.88 of the Revised Code. A notice sent
    pursuant to this section shall include or be accompanied by a copy of this division
    and of section 1701.89 of the Revised Code. A claim against a corporation is barred
    if a claimant whose claim is rejected by the corporation does not commence an
    action to enforce the claim within thirty days after the corporation mails the
    rejection notice.

    (B) A corporation that has given notice under division (A) of section 1701.87
    of the Revised Code may offer security to any claimant whose claim is contingent,
    conditional, or unmatured as the corporation determines is sufficient to provide
    compensation to the claimant if the claim matures. The corporation shall send
    the corporation''s offer to the claimant by certified or registered mail, return
    receipt requested, within ninety days after receipt of the claim and at least
    thirty days before the expiration of the five-year period specified in division
    (A) of section 1701.88 of the Revised Code. A notice sent pursuant to this section
    shall include or be accompanied by a copy of this division and of section 1701.89
    of the Revised Code. If the claimant offered the security does not deliver to
    the corporation a written notice rejecting the offer within thirty days after
    the corporation mails the offer for security, the claimant shall be deemed to
    have accepted the security as the sole source from which to satisfy claimant''s
    claim against the corporation.

    (C) A corporation that has given notice under division (A) of section 1701.87
    of the Revised Code may file an application with the court having jurisdiction
    under section 1701.89 of the Revised Code for a determination of the amount and
    form of insurance or other security that satisfies both of the following requirements:

    (1) The insurance or other security will be sufficient to provide compensation
    to any claimant who has rejected the offer for security made pursuant to this
    section.

    (2) The insurance or other security will be reasonably likely to be sufficient
    to provide compensation for claims that have not been made known to the corporation
    or that have not arisen but that, based on the facts known to the corporation,
    are likely to arise or to become known to the corporation within five years after
    the date of dissolution or such longer period of time as the directors or a court
    acting under section 1701.89 of the Revised Code may determine, not to exceed
    ten years after the date of dissolution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.881
- number: '1701.882'
  heading: Satisfaction of obligations; payments
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) A dissolved corporation shall do all of the following:

    (1) Pay the claims made and not rejected under division (A) of section 1701.881
    of the Revised Code;

    (2) Post the security offered and not rejected under division (B) of section 1701.881
    of the Revised Code;

    (3) Post security ordered by the court in any proceeding under division (C) of
    section 1701.881 of the Revised Code;

    (4) Make any payment required by a court acting under section 1701.89 of the Revised
    Code;

    (5) Pay or make provision by insurance or otherwise for all other claims that
    are mature, known, and uncontested or that have been finally determined to be
    owing by the corporation and any other claims described in division (C)(2) of
    section 1701.881 of the Revised Code.

    (B) A corporation shall pay in full any claims and liabilities or provide for
    those payments in full by insurance or otherwise if the corporation has sufficient
    assets. If the corporation does not have sufficient assets, a corporation shall
    pay claims and liabilities or provide for those payments by insurance or otherwise
    in order of their priority. Among claims of equal priority, the corporation shall
    apportion those payments to the extent of funds legally available for the payment
    of those claims. Any remaining assets shall be distributed to the shareholders
    of the corporation according to their respective rights and preferences.

    (C) In the absence of fraud, the judgment of the board of directors of the dissolved
    corporation as to the provision the corporation made for the payment of all claims
    under division (A)(5) of this section shall be conclusive.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.882
- number: '1701.883'
  heading: Liability of shareholder of dissolved corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) The dissolution of a corporation shall not affect the limited liability
    of a shareholder with respect to transactions occurring or acts or omissions done
    or omitted in the name of or by the corporation.

    (B) A shareholder who receives a distribution of assets from a dissolved corporation
    shall not be liable for any claim against the corporation in an amount in excess
    of the amount of shareholder''s pro rata share of the claim or the amount distributed
    to the shareholder, whichever is less. The aggregate liability of any shareholder
    for claims against a dissolved corporation shall not exceed the amount distributed
    to that stockholder after the dissolution.

    (C) A shareholder of a dissolved corporation, the assets of which were distributed
    pursuant to this chapter, may be liable for a claim against the corporation only
    if an action on that claim is commenced before expiration of the period specified
    in division (B)(2) of section 1701.88 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.883
- number: '1701.89'
  heading: Jurisdiction of court over winding up of affairs of voluntarily dissolved
    corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Without limiting the generality of its authority, the court of common
    pleas of the county in this state in which the principal office of a voluntarily
    dissolved corporation is located, in which the principal office was to be located,
    or in which the principal office of a corporation whose articles have been canceled
    or whose period of existence has expired is located, upon the complaint of the
    corporation, a majority of the directors, or a creditor or claimant, and upon
    such notice to all the directors and such other persons interested as the court
    considers proper, at any time may order and adjudge in respect of all of the following
    matters:

    (1) Any proceedings or actions under division (C) of section 1701.881 of the Revised
    Code;

    (2) The presentation and proof of all claims and demands against the corporation
    and of all rights, interests, or liens in or on any of its property including
    property described in division (F) of section 1701.88 of the Revised Code; the
    fixing of the time within which and the manner in which such proof shall be made
    and the person to whom such presentation shall be made; and the barring from participation
    in any distribution of assets of all persons failing to make and present proofs
    as required by the order of the court;

    (3) The stay of the prosecution of any proceeding against the corporation or involving
    any of its property, and the requirement that the parties to it present and prove
    their claims, demands, rights, interests, or liens at the time and in the manner
    required of creditors or others; or the grant of leave to bring or maintain an
    independent proceeding to enforce liens;

    (4) The settlement or determination of all claims of every nature against the
    corporation or any of its property; the determination of the assets required to
    be retained or insurance to be obtained to pay or provide for the payment of such
    claims or any claim; the determination of the assets available for distribution
    among shareholders; and the making of new parties to the proceeding so far as
    the court considers proper for the determination of all matters;

    (5) The determination of the rights of holders of shares of all classes in and
    to the assets of the corporation;

    (6) The presentation and filing of intermediate and final accounts of the directors
    or of the liquidators and hearings on them; the allowance, disallowance, or settlement
    of such accounts; and the discharge of the directors, the liquidators, or any
    of them from their duties and liabilities;

    (7) The appointment of a special master commissioner or guardian ad litem to hear
    and determine any such matters with such authority as the court considers proper.
    The applicant in the proceeding shall pay the reasonable fees and expenses of
    the special master commissioner or guardian ad litem, including all reasonable
    expert witness fees, unless otherwise ordered by the court.

    (8) The filling of any vacancies in the number of directors or liquidators when
    the directors are unable to act on the vacancies for want of a quorum or for any
    other reason;

    (9) The appointment of a receiver, in accordance with the usages of a court in
    equitable matters, to wind up the affairs of the corporation, to take custody
    of any of its property, or for any other purpose;

    (10) The issuance or entry of any injunction or any other order which the court
    considers proper in the administration of the trust involved in the winding up
    of the affairs of the corporation and the giving of notice of it;

    (11) The allowance and payment of compensation to the directors or any of them
    or to any person rendering services beneficial to the corporation or to those
    interested in it;

    (12) The entry of a judgment or decree which, if it so provides, may operate as
    the deed or other instrument ordered to be executed, or the appointment of a master
    or guardian ad litem to execute such deed or instrument in the name of the corporation
    with the same effect as if executed by an authorized officer pursuant to authority
    conferred by the directors or the shareholders of the corporation, whenever there
    is no officer or agent competent to execute such deed or instrument, whenever
    the corporation or its officers do not perform or comply with a judgment or decree
    of court, or whenever the court considers it proper.

    (B) A judicial proceeding under this section concerning the winding up of the
    affairs of a corporation is a special proceeding, and final orders in the proceeding
    may be vacated, modified, or reversed on appeal pursuant to the Rules of Appellate
    Procedure and, to the extent not in conflict with those rules, Chapter 2505. of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.89
- number: '1701.90'
  heading: Receiver for winding up affairs of corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Whenever, after a corporation is dissolved voluntarily or the articles
    of a corporation have been cancelled or the period of existence of a corporation
    has expired, a receiver is appointed to wind up the affairs of the corporation,
    all the claims, demands, rights, interests, or liens of creditors, claimants,
    and shareholders shall be determined as of the day on which the receiver was appointed
    unless those claims, demands, rights, interests, or liens have already been determined
    under section 1701.881 of the Revised Code. Unless it is otherwise ordered, such
    appointment vests in the receiver and the receiver''s successors the right to
    the immediate possession of all the property of the corporation, which shall,
    if so ordered, execute and deliver conveyances of such property to the receiver
    or the receiver''s nominee.

    (B) Any officer, director, shareholder, or other person, whether a resident of
    the state or a non-resident and however interested, may be appointed as receiver.

    (C) Unless otherwise ordered, the receiver shall have all the authority vested
    in the directors and officers of the corporation, shall exercise such authority
    subject to such orders as are made by the court, and may be required to qualify
    by giving bond to the state in such amount as the court fixes, with surety to
    the satisfaction of the clerk of the court, conditioned for the faithful discharge
    of the receiver''s duties and for a due accounting for all money or property received
    by the receiver.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.90
- number: '1701.91'
  heading: Judicial dissolution
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) A corporation may be dissolved judicially and its affairs wound up:

    (1) By an order of the supreme court or of a court of appeals in an action in
    quo warranto brought as provided by sections 2733.02 to 2733.39 of the Revised
    Code, in which event the court may order the affairs of the corporation to be
    wound up by its directors as in the case of voluntary dissolution, or by proceedings
    in, and under the order of, the court of common pleas of the county in this state
    in which the corporation has its principal office;

    (2) By an order of the court of common pleas of the county in this state in which
    such corporation has its principal office, in an action brought by holders of
    shares entitled to dissolve the corporation voluntarily, when it is established
    that any of the following are true:

    (a) That its articles have been canceled or its period of existence has expired;

    (b) That the corporation is insolvent or is unable to afford reasonable security
    to those who may deal with it and that it is necessary in order to protect the
    creditors of the corporation that the corporation be judicially dissolved;

    (c) That the objects of the corporation have wholly failed or are entirely abandoned
    or that their accomplishment is impracticable;

    (3) By an order of the court of common pleas of the county in this state in which
    the corporation has its principal office, in an action brought by the holders
    of shares entitling them to exercise at least two-thirds of the voting power of
    the corporation on such proposal when it is established that it is beneficial
    to the shareholders that the corporation be judicially dissolved, or the holders
    of such lesser proportion as are entitled by the articles to dissolve the corporation
    voluntarily;

    (4) By an order of the court of common pleas of the county in this state in which
    the corporation has its principal office, in an action brought by one-half of
    the directors when there is an even number of directors or by the holders of shares
    entitling them to exercise at least two-thirds of the voting power, when it is
    established that the corporation has an even number of directors who are deadlocked
    in the management of the corporate affairs and the shareholders are unable to
    break the deadlock, or when it is established that the corporation has an uneven
    number of directors and that the shareholders are deadlocked in voting power and
    unable to agree upon or vote for the election of directors as successors to directors
    whose terms normally would expire upon the election of their successors. Under
    these circumstances, dissolution of the corporation shall not be denied on the
    ground that the corporation is solvent or on the ground that the business of the
    corporation has been or could be conducted at a profit.

    (5) By an order of the court of common pleas of the county in which the corporation,
    whether for profit or nonprofit, has its principal office, in an action brought
    by the prosecuting attorney of the county, when it is found that the corporation
    was organized or systematically used to further criminal purposes, or as a subterfuge
    to engage in prostitution, gambling, loan sharking, drug abuse, illegal drug distribution,
    counterfeiting, obscenity, extortion, corruption of law enforcement officers or
    other public officers, officials, or any employees, or any other criminal activity.

    (B) A complaint for judicial dissolution shall be verified by any of the complainants
    and shall set forth facts showing that the case is one of those specified in this
    section. Unless the complainants set forth in the complaint that they are unable
    to annex a list of shareholders, a schedule shall be annexed to the complaint
    setting forth the name of each shareholder, his address if it is known or the
    fact that it is not known, the number of shares owned by him, and any balance
    unpaid on his shares .

    (C) Upon the filing of a complaint for judicial dissolution, the court with which
    it is filed shall have power to issue injunctions, to appoint a receiver with
    such authority and duties as the court from time to time may direct, to take such
    other proceedings as may be necessary to protect the property or the rights of
    the complainants or of the persons interested, and to carry on the business of
    the corporation until a full hearing can be had. Upon or after the filing of a
    complaint for judicial dissolution, the court, by injunction or order, may stay
    the prosecution of any proceeding against the corporation or involving any of
    its property and require the parties to the proceeding to present and prove their
    claims, demands, rights, interests, or liens, at the time and in the manner required
    of creditors or others. The court may refer the complaint to a special master
    commissioner.

    (D) After a hearing had upon such notice as the court may direct to be given to
    all parties to the proceeding and to any other parties in interest designated
    by the court, a final order based either upon the evidence, or upon the report
    of the special master commissioner if one has been appointed, shall be made dissolving
    the corporation or dismissing the complaint. An order or judgment for the judicial
    dissolution of a corporation shall contain a concise statement of the proceedings
    leading up to the order or judgment; the name of the corporation; the place in
    this state where its principal office is located; the names and addresses of its
    directors and officers; the name and address of a statutory agent; and, if desired,
    such other provisions with respect to the judicial dissolution and winding up
    as are considered necessary or desirable. A certified copy of such order forthwith
    shall be filed in the office of the secretary of state, whereupon the corporation
    shall be dissolved. To the extent consistent with orders entered in such proceeding,
    the effect of such judicial dissolution shall be the same as in the case of voluntary
    dissolution, and the provisions of sections 1701.87, 1701.88, 1701.89, and 1701.90
    of the Revised Code relating to the required notice a corporation shall give of
    a dissolution and the authority and duties of directors during the winding up
    of the affairs of a corporation dissolved voluntarily, with respect to the jurisdiction
    of courts over the winding up of the affairs of a corporation, and with respect
    to receivers for winding up the affairs of a corporation shall be applicable to
    corporations judicially dissolved.

    (E) A judicial proceeding under this section concerning the judicial dissolution
    of a corporation is a special proceeding, and final orders in it may be vacated,
    modified, or reversed on appeal pursuant to the Rules of Appellate Procedure or
    the Rules of Practice of the Supreme Court, whichever are applicable, and, to
    the extent not in conflict with those rules, Chapter 2505. of the Revised Code.'
