- number: '1706.61'
  heading: Right of derivative action
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A member may commence or maintain a derivative action in the right of
    a limited liability company to recover a judgment in favor of the limited liability
    company by complying with sections 1706.61 to 1706.617 of the Revised Code.

    (B) A member associated with a series of a limited liability company may commence
    or maintain a derivative action in the right of the series to recover a judgment
    in favor of the series by complying with sections 1706.61 to 1706.617 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.61
- number: '1706.611'
  heading: Member standing for derivative action
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A member may commence or maintain a derivative action in the right of
    the limited liability company only if the member meets both of the following conditions:

    (1) The member fairly and adequately represents the interests of the limited liability
    company in enforcing the right of the limited liability company.

    (2) The member either:

    (a) Was a member of the limited liability company at the time of the act or omission
    of which the member complains;

    (b) Acquired a membership interest through assignment by operation of law from
    a person who was a member at the time of the act or omission of which the member
    complains.

    (B) A member associated with a series of a limited liability company may commence
    or maintain a derivative action in the right of the series only if the member
    meets both of the following conditions:

    (1) The member fairly and adequately represents the interests of the series in
    enforcing the right of the series.

    (2) The member either:

    (a) Was associated with the series at the time of the act or omission of which
    the member complains;

    (b) Acquired a membership interest through assignment by operation of law from
    a person who was a member associated with the series at the time of the act or
    omission of which the member complains.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.611
- number: '1706.612'
  heading: Written demand requirement
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: 'A member may not commence a derivative action in the right of the limited
    liability company, or a series thereof, until both of the following occur:

    (A) A written demand has been made upon the limited liability company or the series
    to take suitable action.

    (B) Ninety days have expired from the date the demand was made unless either of
    the following applies:

    (1) The member has earlier been notified that the demand has been rejected by
    the limited liability company or the series;

    (2) Irreparable injury to the limited liability company or the series would result
    by waiting for the expiration of the ninety-day period.'
