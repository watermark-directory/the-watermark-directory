- number: '1721.99'
  heading: Penalty
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: '(A) Whoever violates section 1721.19 of the Revised Code shall be fined not
    less than five nor more than fifty dollars.

    (B) Whoever violates section 1721.20 of the Revised Code shall be fined not less
    than fifty nor more than five hundred dollars.

    (C) Whoever violates section 1721.21 or 1721.211 of the Revised Code shall be
    fined not more than five thousand dollars or imprisoned for not more than one
    year, or both.'
