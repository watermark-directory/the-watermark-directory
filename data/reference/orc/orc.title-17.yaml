- number: '1711.15'
  heading: County aid to county agricultural society
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'In any county in which there is a duly organized county agricultural society,
    the board of county commissioners or the county agricultural society itself may
    purchase or lease, for a term of not less than twenty years, real estate on which
    to hold fairs under the management and control of the county agricultural society,
    and may erect suitable buildings on the real estate and otherwise improve it.

    In counties in which there is a county agricultural society that has purchased,
    or leased for a term of not less than twenty years, real estate as a site on which
    to hold fairs, or if the title to the site is vested in fee in the county, the
    board of county commissioners may erect or repair buildings or otherwise improve
    the site and pay the rental of it, or contribute to or pay any other form of indebtedness
    of the society, if the director of agriculture has certified to the board that
    the county agricultural society is complying with all laws and rules governing
    the operation of county agricultural societies. The board may appropriate from
    the county''s general fund or permanent improvement fund, and may appropriate
    revenue from a tax levied under division (T) of section 5739.09 of the Revised
    Code, any amount that it considers necessary for any of those purposes, provided
    that an appropriation of revenue from that tax may be expended only for the purposes
    provided in the resolution levying that tax.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.15
- number: '1711.16'
  heading: Expenditure of county aid by county society
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'When the control and management of a fairground is in a county agricultural
    society, and the board of county commissioners has appropriated an amount for
    the aid of the society as provided in section 1711.15 of the Revised Code, the
    society, with the consent of the board, may contract for the erection or repair
    of buildings or otherwise improve the fairground, to the extent that the payment
    for the improvement is provided by the board.

    When the appropriation is made by the board, the county auditor shall place the
    proceeds in a special fund, designated the "county agricultural society fund,"
    indicating the purpose for which it is available, provided that an appropriation
    of revenue from a tax levied by the board under division (T) of section 5739.09
    of the Revised Code may be expended only for the purposes provided in the resolution
    levying that tax. On application of the treasurer of the society, the auditor
    shall issue an order for the amount of the appropriation to the treasurer of the
    society, if the society has secured the certificate required under section 1711.05
    of the Revised Code, on the treasurer''s filing with the auditor a bond in double
    the amount collected, with good and sufficient sureties approved by the auditor,
    conditioned for the satisfactory paying over and accounting of the funds for the
    purposes for which they were provided. The funds shall remain in the special fund
    in which they are placed by the auditor until they are applied for by the treasurer
    of the society and the bond is given, or until they are expended by the board
    for the purposes for which the fund was created. If the society ceases to exist
    or releases the fund as not required for the purposes for which the fund was created,
    the board may by resolution transfer the fund to the general fund of the county.'
