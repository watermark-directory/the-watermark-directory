- number: '1706.171'
  heading: Incomplete or undelivered records
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) If a person required by this chapter to sign a record or deliver a record
    to the secretary of state for filing under this chapter does not do so, any other
    person that is aggrieved by that failure to sign may petition the appropriate
    court to order any of the following:

    (1) The person to sign the record;

    (2) The person to deliver the record to the secretary of state for filing;

    (3) The secretary of state to file the record unsigned.

    (B) If a petitioner under division (A) of this section is not the limited liability
    company or foreign limited liability company to whom the record pertains, the
    petitioner shall make the limited liability company or foreign limited liability
    company a party to the action. A person aggrieved under division (A) of this section
    may seek the remedies provided in that division in a separate action against the
    person required to sign the record or as a part of any other action concerning
    the limited liability company in which the person required to sign the record
    is made a party.

    (C) A record filed unsigned pursuant to this section is effective without being
    signed.

    (D) A court may award reasonable expenses, including reasonable attorney''s fees,
    to the prevailing party, in whole or in part, with respect to any claim made under
    division (A) of this section.'
  history: null
