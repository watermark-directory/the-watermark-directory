- number: '1702.13'
  heading: Membership
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: '(A) The corporation shall maintain a record of its members containing the
    name and address of each member, the date of admission to membership, and, if
    members are classified, the class to which the member belongs.

    (B) A corporation may issue certificates evidencing membership in it, but a corporation
    incorporated on or after June 9, 1927, shall not issue certificates for shares.

    (C) Membership in a corporation may be terminated in the manner provided by law,
    the articles, or the regulations, and upon the termination of membership for any
    cause, such fact and the date of termination shall be recorded in the corporation''s
    membership records.

    (D) Unless the articles or the regulations otherwise provide, all the rights and
    privileges of a member in the corporation and its property shall cease on termination
    of membership.

    (E) If permitted by the articles or the regulations of a corporation, another
    nonprofit corporation, a business corporation, a limited liability company, or
    any partnership, may become a member of the first mentioned corporation.

    (F) Whenever the number of members of a corporation that, under the law, the articles,
    or the regulations, must have a specified number of members, is reduced below
    the specified number, the corporation shall not be required because of that reduction
    to cease carrying on its activities, but the continuing members may fill all vacancies.

    (G) Unless otherwise provided in the articles or regulations of a corporation,
    all members have the same membership rights and privileges.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.13
- number: '1702.14'
  heading: Absence of provision for members
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: Where neither the articles nor the regulations provide for members thereof
    as such, or where a corporation has in fact no members other than the directors,
    the directors shall, for the purposes of any statute or rule of law relating to
    corporations, be taken to be the members of such corporation, and they shall have
    all the rights and privileges of members; except that where the provisions in
    this chapter relating to meetings of directors differ, it shall be sufficient
    to comply with the provisions relating to directors.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1702.14
- number: '1702.15'
  heading: Corporation to keep books and records of account and minutes of proceedings
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: Each corporation shall keep correct and complete books and records of account,
    together with minutes of the proceedings of its incorporators, members, directors,
    and committees of the directors or members. Subject to limitations prescribed
    in the articles or the regulations upon the right of members of a corporation
    to examine the books and records, all books and records of a corporation, including
    the membership records prescribed by section 1702.13 of the Revised Code, may
    be examined by any member or director or the agent or attorney of either, for
    any reasonable and proper purpose and at any reasonable time.
