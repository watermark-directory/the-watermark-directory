  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.48
- number: '1751.51'
  heading: Restrictions on choice of providers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'If a health care plan of a health insuring corporation covers health care
    services that may be legally performed by a class of providers referred to in
    section 3923.23 or 3923.231 of the Revised Code but would restrict an enrollee''s
    ability to receive these health care services from members of that class in any
    manner that differs from an enrollee''s ability under the health care plan to
    receive these health care services from any other class of providers that may
    legally perform these health care services, then the health insuring corporation
    shall do both of the following:

    (A) Set forth, within any evidence of coverage pertaining to the health care plan,
    under a heading that reads "Restrictions on Choice of Providers," a clear, concise,
    and complete statement of the restriction that conforms to the requirements of
    section 1751.11 of the Revised Code;

    (B) Set forth, within any solicitation document pertaining to the health care
    plan and within any solicitation materials pertaining to the health care plan
    that the health insuring corporation provides to any employer or any employee
    benefit fund, under a heading that reads "Restrictions on Choice of Providers,"
    a clear, concise, and complete statement of the restriction, such statement being
    subject to prior approval by the superintendent of insurance in accordance with
    the same form and content requirements that are specified in section 1751.11 of
    the Revised Code with regard to evidence of coverage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.51
- number: '1751.52'
  heading: Confidentiality of information
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) All applications, filings, and reports required under this chapter shall
    be treated as public documents after the date the application, filing, or report
    becomes effective, regardless of the application of the Uniform Trade Secrets
    Act set forth in sections 1333.61 to 1333.69 of the Revised Code.

    (B) Any data or information pertaining to the diagnosis, treatment, or health
    of any enrollee or applicant for enrollment that is obtained by the health insuring
    corporation from the enrollee or applicant, or from any health care facility or
    provider, shall be held in confidence and shall not be disclosed to any person
    except under one of the following circumstances:

    (1) To the extent that it may be necessary to carry out the purposes of this chapter;

    (2) Upon the express consent of the enrollee or applicant;

    (3) Pursuant to statute or court order for the production of evidence;

    (4) In the event of claim litigation between such person and the health insuring
    corporation wherein such data or information is pertinent.

    (C) A health insuring corporation shall be entitled to claim any statutory privileges
    against disclosure under division (B) of this section that the facility or provider
    who furnished the data or information to the health insuring corporation is entitled
    to claim.'
  history: null
