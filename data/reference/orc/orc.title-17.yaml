- number: '1706.711'
  heading: Merger approval, amendment, or abandonment
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) To be effective, an agreement of merger shall be consented to by all
    the members of a constituent limited liability company.

    (B) After the agreement of merger is approved, and at any time before a certificate
    of merger is delivered to the secretary of state for filing under section 1706.712
    of the Revised Code, a constituent limited liability company may amend the agreement
    or abandon the merger:

    (1) As provided in the agreement; or

    (2) Except as otherwise prohibited in the agreement, with the same consent as
    was required to approve the agreement.'
