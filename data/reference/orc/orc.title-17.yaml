    name: Corporations-Partnerships
  chapter:
    num: '1753'
    name: Physician-health Plan Partnership Act; Risk-based Capital For Insurers Model
      Act
  text: '(A) Each foreign health insuring corporation shall submit to the superintendent
    of insurance, upon receiving the superintendent''s written request, an RBC report
    for the calendar year just ended. The health insuring corporation shall submit
    the RBC report to the superintendent no later than the later of:

    (1) The date a domestic health insuring corporation would be required to file
    an RBC report under section 1753.32 of the Revised Code;

    (2) Fifteen days after the superintendent''s request is received by the foreign
    health insuring corporation.

    (B) Each foreign health insuring corporation shall, upon receiving the superintendent''s
    written request, promptly submit to the superintendent a copy of any RBC plan
    or revised RBC plan filed with the insurance regulatory authority of any other
    state.

    (C) The superintendent may require a foreign health insuring corporation to file
    an RBC plan with the superintendent in the case of a company action level event,
    regulatory action level event, or authorized control level event involving the
    foreign health insuring corporation, if the insurance regulatory authority of
    the state of domicile of the foreign health insuring corporation fails to require
    the foreign health insuring corporation to file an RBC plan in the manner specified
    under that state''s RBC laws, if any. The failure of a foreign health insuring
    corporation to file an RBC plan or revised RBC plan with the superintendent as
    required shall be grounds for the superintendent to order the health insuring
    corporation to cease and desist from writing new business in this state.

    (D) In the case of a mandatory control level event involving a foreign health
    insuring corporation, if no domiciliary receiver has been appointed for the foreign
    health insuring corporation under the rehabilitation and liquidation laws applicable
    in the state of domicile of the foreign health insuring corporation, the superintendent
    may make application to the court of common pleas as permitted in sections 3903.50
    to 3903.59 of the Revised Code for an order directing the superintendent to liquidate
    the property of the foreign health insuring corporation found in this state. The
    occurrence of the mandatory control level event shall be deemed sufficient grounds
    for the superintendent to make application to the court.'
