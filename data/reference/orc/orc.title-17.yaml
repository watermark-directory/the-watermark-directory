- number: '1751.821'
  heading: Determination that accreditation constitutes compliance
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: A health insuring corporation may present evidence of compliance with the
    requirements of sections 1751.77 to 1751.82 of the Revised Code by submitting
    evidence to the superintendent of insurance of its accreditation by an independent,
    private accrediting organization, such as the national committee on quality assurance,
    the national quality health council, the joint commission on accreditation of
    health care organizations, or the American accreditation healthcare commission/utilization
    review accreditation commission. The superintendent, upon review of the organization's
    accreditation process, may determine that such accreditation constitutes compliance
    by the health insuring corporation with the requirements of these sections.
