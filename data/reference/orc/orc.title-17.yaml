- number: '1751.47'
  heading: Adopting forms, instructions and manuals for providing financial information
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) The superintendent of insurance shall adopt the forms, instructions,
    and manuals prescribed by the national association of insurance commissioners
    for the preparation and filing of statutory financial statements and other financial
    information. However, the superintendent may by rule adopt modifications to such
    prescribed forms, instructions, and manuals as the superintendent considers to
    be necessary.

    (B) For purposes of preparing statutory financial statements and other financial
    information involving circumstances not addressed by the forms, instructions,
    and manuals prescribed by the national association of insurance commissioners,
    the superintendent may determine accounting practices and methods to be used by
    health insuring corporations.

    (C) The superintendent shall furnish each domestic health insuring corporation
    a copy of the forms for the filing of those statutory financial statements and
    other financial information as the corporation is required to file with the superintendent.'
