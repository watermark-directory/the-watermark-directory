- number: '1782.20'
  heading: Erroneous belief that one is a limited partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) Except as provided in division (C) of this section, when no certificate
    of limited partnership has been filed, a person who contributes to a business
    enterprise and who erroneously but in good faith believes that the person has
    become a limited partner in the enterprise is not a general partner in the enterprise
    and is not bound by its obligations by reason of making the contribution, receiving
    distributions from the enterprise, or exercising any rights of a limited partner,
    if, within a reasonable time after ascertaining the mistake, the person does either
    of the following:

    (1) Causes an appropriate certificate of limited partnership to be executed and
    filed;

    (2) Takes the action that is necessary to withdraw from the enterprise under the
    provisions of Chapter 1775. or 1776. of the Revised Code.

    (B) Except as provided in division (C) of this section, when a certificate of
    limited partnership has been filed, a person who contributes to a business enterprise
    and who erroneously but in good faith believes that the person has become a limited
    partner in the enterprise is not a general partner in the enterprise and is not
    bound by its obligations by reason of making the contribution, receiving distributions
    from the enterprise, or exercising any rights of a limited partner, if, within
    a reasonable time after ascertaining that the filed certificate of limited partnership
    inaccurately refers to the person as a general partner, the person does any of
    the following:

    (1) Causes an appropriate certificate of amendment to be executed and filed amending
    the filed certificate of limited partnership;

    (2) Takes such action as is necessary to withdraw from the enterprise under the
    provisions of section 1782.32 of the Revised Code;

    (3) Executes and files a certificate of disclaimer of general partner status,
    together with a copy of the certificate of limited partnership that inaccurately
    refers to the person as a general partner, in the office of the secretary of state
    and provides to the partnership a copy of that certificate of disclaimer. A certificate
    of disclaimer of general partner status shall be on a form prescribed by the secretary
    of state and shall include all of the following:

    (a) The name of the limited partnership and the file number assigned to it by
    the secretary of state;

    (b) The date of the filing that inaccurately refers to the person as a general
    partner;

    (c) The name of the person who inaccurately was referred to as a general partner.

    (C) A person who makes a contribution of the kind described in division (A) or
    (B) of this section and who knew or should have known either that no certificate
    of limited partnership has been filed or that a certificate of limited partnership
    has been filed that inaccurately refers to the person as a general partner is
    liable as a general partner to any third party who actually believed in good faith
    that the person was a general partner, but only to the extent that the third party
    acted in reasonable reliance on that belief and extended credit to the partnership
    in reasonable reliance on the credit of the person.

    (D) If a person who has filed a certificate of disclaimer of general partner status
    pursuant to division (B)(3) of this section becomes aware that any statement in
    the certificate of disclaimer was materially false when made or that any arrangement
    or other fact described in the certificate has changed and that the certificate
    of disclaimer thus is materially inaccurate, the person promptly shall execute
    and file a certificate of cancellation of disclaimer of general partner status
    in the office of the secretary of state and provide a copy of that certificate
    of cancellation of disclaimer of general partner status to the partnership. The
    certificate of cancellation of disclaimer of general partner status shall be on
    a form prescribed by the secretary of state and shall include all of the following:

    (1) The name of the limited partnership and the file number assigned to it by
    the secretary of state;

    (2) The date on which the certificate of disclaimer of general partner status
    in question was filed;

    (3) The name of the person identified on the certificate of disclaimer of general
    partner status pursuant to division (B)(3)(c) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.20
- number: '1782.21'
  heading: Right to information
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A)(1) Each limited partner has the right, subject to such reasonable standards
    as may be set forth in the partnership agreement or otherwise established by the
    general partners, to obtain from the general partners from time to time and upon
    reasonable demand for any purpose reasonably related to the limited partner''s
    interest as a limited partner, all of the following:

    (a) True and full information regarding the status of the business and the financial
    condition of the limited partnership;

    (b) Promptly after becoming available, a copy of the limited partnership''s federal,
    state, and local income tax returns for each year;

    (c) A current list of the name and last known business, residence, or mailing
    address of each partner;

    (d) A copy of any written partnership agreement and certificate of limited partnership
    and all amendments to the agreement and certificate, together with executed copies
    of any written powers of attorney pursuant to which the partnership agreement
    and any certificate and all amendments to it have been executed;

    (e) True and full information regarding the amount of cash and a description and
    statement of the agreed value of any other property or services contributed by
    each partner and which each partner has agreed to contribute in the future, and
    the date on which each partner became a partner;

    (f) Other information regarding the affairs of the limited partnership as is just
    and reasonable.

    (2) The reasonable standards referred to in division (A)(1) of this section may
    include standards governing the type and nature of information and documents that
    are to be furnished, the time and location at which they are to be furnished,
    and the person who is to pay the expense of furnishing them.

    (B) Unless otherwise provided in the partnership agreement, a general partner
    shall have the right to keep confidential from limited partners, for the period
    of time that the general partner considers reasonable, any information that the
    general partner reasonably believes to be in the nature of trade secrets or any
    other information the disclosure of which the general partner in good faith believes
    is not in the best interest of the limited partnership or could damage the limited
    partnership or its business or which the limited partnership is required by law
    or by agreement with a third party to keep confidential.

    (C) A limited partnership may maintain its records in a form other than a written
    form if the form used is capable of conversion, within a reasonable time, into
    written form.

    (D) A general partner may require that any demand under this section be in writing
    and state its purpose.

    (E) In complying with this section, the general partners may elect to do either
    or both of the following:

    (1) Provide a limited partner with the right to examine documents in person or
    by agent or attorney and to make copies or extracts of the documents;

    (2) Provide to a limited partner true and accurate copies of documents responsive
    to the demand.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.21
- number: '1782.22'
  heading: Additional general partners
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: After the filing of a limited partnership's original certificate of limited
    partnership, additional general partners may be admitted as provided in writing
    in the partnership agreement or, if the partnership agreement does not provide
    in writing for the admission of additional general partners, with the written
    consent of all partners.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.22
- number: '1782.23'
  heading: Person ceases to be a general partner - when
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'Except as approved by the specific written consent of all partners at the
    time, a person ceases to be a general partner of a limited partnership upon the
    happening of any of the following events of withdrawal:

    (A) The general partner withdraws from the limited partnership as provided in
    section 1782.32 of the Revised Code;

    (B) The general partner ceases to be a general partner of the limited partnership
    as provided in section 1782.40 of the Revised Code;

    (C) The general partner is removed as a general partner in accordance with the
    partnership agreement;

    (D) Unless otherwise provided in writing in the partnership agreement, the general
    partner does one of the following:

    (1) Makes an assignment for the benefit of creditors;

    (2) Files a voluntary petition in bankruptcy;

    (3) Is adjudicated a bankrupt or insolvent;

    (4) Files a petition or answer seeking for himself any reorganization, arrangement,
    composition, readjustment, liquidation, dissolution, or similar relief under any
    statute, law, or rule;

    (5) Files an answer or other pleading admitting or failing to contest the material
    allegations of a petition filed against him in any proceeding described in division
    (D)(4) of this section;

    (6) Seeks, consents to, or acquiesces in the appointment of a trustee, receiver,
    or liquidator of the general partner or of all or any substantial part of his
    properties.

    (E) Unless otherwise provided in writing in the partnership agreement, one hundred
    twenty days have elapsed after the commencement of any proceeding against the
    general partner seeking reorganization, arrangement, composition, readjustment,
    liquidation, dissolution, or similar relief under any statute, law, or rule and
    the proceeding has not been dismissed, or within ninety days after an appointment,
    without his consent or acquiescence, of a trustee, receiver, or liquidator of
    the general partner or of all or any substantial part of his properties, the appointment
    is not vacated or stayed, or within ninety days after the expiration of such a
    stay, the appointment is not vacated;

    (F) In the case of a general partner who is a natural person, his death or the
    entry by a court adjudicating him an incompetent, as defined in section 2111.01
    of the Revised Code;

    (G) In the case of a general partner who is acting as a general partner by virtue
    of being a trustee of a trust, the termination of the trust, but not merely the
    substitution of a new trustee;

    (H) In the case of a general partner that is a separate partnership, the dissolution
    and commencement of winding up of the separate partnership;

    (I) In the case of a general partner that is a corporation, the filing of a certificate
    of dissolution, or its equivalent, for the corporation or the revocation of its
    charter unless the charter is reinstated within ninety days after the revocation;

    (J) In the case of a general partner that is an estate, the distribution by the
    fiduciary of the estate''s entire interest in the partnership;

    (K) In the case of a general partner that is a limited liability company, the
    dissolution and commencement of winding up of the limited liability company.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.23
- number: '1782.24'
  heading: General partner - rights and powers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) Except as otherwise provided in this chapter, the partnership agreement,
    or section 5815.35 of the Revised Code, a general partner of a limited partnership
    shall have all the rights and powers and be subject to all the restrictions and
    liabilities of a partner in a partnership without limited partners.

    (B) Except as otherwise provided in this chapter, a general partner of a limited
    partnership has the liabilities of a partner in a partnership without limited
    partners to persons other than the partnership and the other partners. Except
    as otherwise provided in this chapter or the partnership agreement, a general
    partner of a limited partnership has the liabilities of a partner in a partnership
    without limited partners to the partnership and to the other partners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.24
- number: '1782.241'
  heading: Care owed by general partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A general partner shall perform the duties of a general partner in good
    faith, in a manner the general partner reasonably believes to be in or not opposed
    to the best interests of the limited partnership, and with the care that an ordinarily
    prudent person in a like position would use under similar circumstances. In performing
    a general partner''s duties, a general partner is entitled to rely on information,
    opinions, reports, or statements, including financial statements and other financial
    data, that are prepared or presented by either of the following:

    (1) One or more general partners, employees of the limited partnership, or employees
    of a general partner, who the general partner reasonably believes are reliable
    and competent in the matters prepared or presented;

    (2) Legal counsel, public accountants, or other persons as to matters that the
    general partner reasonably believes are within the person''s professional or expert
    competence.

    (B) For purposes of division (A) of this section, the following apply:

    (1) A general partner shall not be found to have violated the duties of a general
    partner under division (A) of this section, unless it is proved by clear and convincing
    evidence that the general partner has not acted in good faith, in a manner the
    general partner reasonably believes to be in or not opposed to the best interests
    of the limited partnership, or with the care that an ordinarily prudent person
    in a like position would use under similar circumstances, in any action brought
    against the general partner, including actions involving or affecting the general
    partner''s service in any other position or relationship with the limited partnership.

    (2) A general partner shall not be considered to be acting in good faith if the
    general partner has knowledge concerning the matter in question that would cause
    reliance on information, opinions, reports, or statements that are prepared or
    presented by the persons described in divisions (A)(1) and (2) of this section
    to be unwarranted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.241
- number: '1782.242'
  heading: Effect of self-dealing
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'No contract, action, or transaction shall be void or voidable with respect
    to a limited partnership for the reason that the contract, action, or transaction
    is among or affects the limited partnership and one or more of its partners, or
    that the contract, action, or transaction is among or affects the limited partnership
    and any other person in which one or more of the partners are directors, trustees,
    officers, or partners, or have a financial or personal interest, if any of the
    following applies:

    (A) The material facts as to the partner or partners and their relationship or
    interest and as to the contract, action, or transaction are disclosed in writing
    to every partner before that partner is admitted to the partnership.

    (B) The material facts as to the partner or partners and their relationship or
    interest and as to the contract, action, or transaction are disclosed in writing
    to all partners; the contract, action, or transaction is fair as to the limited
    partnership; and the disinterested general partners acting in good faith reasonably
    justified by the facts, authorize the contract, action, or transaction by a majority
    vote, even though the disinterested general partners constitute less than a majority
    of the general partners.

    (C) The contract, action, or transaction is fair as to the limited partnership
    as of the time the contract, action, or transaction is authorized and approved
    by a majority in interest of the disinterested limited partners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.242
- number: '1782.25'
  heading: Person may be both general and limited partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'A general partner of a limited partnership may make contributions to, and
    share in the profits and losses of and in distributions from, the limited partnership
    as a general partner. A general partner also may make contributions to, and share
    in the profits, losses, and distributions of, the limited partnership as a limited
    partner.

    A person who is both a general and a limited partner shall have all the rights
    and powers, and be subject to all the restrictions and liabilities of a general
    partner. Except as otherwise provided in the partnership agreement, a person who
    is both a general and a limited partner shall have the powers, and be subject
    to the restrictions, of a limited partner to the extent of his participation in
    the partnership as a limited partner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.25
- number: '1782.26'
  heading: Voting rights of general partners
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: The partnership agreement may grant to all or certain identified general partners
    the right to vote, on a per capita or any other basis, separately or with any
    class of the limited partners, on any matter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.26
- number: '1782.27'
  heading: Contributions of partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: The contributions of a partner may be in casy, other property, services rendered,
    or a promissory note or other obligation to contribute cash or property or to
    perform services.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.27
- number: '1782.28'
  heading: Promise of limited partner to contribute to partnership not enforceable
    unless written and signed
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A promise by a limited partner to contribute to the limited partnership
    is not enforceable unless it is set out in a writing signed by the limited partner.

    (B) Except as otherwise provided in the partnership agreement, a partner is obligated
    to the limited partnership to perform any enforceable promise to contribute cash
    or other property or to perform services, even if he is unable to perform because
    of death, disability, or any other reason. If a partner fails to make a required
    contribution of property or services, he shall be obligated, at the option of
    the limited partnership, to contribute cash equal to the portion of the value,
    as stated in the partnership records required to be kept pursuant to section 1782.05
    of the Revised Code, of the stated contribution that he has failed to make. The
    foregoing option shall be in addition to, and not in lieu of, any other right,
    including the right to specific performance, that the limited partnership may
    have against the partner under the partnership agreement or applicable law.

    (C) Unless otherwise provided in the partnership agreement, the obligation of
    a partner to make a contribution, or to return money or other property paid or
    distributed in violation of this chapter may be compromised only by the consent
    of all the partners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.28
- number: '1782.29'
  heading: Allocation of profits and losses
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: The profits, losses, income, gains, deductions, credits, or similar items
    of a limited partnership shall be allocated among the partners and classes of
    partners in the manner provided in writing in the partnership agreement. If the
    partnership agreement does not so provide in writing, such allocations shall be
    made on the basis of the value, as stated in the partnership records required
    to be kept pursuant to section 1782.05 of the Revised Code, of the contributions
    made by each partner to the extent they have been received by the partnership
    and have not been returned.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.29
- number: '1782.30'
  heading: Allocation of distributions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: Distributions of cash or other assets of a limited partnership shall be allocated
    among the partners and classes of partners in the manner provided in writing in
    the partnership agreement. If the partnership agreement does not so provide, distributions
    shall be made on the basis of the value, as stated in the partnership records
    required to be kept pursuant to section 1782.05 of the Revised Code, of the contributions
    made by each partner to the extent they have been received by the partnership
    and have not been returned.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.30
- number: '1782.31'
  heading: Partner entitled to receive distributions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: Except as otherwise provided in this chapter, a partner is entitled to receive
    distributions from a limited partnership before his withdrawal from the limited
    partnership and before the dissolution and winding up of the partnership only
    to the extent and at the times or upon the happening of the events specified in
    the partnership agreement.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.31
- number: '1782.32'
  heading: Withdrawal of general partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: A general partner may withdraw from a limited partnership at any time by giving
    written notice to the other partners. If the withdrawal violates the partnership
    agreement, the limited partnership, in addition to exercising any remedies otherwise
    available under applicable law, may recover from the withdrawing general partner
    damages for breach of the partnership agreement and offset the damages against
    the amount otherwise distributable to him.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.32
- number: '1782.33'
  heading: Withdrawal of limited partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) Except as provided in division (B) of this section, a limited partner
    may withdraw from a limited partnership at the time, or upon the happening of
    events, specified in writing in the partnership agreement. If the partnership
    agreement does not specify in writing the time or events upon the happening of
    which a limited partner may withdraw or a definite time for the dissolution and
    winding up of the limited partnership, a limited partner may withdraw upon not
    less than six months'' prior written notice to each general partner at the general
    partner''s address on the books of the limited partnership at its office in this
    state.

    (B) If the limited partnership was formed on or after the effective date of this
    amendment, or the limited partnership was formed prior to the effective date of
    this amendment and its certificate of limited partnership or partnership agreement
    specifically states that this division applies to the limited partnership, a limited
    partner may withdraw from the limited partnership only at the time or upon the
    occurrence of an event specified in writing in the partnership agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.33
- number: '1782.34'
  heading: Rights of withdrawing partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: Except as provided in this chapter, upon withdrawal, any withdrawing partner
    is entitled to receive any distribution to which he is entitled under the partnership
    agreement and, if not otherwise provided in the agreement, is entitled to receive,
    within a reasonable time after withdrawal, the fair value of his interest in the
    limited partnership as of the date of withdrawal based upon his right to share
    in distributions from the limited partnership.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.34
- number: '1782.35'
  heading: Distributions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: Except as provided in writing in the partnership agreement, a partner, regardless
    of the nature of this contribution, shall have no right to demand and receive
    any distribution from a limited partnership in any form other than cash. Except
    as provided in writing in the partnership agreement, a partner may not be compelled
    to accept a distribution of any asset in kind from a limited partnership to the
    extent that the percentage of the asset distributed to him exceeds or is less
    than a percentage of that asset that is equal to the percentage in which he shares
    in distributions from the limited partnership.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.35
- number: '1782.36'
  heading: Remedies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: Except to the extent otherwise provided in the partnership agreement, when
    a partner becomes entitled to receive a distribution, he has the status of, and
    is entitled to all remedies available to, a creditor of the limited partnership
    with respect to the distribution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.36
- number: '1782.37'
  heading: Restricting distributions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) A limited partnership shall not make a distribution to a partner to the
    extent that at the time of the distribution, after giving effect to the distribution,
    all liabilities of the limited partnership, other than liabilities to partners
    on account of their partnership interests and liabilities for which the recourse
    of creditors is limited to specified property of the limited partnership, exceed
    the fair value of the assets of the limited partnership. The fair value of the
    property that is subject to a liability for which the recourse of creditors is
    limited shall be included in the assets of the limited partnership only to the
    extent that the fair value of that property exceeds that liability.

    (B) A limited partner who receives a distribution in violation of division (A)
    of this section and who knew at the time of the distribution that the distribution
    violated division (A) of this section shall be liable to the limited partnership
    for the amount of the distribution. A limited partner who receives a distribution
    in violation of division (A) of this section and who did not know at the time
    of the distribution that the distribution violated division (A) of this section
    shall not be liable under this section for the amount of the distribution.

    (C) No action shall be brought upon any cause of action arising under division
    (B) of this section at any time after three years from the date of the distribution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.37
- number: '1782.39'
  heading: Partnership interest is personal property
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: A partnership interest is personal property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.39
- number: '1782.40'
  heading: Partnership interest - assignable in whole or in part
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'Except as otherwise provided in the partnership agreement, a partnership
    interest is assignable in whole or in part.

    An assignment of a partnership interest does not dissolve a limited partnership
    or entitle the assignee to become, or to exercise any rights of, a partner. An
    assignment entitles the assignee to receive to the extent assigned such distributions
    of cash and other property and such allocations of profits, losses, income, gains,
    deductions, credits, or similar items to which the assignee''s assignor would
    have been entitled. Except as otherwise provided in the partnership agreement,
    an assignor ceases to be a partner upon assignment of all of the assignor''s partnership
    interest. Unless otherwise provided in a partnership agreement and except to the
    extent assumed by agreement, until an assignee of a partnership interest becomes
    a partner, the assignee shall have no liability as a partner solely as a result
    of the assignment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.40
- number: '1782.41'
  heading: Judgment creditor of partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) On application to a court of common pleas by any judgment creditor of
    a partner, the court may charge the partnership interest of the indebted partner
    with payment of the unsatisfied amount of the judgment with interest. To the extent
    so charged, the judgment creditor shall have only the rights of an assignee of
    the partnership interest.

    (B) Nothing in this chapter shall be held to deprive a partner of his statutory
    exemption.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.41
- number: '1782.42'
  heading: Assignee may become limited partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) An assignee of a partnership interest, including an assignee of a general
    partner, may become a limited partner if, and to the extent that, either of the
    following occurs:

    (1) The assignor gives the assignee that right in accordance with authority described
    in the partnership agreement;

    (2) All other partners consent.

    (B) An assignee who has become a limited partner has, to the extent assigned,
    the rights and powers, and is subject to the restrictions and liabilities, of
    a limited partner under the partnership agreement and this chapter. An assignee
    who becomes a limited partner also is liable for the obligations of his assignor
    to make and return contributions as provided in sections 1782.31 to 1782.37 of
    the Revised Code. The assignee is not obligated for liabilities that could not
    be ascertained from a written partnership agreement and that were unknown to the
    assignee at the time he became a limited partner.

    (C) Regardless of whether an assignee of a partnership interest becomes a limited
    partner, the assignor is not released from his liability to the limited partnership
    under sections 1782.14 and 1782.28 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.42
- number: '1782.43'
  heading: Rights of legal representative of partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: 'If a partner who is an individual dies or is adjudged by a court to be an
    incompetent, as defined in section 2111.01 of the Revised Code, the partner''s
    executor, administrator, guardian, or other legal representative may exercise
    all the rights of the partner for the purpose of settling his estate or administering
    his property, including any power the partner had to give an assignee the right
    to become a limited partner.

    If a partner is a partnership, trustee, fiduciary other than a trustee, executor,
    or administrator, corporation, association, or other entity and if the partnership,
    trust, corporation, association, or entity is dissolved or terminated, the powers
    of the partner may be exercised by its legal representative or successor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.43
- number: '1782.431'
  heading: Merger or consolidation - domestic limited partnership
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: '(A) Pursuant to an agreement of merger between the constituent entities as
    provided in this section, a domestic limited partnership and one or more additional
    domestic limited partnerships or other domestic or foreign entities may be merged
    into a surviving domestic limited partnership. Pursuant to an agreement of consolidation
    between the constituent entities as provided in this section, two or more domestic
    or foreign entities may be consolidated into a new domestic limited partnership
    formed by such consolidation. If any constituent entity is formed or organized
    under the laws of any state other than this state or under any chapter of the
    Revised Code other than this chapter, the merger or consolidation also must be
    permitted by the chapter of the Revised Code under which each domestic constituent
    entity exists and by the laws under which each foreign constituent entity exists.

    (B) The agreement of merger or consolidation shall set forth all of the following:

    (1) The name and the form of entity of each constituent entity and the state under
    the laws of which each constituent entity exists;

    (2) In the case of a merger, that one or more specified constituent entities will
    be merged into a specified surviving domestic limited partnership, and, in the
    case of a consolidation, that the constituent entities will be consolidated into
    a new domestic limited partnership;

    (3) All statements and matters required to be set forth in such an agreement of
    merger or consolidation by the laws under which each constituent entity exists;

    (4) In the case of a consolidation, the partnership agreement of the new domestic
    limited partnership or a provision that the written partnership agreement of a
    specified constituent limited partnership, a copy of which shall be attached to
    the agreement of consolidation, with any amendments that are set forth in the
    agreement of consolidation shall be the agreement of limited partnership of the
    new domestic limited partnership;

    (5) In the case of a consolidation, the name and address of the statutory agent
    upon whom any process, notice, or demand against any constituent entity or the
    new domestic limited partnership may be served;

    (6) In the case of a merger, any changes in the general partners of the surviving
    domestic limited partnership and, in the case of a consolidation, the general
    partners of the new domestic limited partnership or a provision specifying the
    general partners of one or more specified constituent partnerships that shall
    constitute the initial general partners of the new domestic limited partnership;

    (7) The terms of the merger or consolidation; the mode of carrying them into effect;
    and the manner and basis of converting the interests or shares in the constituent
    entities into, or substituting the interests or shares in the constituent entities
    for, interests, shares, evidences of indebtedness, other securities, cash, rights,
    or any other property or any combination of interests, shares, evidences of indebtedness,
    securities, cash, rights, or any other property of the surviving domestic limited
    partnership, of the new domestic limited partnership, or of any other entity.
    No such conversion or substitution shall be effected if there are reasonable grounds
    to believe that the conversion or substitution would render the surviving or new
    domestic limited partnership unable to pay its obligations as they become due
    in the usual course of its affairs.

    (C) The agreement of merger or consolidation also may set forth any of the following:

    (1) The effective date of the merger or consolidation, which date may be on or
    after the date of the filing of the certificate of merger or consolidation;

    (2) A provision authorizing one or more of the constituent entities to abandon
    the proposed merger or consolidation prior to filing the certificate of merger
    or consolidation pursuant to section 1782.433 of the Revised Code by action of
    the general partners of a constituent partnership, the directors of a constituent
    corporation, or the comparable representatives of any other constituent entity;

    (3) In the case of a merger, any amendments to the agreement of limited partnership
    of the surviving domestic limited partnership, or a provision that the written
    partnership agreement of a specified constituent limited partnership other than
    the surviving domestic limited partnership, with any amendments that are set forth
    in the agreement of merger, shall be the partnership agreement of the surviving
    domestic limited partnership;

    (4) A statement of, or a statement of the method of determining, the fair value
    of the assets to be owned by the surviving or new domestic limited partnership;

    (5) The parties to the agreement of merger or consolidation in addition to the
    constituent entities;

    (6) Any additional provision necessary or desirable with respect to the proposed
    merger or consolidation.

    (D) To effect the merger or consolidation, the agreement of merger or consolidation
    shall be adopted by the general partners of each constituent domestic limited
    partnership and by the limited partners of each constituent domestic limited partnership,
    other than the surviving domestic limited partnership in the case of a merger,
    and shall be adopted by or otherwise authorized by or on behalf of each other
    constituent entity in accordance with the laws under which it exists. In the case
    of a merger, the agreement of merger also shall be adopted by the limited partners
    of the surviving domestic limited partnership if either of the following conditions
    exist:

    (1) The partnership agreement requires such approval or adoption;

    (2) The agreement of merger makes any change to the partnership agreement then
    in effect or authorizes any action that, if it were made or authorized apart from
    the merger, would require such approval or adoption.

    (E) All partners, whether or not they are entitled to vote or act, shall be given
    written notice of any meeting of limited partners of a constituent domestic limited
    partnership or of any proposed action by limited partners of a constituent domestic
    limited partnership, which meeting or action is to adopt an agreement of merger
    or consolidation. The notice shall be given to the partners either by mail at
    their addresses as they appear on the records of the partnership or in person
    and, unless the partnership agreement provides a shorter or longer period, shall
    be given not less than seven and not more than sixty days before the meeting or
    the effective date of the action. The notice shall be accompanied by a copy or
    a summary of the material provisions of the agreement of merger or consolidation.

    (F) The vote or action of the general partners of a constituent domestic limited
    partnership that is required to adopt an agreement of merger or consolidation
    is the unanimous vote or action of the general partners or such different number
    or proportion as the partnership agreement may provide. The vote or action of
    the limited partners of a constituent domestic limited partnership that is required
    to approve or adopt an agreement of merger or consolidation is the unanimous vote
    or action of the limited partners or such different number or proportion as the
    partnership agreement may provide. If the agreement of merger or consolidation
    would have an effect or authorize any action that under any applicable provision
    of law or the partnership agreement could be effected or authorized only by or
    pursuant to a specified vote or action of partners, or of any class or group of
    partners, the agreement of merger or consolidation also must be adopted or approved
    by the same vote or action as would be required to effect that change or authorize
    that action. Each person who will continue to be or who will become a general
    partner of a partnership that is the surviving or new entity in a merger or consolidation
    shall specifically agree to continue or to become, as the case may be, a general
    partner of the partnership that is the surviving or new entity.

    (G) At any time before the filing of the certificate of merger or consolidation
    pursuant to section 1782.433 of the Revised Code, the merger or consolidation
    may be abandoned by the general partners of any constituent partnership, the directors
    of any constituent corporation, or the comparable representatives of any other
    constituent entity if the general partners, directors, or other representatives
    are authorized to do so by the agreement of merger or consolidation or by the
    same vote or action as was required to adopt the agreement of merger or consolidation.
    The agreement of merger or consolidation may contain a provision authorizing the
    general partners of any constituent partnership, the directors of any constituent
    corporation, or the comparable representatives of any other constituent entity
    to amend the agreement of merger or consolidation at any time before the filing
    of the certificate of merger or consolidation, except that, after the adoption
    of the agreement of merger or consolidation by the limited partners of any constituent
    domestic limited partnership, the general partners shall not be authorized to
    amend the agreement of merger or consolidation to do any of the following:

    (1) Alter or change the amount or kind of interests, shares, evidences of indebtedness,
    other securities, cash, rights, or any other property to be received by limited
    partners of the constituent domestic limited partnership in conversion of, or
    in substitution for, their interests;

    (2) Alter or change any term of the partnership agreement of the surviving or
    new domestic limited partnership, except for alterations or changes that could
    otherwise be adopted by the general partners of the surviving or new domestic
    limited partnership;

    (3) Alter or change any other terms and conditions of the agreement of merger
    or consolidation if any of the alterations or changes, alone or in the aggregate,
    would materially adversely affect the limited partners or any class or group of
    limited partners of the constituent domestic limited partnership.'
