- number: '1743.01'
  heading: Building maintenance corporations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: 'When a corporation organized under the laws of this state and having a capital
    stock, including museum, park, pond, or rink companies, is organized for the purpose
    of erecting and maintaining a building any part of which is intended to be occupied
    by two or more incorporated companies not having a capital stock, including incorporated
    religious, scientific, and beneficial associations, as a lodge room, chapel, or
    regular place of meeting for their members, such two or more incorporated companies
    may each subscribe for, purchase, or become the owner, by donation or otherwise,
    of all or part of the capital stock of such corporation organized for the purpose
    of erecting and maintaining such building.

    Each of such incorporated companies is liable in its corporate capacity on the
    shares so subscribed, purchased, and owned by it, in the same manner and to the
    same extent as an individual is liable on shares of stock held by him.

    When two or more of such incorporated companies subscribe for, purchase, or own
    all the capital stock of such corporation organized for the purpose of erecting
    and maintaining such building, each of such two or more incorporated companies
    shall elect three members of its company to act as directors of such corporation
    as soon as all the stock thereof is subscribed and ten per cent is paid thereon,
    and thereafter, at such corporation''s first stated meeting in January of each
    year, shall elect three of its directors. Such directors and their successors
    in office shall comprise the board of directors of such corporation, and have
    all the powers conferred by law on the directors of incorporated companies having
    a capital stock. The directors need not be the owners or holders of capital stock
    in such corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.01
- number: '1743.02'
  heading: Common carrier companies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: 'A corporation organized as a common carrier company may:

    (A) Make all contracts lawful for natural persons to make for the carriage of
    persons and for the storage, forwarding, carriage, and delivery of property, but
    subject to the liabilities of natural person;

    (B) Lease, hold, and operate any line of railway and its appendages, before or
    after its completion, owned by a municipal corporation of this state, any railway
    connecting therewith lying without this state, and such portion of any railway
    within this state as is necessary for the business of such common carrier company;

    (C) Construct, or complete and equip, any railway which it is authorized to lease,
    and the appendages of such railway;

    (D) If it operates a steam railroad, borrow money, not exceeding its authorized
    capital stock, at a rate of interest not exceeding seven and three-tenths per
    cent per annum; execute bonds or promissory notes therefor, payable in lawful
    money, in sums of not less than one hundred dollars; secure payment of such bonds
    or notes by mortgage or pledge of its property then owned or thereafter acquired
    and of its income or franchises, including the franchise to be a corporation,
    though no such mortgage bond shall be sold at less than par in lawful money, without
    the consent of a majority in interest of the stockholders, given at a meeting
    of the stockholders or in writing; and exercise all other powers of a railroad
    company under the laws of this state, including the right of appropriation.

    Any company incorporated or organized in this state may subscribe for or become
    the owner of stock in such corporation; but before such subscription can be made,
    the board of directors of the company subscribing must be authorized to make it
    by a vote of the majority in interest of such subscribing company''s stockholders,
    or must obtain their consent thereto in writing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.02
- number: '1743.03'
  heading: Companies for protecting and preserving dead bodies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: Any association organized for the purpose of preserving and protecting bodies
    of deceased persons before burial may take, by purchase, devise, or gift, and
    may hold and convey, real estate not exceeding one acre of land, and may erect
    thereon suitable buildings and construct and maintain vaults and such other appliances
    as are necessary to carry out its objects. Such property shall be exempt from
    execution, from taxation, and from being appropriated to any other public purpose,
    if used exclusively for the purpose described in this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.03
- number: '1743.04'
  heading: Corporations designated as home for aged and indigent persons
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: A corporation designated as a home for aged and indigent persons, in addition
    to other property which it is allowed by law to hold, may take by purchase, gift,
    or devise, and may hold, use, dispose of, and convey, any property convenient
    for the use of the corporation or for the investment of its funds. No part of
    such property or of the income thereof shall be used for any purpose other than
    providing a suitable asylum, the support and maintenance of such asylum, and the
    support and maintenance of such aged and indigent persons as are admitted into
    it under its bylaws.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.04
- number: '1743.05'
  heading: Corporations organized for care of deaf and dumb persons
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: 'Any corporation organized for the purpose of providing a home for deaf persons
    may enter into a contract with the board of county commissioners of any county,
    or with the proper officers of any municipal infirmary, for the care and maintenance
    in such home of any deaf person who is an inmate of the county home or of such
    municipal infirmary, or who is entitled to admission thereto. In every such case
    the county home or municipal infirmary, during the period the person remains in
    such home for deaf persons, shall pay to such corporation, annually, a sum equal
    to the per capita cost of maintaining inmates in the county home or municipal
    infirmary.

    When any deaf person is maintained in a county home or municipal infirmary, and
    in the judgment of the county department of job and family services should be
    removed to a home incorporated to provide a home for deaf persons, such department
    may order the removal of the person from the county home or municipal infirmary
    to such home. The transportation of the person to such home and the person''s
    maintenance shall be paid for by the board of county commissioners or the proper
    officers of the municipal infirmary.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.05
- number: '1743.06'
  heading: Corporations for preservation of public parks and memorial sites
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: 'Any incorporated association having for its purpose the preservation of public
    parks and memorial sites may acquire and hold in perpetuity, for memorial purposes
    for the free use and benefit of the public, any real estate in this state which
    is the site or scene of any battle or other engagement in behalf of or in defense
    of the government of the United States or of this state or which has been used
    or set apart for the burial of American soldiers.

    In the event that such association and any owner of real estate sought to be acquired
    by it are unable to agree upon the price to be paid for such real estate, the
    association may acquire it in the manner provided by sections 163.01 to 163.22,
    inclusive, of the Revised Code.

    The association may improve any such real estate held by it and may prescribe
    reasonable regulations for the use of such real estate by the public.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.06
- number: '1743.07'
  heading: Corporations for preservation of historic and prehistoric sites or monuments
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: Any incorporated association or society maintained by and operating on behalf
    of the state for the preservation of historic or prehistoric sites or monuments,
    the exploration, examination, improvement, or preservation of such sites or monuments
    for educational, scientific, or memorial purposes, or the collecting of relics
    or artifacts therefrom and the placing of such relics or artifacts in a public
    museum, may acquire and hold any real estate in this state which is the site of
    an historic event, building, structure, canal, cemetery, monument, spring, tree,
    stone, or other natural or artificial object; which is the site of any historic
    or prehistoric mound, earth works, stone works, occupation, burial site, rock
    carving, inscribed rock, cache, hoarding pit, or cave or rock shelter when such
    cave or rock shelter can be proved to have been occupied or used by aborigines;
    or which is any site or area established by scientific exploration or historical
    record as having been occupied or created by aborigines. Such incorporated association
    may also acquire any property, immediately adjoining any such real estate, which
    is necessary for any such educational, scientific, or memorial purposes or for
    the accommodation of the public in visiting such historic site, object, or place,
    or which is essential to the carrying out of the purpose for which the park, reserve,
    or memorial was created. In the event that such incorporated association or society
    and any owner or holder of such real estate sought to be acquired by it are unable
    to agree upon the price to be paid for such real estate, or that such owner or
    holder cannot be located, such association or society may acquire such real estate
    in accordance with sections 163.01 to 163.22, inclusive, of the Revised Code.
    Such proceedings shall be instituted in the name of the state and the attorney
    general shall represent the state therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.07
- number: '1743.08'
  heading: Elevator companies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: 'A company or association organized as an elevator company may purchase and
    hold real and personal estate; may erect, purchase, and own the necessary buildings,
    offices, and machinery for carrying on the business of receiving, storing, delivering,
    and forwarding grain of all kinds; and may add to and connect with this the business
    of a general storage warehouse or forwarders of all kinds of produce and merchandise.
    It shall not deal as buyer or seller on its own account or for others. In the
    prosecution of its business it shall be governed by the same laws, not inconsistent
    with this section, as govern individuals in such employment.

    When such company erects or owns an elevator building, and uses it for the purpose
    of receiving or delivering grain from or to any railroad company, as freight carried
    or to be carried over any part of its railroads, such railroad company may subscribe
    to or purchase shares in the elevator company''s capital stock, to an amount not
    exceeding one third of the entire capital stock of the elevator company, in the
    name of an officer of the railroad company, and hold it as trustee. The railroad
    company is liable upon such stock, in its corporate capacity, to the same extent
    and in the manner a natural person buying it would be.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1743.08
- number: '1743.09'
  heading: Fishery companies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: 'When a company organized for the purpose of propagating fish and establishing
    fisheries in this state acquires the right to use any stream, canal, or reservoir
    from the owner of the land adjoining thereto, for the establishment of a fishery
    to be owned, maintained, and used for the purpose of propagating fish, no person
    shall fish from such stream, canal, or reservoir without first obtaining authority
    from such company. A person who violates this section shall be liable to such
    company in trespass, and to the fines authorized by law against persons trespassing
    upon lands.

    The navigable streams and public canals in this state are not subject to this
    section, and this section does not cut off the privilege of any person to use
    or fish from any lake, river, stream, or reservoir which by custom has been used
    for fishing.'
