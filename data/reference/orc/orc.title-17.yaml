- number: '1701.14'
  heading: Issuance of shares and release of obligation of subscriber
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: 'Except as otherwise provided by law, the articles, or the regulations, the
    directors of a corporation may:

    (A) Determine the time when, the terms under which, and the considerations for
    which the corporation issues, disposes of, or receives subscriptions for, its
    shares, including treasury shares;

    (B) Determine, subject to the limitations provided in section 1701.35 of the Revised
    Code in the case of purchase of shares by the corporation, whether and upon what
    terms the obligation of any subscriber for shares shall be released, settled,
    or compromised.'
