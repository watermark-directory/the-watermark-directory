  url: https://codes.ohio.gov/ohio-revised-code/section-1706.46
- number: '1706.461'
  heading: Appeals
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A)(1) A limited liability company or foreign limited liability company may
    appeal a cancellation under division (L) of section 1706.09 of the Revised Code
    within thirty days after the effective date of the cancellation. The appeal shall
    be made to one of the following:

    (a) The court of common pleas of the county in which the street address of the
    limited liability company or foreign limited liability company''s principal office
    is located;

    (b) If the limited liability company or foreign limited liability company has
    no principal office in this state, to the court of common pleas of the county
    in which the street address of its statutory agent is located;

    (c) If the limited liability company or foreign limited liability company has
    no statutory agent, to the Franklin county court of common pleas.

    (2) The limited liability company or foreign limited liability company shall commence
    its appeal by petitioning the appropriate court to set aside the cancellation
    or to determine that the limited liability company or foreign limited liability
    company has cured the grounds for cancellation and attaching to the petition copies
    of those records of the secretary of state as may be relevant.

    (B) The appropriate court may take, or may summarily order the secretary of state
    to take, whatever action the court considers appropriate.

    (C) The appropriate court''s order or decision may be appealed as in any other
    civil proceeding.'
