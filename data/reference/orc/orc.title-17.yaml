    name: Agricultural Societies and Fairgrounds
  text: If a county agricultural society desires to sell its site in order to purchase
    another, or if for any reason such site is unfit or insufficient for the purposes
    for which it is used, and if at a regular meeting of such society's board of directors,
    by a vote, upon a call of the yeas and nays, of at least a majority of all the
    members of such board, it adopts a resolution for the purpose of securing the
    benefits of this section, and in such resolution declares that it desires to sell
    such site in order to buy another, or that the site has become unfit or insufficient,
    and that it is for the best interests of the society and the county that such
    site be sold or leased and a new one bought or leased, then the society may sell
    or lease such old site and buy or lease a new one for holding county fairs; but
    in cases where the county paid all or any portion of the purchase money for the
    site to be sold or leased, the written consent of the board of county commissioners
    shall first be given to such sale or lease. Within thirty days after the adoption
    of such resolution, such board of directors shall give notice in writing to the
    board of county commissioners of such county of the adoption of such resolution
    declaring the necessity of selling or leasing such site and of buying or leasing
    a new site, which notice shall contain or have annexed to it a certified copy
    of the resolution, signed by the president and the secretary of such board of
    directors.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.25
- number: '1711.26'
  heading: Authority to sell or exchange site
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) A county agricultural society or independent agricultural society may
    sell any part of the premises that are used by the society as a site on which
    to hold annual exhibitions or exchange any part thereof for other lands if such
    premises are in the possession or under the control of the society and either
    of the following apply:

    (1) The premises are greater in size than is necessary for the purposes to which
    they are devoted.

    (2) The premises are not suitable in their formation or character for the purposes
    to which they are devoted.

    (B) If the title to the premises described in division (A) of this section is
    held by the county, the board of county commissioners may sell any part of the
    premises or exchange any part thereof for other lands if division (A)(1) or (2)
    of this section applies. The board shall notify the applicable society of its
    intention to make such a sale or exchange. The board shall provide the notice
    in writing fourteen days prior to the sale or exchange.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.26
- number: '1711.27'
  heading: Contracts for purchase or lease of new site by county society
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: When a county agricultural society has given notice to the board of county
    commissioners as provided in section 1711.25 of the Revised Code and has selected,
    or secured options for the purchase or lease of, a new site for holding county
    fairs in the county, its board of directors shall immediately give notice of all
    such facts to the board of county commissioners. Such notice, if the old site
    is sold or leased before the purchase or lease of the new one, shall state the
    amount for which it was sold or leased, the amount of money necessary to acquire
    the new site, and the terms of the purchase or lease of the new site, together
    with a full description of the parcels of land included in the new site and of
    any improvements thereon. After the filing of such notice, the board of county
    commissioners may carry into effect any contract which such society has made for
    the purchase or lease of the new site.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.27
- number: '1711.28'
  heading: Payment for new site with county funds or bonds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: Payment for the new site purchased or leased for the use of a county agricultural
    society under sections 1711.25 and 1711.27 of the Revised Code and for improvements
    thereon may be made by the board of county commissioners from any unappropriated
    funds in the county treasury at the time such payment is to be made. If no such
    funds are then in such treasury, the board may issue the bonds of the county for
    such amounts as are necessary for such payment; but if the old site is sold or
    leased before the new site is purchased or leased, such society, before such bonds
    are issued, shall apply the moneys realized from the sale or lease of the old
    site to such payment. If the old site is sold or leased after the purchase or
    lease of the new site, the amounts realized from the sale or lease of the old
    site shall be placed to the credit of the sinking fund for the redemption of any
    such bonds that have been issued. Such bonds shall bear not more than five per
    cent interest per annum payable semiannually, shall not be sold at less than their
    par value, and shall be payable at such place and times and in such denominations
    as the board determines.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.28
- number: '1711.29'
  heading: Levy for payment of bonds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: To provide for the payment of bonds issued under section 1711.28 of the Revised
    Code and interest thereon, the board of county commissioners may levy such annual
    taxes on all the taxable property of the county as are necessary to provide a
    sinking fund for the redemption of the bonds at maturity and the payment of interest
    accruing thereon. Such levy shall be collected and accounted for to the county
    treasurer in the manner provided for the collection of other taxes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.29
- number: '1711.30'
  heading: Election on question of issuing bonds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'Before issuing bonds under section 1711.28 of the Revised Code, the board
    of county commissioners, by resolution, shall submit to the qualified electors
    of the county at the next general election for county officers, held not less
    than ninety days after receiving from the county agricultural society the notice
    provided for in section 1711.25 of the Revised Code, the question of issuing and
    selling such bonds in such amount and denomination as are necessary for the purpose
    in view, and shall certify a copy of such resolution to the county board of elections.

    The county board of elections shall place the question of issuing and selling
    such bonds upon the ballot and make all other necessary arrangements for the submission,
    at the time fixed by such resolution, of such question to such electors. The votes
    cast at such election upon such question must be counted, canvassed, and certified
    in the same manner, except as provided by law, as votes cast for county officers.
    Fifteen days'' notice of such submission shall be given by the county board of
    elections, by publication once a week for two consecutive weeks in a newspaper
    of general circulation in the county or as provided in section 7.16 of the Revised
    Code, stating the amount of bonds to be issued, the purpose for which they are
    to be issued, and the time and places of holding such election. If the resolution
    proposes the levy of a tax under section 1711.29 of the Revised Code, the notice
    shall include the rate of the tax in both mills for each one dollar of taxable
    value and in dollars for each one hundred thousand dollars of the county auditor''s
    market value.

    The question must be stated on the ballot as follows: "For the issue of county
    fair bonds, yes"; "For the issue of county fair bonds, no."

    If the resolution proposes the levy of a tax under section 1711.29 of the Revised
    Code, the question appearing on the ballot shall include the rate of the tax in
    both mills for each one dollar of taxable value and in dollars for each one hundred
    thousand dollars of the county auditor''s market value.

    If the majority of those voting upon the question of issuing the bonds vote in
    favor thereof, then and only then shall they be issued and the tax provided for
    in section 1711.29 of the Revised Code be levied.

    As used in this section, "the county auditor''s market value" has the same meaning
    as in section 5705.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.30
- number: '1711.31'
  heading: Control of lands when title vested in county commissioners - division of
    moneys when land appropriated for another public purpose
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'When the title to grounds and improvements occupied by an agricultural society
    is in the board of county commissioners, the control and management of such lands
    and improvements shall be vested in the board of directors of such society so
    long as they are occupied by it and used by it for holding agricultural fairs.

    When the title to such grounds or improvements, or any part thereof, is appropriated
    for another public purpose or sold to an agency which has the power to so appropriate,
    if such society notifies the county commissioners of an intention to proceed under
    section 1711.25 to 1711.32, inclusive, of the Revised Code, to replace such property,
    the moneys shall be divided between the county and the society in accordance with
    the respective values of the interest of each in such property, as determined
    by agreement of the parties or pursuant to section 163.18 of the Revised Code.
    Each share of such moneys shall be held by the respective party solely for use
    in replacement of its respective interest in such property notwithstanding any
    limitations on expenditures otherwise provided in Chapter 1711. of the Revised
    Code.

    Moneys realized by the society in holding county fairs and from renting or leasing
    all or part of the grounds and buildings for the conduct of fairs or otherwise,
    over and above the necessary expenses thereof, shall be paid into the treasury
    of the society and used as a fund for keeping such grounds and buildings in good
    order and repair and for making other improvements deemed necessary by the society''s
    directors.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.31
- number: '1711.32'
  heading: Execution of conveyance of fairgrounds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: Conveyances of grounds sold under section 1711.25 of the Revised Code, which
    are owned exclusively by any county agricultural society, may be executed by the
    president of such society, as such. Grounds owned partly by such a society and
    partly by the county may be conveyed by deed executed by the president of the
    society, as such, and by the board of county commissioners.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.32
- number: '1711.33'
  heading: Encumbering of fairgrounds partly owned by county
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) When a board of county commissioners pays or has paid money out of the
    county treasury for the purchase of real estate as a site for the holding of fairs
    by a county agricultural society, the society shall not incur any debt, by mortgage
    or otherwise, without the consent of the board, entered upon its journal.

    (B) With respect to real estate debt for which consent is obtained under division
    (A) of this section, a society may encumber such real estate, in order to pay
    the cost of necessary repairs and improvements thereon, up to an amount not exceeding
    fifty per cent of its value. In order to ascertain the value of such real estate
    the board shall appoint three disinterested freeholders who are residents of the
    county to appraise such real estate. The appraisers so appointed shall, within
    ten days after their appointment, upon actual view of such real estate, appraise
    it and return such appraisement under oath to the board. The appraisement so made
    shall be considered the value of such real estate for the purpose of mortgage
    or other encumbrance.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.33
- number: '1711.34'
  heading: Purchase of additional fairgrounds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: If the law makes it the duty of the board of county commissioners to purchase
    additional fairgrounds for the use of a county agricultural society, the board
    of directors of such society shall prosecute the proceedings for appropriation
    to their final conclusion, except as to payment of purchase money, before the
    board of county commissioners can be called upon to act in the matter. Then the
    board of county commissioners shall make such payment or deposit, not above fifteen
    thousand dollars in amount, as such board of directors or the court having jurisdiction
    in such proceedings requires, and delay by the board of county commissioners in
    so doing shall not prevent such purchase or appropriation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.34
- number: '1711.35'
  heading: Special constables
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: 'On the application of a state, county, township, or independent agricultural
    society, of an industrial association, or of any other association or meeting
    of citizens for the purpose of promoting social or literary intercourse, a judge
    of a county court or judge of a municipal court having jurisdiction may appoint
    a suitable number of special constables to assist in keeping the peace during
    the time when such society or assembly is holding its annual fair or meeting.
    He shall make an entry in his docket of the number and names of all persons so
    appointed.

    Constables so appointed have all the power of constables to suppress riots, disturbances,
    and breaches of the peace. Upon view they may arrest any person guilty of a violation
    of any law of the state, and pursue and arrest any person fleeing from justice
    in any part of the state. They may apprehend any person in the act of committing
    an offense; on reasonable information, supported by affidavit, they may procure
    process for the arrest of any person charged with a breach of the peace and forthwith
    bring him before a competent authority; and they may enforce all laws for the
    preservation of order.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.35
- number: '1711.99'
  heading: Penalty
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) Whoever violates section 1711.11 of the Revised Code shall be fined not
    less than one hundred nor more than five hundred dollars.

    (B) Whoever violates section 1711.12 of the Revised Code shall be fined not less
    than ten nor more than fifty dollars.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1711.99
- number: '1713.01'
  heading: Institution defined
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'As used in sections 1713.01 to 1713.06 of the Revised Code, "institution"
    includes:

    (A) Any nonprofit university, college, academy, school, or other institution,
    incorporated or unincorporated, that does any of the following:

    (1) Awards or intends to award diplomas for the completion of a course designed
    to prepare students to be eligible for certification as registered nurses;

    (2) Offers or intends to offer instruction in the arts and sciences, teacher education,
    business administration, engineering, philosophy, literature, fine arts, law,
    medicine, nursing, social work, theology and other recognized academic and professional
    fields of study, and awards or intends to award degrees for fulfilling requirements
    of academic work beyond high school;

    (3) Offers or intends to offer a course or courses in any of the areas described
    by division (A)(1) or (2) of this section that are applicable to requirements
    for a diploma or degree named in either such division.

    (B) Any college, university, or school that offers or intends to offer one or
    more courses in this state of the type described in division (A) of this section
    and that is operated by another state or a subdivision or other governmental entity
    of another state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.01
- number: '1713.02'
  heading: Certificate of authorization
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: '(A) Any institution described in division (A) of section 1713.01 of the Revised
    Code may become incorporated under sections 1702.01 to 1702.58 of the Revised
    Code.

    (B) Except as provided in division (E) of this section, no nonprofit institution
    or corporation of the type described in division (A) of section 1713.01 of the
    Revised Code that is established after October 13, 1967, may confer degrees, diplomas,
    or other written evidences of proficiency or achievement, until it has received
    a certificate of authorization issued by the chancellor of higher education, nor
    shall any such institution or corporation identify itself as a "college" or "university"
    unless it has received a certificate of authorization from the chancellor.

    (C) Except as provided in division (E) of this section, no institution of the
    type described in division (A)(3) or (B) of section 1713.01 of the Revised Code
    that intends to offer or offers a course or courses within this state, but that
    did not offer a course or courses within this state on or before October 13, 1967,
    may confer degrees, diplomas, or other written evidences of proficiency or achievement
    or offer any course or courses within this state until it has received a certificate
    of authorization from the chancellor, nor shall the institution identify itself
    as a "college" or "university" unless it has received such a certificate from
    the chancellor.

    (D) Each certificate of authorization shall specify the diplomas or degrees authorized
    to be given, courses authorized to be offered, and the sites at which courses
    are to be conducted. A copy of such certificate shall be filed with the secretary
    of state if the institution is incorporated. Any institution or corporation established
    or that offered a course or courses of instruction in this state prior to October
    13, 1967, may apply to the chancellor for a certificate of authorization, and
    the chancellor shall issue a certificate if it finds that such institution or
    corporation meets the requirements established pursuant to sections 1713.01, 1713.02,
    1713.03, 1713.04, 1713.06, 1713.09, and 1713.25 of the Revised Code.

    (E) An institution that clearly identifies itself in its name with the phrase
    "bible college" or "bible institute" and has not received a certificate of authorization
    may confer diplomas and other written evidences of proficiency or achievement
    other than associate, baccalaureate, master''s, and doctoral degrees or any other
    type of degree and may identify itself as a "bible college" if such institution:

    (1) Prominently discloses on any transcripts, diplomas, or other written evidences
    of proficiency or achievement, and includes with any promotional material or other
    literature intended for the public, the statement: "this institution is not certified
    by the department of higher education or the state of Ohio."

    (2) Limits its course of instruction to religion, theology, or preparation for
    a religious vocation, or is operated by a church or religious organization and
    limits its instruction to preparation for service to churches or other religious
    organizations.

    (3) Confers only diplomas and other written evidences of proficiency or achievement
    that bear titles clearly signifying the religious nature of the instruction offered
    by the institution.

    (F) Except as otherwise provided in section 3333.046 of the Revised Code, no school
    of the type described in division (E) of section 3332.01 of the Revised Code that
    intends to offer or offers a degree program within this state or solicits students
    within this state may confer a baccalaureate, master''s, or doctoral degree or
    solicit students for such degree programs until it has received both a certificate
    of authorization from the chancellor of higher education under this chapter and
    program authorization from the state board of career colleges and schools for
    such degree program under section 3332.05 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.02
- number: '1713.03'
  heading: Standards for certificate of authorization
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'The chancellor of higher education shall establish standards for certificates
    of authorization to be issued to institutions as defined in section 1713.01 of
    the Revised Code, to private institutions exempt from regulation under Chapter
    3332. of the Revised Code as prescribed in section 3333.046 of the Revised Code,
    and to schools holding certificates of registration issued by the state board
    of career colleges and schools pursuant to division (C) of section 3332.05 of
    the Revised Code. A certificate of authorization may permit an institution or
    school to award one or more types of degrees.

    The standards for a certificate of authorization may include, for various types
    of institutions, schools, or degrees, minimum qualifications for faculty, library,
    laboratories, and other facilities as adopted and published by the chancellor.
    The standards shall be adopted by the chancellor pursuant to Chapter 119. of the
    Revised Code.

    An institution or school shall apply to the chancellor for a certificate of authorization
    on forms containing such information as is prescribed by the chancellor. Each
    institution or school with a certificate of authorization shall file an annual
    report with the chancellor in such form and containing such information as the
    chancellor prescribes. The annual report shall include disclosure of any contract
    entered with an online program manager, as described in section 1713.032 of the
    Revised Code.

    The chancellor shall adopt a rule under Chapter 119. of the Revised Code establishing
    fees to pay the cost of reviewing an application for a certificate of authorization,
    which the institution or school shall pay when it applies for a certificate of
    authorization, and establishing fees, which an institution or school shall pay,
    for any further reviews the chancellor determines necessary upon examining an
    institution''s or school''s annual report.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.03
- number: '1713.031'
  heading: Review of application for certificate of authorization
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The chancellor of higher education shall review an application for a certificate
    of authorization from a school described in division (E) of section 3332.01 of
    the Revised Code within twenty-two weeks.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.031
- number: '1713.032'
  heading: Online program manager contracts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: '(A) As used in this section:

    (1) "Online program manager" means an entity that is not an institution of higher
    education as defined under "The Higher Education Act of 1965," 20 U.S.C. 1001,
    that enters into an agreement with a private institution of higher education to
    provide marketing and recruitment services and at least one additional service,
    including course design, technology, or faculty training, to support an online
    degree program.

    (2) "Private institution of higher education" means a private institution of higher
    education with a certificate of authorization, or seeking authorization, from
    the chancellor of higher education under Chapter 1713. of Revised Code.

    (B) If a private institution of higher education enters a contract with an online
    program manager, the institution shall ensure the contract is in compliance with
    relevant program standards and requirements.

    (C) A private institution of higher education that enters into a contract with
    an online program manager shall post on each online degree program web site it
    maintains that it utilizes an online program manager for services. The institution
    shall require the online program manager to identify itself when providing services
    to students.

    (D) A contract between a private institution of higher education and an online
    program manager is not a public record for purposes of section 149.43 of the Revised
    Code.

    (E) A private institution of higher education shall not permit an online program
    manager to control, make decisions regarding, administer, or disburse student
    financial aid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.032
- number: '1713.033'
  heading: Student record preservation plans
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'Each institution or school with a certificate of authorization issued under
    this chapter annually shall certify to the chancellor of higher education, on
    a date and in the form and manner determined by the chancellor, a plan to preserve
    student records indefinitely if the institution or school was to cease operations.
    The plan shall include the designation and signed confirmation of an official
    custodian of student records. If the chancellor determines it necessary, the chancellor
    may require an institution or school to produce an executed agreement with the
    designated custodian of student records, paid in full, to ensure the institution''s
    or school''s plan can be implemented.

    The chancellor may consult with the higher learning commission, the state board
    of career colleges and schools, and other appropriate entities to establish plans,
    processes, and procedures for institutions and schools to provide indefinite access
    to student records.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.033
- number: '1713.04'
  heading: Certificate subject to revocation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: A certificate of authorization provided for in section 1713.02 of the Revised
    Code is subject to revocation by the chancellor of higher education for cause
    pursuant to Chapter 119. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.04
- number: '1713.041'
  heading: Annual reporting requirements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: '(A) Each institution or school authorized to offer courses or degrees under
    a certificate of authorization annually shall provide to the chancellor of higher
    education all of the following:

    (1) Verification of current accreditation status and a copy of the most recent
    institutional report from the institution''s accrediting organization;

    (2) A plan to preserve student records indefinitely in the event of closure of
    the institution or discontinuation of service. The plan shall include a method
    by which students and alumni of the institution may retrieve student records by
    request. The plan also shall include a designation and signed confirmation of
    an official custodian of student records. Student records preserved under the
    plan shall include, but not be limited to:

    (a) Academic transcripts;

    (b) Financial aid documents;

    (c) International student forms;

    (d) Tax information.

    (3) The following program information:

    (a) A list of current degree programs offered by the institution in this state;

    (b) The results of any external degree program evaluations conducted in the last
    year;

    (c) A list of any degree programs that have been eliminated in the last year;

    (4) The latest financial statement for the most recent fiscal year compiled and
    audited by an independent certified public accountant, including any management
    letters provided by the independent auditor;

    (5) Any other information requested by the chancellor.

    (B) If an institution or school fails to submit the information required under
    division (A) of this section or if the chancellor finds that the information submitted
    under that division is insufficient, the chancellor may suspend, withdraw, or
    revoke an institution or school''s institutional authorization or a program''s
    authorization.

    (C) Each institution or school shall immediately notify the chancellor if the
    institution or school does any of the following:

    (1) Receives notice from the federal government or an institutional accrediting
    organization that the institution or school is subject to heightened reporting
    standards or special monitoring status, such as the United States department of
    education''s heightened cash monitoring process;

    (2) Receives preliminary or final accreditation findings;

    (3) Becomes the subject of an investigation by a government agency related to
    the institution''s academic quality, financial stability, or student consumer
    protection;

    (4) Fails to make any payments to applicable retirement systems;

    (5) Fails to make any scheduled payroll payments;

    (6) Fails to make any payments to vendors when due as a result of a cash deficiency
    or a substantial deficiency in the payment processing system of the institution;

    (7) Fails to make any scheduled payment of principal or interest for short- or
    long-term debt;

    (8) Makes budget revisions resulting in a substantially reduced ending fund balance
    or larger deficit;

    (9) Becomes aware of significant negative variance between the most recently adopted
    annual budget and actual revenues or expenses as projected at the end of the fiscal
    year.

    (D) A document received by the chancellor under division (C)(1), (2), or (3) of
    this section that is confidential under federal law is not subject to release
    under a public record request until such time as the document is released publicly
    by the appropriate entity. Further, financial documentation of the institution
    or school received by the chancellor under this section is not a public record
    under section 149.43 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.041
- number: '1713.05'
  heading: Rates for loans to students
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: '(A) As used in this section:

    (1) "College or university" means a nonprofit educational institution qualifying
    under division (A)(2) of section 1713.01 and holding a certificate of authorization
    issued under section 1713.02 of the Revised Code.

    (2) "Controlled entity" means a wholly owned subsidiary of a college or a university
    or a partnership in which a college or a university, or its wholly owned subsidiary,
    is the sole general partner.

    (3) "Student" means a person attending a college or university who borrows money
    or obtains credit from such college or university, or from a controlled entity
    of such college or university, to finance the costs of attending such college
    or university, and includes the parents, guardians, and spouse of the student.

    (B) Notwithstanding section 1343.01 of the Revised Code, a college or university,
    or a controlled entity of such college or university, may charge interest or finance
    charges on loans made or credit granted to a student for the student''s costs
    of attending such college or university at any rate or rates agreed upon or consented
    to by the student in any open accounts receivable, loan agreement, or promissory
    note, but not to exceed the maximum interest rate applicable to the federal Stafford
    loan program under 34 C.F.R. 682.202(a)(1). The chancellor of higher education
    shall adopt rules specifying a schedule for the certification of such maximum
    interest rate.

    (C) A college or university, or a controlled entity of such college or university,
    may charge students for the late payment of any costs of attending such college
    or university, including any payment under an agreement or note pursuant to division
    (B) of this section, at a rate not exceeding five per cent of any unpaid amount
    due and not paid per month for two months and not exceeding two per cent of such
    amount for subsequent months. A charge for a full month may be made for payments
    more than ten days late.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.05
- number: '1713.06'
  heading: Corporation may be restrained from exercise of its franchise
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'If any institution, school, or person confers degrees, diplomas, or other
    written evidences of proficiency or achievement or offers or intends to offer
    a course or courses in this state applicable to requirements for a diploma or
    degree without the certificate of authorization required by section 1713.02 of
    the Revised Code, the chancellor of higher education may, through the office of
    the attorney general, apply to the court of common pleas in the county in which
    such institution, school, or person is operating to restrain such institution,
    school, or person from the exercise of its franchise, if the institution, school,
    or person is a corporation, from the awarding of the degrees or diplomas the institution,
    school, or person is not authorized to award, and from offering any course or
    courses or enrolling any student in any course or courses it is not authorized
    to conduct.

    The chancellor may, through the office of the attorney general, petition the court
    of common pleas in the county in which the institution, school, or person is operating
    for an order enjoining the awarding of diplomas or degrees, the offering of courses,
    and the enrolling of students. The court may grant such injunctive relief upon
    a showing that the institution, school, or person named in the petition is awarding
    degrees or diplomas, offering courses applicable to requirements for such degrees
    or diplomas, or enrolling students in such courses to be offered in the state
    without receiving the appropriate certificate of authorization issued by the chancellor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.06
- number: '1713.07'
  heading: Institution may hold donated property in trust
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: A university, college, or academy, or the board of trustees thereof, may hold
    in trust any property devised, bequeathed, or donated to such institution, upon
    any specific trust consistent with the objects of such institution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.07
- number: '1713.08'
  heading: Faculty
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The president and professors shall constitute the faculty of any incorporated
    literary college or university. They may enforce the rules and regulations enacted
    by its board of trustees for the government and discipline of the students and
    may suspend and expel offenders.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.08
- number: '1713.09'
  heading: Location may be changed
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: A college, university, or other institution of learning, existing by virtue
    of an act of incorporation, or that becomes incorporated for any of the purposes
    specified in sections 1713.01 to 1713.39, inclusive, of the Revised Code, if three-fourths
    of the trustees or directors thereof deem it proper, or if the institution is
    owned in shares, or by stock subscribed or taken, by a vote of the holders of
    three-fourths of the stock or shares, may change the location of such institution,
    convey its real estate, and transfer the effects thereof, and invest them at the
    place to which such institution is removed. Any institution which has a certificate
    of authorization from the chancellor of higher education shall give written notice
    to the chancellor before such institution changes its location. No such removal
    shall be ordered, and no vote taken thereon, until after publication in the manner
    provided by law in case of a sale and distribution of the property of such an
    institution. Such publication shall fully set forth the place to which it is proposed
    to remove the institution. In case of removal, a copy of the proceedings of such
    meeting shall be filed with the secretary of state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.09
- number: '1713.10'
  heading: Endowment fund diverted
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The board of trustees of a corporation incorporated to create, hold, and manage
    a college endowment fund, the articles of incorporation of which provide that
    the fund may be applied to any object not inconsistent with the purposes of education
    different from that particularly specified therein, may apply to the court of
    common pleas in the county in which the corporation is located for permission
    to make such change, designating particularly the purposes to which it is proposed
    to apply the fund. On being satisfied that such change is not inconsistent with
    the object of the original creation and institution of the fund, the court shall
    authorize and sanction it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.10
- number: '1713.11'
  heading: Temporary loans secured by mortgage authorized
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The board of trustees of a college, university, academy, seminary, or other
    institution devoted to the promotion of education, in anticipation of donations
    to be received and collections to be made, for the purpose of constructing, enlarging,
    or adding to college buildings or improvements, may borrow such sum of money,
    upon such terms, and with such conditions as it determines necessary therefor,
    by temporary loans without mortgage or by the issue of bonds or notes and secure
    them by a mortgage upon the property on which such improvement is to be made,
    if the property is not held by it under some specific trust.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.11
- number: '1713.12'
  heading: Sections applicable to certain boards of trustees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The board of trustees of any university or college operating under the patronage
    of one or more conferences or other religious bodies of any religious denomination,
    may accept sections 1713.12 to 1713.21, inclusive, of the Revised Code, by resolution
    adopted at any regular meeting of the board, and entered upon the record of its
    proceedings. After such acceptance the board in all respects shall be organized,
    constituted, regulated, and perpetuated, pursuant to such sections. No right acquired
    by any such board, university, or college, under its charter or any law of this
    state, shall in any way be affected thereby.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.12
- number: '1713.13'
  heading: Trustees to be divided into classes - president ex-officio member - limitations
    and designations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The president of a university or college referred to in section 1713.12 of
    the Revised Code, shall, ex officio, be a member of the board of trustees after
    the acceptance of sections 1713.12 to 1713.21, inclusive, of the Revised Code,
    by any such university or college. At any of its meetings such board shall divide
    its number, not including such president, into classes, making one class for each
    conference or religious body at the time patronizing such university or college,
    one class for the alumni of such university or college, and one class of trustees
    at large. No class shall have more than ten members. Each conference or other
    religious body patronizing such university shall have the same number of trustees.
    The board may designate the number of trustees to be assigned to the alumni association
    and to the class of trustees at large, but the combined number of trustees apportioned
    to said patronizing conferences of other religious bodies shall constitute a majority
    of the entire board, not including the president.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.13
- number: '1713.14'
  heading: Term of office of trustees - vacancies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The regular term of office of the trustees referred to in section 1713.13
    of the Revised Code shall be five years, but upon the original formation of classes
    of trustees one or more trustees may be elected for one, two, three, and four-year
    terms until the regular order can be established. The term of office of an equal
    number of trustees in each class, as near as is possible, shall expire each year.
    Vacancies which occur in any class of trustees in any manner except by expiration
    of time shall be filled only for the remainder of the term, but the term of office
    of a trustee shall not expire during any meeting of the board of trustees which
    does not continue for more than two weeks.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.14
- number: '1713.15'
  heading: Term of trustees - expiration - members - vacancies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: If any university or college operating under the patronage of one or more
    conferences or other religious bodies in any denomination, where one of the conferences
    or other religious bodies holds regular biennial instead of annual meetings, the
    regular term of office of the trustees referred to in section 1713.13 of the Revised
    Code may be four years. The term of office of an equal number of trustees in each
    class, as near as is possible, shall expire biennially. None of the classes into
    which the board of trustees divides its number, in the manner provided in section
    1713.13 of the Revised Code, shall have more than thirty members. Vacancies which
    occur in any class of trustees in any manner, except by expiration of time, shall
    be filled only for the remainder of the term, but the term of office of a trustee
    shall not expire during any meeting of the board which does not continue for more
    than two weeks.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.15
- number: '1713.16'
  heading: Reclassification and reapportionment of trustees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: If the number of conferences or other religious bodies patronizing a university
    or college referred to in section 1713.12 of the Revised Code shall at any time
    be increased or decreased, the board of trustees of such university or college
    may reclassify the trustees of said bodies by an equal reduction of the number
    in each such class when a new conference or other religious body becomes a patronizing
    body and by an equal increase of the number in each such class when a conference
    or other religious body ceases to be a patronizing body. Whenever, by reason of
    a change in the number of patronizing conferences or religious bodies, it becomes
    necessary to reclassify the trustees in said board, and whenever said board deems
    it proper, for any other reason, to increase or decrease its total membership
    within the limits established by section 1713.13 of the Revised Code, the board,
    a lawful quorum being present, shall by appropriate resolution designate the number
    of trustees apportioned to each class and certify such apportionment to each patronizing
    conference or other religious body and to such alumni association, and all vacancies
    in such class thereafter shall be filled in accordance with such apportionment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.16
- number: '1713.17'
  heading: Alumni association may elect one fifth of board
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The alumni composing the alumni association of a university or college referred
    to in section 1713.12 of the Revised Code may elect as members of the board of
    trustees of such university or college, as many members of such alumni association
    as there are members of the class of alumni trustees assigned or apportioned to
    said alumni association by the board. Such class shall constitute not less than
    one fifth of the entire board, not including the president. This election shall
    be held under such regulations as the alumni association prescribes, and the result
    shall be certified by the proper officials of the alumni association to the board
    and entered upon the records of said board. Such board composed of alumni trustees
    and trustees elected by patronizing conferences or other religious bodies, as
    provided in sections 1713.13 to 1713.17, inclusive, of the Revised Code, may increase
    its own numbers by the election of a class of trustees at large, the number of
    which class shall be fixed by said board, under the limitations fixed by sections
    1713.13 and 1713.17 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.17
- number: '1713.18'
  heading: Presiding head of conference may be trustee - life trustees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'Any university or college operating under the patronage of one or more conferences
    or other religious bodies of any religious denomination, having accepted sections
    1713.13 to 1713.17, inclusive, of the Revised Code, may, upon the authority of
    a resolution of its board of trustees, make the bishop, or the presiding head
    by whatever name called, of the area included in the conference or conferences
    under whose patronage the university or college is operating, ex officio, a trustee
    and a member of its board, with the same effect as the president of said university
    or college occupies as a trustee, with the complete right to vote, to participate
    in discussions, and to serve on committees. The presence of said bishop or the
    head as a member of the board shall not affect in any way the classifications,
    divisions, or allotments of the board into classes, and, like the president of
    the university, the bishop or head of the area shall not be included in the designation
    of said classes, or as a member of any class, or in determining the total per
    cent of the trustees to be allotted to the patronizing conferences.

    The board may, by appropriate resolution, create and elect life trustees, whose
    total number at any one time shall never exceed ten, and who shall not have the
    power to vote but who shall have the right to be present at all meetings of the
    board and to participate in all of its discussions, and, without vote but with
    the right for discussion, to serve on any committee. The creation and election
    of such life trustees shall in no way modify the rules or the laws applicable
    to the creation of classes of trustees in such university or college, or to the
    numbers allotted to each class, or to the total per cent of the trustees to be
    elected by the patronizing conference or conferences.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.18
- number: '1713.19'
  heading: Conference may become a patron
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: Any conference or other religious body not patronizing any particular university
    or college may become a patronizing body upon invitation of the board of trustees
    of such university or college by a majority vote of the whole board. The intention
    to become such patronizing body shall be evidenced by the adoption of an appropriate
    resolution and certification of the same to the board, and such certified resolution
    shall be entered upon the minutes of the board thereby completing the right of
    such conference or religious body to act as a patronizing body.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.19
- number: '1713.20'
  heading: Quorum of trustees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: Eleven trustees shall constitute a quorum of the board of trustees of any
    university or college referred to in section 1713.12 of the Revised Code, whatever
    the number of trustees, if more than twenty, is or may become; but when the number
    is twenty or less, a majority thereof shall constitute a quorum.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.20
- number: '1713.21'
  heading: Termination of right of representation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'If a conference or other religious body patronizing a university or college
    and having a representation in its board of trustees, ceases to exist, or ceases
    to patronize such university or college, the right of such conference or other
    religious body to such representation shall cease, and the board shall apportion
    or distribute the number of trustees in such class to the remaining patronizing
    conferences or other religious bodies in order to maintain, as nearly as possible,
    the established number of trustees, and equality of representation from each patronizing
    body.

    Before a conference or other religious body represented in the board of such university
    or college shall cease to be represented, the board shall declare and enter in
    the record of its proceedings that the conditions terminating such representation
    have taken place.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.21
- number: '1713.22'
  heading: Colleges under ecclesiastical patronage
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: A corporation may be formed for the promotion of academic, collegiate, or
    university education, under religious influences, may set forth in its articles
    or certificate of incorporation, as a part thereof, the name of the religious
    sect, association, or denomination with which it is to be connected, and may grant
    any ecclesiastical body of such religious sect, association, or denomination,
    whether it is a conference, association, presbytery, synod, general assembly,
    convocation, or otherwise, the right to appoint its trustees or directors, or
    any number thereof. Such corporation may set forth in its articles or certificate
    such other rights as to the administration of the purpose for which it is organized,
    consistent with the laws of this state and of the United States, which the corporation
    desires to confer upon the ecclesiastical body of such sect, association, or denomination;
    and that body may exercise all rights and powers set forth therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.22
- number: '1713.23'
  heading: Religious educational corporations - trustees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'A corporation formed for the promotion of academic, collegiate, or university
    education, under religious influences, incorporated under the laws of this state,
    by special act or otherwise, may avail itself of section 1713.22 of the Revised
    Code, as a part of its articles or certificate of incorporation, and may confer
    on an ecclesiastical body of such religious sect, association, or denomination,
    which it is or proposes to be connected with, whether it is a conference, association,
    presbytery, synod, general assembly, convocation, or otherwise, all of the rights,
    powers, or privileges allowed to be conferred by such section on corporations
    organized under such section, and may accept the provisions of such section by
    a vote of the majority of its trustees at any regular meeting.

    When so accepted, a copy of the acceptance, certified by the secretary or clerk
    of its board of trustees or directors, shall be sent to the ecclesiastical body
    with which it is or proposes to be connected. If such body agrees to accept the
    powers proposed to be conferred upon it, it shall certify its approval upon the
    certified copy, and the certified copy thereupon shall be filed in the office
    of the secretary of state. When thus filed it will be a part of the charter of
    such corporation, and such ecclesiastical body shall exercise all the rights and
    powers set forth in the articles or certificate of incorporation.

    After such acceptance the board shall certify it to the patronizing conference
    or other religious body having the right to elect or appoint trustees of such
    university or other institution of learning, at the next meeting of such conference
    or other religious body. Thereafter the board shall consist of twenty-one trustees
    elected or appointed, and the president of such university or other institution
    of learning, who shall be ex officio a member thereof. Such elected or appointed
    trustees shall be divided into three classes of seven members each.

    At the first election or appointment after such acceptance, one of such classes
    shall be elected or appointed for one year, one for two years, and one for three
    years. In subsequent elections or appointments each of the classes of trustees
    shall be elected or appointed for three years. No term of office of such a trustee
    shall expire during a meeting of the board which does not continue more than two
    weeks. Ten members of the board shall constitute a quorum. Vacancies which occur
    in any class of trustees otherwise than by expiration of the term of office shall
    be filled only for the remainder of the term.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.23
- number: '1713.24'
  heading: Sale and distribution of property of certain corporations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: The trustees of a university, college, or other institution of learning, incorporated
    by authority of this state under special charter, and which is owned in shares
    or stock subscribed or taken, may dispose of its property at public sale, on such
    terms as to payment as the stockholders by a vote of three fourths of the shares
    or stock of the institution direct after giving public notice thereof by publication
    for six consecutive weeks in some newspaper published in the county where the
    institution is located. Such notice shall contain a full statement of the terms,
    time, and place of sale, and such action of the trustees. The trustees may wind
    up the corporate existence of such institution, and make an equitable division
    and distribution of the proceeds of the sale among all the holders of shares or
    stock, after the payment of its just debts.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.24
- number: '1713.25'
  heading: Institutions may change name or purpose
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'The board of trustees of an institution of learning incorporated under the
    authority of this state for the sole purpose of promoting education, religion
    and morality, or the fine arts, at a regular or special meeting of such board
    called for that purpose, after thirty days'' actual notice to each trustee, may
    change the name and enlarge the purposes and objects of such institution of learning,
    by amendment to its charter, approved by a majority of the board.

    No institution as defined in section 1713.01 of the Revised Code or school that
    holds a certificate of registration issued by the state board of career colleges
    and schools pursuant to division (C) of section 3332.05 of the Revised Code, that
    has been issued a certificate of authorization by the chancellor of higher education
    shall change the purposes of the institution without giving written notice to
    the chancellor, who shall issue an amended certificate of authorization to the
    institution or school upon receipt of such notice.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.25
- number: '1713.26'
  heading: Procedure and effect
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: When the amendment referred to in section 1713.25 of the Revised Code is adopted
    by the board of trustees, a copy thereof with a certificate thereto affixed, signed
    by any authorized officer of such board and sealed with the corporate seal, stating
    the fact and date of such amendment, and that such copy is a true copy of the
    original amendment, shall be filed and recorded in the office of the secretary
    of state. When so filed and recorded such amendment shall be an integral part
    of the articles of incorporation of such corporation. The property, real and personal,
    corporate powers and franchise, endowment funds, gifts, bequests, legacies, mortgage
    securities, and promissory notes, belonging to such original corporation, by such
    amendment shall pass to, and be enjoyed and exercised by the corporation created
    and organized by such amendment for the promotion of the objects of its creation
    and organization. Such new corporation shall be liable for and must perform all
    the lawful obligations and contracts of the original corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.26
- number: '1713.27'
  heading: Fees of secretary of state
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: For recording the amendment referred to in section 1713.25 of the Revised
    Code and furnishing certified copies thereof, the secretary of state shall receive
    a fee of twenty cents per hundred words, to be in no case less than five dollars.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1713.27
- number: '1713.28'
  heading: Organic rules may be prescribed in articles of certain corporations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1713'
    name: Educational Corporations
  text: 'An association incorporated for the purpose of receiving gifts, devises,
    or trust funds to erect, establish, or maintain an academy in any department of
    fine arts, a gallery for the exhibition of paintings, sculpture, or works of art,
    a museum of natural or other curiosities or specimens of art or nature promotive
    of knowledge, a law or other library, courses of lectures upon science, art, philosophy,
    natural history, or law, and to open them to the public on reasonable terms, an
    industrial training school or a mechanics'' institute for advancing the best interest
    of mechanics, manufacturers, and artisans by the more general diffusion of useful
    knowledge in those classes of the community, or homes for indigent and aged persons
    and unmarried persons, whose directors or trustees may be of either sex, may prescribe
    in its articles of incorporation the tenure of office of the trustees or directors,
    the mode of appointing or electing successors, the administration and management
    of the property, trust, and other funds of the corporation, and such other organic
    rules as are deemed expedient or acceptable to donors, which shall be the permanent
    organic law of the corporation.

    By certificate duly acknowledged by the trustees or directors and filed in the
    office of the secretary of state, such association may add to the original objects
    and purposes thereof any of the objects and purposes mentioned in this section
    and not provided for by the articles of incorporation.'
