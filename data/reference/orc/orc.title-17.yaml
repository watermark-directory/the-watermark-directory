- number: '1710.06'
  heading: Plans for public improvements or public services
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: '(A) The board of directors of a special improvement district may develop
    and adopt one or more written plans for public improvements or public services
    that benefit all or any part of the district. Each plan shall set forth the specific
    public improvements or public services that are to be provided, identify the area
    in which they will be provided, and specify the method of assessment to be used.
    Each plan for public improvements or public services shall indicate the period
    of time the assessments are to be levied for the improvements and services and,
    if public services are included in the plan, the period of time the services are
    to remain in effect. Plans for public improvements may include the planning, design,
    construction, reconstruction, enlargement, or alteration of any public improvements
    and the acquisition of land for the improvements. Plans for public improvements
    or public services may also include, but are not limited to, provisions for the
    following:

    (1) Creating and operating the district and the nonprofit corporation under this
    chapter, including hiring employees and professional services, contracting for
    insurance, and purchasing or leasing office space and office equipment and other
    requirements of the district;

    (2) Planning, designing, and implementing a public improvements or public services
    plan, including hiring architectural, engineering, legal, appraisal, insurance,
    consulting, energy auditing, and planning services, and, for public services,
    managing, protecting, and maintaining public and private facilities, including
    public improvements;

    (3) Conducting court proceedings to carry out this chapter;

    (4) Paying damages resulting from the provision of public improvements or public
    services and implementing the plans;

    (5) Paying the costs of issuing, paying interest on, and redeeming notes and bonds
    issued for funding public improvements and public services plans;

    (6) Sale, lease, lease with an option to purchase, conveyance of other interests
    in, or other contracts for the acquisition, construction, maintenance, repair,
    furnishing, equipping, operation, or improvement of any special energy improvement
    project by the special improvement district, between a participating political
    subdivision and the special improvement district, and between the special improvement
    district and any owner of real property in the special improvement district on
    which a special energy improvement project has been acquired, installed, equipped,
    or improved; and

    (7) Aggregating the renewable energy credits generated by one or more special
    energy improvement projects within a special improvement district, upon the consent
    of the owners of the credits and for the purpose of negotiating and completing
    the sale of such credits.

    (B) Once the board of directors of the special improvement district adopts a plan,
    it shall submit the plan to the legislative authority of each participating political
    subdivision and the municipal executive of each municipal corporation in which
    the district is located, if any. The legislative authorities and municipal executives
    shall review the plan and, within sixty days after receiving it, may submit their
    comments and recommendations about it to the district. After reviewing these comments
    and recommendations, the board of directors may amend the plan. It may then submit
    the plan, amended or otherwise, in the form of a petition to members of the district
    whose property may be assessed for the plan. Once the petition is signed by those
    members who own at least sixty per cent of the front footage of property that
    is to be assessed and that abuts upon a street, alley, public road, place, boulevard,
    parkway, park entrance, easement, or other public improvement, or those members
    who own at least seventy-five per cent of the area to be assessed for the improvement
    or service, the petition may be submitted to each legislative authority for approval.
    Except as provided in division (H) of section 1710.02 of the Revised Code, if
    the special improvement district was created for the purpose of developing and
    implementing plans for special energy improvement projects or shoreline improvement
    projects, the petition required under this division shall be signed by one hundred
    per cent of the owners of the area of all real property located within the area
    to be assessed for the special energy improvement project or shoreline improvement
    project.

    Each legislative authority shall, by resolution, approve or reject the petition
    within sixty days after receiving it. If the petition is approved by the legislative
    authority of each participating political subdivision, the plan contained in the
    petition shall be effective at the earliest date on which a nonemergency resolution
    of the legislative authority with the latest effective date may become effective.
    A plan may not be resubmitted to the legislative authorities and municipal executives
    more than three times in any twelve-month period.

    (C) Each participating political subdivision shall levy, by special assessment
    upon specially benefited property located within the district, the costs of any
    public improvements or public services plan contained in a petition approved by
    the participating political subdivisions under this section or division (F) of
    section 1710.02 of the Revised Code. The levy shall be made in accordance with
    the procedures set forth in Chapter 727. of the Revised Code, except that:

    (1) The assessment for each improvements or services plan may be levied by any
    one or any combination of the methods of assessment listed in section 727.01 of
    the Revised Code, provided that the assessment is uniformly applied.

    (2) For the purpose of levying an assessment, the board of directors may combine
    one or more improvements or services plans or parts of plans and levy a single
    assessment against specially benefited property.

    (3) For purposes of special assessments levied by a township pursuant to this
    chapter, references in Chapter 727. of the Revised Code to the municipal corporation
    shall be deemed to refer to the township, and references to the legislative authority
    of the municipal corporation shall be deemed to refer to the board of township
    trustees.

    (4) Revenue collected from the levy of a special assessment for the cost of a
    special energy improvement project may be assigned and remitted to the Ohio air
    quality development authority pursuant to an agreement entered into under section
    3706.12 of the Revised Code.

    Church property or property owned by a political subdivision, including any participating
    political subdivision in which a special improvement district is located, shall
    be included in and be subject to special assessments made pursuant to a plan adopted
    under this section or division (F) of section 1710.02 of the Revised Code, if
    the church or political subdivision has specifically requested in writing that
    its property be included within the special improvement district and the church
    or political subdivision is a member of the district or, in the case of a district
    created by an existing qualified nonprofit corporation, if the church is a member
    of the corporation.

    For tax years 2020 to 2024, qualifying real property, as defined in section 727.031
    of the Revised Code, is exempt from special assessments levied under division
    (C) of this section, provided no delinquent special assessments and related interest
    and penalties are levied or assessed against any property owned by the owner and
    operator of the qualifying real property for that tax year.

    (D) All rights and privileges of property owners who are assessed under Chapter
    727. of the Revised Code shall be granted to property owners assessed under this
    chapter, including those rights and privileges specified in sections 727.15 to
    727.17 and 727.18 to 727.22 of the Revised Code and the right to notice of the
    resolution of necessity and the filing of the estimated assessment under section
    727.13 of the Revised Code. Property owners assessed for public services under
    this chapter shall have the same rights and privileges as property owners assessed
    for public improvements under this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.06
- number: '1710.061'
  heading: Application of savings or reductions in demand by a special energy improvement
    project
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: '(A) Except as provided in division (B) of this section, an electric distribution
    utility may count toward its compliance with the energy efficiency and peak demand
    reduction requirements of section 4928.66 of the Revised Code any efficiency savings
    or reduction in demand produced by a special energy improvement project located
    in its certified territory.

    (B) A mercantile customer that realizes energy efficiency savings or reduction
    in demand produced by a special energy improvement project that it owns may elect
    to commit the savings or reduction to the electric distribution utility in exchange
    for an exemption from an energy efficiency cost recovery mechanism permitted under
    section 4928.66 of the Revised Code, approved by the public utilities commission.

    (C) The board of directors of a special improvement district shall submit a quarterly
    report to the electric distribution utility that includes, but is not limited
    to, both of the following:

    (1) The total number and a description of each new and ongoing special energy
    improvement project located within the special improvement district that produces
    energy efficiency savings or reduction in demand;

    (2) Any additional information that the electric distribution utility needs in
    order to obtain credit under section 4928.66 of the Revised Code for energy efficiency
    savings or reduction in demand from such projects.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.061
- number: '1710.07'
  heading: Permitted costs of plan
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: 'The cost of any public improvements or public services plan of a special
    improvement district may include, but is not limited to, the following:

    (A) The cost of creating and operating the district under this chapter, including
    creating and operating a nonprofit organization organized under this chapter,
    hiring employees and professional services, contracting for insurance, and purchasing
    or leasing office space or office equipment;

    (B) The cost of planning, designing, and implementing the public improvements
    or public services plan, including payment of architectural, engineering, legal,
    appraisal, insurance, consulting, energy auditing, and planning fees and expenses,
    and, for public services, the management, protection, and maintenance costs of
    public or private facilities;

    (C) Any court costs incurred by the district in implementing the public improvements
    or public services plan;

    (D) Any damages resulting from implementing the public improvements or public
    services plan;

    (E) The costs of issuing, paying interest on, and redeeming notes and bonds issued
    for funding the public improvements or public services plan; and

    (F) The costs associated with the sale, lease, lease with an option to purchase,
    conveyance of other interests in, or other contracts for the acquisition, construction,
    maintenance, repair, furnishing, equipping, operation, or improvement of any special
    energy improvement project by the district, between a participating political
    subdivision and the special improvement district, or between the special improvement
    district and any owner of real property in the special improvement district on
    which a special energy improvement project has been acquired, installed, equipped,
    or improved.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.07
- number: '1710.08'
  heading: Improvements or services in addition to subdivision improvements or services
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: Any public improvements or public services provided to a special improvement
    district through a public improvements or public services plan shall be in addition
    to, and not in lieu of, any public improvements or public services provided by
    any participating political subdivision. A participating political subdivision
    may not substitute or rely in any manner upon the public improvements or public
    services provided to a special improvements district under a public improvements
    or public services plan to reduce or not increase any public improvement or public
    service provided or to be provided by the participating political subdivision
    to the area specified in any such plan.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.08
- number: '1710.09'
  heading: Contracts to develop, manage, or implement part or all of any plan
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: Except as otherwise provided in section 1710.10 of the Revised Code, a special
    improvement district may contract with any person, community improvement corporation,
    political subdivision as defined in division (F) of section 2744.01, or state
    agency as defined in section 1.60 of the Revised Code to develop, manage, or implement
    part or all of any plan adopted under section 1710.06 or division (F) of section
    1710.02 of the Revised Code. Before contracting to implement the plan, the district
    shall permit any member of the district whose property may be assessed for the
    costs of any improvements or services under the plan to provide for that portion
    of the improvement or service that is on that member's property at a cost to the
    district no greater than what the district determines to be the lowest cost allocable
    to the improvement or service to be performed on that property. However, the board
    of directors may reject a member's proposed provision of the improvement or service
    if it would increase the plan's total cost to the district. Members that choose
    to provide for that portion of the improvement or service that is performed on
    their property under this division are subject to the same minimum performance
    specifications required by the district for the rest of the improvement or service,
    and their property remains subject to the assessment for the plan.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.09
- number: '1710.10'
  heading: Participating political subdivision contracts to provide improvements or
    services
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: '(A) When a participating political subdivision contracts to provide improvements
    or services to a special improvement district, the participating political subdivision
    shall charge only its additional cost of providing the improvement or service,
    without any allocation of overhead costs, fixed costs, or assignment of costs
    at rates higher than those at which the participating political subdivision assigns
    costs for similar improvements or services for political subdivision purposes.

    (B) Except in the case of a district created by an existing qualified nonprofit
    corporation, any law enforcement or fire protection service to be provided under
    a district''s public service plan shall be provided only by contract with a participating
    political subdivision of the district. In the case of a district created by an
    existing qualified nonprofit corporation, the corporation may provide law enforcement
    service as provided under section 1702.80 of the Revised Code.

    The district shall reimburse the participating political subdivision for any additional
    cost incurred in providing that law enforcement or fire protection service. This
    additional cost shall not include any overhead, fixed costs, or assignment of
    costs at rates higher than those at which the political subdivision assigns costs
    for these services for political subdivision purposes.

    (C) Any liability for providing fire or police services under this section by
    a participating political subdivision shall remain with the participating political
    subdivision and shall not be assumed by the district.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.10
- number: '1710.11'
  heading: Adopting written rules prescribing competitive bidding procedures for contracts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: The board of directors of a special improvement district shall adopt written
    rules prescribing competitive bidding procedures for contracts awarded under this
    chapter. The procedures may differ from competitive bidding procedures applicable
    to the participating political subdivisions of the district or those provided
    in Chapter 735. of the Revised Code. The rules shall provide for advertising for
    bids and specify the bidding procedures to be followed, and may specify conditions
    under which competitive bidding is not required and other conditions such as establishing
    a dollar limit per contract or specifying particular parties to a contract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.11
- number: '1710.12'
  heading: Issuing bonds and notes in anticipation of collection of any special assessments
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: Any participating political subdivision of a special improvement district
    may issue bonds and notes in anticipation of collection of any special assessments
    authorized by this chapter. All proceeds of any assessments, bonds, or notes issued
    to fund any public improvements or public services plan under this chapter shall
    first be applied by the political subdivision to payment of those bonds or notes
    and any interest on them, as required by section 133.17 of the Revised Code. Any
    remaining proceeds shall be turned over to the treasurer of the district and deposited
    in a district account to be used for the purposes for which the assessment was
    made or for which the bonds or notes were issued.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.12
- number: '1710.13'
  heading: Dissolving a special improvement district
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: 'This section does not apply to a special improvement district created by
    an existing qualified nonprofit corporation.

    The process for dissolving a special improvement district or repealing an improvements
    or services plan may be initiated by a petition signed by members of the district
    who own at least twenty per cent of the appraised value of the real property located
    in the district, excluding church property or real property owned by the federal
    government, the state, or a county, township, municipal corporation, or park district,
    unless the church, county, township, municipal corporation, or park district has
    specifically requested in writing that the property be included in the district,
    and filed with the municipal executive, if any, and the legislative authorities
    of all the participating political subdivisions of the district. As used in this
    section, "appraised value" means the taxable value established by the county auditor
    for purposes of real estate taxation.

    No later than forty-five days after such a petition is filed, the members of the
    district shall meet to consider it. Notice of the meeting shall be given as provided
    in section 1710.05 of the Revised Code. Upon the affirmative vote of members who
    collectively own more than fifty per cent of the appraised value of the real property
    in the district that may be subject to assessment under division (C) of section
    1710.06 of the Revised Code, the district shall be dissolved, or the plan shall
    be repealed, as applicable.

    No rights or obligations of any person under any contract, or in relation to any
    bonds, notes, or assessments made under this chapter, shall be affected by the
    dissolution of the district or the repeal of a plan, except with the consent of
    that person or by order of a court with jurisdiction over the matter. Upon dissolution
    of a district, any assets or rights of the district, after payment of all bonds,
    notes, or other obligations of the district, shall be deposited in a special account
    in the treasury of each participating political subdivision, prorated among all
    participating political subdivisions to reflect the percentage of the district''s
    territory within that political subdivision, to be used for the benefit of the
    territory that made up the district.

    Once the members have approved the repeal of a plan, all bonds, notes, and other
    obligations of the district associated with the plan shall be paid. Thereafter,
    the plan shall be repealed. Upon receipt of proof that all bonds, notes, and other
    obligations have been paid and that the plan has been repealed, the participating
    political subdivisions shall terminate any levies imposed to pay for costs of
    the plan.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1710.13
- number: '1710.14'
  heading: Contributions from municipal corporation that created downtown redevelopment
    district
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: The board of directors of a special improvement district in which all or part
    of a downtown redevelopment district is located may accept contributions from
    the municipal corporation that created the downtown redevelopment district pursuant
    to division (E)(2) of section 5709.45 of the Revised Code. The board shall use
    all such contributions to promote the downtown redevelopment district to potential
    business patrons, to recruit businesses to relocate or expand to the downtown
    redevelopment district, and to attract and promote events and activities that
    generate revenue or enhance public welfare within the downtown redevelopment district.
    The board shall periodically report to the legislative authority of the municipal
    corporation on the expenditure of the contributions and plans for the utilization
    of future contributions. If any contributions received by a special improvement
    district under this section remain after the dissolution or expiration of the
    downtown redevelopment district, the board shall pay the remaining amount to the
    contributing municipal corporation, which shall credit the money to its general
    fund.
