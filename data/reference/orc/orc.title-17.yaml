- number: '1782.56'
  heading: Derivative action by limited partner
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: A limited partner or, when authorized by section 1782.57 of the Revised Code,
    a former limited partner may bring an action on behalf of a limited partnership
    to recover a judgment in its favor if general partners with authority to do so
    have refused to bring the action or if an effort to cause those general partners
    to bring the action is not likely to succeed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.56
- number: '1782.57'
  heading: Plaintiff in derivative action
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: In a derivative action brought pursuant to section 1782.56 of the Revised
    Code, the plaintiff shall be a person who is a partner of the limited partnership
    at the time of the filing of the complaint in the action or a person who was a
    partner of the limited partnership within one year prior to the date of the filing
    of the complaint in the action. The plaintiff also shall have been a partner at
    the time of the transaction of which he complains, unless his status as a partner
    devolved upon him by operation of law or pursuant to the partnership agreement
    from a person who was a partner at the time of the transaction.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.57
