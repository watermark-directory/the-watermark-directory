  heading: Usury
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: No domestic or foreign corporation, or any one on its behalf, shall interpose
    the defense or make the claim of usury in any proceeding upon or with reference
