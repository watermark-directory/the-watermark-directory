- number: '1728.111'
  heading: Annual service charge in lieu of taxes
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1728'
    name: Community Redevelopment Corporations
  text: 'The community urban redevelopment corporation entering into a financial agreement
    with an impacted city shall pay to the county treasurer an annual service charge
    in lieu of taxes on the improvements made by the corporation in the project that
    are exempted from taxation pursuant to section 1728.10 of the Revised Code. The
    annual service charge shall be charged and paid in two equal installments at the
    same time and in the same manner as real property taxes. The amount of the annual
    service charge shall be set forth in the financial agreement and shall be not
    more than the annual amount of real property taxes that would have been charged
    against the percentage of the assessed valuation of such improvements exempted
    from taxation had that percentage not been exempted from taxation, and not less
    than an amount which, together with the taxes on the land in any year, equals
    the total taxes assessed on all real property in the area covered by the project
    in the calendar year immediately preceding the initial acquisition of the area
    or any part thereof by the municipality or the corporation, whichever occurred
    first. The county treasurer may secure the service charge payments by a lien on
    the exempted improvements. Such a lien shall attach, and may be perfected, collected,
    and enforced, in the same manner as a mortgage lien on real property, and shall
    otherwise have the same force and effect as a mortgage lien on real property.

    The service charge in lieu of taxes shall be distributed by the county auditor
    to the taxing subdivision levying taxes in the subdivisions in which the property
    is located, in the same proportions in which the current general property tax
    is distributed, or upon the adoption of a resolution by the municipal legislative
    authority, which shall be certified to the county auditor, the full amount of
    the service charge shall be distributed at the same time and in the same manner
    as real property tax payments to the municipal corporation, and shall be deposited
    in an urban redevelopment tax increment equivalent fund established pursuant to
    section 1728.112 of the Revised Code.

    At the end of thirty years for one, two, or three family residential dwelling
    units and twenty years for all other uses of the improvements from the date of
    the execution of a financial agreement, or earlier by agreement of the parties
    thereto, the exemption from taxation of any unit if the project is undertaken
    in units, or of the entire project if the project is not undertaken in units,
    ceases and the improvements and any other property of the corporation as well
    as the land shall be assessed and taxed like other property within the municipal
    corporation.

    At the same date all restrictions and limitation upon the corporation shall terminate
    upon the corporation''s rendering its final account with the municipal corporation.'
