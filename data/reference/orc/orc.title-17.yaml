- number: '1753.21'
  heading: Prescription drugs
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1753'
    name: Physician-health Plan Partnership Act; Risk-based Capital For Insurers Model
      Act
  text: '(A) If a policy, contract, or agreement of a health insuring corporation
    uses a restricted formulary of prescription drugs, the health insuring corporation
    shall do both of the following:

    (1) Develop such a formulary in consultation with and with the approval of a pharmacy
    and therapeutics committee, a majority of the members of which are physicians
    or advanced practice registered nurses affiliated with the health insuring corporation
    who may prescribe prescription drugs and pharmacists affiliated with the health
    insuring corporation; or in consultation with and with the approval of a pharmacy
    and therapeutics committee that is independent of the health insuring corporation
    consisting of physicians or advanced practice registered nurses who may prescribe
    prescription drugs in their state of licensure and pharmacists who are authorized
    to practice in their state of licensure;

    (2) Establish a procedure by which an enrollee may obtain, without penalty or
    additional cost sharing beyond that provided for formulary drugs under the enrollee''s
    contract with the health insuring corporation, coverage of a specific nonformulary
    drug when the prescriber documents in the enrollee''s medical record and certifies
    that the formulary alternative has been ineffective in the treatment of the enrollee''s
    disease or condition, or that the formulary alternative causes or is reasonably
    expected by the prescriber to cause a harmful or adverse reaction in the enrollee.

    (B) Nothing in this section shall be construed to require a health insuring corporation
    to place any particular pharmaceutical product or therapeutic class of product
    on any formulary, or to prohibit a health insuring corporation from restricting
    payments for any specific pharmaceutical product or therapeutic class of product,
    including, but not limited to, a requirement that the product be prescribed only
    by a defined specialist or subspecialist.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1753.21
- number: '1753.23'
  heading: Internal technology assessment process
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1753'
    name: Physician-health Plan Partnership Act; Risk-based Capital For Insurers Model
      Act
  text: 'A health insuring corporation that provides basic health care services shall
    establish or use an internal technology assessment process for assessing whether
    a drug, device, protocol, procedure, or other therapy is proven to be safe and
    efficacious for a particular indication or condition when compared to alternative
    therapies, or whether it remains experimental or investigational. The health insuring
    corporation''s internal technology assessment process shall meet all of the following
    criteria:

    (A) Decisions are made by medical professionals, including physicians.

    (B) The process includes a review of relevant medical evidence, including the
    following, if available:

    (1) Peer-reviewed medical and scientific literature on the subject;

    (2) Published opinions, actions, and other relevant documents of independent,
    external research organizations such as the national institute of health, the
    national cancer institute, the United States food and drug administration, the
    health care finance administration, and the agency for health care policy and
    research;

    (3) Published opinions of medical experts or affected specialty societies.

    (C) General coverage decisions, made pursuant to this process, that exclude drugs,
    devices, protocols, procedures, or other therapies on the basis that they are
    not safe or efficacious and remain experimental or investigational, are reviewed
    and updated as new scientific evidence becomes available.

    (D) A description of the health insuring corporation''s internal technology assessment
    process is made available to participating providers and enrollees, upon request.

    (E) A copy of the health insuring corporation''s specific coverage protocols and
    procedures is made available to participating providers and enrollees upon the
    request of an enrollee who has been denied coverage for a drug, device, protocol,
    procedure, or other therapy on the basis that it has been assessed as not being
    safe or efficacious for a particular indication or condition. Specific coverage
    protocols and procedures shall include a description of the evidence upon which
    the protocol or procedure is based, and shall contain the date the protocol or
    procedure was adopted.

    (F) A drug or device that has received full market approval by the United States
    food and drug administration for treatment of a particular indication or condition
    cannot, for purposes of this assessment process, be considered experimental or
    investigational for that indication or condition.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1753.23
- number: '1753.28'
  heading: Emergency services coverage
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1753'
    name: Physician-health Plan Partnership Act; Risk-based Capital For Insurers Model
      Act
  text: '(A) As used in this section:

    (1) "Emergency medical condition" means a medical condition that manifests itself
    by such acute symptoms of sufficient severity, including severe pain, that a prudent
    layperson with an average knowledge of health and medicine could reasonably expect
    the absence of immediate medical attention to result in any of the following:

    (a) Placing the health of the individual or, with respect to a pregnant woman,
    the health of the woman or her unborn child, in serious jeopardy;

    (b) Serious impairment to bodily functions;

    (c) Serious dysfunction of any bodily organ or part.

    (2) "Emergency services" means the following:

    (a) A medical screening examination, as required by federal law, that is within
    the capability of the emergency department of a hospital, including ancillary
    services routinely available to the emergency department, to evaluate an emergency
    medical condition;

    (b) Such further medical examination and treatment that are required by federal
    law to stabilize an emergency medical condition and are within the capabilities
    of the staff and facilities available at the hospital, including any trauma and
    burn center of the hospital.

    (3)(a) "Stabilize" means the provision of such medical treatment as may be necessary
    to assure, within reasonable medical probability, that no material deterioration
    of an individual''s medical condition is likely to result from or occur during
    a transfer, if the medical condition could result in any of the following:

    (i) Placing the health of the individual or, with respect to a pregnant woman,
    the health of the woman or her unborn child, in serious jeopardy;

    (ii) Serious impairment to bodily functions;

    (iii) Serious dysfunction of any bodily organ or part.

    (b) In the case of a woman having contractions, "stabilize" means such medical
    treatment as may be necessary to deliver, including the placenta.

    (4) "Transfer" has the same meaning as in section 1867 of the "Social Security
    Act," 49 Stat. 620 (1935), 42 U.S.C.A. 1395dd, as amended.

    (B) A health insuring corporation policy, contract, or agreement providing coverage
    of basic health care services shall cover emergency services for enrollees with
    emergency medical conditions without regard to the day or time the emergency services
    are rendered or to whether the enrollee, the hospital''s emergency department
    where the services are rendered, or an emergency physician treating the enrollee,
    obtained prior authorization for the emergency services.

    (C) A health insuring corporation policy, contract, or agreement providing coverage
    of basic health care services shall cover both of the following:

    (1) Emergency services provided to an enrollee at a participating hospital''s
    emergency department if the enrollee presents self with an emergency medical condition;

    (2) Emergency services provided to an enrollee at a nonparticipating hospital''s
    emergency department if the enrollee presents self with an emergency medical condition
    and one of the following circumstances applies:

    (a) Due to circumstances beyond the enrollee''s control, the enrollee was unable
    to utilize a participating hospital''s emergency department without serious threat
    to life or health.

    (b) A prudent layperson with an average knowledge of health and medicine would
    have reasonably believed that, under the circumstances, the time required to travel
    to a participating hospital''s emergency department could result in one or more
    of the adverse health consequences described in division (A)(1) of this section.

    (c) A person authorized by the health insuring corporation refers the enrollee
    to an emergency department and does not specify a participating hospital''s emergency
    department.

    (d) An ambulance takes the enrollee to a nonparticipating hospital other than
    at the direction of the enrollee.

    (e) The enrollee is unconscious.

    (f) A natural disaster precluded the use of a participating emergency department.

    (g) The status of a hospital changed from participating to nonparticipating with
    respect to emergency services during a contract year and no good faith effort
    was made by the health insuring corporation to inform enrollees of this change.

    (D) A health insuring corporation that provides coverage for emergency services
    shall inform enrollees of all of the following:

    (1) The scope of coverage for emergency services;

    (2) The appropriate use of emergency services, including the use of the 9-1-1
    system and any other telephone access systems utilized to access prehospital emergency
    services;

    (3) Any cost sharing provisions for emergency services;

    (4) The procedures for obtaining emergency services and other medical services,
    so that enrollees are familiar with the location of the emergency departments
    of participating hospitals and with the location and availability of other participating
    facilities or settings at which they could receive medical services.'
