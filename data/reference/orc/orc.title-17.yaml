- number: '1751.90'
  heading: Coverage for teledentistry
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) As used in this section, "teledentistry" has the same meaning as in section
    4715.43 of the Revised Code.

    (B) No individual or group health insuring corporation policy, contract, or agreement
    shall deny coverage for the costs of any services provided to an insured through
    teledentistry if those services would be covered if the services were delivered
    other than through teledentistry.

