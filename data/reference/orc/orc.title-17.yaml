- number: '1706.172'
  heading: Records requirements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) Each record authorized or required to be delivered to the secretary of
    state for filing under this chapter shall meet all of the following requirements:

    (1) The record shall contain all information required by the law of this state
    to be contained in the record but, unless otherwise provided by law, shall not
    be required to contain other information.

    (2) The record shall be on or in a medium and in such form acceptable to the secretary
    of state and from which the secretary of state may create a record that contains
    all of the information stated in the record. The secretary of state may require
    that the record be delivered by any one or more means or on or in any one or more
    media acceptable to the secretary of state. The secretary of state is not required
    to file a record that is not delivered by a means and in a medium that complies
    with the requirements then established by the secretary of state for the delivery
    and filing of records. If the secretary of state permits a record to be delivered
    on paper, the record shall be typewritten or machine printed, and the secretary
    of state may impose reasonable requirements upon the dimensions, legibility, quality,
    and color of the paper and typewriting or printing and upon the format and other
    attributes of any record that is delivered electronically. The secretary of state
    shall, at the earliest practicable time, allow for the delivery of a record for
    filing to be accomplished electronically, without the necessity for the delivery
    of a physical original record or the image thereof, if all required information
    is delivered and is readily retrievable from the data delivered. If the delivery
    of a record for filing is required to be accomplished electronically, that record
    shall not be accompanied by any physical record unless the secretary of state
    permits that accompaniment.

    (3) The record shall be in English. A person''s name set forth in the record need
    not be in English if expressed in English letters or Arabic or Roman numerals.
    Records of a foreign person need not be in English if accompanied by a reasonably
    authenticated English translation.

    (B) Unless the secretary of state determines that a record does not comply with
    the filing requirements of this chapter, the secretary of state shall file the
    record and send a certificate and a receipt for the fees to the person who submitted
    the record.

    (C) Upon request and payment of the requisite fee, the secretary of state shall
    furnish to the requester a certified copy of a requested record.

    (D) Except as otherwise provided in division (F) of section 1706.09 and section
    1706.173 of the Revised Code, a record delivered to the secretary of state for
    filing under this chapter may specify an effective time and a delayed effective
    date of not more than ninety days following the date of receipt by the secretary
    of state. Subject to division (F) of section 1706.09 and section 1706.173 of the
    Revised Code, a record filed by the secretary of state is effective as follows:

    (1) If the record does not specify an effective time and does not specify a delayed
    effective date, on the date the record is filed as evidenced by the secretary
    of state''s endorsement of the date on the record;

    (2) If the record specifies an effective time but not a delayed effective date,
    on the date the record is filed at the time specified in the record;

    (3) If the record specifies a delayed effective date but not an effective time,
    at 12:01 a.m. on the earlier of the following:

    (a) The specified date;

    (b) The ninetieth day after the record is filed.

    (4) If the record specifies an effective time and a delayed effective date, at
    the specified time on the earlier of the following:

    (a) The specified date;

    (b) The ninetieth day after the record is filed.'
