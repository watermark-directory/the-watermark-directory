- number: '1746.02'
  heading: Status of business trusts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: A business trust is hereby declared to be a permitted form of association
    for the conduct of business in this state. A business trust is a separate unincorporated
    legal entity, not a partnership, joint venture, joint-stock association, agency,
    or any other form of entity.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1746.02
- number: '1746.03'
  heading: Compliance with chapter
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: No business trust shall be authorized to transact business in this state unless
    it complies with section 1746.04 of the Revised Code, except that a business trust
    that is transacting business in this state on the effective date of this section
    may continue to transact business in this state without complying with this chapter
    and, if it makes the filings described in section 1746.04 of the Revised Code,
    shall be deemed to have elected to operate under this chapter. A business trust
    shall be deemed to be transacting business in this state for purposes of this
    chapter only if such business trust maintains a place of business in this state
    from which it regularly engages on its own behalf in activities permitted by its
    trust instrument and permitted under this chapter, provided that nothing contained
    in this chapter shall prohibit any business trust that does not transact business
    within the meaning set forth in this section from voluntarily complying with the
    provisions of this chapter.
  history: null
