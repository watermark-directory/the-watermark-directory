- number: '1723.06'
  heading: Hydraulic company may hold necessary property
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1723'
    name: Appropriation Of Property By Certain Corporations
  text: A company described in section 1723.01 of the Revised Code may take, by purchase
    or otherwise, and hold such real and personal estate, and may erect or purchase
    the necessary buildings and machinery for carrying on the business, including
    all the necessary equipment and appendages of the business, such as tubing, pumps,
    tanks, telegraph apparatus, and engines, as may be necessary to transport oils,
    coal or its derivatives, or water through tubes and pipes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1723.06
- number: '1723.08'
  heading: Hydraulic company as a common carrier
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1723'
    name: Appropriation Of Property By Certain Corporations
  text: With respect to the transporting by it of natural gas, petroleum, coal or
    its derivatives, water, and electricity, a company described in section 1723.01
    of the Revised Code is a common carrier and is subject to the duties and liabilities
    of a common carrier under the laws of this state. A company described in section
    1723.01 of the Revised Code includes any firm, partnership, voluntary association,
    joint-stock association, company, or corporation, wherever organized or incorporated,
    when engaged in the business of transporting petroleum through tubing, pipes,
    or conduits as a common carrier.
