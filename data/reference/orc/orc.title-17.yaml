- number: '1751.91'
  heading: Reimbursement for pharmacists providing health care
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'A health insuring corporation may provide payment or reimbursement to a pharmacist
    for providing a health care service to a patient if both of the following are
    the case:

    (A) The pharmacist provided the health care service to the patient in accordance
    with Chapter 4729. of the Revised Code, including any of the following services:

    (1) Managing drug therapy under a consult agreement pursuant to section 4729.39
    of the Revised Code;

    (2) Administering immunizations in accordance with section 4729.41 of the Revised
    Code;

    (3) Administering drugs in accordance with section 4729.45 of the Revised Code.

    (B) The patient''s individual or group health insuring corporation policy, contract,
    or agreement provides for payment or reimbursement of the service.'
