- number: '1751.70'
  heading: Authorization of payroll deductions for public employees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) An employee of the state, of any political subdivision of the state,
    or of any institution supported in whole or in part by the state, may authorize
    the deduction from the employee''s salary or wages of the amount of the employee''s
    premium rate to any health insuring corporation holding a certificate of authority
    pursuant to this chapter. The employee''s authorization shall be evidenced by
    approval of the head of the department, division, office, or institution in which
    the employee is employed.

    (B) In the case of employees of the state, the employee''s authorization shall
    be directed to and filed with the director of administrative services. In the
    case of employees of a political subdivision, the employee''s authorization shall
    be directed to and filed with the fiscal officer of such political subdivision.
    In the case of employees of any institution supported in whole or in part by the
    state, the employee''s authorization shall be directed to and filed with the fiscal
    officer of such institution.

    (C) Upon the filing of the employee''s authorization in accordance with division
    (B) of this section, the director or fiscal officer shall provide for payment
    to the health insuring corporation referred to in the employee''s authorization,
    for the amount covering the sum of the deductions thereby authorized.'
