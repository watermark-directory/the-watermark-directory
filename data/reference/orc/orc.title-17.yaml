- number: '1726.01'
  heading: Development corporation definitions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: 'As used in section 1726.01 to 1726.13, inclusive, of the Revised Code, unless
    the context otherwise requires:

    (A) "Financial institutions" means any banking corporation, trust company, building
    and loan association, savings and loan association, or corporation, partnership,
    foundation, or other institution engaged in lending or investing funds for industrial
    or business purposes.

    (B) "Member" means any financial institution authorized to do industrial and business
    lending in this state which undertakes to lend money to a corporation, incorporated
    under Chapter 1726. of the Revised Code, upon its call, and in accordance with
    the provisions of such chapter.

    (C) "Loan limit" means for any member, the maximum amount prescribed to be outstanding
    at one time on loans made by such member to a corporation, incorporated under
    Chapter 1726. of the Revised Code as determined under the provisions of such chapter.

    (D) "The corporation" means a corporation, incorporated under sections 1726.01
    to 1726.13, inclusive, of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.01
- number: '1726.02'
  heading: Formation of corporation - contents of articles of incorporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: 'Ten or more natural persons, a majority of whom are citizens of this state,
    may form a development corporation under the provisions of Chapter 1726. of the
    Revised Code by subscribing and thereafter filing in the office of the secretary
    of state articles of incorporation which shall set forth:

    (A) The name of the corporation, which shall include the words "Ohio Development
    Corporation";

    (B) The place in this state where the principal office of the corporation is to
    be located;

    (C) The purposes for which the corporation is formed, which shall include but
    need not be limited to, the following: to promote, aid, and through the united
    efforts of the institutions and corporations which shall from time to time become
    members or shareholders, develop and advance the industrial and business prosperity
    of the state or any section thereof; to encourage any industry; to stimulate and
    help expand all kinds of business ventures which tend to promote the growth of
    the state or any section thereof; to act whenever and wherever deemed by it advisable
    in conjunction with other organizations, including the small business administration
    of the United States and small business investment companies licensed under federal
    authority, to promote agricultural, industrial, and business developments within
    the state; and to furnish for approved and deserving applicants ready and required
    money for the carrying on and development of business or industrial undertakings;

    (D) The authorized number of shares which shall be of the par value of one hundred
    dollars per share;

    (E) The amount of stated capital with which the corporation will begin business,
    which shall not be less than five thousand dollars.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.02
- number: '1726.03'
  heading: Articles of incorporation to be examined by attorney general, certification
    and record
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: When the articles of incorporation or any amendment or amendments thereof,
    are filed in the office of the secretary of state under section 1726.02 of the
    Revised Code, the secretary of state shall submit them to the attorney general
    for examination. If such articles, or any amendment or amendments thereof, are
    found by him to be in accordance with Chapter 1726. of the Revised Code, and not
    inconsistent with the constitution and laws of the United States and of this state,
    he shall certify to and deliver them to the secretary of state, who shall cause
    them, together with the certificate of the attorney general, to be recorded in
    a book kept for that purpose.
