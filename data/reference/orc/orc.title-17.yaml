- number: '1751.111'
  heading: Standardized prescription identification information - pharmacy benefits
    to be included
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A)(1) This section applies to both of the following:

    (a) A health insuring corporation that issues or requires the use of a standardized
    identification card or an electronic technology for submission and routing of
    prescription drug claims pursuant to a policy, contract, or agreement for health
    care services;

    (b) A person or entity that a health insuring corporation contracts with to issue
    a standardized identification card or an electronic technology described in division
    (A)(1)(a) of this section.

    (2) Notwithstanding division (A)(1) of this section, this section does not apply
    to the issuance or required use of a standardized identification card or an electronic
    technology for submission and routing of prescription drug claims in connection
    with any of the following:

    (a) Coverage provided under the medicare advantage program operated pursuant to
    Part C of Title XVIII of the "Social Security Act," 49 Stat. 62 (1935), 42 U.S.C.
    301, as amended.

    (b) Coverage provided under medicaid.

    (c) Coverage provided under an employer''s self-insurance plan or by any of its
    administrators, as defined in section 3959.01 of the Revised Code, to the extent
    that federal law supersedes, preempts, prohibits, or otherwise precludes the application
    of this section to the plan and its administrators.

    (B) A standardized identification card or an electronic technology issued or required
    to be used as provided in division (A)(1) of this section shall contain uniform
    prescription drug information in accordance with either division (B)(1) or (2)
    of this section.

    (1) The standardized identification card or the electronic technology shall be
    in a format and contain information fields approved by the national council for
    prescription drug programs or a successor organization, as specified in the council''s
    or successor organization''s pharmacy identification card implementation guide
    in effect on the first day of October most immediately preceding the issuance
    or required use of the standardized identification card or the electronic technology.

    (2) If the health insuring corporation or the person under contract with the corporation
    to issue a standardized identification card or an electronic technology requires
    the information for the submission and routing of a claim, the standardized identification
    card or the electronic technology shall contain any of the following information:

    (a) The health insuring corporation''s name;

    (b) The subscriber''s name, group number, and identification number;

    (c) A telephone number to inquire about pharmacy-related issues;

    (d) The issuer''s international identification number, labeled as "ANSI BIN" or
    "RxBIN";

    (e) The processor''s control number, labeled as "RxPCN";

    (f) The subscriber''s pharmacy benefits group number if different from the subscriber''s
    medical group number, labeled as "RxGrp."

    (C) If the standardized identification card or the electronic technology issued
    or required to be used as provided in division (A)(1) of this section is also
    used for submission and routing of nonpharmacy claims, the designation "Rx" is
    required to be included as part of the labels identified in divisions (B)(2)(d)
    and (e) of this section if the issuer''s international identification number or
    the processor''s control number is different for medical and pharmacy claims.

    (D) Each health insuring corporation described in division (A) of this section
    shall annually file a certificate with the superintendent of insurance certifying
    that it or any person it contracts with to issue a standardized identification
    card or electronic technology for submission and routing of prescription drug
    claims complies with this section.

    (E)(1) Except as provided in division (E)(2) of this section, if there is a change
    in the information contained in the standardized identification card or the electronic
    technology issued to a subscriber, the health insuring corporation or person under
    contract with the corporation to issue a standardized identification card or an
    electronic technology shall issue a new card or electronic technology to the subscriber.

    (2) A health insuring corporation or person under contract with the corporation
    is not required under division (E)(1) of this section to issue a new card or electronic
    technology to a subscriber more than once during a twelve-month period.

    (F) Nothing in this section shall be construed as requiring a health insuring
    corporation to produce more than one standardized identification card or one electronic
    technology for use by subscribers accessing health care benefits provided under
    a policy, contract, or agreement for health care services.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.111
- number: '1751.12'
  heading: Contractual periodic prepayment or premium rate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A)(1) No contractual periodic prepayment and no premium rate for nongroup
    and conversion policies for health care services, or any amendment to them, may
    be used by any health insuring corporation at any time until the contractual periodic
    prepayment and premium rate, or amendment, have been filed with the superintendent
    of insurance, and shall not be effective until the expiration of sixty days after
    their filing unless the superintendent sooner gives approval. The filing shall
    be accompanied by an actuarial certification in the form prescribed by the superintendent.
    The superintendent shall disapprove the filing, if the superintendent determines
    within the sixty-day period that the contractual periodic prepayment or premium
    rate, or amendment, is not in accordance with sound actuarial principles or is
    not reasonably related to the applicable coverage and characteristics of the applicable
    class of enrollees. The superintendent shall notify the health insuring corporation
    of the disapproval, and it shall thereafter be unlawful for the health insuring
    corporation to use the contractual periodic prepayment or premium rate, or amendment.

    (2) No contractual periodic prepayment for group policies for health care services
    shall be used until the contractual periodic prepayment has been filed with the
    superintendent. The filing shall be accompanied by an actuarial certification
    in the form prescribed by the superintendent. The superintendent may reject a
    filing made under division (A)(2) of this section at any time, with at least thirty
    days'' written notice to a health insuring corporation, if the contractual periodic
    prepayment is not in accordance with sound actuarial principles or is not reasonably
    related to the applicable coverage and characteristics of the applicable class
    of enrollees.

    (3) At any time, the superintendent, upon at least thirty days'' written notice
    to a health insuring corporation, may withdraw the approval given under division
    (A)(1) of this section, deemed or actual, of any contractual periodic prepayment
    or premium rate, or amendment, based on information that either of the following
    applies:

    (a) The contractual periodic prepayment or premium rate, or amendment, is not
    in accordance with sound actuarial principles.

    (b) The contractual periodic prepayment or premium rate, or amendment, is not
    reasonably related to the applicable coverage and characteristics of the applicable
    class of enrollees.

    (4) Any disapproval under division (A)(1) of this section, any rejection of a
    filing made under division (A)(2) of this section, or any withdrawal of approval
    under division (A)(3) of this section, shall be effected by a written notice,
    which shall state the specific basis for the disapproval, rejection, or withdrawal
    and shall be issued in accordance with Chapter 119. of the Revised Code.

    (B) Notwithstanding division (A) of this section, a health insuring corporation
    may use a contractual periodic prepayment or premium rate for policies used for
    the coverage of beneficiaries enrolled in medicare pursuant to a medicare risk
    contract or medicare cost contract, or for policies used for the coverage of beneficiaries
    enrolled in the federal employees health benefits program pursuant to 5 U.S.C.A.
    8905, or for policies used for the coverage of medicaid recipients, or for policies
    used for the coverage of beneficiaries under any other federal health care program
    regulated by a federal regulatory body, or for policies used for the coverage
    of beneficiaries under any contract covering officers or employees of the state
    that has been entered into by the department of administrative services, if both
    of the following apply:

    (1) The contractual periodic prepayment or premium rate has been approved by the
    United States department of health and human services, the United States office
    of personnel management, the department of medicaid, or the department of administrative
    services.

    (2) The contractual periodic prepayment or premium rate is filed with the superintendent
    prior to use and is accompanied by documentation of approval from the United States
    department of health and human services, the United States office of personnel
    management, the department of medicaid, or the department of administrative services.

    (C) The administrative expense portion of all contractual periodic prepayment
    or premium rate filings submitted to the superintendent for review must reflect
    the actual cost of administering the product. The superintendent may require that
    the administrative expense portion of the filings be itemized and supported.

    (D)(1) Copayments, cost sharing, and deductibles must be reasonable and must not
    be a barrier to the necessary utilization of services by enrollees.

    (2) A health insuring corporation, in order to ensure that copayments, cost sharing,
    and deductibles are reasonable and not a barrier to the necessary utilization
    of basic health care services by enrollees shall impose copayment charges, cost
    sharing, and deductible charges that annually do not exceed forty per cent of
    the total annual cost to the health insuring corporation of providing all covered
    health care services when applied to a standard population expected to be covered
    under the filed product in question. The total annual cost of providing a health
    care service is the cost to the health insuring corporation of providing the health
    care service to its enrollees as reduced by any applicable provider discount.
    This requirement shall be demonstrated by an actuary who is a member of the American
    academy of actuaries and qualified to provide such certifications as described
    in the United States qualification standards promulgated by the American academy
    of actuaries pursuant to the code of professional conduct.

    (3) For purposes of division (D) of this section, all of the following apply:

    (a) Copayments imposed by health insuring corporations in connection with a high
    deductible health plan that is linked to a health savings account are reasonable
    and are not a barrier to the necessary utilization of services by enrollees.

    (b) Division (D)(2) of this section does not apply to a high deductible health
    plan that is linked to a health savings account.

    (c) Catastrophic-only plans, as defined under the "Patient Protection and Affordable
    Care Act," 124 Stat. 119, 42 U.S.C. 18022 and any related regulations, are not
    subject to the limits prescribed in division (D) of this section, provided that
    such plans meet all applicable minimum federal requirements.

    (E) A health insuring corporation shall not impose lifetime maximums on basic
    health care services. However, a health insuring corporation may establish a benefit
    limit for inpatient hospital services that are provided pursuant to a policy,
    contract, certificate, or agreement for supplemental health care services.

    (F) The superintendent may adopt rules allowing different copayment, cost sharing,
    and deductible amounts for plans with a medical savings account, health reimbursement
    arrangement, flexible spending account, or similar account;

    (G) A health insuring corporation may impose higher copayment, cost sharing, and
    deductible charges under health plans if requested by the group contract, policy,
    certificate, or agreement holder, or an individual seeking coverage under an individual
    health plan. This shall not be construed as requiring the health insuring corporation
    to create customized health plans for group contract holders or individuals.

    (H) As used in this section, "health savings account" and "high deductible health
    plan" have the same meanings as in the "Internal Revenue Code of 1986," 100 Stat.
    2085, 26 U.S.C. 223, as amended.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
