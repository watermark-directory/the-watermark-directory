- number: '1707.054'
  heading: Portal operators-license
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: '(A) No person other than a dealer licensed under this chapter shall offer
    or sell securities pursuant to an OhioInvests offering or otherwise act as a portal
    operator unless the person is licensed as a portal operator by the division of
    securities or is transacting business through a portal operator licensed by the
    division. Application for a portal operator''s license shall be made in accordance
    with this section and by filing with the division of securities the information,
    materials, and forms specified in rules adopted by the division, along with all
    of the following:

    (1) An application in the form prescribed by the division and all applicable schedules
    and supplemental information;

    (2) A copy of the articles of incorporation or other documents that indicate the
    entity''s form of organization;

    (3) The filing fee as prescribed in section 1707.17 of the Revised Code.

    (B) If the division approves the entity as a portal operator, the division shall
    issue a license certificate to the entity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1707.054
- number: '1707.055'
  heading: Portal operators-prohibited conduct for non-dealer operators
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1707'
    name: Securities
  text: 'No portal operator that is not also a licensed dealer shall do any of the
    following:

    (A) Offer investment advice or recommendations, or solicit the purchase or sale
    of securities. For purposes of this division, a portal operator shall not be considered
    to be offering investment advice or recommendations merely because it selects,
    or may perform due diligence with respect to, issuers or offerings to be listed
    or merely because it provides general investor educational materials.

    (B) Provide transaction-based compensation for securities sold under this chapter
    to employees, agents, or other persons unless the employees, agents, or other
    persons are licensed under this chapter and permitted to receive such compensation.

    (C) Charge a fee to the issuer for an offering of securities on an OhioInvests
    portal unless the fee is one of the following:

    (1) A fixed amount for each offering;

    (2) A variable amount based on the length of time that the securities are offered
    on the portal;

    (3) A combination of such fixed or variable amounts.

    (D) Hold, manage, possess, or otherwise handle purchaser funds or securities,
    unless the portal operator is the issuer.

    (E) No portal operator shall allow its officers, directors, or partners, or any
    person occupying similar status or performing similar function, to have a financial
    interest in an OhioInvests issuer using the services of the portal operator, or
    receive a financial interest in the OhioInvests issuer as compensation for services
    provided to, or for the benefit of, the OhioInvests issuer, in connection with
    the offer and sale of its securities.'
