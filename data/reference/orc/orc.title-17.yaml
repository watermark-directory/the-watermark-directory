- number: '1706.768'
  heading: Separate asset series-events causing series dissolution
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: 'A series is dissolved and its activities and affairs shall be wound up upon
    the first to occur of the following:

    (A) The dissolution of the limited liability company under section 1706.47 of
    the Revised Code;

    (B) An event or circumstance that the operating agreement states causes dissolution
    of the series;

    (C) The consent of all of the members associated with the series;

    (D) The passage of ninety days after the occurrence of the dissociation of the
    last remaining member associated with the series;

    (E) On application by a member associated with the series, the entry by the appropriate
    court of an order dissolving the series on the grounds that it is not reasonably
    practicable to carry on the series'' activities in conformity with the operating
    agreement.'
