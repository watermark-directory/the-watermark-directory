- number: '1724.03'
  heading: Regulations for government of corporation - board of directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1724'
    name: Community Improvement Corporations
  text: '(A) After the articles of incorporation have been filed, and at the first
    meeting of the board of directors of a county land reutilization corporation,
    the board shall adopt regulations for the government of the corporation, the conduct
    of its affairs, and the management of its property, consistent with law and the
    articles. The content of the regulations shall be governed by section 1702.11
    of the Revised Code to the extent not inconsistent with this chapter.

    (B) The board of directors of a county land reutilization corporation shall be
    composed of five, seven, or nine members, including the county treasurer, at least
    two of the members of the board of county commissioners, one representative of
    the largest municipal corporation, based on the population according to the most
    recent federal decennial census, that is located in the county, one representative
    of a township with a population of at least ten thousand in the unincorporated
    area of the township according to the most recent federal decennial census, if
    at least two such townships exist in the county, and any remaining members selected
    by the treasurer and the county commissioners who are members of the corporation''s
    board. The township representative shall be chosen by a majority of the boards
    of township trustees of townships with a population of at least ten thousand in
    the unincorporated area of the township according to the most recent federal decennial
    census. At least one board member shall have private sector or nonprofit experience
    in rehabilitation or real estate acquisitions. A county treasurer and the county
    commissioners each may appoint a representative, as a director of the corporation,
    to act for the officer at any of the meetings of the corporation. Except as may
    otherwise be authorized by the regulations of the corporation, all members of
    the board of directors shall serve without compensation, but shall be reimbursed
    for actual and necessary expenses.'
