- number: '1706.175'
  heading: Certificate of full force and effect; foreign limited liability company
    certificate of registration
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) The secretary of state, upon request and payment of the requisite fee,
    shall furnish to any person a certificate of full force and effect for a limited
    liability company if the records filed in the office of the secretary of state
    show that the limited liability company has been formed under the laws of this
    state. A certificate of full force and effect shall state all of the following:

    (1) The limited liability company''s name;

    (2) The limited liability company''s date of formation;

    (3) That the limited liability company is in full force and effect on the records
    of the secretary of state.

    (B) The secretary of state, upon request and payment of the requisite fee, shall
    furnish to any person a certificate of registration for a foreign limited liability
    company if the records filed in the office of the secretary of state show that
    the secretary of state has filed a certificate of registration for the foreign
    limited liability company, has not canceled the certificate of registration for
    the foreign limited liability company, and has not filed a statement of cancellation
    of the certificate of registration for the foreign limited liability company.
    A certificate of registration shall state both of the following:

    (1) The foreign limited liability company''s name;

    (2) That the foreign limited liability company is authorized to transact business
    in this state.

    (C) Subject to any qualification stated in the certificate, a certificate of existence
    or certificate of registration issued by the secretary of state is, for a period
    of thirty days after the date of such certificate, conclusive evidence that the
    limited liability company is in existence or the foreign limited liability company
    is authorized to transact business in this state.'
