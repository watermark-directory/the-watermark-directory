- number: '1703.27'
  heading: Foreign nonprofit corporations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: 'No foreign nonprofit corporation shall exercise its corporate privileges
    in this state in a continual course of transactions until it has first procured
    from the secretary of state a certificate authorizing it to do so.

    Before issuing such certificate, the secretary of state shall require such foreign
    corporation to file in the secretary of state''s office a certificate of good
    standing or subsistence, setting forth the exact corporate title, the date of
    incorporation, and the fact that the corporation is in good standing or is a subsisting
    corporation, certified by the secretary of state, or other proper official, of
    the state under the laws of which the corporation was incorporated, and a statement,
    on a form prescribed by the secretary of state, verified by the oath of one of
    its officers, setting forth, but not limited to, the following:

    (A) The name of the corporation;

    (B) The state under the laws of which it is incorporated;

    (C) The location of its principal office;

    (D) The corporate privileges it proposes to exercise in this state;

    (E) The appointment of a designated agent and the complete address of such agent,
    which shall comply with the requirements of section 1703.041 of the Revised Code;

    (F) Its irrevocable consent to service of process on such agent so long as the
    authority of the agent continues and to service of process upon the secretary
    of state in the events provided for in section 1703.19 of the Revised Code.

    For the filing of that statement, the secretary of state shall charge and collect
    the fee specified in division (I)(1) of section 111.16 of the Revised Code.

    A foreign nonprofit corporation shall file an amendment with the secretary of
    state if there is a modification of any of the information required to be included
    in its statement, except for changes in information required by division (E) of
    this section, which shall be corrected in the same manner as described in section
    1702.06 of the Revised Code. For the filing of those amendments and corrections,
    the secretary of state shall charge and collect the fee specified in division
    (B) or (R) of section 111.16 of the Revised Code.

    Sections 1703.01 to 1703.31 of the Revised Code, governing foreign corporations
    for profit in respect to exemption from attachment, change of location of principal
    office, change of its designated agent or of the designated agent''s address,
    service on the secretary of state, license certificate as prima-facie evidence,
    proof of due incorporation, filing of amendments evidencing changes of corporate
    name, merger, or consolidation, filing of certificate of surrender, service on
    retired corporation, and penalties or forfeitures for transacting business without
    license, for false reports, and for failure to comply with other applicable provisions
    of such sections, shall also apply to foreign nonprofit corporations.

    The secretary of state may require further reports, certificates, or information
    from a foreign nonprofit corporation, including verification of the continued
    existence of the corporation. Upon the failure of any corporation to provide the
    information, the secretary of state shall give notice of the failure by certified
    mail and, if the report is not filed within thirty days after the mailing of the
    notice, the license of the corporation to exercise its corporate privileges in
    this state shall expire and the secretary of state shall make a notation to that
    effect on the secretary of state''s records.'
