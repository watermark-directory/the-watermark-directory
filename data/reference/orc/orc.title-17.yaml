- number: '1726.05'
  heading: Acquiring shares
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: '(A) All persons, firms, partnerships, joint stock companies, association,
    or trust, and domestic corporations organized for the purpose of carrying on business
    within this state, including without limitation, any public utility companies,
    banking companies, trust companies, and foreign corporations licensed to do business
    in the state, except as provided in division (C) of this section, are hereby authorized
    to acquire, purchase, hold, sell, assign, transfer, mortgage, pledge, or otherwise
    dispose of any bonds, securities, or other evidences of indebtedness created by,
    or the shares of the capital stock of the corporation, and while owners of said
    shares to exercise all the rights, powers, and privileges of ownership, including
    the right to vote thereon.

    (B) All financial institutions are hereby authorized to become members of the
    corporation and to make loans to such corporations as provided herein.

    (C) A financial institution which does not become a member of a corporation shall
    not be permitted to acquire any shares of such corporation.

    (D) Each financial institution which becomes a member of the corporation may acquire,
    purchase, hold, sell, assign, transfer, mortgage, pledge, or otherwise dispose
    of, any bonds, securities, or other evidences of indebtedness created by, or the
    shares of such corporation, and while owners of said shares to exercise all the
    rights, powers, and privileges of ownership, including the right to vote thereon;
    provided, the amount of shares which may be acquired by any member pursuant to
    the authority granted by this section shall not exceed ten per cent of the loan
    limit of such member. The amount of shares of the development corporation which
    any member is authorized to acquire pursuant to the authority granted by this
    section is in addition to the amount of shares in other corporations which such
    member may otherwise be authorized to acquire by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1726.05
- number: '1726.06'
  heading: Requesting membership
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1726'
    name: Development Corporations
  text: 'Any financial institution may request membership in a corporation incorporated
    under Chapter 1726. of the Revised Code by making application to the board of
    directors of the corporation on a form and in such manner as said board of directors
    may require, and membership shall become effective upon acceptance of such application
    by said board. Upon written notice given to the corporation, one year in advance,
    a member may withdraw from membership in the corporation at the expiration date
    of said notice.

    Each member of the corporation shall make loans to the corporation as and when
    called upon by it to do so on such terms and other conditions as shall be approved
    from time to time by the board of directors of the corporation subject to the
    following conditions:

    (A) The loan limit for any member shall be established initially by agreement
    between such member and the corporation at the time such member''s membership
    becomes effective and may thereafter be increased by agreement between such member
    and the corporation, or decreased by agreement after written notice of such decrease
    given to the corporation one year in advance.

    (B) No loans to the corporation shall be made if immediately thereafter, the total
    amount of the obligations of the corporation would exceed ten times the amount
    then paid in on the outstanding shares of the corporation.

    (C) The total amount outstanding on loans to the corporation made by any member
    at any one time, when added to the amount of the investment in the shares of the
    corporation then held by such member, shall not exceed the following limits, to
    be determined as of the time such member becomes a member on the basis of the
    audited balance sheet of such member at the close of its fiscal year immediately
    preceding its application for membership: two per cent of the capital and surplus
    of commercial banks and trust companies; and such limits as may be approved by
    the board of directors of the corporation for other financial institutions.

    (D) Each call made by the corporation shall be prorated among the members of the
    corporation in substantially the same proportion that the adjusted loan limit
    of each member bears to the aggregate of the adjusted loan limit of all members.
    The adjusted loan limit of a member shall be the amount of such member''s loan
    limit, reduced by the balance of outstanding loans by such member to the corporation
    and the investment in shares of the corporation held by such member at the time
    of such call.

    (E) All loans to the corporation by member shall be evidenced by bonds, debentures,
    notes, or other evidences of indebtedness of the corporation, which shall be negotiable
    and which shall bear interest at a rate of not less than one quarter of one per
    cent in excess of the rate of interest determined by the board of directors of
    the corporation to be the prime rate prevailing at the date of issuance thereof
    on unsecured commercial loans.'
