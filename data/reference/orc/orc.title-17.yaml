- number: '1711.22'
  heading: County aid to county and independent agricultural societies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A)(1) When a county or a county agricultural society owns or holds under
    a lease real estate used as a fairground, and such society has the control and
    management of such lands and buildings, the board of county commissioners shall,
    on the request of such society, annually appropriate from the general fund not
    less than fifteen hundred dollars for the purpose of encouraging agricultural
    fairs.

    (2) In any county in which there is located one or more independent agricultural
    societies, the board, for the purpose of encouraging such societies, may appropriate,
    in addition to the sum appropriated for the county agricultural society, a sum
    not greater than the amount appropriated for the county society.

    (B) In a county in which there is no county agricultural society, or in which
    there is no fair held by such a society, but in which there exists an independent
    agricultural society , the board shall, on the request of the independent agricultural
    society, annually appropriate from the general fund not less than fifteen hundred
    dollars for the purpose of encouraging such independent agricultural fairs.

    (C) No board shall appropriate money as provided by this section unless the director
    of agriculture has certified to the board that the county or independent agricultural
    society is complying with all laws, rules and regulations governing the operation
    of county or independent agricultural societies.

    (D) The county treasurer shall pay any money appropriated in accordance with this
    section to the treasurer of the society for whose use it was made, upon an order
    issued from the county auditor.'
