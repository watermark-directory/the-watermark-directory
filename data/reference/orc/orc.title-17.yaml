- number: '1743.11'
  heading: Foreign-trade zone
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1743'
    name: Miscellaneous Provisions And Types Of Companies
  text: Any corporation may be organized and chartered for the purpose of establishing,
    operating, and maintaining a foreign-trade zone within this state under the act
    of June 18, 1934, 48 Stat. 998, 19 U.S.C.A. 81A, as amended or reenacted, and
    may apply to the board created under that act for a grant of the privilege of
    establishing, operating, and maintaining such a zone. If the application is granted,
    the corporation may accept the grant and establish, operate, and maintain such
    a zone subject to the act, as amended or reenacted, and rules adopted thereunder.
