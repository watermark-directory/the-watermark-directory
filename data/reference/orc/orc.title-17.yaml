    name: Foreign Corporations
  text: Sections 1703.01 to 1703.31 of the Revised Code do not apply to corporations
    engaged in this state solely in interstate commerce, including the installation,
    demonstration, or repair of machinery or equipment sold by them in interstate
    commerce, by engineers, or by employees especially experienced as to such machinery
    or equipment, as part thereof; to credit unions, title guarantee and trust companies,
    bond investment companies, and insurance companies; or to public utility companies
    engaged in this state in interstate commerce.
