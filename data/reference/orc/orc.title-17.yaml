- number: '1751.06'
  heading: Powers upon obtaining certificate
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'Upon obtaining a certificate of authority as required under this chapter,
    a health insuring corporation may do all of the following:

    (A) Enroll individuals and their dependents in either of the following circumstances:

    (1) The individual resides or lives in the approved service area.

    (2) The individual''s place of employment is located in the approved service area.

    (B) Contract with providers and health care facilities for the health care services
    to which enrollees are entitled under the terms of the health insuring corporation''s
    health care contracts;

    (C) Contract with insurance companies authorized to do business in this state
    for insurance, indemnity, or reimbursement against the cost of providing emergency
    and nonemergency health care services for enrollees, subject to the provisions
    set forth in this chapter and the limitations set forth in the Revised Code;

    (D) Contract with any person pursuant to the requirements of division (A)(18)
    of section 1751.03 of the Revised Code for managerial or administrative services,
    or for data processing, actuarial analysis, billing services, or any other services
    authorized by the superintendent of insurance. However, a health insuring corporation
    shall not enter into a contract for any of the services listed in this division
    with an insurance company that is not authorized to engage in the business of
    insurance in this state.

    (E) Accept from governmental agencies, private agencies, corporations, associations,
    groups, individuals, or other persons, payments covering all or part of the costs
    of planning, development, construction, and the provision of health care services;

    (F) Purchase, lease, construct, renovate, operate, or maintain health care facilities,
    and their ancillary equipment, and any property necessary in the transaction of
    the business of the health insuring corporation;

    (G) In the employer group market, impose an affiliation period of not more than
    sixty days, or for late enrollees an affiliation period of not more than ninety
    days, which period begins on the individual''s date of enrollment and runs concurrently
    with any waiting period imposed under the coverage. For purposes of this division,
    "affiliation period" means a period of time which, under the terms of the coverage
    offered, must expire before the coverage becomes effective. No health care services
    or benefits need to be provided during an affiliation period, and no periodic
    prepayments can be charged for any coverage during that period.

    (H) If a health insuring corporation offers coverage in the small employer group
    market through a network plan, limit or deny the coverage in accordance with section
    3924.031 of the Revised Code;

    (I) Refuse to issue coverage in the small employer group market pursuant to section
    3924.032 of the Revised Code;

    (J) Establish employer contribution rules or group participation rules for the
    offering of coverage in connection with a group contract in the small employer
    group market, as provided in division (E)(1) of section 3924.03 of the Revised
    Code.

    Nothing in this section shall be construed as prohibiting a health insuring corporation
    without other commercial enrollment from contracting solely with federal health
    care programs regulated by federal regulatory bodies.

    Nothing in this section shall be construed to limit the authority of a health
    insuring corporation to perform those functions not otherwise prohibited by law.'
