- number: '1703.191'
  heading: Service of process on secretary of state in action against unlicensed foreign
    corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: 'Any foreign corporation required to be licensed under sections 1703.01 to
    1703.31 of the Revised Code, which transacts business in this state without being
    so licensed, shall be conclusively presumed to have designated the secretary of
    state as its agent for the service of process in any action against such corporation
    arising out of acts or omissions of such corporation within this state, including,
    without limitation, any action to recover the statutory forfeiture for failure
    to be so licensed. Pursuant to such service, suit may be brought in Franklin county,
    or in any county in which such corporation did any act or transacted any business.
    Such service shall be made upon the secretary of state by leaving with him, or
    with an assistant secretary of state, duplicate copies of such process, together
    with an affidavit of the plaintiff or one of the plaintiff''s attorneys, showing
    the last known address of such corporation, and a fee of five dollars which shall
    be included as taxable costs in case of judicial proceedings. Upon receipt of
    such process, affidavit, and fee the secretary of state shall forthwith give notice
    to the corporation at the address specified in the affidavit and forward to such
    address by certified mail, with a request for return receipt, a copy of such process.

    The secretary of state shall retain a copy of such process in his files, keep
    a record of any such process served upon him, and record therein the time of such
    service and his action thereafter with respect thereto.

    This section does not affect any right to serve process upon a foreign corporation
    in any other manner permitted by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1703.191
- number: '1703.20'
  heading: Freedom from attachment
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
