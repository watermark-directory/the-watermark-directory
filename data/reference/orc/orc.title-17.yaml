- number: '1711.17'
  heading: County joint ownership
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: '(A) In any counties in which there is a duly organized independent agricultural
    society, the respective boards of county commissioners may purchase or lease jointly,
    for a term of not less than twenty years, real estate on which to hold fairs under
    the management and control of the society, and may erect suitable buildings and
    otherwise improve the property, and pay the rental thereof, or contribute to or
    pay any other form of indebtedness of the society, if the director of agriculture
    has certified to the board that the independent agricultural society is complying
    with all laws and rules governing the operation of county agricultural societies.
    The boards may appropriate from their respective general funds such an amount
    as they consider necessary for any of those purposes.

    (B) An independent agricultural society may purchase or lease, for a term of not
    less than twenty years, real estate on which to hold fairs under its management
    and control and may erect suitable buildings on the real estate and otherwise
    improve it.'
