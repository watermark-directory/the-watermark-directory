- number: '1706.173'
  heading: Certificates of correction
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A limited liability company or foreign limited liability company may
    deliver to the secretary of state for filing a certificate of correction to correct
    a record previously delivered by the limited liability company or foreign limited
    liability company to the secretary of state and filed by the secretary of state
    if at the time of filing the record contained incorrect or inaccurate information
    or was defectively signed.

    (B) A certificate of correction under division (A) of this section shall not state
    a delayed effective date and shall do all of the following:

    (1) Describe the record to be corrected, including its filing date, or attach
    a copy of the record as filed;

    (2) Specify the inaccurate information or the defect in the signing;

    (3) Correct the incorrect or inaccurate information or defective signature.

    (C) When filed by the secretary of state, a certificate of correction is effective
    retroactively as of the effective date of the record the statement corrects, but
    the statement is effective when filed as to persons that previously relied on
    the uncorrected record and would be adversely affected by the correction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.173
- number: '1706.174'
  heading: Incorrect or inaccurate records - penalty
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A person who signs a record authorized or required to be filed under
    this chapter thereby affirms under penalty for falsification as described in section
    2921.13 of the Revised Code that the facts stated in the record are true in all
    material respects.

    (B) If a record delivered to the secretary of state for filing under this chapter
    and filed by the secretary of state contains incorrect or inaccurate information,
    a person that suffers a loss by reasonable reliance on the information may recover
    damages for the loss from a person that signed the record, or caused another to
    sign it on the person''s behalf, and knew the information to be incorrect or inaccurate
    at the time the record was signed.'
