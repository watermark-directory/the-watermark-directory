- number: '1706.341'
  heading: Assignment of limited liability company interest
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) An assignment, in whole or in part, of a membership interest:

    (1) Is permissible;

    (2)(a) Does not by itself cause a member to cease to be a member of the limited
    liability company;

    (b) Does not by itself cause a member to cease to be associated with a series
    of the limited liability company.

    (3) Does not by itself cause a dissolution and winding up of the limited liability
    company, or a series thereof;

    (4) Subject to section 1706.332 of the Revised Code, does not entitle the assignee
    to do either of the following:

    (a) Participate in the management or conduct of the activities of the limited
    liability company, or a series thereof;

    (b) Have access to records or other information concerning the activities of the
    limited liability company, or a series thereof.

    (B) An assignee has the right to receive, in accordance with the assignment, distributions
    to which the assignor would otherwise be entitled.

    (C) A membership interest may be evidenced by a certificate of membership interest
    issued by the limited liability company, or a series thereof. An operating agreement
    may provide for the assignment of the membership interest represented by the certificate
    and make other provisions with respect to the certificate.

    (D) A limited liability company, or a series thereof, shall not issue a certificate
    of membership interest in bearer form.

    (E) A limited liability company, or a series thereof, need not give effect to
    an assignee''s rights under this section until the limited liability company,
    or a series thereof, has notice of the assignment.

    (F) Except as otherwise provided in division (J) of section 1706.411 of the Revised
    Code, when a member assigns a membership interest, the assignor retains the rights
    of a member other than the right to distributions assigned and retains all duties
    and obligations of a member.

    (G) When a member assigns a membership interest to a person that is admitted as
    a member with respect to the assigned interest, the assignee is only liable for
    the member''s obligations under section 1706.281 of the Revised Code to the extent
    that the obligations are known to the assignee when the assignee voluntarily accepts
    admission as a member.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.341
- number: '1706.342'
  heading: Charging order relating to judgments
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) On application to a court of competent jurisdiction by any judgment creditor
    of a member or assignee, the court may charge the membership interest of the judgment
    debtor with payment of the unsatisfied amount of the judgment with interest. To
    the extent so charged and after the limited liability company has been served
    with the charging order, the judgment creditor has only the right to receive any
    distribution or distributions to which the judgment debtor would otherwise be
    entitled in respect of the membership interest.

    (B) After the limited liability company is served with a charging order, the limited
    liability company or any member shall be entitled to pay to or deposit with the
    clerk of the court so issuing the charging order any distribution or distributions
    to which the judgment debtor would otherwise be entitled in respect of the charged
    membership interest, and the payment or deposit shall discharge the limited liability
    company and the judgment debtor from liability for the amount so paid or deposited
    and any interest that might accrue thereon. Upon receipt of the payment or deposit,
    the clerk of the court shall notify the judgment creditor of the receipt of the
    payment or deposit. The judgment creditor shall, after any payment or deposit
    into the court, petition the court for payment of so much of the amount paid or
    deposited as may be necessary to pay the judgment creditor''s judgment. To the
    extent the court has excess amounts paid or deposited on hand after the payment
    to the judgment creditor, the excess amounts paid or deposited shall be distributed
    to the judgment debtor, and the charging order shall be extinguished. The court
    may, in its discretion, order the clerk to deposit, pending the judgment creditor''s
    petition, any money paid or deposited with the clerk, in an interest bearing account
    at a bank authorized to receive deposits of public funds.

    (C) A charging order constitutes a lien on the judgment debtor''s membership interest.

    (D) Subject to division (C) of this section, both of the following apply:

    (1) A judgment debtor that is a member retains the rights of a member and remains
    subject to all duties and obligations of a member.

    (2) A judgment debtor that is an assignee retains the rights of an assignee and
    remains subject to all duties and obligations of an assignee.

    (E) This chapter does not deprive any member or assignee of the benefit of any
    exemption laws applicable to the member''s or assignee''s membership interest.

    (F) This section provides the sole and exclusive remedy by which a judgment creditor
    of a member or assignee may satisfy a judgment out of the judgment debtor''s membership
    interest, and the judgment creditor shall have no right to foreclose, under this
    chapter or any other law, upon the charging order, the charging order lien, or
    the judgment debtor''s membership interest. A judgment creditor of a member or
    assignee has no right to obtain possession of, or otherwise exercise legal or
    equitable remedies with respect to, the judgment debtor''s membership interest
    or the property of a limited liability company. Court orders for actions or requests
    for accounts and inquiries that the judgment debtor might have made to the limited
    liability company are not available to a judgment creditor attempting to satisfy
    the judgment out of the judgment debtor''s membership interest and may not be
    ordered by a court.'
