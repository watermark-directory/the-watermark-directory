- number: '1703.21'
  heading: Evidence
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1703'
    name: Foreign Corporations
  text: 'The license certificate, and any supplemental license certificate, issued
    under sections 1703.01 to 1703.31, inclusive, of the Revised Code, to a foreign
    corporation, or a copy of such certificate certified by the secretary of state,
    shall be prima-facie evidence that such corporation has been duly organized, is
    in existence, and is duly licensed to transact business in this state. Such evidence
    may be rebutted by a certificate of the secretary of state to the effect that
    the license of such corporation to transact business in this state has expired
    or has been and then stands canceled, or otherwise by competent evidence.

    In any action or proceeding, civil or criminal, in any court, a copy of the articles
    of a foreign corporation certified by the secretary of state, or other proper
    official, of the state under the laws of which such corporation was incorporated
    shall be prima-facie evidence of the incorporation, existence, and powers of such
    corporation; but such evidence may be rebutted by a certificate of such secretary
    of state or other official, or otherwise by competent evidence.

    In any such action or proceeding by or against or in any way relating to a corporation
    incorporated under the laws of any of the states of the United States or of any
    territory, insular possession, or other political subdivision of the United States,
    including the District of Columbia, the court shall take judicial notice of the
    constitution, statutes, and judicial decisions thereof relating to the organization
    and powers of corporations.'
