- number: '1731.02'
  heading: Encouraging alliances of small employers to obtain health benefit plans
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: '(A) It is determined and declared that the provision of health care to employees
    and retirees in this state and to their dependents and families is of paramount
    public importance to the economic and general welfare of the people of the state,
    that rising costs of health care have made it difficult for small employers to
    provide for health care benefits, that the creation of alliances of small employers
    to bargain with insurers better assures the obtaining of adequate coverage and
    benefits under health benefit plans at affordable costs and that the larger the
    number of employees and other covered persons under such alliance, the more certain
    is the achievement of those objectives, and that it is the public policy and a
    public purpose of the state to encourage alliances of small employers to obtain
    health benefit plans, and to permit flexibility in the coverage and benefits thereunder
    and encourage substantial size in such alliances, in order to enhance strength
    in bargaining and economies of scale and thereby achieve broader coverage and
    benefit options at reduced costs.

    (B) The provisions and authority under and benefits provided by this chapter shall
    be liberally construed and applied toward the achievement of the public objectives
    set forth in division (A) of this section.

    (C) The provisions and authority provided by this chapter are in addition to and
    not in derogation of other authority under law and do not reflect adversely on
    any existing or future health benefit organization, program, or arrangement for
    the benefit of more than one employer that is established under other authority.
    Any such organization, program, or arrangement that fits the definitions of "small
    employer health care alliance" and "alliance program," respectively, in section
    1731.01 of the Revised Code and otherwise conforms to the applicable conditions
    and provisions of this chapter is entitled to all applicable benefits under this
    chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1731.02
- number: '1731.021'
  heading: Obtaining certificate of authority from superintendent of insurance
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: '(A) No organization, on or after July 1, 1996, shall sponsor an alliance
    health care program without first obtaining a certificate of authority from the
    superintendent of insurance.

    (B) Application for a certificate of authority to sponsor an alliance program
    shall be made by an organization in writing and in the form prescribed by the
    superintendent.

    (C) The superintendent shall, within ninety days after receipt of an application
    filed pursuant to division (B) of this section, do either of the following:

    (1) Grant a certificate of authority to the applicant if the superintendent determines
    that the applicant is in compliance with this chapter and any rules adopted thereunder.

    (2) Deny the application for a certificate of authority if the superintendent
    determines that the applicant is not in compliance with this chapter or any rules
    adopted thereunder. A notice of the denial shall be mailed to the applicant within
    thirty days after the superintendent makes the determination. The notice shall
    specify the reasons for the denial and shall state that the applicant may request
    a hearing within thirty days after the date the notice was mailed.

    (D) A certificate of authority granted under this section shall remain in effect
    through the thirtieth day of June following the date it was granted.

    (E) The superintendent shall, at least sixty days prior to the expiration of a
    certificate of authority, provide notice to the organization of the need for filing
    a renewal application.

    (F) A certificate of authority may be renewed for the ensuing twelve-month period
    commencing on the first day of July by an organization''s filing an application
    in accordance with division (B) of this section. The superintendent shall renew
    the certificate of authority if the superintendent determines that the applicant
    meets the standards set forth in division (C) of this section for an initial certificate.

    (G) No insurer or organization shall use the term "alliance," "small employer
    health care alliance," "alliance program," "alliance health care program," or
    any other similar term with respect to a health benefit program unless the organization
    that sponsors the program has been granted a certificate of authority under this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1731.021
- number: '1731.03'
  heading: Small employer health care alliance powers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1731'
    name: Small Employer Health Care Alliances
  text: '(A) A small employer health care alliance may do any of the following:

    (1) Negotiate and enter into agreements with one or more insurers for the insurers
    to offer and provide one or more health benefit plans to small employers for their
    employees and retirees, and the dependents and members of the families of such
    employees and retirees, which coverage may be made available to enrolled small
    employers without regard to industrial, rating, or other classifications among
    the enrolled small employers under an alliance program, except as otherwise provided
    under the alliance program, and for the alliance to perform, or contract with
    others for the performance of, functions under or with respect to the alliance
    program;

    (2) Contract with another alliance for the inclusion of the small employer members
    of one in the alliance program of the other;

    (3) Provide or cause to be provided to small employers information concerning
    the availability, coverage, benefits, premiums, and other information regarding
    an alliance program and promote the alliance program;

    (4) Provide, or contract with others to provide, enrollment, record keeping, information,
    premium billing, collection and transmittal, and other services under an alliance
    program;

    (5) Receive reports and information from the insurer and negotiate and enter into
    agreements with respect to inspection and audit of the books and records of the
    insurer;

    (6) Provide services to and on behalf of an alliance program sponsored by another
    alliance, including entering into an agreement described in division (B) of section
    1731.01 of the Revised Code on behalf of the other alliance;

    (7) If it is a nonprofit corporation created under Chapter 1702. of the Revised
    Code, exercise all powers and authority of such corporations under the laws of
    the state, or, if otherwise constituted, exercise such powers and authority as
    apply to it under the applicable laws, and its articles, regulations, constitution,
    bylaws, or other relevant governing instruments.

    (B) A small employer health care alliance is not and shall not be regarded for
    any purpose of law as an insurer, an offeror or seller of any insurance, a partner
    of or joint venturer with any insurer, an agent of, or solicitor for an agent
    of, or representative of, an insurer or an offeror or seller of any insurance,
    an adjuster of claims, or a third-party administrator, and will not be liable
    under or by reason of any insurance coverage or other health benefit plan provided
    or not provided by any insurer or by reason of any conditions or restrictions
    on eligibility or benefits under an alliance program or any insurance or other
    health benefit plan provided under an alliance program or by reason of the application
    of those conditions or restrictions.

    (C) The promotion of an alliance program by an alliance or by an insurer is not
    and shall not be regarded for any purpose of law as the offer, solicitation, or
    sale of insurance.

    (D)(1) No alliance shall adopt, impose, or enforce medical underwriting rules
    or underwriting rules requiring a small employer to have more than a minimum number
    of employees for the purpose of determining whether an alliance member is eligible
    to purchase a policy, contract, or plan of health insurance or health benefits
    from any insurer in connection with the alliance health care program.

    (2) No alliance shall reject any applicant for membership in the alliance based
    on the health status of the applicant''s employees or their dependents or because
    the small employer does not have more than a minimum number of employees.

    (3) A violation of division (D)(1) or (2) of this section is deemed to be an unfair
    and deceptive act or practice in the business of insurance under sections 3901.19
    to 3901.26 of the Revised Code.

    (4) Nothing in division (D)(1) or (2) of this section shall be construed as inhibiting
    or preventing an alliance from adopting, imposing, and enforcing rules, conditions,
    limitations, or restrictions that are based on factors other than the health status
    of employees or their dependents or the size of the small employer for the purpose
    of determining whether a small employer is eligible to become a member of the
    alliance. Division (D)(1) of this section does not apply to an insurer that sells
    health coverage to an alliance member under an alliance health care program.

    (E) Except as otherwise specified in section 1731.09 of the Revised Code, health
    benefit plans offered and sold to alliance members that are small employers as
    defined in section 3924.01 of the Revised Code are subject to sections 3924.01
    to 3924.06 of the Revised Code.

    (F) Any person who represents an alliance in bargaining or negotiating a health
    benefit plan with an insurer shall disclose to the governing board of the alliance
    any direct or indirect financial relationship the person has or had during the
    past two years with the insurer.'
