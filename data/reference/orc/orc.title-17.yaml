- number: '1751.56'
  heading: Effect of supplemental sickness and accident insurance policy
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) No individual or group health insuring corporation policy, contract,
    or agreement shall be delivered, issued for delivery, or renewed in this state,
    if the policy, contract, or agreement excludes or reduces the benefits payable
    to or on behalf of an insured because benefits are also payable or have been paid
    under a supplemental sickness and accident insurance policy to which all of the
    following apply:

    (1) The policy covers a specified disease or a limited plan of coverage.

    (2) The policy is specifically designed, advertised, represented, and sold as
    a supplement to other basic sickness and accident insurance coverage.

    (3) The entire premium for the policy is paid by the insured, the insured''s family,
    or the insured''s guardian.

    (B) This section applies to supplemental sickness and accident insurance policies
    irrespective of the mode or channel of premium payment to the insurer or of any
    reduction in the premium by virtue of the insured''s membership in any health
    insuring corporation or the insured''s status as an employee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.56
- number: '1751.57'
  heading: Conditions applying to all individual health insuring corporation contracts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) The following conditions apply to all individual health insuring corporation
    contracts:

    (1) Except as provided in section 2742(b) to (e) of the "Health Insurance Portability
    and Accountability Act of 1996," Pub. L. No. 104-191, 110 Stat. 1955, 42 U.S.C.A.
    300gg-42, as amended, a health insuring corporation that provides individual coverage
    to an individual shall renew or continue in force such coverage at the option
    of the individual.

    (2) Such individual contracts are subject to sections 2743 and 2747 of the "Health
    Insurance Portability and Accountability Act of 1996."

    (3) Sections 3924.031 and 3924.032 of the Revised Code shall apply to health insuring
    corporation contracts offered in the individual market in the same manner as they
    apply to health benefit plans offered in the small employer market.

    (B) In accordance with 45 C.F.R. 148.102, this section also applies to all group
    health insuring corporation contracts that are not sold in connection with an
    employment-related group health care plan and that provide more than short-term,
    limited duration coverage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.57
- number: '1751.58'
  heading: Conditions applying to all group health insuring corporation contracts
    sold in connection with employment-related group health care plan
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'Except as otherwise provided in section 2721 of the "Health Insurance Portability
    and Accountability Act of 1996," Pub. L. No. 104-191, 110 Stat. 1955, 42 U.S.C.A.
    300gg-21, as amended, the following conditions apply to all group health insuring
    corporation contracts that are sold in connection with an employment-related group
    health care plan and that are not subject to section 3924.03 of the Revised Code:

    (A)(1) Except as provided in section 2712(b) to (e) of the "Health Insurance Portability
    and Accountability Act of 1996," if a health insuring corporation offers coverage
    in the small or large group market in connection with a group contract, the corporation
    shall renew or continue in force such coverage at the option of the contract holder.

    (2) A health insuring corporation may cancel or decide not to renew the coverage
    of any eligible employee or of a dependent of an eligible employee under the group
    contract in accordance with division (B) of section 1751.18 of the Revised Code.

    (B) Such group contracts are subject to division (A)(3) of section 3924.03 and
    sections 3924.033 and 3924.27 of the Revised Code.

    (C) Such group contracts shall provide for the special enrollment periods described
    in section 2701(f) of the "Health Insurance Portability and Accountability Act
    of 1996."

    (D) At least once in every twelve-month period, a health insuring corporation
    shall provide to all late enrollees, as defined in section 3924.01 of the Revised
    Code, who are identified by the contract holder, the option to enroll in the group
    contract. The enrollment option shall be provided for a minimum period of thirty
    consecutive days. All delays of coverage imposed under the group contract, including
    any affiliation period, shall begin on the date the health insuring corporation
    receives notice of the late enrollee''s application or request for coverage, and
    shall run concurrently with each other.'
