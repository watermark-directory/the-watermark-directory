- number: '1746.04'
  heading: Filing with secretary of state before transacting business
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: '(A) Except as set forth in section 1746.03 of the Revised Code, before transacting
    business in this state, a business trust shall file in the office of the secretary
    of state, on forms prescribed by the secretary of state, a report containing the
    following information:

    (1) A list of the names and addresses of its trustees;

    (2) The address of its principal office;

    (3) In the case of a foreign business trust, the address of its principal office
    within this state, if any;

    (4) The business names of the business trust, including any fictitious or assumed
    names;

    (5)(a) The name and primary residence or usual place of business address within
    this state of a designated agent upon whom process against the business trust
    may be served;

    (b) As used in division (A)(5)(a) of this section, "usual place of business" means
    a place in this state that is customarily open during normal business hours and
    where an individual is generally present who is authorized to perform the services
    of a registered agent, including accepting service of process and other notifications
    for the person serving as a statutory agent. "Usual place of business" does not
    include a post office box, regardless of whether that post office box has an associated
    street address.

    (6) The irrevocable consent of the business trust to service of process upon its
    designated agent and to service of process upon the secretary of state if, without
    the registration of another agent with the secretary of state, its designated
    agent has died, resigned, lost authority, dissolved, become disqualified, or has
    removed from this state, or if its designated agent cannot, with due diligence,
    be found.

    Such report shall have attached as an exhibit an executed copy of the trust instrument
    or a true and correct copy of it, certified to be such by a trustee before an
    official authorized to administer oaths or by a public official in another state
    in whose office an executed copy is on file.

    (B) Not more than ninety days after the occurrence of any event causing any filing,
    including exhibits, made pursuant to division (A) of this section, or any previous
    filing made pursuant to this division, to be inaccurate or incomplete, there shall
    be filed in the office of the secretary of state all information necessary to
    maintain the accuracy and completeness of such filing.

    (C) The secretary of state shall charge and collect the fees specified in division
    (T) of section 111.16 of the Revised Code for each filing made under division
    (A) or (B) of this section, except for filings under division (B) of this section
    pertaining solely to division (A)(5) of this section, for which the secretary
    of state shall charge and collect the fee specified in division (R) of section
    111.16 of the Revised Code.

    (D) The trust instrument and other information filed in the office of the secretary
    of state are matters of public record, and persons dealing with a business trust
    are charged with constructive notice of the contents of any such instrument or
    information by reason of such filing.

    (E) A copy of a trust instrument or other information filed in the office of the
    secretary of state shall be accepted as prima-facie evidence of the existence
    of the instrument or other information and of its contents, and conclusive evidence
    of the existence of such record.

    (F) The agent designated pursuant to division (A)(5) of this section shall be
    one of the following:

    (1) A natural person who is a resident of this state;

    (2) A domestic or foreign corporation, nonprofit corporation, limited liability
    company, partnership, limited partnership, limited liability partnership, limited
    partnership association, professional association, business trust, or unincorporated
    nonprofit association that has a business address in this state. If the agent
    is an entity other than a domestic corporation, the agent shall meet the requirements
    of Title XVII of the Revised Code for an entity of the agent''s type to transact
    business or exercise privileges in this state.'
