- number: '1761.04'
  heading: Regulation - fees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) The licensing and operation of a credit union share guaranty corporation
    is subject to the regulation of the superintendent of insurance pursuant to Chapters
    3901., 3903., 3905., 3925., 3927., 3929., 3937., 3941., and 3999. of the Revised
    Code to the extent such laws are otherwise applicable and are not in conflict
    with this chapter.

    (B) A credit union share guaranty corporation shall pay, by the fifteenth day
    of April of each year, to the superintendent of credit unions, an annual fee of
    one-half of one per cent of its guarantee fund as shown by the corporation''s
    last annual financial report, but in no event shall such payment exceed twenty-five
    thousand dollars in any calendar year.

    (C) In addition to the specific powers and duties given the superintendent of
    insurance and the superintendent of credit unions under this chapter, the superintendents
    may independently, pursuant to Chapter 119. of the Revised Code, adopt, amend,
    and rescind such rules as are necessary to implement the requirements of this
    chapter.'
