  heading: Complaint
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: In a derivative action brought pursuant to section 1782.56 of the Revised
    Code, the complaint shall set forth with particularity the effort of the plaintiff
    to secure initiation of the action by a general partner or the reasons for not
    making the effort.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1782.58
- number: '1782.59'
  heading: Court orders in successful derivative action
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1782'
    name: Limited Partnerships
  text: If a derivative action brought pursuant to section 1782.56 of the Revised
    Code is successful, in whole or in part, or if anything is received by the plaintiff
    as a result of a judgment, compromise, or settlement of an action or claim, the
    court may award the plaintiff reasonable expenses, including reasonable attorney's
    fees, and shall direct him to remit to the limited partnership the remainder of
    those proceeds received by him.
  history: null
