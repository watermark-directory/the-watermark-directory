- number: '1751.78'
  heading: Application of provisions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A)(1) Sections 1751.77 to 1751.87 and Chapter 3922. of the Revised Code
    apply to any health insuring corporation that provides or performs utilization
    review services in connection with its policies, contracts, and agreements covering
    basic health care services and to any designee of the health insuring corporation,
    or to any utilization review organization that performs utilization review functions
    on behalf of the health insuring corporation in connection with policies, contracts,
    or agreements of the health insuring corporation covering basic health care services.

    (2) Nothing in sections 1751.77 to 1751.82 or section 1751.823 of the Revised
    Code shall be construed to require a health insuring corporation to provide or
    perform utilization review services in connection with health care services provided
    under a policy, plan, or agreement of supplemental health care services or specialty
    health care services.

    (B)(1) Each health insuring corporation shall be responsible for monitoring all
    utilization review and internal review activities carried out by, or on behalf
    of, the health insuring corporation and for ensuring that all requirements of
    sections 1751.77 to 1751.87 and Chapter 3922. of the Revised Code, and any rules
    adopted thereunder, are met. The health insuring corporation shall also ensure
    that appropriate personnel have operational responsibility for the conduct of
    the health insuring corporation''s utilization review program.

    (2) If a health insuring corporation contracts to have a utilization review organization
    or other entity perform the utilization review functions required by sections
    1751.77 to 1751.87 and Chapter 3922. of the Revised Code, and any rules adopted
    thereunder, the superintendent of insurance shall hold the health insuring corporation
    responsible for monitoring the activities of the utilization review organization
    or other entity and for ensuring that the requirements of those sections and rules
    are met.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.78
- number: '1751.79'
  heading: Utilization review program requirements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'A health insuring corporation that conducts utilization review shall prepare
    a written utilization review program that describes all review activities, both
    delegated and nondelegated, for covered health care services provided, including
    the following:

    (A) Procedures to evaluate the clinical necessity, appropriateness, efficacy,
    or efficiency of health care services;

    (B) The use of data sources and clinical review criteria in making decisions;

    (C) Mechanisms to ensure consistent application of criteria and compatible decisions;

    (D) Data collection processes and analytical methods used in assessing utilization
    of health care services;

    (E) Mechanisms for assuring confidentiality of clinical and proprietary information;

    (F) The periodic assessment of utilization review activities, and the reporting
    of these assessments to the health insuring corporation''s board, by a utilization
    review committee, a quality assurance committee, or any similar committee;

    (G) The functional responsibility for day-to-day program management by staff;

    (H) Defined methods by which guidelines are approved and communicated to providers
    and health care facilities.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.79
- number: '1751.80'
  heading: Implementing utilization review programs
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: 'The utilization review program of a health insuring corporation shall be
    implemented in accordance with all of the following:

    (A) The program shall use documented clinical review criteria that are based on
    sound clinical evidence and are evaluated periodically to assure ongoing efficacy.
    A health insuring corporation may develop its own clinical review criteria or
    may purchase or license such criteria from qualified vendors. A health insuring
    corporation shall make its clinical review rationale available upon request to
    authorized government agencies. The rationale made available to authorized government
    agencies is confidential and is not a public record as defined in section 149.43
    of the Revised Code.

    (B) Qualified providers shall administer the program and oversee review determinations.
    A clinical peer in the same, or in a similar, specialty as typically manages the
    medical condition, procedure, or treatment under review shall evaluate the clinical
    appropriateness of adverse determinations that are the subject of an appeal.

    (C) The health insuring corporation shall issue utilization review determinations
    in a timely manner pursuant to the requirements of sections 1751.81 and 1751.82
    of the Revised Code and the enrollee grievance requirements. The health insuring
    corporation shall obtain information required to make a utilization review determination,
    including pertinent clinical information, and shall establish a process to ensure
    that utilization reviewers apply clinical review criteria consistently.

    (D) If the health insuring corporation delegates any utilization review activities
    to a utilization review organization, the health insuring corporation shall maintain
    adequate oversight, including a process by which the health insuring corporation
    evaluates the performance of the organization, and shall maintain copies of both
    of the following:

    (1) A written description of the organization''s activities and responsibilities,
    including reporting requirements;

    (2) Evidence of formal approval of the organization''s program by the health insuring
    corporation.

    (E) The health insuring corporation or its designee utilization review organization
    shall provide enrollees and participating providers with access to its review
    staff by means of a toll-free telephone number or collect-call telephone line.

    (F) When conducting prospective or concurrent review, the health insuring corporation
    or its designee utilization review organization shall collect only the information
    necessary to certify the admission, procedure or treatment, length of stay, frequency,
    and duration of health care services.

    (G) Compensation to persons providing utilization review services for the health
    insuring corporation shall not contain incentives, direct or indirect, for them
    to make inappropriate review decisions.'
