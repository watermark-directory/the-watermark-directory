- number: '1706.41'
  heading: Wrongful dissociation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A person shall not voluntarily dissociate from a limited liability company.

    (B) A person''s dissociation from a limited liability company is wrongful only
    if one of the following applies:

    (1) The dissociation is in breach of an express provision of the operating agreement.

    (2) The person is expelled as a member by a determination of a tribunal under
    division (D) of section 1706.411 of the Revised Code.

    (3) The person is dissociated by becoming a debtor in bankruptcy or making a general
    assignment for the benefit of creditors.

    (C) A person that wrongfully dissociates as a member is liable to the limited
    liability company and, subject to section 1706.61 of the Revised Code, to the
    other members for damages caused by the dissociation. The liability is in addition
    to any other debt, obligation, or liability of the member to the limited liability
    company or the other members.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.41
- number: '1706.411'
  heading: Circumstances causing dissociation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: 'A person is dissociated as a member from a limited liability company in any
    of the following circumstances:

    (A) An event stated in the operating agreement as causing the person''s dissociation
    occurs.

    (B) The person is expelled as a member pursuant to the operating agreement.

    (C) The person is expelled as a member by the unanimous consent of the other members
    if any of the following apply:

    (1) It is unlawful to carry on the limited liability company''s activities with
    the person as a member.

    (2) The person is an entity and, within ninety days after the limited liability
    company notifies the person that it will be expelled as a member because the person
    has filed a statement of dissolution or the equivalent, or its right to transact
    business has been suspended by its jurisdiction of formation, the statement of
    dissolution or the equivalent has not been revoked or its right to transact business
    has not been reinstated.

    (3) The person is an entity and, within ninety days after the limited liability
    company notifies the person that it will be expelled as a member because the person
    has been dissolved and its activities are being wound up, the entity has not been
    reinstated or the dissolution and winding up have not been revoked or canceled.

    (D) On application by the limited liability company, the person is expelled as
    a member by tribunal order for any of the following reasons:

    (1) The person has engaged, or is engaging, in wrongful conduct that has adversely
    and materially affected, or will adversely and materially affect, the limited
    liability company''s activities.

    (2) The person has willfully or persistently committed, or is willfully or persistently
    committing, a material breach of the operating agreement or the person''s duties
    or obligations under this chapter or other applicable law.

    (3) The person has engaged, or is engaging, in conduct relating to the limited
    liability company''s activities that makes it not reasonably practicable to carry
    on the activities with the person as a member.

    (E) In the case of a person who is an individual, the person dies, a guardian
    or general conservator is appointed for the person, or a tribunal determines that
    the person has otherwise become incapable of performing the person''s duties as
    a member under this chapter or the operating agreement.

    (F) The person becomes a debtor in bankruptcy, executes an assignment for the
    benefit of creditors, or seeks, consents, or acquiesces to the appointment of
    a trustee, receiver, or liquidator of the person or of all or substantially all
    of the person''s property. This division shall not apply to a person who is the
    sole remaining member of a limited liability company.

    (G) In the case of a person that is a trust or is acting as a member by virtue
    of being a trustee of a trust, the trust''s entire membership interest in the
    limited liability company is distributed, but not solely by reason of the substitution
    of a successor trustee.

    (H) In the case of a person that is an estate or is acting as a member by virtue
    of being a personal representative of an estate, the estate''s entire membership
    interest in the limited liability company is distributed, but not solely by reason
    of the substitution of a successor personal representative.

    (I) In the case of a member that is not an individual, the legal existence of
    the person otherwise terminates.

    (J) There has been an assignment of all of the person''s membership interest other
    than an assignment for security purposes.'
  history: null
