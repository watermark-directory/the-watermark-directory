- number: '1717.01'
  heading: Humane society definitions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: 'As used in sections 1717.01 to 1717.18 of the Revised Code, and in every
    law relating to animals:

    (A) "Animal" includes every living dumb creature;

    (B) "Cruelty," "torment," and "torture" include every act, omission, or neglect
    by which unnecessary or unjustifiable pain or suffering is caused, permitted,
    or allowed to continue, when there is a reasonable remedy or relief;

    (C) "Owner" and "person" include corporations. For the purpose of this section
    the knowledge and acts of the agents and employees of a corporation, in regard
    to animals transported, owned, or employed by, or in the custody of, such agents
    and employees, are the knowledge and acts of the corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.01
- number: '1717.02'
  heading: Objects and powers of humane societies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: The objects of all societies organized under section 1717.05 of the Revised
    Code shall be the inculcation of humane principles and the enforcement of laws
    for the prevention of cruelty to animals. To promote those objects such societies
    may acquire property, real or personal, by purchase or gift. All property acquired
    by such a society, by gift, devise, or bequest, for special purposes, shall be
    vested in its board of trustees, which shall consist of three members elected
    by the society. The board shall manage such property and apply it in accordance
    with the terms of the gift, devise, or bequest, and may sell it and reinvest the
    proceeds.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.02
- number: '1717.05'
  heading: County humane societies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: '(A) A county humane society for the prevention of acts of cruelty to animals
    may be organized in any county by the association of not less than seven persons.

    (B) The members of a county humane society, at a meeting called for the purpose,
    shall elect not less than three of their members as its board of directors, and
    such directors continue in office until their successors are duly chosen.

    (C) The secretary or clerk of the meeting shall make a true record of the proceedings
    thereat and certify and forward the record to the secretary of state, who shall
    record it. The record must contain the name by which the association is to be
    known. On and after its filing with the secretary of state, the board of directors
    and the associates and their successors, have the powers, privileges, and immunities
    incident to incorporated companies. A copy of the record, certified by the secretary
    of state, must be taken in all courts and places in this state as evidence that
    the county humane society is a duly organized and incorporated body.

    (D) A county humane society may elect officers, and make rules, regulations, and
    bylaws, as are deemed expedient by its members for its own government and the
    proper management of its affairs.

    (E) A humane society that organized as a branch of the Ohio humane society prior
    to the effective date of this amendment shall continue to have the same powers
    and duties that were authorized on March 1, 2019. Such a humane society is considered
    to be a county humane society organized under this section for purposes of this
    chapter and any other laws regarding county humane societies.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.05
- number: '1717.06'
  heading: Agents of county humane society
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: '(A) A county humane society organized under section 1717.05 of the Revised
    Code may appoint humane society agents for the purpose of prosecuting any person
    guilty of an act of cruelty to animals. Such agents may arrest any person found
    violating this chapter or any other law for protecting animals or preventing acts
    of cruelty thereto. Upon making an arrest, the humane society agent shall convey
    the person arrested before a court or magistrate having jurisdiction of the offense,
    and there make complaint against the person on oath or affirmation of the offense.

    (B) A humane society agent that was appointed prior to March 31, 2021, by a branch
    of the Ohio humane society is considered to be a humane society agent appointed
    under this section for purposes of this chapter and any other laws regarding humane
    society agents.

    (C)(1) The appointment of an agent under this section is subject to the requirements
    of section 1717.061 of the Revised Code, and is not final until the appointment
    has been approved under division (C)(2) of this section.

    (2) The appointment of an agent under this section does not take effect unless
    it has been approved by the mayor of the municipal corporation for which it is
    made. If the society operates outside a municipal corporation, the appointment
    does not take effect until it has been approved by the probate judge of the county
    for which it is made. The mayor or probate judge shall keep a record of the appointments
    and shall maintain as a public record a copy of the proof of successful completion
    of training for each humane society agent acting within the approving authority''s
    jurisdiction.

    (D) The approving authority shall notify the appropriate county sheriff and the
    board of county commissioners when the appointment of a humane society agent has
    been approved and, not later than two business days after the appointment has
    been approved, shall file a copy of the proof of successful completion of training
    with the sheriff. The county sheriff shall maintain as a public record a copy
    of the proof for each humane society agent that is operating in the county.

    (E) A humane society shall notify the county sheriff and the approving authority
    when all approved humane society agents have ceased to perform the duties of the
    appointment and there are no humane society agents operating in the county.

    (F) A humane society agent only has the specific authority granted to the agent
    under the Revised Code.

    (G) The Ohio peace officer training commission shall issue a certificate of completion
    of the training program required for appointment as a humane society agent under
    this section in accordance with Chapter 4796. of the Revised Code to an individual
    if either of the following applies:

    (1) The individual holds a certificate of completion of such a program in another
    state.

    (2) The individual has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a humane society agent
    in a state that does not require a certificate of completion of such a program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.06
- number: '1717.061'
  heading: Qualifications for appointment as qualified humane society agent
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: 'In order to qualify for appointment as a humane society agent under section
    1717.06 of the Revised Code, an individual shall do both of the following:

    (A) Successfully complete a minimum of twenty hours of training on issues relating
    to the investigation and prosecution of cruelty to and neglect of animals. The
    training shall comply with rules recommended by the peace officer training commission
    under section 109.73 of the Revised Code and shall include, without limitation,
    instruction regarding animal husbandry practices as described in division (A)(12)
    of that section.

    (B) Present proof of successful completion of training, that has been signed by
    the chief executive officer of the organization or entity that provided the training,
    or the officer''s designee, to the current active approving authority for approval.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.061
- number: '1717.062'
  heading: Revocation of humane society agent appointment based on qualifications
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: '(A) An individual who has reasonable cause to believe that a humane society
    agent has not successfully completed the training that is required under section
    1717.061 of the Revised Code or who has reasonable cause to believe that an agent''s
    proof of successful completion of training contains false or misleading information
    may file a complaint, in the form of a affidavit sworn to by the individual, with
    the current acting authority that is responsible for considering approval of agent
    appointments within the jurisdiction. The authority shall notify the agent''s
    humane society, and shall investigate the complaint.

    (B) If the authority finds that the agent has not provided signed proof of successful
    completion of training as required under section 1717.061 of the Revised Code,
    the authority shall provide written notification to the agent''s humane society
    to inform the society that the agent has a right to cure period of thirty days
    from the date of the notification. If the agent has not provided signed proof
    by the end of the right to cure period, the authority shall rescind the approval
    of the appointment and order the applicable humane society to revoke the appointment.

    (C) If the authority finds that the agent knowingly provided proof of successful
    completion of training that contains false or misleading information, the authority
    shall rescind the approval of the appointment and order the applicable humane
    society to revoke the appointment.

    (D) The applicable humane society shall file written notice with the county sheriff
    of the revocation under this section of a humane society agent''s appointment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.062
- number: '1717.07'
  heading: Salary of agents
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: Upon the approval by the mayor of a municipal corporation of the appointment
    of an agent under section 1717.06 of the Revised Code, the legislative authority
    of such municipal corporation shall pay monthly to such agent, from the general
    revenue fund of the municipal corporation, the salary that the legislative authority
    considers just and reasonable. Upon the approval by the probate judge of a county
    of such an appointment, the board of county commissioners of the county shall
    pay monthly to the agent, from the general fund of the county, or from the dog
    and kennel fund of the county, the salary that the board considers just and reasonable.
    Such board and such legislative authority may agree upon the amount each is to
    pay the agent monthly. The salary to be paid monthly to the agent by the legislative
    authority of a village shall be not less than twenty-five dollars; by the legislative
    authority of a city, not less than one hundred twenty-five dollars; and by the
    board of county commissioners of a county, not less than one hundred fifty dollars.
    Beginning January 1, 2020, and on the first day of January every five years thereafter,
    these minimum salary amounts shall increase by five dollars. Not more than one
    such agent in each county shall receive remuneration from the board under this
    section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.07
- number: '1717.08'
  heading: Police powers of officers, agents, and members
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: An officer, agent, or member of a county humane society may interfere to prevent
    the perpetration of any act of cruelty to animals in the officer's, agent's, or
    member's presence, may use such force as is necessary to prevent it, and to that
    end may summon to the officer's, agent's, or member's aid any bystanders.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.08
- number: '1717.09'
  heading: Member may require police to act
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: A member of a county humane society may require the sheriff of any county,
    the constable of any township, the marshal or a police officer of any municipal
    corporation, or any agent of such a society, to arrest any person found violating
    the laws in relation to cruelty to animals, and to take possession of any animal
    cruelly treated in their respective counties or municipal corporations, and deliver
    such animal to the proper officers of the society.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.09
- number: '1717.10'
  heading: Fees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: For all services rendered in carrying out sections 1717.01 to1717.18 of the
    Revised Code, a sheriff, constable, marshal, or police officer shall be paid such
    fees as the sheriff, constable, marshal, or police officer is allowed for like
    services in other cases. Such fees must be charged as costs, and reimbursed to
    the humane society by the person convicted.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.10
- number: '1717.11'
  heading: Liability to owner in damages
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: A person guilty of cruelty to an animal which is the property of another shall
    be liable to the owner of the animal in damages, in addition to the penalties
    prescribed by law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.11
- number: '1717.12'
  heading: Conviction of agent no bar to action against employer
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: The conviction of an agent or employee of cruelty to animals does not bar
    an action for cruelty to animals against his employer for allowing a state of
    facts to exist which will induce cruelty to animals on the part of such agent
    or employee.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.12
- number: '1717.13'
  heading: Any person may protect animal
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: 'When, in order to protect any animal from neglect, it is necessary to take
    possession of it, any person may do so. When an animal is impounded or confined,
    and continues without necessary food, water, or proper attention for more than
    fifteen successive hours, any person may, as often as is necessary, enter any
    place in which the animal is impounded or confined and supply it with necessary
    food, water, and attention, so long as it remains there, or, if necessary or convenient,
    he may remove such animal; and he shall not be liable to an action for such entry.
    In all cases the owner or custodian of such animal, if known to such person, immediately
    shall be notified by him of such action. If the owner or custodian is unknown
    to such person, and cannot with reasonable effort be ascertained by him, such
    animal shall be considered an estray and dealt with as such.

    The necessary expenses for food and attention given to an animal under this section
    may be collected from the owner of such animal, and the animal shall not be exempt
    from levy and sale upon execution issued upon a judgment for such expenses.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.13
- number: '1717.15'
  heading: Board of county commissioners may make yearly appropriation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: The board of county commissioners may, at the end of each year, make a yearly
    appropriation to the county humane society from the general fund of the county
    of such funds as the board deems reasonable. Such funds are to supplement any
    gifts, funds received from the dog and kennel fund, and any other funds received
    by the society and are to be used to carry out the activities of the society.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.15
- number: '1717.16'
  heading: Enforcement activity reports
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: '(A) Annually, a county humane society shall submit enforcement activity reports
    to the county sheriff.

    (B) Records of an enforcement activity by a humane society agent are public records
    under section 149.43 of the Revised Code, except that any such records that are
    confidential law enforcement investigatory records, as defined in division (A)(2)
    of section 149.43 of the Revised Code, are not public records.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.16
- number: '1717.17'
  heading: Humane society agent removal from office for just cause
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: '(A) A probate judge of a county in which a humane society agent operates
    may revoke the approval of an appointment for just cause, under the procedure
    established in division (B) of this section.

    (B)(1) A movant may commence the procedure by filing with the probate court a
    motion to revoke the appointment, in the form of an affidavit sworn to by the
    movant, describing the conduct that constitutes just cause for the motion. The
    probate judge, upon a review of the facts, may dismiss the motion without a hearing,
    or shall direct the clerk of the probate court to serve the humane society agent
    and the humane society with a summons and a copy of the motion and any accompanying
    memorandum in accordance with the Rules of Civil Procedure. The summons must state
    the time and place at which the probate court will conduct a hearing on the motion.

    (2) The humane society agent may waive the right to a hearing. If the humane society
    agent waives the right to a hearing, the probate judge shall revoke the humane
    society agent''s approval of appointment as prayed for in the motion. If the humane
    society agent does not waive the right to a hearing, the probate judge shall conduct
    a hearing on the motion.

    (3) The humane society agent is entitled to the assistance of counsel at the hearing.
    The Rules of Evidence govern conduct of the hearing. At the hearing, the movant
    has the burden of proving, by a preponderance of the evidence, that just cause
    exists for the revocation of the humane society agent''s appointment.

    (4) If, after the hearing, the probate judge finds that the movant has not sustained
    the burden of proof, the probate judge shall deny the motion. If, after the hearing,
    the probate judge finds that the movant has sustained the burden of proof, the
    probate judge shall grant the motion and revoke the humane society agent''s approval
    of appointment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.17
- number: '1717.18'
  heading: Nonprosecution agreements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1717'
    name: Humane Societies
  text: '(A) A humane society may not enter into a written agreement with a person,
    wherein the humane society agrees not to prosecute the person for an alleged violation
    of law, unless the proposed agreement has been reviewed and approved by the judge
    that has presided over the hearing that is required to determine if the officer
    had probable cause to seize the animal, and which is related to the case that
    is the subject of the agreement. As part of the review, if bond has previously
    been set, the judge shall reconsider whether or not the amount of the bond determined
    by the court to be needed for the animal''s care is necessary and reasonable.
    A judge shall not approve a nonprosecution agreement that requires a person to
    provide financial compensation that is in excess of what is necessary and reasonable
    for the animal''s care for the duration of the impoundment.

    (B) A nonprosecution agreement between a humane society and a person, as described
    in division (A) of this section, is void and unenforceable unless it has been
    approved under division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1717.18
- number: '1719.01'
  heading: Incorporation of charitable trusts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: When any person by deed or will grants or devises property and money, or either,
    to trustees in perpetuity, in trust, stipulating that the principal and income,
    or any part of the principal and income thereof, is to be used and applied by
    said trustees and their successors in office for educational, charitable, or benevolent
    purposes, to be conducted in this state, and when such deed or will provides that
    the trustees shall become a body corporate to hold and invest said property and
    money and to administer said trust, said trustees upon accepting said trust shall
    file with the secretary of state articles of incorporation as provided by section
    1702.04 of the Revised Code, together with a certified copy of such deed or will,
    and thereupon said trustees and their successors in office shall become a corporation
    not for profit to administer said trust, and said trustees shall forthwith become
    the board of trustees of such corporation for such term as is prescribed by such
    deed or will or by the code of regulations of such corporation. The members of
    the board of trustees and their successors, during their respective terms of office,
    shall be the members of the corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.01
- number: '1719.02'
  heading: Code of regulations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: A charitable trust incorporated as provided in section 1719.01 of the Revised
    Code shall adopt and maintain a code of regulations for its government, and for
    the administration of the trust, in conformity with the deed or will. Such regulations
    shall provide for the election or appointment of the trustees of said corporation
    and their successors, and for the terms of office of such trustees and their successors,
    so as to conform to such deed or will. If such deed or will contains no provision
    as to the manner of electing or appointing the trustees or as to their terms of
    office, they shall be elected or appointed in the manner and for the term provided
    by section 1702.04 and sections 1702.26 to 1702.29, inclusive, of the Revised
    Code or by the code of regulations adopted pursuant thereto.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.02
- number: '1719.03'
  heading: Officers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: The officers of a charitable trust incorporated as provided in section 1719.01
    of the Revised Code, shall be a president, a vice-president, a treasurer and a
    secretary. The board may create other offices deemed necessary or designated by
    such deed or will.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.03
- number: '1719.04'
  heading: Subsequent grant or devise
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: The board of trustees of a charitable trust incorporated as provided in section
    1719.01 of the Revised Code, may accept any subsequent grant or devise of money
    or property made to it or to such corporation in perpetuity, in trust, the principal
    or income of which, or any part thereof as may be provided by such grant or devise,
    is to be used and applied for the purposes for which the original trust was established.
    In such case said money or property shall be invested and administered in accordance
    with the code of regulations of such corporation. A certified copy of the deed
    or will making such grant or devise shall be filed with the secretary of state
    to be placed with the articles of incorporation and other papers relating to such
    corporation which are on file in his office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.04
- number: '1719.05'
  heading: Prosecuting attorney may enforce administration of trust - annual financial
    report
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: 'The prosecuting attorney of the county in which a charitable trust incorporated
    as provided in section 1719.01 of the Revised Code has its general office may
    examine the accounts and records of such corporation, and may proceed by action
    in the proper courts to enforce the administration of the trust and the investment
    and application of its funds and property in accordance with the deed or will
    creating it.

    A copy of the annual financial report of the corporation showing the condition
    of said trust shall be filed with the probate judge of said county each year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.05
- number: '1719.06'
  heading: Incorporation of charitable trusts in certain special cases
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: When, by his will, admitted to probate in this state or elsewhere, a decedent
    devises or bequeaths his property, or a portion thereof, for charitable uses within
    this state, or for the establishment and maintenance of an industrial or educational
    school or institution to be located within this state; when such will provides
    that the executor shall organize a corporation under the laws of this state to
    receive such property, to carry out the charitable purposes therein expressed,
    or to establish and maintain the institution or school therein provided for; and
    when such will further provides for the management of such corporation by a board
    of trustees or directors, consisting in part of officials of this state, of the
    county in which such charities are to be administered or such institution or school
    is to be located, or of any municipal corporation in such county, and of the member
    of congress for the district of which it forms a part, or of any of such officials,
    and names others to be associated with them, and provides for the appointment
    of successors to such persons named to act with such officials, such executor,
    or his successor, and the persons named in section 1719.07 of the Revised Code
    may constitute themselves a body corporate, with the general powers of benevolent
    corporations.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.06
- number: '1719.07'
  heading: Articles of incorporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: 'The executor or executors, or his or their successors , of a will providing
    for a charitable trust as specified in section 1719.06 of the Revised Code shall
    associate with himself or themselves not more than two citizens and residents,
    other than the persons named in such will, of the county in which the charities
    are to be administered, or such institution or school located, and he or they
    and such associates shall execute, acknowledge, and file with the secretary of
    state articles of incorporation. After the probate of such a will, and if within
    six months of such probate he or they do not file such articles, then a minority
    of the officials for the time being named in such will may execute, acknowledge,
    and file them, and therein must set forth:

    (A) A copy of the will to carry out whose provisions the corporation is organized;

    (B) The name of the corporation, including the name of the testator unless the
    will otherwise provides;

    (C) The location of such corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.07
- number: '1719.08'
  heading: Members and directors
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: 'The officials named in a will providing for a charitable trust as specified
    in section 1719.06 of the Revised Code, the other persons therein named, and,
    in case the articles are filed by the executor, the not more than two citizens
    and residents of the county in which the charities are to be administered or the
    institution or school located who execute and acknowledge them with such executor,
    shall, upon the filing of the articles, become the members and directors of the
    corporation. As the term of any such official expires, his successor, by virtue
    of his office, thereupon shall become one of the members and directors of such
    corporation.

    Upon the death or resignation of any person named in such will as a director associated
    with such officials, his successor shall be appointed in the manner provided in
    such will if it makes provision therefor, or by the board of directors if it does
    not, and shall thereupon become a member and director of the corporation. Upon
    the death or resignation of either of the two citizens of the county, who have
    become directors by reason of joining in such articles of incorporation, his successor
    shall be chosen by the board and thereupon shall become a member and director
    of the corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.08
- number: '1719.09'
  heading: Site of directors' meetings
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: Until the estate is finally settled, the board of directors of a charitable
    trust incorporated as provided in sections 1719.06 to 1719.12, inclusive, of the
    Revised Code, may meet in the state of the domicile of the testator.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.09
- number: '1719.10'
  heading: Officers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: The officers of a charitable trust incorporated under sections 1719.06 to
    1719.12, inclusive, of the Revised Code, shall consist of a president, a secretary,
    a treasurer, and such others as the board of directors deems necessary. The president
    shall be a member of such board.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.10
- number: '1719.11'
  heading: Constitution and bylaws
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: The board of directors of a charitable trust incorporated under sections 1719.06
    to 1719.12, inclusive, of the Revised Code, may adopt and change organic rules,
    regulations, and bylaws.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.11
- number: '1719.12'
  heading: Attorney general may enforce devise or bequest
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: The attorney general in his official capacity may bring proceedings in any
    court of record to enforce a devise or bequest to which section 1719.06 of the
    Revised Code is applicable, to protect and carry out the purposes named in the
    will, without waiting for the organization of the corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.12
- number: '1719.13'
  heading: Increasing or decreasing number of members, directors, or trustees - filling
    vacancies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: 'Any corporation organized under sections 1719.06 to 1719.12 of the Revised
    Code may increase or decrease the number of its members, directors, or trustees
    originally provided for, except that the number shall not be less than three.
    Any increase or decrease so made shall be authorized by a majority vote of the
    members present at a meeting called according to the regulations and bylaws of
    the corporation. No decrease shall take effect until the expiration of the term
    of a member, director, or trustee serving at the time the decrease is authorized.

    After an increase has been authorized, the board of directors or trustees of the
    corporation, by a majority vote of the members present, shall elect the additional
    members, directors, or trustees so authorized. When additional directors or trustees
    are so elected, their terms shall be fixed by the board, and at the expiration
    of each of the terms of such directors or trustees, their respective successors
    shall be elected for terms fixed by the board or determined in accordance with
    the regulations and bylaws of the corporation. A director or trustee shall hold
    office until his successor is duly elected and qualified.

    If any director or trustee of such a corporation resigns or dies, the vacancy
    shall be filled by the board of directors or trustees for the unexpired term.
    Upon the death or resignation of any director or trustee elected for life or upon
    the expiration of the term of any of his successors provided in this section,
    the successor to the office shall be elected by a majority vote of the board of
    directors or trustees to serve for a term fixed by the board or determined in
    accordance with the regulations and bylaws of the corporation. If any such successor
    resigns or dies, the vacancy shall be filled by the board of directors or trustees
    for the unexpired term.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.13
- number: '1719.14'
  heading: Managing board of directors or trustees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1719'
    name: Charitable Trusts
  text: Whenever, by a will under which any corporation is organized under sections
    1719.01 to 1719.13 of the Revised Code, it is provided that the corporation shall
    be managed by a board of directors or trustees consisting in whole or in part
    of public officials of any kind, including municipal, county, state, or federal
    officials, judges, representatives, or senators, and when such testamentary provision
    for management, either expressly or by fair inference from the will, is subject
    to the condition that it is consistent with law and practicable, then if and when
    such manner or form of management is found to be inconsistent with law or impracticable,
    and the board of directors or trustees of such institution determines by resolution
    that it is impracticable for such public officials to act as directors or trustees
    of such corporation, the directors or trustees, by amendment to the articles of
    incorporation, may provide for the election by its director or trustees of suitable
    persons to succeed such public officials as directors or trustees of such corporation.
    The terms of such successors shall be fixed by the board, and the terms of directors
    or trustees thereafter elected to succeed the directors or trustees first appointed
    under this section shall be fixed by the board or determined in accordance with
    the regulations and bylaws of the corporation. The members of the board of directors
    or trustees shall be the members of the corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1719.14
- number: '1721.01'
  heading: Acquisition, holding, and sale of exempt property by cemetery associations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'A company or association incorporated for cemetery purposes may appropriate
    or otherwise acquire, and may hold, not more than six hundred forty acres of land
    at any one location, which shall be exempt from execution and from being appropriated
    for any public purpose, except as otherwise provided in this section. A company
    or association of that nature may own land at multiple locations, and as many
    as six hundred forty acres owned at each location in accordance with this section
    are entitled to the exemptions specified in this section.

    Lands of cemetery associations not containing graves or not containing graves
    that are in use as such on the date a written notice, as provided in this section,
    is served upon the officers of a cemetery, shall be subject to appropriation for
    highway or street purposes if an appropriation commences within four years of
    the serving of the notice. For such purposes said lands shall be subject to the
    exercise of the right of eminent domain by the municipal corporation in which
    such lands are located, by the board of county commissioners of the county in
    which such lands are located, or by the director of transportation under the same
    conditions and in the same manner as any private property; and, if any burial
    occurs within the area specifically designated in the written notice, the appropriating
    agency shall have the same powers with respect to such burial as are given to
    a board of township trustees by section 517.21 of the Revised Code and shall pay
    any costs resulting from the exercise of these powers. This section shall not
    be construed as authorizing an appropriating agency to exercise the powers specified
    by section 517.21 of the Revised Code in any part of a cemetery other than the
    area specifically designated in the written notice.

    The appropriating agency shall serve upon the officers or agents having control
    of a cemetery a written notice that a specifically designated area of the cemetery
    may be needed for highway purposes. No such notice may be served more than once.

    Such appropriation proceedings shall be made in the manner provided for in sections
    163.01 to 163.22 of the Revised Code or, if by the director of transportation,
    as otherwise provided by law.

    The board of trustees of such company or association, whenever in its opinion
    any portion of such lands is unsuitable for burial purposes, may sell and convey
    by deed in fee simple, in such manner, and upon such terms, as are provided by
    resolution of such board, any such portion of said lands, and apply the proceeds
    thereof to the general purposes of the company or association; but on such sale
    being made, the lands so sold shall be returned by the board to the auditor of
    the proper county and placed by that auditor upon the tax list and duplicate of
    real and public utility property for taxation.

    Such company or association may also take, set aside, or hold any personal property
    received by it from any source for cemetery purposes; and if such company or association
    is incorporated not for profit, all personal property, including the income therefrom,
    owned or held by it, or for its use, for cemetery purposes and with no view to
    profit, shall be exempt from execution, from being appropriated for any public
    purpose, and from taxation, and no tax shall be assessed upon any personal property
    or the income therefrom expressly exempted under this section.

    All exemptions provided for in this section shall be in addition to such other
    exemptions as a company or association incorporated for cemetery purposes, or
    its real or personal property, has under any other provisions of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.01
- number: '1721.02'
  heading: Appropriation of land for cemetery purposes
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: If it is necessary for a cemetery company or association, for cemetery purposes,
    to acquire lands by appropriation, such proceedings shall be taken therefor as
    are provided for in sections 163.01 to 163.22, inclusive, of the Revised Code.
    No lands shall be appropriated until the probate court or court of common pleas
    is satisfied that suitable premises cannot be obtained by contract upon reasonable
    terms, and no lands shall be appropriated upon which there is a dwelling house,
    farm building, orchard, nursery, valuable mineral spring or other medicinal spring,
    or well actually yielding oil or salt water, unless such lands adjoin a cemetery
    already in use on the same or opposite side of a public highway.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.02
- number: '1721.03'
  heading: Proximity to dwellings
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'Land shall not be appropriated, nor shall a cemetery be located, by an association
    incorporated for cemetery purposes or by a benevolent or religious society, within
    one hundred yards of a dwelling house, unless the owner of such dwelling house
    gives his consent, or unless the entire tract appropriated is a necessary addition
    to or enlargement of a cemetery already in use. The limit shall not be less than
    one hundred yards when it is sought to appropriate for cemetery purposes property
    adjoining a cemetery already in use, when such dwelling house was erected subsequent
    to the laying out and establishing of such cemetery. When a cemetery lies within
    or adjoins a municipal corporation the association or corporation owning such
    cemetery, without such consent, may appropriate property within one hundred feet,
    or the width of a street or alley, of any dwelling house.

    The addition of any land across a street or public road is an enlargement of an
    existing cemetery for the purposes of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.03
- number: '1721.04'
  heading: Associations prohibited from appropriation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: Sections 1721.02 and 1721.03 of the Revised Code do not apply to a corporation
    or cemetery association owning a cemetery smaller than four acres and situated
    within one mile of the corporate limits of a municipal corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.04
- number: '1721.05'
  heading: Land for entrance
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: When in the judgment of the officers of a cemetery association it is necessary
    to secure additional land for the purpose of making an entrance to its ground,
    or to improve an entrance already made, the officers may apply to the board of
    county commissioners of the county in which the cemetery is located for the appointment
    of appraisers. Upon such application being made, such board shall proceed in accordance
    with sections 163.01 to 163.22, inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.05
- number: '1721.06'
  heading: Use of income - debt restrictions
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'After paying for its land, a cemetery company or association shall apply
    all its receipts and income, whether from sale of lots, from donations, or otherwise,
    exclusively to laying out, preserving, protecting, and embellishing the cemetery
    and avenues within it or leading to it, to the erection of buildings necessary
    or appropriate for cemetery purposes, and to paying the necessary expenses of
    the cemetery company or association. No debts shall be incurred by the cemetery
    company or association except for purchasing, laying out, inclosing, and embellishing
    the ground, buildings necessary or appropriate for cemetery purposes, and avenues,
    for which purposes it may contract debts to be paid out of future receipts. For
    purposes of this section, buildings appropriate for cemetery purposes include,
    but are not limited to, buildings for crematory facilities, funeral homes, and
    other buildings intended to produce income for the cemetery company or association.

    No part of the funds of a cemetery company or association, or of the proceeds
    of land sold by it, shall ever be divided among its stockholders or lot owners,
    and all its funds shall be used exclusively for the purposes of the company or
    association as specified in this section, or invested in a fund the income of
    which shall be so used and appropriated.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.06
- number: '1721.07'
  heading: Sale of lots
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'A cemetery company or association may adopt rules for disposing of and conveying
    burial lots; but any person not already the owner of a lot in the cemetery may
    purchase any unsold lot in it, and have such lot conveyed to him by the company
    or association upon tender of the usual price asked by it for such lots.

    Burial lots sold by a cemetery company or association shall be used for the sole
    purpose of interments, shall be subject to the rules prescribed by the company
    or association, and shall be exempt from taxation, execution, attachment, or any
    other claim, lien, or process if used exclusively for burial purposes and with
    no view to profit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.07
- number: '1721.071'
  heading: Rules governing product of fetal death
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: '(A) As used in this section and section 1721.072 of the Revised Code, "fetal
    death" has the same meaning as in section 3705.01 of the Revised Code.

    (B) A cemetery company or association may prescribe rules for the burial, re-interment,
    or disinterment of the product of a fetal death.

    (C) With regard to the product of a fetal death, on the request of the mother
    and in compliance with cemetery company or association rules, a cemetery company
    or association shall inter the product of the fetal death in accordance with one
    of the following:

    (1) In a single grave within the cemetery that contains, or will contain, the
    remains of a parent, sibling, or grandparent;

    (2) In another location of the cemetery, including a separate burial ground for
    infants, on a temporary or permanent basis.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.071
- number: '1721.072'
  heading: Reinterment or disinterment of product of fetal death
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: '(A) Subject to division (B) of this section, re-interment or disinterment
    of the product of a fetal death buried in accordance with division (C)(2) of section
    1721.071 of the Revised Code is not subject to section 517.24 of the Revised Code
    if one or both surviving parents provide written consent for the re-interment
    or disinterment to the cemetery and comply with any rules adopted under division
    (B) of section 1721.071 of the Revised Code.

    (B) If two surviving parents are indicated on the cemetery''s burial documents
    for the product of a fetal death buried in accordance with division (C)(2) of
    section 1721.071 of the Revised Code and only one has given consent under division
    (A) of this section, prior to re-interment or disinterment, the cemetery promptly
    shall give notice of the consent to the parent who did not give consent. The notice
    shall be sent by registered mail, return receipt requested, to the parent''s last
    known address and contain a statement that the re-interment or disinterment will
    occur if the cemetery does not receive written objection within thirty days from
    the date the notice is sent. That parent may object to the re-interment or disinterment
    by giving notice to the cemetery by registered mail, return receipt requested,
    not later than thirty days after the cemetery''s notice is sent. If the cemetery
    receives timely notice of the objection, the re-interment or disinterment is subject
    to section 517.24 of the Revised Code.

    (C) A cemetery shall re-inter or disinter the product of a fetal death if both
    surviving parents provide written consent for the re-interment or disinterment
    or if one parent consents and the cemetery does not receive timely notice of an
    objection under division (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.072
- number: '1721.08'
  heading: Sale of land for public monument
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'Any cemetery association organized under the laws of this state may sell
    and convey by deed in fee simple to a corporation organized not for profit under
    the laws of this state for the purpose of erecting and maintaining a public monument
    or memorial to any distinguished deceased person, such portion of the real estate
    of the association as is selected and agreed upon between it and such corporation,
    which is not used by the association, and which has not been disposed of by it
    for burial purposes. Such sale shall be at a price payable in a manner and on
    terms agreed upon between the association and such corporation. The land sold
    and conveyed shall thereafter be exclusively owned, held, and controlled, by the
    corporation purchasing it for the interment of such a deceased person, and for
    the erection and maintenance thereon of such monument or memorial, and for no
    other purpose.

    Lands so sold and conveyed, so long as they are held and used for the purposes
    designated in this section, shall not be mortgaged, nor be subject to sale for
    debts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.08
- number: '1721.09'
  heading: Plat and use of grounds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: Every cemetery company or association shall cause a plat of its grounds and
    of the lots laid out by it to be made and to be recorded or filed in the office
    of the county recorder of the county in which they are situated, numbering the
    lots by regular consecutive numbers. It may inclose, improve, and adorn the grounds
    and avenues, erect buildings for its use, prescribe rules for inclosing and adorning
    lots and for erecting monuments in the cemetery, and prohibit any use, division,
    improvement, or adornment of a lot. An annual exhibit shall be made of the affairs
    of the company or association.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.09
- number: '1721.10'
  heading: Exemptions of burial grounds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'Except as otherwise provided in this section, lands appropriated and set
    apart as burial grounds, either for public or for private use, and recorded or
    filed as such in the office of the county recorder of the county where they are
    situated, and any burial ground that has been used as such for fifteen years are
    exempt from sale on execution on a judgment, dower, and compulsory partition;
    but land appropriated and set apart as a private burial ground is not so exempt
    if it exceeds in value the sum of fifty dollars.

    The lien for taxes against such burial grounds may be enforced in the same manner
    prescribed for abandoned lands under sections 323.65 to 323.79 of the Revised
    Code except that the burial ground may be transferred only to a municipal corporation,
    county, or township under division (D) of section 323.74 of the Revised Code.
    No burial ground that is otherwise exempt from sale or execution under this section
    shall be offered for sale at public auction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.10
- number: '1721.11'
  heading: Acting as soldiers' monumental association
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: A cemetery company or association may act either as a soldiers' monumental
    association or as a cemetery association, and, as it elects, may take charge of
    the management of cemetery grounds, or monuments especially erected in honor of
    soldiers or seamen who have died in the service of the state or of the United
    States or both.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.11
- number: '1721.12'
  heading: Acceptance and execution of certain trusts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: Every cemetery company or association may take, hold, possess, use, enjoy,
    and occupy such property of any kind as is given, granted, or devised to it for
    the purpose of building, repairing, maintaining, adorning, and beautifying fences,
    graves, vaults, mausoleums, monuments, walks, cemetery lots, drives, or avenues
    in its cemeteries, and may appropriate such property, or the proceeds thereof,
    to any of such purposes according to the terms of the trust for which it was given,
    granted, or devised.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.12
- number: '1721.13'
  heading: Incorporation when holding land within a village
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'Any association of persons who are acting as a cemetery association, who
    have purchased and improved lands for cemetery purposes by subscriptions of lot
    holders and the sale of lots, and who are acting through a board of trustees chosen
    by members of the association may, when the lands thus occupied have been brought
    or held within the corporate limits of a village subsequently to the time of their
    purchase and improvement, become incorporated for cemetery purposes, as though
    the lands held by the association were outside such corporate limits.

    Any association incorporated under this section as the successor of such an original
    association may, with the concurrence of the original association, take possession
    of, hold, and use, for cemetery purposes, all the property belonging to and held
    by the original association for such purposes.

    All rights of lot owners in the cemetery grounds of the original association are
    valid without reference to the form of conveyance issued to them by the trustees
    of the original association, and shall be reserved and assured to such lot owners
    upon an incorporation under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.13
- number: '1721.14'
  heading: Cemetery policemen
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: The trustees, directors, or other officers of a cemetery company or association,
    whether it is incorporated or unincorporated, and a board of township trustees
    having charge of township cemeteries, may appoint day and night watchmen for their
    grounds. All such watchmen, and all superintendents, gardeners, and agents of
    such company or association or of such board, who are stationed on the cemetery
    grounds may take and subscribe, before any judge of a county court or judge of
    a municipal court having jurisdiction in the township where the grounds are situated,
    an oath of office similar to the oath required by law of constables. Upon taking
    such oath, such watchmen, superintendents, gardeners, or agents shall have, within
    and adjacent to the cemetery grounds, all the powers of police officers.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.14
- number: '1721.15'
  heading: Sale of grounds by certain associations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'The trustees of a cemetery association whose cemetery is within the limits
    of a municipal corporation which by ordinance has prohibited interments in such
    municipal corporations, whose cemetery is abandoned as a place for the burial
    of the dead, or which is involved in debt it is unable to pay, may apply, by petition
    to the court of common pleas of the county in which such cemetery is located,
    for the sale of the whole or a portion of its grounds, and said court may order
    such sale. The money derived from such sale shall be applied, under the direction
    of such court, to the costs of the removal from such grounds and reinterment elsewhere
    of the remains of the dead and to the payment of any debts of such association.
    Any surplus of such proceeds over such costs and debts must be invested upon interest,
    and the income therefrom applied to keeping in repair any unsold portion of the
    cemetery; if the entire premises are sold, any such surplus shall be divided pro
    rata among the owners of lots therein. The court shall set a time for the removal
    of the dead, after the confirmation of such sale.

    Notice of the filing of such petition shall be given by publication for four consecutive
    weeks in some newspaper of general circulation in the county where it is filed,
    setting forth the object and prayer of the petition and that any person claiming
    an interest in the subject matter of such petition may appear and file an answer.
    On final hearing of the case, the court shall make such order or decree as will
    best secure the rights of the persons having an interest in such cemetery.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.15
- number: '1721.16'
  heading: Sinking fund
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'A cemetery association may create a sinking fund, either out of surplus money
    on hand, or out of money which has been given to the association by will, deed,
    or otherwise.

    The association may invest money appropriated to such sinking fund in bonds of
    the United States, of the state of Ohio, or of a city therein, or may loan such
    money upon first mortgage of real estate in this state worth double the loan or
    upon collateral consisting of any such securities which are of equal face value
    with the loan. It shall not loan such money to a member of the cemetery board.

    All moneys thus appropriated to a sinking fund and interest earned thereon shall
    be held exclusively for the enlargement, improvement, repair, or adornment of
    cemetery grounds, or for constructing or keeping in repair buildings, monuments,
    or other structures which the association deems necessary or appropriate for cemetery
    grounds, and shall not be appropriated or used for any other purpose.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.16
- number: '1721.17'
  heading: Transfer from one association to another
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'When, in the judgment of the trustees of any association of persons who are
    acting as a cemetery association, whether incorporated or unincorporated, and
    have purchased and improved land for cemetery purposes, the welfare of all concerned
    in the lands purchased and improved would be subserved by transferring such lands
    and improvements and other assets of such association to another association incorporated
    under the laws of this state for cemetery purposes, said trustees shall call a
    meeting of the association by giving notice of such meeting for two consecutive
    weeks in a newspaper of general circulation in the county in which said cemetery
    is located, specifying the place, time, and object of such meeting. A majority
    of the members of such association shall constitute a quorum. If by a majority
    vote of the members of such association the trustees are authorized to convey
    and transfer such lands and improvements and other assets to a corporation so
    organized for cemetery purposes and electing to accept such transfer, said trustees
    may execute a deed of conveyance and transfer of said lands, improvements, and
    other assets to said corporation. If the members of such association are its lot
    owners, and notice of such meeting has been given as provided by this section,
    not less than fifteen members shall constitute a quorum, and the conveyance and
    transfer of the lands, improvements, and other assets may be authorized by the
    vote of two thirds of the members present at the meeting.

    After such transfer the corporation to which it was made shall carry out the objects
    for which the original association was formed and shall apply any moneys received
    by it from said original association in laying out, preserving, protecting, and
    embellishing said cemetery.

    The rights of lot owners in the cemetery ground of the original association are
    not affected by this section or by any action taken under it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.17
- number: '1721.18'
  heading: Crematory associations and morgues
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: Any company or association incorporated for the erection and maintenance of
    a crematory may exercise all the rights and powers conferred by sections 1721.01
    to 1721.18, inclusive, of the Revised Code, subject to the conditions provided
    in such sections. No building shall be erected for such a purpose within two hundred
    yards of a dwelling house unless the owner of the dwelling house gives his consent.
    No person, company, association, or firm shall establish a morgue on a street
    upon which there are dwelling houses unless the owners or occupants of all dwelling
    houses within two hundred yards of the proposed morgue give their written consent
    thereto. This section does not apply to a crematory built, or a morgue established,
    as of April 3, 1900.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.18
- number: '1721.19'
  heading: Violation of bylaw, rule or regulation - detention or arrest
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: '(A) No person shall violate a bylaw, rule, or regulation adopted by the trustees,
    directors, or other officers of a cemetery company or association, or by a board
    of township trustees having charge of township cemeteries, with reference to the
    protection, good order, and preservation of cemeteries, and the trees, shrubbery,
    structures, and adornments therein.

    (B)(1) A watchperson, superintendent, gardener, or agent of a cemetery company
    or association who has probable cause to believe that a person has violated division
    (A) of this section may detain the person in a reasonable manner and for a reasonable
    length of time within the property of the cemetery company or association for
    the purpose of recovering any property involved in the violation, causing an arrest
    to be made by a peace officer, or obtaining a warrant of arrest.

    (2) A watchperson, superintendent, gardener, or agent acting under division (B)(1)
    of this section shall not search the person detained, search or seize any property
    belonging to the person detained without the person''s consent, or use undue restraint
    upon the person detained.

    (3) Any peace officer, as defined in section 2935.01 of the Revised Code, may
    arrest without a warrant any person who the officer has probable cause to believe
    has committed any act in violation of division (A) of this section that also is
    a violation of law and shall make the arrest within a reasonable time after the
    commission of the act in violation of division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.19
- number: '1721.20'
  heading: Charge for delivery or installation of burial vault
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: 'No person, partnership, association, or corporation or officers, agents,
    or employees thereof, shall directly or indirectly make or collect any charge
    pertaining to the delivery or installation of a burial receptacle in a cemetery
    for human remains, except when such charge is for service actually performed,
    or expense actually incurred in aid of said installation.

    Charges under this exception shall be equal for similar services in the same cemetery.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1721.20
- number: '1721.21'
  heading: Establishment of endowment care trust
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: '(A) As used in this section:

    (1) "Person" means any corporation, company, partnership, individual, or other
    entity owning or operating a cemetery for the disposition of human remains.

    (2) "Cemetery" means any one or a combination of more than one of the following:

    (a) A burial ground for earth interments;

    (b) A mausoleum for crypt entombments;

    (c) A columbarium for the deposit of cremated remains;

    (d) A scattering ground for the spreading of cremated remains.

    (3) "Interment" means the disposition of human remains by earth burial, entombment,
    or inurnment.

    (4) "Burial right" means the right of earth interment.

    (5) "Entombment right" means the right of entombment in a mausoleum.

    (6) "Columbarium right" means the right of inurnment in a columbarium for cremated
    remains.

    (7) "Human remains" means any part of the body of a deceased human being, in any
    stage of decomposition or state of preservation, or the remaining bone fragments
    from the body of a deceased human being that has been reduced by cremation or
    alternative disposition.

    (B) No person shall operate or continue to operate any cemetery in this state
    unless an endowment care trust is established and maintained as required by this
    section.

    (C) Any person desiring to operate any cemetery that is organized or developed
    after July 1, 1970, before offering to sell or selling any burial lot, burial
    right, entombment right, or columbarium right in that cemetery, shall first establish
    an endowment care trust, segregated from other assets, and place in that fund
    a minimum of fifty thousand dollars in cash or in bonds of the United States,
    this state, or any county or municipal corporation of this state.

    Whenever any person described in this division has placed another fifty thousand
    dollars in the endowment care trust out of gross sales proceeds, in addition to
    the deposit required by this division, that person, after submitting proof of
    this fact to the trustees of the endowment care trust, may be paid a distribution
    in the sum of fifty thousand dollars from the endowment care trust.

    (D) Any person desiring to operate or to continue to operate any cemetery after
    July 1, 1970, shall place into the endowment care trust as required by this section
    not less than ten per cent of the gross sales proceeds received from the sale
    of any burial lot, burial right, entombment right, or columbarium right. This
    percentage shall be placed in the endowment care trust no later than thirty days
    following the month in which the entire gross sales are received.

    (E) The trustees of the endowment care trust shall consist of at least three individuals
    who have been residents of the county in which the cemetery is located for at
    least one year, or a trust company licensed under Chapter 1111. of the Revised
    Code or a national bank or federal savings association that has securities pledged
    in accordance with section 1111.04 of the Revised Code. If the trustees are not
    a financial institution or trust company, the trustees shall be bonded by a fidelity
    bond, or insured under an insurance policy less any deductible, in an aggregate
    amount of not less than one hundred per cent of the funds held by the trustees.
    The trustees or their agent shall, on a continuous basis, keep exact records as
    to the amount of funds under any joint account or trust instrument being held
    for the individual beneficiaries showing the amount paid, the amount deposited
    and invested, and accruals and income.

    The funds of the endowment care trust shall be held and invested in the manner
    in which trust funds are permitted to be held and invested pursuant to sections
    2109.37 and 2109.371 of the Revised Code or, if provided for in the instrument
    creating the trust, pursuant to the Ohio Uniform Prudent Investor Act.

    (F) Any person offering to sell or selling any burial lot, burial right, entombment
    right, or columbarium right shall give to the purchaser of the lot or right, at
    the time of sale, a written agreement that identifies and unconditionally guarantees
    to the purchaser the specific location of the lot or the specific location to
    which the right applies.

    (G) No person shall open or close any grave, crypt, or niche for the interment
    of human remains in a cemetery without the permission of the cemetery association
    or other entity having control and management of the cemetery.

    (H) Except as provided in division (G) of this section, this section does not
    apply to a family cemetery as defined in section 4767.02 of the Revised Code,
    to any cemetery that is owned and operated entirely and exclusively by churches,
    religious societies, established fraternal organizations, municipal corporations,
    or other political subdivisions of the state, or to a national cemetery.

    (I) The distribution from the endowment care trust shall be used only to pay for
    both of the following:

    (1) The cost and expenses incurred to establish, manage, invest, and administer
    the records and the trust;

    (2) The maintenance, supervision, improvement, and preservation of the grounds,
    lots, buildings, equipment, statuary, and other real and personal property of
    the cemetery.

    (J)(1) Annual reports of all the assets and investments of the endowment care
    trust shall be prepared and maintained, and shall be available for inspection
    at reasonable times by any owner of interment rights in the cemetery.

    (2) Every cemetery required to establish and maintain an endowment care trust
    shall ensure each of the following:

    (a) That the cemetery has deposited, at the time specified in division (D) of
    this section, the amounts required by that division in the cemetery''s endowment
    care trust;

    (b) That the cemetery used the amounts withdrawn only for the purposes specified
    in division (I) of this section;

    (c) Subject to division (K)(5) of this section, that all principal and capital
    gains, less any payment of taxes associated with such gains, have remained in
    the endowment care trust;

    (d) That the endowment care trust has not been used to collateralize or guarantee
    loans and has not otherwise been subjected to any consensual lien;

    (e) That the endowment care trust is invested in compliance with the investing
    standards set forth in sections 2109.37 and 2109.371 of the Revised Code, or,
    if provided for in the instrument creating the trust, the Ohio Uniform Prudent
    Investor Act.

    (3) Every cemetery required to establish and maintain an endowment care trust
    shall do both of the following:

    (a) File an affidavit annually with the division of real estate of the department
    of commerce, in a form prescribed by the division, certifying under oath the cemetery
    satisfied division (J)(2) of this section;

    (b) Notify the division of real estate of the department of commerce, in a form
    prescribed by the division, of the percentage of the unitrust distribution from
    the endowment care trust, as described in divisions (K)(2)(a)(ii) and (b) of this
    section.

    (K)(1) Every cemetery shall choose the distribution of either of the following
    from the endowment care trust:

    (a) All net ordinary income, which includes collected dividends, interest, and
    other income earned by the trust, reduced by any expenses, including, but not
    limited to, taxes on income, fees, commissions, and costs;

    (b) A unitrust disbursement not exceeding five per cent of the fair market value
    of the endowment care fund. "Fair market value," for the purpose of division (K)(1)(b)
    of this section, means the average of the net fair market value of the assets
    of the endowment care trust as of the last trading day for each of the three preceding
    fiscal year ends.

    (2)(a) A cemetery that selects the unitrust disbursement distribution method,
    as provided in division (K)(1)(b) of this section, shall do both of the following:

    (i) Deliver to the trustees of the endowment care trust written instructions,
    including the disbursement percentage selected, not later than sixty days prior
    to the beginning of a calendar year;

    (ii) Deliver to the division of real estate of the department of commerce notification
    that the cemetery selected the unitrust disbursement method and the percentage
    selected, in compliance with division (J)(3)(b) of this section.

    (b) The distribution method and, if a unitrust disbursement, the disbursement
    percentage selected shall remain in effect unless the cemetery notifies the trustees
    and the division of real estate of the department of commerce of its desire to
    effect a change. The trustees shall ensure that an investment policy is in place
    whose goals and objectives are supportive of the growth of the endowment care
    trust.

    (3) Distributions from the endowment care trust shall be made on a monthly, quarterly,
    semiannual, or annual basis, as agreed upon by the cemetery and the trustees.
    If the trustees do not receive written instructions from the cemetery informing
    the trustees of the method of calculation and distribution chosen, the trustees
    shall calculate and distribute the net income, as earned, on a monthly basis.

    (4) In order to withdraw a unitrust disbursement, the fair market value of the
    endowment care trust after the disbursement shall be greater than eighty per cent
    of the aggregate fair market value of the endowment care trust as of the end of
    the immediately preceding calendar year. Should this not be the case, disbursement
    shall be limited for that year to net ordinary income.

    (5) The trustees shall pay reasonable operating expenses and taxes of the endowment
    care trust itself. If the operating expenses and taxes paid are greater than two
    and one-half per cent of the fair market value for the preceding calendar year
    end and the cemetery has selected a unitrust disbursement, the trustees shall
    reduce the unitrust disbursement by the amount exceeding two and one-half per
    cent.'
