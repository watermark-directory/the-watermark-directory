  url: https://codes.ohio.gov/ohio-revised-code/section-1751.66
- number: '1751.67'
  heading: Maternity benefits
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Each individual or group health insuring corporation policy, contract,
    or agreement delivered, issued for delivery, or renewed in this state that provides
    maternity benefits shall provide coverage of inpatient care and follow-up care
    for a mother and her newborn as follows:

    (1) The policy, contract, or agreement shall cover a minimum of forty-eight hours
    of inpatient care following a normal vaginal delivery and a minimum of ninety-six
    hours of inpatient care following a cesarean delivery. Services covered as inpatient
    care shall include medical, educational, and any other services that are consistent
    with the inpatient care recommended in the protocols and guidelines developed
    by national organizations that represent pediatric, obstetric, and nursing professionals.

    (2) The policy, contract, or agreement shall cover a physician-directed source
    of follow-up care or a source of follow-up care directed by an advanced practice
    registered nurse. Services covered as follow-up care shall include physical assessment
    of the mother and newborn, parent education, assistance and training in breast
    or bottle feeding, assessment of the home support system, performance of any medically
    necessary and appropriate clinical tests, and any other services that are consistent
    with the follow-up care recommended in the protocols and guidelines developed
    by national organizations that represent pediatric, obstetric, and nursing professionals.
    The coverage shall apply to services provided in a medical setting or through
    home health care visits. The coverage shall apply to a home health care visit
    only if the provider who conducts the visit is knowledgeable and experienced in
    maternity and newborn care.

    When a decision is made in accordance with division (B) of this section to discharge
    a mother or newborn prior to the expiration of the applicable number of hours
    of inpatient care required to be covered, the coverage of follow-up care shall
    apply to all follow-up care that is provided within seventy-two hours after discharge.
    When a mother or newborn receives at least the number of hours of inpatient care
    required to be covered, the coverage of follow-up care shall apply to follow-up
    care that is determined to be medically necessary by the provider responsible
    for discharging the mother or newborn.

    (B) Any decision to shorten the length of inpatient stay to less than that specified
    under division (A)(1) of this section shall be made by the physician attending
    the mother or newborn, except that if a certified nurse-midwife is attending the
    mother in collaboration with a physician, the decision may be made by the certified
    nurse-midwife. Decisions regarding early discharge shall be made only after conferring
    with the mother or a person responsible for the mother or newborn. For purposes
    of this division, a person responsible for the mother or newborn may include a
    parent, guardian, or any other person with authority to make medical decisions
    for the mother or newborn.

    (C)(1) No health insuring corporation may do either of the following:

    (a) Terminate the participation of a provider or health care facility in an individual
    or group health care plan solely for making recommendations for inpatient or follow-up
    care for a particular mother or newborn that are consistent with the care required
    to be covered by this section;

    (b) Establish or offer monetary or other financial incentives for the purpose
    of encouraging a person to decline the inpatient or follow-up care required to
    be covered by this section.

    (2) Whoever violates division (C)(1)(a) or (b) of this section has engaged in
    an unfair and deceptive act or practice in the business of insurance under sections
    3901.19 to 3901.26 of the Revised Code.

    (D) This section does not do any of the following:

    (1) Require a policy, contract, or agreement to cover inpatient or follow-up care
    that is not received in accordance with the policy''s, contract''s, or agreement''s
    terms pertaining to the providers and facilities from which an individual is authorized
    to receive health care services;

    (2) Require a mother or newborn to stay in a hospital or other inpatient setting
    for a fixed period of time following delivery;

    (3) Require a child to be delivered in a hospital or other inpatient setting;

    (4) Authorize a certified nurse-midwife to practice beyond the authority to practice
    nurse-midwifery in accordance with Chapter 4723. of the Revised Code;

    (5) Establish minimum standards of medical diagnosis, care, or treatment for inpatient
    or follow-up care for a mother or newborn. A deviation from the care required
    to be covered under this section shall not, solely on the basis of this section,
    give rise to a medical claim or to derivative claims for relief, as those terms
    are defined in section 2305.113 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.67
- number: '1751.68'
  heading: Provisions for medication synchronization for enrollees
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) As used in this section:

    (1) "Cost-sharing" means the cost to an enrollee under an individual or group
    health insuring corporation policy, contract, or agreement according to any coverage
    limit, copayment, coinsurance, deductible, or other out-of-pocket expense requirements
    imposed by the policy, contract, or agreement.

    (2) "Drug" has the same meaning as in section 4729.01 of the Revised Code.

    (3) "Medication synchronization" means a pharmacy service that synchronizes the
    filling or refilling of prescriptions in a manner that allows the dispensed drugs
    to be obtained on the same date each month.

    (4) "Prescriber" has the same meaning as in section 4729.01 of the Revised Code.

    (5) "Prescription" means a written, electronic, or oral order issued by a prescriber
    for drugs or combinations or mixtures of drugs to be used by a particular individual.

    (B) Notwithstanding section 3901.71 of the Revised Code, each health insuring
    corporation policy, contract, or agreement that provides prescription drug coverage
    shall provide for medication synchronization for an enrollee if all of the following
    conditions are met:

    (1) The enrollee elects to participate in medication synchronization;

    (2) The enrollee, the prescriber, and a pharmacist at a network pharmacy agree
    that medication synchronization is in the best interest of the enrollee;

    (3) The prescription drug to be included in the medication synchronization meets
    the requirements of division (C) of this section.

    (C) To be eligible for inclusion in medication synchronization for an enrollee,
    a prescription drug must meet all of the following requirements:

    (1) Be covered by the policy, contract, or agreement;

    (2) Be prescribed for the treatment and management of a chronic disease or condition
    and be subject to refills;

    (3) Satisfy all relevant prior authorization criteria;

    (4) Not have quantity limits, dose optimization criteria, or other requirements
    that would be violated if synchronized;

    (5) Not have special handling or sourcing needs, as determined by the policy,
    contract, or agreement, that require a single, designated pharmacy to fill or
    refill the prescription;

    (6) Be formulated so that the quantity or amount dispensed can be effectively
    divided in order to achieve synchronization;

    (7) Not be a schedule II controlled substance, opioid analgesic, or benzodiazepine,
    as those terms are defined in section 3719.01 of the Revised Code.

    (D)(1) To provide for medication synchronization under division (B) of this section,
    a policy, contract, or agreement shall authorize coverage of a prescription drug
    subject to medication synchronization when the drug is dispensed in a quantity
    or amount that is less than a thirty-day supply.

    (2) The requirement of division (D)(1) of this section applies only once for each
    prescription drug subject to medication synchronization for the same enrollee,
    except when either of the following occurs:

    (a) The prescriber changes the dosage or frequency of administration of the prescription
    drug subject to medication synchronization.

    (b) The prescriber prescribes a different drug.

    (E)(1) A policy, contract, or agreement that provides for medication synchronization
    under division (B) of this section shall permit and apply a prorated daily cost-sharing
    rate for a supply of a prescription drug subject to medication synchronization
    that is dispensed at a network pharmacy.

    (2) Division (E)(1) of this section does not require a policy, contract, or agreement
    to waive any cost-sharing requirement in its entirety.

    (F) A policy, contract, or agreement that provides for medication synchronization
    under division (B) of this section shall not use payment structures that incorporate
    dispensing fees that are determined by calculating the days'' supply of drugs
    dispensed. Dispensing fees shall be based exclusively on the total number of prescriptions
    that are filled or refilled.

    (G) This section does not require a health insuring corporation to provide to
    a network pharmacy or a pharmacist at a network pharmacy any monetary or other
    financial incentive for the purpose of encouraging the pharmacy or pharmacist
    to recommend medication synchronization to an enrollee.'
