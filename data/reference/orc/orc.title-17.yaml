  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) When the superintendent of insurance has cause to believe that grounds
    for the denial of an application for a certificate of authority exist, or that
    grounds for the suspension or revocation of a certificate of authority exist,
    the superintendent shall notify the applicant or health insuring corporation in
    writing, specifically stating the grounds for the denial, suspension, or revocation
    and setting a date of at least thirty days after the notification for a hearing
    on the matter.

    (B) After the hearing authorized by division (A) of this section, or upon the
    failure of the applicant or health insuring corporation to appear at the hearing,
    the superintendent shall take such action as in accordance with law and the evidence.
    The action shall be set out in written findings which shall be mailed to the applicant
    or health insuring corporation. The action of the superintendent is subject to
    review in accordance with Chapter 119. of the Revised Code.

    (C) Chapter 119. of the Revised Code applies to proceedings under this section
    to the extent that it is not in conflict with divisions (A) and (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.36
- number: '1751.38'
  heading: Applicability of other laws
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) As used in this section, "agent" means a person appointed by a health
    insuring corporation to engage in the solicitation or enrollment of subscribers
    or enrollees.

    (B) Agents of health insuring corporations shall be licensed as insurance agents
    in accordance with Chapter 3905. of the Revised Code.

    (C) Chapter 3905. of the Revised Code shall apply to health insuring corporations
    and the agents of health insuring corporations in the same manner in which these
    sections apply to insurers and agents of insurers.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.38
- number: '1751.40'
  heading: Insurance companies operating as health insuring corporations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Notwithstanding any provision of Title XXXIX of the Revised Code, any
    insurance company holding a certificate of authority issued pursuant to Title
    XXXIX of the Revised Code, or any corporation that is a subsidiary or affiliate
    of the insurance company, may apply for and obtain a certificate of authority
    to organize and operate a health insuring corporation in compliance with this
    chapter. Notwithstanding any other law that may be inconsistent with this division,
    any two or more such insurance companies, or subsidiaries or affiliates thereof,
    may jointly organize and operate a health insuring corporation under this chapter.
    The business of insurance is deemed to include the providing of health care by
    a health insuring corporation owned or operated by an insurance company or a subsidiary
    or affiliate of an insurance company.

    (B) Notwithstanding any provision of any insurance laws of this state, an insurance
    company may contract with a health insuring corporation to provide insurance or
    similar protection against the cost of care provided through health insuring corporations
    and to provide coverage in the event of the failure of the health insuring corporation
    to meet its obligations. The enrollees of a health insuring corporation constitute
    a permissible group under such laws. Among other things, under such contracts,
    the insurer may make benefit payments to health insuring corporations for health
    care services rendered by facilities and providers pursuant to a health care plan.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.40
- number: '1751.42'
  heading: Rehabilitation, liquidation, supervision or conservation of corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: Any rehabilitation, liquidation, supervision, or conservation of a health
    insuring corporation shall be deemed to be the rehabilitation, liquidation, supervision,
    or conservation of an insurance company and shall be conducted under the supervision
    of the superintendent of insurance pursuant to Chapter 3903. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.42
- number: '1751.44'
  heading: Fees paid to superintendent of insurance
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) Each health insuring corporation shall pay to the superintendent of insurance
    the following fees:

    (1) For filing an application for a certificate of authority, fifteen hundred
    dollars;

    (2) For filing a request for a service area expansion under section 1751.03 of
    the Revised Code, three hundred dollars;

    (3) For filing a major modification under section 1751.03 of the Revised Code,
    three hundred dollars;

    (4) For filing each annual report, twenty-five dollars;

    (5) For all other required filings for which no filing fee is otherwise provided
    for by this chapter, fifty dollars.

    (B) All fees collected under this section shall be paid into the state treasury
    to the credit of the department of insurance operating fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.44
- number: '1751.45'
  heading: Administrative penalties - violations
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) In lieu of the suspension or revocation of a certificate of authority
    under section 1751.35 of the Revised Code, the superintendent of insurance, pursuant
    to an adjudication hearing initiated and conducted in accordance with Chapter
    119. of the Revised Code, or by consent of the health insuring corporation without
    an adjudication hearing, may levy an administrative penalty. The administrative
    penalty shall be in an amount determined by the superintendent, but the administrative
    penalty shall not exceed one hundred thousand dollars per violation. Additionally,
    the superintendent may require the health insuring corporation to correct any
    deficiency that may be the basis for the suspension or revocation of the health
    insuring corporation''s certificate of authority. All penalties collected shall
    be paid into the state treasury to the credit of the department of insurance operating
    fund.

    (B) If the superintendent for any reason has cause to believe that any violation
    of this chapter has occurred or is threatened, the superintendent may give notice
    to the health insuring corporation and to the representatives or other persons
    who appear to be involved in the suspected violation to arrange a conference with
    the suspected violators or their authorized representatives for the purpose of
    attempting to ascertain the facts relating to the suspected violation, and, if
    it appears that any violation has occurred or is threatened, to arrive at an adequate
    and effective means of correcting or preventing the violation.

    Proceedings under this division shall not be covered by any formal procedural
    requirements, and may be conducted in the manner the superintendent may consider
    appropriate under the circumstances.

    (C)(1) The superintendent may issue an order directing a health insuring corporation
    or a representative of the health insuring corporation to cease and desist from
    engaging in any act or practice in violation of this chapter. Within thirty days
    after service of the order to cease and desist, the respondent may request a hearing
    on the question of whether acts or practices in violation of this chapter have
    occurred. Such hearings shall be conducted in accordance with Chapter 119. of
    the Revised Code and judicial review shall be available as provided by that chapter.

    (2) If the superintendent has reasonable cause to believe that an order issued
    pursuant to this division has been violated in whole or in part, the superintendent
    may request the attorney general to commence and prosecute any appropriate action
    or proceeding in the name of the state against the violators in the court of common
    pleas of Franklin county. The court in any such action or proceeding may levy
    civil penalties, not to exceed one hundred thousand dollars per violation, in
    addition to any other appropriate relief, including requiring a violator to pay
    the expenses reasonably incurred by the superintendent in enforcing the order.
    The penalties and fees collected under this division shall be paid into the state
    treasury to the credit of the department of insurance operating fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1751.45
- number: '1751.46'
  heading: Recommendations for expansion of service areas
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1751'
    name: Health Insuring Corporation Law
  text: '(A) The superintendent of insurance may contract with qualified persons to
    make recommendations concerning the determinations required to be made by the
    superintendent relative to an expansion of a service area pursuant to division
    (C) of section 1751.03 of the Revised Code, an application for a certificate of
    authority pursuant to sections 1751.04 and 1751.05 of the Revised Code, a contractual
    periodic prepayment or premium rate pursuant to section 1751.12 of the Revised
    Code, and an examination pursuant to division (B) of section 1751.34 of the Revised
    Code. The recommendations may be accepted in full or in part, or may be rejected,
    by the superintendent.

    The total cost of a contract with a qualified person pursuant to this division
    shall represent the fair market value of the services provided and shall be borne
    by the health insuring corporation that is the subject of the determination required
    to be made by the superintendent.

    (B) No qualified person placed on contract by the superintendent pursuant to division
    (A) of this section shall have a conflict of interest with the department of insurance
    or the health insuring corporation.'
  history: null
