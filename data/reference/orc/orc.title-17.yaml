- number: '1706.03'
  heading: Knowledge and notification of facts
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A person knows a fact when either of the following is met:

    (1) The person has actual knowledge of the fact.

    (2) The person is deemed to know the fact under law other than this chapter.

    (B) A person has notice of a fact when any of the following is met:

    (1) The person knows of the fact.

    (2) The person receives notification of the fact.

    (3) The person has reason to know the fact from all the facts known to the person
    at the time.

    (4) The person is deemed to have notice of the fact under division (D) of this
    section.

    (C) A person notifies another of a fact by taking steps reasonably required to
    inform the other person in ordinary course, whether or not the other person knows
    the fact.

    (D) A person is deemed to have notice of the following:

    (1) The matters included in a limited liability company''s articles of organization
    under divisions (A)(1) to (3) of section 1706.16 of the Revised Code, upon the
    filing of the articles;

    (2) A limited liability company''s dissolution, ninety days after a certificate
    of dissolution under section 1706.471 of the Revised Code becomes effective;

    (3) A limited liability company''s merger or conversion, ninety days after a certificate
    of merger under section 1706.712 of the Revised Code or certificate of conversion
    under section 1706.722 of the Revised Code becomes effective.

    (E) A member''s knowledge, notice, or receipt of a notification of a fact relating
    to the limited liability company is not knowledge, notice, or receipt of a notification
    of a fact by the limited liability company solely by reason of the member''s capacity
    as a member.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.03
- number: '1706.04'
  heading: Separate legal entity
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A limited liability company is a separate legal entity. A limited liability
    company''s status for tax purposes shall not affect its status as a separate legal
    entity formed under this chapter.

    (B) A limited liability company has perpetual duration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.04
- number: '1706.05'
  heading: Scope of authority of limited liability company
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) A limited liability company may carry on any lawful activity, whether
    or not for profit.

    (B) A limited liability company shall possess and may exercise all the powers
    and privileges granted by this chapter or by any other law or by its operating
    agreement, together with any powers incidental thereto, including those powers
    and privileges necessary or convenient to the conduct, promotion, or attainment
    of the business, purposes, or activities of the limited liability company.

    (C) Without limiting the general powers enumerated in division (B) of this section,
    a limited liability company shall have the power and authority to make contracts
    of guaranty and suretyship and enter into interest rate, basis, currency, hedge,
    or other swap agreements, or cap, floor, put, call, option, exchange, or collar
    agreements, derivative agreements, or other agreements similar to any of the foregoing.

    (D) A series established under this chapter has the power and capacity, in the
    series'' own name, to do all of the following:

    (1) Sue and be sued;

    (2) Contract;

    (3) Hold and convey title to assets of the series, including real property, personal
    property, and intangible property;

    (4) Grant liens and security interests in assets of the series.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.05
- number: '1706.06'
  heading: Interpretation and application of Revised Limited Liability Company Act
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) This chapter shall be construed to give maximum effect to the principles
    of freedom of contract and to the enforceability of operating agreements.

    (B) Unless displaced by particular provisions of this chapter, principles of law
    and equity supplement this chapter.

    (C) Rules that statutes in derogation of the common law are to be strictly construed
    shall have no application to this chapter.

    (D) Sections 1309.406 and 1309.408 of the Revised Code do not apply to any interest
    in a limited liability company, including all rights, powers, and interests arising
    under an operating agreement or this chapter. This division prevails over those
    sections, and is expressly intended to permit the enforcement of the provisions
    of an operating agreement that would otherwise be ineffective under those sections.

    (E) This chapter applies to all limited liability companies equally regardless
    of whether the limited liability company has one or more members or whether it
    is formed by a filing under section 1706.16 of the Revised Code or by merger,
    consolidation, conversion, or otherwise.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.06
- number: '1706.061'
  heading: Authority of state law over limited liability companies
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: 'The law of this state governs all of the following:

    (A) The organization and internal affairs of a limited liability company;

    (B) The liability of a member as a member for the debts, obligations, or other
    liabilities of a limited liability company;

    (C) The authority of the members and agents of a limited liability company;

    (D) The availability of the assets of a limited liability company or series thereof
    for the obligations of the limited liability company or another series thereof.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1706.061
- number: '1706.07'
  heading: Naming of limited liability company
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1706'
    name: Ohio Revised Limited Liability Company Act
  text: '(A) The name of a limited liability company shall contain the words "limited
    liability company" or the abbreviation "L.L.C.," "LLC," "limited," "ltd.," or
    "ltd".

    (B) Except as provided in this section and in sections 1701.75, 1701.78, 1701.82,
    1705.36, and 1705.37 of the Revised Code, the secretary of state shall not accept
    for filing in the secretary of state''s office the articles of organization of
    a limited liability company if the company name set forth in the articles is not
    distinguishable on the records of the secretary of state from the name of any
    of the following:

    (1) Any other limited liability company, whether the name is of a domestic limited
    liability company or of a foreign limited liability company registered as a foreign
    limited liability company under this chapter;

    (2) Any corporation, whether the name is of a domestic corporation or of a foreign
    corporation holding a license as a foreign corporation under the laws of this
    state pursuant to Chapter 1701., 1702., or 1703. of the Revised Code;

    (3) Any limited liability partnership, whether the name is of a domestic limited
    liability partnership or a foreign limited liability partnership registered pursuant
    to Chapter 1775. or 1776. of the Revised Code;

    (4) Any limited partnership, whether the name is of a domestic limited partnership
    or a foreign limited partnership registered pursuant to Chapter 1782. of the Revised
    Code;

    (5) Any trade name to which the exclusive right, at the time in question, is registered
    in the office of the secretary of state pursuant to Chapter 1329. of the Revised
    Code.

    (C) A limited liability company may apply to the secretary of state for authorization
    to use a name that is not distinguishable from the names identified in division
    (B) of of this section if there also is filed in the office of the secretary of
    state, on a form prescribed by the secretary of state, the consent of the other
    person or, in the case of a registered trade name, the person in whose name is
    registered the exclusive right to use the name, which consent is evidenced in
    a writing signed by any authorized officer or any authorized representative of
    the other person.

    (D) If a judicial sale or other transfer by order of a tribunal involves the right
    to use the name of a limited liability company or of a foreign limited liability
    company, then division (B) of this section shall not be applicable with respect
    to any person that is subject to the order.

    (E) Any person that wishes to reserve a name for a proposed new limited liability
    company, a limited liability company that intends to change its name, or an assumed
    name for a foreign limited liability company whose name is not available may submit
    to the secretary of state, on a form prescribed by the secretary of state, a written
    application for the exclusive right to use a specified name as the name of the
    company. If the secretary of state finds, consistent with this section, that the
    specified name is available for use, the secretary of state shall file the application.
    From the date of the filing, the applicant has the exclusive right for one hundred
    eighty days to use the specified name as the name of the limited liability company,
    counting the date of the filing as the first of the one hundred eighty days. The
    right so obtained may be transferred by the applicant or other holder of the right
    by filing in the office of the secretary of state a written transfer, on a form
    prescribed by the secretary of state, that states the name and address of the
    transferee.'
