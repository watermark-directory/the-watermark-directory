- number: '1761.11'
  heading: Notification of possession or liquidation of credit union
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) The superintendent of credit unions shall give prompt notice to the applicable
    credit union share guaranty corporation whenever he takes possession of the property
    and assets of a participating credit union. The superintendent shall give further
    prompt notice whenever he determines to liquidate the property and assets of such
    participating credit union.

    (B) When the property and business of a participating credit union has been liquidated
    or is in the process of liquidation and the proceeds of liquidation distributed
    are insufficient to pay the full guaranteed amount of each credit union share
    account, the corporation shall pay each such deficiency up to the guaranteed amount
    within thirty days from the date the credit union share account balance is verified.
    When such guaranteed amounts are paid, and after charging the amount thereof to
    undivided or retained earnings, each participating credit union''s account shall
    be reduced ratably based on the account balance for the total amount paid.

    (C) When any member''s credit union share account is paid, the corporation shall
    be subrogated to all rights of the member, up to the amount paid by the corporation
    to such member.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.11
- number: '1761.12'
  heading: Terminating participation in corporation of participating credit union
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) A credit union share guaranty corporation may terminate the participation
    in the corporation of a participating credit union for any of the following reasons:

    (1) The participating credit union fails to satisfy the risk eligibility standards
    established by the corporation and applicable to all applying and participating
    credit unions;

    (2) The participating credit union otherwise operates in an unsafe and unsound
    manner as determined by the corporation;

    (3) The participating credit union fails to furnish financial statements, delinquent
    loan reports, or other information considered necessary by the corporation under
    division (B) or (C) of section 1761.08 of the Revised Code;

    (4) The participating credit union fails to remedy in a timely manner a qualification
    arising from an audit under division (E) of section 1761.08 of the Revised Code;

    (5) The participating credit union fails to pay when due a capital contribution
    or applicable premium, fee, or assessment under section 1761.10 of the Revised
    Code;

    (6) The participating credit union fails to comply with any provision of this
    chapter, the articles of incorporation or bylaws of the corporation, or any corrective
    action agreement executed between the participating credit union and the corporation;

    (7) Continued participation would result in a violation of this chapter or other
    applicable state or federal law by the corporation.

    (B)(1) The credit union share guaranty corporation shall, at least thirty days
    prior to the effective date of any termination, notify in writing the participating
    credit union to be terminated and the superintendent of credit unions, any other
    credit union supervisory authority, or the national credit union administration
    of the pending termination and the reasons for such termination.

    (2) The thirty-day notice of termination required under division (B)(1) of this
    section does not apply to the termination of excess coverage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.12
- number: '1761.13'
  heading: Investing or depositing funds
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) A credit union share guaranty corporation shall invest or deposit its
    funds in the following manner:

    (1) In banks incorporated under the laws of this or any other state, or the United
    States;

    (2) In negotiable certificates of deposit and bankers acceptances;

    (3) In share certificates deposited in or any form of evidence of interest or
    indebtedness of any credit union organized under Chapter 1733. of the Revised
    Code or comparable state law if insured, or whose member accounts are insured
    as provided for by Title II of the "Federal Credit Union Act," 84 Stat. 994, (1970),
    12 U.S.C.A. 1781, as amended, or by comparable insurance. No investment under
    division (A)(3) of this section shall be in a participating credit union.

    (4) In accounts with, investment certificates or withdrawable shares of, any savings
    and loan association that is an insured institution as defined by Title IV of
    the "National Housing Act," 48 Stat. 1255 (1934), 12 U.S.C.A. 1724, as amended.

    (5) In United States government securities or United States government agency
    obligations;

    (6) In bonds or other evidence of indebtedness rated in the three highest ratings
    of Standard and Poor''s or Moody''s service, not in default as to principal or
    interest, that are valid obligations issued, assumed, or guaranteed by any state,
    county, or municipal corporation of the United States;

    (7) In bonds or other evidence of indebtedness rated in the three highest ratings
    by Standard and Poor''s or Moody''s service, not in default as to principal or
    interest, that are valid obligations issued, assumed, or guaranteed by any corporation
    incorporated under the laws of the United States or a state and described in division
    (D)(1) of section 3925.08 of the Revised Code. However, a credit union share guaranty
    corporation shall not invest in any such corporate security containing any provision
    of optionality, including, but not limited to, any derivative security.

    (8) In the common stock of any federal home loan bank of which the corporation
    is a member, for the purpose of maintaining a line of credit or source of liquidity
    through borrowings from the bank, if the bank requires its members to purchase
    and hold its common stock referred to as either of the following:

    (a) Membership stock, subject to an annual adjustment made by the bank based on
    the corporation''s admitted total assets as reported in its filings with the superintendent
    of insurance;

    (b) Activity stock as may be required by the bank whenever the corporation borrows
    from the bank and for as long as any of those funds remain outstanding.

    (9) In any other investments that are expressly approved by the superintendent
    of credit unions and the superintendent of insurance or are permitted by rules
    adopted by the superintendents pursuant to division (C) of section 1761.04 of
    the Revised Code, but such other investments shall not exceed twenty per cent
    of the sum of the capital contributions, retained and undivided earnings, and
    any borrowings made in accordance with section 3901.72 of the Revised Code of
    the corporation. The superintendents shall not permit the corporation to make
    any investment in any unrelated corporation or unrelated subsidiary without the
    prior written approval of the superintendent of credit unions and the superintendent
    of insurance.

    (B) The maximum investment in securities of any one corporation shall not exceed
    ten per cent of the guarantee fund at the time the investment is made.

    (C) The corporation''s directors, officers, committee members, and employees,
    and immediate family members of such individuals, are prohibited from receiving
    pecuniary or any other type of consideration in connection with the making of
    an investment or deposit by the corporation.

    (D) Within thirty days of appointment, each officer, agent, or employee having
    control or access to funds or securities owned by or pledged with a credit union
    share guaranty corporation shall be provided with fidelity bond coverage by the
    corporation in an amount commensurate with the risk involved.

    (E) With the express written approval of the board of directors and the superintendent
    of credit unions and the superintendent of insurance, the corporation may invest
    in publicly traded preferred and common stocks, as permitted by section 3925.08
    of the Revised Code, in an aggregate amount not to exceed the corporation''s statutory
    unassigned surplus as reduced by its authorized control level risk-based capital.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.13
- number: '1761.14'
  heading: Record and use of income
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) A credit union share guaranty corporation shall record income from investments
    in an income account, and may use such income to defray expenses of operations.
    Income from all sources that exceeds an amount determined by the board of directors
    to be adequate to provide for current expenses may be credited to participating
    credit unions'' accounts.

    (B) Expenses of operations that exceed income from all sources at year end shall
    be charged, first to undivided or retained earnings, and then to participating
    credit unions'' accounts. Each participating credit union''s accounts shall be
    charged ratably based on the account balance for the amount of the excess.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.14
- number: '1761.15'
  heading: Establishing reserve for guaranty losses
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: A credit union share guaranty corporation shall establish a reserve for guaranty
    losses on an incurred basis in accordance with generally accepted accounting principles
    during the period in which such losses become evident. Such reserve shall provide
    for losses reported to the corporation, losses incurred but not reported, and
    estimated losses on the collection of notes and other guarantees to member credit
    unions. Estimates of loss frequency and loss severity for incurred but not reported
    losses shall be made based on historical data, trends, economic factors, and other
    statistical information related to member credit unions. Such reserve shall be
    reported in its annual statement to the superintendent of insurance according
    to the principles of statutory accounting. All determinations of the superintendent
    of insurance shall be made on the basis of principles of statutory accounting.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.15
- number: '1761.16'
  heading: Reports of audited financial statements
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) A credit union share guaranty corporation shall file with the superintendent
    of credit unions an annual report containing audited financial statements, prepared
    in accordance with generally accepted accounting principles or such other accounting
    requirements determined by the superintendent of credit unions, covering the fiscal
    year within one hundred days after the close of such fiscal year in accordance
    with division (E) of this section and in the form and with such other relevant
    information as the superintendent of credit unions may require by rules adopted
    under division (C) of section 1761.04 of the Revised Code. The audited financial
    statements shall include at least a balance sheet and a statement of income for
    the year ended on the balance sheet date. The report and audited financial statements
    shall be accompanied by a report, certificate, or opinion of an independent certified
    public accountant or independent public accountant. Every such report shall be
    certified by the oath of the president and secretary of the corporation, and such
    verification shall state that the report is true and correct in all respects to
    the best of the knowledge and belief of the persons verifying it.

    (B) If the report, certificate, or opinion of the certified public accountant
    or independent accountant referred to in division (A) of this section is qualified
    pursuant to generally accepted auditing standards, the superintendent of credit
    unions shall require the corporation to take such action as the superintendent
    considers appropriate to permit an independent accountant to remove such qualification
    from the report, certificate, or opinion. The superintendent may reject any financial
    statement, report, certificate, or opinion filed pursuant to division (A) of this
    section by notifying the corporation of its rejection and the cause thereof. Within
    thirty days after receipt of such notice, the corporation shall correct such qualification,
    and the failure to do so is deemed a violation of this division. The superintendent
    shall retain a copy of all filings so rejected.

    (C) The superintendent of credit unions shall conduct or cause to be conducted,
    not more often than annually and not less than every three years, an audit examination
    of the credit union share guaranty corporation. The audit examination shall include
    an actuarial study of the capital adequacy of the corporation. The corporation
    shall be assessed the costs of such audit examination, which assessment shall
    not exceed one per cent of the capital contributions and surplus of the corporation.

    (D) The superintendent of credit unions may require a special examination of the
    corporation in the event the superintendent determines that there is or will be
    an impairment of the guarantee fund as defined in division (C)(1) of section 1761.10
    of the Revised Code. The corporation shall be assessed the cost of such special
    examination.

    (E) The accounting of the corporation shall be on a calendar year basis or as
    otherwise prescribed by the corporation with the prior written approval of the
    superintendent of credit unions. The books of the corporation shall be maintained
    in accordance with generally accepted accounting principles.

    (F) The corporation shall make any other special report to the superintendent
    of credit unions as the superintendent may from time to time require. Such a report
    shall be in the form and filed at such date as prescribed by the superintendent,
    and shall, if required by the superintendent, be verified in such manner as prescribed.

    (G) Each credit union share guaranty corporation shall be subject to examination
    by the superintendent of insurance in accordance with section 3901.07 of the Revised
    Code. Section 3901.07 of the Revised Code shall govern every aspect of the examination,
    including the circumstances under and frequency with which it is conducted, the
    authority of the superintendent and any examiner or other person appointed by
    the superintendent, the liability for the assessment of expenses incurred in conducting
    the examination, and the remittance of the assessment to the department of insurance
    operating fund.

    (H) All of the provisions of this section are in addition to those chapters of
    Title XXXIX of the Revised Code specified in division (A) of section 1761.04 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1761.16
- number: '1761.17'
  heading: Taking possession of property and business of credit union share guaranty
    corporation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1761'
    name: Credit Union Guaranty Corporations
  text: '(A) The superintendent of credit unions or the superintendent of insurance
    may forthwith take possession of the property and business of the credit union
    share guaranty corporation and retain possession until the corporation satisfies
    the superintendent that it will operate in conformity with this chapter whenever
    it appears to the superintendent that the corporation has done any of the following:

    (1) Failed to pay the annual fee required by division (B) of section 1761.04 of
    the Revised Code;

    (2) Not paid deficiencies up to the maximum guaranteed amount within the time
    frame set forth in section 1761.11 of the Revised Code;

    (3) Invested its funds in violation of section 1761.13 of the Revised Code;

    (4) Not collected required capital contributions, special assessments, or special
    premium assessments in accordance with section 1761.10 of the Revised Code;

    (5) Knowingly violated any cease-and-desist order;

    (6) Neglected or refused to submit any item specifically required by the superintendent
    under this chapter to the inspection of any examiner or other agent of the superintendent.

    (B) During the time the superintendent of credit unions retains possession of
    the property and business of the corporation pursuant to division (A) of this
    section, the superintendent shall perform the duties and carry out the obligations
    of the corporation.

    (C) Whenever the superintendent has taken possession of the property and business
    of the corporation, if it considers itself aggrieved thereby, the corporation
    may, within ten days after such taking, apply to the common pleas court of Franklin
    county to enjoin further proceedings. The court, after citing the superintendent
    to show cause why further proceedings should not be enjoined, and after a hearing
    and a determination of the facts upon the merits, may dismiss such application
    or enjoin the superintendent from further proceedings and direct the superintendent
    to surrender the property and business to the corporation, or make such further
    order as may be just.

    (D) An appeal may be taken from the judgment of the court by the superintendent
    or by the corporation in the manner provided by law for appeals from the judgment
    of a court of common pleas. An appeal from the judgment of the court shall not
    operate as a stay of the judgment unless the court, on good cause, so orders.

    (E) Any action by the superintendent of insurance to take possession of the property
    and business of a credit union share guaranty corporation shall be under Chapter
    3903. of the Revised Code.'
