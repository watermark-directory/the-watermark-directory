- number: '1710.03'
  heading: Members of district
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1710'
    name: Special Improvement Districts
  text: '(A) Except as otherwise provided in this division, each owner of real property
    within a special improvement district other than the state or federal government
    is a member of the district, and the real property of each member of the district
    is subject to special assessment under division (C) of section 1710.06 of the
    Revised Code. A church is not a member of the district unless the church specifically
    requested in writing that its property be included in the district or unless,
    in the case of a district created by an existing qualified nonprofit corporation,
    the church is a member of the corporation at the time the district is created.
    A county, township, municipal corporation, or park district owning real property
    in the district is not a member of the district unless such entity specifically
    requested in writing that its property be included in the district.

    The identity and address of the owners shall be determined for any particular
    action of the nonprofit corporation that governs the district, including notice
    of meetings of the district, no more than sixty days prior to the date of the
    action, from the most current records available at the county auditor''s office.
    For purposes of this chapter, the persons shown on such records as having common
    or joint ownership interests in a parcel of real property collectively shall constitute
    the owner of the real property.

    (B) A member may file a written statement with the district''s secretary at least
    three days prior to any meeting of the entire membership of the district to appoint
    a proxy to carry out the member''s rights and responsibilities under this chapter
    at that meeting.

    (C) A member also may appoint a designee to carry out the member''s rights and
    responsibilities under this chapter by filing a written designation form with
    the district''s secretary. This form shall include the name and address of the
    member, the name and address of the designee, and the expiration date, if any,
    of the designation and may authorize the designee to vote at any meeting of the
    district.

    (D) A proxy or designee need not be an elector or resident of any participating
    political subdivision of the district or a member of the district. The appointment
    of a proxy or a designee may be changed by filing a new form with the district''s
    secretary. The most current form filed with the secretary is the valid appointment.
    Service of any notice upon a proxy or designee at the proxy''s or designee''s
    address as shown on that form satisfies any requirements for notification of the
    member.'
