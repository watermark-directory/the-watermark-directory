- number: '1746.17'
  heading: Validity of contracts or titles not affected by violation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1746'
    name: Business Trusts
  text: '(A) The transaction of business in this state by a business trust in violation
    of this chapter does not affect the validity of any contract with such trust,
    or the validity of the title to any estate or interest in real or personal property
    taken, held, or disposed of by such trust. No business trust that has transacted
    business in violation of this chapter, nor any persons acting on its behalf, shall
    maintain any action in any court of this state until it has fully complied with
    this chapter and further paid to the secretary of state a forfeiture of one thousand
    dollars.

    (B) Full compliance with this section prior to the bringing of an action to recover
    a forfeiture under section 1746.16 of the Revised Code constitutes a bar to such
    action.'
