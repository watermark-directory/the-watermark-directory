- number: '1702.40'
  heading: Judicial sale of property
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1702'
    name: Nonprofit Corporation Law
  text: Property of any description, and any interest therein, of a corporation, domestic
    or foreign, may be sold under the judgment or decree of a court, as provided in
    the Revised Code with respect to similar property of natural persons, at public
    or private sale, in such manner, at such time and place, on such notice by publication
    or otherwise, and on such terms, as the court adjudging or decreeing such sale
    deems equitable and proper, but it shall not be necessary to appraise such property
    or to advertise the sale thereof otherwise than as the court adjudges or decrees.
