- number: '1723.04'
  heading: Reservoirs in certain places prohibited
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1723'
    name: Appropriation Of Property By Certain Corporations
  text: No reservoirs for the storage or transportation of water shall be constructed
    by any company described in section 1723.01 of the Revised Code, within the corporate
    limits of any municipal corporation or within any public park, and all excavations
    made by such company, except reservoirs for storage and transportation of water,
    shall be well filled, and kept well filled, by it.
