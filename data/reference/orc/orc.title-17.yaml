- number: '1721.23'
  heading: Cancellation of contract for sale of mausoleum space
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1721'
    name: Cemetery Associations
  text: '(A) A contract for the sale of mausoleum space that is not ready for the
    entombment of human remains on the date of the contract shall stipulate that the
    buyer may cancel the contract if either of the following conditions apply:

    (1) The construction of the mausoleum has not begun within the time period specified
    in the contract, which shall be not later than three years after the date of the
    contract;

    (2) The certificate of use and occupancy has not been issued by the appropriate
    building official within the time period specified in the contract, which shall
    be not later than five years after the date of the contract.

    (B) The contract shall state in bold print the options available to the purchaser,
    his executor, or administrator in the event that the purchaser or a member of
    his immediate family dies before completion of the mausoleum. The options shall
    include, but not be limited to, providing entombment in a temporary space.

    (C) If a contract is canceled pursuant to division (A) of this section, the seller
    shall, within thirty days of cancellation, refund all moneys paid by the purchaser
    under the contract.'
