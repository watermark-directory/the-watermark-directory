  heading: Use of money raised by county taxation
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1711'
    name: Agricultural Societies and Fairgrounds
  text: When money has been raised by taxation by a county for the purpose of leasing
    lands for county fairs, erecting buildings for county fair purposes, or making
    improvements on a county fairground, or for any purpose connected with the use
    of a county fairground or with the management thereof by a county agricultural
