  url: https://codes.ohio.gov/ohio-revised-code/section-1701.83
- number: '1701.831'
  heading: Control share acquisitions procedures
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) Unless the articles, the regulations adopted by the shareholders, or
    the regulations adopted by the directors pursuant to division (A)(1) of section
    1701.10 of the Revised Code of the issuing public corporation provide that this
    section does not apply to control share acquisitions of shares of such corporation,
    any control share acquisition of an issuing public corporation shall be made only
    with the prior authorization of the shareholders of such corporation in accordance
    with this section.

    (B) Any person who proposes to make a control share acquisition shall deliver
    an acquiring person statement to the issuing public corporation at the issuing
    public corporation''s principal executive offices. Such acquiring person statement
    shall set forth all of the following:

    (1) The identity of the acquiring person;

    (2) A statement that the acquiring person statement is given pursuant to this
    section;

    (3) The number of shares of the issuing public corporation owned, directly or
    indirectly, by the acquiring person;

    (4) The range of voting power, described in division (Z)(1)(a), (b), or (c) of
    section 1701.01 of the Revised Code, under which the proposed control share acquisition
    would, if consummated, fall;

    (5) A description in reasonable detail of the terms of the proposed control share
    acquisition;

    (6) Representations of the acquiring person, together with a statement in reasonable
    detail of the facts upon which they are based, that the proposed control share
    acquisition, if consummated, will not be contrary to law, and that the acquiring
    person has the financial capacity to make the proposed control share acquisition.

    (C)(1) Within ten days after receipt of an acquiring person statement that complies
    with division (B) of this section, the directors of the issuing public corporation
    shall call a special meeting of shareholders of the issuing public corporation
    for the purpose of voting on the proposed control share acquisition. Subject to
    division (C)(2) of this section, unless the acquiring person and the issuing public
    corporation agree in writing to another date, such special meeting of shareholders
    shall be held within fifty days after receipt by the issuing public corporation
    of the acquiring person statement. If the acquiring person so requests in writing
    at the time of delivery of the acquiring person statement, such special meetings
    shall be held no sooner than thirty days after receipt by the issuing public corporation
    of the acquiring person statement. Subject to division (C)(2) of this section,
    such special meeting of shareholders shall be held no later than any other special
    meeting of shareholders that is called, after receipt by the issuing public corporation
    of the acquiring person statement, in compliance with this section or section
    1701.76, 1701.78, 1701.781, 1701.79, 1701.791, 1701.801, or 1701.83 of the Revised
    Code.

    (2) If, in connection with a proposed control share acquisition, the acquiring
    person changes the percentage of the class of shares being sought, the consideration
    offered, or the security dealer''s soliciting fee; extends the expiration date
    of a tender offer for the shares being sought; or otherwise changes the terms
    of the proposed control share acquisition, then the directors of the issuing public
    corporation may reschedule the special meeting of shareholders required by division
    (C)(1) of this section. If the proposed control share acquisition is to be made
    pursuant to a tender offer, then the meeting may be rescheduled to a date that
    is not later than the expiration date of the offer. If the proposed control share
    acquisition is to be made other than pursuant to a tender offer, the meeting may
    be rescheduled to a date that is not later than ten business days after notice
    of the change is first given to the shareholders.

    (D) Notice of the special meeting of shareholders shall be given as promptly as
    reasonably practicable by the issuing public corporation to all shareholders of
    record as of the record date set for such meeting, whether or not entitled to
    vote at the meeting. The notice shall include or be accompanied by both of the
    following:

    (1) A copy of the acquiring person statement delivered to the issuing public corporation
    pursuant to this section;

    (2) A statement by the issuing public corporation, authorized by its directors,
    of its position or recommendation, or that it is taking no position or making
    no recommendation, with respect to the proposed control share acquisition.

    (E) The acquiring person may make the proposed control share acquisition if both
    of the following occur:

    (1) The shareholders of the issuing public corporation who hold shares as of the
    record date of such corporation entitling them to vote in the election of directors
    authorize the acquisition at the special meeting held for that purpose at which
    a quorum is present by an affirmative vote of a majority of the voting power of
    such corporation in the election of directors represented at the meeting in person
    or by proxy, and a majority of the portion of the voting power excluding the voting
    power of interested shares represented at the meeting in person or by proxy. A
    quorum shall be deemed to be present at the special meeting if at least a majority
    of the voting power of the issuing public corporation in the election of directors
    is represented at the meeting in person or by proxy.

    (2) The acquisition is consummated, in accordance with the terms so authorized,
    no later than three hundred sixty days following shareholder authorization of
    the control share acquisition.

    (F) Except as expressly provided in this section, nothing in this section shall
    be construed to affect or impair any right, remedy, obligation, duty, power, or
    authority of any acquiring person, any issuing public corporation, the directors
    of any acquiring person or issuing public corporation, or any other person under
    the laws of this or any other state or of the United States.

    (G) If any application of any provision of this section is for any reason held
    to be illegal or invalid, the illegality or invalidity shall not affect any legal
    and valid provision or application of this section, and the parts and applications
    of this section are severable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1701.831
- number: '1701.832'
  heading: State's responsibility as to tender offers
  title:
    num: '17'
    name: Corporations-Partnerships
  chapter:
    num: '1701'
    name: General Corporation Law
  text: '(A) In enacting Amended Substitute House Bill No. 822 of the 114th general
    assembly, which amended sections 1701.01, 1701.11, 1701.37, 1701.48, 1707.01,
    1707.23, 1707.26, 1707.29, and 1707.99 and enacted sections 1701.831 and 1707.042
    of the Revised Code, the general assembly found and continues to find that:

    (1) Existing Ohio corporate law was designed to deal with traditional methods
    of transfer of control of Ohio corporations. The tender offer has evolved as an
    alternative device to acquire control of a public corporation that has been in
    widespread use in the past several decades. The acquisition of significant blocks
    of the securities of a public company in the open market or private transactions
    in connection with actual or apparent efforts to acquire control has become more
    common in recent years and has further complicated the impact of tender offers
    upon a corporation and its shareholders. Numerous Ohio corporations have been
    the subject of tender offers and accumulations of significant blocks of securities.

    (2) The accumulation of a large block of a corporation''s voting shares, or other
    securities convertible into voting shares, through direct or indirect acquisition
    from one or more existing shareholders of the corporation has not been subject
    to the normal corporate approval mechanisms involved in other typical types of
    acquisition transactions such as mergers, consolidations, combinations, and majority
    share acquisitions. Such accumulations, however, can result in shifts of effective
    corporate control and hence, from a business and financial perspective, directly
    or indirectly, can result in significant changes in a variety of basic corporate
    circumstances identical or substantially similar to those arising as a result
    of the above-mentioned transactions. For instance, a change in corporate control
    accompanying a large accumulation of shares will very often result in a fundamental
    change in the ongoing business of the corporation and a concomitant fundamental
    change in the nature of the shareholders'' investment in it. Thus the potential
    that such changes in corporate circumstances will occur gives rise to basic issues
    concerning the internal affairs of the corporation typical of those arising in
    mergers, consolidations, combinations, and majority share acquisitions. The form
    of the transaction in which such issues arise should not alter the basic corporate
    mechanisms by which such issues are presented and resolved.

    (3) Tender offers almost always involve a change in corporate control and, therefore,
    give rise to these same basic issues concerning internal corporate affairs. Although
    tender offers in theory offer shareholders the opportunity to consider such issues
    in deciding whether or not to tender their shares, in practice they do not. Tender
    offers are coercive in the sense that shareholders are normally concerned that
    a majority of their fellow shareholders will tender their shares, leaving them
    in a minority position with one controlling shareholder. Thus, shareholders often
    feel compelled to tender their shares, regardless of how they feel about the corporate
    control issues inherent in any tender offer. The opportunity for reasoned decision-making
    is further hindered by the short time periods in which tender offers can be consummated,
    the structures of many recent tender offers, which are designed to encourage prompt
    tenders, and the fact that individual shareholders typically receive or obtain
    tender offer materials much later than institutional shareholders.

    (4) It is in the public interest for shareholders to have a reasonable opportunity
    to express their views by voting on a proposed shift of control, an opportunity
    currently available under Ohio general corporation law, Chapter 1701. of the Revised
    Code, in transactions with similar effects. The general assembly also believes
    that it is in the public interest for Ohio securities laws, Chapter 1707. of the
    Revised Code, to provide evenhanded protection of offerors and shareholders from
    fraudulent and manipulative transactions arising in connection with control acquisitions.

    (5) Initial state efforts to deal with tender offer developments have been questioned
    by the federal courts. The general assembly observes that responsibility for general
    corporate laws is the function of state legislation and that no federal law of
    corporations exists. The general assembly observes that securities law protection
    of state residents has long been recognized as an appropriate subject of state
    law regulation under the federal system. The general assembly acknowledges an
    in loco parentis responsibility to shareholders who invest in corporations created
    under the laws of Ohio and to shareholders generally who reside in Ohio.

    (B) Sections 1701.01, 1701.11, 1701.37, 1701.48, 1707.01, 1707.23, 1707.26, 1707.29,
    and 1707.99, as amended by Amended Substitute House Bill No. 822 of the 114th
    general assembly, and sections 1701.831 and 1707.042, as enacted by that act,
    were a recognition of the state''s responsibility with respect to the subject
    matter of the act. Nevertheless, with a view to avoiding an undue burden on interstate
    commerce, as expressed in recent court decisions, the amendments were designed
    to have the minimum impact upon interstate commerce consistent with Ohio responsibility
    in respect to the subject matter. Accordingly, the security law amendments made
    by that act to sections 1707.23, 1707.26, 1707.29, and 1707.99 and in newly enacted
    section 1707.042 of the Revised Code were limited to application to Ohio resident
    investors, and the corporate law amendments made by that act to sections 1701.01,
    1701.11, 1701.37, and 1701.48 and in newly enacted section 1701.831 of the Revised
    Code were limited to corporations created under the laws of Ohio with the strong
    Ohio ties provided in the amendments. The corporate legislation does not include
    a requirement for Ohio resident investors because of the difficulty of ascertainment
    by potential acquirers and others of the residence of shareholders. The general
    assembly finds that corporations satisfying the jurisdictional nexus provided
    by the amendments may be deemed to have a substantial and significant shareholder
    base in the state.

    (C) The general assembly confirms all of the findings of this section as enacted
    by Amended Substitute House Bill No. 822 of the 114th general assembly, except
    that the general assembly declares that, from the effective date of this amendment,
    November 2, 1989, and the concurrent amendment of section 1701.11 of the Revised
    Code by the addition of division (B)(9)(a)(ii) to that section, the standards
    of that division are permitted, as an alternative to the ties with Ohio essential
    to the status of a control share acquisition, to qualify for the authorized restrictions
    on transfer of shares. The general assembly further finds that the omission of
    a reference to "1701.01" immediately following the phrase "the corporate law amendments
    in sections" in the enactment of division (B) of this section was inadvertent.

    (D) The general assembly confirms all of the findings of this section as enacted
    by Amended Substitute House Bill No. 822 of the 114th general assembly, and as
    amended by Amended Substitute House Bill No. 358 of the 118th general assembly,
    and further finds all of the following:

    (1) Although Ohio general corporation law, Chapter 1701. of the Revised Code,
    requires that a special meeting be held to enable shareholders of an issuing public
    corporation to vote on any control share acquisition, it describes meeting procedures,
    like other states, primarily in general terms.

    (2) Where the law, or the articles of incorporation and code of regulations of
    the issuing public corporation, do not mandate specific meeting procedures, the
    directors of the corporation must define appropriate procedures consistent with
    their fiduciary duties as provided in section 1701.59 of the Revised Code. In
    carrying out these duties, practices and procedures have developed from experience
    in this state and elsewhere to ensure fair and efficient meetings. These practices
    and procedures include the use of a variety and number of presumptions and forms
    of proxy.

    (3) The use of presumptions and forms of proxy reflects the fact that, in this
    state and other states with similar laws, efficiency and finality are necessary
    priorities over precision and certitude in the conduct of a meeting. It is the
    responsibility of the directors to utilize practices and procedures, including
    presumptions and forms of proxy, that are consistent with their fiduciary duties.'
