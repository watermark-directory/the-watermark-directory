  url: https://codes.ohio.gov/ohio-revised-code/section-1533.113
- number: '1533.12'
  heading: Hunting, fishing or trapping without a license or permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A)(1) Except as otherwise provided in division (A)(2) of this section, every
    person on active duty in the armed forces of the United States who is stationed
    in this state and who wishes to engage in an activity for which a license, permit,
    or stamp is required under this chapter first shall obtain the requisite license,
    permit, or stamp. Such a person is eligible to obtain a resident hunting or fishing
    license regardless of whether the person qualifies as a resident of this state.
    To obtain a resident hunting or fishing license, the person shall present a card
    or other evidence identifying the person as being on active duty in the armed
    forces of the United States and as being stationed in this state.

    (2) Every person on active duty in the armed forces of the United States, while
    on leave or furlough, may take or catch fish of the kind lawfully permitted to
    be taken or caught within the state, may hunt any wild bird or wild quadruped
    lawfully permitted to be hunted within the state, and may trap fur-bearing animals
    lawfully permitted to be trapped within the state, without procuring a fishing
    license, a hunting license, a fur taker permit, or a wetlands habitat stamp required
    by this chapter, provided that the person shall carry on the person when fishing,
    hunting, or trapping, a card or other evidence identifying the person as being
    on active duty in the armed forces of the United States, and provided that the
    person is not otherwise violating any of the hunting, fishing, and trapping laws
    of this state.

    In order to hunt deer or wild turkey, any such person shall obtain a deer or wild
    turkey permit, as applicable, under section 1533.11 of the Revised Code. Such
    a person is eligible to obtain a deer or wild turkey permit at the resident rate,
    regardless of whether the person is a resident of this state. However, the person
    need not obtain a hunting license in order to obtain such a permit.

    (B) The chief of the division of wildlife shall provide by rule adopted under
    section 1531.10 of the Revised Code all of the following:

    (1) Every resident of this state with a disability that has been determined by
    the veterans administration to be permanently and totally disabling, who receives
    a pension or compensation from the veterans administration, and who received an
    honorable discharge from the armed forces of the United States, and every veteran
    to whom the registrar of motor vehicles has issued a set of license plates under
    section 4503.41 of the Revised Code, shall be issued a fishing license, hunting
    license, fur taker permit, deer or wild turkey permit, or wetlands habitat stamp,
    or any combination of those licenses, permits, and stamp, free of charge on an
    annual, multi-year, or lifetime basis as determined appropriate by the chief when
    application is made to the chief in the manner prescribed by and on forms provided
    by the chief.

    (2) Every resident of the state who was born on or before December 31, 1937, shall
    be issued an annual fishing license, hunting license, fur taker permit, deer or
    wild turkey permit, or wetlands habitat stamp, or any combination of those licenses,
    permits, and stamp, free of charge when application is made to the chief in the
    manner prescribed by and on forms provided by the chief.

    (3) Every resident of state or county institutions, charitable institutions, and
    military homes in this state shall be issued an annual fishing license free of
    charge when application is made to the chief in the manner prescribed by and on
    forms provided by the chief.

    (4) As used in division (B)(4) of this section, "blind" and "person with a mobility
    impairment" have the same meanings as in section 955.021 of the Revised Code.

    Any person with a mobility impairment or blind person who is a resident of this
    state and who is unable to engage in fishing without the assistance of another
    person shall be issued an annual fishing license free of charge when application
    is made to the chief in the manner prescribed by and on forms provided by the
    chief. The person who is assisting the person with a mobility impairment or blind
    person may assist in taking or catching fish of the kind permitted to be taken
    or caught without procuring the license required under section 1533.32 of the
    Revised Code, provided that only one line is used by both persons.

    (5) As used in division (B)(5) of this section, "prisoner of war" means any regularly
    appointed, enrolled, enlisted, or inducted member of the military forces of the
    United States who was captured, separated, and incarcerated by an enemy of the
    United States.

    Any person who has been a prisoner of war, was honorably discharged from the military
    forces, and is a resident of this state shall be issued a fishing license, hunting
    license, fur taker permit, or wetlands habitat stamp, or any combination of those
    licenses, permits, and stamp, free of charge on an annual, multi-year, or lifetime
    basis as determined appropriate by the chief when application is made to the chief
    in the manner prescribed by and on forms provided by the chief.

    (C) The chief shall adopt rules pursuant to section 1531.08 of the Revised Code
    designating not more than two days, which need not be consecutive, in each year
    as "free sport fishing days" on which any resident may exercise the privileges
    accorded the holder of a fishing license issued under section 1533.32 of the Revised
    Code without procuring such a license, provided that the person is not otherwise
    violating any of the fishing laws of this state.'
