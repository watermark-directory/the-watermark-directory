- number: '1518.03'
  heading: Rules for commercial dealers regarding endangered plants
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1518'
    name: Endangered Species
  text: 'The chief of natural areas and preserves shall adopt and may amend or repeal
    rules, in accordance with Chapter 119. of the Revised Code, restricting the taking,
    possessing, transportation, sale, offering for sale, or exposure for sale, for
    commercial purposes of native Ohio species of wild plants or parts of them, that
    are listed as endangered or threatened by rule adopted under section 1518.01 of
    the Revised Code. The rules may prohibit the taking of any endangered or threatened
    plant, or parts of it, for commercial purposes, from any wood lot, field, or forest,
    or from any other location in which that plant is found growing in its native
    habitat. This section does not prevent any nurseryperson or dealer who is licensed
    under Chapter 927. of the Revised Code from selling, offering for sale, shipping,
    or otherwise disposing of any endangered or threatened plants or parts of them
    when those plants have been commercially grown by a licensed nursery or legally
    imported into this state. For the purposes of this section, "commercial purposes"
    means with intent to sell or trade endangered or threatened plants for gain or
    profit. "Commercially grown" means to grow plants under cultivation in tilled
    plots or in a greenhouse.

    The rules shall provide for the taking of species endangered or threatened with
    statewide extirpation for botanical, educational, and scientific purposes, and
    for propagation in captivity to preserve the species, with written permission
    from the chief. The rules shall not prohibit the taking or possession of species
    listed on the "United States list of endangered and threatened wildlife and plants"
    for botanical, educational, or scientific purposes, or for propagation in captivity
    to preserve the species, under a permit or license from the United States or any
    instrumentality of the United States.'
