  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.722
- number: '1533.73'
  heading: Commercial bird shooting preserves - regulations - leg bands and tags
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) Except as otherwise provided in this division or by division rule, licensed
    commercial bird shooting preserves may be established in any county of the state,
    but no such preserve shall be less than eighty acres or more than six hundred
    forty acres in area. A commercial bird shooting preserve shall be in one continuous
    block of land, except that the block of land may be intersected by highways or
    roads. No commercial bird shooting preserve shall be located within fifteen hundred
    feet of any other such preserve.

    A licensed commercial bird shooting preserve operated by a municipal corporation
    on lands located within its corporate limits is not subject to this division.

    (B) The boundaries of each licensed commercial bird shooting preserve shall be
    clearly defined by posting, at intervals of not more than two hundred feet, with
    signs prescribed by the division of wildlife.

    (C) Mallard or black ducks and other game birds upon which there is an open season
    in this state, which the chief of the division may approve for such use, and that
    have been legally acquired or propagated under the authority of a propagating
    license issued under section 1533.71 of the Revised Code and marked and banded
    as provided in division (D) of this section may be released and harvested by shooting
    within the confines of any licensed commercial bird shooting preserve between
    sunrise and sunset, without regard to sex, daily bag limit, or open season, by
    licensed hunters authorized by the holder of the commercial bird shooting preserve
    license to hunt on those lands.

    (D) All game birds released on a licensed commercial bird shooting preserve shall
    first be banded with a leg band that shall bear upon it a symbol identifying the
    commercial bird shooting preserve. No game birds shall be possessed or transported
    outside the licensed area unless each such bird is tagged with a suitable tag
    or seal supplied by the division.

    (E) The holder of a commercial bird shooting preserve license shall raise, or
    purchase, and release on the licensed commercial bird shooting preserve at least
    five hundred pheasants annually. With the approval of the chief, the license holder
    may raise, or purchase, and release, in lieu of pheasants, a like number of other
    game birds. No person shall fail to release the required number of game birds
    on a licensed commercial bird shooting preserve as required by this division.

    (F) The holder of a commercial bird shooting preserve license is not liable for
    any damage to or destruction of growing crops on land adjacent to the preserve
    caused by game birds released on the preserve.

    (G) No holder of a commercial bird shooting preserve license shall violate this
    chapter or Chapter 1531. of the Revised Code or any division rule.

    (H) A person may hunt game birds, other than wild turkeys, in a licensed commercial
    bird shooting preserve without obtaining a hunting license otherwise required
    by section 1533.10 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.73
- number: '1533.731'
  heading: Wild animal hunting preserves - regulations
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No wild animal hunting preserve shall be less than eighty acres in area.
    Each such preserve shall be in one continuous block of land, except that the block
    of land may be intersected by highways or roads. No wild animal hunting preserve
    shall be located within one thousand five hundred feet of another such preserve.

    The boundaries of each wild animal hunting preserve shall be clearly defined by
    posting, at intervals of not more than four hundred feet, with signs prescribed
    by the division of wildlife. Each wild animal hunting preserve shall be surrounded
    by a fence at least eight feet in height, with a minimal deviation not to exceed
    four per cent, that is constructed of a woven wire mesh, or such other enclosure
    approved by the chief of the division of wildlife.

    (B)(1) Except as provided in divisions (B)(2), (3), and (4) of this section, game
    and nonnative wildlife that have been approved by the chief for such use and that
    have been legally acquired or propagated under the authority of a propagating
    license issued under section 1533.71 of the Revised Code or propagated within
    the confines of a licensed wild animal hunting preserve may be released and hunted
    within the confines of the licensed wild animal hunting preserve between one-half
    hour before sunrise and one-half hour after sunset, without regard to sex, bag
    limit, or open season, by hunters authorized by the holder of the wild animal
    hunting preserve license to hunt on those lands. The chief shall establish, by
    rule, the allowable methods of taking game and nonnative wildlife in a wild animal
    hunting preserve.

    (2) No game or nonnative wildlife on the federal endangered species list established
    in accordance with the "Endangered Species Act of 1973," 87 Stat. 884, 16 U.S.C.A.
    1531, as amended, or the state endangered species list established in rules adopted
    under section 1531.25 of the Revised Code, no bears native to North America, and
    no large carnivores of the family Felidae shall be released for hunting or hunted
    in any wild animal hunting preserve in this state.

    (3) No person shall release for hunting or hunt within a wild animal hunting preserve
    any game or nonnative wildlife not listed in the application for a license for
    that preserve.

    (4) No person shall knowingly release for hunting or hunt wild boar or feral swine
    in any wild animal hunting preserve in this state.

    (C) Unless otherwise specified by division rule, all game and nonnative wildlife
    released on a wild animal hunting preserve shall be identified with a tag that
    shall bear upon it a symbol identifying the preserve.

    (D) No person shall remove living game or nonnative wildlife from a wild animal
    hunting preserve unless the game or nonnative wildlife are being transferred to
    another wild animal hunting preserve in accordance with rules adopted by the director
    of agriculture under section 943.24 of the Revised Code.

    (E) The holder of a wild animal hunting preserve license shall keep a record of
    all animals that have been released into the preserve. The record shall include
    all of the following:

    (1) The date on which each animal was released into the preserve;

    (2) The number of each species of animals;

    (3) The number of males and females of each species of animals;

    (4) The name and address of each person from whom each animal was obtained.

    The licensee shall record in a manner specified by the division the name and address
    of each person that takes any game or nonnative wildlife from the preserve. The
    licensee shall maintain those records for a period of two years and make them
    available for inspection by the division at all reasonable times in conjunction
    with an active criminal investigation.

    (F) In addition to complying with the requirements established by division (E)
    of this section, the holder of a wild animal hunting preserve license who has
    captive white-tailed deer in the preserve shall keep a record of all known escapes
    of those deer, deaths of those deer that were not a result of hunting, and laboratory
    results for testing for chronic wasting disease of those deer that is required
    by section 943.21 of the Revised Code and rules adopted under section 943.24 of
    the Revised Code.

    (G) For the purposes of division (B) of section 1533.02 of the Revised Code, the
    owner or operator of a wild animal hunting preserve shall furnish each person
    who takes any game or nonnative wildlife from the preserve a certificate bearing
    a description of the animal, the date the animal was taken, and the name of the
    preserve.

    (H) The holder of a wild animal hunting preserve license prominently shall display
    the license at the place of business that is specified in the license.

    (I) The chief shall adopt rules under section 1531.10 of the Revised Code that
    provide for the safety of the public and for the protection of the game and nonnative
    wildlife to be hunted in a wild animal hunting preserve prior to their release
    in the preserve.

    (J) No holder of a wild animal hunting preserve license shall violate this chapter
    or Chapter 1531. of the Revised Code or any division rule.

    (K) This section does not authorize the hunting of game birds in a licensed wild
    animal hunting preserve unless the licensee also possesses a valid commercial
    bird shooting preserve license issued under section 1533.72 of the Revised Code
    for the same land for which the wild animal hunting preserve license was issued.

    (L) A person may hunt game and nonnative wildlife in a licensed wild animal hunting
    preserve without obtaining a hunting license otherwise required by section 1533.10
    of the Revised Code or a deer permit otherwise required by section 1533.11 of
    the Revised Code.'
