  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: Any judge of a county court or municipal court judge has final jurisdiction
    within the territory for which he is elected or appointed in a prosecution for
    any violation of this chapter or Chapter 1533. of the Revised Code, or division
