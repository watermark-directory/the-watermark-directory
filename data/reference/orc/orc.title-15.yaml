- number: '1547.07'
  heading: Reckless or unsafe operation of vessel, water skis, aquaplane
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Any person who operates any vessel or manipulates any water skis, aquaplane,
    or similar device on the waters in this state carelessly or heedlessly, or in
    disregard of the rights or safety of any person, vessel, or property, or without
    due caution, at a rate of speed or in a manner so as to endanger any person, vessel,
    or property is guilty of reckless operation of the vessel or other device.

    (B) No person shall operate or permit the operation of a vessel in an unsafe manner.
    A vessel shall be operated in a reasonable and prudent manner at all times.

    Unsafe vessel operation includes, without limitation, any of the following:

    (1) A vessel becoming airborne or completely leaving the water while crossing
    the wake of another vessel at a distance of less than one hundred feet, or at
    an unsafe distance, from the vessel creating the wake;

    (2) Operating at such a speed and proximity to another vessel or to a person attempting
    to ride on one or more water skis, surfboard, inflatable device, or similar device
    being towed by a vessel so as to require the operator of either vessel to swerve
    or turn abruptly to avoid collision;

    (3) Operating less than two hundred feet directly behind a person water skiing
    or attempting to water ski;

    (4) Weaving through congested traffic.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.07
- number: '1547.071'
  heading: Authority of law enforcement officer when especially hazardous condition
    exists
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) If a law enforcement officer observes a vessel being used and determines
    that at least one of the unsafe conditions identified in division (C) of this
    section is present and that an especially hazardous condition exists, the officer
    may direct the operator of the vessel to take whatever immediate and reasonable
    actions are necessary for the safety of the persons aboard the vessel, including
    directing the operator to return the vessel to mooring and remain there until
    the situation creating the hazardous condition is corrected or has ended.

    For the purposes of this section, an especially hazardous condition is one in
    which a reasonably prudent person would believe that the continued operation of
    a vessel would create a special hazard to the safety of the persons aboard the
    vessel.

    (B) The refusal by an operator of a vessel to terminate use of the vessel after
    being ordered to do so by a law enforcement officer under division (A) of this
    section is prima-facie evidence of a violation of section 1547.07 of the Revised
    Code.

    (C) For the purposes of this section, any of the following is an unsafe condition:

    (1) Insufficient personal flotation devices;

    (2) Insufficient fire extinguishers;

    (3) Overloaded, insufficient freeboard for the water conditions in which the vessel
    is operating;

    (4) Improper display of navigation lights;

    (5) Fuel leaks, including fuel leaking from either the engine or the fuel system;

    (6) Accumulation of or an abnormal amount of fuel in the bilges;

    (7) Inadequate backfire flame control;

    (8) Improper ventilation.

    (D) This section does not apply to any of the following:

    (1) Foreign vessels temporarily using waters that are subject to the jurisdiction
    of the United States;

    (2) Military vessels, vessels owned by the state or a political subdivision, or
    other public vessels, except those that are used for recreation;

    (3) A ship''s lifeboats, as defined in section 1548.01 of the Revised Code;

    (4) Vessels that are solely commercial and that are carrying more than six passengers
    for hire.'
