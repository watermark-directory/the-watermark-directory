- number: '1547.32'
  heading: Vessel used as dwelling creating nuisance
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: No person shall use any vessel for the purpose of establishing or maintaining
    a dwelling which creates a nuisance of either permanent or temporary nature on
    any of the waters in this state except Lake Erie, the Muskingum River, the Ohio
    River, and the immediately connected harbors and anchorage facilities or in such
    other areas as may be designated for the purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.32
- number: '1547.33'
  heading: Restrictions on sink, toilet or sanitary system
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: Except on the waters of Lake Erie, the Muskingum River, or the Ohio River,
    no person shall launch, moor, dock, use, operate, or permit to be operated on
    any of the waters in this state any vessel that contains a sink, toilet, or sanitary
    system that is capable of discharging urine, fecal matter, contents of a chemical
    commode, kitchen wastes, laundry wastes, slop sink drainage, or other household
    wastes into the waters in this state. Such a sink, toilet, or sanitary system
    shall be removed, sealed, or made to drain into a tank or reservoir that can be
    carried or pumped ashore for disposal in a sewage treatment works approved by
    the director of environmental protection.
