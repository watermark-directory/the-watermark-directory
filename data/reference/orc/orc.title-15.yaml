- number: '1545.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'Whoever violates division (C) of section 1545.09 of the Revised Code shall
    be punished as follows:

    (A) Except as otherwise provided in division (B) of this section, the offender
    shall be fined not more than one hundred fifty dollars for a first offense and
    not more than one thousand dollars for each subsequent offense.

    (B) If the board of park commissioners that adopted the bylaw or rule that the
    offender violated and that was the basis of the offender''s violation of division
    (C) of section 1545.09 of the Revised Code has adopted a penalty for the violation
    under division (B) of that section, the offender shall be penalized in accordance
    with the penalty so adopted for the violation.'
