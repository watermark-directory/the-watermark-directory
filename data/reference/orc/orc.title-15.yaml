- number: '1547.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Whoever violates section 1547.91 of the Revised Code is guilty of a felony
    of the fourth degree.

    (B) Whoever violates division (F) of section 1547.08, section 1547.10, division
    (I) of section 1547.111, section 1547.13, or section 1547.66 of the Revised Code
    is guilty of a misdemeanor of the first degree.

    (C) Whoever violates a provision of this chapter or a rule, for which no penalty
    is otherwise provided, is guilty of a minor misdemeanor.

    (D) Whoever violates section 1547.07, 1547.132, or 1547.12 of the Revised Code
    without causing injury to persons or damage to property is guilty of a misdemeanor
    of the fourth degree.

    (E) Whoever violates section 1547.07, 1547.132, or 1547.12 of the Revised Code
    causing injury to persons or damage to property is guilty of a misdemeanor of
    the third degree.

    (F) Whoever violates division (N) of section 1547.54, division (G) of section
    1547.30, or section 1547.131, 1547.25, 1547.33, 1547.38, 1547.39, 1547.40, 1547.65,
    1547.69, or 1547.92 of the Revised Code or a rule is guilty of a misdemeanor of
    the fourth degree.

    (G) Whoever violates section 1547.11 of the Revised Code is guilty of a misdemeanor
    of the first degree and shall be punished as provided in division (G)(1), (2),
    or (3) of this section.

    (1) Except as otherwise provided in division (G)(2) or (3) of this section, the
    court shall sentence the offender to a jail term of three consecutive days and
    may sentence the offender pursuant to section 2929.24 of the Revised Code to a
    longer jail term. In addition, the court shall impose upon the offender a fine
    of not less than one hundred fifty nor more than one thousand dollars.

    The court may suspend the execution of the mandatory jail term of three consecutive
    days that it is required to impose by division (G)(1) of this section if the court,
    in lieu of the suspended jail term, places the offender under a community control
    sanction pursuant to section 2929.25 of the Revised Code and requires the offender
    to attend, for three consecutive days, a drivers'' intervention program that is
    certified pursuant to section 5119.38 of the Revised Code. The court also may
    suspend the execution of any part of the mandatory jail term of three consecutive
    days that it is required to impose by division (G)(1) of this section if the court
    places the offender under a community control sanction pursuant to section 2929.25
    of the Revised Code for part of the three consecutive days; requires the offender
    to attend, for that part of the three consecutive days, a drivers'' intervention
    program that is certified pursuant to section 5119.38 of the Revised Code; and
    sentences the offender to a jail term equal to the remainder of the three consecutive
    days that the offender does not spend attending the drivers'' intervention program.
    The court may require the offender, as a condition of community control, to attend
    and satisfactorily complete any treatment or education programs, in addition to
    the required attendance at a drivers'' intervention program, that the operators
    of the drivers'' intervention program determine that the offender should attend
    and to report periodically to the court on the offender''s progress in the programs.
    The court also may impose any other conditions of community control on the offender
    that it considers necessary.

    (2) If, within ten years of the offense, the offender has been convicted of or
    pleaded guilty to one violation of division (A) of section 1547.11 of the Revised
    Code or one other equivalent offense, the court shall sentence the offender to
    a jail term of ten consecutive days and may sentence the offender pursuant to
    section 2929.24 of the Revised Code to a longer jail term. In addition, the court
    shall impose upon the offender a fine of not less than one hundred fifty nor more
    than one thousand dollars.

    In addition to any other sentence that it imposes upon the offender, the court
    may require the offender to attend a drivers'' intervention program that is certified
    pursuant to section 5119.38 of the Revised Code.

    (3) If, within ten years of the offense, the offender has been convicted of or
    pleaded guilty to more than one violation or offense identified in division (G)(2)
    of this section, the court shall sentence the offender to a jail term of thirty
    consecutive days and may sentence the offender to a longer jail term of not more
    than one year. In addition, the court shall impose upon the offender a fine of
    not less than one hundred fifty nor more than one thousand dollars.

    In addition to any other sentence that it imposes upon the offender, the court
    may require the offender to attend a drivers'' intervention program that is certified
    pursuant to section 5119.38 of the Revised Code.

    (4) Upon a showing that serving a jail term would seriously affect the ability
    of an offender sentenced pursuant to division (G)(1), (2), or (3) of this section
    to continue the offender''s employment, the court may authorize that the offender
    be granted work release after the offender has served the mandatory jail term
    of three, ten, or thirty consecutive days that the court is required by division
    (G)(1), (2), or (3) of this section to impose. No court shall authorize work release
    during the mandatory jail term of three, ten, or thirty consecutive days that
    the court is required by division (G)(1), (2), or (3) of this section to impose.
    The duration of the work release shall not exceed the time necessary each day
    for the offender to commute to and from the place of employment and the place
    in which the jail term is served and the time actually spent under employment.

    (5) Notwithstanding any section of the Revised Code that authorizes the suspension
    of the imposition or execution of a sentence or the placement of an offender in
    any treatment program in lieu of being imprisoned or serving a jail term, no court
    shall suspend the mandatory jail term of ten or thirty consecutive days required
    to be imposed by division (G)(2) or (3) of this section or place an offender who
    is sentenced pursuant to division (G)(2) or (3) of this section in any treatment
    program in lieu of being imprisoned or serving a jail term until after the offender
    has served the mandatory jail term of ten or thirty consecutive days required
    to be imposed pursuant to division (G)(2) or (3) of this section. Notwithstanding
    any section of the Revised Code that authorizes the suspension of the imposition
    or execution of a sentence or the placement of an offender in any treatment program
    in lieu of being imprisoned or serving a jail term, no court, except as specifically
    authorized by division (G)(1) of this section, shall suspend the mandatory jail
    term of three consecutive days required to be imposed by division (G)(1) of this
    section or place an offender who is sentenced pursuant to division (G)(1) of this
    section in any treatment program in lieu of imprisonment until after the offender
    has served the mandatory jail term of three consecutive days required to be imposed
    pursuant to division (G)(1) of this section.

    (6) As used in division (G) of this section:

    (a) "Equivalent offense" has the same meaning as in section 4511.181 of the Revised
    Code.

    (b) "Jail term" and "mandatory jail term" have the same meanings as in section
    2929.01 of the Revised Code.

    (H) Whoever violates section 1547.304 of the Revised Code is guilty of a misdemeanor
    of the fourth degree and also shall be assessed any costs incurred by the state
    or a county, township, municipal corporation, or other political subdivision in
    disposing of an abandoned junk vessel or outboard motor, less any money accruing
    to the state, county, township, municipal corporation, or other political subdivision
    from that disposal.

    (I) Whoever violates division (B) or (C) of section 1547.49 of the Revised Code
    is guilty of a minor misdemeanor.

    (J) Whoever violates section 1547.31 of the Revised Code is guilty of a misdemeanor
    of the fourth degree on a first offense. On each subsequent offense, the person
    is guilty of a misdemeanor of the third degree.

    (K) Whoever violates section 1547.05 or 1547.051 of the Revised Code is guilty
    of a misdemeanor of the fourth degree if the violation is not related to a collision,
    injury to a person, or damage to property and a misdemeanor of the third degree
    if the violation is related to a collision, injury to a person, or damage to property.

    (L) The sentencing court, in addition to the penalty provided under this section
    for a violation of this chapter or a rule that involves a powercraft powered by
    more than ten horsepower and that, in the opinion of the court, involves a threat
    to the safety of persons or property, shall order the offender to complete successfully
    a boating course approved by the national association of state boating law administrators
    before the offender is allowed to operate a powercraft powered by more than ten
    horsepower on the waters in this state. Violation of a court order entered under
    this division is punishable as contempt under Chapter 2705. of the Revised Code.'
