- number: '1561.03'
  heading: Chief of division - powers and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: The chief of the division of mineral resources management shall enforce and
    supervise the execution of all laws enacted for the health and safety of persons
    and the protection and conservation of property within, about, or in connection
    with mines, mining, and quarries, and for such purpose shall adopt, publish, and
    enforce necessary rules not inconsistent with the mining laws of this state.
  history: null
