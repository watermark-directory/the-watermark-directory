  chapter:
    num: '1519'
    name: Recreational Trails
  text: 'No person shall violate any rule adopted by the director of natural resources
    under this chapter.

    Every sheriff, deputy sheriff, marshal, deputy marshal, member of the organized
    police department of any municipal corporation, police constable of any township,
    wildlife officer, natural resources officer, conservancy district police officer,
