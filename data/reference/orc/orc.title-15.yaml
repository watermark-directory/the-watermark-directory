- number: '1533.321'
  heading: Multi-year or lifetime hunting and fishing licenses
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) The chief of the division of wildlife may issue any of the following:

    (1) Multi-year hunting or fishing licenses for three-, five-, or ten-year terms
    to a resident of this state;

    (2) Lifetime hunting or fishing licenses to a resident of this state;

    (3) A package consisting of any combination of license, stamp, or permit that
    the chief is authorized to issue under this chapter.

    (B) The chief may adopt rules in accordance with section 1531.10 of the Revised
    Code governing multi-year hunting and fishing licenses, lifetime hunting and fishing
    licenses, and combination packages, including rules establishing fees for the
    combination packages. The chief shall ensure that the price for a combination
    package is not discounted by more than five per cent of the total fees for the
    licenses, permits, or stamps that a person would otherwise pay for those licenses,
    permits, or stamps if the person purchased them individually.

    (C)(1) The multi-year and lifetime license fund is hereby created in the state
    treasury. The fund shall consist of money received from application fees for multi-year
    and lifetime hunting and fishing licenses.

    (2) Each fiscal year, a prorated amount of the money from each multi-year and
    lifetime license fee shall be transferred from the multi-year and lifetime license
    fund to the fund into which the applicable single year license fee would otherwise
    be deposited. The prorated amount shall equal the total amount of the fee charged
    for the license divided by the number of years the license is valid. The chief
    shall adopt rules in accordance with section 1531.10 of the Revised Code for the
    administration of this division, including establishing a system that prorates
    lifetime license fees for deposit each year into the wildlife fund created in
    section 1531.17 of the Revised Code.

    (3) Each fiscal year, all previous year''s investment earnings from the multi-year
    and lifetime license fund shall be transferred into the wildlife fund created
    in section 1531.17 of the Revised Code.

    (D)(1) Each applicant for a multi-year or lifetime fishing license who is a resident
    of this state shall pay a fee for each license in accordance with the following
    schedule:


    Senior 3-year fishing license$26.00Senior 5-year fishing license$43.34Senior lifetime
    fishing license$81.003-year fishing license$69.345-year fishing license$115.5610-year
    fishing license$231.12Lifetime fishing license$576.00Youth lifetime fishing license$414.00

    (2) As used in division (D)(1) of this section:

    (a) "Youth" means an applicant who is under the age of sixteen years at the time
    of application for a license.

    (b) "Senior" means an applicant who is sixty-five years of age or older at the
    time of application for a license.

    (E)(1) Each applicant for a multi-year or lifetime hunting license who is a resident
    of this state shall pay a fee for each license in accordance with the following
    schedule:


    Senior 3-year hunting license$26.00Senior 5-year hunting license$43.34Senior lifetime
    hunting license$81.00Youth 3-year hunting license$26.00Youth 5-year hunting license$43.34Youth
    10-year hunting license$86.67Youth lifetime hunting license$414.003-year hunting
    license$52.005-year hunting license$86.6710-year hunting license$173.34Lifetime
    hunting license$432.00

    (2) As used in division (E)(1) of this section:

    (a) "Youth" means an applicant who is under the age of eighteen years at the time
    of application for a license.

    (b) "Senior" means an applicant who is sixty-five years of age or older at the
    time of application for a license.

    (F) If a person who is issued a multi-year hunting or fishing license or lifetime
    hunting or fishing license in accordance with division (A) of this section subsequently
    becomes a nonresident after issuance of the license, the person''s license remains
    valid in this state during its term, regardless of residency status.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.321
- number: '1533.322'
  heading: Exemption from fishing license requirement
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Any person who is duly licensed by any state, district, country, or sovereignty
    other than this state to take or catch fish by angling shall be exempt from the
    provisions of sections 1533.32 and 1533.99 of the Revised Code, provided such
    person has complied with the law in regard to taking or catching fish by angling
    in the state, district, country, or sovereignty where he is licensed and complies
    with such law while taking or catching fish by angling in this state. Such exemption
    shall be operative only if the law of such other state, district, country, or
    sovereignty makes substantially like and equal exemptions to persons duly licensed
    by this state to take or catch fish by angling.

    Reciprocal agreements between this and any other state, district, country, or
    sovereignty necessary to administer this section shall be made as provided in
    section 1533.323 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.322
- number: '1533.323'
  heading: Reciprocity
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The attorney general, the chief of the division of wildlife and the director
    of natural resources may enter into any reciprocal contracts and agreements with
    the proper authorities of other states as are proper and expedient to regulate
    the taking or catching of fish by angling in any of the waters of this state and
    the taking and hunting of game of this state by residents of such other states
    who are licensed under the law thereof.

    Said state officials may also confer and advise with the proper officers and legislative
    bodies of this and other states, and the District of Columbia, for the purpose
    of promoting reciprocal agreements under which hunting and fishing licenses issued
    to residents of this state shall be recognized by such other states and federal
    districts.'
