- number: '1547.05'
  heading: Completing boating course as prerequisite to licensing; exception
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Except as provided in division (B) of this section, no person born on
    or after January 1, 1982, shall operate on the waters in this state a powercraft
    powered by more than ten horsepower, unless the operator successfully has completed
    either a safe boater course approved by the national association of state boating
    law administrators or a proctored or nonproctored proficiency examination that
    tests knowledge of information included in the curriculum of such a course, and
    has received a certificate as evidence of successful completion of the course
    or examination.

    (B) Division (A) of this section does not apply to an individual who possesses
    valid merchant mariner credentials issued by the United States coast guard in
    accordance with 46 C.F.R. 10.109 with at least one endorsement of master or operator
    as defined in 46 C.F.R. 10.107. Such an individual, while operating any recreational
    vessel on the waters in this state, shall carry onboard documentation of the merchant
    mariner credentials and required endorsements and shall present the documentation
    to a natural resources officer or law enforcement officer upon request.

    (C) No person shall permit a powercraft to be operated on the waters in this state
    in violation of division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.05
- number: '1547.051'
  heading: Presenting proof of license
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: A person born on or after January 1, 1982, who is operating on the waters
    in this state a powercraft powered by more than ten horsepower and who is stopped
    by a law enforcement officer in the enforcement of Chapter 1547. of the Revised
    Code or rules shall present to the law enforcement officer, not later than seventy-two
    hours after being stopped, a certificate obtained by the person pursuant to section
    1547.05 of the Revised Code prior to being stopped or proof of holding such a
    certificate. Failure of the person to present the certificate or proof of holding
    it within seventy-two hours constitutes prima-facie evidence of a violation of
    section 1547.05 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.051
- number: '1547.052'
  heading: Powercraft rentals
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) No rental business shall lease, hire, or rent a powercraft powered by
    more than ten horsepower for operation on the waters in this state to a person
    born on or after January 1, 1982, unless the person meets one of the following
    requirements:

    (1) The person signs a statement on the rental agreement or attached to the rental
    agreement that the person has successfully completed a safe boater course approved
    by the national association of state boating law administrators or has successfully
    completed a proficiency examination as provided in section 1547.05 of the Revised
    Code.

    (2) The person receives educational materials from the rental business and successfully
    passes, with a score of ninety per cent or better, an abbreviated examination
    given by the rental business. The achievement of a passing score on the examination
    shall be indicated on or attached to the powercraft rental agreement.

    (B) Any person born on or after January 1, 1982, operating or supervising the
    operation of a leased, hired, or rented powercraft shall:

    (1) Meet the requirements for boater education of division (A) of this section.

    (2) Be named as an operator on the agreement that leases, hires, or rents the
    powercraft.

    (C) The division of parks and watercraft shall make available to all watercraft
    rental businesses in Ohio boater safety educational materials and an abbreviated
    examination that shall be used by the watercraft rental business for the purposes
    of division (A)(2) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.052
- number: '1547.06'
  heading: Child operators
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Except as otherwise provided in this division, no person under sixteen
    years of age shall operate a personal watercraft on the waters in this state.
    A person who is not less than twelve, nor more than fifteen years of age may operate
    a personal watercraft if a supervising person eighteen years of age or older is
    aboard the personal watercraft and, in the case of a supervising person born on
    or after January 1, 1982, if the supervising person holds a certificate obtained
    under section 1547.05 of the Revised Code or, in the case of a rented powercraft,
    meets the requirements of section 1547.052 of the Revised Code.

    (B) No person under twelve years of age shall operate any vessel on the waters
    in this state unless the person is under the direct visual and audible supervision,
    during the operation, of a person who is eighteen years of age or older. This
    division does not apply to a personal watercraft, which shall be governed by division
    (A) of this section, or to a powercraft, other than a personal watercraft, powered
    by more than ten horsepower, which shall be governed by division (C) of this section.

    (C) No person under twelve years of age shall operate on the waters in this state
    a powercraft, other than a personal watercraft, powered by more than ten horsepower
    unless the person is under the direct visual and audible supervision, during the
    operation, of a person eighteen years of age or older who is aboard the powercraft
    and, in the case of such a supervising person born on or after January 1, 1982,
    who holds a certificate obtained under section 1547.05 of the Revised Code or,
    in the case of a rented powercraft, meets the requirements of section 1547.052
    of the Revised Code.

    (D) No supervising person eighteen years of age or older shall permit any person
    who is under the supervising person''s supervision and who is operating a vessel
    on the waters in this state to violate any section of this chapter or a rule.'
  history: null
