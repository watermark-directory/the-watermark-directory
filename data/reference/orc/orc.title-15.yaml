- number: '1521.10'
  heading: Landowner to submit plans
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: In order to be entitled to the compensation provided for in section 1521.09
    of the Revised Code, the landowner shall have prepared and submit to the division
    of water resources complete plans for the dam provided for in such section. The
    plans shall have the approval of the chief of the division of water resources
    and the dam shall be constructed in accordance with such plans before compensation
