  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.081
- number: '1545.09'
  heading: Bylaws and rules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) The board of park commissioners shall adopt such bylaws and rules as
    the board considers advisable for the preservation of good order within and adjacent
    to parks and reservations of land, and for the protection and preservation of
    the parks, parkways, and other reservations of land under its jurisdiction and
    control and of property and natural life therein. The board shall also adopt bylaws
    or rules establishing a procedure for contracting for professional, technical,
    consulting, and other special services. Any competitive bidding procedures of
    the board do not apply to the purchase of benefits for park district officers
    or employees when such benefits are provided through a health and welfare trust
    fund administered through or in conjunction with a collective bargaining representative
    of the park district employees, as authorized in section 1545.071 of the Revised
    Code. Summaries of the bylaws and rules shall be published in a newspaper of general
    circulation within the park district, once a week for two consecutive weeks or
    as provided in section 7.16 of the Revised Code, before taking effect.

    (B)(1) As used in division (B)(2) of this section, "similar violation under state
    law" means a violation of any section of the Revised Code, other than division
    (C) of this section, that is similar to a violation of a bylaw or rule adopted
    under division (A) of this section.

    (2) The board of park commissioners may adopt by bylaw a penalty for a violation
    of any bylaw or rule adopted under division (A) of this section, and any penalty
    so adopted shall not exceed in severity whichever of the following is applicable:

    (a) The penalty designated under the Revised Code for a violation of the state
    law that is similar to the bylaw or rule for which the board adopted the penalty;

    (b) For a violation of a bylaw or rule adopted under division (A) of this section
    for which the similar violation under state law does not bear a penalty or for
    which there is no similar violation under state law, a fine of not more than one
    hundred fifty dollars for a first offense and not more than one thousand dollars
    for each subsequent offense.

    (3) A summary of any bylaw adopted under division (B)(2) of this section shall
    be published as provided in the case of ordinances of municipal corporations under
    section 731.21 of the Revised Code before taking effect.

    (C) No person shall violate any bylaws or rules adopted under division (A) of
    this section. All fines collected for any violation of this section shall be paid
    into the treasury of such park board.'
