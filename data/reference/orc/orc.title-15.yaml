- number: '1531.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: '(A) Whoever violates section 1531.02 of the Revised Code, or any division
    rule, other than a rule adopted under section 1531.25 of the Revised Code, is
    guilty of a misdemeanor of the fourth degree.

    (B) Whoever violates section 1531.02 of the Revised Code concerning the taking
    or possession of deer or violates division (K) of section 1531.06 or section 1531.07
    or 1531.29 of the Revised Code is guilty of a misdemeanor of the third degree
    on a first offense; on each subsequent offense, that person is guilty of a misdemeanor
    of the first degree.

    (C) Whoever violates section 1531.25 of the Revised Code is guilty of a misdemeanor
    of the first degree.

    (D) Whoever violates section 1531.02 of the Revised Code concerning the buying,
    selling, or offering for sale of any wild animals or parts of wild animals, the
    minimum value of which animals or parts, in the aggregate, is one thousand dollars
    or more as established under section 1531.201 of the Revised Code, is guilty of
    a felony of the fifth degree.

    (E) A court that imposes sentence for a violation of any section of this chapter
    governing the holding, taking, buying, selling, or possession of wild animals,
    including, without limitation, section 1531.11 of the Revised Code, may require
    the person who is convicted of or pleads guilty to the offense, in addition to
    any fine, term of imprisonment, seizure, and forfeiture imposed, to make restitution
    for the minimum value of the wild animal illegally held, taken, bought, sold,
    or possessed as established under section 1531.201 of the Revised Code. An officer
    who collects moneys paid as restitution under this section shall pay those moneys
    to the treasurer of state who shall deposit them in the state treasury to the
    credit of the wildlife fund established under section 1531.17 of the Revised Code.'
