- number: '1506.05'
  heading: Promoting public access to Lake Erie
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: The director of natural resources shall prepare and maintain a current inventory
    of public access facilities and areas for the Ohio shoreline of Lake Erie, including,
    without limitation, shoreline parks, cultural resources, natural areas, wildlife
    refuges, harbors of refuge, boat launch ramps, shoreline fishing areas, and beaches.
    No later than December 31, 1994, the director shall evaluate public access to
    Lake Erie and may prepare and publish plans and policy recommendations as necessary
    for enhancing public access to Lake Erie. The director shall update any plans
    and policy recommendations at least once every five years. Every state agency
    and political subdivision, upon the director's request, shall cooperate with the
    director and furnish information for the public access inventory and any public
    access plans.
