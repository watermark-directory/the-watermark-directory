  url: https://codes.ohio.gov/ohio-revised-code/section-1571.16
- number: '1571.17'
  heading: Appropriation of private property
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: Any corporation organized under the laws of Ohio for the purpose of transporting,
    selling, or storing gas may appropriate for use in connection with the establishment,
    operation or protection of a gas storage reservoir, whether located entirely or
    in part in a coal bearing township or elsewhere, any private property or interest
    therein as is necessary for the establishment, operation or protection of such
    reservoir. The right to appropriate granted in this section shall be exercised
    in accordance with the law prescribing how appropriation of private property by
    corporations shall be made. A corporation instituting a proceeding to appropriate
    property for use in connection with a reservoir as in this section authorized,
    shall at such time own the right to store gas under at least sixty-five percent
    of the area of the surface of the earth under which such reservoir extends.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1571.17
- number: '1571.18'
  heading: Gas storage well regulatory fee
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: 'After June 30, 2010, and not later than the thirty-first day of March each
    year, the owner of a well that is used for gas storage or of a well that is used
    to monitor a gas storage reservoir and that is located in a reservoir protective
    area shall pay to the chief of the division of oil and gas resources management
    a gas storage well regulatory fee of one hundred twenty-five dollars for each
    well that the owner owned as of the thirty-first day of December of the previous
    year for the purposes of administering this chapter and Chapter 1509. of the Revised
    Code. The chief may prescribe and provide a form for the collection of the fee
    imposed by this section and may adopt rules in accordance with Chapter 119. of
    the Revised Code that are necessary for the administration of this section.

    All money collected under this section shall be deposited in the state treasury
    to the credit of the oil and gas well fund created in section 1509.02 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1571.18
- number: '1571.30'
  heading: Class VI injection wells
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) As used in this section, "class VI injection well" means a well used
    to inject carbon dioxide into deep rock formations for geologic sequestration.

    (B) Not later than ninety days after the effective date of this section, the department
    of natural resources shall initiate a process to work with the United States environmental
    protection agency and the United States department of energy to develop a statewide
    underground injection control program for class VI injection wells in order to
    obtain primary enforcement authority over those wells in this state from the United
    States environmental protection agency.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1571.30
- number: '1571.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: Any person who purposely violates any order of the chief of the division of
    oil and gas resources management, of a hearing officer appointed by the director
    of natural resources under section 1571.14 of the Revised Code, or of the director,
    made pursuant to this chapter shall be punished by a fine not exceeding two thousand
    dollars, or imprisoned in jail for a period not exceeding twelve months, or both,
    in the discretion of the court.
