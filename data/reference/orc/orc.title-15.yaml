- number: '1533.631'
  heading: Permit for handling fish at wholesale
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Any person may apply for a permit to handle commercial fish, or other fish
    that may be bought or sold under the Revised Code or division rule, at wholesale.
    Prior to making application for such a permit, a person first shall satisfy the
    following qualifications to the satisfaction of the chief of the division of wildlife:
    over eighteen years of age, no prior conviction of or plea of guilty on or after
    October 10, 2007, to a disqualifying offense as determined in accordance with
    section 9.79 of the Revised Code, and ninety days Ohio residency immediately preceding
    application. The chief shall issue an annual permit granting the applicant the
    privilege to handle such fish at wholesale at one or more designated premises
    upon satisfaction of the pre-application qualifications, filing of an application
    on a form prescribed by the chief, and payment of a fee of sixty-five dollars.
    No person or a person''s agent shall handle at wholesale any fresh water fish
    or part thereof unless a permit has been issued for the calendar year in which
    the fish is handled at wholesale for the premises at which the fish is handled.

    A fish is handled at wholesale for purposes of this section when it is on a premises
    within the state and is being held, stored, handled, or processed for the purpose
    of sale to a person who resells the fish.

    The permit required by this section shall be issued subject to the right of entry
    and inspection of the designated premises of the permittee by any law enforcement
    officer authorized by section 1531.13 of the Revised Code to enforce the laws
    and rules of the division of wildlife. Such an officer may enter and inspect the
    designated premises and any box, package, or receptacle, and the contents thereof,
    for the purpose of determining whether any provision of this chapter or Chapter
    1531. of the Revised Code or division rule is being violated.

    No person holding a permit under this section shall remove a label required by
    section 1533.301 of the Revised Code unless the box, package, or receptacle bearing
    the label has been opened or unless the label is replaced with another label that
    meets the requirements of that section.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant to it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.631
- number: '1533.632'
  heading: Regulation of aquaculture - permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) As used in this section:

    (1) "Aquaculture" means a form of agriculture that involves the propagation and
    rearing of aquatic species in controlled environments under private control, including,
    but not limited to, for the purpose of sale for consumption as food.

    (2) "Aquaculture species" means any aquatic species that may be raised through
    aquaculture that is either a class A aquaculture species or a class B aquaculture
    species.

    (3) "Class A aquaculture species" includes any species designated as such by the
    chief of the division of wildlife in rules adopted under division (B) of this
    section.

    (4) "Class B aquaculture species" includes any species, except for class A aquaculture
    species, designated as such by the chief in rules adopted under division (B) of
    this section.

    (5) "Aquaculture production facility" means a facility that has suitable infrastructure
    and equipment, as determined by the chief, and that is solely dedicated to the
    propagation and rearing of an aquaculture species.

    (6) "Suitable infrastructure" includes ponds, raceways, and tanks.

    (B) The chief, in accordance with Chapter 119. of the Revised Code, shall adopt
    rules for the regulation of aquaculture and may issue permits to persons wishing
    to engage in aquaculture for the production of aquaculture species. Rules adopted
    under this section shall ensure the protection and preservation of the wildlife
    and natural resources of this state. The legal length and weight limitations established
    under section 1533.63 of the Revised Code do not apply to class A or class B aquaculture
    species.

    A permit may be issued upon application to any person who satisfies the chief
    that the person owns or leases an aquaculture production facility. Each permit
    shall be in such form as the chief prescribes. The permits shall be classified
    as either class A or class B. A class A permit shall be required for all class
    A aquaculture species that are designated by rule as a class A aquaculture species.
    Class B permits shall be issued on a case-by-case basis. In determining whether
    to issue a class B permit, the chief shall take into account the species for which
    the class B permit is requested, the location of the aquaculture production facility,
    and any other information determined by the chief to be necessary to protect the
    wildlife and natural resources of this state. The annual fee for a class A permit
    shall be fifty dollars unless otherwise provided by rule by the chief. The annual
    fee for a class B permit shall be set by the chief at a level between one hundred
    and five hundred dollars. In determining the fee to be charged for a class B permit,
    the chief shall take into account the additional costs to the division for the
    inspection of aquaculture facilities used to raise a given class B aquaculture
    species.

    The chief may revoke a permit upon a determination that the person to whom the
    permit was issued has violated any rule adopted under this section. The permit
    shall be reissued upon a showing by the person that the person is in compliance
    with the rules adopted under this section. A holder of an aquaculture permit may
    receive a permit issued under section 1533.301 or 1533.40 of the Revised Code
    without payment of the fee for that permit if the conditions for the issuance
    of the permit have been met.

    (C) No person shall knowingly sell any aquatic species under an aquaculture permit
    issued under this section that was not raised in an aquaculture production facility.
    In addition to any other penalties prescribed for violation of this division,
    the chief may revoke the permit of any person convicted of a violation of this
    division for any period of time the chief considers necessary.

    (D) No person who does not hold a current valid aquaculture permit shall knowingly
    sell an aquaculture species while claiming to possess an aquaculture permit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.632
- number: '1533.64'
  heading: Property rights in fish
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Fish lawfully confined in a net, or by a device authorized by law, are the
    property of the owner or person operating the net or other device. No person other
    than the owner or person in control of the net or other device shall take or catch
    from it or possess a fish that is or has been so confined unless the person so
    taking, catching, or possessing the fish has been authorized in writing to do
    so by the owner or person in control of the net or other device. Each fish taken
    from and each fish had in possession that was taken from any net or other device
    legally operated in any of the waters of this state by any person other than the
    owner or the owner''s agent operating the net or other device constitutes a separate
    offense.

    No person shall fail to comply with this section or a division rule adopted pursuant
    thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.64
- number: '1533.641'
  heading: Commercial licenses revoked on felony conviction
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) If a person is convicted of or pleads guilty on or after the effective
    date of this section to a felony related to commercial fishing activities for
    a violation of state or federal law, all commercial fishing licenses issued under
    section 1533.35 of the Revised Code and all permits to handle commercial fish
    or other fish at wholesale issued under section 1533.631 of the Revised Code to
    that person are permanently revoked by operation of law.

    (B)(1) If a commercial fishing licensee, such a licensee''s authorized representative,
    a person that has been issued a permit under section 1533.631 of the Revised Code
    to handle commercial fish or other fish at wholesale, or such a permittee''s authorized
    representative is convicted of or pleads guilty to a violation of section 1533.341,
    1533.343, 1533.41, 1533.42, 1533.62, 1533.63, 1533.631, or 1533.64 of the Revised
    Code or any division rule pertaining to those sections, the licensee''s license
    or the permittee''s permit, as applicable, shall be suspended for a period of
    thirty fishing season days. Not later than seven days after receipt of a notification
    under division (F) of this section, the chief of the division of wildlife shall
    suspend the license or permit.

    (2) If a person is convicted of or pleads guilty to a second violation of a section
    of the Revised Code that is listed in division (B)(1) of this section or any division
    rule pertaining to those sections within ten years after being convicted of or
    pleading guilty to the first violation, the applicable licensee''s license or
    permittee''s permit shall be suspended for a period of sixty fishing season days.
    Not later than seven days after receipt of a notification under division (F) of
    this section, the chief shall suspend the license or permit.

    (3) If a person is convicted of or pleads guilty to a third violation of a section
    of the Revised Code that is listed in division (B)(1) of this section or any division
    rule pertaining to those sections within ten years after being convicted of or
    pleading guilty to the first violation, the applicable licensee''s license or
    permittee''s permit shall be permanently revoked. Not later than seven days after
    receipt of a notification under division (F) of this section, the chief shall
    revoke the license or permit.

    (C) During any period of suspension of a license or permit under this section,
    no person shall use or engage in fishing with commercial gear, or in handling
    commercial fish or other fish at wholesale with equipment, owned, used, or controlled
    at the time of conviction or plea by the licensee or the licensee''s authorized
    representative or by the permittee or the permittee''s authorized representative,
    as applicable.

    (D) A person whose license has been suspended by operation of law pursuant to
    any provision of this chapter or Chapter 1531. of the Revised Code or division
    rule is not eligible to apply for or receive a new commercial fishing license
    issued under section 1533.35 of the Revised Code or a permit to handle commercial
    fish or other fish at wholesale issued under section 1533.631 of the Revised Code
    during the period of the suspension.

    (E) For purposes of determining a license or permit suspension or revocation for
    a violation of section 1533.63 of the Revised Code, multiple convictions resulting
    from violations of that section that occurred at the same time, on the same day,
    and at the same location are deemed to be a single conviction of one violation.

    (F) The clerk of the court before which a person is convicted of or pleads guilty
    to a violation of state or federal law as described in division (A) of this section
    or a section of the Revised Code that is listed in division (B)(1) of this section
    or any division rule pertaining to those sections shall send written notification
    to the chief of the conviction or plea together with the person''s name and address
    not later than ten days after the date of conviction or plea.'
