- number: '1531.202'
  heading: Liability for costs incurred in investigation of death of wild animal
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: Any person who is responsible for causing or allowing an unauthorized spill,
    release, or discharge of material into or on any land or any ground or surface
    water or into the air that results in the death of a wild animal and that necessitates
    an investigation by the division of wildlife, or who violates section 1531.02
    of the Revised Code in a manner that necessitates an investigation by the division
    regarding the death of a wild animal, is liable to the division for costs incurred
    in the investigation if the person pleads guilty to or is convicted of causing
    or allowing the unauthorized spill, release, or discharge or a violation of section
    1531.02 of the Revised Code. The costs may include wages and benefits of employees
    of the division. The chief of the division of wildlife or the chief's authorized
    representative shall bring a civil action against the responsible person to recover
    those costs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.202
- number: '1531.21'
  heading: Trial procedure for forfeiture or condemnation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: The defendant in a proceeding for forfeiture or condemnation under a division
    rule or this chapter or Chapter 1533. of the Revised Code shall be tried under
    the Rules of Criminal Procedure and according to law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.21
- number: '1531.22'
  heading: Payment of costs
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: A person authorized by law to prosecute a case under a division rule or this
    chapter or Chapter 1533. of the Revised Code shall not be required to advance
    or secure costs therein. If the defendant is acquitted or discharged from custody,
    the costs shall be certified under oath by the court to the chief of the division
    of wildlife, who shall correct all errors therein and pay the person entitled
    to payment out of the wildlife fund created in section 1531.17 of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.22
- number: '1531.23'
  heading: Judgment for costs and fine or forfeiture - lien - failure to pay
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: If the defendant in a prosecution or condemnation proceeding under a division
    rule or this chapter or Chapter 1533. of the Revised Code is convicted, judgment
    shall be rendered against him for costs in addition to the fine imposed or forfeiture
    declared. The judgment shall be the first lien upon the property of the person
    convicted, and no exemption shall be claimed or allowed against that lien. If
    he fails to pay the fine and costs imposed or if execution issued is returned
    unsatisfied, the person convicted shall be committed to the county jail or to
    a workhouse and there confined one day for the amount of the fine adjudged against
    him, determined as provided in section 2747.14 of the Revised Code. The person
    convicted shall not be discharged or paroled therefrom by any board or officer
    except upon payment of the fine remaining unpaid or upon written permission of
    the chief of the division of wildlife.
