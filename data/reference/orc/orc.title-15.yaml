    name: Division Of Natural Areas And Preserves
  text: '(A) The chief of the division of natural areas and preserves may accept and
    administer state and federal financial assistance for the maintenance, protection,
    and administration of wild, scenic, and recreational rivers and scenic river lands
    and for construction of facilities on publicly owned lands that are administered
    by the division and are within the watersheds of those rivers.

    The chief, with the approval of the director of natural resources, may expend
    for the purpose of administering the state programs for wild, scenic, and recreational
    rivers money that is:

    (1) Appropriated by the general assembly for that purpose;

    (2) In the scenic rivers protection fund created in section 4501.24 of the Revised
    Code;

    (3) In the natural areas and preserves fund created in section 1517.11 of the
    Revised Code;

    (4) In the waterways safety fund created in section 1547.75 of the Revised Code,
    including money generated by the waterways conservation assessment fee levied
    by sections 1547.54 and 1547.542 of the Revised Code, as determined to be necessary
    by the division of parks and watercraft and the division of natural areas and
    preserves not to exceed six hundred fifty thousand dollars per fiscal year.

    (B) Any instrument by which real property is acquired pursuant to this section
    shall identify the agency of the state that has the use and benefit of the real
    property as specified in section 5301.012 of the Revised Code.

    (C) Notwithstanding any provision of this section to the contrary, any expenditures
    made pursuant to this section shall be made only on lands, or portions thereof,
    owned by the department of natural resources and administered by the division
    of natural areas and preserves or on other lands when agreed to, in writing, by
    the owner of the lands within the watershed of the wild, scenic, or recreational
    river, or portion thereof.'
  history: null
