- number: '1519.05'
  heading: Clean Ohio trail fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1519'
    name: Recreational Trails
  text: '(A) As used in this section, "local political subdivision" and "nonprofit
    organization" have the same meanings as in section 164.20 of the Revised Code.

    (B) There is hereby created in the state treasury the clean Ohio trail fund. Twelve
    and one-half per cent of the net proceeds of obligations issued and sold pursuant
    to sections 151.01 and 151.09 of the Revised Code shall be deposited into the
    fund.

    Investment earnings of the fund shall be credited to the fund and may be used
    to pay costs incurred by the director of natural resources in administering this
    section.

    Money in the clean Ohio trail fund shall not be used for the appropriation of
    land, rights, rights-of-way, franchises, easements, or other property through
    the exercise of the right of eminent domain.

    The director shall use moneys in the fund exclusively to provide matching grants
    to nonprofit organizations and to local political subdivisions for the purposes
    of purchasing land or interests in land for recreational trails and for the construction
    of such trails. A matching grant may provide up to seventy-five per cent of the
    cost of a recreational trail project, and the recipient of the matching grant
    shall provide not less than twenty-five per cent of that cost.

    (C) The director shall establish policies for the purposes of this section. The
    policies shall establish all of the following:

    (1) Procedures for providing matching grants to nonprofit organizations and local
    political subdivisions for the purposes of purchasing land or interests in land
    for recreational trails and for the construction of such trails, including, without
    limitation, procedures for both of the following:

    (a) Developing a grant application form and soliciting, accepting, and approving
    grant applications;

    (b) Participation by nonprofit organizations and local political subdivisions
    in the application process.

    (2) A requirement that an application for a matching grant for a recreational
    trail project include a copy of a resolution supporting the project from each
    county in which the proposed project is to be conducted and whichever of the following
    is applicable:

    (a) If the proposed project is to be conducted wholly within the geographical
    boundaries of one township, a copy of a resolution supporting the project from
    the township;

    (b) If the proposed project is to be conducted wholly within the geographical
    boundaries of one municipal corporation, a copy of a resolution supporting the
    project from the municipal corporation;

    (c) If the proposed project is to be conducted in more than one, but fewer than
    five townships or municipal corporations, a copy of a resolution supporting the
    project from at least one-half of the total number of townships and municipal
    corporations in which the proposed project is to be conducted;

    (d) If the proposed project is to be conducted in five or more municipal corporations,
    a copy of a resolution supporting the project from at least three-fifths of the
    total number of townships and municipal corporations in which the proposed project
    is to be conducted.

    (3) Eligibility criteria that must be satisfied by an applicant in order to receive
    a matching grant and that emphasize the following:

    (a) Synchronization with the statewide trail plan;

    (b) Complete regional systems and links to the statewide trail system;

    (c) A combination of funds from various state agencies;

    (d) The provision of links in urban areas that support commuter access and show
    economic impact on local communities;

    (e) The linkage of population centers with public outdoor recreation areas and
    facilities;

    (f) The purchase of rail lines that are linked to the statewide trail plan;

    (g) The preservation of natural corridors.

    (4) Items of value, such as in-kind contributions of land, easements or other
    interests in land, labor, or materials, that may be considered as contributing
    toward the percentage of the cost of a recreational trails project that must be
    provided by a matching grant recipient.'
