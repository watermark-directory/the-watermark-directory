    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.82
- number: '1533.83'
  heading: Shooting range definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'As used in sections 1533.83 to 1533.85 of the Revised Code:

    (A) "Political subdivision" means a municipal corporation, township, county, or
    other body corporate and politic responsible for governmental activities in a
    geographic area smaller than that of the state.

    (B) "Shooting range" means a facility operated for the purpose of shooting with
    firearms or archery equipment, whether publicly or privately owned and whether
    or not operated for profit, including, but not limited to, commercial bird shooting
    preserves and wild animal hunting preserves established pursuant to this chapter.
    "Shooting range" does not include a facility owned or operated by a municipal
    corporation, county, township police district, or joint police district.

    (C) "Harm" means injury, death, or loss to person or property.

    (D) "The chief''s noise rules" means the rules of the chief of the division of
    wildlife that are adopted pursuant to section 1533.84 of the Revised Code and
    that pertain to the limitation or suppression of noise at a shooting range or
    to the hours of operation of shooting ranges.

    (E) "The chief''s public safety rules" means the rules of the chief of the division
    of wildlife that are adopted pursuant to section 1533.84 of the Revised Code and
    that pertain to public safety, including standards for the reconstruction, enlargement,
    remodeling, or repair of any structure or facility that is part of a shooting
    range.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.83
- number: '1533.84'
  heading: Shooting range standards
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The chief of the division of wildlife, in accordance with section 1531.10
    of the Revised Code, shall adopt rules establishing generally accepted standards
    for shooting ranges. These rules shall be no more stringent than national rifle
    association standards, and include standards for the limitation and suppression
    of noise, standards for the hours of operation of shooting ranges of the various
    types and at the various locations of ranges, and standards for public safety.
    The rules may include standards for the reconstruction, enlargement, remodeling,
    or repair of any structure or facility that is part of a shooting range provided
    that any local laws creating standards for the reconstruction, enlargement, remodeling,
    or repair of structures or facilities that apply generally to all structures or
    facilities and not exclusively or primarily to shooting ranges also shall apply
    to shooting ranges. Nothing in this section limits the authority of a county or
    township board of zoning appeals to issue or deny conditional zoning certificates
    for the reconstruction, enlargement, remodeling, or repair of an existing shooting
    range pursuant to division (C) of section 303.14 or division (C) of section 519.14
    of the Revised Code or the authority of a board of county commissioners or board
    of township trustees relating to the completion, restoration, reconstruction,
    extension, or substitution of nonconforming uses pursuant to section 303.19 or
    519.19 of the Revised Code. At the time of its establishment, a shooting range
    shall comply with all existing local ordinances, regulations, or laws.

    The chief of the division of wildlife shall consult with a representative sample
    of persons and organizations that own, operate, or use shooting ranges and persons
    and organizations that represent counties, townships, municipal corporations,
    and holders of real property adjoining shooting ranges prior to filing or amending
    the rules required or authorized under this section in accordance with section
    1531.10 of the Revised Code. A draft copy of the chief''s proposed rules or any
    subsequent amendments to the rules shall be submitted to representatives of the
    above-listed organizations, who shall be given thirty days to review and submit
    written comments on the draft rules to the chief. The chief shall consider but
    not be bound by the written comments and, after giving due regard to the public
    interests, shall file the initial rules in accordance with section 1531.10 of
    the Revised Code within one hundred eighty days after the effective date of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.84
- number: '1533.85'
  heading: Immunity in civil action concerning shooting range noise
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A)(1) The owner, operator, or user of a shooting range is not liable in
    damages in a civil action to any person for harm that allegedly is caused by the
    creation of noise at the shooting range or the failure to limit or suppress noise
    at the shooting range if the owner, operator, or user substantially complies with
    the chief''s noise rules.

    (2)(a) Division (A) of this section does not create a new cause of action or substantive
    legal right against an owner, operator, or user of a shooting range.

    (b) Division (A) of this section does not affect any immunities from or defenses
    to civil liability established by other sections of the Revised Code or available
    at common law to which the owner, operator, or user of a shooting range may be
    entitled.

    (c) Division (A) of this section shall apply only to harm that occurs on or after
    the effective date of this section.

    (d) Division (A) of this section does not confer an immunity from civil liability
    in relation to an owner''s, operator''s, or user''s actions or omissions that
    constitute negligence, willful or wanton misconduct, or intentionally tortious
    conduct if those actions or omissions are not the subject of the chief''s noise
    rules or are not in substantial compliance with the chief''s noise rules.

    (B) The owner, operator, or user of a shooting range is not subject to criminal
    prosecution under any section of the Revised Code, or under any ordinance, resolution,
    or regulation of a political subdivision, that relates to the creation, limitation,
    or suppression of noise if the conduct of the owner, operator, or user that allegedly
    violates the section, ordinance, resolution, or regulation substantially complies
    with the chief''s noise rules.

    (C) Notwithstanding any contrary provision of law, the courts of common pleas,
    municipal courts, housing divisions of municipal courts, and county courts of
    this state shall not grant injunctive relief under Chapter 3767. or any other
    section of the Revised Code, under an ordinance, resolution, or regulation of
    a political subdivision, or under the common law of this state against the owner
    or operator of a shooting range in a nuisance action if the court determines that
    the owner''s or operator''s actions or omissions that are the subject of a complaint
    substantially complied with the chief''s noise rules or the chief''s public safety
    rules, whichever apply to the nuisance action.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.85
- number: '1533.86'
  heading: Ohio ginseng management program definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'As used in sections 1533.86 to 1533.90 of the Revised Code:

    (A) "Ginseng" means the plant Panax quinquefolius L., also known as Panax quinquefolium
    L., commonly known as American ginseng.

    (B) "Wild ginseng" means ginseng that grows in an uncultivated state and in its
    natural habitat whether the plant occurs naturally from that habitat or was introduced
    or increased in abundance by sowing ginseng seed or transplanting ginseng plants
    from other areas and performing no other cultivation practices.

    (C) "Cultivated ginseng" means ginseng that grows or has been grown in tilled
    beds under the shade of artificial structures or natural shade and is cultivated
    according to standard ginseng horticultural practices.

    (D) "Harvest" means to cut, pick, dig, root up, gather, or otherwise collect ginseng.

    (E) "Person" includes any legal entity defined as a person under section 6111.01
    of the Revised Code and any political subdivision, instrumentality, or agency
    of another state.

    (F) "Collector" means a person who harvests ginseng.

    (G) "Grower" means a person who grows cultivated ginseng.

    (H) "Dealer" means a person who buys or otherwise acquires or conveys ginseng
    for resale.

    (I) "Buy" includes trade or barter.

    (J) "Sell" includes trade or barter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.86
- number: '1533.87'
  heading: Ohio ginseng management program
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: There is hereby established in the department of natural resources the Ohio
    ginseng management program, which shall be administered by the chief of the division
    of wildlife. The program shall be administered to achieve and maintain a sustained
    yield of ginseng so that harvesting of the plant is not detrimental to the survival
    of the species. The chief shall do all things necessary to regulate the harvesting
    of wild ginseng and the buying, possession, transportation, sale, offering for
    sale, or exposure for sale of wild or cultivated ginseng.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.87
- number: '1533.88'
  heading: Rules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The chief of the division of wildlife shall adopt rules under section 1531.10
    of the Revised Code as necessary to carry out the purposes of sections 1533.86
    to 1533.90 of the Revised Code, including, but not limited to:

    (A) Establishing a harvest season for wild ginseng;

    (B) Establishing a certification program for all legally harvested ginseng, including
    setting a certification fee;

    (C) Establishing a buying season for ginseng that has not yet been certified in
    accordance with rules adopted under division (B) of this section;

    (D) Establishing a registration permit system to authorize ginseng dealers to
    buy or otherwise acquire or convey ginseng for resale and export;

    (E) Establishing a record system to be kept by collectors, dealers, and growers
    of ginseng;

    (F) Developing educational materials about ginseng, ginseng regulation, and the
    Ohio ginseng management program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.88
- number: '1533.881'
  heading: Resale or export registration permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: No person shall buy or otherwise acquire or convey ginseng for resale or export
    without a registration permit issued annually by the chief of the division of
    wildlife in accordance with rules adopted pursuant to section 1533.88 of the Revised
    Code. In addition to any other penalty, the chief may refuse to issue a permit
    to or suspend the permit of any person who fails to comply with sections 1533.86
    to 1533.90 of the Revised Code or rules adopted pursuant to section 1533.88 of
    the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.881
- number: '1533.882'
  heading: Prohibited acts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall do any of the following:

    (A) Without written authorization from the chief of the division of wildlife,
    harvest wild ginseng except during the harvesting season as established by rule
    adopted pursuant to section 1533.88 of the Revised Code;

    (B) Without first obtaining written permission from the person entitled to the
    ginseng, willfully destroy, injure, or harvest ginseng that is the property of
    that person;

    (C) Attempt to harvest ginseng in a manner that, if harvested, would constitute
    a violation of division (A) or (B) of this section;

    (D) Ship or otherwise transport out of state ginseng that has not been certified
    in accordance with rules adopted pursuant to division (B) of section 1533.88 of
    the Revised Code;

    (E) Except during the buying season as established by rule adopted pursuant to
    section 1533.88 of the Revised Code, buy, otherwise acquire, or sell uncertified
    ginseng;

    (F) Fail to keep records as established by rule adopted pursuant to section 1533.88
    of the Revised Code;

    (G) Possess ginseng from another state without a certificate of legal taking issued
    by that state under its ginseng management program;

    (H) Knowingly provide incorrect or false information on or in any permit application,
    report, export certificate, or other document required by rules adopted pursuant
    to section 1533.88 of the Revised Code;

    (I) Violate any provision of sections 1533.86 to 1533.90 of the Revised Code or
    rules adopted pursuant to section 1533.88 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.882
- number: '1533.89'
  heading: Enforcement of statutes and rules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Any sheriff, deputy sheriff, marshal, deputy marshal, municipal police officer,
    township constable, natural resources officer, conservancy district police officer,
    or other law enforcement officer, within the limits of the officer's jurisdiction,
    may enforce sections 1533.86 to 1533.90 of the Revised Code and rules adopted
    pursuant to section 1533.88 of the Revised Code, and any wildlife officer may
    enforce those sections and rules throughout the state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.89
- number: '1533.891'
  heading: Seizure and forfeiture of ginseng
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: The chief of the division of wildlife shall seize any ginseng harvested or
    acquired in violation of any provision of sections 1533.86 to 1533.90 of the Revised
    Code or rules adopted pursuant to section 1533.88 of the Revised Code. Ginseng
    so seized is forfeited to the state, to be disposed of as directed by the chief.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.891
- number: '1533.90'
  heading: Moneys paid into wildlife fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Unless otherwise directed by the director of natural resources, all fees,
    fines, penalties, and forfeitures arising from prosecutions, convictions, confiscations,
    or other actions taken under sections 1533.86 to 1533.90 of the Revised Code shall
    be paid into the state treasury to the credit of the wildlife fund created under
    section 1531.17 of the Revised Code, to be used for the administration of sections
    1533.86 to 1533.90 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.90
- number: '1533.91'
  heading: Nonresident licenses or permits - reciprocal agreements
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: The chief of the division of wildlife, upon approval of the wildlife council
    and the attorney general, may enter into agreements with the appropriate officials
    of one or more states, whereby the chief will issue nonresident fishing licenses,
    hunting licenses, and hunting and fur taker permits to residents of other party
    states for the fees charged Ohio residents, and Ohio residents may obtain nonresident
    licenses in other party states for the fees that are charged residents of those
    states.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.91
- number: '1533.92'
  heading: Tag fishing tournament on public waters - application for permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The chief of the division of wildlife, with the approval of the director
    of natural resources, may issue a permit for the operation of a tag fishing tournament
    on state-administered and other public waters. A permit may be issued to any person
    making application to the chief in accordance with rules adopted under section
    1533.93 of the Revised Code and upon payment of a separate fee established by
    the chief for each tag fishing tournament. Any fee established under this section
    shall not exceed two hundred dollars.

    The chief shall act upon an application within thirty days from its receipt. The
    chief shall notify the applicant of his decision regarding approval or disapproval
    of the application by certified mail, return receipt requested. Failure of the
    chief to act within thirty days shall be deemed to be a denial of the application.
    In any case where an application is denied, the applicant may appeal the decision
    of the chief to the court of common pleas of Franklin county, which shall have
    original, exclusive jurisdiction over such appeals. To perfect such an appeal,
    the applicant shall cause a copy of a notice of appeal to be filed with the court
    of common pleas and with the chief within ten days of the mailing of the chief''s
    notice of denial of the application or within ten days of the expiration of the
    thirty-day period if the chief fails to act. Upon receipt of the notice of appeal,
    the chief shall certify to the court of common pleas a copy of the complete application
    and all documents submitted to him in relation to it. In reviewing the appeal,
    the court is limited to the papers certified to it by the chief and to argument
    of the parties. The court may reverse the chief''s decision only upon clear and
    convincing proof that the license was denied contrary to law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.92
- number: '1533.93'
  heading: Rules for operation of tag fishing tournaments
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: The chief of the division of wildlife, with the approval of the director of
    natural resources, shall adopt, and may amend or rescind, rules in accordance
    with Chapter 119. of the Revised Code related to the operation of tag fishing
    tournaments. The rules shall establish criteria for approval of a permit for the
    operation of a tag fishing tournament under section 1533.92 of the Revised Code
    and may limit the operation of a tag fishing tournament by virtue of such factors
    as the size and dimensions of the body of water where the tournament is proposed
    to be held, the number of participants in the tournament, possible effects that
    the operation of a tournament may have upon state-administered property, public
    waters, the environment, and wildlife, considerations of public safety, and such
    other matters as the chief considers appropriate for the operation of a tag fishing
    tournament.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.93
- number: '1533.94'
  heading: Special conditions on permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: In issuing a permit under section 1533.92 of the Revised Code, the chief of
    the division of wildlife may impose any special conditions upon the operation
    of the proposed tag fishing tournament that the chief considers appropriate and
    necessary for safeguarding state-administered property, public waters, the environment,
    and wildlife and for ensuring public safety.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.94
- number: '1533.95'
  heading: Immunity
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) The department of natural resources is not liable for any death or injury
    to person or property that may result from the operation of a tag fishing tournament
    regardless of whether or not a permit has been issued for the operation of that
    tournament under section 1533.92 of the Revised Code.

    (B) No employee, officer, agent, or official of the department is liable for any
    death or injury to person or property that may result from the operation of a
    tag fishing tournament regardless of whether or not a permit has been issued for
    the operation of that tournament under section 1533.92 of the Revised Code unless
    it is established in an action brought in the court of claims within one year
    after that tournament that the acts of the employee, officer, agent, or official
    giving rise to the death or injury were wanton, willful, and malicious. Within
    six months of the final judgment of the court of claims that the acts of the employee,
    officer, agent, or official giving rise to the death or injury were wanton, willful,
    and malicious, the aggrieved party may file an action for damages in the court
    of common pleas of the county of his residence or where the death or injury occurred.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.95
- number: '1533.96'
  heading: Ineligibility for permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person who has been convicted of or pleaded guilty to a theft or fraud
    offense under the laws of this state, another state, or the United States shall
    be eligible to apply for a permit to operate a tag fishing tournament under section
    1533.92 of the Revised Code.

    (B) No person who has been convicted of or pleaded guilty to any gambling offense
    under the laws of this state, another state, or any political subdivision of this
    state or another state shall be eligible to apply for a permit to operate a tag
    fishing tournament under section 1533.92 of the Revised Code.

    (C) No person who has been convicted of or pleaded guilty to violating section
    1533.97 of the Revised Code shall thereafter be eligible to apply for a permit
    to operate a tag fishing tournament under section 1533.92 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.96
- number: '1533.97'
  heading: Prohibited acts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person shall operate a tag fishing tournament without a permit issued
    by the chief of the division of wildlife under section 1533.92 of the Revised
    Code.

    (B) No person shall operate a tag fishing tournament contrary to any special conditions
    imposed on the tournament by the chief under section 1533.94 of the Revised Code.

    (C) No person shall operate a tag fishing tournament in a manner that violates
    the rules of the chief adopted under section 1533.93 of the Revised Code. Each
    violation of any such rule constitutes a separate violation of this division.

    (D) No person operating a tag fishing tournament in accordance with a permit issued
    by the chief under section 1533.92 of the Revised Code shall charge an entry fee
    per participant in excess of ten per cent of the permit fee established by the
    chief under that section if the permit fee is less than two hundred dollars.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.97
- number: '1533.98'
  heading: Certain tournament not prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Nothing in sections 1533.92 to 1533.97 or section 2915.02 of the Revised Code
    shall be construed as prohibiting a fishing tournament in which a prize is awarded
    by virtue of catching a quantity, size, or weight of fish and not by virtue of
    catching any specifically marked fish.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.98
- number: '1533.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) Whoever violates section 1533.17 of the Revised Code is guilty of a misdemeanor
    of the third degree on a first offense and a misdemeanor of the second degree
    on each subsequent offense. In addition to any other sanction imposed under this
    division, on a second or subsequent offense occurring within a period of three
    consecutive years after the date of conviction of the immediately preceding violation
    of that section any firearms or other hunting implements in the possession or
    under the control of the offender at the time of the violation are subject to
    seizure in accordance with section 1531.20 of the Revised Code. If the offender
    persists in the offense after reasonable warning or request to desist, the offender
    is guilty of a misdemeanor of the second degree.

    (B) Whoever violates section 1533.161, 1533.23, 1533.24, 1533.301, 1533.40, 1533.41,
    1533.45, 1533.48, 1533.511, 1533.55, 1533.56, 1533.58, 1533.62, 1533.631, 1533.66,
    1533.71, 1533.72, 1533.73, 1533.74, 1533.76, 1533.77, or 1533.79, division (J)
    of section 1533.731, or division (B) or (C) of section 1533.97 of the Revised
    Code is guilty of a misdemeanor of the third degree.

    (C) Whoever violates division (B) of section 1533.03, section 1533.07, 1533.171,
    1533.34, 1533.341, 1533.342, 1533.35, 1533.42, 1533.51, 1533.63, 1533.64, 1533.67,
    1533.68, 1533.721, 1533.881, or 1533.882, division (B)(2), (3), or (4) of section
    1533.731, or division (A) of section 1533.97 of the Revised Code is guilty of
    a misdemeanor of the first degree.

    (D) Whoever violates division (D) of section 1533.97 of the Revised Code is guilty
    of a misdemeanor of the fourth degree. The court shall require any person who
    is convicted of or pleads guilty to the offense to refund to all participants
    in the fishing tournament operated by the person any entry fees paid by the participants.

    (E) Whoever violates division (C) or (D) of section 1533.632 of the Revised Code
    is guilty of a felony of the fifth degree.

    (F) Whoever violates any section of this chapter for which no penalty is otherwise
    provided is guilty of a misdemeanor of the fourth degree. This division does not
    apply to division (A) of section 1533.751 of the Revised Code.

    (G) A court that imposes sentence for a violation of any section of this chapter
    governing the holding, taking, or possession of wild animals may require the person
    who is convicted of or pleads guilty to the offense, in addition to any fine,
    term of imprisonment, seizure, and forfeiture imposed, to make restitution for
    the minimum value of the wild animal or animals illegally held, taken, or possessed
    as established under section 1531.201 of the Revised Code. An officer who collects
    moneys paid as restitution under this section shall pay those moneys to the treasurer
    of state who shall deposit them in the state treasury to the credit of the wildlife
    fund established under section 1531.17 of the Revised Code.

    (H) Except as otherwise provided in this division, whoever violates section 1533.75
    of the Revised Code is guilty of a misdemeanor of the first degree. Whoever violates
    that section when the violation involves the importing or releasing of a wild
    boar or feral swine is guilty of a felony of the fifth degree. In addition to
    any other penalty, the court shall require any person who is convicted of or pleads
    guilty to a violation of that section to pay the costs incurred by any state or
    federal agency for the investigation, control, and eradication of wild boar or
    feral swine that resulted from the violation. Money paid to the division of wildlife
    shall be credited to the wildlife fund established under section 1531.17 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.99
- number: '1545.01'
  heading: Park districts created
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: Park districts may be created which include all or a part of the territory
    within a county, and the boundary lines of such district shall be so drawn as
    not to divide any existing township or municipal corporation within such county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.01
- number: '1545.02'
  heading: Application to probate judge
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: Application for the creation of a park district shall be made to the probate
    judge of the county within which the district is to be located. Such application
    shall either be signed by a majority of the electors residing within the proposed
    district as determined by the number of electors voting at the most recent general
    election within such territory, or, in lieu thereof, shall be authorized by resolution
    adopted by the board of county commissioners, any board of township trustees,
    or legislative authority of any municipal corporation within such proposed district.
    Such application shall state the name of the proposed district, shall contain
    an accurate description of the territory to be included, and shall be accompanied
    with an accurate map or plat thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.02
- number: '1545.03'
  heading: Notice and hearing
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: Upon the filing of the application provided for in section 1545.02 of the
    Revised Code, the probate judge shall fix a time for the hearing of such application
    which shall not be less than twenty nor more than forty days subsequent to the
    date of the filing of the application. Such judge shall publish notice of the
    filing of such application and the date of hearing thereof in two newspapers of
    general circulation within such district, or if there is but one newspaper of
    general circulation within such district, in such newspaper. If there is no newspaper
    of general circulation within such proposed district, then such judge shall post
    such notice in five of the most public places within such proposed district. Such
    notice shall be published or posted for a period of not less than fifteen days
    prior to the date fixed for the hearing. The hearing may be adjourned from time
    to time upon good cause shown.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.03
- number: '1545.04'
  heading: Evidence - argument - judgment
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'At a hearing on an application for the creation of a park district, evidence
    may be taken as in other civil cases in the probate court, and the probate judge
    shall hear all arguments for and against the creation of such district. If he
    finds that such application is signed or authorized as provided in section 1545.02
    of the Revised Code, and that the creation of such district will be conducive
    to the general welfare, he shall enter an order creating the district under the
    name specified in the application.

    The judge may amend or change the limits of the territory described in the application
    at the time of the hearing, provided that in no case shall he increase the limits
    or size of said district. In case any of the original territory is eliminated
    from the district as finally established, the boundary lines of the district as
    finally ordered by the court shall not divide any existing township or municipal
    corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.04
- number: '1545.041'
  heading: Conversion of township park district - resolution
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) Any township park district created pursuant to section 511.18 of the
    Revised Code that includes park land located outside the township in which the
    park district was established may be converted under the procedures provided in
    this section into a park district to be operated and maintained as provided for
    in this chapter, provided that there is no existing park district created under
    section 1545.04 of the Revised Code in the county in which the township park district
    is located. The proposed park district shall include within its boundary all townships
    and municipal corporations in which lands owned by the township park district
    seeking conversion are located, and may include any other townships and municipal
    corporations in the county in which the township park district is located.

    (B) Conversion of a township park district into a park district operated and maintained
    under this chapter shall be initiated by a resolution adopted by the board of
    park commissioners of the park district. Any resolution initiating a conversion
    shall include the following:

    (1) The name of the township park district seeking conversion;

    (2) The name of the proposed park district;

    (3) An accurate description of the territory to be included in the proposed district;

    (4) An accurate map or plat of the proposed park district. The resolution may
    also include a proposed tax levy for the operation and maintenance of the proposed
    park district. If such a tax levy is proposed, the resolution shall specify the
    annual rate of the tax, expressed in dollars for each one hundred thousand dollars
    of the county auditor''s market value and in mills for each dollar of taxable
    value, and the number of consecutive years the levy will be in effect. The annual
    rate of such a tax may not be higher than the total combined millage of all levies
    then in effect for the benefit of the township park district named in the resolution.

    (C) Upon adoption of the resolution provided for in division (B) of this section,
    the board of park commissioners of the township park district seeking conversion
    under this section shall certify the resolution to the county auditor, who shall
    certify to the board the information required for a tax levy under section 5705.03
    of the Revised Code, in the same manner as required under that section.

    The board shall certify the resolution and the county auditor''s certification
    to the board of elections of the county in which the park district is located
    no later than four p.m. of the seventy-fifth day before the day of the election
    at which the question will be voted upon. Upon certification of the resolution
    to the board, the board of elections shall make the necessary arrangements to
    submit the question of conversion of the township park into a park district operated
    and maintained under Chapter 1545. of the Revised Code, to the electors qualified
    to vote at the next primary or general election who reside in the territory of
    the proposed park district. The question shall provide for a tax levy if such
    a levy is specified in the resolution.

    (D) The ballot submitted to the electors as provided in division (C) of this section
    shall contain the following language:

    "Shall the _______________ (name of the township park district seeking conversion)
    be converted into a park district to be operated and maintained under Chapter
    1545. of the Revised Code under the name of _______________ (name of proposed
    park district), which park district shall include the following townships and
    municipal corporations:

    (Name townships and municipal corporations)

    Approval of the proposed conversion will result in the termination of all existing
    tax levies voted for the benefit of _______________ (name of the township park
    district sought to be converted) and in the levy of a new tax for the operation
    and maintenance of ______________ (name of proposed park district), that the county
    auditor estimates will collect $_____ annually, at a rate not exceeding _________
    mills for each $1 of taxable value, which amounts to $_________ for each $100,000
    of the county auditor''s market value, for _____ (number of years the millage
    is to be imposed) years, commencing on the ______ (year) tax duplicate.


    For the proposed conversionAgainst the proposed conversion "

    (E) If the proposed conversion is approved by at least a majority of the electors
    voting on the proposal, the township park district that seeks conversion shall
    become a park district subject to Chapter 1545. of the Revised Code effective
    the first day of January following approval by the voters. The park district shall
    have the name specified in the resolution, and effective the first day of January
    following approval by the voters, the following shall occur:

    (1) The indebtedness of the former township park district shall be assumed by
    the new park district;

    (2) All rights, assets, properties, and other interests of the former township
    park district shall become vested in the new park district, including the rights
    to any tax revenues previously vested in the former township park district; provided,
    that all tax levies in excess of the ten mill limitation approved for the benefit
    of the former township park district shall be removed from the tax lists after
    the February settlement next succeeding the conversion. Any tax levy approved
    in connection with the conversion shall be certified as provided in section 5705.25
    of the Revised Code.

    (3) The members of the board of park commissioners of the former township park
    district shall be the members of the board of park commissioners of the new park
    district, with all the same powers and duties as if appointed under section 1545.05
    of the Revised Code. The term of each such commissioner shall expire on the first
    day of January of the year following the year in which his term would have expired
    under section 511.19 of the Revised Code. Thereafter, commissioners shall be appointed
    pursuant to section 1545.05 of the Revised Code.

    As used in this section, "the county auditor''s market value" has the same meaning
    as in section 5705.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.041
- number: '1545.05'
  heading: Park commissioners
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) Upon the creation of a park district, the probate judge shall appoint
    three commissioners who shall take office immediately and whose terms shall expire
    one, two, and three years, respectively, from the first day of January next after
    the date of their appointment. Thereafter, their successors shall be appointed
    by the probate judge for terms of three years. Before entering upon the performance
    of the duties of the office, each commissioner shall take an oath to perform faithfully
    the duties of the office and, except as otherwise provided in section 3.061 of
    the Revised Code, shall give bond for that faithful performance in the sum of
    five thousand dollars. The bond shall be approved by and filed with the county
    auditor. The commissioners shall serve without compensation, but shall be allowed
    their actual and necessary expenses incurred in the performance of their duties.

    (B) Any board of park commissioners of a park district may elect to expand the
    membership of the board from three members to five members upon a majority vote
    of the board. Upon such a vote, the board shall certify to the probate judge a
    resolution requesting the judge to appoint two additional members to the board.
    The probate judge shall appoint those additional members, and they shall take
    office immediately upon their appointment. One member shall be appointed to a
    term that expires on the first day of January of the year following the year of
    that member''s appointment, and one member shall be appointed to a term that expires
    on the first day of January of the second year following the year of that member''s
    appointment. Thereafter, their successors shall be appointed by the probate judge
    for terms of three years.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.05
- number: '1545.06'
  heading: Removal of park commissioners - vacancy
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: Any park commissioner may be removed at the discretion of the probate judge,
    either upon complaint filed with such judge or upon his own motion. No such removal
    shall be made without giving such commissioner not less than ten days' notice
    and a full opportunity to be heard in his own behalf in a public hearing. The
    order removing such commissioner shall state the reasons therefor and shall be
    entered upon the records of the probate court. In case of such removal, or in
    case of other vacancy in the office of commissioner, the vacancy shall be filled
    by the judge by appointment for the unexpired term.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.06
- number: '1545.07'
  heading: Board of park commissioners - employees
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: The commissioners appointed in accordance with section 1545.05 or pursuant
    to section 1545.041 of the Revised Code shall constitute the board of park commissioners
    of the park district. Such board shall be a body politic and corporate, and may
    sue and be sued as provided in sections 1545.01 to 1545.28 of the Revised Code.
    Such board may employ a secretary and such other employees as are necessary in
    the performance of the powers conferred in such sections. The board may appoint
    a treasurer to act as custodian of the board's funds and as fiscal officer for
    the park district. For the purposes of acquiring, planning, developing, protecting,
    maintaining, or improving lands and facilities thereon under section 1545.11 of
    the Revised Code, and for other types of assistance which it finds necessary in
    carrying out its duties under Chapter 1545. of the Revised Code, the board may
    hire and contract for professional, technical, consulting, and other special services,
    including, in accordance with division (D) of section 309.09 of the Revised Code,
    the legal services of the prosecuting attorney of the county in which the park
    district is located, and may purchase goods. In procuring any goods with a cost
    in excess of the amount specified in section 9.17 of the Revised Code, the board
    shall contract as a contracting authority under sections 307.86 to 307.91 of the
    Revised Code, to the same extent and with the same limitations as a board of county
    commissioners. In procuring services, the board shall contract in the manner and
    under procedures established by the bylaws of the board as required in section
    1545.09 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.07
- number: '1545.071'
  heading: Group insurance
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'The board of park commissioners of any park district may procure and pay
    all or any part of the cost of group insurance policies that may provide benefits
    for hospitalization, surgical care, major medical care, disability, dental care,
    eye care, medical care, hearing aids, or prescription drugs, or sickness and accident
    insurance or a combination of any of the foregoing types of insurance or coverage
    for park district officers and employees and their immediate dependents issued
    by an insurance company duly authorized to do business in this state.

    The board may procure and pay all or any part of the cost of group life insurance
    to insure the lives of park district employees.

    The board also may contract for group health care services with health insuring
    corporations holding a certificate of authority under Chapter 1751. of the Revised
    Code provided that each officer or employee is permitted to:

    (A) Choose between a plan offered by an insurance company and a plan offered by
    a health insuring corporation and provided further that the officer or employee
    pays any amount by which the cost of the plan chosen by the officer or employee
    exceeds the cost of the plan offered by the board under this section;

    (B) Change the choice made under division (A) of this section at a time each year
    as determined in advance by the board.

    Any appointed member of the board of park commissioners and the spouse and dependent
    children of the member may be covered, at the option and expense of the member,
    as a noncompensated employee of the park district under any benefit plan described
    in division (A) of this section. The member shall pay to the park district the
    amount certified to it by the benefit provider as the provider''s charge for the
    coverage the member has chosen under division (A) of this section. Payments for
    coverage shall be made, in advance, in a manner prescribed by the board. The member''s
    exercise of an option to be covered under this section shall be in writing, announced
    at a regular public meeting of the board, and recorded as a public record in the
    minutes of the board.

    The board may provide the benefits authorized in this section by contributing
    to a health and welfare trust fund administered through or in conjunction with
    a collective bargaining representative of the park district employees.

    The board may provide the benefits described in this section through an individual
    self-insurance program or a joint self-insurance program as provided in section
    9.833 of the Revised Code.'
