- number: '1517.09'
  heading: Construction of chapter
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: Nothing contained in this chapter shall be construed as interfering with the
    purposes stated in the establishment of or pertaining to any state or local park,
    forest, preserve, wildlife refuge or other area or the proper management and development
    thereof, except that any agency administering an area dedicated as a nature preserve
    under section 1517.05 of the Revised Code shall be responsible for preserving
    the character of the area in accordance with the articles of dedication and the
    applicable rules with respect thereto established by the chief of the division
    of natural areas and preserves. Neither the dedication of an area as a nature
    preserve nor any action taken by the department under any of the provisions of
    this chapter shall void or replace any protective status under law which the area
    would have were it not a nature preserve and the protective provisions of this
    chapter shall be supplemental thereto.
