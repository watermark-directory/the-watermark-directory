- number: '1503.32'
  heading: Consent of state to land acquisition by federal forest service
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'Consent of the state is given to the United States department of agriculture
    forest service and, between May 6, 1902 and March 14, 1980, to any other agency
    or instrumentality of the United States, for the acquisition, by purchase or gift,
    of such lands in the state as in the opinion of the federal government may be
    needed for the establishment, consolidation, and extension of national forests
    and for flood control and soil conservation work in the state. At the time the
    forest service begins to negotiate with the owner of land to acquire land in the
    state, the forest service shall notify in writing the board of county commissioners
    of the county in which the land is located. Such notice shall include the location
    and amount of land that the forest service intends to acquire. The board of county
    commissioners shall publish, in the Ohio newspaper of largest circulation in the
    county in which the land is located, notice of the intent of the forest service
    to acquire the land and the location thereof.

    The state retains concurrent jurisdiction with the United States over such areas
    in the matter of service thereon of all civil and criminal process issuing under
    the authority of the state.

    The boundaries of any areas selected under this section shall be first approved
    by the governor and such other state agencies and departments as he designates.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.32
- number: '1503.33'
  heading: Cooperation among states and with federal agencies to prevent forest fires
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'In order to further cooperation with other states and with federal agencies,
    the chief of the division of forestry, with the approval of the director of natural
    resources, may request assistance and aid from and may provide assistance and
    aid to other states, groups of states, and federal agencies in the protection
    of forests from forest fires and may enter into agreements for that purpose. Upon
    the request of another state, the chief may send to or receive from that state
    such personnel, equipment, and supplies as may be available and appropriate for
    use in accordance with the terms of the applicable agreement.

    Employees of the department of natural resources and the department of commerce
    serving outside the state under the terms of an agreement entered into under this
    section shall be considered as performing services within their regular employment
    for the purposes of compensation, pension or indemnity fund rights, workers''
    compensation, and other rights or benefits to which they may be entitled as incidents
    of their regular employment. Such employees retain personal immunity from civil
    liability as specified in section 9.86 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.33
- number: '1503.34'
  heading: Lease agreements for the rental of concessions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry, with the approval of the director
    of natural resources, may enter into lease agreements for the rental of concessions
    or the operation of other lands or facilities located within state-owned forests
    or on other property under the control and administration of the division. For
    the purposes of this section, a concessionaire may be any person.

    The chief may establish and collect fees for the use of and admission to state
    forest lands and facilities, the amount of concession rentals, and fees for other
    special projects on lands and waters under the control and administration of the
    division and may regulate the sale of tangible objects through contracts between
    the division and concessionaires. All moneys received as user fees, from concession
    rentals, and from fees for other special projects shall be paid into the state
    treasury to the credit of the state forest fund created in section 1503.05 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.34
- number: '1503.35'
  heading: Distribution of money received from sale of national forest products
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The director of natural resources shall distribute money received by the
    state pursuant to 16 U.S.C. 500 from the sale of national forest timber and other
    national forest products to the applicable county or counties in which the national
    forest is situated. Money received by a county under this section shall be used
    by a county as follows:

    (A) Fifty per cent shall be used to maintain county roads and bridges;

    (B) Fifty per cent shall be used for the benefit of public schools.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.35
- number: '1503.40'
  heading: Forestry advisory council
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'There is hereby created in the division of forestry a forestry advisory council
    which shall consist of eight appointed members, not more than four of whom shall
    belong to the same political party, to be appointed by the governor with the advice
    and consent of the senate. One member shall be appointed to represent each of
    the following: forest-based research activities, small private forest land owners,
    large private forest land owners, the pulp and paper industry, other forest industries,
    soil science, forest recreation, and the public.

    The member first appointed to represent forest recreation shall have a term to
    expire on the last day of February, 1974.

    Terms of office shall be for four years, commencing on the first day of March
    and ending on the last day of February, except that upon expiration of the two
    terms ending on March 4, 1973, the new terms which succeed them shall commence
    on March 5, 1973 and end on February 28, 1977; upon expiration of the term ending
    on March 4, 1974, the new term which succeeds it shall commence on March 5, 1974
    and end on February 28, 1978; and upon expiration of the two terms ending on March
    2, 1975, the new terms which succeed them shall commence on March 3, 1975 and
    end on February 28, 1979. Each member shall hold office from the date of his appointment
    until the end of the term for which he was appointed.

    A vacancy in the office of a member shall be filled by the governor, with the
    advice and consent of the senate. Any member appointed to fill a vacancy occurring
    prior to the expiration of the term for which his predecessor was appointed shall
    hold office for the remainder of such term. Any member shall continue in office
    subsequent to the expiration date of his term until his successor takes office,
    or until a period of sixty days has elapsed, whichever occurs first.

    The council shall select from among its appointed members a chairman, a vice-chairman,
    and a secretary. All members are entitled to their actual and necessary expenses
    incurred in the performance of their duties as such members, payable from the
    appropriations for the division.

    The governor may remove any appointed member for inefficiency, neglect of duty,
    or malfeasance in office.

    The council shall hold at least one regular meeting in each quarter of a calendar
    year, and shall keep a record of its proceedings. Special meetings may be called
    by the chairman, and shall be called by him upon receipt of a written request
    therefor signed by two or more members of the council. A written notice of the
    time and place of each meeting shall be sent to each member of the council. Five
    members constitute a quorum.

    The council may advise and make recommendations to the chief of the division of
    forestry concerning forestry practices and programs in the state, including programs
    of the division, and may assist the division in promoting cooperation on forestry
    practices and programs with other agencies, political subdivisions, and private
    interests.'
