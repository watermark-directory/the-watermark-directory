- number: '1547.09'
  heading: Prohibited acts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'No person shall moor or anchor any vessel in a designated speed zone or water
    ski zone. No person, unless in distress and no other vessel is endangered thereby,
    shall moor to, anchor to, or tie up to any marker, aid, buoy, light, or other
    aid to navigation.

    No person shall operate or permit to be operated any vessel on the waters in this
    state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.09
- number: '1547.10'
  heading: Stopping and furnishing information upon accident or collision
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'In case of accident to or collision with persons or property on the waters
    of this state, due to the operation of any vessel, the operator having knowledge
    of the accident or collision shall immediately stop the vessel at the scene of
    the accident or collision, to the extent that it is safe and practical, and shall
    remain at the scene of the accident or collision until he has given his name and
    address and, if he is not the owner, the name and address of the owner of the
    vessel, together with the registration number of the vessel, if any, to any person
    injured in the accident or collision or to the operator, occupant, owner, or attendant
    of any vessel damaged in the accident or collision, or to any law enforcement
    officer at the scene of the accident or collision.

    If the injured person is unable to comprehend and record the information required
    to be given by this section, the other operator involved in the accident or collision
    shall forthwith notify the nearest law enforcement agency having authority concerning
    the location of the accident or collision, and his name, address, and the registration
    number, if any, of the vessel he was operating, and then remain at the scene of
    the accident or collision or at the nearest location from which notification is
    possible until a law enforcement officer arrives, unless removed from the scene
    by an emergency vehicle operated by the state or a political subdivision or by
    an ambulance.

    If the accident or collision is with an unoccupied or unattended vessel, the operator
    so colliding with the vessel shall securely attach the information required to
    be given in this section, in writing, to a conspicuous place in or on the unoccupied
    or unattended vessel.'
