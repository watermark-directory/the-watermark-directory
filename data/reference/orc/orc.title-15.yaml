    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person shall hunt or trap upon any lands, pond, lake, or private waters
    of another, except water claimed by riparian right of ownership in adjacent lands,
    or shoot, shoot at, catch, kill, injure, or pursue a wild bird, wild waterfowl,
    or wild animal thereon without obtaining written permission from the owner or
    the owner''s authorized agent.

    (B) Except as otherwise provided in this division, the owner, lessee, renter,
    or occupant of any lands, pond, lake, or private waters upon which a person violates
    division (A) of this section is not liable in damages to any person in a civil
    action for injury, death, or loss to person or property that arises during or
    incidental to the violation. For the purposes of this division, a finding that
    a person violated division (A) of this section is not dependent upon the person
    being charged with or convicted of a violation of division (A) of this section.
    This division does not apply to civil claims based upon alleged willful or wanton
    misconduct or intentionally tortious conduct of the owner, lessee, renter, or
    occupant. This division does not create a new cause of action or a substantive
    legal right against the owner, lessee, renter, or occupant, and does not affect
    any immunities from civil liability or defenses established by another section
    of the Revised Code or available at common law, to which the owner, lessee, renter,
    or occupant may be entitled under circumstances not covered by this section.

    (C) A person who obtains the permission required under division (A) of this section
    shall carry it with the person at all times during which the person is engaged
    in an activity for which the permission is required and shall exhibit it upon
    request of a wildlife officer, constable, sheriff, deputy sheriff, police officer,
    other law enforcement officer, or the owner of the lands, pond, lake, or private
    waters on which the person is hunting or trapping or the owner''s authorized agent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.17
- number: '1533.171'
  heading: Prohibiting injuring persons or property while hunting
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person, in the act of hunting, pursuing, taking, or killing a wild
    animal, shall act in a negligent, careless, or reckless manner so as to injure
    persons or property.

    (B) The court before whom any person is convicted of or pleads guilty to a violation
    of division (A) of this section shall report that fact, together with the violator''s
    name and address, to the chief of the division of wildlife not later than ten
    days after the date of conviction or plea.

    (C) Not later than seven days after receiving a notification under division (B)
    of this section, the chief shall revoke, for not less than one year nor more than
    five years, each hunting license, fur taker permit, deer permit, wild turkey permit,
    and wetlands habitat stamp issued to that person under this chapter. No fee paid
    for such a license, permit, or stamp shall be returned to the person.

    Upon revoking a license, permit, or stamp, or a combination thereof, under this
    division, the chief immediately shall send a notice of that action by certified
    mail to the last known address of the person. The notice shall state the action
    taken, order the person to surrender the revoked license, permit, or stamp, or
    combination thereof, and state that the department of natural resources will not
    afford a hearing as required under section 119.06 of the Revised Code.

    (D) If, after receiving a notice under division (C) of this section, the person
    decides to petition for a review of the revocation, the person shall file a petition
    for such a review not later than thirty days after receiving the notice in the
    municipal court or the county court, or, if the person is under eighteen years
    of age, the juvenile court, in whose jurisdiction the violation occurred. The
    review shall be limited to the question of the appropriateness of the period of
    revocation. The court shall send a copy of the petition to the chief by certified
    mail together with timely notice of the date, time, and place of a hearing on
    the petition. The filing of a petition for a review shall not stay the revocation
    during the pendency of the appeal.

    (E) No person whose license, permit, or stamp, or a combination thereof, has been
    revoked under this section shall attempt to purchase, purchase, apply for, or
    receive any hunting license, fur taker permit, deer permit, wild turkey permit,
    or wetlands habitat stamp issued under this chapter or engage in hunting during
    the time any such license, permit, or stamp, or a combination thereof, is revoked.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.171
- number: '1533.18'
  heading: Recreational user definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'As used in sections 1533.18 and 1533.181 of the Revised Code:

    (A) "Premises" means all privately owned lands, ways, and waters, and any buildings
    and structures thereon, and all privately owned and state-owned lands, ways, and
    waters leased to a private person, firm, or organization, including any buildings
    and structures thereon.

    (B) "Recreational user" means a person to whom permission has been granted, without
    the payment of a fee or consideration to the owner, lessee, or occupant of premises,
    other than a fee or consideration paid to the state or any agency of the state,
    or a lease payment or fee paid to the owner of privately owned lands, to enter
    upon premises to hunt, fish, trap, camp, hike, or swim, or to operate a snowmobile,
    all-purpose vehicle, or four-wheel drive motor vehicle, or to engage in other
    recreational pursuits.

    (C) "All-purpose vehicle" has the same meaning as in section 4519.01 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.18
- number: '1533.181'
  heading: Immunity
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No owner, lessee, or occupant of premises:

    (1) Owes any duty to a recreational user to keep the premises safe for entry or
    use;

    (2) Extends any assurance to a recreational user, through the act of giving permission,
    that the premises are safe for entry or use;

    (3) Assumes responsibility for or incurs liability for any injury to person or
    property caused by any act of a recreational user.

    (B) Division (A) of this section applies to the owner, lessee, or occupant of
    privately owned, nonresidential premises, whether or not the premises are kept
    open for public use and whether or not the owner, lessee, or occupant denies entry
    to certain individuals.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.181
- number: '1533.19'
  heading: Field trial club permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Except as otherwise provided by division rule, recognized field trial clubs
    may shoot domestically raised quails, chukar partridges, ducks, pheasants, or
    other game birds and common pigeons at any time during the daylight hours from
    the first day of September to the thirtieth day of April of the following year,
    both dates inclusive. Such domestically raised quails, chukar partridges, ducks,
    pheasants, and other game birds shall be banded prior to release and approved
    by the division of wildlife for field trial use, provided that permission for
    the holding of such a trial shall be obtained from the division. Permission shall
    be requested in writing at least thirty days in advance of the trial. The request
    shall contain the name of the recognized field trial club and the names of its
    officers, the date and location of the trial, and the name of the licensed breeders
    from whom the quails, chukar partridges, ducks, pheasants, or other game birds
    will be obtained. The division may grant a written permit when it is satisfied
    that the trial is a bona fide one conducted by a bona fide club under this section.
    When an application is approved, a permit shall be issued after the payment of
    a fee of fifty dollars for each day upon which the trials are conducted. Participants
    in such trials need not possess a hunter's license while participating in the
    trials. The division shall supervise all such trials and shall enforce all laws
    and division rules governing them. If unbanded quails, chukar partridges, ducks,
    pheasants, or other game birds are accidentally shot during such trials, they
    immediately shall be replaced by the club by the releasing of an equal number
    of live quails, chukar partridges, ducks, pheasants, or other game birds under
    the supervision of the division.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.19
- number: '1533.191'
  heading: Purchase of domestically raised game birds for dog training grounds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Organized field trial clubs or individuals may purchase domestically raised
    quails, chukar partridges, pheasants, black and mallard ducks, and other game
    birds from licensed breeders, and may shoot quails, chukar partridges, pheasants,
    ducks or other game birds and common pigeons that are approved by the division
    of wildlife at any time during the daylight hours, only on grounds designated
    by the division of wildlife as "dog training grounds," and only as provided in
    this section and under such additional regulations as the chief of the division
    of wildlife may prescribe subject to sections 119.01 to 119.13, inclusive, of
    the Revised Code, for the purpose of the establishment, operation, and control
    of such areas as he deems necessary. Failure to comply with all rules and regulations
    established by the chief of the division of wildlife pursuant to this section
    shall be sufficient cause for refusal to issue a permit or for revocation of an
    existing permit.

    Bands furnished by the division of wildlife shall be used to designate each quail,
    chukar partridge, pheasant, duck, or other game bird used on such designated grounds
    and shall be attached to quails, chukar partridges, pheasants, ducks, or other
    game birds, as prescribed by the chief of the division of wildlife, prior to being
    released. The division of wildlife shall provide such bands and collect a nominal
    fee for each band.

    If unbanded wild quails, chukar partridges, pheasants, ducks, or other game birds
    are accidentally shot on such grounds they shall be immediately banded with a
    band furnished by the division of wildlife and be replaced by releasing an equal
    number of live quails, chukar partridges, pheasants, ducks, or other game birds
    under the supervision of the division of wildlife.

    "Designated grounds" are areas of land not exceeding fifty acres where permission
    from the owner or lessee has first been obtained and the exact location and description
    of the area together with the name of the club or individual operator has been
    furnished in writing to the division of wildlife. The division shall formulate
    and provide suitable signs to be placed around the boundaries of such grounds
    and a nominal fee shall be collected for such signs. The division may then issue
    a permit, which shall expire at midnight on the thirtieth day of April following
    the date of issuance, when it is satisfied that the use thereof is a bona fide
    use in accordance with the provisions of this section.

    Any permit issued to a club or individual under the provisions of this section
    may be revoked at any time for cause, by the chief of the division of wildlife,
    and no other permit shall be issued to such club or individual during the period
    for which such revoked permit was issued.

    Each quail, chukar partridge, pheasant, duck, or other game bird or common pigeon
    taken in violation of this section constitutes a separate offense.

    Dog training grounds shall not be used to conduct shooting trials except as provided
    in section 1533.19 of the Revised Code.'
