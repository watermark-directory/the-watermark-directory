- number: '1533.74'
  heading: Tag or seal required for animals sold for food
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No game birds, game quadrupeds, or fur-bearing animals held under the authority
    of a license issued under section 1533.71, 1533.72, or 1533.721 of the Revised
    Code shall be sold for food unless the carcass of each game bird, game quadruped,
    or fur-bearing animal is tagged with a suitable tag or seal approved by the division
    of wildlife. Game birds, game quadrupeds, and fur-bearing animals so killed and
    tagged may be possessed, bought, or sold at any time. Common carriers shall receive
    and transport game birds, game quadrupeds, and fur-bearing animals so tagged,
    but to every package containing them shall be affixed a tag or label upon which
    shall be plainly printed or written the name of the person to whom the license
    was issued, the name of the person to whom they are to be transported, the number
    of game birds, game quadrupeds, or fur-bearing animals contained in the package,
    and a statement to the effect that they were killed and tagged in accordance with
    sections 1533.71 to 1533.79 of the Revised Code.

    The chief of the division of wildlife may adopt rules under section 1531.10 of
    the Revised Code necessary to administer this section.

    This section and rules adopted pursuant to it do not apply to meat that has been
    inspected by the department of agriculture under Chapter 918. of the Revised Code
    and rules adopted under it and that has been marked with an official inspection
    mark, stamp, or brand pursuant to that inspection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.74
- number: '1533.75'
  heading: Prohibitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person shall knowingly do any of the following:

    (1) Import, transport, or possess live wild boar or feral swine;

    (2) Release wild boar or feral swine into the wild or expand the range of a wild
    boar or feral swine by introducing the wild boar or feral swine to a new location;

    (3) Allow a swine that is under the ownership or possession of the person to live
    in a feral state;

    (4) Except as otherwise provided in section 1533.751 of the Revised Code, hunt,
    trap, or kill a wild boar or feral swine or assist in the hunting, trapping, or
    killing of a wild boar or feral swine;

    (5) Profit from the releasing, hunting, trapping, or killing of wild boar or feral
    swine;

    (6) Fail to notify the division of wildlife in accordance with division (B) of
    section 1533.751 of the Revised Code.

    (B) No person shall purposely feed a wild boar or feral swine.'
  history: null
