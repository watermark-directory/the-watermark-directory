- number: '1561.04'
  heading: Annual report - public distribution quarterly reports
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'The director of natural resources or the director''s designee shall annually
    make a report to the governor, which shall include:

    (A) A summary of the activities and of the reports of the deputy mine inspectors;

    (B) A statement of the condition and the operation of the mines of the state;

    (C) A statement of the number of accidents in and about the mines, the manner
    in which they occurred, and any other data and facts bearing upon the prevention
    of accidents and the preservation of life, health, and property, and any suggestions
    relative to the better preservation of the life, health, and property of those
    engaged in the mining industry.

    The records of the bureau of workers'' compensation shall be available to the
    director or the director''s designee for information concerning such a report.
    The director or the director''s designee shall send by mail to each coal operator
    in the state, to a duly designated representative of the miners at each mine,
    and to such other persons as the director or the director''s designee deems proper,
    a copy of such report. The director or the director''s designee may have as many
    copies of such report printed as are needed to make the distribution thereof as
    provided in this section.

    The director or the director''s designee shall also prepare and publish for public
    distribution quarterly reports, including therein information relative to the
    items enumerated in this section that is pertinent or available at such times.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.04
- number: '1561.05'
  heading: Administration of laws relating to mines and mining and duties and functions
    of the division of mineral resources management
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'The laws relating to mines and mining and duties and functions of the division
    of mineral resources management shall be administered by the chief of the division
    of mineral resources management, and through and by deputy mine inspectors. If
    a vacancy occurs in the office of a deputy mine inspector, it may be filled by
    the chief, who shall select a person from the eligible list for deputy mine inspectors
    that is prepared under section 124.24 of the Revised Code.

    The chief shall adopt, in accordance with Chapter 119. of the Revised Code, all
    necessary rules for conducting examinations and for governing all other matters
    requisite to the exercise of the chief''s powers and the performance of the chief''s
    duties under this chapter and Chapters 1509., 1563., 1565., and 1567. of the Revised
    Code relating to mines and mining.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.05
- number: '1561.06'
  heading: Designating coal or mineral bearing townships
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'The chief of the division of mineral resources management shall designate
    the townships in which mineable or quarryable coal or other mineral is or may
    be mined or quarried, which townships shall be considered coal or mineral bearing
    townships. The chief shall divide the coal or other mineral bearing townships
    into such districts as the chief deems best for inspection purposes, and the chief
    may change such districts whenever, in the chief''s judgment, the best interests
    of the service require.

    The chief shall designate as provided in this section as coal or mineral bearing
    townships those townships in which coal is being mined or in which coal is found
    in such thickness as to make the mining of the coal or mineral probable at some
    future time, and shall designate the township as a unit. As used in this chapter
    and Chapters 1563., 1565., and 1567. of the Revised Code, "coal or mineral bearing
    township" means a township that has been so designated by the chief under this
    section.

    The chief shall also designate the townships in which coal is being mined or in
    which coal is found in such thickness as to make the mining of the coal probable
    at some future time as "coal bearing townships" as that term is used in Chapter
    1509. of the Revised Code. The chief shall certify to the chief of the division
    of oil and gas resources management the townships that are designated as coal
    bearing townships.'
