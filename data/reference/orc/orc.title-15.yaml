  heading: Order to abate violation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: If upon inspection a deputy mine inspector or other authorized representative
    of the division of mineral resources management finds any violation of law, or
    any other conditions that constitute an imminent and substantial threat to miners'
    health or safety, the chief of the division of mineral resources management may
    issue, modify, or revoke reasonable orders requiring the operator to abate the
    violation or condition within a reasonable period of time. No operator shall violate
    or fail to comply with any order issued under this section.
