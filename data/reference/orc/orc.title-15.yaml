  url: https://codes.ohio.gov/ohio-revised-code/section-1514.43
- number: '1514.44'
  heading: Order to abate dangerous condition or practice
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: 'If during an inspection conducted under section 1514.41 of the Revised Code
    or a safety audit conducted under section 1514.42 of the Revised Code, the chief
    of the division of mineral resources management finds a condition or practice
    at a surface mining operation that could reasonably be expected to cause the death
    of or imminent serious physical harm to an employee of the operation, the chief
    immediately shall issue orders to safeguard the employees, notify the operator
    of the condition or practice, and require the operator to abate the condition
    or practice within a reasonable period of time. In all such situations, the chief
    may require the operation to cease in the area in which the condition or practice
    is occurring or may require the entire operation to cease, if necessary, until
    the condition or practice that could reasonably be expected to cause death or
    serious physical harm is eliminated.

    The chief shall complete a report that describes the condition or practice and
    the action taken to eliminate it. The chief shall provide two copies of the report
    to the operator of the operation. The operator shall post one copy of the report
    at the operation for review by the employees of the operation.'
