- number: '1507.01'
  heading: Division of engineering - chief engineer - powers and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1507'
    name: Division Of Engineering
  text: 'There is hereby created in the department of natural resources the division
    of engineering to be administered by the chief engineer of the department, who
    shall be a professional engineer registered under Chapter 4733. of the Revised
    Code or a professional architect certified and registered under Chapter 4703.
    of the Revised Code. With the approval of the director of natural resources, the
    chief engineer shall do all of the following:

    (A) Administer this chapter;

    (B) Provide engineering, architectural, land surveying, and related administrative
    and maintenance support services to the other divisions in the department;

    (C) Implement the department''s capital improvement program and facility maintenance
    projects, including all associated planning, design, contracting, surveying, inspection,
    and management responsibilities and requirements;

    (D) Act as contracting officer in departmental engineering, architectural, surveying,
    and construction matters regarding capital improvements except for those matters
    otherwise specifically provided for in law;

    (E) Coordinate the department''s roadway maintenance program with the department
    of transportation pursuant to section 5511.05 of the Revised Code and maintain
    the roadway inventory of the department of natural resources;

    (F) Coordinate the department''s projects, programs, policies, procedures, and
    activities with the United States army corps of engineers;

    (G) Employ professional and technical assistants and such other employees as are
    necessary for the performance of the activities required or authorized under this
    chapter, other work of the division, and any other work agreed to under working
    agreements or contractual arrangements; prescribe their duties; and fix their
    compensation in accordance with such schedules as are provided by law for the
    compensation of state employees;

    (H) Except as otherwise provided in the Revised Code, coordinate and conduct all
    real estate functions for the department of natural resources, including at least
    acquisitions by purchase, lease, gift, devise, bequest, appropriation, or otherwise;
    grants through sales, leases, exchanges, easements, and licenses; inventories
    of land; and other related general management duties;

    (I) Coordinate such environmental matters concerning the department and the state
    as are necessary to comply with the "National Environmental Policy Act of 1969,"
    83 Stat. 852, 42 U.S.C. 4321, as amended, the "Intergovernmental Cooperation Act
    of 1968," 82 Stat. 1098, 31 U.S.C. 6506, and the "Federal Water Pollution Control
    Act," 91 Stat. 1566 (1977), 33 U.S.C. 1251, as amended, and regulations adopted
    under those acts;

    (J) Coordinate and administer compensatory mitigation grant programs and other
    programs for streams and wetlands as approved in accordance with certifications
    and permits issued under sections 401 and 404 of the "Federal Water Pollution
    Control Act," 91 Stat. 1566 (1977), 33 U.S.C. 1251, as amended, by the environmental
    protection agency and the United States army corps of engineers;

    (K) Coordinate all department activities associated with the completion of drainage
    ditch improvements in accordance with Chapters 6131. and 6133. of the Revised
    Code;

    (L) Assist the department and its divisions by providing department-wide planning,
    including at least master planning, comprehensive planning, capital improvements
    planning, and special purpose planning.'
