- number: '1514.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: '(A) Whoever violates division (A)(1) or (2) of section 1514.10 of the Revised
    Code may be fined not more than five thousand dollars plus not more than one thousand
    dollars per acre of land affected, and is responsible for achieving reclamation
    of the land as required pursuant to this chapter.

    (B) Whoever violates division (B) of section 1514.10 of the Revised Code may be
    fined not more than one thousand dollars per acre of land affected that is not
    under permit, and is responsible for achieving reclamation of the land as required
    pursuant to this chapter.

    (C) Whoever violates division (C) of section 1514.10 of the Revised Code may be
    fined not less than one hundred nor more than one thousand dollars, or imprisoned
    not more than six months, or both.

    (D) Whoever violates division (D), (E), (F), or (G) of section 1514.10 of the
    Revised Code may be fined not less than one hundred nor more than one thousand
    dollars for a first offense. For each subsequent offense, on one or more permits
    held by such persons, such person may be fined not less than two hundred nor more
    than five thousand dollars, or imprisoned not more than six months, or both. The
    permit of any person convicted of a third offense may be revoked by the court
    at the time of that conviction, and the court at that time may further order that
    no permit or amendment to a permit may be issued to that person under this chapter
    for a period of five years from the date of the conviction. Nothing contained
    in this section shall be construed to limit or affect the authority of the chief
    of the division of mineral resources management granted by this chapter.

    (E) Whoever violates an order of the chief of the division of mineral resources
    management issued under this chapter is guilty of a minor misdemeanor.'
