- number: '1531.31'
  heading: Ohio River management fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: There is hereby created in the state treasury the Ohio river management fund,
    which shall consist of moneys received by the division of wildlife pursuant to
    negotiated mitigation settlements from persons who have adversely affected the
    fish and wildlife of the Ohio river or their habitats and of gifts and contributions
    made to it. The fund shall be used for the preservation, development, and management
    of the Ohio river through the acquisition of critical habitat areas, monitoring
    of fish and wildlife populations, expansion of programs for the production and
    stocking of game fish, and research and development of methods for improving public
    access to the Ohio river. All investment earnings of the fund shall be credited
    to the fund.
