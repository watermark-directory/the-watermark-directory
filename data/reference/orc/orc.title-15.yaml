  url: https://codes.ohio.gov/ohio-revised-code/section-1571.07
- number: '1571.08'
  heading: Use of alternate methods or materials - filing of objections
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) Whenever in this chapter, the method or material to be used in discharging
    any obligations imposed by this chapter is specified, an alternative method or
    material may be used if approved by the gas storage well inspector or the chief
    of the division of oil and gas resources management. A person desiring to use
    such alternative method or material shall file with the division of oil and gas
    resources management an application for permission to do so. Such application
    shall describe such alternative method or material in reasonable detail. The gas
    storage well inspector shall promptly send by certified mail or electronic format
    notice of the filing of such application to any coal mine operator or reservoir
    operator whose mine or reservoir may be directly affected thereby. Any such coal
    mine operator or reservoir operator may within ten days following receipt of such
    notice, file with the division objections to such application. The gas storage
    well inspector may also file with the division an objection to such application
    at any time during which coal mine operators or reservoir operators are permitted
    to file objections. If no objections are filed within the ten-day period of time,
    the gas storage well inspector shall thereupon issue a permit approving the use
    of such alternative method or material. If any such objections are filed by any
    coal mine operator or reservoir operator, or by the gas storage well inspector,
    the question as to whether or not the use of such alternative method or material,
    or a modification thereof is approved, shall be determined by a conference or
    hearing as provided in section 1571.10 of the Revised Code.

    (B) Whenever in this chapter, provision is made for the filing of objections with
    the division, such objections shall be in writing and shall state as definitely
    as is reasonably possible the reasons for such objections. Upon the filing of
    any such objection the gas storage well inspector shall promptly fix the time
    and place for holding a conference for the purpose of discussing and endeavoring
    to resolve by mutual agreement the issue raised by such objection. The gas storage
    well inspector shall send written notice thereof by certified mail or electronic
    format to each person having a direct interest therein. Thereupon the issue made
    by such objection shall be determined by a conference or hearing in accordance
    with the procedures for conferences and hearings as provided in section 1571.10
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1571.08
- number: '1571.09'
  heading: Records and facilities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) The chief of the division of oil and gas resources management or any
    officer or employee of the division thereunto duly authorized by the chief may
    investigate, inspect, or examine records and facilities of any coal mine operator
    or reservoir operator, for the purpose of determining the accuracy or correctness
    of any map, data, statement, report, or other item or article, filed with or otherwise
    received by the division pursuant to this chapter. When a material question is
    raised by any reservoir operator or coal mine operator as to the accuracy or correctness
    of any such map, data, statement, report, or other item or article, which may
    directly affect the reservoir operator or coal mine operator, the matter shall
    be determined by a conference or hearing as provided in section 1571.10 of the
    Revised Code.

    (B) The division of oil and gas resources management shall keep all maps, data,
    statements, reports, well logs, notices, or other items or articles filed with
    or otherwise received by it pursuant to this chapter in a safe place and conveniently
    accessible to persons entitled to examine them. It shall maintain indexes of all
    such items and articles so that any of them may be promptly located. None of such
    items or articles shall be open to public inspection, but: (1) any of such items
    or articles pertaining to a mine may be examined by: the operator, owner, lessee,
    or agent of such mine; persons financially interested in such mine; owners of
    land adjoining such mine; the operator, owner, lessee, or agent of a mine adjoining
    such mine; authorized representatives of the persons employed to work in such
    mine; the operator of a gas storage reservoir any part of the boundary of which
    or of the boundary of its protective area is within ten thousand linear feet of
    the boundary of such mine, or the agent of such reservoir operator thereunto authorized
    by such reservoir operator; or any employee of the division of geological survey
    in the department of natural resources thereunto duly authorized by the chief
    of that division; and (2) any of such items or articles pertaining to a gas storage
    reservoir may be examined by: the operator of such reservoir; the operator of
    a coal mine any part of the boundary of which is within ten thousand linear feet
    of the boundary of a gas storage reservoir or of the boundary of its protective
    area, or the agent of such mine operator thereunto authorized by such mine operator,
    or the authorized representatives of the persons employed to work in such mine;
    or any employee of the division of geological survey thereunto duly authorized
    by the chief of that division. The division of oil and gas resources management
    shall not permit any of such items or articles to be removed from its office,
    and it shall not furnish copies of any such items or articles to any person other
    than as provided in this chapter.

    The division shall keep a docket of all proceedings arising under this chapter,
    in which shall be entered the dates of any notice received or issued, the names
    of all persons to whom it sends a notice, and the address of each, the dates of
    conferences and hearings, and all findings, determinations, decisions, rulings,
    and orders, or other actions by the division.

    (C) Whenever any provision of this chapter requires the division to give notice
    to the operator of a coal mine of any proceeding to be held pursuant to this chapter,
    the division shall simultaneously give a copy of such notice to the authorized
    representatives of the persons employed to work in such mine.'
