- number: '1514.07'
  heading: Order of chief to be in writing
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: 'Each order of the chief of the division of mineral resources management affecting
    the rights, duties, or privileges of an operator or the operator''s surety or
    of an applicant for a permit or an amendment to a permit or a plan shall be in
    writing and contain a finding by the chief of the facts upon which the order is
    based. Notice of the order shall be given by certified mail to each person whose
    rights, duties, or privileges are affected.

    If the chief finds that an operator has violated any requirement of this chapter,
    failed to perform any measure set forth in the approved plan of mining and reclamation
    that is necessary to prevent damage to adjoining property or to achieve, or has
    otherwise failed to achieve, the performance standards of division (A)(10) of
    section 1514.02 of the Revised Code, or caused damage to adjoining property, the
    chief may issue orders directing the operator to cease violation, perform such
    measures, achieve such standards, or prevent or abate off-site damage. The order
    shall identify the operation where the violation occurs, the specific requirement
    violated, measure not performed, standard not achieved, or off-site damage caused,
    and where practicable prescribe what action the operator may take to comply with
    the order. The chief shall fix and set forth in the order a reasonable date or
    time by which the operator shall comply, and the order shall state that the chief
    may revoke the operator''s permit if the order is not complied with by that date
    or time. If upon that date or time the chief finds that the operator has not complied
    with the order, the chief may issue an order revoking the operator''s permit.'
