- number: '1561.31'
  heading: Inspections by deputy mine inspector
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'Each deputy mine inspector shall inspect each mine in the inspector''s district,
    the owner, lessee, agent, or operator of which is an employer as defined in section
    4123.01 of the Revised Code, or any other mine at which three or more persons
    work, at intervals not exceeding three months between inspections, and all other
    mines in the inspector''s district as often as practical, noting particularly
    the location and condition of buildings, the condition of the boiler, machinery,
    workings of the mine, the traveling ways and haulageways, the circulation and
    condition of the air and drainage, and the condition of electrical circuits and
    appliances. The inspector shall make tests for poisonous, explosive, and noxious
    gases, and shall specifically order compliance with any section of this chapter
    and Chapters 1563., 1565., and 1567. and sections 1509.09, 1509.12, 1509.13, 1509.14,
    1509.15, 1509.17, and 1509.18 of the Revised Code that the inspector finds is
    being violated.

    Upon completion of the inspection of a mine, the inspector shall fill out a report
    of the conditions found during inspections on a form provided by the chief of
    the division of mineral resources management, which form shall provide for statements
    as to whether the laws are being observed or violated, and if violated, the nature
    and extent thereof, the date of the inspection, the number of persons employed
    in and about the mine, whether or not the proof of workers'' compensation coverage
    issued pursuant to section 4123.35 of the Revised Code is posted and the date
    of expiration thereof, and matters, things, and practices that specifically are
    covered by law, order of the chief, or previous order of the inspector. The inspector
    shall make this report in quadruplicate or quintuplicate, and send the original
    to the chief, post a copy at the mine, give a copy to the mine superintendent,
    and retain a copy for the inspector''s files. Where the miners of a mine have
    a mine safety committee, the inspector shall post one additional copy of the report
    of that mine at that mine for the use and possession of the committee. The report
    required by this section shall be known as the inspector''s routine report.

    If an inspector orders compliance with this chapter and Chapters 1563., 1565.,
    and 1567. and sections 1509.09, 1509.12, 1509.13, 1509.14, 1509.15, 1509.17, and
    1509.18 of the Revised Code, and is assured by the superintendent of the mine
    to which the order applies that the order will be complied with, the inspector
    shall revisit the mine within a reasonable period of time and ascertain whether
    or not the order has been complied with. The inspector shall report the inspector''s
    findings to the chief on a form to be provided by the chief, and take action to
    enforce compliance.'
