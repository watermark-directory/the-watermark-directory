- number: '1561.28'
  heading: Supervision of mineral resources management laboratory
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: The chief of the division of mineral resources management shall designate
    one of the chemists, provided for in section 1561.27 of the Revised Code, to be
    in charge of and supervise and direct the work of a mine laboratory operated under
    that section. The chemists shall make proper chemical tests of samples of mine
    air, gases, and coal and mine dust, and keep a permanent record of the same showing
    the date, time, and place where taken, the results of the test and analysis, and
    any further data that is proper, necessary, and pertinent to the inspection of
    mines. They shall conduct such research and experimental work and tests as will
    provide for better working, health, and safety conditions in the mines and quarries,
    and will aid in the development and furtherance of such industries.
