- number: '1533.101'
  heading: Reissued license, stamp or permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Any person who has a current hunting or fishing license, a wetlands habitat
    stamp, a deer or wild turkey permit, or a fur taker permit pursuant to this chapter
    and has lost or destroyed the license, stamp, or permit, or had the license, stamp,
    or permit stolen, may be reissued such license, stamp, or permit. The person shall
    file with the clerk of the court of common pleas an application in affidavit form
    or, if the chief of the division of wildlife authorizes it, apply for a reissued
    license, stamp, or permit to an authorized agent designated by the chief, and
    pay a fee for each license, stamp, or permit of four dollars. The clerk or agent
    shall administer the oath to the applicant, issue a reissued license, stamp, or
    permit that shall allow the applicant to hunt, fish, or trap, as applicable, and
    send a copy of the reissued license, stamp, or permit to the division of wildlife.

    All moneys received as fees for the issuance of reissued licenses, stamps, or
    permits shall be transmitted to the director of natural resources to be paid into
    the state treasury to the credit of the funds to which the fees for the original
    licenses, stamps, and permits were credited.

    No person shall knowingly or willfully secure, attempt to secure, or use a reissued
    hunting or fishing license, wetlands habitat stamp, deer or wild turkey permit,
    or fur taker permit to which the person is not entitled. No person shall knowingly
    or willfully issue a reissued hunting or fishing license, wetlands habitat stamp,
    deer or wild turkey permit, or fur taker permit under this section to any person
    who is not entitled to receive and use such a reissued license, stamp, or permit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.101
- number: '1533.102'
  heading: Apprentice hunting licenses and fur taker permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The chief of the division of wildlife may adopt rules under section 1531.10
    of the Revised Code that the chief considers to be necessary to administer the
    issuance of apprentice hunting licenses and apprentice fur taker permits under
    sections 1533.10 and 1533.111 of the Revised Code, respectively, and their use,
    except that the rules shall not establish fee amounts for those licenses and permits
    that differ from the fee amounts established in those sections, as applicable.

    Unless otherwise provided by division rule, an apprentice license or permit is
    valid beginning on the first day of March and ending at midnight on the last day
    of February of the following year.

    Any type of apprentice hunting license authorizes the holder of such a license
    to hunt only while accompanied by another person who is twenty-one years of age
    or older and who possesses a valid hunting license. Any type of apprentice fur
    taker permit authorizes the holder of such a permit to hunt or trap fur-bearing
    animals only while accompanied by another person who is twenty-one years of age
    or older and who possesses a valid fur taker permit. No holder of a valid hunting
    license or fur taker permit shall accompany more than two holders of any type
    of apprentice hunting license or apprentice fur taker permit at one time.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.102
- number: '1533.103'
  heading: All purpose vehicles permits for mobility-impaired persons
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: The chief of the division of wildlife shall adopt rules under section 1531.10
    of the Revised Code that are necessary to administer the issuance of permits for
    the use of all-purpose vehicles or motor vehicles by persons with mobility impairments
    to hunt wild quadrupeds or game birds in public and private areas. The rules shall
    establish eligibility requirements, an application procedure, the duration of
    a permit, identification and designation of public and private areas in which
    all-purpose vehicles or motor vehicles may be used by permit holders, and any
    other procedures and requirements governing the permits that the chief determines
    are necessary. The chief shall not charge a fee for the issuance of a permit under
    this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.103
- number: '1533.11'
  heading: Special deer or wild turkey permits; fees; wildlife refunds fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A)(1) Except as provided in this section or section 1533.731 of the Revised
    Code, no person shall hunt deer on lands of another without first obtaining an
    annual deer permit. Except as provided in this section, no person shall hunt wild
    turkeys on lands of another without first obtaining an annual wild turkey permit.
    A deer or wild turkey permit is valid during the hunting license year in which
    the permit is purchased. Except as provided in rules adopted under division (B)
    of section 1533.12 of the Revised Code, each applicant for a deer or wild turkey
    permit shall pay an annual fee for each permit in accordance with the following
    schedule:


    Deer permit - resident$30.00Deer permit - nonresident$210.00Youth deer permit
    - resident and nonresident$15.00Senior deer permit - resident$11.00Wild turkey
    permit - resident$30.00Wild turkey permit - nonresident$37.00Youth wild turkey
    permit - resident and nonresident$15.00Senior wild turkey permit - resident$11.00

    (2) As used in division (A)(1) of this section:

    (a) "Youth" means an applicant who is under the age of eighteen years at the time
    of application for a permit.

    (b) "Senior" means an applicant who is sixty-five years of age or older at the
    time of application for a permit.

    (3) The money received shall be paid into the state treasury to the credit of
    the wildlife fund, created in section 1531.17 of the Revised Code, exclusively
    for the use of the division of wildlife in the acquisition and development of
    land for deer or wild turkey management, for investigating deer or wild turkey
    problems, and for the stocking, management, and protection of deer or wild turkey.

    (4) Every person, while hunting deer or wild turkey on lands of another, shall
    carry the person''s deer or wild turkey permit and exhibit it to any enforcement
    officer so requesting. Failure to so carry and exhibit such a permit constitutes
    an offense under this section.

    (5) The chief of the division of wildlife shall adopt any additional rules the
    chief considers necessary to carry out this section and section 1533.10 of the
    Revised Code.

    (6) An owner who is a resident of this state or an owner who is exempt from obtaining
    a hunting license under section 1533.10 of the Revised Code and the spouse, parents,
    children of any age, and grandchildren under eighteen years of age of the owner
    of lands in this state may hunt deer or wild turkey thereon without a deer or
    wild turkey permit. If the owner of land in this state is a limited liability
    company or a limited liability partnership that consists of three or fewer individual
    members or partners, as applicable, an individual member or partner who is a resident
    of this state and the member''s or partner''s parents, children of any age, and
    grandchildren under eighteen years of age may hunt deer or wild turkey on the
    land owned by the limited liability company or limited liability partnership without
    a deer or wild turkey permit. In addition, if the owner of land in this state
    is a trust that has a total of three or fewer trustees and beneficiaries, an individual
    who is a trustee or beneficiary and who is a resident of this state and the individual''s
    parents, children of any age, and grandchildren under eighteen years of age may
    hunt deer or wild turkey on the land owned by the trust without a deer or wild
    turkey permit. The tenant and children of the tenant may hunt deer or wild turkey
    on lands where they reside without a deer or wild turkey permit.

    (B) A deer or wild turkey permit is not transferable. No person shall carry a
    deer or wild turkey permit issued in the name of another person.

    (C) The wildlife refunds fund is hereby created in the state treasury. The fund
    shall consist of money received from application fees for deer permits that are
    not issued. Money in the fund shall be used to make refunds of such application
    fees.

    (D) If the division establishes a system for the electronic submission of information
    regarding deer or wild turkey that are taken, the division shall allow the owner
    and the children of the owner of lands in this state to use the owner''s name
    or address for purposes of submitting that information electronically via that
    system.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.11
- number: '1533.111'
  heading: Hunting or trapping fur taker permit - trapper education course
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) Except as provided in this section or division (A)(2) of section 1533.12
    of the Revised Code, no person shall hunt or trap fur-bearing animals on land
    of another without first obtaining some type of an annual fur taker permit.

    (B)(1) Except as otherwise provided in rules adopted under division (B) of section
    1533.12 of the Revised Code, each applicant for a fur taker permit or an apprentice
    fur taker permit shall pay an annual fee for each annual permit in accordance
    with the following schedule:


    Fur taker permit$14.00Apprentice fur taker permit$14.00Senior fur taker permit
    - resident only$7.00Apprentice senior fur taker permit - resident only$7.00Special
    youth fur taker permit$7.00Apprentice youth fur taker permit$7.00

    (2) As used in division (B)(1) of this section:

    (a) "Youth" means an applicant who is under the age of eighteen years at the time
    of application for a permit.

    (b) "Senior" means an applicant who is sixty-five years of age or older at the
    time of application for a permit.

    (C) Each type of fur taker permit is valid during the hunting license year in
    which the permit is purchased. The money received shall be paid into the state
    treasury to the credit of the fund established in section 1533.15 of the Revised
    Code. Apprentice fur taker permits and apprentice youth fur taker permits are
    subject to the requirements established under section 1533.102 of the Revised
    Code and rules adopted pursuant to it.

    (D)(1) No person shall issue a fur taker permit to an applicant unless it is accompanied
    by a written explanation of the law in section 1533.17 of the Revised Code and
    the penalty for its violation, including a description of terms of imprisonment
    and fines that may be imposed.

    (2) No person shall issue a fur taker permit, other than an apprentice fur taker
    permit or an apprentice youth fur taker permit, to an applicant unless the applicant
    presents to the agent authorized to issue a fur taker permit a previously held
    hunting license or trapping or fur taker permit or evidence of having held such
    a license or permit in content and manner approved by the chief of the division
    of wildlife, a certificate of completion issued upon completion of a trapper education
    course approved by the chief, or evidence of equivalent training in content and
    manner approved by the chief. A previously held apprentice hunting license, apprentice
    fur taker permit, or apprentice youth fur taker permit does not satisfy the requirement
    concerning the presentation of a previously held hunting license or fur taker
    permit or evidence of such a license or permit.

    (3) No person shall issue a fur taker permit, other than an apprentice fur taker
    permit or an apprentice youth fur taker permit, to any person who fails to present
    the evidence required by this section. No person shall purchase or obtain a fur
    taker permit, other than an apprentice fur taker permit or an apprentice youth
    fur taker permit, without presenting to the issuing agent the evidence required
    by this section. Issuance of a fur taker permit in violation of the requirements
    of this section is an offense by both the purchaser of the illegally obtained
    permit and the clerk or agent who issued the permit. Any fur taker permit issued
    in violation of this section is void.

    (E) The chief, with approval of the wildlife council, shall adopt rules prescribing
    a trapper education course for first-time fur taker permit buyers, other than
    buyers of apprentice fur taker permits or apprentice youth fur taker permits,
    and for volunteer instructors. The course shall consist of subjects that include,
    but are not limited to, trapping techniques, animal habits and identification,
    trapping tradition and ethics, the trapper and conservation, the law in section
    1533.17 of the Revised Code along with the penalty for its violation, including
    a description of terms of imprisonment and fines that may be imposed, and other
    law relating to trapping. Authorized personnel of the division of wildlife or
    volunteer instructors approved by the chief shall conduct the courses with such
    frequency and at such locations throughout the state as to reasonably meet the
    needs of permit applicants. The chief shall issue a certificate of completion
    to each person who successfully completes the course and passes an examination
    prescribed by the chief.

    (F) Every person, while hunting or trapping fur-bearing animals on lands of another,
    shall carry the person''s fur taker permit with the person''s signature written
    on the permit. Failure to carry such a signed permit constitutes an offense under
    this section. The chief shall adopt any additional rules the chief considers necessary
    to carry out this section.

    (G) An owner who is a resident of this state or an owner who is exempt from obtaining
    a hunting license under section 1533.10 of the Revised Code and the spouse, parents,
    children of any age, and grandchildren under eighteen years of age of the owner
    of lands in this state may hunt or trap fur-bearing animals thereon without a
    fur taker permit. If the owner of land in this state is a limited liability company
    or a limited liability partnership that consists of three or fewer individual
    members or partners, as applicable, an individual member or partner who is a resident
    of this state and the member''s or partner''s parents, children of any age, and
    grandchildren under eighteen years of age may hunt or trap fur-bearing animals
    on the land owned by the limited liability company or limited liability partnership
    without a fur taker permit. In addition, if the owner of land in this state is
    a trust that has a total of three or fewer trustees and beneficiaries, an individual
    who is a trustee or beneficiary and who is a resident of this state and the individual''s
    parents, children of any age, and grandchildren under eighteen years of age may
    hunt or trap fur-bearing animals on the land owned by the trust without a fur
    taker permit. The tenant and children of the tenant may hunt or trap fur-bearing
    animals on lands where they reside without a fur taker permit.

    (H) A fur taker permit is not transferable. No person shall carry a fur taker
    permit issued in the name of another person.

    (I) A fur taker permit entitles a nonresident to take from this state fur-bearing
    animals taken and possessed by the nonresident as provided by law or division
    rule.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
