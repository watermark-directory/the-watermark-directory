  heading: Agreements with federal government for forest management projects
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: The chief of the division of forestry may enter into agreements with the federal
    government under 16 U.S.C. 2113a or other applicable federal statutes for the
