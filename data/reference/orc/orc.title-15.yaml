    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'The chief of the division of mineral resources management may designate not
    more than thirty deputy mine inspectors, at least one of whom shall be classified
    and appointed as electrical inspector provided for in division (B) of section
    1561.12 of the Revised Code; one superintendent of rescue stations; three assistant
    superintendents of rescue stations; three chemists; and such clerks, stenographers,
    and other employees as are necessary for the administration of this chapter and
    Chapters 1563., 1565., and 1567. and applicable provisions of Chapter 1509. of
    the Revised Code.

    Such officers, employees, and personnel shall be appointed and employed under
    such conditions and qualifications as set forth in those chapters.'
