- number: '1533.722'
  heading: Administrative penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: The chief of the division of wildlife, by rule adopted pursuant to section
    1531.08 of the Revised Code, may levy an administrative penalty against any person
    who violates section 1533.721 of the Revised Code or any division rule regarding
    wild animal hunting preserves. The chief shall levy the administrative penalty
