- number: '1504.01'
  heading: Office of real estate and land management; creation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1504'
    name: Office Of Real Estate And Land Management
  text: There is hereby created in the department of natural resources the office
    of real estate and land management. The director of natural resources shall appoint
    a chief to administer the office. The chief shall act as the director's designee
    and carry out the duties of the chief on behalf of the director. Subject to the
    approval of the director, the chief shall employ assistants and other employees
    as necessary to execute the duties of the office as prescribed by this chapter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1504.01
- number: '1504.02'
  heading: Duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1504'
    name: Office Of Real Estate And Land Management
  text: '(A) The office of real estate and land management shall do all of the following:

    (1) Except as otherwise provided in the Revised Code, coordinate and conduct all
    real estate functions for the department of natural resources, including acquiring
    land by purchase, lease, gift, devise, bequest, appropriation, or otherwise; administering
    grants through sales, leases, exchanges, easements, and licenses; performing inventories
    of land; and performing other related general management duties;

    (2) Cooperate with federal agencies and political subdivisions in administering
    federal recreation moneys under the "Land and Water Conservation Fund Act of 1965,"
    78 Stat. 897, 16 U.S.C. 4601-8, and prepare and distribute the statewide comprehensive
    outdoor recreation plan;

    (3) Prepare special studies and execute any other duties, functions, and responsibilities
    requested by the director of natural resources;

    (4) Administer the real estate services associated with canal lands on behalf
    of the director under Chapter 1520. of the Revised Code.

    (B) The office may do any of the following:

    (1) Coordinate environmental matters concerning the department and the state as
    are necessary to comply with the "National Environmental Policy Act of 1969,"
    83 Stat. 852, 42 U.S.C. 4321, the "Intergovernmental Cooperation Act of 1968,"
    82 Stat. 1098, 31 U.S.C. 6506, and the "Federal Water Pollution Control Act,"
    91 Stat. 1566 (1977), 33 U.S.C. 1251, and regulations adopted under those acts;

    (2) Survey land;

    (3) As considered necessary by the director, administer any state or federally
    funded grant program that is related to natural resources or recreation;

    (4) Coordinate department projects, programs, policies, procedures, and activities
    with the United States army corps of engineers and other federal agencies;

    (5) Coordinate department activities associated with the completion of drainage
    ditch improvements in accordance with Chapters 6131. and 6133. of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1504.02
- number: '1504.03'
  heading: Surveys and inspections
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1504'
    name: Office Of Real Estate And Land Management
  text: The chief of the office of real estate and land management or an employee
    of the office may enter upon lands to make surveys and inspections when necessary
    for the purposes of this chapter. The chief shall provide reasonable notice of
    any proposed entry to the owner or person in possession of the land to be surveyed
    or inspected not less than forty-eight hours and not more than thirty days prior
    to the date of entry. An entry conducted under this section does not constitute
    trespass.
