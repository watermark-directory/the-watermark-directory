- number: '1561.13'
  heading: Examinations
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'The chief of the division of mineral resources management shall conduct examinations
    for offices and positions in the division of mineral resources management, and
    for mine forepersons, mine electricians, and surface mine blasters, as follows:

    (A) Division of mineral resources management:

    (1) Deputy mine inspectors of underground mines;

    (2) Deputy mine inspectors of surface mines;

    (3) Electrical inspectors;

    (4) Superintendent of rescue stations;

    (5) Assistant superintendents of rescue stations;

    (6) Mine chemists at a division laboratory if the chief chooses to operate a laboratory.

    (B) Mine forepersons:

    (1) Mine foreperson of gaseous mines;

    (2) Mine foreperson of nongaseous mines;

    (3) Mine foreperson of surface mines.

    (C) Forepersons:

    (1) Foreperson of gaseous mines;

    (2) Foreperson of nongaseous mines;

    (3) Foreperson of surface mines.

    (D) Mine electricians.

    (E) Surface mine blasters.

    The chief annually shall provide for the examination of candidates for appointment
    or promotion as deputy mine inspectors and such other positions and offices set
    forth in division (A) of this section as are necessary. Special examinations may
    be held whenever it becomes necessary to make appointments to any of those positions.

    The chief shall provide for the examination of persons seeking certificates of
    competency as mine forepersons, forepersons, mine electricians, and surface mine
    blasters as needed and at such times and places within the state as shall, in
    the judgment of the chief, afford the best facilities to the greatest number of
    applicants.

    The examinations provided for in this section shall be conducted under rules adopted
    under section 1561.05 of the Revised Code and conditions prescribed by the chief.
    Any rules that relate to particular candidates shall, upon application of any
    candidate, be furnished to the candidate by the chief; they shall also be of uniform
    application to all candidates in the several groups.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.13
- number: '1561.14'
  heading: Qualifications of mine electrician
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: '(A) Except as provided in division (B) of this section, a person who applies
    for a certificate as a mine electrician shall be able to read and write the English
    language, and prior to the date of the application for examination either shall
    have had at least one year''s experience in performing electrical work underground
    in a coal mine, in the surface work area of an underground coal mine, in a surface
    coal mine, or in a noncoal mine, or shall have had such experience as the chief
    of the division of mineral resources management determines to be equivalent. Each
    applicant for examination shall pay a fee of ten dollars to the chief on the first
    day of the examination. Any money collected under this section shall be paid into
    the state treasury to the credit of the mining regulation and safety fund created
    in section 1513.30 of the Revised Code.

    (B) The chief shall issue a mine electrician certificate in accordance with Chapter
    4796. of the Revised Code to an applicant if either of the following applies:

    (1) The applicant holds a license or certificate in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a mine electrician
    in a state that does not issue that license or certificate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.14
- number: '1561.15'
  heading: Practical examination by chief
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: '(A) Except as provided in division (B) of this section, an applicant for
    a certificate as mine foreperson, foreperson, mine electrician, shot firer, surface
    mine blaster, or fire boss shall apply to the chief of the division of mineral
    resources management for examination and shall be examined by the chief. This
    shall be a practical examination, a substantial part of which shall be oral, to
    determine the competency of the applicant, based on experience and practical knowledge
    of the dangers incident to coal mining, and not upon technical education, but
    consideration shall be given such technical education as the applicant possesses.
    This examination shall be held as soon after application is made as practicable
    in the district from which the applicant makes application.

    (B) The chief may require an applicant for a certificate as mine foreperson, foreperson,
    mine electrician, shot firer, surface mine blaster, or fire boss to pass an examination
    in accordance with Chapter 4796. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.15
- number: '1561.16'
  heading: Credit for practical experience - qualifications of foreperson of gaseous
    mines - recertification
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: '(A) As used in this section and sections 1561.17 to 1561.20 of the Revised
    Code, "actual practical experience" means previous employment that involved a
    person''s regular presence in the type of mining operation in which the experience
    is required to exist; participation in functions relating to the hazards involved
    in and the utilization of equipment, tools, and work crews and individuals for
    that type of mining; and regular exposure to the methods, procedures, and safety
    laws applicable to that type of mining. Credit of up to one year for a portion
    of the required experience time may be given upon documentation to the chief of
    the division of mineral resources management of an educational degree in a field
    related to mining. Credit of up to two years of the required experience time may
    be given upon presentation to the chief of proof of graduation from an accredited
    school of mines or mining after a four-year course of study with employment in
    the mining industry during interim breaks during the school years.

    (B) Except as provided in division (G) of this section, a person who applies for
    a certificate as a mine foreperson of gaseous mines shall be able to read and
    write the English language; shall have had at least five years'' actual practical
    experience in the underground workings of a gaseous mine or the equivalent thereof
    in the judgment of the chief; and shall have had practical experience obtained
    by actual contact with gas in mines and have knowledge of the dangers and nature
    of noxious and explosive gases and ventilation of gaseous mines. An applicant
    for a certificate as a foreperson of gaseous mines shall meet the same requirements,
    except that the applicant shall have had at least three years'' actual practical
    experience in the underground workings of a gaseous mine or the equivalent thereof
    in the judgment of the chief. Each applicant for examination shall pay a fee established
    in rules adopted under this section to the chief on the first day of such examination.

    (C) A person who has been issued a certificate as a mine foreperson or a foreperson
    of a gaseous mine and who has not worked in an underground coal mine for a period
    of more than two calendar years shall apply for and obtain recertification from
    the chief in accordance with rules adopted under this section before performing
    the duties of a mine foreperson or a foreperson of a gaseous mine. An applicant
    for recertification shall pay a fee established in rules adopted under this section
    at the time of application for recertification.

    (D) A person who has been issued a certificate as a mine foreperson or a foreperson
    of a gaseous mine and who has not worked in an underground coal mine for a period
    of one or more calendar years shall successfully complete a retraining course
    in accordance with rules adopted under this section before performing the duties
    of a mine foreperson or a foreperson of a gaseous mine.

    (E) The chief, in consultation with a statewide association representing the coal
    mining industry and a statewide association representing employees of coal mines,
    shall adopt rules in accordance with Chapter 119. of the Revised Code that do
    all of the following:

    (1) Prescribe requirements, criteria, and procedures for the recertification of
    a mine foreperson or a foreperson of a gaseous mine who has not worked in an underground
    coal mine for a period of more than two calendar years;

    (2) Prescribe requirements, criteria, and procedures for the retraining of a mine
    foreperson or a foreperson of a gaseous mine who has not worked in an underground
    coal mine for a period of one or more calendar years;

    (3) Establish fees for the examination and recertification of mine forepersons
    or forepersons of gaseous mines under this section;

    (4) Prescribe any other requirements, criteria, and procedures that the chief
    determines are necessary to administer this section.

    (F) Any money collected under this section shall be paid into the state treasury
    to the credit of the mining regulation and safety fund created in section 1513.30
    of the Revised Code.

    (G) The chief shall issue a certificate as a foreperson of gaseous mines in accordance
    with Chapter 4796. of the Revised Code to an applicant if either of the following
    applies:

    (1) The applicant holds a license or certificate in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a foreperson of gaseous
    mines in a state that does not issue that license or certificate.'
