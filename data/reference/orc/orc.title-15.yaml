- number: '1545.10'
  heading: Contract with corporation or association maintaining museum of natural
    history
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: The board of park commissioners may contract for a term not exceeding three
    years, upon such terms as the board deems expedient, with any private corporation
    or association not for profit maintaining a museum of natural history in any county
    within which the park district is located in whole or in part, or which has for
    its object the promotion of interest in or the conservation and preservation of
    the flora or fauna in any portion or all of the territory comprising the district,
    for the purpose of obtaining for such district such services and assistance as
    can be rendered by such corporation or association.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.10
- number: '1545.11'
  heading: Board of park commissioners - power to acquire lands
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'The board of park commissioners may acquire lands either within or without
    the park district for conversion into forest reserves and for the conservation
    of the natural resources of the state, including streams, lakes, submerged lands,
    and swamplands, and to those ends may create parks, parkways, forest reservations,
    and other reservations and afforest, develop, improve, protect, and promote the
    use of the same in such manner as the board deems conducive to the general welfare.
    Such lands may be acquired by such board, on behalf of said district, (1) by gift
    or devise, (2) by purchase for cash, by purchase by installment payments with
    or without a mortgage, by entering into lease-purchase agreements, by lease with
    or without option to purchase, or, (3) by appropriation. In furtherance of the
    use and enjoyment of the lands controlled by it, the board may accept donations
    of money or other property, or may act as trustees of land, money, or other property,
    and use and administer the same as stipulated by the donor, or as provided in
    the trust agreement. The terms of each such donation or trust shall first be approved
    by the probate court before acceptance by the board.

    In case of appropriation, the proceedings shall be instituted in the name of the
    board, and shall be conducted in the manner provided in sections 163.01 to 163.22,
    inclusive, of the Revised Code.

    This section applies to districts created prior to April 16, 1920.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.11
- number: '1545.12'
  heading: Sale or lease of lands - notice - approval by probate court
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) Except as provided in division (B) of this section, if the board of park
    commissioners finds that any lands that it has acquired are not necessary for
    the purposes for which they were acquired by the board, it may sell and dispose
    of the lands upon terms the board considers advisable. The board also may lease
    or permit the use of any lands for purposes not inconsistent with the purposes
    for which the lands were acquired, and upon terms the board considers advisable.
    No lands shall be sold pursuant to this division without first giving notice of
    the board''s intention to sell the lands by publication once a week for four consecutive
    weeks in a newspaper of general circulation in the district or as provided in
    section 7.16 of the Revised Code. The notice shall contain an accurate description
    of the lands and shall state the time and place at which sealed bids will be received
    for the purchase of the lands, and the lands shall not thereafter be sold at private
    sale for less than the best and highest bid received without giving further notice
    as specified in this division.

    (B)(1) After compliance with division (B)(2) of this section, the board of park
    commissioners may sell land upon terms the board considers advisable to any park
    district established under section 511.18 or Chapter 1545. of the Revised Code,
    any political subdivision of the state, the state or any department or agency
    of the state, or any department or agency of the federal government for conservation
    uses or for park or recreation purposes without the necessity of having to comply
    with division (A) of this section.

    (2) Before the board of park commissioners may sell land under division (B)(1)
    of this section, the board shall offer the land for sale to each of the following
    public agencies that is authorized to acquire, develop, and maintain land for
    conservation uses or for park or recreation purposes: each park district established
    under section 511.18 or Chapter 1545. of the Revised Code or political subdivision
    in which the land is located, each park district that is so established and that
    adjoins or each political subdivision that adjoins a park district so established
    or political subdivision in which the land is located, and each agency or department
    of the state or of the federal government that operates parks or conservation
    or recreation areas near the land. The board shall make the offer by giving a
    written notice that the land is available for sale, by first class mail, to these
    public agencies. A failure of delivery of the written notice to any of these public
    agencies does not invalidate any proceedings for the sale of land under this division.
    Any public agency that is so notified and that wishes to purchase the land shall
    make an offer to the board in writing not later than sixty days after receiving
    the written notice.

    If there is only one offer to purchase the land made in that sixty-day period,
    the board need not hold a public hearing on the offer. The board shall accept
    the offer only if it determines that acceptance of the offer will result in the
    best public use of the land.

    If there is more than one offer to purchase the land made in that sixty-day period,
    the board shall not accept any offer until the board holds a public hearing on
    the offers. If, after the hearing, the board decides to accept an offer, it shall
    accept the offer that it determines will result in the best public use of the
    land.

    (C) No lands shall be sold under this section at either public or private sale
    without the approval of the probate court of the county in which the lands are
    situated.'
