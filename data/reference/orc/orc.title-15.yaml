- number: '1505.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: '(A) Whoever violates section 1505.07 of the Revised Code shall be fined not
    less than one thousand nor more than two thousand dollars on a first offense;
    on each subsequent offense, the person shall be fined not less than two thousand
    nor more than five thousand dollars.

    (B) Whoever violates section 1505.04 or 1505.10 of the Revised Code shall be fined
    not less than one hundred nor more than one thousand dollars on a first offense;
    on each subsequent offense, the person shall be fined not less than one thousand
    nor more than two thousand dollars. Notwithstanding any section of the Revised
    Code relating to the distribution or crediting of fines for violations of the
    Revised Code, all fines imposed under this division shall be paid into the geological
    mapping fund created in section 1505.09 of the Revised Code.'
