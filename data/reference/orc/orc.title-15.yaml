- number: '1567.46'
  heading: Windlass required
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'When the only means of egress is by vertical shaft in which cages or elevators
    are used as a means of hoisting persons employed in a mine, and the power for
    operating same is derived from but one source, the owner, lessee, or agent shall
    provide and keep on hand a suitable windlass capable of hoisting persons from
    the mine, for use in the event of an accident to the hoisting apparatus or the
    power by which the same is operated.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.46
- number: '1567.47'
  heading: Qualifications of persons in charge of hoisting engine
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The owner, lessee, or agent of a mine worked by a shaft or slope, shall put
    only experienced, competent, and sober persons in charge of an engine used for
    lowering into or hoisting out of such mine persons employed therein.

    No owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.47
- number: '1567.48'
  heading: Safe appliances for ingress and egress in shaft
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of a mine shall provide and maintain safe appliances, approved
    by the deputy mine inspector, for the ingress and egress of persons in each shaft,
    designated by such owner, lessee, or agent as a means of ingress and egress for
    persons employed therein. When there is but one shaft available for ingress and
    egress from any unavoidable cause, the appliances therein shall be kept available
    at all times to persons employed in such mine. When such appliances in any shaft
    are rendered unavailable, the same shall be restored without delay.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.48
- number: '1567.49'
  heading: Lowering and hoisting of persons by vertical shaft
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of a mine, at which the only means of ingress and egress for
    the persons employed therein is by a vertical shaft of fifty feet or more in depth,
    shall designate one or more persons who shall attend to the lowering and hoisting
    of persons into and out of such mine, and give and receive the proper signals,
    governing the movement of the cage while engaged in handling men. At all shaft
    mines where persons are lowered into or hoisted out of the mine, the number of
    men to be carried on the cage or skip at any one time shall be determined by the
    area of the cage or skip in use, allowing not less than four hundred square inches
    for each person on the cage or skip. The lowering of persons shall begin in time
    for persons to reach their working places by the hour appointed for such mine
    to commence work and continue until starting time. Hoisting of persons shall commence
    at the time for such mine to cease work, and continue until all have had time
    to be hoisted. Persons may be hoisted at such other times as will not interfere
    with the hoisting of coal or other products. No person shall be lowered into or
    hoisted out of a mine with powder, explosives, tools, or other material on any
    cage, in the same shaft, and no person shall be lowered or hoisted in a vertical
    shaft in a mine car. When the vertical shaft is less than fifty feet in depth
    and a stairway, approved by the deputy mine inspector, is not provided, the operator
    shall be required to lower or hoist persons, as prescribed in this section, but
    when such stairway is provided, the hoisting of persons shall not be required.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.49
- number: '1567.50'
  heading: Regulations for speaking tube, cages, and safety gate
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of a mine operated by a shaft shall provide and maintain a metal
    tube, suitable for conversation between persons, connecting the engine room with
    the top and bottom of such shaft. The cages operated in said shaft shall have
    an approved safety catch, a sufficient cover, and rings or other adequate handholds
    for the accommodation of the number of persons permitted on the cage. Such cages
    shall be protected on each side by a boiler plate not less than one-fourth inch
    in thickness and not less than three feet high, and a gate or other secure device,
    approved by the deputy mine inspector, not less than forty-two inches high shall
    be fastened across the open ends of such cage when men are being regularly lowered
    and hoisted. There shall be provided an approved safety gate at the top of each
    shaft, an adequate brake to control the drum used for lowering or hoisting persons
    in shafts or slopes, and an indicator on all machines used for such purposes to
    show the location of cages in the shaft or slope. No cage having an unstable or
    self-dumping platform shall be used for the carriage of persons unless such platform
    is securely locked.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.50
- number: '1567.51'
  heading: Signal code
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'At each mine operated by a shaft, the means of signaling to and from the
    bottom man, the top man, and the engineer shall consist of a tube, or tubes, of
    wire encased in wood or iron pipes, through which signals shall be communicated
    by electricity, compressed air, or other devices.

    All proper precautions shall be taken to prevent electric signal and telephone
    wires from coming into contact with other electric conductors, whether insulated
    or not.

    Bells, wires, insulators, contact-makers, and other apparatus used in connection
    with electric signaling underground, shall be of substantial and reliable construction,
    and be erected in such a manner as to reduce failures or false signals to a minimum.

    In any mine, signal circuits for operating lamps or other signal devices at potentials
    exceeding twenty-five volts shall be adequately insulated and considered as power
    circuits and shall be installed as such.

    The following signals are provided for use at mines where signals are required:

    (A) From the bottom to the top:

    (1) One ring or whistle from the bottom to the top shall signify to hoist coal
    or the empty cage, and also to stop either when in motion.

    (2) Two rings or whistles shall signify to lower cage.

    (3) Three rings or whistles shall signify that men are coming up; when return
    signal is received from the engineer, men will get on the cage, and cager shall
    ring or whistle one to start.

    (4) Four rings or whistles shall signify to hoist slowly, implying danger.

    (5) Five rings or whistles shall signify accident in the mine and a call for a
    stretcher.

    (B) From the top to the bottom:

    (1) One ring or whistle from the top to the bottom shall signify: "All ready,
    get on cage."

    (2) Two rings or whistles shall signify: "Send away empty cage."

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.51
- number: '1567.52'
  heading: Additions to code of signals - posting
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The management of any mine may, with the consent of the deputy mine inspector,
    add to the code of signals to increase its efficiency, or to promote the safety
    of the workers in such mine, but whatever code is established and in use at any
    mine shall be approved by the division of mineral resources management, and conspicuously
    posted at the top, at the bottom, and in the engine room, for the information
    and instruction of all persons concerned.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.52
- number: '1567.53'
  heading: Emergency signal in vertical shaft
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'At each mine where persons are hoisted in a vertical shaft, an emergency
    signal shall be provided in such manner that persons can give signals from the
    cage if the cage is stopped between the top and bottom landings.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.53
- number: '1567.54'
  heading: Adequate fire protection - firefighting equipment
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'At each mine at which the only means of egress is by vertical shaft, the
    operator shall provide adequate fire protection to secure the safety of such shaft,
    and, when but one shaft is the only available means of egress, shall keep in attendance
    a competent person when persons are inside of such mine.

    Each underground coal mine shall be provided with suitable firefighting equipment
    adapted for the size and conditions of the mine. The chief of the division of
    mineral resources management shall adopt and may amend or rescind rules establishing
    minimum requirements for the type, quality, and quantity of such equipment. The
    rules shall include the following minimum firefighting equipment at each underground
    coal mine, regardless of its size or condition, except where indicated: waterlines
    shall be capable of delivering fifty gallons of water a minute at a nozzle pressure
    of fifty pounds per square inch. A portable water car shall be of at least one
    thousand gallon capacity and shall have at least three hundred feet of fire hose
    with nozzles. A portable water car shall be capable of providing a flow through
    the hose of fifty gallons of water per minute at a nozzle pressure of fifty pounds
    per square inch. A portable chemical car shall carry enough chemicals to provide
    a fire extinguishing capacity equivalent to that of a portable water car. A portable
    foam-generating machine or device shall have facilities and equipment for supplying
    the machine with thirty gallons of water per minute at thirty pounds per square
    inch for a period of thirty-five minutes. A portable fire extinguisher shall be
    either a multipurpose dry chemical type containing a nominal weight of five pounds
    of dry powder and enough expellant to apply the powder or a foam-producing type
    containing at least two and one-half gallons of foam-producing liquids and enough
    expellant to supply the foam. Only fire extinguishers approved by the underwriters
    laboratories, incorporated, or factory mutual research corporation, carrying appropriate
    labels as to type and purpose, shall be used. After January 1, 1977, all new portable
    fire extinguishers acquired for use in a coal mine shall have a 2A 10 BC or higher
    rating.

    Fire hose shall be lined with a material having flame resistant qualities meeting
    requirements for hose in Bureau of Mines'' Schedule 2G. The cover shall be polyester,
    or other material with flame-spread qualities and mildew resistance equal or superior
    to polyester. The bursting pressure shall be at least four times the water pressure
    at the valve to the hose inlet with the valve closed; the maximum water pressure
    in the hose nozzle shall not exceed one hundred pounds per square inch, gauge.
    However, fire hose installed for use in underground coal mines prior to December
    30, 1970, shall be mildew-proof and have a bursting pressure at least four times
    the water pressure at the valve to the hose inlet with the valve closed, and the
    maximum water pressure in the hose nozzle with water flowing shall not exceed
    one hundred pounds per square inch, gauge.

    Each working section of an underground coal mine producing three hundred tons
    or more per shift shall be provided with two portable fire extinguishers and two
    hundred forty pounds of rock dust in bags or other suitable containers; waterlines
    shall extend to each section loading point and be equipped with enough fire hose
    to reach each working face unless the section loading point is provided with two
    portable water cars, or two portable chemical cars, or one portable water or chemical
    car and either a portable foam-generating machine or a portable high-pressure
    rock-dusting machine fitted with at least two hundred fifty feet of hose and supplied
    with at least sixty sacks of rock dust.

    Each working section of an underground coal mine producing less than three hundred
    tons of coal per shift shall be provided with two portable fire extinguishers,
    one hundred forty pounds of rock dust in bags or other suitable containers, and
    at least five hundred gallons of water and at least three pails of ten quart capacity.
    In lieu of the five hundred gallon water supply a waterline of sufficient hose
    to reach the working places, a portable water car of at least five hundred gallon
    capacity, or a portable, all-purpose dry powder chemical car of at least one hundred
    twenty-five pounds capacity may be provided.

    In all underground coal mines, waterlines shall be installed parallel to the entire
    length of belt conveyors and shall be equipped with fire hose outlets with valves
    at three hundred foot intervals along each belt conveyor and at tailpieces. At
    least five hundred feet of fire hose with fittings suitable for connection with
    each belt conveyor waterline system shall be stored at strategic locations along
    the belt conveyor. Waterlines may be installed in entries adjacent to the conveyor
    entry belt as long as the outlets project into the belt conveyor entry.

    In underground coal mines producing three hundred tons of coal or more per shift,
    waterlines shall be installed parallel to all haulage tracks using mechanized
    equipment in the track or adjacent entry and shall extend to the loading point
    of each working section. Waterlines shall be equipped with outlet valves at intervals
    of not more than five hundred feet, and five hundred feet of fire hose with fittings
    suitable for connection with such waterlines shall be provided at strategic locations.
    Two portable water cars, readily available may be used in lieu of waterlines prescribed
    under this paragraph.

    In underground coal mines producing less than three hundred tons of coal per shift,
    a tank of water of at least fifty-five gallon capacity with at least three pails
    of not less than ten-quart capacity, or not less than two hundred forty pounds
    of bagged rock dust shall be provided at five hundred foot intervals along all
    main and secondary haulage roads.

    Each track or offtrack locomotive, self-propelled mantrip car, or personnel carrier
    shall be equipped with one portable fire extinguisher.

    Two portable fire extinguishers or one extinguisher having at least ten pounds
    of dry powder or five gallons of foam-producing liquids shall be provided at each
    permanent electrical installation. One portable fire extinguisher and two hundred
    forty pounds of rock dust shall be provided at each temporary electrical installation.

    One portable fire extinguisher or two hundred forty pounds of rock dust shall
    be provided at locations where welding, cutting, or soldering with arc or flame
    is being done.

    At each wooden door through which power lines pass there shall be one portable
    fire extinguisher or two hundred forty pounds of rock dust within twenty-five
    feet of the door on the intake air side.

    At each underground coal mine producing three hundred tons of coal or more per
    shift there shall be readily available the following materials at locations not
    exceeding two miles from each working section: one thousand board feet of brattice
    boards, two rolls of brattice cloth, two hand saws, twenty-five pounds of eightpenny
    nails, twenty-five pounds of tenpenny nails, twenty-five pounds of sixteenpenny
    nails, three claw hammers, twenty-five bags of wood fiber plaster or ten bags
    of cement or equivalent material for stoppings, and five tons of rock dust. These
    materials shall be available at each mine producing less than three hundred tons
    of coal per shift, except that if the active working sections are located at a
    distance of two miles or less from the surface, the emergency materials for one
    or more mines may be stored at a central warehouse or building supply company,
    and such supply shall be the equivalent of that required for all mines involved
    and within one hour''s delivery time from each mine.

    All fire fighting equipment shall be maintained in a usable and operative condition.
    Chemical extinguishers shall be examined every six months and the date of the
    examination shall be written on a permanent tag attached to the extinguisher.

    The operator shall give each miner a self-rescue device that is adequate to protect
    the miner for one hour or longer and is approved by the chief. Such self-rescue
    devices shall be worn or carried on the person of each miner. However, where the
    wearing or carrying of self-rescue devices is hazardous to a miner, such devices
    shall be located at a distance no greater than twenty-five feet from the miner.
    Where a miner works on or around mobile equipment, self-rescue devices, if not
    carried by the miner, shall be placed in a readily accessible location on such
    equipment.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.54
- number: '1567.55'
  heading: Report of coal seam fire - covering of exposed surface to prevent fire
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of any coal mine or the owner of land bearing natural coal deposits
    immediately upon learning of a fire in any coal seam upon the operator''s or owner''s
    property shall report the fire to the chief of the division of mineral resources
    management.

    When a coal seam fire is reported to the chief, the chief shall immediately investigate
    such fire. In the event of a fire in any outcrop of a coal seam or in an abandoned
    mine, the chief shall extinguish such fire, and the chief may employ such persons
    and purchase such materials as are necessary to extinguish such fire. Persons
    so employed shall serve at the pleasure of the chief and their employment shall
    not be governed by civil service laws, rules, or regulations. Materials purchased
    for immediate use in extinguishing a fire shall be emergency purchases and shall
    be paid for out of state funds appropriated for such purpose upon vouchers issued
    by the chief certifying to the emergency nature of the purchase, notwithstanding
    the fact that there has been no compliance with other laws governing the making
    of purchases by the state.

    Whenever, after August 26, 1949, the surface of a natural deposit of coal is exposed
    by mining operations, the chief may order the owner, lessee, or agent of the mine
    at which such exposure occurs to cover such exposed surface with earth or other
    noncombustible material if, in the judgment of the chief, such covering is necessary
    to prevent a fire in the coal that would endanger life or property. Such order
    shall be in writing and shall fix a reasonable time for compliance therewith.
    No operator of a mine shall refuse or neglect to comply with such order for a
    period of fifteen days after the expiration of the time fixed in such order for
    compliance therewith. Each period of fifteen days after the expiration of the
    time fixed in such order for compliance therewith, during which any such operator
    refuses or neglects to comply with such order, constitutes a separate offense.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.55
- number: '1567.57'
  heading: Two-way communication system
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Every operator of a mine shall install and maintain in efficient working
    condition a system of two-way communications approved by the chief of the division
    of mineral resources management connecting the surface and each landing of main
    shafts and slopes between the surface and each working section of any coal mine
    that is more than one hundred feet from a portal.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.57
- number: '1567.58'
  heading: Lights in mines
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of each mine shall provide an enclosed lard or signal oil lamp
    or lantern approved by the deputy mine inspector, or incandescent electric light,
    at such points in the mine as are necessary, including at the top of extreme grades
    and in underground stations where machinery is installed. No open light shall
    be used for fixed or stationary purposes, and no coal oil or kerosene lamp or
    lanterns shall be used in a mine.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.58
- number: '1567.59'
  heading: Flame safety lamps
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of an underground coal mine shall keep on hand in proper condition
    for use not less than one approved flame safety lamp, other approved methane detector,
    or other approved device capable of detecting methane gas in equivalent quantities
    as a flame safety lamp, for each fifty men employed in said mine, and upon the
    order of the deputy mine inspector, shall provide such additional flame safety
    lamps or approved methane detectors as are required to meet probable emergency.

    This section does not apply to clay mines, except when such equipment is deemed
    necessary by the deputy mine inspector.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.59
- number: '1567.60'
  heading: Recording pressure gauge
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of any underground mine shall have a U tube or recording pressure
    gauge for the purpose of recording pressure or vacuum of the main air current
    installed in such mine. A record of the readings of such gauge shall be kept in
    a book which shall be accessible to the deputy mine inspector and all of such
    records of readings shall be kept so accessible for not less than one year.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.60
- number: '1567.61'
  heading: First aid and emergency medical equipment - report of arrangements for
    emergency medical assistance and transportation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'As used in this section, "emergency medical service organization" has the
    same meaning as in section 4765.01 of the Revised Code.

    The operator at all mines and quarries shall keep first aid and emergency medical
    equipment in a dry and sanitary condition in accessible places.

    Each operator shall report to the chief of the division of mineral resources management,
    the name, title, and address of each emergency medical service organization with
    which arrangements have been made or otherwise provided. Each operator shall,
    within ten days after any change of the arrangements, report such changes to the
    chief. If such changes involve a substitution of persons, the operator shall report
    the name, title, and address of the person substituted together with the name
    and address of the emergency medical service organization with which such person
    is associated. Each operator shall, immediately after making such an arrangement
    or any change of such arrangement, post at appropriate places at the mine the
    names, titles, addresses, and telephone numbers of all persons or organizations
    currently available under such arrangements to provide medical assistance and
    transportation at the mine. The operator of an underground mine shall provide
    a vehicular mode of transportation that is equipped to handle stretchers to transport
    injured miners underground in a manner that minimizes shock. Such vehicle shall
    be accessible within the lesser of thirty minutes or the time needed to render
    first aid and medical attention, secure the injured person to a stretcher or broken-back
    board or other device, and transport the injured person to the vehicle.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.61
- number: '1567.62'
  heading: Obstruction of airway
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: No person shall place refuse in or obstruct any airway or break-through used
    as an airway.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.62
- number: '1567.63'
  heading: Use of traveling ways - loitering prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: Each employee of a mine shall go to and from his place of duty by the traveling
    ways provided. He shall not travel around the mine, or the buildings, tracks,
    or machinery connected therewith, where duty does not require, and when not on
    duty, he shall not loiter at, in, or around the mine, or the buildings, tracks,
    or machinery connected therewith.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.63
- number: '1567.64'
  heading: Operator to provide tag lines or tie-off lines for miners
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) As used in this section, "tag lines" and "tie-off lines" have the same
    meanings as in rules adopted under this section.

    (B) The operator of an underground coal mine shall provide tag lines or tie-off
    lines for each miner at the mine. The operator shall provide and employees of
    the mine shall use tag lines or tie-off lines in accordance with requirements
    and procedures established in rules adopted under this section.

    (C) The chief of the division of mineral resources management, in consultation
    with a statewide association representing the coal mining industry and a statewide
    association representing employees of coal mines, shall adopt rules in accordance
    with Chapter 119. of the Revised Code concerning the use of tag lines or tie-off
    lines in an underground coal mine. The rules shall include all of the following:

    (1) A definition of "tag line" and of "tie-off line";

    (2) A description or list of acceptable tag lines and tie-off lines;

    (3) Procedures and requirements for the use of tag lines and tie-off lines;

    (4) Procedures for the approval and inspection of the use of tag lines and tie-off
    lines in a mine;

    (5) Any other requirements concerning tag lines or tie-off lines that the chief
    determines are necessary.

    (D) No operator of a mine shall refuse or neglect to comply with this section
    or rules adopted under it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.64
- number: '1567.65'
  heading: Prohibition against smoking or carrying smoking materials
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: No person shall smoke or carry smoking materials or matches or lighters for
    smoking material in an underground coal mine or any underground gaseous metal
    or nonmetal mine. Smoking in nongaseous metal and nonmetal underground mines or
    in or about surface structures of any mine shall be restricted to places where
    it will not cause a fire or hazard.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.65
- number: '1567.66'
  heading: Prohibition against intoxicants
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: No person shall go into, to, or around a mine, or the buildings, tracks, or
    machinery connected therewith, while under the influence of intoxicants. No person
    shall use, carry, or have in his possession any intoxicants at, in, or around
    a mine, or the buildings, tracks, or machinery connected therewith.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.66
- number: '1567.67'
  heading: Protective clothing
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: Each man working in and about a mine shall exercise discretion in wearing
    such clothes as will protect him from injury and minimize the danger of getting
    clothing caught in machinery or other places.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.67
- number: '1567.68'
  heading: Safety provisions for machinery and equipment
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Coal spilled beneath belt conveyor drives or tail pieces shall not be removed
    while the conveyor is in motion, except where such coal can be removed without
    endangering persons.

    Mobile and stationary machinery and equipment shall be maintained in safe operating
    condition and machinery or equipment in unsafe condition shall be removed from
    service immediately.

    Machinery and equipment shall be operated only by persons authorized to operate
    such machinery or equipment.

    Repairs or maintenance shall not be performed on machinery until the power is
    off and the machinery is blocked against motion, except where machinery motion
    is necessary to make adjustments.

    Machinery shall not be lubricated manually while in motion, unless equipped with
    extended fittings or cups.

    Drive belts shall not be shifted while in motion unless the machines are provided
    with mechanical shifters.

    Belt dressing shall not be applied while belts are in motion except where it can
    be applied without endangering a person.

    Belts, chains, and ropes shall not be guided onto power-driven moving pulleys,
    sprockets, or drums with the hands except on slow-moving equipment especially
    designed for hand feeding.

    Pulleys of conveyors shall not be cleaned manually while the conveyor is in motion.

    No person shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.68
- number: '1567.681'
  heading: Fire detection devices required on conveyor belts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) The operator of an underground coal mine that uses conveyor belts in
    the operation of the mine shall install fire detection devices on each conveyor
    belt that is used in the mine. The fire detection devices shall be of a design
    and type established in rules adopted under this section. The chief of the division
    of mineral resources management shall inspect the fire detection devices after
    the operator of the mine has installed the devices on the conveyor belts that
    are used in the operation of the mine. The chief shall approve or disapprove the
    installation of the fire detection devices and shall notify the operator of the
    chief''s decision.

    (B) The chief, in consultation with a statewide association representing the coal
    mining industry and a statewide association representing employees of coal mines,
    shall adopt rules in accordance with Chapter 119. of the Revised Code concerning
    the installation and use of fire detection devices on conveyor belts that are
    used in an underground coal mine. The rules shall include all of the following:

    (1) The design and types of fire detection devices that must be used on a conveyor
    belt in order to provide for the earliest possible detection of a fire;

    (2) The number of fire detection devices that are required on a conveyor belt;

    (3) A procedure for the notification of the chief after the operator of a mine
    has installed the fire detection devices;

    (4) A procedure for the inspection of fire detection devices installed on a conveyor
    belt;

    (5) Any other requirements that the chief determines are necessary.

    (C) No operator of a mine shall refuse or neglect to comply with this section
    or rules adopted under it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.681
- number: '1567.69'
  heading: Longwall mining plans or revisions - contents
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) On and after July 20, 1984, no operator shall begin longwall mining in
    any coal mine until plans for the longwall mining have been filed with and approved
    by the chief of the division of mineral resources management. All revisions to
    approved plans shall also be submitted for approval to the chief. The chief shall
    not approve any plan or revision unless it meets the requirements of this section
    and shall approve all plans and revisions that meet those requirements.

    Approval of a plan or revision, or portion thereof, under comparable provisions
    of the "Federal Coal Mine Safety and Health Act of 1969," 83 Stat. 742, 30 U.S.C.A.
    801, as amended or reenacted, or regulations adopted thereunder, shall be a sufficient
    basis for approval of the plan or revision, or portion thereof, by the chief unless
    the chief makes a specific written explanation and findings as to why the federally
    approved plan, revision, or portion thereof does not meet the requirements of
    the mining laws of this state and as to why a variance from the federally approved
    plan is reasonably necessary to meet the requirements of this state''s mining
    laws.

    The chief shall make a final decision on a plan or revision, including review
    of any additional information the chief requests, no later than fourteen days
    after the operator''s initial submission of the plan or revision. Approval of
    completed plans or revisions shall not be unreasonably withheld.

    (B) Longwall mining plans submitted to the chief for approval shall include all
    of the following:

    (1) Company name;

    (2) Mine name;

    (3) Mine location;

    (4) Mine address;

    (5) Mine telephone number;

    (6) Name, title, and telephone number of the person submitting the plan;

    (7) Mine identification number;

    (8) Longwall mining roof control plan, which shall include a plan indicating the
    roof support to be used and the working procedures to be followed when a cavity
    is encountered over chocks or shields;

    (9) Ventilation plan, which shall include the complete section and face ventilation
    controls and bleeder systems;

    (10) Methane and dust control plan;

    (11) Any other information required by the chief.

    (C) After the chief has approved plans submitted under this section, an operator
    shall not be required to obtain additional approvals for new longwall working
    sections if plans initially approved or revised are complied with.

    (D) In coal mines where longwall working section operations are in progress prior
    to July 20, 1984, no operator shall begin new longwall working sections until
    required plans for longwall mining have been filed with and approved by the chief.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.69
- number: '1567.70'
  heading: Plan for recovery of longwall roof support - approval by chief
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'An operator conducting longwall mining shall develop a plan for recovery
    of chocks and shields or other longwall roof support and shall not initiate recovery
    until the recovery plan is approved by the chief of the division of mineral resources
    management. An operator shall also submit all revisions of an approved recovery
    plan for approval to the chief.

    Approval of a plan or revision, or portion thereof, under comparable provisions
    of the "Federal Coal Mine Safety and Health Act of 1969," 83 Stat. 742, 30 U.S.C.A.
    801, as amended or reenacted, or regulations adopted thereunder, shall be a sufficient
    basis for approval of the plan or revision, or portion thereof, by the chief unless
    the chief makes a specific written explanation and findings as to why the federally
    approved plan or revision, or portion thereof, does not meet the requirements
    of the mining laws of this state and as to why a variance from the federally approved
    plan, revision, or portion thereof is reasonably necessary to meet the requirements
    of this state''s mining laws.

    The chief shall make a final decision on a plan or revision, including review
    of any additional information that the chief requests, no later than fourteen
    days after the operator''s initial submission of the plan or revision. The chief
    shall not unreasonably withhold approvals of completed plans or revisions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.70
- number: '1567.71'
  heading: Two-way communication facilities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) An operator conducting longwall mining shall provide two-way communication
    facilities, approved by the chief of the division of mineral resources management,
    at the headgate and tailgate and across each longwall working face that, during
    the production of coal, are a separate system from the mine communication facilities.
    Longwall working section communication facilities shall be located at points not
    more than one hundred feet apart across the longwall working face.

    (B) An operator conducting longwall mining shall also provide two-way communication
    facilities on each longwall working section. During production of coal, a designated
    person shall, as part of that person''s other assigned duties, be available with
    the longwall working section communication and longwall working face communication
    facilities.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.71
- number: '1567.72'
  heading: De-energizing electrical power on longwall working face conveyor
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) An operator conducting longwall mining shall provide all longwall working
    face conveyors installed on and after the effective date of this section with
    lock-out type de-energizing devices to de-energize the electrical power on the
    longwall working face conveyor. The de-energizing devices shall be provided at
    intervals of not more than fifty feet when the average height of the coal seam
    is at or below forty-eight inches and at intervals of not more than one hundred
    feet when the average height of the coal seam is above forty-eight inches. The
    lock-out de-energizing may be done electrically.

    (B) Within twelve months after the effective date of this section, an operator
    shall provide all longwall working sections in operation prior to the effective
    date of this section with lock-out type de-energizing devices on face conveyors
    as required in division (A) of this section.

    (C) The operator shall provide on the headgate of the longwall working section
    an emergency de-energizing device to de-energize immediately the longwall working
    face equipment.

    (D) At the beginning of each coal producing shift, all emergency de-energizing
    devices shall be checked for proper functioning and, if an emergency de-energizing
    device is found malfunctioning, mining operations shall not begin until all de-energizing
    devices within the intervals required by division (A) of this section are functioning
    properly or until a designated person is stationed at the next de-energizing device
    at the interval required under division (A) of this section until such time as
    the malfunctioning de-energizing device is repaired.

    (E) If, during a coal producing shift, a de-energizing device malfunctions, which
    creates an interval greater than that required by division (A) of this section,
    a designated person shall be stationed at the next de-energizing device at the
    interval required under division (A) of this section until such time as the malfunctioning
    de-energizing device is repaired or the machine is de-energized and locked out.

    (F) No operator shall permit longwall mining to begin or continue at any time
    that more than one of the de-energizing devices required under division (A) of
    this section is malfunctioning. If the malfunctions create intervals greater than
    those required under that division, except as provided in division (E) of this
    section.

    (G) No operator shall install or use a longwall working face conveyor unless its
    electrical circuits are designed so that the face conveyor will not start at any
    other location until the lock-out device is disengaged at the point of initial
    interruption.

    (H) No operator shall provide or permit use of shearer and plow motors on a longwall
    working section that are not designed so that their cutting bits cannot begin
    operating when electrical power is initially applied.

    (I) No person shall perform work on the face conveyor or on the face side of the
    face conveyor unless equipment is de-energized and locked out, except when motion
    facilitates troubleshooting or positioning for maintenance or repair.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.72
- number: '1567.73'
  heading: Installation of methane monitors
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) The chief of the division of mineral resources management or the chief''s
    representative shall require installation on a longwall working section of a federally
    approved methane monitor capable of giving warning automatically when the concentration
    of methane reaches a maximum percentage of not more than 1.0 volume per cent of
    methane. The sensoring unit indicating the atmospheric conditions on the methane
    monitor shall be installed at a location specified in the approved plan or revision
    required by section 1567.69 of the Revised Code.

    The operator shall ensure that the methane monitor is kept operative and properly
    maintained and tested weekly for functioning.

    The operator of any mine in which longwall mining is performed shall establish
    and adopt a definite maintenance program designed to keep methane monitors operative,
    and a written description of the program shall be available for inspection by
    the division of mineral resources management. At least once each month, the operator
    shall have the methane monitor checked for operating accuracy with a known methane
    air mixture and shall have the monitor calibrated as necessary. The operator shall
    keep a record of calibration tests in a book on the surface, which may be the
    same book used to comply with requirements established under regulations of the
    mine safety and health administration in the United States department of labor.

    If the methane monitor on a longwall working section malfunctions, the operator
    shall have the monitor repaired within twelve hours. During the period of time
    the methane monitor is inoperative, the operator shall not permit electric equipment
    to be operated for longer than ten minutes without an examination for methane
    gas, shall require that the examinations required in division (B) of this section
    be conducted on one-hour intervals, and shall require an air reading on the intake
    side of the longwall working face to be collected on one-hour intervals.

    If parts are unavailable to correct the malfunction of the methane monitor or
    the malfunction cannot be repaired within twelve hours, the operator shall immediately
    notify the division, which shall evaluate the circumstances and may allow continued
    operation under the procedures of the preceding paragraph if the operator is proceeding
    with good faith efforts to correct the malfunction.

    If a malfunction of the methane monitor occurs on a longwall working section,
    the supervisor on duty shall indicate in the supervisor''s own shift examination
    report, in the fire boss report books, the date and time the methane monitor malfunctioned.

    (B) A certified person designated by the mine foreperson to supervise a longwall
    working section shall examine the longwall working face for hazards as a part
    of the pre-shift and on-shift examinations for each coal producing shift and more
    often if necessary for safety or required by division (A) of this section. The
    examination shall include a test for methane gas and oxygen deficiency. The methane
    and oxygen deficiency examinations shall be made at reasonable intervals along
    the coal face between the headgate and tailgate. The person''s initials, date,
    and time shall be recorded at the headgate and tailgate. If one per cent or more
    of methane gas is detected along the coal face, the electrical equipment shall
    be immediately de-energized and the electrical power circuit then disconnected
    from the power supply until a certified person pronounces the place safe.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.73
- number: '1567.74'
  heading: Safety requirements for longwall working face
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) No person shall cross the longwall working face conveyor while it is
    in operation unless a safe crossover is provided.

    (B) The operator shall provide telephone pager communications or other means of
    providing an effective warning signal in a longwall working section. Prior to
    starting a longwall working face conveyor, the person who is going to activate
    the conveyor shall sound the telephone pager communications or other effective
    warning signal to alert all persons across the longwall working face.

    (C) No person shall ride the longwall working face conveyor. However, an operator
    may submit a plan to the chief of the division of mineral resources management,
    as part of the plan required by section 1567.69 of the Revised Code or later,
    for approval for the removal of injured persons on the longwall working face conveyor
    if it is necessary to transport injured persons on a stretcher or backboard.

    (D) On and after July 20, 1984, an operator shall equip all newly installed face
    roof support units with adjacent unit controls unless the units have a wide single
    canopy over each unit that protects the workers from falling material when operating
    unit controls from within the support of the shield unit being removed.

    (E) On and after July 20, 1984, all newly installed face roof support units shall
    be equipped with an outlet to facilitate measurement of the interior prop pressure
    and an outlet to facilitate measurement of the yield pressure. Any yield valves
    of face roof support units that do not maintain at least eighty-five per cent
    of the yield pressure specified in the approved roof control plan shall be promptly
    repaired or replaced. The valves of face roof support units shall be tested at
    least annually, and a legible record of the date of the test, the person performing
    the test, and the valves repaired or replaced shall be kept in an appropriate
    mine record.'
  history: null
