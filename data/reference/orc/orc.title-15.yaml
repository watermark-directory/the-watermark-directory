- number: '1517.11'
  heading: Natural areas and preserves fund - use of funds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: '(A) There is hereby created in the state treasury the natural areas and preserves
    fund, which shall consist of moneys transferred into it under section 5747.113
    of the Revised Code and of contributions made directly to it. Any person may contribute
    directly to the fund in addition to or independently of the income tax refund
    contribution system established in that section.

    (B) Moneys in the fund shall be disbursed pursuant to vouchers approved by the
    director of natural resources for use by the division of natural areas and preserves
    solely for the following purposes:

    (1) The acquisition of new or expanded natural areas and nature preserves and
    scenic river lands;

    (2) Facility development in natural areas and nature preserves and scenic river
    lands;

    (3) Special projects, including, but not limited to, biological inventories, research
    grants, and the production of interpretive material related to natural areas and
    nature preserves and scenic river lands;

    (4) Routine maintenance for health and safety purposes.

    (C) Money in the fund also may be used for the purposes of administering a system
    of wild, scenic, and recreational rivers, scenic river lands, and facilities or
    improvements associated with such rivers and lands.

    (D) Moneys appropriated from the fund shall not be used to fund salaries of permanent
    employees or administrative costs.

    (E) All investment earnings of the fund shall be credited to the fund.

    (F) The chief of the division of natural areas and preserves may sell any of the
    following:

    (1) Items related to or that promote Ohio''s native plants and animals, unique
    ecology and geology, and general ecological preservation and conservation such
    as pins, apparel, stickers, books, bulletins, maps, publications, calendars, and
    other educational articles and division branded merchandise;

    (2) Items pertaining to Ohio''s ecology including native plants and seeds of native
    plants.

    (G) All moneys received under division (F) of this section shall be paid into
    the state treasury to the credit of the natural areas and preserves fund created
    under this section.'
