  url: https://codes.ohio.gov/ohio-revised-code/section-1521.21
- number: '1521.22'
  heading: Permit for diverting more than 100,000 gallons of water a day from Ohio
    River watershed
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A)(1) No person shall divert more than one hundred thousand gallons per
    day of any waters of the state out of the Ohio river watershed to another basin
    without having a permit to do so issued by the chief of the division of water
    resources.

    (2) An application for such a permit shall be filed with the chief upon such forms
    as the chief prescribes. The application shall state the quantity of water to
    be diverted, the purpose of the diversion, the life of the project for which the
    water is to be diverted, and such other information as the chief may require by
    rule. Each application shall be accompanied by a nonrefundable fee of one thousand
    dollars, which shall be credited to the water management fund, which is hereby
    created.

    (B) The chief shall not approve a permit application filed under this section
    if the chief determines that any of the following applies:

    (1) During the life of the project for which the water is to be diverted, some
    or all of the water to be diverted will be needed for use within the Ohio river
    watershed.

    (2) The proposed diversion would endanger the public health, safety, or welfare.

    (3) The applicant has not demonstrated that the proposed diversion is a reasonable
    and beneficial use and is necessary to serve the applicant''s present and future
    needs.

    (4) The applicant has not demonstrated that reasonable efforts have been made
    to develop and conserve water resources in the importing basin and that further
    development of those resources would engender overriding, adverse economic, social,
    or environmental impacts.

    (5) The proposed diversion is inconsistent with regional or state water resources
    plans.

    (6) The proposed diversion, alone or in combination with other diversions and
    water losses, will have a significant adverse impact on in-stream uses or on economic
    or ecological aspects of water levels.

    The chief may hold public hearings upon any application for a permit.

    (C) The chief shall determine the period for which each permit approved under
    this section will be valid and specify the expiration date, but in no case shall
    a permit be valid beyond the life of the project as stated in the application.

    The chief shall establish rules providing for the transfer of permits. A permit
    may be transferred on the conditions that the quantity of water diverted not be
    increased and that the purpose of the diversion not be changed.

    (D)(1) Within a time established by rule, the chief shall do one of the following:

    (a) Notify the applicant that an application the applicant filed under this section
    is approved or denied and, if denied, the reason for denial;

    (b) Notify the applicant of any modification necessary to qualify the application
    for approval.

    (2) Any person who receives notice of a denial or modification under division
    (D)(1) of this section is entitled to a hearing under Chapter 119. of the Revised
    Code if the person sends a written request for a hearing to the chief within thirty
    days after the date on which the notice is mailed or otherwise provided to the
    applicant.

    (3) The chief shall issue a permit to an applicant whose application is approved
    under this section.

    (E) The chief shall revoke a permit under this section without a prior hearing
    if the chief determines that the quantity of water being diverted exceeds the
    quantity stated in the permit application.

    The chief may suspend a permit if the chief determines that the continued diversion
    of water will endanger the public health, safety, or welfare. Before suspending
    a permit, the chief shall make a reasonable attempt to notify the permittee that
    the chief intends to suspend the permit. If the attempt fails, notification shall
    be given as soon as practicable following the suspension. Within five days after
    the suspension, the chief shall provide the permittee an opportunity to be heard
    and to present evidence that the continued diversion of water will not endanger
    the public health, safety, or welfare.

    If the chief determines before the expiration date of a suspended permit that
    the diversion of water can be resumed without danger to the public health, safety,
    or welfare, the chief shall, upon request of the permittee, reinstate the permit.

    (F) Any six or more residents of this state may petition the chief for an investigation
    of a withdrawal of water resources that they allege is in violation of a permit
    issued under this section.

    The petition shall identify the permittee and detail the reasons why the petitioners
    believe that grounds exist for the revocation or suspension of the permit under
    this section.

    Upon receipt of the petition, the chief shall send a copy to the permittee and,
    within sixty days, make a determination whether grounds exist for revocation or
    suspension of the permit under this section.

    (G) Each permittee shall submit to the chief an annual report containing such
    information as the chief may require by rule.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.22
- number: '1521.23'
  heading: Applying for permit for major increase in withdrawal of waters of state
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) Except as provided in divisions (D) and (E) of this section, no person
    shall allow a facility that the person owns or operates to withdraw waters of
    the state in an amount that would result in a new or increased consumptive use
    of more than an average of two million gallons of water per day in any thirty-day
    period without first obtaining a permit from the chief of the division of water
    resources under section 1521.29 of the Revised Code.

    (B) Prior to developing a new or increased withdrawal or consumptive use capacity
    that would facilitate a withdrawal requiring a permit under section 1521.29 of
    the Revised Code, an owner or operator of a facility shall submit an application
    for a permit to the chief on a form the chief prescribes. The applicant shall
    declare and document all of the following in the application:

    (1) The facility''s current withdrawal capacity per day if the withdrawal is to
    occur at a facility already in operation;

    (2) The total new or increased daily withdrawal capacity proposed for the facility;

    (3) The locations and sources of water proposed to be withdrawn;

    (4) The locations of proposed discharges or return flows;

    (5) The locations and nature of proposed consumptive uses;

    (6) The estimated average annual and monthly volumes and rates of withdrawal;

    (7) The estimated average annual and monthly volumes and rates of consumptive
    use;

    (8) The effects the withdrawal is anticipated to have with respect to existing
    uses of water resources;

    (9) A description of other ways the applicant''s need for water may be satisfied
    if the application is denied or modified;

    (10) A description of the conservation practices the applicant intends to follow;

    (11) All information required under sections 1521.24 to 1521.27 of the Revised
    Code if the sources of water for the proposed withdrawal are ground water;

    (12) Any other information the chief may require by rule.

    (C) Each application shall be accompanied by a nonrefundable fee of one thousand
    dollars, which shall be credited to the water management fund created under section
    1521.22 of the Revised Code.

    (D) A major utility facility that is subject to regulation under Chapter 4906.
    of the Revised Code, a facility that is subject to regulation under Chapter 1514.
    of the Revised Code, or a facility that is required to obtain a permit under sections
    1522.10 to 1522.30 of the Revised Code need not obtain a permit under section
    1521.29 of the Revised Code.

    (E) A public water system, as defined in section 6109.01 of the Revised Code,
    that withdraws waters of the state in an amount that would result in a new or
    increased consumptive use of more than two million gallons per day need not obtain
    a permit under section 1521.29 of the Revised Code if one of the following applies:

    (1) The public water system was in operation on June 29, 1988, and no substantial
    changes in the design capacity are proposed for that system.

    (2) A public water system that is proposed to be constructed or installed, or
    an existing system for which changes are proposed, encompasses only water distribution
    facilities.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.23
- number: '1521.231'
  heading: Consultation on application for major increase in withdrawal of waters
    with other Great Lakes states and provinces and international commission
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: Whenever any person submits an application under section 1521.23 of the Revised
    Code to withdraw water from the Lake Erie drainage basin that would result in
    a new or increased consumptive use totaling more than five million gallons per
    day, the chief of the division of water resources shall notify the governors and
    premiers of the other great lakes states and provinces, the appropriate water
    management agencies of those states and provinces, and, when appropriate, the
    international joint commission and shall solicit their comments and concerns regarding
    the application. In the event of an objection to the proposed consumptive use,
    the chief shall consult with the affected great lakes states and provinces to
    consider the issues involved and seek mutually agreeable recommendations. Before
    rendering a decision on the permit application, the chief shall consider the concerns,
    comments, and recommendations of the other great lakes states and provinces and
    the international joint commission.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.231
- number: '1521.24'
  heading: Form for proposal to withdraw ground water
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: 'Along with an application for a permit submitted under section 1521.23 of
    the Revised Code, an applicant that proposes to withdraw ground water shall submit
    data in a form prescribed by the chief of the division of water resources that
    includes all of the following:

    (A) A hydrologic map consisting of a single map using the most recent USGS 7.5
    minute topographic maps at a scale of 1:24,000 as a base or other approved format
    that shows all of the information described in section 1521.25 of the Revised
    Code;

    (B) A hydrogeologic description in sufficient detail to determine the cone of
    depression for the proposed withdrawal that includes all of the information described
    in section 1521.26 of the Revised Code;

    (C) A steady state ground water model that defines the projected cone of depression
    for the proposed withdrawal that complies with section 1521.27 of the Revised
    Code;

    (D) Alternative water supply information that includes an analysis of the availability
    and suitability of alternative water supply sources that will be utilized to fulfill
    the water supply replacement provisions of section 1521.35 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.24
- number: '1521.25'
  heading: Notations on hydrologic map
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: 'An applicant shall show all of the following on the hydrologic map required
    under division (A) of section 1521.24 of the Revised Code:

    (A) The proposed withdrawal area;

    (B) The hydrologic study area;

    (C) A line delineating the location of the cross sections required under division
    (E) of section 1521.26 of the Revised Code;

    (D) The location of and assigned identification number for the selected water
    supply wells identified in division (D) of section 1521.26 of the Revised Code
    and all other water sources used for domestic, agricultural, or industrial use
    within the proposed withdrawal area and hydrologic study area;

    (E) The location of any well, well field, reservoir, river, and water source not
    identified under division (D) of this section on or within the hydrologic study
    area that is used for a public water supply and the location of any facility registered
    under section 1521.16 of the Revised Code on or within the hydrologic study area;

    (F) Any additional information that the chief of the division of water resources
    may require based on site-specific conditions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.25
- number: '1521.26'
  heading: Accompanying documentation with hydrogeologic description
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: 'An applicant shall include all of the following with the hydrogeologic description
    required under division (B) of section 1521.24 of the Revised Code:

    (A) A detailed description of the geology within the proposed withdrawal and hydrologic
    study area down to the lowest level of any aquifer from which water is proposed
    to be withdrawn. The description must include the areal and structural geology
    of the withdrawal and hydrologic study area, and any other parameter that may
    affect the occurrence, availability, movement, or quantity of potentially affected
    ground waters. The description must be based on information available to the applicant
    from test borings, core drillings, well logs, and geologic literature and practices.

    (B) Information related to the ground water hydrology for the proposed withdrawal
    and hydrologic study area including, at a minimum, all of the following:

    (1) The elevation and the lateral extent of each aquifer, interbedded lithology,
    and overburden material;

    (2) The thickness of each aquifer and a detailed lithologic description from surface
    to base of the deepest aquifer, noting any changes in lithology over distance;

    (3) Known uses of and withdrawals from the water in each aquifer;

    (4) The transmissivity of each aquifer;

    (5) The storativity of each aquifer;

    (6) The hydraulic conductivity of each aquifer;

    (7) The specific yield of each unconfined aquifer;

    (8) The rate of discharge of any currently registered water withdrawals shown
    pursuant to division (E) of section 1521.25 of the Revised Code.

    (C) A listing of the published information and data, and copies of the unpublished
    records and data, used in preparation of the items in divisions (A) and (B) of
    this section, including core descriptions, cuttings descriptions, stratigraphic
    descriptions, and pump or slug test records;

    (D) A water supply inventory representing all aquifers submitted in a format prescribed
    by the chief of the division of water resources that, at a minimum, includes all
    of the following:

    (1) All of the existing water wells within the study area if there are fewer than
    one hundred wells. If there are more than one hundred wells within the study area,
    the inventory must include one hundred wells plus twenty-five per cent of those
    wells in excess of one hundred, but shall not exceed a total of three hundred
    wells.

    (2) A listing of water sources in the proposed withdrawal and hydrologic study
    area as shown pursuant to divisions (D) and (E) of section 1521.25 of the Revised
    Code. Such water sources must include the most recently drilled wells, represent
    all aquifers and producing zones within the aquifers, and reflect a uniform geographical
    distribution of wells within the study area. The listing must include, to the
    extent available, all of the following for each well:

    (a) The map identification number listed under division (D) of section 1521.25
    of the Revised Code;

    (b) The department of natural resources, division of water resources number assigned
    to the log form required to be filed under section 1521.05 of the Revised Code;

    (c) The township in which each well is located;

    (d) The year the well was drilled;

    (e) The latitude and longitude in NAD 83 of the well;

    (f) The surface elevation of the well in feet;

    (g) The total depth of the well in feet below the land surface;

    (h) The depth to bedrock in feet;

    (i) A description of unconsolidated material;

    (j) The static water level of the well in feet below the land surface;

    (k) The casing length in feet;

    (l) The lithology of the screen interval/open borehole;

    (m) The length of any well screen in feet;

    (n) The test rate in gallons per minute;

    (o) The duration of the test;

    (p) The drawdown in feet.

    (3) A listing of the location and type of any public water supply sources within
    the withdrawal and hydrologic study area;

    (4) A copy of the division of water resources well logs for the wells listed in
    division (D) of this section.

    Prior to submission of an application, an applicant may submit a request in writing
    to the chief to reduce the number or extent of the submittals required in division
    (D) of this section. The chief may grant the request only if the chief makes a
    written determination that this reduction will not diminish the level of accuracy
    in the ground water model. If the chief grants a reduction, the written request
    and determination shall be submitted with the permit application. If information
    required in the water supply inventory is unobtainable, the applicant shall submit
    a statement to that effect, giving the reasons therefor.

    (E) A minimum of two perpendicular hydrogeologic cross sections of the same scale
    for the hydrologic study area based on available information. Such cross sections
    must be of uniform horizontal and uniform vertical scale, depict the information
    required in divisions (B)(1) and (2) of this section, intersect the center of
    the proposed withdrawal, and include the data points used to construct the cross
    section.

    (F) Any other information the chief may require.

    For purposes of the hydrogeologic description and to establish pre-pumping water
    level conditions, the chief may require the applicant to monitor water levels
    from each aquifer from which water is proposed to be withdrawn. The applicant
    shall conduct such monitoring via the wells listed in division (D) of this section
    or new monitoring wells drilled by the applicant. The chief also may require pre-pumping
    tests.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.26
- number: '1521.27'
  heading: Steady state ground water model
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) An applicant shall ensure that both of the following apply to the steady
    state ground water model required under division (C) of section 1521.24 of the
    Revised Code:

    (1) It accurately reflects the ground water flow conditions associated with the
    hydrologic study area and is consistent with American society for testing and
    materials international standards.

    (2) It is in the form of a three-dimensional ground water flow model utilizing
    finite difference modeling software or other modeling software acceptable to the
    chief of the division of water resources.

    (B) The applicant shall submit the model results in a format prescribed by the
    chief. The applicant shall include detailed explanations of the hydrologic and
    geologic parameters used to construct the model, including all of the following:

    (1) The saturated thickness of each aquifer;

    (2) The elevation of the static water level or potentiometric surface of each
    aquifer;

    (3) Whether each aquifer is confined or unconfined;

    (4) The pumping water level elevation at steady state conditions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.27
- number: '1521.28'
  heading: Establishment of geographic area
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: The chief of the division of water resources shall use the data submitted
    under sections 1521.24 to 1521.27 of the Revised Code to establish the geographic
    area defined by the ten-foot contour line of the projected cone of depression
    for any approved application for the withdrawal of ground water. However, the
    chief may designate a different contour line based upon water resource availability,
    seasonal variations, other water users in the hydrologic study area, or other
    ground water data available.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.28
- number: '1521.29'
  heading: Determinations for application approval
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) The chief of the division of water resources shall not approve an application
    submitted under section 1521.23 of the Revised Code if the chief determines that
    any of the following criteria apply:

    (1) Public water rights in navigable waters will be adversely affected;

    (2) The facility''s current consumptive use, if any, does not incorporate maximum
    feasible conservation practices as determined by the chief, considering available
    technology and the nature and economics of the various alternatives;

    (3) The proposed plans for the withdrawal, transportation, development, and consumptive
    use of water resources do not incorporate maximum feasible conservation practices
    as determined by the chief, considering available technology and the nature and
    economics of the various alternatives;

    (4) The proposed withdrawal and consumptive uses do not reasonably promote the
    protection of the public health, safety, and welfare;

    (5) The proposed withdrawal will have a significant detrimental effect on the
    quantity or quality of water resources and related land resources in this state,
    including a significant lowering of the water level within or the overdrafting
    of an aquifer;

    (6) The proposed withdrawal is inconsistent with regional or state water resources
    plans;

    (7) Insufficient water is available for the withdrawal and other existing legal
    uses of water resources are not adequately protected;

    (8) A significant diminution will occur in the amount of water available to existing
    wells or an interruption of existing ground water usage will occur within the
    geographic area established by the chief pursuant to section 1521.28 of the Revised
    Code without a suitable replacement water supply source;

    (9) A withdrawal or consumptive use will cause irreparable material damage to
    an aquifer such that the aquifer may no longer yield the amount of water it did
    before the withdrawal or consumptive use proposed in the application.

    (B) The chief may hold public hearings upon any application for a permit submitted
    under section 1521.23 of the Revised Code. The chief shall determine the period
    for which each permit approved under this section will be valid and specify the
    expiration date, but in no case shall a permit be valid beyond the life of the
    project as stated in the application.

    (C)(1) Within ninety days of receiving a complete application, the chief shall
    do one of the following:

    (a) Notify the applicant that the applicant''s application submitted under section
    1521.23 of the Revised Code is approved or denied and, if denied, the reason for
    denial;

    (b) Notify the applicant of any modification necessary to qualify the application
    for approval.

    (2) Any person who receives notice of a denial or modification under this division
    is entitled to a hearing under Chapter 119. of the Revised Code if the person
    sends a written request for a hearing to the chief within thirty days after the
    date on which the notice is mailed or otherwise provided to the applicant.

    (D) The chief shall issue a permit to an applicant whose application is approved
    under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.29
- number: '1521.30'
  heading: Annual report
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) With regard to a permit issued under section 1521.29 of the Revised Code,
    the permittee shall submit to the chief of the division of water resources an
    annual report containing any information as the chief shall require by rule.

    (B) If the facility for which a permit has been issued under section 1521.29 of
    the Revised Code withdraws ground water, the chief may require the continued monitoring
    and reporting of water levels in each aquifer via existing wells or new monitoring
    wells drilled by the permittee.

    (C) With regard to a permit issued under section 1521.29 of the Revised Code,
    the permittee, at least once every five years, shall certify to the chief that
    the facility for which the permit has been issued is in compliance with the permit.

    (D) The chief shall adopt rules for the transfer of permits issued under section
    1521.29 of the Revised Code. The chief may allow a permit to be transferred on
    the condition that the quantity of water withdrawn not be increased and that the
    purposes of the withdrawal not be changed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.30
- number: '1521.31'
  heading: Submission of revised ground water model
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) The chief of the division of water resources may require a permittee
    that has been issued a permit under section 1521.29 of the Revised Code to decrease
    its withdrawal and submit a revised ground water model under section 1521.27 of
    the Revised Code if either of the following applies:

    (1) The permittee''s reported ground water monitoring data conflicts with the
    permittee''s ground water model.

    (2) The results of the division of water resources'' investigation of any written
    complaint under section 1521.36 of the Revised Code indicate that the permittee''s
    withdrawal caused the diminution or interruption of a person''s water supply.

    (B) If so required under division (A) of this section, the permittee shall submit
    the revised ground water modeling using additional data that reflects the permittee''s
    impact on ground water. Based upon the revised ground water modeling and additional
    data, the chief may amend the permit to decrease the withdrawal or establish a
    revised projected cone of depression.

    (C) A permittee may request the chief to amend a permit issued under section 1521.29
    of the Revised Code when another ground water user affects or has the potential
    to affect the projected cone of depression. The permittee shall submit with the
    request a revised ground water model using additional data that reflects the other
    ground water user''s impact on ground water. Based on the revised ground water
    model and additional data, the chief may establish a revised projected cone of
    depression and amend the permit accordingly.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.31
- number: '1521.32'
  heading: Suspension of permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) The chief may suspend a permit issued under section 1521.29 of the Revised
    Code pursuant to an adjudication conducted in accordance with Chapter 119. of
    the Revised Code if the chief determines one of the following:

    (1) That the continued withdrawal or consumptive use of water under the permit
    will endanger the public health, safety, or welfare;

    (2) That the withdrawal or consumptive use of water will result in a significant
    lowering of the water level within an aquifer, the overdrafting of an aquifer,
    or the imminent threat of irreparable material damage to an aquifer such that
    the aquifer will no longer yield the amount of water it did before the withdrawal
    or consumptive use.

    (B) Before suspending a permit, the chief shall make a reasonable attempt to notify
    the permittee that the chief intends to suspend the permit. If the attempt fails,
    notification shall be given as soon as practicable following the suspension.

    (C) Within five days after the suspension, the chief shall provide the permittee
    an opportunity for a hearing. At the hearing the permittee may present evidence
    that the continued withdrawal or consumptive use of water is warranted because
    the reasons for suspension specified in division (A) of this section do not apply.

    (D) Prior to the expiration of a suspended permit, a permittee may request the
    chief to amend the suspended permit. The chief may amend the permit and allow
    the withdrawal or consumptive use of water under it to be resumed if the chief
    determines that, under the amended permit, the reasons for suspension specified
    in division (A) of this section will no longer apply.

    (E)(1) Any six or more residents of this state may petition the chief for an investigation
    of a withdrawal of water resources that they allege is in violation of a permit
    issued under section 1521.29 of the Revised Code.

    (2) In the petition, the petitioners shall identify the permittee and detail the
    reasons why the petitioners believe that grounds exist for the suspension of the
    permit under this section or the revocation of the permit under section 1521.33
    of the Revised Code.

    (3) Upon receipt of the petition, the chief shall send a copy to the permittee
    and, within sixty days, make a determination whether grounds exist for suspension
    of the permit under this section or revocation of the permit under section 1521.33
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.32
- number: '1521.33'
  heading: Revocation of permit
  title:
