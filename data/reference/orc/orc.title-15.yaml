  url: https://codes.ohio.gov/ohio-revised-code/section-1521.16
- number: '1521.17'
  heading: Determination of reasonableness of use of water
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) The general assembly hereby finds and declares that the determination
    of the reasonableness of a use of water depends upon a consideration of the interests
    of the person making the use, of any person harmed by the use, and of society
    as a whole.

    (B) In accordance with section 858 of the Restatement (Second) of Torts of the
    American law institute, all of the following factors shall be considered, without
    limitation, in determining whether a particular use of water is reasonable:

    (1) The purpose of the use;

    (2) The suitability of the use to the watercourse, lake, or aquifer;

    (3) The economic value of the use;

    (4) The social value of the use;

    (5) The extent and amount of the harm it causes;

    (6) The practicality of avoiding the harm by adjusting the use or method of use
    of one person or the other;

    (7) The practicality of adjusting the quantity of water used by each person;

    (8) The protection of existing values of water uses, land, investments, and enterprises;

    (9) The justice of requiring the user causing harm to bear the loss.

    (C) In any determination of reasonable use of water under common law in which
    prior use is a factor, it shall be conclusive that one use is prior to another
    in the quantity claimed if the date of registration of one facility providing
    such use under section 1521.16 of the Revised Code is prior to that of another
    facility.

    If a use of water in which prior use is a factor is by means of a facility having
    the capacity to withdraw one hundred thousand gallons or less of water per day
    and the facility is not registered under division (B) of that section, prior use
    shall be based on historic information and documentation provided by any person.'
