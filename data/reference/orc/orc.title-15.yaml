- number: '1519.07'
  heading: No duty or liability to user of recreational trail
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1519'
    name: Recreational Trails
  text: '(A) As used in this section:

    (1) "Intentional tort" means an injury to person or property that the tortfeasor
    intentionally caused, to which the tortfeasor intentionally contributed, or that
    the tortfeasor knew or believed was substantially certain to result from the tortfeasor''s
    conduct.

    (2) "Premises" means a parcel of land together with any waters, buildings, or
    structures on it that is privately owned and that is directly adjacent to a recreational
    trail.

    (3) "Recreational trail" means a public trail that is used for hiking, bicycling,
    horseback riding, ski touring, canoeing, or other nonmotorized forms of recreational
    travel and that interconnects state parks, forests, wildlife areas, nature preserves,
    scenic rivers, or other places of scenic or historic interest.

    (4) "User of a recreational trail" means a person who, in the course of using
    a recreational trail, enters on premises without first obtaining express permission
    to be there from the owner, lessee, or occupant of the premises.

    (B)(1) An owner, lessee, or occupant of premises does not owe any duty to a user
    of a recreational trail to keep the premises safe for entry or use by a user of
    a recreational trail.

    (2) An owner, lessee, or occupant of premises does not assume, has no responsibility
    for, does not incur liability for, and is not liable for any injury to person
    or property caused by any act of a user of a recreational trail.

    (C) This section does not apply to intentional torts.'
