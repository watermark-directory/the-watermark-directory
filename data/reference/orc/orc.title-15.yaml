- number: '1506.22'
  heading: Great Lakes protection fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: '(A) Except as provided in division (B) of this section, the state agency
    whose director has been designated to administer the Lake Erie protection fund
    under section 1506.23 of the Revised Code is hereby designated the lead agency
    for the implementation in this state of the purposes of the great lakes protection
    fund, a regional trust fund established by the great lakes states to advance the
    principles, goals, and objectives of the great lakes toxic substances control
    agreement and the great lakes water quality agreement, as they may be revised
    and amended.

    (B) The governor shall appoint two members from this state to the board of directors
    of the great lakes protection fund as provided in the bylaws and articles of incorporation
    of the fund. Of the initial appointments made to the board, one shall serve for
    a term of one year and one shall serve for a term of two years; thereafter, the
    members of the board of directors from this state shall serve for terms of two
    years. The governor may remove any member at any time as provided in the bylaws
    and articles of incorporation of the fund. In the event of a vacancy, the governor
    shall appoint a successor to hold office for the remainder of the term for which
    the member''s predecessor was appointed. Any member shall continue in office subsequent
    to the expiration date of the member''s term until the member''s successor takes
    office or until a period of sixty days has elapsed, whichever occurs first.

    Membership on the board does not constitute holding a public office or position
    of employment under the laws of this state and is not grounds for removal of public
    officers or employees from their offices or positions of employment.

    Members of the board from this state shall receive no compensation, but shall
    be reimbursed for their actual and necessary expenses incurred in the performance
    of their official duties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1506.22
- number: '1506.23'
  heading: Lake Erie protection fund; purposes
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: '(A) There is hereby created in the state treasury the Lake Erie protection
    fund, which shall consist of money deposited into the fund from the issuance of
    Lake Erie license plates under section 4503.52 of the Revised Code, money awarded
    to the state from the great lakes protection fund, and donations, gifts, bequests,
    and other moneys received for the purposes of this section. Not later than the
    first day of June each year, the Ohio Lake Erie commission created in section
    1506.21 of the Revised Code shall designate one of its members who represents
    a state agency to administer the fund and, with the approval of the commission,
    to expend moneys from the fund for any of the following purposes:

    (1) Funding cooperative research, data gathering, or demonstration projects related
    to the priorities outlined in the Lake Erie protection and restoration strategy
    published under this section;

    (2) Encouraging cooperation with and among leaders from state legislatures, state
    agencies, political subdivisions, business and industry, labor, institutions of
    higher education, agriculture, environmental organizations, and conservation groups
    within the Lake Erie basin;

    (3) Awarding of grants to any agency of the United States, any state agency, as
    "agency" is defined in division (A)(2) of section 111.15 of the Revised Code,
    any political subdivision, any educational institution, or any nonprofit organization
    for the development and implementation of projects and programs that are designed
    to address priorities outlined in the Lake Erie protection and restoration strategy;

    (4) Expenses authorized by the Ohio Lake Erie commission necessary to implement
    this chapter.

    (B) Moneys in the Lake Erie protection fund are not intended to replace other
    moneys expended by any agency of the United States, any state agency, as "agency"
    is so defined, any political subdivision, any educational institution, or any
    nonprofit organization for projects and programs that are designed to protect
    Lake Erie.

    (C) Not later than the last day of July of each odd-numbered year, the commission
    shall publish a Lake Erie protection and restoration strategy that describes the
    goals of the commission and prioritizes the uses of the Lake Erie protection fund
    and other funds for the following state fiscal year. The commission shall hold
    at least one public meeting in the Lake Erie basin regarding the strategy. The
    commission shall submit the strategy to the governor, the president of the senate,
    and the speaker of the house of representatives.

    (D) Not later than September 1, 1991, and annually thereafter, the Lake Erie commission
    shall prepare a report of the activities that were undertaken by the commission
    under this section during the immediately preceding fiscal year, including, without
    limitation, revenues and expenses for the preceding fiscal year. The commission
    shall submit the report to the governor, the president of the senate, and the
    speaker of the house of representatives.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
