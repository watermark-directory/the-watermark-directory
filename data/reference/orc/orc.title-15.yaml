- number: '1533.05'
  heading: Raptors for use in sport of falconry
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) As used in this section and section 1533.051 of the Revised Code, "raptor"
    means a live migratory bird of the family Falconidae, of the family Strigidae,
    or of the family Accipitridae other than a bald eagle (Haliaeetus leucocephalus).

    (B) The chief of the division of wildlife may authorize the taking, possession,
    and transportation of raptors for use in the sport of falconry by rules adopted
    pursuant to section 1531.08 of the Revised Code. The rules shall be consistent
    with federal regulations governing raptors and may authorize the taking of game
    by the use of raptors, including taking with a trained raptor and a dog.

    The chief, by rules adopted pursuant to section 1531.08 of the Revised Code, may
    do all of the following:

    (1) Notwithstanding any other rule governing the taking of quail, authorize a
    person engaged in the sport of falconry to permit the person''s raptor to take
    quail;

    (2) Authorize special falconry seasons;

    (3) Authorize a person engaged in the sport of falconry to possess and to permit
    the person''s raptor to take European starlings, English sparrows, and common
    pigeons, other than homing pigeons, at any time.

    (C) No person shall take, possess, or transport a raptor for use in the sport
    of falconry or shall practice falconry without a permit to do so issued by the
    chief. The duration of the permit shall be consistent with applicable federal
    requirements. The chief may require a separate permit for the taking of raptors.

    The fees for permits shall be set by the chief in amounts sufficient to cover
    the expenses of the division of wildlife in exercising its authority under this
    section and may vary according to class and type of permit. Moneys received from
    the sale of permits shall be paid into the state treasury to the credit of the
    fund established in section 1533.15 of the Revised Code.

    An applicant for a permit shall present a valid hunting license issued to the
    applicant for the current license year under section 1533.13 of the Revised Code
    and shall maintain a valid and current hunting license thereafter while taking
    or attempting to take game or raptors to be used for falconry purposes. A permit
    issued under this section is not transferable. No person shall carry a permit
    issued in the name of another person.

    (D) Every person, while engaged in falconry on the lands of another, shall carry
    the permit issued to the person under this section together with a valid hunting
    license issued to the person for the current license year under section 1533.13
    of the Revised Code and shall exhibit the permit and license to any law enforcement
    officer requesting to see them.

    (E) Notwithstanding any other provision of this section, of any rule adopted by
    the chief governing falconry, or of any federal regulation governing raptors,
    no person shall take or disturb for the purpose of falconry the nest of a wild
    raptor or any young raptor in the wild that is not yet capable of flight except
    in such situations, and under the direct supervision of a wildlife officer, where
    the nest otherwise would be destroyed or the raptor would not survive.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.05
- number: '1533.051'
  heading: Commercial and noncommercial propagation of raptors
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) The chief of the division of wildlife may authorize commercial and noncommercial
    propagation of raptors by rules adopted pursuant to section 1531.08 of the Revised
    Code. The rules shall be consistent with federal regulations governing raptor
    propagation.

    (B) No person shall propagate raptors without a permit to do so issued by the
    chief. The duration of the permit shall be consistent with applicable federal
    requirements.

    The fees for permits shall be set by the chief in amounts sufficient to cover
    the expenses of the division in exercising its authority under this section and
    may vary according to the type of permit. Moneys received from the sale of permits
    shall be paid into the state treasury to the credit of the fund established in
    section 1533.15 of the Revised Code.

    (C) The chief shall issue a commercial raptor propagation permit in accordance
    with Chapter 4796. of the Revised Code to an applicant if either of the following
    applies:

    (1) The applicant holds a license or permit in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a person who propogates
    raptors in a state that does not issue that license or permit.

    (D) A permittee may use a raptor possessed for propagation in the sport of falconry
    only if the permittee is in compliance with section 1533.05 of the Revised Code
    and the raptor is reported under permits issued under both that section and this
    section.

    (E) This section does not apply to propagation of raptors by the state, any agency
    of the state, the United States, any agency or instrumentality thereof, or any
    zoological park.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.051
- number: '1533.07'
  heading: Protection afforded nongame birds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall catch, kill, injure, pursue, or have in the person''s possession,
    either dead or alive, or purchase, expose for sale, transport, or ship to a point
    within or without the state, or receive or deliver for transportation any bird
    other than a game bird, or have in the person''s possession any part of the plumage,
    skin, or body of any bird other than a game bird, except as permitted in Chapter
    1531. and this chapter of the Revised Code, or disturb or destroy the eggs, nest,
    or young of such a bird.

    This section does not prohibit the lawful taking, killing, pursuing, or possession
    of any game bird during the open season for the bird. Bald or golden eagles and
    ospreys shall not be killed or possessed at any time, except that eagles or ospreys
    may be possessed for educational purposes by governmental or municipal zoological
    parks, museums, and scientific or educational institutions. European starlings,
    English sparrows, and common pigeons, other than homing pigeons, may be killed
    at any time and their nests or eggs may be destroyed at any time. Blackbirds may
    be killed at any time when doing damage to grain or other property or when they
    become a nuisance.

    Each bird or any part thereof taken or had in possession contrary to this section
    constitutes a separate offense.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.07
- number: '1533.08'
  heading: Scientific, educational or rehabilitation collection permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, any person desiring to collect
    or possess wild animals that are protected by law or their nests or eggs for scientific
    study, school instruction, other educational uses, or rehabilitation shall make
    an annual application to the chief of the division of wildlife for a wild animal
    permit on a form furnished by the chief. Each applicant for a wild animal permit,
    other than an applicant desiring to rehabilitate wild animals, shall pay an annual
    fee of twenty-five dollars for each permit. No fee shall be charged to an applicant
    desiring to rehabilitate wild animals. The chief may issue to the applicant a
    permit to take, possess, and transport at any time and in a manner that is acceptable
    to the chief specimens of wild animals protected by law or their nests and eggs
    for scientific study, school instruction, other educational uses, or rehabilitation
    and under any additional rules recommended by the wildlife council. Upon the receipt
    of a permit, the holder may take, possess, and transport those wild animals in
    accordance with the permit.

    Each holder of a permit engaged in collecting or who possesses such wild animals
    shall carry the permit at all times and shall exhibit it upon demand to any peace
    officer, as defined in section 2935.01 of the Revised Code, or to the owner or
    person in lawful control of the land upon which the permit holder is collecting
    or possesses the wild animals. Failure to so carry or exhibit the permit constitutes
    an offense under this section.

    Each permit holder shall keep a daily record of all specimens collected or possessed
    under the permit and the disposition of the specimens and shall exhibit the daily
    record to any official of the division upon demand.

    Each permit shall remain in effect for one year from the date of issuance unless
    it is revoked sooner by the chief.

    All moneys received as fees for the issuance of a wild animal collecting permit
    shall be transmitted to the director of natural resources to be paid into the
    state treasury to the credit of the fund created by section 1533.15 of the Revised
    Code.'
