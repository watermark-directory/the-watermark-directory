- number: '1506.41'
  heading: Permit and lease fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: All moneys derived from the granting of permits and leases under section 1505.07
    of the Revised Code for the removal of sand, gravel, stone, gas, oil, and other
    minerals and substances from and under the bed of Lake Erie and from applications
    for shore structure permits submitted under section 1506.40 of the Revised Code
    shall be paid into the state treasury to the credit of the permit and lease fund,
    which is hereby created. Notwithstanding any section of the Revised Code relating
    to the distribution or crediting of fines for violations of the Revised Code,
    all fines imposed under division (A) of section 1505.99 of the Revised Code and
    under division (C) of section 1506.99 of the Revised Code shall be paid into that
    fund. The fund shall be administered by the department of natural resources for
    the protection of Lake Erie shores and waters; investigation and control of erosion;
    the planning, development, and construction of facilities for recreational use
    of Lake Erie; implementation of section 1506.40 of the Revised Code; preparation
    of the state shore erosion plan under section 1506.47 of the Revised Code; and
    state administration of Lake Erie coastal erosion areas under sections 1506.06
    and 1506.07 of the Revised Code.
  history: null
