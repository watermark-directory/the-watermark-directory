- number: '1531.35'
  heading: Wildlife boater angler fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: The wildlife boater angler fund is hereby created in the state treasury. The
    fund shall consist of money credited to the fund pursuant to section 5735.051
    of the Revised Code and other money contributed to the division of wildlife for
    the purposes of the fund. The fund shall be used for boating access construction,
    improvements, maintenance and repair of dams and impoundments, and acquisitions,
    including lands and facilities for boating access, and to pay for equipment and
    personnel costs involved with those activities, on waters on which the operation
    of gasoline-powered watercraft is permissible.
