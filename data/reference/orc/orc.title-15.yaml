- number: '1563.02'
  heading: Gaseous mine defined
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'As used in this chapter and Chapters 1561., 1565., and 1567. of the Revised
    Code, a gaseous mine is:

    (A) A mine in which methane has been ignited;

    (B) A mine in which methane has been detected in any of the open workings thereof
    by a permissible flame safety lamp;

    (C) A mine in which one fourth of one per cent or more of methane has been found
    in a sample of air taken in any of the open workings thereof upon analysis thereof
    by the mine laboratory provided for by section 1561.27 of the Revised Code. If
    such sample of air contains less than one half of one per cent of methane and
    if no other sample of air, taken in any of the open workings of such mine within
    twenty-four hours of the time such first-mentioned sample was taken, is, upon
    analysis by said laboratory, found to contain one fourth of one per cent or more
    of methane, such mine is not a gaseous mine unless a sample of air thereafter
    taken in any of the open workings of such mine and prior to ten days after the
    date upon which such first-mentioned sample was analyzed is, upon analysis by
    said laboratory, found to contain one fourth of one per cent or more of methane.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.02
- number: '1563.03'
  heading: Map of new mine
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator of each underground mine shall, in opening a new mine, cause
    a map of such mine to be made at such time as the second opening required by section
    1563.14 of the Revised Code is completed in such mine. Such map shall be made
    on a scale not less than two hundred feet per inch and shall show:

    (A) The boundary lines and the names of the owners of the surface of each tract
    under which excavation is made, and for not less than five hundred feet contiguous
    thereto, and under which excavations are likely to be made during the ensuing
    year, together with all streams and bodies of standing water;

    (B) The township and county lines coming within the limits of such map, with the
    name of each plainly marked close to and parallel with such lines;

    (C) The title, the name or number of the mine or both, and the township and county
    in which it is located;

    (D) The section lines, with the number of each, marked plainly within the sections;

    (E) The location of the mine openings, railroad tracks, public highways, oil and
    gas wells, magazines, and buildings, plainly marked with name of each;

    (F) The location of all underground semipermanent and permanent transformers and
    substations;

    (G) The location and extent of the excavations and connection with the surface
    survey;

    (H) The direction of the air current, or air currents, by arrows;

    (I) The location and extent, so far as known or obtainable, of the excavation
    of any other mine within the limits of the map;

    (J) The boundary lines of the tracts of coal owned or leased within the limits
    of the map;

    (K) The elevation of the floor of the excavation, above mean tide at Sandy Hook,
    at or near the boundary line of the coal owned or leased where the coal is adjacent
    to coal owned by a person, firm, or corporation, other than the owner or lessee
    of such mine, and where the excavations of such mine cease or may be approached
    by another mine, at points not exceeding three hundred feet apart, and referenced
    to some permanent monument near the main opening of such mine, and shown on the
    map and plainly marked bench mark, with the elevation of same.

    Such map requirements, insofar as they are applicable, apply to all stripping
    mines.

    No operator of an underground mine shall refuse or neglect to comply with this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.03
- number: '1563.04'
  heading: Survey - copies of map and survey - certification
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator of each underground mine shall have a survey made whenever the
    workings of the mine have extended four hundred feet in any direction from the
    point shown on the map by the last survey of such mine, but not more often than
    once every six months, or whenever such mine is to be abandoned or shut down for
    a sufficient period of time to make it impossible to survey the working faces
    as prescribed by this section because of the caving of the roof. Such surveys
    shall be accurately plotted on the original map of the mine as prescribed in section
    1563.03 of the Revised Code. A copy of such map with the latest survey plotted
    thereon shall be kept at such mine, available for the use of the chief of the
    division of mineral resources management, and the deputy mine inspectors, and
    available for inspection by the employees at all reasonable times, and a copy
    of the same shall be promptly forwarded to the chief, with the certificate of
    the engineer making same and of the superintendent or mine foreperson in charge
    of the mine at the time of the survey, acknowledged before a notary public or
    other officer empowered to administer oaths, in the following form:

    "I, the undersigned, hereby certify that this map is correct and shows all the
    information required by section 1563.03 of the Revised Code and covers the period
    ending ______________________________________________________________________________________________________________
    Engineer

    Acknowledged before me a _________________________________

    _________ this ____________ day of _______________________

    ___________________________

    I, the undersigned, hereby certify that I am mine foreperson at the mine represented
    by this map and to the best of my knowledge and belief the same correctly represents
    the excavations of the mine for the period ending___________________

    Acknowledged before me a _________________________________

    _________ this ____________ day of ____________________________

    ___________________________"

    The operator of a mine shall file, at least annually, a map of the same with the
    chief, so certified.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.04
- number: '1563.05'
  heading: Failure to make and file map or addition
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: Upon the refusal or neglect of the owner, lessee, or agent of the mine to
    make and file a map or any addition thereto, as required by sections 1563.03,
    1563.04, and 1563.42 of the Revised Code, within sixty days after being directed
    to do so by the chief of the division of mineral resources management, the chief
    may cause such map or addition thereto to be made in duplicate at the expense
    of such owner, lessee, or agent, the cost of which shall be recoverable against
    such owner, lessee, or agent in the name of the chief in any court of competent
    jurisdiction in the county in which such mine is located, or in Franklin county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.05
- number: '1563.06'
  heading: Right of entry
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: For the purpose of making the examinations provided for in this chapter and
    Chapters 1561., 1565., and 1567. and applicable provisions of Chapter 1509. of
    the Revised Code, the chief of the division of mineral resources management, and
    each deputy mine inspector, may enter any mine at a reasonable time, by day or
    by night, but in such manner as will not necessarily impede the working of the
    mine, and the owner, lessee, or agent thereof shall furnish the means necessary
    for such entry and examination.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.06
- number: '1563.07'
  heading: Examination or survey of mine by adjoining landowner - notice
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: Each person owning land adjoining a mine worked for the production of coal,
    and each person interested in such mine, who has reason to believe that the protection
    of his interests therein or in the coal on his adjoining land requires it, upon
    making affidavit to that effect before a judge of a county court or judge of a
    municipal court or other proper officer, may enter such mine and have an examination
    or survey of it made, after giving three days' notice, in writing, to the owner,
    lessee, or agent of such mine. Such examination shall be made at such time, and
    in such manner as will least interfere with the working of the mine.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.07
- number: '1563.08'
  heading: Surveying party - fees
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: When the affidavit has been made, and notice given, as provided in section
    1563.07 of the Revised Code, upon the application of the person giving notice,
    the person in charge of the mine shall transport, by the ordinary method for entrance
    and exit in use at such mine, a surveying party of not more than three persons,
    furnish them with a competent guide, and supply them with necessary and proper
    lamps. The person requesting the survey shall pay the person in charge of the
    mine fifty cents for such persons transported, and five dollars per day for the
    guide; but if the shaft, if such mine is a shaft mine, exceeds two hundred fifty
    feet in depth, he shall pay one dollar for each person so transported.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.08
- number: '1563.09'
  heading: Examination or survey - liability for damage
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The person owning or operating a mine shall not hinder or obstruct an examination
    or survey under section 1563.07 of the Revised Code, if made at a reasonable time,
    in a reasonable manner, and as provided by law.

    If the owner or lessee of a mine sustains damage for which compensation should
    be made because such examination or survey was made at an unreasonable time, or
    in an improper or unwarranted manner, the person making such examination or survey
    shall be liable therefor to such owner or lessee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.09
- number: '1563.10'
  heading: Refusal to permit survey - judgment
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: If the owner, lessee, or agent of a mine refuses to comply with sections 1563.08
    and 1563.09 of the Revised Code, the person who makes the application for the
    survey may recover judgment as upon default, in a court of competent jurisdiction,
    against the owner, lessee, or agent, in such sum as he declares under oath that
    he believes to be justly due him for coal belonging to him taken by the owner,
    lessee, or agent of the mine without his permission. The statute of limitations
    shall not run against such claim, but the demand, and refusal of permission to
    enter such mine, must be proven to the satisfaction of the court or jury.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.10
- number: '1563.11'
  heading: Mining near public roads
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: '(A) Unless a permit has been issued by the director of transportation, or
    the board of county commissioners, or the board of township trustees, or such
    other public authority that is charged by law with the maintenance of a public
    road, and the approval of the chief of the division of mineral resources management
    has been obtained, no person, firm, or corporation, engaged in mining or quarrying
    any mineral, coal, stone, or clay, shall:

    (1) Extend any part of an open pit excavation closer than fifty feet of horizontal
    distance to any part of a public road;

    (2) Deposit mine refuse or removed overburden:

    (a) Closer to a public road than a line parallel to the boundary line of such
    road and fifty feet of horizontal distance away from such road and at the same
    elevation as the elevation of the crown of such road;

    (b) Higher than a line beginning at a point fifty feet of horizontal distance
    away from such road and at the same elevation as the elevation of the crown of
    such road, and extending from such beginning point upward and away from such road
    at an angle of forty degrees from the horizontal plane.

    Any person, firm, or corporation desiring such a permit shall apply in writing
    therefor to the proper public authority, and shall describe in such application
    the excavating or depositing of mine refuse or removed overburden that it will
    do and for which it requests a permit. The applicant shall also furnish such public
    authority with such additional data and information concerning such work as such
    public authority may request and that shall be relevant, in making the determination
    that such public authority is required to make as to the amount of bond or other
    security the applicant shall be required to deposit before such a permit is issued
    to the applicant.

    Upon receipt of such an application such public authority shall promptly consider
    what damage, if any, may be done to such public highway by the excavating or depositing
    of mine refuse or removed overburden for which the permit is requested, and estimate
    the reasonable cost of repairing such damage, if any should occur, and fix the
    amount of such estimate of cost as the amount of bond or other security that the
    applicant shall deposit with such public authority upon issuance of the permit
    requested, to ensure payment of the cost of repairing any such damage that might
    occur. Such public authority shall promptly notify the applicant of the amount
    of bond or other security it has so fixed.

    Upon approval of the chief and deposit with the public authority of a surety bond
    signed by the applicant as principal, and by a surety company authorized to transact
    business in this state as surety, or of cash or other security satisfactory to
    such public authority, in the amount fixed by such authority, and conditioned
    upon the payment to such public authority by applicant of the cost of repairing
    any damage to such public road occurring as a result of the excavating or depositing
    of mine refuse or removed overburden for which the permit was issued, the public
    authority shall issue to the applicant the permit for which the applicant applied.

    If, at the end of three years after such excavation or deposit of mine refuse
    or removed overburden is made, the licensee shall have paid or caused to be paid
    all cost of repairing any damage to such public road occurring within such time
    as a result of such excavating or depositing for which such permit was issued,
    or, if within such period of time no such damage to such shall have occurred,
    the bond or cash or other security deposited with the public authority upon the
    issuance of such permit, shall be released and returned to such applicant.

    (B) Any person, firm, or corporation owning any land containing mineral, coal,
    stone, or clay, and over any portion of which any state, county, or township road
    or public highway passes, may drill, excavate, mine, or quarry through or under
    such road. Before the work is commenced, such person, firm, or corporation shall
    execute and deliver to the director of transportation in case of state roads,
    to the board of county commissioners in case of county roads, or to the board
    of township trustees in case of township roads, a bond, with good and sufficient
    surety in such amount as shall be considered by the director, the board of county
    commissioners, or the board of township trustees, sufficient to cover any damages
    that may accrue by excavating, mining, or quarrying through or under any such
    road, the same to be approved by such director, board of county commissioners,
    or board of township trustees. Such bond shall be conditioned that while crossing
    over or mining or quarrying under any such road, a safe and unobstructed passageway
    or road shall be kept open by such person, firm, or corporation for the public
    use, and as soon as practicable, such road shall be fully restored to its original
    safe and passable condition. When such crossing is made by excavation at a depth
    of more than thirty feet below the surface of such road, the person, firm, or
    corporation making the same shall be liable to the director, board of county commissioners,
    or board of township trustees for any damage that may accrue by such excavation,
    and shall be held to fully repair any such damage and to restore such road to
    its original safe and passable condition. The right to mine or quarry across or
    under public highways as provided in this section, shall accrue to the owner,
    lessee, or agent of the land upon or through which such highway passes.

    As used in this section, "road" or "highway" means the entire right of way as
    well as the improved portion thereof, and includes bridges, viaducts, grade separations,
    appurtenances, and approaches on or to such road or highway.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.11
- number: '1563.111'
  heading: Mining near oil or gas well
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: No owner, lessee, or agent shall conduct mining operations within twenty-five
    feet of any known well, or locate a mine opening within three hundred feet of
    any well that produces oil or gas unless the owner, lessee, or agent obtains permission
    in writing from the chief of the division of mineral resources management.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.111
- number: '1563.12'
  heading: Construction regulations to be observed in opening mine
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'Any person, firm, or corporation, beginning the opening of a mine, whether
    or not such person, firm, or corporation is the owner, lessee, or agent of the
    property upon which such mine is located, shall notify the chief of the division
    of mineral resources management, and observe the following in the construction
    of such mine:

    (A) If the opening is a slope or vertical shaft, no explosive used therein shall
    be fired by means of a squib or fuse after the same is extended more than twenty-five
    feet from the surface, and thereafter and until the slope or shaft reaches the
    seam and the entry or landing is extended beyond a break-through or other place
    driven at right angles thereto, no explosive shall be fired except by means of
    an electric battery operated from the surface after all persons are on the surface.

    (B) A substantial structure to sustain sheave wheels or pulleys, ropes, and loads,
    shall be provided, and if the opening is a shaft, the same shall be placed at
    a height of not less than twenty-five feet above the tipping place.

    (C) A landing platform shall be arranged in such manner that no material can fall
    into the shaft while the bucket is being emptied, and the shaft shall not be sunk
    to a depth of more than thirty feet without such structure.

    (D) If the bucket used for hoisting material is to land on a truck, the track
    on which such truck is operated and the platform shall be so constructed that
    material cannot fall into the shaft.

    (E) Rock and coal shall not be hoisted from a shaft or slope except in a bucket
    or cage attached to a rope by a safety hook, clevis, or other safe attachment,
    and the bucket or cage securely locked so that same cannot tip or empty while
    being hoisted.

    (F) Such rope shall be fastened to the side of the drum, and not less than three
    coils of rope shall always remain on the drum.

    (G) After the shaft reaches a depth of one hundred feet, the same shall be provided
    with guides and guide attachments, applied in such a manner as to prevent the
    bucket from swing while being lowered or hoisted, and such guides and guide attachments
    shall be maintained at a distance of not more than seventy-five feet from the
    bottom of the shaft.

    (H) The sides of all shafts shall be properly secured for safety and no loose
    rock or material shall be allowed to remain on any timber in the shaft after each
    blast.

    (I) All loose timber, tools, and materials shall be kept away from the top of
    the shaft to reduce the danger of the same falling down the shaft.

    (J) Where explosive gas is encountered, the person in charge shall see that the
    shaft or slope is examined before each shift of workers enters to work, and before
    the the workers descend after each blast.

    (K) The slope, or shaft, shall be properly ventilated so that persons working
    therein will have the necessary air.

    (L) An efficient brake shall be attached to each drum of an engine used in hoisting
    material and persons, and all machinery, ropes, and chains connected therewith
    shall be carefully examined once each shift.

    (M) Not more than four persons shall be lowered or hoisted in or on a bucket at
    one time, and no person shall be permitted to ride on a loaded bucket.

    (N) The bucket used in lowering or hoisting persons shall be equipped with proper
    safety devices, so that it cannot become detached from the rope or cable, and
    cannot tip or turn upside down while being so used.

    The chief, and the deputy mine inspector, shall have jurisdiction over such mine
    when the shaft or slope reaches a depth of twenty-five feet, and such person,
    firm, or corporation shall comply with any order issued by either or both of them
    with respect to the safety of persons employed. Other than this section, this
    chapter and Chapters 1561., 1565., and 1567. of the Revised Code do not apply
    to the opening of a mine until such opening reaches the seam, and the entry or
    landing is extended beyond a break-through, or other place driven at right angles
    thereto.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.12
- number: '1563.13'
  heading: Maintenance of means of egress from mine
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'When a deputy mine inspector considers that the ways and means of egress
    in any underground mine from the interior working places to the surface are inadequate
    as a safe and ready means of escape in case of emergency, from danger of fire
    at any point, or any other cause that may result in the entombment of persons
    working in the mine, the deputy mine inspector shall give notice in writing to
    the owner, lessee, or agent of the mine of the particular in which the deputy
    mine inspector considers the conditions dangerous, recommending any changes that
    the conditions require, and forthwith shall mail a copy of the deputy mine inspector''s
    recommendations to the chief of the division of mineral resources management.
    Upon receipt of the recommendations, the chief forthwith shall make a finding
    concerning them and mail a copy to the operator of the mine and to the deputy
    mine inspector. A copy of the finding of the chief shall be posted upon the bulletin
    board at the time.

    The operator of the mine, or the authorized representative of the workers of the
    mine, within ten days may appeal to the reclamation commission for a review and
    redetermination of the finding of the chief in the matter in accordance with section
    1513.13 of the Revised Code, notwithstanding division (A)(1) of that section,
    which provides for appeals within thirty days. A copy of the decision of the commission
    shall be mailed as required by this section for the mailing of the finding by
    the chief on the deputy mine inspector''s report.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.13
- number: '1563.14'
  heading: Two openings required - exceptions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'Except as provided in this section, the operator of an underground coal mine
    shall not employ, or permit any person to work therein, unless there are at least
    two openings to every seam worked in such mine, separated by natural strata of
    not less than one hundred feet in breadth at any point, by which distinct means
    of ingress and egress are always available to the persons therein employed. Such
    openings need not belong to the same mine so long as the persons employed therein
    have safe, ready, and available means of ingress and egress, by not less than
    two openings; provided that no air shaft with a ventilating furnace at the bottom
    shall be designated or used as a means of ingress or egress. This section does
    not apply to:

    (A) Opening a new mine; however, not more than twenty miners may be allowed at
    any one time in any mine until a connection has been made between the two mine
    openings. Such connections shall be made as quickly as possible.

    (B) A mine in which the second opening has become unavailable for any reason,
    so long as not more than twenty persons are employed therein at any one time and
    are engaged in the process of restoring the second opening or developing a new
    opening;

    (C) A mine in which the second opening has become unavailable by reason of the
    final robbing of the pillars previous to abandonment, so long as not more than
    twenty persons are employed therein at one time, and the distance between the
    mine opening and the working face does not exceed five hundred feet.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.14
- number: '1563.15'
  heading: Additional opening for protection against inundation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'At any mine where there is a stream or body of water on the surface, or in
    the workings of the mine, at a higher level, which is likely to break through
    into such mine, and inundate either the traveling or escapement way of such mine,
    so as to prevent the egress of persons employed therein, the operator shall provide
    and maintain and additional opening by means of which such persons may escape
    without using the traveling or escapement way likely to be inundated.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.15
- number: '1563.16'
  heading: Doors
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'In the development of mines, doors shall be eliminated wherever practicable.
    All main or principal air currents shall be controlled by double doors to form
    an air lock, said doors to be self-closing and to be a sufficient distance apart
    to accommodate any trip that may be handled through them, thus having one door
    closed at all times. At all points where double doors are impracticable and single
    doors are used, there must be an attendant in charge of said door unless a self-closing
    door approved by the deputy mine inspector is used. A hole for shelter shall be
    provided at each door to protect the attendant from danger from cars while performing
    his duties. Persons when regularly employed for this purpose shall remain at the
    doors at all times during working hours. The same attendant may attend two doors
    if his absence from the first door does not endanger the safety of the employees.
    At every door on any incline plane or road whereon haulage is done by equipment
    other than locomotives, an attendant shall always be on duty during working hours,
    and an extra door shall be provided for use in case of necessity. Except where
    double doors are used, a spare or standby door shall be installed adjacent to
    all regular doors on main haulage roads for emergency use. The responsibility
    for closing doors shall rest upon the person who opens them. This section does
    not apply to clay mines.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.16
- number: '1563.17'
  heading: Break-throughs and brattices
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'From a point where the seam is reached in the opening of an underground mine,
    to a point not exceeding a distance of four hundred feet therefrom, break-throughs
    shall be made between mine entries, where there are no rooms worked, not more
    than one hundred feet apart, provided such entries are not advanced beyond the
    point where the break-through will be made until the break-through is complete.
    Break-throughs between entries, except as provided in this section, shall be made
    not exceeding sixty feet apart. Where there is a solid block on one side of the
    room, break-throughs shall be made between such room and the adjacent room not
    to exceed sixty feet apart; where there is a breast or group of rooms, a break-through
    shall be made on one side or the other of each room, except the room adjoining
    the block not to exceed forty feet from the outside corner of the break-through
    to the nearest corner of the entrance to the room, and on the opposite side of
    the same room a break-through shall be made not to exceed eighty feet from the
    outside corner of the break-through to the nearest corner of the entrance to the
    room, and thereafter break-throughs shall be made not to exceed eighty feet apart
    on each side of the room. No working place, except those provided for within a
    distance of four hundred feet of the principal opening of a mine, shall be driven
    more than eighty feet in advance of a break-through or airway. The required air
    current shall be distributed to the working face of such entry or room. All break-throughs
    between entries, and when necessary between rooms, except the one nearest the
    working face, shall be closed and made airtight by brattice, trap doors, or other
    means, so that the current of air in circulation may sweep to the interior of
    the mine. Brattices between permanent inlet and outlet airways shall be constructed
    in a substantial manner of brick, masonry, concrete, or nonperishable material,
    provided that in hand-loading and nongaseous mines such brattices may be of wood.
    In mines generating firedamp, so as to be detected by a flame safety lamp, the
    air current shall be conducted by brattice, or other means, near enough to the
    working face to expel the firedamp, and prevent the accumulation of same. With
    the approval of the chief of the division of mineral resources management, a greater
    distance than specified in this section may be allowed between break-throughs.
    Any operator of a mine desiring to allow a greater distance between break-throughs
    than specified in this section shall file a written request to do so with the
    chief, together with a map of the mining and ventilating system for which approval
    and permission are asked, attached thereto, and the map shall become a part of
    the records in the office of the chief.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.17
- number: '1563.18'
  heading: Separate traveling ways
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator of a mine shall provide and maintain, in safe condition for
    the purpose provided, two separate and distinct traveling ways from the interior
    workings of the mine, each of which shall be available to at least one opening
    to the surface. One of such traveling ways may be designated by such operator
    as the principal traveling way. One of such traveling ways shall be designated
    as the escapement way, which shall be properly marked, clearly showing the direction
    to the outside. This section does not prohibit such operator from designating
    more than one principal traveling way or more than one escapement way, so long
    as this section is complied with. This section does not modify or change section
    1563.17 of the Revised Code as to the making of break-throughs.

    Except as provided in section 1563.14 of the Revised Code, at least two separate
    and distinct travelable passageways which are maintained to insure passage at
    all times of any person, including disabled persons, and which passageways are
    to be designated as escapeways. At least one escapeway ventilated with intake
    air shall be provided from each working section continuous to the surface escape
    drift openings or slope facilities to the surface. Such escapeways shall have
    man doors located throughout their length at distances not exceeding five hundred
    feet.

    Except in situations where the height of the coal bed is less than five feet,
    escapeways shall be maintained at a height of at least five feet, excluding necessary
    roof support, and the travelway in each escapeway shall be maintained at a width
    of at least six feet. Where the height of the coal bed is less than five feet,
    the escapeway shall be maintained to the height of the coal bed, excluding any
    necessary roof support, and the travelway in such escapeways shall be maintained
    at a width of at least six feet.

    Escapeways shall be maintained in a safe condition and the way of escape properly
    marked.

    Updated maps of the escapeways shall be maintained on each working section.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.18
- number: '1563.19'
  heading: Slopes and mechanical haulageways - refuge holes
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator of a mine worked by shaft shall provide, and keep free from
    obstruction, a traveling way or passageway from one side of the shaft bottom to
    the other. Slopes and mechanical haulageways used as traveling ways by persons
    employed in a mine shall be made of a sufficient width to give not less than three
    feet of space between the rib and adjacent side of car or mechanical device to
    permit persons to pass moving cars with safety. If found impracticable to make
    such slopes or mechanical haulageways of sufficient width as provided, refuge
    holes, properly marked and whitewashed, not less than six feet in width and clearing
    the adjacent rail of the tract not less than four feet, and not more than sixty
    feet apart, shall be made on one side of the slope or mechanical haulageway. The
    refuge holes shall be kept free from obstruction, and the roof and sides made
    secure. The deputy mine inspector may prohibit persons from walking such slope
    when cars are being hoisted or lowered upon it.

    During each shift a certified person shall inspect all belt lines to determine
    if there is a violation of a mandatory health or safety standard.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.19
- number: '1563.20'
  heading: Track in mines - minimum clearance
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'For the protection of transportation workers, track shall be laid to provide
    a minimum clearance of fourteen inches on the side of the entry opposite the trolley
    or feed wire at all haulage turnouts and crossovers between butt entries, on gathering
    passageways, on room entries, and chutes between room entries, except that where
    brake handles are on the side of mine cars, the clearance shall be provided on
    the wire side of such entries as have the wire on the same side as the brake handles.
    The clearance specified in this section shall be measured horizontally between
    the topside of the widest mine car and the rib. This section does not apply to
    entries having been driven prior to September 2, 1941, or at any mine or section
    of a mine, where, in the opinion of the division of mineral resources management,
    the roof conditions are such as to require a width of entry not sufficient to
    provide the clearance set out in this section.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.20
- number: '1563.21'
  heading: Location of boilers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The permanent boilers used for generating steam, and the buildings containing
    the boilers, shall not be nearer than sixty feet to any mine opening, or to a
    building or inflammable structure connected with or surrounding such opening.

    No owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.21
- number: '1563.23'
  heading: Bathing facilities, clothing change rooms, and sanitary toilet facilities
    to be provided
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'Each operator of an underground coal mine shall provide bathing facilities,
    clothing change rooms, and sanitary toilet facilities in a location at each mine
    convenient for the use of all mine employees. All such bathing facilities, change
    rooms, and sanitary toilet facilities shall be constructed and equipped so as
    to comply with applicable building codes. If no building code is applicable, such
    facilities shall be constructed and equipped so as to meet the minimum construction
    requirements of the national building code, and the minimum plumbing requirements
    of the U.S.A. standard plumbing code, ASA A40.8-1955.

    Bathing facilities, change rooms, and sanitary toilet facilities shall meet the
    following minimum requirements:

    (A) Showers shall be provided with both hot and cold water.

    (B) At least one shower head shall be provided where five or fewer miners use
    such showers.

    (C) Where five or more miners use such showers, sufficient additional showers
    shall be furnished to provide approximately one shower head for each five miners.

    (D) A suitable cleansing agent shall be provided for use at each shower.

    (E) At least one sanitary flush toilet shall be provided where ten or fewer miners
    use such facilities.

    (F) Where ten or more miners use such sanitary toilet facilities, sufficient toilets
    shall be furnished to provide approximately one sanitary flush toilet for each
    ten miners.

    (G) Where thirty or more miners use sanitary toilet facilities, one urinal may
    be substituted for one sanitary flush toilet, however, where such substitutions
    are made they shall not reduce the number of toilets below a ratio of two toilets
    to one urinal.

    (H) An adequate supply of toilet paper shall be provided with each toilet.

    (I) Adequate handwashing facilities or hand lavatories shall be provided in or
    adjacent to each toilet facility.

    (J) Individual clothes storage containers or lockers shall be provided for storage
    of miners'' clothing and other incidental personal belongings during and between
    shifts.

    (K) Change rooms shall be provided with ample space to permit the use of such
    facilities by all miners changing clothes prior to and after each shift.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.23
- number: '1563.24'
  heading: Mine foreperson of gaseous mine - powers and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'In all mines generating methane in such quantities as to be considered a
    gaseous mine under section 1563.02 of the Revised Code, the mine foreperson of
    such a mine shall:

    (A) Employ a sufficient number of competent persons holding foreperson of gaseous
    mines or fire boss certificates, except as provided in section 1565.02 of the
    Revised Code, to examine the working places whether they are in actual course
    of working or not, and the traveling ways and entrances to old workings with approved
    flame safety lamps, all of which shall be done not more than three hours prior
    to the time fixed for the employees to enter the mine;

    (B) Have all old parts of the mine not in the actual course of working, but that
    are open and safe to travel, examined not less than once each three days by a
    competent person who holds a foreperson of gaseous mines or a fire boss certificate;

    (C) See that all parts of the mine not sealed off as provided in section 1563.41
    of the Revised Code are kept free from standing gas, and upon the discovery of
    any standing gas, see that the entrance to the place where the gas is so discovered
    is fenced off and marked with a sign upon which is written the word "danger,"
    and the sign shall so remain until the gas has been removed;

    (D) Have the mine examined on all idle days, holidays, and Sundays on which employees
    are required to work therein;

    (E) If more than three hours elapse between shifts, have the places in which the
    succeeding shift works examined by a competent person who holds a foreperson of
    gaseous mines or fire boss certificate;

    (F) See that this chapter and Chapters 1561., 1565., and 1567. and applicable
    provisions of Chapter 1509. of the Revised Code, with regard to examination of
    working places, removal of standing gas, and fencing off of dangerous places,
    are complied with before the employees employed by the mine foreperson for this
    particular work are permitted to do any other work;

    (G) Have a report made on the blackboard provided for in section 1567.06 of the
    Revised Code, which report shall show the condition of the mine as to the presence
    of gas and the place where such gas is present, if there is any, before the mine
    foreperson permits the employees to enter the mine;

    (H) Have reports of the duties and activities enumerated in this section signed
    by the person who makes the examination. The reports so signed shall be sent once
    each week to the deputy mine inspector of the district in which the mine is located
    on blanks furnished by the division of mineral resources management for that purpose,
    and a copy of the report shall be kept on file at the mine.

    (I) Have the fire boss record a report after each examination, in ink, in the
    fire boss'' record book, which book shall show the time taken in making the examination
    and also clearly state the nature and location of any danger that was discovered
    in any room, entry, or other place in the mine, and, if any danger was discovered,
    the fire boss shall immediately report the location thereof to the mine foreperson.

    No person shall enter the mine until the fire bosses return to the mine office
    on the surface, or to a station located in the mine, where a record book as provided
    for in this section shall be kept and signed by the person making the examination,
    and report to the oncoming mine foreperson that the mine is in safe condition
    for the employees to enter. When a station is located in any mine, the fire bosses
    shall sign also the report entered in the record book in the mine office on the
    surface. The record books of the fire bosses shall at all times during working
    hours be accessible to the deputy mine inspector and the employees of the mine.

    In every mine generating explosive gas in quantities sufficient to be detected
    by an approved flame safety lamp, when the working portions are one mile or more
    from the entrance to the mine or from the bottom of the shaft or slope, a permanent
    station of suitable dimensions may be erected by the mine foreperson, provided
    that the location is approved by the deputy mine inspector, for the use of the
    fire bosses, and a fireproof vault of ample strength shall be erected in the station
    of brick, stone, or concrete, in which the temporary record book of the fire bosses,
    as described in this section, shall be kept. No person, except a mine foreperson
    of gaseous mines, and in case of necessity such other persons as are designated
    by the mine foreperson, shall pass beyond the permanent station and danger signal
    until the mine has been examined by a fire boss, and the mine or certain portions
    thereof reported by the fire boss to be safe.

    This section does not prevent a mine foreperson or foreperson of gaseous mines
    from being qualified to act and acting in the capacity of fire boss. The record
    book shall be supplied by the division and purchased by the operator.

    No mine foreperson or person delegated by the mine foreperson, or any operator
    of a mine, or other person, shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.24
- number: '1563.25'
  heading: Accumulation of combustible materials prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'Coal dust, loose coal, and other combustible materials shall not be permitted
    to accumulate in any active workings. Where mining operations raise an excessive
    amount of dust into the air, water or water with a wetting agent added to it,
    or other effective methods, shall be used to allay such dust at its source.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.25
- number: '1563.26'
  heading: Rock dusting - testing of dust samples
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'All mines, except those mines or locations in a mine that are too wet or
    too high in incombustible content to propagate an explosion, shall be rock dusted.
    The rock dusting shall be done with such regularity and frequency that all surfaces
    required to be rock dusted shall be kept in such condition that the incombustible
    content of the adhering and lodging dust is not less than sixty-five per cent.
    When methane is present in any ventilating current, such incombustible content
    shall be not less than sixty-five per cent plus one and four-tenths per cent for
    each one tenth of one per cent of methane so present.

    The rock dust to be used shall be pulverized limestone or any other material containing
    less than five per cent combustible material. All dust shall be so pulverized
    that it will all go through a sieve that has twenty openings to the linear inch
    and at least fifty per cent of such dust shall pass through a sieve with two hundred
    openings to the linear inch. The rock dust shall not contain more than four per
    cent free silicon and silicon dioxide.

    The rock dust shall be distributed on top, bottom, and sides of all haulageways,
    traveling ways, developing entries, and rooms to within forty feet of face. Back
    entries shall be rock dusted for at least one thousand feet out by the junction
    with the first active entry.

    In coal mines where rock dusting is required, the superintendent shall see that
    a representative sample of dust is gathered at each sampling point from the roof,
    sides, and floor of all entries by a competent person once each sixty days and
    tested to determine if any part of the mine requires redusting, and a record shall
    be kept in a book furnished by the division of mineral resources management for
    that purpose. Such books shall be kept in the mine office. Such record shall show
    the location at which samples have been taken and the results of the analyses
    or tests. The distance between sampling points on haulageways and traveling ways
    shall not exceed two thousand feet, but in developing entries and in entries producing
    coal from rooms or pillars and their parallel entries the distance between sampling
    points shall not exceed five hundred feet.

    No operator of a mine shall refuse or neglect to comply with this section.'
