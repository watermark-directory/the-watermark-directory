- number: '1518.01'
  heading: Rules for identifying and designating plants native to Ohio which are endangered
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1518'
    name: Endangered Species
  text: The chief of natural areas and preserves shall adopt and may amend or rescind
    rules, in accordance with Chapter 119. of the Revised Code, setting forth criteria
    for identifying and designating species of plants native to this state that are
    in danger of extirpation or are threatened with becoming endangered. The chief
    shall adopt and may amend or rescind rules, in accordance with Chapter 119. of
    the Revised Code, setting forth a list of the plants that the chief determines
    to be endangered or threatened with extirpation from this state, applying the
    criteria so developed. This list shall identify the common and scientific names
    of each species. The list shall include all species native to this state that
    are listed on the "United States list of endangered and threatened wildlife and
    plants" pursuant to the "Endangered Species Act of 1973," 87 Stat. 884, 16 U.S.C.
    1531-1543, as amended. Further, the chief may produce for public education purposes
    lists of plant species which shall include the names of species of plants that
    may become threatened in the future through habitat loss, commercial exploitation,
    or other means.
