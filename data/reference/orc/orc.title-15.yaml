- number: '1533.151'
  heading: Wildlife conservation stamps
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The chief of the division of wildlife, with the approval of the director
    of natural resources, may print and issue stamps portraying wild animals of the
    state. This stamp shall be identified as a wildlife conservation stamp. The fee
    for each stamp shall be not more than the fee for a wetlands habitat stamp issued
    under section 1533.112 of the Revised Code.

    The purchase of wildlife conservation stamps shall provide no privileges to the
    purchaser, but merely recognizes the person as voluntarily contributing to the
    management, protection, and the perpetuation of the wildlife resources of the
    state. All moneys received from the sale of wildlife conservation stamps shall
    be paid into the state treasury to the credit of the nongame and endangered wildlife
    fund to be used exclusively by the division of wildlife for the purposes outlined
    in section 1531.26 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.151
- number: '1533.16'
  heading: Weapons for taking game birds and wild quadrupeds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Game birds and wild quadrupeds shall be taken only by hunting with a gun,
    with a gun and dog, with a bow and arrow, or with a bow and arrow and dog unless
    otherwise provided by the Revised Code or division rule. Fur-bearing animals may
    be taken by trapping according to the Revised Code or division rule. No gun larger
    than ten gauge shall be used in taking game birds or wild quadrupeds.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.16
- number: '1533.161'
  heading: Prohibiting jacklighting
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall throw or cast the rays of a spotlight or other artificial
    light from any vehicle into any field, woodland, or forest while having in his
    possession a hunting device, or throw or cast the rays of a spotlight or other
    artificial light from any vehicle into any field, woodland, or forest for the
    purpose of locating a wild animal.

    This section does not apply to law enforcement officers, wildlife officers, military
    personnel, and officers or employees of the department of natural resources while
    in the performance of their duties, or to any landowner or lessee having a reason
    to use a light while engaged in surveillance or protection of his property.

    An officer whose duty it is to enforce this chapter and Chapter 1531. of the Revised
    Code and division rules may arrest a person whom he has reasonable grounds to
    believe is violating this section, search the vehicle for firearms or other hunting
    implements in the possession or under the control of that person, and seize the
    same.'
