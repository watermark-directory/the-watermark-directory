    num: '1547'
    name: Watercraft And Waterways
  text: 'No person shall purposely leave an abandoned junk vessel or outboard motor
    on private property for more than seventy-two hours without the permission of
    the person having the right to the possession of the property; in a sunken, beached,
    or drifting condition for any period of time; or in a docked condition, on a public
    street or other property open to the public, or upon or within the right-of-way
    of any waterway, road, or highway, for forty-eight hours or longer without notification
    to the sheriff of the county, chief of police of the municipal corporation, township,
    township police district, or joint police district, or other chief of a law enforcement
    agency, having territorial jurisdiction with respect to the location of the vessel
    or motor, of the reasons for leaving the vessel or motor in any such place or
    condition.

    For purposes of this section, the fact that an abandoned junk vessel or outboard
    motor has been so left without permission or notification is prima-facie evidence
    of abandonment.

    Nothing in sections 1547.30, 1547.301, and 1547.303 of the Revised Code invalidates
    the provisions of any ordinance of a municipal corporation regulating or prohibiting
    the abandonment of vessels or outboard motors on waterways, beaches, docks, streets,
    highways, public property, or private property within the boundaries of the municipal
    corporation.'
  history: null
