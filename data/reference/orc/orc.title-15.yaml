- number: '1501.191'
  heading: Little Miami forest preserve
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: 'Hillside land owned by the state adjacent to the Little Miami river is hereby
    declared the Little Miami forest preserve. This designation constitutes a statement
    of intent by the general assembly that such land be used and managed by state
    agencies having its custody or control for the purpose of protecting, preserving,
    and enhancing its natural and scenic beauty for its own sake and in conjunction
    with the protection, preservation, and enhancement of the Little Miami river as
    a scenic river. To further this intent and purpose, the director of natural resources
    may:

    (A) Accept donations of land or interests in land and designate any land so acquired
    or in which an interest is acquired as a part of the Little Miami forest preserve;

    (B) Acquire with moneys donated or appropriated therefor, lands or interests in
    lands and designate any land so acquired or in which an interest is acquired as
    part of the Little Miami forest preserve;

    (C) Designate land acquired after July 1, 1983, primarily for other purposes by
    the department of natural resources or any of its divisions as a part of the Little
    Miami forest preserve;

    (D) Issue internal rules for lands controlled or managed by the department of
    natural resources or any of its divisions to coordinate the intent and purpose
    of this section with other purposes for which the land is controlled or managed
    by the department or its divisions; and

    (E) Enter into cooperative agreements with other state agencies or political subdivisions
    that on July 1, 1983, own, or after such date acquire, land suitable for designation
    as part of the Little Miami forest preserve to coordinate the intent and purpose
    of this section with other purposes for which the land is controlled or managed
    by such agencies or subdivisions and, pursuant to such agreements, designate land
    subject to such agreements as part of the Little Miami forest preserve.

    All state agencies shall confer and cooperate with the director of natural resources
    and the Little Miami scenic river advisory council to the fullest extent possible
    to achieve the intent and purpose of this section.'
  history: null
