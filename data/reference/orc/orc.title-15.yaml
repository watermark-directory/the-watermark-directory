- number: '1505.09'
  heading: Geological mapping fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: '(A) There is hereby created in the state treasury the geological mapping
    fund, to be administered by the chief of the division of geological survey. Except
    as provided in division (C) of this section, the fund shall be used for any of
    the following purposes:

    (1) Performing the necessary field, laboratory, and administrative tasks to map
    and make public reports on the geology, geologic hazards, and energy and mineral
    resources of the state;

    (2) The administration of the oil and gas land management commission created in
    section 155.31 of the Revised Code;

    (3) To award grants to geology departments at state colleges and universities
    for undergraduate or graduate level research conducted at locations of geological
    interest in the state. The chief shall award grants at least annually, but at
    the chief''s discretion, may award grants more frequently;

    (4) To provide materials such as rock and mineral kits to state elementary and
    secondary schools to assist students in the study of geology.

    (B) The sources of money for the fund shall include all of the following:

    (1) The mineral severance tax as specified in section 5749.02 of the Revised Code;

    (2) Transfers made to the fund in accordance with section 6111.046 of the Revised
    Code;

    (3) The fees collected under rules adopted under section 1505.05 of the Revised
    Code.

    The chief may seek federal or other money in addition to the mineral severance
    tax and fees to carry out the purposes of this section. If the chief receives
    federal money for the purposes of this section, the chief shall deposit that money
    into the state treasury to the credit of a fund created by the controlling board
    to carry out those purposes.

    Other money received by the chief for the purposes of this section in addition
    to the mineral severance tax, fees, and federal money shall be credited to the
    geological mapping fund.

    (C) Any money transferred to the geological mapping fund in accordance with section
    6111.046 of the Revised Code shall be used by the chiefs of the divisions of mineral
    resources management, oil and gas resources management, geological survey, and
    water resources in the department of natural resources for the purpose of executing
    their duties under sections 6111.043 to 6111.047 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1505.09
- number: '1505.10'
  heading: Annual reports
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: 'The director of natural resources or the director''s designee shall prepare
    and publish for public distribution annual reports that shall include all of the
    following:

    (A) A list of the operators of mines, quarries, pits, or other mineral resource
    extraction operations in this state;

    (B) Information on the location of and commodity extracted at each operation;

    (C) Information on the employment at each operation;

    (D) Information on the tonnage of coal or other minerals extracted at each operation
    along with the method of extraction;

    (E) Information on the production, use, distribution, value, and other facts relative
    to the mineral resources of the state that may be of public interest.

    The director or the director''s designee may require the division of mineral resources
    management to perform the duties required by this section.

    Each operator engaged in the extraction of minerals shall submit an accurate and
    complete annual report, on or before the last day of January each year, to the
    director or the director''s designee on forms provided by the director or the
    director''s designee and containing the information specified in divisions (A)
    to (E) of this section for the immediately preceding calendar year. The director
    or the director''s designee may use all or portions of the information collected
    pursuant to this section in preparing the annual report required by section 1561.04
    of the Revised Code.

    No person shall fail to comply with this section.'
