  url: https://codes.ohio.gov/ohio-revised-code/section-1514.32
- number: '1514.40'
  heading: Adoption of safety rules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: 'In accordance with Chapter 119. of the Revised Code, the chief of the division
    of mineral resources management, in consultation with a statewide association
    that represents the surface mining industry, shall adopt rules that do all of
    the following:

    (A) For the purpose of establishing safety standards governing surface mining
    operations, incorporate by reference 30 C.F.R. parts 46, 47, 50, 56, 58, and 62,
    as amended;

    (B) Establish criteria, standards, and procedures governing safety performance
    evaluations conducted under section 1514.45 of the Revised Code, including requirements
    for the notification of operators and the identification of authorized representatives
    of miners at surface mining operations for purposes of inspections conducted under
    sections 1514.41 to 1514.47 of the Revised Code;

    (C) Establish requirements governing the reporting and investigation of accidents
    at surface mining operations. In adopting the rules, the chief shall establish
    requirements that minimize duplication with any reporting and investigations of
    accidents that are conducted by the mine safety and health administration in the
    United States department of labor.

    (D) Establish the time, place, and frequency of mine safety training conducted
    under section 1514.06 of the Revised Code and a fee, if any, for the purpose of
    that section. The amount of the fee shall not exceed the costs of conducting the
    training that is required under that section.

    (E) Establish the minimum qualifications necessary to take the examination that
    is required for certification of certified mine forepersons under division (B)
    of section 1514.47 of the Revised Code and requirements, fees, and procedures
    governing the taking of the examination;

    (F) Establish requirements and fees governing the reissuance of certificates under
    division (C) of that section;

    (G) Establish requirements and procedures for the approval of training plans submitted
    under division (D) of that section for the use of qualified persons to conduct
    examinations of surface mining operations in lieu of certified mine forepersons
    and minimum qualifications of those persons. The rules shall include requirements
    governing training frequency and curriculum that must be provided for qualified
    persons under such plans and shall establish related reporting and record keeping
    requirements.

    As used in sections 1514.41 to 1514.47 of the Revised Code, "rule" means a rule
    adopted under this section unless the context indicates otherwise.'
