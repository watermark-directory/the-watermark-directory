- number: '1501.021'
  heading: Expending funds for planning and engineering studies
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: The director of natural resources may spend out of any funds appropriated
    to the department of natural resources for studies, planning, or engineering,
    such moneys as are necessary for the preparation of studies or plans for any state
    park or proposed state park in connection with which any lands or interests therein
    or public service facilities, or both, are to be acquired, constructed, enlarged,
    equipped, furnished, or improved from the proceeds of state park revenue bonds,
    and said director may use the engineers, assistants, and other employees of his
    department, and may employ consulting engineers for such purpose. All expenses
    so incurred by the director prior to the issuance of the state park revenue bonds
    shall be paid by the director and charged to the state park or the proposed state
    park involved, and the director shall keep proper records and accounts showing
    the amounts so charged. Upon the sale of the state park revenue bonds for such
    state park or proposed state park, the funds so expended by the director in connection
    therewith shall be reimbursed to the department from the proceeds of such bonds.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.021
- number: '1501.023'
  heading: Alteration of an oil and gas historical site
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: '(A) As used in this section, "historical site" means a site that has been
    designated by the Ohio history connection with a brown historical marker sign
    and has significance with respect to the state''s oil and gas history.

    (B) The department of natural resources shall not physically work on or alter
    a historical site without the consent of every member of all of the following
    entities:

    (1) The board of county commissioners of the county in which the historical site
    is located;

    (2) The historical society of the county in which the historical site is located;

    (3) The technical advisory council created under section 1509.38 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.023
- number: '1501.03'
  heading: Annual report
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: The director of natural resources shall make an annual report to the governor
    of the activities of the department of natural resources, and therewith shall
    render a detailed financial report by divisions covering the receipts and expenditures
    of all moneys which shall be published. The director may publish separately any
    section of such annual report.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.03
- number: '1501.05'
  heading: Division chiefs and employees
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: 'All chiefs of divisions in the department of natural resources shall be appointed
    by the director of natural resources. The chiefs of those divisions may be removed
    by the director.

    The chief engineer of the department of natural resources shall be a professional
    engineer registered under Chapter 4733. of the Revised Code or a professional
    architect certified and registered under Chapter 4703. of the Revised Code.

    The chief of each division and the chief engineer, with the advice and consent
    of the director, may employ such number of technical and administrative assistants
    as are necessary.

    All employees of the department, unless specifically exempted by law, shall be
    employed subject to the classified civil service laws in force at the time of
    their employment.'
