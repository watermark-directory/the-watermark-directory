- number: '1533.04'
  heading: Use of suppressor
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) A person who holds a valid hunting license issued under this chapter
    and who hunts game birds or wild quadrupeds may use a suppressor attached to a
    gun that is authorized to be used for hunting by section 1533.16 of the Revised
    Code while hunting, provided that the person is authorized to possess the suppressor
    under state and federal laws and has registered the suppressor in accordance with
    the "National Firearms Act," 68A Stat. 725 (1934), 26 U.S.C. 5841, et seq., as
    amended.

    (B) As used in this section, "suppressor" means any device used for diminishing
    the sound of any shot, bullet, or projectile that is discharged from a gun that
    is authorized to be used for hunting by section 1533.16 of the Revised Code.'
