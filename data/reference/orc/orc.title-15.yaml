  url: https://codes.ohio.gov/ohio-revised-code/section-1514.40
- number: '1514.41'
  heading: Inspections by the Chief
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: '(A) If a surface mining operation is not inspected by the mine safety and
    health administration in the United States department of labor, the chief of the
    division of mineral resources management annually shall conduct a minimum of two
    inspections of the operation.

    (B) If a surface mining operation is identified through a safety performance evaluation
    as having three or more violations per day during an inspection conducted by the
    mine safety and health administration in the United States department of labor,
    the chief shall conduct a minimum of two inspections of the operation for one
    year following the identification. However, the chief, in consultation with a
    statewide organization representing the industrial minerals surface mining organization,
    may adopt rules, in accordance with Chapter 119. of the Revised Code, establishing
    exceptions to the safety inspection requirement under this division.

    (C) If a fatality of a miner occurs at a surface mining operation as a result
    of an unsafe condition or a practice at the operation, the chief shall conduct
    a minimum of one inspection every three months at the operation for two years
    following the fatality.

    (D) If a life-threatening injury of a miner occurs at a surface mining operation
    as a result of an unsafe condition or a practice at the operation, the chief shall
    conduct a minimum of one inspection every three months at the operation for one
    year following the injury.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1514.41
- number: '1514.42'
  heading: Safety audit where mine safety training requested
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: 'The chief of the division of mineral resources management may conduct one
    safety audit at a surface mining operation annually if the operator of the operation
    has requested the division of mineral resources management to conduct mine safety
    training for that year. The safety audit shall be scheduled at a time to which
    the chief and the operator mutually agree and shall not continue more than one
    day. The chief shall conduct additional safety audits at any surface mining operation
    if requested by the operator of the operation. If the chief conducts a safety
    audit, the operator shall ensure that the chief has a copy of the training plan
    that is required by 30 C.F.R. part 46, as amended, at the time of the audit.

    After completion of an audit, the chief shall prepare a report that describes
    the general conditions of the surface mining operation, lists any hazardous conditions
    at the operation, lists any violations of the safety standards established in
    rules, and describes the nature and extent of any hazardous condition or violation
    found and the corresponding remedy for each hazardous condition or violation.
    The chief shall provide two copies of the report to the operator of the operation.
    The operator shall post one copy of the report at the operation for review by
    the employees of the operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1514.42
- number: '1514.43'
  heading: Enforcement of rule-based safety standards
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: '(A) The chief of the division of mineral resources management shall enforce
    the safety standards established in rules when conducting inspections under section
    1514.41 of the Revised Code.

    (B) Except as otherwise provided in section 1514.44 of the Revised Code or pursuant
    to a safety audit conducted under section 1514.42 of the Revised Code, if during
    an inspection the chief finds a violation of a safety standard, the chief shall
    require the operator to comply with the standard that is being violated within
    a reasonable period of time. If the chief finds a violation of a safety standard,
    the chief shall return to the surface mining operation after a reasonable period
    of time to determine if the operator has complied with the standard that was being
    violated. If the operator has failed to comply with the standard, the chief shall
    take appropriate action to obtain compliance if necessary.

    (C) Except as otherwise provided in section 1514.44 of the Revised Code or pursuant
    to a safety audit conducted under section 1514.42 of the Revised Code, after completion
    of an inspection of a surface mining operation, the chief shall prepare a report
    that describes the general conditions of the surface mining operation, lists any
    hazardous conditions at the operation, lists any violations of the safety standards
    established in rules, and describes the nature and extent of any hazardous condition
    or violation found and the corresponding remedy for each hazardous condition or
    violation. The chief shall provide two copies of the report to the operator of
    the operation. The operator shall post one copy of the report at the operation
    for review by the employees of the operation.

    (D) Except pursuant to a safety audit conducted under section 1514.42 of the Revised
    Code, not later than ten days after receipt of a report under this section, the
    operator may submit a written request to the chief for a meeting with the chief
    to review the findings contained in the report. Upon receipt of a request, the
    chief shall review the report and schedule a meeting with the operator. Within
    a reasonable period of time after the meeting, the chief shall make a written
    determination concerning the findings contained in the report and provide one
    copy of the determination to the operator of the surface mining operation and
    one copy of the determination to an authorized representative of the miners at
    the operation. If the chief makes a determination that affirms the findings contained
    in the report, the chief''s determination constitutes an order for purposes of
    this chapter and rules adopted under it.

    (E) An operator shall not appeal the contents of a report prepared under division
    (C) of this section. However, an operator may appeal a determination of the chief
    made under division (D) of this section.

    (F) No operator shall violate or fail to comply with an order issued pursuant
    to this section.'
