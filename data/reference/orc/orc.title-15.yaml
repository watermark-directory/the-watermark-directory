- number: '1521.18'
  heading: Floodplain management ordinance or resolution
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) For the purposes of this section, a one-hundred-year floodplain is limited
    to an area identified as a one-hundred-year floodplain in accordance with the
    "National Flood Insurance Act of 1968," 82 Stat. 572, 42 U.S.C.A. 4001, as amended.

    (B) Each municipal corporation or county that has within its boundaries a one-hundred-year
    floodplain and that adopts a floodplain management ordinance or resolution or
    any amendments to such an ordinance or resolution on or after April 11, 1991,
    after adopting the ordinance, resolution, or amendments and before submitting
    the ordinance, resolution, or amendments to the federal emergency management agency
    for final approval for compliance with applicable standards adopted under the
    "National Flood Insurance Act of 1968," 82 Stat. 572, 42 U.S.C.A. 4001, as amended,
    shall submit the ordinance, resolution, or amendments to the chief of the division
    of water resources for the chief''s review for compliance with those standards.
    Within forty-five days after receiving any such ordinance, resolution, or amendments,
    the chief shall complete the review and notify the municipal corporation or county
    as to whether the ordinance, resolution, or amendments comply with those standards.
    If the chief finds that the ordinance, resolution, or amendments comply with those
    standards, the chief shall forward it or them to the federal emergency management
    agency for final approval.

    (C)(1) If the chief determines that a county or municipal corporation that has
    adopted a floodplain management resolution or ordinance fails to administer or
    enforce the resolution or ordinance, the chief shall send a written notice by
    certified mail to the board of county commissioners of the county or the chief
    executive officer of the municipal corporation stating the nature of the noncompliance.

    (2) In order to maintain its compliance status in accordance with division (D)
    of this section, a county or municipal corporation that has received a notice
    of noncompliance under division (C)(1) of this section may submit information
    to the chief not later than thirty days after receiving the notice that demonstrates
    compliance or indicates the actions that the county or municipal corporation is
    taking to administer or enforce the resolution or ordinance. The chief shall review
    the information and shall issue a final determination by certified mail to the
    county or municipal corporation of the compliance or noncompliance status of the
    county or municipal corporation. If the chief issues a final determination of
    noncompliance, the chief shall send a copy of that determination to the federal
    emergency management agency concurrently with mailing the notice to the municipal
    corporation or county.

    (D)(1) A county or municipal corporation is considered to be in compliance for
    the purposes of this section if either of the following applies:

    (a) The county or municipal corporation has adopted a floodplain management resolution
    or ordinance that the chief has determined complies with applicable standards
    adopted under the "National Flood Insurance Act of 1968," 82 Stat. 572, 42 U.S.C.A.
    4001, as amended, and is adequately administering and enforcing it as determined
    under division (C) of this section.

    (b) The county or municipal corporation is participating in the national flood
    insurance program and has not received a notice of noncompliance under division
    (B) or (C) of this section.

    (2) The chief shall maintain a list of all counties and municipal corporations
    that have one-hundred-year floodplains within their boundaries. The list shall
    indicate whether each such county or municipal corporation is in compliance or
    noncompliance as provided in division (D)(1) of this section and whether each
    such county or municipal corporation is participating in the national flood insurance
    program. The chief shall provide a copy of the list to the general assembly and
    all state agencies annually and shall notify the general assembly and the agencies
    of any changes at least quarterly.

    (E) Any county or municipal corporation that is adversely affected by any determination
    of the chief under this section may appeal it in accordance with Chapter 119.
    of the Revised Code not later than thirty days after the final determination.'
