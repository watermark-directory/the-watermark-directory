- number: '1551.05'
  heading: Department duties as to energy
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: 'The department of deveopment shall:

    (A) Monitor and assess technological advancements in energy conservation and development,
    and maintain to the extent practicable a capability for independent technology
    assessment to support formulation of state energy policy;

    (B) Review laws, rules, and state agency policies that affect energy utilization,
    and recommend to the agencies and the general assembly changes to achieve energy
    conservation and development;

    (C) Develop methods for the performance of energy audits of buildings and structures
    and net energy analyses, employing whenever possible existing knowledge and practices,
    in order to identify energy cost savings to be realized through energy conservation
    measures, and prepare or identify curricula or source materials for training of
    persons conducting energy audits;

    (D) Implement a continuing public education effort designed to inform individuals
    and organizations about specific and appropriate ways to conserve energy;

    (E) Provide technical assistance, information on technological advancements in
    energy production, use, and conservation, energy efficiency information, recommendations
    to state agencies and local governments, assistance in the identification, evaluation,
    and implementation of measures to reduce energy consumption and waste, and public
    information on energy conservation measures, criteria, and alternatives to assist
    consumers in purchasing appliances, machinery, power tools, and similar products;

    (F) Identify, project, and monitor reduction in energy demand due to energy conservation
    measures in the industrial, commercial, residential, transportation, and energy
    production sectors and the state as a whole;

    (G) Annually apply for, receive, accept, and administer assistance on behalf of
    the state pursuant to and in compliance with the "Energy Policy and Conservation
    Act," 89 Stat. 871, 42 U.S.C.A. 6201, as amended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.05
- number: '1551.06'
  heading: Cooperation and coordination among agencies
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: 'The department of development shall be the coordinating agency responsible
    for involving all other appropriate agencies of state government in developing
    programs to conserve energy, and shall be responsible for minimizing duplication
    of effort among state agencies and programs in the state.

    All state departments, agencies, institutions, universities, colleges, authorities,
    boards, and commissions, and all political subdivisions and quasi-governmental
    agencies of the state shall cooperate and coordinate all such activities with
    the department to ensure orderly and efficient administration and enforcement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.06
- number: '1551.11'
  heading: Director of development - powers and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: '(A) To achieve the purposes of sections 1551.01 to 1551.25 of the Revised
    Code, the director of development may:

    (1) Identify, plan, organize, initiate, and sponsor studies, research, and experimental,
    pilot, and demonstration facilities and projects that would lead to the development
    and more efficient utilization of present, new, or alternative energy sources
    in this state, to the conservation of energy, to the attraction of federal and
    other development funding in emerging and established national or state priority
    areas, or to the enhancement of the economic development of the state;

    (2) Promote, assist, and provide financial assistance for the development of nonprofit
    corporations organized and established under Chapter 1702. of the Revised Code
    to further the purposes of this section;

    (3) Seek out, apply for, receive, and accept grants, gifts, contributions, loans,
    and other assistance in any form from public and private sources, including assistance
    from any governmental agency;

    (4) Make grants under division (F) of section 1551.12 of the Revised Code from
    funds that are appropriated by the general assembly and from gifts or grants obtained
    under division (A)(3) of this section for the purposes of developing, constructing,
    or operating experimental, pilot, and demonstration facilities or programs which
    develop, test, or demonstrate more efficient and environmentally acceptable methods
    of extracting energy resources; new concepts, programs, or technology for the
    conservation of energy; new concepts, programs, or technology for the efficient
    and environmentally acceptable utilization of present, new, or alternative energy
    sources; or concepts, programs, or technology which develop resources of the state.
    Grants may be made, without limitation, for projects and programs such as experimental
    demonstrations of the use of Ohio coal in processes which would facilitate its
    widespread use as a source of energy; experimental demonstrations of new or improved
    coal, natural gas, and natural petroleum extraction techniques and of reclamation
    techniques at the extraction sites; experimental demonstrations or development
    of solar heating and cooling and potentially energy-efficient construction in
    public buildings, schools, offices, commercial establishments, and residential
    homes; development of programs or experimental demonstrations of the utilization
    of waste products in energy production and mineral and energy conservation; and
    development of programs or experimental demonstrations of technologies which would
    permit utility pricing policies which may reduce the consumer costs of energy.

    (5) Enter into agreements with persons and governmental agencies, in any combination,
    for the purposes of this section.

    (B) Any materials or data submitted to, made available by or to, or received by
    the director under division (A) of this section, division (F) of section 1551.12,
    or division (B) of section 1551.15 of the Revised Code, and any information taken
    from those materials or data for any purpose, to the extent that those materials
    or data consist of trade secrets or other proprietary information, are not public
    information or public documents and shall not be open to public inspection.

    (C) The exercise by the director of the powers conferred by sections 1551.01 to
    1551.25 of the Revised Code for the preservation or creation of jobs and employment
    opportunities for the people of this state through the development and efficient
    utilization of energy resources of the state is in all respects for the benefit
    of the people of the state, and is determined to be an essential government function
    and public purpose of the state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.11
- number: '1551.12'
  heading: Organizational powers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: 'The director of development may:

    (A) Seek, solicit, or acquire personal property or any estate, interest, or right
    in real property, or services, funds, and other things of value of any kind or
    character by purchase, lease, gift, grant, contribution, exchange, or otherwise
    from any person or governmental agency to be held, used, and applied in accordance
    with and for the purposes of sections 1551.01 to 1551.25 of the Revised Code;

    (B) Contract for the operation of, and establish rules for the use of, facilities
    over which the director has supervision or control, which rules may include the
    limitation of ingress to or egress from such facilities as may be necessary to
    maintain the security of such facilities and to provide for the safety of those
    on the premises of such facilities;

    (C) Purchase such fire and extended coverage insurance and insurance protecting
    against liability for damage to property or injury to or death of persons as the
    director may consider necessary and proper under sections 1551.01 to 1551.25 of
    the Revised Code;

    (D) Sponsor, conduct, assist, and encourage conferences, seminars, meetings, institutes,
    and other forms of meetings; authorize, prepare, publish, and disseminate any
    form of studies, reports, and other publications; originate, prepare, and assist
    proposals for the expenditure or granting of funds by any governmental agency
    or person for purposes of energy resource development; and investigate, initiate,
    sponsor, participate in, and assist with cooperative activities and programs involving
    governmental agencies and other entities of other states and jurisdictions;

    (E) Do all acts and things necessary and proper to carry out the powers granted
    and the duties imposed by sections 1551.01 to 1551.25 of the Revised Code;

    (F) Make grants of funds to any person, organization, or governmental agency of
    the state for the furnishing of goods or performance of services.

    Any person or governmental agency that receives funds from the department of development,
    or utilizes the facilities of the department under sections 1551.01 to 1551.25
    of the Revised Code shall agree in writing that all know-how, trade secrets, and
    other forms of property, rights, and interest arising out of developments, discoveries,
    or inventions, including patents, copyrights, or royalties thereon, which result
    in whole or in part from research, studies, or testing conducted by use of such
    funds or facilities shall be the sole property of the department, except as may
    be otherwise negotiated and provided by contract in advance of such research,
    studies, or testing. However, such exceptions do not apply to the director or
    employees of the department participating in or performing research, tests, or
    studies.

    Rights retained by the department may be assigned, licensed, transferred, sold,
    or otherwise disposed of, in whole or in part, to any person or governmental agency.
    Any and all income, royalties, or proceeds derived or retained from such dispositions
    shall be paid to the state and credited to the general revenue fund.

    Any instrument by which real property is acquired pursuant to this section shall
    identify the agency of this state that has the use and benefit of the real property
    as specified in section 5301.012 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.12
- number: '1551.15'
  heading: Grants and contracts for energy resource development
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: '(A) All general revenue fund moneys required by the department of development
    for purposes of sections 1551.01 to 1551.25 of the Revised Code are subject to
    appropriation by the general assembly.

    (B) The director of development may enter into agreements, make grants, or enter
    into contracts for the purposes of effecting the construction and operation in
    this state of experimental, pilot, or demonstration energy resource development
    facilities. Before making grants or entering contracts, the director shall determine
    that all of the following criteria are met:

    (1) The urgency of public need for the potential results of the experimental,
    pilot, or demonstration project is high, and there is little likelihood that similar
    results would be achieved in this state in a timely manner in the absence of state
    assistance;

    (2) The potential opportunities for private interests to recapture the investment
    in the undertaking through the normal commercial exploitation of proprietary knowledge
    appear to be inadequate to encourage timely results in this state;

    (3) The extent of the problems treated and the objectives sought by the project
    are consistent with the purposes of sections 1551.01 to 1551.25 of the Revised
    Code and of general significance to the state.

    This determination by the director shall include the facts or reasons justifying
    it and shall be journalized by the director.

    (C) The director may use funds as appropriated, donated, granted, or received
    for any of the following purposes:

    (1) Construction and related architectural or engineering studies or purchase
    of physical plant and equipment for an experimental, pilot, or demonstration energy
    resource development facility;

    (2) Acquisition and improvement of land, construction of roads, and provision
    of other public facilities incidental and necessary to the accomplishment of experimental,
    pilot, or demonstration energy resource development facilities;

    (3) Operation of an energy resource development experimental, pilot, or demonstration
    project or facility, which could include but not be limited to labor, feedstocks,
    and repair or replacement parts;

    (4) Purchase of all or a portion of the usable output of energy resource development
    experimental, pilot, or demonstration projects and the disposition of this output
    for use in the facilities of governmental agencies.

    (D) Each grant made pursuant to this section shall be accomplished through written
    agreements between the department and the person or governmental agency which
    would effect the construction and operation of the project or facility, and between
    the department and the persons and governmental agencies which would share the
    expenses and costs of the project or facility. In addition to such other terms
    as may be required by law or advised by counsel, each agreement shall provide
    for each of the following conditions:

    (1) The limitation of the department''s financial obligations in the project or
    facility to a specified dollar amount which shall not exceed one-third of the
    total costs of the project or facility;

    (2) The financial participation in the project or facility by the federal government
    or its agencies, by private corporations doing business in this state, by local
    governmental agencies, or by other organizations;

    (3) The disposition of the assets of the project or facility, should it be terminated
    or abandoned, in such manner that the department shall be repaid in the same proportion
    as its share in the total of moneys, property, or other assets expended, contributed,
    or invested in the project or facility;

    (4) The criteria for the identification if and when the project or facility is
    commercially viable through the profitable disposition of its output;

    (5) The termination of the department''s financial support at such time the project
    or facility is commercially viable and the repayment of the department through
    the future profits, if any, of the project or facility.'
