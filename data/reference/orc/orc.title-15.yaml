  url: https://codes.ohio.gov/ohio-revised-code/section-1517.23
- number: '1517.24'
  heading: Prohibited acts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: '(A) Without the express written permission of the owner and, if the owner
    has leased the land, without the express written permission of the lessee, no
    person shall knowingly:

    (1) Break, break off, crack, carve on, write on, mark on, burn, remove, or in
    any other manner destroy, deface, mark, or disturb the surfaces of any cave or
    any natural material found in any cave, whether attached or broken, including,
    without limitation, speleothems, speleogens, and sedimentary deposits;

    (2) Break, force, tamper with, or otherwise disturb any lock, door, gate, or other
    device designed to limit control, or prevent access to or entry into a cave;

    (3) Remove, deface, or tamper with any posted sign giving notice against unauthorized
    access to or presence in a cave or citing any of the provisions of sections 1517.21
    to 1517.26 or division (B) of section 1517.99 of the Revised Code;

    (4) Place refuse, garbage, dead animals, sewage, or toxic substances harmful to
    cave life or humans in a cave;

    (5) Burn within a cave any substance other than acetylene gas burned in a carbide
    lamp that produces smoke or gas that is harmful to cave life;

    (6) Use any door, gate, or other device designed to limit, control, or prevent
    access to or entry into a cave that does not allow free and unimpeded passage
    of air, water, and cave life;

    (7) Excavate or remove historic or prehistoric ruins, burial grounds, or archaeological
    or paleontological sites found in a cave, including, without limitation, saltpeter
    workings, relics, inscriptions, fossilized footprints, and bones;

    (8) Remove, kill, harm, or disturb any cave life found within a cave.

    (B) Without the express written permission of the owner and, if the owner has
    leased the land, without the express written permission of the lessee, no person
    shall purposely destroy, injure, or deface historic or prehistoric ruins, burial
    grounds, or archaeological or paleontological sites found in a cave, including,
    without limitation, saltpeter workings, relics, inscriptions, fossilized footprints,
    and bones.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1517.24
- number: '1517.25'
  heading: Sale of speleothems collected from caves prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: No person shall sell or offer for sale speleothems collected from caves in
    this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1517.25
- number: '1517.26'
  heading: Immunity
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: '(A) Owners and, if the owner has leased the land, the lessee, are not liable
    for injuries, death, or loss sustained by any permittee on their land if no charge
    has been made. By granting permission for entry, the owner or lessee does not:

    (1) Extend to the permittee any assurance that the premises are safe for such
    purposes;

    (2) Confer on the permittee the legal status of an invitee or licensee to whom
    a duty of care is owed;

    (3) Assume responsibility for or incur liability for any injury, death, or loss
    to person or property caused by an act or omission of a permittee.

    (B) This section does not limit the liability which otherwise exists for injury,
    death, or loss to persons or property caused by an act or omission of the owner
    or lessee as follows:

    (1) Negligent failure to warn the permittee against a hazard of which the owner
    or lessee had actual knowledge prior to the permittee''s entry on the land;

    (2) Willful or wanton misconduct;

    (3) Intentionally tortious conduct.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1517.26
- number: '1517.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: '(A)(1) Except as provided in division (A)(2) of this section, whoever violates
    section 1517.021 of the Revised Code is guilty of a minor misdemeanor.

    (2) Whoever violates section 1517.021 of the Revised Code with regard to a species
    of plant identified in a rule adopted under or included on a list prepared under
    section 1518.01 of the Revised Code is guilty of a misdemeanor of the third degree
    for a first offense. For each subsequent offense, the person is guilty of a misdemeanor
    of the second degree.

    (B) Whoever violates division (A) of section 1517.24 or section 1517.25 of the
    Revised Code is guilty of a misdemeanor of the third degree.

    (C) Whoever violates division (B) of section 1517.24 of the Revised Code is guilty
    of a misdemeanor of the second degree.

    (D) Whoever violates section 1517.051 of the Revised Code is guilty of a misdemeanor
    of the first degree.'
