- number: '1506.34'
  heading: Administrative rules for submerged land preserves
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: '(A) The director of natural resources, with the approval of the director
    of the Ohio history connection, shall establish policies and may adopt rules necessary
    to implement and administer sections 1506.30 to 1506.36 of the Revised Code. Not
    less than forty-five days prior to adopting a rule under this section or section
    1506.31 of the Revised Code, the director of natural resources shall send a copy
    of the proposed rule to the director of the Ohio history connection, who shall
    promptly review it. Not more than thirty days after receiving the proposed rule,
    the director of the Ohio history connection shall return the rule to the director
    of natural resources together with the former director''s written approval or
    disapproval of the proposed rule. If the director of the Ohio history connection
    disapproves the rule, the director shall explain the reasons for the disapproval
    and any amendments to the rule the director considers necessary to obtain the
    director''s approval. The director of natural resources shall not adopt a rule
    under those sections that has not been approved by the director of the Ohio history
    connection. If the director of the Ohio history connection does not respond within
    thirty days as prescribed in this section, the rule is deemed approved by the
    director.

    (B) The director of natural resources shall inform the public of the requirements
    of sections 1506.30 to 1506.36 of the Revised Code and any policies established
    and rules adopted under them. In complying with this section, the director may
    establish or conduct educational programs or seminars, print and distribute informational
    pamphlets, and provide detailed information to organizations that conduct scuba
    diving training programs.

    (C) The director of natural resources may hire or contract with a marine archaeologist,
    a marine historian, a marine surveyor, or any combination of these persons for
    the purposes of implementing and administering sections 1506.30 to 1506.36 of
    the Revised Code and any rules adopted under them.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1506.34
- number: '1506.35'
  heading: Revoking salvage permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: '(A) The director of natural resources may suspend or revoke, in accordance
    with Chapter 119. of the Revised Code, a permit issued under section 1506.32 of
    the Revised Code if the permit holder has done either of the following:

    (1) Failed to comply with sections 1506.30 to 1506.36 of the Revised Code, any
    rules adopted under those sections, or any provision or condition of the holder''s
    permit;

    (2) Damaged abandoned property other than in accordance with the provisions or
    conditions of the permit.

    (B) Any motor vehicle, as defined in section 4501.01 of the Revised Code, watercraft,
    as defined in section 1546.01 of the Revised Code, mechanical or other assistance,
    scuba gear, sonar equipment, or other equipment used by any person in the course
    of committing a third or subsequent violation of division (K) of section 1506.32
    of the Revised Code shall be considered contraband for the purposes of Chapter
    2981. of the Revised Code, except that proceeds from the sale of such contraband
    shall be disposed of in the following order:

    (1) To the payment of the costs incurred in the forfeiture proceedings under Chapter
    2981. of the Revised Code;

    (2) To the payment of the balance due on any security interest preserved under
    division (F) of section 2981.04 of the Revised Code;

    (3) To the payment of any costs incurred by the seizing agency under Chapter 2981.
    of the Revised Code in connection with the storage, maintenance, security, and
    forfeiture of the contraband;

    (4) Fifty per cent of the remaining money to the credit of the Lake Erie submerged
    lands preserves fund created in division (C) of this section, and fifty per cent
    of the remaining money to the Ohio history connection for deposit into the fund
    created pursuant to division (C) of section 149.56 of the Revised Code.

    (C) There is hereby created in the state treasury the Lake Erie submerged lands
    preserves fund. The fund shall be composed of moneys credited to it under division
    (B)(4) of this section and division (D)(2) of section 1506.33 of the Revised Code,
    all appropriations, contributions, and gifts made to it, and any federal grants
    received by the department of natural resources for the purposes of sections 1506.30
    to 1506.36 of the Revised Code. The director shall use the moneys in the Lake
    Erie submerged lands preserves fund solely to implement and administer sections
    1506.30 to 1506.36 of the Revised Code.

    (D) The director may request the attorney general to, and the attorney general
    shall, bring a civil action in any court of competent jurisdiction for any of
    the following purposes:

    (1) To enforce compliance with or restrain violation of sections 1506.30 to 1506.36
    of the Revised Code, any rules adopted under those sections, or any permit issued
    under section 1506.32 of the Revised Code;

    (2) To enjoin the further removal of abandoned property or archaeological material
    from Lake Erie;

    (3) To order the restoration of an area affected by a violation of sections 1506.30
    to 1506.36 of the Revised Code or of a permit issued under section 1506.32 of
    the Revised Code to its prior condition.

    Any action under this division is a civil action governed by the Rules of Civil
    Procedure.

    (E) A peace officer of a county, township, or municipal corporation, a wildlife
    officer designated under section 1531.13 of the Revised Code, and a natural resources
    officer appointed under section 1501.24 of the Revised Code may enforce compliance
    with sections 1506.30 to 1506.36 of the Revised Code, any rules adopted under
    those sections, and any permit issued under section 1506.32 of the Revised Code
    and may make arrests for violation of those laws, rules, and permits.'
