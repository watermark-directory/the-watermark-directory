    open seasonNo open seasonFoxNov. 15 - Mar. 1Nov. 15 - Mar. 1

    The season provided for the taking of fox does not prohibit the chasing of a fox
    by dog or on horseback when the chasing does not result in the killing of the
    fox.

    This section does not prevent the owner or operator of a farm or enclosure used
    to breed and raise raccoon, skunk, mink, muskrat, or opossum from taking or possessing
    at any time such fur-bearing animals although the farm or enclosure, in addition
    to that use, also is used during the open season for hunting other game.

    No person within the state shall buy, sell, expose for sale, offer for sale, or
    have in possession for any such purpose any of the fish, or any part thereof,
    mentioned in this section, whether taken within or without the state, except such
    fish as are protected by law and taken by licensed commercial fishermen in the
    Lake Erie fishing district and in other waters wherein fishing with nets is licensed
    by law. This section does not prohibit the sale of fish taken by angling in the
    Lake Erie fishing district that are of a length provided by law and permitted
    to be taken and sold by licensed commercial fisherman . No person within the state
    shall buy, sell, expose for sale, offer for sale, or have in possession for any
    such purpose any game bird or game quadruped, or any part thereof, whether taken
    within or without the state. Each such fish, game bird, or game quadruped, or
    part thereof, bought, sold, exposed for sale, offered for sale, or had in possession
    for any such purposes contrary to this section or division rule constitutes a
    separate offense.

    No person shall take a hare or rabbit, within the state, through the use of a
    ferret, or place a ferret in any hole or opening in the ground, a stone wall,
    a log, or elsewhere outside a building, in which a hare or rabbit might be confined,
    or have a ferret in possession or under control while hunting, going hunting,
    or returning from hunting. Each hare or rabbit caught, killed, or had in possession
    contrary to this section constitutes a separate offense. This section does not
    prevent the owner of a young fruit orchard or nursery or his tenant or bona fide
    employee from possessing a ferret or using a ferret in any manner to take or kill
    rabbits or hares when they are doing actual and substantial damage to his fruit
    trees or nursery stock.

    The possession of the hide, skin, or pelt of a wild bird or wild quadruped during
    the closed seasons is prima-facie evidence that it was illegally taken unless
    the possessor can show an original invoice signed by a shipper that the hide,
    skin, or pelt was shipped from without the state or furnish satisfactory proof
    that it was legally taken or acquired.

    (D) No person shall take a wild bird or wild quadruped from its nest, house, den,
    or burrow, or destroy such a nest, house, den, or burrow, or with a spear hunt,
    pursue, injure, or kill any wild bird or wild quadruped except as otherwise provided
    in this chapter or Chapter 1531. of the Revised Code or by division rule. Each
    wild bird or wild quadruped or each hide, skin, or pelt of any such wild bird
    or wild quadruped, or part thereof, taken or had in possession contrary to this
    section constitutes a separate offense.'
