- number: '1571.03'
  heading: Excavations and extensions to be shown on maps - notices sent
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) Every operator of a coal mine who is required by sections 1563.03 to
    1563.05 of the Revised Code, to file maps of such mine, shall cause to be shown
    on each of such maps, in addition to the boundary lines of each tract under which
    excavations are likely to be made during the ensuing year, as referred to in section
    1563.03 of the Revised Code:

    (1) The boundary of such coal mine in accordance with the meaning of the term
    "boundary" in section 1571.01 of the Revised Code;

    (2) The boundary of the mine protective area of such mine.

    This division shall not be construed to amend or repeal any provisions of sections
    1563.03 to 1563.05 of the Revised Code, either by implication or otherwise.

    This division is intended only to add to existing statutory requirements pertaining
    to the filing of coal mine maps with the division of mineral resources management,
    the requirements established in this division.

    (B) Every operator of a coal mine who believes that any part of the boundary of
    such mine is within two thousand linear feet of a well that is drilled through
    the horizon of such coal mine and into or through the storage stratum or strata
    of a gas storage reservoir within the boundary of such reservoir or within its
    protective area, shall at once send notice to that effect by registered mail to
    the operator of such reservoir, the division of mineral resources management,
    and the division of oil and gas resources management.

    (C) Every operator of a coal mine who expects that any part of the boundary of
    such mine will, on a date after September 9, 1957, be extended beyond its location
    on such date to a point within two thousand linear feet of a well that is drilled
    through the horizon of such mine and into or through the stratum or strata of
    a gas storage reservoir within the boundary of such reservoir or within its protective
    area, shall send at least nine months'' notice of such date and of the location
    of such well by registered mail to the operator of such reservoir, the division
    of mineral resources management, and the division of oil and gas resources management.
    If at the end of three years after the date stated in the notice by an operator
    of a coal mine to an operator of a storage reservoir as the date upon which part
    of the boundary of such coal mine is expected to be extended to a point within
    two thousand linear feet of such well, no part of such coal mine is so extended,
    the operator of such coal mine shall be liable to the operator of such storage
    reservoir for all expenses incurred by such reservoir operator in doing the plugging
    or reconditioning of such well as the reservoir operator is required to do in
    such cases as provided in section 1571.05 of the Revised Code. Such mine operator
    shall in no event be liable to such reservoir operator:

    (1) For expenses of plugging or reconditioning such well incurred prior to receipt
    by such reservoir operator from such mine operator of a notice as provided for
    in this division;

    (2) For any expenses of plugging or reconditioning such well if any part of the
    work of plugging or reconditioning was commenced prior to receipt by such reservoir
    operator from such mine operator of a notice as provided for in this division.

    (D) If a person intends to open a new coal mine after September 9, 1957, and if
    at the time of its opening any part of the boundary of such mine will be within
    two thousand linear feet of a well that is drilled through the horizon of such
    mine and into or through the storage stratum or strata of a gas storage reservoir
    within the boundary of such reservoir or within its protective area, such person
    shall send by registered mail to the operator of such storage reservoir, the division
    of mineral resources management, and the division of oil and gas resources management
    at least nine months'' notice of the date upon which the person intends to open
    such mine, and of the location of such well. If at the end of nine months after
    the date stated in the notice by an operator of a coal mine to an operator of
    a storage reservoir, the division of mineral resources management, and the division
    of oil and gas resources management, as the date upon which such coal mine operator
    intends to open such new mine, such new mine is not opened, the operator of such
    coal mine shall be liable to the operator of such storage reservoir for all expenses
    incurred by such reservoir operator in doing the plugging or reconditioning of
    such well as the reservoir operator is required to do in such cases as provided
    in section 1571.05 of the Revised Code, provided:

    (1) That such mine operator may, prior to the end of nine months after the date
    stated in such mine operator''s notice to such reservoir operator, the division
    of mineral resources management, and the division of oil and gas resources management
    as the date upon which the mine operator intended to open such new mine, notify
    such reservoir operator, the division of mineral resources management, and the
    division of oil and gas resources management in writing by registered mail, that
    the opening of such new mine will be delayed beyond the end of such nine-month
    period of time, and that the mine operator requests that a conference be held
    as provided in section 1571.10 of the Revised Code for the purpose of endeavoring
    to reach an agreement establishing a date subsequent to the end of such nine-month
    period of time, on or before which such mine operator may open such new mine without
    being liable to pay such reservoir operator expenses incurred by such reservoir
    operator in plugging or reconditioning such well as in this division provided;

    (2) That if such mine operator sends to such reservoir operator, the division
    of mineral resources management, and the division of oil and gas resources management
    a notice and request for a conference as provided in division (D)(1) of this section,
    such mine operator shall not be liable to pay such reservoir operator for expenses
    incurred by such reservoir operator in plugging and reconditioning such well,
    unless such mine operator fails to open such new mine within the period of time
    fixed by an approved agreement reached in such conference, or fixed by an order
    by the chief of the division of oil and gas resources management upon a hearing
    held in the matter in the event of failure to reach an approved agreement in the
    conference. After issuing an order under this division, the chief shall notify
    the chief of the division of mineral resources management and send a copy of the
    order to the chief.

    (3) That such mine operator shall in no event be liable to such reservoir operator:

    (a) For expense of plugging or reconditioning such well incurred prior to the
    receipt by such reservoir operator from such mine operator of the notice of the
    date upon which such mine operator intends to open such new mine;

    (b) For any expense of plugging or reconditioning such well if any part of the
    work of plugging or reconditioning was commenced prior to receipt by such reservoir
    operator from such mine operator of such notice.'
