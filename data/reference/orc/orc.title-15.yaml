- number: '1501.07'
  heading: Public service facilities in state park
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: 'The department of natural resources through the division of parks and watercraft
    may plan, supervise, acquire, construct, enlarge, improve, erect, equip, and furnish
    public service facilities such as inns, lodges, hotels, cottages, camping sites,
    scenic trails, picnic sites, restaurants, commissaries, golf courses, boating
    and bathing facilities, and other similar facilities in state parks reasonably
    necessary and useful in promoting the public use of state parks under its control
    and may purchase lands or interests in lands in the name of the state necessary
    for those purposes.

    The chief of the division of parks and watercraft shall administer state parks,
    establish rules, fix fees and charges for admission to parks and for the use of
    public service facilities therein, establish rentals for the lease of lands or
    interests therein within a state park the chief is authorized by law to lease,
    and exercise all powers of the chief, in conformity with all covenants of the
    director of natural resources in or with respect to state park revenue bonds and
    trust agreements securing such bonds and all terms, provisions, and conditions
    of such bonds and trust agreements. In the administration of state parks with
    respect to which state park revenue bonds are issued and outstanding, or any part
    of the moneys received from fees and charges for admission to or the use of facilities,
    from rentals for the lease of lands or interests or facilities therein, or for
    the lease of public service facilities are pledged for any such bonds, the chief
    shall exercise the powers and perform the duties of the chief subject to the control
    and approval of the director. The acquisition of such lands or interests therein
    and facilities shall be planned with regard to the needs of the people of the
    state and with regard to the purposes and uses of such state parks and, except
    for facilities constructed in consideration of a lease under section 1501.012
    of the Revised Code, shall be paid for from the state park fund created in section
    1546.21 of the Revised Code or from the proceeds of the sale of bonds issued under
    sections 1501.12 to 1501.15 of the Revised Code. Sections 125.81 and 153.04 of
    the Revised Code, insofar as they require a certification by the chief of the
    division of capital planning and improvement, do not apply to the acquisition
    of lands or interests therein and public service facilities to be paid for from
    the proceeds of bonds issued under sections 1501.12 to 1501.15 of the Revised
    Code.

    As used in sections 1501.07 to 1501.14 of the Revised Code, state parks are all
    of the following:

    (A) State reservoirs described and identified in section 1546.11 of the Revised
    Code;

    (B) All lands or interests therein that are denominated as state parks in section
    1546.14 of the Revised Code;

    (C) All lands or interests therein of the state identified as administered by
    the division of parks and watercraft in the "inventory of state owned lands administered
    by department of natural resources as of June 1, 1963," as recorded in the journal
    of the director, which inventory was prepared by the real estate section of the
    department and is supported by maps on file with the division;

    (D) All lands or interests in lands of the state hereafter designated as state
    parks in the journal of the director.

    All such state parks shall be exclusively under the control and administration
    of the division of parks and watercraft. The director by order may remove from
    the classification as state parks any of the lands or interests therein so classified
    by divisions (C) and (D) of this section, subject to the limitations, provisions,
    and conditions in any order authorizing state park revenue bonds or in any trust
    agreement securing such bonds. Lands or interests therein so removed shall be
    transferred to other divisions of the department for administration or may be
    sold as provided by law. Proceeds of any sale shall be used or transferred as
    provided in the order authorizing state park revenue bonds or in the trust agreement
    and, if no such provision is made, shall be transferred to the state park fund.
    State parks do not include any lands or interest in lands of the state administered
    jointly by two or more divisions of the department. The designation of lands as
    state parks under divisions (A) to (D) of this section shall be conclusive, and
    those lands shall be under the control of and administered by the division of
    parks and watercraft. No order or proceeding designating lands as state parks
    or park purchase areas shall be subject to any appeal or review by any officer,
    board, commission, or court.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.07
- number: '1501.08'
  heading: State park maintenance fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: '(A) There is hereby created in the state treasury the state park maintenance
    fund.

    (1) Notwithstanding section 1546.21 of the Revised Code, on or after the first
    day of July of each fiscal year, the director of natural resources may request
    the director of budget and management to transfer money from the state park fund
    to the state park maintenance fund in an amount not exceeding five per cent of
    the annual average revenue deposited in the state park fund.

    (2) The department of natural resources shall use money in the state park maintenance
    fund only for maintenance, repair, and renovation projects at state parks that
    are approved by the director. The department shall not use money in the fund to
    construct new facilities.

    (B) The chief of the division of parks and watercraft shall submit to the director
    a list of projects in order to request disbursements from the state park maintenance
    fund. The chief shall include with each list a description of necessary maintenance,
    repair, and renovation at state park facilities. The director shall determine
    which projects are eligible for disbursement from the fund. The chief shall not
    begin any project for which disbursement is requested before obtaining the director''s
    approval as required by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.08
- number: '1501.09'
  heading: Leasing public service facilities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: 'The public service facilities mentioned in section 1501.07 of the Revised
    Code may be leased by the department of natural resources for the operation thereof
    as provided in section 1501.10 of the Revised Code, or may be operated by any
    person, firm, partnership, association, or corporation under contract with the
    director of natural resources as provided in section 1501.012 or 1501.091 of the
    Revised Code, or may be operated by the department through the division of parks
    and watercraft. The leases for facilities may be bid individually or in any combination.

    Any of those facilities may be leased or operated under contract without the necessity
    of competitive bidding for not more than two years.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.09
- number: '1501.091'
  heading: Contracts for the operation of public service facilities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: 'Contracts for the operation of public service facilities shall be made in
    writing by the director of natural resources with the person, firm, partnership,
    association, or corporation whose bid, in consideration of the public interest,
    is determined by the director to be the best bid received, after advertisement
    for bids has been published for four consecutive weeks in a newspaper having a
    general circulation in each county in which the facility is situated. The notice
    for bids shall set forth the pertinent facts concerning the facility and the periods
    of required operation during the year and shall refer to the conditions of operation
    and the terms of the contract which shall be on file in the office of the director
    and open to public inspection, except that questionnaires and financial statements
    submitted under this section shall be confidential and shall not be open to public
    inspection. Contracts for the operation of public service facilities shall contain
    provisions ensuring that the facilities will be open to the public at reasonable
    rates and without discrimination as to race, creed, or color, and such other provisions
    as the director considers necessary to satisfy the needs of the people of the
    state for public park facilities.

    This section does not apply to any lease and contract executed under section 1501.012
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.091
- number: '1501.10'
  heading: Lease provisions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: 'Advertisement for bids for the leasing of public service facilities in state
    parks shall be published in any newspaper of general circulation in Franklin county
    and each county in which the facility to be leased is situated. The publication
    shall be made once each week for four consecutive weeks prior to the date fixed
    for the acceptance of the bids. The notice shall set forth the pertinent facts
    concerning the facility to be leased and the periods of required operation during
    the year and shall refer to the terms and conditions that the lease shall include,
    which shall be on file in the office of the director of natural resources and
    open to public inspection, except that questionnaires and financial statements
    submitted under this section shall be confidential and shall not be open to public
    inspection.

    The public service facilities may be leased for a period of years that may be
    determined by the director, provided that the director, at the expiration of the
    original lease, without advertisement for bids, may grant the lessee a renewal
    of the lease for an additional period not to exceed four years. Leases executed
    under this section may contain any provisions that the director considers necessary,
    provided that the following provisions shall be contained in the leases:

    (A) The lessee shall be responsible for keeping the facilities in good condition
    and repair, reasonable wear and tear and damages caused by casualty or acts beyond
    the control of the lessee excepted.

    (B) The lessee shall operate the facilities for periods during the year that the
    director determines are necessary to satisfy the needs of the people of the state,
    provided that the periods of required operation shall be set forth in the notice
    for the acceptance of bids.

    (C) The lessee, upon the execution of the lease, shall furnish surety to ensure
    that the lessee shall perform fully all terms of the lease. The surety shall be
    in the form of a performance bond, an irrevocable letter of credit to the state,
    cash, or negotiable certificates of deposit of any bank or savings and loan association
    organized or transacting business in the United States. The cash, market value
    of the certificates of deposit, or face value of the irrevocable letter of credit
    shall be equal to or greater than the amount of the bond prescribed by the director
    in the lease.

    If the lessee deposits cash, the cash shall credited to the performance cash bond
    refunds fund created in section 1501.16 of the Revised Code. A lessee making a
    deposit of cash or certificates of deposit may withdraw and receive, from the
    director, all or any portion of the cash or certificates of deposit upon depositing
    with the director negotiable certificates of deposit issued by any bank organized
    or transacting business in this state equal in par value to the par value of the
    cash or certificates of deposit withdrawn. A lessee may demand and receive from
    the director all interest or other income from any such certificates as it becomes
    due.

    The director may lease any public service facilities in state parks to the person
    who submits the highest and best bid under the terms set forth in this section
    and in accordance with the rules of the director, taking into account the financial
    responsibility and the ability of the lessee to operate the facilities. Bids shall
    be sealed and opened at a date and time certain, published in advance.

    This section does not apply to a lease and contract executed under section 1501.012
    of the Revised Code.'
  history: null
