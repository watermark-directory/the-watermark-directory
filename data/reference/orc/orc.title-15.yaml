    name: Department Of Natural Resources - General Provisions
  text: The department of natural resources is the designated state agency responsible
    for the coordination and administration of sections 120 to 136 of the "National
    and Community Service Act of 1990," 104 Stat. 3127 (1990), 42 U.S.C.A. 12401 to
    12456, as amended. With the assistance of the Ohio commission on service and volunteerism
    created in section 121.40 of the Revised Code, the director of natural resources
    shall coordinate with other state agencies to apply for funding under the act
    when appropriate and shall administer any federal funds the state receives under
    sections 120 to 136 of the act.
