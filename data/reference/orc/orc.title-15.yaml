- number: '1531.32'
  heading: Wildlife habitat trust fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: There is hereby created the wildlife habitat trust fund, which shall be in
    the custody of the treasurer of state and shall not be a part of the state treasury.
    The purpose of the fund is to facilitate the acquisition and development of lands
    for the preservation, propagation, and protection of wild animals. The fund shall
    consist of money received from gifts, donations, bequests, and other moneys contributed
    to the division of wildlife for the purposes of the fund. Investment earnings
    of the fund shall be retained by the fund until transferred to the wildlife habitat
    fund as required by section 1531.33 of the Revised Code. The principal of the
    wildlife habitat trust fund shall not be spent for any purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.32
- number: '1531.33'
  heading: Wildlife habitat fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: '(A) The wildlife habitat fund is hereby created in the state treasury. The
    fund shall consist of the investment earnings of the wildlife habitat trust fund
    created in section 1531.32 of the Revised Code; gifts, donations, bequests, and
    other moneys contributed to the division of wildlife for the purposes of the fund;
    moneys collected under division (H) of section 1531.06 of the Revised Code; contributions
    collected under section 4503.568 of the Revised Code from issuance of the "Ohio
    Bullfrog" license plate; and moneys received by the division pursuant to negotiated
    mitigation settlements from persons who have adversely affected fish and wildlife,
    or their habitats, over which the division has jurisdiction under this chapter
    or Chapter 1533. of the Revised Code other than fish and wildlife of the Ohio
    river or their habitats.

    (B)(1) Except as provided in division (B)(2) of this section, the fund shall be
    used by the division to acquire and develop lands for the preservation, propagation,
    and protection of wild animals.

    (2) The contributions from the "Ohio Bullfrog" license plate shall be used for
    the protection and preservation of wetlands in Ohio and for educational programs
    pertaining to the bullfrog and similar wetland animals.

    (C) All expenditures from the wildlife habitat fund shall be approved by the director
    of natural resources.

    (D) Quarterly each fiscal year, the treasurer of state shall transfer the investment
    earnings of the wildlife habitat trust fund to the wildlife habitat fund.'
