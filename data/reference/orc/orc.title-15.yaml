- number: '1547.65'
  heading: Hull identification number
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) A watercraft constructed on or after November 1, 1972, shall have a hull
    identification number permanently displayed and affixed to it in accordance with
    federal law.

    (B) A watercraft constructed before November 1, 1972, shall have a hull identification
    number assigned to it by the chief of the division of parks and watercraft at
    the time of registration, at the time of application for title, after transfer
    of ownership, or at the time of a change to this state as the principal location
    of operation. The number shall be permanently displayed and affixed as prescribed
    by rules.

    (C) A person who builds a watercraft or imports a watercraft from another country
    for personal use and not for the purpose of sale shall request a hull identification
    number from the chief and permanently display and affix the number as prescribed
    by rules.

    (D) No person shall operate or permit to be operated any watercraft on the waters
    in this state in violation of this section.'
  history: null
