- number: '1522.04'
  heading: Legislative authorization for vote on standard of review
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) Prior to casting a vote under Section 3.1 of the great lakes-st. Lawrence
    river basin water resources compact with respect to any regulation that amends
    or revises the standard of review and decision, the governor or the governor''s
    alternate shall obtain authorization from the general assembly for the vote. The
    governor or the governor''s alternate shall obtain the authorization via a concurrent
    resolution adopted or bill enacted by the general assembly. The governor or the
    governor''s alternate shall exercise the vote consistent with the terms of the
    general assembly''s authorization. The procedures established in this section
    are material requirements for adoption of any such regulation in accordance with
    Section 3.1 of the compact and Ohio''s respective statutory authority and procedures.

    (B) No regulation duly adopted as provided for in Section 3.1 of the compact that
    amends or revises the standard of review and decision as set forth in the compact
    may be adopted by the director of natural resources unless the regulation is first
    approved by the general assembly in the same manner as a statutory enactment.'
