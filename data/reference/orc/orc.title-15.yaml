- number: '1547.533'
  heading: Fraudulent watercraft identification
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'No person shall operate a watercraft in this state if it displays an identification
    number or registration decal that is any of the following:

    (A) Fictitious;

    (B) A counterfeit or an unlawfully made copy of any identification number or registration
    decal;

    (C) An identification number or registration decal that belongs to another watercraft.'
