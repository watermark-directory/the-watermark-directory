- number: '1503.01'
  heading: Chief of the division of forestry - powers and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry shall administer this chapter.

    The chief may adopt, amend, and rescind rules, in accordance with Chapter 119.
    of the Revised Code, for the administration, implementation, and enforcement of
    section 1503.43 of the Revised Code and for the administration, use, visitation,
    and protection of the state forests, except those forests used solely for research
    purposes by the Ohio agricultural research and development center. Copies of the
    rules governing state forests shall be posted in conspicuous places in those forests.
    No person shall violate any rule adopted under this section.

    The chief, with the approval of the director of natural resources, may enter into
    an agreement with the United States department of agriculture under the "Cooperative
    Forestry Assistance Act of 1978," 92 Stat. 365, 16 U.S.C.A. 2101, as amended,
    for the purpose of receiving and disbursing grants to provide forestry and fire
    protection assistance on public and private lands in this state.

    The chief shall employ, subject to the approval of the director, field assistants
    and such other employees as are necessary for the performance of the work prescribed
    by this chapter and for the performance of the other work of the division, shall
    prescribe their duties, and shall fix their compensation in accordance with such
    schedules as are provided by law for the compensation of state employees.

    All employees of the division, unless specifically exempted by law, shall be employed
    subject to the classified civil service laws in force at the time of employment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.01
- number: '1503.011'
  heading: Conservation and development of forests - duties of chief
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry shall be responsible for the conservation
    and development of forests within this state. The chief shall be concerned with
    silvicultural practices, including the proper planting, growing, protecting, harvesting,
    and managing of trees for such purposes as watershed and soil protection, timber
    production and utilization, recreation, aesthetics, wildlife habitat development,
    and urban enhancement and for all benefits that forests provide.

    The chief may do any or all of the following:

    (A) Provide rural forestry assistance to nonindustrial private forest landowners,
    including advice in tree planting, forest improvement, harvesting, and all aspects
    of conservation;

    (B) Provide urban forestry assistance to individuals, nonprofit organizations,
    and political subdivisions to manage their urban forest resource and develop comprehensive
    tree care programs;

    (C) Provide wood utilization, marketing, and rural forestry development assistance
    to forest industries, political subdivisions and agencies thereof, and state and
    federal agencies for the purpose of establishing and maintaining a viable, economically
    sound wood-based industry while expanding the forest resource of this state;

    (D) Provide forest pest protection assistance to forest landowners, political
    subdivisions and agencies thereof, and state and federal agencies on assessing
    and evaluating the health and vigor of the forest resource;

    (E) Provide technical assistance to landowners in developing forest windbreaks,
    filter strips, and other forest management practices that provide conservation
    benefits;

    (F) Provide awareness of and education concerning the programs provided for under
    divisions (A) to (E) of this section;

    (G) Enter into agreements with political subdivisions and agencies thereof, state
    and federal agencies, firefighting agencies and private fire companies, as those
    terms are defined in section 9.60 of the Revised Code, nonprofit organizations,
    and individuals to meet the needs of forestry assistance in this state and, in
    accordance with section 1503.01 of the Revised Code, develop and administer grant
    programs for any of those entities requesting assistance. The chief shall adopt,
    and may amend and rescind, rules in accordance with Chapter 119. of the Revised
    Code establishing such requirements and procedures as are necessary to implement
    this division;

    (H) Administer the state recreational vehicle fund created in section 4519.11
    of the Revised Code.

    As used in this section, "nonprofit organization" has the same meaning as in section
    4141.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.011
- number: '1503.03'
  heading: Acquisition of forest areas
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry shall cooperate with all state operated
    universities and the department of agriculture. The chief, with the approval of
    the director of natural resources, may purchase or acquire by gift, donations,
    or contributions any interest in land suitable for forestry purposes. The chief
    may enter into agreements with the federal government or other agencies for the
    acquisition, by lease, purchase, or otherwise, of such lands as in the judgment
    of the chief and director are desirable for state forests, building sites, or
    nursery lands. The chief may expend funds, not otherwise obligated, for the management,
    development, and utilization of such lands.

    The chief, with the approval of the director of natural resources, may acquire
    by lease, purchase, gift, or otherwise, in the name of the state, forested or
    other lands in the state suitable for the growth of forest trees to the amount
    of the appropriation for that purpose. The chief shall prepare and submit to the
    director of natural resources maps and descriptions of such areas including and
    adjacent to the existing state forest lands, the lands within which, not at the
    time belonging to the state, are properly subject to purchase as state forest
    lands for reasons of protection, utilization, and administration. When such an
    area is approved by the director of natural resources, it shall be known as a
    state forest purchase area and the map and description, with the approval of the
    director of natural resources indorsed thereon, shall be filed in duplicate with
    the director of administrative services and the attorney general.

    All lands purchased for forest purposes shall be deeded to the state, but the
    purchase price of such lands shall not be paid until the title thereof has been
    approved by the attorney general. The price of such lands shall not exceed the
    appropriation for such purposes.'
