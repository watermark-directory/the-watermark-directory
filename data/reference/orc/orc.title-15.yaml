    name: Division Of Forestry
  text: Notwithstanding any other section of the Revised Code relating to the distribution
    or crediting of fines for violations of the Revised Code, all fines imposed under
    section 1503.99 of the Revised Code shall be paid to the treasurer of state and
    deposited in the state forest fund created in section 1503.05 of the Revised Code.
