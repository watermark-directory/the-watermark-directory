- number: '1561.351'
  heading: Notification of violations
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'A deputy mine inspector who makes a finding concerning a violation of this
    chapter or Chapter 1563., 1565., or 1567. or section 1509.09, 1509.12, 1509.13,
    1509.14, 1509.15, 1509.17, or 1509.18 of the Revised Code that involves mining
    safety shall notify the owner, operator, lessee, agent, and representative of
    the miners of the mine involved of the finding. The owner, operator, lessee, or
    agent of the mine involved may request a review of the inspector''s finding by
    the chief of the division of mineral resources management. Upon receipt of such
    a request, the chief shall review the inspector''s finding, make a written determination
    regarding it, and provide a copy of the written determination to the owner, operator,
    lessee, or agent of the mine involved. The chief shall provide a copy of the written
    determination to any other interested party upon request.

    A person, such as an owner, operator, lessee, or agent of the mine or the authorized
    representative of the miners of the mine, who has an interest that is or may be
    adversely affected by the chief''s determination may appeal the determination,
    not later than ten days after receiving notice of the determination, to the reclamation
    commission by filing a copy of the chief''s written determination with the commission,
    notwithstanding division (A)(1) of section 1513.13 of the Revised Code, which
    provides for appeals within thirty days. The commission shall hear the appeal
    in accordance with section 1513.13 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.351
- number: '1561.36'
  heading: Investigation and written report in case of major accident
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: Upon being notified by the owner, lessee, or agent of a mine, or by a deputy
    mine inspector, that a major accident, causing injury to persons or property,
    has occurred at a mine within the jurisdiction of the chief of the division of
    mineral resources management, the chief shall go, and may order one or more of
    the deputy mine inspectors to go, at once to such mine, inquire into the cause
    of the accident, and make a written report upon the condition of that part of
    the mine wherein the accident occurred and the cause of the accident. The chief
    shall file such report in the chief's office, and mail a copy thereof to the general
    office of the owner, lessee, or agent of such mine.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.36
- number: '1561.37'
  heading: Investigation and written report in case of fatal or serious accident
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: When a deputy mine inspector receives notice of the occurrence of a fatal
    or serious accident occurring at any mine in the deputy mine inspector's district,
    the deputy mine inspector shall go immediately to such mine, to investigate fully
    into the cause of the accident, and shall make a report thereon to the chief of
    the division of mineral resources management in writing. A copy of such report
    shall be mailed to the owner, operator, lessee, or agent of such mine. If the
    accident is of such a nature that the deputy mine inspector needs assistance,
    the deputy mine inspector may request the chief to attend or to assign additional
    deputy mine inspectors to assist the deputy mine inspector who requested assistance.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.37
