- number: '1545.131'
  heading: Mutual aid contracts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'The board of park commissioners of a park district may enter into contracts
    with one or more townships, township police districts, joint police districts,
    municipal corporations, or county sheriffs of this state, with one or more township
    park districts created pursuant to section 511.18 of the Revised Code or other
    park districts, with one or more state universities or colleges, as defined in
    section 3345.12 of the Revised Code, or with a contiguous political subdivision
    of an adjoining state, and a township, township police district, joint police
    district, municipal corporation, county sheriff, township park district, other
    park district, or state university or college may enter into a contract with a
    park district upon any terms that are agreed to by them, to allow the use of the
    park district police or law enforcement officers designated under section 1545.13
    of the Revised Code to perform any police function, exercise any police power,
    or render any police service on behalf of the contracting entity that the entity
    may perform, exercise, or render.

    Chapter 2744. of the Revised Code, insofar as it applies to the operation of police
    departments, applies to the contracting entities and to the members of the police
    force or law enforcement department when they are rendering service outside their
    own subdivisions pursuant to that contract.

    Members of the police force or law enforcement department acting outside the political
    subdivision in which they are employed, pursuant to that contract, shall be entitled
    to participate in any indemnity fund established by their employer to the same
    extent as while acting within the employing subdivision. Those members shall be
    entitled to all the rights and benefits of Chapter 4123. of the Revised Code,
    to the same extent as while performing service within the subdivision.

    The contracts entered into pursuant to this section may provide for the following:

    (A) A fixed annual charge to be paid at the times agreed upon and stipulated in
    the contract;

    (B) Compensation based upon the following:

    (1) A stipulated price for each call or emergency;

    (2) The number of members or pieces of equipment employed;

    (3) The elapsed time of service required in each call or emergency.

    (C) Compensation for loss or damage to equipment while engaged in rendering police
    services outside the limits of the subdivision that owns and furnishes the equipment;

    (D) Reimbursement of the subdivision in which the police force or law enforcement
    department members are employed for any indemnity award or premium contribution
    assessed against the employing subdivision for workers'' compensation benefits
    for injuries or death of its police force or law enforcement department members
    occurring while engaged in rendering police services pursuant to the contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.131
- number: '1545.132'
  heading: Providing police service without contract
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'The police force or law enforcement department of any park district may provide
    police protection to any county, municipal corporation, township, township police
    district, or joint police district of this state, to any other park district or
    any township park district created pursuant to section 511.18 of the Revised Code,
    or to a governmental entity of an adjoining state without a contract to provide
    police protection, upon the approval, by resolution, of the board of park commissioners
    of the park district in which the police force or law enforcement department is
    located and upon authorization by an officer or employee of the police force or
    department providing the police protection who is designated by title of office
    or position, pursuant to the resolution of the board of park commissioners, to
    give the authorization.

    Chapter 2744. of the Revised Code, insofar as it applies to the operation of police
    departments, shall apply to any park district and to members of its police force
    or law enforcement department when those members are rendering police services
    pursuant to this section outside the park district by which they are employed.

    Police force or law enforcement department members acting, as provided in this
    section, outside the park district by which they are employed shall be entitled
    to participate in any pension or indemnity fund established by their employer
    to the same extent as while acting within the park district by which they are
    employed. Those members shall be entitled to all rights and benefits of Chapter
    4123. of the Revised Code to the same extent as while performing services within
    the park district by which they are employed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.132
- number: '1545.14'
  heading: Agreement with other public authorities to assume control of parks
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: A board of park commissioners may by agreement with the legislative or other
    public authority in control of parks or park lands either within or without the
    park district, assume control of all or a portion of any existing parks or park
    lands or otherwise contract or cooperate with such public authority in connection
    with the use, development, improvement, and protection of parks or park lands.
    In such event, such parks or park lands may be developed, improved, and protected
    as in case of lands otherwise acquired by said board. This section does not authorize
    said board to acquire or control any park, park lands, parkways, playgrounds,
    other lands, or boulevards owned or controlled by any other public authority except
    by agreement as provided in this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.14
- number: '1545.15'
  heading: Annexation procedure
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: When conducive to the general welfare, any territory adjacent and contiguous
    to an existing park district, whether located within or without the county in
    which such district was created, may be annexed to such district. When a petition
    is filed with the board of park commissioners requesting such annexation, containing
    an accurate description of the territory proposed to be annexed, accompanied by
    an accurate map or plat of such territory, and signed either by a majority of
    the electors residing within such territory or by not less than fifty such electors,
    the board shall determine whether it is advisable that such annexation should
    be made. If the board determines in favor of such annexation, it shall make application
    to the probate court of the county in which such territory is located, setting
    forth the fact of the filing of such petition and the reasons why it is advisable
    that such territory should be annexed to such district. Any such board may of
    its motion file such petition in such court. Upon the filing of such petition,
    like proceedings shall be had as are provided in sections 1545.03 and 1545.04
    of the Revised Code upon application for the creation of a park district, except
    that the territory so annexed may include a part only of an existing township
    or municipal corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.15
- number: '1545.16'
  heading: Powers of budget commissioners, auditors, and treasurers in relation to
    park districts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: In the event of the annexation to a park district of territory located in
    a county other than the county in which such district was created, the budget
    commissioners of the county in which such annexed territory is located shall exercise,
    with reference to such annexed territory, the powers conferred upon budget commissioners
    by section 1545.20 of the Revised Code, and the county auditor and county treasurer
    of the county in which such annexed territory is located shall exercise, with
    reference to taxes levied and collected by the board of park commissioners upon
    such annexed territory, the powers conferred upon auditors and treasurers by section
    1545.22 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.16
- number: '1545.17'
  heading: Improvement of public highway
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: When a public highway extends into or through a park area, or when a public
    highway forms all or part of a suitable connection between two or more park areas,
    and it is deemed advisable to make alterations in the route or width of such highway,
    or to grade, drain, pave, or otherwise improve such highway, boards of park commissioners
    may enter into agreements with the public authorities in charge or control of
    so much of said highway as lies within such park area or which forms the whole
    or part of a connecting link between two or more park areas, providing for the
    doing of any of such things, under the procedure authorized by law in case of
    such public authorities, and for the payment by such boards of so much of the
    cost thereof as is agreed upon. This section does not affect the legal status
    of such highway.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.17
- number: '1545.18'
  heading: Assessment of cost of improvement - collection
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: In the development and improvement of the lands acquired by a board of park
    commissioners, such board may assess such portion of the cost of such development
    or improvement as it deems equitable, not to exceed fifty per cent of such total
    cost, upon abutting, contiguous, adjacent, or otherwise specifically benefited
    lands, in an amount not in excess of and in proportion to the special benefits
    conferred upon such lands by such development or improvement. Such assessment
    shall be payable in not to exceed ten equal annual installments, and said board
    may borrow money in anticipation of the collection of such special assessments.
    The proceedings had in the levying and collection of such special assessments,
    including the issue of bonds of the park district in anticipation of the collection
    of deferred assessments, shall be as provided in case of the levy and assessment
    of special assessments for street improvements in municipal corporations, insofar
    as such proceedings are applicable. If any such assessment is twenty-five dollars
    or less, or whenever the unpaid balance of any such assessment is twenty-five
    dollars or less, such assessment shall be paid in full, and not in installments,
    at the time when the first or next installment would otherwise become due and
    payable.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.18
- number: '1545.19'
  heading: Assessment may be increased with consent of property owners
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'In case of any development or improvement, the assessments authorized by
    section 1545.18 of the Revised Code shall not in the aggregate exceed the cost
    of a development or improvement sufficient only to serve that need of the property
    to be assessed, unless the development or improvment has been petitioned for by
    the owners of not less than sixty per cent, both in foot frontage and in tax valuation,
    of the property to be assessed, consenting to a larger assessment than provided
    for in this section and section 1545.18 of the Revised Code, in which event such
    larger assessment may be levied to the extent specified in such petition.

    Any owner of property to be assessed in accordance with section 1545.18 of the
    Revised Code may appeal to the probate court in the county in which such property
    is located from the action of the board of park commissioners in the matter of
    the determination of the aggregate amount to be assessed for any given development
    or improvement or in the matter of the determination of the assessment against
    any specific property, or both, in the manner provided in sections 6117.01 to
    6117.40, inclusive, of the Revised Code, and the court may review and modify the
    action of the board with respect to such assessments.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.19
- number: '1545.20'
  heading: Tax levy
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: A board of park commissioners may levy taxes upon all the taxable property
    within the park district in an amount not in excess of one-half of one mill upon
    each dollar of the district tax valuation in any one year, subject to the combined
    maximum levy for all purposes otherwise provided by law. After the budget commission
    of the county in which the district is located certifies such levy, or such modification
    thereof as it considers advisable, to the county auditor, he shall place it upon
    the tax duplicate. The board may then borrow money in anticipation of the collection
    of such tax, and issue the negotiable notes of such board therefor in an amount
    not in excess of fifty per cent of the proceeds of such tax, based upon the amount
    of the current tax valuation. Such notes shall not be issued for a period longer
    than one year, and shall be payable out of the proceeds of such levy. To the extent
    of such notes and the interest which accrues thereon such levy shall be exclusively
    appropriated to the payment of such notes. Any portion of such notes remaining
    unpaid through any deficiency in such levy shall be payable out of the next ensuing
    levy which shall be made by said board in the next ensuing year in an amount at
    least sufficient to provide for the payment of said notes, but not in excess of
    one half of one mill in accordance with section 133.17 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.20
- number: '1545.21'
  heading: Tax levy for use of district - submission to electors - bonds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) The board of park commissioners, by resolution, may submit to the electors
    of the park district the question of levying taxes for the use of the district.
    The resolution shall declare the necessity of levying such taxes, shall specify
    the purpose for which such taxes shall be used, the annual rate proposed, and
    the number of consecutive years the rate shall be levied. Such resolution shall
    be forthwith certified to the board of elections in each county in which any part
    of such district is located, not later than the ninetieth day before the day of
    the election, and the question of the levy of taxes as provided in such resolution
    shall be submitted to the electors of the district at a special election to be
    held on whichever of the following occurs first:

    (1) The day of the next general election;

    (2) The first Tuesday after the first Monday in May in any calendar year, except
    that if a presidential primary election is held in that calendar year, then the
    day of that election.

    A resolution to renew, renew and increase, or renew and decrease any existing
    levy shall not be placed on the ballot unless the question is submitted at the
    general election held during the last year the tax to be renewed may be extended
    on the tax list, or at any election described in division (A)(1) or (2) of this
    section in the ensuing year. Such a resolution may specify that the renewal, increase,
    or decrease of the existing levy shall be extended on the tax list for the tax
    year specified in the resolution, which may be the last year the existing levy
    may be extended on the list for the ensuing year. If the renewal, increase, or
    decrease is to be extended on the tax list for the last tax year the existing
    levy would otherwise be extended, the existing levy shall not be extended on the
    tax list for that last year unless the question of the renewal, increase, or decrease
    is not approved by a majority of electors voting on the question, in which case
    the existing levy shall be extended on the tax list for that last year.

    Except as otherwise prescribed in division (B) of this section, the ballot shall
    set forth the purpose for which the taxes shall be levied, the levy''s estimated
    annual collections, the annual rate of levy, expressed in mills for each dollar
    of taxable value and in dollars for each one hundred thousand dollars of the county
    auditor''s market value, and the number of years of such levy. If the tax is to
    be placed on the current tax list, the form of the ballot shall state that the
    tax will be levied in the current tax year and shall indicate the first calendar
    year the tax will be due.

    (B) If the resolution of the board of park commissioners provides that an existing
    levy will be renewed, increased, or decreased upon the passage of the ballot question,
    the form of the ballot shall be the same as prescribed for such levies in divisions
    (B) and (C) of section 5705.25 of the Revised Code.

    (C) If a majority of the electors voting upon the question of such levy vote in
    favor thereof, such taxes shall be levied and shall be in addition to the taxes
    authorized by section 1545.20 of the Revised Code, and all other taxes authorized
    by law. The rate submitted to the electors at any one time shall not exceed two
    mills annually upon each dollar of taxable value unless the purpose of the levy
    includes providing operating revenues for one of Ohio''s major metropolitan zoos,
    as defined in section 4503.74 of the Revised Code, in which case the rate shall
    not exceed three mills annually upon each dollar of taxable value. When a tax
    levy has been authorized as provided in this section or in section 1545.041 of
    the Revised Code, the board of park commissioners may issue bonds pursuant to
    section 133.24 of the Revised Code in anticipation of the collection of such levy,
    provided that such bonds shall be issued only for the purpose of acquiring and
    improving lands. Such levy, when collected, shall be applied in payment of the
    bonds so issued and the interest thereon. The amount of bonds so issued and outstanding
    at any time shall not exceed one per cent of the total taxable value in such district.
    Such bonds shall bear interest at a rate not to exceed the rate determined as
    provided in section 9.95 of the Revised Code.

    (D) As used in this section, "the county auditor''s market value" and "effective
    rate" have the same meanings as in section 5705.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.21
- number: '1545.211'
  heading: Anticipation notes
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: In addition to the authority conferred by section 1545.21 of the Revised Code,
    in anticipation of the collection of current revenues in and for any fiscal year,
    the board of park commissioners may borrow money and issue notes therefor in anticipation
    of the receipt of taxes for debt charges or current expenses to the extent necessary
    to meet such charges or expenses, but not in excess of the estimated receipts
    for the current tax year, less all advances. The sums so anticipated shall be
    deemed appropriated for the payment of such notes at maturity. The notes shall
    not run more than one year, nor bear interest at a rate exceeding the rate provided
    in section 9.95 of the Revised Code, and the proceeds therefrom shall be used
    only for the purposes for which the anticipated taxes were levied. No board shall
    borrow money or issue notes in anticipation of such taxes before the first day
    of January of the year of such tax receipts.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.211
- number: '1545.22'
  heading: Depositories for funds - duties of county treasurer and county auditor
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) If a treasurer is appointed by a board of park commissioners pursuant
    to section 1545.07 of the Revised Code, the accounts of the board shall be kept
    by that treasurer. The treasurer shall be an ex officio officer of the board.
    No contract of the board shall become effective until the treasurer certifies
    that there are funds of the board sufficient to provide for that contract.

    (B) If no treasurer is appointed by the board pursuant to section 1545.07 of the
    Revised Code:

    (1) All funds under the control of a board of park commissioners shall be kept
    in depositories selected in the manner provided for the deposit of county funds,
    insofar as such proceedings are applicable, and such deposits shall be secured
    as provided in the case of county funds. The county treasurer of the county in
    which the park district is located shall be the custodian of the funds of the
    board and shall be an ex officio officer of the board. He shall pay the funds
    out upon the warrant of the county auditor of the county in which the district
    is located. Interest earned on all funds under the control of the board of park
    commissioners shall be credited to such funds.

    (2) The county auditor shall be an ex officio officer of the board, and no contract
    of the board involving the expenditure of money shall become effective until the
    auditor certifies that there are funds of the board in the custody of the county
    treasurer and otherwise unappropriated sufficient to provide therefor. The auditor
    shall draw warrants on the treasurer to disburse the funds of the board upon order
    of the board, evidenced by the certificate of its secretary.

    (3) Any such board of park commissioners may select a depository for the funds
    of the district, in the manner provided in sections 135.01 to 135.21 of the Revised
    Code, upon the adoption of a resolution declaring such intent. The resolution
    shall be certified to the board of county commissioners and to the treasurer in
    the counties in which the district is located. The board of park commissioners
    shall thereupon become the governing board for such district with respect to the
    deposit of funds of such district.

    (C) If no deposits to or expenditures from the funds of a park district have been
    made for a period of five years, the county auditor or the treasurer appointed
    by the board shall send written notice to the probate court of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.22
- number: '1545.23'
  heading: Disposition of proceeds from sale or lease of park mineral rights
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: If a park district enters into an agreement for the sale or lease of mineral
    rights regarding a park within the district, any royalties or other moneys resulting
    from the sale or lease shall be deposited into a special fund that the board of
    park commissioners shall create. The fund shall be used exclusively for maintenance
    of parks within the district and for the acquisition of new park lands.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.23
- number: '1545.24'
  heading: Issuance of bonds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: The board of park commissioners of any park district may issue bonds pursuant
    to Chapter 133. of the Revised Code for the purpose of acquiring and improving
    lands as authorized by section 1545.11 of the Revised Code. The board may secure
    the payment of such bonds by pledge or deed of trust of any of its revenues and
    receipts resulting from rentals, concessions, licenses, and permits. The board
    shall not pledge the credit or taxing power of the district for the payment of
    any such bonds, nor shall any of the bonds issued under this section be deemed
    to be an indebtedness of the district.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.24
- number: '1545.27'
  heading: Bonds are lawful investments
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: Park district revenue bonds are lawful investments of banks, trust companies,
    trustees, the boards of trustees of the sinking funds of municipal corporations,
    school districts, and counties, the administrator of workers' compensation, the
    state teachers retirement system, the public employees retirement system, and
    the school employees retirement system, and also are acceptable as security for
    the deposit of public moneys.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.27
- number: '1545.28'
  heading: Replacement fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'The board of park commissioners may establish and maintain a replacement
    fund, and for that purpose may set aside annually out of its revenue such sum
    as it may determine necessary. In case of total or partial destruction of or injury
    to any of the property of the park district from any cause, or in case it becomes
    necessary to demolish part or to repair or replace the same, in whole or in part,
    because of the unfitness of such property, such replacement fund may be used to
    rebuild on the original site or elsewhere, or to restore, repair, or improve such
    property.

    Such replacement fund may be invested by such district in bonds of the United
    States, the state, or of a county, municipal corporation, school district, or
    township of this state, and when necessary for the purposes of such funds such
    securities may be disposed of by such district.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.28
- number: '1545.35'
  heading: Dissolution of active park district
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: An active park district created under this chapter and to which no territory
    has been annexed under section 1545.15 of the Revised Code may be dissolved under
    section 1545.36 or 1545.37 of the Revised Code. An active park district to which
    territory has been annexed under section 1545.15 of the Revised Code may be dissolved
    only under the applicable provisions of section 1545.37 of the Revised Code. A
    park district that has been inactive for five years may be dissolved under section
    1545.38 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.35
- number: '1545.36'
  heading: Petition for dissolution of district
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) When the board of elections of the county in which a park district is
    located has had filed with it a petition calling for the dissolution of the district,
    and determines that the petition meets the requirements of this section and section
    3501.38 of the Revised Code, the board shall place the issue of the dissolution
    on the ballot at the next special election to be held on the day of a general
    or primary election. Written notice of the filing of the petition shall be sent
    immediately to the board of park commissioners and the probate court that created
    the district.

    (B) The petition shall:

    (1) Be filed with the board no less than ninety days before the next election;

    (2) Be supported by the signatures of at least twenty-five per cent of the number
    of voters in the district who voted in the preceding gubernatorial election.

    (C) If the petition as filed does not have the required number of signatures and
    the time for filing has elapsed, the board shall declare it invalid. No further
    petition for dissolution shall be received until after the next election is completed.
    On determination of these findings, the board shall send written notice of them
    to the principal circulator.

    (D)(1) If a majority of the votes cast support the dissolution, the board shall
    immediately send written notice of the vote, citing the number of votes for and
    against the issue, to the probate court, to the board of park commissioners, and
    to the principal circulator. No park district shall be applied for within the
    dissolved district for a period of four years following the election in which
    the issue was supported.

    (2) If the issue fails to obtain a majority of the votes cast, the board shall
    receive no further petition for dissolution until the fourth year following that
    in which the election failed, and shall send written notice of these results to
    the principal circulator and the board of park commissioners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.36
- number: '1545.37'
  heading: Application for hearing on dissolution
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: '(A) An application for a hearing on dissolution may be filed with the probate
    court of the county that created the district at any time not prohibited by this
    section and shall meet the requirements of this section.

    (B) The application shall:

    (1) Bear the signatures of at least twenty-five per cent of the number of voters
    in the district who voted in the preceding gubernatorial election;

    (2) Bear the name, address, and telephone number of at least one voter registered
    in the district to be designated the applicant of record. Each applicant of record
    and the board of park commissioners shall be named parties to the proceedings.

    (3) Be accompanied by a complete statement of the issues to be heard, signed by
    applicant of record. Failure to list completely the issues to be heard may, in
    the discretion of the court, be grounds for dismissal of the application.

    (C) Each page of the application:

    (1) Being circulated for signatures shall clearly state the purpose for which
    it is being circulated and at least one reason supporting that purpose. Each page
    lacking either statement shall be declared invalid.

    (2) Shall be circulated by and signed in the presence of a voter registered in
    the district and bear a certification signed by him that this requirement has
    been met. Failure to certify or a false certification shall invalidate the page.

    (D) Each signatory shall sign his name as recorded by the board of elections together
    with his current address and the date. Failure to comply with this division shall
    invalidate the signature.

    (E) The original of the application and statement of issues shall be filed with
    the court and, concurrently, a copy of each shall be served on the board of park
    commissioners. Failure to timely serve these documents on the board are grounds
    for denial of the application.

    (F) Upon receipt of the application, the court shall determine its validity in
    terms of the requirements of divisions (B) to (E) of this section, and may on
    its own assess the application for validity of the signatures or forward it to
    the county board of elections for that assessment. Immediately upon determining
    the state of the application''s validity, the court shall send written notice
    of its findings to each party. If the application is valid, the court shall forthwith
    set a date for hearing, not less than twenty days nor more than forty days from
    the date of its findings, and include the date in its notice to each party. Notice
    of the hearing shall be published in at least one daily newspaper of general circulation
    within the district for not less than five consecutive days, the period to end
    no less than ten days before the hearing. Failure to meet the requirement of notice
    to any party shall not invalidate the proceedings but shall postpone the time
    of hearing. A corrected notice shall be sent to each party with a new date of
    hearing set not less than twenty days nor more than forty days from the date of
    corrected notice, unless each party and the court agree to an earlier date. If
    the application is found to be invalid, the court shall send written notice to
    each party that the application is denied and has been impounded by the court.
    The court shall not receive any further application for hearing on dissolution
    for two years from the date of original filing.

    On motion, any applicant may be named as a party at the discretion of the court.
    Any party may be heard on his own or through counsel. On motion by any party made
    at least five days before the hearing, evidence based on the statement of issues
    filed with the application shall be heard in accordance with the Rules of Civil
    Procedure. At the hearing, evidence may be heard at the discretion of the court.
    Argument for and against the dissolution shall be heard by the court, and may
    be limited at its discretion. A verbatim record of the hearing shall be taken.
    Upon completion of the hearing, the court shall issue its findings together with
    its reasons therefor to all parties. No more than thirty days shall pass between
    the adjournment of the hearing and the issuing of the findings. If the court finds
    that dissolution is conducive to the public welfare, no other park district shall
    be created within the same jurisdiction or part of it pursuant to sections 1545.01
    to 1545.04 or 1545.15 of the Revised Code for four years from the date of finding.
    If the court finds that dissolution is not conducive to the public welfare, it
    shall find against it. Upon a finding against dissolution, the court shall impound
    the application, and advise each party that no further application for hearing
    on dissolution shall be received for four years from the date of finding.

    (G) A park district that includes territory annexed under section 1545.15 of the
    Revised Code shall only be dissolved by order of the probate court that created
    the district on compliance with this division and divisions (A) to (F) of this
    section. Pages of the application bearing signatures of registered voters of each
    annexed territory shall be filed for assessment of their validity with the probate
    court of the county in which the territory is located. The number of signatures
    needed to establish validity shall be a majority of the number of voters residing
    within the annexed territory who voted in the preceding gubernatorial election.
    Upon determination of its assessment, and in no case more than fifteen days after
    filing, the probate court of the county in which the annexed territory is located
    shall forward the pages of the application together with its findings to the probate
    court that created the district. The probate court that created the district shall
    incorporate these findings with its assessment of the application filed with it
    in accordance with division (F) of this section in reaching its determination
    of the entire application''s validity and proceed in accordance with applicable
    provisions of division (F) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.37
- number: '1545.38'
  heading: Proceedings for dissolution of inactive district
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: On receipt of written notice from the county auditor that no deposits to or
    expenditures from the funds of a park district have been made for a period of
    five years, the probate court shall immediately serve written notice on the board
    of park commissioners and the auditor of a date for hearing on the dissolution
    of the district. The notice shall also order the board to forward to the court
    a complete, current financial statement of the assets and liabilities of the district,
    an inventory of its real and personal property, available deeds to, maps or plats
    for, and other records of real property of the park district, and copies of any
    available plans of the district for park acquisition and development, or capital
    improvements. A copy of the notice shall be served on each party. The court shall
    publish notice of the hearing for five consecutive days in a daily newspaper of
    general circulation within the district, ending no less than fifteen days before
    the hearing. The issue of dissolution shall be heard and determined by the court
    in accordance with the applicable provisions of division (F) of section 1545.37
    of the Revised Code. If the court finds for dissolution, it shall as applicable
    proceed in accordance with section 1545.40 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.38
- number: '1545.39'
  heading: Ceasing activity pending determination on petition
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: On receipt of notice of the filing of a petition with the county board of
    elections or an application for hearing or a notice of hearing from the probate
    court, the board of park commissioners shall cease all acquisition of land and
    the development of existing land unless valid options or contracts for which funds
    have been committed have been previously signed. No activity shall be resumed
    until the board of elections or the court determines, respectively, that the petition
    or application is invalid and the issue will not be voted on or heard, or the
    issue fails election, or the court finds against dissolution, whichever is earlier.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1545.39
- number: '1545.40'
  heading: Dissolution
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1545'
    name: Park Districts
  text: 'On dissolution of a park district, the board of park commissioners is dissolved
    and all of its duties and responsibilities shall be exercised by the probate court
    until all of the board''s business is completed and all of its property disposed
    of. The court may retain special counsel and another person who in the court''s
    discretion are qualified to assist it in the closing out of business and disposal
    of property and any employee of the district the court determines is necessary
    to closing out the business or to maintaining the property of the district in
    good order until it is disposed of. Any employee not retained by the court shall
    be terminated within ten working days of the board''s dissolution and paid one
    month''s base salary or for one hundred seventy-three hours, whichever is applicable,
    in addition to all other pay and allowances due him. The same shall be paid to
    any employee retained by the court upon his termination.

    The court shall send the director of natural resources notice of the dissolution
    together with an inventory of the district''s real property, any personal property
    of the district that he considers to be functionally related to the use or management
    of the real property, and a full and accurate statement of any indebtedness that
    is secured by the real property. The director shall, within sixty days of receipt
    of such notice, notify the court of his acceptance or rejection of any such real
    property and its related personal property and indebtedness. If the director accepts,
    the court shall convey the real property to the state, subject to any deed or
    other restrictions placed upon use of the real property as a condition of receiving
    federal or state assistance for its acquisition or development, and transfer the
    related personal property to the department of natural resources. If the director
    rejects, the court shall convey any real property of the district and transfer
    any related personal property to any other agency of the state or any political
    subdivision or instrumentality of the state located within the former park district
    or within a county in which territory that was annexed to the district is located,
    that is interested in acquiring the real property for parks and recreation, conservation,
    or other public purposes, in that order of priority, and that is willing to assume
    any related indebtedness and fulfill any deed restrictions and any other restrictions
    placed upon use of the real property as a condition of receiving federal or state
    assistance for its acquisition or development.

    If no state agency, political subdivision, or instrumentality of the state is
    willing to accept the real property and related personal property and indebtedness,
    the court shall convey such property to the board of county commissioners of the
    county in which the property is located. The board of county commissioners may
    sell, lease, or transfer such property in accordance with sections 307.09 to 307.12
    of the Revised Code. If there is any outstanding indebtedness on such property
    sold or leased, the proceeds from the sale or lease shall be paid into the fund
    from which payments are made to extinguish the indebtedness on such property and
    the proceeds shall be used for that purpose; otherwise the proceeds shall be paid
    into the general fund of the county. The budget commission shall continue to levy
    and collect taxes necessary for the payment of any outstanding indebtedness of
    the district for which tax revenues of the district were pledged and that is not
    otherwise assumed.

    Except as otherwise provided in this section, upon dissolution of a park district,
    the probate court shall order the budget commission of each county affected to
    terminate the tax levies of the park district, levied under section 1545.20 or
    1545.21 of the Revised Code, and the assessments levied under section 1545.18
    of the Revised Code and divide the net indebtedness of the district among the
    state, political subdivisions, and instrumentalities that acquire the district''s
    real property on the basis of the market value of the real property that each
    acquires. Upon disposal of the district''s real property, the court shall notify
    the budget commission, which shall transfer the remaining funds of the district
    to the proper authorities.'
