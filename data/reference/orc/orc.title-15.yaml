- number: '1503.06'
  heading: State forest nursery
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry may acquire suitable land in the name
    of the state and maintain it as a state forest nursery. He shall raise seedling
    trees of useful species for planting and, on terms approved by the director of
    natural resources, shall distribute the seedling trees to persons who desire to
    plant them within the state for conservation purposes, including general reforestation,
    wildlife habitat development, windbreaks, energy conservation, natural community
    restoration, soil and water protection, research, commemorative plantings, and
    any other purpose relating to conservation and natural resources education. No
    seedling trees distributed under this section subsequently shall be removed alive
    with roots attached and sold, bartered, or given away, except that products such
    as Christmas trees, roundwood, or other materials derived from seedling trees
    distributed under this section may be sold or removed.

    The chief may conduct activities for the improvement of seedlings of forest tree
    species. In distributing seedling trees under this section, he shall reserve sufficient
    seedling trees to reforest wastelands coming into the possession of the state
    and placed under the supervision of the division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.06
- number: '1503.07'
  heading: Property which is a forest-fire hazard may be declared a public nuisance
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry may declare any property to be a public
    nuisance which by reason of its condition or operation is a special forest-fire
    hazard and as such endangers property. He shall notify the owner of the property
    or person responsible for the condition declared to be a public nuisance and shall
    advise him as to the abatement or removal of the nuisance. In the case of a railroad,
    the notice shall be served upon the superintendent of the division upon which
    the nuisance exists. If the owner of the property on which the nuisance exists,
    after thirty days'' notice, refuses or neglects to take action to abate or remove
    the nuisance, the chief shall cause it to be removed or abated. The costs of that
    action constitute a lien and are recoverable as a special tax assessed against
    the property. All money thus derived shall be paid into the state treasury to
    the credit of the general revenue fund. The chief shall collect and arrange information
    obtained concerning violation of laws relating to the protection of forests from
    fires and present that information to the director of natural resources, who shall
    file it with the attorney general for legal action.

    The disbursements by the chief in carrying out the purposes of sections 1503.07
    to 1503.27 of the Revised Code shall be paid by the state from the appropriation
    for the prevention and extinguishment of forest fires.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.07
- number: '1503.08'
  heading: Fire protection areas
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry, with the approval of the director
    of natural resources, shall establish fire protection areas for the state. When
    establishing fire protection areas, the chief shall consider all of the following:

    (A) The amount of forest cover;

    (B) The actual and potential fire occurrence;

    (C) The threat to forest resources;

    (D) The population of the areas;

    (E) Any other pertinent forest resource information.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.08
- number: '1503.09'
  heading: Appointment of forest-fire wardens
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry may appoint forest-fire wardens and
    forest-fire investigators, whose jurisdiction shall extend over fire protection
    areas established under section 1503.08 of the Revised Code. Forest-fire investigators
    shall conduct investigations and gather evidence for purposes of the enforcement
    of this chapter and sections 2909.02, 2909.03, 2909.06, and 3767.32 of the Revised
    Code with respect to forest fires in fire protection areas. Any forest-fire warden
    or forest-fire investigator shall hold office until the warden''s or investigator''s
    successor is appointed, but any such warden or investigator may at any time be
    summarily removed by the chief.

    The chief may designate a forest-fire warden as a forest-fire investigator. The
    chief shall establish a policy for the required training of forest-fire investigators,
    which shall include successful completion of basic wildland fire suppression training
    and training as a peace officer. Division (D) of section 1501.24 and section 1501.25
    of the Revised Code apply to a forest-fire investigator in the same manner as
    those provisions of law apply to a natural resources officer. Forest-fire investigators
    shall have jurisdiction, with permission from the chief, to enter public and private
    lands.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.09
- number: '1503.10'
  heading: Supervision of forest-fire wardens
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: The chief of the division of forestry or the chief's designee shall supervise
    all forest-fire wardens and forest-fire investigators, shall instruct them in
    their duties, shall enforce all laws of this state for the prevention and suppression
    of forest fires, and shall direct investigations of alleged violations of such
    laws within fire protection areas established under section 1503.08 of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.10
- number: '1503.11'
  heading: Forest-fire wardens - duties and powers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'Forest-fire wardens shall prevent and extinguish forest fires in the territory
    over which they have jurisdiction and shall have control and direction of all
    persons and apparatus while engaged in extinguishing forest fires.

    In case of fire threatening any forest or woodland, the wardens having authority
    in that locality shall attend immediately and use all necessary means to confine
    and extinguish the fire. Forest-fire wardens or forest-fire investigators may
    cut trees or other vegetation, destroy fences, plow land, or set backfires to
    check any fire.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.11
- number: '1503.12'
  heading: Notices
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: Forest-fire wardens shall post such notices warning against the dangers of
    forest fires and calling attention to the forest-fire laws of this state as the
    chief of the division of forestry prepares. No person shall, without authority,
    willfully or maliciously tear down, remove, deface, or destroy any such notice.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.12
- number: '1503.13'
  heading: Compensation of forest-fire wardens
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: Forest-fire wardens shall be allowed for their services such remuneration
    as is fixed by the chief of the division of forestry, subject to the approval
    of the director of natural resources. Laborers and owners of all property required
    by any warden in the extinguishment of a brush or forest fire shall receive reasonable
    compensation for labor and material so employed, and said chief may make final
    settlement.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.13
- number: '1503.14'
  heading: System for detection and observation of forest fires - mutual aid and assistance
    agreements - transfers of excess property
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'The chief of the division of forestry may establish and put into effect a
    system for aerial or ground detection and observation of forest fires which shall
    cover the regions determined by the chief to be subject to forest fires, purchase
    the necessary equipment and material, and hire the necessary labor for the installation
    and maintenance of the system.

    The chief may enter into agreements or contracts with firefighting agencies and
    private fire companies for the purpose of providing mutual aid and assistance
    in the protection of forests from forest fires in fire protection areas established
    under section 1503.08 of the Revised Code. The agreements or contracts may provide
    for at least technical assistance, assistance in training personnel, and fire
    suppression assistance and such other forms of aid as may be available and appropriate.

    The chief, with the approval of the director of natural resources, may transfer
    title to or ownership of vehicles, equipment, materials, and supplies that are
    determined to be in excess of the needs of the department of natural resources
    and the division to a firefighting agency or private fire company for the purpose
    of accomplishing fire suppression in fire protection areas.

    As used in this section, "firefighting agency" and "private fire company" have
    the same meanings as in section 9.60 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.14
- number: '1503.141'
  heading: Wildfire suppression payments; reimbursement for costs incurred in suppression
    of fires
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: '(A) As used in this section, "firefighting agency" and "private fire company"
    have the same meanings as in section 9.60 of the Revised Code.

    (B) Each fiscal year, the director of natural resources or the director''s designee
    shall designate not more than two hundred thousand dollars in the state forest
    fund created in section 1503.05 of the Revised Code for wildfire suppression payments.
    The amount designated shall consist only of money credited to the fund from the
    sale of standing timber taken from state forest lands as set forth in that section.

    (C) The director or the director''s designee may use money designated for wildfire
    suppression payments to reimburse firefighting agencies and private fire companies
    for their costs incurred in the suppression of wildfires in counties within fire
    protection areas established under section 1503.08 of the Revised Code where there
    is a state forest or national forest, or portion thereof. The director or the
    director''s designee may provide such reimbursement in additional counties. The
    director or the director''s designee shall provide such reimbursement pursuant
    to agreements and contracts entered into under section 1503.14 of the Revised
    Code and in accordance with the following schedule:

    (1) For wildfire suppression on private land, an initial seventy-dollar payment
    to the firefighting agency or private fire company;

    (2) For wildfire suppression on land under the administration or care of the department
    of natural resources or on land that is part of any national forest administered
    by the United States department of agriculture forest service, an initial one-hundred-dollar
    payment to the firefighting agency or private fire company;

    (3) For any wildfire suppression on land specified in division (C)(1) or (2) of
    this section lasting more than two hours, an additional payment of thirty-five
    dollars per hour.

    (D) For wildfire suppression, prescribed fire assistance, or emergency response
    support to federal agencies, the division may reimburse costs in addition to the
    amounts set forth in division (C) of this section provided those costs are eligible
    in accordance with an agreement under section 1503.27 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.141
- number: '1503.15'
  heading: Personal liability of forest-fire warden or forest-fire investigator
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: A forest-fire warden or forest-fire investigator is not personally liable
    for any act required or authorized under sections 1503.07 to 1503.27 of the Revised
    Code while acting within the scope of official duties as warden or investigator.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.15
- number: '1503.16'
  heading: Duty of owners or lessees
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: Sections 1503.07 to 1503.27 of the Revised Code do not relieve the owners
    or lessees of lands upon which fires may burn or be started from the duty of extinguishing
    the fires insofar as it is within their power.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.16
- number: '1503.17'
  heading: Owner or lessee not to receive compensation for extinguishing fire
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: No owner or lessee of land upon which fire may burn or be started and no person
    during employment with such an owner or lessee shall receive compensation under
    sections 1503.07 to 1503.27 of the Revised Code for extinguishing fire upon his
    land or the land to which his interest is attached. No person who is responsible
    for the spreading of a fire to a woodland, forest, or wild land and no person
    in his employ may receive compensation for helping to extinguish such fires. If
    any owner or lessee of land neglects to extinguish such fires, the forest-fire
    wardens shall provide the necessary means and assistance to extinguish the fires.
    One-half of the costs of the extinguishment shall be borne by the owner or lessee
    and shall constitute a lien and be recoverable as a special tax assessed against
    the property. All moneys thus derived shall be paid into the state treasury to
    the credit of the general revenue fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.17
- number: '1503.18'
  heading: Kindled fires
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: '(A) No person shall kindle a fire upon public land without the written permission
    of the forest-fire warden having jurisdiction or on land of another without the
    written permission of the owner or the owner''s agent.

    (B) No person shall kindle or authorize another to kindle a fire in or near any
    woodland, brushland, or land containing tree growth or in any place from which
    the fire is likely to escape unless all leaves, grass, wood, and inflammable material
    surrounding the place where the fire is kindled have first been removed to a safe
    distance and all other reasonable precautions have been taken to prevent its escape
    from control. No fire shall be left until extinguished or safely covered.

    (C) Excepting fires kindled in a plowed field, garden, or public highway at a
    distance of not less than two hundred feet from any woodland, brushland, or field
    containing dry grass or other inflammable material, no person shall kindle or
    authorize another to kindle a fire in the open air, outside the limits of any
    municipal corporation or land controlled by any railroad company, for the purpose
    of burning wood, brush, weeds, grass, or rubbish of any kind between the hours
    of six a.m. and six p.m. during the months of March, April, May, October, and
    November in any year. The chief of the division of forestry may adopt rules in
    accordance with Chapter 119. of the Revised Code to expand the times and places
    for kindling fires for any affected persons.

    (D) The times and places for kindling fires established under division (C) of
    this section may be restricted or eliminated by executive order of the governor
    if environmental conditions so warrant.

    (E) Fires kindled by improperly disposing of a lighted match, cigar, or other
    burning or glowing substance are kindled fires within the meaning of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.18
- number: '1503.22'
  heading: Fire may be kindled in absence of forest-fire warden
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: In the absence of any forest-fire warden to take control of wildfire, any
    person may kindle a fire at any time on his own land, public land, or the land
    of another with the consent of the owner or occupant thereof for the purpose of
    backfiring to protect property from the threatened and immediate injury of a wildfire.
  history: null
