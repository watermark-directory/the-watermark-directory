- number: '1521.05'
  heading: Well construction logs - well sealing reports
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) As used in this section:

    (1) "Construct" or "construction" includes drilling, boring, digging, deepening,
    altering, and logging.

    (2) "Altering" means changing the configuration of a well, including, without
    limitation, deepening a well, extending or replacing any portion of the inside
    or outside casing or wall of a well that extends below ground level, plugging
    a portion of a well back to a certain depth, and reaming out a well to enlarge
    its original diameter.

    (3) "Logging" means describing the lithology, grain size, color, and texture of
    the formations encountered during the drilling, boring, digging, deepening, or
    altering of a well.

    (4) "Grouting" means neat cement; bentonite products in slurry, granular, or pelletized
    form, excluding drilling mud or fluids; or any combination of neat cement and
    bentonite products that is placed within a well to seal the annular space or to
    seal an abandoned well and that is impervious to and capable of preventing the
    movement of water.

    (5) "Abandoned well" means a well whose use has been permanently discontinued
    and that poses potential health and safety hazards or that has the potential to
    transmit surface contaminants into the aquifer in which the well has been constructed.

    (6) "Sealing" means the complete filling of an abandoned well with grouting or
    other approved materials in order to permanently prevent the vertical movement
    of water in the well and thus prevent the contamination of ground water or the
    intermixing of water between aquifers.

    (B) Any person that constructs a well shall keep a careful and accurate log of
    the construction of the well. The log shall show all of the following:

    (1) The character, including, without limitation, the lithology, color, texture,
    and grain size, the name, if known, and the depth of all formations passed through
    or encountered;

    (2) The depths at which water is encountered;

    (3) The static water level of the completed well;

    (4) A copy of the record of all pumping tests and analyses related to those tests,
    if any;

    (5) Construction details, including lengths, diameters, and thicknesses of casing
    and screening and the volume, type of material, and method of introducing gravel
    packing and grouting into the well;

    (6) The type of pumping equipment installed, if any;

    (7) The name of the owner of the well, the address of the location where the well
    was constructed, and either the state plane coordinates or the latitude and longitude
    of the well;

    (8) The signature of the individual who constructed the well and filed the well
    log;

    (9) Any other information required by the chief of the division of water resources.

    The log shall be filed with the division of water resources within thirty days
    after the completion of construction of the well on forms prescribed and prepared
    by the division. The log shall be kept on file by the division.

    (C) Any person that seals a well shall keep a careful and accurate report of the
    sealing of the well. The sealing report shall show all of the following:

    (1) The name of the owner of the well, the address of the location where the well
    was constructed, and either the state plane coordinates or the latitude and longitude
    of the well;

    (2) The depth of the well, the size and length of its casing, and the static water
    level of the well;

    (3) The sealing procedures, including the volume and type of sealing material
    or materials and the method and depth of placement of each material;

    (4) The date on which the sealing was performed;

    (5) The signature of the individual who sealed the well and filed the sealing
    report;

    (6) Any other information required by the chief.

    The sealing report shall be filed with the division within thirty days after the
    completion of the sealing of the well on forms prescribed and prepared by the
    division.

    (D) In accordance with Chapter 119. of the Revised Code, the chief may adopt,
    amend, and rescind rules requiring other persons that are involved in the construction
    or subsequent development of a well to submit well logs under division (B) of
    this section containing any or all of the information specified in divisions (B)(1)
    to (9) of this section and specifying additional information to be included in
    sealing reports required under division (C) of this section. The chief shall adopt
    rules establishing procedures and requirements governing the payment and collection
    of water well log filing fees, including the amount of any filing fee to be imposed
    as an alternative to the twenty-dollar filing fee established in division (G)
    of this section and including procedures for the quarterly transfer of filing
    fees by boards of health and the director of environmental protection under that
    division.

    (E)(1) No person shall fail to keep and file a well log or a sealing report as
    required by this section.

    (2) No person shall make a false statement in any well log or sealing report required
    to be kept and filed under this section. Violation of division (E)(2) of this
    section is falsification under section 2921.13 of the Revised Code.

    (F) For the purposes of prosecution of a violation of division (E)(1) of this
    section, a prima-facie case is established when the division obtains either of
    the following:

    (1) A certified copy of a permit for a private water system issued in accordance
    with rules adopted under section 3701.344 of the Revised Code, or a certified
    copy of the invoice or a canceled check from the owner of a well indicating the
    construction or sealing services performed;

    (2) A certified copy of any permit issued under Chapter 3734. or 6111. of the
    Revised Code or plan approval granted under Chapter 6109. of the Revised Code
    for any activity that includes the construction or sealing of a well as applicable.

    (G) In accordance with rules adopted under this section, a person or entity that
    constructs a well for the purpose of extracting potable water as part of a private
    water system that is subject to rules adopted under section 3701.344 of the Revised
    Code or a public water system that is required to be licensed under Chapter 6109.
    of the Revised Code shall pay a well log filing fee of twenty dollars per well
    log or, if the chief has adopted rules establishing an alternative fee amount,
    the fee amount established under rules. The fee shall be collected by a board
    of health under section 3701.344 of the Revised Code or the environmental protection
    agency under section 6109.22 of the Revised Code, as applicable.

    Each calendar quarter, a board of health or the environmental protection agency,
    as applicable, shall forward all well log filing fees collected during the previous
    calendar quarter to the division of water resources. The fees shall be forwarded
    in accordance with procedures established in rules adopted under this section.

    Proceeds of well log filing fees shall be used by the division of water resources
    for the purposes of acquiring, maintaining, and dispensing digital and paper records
    of well logs that are filed with the division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.05
- number: '1521.06'
  heading: Construction permits for dams or levees required; exceptions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) No dam may be constructed for the purpose of storing, conserving, or
    retarding water, or for any other purpose, nor shall any levee be constructed
    for the purpose of diverting or retaining flood water, unless the person or governmental
    agency desiring the construction has a construction permit for the dam or levee
    issued by the chief of the division of water resources.

    A construction permit is not required under this section for:

    (1) A dam that is or will be less than ten feet in height and that has or will
    have a storage capacity of not more than fifty acre-feet at the elevation of the
    top of the dam, as determined by the chief. For the purposes of this section,
    the height of a dam shall be measured from the natural stream bed or lowest ground
    elevation at the downstream or outside limit of the dam to the elevation of the
    top of the dam.

    (2) A dam, regardless of height, that has or will have a storage capacity of not
    more than fifteen acre-feet at the elevation of the top of the dam, as determined
    by the chief;

    (3) A dam, regardless of storage capacity, that is or will be six feet or less
    in height, as determined by the chief;

    (4) A dam or levee that belongs to a class exempted by the chief;

    (5) The repair, maintenance, improvement, alteration, or removal of a dam or levee
    that is subject to section 1521.062 of the Revised Code, unless the construction
    constitutes an enlargement or reconstruction of the structure as determined by
    the chief;

    (6) A dam or impoundment constructed under Chapter 1513. of the Revised Code.

    (B) Before a construction permit may be issued, three copies of the plans and
    specifications, including a detailed cost estimate, for the proposed construction,
    prepared by a registered professional engineer, together with any filing fee specified
    by rules adopted by the chief in accordance with division (I) of this section
    and the bond or other security required by section 1521.061 of the Revised Code,
    shall be filed with the chief. The detailed estimate of the cost shall include
    all costs associated with the construction of the dam or levee, including supervision
    and inspection of the construction by a registered professional engineer.

    All fees collected pursuant to this section shall be deposited in the state treasury
    to the credit of the dam safety fund, which is hereby created. Expenditures from
    the fund shall be made by the chief for the purpose of administering this section
    and sections 1521.061 and 1521.062 of the Revised Code.

    (C) The chief shall, within thirty days from the date of the receipt of the application,
    fee, and bond or other security, issue or deny a construction permit for the construction
    or may issue a construction permit conditioned upon the making of such changes
    in the plans and specifications for the construction as the chief considers advisable
    if the chief determines that the construction of the proposed dam or levee, in
    accordance with the plans and specifications filed, would endanger life, health,
    or property.

    (D) The chief may deny a construction permit after finding that a dam or levee
    built in accordance with the plans and specifications would endanger life, health,
    or property, because of improper or inadequate design, or for such other reasons
    as the chief may determine.

    In the event the chief denies a permit for the construction of the dam or levee,
    or issues a permit conditioned upon a making of changes in the plans or specifications
    for the construction, the chief shall state the reasons therefor and so notify,
    in writing, the person or governmental agency making the application for a permit.
    If the permit is denied, the chief shall return the bond or other security to
    the person or governmental agency making application for the permit.

    The decision of the chief conditioning or denying a construction permit is subject
    to appeal as provided in Chapter 119. of the Revised Code. A dam or levee built
    substantially at variance from the plans and specifications upon which a construction
    permit was issued is in violation of this section. The chief may at any time inspect
    any dam or levee, or site upon which any dam or levee is to be constructed, in
    order to determine whether it complies with this section.

    (E) A registered professional engineer shall inspect the construction for which
    the permit was issued during all phases of construction and shall furnish to the
    chief such regular reports of the engineer''s inspections as the chief may require.
    When the chief finds that construction has been fully completed in accordance
    with the terms of the permit and the plans and specifications approved by the
    chief, the chief shall approve the construction. When one year has elapsed after
    approval of the completed construction, and the chief finds that within this period
    no fact has become apparent to indicate that the construction was not performed
    in accordance with the terms of the permit and the plans and specifications approved
    by the chief, or that the construction as performed would endanger life, health,
    or property, the chief shall release the bond or other security. No bond or other
    security shall be released until one year after final approval by the chief, unless
    the dam or levee has been modified so that it will not retain water and has been
    approved as nonhazardous after determination by the chief that the dam or levee
    as modified will not endanger life, health, or property.

    (F) When inspections required by this section are not being performed, the chief
    shall notify the person or governmental agency to which the permit has been issued
    that inspections are not being performed by the registered professional engineer
    and that the chief will inspect the remainder of the construction. Thereafter,
    the chief shall inspect the construction and the cost of inspection shall be charged
    against the owner. Failure of the registered professional engineer to submit required
    inspection reports shall be deemed notice that the engineer''s inspections are
    not being performed.

    (G) The chief may order construction to cease on any dam or levee that is being
    built in violation of this section, and may prohibit the retention of water behind
    any dam or levee that has been built in violation of this section.

    (H) The chief may adopt rules in accordance with Chapter 119. of the Revised Code,
    for the design and construction of dams and levees for which a construction permit
    is required by this section or for which periodic inspection is required by section
    1521.062 of the Revised Code, for deposit and forfeiture of bonds and other securities
    required by section 1521.061 of the Revised Code, for the periodic inspection,
    operation, repair, improvement, alteration, or removal of all dams and levees,
    as specified in section 1521.062 of the Revised Code, and for establishing classes
    of dams or levees that are exempt from the requirements of this section and section
    1521.062 of the Revised Code as being of a size, purpose, or situation that does
    not present a substantial hazard to life, health, or property. The chief may,
    by rule, limit the period during which a construction permit issued under this
    section is valid. The rules may allow for the extension of the period during which
    a permit is valid upon written request, provided that the written request includes
    a revised construction cost estimate, and may require the payment of an additional
    filing fee for the requested extension. If a construction permit expires without
    an extension before construction is completed, the person or agency shall apply
    for a new permit, and shall not continue construction until the new permit is
    issued.

    (I) The chief shall adopt rules in accordance with Chapter 119. of the Revised
    Code establishing a filing fee schedule for purposes of division (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.06
- number: '1521.061'
  heading: Surety bond conditioned on satisfactory completion of project in accordance
    with terms of permit and plans and specifications
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A)(1) Except as otherwise provided in this section, the chief of the division
    of water resources shall not issue a construction permit under section 1521.06
    of the Revised Code unless the person or governmental agency applying for the
    permit executes and files a surety bond conditioned on completion of the dam or
    levee in accordance with the terms of the permit and the plans and specifications
    approved by the chief. Except as provided in division (A)(2) of this section,
    the surety bond shall equal:

    (a) $50,000 for the first $500,000 of the estimated cost of the project; plus

    (b) Twenty-five per cent of the estimated cost for the next $4,500,000 of the
    estimated cost of the project; plus

    (c) Ten per cent of the estimated cost that exceeds $5,000,000.

    (2) The chief may reduce the amount of the required surety bond to the amount
    equal to the cost estimate of construction activities necessary to render the
    dam nonhazardous if the cost estimate is provided by the applicant and approved
    by the chief.

    (B) If a permittee requests an extension of the time period during which a construction
    permit is valid in accordance with rules adopted under section 1521.06 of the
    Revised Code, the chief shall determine whether the revised construction cost
    estimate provided with the request exceeds the original construction cost estimate
    that was filed with the chief by more than twenty-five per cent. If the revised
    construction cost estimate exceeds the original construction cost estimate by
    more than twenty-five per cent, the chief may require an additional surety bond
    to be filed in an amount determined in accordance with division (A) of this section
    based on the revised construction cost estimate.

    (C) The chief shall not approve any bond until it is personally signed and acknowledged
    by both principal and surety, or as to either by the attorney in fact thereof,
    with a certified copy of the power of attorney attached. The chief shall not approve
    the bond unless there is attached a certificate of the superintendent of insurance
    that the company is authorized to transact a fidelity and surety business in this
    state.

    All bonds shall be given in a form prescribed by the chief and shall run to the
    state as obligee.

    (D)(1) The applicant may deposit, in lieu of a bond, cash in an amount equal to
    the amount of the bond or negotiable certificates of deposit issued by any bank
    organized or transacting business in this state having a par value equal to or
    greater than the amount of the bond. Such cash or securities shall be deposited
    upon the same terms as bonds. If one or more certificates of deposit are deposited
    in lieu of a bond, the chief shall require the bank that issued any such certificate
    to pledge securities of the aggregate market value equal to the amount of the
    certificate that is in excess of the amount insured by the federal deposit insurance
    corporation. The securities to be pledged shall be those designated as eligible
    under section 135.18 of the Revised Code. The securities shall be security for
    the repayment of the certificate of deposit.

    (2) Upon a deposit of cash or certificates of deposit, the chief shall hold them
    in trust for the purposes for which they have been deposited. If the applicant
    deposits cash, the cash shall be credited to the performance cash bond refunds
    fund created in section 1501.16 of the Revised Code. An applicant making a deposit
    of cash or certificates of deposit may withdraw and receive, from the chief, all
    or any portion of the cash or certificates of deposit upon depositing with the
    chief other negotiable certificates of deposit issued by any bank organized or
    transacting business in this state equal in par value to the par value of the
    cash or certificates of deposit withdrawn. An applicant may demand and receive
    from the chief all interest or other income from any such certificates as it becomes
    due. If certificates so deposited with and in the possession of the chief mature
    or are called for payment by the issuer thereof, the chief, at the request of
    the applicant who deposited them, shall convert the proceeds of the redemption
    or payment of the certificates into other negotiable certificates of deposit issued
    by any bank organized or transacting business in this state, or cash as the applicant
    designates.

    (E)(1) When the chief finds that a person or governmental agency has failed to
    comply with the conditions of the person''s or agency''s bond, the chief shall
    make a finding of that fact and declare the bond, cash, or certificates of deposit
    forfeited in the amount set by rule of the chief. The chief shall thereupon certify
    the total forfeiture to the attorney general, who shall proceed to collect that
    amount.

    (2) In lieu of total forfeiture, the surety, at its option, may cause the dam
    or levee to be completed as required by section 1521.06 of the Revised Code and
    rules of the chief, or otherwise rendered nonhazardous, or pay to the chief the
    cost thereof.

    (F)(1) All moneys collected on account of forfeitures of bonds, cash, and certificates
    of deposit under this section shall be credited to the dam safety fund created
    in section 1521.06 of the Revised Code. The chief shall make expenditures from
    the fund to complete dams and levees for which bonds have been forfeited or to
    otherwise render them nonhazardous.

    (2) Expenditures from the fund for those purposes shall be made pursuant to contracts
    entered into by the chief with persons who agree to furnish all of the materials,
    equipment, work, and labor as specified and provided in the contract.

    (G) A surety bond shall not be required for a permit for a dam or levee that is
    to be designed and constructed by an agency of the United States government, if
    the agency files with the chief written assurance of the agency''s financial responsibility
    for the structure for one year following the chief''s approval of the completed
    construction provided for under division (E) of section 1521.06 of the Revised
    Code.'
