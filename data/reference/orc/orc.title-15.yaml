- number: '1506.03'
  heading: Determining consistency of project or activity with policies in coastal
    management program
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: Except as otherwise provided in this section, no project or activity directly
    affecting the coastal area that is proposed by or subject to the approval of any
    agency of the state shall be implemented or approved until the director of natural
    resources has determined that it is consistent with the policies in the coastal
    management program document. Any agency of the state may develop and adopt a statement
    of coastal management policies, in which case a determination of consistency shall
    not be required under this section if the statement of coastal management policies
    has been approved by the director and the project or activity is in accordance
    with that statement.
