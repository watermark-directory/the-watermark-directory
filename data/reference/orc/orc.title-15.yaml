- number: '1505.07'
  heading: Permits and leases to take and remove sand, gravel, stone, and other minerals
    or substances from and under bed of Lake Erie
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: 'Subject to the limitation set forth in section 1505.08 of the Revised Code,
    the director of natural resources, with the approval of the director of environmental
    protection, the attorney general, and the governor, may issue permits and make
    leases to parties making application for permission to take and remove sand, gravel,
    stone, and other minerals or substances from and under the bed of Lake Erie, either
    upon a royalty or rental basis, as he determines to be best for the state. Permits
    shall be issued for terms of not less than one year nor more than ten years, and
    leases shall be for a term of years or until the economic extraction of the mineral
    or other substance covered thereby has been completed. Such taking and removal
    shall be within certain fixed boundaries that do not conflict with the rights
    of littoral owners. Upon request from the holder of a permit, it shall be canceled,
    but in the case of any permit or lease, any equipment or buildings owned by the
    permittee or lessee shall be held as security by the director of natural resources
    for payment of all rentals or royalties due the state at the time of cancellation.

    No person shall remove sand, gravel, stone, or other minerals or substances from
    and under the bed of Lake Erie without first obtaining a permit or lease therefor
    from the director.

    The director of natural resources may, in accordance with Chapter 119. of the
    Revised Code, adopt, amend, and rescind rules for the administration, implementation,
    and enforcement of this section.'
