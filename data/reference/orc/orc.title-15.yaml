    Division (A)(7) of this section includes brooktrout, rainbow trout, and brown
    trout.

    Division (A)(8) of this section includes largemouth black bass, smallmouth black
    bass, and spotted black bass.

    Division (A)(9) of this section includes white crappies and black crappies.

    Division (A)(10) of this section includes pumpkinseed sunfish, long-eared sunfish,
    and green sunfish.

    Division (A)(11) of this section includes channel catfish and shovel head catfish
    and yellow bullhead, brown bullhead, and black bullhead.

    The total daily bag limit throughout the state for the combined species mentioned
    in division (A) of this section shall not exceed twenty-five, and not more than
    two days'' legal catch of any one species, nor more than fifty of all species
    shall be in possession at any one time, except fish allowed to be taken by commercial
