- number: '1501.23'
  heading: Clean-up and beautification programs - volunteers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: The department of natural resources may utilize the services of volunteers
    to implement clean-up and beautification programs or any other programs that accomplish
    any of the purposes of the department. The director of natural resources shall
    approve all volunteer programs and may recruit, train, and supervise the services
    of community volunteers or volunteer groups for volunteer programs. In accordance
    with state guidelines, the director may reimburse volunteers for necessary and
    appropriate expenses, such as travel expenses, that they incur in the course of
    their volunteer service to the department. The director may designate volunteers
    in a volunteer program as state employees for the purpose of motor vehicle accident
    liability insurance under section 9.83 of the Revised Code, for the purpose of
    immunity under section 9.86 of the Revised Code, and for the purpose of indemnification
    from liability incurred in the performance of their duties under section 9.87
    of the Revised Code.
