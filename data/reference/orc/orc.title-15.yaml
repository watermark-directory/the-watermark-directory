- number: '1531.131'
  heading: Enforcing dumping prohibitions and nature preserve and trail rules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: A wildlife officer shall enforce section 3767.32 of the Revised Code and any
    other laws prohibiting the dumping of refuse into or along waters, the rules of
    the department of natural resources adopted under section 1517.02 of the Revised
    Code, and the rules of the director of natural resources adopted under Chapter
    1519. of the Revised Code and shall make arrests for violation of those laws and
    rules. The jurisdiction of a wildlife officer is concurrent with that of the peace
    officers of the county, township, or municipal corporation in which the violation
    occurs.
