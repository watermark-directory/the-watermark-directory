- number: '1533.751'
  heading: Wild boar or feral swine notification and eradication
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) Except as provided in division rules, a person, including a property
    owner, tenant, or person responsible for a property''s management, who knows or
    has reason to believe a wild boar or feral swine is present on private or public
    property shall notify the division of wildlife within twenty-four hours of the
    person so knowing or having reason to believe of the wild boar''s or feral swine''s
    presence.

    (B) Except as provided in division rules, a person or a person''s agent who encounters
    wild boar or feral swine on property owned or leased by that person may immediately
    eradicate the wild boar or feral swine without a hunting license required under
    section 1533.10 of the Revised Code if the person or agent does both of the following:

    (1) Notifies the division as soon as practicable, but not later than twenty-four
    hours after the eradication or attempted eradication of the wild boar or feral
    swine;

    (2) Follows the instructions provided by the division including the handling,
    preservation for testing, and disposal of any wild boar or feral swine carcass.'
