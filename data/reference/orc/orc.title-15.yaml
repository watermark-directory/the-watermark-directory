- number: '1517.17'
  heading: '[Former R.C. 1547.84, amended and renumbered by S.B. 156, 135th General
    Assembly, effective 10/24/2024] Wild, scenic, and recreational river advisory
    councils'
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: 'The chief of the division of natural areas and preserves, with the approval
    of the director of natural resources, shall appoint an advisory council for each
    wild, scenic, or recreational river. Each advisory council shall be composed of
    not more than ten persons who are representative of local government and local
    organizations and interests in the wild, scenic, or recreational river watershed.
    Each person shall serve without compensation. The chief or the chief''s representative
    shall serve as an ex officio member of each council.

    The initial members appointed to each council shall serve for terms of not more
    than three years, with the terms of not more than four members of any council
    ending in the same year. Thereafter, terms of office shall be for three years
    commencing on the first day of February and ending on the last day of January.

    Each council shall advise the chief on the acquisition of land and easements and
    on the lands and waters that should be protected in a wild, scenic, or recreational
    river watershed or a proposed wild, scenic, or recreational river watershed, facilities
    therein, and other aspects of establishment and administration of the wild, scenic,
    or recreational river that may affect the local interest.

    An advisory council for a wild, scenic, or recreational river that was created
    by the director under Chapter 1547. of the Revised Code prior to the effective
    date of this amendment continues to be the advisory council for the applicable
    wild, scenic, or recreational river for purposes of sections 1517.14 to 1517.19
    of the Revised Code on and after that date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1517.17
- number: '1517.18'
  heading: '[Former R.C. 1547.85, amended and renumbered by S.B. 156, 135th General
    Assembly, effective 10/24/2024] Participation in federal protection program'
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: The chief of the division of natural areas and preserves, with the approval
    of the director of natural resources, may participate in the federal program for
    the protection of certain selected rivers that are located within the boundaries
    of the state as provided in the "Wild and Scenic Rivers Act," 82 Stat. 906 (1968),
