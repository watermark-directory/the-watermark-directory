- number: '1533.112'
  heading: Annual wetlands habitat stamp needed to hunt ducks, geese or brant - wetlands
    habitat fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as provided in this section or unless otherwise provided by division
    rule, no person shall hunt ducks, geese, or brant on the lands of another without
    first obtaining an annual wetlands habitat stamp. The annual fee for the wetlands
    habitat stamp is fourteen dollars for each stamp unless otherwise provided in
    rules adopted under division (B) of section 1533.12 of the Revised Code.

    Moneys received from the stamp fee shall be paid into the state treasury to the
    credit of the wetlands habitat fund, which is hereby established. Moneys shall
    be paid from the fund on the order of the director of natural resources for the
    following purposes:

    (A) Sixty per cent for projects that the division approves for the acquisition,
    development, management, or preservation of waterfowl areas within the state;

    (B) Forty per cent for contribution by the division to an appropriate nonprofit
    organization for the acquisition, development, management, or preservation of
    lands and waters within the United States or Canada that provide or will provide
    habitat for waterfowl with migration routes that cross this state.

    No moneys derived from the issuance of wetlands habitat stamps shall be spent
    for purposes other than those specified by this section. All investment earnings
    of the fund shall be credited to the fund.

    Wetlands habitat stamps shall be furnished by and in a form prescribed by the
    chief of the division of wildlife and issued by clerks and other agents authorized
    to issue licenses and permits under section 1533.13 of the Revised Code. The record
    of stamps kept by the clerks and other agents shall be uniform throughout the
    state, in such form or manner as the director prescribes, and open at all reasonable
    hours to the inspection of any person. Unless otherwise provided by rule, each
    stamp shall remain in force until midnight of the thirty-first day of August next
    ensuing. Wetlands habitat stamps may be issued in any manner to any person on
    any date, whether or not that date is within the period in which they are effective.

    Every person to whom this section applies, while hunting ducks, geese, or brant,
    shall carry an unexpired wetlands habitat stamp that is validated by the person''s
    signature written on the stamp in ink and shall exhibit the stamp to any enforcement
    officer so requesting. No person shall fail to carry and exhibit the person''s
    stamp.

    A wetlands habitat stamp is not transferable.

    The chief shall establish a procedure to obtain subject matter to be printed on
    the wetlands habitat stamp and shall use, dispose of, or distribute the subject
    matter as the chief considers necessary. The chief also shall adopt rules necessary
    to administer this section.

    This section does not apply to persons under sixteen years of age nor to persons
    exempted from procuring a hunting license under section 1533.10 or division (A)(2)
    of section 1533.12 of the Revised Code.'
