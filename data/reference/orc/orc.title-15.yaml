  url: https://codes.ohio.gov/ohio-revised-code/section-1521.18
- number: '1521.20'
  heading: Duties of director
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) The director of natural resources shall do all of the following:

    (1) Determine the amount of dredging that is needed in each inland lake in this
    state to improve access, water quality, safety, and other applicable standards;

    (2) Develop a plan to meet the needs identified under division (A)(1) of this
    section. In doing so, the director shall make every effort to optimize the utilization
    of dredging resources to maximize the amount of sediment removal from any inland
    lake that serves a watershed in distress and that is subject to a lake facility
    authority created under Chapter 353. of the Revised Code.

    (3) Increase the amount of time and resources expended on the dredging of inland
    lakes in order to meet the needs identified under division (A)(1) of this section
    and administer the plan developed under division (A)(2) of this section.

    (B) The director may enter into contracts or agreements with other entities for
    the purposes of this section if doing so will assist in maximizing any of the
    dredging operations.'
