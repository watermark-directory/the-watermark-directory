- number: '1561.01'
  heading: Division of mineral resources management - mine and quarry definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'As used in this chapter and Chapters 1563., 1565., and 1567. of the Revised
    Code, and in other sections of the Revised Code relating to the mining law, unless
    other meaning is clearly apparent in the language and context:

    (A) "Mine" means an underground or surface excavation or development with or without
    shafts, slopes, drifts, or tunnels for the extraction of coal, gypsum, asphalt,
    rock, or other materials containing the same, or for the extraction of natural
    gas or petroleum by means that are substantially similar to the underground extraction
    of coal, gypsum, asphalt, rock, or other materials containing the same, with hoisting
    or haulage equipment and appliances for the extraction of such materials; and
    embraces the land or property of the mining plant, the surface, and underground,
    that is used for or contributes to the mining properties, or concentration or
    handling of coal, gypsum, asphalt, rock, or other materials containing the same
    or of natural gas or petroleum.

    (B) "Shaft" means a vertical opening through the strata that is or may be used
    for ventilation, drainage, or hoisting workers or material or both in connection
    with the mining of coal or other minerals or materials.

    (C) "Slope" means an incline or opening used for the same purpose as a shaft.

    (D) "Drift" means an opening through the strata on which opening grades are such
    to permit the coal or materials to be hauled by mules or mechanical traction power,
    and which opening may be used for ventilation, drainage, ingress, egress, and
    other purposes in connection with the mining of coal or other materials.

    (E) "Excavations and workings" means the excavated portions of the mine, those
    abandoned as well as the places actually being worked, underground workings, shafts,
    tunnels, and other ways in the course of being sunk or driven, slopes, tunnels,
    and other openings, and all such shafts, together with all roads, appliances,
    machinery, and material connected with the same below the surface.

    (F) "Face" means the advancing breast of any working place.

    (G) "Pillar" means a solid block of ore, coal, or other material, left unmined
    to support the overlying strata in a mine.

    (H) "Rock dusting" means to distribute or apply fine rock dust on underground
    surfaces in coal mines to prevent, check, control, or extinguish coal dust explosions.

    (I) "Rock dust barriers" means a quantity of dry rock dust placed in suitable
    containers so located in underground coal mines that the advanced wave of a coal
    dust explosion will automatically cause the rock dust to be thrown into suspension
    to extinguish or arrest the flames of an explosion.

    (J) "Operator" means any firm, corporation, or individual operating any mine or
    part thereof.

    (K) "Superintendent" means the person who has, on behalf of the operator, immediate
    supervision of one or more mines.

    (L) "Mine foreperson" means the person whom the operator or superintendent places
    in charge of the inside or outside workings of the mine and of the persons employed
    therein or thereat.

    (M) "Foreperson" means the person designated to assist the mine foreperson in
    the immediate supervision of a portion or the whole of a mine or of the persons
    employed therein.

    (N) "Fire boss" means a person whom the mine foreperson is required to employ
    under certain conditions designated in this chapter and Chapters 1563., 1565.,
    and 1567. of the Revised Code, relative to explosive gases when the same are found
    to exist in a mine.

    (O) "Shot firer" means a practical and experienced person whose duties are to
    charge, set off, and discharge the shots under the direction of the mine foreperson
    or foreperson.

    (P) "Deputy mine inspector" means a person appointed in the division of mineral
    resources management to inspect mines to see that this chapter and Chapters 1563.,
    1565., and 1567. of the Revised Code are complied with.

    (Q) "Permissible or approved" as applied in connection with explosive flame safety
    lamps, electric safety lamps, electric machinery, rescue apparatus, and other
    devices, appliances, machinery, and equipment means materials, apparatus, devices,
    appliances, machinery, and equipment officially listed by the mine safety and
    health administration in the United States department of labor and approved as
    having met its requirements for the respective specified uses, or equivalent standards
    determined and established by the chief of the division of mineral resources management.

    (R) "Gas" means an inflammable gas, chiefly methane, that when mixed in certain
    proportions with air is explosive.

    (S) "Methane" is a hydrocarbon gas (CH4) frequently encountered in coal mines.

    (T) "Explosive mixture of methane and air" is a mixture of air and methane that
    will explode in the presence of a flame or hot spark when the methane content
    is between five and fifteen per cent.

    (U) "Electric system" means all apparatus and electric circuits receiving electric
    energy or that may receive electric energy from a common source. Where the source
    of power is under control of the mine, such source of power will be considered
    as a part of the electric system. If power is obtained from a central station
    not under control of such mine, "electric system" refers only to that part of
    the system that is under control of such mine.

    (V) "Electric circuit" means all conductors, including ground returns, furnishing
    energy to or receiving energy from electric apparatus.

    (W) "Branch circuit" means all circuits connected to main circuits coming from
    generators or other main sources of supply.

    (X) "Potential" and "voltage" are synonymous and mean electrical pressure.

    (Y) "Potential of a circuit or voltage of a circuit, machine, or any piece of
    electrical apparatus" is the potential normally existing between the conductors
    of such circuit or the terminals of such machine or apparatus.

    (Z) "Difference of potential" means the difference of electrical pressure existing
    between any two points of an electrical system, or between any point of such system
    and the earth, as determined by a voltmeter.

    (AA) " Low voltage supply" means the situation where the conditions of the supply
    of electricity are such that the difference in potential between any points of
    the circuit does not exceed four hundred fifty volts.

    (BB) "High voltage supply" means the situation where the conditions of the supply
    of electricity are such that the difference of potential between any two points
    in the circuit exceeds four hundred fifty volts.

    (CC) "Trailing cable" means an electric power cable attached to a mobile machine
    or unit.

    (DD) "Grounding" means the connecting of any part of an electric system with the
    earth in such a manner that there is no difference of potential between such connected
    part and the earth.

    (EE) "Mobile machinery or portable machinery" means machinery that moves about
    under its own power, or is carried, pulled, or trammed from place to place.

    (FF) "Semipermanent machinery" means machinery that is mounted on a form of truck
    that permits it to be moved readily from place to place, but the function of which
    is to do its work in a semipermanent location.

    (GG) "Permanent machinery" means machinery that is installed on a permanent foundation
    attached to the ground.

    (HH) "Underground station" means any place underground where electrical machinery,
    transformers, or switchboards are permanently installed.

    (II) "Electrical inspector" means a person appointed by the chief to examine surface
    and underground electrical systems and equipment at mines for fire, shock, and
    explosion hazards.

    (JJ) "Well" means any borehole, whether drilled or bored, within the state, for
    the production, extraction, or injection of any gas or liquid mineral, excluding
    only potable water to be used as such, but including natural or artificial brines
    and oil field waters.

    (KK) "Prepared clay" means a clay that is plastic and is thoroughly saturated
    with fresh water to a weight and consistency great enough to settle through the
    salt water in the well in which it is to be used, except as otherwise approved
    by the chief in exceptional cases.

    (LL) "Rock sediment" means the combined cuttings and residue from drilling sedimentary
    rocks and formations, commonly known as sand pumpings.

    (MM) "Accessible travel route" means an unobstructed passageway not less than
    twenty-four inches wide with reflective materials at intervals so as to be visible
    to persons using the passageway.

    (NN) "Longwall working face" means a working face in a coal mine in which work
    extracting coal from its natural deposit in the earth is performed during a mining
    cycle by longwall mining.

    (OO) "Longwall working section" means all areas from and including the section
    transformer to and including the longwall working face.

    (PP) "Longwall mining" means a system of mining designed for full pillar extraction
    that minimizes the possibility of outburst or squeezes and allows total caving
    of the main roof in the pillar area.'
