  url: https://codes.ohio.gov/ohio-revised-code/section-1561.49
- number: '1561.50'
  heading: Charges against deputy mine inspector
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'When written charges of neglect of duty, incompetency, or malfeasance in
    office against any deputy mine inspector are made and filed with the chief of
    the division of mineral resources management, signed by not less than fifteen
    employees, or an owner, lessee, or agent of a mine, the chief shall promptly investigate
    such charges and advise in writing the complainant whose name appears first in
    the charges, the result of such investigation.

    If the mine employs less than fifteen employees, such charges shall be filed and
    signed by not less than fifty per cent of the employees.'
