- number: '1547.69'
  heading: Firearm prohibitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) As used in this section:

    (1) "Firearm," "concealed handgun license," "handgun," "valid concealed handgun
    license," and "active duty" have the same meanings as in section 2923.11 of the
    Revised Code.

    (2) "Unloaded" has the same meanings as in divisions (K)(5) and (6) of section
    2923.16 of the Revised Code, except that all references in the definition in division
    (K)(5) of that section to "vehicle" shall be construed for purposes of this section
    to be references to "vessel."

    (B) No person shall knowingly discharge a firearm while in or on a vessel.

    (C) No person shall knowingly transport or have a loaded firearm in a vessel in
    a manner that the firearm is accessible to the operator or any passenger.

    (D) No person shall knowingly transport or have a firearm in a vessel unless it
    is unloaded and is carried in one of the following ways:

    (1) In a closed package, box, or case;

    (2) In plain sight with the action opened or the weapon stripped, or, if the firearm
    is of a type on which the action will not stay open or that cannot easily be stripped,
    in plain sight.

    (E)(1) The affirmative defenses authorized in divisions (D)(1) and (2) of section
    2923.12 of the Revised Code are affirmative defenses to a charge under division
    (C) or (D) of this section that involves a firearm other than a handgun. It is
    an affirmative defense to a charge under division (C) or (D) of this section of
    transporting or having a firearm of any type, including a handgun, in a vessel
    that the actor transported or had the firearm in the vessel for any lawful purpose
    and while the vessel was on the actor''s own property, provided that this affirmative
    defense is not available unless the actor, prior to arriving at the vessel on
    the actor''s own property, did not transport or possess the firearm in the vessel
    or in a motor vehicle in a manner prohibited by this section or division (B) or
    (C) of section 2923.16 of the Revised Code while the vessel was being operated
    on a waterway that was not on the actor''s own property or while the motor vehicle
    was being operated on a street, highway, or other public or private property used
    by the public for vehicular traffic.

    (2) No person who is charged with a violation of division (C) or (D) of this section
    shall be required to obtain a license or temporary emergency license to carry
    a concealed handgun under section 2923.125 or 2923.1213 of the Revised Code as
    a condition for the dismissal of the charge.

    (F) Divisions (B), (C), and (D) of this section do not apply to the possession
    or discharge of a United States coast guard approved signaling device required
    to be carried aboard a vessel under section 1547.251 of the Revised Code when
    the signaling device is possessed or used for the purpose of giving a visual distress
    signal. No person shall knowingly transport or possess any signaling device of
    that nature in or on a vessel in a loaded condition at any time other than immediately
    prior to the discharge of the signaling device for the purpose of giving a visual
    distress signal.

    (G) No person shall operate or permit to be operated any vessel on the waters
    in this state in violation of this section.

    (H)(1) This section does not apply to any of the following:

    (a) An officer, agent, or employee of this or any other state or of the United
    States, or to a law enforcement officer, when authorized to carry or have loaded
    or accessible firearms in a vessel and acting within the scope of the officer''s,
    agent''s, or employee''s duties;

    (b) Any person who is employed in this state, who is authorized to carry or have
    loaded or accessible firearms in a vessel, and who is subject to and in compliance
    with the requirements of section 109.801 of the Revised Code, unless the appointing
    authority of the person has expressly specified that the exemption provided in
    division (H)(1)(b) of this section does not apply to the person;

    (c) Any person legally engaged in hunting.

    (2) Divisions (C) and (D) of this section do not apply to a person who transports
    or possesses a handgun in a vessel and who has been issued a concealed handgun
    license that is valid at the time of that transportation or possession or who,
    at the time of that transportation or possession, is an active duty member of
    the armed forces of the United States and is carrying a valid military identification
    card and documentation of successful completion of firearms training that meets
    or exceeds the training requirements described in division (G)(1) of section 2923.125
    of the Revised Code, unless the person knowingly is in a place on the vessel described
    in division (B) of section 2923.126 of the Revised Code.

    (I) If a law enforcement officer stops a vessel for a violation of this section
    or any other law enforcement purpose, if any person on the vessel surrenders a
    firearm to the officer, either voluntarily or pursuant to a request or demand
    of the officer, and if the officer does not charge the person with a violation
    of this section or arrest the person for any offense, the person is not otherwise
    prohibited by law from possessing the firearm, and the firearm is not contraband,
    the officer shall return the firearm to the person at the termination of the stop.

    (J) Division (L) of section 2923.16 of the Revised Code applies with respect to
    division (A)(2) of this section, except that all references in division (L) of
    section 2923.16 of the Revised Code to "vehicle," to "this chapter," or to "division
    (K)(5)(a) or (b) of this section" shall be construed for purposes of this section
    to be, respectively, references to "vessel," to "section 1547.69 of the Revised
    Code," and to divisions (K)(5)(a) and (b) of section 2923.16 of the Revised Code
    as incorporated under the definition of firearm adopted under division (A)(2)
    of this section.'
