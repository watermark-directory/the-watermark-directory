- number: '1547.38'
  heading: Prohibiting rental of improperly equipped vessel
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: No person who lets vessels for hire, or the agent or employee thereof, shall
    rent, lease, charter, or otherwise permit the use of a vessel, unless the person
    provides the vessel with the equipment required under sections 1547.25, 1547.251,
    1547.26, 1547.27, 1547.28, 1547.29, and 1547.31 of the Revised Code and rules
    regarding the equipment of vessels, and complies with the requirements of sections
    1547.24, 1547.40, 1547.53, 1547.57, and either 1547.54 or 1547.542 of the Revised
    Code and rules to implement and enforce those sections.
