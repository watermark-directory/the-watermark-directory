- number: '1506.47'
  heading: Plan for management of shore erosion along Lake Erie
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: 'The director of natural resources, in cooperation with appropriate offices
    and divisions, including the division of geological survey, may prepare a plan
    for the management of shore erosion in the state along Lake Erie, its bays, and
    associated inlets, revise the plan whenever it can be made more effective, and
    make the plan available for public inspection. In the preparation of the plan,
    the director may employ such existing plans as are available.

    The director also may establish a program to provide technical assistance on shore
    erosion control measures to municipal corporations, counties, townships, conservancy
    districts, park boards, and shoreline property owners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1506.47
- number: '1506.48'
  heading: Reappraising real property damaged or destroyed by shore erosion
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: 'Upon application of any owner of real property damaged or destroyed by shore
    erosion, the county auditor of the county in which the real property is situated
    shall cause a reappraisal to be made and shall place the property on the tax list
    at its true value in money.

    Whenever the county auditor finds that ninety per cent or more of the area of
    any littoral parcel of land appearing upon the tax duplicate has been eroded and
    lies within the natural boundaries of Lake Erie and that the remainder of the
    parcel, if any, has no taxable value, the auditor may certify that finding to
    the county board of revision. Upon consideration thereof, the board may authorize
    removal of the parcel from the tax duplicate and cancellation of all current and
    delinquent taxes, assessments, interest, and penalties charged against the parcel.'
