- number: '1514.11'
  heading: Use of moneys in mining regulation and safety fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: 'In addition to the purposes otherwise authorized by law, the chief of the
    division of mineral resources management may use money in the mining regulation
    and safety fund created under section 1513.30 of the Revised Code for the administration
    and enforcement of this chapter, for the reclamation of land affected by surface
    or in-stream mining under a permit issued under this chapter that the operator
    failed to reclaim and for which the performance bond filed by the operator is
    insufficient to complete the reclamation, and for the reclamation of land affected
    by surface or in-stream mining that was abandoned and left unreclaimed and for
    which no permit was issued or bond filed under this chapter. Also, the chief may
    use the portion of the mining regulation and safety fund that consists of money
    collected from the severance taxes levied under section 5749.02 of the Revised
    Code for mine safety and first aid training. For purposes of reclamation under
    this section, the chief shall expend money in the fund in accordance with the
    procedures and requirements established in section 1514.06 of the Revised Code
    and may enter into contracts and perform work in accordance with that section.

    Fees collected under sections 1514.02 and 1514.03 of the Revised Code and money
    collected from the severance taxes levied under section 5749.02 of the Revised
    Code shall be credited to the fund in accordance with those sections. Notwithstanding
    any section of the Revised Code relating to the distribution or crediting of fines
    for violations of the Revised Code, all fines imposed under section 1514.99 of
    the Revised Code shall be credited to the fund.'
