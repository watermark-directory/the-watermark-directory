  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.352
- number: '1533.36'
  heading: Fishing license not transferable - exception
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No fishing license issued pursuant to section 1533.32 of the Revised
    Code is transferable, and no fisher shall carry a license that was issued in the
    name of another person or that does not contain the signature of the agent issuing
    it.

    (B) Notwithstanding any other provision in the Revised Code and except as otherwise
    provided by division rule, a licensee holding a commercial fishing license issued
    pursuant to section 1533.35 of the Revised Code may transfer that license to a
    person holding a license issued under that section or to a person meeting the
    qualifications set forth in section 1533.342 of the Revised Code. Such a transfer
    is subject to all of the following conditions:

    (1) The transferred license shall not be sold, offered for sale, or bartered to
    any person.

    (2) The chief of the division of wildlife, with the approval of the director of
    natural resources, shall determine if any quota species of fish are transferable
    with the transferred license. In making the determination, the chief shall use
    biological, social, and economic data.

    (3) The transferred license is limited to the type of commercial fishing gear
    for which the original license was issued.

    (4) The transfer does not affect any other commercial fishing license privilege
    possessed by the transferor.

    (5) Application for the transfer may be made at any time and shall be made simultaneously
    by the transferor and transferee on forms provided by the division of wildlife.

    (6) When a commercial fishing license is transferred during the open commercial
    fishing season, the transferee may be issued a license only upon receipt by the
    division of payment in an amount equal to the annual fees set forth in section
    1533.35 of the Revised Code for the type of commercial fishing gear to be transferred
    plus any unpaid fees that have not been paid by the transferor at the time of
    transfer. The division shall not refund fees previously paid by a transferor.

    (7) A commercial fishing license shall be transferred only upon payment to the
    division of the royalty fees imposed by section 1533.35 of the Revised Code that
    have accrued to the date of transfer. Royalty fees that accrue with regard to
    the license on or after the date of transfer are solely the responsibility of
    the transferee.

    (8) A commercial fishing license may be transferred at any time, but it shall
    not be transferred if the license is suspended at the time transfer is sought,
    or if the licensee has been charged with a violation that could result in license
    suspension.

    (9) After determining that the transfer of a commercial fishing license is proper,
    the chief shall effect the transfer by revocation of the license of the transferor
    and simultaneous issuance of the appropriate license to the transferee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.36
- number: '1533.37'
  heading: Methods of taking fish
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Fish shall be taken only by angling unless otherwise provided by the Revised
    Code or division rule. If a fish is unintentionally taken contrary to the Revised
    Code or division rule, it immediately shall be liberated and returned to the water
    without unnecessary injury.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.37
- number: '1533.40'
  heading: Permit to buy, sell or deal in minnows, crawfish or hellgrammites
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Each person, firm, partnership, association, or corporation that buys, sells,
    or deals in minnows, crayfish, or hellgrammites or collects the listed species
    for sale shall obtain, annually, from the chief of the division of wildlife a
    permit and shall operate under such rules as the chief adopts. A permit shall
    be issued upon application and the payment of a fee of forty dollars. This permit
    expires at midnight on the thirty-first day of December. Nonresidents engaging
    in the collecting, seining, or picking of minnows, crayfish, or hellgrammites
    for bait shall have a nonresident fishing license as prescribed in section 1533.32
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.40
- number: '1533.41'
  heading: Fishing season for Lake Erie and other waters
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'For the Lake Erie fishing district, and in such other waters wherein fishing
    with nets is licensed by law, there shall be not more than two fishing seasons
    for residents and nonresidents. Except as otherwise provided by division rule,
    those seasons are the spring fishing season, beginning on the first day of May
    and including and closing on the thirty-first day of August, and the fall fishing
    season, beginning on the first day of September and including and closing on the
    thirty-first day of December.

    No person shall draw, set, place, locate, or maintain any fish net whatever except
    a minnow net in the Lake Erie fishing district, or in any other waters of this
    state wherein fishing with nets is licensed by law, between the first day of January
    and the first day of May next following, both dates inclusive, except as otherwise
    provided by division rule.

    No person shall draw, set, place, locate, use, maintain, or possess a gill net
    in this state except as provided in section 1533.61 of the Revised Code.

    In addition to any other penalty provided in the Revised Code, the license or
    permit of any person who is convicted of a violation relating to drawing, setting,
    placing, using, maintaining, or possessing a gill net is revoked by operation
    of law, and the person is permanently barred from obtaining another license or
    permit of the type revoked.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.41
- number: '1533.42'
  heading: Licensee shall keep report for each day's catch
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, every licensee taking fish
    with commercial fishing gear, except a trotline of seventy hooks or less, in any
    of the waters mentioned in this chapter and Chapter 1531. of the Revised Code
    or division rule, shall keep accurate reports for each day''s catch upon forms
    provided, and in the manner prescribed, by the chief of the division of wildlife.
    The reports shall be open for inspection by a wildlife officer at all reasonable
    hours.

    Every commercial fishing licensee shall keep an accurate record of each day''s
    catch as prescribed upon a daily report form. The report shall include at least
    the number of pounds of each kind of fish taken, the grid fished, the kind and
    amount of fishing gear lifted, the number of lifts, and any other data the biologists
    employed by the division of wildlife require in following the trend of the fisheries.
    The licensee shall report each day, under oath when requested to do so, those
    data to the chief.

    The daily catch data shall be recorded accurately in a manner and on a form prescribed
    by the chief in division rule.

    A licensee shall contact the chief or the chief''s designee when the licensee
    is in transit to the licensee''s trap nets to lift, move, pull, remove, clean,
    or maintain the trap nets for any reason and also shall contact the chief or the
    chief''s designee when returning to land with a daily catch of fish from a trap
    net indicating the licensee''s estimated time of arrival at a specific port and
    any other information required by the chief. The licensee shall contact the chief
    or the chief''s designee by using a cellular telephone, radio, or other communication
    device in a manner prescribed by the chief.

    No person shall fail to comply with any report procedure provided for in this
    section, other provisions of this section, or division rule adopted pursuant thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.42
- number: '1533.43'
  heading: License tag to be attached to each fishing device
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, the chief of the division
    of wildlife, each fishing season, shall issue a license tag for each dip net,
    carp apron, and seine, except a minnow seine, used to take fish in the Lake Erie
    fishing district and in such other waters wherein fishing with nets or seines
    is licensed by law. No person shall use such nets in fishing without attaching
    a license tag thereto, as provided in this section.

    On each seine, the tag shall be attached on either brail, and on each dip net,
    the tag shall be attached to the rim line of the net. On each carp apron, the
    tag shall be attached to either end of the line running across the top of the
    net. Each tag shall be attached in such a manner that the number thereon can be
    read easily, and the number shall not be defaced by paint or any other substance
    or in any manner. If such tags are not attached to such nets in the manner provided
    in this section, it is prima-facie evidence that they have not been lawfully licensed.
    Each net without the tag prescribed in this section constitutes a separate offense
    and is a public nuisance. Such an untagged fishing device, or parts thereof, is
    unlawful under this section and shall be seized and held for evidence or for forfeiture
    proceedings.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.43
- number: '1533.431'
  heading: Numbering and locating trap or fyke nets
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, every person using trap or
    fyke nets in taking fish in the Lake Erie fishing district, each fishing year,
    shall number each net starting with numerical one and continuing in consecutive
    order as high as the number of nets licensed by the person in that fishing year.
    No person shall use the same number more than once. The numbers shall be placed
    and kept upon the orange uphaul buoy attached to each net. The number shall be
    at least two inches high and maintained in legible condition at all times. If
    at any time an uphaul buoy is intentionally or accidentally detached from a net
    while it is in the water, the same buoy, or if the original one is lost another
    buoy with the required information placed upon it, immediately shall be attached
    to the net.

    Except as otherwise provided by division rule, every person using trap or fyke
    nets to take fish in the Lake Erie fishing district shall notify the division
    of wildlife in writing of the location, date, and numerical number of each net
    placed in or removed from such waters. The notification shall show by grid number,
    taken from the grid chart furnished by the division, the location of the net at
    the time of its removal or placement. The written notification shall be mailed
    in time for the postmark to show a date of no later than the day after the day
    in which the net is removed or placed.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant to it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.431
- number: '1533.44'
  heading: Fishing devices shall be marked with owner's or operator's name
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, no person shall use in fishing
    in the Lake Erie fishing district and other waters wherein nets are licensed by
    law any trap net, crib net, fyke net, seine, carp apron, live car, or trotline
    without having painted, branded, stamped, or burned thereon, in legible letters
    not less than one inch in height and maintained in legible condition at all times,
    the name of the owner or person operating the net or other device. On trotlines,
    the name shall be located on tally buoys at each end of each trotline. On trap
    nets, crib nets, and fyke nets, the name shall be located on the uphaul buoy of
    any net set singly or of the first and last net of any string of nets. On dip
    nets, the name shall be located on the lifting pole. On seines, the name shall
    be located on either brail. On carp aprons, the name shall be located on a board
    or metal plate attached to either end of the line running across the top of the
    net. On live cars or other holding devices, except a pond used in holding live
    commercial species of fish, the name shall be located on the top of the live car
    or other holding device.

    Each net, seine, carp apron, or string of nets not legibly marked as prescribed
    in this section constitutes a separate offense and is a public nuisance. Such
    an unmarked fishing device or parts thereof shall be seized and held for evidence
    or for forfeiture proceedings as provided in section 1531.20 of the Revised Code.

    The chief of the division of wildlife may provide by division rule the manner
    in which any device used in commercial fishing and referred to in this chapter
    or Chapter 1531. of the Revised Code shall be marked and the manner in which the
    marker shall be displayed. The chief may require that the devices be marked individually
    or in the aggregate and that the markers be displayed upon each device, at intervals,
    or in any other manner.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant thereto. No person shall remove, destroy, or tamper with
    any marker that is placed on a commercial fishing device in accordance with this
    section or any division rule adopted pursuant to it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.44
- number: '1533.45'
  heading: Places where nets may not be used
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall lay out, pull, lift, draw, set, place, locate, or maintain
    any net or seine, except a minnow seine, on any of the reefs of the Lake Erie
    fishing district, except by permission of the chief of the division of wildlife,
    or lay out, pull, lift, draw, set, place, locate, or maintain any net or seine
    in any channel or passage lying between any islands or between any island and
    the mainland in Lake Erie at a greater distance from the shore of the islands
    or mainland than one-fourth the distance across the channel or passage. No person
    shall lay out, pull, lift, draw, set, place, locate, or maintain any net or seine,
    except a minnow seine, in any other area of Lake Erie where that activity is prohibited
    by the chief in rules adopted for the purposes of this section. The chief shall
    adopt rules under section 1531.10 of the Revised Code establishing no-fishing
    zones throughout the Ohio waters of the Lake Erie fishing district.

    No net shall be set in less than three feet of water in either of the fishing
    districts of the state except seines and minnow seines. The division may establish
    in Sandusky bay, with the consent of the coast guard, any buoys or markers that
    are necessary for information to the public or as aids to navigation, but nothing
    in this section shall be construed as permitting the division to place any buoys
    or markers that will in any way interfere with the use, laying out, or pulling
    of seines in any part of Sandusky bay as permitted pursuant to this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.45
- number: '1533.46'
  heading: Splashing to drive fish into nets prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: No fish shall be driven into any net or device by "plunging," "splashing,"
    "hammering," or by any noise or other disturbances in or out of the water for
    such purpose in either of the fishing districts of the state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.46
- number: '1533.48'
  heading: Trotlines
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, two types of trotlines may
    be used in the Lake Erie fishing district. One type shall be one line of not more
    than seventy single hooks attached thereto, and the second type shall have over
    seventy single hooks attached to any number of lines. No person shall use in the
    Lake Erie fishing district a trotline other than those described in this section.

    No person shall set, maintain, bait, pull, or remove fish from a trotline having
    seventy hooks or less attached thereto which does not have all red buoys or floats.

    No person shall set, maintain, bait, or remove fish from a trotline or trotlines
    with more than seventy hooks attached thereto that do not have all white buoys
    or floats.

    No person shall set, maintain, bait, pull, or remove fish from a trotline in the
    Lake Erie fishing district that is wholly or partly made of wire line, does not
    have floats or buoys made of non-shatterable material, does not have the licensee''s
    name on the end buoys or floats, can be removed from the water by pulling from
    shore, or is set on a reef.

    No person shall set, bait, pull, or remove fish from a trotline in the Lake Erie
    fishing district during the time from one-half hour after sunset to one-half hour
    before sunrise. All fish taken from such a trotline shall be brought ashore during
    the time from one-half hour before sunrise to one-half hour after sunset.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant thereto.

    In addition to other penalties in the Revised Code, the license of any person
    who is convicted of two violations of this section that occurred within a twelve-month
    period is suspended upon the second such conviction by operation of law for a
    period of five fishing season days immediately following that conviction.

    In addition to other penalties in the Revised Code, the license of any person
    who is convicted of three or more violations of this section that occurred within
    a twelve-month period is suspended upon the third or subsequent such conviction
    by operation of law for a period of twenty fishing season days immediately following
    that conviction.

    During any period of suspension, no person shall use or engage in fishing with
    commercial gear owned, used, or controlled at the time of conviction by the licensee
    whose license has been suspended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.48
- number: '1533.49'
  heading: Size of mesh and twine used in crib nets, trap nets, and fyke nets
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The dimensions and specifications for nets provided in this section shall
    apply except as otherwise provided by division rule.

    The meshes of the back of the crib or car of all crib nets, fyke nets, or trap
    nets used in fishing in this state shall be hung on a third so as to hang squarely,
    shall be made of twine not heavier than eighteen thread, and shall measure not
    less than two and five-eighths inches stretched mesh as found in use or possession,
    measured on the bar. The meshes shall extend from the top to the bottom of the
    crib or car of the nets. No person shall place a screen or apron of any kind over
    the two and five-eighths inches mesh which in any way will tend to obstruct the
    passage of fish through the meshes.

    No person shall use a trap net, crib net, or fyke net without having a spreader
    bar in the back of the crib or car thereof and so placed that the meshes of the
    back of the crib or car will hang squarely.

    No person shall bring a crib net, fyke net, or trap net ashore with the back of
    the lifting car removed.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.49
- number: '1533.50'
  heading: Carp apron use restrictions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, no person shall use a carp
    apron except in marshes, or in connecting ditches dug especially for the purpose
    of draining or filling a marsh with water, that border the Lake Erie fishing district
    or border a stream or river flowing into that district in Lucas, Sandusky, Ottawa,
    and Erie counties.

    No person shall use a carp apron except to take carp, suckers, sheepshead, goldfish,
    bowfin, and gizzard shad. Any other species of fish caught in a carp apron shall
    be released immediately, in as good a condition as possible, while the fish are
    being removed from the apron.

    No carp apron shall be more than one hundred feet in length nor more than seventy-five
    feet in depth. No less than three and one-half inches stretched mesh shall be
    used in the apron.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant to it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.50
- number: '1533.51'
  heading: Fishing guide license
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person shall be or serve as a fishing guide in the Lake Erie fishing
    district without a license from the chief of the division of wildlife. The application
    for a license, and the license, shall be in such form as the chief prescribes.

    (B) The chief, with the approval of the wildlife council, may establish the qualifications
    for such a license and the terms, conditions, and restrictions thereof. Such qualifications
    when applicable shall include that the applicant possesses a power boat operator''s
    license from a department, agency, commission, or instrumentality of the United
    States.

    (C) The chief shall issue a fishing guide license in accordance with Chapter 4796.
    of the Revised Code to an applicant if either of the following applies:

    (1) The applicant holds a license in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a fishing guide in
    a state that does not issue that license.

    (D) Fishing guide licenses shall expire each year on the fifteenth day of April.
    Such a license shall be carried on the person or the person in command of the
    boat or person in charge when such service is being performed, and shall be exhibited
    upon demand to any wildlife officer or other law enforcement officer who has authority
    to enforce the wildlife, hunting, and fishing laws.

    (E) The license fee for a fishing guide license is fifty dollars per person.

    (F) The license fee for other services or devices, as approved by the chief, not
    mentioned in this section shall be an amount set by the chief with the approval
    of the wildlife council, not to exceed twenty-five dollars.

    (G) All license fees collected from fishing guides shall be deposited in the state
    treasury pursuant to section 1533.33 of the Revised Code.

    (H) No person shall fail to comply with any provision of this section or division
    rule adopted pursuant to it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.51
- number: '1533.511'
  heading: Fishing guide daily record
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, every fishing guide who furnishes
    services that result in the taking of fish from the Lake Erie fishing district
    shall keep an accurate daily record of all fish caught upon monthly report forms,
    provided by and in the manner prescribed by the chief of the division of wildlife.
    The catch data shall be recorded on the respective date upon the monthly report
    no later than twelve noon on the day following the day in which the fish were
    taken and shall include the number of fishermen, hours fished, locality fished,
    numbers or pounds of each kind of fish taken, and such other data as the chief
    requires. Every licensee shall submit such a completed monthly report form to
    the division of wildlife within fifteen days after the end of the calendar month
    in which the fishing guide service is provided regardless of whether the service
    is discontinued for one or more months. If the service is so discontinued, the
    licensee shall state that fact. The report form shall be open to inspection to
    any employee of the division at all reasonable hours.

    No person shall fail to comply with any report procedure provided for in this
    section, other provision of this section, or division rule adopted pursuant thereto.

    In addition to other penalties provided in the Revised Code, the license of any
    person who is convicted of two violations of this section that occurred within
    a twelve-month period is suspended upon the second such conviction by operation
    of law for a period of five fishing season days immediately following that conviction.

    In addition to other penalties provided in the Revised Code, the license of any
    person who is convicted of three or more violations of this section that occurred
    within a twelve-month period is suspended upon the third or subsequent such conviction
    by operation of law for a period of twenty fishing season days immediately following
    that conviction.

    During any period of suspension, no person shall use or engage in fishing for
    hire with gear owned, used, or controlled at the time of conviction by the licensee
    whose license has been suspended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.511
- number: '1533.52'
  heading: Method of measuring nets
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Except as provided by division rule, the size of the mesh of all nets, seines,
    and carp apron, except dip nets or minnow nets, possessed in this state or used
    in fishing in any of the waters of this state wherein fishing with nets is licensed
    by law shall be determined by measuring the mesh on the bar, by exerting not more
    than a two pound strain on four consecutive bars and measuring these four bars
    while that strain is on them from the inside edge of the knot on one end of this
    series of bars to the outside edge of the knot on the other end. One-half the
    length of the four bars so measured shall be deemed to be the length of one collapsed
    stretched mesh of that part of the net being measured. The weight to be used in
    measuring the bars of meshes of nets shall be tested, approved, and certified
    by the department of agriculture, or other governmental entity authorized to so
    certify, and authorized by the chief of the division of wildlife.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.52
- number: '1533.54'
  heading: Methods of fishing
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall draw, set, place, locate, maintain, or possess a pound net,
    crib net, trammel net, fyke net, set net, seine, bar net, or fish trap, or any
    part thereof, or throw or hand line, with more than three hooks attached thereto,
    or any other device for catching fish, except a line with not more than three
    hooks attached thereto or lure with not more than three sets of three hooks each,
    in the inland fishing district of this state, except for taking carp, mullet,
    sheepshead, and grass pike as provided in section 1533.62 of the Revised Code,
    and except as provided in section 1533.60 of the Revised Code, or as otherwise
    provided for by division rule. No person shall catch or kill a fish in that fishing
    district with what are known as bob lines, trotlines, or float lines, or by grabbing
    with the hands, or by spearing or shooting, or with any other device other than
    by angling. In the waters of the inland fishing district, except those lakes,
    harbors, and reservoirs controlled by the state, a trotline may be used with not
    more than fifty hooks, and no two hooks less than three feet apart, by the owner
    or person having the owner''s consent in that part of the stream bordering on
    or running through that owner''s lands.

    Notwithstanding this section, any resident who is licensed to fish with nets in
    the Ohio river may possess fish nets for the sole purpose of storage, repair,
    drying, and tarring in the area between United States route fifty and the Ohio
    river from the Indiana state line to Cincinnati, Ohio, and in the area between
    United States route fifty-two and the Ohio river from Cincinnati, Ohio, to Chesapeake,
    Ohio, and in the area between state route seven and the Ohio river from Chesapeake,
    Ohio, to East Liverpool, Ohio.

    Any person possessing a net in this reserve district shall have an Ohio permit
    for each net in the person''s possession. The permit shall be issued annually
    by the chief of the division of wildlife upon application of the owner of the
    net and submission of evidence by the owner of possession of a valid fishing license
    permitting the owner to fish with nets in the Ohio river, and the payment of fifty
    dollars for each net for which an application is made and a permit is issued.
    The permit shall expire at twelve midnight on the fifteenth day of March of each
    year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.54
- number: '1533.55'
  heading: Placement and maintenance of nets and other fishing devices in Lake Erie
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, no person shall draw, set,
    place, locate, or maintain any net, except a seine, within one-fourth of a mile
    of any reef in Lake Erie between the first day of May and the tenth day of May,
    both dates inclusive, and within one-fourth mile of any island or the mainland
    bordering Lake Erie between the fifteenth day of June and the fifteenth day of
    September, both dates inclusive. No seine or net of any kind except a minnow net
    shall be placed, located, pulled, or maintained in Sandusky bay from one hour
    after sunset on Saturday until one hour before sunrise on the following Monday,
    or from one hour before sunset on the day before Memorial Day, Independence Day,
    and Labor Day until one hour before sunrise on the day following Memorial Day,
    Independence Day, and Labor Day. No seine shall be set, placed, located, or maintained
    in Sandusky bay and the inland fishing district during the nighttime from one
    hour after sunset until one hour before sunrise. No person shall place, set, locate,
    pull, or maintain a seine, except a minnow seine, in the Lake Erie fishing district
    during the time from one-half hour after sunset until one-half hour before sunrise,
    except that a licensee may place, set, locate, pull, or maintain a seine other
    than a minnow seine in any waters of the Lake Erie fishing district other than
    Sandusky bay at those times, upon prior notification to the chief of the division
    of wildlife, or the chief''s designated agent, during not more than one week per
    notification. The notification shall be in writing and shall state the licensee''s
    name and address, date and time of fishing, and location of fishing grounds.

    No trap net, crib net, fyke net, or other fishing devices, except a seine which
    has been authorized to be hauled during the nighttime, shall be lifted, pulled,
    hauled, or set, nor shall fish be removed therefrom, except during the time from
    one-half hour before sunrise to one-half hour after sunset. Each net or other
    device set, maintained, placed, pulled, lifted, or hauled in violation of this
    section constitutes a separate offense.

    All fish taken from a net or other fishing device, except a seine that has been
    authorized to be hauled during the nighttime, shall be brought ashore during the
    time from one-half hour before sunrise to one-half hour after sunset.

    The chief may adopt rules under section 1531.10 of the Revised Code providing
    that no person shall lay out, pull, lift, draw, set, place, locate, or maintain
    any net or seine at any other place or places in the Lake Erie fishing district
    and in other waters wherein fishing with nets or seines is licensed by law wherein
    such a prohibition is needed for the protection, preservation, or propagation
    of fish.

    No person shall leave a commercial fishing device in a slack manner, or torn parts
    thereof, in the waters of the Lake Erie fishing district for more than five consecutive
    days. For the purposes of this section, a fishing device is slack when the anchors
    to various parts of the device are not holding it in the normal extended manner.

    No person shall set or use a net, trotline, or other fishing device, except a
    trap net or fyke net, in the Lake Erie fishing district without removing all of
    the fish therefrom at least once during a period of five consecutive days. A trap
    or fyke net shall have all of the fish removed from the crib or car at least once
    during such time.

    Any net, gill net, or other fishing device set, lifted, pulled, hauled, or used
    in violation of this chapter or Chapter 1531. of the Revised Code or division
    rule is a public nuisance and each wildlife officer, or other officer with like
    authority, may seize and safely keep such a fishing device or part thereof, and
    the illegal results therefrom, for evidence or forfeiture proceedings unless otherwise
    ordered by the chief.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant to it.

    In addition to other penalties provided in the Revised Code, the license of any
    person who is convicted of two violations of this section that occurred within
    a twelve-month period is suspended upon the second such conviction by operation
    of law for a period of five fishing season days immediately following that conviction.

    In addition to other penalties provided in the Revised Code, the license of any
    person who is convicted of three or more violations of this section that occurred
    within a twelve-month period is suspended upon the third or subsequent such conviction
    by operation of law for a period of twenty fishing season days immediately following
    that conviction.

    During any period of suspension, no person shall use or engage in fishing within
    commercial gear owned, used, or controlled at the time of conviction by the licensee
    whose license has been suspended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.55
- number: '1533.56'
  heading: Daily records of fish processing
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, every person, in any county
    adjoining Lake Erie, who for consideration, hire, or resale, scales, fillets,
    dresses, or in any manner processes fish taken with other than commercial fishing
    gear shall maintain accurate daily records. Those records shall show the name
    and address of each owner or other person from whom the processor receives fish,
    the species, the weight of each species, and the date of receipt during the day.
    The name, address, species, weight, and date shall be recorded on monthly report
    forms provided by, and in the manner prescribed by, the chief of the division
    of wildlife. The processor shall keep each batch of fish he receives from one
    owner or other person separate and shall attach to the batch or its container
    a tag or label showing the name of that owner or other person and the weight of
    the fish until the information required to be recorded on the daily records is
    recorded as prescribed by law or division rule. The processor shall mail the monthly
    report form to the division on or before the fifteenth day of the month following
    the calendar month in which the fish were received by the processor. Any wildlife
    officer or law enforcement officer who has authority to enforce the wildlife,
    hunting, and fishing laws may enter the premises at any reasonable hour and inspect
    the records and premises.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.56
- number: '1533.57'
  heading: Minnows shall be taken only for bait
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: In the inland fishing district seining for minnows is prohibited from the
    first day of May to the fourteenth day of June, both inclusive, except in streams
    in which the average width of water at the time seined does not exceed twelve
    feet for a distance of fifty yards above and below the point seined. In such district
    no persons shall take, catch, buy, or sell minnows, except for bait, and the taking,
    transporting, or shipping of minnows out of the state is prohibited. In the inland
    fishing district no minnows shall be taken or caught except with a minnow seine
    not exceeding four feet in depth and eight feet in length. In the Lake Erie fishing
    district no minnows shall be taken with a minnow seine exceeding thirty feet in
    length. No person at any time in the inland fishing district shall have in his
    possession either alive or otherwise more than one hundred minnows, except persons,
    firms, associations, or corporations buying, selling, or dealing in bait. Such
    persons, firms, associations, or corporations must be licensed as provided in
    section 1533.40 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.57
- number: '1533.58'
  heading: Prohibition against use of deleterious substances in waters of the state
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: No person shall take, catch, injure, or kill wild animals, or destroy the
    habitat thereof, in any waters of the state by means of quicklime, electricity,
    or any kind of explosive or poisonous substances, or place or use quicklime, electricity,
    or explosive or poisonous substances in any such waters, except for engineering
    purposes and with the written permission of the chief of the division of wildlife.
    Each wild animal taken, killed, or had in possession in violation of this section
    constitutes a separate offense.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.58
- number: '1533.59'
  heading: Prohibition against obstructing natural transit of fish
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: No person shall locate, place, or maintain in any of the waters over which
    the state has jurisdiction any obstruction to the natural transit of fish. The
    chief of the division of wildlife or any wildlife officer or other person may
    take up, remove, or clear away such obstructions, except milldams, and if the
    obstruction is a net or other device used for leading or catching fish, it may
    be seized and condemned, as provided in section 1531.20 of the Revised Code. This
    section does not apply to Lake Erie.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.59
- number: '1533.60'
  heading: Fish may be taken in overflows and private ponds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: Fish may be taken in any manner in the ponds or lagoons formed by the receding
    waters of any river when such ponds or lagoons no longer have any connection with
    the channels of such streams.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.60
- number: '1533.61'
  heading: Certain nets, traps and other devices exempted
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'This chapter and Chapter 1531. of the Revised Code do not apply to any of
    the following:

    (A) Nets, traps, or other devices for catching fish in the possession of the owner
    of a private artificial fish pond or privately owned lake for use only in that
    pond or lake;

    (B) Fish nets, fish traps, or other devices for catching fish, not otherwise prohibited,
    to be used in catching fish in Lake Erie, or in those bays, marshes, estuaries,
    or inlets bordering on, flowing into, or in any manner connected with Lake Erie,
    wherein fishing with those devices is permitted when the fish nets, fish traps,
    or other devices are kept within one mile of the waters of the Lake Erie fishing
    district;

    (C) Nets, gill nets, traps, or other devices in the possession of bona fide manufacturers
    or dealers when the nets, gill nets, traps, or other devices are kept in the regular
    places of business of those manufacturers or dealers, or are in course of transportation,
    or other devices in the possession of common carriers for transportation;

    (D) Gill nets in the possession of a person who holds a currently valid wild animal
    collecting permit issued to him by the chief of the division of wildlife under
    section 1533.08 of the Revised Code and who is taking fish with a gill net in
    accordance with the permit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.61
- number: '1533.62'
  heading: Locations where seine or net may be used
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The dimensions and specifications for seines provided in this section shall
    apply except as otherwise provided by division rule.

    Carp, buffalo fish, suckers, sheepshead, goldfish, bowfin, and gizzard shad may
    be taken with a seine only in the bays, marshes, estuaries, or inlets bordering
    upon, flowing into, or in any manner connected with Lake Erie, except in any of
    these waters that are in the Lake Erie fishing district where they may be taken
    with other nets as provided in this chapter and Chapter 1531. of the Revised Code.
    The meshes of one-third of each wing of such a seine, next to the brails, shall
    measure not less than five inches stretched mesh, and the meshes of the next one-third
    of each wing shall measure not less than four and one-half inches stretched mesh.
    The balance of the seine shall measure not less than four inches stretched mesh.
    All measurements shall be made on the bar as provided in section 1533.52 of the
    Revised Code. Such fish may be taken only with the seine prescribed in this section
    in the Ottawa river, no farther up than the Ann Arbor bridge; in the Maumee river,
    no farther up than the Toledo Cherry street bridge; in the Portage river and in
    Portage bay, no farther up than one-half mile west of the junction of the Portage
    and Little Portage rivers; in the Sandusky river, no farther up than an imaginary
    line running from the west point of Squaw island straight across Sandusky river
    to Teal Pond Point, thence straight south to the mainland; in Mud creek and in
    Mud creek bay, no farther up than an imaginary line running straight across Mud
    creek at a right angle with the course of the stream one-half mile west of the
    Mud Creek bridge on Port Clinton road; and in the Lacarpe creek, Little Portage
    river, Tousaint river, Turtle creek, Crane Creek, and Ward''s canal, no farther
    up than the water level of Lake Erie extends in these streams. No person shall
    set and leave stationary a seine, net, or other device that will tend to interfere
    with the free movement of fish into or out of the mouth of any stream flowing
    into or in any manner connected with Lake Erie, wherein fishing with nets is permitted
    by law, or up or down any section of such streams. In the Lake Erie fishing district,
    a smaller mesh may be used in the bag of a seine, but such a small mesh bag shall
    not exceed three hundred fifty feet in length, of which two hundred feet shall
    be made of twine with meshes not less than three inches stretched mesh, fishing
    measure, measured on the bar as provided in section 1533.52 of the Revised Code.

    No seine shall be used in fishing or had in possession in this state of a greater
    length than three hundred rods.

    This section does not permit the use of any net in any stream flowing into Lake
    Erie east of the mouth of Sandusky bay, except a minnow net as provided in section
    1533.57 of the Revised Code.

    No person shall draw, set, place, locate, or maintain any net or seine except
    a minnow net in that portion of Sandusky bay or Lake Erie lying within the area
    starting at the northeast end of the Cedar Point jetty, thence on a line drawn
    straight from the northeast end of Cedar Point jetty to Shafer''s dock on Marblehead,
    thence to the western extremity of Johnson''s island, thence to the loading dock
    of the Baltimore and Ohio Railroad, and back to the point of origin.

    No person shall draw, set, place, locate, or maintain any net except a minnow
    net in that portion of Sandusky bay lying between Cedar Point and the mainland
    and east of an imaginary line running straight across Sandusky bay from the extreme
    west point of Cedar Point to the Baltimore and Ohio elevator dock.

    No person shall fail to comply with any provisions of this section or division
    rule adopted pursuant thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.62
- number: '1533.63'
  heading: Legal length and weight of certain fish
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, no person shall take, catch,
    buy, sell, transport, or possess a whitefish less than seventeen inches in length,
    a sturgeon less than forty-eight inches in length, a catfish less than fourteen
    and one-half inches in length, a yellow perch less than eight and one-half inches
    in length, a yellow perch fillet or part fillet of not less than five and five-eighths
    inches in length, a headless yellow perch less than six and seven-eighths inches
    in length, a white bass or white bass hybrid less than eleven inches in length,
    a headless white bass or white bass hybrid less than eight and three-fourths inches
    in length, a white bass or white bass hybrid fillet or part thereof less than
    six and one-half inches in length, a bullhead less than nine inches in length,
    or a cisco less than eleven inches in length. All such fish caught or taken of
    a weight or length less than that prescribed in this section or as may be provided
    by the chief of the division of wildlife immediately shall be released with as
    little injury as possible while the net, seine, trotline, dip net, or other fishing
    device is being lifted, pulled, or hauled.

    No person shall release such undersized fish or species protected by this chapter
    and Chapter 1531. of the Revised Code or division rule into a privately owned
    pond, lake, live car, or other enclosure. No person shall bring ashore, or possess
    aboard a boat used in commercial fishing, a fish with its head or tail removed
    or in such condition that its length, weight, or species cannot be determined.

    This section does not prohibit the catching, taking, or possession of such undersized
    fish when caught or taken with hook and line, other than a commercially licensed
    trotline, but when such fish are so taken, they cannot be bought or sold. No person
    shall possess such undersized fish or a species of fish that is not permitted
    to be taken commercially aboard a boat when going to, while on, or when returning
    from nets or other devices used in commercial fishing.

    No licensed commercial fishers, or person required to have a commercial fishing
    license under section 1533.34 of the Revised Code, shall take walleye, sauger,
    whitefish, mooneye, cisco, burbot, sturgeon, and blue pike; brook, brown, rainbow,
    and lake trout; coho, chinook, and kokanne salmon; or other species protected
    by this chapter and Chapter 1531. of the Revised Code or division rule, from Lake
    Erie or its tributaries or possess such fish aboard a boat used in commercial
    fishing when going to or returning from nets or other fishing devices. All such
    fish caught or taken from a commercial fishing device immediately shall be released
    with as little injury as possible while the fishing device is being lifted, pulled,
    or hauled.

    No person shall take, buy, sell, transport, cause to be transported, or possess
    a container, quantity, boat load, catch, or haul with more than ten per cent by
    weight of undersized fish or any other species either round, filleted, or headless
    mentioned in this section or division rule. The entire quantity of fish containing
    more than ten per cent by weight of undersized fish shall be confiscated along
    with its containers. No person shall buy, sell, offer for sale, transport, give
    away, barter, or possess a fish caught or taken out of season or in any manner
    prohibited or a fish caught or taken unlawfully from waters in or outside the
    state. All fish brought into the state from another state or country shall be
    subject to the laws of this state.

    All fish taken or caught from Ohio waters shall be brought into an Ohio port for
    inspection. No person shall ship, carry, transport, or cause to be transported
    any fish taken or caught from Ohio waters directly to a point outside the state.

    Walleye or sauger originating from outside of this state may be possessed for
    sale, bought, or sold subject to division rule.

    No person shall trade, buy, sell, possess, or transport for sale walleye or sauger
    taken from waters in this state. In addition, no person shall take, possess, buy,
    sell, deliver, transport, ship, trade, or give away walleye or any part of a walleye,
    including roe, that is taken from the Ohio waters of Lake Erie or its tributaries
    and that is taken with the aid of a commercial fishing device.

    Each person who holds a permit under section 1533.301 or 1533.631 of the Revised
    Code shall keep accurate written records in the English language of all sales
    and purchases of freshwater fish. The records shall include the name and address
    of the buyer and seller, the name of fish, the amount of fish in pounds, and the
    date of sale or purchase. Records for trout, bullhead, herring, whitefish, sauger,
    walleye, yellow perch, white bass, sturgeon, and channel catfish shall be kept
    on forms provided by the chief. In lieu of keeping the written records concerning
    sales of freshwater fish as required under this section, a permit holder, upon
    applying to and receiving the approval of the chief, may keep the sales information
    required under this section on normal business records, including, but not limited
    to, receipts and invoices. All records shall be maintained for at least one year
    and shall be open to inspection to all division of wildlife officers at all reasonable
    hours. A buyer who purchases fish for the buyer''s own consumption shall not be
    required to keep records, and persons selling fish for personal consumption shall
    not be required to record the names and addresses of persons purchasing the fish.

    No person shall fail to comply with any provision of this section or division
    rule adopted pursuant thereto.

    As used in this section, "sale of fish" includes, but is not limited to, fish
    sold in the round or part thereof and fish sold as part of a meal or service,
    but does not include canned fish.'
