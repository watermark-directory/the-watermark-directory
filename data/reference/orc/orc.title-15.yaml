- number: '1505.01'
  heading: Division of geological survey
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: 'The division of geological survey:

    (A) Shall collect, study, and interpret all available information pertaining to
    the geomorphology, stratigraphy, paleontology, mineralogy, and geologic structure
    of the state and shall publish reports on the same;

    (B) Shall collect, study, and interpret all available data pertaining to the origin,
    distribution, extent, use, and valuation of mineralogical and geological raw materials
    and natural resources such as: clays, coals, building stones, gypsum, salt, limestones,
    dolomite, aggregates, sand, gravel, shales, oil, natural gas, brines, molding
    sands, and other natural substances of use and value, excluding only those pertaining
    to water usable as such for agricultural, industrial, commercial, and domestic
    purposes, but not excluding other rock fluids such as natural and artificial brines
    and oil-well fluids;

    (C) Shall make special studies and reports of resources of geological nature within
    the state that in its discretion are of current or potential economic, environmental,
    or educational significance or of significance to the health, welfare, and safety
    of the public;

    (D) May examine the technological processes by which mining, quarrying, or other
    extracting processes may be improved, or by which materials now uneconomical to
    exploit may be extracted and used commercially for the public welfare;

    (E) Shall make, store, catalog, and have available in perpetuity data, maps, diagrams,
    records, rock cores, samples, profiles, and geologic sections portraying the geological
    characteristics and topography of the state, both of general nature and of specific
    localities;

    (F) May advise, consult, or collaborate with representatives of agencies of the
    state, other state governments, or the United States government on problems or
    issues of a geological nature;

    (G) Shall advise, consult, or collaborate with representatives of agencies of
    the state, other state governments, or the United States government on problems
    or issues of a geological nature when requested by such an agency or government;

    (H) May create custom maps, custom data sets, or other custom products for government
    agencies, colleges and universities, and persons;

    (I) May provide information on the geological nature of the state to government
    agencies, colleges and universities, and persons.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1505.01
- number: '1505.02'
  heading: Chief of the division
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: 'The chief of the division of geological survey may:

    (A) Negotiate and enter into contracts with agencies of the United States government
    or any other public or private agency or individual for the performance of portions
    of the prescribed duties of the division or for the prosecution of co-operative
    projects within the assigned duties of the division;

    (B) Receive, in behalf of the state, gifts of specimens, instruments, and equipment,
    or of published or unpublished documents or manuscripts, or of money in appreciation
    of services rendered in connection with work of public nature, to enlarge or expedite
    the prescribed work of the division;

    (C) Enter, either in person or by assistants, upon lands, private or public, in
    the necessary discharge of his prescribed duties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1505.02
- number: '1505.03'
  heading: Authority of chief
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: The chief of the division of geological survey may investigate, survey, interpret,
    and report matters relating to the geological or mineralogical conditions of the
    state, or technologies pertaining to them, and may accept and retain geological
    records on a confidential basis, so that industry, commerce, education, public
    health, and recreation may be advanced.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1505.03
- number: '1505.04'
  heading: Duty to keep well logs
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: '(A) Any person, firm, government agency, or corporation who, for hire, or
    by its own forces for economic use or exploration, drills, bores, or digs within
    the state a well for the production or extraction of any gas or liquid, excluding
    only water to be used as such, but including natural or artificial brines and
    oil-filled waters, or who drills, bores, or digs within the state a well to explore
    geological formations, shall keep a careful and accurate log of the activity and
    report the same together with the results of any rock or fluid analyses or of
    any production or pressure tests in such form as is designated by the division
    of geological survey to the chief of the division of geological survey.

    (B) The division may file such well logs and establish and observe such regulations
    regarding their availability and use as will meet the legitimate requirements
    of the owner or lessee of the well. Personnel of the division may examine any
    such well during its construction to confirm the accuracy of the log and to collect
    samples of the cores, chips, fluids, gases, or sludge.

    (C) No person, firm, agency, or corporation shall fail to keep an accurate log
    or file a report as required in division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1505.04
- number: '1505.05'
  heading: Rules regarding fee schedules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1505'
    name: Division Of Geological Survey
  text: '(A) Notwithstanding any other provision of the Revised Code to the contrary,
    the chief of the division of geological survey shall adopt rules under Chapter
    119. of the Revised Code that establish a fee schedule for requests for manipulated,
    interpreted, or analyzed data from the geologic records, data, maps, rock cores,
    and samples archived by the division. The fee schedule may include the cost of
    specialized storage requirements, programming, labor, research, retrieval, data
    manipulation, and copying and mailing of records requested from the archives.
    In addition, the rules shall establish procedures for the levying and collection
    of the fees in the fee schedule.

    (B) For purposes of divisions (H) and (I) of section 1505.01 of the Revised Code,
    the chief shall adopt rules under Chapter 119. of the Revised Code that establish
    a fee schedule to be paid for creating custom maps, custom data sets, and other
    custom products and for providing geological information of the state. The fee
    schedule may include the costs of labor, research, analysis, equipment, and technology.
    In addition, the rules shall establish procedures for the levying and collection
    of the fees in the fee schedule.

    (C) The chief may reduce or waive a fee in a fee schedule established in rules
    adopted under division (A) or (B) of this section for a student that is enrolled
    in an institution of higher education.

    (D) Any revision to a fee schedule established in rules adopted under division
    (A) or (B) of this section shall be established in rules adopted under Chapter
    119. of the Revised Code. A revision to a fee schedule is subject to approval
    by the director of natural resources.

    (E) All fees collected under this section shall be credited to the geological
    mapping fund created in section 1505.09 of the Revised Code.'
