- number: '1561.25'
  heading: Rescue stations - assistant superintendents
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'The division of mineral resources management shall establish and maintain
    four rescue stations. Three of such stations shall be centrally located at such
    places, conveniently accessible to the mines and mining areas of the state so
    as to cover the largest number of mines in the shortest period of time, as the
    chief of the division of mineral resources management determines; and one such
    station may be maintained at the mine laboratory provided for in section 1561.27
    of the Revised Code. In establishing such stations the chief may use quarters
    owned by or in the possession and control of the state, if available, or may lease
    other quarters therefor. Each station shall be equipped with rescue and first
    aid apparatus and other equipment as follows:

    (A) One motor truck of sufficient capacity to carry the equipment prescribed by
    this section;

    (B) Not less than six approved breathing apparatus, complete and in good working
    order;

    (C) One recharging or refilling motor-driven pump for recharging oxygen cylinders;

    (D) Not less than ten oxygen storage cylinders;

    (E) One resuscitating outfit;

    (F) Not less than five approved flame safety lamps and one lamp testing cabinet;

    (G) Not less than two carbon monoxide detectors;

    (H) One approved methane indicating detector;

    (I) Not less than ten approved electric mine safety cap lamps complete;

    (J) Charging equipment for cap lamps;

    (K) Not less than five hundred feet of two-inch hose of standard connections and
    nozzles complete;

    (L) All the equipment necessary to provide emergency medical services, including
    that necessary for the services of a paramedic as defined in section 4765.01 of
    the Revised Code, and to establish and maintain an intravenous lifeline;

    (M) Sufficient parts, supplies, and other necessary equipment for maintenance
    and operation of the equipment prescribed in this section.

    All equipment shall be inspected and tested weekly for efficiency and operation,
    and be maintained in an effective operating condition. Reports of the condition
    shall be sent in writing to the division of mineral resources management.

    Each of the stations shall at all times be in charge of an assistant superintendent
    of rescue stations. Each assistant superintendent shall, under the supervision
    of the superintendent of rescue stations, conduct classes in first aid, mine safety,
    rescue work, and other safety educational work for the benefit of people desiring
    to take the same. They shall keep the equipment prescribed in this section in
    good condition, and see that this equipment reaches any mine whenever it is needed
    as expeditiously as possible. They shall help to perform whatever duties are necessary.

    All such stations shall be under the direction of the superintendent.'
