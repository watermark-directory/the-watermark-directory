- number: '1547.02'
  heading: Applicability of chapter to vessels operating on the waters in this state
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'Unless otherwise provided, this chapter applies to all vessels operating
    on the waters in this state. Nothing in this chapter shall be construed in contravention
    of any valid federal act or regulation, but is in addition to the act or regulation
    where not inconsistent.

    The state reserves to itself the exclusive right to regulate the minimum equipment
    requirements of watercraft and vessels operated on the waters in this state.'
