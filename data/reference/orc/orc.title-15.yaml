- number: '1561.34'
  heading: Deputy mine inspector's emergency report
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: If a deputy mine inspector finds danger of an imminent and extraordinary character
    in any mine, the deputy mine inspector shall immediately take steps to safeguard
    the employees, notify the superintendent, the mine foreperson, or any other person
    in charge of employees at once of the condition the deputy mine inspector has
    found, and require them to exercise their authority to remedy the situation; in
    all such instances, the deputy mine inspector shall stop all workings in the particular
    section in which the deputy mine inspector found the dangerous condition, or the
    entire mine if necessary, until the condition found is remedied. Before leaving
    the mine property, the deputy mine inspector shall make a report in writing setting
    forth clearly the dangerous conditions of imminent and extraordinary character
    found, the steps taken by the deputy mine inspector to safeguard the employees,
    and confirming the orders or instructions given to the superintendent, mine foreperson,
    or other person in charge of employees. The deputy mine inspector shall make this
    report in quadruplicate or quintuplicate, sending the original at once to the
    chief of the division of mineral resources management, giving a copy to the mine
    superintendent, posting one on the bulletin board of the mine, and retaining a
    copy for the deputy mine inspector's files. Where the miners have a mine safety
    committee, the deputy mine inspector shall post one additional copy on the mine
    bulletin board for the use and possession of the committee. This report shall
    be known as the deputy mine inspector's emergency report.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.34
- number: '1561.35'
  heading: Written notice of danger or hazardous condition
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'If the deputy mine inspector finds that any matter, thing, or practice connected
    with any mine and not prohibited specifically by law is dangerous or hazardous,
    or that from a rigid enforcement of this chapter and Chapters 1563., 1565., and
    1567. and applicable provisions of Chapter 1509. of the Revised Code, the matter,
    thing, or practice would become dangerous and hazardous so as to tend to the bodily
    injury of any person, the deputy mine inspector forthwith shall give notice in
    writing to the owner, lessee, or agent of the mine of the particulars in which
    the deputy mine inspector considers the mine or any matter, thing, or practice
    connected therewith is dangerous or hazardous and recommend changes that the conditions
    require, and forthwith shall mail a copy of the report and the deputy mine inspector''s
    recommendations to the chief of the division of mineral resources management.
    Upon receipt of the report and recommendations, the chief forthwith shall make
    a finding thereon and mail a copy to the owner, operator, lessee, or agent of
    the mine, and to the deputy mine inspector; a copy of the finding of the chief
    shall be posted upon the bulletin board of the mine. Where the miners have a mine
    safety committee, one additional copy shall be posted on the bulletin board for
    the use and possession of the committee.

    The owner, operator, lessee, or agent of the mine, or the authorized representative
    of the workers of the mine, within ten days may appeal to the reclamation commission
    for a review and redetermination of the finding of the chief in the matter in
    accordance with section 1513.13 of the Revised Code, notwithstanding division
    (A)(1) of that section, which provides for appeals within thirty days. A copy
    of the decision of the commission shall be mailed as required by this section
    for the mailing of the finding by the chief on the deputy mine inspector''s report.'
  history: null
