- number: '1571.06'
  heading: Accuracy or correctness of maps
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) Distances between boundaries of gas storage reservoirs, reservoir protective
    areas, coal mines, coal mine protective areas, and wells, as shown on the most
    recent maps of storage reservoirs and of coal mines filed with the division of
    oil and gas resources management or the division of mineral resources management
    as required by this chapter and sections 1563.03 to 1563.05 of the Revised Code,
    may be accepted and relied upon as being accurate and correct, by operators of
    coal mines and operators of reservoirs. Data, statements, and reports filed with
    either division as required by this chapter and sections 1563.03 to 1563.05 of
    the Revised Code may be likewise accepted and relied upon. However, the gas storage
    well inspector or any reservoir operator or coal mine operator, or any other person
    having a direct interest in the matter, may at any time question the accuracy
    or correctness of any map, data, statement, or report so filed, with either division
    by notifying both divisions thereof in writing. Such notice shall state the reasons
    why the question is raised. When any such notice is so filed, the gas storage
    well inspector shall proceed promptly to hold a conference on the question thus
    raised, as provided in section 1571.10 of the Revised Code.

    (B) If, in any proceeding under this chapter, the accuracy or correctness of any
    map, data, statement, or report, filed by any person pursuant to the requirements
    of this chapter is in question, the person so filing the same shall have the burden
    of proving the accuracy or correctness thereof.

    (C) The operator of a gas storage reservoir shall, at all reasonable times, be
    permitted to inspect the premises and facilities of any coal mine any part of
    the boundary of which is within any part of the boundary of such gas storage reservoir
    or within its protective area, and the operator of a coal mine shall, at all reasonable
    times, be permitted to inspect the premises and facilities of any gas storage
    reservoir any part of the boundary of which or any part of the protective area
    of which is within the boundary of such coal mine. In the event that either such
    reservoir operator or such coal mine operator denies permission to make any such
    inspection, the chief of the division of oil and gas resources management on the
    chief''s own motion, or on an application by the operator desiring to make such
    inspection, upon a hearing thereon if requested by either operator, after reasonable
    notice of such hearing, may make an order providing for such inspection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1571.06
- number: '1571.07'
  heading: Prohibited acts - exceptions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) Irrespective of any other provision in this chapter, the injection of
    gas into or storage of gas in a mineable coal seam, whether or not such coal seam
    is being mined, and the injection of gas into or storage of gas in a coal seam
    which has been mined, and the appropriation of any coal seam or any interest therein,
    is prohibited.

    (B) Nothing in this chapter shall be construed to prohibit any necessary use of
    the surface of the earth above a coal mine, or the drilling of a well through
    a coal mine for use in storing gas in a gas storage reservoir or in producing
    natural gas or crude oil.

    (C) Nothing in this chapter shall apply to the extraction of native natural gas,
    or the use of natural gas for recycling purposes in connection with the recovery
    of crude oil, or the primary or secondary recovery of crude oil, or shall prohibit
    the mining of coal.'
