- number: '1506.04'
  heading: Compliance with national flood insurance program or equivalent
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: '(A) No later than September 15, 1989, each county or municipal corporation
    within whose jurisdiction is a coastal flood hazard area shall either participate
    in and remain in compliance with the national flood insurance program or shall
    adopt resolutions or ordinances governing the coastal flood hazard area that meet
    or exceed the standards required for participation in the regular phase of the
    national flood insurance program.

    (B) If the director of natural resources determines at any time that a county
    or municipal corporation that is participating in the national flood insurance
    program or has adopted resolutions or ordinances under division (A) of this section
    is not in compliance with that program or those resolutions or ordinances, as
    applicable, the director shall so notify the legislative authority of the county
    or municipal corporation and shall also notify the legislative authority that
    it may respond to the determination in accordance with the procedure for doing
    so established by rules adopted under section 1506.02 of the Revised Code. If
    after considering the legislative authority''s response the director determines
    that the county or municipal corporation is still not in compliance with the national
    flood insurance program or resolutions or ordinances adopted under division (A)
    of this section, as applicable, the director may request the attorney general
    in writing to, and the attorney general shall, bring an action for appropriate
    relief in a court of competent jurisdiction against the county or municipal corporation.

    (C) The attorney general, upon the written request of the director, shall bring
    an action for appropriate relief in a court of competent jurisdiction against
    any development that meets both of the following criteria:

    (1) Is located in a county or municipal corporation that is not in compliance
    with division (A) of this section;

    (2) Is not in compliance with the standards of the national flood insurance program.

    (D) This section does not apply to any permits or approvals issued by any state
    agency prior to the effective date of rules adopted under section 1506.02 of the
    Revised Code for the implementation of this section.

    (E) As used in this section, "national flood insurance program" and "development"
    have the same meanings as in section 1521.01 of the Revised Code.'
