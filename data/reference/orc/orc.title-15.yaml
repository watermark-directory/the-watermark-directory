- number: '1533.20'
  heading: Field trial areas - permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The division of wildlife may acquire by gift, lease, or purchase lands to
    be used and developed for the purpose of conducting field trials for dogs. The
    division shall set aside field trial areas on lands owned or controlled by the
    state in each of the conservation districts, when such lands are available for
    that purpose, whereon field trials for dogs may be conducted. The areas also may
    be used by the division for the propagation of wildlife and for wildlife experimental
    purposes, provided that the experiments do not interfere with the use thereof
    for field trials. Clubs and individuals may be granted permission to stock such
    areas with wild game and provide food and shelter for that game.

    Any organization or person desiring to hold a field trial on any of such areas
    shall file a request in writing with the division. The division shall grant a
    written permit when it is satisfied that the field trial to be conducted is a
    bona fide one.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.20
- number: '1533.21'
  heading: Club lands may be designated as field trial area
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: A club or an association organized to conduct field trials which has acquired
    through purchase, lease, or other agreement with owners or lessees an area of
    land for a period of not less than twelve months may apply to the division of
    wildlife to have such area designated as a field trial area for the period of
    the control of such land by such club or organization or any extended period thereof.
    The division shall satisfy itself that said area is available to such club or
    organization for field trials during the period represented. If satisfied that
    the representation has been correctly presented, it shall certify such area as
    a field trial area for the period contained in the application or any extension
    thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.21
- number: '1533.22'
  heading: Signs for field trial areas - hunting or trapping within areas
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The division of wildlife shall provide suitable signs to be placed around
    the boundaries of field trial areas for public notice.

    Persons following dogs on field trial areas at any time are not considered to
    be pursuing wild game with the intent of taking or reducing to possession. The
    division may grant permission to trap or otherwise destroy vermin on any field
    trial area only when the vermin is detrimental to the kind of game for which the
    field trial area has been established.

    No person shall hunt or trap within a field trial area except in the manner provided
    by the division for state owned or leased field trial areas.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.22
- number: '1533.221'
  heading: Restricting filed trials for nonresidents
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: A nonresident of this state shall not exercise, train, or work a dog in this
    state at any time when residents of this state are prohibited from exercising,
    training, or working a dog in the state in which the nonresident resides, except
    as otherwise provided by division rule. Nonresidents may participate in bona fide
    field trials at any time after proper entry.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.221
- number: '1533.23'
  heading: Fur dealer's permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall deal in or buy green or dried furs, skins, or parts thereof
    taken from fur-bearing animals of the state, except domesticated rabbits, without
    a fur dealer''s permit. Every applicant for a fur dealer''s permit shall make
    and subscribe a statement setting forth the applicant''s name, place of residence,
    and whom the applicant represents. Every applicant for a dealer''s permit who
    is a nonresident of the state, or who is a resident of the state and is an agent
    or representative of a nonresident person, firm, or corporation, shall pay an
    annual fee of two hundred dollars to the chief of the division of wildlife issuing
    such permit, and every applicant for a dealer''s permit who is a resident of the
    state shall pay an annual fee of seventy-five dollars to the chief issuing such
    permit. Every fur dealer shall operate under such additional rules as are provided
    by the chief. The chief shall pay the fees into the state treasury to the credit
    of the fund created by section 1533.15 of the Revised Code for the use of the
    division of wildlife in the purchase, preservation, protection, and stocking of
    fur-bearing animals and for the necessary clerical help and forms required by
    this section and section 1533.24 of the Revised Code.

    All permits shall be procured from the chief and the application, license, and
    other blanks required by this section and section 1533.24 of the Revised Code
    shall be in such form as the chief prescribes. Each such permit shall expire on
    the thirtieth day of April next after its issuance.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.23
- number: '1533.24'
  heading: Fur dealer's daily record - forms - carrier restrictions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Except as otherwise provided by division rule, every fur dealer shall keep
    a daily record on forms provided by the division of wildlife of all purchases
    and sales of furs, skins, or parts thereof of fur-bearing animals made during
    the previous year. The daily record shall include any pertinent information that
    the division may require. The information may include, but not be limited to,
    the number and kinds bought and sold, the dates of each purchase and sale, identification
    of all purchases from another fur dealer, and the state and counties in which
    the furs, skins, or parts thereof were taken. Every fur dealer shall submit completed
    forms to the division of all transactions made during the preceding season by
    the fifteenth day of May each year. All records required to be maintained by a
    fur dealer shall be open at all reasonable times to inspection by duly authorized
    division personnel who may inspect the furs, skins, or parts thereof on hand at
    any time and check and verify the records and reports required to be kept.

    No common carrier shall knowingly ship or transport or receive for transportation
    or shipment any green or dried furs, skins, or parts thereof of fur-bearing animals
    unless there is plainly written thereon the name of the shipper and the number
    of the shipper''s hunting license or fur dealer''s permit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.24
- number: '1533.28'
  heading: Wildlife and fish restoration projects in cooperation with United States
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The state hereby assents to the provisions of the act of congress entitled
    "An act to provide that the United States shall aid the states in wildlife restoration
    projects, and for other purposes," approved September 2, 1937, Public Law Number
    415, as amended; and to the provisions of the act of congress entitled "an act
    to provide that the United States shall aid the states in fish restoration and
    management projects and for other purposes," approved August 9, 1950, Public Law
    Number 681, as amended.

    The division of wildlife shall perform such acts as are necessary to the conduct
    and establishment of cooperative wildlife and fish restoration projects, as defined
    in said acts of congress, in compliance with said acts and with rules of the secretary
    of interior thereunder. No funds accruing to the state from license fees paid
    by hunters, trappers, or fishermen shall be diverted for any other purpose than
    the administration of the division of wildlife pursuant to Chapters 1531. and
    1533. of the Revised Code.

    The chief of the division of wildlife with the approval of the director may enter
    into agreements and participate in federal aid fish and wildlife programs, including,
    but not limited to:

    (A) "Federal Aid to Wildlife Restoration Act," Public Law Number 75-415 as amended;

    (B) "Fish Restoration and Management Act," Public Law Number 81-681 as amended;

    (C) "Fish and Wildlife Conservation Act," Public Law Number 96-366;

    (D) "Endangered Species Act (wild animals)," Public Law Number 93-205 as amended;

    (E) "Anadromous Fish Conservation Act," Public Law Number 89-304 as amended;

    (F) "Commercial Fisheries Research and Development Act," Public Law Number 88-309
    as amended.

    The chief of the division, with the approval of the director, may, as he deems
    appropriate, further enter into agreements for the purpose of obtaining financial
    assistance to benefit fish and wild animals in Ohio.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.28
- number: '1533.29'
  heading: Prima-facie evidence of guilt
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: The finding of a gun, net, seine, boat, trap, or other device that is set,
    maintained, used, or had in possession in violation of the Revised Code or division
    rule is prima-facie evidence of the guilt of the person setting, maintaining,
    using, or possessing that property. The finding of a wild animal, or part thereof,
    unlawfully in the possession of any person is prima-facie evidence of the guilt
    of that person.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.29
- number: '1533.30'
  heading: Transportation of fish, game birds, and wild quadrupeds
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall receive for transportation, transport, or cause to be transported
    any box, package, or other receptacle containing fish, game birds, or wild quadrupeds,
    or any part thereof, unless such box, package, or receptacle bears a label showing
    the number and kind of such fish, game birds, or wild quadrupeds, or parts thereof,
    the name of the consignor and consignee, the initial point of billing, and the
    destination. Boxes, packages, or receptacles containing shipments of commercial
    fish may be marked by weight instead of the number of fish contained therein.

    No person shall receive for transportation, transport, cause to be transported,
    or have in his possession with intent to transport or secure the transportation
    of, beyond the limits of this state, any game bird or game quadruped mentioned
    in Chapters 1531. and 1533. of the Revised Code, which has been killed in this
    state.

    The reception and acceptance by any person within this state of such game bird
    or game quadruped for shipment to a point without the state is prima-facie evidence
    that it was killed within the state for conveyance beyond the limits thereof.
    If such game bird or game quadruped is legally taken by a nonresident, it may
    be transported by him from a point within the state to a point without the state,
    if it is accompanied by the actual owner thereof, and the owner has procured a
    nonresident hunting and trapping license. If such game bird or game quadruped
    is taken by a resident of this state in any other state or country, it may be
    transported by him from a point without the state to a point within the state,
    if the owner has an affidavit or other satisfactory evidence together with a nonresident
    license from the state or country in which such game bird or game quadruped was
    taken as proof of legal ownership.

    This section does not apply to a common carrier into whose possession a game bird
    or game quadruped has come for transportation in the regular course of business,
    while such game bird or game quadruped is in transit through this state from a
    point without this state when the killing thereof is lawful to a point without
    this state.

    Each game bird or game quadruped killed, taken, had in possession received for
    transportation, or transported contrary to this section constitutes a separate
    offense.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.30
- number: '1533.301'
  heading: Annual permit for transporting fish - suspension or revocation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Any person may apply for a permit to transport fish that are for sale, sold,
    or purchased. The chief of the division of wildlife shall issue an annual permit
    granting the applicant the privilege to transport such fish, upon filing of an
    application on a form prescribed by the chief and payment of a fee of sixty-five
    dollars. No person shall transport any fish or part thereof that is for sale,
    sold, or purchased, whether acquired in or outside this state, unless the consignor
    has a permit for the calendar year in which the fish is transported, except that
    no such permit is required for any of the following:

    (A) Fish transported from a point outside this state to another point outside
    this state if the fish are not unloaded in this state. A fish is not to be considered
    unloaded for purposes of this section if it remains under the control of a common
    carrier.

    (B) Fish being transported by a person holding a valid license under section 1533.34
    of the Revised Code from the place of taking to the person''s usual place of processing
    or temporary storage as designated by the person in the application for the license
    under that section;

    (C) Fish being transported from a premises designated in a valid permit issued
    under section 1533.631 of the Revised Code to a premises where fish are to be
    sold at retail, sold for immediate consumption, or consumed if inspection of the
    designated premises as required by that section has not been denied during the
    preceding thirty days;

    (D) Any quantity of fish the total weight of which does not exceed five hundred
    pounds in one vehicle;

    (E) Minnows for which a permit is required under section 1533.40 of the Revised
    Code.

    If a fish for which a permit is required under this section is transported in
    this state from a consignor who does not have a valid permit at the time of transportation,
    or if such a fish is transported in this state from a consignor who has a valid
    permit at the time of transportation, but the fish is part of the contents of
    a box, package, or receptacle that was or could be the basis for conviction of
    a violation of this chapter or a division rule, the fish may be seized by any
    law enforcement officer authorized by section 1531.13 of the Revised Code to enforce
    laws and division rules, and the fish shall escheat to the state unless a court
    of this state makes a specific finding that the consignor at the time of seizure
    had a valid permit under this section and that the fish are lawful under the requirements
    of this chapter or a division rule relating thereto.

    A fish for which a permit is required under this section may be transported only
    if each box, package, or other receptacle bears a label showing the total weight
    in pounds, the species of the fish, the name of the consignor and consignee, the
    initial point of billing, the destination, and a statement that each species of
    fish by weight in the box, package, or other receptacle that are undersized under
    section 1533.63 of the Revised Code or division rule is ten per cent or less or
    is in excess of ten per cent, whichever the fact may be. If fish are not boxed
    or packaged, each compartment of a tank or other receptacle shall be considered
    a separate receptacle, but in lieu of a label on the compartment or tank a written
    statement containing the same information required to be contained on a label,
    and clearly identifying the tank or receptacle concerned, may be carried in the
    vehicle. Species may be designated in any manner, but the label also shall bear
    either the common name indicated in section 1533.63 of the Revised Code or the
    scientific name contained in section 1531.01 of the Revised Code. The consignor
    shall ascertain that labels are attached or statements carried as required herein
    and that the facts stated thereon are true.

    The permit required by this section may be suspended by the chief for a period
    not to exceed five days upon conviction of the permittee of a violation of this
    chapter or Chapter 1531. of the Revised Code or a division rule if the permittee
    has been convicted of another such violation during the preceding twelve-month
    period. If the permittee has had two or more such convictions during the twelve-month
    period preceding such a conviction, the permittee''s permit may be suspended as
    provided herein for a period not to exceed twenty days. A permit is invalid during
    the period of suspension, but in no case is a permit invalid until fifteen days
    after mailing by certified mail a notice of the rule of suspension by the chief.

    The chief may not suspend more than one permit of the same permittee, or suspend
    a permit of the same permittee more than once, for convictions resulting from
    violations that occur in a load in one vehicle.

    A driver or other person in charge of a vehicle transporting fish that are for
    sale, sold, or purchased, upon demand by any law enforcement officer authorized
    by section 1531.13 of the Revised Code to enforce laws and division rules, shall
    stop and open the vehicle and allow inspection of the load, and any box, package,
    or receptacle, and the contents thereof, for the purpose of determining whether
    this chapter or a division rule is being violated.

    The word "fish" in the English language, at least eight inches high and maintained
    in a clear, conspicuous, and legible condition at all times, shall appear on both
    sides of the vehicle body of all vehicles transporting fresh water fish in this
    state when the fish are for sale or sold, except those fish exempt from a transportation
    permit in divisions (A), (B), and (E) of this section.

    The chief may refuse to issue a permit to any person whose purpose in applying
    for the permit is to allow it to be used by another person to whom a permit has
    been refused or revoked. The chief also may revoke a person''s permit when it
    is used for that purpose.

    No civil action may be brought in any court in the state for the value or agreed
    price of fish that have escheated to the state under this section.

    No person shall fail to comply with any provision of this section or a division
    rule adopted pursuant thereto.

    In addition to other penalties provided in the Revised Code, the permit of any
    person who is convicted of two violations of this section that occurred within
    a twelve-month period is suspended upon the second such conviction by operation
    of law for a period of five fishing season days immediately following that conviction.

    In addition to other penalties provided in the Revised Code, the permit of any
    person who is convicted of three or more violations of this section that occurred
    within a twelve-month period is suspended upon the third or subsequent conviction
    by operation of law for a period of twenty fishing season days immediately following
    that conviction.

    During any period of suspension, no person shall use or engage in hauling or transporting
    fish with equipment owned, used, or controlled at the time of conviction by the
    permittee whose permit has been suspended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.301
- number: '1533.31'
  heading: Shipment of live wild animals
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The chief of the division of wildlife may permit or forbid or otherwise regulate
    the receiving of any species of live wild animals for delivery within the state
    and the shipping of such wild animals from any point in the state to any point
    within or without the state. Upon the establishment of such regulations, the chief
    of the division of wildlife or any person designated by him may seize, impound,
    destroy, or otherwise dispose of such wild animals when received, shipped, or
    transported in violation of such regulations.

    This section does not authorize action to prevent, delay, or impede the transporting
    of such wild animals in interstate commerce by common carrier, providing neither
    the point of sending nor the point of receiving is within the state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.31
- number: '1533.32'
  heading: Fishing licenses generally
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) Except as provided in this section or division (A)(2) or (C) of section
    1533.12 of the Revised Code or as exempted at the discretion of the chief of the
    division of wildlife, no person, including nonresidents, shall take or catch any
    fish by angling in any of the waters in the state or engage in fishing in those
    waters without a license. No person shall take or catch frogs or turtles without
    a valid fishing license, except as provided in this section. Persons fishing in
    privately owned ponds, lakes, or reservoirs to or from which fish are not accustomed
    to migrate are exempt from the license requirements set forth in this section.
    Persons fishing in privately owned ponds, lakes, or reservoirs that are open to
    public fishing through an agreement or lease with the division of wildlife shall
    comply with the license requirements set forth in this section.

    (B)(1) Except as otherwise provided in rules adopted under division (B) of section
    1533.12 of the Revised Code, each applicant for a fishing license shall pay a
    fee for each license in accordance with the following schedule:


    Annual fishing license - resident$24.00Annual fishing license - nonresident that
    is not a resident of a reciprocal state$74.00Annual fishing license - nonresident
    that is a resident of a reciprocal state$24.00Annual senior fishing license -
    resident$9.00Three-day tourist fishing license - nonresident that is not a resident
    of a reciprocal state$50.00One-day fishing license - resident$13.00One-day fishing
    license - nonresident that is not a resident of a reciprocal state$26.00One-day
    fishing license - nonresident that is a resident of a reciprocal state$13.00

    (2) As used in division (B)(1) of this section:

    (a) "Reciprocal state" means a state that is a party to an agreement under section
    1533.91 of the Revised Code.

    (b) "Senior" means an applicant who is sixty-five years of age or older at the
    time of application for a license.

    (3) Any person under the age of sixteen years may take or catch frogs and turtles
    and take or catch fish by angling without a license.

    (C)(1) The chief of the division of wildlife may issue a tourist''s license expiring
    three days from the effective date of the license to a resident of a state that
    is not a party to an agreement under section 1533.91 of the Revised Code.

    (2) The chief shall adopt rules under section 1531.10 of the Revised Code providing
    for the issuance of a one-day fishing license to a resident of this state or of
    any other state. A one-day fishing license shall allow the holder to take or catch
    fish by angling in the waters in the state, engage in fishing in those waters,
    or take or catch frogs or turtles in those waters for one day without obtaining
    an annual license or a tourist''s license under this section. At the request of
    a holder of a one-day fishing license who wishes to obtain an annual license,
    a clerk or agent authorized to issue licenses under section 1533.13 of the Revised
    Code, not later than the last day on which the one-day license would be valid
    if it were an annual license, shall credit the amount of the fee paid for the
    one-day license toward the fee charged for the annual license if so authorized
    by the chief. The clerk or agent shall issue the annual license upon presentation
    of the one-day license and payment of a fee in an amount equal to the difference
    between the fee for the annual license and the fee for the one-day license.

    (3) Unless otherwise provided by division rule, each annual license shall begin
    on the date of issuance and expire a year from the date of issuance.

    (4) Unless otherwise provided by division rule, each multi-year license issued
    in accordance with section 1533.321 of the Revised Code shall begin on the date
    of issuance and expire three years, five years, or ten years from the date of
    issuance, as applicable.

    (5) No person shall alter a fishing license or possess a fishing license that
    has been altered.

    (6) No person shall procure or attempt to procure a fishing license by fraud,
    deceit, misrepresentation, or any false statement.

    (7) A resident of this state who owns land over, through, upon, or along which
    any water flows or stands, except where the land is in or borders on state parks
    or state-owned lakes, together with the members of the immediate families of such
    owners, may take frogs and turtles and may take or catch fish of the kind permitted
    to be taken or caught therefrom without procuring a license provided for in this
    section. This exemption extends to tenants actually residing upon such lands and
    to the members of the immediate families of the tenants. A resident of any other
    state who owns land in this state over, through, upon, or along which any water
    flows or stands, except where the land is in or borders on state parks or state-owned
    lakes, and the spouse and children living with the owner, may take frogs and turtles
    and may take or catch fish of the kind permitted to be taken or caught from that
    water without obtaining a license under this section, provided that the state
    of residence of the owner allows residents of this state owning real property
    in that state, and the spouse and children living with such a property owner,
    to take frogs and turtles and take or catch fish without a license. If the owner
    of such land in this state is a limited liability company or a limited liability
    partnership that consists of three or fewer individual members or partners, as
    applicable, an individual member or partner who is a resident of this state and
    the member''s or partner''s children of any age may take frogs and turtles and
    may take or catch fish of the kind permitted to be taken or caught therefrom without
    procuring a license provided for in this section. In addition, if the owner of
    such land in this state is a trust that has a total of three or fewer trustees
    and beneficiaries, an individual who is a trustee or beneficiary and who is a
    resident of this state and the individual''s children of any age may take frogs
    and turtles and may take or catch fish of the kind permitted to be taken or caught
    therefrom without procuring a license provided for in this section. Residents
    of state or county institutions, charitable institutions, and military homes in
    this state may take frogs and turtles without procuring the required license,
    provided that a member of the institution or home has an identification card,
    which shall be carried on that person when fishing.

    (8) Every fisher required to be licensed, while fishing or taking or attempting
    to take frogs or turtles, shall carry the license and exhibit it to any person.
    Failure to so carry and exhibit the license constitutes an offense under this
    section.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
