- number: '1531.133'
  heading: Wildlife violators compact for joint enforcement operations
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: '(A)(1) The chief of the division of wildlife, with the approval of the director
    of natural resources, may enter into a memorandum of understanding, agreement,
    or mutual aid compact with the head of any entity of another state, federal entity,
    or foreign entity that employs or appoints a law enforcement officer who has substantially
    the same duties as a peace officer, as "peace officer" is defined in section 2935.01
    of the Revised Code, to enable wildlife officers and the specified law enforcement
    officers to assist each other in the provision of law enforcement services within
    the jurisdictions that are subject to the memorandum of understanding, agreement,
    or mutual aid compact.

    (2) Employees of the division of wildlife who are serving under the terms of a
    memorandum of understanding, agreement, or mutual aid compact entered into under
    division (A)(1) of this section shall be considered as performing services within
    their regular employment for purposes of compensation, pension or indemnity fund
    rights, workers'' compensation, and other rights or benefits to which they may
    be entitled as incidents of their regular employment.

    (3) Employees of the division of wildlife who are serving under the terms of a
    memorandum of understanding, agreement, or mutual aid compact entered into under
    division (A)(1) of this section retain personal immunity from civil liability
    under section 9.86 of the Revised Code and all rights of indemnification and representation
    incident to regular employment.

    (B) The chief shall adopt rules to enter into a reciprocal agreement with participating
    states for the enhancement of compliance with hunting, fishing, and other wildlife
    laws. The agreement is named the wildlife violators compact. The agreement and
    the rules shall provide for the fair and impartial treatment of wildlife violators
    operating within participating states in recognition of the violators'' due process
    rights.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.133
- number: '1531.14'
  heading: Right of entry on land for research or investigation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'Any person regularly employed by the division of wildlife for the purpose
    of conducting research and investigation of game or fish or their habitat conditions
    or engaged in restocking game or fish or in any type of work involved in or incident
    to game or fish restoration projects or in the enforcement of laws or division
    rules relating to game or fish, or in the enforcement of section 1531.29 or 3767.32
    of the Revised Code, other laws prohibiting the dumping of refuse in or along
    streams, or watercraft laws, while in the normal, lawful, and peaceful pursuit
    of such investigation, work, or enforcement may enter upon, cross over, be upon,
    and remain upon privately owned lands for such purposes, and shall not be subject
    to arrest for trespass while so engaged or for such cause thereafter.

    Any such person, upon demand, shall identify himself to the owner, tenant, or
    manager of such privately owned lands by means of a badge or card bearing his
    name and certifying his employment by the division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.14
- number: '1531.15'
  heading: Division of wildlife may take fish
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: The division of wildlife may take fish at any time or place, in any manner,
    for the maintenance or cultivation of fish in hatcheries, or for the purpose of
    stocking ponds, lakes, rivers, or creeks, or for the purpose of exterminating
    rough fish in any waters. The division may set aside any waters for the propagation
    of fish or waterfowl.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.15
- number: '1531.16'
  heading: Enforcement and prosecution of wildlife laws and rules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: Sheriffs, deputy sheriffs, constables, and other police officers shall enforce
    the laws and division rules for the taking, possession, protection, preservation,
    and propagation of wild animals and for this purpose shall have the power conferred
    upon wildlife officers. Prosecution for offenses not committed in the presence
    of an officer shall be instituted only upon the approval of the prosecuting attorney
    of the county in which the offense is committed, or a municipal legal officer
    within his territorial jurisdiction, or upon the approval of the attorney general,
    and when the services of counsel are necessary, the attorney authorized by this
    section to approve the action and who does so shall act as attorney for the prosecution
    of the case.
