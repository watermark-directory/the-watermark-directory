    (C) All species of fur-bearing animals may be taken and possessed only according
    to the following schedule, or as otherwise provided in this chapter or Chapter
    1531. of the Revised Code or by division rule.


    NameInland Trapping District Open SeasonLake Erie Trapping District Open SeasonMinkDec.
