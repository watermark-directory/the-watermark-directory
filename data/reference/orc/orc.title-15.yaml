- number: '1511.023'
  heading: Confidentiality of certain information
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1511'
    name: Division Of Soil And Water Resources
  text: '(A) Except as provided in division (B) of this section, the director of natural
    resources, an employee of the department of natural resources, the supervisors
    of a soil and water conservation district, an employee of a district, and a contractor
    of the department or a district shall not disclose either of the following:

    (1) Information, including data from geographic information systems and global
    positioning systems, provided by a person who owns or operates agricultural land
    or an animal feeding operation and operates under an operation and management
    plan;

    (2) Information gathered as a result of an inspection of agricultural land or
    an animal feeding operation to determine whether the person who owns or operates
    the land or operation is in compliance with an operation and management plan.

    (B) The director or the supervisors of a district may release or disclose information
    specified in division (A)(1) or (2) of this section to a person or a federal,
    state, or local agency working in cooperation with the chief of the division of
    soil and water resources or the supervisors in the development of an operation
    and management plan or an inspection to determine compliance with such a plan
    if the director or supervisors determine that the person or federal, state, or
    local agency will not subsequently disclose the information to another person.'
