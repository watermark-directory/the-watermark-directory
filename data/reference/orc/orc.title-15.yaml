- number: '1561.27'
  heading: Division of mineral resources management laboratory
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: A division of mineral resources management laboratory, equipped for making
    proper chemical tests of the air, gases, and coal and mine dust, together with
    research, experimental work, and other things, proper, necessary, or appurtenant
    to the inspection of mines, and quarries, and to the administration of this chapter
    and Chapters 1509., 1563., 1565., and 1567. of the Revised Code, shall be operated
    by, and under the direction and control of, the chief of the division of mineral
    resources management. The chief shall employ not more than three chemists, and
    such clerical help as conditions require. The necessary equipment and supplies
    to maintain such laboratory shall be supplied by the chief.
  history: null
