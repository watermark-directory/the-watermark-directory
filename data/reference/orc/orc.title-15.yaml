- number: '1531.09'
  heading: Chief of division may amend or rescind rules after investigation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'If an investigation shows that any part of a rule of the division of wildlife
    should be modified for any cause not known, fully understood, or present at the
    time the rule was adopted, the chief of the division of wildlife may amend any
    part of the rule to meet the new condition or situation, but the amended rule
    shall be effective not longer than one year from its effective date.

    If an investigation shows that such a rule or amended rule should be rescinded
    for any cause not known, fully understood, or present when the rule or amended
    rule was adopted, or due to a change in conditions making the rule or amended
    rule not necessary, the chief may rescind the rule or amended rule and make it
    ineffective, except that if a rule or amended rule required the approval of the
    wildlife council for its adoption, it may be amended or rescinded only upon approval
    of the council.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.09
- number: '1531.10'
  heading: Publication of rules
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: In accordance with Chapter 119. of the Revised Code, the chief of the division
    of wildlife shall adopt, and may amend and rescind, rules that are necessary for
    the administration and enforcement of this chapter and Chapter 1533. of the Revised
    Code. Each such rule shall be given publicity by advertising or otherwise as the
    chief considers necessary or expedient. With respect to any proposed adoption
    of or change to a rule that regulates the taking of commercial fish or establishes
    related provisions, the chief shall provide, by certified mail, notification of
    the proposal to each holder of a valid commercial fishing license issued under
    section 1533.35 of the Revised Code. As long as a rule of the division of wildlife
    remains in effect, a copy of it shall be included and printed in any authorized
    compilation of the division lawbook. All such rules shall be under the seal of
    the division and shall bear the signature, or a facsimile thereof, of the chief.
