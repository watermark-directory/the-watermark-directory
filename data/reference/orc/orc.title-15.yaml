- number: '1503.50'
  heading: Definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: 'As used in sections 1503.50 to 1503.55 of the Revised Code:

    (A) "Conservation" means the wise use and management of natural resources.

    (B) "Forestry pollution" means failure to use management or conservation practices
    in silvicultural operations to abate wind or water erosion of the soil or to abate
    the degradation of the waters of the state by soil sediment, including attached
    substances, from silvicultural operations.

    (C) "Pollution abatement practice" means any erosion control practice or timber
    harvest best management practice or procedure and the operation and management
    associated with it as contained in a timber harvest plan.

    (D) "Soil and water conservation district" has the same meaning as in section
    940.01 of the Revised Code.

    (E) "Timber harvest plan" means a written record, developed or approved by the
    chief of the division of forestry or the chief''s designee that contains implementation
    schedules and operational procedures for a level of land and water management
    that will abate wind or water erosion of the soil or abate the degradation of
    the waters of the state by soil sediment, including attached substances, from
    silvicultural operations.

    (F) "Waters of the state" has the same meaning as in section 903.01 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.50
- number: '1503.51'
  heading: Rules and regulations
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: '(A) The chief of the division of forestry shall adopt rules in accordance
    with Chapter 119. of the Revised Code that do or comply with all of the following:

    (1) Establish technically feasible and economically reasonable standards to achieve
    a level of management and conservation practices in silvicultural operations that
    will abate wind or water erosion of the soil or abate the degradation of the waters
    of the state by soil sediment, including attached substances, from silvicultural
    operations and establish criteria for determination of the acceptability of such
    management and conservation practices;

    (2) Establish procedures for administration of the rules;

    (3) Specify the pollution abatement practices eligible for state cost sharing
    and determine the conditions for eligibility, the construction standards and specifications,
    the useful life, the maintenance requirements, and the limits of cost sharing
    for those practices. Eligible practices shall be limited to practices that address
    silvicultural operations, that require expenditures that are likely to exceed
    the economic returns to the owner or operator of a silvicultural operation, and
    that abate soil erosion or degradation of the waters of the state by soil sediment,
    including attached substances, from silvicultural operations.

    (B) The chief or the chief''s designee shall do all of the following:

    (1) Issue orders requiring compliance with a rule adopted under this section.
    Before the chief or the chief''s designee issues an order, the chief or the chief''s
    designee shall afford the person an adjudication hearing under Chapter 119. of
    the Revised Code. The chief or the chief''s designee may require in an order that
    a person who has caused forestry pollution by failure to comply with the standards
    established in rules adopted under this section operate under a timber harvest
    plan approved by the chief or the chief''s designee under this section. An order
    shall be issued in writing and contain a finding by the chief or the chief''s
    designee of the facts on which the order is based and the standard that is not
    being met.

    (2) Periodically monitor the use and effectiveness of management and conservation
    practices conducted in accordance with standards established in rules adopted
    under division (A)(1) of this section;

    (3) Assist in expediting state responsibilities for watershed development and
    other natural resource conservation works of improvement;

    (4) When necessary for the purposes of sections 1503.50 to 1503.55 of the Revised
    Code, develop or approve timber harvest plans.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.51
- number: '1503.52'
  heading: Operation under timber harvest plans
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: '(A) A person who owns or operates a silviculture operation may develop and
    operate under a timber harvest plan approved by the chief of the division of forestry
    or the chief''s designee under section 1503.51 of the Revised Code or by the supervisors
    of the applicable soil and water conservation district under section 940.06 of
    the Revised Code.

    (B) Any person who wishes to make a complaint regarding nuisances involving forestry
    pollution may do so orally or by submitting a written, signed, and dated complaint
    to the chief or the chief''s designee. After receiving an oral complaint, the
    chief or the chief''s designee may cause an investigation to be conducted to determine
    whether forestry pollution has occurred or is imminent. After receiving a written,
    signed, and dated complaint, the chief or the chief''s designee shall cause such
    an investigation to be conducted.

    (C) In a private civil action for nuisances involving forestry pollution, it is
    an affirmative defense if the person owning, operating, or otherwise responsible
    for a silvicultural operation is operating under and in substantial compliance
    with an approved timber harvest plan developed under division (A) of this section,
    with a timber harvest plan developed by the chief or the chief''s designee under
    section 1503.51 of the Revised Code or by the supervisors of the applicable soil
    and water conservation district under section 940.06 of the Revised Code, or with
    a timber harvest plan required by an order issued by the chief or the chief''s
    designee under division (B)(1) of section 1503.51 of the Revised Code. Nothing
    in this section is in derogation of the authority granted to the chief or the
    chief''s designee in 1503.51 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.52
- number: '1503.53'
  heading: Confidentiality
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: '(A) Except as provided in division (B) of this section, the chief of the
    division of forestry, an employee of the division of forestry, the supervisors
    of a soil and water conservation district, an employee of a district, and a contractor
    of the division or a district shall not disclose either of the following:

    (1) Information, including data from geographic information systems and global
    positioning systems, provided by a person who owns or operates a silvicultural
    operation that is operated under a timber harvest plan;

    (2) Information gathered as a result of an inspection to determine whether the
    person who owns or operates the operation is in compliance with a timber harvest
    plan.

    (B) The chief or the supervisors of a district may release or disclose information
    specified in division (A)(1) or (2) of this section to a person or a federal,
    state, or local agency working in cooperation with the chief or the supervisors
    in the development of a timber harvest plan or an inspection to determine compliance
    with such a plan if the chief or supervisors determine that the person or federal,
    state, or local agency will not subsequently disclose the information to another
    person.'
