- number: '1547.12'
  heading: Incapacitated operators prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'No person shall operate any vessel if the person is so mentally or physically
    incapacitated as to be unable to operate the vessel in a safe and competent manner.

    No person shall permit any vessel to be operated on the waters in this state in
    violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.12
- number: '1547.13'
  heading: Failure to comply with order of law enforcement - fleeing and eluding
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) No person shall fail to comply with any lawful order or direction of
    any law enforcement officer having authority to direct, control, or regulate the
    operation or use of vessels.

    (B) No person shall operate any vessel so as to purposely elude or flee from a
    law enforcement officer after receiving a visible or audible signal from a law
    enforcement officer to bring the vessel to a stop.

    (C) No person shall operate or permit to be operated any vessel on the waters
    in this state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.13
- number: '1547.131'
  heading: Duty to stop or give way upon approach of law enforcement vessel
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'Upon the approach of a law enforcement vessel with at least one flashing,
    rotating, or oscillating light of a color conforming with the requirements of
    federal law, the operator of any vessel shall stop if followed or give way in
    any crossing, head-on, or overtaking situation and shall remain in that position
    until the law enforcement vessel has passed, except when otherwise directed by
    a law enforcement officer. If traffic conditions warrant, a siren or other sound
    producing device also may be operated as an additional signaling device. This
    section does not relieve the operator of any law enforcement vessel from the duty
    to operate with due regard for the safety of all persons and property on the waters
    in this state.

    No person shall operate or permit to be operated any vessel on the waters in this
    state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.131
- number: '1547.132'
  heading: Vessel wake restrictions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) As used in this section, "public service" means activities that include,
    but are not limited to, escorting or patrolling special water events, traffic
    control, salvage, firefighting, medical assistance, assisting disabled vessels,
    and search and rescue.

    (B) No person shall operate a vessel at a speed that creates a wake within one
    hundred feet of a stationary law enforcement vessel displaying at least one flashing,
    oscillating, or rotating light conforming with 33 C.F.R. 88.11.

    (C) No person shall operate a vessel at a speed that creates a wake within one
    hundred feet of a vessel that is being used to provide public service and that
    displays at least one flashing, oscillating, or rotating light conforming with
    33 C.F.R. 88.12.

    (D) No person shall permit any vessel to be operated on the waters in this state
    in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.132
- number: '1547.14'
  heading: Water skiing activity confined to ski zones
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Except on the waters of the Ohio River or Lake Erie and immediately connected
    harbors and bays, any person who rides or attempts to ride upon one or more water
    skis, surfboard, or similar device, or who engages or attempts to engage in barefoot
    skiing, and any person who operates a vessel towing a person riding or attempting
    to ride on one or more water skis, surfboard, or similar device, or engaging or
    attempting to engage in barefoot skiing, shall confine that activity to the water
    area within a designated ski zone on all bodies of water on which a ski zone has
    been established.

    (B) On all bodies of water where no specific activity zones have been established,
    the activities described in division (A) of this section shall be confined to
    areas where the activities are not specifically restricted by this chapter and
    rules.

    (C) Divisions (A) and (B) of this section do not apply to an activity described
    in division (A) of this section if the vessel involved in the activity is traveling
    at idle speed in a designated no wake zone and the activity is not being conducted
    in any of the following areas:

    (1) Within three hundred feet of a gas dock, marina, launch ramp, or harbor entrance;

    (2) Within a designated anchorage area, swim zone, boat swim zone, or boat camping
    area;

    (3) Under a bridge or within three hundred feet of a bridge underpass;

    (4) Any area designated as a no ski zone.

    (D) No person shall operate or permit to be operated any vessel on the waters
    in this state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.14
- number: '1547.15'
  heading: Observer required when towing skier
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'Any person who operates a vessel towing any person riding or attempting to
    ride upon one or more water skis or upon a surfboard or similar device, or engaging
    or attempting to engage in barefoot skiing, on the waters in this state shall
    have present in the vessel a person or persons other than the operator, ten years
    of age or older, who shall at all times observe the progress of the person being
    towed. The operator of the towing vessel shall at all times observe the traffic
    pattern toward which the vessel is approaching.

    No person shall operate or permit to be operated any vessel on the waters in this
    state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.15
- number: '1547.16'
  heading: Water skiing after dark prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: No person shall ride or attempt to ride upon water skis, surfboard, or similar
    device, or engage or attempt to engage in barefoot skiing, or use or operate any
    vessel to tow any person thereon on the waters in this state during that period
    of the day between sunset and sunrise, except upon special permit issued by the
    state department, conservancy district, or political subdivision having jurisdiction
    and control of such water.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.16
- number: '1547.18'
  heading: Personal flotation device required
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Except as provided in division (B) of this section, no person shall engage
    in any form of towed watersports without wearing an adequate and effective coast
    guard approved wearable personal flotation device specifically designed for towed
    watersports, in good and serviceable condition and of appropriate size, except
    upon special permit issued by one of the following persons or entities that manages
    the waterway:

    (1) The political subdivision having primary jurisdiction;

    (2) The administrator of a federal agency;

    (3) The director of a state agency;

    (4) The board of directors of a conservancy district;

    (5) Any other governing body having jurisdiction.

    (B) Division (A) of this section does not apply to a person engaging or attempting
    to engage in barefoot skiing if the person is wearing a wet suit specifically
    designed for barefoot skiing that is in good and serviceable condition and of
    appropriate size.

    (C) No operator of a vessel shall allow any person who fails to comply with division
    (A) or (B) of this section to engage in any form of towed watersports.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.18
- number: '1547.19'
  heading: Ski jumps prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: No person shall install or maintain any structure or inclined platform known
    as a water ski jump on the waters in this state. No person shall use any such
    platform or structure for the purpose of water ski jumping, except upon special
    permit issued by the state department, conservancy district, or political subdivision
    having jurisdiction and control over such water.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.19
- number: '1547.20'
  heading: Permission for conducting special water events
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'No person or organization shall conduct any race, regatta, or other special
    event upon the waters in this state without first obtaining written permission,
    upon application not less than thirty days prior to the time of the proposed race,
    regatta, or event, of the federal agency, state department, conservancy district,
    or political subdivision having jurisdiction and control over such waters. Any
    state department, conservancy district, or political subdivision may suspend its
    respective rules during a race, regatta, or special event. Nothing in this section
    shall be construed to mean that the operator of a vessel competing in a specially
    authorized race, regatta, or special event shall not attempt to attain high speeds
    on a marked racing course.

    On any waters in this state over which no federal agency, state department, conservancy
    district, or political subdivision has jurisdiction and control, no person or
    organization shall conduct any race, regatta, or other special event without first
    obtaining written permission, upon application not less than thirty days prior
    to the time of the proposed race, regatta, or event, of the chief of the division
    of parks and watercraft. The chief may, after determining that the public safety
    will be adequately protected, grant written permission for holding such race,
    regatta, or special event. This section does not apply to privately owned lakes
    or ponds nor to canoes or rowboats.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.20
- number: '1547.21'
  heading: Requirements for inflatable vessel
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: No person shall use or offer for use on the waters in this state any inflatable
    vessel made of canvas, rubber, synthetic rubber, or vinyl plastic unless the inflatable
    vessel is of multiple air cell or compartment construction and is capable of remaining
    afloat if one air cell or compartment is punctured or collapsed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.21
- number: '1547.22'
  heading: Restrictions on sitting, standing, walking on moving vessel
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'No occupant of any vessel underway on the waters in this state shall sit,
    stand, or walk upon any portion of the vessel not specifically designed for that
    movement, except when immediately necessary for the safe and reasonable navigation
    or operation of the vessel. No operator of a vessel under way on the waters in
    this state shall allow any occupant of the vessel to sit, stand, or walk on any
    portion of the vessel underway not specifically designed for that use, except
    when immediately necessary for the safe and reasonable navigation or operation
    of the vessel.

    No person shall operate or permit to be operated any vessel on the waters in this
    state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.22
- number: '1547.23'
  heading: Warming-up engine
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: The pilot or engineer of any powercraft for hire to carry passengers shall
    not permit passengers to come aboard before the engine of such powercraft has
    been permitted to run for a minimum of two minutes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.23
- number: '1547.24'
  heading: Personal flotation devices required for child under 10
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: No person shall operate or permit to be operated any vessel under eighteen
    feet in length while there is present in the vessel any person under ten years
    of age, not wearing a coast guard approved wearable personal flotation device
    in good and serviceable condition of appropriate size securely attached to the
    person under ten years of age.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.24
- number: '1547.25'
  heading: Prohibiting operation without personal flotation devices
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) No person shall operate or permit to be operated any vessel, other than
    a vessel exempted by rules, on the waters in this state:

    (1) That is sixteen feet or greater in length without carrying aboard one wearable
    personal flotation device for each person aboard and one throwable personal flotation
    device;

    (2) That is less than sixteen feet in length, including paddlecraft of any length,
    without carrying aboard one wearable personal flotation device for each person
    aboard.

    (B) No person shall operate or permit to be operated any commercial vessel on
    the waters in this state:

    (1) That is less than forty feet in length and is not carrying persons for hire
    without carrying aboard at least one wearable personal flotation device for each
    person aboard;

    (2) That is carrying persons for hire or is forty feet in length or longer and
    is not carrying persons for hire without carrying aboard at least one wearable
    personal flotation device for each person aboard that complies with all of the
    following:

    (a) It is designed to support the person wearing the wearable personal flotation
    device in the water in an upright or slightly backward position and provides support
    to the head so that the face of an unconscious or exhausted person is held above
    the water.

    (b) It is capable of turning the person wearing the wearable personal flotation
    device, upon entering the water, to a safe flotation position.

    (c) It is capable of being worn inside out.

    (d) It is capable of supporting a minimum of twenty-two pounds in fresh water
    for forty-eight hours.

    (e) It is a highly visible color.

    (3) That is twenty-six feet in length or longer without carrying aboard at least
    one throwable personal flotation device in addition to the applicable requirements
    of divisions (B)(1) and (2) of this section.

    (C) Each personal flotation device carried aboard a vessel, including a commercial
    vessel, pursuant to this section shall be coast guard approved and in good and
    serviceable condition, of appropriate size for the wearer, readily accessible
    to each person aboard the vessel at all times, and used in accordance with any
    requirements on its approval label or in accordance with requirements in its owner''s
    manual if the approval label refers to such a manual.

    (D) A personal flotation device shall not be used in a manner that is inconsistent
    with any limitations or restrictions related to federal approval under 46 C.F.R.
    160 or special instructions for use provided by the manufacturer. Appropriate
    use shall be indicated on the label of an approved personal flotation device.

    (E) As used in this section, "commercial vessel" means any vessel used in the
    carriage of any person or property for a valuable consideration whether flowing
    directly or indirectly from the owner, partner, or agent or any other person interested
    in the vessel. "Commercial vessel" does not include any vessel that is manufactured
    or used primarily for noncommercial use or that is leased, rented, or chartered
    to another for noncommercial use.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.25
- number: '1547.251'
  heading: Use of approved distress signals or flags
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) No person shall operate on the waters of Lake Erie or the immediately
    connecting bays, harbors, and anchorage areas at any time a vessel that is sixteen
    or more feet in length or any vessel carrying six or fewer passengers for hire
    without carrying coast guard approved visual distress signals for both day and
    night use.

    (B) No person shall operate upon the waters of Lake Erie or the immediately connecting
    bays, harbors, and anchorage areas during the period from sunset to sunrise according
    to local time any of the following without carrying coast guard approved visual
    distress signals for night use:

    (1) A vessel less than sixteen feet in length;

    (2) A vessel competing in an organized marine parade, race, regatta, or similar
    event;

    (3) A manually propelled vessel;

    (4) A sailboat less than twenty-six feet in length with completely open construction
    and without propulsion machinery.

    (C) No person shall operate a vessel on the waters in this state other than Lake
    Erie or the immediately connecting bays, harbors, and anchorage areas unless the
    vessel carries either a distress flag at least two feet square and international
    orange in color or a coast guard approved daytime distress signal.

    (D) No person shall display any distress signal unless a vessel or a person is
    in distress and in need of help.

    (E) Divisions (A) and (C) of this section do not apply to any of the following:

    (1) Vessels competing in an organized marine parade, race, regatta, or similar
    event;

    (2) Manually propelled vessels;

    (3) Sailboats less than twenty-six feet in length with completely open construction
    and without propulsion machinery.

    (F) The distress signals required by this section shall be in good and serviceable
    condition, readily accessible, and of the type and quantities required by regulations
    adopted under 46 U.S.C. 4302, as amended.

    (G) No person shall operate or permit to be operated any vessel on the waters
    in this state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.251
- number: '1547.26'
  heading: Requiring anchor and line
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'All watercraft, except sailboats less than sixteen feet long having a cockpit
    depth of less than twelve inches and except canoes, shall carry an anchor and
    line of sufficient weight and length to anchor the watercraft securely. The chief
    of the division of parks and watercraft, by rule, may exempt other types of watercraft
    from this section after determining that carrying such an anchor and line would
    constitute a hazard.

    No person shall operate or permit to be operated any watercraft on the waters
    in this state in violation of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.26
- number: '1547.27'
  heading: Required fire extinguishers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Except those powercraft less than twenty-six feet in length designed
    for use with an outboard motor, of open construction that is not capable of entrapping
    explosive or flammable gases or vapors, and not carrying passengers for hire,
    all powercraft shall carry fire extinguishers as prescribed in this section. The
    fire extinguishers shall be capable of extinguishing a burning gasoline fire,
    shall be in such condition as to be ready for immediate and effective use, and
    shall comply with minimum or higher standards for such extinguishers then prevailing
    as prescribed by the United States coast guard.

    (B) Except for vessels subject to exemptions listed in 33 C.F.R. 175.380 or 175.390,
    any vessel not equipped with fixed fire extinguishing systems in machinery spaces
    shall carry the following:

    (1) Class A and class 1 powercraft shall carry at least one 5-B portable fire
    extinguisher.

    (2) Class 2 powercraft shall carry at least two 5-B portable fire extinguishers
    or at least one 20-B portable fire extinguisher.

    (3) Class 3 powercraft shall carry at least three 5-B portable fire extinguishers,
    or at least one 5-B portable and one 20-B portable fire extinguishers.

    (4) Class 4 powercraft shall carry the number and type of 20-B portable fire extinguishers
    specified by gross tonnage as prescribed by 33 C.F.R. 175, subpart E.

    (C) All portable and semi-portable fire extinguishers for use on a vessel shall:

    (1) Be on board the vessel and be readily accessible;

    (2) Be of an approved type;

    (3) Not be expired or appear to have been previously used;

    (4) Be maintained in good and serviceable working condition. As used in division
    (C)(4) of this section, "good and serviceable working condition" means all of
    the following:

    (a) If the fire extinguisher has a pressure gauge or indicator, the reading or
    indicator is in the operable range or position;

    (b) The fire extinguisher''s lock pin is firmly in place;

    (c) The fire extinguisher''s discharge nozzle is clean and free of obstruction;

    (d) The fire extinguisher does not show visible signs of significant corrosion
    or damage.

    (D) No person shall operate or permit to be operated on the waters in this state
    any powercraft that does not comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.27
- number: '1547.28'
  heading: Backfire flame control device
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'Every gasoline engine installed in a vessel after April 25, 1940, except
    an outboard motor, shall be equipped with an acceptable device to control backfire
    flame. The device shall comply with all of the following:

    (A) Be securely attached to the air intake with a flame-tight connection;

    (B) Be in proper working order;

    (C) Be coast guard approved or comply with either SAE J1928 or UL 1111;

    (D) Be marked to indicate approval or compliance under division (C) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.28
- number: '1547.29'
  heading: Ventilation requirements
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'All powercraft using gasoline or other liquid fuel having a flashpoint of
    less than 110° F. shall be provided with ventilation as follows:

    (A) At least two ventilators fitted with cowls or their equivalent for the purpose
    of properly and efficiently ventilating the bilges of every engine and fuel tank
    compartment in order to remove any inflammable or explosive gases;

    (B) Any type of ventilating system approved for use by the United States coast
    guard;

    (C) The ventilation of the boat is not required where the greater portion of the
    bilges of the engine and fuel tank compartment is open to the natural atmosphere.'
