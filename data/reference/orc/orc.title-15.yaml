  url: https://codes.ohio.gov/ohio-revised-code/section-1533.112
- number: '1533.113'
  heading: Rules for management permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'If the chief of the division of wildlife determines that the licenses, permits,
    and stamps issued under this chapter and Chapter 1531. of the Revised Code are
    insufficient for proper wildlife management in specific geographic areas or for
    specific species of wild animals, the chief may adopt rules in accordance with
    section 1531.10 of the Revised Code doing all of the following:

    (A) Providing for the issuance of management permits;

    (B) Establishing requirements governing those permits that modify the requirements
    established under this chapter and Chapter 1531. of the Revised Code governing
    licenses, permits, and stamps;

    (C) Establishing fees for management permits that shall not exceed the fees established
    under this chapter and Chapter 1531. of the Revised Code for licenses, permits,
    and stamps.

    Rules adopted under division (C) of this section shall be adopted only upon approval
    of the controlling board and the wildlife council created in section 1531.03 of
    the Revised Code.'
