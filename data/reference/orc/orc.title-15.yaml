- number: '1531.24'
  heading: United States commissioner of fisheries authorized to establish, operate,
    and maintain fish hatcheries in Ohio
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: The United States commissioner of fisheries and his authorized agents may
    establish fish hatcheries in Ohio, and operate and maintain them. Such persons
    may acquire by lease, gift, or purchase lands and other equipment necessary for
