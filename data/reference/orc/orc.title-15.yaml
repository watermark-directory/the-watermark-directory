- number: '1506.30'
  heading: Submerged lands preserves definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: 'As used in sections 1506.30 to 1506.36 of the Revised Code:

    (A) "Abandoned property" means a submerged aircraft; a submerged watercraft, including
    a ship, boat, canoe, skiff, raft, or barge; the rigging, gear, fittings, trappings,
    and equipment of a submerged aircraft or watercraft; the personal property of
    the officers, crew, and passengers of a submerged aircraft or watercraft; the
    cargo of a submerged aircraft or watercraft that has been deserted, relinquished,
    cast away, or left behind and for which attempts at reclamation have been abandoned
    by the owners and insurers; and submerged materials resulting from activities
    of prehistoric and historic native Americans.

    (B) "Lake Erie" means that portion of the waters and lands of Lake Erie belonging
    to the state as provided in section 1506.10 of the Revised Code.

    (C) "Historical value" means the quality of significance exemplified by an object,
    structure, site, or district that is included in or eligible for inclusion in
    the national register of historic places.

    (D) "Marine surveyor" means a person engaged in the business of mapping or surveying
    submerged lands and abandoned property.

    (E) "Mechanical or other assistance" means all artificial devices used to raise
    or remove artifacts from abandoned property, including pry bars, wrenches and
    other hand or power tools, cutting torches, explosives, winches, flotation bags,
    lines to surface, extra divers buoyancy devices, and other buoyancy devices.

    (F) "Recreational value" means value relating to an activity in which the public
    engages or may engage for recreation or sport, including scuba diving and fishing,
    as determined by the director of natural resources.'
