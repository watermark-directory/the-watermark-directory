- number: '1506.21'
  heading: Ohio Lake Erie commission
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: '(A)(1) There is hereby created the Ohio Lake Erie commission, consisting
    of the directors of environmental protection, natural resources, health, agriculture,
    transportation, and development services, or their designees, the two board members
    of the great lakes protection fund board appointed by the governor under section
    1506.22 of the Revised Code who shall serve as ex officio nonvoting members, and
    five additional members appointed by the governor with the advice and consent
    of the senate. The governor shall appoint the five additional members not later
    than forty-five days after the effective date of this amendment. Of the initial
    five additional members appointed by the governor after the effective date of
    this amendment, two shall serve for a term ending on September 1, 2017, two shall
    serve for a term ending on September 1, 2018, and one shall serve for a term ending
    on September 1, 2019. Thereafter, all five additional members appointed by the
    governor shall serve three-year terms.

    (2) All of the following apply to the five additional members appointed by the
    governor:

    (a) Each member shall hold office from the date of the member''s appointment until
    the end of the term for which the member was appointed.

    (b) In the event of the death, removal, resignation, or incapacity of a member,
    the governor, with the advice and consent of the senate, shall appoint a successor
    who shall hold office for the remainder of the term for which the successor''s
    predecessor was appointed.

    (c) A member shall continue in office subsequent to the expiration date of the
    member''s term until the member''s successor takes office or until a period of
    sixty days has elapsed, whichever occurs first.

    (d) Members may be reappointed for not more than two total terms.

    (e) The governor at any time may remove a member for misfeasance, nonfeasance,
    or malfeasance in office.

    (3) Membership on the commission does not constitute holding a public office or
    position of employment under the laws of this state and is not grounds for removal
    of public officers or employees from their offices or positions of employment.
    Members may be reimbursed for their actual and necessary expenses incurred in
    the performance of their official duties. The members of the commission annually
    shall designate a director or director''s designee as chairperson, who shall preside
    at the meetings of the commission, and a secretary.

    (4) The commission shall hold at least one meeting every three months. The secretary
    of the commission shall keep a record of its proceedings. Special meetings shall
    be held at the call of the chairperson or upon the request of four members of
    the commission. All meetings and records of the commission shall be open to the
    public. Six members of the commission constitute a quorum. The agencies represented
    on the commission shall furnish administrative, clerical, technical, and other
    services required by the commission in the performance of its duties.

    (B) The commission shall do all of the following:

    (1) Ensure the coordination of funding and monitoring federal, state, and local
    policies, programs, and priorities pertaining to Lake Erie, including issues related
    to nutrient-related water quality and the beneficial use of dredged material.
    The commission shall prioritize policies, programs, and priorities identified
    in the Lake Erie protection and restoration strategy;

    (2) Review, and make recommendations concerning, the development and implementation
    of policies, programs, and issues that are consistent with the great lakes water
    quality agreement and other international, federal, and state compacts and agreements;

    (3) Serve as a repository and clearinghouse for public information and data related
    to Lake Erie and the Lake Erie basin and collect and distribute such information
    and data at the commission''s discretion;

    (4) Publish and submit the Lake Erie protection and restoration strategy in accordance
    with division (C) of section 1506.23 of the Revised Code;

    (5) Provide representation regarding the interests of this state in state, regional,
    national, and international forums pertaining to Lake Erie and the Lake Erie basin;

    (6) Develop, implement, and coordinate an education, public information, and community
    relations program concerning the commission''s policies, programs, issues, and
    the resources of Lake Erie;

    (7) Develop and implement a marketing program promoting the sale of the Lake Erie
    license plate created under section 4503.52 of the Revised Code and other public
    and private fundraising initiatives to support the commission''s programs;

    (8) Establish and dissolve public advisory councils as considered necessary to
    assist in programs established under this section and sections 1506.22 and 1506.23
    of the Revised Code. Members of the public advisory councils shall represent a
    broad cross section of interests, shall have experience or expertise in the subject
    for which the advisory council was established, and shall serve without compensation.
    Membership on a public advisory council does not constitute holding a public office
    or position of employment under the laws of this state and is not grounds for
    removal of public officers or employees from their offices or positions of employment.
    Members of a public advisory council may be reimbursed for their actual and necessary
    expenses incurred in the performance of their official duties.

    (C) Each state agency, upon the request of the commission, shall cooperate in
    the implementation of this section and sections 1506.22 and 1506.23 of the Revised
    Code.'
