- number: '1531.12'
  heading: Limitations on authority of chief
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: Nothing in sections 1531.08 to 1531.11 of the Revised Code shall be construed
    to authorize the chief of the division of wildlife to provide or change any penalty
    prescribed by law for a violation of its provisions, or to change the amount of
    any license fee or to provide license, except license fees when expressly permitted
    by a provision in Chapter 1531. or 1533. of the Revised Code.
