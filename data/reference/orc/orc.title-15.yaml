- number: '1531.25'
  heading: Protection of species threatened with statewide extinction
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'The chief of the division of wildlife, with the approval of the wildlife
    council, shall adopt and may modify and repeal rules, in accordance with Chapter
    119. of the Revised Code, restricting the taking or possession of native wildlife,
    or any eggs or offspring thereof, that he finds to be threatened with statewide
    extinction. The rules shall identify the common and scientific names of each endangered
    species and shall be modified from time to time to include all species on the
    list of endangered fish and wildlife pursuant to Section 4 of the "Endangered
    Species Act of 1973," 87 Stat. 884, 16 U.S.C.A. 1531, as amended, and that are
    native to this state, or that migrate or are otherwise reasonably likely to occur
    within the state.

    The rules shall provide for the taking of species threatened with statewide extinction,
    for zoological, educational, and scientific purposes, and for propagation in captivity
    to preserve the species, under written permits from the chief. The rules shall
    in no way restrict the taking or possession of species listed on such United States
    list for zoological, educational, or scientific purposes, or for propagation in
    captivity to preserve the species, under a permit or license from the United States
    or any instrumentality thereof.

    No person shall violate any rule adopted pursuant to this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.25
- number: '1531.26'
  heading: Nongame and endangered wildlife fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'There is hereby created in the state treasury the nongame and endangered
    wildlife fund, which shall consist of moneys paid into it by the tax commissioner
    under section 5747.113 of the Revised Code, moneys deposited in the fund from
    the issuance of wildlife conservation license plates under section 4503.57 of
    the Revised Code, moneys deposited in the fund from the issuance of bald eagle
    license plates under section 4503.572 of the Revised Code, moneys credited to
    the fund under section 1533.151 of the Revised Code, and contributions made directly
    to it. Any person may contribute directly to the fund in addition to or independently
    of the income tax refund contribution system established in section 5747.113 of
    the Revised Code. Moneys in the fund shall be disbursed pursuant to vouchers approved
    by the director of natural resources for use by the division of wildlife solely
    for the purchase, management, preservation, propagation, protection, and stocking
    of wild animals that are not commonly taken for sport or commercial purposes,
    including the acquisition of title and easements to lands, biological investigations,
    law enforcement, production of educational materials, sociological surveys, habitat
    development, and personnel and equipment costs; and for carrying out section 1531.25
    of the Revised Code. Moneys in the fund also may be used to promote and develop
    nonconsumptive wildlife recreational opportunities involving wild animals. Moneys
    in the fund from the issuance of bald eagle license plates under section 4503.572
    of the Revised Code shall be expended by the division only to pay the costs of
    acquiring, developing, and restoring habitat for bald eagles within this state.
    Moneys in the fund from any other source also may be used to pay the costs of
    acquiring, developing, and restoring habitat for bald eagles within this state.

    All investment earnings of the fund shall be credited to the fund. Subject to
    the approval of the director, the chief of the division of wildlife may enter
    into agreements that the chief considers appropriate to obtain additional moneys
    for the protection of nongame native wildlife under the "Endangered Species Act
    of 1973," 87 Stat. 884, 16 U.S.C.A. 1541-1543, as amended, and the "Fish and Wildlife
    Conservation Act of 1980," 94 Stat. 1322, 16 U.S.C.A. 2901-2911, as amended. Moneys
    appropriated from the fund are not intended to replace other moneys appropriated
    for these purposes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.26
- number: '1531.27'
  heading: Payments to counties for land use by state
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'The chief of the division of wildlife shall pay to the treasurers of the
    several counties wherein lands owned by the state and administered by the division
    are located an annual amount determined in the following manner: in each such
    county one per cent of the total value of such lands exclusive of improvements,
    as shown on the auditor''s records of taxable value of real property existing
    at the time when the state acquired the tract or tracts comprising the lands.

    The payments shall be made from funds accruing to the division from fines, penalties,
    restitution, and forfeitures deposited into the state treasury to the credit of
    the wildlife fund created in section 1531.17 of the Revised Code. The allocation
    of amounts to be paid from those sources shall be determined by the director of
    natural resources.

    The payments to the treasurers of the several counties shall be credited to the
    fund for school purposes within the school districts wherein the lands are located.'
  history: null
