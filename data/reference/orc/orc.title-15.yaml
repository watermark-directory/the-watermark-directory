- number: '1514.024'
  heading: Agreement for road improvement
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: A local authority may enter into an agreement with the operator of a surface
    or in-stream mining operation or of a proposed surface or in-stream mining operation
    for the improvement of roads under the jurisdiction of that local authority that
    may be affected by the operation or for other improvements within the jurisdiction
    of that local authority. However, nothing in this section requires the surface
    or in-stream mining operator to enter into such an agreement.
