    name: Division Of Geological Survey
  text: 'The chief of the division of geological survey in the discharge of official
    duties under sections 1505.01 to 1505.08 of the Revised Code may call to the chief''s
    assistance, temporarily, any engineers or other employees in any state department,
    or in the Ohio state university, or other educational institutions financed wholly
    or in part by the state, for the purpose of making studies, surveys, maps, and
    plans for economic development or geologic hazards projects.

    Such engineers and employees shall not receive any additional compensation over
    that which they receive from the departments by which they are employed, but they
    shall be reimbursed for their actual necessary expenses incurred while working
    under the direction of the chief on the projects.'
