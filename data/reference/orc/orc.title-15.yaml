- number: '1510.09'
  heading: Fund for marketing program
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A) There is hereby established a fund for any marketing program that is
    established by the technical advisory council under this chapter. The fund shall
    be in the custody of the treasurer of state, but shall not be part of the state
    treasury. Except as authorized in division (B) of this section, all money collected
    pursuant to section 1510.08 of the Revised Code for the marketing program shall
    be paid into the fund for the marketing program and shall be disbursed only pursuant
    to a voucher signed by the chairperson of the council for use in defraying the
    costs of administration of the marketing program and for carrying out sections
    1510.02, 1510.03, and 1510.11 of the Revised Code.

    (B) In lieu of deposits in the fund established under division (A) of this section,
    the operating committee of a marketing program established under this chapter
    may deposit all money collected pursuant to section 1510.08 of the Revised Code
    with a bank as defined in section 1101.01 of the Revised Code. All money collected
    pursuant to section 1510.08 of the Revised Code for the marketing program and
    deposited pursuant to this division also shall be used only in defraying the costs
    of administration of the marketing program and for carrying out sections 1510.02,
    1510.03, and 1510.11 of the Revised Code.

    (C) The operating committee shall establish a fiscal year for its marketing program,
    shall publish an activity and financial report within sixty days of the end of
    each fiscal year, and shall make the report available to each producer who pays
    an assessment or otherwise contributes to the marketing program that the committee
    administers and to other interested persons.

    (D) In addition to the report required by division (C) of this section, an operating
    committee that deposits money in accordance with division (B) of this section
    shall annually submit to the council a financial statement prepared by a certified
    public accountant holding valid certification from the Ohio board of accountancy
    issued pursuant to Chapter 4701. of the Revised Code. The operating committee
    shall file the financial statement with the council not more than one hundred
    fifty days after the end of each fiscal year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.09
- number: '1510.10'
  heading: Suspending operation of program
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A) The technical advisory council temporarily may suspend the operation
    of a marketing program, or any part of a program, for any reason upon recommendation
    by the operating committee of the program for a period of not more than twelve
    consecutive months.

    (B) At least once in each five years of operation, or at any time upon written
    petition by the lesser of one hundred or ten per cent of the producers in this
    state, the council shall hold a hearing as prescribed in Chapter 119. of the Revised
    Code to consider the continuation of the program.

    (C) Not later than thirty days after the close of any hearing to consider the
    continuation of a marketing program, the council shall recommend continuation
    or termination of the program, shall give public notice, and shall notify each
    producer of record, all parties appearing at the hearing, and other interested
    parties of the recommendation.

    (D) When the council recommends termination of a marketing program, within forty-five
    days the council shall conduct a referendum to determine whether producers favor
    the proposed termination. Producers favor the termination of the program if a
    majority of the producers who vote in the referendum vote in favor of termination
    of the program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.10
- number: '1510.11'
  heading: Termination procedure
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A) When producers favor termination of a marketing program established under
    this chapter, the operating committee of the program and the technical advisory
    council shall terminate all operations of the program.

    (B)(1) Except as provided in division (B)(2) of this section, upon termination
    of a program, the council shall return any remaining unobligated money to the
    producers who paid the assessments levied under section 1510.08 of the Revised
    Code during the immediately preceding twelve months and shall prorate the money
    accordingly.

    (2) If a program is operated by a nonprofit corporation that is organized under
    Chapter 1702. of the Revised Code for the purpose of carrying out the purposes
    identified in division (A) (1) of section 1510.02 of the Revised Code, and if
    the nonprofit corporation is exempt from federal income taxation pursuant to section
    501(a) of the Internal Revenue Code and is described in section 501(c)(3) of the
    Internal Revenue Code, upon termination of the program, the nonprofit corporation
    shall distribute any remaining unobligated money to be used for one or more exempt
    purposes within the meaning of section 501(c)(3) of the Internal Revenue Code
    or to the federal, a state, or a local government to be used for a public purpose.
    If there remains any unobligated money after the distribution by the nonprofit
    corporation, the court of common pleas of the county in which the principal office
    of the nonprofit corporation is located shall distribute the remaining unobligated
    money to be used for one or more exempt purposes within the meaning of section
    501(c)(3) of the Internal Revenue Code, to the federal, a state, or a local government
    to be used for a public purpose, or to one or more organizations that are organized
    and operated exclusively for one or more of the purposes that are within the meaning
    of section 501(c)(3) of the Internal Revenue Code, as the court determines is
    best to accomplish the exempt purposes of the nonprofit corporation.'
