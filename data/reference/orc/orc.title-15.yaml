  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.324
- number: '1533.33'
  heading: Fishing license fees
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'All moneys derived from fishing licenses issued pursuant to section 1533.32
    of the Revised Code shall be appropriated exclusively for the use of the department
    of natural resources for the following purposes:

    (A) For the purchase, protection, propagation, preservation, and stocking of fish;

    (B) For the construction of fish chutes and dams;

    (C) For the securing of more public fishing waters including leasing, purchasing,
    or otherwise acquiring stream banks, bottoms, and marginal strips, headwaters
    and other lakes, ponds, quarries, gravel pits, and other suitable public fishing
    grounds with marginal strips as provided in section 1531.06 of the Revised Code;

    (D) For the improvement of streams, lakes, and ponds, including food, cover, breeding
    conditions, erosion, and reforestation;

    (E) For the cooperation with other agencies as provided in section 1501.02 of
    the Revised Code, to assist in stabilizing water levels and in controlling ditching,
    dredging, straightening, debrushing, the removal of aquatic vegetation in streams,
    and to assist in other proper land and water use problems to control stream, lake,
    and pond turbidities;

    (F) For other practical fish management work including biological investigations
    and printing the summarized fishing laws, the fish and game lawbook, conservation
    bulletins, and practical fish management leaflets, pamphlets, and books;

    (G) For promoting educational and research activities, other methods of fish propagation
    and fish culture, and other proper conservation activities;

    (H) For use as provided in sections 1531.05, 1531.12, 1531.13, 1531.27, 1531.28,
    and 1533.67 of the Revised Code.

    No funds derived from fishing licenses shall be spent for other than fishing purposes
    as defined in this section. Not more than twenty-five per cent of such moneys
    shall be used for the payment of administration or other overhead expenses of
    the division of wildlife and the wildlife council, and the remaining seventy-five
    per cent shall be used exclusively for the purchase, protection, propagation,
    preservation, stocking of fish, and for the purposes listed in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.33
- number: '1533.34'
  heading: License to use boat, net, or device for fishing
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'No person shall use or operate, for the purpose of taking fish, a boat, net,
    or device other than a minnow net or hook and line with bait or lure, in any of
    the waters of the state wherein fishing with nets is licensed by law, without
    a license for that gear from the chief of the division of wildlife. The application
    for a license and all licenses required by section 1533.35 of the Revised Code
    shall be in such form as the chief prescribes.

    When a person applies to the chief for a license, the chief may issue the license
    if the person satisfies the qualifications established in division (C) of section
    1533.342 of the Revised Code and the chief receives the proper fees. Upon proof
    of violation of this section, the chief may refuse to issue or renew any license.
    A license shall remain in force and entitle the holder thereof to fish as permitted
    by law from the date of issuance to and including the last day of the season for
    which the license was issued. The license shall be carried by the operator of
    a boat, net, or other device while the boat, net, or other device is being used
    in fishing and shall be exhibited on demand to any wildlife officer, constable,
    sheriff, deputy sheriff, or other police officer, or the chief. No licensee shall
    fail to exhibit the license on demand to any proper officer. Each boat, net, or
    other device used in fishing contrary to this section and each net or other device
    used or operated without having the metal license tag attached thereto as provided
    by law constitutes a separate offense.

    Nonresident commercial fishers and their fishing gear shall not be licensed to
    fish in this state unless a reciprocal agreement is in force. A resident who purchases
    commercial fishing gear from out of state, or purchases a boat that has been registered
    less than a year in the state, shall give bona fide evidence of ownership of at
    least fifty-one per cent of the boat or gear whenever requested to do so by the
    chief or the chief''s designated representative.

    No person shall fail to comply with any provision of this section or division
    rules adopted pursuant thereto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.34
- number: '1533.341'
  heading: Quota management system
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'The chief of the division of wildlife with the approval of the wildlife council,
    in managing the Lake Erie fishery resources, may utilize and establish by division
    rule a quota management system that shall consist of determining on a scientific
    basis by species and number or pounds the maximum allowable annual taking of those
    fishery resources or part thereof in order to prevent over exploitation of any
    species and assure the conservation and wise use of all species, and the determination
    on an equitable basis of the distribution of that maximum allowable annual taking
    between and within the sport and commercial fisheries.

    The chief and the council, in determining and establishing the apportionment of
    the maximum allowable annual taking of a species between the sport and commercial
    fisheries, shall be guided by pertinent scientific, economic, and social data.

    The chief and the council, in determining the distribution of the apportionment
    within the commercial fishery, shall consider pertinent scientific, economic,
    and social data.

    No person shall fail to comply with any quota set pursuant to this section, other
    provisions of this section, or division rule adopted pursuant thereto.

    No person who holds a commercial fishing license issued under section 1533.35
    of the Revised Code and who uses trap nets shall harvest a quantity of yellow
    perch that is in excess of the amount of yellow perch that is allocated for the
    person''s commercial fishing license in accordance with the quota set pursuant
    to this section. In addition, no person who holds a commercial fishing license
    and no employee of such a person shall possess at the same time on a boat on the
    waters of Lake Erie any yellow perch that have been taken from more than one statistical
    district established under division rule for the purpose of implementing the quota
    set pursuant to this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.341
- number: '1533.342'
  heading: Commercial fishing licenses
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) The chief of the division of wildlife, with the approval of the wildlife
    council, may limit the type and number of commercial fishing licenses to be issued
    for fishing in the Lake Erie fishing district and other water wherein nets are
    licensed by law, except that such limitations shall not prohibit any person who
    was issued an Ohio commercial fishing license in the prior fishing season from
    being issued, upon satisfaction of the qualifications established in division
    (C) of this section and proper application, a license of the same type for the
    current fishing season unless the issuance of such a license is prohibited by
    this chapter or Chapter 1531. of the Revised Code or division rule.

    In limiting the number and type of licenses, the chief and the council shall give
    consideration to the number and type of licenses needed to harvest the fish determined
    to be harvestable; the capacity of the boats and characteristics of the equipment
    owned or used by the applicant; and any other facts or data relating to the protection,
    preservation, management, and utilization of fish species in a biologically sound
    manner.

    (B) The chief, in prescribing forms for license applications, may require the
    applicant to list information relating to the kind and condition of boats and
    fishing equipment proposed to be used by the applicant, port or ports of entry,
    years of commercial fishing experience, quantity and kinds of fish taken during
    the previous five years, conviction records relating to Chapter 1531. and this
    chapter of the Revised Code and division rules, and any other facts the chief
    determines necessary to assist the chief in determining whether or not the applicant
    may engage in commercial fishing in accordance with those chapters and division
    rules. All questions shall be answered fully and completely by the applicant.
    The application shall be sworn to and signed by the applicant before a person
    authorized to administer oaths.

    (C) Any person, prior to making application for an Ohio commercial fishing license,
    first shall satisfy the following qualifications to the satisfaction of the chief:
    over eighteen years of age; no prior conviction of or plea of guilty on or after
    October 10, 2007, to a disqualifying offense as determined in accordance with
    section 9.79 of the Revised Code; ninety days Ohio residency immediately preceding
    application; two years commercial fishing gear experience or holder of an Ohio
    commercial license of another gear; and posting of a one thousand dollar performance
    bond or cash deposit in a like amount. In the event the person does not meet these
    pre-application qualifications or does meet those qualifications, but a license
    is not granted, the bond or cash deposit immediately shall be returned by the
    division. In the event the person is granted a license, the bond or cash deposit
    shall be held by the division during the term of the license.

    (D) In determining the terms and conditions of any commercial fishing license,
    the chief, with the approval of the wildlife council, may do both of the following:

    (1) Fix by species, the weight, number, or size of fish to be taken;

    (2) Specify the home port and up to two alternate ports at which the licensee
    shall land the licensee''s catch, as listed on the licensee''s application.

    (E) Any wildlife officer, or other division employee designated by the chief to
    inspect commercial fishing operations, may enter upon any property used, owned,
    or leased by the holder of a commercial fishing license and may inspect any boat,
    net, seine, or other equipment used in commercial fishing; any building or premises
    used to hold, store, repair, or build commercial fishing gear or equipment; and
    any building or premises used in boxing, storing, or processing fish. No person
    shall assault, threaten, abuse, or interfere with any wildlife officer or designated
    inspector when carrying out an inspection under authority of this section, nor
    shall any person prohibit such an inspection.

    (F) No person shall fail to comply with this section or a division rule adopted
    pursuant thereto.

    (G) No person having been issued a commercial fishing license shall fail to comply
    with all terms, specifications, and conditions set forth in the license.

    (H)(1) In addition to other penalties provided in the Revised Code, the license
    of any person who is convicted of assaulting, threatening, abusing, or interfering
    with any person inspecting by authority of this section is suspended upon such
    conviction by operation of law for a period of eighteen fishing season months
    immediately following that conviction.

    (2) In addition to other penalties provided in the Revised Code, the license of
    any person who is convicted of two violations of provisions of this section relating
    to inspection or terms and conditions of any commercial fishing license that occurred
    within a twelve-month period is suspended upon the second such conviction by operation
    of law for a period of sixty fishing season days immediately following that conviction.

    (3) In addition to other penalties provided in the Revised Code, the license of
    any person who is convicted of three or more violations of provisions of this
    section relating to inspection or terms and conditions of any commercial fishing
    licenses that occurred within a twelve-month period is suspended upon the third
    or subsequent such conviction by operation of law for a period of eighteen fishing
    season months immediately following that conviction.

    (I) During any period of suspension, no person shall use or engage in fishing
    with commercial gear owned, used, or controlled at the time of conviction by the
    licensee whose license has been suspended.'
