- number: '1501.16'
  heading: Performance bond refunds fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: There is hereby created in the state treasury the performance bond refunds
    fund. The fund shall consist of money received by the department of natural resources
    from other entities as performance security. Upon the completion of work or satisfaction
    of terms for which the performance bond was required, the money shall be refunded
    to the pledging entity. In the event that the performance bond is forfeited, the
    money shall be transferred to the appropriate fund within the state treasury.
