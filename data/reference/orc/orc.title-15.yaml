- number: '1533.68'
  heading: Suspension or revocation of license or permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'If a person is convicted of a violation of any law relative to the taking,
    possession, protection, preservation, or propagation of wild animals, or a violation
    of division (C) of section 2909.08 of the Revised Code while hunting, or is convicted
    of a violation of any rule of the division of wildlife, the court or magistrate
    before whom the conviction is had, as an additional part of the penalty in each
    case, may suspend or revoke each license or permit issued to the person in accordance
    with any section of the Revised Code pertaining to the hunting, fishing, trapping,
    breeding, and sale of wild animals or the sale of their hides, skins, or pelts.
    No fee paid for such a license or permit shall be returned to the person.

    No person having a license or permit suspended or revoked as provided in this
    section, in the event of a hunting or trapping violation, shall engage in hunting
    or trapping, in the event of a violation of division (C) of section 2909.08 of
    the Revised Code while hunting, shall engage in hunting, or in the event of a
    fishing violation, shall engage in fishing, or purchase, apply for, or receive
    any such license or permit for the following periods of time, as applicable:

    (A) Three years after the date of conviction if the person is convicted of taking
    or possessing a deer in violation of section 1531.02 of the Revised Code;

    (B) Not more than three years after the date of conviction if the person is convicted
    of taking or possessing any other wild animal in violation of section 1531.02
    of the Revised Code, is convicted of a misdemeanor violation of division (C) of
    section 2909.08 of the Revised Code while hunting, or is convicted of a second
    or subsequent violation of section 1533.17 of the Revised Code within a period
    of three consecutive years after the date of conviction of the immediately preceding
    violation of that section;

    (C) Not more than five years after the date of conviction if the person is convicted
    of violating section 1533.171 or of taking or possessing an eagle or osprey in
    violation of section 1533.07 of the Revised Code or is convicted of a felony violation
    of division (C) of section 2909.08 of the Revised Code while hunting;

    (D) Not more than five years after the date of conviction if the person is convicted
    of violating any section of this chapter or Chapter 1531. of the Revised Code
    not specified in division (A), (B), or (C) of this section.

    All licenses and permits suspended or revoked as provided in this section shall
    be taken up by the magistrate and sent to the department of natural resources
    where they shall be filed with a record of the arrest until the person who held
    the suspended or revoked license or permit is lawfully entitled to obtain another
    license or permit.'
