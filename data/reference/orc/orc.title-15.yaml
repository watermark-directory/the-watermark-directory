  url: https://codes.ohio.gov/ohio-revised-code/section-1533.76
- number: '1533.77'
  heading: Records of holder of propagating license - inspection of records
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) Each holder of a noncommercial or commercial propagating license issued
    under section 1533.71 of the Revised Code shall keep the license prominently displayed
    at the place of business specified in the license, and shall keep accurate written
    records that shall include the total number of game birds, game quadrupeds, or
    fur-bearing animals possessed on the date of application for the license, the
    number subsequently propagated or acquired by purchase or gift, the number that
    escaped, the number that were released, the number that died, and the name and
    address of each person or corporation from whom or to whom game birds, game quadrupeds
    or fur-bearing animals were received as a gift or given as a gift or purchased
    or sold alive or sold for food, and the date of each transaction. These records
    shall be kept permanently on the premises stated in the license, and shall be
    open for inspection by any authorized representative of the division of wildlife
    at all reasonable times.

    (B) Each holder of a captive white-tailed deer propagation license issued under
    section 1533.71 of the Revised Code shall maintain all records that are required
    in rules adopted under section 943.24 of the Revised Code. The records shall be
    kept permanently on the premises stated in the license and shall be open for inspection
    by any authorized representative of the department of agriculture at all reasonable
    times and of the division of wildlife at all reasonable times in conjunction with
    an active criminal investigation.

    (C) The holder of a captive white-tailed deer propagation license shall not knowingly
    falsify any record or tag that is required in rules adopted under section 943.24
    of the Revised Code or in rules adopted under section 1531.10 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.77
- number: '1533.79'
  heading: Control or eradication of parasites and diseases; authority of the director
    of agriculture
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) The chief of the division of wildlife may adopt, amend, and rescind such
    rules as the chief considers necessary to control or eradicate parasites and diseases
    of game birds, game quadrupeds other than captive white-tailed deer, fur-bearing
    animals, or nonnative wildlife on the lands subject to sections 1533.71 to 1533.79
    of the Revised Code.

    (B) This chapter and Chapter 1531. of the Revised Code and division rules do not
    supersede the authority of the director of agriculture under Chapter 941. of the
    Revised Code to prevent the spread of dangerously contagious or infectious diseases
    and to provide for the control and eradication of such diseases.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.79
- number: '1533.81'
  heading: Waterfowl hunting area permit required
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Every person who owns, holds, or controls land or water, within a state or
    federal waterfowl management area, shall obtain annually a permit from the chief
    of the division of wildlife prior to permitting the hunting or taking of waterfowl
    on that land or water. The annual permit entitles the permittee to possess or
    control blinds, pits, or similar legal devices of concealment on the lands and
    waters described in the application for a permit. This permit shall be designated
    as a "waterfowl hunting area permit" and shall be displayed openly at the address
    of the area indicated on the application for a permit. All such permits shall
    expire each year at midnight on the first day of February.

    Qualifications and fees for the permit shall be prescribed and set by the chief
    of the division of wildlife, with the approval of the director of the department
    of natural resources, in accordance with Chapters 119. and 1531. of the Revised
    Code. The holders of such permits shall operate in conformity with Chapter 1531.
    of the Revised Code or under such additional rules as the chief of the division
    of wildlife may prescribe.

    No person shall engage in the hunting of waterfowl on an area of land or water
    for which a waterfowl hunting area permit has been issued by the division of wildlife
    without the permission of the person designated on the permit as the owner or
    the person in control of the area.

    The landowner and the children of the owner and persons residing on lands and
    waters within a waterfowl management area shall not be required to secure the
    permit required by this section while the landowner and his children are hunting
    on lands he owns and the other persons are hunting on lands on which they reside.

    The holder of this permit shall daily record the name of each hunter and the number
    and kinds of waterfowl taken on the area on forms provided by the division. The
    records shall be available for inspection by an employee of the division at all
    reasonable times and shall be forwarded to the division within one week after
    the close of each waterfowl season or at more frequent times as may be requested
    by the chief. Falsifying or failure to submit accurate reports constitutes grounds
    for the chief to deny future permits.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.81
- number: '1533.82'
  heading: Effect of child support default on license, certificate or permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) On receipt of a notice pursuant to section 3123.43 of the Revised Code,
