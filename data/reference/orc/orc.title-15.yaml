- number: '1531.05'
  heading: Compensation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'The members of the wildlife council shall receive no compensation for their
    services, but shall be paid the actual and necessary expenses incurred in the
    performance of their official duties.

    The chief of the division of wildlife, in addition to the salary provided by law,
    shall be paid his actual and necessary expenses incurred in the performance of
    his official duties. He shall devote his entire time to the duties of his office,
    and shall hold no other office or position of profit.

    Employees may be allowed and paid all actual and necessary expenses incurred by
    them in the performance of their duties, but only when itemized statements of
    such expenses are certified by the persons incurring the expense and are allowed
    by the chief.'
