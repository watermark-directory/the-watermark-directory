- number: '1533.031'
  heading: Prevention of hunting by creating noise prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person shall purposely prevent or attempt to prevent any person from
    hunting a wild animal as authorized by this chapter by creating noise or loud
    sounds through the use of implements when the use of the implements is intended
    primarily to affect the behavior of the wild animal being hunted, when the hunting
    is taking place on lands or waters upon which the hunting activity may lawfully
    occur, and when the noise or loud sounds are created on lands or waters other
    than the lands or waters upon which the hunting activity may lawfully occur. "Implements"
    does not include items being used in the due course of farming, forestry, or commercial
    practices.

    (B) Upon petition by a person who is or reasonably may be affected by conduct
    that violates or will violate division (A) of this section and a showing by that
    person that the conduct has occurred in a particular place and may reasonably
    be expected to occur in or near that place again, a court of common pleas may
    enjoin the conduct in accordance with Civil Rule 65.'
