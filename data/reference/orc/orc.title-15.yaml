- number: '1547.91'
  heading: Wrecking
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'No person, with purpose to unlawfully damage, ground, or sink a vessel afloat,
    shall do any of the following:

    (A) Employ any false signal, buoy, or other aid to navigation;

    (B) Tamper with any signal, buoy, or other aid to navigation;

    (C) Do any act which creates an imminent and substantial risk that any vessel
    afloat will be damaged, grounded, sunk, or scuttled.'
