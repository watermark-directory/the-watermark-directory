- number: '1514.021'
  heading: Application for renewal of permit or renewal permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: '(A) A permit holder who wishes to continue surface or in-stream mining operations
    after the expiration date of the existing permit or renewal permit shall file
    with the chief of the division of mineral resources management a notice of intent
    to renew for purposes of the renewal of a surface or in-stream mining permit or
    renewal permit at least ninety days before the expiration date of the existing
    permit or renewal permit. The notice of intent to renew shall be on a form that
    the chief prescribes and provides and shall be accompanied by a permit renewal
    fee. The amount of the fee for renewal of a surface mining permit or renewal permit
    shall be one thousand dollars, and the amount of the fee for renewal of an in-stream
    mining permit or renewal permit shall be five hundred dollars.

    (B) Upon receipt of a notice of intent to renew form and the permit renewal fee
    under division (A) of this section, the chief shall notify the permit holder to
    submit a renewal application package. The permit holder shall submit a complete
    renewal package to the chief at least thirty days prior to the expiration of the
    existing surface or in-stream mining permit or renewal permit. The renewal application
    package shall include all of the following:

    (1) A map that is a composite of the information required to be contained in the
    most recent annual report map under section 1514.03 of the Revised Code and of
    all surface or in-stream mining and reclamation activities conducted under the
    existing permit or renewal permit;

    (2) The annual report required under section 1514.03 of the Revised Code;

    (3) In the case of an applicant proposing a significant change to the plan of
    mining and reclamation, as "significant" is defined by rule, a copy of the advertisement
    that is required to be published in accordance with section 1514.022 of the Revised
    Code;

    (4) Additional maps, plans, and revised or updated information that the chief
    determines to be necessary for permit renewal.

    For a renewal permit requiring minor or minimal updates to the existing permit,
    renewal permit, or accompanying information, the chief may authorize a permit
    holder to file updated information through a surface mining permit modification
    process using a surface mining permit modification form. However, the chief may
    require such a permit holder to submit a complete renewal application package.

    (C)(1) Upon receipt of the complete renewal application package required under
    division (B) of this section and except as otherwise provided in division (C)(2)
    of this section, the chief shall approve the application for renewal and issue
    an order granting a renewal permit unless the chief finds that any of the following
    applies:

    (a) The permit holder''s operation is not in substantial or material compliance
    with this chapter, rules adopted and orders issued under it, and the plan of mining
    and reclamation under the existing permit or renewal permit.

    (b) The permit holder has not provided evidence that a performance bond filed
    under section 1514.04 of the Revised Code applicable to lands affected under the
    existing permit or renewal permit will remain effective until released under section
    1514.05 of the Revised Code.

    (c) The permit holder, any partner if the permit holder is a partnership, any
    officer or director if the permit holder is a corporation, or any other person
    who has a right to control or in fact controls the management of the permit holder
    or the selection of officers, directors, or managers of the permit holder has
    failed substantially or materially to comply or continues to fail to comply with
    this chapter as provided in section 1514.02 of the Revised Code.

    (2) If the application for renewal proposes significant changes to the plan of
    mining and reclamation, as "significant" is defined by rule, the chief may, but
    is not required to, approve the application for renewal.

    (D)(1) After receiving a complete renewal application package and permit renewal
    fees required under divisions (A) and (B) of this section, the chief shall do
    one of the following:

    (a) Approve the application for renewal and issue an order granting a renewal
    permit;

    (b) Issue an order denying a renewal permit;

    (c) Notify the applicant in accordance with division (D)(2) of this section that
    there are deficiencies in the renewal application package and that an extension
    of the time limit for issuing an order approving or disapproving the renewal permit
    has been granted.

    In making a decision regarding a renewal application package, the chief shall
    review the package for compliance with this chapter and rules adopted under it.

    (2) The chief shall notify a permit holder and, if applicable, the permit holder''s
    consultant, surveyor, or engineer of deficiencies or errors in a renewal application
    package and shall include in the notification a discussion of the deficiencies
    or errors.

    A permit holder shall have up to one hundred eighty days after the expiration
    of the permit holder''s permit or renewal permit to submit a revised renewal application
    package. A permit holder may request, in writing, an extension of the one hundred-eighty-day
    period for revisions to the renewal application package. The chief may approve
    a sixty-day extension. The chief shall notify the permit holder of the chief''s
    decision to either grant or deny the extension.

    Upon the submission of a revised renewal application package that is determined
    to be complete by the chief, the chief shall proceed to approve or deny the application
    in accordance with division (D)(1)(a) or (b) of this section. If the revised renewal
    application package is not submitted within one hundred eighty days after the
    permit expiration date or, if an extension has been granted, within two hundred
    forty days after the permit expiration date, the chief shall issue an order denying
    the renewal permit in accordance with division (D)(1)(b) of this section.

    (E) If an applicant for a renewal permit has complied with division (A) of this
    section, the applicant may continue surface or in-stream mining operations under
    the existing permit or renewal permit after its expiration date until the time
    period for filing a complete renewal application package has expired under division
    (D) of this section or until the chief issues an order denying the renewal permit.

    (F) A permit holder who fails to submit a notice of intent to renew form and required
    permit renewal fees within the time prescribed by division (A) of this section
    and a renewal application package under division (B) of this section shall cease
    surface or in-stream mining operations on the expiration date of the existing
    permit or renewal permit. If such a permit holder then submits a notice of intent
    to renew form, an application for renewal, and the permit renewal fees on or before
    the thirtieth day after the expiration date of the expired permit or renewal permit
    and provides the information required by the chief under division (B) of this
    section within sixty days after the permit expiration date, the permit holder
    need not submit the final map and report required by section 1514.03 of the Revised
    Code until the later of thirty days after the chief issues an order denying the
    application for renewal or thirty days after the chief''s order is affirmed upon
    appeal under section 1513.13 or 1513.14 of the Revised Code. An applicant under
    this division who fails to provide the information required by the chief under
    division (B) of this section within the prescribed time period shall submit the
    final map and report required by section 1514.03 of the Revised Code within thirty
    days after the expiration of that prescribed period.

    (G) If the chief issues an order denying an application for renewal of a permit
    or renewal permit after the expiration date of the permit, the permit holder shall
    cease surface or in-stream mining operations immediately and, within thirty days
    after the issuance of the order, shall submit the final report and map required
    under section 1514.03 of the Revised Code. The chief shall state the reasons for
    denial in the order denying renewal of the permit. A permit holder may appeal
    the chief''s order denying the renewal under section 1513.13 of the Revised Code
    and may continue surface or in-stream mining and reclamation operations under
    the expired permit until the reclamation commission affirms the chief''s order
    under that section and, if the applicant elects to appeal the order of the commission
    under section 1513.14 of the Revised Code, until the court of appeals affirms
    the order.

    (H) The approval of an application for renewal under this section authorizes the
    continuation of an existing surface mining permit or renewal permit for a term
    of fifteen years from the expiration date of the existing permit.

    The approval of an application for renewal under this section authorizes the continuation
    of an existing in-stream mining permit or renewal permit for a term of five years
    from the expiration date of the existing permit.

    (I) Any renewal permit is subject to all the requirements of this chapter and
    rules adopted under it.'
