- number: '1531.30'
  heading: Cooperative management fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: There is hereby created in the state treasury the cooperative management fund.
    All revenue generated on land owned by the United States army corps of engineers
    and managed by the division of the wildlife of the department of natural resources
    pursuant to an agreement with the corps shall be credited to the fund. All money
    in the fund shall be spent for fish and wildlife management purposes and for the
    management and maintenance of the area managed by the division. All investment
    earnings of the fund shall be credited to the fund.
  history: null
