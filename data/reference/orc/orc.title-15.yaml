- number: '1547.39'
  heading: Requiring capacity plate
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) No person, after January 1, 1977, shall manufacture, sell, or offer for
    sale any watercraft propelled by machinery as its principal source of power, or
    watercraft designed to be manually propelled, less than twenty feet in length,
    and designed to carry two or more persons, manufactured after that date, unless
    a capacity plate containing the correct information, as prescribed by regulations
    adopted by the United States coast guard, is firmly attached to the watercraft.
    The capacity plate shall be attached in such a location that it is clearly legible
    from the position designed or intended to be occupied by the operator when the
    watercraft is underway.

    (B) No person shall operate or permit to be operated on the waters in this state
    watercraft for which a capacity plate is required under this section unless the
    capacity plate is attached.

    (C) No person shall alter, remove, or deface any information contained on the
    capacity plate unless the manufacturer has altered the watercraft in such a way
    that would require a change in the information contained on the capacity plate.

    (D) As used in this section, "manufacture" means to construct or assemble a watercraft,
    or to alter a watercraft in such a manner as to affect or change its weight capacity
    or occupant capacity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.39
- number: '1547.40'
  heading: Exceeding capacity plate figures
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) No person shall operate or permit to be operated on the waters in this
    state a watercraft to which a capacity plate is attached if the total load exceeds
    the weight capacity indicated on the capacity plate, if the number of persons
    aboard exceeds the occupant capacity indicated on the capacity plate, or if the
    horsepower of any attached outboard motor exceeds the maximum horsepower indicated
    on the capacity plate.

    (B) When no capacity plate exists, no person shall operate or permit to be operated
    on the waters in this state a watercraft if a reasonably prudent person would
    believe that either of the following circumstances applies:

    (1) The total load aboard the watercraft has associated with it a risk of physical
    harm to persons or property;

    (2) The total horsepower of any inboard engine or attached outboard motor has
    associated with it a risk of physical harm to persons or property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.40
- number: '1547.41'
  heading: Personal watercraft operation requirements
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A)(1) No person shall operate or permit the operation of a personal watercraft
    unless each person on the watercraft is wearing a coast guard approved wearable
    personal flotation device used in compliance with manufacturer labeling.

    (2) A person operating a personal watercraft that is equipped by the manufacturer
    with a lanyard type engine cutoff switch shall attach the lanyard to the person,
    the person''s clothing, or the personal flotation device as appropriate for the
    specific watercraft.

    (3) No person shall operate a personal watercraft at any time between sunset and
    sunrise.

    (4) No person who owns a personal watercraft or who has charge over or control
    of a personal watercraft shall authorize or knowingly permit the personal watercraft
    to be operated in violation of this chapter.

    (B) This section does not apply to a person who is participating in a regatta,
    race, marine parade, tournament, or exhibition that is operated in accordance
    with section 1547.20 of the Revised Code or that is coast guard approved.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.41
- number: '1547.49'
  heading: Littering prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) As used in this section, "litter" means garbage, trash, waste, rubbish,
    ashes, cans, bottles, wire, paper, cartons, vessel parts, vehicle parts, furniture,
    glass, or anything else of an unsightly or unsanitary nature.

    (B) No operator or occupant of a vessel shall, regardless of intent, throw, drop,
    discard, or deposit litter from any vessel in operation or control upon or in
    any waters in this state, except into a litter receptacle in a manner that prevents
    its being carried away or deposited by the elements.

    (C) No operator of a vessel in operation upon any waters in this state shall allow
    litter to be thrown, dropped, discarded, or deposited from the vessel, except
    into a litter receptacle in a manner that prevents its being carried away or deposited
    by the elements.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.49
- number: '1547.51'
  heading: Educational programs
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) A natural resources officer shall conduct educational programs in vessel
    safety, sanitation, and operation and in other related subjects that the director
    of natural resources, in consultation with the chief of the division of parks
    and watercraft, considers appropriate or necessary.

    (B) Except as authorized by division (C) of this section, no natural resources
    officer or other law enforcement officer as described in section 1547.63 of the
    Revised Code shall stop or board any vessel solely for the purpose of conducting
    a safety inspection of the vessel unless the owner or operator voluntarily requests
    the officer to conduct a safety inspection of the vessel.

    (C) A natural resources officer or other law enforcement officer as described
    in section 1547.63 of the Revised Code may stop, board, and conduct a safety inspection
    of any vessel if either of the following applies:

    (1) The officer has a reasonable suspicion that the vessel, the vessel''s equipment,
    or the vessel''s operator is in violation of this chapter or rules or is otherwise
    engaged in a violation of a law of this state or a local ordinance, resolution,
    rule, or regulation adopted in compliance with the provisions of Chapter 1547.
    of the Revised Code within the territorial jurisdiction of the officer;

    (2) The officer is conducting a vessel safety inspection in the course of an authorized
    checkpoint operation in accordance with rules.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.51
- number: '1547.53'
  heading: Numbering of watercraft - exemptions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'Every watercraft operated on the waters in this state shall be numbered by
    this state in accordance with federal law or a federally approved numbering system
    of another state. A watercraft numbered by this state shall display the number
    on the watercraft as provided in section 1547.57 of the Revised Code. Watercraft
    exempt from numbering by the state are:

    (A) Those currently documented by the United States coast guard or its successor;

    (B) Those whose principal use is not on the waters in this state and that have
    not been used within this state for more than sixty days and have a valid number
    assigned under a federally approved numbering system by another state if the number
    is displayed in accordance with the requirements of that system and the certificate
    of number is available for inspection whenever the watercraft is on waters in
    this state;

    (C) Those from a country other than the United States, temporarily using the waters
    in this state;

    (D) Those whose owner is the United States, a state, or a political subdivision
    of a state, that fit either of the following descriptions, and that are clearly
    identifiable as such:

    (1) A powercraft that principally is used for governmental purposes other than
    recreational purposes;

    (2) A watercraft other than a powercraft.

    (E) A ship''s lifeboat. As used in this division, "lifeboat" means a watercraft
    that is held aboard another vessel and used exclusively for emergency purposes.

    (F) Those that have been exempted from numbering by the chief of the division
    of parks and watercraft after the chief has found that the numbering of the watercraft
    will not materially aid in their identification and, if an agency of the United
    States has a numbering system applicable to the watercraft, after the chief has
    further found that they also would be exempt from numbering by the United States
    government if they were subject to the federal law;

    (G) Those temporarily using the waters in this state under a waiver issued by
    the chief to an organization sponsoring a race, regatta, or special event. The
    chief may issue a waiver upon application by the sponsoring organization at least
    fifteen days before the date of the proposed race, regatta, or special event.
    The waiver shall be effective for ten days including the day or days of the proposed
    race, regatta, or special event. Such a waiver does not obviate the need for compliance
    with section 1547.20 of the Revised Code.

    (H) Canoes, rowboats, and inflatable watercraft that are registered under section
    1547.54 of the Revised Code and that an owner, in accordance with this division,
    chooses not to have numbered under this section. An owner of a canoe, rowboat,
    or inflatable watercraft may choose to do either of the following:

    (1) Have it numbered under this section, pay a lesser registration fee under division
    (A)(2)(a) of section 1547.54 of the Revised Code, and obtain square tags under
    division (A) of section 1547.57 of the Revised Code;

    (2) Not have it numbered under this section, pay a higher registration fee under
    division (A)(2)(b) of section 1547.54 of the Revised Code, and obtain a rectangular
    tag under division (C) of section 1547.57 of the Revised Code.'
