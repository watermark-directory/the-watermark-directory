- number: '1533.03'
  heading: Prevention of authorized hunting, trapping, or fishing prohibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: '(A) No person shall purposely prevent or attempt to prevent any person from
    hunting, trapping, or fishing for a wild animal as authorized by this chapter
    by any of the following means:

    (1) Placing oneself in a location in which he knows or should know that his presence
    may affect the behavior of the wild animal being hunted, trapped, or fished for
    or otherwise affect the feasibility of the taking of the wild animal by the hunter,
    trapper, or fisherman;

    (2) Creating a visual, aural, olfactory, or physical stimulus intended to affect
    the behavior of the wild animal being hunted, trapped, or fished for;

    (3) Affecting the condition or location of personal property intended for use
    in the hunting, trapping, or fishing activity.

    (B) No person shall fail to obey the order of a peace officer or wildlife officer
    to desist from conduct that violates division (A) of this section.

    (C) This section applies only to acts committed on lands or waters upon which
    hunting, trapping, or fishing activity may lawfully occur. This section does not
    apply to acts of a peace officer, the owner of the lands or waters, or a tenant
    or other person acting under authority of the owner on the lands or waters.

    (D) Upon petition by a person who is or reasonably may be affected by conduct
    that violates or will violate division (A) of this section and a showing by that
    person that the conduct has occurred in a particular place and may reasonably
    be expected to occur in or near that place again, a court of common pleas may
    enjoin the conduct in accordance with Civil Rule 65.

    (E) As used in this section, "peace officer" has the same meaning as in section
    2935.01 of the Revised Code, and "wildlife officer" has the same meaning as in
    section 1531.13 of the Revised Code.'
