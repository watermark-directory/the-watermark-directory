- number: '1522.121'
  heading: Submission for withdrawing ground water
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'Along with an application for a permit submitted under section 1522.12 of
    the Revised Code, an applicant that proposes to withdraw ground water shall submit
    data in a form prescribed by the chief of the division of water resources that
    includes all of the following:

    (A) A hydrologic map consisting of a single map using the most recent USGS 7.5
    minute topographic maps at a scale of 1:24,000 as a base or other approved format
    that shows all of the information described in section 1521.122 of the Revised
    Code;

    (B) A hydrogeologic description in sufficient detail to determine the cone of
    depression for the proposed withdrawal that includes all of the information described
    in section 1522.123 of the Revised Code;

    (C) A steady state ground water model that defines the projected cone of depression
    for the proposed withdrawal that complies with section 1522.124 of the Revised
    Code;

    (D) Alternative water supply information that includes an analysis of the availability
    and suitability of alternative water supply sources that will be utilized to fulfill
    the water supply replacement provisions of section 1522.24 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.121
- number: '1522.122'
  heading: Notations on hydrologic map
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'An applicant shall show all of the following on the hydrologic map required
    under division (A) of section 1522.121 of the Revised Code:

    (A) The proposed withdrawal area;

    (B) The hydrologic study area;

    (C) A line delineating the location of the cross sections required under division
    (E) of section 1522.123 of the Revised Code;

    (D) The location of and assigned identification number for the selected water
    supply wells identified in division (D) of section 1522.123 of the Revised Code
    and all other water sources used for domestic, agricultural, or industrial use
    within the proposed withdrawal area and hydrologic study area;

    (E) The location of any well, well field, reservoir, river, and water source not
    identified under division (D) of this section on or within the hydrologic study
    area that is used for a public water supply and any facility registered under
    section 1521.16 of the Revised Code on or within the hydrologic study area;

    (F) Any additional information that the chief of the division of water resources
    may require based on site-specific conditions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.122
- number: '1522.123'
  heading: Documentation with hydrogeologic description
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'An applicant shall include all of the following with the hydrogeologic description
    required under division (B) of section 1522.121 of the Revised Code:

    (A) A detailed description of the geology within the proposed withdrawal and hydrologic
    study area down to the lowest level of any aquifer from which water is proposed
    to be withdrawn. The description must include the areal and structural geology
    of the withdrawal and hydrologic study area, and any other parameter that may
    affect the occurrence, availability, movement, or quantity of potentially affected
    ground waters. The description must be based on information available to the applicant
    from test borings, core drillings, well logs, and geologic literature and practices.

    (B) Information related to the ground water hydrology for the proposed withdrawal
    and hydrologic study area including, at a minimum, all of the following:

    (1) The elevation and the lateral extent of each aquifer, interbedded lithology,
    and overburden material;

    (2) The thickness of each aquifer and a detailed lithologic description from surface
    to base of the deepest aquifer, noting any changes in lithology over distance;

    (3) Known uses of and withdrawals from the water in each aquifer;

    (4) The transmissivity of each aquifer;

    (5) The storativity of each aquifer;

    (6) The hydraulic conductivity of each aquifer;

    (7) The specific yield of each unconfined aquifer;

    (8) The rate of discharge of any currently registered water withdrawals shown
    pursuant to division (E) of section 1522.122 of the Revised Code;

    (C) A listing of the published information and data, and copies of the unpublished
    records and data, used in preparation of the items in divisions (A) and (B) of
    this section including core descriptions, cuttings descriptions, stratigraphic
    descriptions, and pump or slug test records;

    (D) A water supply inventory representing all aquifers submitted in a format prescribed
    by the chief of the division of water resources that, at a minimum, includes all
    of the following:

    (1) All of the existing water wells within the study area if there are fewer than
    one hundred wells. If there are more than one hundred wells within the study area,
    the inventory must include one hundred wells plus twenty-five per cent of those
    wells in excess of one hundred, but shall not exceed a total of three hundred
    wells.

    (2) A listing of water sources in the proposed withdrawal and hydrologic study
    area as shown pursuant to divisions (D) and (E) of section 1522.122 of the Revised
    Code. Such water sources must include the most recently drilled wells, represent
    all aquifers and producing zones within the aquifers, and reflect a uniform geographical
    distribution of wells within the study area. The listing must include, to the
    extent available, all of the following for each well:

    (a) The map identification number listed under division (D) of section 1522.122
    of the Revised Code;

    (b) The department of natural resources, division of water resources number assigned
    to the log form required to be filed under section 1521.05 of the Revised Code;

    (c) The township in which each well is located;

    (d) The year the well was drilled;

    (e) The latitude and longitude in NAD 83 of the well;

    (f) The surface elevation of the well in feet;

    (g) The total depth of the well in feet below the land surface;

    (h) The depth to bedrock in feet;

    (i) A description of unconsolidated material;

    (j) The static water level of the well in feet below the land surface;

    (k) The casing length in feet;

    (l) The lithology of the screen interval/open borehole;

    (m) The length of any well screen in feet;

    (n) The test rate in gallons per minute;

    (o) The duration of the test;

    (p) The drawdown in feet.

    (3) A listing of the location and type of any public water supply sources within
    the withdrawal and hydrologic study area;

    (4) A copy of the division of water resources well logs for the wells listed in
    division (D) of this section.

    Prior to submission of an application, an applicant may submit a request in writing
    to the chief to reduce the number or extent of the submittals required in division
    (D) of this section. The chief may grant the request only if the chief makes a
    written determination that this reduction will not diminish the level of accuracy
    in the ground water model. If the chief grants a reduction, the written request
    and determination shall be submitted with the permit application. If information
    required in the water supply inventory of division (D) of this section is unobtainable,
    a statement to that effect shall be submitted, giving the reasons therefor.

    (E) A minimum of two perpendicular hydrogeologic cross sections of the same scale
    for the hydrologic study area based on available information. Such cross sections
    must be of uniform horizontal and uniform vertical scale, depict the information
    required in divisions (B)(1) and (2) of this section, intersect the center of
    the proposed withdrawal, and include the data points used to construct the cross
    section.

    (F) Any other information the chief may require.

    For purposes of the hydrogeologic description and to establish pre-pumping water
    level conditions, the chief may require the applicant to monitor water levels
    from each aquifer from which water is proposed to be withdrawn. The applicant
    shall conduct such monitoring via the wells listed in division (D) of this section
    or new monitoring wells drilled by the applicant. The chief also may require pre-pumping
    tests.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.123
- number: '1522.124'
  heading: Steady state ground water model
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) An applicant shall ensure that both of the following apply to the steady
    state ground water model required under division (C) of section 1522.121 of the
    Revised Code:

    (1) It accurately reflects the ground water flow conditions associated with the
    hydrologic study area and is consistent with American society for testing and
    materials international standards.

    (2) It is in the form of a three-dimensional ground water flow model utilizing
    finite difference modeling software or other modeling software acceptable to the
    chief of the division of water resources.

    (B) The applicant shall submit the model results in a format prescribed by the
    chief. The applicant shall include detailed explanations of the hydrologic and
    geologic parameters used to construct the model, including all of the following:

    (1) The saturated thickness of each aquifer;

    (2) The elevation of the static water level or potentiometric surface of each
    aquifer;

    (3) Whether each aquifer is confined or unconfined;

    (4) The pumping water level elevation at steady state conditions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.124
- number: '1522.125'
  heading: Establishment of geographic area
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: The chief of the division of water resources shall use the data submitted
    under sections 1522.121 to 1522.124 of the Revised Code to establish the geographic
    area defined by the ten-foot contour line of the projected cone of depression
    for any approved application for the withdrawal of ground water. However, the
    chief may designate a different contour line based upon water resource availability,
    seasonal variations, other water users in the hydrologic study area, or other
    ground water data available.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.125
- number: '1522.13'
  heading: Issuance of withdrawal and consumptive use permit; requirements
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) The chief of the division of water resources shall not issue a withdrawal
    and consumptive use permit for a facility if the chief determines that the facility
    does not meet all of the criteria established in Section 4.11 of the compact.

    (B) In applying the provision of the decision-making standard established in Section
    4.11.2 of the compact, the chief shall require that a withdrawal or consumptive
    use will be implemented so as to ensure that the withdrawal or consumptive use
    will result in no significant individual or cumulative adverse impacts on the
    quantity or quality of the waters and water dependent natural resources of the
    great lakes basin considered as a whole or of the Lake Erie source watershed considered
    as a whole. As part of the evaluation of a permit application under Section 4.11.2
    of the compact, the chief shall do all of the following:

    (1) Rely on the best generally accepted scientific methods appropriate for this
    state derived from professionally accepted resources and practices;

    (2) Consider the long-term mean annual inflow and outflow of the Lake Erie source
    watershed;

    (3) Consider the withdrawal and the portion of the withdrawal that is not returned
    to the Lake Erie source watershed.

    (C) Impacts of a withdrawal or consumptive use on the quantity or quality of waters
    and water dependent natural resources of more localized areas that affect less
    than the great lakes basin considered as a whole or the Lake Erie source watershed
    considered as a whole shall be considered as a part of the evaluation of whether
    a proposed withdrawal or consumptive use is reasonable as provided in Section
    4.11.5 of the compact.

    (D) The chief shall not submit an application for a withdrawal and consumptive
    use permit for regional review under Section 4.5.2(c)(ii) of the compact to the
    regional body as defined in Section 1.2 of the compact unless regional review
    is agreed to by the applicant.

    (E) Nothing in sections 1522.10 to 1522.30 of the Revised Code shall be construed
    to affect, limit, diminish, or impair any rights validly established and existing
    under the laws of this state as of December 8, 2008, including, but not limited
    to, sections 1506.10 and 1521.17 of the Revised Code, or to limit a person''s
    right to the reasonable use of ground water, water in a lake, or any other watercourse
    in contravention of Section 19b of Article I, Ohio Constitution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.13
- number: '1522.131'
  heading: Experimental use permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) To encourage the development of innovative water use practices and technologies
    that ensure sustainable water use for industrial, commercial, residential, agricultural,
    or public purposes, including recreational and cultural resources, as a means
    to facilitate sustainable economic growth and job creation, the chief of the division
    of water resources, with the approval of the director of natural resources, may
    issue experimental use permits. An experimental use permit may be issued in lieu
    of a withdrawal and consumptive use permit as determined appropriate by the chief.

    (B) An experimental use permit may be issued if all of the following apply:

    (1) The experimental use is reasonable based on a consideration of the factors
    specified in Section 4.11.5 of the compact.

    (2) The experimental use will use no more water than is necessary to determine
    the effectiveness and economic feasibility of the experimental use.

    (3) The experimental use does not reduce the protection afforded the waters and
    water dependent natural resources of the source watershed as defined in the compact
    below what is provided in this chapter and rules adopted under it.

    (C) The chief may refuse to issue an experimental use permit if the chief determines
    that the proposed use will result in significant individual or cumulative adverse
    impacts on the quantity or quality of the waters and water dependent natural resources
    of the great lakes basin considered as a whole or the Lake Erie source watershed
    considered as a whole.

    (D) The chief shall issue or deny a permit under this section through issuance
    of an order.

    (E) The chief shall establish the terms and conditions of an experimental use
    permit and may suspend such a permit, at any time, if the chief finds that its
    terms or conditions are being violated or that its terms and conditions are inadequate
    to avoid significant individual or cumulative adverse impacts on the quantity
    or quality of the waters and water dependent natural resources of the great lakes
    basin considered as a whole or the Lake Erie source watershed considered as a
    whole.

    (F) An experimental use permit issued under this section shall expire not later
    than twenty-four months after the date of issuance of the permit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.131
- number: '1522.14'
  heading: Facilities exempt from permit requirements
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'The following are exempt from the requirement to obtain a withdrawal and
    consumptive use permit:

    (A) A facility or proposed facility that has a withdrawal and consumptive use
    capacity or proposed capacity below the threshold amounts established in divisions
    (A)(1) to (3) of section 1522.12 of the Revised Code;

    (B) A facility that has a new or increased withdrawal capacity above an applicable
    threshold amount established in section 1522.12 of the Revised Code if either
    of the following apply:

    (1) Except as provided in division (B)(2) of this section, the new or increased
    maximum daily withdrawal of the facility is less than the applicable threshold
    amount when averaged over any ninety-day period.

    (2) The new or increased maximum daily withdrawal of the facility is less than
    the applicable threshold amount when averaged over any forty-five-day period with
    regard to a facility with withdrawals from a river or stream that is a high quality
    water when the withdrawals are made at a point where the area of the watershed
    of the river or stream is less than one hundred square miles but greater than
    fifty square miles.

    Division (B) of this section does not apply to withdrawals of a facility from
    a river or stream that is a high quality water when the withdrawals are made at
    a point where the area of the watershed of the river or stream is fifty square
    miles or less.

    (C) A baseline facility that has not increased its withdrawal and consumptive
    use capacity beyond the capacity listed in the baseline report and beyond the
    threshold amounts established in section 1522.12 of the Revised Code;

    (D) An electric generating facility that increases its consumptive use due to
    a requirement imposed by a federal regulation that is unrelated to an increase
    in production at the facility;

    (E) A facility making a withdrawal and consumptive use from an impoundment of
    water collected primarily from diffused surface water sources, including a farm
    pond, golf course pond, nursery pond, stormwater retention pond, or other private
    pond; or a facility making a withdrawal and consumptive use from any stream or
    river to augment the water supply of an impoundment of water if the impoundment
    is used, at least in part, for firefighting purposes. The exemption established
    by this division does not apply to a facility making a withdrawal and consumptive
    use for industrial purposes or for public water supply purposes.

    (F) A facility that must temporarily establish a new or increased withdrawal and
    consumptive use capacity as a result of an emergency for the duration of that
    emergency that, without the new or increased withdrawal and consumptive use capacity,
    will result in imminent harm to human health or property;

    (G) A facility that is establishing a new or is increasing its withdrawal and
    consumptive use capacity in compliance with an experimental use permit issued
    under section 1522.131 of the Revised Code;

    (H) A facility that must temporarily establish a new or increased withdrawal and
    consumptive use capacity in order to respond to a humanitarian crisis for the
    duration of that crisis if the new or increased capacity is necessary to assist
    in the management of that crisis;

    (I) A facility that is exempt from the requirement to obtain a permit under division
    (D) or (E) of section 1521.23 of the Revised Code;

    (J) A facility that is subject to regulation under Chapter 1514. of the Revised
    Code;

    (K) A facility that purchases all of its water from a public water system;

    (L) A facility that is withdrawing or consumptively using water from an off-stream
    impoundment that has been substantially filled with a stream withdrawal by a baseline
    facility or with a stream withdrawal that is subject to a withdrawal and consumptive
    use permit;

    (M) A facility that is increasing its withdrawal or consumptive use capacity directly
    related to supplying a major electric generating facility that is subject to regulation
    under Chapter 4906. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.14
- number: '1522.15'
  heading: Transfer of permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A)(1) Transfer of a withdrawal and consumptive use permit upon the sale
    or transfer of a facility may occur so long as the location of the facility, the
    source of water, and the withdrawal and consumptive use capacities do not change.
    Transfer of the baseline withdrawal and consumptive use capacity of a baseline
    facility upon the sale or transfer of the baseline facility may occur so long
    as the location of the facility, the source of water, and the withdrawal and consumptive
    use capacities do not change. Transferred capacity of a baseline facility does
    not require a withdrawal and consumptive use permit.

    Notice of a transfer shall be provided to the chief of the division of water resources
    in a manner prescribed by the chief.

    (2) If the owner of a facility for which a withdrawal and consumptive use permit
    has been issued sells or transfers a portion of the facility, transfer of the
    applicable portion of the withdrawal and consumptive use capacity authorized by
    the withdrawal and consumptive use permit may occur so long as the location of
    the facility, the source of water, and the total withdrawal and consumptive use
    capacities do not change. The permittee shall provide notice of such a transfer
    to the chief in a manner prescribed by the chief. Upon receipt of the notice and
    if a permit is required for the transferred portion based on the threshold amounts
    established in divisions (A)(1) to (3) of section 1522.12 of the Revised Code,
    the chief shall issue a new permit for the transferred portion of the facility
    to the transferee and a modified permit for the remaining portion of the facility
    to the original permittee upon a showing that the transferee will meet the conditions
    of the original permit and all applicable requirements of this chapter and rules
    adopted under it. Any new permit shall reflect the portion of the withdrawal and
    consumptive use capacity that has been transferred.

    (3) If the owner of a baseline facility sells or transfers a portion of the baseline
    facility, transfer of the applicable portion of the withdrawal and consumptive
    use capacity listed in the baseline report for that facility may occur so long
    as the location of the facility, the source of water, and the total withdrawal
    and consumptive use capacities do not change. The owner shall provide notice of
    such a transfer to the chief in a manner prescribed by the chief. The chief shall
    not require the owner of the baseline facility or the transferee to obtain a withdrawal
    and consumptive use permit, but shall update the baseline report to reflect the
    transfer.

    (4) The chief may deny a transfer under this section by issuing an order denying
    the transfer and sending written notice to the permittee and the transferee not
    later than thirty days after notice of the intended transfer. The chief shall
    deny the transfer if the chief determines that the transfer will result in noncompliance
    with this chapter, rules adopted under it, or the terms and conditions of a withdrawal
    and consumptive use permit.

    (5) The chief shall remove a facility from the baseline report when the facility
    is subject to baseline facility abandonment. However, a baseline facility shall
    not be removed from the baseline report due to the transfer of the facility''s
    baseline capacity.

    (B) No person shall sell or transfer a withdrawal and consumptive use permit for
    purposes of evading the requirements established in sections 1522.10 to 1522.30
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.15
- number: '1522.16'
  heading: Petitions regarding baseline reports
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A)(1) The owner or operator of a facility may petition the chief of the
    division of water resources for either of the following:

    (a) Inclusion in the baseline report if the owner or operator believes that the
    facility was erroneously excluded from the report;

    (b) The amendment of the amount of a withdrawal and consumptive use or other information
    included in the baseline report regarding the facility if the owner or operator
    believes that the information is incorrect.

    (2) The chief shall issue an order either approving or disapproving a petition
    submitted under this section. The chief shall issue the order based on a thorough
    examination of the circumstances concerning the petition.

    (3) The chief shall adopt rules in accordance with Chapter 119. of the Revised
    Code that establish procedures for the submission of petitions under this division.

    (B) With regard to the nonuse of a baseline facility''s or a facility''s withdrawal
    and consumptive use capacity, not later than sixty days after the time period
    specified in division (B)(1) or (2) or (I)(1) or (2) of section 1522.10 of the
    Revised Code, the owner or operator of the facility may request an extension from
    the chief to retain the facility''s active status. The request shall be made in
    a manner prescribed by the chief. The chief shall determine the appropriate terms
    and conditions of the extension, if approved, based on information submitted by
    the owner or operator. The chief shall issue an order approving or disapproving
    the request and shall do so in a manner prescribed by the chief.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.16
- number: '1522.17'
  heading: Submission of facility water conservation plan
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) The owner or operator of a facility who is applying for a withdrawal
    and consumptive use permit shall submit to the chief of the division of water
    resources a facility water conservation plan that incorporates environmentally
    sound and economically feasible water conservation measures in accordance with
    Section 4.11.3 of the compact. If the plan reasonably incorporates environmentally
    sound and economically feasible water conservation measures applicable to the
    facility, it shall be deemed to be in compliance with Section 4.11.3 of the compact.

    (B) The chief shall keep confidential any portions of a facility water conservation
    plan that constitute a trade secret as defined in section 1333.61 of the Revised
    Code as follows:

    (1) During the period of time after confidentiality is requested under division
    (C) of this section and until the chief makes a determination to approve or disapprove
    the request;

    (2) On and after the date on which the chief approves a request for confidentiality
    under division (C) of this section.

    Any portions of a facility water conservation plan that are kept confidential
    as provided in this division are not subject to section 149.43 of the Revised
    Code.

    (C)(1) The owner or operator of a facility may request that any portions of a
    facility water conservation plan be kept confidential. The request for confidentiality
    shall be submitted at the same time that an owner or operator submits a facility
    water conservation plan under division (A) of this section. The owner or operator
    shall clearly indicate the information that the owner or operator considers a
    trade secret and shall label it as "trade secret." Failure to make such a request
    shall constitute a waiver of the right to prevent public disclosure of the information.
    A request for confidentiality shall be accompanied by documents that support the
    request. The documents shall describe the measures that the requestor has taken
    to safeguard the confidentiality of the information and indicate whether or not
    others are bound by a confidentiality agreement related to the information.

    (2) The chief, by order, shall issue a decision regarding the confidentiality
    request not later than forty-five days after the receipt of the request. Until
    the decision is issued, the information that is the subject of the request shall
    be confidential and maintained by the chief in a separate file labeled "confidential."
    The applicant shall be notified by mail of the decision.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.17
- number: '1522.18'
  heading: Investigations; access to premises
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: The chief of the division of water resources, on the chief's own initiative
    or upon written complaint by any person, may investigate or make inquiries into
    any alleged failure to comply with this chapter, any rule adopted under it, any
    order issued under it, or the terms and conditions of a permit issued under it.
    The chief or the chief's duly authorized representative may enter at reasonable
    times on any private or public property to inspect and investigate conditions
    relating to any such alleged act of noncompliance and, if necessary, may apply
    to the court of common pleas having jurisdiction for a warrant permitting the
    entrance and inspection.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.18
- number: '1522.19'
  heading: Submission of revised ground water model
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) The chief of the division of water resources may require a permittee
    that has been issued a permit under section 1522.12 of the Revised Code to decrease
    its withdrawal and submit a revised ground water model under section 1522.124
    of the Revised Code if either of the following applies:

    (1) The reported ground water monitoring data conflicts with the permittee''s
    ground water model.

    (2) The results of the division of water resources'' investigation of any written
    complaint under section 1522.25 of the Revised Code indicate that the permittee''s
    withdrawal caused the diminution or interruption of a person''s water supply.

    (B) If so required under division (A) of this section, the permittee shall submit
    the revised ground water modeling using additional data that reflects the permittee''s
    impact on ground water. Based upon the revised ground water modeling and additional
    data, the chief may amend the permit to decrease the withdrawal or establish a
    revised projected cone of depression and amend the permit accordingly.

    (C) A permittee may request the chief to amend a permit issued under section 1522.12
    of the Revised Code when another ground water user affects or has the potential
    to affect the projected cone of depression. The permittee shall submit with the
    request a revised ground water model using additional data that reflects the other
    ground water user''s impact on ground water. Based upon the revised ground water
    model and additional data, the chief may establish a revised projected cone of
    depression and amend the permit accordingly.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.19
- number: '1522.20'
  heading: Issuance of order of compliance
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) The chief of the division of water resources may issue an order of compliance
    to a person if the chief determines one of the following:

    (1) That the person has violated, is violating, or is threatening to violate any
    provisions of this chapter, rules adopted under it, or a permit or order issued
    under it;

    (2) That the continued withdrawal or consumptive use of water under a permit issued
    to the person under section 1522.12 of the Revised Code will endanger the public
    health, safety, or welfare;

    (3) That the withdrawal or consumptive use of water under a permit issued to the
    person under section 1522.12 of the Revised Code will result in a significant
    lowering of the water level within an aquifer, the overdrafting of an aquifer,
    or the imminent threat of irreparable material damage to an aquifer such that
    the aquifer will no longer yield the amount of water it did before the withdrawal
    or consumptive use.

    (B) An order of compliance issued under division (A) of this section is effective
    upon issuance. The chief shall identify all of the following in the order:

    (1) The facility to which the order applies;

    (2) The findings of fact and specific circumstances that led to the issuance of
    the order;

    (3) The actions that the owner or operator of the facility must take to comply
    with the order.

    The chief shall fix and specify in the order a reasonable date by which the owner
    or operator must comply with the order.

    (C)(1) If a person that is issued an order of compliance under division (A) of
    this section does not comply with the order by the date specified in the order,
    the chief may issue a proposed order to suspend or revoke the permit issued to
    the person and may subsequently issue a final order to suspend or revoke the permit
    in accordance with section 1522.21 of the Revised Code.

    (2) If the chief issues a proposed order to suspend or revoke a permit, the chief,
    in the proposed order, shall identify all of the following:

    (a) The facility to which the order applies;

    (b) The findings of fact and specific circumstances that led to the issuance of
    the order;

    (c) The actions that the permittee must take to comply with the order.

    The chief shall fix and specify in the proposed order a reasonable date or time
    by which the permittee must comply. The chief shall state in the proposed order
    that the chief may issue a final order suspending or revoking the permit if the
    permittee fails to comply with the proposed order by that date or time.

    (D) If the chief, after making a determination under division (A)(2) or (3) of
    this section, issues an order under division (A) of this section, a proposed order
    under division (C) of this section, or a final order to suspend a permit under
    section 1522.21 of the Revised Code, the permittee may request the chief to amend
    the permit or suspended permit prior to its expiration. The chief may amend the
    permit and allow the withdrawal or consumptive use of water under it to be resumed
    if the chief determines that, under the amended permit, the reasons for the order
    or suspension specified in division (A)(2) or (3) of this section, as applicable,
    will no longer apply.

    (E) The chief shall issue an order or proposed order under this section, or a
    final order under section 1522.21 of the Revised Code in writing and shall contain
    a finding of the facts on which the order is based. The chief shall provide notice
    of the order by certified mail to the applicable owner or operator of a facility.
    The chief also shall provide notice to a person who initiated a complaint that
    resulted in the order. The chief shall post the notice on the web site of the
    department of natural resources in a manner prescribed by the chief.

    (F) The chief or the chief''s designee may enter on private or public lands and
    take action to mitigate, minimize, remove, or abate the conditions that are the
    subject of an order or proposed order issued under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.20
- number: '1522.21'
  heading: Issuance of proposed order indicating intent to issue final order
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) As used in this section, "person who is or will be aggrieved or adversely
    affected" means a person with a direct economic or property interest that is or
    will be adversely affected by an order or rule issued or adopted by the chief
    of the division of water resources under this chapter.

    (B) The chief shall issue a proposed order indicating the chief''s intent to issue
    a final order prior to issuing a final order that does one of the following:

    (1) Denies the issuance of a permit under this chapter;

    (2) Denies a transfer of a permit under section 1522.15 of the Revised Code;

    (3) Denies a petition to the chief under section 1522.16 of the Revised Code;

    (4) Denies a request for confidentiality under section 1522.17 of the Revised
    Code;

    (5) Suspends or revokes a permit issued under this chapter.

    (C)(1) If the chief receives a written objection from a person who is or will
    be aggrieved or adversely affected by the issuance of the final order, the chief
    shall conduct an adjudication hearing with respect to the proposed order in accordance
    with Chapter 119. of the Revised Code. A person who is or will be aggrieved or
    adversely affected by the issuance of the final order and who submitted a written
    objection under this division may be a party to the adjudication.

    (2) If the chief proposes to suspend or revoke a permit after making a determination
    under division (A)(2) or (3) of section 1522.20 of the Revised Code, the permittee,
    at the hearing, may present evidence that the continued withdrawal or consumptive
    use of water is warranted because the reasons for suspension or revocation specified
    in division (A)(2) or (3) of that section, as applicable, do not apply.

    (D)(1) After the issuance of a final order, a person who is or will be aggrieved
    or adversely affected by the issuance of the order may appeal the order to the
    court of common pleas of Franklin county or the court of common pleas of the county
    in which the facility that is the subject of the order is located. Subject to
    the exceptions specified in section 2506.03 of the Revised Code, the court is
    confined to the record as certified to it by the chief if an adjudication hearing
    was conducted by the chief under division (C) of this section. However, the court
    also may grant a request for the admission of additional evidence when satisfied
    that the additional evidence is newly discovered and could not with reasonable
    diligence have been ascertained prior to the hearing before the chief. If no adjudication
    hearing was conducted under division (C) of this section, the court shall conduct
    a hearing de novo.

    (2) The filing of an appeal under division (D)(1) of this section does not automatically
    suspend the order that is the subject of the appeal. Upon application by the appellant,
    the court may suspend or stay the order, pending an immediate hearing on the appeal.

    (3) If the court finds that the order was lawful and reasonable, it shall issue
    a written order affirming the order. If the court finds that the order was unreasonable
    or unlawful, it shall issue a written order vacating or modifying the order. The
    judgment of the court is final unless reversed, vacated, or modified on appeal.

    (4) A court shall not award attorney''s fees to any party to an administrative
    or legal proceeding under this section.

    (E) Any person who is issued a proposed order or a final order by the chief shall
    be a party in any administrative or legal proceeding in which the proposed order
    or final order is at issue. This division is in addition to any other rights that
    a person may have as a person aggrieved or adversely affected.'
