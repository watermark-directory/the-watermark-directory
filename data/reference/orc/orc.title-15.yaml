- number: '1510.01'
  heading: Oil and natural gas marketing program definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: 'As used in this chapter:

    (A) "First purchaser" means:

    (1) With regard to crude oil and condensate, the person to whom title first is
    transferred beyond the gathering tank or tanks, beyond the facility from which
    the crude oil was first produced, or both;

    (2) With regard to natural gas, the person to whom title first is transferred
    beyond the inlet side of the measurement station from which the natural gas was
    first produced.

    (B) "Producer" means a person who complies with all of the following:

    (1) Produces oil or natural gas in this state;

    (2) Derives a majority of income from ownership in properties producing oil or
    natural gas ;

    (3) Is the owner of record for the respective wells from which assessments are
    levied under this chapter.

    (C) "Independent producer" means a producer that is not engaged in refining either
    oil or natural gas.

    (D) "Qualified independent producer association" means an association that complies
    with all of the following:

    (1) It is in existence on December 18, 1997.

    (2) It is organized and operating within this state.

    (3) A majority of the members of its governing body are independent producers.

    (E) "Technical advisory council" or "council" means the technical advisory council
    created in the division of oil and gas resources management under section 1509.38
    of the Revised Code.

    (F) "Condensate," "gas," "horizontal well," "oil," and "owner" have the same meanings
    as in section 1509.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.01
- number: '1510.02'
  heading: Technical advisory council - powers and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A) In accordance with this chapter, the technical advisory council shall
    do all of the following:

    (1) Establish procedures by which producers in this state may propose, develop,
    and operate a marketing program to do all of the following:

    (a) Demonstrate to the general public the importance and economic significance
    of the oil and natural gas industry in this state;

    (b) Encourage the wise and efficient use of energy;

    (c) Promote environmentally sound production methods and technologies in the industry;

    (d) Support research, training, and educational activities concerning the industry.

    (2) Establish procedures necessary to implement and administer this chapter;

    (3) Determine the eligibility of producers to participate in referendums and other
    procedures that may be required to establish a marketing program for oil and natural
    gas.

    (B) The council may conduct business by a majority of those members voting without
    need of a quorum.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.02
- number: '1510.03'
  heading: Authority of marketing program
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: 'A marketing program that is established under this chapter may include authority
    to do at least all of the following:

    (A) Carry out the purposes of the program identified in section 1510.02 of the
    Revised Code;

    (B) Enter into contracts with qualified organizations, agencies, or individuals,
    or any combination thereof, to carry out those purposes;

    (C) Contribute to any national or regional marketing program for oil and natural
    gas if the program is exclusively for the same purposes as the program established
    under this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.03
- number: '1510.04'
  heading: Petition for referendum to establish a marketing program for oil and natural
    gas or to amend an existing program
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A) (1) Producers in this state may present the technical advisory council
    with a petition signed by the lesser of one hundred or ten per cent of all such
    producers requesting that the council hold a referendum in accordance with section
    1510.05 of the Revised Code to establish a marketing program for oil and natural
    gas.

    (2) Producers in this state also may present the operating committee appointed
    under section 1510.06 of the Revised Code or the council with a petition signed
    by the lesser of one hundred or ten per cent of all such producers requesting
    that the council hold a referendum in accordance with section 1510.05 of the Revised
    Code to amend an existing marketing program. The council may request the operating
    committee to perform any administrative duty during the amendment process provided
    for under this chapter and the operating committee shall perform any such administrative
    duty.

    (B) At the time of presentation of the petition to the council or committee under
    division (A) of this section, the petitioners also shall present the proposed
    program or amendment, which shall include all of the following:

    (1) The rate of assessment to be made on the production of oil and natural gas
    in this state, which shall not exceed five cents per each gross barrel of oil
    and one cent per thousand cubic feet of natural gas;

    (2) Terms, conditions, limitations, and other qualifications for assessment;

    (3) Procedures to refund the assessment.

    (C) Before the council makes a decision under this division to approve or disapprove
    a proposed program or amendment, the council or committee, as applicable, shall
    publish in at least two appropriate periodicals designated by the council a notice
    that the program or amendment has been proposed and informing interested persons
    of the procedures for submitting comments regarding the proposal. After publishing
    the notice, the council or committee shall provide interested persons with a copy
    of the proposed program or amendment and an opportunity to comment on the proposed
    program or amendment for thirty days after the publication of the notice. The
    petitioners may make changes to the proposed program or amendment based upon the
    comments received. The council or committee may make technical changes to the
    proposal to ensure compliance with this chapter. Subsequent to any changes made
    by the petitioners or any technical changes made by the council or committee to
    a proposed program or amendment, the council may approve or disapprove the proposed
    program or amendment.

    (D) If the council approves the proposed program or amendment, with any changes
    made under division (C) of this section, the council shall hold a referendum in
    accordance with section 1510.05 of the Revised Code to establish a marketing program
    for oil and natural gas or to amend an existing program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.04
- number: '1510.05'
  heading: Procedure for referendum
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A) Not later than ninety days after the technical advisory council has approved
    a marketing program proposed under section 1510.04 of the Revised Code, or an
    amendment to such a program, the council shall determine by a referendum whether
    the eligible producers, as determined under division (A)(3) of section 1510.02
    of the Revised Code, favor the proposed program or amendment. The council or committee
    shall cause a ballot request form to be published not less than thirty days before
    the beginning of the election period established under division (B) of this section
    in at least two appropriate periodicals designated by the council or committee
    and shall make the form available for reproduction to any qualified independent
    producer association.

    (B) In a referendum held under this section, each eligible producer is entitled
    to one vote. The council or committee shall establish a three-day period during
    which eligible producers may vote either in person during normal business hours
    at polling places designated by the council or committee or by mailing a ballot
    to such a polling place. The council or committee shall send a mail-in ballot
    by first-class mail to any eligible producer who requests one by sending in the
    ballot request form provided for in division (A) of this section, by calling one
    of the polling places designated by the council or committee, or by any additional
    method that the council or committee may provide. A ballot that is returned by
    mail is not valid if it is postmarked later than the third day of the election
    period established by the council or committee.

    (C) A marketing program or an amendment to a marketing program is favored by producers
    if a majority of the producers who vote in the referendum vote in favor of the
    program or amendment. If the producers who vote in the referendum do not favor
    the proposed program or amendment, the council shall not hold another referendum
    on the proposed program or amendment during the ten months following the close
    of the referendum at which the producers did not favor the proposed program or
    amendment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.05
- number: '1510.06'
  heading: Establishing marketing program
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A) When the producers who vote in a referendum held under section 1510.05
    of the Revised Code favor a proposed marketing program, the technical advisory
    council shall order the program established. The council shall appoint an operating
    committee consisting of thirteen members. Six of the members shall be independent
    producers and six of the members shall be primarily horizontal well operators.
    The council shall select those members from lists of names submitted by qualified
    independent producer associations. Each member who is a producer shall be at least
    twenty-five years old, have production in this state, and have at least five years
    of active experience in the oil and natural gas industry.

    The thirteenth member shall be a member of an organization that represents farmers.
    The council shall select that member from a list submitted by such an organization.

    Of the initial appointments made prior to the effective date of this amendment,
    the council shall appoint two members for terms of one year, two members for terms
    of two years, and three members for terms of three years. Thereafter, the council
    shall appoint each member for a three-year term unless the appointee is to fill
    a vacancy, in which case the appointee shall be appointed for the unexpired term.
    Each such subsequent appointment shall be made prior to the expiration date of
    the preceding or vacant term. The council shall not appoint any member of the
    operating committee to serve more than three successive full three-year terms.

    Of the members who are primarily horizontal well operators who are appointed after
    the effective date of this amendment, the council shall appoint two members for
    terms of one year, two members for terms of two years, and two members for terms
    of three years. Thereafter, the council shall appoint each member for a three-year
    term unless the appointee is to fill a vacancy, in which case the appointee shall
    be appointed for the unexpired term. Each subsequent appointment shall be made
    prior to the expiration date of the preceding or vacant term. The council shall
    not appoint any member of the operating committee to serve more than three successive
    full three-year terms.

    (B) Each member of the operating committee is entitled to actual and necessary
    travel and incidental expenses while attending meetings of the committee or while
    engaged in the performance of official responsibilities delegated to the committee.

    (C) No person is liable in a civil action for any actions taken in good faith
    as a member or employee of an operating committee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.06
- number: '1510.07'
  heading: Council to monitor actions of operating committee
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: 'The technical advisory council shall monitor the actions of an operating
    committee to ensure all of the following:

    (A) A marketing program is self-supporting;

    (B) The committee keeps all records that are required for agencies of the state;

    (C) All program operations are in accord with both of the following:

    (1) The provisions of the marketing program;

    (2) This chapter and procedures established under it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1510.07
- number: '1510.08'
  heading: Assessments on production of oil and natural gas
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1510'
    name: Oil And Natural Gas Marketing Program
  text: '(A)(1) Except as provided in division (A)(2) of this section, an operating
    committee may levy assessments on the production of crude oil, condensate, and
    natural gas in this state for the purposes of a marketing program established
    under this chapter.

    (2) The operating committee shall not levy an assessment that was not approved
    by producers or that exceeds the amount authorized under division (B)(1) of section
    1510.04 of the Revised Code. The operating committee shall not levy an assessment
    against a producer who is not eligible to vote in a referendum for the marketing
    program that the operating committee administers, as determined under division
    (A)(3) of section 1510.02 of the Revised Code.

    (B) The technical advisory council may require a first purchaser to withhold assessments
    from any amounts that the first purchaser owes to producers and, notwithstanding
    division (A)(2) of this section, to remit them to the chairperson of the council
    at the office of the division of oil and gas resources management. A first purchaser
    who pays an assessment that is levied pursuant to this section for a producer
    may deduct the amount of the assessment from any money that the first purchaser
    owes the producer.

    The operating committee may, through the referendum process, elect to authorize
    the producer of a horizontal well to directly pay the assessment to the operating
    committee in lieu of having the first purchaser remit the assessment. The producer
    shall direct the payment to the operating committee along with a form furnished
    by the operating committee and approved as to content by a qualified independent
    producer association. The operating committee may establish, through the referendum
    process, additional terms, limitations, and conditions for assessment and refunds
    for those producers who directly pay the assessment to the operating committee.

    (C) A marketing program shall require a refund of assessments collected under
    this section after receiving an application for a refund from a producer who is
    the owner or operator of the well that was assessed. The producer shall submit
    the application for a refund on a form furnished by the operating committee and
    approved as to content by a qualified independent producer association. The operating
    committee shall ensure that refund forms are available where assessments for its
    program are withheld.

    A producer who desires a refund shall submit a request for a refund not later
    than the thirty-first day of March of the year in which the request is submitted.
    The operating committee shall refund the assessment to the producer not later
    than the thirtieth day of June of the year in which the request for the refund
    is submitted.

    (D) The operating committee shall not use money from any assessments that it levies
    for any political or legislative purpose or for preferential treatment of one
    person to the detriment of another person who is affected by the marketing program
    that the operating committee administers.

    (E) If the operating committee requests that a producer seeking a refund provide
    additional information to support a refund request, any additional information
    provided to the operating committee is not a public record under section 149.43
    of the Revised Code, is confidential, and the operating committee shall treat
    the information as confidential.'
