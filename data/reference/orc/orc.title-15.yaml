  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1506.08
- number: '1506.09'
  heading: Violations - injunction - civil penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: '(A)(1) No person shall violate or fail to comply with any provision of this
    chapter, any rule or order adopted or issued under it, or any condition of a permit
    issued in accordance with rules, resolutions, or ordinances adopted under it.

    (2) The attorney general, upon written request of the director of natural resources,
    shall bring an action for an injunction against any person who has violated, is
    violating, or is threatening to violate division (A)(1) of this section.

    (3) Any person who violates any provision of this chapter, any rule or order adopted
    or issued under it, or any condition of a permit issued in accordance with rules
    adopted under division (A) of section 1506.07 of the Revised Code shall, in addition
    to any fine that may be assessed under section 1506.99 of the Revised Code, be
    assessed a civil penalty of not more than five thousand dollars for each offense
    to be paid into the state treasury to the credit of the general revenue fund.
    Upon written request of the director, the attorney general shall commence an action
    against any such violator. Any action under this division is a civil action, governed
    by the Rules of Civil Procedure and other rules of practice and procedure applicable
    to civil actions.

    (B) The prosecuting attorney of a county or the city director of law of a municipal
    corporation that has adopted a resolution or ordinance in accordance with division
    (D) of section 1506.07 of the Revised Code may, on behalf of that county or municipal
    corporation, respectively, bring a civil action against any person who violates
    that resolution or ordinance within the territory of that county or municipal
    corporation in the court of common pleas in the county in which the violation
    occurred. Any such violator may, in addition to any fine that may be assessed
    under section 1506.99 of the Revised Code, be assessed a civil penalty of not
    more than five thousand dollars for each offense together with court costs. Any
    moneys recovered under this division shall be paid into the treasury of the appropriate
    county or municipal corporation. Any action under this division shall be governed
    by the Rules of Civil Procedure and other rules of practice and procedure applicable
    to civil actions.'
