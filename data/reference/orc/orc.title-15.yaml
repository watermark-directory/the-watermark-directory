- number: '1563.36'
  heading: Excessive widths of rooms and entries or faulty pillar recovery methods
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The method of mining followed in any coal mine shall not expose the miner
    to unusual dangers from roof falls caused by excessive widths of rooms and entries
    or faulty pillar recovery methods.

    (A) The method of mining shall provide widths of openings and pillar dimensions
    compatible with effective roof control. These widths and dimensions shall be incorporated
    into the roof control plan submitted for approval.

    Where excessive widths result from poor mining practices, additional roof support
    shall be installed before any travel or other work is done in such area. If excessive
    widths of openings are a result of coal sloughing, additional support shall be
    installed and the mining system reevaluated to determine changes that are necessary
    to minimize such occurrences.

    (B) In addition to the criteria set forth in division (E) of section 1563.35 of
    the Revised Code, the following shall apply to pillar recovery:

    (1) The overall pillar recovery system shall be designed to minimize the possibility
    of outbursts or squeezes. The manner and sequence of recovery shall be included
    in the roof control plan submitted for approval.

    (2) Where full pillar recovery is being done, extraction shall be such as to allow
    total caving of the main roof in the pillared area.

    (3) During partial pillar recovery sufficient coal shall be left in place to support
    the main roof to the extent that the possibility of undue forces overriding the
    working places will be minimized.

    (4) A combination of full and partial pillar recovery shall not be conducted on
    the same pillar line.

    (5) If full extraction of pillars is being done and physical conditions such as
    standing water, adverse roof conditions, and falls of roof, or law requirements
    concerning oil and gas wells or surface subsidence dictate that some pillars of
    coal are to be left in place, a sufficient amount of coal shall be left to support
    the main roof so as to minimize the possibility of undue forces overriding the
    working places.

    (6) Where full recovery of pillars is planned, the design of the pillars shall
    be compatible with the planned method of extraction.

    (7) Pillaring methods shall eliminate pillar points and pillars that project inby
    the brakeline.

    (8) When recovering adjacent pillars left and right from the same opening, mining
    shall be completed in one such pillar left and the openings posted off with at
    least two rows of breaker posts on not more than four foot centers before operations
    are started in the second pillar.

    (C) Longwall mining shall be considered as modification of the open-end method
    of pillar extraction and the support system for the longwall shall be approved
    on an individual basis.

    (D) No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.36
- number: '1563.37'
  heading: Operator to supply roof support materials - roof bolts - testing of danger
    areas
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: '(A) The operator, in accordance with the approved plan, shall provide at
    or near each working face and at such other locations in the coal mines as the
    chief of the division of mineral resources management may prescribe an ample supply
    of suitable materials of proper size with which to secure the roof of all working
    places in a safe manner. Safety posts, jacks, or other approved devices shall
    be used to protect the workers when roof material is being taken down, crossbars
    are being installed, roof bolt holes are being drilled, roof bolts are being installed,
    and in such other circumstances as may be appropriate. Loose roof and overhanging
    or loose faces and ribs shall be taken down or supported. Except in the case of
    recovery work, supports knocked out shall be replaced promptly.

    (B) The operator shall have an adequate supply of roof support material (including
    temporary supports) as specified in the approved roof control plan for the type
    of mining being conducted as close as practical to the working face, but not farther
    away than the first open crosscut outby the working face unless storing of such
    supplies in this area poses a hazard to the miner. In such cases supplies shall
    be stored at an alternate location approved by an authorized representative of
    the chief. Where mining equipment such as roof drilling machines or timbering
    machines are required to install the supports, such support material may be transported
    from place to place on the equipment. An adequate supply shall be defined as sufficient
    material including temporary supports, to support roof exposed by one complete
    cycle of mining. An additional supply of supplementary roof support materials,
    such as posts, jacks, crossbars, or different length roof bolts, shall be located
    within fifty feet of each working section in the event adverse roof conditions,
    such as water coming from the roof, slips, washouts, wants, or roof cracks, are
    encountered.

    (C) When installation of roof bolts is permitted, such roof bolts shall be tested
    in accordance with the approved roof control plan.

    (D) The criteria that may be required in the roof control plan for testing installed
    roof bolts are set forth in divisions (A)(2)(c)(ii) and (iii) of section 1563.35
    of the Revised Code.

    (E) Roof bolts shall not be recovered where complete extractions of pillars are
    attempted, where adjacent to clay veins, or at the locations of other irregularities,
    whether natural or otherwise, that induce abnormal hazards. Where roof bolts recovery
    is permitted, it may be conducted only in accordance with methods prescribed in
    the approved roof control plan, and it shall be conducted by experienced miners,
    but only where adequate temporary support is provided.

    (F) To assure that miners are protected during roof bolt recovery work, the operator
    shall conform with criteria set forth in division (H) of section 1563.35 of the
    Revised Code.

    (G) Where miners are exposed to danger from falls of roof, face, and ribs, the
    operator shall examine and test the roof, face, and ribs before any work or machine
    is started, and as frequently thereafter as may be necessary to insure safety.
    When dangerous conditions are found, they shall be corrected immediately.

    (H) No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.37
- number: '1563.39'
  heading: Precautions when working place approaches completed or abandoned workings
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'When any working place approaches within fifty feet of accurately surveyed
    completed workings in the same mine, or within two hundred feet of any other abandoned
    workings, that cannot be inspected and which may contain dangerous accumulations
    of water or gas, boreholes shall be drilled at least twenty feet in advance of
    the face, and forty-five degree angle rib holes shall be drilled at least twenty
    feet deep and not more than eight feet apart in one or both ribs as may be necessary
    for adequate protection. Completed workings are accurately surveyed when a competent
    engineer or surveyor has certified as to the surveying and recording thereof.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.39
- number: '1563.40'
  heading: Closing of openings to abandoned mines - closing abandoned vertical shafts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator shall effectively close or fence all openings to mines abandoned
    after June 3, 1941, so that persons or animals cannot inadvertently enter therein.

    Abandoned vertical shafts and other abandoned openings leading to underground
    workings, which shafts and other openings are abandoned after August 26, 1949,
    shall be closed within ninety days after abandonment as follows:

    (A) Vertical shafts shall be completely filled with earth or other noncombustible
    material, or the top of such shaft shall be covered with a substantial reinforced
    concrete slab, the design of which has been approved by the chief of the division
    of mineral resources management.

    (B) Other openings not potentially usable in later mining operations shall be
    closed with earth or masonry in a way that may reasonably be expected to prevent
    unauthorized persons from entering the same.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.40
- number: '1563.41'
  heading: Sealing off abandoned workings
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator of a mine, before sealing off any abandoned workings, shall
    obtain the approval of the deputy mine inspector and the chief of the division
    of mineral resources management. The seals used in sealing off such workings,
    when approved by the chief, shall be constructed of not less than eighteen-inch
    concrete or masonry bulkheads effectively anchored to the ceiling, ribs, and floor,
    except where seals are used to seal abandoned individual panel or room entries,
    they shall be constructed of concrete or masonry bulkheads not less than six inches
    in thickness effectively anchored to the ceiling, ribs, and floor in a manner
    approved by the deputy mine inspector and the chief. All seals are to be bled
    or drained of gas in a manner approved by the deputy mine inspector and the chief.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.41
- number: '1563.42'
  heading: Filing of map of abandoned mine
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator of a mine, before the pillars are drawn previous to the abandonment
    of any part of the mine, shall have a correct map of such part of the mine made,
    showing its area and workings to the day of the abandonment and the pillars drawn
    previous to abandonment, and file such map within ninety days after the abandonment
    of such mine, in the office of the county recorder of the county where such mine
    is located, and with the chief of the division of mineral resources management.
    Such map shall have attached the usual certificate of the mining engineer making
    it, and the mine foreperson in charge of the underground workings of the mine,
    and such operator shall pay to the recorder for filing such map, a base fee of
    five dollars for services and a housing trust fee of five dollars pursuant to
    section 317.36 of the Revised Code.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.42
- number: '1563.43'
  heading: When notice to chief required
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: 'The operator of a mine shall give notice to the chief of the division of
    mineral resources management when:

    (A) A change occurs in the name of a mine, in the name of the operator thereof,
    or in the officers of an incorporated company owning or operating such mine;

    (B) Work is commenced opening a new shaft, slope, or mine;

    (C) A mine is abandoned, or the working thereof is discontinued;

    (D) The working of a mine is commenced, after an abandonment or discontinuance
    thereof for a period of more than three months;

    (E) The pillars of a mine are about to be removed or robbed;

    (F) A squeeze, crush, or fire occurs, or a dangerous body of gas is found, or
    any cause or change occurs that may seem to affect the safety of persons employed
    therein.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.43
- number: '1563.45'
  heading: Abandoned mines recorded
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: The county recorder, when presented with a map of an abandoned mine by the
    owner, lessee, or agent thereof, as provided for in section 1563.42 of the Revised
    Code, shall properly label, file, and preserve such map as a part of the records
    of the land upon which said mine is located.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.45
- number: '1563.46'
  heading: Injunction
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: If the appliances of a mine for the safety of the persons working therein
    do not conform to this chapter and Chapters 1509., 1561., 1565., and 1567. of
    the Revised Code, or if the owner, lessee, or agent disregards the requirements
    of such chapters, on application by the chief of the division of mineral resources
    management, in the name of the state, any court of competent jurisdiction may
    enjoin or restrain the owner, lessee, or agent from operating such mine, until
    it conforms to such chapters. Such remedy shall be cumulative, and shall not affect
    any other proceedings authorized against the owner, lessee, or agent for the matter
    complained of in the action. The attorney general shall represent the chief in
    all actions under this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.46
- number: '1563.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1563'
    name: Mine Construction, Maintenance, Abandonment
  text: Whoever knowingly violates any section of this chapter is guilty of a minor
    misdemeanor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1563.99
- number: '1565.01'
  heading: Chapter does not apply to chapter 1514 activities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: Nothing in this chapter applies to activities that are permitted and regulated
    under Chapter 1514. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.01
- number: '1565.02'
  heading: Mine foreman - duties - delegation of duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'Under the direction of the superintendent in charge of a mine, the mine foreman
    shall carry out this chapter and Chapters 1561., 1563., and 1567. of the Revised
    Code, see that the regulations prescribed for each class of workmen under his
    charge are carried out, and see that any deviations from any of them are promptly
    adjusted. This section does not prohibit the mine foreman from delegating any
    of his duties, except those which are subject to the limitations of such chapters,
    to men who in his judgment are competent to perform them, but such delegation
    shall not relieve the mine foreman from the responsibility of having these duties
    properly performed.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.02
- number: '1565.03'
  heading: Supervision of miner or loader
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'Unless the miner or loader has the required qualifications, the mine foreman,
    or the person whom he delegates as overseer, shall supervise the work of such
    miner or loader as to the manner in which he performs his duties, and shall instruct
    him concerning all things relating to his safety, and shall further instruct such
    miner or loader not to handle or use any explosives, except in the mine foreman''s
    or overseer''s presence, until such time as he is competent to handle and use
    the same with safety. The mine foreman shall have the work of such inexperienced
    person supervised so long as such person is not working with an experienced miner
    or loader, until such person is competent to work alone.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.03
- number: '1565.04'
  heading: Employment of certified mine foreperson - examinations for hazardous conditions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'The operator of each mine who is an employer as defined in section 4123.01
    of the Revised Code, or any mine with three or more workers, shall employ a certified
    mine foreperson. In gaseous underground mines, only a holder of a mine foreperson
    of gaseous mines certificate that contains a notation by the chief of the division
    of mineral resources management showing the holder to be at least twenty-three
    years of age and have at least five years'' actual practical experience in gaseous
    mines shall be employed as the mine foreperson. In other underground mines, the
    mine foreperson shall be a holder of a mine foreperson of nongaseous mines certificate
    that contains a notation by the chief showing the holder to be at least twenty-one
    years of age and have at least three years'' actual practical experience in mines.
    All such underground mines shall have at least one certified foreperson on duty
    at all times when workers are employed in the loading or mining of coal underground.
    Each active working area of a surface coal mine and each active surface installation
    of an underground coal mine shall be examined for hazardous conditions, at least
    once during each working shift or more often if necessary for safety, by a certified
    mine foreperson who is designated by the operator to conduct such examinations.
    Any hazardous conditions noted during the examinations shall be reported to the
    operator and shall be corrected by the operator. A certified mine foreperson may
    conduct the examination that is required during each shift at multiple mine sites,
    provided that the sites are within a ten-mile radius.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.04
- number: '1565.05'
  heading: Copy of certificate to be filed and exhibited
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'The operator of a mine shall keep on file a copy of the certificate of each
    mine foreperson, foreperson, and fire boss in the operator''s employ or under
    the operator''s control. Such certificate shall be exhibited to the chief of the
    division of mineral resources management, or any deputy mine inspector, upon demand.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.05
- number: '1565.06'
  heading: Appointment of noncertificate persons for emergency - temporary certificates
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: '(A) In emergencies arising at a mine because of accident, death, illness,
    or any other cause, an operator may appoint noncertificate persons as forepersons
    and fire bosses to act until certified forepersons and fire bosses satisfactory
    to the operator can be secured. Such appointee may not serve in such capacity
    for a period longer than six months or until such time thereafter as an examination
    is held for such certified persons under section 1561.13 of the Revised Code.
    The employer of such noncertificate person shall, upon appointment of such noncertificate
    person in this capacity, forward the name of such noncertificate person to the
    chief of the division of mineral resources management.

    (B) An operator may appoint as a temporary foreperson or fire boss a noncertificate
    person who is within six months of possessing the necessary actual practical experience
    to qualify to take the examination for certification for the position to which
    the person is temporarily appointed. Upon appointment of a noncertificate person,
    the operator shall forward the name, social security number, and brief summary
    of the person''s actual practical experience to the chief, and the chief shall
    issue the person a temporary certificate for the position to which the person
    has been temporarily appointed. A temporary certificate issued under this division
    is valid for six months or until such time thereafter as an examination is held
    under section 1561.13 of the Revised Code for the position to which the person
    has been temporarily appointed.

    (C) A nonresident person who possesses a valid certificate issued by another state
    for a position for which the chief issues a certificate shall be eligible for
    a temporary certificate from the chief upon presentation to the chief of a copy
    of the certificate from that other state. Chapter 4796. of the Revised Code does
    not apply to a certificate issued under this section. A temporary certificate
    issued under this division shall be valid for six months.

    No operator of a mine shall violate or fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.06
- number: '1565.07'
  heading: Superintendent in charge of mine - qualifications and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'The superintendent in charge of a mine shall direct the mine foreperson in
    such manner as is necessary to secure compliance with this chapter and Chapters
    1561., 1563., and 1567. and section 1509.18 of the Revised Code. The superintendent
    may act as mine foreperson, but if the superintendent does so act regularly, the
    superintendent shall obtain a certificate from the chief of the division of mineral
    resources management in the same manner as the certification of mine foreperson
    is obtained.

    A person designated as a superintendent of an underground coal mine after January
    1, 1977, shall, within six months after being so designated, demonstrate to the
    chief that the person has knowledge of the mining laws of this state governing
    the operation of underground coal mines either by presenting evidence that the
    person has passed a mine foreperson examination given by the chief or an examination
    given by the chief concerning the laws of this state governing the operation of
    underground coal mines.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.07
- number: '1565.08'
  heading: Revocation or suspension of certificate
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'If a person certified by the chief of the division of mineral resources management
    purposely violates the mining laws, the person''s certificate may be revoked by
    the chief after investigation and a hearing in accordance with Chapter 119. of
    the Revised Code.

    No person whose license, certificate, or similar authority to perform any certifiable
    mining duties in another state is suspended or revoked by that state shall be
    certified for an equivalent mining certificate in this state during the period
    of the suspension or revocation in the other state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.08
- number: '1565.09'
  heading: Employment of minors - complaint
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: A deputy mine inspector shall investigate the employment of miners in and
    about the mines in his district, and if he finds any minors employed in violation
    of section 1565.10 of the Revised Code, he shall make a complaint thereof to the
    juvenile court, or any other court having competent jurisdiction, against the
    employer of such minors.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.09
- number: '1565.10'
  heading: Employees must be at least eighteen years of age
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'No person shall be employed in or around a mine until he has attained the
    age of eighteen years.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.10
- number: '1565.11'
  heading: Miners' safety committee - duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'The miners employed in a mine may appoint two of their number to act as a
    safety committee to inspect, not more often than once each month, the mine and
    the machinery connected therewith, and to measure the ventilating current. The
    operator may accompany such committee, or appoint two or more persons for that
    purpose. The operator shall afford every necessary facility for making such inspection
    and measurement, but the committee shall not interrupt or impede the work in the
    mine, at the time of such inspection and measurement. After such inspection and
    measurement, such committee shall forthwith make a report thereof to the chief
    of the division of mineral resources management, on a blank furnished by the chief.

    No operator of a mine shall refuse or neglect to comply with this section, and
    no such person shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.11
- number: '1565.12'
  heading: Notice and report of accident resulting in loss of life
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'When a loss of life is occasioned by accident in any mine, the operator thereof
    shall forthwith give notice thereof to the chief of the division of mineral resources
    management, and to the deputy mine inspector in charge of the district. Such notice
    shall be given by telephone or electronic format. The operator of such mine shall,
    within twenty-four hours after such accident causing loss of life, send a written
    report of the accident to the chief. Such written report shall specify the character
    and cause of the accident, the names of the persons killed, and the nature of
    the injuries that caused death. In the case of injury thereafter resulting in
    death, the operator shall send a written notice thereof to the chief, and to the
    deputy mine inspector of such district, at such time as such death comes to the
    operator''s knowledge.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.12
- number: '1565.13'
  heading: Right of action for injury
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: In case of an injury to person or property, occasioned by a violation of this
    chapter and Chapters 1561., 1563., and 1567., and section 1509.18 of the Revised
    Code, or any failure to comply with those chapters or that section, by any operator
    of a mine, a right of action shall accrue to the person injured, for any direct
    damage the person injured has sustained thereby. In case of loss of life by reason
    of such failure or neglect, a right of action shall accrue to the widow, and children,
    or if there are none, then to the parents and next of kin, of the person whose
    death was so caused, for like recovery of damages for the injury they have sustained.
    Any operator of a mine who has complied with Chapter 4123. of the Revised Code
    is exempt as provided in section 4123.74 of the Revised Code, and not liable for
    damages at common law or by statute for injury or death of any employee.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.13
- number: '1565.14'
  heading: Lien for labor
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: Each person who performs labor in opening or developing any mine, mining,
    or labor connected therewith, has a lien upon all the property of the person,
    firm, or corporation owning, constructing, or operating such mine, for the full
    value of such labor, upon the same terms as mechanics' liens are secured and enforced.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.14
- number: '1565.15'
  heading: Emergency medical personnel, services and training to be provided for mine
    employees
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: '(A) As used in this section:

    (1) "EMT-basic," "EMT-I," "paramedic," and "emergency medical service organization"
    have the same meanings as in section 4765.01 of the Revised Code.

    (2) "First aid provider" includes a mine medical responder, an EMT-basic, an EMT-I,
    a paramedic, or an employee at a surface coal mine who has satisfied the training
    requirements established in division (D)(1) of this section.

    (3) "Mine medical responder" means a person who has satisfied the requirements
    established in rules adopted under division (E)(1) of this section or has been
    issued a certificate under division (E)(2) of this section.

    (B) The operator of an underground coal mine where twenty or more persons are
    employed on a shift, including all persons working at different locations at the
    mine within a ten-mile radius, shall provide at least one mine medical responder,
    EMT-basic, or EMT-I on duty at the underground coal mine whenever employees at
    the mine are actively engaged in the extraction, production, or preparation of
    coal. The operator shall provide mine medical responders, EMTs-basic, or EMTs-I
    on duty at the underground coal mine at times and in numbers sufficient to ensure
    that no miner works in a mine location that cannot be reached within a reasonable
    time by a mine medical responder, an EMT-basic, or an EMT-I. Mine medical responders,
    EMTs-basic, and EMTs-I shall be employed on their regular coal mining duties at
    locations convenient for quick response to emergencies in order to provide emergency
    medical services inside the underground coal mine and transportation of injured
    or sick employees to the entrance of the mine. The operator shall provide for
    the services of at least one emergency medical service organization to be available
    on call to reach the entrance of the underground coal mine within thirty minutes
    at any time that employees are engaged in the extraction, production, or preparation
    of coal in order to provide emergency medical services and transportation to a
    hospital.

    The operator shall make available to mine medical responders, EMTs-basic, and
    EMTs-I all of the equipment for first aid and emergency medical services that
    is necessary for those personnel to function and to comply with the regulations
    pertaining to first aid and emergency medical services that are adopted under
    the "Federal Mine Safety and Health Act of 1977," 91 Stat. 1290, 30 U.S.C.A. 801,
    and amendments to it. The operator of the underground coal mine shall install
    telephone service or equivalent facilities that enable two-way voice communication
    between the mine medical responders, EMTs-basic, or EMTs-I in the mine and the
    emergency medical service organization outside the mine that provides emergency
    medical services on a regular basis.

    (C) The operator of a surface coal mine shall provide at least one first aid provider
    on duty at the mine whenever employees at the mine are actively engaged in the
    extraction, production, or preparation of coal. The operator shall provide first
    aid providers on duty at the surface coal mine at times and in numbers sufficient
    to ensure that no miner works in a mine location that cannot be reached within
    a reasonable time by a first aid provider. First aid providers shall be employed
    on their regular coal mining duties at locations convenient for quick response
    to emergencies in order to provide emergency medical services and transportation
    of injured or sick employees to the entrance of the surface coal mine. The operator
    shall provide for the services of at least one emergency medical service organization
    to be available on call to reach the entrance of the surface coal mine within
    thirty minutes at any time that employees are engaged in the extraction, production,
    or preparation of coal in order to provide emergency medical services and transportation
    to a hospital.

    The operator shall provide at the mine site all of the equipment for first aid
    and emergency medical services that is necessary for those personnel to function
    and to comply with the regulations pertaining to first aid and emergency medical
    services that are adopted under the "Federal Mine Safety and Health Act of 1977,"
    91 Stat. 1290, 30 U.S.C.A. 801, and amendments to it.

    (D)(1) An employee at a surface coal mine shall be considered to be a first aid
    provider for the purposes of this section if the employee has received from an
    instructor approved by the chief of the division of mineral resources management
    ten hours of initial first aid training as a selected supervisory employee under
    30 C.F.R. 77.1703 and receives five hours of refresher first aid training as a
    selected supervisory employee under 30 C.F.R. 77.1705 in each subsequent calendar
    year.

    (2) Each miner employed at a surface coal mine who is not a first aid provider
    shall receive from an instructor approved by the chief three hours of initial
    first aid training and two hours of refresher first aid training in each subsequent
    calendar year.

    (3) The training received in accordance with division (D) of this section shall
    consist of a course of instruction established in the manual issued by the mine
    safety and health administration in the United States department of labor entitled
    "first aid, a bureau of mines instruction manual" or its successor or any other
    curriculum approved by the chief. The training shall be included in the hours
    of instruction provided to miners in accordance with training requirements established
    under 30 C.F.R. part 48, subpart (B), as amended, and 30 C.F.R. part 77, as amended.

    (E)(1) Except as provided in division (E)(2) of this section, the chief, in consultation
    with persons certified under Chapter 4765. of the Revised Code to teach in an
    emergency medical services training program, shall adopt rules in accordance with
    Chapter 119. of the Revised Code that do all of the following:

    (a) Prescribe training requirements for a mine medical responder that specifically
    focus on treating injuries and illnesses associated with underground coal mining;

    (b) Prescribe an examination for a mine medical responder;

    (c) Prescribe continuing training requirements for a mine medical responder;

    (d) Establish the fee for examination for a mine medical responder;

    (e) Prescribe any other requirements, criteria, and procedures that the chief
    determines are necessary regarding the training, examination, and continuing training
    of mine medical responders.

    (2) The chief shall issue a mine medical responder certificate in accordance with
    Chapter 4796. of the Revised Code to an applicant if either of the following applies:

    (a) The applicant holds a certificate in another state.

    (b) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a mine medical responder
    in a state that does not issue that certificate.

    (F) Each operator of a surface coal mine shall establish, keep current, and make
    available for inspection an emergency medical plan that includes the telephone
    numbers of the division of mineral resources management and of an emergency medical
    services organization the services of which are required to be retained under
    division (C) of this section. The chief shall adopt rules in accordance with Chapter
    119. of the Revised Code that establish any additional information required to
    be included in an emergency medical plan.

    (G) Each operator of an underground coal mine or surface coal mine shall provide
    or contract to obtain emergency medical services training or first aid training,
    as applicable, at the operator''s expense, that is sufficient to train and maintain
    the certification of the number of employees necessary to comply with division
    (B) of this section and that is sufficient to train employees as required under
    division (D) of this section and to comply with division (C) of this section.

    (H) The division may provide emergency medical services training for coal mine
    employees by operating an emergency medical services training program accredited
    under section 4765.17 of the Revised Code or by contracting with the operator
    of an emergency medical services training program accredited under that section
    to provide that training. The division may charge coal mine operators a uniform
    part of the unit cost per trainee.

    (I) No coal mine operator shall violate or fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.15
- number: '1565.16'
  heading: Motormen and trip riders
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'Motormen and trip riders shall use care in handling the locomotive and cars,
    and shall see that the signal or marker is used for the purpose as provided. Motormen
    and trip riders shall be governed by the speed provided for in sections 1567.39,
    1567.40, and 1567.41 of the Revised Code in handling cars.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.16
- number: '1565.24'
  heading: Miner working alone - unqualified miners
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: 'No person shall work by himself as a miner in a coal mine without having
    produced satisfactory evidence to the mine foreman of such mine that he has worked
    at least one year with, or as, a practical coal miner. This section applies only
    to mines generating methane, other gas, or combustible matter.

    No mine foreman of a coal mine shall permit anyone to mine coal in such mine until
    such person is qualified, unless he is accompanied by a competent coal miner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.24
- number: '1565.25'
  heading: Effect of child support default on certificate
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: On receipt of a notice pursuant to section 3123.43 of the Revised Code, the
    chief of the division of mineral resources management shall comply with sections
    3123.41 to 3123.50 of the Revised Code and any applicable rules adopted under
    section 3123.63 of the Revised Code with respect to a certificate issued pursuant
    to this chapter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.25
- number: '1565.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1565'
    name: Mine Employees
  text: Whoever knowingly violates any section of this chapter is guilty of a minor
    misdemeanor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1565.99
- number: '1567.01'
  heading: Chapter does not apply to chapter 1514 activities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: Nothing in this chapter applies to activities that are permitted and regulated
    under Chapter 1514. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.01
- number: '1567.02'
  heading: Use of present machinery lawful - replacement of appliances and machinery
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: In the operation of mines, mine owners, lessees, and their agents may continue
    to use the type of appliance and machinery owned or operated in such mines on
    September 2, 1941, in the manner permitted by the statutes in force on June 3,
    1941, and until the mine in which such appliances or machinery are located is
    exhausted or abandoned; in the use of such appliances or machinery, they shall
    comply with the rules of the chief of the division of mineral resources management.
    In gaseous mines, as parts of such machinery or appliances become worn out and
    have to be replaced, the chief or the deputy mine inspector shall order that such
    replacement parts put the machinery or appliance in a condition or state, as far
    as practicable, to meet the requirements of the United States bureau of mines
    for permissible machinery or appliances; in case any piece of machinery or appliance
    is worn out and is not so connected with the use of other machinery and appliances
    as to make it necessary to replace such worn-out piece with the same type in order
    to continue the use of the connected appliances and machinery, the machinery or
    appliance purchased for such replacement shall be of a type made lawful under
    this chapter and Chapters 1561., 1563., and 1565. of the Revised Code, which in
    gaseous mines shall be of permissible or approved type. The chief, in making such
    rules, shall incorporate therein the statutes in force on June 3, 1941, governing
    the use of such appliances and machinery. If in the chief's opinion such statutes
    do not provide the required protection, additional rules to cover such use shall
    be made by the chief or by the deputy mine inspector, with the chief's approval.
    The deputy mine inspector and the electrical inspector shall, in their periodic
    inspection of the mines, report on the condition of all machinery and appliances
    to see that this section is being complied with.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.02
- number: '1567.03'
  heading: Prohibited acts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: No workman or other person shall knowingly injure a water gauge, barometer,
    thermometer, air course, brattice, equipment, or machinery, obstruct or throw
    open an airway, handle or disturb any part of the machinery of the hoisting engine
    of a mine, open a door of a mine and neglect to close it, endanger the mine or
    those working therein, disobey an order given in pursuance of law, or do a willful
    act which may endanger the lives and health of persons working therein, the security
    of a mine, or the machinery connected therewith.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.03
- number: '1567.04'
  heading: Machine runners and helpers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Machine runners and helpers shall use care while operating mining machines.
    They shall warn persons not engaged in the operation of a machine of the danger
    in going near the machine while it is in operation, and shall not permit such
    persons to remain near it while such machine is in operation. They shall examine
    the roof of the working place and see that it is safe before starting to operate
    the machine. When connecting the power cable to the electric wires, the machine
    runners and helpers shall make the negative or grounded connections before connecting
    to the positive, and when disconnecting the power cable, shall disconnect from
    the positive line before disconnecting the negative or grounded line. When positive
    feed wires extend into rooms, the machine runners and helpers shall connect such
    wires to the positive wire on the entry before connecting the power cable, and
    as soon as the power cable is disconnected, shall disconnect such wire from the
    wire on the entry. They shall use care that the cable does not make contact with
    metallic rails on the track, and shall avoid, where possible, leaving the cable
    in water. If they remove props which have been placed by the miner for the security
    of the roof, they shall reset such props as promptly as possible.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.04
- number: '1567.05'
  heading: Trespassing
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: No person, except employees of the mine and those permitted by law, shall
    enter any mine or go upon the property connected therewith, unless the consent
    of the owner, lessee, or agent has been secured, and then only when accompanied
    by a guide furnished by such owner, lessee, or agent. This does not prohibit persons
    seeking employment at such mine, or the authorized representatives of the employees,
    from entering upon the property as is necessary to make such application to the
    proper authority or to transact business, if such persons do not enter the mine
    until given permission to do so, and do not stand on the tracks or go near the
    machinery or other places of danger.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.05
- number: '1567.06'
  heading: Examination of mine generating firedamp - posting or report
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'No person shall enter a mine generating firedamp, which can be detected by
    an approved flame safety lamp, until it has been reported safe by the person making
    the fire boss examination as prescribed by section 1563.24 of the Revised Code.
    This report shall be posted on a blackboard provided for that purpose at the main
    entrance to the mine. This section does not apply to the mine superintendent and
    mine foreman.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.06
- number: '1567.07'
  heading: Entry beyond danger signal
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: In gaseous and nongaseous mines, no person other than a mine foreman or fire
    boss, or owner, lessee, agent, or operator of the mine, or a representative of
    either accompanied by a mine foreman or fire boss, shall remove or go beyond any
    caution board or danger signal placed at the entrance to any working place or
    old workings in a mine, unless permitted to do so by either a mine foreman or
    a fire boss after such mine foreman or fire boss has acquainted himself with the
    danger lying beyond such caution board or danger signal.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.07
- number: '1567.08'
  heading: Book of reports of mine condition and air measurements
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The mine foreperson shall each day enter plainly or have entered in ink,
    in a book provided for that purpose, a report of the condition of the mine, which
    report shall clearly state any danger that such mine foreperson has observed during
    the day, or any danger reported to the mine foreperson by the mine foreperson''s
    assistants, the fire bosses, or the shot firers when employed. The report shall
    also state whether or not there is a proper supply of material on hand for the
    safe working of the mine, and whether or not the requirements of the law are complied
    with. The mine foreperson shall also, once each week, enter plainly or have entered
    in ink, in the book, a true report of all air measurements required by this chapter
    and Chapters 1561., 1563., and 1565. of the Revised Code, designating the place,
    the area of each break-through and entry separately, the velocity of the air in
    each break-through and entry, and the number of workers employed in each separate
    split of air, with the date when the measurements were taken. The book shall be
    kept in the mine office at the mine, for examination by the deputy mine inspector,
    and by any person working in the mine, in the presence of the mine foreperson.
    The mine foreperson shall each day personally sign and certify to all facts entered
    and recorded in such book.

    The mine foreperson shall each day read carefully and personally sign in ink,
    and certify to such facts, all reports entered in the record book of the fire
    bosses.

    The record books shall be prescribed and supplied by the division of mineral resources
    management and purchased by the operator.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.08
- number: '1567.09'
  heading: Ventilation of mines
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of a mine shall provide and maintain the necessary artificial
    means of capacity and power capable of supplying the required ventilation, and
    shall maintain a sufficient volume of air, not less per minute than one hundred
    fifty cubic feet for each person measured at the point in the mine where distribution
    to the various working sections begins and distributed to the working faces so
    as to expel or dilute and render harmless, explosive, poisonous, and noxious gases.
    The air shall be measured at the last entry break-through in each working section
    to see that a sufficient volume of air, not less than nine thousand cubic feet
    per minute, is being distributed at such point, provided that in gaseous mines
    the volume of air maintained for each person shall be not less than two hundred
    cubic feet per minute measured at the point in the mine where distribution to
    the various working sections begins.

    No more than sixty-five workers shall be permitted to work on one continuous current
    of air or split of air except with the written consent of the chief of the division
    of mineral resources management, and in no case shall the number of workers exceed
    ninety.

    Air in which workers work or travel in mines shall be improved when it contains
    less than nineteen and one-half per cent oxygen, or more than one-half of one
    per cent carbon dioxide, or is contaminated with noxious or poisonous gases. If
    the air immediately returning from a split that ventilates any group of active
    workings contains more than one per cent methane, as determined with a permissible
    flame safety lamp, by air analysis, or by other recognized means of accurate detection,
    the ventilation shall be improved. If the air immediately returning from such
    a split contains one and one-half per cent methane, the employees shall be withdrawn
    from the mine or the portion of the mine affected thereby, and all power shall
    be cut off from such mine or portion of the mine until such dangerous condition
    has been corrected. If the air immediately returning from such a split contains
    one and one-half per cent or more of methane, but not more than two per cent of
    methane, withdrawal of the employees from such mine or portion of the mine and
    shutting off all power from such mine or portion of the mine shall not be required
    if all of the following requirements are met:

    (A) The volume of air provided and maintained in such split is equal to or in
    excess of eighteen thousand cubic feet of air per minute;

    (B) Only permissible electric equipment is used;

    (C) The air does not pass over trolley or other bare power wires;

    (D) An official certified under this chapter and Chapters 1561., 1563., and 1565.
    of the Revised Code is continually testing the gas content of the air during the
    mining operations therein.

    At working faces and other places where methane has accumulated and is likely
    to attain an explosive mixture, blasting shall not be done and the workers shall
    be removed from such working faces or places until such condition has been corrected.

    When the methane content of air in face operations exceeds one per cent at any
    point twelve or more inches from the roof, face, or rib, as determined by a permissible
    methane detector, a permissible flame safety lamp, or analysis, such condition
    shall be corrected by improving the ventilation promptly. The electric face equipment
    at such point shall be turned off and not turned back on until the methane condition
    is corrected by improving the ventilation.

    In gaseous mines, air that has passed through abandoned panel sections shall not
    be re-used to ventilate live workings. Mines that cannot comply with this requirement
    at once may continue to operate as at present for a reasonable length of time
    until future mine development and ventilation can be changed to permit compliance
    with this section.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.09
- number: '1567.10'
  heading: Ventilating fans
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Every outside fan installed after September 2, 1941, at any coal mine shall
    be placed at least twenty feet from the side or mouth of the shaft entry or slope
    with which it is connected for ventilating purposes and shall be of fireproof
    construction. Explosion doors shall be provided in a direct line with the mine
    opening.

    Upon the written order of the chief of the division of mineral resources management,
    all main mine fans installed after September 2, 1941, shall be so arranged that
    the ventilating current can be quickly reversed. No fan shall be reversed while
    workers are in the mine unless authority to do so is given, preferably in writing,
    by the mine foreperson, superintendent, state inspector, or other responsible
    person. The fan shall be inspected at least daily.

    Every main ventilating fan at nongaseous mines shall be kept in operation continuously
    day and night, unless operations are definitely suspended, except when written
    permission is given by the inspector to stop it. The permission, or a copy thereof,
    shall be posted by the mine foreperson in a conspicuous place at the entrances
    of the mine, and shall state the particular hours the fan may be stopped. The
    inspector may withdraw or modify such permission at any time and in any manner
    the inspector deems best. In all cases in which permission has been given by the
    inspector to stop the ventilating fan, the fan shall be started a sufficient length
    of time prior to the appointed time for any person working therein to enter, to
    clear the mine of explosive, poisonous, and noxious gases, and shall be kept in
    operation a sufficient length of time after the appointed time for such employees
    to leave their working places, for all persons to be out of the mine.

    Every main ventilating fan at gaseous mines shall be kept in operation continuously
    day and night unless operations are definitely suspended. Should it become necessary
    to stop the fan at any mine, gaseous or nongaseous, because of an accident to
    part of the machinery connected therewith, or by reason of any other unavoidable
    cause, the mine foreperson or the foreperson in charge shall, after first having
    provided for the safety of the persons employed in the mine, order the fans stopped
    for necessary repairs. Should the ventilating fans be stopped at any time for
    any reason at any gaseous mine for a period of time sufficient to cause a serious
    interruption of the ventilation, the source of electric power shall be forthwith
    disconnected from the mine, and the source of electric power shall not be reconnected
    with the mine until the fans have been started, and the mine has been examined
    by the mine foreperson, foreperson, or fire boss, and reported safe. A record
    of such examination shall be entered in the fire boss record book. The person
    in charge of the mine at the time of the examination is responsible for the execution
    of this latter provision.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.10
- number: '1567.11'
  heading: Booster and blower fans
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Booster and blower fans may be installed only with the approval of the chief
    of the division of mineral resources management, following the submission by the
    owner, lessee, or agent of a definite plan of ventilation in which it is proposed
    to use such fans and the reason therefor.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.11
- number: '1567.12'
  heading: Accident to ventilating fan
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'In case of an accident to a ventilating fan, or its machinery, whereby the
    ventilation of the mine may be seriously interrupted, the electric power shall
    be shut off. The mine foreman shall order the men to withdraw from the mine immediately,
    and he shall not allow them to return to their work until the ventilation has
    been restored and the mine has been thoroughly examined by him, or by a foreman
    or fire boss, and reported safe.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.12
- number: '1567.13'
  heading: Supervision of ventilating apparatus and airways
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The mine foreperson shall see that careful watch is kept over the ventilating
    apparatus and airways, and that the volume of the ventilating current is measured
    at least once each week at the inlet and outlet, at or near the face of all entries,
    and at that point in the mine where distribution to the various working sections
    begins. Such measurements shall be noted in duplicate on blanks furnished by the
    division of mineral resources management. On the first day of each month, the
    mine foreperson shall forward such blanks with the mine foreperson''s signature
    thereon to the deputy mine inspector in the district in which the mine is located,
    and such blanks shall be properly filled in with the actual measurements so taken
    as prescribed in this section. On all examinations that the mine foreperson makes
    of the old workings, the mine foreperson shall mark on a conspicuous place with
    chalk the mine foreperson''s initials and the date of the month of such examination.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.13
- number: '1567.14'
  heading: Entry into mine after interruption of ventilation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: Any person ordered by the mine foreman to withdraw from the mine because of
    the interruption of the ventilation shall not re-enter the mine until permission
    to do so has been granted after a thorough inspection has been made and the mine
    is found to be in a good and safe condition by the mine foreman.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.14
- number: '1567.15'
  heading: Closing of ventilating doors
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Motormen, trip riders, and drivers in charge of haulage trips, passing through
    doors used as a means of directing the ventilation, shall see that such doors
    are closed promptly after the trip passes through.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.15
- number: '1567.16'
  heading: Electrical system - prohibited activities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: No person shall damage or without authority alter, or make connection to,
    any portion of an electrical system of any mine location in this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.16
- number: '1567.17'
  heading: Rules for use of direct current
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Where direct current is used underground in mines, the following rules shall
    govern:

    (A) In determining the voltage limit the difference in potential shall not exceed
    three hundred twenty-five volts measured by a meter at the nearest switchboard
    except with the written approval of the chief of the division of mineral resources
    management.

    (B) For the protection of circuits, a switch and circuit breaker shall be installed
    in the ungrounded side of the circuit, but may be omitted from the return side.
    Fuses may be substituted for circuit breakers transmitting twenty-five kilowatts
    or less. Each circuit leading in the underground workings of such mine shall be
    provided with a suitable ammeter. Additional switches shall be installed in the
    ungrounded side of all branch circuits.

    (C) One side of grounded circuits shall be very efficiently insulated from the
    earth.

    (D) All trolley and feed wires shall be placed on the opposite side of the track
    from refuge holes or necks of room. All lines except telephone, shot firing, and
    signal lines shall be on the same side as the trolley lines.

    (E) All terminal ends of feed and trolley wires shall be guarded to prevent persons
    from inadvertently coming in contact with them.

    (F) No locomotive shall be operated by means of a person holding and sliding upon,
    or frequently making contact with, the positive wire with any device attached
    to the cable as a substitute for a trolley, except to move a locomotive out of
    traffic because of a broken trolley pole or fixtures attached thereto. This does
    not prohibit the operation of a locomotive by means of a cable without the use
    of the trolley, if the connection with and disconnection from the positive wire
    is made when the locomotive is not in motion.

    (G) Inside the mine the trolley wire shall be installed parallel to the gauge
    line of the rail and as far away as practical, and in no place closer than six
    inches from the gauge line, except where written permission is given by the chief.
    The trolley wire shall be securely supported on hangers efficiently insulated.
    Such hangers shall be placed at intervals of not exceeding thirty feet and at
    less intervals if it is necessary to prevent the sag between points of support
    exceeding three inches. Hangers installed after September 2, 1941, shall be of
    sufficient height to place the trolley wire within six inches of the roof or cross
    timbers at the point of trolley wire support, except where the trolley wire may
    be above the top of the normal seam or draw slate taken with the seam or six feet
    six inches from the top of the rail.

    (H) In underground workings all feed wires shall be in places either above the
    trolley wire on the same hangers, between trolley wire and rib, or on the rib
    as close to the roof as practicable, and securely supported on hangers sufficiently
    insulated, not more than fifty feet apart. If feed wires are installed in entries
    that are not equipped with trolleys, they are to be installed as close to the
    rib as practicable.

    (I) Recharging stations for battery locomotives located inside a mine shall be
    adequately ventilated at all times. All charging panels shall be equipped with
    automatic overload circuit breakers and ammeters. All refuse or movable material
    of an inflammable nature shall be kept out of such stations.

    (J) All trolley and positive feed wires crossing places where persons or animals
    are required to travel shall be safely guarded or protected from such persons
    or animals coming in contact with such wires, except where such wires are above
    the top of normal seam or draw slate taken with the seam, or six feet six inches
    from the top of the rail.

    (K) No trolley wire shall be extended into or maintained in any room while being
    used as a working place; no trolley or feed wire shall be extended into any entry
    beyond the outside corner of the last break-through, except in case of systems
    of mining or equipment approved by the chief.

    (L) When necessary to carry bare wires down shafts or slopes used as traveling
    ways, the wires shall be thoroughly protected so that persons cannot inadvertently
    come in contact with them.

    (M) When positive machine feed wires are extended into rooms, they shall be placed
    not nearer than four feet from the rail where the room is of sufficient width,
    and shall only be connected to the positive wire on the entry while in actual
    use. The wire used for making such connections shall be of sufficient length to
    reach across the entry, and when the same is disconnected, it shall be removed
    from the entry or be kept with the machine. No electric wires shall be extended
    into any room unless a one hundred fifty foot trailing cable will not reach the
    face of the room, and then not beyond the outside corner of the last break-through,
    except in the case of systems of mining and equipment approved by the chief. Means
    shall be provided by which machine runners may readily install the machine cable
    across the entry so as to render it free from ground, and so the cable will not
    come in contact with persons or animals required to travel such entry.

    (N) Any track or rail that is used as a return circuit shall be properly bonded.
    When metallic pipelines parallel a rail or track used for return, the pipe may
    be bonded to the rail at both ends to avoid electrolysis, and if the pipeline
    is of unusual length, intermediate bonds shall be installed. No pipeline or any
    part thereof shall be used exclusively as the return. In a section of a mine where
    electric detonators or electric squibs are used, metallic pipeline rails and return
    lines in that section shall be bonded together.

    (O) All lighting circuits of a mine, whether underground or outside, shall be
    installed in such a manner that they will not be a fire hazard or will not endanger
    persons coming in contact therewith.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.17
- number: '1567.18'
  heading: Rules for use of alternating current
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'When alternating current is used underground in mines, the following rules
    apply:

    (A) On all low voltage circuits all wires shall be protected by a switch and an
    automatic overload circuit breaker on each wire of the circuit, except that fuses
    may be substituted for circuit breakers in the case of lighting circuits and in
    the case of power circuits transmitting twenty-five kilowatts or less. All wires
    shall be insulated with a standard insulation and shall be placed between trolley
    wire and rib or on the rib as close to the roof as practicable and securely supported
    upon hangers efficiently insulated. Additional switches shall be installed in
    all branch circuits. All points of connection shall be properly protected so that
    persons cannot inadvertently come in contact therewith. No voltage in excess of
    two hundred sixty volts measured at the nearest switchboard shall be used in mobile
    machinery except with the written approval of the chief of the division of mineral
    resources management.

    (B) When high voltage circuits are used, all wires shall be provided with a suitable
    ammeter and protected by an oil-break switch on each wire of the circuit, such
    switch to be equipped with an automatic overload trip. All wires shall be insulated
    with a standard insulation at least fifty per cent higher than the standard for
    the commercial rated voltage between conductors and ground and installed in conduit
    or be lead covered with an additional covering of steel armor wire or steel tape,
    and all wire shall be subject to carrying capacity according to the rules of the
    national board of fire underwriters. This cable may be installed either in or
    on the bottom or in the location prescribed for direct current feed lines, except
    no further insulation shall be required than specified in this section.

    (C) No voltage in excess of eight thousand volts between conductor and ground
    may be used to operate semipermanent and permanent machinery except with the written
    approval of the chief. All installations shall be made in accordance with the
    accepted electrical standards and practices, especially with regard to protective
    switches, insulation materials, clearance danger signs, and gates. The location,
    ventilation, and protection against fire hazard and personal injury shall be subject
    to the approval of the chief.

    (D) The division of mineral resources management shall accept standard electrical
    practices in regard to the underground electrical installations and operation
    of alternating current equipment, but may augment the same to provide additional
    safeguards. When exercising this authority, the division shall give due consideration
    to the safety experience in regard to similar installations and the similar operation
    thereof under similar conditions.

    (E) The mine foreperson shall have posted at the mine opening, and in all permanent
    substations therein, a copy of instructions as to the method of resuscitation
    of persons suffering from electric shock. All persons working about such stations,
    or with electric machines, shall familiarize themselves with such rules.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.18
- number: '1567.19'
  heading: Grounding of machines and armored cable using alternating current
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'At all stripping mines where alternating current is used to operate shovels
    or to convert alternating current to direct current, and where the machines used
    for this purpose are installed on the shovel or building attached thereto, or
    where armored cables are used to conduct the current from the main transmission
    line to the shovel, all machines and armored cables so installed or used shall
    be grounded in a manner approved by the chief of the division of mineral resources
    management.

    No owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.19
- number: '1567.20'
  heading: Electrical equipment to be grounded
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The frame and bed plates of generators, transformers, motors other than low
    voltage mobile motors, and all metallic cable covering other than trailing cables,
    shall be efficiently grounded.

    No owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.20
- number: '1567.21'
  heading: Employment of shot firers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'In gaseous mines or portions of mines as defined by section 1563.02 of the
    Revised Code, a sufficient number of shot firers shall be employed. The shot firer
    shall charge, tamp, and fire all holes properly placed, and refuse to charge any
    holes not properly placed. Whenever such shot firers are required to be employed,
    it shall be unlawful for any one other than a shot firer to charge, tamp, or fire
    any blast within such mine.

    No owner, lessee, or agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.21
- number: '1567.22'
  heading: Use of black powder
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'In all gaseous mines, as defined in section 1563.02 of the Revised Code,
    no black powder shall be used for blasting coal and all shots shall be fired by
    a shot firer.

    No owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.22
- number: '1567.23'
  heading: Handling explosives in mines
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'No employee, worker, or miner shall have in the employee''s, worker''s, or
    miner''s possession inside of an underground mine more than one twenty-five pound
    keg or box of blasting powder or other explosives. Every person who has powder
    or other explosives in an underground mine shall keep the same in a wooden box
    suitable to contain the original container of such explosive. Such box shall be
    kept at all times at least twenty-five feet from the track and electric wire,
    no two of such boxes shall be kept within twenty-five feet of each other, nor
    shall blasting powder and high explosives be kept in the same box, and in no case
    shall detonating caps be kept in a box with blasting powder or high explosives.

    Where systems of mining are such that it is impracticable to comply with the first
    paragraph of this section, those requirements may be modified in writing by the
    chief of the division of mineral resources management, upon the request of the
    owner, lessee, or agent of such mine. No operator shall maintain or have a magazine
    for the storage of blasting powder or high explosives, including detonating caps,
    in the underground workings of any mine, except with the written permission of
    the chief.

    No employee or operator of a mine shall refuse or neglect to comply with this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.23
- number: '1567.24'
  heading: Conveyance of explosives
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Blasting powder or explosives shall not be taken into or out of a mine, or
    moved from place to place in a mine, along any entry or haulway where there are
    electric wires, while the power is on such wires, except when such powder or explosive
    is conveyed in insulated cars, boxes, or packages.

    No operator, or miner shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.24
- number: '1567.25'
  heading: Explosives to be protected from contact with fire
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Whenever a workman is about to open a box, package, or keg, containing powder
    or other explosives, and while handling the same, he shall place and keep his
    lamp at least five feet distant from such explosives, and in such a position that
    the air current cannot convey sparks to it. No person shall approach nearer than
    five feet to any box, keg, or package, containing powder or other explosives,
    or within five feet of another person handling such explosives, with a naked lamp,
    lighted pipe, or other thing containing fire.

    No workman shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.25
- number: '1567.26'
  heading: Explosives and tools on cages or stairways
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Powder, explosives, and working tools shall not be taken down or up a hoisting
    shaft in a cage when men are going down or up, nor shall such articles be taken
    down or up a stairway used for ingress and egress of persons.

    No miner or owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.26
- number: '1567.27'
  heading: Use of squibs and fuses - tamping
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'No employee in a mine, who is about to fire a shot with a squib, shall shorten
    the fuse, saturate it with oil, or ignite it, except at the extreme end; he shall
    see that all persons are out of danger from the probable effects of such shot,
    and if it is a rib shot, he shall notify the persons working next to him on said
    rib before firing said shot, and shall take measures to prevent anyone approaching
    by shouting "fire" immediately before lighting the fuse. When a squib is used
    and a shot misses fire, no person shall return until five minutes have elapsed.

    When a fuse is used and a shot misses fire, no person shall return until one hour
    has elapsed for each foot of fuse used.

    The needle used in preparing a blast shall be made of copper, and the tamping
    bar shall be made of wood, or shall be tipped with at least five inches of solid
    copper.

    No inflammable material, explosive in its nature, or any material that may create
    a spark, shall be used for tamping, and some soft material must always be placed
    next to the cartridge or explosive. When it is necessary to tamp dynamite, nothing
    but a wooden tamper shall be used.

    Two or more shots shall not be fired in the same face, unless all fuses used are
    at least twelve inches different in length, or unless the shots are fired simultaneously
    by electric caps or electric squibs.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.27
- number: '1567.30'
  heading: Firing of shots - appointed times
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: At a mine where the firing of shots is restricted to specific times, no miner
    shall fire a shot until the time appointed for him to do so, and then only in
    such rotation as designated.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.30
- number: '1567.31'
  heading: Drill holes
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: When a miner drills holes in the face of coal for blasting and such drill
    hole bottoms in the permanent roof, he shall not charge or fire such drill hole.
    No miner shall drill a new hole in such a way that any part of it shall be within
    twelve inches of any part of an unused drill hole or one in which there has been
    a misfired shot. No miner shall drill out or attempt to drill out the charge or
    tamping in a misfired shot.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.31
- number: '1567.32'
  heading: Misfired shots
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: A miner after firing a shot shall not leave the mine until he has determined
    whether or not such shot has misfired. If a shot misfires, such miner shall so
    report to the foreman in charge of the section in which he works before he leaves
    the mine.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.32
- number: '1567.33'
  heading: Examination after each blast
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'After each blast, the miner shall exercise great care in examining the roof
    and coal, and shall secure them safely before beginning to load coal.

    No person shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.33
- number: '1567.34'
  heading: Solid shooting
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The owner, lessee, or agent of any mine shall not order or permit solid shooting
    in a mine unless the owner, lessee, or agent has obtained written permission to
    do so from the chief of the division of mineral resources management, who may
    issue such permit when in the chief''s judgment such solid shooting is necessary
    for the just and reasonably profitable operation of such mine.

    No owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.34
- number: '1567.35'
  heading: Use of gasoline, naphtha, kerosene, fuel oil or gas engine
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'No gasoline, naphtha, kerosene, fuel oil, or gas engine shall be used in
    a mine, except for operating pumping machinery where electric, compressed air,
    or steam power is not available or cannot be transmitted to the pump, in which
    case the owner, lessee, or agent shall observe the following:

    (A) Notice shall be given to the chief of the division of mineral resources management
    before installing, and the installation and operation shall be subject to the
    chief''s approval.

    (B) No wood or inflammable material shall be permitted within twenty-five feet
    of the engine.

    (C) The supply tank from which the gasoline, naphtha, kerosene, or fuel oil is
    fed to the engine shall be of metal, with a suitable screw cap opening, fitted
    with a gasket, so as to make the tank airtight and prevent the escape of gas into
    the atmosphere, and the tank kept free from leaks.

    (D) The gasoline, naphtha, kerosene, or fuel oil shall be fed from a tank to the
    carburetor or mixer by metal tubes securely connected so as to reduce the possibility
    of leaks to a minimum.

    (E) The exhaust from the engine shall be conducted by means of metal pipes into
    the return air current, so that the combustion fumes will not enter the workings
    of the mine where the workers are required to work, or be conducted in an upcast
    shaft or slope not used as a means of ingress or egress or through metal pipes
    to the surface.

    (F) At no time shall more than five gallons of such gasoline, naphtha, kerosene,
    or fuel oil be taken into the mine, including that in the supply tank.

    (G) No gasoline, naphtha, kerosene, or fuel oil shall be taken into the mine except
    in metallic cans, with a screw cap opening at the top, fitted with a suitable
    gasket.

    (H) No package, can, or supply tank of an engine, containing gasoline, naphtha,
    kerosene, or fuel oil, shall be opened until ready to make the transfer from the
    package or can to the supply tank, and in transferring, a funnel shall be used
    so as to avoid spilling the gasoline, naphtha, kerosene, or fuel oil, and the
    cap on the supply tank shall be immediately closed.

    (I) In no case shall the package, can, or supply tank be opened when an open light
    or other thing containing fire is within twenty-five feet of the same, provided
    that subject to the approval of the chief, the restrictions in the use of fuel
    oil in a mine shall not apply to mobile or portable machinery, if the mobile or
    portable machinery is used in a clay, limestone, shale, or any other mine not
    a coal mine.

    Nothing in this section shall be construed to prohibit or impede the use of diesel
    equipment in an underground coal mine, provided that the chief approves the use
    of the equipment in underground mines and the equipment satisfies requirements
    established in rules adopted by the chief under section 1513.02 of the Revised
    Code governing the use of diesel equipment in underground mines.

    No owner, lessee, agent, or operator of a mine shall violate this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.35
- number: '1567.36'
  heading: Fire extinguishers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'At each permanent underground oil storage station there shall be two portable
    fire extinguishers and two hundred forty pounds of rock dust. One portable fire
    extinguisher shall be provided at each working section where twenty-five gallons
    or more of oil are stored in addition to extinguishers required under other sections
    of this chapter.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.36
- number: '1567.38'
  heading: Use of locomotive and haulage equipment
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'At a mine, or in any part thereof, where a locomotive is detached from a
    moving train of cars for the purpose of dropping such cars past the locomotive,
    and the haulageway at such point is designated as the principal traveling way,
    a traveling way, not less than three feet wide, shall be provided on one side
    of that portion of the track from where the locomotive will be detached to the
    switch of the siding. Such traveling way shall be made on the same side of the
    track as the refuge holes. No locomotive shall be detached from a train of moving
    cars, for the purpose of making a drop thereof, more than one hundred feet from
    the switch of the siding.

    At an underground mine, or in any part thereof, each self-propelled personnel
    carrier shall be provided with an audible warning device, a sealed-beam headlight,
    or its equivalent, on each end, and reflectors on both ends and sides. In addition,
    each track mounted self-propelled piece of mobile equipment shall be provided
    with a suitable lifting jack and bar that shall be secured or carried in a tool
    compartment, two separate and independent braking systems properly installed and
    well maintained, and properly installed and well-maintained sanding devices, except
    that personnel carriers which transport not more than five men need not be equipped
    with such sanding devices. Each open type self-propelled personnel carrier shall
    be equipped with guards of sufficient strength and height to prevent personnel
    from being thrown from such carriers.

    Mantrips shall be operated independently of any loaded trip, empty trip, or supply
    trip, and may not be operated within three hundred feet of any trip, including
    another mantrip. A sufficient number of mantrips shall be provided to prevent
    overcrowding of men. Mantrips shall not be pushed. Where mantrips are operated
    by locomotives on slopes, such mantrips shall be coupled to the front and rear
    by locomotives capable of holding such mantrips. Where ropes are used on slopes
    for mantrip haulage, such conveyances shall be connected by chains or other no
    less effective devices between mantrip cars and the rope. Safety goggles or eyeshields
    shall be provided for all persons being transported on or operating open-type
    equipment. All trips, including trailers and sleds, shall be operated at speeds
    consistent with conditions and the equipment used, and shall be so controlled
    that they can be stopped within the limits of visibility.

    All mantrips shall be under the direction of a supervisor and the operator of
    each mantrip shall be familiar with the haulage safety rules.

    Men shall proceed in an orderly manner to and from mantrips and no person shall
    be permitted to get on or off a moving mantrip.

    Explosives and detonators shall not be permitted on any mantrip or hauled within
    five minutes before or after any mantrip. Mantrips shall not be permitted to proceed
    until the operator of the mantrip is assured that he has a clear road. Supplies
    or tools, except small hand tools or instruments, shall not be transported with
    men. At places where men enter or leave mantrip conveyances, ample clearance shall
    be provided and provisions made to prevent persons from coming in contact with
    energized electric circuits. The mine car next to a trolley locomotive shall not
    be used to transport men. Such cars may be used to transport small tools and supplies.
    This does not permit the transportation of large or bulky supplies such as shuttle
    car wheel units, or similar material. Drop-bottom cars used to transport men shall
    have the bottoms secured with an additional locking device. Extraneous materials
    or supplies shall not be transported on top of equipment, however, materials and
    supplies that are necessary for or related to the operation of such equipment
    may be transported on top of such equipment if a hazard is not introduced.

    The speed at which haulage equipment is operated shall be determined by the condition
    of the roadbed, rails, rail joints, switches, frogs, and other elements of the
    track and the type and condition of the haulage equipment. Track haulage roads
    shall have a continuous clearance on one side of at least twenty-four inches from
    the farthest projection of normal traffic. Where it is necessary to change the
    side on which clearance is provided, twenty-four inches of clearance shall be
    provided on both sides for a distance of not less than one hundred feet and warning
    signs should be posted at such locations. Track haulage roads developed after
    January 1, 1977, shall have clearance on the tight side of at least twelve inches
    from the farthest projection of normal traffic. A minimum clearance of six inches
    shall be maintained on the tight side of all track haulage roads developed prior
    to January 1, 1977. The clearance space on all track haulage roads shall be kept
    free of loose rock, supplies, and other loose materials.

    Positive stopblocks or derails shall be installed on all tracks near the top and
    at landing of shafts, slopes, and surface inclines.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.38
- number: '1567.39'
  heading: Lights and signals for locomotives and cars - riding on locomotive - protection
    against runaway or self-propelled equipment
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'The operator of an underground coal mine, at which locomotives are used for
    hauling coal, shall keep a light on the front end of the locomotive when it is
    in use. When the locomotive is run ahead of the trip, and the trip rider is not
    required to ride the rear car of the trip, a signal, light, or marker, approved
    by the deputy mine inspector, shall be carried on the rear end of the trip to
    indicate when the trip has passed. Cars shall not be pushed ahead of the locomotive
    where it can be avoided. When cars are run ahead of the locomotive, a light shall
    be carried on the front end of the trip, and the cars shall not be moved at a
    speed greater than four miles per hour. When rope haulage is used, an enclosed
    light shall be carried on the front end of each train so hauled.

    A trip light, reflectors, or other devices approved by the chief of the division
    of mineral resources management shall be used on the rear of trips pulled and
    on the front of trips pushed or lowered in slopes. However, trip lights or other
    approved devices need not be used on cars being shifted to and from loading machines,
    on cars being handled at loading heads, during gathering operations at working
    faces, when trailing locomotives are used, or on trips pulled by animals. Cars
    on main haulage roads shall not be pushed, except where necessary to push cars
    from side tracks located near the working section to the producing entries and
    rooms, where necessary to clear switches and sidetracks, and on the approach to
    cages, slopes, and surface inclines. Warning lights or reflective signs or tapes
    shall be installed along haulage roads at locations of abrupt or sudden changes
    in the overhead clearance.

    No person, other than the locomotive operator and brakeperson, shall ride on a
    locomotive unless authorized by the mine foreperson, and then only when safe riding
    facilities are provided.

    Positive-acting stopblocks or derails shall be used where necessary to protect
    persons from danger of runaway haulage equipment. The operator of all self-propelled
    equipment including off-track equipment shall give an audible warning wherever
    persons may be endangered by the movement of the equipment. Locomotives and personnel
    carriers shall not approach within three hundred feet of preceding haulage equipment,
    except trailing locomotives that are an integral part of the trip. A total of
    at least thirty-six inches of unobstructed side clearance (both sides combined)
    shall be provided for all rubber-tired haulage equipment where such equipment
    is used. Off-track haulage roadways shall be maintained as free as practicable
    from bottom irregularities, debris, and wet or muddy conditions that affect the
    control of the equipment. Operators of self-propelled equipment shall face in
    the direction of travel. Mechanical steering and control devices shall be maintained
    so as to provide positive control at all times. All self-propelled, rubber-tired
    haulage equipment shall be equipped with well maintained brakes, lights, and a
    warning device. On and after January 1, 1977, all tram control switches on rubber-tired
    equipment shall be designed to provide automatic return to the stop or off position
    when released.

    No operator of a mine shall refuse or neglect to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.39
- number: '1567.40'
  heading: Riding on haulage trips
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: No person except those in charge of trips, superintendents, mine foremen,
    mine electricians, machinists, and blacksmiths, when required by their duty, shall
    ride on haulage trips, except where by mutual agreement in writing between the
    owner, lessee, or agent, and the employees, a special trip of empty cars is run
    for the purpose of taking employees into and out of the mine, or empty cars attached
    to loaded trips, which shall not be run at a speed exceeding eight miles per hour.
    No person except a trip rider shall ride on a loaded car, and he shall ride only
    the front or rear end of the trip.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.40
