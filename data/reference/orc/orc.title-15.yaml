- number: '1571.11'
  heading: Rules governing administrative procedures
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: 'The chief of the division of oil and gas resources management shall adopt
    rules governing administrative procedures to be followed in the administration
    of this chapter, which shall be of general application in all matters and to all
    persons affected by this chapter.

    No rule adopted by the chief pursuant to this section shall be effective until
    the tenth day after a certified copy thereof has been filed in the office of the
    secretary of state.

    All rules filed in the office of the secretary of state pursuant to this section
    shall be recorded by the secretary of state under a heading entitled "Regulations
    relating to the storage of gas in underground gas storage reservoirs" and shall
    be numbered consecutively under such heading and shall bear the date of filing.
    Such rules shall be public records open to public inspection.

    No rule filed in the office of the secretary of state pursuant to this section
    shall be amended except by a rule that contains the entire rule as amended and
    that repeals the rule amended. Each rule that amends a rule shall bear the same
    consecutive rule number as the number of the rule that it amends, and it shall
    bear the date of filing.

    No rule filed in the office of the secretary of state pursuant to this section
    shall be repealed except by a rule. Each rule that repeals a rule shall bear the
    same consecutive rule number as the number of the rule that it repeals, and it
    shall bear the date of filing.

    The authority and the duty of the chief to adopt rules as provided in this section
    shall not be governed by, or be subject to Chapter 119. of the Revised Code.

    The chief shall have available at all times copies of all rules adopted pursuant
    to this section, and shall furnish same free of charge to any person requesting
    same.'
