- number: '1547.55'
  heading: Moneys collected paid into waterways safety fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: All moneys collected by the chief of the division of parks and watercraft
    under this chapter shall be paid into the waterways safety fund established in
    section 1547.75 of the Revised Code. All expenses for salaries, operation, and
    administration of the division relating to boating shall be paid from the fund.
    The chief may make expenditures from the fund for publishing statutes and rules
    concerning watercraft, for publications which are solely for the purpose of providing
    education in watercraft safety, sanitation, or operation, and for other educational
    devices for that purpose. The chief shall make payments to the division of parks
    and recreation, the division of wildlife, conservancy districts, and political
    subdivisions of this state as further provided in section 1547.56 of the Revised
    Code. No moneys paid into the fund shall be used or paid out for any purposes
    other than those for which the fund is appropriated. All investment earnings of
    the fund shall be credited to the fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.55
- number: '1547.56'
  heading: Reimbursing political subdivisions and agencies
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: All applications for a registration certificate filed with the chief of the
    division of parks and watercraft shall bear a notation as to water principally
    used by the watercraft. The division of wildlife, conservancy districts, and other
    political subdivisions having impounded bodies of water upon which boating is
    permitted and authorized shall file annually with the chief an application for
    refund. The chief shall annually reimburse the division of wildlife, conservancy
    districts, and such other political subdivisions which have made proper application,
    in the amount of money collected by the chief as fees for the issuance of registration
    certificates commensurate with the number of watercraft having designated the
    waters of the division, conservancy district, or political subdivision as the
    water principally used. The amounts so refunded shall not be less than ninety
    per cent of the amounts separately collected by the division of wildlife, conservancy
    districts, and other political subdivisions, in the calendar year 1959, for watercraft
    license fees so long as the total revenue received by the division of parks and
    watercraft in each succeeding license year thereafter is equal to, or in excess
    of, the total revenue derived by all state departments, conservancy districts,
    and political subdivisions of this state, requiring licenses, and received by
    them in the calendar year 1959. The chief shall first deduct from the amount to
    be refunded the applicable pro rata share of all costs of operation of the division
    of watercraft determined by the ratio between the amount to be so refunded and
    the total fees received by the division for issuances of registration certificates.
    On all applications which have designated water other than those specified above
    as water principally used, the chief shall pay the fees received from the applications
    to the waterways safety fund established in section 1547.75 of the Revised Code.
