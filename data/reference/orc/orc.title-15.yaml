- number: '1551.18'
  heading: State purpose to promote efficient utilization of energy
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: The general assembly finds and declares that it is an essential government
    function and public purpose of the state to promote the efficient utilization
    of energy, encourage the increased utilization of the state's indigeneous energy
    resources, promote the development of renewable energy resources, and foster increased
    cooperation amoung all levels of government for the preservation or creation of
    jobs and employment opportunities, the encouragement of economic growth, the promotion
    of the general welfare, the protection of the public health and safety, and the
    protection of environmental quality.
