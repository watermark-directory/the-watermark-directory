- number: '1514.023'
  heading: Zoning resolutions or ordinances
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: Nothing in this chapter or rules adopted under it shall be construed to prevent
    any county, township, or municipal corporation from enacting, adopting, or enforcing
    zoning resolutions or ordinances. However, the chief of the division of mineral
    resources management shall not enforce such zoning resolutions or ordinances.
