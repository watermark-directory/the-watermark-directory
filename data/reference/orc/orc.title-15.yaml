- number: '1546.05'
  heading: Exemptions and discounts from certain fees and charges
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: '(A) Every disabled veteran is exempt from the fees for camping established
    by rule. To claim this exemption, the disabled veteran shall carry in the state
    park such evidence of the veteran''s disability as prescribed by rule.

    (B) Unless otherwise provided by rule, an elderly or disabled resident shall be
    charged one-half of the regular fee for camping, except on the weekends and holidays
    designated by the division of parks and watercraft. In addition, the elderly or
    disabled resident shall not be charged more than ninety per cent of the regular
    charges for state recreational facilities, equipment, services, and food service
    operations utilized by the resident at any time of year, whether maintained or
    operated by the state or leased for operation by another entity.

    (C) Any person who has been a prisoner of war, was honorably discharged from the
    armed forces of the United States, and is a resident of this state is exempt from
    the fees for camping. To claim this exemption, the person shall present written
    evidence in the form of a record of separation, a letter from one of the military
    forces of the United States, or such other evidence as the chief prescribes by
    rule that satisfies the eligibility criteria established by this section.

    (D) As used in this section:

    (1) "Disabled veteran" means either of the following:

    (a) A resident of this state with a disability that has been determined by the
    veterans administration to be permanently and totally disabling, who receives
    a pension or compensation from the veterans administration, and who received an
    honorable discharge from the armed forces of the United States;

    (b) A veteran to whom the registrar of motor vehicles has issued a set of license
    plates under section 4503.41 of the Revised Code.

    (2) "Elderly or disabled resident" means a resident of this state who is sixty-five
    years of age or older or who is permanently and totally disabled and who furnishes
    evidence of that age or disability in a manner prescribed by rule.

    (3) "Food service operations" means restaurants that are owned by the department
    of natural resources at Hocking Hills, Lake Hope, Malabar Farm, and Rocky Fork
    state parks or are part of a state park lodge. "Food service operations" does
    not include automatic vending machines, concession stands, or snack bars.

    (4) "Prisoner of war" means any regularly appointed, enrolled, enlisted, or inducted
    member of the armed forces of the United States who was captured, separated, and
    incarcerated by an enemy of the United States.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.05
- number: '1546.06'
  heading: State park purchase areas
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: 'The chief of the division of parks and watercraft shall prepare and submit
    to the director of natural resources maps and descriptions of the areas of lands
    and waters which the chief intends to designate as state park purchase areas.
    Such state park purchase areas may include lands and waters at the time belonging
    to the state, together with lands and waters not belonging to the state but which
    for reasons of protection, utilization, and administration should be subject to
    purchase by the state for park purposes. If such area is approved by the director
    of natural resources, it shall be known as a state park purchase area, and the
    map and description thereof, with the approval of the director of natural resources
    indorsed thereon, shall be filed in duplicate with the director of administrative
    services and the attorney general.

    All moneys appropriated for the purchase of lands and waters by the state for
    park purposes, unless specifically appropriated for the purchase of particular
    tracts or areas, may be expended for the purchase of lands or waters within any
    legally established state park purchase area. If, after the purchase of specifically
    designated tracts or areas, moneys from such appropriations remain unexpended,
    upon the request of the director of natural resources, the controlling board shall
    release such funds, in whole or in part, for the purchase of lands or waters within
    any state park purchase area.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.06
- number: '1546.07'
  heading: Telephone service in parks, conservancy districts, and on highways
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: 'The chief of the division of parks and watercraft shall have the power to
    contract with any telephone company, which provides telephone service in the area
    of which a state park is located, for the establishment or maintenance of any
    telephone service in any location in such state park. The board of directors of
    a conservancy district shall have the power to contract with any telephone company
    which provides telephone service in the area in which a park, parkway, forest
    preserve, bathing beach, playground, or other recreational facility of the conservancy
    district is located, for the establishment or maintenance of public telephone
    service in any location in such conservancy district park, parkway, forest preserve,
    or recreational facility. The director of transportation shall have the power
    to contract with any telephone company which provides telephone service in the
    area in which a highway right-of-way is located, for the establishment or maintenance
    of public telephone service in any location in a state park or on a highway right-of-way.

    For purposes of this section, the chief, board, and director may agree to comply
    with any rules and regulations of the telephone company with respect to public
    telephone service contained in its schedules on file with the public utilities
    commission of Ohio or applied by such telephone company to others in similar locations.
    For the purpose of establishing or maintaining such public telephone service,
    the chief in state parks or the director of transportation on highway right-of-ways
    may grant to such telephone company, without charge, appropriate permits for right-of-way
    for its facilities necessary to establish and maintain such public telephone service
    which permits shall remain valid as long as such public telephones remain in service.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.07
- number: '1546.08'
  heading: Testing of waters adjacent to public swimming beaches for bacteria levels
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: '(A) As used in this section, "public swimming beach" means land along a shoreline
    that is under the control of the division of parks and watercraft and is used
    by the public when swimming and bathing in waters adjacent to the beach.

    (B) The chief of the division of parks and watercraft shall ensure that the waters
    of this state that are adjacent to public swimming beaches are sampled and tested
    in accordance with the techniques and procedures established by the director of
    health under section 3701.18 of the Revised Code. The department of health may
    assist the division in the sampling and testing of the waters.

    (C) On receipt of notification by the director of health under section 3701.18
    of the Revised Code that the bacteria levels in the waters tested present a possible
    health risk to persons using the waters for swimming and bathing and that the
    posting of signs advising the public of the condition is warranted, the chief
    shall ensure that appropriate signs are posted in appropriate locations at the
    affected area.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.08
- number: '1546.09'
  heading: Annual report
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The division of parks and watercraft shall include in its annual report to
    the governor a statement of its action on all matters pertaining to the management
    and control of all state reservoirs, lakes, and lands set apart for public parks
    or pleasure resorts, which statement shall include a statement of the receipts
    and expenditures on account thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.09
- number: '1546.10'
  heading: Disposal of timber, dredging operation spoils and other property
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: '(A) The chief of the division of parks and watercraft, with the approval
    of the director of natural resources, may dispose of any of the following by sale,
    donation, trade, trade-in, recycling, or any other lawful means, in a manner that
    will benefit the division:

    (1) Standing timber that as a result of wind, storm, pestilence, or any other
    natural occurrence may present a hazard to life or property, timber that has weakened
    or fallen on lands under the control and management of the division, or any timber
    or other forest products that require management to improve wildlife habitat,
    protect against wildfires, provide access to recreational facilities, implement
    sustainable forestry practices, or improve the safety, quality, or appearance
    of any state park area;

    (2) Spoils of a dredging operation conducted by the division in waters under the
    control and management of the division. Prior to the disposition of any spoils
    under this division, the chief shall notify the director of environmental protection
    of the chief''s intent so that the director may determine if the spoils constitute
    solid wastes or hazardous waste, as those terms are defined in section 3734.01
    of the Revised Code, that must be disposed of in accordance with Chapter 3734.
    of the Revised Code. If the director does not notify the chief within thirty days
    after receiving notice of the disposition that the spoils must be disposed of
    in accordance with Chapter 3734. of the Revised Code, the chief may proceed with
    the disposition.

    (3) Notwithstanding sections 125.12 to 125.14 of the Revised Code, excess supplies
    and surplus supplies, as those terms are defined in section 125.12 of the Revised
    Code;

    (4) Agricultural products that are grown or raised by the division. As used in
    this division, "agricultural products" includes products of apiculture, animal
    husbandry, or poultry husbandry, field crops, fruits, and vegetables.

    (5) Abandoned personal property, including golf balls that are found on property
    under the control and management of the division.

    (B) In accordance with Chapter 119. of the Revised Code, the chief shall adopt,
    and may amend and rescind, such rules as are necessary to administer this section.

    (C) Except as provided in division (D) of this section, proceeds from the disposition
    of items under this section shall be deposited in the state treasury to the credit
    of the state park fund created in section 1546.21 of the Revised Code.

    (D) The chief of the division of parks and watercraft may enter into a memorandum
    of understanding with the chief of the division of forestry to allow the division
    of forestry to administer the sale of timber and forest products on lands that
    are owned or controlled by the division of parks and watercraft. Proceeds from
    the sale of timber or forest products pursuant to the memorandum of understanding
    shall be apportioned as follows:

    (1) Seventy-five per cent of the proceeds shall be deposited in the state treasury
    to the credit of the state park fund.

    (2) Twenty-five per cent of the proceeds shall be deposited in the state treasury
    to the credit of the state forest fund created in section 1503.05 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.10
- number: '1546.11'
  heading: Dedication of state reservoirs
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: 'The following bodies of water and lands are hereby dedicated and set apart
    forever for the use of the public as public parks or pleasure resorts:

    (A) The body of water and adjacent state lands in Licking, Fairfield, and Perry
    counties, known as the Licking reservoir or Buckeye Lake;

    (B) The body of water and adjacent state lands in the northwestern part of Logan
    county, known as the Lewistown reservoir or Indian Lake;

    (C) The body of water and adjacent lands owned by the state in Mercer county,
    known as the Lake St. Marys;

    (D) The bodies of water and adjacent lands owned by the state consisting of the
    Summit county lakes and reservoirs of the Ohio canal, known as the Portage-Summit
    reservoirs, together with the Summit lake and enough of the Summit level of the
    Ohio canal to maintain the present water level of Summit and Nesmith lakes, and
    the body of water and exterior lands adjacent thereto that are included in the
    reservoir constructed by the board of public works in Coventry township for the
    purpose of supplying water for the Ohio canal, known as North reservoir, all situated
    in Summit county;

    (E) The body of water and adjacent lands owned by the state in Shelby and Auglaize
    counties, and known as the Loramie reservoir.

    The bodies of water mentioned in this section shall, in the order in which they
    are described, be named and designated as follows: "Buckeye Lake," "Indian Lake,"
    "Lake St. Marys," "The Portage Lakes," and "Lake Loramie."'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.11
- number: '1546.12'
  heading: Lakes for use of public
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The lakes named in section 1546.11 of the Revised Code shall at all times
    be open to the public as resorts for recreation and pleasure, including hunting,
    fishing, and boating. The privileges of hunting and fishing shall be subject to
    the fish and game laws of the state, and the boating privileges shall be subject
    to the rules and regulations prescribed by law and the division of parks and watercraft.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.12
- number: '1546.13'
  heading: Transfer of lease after foreclosure sale
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: When buildings located on state land are sold on foreclosure in a delinquent
    tax suit or in a mortgage foreclosure suit, the state immediately shall transfer
    to the purchaser of the buildings the lease for the state lands on which the buildings
    are located or shall cancel the former lease and execute a new lease to the purchaser.
    If a new lease is executed, it shall be for the same annual rental, contain the
    same restrictions, and grant the same privileges enjoyed by the former owner,
    including the privilege of purchasing the land in accordance with section 1501.01
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.13
- number: '1546.14'
  heading: Leases to take and remove halite and coal
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The chief of the division of parks and watercraft, with the approval of the
    director of natural resources, the attorney general, and the governor, may make
    leases to parties making application for leases granting permission to take and
    remove halite from beneath the surface of Headlands state park in Lake county,
    and coal by underground mining methods from beneath the surface of Jefferson state
    park in Jefferson county and from beneath the surface of Burr Oak state park in
    Athens and Morgan counties pursuant to lease agreements and real estate transactions
    that have been entered into not later than January 1, 2011, if the chief finds
    that such taking and removal will in no way affect the surface of the land or
    the use of the land as a public park. As the chief deems in the best interest
    of the state, those leases may be made either upon a royalty or rental basis,
    and may be either for a term of years or until the economic extraction of the
    mineral covered by the lease has been completed. Upon request from the lessee
    of any such lease, the chief may consent to its cancellation, but any equipment
    or improvement thereon owned by the lessee may be held as security by the chief
    for payment of all rentals, royalties, and damages due the state at the time of
    cancellation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.14
- number: '1546.15'
  heading: Rules and regulations; enforcement
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The division of parks and watercraft shall make and enforce such rules and
    regulations, including the appointment and government of park and patrol officers
    in all parks and bodies of water and lands adjacent thereto under the supervision
    and control of the division, as are necessary to the proper management of such
    parks and bodies of water, and in accordance with sections 119.01 to 119.13, inclusive,
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.15
- number: '1546.16'
  heading: Pilot and engineer licenses
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The chief of the division of parks and watercraft shall issue pilot licenses
    and engineer licenses to all persons employed by a boat owner or operator to act
    as pilot or engineer on any boat carrying passengers for hire on reservoir parks
    or other bodies of water under the supervision and control of the division. The
    applicant for such license shall be over eighteen years of age. The violation
    of any of the sections of the Revised Code relating to reservoir parks or other
    bodies of water under supervision and control of the division or any rule or regulation
    of the division for the management of such reservoir parks or other bodies of
    water shall be cause for the chief to revoke such license.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.16
- number: '1546.17'
  heading: Inspection of watercraft
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The chief of the division of parks and watercraft shall inspect all boats
    and watercraft maintained and operated in or upon the waters of any state reservoir,
    lakes, canals, and feeders, and may condemn any such boat or watercraft which
    is unsafe for the carrying of passengers. No owner of a boat or watercraft so
    condemned shall offer it for hire. If such owner violates this section, the permit
    issued to the owner shall be revoked and annulled.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.17
- number: '1546.18'
  heading: Natural resources officer may take possession of boat
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: A natural resources officer appointed under section 1501.24 of the Revised
    Code may take possession of and hold a boat or other property if such action appears
    necessary in the course of making an arrest of a person violating sections 1546.15
    to 1546.17 of the Revised Code. A natural resources officer shall not be held
    liable for the loss of or any damage done to such boat or other property taken
    and held by reason of the failure to comply with such sections, provided ordinary
    care is exercised in the handling of such property. No person shall take possession
    of a boat or other property which has been taken in charge by a natural resources
    officer as provided in this section, until the officer has released same.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.18
- number: '1546.19'
  heading: Prohibition against use of firearms or fireworks in state parks - exception
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: No person shall engage in the hunting of wildlife, either with a gun or with
    a bow and arrow, on lands or waters operated or administered by the division of
    parks and watercraft, except on such lands or waters as are exempted by the chief
    of the division, under specific orders adopted in conformity with sections 119.01
    to 119.13 of the Revised Code. No person shall engage in the discharge of firearms
    except during open season for hunting of wildlife on lands or waters exempted
    as provided in this section, or except in such places where there is provided
    by the division, skeet, trap shooting, or other shooting ranges. No person shall
    engage in the discharge of fireworks on lands or waters operated or administered
    by the division, except a licensed exhibitor of fireworks who is acting in accordance
    with sections 3743.50 to 3743.55 of the Revised Code and who has obtained the
    written permission of the chief of the division for a particular public fireworks
    exhibition.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.19
- number: '1546.20'
  heading: Care of state property
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: No person shall injure, alter, destroy, remove, or change any tree, building,
    dock, or land, or part thereof, within a state reservoir park or other body of
    water under the supervision and control of the division of parks and watercraft,
    or construct any building or dock within such reservoir park, without the written
    permission of the chief of the division. All lessees of state lands or lots shall
    keep the premises in good condition and free of weeds, inflammable substances,
    garbage, and all other unsightly or dangerous things. Proof that any state premises
    under lease are used for illegal or immoral purposes shall be just cause for the
    chief to cancel the leasehold for such state property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.20
- number: '1546.21'
  heading: State park fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: '(A) The chief of the division of parks and watercraft shall collect all rentals
    from leases of state lands and moneys for pipe permits, dock licenses, concession
    fees, and special privileges of any nature from all lands and waters operated
    and administered by the division. The chief shall keep a record of all such payments
    showing the amounts received, from whom, and for what purpose collected. All such
    payments shall be credited to the state park fund, which is hereby created in
    the state treasury, except such revenues required to be set aside or paid into
    depositories or trust funds for the payment of bonds issued under sections 1501.12
    to 1501.15 of the Revised Code, and to maintain the required reserves therefor
    as provided in the orders authorizing the issuance of such bonds or the trust
    agreements securing such bonds, and except such revenues required to be paid and
    credited pursuant to the bond proceedings applicable to obligations issued pursuant
    to section 154.22 of the Revised Code. All moneys derived from the operation of
    the lands, waters, facilities, and equipment by the division, except such revenues
    required to be set aside or paid into depositories or trust funds for the payment
    of bonds issued under sections 1501.12 to 1501.15 of the Revised Code, and to
    maintain the required reserves therefor as provided in the orders authorizing
    the issuance of such bonds or the trust agreements securing such bonds, and except
    such revenues required to be paid and credited pursuant to the bond proceedings
    applicable to obligations issued pursuant to section 154.22 of the Revised Code,
    shall accrue to the credit of the state park fund.

    Except as otherwise provided in divisions (B) and (C) of this section and in sections
    154.22, 1501.11, and 1501.14 of the Revised Code, such fund shall not be expended
    for any purpose other than the administration, operation, maintenance, development,
    and utilization of lands and waters, and for facilities and equipment incident
    thereto, administered by the division, or for the further purchase of lands and
    waters by the state for park and recreational purposes.

    (B) The chief shall use moneys in the fund from the issuance of Ohio state parks
    license plates under section 4503.575 of the Revised Code only to pay the costs
    of state park interpretive and educational programs and displays and the development
    and operation of state park interpretive centers.

    (C) The director of natural resources may use moneys from the fund to make the
    payments required under section 1501.29 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.21
- number: '1546.22'
  heading: Parks capital expenses fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: There is hereby created in the state treasury the parks capital expenses fund.
    The fund shall consist of moneys transferred to it from the parks and recreation
    improvement fund created in section 154.22 of the Revised Code. The parks capital
    expenses fund shall be used to pay design, engineering, and planning costs that
    are incurred by the department of natural resources for parks-related capital
    projects.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.22
- number: '1546.23'
  heading: Rights unaffected by dedication
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The dedication or setting apart of any state reservoir or lake as a public
    park or pleasure resort shall not interfere with or affect the use of such reservoir
    or lake for canal reservoir purposes, and the chief of the division of parks and
    watercraft shall not be restricted in any manner from making such repairs and
    improvements thereon as are necessary for maintaining the safety and usefulness
    of such reservoir or lake for canal purposes. The authority for the division to
    manage and control such reservoir or lake for canal purposes is the same as if
    no dedication of such reservoir or lake for park and pleasure resort purposes
    had been made.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.23
- number: '1546.24'
  heading: Parks and watercraft federal grants fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: There is hereby created in the state treasury the parks and watercraft federal
    grants fund. The fund shall consist of federal funds received by the department
    of natural resources for purposes of this section and any other money credited
    to the fund. The chief of the division of parks and watercraft shall use money
    in the fund for parks and watercraft projects approved by the director of natural
    resources.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.24
- number: '1546.25'
  heading: Park lodges, maintenance, and repair fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: The park lodges, maintenance, and repair fund is created in the state treasury.
    The fund shall consist of money received from contractual agreements with service
    providers and concessionaires for state park lodges, restaurants, and marinas.
    The chief of the division of parks and watercraft shall use money in the fund
    to pay maintenance and repair costs for facilities operated by concessionaires
    and service providers at state park lodges, restaurants, and marinas.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.25
- number: '1546.26'
  heading: Parks and watercraft holding fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: 'The parks and watercraft holding fund is created in the state treasury. The
    fund shall consist of money received by the division of parks and watercraft from
    gift card sales, credit card sales, and sales conducted at field locations.

    With regard to gift card sales, the chief of the division of parks and watercraft
    shall transfer money in the parks and watercraft holding fund to the appropriate
    fund after gift certificates and gift cards are redeemed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.26
- number: '1546.30'
  heading: Henry T. Beatty Memorial Picnic Area
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: 'The picnic area that is located northwest of the intersection of Titus road
    and Division street in Kelleys Island state park shall be known as the "Henry
    T. Beatty Memorial Picnic Area."

    The chief of the division of parks and watercraft may erect suitable markers in
    the picnic area indicating its name.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.30
- number: '1546.31'
  heading: Doris Duke Woods timber restriction
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: '(A) The "Doris Duke Woods" is hereby designated within the Malabar state
    park in Richland county to honor Doris Duke''s pioneering contributions to conservation
    at Malabar state park and across the nation.

    (B) The "Doris Duke Woods" consists of one hundred twenty contiguous acres of
    Malabar state park''s most mature hardwood forest located between Bromfield road
    and state route number ninety-five.

    (C) The department of natural resources shall not remove or allow any person or
    governmental entity to remove timber from the "Doris Duke Woods," except for normal
    maintenance purposes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1546.31
- number: '1546.32'
  heading: Rocky Fork state park permits
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1546'
    name: Division Of Parks And Watercraft
  text: '(A) As used in this section:

    (1) "Property owner" means the owner of property adjacent to state park lands
    that abut a state park lake.

    (2) "State park lake" means a lake originally constructed for economic development
    purposes that is located in a state park that is situated in a county with a population
    under fifty thousand residents in accordance with the most recent federal decennial
    census.

    (B) The chief of the division of parks and watercraft shall establish a program
    for the issuance of permits to property owners who seek to do any of the following:

    (1) Construct or acquire and maintain a dock on and abutting a state park lake;

    (2) Mow state park land that is located between a state park lake and the owner''s
    property;

    (3) Remove trees from state park land that is located between a state park lake
    and the owner''s property;

    (4) Control the undergrowth or remove invasive species of plants or trees on state
    park property that is located between a state park lake and the owner''s property.

    (C)(1) If a property owner seeks to construct or acquire and maintain a dock,
    the property owner shall apply for a dock permit to the chief. The chief shall
    issue such a permit after application is so made on forms prescribed by the chief
    unless the dock does not meet standards the chief establishes for docks under
    the program.

    (2) The chief shall allow adjoining property owners to submit an application to
    construct one dock with multiple watercraft slips that serves all such property
    owners. Each property owner shall individually pay the annual dock and slip fees
    applicable to each property owner under division (C)(7) of this section.

    (3) A permittee shall maintain the dock in accordance with any maintenance standards
    established by the chief.

    (4) The chief shall allow a dock permittee to install a cover for the permittee''s
    dock upon request of the permittee. The installation and maintenance of the cover
    is the responsibility of the permittee. The permittee shall ensure that the dock
    cover consists of a metal roof that is painted green or white and is maintained
    in good repair.

    (5) The chief shall allow a dock permittee to install electricity on the permittee''s
    dock upon request of the permittee. The installation and maintenance of the electricity
    is the responsibility of the permittee. A permittee that intends to install electricity
    shall include with a request for electricity an aerial map from the county auditor''s
    web site that shows the path of the electric line to be installed. The chief shall
    approve the path of the electric line. The permittee shall ensure that all of
    the following apply to the electric service:

    (a) The electric service is installed by a licensed contractor.

    (b) The electrical service to the dock is placed in conduit.

    (c) A disconnect box is installed at the dock.

    (d) A disconnect box is installed at the property meter at the origin of service.

    Upon installation of the electric service, the dock permittee shall return the
    state park property to its original condition prior to such installation, ensuring
    that the trench is filled and level to the surrounding area and that the disturbed
    area is seeded and covered with a material to reduce possible erosion. Only one
    electric service shall be installed per dock location.

    (6) The chief shall allow adjoining dock permittees to construct a motor vehicle
    access path to their dock or docks upon request of all such permittees. Such access
    path shall be constructed only with natural materials and maintained with natural
    materials that are not permanent in nature. Adjoining permittees that intend to
    construct an access path shall include with the request an aerial photo from the
    county auditor''s web site that indicates where the proposed path will be located
    and a photo of any motor vehicle that the permittees intend to use to access the
    dock. Such a motor vehicle shall weigh not more than two thousand five hundred
    pounds and shall have a power source of not more than 899cc. The chief shall approve
    and issue an annual sticker for each motor vehicle that the permittees intend
    to use on the access path. If a permittee uses a motor vehicle that is not approved
    by the chief, the chief shall revoke any stickers issued to the permittee and
    may fine the permittee up to five hundred dollars.

    (7) The chief shall charge all of the following fees, as applicable:


    Dock permit application$100Annual dock permit - one dock slip included$120Each
    additional annual dock slip charge added to a dock permit$95Annual dock covering
    charge$25Request to install electricity on the dock$100Annual electricity charge$25Annual
    access path sticker for each motorized vehicle$25

    (8) Divisions (C)(1) to (7) of this section do not apply to any property owner
    who, before the effective date of this section, has lawfully constructed or acquired
    a dock.

    (D) A property owner whose property is adjacent to state park land that abuts
    a state park lake who seeks to mow any portion of the state park land may apply
    to the chief for a mowing permit. The chief shall issue such a permit after application
    is so made on forms prescribed by the chief. The property owner shall include
    with the application an aerial map from the county auditor''s web site that indicates
    the area the property owner seeks to mow. The chief may deny mowing access in
    areas that currently show signs of substantial soil erosion that impacts the state
    park lake. A mowing permit does not grant any authority to remove live trees on
    the state park land. Each mowing permit is valid for one year.

    The chief shall charge an annual mowing permit fee in the amount of twenty-five
    dollars.

    (E) A property owner whose property is adjacent to state park land that abuts
    a state park lake who seeks to remove trees on the state park land that have fallen
    and that are deemed hazardous, or that are dead and pose a hazard to other trees,
    may apply to the chief for a tree removal permit. The chief shall issue such a
    permit after application is so made on forms prescribed by the chief. If a property
    owner makes an application to remove a standing tree, a park official shall inspect
    and mark any tree that is to be removed prior to the chief issuing a permit. The
    permittee shall remove only those standing trees so marked by the park official.
    The permittee shall pay all costs associated with the removal of such trees.

    The chief shall not charge an applicant for the issuance of a tree removal permit.

    (F)(1) If a property owner whose property is adjacent to state park land that
    abuts a state park lake seeks to assist the state in the control of undergrowth
    on the state park land or engage in the removal of invasive plant or tree species
    on the state park land, the property owner may apply to the chief for an undergrowth
    and invasive species removal permit. The chief shall issue such a permit after
    application is so made on forms prescribed by the chief. If a property owner makes
    an application for an undergrowth and invasive species removal permit, a park
    official shall, prior to the chief issuing such permit, inspect the proposed area
    to determine which trees or plants shall be removed under the terms of the permit.
    The permittee shall pay all costs associated with the removal and disposal of
    undergrowth or invasive trees or plants.

    (2) An undergrowth and invasive species removal permit shall not allow for the
    removal of any live tree. If a permittee removes a live tree, all of the following
    apply:

    (a) The chief shall revoke any undergrowth and invasive species permit issued
    to the permittee.

    (b) The chief shall fine the permittee up to five hundred dollars per tree.

    (c) The permittee is liable to the state for the full value of the removed tree
    and for any other damages that are available under law.

    (3) The chief shall not charge an applicant for the issuance of an undergrowth
    and invasive species removal permit.

    (4) After the permittee exercises the rights granted under an undergrowth and
    invasive species removal permit, the permittee may apply for a mowing permit in
    accordance with division (D) of this section to maintain the area to prevent the
    undergrowth or the invasive tree or plant from growing back.

    (G) Any fees or fines collected by the chief under this section shall be deposited
    into the state park fund created in section 1546.21 of the Revised Code.

    (H)(1) No property owner whose property is adjacent to state park land may purposely
    alter, modify, or destroy state park land that abuts a state park lake, except
    in accordance with the permits authorized under this section.

    (2) The chief may fine any property owner who violates division (H)(1) of this
    section in an amount equal to the amount of damage caused or all costs incurred
    in remediating the alteration, modification, or destruction in addition to a penal
    sum of up to five thousand dollars. The amount of any fine beyond that needed
    to cover damage caused or costs incurred in remediation may equal, but shall not
    exceed, the amount charged for damage or remediation. In addition, any permit
    currently held or any applied for by the property owner shall be revoked or denied
    for a period of two years for the first offense, three years for the second offense,
    and five years for the third and any subsequent offense.'
