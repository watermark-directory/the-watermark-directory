- number: '1547.57'
  heading: Watercraft tags
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Except as otherwise provided in division (C) of this section, when the
    chief of the division of parks and watercraft issues a registration certificate
    under section 1547.54 of the Revised Code, the chief also shall issue to the applicant
    two tags not larger than three inches square, color coded, indicating the expiration
    date of the certificate. The owner of watercraft currently documented by the United
    States coast guard and for which a registration certificate is issued shall securely
    affix one tag to the watercraft''s port side and the other tag to the starboard
    side so that the tags are clearly visible under normal operating conditions. The
    tags shall be removed from the watercraft when they become invalid. The owner
    of any other watercraft for which a registration certificate is issued shall securely
    affix one tag to the watercraft''s port side, six inches toward the stern from
    the identification number, and the other tag to the starboard side, six inches
    toward the stern from the identification number. The tags shall be securely affixed
    to the watercraft prior to its operation, but shall be removed from the watercraft
    when they become invalid. A person may operate without a registration certificate
    issued under section 1547.54 of the Revised Code, for a period not to exceed forty-five
    days, any watercraft required to be titled on the waters in this state if the
    person is in compliance with section 1547.531 of the Revised Code.

    (B) The owner of every watercraft requiring numbering by this state shall attach
    to each side of the bow of the watercraft the permanent identification number
    in such manner as may be prescribed by applicable federal standards in order that
    it shall be clearly visible. The number shall be maintained in a legible condition
    at all times. No number other than the number assigned to a watercraft or granted
    by reciprocity pursuant to this chapter shall be painted, attached, or otherwise
    displayed on either side of the bow of the watercraft.

    (C) When the chief issues a registration certificate under section 1547.54 of
    the Revised Code for a canoe, rowboat, or inflatable watercraft that has not been
    numbered under section 1547.53 of the Revised Code, the chief also shall issue
    to the applicant a tag not larger than three inches by six inches, with distinguishing
    color coding and a number for identification purposes. The owner of the canoe,
    rowboat, or inflatable watercraft for which the registration certificate is issued
    shall affix the tag securely to a location on the canoe, rowboat, or inflatable
    watercraft as prescribed by rules.

    (D) No person shall operate or permit to be operated any watercraft on the waters
    in this state in violation of this section.'
