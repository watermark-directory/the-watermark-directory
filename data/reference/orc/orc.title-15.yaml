- number: '1561.32'
  heading: Inspection of electrical installations
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'The electrical inspectors shall examine surface and underground electrical
    installations at all mines for fire, shock, and explosion hazards, and for compliance
    with the electrical requirements of this chapter and Chapters 1563., 1565., and
    1567. of the Revised Code, at least once each year. In gaseous mines such examinations
    shall be made of all underground installations at least once each six months.
    A written report of each examination shall be made to the owner, lessee, or agent
    of the mine, and to the chief of the division of mineral resources management,
    through the deputy mine inspector of the district in which the examination has
    been made. These inspection reports shall be handled in the same manner as are
    the reports of the deputy mine inspector.

    No owner, lessee, agent, or operator of a mine shall purposely refuse or neglect
    to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1561.32
- number: '1561.33'
  heading: Weekly report by deputy mine inspector
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: On or before each Monday, each deputy mine inspector shall file in the office
    of the chief of the division of mineral resources management a record showing
    the number of mines in the district examined by the deputy mine inspector during
    the preceding week, the number of persons employed in and about such mines, the
    date of each examination, the condition of each mine examined, whether the laws
    relating to mines and mining are being observed or violated, and if violated,
    the nature and extent of such violations, the progress made in safeguarding the
    lives and protecting the health of the employees in and about the mines, and other
    facts of public interest concerning the condition of mines and the development
    and progress in mining.
