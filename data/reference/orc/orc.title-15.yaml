- number: '1522.06'
  heading: Incorporation of water into product as consumptive use
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: It is the intent of the general assembly that any incorporation of water into
    a product that is produced within the great lakes-st. Lawrence river basin and
    packaged and intended for intermediate or end-use consumers, whether distributed
    inside or outside the basin, is a consumptive use and does not constitute a diversion
    for purposes of the great lakes-st. Lawrence river basin water resources compact.
    A proposal to withdraw water and remove it from the basin in a container greater
    than five and seven-tenths gallons in capacity shall be treated as a proposal
    for a diversion as provided under Section 4.12.10 of the great lakes-st. Lawrence
    river basin water resources compact.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.06
- number: '1522.08'
  heading: Private property rights not abrogated by compact
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: '(A) It is the intent and understanding of the general assembly that the enactment
    of the great lakes-st. Lawrence river basin water resources compact and its implementation
    in this state do not and shall not in any manner abrogate any private property
    rights established under the Revised Code or the common law of this state. In
    addition, it is the intent and understanding of the general assembly that the
    enactment of the great lakes-st. Lawrence river basin water resources compact
    does not confer or extend any public trust rights and does not confer any proprietary
    ownership rights to the state or any public entity over the ground water or surface
    water in the great lakes-st. Lawrence river basin in this state.

    (B) It is the intent and understanding of the general assembly that the great
    lakes-st. Lawrence river basin water resources compact does not create any cause
    of action that may be brought against any person beyond those causes of action
    that are specifically authorized under Section 7.3 of the compact.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.08
- number: '1522.10'
  heading: Definitions for R.C. 1522.10 to 1522.30
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'As used in sections 1522.10 to 1522.30 of the Revised Code:

    (A) "Baseline facility" means a facility identified in the baseline report or
    a facility added to the baseline report under section 1522.16 of the Revised Code.

    (B) "Baseline facility abandonment" means the voluntary and affirmative termination
    of a baseline facility''s withdrawal and consumptive use capacity as listed in
    the baseline report. "Baseline facility abandonment" does not include the nonuse
    or the transfer of a baseline facility''s withdrawal and consumptive use capacity
    unless either of the following applies:

    (1) The nonuse continues for fifteen consecutive years for a facility with a potential
    withdrawal from Lake Erie or a recognized navigational channel and the nonuse
    is not extended in accordance with division (B) of section 1522.16 of the Revised
    Code.

    (2) For a facility to which division (B)(1) of this section does not apply, the
    nonuse continues for thirty-six consecutive months and is not extended in accordance
    with division (B) of section 1522.16 of the Revised Code.

    (C) "Baseline report" means a list of the withdrawal and consumptive use capacities
    of facilities that was developed for purposes of Section 4.12 of the great lakes-st.
    Lawrence river basin water resources compact by the department of natural resources
    and submitted to the great lakes-st. Lawrence river basin water resources council
    on December 8, 2009.

    (D) "Capacity" means the ability of a facility''s pumps, pipes, and other appurtenances
    to withdraw water presented in terms of withdrawal capacity, treatment capacity,
    distribution capacity, or other capacity-limiting factors.

    (E) "Compact" means the great lakes-st. Lawrence river basin water resources compact
    set forth in section 1522.01 of the Revised Code.

    (F) "Consumptive use" has the same meaning as in section 1522.01 of the Revised
    Code. For purposes of determining a new or increased capacity for consumptive
    use, "consumptive use" is the use based on a coefficient of consumptive use generally
    accepted in the scientific community that most accurately reflects the process
    at a facility or the use based on facility specific data, whichever is more accurate.

    (G) "Diversion" has the same meaning as in section 1522.01 of the Revised Code.

    (H) "Facility" means any site, installation, or building at which water withdrawal
    and consumptive use activities take place or are proposed to take place, that
    is located at a property or on contiguous properties. "Facility" includes any
    site, installation, building, or service area of a public water system at or within
    which water withdrawal and consumptive use activities take place.

    (I) "Facility abandonment" means the voluntary and affirmative termination of
    a facility''s withdrawal and consumptive use capacity as listed in a withdrawal
    and consumptive use permit issued under section 1522.12 of the Revised Code. "Facility
    abandonment" does not include the nonuse or the transfer of a facility''s withdrawal
    and consumptive use capacity unless either of the following applies:

    (1) The nonuse continues for fifteen consecutive years for a facility with a potential
    withdrawal from Lake Erie or a recognized navigational channel and the nonuse
    is not extended in accordance with division (B) of section 1522.16 of the Revised
    Code.

    (2) For a facility to which division (I)(1) of this section does not apply, the
    nonuse continues for thirty-six consecutive months and is not extended in accordance
    with division (B) of section 1522.16 of the Revised Code.

    (J) "High quality water" means a river or stream segment that has been designated
    by the environmental protection agency under Chapter 3745-1 of the Administrative
    Code as an exceptional warm water habitat, cold water habitat, outstanding state
    water, or superior high-quality water.

    (K) "Increased capacity" does not include any capacity that results from alterations
    or changes made at a facility that replace existing capacity without increasing
    the capacity of the facility.

    (L) "Public water system" has the same meaning as in section 6109.01 of the Revised
    Code.

    (M) "Recognized navigation channel" means that portion of a river or stream extending
    from bank to bank that is a direct tributary of Lake Erie and that, as of September
    4, 2012, is a state or federally maintained navigation channel.

    (N) "River or stream" means a body of water running or flowing, either continually
    or intermittently, on the earth''s surface or a channel in which such flow occurs.

    (O) "Water" means ground or surface water contained within the basin of the Lake
    Erie source watershed.

    (P) "Aquifer," "cone of depression," "ground water," "hydrologic study area,"
    "well," "well field," and "withdrawal area" have the same meanings as in section
    1521.01 of the Revised Code.'
