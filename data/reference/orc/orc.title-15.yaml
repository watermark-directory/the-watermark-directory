- number: '1567.75'
  heading: Cutting and welding
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) Prior to cutting and welding being performed on a longwall working section,
    methane gas examinations shall be made by a certified foreman or a person qualified
    to make the examinations designated by a certified foreman. No person shall perform
    cutting and welding when the methane gas concentration is one per cent or more.
    A certified foreman or person qualified to make examinations for gas shall be
    continuously present during all cutting and welding operations.

    (B) Prior to cutting or welding on a longwall working face conveyor, and unless
    otherwise allowed as part of the plan approved under section 1567.69 of the Revised
    Code due to specific conditions in the mine or procedures to be followed, a certified
    foreman or fire boss shall have open bottom face conveyors jacked up, blocked,
    and properly secured off the bottom a distance of at least ten feet along the
    face on both sides where the cutting is to be performed and shall have methane
    examinations made before cutting and welding is initiated on the face conveyors.

    (C) When cutting and welding operations have been completed, a diligent search
    for fires and hot spots shall be conducted. The person responsible for performing
    the cutting and welding operation may be designated to conduct this search as
    part of the cutting and welding operation. If fires or hot spots are found, they
    shall be extinguished immediately.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.75
- number: '1567.76'
  heading: Maintenance of hydraulic lines and roof support units
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: '(A) An operator shall ensure that all hydraulic line repairs are performed
    in accordance with maintaining the functioning of the line at a level consistent
    with that at the time of initial installation of the line.

    (B) An operator shall ensure that all hydraulic roof support units and associated
    apparatus on a longwall working face are visually inspected at least once each
    day, at any time of the day, by a qualified person as part of one of the on-shift
    examinations of the longwall working sections. The person conducting the inspection
    shall enter the inspection into the preshift examination book and shall note any
    hazards or problems that he encountered.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.76
- number: '1567.77'
  heading: First aid equipment
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: An operator shall maintain first aid equipment required on each working section
    by section 1567.61 of the Revised Code in the headgate entry at a point not to
    exceed one hundred fifty feet outby the longwall working face. No operator shall
    fail to comply with this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.77
- number: '1567.78'
  heading: Maintaining accessible tailgate travel route
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'An operator shall maintain an accessible travel route at all times off the
    tailgate end of the longwall working face unless the operator develops and the
    chief of the division of mineral resources management approves a plan to continue
    operation of the longwall working section in the event the tailgate route becomes
    impassable. Such a plan shall include necessary provisions to be taken to provide
    additional protective devices for longwall working section personnel.

    When the tailgate travel route becomes impassable, the operator shall cease the
    longwall mining operation immediately, familiarize all persons working on the
    longwall working section with the procedures to follow for escape from the section,
    and implement immediately the plan approved by the division of mineral resources
    management before recommencing mining.

    The operator shall immediately notify the division when the accessible travel
    route becomes impassable and the approved plan has been implemented.

    The division''s representative shall immediately, upon notification, establish
    a scheduled meeting with the operator and representatives of the miners at the
    mine.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1567.78
- number: '1567.79'
  heading: Instruction on hazards
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1567'
    name: Mine Equipment; Safety Provisions
  text: 'Employees assigned to work on a longwall working section shall be instructed
    in the hazards of longwall mining, including, but not limited to, a review of
    all of the following:

    (A) Escapeway and travel routes;

    (B) Ventilation;

    (C) Roof support;

    (D) Communications;

    (E) Stop controls and signals;

    (F) Location of first aid equipment;

    (G) Safety rules for longwall mining.'
