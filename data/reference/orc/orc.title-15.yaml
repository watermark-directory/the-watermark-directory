    num: '1547'
    name: Watercraft And Waterways
  text: '(A) Any bona fide dealer in watercraft, or any manufacturer of watercraft,
    upon annual application to the division of parks and watercraft, may receive for
    each separate place of business a dealer or manufacturer registration certificate
    assigning a dealer number for use while operating watercraft on the waters in
    this state.

    A watercraft dealer, prospective purchaser, or third party operating the watercraft
    may use a registration certificate on a watercraft when any of the following occurs:

    (1) The dealer or third party is transporting the watercraft to the person who
    purchased it from the dealer;

    (2) The dealer is demonstrating the capabilities of the watercraft for purposes
    of selling or leasing the watercraft;

    (3) The dealer or, with the permission of the dealer, the prospective purchaser
    or third party is otherwise utilizing the watercraft.

    However, a watercraft dealer shall not use a registration certificate for any
    commercial purpose, such as the rental or chartering of watercraft. In addition,
    a watercraft dealer shall not loan a certificate to any person for the purpose
    of circumventing any law of this state.

    The fee for such a certificate shall be fifty dollars annually.

    The chief of the division shall select an authorized agent from among those designated
    under section 1547.54 of the Revised Code to issue dealer and manufacturer registration
    certificates. The agent shall provide an authorized facsimile of the signature
    of the chief on each registration certificate and on each pocket-sized certificate
    issued under this section.

    (B) Registration certificates issued to marine dealers or manufacturers shall
    be available for inspection at all times at the dealers'' or manufacturers'' place
    of business for which the certificates were issued.

    (C) The division shall issue to each registered dealer or manufacturer one or
    more pocket-sized certificates bearing the dealer or manufacturer registration
    number, which shall be carried by the dealer, the manufacturer, or an employee
    aboard any watercraft being operated on the waters in this state.

    (D) Each dealer in or manufacturer of watercraft shall display on both sides of
    any watercraft being operated on the waters in this state the dealer or manufacturer
    registration number and the validation decals assigned by the authorized agent
    selected by the chief under this section so that the decals and number are clearly
    visible under normal operating conditions. The authorized agent selected by the
    chief shall furnish with each dealer or manufacturer registration certificate
    one or more sets of registration validation decals of a size and shape prescribed
    by the chief. Additional sets of decals may be purchased for a two-dollar fee.

    In accordance with federal law, no person shall recklessly display or affix a
    dealer or manufacturer registration number on a watercraft in a manner that causes
    permanent alteration to the watercraft''s hull prior to a final sale.

    (E) The chief may issue an order temporarily or permanently restricting or suspending
    a dealer or manufacturer registration certificate without a hearing if the chief
    finds that the holder of the certificate has violated this section.'
