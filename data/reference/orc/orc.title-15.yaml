- number: '1547.66'
  heading: Altering identifying marks - false information on application for registration
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'No person shall deface or alter any serial number, model designation, or
    other identifying mark on any watercraft or motor as placed thereon by the manufacturer
    thereof, or remove, deface, or alter the registration number of any watercraft
    as the registration number appears on the bow thereof except by specific order
    of the chief of the division of parks and watercraft.

    No person shall give purposely false information concerning any watercraft or
    motor when applying for registration of the watercraft. Any certificate issued
    which is found to be based on such false information is void.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.66
- number: '1547.67'
  heading: Establishing and maintaining marine patrols to enforce chapter
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'The division of parks and watercraft, with the approval of the director of
    natural resources, may expend, for the purpose of assisting political subdivisions,
    conservancy districts, and state departments to establish or maintain and operate
    a marine patrol for the purpose of enforcing this chapter and Chapter 1548. of
    the Revised Code and rules adopted under them and to provide emergency response
    to boating accidents on the water, such funds as are appropriated by the general
    assembly for that purpose and, in addition, such moneys from the waterways safety
    fund established in section 1547.75 of the Revised Code as determined to be necessary
    by the division not to exceed ten per cent of all moneys accruing to the fund.
    In no case shall the grant to a political subdivision, conservancy district, or
    state department, not including the department of natural resources, total more
    than thirty-five thousand dollars in a calendar year. Moneys so allocated may
    be used for the purchase, maintenance, and operation of vessels and marine equipment,
    educational materials, and personnel salaries that are necessary for enforcement
    of this chapter and Chapter 1548. of the Revised Code and rules adopted under
    them and to provide emergency response to boating accidents on the water.

    The division shall disburse the moneys as provided in this section in accordance
    with its determination of need in the enforcement of this chapter and Chapter
    1548. of the Revised Code and rules adopted under them and shall disburse those
    moneys only on a cost share basis to supplement funds allocated by a political
    subdivision, conservancy district, or state department for that purpose. A grantee
    shall provide at least twenty-five per cent of the total program cost.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.67
- number: '1547.68'
  heading: Boating safety education programs
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'To assist political subdivisions, conservancy districts, state departments,
    or nonprofit organizations in establishing or participating in boating safety
    education programs, the division of parks and watercraft, with the approval of
    the director of natural resources, may expend moneys appropriated by the general
    assembly for those purposes and, additionally, moneys from the waterways safety
    fund established in section 1547.75 of the Revised Code determined to be necessary
    by the division, but not to exceed ten per cent of all moneys accruing to the
    fund. In no case shall a grant to any one political subdivision, conservancy district,
    state department, or nonprofit organization total more than sixty thousand dollars
    in a calendar year. Moneys so allocated may be used for personnel salaries and
    training, materials, supplies, equipment, and related expenses needed to conduct
    boating education programs.

    The division shall disburse the moneys as provided in this section in accordance
    with its determination of need in the enforcement of this chapter and rules or
    for the establishment of or participation in a boating safety education program.
    The division shall disburse moneys only on a cost share basis. A grantee shall
    provide at least twenty-five per cent of the total program cost and may do so
    with cash, in-kind services or contributions, or a combination. The cost share
    shall be allocated by a political subdivision, conservancy district, state department,
    or nonprofit organization for those purposes.'
