- number: '1517.21'
  heading: Cave definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: 'As used in sections 1517.21 to 1517.26 of the Revised Code:

    (A) "Cave" means a naturally occurring void, cavity, recess, or system of interconnecting
    passages beneath the surface of the earth or within a cliff or ledge, including,
    without limitation, a grotto, rock shelter, sinkhole, cavern, pit, natural well,
    pothole, or subsurface water and drainage system.

    (B) "Cave life" means any organism that naturally occurs in, uses, visits, or
    inhabits any cave, except those animals that are permitted to be taken under Chapter
    1533. of the Revised Code.

    (C) "Material" includes:

    (1) Any speleothem, whether attached or broken, found in a cave;

    (2) Any clay or mud formation or concretion or sedimentary deposit found in a
    cave;

    (3) Any scallop, rill, or other corrosional or corrasional feature of a cave;

    (4) Any wall or ceiling of a cave or any other part of the speleogen.

    (D) "Owner" means any person having title to land in which a cave is located.

    (E) "Speleothem" means any stalactite, stalagmite, or other natural mineral formation
    or deposit occurring in a cave.

    (F) "Speleogen" means the surrounding material or bedrock in which a cave is formed,
    including walls, floors, ceilings, and similar related structural and geological
    components.

    (G) "Sinkhole" means a closed topographic depression or basin generally draining
    underground, including, without limitation, a blind valley, swallowhole, or sink.

    (H) "Hazard" means a risk of serious physical harm to persons or property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1517.21
- number: '1517.22'
  heading: Protection of cave resources
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: The general assembly hereby finds that caves are uncommon geologic phenomena
    and that the minerals deposited in them may be rare and occur in unique forms
    of great beauty that are irreplaceable if destroyed. Also irreplaceable are the
    archeological resources in caves, which are of great scientific and historic value.
    It is further found that species of cave life are unusual and of limited numbers;
    that many are rare, threatened, or endangered species; and that caves are a natural
    conduit for groundwater flow and are highly subject to water pollution, thus having
    far-reaching effects transcending man's property boundaries. It is therefore declared
    to be the policy of the general assembly to protect these unique and great natural,
    historical, scientific, and cultural resources.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1517.22
- number: '1517.23'
  heading: Chief of division - duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: 'The chief of the division of natural areas and preserves shall do both of
    the following:

    (A) Formulate policies and plans and establish a program incorporating them for
    the identification and protection of the state''s cave resources and adopt, amend,
    or rescind rules in accordance with Chapter 119. of the Revised Code to implement
    that program;

    (B) Provide technical assistance and management advice to owners upon request
    concerning the protection of caves on their land.'
