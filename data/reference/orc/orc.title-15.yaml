    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: The division of wildlife, in the management of lands owned, leased, or administered
    by it or under agreement with it, may contract with private persons for the creation
    or improvement of wildlife habitat thereon. Such a contract may be paid for in
    money, materials, services rendered, or goods produced incidentally to the contract,
    whichever is advantageous to the state.
