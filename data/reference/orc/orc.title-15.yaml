- number: '1506.42'
  heading: Agreements with subdivisions or state agencies for erosion projects
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: 'The state, acting through the director of natural resources, subject to section
    1506.46 of the Revised Code, may enter into agreements with counties, townships,
    municipal corporations, park boards, and conservancy districts, other political
    subdivisions, or any state departments or divisions for the purpose of constructing
    and maintaining projects to control erosion along the Ohio shoreline of Lake Erie
    and in any rivers and bays that are connected with Lake Erie and any other watercourses
    that flow into Lake Erie. Such projects also may be constructed on any Lake Erie
    island that is situated within the boundaries of the state.

    The cost of such shore erosion projects that are for the benefit of public littoral
    property shall be prorated on the basis of two-thirds of the total cost to the
    state through appropriations made to the department of natural resources and one-third
    of the cost to the counties, townships, municipal corporations, park boards, conservancy
    districts, or other political subdivisions.

    If a shore erosion emergency is declared by the governor, the state, acting through
    the director, may spend whatever state funds are available to alleviate shore
    erosion, without participation by any political subdivision, regardless of whether
    the project will benefit public or private littoral property.

    A board of county commissioners, acting for the county over which it has jurisdiction,
    may enter into and carry out agreements with the director for the construction
    and maintenance of projects to control shore erosion. In providing the funds for
    the county''s proportionate share of the cost of constructing and maintaining
    the projects referred to in this section, the board shall be governed by and may
    issue and refund bonds in accordance with Chapter 133. of the Revised Code.

    A municipal corporation or a township, acting through the legislative authority
    or the board of township trustees, may enter into and carry out agreements with
    the director for the purpose of constructing and maintaining projects to control
    shore erosion. In providing the funds for the municipal corporation''s or township''s
    proportionate share of the cost of constructing and maintaining the projects referred
    to in this section, a municipal corporation or township may issue and refund bonds
    in accordance with Chapter 133. of the Revised Code. The contract shall be executed
    on behalf of the municipal corporation or township by the mayor, city manager,
    or other chief executive officer who has the authority to act for the municipal
    corporation or township.

    Conservancy districts may enter into and carry out agreements with the director,
    in accordance with the intent of this section, under the powers conferred upon
    conservancy districts under Chapter 6101. of the Revised Code.

    Park boards may enter into and carry out agreements with the director, in accordance
    with the intent of this section, and issue bonds for that purpose under the powers
    conferred upon park districts under Chapter 1545. of the Revised Code.

    The director shall approve and supervise all projects that are to be constructed
    in accordance with this section. The director shall not proceed with the construction
    of any project until all funds that are to be paid by the county, township, municipal
    corporation, park board, or conservancy district, in accordance with the terms
    of the agreement entered into between the director and the county, township, municipal
    corporation, park board, or conservancy district, are in the director''s possession
    and deposited in the shore erosion fund, which is hereby created in the state
    treasury. If the director finds it to be in the best interests of the state to
    construct projects as set forth in this section by the state itself, without the
    financial contribution of counties, townships, municipal corporations, park boards,
    or conservancy districts, the director may construct the projects.

    In deciding whether to assist a county or municipal corporation in constructing
    and maintaining a project under this section, the state, acting through the director,
    shall consider, among other factors, whether the county or municipal corporation
    has adopted or is in the process of adopting a Lake Erie coastal erosion area
    resolution or ordinance under division (D) of section 1506.07 of the Revised Code.

    All projects constructed by the state in conformity with sections 1506.38 to 1506.46
    of the Revised Code shall be constructed subject to sections 153.01 to 153.20
    of the Revised Code, except that the Ohio facilities construction commission is
    not required to prepare the plans and specifications for those projects.'
