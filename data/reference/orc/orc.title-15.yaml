- number: '1503.55'
  heading: Forestry pollution abatement fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: '(A) There is hereby created in the state treasury the forestry pollution
    abatement fund, which shall be administered by the chief of the division of forestry.

    (B) The fund may be used to pay costs incurred under all of the following:

    (1) Rules adopted under division (A)(3) of section 1503.51 of the Revised Code;

    (2) Division (B)(2) of section 1503.51 of the Revised Code;

    (3) Division (A)(3) of section 1503.54 of the Revised Code in investigating, mitigating,
    minimizing, removing, or abating any pollution of the waters of the state caused
    by forestry pollution that requires emergency action to protect public health.

    (C) Any person responsible for causing or allowing forestry pollution or an unauthorized
    release, spill, or discharge is liable to the chief for any costs incurred by
    the chief in investigating, mitigating, minimizing, removing, or abating the forestry
    pollution or release, spill, or discharge regardless of whether those costs were
    paid from the forestry pollution abatement fund or any other fund of the division.
    Upon the request of the chief, the attorney general shall bring a civil action
    against the responsible person to recover those costs. Money recovered under this
    section shall be credited to the forestry pollution abatement fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1503.55
- number: '1503.99'
  heading: Penalty
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1503'
    name: Division Of Forestry
  text: '(A) Whoever violates section 1503.01 or 1503.12 of the Revised Code is guilty
    of a minor misdemeanor.

    (B) Whoever violates section 1503.18 or 1503.43 of the Revised Code is guilty
    of a misdemeanor of the third degree.

    (C) Whoever violates division (A) of section 1503.54 of the Revised Code is guilty
    of a misdemeanor of the first degree. Each day of violation is a separate offense.
    In addition to the penalty provided in this division, the sentencing court may
    assess damages in an amount equal to the costs of reclaiming, restoring, or otherwise
    repairing any damage to public or private property caused by any violation of
    division (A) of section 1503.54 of the Revised Code. All fines and moneys assessed
    as damages under this section shall be credited to the forestry pollution abatement
    fund created in section 1503.55 of the Revised Code.'
