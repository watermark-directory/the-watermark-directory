- number: '1514.50'
  heading: Right of entry to perform inspections or reclamation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: '(A) The chief of the division of mineral resources management or an authorized
    employee of the division of mineral resources management may enter on lands to
    make inspections in accordance with this chapter and rules adopted under it when
    necessary in the discharge of the duties specified in this chapter and the rules.
    No person shall prevent or hinder the chief or an authorized employee of the division
    in the performance of those duties.

    (B) For purposes of performing reclamation of land affected by surface mining
    operations on which the holder of a permit issued under this chapter has defaulted
    or otherwise failed to timely conduct the reclamation required by section 1514.05
    of the Revised Code, the chief may enter on the land and perform reclamation that
    the chief determines is necessary to protect public health or safety or the environment.
    In order to perform the reclamation, the chief may enter on adjoining land or
    other land that is necessary to access the land on which the surface mining occurred
    and on which the reclamation is to be performed. The chief shall provide reasonable
    advance notice to the owner of any land to be entered for the purpose of access
    for reclamation under this chapter. The division shall return the land that was
    used to access the former surface mining operation to the same or an improved
    grade, topography, and condition that existed prior to its use by the division.

    (C) When conducting investigations pursuant to section 1514.13 of the Revised
    Code, the chief or an authorized employee of the division may enter on lands to
    conduct water supply surveys, measure ground water levels and collect data when
    necessary to define the cone of depression, or perform other duties for the purposes
    of that section.'
