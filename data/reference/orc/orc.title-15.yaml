- number: '1551.30'
  heading: Ohio coal development office definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: 'As used in sections 1551.30 to 1551.35 of the Revised Code:

    (A) "Coal development facility" means any coal resource development, beneficiation,
    or utilization facility of commercial availability or scale, including, without
    limitation, any commercial-scale demonstration facility and, when necessary or
    appropriate to demonstrate the commercial acceptability of a specific technology,
    up to three installations within this state utilizing the specific technology,
    that enhances the market for, or marketability of, Ohio coal and that is consistent
    with the purposes of the Ohio coal development office established under section
    1551.32 of the Revised Code. "Coal development facility" includes all support
    buildings and facilities that the director of the Ohio coal development office
    determines are necessary for the operation of the facility together with all property,
    rights, easements, and interests that may be required for the operation of the
    facility.

    (B) "Coal" includes coal, coke, and fuels derived from coal, including, but not
    limited to, synthetic fuels and coal-oil or coal-oil-water mixtures.

    (C) "Person" includes an individual, receiver, assignee, trustee in bankruptcy,
    estate, firm, partnership, association, joint-stock company, joint venture, club,
    society, corporation, and combination of individuals in any form.

    (D) "Governmental agency" and "construction" have the same meanings as in section
    1551.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.30
- number: '1551.31'
  heading: State policy to increase coal use
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: 'The general assembly hereby finds and declares that:

    (A) Coal is one of this state''s best, most abundant energy resources.

    (B) In recent years the coal industry in this state has experienced economic difficulties
    that have resulted in a loss of jobs in that industry.

    (C) Some coal users are reluctant to use coal from this state because of its high
    sulfur content.

    (D) The increased use of Ohio coal in this state could enable the state to be
    more energy self-sufficient.

    (E) It is therefore imperative for this state to have a strong, viable coal industry
    in order to create and preserve jobs and improve the economy of this state and
    that, in order to strengthen that industry, methods must be found to use Ohio
    coal in an environmentally acceptable, cost effective manner.

    Accordingly, it is declared to be the public policy of the state, through operation
    of sections 1551.30 to 1551.35 of the Revised Code and other applicable laws and
    authority vested in the general assembly, to assist in the development of facilities
    and technologies that will lead to increased, environmentally sound use of Ohio
    coal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.31
- number: '1551.311'
  heading: State policy to seek federal assistance to develop clean coal
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: The general assembly hereby finds and declares that the future of the Ohio
    coal industry lies in the development of clean coal technology and that the disproportionate
    economic impact on the state under Title IV of the "Clean Air Act Amendments of
    1990," 104 Stat. 2584, 42 U.S.C.A. 7651, warrants maximum federal assistance to
    this state for such development. It is therefore imperative that the department
    of development, its Ohio coal development office, the Ohio coal industry, the
    Ohio Washington office in the office of the governor, and the state's congressional
    delegation make every effort to acquire any federal assistance available for the
    development of clean coal technology, including assisting entities eligible for
    grants in their acquisition. The Ohio coal development agenda required by section
    1551.34 of the Revised Code shall include, in addition to the other information
    required by that section, a description of such efforts and a description of the
    current status of the development of clean coal technology in this state and elsewhere.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.311
- number: '1551.32'
  heading: Ohio coal development office
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: '(A) There is hereby established within the department of development the
    Ohio coal development office whose purposes are to do all of the following:

    (1) Encourage, promote, and support siting, financing, construction, and operation
    of commercially available or scaled facilities and technologies, including, without
    limitation, commercial-scale demonstration facilities and, when necessary or appropriate
    to demonstrate the commercial acceptability of a specific technology, up to three
    installations within this state utilizing the specific technology, to more efficiently
    produce, beneficiate, market, or use Ohio coal;

    (2) Encourage, promote, and support the market acceptance and increased market
    use of Ohio coal through technology and market development;

    (3) Assist in the financing of coal development facilities;

    (4) Encourage, promote, and support, in state-owned buildings, facilities, and
    operations, use of Ohio coal and electricity sold by utilities and others in this
    state that use Ohio coal for generation;

    (5) Improve environmental quality, particularly through cleaner use of Ohio coal;

    (6) Assist and cooperate with governmental agencies, universities and colleges,
    coal producers, coal miners, electric utilities and other coal users, public and
    private sector coal development interests, and others in achieving these purposes.

    (B) The office shall give priority to improvement or reconstruction of existing
    facilities and equipment when economically feasible, to construction and operation
    of commercial-scale facilities, and to technologies, equipment, and other techniques
    that enable maximum use of Ohio coal in an environmentally acceptable, cost-effective
    manner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.32
- number: '1551.33'
  heading: Director of office - appointment, duties and powers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: '(A) The director of development shall appoint and fix the compensation of
    the director of the Ohio coal development office. The director shall serve at
    the pleasure of the director of development.

    (B) The director of the office shall do all of the following:

    (1) Biennially prepare and maintain the Ohio coal development agenda required
    under section 1551.34 of the Revised Code;

    (2) Propose and support policies for the office consistent with the Ohio coal
    development agenda and develop means to implement the agenda;

    (3) Initiate, undertake, and support projects to carry out the office''s purposes
    and ensure that the projects are consistent with and meet the selection criteria
    established by the Ohio coal development agenda;

    (4) Actively encourage joint participation in and, when feasible, joint funding
    of the office''s projects with governmental agencies, electric utilities, universities
    and colleges, other public or private interests, or any other person;

    (5) Establish a table of organization for and employ such employees and agents
    as are necessary for the administration and operation of the office. Any such
    employees shall be in the unclassified service and shall serve at the pleasure
    of the director of development .

    (6) Convene the technical advisory committee established under section 1551.35
    of the Revised Code;

    (7) Review, with the assistance of the technical advisory committee, proposed
    coal research and development projects as defined in section 1555.01 of the Revised
    Code, and coal development projects, submitted to the office by public utilities
    for the purpose of section 4905.304 of the Revised Code. If the director and the
    advisory committee determine that any such facility or project has as its purpose
    the enhanced use of Ohio coal in an environmentally acceptable, cost effective
    manner, promotes energy conservation, is cost effective, and is environmentally
    sound, the director shall submit to the public utilities commission a report recommending
    that the commission allow the recovery of costs associated with the facility or
    project under section 4905.304 of the Revised Code and including the reasons for
    the recommendation.

    (8) Establish such policies, procedures, and guidelines as are necessary to achieve
    the office''s purposes.

    (C) With the approval of the director of development , the director of the office
    may exercise any of the powers and duties that the director of development considers
    appropriate or desirable to achieve the office''s purposes, including, but not
    limited to, the powers and duties enumerated in sections 1551.11, 1551.12, and
    1551.15 of the Revised Code.

    Additionally, the director of the office may make loans to governmental agencies
    or persons for projects to carry out the office''s purposes. Fees, charges, rates
    of interest, times of payment of interest and principal, and other terms, conditions,
    and provisions of the loans shall be such as the director of the office determines
    to be appropriate and in furtherance of the purposes for which the loans are made.
    The mortgage lien securing any moneys lent by the director of the office may be
    subordinate to the mortgage lien securing any moneys lent or invested by a financial
    institution, but shall be superior to that securing any moneys lent or expended
    by any other person. The moneys used in making the loans shall be disbursed upon
    order of the director of the office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1551.33
- number: '1551.34'
  heading: Biennial Ohio coal development agenda
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1551'
    name: Energy
  text: 'On or before the first day of August of each even-numbered year, the director
    of the Ohio coal development office established under section 1551.32 of the Revised
    Code shall submit to the governor and the general assembly an Ohio coal development
    agenda. Prior to each submission, the office shall solicit public comment on the
    agenda to give interested parties an opportunity to comment on the agenda. The
    director shall consider any public comments received prior to the agenda''s submission.
    The agenda shall include, but is not limited to, all of the following:

    (A) A characterization of Ohio coal, constraints on its maximum use, and opportunities
    for overcoming those constraints;

    (B) A characterization of the current and potential markets for Ohio coal, constraints
    on increased market demand for it, and opportunities for overcoming those constraints;

    (C) Identification of each of the office''s programs and its correspondence to
    the purposes of the office;

    (D) A description of the office''s current projects that includes the status of
    each project and a specific description of the office''s activities in all of
    the following areas:

    (1) Commercialization of available technology;

    (2) Marketplace adoption of that technology;

    (3) Enhancement of user markets for Ohio coal.

    (E) The types of projects to be funded in the succeeding biennium;

    (F) Anticipated expenditures for, the relative priority of, and the potential
    benefits of each type of project to be funded in the succeeding biennium;

    (G) The results obtained from completed projects and dissemination of those results;

    (H) A fiscal report of the office''s activities under sections 1551.30 to 1551.35
    and Chapter 1555. of the Revised Code during the preceding biennium;

    (I) The criteria used to select the office''s specific types of projects. The
    criteria shall consider all of the following:

    (1) A project''s relationship to and support of the office''s purposes;

    (2) The technology involved, its applicability to Ohio coal, and its potential
    rate and probability of marketplace adoption;

    (3) The commercial readiness of a project''s facility, technology, or equipment;

    (4) The cost and relative risk to the state and the participation of other investors
    or interested parties in a project''s financing;

    (5) The likelihood that results of a project would not be achieved in the absence
    of the office''s assistance.'
