- number: '1561.12'
  heading: Registration and qualifications of applicants
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: 'An applicant for any examination or certificate under this section shall,
    before being examined, register the applicant''s name with the chief of the division
    of mineral resources management and file with the chief an affidavit as to all
    matters of fact establishing the applicant''s right to receive the examination
    and a certificate from a reputable and disinterested physician, clinical nurse
    specialist, or certified nurse practitioner as to the physical condition of the
    applicant showing that the applicant is physically capable of performing the duties
    of the office or position.

    Each applicant for examination for any of the following positions shall present
    evidence satisfactory to the chief that the applicant has been a resident and
    citizen of this state for two years next preceding the date of application:

    (A) An applicant for the position of deputy mine inspector of underground mines
    shall have had actual practical experience of not less than six years in underground
    mines. In lieu of two of the six years of actual practical experience required
    in underground mines, the chief may accept as the equivalent thereof a certificate
    evidencing graduation from an accredited school of mines or mining, after a four-year
    course of study.

    The applicant shall pass an examination as to the applicant''s practical and technological
    knowledge of mine surveying, mining machinery, and appliances; the proper development
    and operation of mines; the best methods of working and ventilating mines; the
    nature, properties, and powers of noxious, poisonous, and explosive gases, particularly
    methane; the best means and methods of detecting, preventing, and removing the
    accumulation of such gases; the use and operation of gas detecting devices and
    appliances; first aid to the injured; and the uses and dangers of electricity
    as applied and used in, at, and around mines. The applicant shall also hold a
    certificate for foreperson of gaseous mines issued by the chief.

    (B) An applicant for the position of deputy mine inspector of surface mines shall
    have had actual practical mining experience of not less than six years in surface
    mines. In lieu of two of the six years of actual practical experience required,
    the chief may accept as the equivalent thereof a certificate evidencing graduation
    from an accredited school of mines or mining, after a four-year course of study.
    The applicant shall pass an examination as to the applicant''s practical and technological
    knowledge of surface mine surveying, machinery, and appliances; the proper development
    and operations of surface mines; first aid to the injured; and the use and dangers
    of explosives and electricity as applied and used in, at, and around surface mines.
    The applicant shall also hold a surface mine foreperson certificate issued by
    the chief.

    (C) An applicant for the position of electrical inspector shall have had at least
    five years'' practical experience in the installation and maintenance of electrical
    circuits and equipment in mines, and the applicant shall be thoroughly familiar
    with the principles underlying the safety features of permissible and approved
    equipment as authorized and used in mines.

    The applicant shall be required to pass the examination required for deputy mine
    inspectors and an examination testing and determining the applicant''s qualification
    and ability to competently inspect and administer the mining law that relates
    to electricity used in and around mines and mining in this state.

    (D) An applicant for the position of superintendent or assistant superintendent
    of rescue stations shall possess the same qualifications as those required for
    a deputy mine inspector. In addition, the applicant shall present evidence satisfactory
    to the chief that the applicant is sufficiently qualified and trained to organize,
    supervise, and conduct group training classes in first aid, safety, and rescue
    work.

    The applicant shall pass the examination required for deputy mine inspectors and
    shall be tested as to the applicant''s practical and technological experience
    and training in first aid, safety, and mine rescue work.

    (E) An applicant for the position of mine chemist shall have such educational
    training as is represented by the degree MS in chemistry from a university of
    recognized standing, and at least five years of actual practical experience in
    research work in chemistry or as an assistant chemist. The chief may provide that
    an equivalent combination of education and experience together with a wide knowledge
    of the methods of and skill in chemical analysis and research may be accepted
    in lieu of the above qualifications. It is preferred that the chemist shall have
    had actual experience in mineralogy and metallurgy.'
  history: null
