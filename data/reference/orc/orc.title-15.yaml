- number: '1547.71'
  heading: Refuge and small boat harbor agency
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'The division of parks and watercraft shall act as the refuge and small boat
    harbor agency of the state for the purpose of participating with, and co-operating
    with the department of the army, corps of engineers, pursuant to the enabling
    provisions in the act known as the "Fletcher Act of 1932" and its amendments and
    successors, including Public Law 14 of the 79th congress authorized March 2, 1945,
    pursuant to House Document No. 446 of the 78th congress.

    The division shall participate and co-operate with the corps of engineers in acquiring,
    constructing, and maintaining refuge and light draft vessel harbor projects, channels,
    and facilities for vessels in the navigable waters lying within the boundaries
    of the state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1547.71
- number: '1547.72'
  heading: Construction and operation of refuge harbors
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: '(A) The division of parks and watercraft, whenever it considers it in the
    best interests of the state, and as an aid to lake commerce and navigation or
    recreational boating, may construct, maintain, repair, and operate refuge harbors
    and other projects for the harboring, mooring, docking, launching, and storing
    of light draft vessels, and marine recreational facilities. Subject to section
    1547.77 of the Revised Code, those harbors, projects, and facilities may be constructed
    on waters in this state. If a refuge harbor lies between the shoreline and a harbor
    line established by the United States government so as to interfere with the wharfing
    out by a littoral owner to navigable waters, the littoral owner shall consent
    thereto in writing before the location and construction thereof.

    The division may lease any space in those refuge harbors or other projects for
    the harboring, mooring, docking, launching, and storing of light draft vessels.
    The rental therefor shall be determined by the division.

    (B) The division, with the approval of the director of natural resources, may
    expend for the acquisition of any rights in land; for the construction, maintenance,
    repair, and operation of refuge harbors and other projects for the harboring,
    mooring, docking, launching, and storing of light draft vessels, and marine recreational
    facilities on waters in this state; for planning, studies, surveys, and engineering
    therefor; or for the improvement of harbors, channels, and waterways to foster
    vessel safety, funds appropriated by the general assembly for those purposes and,
    in addition, moneys accruing to the waterways safety fund established in section
    1547.75 of the Revised Code.

    (C) The division, with the approval of the director, may distribute moneys for
    the purpose of administering federal assistance to public and private entities
    in accordance with guidelines established under each federal grant program. Public
    and private entities that receive moneys under this division may charge fees at
    the facilities in accordance with the applicable federal guidelines.'
  history: null
