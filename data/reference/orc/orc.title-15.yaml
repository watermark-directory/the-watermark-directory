    name: Hunting; Fishing
  text: On and after March 1, 2008, no commercial fishing licensee shall use or engage
    in fishing with commercial gear unless the licensee uses vessel and catch monitoring
    devices in accordance with requirements and procedures established by the chief
    of the division of wildlife. The chief shall establish requirements and procedures
    concerning vessel and catch monitoring devices by division rule. A licensee shall
