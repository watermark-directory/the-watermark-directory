- number: '1571.014'
  heading: Appointment of gas storage well inspector
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: 'The chief of the division of oil and gas resources management shall appoint
    a gas storage well inspector from the eligible list of candidates for that position
    that is prepared under section 124.24 of the Revised Code. If a vacancy occurs
    in the position of gas storage well inspector, the chief shall fill the position
    by selecting a person from that list.

    The chief shall adopt rules in accordance with Chapter 119. of the Revised Code
    that are necessary for conducting examinations for the position of gas storage
    well inspector.'
