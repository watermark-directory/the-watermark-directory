    name: Hunting; Fishing
  text: '(A) As used in this section:

    (1) "Energy" has the same meaning as in section 1551.01 of the Revised Code.

    (2) "Energy facility" means a facility at which energy is produced.

    (B) A person operating an energy facility whose operation may result in the incidental
    taking of a wild animal shall obtain a permit to do so from the chief of the division
    of wildlife under this section. The chief shall adopt rules under section 1531.10
    of the Revised Code that are necessary to administer this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1533.081
- number: '1533.09'
  heading: Annual report of operations under collection permit - revocation and forfeiture
    of permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Before the fifteenth day of March of each year, each wild animal permit holder
    shall file with the division of wildlife a written report of the permit holder''s
    operations under the permit and the disposition of the specimens collected or
    possessed during the preceding calendar year on report blanks furnished by the
    chief of the division. Failure to file a report shall cause the permit to be forfeited
    as of the fifteenth day of March. Permits are not transferable. No permit holder
    or person collecting or possessing wild animals under authority of such a permit
    shall take, possess, or transport the wild animals for any purpose not specified
    in the permit.

    Conviction of a violation of this section, failure to carry a permit and exhibit
    it to any person requesting to see it as provided in section 1533.08 of the Revised
    Code, or the violation of any other law concerning wild animals constitutes a
    revocation and forfeiture of the permit involved. The former permit holder shall
    not be entitled to another permit for a period of one year from the date of the
    conviction.'
