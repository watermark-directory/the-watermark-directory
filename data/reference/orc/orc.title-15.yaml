- number: '1571.012'
  heading: Applicants for position of gas storage well inspector
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: 'An applicant for the position of gas storage well inspector shall register
    the applicant''s name with the chief of the division of oil and gas resources
    management and file with the chief an affidavit as to all matters of fact establishing
    the applicant''s right to take the examination for that position and a certificate
    from a reputable and disinterested physician, clinical nurse specialist, or certified
    nurse practitioner as to the physical condition of the applicant showing that
    the applicant is physically capable of performing the duties of the position.
    The applicant also shall present evidence satisfactory to the chief that the applicant
    has been a resident and citizen of this state for at least two years next preceding
    the date of application.

    An applicant shall possess the same qualifications as an applicant for the position
    of deputy mine inspector established in section 1561.12 of the Revised Code. In
    addition, the applicant shall have practical knowledge and experience of and in
    the operation, location, drilling, maintenance, and abandonment of oil and gas
    wells, especially in coal or mineral bearing townships, and shall have a thorough
    knowledge of the latest and best method of plugging and sealing abandoned oil
    and gas wells.

    An applicant for gas storage well inspector shall pass an examination conducted
    by the chief to determine the applicant''s fitness to act as gas storage well
    inspector before being eligible for appointment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1571.012
- number: '1571.013'
  heading: Examinations for gas storage well inspector
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) The chief of the division of oil and gas resources management shall conduct
    examinations for the position of gas storage well inspector. The chief annually
    shall provide for the examination of candidates for appointment as gas storage
    well inspector. Special examinations may be held whenever it becomes necessary
    to make an appointment of gas storage well inspector.

    (B) Public notice shall be given through the press or otherwise, not less than
    ten days in advance, announcing the time and place at which examinations under
    this section are to be held.

    (C) The examinations provided for in this section shall be conducted in accordance
    with rules adopted under section 1571.014 of the Revised Code and conditions prescribed
    by the chief.'
