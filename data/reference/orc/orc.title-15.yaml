- number: '1519.01'
  heading: Plan and administration of state system of recreational trails
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1519'
    name: Recreational Trails
  text: The director of natural resources shall plan and administer a state system
    of recreational trails for hiking, bicycling, horseback riding, ski touring, canoeing,
    and other nonmotorized forms of recreational travel. The system may interconnect
    state parks, forests, wildlife areas, nature preserves, scenic rivers, and other
    places of scenic or historic interest to the maximum practicable extent. It shall
    provide circuit trails for day use and access trails wherever possible. The director
    may, by the adoption of rules in accordance with Chapter 119. of the Revised Code,
    restrict uses of the trails to insure user safety, prevent damage to the trail
    routes, and prevent conflicting uses. As used in this chapter, "state trail" means
    any trail acquired by the director, or trail established or maintained pursuant
    to an agreement, under section 1519.02 of the Revised Code, and any other trail
    on lands under his jurisdiction that he designates as a state trail by entry in
    his journal. Any person who owns land along a state trail may use or authorize
    use of motorized vehicles across the trail for purposes incident to ownership
    and management of his land.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1519.01
- number: '1519.02'
  heading: Acquisition and maintenance of property for trails
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1519'
    name: Recreational Trails
  text: 'The director of natural resources may acquire real property or any estate,
    right, or interest therein for the purpose of establishing, protecting, and maintaining
    any state recreational trail. The director may appropriate real property or any
    estate, right, or interest therein for trail purposes only along a canal, watercourse,
    stream, existing or abandoned road, highway, street, logging road, railroad, or
    ridge or other landform or topographic feature particularly suited for nonmotorized
    vehicular recreational use, and may not appropriate more than twenty-five acres
    including land purchased with or without appropriation proceedings along any mile
    of trail. Any state department or agency or any political subdivision may transfer
    real property or any estate, right, or interest therein to the director for such
    purpose, or may enter into an agreement with the director for the establishment,
    protection, and maintenance of a trail. The director may transfer real property
    or any estate, right, or interest therein to any political subdivision pursuant
    to an agreement whereby the political subdivision maintains and protects a trail.
    The director may enter into agreements with private organizations or with agencies
    of the United States to provide for maintenance of any trail or section thereof.
    The director shall provide campsites, shelters, footbridges, water, sanitary,
    watercraft launching, and other facilities for recreational use, nature and historical
    interpretation, and administration of the state trails system. The director may
    cooperate with the director of transportation in providing appropriate means for
    trails to cross highways. The director may restore historical sites along a trail.
    The director shall publish and distribute maps, guides, pamphlets, and other interpretative
    literature on the state trails system and on individual trails which the director
    considers suitable for extensive public use.

    Any instrument by which real property is acquired pursuant to this section shall
    identify the agency of the state that has the use and benefit of the real property
    as specified in section 5301.012 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1519.02
- number: '1519.03'
  heading: Comprehensive plan for development of statewide trails system
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1519'
    name: Recreational Trails
  text: The director of natural resources, through the chief of the division of parks
    and watercraft, shall prepare and maintain a current inventory of trails, abandoned
    or unmaintained roads, streets, and highways, abandoned railroad rights-of-way,
    utility easements, canals, and other scenic or historic corridors or rights-of-way
    that are suitable for recreational use. The director shall prepare and publish
    a comprehensive plan for development of a statewide trails system to serve present
    and future trail recreation needs of the state. Any state department, agency,
    political subdivision, or planning commission shall furnish available maps, descriptions,
    and other pertinent information to the director or provide access to the director's
    representatives for inspection and duplication, upon request by the director,
    for trail inventory and planning purposes.
