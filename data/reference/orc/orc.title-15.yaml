- number: '1531.04'
  heading: Division of wildlife - powers and duties
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'The division of wildlife, at the direction of the chief of the division,
    shall do all of the following:

    (A) Plan, develop, and institute programs and policies based on the best available
    information, including biological information derived from professionally accepted
    practices in wildlife and fisheries management, with the approval of the director
    of natural resources;

    (B) Have and take the general care, protection, and supervision of the wildlife
    in the state parks known as Lake St. Marys, The Portage Lakes, Lake Loramie, Indian
    Lake, Buckeye Lake, Guilford Lake, such part of Pymatuning reservoir as lies in
    this state, and all other state parks and lands owned by the state or in which
    it is interested or may acquire or become interested, except lands and lakes the
    care and supervision of which are vested in some other officer, body, board, association,
    or organization;

    (C) Enforce by proper legal action or proceeding the laws of the state and division
    rules for the protection, preservation, propagation, and management of wild animals
    and sanctuaries and refuges for the propagation of those wild animals, and adopt
    and carry into effect such measures as it considers necessary in the performance
    of its duties;

    (D) Promote, educate, and inform the citizens of the state about conservation
    and the values of fishing, hunting, and trapping, with the approval of the director;

    (E) Prepare and maintain surveys and inventories of rare and endangered species
    of plants and animals and other unique natural features. The information shall
    be stored in the Ohio natural heritage database, established pursuant to this
    division, and may be made available to any individual or private or public agency
    for research, educational, environmental, land management, or other similar purposes
    that are not detrimental to the conservation of a species or feature. The database
    shall include information submitted under section 1517.02 of the Revised Code.
    Information regarding sensitive site locations of species that are listed pursuant
    to section 1518.01 of the Revised Code and of unique natural features that are
    included in the Ohio natural heritage database is not subject to section 149.43
    of the Revised Code if the chief determines that the release of the information
    could be detrimental to the conservation of a species or unique natural feature.'
