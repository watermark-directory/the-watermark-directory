- number: '1501.21'
  heading: Canoe and boating routes - markers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: 'The director of natural resources, in cooperation with any federal agency,
    any other state, any state agency or political subdivision of this state, any
    private organization, or any individual, may designate, and when feasible mark,
    canoe and boating routes on the waters in this state that have historic or scenic
    value.

    The director may expend funds and make grants to erect and maintain markers that
    designate public facilities, points of interest, portages, and all dams, rapids,
    waterfalls, whirlpools, and other hazards to canoeists and boaters.

    The director may publish and distribute or authorize the publication and distribution
    of maps of and guides to the designated historic or scenic canoe and boating routes,
    as well as pamphlets containing any other interpretative literature on the routes
    that the director considers advisable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1501.21
- number: '1501.22'
  heading: Water recreation hazard warning markers
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: The director of natural resources may erect and maintain suitable markers
    to warn boaters of dams, that are hazardous on all waters of the state that are
    regularly used by the public, whether seasonally or during all seasons, for canoeing,
    kayaking, or similar watercraft recreation.
