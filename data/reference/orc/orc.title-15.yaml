- number: '1501.011'
  heading: Preparing plans for construction and awarding of contracts
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1501'
    name: Department Of Natural Resources - General Provisions
  text: '(A) Except as provided in divisions (B), (C), and (D) of this section, the
    Ohio facilities construction commission shall supervise the design and construction
    of, and make contracts for the construction, reconstruction, improvement, enlargement,
    alteration, repair, or decoration of, any projects or improvements for the department
    of natural resources that may be authorized by legislative appropriations or any
    other funds available therefor, the estimated cost of which amounts to two hundred
    thousand dollars or more or the amount determined pursuant to section 153.53 of
    the Revised Code or more.

    (B)(1) The department of natural resources shall supervise the design and construction
    of, and make contracts for the construction, reconstruction, improvement, enlargement,
    alteration, repair, or decoration of, any of the following activities, projects,
    or improvements:

    (a) Dam repairs administered by the division of engineering under Chapter 1507.
    of the Revised Code;

    (b) Projects or improvements administered by the division of parks and watercraft
    and funded through the waterways safety fund established in section 1547.75 of
    the Revised Code;

    (c) Projects or improvements administered by the division of wildlife under Chapter
    1531. or 1533. of the Revised Code;

    (d) Activities conducted by the department pursuant to section 5511.05 of the
    Revised Code in order to maintain the department''s roadway inventory.

    (2) If a contract to be let under division (B)(1) of this section involves an
    exigency that concerns the public health, safety, or welfare or addresses an emergency
    situation in which timeliness is crucial in preventing the cost of the contract
    from increasing significantly, pursuant to the declaration of a public exigency,
    the department may award the contract without competitive bidding or selection
    as otherwise required by Chapter 153. of the Revised Code.

    A notice published by the department of natural resources regarding an activity,
    project, or improvement shall be published as contemplated in section 7.16 of
    the Revised Code.

    (C) The executive director of the Ohio facilities construction commission may
    authorize the department of natural resources to administer any other project
    or improvement, the estimated cost of which, including design fees, construction,
    equipment, and contingency amounts, is not more than three million dollars.'
