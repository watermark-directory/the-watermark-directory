- number: '1547.61'
  heading: Applicable state laws
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'This chapter and other applicable laws of this state govern the operation,
    equipment, registration, numbering, and all other matters relating thereto whenever
    any vessel is operated on the waters in this state, whether the waters are under
    the jurisdiction and control of a state department, conservancy district, or political
    subdivision, or when any activity regulated by this chapter takes place thereon;
    but nothing in this chapter prevents the adoption of any rule or ordinance relating
    to operation and equipment of vessels the provisions of which are identical to
    the provisions of this chapter or rules; provided, that such rules or ordinances
    shall be operative only so long as and to the extent that they continue to be
    identical to the provisions of this chapter or rules. Conservancy districts and
    political subdivisions may adopt ordinances or rules limiting the horsepower of
    inboard or outboard motors, the maximum and minimum size and type of vessels,
    and the speed at which vessels may be operated, except that, upon impounded bodies
    of water covering three thousand five hundred acres of land or more, no conservancy
    district or political subdivision shall prohibit the use of motors of one hundred
    twenty horsepower or less when used in conjunction with properly proportioned
    boats in a reasonable area to be designed for the use of those motors and boats
    and for water skiing; and provided that upon Tappan Lake no conservancy district
    or political subdivision shall prohibit the use of motors of sixty-five horsepower
    or less when used in conjunction with properly proportioned boats in a reasonable
    area to be designated for the use of those motors and boats and for water skiing.

    Any state department, conservancy district, or political subdivision may, at any
    time, but only after public notice published in a newspaper of local circulation,
    make formal application to the chief of the division of parks and watercraft for
    special rules with reference to the operation of vessels on any waters within
    its territorial limits and shall set forth therein the reasons which make such
    special rules necessary or appropriate.

    The division of parks and watercraft may make special rules governing the operation
    of vessels on any waters within the territorial limits of any political subdivision.

    No political subdivision or conservancy district shall charge any license fee
    or other charge against the owner of any vessel for the right or privilege of
    operating the vessel upon the waters of any such political subdivision or conservancy
    district, and no license or number in addition to those provided for under this
    chapter shall be required by any state department, conservancy district, or political
    subdivision.'
