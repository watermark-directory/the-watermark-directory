    closed seasonNo closed season13None6None3BluegillNo closed seasonNo closed season5520204Rock
    BassNo closed seasonNo closed season5520205Yellow PerchNo closed seasonNo closed
    seasonNoneNone20None6White BassNo closed seasonNo closed seasonNoneNone20None7TroutApr.15-Sept.15Apr.
    15-Sept.1577668Black BassJune 16-Apr.30July 1-May 241010669CrappieNo closed seasonNo
