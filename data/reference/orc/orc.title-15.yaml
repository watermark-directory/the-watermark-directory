  url: https://codes.ohio.gov/ohio-revised-code/section-1522.04
- number: '1522.05'
  heading: Organization and operation of water resources council
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'Pursuant to Section 9.2 of the great lakes-st. Lawrence river basin water
    resources compact, the governor may take such actions as are necessary for the
    initial organization and operation of the great lakes-st. Lawrence river basin
    water resources council created in Section 2.1 of the compact. Agencies of the
    state are hereby authorized to cooperate with the council.

    The chief of the division of water resources shall adopt voluntary watershedwide
    goals, objectives, and standards for water conservation and efficiency consistent
    with Section 4.2 of the great lakes-st. Lawrence river basin water resources compact.'
  history: null
