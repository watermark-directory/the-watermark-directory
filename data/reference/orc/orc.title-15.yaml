  text: 'The chief may revoke a permit issued under section 1521.29 of the Revised
    Code pursuant to an adjudication conducted in accordance with Chapter 119. of
    the Revised Code if one of the following applies:

    (A) The continued withdrawal or consumptive use of water under the permit will
    endanger the public health, safety, or welfare.

    (B) The withdrawal or consumptive use of water will result in a significant lowering
    of the water level within an aquifer, the overdrafting of an aquifer, or the imminent
    threat of irreparable material damage to an aquifer such that the aquifer will
    no longer yield the amount of water it did before the withdrawal or consumptive
    use.

    (C) The permittee has violated, is violating, or is threatening to violate any
    provision in sections 1521.23 to 1521.36 of the Revised Code, rules adopted under
    those sections, or a permit or order issued under those sections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1521.33
- number: '1521.34'
  heading: Notice to public water system permittee
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1521'
    name: Division Of Water Resources
  text: '(A) For purposes of this section, "public water system" has the same meaning
