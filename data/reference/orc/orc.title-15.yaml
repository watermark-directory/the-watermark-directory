- number: '1533.02'
  heading: Fishing and trapping districts - restrictions on taking, possession, and
    selling
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1533'
    name: Hunting; Fishing
  text: 'Fish in the inland and Lake Erie fishing districts, game birds and game quadrupeds
    throughout the state, and fur-bearing animals in the inland and Lake Erie trapping
    districts may be taken and possessed only in open season, in compliance with this
    section or a division rule, stipulating the length of fish and the number of fish,
    game birds, game quadrupeds, and fur-bearing animals that may be taken.

    The waters of Lake Erie and the waters, lands, and marshes included in Lucas,
    Ottawa, Sandusky, Erie, Lorain, Cuyahoga, Lake, and Ashtabula counties constitute
    the "Lake Erie trapping district," and all other waters, lands, and marshes within
    the state constitute the "inland trapping district."

    The waters of Lake Erie; the waters of Sandusky bay as far west as a continuation
    due south to the Sandusky county shore of the section line between sections 23
    and 24 in Bay township, Ottawa county, and as far east as a continuation due north
    of the township line between Perkins and Huron townships, Erie county, indicated
    by markers which shall be permanently erected on each shore; and the waters of
    Maumee bay as far south as a line which shall be a continuation due eastward of
    the section line between sections 16 and 21 in Washington township, Lucas county,
    indicated by markers which shall be permanently erected on each shore, constitute
    the "Lake Erie fishing district." All other waters over which the state has jurisdiction,
    whether lakes, rivers, creeks, or reservoirs or whether natural or artificial,
    including East Harbor, West Harbor, and Middle Harbor in Ottawa county, and the
    waters of Ten Mile creek lying within this state constitute the "inland fishing
    district."

    (A) All species or kinds of fish may be taken and possessed only according to
    the following schedule or as otherwise provided in this chapter or Chapter 1531.
    of the Revised Code or by division rule.


    Open SeasonMinimum Legal Lengths in InchesDaily Bag LimitsName of FishInlandLake
