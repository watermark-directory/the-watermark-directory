- number: '1531.17'
  heading: Wildlife fund
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: 'All fines, penalties, and forfeitures arising from prosecutions, convictions,
    confiscations, or otherwise under this chapter and Chapters 1517. and 1533. of
    the Revised Code, unless otherwise directed by the director of natural resources,
    shall be paid by the officer by whom collected to the director and by the director
    paid into the state treasury to the credit of the wildlife fund, which is hereby
    created, for the use of the division of wildlife. All moneys received from the
    sale of wild animals under division (J) of section 1531.06 of the Revised Code
    shall be paid into the state treasury to the credit of the wildlife fund for the
    use of the division. All moneys collected as license fees on nets in the Lake
    Erie fishing district shall be paid by the director into the state treasury to
    the credit of the wildlife fund for use only in the betterment and the propagation
    of fish therein or in otherwise propagating fish in such district. All investment
    earnings of the fund shall be credited to the fund. The wildlife fund shall not
    be used for compensation of personnel employed by other divisions of the department
    of natural resources who are assigned to law enforcement duties in aid of the
    division of wildlife or for compensation of division of wildlife personnel for
    activities related to the instruction of personnel of other divisions.

    The director of natural resources may use moneys from the fund to make the payments
    required under section 1501.29 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1531.17
