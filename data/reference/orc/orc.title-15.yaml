- number: '1561.11'
  heading: Examinations for mine forepersons and fire bosses
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1561'
    name: Division Of Mineral Resources Management - Mines And Quarries
  text: The chief of the division of mineral resources management, for the purpose
    of conducting the examinations for mine forepersons and fire bosses, may designate
    one or more examining boards of three members, selected from among the deputy
    mine inspectors, superintendent and assistant superintendents of rescue stations,
    and electrical inspectors. The examinations shall be conducted in the district
    of the applicant's residence or as near thereto as practicable. Grading and issuance
    of certificates shall be done by the chief.
