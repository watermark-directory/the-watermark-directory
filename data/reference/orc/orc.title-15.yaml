- number: '1571.02'
  heading: Filing of map by reservoir operator
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1571'
    name: Underground Storage Of Gas
  text: '(A) Any reservoir operator who, on September 9, 1957, is injecting gas into,
    storing gas in, or removing gas from a reservoir shall within sixty days after
    such date file with the division of oil and gas resources management a map thereof
    as described in division (C) of this section, provided that if a reservoir operator
    is, on September 9, 1957, injecting gas into or storing gas in a reservoir solely
    for testing, the reservoir operator shall at once file such map with the division.

    (B) If the injection of gas into or storage of gas in a gas storage reservoir
    is begun after September 9, 1957, the operator of such reservoir shall file with
    the division a map thereof as described in division (C) of this section, on the
    same day and not less than three months prior to beginning such injection or storage.

    (C) Each map filed with the division pursuant to this section shall be prepared
    by a registered surveyor, registered engineer, or competent geologist. It shall
    show both of the following:

    (1) The location of the boundary of such reservoir and the boundary of such reservoir''s
    protective area, and the known fixed monuments, corner stones, or other permanent
    markers in such boundary lines;

    (2) The boundary lines of the counties, townships, and sections or lots that are
    within the limits of such map, and the name of each such county and township and
    the number of each such section or lot clearly indicated thereon. The legend of
    the map shall indicate the stratum or strata in which the gas storage reservoir
    is located.

    The location of the boundary of the gas storage reservoir as shown on the map
    shall be defined by the location of those wells around the periphery of such reservoir
    that had no gas production when drilled into the storage stratum of such reservoir,
    provided that if the operator of such reservoir, upon taking into consideration
    the number and nature of such wells, the geological and production knowledge of
    the storage stratum, its character, permeability, and distribution, and operating
    experience, determines that the location of the boundary of such reservoir should
    be differently defined, the reservoir operator may, on such map, show the boundary
    of such reservoir to be located at a location different than the location defined
    by the location of those wells around the periphery of such reservoir that had
    no gas production when drilled into the storage stratum.

    Whenever the operator of a gas storage reservoir determines that the location
    of the boundary of such reservoir as shown on the most recent map thereof on file
    in the division pursuant to this section is incorrect, the reservoir operator
    shall file with the division an amended map showing the boundary of such reservoir
    to be located at the location that the reservoir operator then considers to be
    correct.

    (D) Each operator of a gas storage reservoir who files with the division a map
    as required by this section shall, at the end of each six-month period following
    the date of such filing, file with the division an amended map showing changes,
    if any, in the boundary line of such reservoir or of such reservoir''s protective
    area that have occurred in the six-month period. Nothing in this division shall
    be construed to require such a reservoir operator to file an amended map at the
    end of any such six-month period if no such boundary changes have occurred in
    such period.

    An operator of a gas storage reservoir who is required by this section to file
    an amended map with the division shall not be required to so file such an amended
    map after such time when the reservoir operator files with the division a map
    pertaining to such reservoir, as provided in section 1571.04 of the Revised Code.'
