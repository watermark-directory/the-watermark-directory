  url: https://codes.ohio.gov/ohio-revised-code/section-1522.01
- number: '1522.02'
  heading: Governor as state administrator of compact
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'The governor, ex officio, shall serve as this state''s administrator of the
    great lakes-st. Lawrence river basin water resources compact. The governor shall
    appoint the director of natural resources as the governor''s alternate for purposes
    of attending all meetings of the great lakes-st. Lawrence river basin water resources
    council and voting on matters before the council in the governor''s absence.

    The governor shall do all of the following as administrator:

    (A) Receive copies of all agreements that are entered into pursuant to the compact
    by this state or its political subdivisions and other states or their political
    subdivisions;

    (B) Consult with, advise, and aid this state, other states, and political subdivisions
    in the formulation of such agreements;

    (C) Make any recommendations to the general assembly, legislatures of other states,
    governmental agencies, and political subdivisions that the governor considers
    desirable in order to effectuate the purposes of the compact;

    (D) Consult with and cooperate with the compact administrators of other states
    that are parties to the compact.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1522.02
- number: '1522.03'
  heading: Implementation and enforcement of compact
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1522'
    name: Great Lakes-St. Lawrence River Basin Water Resources Compact
  text: 'The chief of the division of water resources shall do all of the following:

    (A) Adopt rules in accordance with Chapter 119. of the Revised Code for the implementation,
    administration, and enforcement of the great lakes-st. Lawrence river basin water
    resources compact;

    (B) Enforce the great lakes-st. Lawrence river basin water resources compact and
    take appropriate actions to effectuate its purposes and intent;

    (C) Adopt rules in accordance with Chapter 119. of the Revised Code for the development,
    implementation, administration, and enforcement of any permit program established
    under this chapter.

    Rules adopted under this section shall be no more stringent than the great lakes-st.
    Lawrence river basin water resources compact. The chief shall convene a working
    group consisting of parties with interests in Lake Erie, the Lake Erie watershed,
    and the great lakes-st. Lawrence river basin water resources compact. The working
    group shall consult with the chief regarding the adoption of rules under this
    section.'
