- number: '1547.73'
  heading: Waterways safety council
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'There is hereby created in the division of parks and watercraft a waterways
    safety council composed of five members appointed by the governor with the advice
    and consent of the senate. Not more than three of such appointees shall belong
    to the same political party. Terms of office shall be for five years, commencing
    on the first day of February and ending on the thirty-first day of January. Each
    member shall hold office from the date of appointment until the end of the term
    for which the member was appointed. The chief of the division of parks and watercraft
    shall act as secretary of the council. In the event of the death, removal, resignation,
    or incapacity of a member of the council, the governor, with the advice and consent
    of the senate, shall appoint a successor to fill the unexpired term who shall
    hold office for the remainder of the term for which the member''s predecessor
    was appointed. Any member shall continue in office subsequent to the expiration
    date of the member''s term until the member''s successor takes office, or until
    a period of sixty days has elapsed, whichever occurs first. The governor may remove
    any appointed member of the council for misfeasance, nonfeasance, or malfeasance
    in office.

    The council may:

    (A) Advise with and recommend to the chief as to plans and programs for the construction,
    maintenance, repair, and operation of refuge harbors and other projects for the
    harboring, mooring, docking, and storing of light draft vessels as provided in
    sections 1547.71 and 1547.72 of the Revised Code;

    (B) Advise with and recommend to the chief as to the methods of coordinating the
    shore erosion projects of the department of natural resources with the refuge
    of light draft vessel harbor projects;

    (C) Consider and make recommendations upon any matter which is brought to its
    attention by any person or that the chief may submit to it;

    (D) Submit to the governor biennially recommendations for amendments to the laws
    of the state relative to refuge and light draft vessel harbor projects.

    Before entering upon the discharge of official duties, each member of the council
    shall take and subscribe to an oath of office, which oath, in writing, shall be
    filed in the office of the secretary of state.

    The members of the council shall serve without compensation, but shall be entitled
    to receive their actual and necessary expenses incurred in the performance of
    their official duties from the waterways safety fund as provided in section 1547.75
    of the Revised Code.

    The council shall, by a majority vote of all its members, adopt and amend bylaws.

    To be eligible for appointment as a member of the council, a person shall be a
    citizen of the United States and an elector of the state and possess a knowledge
    of and have an interest in small boat operations.

    The council shall hold at least four regular quarterly meetings each year. Special
    meetings shall be held at such times as the bylaws of the council provide, or
    at the behest of a majority of its members. Notices of all meetings shall be given
    in such manner as the bylaws provide. The council shall choose annually from among
    its members a chairperson to preside over its meetings. A majority of the members
    of the council shall constitute a quorum. No advice shall be given or recommendation
    made without a majority of the members of the council concurring therein.'
