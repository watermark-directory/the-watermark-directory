- number: '1531.29'
  heading: Prohibiting polluting state land or water
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1531'
    name: Division Of Wildlife
  text: No person shall place or dispose of in any manner, any garbage, waste, peelings
    of vegetables or fruits, rubbish, ashes, cans, bottles, wire, paper, cartons,
    boxes, parts of automobiles, wagons, furniture, glass, oil, or anything else of
    an unsightly or unsanitary nature on any state owned, controlled, or administered
    land, or in any ditch, stream, river, lake, pond, or other watercourse, except
    those waters which do not combine or effect a junction with natural surface or
    underground waters, or upon the bank thereof where the same is liable to be washed
    into the water either by ordinary flow or floods. This section does not apply
    to any substance placed under authority of a permit issued under section 6111.04
    of the Revised Code or exempted by such section from its terms.
