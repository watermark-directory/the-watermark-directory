- number: '1514.072'
  heading: Civil action to compel compliance with order
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: Whenever a person fails to comply with an order issued by the chief of the
    division of mineral resources management, the chief, in addition to any other
    remedy under this chapter, may request the attorney general to institute a civil
    action to compel compliance with the order, including a permanent or temporary
    injunction, a restraining order, or any other appropriate order, in the court
    of common pleas of the county in which the noncompliance is occurring or has occurred.
    The court shall grant the relief requested upon a demonstration that noncompliance
    with an order of the chief is occurring or has occurred.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1514.072
- number: '1514.08'
  heading: Administrative rules for permits and reclamation
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1514'
    name: Other Surface Mining
  text: '(A) The chief of the division of mineral resources management may adopt,
    amend, and rescind rules in accordance with Chapter 119. of the Revised Code in
    order to prescribe procedures for submitting applications for permits, amendments
    to permits, and amendments to plans of mining and reclamation; filing annual reports
    and final reports; requesting inspection and approval of reclamation; paying permit
    and filing fees; and filing and obtaining the release of performance bonds deposited
    with the state. For the purpose of preventing damage to adjoining property or
    achieving one or more of the performance standards established in division (A)(10)
    of section 1514.02 of the Revised Code, the chief may establish classes of mining
    industries, based upon industrial categories, combinations of minerals produced,
    and geological conditions in which surface or in-stream mining operations occur,
    and may prescribe different rules consistent with the performance standards for
    each class. For the purpose of apportioning the workload of the division of mineral
    resources management among the quarters of the year, the rules may require that
    applications for permits and annual reports be filed in different quarters of
    the year, depending upon the county in which the operation is located.

    (B) The chief shall adopt rules under this section that do all of the following:

    (1) With respect to in-stream mining, and in consultation with the chief of the
    division of water resources, determine periods of low flow, which are the only
    time periods during which in-stream mining is allowed, and develop and implement
    any criteria, in addition to the criteria established in section 1514.02 of the
    Revised Code, that the chief determines are necessary for the permitting of in-stream
    mining;

    (2) Establish criteria and procedures for approving or disapproving the transfer
    of a surface or in-stream mining permit under division (F) of section 1514.02
    of the Revised Code;

    (3) Define when any of the following may be considered to be "significant" for
    purposes of section 1514.022 of the Revised Code:

    (a) An amendment to a permit issued under section 1514.02 of the Revised Code
    for a surface or in-stream mining operation;

    (b) An amendment to the plan of mining and reclamation that must be filed with
    an application for either permit under section 1514.02 of the Revised Code;

    (c) Changes to that plan of mining and reclamation that are proposed in a permit
    renewal application filed under section 1514.021 of the Revised Code.

    In defining "significant," the chief shall focus on changes that increase the
    likelihood that the mining operation may have a negative impact on the public.

    (4) Establish a framework and procedures under which the amount of any bond required
    to be filed under this chapter to ensure the satisfactory performance of the reclamation
    measures required under this chapter may be reduced by subtracting a credit based
    on the operator''s past compliance with this chapter and rules adopted and orders
    issued under it. The rules also shall apply to cash, an irrevocable letter of
    credit, or a certificate of deposit that is on deposit in lieu of a bond. In establishing
    the amount of credit that an operator or applicant may receive based on past compliance,
    the chief may consider past compliance with respect to any permit for a surface
    or in-stream mining operation that has been issued in this state to the operator
    or applicant.

    (5) Establish criteria and procedures for granting a variance from compliance
    with the prohibitions established in divisions (E)(3) and (F)(3) of section 1514.10
    of the Revised Code. The criteria shall ensure that an operator may obtain a variance
    only if compliance with the applicable prohibition is not necessary to prevent
    damage to the watercourse or surrounding areas.'
