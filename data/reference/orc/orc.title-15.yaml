- number: '1517.15'
  heading: '[Former R.C. 1547.82, amended and renumbered by S.B. 156, 135th General
    Assembly, effective 10/24/2024] Approving structures and channel modifications'
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1517'
    name: Division Of Natural Areas And Preserves
  text: No state department, state agency, or political subdivision shall build or
    enlarge any highway, road, or structure or modify or cause the modification of
    the channel of any watercourse within one thousand feet of a wild, scenic, or
    recreational river outside the limits of a municipal corporation without first
    having obtained approval of the plans for the highway, road, or structure or channel
    modification from the director of natural resources or the director's representative.
    The state department, state agency, or political subdivision, with the approval
    of the director or the director's representative, may so build, enlarge, or modify
    beyond one thousand feet on publicly owned land if necessary to preserve water
    conservation, scenic, fish, wildlife, historic, or outdoor recreation values.
    The court of common pleas having jurisdiction, upon petition by the director,
    shall enjoin work on any highway, road, or structure or channel modification for
    which such approval has not been obtained.
