- number: '1547.58'
  heading: Disclosure statement regarding alternative process of R.C. 1547.305
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1547'
    name: Watercraft And Waterways
  text: 'When the chief of the division of parks and watercraft issues a registration
    certificate under section 1547.54 of the Revised Code, the chief also shall provide
    to the owner of the registered watercraft a disclosure statement regarding the
    requirements and procedures established under section 1547.305 of the Revised
    Code.

    The disclosure statement shall inform the owner that if the watercraft is left
    on private property of another without a valid service, repair, or storage contract,
    the watercraft may be rendered abandoned and subject to the process set forth
    in section 1547.305 of the Revised Code.'
