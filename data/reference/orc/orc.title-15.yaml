- number: '1506.36'
  heading: Exempted activities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: 'Sections 1506.30 to 1506.35 of the Revised Code do not limit the right of:

    (A) Any person to engage in recreational diving in Lake Erie, except at a site
    of abandoned property to which the director of natural resources has limited access
    during the term of a permit pursuant to division (J) of section 1506.32 of the
    Revised Code;

    (B) Any person to own any abandoned property submerged in Lake Erie that was recovered
    before March 2, 1992, or released to the person under division (B) or (D) of section
    1506.33 of the Revised Code;

    (C) The department of natural resources or the Ohio history connection to recover
    or contract for the recovery of abandoned property in Lake Erie;

    (D) Any person to take and remove sand, gravel, stone, or other minerals or substances
    from and under the bed of Lake Erie in accordance with section 1505.07 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1506.36
- number: '1506.38'
  heading: Chief of division of water is erosion agent for purposes of cooperation
    with federal authorities
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: The director of natural resources shall act as the erosion agent of the state
    for the purpose of cooperating with the secretary of the army, acting through
    the chief of engineers of the United States army corps of engineers in the department
    of defense. The director shall cooperate with the secretary in carrying out, and
    may conduct, investigations and studies of conditions along the shorelines of
    Lake Erie and of the bays and projections therefrom, and of the islands therein,
    within the territorial waters of the state, with a view to devising and perfecting
    economical and effective methods and works for preventing, correcting, and controlling
    shore erosion and damage therefrom and controlling the inundation of improved
    property by the waters of Lake Erie, its bays, and associated inlets.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1506.38
- number: '1506.39'
  heading: Assistance of other state employees
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: 'The director of natural resources, in the discharge of the director''s duties
    under sections 1506.38 to 1506.48 of the Revised Code, may call to the director''s
    assistance, temporarily, any engineers or other employees in any state department,
    or in the Ohio state university or other educational institutions financed wholly
    or in part by the state, for the purpose of devising the most effective and economical
    methods of controlling shore erosion and damage from it and controlling the inundation
    of improved property by the waters of Lake Erie and its bays and associated inlets.

    Such engineers and employees shall not receive any additional compensation over
    that which they receive from the departments or institutions by which they are
    employed, but they shall be reimbursed for their actual necessary expenses incurred
    while working under the direction of the director on erosion and inundation projects.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1506.39
- number: '1506.40'
  heading: Application for shore structure permit
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1506'
    name: Coastal Management
  text: 'No person shall construct a beach, groin, or other structure to control erosion,
    wave action, or inundation along or near the Ohio shoreline of Lake Erie, including
    related islands, bays, and inlets, without first obtaining a shore structure permit
    from the director of natural resources.

    The application for a permit shall include detailed plans and specifications prepared
    by a professional engineer registered under Chapter 4733. of the Revised Code.
    An applicant shall provide appropriate evidence of compliance with any applicable
    provisions of this chapter and Chapters 1505. and 1521. of the Revised Code, as
    determined by the director. A temporary shore structure permit may be issued by
    the director if it is determined necessary to safeguard life, health, or property.

    Each application or reapplication for a permit under this section shall be accompanied
    by a non-refundable fee as the director shall prescribe by rule.

    If the application is approved, the director shall issue a permit to the applicant
    authorizing construction of the project. If requested in writing by the applicant
    within thirty days of issuance of a notice of disapproval of the application,
    the director shall conduct an adjudication hearing under Chapter 119. of the Revised
    Code, except sections 119.12 and 119.121 of the Revised Code. After reviewing
    the record of the hearing, the director shall issue a final order approving the
    application, disapproving it, or approving it conditioned on the making of specified
    revisions in the plans and specifications.

    The director, by rule, shall limit the period during which a construction permit
    issued under this section is valid and shall establish reapplication requirements
    governing a construction permit that expires before construction is completed.

    In accordance with Chapter 119. of the Revised Code, the director shall adopt,
    and may amend or rescind, such rules as are necessary for the administration,
    implementation, and enforcement of this section.'
