- number: '1557.01'
  heading: Parks and natural resources project definitions
  title:
    num: '15'
    name: Conservation of Natural Resources
  chapter:
    num: '1557'
    name: Parks And Natural Resources Projects
  text: 'As used in this chapter:

    (A) "Bond proceedings" means the resolutions, trust agreements, and other agreements,
    credit enhancement facilities, and amendments and supplements to the foregoing,
    or any one or more or combination thereof, authorizing, awarding, or providing
    for the terms and conditions applicable to or providing for the security or liquidity
    of obligations, and the provisions contained in those obligations.

    (B) "Debt charges" means principal, including any mandatory sinking fund or redemption
    requirements for retirement of obligations, interest and other accreted amounts,
    and any redemption premium payable on obligations.

    (C) "Bond service fund" means the fund, and any accounts in that fund, created
    by former section 1557.04 of the Revised Code, including all moneys and investments,
    and earnings from investments, credited and to be credited to that fund and accounts
    as and to the extent provided in the bond proceedings.

    (D) "Commissioners" or "commissioners of the sinking fund" means the board of
    commissioners of the sinking fund under Section 8 of Article VIII, Ohio Constitution,
    and section 129.01 of the Revised Code.

    (E) "Costs of projects" means the costs of acquiring, constructing, reconstructing,
    rehabilitating, remodeling, renovating, enlarging, improving, equipping, or furnishing
    projects, and the financing thereof, including the cost of clearance and preparation
    of the site and of any land to be used in connection with projects, the cost of
    any indemnity and surety bonds and premiums on insurance, all related direct administrative
    expenses and allocable portions of direct costs of the commissioners and department
    of natural resources, cost of engineering and architectural services, designs,
    plans, specifications, surveys, and estimates of cost, legal fees, fees and expenses
    of trustees, depositories, and paying agents for the obligations, cost of issuance
    of the obligations and financing charges and fees and expenses of financial advisers
    and consultants in connection therewith, interest on obligations from the date
    thereof to the time when interest is to be covered from sources other than proceeds
    of obligations, amounts necessary to establish reserves as required by the bond
    proceedings, costs of audits, the reimbursement of all moneys advanced or applied
    by or borrowed from any governmental agency, whether to or by the commissioners
    or others, from whatever source provided, for the payment of any item or items
    of cost of the projects, and all other expenses necessary or incident to planning
    or determining feasibility or practicability with respect to projects, and such
    other expenses as may be necessary or incident to the acquisition, construction,
    reconstruction, rehabilitation, remodeling, renovation, enlargement, improvement,
    equipment, and furnishing of projects, the financing thereof and the placing of
    the same in use and operation, including any one, part of, or combination of such
    classes of costs and expenses.

    (F) "Credit enhancement facilities" has the meaning given in division (A) of section
    133.01 of the Revised Code.

    (G) "Financing costs" has the meaning given in division (K) of section 133.01
    of the Revised Code.

    (H) "Interest" or "interest equivalent" has the meaning given in division (R)
    of section 133.01 of the Revised Code.

    (I) "Local government entities" means any county, municipal corporation, township,
    metropolitan or township park district, soil and water conservation district,
    conservancy district, or joint recreation district.

    (J) "Net proceeds" means amounts received from the sale of obligations pursuant
    to this chapter, excluding amounts used to refund or retire outstanding obligations,
    and does not include amounts required to be deposited in special funds pursuant
    to the applicable bond proceedings, or financing costs paid from such amounts
    received.

    (K) "Obligations" means bonds, notes, or other evidences of obligation of the
    state, including any interest coupons pertaining thereto, issued pursuant to Chapter
    1557. of the Revised Code.

    (L) "Principal amount" refers to the aggregate of the amount as stated or provided
    for in the bond proceedings authorizing the obligations as the amount on which
    interest or interest equivalent is initially calculated, and does not include
    any premium paid by the initial purchaser of the obligations.

    (M) "Project" means any capital improvements for state and local parks and land
    and water recreation facilities; soil and water restoration and protection; land
    management including preservation of natural areas and reforestation; water management
    including dam safety, stream and lake management, and flood control and flood
    damage reduction; fish and wildlife resource management; and any other improvements
    that enhance the use and enjoyment of natural resources by individuals.

    (N) "Special funds" or "funds" means, except where the context does not permit,
    the bond service fund, and any other funds, including reserve funds, created under
    the bond proceedings and stated to be special funds in those proceedings, including
    all moneys and investments, and earnings from investments, credited and to be
    credited to the particular fund. Special funds do not include the Ohio parks and
    natural resources fund created by section 1557.02 of the Revised Code or other
    funds created by the bond proceedings that are not stated by those proceedings
    to be special funds.'
