- number: '1321.21'
  heading: Consumer finance fund
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: All fees, charges, penalties, and forfeitures collected under Chapters 1321.,
    1322., 4712., 4727., and 4728., sections 1315.21 to 1315.30, and sections 1349.25
    to 1349.37 of the Revised Code shall be paid to the superintendent of financial
    institutions and shall be deposited by the superintendent into the state treasury
    to the credit of the consumer finance fund, which is hereby created. The fund
    may be expended or obligated by the superintendent for the defrayment of the costs
    of administration of Chapters 1321., 1322., 4712., 4727., and 4728., sections
    1315.21 to 1315.30, and sections 1349.25 to 1349.37 of the Revised Code by the
    division of financial institutions. All actual and necessary expenses incurred
    by the superintendent, including any services rendered by the department of commerce
    for the division's administration of Chapters 1321., 1322., 4712., 4727., and
    4728., sections 1315.21 to 1315.30, and sections 1349.25 to 1349.37 of the Revised
    Code, shall be paid from the fund. The fund shall be assessed a proportionate
    share of the administrative costs of the department and the division. The proportionate
    share of the administrative costs of the division of financial institutions shall
    be determined in accordance with procedures prescribed by the superintendent.
    Such assessment shall be paid from the consumer finance fund to the division of
    administration fund or the financial institutions fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.21
- number: '1321.31'
  heading: Assignment of personal earnings - requirements, limitations, priority
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'No assignment of, or order for, wages or salary is valid unless made in writing
    by the person by whom the said wages or salary are earned and no assignment of,
    or order for, wages or salary made by a married person is valid unless the written
    consent of the husband or wife of the person making such assignment or order is
    attached to such assignment or order. No assignment of, or order for, wages or
    salary of a minor is valid unless the written consent of a parent or the guardian
    of such minor is attached to such order or assignment. No assignment of, or order
    for, wages or salary is valid for more than twenty-five per cent of the earnings,
    wages, or salary of any married person. No such assignment is valid for more than
    fifty per cent of the earnings, wages, or salary of any unmarried person.

    Assignments of wages have priority as to each other from the time they are filed
    with the employer of the assignor, and the balance due any married person after
    twenty-five per cent has been so assigned, or due any unmarried person after fifty
    per cent has been so assigned is not subject to further assignment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.31
- number: '1321.32'
  heading: Assignment of wages invalid - exception
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: Notwithstanding section 1321.31 of the Revised Code, no assignment of, or
    order for wages or salary is valid unless the wages assigned or ordered are to
    be paid for the support of the employee's spouse or minor child in complying with
    an order of a court of record for the support of the employee's spouse or minor
    child. This section does not affect or invalidate any contract or agreement between
    employers and their employees, or as between employers, employees, and any labor
    union as to any checkoff on the wages of such employees as may be agreed upon.
    This section and section 4113.16 of the Revised Code shall not affect or invalidate
    any deduction from the wages or salary made in accordance with a payroll deduction
    plan agreed upon between the employer and employee provided that the same be revocable
    at any time by the employee upon notice to the employer up to the time of payment
    thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.32
- number: '1321.33'
  heading: Wage assignments for support of spouse or children not subject to Small
    Loan Law or R.C. 1321.31
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: The limitations and regulations of sections 1321.01 to 1321.19 and 1321.31
    of the Revised Code do not apply to assignments of, or orders for, wages for the
    support of a spouse or children when such assignments or orders are made to comply
    with an order of a court of record. The employee may assign whatever portion of
    his earnings that may be required to comply with the court order for support.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.33
- number: '1321.35'
  heading: Short-term Loan Law definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'As used in sections 1321.35 to 1321.48 of the Revised Code:

    (A) "Short-term loan" means a loan made pursuant to sections 1321.35 to 1321.48
    of the Revised Code.

    (B) "Superintendent of financial institutions" includes the deputy superintendent
    for consumer finance as provided in section 1181.21 of the Revised Code.

    (C) "Interest" means all charges payable directly or indirectly by a borrower
    to a licensee as a condition to a loan, including fees, service charges, renewal
    charges, and any ancillary product sold in connection with a short-term loan,
    but does not include the monthly maintenance fees, the loan origination charge,
    the check collection charge, or the check cashing fee authorized under section
    1321.40 of the Revised Code.

    (D) "Annual percentage rate" has the same meaning as in the "Truth in Lending
    Act," 82 Stat. 149 (1980), 15 U.S.C. 1606, as implemented by regulations of the
    consumer financial protection bureau. All fees and charges, including interest
    and the loan origination charge and monthly maintenance fees authorized under
    section 1321.40 of the Revised Code, shall be included in the computation of the
    annual percentage rate.

    (E) "Licensee" means a person licensed to make short-term loans under sections
    1321.35 to 1321.48 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.35
- number: '1321.36'
  heading: Short-term loan license required; telephone and mail loans; exceptions;
    applicability of Short-term Loan Law
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) No person shall engage in the business of making short-term loans to
    a borrower in Ohio, or, in whole or in part, make, offer, or broker a loan, or
    assist a borrower in Ohio to obtain such a loan, without first having obtained
    a license from the superintendent of financial institutions under sections 1321.35
    to 1321.48 of the Revised Code.

    (B) No person shall make, offer, or broker a loan, or assist a borrower to obtain
    a loan, via the telephone or mail.

    (C) Any loan made in violation of this section is void, and the lender has no
    right to collect, receive, or retain any principal, interest, fees, or other charges
    in connection with the loan.

    (D) Sections 1321.35 to 1321.48 of the Revised Code do not apply to any entity
    chartered and lawfully doing business under the authority of any law of this state,
    another state, or the United States as a bank, savings bank, trust company, savings
    and loan association, or credit union, or a subsidiary of any such entity, which
    subsidiary is regulated by a federal banking agency and is owned and controlled
    by a depository institution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.36
- number: '1321.37'
  heading: Application for short-term loan license; fee; approval procedure; assets;
    bond
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Application for an original or renewal license to make short-term loans
    shall be in writing, under oath, and in the form prescribed by the superintendent
    of financial institutions, and shall contain the name and address of the applicant,
    the location where the business of making loans is to be conducted, and any further
    information as the superintendent requires. At the time of making an application
    for an original license, the applicant shall pay to the superintendent a nonrefundable
    investigation fee of two hundred dollars. No investigation fee or any portion
    thereof shall be refunded after an original license has been issued. The application
    for an original or renewal license shall be accompanied by an original or renewal
    license fee, for each business location of one thousand dollars, except that applications
    for original licenses issued on or after the first day of July for any year shall
    be accompanied by an original license fee of five hundred dollars, and except
    that an application for an original or renewal license, for a nonprofit corporation
    that is incorporated under Chapter 1702. of the Revised Code, shall be accompanied
    by an original or renewal license fee, for each business location, that is one-half
    of the fee otherwise required. All fees paid to the superintendent pursuant to
    this division shall be deposited into the state treasury to the credit of the
    consumer finance fund.

    (B) Upon the filing of an application for an original license and, with respect
    to an application filed for a renewal license, on a schedule determined by the
    superintendent by rule adopted pursuant to section 1321.43 of the Revised Code,
    and the payment of fees in accordance with division (A) of this section, the superintendent
    shall investigate the facts concerning the applicant and the requirements provided
    by this division. The superintendent shall request the superintendent of the bureau
    of criminal identification and investigation, or a vendor approved by the bureau,
    to conduct a criminal records check based on the applicant''s fingerprints in
    accordance with section 109.572 of the Revised Code. Notwithstanding division
    (L) of section 121.08 of the Revised Code, the superintendent of financial institutions
    shall request that criminal record information from the federal bureau of investigation
    be obtained as part of the criminal records check. The superintendent of financial
    institutions shall conduct a civil records check. The superintendent shall approve
    an application and issue an original or renewal license to the applicant if the
    superintendent finds all of the following:

    (1) The financial responsibility, experience, and general fitness of the applicant
    are such as to warrant the belief that the business of making loans will be operated
    lawfully, honestly, and fairly under sections 1321.35 to 1321.48 of the Revised
    Code and within the purposes of those sections; that the applicant has fully complied
    with those sections and any rule or order adopted or issued pursuant to section
    1321.43 of the Revised Code; and that the applicant is qualified to engage in
    the business of making loans under sections 1321.35 to 1321.48 of the Revised
    Code.

    (2) The applicant is financially sound and has a net worth of not less than one
    hundred thousand dollars, or in the case of a nonprofit corporation that is incorporated
    under Chapter 1702. of the Revised Code, a net worth of not less than fifty thousand
    dollars. The applicant''s net worth shall be computed according to generally accepted
    accounting principles.

    (3) The applicant has never had revoked a license to make loans under sections
    1321.35 to 1321.48 of the Revised Code, under former sections 1315.35 to 1315.44
    of the Revised Code, or to do business under sections 1315.21 to 1315.30 of the
    Revised Code.

    (4) Neither the applicant nor any senior officer, or partner of the applicant,
    has pleaded guilty to or been convicted of a disqualifying offense as determined
    in accordance with section 9.79 of the Revised Code.

    (5) Neither the applicant nor any senior officer, or partner of the applicant,
    has been subject to any adverse judgment for conversion, embezzlement, misappropriation
    of funds, fraud, misfeasance or malfeasance, or breach of fiduciary duty, or if
    the applicant or any of those other persons has been subject to such a judgment,
    the applicant has proven to the superintendent, by a preponderance of the evidence,
    that the applicant''s or other person''s activities and employment record since
    the judgment show that the applicant or other person is honest and truthful and
    there is no basis in fact for believing that the applicant or other person will
    be subject to such a judgment again.

    (C) If the superintendent finds that the applicant does not meet the requirements
    of division (B) of this section, or the superintendent finds that the applicant
    knowingly or repeatedly contracts with or employs persons to directly engage in
    lending activities who have been convicted of a felony crime listed in division
    (B)(5) of this section, the superintendent shall issue an order denying the application
    for an original or renewal license and giving the applicant an opportunity for
    a hearing on the denial in accordance with Chapter 119. of the Revised Code. The
    superintendent shall notify the applicant of the denial, the grounds for the denial,
    and the applicant''s opportunity for a hearing. If the application is denied,
    the superintendent shall return the annual license fee but shall retain the investigation
    fee.

    (D) No person licensed under sections 1321.35 to 1321.48 of the Revised Code shall
    conduct business in this state unless the licensee has obtained and maintains
    in effect at all times a corporate surety bond issued by a bonding company or
    insurance company authorized to do business in this state. The bond shall be in
    favor of the superintendent and in the penal sum of at least one hundred thousand
    dollars, or in the case of a nonprofit corporation that is incorporated under
    Chapter 1702. of the Revised Code, in the amount of fifty thousand dollars. The
    term of the bond shall coincide with the term of the license. The licensee shall
    file a copy of the bond with the superintendent. The bond shall be for the exclusive
    benefit of any borrower injured by a violation by a licensee or any employee of
    a licensee, of any provision of sections 1321.35 to 1321.48 of the Revised Code.

    (E) Notwithstanding any provision of this section to the contrary, the superintendent
    shall issue an original license in accordance with Chapter 4796. of the Revised
    Code to an applicant if either of the following applies:

    (1) The applicant holds a license in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a short-term lender
    in a state that does not issue that license.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
