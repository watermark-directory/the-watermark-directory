- number: '1304.55'
  heading: Applicability of ORC provisions for consumer transactions governed by federal
    law - UCC 4A-108
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Except as otherwise provided in division (B) of this section, sections
    1304.51 to 1304.85 of the Revised Code do not apply to a funds transfer any part
    of which is governed by the "Electronic Fund Transfer Act," 92 Stat. 3728 (1978),
    15 U.S.C.A. 1693, as amended.

    (B) Sections 1304.51 to 1304.85 of the Revised Code apply to a remittance transfer
    as defined in the "Electronic Fund Transfer Act," 124 Stat. 2065 (2010), 15 U.S.C.
    1693o-1, as amended, unless the remittance transfer is an electronic fund transfer
    as defined in the "Electronic Fund Transfer Act," 92 Stat. 3728 (1978), 15 U.S.C.
    1693a, as amended.

    (C) In a funds transfer to which sections 1304.51 to 1304.85 of the Revised Code
    apply, in the event of an inconsistency between an applicable provision of sections
    1304.51 to 1304.85 of the Revised Code and an applicable provision of the "Electronic
    Fund Transfer Act," 92 Stat. 3728 (1978), 15 U.S.C. 1693, as amended, the provisions
    of the Electronic Fund Transfer Act govern to the extent of the inconsistency.'
