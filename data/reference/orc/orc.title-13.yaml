- number: '1309.335'
  heading: Accessions - UCC 9-335
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest may be created in an accession and continues in collateral
    that becomes an accession.

    (B) If a security interest is perfected when the collateral becomes an accession,
    the security interest remains perfected in the collateral.

    (C) Except as otherwise provided in division (D) of this section, the other provisions
    of sections 1309.301 to 1309.342 of the Revised Code determine the priority of
    a security interest in an accession.

    (D) A security interest in an accession is subordinate to a security interest
    in the whole that is perfected by compliance with the requirements of a certificate
    of title statute under division (B) of section 1309.311 of the Revised Code.

    (E) After default, subject to sections 1309.601 to 1309.628 of the Revised Code,
    a secured party may remove an accession from other goods if the security interest
    in the accession has priority over the claims of every person having an interest
    in the whole.

    (F) A secured party that removes an accession from other goods under division
    (E) of this section shall promptly reimburse any holder of a security interest
    or other lien on, or owner of, the whole or of the other goods, other than the
    debtor, for the cost of repair of any physical injury to the whole or the other
    goods. The secured party need not reimburse the holder or owner for any diminution
    in value of the whole or the other goods caused by the absence of the accession
    removed or by any necessity for replacing it. A person entitled to reimbursement
    may refuse permission to remove until the secured party gives adequate assurance
    for the performance of the obligation to reimburse.'
