- number: '1321.666'
  heading: Authority of superintendent to enforce Consumer Installment Loan Act
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: The superintendent of financial institutions may suspend, revoke, or refuse
    to renew any license issued by the superintendent under sections 1321.62 to 1321.702
