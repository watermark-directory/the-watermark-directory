- number: '1313.57'
  heading: Knowledge of fraudulent intent material - mortgage in good faith
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Section 1313.56 of the Revised Code does not apply unless the person to whom
    such sale, conveyance, transfer, mortgage, or assignment is made, knew of such
    fraudulent intent on the part of such debtor. Said section does not vitiate or
    affect any mortgage made in good faith to secure any debt or liability created
    simultaneously with such mortgage, if such mortgage is filed for record in the
    county wherein the property is situated, or as otherwise provided by law, within
    three days after its execution, and when, upon foreclosure or taking possession
    of such property, the mortgagee fully accounts for the proceeds thereof.
