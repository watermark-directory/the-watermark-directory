- number: '1327.47'
  heading: Customary system of weights and measures - metric system
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: The system of weights and measures in customary use in the United States and
    the metric system of weights and measures are jointly recognized, and one or the
    other of these systems shall be used for all commercial purposes in this state.
    The definitions of basic units of weight and measure, the tables of weight and
    measure, and weights and measures equivalents, as published by the national institute
    of standards and technology, are recognized and shall govern weighing and measuring
    equipment and transactions in this state.
