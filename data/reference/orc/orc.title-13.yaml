    num: '1303'
    name: Commercial Paper
  text: '(A) If an unaccepted draft is presented to the drawee for payment or acceptance
    and the drawee pays or accepts the draft, the person obtaining payment or acceptance,
    at the time of presentment, and a previous transferor of the draft, at the time
    of transfer, warrant to the drawee making payment or accepting the draft in good
    faith all of the following:

    (1) That the warrantor is, or was, at the time the warrantor transferred the draft,
    a person entitled to enforce the draft or authorized to obtain payment or acceptance
    of the draft on behalf of a person entitled to enforce the draft;

    (2) That the draft has not been altered;

    (3) That the warrantor has no knowledge that the signature of the drawer of the
    draft is unauthorized ;

    (4) With respect to a remotely created consumer item, that the person on whose
    account the item is drawn authorized the issuance of the item in the amount for
    which the item is drawn.

    (B) A drawee making payment may recover from any warrantor damages for breach
    of warranty equal to the amount paid by the drawee less the amount the drawee
    received or is entitled to receive from the drawer because of the payment. In
    addition, the drawee is entitled to compensation for expenses and loss of interest
    resulting from the breach. The right of the drawee to recover damages under this
    division is not affected by any failure of the drawee to exercise ordinary care
    in making payment. If the drawee accepts the draft, breach of warranty is a defense
    to the obligation of the acceptor. If the acceptor makes payment with respect
    to the draft, the acceptor is entitled to recover from any warrantor for breach
    of warranty the amounts stated in this division.

    (C) If a drawee asserts a claim for breach of warranty under division (A) of this
    section based upon an unauthorized indorsement of the draft or an alteration of
    the draft, the warrantor may defend against the claim by proving that the indorsement
    is effective under section 1303.44 or 1303.47 of the Revised Code or that the
    drawer is precluded under section 1303.49 or 1304.35 of the Revised Code from
    asserting against the drawee the unauthorized indorsement or alteration.

    (D) If a dishonored draft is presented for payment to the drawer or an indorser
    or any other instrument is presented for payment to a party obliged to pay the
    instrument and if payment is received, both of the following rules apply:

    (1) The person obtaining payment and a prior transferor of the instrument warrant
    to the person making payment in good faith that the warrantor is, or, at the time
    the warrantor transferred the instrument, was, a person entitled to enforce the
    instrument or authorized to obtain payment on behalf of a person entitled to enforce
    the instrument.

    (2) The person making payment may recover from any warrantor for breach of warranty
    an amount equal to the amount paid plus expenses and loss of interest resulting
    from the breach.

    (E) The warranties set forth in divisions (A) and (D) of this section cannot be
    disclaimed with respect to checks. Unless notice of a claim for breach of warranty
    is given to the warrantor within thirty days after the claimant has reason to
    know of the breach and of the identity of the warrantor, the liability of the
    warrantor under division (B) or (D) of this section is discharged to the extent
    of any loss caused by the delay in giving notice of the claim.

    (F) A cause of action for breach of warranty under this section accrues when the
    claimant has reason to know of the breach.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.57
- number: '1303.58'
  heading: Payment or acceptance by mistake - UCC 3-418
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Except as provided in division (C) of this section, if the drawee of
    a draft pays or accepts the draft and the drawee acted on the mistaken belief
    that payment of the draft had not been stopped pursuant to section 1304.32 of
    the Revised Code, or that the signature of the drawer of the draft was authorized,
    the drawee may recover the amount of the draft from the person to whom or for
    whose benefit payment was made or, in the case of acceptance, may revoke the acceptance.
    The rights of the drawee under this division are not affected by a failure of
    the drawee to exercise ordinary care in paying or accepting the draft.

    (B) Except as provided in division (C) of this section, if an instrument has been
    paid or accepted by mistake and the case is not covered by division (A) of this
    section, the person paying or accepting, to the extent permitted by the law governing
    mistake and restitution, may recover the payment from the person to whom or for
    whose benefit payment was made or, in the case of acceptance, may revoke the acceptance.

    (C) The remedies provided by division (A) or (B) of this section may not be asserted
    against a person who took the instrument in good faith and for value or who in
    good faith changed position in reliance on the payment or acceptance. This division
    does not limit remedies provided by section 1303.57 or 1304.36 of the Revised
    Code.

    (D) Notwithstanding section 1304.25 of the Revised Code, if an instrument is paid
    or accepted by mistake and the payor or acceptor recovers payment or revokes acceptance
    under divisions (A) or (B) of this section, the instrument is deemed not to have
    been paid or accepted and is treated as dishonored, and the person from whom payment
    is recovered has rights as a person entitled to enforce the dishonored instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.58
- number: '1303.59'
  heading: Instruments signed for accommodation - UCC 3-419
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) If an instrument is issued for value given for the benefit of a party
    to the instrument and another party to the instrument signs the instrument for
    the purpose of incurring liability on the instrument without being a direct beneficiary
    of the value given for the instrument, the instrument is signed by the accommodation
    party "for accommodation."

    (B) An accommodation party may sign the instrument as maker, drawer, acceptor,
    or indorser and, subject to division (D) of this section, is obliged to pay the
    instrument in the capacity in which the accommodation party signs. The obligation
    of an accommodation party may be enforced notwithstanding any statute of frauds
    and whether or not the accommodation party receives consideration for the accommodation.

    (C) A person signing an instrument is presumed to be an accommodation party, and
    there is notice that the instrument is signed for accommodation if the signature
    is an anomalous indorsement or is accompanied by words indicating that the signer
    is acting as surety or guarantor with respect to the obligation of another party
    to the instrument. Except as provided in section 1303.70 of the Revised Code,
    the obligation of an accommodation party to pay the instrument is not affected
    by the fact that the person enforcing the obligation had notice when the instrument
    was taken by that person that the accommodation party signed the instrument for
    accommodation.

    (D) If the signature of a party to an instrument is accompanied by words indicating
    unambiguously that the party is guaranteeing collection rather than payment of
    the obligation of another party to the instrument, the signer is obliged to pay
    the amount due on the instrument to a person entitled to enforce the instrument
    only if one of the following applies:

    (1) Execution of judgment against the other party has been returned unsatisfied.

    (2) The other party is insolvent or in an insolvency proceeding.

    (3) The other party cannot be served with process.

    (4) It is otherwise apparent that payment cannot be obtained from the other party.

    (E) If the signature of a party to an instrument is accompanied by words indicating
    that the party guarantees payment or the signer signs the instrument as an accommodation
    party in some other manner that does not unambiguously indicate an intention to
    guarantee collection rather than payment, the signer is obliged to pay the amount
    due on the instrument to a person entitled to enforce the instrument in the same
    circumstances as the accommodated party would be obliged, without prior resort
    to the accommodated party by the person entitled to enforce the instrument.

    (F) An accommodation party who pays the instrument is entitled to reimbursement
    from the accommodated party and is entitled to enforce the instrument against
    the accommodated party. In proper circumstances, an accommodation party may obtain
    relief that requires the accommodated party to perform its obligations on the
    instrument. An accommodated party who pays the instrument has no right of recourse
    against, and is not entitled to contribution from, an accommodation party.

    (G) As used in this chapter :

    (1) "Accommodated party" means the party to an instrument for the benefit of which
    the instrument is issued for value.

    (2) "Accommodation party" means a party to an instrument other than the accommodated
    party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.59
- number: '1303.60'
  heading: Conversion of instrument - UCC 3-420
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) The law applicable to conversion of personal property applies to instruments.
    An instrument also is converted if it is taken by transfer, other than a negotiation,
    from a person not entitled to enforce the instrument or if a bank makes or obtains
    payment with respect to the instrument for a person not entitled to enforce the
    instrument or receive payment. An action for conversion of an instrument may not
    be brought by the issuer or acceptor of the instrument or a payee or indorsee
    who did not receive delivery of the instrument either directly or through delivery
    to an agent or a co-payee.

    (B) In an action under division (A) of this section, the measure of liability
    is presumed to be the amount payable on the instrument, but recovery may not exceed
    the amount of the plaintiff''s interest in the instrument.

    (C) A representative, other than a depositary bank, who has in good faith dealt
    with an instrument or its proceeds on behalf of one who was not the person entitled
    to enforce the instrument is not liable in conversion to that person beyond the
    amount of any proceeds that it has not paid out.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.60
- number: '1303.61'
  heading: Presentment - UCC 3-501
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) "Presentment" means a demand made by or on behalf of a person entitled
    to enforce an instrument to pay the instrument made to the drawee or a party obliged
    to pay the instrument or, in the case of a note or accepted draft payable at a
    bank, to the bank or to accept a draft made to the drawee.

    (B) The following rules are subject to sections 1304.01 to 1304.40 of the Revised
    Code, agreement of the parties, clearing-house rules, and similar laws and rules:

    (1) Presentment may be made at the place of payment of the instrument and must
    be made at the place of payment if the instrument is payable at a bank in the
    United States; may be made by any commercially reasonable means, including an
    oral, written, or electronic communication; is effective when the demand for payment
    or acceptance is received by the person to whom presentment is made; and is effective
    if made to any one of two or more makers, acceptors, drawees, or other payors.

    (2) Upon demand of the person to whom presentment is made, the person making presentment
    must do all of the following:

    (a) Exhibit the instrument;

    (b) Give reasonable identification and, if presentment is made on behalf of another
    person, reasonable evidence of authority to do so;

    (c) Sign a receipt on the instrument for any payment made or surrender the instrument
    if full payment is made.

    (3) Without dishonoring the instrument, the party to whom presentment is made
    may return the instrument for lack of a necessary indorsement, or refuse payment
    or acceptance for failure of the presentment to comply with the terms of the instrument,
    an agreement of the parties, or other applicable law or rule.

    (4) The party to whom presentment is made may treat presentment as occurring on
    the next business day after the day of presentment if the party to whom presentment
    is made has established a cut-off hour not earlier than two p.m. for the receipt
    and processing of instruments presented for payment or acceptance and presentment
    is made after the established cut-off hour.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.61
- number: '1303.62'
  heading: Dishonor - UCC 3-502
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Dishonor of a note is governed by the following rules:

    (1) If the note is payable on demand, the note is dishonored if presentment is
    duly made to the maker and the note is not paid on the day of presentment.

    (2) If the note is not payable on demand and is payable at or through a bank or
    the terms of the note require presentment, the note is dishonored if presentment
    is duly made and the note is not paid on the day it becomes payable or the day
    of presentment, whichever is later.

    (3) If the note is not payable on demand and division (A)(2) of this section does
    not apply, the note is dishonored if it is not paid on the day it becomes payable.

    (B) Dishonor of an unaccepted draft other than a documentary draft is governed
    by the following rules:

    (1) If a check is duly presented for payment to the payor bank otherwise than
    for immediate payment over the counter, the check is dishonored if the payor bank
    makes timely return of the check or sends timely notice of dishonor or nonpayment
    under section 1304.27 or 1304.28 of the Revised Code or becomes accountable for
    the amount of the check under section 1304.28 of the Revised Code.

    (2) If a draft is payable on demand and division (B)(1) of this section does not
    apply, the draft is dishonored if presentment for payment is duly made to the
    drawee and the draft is not paid on the day of presentment.

    (3) If a draft is payable on a date stated in the draft, the draft is dishonored
    if presentment for payment is duly made to the drawee and payment is not made
    on the day the draft becomes payable or the day of presentment, whichever is later,
    or presentment for acceptance is duly made before the day the draft becomes payable
    and the draft is not accepted on the day of presentment.

    (4) If a draft is payable on elapse of a period of time after sight or acceptance,
    the draft is dishonored if presentment for acceptance is duly made and the draft
    is not accepted on the day of presentment.

    (C) Dishonor of an unaccepted documentary draft occurs according to the rules
    stated in divisions (B)(2), (3), and (4) of this section, except that payment
    or acceptance may be delayed without dishonor until no later than the close of
    the third business day of the drawee following the day on which payment or acceptance
    is required by those paragraphs.

    (D) Dishonor of an accepted draft is governed by the following rules:

    (1) If the draft is payable on demand, the draft is dishonored if presentment
    for payment is duly made to the acceptor and the draft is not paid on the day
    of presentment.

    (2) If the draft is not payable on demand, the draft is dishonored if presentment
    for payment is duly made to the acceptor and payment is not made on the day it
    becomes payable or the day of presentment, whichever is later.

    (E) In any case in which presentment is otherwise required for dishonor under
    this section and presentment is excused under section 1303.64 of the Revised Code,
    dishonor occurs without presentment if the instrument is not duly accepted or
    paid.

    (F) If a draft is dishonored because timely acceptance of the draft was not made
    and the person entitled to demand acceptance consents to a late acceptance, from
    the time of acceptance the draft is treated as never having been dishonored.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.62
- number: '1303.63'
  heading: Notice of dishonor - UCC 3-503
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) The obligation of an indorser set forth in division (A) of section 1303.55
    of the Revised Code and the obligation of a drawer set forth in division (D) of
    section 1303.54 of the Revised Code may not be enforced unless one of the following
    applies:

    (1) The indorser or drawer is given notice of dishonor of the instrument complying
    with this section;

    (2) Notice of dishonor is excused under division (B) of section 1303.64 of the
    Revised Code.

    (B) Notice of dishonor may be given by any person; may be given by any commercially
    reasonable means, including an oral, written, or electronic communication; and
    is sufficient if it reasonably identifies the instrument and indicates that the
    instrument has been dishonored or has not been paid or accepted. The return of
    an instrument given to a bank for collection is sufficient notice of dishonor.

    (C) Subject to division (C) of section 1303.54 of the Revised Code, with respect
    to an instrument taken for collection by a collecting bank, notice of dishonor
    must be given in one of the following ways:

    (1) By the bank before midnight of the next banking day following the banking
    day on which the bank receives notice of dishonor of the instrument;

    (2) By any other person no later than thirty days after the day on which the person
    receives notice of dishonor. With respect to any other instrument, notice of dishonor
    must be given no later than thirty days after the day on which dishonor occurs.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.63
- number: '1303.64'
  heading: Excused presentment and notice of dishonor - UCC 3-504
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Presentment for payment or acceptance of an instrument is excused under
    any of the following circumstances:

    (1) The person entitled to present the instrument cannot with reasonable diligence
    make presentment.

    (2) The maker or acceptor has repudiated an obligation to pay the instrument,
    has died, or is in insolvency proceedings.

    (3) By the terms of the instrument presentment is not necessary to enforce the
    obligation of indorsers or the drawer.

    (4) The drawer or indorser whose obligation is being enforced has waived presentment
    or otherwise has no reason to expect or right to require that the instrument be
    paid or accepted.

    (5) The drawer instructed the drawee not to pay or accept the draft or the drawee
    was not obligated to the drawer to pay the draft.

    (B) Notice of dishonor is excused if by the terms of the instrument notice of
    dishonor is not necessary to enforce the obligation of a party to pay the instrument
    or if the party whose obligation is being enforced waived notice of dishonor.
    A waiver of presentment is also a waiver of notice of dishonor.

    (C) Delay in giving notice of dishonor is excused if the delay was caused by circumstances
    beyond the control of the person giving the notice and the person giving the notice
    exercised reasonable diligence after the cause of the delay ceased to operate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.64
- number: '1303.65'
  heading: Evidence of dishonor - UCC 3-505
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) The following are admissible as evidence and create a presumption of
    dishonor and of any notice of dishonor stated:

    (1) A document regular in form as provided in division (B) of this section that
    purports to be a protest;

    (2) A purported stamp or writing of the drawee, payor bank, or presenting bank
    on or accompanying the instrument stating that acceptance or payment has been
    refused unless reasons for the refusal are stated and the reasons are not consistent
    with dishonor;

    (3) A book or record of the drawee, payor bank, or collecting bank, kept in the
    usual course of business that shows dishonor, even if there is no evidence of
    who made the entry.

    (B) A "protest" is a certificate of dishonor made by a United States consul or
    vice consul or by a notary public or other person authorized to administer oaths
    by the law of the place where dishonor occurs. A protest may be made upon information
    satisfactory to that person. The protest must identify the instrument and certify
    either that presentment has been made or, if not made, the reason why it was not
    made and that the instrument has been dishonored by nonacceptance or nonpayment.
    The protest may also certify that notice of dishonor has been given to some or
    all parties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.65
- number: '1303.66'
  heading: Discharge and effect of discharge - UCC 3-601
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) The obligation of a party to pay the instrument is discharged as stated
    in this chapter or by an act or agreement with the party that would discharge
    an obligation to pay money under a simple contract.

    (B) The discharge of the obligation of a party is not effective against a person
    acquiring rights of a holder in due course of the instrument without notice of
    the discharge.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.66
- number: '1303.67'
  heading: Payment - UCC 3-602
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Subject to division (E) of this section, an instrument is paid to the
    extent payment is made by or on behalf of a party obliged to pay the instrument
    and to a person entitled to enforce the instrument.

    (B)(1) Subject to division (E) of this section, a note is paid to the extent payment
    is made by or on behalf of a party obliged to pay the note to a person that formerly
    was entitled to enforce the note only if at the time of the payment the party
    obliged to pay has not received adequate notification that the note has been transferred
    and that payment is to be made to the transferee. A notification is adequate only
    if all of the following apply:

    (a) It is signed by the transferor or the transferee.

    (b) It reasonably identifies the transferred note.

    (c) It provides an address at which payments subsequently are to be made.

    (2) Upon request, a transferee shall seasonably furnish reasonable proof that
    the note has been transferred. Unless the transferee complies with the request,
    a payment to the person that formerly was entitled to enforce the note is effective
    for purposes of division (C) of this section even if the party obliged to pay
    the note has received a notification under division (B)(1) of this section.

    (C) Subject to division (E) of this section, to the extent of a payment under
    divisions (A) and (B) of this section, the obligation of the party obliged to
    pay the instrument is discharged even though payment is made with knowledge of
    a claim to the instrument under section 1303.36 of the Revised Code by another
    person.

    (D) Subject to division (E) of this section, a transferee, or any party that has
    acquired rights in the instrument directly or indirectly from a transferee, including
    any such party that has rights as a holder in due course, is deemed to have notice
    of any payment that is made under division (B) of this section after the date
    that the note is transferred to the transferee but before the party obliged to
    pay the note received adequate notification of the transfer.

    (E) The obligation of a party to pay the instrument is not discharged under division
    (A), (B), (C), or (D) of this section under either of the following circumstances:

    (1) A claim to the instrument under section 1303.36 of the Revised Code is enforceable
    against the party receiving payment and either of the following applies:

    (a) Payment is made with knowledge by the payor that payment is prohibited by
    injunction or similar process of a court of competent jurisdiction.

    (b) In the case of an instrument other than a cashier''s check, teller''s check,
    or certified check, the party making payment accepted, from the person having
    a claim to the instrument, indemnity against loss resulting from refusal to pay
    the person entitled to enforce the instrument.

    (2) The person making payment knows that the instrument is a stolen instrument
    and pays a person it knows is in wrongful possession of the instrument.

    (F) As used in this section, "signed," with respect to a record that is not a
    writing, includes the attachment to or logical association with the record of
    an electronic symbol, sound, or process with the present intent to adopt or accept
    the record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.67
- number: '1303.68'
  heading: Tender of payment - UCC 3-603
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) If tender of payment of an obligation to pay an instrument is made to
    a person entitled to enforce the instrument, the effect of tender is governed
    by principles of law applicable to tender of payment under a simple contract.

    (B) If tender of payment of an obligation to pay an instrument is made to a person
    entitled to enforce the instrument and the tender is refused, there is discharge,
    to the extent of the amount of the tender, of the obligation of an indorser or
    accommodation party having a right of recourse with respect to the obligation
    to which the tender relates.

    (C) If tender of payment of an amount due on an instrument is made to a person
    entitled to enforce the instrument, the obligation of the obligor to pay interest
    after the due date on the amount tendered is discharged. If presentment is required
    with respect to an instrument and the obligor is able and ready to pay on the
    due date at every place of payment stated in the instrument, the obligor is deemed
    to have made tender of payment on the due date to the person entitled to enforce
    the instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.68
- number: '1303.69'
  heading: Discharge by cancellation or renunciation - UCC 3-604
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A person entitled to enforce an instrument, with or without consideration,
    may discharge the obligation of a party to pay the instrument in either of the
    following ways:

    (1) By surrender of the instrument to the party, destruction, mutilation, or cancellation
    of the instrument, cancellation or striking out of the party''s signature, the
    addition of words to the instrument indicating discharge, or any other intentional
    voluntary act;

    (2) By agreeing not to sue or otherwise renouncing rights against the party by
    a signed record.

    (B) Cancellation or striking out of an indorsement pursuant to division (A) does
    not affect the status and rights of a party derived from the indorsement.

    (C) As used in this section, "signed," with respect to a record that is not a
    writing, includes the attachment to or logical association with the record of
    an electronic symbol, sound, or process with the present intent to adopt or accept
    the record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.69
- number: '1303.70'
  heading: Discharge of secondary obligors - UCC 3-605
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) If a person entitled to enforce an instrument releases the obligation
    of a principal obligor in whole or in part, and another party to the instrument
    is a secondary obligor with respect to the obligation of that principal obligor,
    the following rules apply:

    (1) Any obligations of the principal obligor to the secondary obligor with respect
    to any previous payment by the secondary obligor are not affected. Unless the
    terms of the release preserve the secondary obligor''s recourse, the principal
    obligor is discharged, to the extent of the release, from any other duties to
    the secondary obligor under this chapter.

    (2) Unless the terms of the release provide that the person entitled to enforce
    the instrument retains the right to enforce the instrument against the secondary
    obligor, the secondary obligor is discharged to the same extent as the principal
    obligor from any unperformed portion of its obligation on the instrument. If the
    instrument is a check and the obligation of the secondary obligor is based on
    an indorsement of the check, the secondary obligor is discharged without regard
    to the language or circumstances of the discharge or other release.

    (3) If the secondary obligor is not discharged under division (A)(2) of this section,
    the secondary obligor is discharged to the extent of the value of the consideration
    for the release, and to the extent that the release would otherwise cause the
    secondary obligor a loss.

    (B) If a person entitled to enforce an instrument grants a principal obligor an
    extension of the time at which one or more payments are due on the instrument
    and another party to the instrument is a secondary obligor with respect to the
    obligation of that principal obligor, the following rules apply:

    (1) Any obligations of the principal obligor to the secondary obligor with respect
    to any previous payment by the secondary obligor are not affected. Unless the
    terms of the extension preserve the secondary obligor''s recourse, the extension
    correspondingly extends the time for performance of any other duties owed to the
    secondary obligor by the principal obligor under this chapter.

    (2) The secondary obligor is discharged to the extent that the extension would
    otherwise cause the secondary obligor a loss.

    (3) To the extent that the secondary obligor is not discharged under division
    (B)(2) of this section, the secondary obligor may perform its obligations to a
    person entitled to enforce the instrument as if the time for payment had not been
    extended or, unless the terms of the extension provide that the person entitled
    to enforce the instrument retains the right to enforce the instrument against
    the secondary obligor as if the time for payment had not been extended, treat
    the time for performance of its obligations as having been extended correspondingly.

    (C) If a person entitled to enforce an instrument agrees, with or without consideration,
    to a modification of the obligation of a principal obligor other than a complete
    or partial release or an extension of the due date and another party to the instrument
    is a secondary obligor with respect to the obligation of that principal obligor,
    the following rules apply:

    (1) Any obligations of the principal obligor to the secondary obligor with respect
    to any previous payment by the secondary obligor are not affected. The modification
    correspondingly modifies any other duties owed to the secondary obligor by the
    principal obligor under this chapter.

    (2) The secondary obligor is discharged from any unperformed portion of its obligation
    to the extent that the modification would otherwise cause the secondary obligor
    a loss.

    (3) To the extent that the secondary obligor is not discharged under division
    (C)(2) of this section, the secondary obligor may satisfy its obligation on the
    instrument as if the modification had not occurred, or treat its obligation on
    the instrument as having been modified correspondingly.

    (D) If the obligation of a principal obligor is secured by an interest in collateral,
    another party to the instrument is a secondary obligor with respect to that obligation,
    and a person entitled to enforce the instrument impairs the value of the interest
    in collateral, the obligation of the secondary obligor is discharged to the extent
    of the impairment. The value of an interest in collateral is impaired to the extent
    the value of the interest is reduced to an amount less than the amount of the
    recourse of the secondary obligor, or the reduction in value of the interest causes
    an increase in the amount by which the amount of the recourse exceeds the value
    of the interest. For purposes of this division, impairing the value of an interest
    in collateral includes any of the following:

    (1) The failure to obtain or maintain perfection or recordation of the interest
    in collateral;

    (2) The release of collateral without substitution of collateral of equal value
    or equivalent reduction of the underlying obligation;

    (3) The failure to perform a duty to preserve the value of collateral owed, under
    Chapter 1309. of the Revised Code or other law, to a debtor or other person secondarily
    liable;

    (4) The failure to comply with applicable law in disposing of or otherwise enforcing
    the interest in collateral.

    (E) A secondary obligor is not discharged under division (A)(3), (B), (C), or
    (D) of this section unless the person entitled to enforce the instrument knows
    that the person is a secondary obligor or has notice under division (C) of section
    1303.59 of the Revised Code that the instrument was signed for accommodation.

    (F) A secondary obligor is not discharged under this section if the secondary
    obligor consents to the event or conduct that is the basis of the discharge, or
    the instrument or a separate agreement of the party provides for a waiver of discharge
    under this section specifically or by general language indicating that parties
    waive defenses based on suretyship or impairment of collateral. Unless the circumstances
    indicate otherwise, consent by the principal obligor to an act that would lead
    to a discharge under this section constitutes consent to that act by the secondary
    obligor if the secondary obligor controls the principal obligor or deals with
    the person entitled to enforce the instrument on behalf of the principal obligor.

    (G) A release or extension preserves a secondary obligor''s recourse if the terms
    of the release or extension provide both of the following:

    (1) The person entitled to enforce the instrument retains the right to enforce
    the instrument against the secondary obligor.

    (2) The recourse of the secondary obligor continues as if the release or extension
    had not been granted.

    (H) Except as otherwise provided in division (I) of this section, a secondary
    obligor asserting a discharge under this section has the burden of persuasion
    both with respect to the occurrence of the acts alleged to harm the secondary
    obligor and loss or prejudice caused by those acts.

    (I) If the secondary obligor demonstrates prejudice caused by an impairment of
    its recourse, and the circumstances of the case indicate that the amount of loss
    is not reasonably susceptible of calculation or requires proof of facts that are
    not ascertainable, it is presumed that the act impairing recourse caused a loss
    or impairment equal to the liability of the secondary obligor on the instrument.
    In that event, the burden of persuasion as to any lesser amount of the loss is
    on the person entitled to enforce the instrument.'
