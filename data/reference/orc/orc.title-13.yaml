  url: https://codes.ohio.gov/ohio-revised-code/section-1334.06
- number: '1334.07'
  heading: Attorney general investigations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: 'If by his own inquiries, or as a result of complaints, the attorney general
    has reasonable cause to believe that a seller or broker has engaged, is engaging,
    or is threatening to engage in an act or practice that violates sections 1334.01
    to 1334.15 of the Revised Code, he may investigate. For this purpose the attorney
    general may administer oaths, subpoena witnesses, adduce evidence, and require
    the production of relevant matter. If matter that the attorney general requires
    to be produced is located outside the state, he may designate representatives,
    including officials of the state in which the matter is located, to inspect the
    matter on his behalf, and he may respond to similar requests from officials of
    other states. The person subpoenaed may make the matter available to the attorney
    general at a convenient location within the state or pay the reasonable and necessary
    expenses for the attorney general or his representative to examine the matter
    at the place where it is located. However, expenses shall not be charged to a
    party not subsequently found to have engaged in an act or practice that violates
    sections 1334.01 to 1334.15 of the Revised Code.

    (B) Within twenty days after a subpoena has been served, a motion to extend the
    return day, or to modify or quash the subpoena, stating good cause, may be filed
    in the court of common pleas of Franklin county or the court of common pleas of
    the county in this state in which the person served resides or has his principal
    place of business.

    (C) A person subpoenaed under this section shall comply with the terms of the
    subpoena, unless the parties agree to modify the terms of the subpoena or unless
    the court has modified or quashed the subpoena, extended the return day of the
    subpoena, or issued any other order with respect to the subpoena prior to its
    return day.

    If a person fails without lawful excuse to obey a subpoena or to produce relevant
    matter, the attorney general may apply to the court of common pleas of the county
    in which the person subpoenaed resides or has his principal place of business
    for an order compelling compliance.

    (D) The attorney general may request that an individual who refuses to testify
    or to produce relevant matter on the ground that the testimony or matter may incriminate
    him be ordered by the court to provide the testimony or matter. With the exception
    of a prosecution for perjury and an action for damages under sections 1334.01
    to 1334.15 of the Revised Code, an individual who complies with a court order
    to provide testimony or matter, after asserting a privilege against self-incrimination
    to which he is entitled by law, shall not be subjected to a criminal proceeding
    on the basis of the testimony or matter required to be disclosed or testimony
    or matter discovered through that testimony or matter.'
