- number: '1309.604'
  heading: Procedure if security agreement covers real property or fixtures - UCC
    9-604
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) If a security agreement covers both personal and real property, a secured
    party may proceed:

    (1) Under sections 1309.601 to 1309.628 of the Revised Code as to the personal
    property without prejudicing any rights with respect to the real property; or

    (2) As to both the personal property and the real property, in accordance with
    the rights with respect to the real property, in which case the other provisions
    of sections 1309.601 to 1309.628 of the Revised Code do not apply.

    (B) Subject to division (C) of this section, if a security agreement covers goods
    that are or become fixtures, a secured party may proceed:

    (1) Under sections 1309.601 to 1309.628 of the Revised Code; or

    (2) In accordance with the rights with respect to real property, in which case
    the other provisions of sections 1309.601 to 1309.628 of the Revised Code do not
    apply.

    (C) Subject to the other provisions of sections 1309.601 to 1309.628 of the Revised
    Code, if a secured party holding a security interest in fixtures has priority
    over all owners and encumbrancers of the real property, the secured party, after
    default, may remove the collateral from the real property.

    (D) A secured party who removes collateral shall reimburse promptly any encumbrancer
    or owner of the real property, other than the debtor, for the cost of repair of
    any physical injury caused by the removal. The secured party need not reimburse
    the encumbrancer or owner for any diminution in value of the real property caused
    by the absence of the goods removed or by any necessity of replacing them. A person
    entitled to reimbursement may refuse permission to remove until the secured party
    gives adequate assurance for the performance of the obligation to reimburse.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.604
- number: '1309.605'
  heading: Unknown debtor or secondary obligor - UCC 9-605
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'A secured party does not owe a duty based on its status as secured party:

    (A) To a person who is a debtor or obligor, unless the secured party knows:

    (1) That the person is a debtor or obligor;

    (2) The identity of the person; and

    (3) How to communicate with the person; or

    (B) To a secured party or lienholder who has filed a financing statement against
    a person, unless the secured party knows:

    (1) That the person is a debtor; and

    (2) The identity of the person.'
