- number: '1349.32'
  heading: Conforming Ohio law to federal law
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: 'The purpose of sections 1349.25 to 1349.36 of the Revised Code is to bring
    Ohio law into conformance with the "Home Ownership and Equity Protection Act of
    1994," 108 Stat. 2190, 15 U.S.C.A. 1601 note, as amended, and the regulations
    and interpretations adopted thereunder by the federal reserve board, in order
    to facilitate the uniform administration and enforcement of state and federal
    laws on the regulation of certain high cost mortgages.

    In furtherance of that purpose, the regulations and interpretations adopted by
    the federal reserve board to implement the "Home Ownership and Equity Protection
    Act of 1994," which regulations and interpretations are effective as of the effective
    date of this section, are hereby deemed applicable to sections 1349.25 to 1349.36
    of the Revised Code. Such regulations and interpretations include the amendment
    of sections 226.32 and 226.34 of Title 12 of the Code of Federal Regulations,
    which amendment was approved by the federal reserve board on December 12, 2001,
    and takes effect October 1, 2002.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.32
- number: '1349.33'
  heading: Rules adopting similar provisions where federal law is amended or modified
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) Notwithstanding any provision of sections 1349.25 to 1349.36 of the Revised
    Code, or any rule adopted thereunder, if the "Home Ownership and Equity Protection
    Act of 1994," 108 Stat. 2190, 15 U.S.C.A. 1601 note, as amended, or any regulation
    adopted thereunder by the federal reserve board, as amended, is amended or otherwise
    modified after the effective date of this section, the superintendent of financial
    institutions may by rule adopt similar provisions. If an amendment or other modification
    to the "Home Ownership and Equity Protection Act of 1994" requires the adoption
    of implementing regulations by the federal reserve board, the superintendent shall
    not adopt any rule under the authority of this section until those regulations
    are adopted.

    (B) The superintendent shall adopt the rules authorized by division (A) of this
    section in accordance with section 111.15 of the Revised Code. Chapter 119. of
    the Revised Code does not apply to rules adopted under the authority of this section.

    (C) A rule adopted by the superintendent under the authority of this section is
    effective on the later of the following dates:

    (1) The date the superintendent issues the rule;

    (2) The date the regulation, rule, interpretation, procedure, or guideline the
    superintendent''s rule is based on becomes effective.

    (D) The superintendent may, upon thirty days'' written notice, revoke any rule
    adopted under the authority of this section. A rule adopted under the authority
    of this section, and not revoked by the superintendent, lapses and has no further
    force and effect thirty months after its effective date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.33
- number: '1349.34'
  heading: Examination and investigation of records
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) As often as the superintendent of financial institutions considers it
    necessary, the superintendent may examine a person''s records regarding covered
    loans. The superintendent may recover from the person any costs incurred in connection
    with and reasonably related to the examination.

    (B) The superintendent may investigate alleged failures to comply with sections
    1349.25 to 1349.36 of the Revised Code, or any rule adopted thereunder, or complaints
    concerning any such failure to comply. In conducting any investigation under this
    section, the superintendent may compel, by subpoena, witnesses to testify in relation
    to any matter over which the superintendent has jurisdiction and may require the
    production of any book, record, or other document pertaining to that matter. If
    a person fails to file any statement or report, obey any subpoena, give testimony,
    produce any book, record, or other document as required by a subpoena, or permit
    photocopying of any book, record, or other document subpoenaed, the court of common
    pleas of any county in this state, upon application made to it by the superintendent,
    shall compel obedience by attachment proceedings for contempt, as in the case
    of disobedience of the requirements of a subpoena issued from the court or a refusal
    to testify therein.

    (C) Whenever it appears to the superintendent that a person has engaged in, is
    engaging in, or is about to engage in, any activity constituting a failure to
    comply with section 1349.26 or 1349.27 of the Revised Code, the superintendent
    may make application to the court of common pleas of any county in this state
    for an order enjoining any such activity. Upon a showing by the superintendent
    that a person has engaged in, is engaging in, or is about to engage in, any activity
    constituting a failure to comply with section 1349.26 or 1349.27 of the Revised
    Code, the court shall grant an injunction, restraining order, or other appropriate
    relief.

    (D) Whenever it appears to the superintendent that a person has engaged in, is
    engaging in, or is about to engage in, any activity that may constitute a failure
    to comply with section 1349.26 or 1349.27 of the Revised Code, the superintendent,
    after notice and a hearing conducted in accordance with Chapter 119. of the Revised
    Code, may issue a cease and desist order. Such an order shall be enforceable in
    any court of common pleas in this state.

    (E) If a person that fails to comply with section 1349.26 or 1349.27 of the Revised
    Code is licensed, registered, or charted by, or otherwise operates under the authority
    of, the superintendent, the superintendent may, in accordance with Chapter 119.
    of the Revised Code, suspend, revoke, or deny the renewal of such license, registration,
    charter, or other authority.

    (F) If a person fails to comply with section 1349.26 or 1349.27 of the Revised
    Code, the superintendent may, in accordance with Chapter 119. of the Revised Code,
    impose a fine of not more than two thousand five hundred dollars per compliance
    failure. If the person fails to comply two or more times, the superintendent may,
    in accordance with Chapter 119. of the Revised Code, impose a fine of not more
    than five thousand dollars per compliance failure. If the person injured by the
    failure to comply is sixty-five years of age or older, the superintendent may
    double the amount of the fine.

    An order to pay a fine pursuant to this division shall be enforceable in any court
    of common pleas in this state. All fines collected under this division shall be
    paid to the superintendent and shall be deposited by the superintendent into the
    state treasury to the credit of the consumer finance fund created under section
    1321.21 of the Revised Code.

    In determining the amount of a fine to be imposed under this division, the superintendent
    shall consider all of the following:

    (1) The seriousness of the conduct;

    (2) The person''s good faith efforts to prevent the conduct;

    (3) The person''s history regarding violations and compliance with the superintendent''s
    orders;

    (4) The person''s financial resources;

    (5) Any other matter the superintendent considers appropriate in enforcing sections
    1349.26 and 1349.27 of the Revised Code.

    The superintendent shall not impose a fine under this division if the superintendent
    has imposed or will impose a fine under another provision of the Revised Code
    for the same conduct.

    (G)(1) The superintendent may take any of the actions set forth in this section
    with respect to any person other than a federally chartered financial institution
    or its operating subsidiaries. Whenever it appears to the superintendent that
    a federally chartered financial institution or its operating subsidiary has engaged
    in, is engaging in, or is about to engage in, any activity that may constitute
    a failure to comply with section 1349.26 or 1349.27 of the Revised Code, the superintendent
    may present any evidence of such activity to the institution''s appropriate federal
    regulatory authority, along with any recommendations regarding the imposition
    of specific sanctions.

    (2) Any action taken by the superintendent under this section shall be commenced
    within three years after the alleged compliance failure.

    (H) The remedies available to the superintendent under this section are cumulative
    and concurrent, and the exercise of one remedy by the superintendent does not
    preclude or require the exercise of any other remedy.

    (I) The remedies available to the superintendent under this section or to the
    appropriate federal regulatory authority, the right of rescission described in
    section 1349.29 of the Revised Code, and the criminal penalty provided in section
    1349.31 of the Revised Code shall constitute the sole and exclusive remedies for
    any failure to comply with section 1349.26 or 1349.27 of the Revised Code.'
