- number: '1329.02'
  heading: Restrictions against filing
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: '(A) The secretary of state shall not file an application for the registration
    of any trade name if the application indicates or implies that the trade name
    is connected with a government agency of this state, another state, or the United
    States and the trade name is not so connected or if the application indicates
    or implies that the applicant is incorporated and the application is not incorporated.
    Additionally, the secretary of state shall not file an application for the registration
    of any trade name if it is not distinguishable upon the records in the office
    of the secretary of state from any other trade name previously registered under
    sections 1329.01 to 1329.03 of the Revised Code, any corporate name, whether nonprofit
    or for profit and whether that of a domestic corporation or of a foreign corporation
    authorized to do business in this state, the name of any limited liability company
    registered in the office of the secretary of state pursuant to Chapter 1705. or
    1706. of the Revised Code, whether domestic or foreign, the name of any limited
    liability partnership registered in the office of the secretary of state pursuant
    to Chapter 1775. or 1776. of the Revised Code, whether domestic or foreign, the
    name of any limited partnership registered in the office of the secretary of state
    pursuant to Chapter 1782. of the Revised Code, whether domestic or foreign, or
    any trademark, or service mark previously filed and recorded in the office of
    the secretary of state and not abandoned, unless the written consent of the corporation,
    limited liability company, limited liability partnership, or limited partnership,
    or the person to whom is registered the exclusive right to use the trade name
    is filed in accordance with division (C) of section 1701.05 of the Revised Code
    with the application or the written consent of the former registrant of the trademark
    or service mark is filed with the application. The application for the registration
    of a trade name and the consent form shall be on a form prescribed by the secretary
    of state.

    (B) The secretary of state shall determine for purposes of this section whether
    a name is distinguishable from another name in a manner consistent with the provisions
    of division (B) of section 1701.05 of the Revised Code.'
