- number: '1315.06'
  heading: Minimum amount of permissible investments
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A)(1)(a) Subject to division (A)(2) of this section, each licensee shall
    maintain permissible investments described in division (B) of this section having
    an aggregate market value of not less than the aggregate amount of all of the
    licensee''s outstandings received from persons in the United States, directly
    and through authorized delegates, to the extent reported to the licensee.

    (b) For purposes of division (A)(1)(a) of this section, a licensee''s permissible
    investments, even if commingled with other assets of the licensee, and a licensee''s
    other assets to the extent necessary to equal the licensee''s outstandings, are,
    by operation of law, impressed with a trust and held for the benefit of persons
    the money of which the licensee holds for transmission, and these permissible
    investments are not available to satisfy any other of the licensee''s creditors.

    (2) The superintendent of financial institutions may waive the requirement described
    in division (A)(1)(a) of this section if the volume of a licensee''s outstandings
    does not exceed the licensee''s security device provided pursuant to section 1315.07
    of the Revised Code.

    (B) All of the following are permissible investments by a licensee:

    (1) Cash;

    (2) Certificates of deposit or other debt obligations of a depository institution,
    either domestic or foreign;

    (3) Bills of exchange or time drafts drawn on and accepted by a commercial bank,
    otherwise known as bankers'' acceptances, that are eligible for purchase by member
    banks of the federal reserve system;

    (4) Any investment bearing a rating of one of the three highest grades as defined
    by a nationally recognized organization that rates securities;

    (5) Investment securities that are obligations of the United States or its agencies
    or instrumentalities; obligations that are guaranteed fully as to principal and
    interest by the United States; or any obligations of any state, municipality,
    or political subdivision of a state;

    (6) Shares in a money market mutual fund; interest-bearing bills, notes, bonds,
    debentures, or preferred stock traded on any national securities exchange or on
    a national over-the-counter market; or mutual funds primarily composed of such
    securities or a fund composed of one or more permissible investments described
    in division (B) of this section;

    (7) Any demand borrowing agreement or agreements made to a corporation or a subsidiary
    of a corporation the capital stock of which is listed on a national exchange,
    provided that the total borrowing agreements with any one borrower do not exceed
    ten per cent of the licensee''s outstandings;

    (8) To the extent permitted by the superintendent, receivables that are due to
    a licensee from its authorized delegates and are not past due or doubtful of collection;

    (9) Any other investments approved by the superintendent.

    (C) No licensee shall fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.06
- number: '1315.07'
  heading: Satisfactory security device maintained
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A)(1) In a form satisfactory to the superintendent of financial institutions,
    each licensee shall provide and maintain a security device of one or more of the
    types described in division (B) of this section of not less than three hundred
    thousand dollars or such greater amount as the superintendent finds appropriate
    but, except pursuant to a supervisory action, not exceeding two million dollars.

    (2) By control agreement or terms of the bond, the security device described in
    division (A)(1) of this section shall run to the superintendent for the benefit
    of any claimants against the licensee, to secure the faithful performance of the
    obligations of the licensee with respect to its receipt of money from persons
    in this state for transmission. In the case of a bond, the superintendent may
    bring suit on behalf of claimants, either in one action or in successive actions,
    or may authorize claimants to bring their own actions on the bond.

    (B) The security device required by division (A) of this section shall be one
    or more of the following:

    (1) A pledge, with a holder acceptable to the superintendent and subject to a
    control agreement with the superintendent, of any of the following:

    (a) Cash;

    (b) Interest-bearing stocks, bonds, notes, debentures, or other obligations of
    the United States or any agency or instrumentality of the United States, or guaranteed
    by the United States;

    (c) Interest bearing stocks, bonds, notes, debentures, or other obligations of
    this state, or of a city, county, town, village, school district, or instrumentality
    of this state, or guaranteed by this state.

    (2) A surety bond;

    (3) Any other security device approved by the superintendent.

    (C)(1)(a) In the case of a security device provided in the form of a pledge of
    securities, the securities pledged shall be valued at the lower of principal amount
    or market value.

    (b) The licensee is entitled to receive all interest and dividends on cash or
    securities pledged and, with the approval of the superintendent, may substitute
    pledged securities, which substitution also may be ordered by the superintendent
    pursuant to a written order.

    (2) In the case of a security device provided in the form of a surety bond, both
    of the following apply:

    (a) The surety bond shall remain in effect until canceled, which may occur only
    after thirty days'' written notice to the superintendent.

    (b) Cancellation of a surety bond does not affect any liability incurred or accrued
    during the bond''s effective period.

    (D) A licensee shall maintain the security device required by division (A) of
    this section after the licensee ceases money transmission operations in this state,
    until the licensee''s outstandings in this state all have been satisfied or properly
    reported to the division of unclaimed funds. However, the superintendent may permit
    the security device to be reduced to the extent that the amount of the licensee''s
    outstandings in this state are reduced.

    (E) No licensee shall fail to comply with this section.'
