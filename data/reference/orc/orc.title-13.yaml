- number: '1329.43'
  heading: Acceptance of document for filing - certified copy as evidence
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'Upon compliance with the requirements of sections 1329.41 to 1329.53 of the
    Revised Code, the secretary of state shall accept a document for filing and make
    a copy of the document by microfilm or by any authorized photostatic or digitized
    process. Evidence of the filing shall be returned to the person filing the document.

    A certified copy of any document filed under this section shall be admissible
    in evidence in any action or judicial proceedings in any court of this state as
    competent and sufficient proof of the filing pursuant to sections 1329.41 to 1329.53
    of the Revised Code, and shall be prima facie evidence of the ownership by the
    person filing hereunder of all articles and supplies upon which such name, mark,
    or device is produced.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.43
- number: '1329.45'
  heading: Certificate of filing and benefits to be assignable
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: The certificate of the filing of any name, mark, or device under sections
    1329.41 to 1329.53 of the Revised Code and the benefits obtained under it shall
    be assignable with the sale of the articles or supplies on which the same are
    produced and used. Assignments shall be by instruments in writing duly executed
    and may be recorded upon the payment of the fee specified in division (U)(2) of
    section 111.16 of the Revised Code, payable to the secretary of state, who, after
    recording the assignment, upon request of the assignee, may issue in the assignee's
    name a new certificate. The instrument shall be on a form prescribed by the secretary
    of state.
