- number: '1309.702'
  heading: Savings clause - UCC 9-702
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in this chapter, this chapter applies to
    a transaction or lien within the scope of this chapter even if the transaction
    or lien was entered into or created before July 1, 2001.

    (B) Except as otherwise provided in division (C) of this section and sections
    1309.703 to 1309.709 of the Revised Code:

    (1) Transactions or liens that were not governed by this chapter as it existed
    before July 1, 2001, were validly entered into or created prior to that date,
    and would be subject to this chapter if they had been entered into or created
    on or after that date, and the rights, duties, and interests related to those
    transactions or liens, remain valid on and after July 1, 2001; and

    (2) The transactions and liens may be terminated, completed, consummated, or enforced
    as required or permitted by the law in effect immediately prior to July 1, 2001,
    or the law in effect on and after that date.

    (C) This chapter does not affect an action, case, or proceeding commenced prior
    to July 1, 2001.'
