- number: '1309.703'
  heading: Security interest perfected before effective date - UCC 9-703
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest that is enforceable immediately before July 1, 2001,
    and that would have priority over the rights of a person who becomes a lien creditor
    at that time is a perfected security interest under this chapter if, on July 1,
    2001, the applicable requirements for enforceability and perfection under this
    chapter are satisfied without further action.

    (B) Except as otherwise provided in section 1309.705 of the Revised Code, if,
    immediately before July 1, 2001, a security interest is enforceable and would
    have priority over the rights of a person who becomes a lien creditor at that
    time, but the applicable requirements for enforceability or perfection under this
    chapter are not satisfied on July 1, 2001, the security interest:

    (1) Is a perfected security interest until July 1, 2002;

    (2) Remains enforceable after the date specified in division (B)(1) of this section
    only if the security interest becomes enforceable under section 1309.203 of the
    Revised Code on or before July 1, 2002;

    (3) Remains perfected after the date specified in division (B)(1) of this section
    only if the applicable requirements for perfection under this chapter are satisfied
    on or before July 1, 2002.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.703
- number: '1309.704'
  heading: Security interest unperfected before effective date - UCC 9-704
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'A security interest that is enforceable immediately before July 1, 2001,
    but that would be subordinate to the rights of a person that becomes a lien creditor
    at that time:

    (A) Remains an enforceable security interest until July 1, 2002;

    (B) Remains enforceable after July 1, 2002, if the security interest becomes enforceable
    under section 1309.203 of the Revised Code on July 1, 2001, or by July 1, 2002;
    and

    (C) Becomes perfected:

    (1) Without further action on July 1, 2001, if the applicable requirements for
    perfection under this chapter are satisfied before or on that date; or

    (2) When the applicable requirements for perfection are satisfied if the requirements
    are satisfied after July 1, 2001.'
