- number: '1309.617'
  heading: Rights of transferee of collateral - UCC 9-617
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A secured party''s disposition of collateral after default:

    (1) Transfers to a transferee for value all of the debtor''s rights in the collateral;

    (2) Discharges the security interest under which the disposition is made; and

    (3) Discharges any subordinate security interest or other subordinate lien other
    than the liens specified in division (D) of section 1309.109 of the Revised Code.

    (B) A transferee who acts in good faith takes free of the rights and interests
    described in division (A) of this section, even if the secured party fails to
    comply with this chapter or the requirements of any judicial proceeding.

    (C) If a transferee does not take free of the rights and interests described in
    division (A) of this section, the transferee takes the collateral subject to:

    (1) The debtor''s rights in the collateral;

    (2) The security interest or agricultural lien under which the disposition is
    made; and

    (3) Any other security interest or other lien.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.617
- number: '1309.618'
  heading: Rights and duties of certain secondary obligors - UCC 9-618
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A secondary obligor acquires the rights and becomes obligated to perform
    the duties of the secured party after the secondary obligor:

    (1) Receives an assignment of a secured obligation from the secured party;

    (2) Receives a transfer of collateral from the secured party and agrees to accept
    the rights and assume the duties of the secured party; or

    (3) Is subrogated to the rights of a secured party with respect to collateral.

    (B) An assignment, transfer, or subrogation described in division (A) of this
    section:

    (1) Is not a disposition of collateral under section 1309.610 of the Revised Code;
    and

    (2) Relieves the secured party of further duties under this chapter.'
