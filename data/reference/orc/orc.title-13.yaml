  url: https://codes.ohio.gov/ohio-revised-code/section-1345.23
- number: '1345.24'
  heading: Retaining notice of cancellation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: In a home solicitation sale, the seller shall retain, for the period in which
    an action to enforce the sale could be commenced, any notice of cancellation made
    pursuant to section 1345.22 of the Revised Code. The seller shall also retain
    any envelope in which a notice of cancellation is sent or delivered. If the date
    of delivery is not indicated or recorded on the notice of cancellation or on the
    envelope, the seller shall record the date of delivery on the notice of cancellation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.24
- number: '1345.25'
  heading: Presumption
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: Where a sale is made pursuant to negotiations that occur at a place other
    than the seller's fixed location business establishment where goods or services
    are offered or exhibited for sale, but the agreement or offer to purchase is signed
    at a seller's fixed location business establishment, a presumption arises that
    the sale was a home solicitation sale.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.25
- number: '1345.26'
  heading: Right of buyer after cancellation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: If, following the cancellation of a home solicitation sale by the buyer, the
    seller fails to return any goods traded in by the buyer, the buyer may elect to
    recover an amount equal to the trade-in allowance stated in the agreement. Until
    division (D) (4) of section 1345.23 of the Revised Code has been complied with
    by the seller, the buyer may retain possession of the goods delivered to him by
    the seller and has a lien on the goods in his possession or control for any recovery
    to which he is entitled.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.26
- number: '1345.27'
  heading: Right of seller after cancellation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: Except as provided in section 1345.26 of the Revised Code, within a reasonable
    time after a home solicitation sale has been cancelled or an offer to purchase
    has been revoked, the buyer upon demand must make available to the seller any
    goods delivered by the seller pursuant to the sale. The goods made available shall
    not have been diminished in quantity nor subjected to unreasonable wear or use.
    The buyer is not obligated to make the goods available at any place other than
    his residence. If the buyer does make the goods available to the seller and the
    seller fails to pick them up within twenty days of the buyer's notice of cancellation
    the goods become the property of the buyer without obligation to pay for them.
    The buyer has the duty to take reasonable care of the goods in his possession
    before cancellation and twenty days thereafter, during which time the goods are
    otherwise at the seller's risk.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.27
- number: '1345.28'
  heading: Deceptive acts or practices
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: Failure to comply with sections 1345.21 to 1345.27 of the Revised Code constitutes
