- number: '1335.04'
  heading: Interest in land to be granted in writing
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1335'
    name: Statute Of Frauds
  text: No lease, estate, or interest, either of freehold or term of years, or any
    uncertain interest of, in, or out of lands, tenements, or hereditaments, shall
    be assigned or granted except by deed, or note in writing, signed by the party
