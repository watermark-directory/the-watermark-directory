- number: '1322.07'
  heading: Requirement to obtain certificate of registration or license
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A)(1) No person, on the person''s own behalf or on behalf of any other person,
    shall engage in the transaction of business as a mortgage lender, mortgage servicer,
    or mortgage broker in this state without first having obtained a certificate of
    registration from the superintendent of financial institutions for the principal
    office and every branch office to be maintained by the person for the transaction
    of business as a mortgage lender, mortgage servicer, or mortgage broker in this
    state.

    (2) A registrant shall maintain an office location for the transaction of business
    as a mortgage lender, mortgage servicer, or mortgage broker in any state of the
    United States. Registrants are not required to maintain a physical location in
    this state.

    (B)(1) No individual shall act as a mortgage loan originator without first having
    obtained a license from the superintendent. A mortgage loan originator shall be
    employed by or associated with a registrant or entity holding a valid letter of
    exemption under this chapter, but shall not be employed by or associated with
    more than one registrant or entity holding a valid letter of exemption under this
    chapter at any one time.

    (2) An individual acting under the individual''s authority as a registered mortgage
    loan originator shall not be required to be licensed under division (B)(1) of
    this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.07
- number: '1322.09'
  heading: Application for certificate of registration; fee
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A)(1) An application for a certificate of registration shall be in writing,
    under oath, and in a form prescribed by the superintendent of financial institutions
    that complies with the requirements of the nationwide mortgage licensing system
    and registry. The application shall be accompanied by a nonrefundable application
    fee of seven hundred dollars for each location of an office to be maintained by
    the applicant in accordance with division (A) of section 1322.07 of the Revised
    Code and any additional fee required by the nationwide mortgage licensing system
    and registry.

    (2) The application shall include the names and addresses of the owners, officers,
    or partners having control of the applicant, including all of the following:

    (a) In the case of a sole proprietor, the name and address of the sole proprietor;

    (b) In the case of a partnership, the name and address of each partner;

    (c) In the case of a corporation, the name and address of each shareholder owning
    five per cent or more of the corporation;

    (d) In the case of any other entity, the name and address of any person that owns
    five per cent or more of any entity that will transact business under the certificate
    of registration.

    (3) In addition to any information required by this section, an applicant shall
    furnish to the superintendent any reasonable information the superintendent may
    require.

    (B) Upon the filing of the application and payment of the nonrefundable application
    fee and any fee required by the nationwide mortgage licensing system and registry,
    the superintendent shall investigate the applicant and any individual whose identity
    is required to be disclosed in the application. As part of that investigation,
    the superintendent shall conduct a civil records check.

    If, in order to issue a certificate of registration to an applicant, additional
    investigation by the superintendent outside this state is necessary, the superintendent
    may require the applicant to advance sufficient funds to pay the actual expenses
    of the investigation, if it appears that these expenses will exceed five hundred
    dollars. The superintendent shall provide the applicant with an itemized statement
    of the actual expenses that the applicant is required to pay.

    (C) In connection with applying for a certificate of registration, the applicant
    shall furnish to the nationwide mortgage licensing system and registry information
    concerning the applicant''s identity, including all of the following for the applicant
    and any individual with control of the applicant:

    (1) The applicant''s fingerprints for submission to the federal bureau of investigation,
    and any other governmental agency or entity authorized to receive such information,
    for purposes of a state, national, and international criminal history background
    check;

    (2) Personal history and experience in a form prescribed by the nationwide mortgage
    licensing system and registry, along with authorization for the superintendent
    and the nationwide mortgage licensing system and registry to obtain both of the
    following:

    (a) An independent credit report from a consumer reporting agency;

    (b) Information related to any administrative, civil, or criminal findings by
    any governmental jurisdiction.

    (D) The superintendent shall pay all funds advanced and application and renewal
    fees and penalties the superintendent receives pursuant to this section and section
    1322.10 of the Revised Code to the treasurer of state to the credit of the consumer
    finance fund created in section 1321.21 of the Revised Code.

    (E) If an application for a certificate of registration does not contain all of
    the information required under this section, and if that information is not submitted
    to the superintendent or to the nationwide mortgage licensing system and registry
    within ninety days after the superintendent or the nationwide mortgage licensing
    system and registry requests the information in writing, including by electronic
    transmission or facsimile, the superintendent may consider the application withdrawn.

    (F) A certificate of registration and the authority granted under that certificate
    is not transferable or assignable and cannot be franchised by contract or any
    other means.

    (G)(1) The superintendent may establish relationships or enter into contracts
    with the nationwide mortgage licensing system and registry, or any entities designated
    by it, to collect and maintain records and process transaction fees or other fees
    related to mortgage lender, mortgage servicer, or mortgage broker certificates
    of registration or the persons associated with a mortgage lender, mortgage servicer,
    or mortgage broker.

    (2) For purposes of this section and to reduce the points of contact that the
    federal bureau of investigation may have to maintain, the division of financial
    institutions may use the nationwide mortgage licensing system and registry as
    a channeling agent for requesting information from and distributing information
    to the United States department of justice or other governmental agencies.

    (3) For purposes of this section and to reduce the points of contact that the
    division may have to maintain, the division may use the nationwide mortgage licensing
    system and registry as a channeling agent for requesting information from and
    distributing information to any source as determined by the division.'
