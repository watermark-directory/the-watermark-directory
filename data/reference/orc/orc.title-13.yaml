- number: '1329.54'
  heading: Registration of trademarks, service marks definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'As used in sections 1329.54 to 1329.67 of the Revised Code:

    (A) "Trademark" means any word, name, symbol, device, or combination of any word,
    name, symbol, or device, that is adopted and used by a person to identify and
    distinguish the goods of that person, including a unique product, from the goods
    of other persons, and to indicate the source of the goods, even if that source
    is unknown.

    (B) "Service mark" means any word, name, symbol, device, or combination of any
    word, name, symbol, or device, that is adopted and used by a person to identify
    and distinguish the services of that person, including a unique service, from
    the services of other persons and to indicate the source of the services, even
    if that source is unknown. "Service mark" includes titles, character names used
    by a person, and other distinctive features of radio or television programs even
    if a radio or television program or a title, character name, or other distinctive
    feature of a radio or television program advertises the goods of the sponsor of
    that radio or television program.

    (C) "Mark" means any trademark or service mark that is entitled to registration
    under sections 1329.54 to 1329.67 of the Revised Code whether or not it is registered.

    (D) "Person" means any individual, firm, partnership, limited liability partnership,
    limited liability company, corporation, association, union, or other organization
    that is capable of suing or being sued in a court of record in this state.

    (E) "Applicant" means the person filing an application for registration of a mark
    under sections 1329.54 to 1329.67 of the Revised Code and the person''s legal
    representatives, successors, or assigns.

    (F) "Registrant" means the person to whom the registration of a mark is issued
    under sections 1329.54 to 1329.67 of the Revised Code and the person''s legal
    representatives, successors, or assigns.

    (G) "Use" means the bona fide use of a mark in the ordinary course of trade and
    not the making use of a mark merely to reserve a right in a mark.

    (H) A trademark shall be considered "used" in this state when either of the following
    applies:

    (1) The trademark is placed in any manner on goods or their containers, on displays
    associated with goods or their containers, or on the tags or labels affixed to
    goods or their containers, and the goods are sold or transported in commerce in
    this state.

    (2) If the nature of goods makes the types of placement described in division
    (H)(1) of this section impracticable, the trademark is placed in any manner on
    documents associated with the goods or the sale of the goods, and the goods are
    sold or transported in commerce in this state.

    (I) A service mark shall be considered "used" in this state when both of the following
    apply:

    (1) The service mark is used to identify the services of one person and to distinguish
    them from the services of other persons.

    (2) The services of that person are sold or otherwise rendered in this state.

    (J) A mark shall be considered "abandoned" when either of the following occurs:

    (1) Its use has been discontinued with the intent not to resume that use. An "intent
    not to resume that use" may be inferred from the circumstances, and nonuse of
    a mark for three consecutive years constitutes prima-facie evidence of that intent.

    (2) Any course of conduct by the owner of the mark, including actions and omissions,
    causes the mark to lose its significance as a mark.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.54
- number: '1329.55'
  heading: Limitations on trademark or service mark registration
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'A trademark or service mark by which the goods or services of any applicant
    for registration may be distinguished from the goods or services of other persons
    shall not be registered if it consists of or comprises one or more of the following:

    (A) Immoral, deceptive, or scandalous matter;

    (B) Matter that may disparage or falsely suggest a connection with living or dead
    persons, institutions, beliefs, or national symbols or bring them into contempt
    or disrepute;

    (C) The flag, coat of arms, or other insignia of the United States, of any state
    or municipality, or of any foreign nation or any simulation of a flag, coat of
    arms, or other insignia of those natures;

    (D) The name, signature, or portrait of any living individual, except with the
    individual''s written consent;

    (E)(1) Except as provided in divisions (E)(2) and (3) of this section, a mark
    to which any of the following applies:

    (a) When used on or in connection with the goods or services of the applicant,
    the mark is merely descriptive or deceptively misdescriptive of those goods or
    services.

    (b) When used on or in connection with the goods or services of the applicant,
    the mark is primarily geographically descriptive or deceptively misdescriptive
    of those goods or services.

    (c) The mark is primarily merely a surname.

    (2) Division (E) of this section does not prevent the registration of a mark used
    in this state by the applicant if that mark has become distinctive of the applicant''s
    goods or services. The secretary of state may accept as evidence that the mark
    has become distinctive, as used on or in connection with the applicant''s goods
    or services, proof of substantially exclusive and continuous use of the mark as
    a mark by the applicant in this state or elsewhere for the five years next preceding
    the date of the filing of the application for registration.

    (3) Division (E)(1) of this section does not prevent the registration of a mark
    that, when used on or in connection with the goods or services of the applicant,
    is primarily geographically deceptively misdescriptive of the goods or services
    if the mark became distinctive of the applicant''s goods or services in commerce
    prior to December 8, 1993, the date of enactment of the "North American Free Trade
    Agreement Implementation Act," 107 stat. 2057 (1993), 19 U.S.C. 3301 et seq.

    (F) A trademark or service mark that so resembles a trademark or service mark
    registered in this state or a trademark, or service mark previously used in this
    state by another person and not abandoned by that person, as likely, when used
    on or in connection with the goods or services of the applicant, to cause confusion
    or mistake or to deceive;

    (G)(1) Except as provided in division (G)(2) of this section, a trademark or service
    mark that so resembles a trademark or service mark registered in the United States
    patent and trademark office by another person and not abandoned by that person,
    or a trademark or service mark that is the subject of a pending intent to use
    application filed in the United States patent and trademark office by another
    person, as to be likely, when used on or in connection with the goods or services
    of the applicant, to cause confusion or mistake or to deceive.

    (2) If the applicant proves that the applicant is the owner of a concurrent registration
    in the United States patent and trademark office of the applicant''s trademark
    or service mark covering an area including this state, the applicant may register
    the applicant''s trademark or service mark in accordance with sections 1329.54
    to 1329.67 of the Revised Code.'
