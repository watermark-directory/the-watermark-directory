- number: '1309.626'
  heading: Action in which deficiency or surplus is in issue - UCC 9-626
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'In an action arising from a transaction in which the amount of a deficiency
    or surplus is in issue, the following rules apply:

    (A) A secured party is not required to prove compliance with sections 1309.601
    to 1309.628 of the Revised Code relating to collection, enforcement, disposition,
    or acceptance unless the debtor or a secondary obligor places the secured party''s
    compliance in issue.

    (B) If the secured party''s compliance is placed in issue, the secured party has
    the burden of establishing that the collection, enforcement, disposition, or acceptance
    was conducted in accordance with sections 1309.601 to 1309.628 of the Revised
    Code.

    (C) Except as provided in section 1309.628 of the Revised Code, if a secured party
    fails to prove that the collection, enforcement, disposition, or acceptance was
    conducted in accordance with sections 1309.601 to 1309.628 of the Revised Code
    relating to collection, enforcement, disposition, or acceptance, the liability
    of a debtor or a secondary obligor for a deficiency is limited to an amount by
    which the sum of the secured obligation, expenses, and attorney''s fees exceeds
    the greater of:

    (1) The proceeds of the collection, enforcement, disposition, or acceptance; or

    (2) The amount of proceeds that would have been realized had the noncomplying
    secured party proceeded in accordance with sections 1309.601 to 1309.628 of the
    Revised Code relating to collection, enforcement, disposition, or acceptance.

    (D) For purposes of division (C)(2) of this section, the amount of proceeds that
    would have been realized is equal to the sum of the secured obligation, expenses,
    and attorney''s fees unless the secured party proves that the amount is less than
    that sum.

    (E) If a deficiency or surplus is calculated under division (F) of section 1309.615
    of the Revised Code, the debtor or obligor has the burden of establishing that
    the amount of proceeds of the disposition is significantly below the range of
    prices that a complying disposition to a person other than the secured party,
    a person related to the secured party, or a secondary obligor would have brought.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.626
- number: '1309.627'
  heading: Determination of whether conduct was commercially reasonable - UCC 9-627
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) The fact that a greater amount could have been obtained by a collection,
    enforcement, disposition, or acceptance at a different time or in a different
    method from that selected by the secured party is not of itself sufficient to
    preclude the secured party from establishing that the collection, enforcement,
    disposition, or acceptance was made in a commercially reasonable manner.

    (B) A disposition of collateral is made in a commercially reasonable manner if
    the disposition is made:

    (1) In the usual manner on any recognized market;

    (2) At the price current in any recognized market at the time of the disposition;
    or

    (3) Otherwise in conformity with reasonable commercial practices among dealers
    in the type of property that was the subject of the disposition.

    (C) A collection, enforcement, disposition, or acceptance is commercially reasonable
    if it has been approved:

    (1) In a judicial proceeding;

    (2) By a bona fide creditors'' committee;

    (3) By a representative of creditors; or

    (4) By an assignee for the benefit of creditors.

    (D) Approval under division (C) of this section does not have to be obtained,
    and lack of approval does not mean that the collection, enforcement, disposition,
    or acceptance is not commercially reasonable.'
  history: null
