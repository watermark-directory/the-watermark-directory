- number: '1315.18'
  heading: Termination of business - approval of plan - implementation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) A licensee that ceases to do business in this state shall do so in accordance
    with a plan approved by the superintendent of financial institutions or pursuant
    to directions issued by the superintendent in connection with the revocation or
    suspension of the licensee''s license pursuant to section 1315.151 of the Revised
    Code.

    (B) When a licensee ceases to do business in this state, if the superintendent
    considers it necessary to protect the interests of the licensee''s customers,
    the superintendent may do either of the following:

    (1) Take control of permissible investments or other assets owned by the licensee
    equal in value to the licensee''s outstandings in this state;

    (2) Require the sale of the licensee''s contracts for continuing services or require
    the licensee''s termination of those contracts with compensation to the customers
    for loss of the services.

    (C) No licensee shall fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.18
- number: '1315.21'
  heading: Check-cashing businesses definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: 'As used in sections 1315.21 to 1315.30 of the Revised Code:

    (A) "Check" means any check, draft, money order, or other instrument for the transmission
    or payment of money. "Check" does not include a travelers check.

    (B) "Check-cashing business" means any person that engages in the business of
    cashing checks for a fee. "Check-cashing business" does not include any of the
    following:

    (1) A licensee as defined in section 1321.01 of the Revised Code;

    (2) A registrant as defined in section 1321.51 of the Revised Code;

    (3) A financial institution;

    (4) A person that is primarily engaged in the business of selling tangible personal
    property or services at retail and does not derive more than five per cent of
    the person''s gross income from the cashing of checks;

    (5) A person licensed under sections 1315.01 to 1315.18 of the Revised Code, or
    any agent of that person, to the extent that the person or the agent is engaged
    in cashing checks or travelers checks issued by the licensed person ;

    (6) A person registered as a mortgage lender under Chapter 1322. of the Revised
    Code.

    (C) "Financial institution" means any bank, trust company, savings bank, savings
    and loan association, or credit union, that is incorporated or organized under
    the laws of the United States or of any state thereof, or of Canada or any province
    thereof, and subject to regulation or supervision by such country, state, or province.

    (D) "Superintendent of financial institutions" includes the deputy superintendent
    for consumer finance as provided in section 1181.21 of the Revised Code.'
  history: null
