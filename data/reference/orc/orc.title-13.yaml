- number: '1309.520'
  heading: Acceptance and refusal to accept record - UCC 9-520
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A filing office shall refuse to accept a record for filing for a reason
    specified in division (B) of section 1309.516 of the Revised Code and may refuse
    to accept a record for filing only for a reason specified in that division. However,
    the secretary of state''s office shall redact social security and employer identification
    numbers from filings posted on its web site.

    (B) If a filing office refuses to accept a record for filing, it shall communicate
    to the person who presented the record the fact of and reason for the refusal
    and the date and time the record would have been filed had the filing office accepted
    it. The communication must be made at the time and in the manner prescribed by
    the applicable filing-office rule but, in the case of a filing office described
    in division (A)(2) of section 1309.501 of the Revised Code, in no event more than
    two business days after the filing office receives the record.

    (C) A filed financing statement that satisfies divisions (A) and (B) of section
    1309.502 of the Revised Code is effective, even if the filing office is required
    to refuse to accept it for filing under division (A) of this section. However,
    section 1309.338 of the Revised Code applies to a filed financing statement that
    provides information described in division (B)(5) of section 1309.516 of the Revised
    Code that is incorrect at the time the financing statement is filed.

    (D) If a record communicated to a filing office provides information that relates
    to more than one debtor, sections 1309.501 to 1309.527 of the Revised Code apply
    as to each debtor separately.'
