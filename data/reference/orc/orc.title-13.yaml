  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.606
- number: '1309.607'
  heading: Collection and enforcement by secured party - UCC 9-607
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) If so agreed, and in any event after default, a secured party:

    (1) May notify an account debtor or other person obligated on collateral to make
    payment or otherwise render performance to or for the benefit of the secured party;

    (2) May take any proceeds to which the secured party is entitled under section
    1309.315 of the Revised Code;

    (3) May enforce the obligations of an account debtor or other person obligated
    on collateral and exercise the rights of the debtor with respect to the obligation
    of the account debtor or other person obligated on collateral to make payment
    or otherwise render performance to the debtor, and with respect to any property
    that secures the obligations of the account debtor or other person obligated on
    the collateral;

    (4) If it holds a security interest in a deposit account perfected by control
    under division (A)(1) of section 1309.104 of the Revised Code, may apply the balance
    of the deposit account to the obligation secured by the deposit account; and

    (5) If it holds a security interest in a deposit account perfected by control
    under division (A)(2) or (3) of section 1309.104 of the Revised Code, may instruct
    the bank to pay the balance of the deposit account to or for the benefit of the
    secured party.

    (B) If necessary to enable a secured party to exercise the right of a debtor to
    enforce a mortgage nonjudicially under division (A)(3) of this section, the secured
    party may record in the office in which a record of the mortgage is recorded:

    (1) A copy of the security agreement that creates or provides for a security interest
    in the obligation secured by the mortgage; and

    (2) The secured party''s sworn affidavit in recordable form stating that:

    (a) A default has occurred with respect to the obligation secured by the mortgage;
    and

    (b) The secured party is entitled to enforce the mortgage nonjudicially.

    (C) A secured party shall proceed in a commercially reasonable manner if the secured
    party:

    (1) Undertakes to collect from or enforce an obligation of an account debtor or
    other person obligated on collateral; and

    (2) Is entitled to charge back uncollected collateral or otherwise to full or
    limited recourse against the debtor or a secondary obligor.

    (D) A secured party may deduct from the collections made pursuant to division
    (C) of this section reasonable expenses of collection and enforcement, including
    reasonable attorney''s fees and legal expenses incurred by the secured party.

    (E) This section does not determine whether an account debtor, bank, or other
    person obligated on collateral owes a duty to a secured party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.607
- number: '1309.608'
  heading: Application of proceeds of collection or enforcement - liability for deficiency
    and right to surplus - UCC 9-608
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) If a security interest or agricultural lien secures payment or performance
    of an obligation, the following rules apply:

    (1) A secured party shall apply or pay over for application the cash proceeds
    of collection or enforcement under section 1309.607 of the Revised Code in the
    following order:

    (a) The reasonable expenses of collection and enforcement and, to the extent provided
    for by agreement and not prohibited by law, reasonable attorney''s fees and legal
    expenses incurred by the secured party;

    (b) The satisfaction of obligations secured by the security interest or agricultural
    lien under which the collection or enforcement is made; and

    (c) The satisfaction of obligations secured by any subordinate security interest
    in or other lien on the collateral subject to the security interest or agricultural
    lien under which the collection or enforcement is made if the secured party receives
    an authenticated demand for proceeds before distribution of the proceeds is completed.

    (2) If requested by a secured party, a holder of a subordinate security interest
    or other lien shall furnish reasonable proof of the interest or lien within a
    reasonable time. Unless the holder complies, the secured party is not required
    to comply with the holder''s demand made under division (A)(1)(c) of this section.

    (3) A secured party is not required to apply or pay over for application noncash
    proceeds of collection and enforcement under section 1309.607 of the Revised Code
    unless the failure to do so would be commercially unreasonable. A secured party
    who applies or pays over for application noncash proceeds shall do so in a commercially
    reasonable manner.

    (4) A secured party shall account to and pay a debtor for any surplus, and the
    obligor is liable for any deficiency.

    (B) If the underlying transaction is a sale of accounts, chattel paper, payment
    intangibles, or promissory notes, the debtor is not entitled to any surplus, and
    the obligor is not liable for any deficiency.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.608
- number: '1309.609'
  heading: Secured party's right to take possession after default - UCC 9-609
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) After default, a secured party:

    (1) May take possession of the collateral; and

    (2) Without removal, may render equipment unusable and dispose of collateral on
    a debtor''s premises under section 1309.610 of the Revised Code.

    (B) A secured party may act under division (A) of this section:

    (1) Pursuant to judicial process; or

    (2) Without judicial process if it acts without breach of the peace.

    (C) If so agreed, and in any event after default, a secured party may require
    the debtor to assemble the collateral and make it available to the secured party
    at a place that is designated by the secured party and that is reasonably convenient
    to both parties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.609
- number: '1309.610'
  heading: Disposition of collateral after default - UCC 9-610
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) After default, a secured party may sell, lease, license, or otherwise
    dispose of any or all of the collateral in its present condition or following
    any commercially reasonable preparation or processing.

    (B) Every aspect of a disposition of collateral, including the method, manner,
    time, place, and other terms, must be commercially reasonable. If commercially
    reasonable, a secured party may dispose of collateral by public or private proceedings,
    by one or more contracts, as a unit or in parcels, at any time and place, and
    on any terms.

    (C) A secured party may purchase collateral:

    (1) At a public disposition; or

    (2) At a private disposition, but only if the collateral is of a kind that is
    customarily sold on a recognized market or the subject of widely distributed standard
    price quotations.

    (D) A contract for a sale, lease, license, or other disposition includes the warranties
    relating to title, possession, quiet enjoyment, and the like that by operation
    of law accompany a voluntary disposition of property of the kind subject to the
    contract.

    (E) A secured party may disclaim or modify warranties under division (D) of this
    section:

    (1) In a manner that would be effective to disclaim or modify the warranties in
    a voluntary disposition of property of the kind subject to the contract of disposition;
    or

    (2) By communicating to the purchaser a record evidencing the contract for disposition
    and including an express disclaimer or modification of the warranties.

    (F) A record is sufficient to disclaim warranties under division (E) of this section
    if it indicates "There is no warranty relating to title, possession, quiet enjoyment,
    or the like in this disposition" or uses words of similar import.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.610
- number: '1309.611'
  heading: Notification before disposition of collateral - UCC 9-611
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) As used in this section, "notification date" means the earlier of the
    date on which:

    (1) A secured party sends to the debtor and any secondary obligor an authenticated
    notification of disposition. or

    (2) The debtor and any secondary obligor waive the right to notification.

    (B) Except as provided in division (D) of this section, a secured party who disposes
    of collateral under section 1309.610 of the Revised Code shall send a reasonable
    authenticated notification of disposition to the persons specified in division
    (C) of this section.

    (C) To comply with division (B) of this section, the secured party shall send
    an authenticated notification of disposition to:

    (1) The debtor;

    (2) Any secondary obligor; and

    (3) If the collateral is other than consumer goods:

    (a) Any other person from whom the secured party has received, before the notification
    date, an authenticated notification of a claim of an interest in the collateral;

    (b) Any other secured party or lienholder who, ten days before the notification
    date, held a security interest in or other lien on the collateral perfected by
    the filing of a financing statement that:

    (i) Identified the collateral;

    (ii) Was indexed under the debtor''s name as of that date; and

    (iii) Was filed in the office in which to file a financing statement against the
    debtor covering the collateral as of that date; and

    (c) Any other secured party who, ten days before the notification date, held a
    security interest in the collateral perfected by compliance with a statute, rule,
    or treaty described in division (A) of section 1309.311 of the Revised Code.

    (D) Division (B) of this section does not apply if the collateral is perishable
    or threatens to decline speedily in value or is of a type customarily sold on
    a recognized market.

    (E) A secured party complies with the requirement for notification prescribed
    by division (C)(3)(b) of this section if:

    (1) Not later than twenty days nor earlier than thirty days before the notification
    date, the secured party requests, in a commercially reasonable manner, information
    concerning financing statements indexed under the debtor''s name in the office
    indicated in division (C)(3)(b) of this section; and

    (2) Before the notification date, the secured party:

    (a) Did not receive a response to the request for information; or

    (b) Received a response to the request for information and sent an authenticated
    notification of disposition to each secured party or other lienholder named in
    that response whose financing statement covered the collateral.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.611
- number: '1309.612'
  heading: Timeliness of notification before disposition of collateral - UCC 9-612
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (B) of this section, whether
    a notification is sent within a reasonable time is a question of fact.

    (B) A notification of disposition sent after default and ten days or more before
    the earliest time of disposition set forth in the notification is sent within
    a reasonable time before the disposition.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.612
- number: '1309.613'
  heading: Contents and form of notification before disposition of collateral - general
    - UCC 9-613
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except in a consumer-goods transaction, all of the following rules apply
    to a notification of disposition of collateral and to a disposition of collateral:

    (1) The contents of a notification of disposition are sufficient if the notification:

    (a) Describes the debtor and the secured party;

    (b) Describes the collateral that is the subject of the intended disposition;

    (c) States the method of intended disposition;

    (d) States that the debtor is entitled to an accounting of the unpaid indebtedness
    and states the charge, if any, for an accounting; and

    (e) States the time and place, by identifying the place of business or address
    or by providing other information that, in each case, reasonably describes the
    location, of a public disposition or the time after which any other disposition
    is to be made.

    (2) Whether the contents of a notification that lacks any of the information specified
    in division (A)(1) of this section are nevertheless sufficient is a question of
    fact.

    (3) The contents of a notification providing substantially the information specified
    in division (A)(1) of this section are sufficient, even if the notification includes:

    (a) Information not specified by that division; or

    (b) Minor errors that are not seriously misleading.

    (4) A particular phrasing of the notification is not required.

    (B) The following form of notification and the form appearing in division (B)
    of section 1309.614 of the Revised Code, when completed, each provides sufficient
    information:

    "NOTIFICATION OF DISPOSITION OF COLLATERAL

    To: (Name of debtor, obligor, or other person to whom the notification is sent)

    From: (Name, address, and telephone number of secured party)

    Name of Debtor(s): (Include only if debtor(s) are not an addressee)

    (FOR A PUBLIC DISPOSITION:)

    We will sell (or lease or license, as applicable) the (describe collateral) to
    the highest qualified bidder in public as follows:

    Day and Date:_____________

    Time:_____________________

    Place:____________________

    (FOR A PRIVATE DISPOSITION:)

    We will sell (or lease or license, as applicable) the (describe collateral) privately
    sometime after (day and date).

    You are entitled to an accounting of the unpaid indebtedness secured by the property
    that we intend to sell (or lease or license, as applicable) (for a charge of $_________).
    You may request an accounting by calling us at (telephone number)."'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.613
- number: '1309.614'
  heading: Contents and form of notification before disposition of collateral - consumer-goods
    transaction - UCC 9-614
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) In a consumer-goods transaction, the following rules apply:

    (1) A notification of disposition must provide all of the following information:

    (a) The information specified in division (A)(1) of section 1309.613 of the Revised
    Code;

    (b) A description of any liability for a deficiency of the person to whom the
    notification is sent;

    (c) A telephone number from which the amount that must be paid to the secured
    party to redeem the collateral under section 1309.623 of the Revised Code is available;
    and

    (d) A telephone number or mailing address from which additional information concerning
    the disposition and the obligation secured is available.

    (2) A particular phrasing of the notification is not required.

    (B) The following form of notification of disposition, when completed, provides
    sufficient information:

    "(Name and address of secured party)

    (Date)

    NOTICE OF OUR PLAN TO SELL PROPERTY

    (Name and address of any obligor who is also a debtor)

    Subject: (Identification of Transaction)

    We have your (describe collateral), because you broke promises in our agreement.

    (For a public disposition)

    We will sell (describe collateral) at public sale. A sale could include a lease
    or license. The sale will be held as follows:

    Day and date:_______________

    Time:_______________________

    Place:______________________

    You may attend the sale and bring bidders if you want.

    (For a private disposition)

    We will sell (describe collateral) at private sale sometime after (date). A sale
    could include a lease or license.

    The money that we get from the sale (after paying our costs) will reduce the amount
    you owe. If we get less money than you owe, you (will or will not, as applicable)
    still owe us the difference. If we get more money than you owe, you will get the
    extra money, unless we must pay it to someone else. You can get the property back
    at any time before we sell it by paying us the full amount you owe (not just the
    past due payments), including our expenses. To learn the exact amount you must
    pay, call us at (telephone number).

    If you want us to explain to you in writing how we have figured the amount that
    you owe us, you may call us at (telephone number) (or write us at (secured party''s
    address)) and request a written explanation. (We will charge you $________ for
    the explanation if we sent you another written explanation of the amount you owe
    us within the last six months.)

    If you need more information about the sale, call us at (telephone number) (or
    write us at (secured party''s address)).

    We are sending this notice to the following other people who have an interest
    in (describe collateral) or who owe money under your agreement:

    (Names of all other debtors and obligors, if any)."

    (C) A notification in, the form contained in division (B) of this section is sufficient,
    even if additional information appears at the end of the form.

    (D) A notification in the form of division (B) of this section is sufficient,
    even if it includes errors in information not required by division (A)(1) of this
    section, unless the error is misleading with respect to rights arising under this
    chapter.

    (E) If a notification under this section is not in the form contained in division
    (B) of this section, law other than this chapter determines the effect of including
    information not required by division (A)(1) of this section.'
