- number: '1345.091'
  heading: Claim or defense against assignee of loan
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: 'No claim or defense under this chapter may be asserted by the attorney general
    or any consumer against an assignee or purchaser of a mortgage loan for value
    unless any one of the following applies:

    (A) The violation was committed by the assignee or purchaser.

    (B) The assignee or purchaser is affiliated by common control with the seller
    of the loan at the time of such assignment or purchase.'
