- number: '1321.80'
  heading: Delinquency, cancellation, and check collection charges
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'A premium finance agreement may provide for the payment by the insured of
    any of the following:

    (A) A delinquency charge of not more than five per cent of any installment that
    is in default for a period of more than five days. If the insurance policies described
    in the premium finance agreement are primarily for personal, family, or household
    purposes, the maximum delinquency charge shall be ten dollars.

    (B) A cancellation charge of ten dollars when the default results in the cancellation
    of any insurance contract described in the agreement.

    (C) A check collection charge of not more than ten dollars, plus any amount passed
    on from other financial institutions, for each check, negotiable order of withdrawal,
    share draft, or other negotiable instrument returned or dishonored for any reason.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.80
- number: '1321.81'
  heading: Cancellation of insurance contract listed in premium finance agreement
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) When a premium finance agreement contains a power of attorney authorizing
    the premium finance company to cancel any insurance contract or contracts listed
    in the agreement, the insurance contract or contracts shall not be cancelled by
    the premium finance company unless the cancellation is effectuated in accordance
    with this section.

    (B) Not less than ten days'' written notice shall be mailed to the insured at
    his last known mailing address, as shown on the records of the premium finance
    company, of the intent of the premium finance company to cancel the insurance
    contract unless the default is cured within such ten-day period.

    (C) After expiration of such ten-day period, the premium finance company may cancel,
    in the name of the insured, such insurance contract or contracts by mailing to
    the insurer a notice of cancellation, and the insurance contract shall be cancelled
    as if such notice of cancellation had been submitted by the insured himself, but
    without requiring the return of the insurance contract or contracts. The premium
    finance company also shall mail a notice of cancellation to the insured at his
    last known mailing address, as shown on the records of the premium finance company.

    (D) All statutory, regulatory, and contractual restrictions providing that the
    insurance contract may not be cancelled unless notice is given to a governmental
    agency, mortgagee, or other third party shall apply where cancellation is effected
    under this section. The insurer shall give the prescribed notice in behalf of
    itself or the insured to any governmental agency, mortgagee, or third party on
    or before the second business day after the day it receives the notice of cancellation
    from the premium finance company and shall determine the effective date of cancellation
    taking into consideration the number of days'' notice required to complete the
    cancellation.

    (E) The premium finance company shall retain copies of the notices required under
    divisions (B) and (C) of this section by placing them in the insured''s file or
    by preserving them in a retrieval system maintained in whole or in part by mechanical
    or electronic data processing methods.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.81
- number: '1321.82'
  heading: Return to insurance premium finance company of gross unearned premium upon
    cancellation of insurance contract
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Whenever a financed insurance policy is cancelled, the insurer that has
    been notified pursuant to division (C) of section 1321.78 of the Revised Code
    shall, not later than sixty days after the date of cancellation, return whatever
    gross unearned premium is due under the insurance policy to the insurance premium
    finance company for the account of the insured or insureds. If the insurer returns
    the unearned premium through the agent or agency writing the insurance, the agent
    or agency shall remit the premium to the insurance premium finance company within
    that sixty-day period. If the insurer receives written notice of the failure of
    the agent or agency to remit the unearned premium, the insurer shall, not later
    than sixty days after it receives the notice, pay the amount of that premium directly
    to the insurance premium finance company.

    (B) If the crediting of unearned premium to the account of the insured results
    in a surplus over any indebtedness owed by the insured to the premium finance
    company, the premium finance company shall refund such excess to the insured at
    his last known mailing address as shown on the records of the premium finance
    company, except that no such refund is required if it amounts to less than three
    dollars.'
  history: null
