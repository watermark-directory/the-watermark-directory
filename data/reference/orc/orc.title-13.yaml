- number: '1311.08'
  heading: Lien when improvement situated on same or contiguous or adjacent lots
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'Where an improvement consists of two or more buildings united together, situated
    on the same lot or upon contiguous or adjacent lots, or of separate buildings
    upon contiguous or adjacent lots, or where work or labor has been performed or
    material has been furnished for improvements which are located on separate tracts
    or parcels of land but operated as an entire plant or concern, and erected under
    one general contract, the lien for the labor or work performed or material furnished
    attaches to all such improvements, together with the land upon, around, or in
    front of which such labor or work is performed or material is furnished, the same
    as provided in sections 1311.02 and 1311.03 of the Revised Code in case of a single
    improvement, and it is not necessary to file a separate lien for each improvement.

    Provided that where a lien attaches pursuant to this chapter to contiguous or
    adjacent lots, on which lots separate dwelling units designed to be separately
    sold have been or are being constructed, except with respect to any person who
    performs labor or work or furnishes material for the construction, alteration,
    or repair of any street, turnpike, road, sidewalk, way, drain, ditch, or sewer
    by virtue of a private contract between him and the owner, part owner, or lessee
    of lands upon which the same may be constructed, altered, or repaired, or of lands
    abutting thereon, the lien rights on any lot on which all construction has been
    completed and which has been conveyed to a purchaser for value shall terminate
    either sixty days from the date on which the last labor or work was performed
    or material furnished in connection with the construction on any of such lots,
    or sixty days after the instrument of conveyance to the purchaser separating the
    lot from the contiguous or adjacent lots is filed for record, whichever date is
    earlier, unless and except for lien rights which are evidenced by an affidavit
    or affidavits filed for record in accordance with section 1311.06 of the Revised
    Code before the expiration of the sixty-day period.'
