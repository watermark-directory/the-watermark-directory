- number: '1317.061'
  heading: Retail seller or holder may contract for and receive alternative finance
    charges or interest
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: As an alternative to the finance charges permitted in division (A) of section
    1317.06 of the Revised Code or the interest permitted in division (B) of that
    section, and to the finance charges permitted in division (B) of section 1317.11
    of the Revised Code, a retail seller or holder may contract for and receive finance
    charges or interest at any rate or rates agreed upon or consented to by the parties
    to the retail installment contract or revolving budget agreement, but not exceeding
    an annual percentage rate of twenty-five per cent.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1317.061
- number: '1317.062'
  heading: Retail seller or holder may contract for and receive alternative delinquent
    charges
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: '(A)(1) As an alternative to the delinquent charges permitted in division
    (B) of section 1317.06 and division (B) of section 1317.11 of the Revised Code,
    a retail seller or holder may contract for and receive delinquent charges in any
    amount agreed upon or consented to by the parties to the retail installment contract
    or revolving budget agreement.

    (2) Each retail installment contract and revolving budget agreement permitting
    delinquent charges in accordance with division (A)(1) of this section shall contain
    a statement that clearly and concisely informs the consumer of the amount of the
    delinquent charges and the conditions under which the delinquent charges will
    be charged.

    (B) A retail seller or holder may contract with a retail buyer for and receive
    check collection charges for each check or other negotiable instrument that is
    issued as payment on the retail installment contract or revolving budget agreement
    and that is returned or dishonored for any reason.

    (C) Any charges that are contracted for and received by a retail seller or holder
    as permitted by this section shall not be included in the computation of the annual
    percentage rate or rates of interest or finance charges for purposes of determining
    whether the maximum annual percentage rate or maximum rate or rates of interest
    or finance charges authorized under sections 1317.06, 1317.061, and 1317.11 of
    the Revised Code have been exceeded.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1317.062
- number: '1317.07'
  heading: Requirements of retail installment contract
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: 'No retail installment contract authorized by section 1317.03 of the Revised
    Code that is executed in connection with any retail installment sale shall evidence
    any indebtedness in excess of the time balance fixed in the written instrument
    in compliance with section 1317.04 of the Revised Code, but it may evidence in
    addition any agreements of the parties for the payment of delinquent charges,
    as provided for in section 1317.06 of the Revised Code, taxes, and any lawful
    fee actually paid out, or to be paid out, by the retail seller to any public officer
    for filing, recording, or releasing any instrument securing the payment of the
    obligation owed on any retail installment contract. No retail seller, directly
    or indirectly, shall charge, contract for, or receive from any retail buyer, any
    further or other amount for examination, service, brokerage, commission, expense,
    fee, or other thing of value, unless the retail seller is otherwise authorized
    by law to do so. A documentary service charge customarily and presently being
    paid on May 9, 1949, in a particular business and area may be charged if the charge
    does not exceed two hundred fifty dollars per sale, except as otherwise authorized
    by section 4517.261 of the Revised Code.

    No retail seller shall use multiple agreements with respect to a single item or
    related items purchased at the same time, with intent to obtain a higher charge
    than would otherwise be permitted by Chapter 1317. of the Revised Code or to avoid
    disclosure of an annual percentage rate, nor by use of such agreements make any
    charge greater than that which would be permitted by Chapter 1317. of the Revised
    Code had a single agreement been used.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1317.07
- number: '1317.071'
  heading: Limits on security interests
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: 'No retail seller, in connection with a retail installment contract arising
    out of a consumer transaction, shall take any security interest other than as
    authorized by this section.

    A seller may take a security interest in the property sold, and in goods upon
    which services are performed or in which goods sold are installed or to which
    they are annexed.

    A seller may secure the debt arising from the sale by contracting for a security
    interest in other property if, as a result of a prior sale, the seller has an
    existing security interest in the other property, and he may contract for a security
    interest in the property sold in the subsequent sale as security for the previous
    debt. If debts arising from two or more sales are thus secured or are consolidated
    into one debt payable on a single schedule of payments, and the debt is secured
    by security interests taken with respect to one or more of the sales, payments
    received by the seller after the taking of security interests in the other property
    or the consolidation are deemed, for the purpose of determining the amount of
    the debt secured by the various security interests, to have been first applied
    to the payment of the debts arising from the sales first made. To the extent debts
    are paid according to this section, security interests in items of property terminate
    as the debt originally incurred with respect to each item is paid.

    Payments received by the seller upon a revolving charge account are deemed, for
    the purpose of determining the amount of the debt secured by the various security
    interests, to have been applied first to the payment of credit service charges
    in the order of their entry to the account and then to the payment of debts in
    the order in which the entries to the account showing the debts were made.

    If the debts consolidated arose from two or more sales made on the same day, payments
    received by the seller are deemed, for the purpose of determining the amount of
    the debt secured by the various security interests, to have been applied first
    to the payment of the smallest debt.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1317.071
- number: '1317.08'
  heading: Unenforceable retail installment contracts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: '(A)(1) No retail installment contract that evidences an indebtedness greater
    than that allowed under sections 1317.06, 1317.061, 1317.062, and 1317.07 of the
    Revised Code, and no retail installment contract in connection with which any
    charge prohibited by sections 1317.01 to 1317.11 of the Revised Code has been
    contracted for or received, shall be enforceable with respect to that excess indebtedness
    or charge against any retail buyer or any other person who as surety, indorser,
    guarantor, or otherwise is liable on the obligation created by any retail buyer
    on any retail installment contract.

    (2) No security interest created by any retail installment contract described
    in division (A)(1) of this section that is greater than that allowed under sections
    1317.06, 1317.07, and 1317.071 of the Revised Code shall be enforceable with respect
    to that excess security interest against any retail buyer or any of the persons
    described in division (A)(1) of this section, in default under the terms of the
    retail installment contract.

    (B) In order for a retail buyer, or any of the persons described in division (A)(1)
    of this section that is liable on the retail buyer''s obligation, to avail the
    retail buyer or other person of this section, the retail buyer or other person
    must prove that the retail seller or the holder of the retail installment contract
    has been notified in writing of the overcharge and has failed within ten days
    of such notification to advise the retail buyer of a full credit, or the retail
    buyer or other person must prove that the overcharge has been willful. A correction
    of any overcharge within sixty days of the date of making of the retail installment
    contract is conclusive proof of lack of willfulness.

    (C) This section applies to cases in which recovery is sought from the retail
    seller or holder of the retail installment contract.

    (D) If charges greater in amount than those provided for in sections 1317.01 to
    1317.11 of the Revised Code are contracted for or received by the retail seller
    or the retail seller''s agent, assignee, or successor in interest, the retail
    buyer or the retail buyer''s assignee or successor in interest may recover the
    total amount of finance charges paid to the retail seller or the retail seller''s
    agent, assignee, or successor in interest, in excess of the interest rate that
    otherwise would apply under section 1343.01 of the Revised Code.'
