- number: '1306.15'
  heading: Control of transferable record
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) As used in this section, "transferable record" means an electronic record
    that satisfies both of the following:

    (1) The transferable record would be a note under Chapter 1303. or a document
    under Chapter 1307. of the Revised Code, if the electronic record were in writing.

    (2) The issuer of the electronic record expressly has agreed that it is a transferable
    record.

    (B) A person has control of a transferable record if a system employed for evidencing
    the transfer of interests in the transferable record reliably establishes that
    person as the person to which the transferable record was issued or transferred.

    (C) A system satisfies division (B) of this section, and a person is deemed to
    have control of a transferable record, if the transferable record is created,
    stored, and assigned in such a manner that satisfies all of the following:

    (1) A single authoritative copy of the transferable record exists that is unique,
    identifiable, and, except as provided in divisions (C)(4) to (6) of this section,
    unalterable.

    (2) The authoritative copy identifies the person asserting control as either of
    the following:

    (a) The person to which the transferable record was issued;

    (b) If the authoritative copy indicates that the transferable record has been
    transferred, the person to which the transferable record most recently was transferred.

    (3) The authoritative copy is communicated to and maintained by the person asserting
    control or its designated custodian.

    (4) Copies or revisions that add or change an identified assignee of the authoritative
    copy may be made only with the consent of the person asserting control.

    (5) Each copy of the authoritative copy and any copy of a copy is readily identifiable
    as a copy that is not the authoritative copy.

    (6) Any revision of the authoritative copy is readily identifiable as authorized
    or unauthorized.

    (D)(1) Except as otherwise agreed, a person having control of a transferable record
    is the holder, as defined in section 1301.201 of the Revised Code, of the transferable
    record and has the same rights and defenses as a holder of an equivalent record
    or writing under the uniform commercial code. If the applicable statutory requirements
    under section 1303.32, 1307.501, or 1309.27 of the Revised Code are satisfied,
    these rights and defenses include the rights and defenses of a holder in due course,
    a holder to which a negotiable document of title has been duly negotiated, or
    a purchaser, respectively.

    (2) Delivery, possession, and indorsement are not required to obtain or exercise
    any of the rights under division (D)(1) of this section.

    (E) Except as otherwise agreed, an obligor under a transferable record has the
    same rights and defenses as an equivalent obligor under equivalent records or
    writings under the uniform commercial code.

    (F)(1) If requested by a person against which enforcement is sought, the person
    seeking to enforce the transferable record shall provide reasonable proof that
    the person is in control of the transferable record.

    (2) Proof required by division (F)(1) of this section may include access to the
    authoritative copy of the transferable record and related business records sufficient
    to review the terms of the transferable record and to establish the identity of
    the person having control of the transferable record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.15
- number: '1306.16'
  heading: Enforceability against consumer
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) A provision of a nonelectronic contract involving a consumer and to which
    a state agency or a county office is not a party that authorizes the conducting
    of a transaction or any part of a transaction by electronic means is unenforceable
    against the consumer, unless the consumer separately signs the provision.

    (B) A consumer''s agreement to conduct a transaction or a part of a transaction
    electronically shall not be inferred solely from the fact that the consumer has
    used electronic means to pay an account or register a purchase or warranty.

    (C) Divisions (A) and (B) of this section apply to every transaction described
    in those divisions notwithstanding any other provision of this chapter. This section
    shall not be varied by agreement.

    (D) For purposes of this section:

    (1) "Consumer" means an individual who is involved in a transaction primarily
    for personal, family, or household purposes.

    (2) "State agency" means every organized body, office, or agency established by
    the laws of the state for the exercise of any function of state government.

    (3) "County office" means any officer, department, board, commission, agency,
    court, or other instrumentality of a county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.16
- number: '1306.17'
  heading: Commercial reasonableness of security procedure
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) This section and section 1306.18 of the Revised Code apply to the attribution
    of electronic records and electronic signatures among parties that are not state
    agencies.

    (B) For purposes of this section and section 1306.18 of the Revised Code, the
    commercial reasonableness of a security procedure is to be determined by a court.
    In making this determination, both of the following apply:

    (1) A security procedure established by statute or regulation is effective for
    transactions covered by the statute or regulation.

    (2) Except as otherwise provided in division (B)(1) of this section, the commercial
    reasonableness and effectiveness is to be determined in light of the purposes
    of the security procedure and the commercial circumstances at the time the parties
    agree to or adopt the procedure.

    (C) As used in this section, "state agency" means every organized body, office,
    or agency established by the laws of the state for the exercise of any function
    of state government.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.17
- number: '1306.18'
  heading: Security procedures
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) If there is a security procedure between the parties with respect to
    an electronic signature or electronic record, both of the following apply:

    (1) The effect of compliance with a security procedure established by a law or
    regulation is determined by that law or regulation.

    (2) In all other cases than those described in division (A)(1) of this section,
    if the parties agree to use or otherwise knowingly adopt a security procedure
    to verify the person from which an electronic signature or electronic record has
    been sent, the electronic signature or electronic record is attributable to the
    person identified by the security procedure, if the person relying on the attribution
    establishes all of the following:

    (a) The security procedure is commercially reasonable.

    (b) The party accepted or relied on the electronic message in good faith and in
    compliance with the security procedure and any additional agreement with or separate
    instructions of the other party.

    (c) The security procedure indicates that the electronic message is from the person
    to which attribution is sought.

    (B) If the electronic signature or electronic record is not attributable to a
    party under section 1306.08 of the Revised Code but is attributable to the party
    under other provisions of this section, then, notwithstanding the other provisions
    of this section, the electronic signature or electronic record is not attributable
    to the party if the party establishes that the electronic signature or electronic
    record was caused directly or indirectly by a person meeting any of the following:

    (1) The person was not entrusted at any time with the right or duty to act for
    the party with respect to such electronic signature or electronic record or security
    procedure.

    (2) The person lawfully obtained access to transmitting facilities of the party,
    if such access facilitated the misuse of the security procedure.

    (3) The person obtained, from a source controlled by the party, information facilitating
    misuse of the security procedure.

    (C) If the parties use a commercially reasonable security procedure to detect
    errors or changes with respect to an electronic signature or electronic record,
    both of the following apply:

    (1) The effect of a security procedure is determined by the agreement between
    the parties, or, in the absence of an agreement, by this section or any law establishing
    the security procedure.

    (2) Unless the circumstances indicate otherwise, if a security procedure indicates
    that an electronic signature or electronic record has not been altered since a
    particular time, it shall be treated as not having been altered since that time.'
