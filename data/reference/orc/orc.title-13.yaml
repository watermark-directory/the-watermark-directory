- number: '1309.303'
  heading: Law governing perfection and priority of security interests in goods covered
    by a certificate of title - UCC 9-303
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) This section applies to goods covered by a certificate of title, even
    if there is no other relationship between the jurisdiction under whose certificate
    of title the goods are covered and the goods or the debtor.

    (B) Goods become covered by a certificate of title when a valid application for
    the certificate of title and the applicable fee are delivered to the appropriate
    authority. Goods cease to be covered by a certificate of title at the earlier
    of the time the certificate of title ceases to be effective under the law of the
    issuing jurisdiction or the time the goods become covered subsequently by a certificate
    of title issued by another jurisdiction.

    (C) The local law of the jurisdiction under whose certificate of title the goods
    are covered governs perfection, the effect of perfection or nonperfection, and
    the priority of a security interest in goods covered by a certificate of title
    from the time the goods become covered by the certificate of title until the goods
    cease to be covered by the certificate of title.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.303
- number: '1309.304'
  heading: Law governing perfection and priority of security interests in deposit
    accounts - UCC 9-304
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) The local law of a bank''s jurisdiction governs perfection, the effect
    of perfection or nonperfection, and the priority of a security interest in a deposit
    account maintained with that bank.

    (B) The following rules determine a bank''s jurisdiction for purposes of this
    section:

    (1) If an agreement between the bank and the debtor governing the deposit account
    expressly provides that a particular jurisdiction is the bank''s jurisdiction
    for purposes of this chapter or Chapters 1301. to 1305. and 1307. to 1310. of
    the Revised Code, that jurisdiction is the bank''s jurisdiction.

    (2) If division (B)(1) of this section does not apply and an agreement between
    the bank and its customer governing the deposit account expressly provides that
    the agreement is governed by the law of a particular jurisdiction, that jurisdiction
    is the bank''s jurisdiction.

    (3) If neither division (B)(1) nor (2) of this section applies and an agreement
    between the bank and its customer governing the deposit account expressly provides
    that the deposit account is maintained at an office in a particular jurisdiction,
    that jurisdiction is the bank''s jurisdiction.

    (4) If neither division (B)(1), (2), nor (3) of this section applies, the bank''s
    jurisdiction is the jurisdiction in which the office identified in an account
    statement as the office serving the customer''s account is located.

    (5) If neither division (B)(1), (2), (3), nor (4) of this section applies, the
    bank''s jurisdiction is the jurisdiction in which the chief executive office of
    the bank is located.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.304
- number: '1309.305'
  heading: Law governing perfection and priority of security interests in investment
    property - UCC 9-305
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (C) of this section, the following
    rules apply:

    (1) While a security certificate is located in a jurisdiction, the local law of
    that jurisdiction governs perfection, the effect of perfection or nonperfection,
    and the priority of a security interest in the certificated security represented
    thereby.

    (2) The local law of the issuer''s jurisdiction as specified in division (D) of
    section 1308.05 of the Revised Code governs perfection, the effect of perfection
    or nonperfection, and the priority of a security interest in an uncertificated
    security.

    (3) The local law of the securities intermediary''s jurisdiction as specified
    in division (E) of section 1308.05 of the Revised Code governs perfection, the
    effect of perfection or nonperfection, and the priority of a security interest
    in a security entitlement or securities account.

    (4) The local law of the commodity intermediary''s jurisdiction governs perfection,
    the effect of perfection or nonperfection, and the priority of a security interest
    in a commodity contract or commodity account.

    (B) The following rules determine a commodity intermediary''s jurisdiction for
    purposes of sections 1309.301 to 1309.342 of the Revised Code:

    (1) If an agreement between the commodity intermediary and commodity customer
    governing the commodity account expressly provides that a particular jurisdiction
    is the commodity intermediary''s jurisdiction for purposes of sections 1309.301
    to 1309.342 of the Revised Code, this chapter, or Chapters 1301., 1302., 1303.,
    1304., 1305., 1307., 1308., 1309., and 1310. of the Revised Code, that jurisdiction
    is the commodity intermediary''s jurisdiction.

    (2) If division (B)(1) of this section does not apply and an agreement between
    the commodity intermediary and commodity customer governing the commodity account
    expressly provides that the agreement is governed by the law of a particular jurisdiction,
    that jurisdiction is the commodity intermediary''s jurisdiction.

    (3) If neither division (B)(1) nor (2) of this section applies and an agreement
    between the commodity intermediary and commodity customer governing the commodity
    account expressly provides that the commodity account is maintained at an office
    in a particular jurisdiction, that jurisdiction is the commodity intermediary''s
    jurisdiction.

    (4) If neither division (B)(1), (2), nor (3) of this section applies, the commodity
    intermediary''s jurisdiction is the jurisdiction in which the office identified
    in an account statement as the office serving the commodity customer''s account
    is located.

    (5) If neither division (B)(1), (2), (3), nor (4) of this section applies, the
    commodity intermediary''s jurisdiction is the jurisdiction in which the chief
    executive office of the commodity intermediary is located.

    (C) The local law of the jurisdiction in which the debtor is located governs:

    (1) Perfection of a security interest in investment property by filing;

    (2) Automatic perfection of a security interest in investment property created
    by a broker or securities intermediary; and

    (3) Automatic perfection of a security interest in a commodity contract or commodity
    account created by a commodity intermediary.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.305
- number: '1309.306'
  heading: Law governing perfection and priority of security interests in letter-of-credit
    rights - UCC 9-306
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Subject to division (C) of this section, the local law of the issuer''s
    jurisdiction or a nominated person''s jurisdiction governs perfection, the effect
    of perfection or nonperfection, and the priority of a security interest in a letter-of-credit
    right if the issuer''s jurisdiction or nominated person''s jurisdiction is a state.

    (B) For purposes of sections 1309.301 to 1309.342 of the Revised Code, an issuer''s
    jurisdiction or nominated person''s jurisdiction is the jurisdiction whose law
    governs the liability of the issuer or nominated person with respect to the letter-of-credit
    right as provided in section 1305.15 of the Revised Code.

    (C) This section does not apply to a security interest that is perfected only
    under division (D) of section 1309.308 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.306
- number: '1309.307'
  heading: Location of debtor - UCC 9-307
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) As used in this section, "place of business" means a place where a debtor
    conducts the debtor''s affairs.

    (B) Except as otherwise provided in this section, the following rules determine
    a debtor''s location:

    (1) A debtor who is an individual is located at the individual''s principal residence.

    (2) A debtor that is an organization and has only one place of business is located
    at its place of business.

    (3) A debtor that is an organization and has more than one place of business is
    located at its chief executive office.

    (C) Division (B) of this section applies only if a debtor''s residence, place
    of business, or chief executive office, as applicable, is located in a jurisdiction
    whose law generally requires information concerning the existence of a nonpossessory
    security interest to be made generally available in a filing, recording, or registration
    system as a condition or result of the security interest''s obtaining priority
    over the rights of a lien creditor with respect to the collateral. If division
    (B) of this section does not apply, the debtor is located in the District of Columbia.

    (D) A person that ceases to exist, have a residence, or have a place of business
    continues to be located in the jurisdiction specified by divisions (B) and (C)
    of this section.

    (E) A registered organization that is organized under the law of a state is located
    in that state.

    (F) Except as otherwise provided in division (I) of this section, a registered
    organization that is organized under the law of the United States and a branch
    or agency of a bank that is not organized under the law of the United States or
    a state are located:

    (1) In the state that the law of the United States designates, if the law designates
    a state of location;

    (2) In the state that the registered organization, branch, or agency designates,
    if the law of the United States authorizes the registered organization, branch,
    or agency to designate its state of location, including by designating its main
    office, home office, or other comparable office; or

    (3) In the District of Columbia, if neither division (F)(1) nor (2) of this section
    applies.

    (G) A registered organization continues to be located in the jurisdiction specified
    by division (E) or (F) of this section notwithstanding:

    (1) The suspension, revocation, forfeiture, or lapse of the registered organization''s
    status in its jurisdiction of organization; or

    (2) The dissolution, winding up, or cancellation of the existence of the registered
    organization.

    (H) The United States is located in the District of Columbia.

    (I) A branch or agency of a bank that is not organized under the law of the United
    States or a state is located in the state in which the branch or agency is licensed,
    if all branches and agencies of the bank are licensed in only one state.

    (J) A foreign air carrier under the "Federal Aviation Act of 1958," 49 U.S.C.
    40102, as amended, is located at the designated office of the agent upon which
    service of process may be made on behalf of the carrier.

    (K) This section applies only for the purposes of sections 1309.301 to 1309.342
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.307
- number: '1309.308'
  heading: When security interest or agricultural lien is perfected - continuity of
    perfection - UCC 9-308
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in this section and section 1309.309 of
    the Revised Code, a security interest is perfected if it has attached and all
    of the applicable requirements for perfection in sections 1309.310 to 1309.316
    of the Revised Code have been satisfied. A security interest is perfected when
    it attaches if the applicable requirements are satisfied before the security interest
    attaches.

    (B) An agricultural lien is perfected if it has become effective and all of the
    applicable requirements for perfection in section 1309.310 of the Revised Code
    have been satisfied. An agricultural lien is perfected when it becomes effective
    if the applicable requirements are satisfied before the agricultural lien becomes
    effective.

    (C) A security interest or agricultural lien is perfected continuously if it is
    originally perfected by one method under this chapter and is later perfected by
    another method under this chapter, without an intermediate period when it was
    unperfected.

    (D) Perfection of a security interest in collateral also perfects a security interest
    in a supporting obligation for the collateral.

    (E) Perfection of a security interest in a right to payment or performance also
    perfects a security interest in a security interest, mortgage, or other lien on
    personal or real property securing the right.

    (F) Perfection of a security interest in a securities account also perfects a
    security interest in the security entitlements carried in the securities account.

    (G) Perfection of a security interest in a commodity account also perfects a security
    interest in the commodity contracts carried in the commodity account.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.308
- number: '1309.309'
  heading: Security interest perfected upon attachment - UCC 9-309
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'The following security interests are perfected when they attach:

    (A) A purchase money security interest in consumer goods, except as otherwise
    provided in division (B) of section 1309.311 of the Revised Code with respect
    to consumer goods that are subject to a statute or treaty described in division
    (A) of section 1309.311 of the Revised Code;

    (B) An assignment of accounts or payment intangibles that does not by itself or
    in conjunction with other assignments to the same assignee transfer a significant
    part of the assignor''s outstanding accounts or payment intangibles;

    (C) A sale of a payment intangible;

    (D) A sale of a promissory note;

    (E) A security interest created by the assignment of a health-care-insurance receivable
    to the provider of the health-care goods or services;

    (F) A security interest arising under section 1302.42, 1302.49, division (C) of
    section 1302.85, or division (E) of section 1310.54 of the Revised Code, until
    the debtor obtains possession of the collateral;

    (G) A security interest of a collecting bank arising under section 1304.20 of
    the Revised Code;

    (H) A security interest of an issuer or nominated person arising under section
    1305.18 of the Revised Code;

    (I) A security interest arising in the delivery of a financial asset under division
    (C) of section 1309.206 of the Revised Code;

    (J) A security interest in investment property created by a broker or securities
    intermediary;

    (K) A security interest in a commodity contract or a commodity account created
    by a commodity intermediary;

    (L) An assignment for the benefit of all creditors of the transferor and subsequent
    transfers by the assignee thereunder; and

    (M) A security interest created by an assignment of a beneficial interest in a
    decedent''s estate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.309
- number: '1309.310'
  heading: When filing required to perfect security interest or agricultural lien
    - security interests and agricultural liens to which filing provisions do not
    apply - UCC 9-310
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (B) of this section and division
    (B) of section 1309.312 of the Revised Code, a financing statement must be filed
    to perfect all security interests and agricultural liens.

    (B) The filing of a financing statement is not necessary to perfect a security
    interest:

    (1) That is perfected under division (D), (E), (F), or (G) of section 1309.308
    of the Revised Code;

    (2) That is perfected under section 1309.309 of the Revised Code when it attaches;

    (3) In property subject to a statute, regulation, or treaty described in division
    (A) of section 1309.311 of the Revised Code;

    (4) In goods in possession of a bailee which is perfected under division (D)(1)
    or (2) of section 1309.312 of the Revised Code;

    (5) In certificated securities, documents, goods, or instruments which is perfected
    without filing, control, or possession under division (E), (F), or (G) of section
    1309.312 of the Revised Code;

    (6) In collateral in the secured party''s possession under section 1309.313 of
    the Revised Code;

    (7) In a certificated security perfected by delivery of the security certificate
    to the secured party under section 1309.313 of the Revised Code;

    (8) In deposit accounts, electronic chattel paper, electronic documents, investment
    property, or letter-of-credit rights perfected by control under section 1309.314
    of the Revised Code;

    (9) In proceeds which is perfected under section 1309.315 of the Revised Code;
    or

    (10) That is perfected under section 1309.316 of the Revised Code.

    (C) If a secured party assigns a perfected security interest or agricultural lien,
    a filing under this chapter is not required to continue the perfected status of
    the security interest against creditors of and transferees from the original debtor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.310
- number: '1309.311'
  heading: Perfection of security interests in property subject to certain statutes,
    regulations, and treaties - UCC 9-311
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (D) of this section, the filing
    of a financing statement is not necessary or effective to perfect a security interest
    in property subject to:

    (1) A statute, regulation, or treaty of the United States whose requirements for
    a security interest''s obtaining priority over the rights of a lien creditor with
    respect to the property preempt division (A) of section 1309.310 of the Revised
    Code;

    (2) Chapters 1547., 1548., 4505., 4519., and 5309. of the Revised Code;

    (3) A statute of another jurisdiction that provides for a security interest to
    be indicated on a certificate of title as a condition or result of the security
    interest''s obtaining priority over the rights of a lien creditor with respect
    to the property.

    (B) Compliance with the requirements of a statute, regulation, or treaty described
    in division (A) of this section for obtaining priority over the rights of a lien
    creditor is equivalent to the filing of a financing statement under this chapter.
    Except as otherwise provided in division (D) of this section, section 1309.313,
    and divisions (D) and (E) of section 1309.316 of the Revised Code for goods covered
    by a certificate of title, a security interest in property subject to a statute,
    regulation, or treaty described in division (A) of this section may be perfected
    only by compliance with those requirements, and a security interest so perfected
    remains perfected notwithstanding a change in the use or transfer of possession
    of the collateral.

    (C) Except as otherwise provided in division (D) of this section and divisions
    (D) and (E) of section 1309.316 of the Revised Code, duration and renewal of perfection
    of a security interest perfected by compliance with the requirements prescribed
    by a statute, regulation, or treaty described in division (A) of this section
    are governed by the statute, regulation, or treaty. In other respects, the security
    interest is subject to this chapter.

    (D) During any period in which collateral subject to a statute specified in division
    (A)(2) of this section is inventory held for sale or lease by a person or leased
    by that person as lessor and that person is in the business of selling goods of
    that kind, this section does not apply to a security interest in that collateral
    created by that person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.311
- number: '1309.312'
  heading: Perfection of security interests - UCC 9-312
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest in chattel paper, negotiable documents, instruments,
    or investment property may be perfected by filing.

    (B) Except as otherwise provided in divisions (C) and (D) of section 1309.315
    of the Revised Code for proceeds:

    (1) A security interest in a deposit account may be perfected only by control
    under section 1309.314 of the Revised Code;

    (2) And except as otherwise provided in division (D) of section 1309.308 of the
    Revised Code, a security interest in a letter-of-credit right may be perfected
    only by control under section 1309.314 of the Revised Code; and

    (3) A security interest in money may be perfected only by the secured party''s
    taking possession under section 1309.313 of the Revised Code.

    (C) While goods are in the possession of a bailee that has issued a negotiable
    document covering the goods:

    (1) A security interest in the goods may be perfected by perfecting a security
    interest in the document; and

    (2) A security interest perfected in the document has priority over any security
    interest that becomes perfected in the goods by another method during that time.

    (D) While goods are in the possession of a bailee that has issued a non-negotiable
    document covering the goods, a security interest in the goods may be perfected
    by:

    (1) Issuance of a document in the name of the secured party;

    (2) The bailee''s receipt of notification of the secured party''s interest; or

    (3) Filing as to the goods.

    (E) A security interest in certificated securities, or negotiable documents, or
    instruments is perfected without filing or the taking of possession or control
    for a period of twenty days from the time it attaches to the extent that it arises
    for new value given under an authenticated security agreement.

    (F) A perfected security interest in a negotiable document or goods in possession
    of a bailee, other than one that has issued a negotiable document for the goods,
    remains perfected for a period of twenty days without filing if the secured party
    makes available to the debtor the goods or documents representing the goods for
    the purpose of:

    (1) Ultimate sale or exchange; or

    (2) Loading, unloading, storing, shipping, trans-shipping, manufacturing, processing,
    or otherwise dealing with them in a manner preliminary to their sale or exchange.

    (G) A perfected security interest in an instrument or certificated security remains
    perfected for twenty days without filing if the secured party delivers the security
    certificate or instrument to the debtor for the purpose of:

    (1) Ultimate sale or exchange; or

    (2) Presentation, collection, enforcement, renewal, or registration of transfer.

    (H) After the twenty-day period specified in divisions (E), (F), or (G) of this
    section expires, perfection depends upon compliance with this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.312
- number: '1309.313'
  heading: When possession by or delivery to secured party perfects security interest
    without filing - UCC 9-313
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (B) of this section, a secured
    party may perfect a security interest in tangible negotiable documents, goods,
    instruments, money, or tangible chattel paper by taking possession of the collateral.
    A secured party may perfect a security interest in certificated securities by
    taking delivery of the certificated securities under section 1308.27 of the Revised
    Code.

    (B) With respect to goods covered by a certificate of title issued by this state,
    a secured party may perfect a security interest in the goods by taking possession
    of the goods only in the circumstances described in division (D) of section 1309.316
    of the Revised Code.

    (C) With respect to collateral other than certificated securities and goods covered
    by a document, a secured party takes possession of collateral in the possession
    of a person other than the debtor, the secured party, or a lessee of the collateral
    from the debtor in the ordinary course of the debtor''s business, when:

    (1) The person in possession authenticates a record acknowledging that the person
    holds possession of the collateral for the secured party''s benefit; or

    (2) The person takes possession of the collateral after having authenticated a
    record acknowledging that the person will hold possession of collateral for the
    secured party''s benefit.

    (D) If perfection of a security interest depends upon possession of the collateral
    by a secured party, perfection occurs no earlier than the time the secured party
    takes possession and continues only while the secured party retains possession.

    (E) A security interest in a certificated security in registered form is perfected
    by delivery when delivery of the certificated security occurs under section 1308.27
    of the Revised Code and remains perfected by delivery until the debtor obtains
    possession of the security certificate.

    (F) A person in possession of collateral is not required to acknowledge that the
    person holds possession for a secured party''s benefit.

    (G) If a person acknowledges that the person holds possession for the secured
    party''s benefit:

    (1) The acknowledgment is effective under division (C) of this section or division
    (A) of section 1308.27 of the Revised Code, even if the acknowledgment violates
    the rights of a debtor; and

    (2) Unless the person otherwise agrees or law other than this chapter otherwise
    provides, the person does not owe any duty to the secured party and is not required
    to confirm the acknowledgment to another person.

    (H) A secured party having possession of collateral does not relinquish possession
    by delivering the collateral to a person other than the debtor or a lessee of
    the collateral from the debtor in the ordinary course of the debtor''s business
    if the person was instructed before the delivery or is instructed contemporaneously
    with the delivery:

    (1) To hold possession of the collateral for the secured party''s benefit; or

    (2) To redeliver the collateral to the secured party.

    (I) A secured party does not relinquish possession, even if a delivery under division
    (H) of this section violates the rights of a debtor. A person to whom collateral
    is delivered under division (H) of this section does not owe any duty to the secured
    party and is not required to confirm the delivery to another person unless the
    person otherwise agrees or law other than this chapter otherwise provides.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.313
- number: '1309.314'
  heading: Perfection by control - UCC 9-314
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest in investment property, deposit accounts, letter-of-credit
    rights, electronic chattel paper, or electronic documents may be perfected by
    control of the collateral under section 1307.106, 1309.104, 1309.105, 1309.106,
    or 1309.107 of the Revised Code.

    (B) A security interest in deposit accounts, electronic chattel paper, letter-of-credit
    rights, or electronic documents is perfected by control under section 1307.106,
    1309.104, 1309.105, or 1309.107 of the Revised Code when the secured party obtains
    control and remains perfected by control only while the secured party retains
    control.

    (C) A security interest in investment property is perfected by control under section
    1309.106 of the Revised Code from the time the secured party obtains control and
    remains perfected by control until:

    (1) The secured party does not have control; and

    (2) One of the following occurs:

    (a) If the collateral is a certificated security, the debtor has or acquires possession
    of the security certificate;

    (b) If the collateral is an uncertificated security, the issuer has registered
    or registers the debtor as the registered owner; or

    (c) If the collateral is a security entitlement, the debtor is or becomes the
    entitlement holder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.314
- number: '1309.315'
  heading: Secured party's rights on disposition of collateral and in proceeds - UCC
    9-315
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in this chapter and in division (B) of section
    1302.44 of the Revised Code:

    (1) A security interest or agricultural lien continues in collateral notwithstanding
    sale, lease, license, exchange, or other disposition thereof unless the secured
    party authorized the disposition free of the security interest or agricultural
    lien; and

    (2) A security interest attaches to any identifiable proceeds of collateral.

    (B) Proceeds that are commingled with other property are identifiable proceeds:

    (1) If the proceeds are goods, to the extent provided by section 1309.336 of the
    Revised Code; and

    (2) If the proceeds are not goods, to the extent that the secured party identifies
    the proceeds by a method of tracing, including application of equitable principles,
    that is permitted under law other than this chapter with respect to commingled
    property of the type involved.

    (C) A security interest in proceeds is a perfected security interest if the security
    interest in the original collateral was perfected.

    (D) A perfected security interest in proceeds becomes unperfected on the twenty-first
    day after the security interest attaches to the proceeds unless:

    (1) The following conditions are satisfied:

    (a) A filed financing statement covers the original collateral;

    (b) The proceeds are collateral in which a security interest may be perfected
    by filing in the office in which the financing statement has been filed; and

    (c) The proceeds are not acquired with cash proceeds.

    (2) The proceeds are identifiable cash proceeds; or

    (3) The security interest in the proceeds is perfected other than under division
    (C) of this section when the security interest attaches or within twenty days
    thereafter.

    (E) If a filed financing statement covers the original collateral, a security
    interest in proceeds that remains perfected under division (D)(1) of this section
    becomes unperfected at the later of:

    (1) When the effectiveness of the filed financing statement lapses under section
    1309.515 of the Revised Code or is terminated under section 1309.513 of the Revised
    Code; or

    (2) The twenty-first day after the security interest attaches to the proceeds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.315
- number: '1309.316'
  heading: Continued perfection of security interest following change in governing
    law - UCC 9-316
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest perfected pursuant to the law of the jurisdiction
    designated in division (A) of section 1309.301 or division (C) of section 1309.305
    of the Revised Code remains perfected until the earliest of:

    (1) The time perfection would have ceased under the law of that jurisdiction;

    (2) The expiration of four months after a change of the debtor''s location to
    another jurisdiction; or

    (3) The expiration of one year after a transfer of collateral to a person that
    thereby becomes a debtor and is located in another jurisdiction.

    (B) If a security interest described in division (A) of this section becomes perfected
    under the law of the other jurisdiction before the earliest time or event described
    in that division, it remains perfected thereafter. If the security interest does
    not become perfected under the law of the other jurisdiction before that earliest
    time or event, it becomes unperfected and is deemed never to have been perfected
    as against a purchaser of the collateral for value.

    (C) A possessory security interest in collateral, other than goods covered by
    a certificate of title and as-extracted collateral consisting of goods, remains
    continuously perfected if:

    (1) The collateral is located in one jurisdiction and subject to a security interest
    perfected under the law of that jurisdiction;

    (2) Thereafter, the collateral is brought into another jurisdiction; and

    (3) Upon entry into the other jurisdiction, the security interest is perfected
    under the law of the other jurisdiction.

    (D) Except as otherwise provided in division (E) of this section, a security interest
    in goods covered by a certificate of title that is perfected by any method under
    the law of another jurisdiction when the goods become covered by a certificate
    of title from this state remains perfected until the security interest would have
    become unperfected under the law of the other jurisdiction had the goods not become
    so covered.

    (E) A security interest described in division (D) of this section becomes unperfected
    as against a purchaser of the goods for value and is deemed never to have been
    perfected as against a purchaser of the goods for value if the applicable requirements
    for perfection under division (B) of section 1309.311 or section 1309.313 of the
    Revised Code are not satisfied before the earlier of:

    (1) The time the security interest would have become unperfected under the law
    of the other jurisdiction had the goods not become covered by a certificate of
    title from this state; or

    (2) The expiration of four months after the goods had become so covered.

    (F) A security interest in deposit accounts, letter-of-credit rights, or investment
    property that is perfected under the law of the bank''s jurisdiction, the issuer''s
    jurisdiction, a nominated person''s jurisdiction, the securities intermediary''s
    jurisdiction, or the commodity intermediary''s jurisdiction, as applicable, remains
    perfected until the earlier of:

    (1) The time the security interest would have become unperfected under the law
    of that jurisdiction; or

    (2) The expiration of four months after a change of the applicable jurisdiction
    to another jurisdiction.

    (G) If a security interest described in division (F) of this section becomes perfected
    under the law of the other jurisdiction before the earlier of the time or the
    end of the period described in that division, it remains perfected thereafter.
    If the security interest does not become perfected under the law of the other
    jurisdiction before the earlier of that time or the end of that period, it becomes
    unperfected and is deemed never to have been perfected as against a purchaser
    of the collateral for value.

    (H) The following rules apply to collateral to which a security interest attaches
    within four months after the debtor changes its location to another jurisdiction:

    (1) A financing statement filed before the change pursuant to the law of the jurisdiction
    designated in division (A) of section 1309.301 or division (C) of section 1309.305
    of the Revised Code is effective to perfect a security interest in the collateral
    if the financing statement would have been effective to perfect a security interest
    in the collateral had the debtor not changed its location.

    (2) If a security interest perfected by a financing statement that is effective
    under division (H)(1) of this section becomes perfected under the law of the other
    jurisdiction before the earlier of the time the financing statement would have
    become ineffective under the law of the jurisdiction designated in division (A)
    of section 1309.301 or division (C) of section 1309.305 of the Revised Code or
    the expiration of the four-month period, it remains perfected thereafter. If the
    security interest does not become perfected under the law of the other jurisdiction
    before the earlier time or event, it becomes unperfected and is deemed never to
    have been perfected as against a purchaser of the collateral for value.

    (I) If a financing statement naming an original debtor is filed pursuant to the
    law of the jurisdiction designated in division (A) of section 1309.301 or division
    (C) of section 1309.305 of the Revised Code and the new debtor is located in another
    jurisdiction, the following rules apply:

    (1) The financing statement is effective to perfect a security interest in collateral
    acquired by the new debtor before, and within four months after, the new debtor
    becomes bound under division (D) of section 1309.203 of the Revised Code, if the
    financing statement would have been effective to perfect a security interest in
    the collateral had the collateral been acquired by the original debtor.

    (2) A security interest perfected by the financing statement and that becomes
    perfected under the law of the other jurisdiction before the earlier of the time
    the financing statement would have become ineffective under the law of the jurisdiction
    designated in division (A) of section 1309.301 or division (C) of section 1309.305
    of the Revised Code or the expiration of the four-month period remains perfected
    thereafter. A security interest that is perfected by the financing statement but
    that does not become perfected under the law of the other jurisdiction before
    the earlier time or event becomes unperfected and is deemed never to have been
    perfected as against a purchaser of the collateral for value.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.316
- number: '1309.317'
  heading: Interests that take priority over or take free of unperfected security
    interest or agricultural lien - UCC 9-317
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest or agricultural lien is subordinate to the rights
    of:

    (1) A person entitled to priority under section 1309.322 of the Revised Code;
    and

    (2) Except as otherwise provided in division (E) of this section, a person who
    becomes a lien creditor before the earlier of the time:

    (a) The security interest or agricultural lien is perfected; or

    (b) One of the conditions specified in division (B)(3) of section 1309.203 of
    the Revised Code is met and a financing statement covering the collateral is filed.

    (B) Except as otherwise provided in division (E) of this section, a buyer, other
    than a secured party, of tangible chattel paper, tangible documents, goods, instruments,
    or a certificated security takes free of a security interest or agricultural lien
    if the buyer gives value and receives delivery of the collateral without knowledge
    of the security interest or agricultural lien and before it is perfected.

    (C) Except as otherwise provided in division (E) of this section, a lessee of
    goods takes free of a security interest or agricultural lien if the lessee gives
    value and receives delivery of the collateral without knowledge of the security
    interest or agricultural lien and before it is perfected.

    (D) A licensee of a general intangible or a buyer, other than a secured party,
    of collateral other than tangible chattel paper, tangible documents, goods, instruments,
    or a certificated security takes free of a security interest if the licensee or
    buyer gives value without knowledge of the security interest and before it is
    perfected.

    (E) Except as otherwise provided in sections 1309.320 and 1309.321 of the Revised
    Code, if a person files a financing statement with respect to a purchase money
    security interest before or within twenty days after the debtor receives delivery
    of the collateral, the security interest takes priority over the rights of a buyer,
    lessee, or lien creditor that arise between the time the security interest attaches
    and the time of filing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.317
- number: '1309.318'
  heading: No interest retained in right to payment that is sold - rights and title
    of seller of account or chattel paper with respect to creditors and purchasers
    - UCC 9-318
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A debtor that has sold an account, chattel paper, payment intangible,
    or promissory note does not retain a legal or equitable interest in the collateral
    sold.

    (B) For purposes of determining the rights of creditors of, and purchasers for
    value of an account or chattel paper from, a debtor that has sold an account or
    chattel paper while the buyer''s security interest is unperfected, the debtor
    is deemed to have rights and title to the account or chattel paper identical to
    those the debtor sold.'
  history: null
