  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.77
- number: '1321.78'
  heading: Premium finance agreement; notice to insurer
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A premium finance agreement shall:

    (1) Be dated, signed by the insured, and the printed portion thereof shall be
    in at least eight-point type;

    (2) Contain the name and place of business of the insurance agent or broker negotiating
    the related insurance contract, the name and residence or the place of business
    of the insured as specified by him, the name and address of the premium finance
    company, and a description of the insurance contracts involved and the amount
    of the premium therefor;

    (3) Set forth any charges the premium finance company elects to charge under sections
    1321.79, 1321.791, and 1321.80 of the Revised Code.

    (B) The premium finance company, agent, or agency shall deliver to the insured
    or send by regular mail to the insured at the address provided in the agreement,
    a complete copy of the premium finance agreement.

    (C) A premium finance company shall give notice of its financing to the insurer
    not later than the thirtieth day after the date on which the premium financing
    agreement is accepted by the premium finance company. A notice given under this
    section shall be effective whether or not the insurer''s policy number is set
    forth in the notice.

    (D) Notwithstanding divisions (C) and (D) of section 1321.72 of the Revised Code,
    in the case of a life insurance policy, any premium finance company shall give
    notice of its financing to the insurer either prior to the issuance of the life
    insurance policy if the financing agreement is accepted prior to the issuance
    of the policy or prior to the completion of the premium financing transaction
    if the financing agreement is accepted after the issuance of the policy.

    (E) If premium financing is used in connection with a life insurance policy, and
    the premium finance company fails to provide notice of its financing to the insurer
    pursuant to division (D) of this section, the premium financing agreement is unenforceable
    as a matter of public policy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.78
- number: '1321.79'
  heading: Insurance premium finance company finance charge limits
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A premium finance company shall not charge, contract for, receive, or
    collect a finance charge other than as permitted by sections 1321.71 to 1321.83
    of the Revised Code.

    (B) The finance charge shall be computed on the balance of the premium due, after
    subtracting the down payment made by the insured in accordance with the premium
    finance agreement, from the effective date of the insurance coverage, for which
    the premium is being advanced, to and including the date when the final installment
    of the premium finance agreement is payable, without regard to any requirement
    for installment payments.

    (C) The finance charge shall be computed at a maximum rate of twelve dollars per
    one hundred dollars per year, plus an acquisition charge of twenty dollars per
    premium finance agreement which need not be refunded upon cancellation or prepayment.
    However, if the insurance policies described in the premium finance agreement
    are primarily for other than personal, family, or household purposes, the licensee
    may contract for and receive any finance charge agreed to in writing by the licensee
    and the insured.

    (D)(1) Notwithstanding any provision in a premium finance agreement to the contrary,
    any insured may prepay his obligation under a premium finance agreement in full
    at any time before the final payment is due. In such event any unearned finance
    charge shall be refunded by the insurance premium finance company. The amount
    of any refund shall be calculated in accordance with the rule commonly known as
    the "rule of 78" or any other method more beneficial to the insured. A refund
    calculated in accordance with the "rule of 78" shall represent at least as great
    a proportion of the finance charge, if any, as the sum of the periodic balances
    at the nearest installment due date to the date on which prepayment is made bears
    to the sum of all periodic balances under the original schedule of payments in
    the agreement. If the amount of any refund computed under division (D)(1) of this
    section is less than three dollars, no refund need be made.

    (2) With respect to any premium finance agreement that is cancelled, the unearned
    finance charge shall be refunded in the same manner as set forth in division (D)(1)
    of this section. If the balance due on such an agreement is not paid in full,
    the licensee may earn interest at the rate stated in the agreement until paid
    in full.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.79
- number: '1321.791'
  heading: Insurance premium finance company alternative finance charges
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: As an alternative to the finance charges permitted by division (C) of section
    1321.79 of the Revised Code, a premium finance company may contract for and receive
    finance charges at any rate or rates agreed upon or consented to by the parties
    to the premium finance agreement or revolving credit premium finance agreement,
    but not exceeding an annual percentage rate of twenty-five per cent.
