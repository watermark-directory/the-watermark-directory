- number: '1309.203'
  heading: Attachment and enforceability of security interest - proceeds - supporting
    obligation - formal requisites - UCC 9-203
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest attaches to collateral when it becomes enforceable
    against the debtor with respect to the collateral, unless an agreement expressly
    postpones the time of attachment.

    (B) Except as otherwise provided in divisions (C) to (I) of this section, a security
    interest is enforceable against the debtor and third parties with respect to the
    collateral only if:

    (1) Value has been given;

    (2) The debtor has rights in the collateral or the power to transfer rights in
    the collateral to a secured party; and

    (3) One of the following conditions is met:

    (a) The debtor has authenticated a security agreement that provides a description
    of the collateral and, if the security interest covers timber to be cut, a description
    of the land concerned;

    (b) The collateral is not a certificated security and is in the possession of
    the secured party under section 1309.313 of the Revised Code pursuant to the debtor''s
    security agreement;

    (c) The collateral is a certificated security in registered form and the security
    certificate has been delivered to the secured party under section 1308.27 of the
    Revised Code pursuant to the debtor''s security agreement; or

    (d) The collateral is deposit accounts, electronic chattel paper, investment property,
    letter-of-credit rights, or electronic documents, and the secured party has control
    under section 1307.106, 1309.104, 1309.105, 1309.106, or 1309.107 of the Revised
    Code pursuant to the debtor''s security agreement.

    (C) Division (B) of this section is subject to section 1304.20 of the Revised
    Code on the security interest of a collecting bank, section 1305.18 of the Revised
    Code on the security interest of a letter-of-credit issuer or nominated person,
    section 1309.110 of the Revised Code on a security interest arising under Chapter
    1302. or 1310. of the Revised Code, and section 1309.206 of the Revised Code on
    security interests in investment property.

    (D) A person becomes bound as debtor by a security agreement entered into by another
    person if, by operation of law other than this article or by contract:

    (1) The security agreement becomes effective to create a security interest in
    the person''s property; or

    (2) The person becomes generally obligated for the obligations of the other person,
    including the obligation secured under the security agreement, and acquires or
    succeeds to all or substantially all of the assets of the other person.

    (E) If a new debtor becomes bound as debtor by a security agreement entered into
    by another person:

    (1) The agreement satisfies division (B)(3) of this section with respect to existing
    or after-acquired property of the new debtor to the extent the property is described
    in the agreement; and

    (2) Another agreement is not necessary to make a security interest in the property
    enforceable.

    (F) The attachment of a security interest in collateral gives the secured party
    the rights to proceeds provided by section 1309.315 of the Revised Code and is
    also attachment of a security interest in a supporting obligation for the collateral.

    (G) The attachment of a security interest in a right to payment or performance
    secured by a security interest or other lien on personal or real property is also
    attachment of a security interest in the security interest, mortgage, or other
    lien.

    (H) The attachment of a security interest in a securities account is also attachment
    of a security interest in the security entitlements carried in the securities
    account.

    (I) The attachment of a security interest in a commodity account is also attachment
    of a security interest in the commodity contracts carried in the commodity account.'
