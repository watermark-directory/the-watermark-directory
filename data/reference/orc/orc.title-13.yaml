- number: '1309.325'
  heading: Priority of security interests in transferred collateral - UCC 9-325
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (B) of this section, a security
    interest created by a debtor is subordinate to a security interest in the same
    collateral created by another person if:

    (1) The debtor acquired the collateral subject to the security interest created
    by the other person;

    (2) The security interest created by the other person was perfected when the debtor
    acquired the collateral; and

    (3) There is no period thereafter when the security interest is unperfected.

    (B) Division (A) of this section subordinates a security interest only if the
    security interest:

    (1) Otherwise would have priority solely under division (A) of section 1309.322
    or section 1309.324 of the Revised Code; or

    (2) Arose solely under division (C) of section 1302.85 or division (E) of section
    1310.54 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.325
- number: '1309.326'
  heading: Priority of security interests created by new debtor - UCC 9-326
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Subject to division (B) of this section, a security interest that is
    created by a new debtor in collateral in which the new debtor has or acquires
    rights and is perfected solely by a filed financing statement that would be ineffective
    to perfect the security interest but for the application of division (I)(1) of
    section 1309.316 of the Revised Code or section 1309.508 of the Revised Code is
    subordinate to a security interest in the same collateral that is perfected other
    than by such a filed financing statement.

    (B) Sections 1309.301 to 1309.342 of the Revised Code determine the priority among
    conflicting security interests in the same collateral perfected by filed financing
    statements described in division (A) of this section. However, if the security
    agreements to which a new debtor became bound as debtor were not entered into
    by the same original debtor, the conflicting security interests rank according
    to priority in time of the new debtor''s having become bound.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.326
- number: '1309.327'
  heading: Priority of security interests in deposit account - UCC 9-327
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'The following rules govern priority among conflicting security interests
    in the same deposit account:

    (A) A security interest held by a secured party having control of the deposit
    account under section 1309.104 of the Revised Code has priority over a conflicting
    security interest held by a secured party that does not have control.

    (B) Except as otherwise provided in divisions (C) and (D) of this section, security
    interests perfected by control under section 1309.314 of the Revised Code rank
    according to priority in time of obtaining control.

    (C) Except as otherwise provided in division (D) of this section, a security interest
    held by the bank with which the deposit account is maintained has priority over
    a conflicting security interest held by another secured party.

    (D) A security interest perfected by control under division (A)(3) of section
    1309.104 of the Revised Code has priority over a security interest held by the
    bank with which the deposit account is maintained.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.327
- number: '1309.328'
  heading: Priority of security interests in investment property - UCC 9-328
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'The following rules govern priority among conflicting security interests
    in the same investment property:

    (A) A security interest held by a secured party having control of investment property
    under section 1309.106 of the Revised Code has priority of a security interest
    held by a secured party that does not have control of the investment property.

    (B) Except as otherwise provided in divisions (C) and (D) of this section, conflicting
    security interests held by secured parties each of which has control under section
    1309.106 of the Revised Code rank according to priority in time of:

    (1) If the collateral is a security, obtaining control;

    (2) If the collateral is a security entitlement carried in a securities account
    and:

    (a) If the secured party obtained control under division (D)(1) of section 1308.24
    of the Revised Code, the secured party''s becoming the person for which the securities
    account is maintained;

    (b) If the secured party obtained control under division (D)(2) of section 1308.24
    of the Revised Code, the securities intermediary''s agreement to comply with the
    secured party''s entitlement orders with respect to security entitlements carried
    or to be carried in the securities account; or

    (c) If the secured party obtained control through another person under division
    (D)(3) of section 1308.24 of the Revised Code, the time on which priority would
    be based under this paragraph if the other person were the secured party; or

    (3) If the collateral is a commodity contract carried with a commodity intermediary,
    the satisfaction of the requirement for control specified in division (B)(2) of
    section 1309.106 of the Revised Code with respect to commodity contracts carried
    or to be carried with the commodity intermediary.

    (C) A security interest held by a securities intermediary in a security entitlement
    or a securities account maintained with the securities intermediary has priority
    over a conflicting security interest held by another secured party.

    (D) A security interest held by a commodity intermediary in a commodity contract
    or a commodity account maintained with the commodity intermediary has priority
    over a conflicting security interest held by another secured party.

    (E) A security interest in a certificated security in registered form that is
    perfected by taking delivery under division (A) of section 1309.313 of the Revised
    Code and not by control under section 1309.314 of the Revised Code has priority
    over a conflicting security interest perfected by a method other than control.

    (F) Conflicting security interests created by a broker, a securities intermediary,
    or a commodity intermediary that are perfected without control under section 1309.106
    of the Revised Code rank equally.

    (G) In all other cases, priority between conflicting security interests in investment
    property is governed by sections 1309.322 and 1309.323 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.328
- number: '1309.329'
  heading: Priority of security interests in letter-of-credit right - UCC 9-329
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'The following govern priority among conflicting security interests in the
    same letter-of-credit right:

    (A) A security interest held by a secured party having control of the letter-of-credit
    right under section 1309.107 of the Revised Code has priority to the extent of
    its control over a conflicting security interest held by a secured party that
    does not have control.

    (B) Security interests perfected by control under section 1309.314 of the Revised
    Code rank according to priority in time of obtaining control.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.329
- number: '1309.330'
  heading: Priority of purchases of chattel paper or instrument - UCC 9-330
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A purchaser of chattel paper has priority over a security interest in
    the chattel paper that is claimed merely as proceeds of inventory subject to a
    security interest if:

    (1) In good faith and in the ordinary course of the purchaser''s business, the
    purchaser gives new value and takes possession of the chattel paper or obtains
    control of the chattel paper under section 1309.105 of the Revised Code; and

    (2) The chattel paper does not indicate that it has been assigned to an identified
    assignee other than the purchaser.

    (B) A purchaser of chattel paper has priority over a security interest in the
    chattel paper that is claimed other than merely as proceeds of inventory subject
    to a security interest if the purchaser gives new value and takes possession of
    the chattel paper or obtains control of the chattel paper under section 1309.105
    of the Revised Code in good faith, in the ordinary course of the purchaser''s
    business, and without knowledge that the purchase violates the rights of the secured
    party.

    (C) Except as otherwise provided in section 1309.327 of the Revised Code, a purchaser
    having priority in chattel paper under division (A) or (B) of this section also
    has priority in proceeds of the chattel paper to the extent that:

    (1) Section 1309.322 of the Revised Code provides for priority in the proceeds;
    or

    (2) The proceeds consist of the specific goods covered by the chattel paper or
    cash proceeds of the specific goods, even if the purchaser''s security interest
    in the proceeds is unperfected.

    (D) Except as otherwise provided in division (A) of section 1309.331 of the Revised
    Code, a purchaser of an instrument has priority over a security interest in the
    instrument perfected by a method other than possession if the purchaser gives
    value and takes possession of the instrument in good faith and without knowledge
    that the purchase violates the rights of the secured party.

    (E) For purposes of divisions (A) and (B) of this section, the holder of a purchase
    money security interest in inventory gives new value for chattel paper constituting
    proceeds of the inventory.

    (F) For purposes of divisions (B) and (D) of this section, if chattel paper or
    an instrument indicates that it has been assigned to an identified secured party
    other than the purchaser, a purchaser of the chattel paper or instrument has knowledge
    that the purchase violates the rights of the secured party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.330
- number: '1309.331'
  heading: Priority of rights of purchasers of instruments, documents, and securities
    under other chapters - priority of interests in financial assets and security
    entitlements under Chapter 1308 - UCC 9-331
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) This chapter does not limit the rights of a holder in due course of a
    negotiable instrument, as defined in section 1303.32 of the Revised Code, or a
    holder to whom a negotiable document of title has been duly negotiated under section
    1307.501 of the Revised Code, or a protected purchaser of a security under section
    1308.17 of the Revised Code. These holders or purchasers take priority over an
    earlier security interest, even though perfected, to the extent provided in Chapters
    1303., 1307., and 1308. of the Revised Code.

    (B) This chapter does not limit the rights of or impose liability on a person
    to the extent that the person is protected against the assertion of a claim under
    Chapter 1308. of the Revised Code.

    (C) Filing under this chapter does not constitute notice of a claim or defense
    to the holders, purchasers, or persons described in divisions (A) and (B) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.331
- number: '1309.332'
  heading: Transfer of money - transfer of funds from deposit account - UCC 9-332
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A transferee of money takes the money free of a security interest unless
    the transferee acts in collusion with the debtor in violating the rights of the
    secured party.

    (B) A transferee of funds from a deposit account takes the funds free of a security
    interest in the deposit account unless the transferee acts in collusion with the
    debtor in violating the rights of the secured party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.332
- number: '1309.333'
  heading: Priority of certain liens arising by operation of law - UCC 9-333
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) As used in this section, "possessory lien" means an interest, other than
    a security interest or an agricultural lien:

    (1) That secures payment or performance of an obligation for services or materials
    furnished with respect to goods by a person in the ordinary course of the person''s
    business;

    (2) That is created by statute or rule of law in favor of the person; and

    (3) Whose effectiveness depends on the person''s possession of the goods.

    (B) A possessory lien on goods has priority over a security interest in the goods
    unless the lien is created by a statute that expressly provides otherwise.'
