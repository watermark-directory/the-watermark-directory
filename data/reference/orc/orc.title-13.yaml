- number: '1334.03'
  heading: Prohibitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: 'In connection with the sale or lease of a business opportunity plan, no seller
    or broker shall:

    (A) Make any oral, written, or visual representation to a prospective purchaser
    concerning potential sales, income, or gross or net profit, unless:

    (1) The seller possesses data to substantiate the representation and provides
    the data in writing to the prospective purchaser at least ten business days prior
    to the execution of an agreement selling or leasing the business opportunity plan;

    (2) The written data provided by the seller discloses at least:

    (a) The length of time the seller has been selling or leasing the specific business
    opportunity plan offered;

    (b) The number of purchasers known to the seller to have made at least the same
    sales, income, or profit, from that business opportunity plan, and the percentage
    that number bears to the total number of purchasers of that business opportunity
    plan;

    (c) The following notice in at least ten-point boldface type:

    "CAUTION

    Some business opportunity plans have earned this amount. There is no assurance
    you will do as well. If you rely upon our figures, you must accept the risk of
    not doing as well."

    (B) Make any false or misleading statement or engage in any deceptive or unconscionable
    act or practice;

    (C) Make any representation that is inconsistent with the disclosures required
    by section 1334.02 of the Revised Code and division (A) of this section;

    (D) Fail to maintain a complete set of books, records, and accounts with respect
    to each business opportunity plan sold or leased for a period of five years from
    the date an agreement selling or leasing the business opportunity plan is executed;

    (E) Accept, as a down payment, before the goods that are necessary to begin the
    business opportunity plan are delivered to the purchaser, a sum in excess of twenty
    per cent of the initial payment, unless the sum in excess of twenty per cent is
    placed in an escrow account in this state until the purchaser notifies the escrow
    agent, in writing, that the goods have been delivered;

    (F) Accept, from a purchaser, money or a promissory note for goods promised the
    purchaser and then permit more than two weeks beyond the promised date for delivery
    of the goods to elapse without:

    (1) Making shipment or delivery of the goods;

    (2) Making a full refund of all sums paid by the purchaser or returning the promissory
    note;

    (3) Advising the purchaser of the duration of an extended delay and offering to
    provide, within two weeks, a full refund of all sums paid by the purchaser or
    return of the promissory note;

    (4) Furnishing similar goods of equal or greater value as a good faith substitute.

    (G) Use the phrase "secured investment" or any other representation that implies
    that a prospective purchaser''s initial payment or promissory note is protected
    from loss if the only security is the value of the goods or services supplied
    to the purchaser by the seller or affiliated person;

    (H) Represent that a purchaser''s initial payment or promissory note is secured
    in any manner or that the seller provides a buy-back arrangement unless the seller
    has, in the manner provided for by section 1334.04 of the Revised Code, obtained
    a surety bond or established a trust account.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.03
- number: '1334.04'
  heading: Seller to establish surety bond or establish trust account
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: '(A) If, pursuant to division (H) of section 1334.03 of the Revised Code,
    a seller is required to obtain a surety bond or establish a trust account, the
    bond or trust account required shall be in favor of the state for the benefit
    of any purchaser who is damaged by a violation of, or by the seller''s breach
    of an agreement subject to, sections 1334.01 to 1334.15 of the Revised Code. The
    surety bond shall be issued by a surety company authorized to do business in this
    state. A trust account shall be established and maintained in this state.

    (B) Any person claiming against the bond or trust account may maintain an action
    against the seller and the surety or trustee, except that the surety or trustee
    shall be liable only for actual damages. The aggregate liability of the surety
    or trustee to all purchasers shall not exceed the amount of the bond or trust
    account.

    (C) A seller shall establish the bond or trust account in an amount of not less
    than fifty thousand dollars at the commencement of business for the first six
    months. By the tenth day of the seller''s seventh month in business, the bond
    or trust account shall be adjusted so that it is in an amount equal to the total
    amount of the initial payments and promissory notes required by all agreements
    the seller has entered into in this state during the previous six months, in connection
    with which the seller has represented that there is a buy-back arrangement or
    that the purchaser''s initial payment or promissory note is secured in any manner.
    Thereafter, the amount shall be similarly adjusted semiannually, no later than
    the tenth day of the first month of the seller''s fiscal year and no later than
    the tenth day of the seventh month of the seller''s fiscal year. A seller may
    reduce the amount of the bond or trust account by the amount of the initial payment
    or promissory note required by any agreement under which the term of a buy-back
    or security arrangement has expired. In no event shall the amount of the bond
    or trust account be less than ten thousand dollars.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.04
- number: '1334.05'
  heading: Right to cancel
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: '(A) In addition to any other right or remedy available to a purchaser under
    sections 1334.01 to 1334.15 of the Revised Code, a purchaser has the right to
    cancel an agreement selling or leasing to the purchaser a business opportunity
    plan, in accordance with the following conditions:

    (1) If the seller complies with divisions (A)(7), (B), and (C) of section 1334.06
    of the Revised Code, the purchaser may cancel the agreement at any time before
    midnight of the fifth business day after the day on which the purchaser signs
    the agreement.

    (2) If the seller has failed to comply with division (A)(7), (B), or (C) of section
    1334.06 of the Revised Code, the purchaser may cancel the agreement any time within
    twelve months after the day on which the purchaser signs the agreement.

    (B) Cancellation under this section is evidenced by the purchaser giving written
    notice of cancellation to the seller at the address stated in the agreement. The
    purchaser may deliver the notice by regular mail, electronic mail, facsimile transmission,
    telegram, manual delivery, or other personal delivery. Notice of cancellation
    given by a purchaser need not take a particular form and is sufficient if it indicates
    in writing the intent of the purchaser not to be bound. Notice of cancellation
    sent by regular mail is effective upon the date of postmark. Notice sent by electronic
    mail or facsimile is effective when successfully transmitted. Telegram delivery
    is effective when the telegram is ordered. Manual delivery or other personal delivery
    is effective when delivered to the seller or to the seller''s address, whichever
    is first.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.05
- number: '1334.06'
  heading: Written agreements - contents
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: '(A) Every agreement selling or leasing a business opportunity plan shall
    be in writing and a copy of the executed agreement and all other documents the
    seller requires the purchaser to sign shall be given to the purchaser at the time
    they are signed. The agreement shall contain at least the following:

    (1) The terms and conditions of payment including the initial payment or the promissory
    note, additional payments, and down payment required;

    (2) A full description of the acts or services the seller will undertake to perform
    for the purchaser;

    (3) The seller''s principal business address and the name and address of its agent
    authorized to receive service of process in this state;

    (4) The business form of the seller, whether corporate, partnership, or otherwise;

    (5) The delivery date of the goods the seller is to deliver to the purchaser to
    begin operation of the business opportunity plan and the location for delivery;

    (6) A complete description of the buy-back or security arrangement, if any;

    (7) Notice of the purchaser''s right to cancel the agreement in at least ten-point
    boldface type, in the following form and in close proximity to the space reserved
    in the agreement for the signature of the purchaser:

    "You, the purchaser, may cancel this transaction at any time prior to midnight
    of the fifth business day after the date you sign this agreement. See the attached
    notice of cancellation for an explanation of this right."

    (B) A completed form, in duplicate, captioned "notice of cancellation," shall
    be attached to the agreement signed by the purchaser and be easily detachable
    and shall contain in ten-point boldface type, the following statement:

    "Notice of cancellation

    ___________________ (Enter date of transaction)

    You may cancel this transaction, without penalty or obligation, within five business
    days from the above date. If you cancel, any payments made by you under the agreement,
    and any negotiable instrument executed by you will be returned within ten business
    days following the seller''s receipt of your cancellation notice, and any security
    interest arising out of the transaction will be cancelled. If you cancel, you
    must make available to the seller at your business address all goods delivered
    to you under this agreement; or you may if you wish, comply with the instructions
    of the seller regarding the return shipment of the goods at the seller''s expense
    and risk. If you do make the goods available to the seller and the seller does
    not pick them up within twenty days of the date of your notice of cancellation,
    you may retain or dispose of them without further obligation. If you fail to make
    the goods available to the seller, or if you agree to return them to the seller
    and fail to do so, then you remain liable for the performance of all obligations
    under this agreement. To cancel this transaction, mail or deliver a signed and
    dated copy of this cancellation notice or any other written notice, or send a
    telegram, to (name of seller), at (address of seller''s place of business), or
    send a fax to (name of seller) at (seller''s facsimile number) or an e-mail to
    (name of seller) at (seller''s electronic mail address), not later than midnight
    of (enter date).

    I hereby cancel this transaction.

    ____________________________ ___________________________

    (Date) (Purchaser''s signature)"

    (C) Before furnishing copies of the notice of cancellation to the purchaser, the
    seller shall complete both copies by entering the name of the seller, the address
    of the seller''s place of business, the date of the agreement, and the date of
    the last day on which the purchaser may cancel.

    (D) In connection with the sale or lease of a business opportunity plan, no seller
    shall:

    (1) Fail to integrate into the written agreement all material statements, representations,
    or promises that were made orally prior to execution of the written agreement
    by the seller to the purchaser and were not integrated into any other written
    document previously provided to the purchaser by the seller;

    (2) Include in any agreement, any confession of judgment or any waiver of any
    rights to which the purchaser is entitled under sections 1334.01 to 1334.15 of
    the Revised Code, including specifically the right to cancel the agreement in
    accordance with this section and section 1334.05 of the Revised Code;

    (3) Fail to inform each purchaser orally, at the time an agreement is signed,
    of the right to cancel;

    (4) Misrepresent in any manner the purchaser''s right to cancel;

    (5) Fail or refuse to honor any valid notice of cancellation by a purchaser and
    within ten business days after receipt of the notice to:

    (a) Refund all payments made under the agreement;

    (b) Cancel and return any note, negotiable instrument, or other evidence of indebtedness
    executed by the purchaser in connection with the agreement and take any action
    necessary to reflect the termination of any security interest or lien created
    under the agreement;

    (c) Notify the purchaser if the seller intends to repossess or abandon any goods
    delivered to the purchaser.

    (6) Negotiate, transfer, sell, or assign any note or other evidence of indebtedness
    during the time within which a purchaser may cancel;

    (7) Commence delivery of any goods or provide any services during the time within
    which the purchaser may cancel.

    (E) In connection with the sale or lease of a business opportunity plan, any provision
    in an agreement restricting jurisdiction or venue to a forum outside of this state,
    or requiring the application of laws of another state, is void with respect to
    a claim otherwise enforceable under sections 1334.01 to 1334.15 of the Revised
    Code.'
