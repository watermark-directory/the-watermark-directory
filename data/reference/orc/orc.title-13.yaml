- number: '1331.10'
  heading: Evidence
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: In prosecutions under sections 1331.01 to 1331.14 of the Revised Code, it
    is sufficient to prove that a trust or combination exists, and that the defendant
    belonged to it, or acted for or in connection with it, without proving all the
    members belonging to it, or proving or producing an article of agreement, or a
    written instrument on which it may have been based; or that it was evidenced by
    a written instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.10
- number: '1331.11'
  heading: Jurisdiction of courts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: 'Courts of common pleas are invested with jurisdiction to restrain and enjoin
    violators of sections 1331.01 to 1331.14 of the Revised Code. For a violation
    of such sections, the attorney general, or the prosecuting attorney of the proper
    county, shall institute proper proceedings in a court of competent jurisdiction
    in any county in which there is proper venue.

    When such suit is instituted by the attorney general in quo warranto, he may begin
    the same in the supreme court of the state, or the court of appeals of Franklin
    county. When such suit is instituted by the attorney general to restrain and enjoin
    a violation of sections 1331.01 to 1331.14 of the Revised Code, he may begin the
    same in the court of common pleas of Franklin county. Such proceedings to restrain
    and enjoin such violation shall be by way of complaint setting forth the case,
    and praying that such violation be enjoined or otherwise prohibited.

    Upon the filing of such complaint, and before final decree, the court may make
    such temporary restraining order or prohibition as is just in the premises. In
    any action or proceeding in quo warranto by the attorney general or a prosecuting
    attorney against a corporation, the court in which such action or proceeding is
    pending may, ancillary to such action or proceeding, restrain or enjoin the corporation
    and its officers and agents from continuing or committing during the pendency
    of the action the alleged act by reason of which the action is brought.

    When, in a proceeding in quo warranto by the attorney general or any prosecuting
    attorney, any Ohio corporation is, on final hearing, found guilty of violating
    such sections, the court may declare a forfeiture of all its rights, privileges,
    and franchises to the state and may order the corporation dissolved and appoint
    a trustee to wind up its affairs, as is provided in other cases in quo warranto.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.11
- number: '1331.12'
  heading: Parties defendant - multiple proceedings - statute of limitations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: '(A) In any action or proceeding in quo warranto, in injunction, or otherwise
    brought by the attorney general or a prosecuting attorney under sections 1331.01
    to 1331.14 of the Revised Code, all persons that are party to or participating
    in the trust or conspiracy against trade violative of those sections may be made
    parties defendant and summoned, whether or not they reside in the county in which
    the action or proceeding is instituted. Actions or proceedings in quo warranto
    and in injunction may be instituted simultaneously, or while one or another of
    them is pending, such actions or proceedings being started in the proper court
    as provided in section 1331.11 of the Revised Code, and no action or proceeding
    in injunction is a bar to an action or proceeding in quo warranto, nor is an action
    or proceeding in quo warranto a bar to one instituted to restrain and enjoin.

    (B) Any civil or criminal action or proceeding for a violation of sections 1331.01
    to 1331.14 of the Revised Code, other than one upon which an action was brought
    in any court by any person not later than forty-five days after the effective
    date of the current amendment, shall be forever barred unless commenced within
    four years after the cause of action accrued.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.12
- number: '1331.13'
  heading: Witnesses are not excused from testifying
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: If a court of record, or a judge thereof in vacation, in which is pending
    a civil or criminal action or proceeding brought or prosecuted by the attorney
    general or a prosecuting attorney for the violation of sections 1331.01 to 1331.14,
    inclusive, of the Revised Code, or an action or proceeding for a violation of
    a law, common or statute, against a conspiracy or combination in restraint of
    trade, so orders, no person shall be excused from attending, testifying, or producing
    books, papers, schedules, contracts, agreements, or other documents in obedience
    to the subpoena or order of such court or a commissioner, referee, or master appointed
    by such court to take testimony, or a notary public or other person authorized
    to take depositions, when the order made by such court or judge includes a witness
    whose deposition is being taken before such notary public or other officer, for
    the reason that the testimony or evidence required of him may tend to incriminate
    him or subject him to a penalty. No person shall be prosecuted or subjected to
    a penalty for or on account of a transaction, matter, or thing concerning which
    he may so testify or produce evidence, documentary or otherwise, before such court,
    person, or officer.
  history: null
