- number: '1321.671'
  heading: Repayment of consumer installment loan
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Upon repayment of the loan in full, the original note signed by any obligor
    or copy, photograph, or stored representation of the original note as retained
    in accordance with section 1321.66 of the Revised Code shall be plainly marked
    "paid" or "canceled" and the note or the reproduction of the note shall be returned
    to the obligor or, if there are two or more obligors, to one of them.

    (B) If requested, the licensee shall give to the borrower a receipt for each payment
    made on account of any interest- bearing or precomputed loan.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.671
- number: '1321.672'
  heading: Insurance obtained on behalf of consumer installment loan borrower
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) When, in connection with a loan, a licensee furnishes or places insurance
    written on behalf of the borrower at the borrower''s expense, a policy or certificate
    of insurance properly executed shall be furnished to the borrower within fifteen
    days of the closing date of the loan. The policy or certificate shall state the
    name of the insurance company, the nature of the insurance, the extent of the
    coverage, the amount of the premium, and the effective and expiration dates of
    the policy.

    (B) If a licensee furnishes or places credit life insurance, credit accident and
    health insurance, or unemployment insurance on behalf of the borrower at the borrower''s
    expense, the licensee shall give written notice to the borrower at the time the
    loan is made. The notice shall disclose the borrower''s right to cancel the insurance
    within twenty-five days after the purchase of the insurance with a full refund
    of the premium or identifiable charge for the insurance. The notice shall further
    disclose that the cancellation may be effected upon the written request of the
    borrower together with the return of the policy or certificate of insurance to
    the licensee.

    (C) All insurance sold or obtained in connection with the making of a loan shall
    be governed by Title XXXIX of the Revised Code.

    (D) In any transaction in which the licensee furnishes or places insurance on
    behalf of the borrower at the borrower''s expense, the licensee shall, prior to
    furnishing or placing the insurance, provide written disclosure to the borrower
    of the business relationship, beneficial ownership or affiliation, whether direct
    or indirect, between the licensee and the insurer.'
