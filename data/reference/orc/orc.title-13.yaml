- number: '1317.23'
  heading: Payment of refunds
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: Refunds provided to a buyer under sections 1317.21 and 1317.22 of the Revised
    Code shall be made by the seller within thirty days of the completion of the applicable
    notice requirement by delivering cash, a check, or a money order to the buyer.
    The seller may determine the method of payment and the buyer may determine the
    manner of delivering the refund. If the seller delivers a cash refund to the buyer
    in a face-to-face transaction, the seller may require the buyer to sign a receipt
    for the refund. The receipt shall indicate the date and amount of the refund and
    shall identify with reasonable specificity the merchandise or specific good which
    was the subject of the layaway arrangement.
