- number: '1310.34'
  heading: Priority of certain liens arising by operation of law - UCC 2A-306
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: If a person in the ordinary course of his business furnishes services or materials
    with respect to goods subject to a lease contract, a lien upon those goods in
    the possession of that person given by a section of the Revised Code, statute
    of another jurisdiction, or rule of law for those materials or services takes
    priority over any interest of the lessor or lessee under the lease contract or
    sections 1310.01 to 1310.78 of the Revised Code, unless the lien is created by
    a section of the Revised Code or statute of another jurisdiction and the section
    or statute provides otherwise or unless the lien is created by rule of law and
    the rule of law provides otherwise.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.34
- number: '1310.35'
  heading: Priority of liens arising by attachment or levy on, security interests
    in, and other claims to goods - UCC 2A-307
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Except as otherwise provided in section 1310.34 of the Revised Code,
    a creditor of a lessee takes subject to the lease contract.

    (B) Except as otherwise provided in division (C) of this section and in sections
    1310.34 and 1310.36 of the Revised Code, a creditor of a lessor takes subject
    to the lease contract unless the creditor holds a lien that attached to the goods
    before the lease contract became enforceable.

    (C) Except as otherwise provided in sections 1309.317, 1309.321, and 1309.323
    of the Revised Code, a lessee takes a leasehold interest subject to a security
    interest held by a creditor of the lessor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.35
- number: '1310.36'
  heading: Special rights of creditors - UCC 2A-308
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A creditor of a lessor in possession of goods subject to a lease contract
    may treat the lease contract as void if as against the creditor retention of possession
    by the lessor is fraudulent under any section of the Revised Code, any statute
    of another jurisdiction, or any rule of law, but retention of possession in good
    faith and current course of trade by the lessor for a commercially reasonable
    time after the lease contract becomes enforceable is not fraudulent.

    (B) Nothing in sections 1310.01 to 1310.78 of the Revised Code impairs the rights
    of creditors of a lessor if the lease contract becomes enforceable, not in current
    course of trade but in satisfaction of or as security for a preexisting claim
    for money, security, or the like, and is made under circumstances that under any
    section of the Revised Code, statute of another jurisdiction, or rule of law apart
    from sections 1310.01 to 1310.78 of the Revised Code would constitute the transaction
    a fraudulent transfer or voidable preference.

    (C) A creditor of a seller may treat a sale or an identification of goods to a
    contract for sale as void if as against the creditor retention of possession by
    the seller is fraudulent under any section of the Revised Code, statute of another
    jurisdiction, or rule of law, but retention of possession of the goods pursuant
    to a lease contract entered into by the seller as lessee and the buyer as lessor
    in connection with the sale or identification of the goods is not fraudulent if
    the buyer bought for value and in good faith.'
