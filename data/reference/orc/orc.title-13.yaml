  text: The possession by any junk dealer or dealer in second-hand articles or supplies,
    without the written consent of the person who filed hereunder or his assignee,
    of any articles or supplies upon which a name, mark or device has been produced
    shall be presumptive evidence of a violation of sections 1329.41 to 1329.53, inclusive,
    of the Revised Code.
