- number: '1321.71'
  heading: Insurance Premium Finance Company Law definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'As used in sections 1321.71 to 1321.83 of the Revised Code:

    (A) "Annual percentage rate" means the ratio of the finance charges, as authorized
    by sections 1321.79 and 1321.791 of the Revised Code, on a loan to the unpaid
    principal balance on the loan for any period of time, expressed on an annual basis.

    (B) "Insurance premium finance company" or "premium finance company" means a person
    engaged in the business of entering into or otherwise acquiring premium finance
    agreements.

    (C) "Person" means any individual, partnership, association, trust, corporation,
    or other legal entity.

    (D) "Premium finance agreement" means an agreement by which an insured or prospective
    insured promises to pay a premium finance company the amount advanced or to be
    advanced under the agreement to an insurer or to an insurance agent or broker
    in payment of premiums on an insurance contract together with a finance charge
    as authorized and limited by sections 1321.71 to 1321.83 of the Revised Code.

    (E) "License" means a license issued by the division of financial institutions
    under sections 1321.71 to 1321.83 of the Revised Code.

    (F) "Licensee" means a premium finance company holding a license.

    (G) "Superintendent of financial institutions" includes the deputy superintendent
    for consumer finance as provided in section 1181.21 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.71
- number: '1321.72'
  heading: Application of Insurance Premium Finance Company Law
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'Except as provided in division (D) of section 1321.78, sections 1321.71 to
    1321.83 of the Revised Code do not apply with respect to any of the following:

    (A) Life, property, or casualty insurance companies authorized to do business
    in this state as to policies issued by those companies;

    (B) The inclusion of a charge for insurance in connection with any installment
    transaction pursuant to Chapter 1317. of the Revised Code;

    (C) The financing of insurance premiums at a rate of interest not exceeding the
    maximum rate permitted by section 1343.01 of the Revised Code;

    (D) Persons lawfully doing business under the authority of any law of this state,
    another state, or the United States relating to banks, savings banks, trust companies,
    savings and loan associations, lenders authorized to make loans pursuant to sections
    1321.01 to 1321.19 of the Revised Code, lenders authorized to make loans pursuant
    to sections 1321.51 to 1321.60 of the Revised Code, mortgage lenders authorized
    to make loans under Chapter 1322. of the Revised Code, or any credit union;

    (E) Any person who purchases or otherwise acquires a premium finance agreement
    from a licensee if the licensee remains responsible for collecting payments due
    under the agreement, and for otherwise servicing the agreement, in compliance
    with sections 1321.71 to 1321.83 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.72
- number: '1321.73'
  heading: Insurance premium finance company license requirement; annual fee; assets
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) No person shall engage in the business of entering into or otherwise
    acquiring premium finance agreements in the state without first having obtained
    a license as a premium finance company from the division of financial institutions.

    (B) The annual license fee shall be determined by the superintendent of financial
    institutions pursuant to section 1321.20 of the Revised Code. Licenses may be
    renewed from year to year as of the first day of July of each year, or annually
    on a different date established by the superintendent pursuant to section 1181.23
    of the Revised Code, upon payment of the fee.

    (C) The person to whom the license or the renewal thereof is issued shall file
    sworn answers, subject to the penalties of perjury, to such interrogatories as
    the division requires. The division may, at any time, require the applicant to
    fully disclose the identity of all stockholders, partners, officers, and employees,
    and it may, at its discretion, refuse to issue or renew a license in the name
    of any firm, partnership, or corporation if it is not satisfied that any officer,
    employee, stockholder, or partner thereof, who may materially influence the applicant''s
    conduct, meets the standards provided by sections 1321.71 to 1321.83 of the Revised
    Code.

    (D) Each applicant shall execute and file with the division proof that the applicant
    has a net worth of at least fifty thousand dollars, as determined in accordance
    with generally accepted accounting principles. The proof is subject to the approval
    of the division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.73
- number: '1321.74'
  heading: Insurance premium finance company license application, fee, approval; additional
    licenses; change of place of business
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Application for a license as a premium finance company shall be in writing,
    under oath, in the form prescribed by the division of financial institutions.
    An applicant also shall provide the form of premium finance agreement it intends
    to use in doing business under sections 1321.71 to 1321.83 of the Revised Code.
    Upon the filing of an application and the payment of the license fee, and upon
    deposit of an investigation fee not to exceed three hundred dollars if the investigation
    can be conducted in this state or the estimated costs of the investigation if
    it must be conducted outside this state, the division shall make an investigation
    of each applicant and shall issue a license if the applicant is qualified in accordance
    with sections 1321.71 to 1321.83 of the Revised Code. An itemized statement of
    any investigation expenses incurred which the applicant is required to pay shall
    be furnished the applicant by the division, and only the actual cost of such investigation
    shall be paid by the applicant, but at no time shall the investigation fee be
    less than two hundred dollars. If the division does not so find, it shall, within
    a reasonable period of time after it has received the application, at the request
    of the applicant, give the applicant opportunity for a hearing conducted in accordance
    with Chapter 119. of the Revised Code.

    (B)(1) The division shall, except as provided in division (B)(2) of this section,
    issue or renew a license when it is satisfied that the applicant:

    (a) Is competent and trustworthy and intends to act in good faith in the capacity
    involved by the license applied for;

    (b) Has a good business reputation and has had experience, training, or education
    so as to be qualified in the business for which the license is applied for;

    (c) If a corporation, is a corporation incorporated under the laws of this state
    or is a foreign corporation authorized to transact business in this state;

    (d) Has a net worth of at least fifty thousand dollars, as determined in accordance
    with generally accepted accounting principles;

    (e) With respect to the issuance of a license, has filed with the division a form
    of premium finance agreement that complies with sections 1321.71 to 1321.83 of
    the Revised Code.

    (2) The division shall not refuse to issue a license to an applicant because of
    a criminal conviction unless the refusal is in accordance with section 9.79 of
    the Revised Code.

    (C) Not more than one place of business shall be maintained under the same license,
    but the division may issue additional licenses to the same licensee upon compliance
    with sections 1321.71 to 1321.83 of the Revised Code.

    No change in the place of business of a licensee to a location outside the original
    municipal corporation shall be permitted under the same license without the approval
    of a new application, the payment of the license fee as determined by the superintendent
    of financial institutions pursuant to section 1321.20 of the Revised Code, and,
    if required by the superintendent, the payment of an investigation fee of two
    hundred dollars. If a licensee wishes to change its place of business within the
    same municipal corporation, it shall give written notice of the change in advance
    to the division, which shall provide a license for the new address without cost.
    If a licensee changes its name, it shall give, prior to entering into or otherwise
    acquiring premium finance agreements under the new name, written notice of the
    change to the division, which shall provide a license in the new name, without
    cost.

    Each license shall be kept conspicuously posted in the place of business of the
    licensee and is not transferable or assignable.

    Notwithstanding any other provision of this section to the contrary, the division
    shall issue a license to act as a premium finance company in accordance with Chapter
    4796. of the Revised Code to an applicant if either of the following applies:

    (1) The applicant is licensed in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as an operator of a premium
    finance company in a state that does not issue that license.'
