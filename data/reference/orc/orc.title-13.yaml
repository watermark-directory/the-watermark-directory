- number: '1321.661'
  heading: Consumer installment loan licensee call reports
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Each licensee shall submit to the NMLSR call reports or other reports
    of condition, which reports shall be in such form and shall contain such information
    as the NMLSR may require.

    (B)(1) As required by the superintendent of financial institutions, each licensee
    shall file with the division of financial institutions an annual report under
    oath or affirmation, on forms supplied by the division, concerning the business
    and operation of the licensee for the preceding calendar year.

    (2) The superintendent shall annually publish an analysis of the information required
    under division (B)(1) of this section, but the individual reports shall not be
    public records and shall not be open to public inspection.'
