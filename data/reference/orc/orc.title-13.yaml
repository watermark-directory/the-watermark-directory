- number: '1309.319'
  heading: Rights and title of consignee with respect to creditors and purchasers
    - UCC 9-319
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (B) of this section, for purposes
    of determining the rights of creditors of, and purchasers for value of goods from,
    a consignee, while the goods are in the possession of the consignee, the consignee
    is deemed to have rights and title to the goods identical to those the consignor
    had or had power to transfer.

    (B) For purposes of determining the rights of a creditor of a consignee, law other
    than this chapter determines the rights and title of a consignee while goods are
    in the consignee''s possession if, under sections 1309.301 to 1309.342 of the
    Revised Code, a perfected security interest held by the consignor would have priority
    over the rights of the creditor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.319
- number: '1309.320'
  heading: Buyer of goods - UCC 9-320
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (E) of this section, a buyer
    in the ordinary course of business, other than a person buying farm products from
    a person engaged in farming operations, takes free of a security interest created
    by the buyer''s seller even if the security interest is perfected and the buyer
    knows of its existence.

    (B) Except as otherwise provided in division (E) of this section, a buyer of goods
    from a person who used or bought the goods for use primarily for personal, family,
    or household purposes takes free of a security interest, even if perfected, if
    the buyer buys:

    (1) Without knowledge of the security interest;

    (2) For value;

    (3) Primarily for the buyer''s personal, family, or household purposes; and

    (4) Before the filing of a financing statement covering the goods.

    (C) To the extent that it affects the priority of a security interest over a buyer
    of goods under division (B) of this section, the period of effectiveness of a
    filing made in the jurisdiction in which the seller is located is governed by
    divisions (A) and (B) of section 1309.316 of the Revised Code.

    (D) A buyer in the ordinary course of business buying oil, gas, or other minerals
    at the wellhead or minehead or after extraction takes free of an interest arising
    out of an encumbrance.

    (E) Divisions (A) and (B) of this section do not affect a security interest in
    goods in the possession of the secured party under section 1309.313 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.320
- number: '1309.321'
  heading: Licensee of general intangible and lessee of goods in ordinary course of
    business - UCC 9-321
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) As used in this section, "licensee in the ordinary course of business"
    means a person that becomes a licensee of a general intangible in good faith,
    without knowledge that the license violates the rights of another person in the
    general intangible, and in the ordinary course of business from a person in the
    business of licensing general intangibles of that kind. A person becomes a licensee
    in the ordinary course of business if the license to the person comports with
    the usual or customary practices in the kind of business in which the licensor
    is engaged or with the licensor''s own usual or customary practices.

    (B) A licensee in the ordinary course of business takes its rights under a nonexclusive
    license free of a security interest in the general intangible created by the licensor,
    even if the security interest is perfected and the licensee knows of its existence.

    (C) A lessee in ordinary course of business takes its leasehold interest free
    of a security interest in the goods created by the lessor, even if the security
    interest is perfected and the lessee knows of its existence.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.321
- number: '1309.322'
  heading: Priorities among conflicting security interests in and agricultural liens
    on same collateral - UCC 9-322
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in this section, priority between conflicting
    security interests and agricultural liens in the same collateral shall be determined
    according to the following rules:

    (1) Conflicting perfected security interests and agricultural liens rank according
    to priority in time of filing or perfection. Priority dates from the earlier of
    the time a filing covering the collateral is first made or the security interest
    or agricultural lien is first perfected, if there is no period thereafter when
    there is neither filing nor perfection.

    (2) A perfected security interest or agricultural lien has priority over a conflicting
    unperfected security interest or agricultural lien.

    (3) The first security interest or agricultural lien to attach or become effective
    has priority if conflicting security interests and agricultural liens are unperfected.

    (B) For the purpose of division (A)(1) of this section:

    (1) The time of filing or perfection as to a security interest in collateral is
    also the time of filing or perfection as to a security interest in proceeds; and

    (2) The time of filing or perfection as to a security interest in collateral supported
    by a supporting obligation is also the time of filing or perfection as to a security
    interest in the supporting obligation.

    (C) Except as otherwise provided in division (F) of this section, a security interest
    in collateral which qualifies for priority over a conflicting security interest
    under section 1309.327, 1309.328, 1309.329, 1309.330, or 1309.331 of the Revised
    Code also has priority over a conflicting security interest in:

    (1) Any supporting obligation for the collateral; and

    (2) Proceeds of the collateral if:

    (a) The security interest in proceeds is perfected.

    (b) The proceeds are cash proceeds or of the same type as the collateral; and

    (c) In the case of proceeds that are proceeds of proceeds, all intervening proceeds
    are cash proceeds, proceeds of the same type as the collateral, or an account
    relating to the collateral.

    (D) Subject to division (E) of this section and except as otherwise provided in
    division (F) of this section, if a security interest in chattel paper, deposit
    accounts, negotiable documents, instruments, investment property, or letter-of-credit
    rights is perfected by a method other than filing, conflicting perfected security
    interests in proceeds of the collateral rank according to priority in time of
    filing.

    (E) Division (D) of this section applies only if the proceeds of the collateral
    are not cash proceeds, chattel paper, negotiable documents, instruments, investment
    property, or letter-of-credit rights.

    (F) Divisions (A) to (E) of this section are subject to:

    (1) Division (G) of this section and the other provisions of sections 1309.301
    to 1309.342 of the Revised Code;

    (2) Section 1304.20 of the Revised Code with respect to a security interest of
    a collecting bank;

    (3) Section 1305.18 of the Revised Code with respect to a security interest of
    an issuer or nominated person; and

    (4) Section 1309.110 of the Revised Code with respect to a security interest arising
    under Chapter 1302. or 1310. of the Revised Code.

    (G) A perfected agricultural lien on collateral has priority over a conflicting
    security interest in or agricultural lien on the same collateral if the statute
    creating the agricultural lien so provides.'
