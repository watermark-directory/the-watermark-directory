  heading: Cancellation of registration
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'The secretary of state shall cancel from the register all of the following:

    (A) Any registration concerning which the secretary of state receives a voluntary
    request in writing for the cancellation of the registration from the registrant
    or the assignee of record;

    (B) Any registration granted under sections 1329.41 to 1329.45 of the Revised
    Code, not renewed in accordance with the provisions of those sections.

    (C) Any registration that the secretary of state finds was granted improperly;

    (D) Any registration ordered canceled by a court of competent jurisdiction on
    any ground.'
