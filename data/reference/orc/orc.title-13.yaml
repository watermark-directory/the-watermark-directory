- number: '1309.104'
  heading: Control of deposit account - UCC 9-104
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A secured party has control of a deposit account if:

    (1) The secured party is the bank with which the deposit account is maintained;

    (2) The debtor, secured party, and bank have agreed in an authenticated record
    that the bank will comply with instructions originated by the secured party directing
    disposition of the funds in the deposit account without further consent by the
    debtor; or

    (3) The secured party becomes the bank''s customer with respect to the deposit
    account.

    (B) A secured party that has satisfied division (A) of this section has control
    of a deposit account, even if the debtor retains the right to direct the disposition
    of funds from the deposit account.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.104
- number: '1309.105'
  heading: Control of electronic chattel paper - UCC 9-105
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A secured party has control of electronic chattel paper if a system employed
    for evidencing the transfer of interests in the chattel paper reliably establishes
    the secured party as the person to which the chattel paper was assigned.

    (B) A system satisfies division (A) of this section if the record or records comprising
    the chattel paper are created, stored, and assigned in such a manner that:

    (1) A single authoritative copy of the record or records exists that is unique,
    identifiable, and, except as otherwise provided in divisions (B)(4), (5), and
    (6) of this section, unalterable;

    (2) The authoritative copy identifies the secured party as the assignee of the
    record or records;

    (3) The authoritative copy is communicated to and maintained by the secured party
    or its designated custodian;

    (4) Copies or amendments that add or change an identified assignee of the authoritative
    copy may be made only with the consent of the secured party;

    (5) Each copy of the authoritative copy and any copy of a copy is readily identifiable
    as a copy that is not the authoritative copy; and

    (6) Any amendment of the authoritative copy is readily identifiable as authorized
    or unauthorized.'
