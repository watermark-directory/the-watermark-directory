  text: '(A) If the law chosen by the parties to a consumer lease is that of a jurisdiction
    other than a jurisdiction in which the lessee resides at the time the lease agreement
    becomes enforceable or resides within thirty days after the lease agreement becomes
    enforceable or in which the goods are to be used, the choice of law is not enforceable.

    (B) If the judicial forum chosen by the parties to a consumer lease is a forum
    that otherwise would not have jurisdiction over the lessee, the choice of judicial
    forum is not enforceable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.04
- number: '1310.05'
  heading: Waiver or renunciation of claim or right after default - UCC 2A-107
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: Any claim or right arising out of an alleged default or breach of warranty
    may be discharged in whole or in part without consideration by a written waiver
    or renunciation signed and delivered by the aggrieved party.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.05
- number: '1310.06'
  heading: Unconscionability - UCC 2A-108
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If a court as a matter of law finds a lease contract or any clause of
    a lease contract to have been unconscionable at the time it was made, the court
    may refuse to enforce the lease contract, may enforce the remainder of the lease
    contract without the unconscionable clause, or may so limit the application of
    the unconscionable clause as to avoid any unconscionable result.

    (B) With respect to a consumer lease, if a court as a matter of law finds that
    a lease contract or any clause of a lease contract has been induced by unconscionable
    conduct or that unconscionable conduct has occurred in the collection of a claim
    arising from a lease contract, the court may grant appropriate relief.

    (C) Before making a finding of unconscionability under division (A) or (B) of
    this section, a court, on its own motion or that of a party, shall afford the
    parties a reasonable opportunity to present evidence as to the setting, purpose,
    and effect of the lease contract, a clause of the lease contract, or the conduct
    of the parties.

    (D) In an action in which the lessee claims unconscionability with respect to
    a consumer lease, all of the following apply:

    (1) If the court finds unconscionability under division (A) or (B) of this section,
    the court shall award reasonable attorney''s fees to the lessee.

    (2) If the court does not find unconscionability under division (A) or (B) of
    this section and the lessee claiming unconscionability has brought or maintained
    an action he knew to be groundless, the court shall award reasonable attorney''s
    fees to the party against whom the claim is made.

    (3) In determining reasonable attorney''s fees, the amount of the recovery on
    behalf of the claimant under division (A) or (B) of this section is not controlling.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.06
- number: '1310.07'
  heading: Option to accelerate at will - UCC 2A-109
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A term providing that one party or his successor in interest may accelerate
    payment or performance or require collateral or additional collateral "at will,"
    "when he deems himself insecure," or in words of similar import shall be construed
    to mean that he has power to do so only if he believes in good faith that the
    prospect of payment or performance is impaired.

    (B) With respect to a consumer lease, the burden of establishing good faith under
    division (A) of this section is on the party who exercised the power. Otherwise,
    the burden of establishing lack of good faith is on the party against whom the
    power has been exercised.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.07
- number: '1310.08'
  heading: Statute of frauds - UCC 2A-201
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A lease contract is not enforceable by way of action or defense unless
    one of the following applies:

    (1) The total payments to be made under the lease contract, excluding payments
    for options to renew or buy, are less than one thousand dollars;

    (2) There is a writing, signed by the party against whom enforcement is sought
    or by that party''s authorized agent, sufficient to indicate that a lease contract
    has been made between the parties and to describe the goods leased and the lease
    term.

    (B) Any description of leased goods or of the lease term is sufficient and satisfies
    division (A)(2) of this section, whether or not it is specific, if it reasonably
    identifies what is described.

    (C) A writing is not insufficient because it omits or incorrectly states a term
    agreed upon, but the lease contract is not enforceable under division (A)(2) of
    this section beyond the lease term and the quantity of goods shown in the writing.

    (D) A lease contract that does not satisfy the requirements of division (A) of
    this section but that is valid in other respects is enforceable as follows:

    (1) If the goods are to be specially manufactured or obtained for the lessee and
    are not suitable for lease or sale to others in the ordinary course of the lessor''s
    business, and the lessor, before notice of repudiation is received and under circumstances
    that reasonably indicate that the goods are for the lessee, has made either a
    substantial beginning of their manufacture or commitments for their procurement;

    (2) If the party against whom enforcement is sought admits in that party''s pleading,
    in testimony, or otherwise in court that a lease contract was made. The lease
    contract is not enforceable under division (D)(2) of this section beyond the quantity
    of goods admitted.

    (3) With respect to goods that have been received and accepted by the lessee.

    (E) The lease term under a lease contract referred to in division (D) of this
    section is one of the following:

    (1) If there is a writing signed by the party against whom enforcement is sought
    or by that party''s authorized agent specifying the lease term, the term so specified;

    (2) If the party against whom enforcement is sought admits in that party''s pleading,
    in testimony, or otherwise in court a lease term, the term so admitted;

    (3) A reasonable lease term.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.08
- number: '1310.09'
  heading: Final written expression - parol or extrinsic evidence - UCC 2A-202
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: 'Terms with respect to which the confirmatory memoranda of the parties agree
    or that otherwise are set forth in a writing intended by the parties as a final
    expression of their agreement with respect to the terms that are included in their
    agreement may not be contradicted by evidence of any prior agreement or of a contemporaneous
    oral agreement but may be explained or supplemented by both of the following:

    (A) Course of dealing, usage of trade, or course of performance;

    (B) Evidence of consistent additional terms, unless the court finds the writing
    to have been intended also as a complete and exclusive statement of the terms
    of the agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.09
- number: '1310.10'
  heading: Seals inoperative - UCC 2A-203
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: The affixing of a seal to a writing evidencing a lease contract or an offer
    to enter into a lease contract does not render the writing a sealed instrument,
    and the law with respect to sealed instruments does not apply to a lease contract
    or offer to which a seal has been affixed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.10
- number: '1310.11'
  heading: Formation in general - UCC 2A-204
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A lease contract may be made in any manner sufficient to show agreement,
    including conduct by both parties that recognizes the existence of a lease contract.

    (B) An agreement sufficient to constitute a lease contract may be found although
    the moment of its making is undetermined.

    (C) Although one or more terms of a lease contract are left open, a lease contract
    does not fail for indefiniteness if the parties have intended to make a lease
    contract and there is a reasonably certain basis for giving an appropriate remedy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.11
- number: '1310.12'
  heading: Firm offers - UCC 2A-205
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: An offer by a merchant to lease goods to or from another person in a signed
    writing that by its terms gives assurance it will be held open is not revocable,
    for lack of consideration, during the time stated or, if no time is stated, for
    a reasonable time, but in no event may the period of irrevocability exceed three
    months. Any such term of assurance on a form supplied by the offeree shall be
    separately signed by the offeror.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.12
- number: '1310.13'
  heading: Offer and acceptance in formation of lease contract - UCC 2A-206
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Unless otherwise unambiguously indicated by the language or circumstances,
    and offer to make a lease contract shall be construed as inviting acceptance in
    any manner and by any medium reasonable under the circumstances.

    (B) If the beginning of a requested performance is a reasonable mode of acceptance,
    an offeror who is not notified of acceptance within a reasonable time may treat
    the offer as having lapsed before acceptance.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.13
- number: '1310.15'
  heading: Modification, rescission and waiver - UCC 2A-208
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) An agreement modifying a lease contract needs no consideration to be
    binding.

    (B) A signed lease agreement that excludes modification or rescission except by
    a signed writing may not be otherwise modified or rescinded, but, except as between
    merchants, a provision that excludes modification or rescission except by a signed
    writing and that is on a form supplied by a merchant shall be separately signed
    by the other party.

    (C) Although an attempt at modification or rescission does not satisfy the requirements
    of division (B) of this section, it may operate as a waiver.

    (D) A party who has made a waiver affecting an executory portion of a lease contract
    may retract the waiver by reasonable notification received by the other party
    that strict performance will be required of any term waived, unless the retraction
    would be unjust in view of a material change of position in reliance on the waiver.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.15
- number: '1310.16'
  heading: Lessee under finance lease as beneficiary of supply contract - UCC 2A-209
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) The benefit of a supplier''s promises to the lessor under a supply contract
    and of all express or implied warranties, including those of any third party provided
    in connection with or as part of the supply contract, extends to the lessee to
    the extent of the lessee''s leasehold interest under a finance lease related to
    the supply contract but is subject to the terms of the warranty and of the supply
    contract and all defenses or claims arising from the terms.

    (B) The extension of the benefit of a supplier''s promises and of warranties to
    the lessee as provided in division (A) of this section does not do either of the
    following:

    (1) Modify the rights and obligations of the parties to the supply contract, whether
    arising from the contract or otherwise;

    (2) Impose any duty or liability under the supply contract on the lessee.

    (C) Any modification or rescission of a supply contract by the supplier and the
    lessor is effective between the supplier and the lessee unless, before the modification
    or rescission, the supplier has received notice that the lessee has entered into
    a finance lease related to the supply contract. If the modification or rescission
    is effective between the supplier and the lessee, the lessor is deemed to have
    assumed, in addition to the obligations of the lessor to the lessee under the
    lease contract, promises of the supplier to the lessor and warranties that were
    so modified or rescinded as they existed and were available to the lessee before
    modification or rescission.

    (D) In addition to the extension of the benefit of the supplier''s promises and
    of warranties to the lessee under division (A) of this section, the lessee retains
    all rights that the lessee may have against the supplier and that arise from an
    agreement between the lessee and the supplier or under other law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.16
- number: '1310.17'
  heading: Express warranties - UCC 2A-210
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Express warranties by the lessor are created as follows:

    (1) Any affirmation of fact or promise made by the lessor to the lessee that relates
    to the goods and becomes part of the basis of the bargain creates an express warranty
    that the goods will conform to the affirmation or promise.

    (2) Any description of the goods that is made part of the basis of the bargain
    creates an express warranty that the goods will conform to the description.

    (3) Any sample or model that is made part of the basis of the bargain creates
    an express warranty that the whole of the goods will conform to the sample or
    model.

    (B) It is not necessary to the creation of an express warranty that the lessor
    use formal words, including "warrant" or "guarantee," or that the lessor have
    a specific intention to make a warranty, but an affirmation merely of the value
    of the goods or a statement purporting to be merely the lessor''s opinion or commendation
    of the goods does not create a warranty.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.17
- number: '1310.18'
  heading: Warranties against interference and against infringement - lessee's obligation
    against infringement - UCC 2A-211
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) There is in a lease contract a warranty that for the lease term no person
    holds a claim to or interest in the goods that arose from an act or omission of
    the lessor, other than a claim by way of infringement or the like, and that will
    interfere with the lessee''s enjoyment of its leasehold interest.

    (B) Except in a finance lease, there is in a lease contract by a lessor who is
    a merchant regularly dealing in goods of the kind a warranty that the goods are
    delivered free of the rightful claim of any person by way of infringement or the
    like.

    (C) A lessee who furnishes specifications to a lessor or a supplier shall hold
    the lessor and the supplier harmless against any claim by way of infringement
    or the like that arises out of compliance with the specifications.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.18
- number: '1310.19'
  heading: Implied warranty of merchantability - UCC 2A-212
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Except in a finance lease, a warranty that the goods will be merchantable
    is implied in a lease contract if the lessor is a merchant with respect to goods
    of that kind.

    (B) To be merchantable, goods shall at least satisfy the following:

    (1) Pass without objection in the trade under the description in the lease agreement;

    (2) In the case of fungible goods, be of fair average quality within the description;

    (3) Be fit for the ordinary purposes for which goods of that type are used;

    (4) Run, within the variation permitted by the lease agreement, of even kind,
    quality, and quantity within each unit and among all units involved;

    (5) Be adequately contained, packaged, and labeled as the lease agreement may
    require;

    (6) Conform to any promises or affirmations of fact made on the container or label.

    (C) Other implied warranties may arise from course of dealing or usage of trade.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.19
- number: '1310.20'
  heading: Implied warranty of fitness for particular purpose - UCC 2A-213
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: Except in a finance lease, if the lessor at the time the lease contract is
    made has reason to know of any particular purpose for which the goods are required
    and that the lessee is relying on the lessor's skill or judgment to select or
    furnish suitable goods, there is in the lease contract an implied warranty that
    the goods will be fit for that purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.20
- number: '1310.21'
  heading: Exclusion or modification of warranties - UCC 2A-214
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Words or conduct relevant to the creation of an express warranty and
    words or conduct tending to negate or limit a warranty shall be construed wherever
    reasonable as consistent with each other, but, subject to the provisions of section
    1310.09 of the Revised Code on parol or extrinsic evidence, negation or limitation
    is inoperative to the extent that the construction is unreasonable.

    (B) Subject to division (C) of this section, to exclude or modify the implied
    warranty of merchantability or any part of it, the language shall mention "merchantability,"
    be by a writing, and be conspicuous. Subject to division (C) of this section,
    to exclude or modify any implied warranty of fitness, the exclusion shall be by
    a writing and be conspicuous. Language to exclude all implied warranties of fitness
    is sufficient if it is in writing, is conspicuous, and states, for example, "there
    is no warranty that the goods will be fit for a particular purpose."

    (C) Notwithstanding division (B) of this section, but subject to division (D)
    of this section, all of the following apply:

    (1) Unless the circumstances indicate otherwise, all implied warranties are excluded
    by expressions like "as is" or "with all faults" or by other language that in
    common understanding calls the lessee''s attention to the exclusion of warranties
    and makes plain that there is no implied warranty, if in writing and conspicuous.

    (2) If the lessee before entering into the lease contract has examined the goods
    or the sample or model as fully as desired or has refused to examine the goods,
    there is no implied warranty with regard to defects that an examination in the
    circumstances should have revealed.

    (3) An implied warranty also may be excluded or modified by course of dealing,
    course of performance or usage of trade.

    (D) To exclude or modify a warranty against interference or against infringement
    as provided in section 1310.18 of the Revised Code, or any part of it, the language
    shall be specific, be by a writing, and be conspicuous, unless the circumstances,
    including course of performance, course of dealing, or usage of trade, give the
    lessee reason to know that the goods are being leased subject to a claim or interest
    of any person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.21
- number: '1310.22'
  heading: Cumulation and conflict of warranties express or implied - UCC 2A-215
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: 'Express or implied warranties shall be construed as consistent with each
    other and as cumulative, but, if that construction is unreasonable, the intention
    of the parties determines which warranty is dominant. In ascertaining that intention,
    the following rules apply:

    (A) Exact or technical specifications displace an inconsistent sample or model
    or general language of description.

    (B) A sample from an existing bulk displaces inconsistent general language of
    description.

    (C) Express warranties displace inconsistent implied warranties other than an
    implied warranty of fitness for a particular purpose.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.22
- number: '1310.23'
  heading: Third-party beneficiaries of express and implied warranties - UCC 2A-216
    Alternative C
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: An express or implied warranty to or for the benefit of a lessee under sections
    1310.01 to 1310.78 of the Revised Code extends to any person who reasonably may
    be expected to use, consume, or be affected by the goods and who is injured by
    breach of the warranty. The operation of this section may not be excluded, modified,
    or limited with respect to injury to the person of an individual to whom the warranty
    extends, but an exclusion, modification, or limitation of the warranty, including
    any with respect to rights and remedies, effective against the lessee also is
    effective against the beneficiary designated under this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.23
- number: '1310.24'
  heading: Identification - UCC 2A-217
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: 'Identification of goods as goods to which a lease contract refers may be
    made at any time and in any manner explicitly agreed to by the parties. In the
    absence of explicit agreement, identification occurs in one of the following manners:

    (A) When the lease contract is made, if the lease contract is for a lease of goods
    that are existing and identified;

    (B) When the goods are shipped, marked, or otherwise designated by the lessor
    as goods to which the lease contract refers, if the lease contract is for a lease
    of goods that are not existing and identified;

    (C) When the young are conceived, if the lease contract is for a lease of unborn
    young of animal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.24
- number: '1310.25'
  heading: Insurance and proceeds - UCC 2A-218
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A lessee obtains an insurable interest when existing goods are identified
    to the lease contract, even though the goods identified are nonconforming, and
    the lessee has an option to reject them.

    (B) If a lessee has an insurable interest only by reason of the lessor''s identification
    of the goods, the lessor, until default or insolvency or notification to the lessee
    that identification is final, may substitute other goods for those identified.

    (C) Notwithstanding a lessee''s insurable interest under divisions (A) and (B)
    of this section, the lessor retains an insurable interest until an option to buy
    has been exercised by the lessee and risk of loss has passed to the lessee.

    (D) Nothing in this section impairs any insurable interest recognized under any
    other section of the Revised Code, statute, or rule of law.

    (E) The parties may determine by agreement that one or more parties have an obligation
    to obtain and pay for insurance covering the goods and may determine by agreement
    the beneficiary of the proceeds of the insurance.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.25
- number: '1310.251'
  heading: Motor vehicle lease excess wear and use waivers
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A)(1) As used in this section, "excess wear and use waiver" means a contractual
    agreement that is part of, or a separate addendum to, a lease agreement for use
    of a motor vehicle, under which the lessor agrees, with or without a separate
    charge, to do one or both of the following:

    (a) Cancel or waive all or part of amounts that may become due under a lessee''s
    lease agreement as a result of excess wear and use of a motor vehicle;

    (b) Cancel or waive amounts due for excess mileage.

    (2) "Motor vehicle" has the same meaning as in section 4501.01 of the Revised
    Code and also includes utility vehicles and under-speed vehicles as defined in
    that section.

    (B) The terms of a related motor vehicle lease shall not be conditioned upon the
    consumer''s payment for any excess wear and use waiver. Excess wear and use waivers
    may be discounted or given at no extra charge in connection with the purchase
    of other noncredit related goods or services.

    (C) Notwithstanding any provision of the Revised Code to the contrary, an excess
    wear and use waiver is not an insurance product.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.251
- number: '1310.26'
  heading: Risk of loss - UCC 2A-219
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Except in the case of a finance lease, risk of loss is retained by the
    lessor and does not pass to the lessee. In the case of a finance lease, risk of
    loss passes to the lessee.

    (B) Subject to the provisions of section 1310.27 of the Revised Code on the effect
    of default on risk of loss, if risk of loss is to pass to the lessee and the time
    of passage is not stated, the following rules apply:

    (1) If the lease contract requires or authorizes the goods to be shipped by carrier
    and does not require delivery at a particular destination, the risk of loss passes
    to the lessee when the goods are duly delivered to the carrier. If it does require
    delivery at a particular destination and the goods are duly tendered at that particular
    destination while in the possession of the carrier, the risk of loss passes to
    the lessee when the goods are duly so tendered at that particular destination
    as to enable the lessee to take delivery.

    (2) If the goods are held by a bailee to be delivered without being moved, the
    risk of loss passes to the lessee on acknowledgment by the bailee of the lessee''s
    right to possession of the goods.

    (3) In any case not within division (B)(1) or (2) of this section, the risk of
    loss passes to the lessee on the lessee''s receipt of the goods, if the lessor
    or, in the case of a finance lease, the supplier is a merchant; otherwise, the
    risk of loss passes to the lessee on tender of delivery.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.26
- number: '1310.27'
  heading: Effect of default on risk of loss - UCC 2A-220
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If risk of loss is to pass to the lessee and the time of passage is not
    stated, one of the following applies:

    (1) If a tender or delivery of goods so fails to conform to the lease contract
    as to give a right of rejection, the risk of their loss remains with the lessor,
    or, in the case of a finance lease, the supplier, until cure or acceptance.

    (2) If the lessee rightfully revokes acceptance, he, to the extent of any deficiency
    in his effective insurance coverage, may treat the risk of loss as having remained
    with the lessor from the beginning.

    (B) Whether or not risk of loss is to pass to the lessee, if the lessee as to
    conforming goods already identified to a lease contract repudiates or otherwise
    is in default under the lease contract, the lessor, or, in the case of a finance
    lease, the supplier, to the extent of any deficiency in his effective insurance
    coverage, may treat the risk of loss as resting on the lessee for a commercially
    reasonable time.'
  history: null
