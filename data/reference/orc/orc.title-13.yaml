- number: '1317.16'
  heading: Disposition of collateral
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: '(A) A secured party whose security interest is taken pursuant to section
    1317.071 of the Revised Code may, after default, dispose of any or all of the
    collateral only as authorized by this section.

    (B) Disposition of the collateral shall be by public sale only. Such sale may
    be as a unit or in parcels and the method, manner, time, place, and terms thereof
    shall be commercially reasonable. At least ten days prior to sale the secured
    party shall send notification of the time and place of such sale and of the minimum
    price for which such collateral will be sold, together with a statement that the
    debtor may be held liable for any deficiency resulting from such sale, by certified
    mail, return receipt requested, to the debtor at the debtor''s last address known
    to the secured party, and to any persons known by the secured party to have an
    interest in the collateral. In addition, the secured party shall cause to be published,
    at least ten days prior to the sale, a notice of such sale listing the items to
    be sold, in a newspaper of general circulation in the county where the sale is
    to be held.

    (C) Except as modified by this section, sections 1309.610, 1309.611, 1309.615,
    1309.617, and 1309.624 of the Revised Code govern disposition of collateral by
    the secured party.'
