- number: '1309.204'
  heading: After-acquired property - future advances - UCC 9-204
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as provided in division (B) of this section, a security agreement
    may create or provide for a security interest in after-acquired collateral.

    (B) A security interest does not attach under a term constituting an after-acquired
    property clause to:

    (1) Consumer goods other than accessions when given as additional security unless
    the debtor acquires rights in them within ten days after the secured party gives
    value; or

    (2) A commercial tort claim.

    (C) A security agreement may provide that collateral secures, or that accounts,
    chattel paper, payment intangibles, or promissory notes are sold in connection
    with, future advances or other value, whether or not the advances or value are
    given pursuant to commitment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.204
- number: '1309.205'
  heading: Use or disposition of collateral permissible - UCC 9-205
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest is not invalid or fraudulent against creditors solely
    because:

    (1) The debtor has the right or ability to:

    (a) Use, commingle, or dispose of all or part of the collateral, including returned
    or repossessed goods;

    (b) Collect, compromise, enforce, or otherwise deal with collateral;

    (c) Accept the return of collateral or make repossessions; or

    (d) Use, commingle, or dispose of proceeds; or

    (2) The secured party fails to require the debtor to account for proceeds or replace
    collateral.

    (B) This section does not relax the requirements of possession if attachment,
    perfection, or enforcement of a security interest depends upon possession of the
    collateral by the secured party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.205
- number: '1309.206'
  heading: Security interest arising in purchase or delivery of financial asset -
    UCC 9-206
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A security interest in favor of a securities intermediary attaches to
    a person''s security entitlement if:

    (1) The person buys a financial asset through a securities intermediary in a transaction
    in which the person is obligated to pay the purchase price to the securities intermediary
    at the time of the purchase; and

    (2) The securities intermediary credits the financial asset to the buyer''s securities
    account before the buyer pays the securities intermediary.

    (B) The security interest described in division (A) of this section secures the
    person''s obligation to pay for the financial asset.

    (C) A security interest in favor of a person that delivers a certificated security
    or other financial asset represented by a writing attaches to the security or
    other financial asset if:

    (1) The security or other financial asset:

    (a) In the ordinary course of business is transferred by delivery with any necessary
    indorsement or assignment; and

    (b) Is delivered under an agreement between persons in the business of dealing
    with such securities or financial assets; and

    (2) The agreement calls for delivery against payment.

    (D) The security interest described in division (C) of this section secures the
    obligation to make payment for the delivery.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.206
- number: '1309.207'
  heading: Rights and duties of secured party having possession or control of collateral
    - UCC 9-207
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (D) of this section, a secured
    party shall use reasonable care in the custody and preservation of collateral
    in the secured party''s possession. In the case of an instrument or chattel paper,
    reasonable care includes taking necessary steps to preserve rights against prior
    parties unless otherwise agreed.

    (B) Except as otherwise provided in division (D) of this section, if a secured
    party has possession of collateral:

    (1) Reasonable expenses, including the cost of insurance and payment of taxes
    or other charges, incurred in the custody, preservation, use, or operation of
    the collateral are chargeable to the debtor and are secured by the collateral;

    (2) The risk of accidental loss or damage is on the debtor to the extent of a
    deficiency in any effective insurance coverage;

    (3) The secured party shall keep the collateral identifiable but fungible collateral
    may be commingled; and

    (4) The secured party may use or operate the collateral:

    (a) For the purpose of preserving the collateral or its value;

    (b) As permitted by an order of a court having competent jurisdiction; or

    (c) Except in the case of consumer goods, in the manner and to the extent agreed
    by the debtor.

    (C) Except as otherwise provided in division (D) of this section, a secured party
    having possession of collateral or control of collateral under section 1307.106,
    1309.104, 1309.105, 1309.106, or 1309.107 of the Revised Code:

    (1) May hold as additional security any proceeds, except money or funds, received
    from the collateral;

    (2) Shall apply money or funds received from the collateral to reduce the secured
    obligation, unless remitted to the debtor; and

    (3) May create a security interest in the collateral.

    (D) If the secured party is a buyer of accounts, chattel paper, payment intangibles,
    or promissory notes or a consignor:

    (1) Division (A) of this section does not apply unless the secured party is entitled
    under an agreement:

    (a) To charge back uncollected collateral; or

    (b) Otherwise to full or limited recourse against the debtor or a secondary obligor
    based on the nonpayment or other default of an account debtor or other obligor
    on the collateral; and

    (2) Divisions (B) and (C) of this section do not apply.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.207
- number: '1309.208'
  heading: Additional duties of secured party having control of collateral - UCC 9-208
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) This section applies to cases in which there is no outstanding secured
    obligation and the secured party is not committed to make advances, incur obligations,
    or otherwise give value.

    (B) Within ten days after receiving an authenticated demand by the debtor:

    (1) A secured party having control of a deposit account under division (A)(2)
    of section 1309.104 of the Revised Code shall send to the bank with which the
    deposit account is maintained an authenticated statement that releases the bank
    from any further obligation to comply with instructions originated by the secured
    party.

    (2) A secured party having control of a deposit account under division (A)(3)
    of section 1309.104 of the Revised Code shall:

    (a) Pay the debtor the balance on deposit in the deposit account; or

    (b) Transfer the balance on deposit into a deposit account in the debtor''s name.

    (3) A secured party, other than a buyer, having control of electronic chattel
    paper under section 1309.105 of the Revised Code shall:

    (a) Communicate the authoritative copy of the electronic chattel paper to the
    debtor or its designated custodian;

    (b) If the debtor designates a custodian that is the designated custodian with
    which the authoritative copy of the electronic chattel paper is maintained for
    the secured party, communicate to the custodian an authenticated record releasing
    the designated custodian from any further obligation to comply with instructions
    originated by the secured party and instructing the custodian to comply with instructions
    originated by the debtor; and

    (c) Take appropriate action to enable the debtor or its designated custodian to
    make copies of or revisions to the authoritative copy that add or change an identified
    assignee of the authoritative copy without the consent of the secured party.

    (4) A secured party having control of investment property under division (D)(2)
    of section 1308.24 or division (B) of section 1309.106 of the Revised Code shall
    send to the securities intermediary or commodity intermediary with which the security
    entitlement or commodity contract is maintained an authenticated record that releases
    the securities intermediary or commodity intermediary from any further obligation
    to comply with entitlement orders or directions originated by the secured party;
    and

    (5) A secured party having control of a letter-of-credit right under section 1309.107
    of the Revised Code shall send to each person having an unfulfilled obligation
    to pay or deliver proceeds of the letter of credit to the secured party an authenticated
    release from any further obligation to pay or deliver proceeds of the letter of
    credit to the secured party.

    (6) A secured party having control of an electronic document shall:

    (a) Give control of the electronic document to the debtor or its designated custodian;

    (b) If the debtor designates a custodian that is the designated custodian with
    which the authoritative copy of the electronic document is maintained for the
    secured party, communicate to the custodian an authenticated record releasing
    the designated custodian from any further obligation to comply with instructions
    originated by the secured party and instructing the custodian to comply with instructions
    originated by the debtor; and

    (c) Take appropriate action to enable the debtor or its designated custodian to
    make copies of or revisions to the authoritative copy which add or change an identified
    assignee of the authoritative copy without the consent of the secured party.'
