- number: '1306.22'
  heading: Use of electronic records and electronic signatures by general assembly
    and courts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) Nothing in sections 1306.01 to 1306.23 of the Revised Code shall be construed
    to require the general assembly, any legislative agency, the supreme court, the
    other courts of record in this state, or any judicial agency to use or permit
    the use of electronic records and electronic signatures.

    (B) The general assembly and the supreme court may adopt rules pertaining to the
    use of electronic records and electronic signatures by their respective bodies
    and agencies.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.22
