  text: Records that would disclose or may lead to the disclosure of records or information
    that would jeopardize the state's continued use or security of any computer or
    telecommunications devices or services associated with electronic signatures,
    electronic records, or electronic transactions are not public records for purposes
    of section 149.43 of the Revised Code.
