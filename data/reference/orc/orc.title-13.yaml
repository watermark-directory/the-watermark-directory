- number: '1315.08'
  heading: Quarterly reports - annual financial statements
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) Within forty-five days after the end of each calendar quarter, each licensee
    shall submit to the superintendent of financial institutions all of the following
    in the form prescribed by the superintendent:

    (1) The licensee''s unaudited, unconsolidated financial statements as of the end
    of the calendar quarter, including a balance sheet, income statement, statement
    of changes in shareholder''s equity, and statement of cash flows;

    (2) A statement for the calendar quarter of the number of money transmission transactions
    undertaken by the licensee in this state and in the United States in total, the
    dollar amount of those transactions, and the number and dollar amount of those
    transactions currently outstanding;

    (3) A schedule of the licensee''s permissible investments and their market values
    as of the end of the calendar quarter;

    (4) A schedule of the locations, if any, within this state at which the licensee
    is conducting business directly or through its authorized delegates;

    (5) Any other information that the superintendent requires.

    (B) Annually, not more than one hundred twenty days after the end of its fiscal
    year, each licensee shall submit to the superintendent its audited unconsolidated
    financial statements for the fiscal year, including a balance sheet, income statement,
    statement of changes in shareholder equity, and statement of cash flows. If the
    licensee is a subsidiary of another company, the licensee also shall submit the
    audited consolidated financial statements of its parent company.

    (C) No licensee shall fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.08
- number: '1315.081'
  heading: Written report of specified events
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) Within fifteen business days after the occurrence of any of the events
    listed below, a licensee shall file a written report with the superintendent describing
    the event and its expected impact on the licensee''s activities in the state:

    (1) Any material changes in information provided in a licensee''s application
    or any report submitted to the superintendent under sections 1315.01 to 1315.18
    of the Revised Code;

    (2) The licensee''s filing for bankruptcy or reorganization;

    (3) The institution of revocation or suspension proceedings against the licensee
    by any state or governmental authority with regard to the licensee''s money transmission
    activities;

    (4) Any felony indictment of the licensee, or any of its controlling persons,
    directors, officers, or employees, related to money transmission activities;

    (5) Any felony conviction of the licensee, or any of its controlling persons,
    directors, officers, or employees, related to money transmission activities;

    (6) Any proposed change of control of the licensee;

    (7) The licensee''s decision to voluntarily surrender or not to renew a money
    transmitter license it holds in another jurisdiction.

    (B)(1) No person shall make a false statement, misrepresentation, or false certification
    to the division of financial institutions or in a record filed or required to
    be maintained under sections 1315.01 to 1315.18 of the Revised Code or make a
    false entry or omit a material entry in a record filed or required to be maintained
    under sections 1315.01 to 1315.18 of the Revised Code or made available to the
    division.

    (2) No licensee shall fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.081
- number: '1315.09'
  heading: Records required to be kept
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) Each licensee shall make, keep, and preserve with respect to the licensee
    the following books, accounts, and other records for a period of five years to
    be open to inspection by the superintendent of financial institutions:

    (1) A record or records of each money transmission transaction;

    (2) A general ledger containing all assets, liabilities, capital, income, and
    expense accounts, posted at least monthly;

    (3) All bank statements and bank reconciliation records;

    (4) A record of all outstandings;

    (5) A record of all payments made;

    (6) The names and addresses of all authorized delegates of the licensee;

    (7) Any other records that the superintendent requires.

    (B) For purposes of this section, a licensee may retain a document, paper, or
    other instrument or record by use of a process to record, copy, photograph, or
    store a representation of the original document, paper, or other instrument or
    record, if all of the following apply:

    (1) The process correctly and accurately copies or reproduces, or provides a means
    for correctly and accurately copying or reproducing, the original document, paper,
    or other instrument or record with regard to both its substance and appearance,
    except that the copy or reproduction need not reflect the original paper or other
    medium, size, or color, unless the medium, size, or color is necessary to establish
    the authenticity of the original.

    (2) The process does not permit the recording, copy, photographic image, or stored
    representation of the original document, paper, or other instrument or record
    to be altered or manipulated.

    (3) The medium the process uses to record, copy, photograph, or store a representation
    of an original document, paper, or other instrument or record is a durable medium
    for retaining and reproducing records.

    (C) A licensee may maintain its records described in division (A) of this section
    at a location other than within this state, so long as the licensee makes its
    records accessible to the superintendent on seven business days written notice.

    (D) No licensee shall fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.09
- number: '1315.10'
  heading: Application for approval of control acquisition
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) Subject to division (F) of this section, no person, alone or acting in
    concert with other persons, shall, directly or indirectly, acquire control of
    a licensee without the prior approval of the superintendent of financial institutions.

    (B) A person or group of persons proposing to acquire control of a licensee shall
    submit an application for the superintendent''s approval in the form prescribed
    by the superintendent.

    (C)(1) The superintendent may grant confidential treatment for information in
    or related to an application described in division (B) of this section, if confidential
    treatment is requested by the applicant in compliance with division (C)(2) of
    this section and any of the following applies:

    (a) The information is of a commercial or financial nature, disclosure of which
    likely would result in substantial harm to the competitive position of the applicant
    or its affiliates or to any party to the transaction or its affiliates.

    (b) The information is of a personal, medical, financial, or similar nature, disclosure
    of which would result in a clearly unwarranted invasion of personal privacy.

    (c) The information is contained in, related to, or derived from examinations,
    operating or condition reports, agreements, orders, or actions prepared by, on
    behalf of, or for the use of a governmental agency or authority.

    (d) The information has been filed with a governmental agency or authority and
    has not been approved for disclosure by that agency or authority.

    (e) The information specifically is excepted from disclosure by statute.

    (2)(a) An applicant requesting confidential treatment under division (C) of this
    section shall do so in writing at the time the application containing the information,
    or additional information related to an application, is submitted.

    (b) The request described in division (C)(2)(a) of this section separately shall
    address each item of information for which confidential treatment is requested,
    explaining the applicability of the asserted justification for confidential treatment
    and either specifically demonstrating the harm that would result from public disclosure
    of the item of information or setting forth the reason that the applicant cannot
    authorize public disclosure of the item of information.

    (c) The applicant separately shall bind and identify all items of information
    for which confidential treatment is requested under division (C) of this section
    and make specific reference to those items in the remainder of the application
    or additional information related to the application.

    (3)(a) The superintendent shall review a request for confidential treatment under
    division (C) of this section and provide the applicant with written notice of
    the superintendent''s decision on granting confidential treatment for each item
    of information for which it is requested.

    (b) If the superintendent''s decision provided pursuant to division (C)(3)(a)
    of this section is not to grant confidential treatment to an item of information,
    the applicant may withdraw the item of information by written notice within ten
    days after the applicant''s receipt of the superintendent''s decision. If the
    applicant fails to withdraw the item of information within the ten-day period,
    the applicant is deemed to have waived the right to withdraw, and the item of
    information is deemed a part of the application available to the public.

    (4)(a) An item of information submitted with a request for confidential treatment
    under division (C) of this section is not deemed filed with the superintendent
    until the superintendent grants confidential treatment, or the applicant is deemed
    to have waived the right to withdraw the item of information.

    (b) Until the item of information submitted with a request for confidential treatment
    is filed in accordance with division (C)(4)(a) of this section, no person shall
    copy or inspect the item of information or anything derived from the item of information,
    except as is necessary to assist the superintendent in deciding whether to grant
    confidential treatment to the item of information in accordance with division
    (C) of this section.

    (5) When an item of information is filed following the superintendent''s decision
    to grant it confidential treatment pursuant to division (C)(3)(a) of this section,
    the item of information is not a public record as defined in section 149.43 of
    the Revised Code and only the superintendent shall use it in connection with the
    performance of the duties and exercise of the powers of the superintendent. Without
    prior notice to the applicant, the superintendent may disclose or comment on any
    of the contents of the application in an order, statement, or opinion issued by
    the superintendent in connection with a decision on the application.

    (D)(1) If the superintendent requests, the applicant shall bear the expense of
    the examination conducted in accordance with section 1315.101 of the Revised Code,
    and upon the superintendent''s request, shall advance to the superintendent the
    superintendent''s estimate of the cost of the examination, with any unconsumed
    portion to be returned to the applicant.

    (2) If the superintendent requests payment pursuant to division (D)(1) of this
    section, the applicant shall pay the cost of its examination described in section
    1315.101 of the Revised Code, or any balance of the cost of its examination in
    the case of an applicant that advanced the estimated cost of its examination,
    within fourteen days after receiving an invoice for payment.

    (E) The superintendent may do either of the following:

    (1) Deny an application described in division (B) of this section prior to the
    superintendent''s acceptance of the application for processing, on the basis that
    the applicant failed to include all of the items and address all of the issues
    required for the application, if both of the following apply:

    (a) The superintendent advised the person that the application was incomplete.

    (b) After being advised by the superintendent pursuant to division (E)(1)(a) of
    this section that the application was incomplete, the person, within a reasonable
    period of time, did not complete the application.

    (2) Deny an application described in division (B) of this section on the basis
    that the applicant failed to provide the information necessary for the superintendent
    to consider the application adequately after the superintendent''s acceptance
    of the application for processing, if both of the following apply:

    (a) After beginning to process the application, the superintendent determined
    and advised the applicant that additional information was necessary to consider
    the application adequately.

    (b) After being advised by the superintendent pursuant to division (E)(2)(a) of
    this section that additional information was necessary to consider the application
    adequately, the applicant, within a reasonable period of time, did not provide
    that information.

    (F)(1) Division (A) of this section requiring prior approval to obtain control,
    directly or indirectly, of a licensee does not apply to any of the following persons,
    but these persons shall notify the superintendent of a change of control:

    (a) A person that acts as a proxy for the sole purpose of voting at a designated
    meeting of the shareholders or holders of voting interests of a licensee or person
    in control of a licensee;

    (b) A person that acquires control of a licensee by devise or descent;

    (c) A person that acquires control as a personal representative, custodian, guardian,
    conservator, or trustee, or as an officer appointed by a court of competent jurisdiction
    or by operation of law;

    (d) A person that the superintendent by rule or order determines is not subject
    to division (A) of this section based on the public interest.

    (2) Division (A) of this section does not apply to public offerings of securities.

    (3) Before filing an application described in division (A) of this section, a
    person may request in writing a determination from the superintendent of whether
    the person would be considered a person in control of a licensee upon consummation
    of a proposed transaction. If the superintendent determines that the person would
    not be a person in control of a licensee, the person and the proposed transaction
    are not subject to the requirements of division (A) of this section.

    (G) No person shall fail to comply with this section.'
