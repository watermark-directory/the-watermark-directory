- number: '1309.106'
  heading: Control of investment property - UCC 9-106
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A person has control of a certificated security, uncertificated security,
    or security entitlement as provided in section 1308.24 of the Revised Code.

    (B) A secured party has control over a commodity contract if:

    (1) The secured party is the commodity intermediary with which the commodity contract
    is carried; or

    (2) The commodity customer, secured party, and commodity intermediary have agreed
    that the commodity intermediary will apply any value distributed on account of
    the commodity contract as directed by the secured party without further consent
    by the commodity customer.

    (C) A secured party having control of all security entitlements or commodity contracts
    carried in a securities account or commodity account has control over the securities
    account or commodity account.'
