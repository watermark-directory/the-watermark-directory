- number: '1305.14'
  heading: Statute of limitations - UCC 5-115
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: An action to enforce a right or obligation arising under this chapter must
    be commenced within one year after the expiration date of the relevant letter
    of credit or one year after the cause of action accrues, whichever occurs later.
    A cause of action accrues when the breach occurs, regardless of the aggrieved
    party's lack of knowledge of the breach.
