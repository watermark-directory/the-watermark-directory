- number: '1315.141'
  heading: Criminal records check to be requested by superintendent
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: Whenever the approval of the superintendent of financial institutions is required
    under sections 1315.01 to 1315.18 of the Revised Code, or under an order or supervisory
    action issued or taken under those sections, for a person to serve as an organizer,
    incorporator, director, executive officer, or controlling person of a licensee,
    or to otherwise have a substantial interest in or participate in the management
    of a licensee, the superintendent shall request the superintendent of the bureau
    of criminal identification and investigation, or a vendor approved by the bureau,
    to conduct a criminal records check based on the person's fingerprints in accordance
    with section 109.572 of the Revised Code. The superintendent of financial institutions
    shall request that criminal record information from the federal bureau of investigation
    be obtained as part of the criminal records check. Any fee required under division
    (C)(3) of section 109.572 of the Revised Code shall be paid by the person who
    is the subject of the request.
  history: null
