- number: '1337.571'
  heading: Digital assets
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to digital assets causes the agent to
    be an authorized user for the purpose of applicable computer fraud and unauthorized
    computer access laws and authorizes the agent to do all of the following:

    (A) Have access to any catalogue of electronic communications sent or received
    by the principal;

    (B) Have access to any other digital asset in which the principal has a right
    or interest;

    (C) Have the right to access any of the principal''s tangible personal property
    capable of receiving, storing, processing, or sending a digital asset;

    (D) Take any action concerning the asset to the extent of the account holder''s
    authority;

    (E) Have access to the content of electronic communications sent or received by
    the principal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.571
- number: '1337.58'
  heading: Gifts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) As used in this section, a gift "for the benefit of" a person includes
    a gift to a trust, an account under the Uniform Transfers to Minors Act, and a
    tuition savings account or prepaid tuition plan as defined under section 529 of
    the Internal Revenue Code of 1986, 26 U.S.C. 529.

    (B) Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to gifts authorizes the agent to do only
    the following:

    (1) Make outright to, or for the benefit of, a person, a gift of any of the principal''s
    property, including by the exercise of a presently exercisable general power of
    appointment held by the principal, in an amount per donee not to exceed the annual
    dollar limits of the federal gift tax exclusion under section 2503(b) of the Internal
    Revenue Code of 1986, 26 U.S.C. 2503(b), without regard to whether the federal
    gift tax exclusion applies to the gift, or if the principal''s spouse agrees to
    consent to a split gift pursuant to section 2513 of the Internal Revenue Code
    of 1986, 26 U.S.C. 2513, in an amount per donee not to exceed twice the annual
    federal gift tax exclusion limit;

    (2) Consent, pursuant to section 2513 of the Internal Revenue Code of 1986, 26
    U.S.C. 2513, to the splitting of a gift made by the principal''s spouse in an
    amount per donee not to exceed the aggregate annual gift tax exclusions for both
    spouses.

    (C) An agent may make a gift of the principal''s property, outright or by amending,
    creating, or funding a trust, only as the agent determines is consistent with
    the principal''s objectives if actually known by the agent and, if unknown, as
    the agent determines is consistent with the principal''s best interest based on
    all relevant factors, including all of the following:

    (1) The value and nature of the principal''s property;

    (2) The principal''s foreseeable obligations and need for maintenance;

    (3) Minimization of taxes, including income, estate, inheritance, generation-skipping
    transfer, and gift taxes;

    (4) Eligibility for a benefit, a program, or assistance under a statute or regulation;

    (5) The principal''s personal history of making or joining in making gifts.'
