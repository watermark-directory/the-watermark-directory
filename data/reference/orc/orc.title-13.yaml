  url: https://codes.ohio.gov/ohio-revised-code/section-1304.85
- number: '1305.01'
  heading: Definitions - UCC 5-102
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) As used in this chapter:

    (1) "Adviser" means a person who, at the request of the issuer, a confirmer, or
    another adviser, notifies or requests another adviser to notify the beneficiary
    that a letter of credit has been issued, confirmed, or amended.

    (2) "Applicant" means a person at whose request or for whose account a letter
    of credit is issued. The term includes a person who requests an issuer to issue
    a letter of credit on behalf of another if the person making the request undertakes
    an obligation to reimburse the issuer.

    (3) "Beneficiary" means a person who, under the terms of a letter of credit, is
    entitled to have its complying presentation honored. The term includes a person
    to whom drawing rights have been transferred under a transferable letter of credit.

    (4) "Confirmer" means a nominated person who undertakes, at the request or with
    the consent of the issuer, to honor a presentation under a letter of credit issued
    by another.

    (5) "Dishonor" of a letter of credit means failure timely to honor or to take
    an interim action, such as acceptance of a draft, that may be required by the
    letter of credit.

    (6) "Document" means a draft or other demand, document of title, investment security,
    certificate, invoice, or other record, statement, or representation of fact, law,
    right, or opinion that is (a) presented in a written or other medium permitted
    by the letter of credit or, unless prohibited by the letter of credit, by the
    standard practice referred to in division (E) of section 1305.07 of the Revised
    Code and (b) capable of being examined for compliance with the terms and conditions
    of the letter of credit. A document may not be oral.

    (7) "Good faith" means honesty in fact in the conduct or transaction concerned.

    (8) "Honor" of a letter of credit means performance of the issuer''s undertaking
    in the letter of credit to pay or deliver an item of value. Unless the letter
    of credit otherwise provides, "honor" occurs:

    (a) Upon payment;

    (b) If the letter of credit provides for acceptance, upon acceptance of a draft
    and, at maturity, its payment; or

    (c) If the letter of credit provides for incurring a deferred obligation, upon
    incurring the obligation and, at maturity, its performance.

    (9) "Issuer" means a bank or other person that issues a letter of credit, but
    does not include an individual who makes an engagement for personal, family, or
    household purposes.

    (10) "Letter of credit" means a definite undertaking that satisfies the requirements
    of section 1305.03 of the Revised Code by an issuer to a beneficiary at the request
    or for the account of an applicant or, in the case of a financial institution,
    to itself or for its own account, to honor a documentary presentation by payment
    or delivery of an item of value.

    (11) "Nominated person" means a person whom the issuer (a) designates or authorizes
    to pay, accept, negotiate, or otherwise give value under a letter of credit and
    (b) undertakes by agreement or custom and practice to reimburse.

    (12) "Presentation" means delivery of a document to an issuer or nominated person
    for honor or giving of value under a letter of credit.

    (13) "Presenter" means a person making a presentation as, or on behalf of, a beneficiary
    or nominated person.

    (14) "Record" means information that is inscribed on a tangible medium, or that
    is stored in an electronic or other medium and is retrievable in perceivable form.

    (15) "Successor of a beneficiary" means a person who succeeds to substantially
    all of the rights of a beneficiary by operation of law, including a corporation
    with or into which the beneficiary has been merged or consolidated, an administrator,
    executor, personal representative, trustee in bankruptcy, debtor in possession,
    liquidator, and receiver.

    (B) Definitions in other chapters applying to this chapter and the sections in
    which they appear are: "accept" or "acceptance" in section 1303.46 and "value"
    in sections 1303.33 and 1304.21 of the Revised Code.

    (C) Chapter 1301. of the Revised Code contains certain additional general definitions
    and principles of construction and interpretation applicable throughout this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.01
- number: '1305.02'
  heading: Scope - UCC 5-103
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) This chapter applies to letters of credit and to certain rights and obligations
    arising out of transactions involving letters of credit.

    (B) The statement of a rule in this chapter does not by itself require, imply,
    or negate application of the same or a different rule to a situation not provided
    for, or to a person not specified, in this chapter.

    (C) With the exception of this division, divisions (A) and (D) of this section,
    divisions (A)(9) and (10) of section 1305.01, division (D) of section 1305.05,
    and division (D) of section 1305.13, and except to the extent prohibited in section
    1301.302 and division (D) of section 1305.16 of the Revised Code, the effect of
    this chapter may be varied by agreement or by a provision stated or incorporated
    by reference in an undertaking. A term in an agreement or undertaking generally
    excusing liability or generally limiting remedies for failure to perform obligations
    is not sufficient to vary obligations prescribed by this chapter.

    (D) Rights and obligations of an issuer to a beneficiary or a nominated person
    under a letter of credit are independent of the existence, performance, or nonperformance
    of a contract or arrangement out of which the letter of credit arises or which
    underlies it, including contracts or arrangements between the issuer and the applicant
    and between the applicant and the beneficiary.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.02
- number: '1305.03'
  heading: Formal requirements - UCC 5-104
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: A letter of credit, confirmation, advice, transfer, amendment, or cancellation
    may be issued in any form that is a record and is authenticated by a signature
    or in accordance with the agreement of the parties or the standard practice referred
    to in division (E) of section 1305.07 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.03
- number: '1305.04'
  heading: Consideration - UCC 5-105
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: Consideration is not required to issue, amend, transfer, or cancel a letter
