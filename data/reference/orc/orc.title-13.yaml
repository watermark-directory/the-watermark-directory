- number: '1302.02'
  heading: Scope - certain security and other transactions excluded - UCC 2-102
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Unless the context otherwise requires, sections 1302.01 to 1302.98, inclusive,
    of the Revised Code, apply to transactions in goods; they do not apply to any
    transaction which although in the form of an unconditional contract to sell or
    present sale is intended to operate only as a security transaction nor do sections
    1302.01 to 1302.98, inclusive, of the Revised Code impair or repeal any statute
    regulating sales to consumers, farmers, or other specified classes of buyers.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.02
- number: '1302.03'
  heading: Goods to be severed from realty - recording - UCC 2-107
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A contract for the sale of minerals or the like, including oil and gas,
    or a structure or its materials to be removed from realty is a contract for the
    sale of goods within sections 1302.01 to 1302.98 of the Revised Code, if they
    are to be severed by the seller but until severance a purported present sale thereof
    which is not effective as a transfer of an interest in land is effective only
    as a contract to sell.

    (B) A contract for the sale apart from the land of growing crops or other things
    attached to realty and capable of severance without material harm thereto but
    not described in division (A) of this section or of timber to be cut is a contract
    for the sale of goods within sections 1302.01 to 1302.98 of the Revised Code,
    whether the subject matter is to be severed by the buyer or by the seller even
    though it forms part of the realty at the time of contracting, and the parties
    can by identification effect a present sale before severance.

    (C) The provisions of this section are subject to any third party rights provided
    by section 5301.25 of the Revised Code relating to realty records, and the contract
    for sale may be executed and recorded as a document transferring an interest in
    land, as provided in section 5301.25 of the Revised Code, and shall then constitute
    notice to third parties of the buyer''s rights under the contract for sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.03
- number: '1302.04'
  heading: Formal requirements - statute of frauds - UCC 2-201
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Except as otherwise provided in this section a contract for the sale
    of goods for the price of five hundred dollars or more is not enforceable by way
    of action or defense unless there is some writing sufficient to indicate that
    a contract for sale has been made between the parties and signed by the party
    against whom enforcement is sought or by his authorized agent or broker . A writing
    is not insufficient because it omits or incorrectly states a term agreed upon
    but the contract is not enforceable under this division beyond the quantity of
    goods shown in such writing.

    (B) Between merchants if within a reasonable time a writing in confirmation of
    the contract and sufficient against the sender is received and the party receiving
    it has reason to know its contents, it satisfies the requirements of division
    (A) of this section against such party unless written notice of objection to its
    contents is given within ten days after it is received.

    (C) A contract which does not satisfy the requirements of division (A) of this
    section but which is valid in other respects is enforceable:

    (1) if the goods are to be specially manufactured for the buyer and are not suitable
    for sale to others in the ordinary course of the seller''s business and the seller,
    before notice of repudiation is received and under circumstances which reasonably
    indicate that the goods are for the buyer, has made either a substantial beginning
    of their manufacture or commitments for their procurement; or

    (2) if the party against whom enforcement is sought admits in his pleading, testimony,
    or otherwise in court that a contract for sale was made, but the contract is not
    enforceable under this provision beyond the quantity of goods admitted; or

    (3) with respect to goods for which payment has been made and accepted or which
    have been received and accepted in accordance with section 1302.64 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.04
- number: '1302.05'
  heading: Final written expression - parol or extrinsic evidence - UCC 2-202
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Terms with respect to which the confirmatory memoranda of the parties agree
    or which are otherwise set forth in a writing intended by the parties as a final
    expression of their agreement with respect to such terms as are included therein
    may not be contradicted by evidence of any prior agreement or of a contemporaneous
    oral agreement but may be explained or supplemented:

    (A) by course of performance, course of dealing, or usage of trade as provided
    in section 1301.303 of the Revised Code; and

    (B) by evidence of consistent additional terms unless the court finds the writing
    to have been intended also as a complete and exclusive statement of the terms
    of the agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.05
- number: '1302.06'
  heading: Seals inoperative - UCC 2-203
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: The affixing of a seal to a writing evidencing a contract for sale or an offer
    to buy or sell goods does not constitute the writing a sealed instrument and the
    law with respect to sealed instruments does not apply to such a contract or offer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.06
- number: '1302.07'
  heading: Formation in general - UCC 2-204
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A contract for sale of goods may be made in any manner sufficient to
    show agreement, including conduct by both parties which recognizes the existence
    of such a contract.

    (B) An agreement sufficient to constitute a contract for sale may be found even
    though the moment of its making is undetermined.

    (C) Even though one or more terms are left open a contract for sale does not fail
    for indefiniteness if the parties have intended to make a contract and there is
    a reasonably certain basis for giving an appropriate remedy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.07
- number: '1302.08'
  heading: Firm offers - UCC 2-205
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: An offer by a merchant to buy or sell goods in a signed writing which by its
    terms gives assurance that it will be held open is not revocable, for lack of
    consideration, during the time stated or if no time is stated for a reasonable
    time, but in no event may such period of irrevocability exceed three months; but
    any such term of assurance on a form supplied by the offeree must be separately
    signed by the offeror.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.08
- number: '1302.09'
  heading: Offer and acceptance in formation of contract - UCC 2-206
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Unless otherwise unambiguously indicated by the language or circumstances:

    (1) an offer to make a contract shall be construed as inviting acceptance in any
    manner and by any medium reasonable in the circumstances;

    (2) an order or other offer to buy goods for prompt or current shipment shall
    be construed as inviting acceptance either by a prompt promise to ship or by the
    prompt or current shipment of conforming or non-conforming goods, but such a shipment
    of non-conforming goods does not constitute an acceptance if the seller seasonably
    notifies the buyer that the shipment is offered only as an accommodation to the
    buyer.

    (B) Where the beginning of a requested performance is a reasonable mode of acceptance
    an offeror who is not notified of acceptance within a reasonable time may treat
    the offer as having lapsed before acceptance.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.09
- number: '1302.10'
  heading: Additional terms in acceptance or confirmation - UCC 2-207
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A definite and seasonable expression of acceptance or a written confirmation
    that is sent within a reasonable time operates as an acceptance even though it
    states terms additional or different from those offered or agreed upon, unless
    acceptance is expressly made conditional on assent to the additional or different
    terms.

    (B) The additional terms are to be construed as proposals for addition to the
    contract. Between merchants, the terms become part of the contract unless one
    of the following applies:

    (1) The offer expressly limits acceptance to the terms of the offer.

    (2) They materially alter it.

    (3) Notification of objection to them has already been given or is given within
    a reasonable time after notice of them is received.

    (C) Conduct by both parties that recognizes the existence of a contract is sufficient
    to establish a contract for sale although the writings of the parties do not otherwise
    establish a contract. In such case, the terms of the particular contract consist
    of those terms on which the writings of the parties agree, together with any supplementary
    terms incorporated under any other provisions of Chapters 1301., 1302., 1303.,
    1304., 1305., 1307., 1308., 1309., and 1310. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.10
- number: '1302.12'
  heading: Modification, rescission, and waiver - UCC 2-209
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) An agreement modifying a contract within sections 1302.01 to 1302.98,
    inclusive, of the Revised Code, needs no consideration to be binding.

    (B) A signed agreement which excludes modification or rescission except by a signed
    writing cannot be otherwise modified or rescinded, but except as between merchants
    such a requirement on a form supplied by the merchant must be separately signed
    by the other party.

    (C) The requirements of section 1302.04 of the Revised Code, must be satisfied
    if the contract as modified is within its provisions.

    (D) Although an attempt at modification or rescission does not satisfy the requirements
    of division (B) or (C) of this section, it can operate as a waiver.

    (E) A party who has made a waiver affecting an executory portion of the contract
    may retract the waiver by reasonable notification received by the other party
    that strict performance will be required of any term waived, unless the retraction
    would be unjust in view of a material change of position in reliance on the waiver.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.12
- number: '1302.13'
  heading: Delegation of performance - assignment of rights - UCC 2-210
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A party may perform the party''s duty through a delegate unless otherwise
    agreed or unless the other party has a substantial interest in having the original
    promisor perform or control the acts required by the contract. No delegation of
    performance relieves the party delegating of any duty to perform or any liability
    for breach.

    (B)(1) Except as otherwise provided in section 1309.406 of the Revised Code, unless
    otherwise agreed all rights of either seller or buyer can be assigned except where
    the assignment would materially change the duty of the other party, or increase
    materially the burden or risk imposed on the other party by the contract, or impair
    materially the other party''s chance of obtaining return performance. A right
    to damages for breach of the whole contract or a right arising out of the assignor''s
    due performance of the assignor''s entire obligation can be assigned despite agreement
    otherwise.

    (2) The creation, attachment, perfection, or enforcement of a security interest
    in the seller''s interest under a contract is not a transfer that materially changes
    the duty of or increases materially the burden or risk imposed on the buyer or
    impairs materially the buyer''s chance of obtaining return performance under division
    (B)(1) of this section unless, and then only to the extent that, enforcement actually
    results in a delegation of material performance of the seller. In any case, the
    creation, attachment, perfection, and enforcement of the security interest remain
    effective, but the seller is liable to the buyer for damages caused by the delegation
    to the extent that the damages could not reasonably be prevented by the buyer,
    and a court having jurisdiction may grant other appropriate relief, including
    cancellation of the contract for sale or an injunction against enforcement of
    the security interest or consummation of the enforcement.

    (C) Unless the circumstances indicate the contrary a prohibition of assignment
    of "the contract" is to be construed as barring only the delegation to the assignee
    of the assignor''s performance.

    (D) An assignment of "the contract" or of "all my rights under the contract" or
    an assignment in similar general terms is an assignment of rights and unless the
    language or the circumstances (as in an assignment for security) indicate the
    contrary, it is a delegation of performance of the duties of the assignor and
    its acceptance by the assignee constitutes a promise by the assignee to perform
    those duties. This promise is enforceable by either the assignor or the other
    party to the original contract.

    (E) The other party may treat any assignment which delegates performance as creating
    reasonable grounds for insecurity and may without prejudice to the other party''s
    rights against the assignor demand assurances from the assignee as provided in
    section 1302.67 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.13
- number: '1302.14'
  heading: General obligations of parties - UCC 2-301
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: The obligation of the seller is to transfer and deliver and that of the buyer
    is to accept and pay in accordance with the contract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.14
- number: '1302.15'
  heading: Unconscionable contract or clause - UCC 2-302
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) If the court as a matter of law finds the contract or any clause of the
    contract to have been unconscionable at the time it was made the court may refuse
    to enforce the contract or it may enforce the remainder of the contract without
    the unconscionable clause, or it may so limit the application of any unconscionable
    clause as to avoid any unconscionable result.

    (B) When it is claimed or appears to the court that the contract or any clause
    thereof may be unconscionable the parties shall be afforded a reasonable opportunity
    to present evidence as to its commercial setting, purpose, and effect to aid the
    court in making the determination.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.15
- number: '1302.16'
  heading: Allocation or division of risks - UCC 2-303
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Where the provisions of sections 1302.01 to 1302.98, inclusive, of the Revised
    Code allocate a risk or a burden as between the parties "unless otherwise agreed"
    the agreement may not only shift the allocation but may also divide the risk or
    burden.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.16
- number: '1302.17'
  heading: Price payable in money, goods, realty, or otherwise - UCC 2-304
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The price can be made payable in money or otherwise. If it is payable
    in whole or in part in goods each party is a seller of the goods which he is to
    transfer.

    (B) Even though all or part of the price is payable in an interest in realty the
    transfer of the goods and the seller''s obligations with reference to them are
    subject to sections 1302.01 to 1302.98, inclusive, of the Revised Code, but not
    the transfer of the interest in realty or the transferor''s obligations in connection
    therewith.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.17
- number: '1302.18'
  heading: Open price term - UCC 2-305
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The parties if they so intend can conclude a contract for sale even though
    the price is not settled. In such a case the price is a reasonable price at the
    time for delivery if:

    (1) nothing is said as to price; or

    (2) the price is left to be agreed by the parties and they fail to agree; or

    (3) the price is to be fixed in terms of some agreed market or other standard
    as set or recorded by a third person or agency and if it is not so set or recorded.

    (B) A price to be fixed by the seller or by the buyer means a price for him to
    fix in good faith.

    (C) When a price left to be fixed otherwise than by agreement of the parties fails
    to be fixed through fault of one party the other may at his option treat the contract
    as cancelled or himself fix a reasonable price.

    (D) Where, however, the parties intend not to be bound unless the price be fixed
    or agreed and it is not fixed or agreed there is no contract. In such a case the
    buyer must return any goods already received or if unable to do so must pay their
    reasonable value at the time of delivery and the seller must return any portion
    of the price paid on account.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.18
- number: '1302.19'
  heading: Output, requirements, and exclusive dealings - UCC 2-306
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A term which measures the quantity by the output of the seller or the
    requirements of the buyer means such actual output or requirements as may occur
    in good faith, except that no quantity unreasonably disproportionate to any stated
    estimate or in the absence of a stated estimate to any normal or otherwise comparable
    prior output or requirements may be tendered or demanded.

    (B) A lawful agreement by either the seller or the buyer for exclusive dealing
    in the kind of goods concerned imposes unless otherwise agreed an obligation by
    the seller to use best efforts to supply the goods and by the buyer to use best
    efforts to promote their sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.19
- number: '1302.20'
  heading: Delivery in single lot or several lots - UCC 2-307
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Unless otherwise agreed all goods called for by a contract for sale must be
    tendered in a single delivery and payment is due only on such tender but where
    the circumstances give either party the right to make or demand delivery in lots
    the price if it can be apportioned may be demanded for each lot.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.20
- number: '1302.21'
  heading: Absence of specified place for delivery - UCC 2-308
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Unless otherwise agreed:

    (A) the place for delivery of goods is the seller''s place of business or if he
    has none his residence; but

    (B) in a contract for sale of identified goods which to the knowledge of the parties
    at the time of contracting are in some other place, that place is the place for
    their delivery; and

    (C) documents of title may be delivered through customary banking channels.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.21
- number: '1302.22'
  heading: Absence of specific time provisions - notice of termination - UCC 2-309
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The time for shipment or delivery or any other action under a contract
    if not provided in sections 1302.01 to 1302.98, inclusive, of the Revised Code
    or agreed upon shall be a reasonable time.

    (B) Where the contract provides for successive performances but is indefinite
    in duration it is valid for a reasonable time but unless otherwise agreed may
    be terminated at any time by either party.

    (C) Termination of a contract by one party except on the happening of an agreed
    event requires that reasonable notification be received by the other party and
    an agreement dispensing with notification is invalid if its operation would be
    unconscionable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.22
- number: '1302.23'
  heading: Open time for payment or running of credit - authority to ship under reservation
    - UCC 2-310
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Unless otherwise agreed:

    (A) Payment is due at the time and place at which the buyer is to receive the
    goods even though the place of shipment is the place of delivery; and

    (B) if the seller is authorized to send the goods the seller may ship them under
    reservation, and may tender the documents of title, but the buyer may inspect
    the goods after their arrival before payment is due unless such inspection is
    inconsistent with the terms of the contract as provided in section 1302.57 of
    the Revised Code; and

    (C) if delivery is authorized and made by way of documents of title otherwise
    than as provided in division (B) of this section, then payment is due regardless
    of where the goods are to be received (1) at the time and place at which the buyer
    is to receive delivery of the tangible documents or (2) at the time the buyer
    is to receive delivery of the electronic documents and at the seller''s place
    of business or if none, the seller''s residence; and

    (D) where the seller is required or authorized to ship the goods on credit the
    credit period runs from the time of shipment but post-dating the invoice or delaying
    its dispatch will correspondingly delay the starting of the credit period.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.23
- number: '1302.24'
  heading: Options and cooperation respecting performance - UCC 2-311
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) An agreement for sale which is otherwise sufficiently definite as provided
    in division (C) of section 1302.07 of the Revised Code to be a contract is not
    made invalid by the fact that it leaves particulars of performance to be specified
    by one of the parties. Any such specification must be made in good faith and within
    limits set by commercial reasonableness.

    (B) Unless otherwise agreed specifications relating to assortment of the goods
    are at the buyer''s option and except as otherwise provided in divisions (A)(3)
    and (C) of section 1302.32 of the Revised Code, specifications or arrangements
    relating to shipment are at the seller''s option.

    (C) Where such specification would materially affect the other party''s performance
    but is not seasonably made or where one party''s cooperation is necessary to the
    agreed performance of the other but is not seasonably forthcoming, the other party
    in addition to all other remedies:

    (1) is excused for any resulting delay in his own performance; and

    (2) may also either proceed to perform in any reasonable manner or after the time
    for a material part of his own performance treat the failure to specify or to
    cooperate as a breach by failure to deliver or accept the goods.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.24
- number: '1302.25'
  heading: Warranty of title and against infringement - buyer's obligation against
    infringement - UCC 2-312
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Subject to division (B) of this section there is in a contract for sale
    a warranty by the seller that:

    (1) The title conveyed shall be good, and its transfer rightful; and

    (2) the goods shall be delivered free from any security interest or other lien
    or encumbrance of which the buyer at the time of contracting has no knowledge.

    (B) A warranty under division (A) of this section will be excluded or modified
    only by specific language or by circumstances which give the buyer reason to know
    that the person selling does not claim title in himself or that he is purporting
    to sell only such right or title as he or a third person may have.

    (C) Unless otherwise agreed a seller who is a merchant regularly dealing in goods
    of the kind warrants that the goods shall be delivered free of the rightful claim
    of any third person by way of infringement or the like but a buyer who furnishes
    specifications to the seller must hold the seller harmless against any such claim
    which arises out of compliance with the specifications.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.25
- number: '1302.26'
  heading: Express warranties by affirmation, promise, description, sample - UCC 2-313
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Express warranties by the seller are created as follows:

    (1) Any affirmation of fact or promise made by the seller to the buyer which relates
    to the goods and becomes part of the basis of the bargain creates an express warranty
    that the goods shall conform to the affirmation or promise.

    (2) Any description of the goods which is made part of the basis of the bargain
    creates an express warranty that the goods shall conform to the description.

    (3) Any sample or model which is made part of the basis of the bargain creates
    an express warranty that the whole of the goods shall conform to the sample or
    model.

    (B) It is not necessary to the creation of an express warranty that the seller
    use formal words such as "warrant" or "guarantee" or that he have a specific intention
    to make a warranty, but an affirmation merely of the value of the goods or a statement
    purporting to be merely the seller''s opinion or commendation of the goods does
    not create a warranty.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.26
- number: '1302.27'
  heading: Implied warranty - merchantability - usage of trade - UCC 2-314
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Unless excluded or modified as provided in section 1302.29 of the Revised
    Code, a warranty that the goods shall be merchantable is implied in a contract
    for their sale if the seller is a merchant with respect to goods of that kind.
    Under this section the serving for value of food or drink to be consumed either
    on the premises or elsewhere is a sale.

    (B) Goods to be merchantable must be at least such as:

    (1) pass without objection in the trade under the contract description; and

    (2) in the case of fungible goods are of fair average quality within the description;
    and

    (3) are fit for the ordinary purposes for which such goods are used; and

    (4) run, within the variations permitted by the agreement, of even kind, quality
    and quantity, within each unit and among all units involved; and

    (5) are adequately contained, packaged, and labeled as the agreement may require;
    and

    (6) conform to the promises or affirmations of fact made on the container or label
    if any.

    (C) Unless excluded or modified as provided in section 1302.29 of the Revised
    Code, other implied warranties may arise from course of dealing or usage of trade.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.27
- number: '1302.28'
  heading: Implied warranty - fitness for particular purpose - UCC 2-315
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Where the seller at the time of contracting has reason to know any particular
    purpose for which the goods are required and that the buyer is relying on the
    seller's skill or judgment to select or furnish suitable goods, there is unless
    excluded or modified under section 1302.29 of the Revised Code an implied warranty
    that the goods shall be fit for such purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.28
- number: '1302.29'
  heading: Exclusion or modification of warranties - UCC 2-316
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Words or conduct relevant to the creation of an express warranty and
    words or conduct tending to negate or limit warranty shall be construed wherever
    reasonable as consistent with each other; but subject to the provisions of section
    1302.05 of the Revised Code on parol or extrinsic evidence, negation or limitation
    is inoperative to the extent that such construction is unreasonable.

    (B) Subject to division (C) of this section, to exclude or modify the implied
    warranty of merchantability or any part of it the language must mention merchantability
    and in case of a writing must be conspicuous, and to exclude or modify any implied
    warranty of fitness the exclusion must be by a writing and conspicuous. Language
    to exclude all implied warranties of fitness is sufficient if it states for example,
    that "There are no warranties which extend beyond the description on the face
    hereof."

    (C) Notwithstanding division (B) of this section:

    (1) unless the circumstances indicate otherwise all implied warnanties are excluded
    by expressions like "as is", "with all faults", or other language which in common
    understanding calls the buyer''s attention to the exclusion of warranties and
    makes plain that there is no implied warranty; and

    (2) when the buyer before entering into the contract has examined the goods or
    the sample or model as fully as he desired or has refused to examine the goods
    there is no implied warranty with regard to defects which an examination ought
    in the circumstances to have revealed to him; and

    (3) an implied warranty can also be excluded or modified by course of dealing
    or course of performance or usage of trade; and

    (4) with respect to the sale of livestock between merchants, except sales of livestock
    for immediate slaughter, both of the following apply:

    (a) There is no implied warranty that the animal is free from disease.

    (b) There is an implied warranty that the seller has no knowledge or reason to
    know that the animal is not free from disease at the time of sale and that he
    has complied with all state and federal health rules applicable to the animal.

    (D) Remedies for breach of warranty can be limited in accordance with the provisions
    of sections 1302.92 and 1302.93 of the Revised Code on liquidation or limitation
    of damages and on contractual modification of remedy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.29
- number: '1302.30'
  heading: Cumulation and conflict of warranties express or implied - UCC 2-317
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Warranties whether express or implied shall be construed as consistent with
    each other and as cumulative, but if such construction is unreasonable the intention
    of the parties shall determine which warranty is dominant. In ascertaining that
    intention the following rules apply:

    (A) Exact or technical specifications displace an inconsistent sample or model
    or general language of description.

    (B) A sample from an existing bulk displaces inconsistent general language of
    description.

    (C) Express warranties displace inconsistent implied warranties other than an
    implied warranty of fitness for a particular purpose.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.30
- number: '1302.31'
  heading: Third party beneficiaries of warranties express or implied - UCC 2-318
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: A seller's warranty whether express or implied extends to any natural person
    who is in the family or household of his buyer or who is a guest in his home if
    it is reasonable to expect that such person may use, consume, or be affected by
    the goods and who is injured in person by breach of the warranty. A seller may
    not exclude or limit the operation of this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.31
- number: '1302.32'
  heading: F.O.B. and F.A.S. terms - UCC 2-319
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Unless otherwise agreed the term F.O.B. (which means "free on board")
    at a named place, even though used only in connection with the stated price, is
    a delivery term under which:

    (1) when the term is F.O.B. the place of shipment, the seller must at that place
    ship the goods in the manner provided in section 1302.48 of the Revised Code and
    bear the expense and risk of putting them into the possession of the carrier;
    or

    (2) when the term is F.O.B. the place of destination, the seller must at his own
    expense and risk transport the goods to that place and there tender delivery of
    them in the manner provided in section 1302.47 of the Revised Code;

    (3) when under either divisions (A)(1) or (A)(2) of this section the term is also
    F.O.B. vessel, car, or other vehicle, the seller must in addition at his own expense
    and risk load the goods on board. If the term is F.O.B. vessel the buyer must
    name the vessel and in an appropriate case the seller must comply with the provisions
    of section 1302.36 of the Revised Code on the form of bill of lading.

    (B) Unless otherwise agreed the term F.A.S. vessel (which means "free alongside"),
    at a named port, even though used only in connection with the stated price, is
    a delivery term under which the seller must:

    (1) at his own expense and risk deliver the goods alongside the vessel in the
    manner usual in that port or on a dock designated and provided by the buyer; and

    (2) obtain and tender a receipt for the goods in exchange for which the carrier
    is under a duty to issue a bill of lading.

    (C) Unless otherwise agreed in any case falling within divisions (A)(1) or (B)
    of this section, the buyer must seasonably give any needed instructions for making
    delivery, including when the term is F.A.S. or F.O.B. the loading berth of the
    vessel and in an appropriate case its name and sailing date. The seller may treat
    the failure of needed instructions as a failure of cooperation as provided in
    section 1302.24 of the Revised Code. He may also at his option move the goods
    in any reasonable manner preparatory to delivery or shipment.

    (D) Under the term F.O.B. vessel or F.A.S. unless otherwise agreed the buyer must
    make payment against tender of the required documents and the seller may not tender
    nor the buyer demand delivery of the goods in substitution for the documents.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.32
- number: '1302.33'
  heading: C.I.F. and C. and F. terms - UCC 2-320
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The term C.I.F. means the price includes in a lump sum the cost of the
    goods and the insurance and freight to the named destination. The term C. & F.
    or C.F. means that the price so includes cost and freight to the named destination.

    (B) Unless otherwise agreed and even though used only in connection with the stated
    price and destination, the term C.I.F. destination or its equivalent requires
    the seller at his own expense and risk to:

    (1) put the goods into the possession of a carrier at the port for shipment and
    obtain a negotiable bill or bills of lading covering the entire transportation
    to the named destination; and

    (2) load the goods and obtain a receipt from the carrier, which may be contained
    in the bill of lading, showing that the freight has been paid or provided for;
    and

    (3) obtain a policy or certificate of insurance, including any war risk insurance,
    of a kind and on terms then current at the port of shipment in the usual amount,
    in the currency of the contract, shown to cover the same goods covered by the
    bill of lading and providing for payment of loss to the order of the buyer or
    for the account of whom it may concern; but the seller may add to the price the
    amount of the premium for any such war risk insurance; and

    (4) prepare an invoice of the goods and procure any other documents required to
    effect shipment or to comply with the contract; and

    (5) forward and tender with commercial promptness all the documents in due form
    and with any indorsement necessary to perfect the buyer''s rights.

    (C) Unless otherwise agreed the term C. & F. or its equivalent has the same effect
    and imposes upon the seller the same obligations and risks as a C.I.F. term except
    the obligation as to insurance.

    (D) Under the term C.I.F. or C. & F. unless otherwise agreed the buyer must make
    payment against tender of the required documents and the seller may not tender
    nor the buyer demand delivery of the goods in substitution for the documents.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.33
- number: '1302.34'
  heading: C.I.F. or C. and F. - net landed weights - payment on arrival - warranty
    of condition on arrival - UCC 2-321
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Under a contract containing a term C.I.F. or C. & F.:

    (A) Where the price is based on or is to be adjusted according to "net landed
    weights ", "delivered weights ", "out turn" quantity or quality or the like, unless
    otherwise agreed the seller must reasonably estimate the price. The payment due
    on tender of the documents called for by the contract is the amount so estimated,
    but after final adjustment of the price a settlement must be made with commercial
    promptness.

    (B) An agreement described in division (A) of this section or any warranty of
    quality or condition of the goods on arrival places upon the seller the risk of
    ordinary deterioration, shrinkage, and the like in transportation but has no effect
    on the place or time of identification to the contract for sale or delivery or
    on the passing of the risk of loss.

    (C) Unless otherwise agreed where the contract provides for payment on or after
    arrival of the goods the seller must before payment allow such preliminary inspection
    as is feasible; but if the goods are lost delivery of the documents and payment
    are due when the goods should have arrived.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.34
- number: '1302.35'
  heading: Delivery ex-ship - UCC 2-322
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Unless otherwise agreed a term for delivery of goods "ex-ship" (which
    means from the carrying vessel) or in equivalent language is not restricted to
    a particular ship and requires delivery from a ship which has reached a place
    at the named port of destination where goods of the kind are usually discharged.

    (B) Under such a term unless otherwise agreed:

    (1) the seller must discharge all liens arising out of the carriage and furnish
    the buyer with a direction which puts the carrier under a duty to deliver the
    goods; and

    (2) the risk of loss does not pass to the buyer until the goods leave the ship''s
    tackle or are otherwise properly unloaded.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.35
- number: '1302.36'
  heading: Form of bill of lading required in overseas shipment - overseas defined
    - UCC 2-323
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the contract contemplates overseas shipment and contains a term
    C.I.F. or C. & F. or F.O.B. vessel, the seller unless otherwise agreed must obtain
    a negotiable bill of lading stating that the goods have been loaded on board or,
    in the case of a term C.I.F. or C.&F., received for shipment.

    (B) Where in a case within division (A) of this section, a tangible bill of lading
    has been issued in a set of parts, unless otherwise agreed if the documents are
    not to be sent from abroad, the buyer may demand tender of the full set; otherwise
    only one part of the bill of lading need be tendered. Even if the agreement expressly
    requires a full set:

    (1) due tender of a single part is acceptable within the provisions of section
    1302.52 of the Revised Code on cure of improper delivery; and

    (2) even though the full set is demanded, if the documents are sent from abroad
    the person tendering an incomplete set may nevertheless require payment upon furnishing
    an indemnity which the buyer in good faith deems adequate.

    (C) A shipment by water or by air or a contract contemplating such shipment is
    "overseas" insofar as by usage of trade or agreement it is subject to the commercial,
    financing, or shipping practices characteristic of international deep water commerce.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.36
- number: '1302.37'
  heading: No arrival, no sale term - UCC 2-324
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Under a term "no arrival, no sale" or terms of like meaning, unless otherwise
    agreed:

    (A) the seller must properly ship conforming goods and if they arrive by any means
    he must tender them on arrival but he assumes no obligation that the goods will
    arrive unless he has caused the nonarrival; and

    (B) where without fault of the seller the goods are in part lost or have so deteriorated
    as no longer to conform to the contract or arrive after the contract time, the
    buyer may proceed as if there had been casualty to identified goods as provided
    in section 1302.71 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.37
- number: '1302.38'
  heading: Letter of credit - confirmed credit - UCC 2-325
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Failure of the buyer seasonably to furnish an agreed letter of credit
    is a breach of the contract for sale.

    (B) The delivery to seller of a proper letter of credit suspends the buyer''s
    obligation to pay. If the letter of credit is dishonored, the seller may on seasonable
    notification to the buyer require payment directly from him.

    (C) Unless otherwise agreed the term "letter of credit" or "banker''s credit"
    in a contract for sale means an irrevocable credit issued by a financing agency
    of good repute and, where the shipment is overseas, of good international repute.
    The term "confirmed credit" means that the credit must also carry the direct obligation
    of such an agency which does business in the seller''s financial market.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.38
- number: '1302.39'
  heading: Sale on approval and sale or return - rights of creditors - UCC 2-326
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Unless otherwise agreed, if delivered goods may be returned by the buyer
    even though they conform to the contract, the transaction is:

    (1) a "sale on approval" if the goods are delivered primarily for use, and

    (2) a "sale or return" if the goods are delivered primarily for resale.

    (B) Goods held on approval are not subject to the claims of the buyer''s creditors
    until acceptance. Goods held on sale or return are subject to the claims of the
    buyer''s creditor''s while in the buyer''s possession.

    (C) Any "or return" term of a contract for sale is to be treated as a separate
    contract for sale within section 1302.04 of the Revised Code and as contradicting
    the sale aspect of the contract within the provisions of section 1302.05 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.39
- number: '1302.40'
  heading: Special incidents of sale on approval and sale or return - UCC 2-327
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Under a sale on approval unless otherwise agreed:

    (1) although the goods are identified to the contract the risk of loss and the
    title do not pass to the buyer until acceptance; and

    (2) use of the goods consistent with the purpose of trial is not acceptance but
    failure seasonably to notify the seller of election to return the goods is acceptance,
    and if the goods conform to the contract acceptance of any part is acceptance
    of the whole; and

    (3) after due notification of election to return, the return is at the seller''s
    risk and expense but a merchant buyer must follow any reasonable instructions.

    (B) Under a sale or return unless otherwise agreed:

    (1) the option to return extends to the whole or any commercial unit of the goods
    while in substantially their original condition, but must be exercised seasonably;
    and

    (2) the return is at the buyer''s risk and expense.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.40
- number: '1302.41'
  heading: Sale by auction - UCC 2-328
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) In a sale by auction if goods are put up in lots each lot is the subject
    of a separate sale.

    (B) A sale by auction is complete when the auctioneer so announces by the fall
    of the hammer or in other customary manner. Where a bid is made while the hammer
    is falling in acceptance of a prior bid, the auctioneer may in his discretion
    reopen the bidding or declare the goods sold under the bid on which the hammer
    was falling.

    (C) Such a sale is with reserve unless the goods are in explicit terms put up
    without reserve. In an auction with reserve the auctioneer may withdraw the goods
    at any time until he announces completion of the sale. In an auction without reserve,
    after the auctioneer calls for bids on an article or lot, that article or lot
    cannot be withdrawn unless no bid is made within a reasonable time. In either
    case a bidder may retract his bid until the auctioneer''s announcement of completion
    of the sale, but a bidder''s retraction does not revive any previous bid.

    (D) If the auctioneer knowingly receives a bid on the seller''s behalf or the
    seller makes or procures such a bid, and notice has not been given that liberty
    for such bidding is reserved, the buyer may at his option avoid the sale or take
    the goods at the price of the last good faith bid prior to the completion of the
    sale. This division shall not apply to any bid at a force sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.41
- number: '1302.42'
  heading: Passing of title - reservation for security - limited application of this
    section - UCC 2-401
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Each provision of sections 1302.01 to 1302.98 of the Revised Code with regard
    to the rights, obligations, and remedies of the seller, the buyer, purchasers,
    or other third parties applies irrespective of title to the goods except where
    the provision refers to that title. Insofar as situations are not covered by the
    other provisions of sections 1302.01 to 1302.98 of the Revised Code and matters
    concerning title become material, the following rules apply:

    (A) Title to goods cannot pass under a contract for sale prior to their identification
    to the contract pursuant to section 1302.45 of the Revised Code, and unless otherwise
    explicitly agreed the buyer acquires by their identification a special property
    as limited by Chapters 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309.,
    and 1310. of the Revised Code. Any retention or reservation by the seller of the
    title (property) in goods shipped or delivered to the buyer is limited in effect
    to a reservation of a security interest. Subject to these provisions and to the
    provisions of Chapter 1309. of the Revised Code, title to goods passes from the
    seller to the buyer in any manner and on any conditions explicitly agreed on by
    the parties.

    (B) Unless otherwise explicitly agreed, title passes to the buyer at the time
    and place at which the seller completes performance with reference to the physical
    delivery of the goods, despite any reservation of a security interest and even
    though a document of title is to be delivered at a different time or place; and
    in particular and despite any reservation of a security interest by the bill of
    lading:

    (1) If the contract requires or authorized the seller to send the goods to the
    buyer but does not require the seller to deliver them at destination, title passes
    to the buyer at the time and place of shipment; but

    (2) If the contract requires delivery at destination, title passes on tender there.

    (C) Unless otherwise explicitly agreed where delivery is to be made without moving
    the goods:

    (1) If the seller is to deliver a tangible document of title, title passes at
    the time when and the place where the seller delivers the documents and if the
    seller is to deliver an electronic document of title, title passes when the seller
    delivers the document; or

    (2) If the goods are at the time of contracting already identified and no documents
    of title are to be delivered, title passes at the time and place of contracting.

    (D) A rejection or other refusal by the buyer to receive or retain the goods,
    whether or not justified, or a justified revocation of acceptance revests title
    to the goods in the seller. The revesting occurs by operation of law and is not
    a "sale."'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.42
- number: '1302.43'
  heading: Rights of seller's creditors against sold goods - UCC 2-402
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Except as provided in divisions (B) and (C) of this section, rights of
    unsecured creditors of the seller with respect to goods which have been identified
    to a contract for sale are subject to the buyer''s rights to recover the goods
    pursuant to sections 1302.46 and 1302.90 of the Revised Code.

    (B) A creditor of the seller may treat a sale or an identification of goods to
    a contract for sale as void if as against the seller a retention of possession
    by the seller is fraudulent under any rule of law of the state where the goods
    are situated, except that retention of possession in good faith and current course
    of trade by a merchant-seller for a commercially reasonable time after a sale
    or identification is not fraudulent.

    (C) Nothing in sections 1302.01 to 1302.98 of the Revised Code shall be deemed
    to impair the rights of creditors of the seller:

    (1) under the provisions of Chapter 1309. of the Revised Code; or

    (2) where identification to the contract or delivery is made not in current course
    of trade but in satisfaction of or as security for a preexisting claim for money,
    security, or the like and is made under circumstances which under any rule of
    law of the state where the goods are situated would apart from sections 1302.01
    to 1302.98 of the Revised Code constitute the transaction a fraudulent transfer
    or voidable preference.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.43
- number: '1302.44'
  heading: Power to transfer - good faith purchase of goods - entrusting defined -
    UCC 2-403
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A purchaser of goods acquires all title which the transferor had or had
    power to transfer except that a purchaser of a limited interest acquires rights
    only to the extent of the interest purchased. A person with voidable title has
    power to transfer a good title to a good faith purchaser for value. When goods
    have been delivered under a transaction of purchase, the purchaser has such power
    even though:

    (1) The transferor was deceived as to the identity of the purchaser, or

    (2) The delivery was in exchange for a check which is later dishonored, or

    (3) It was agreed that the transaction was to be a "cash sale", or

    (4) The delivery was procured through fraud punishable as larcenous under the
    criminal law.

    (B) Any entrusting of possession of goods to a merchant who deals in goods of
    that kind gives the merchant power to transfer all rights of the entruster to
    a buyer in ordinary course of business.

    (C) "Entrusting" includes any delivery and any acquiescence in retention of possession
    regardless of any condition expressed between the parties to the delivery or acquiescence
    and regardless of whether the procurement of the entrusting or the possessor''s
    disposition of the goods have been such as to be larcenous under the criminal
    law.

    (D) The rights of other purchasers of goods and of lien creditors are governed
    by the provisions of Chapter 1309. and sections 1307.102 to 1307.603 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.44
- number: '1302.45'
  heading: Insurable interest in goods - manner of identification of goods - UCC 2-501
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The buyer obtains a special property and an insurable interest in goods
    by identification of existing goods as goods to which the contract refers even
    though the goods so identified are non conforming and he has an option to return
    or reject them. Such identification can be made at any time and in any manner
    explicitly agreed to by the parties. In the absence of explicit agreement identification
    occurs:

    (1) when the contract is made if it is for the sale of goods already existing
    and identified;

    (2) if the contract is for the sale of future goods other than those described
    in division (A) (3) of this section, when goods are shipped, marked, or otherwise
    designated by the seller as goods to which the contract refers;

    (3) when the crops are planted or otherwise become growing crops or the young
    are conceived if the contract is for the sale of unborn young to be born within
    twelve months after contracting or for the sale of crops to be harvested within
    twelve months or the next normal harvest season after contracting whichever is
    longer.

    (B) The seller retains an insurable interest in goods so long as title to or any
    security interest in the goods remains in him and where the identification is
    by the seller alone he may until default or insolvency or notification to the
    buyer that the identification is final substitute other goods for those identified.

    (C) Nothing in this section impairs any insurable interest recognized under any
    other statute or rule of law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.45
- number: '1302.46'
  heading: Buyer's right to goods on seller's repudiation, failure to deliver, or
    insolvency - UCC 2-502
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Subject to divisions (B) and (C) of this section and even though the
    goods have not been shipped, a buyer who has paid a part or all of the price of
    goods in which the buyer has a special property under section 1302.45 of the Revised
    Code, may on making and keeping good a tender of any unpaid portion of their price
    recover them from the seller if:

    (1) In the case of goods bought for personal, family, or household purposes, the
    seller repudiates or fails to deliver as required by the contract; or

    (2) In all cases, the seller becomes insolvent within ten days after receipt of
    the first installment on their price.

    (B) The buyer''s right to recover the goods under division (A)(1) of this section
    vests upon acquisition of a special property, even if the seller had not then
    repudiated or failed to deliver.

    (C) If the identification creating the buyer''s special property has been made
    by the buyer, the buyer acquires the right to recover the goods only if they conform
    to the contract for sale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.46
- number: '1302.47'
  heading: Manner of seller's tender of delivery - UCC 2-503
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Tender of delivery requires that the seller put and hold conforming goods
    at the buyer''s disposition and give the buyer any notification reasonably necessary
    to enable the buyer to take delivery. The manner, time, and place for tender are
    determined by the agreement and sections 1302.01 to 1302.98, inclusive, of the
    Revised Code, and in particular:

    (1) tender must be at a reasonable hour, and if it is of goods they must be kept
    available for the period reasonably necessary to enable the buyer to take possession;
    but

    (2) unless otherwise agreed the buyer must furnish facilities reasonably suited
    to the receipt of the goods.

    (B) Where the case is within section 1302.48 of the Revised Code respecting shipment,
    tender requires that the seller comply with its provisions.

    (C) Where the seller is required to deliver at a particular destination, tender
    requires that the seller comply with division (A) of this section and also in
    any appropriate case tender documents as described in divisions (D) and (E) of
    this section.

    (D) Where goods are in the possession of a bailee and are to be delivered without
    being moved:

    (1) tender requires that the seller either tender a negotiable document of title
    covering such goods or procure acknowledgment by the bailee of the buyer''s right
    to possession of the goods; but

    (2) tender to the buyer of a non-negotiable document of title or of a record directing
    the bailee to deliver is sufficient tender unless the buyer seasonably objects,
    and except as otherwise provided in Chapter 1309. of the Revised Code, receipt
    by the bailee of notification of the buyer''s rights fixes those rights as against
    the bailee and all third persons; but risk of loss of the goods and of any failure
    by the bailee to honor the non-negotiable document of title or to obey the direction
    remains on the seller until the buyer has had a reasonable time to present the
    document or direction, and a refusal by the bailee to honor the document or to
    obey the direction defeats the tender.

    (E) Where the contract requires the seller to deliver documents:

    (1) the seller must tender all such documents in correct form, except as provided
    in division (B) of section 1302.36 of the Revised Code; and

    (2) tender through customary banking channels is sufficient and dishonor of a
    draft accompanying or associated with the documents constitutes nonacceptance
    or rejection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.47
- number: '1302.48'
  heading: Shipment by seller - UCC 2-504
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Where the seller is required or authorized to send the goods to the buyer
    and the contract does not require him to deliver them at a particular destination,
    then unless otherwise agreed he must:

    (A) put the goods in the possession of such a carrier and make such a contract
    for their transportation as may be reasonable having regard to the nature of the
    goods and other circumstances of the case; and

    (B) obtain and promptly deliver or tender in due form any document necessary to
    enable the buyer to obtain possession of the goods or otherwise required by the
    agreement or by usage of trade; and

    (C) promptly notify the buyer of the shipment.

    Failure to notify the buyer under division (C) of this section or to make a proper
    contract under division (A) of this section is a ground for rejection only if
    material delay or loss ensues.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.48
- number: '1302.49'
  heading: Seller's shipment under reservation - UCC 2-505
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the seller has identified goods to the contract by or before shipment:

    (1) the seller''s procurement of a negotiable bill of lading to the seller''s
    own order or otherwise reserves in the seller a security interest in the goods.
    The seller''s procurement of the bill to the order of a financing agency or of
    the buyer indicates in addition only the seller''s expectation of transferring
    that interest to the person named.

    (2) a non-negotiable bill of lading to the seller''s own self or the seller''s
    nominee reserves possession of the goods as security but except in a case of conditional
    delivery as provided in section 1302.51 of the Revised Code, a non-negotiable
    bill of lading naming the buyer as consignee reserves no security interest even
    though the seller retains possession or control of the bill of lading.

    (B) When shipment by the seller with reservation of a security interest is in
    violation of the contract for sale it constitutes an improper contract for transportation
    within section 1302.48 of the Revised Code but impairs neither the rights given
    to the buyer by shipment and identification of the goods to the contract nor the
    seller''s powers as a holder of a negotiable document of title.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.49
- number: '1302.50'
  heading: Rights of financing agency - UCC 2-506
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A financing agency by paying or purchasing for value a draft which relates
    to a shipment of goods acquires to the extent of the payment or purchase and in
    addition to its own rights under the draft and any document of title securing
    it any rights of the shipper in the goods including the right to stop delivery
    and the shipper''s right to have the draft honored by the buyer.

    (B) The right to reimbursement of a financing agency which has in good faith honored
    or purchased the draft under commitment to or authority from the buyer is not
    impaired by subsequent discovery of defects with reference to any relevant document
    which was apparently regular.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.50
- number: '1302.51'
  heading: Effect of seller's tender - delivery on condition - UCC 2-507
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Tender of delivery is a condition to the buyer''s duty to accept the
    goods and, unless otherwise agreed, to his duty to pay for them. Tender entitles
    the seller to acceptance of the goods and to payment according to the contract.

    (B) Where payment is due and demanded on the delivery to the buyer of goods or
    documents of title, his right as against the seller to retain or dispose of them
    is conditional upon his making the payment due.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.51
- number: '1302.52'
  heading: Cure by seller of improper tender or delivery - replacement - UCC 2-508
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where any tender or delivery by the seller is rejected because non-conforming
    and the time for performance has not yet expired, the seller may seasonably notify
    the buyer of his intention to cure and may then within the contract time make
    a conforming delivery.

    (B) Where the buyer rejects a non-conforming tender which the seller had reasonable
    ground to believe would be acceptable with or without money allowance the seller
    may if he seasonably notifies the buyer, have a further reasonable time to substitute
    a conforming tender.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.52
- number: '1302.53'
  heading: Risk of loss in absence of breach - UCC 2-509
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the contract requires or authorizes the seller to ship the goods
    by carrier:

    (1) if it does not require the seller to deliver them at a particular destination,
    the risk of loss passes to the buyer when the goods are duly delivered to the
    carrier even though the shipment is under reservation as provided in section 1302.49
    of the Revised Code; but

    (2) if it does require the seller to deliver them at a particular destination
    and the goods are there duly tendered while in the possession of the carrier,
    the risk of loss passes to the buyer when the goods are there duly so tendered
    as to enable the buyer to take delivery.

    (B) Where the goods are held by a bailee to be delivered without being moved,
    the risk of loss passes to the buyer:

    (1) on the buyer''s receipt of possession or control of a negotiable document
    of title covering the goods; or

    (2) on acknowledgment by the bailee of the buyer''s right to possession of the
    goods; or

    (3) after the buyer''s receipt of possession or control of a non-negotiable document
    of title or other direction to deliver in a record, as provided in division (D)(2)
    of section 1302.47 of the Revised Code.

    (C) In any case not within division (A) or (B) of this section, the risk of loss
    passes to the buyer on the buyer''s receipt of the goods if the seller is a merchant;
    otherwise the risk passes to the buyer on tender of delivery.

    (D) The provisions of this section are subject to contrary agreement of the parties
    and to the provisions of sections 1302.40 and 1302.54 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.53
- number: '1302.54'
  heading: Effect of breach on risk of loss - UCC 2-510
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where a tender or delivery of goods so fails to conform to the contract
    as to give a right of rejection the risk of their loss remains on the seller until
    cure or acceptance.

    (B) Where the buyer rightfully revokes acceptance he may to the extent of any
    deficiency in his effective insurance coverage treat the risk of loss as having
    rested on the seller from the beginning.

    (C) Where the buyer as to conforming goods already identified to the contract
    for sale repudiates or is otherwise in breach before risk of their loss has passed
    to him, the seller may to the extent of any deficiency in his effective insurance
    coverage treat the risk of loss as resting on the buyer for a commercially reasonable
    time.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.54
- number: '1302.55'
  heading: Tender of payment by buyer - payment by check - UCC 2-511
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Unless otherwise agreed, tender of payment is a condition to the seller''s
    duty to tender and complete any delivery.

    (B) Tender of payment is sufficient when made by any means or in any manner current
    in the ordinary course of business unless the seller demands payment in legal
    tender and gives any extension of time reasonably necessary to procure it.

    (C) Subject to section 1303.61 of the Revised Code, payment by check is conditional
    and is defeated as between the parties by dishonor of the check on due presentment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.55
- number: '1302.56'
  heading: Payment by buyer before inspection - UCC 2-512
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the contract requires payment before inspection, nonconformity
    of the goods does not excuse the buyer from so making payment unless:

    (1) The nonconformity appears without inspection; or

    (2) Despite tender of the required documents the circumstances would justify injunction
    against honor under division (B) of section 1305.08 of the Revised Code.

    (B) Payment pursuant to division (A) of this section does not constitute an acceptance
    of goods or impair the buyer''s right to inspect or any of the buyer''s remedies.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.56
- number: '1302.57'
  heading: Buyer's right to inspection of goods - UCC 2-513
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Unless otherwise agreed and subject to division (C) of this section,
    where goods are tendered or delivered or identified to the contract for sale,
    the buyer has a right before payment or acceptance to inspect them at any reasonable
    place and time and in any reasonable manner. When the seller is required or authorized
    to send the goods to the buyer, the inspection may be after their arrival.

    (B) Expenses of inspection must be borne by the buyer but may be recovered from
    the seller if the goods do not conform and are rejected.

    (C) Unless otherwise agreed and subject to the provisions of division (C) of section
    1302.34 of the Revised Code, the buyer is not entitled to inspect the goods before
    payment of the price when the contract provides:

    (1) for delivery "C.O.D" or on other like terms; or

    (2) for payment against documents of title, except where such payment is due only
    after the goods are to become available for inspection.

    (D) A place or method of inspection fixed by the parties is presumed to be exclusive
    but unless otherwise expressly agreed it does not postpone identification or shift
    the place for delivery or for passing the risk of loss. If compliance becomes
    impossible, inspection shall be as provided in this section unless the place or
    method fixed was clearly intended as an indispensable condition failure of which
    avoids the contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.57
- number: '1302.58'
  heading: When documents deliverable on acceptance - when on payment - UCC 2-514
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Unless otherwise agreed documents against which a draft is drawn are to be
    delivered to the drawee on acceptance of the draft if it is payable more than
    three days after presentment; otherwise, only on payment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.58
- number: '1302.59'
  heading: Preserving evidence of goods in dispute - UCC 2-515
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'In furtherance of the adjustment of any claim or dispute:

    (A) either party on reasonable notification to the other and for the purpose of
    ascertaining the facts and preserving evidence has the right to inspect, test,
    and sample the goods including such of them as may be in the possession or control
    of the other; and

    (B) the parties may agree to a third party inspection or survey to determine the
    conformity or condition of the goods and may agree that the findings shall be
    binding upon them in any subsequent litigation or adjustment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.59
- number: '1302.60'
  heading: Buyer's rights on improper delivery - UCC 2-601
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Subject to the provisions of section 1302.70 of the Revised Code, and unless
    otherwise agreed under sections 1302.92 and 1302.93 of the Revised Code, if the
    goods or the tender of delivery fail in any respect to conform to the contract,
    the buyer may:

    (A) reject the whole; or

    (B) accept the whole; or

    (C) accept any commercial unit or units and reject the rest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.60
- number: '1302.61'
  heading: Manner and effect of rightful rejection - UCC 2-602
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Rejection of goods must be within a reasonable time after their delivery
    or tender. It is ineffective unless the buyer seasonably notifies the seller.

    (B) Subject to the provisions of section 1302.62 of the Revised Code:

    (1) after rejection any exercise of ownership by the buyer with respect to any
    commercial unit is wrongful as against the seller; and

    (2) if the buyer has before rejection taken physical possession of goods in which
    he does not have a security interest under the provisions of division (C) of section
    1302.85 of the Revised Code, he is under a duty after rejection to hold them with
    reasonable care at the seller''s disposition for a time sufficient to permit the
    seller to remove them; but

    (3) the buyer has no further obligations with regard to goods rightfully rejected.

    (C) The seller''s rights with respect to goods wrongfully rejected are governed
    by the provisions of section 1302.77 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.61
- number: '1302.62'
  heading: Merchant buyer's duties as to rightfully rejected goods - salvage - UCC
    2-603, 2-604
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Subject to any security interest in the buyer as provided in division
    (C) of section 1302.85 of the Revised Code, when the seller has no agent or place
    of business at the market of rejection, a merchant buyer is under a duty after
    rejection of goods in his possession or control to follow any reasonable instructions
    received from the seller with respect to the goods and in the absence of such
    instructions to make reasonable efforts to sell them for the seller''s account
    if they are perishable or threaten to decline in value speedily. Instructions
    are not reasonable if on demand indemnity for expenses is not forthcoming.

    (B) When the buyer sells goods under division (A) of this section, he is entitled
    to reimbursement from the seller or out of the proceeds for reasonable expenses
    of caring for and selling them, and if the expenses include no selling commission
    then to such commission as is usual in the trade or if there is none to a reasonable
    sum not exceeding ten per cent on the gross proceeds.

    (C) In complying with this section, the buyer is held only to good faith and good
    faith conduct hereunder is neither acceptance nor conversion nor the basis of
    an action for damages.

    (D) Subject to the provisions of divisions (A), (B), and (C) of this section on
    perishables, if the seller gives no instructions within a reasonable time after
    notification of rejection the buyer may store the rejected goods for the seller''s
    account or reship them to him or resell them for the seller''s account with reimbursement
    as provided in divisions (A), (B), and (C) of this section. Such action is not
    acceptance or conversion.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.62
- number: '1302.63'
  heading: Waiver of buyer's objections by failure to particularize - UCC 2-605
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The buyer''s failure to state in connection with rejection a particular
    defect which is ascertainable by reasonable inspection precludes the buyer from
    relying on the unstated defect to justify rejection or to establish breach:

    (1) where the seller could have cured it if stated seasonably; or

    (2) between merchants when the seller has after rejection made a request in writing
    for a full and final written statement of all defects on which the buyer proposes
    to rely.

    (B) Payment against documents made without reservation of rights precludes recovery
    of the payment for defects apparent in the documents.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.63
- number: '1302.64'
  heading: What constitutes acceptance of goods - UCC 2-606
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Acceptance of goods occurs when the buyer:

    (1) after a reasonable opportunity to inspect the goods signifies to the seller
    that the goods are conforming or that he will take or retain them in spite of
    their non-conformity; or

    (2) fails to make an effective rejection as provided in division (A) of section
    1302.61 of the Revised Code, but such acceptance does not occur until the buyer
    has had a reasonable opportunity to inspect them; or

    (3) does any act inconsistent with the seller''s ownership; but if such act is
    wrongful as against the seller it is an acceptance only if ratified by him.

    (B) Acceptance of a part of any commercial unit is acceptance of that entire unit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.64
- number: '1302.65'
  heading: Effect of acceptance - notice of breach - burden of establishing breach
    after acceptance - notice of claim or litigation to person answerable over - UCC
    2-607
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The buyer must pay at the contract rate for any goods accepted.

    (B) Acceptance of goods by the buyer precludes rejection of the goods accepted
    and if made with knowledge of a non-conformity cannot be revoked because of it
    unless the acceptance was on the reasonable assumption that the non-conformity
    would be seasonably cured but acceptance does not of itself impair any other remedy
    provided by sections 1302.01 to 1302.98, inclusive, of the Revised Code for non-conformity.

    (C) Where a tender has been accepted:

    (1) the buyer must within a reasonable time after he discovers or should have
    discovered any breach notify the seller of breach or be barred from any remedy;
    and

    (2) if the claim is one for infringement or the like pursuant to division (C)
    of section 1302.25 of the Revised Code and the buyer is sued as a result of such
    a breach he must so notify the seller within a reasonable time after he receives
    notice of the litigation or be barred from any remedy over for liability established
    by the litigation.

    (D) The burden is on the buyer to establish any breach with respect to the goods
    accepted.

    (E) Where the buyer is sued for breach of a warranty or other obligation for which
    his seller is answerable over:

    (1) he may give his seller written notice of the litigation. If the notice states
    that the seller may come in and defend and that if the seller does not do so he
    will be bound in any action against him by his buyer by any determination of fact
    common to the two litigations, then unless the seller after seasonable receipt
    of the notice does come in and defend he is so bound.

    (2) if the claim is one for infringement or the like, pursuant to division (C)
    of section 1302.25 of the Revised Code, the original seller may demand in writing
    that his buyer turn over to him control of the litigation including settlement
    or else be barred from any remedy over and if he also agrees to bear all expense
    and to satisfy any adverse judgment, then unless the buyer after seasonable receipt
    of the demand does turn over control the buyer is so barred.

    (F) The provisions of divisions (C), (D), and (E) of this section apply to any
    obligation of a buyer to hold the seller harmless against infringement or the
    like pursuant to division (C) of section 1302.25 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.65
- number: '1302.66'
  heading: Revocation of acceptance in whole or in part - UCC 2-608
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The buyer may revoke his acceptance of a lot or commercial unit whose
    non-conformity substantially impairs its value to him if he has accepted it:

    (1) on the reasonable assumption that its non-conformity would be cured and it
    has not been seasonably cured; or

    (2) without discovery of such non-conformity if his acceptance was reasonably
    induced either by the difficulty of discovery before acceptance or by the seller''s
    assurances.

    (B) Revocation of acceptance must occur within a reasonable time after the buyer
    discovers or should have discovered the ground for it and before any substantial
    change in condition of the goods which is not caused by their own defects. It
    is not effective until the buyer notifies the seller of it.

    (C) A buyer who so revokes has the same rights and duties with regard to the goods
    involved as if he had rejected them.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.66
- number: '1302.67'
  heading: Right to adequate assurance of performance - UCC 2-609
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A contract for sale imposes an obligation on each party that the other''s
    expectation of receiving due performance will not be impaired. When reasonable
    grounds for insecurity arise with respect to the performance of either party,
    the other may in writing demand adequate assurance of due performance and until
    he receives such assurance may if commercially reasonable suspend any performance
    for which he has not already received the agreed return.

    (B) Between merchants the reasonableness of grounds for insecurity and the adequacy
    of any assurance offered shall be determined according to commercial standards.

    (C) Acceptance of any improper delivery or payment does not prejudice the aggrieved
    party''s right to demand adequate assurance of future performance.

    (D) After receipt of a justified demand failure to provide within a reasonable
    time not exceeding thirty days such assurance of due performance as is adequate
    under the circumstances of the particular case is a repudiation of the contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.67
- number: '1302.68'
  heading: Anticipatory repudiation - UCC 2-610
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'When either party repudiates the contract with respect to a performance not
    yet due the loss of which will substantially impair the value of the contract
    to the other, the aggrieved party may:

    (A) for a commercially reasonable time await performance by the repudiating party;
    or

    (B) resort to any remedy for breach as provided in sections 1302.77 and 1302.85
    of the Revised Code even though he has notified the repudiating party that he
    would await the latter''s performance and has urged retraction; and

    (C) in either case suspend his own performance or proceed in accordance with the
    provisions of section 1302.78 of the Revised Code on the seller''s right to identify
    goods to the contract notwithstanding breach or to salvage unfinished goods.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.68
- number: '1302.69'
  heading: Retraction of anticipatory repudiation - UCC 2-611
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Until the repudiating party''s next performance is due he can retract
    his repudiation unless the aggrieved party has since the repudiation cancelled
    or materially changed his position or otherwise indicated that he considers the
    repudiation final.

    (B) Retraction may be by any method which clearly indicates to the aggrieved party
    that the repudiating party intends to perform, but must include any assurance
    justifiably demanded under the provisions of section 1302.67 of the Revised Code.

    (C) Retraction reinstates the repudiating party''s rights under the contract with
    due excuse and allowance to the aggrieved party for any delay occasioned by the
    repudiation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.69
- number: '1302.70'
  heading: Installment contract defined - breach - UCC 2-612
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) An "installment contract" is one which requires or authorizes the delivery
    of goods in separate lots to be separately accepted, even though the contract
    contains a clause "each delivery is a separate contract" or its equivalent.

    (B) The buyer may reject any installment which is non-conforming if the non-conformity
    substantially impairs the value of that installment and cannot be cured or if
    the non-conformity is a defect in the required documents; but if the non-conformity
    does not fall within division (C) of this section and the seller gives adequate
    assurance of its cure the buyer must accept that installment.

    (C) Whenever non-conformity or default with respect to one or more installments
    substantially impairs the value of the whole contract there is a breach of the
    whole. But the aggrieved party reinstates the contract if he accepts a non-conforming
    installment without seasonably notifying of cancellation or if he brings an action
    with respect only to past installments or demands performance as to future installments.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.70
- number: '1302.71'
  heading: Casualty to identified goods - UCC 2-613
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Where the contract requires for its performance goods identified when the
    contract is made, and the goods suffer casualty without fault of either party
    before the risk of loss passes to the buyer, or in a proper case under a "no arrival,
    no sale" term pursuant to section 1302.37 of the Revised Code, then:

    (A) if the loss is total the contract is avoided; and

    (B) if the loss is partial or the goods have so deteriorated as no longer to conform
    to the contract the buyer may nevertheless demand inspection and at his option
    either treat the contract as avoided or accept the goods with due allowance from
    the contract price for the deterioration or the deficiency in quantity but without
    further right against the seller.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.71
- number: '1302.72'
  heading: Substituted performance - UCC 2-614
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where without fault of either party the agreed berthing, loading, or
    unloading facilities fail or an agreed type of carrier becomes unavailable or
    the agreed manner of delivery otherwise becomes commercially impracticable but
    a commercially reasonable substitute is available, such substitute performance
    must be tendered and accepted.

    (B) If the agreed means or manner of payment fails because of domestic or foreign
    governmental regulation, the seller may withhold or stop delivery unless the buyer
    provides a means or manner of payment which is commercially a substantial equivalent.
    If delivery has already been taken, payment by the means or in the manner provided
    by the regulation discharges the buyer''s obligation unless the regulation is
    discriminatory, oppressive, or predatory.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.72
- number: '1302.73'
  heading: Excuse by failure of presupposed conditions - UCC 2-615
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Except so far as a seller may have assumed a greater obligation and subject
    to section 1302.72 of the Revised Code on substituted performance:

    (A) Delay in delivery or non-delivery in whole or in part by a seller who complies
    with divisions (B) and (C) of this section is not a breach of his duty under a
    contract for sale if performance as agreed has been made impracticable by the
    occurrence of a contingency the non-occurrence of which was a basic assumption
    on which the contract was made or by compliance in good faith with any applicable
    foreign or domestic governmental regulation or order whether or not it later proves
    to be invalid.

    (B) Where the causes mentioned in division (A) of this section affect only a part
    of the seller''s capacity to perform, he must allocate production and deliveries
    among his customers but may at his option include regular customers not then under
    contract as well as his own requirements for further manufacture. He may so allocate
    in any manner which is fair and reasonable.

    (C) The seller must notify the buyer seasonably that there will be delay or non-delivery
    and, when allocation is required under division (B) of this section, of the estimated
    quota thus made available for the buyer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.73
- number: '1302.74'
  heading: Procedure on notice claiming excuse - UCC 2-616
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the buyer receives notification of a material or indefinite delay
    or an allocation justified under section 1302.73 of the Revised Code, he may by
    written notification to the seller as to any delivery concerned, and where the
    prospective deficiency substantially impairs the value of the whole contract under
    section 1302.70 of the Revised Code relating to breach of installment contracts,
    then also as to the whole:

    (1) terminate and thereby discharge any unexecuted portion of the contract; or

    (2) modify the contract by agreeing to take his available quota in substitution.

    (B) If after receipt of such notification from the seller the buyer fails so to
    modify the contract within a reasonable time not exceeding thirty days the contract
    lapses with respect to any deliveries affected.

    (C) The provisions of this section may not be negated by agreement except in so
    far as the seller has assumed a greater obligation under section 1302.73 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.74
- number: '1302.75'
  heading: Remedies for breach of collateral contracts not impaired - UCC 2-701
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Remedies for breach of any obligation or promise collateral or ancillary to
    a contract for sale are not impaired by the provisions of sections 1302.01 to
    1302.98, inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.75
- number: '1302.76'
  heading: Seller's remedies on discovery of buyer's insolvency - UCC 2-702
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the seller discovers the buyer to be insolvent he may refuse delivery
    except for cash including payment for all goods theretofore delivered under the
    contract, and stop delivery under section 1302.79 of the Revised Code.

    (B) Where the seller discovers that the buyer has received goods on credit while
    insolvent he may reclaim the goods upon demand made within ten days after the
    receipt, but if misrepresentation of solvency has been made to the particular
    seller in writing within three months before delivery the ten day limitation does
    not apply. Except as provided in this division the seller may not base a right
    to reclaim goods on the buyer''s fraudulent or innocent misrepresentation of solvency
    or of intent to pay.

    (C) The seller''s right to reclaim under division (B) of this section is subject
    to the rights of a buyer in ordinary course or other good faith purchaser or lien
    creditor under section 1302.44 of the Revised Code. Successful reclamation of
    goods excludes all other remedies with respect to them.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.76
- number: '1302.77'
  heading: Seller's remedies in general - UCC 2-703
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Where the buyer wrongfully rejects or revokes acceptance of goods or fails
    to make a payment due on or before delivery or repudiates with respect to a part
    or the whole, then with respect to any goods directly affected and, if the breach
    is of the whole contract under section 1302.70 of the Revised Code, then also
    with respect to the whole undelivered balance, the aggrieved seller may:

    (A) withhold delivery of such goods;

    (B) stop delivery by any bailee as provided in section 1302.79 of the Revised
    Code;

    (C) proceed under section 1302.78 of the Revised Code respecting goods still unidentified
    to the contract;

    (D) resell and recover damages as provided in section 1302.80 of the Revised Code;

    (E) recover damages for non-acceptance as provided in section 1302.82 of the Revised
    Code or in a proper case the price as provided in section 1302.83 of the Revised
    Code;

    (F) cancel.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.77
- number: '1302.78'
  heading: Seller's right to identify goods to the contract notwithstanding breach
    or to salvage unfinished goods - UCC 2-704
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) An aggrieved seller under section 1302.77 of the Revised Code may:

    (1) identify to the contract conforming goods not already identified if at the
    time he learned of the breach they are in his possession or control;

    (2) treat as the subject of resale goods which have demonstrably been intended
    for the particular contract even though those goods are unfinished.

    (B) Where the goods are unfinished an aggrieved seller may in the exercise of
    reasonable commercial judgment for the purposes of avoiding loss and of effective
    realization either complete the manufacture and wholly identify the goods to the
    contract or cease manufacture and resell for scrap or salvage value or proceed
    in any other reasonable manner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.78
- number: '1302.79'
  heading: Seller's stoppage of delivery in transit or otherwise - UCC 2-705
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) The seller may stop delivery of goods in the possession of a carrier
    or other bailee when he discovers the buyer to be insolvent as provided in section
    1302.76 of the Revised Code and may stop delivery of carload, truckload, planeload,
    or larger shipments of express or freight when the buyer repudiates or fails to
    make a payment due before delivery or if for any other reason the seller has a
    right to withhold or reclaim the goods.

    (B) As against such buyer the seller may stop delivery until:

    (1) receipt of the goods by the buyer; or

    (2) acknowledgment to the buyer by any bailee of the goods except a carrier that
    the bailee holds the goods for the buyer; or

    (3) such acknowledgment to the buyer by a carrier by reshipment or as a warehouse;
    or

    (4) negotiation to the buyer of any negotiable document of title covering the
    goods.

    (C)(1) To stop delivery the seller must so notify as to enable the bailee by reasonable
    diligence to prevent delivery of the goods.

    (2) After such notification the bailee must hold and deliver the goods according
    to the directions of the seller but the seller is liable to the bailee for any
    ensuing charges or damages.

    (3) If a negotiable document of title has been issued for goods the bailee is
    not obliged to obey a notification to stop until surrender of possession or control
    of the document.

    (4) A carrier who has issued a non-negotiable bill of lading is not obliged to
    obey a notification to stop received from a person other than the consignor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.79
- number: '1302.80'
  heading: Seller's resale including contract for resale - UCC 2-706
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Under the conditions stated in section 1302.77 of the Revised Code on
    seller''s remedies, the seller may resell the goods concerned or the undelivered
    balance thereof. Where the resale is made in good faith and in a commercially
    reasonable manner the seller may recover the difference between the resale price
    and the contract price together with any incidental damages allowed under section
    1302.84 of the Revised Code, but less expenses in consequences of the buyer''s
    breach.

    (B) Except as otherwise provided in division (C) of this section or unless otherwise
    agreed resale may be at public or private sale including sale by way of one or
    more contracts to sell or of identification to an existing contract of the seller.
    Sale may be as a unit or in parcels and at any time and place and on any terms
    but every aspect of the sale including the method, manner, time, place, and terms
    must be commercially reasonable. The resale must be reasonably identified as referring
    to the broken contract, but it is not necessary that the goods be in existence
    or that any or all of them have been identified to the contract before the breach.

    (C) Where the resale is at private sale the seller must give the buyer reasonable
    notification of his intention to resell.

    (D) Where the resale is at public sale:

    (1) only identified goods can be sold except where there is a recognized market
    for a public sale of futures in goods of the kind; and

    (2) it must be made at a usual place or market for public sale if one is reasonably
    available and except in the case of goods which are perishable or threaten to
    decline in value speedily, the seller must give the buyer reasonable notice of
    the time and place of the resale; and

    (3) if the goods are not to be within the view of those attending the sale the
    notification of sale must state the place where the goods are located and provide
    for their reasonable inspection by prospective bidders; and

    (4) the seller may buy.

    (E) A purchaser who buys in good faith at a resale takes the goods free of any
    rights of the original buyer even though the seller fails to comply with one or
    more of the requirements of this section.

    (F) The seller is not accountable to the buyer for any profit made on any resale.
    A person in the position of a seller, pursuant to section 1302.81 of the Revised
    Code, or a buyer who has rightfully rejected or justifiably revoked acceptance
    must account for any excess over the amount of his security interest, as defined
    in division (C) of section 1302.85 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.80
- number: '1302.81'
  heading: Person in the position of a seller - UCC 2-707
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) A "person in the position of a seller" includes as against a principal
    an agent who has paid or become responsible for the price of goods on behalf of
    his principal or anyone who otherwise holds a security interest or other right
    in goods similar to that of a seller.

    (B) A person in the position of a seller may withhold or stop delivery as provided
    in section 1302.79 of the Revised Code and resell as provided in section 1302.80
    of the Revised Code, and recover incidental damages as provided in section 1302.84
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.81
- number: '1302.82'
  heading: Seller's damages for non-acceptance or repudiation - UCC 2-708
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Subject to division (B) of this section and to the provisions of section
    1302.97 of the Revised Code with respect to proof of market price, the measure
    of damages for non-acceptance or repudiation by the buyer is the difference between
    the market price at the time and place for tender and the unpaid contract price
    together with any incidental damages provided in section 1302.84 of the Revised
    Code, but less expenses saved in consequence of the buyer''s breach.

    (B) If the measure of damages provided in division (A) of this section is inadequate
    to put the seller in as good a position as performance would have done then the
    measure of damages is the profit, including reasonable overhead, which the seller
    would have made from full performance by the buyer, together with any incidental
    damages provided in section 1302.84 of the Revised Code, due allowance for costs
    reasonably incurred, and due credit for payments or proceeds of resale.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.82
- number: '1302.83'
  heading: Action for the price - UCC 2-709
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) When the buyer fails to pay the price as it becomes due the seller may
    recover, together with any incidental damages under section 1302.84 of the Revised
    Code, the price:

    (1) of goods accepted or of conforming goods lost or damaged within a commercially
    reasonable time after risk of their loss has passed to the buyer; and

    (2) of goods identified to the contract if the seller is unable after reasonable
    effort to resell them at a reasonable price or the circumstances reasonably indicate
    that such effort will be unavailing.

    (B) Where the seller sues for the price he must hold for the buyer any goods which
    have been identified to the contract and are still in his control except that
    if resale becomes possible he may resell them at any time prior to the collection
    of the judgment. The net proceeds of any such resale must be credited to the buyer
    and payment of the judgment entitles him to any goods not resold.

    (C) After the buyer has wrongfully rejected or revoked acceptance of the goods
    or has failed to make a payment due or has repudiated as provided in section 1302.68
    of the Revised Code, a seller who is held not entitled to the price under this
    section shall nevertheless be awarded damages for non-acceptance under section
    1302.82 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.83
- number: '1302.84'
  heading: Seller's incidental damages - UCC 2-710
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Incidental damages to an aggrieved seller include any commercially reasonable
    charges, expenses, or commissions incurred in stopping delivery, in the transportation,
    care, and custody of goods after the buyer's breach, in connection with return
    or resale of the goods or otherwise resulting from the breach.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.84
- number: '1302.85'
  heading: Buyer's remedies in general - buyer's security interest in rejected goods
    - UCC 2-711
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the seller fails to make delivery or repudiates or the buyer rightfully
    rejects or justifiably revokes acceptance then with respect to any goods involved,
    and with respect to the whole if the breach goes to the whole contract, as provided
    in section 1302.70 of the Revised Code, the buyer may cancel and whether or not
    he has done so may in addition to recovering so much of the price as has been
    paid:

    (1) "cover" and have damages under section 1302.86 of the Revised Code as to all
    the goods affected whether or not they have been identified to the contract; or

    (2) recover damages for non-delivery as provided in section 1302.87 of the Revised
    Code.

    (B) Where the seller fails to deliver or repudiates the buyer may also:

    (1) if the goods have been identified recover them as provided in section 1302.46
    of the Revised Code; or

    (2) in a proper case obtain specific performance or replevy the goods as provided
    in section 1302.90 of the Revised Code.

    (C) On rightful rejection or justifiable revocation of acceptance a buyer has
    a security interest in goods in his possession or control for any payments made
    on their price and any expenses reasonably incurred in their inspection, receipt,
    transportation, care, and custody and may hold such goods and resell them in like
    manner as an aggrieved seller as provided in section 1302.80 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.85
- number: '1302.86'
  heading: Cover defined - buyer's procurement of substitute goods - UCC 2-712
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) After a breach within the preceding section, the buyer may "cover" by
    making in good faith and without unreasonable delay any reasonable purchase of
    or contract to purchase goods in substitution for those due from the seller.

    (B) The buyer may recover from the seller as damages the difference between the
    cost of cover and the contract price together with any incidental or consequential
    damages as defined in section 1302.89 of the Revised Code, but less expenses saved
    in consequence of the seller''s breach.

    (C) Failure of the buyer to effect cover within this section does not bar him
    from any other remedy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.86
- number: '1302.87'
  heading: Buyer's damages for non-delivery or repudiation - UCC 2-713
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Subject to the provisions of section 1302.97 of the Revised Code, with
    respect to proof of market price, the measure of damages for non-delivery or repudiation
    by the seller is the difference between the market price at the time when the
    buyer learned of the breach and the contract price together with any incidental
    and consequential damages provided in section 1302.89 of the Revised Code, but
    less expenses saved in consequence of the seller''s breach.

    (B) Market price is to be determined as of the place for tender or, in cases of
    rejection after arrival or revocation of acceptance, as of the place of arrival.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.87
- number: '1302.88'
  heading: Buyer's damages for breach in regard to accepted goods - UCC 2-714
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Where the buyer has accepted goods and given notification as provided
    in division (C) of section 1302.65 of the Revised Code, he may recover as damages
    for any non-conformity of tender the loss resulting in the ordinary course of
    events from the seller''s breach as determined in any manner which is reasonable.

    (B) The measure of damages for breach of warranty is the difference at the time
    and place of acceptance between the value of the goods accepted and the value
    they would have had if they had been as warranted, unless special circumstances
    show proximate damages of a different amount.

    (C) In a proper case any incidental and consequential damages under section 1302.89
    of the Revised Code may also be recovered.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.88
- number: '1302.89'
  heading: Buyer's incidental and consequential damages - UCC 2-715
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Incidental damages resulting from the seller''s breach include expenses
    reasonably incurred in inspection, receipt, transportation, and care and custody
    of goods rightfully rejected, any commercially reasonable charges, expenses, or
    commissions in connection with effecting cover and any other reasonable expense
    incident to the delay or other breach.

    (B) Consequential damages resulting from the seller''s breach include:

    (1) any loss resulting from general or particular requirements and needs of which
    the seller at the time of contracting had reason to know and which could not reasonably
    be prevented by cover or otherwise; and

    (2) injury to person or property proximately resulting from any breach of warranty.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.89
- number: '1302.90'
  heading: Buyer's right to specific performance or replevin - UCC 2-716
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Specific performance may be decreed where the goods are unique or in
    other proper circumstances.

    (B) The decree for specific performance may include such terms and conditions
    as to payment of the price, damages, or other relief as the court may deem just.

    (C) The buyer has a right of replevin for goods identified to the contract if
    after reasonable effort the buyer is unable to effect cover for such goods or
    the circumstances reasonably indicate that such effort will be unavailing or if
    the goods have been shipped under reservation and satisfaction of the security
    interest in them has been made or tendered. In the case of goods bought for personal,
    family, or household purposes, the buyer''s right of replevin vests upon acquisition
    of a special property, even if the seller had not then repudiated or failed to
    deliver.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.90
- number: '1302.91'
  heading: Deduction of damages from the price - UCC 2-717
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: The buyer on notifying the seller of his intention to do so may deduct all
    or any part of the damages resulting from any breach of the contract from any
    part of the price still due under the same contract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.91
- number: '1302.92'
  heading: Liquidation or limitation of damages - deposits - UCC 2-718
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Damages for breach by either party may be liquidated in the agreement
    but only at an amount which is reasonable in the light of the anticipated or actual
    harm caused by the breach, the difficulties of proof of loss, and the inconvenience
    or non-feasibility of otherwise obtaining an adequate remedy. A term fixing unreasonably
    large liquidated damages is void as a penalty.

    (B) Where the seller justifiably withholds delivery of goods because of the buyer''s
    breach, the buyer is entitled to restitution of any amount by which the sum of
    his payments exceeds:

    (1) the amount to which the seller is entitled by virtue of terms liquidating
    the seller''s damages in accordance with division (A) of this section, or

    (2) in the absence of such terms, twenty per cent of the value of the total performance
    for which the buyer is obligated under the contract or five hundred dollars, whichever
    is smaller.

    (C) The buyer''s right to restitution under division (B) of this section is subject
    to offset to the extent that the seller establishes:

    (1) a right to recover damages under the provisions of sections 1302.01 to 1302.98,
    inclusive, of the Revised Code other than division (A) of this section, and

    (2) the amount or value of any benefits received by the buyer directly or indirectly
    by reason of the contract.

    (D) Where a seller has received payment in goods their reasonable value or the
    proceeds of their resale shall be treated as payments for the purposes of division
    (B) of this section; but if the seller has notice of the buyer''s breach before
    reselling goods received in part performance, his resale is subject to the conditions
    laid down in section 1302.80 of the Revised Code on resale by an aggrieved seller.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.92
- number: '1302.93'
  heading: Contractual modification or limitation of remedy - UCC 2-719
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) Subject to the provisions of divisions (B) and (C) of this section and
    of section 1302.92 of the Revised Code on liquidation and limitation of damages,
    both of the following apply:

    (1) The agreement may provide for remedies in addition to or in substitution for
    those provided in sections 1302.01 to 1302.98 of the Revised Code and may limit
    or alter the measure of damages recoverable under those sections, as by limiting
    the buyer''s remedies to return of the goods and repayment of the price or to
    repair and replacement of nonconforming goods or parts.

    (2) Resort to a remedy as provided is optional unless the remedy is expressly
    agreed to be exclusive, in which case it is the sole remedy.

    (B) Where circumstances cause an exclusive or limited remedy to fail of its essential
    purpose, remedy may be had as provided in Chapters 1301., 1302., 1303., 1304.,
    1305., 1307., 1308., 1309., and 1310. of the Revised Code.

    (C) Consequential damages may be limited or excluded unless the limitation or
    exclusion is unconscionable. Limitation of consequential damages for injury to
    the person in the case of consumer goods is prima facie unconscionable, but limitation
    of damages where the loss is commercial is not.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.93
- number: '1302.94'
  heading: Effect of cancellation or rescission on claims for antecedent breach -
    UCC 2-720
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Unless the contrary intention clearly appears, expressions of "cancellation"
    or "rescission" of the contract or the like shall not be construed as a renunciation
    or discharge of any claim in damages for an antecedent breach.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.94
- number: '1302.95'
  heading: Remedies for fraud - UCC 2-721
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: Remedies for material misrepresentation or fraud include all remedies available
    under sections 1302.01 to 1302.98, inclusive, of the Revised Code for non-fraudulent
    breach. Neither rescission or a claim for rescission of the contract for sale
    nor rejection or return of the goods shall bar or be deemed inconsistent with
    a claim for damages or other remedy.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.95
- number: '1302.96'
  heading: Who can sue third parties for injury to goods - UCC 2-722
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: 'Where a third party so deals with goods which have been identified to a contract
    for sale as to cause actionable injury to a party to that contract:

    (A) a right of action against the third party is in either party to the contract
    for sale who has title to or a security interest or a special property or an insurable
    interest in the goods; and if the goods have been destroyed or converted a right
    of action is also in the party who either bore the risk of loss under the contract
    for sale or has since the injury assumed that risk as against the other;

    (B) if at the time of the injury the party plaintiff did not bear the risk of
    loss as against the other party to the contract for sale and there is no arrangement
    between them for disposition of the recovery, his suit or settlement is, subject
    to his own interest, as a fiduciary for the other party to the contract;

    (C) either party may with the consent of the other sue for the benefit of whom
    it may concern.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.96
- number: '1302.97'
  heading: Proof of market price - time and place - admissibility of market quotations
    - UCC 2-723, 2-724
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) If an action based on anticipatory repudiation comes to trial before
    the time for performance with respect to some or all of the goods, any damages
    based on market price, sections 1302.82 or 1302.87 of the Revised Code, shall
    be determined according to the price of such goods prevailing at the time when
    the aggrieved party learned of the repudiation.

    (B) If evidence of a price prevailing at the times or places described in sections
    1302.01 to 1302.98, inclusive, of the Revised Code, is not readily available,
    the price prevailing within any reasonable time before or after the time described
    or at any other place which in commercial judgment or under usage of trade would
    serve as a reasonable substitute for the one described may be used, making any
    proper allowance for the cost of transporting the goods to or from such other
    place.

    (C) Evidence of a relevant price prevailing at a time or place other than the
    one described in sections 1302.01 to 1302.98, inclusive, of the Revised Code,
    offered by one party is not admissible unless and until he has given the other
    party such notice as the court finds sufficient to prevent unfair surprise.

    (D) Whenever the prevailing price or value of any goods regularly bought and sold
    in any established commodity market is in issue, reports in official publications
    or trade journals or in newspapers or periodicals of general circulation published
    as the reports of such market shall be admissible in evidence. The circumstances
    of the preparation of such a report may be shown to affect its weight but not
    its admissibility.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.97
- number: '1302.98'
  heading: Statute of limitations in contracts for sale - UCC 2-725
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) An action for breach of any contract for sale must be commenced within
    four years after the cause of action has accrued. By the original agreement the
    parties may reduce the period of limitation to not less than one year but may
    not extend it.

    (B) A cause of action accrues when the breach occurs, regardless of the aggrieved
    party''s lack of knowledge of the breach. A breach of warranty occurs when tender
    of delivery is made, except that where a warranty explicitly extends to future
    performance of the goods and discovery of the breach must await the time of such
    performance, the cause of action accrues when the breach is or should have been
    discovered.

    (C) Where an action commenced within the time limited by division (A) of this
    section is so terminated as to leave available a remedy by another action for
    the same breach, such other action may be commenced after the expiration of the
    time limited and within six months after the termination of the first action unless
    the termination resulted from voluntary discontinuance or from dismissal for failure
    or neglect to prosecute.

    (D) This section does not alter sections 2305.15 and 2305.16 of the Revised Code
    on tolling of the statute of limitations, nor does it apply to causes of action
    which have accrued before July 1, 1962.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1302.98
- number: '1303.01'
  heading: Definitions - UCC 3-103
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) As used in this chapter, unless the context otherwise requires:

    (1) "Acceptor" means a drawee who has accepted a draft.

    (2) "Consumer account" means an account established by an individual primarily
    for personal, family, or household purposes.

    (3) "Consumer transaction" means a transaction in which an individual incurs an
    obligation primarily for personal, family, or household purposes.

    (4) "Drawee" means a person ordered in a draft to make payment.

    (5) "Drawer" means a person who signs or is identified in a draft as a person
    ordering payment.

    (6) "Good faith" has the same meaning as in section 1301.201 of the Revised Code.

    (7) "Issue" means the first delivery of an instrument by the maker or drawer to
    a holder or nonholder for the purpose of giving rights of the instrument to any
    person.

    (8) "Issuer" means a maker or drawer of an issued or unissued instrument.

    (9) "Maker" means a person who signs or is identified in a note as a person undertaking
    to pay.

    (10) "Order" means a written instruction to pay money signed by the person giving
    the instruction. The instruction may be addressed to any person, including the
    person giving the instruction, or to one or more persons jointly or in the alternative
    but not in succession. "Order" does not mean an authorization to pay unless the
    person authorized to pay also is instructed to pay.

    (11) "Ordinary care" in the case of a person engaged in business means observance
    of the reasonable commercial standards that are prevailing in the area in which
    the person is located with respect to the business in which the person is engaged.
    In the case of a bank that takes an instrument for processing for collection or
    payment by automated means, reasonable commercial standards do not require the
    bank to examine the instrument if the failure to examine does not violate the
    bank''s prescribed procedures, and the bank''s procedures do not vary unreasonably
    from general banking usage not disapproved by this chapter or Chapter 1304. of
    the Revised Code.

    (12) "Party" means a party to an instrument.

    (13) "Principal obligor," with respect to an instrument, means the accommodated
    party or any other party to the instrument against whom a secondary obligor has
    recourse under this chapter.

    (14) "Promise" means a written undertaking to pay money that is signed by the
    person undertaking to pay. "Promise" does not include an acknowledgment of an
    obligation by the obligor unless the obligor also undertakes to pay the obligation.

    (15) "Prove," with respect to a fact, means to meet the burden of establishing
    the fact.

    (16) "Remitter" means a person who purchases an instrument from its issuer if
    the instrument is payable to an identified person other than the purchaser.

    (17) "Remotely-created consumer item" means an item drawn on a consumer account,
    which is not created by the payor bank and does not bear a handwritten signature
    purporting to be the signature of the drawer.

    (18) "Secondary obligor," with respect to an instrument, means any of the following:

    (a) An indorser or an accommodation party;

    (b) A drawer having the obligation described in division (D) of section 1303.54
    of the Revised Code;

    (c) Any other party to the instrument that has recourse against another party
    to the instrument pursuant to division (B) of section 1303.14 of the Revised Code.

    (B) As used in this chapter:

    (1) "Acceptance" has the same meaning as in section 1303.46 of the Revised Code.

    (2) "Accommodation party" and "accommodated party" have the same meanings as in
    section 1303.59 of the Revised Code.

    (3) "Account" has the same meaning as in section 1304.01 of the Revised Code.

    (4) "Alteration" has the same meaning as in section 1303.50 of the Revised Code.

    (5) "Anomalous indorsement," "blank indorsement," and "special indorsement" have
    the same meanings as in section 1303.25 of the Revised Code.

    (6) "Certificate of deposit," "cashier''s check," "check," "draft," "instrument,"
    "negotiable instrument," "note," "teller''s check," and "traveler''s check" have
    the same meanings as in section 1303.03 of the Revised Code.

    (7) "Certified check" has the same meaning as in section 1303.46 of the Revised
    Code.

    (8) "Consideration" and "value" have the same meanings as in section 1303.33 of
    the Revised Code.

    (9) "Holder in due course" has the same meaning as in section 1303.32 of the Revised
    Code.

    (10) "Incomplete instrument" has the same meaning as in section 1303.11 of the
    Revised Code.

    (11) "Indorsement" and "indorser" have the same meanings as in section 1303.24
    of the Revised Code.

    (12) "Negotiation" has the same meaning as in section 1303.21 of the Revised Code.

    (13) "Payable at a definite time" and "payable on demand" have the same meanings
    as in section 1303.07 of the Revised Code.

    (14) "Payable to bearer" and "payable to order" have the same meanings as in section
    1303.10 of the Revised Code.

    (15) "Payment" has the same meaning as in section 1303.67 of the Revised Code.

    (16) "Person entitled to enforce" has the same meaning as in section 1303.31 of
    the Revised Code.

    (17) "Presentment" has the same meaning as in section 1303.61 of the Revised Code.

    (18) "Reacquisition" has the same meaning as in section 1303.27 of the Revised
    Code.

    (19) "Transfer of instrument" has the same meaning as in section 1303.22 of the
    Revised Code.

    (C) As used in this chapter, "banking day," "clearing house," "collecting bank,"
    "customer," "depositary bank," "documentary draft," "intermediary bank," "item,"
    "midnight deadline," "payor bank," and "suspends payments" have the same meanings
    as in section 1304.01 of the Revised Code.

    (D) In addition, Chapter 1301. of the Revised Code contains general definitions
    and general principles of construction and interpretation applicable throughout
    this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.01
- number: '1303.02'
  heading: Subject matter - UCC 3-102
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) This chapter applies to negotiable instruments. It does not apply to
    money, to payment orders governed by sections 1304.51 to 1304.85 of the Revised
    Code, or to securities governed by Chapter 1308. of the Revised Code.

    (B) If there is a conflict between this chapter and either sections 1304.01 to
    1304.40 or Chapter 1309. of the Revised Code, the provisions of sections 1304.01
    to 1304.40 or Chapter 1309. of the Revised Code govern.

    (C) If any provision of this chapter is inconsistent with any regulation of the
    board of governors of the federal reserve system or any operating circular of
    the federal reserve banks, the regulation or the operating circular supersedes
    the provision of this chapter to the extent of the inconsistency.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.02
- number: '1303.03'
  heading: Negotiable instrument - UCC 3-104
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Except as provided in divisions (C) and (D) of this section, "negotiable
    instrument" means an unconditional promise or order to pay a fixed amount of money,
    with or without interest or other charges described in the promise or order, if
    it meets all of the following requirements:

    (1) It is payable to bearer or to order at the time it is issued or first comes
    into possession of a holder.

    (2) It is payable on demand or at a definite time.

    (3) It does not state any other undertaking or instruction by the person promising
    or ordering payment to do any act in addition to the payment of money, but the
    promise or order may contain any of the following:

    (a) An undertaking or power to give, maintain, or protect collateral to secure
    payment;

    (b) An authorization or power to the holder to confess judgment or realize on
    or dispose of collateral;

    (c) A waiver of the benefit of any law intended for the advantage or protection
    of an obligor.

    (B) "Instrument" means a negotiable instrument.

    (C) An order that meets all of the requirements of divisions (A)(2) and (3) of
    this section and otherwise falls within the definition of "check" is a negotiable
    instrument and a check.

    (D) A promise or order other than a check is not an instrument if, at the time
    it is issued or first comes into possession of a holder, it contains a conspicuous
    statement, however expressed, to the effect that the promise or order is not negotiable
    or is not an instrument governed by this chapter.

    (E)(1) "Note" means an instrument that is a promise.

    (2) "Draft" means an instrument that is an order.

    (3) If an instrument is both a "note" and a "draft," a person entitled to enforce
    the instrument may treat it as either.

    (F) "Check" means either of the following:

    (1) A draft, other than a documentary draft, payable on demand and drawn on a
    bank;

    (2) A cashier''s check or teller''s check.

    An instrument may be a "check" even though it is described on its face as a "money
    order" or by another term.

    (G) "Cashier''s check" means a draft with respect to which the drawer and drawee
    are the same bank or branches of the same bank.

    (H) "Teller''s check" means a draft drawn by a bank on another bank or payable
    at or through a bank.

    (I) "Traveler''s check" means an instrument that meets all of the following conditions:

    (1) It is payable on demand.

    (2) It is drawn on or payable at or through a bank.

    (3) It is designated by the term "traveler''s check" or by a substantially similar
    term.

    (4) It requires, as a condition to payment, a countersignature by a person whose
    specimen signature appears on the instrument.

    (J) "Certificate of deposit" means an instrument containing an acknowledgment
    by a bank that a sum of money has been received by the bank and a promise by the
    bank to repay the sum of money. A "certificate of deposit" is a note of the bank.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.03
- number: '1303.04'
  heading: Issue of instrument - UCC 3-105(b)
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: An unissued instrument, or an unissued incomplete instrument that is completed,
    is binding on the maker or drawer, but nonissuance is a defense. An instrument
    that is conditionally issued or is issued for a special purpose is binding on
    the maker or drawer, but the failure of the condition or special purpose to be
    fulfilled is a defense.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.04
- number: '1303.05'
  heading: Unconditional promise or order - UCC 3-106
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Except as provided in this section, for the purposes of division (A)
    of section 1303.03 of the Revised Code, a promise or order is unconditional unless
    it states any of the following:

    (1) An express condition to payment;

    (2) That the promise or order is subject to or governed by another record ;

    (3) That rights or obligations with respect to the promise or order are stated
    in another record. A reference to another record does not of itself make the promise
    or order conditional.

    (B) A promise or order is not made conditional by a reference to another record
    for a statement of rights with respect to collateral, prepayment, or acceleration
    or because payment is limited to resort to a particular fund or source.

    (C) If a promise or order requires, as a condition to payment, a countersignature
    by a person whose specimen signature appears on the promise or order, the condition
    does not make the promise or order conditional for the purposes of division (A)
    of section 1303.03 of the Revised Code. If the person whose specimen signature
    appears on an instrument fails to countersign the instrument, the failure to countersign
    is a defense to the obligation of the issuer, but the failure does not prevent
    a transferee of the instrument from becoming a holder of the instrument.

    (D) If a promise or order at the time it is issued or first comes into possession
    of a holder contains a statement, required by applicable statutory or administrative
    law, to the effect that the rights of a holder or transferee are subject to claims
    or defenses that the issuer could assert against the original payee, the promise
    or order is not made conditional by that statement for the purposes of division
    (A) of section 1303.03 of the Revised Code, but, if the promise or order is an
    instrument, there cannot be a holder in due course of the instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.05
- number: '1303.06'
  heading: Instrument payable in foreign money - UCC 3-107
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: Unless the instrument otherwise provides, an instrument that states the amount
    payable in foreign money may be paid in the foreign money or in an equivalent
    amount in dollars calculated by using the current bank-offered spot rate at the
    place of payment for the purchase of dollars on the day on which the instrument
    is paid.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.06
- number: '1303.07'
  heading: Payable on demand or at definite time - UCC 3-108
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A promise or order is "payable on demand" if it states that it is payable
    on demand or at sight or otherwise indicates that it is payable at the will of
    the holder, or if it does not state any time of payment.

    (B) A promise or order is "payable at a definite time" if it is payable on elapse
    of a definite period of time after sight or acceptance, at a fixed date or dates,
    or at a time or times readily ascertainable at the time the promise or order is
    issued, subject to any of the following rights:

    (1) Prepayment;

    (2) Acceleration;

    (3) Extension at the option of the holder;

    (4) Extension to a further definite time at the option of the maker or acceptor
    or automatically upon or after a specified act or event.

    (C) If an instrument, payable at a fixed date, is also payable upon demand made
    before the fixed date, the instrument is payable on demand until the fixed date
    and, if demand for payment is not made before that date, becomes payable at a
    definite time on the fixed date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.07
- number: '1303.08'
  heading: Identification of person to whom instrument is payable - UCC 3-110
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) The person to whom an instrument is initially payable is determined by
    the intent of the person, whether or not authorized to sign the instrument, who
    signs the instrument as, in the name of, or in behalf of the issuer of the instrument.
    The instrument is payable to the person intended by the signer even if that person
    is identified in the instrument by a name or other identification that is not
    that of the intended person. If more than one person signs in the name or behalf
    of the issuer of an instrument and all the signers do not intend the same person
    as payee, the instrument is payable to any person intended by one or more of the
    signers.

    (B) If the signature of the issuer of an instrument is made by a check-writing
    machine or other automated means, the payee of the instrument is determined by
    the intent of the person who supplied the name or identification of the payee,
    whether or not authorized to do so.

    (C) A person to whom an instrument is payable may be identified in any way, including
    by name, identifying number, office, or account number. For the purpose of determining
    the holder of an instrument, the following rules apply:

    (1) If an instrument is payable to an account and the account is identified only
    by number, the instrument is payable to the person to whom the account is payable.
    If an instrument is payable to an account identified by number and by the name
    of a person, the instrument is payable to the named person, whether or not that
    person is the owner of the account identified by number.

    (2) If an instrument is payable to a trust, an estate, or a person described as
    trustee or representative of a trust or estate, the instrument is payable to the
    trustee, the representative, or a successor of either, whether or not the beneficiary
    or estate is also named.

    (3) If an instrument is payable to a person described as agent or similar representative
    of a named or identified person, the instrument is payable to the represented
    person, the representative, or a successor of the representative.

    (4) If an instrument is payable to a fund or organization that is not a legal
    entity, the instrument is payable to a representative of the members of the fund
    or organization.

    (5) If an instrument is payable to an office or to a person described as holding
    an office, the instrument is payable to the named person, the incumbent of the
    office, or a successor to the incumbent.

    (D) If an instrument is payable to two or more persons alternatively, it is payable
    to any of them and may be negotiated, discharged, or enforced by any or all of
    them in possession of the instrument. If an instrument is payable to two or more
    persons not alternatively, it is payable to all of them and may be negotiated,
    discharged, or enforced only by all of them. If an instrument payable to two or
    more persons is ambiguous as to whether it is payable to the persons alternatively,
    the instrument is payable to the persons alternatively.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.08
- number: '1303.09'
  heading: Place of payment - UCC 3-111
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: Except as otherwise provided in this chapter or Chapter 1304. of the Revised
    Code, an instrument is payable at the place of payment stated in the instrument.
    If no place of payment is stated in an instrument, an instrument is payable at
    the address of the drawee or maker stated in the instrument. If no address of
    the drawee or maker is stated in an instrument, the place of payment is the place
    of business of the drawee or maker. If a drawee or maker of an instrument has
    more than one place of business, the place of payment for the instrument is any
    place of business of the drawee or maker chosen by the person entitled to enforce
    the instrument. If the drawee or maker of an instrument has no place of business,
    the place of payment for the instrument is the residence of the drawee or maker
    of an instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.09
- number: '1303.10'
  heading: Payable to bearer or to order - UCC 3-109
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A promise or order is "payable to bearer" if any of the following apply:

    (1) It states that it is payable to the bearer or to the order of bearer or otherwise
    indicates that the person in possession of the promise or order is entitled to
    payment.

    (2) It does not state a payee.

    (3) It states that it is payable to "cash" or to the order of "cash" or otherwise
    indicates that it is not payable to an identified person.

    (B) A promise or order that is not payable to bearer is payable to order if it
    is payable to the order of an identified person or to an identified person or
    order.

    (C) A promise or order that is payable to order is payable to the identified person.

    (D) An instrument payable to bearer may become payable to an identified person
    if it is specially indorsed pursuant to division (A) of section 1303.25 of the
    Revised Code. An instrument payable to an identified person may become payable
    to the bearer if it is indorsed in blank pursuant to division (B) of section 1303.25
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.10
- number: '1303.11'
  heading: Incomplete instrument - UCC 3-115
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) "Incomplete instrument" means a signed writing, whether or not issued
    by the signer, the contents of which show at the time of signing that it is incomplete
    but that the signer intended it to be completed by the addition of words or numbers.

    (B) Subject to division (C) of this section, if an incomplete instrument is an
    instrument under section 1303.03 of the Revised Code, it may be enforced according
    to its terms if it is not completed or according to its terms as augmented by
    completion. If an incomplete instrument is not an instrument under section 1303.03
    of the Revised Code, but, after completion, the requirements of section 1303.03
    of the Revised Code are met, the instrument may be enforced according to its terms
    as augmented by completion.

    (C) If words or numbers are added to an incomplete instrument without authority
    of the signer, there is an alteration of the incomplete instrument under section
    1303.50 of the Revised Code.

    (D) The burden of establishing that words or numbers were added to an incomplete
    instrument without authority of the signer is on the person asserting the lack
    of authority.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.11
- number: '1303.12'
  heading: Interest - UCC 3-112
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Unless otherwise provided in the instrument, both of the following apply:

    (1) An instrument is not payable with interest.

    (2) Interest on an interest-bearing instrument is payable from the date of the
    instrument.

    (B) Interest may be stated in an instrument as a fixed or variable amount of money,
    or it may be expressed as a fixed or variable rate or rates. The amount or rate
    of interest may be stated or described in the instrument in any manner and may
    require reference to information not contained in the instrument. If an instrument
    provides for interest, but the amount of interest payable cannot be ascertained
    from the description, interest is payable at the judgment rate in effect at the
    place of payment of the instrument and at the time interest first accrues.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.12
- number: '1303.13'
  heading: Date of instrument - UCC 3-113
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) An instrument may be antedated or postdated. The date stated determines
    the time of payment if the instrument is payable at a fixed period after date.
    Except as provided in division (C) of section 1304.30 of the Revised Code, an
    instrument payable on demand is not payable before the date of the instrument.

    (B) If an instrument is undated, its date is the date of its issue or, in the
    case of an unissued instrument, the date it first comes into possession of a holder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.13
- number: '1303.14'
  heading: Joint and several liability - contribution - UCC 3-116
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Except as otherwise provided in the instrument, two or more persons who
    have the same liability on an instrument as makers, drawers, acceptors, indorsers
    who indorse as joint payees, or anomalous indorsers are jointly and severally
    liable in the capacity in which they sign.

    (B) Except as provided in division (F) of section 1303.59 of the Revised Code
    or by agreement of the affected parties, a party having joint and several liability
    who pays the instrument is entitled to receive from any party having the same
    joint and several liability contribution in accordance with applicable law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.14
- number: '1303.15'
  heading: Other agreements affecting instrument - UCC 3-117
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: Subject to applicable law regarding exclusion of proof of contemporaneous
    or previous agreements, the obligation of a party to an instrument to pay the
    instrument may be modified, supplemented, or nullified by a separate agreement
    of the obligor and a person entitled to enforce the instrument, if the instrument
    is issued or the obligation is incurred in reliance on the agreement or as part
    of the same transaction giving rise to the agreement. To the extent an obligation
    is modified, supplemented, or nullified by an agreement under this section, the
    agreement is a defense to the obligation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.15
- number: '1303.16'
  heading: Statute of limitations - UCC 3-118
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Except as provided in division (E) of this section, an action to enforce
    the obligation of a party to pay a note payable at a definite time shall be brought
    within six years after the due date or dates stated in the note or, if a due date
    is accelerated, within six years after the accelerated due date.

    (B) Except as provided in division (D) or (E) of this section, if demand for payment
    is made to the maker of a note payable on demand, an action to enforce the obligation
    of a party to pay the note shall be brought within six years after the date on
    which the demand for payment is made. If no demand for payment is made to the
    maker of a note payable on demand, an action to enforce the note is barred if
    neither principal nor interest on the note has been paid for a continuous period
    of ten years.

    (C) Except as provided in division (D) of this section, an action to enforce the
    obligation of a party to an unaccepted draft to pay the draft shall be brought
    within three years after dishonor of the draft or ten years after the date of
    the draft, whichever period expires first.

    (D) An action to enforce the obligation of the acceptor of a certified check or
    the issuer of a teller''s check, cashier''s check, or traveler''s check shall
    be brought within three years after demand for payment is made to the acceptor
    or issuer.

    (E) An action to enforce the obligation of a party to a certificate of deposit
    to pay the instrument shall be brought within six years after demand for payment
    is made to the maker, but if the instrument states a due date and the maker is
    not required to pay before that date, the six-year period begins when a demand
    for payment is in effect and the due date has passed.

    (F) An action to enforce the obligation of a party to pay an accepted draft, other
    than a certified check, shall be brought within six years after the due date or
    dates stated in the draft or acceptance if the obligation of the acceptor is payable
    at a definite time or within six years after the date of the acceptance if the
    obligation of the acceptor is payable on demand.

    (G) Unless governed by other law regarding claims for indemnity or contribution,
    any of the following actions shall be brought within three years after the cause
    of action accrues:

    (1) An action for conversion of an instrument, an action for money had and received,
    or a similar action based on conversion;

    (2) An action for breach of warranty;

    (3) An action to enforce an obligation, duty, or right arising under this chapter
    and not governed by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.16
- number: '1303.17'
  heading: Contradictory terms of instrument - UCC 3-114
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: If an instrument contains contradictory terms, typewritten terms prevail over
    printed terms, handwritten terms prevail over both typewritten and printed terms,
    and words prevail over numbers.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.17
- number: '1303.18'
  heading: Notice of right to defend action - UCC 3-119
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: In an action for breach of an obligation for which a third person is answerable
    over pursuant to this chapter or sections 1304.01 to 1304.40 of the Revised Code,
    the defendant may give the third person notice of the litigation in a record,
    and the person notified may then give similar notice to any other person who is
    answerable over. If the notice states that the person notified may come in and
    defend and that failure to do so will bind the person notified in an action later
    brought by the person giving the notice as to any determination of fact common
    to the two litigations, the person notified is so bound unless after seasonable
    receipt of the notice the person notified does come in and defend.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.18
- number: '1303.21'
  heading: Negotiation - UCC 3-201
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) "Negotiation" means a voluntary or involuntary transfer of possession
    of an instrument by a person other than the issuer to a person who by the transfer
    becomes the holder of the instrument.

    (B) Except for negotiation by a remitter, if an instrument is payable to an identified
    person, negotiation requires transfer of possession of the instrument and its
    indorsement by the holder. If an instrument is payable to bearer, it may be negotiated
    by transfer of possession alone.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.21
- number: '1303.22'
  heading: Transfer of instrument - rights acquired by transfer - UCC 3-203
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) An instrument is transferred when it is delivered by a person other than
    its issuer for the purpose of giving to the person receiving delivery the right
    to enforce the instrument.

    (B) Transfer of an instrument, whether or not the transfer is a negotiation, vests
    in the transferee any right of the transferor to enforce the instrument, including
    any right as a holder in due course, but the transferee cannot acquire rights
    of a holder in due course by a direct or indirect transfer from a holder in due
    course if the transferee engaged in fraud or illegality affecting the instrument.

    (C) Unless otherwise agreed, if an instrument is transferred for value the transferee
    has a specifically enforceable right to the unqualified indorsement of the transferor,
    but negotiation of the instrument does not occur until the indorsement is made
    by the transferor.

    (D) If a transferor purports to transfer less than the entire instrument, negotiation
    of the instrument does not occur, the transferee of that instrument obtains no
    rights under this chapter, and the transferee of that instrument has only the
    rights of a partial assignee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.22
- number: '1303.23'
  heading: Negotiation subject to rescission - UCC 3-202
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Negotiation is effective even if it is obtained in any of the following
    manners:

    (1) From an infant, a corporation exceeding its powers, or any other person without
    capacity;

    (2) By fraud, duress, or mistake of any kind;

    (3) As part of an illegal transaction;

    (4) In breach of duty.

    (B) To the extent permitted by other law, negotiation may be rescinded or may
    be subject to other remedies, but those remedies may not be asserted against a
    subsequent holder in due course or a person paying the instrument in good faith
    and without knowledge of facts that are a basis for the rescission or other remedy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.23
- number: '1303.24'
  heading: Indorsement - UCC 3-204
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A)(1) "Indorsement" means a signature, other than that of a signer as maker,
    drawer, or acceptor, that alone or accompanied by other words is made on an instrument
    for any of the following purposes:

    (a) To negotiate the instrument;

    (b) To restrict payment of the instrument;

    (c) To incur the indorser''s liability on the instrument.

    (2) Regardless of the intent of the signer, a signature and its accompanying words
    is an "indorsement" unless the accompanying words, terms of the instrument, place
    of the signature, or other circumstances unambiguously indicate that the signature
    was made for a purpose other than indorsement. For the purpose of determining
    whether a signature is made on an instrument, a paper affixed to the instrument
    is a part of the instrument.

    (B) "Indorser" means a person who makes an indorsement.

    (C) For the purpose of determining whether the transferee of an instrument is
    a holder, an indorsement that transfers a security interest in the instrument
    is effective as an unqualified indorsement of the instrument.

    (D) If an instrument is payable to a holder under a name that is not the name
    of the holder, indorsement may be made by the holder in the name stated in the
    instrument or in the holder''s name or both, but signatures in both names may
    be required by a person paying or taking the instrument for value or collection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.24
- number: '1303.25'
  heading: Special indorsement - blank indorsement - anomalous indorsement - UCC 3-205
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A "special indorsement" means an indorsement that is made by the holder
    of an instrument, whether payable to an identified person or payable to the bearer,
    and that identifies a person to whom it makes the instrument payble. An instrument,
    when specially indorsed, becomes payable to the identified person and may be negotiated
    only by the indorsement of that person. Section 1303.08 of the Revised Code applies
    to special indorsements.

    (B) "Blank indorsement" means an indorsement that is made by the holder of the
    instrument and that is not a special indorsement. When an instrument is indorsed
    in blank, the instrument becomes payable to bearer and may be negotiated by transfer
    of possession alone until specially indorsed.

    (C) The holder may convert a blank indorsement that consists only of a signature
    into a special indorsement by writing above the signature of the indorser words
    identifying the person to whom the instrument is made payable.

    (D) "Anomalous indorsement" means an indorsement made by a person who is not the
    holder of the instrument. An "anomalous indorsement" does not affect the manner
    in which the instrument may be negotiated.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.25
- number: '1303.26'
  heading: Restrictive indorsement - UCC 3-206
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) An indorsement limiting payment to a particular person or otherwise prohibiting
    further transfer or negotiation of the instrument is not effective to prevent
    further transfer or negotiation of the instrument.

    (B) An indorsement stating a condition to the right of the indorsee to receive
    payment does not affect the right of the indorsee to enforce the instrument. A
    person paying the instrument or taking it for value or collection may disregard
    the condition, and the rights and liabilities of that person are not affected
    by whether the condition has been fulfilled.

    (C) If an instrument bears an indorsement as described in division (B) of section
    1304.11 of the Revised Code, in blank, or to a particular bank, using the words
    "for deposit," "for collection," or other words indicating a purpose of having
    the instrument collected by a bank for the indorser or for a particular account,
    the following rules apply:

    (1) A person, other than a bank, who purchases the instrument when so indorsed
    converts the instrument unless the amount paid for the instrument is received
    by the indorser or applied consistently with the indorsement.

    (2) A depositary bank that purchases the instrument or takes it for collection
    when so indorsed converts the instrument unless the amount paid by the bank with
    respect to the instrument is received by the indorser or applied consistently
    with the indorsement.

    (3) A payor bank that is also the depositary bank or that takes the instrument
    for immediate payment over the counter from a person other than a collecting bank
    converts the instrument unless the proceeds of the instrument are received by
    the indorser or applied consistently with the indorsement.

    (4) Except as otherwise provided in division (C)(3) of this section, a payor bank
    or intermediary bank may disregard the indorsement and is not liable if the proceeds
    of the instrument are not received by the indorser or applied consistently with
    the indorsement.

    (D) Except for an indorsement described in division (C) of this section, if an
    instrument bears an indorsement using words to the effect that payment is to be
    made to the indorsee as agent, trustee, or other fiduciary for the benefit of
    the indorser or another person, the following rules apply:

    (1) Unless there is notice of breach of fiduciary duty as provided in section
    1303.37 of the Revised Code, a person who purchases the instrument from the indorsee
    or takes the instrument from the indorsee for collection or payment may pay the
    proceeds of payment or the value given for the instrument to the indorsee without
    regard to whether the indorsee violates a fiduciary duty to the indorser.

    (2) A subsequent transferee of the instrument or person who pays the instrument
    is neither given notice nor otherwise affected by the restriction in the indorsement
    unless the transferee or payor knows that the fiduciary dealt with the instrument
    or its proceeds in breach of fiduciary duty.

    (E) The presence on an instrument of an indorsement to which this section applies
    does not prevent a purchaser of the instrument from becoming a holder in due course
    of the instrument unless the purchaser is a converter under division (C) of this
    section or has notice or knowledge of breach of fiduciary duty as stated in division
    (D) of this section.

    (F) In an action to enforce the obligation of a party to pay the instrument, the
    obligor has a defense to the action if payment would violate an indorsement to
    which this section applies, and the payment is not permitted by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.26
- number: '1303.27'
  heading: Reacquisition - UCC 3-207
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '"Reacquisition of an instrument" occurs if it is transferred by negotiation
    or otherwise to a former holder. A former holder who reacquires the instrument
    may cancel any indorsements made after the reacquirer first became a holder of
    the instrument. If the cancellation causes the instrument to be payable to the
    reacquirer or to bearer, the reacquirer may negotiate the instrument. An indorser
    whose indorsement is canceled is discharged, and the discharge is effective against
    any subsequent holder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.27
- number: '1303.31'
  heading: Person entitled to enforce instrument - UCC 3-301
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) "Person entitled to enforce" an instrument means any of the following
    persons:

    (1) The holder of the instrument;

    (2) A nonholder in possession of the instrument who has the rights of a holder;

    (3) A person not in possession of the instrument who is entitled to enforce the
    instrument pursuant to section 1303.38 or division (D) of section 1303.58 of the
    Revised Code.

    (B) A person may be a "person entitled to enforce" the instrument even though
    the person is not the owner of the instrument or is in wrongful possession of
    the instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.31
- number: '1303.32'
  heading: Holder in due course - UCC 3-302
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Subject to division (C) of this section and division (D) of section 1303.05
    of the Revised Code, "holder in due course" means the holder of an instrument
    if both of the following apply:

    (1) The instrument when issued or negotiated to the holder does not bear evidence
    of forgery or alteration that is so apparent, or is not otherwise so irregular
    or incomplete as to call into question its authenticity;

    (2) The holder took the instrument under all of the following circumstances:

    (a) For value;

    (b) In good faith;

    (c) Without notice that the instrument is overdue or has been dishonored or that
    there is an uncured default with respect to payment of another instrument issued
    as part of the same series;

    (d) Without notice that the instrument contains an unauthorized signature or has
    been altered;

    (e) Without notice of any claim to the instrument as described in section 1303.36
    of the Revised Code;

    (f) Without notice that any party has a defense or claim in recoupment described
    in division (A) of section 1303.35 of the Revised Code.

    (B) Notice of discharge of a party, other than discharge in an insolvency proceeding,
    is not notice of a defense under division (A) of this section, but discharge is
    effective against a person who became a holder in due course with notice of the
    discharge. Public filing or recording of a document does not of itself constitute
    notice of a defense, claim in recoupment, or claim to the instrument.

    (C) Except to the extent a transferor or predecessor in interest has rights as
    a holder in due course, a person does not acquire rights of a holder in due course
    of an instrument taken under any of the following circumstances:

    (1) By legal process or by purchase in an execution, bankruptcy, or creditor''s
    sale or similar proceeding;

    (2) By purchase as part of a bulk transaction not in ordinary course of business
    of the transferor;

    (3) As the successor in interest to an estate or other organization.

    (D) If, under division (A)(1) of section 1303.33 of the Revised Code, the promise
    of performance that is the consideration for an instrument has been partially
    performed, the holder may assert rights as a holder in due course of the instrument
    only to the fraction of the amount payable under the instrument equal to the value
    of the partial performance divided by the value of the promised performance.

    (E) If the person entitled to enforce an instrument has only a security interest
    in the instrument and the person obliged to pay the instrument has a defense,
    claim in recoupment, or claim to the instrument that may be asserted against the
    person who granted the security interest, the person entitled to enforce the instrument
    may assert rights as a holder in due course only to an amount payable under the
    instrument that, at the time of enforcement of the instrument, does not exceed
    the amount of the unpaid obligation secured.

    (F) To be effective, notice must be received at a time and in a manner that gives
    the recipient a reasonable opportunity to respond to the notice.

    (G) This section is subject to any law limiting status as a holder in due course
    in particular classes of transactions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.32
- number: '1303.33'
  heading: Value and consideration - UCC 3-303
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) An instrument is issued or transferred for value if any of the following
    apply:

    (1) The instrument is issued or transferred for a promise of performance, to the
    extent the promise has been performed.

    (2) The transferee acquires a security interest or other lien in the instrument
    other than a lien obtained by judicial proceeding.

    (3) The instrument is issued or transferred as payment of, or as security for,
    an antecedent claim against any person, whether or not the claim is due.

    (4) The instrument is issued or transferred in exchange for a negotiable instrument.

    (5) The instrument is issued or transferred in exchange for the incurring of an
    irrevocable obligation to a third party by the person taking the instrument.

    (B) "Consideration" means any consideration sufficient to support a simple contract.
    The drawer or maker of an instrument has a defense if the instrument is issued
    without consideration. If an instrument is issued for a promise of performance,
    the issuer has a defense to the extent performance of the promise is due and the
    promise has not been performed. If an instrument is issued for value as stated
    in division (A) of this section, the instrument is also issued for consideration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.33
- number: '1303.34'
  heading: Overdue instrument - UCC 3-304
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) An instrument payable on demand becomes overdue at the earliest of the
    following times:

    (1) On the day after the day during which demand for payment is duly made;

    (2) If the instrument is a check, ninety days after its date;

    (3) If the instrument is not a check, when the instrument has been outstanding
    for a period of time after its date that is unreasonably long under the circumstances
    of the particular case in light of the nature of the instrument and the usage
    of the trade.

    (B) With respect to an instrument payable at a definite time, the following rules
    apply:

    (1) If the principal is payable in installments and a due date has not been accelerated,
    the instrument becomes overdue upon default under the instrument for nonpayment
    of an installment, and the instrument remains overdue until the default is cured.

    (2) If the principal is not payable in installments and the due date has not been
    accelerated, the instrument becomes overdue on the day after the due date.

    (3) If a due date with respect to principal has been accelerated, the instrument
    becomes overdue on the day after the accelerated due date.

    (C) Unless the due date of principal has been accelerated, an instrument does
    not become overdue if there is default in payment of interest but no default in
    payment of principal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.34
- number: '1303.35'
  heading: Defenses and claims in recoupment - UCC 3-305
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Except as otherwise stated in this section, the right to enforce the
    obligation of a party to pay an instrument is subject to all of the following:

    (1) A defense of the obligor based on any of the following:

    (a) Infancy of the obligor to the extent it is a defense to a simple contract;

    (b) Duress, lack of legal capacity, or illegality of the transaction that, under
    other law, nullifies the obligation of the obligor;

    (c) Fraud that induced the obligor to sign the instrument with neither knowledge
    nor reasonable opportunity to learn of its character or its essential terms;

    (d) Discharge of the obligor in insolvency proceedings.

    (2) A defense of the obligor set forth in a section of this chapter or a defense
    of the obligor that would be available if the person entitled to enforce the instrument
    were enforcing a right to payment under a simple contract;

    (3) A claim in recoupment of the obligor against the original payee of the instrument
    if the claim arose from the transaction that gave rise to the instrument, but
    the claim of the obligor may be asserted against a transferee of the instrument
    only to reduce the amount owing on the instrument at the time the action is brought.

    (B) The right of a holder in due course to enforce the obligation of a party to
    pay the instrument is subject to the defenses of the obligor stated in division
    (A)(1) of this section but is not subject to defenses of the obligor stated in
    division (A)(2) of this section or to claims in recoupment stated in division
    (A)(3) of this section against a person other than the holder.

    (C) Except as stated in division (D) of this section, in an action to enforce
    the obligation of a party to pay the instrument, the obligor may not assert against
    the person entitled to enforce the instrument a defense, a claim in recoupment,
    or a claim of another person to the instrument under division (C) of section 1303.36
    of the Revised Code, but the other person''s claim to the instrument may be asserted
    by the obligor if the other person is joined in the action and personally asserts
    the claim against the person entitled to enforce the instrument. An obligor is
    not required to pay the instrument if the person seeking enforcement of the instrument
    does not have rights of a holder in due course and the obligor proves that the
    instrument is a lost or stolen instrument.

    (D) In an action to enforce the obligation of an accommodation party to pay an
    instrument, the accommodation party may assert against the person entitled to
    enforce the instrument any defense or claim in recoupment under division (A) of
    this section that the accommodated party could assert against the person entitled
    to enforce the instrument, except the defenses of discharge in insolvency proceedings,
    infancy, and lack of legal capacity.

    (E) In a consumer transaction, if any law other than this chapter req uires that
    an instrument include a statement to the effect that the rights of a holder or
    transferee are subject to a claim or defense that the issuer could assert against
    the original payee, and the instrument does not include such a statement, all
    of the following apply:

    (1) The instrument has the same effect as if the instrument included such a statement.

    (2) The issuer may assert against the holder or transferee all claims and defenses
    that would have been available if the instrument included such a statement.

    (3) The extent to which claims may be asserted against the holder or transferee
    is determined as if the instrument included such a statement.

    (F) This section is subject to any law, other than this chapter, that establishes
    a different rule for consumer transactions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.35
- number: '1303.36'
  heading: Proof of signatures and status as holder in due course - UCC 3-308 - claims
    to an instrument - UCC 3-306
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Unless specifically denied in the pleadings, in an action with respect
    to an instrument, the authenticity of, and authority to make, each signature on
    an instrument is admitted. If the validity of a signature is denied in the pleadings,
    the burden of establishing validity is on the party claiming validity but the
    signature is presumed to be authentic and authorized unless the action is to enforce
    the liability of the purported signer and the signer is dead or becomes incompetent
    at the time of the trial on the issue of the validity of the signature. If an
    action to enforce the instrument is brought against a person as the undisclosed
    principal of a person who signed the instrument as a party to the instrument,
    the plaintiff has the burden of establishing that the defendant is liable on the
    instrument as a represented person under section 1303.42 of the Revised Code.

    (B) instrument If the validity of signatures is admitted or proved and there is
    compliance with division (A) of this section, a plaintiff producing the instrument
    is entitled to payment if the plaintiff proves entitlement to enforce the instrument
    under section 1303.31 of the Revised Code, unless the defendant proves a defense
    or claim in recoupment. If the defendant proves a defense or claim in recoupment,
    the right to payment of the plaintiff is subject to the defense or claim, except
    to the extent the plaintiff proves that the plaintiff has rights of a holder in
    due course that are not subject to the defense or claim.

    (C) A person who takes an instrument, other than a person having rights of a holder
    in due course, is subject to a claim of a property or possessory right in the
    instrument or its proceeds, including a claim to rescind a negotiation and to
    recover the instrument or its proceeds. A person having rights of a holder in
    due course takes free of the claim to the instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.36
- number: '1303.37'
  heading: Notice of breach of fiduciary duty - UCC 3-307
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) As used in this section:

    (1) "Fiduciary" means an agent, trustee, partner, corporate officer, corporate
    director, or other representative owing a fiduciary duty with respect to an instrument.

    (2) "Represented person" means the principal, beneficiary, partnership, corporation,
    or other person to whom the fiduciary duty with respect to an instrument referred
    to in division (A)(1) of this section is owed.

    (B) If an instrument is taken from a fiduciary for payment or collection or for
    value, the taker has knowledge of the fiduciary status of the fiduciary, and the
    represented person makes a claim to the instrument or its proceeds on the basis
    that the transaction of the fiduciary is a breach of fiduciary duty, all of the
    following rules apply:

    (1) Notice of breach of fiduciary duty by the fiduciary is notice of the claim
    of the represented person.

    (2) In the case of an instrument payable to the represented person or to the fiduciary
    as fiduciary of the represented person, the taker has notice of the breach of
    fiduciary duty if any of the following apply:

    (a) The instrument is taken in payment of or as security for a debt known by the
    taker to be the personal debt of the fiduciary.

    (b) The instrument is taken in a transaction known by the taker to be for the
    personal benefit of the fiduciary.

    (c) The instrument is deposited to an account other than an account of the fiduciary
    as fiduciary of the represented person or an account of the represented person.

    (3) If an instrument is issued by the represented person or by the fiduciary as
    fiduciary of the represented person and is made payable to the fiduciary personally,
    the taker does not have notice of the breach of fiduciary duty unless the taker
    knows of the breach of fiduciary duty.

    (4) If an instrument is issued by the represented person or by the fiduciary of
    the represented person to the taker as payee, the taker has notice of the breach
    of fiduciary duty if any of the following apply:

    (a) The instrument is taken in payment of or as security for a debt known by the
    taker to be the personal debt of the fiduciary.

    (b) The instrument is taken in a transaction known by the taker to be for the
    personal benefit of the fiduciary.

    (c) The instrument is deposited to an account other than an account of the fiduciary
    as fiduciary for the represented person or an account of the represented person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.37
- number: '1303.38'
  heading: Enforcement of lost, destroyed or stolen instrument - UCC 3-309
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A person not in possession of an instrument is entitled to enforce the
    instrument if all of the following apply:

    (1) The person seeking to enforce the instrument was entitled to enforce the instrument
    when loss of possession occurred or has directly or indirectly acquired ownership
    of the instrument from a person who was entitled to enforce the instrument when
    loss of possession occurred.

    (2) The loss of possession was not the result of a transfer by the person or a
    lawful seizure.

    (3) The person cannot reasonably obtain possession of the instrument because the
    instrument was destroyed, its whereabouts cannot be determined, or it is in the
    wrongful possession of an unknown person or a person that cannot be found or is
    not amenable to service of process.

    (B) A person seeking enforcement of an instrument under division (A) of this section
    must prove the terms of the instrument and the person''s right to enforce the
    instrument. If that proof is made, divisions (A) and (B) of section 1303.36 of
    the Revised Code applies to the case as if the person seeking enforcement had
    produced the instrument. The court may not enter judgment in favor of the person
    seeking enforcement unless it finds that the person required to pay the instrument
    is adequately protected against loss that might occur by reason of a claim by
    another person to enforce the instrument. Adequate protection for the person required
    to pay the instrument may be provided by any reasonable means.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.38
- number: '1303.39'
  heading: Effect of instrument on obligation for which taken - UCC 3-310
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Unless otherwise agreed, if a certified check, cashier''s check, or teller''s
    check is taken for an obligation, the obligation is discharged to the same extent
    discharge would result if an amount of money equal to the amount of the instrument
    were taken in payment of the obligation. The discharge of the obligation does
    not affect any liability that the obligor may have as an indorser of the instrument
    taken in payment of the obligation.

    (B) Unless otherwise agreed and except as provided in division (A) of this section,
    if a note or an uncertified check is taken for an obligation, the obligation is
    suspended to the same extent the obligation would be discharged if an amount of
    money equal to the amount of the instrument were taken, and all of the following
    rules apply:

    (1) In the case of an uncertified check, suspension of the obligation continues
    until dishonor of the check or until it is paid or certified. Payment or certification
    of the check results in discharge of the obligation to the extent of the amount
    of the check.

    (2) In the case of a note, suspension of the obligation continues until dishonor
    of the note or until it is paid. Payment of the note results in discharge of the
    obligation to the extent of the payment.

    (3) Except as provided in division (B)(4) of this section, if the check or note
    is dishonored and the obligee of the obligation for which the instrument was taken
    is the person entitled to enforce the instrument, the obligee may enforce either
    the instrument or the obligation. In the case of an instrument of a third person
    that is negotiated to the obligee by the obligor, discharge of the obligor on
    the instrument also discharges the obligation.

    (4) If the person entitled to enforce the instrument taken for an obligation is
    a person other than the obligee, the obligee may not enforce the obligation to
    the extent the obligation is suspended. If the obligee is the person entitled
    to enforce the instrument but no longer has possession of it because it was lost,
    stolen, or destroyed, the obligation may not be enforced to the extent of the
    amount payable on the instrument, and to that extent the obligee''s rights against
    the obligor are limited to enforcement of the instrument.

    (C) If an instrument other than one described in division (A) or (B) of this section
    is taken for an obligation, division (A) of this section shall apply if the instrument
    is one on which a bank is liable as maker or acceptor, and division (B) of this
    section shall apply in all other instances.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.39
- number: '1303.40'
  heading: Accord and satisfaction by use of instrument - UCC 3-311
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: 'If a person against whom a claim is asserted proves that that person in good
    faith tendered an instrument to the claimant as full satisfaction of the claim,
    that the amount of the claim was unliquidated or subject to a bona fide dispute,
    and that the claimant obtained payment of the instrument, all the following apply:

    (A) Unless division (B) of this section applies, the claim is discharged if the
    person against whom the claim is asserted proves that the instrument or an accompanying
    written communication contained a conspicuous statement to the effect that the
    instrument was tendered as full satisfaction of the claim.

    (B) Subject to division (C) of this section, a claim is not discharged under division
    (A) of this section if either of the following applies:

    (1) The claimant, if an organization, proves both of the following:

    (a) Within a reasonable time before the person against whom the claim is asserted
    tendered the instrument to the claimant, the claimant sent a conspicuous statement
    to the person that communications concerning disputed debts, including an instrument
    tendered as full satisfaction of a debt, are to be sent to a designated person,
    office, or place.

    (b) The instrument or accompanying communication was not received by that designated
    person, office, or place.

    (2) The claimant, whether or not an organization, proves that within ninety days
    after payment of the instrument, the claimant tendered repayment of the amount
    of the instrument to the person against whom the claim is asserted. Division (B)(2)
    of this section does not apply if the claimant is an organization that sent a
    statement complying with division (B)(1) of this section.

    (C) A claim is discharged if the person against whom the claim is asserted proves
    that within a reasonable time before collection of the instrument was initiated,
    the claimant, or an agent of the claimant having direct responsibility with respect
    to the disputed obligation, knew that the instrument was tendered in full satisfaction
    of the claim.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.40
- number: '1303.401'
  heading: Lost, destroyed or stolen cashier's check, teller's check or certified
    check - UCC 3-312
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) As used in this section:

    (1) "Check" means a cashier''s check, teller''s check, or certified check.

    (2) "Claimant" means a person who claims the right to receive the amount of a
    check that was lost, destroyed, or stolen.

    (3) "Declaration of loss" means a statement made in a record, under penalty of
    perjury, to the effect that all of the following are true:

    (a) The declarant lost possession of a check;

    (b) The declarant is the drawer or payee of the check, in the case of a check
    that is a certified check, or the remitter or payee of the check, in the case
    of a check that is a cashier''s check or teller''s check;

    (c) The declarant''s loss of possession of the check was not the result of a transfer
    by the declarant or a lawful seizure;

    (d) The declarant reasonably cannot obtain possession of the check because the
    check was destroyed, its whereabouts cannot be determined, or it is in the wrongful
    possession of an unknown person or a person that cannot be found or is not amenable
    to service of process.

    (4) "Obligated bank" means the issuer of a check that is a cashier''s check or
    teller''s check or the acceptor of a check that is a certified check.

    (B)(1) A claimant may assert a claim to the amount of a check by making a communication
    to the obligated bank that describes the check with reasonable certainty and that
    requests payment of the amount of the check, if all of the following apply:

    (a) If the check is a certified check, the claimant is the drawer or payee of
    the check, or, if the check is a cashier''s check or teller''s check, the claimant
    is the remitter or payee of the check;

    (b) The communication contains or is accompanied by a declaration of loss of the
    claimant with respect to the check;

    (c) The obligated bank receives the communication at a time and in a manner that
    affords the bank a reasonable time to act upon it before the check is paid;

    (d) The claimant provides reasonable identification if requested by the obligated
    bank.

    (2) Delivery of a declaration of loss under division (B) (1) of this section is
    a warranty of the truth of the statements made in the declaration. If a claim
    is asserted in compliance with division (B)(1) of this section, all of the following
    rules apply:

    (a) The claim becomes enforceable at the later of the following times:

    (i) The time the claim is so asserted;

    (ii) If the check is a cashier''s check or teller''s check, the ninetieth day
    following the date of the check, or, if the check is a certified check, the ninetieth
    day following the date of the acceptance.

    (b) Until the claim becomes enforceable, it has no legal effect, and the obligated
    bank may pay the check or, if the check is a teller''s check, may permit the drawee
    to pay the check. Payment to a person entitled to enforce the check discharges
    all liability of the obligated bank with respect to the check.

    (c) If the claim becomes enforceable before the check is presented for payment,
    the obligated bank is not obligated to pay the check.

    (d) When the claim becomes enforceable, the obligated bank becomes obligated to
    pay the amount of the check to the claimant if payment of the check has not been
    made to a person entitled to enforce the check. Subject to division (A)(1) of
    section 1304.28 of the Revised Code, payment to the claimant discharges all liability
    of the obligated bank with respect to the check.

    (C) If the obligated bank pays the amount of a check to a claimant pursuant to
    division (B)(2)(d) of this section, and the check is presented for payment by
    a person with rights of a holder in due course, the claimant is obligated to do
    whichever of the following is applicable:

    (1) If the check is paid, refund the payment to the obligated bank;

    (2) If the check is dishonored, pay the amount of the check to the person with
    rights of a holder in due course.

    (D) If a claimant has the right to assert a claim under division (B) of this section
    and if the claimant also is a person entitled to enforce a cashier''s check, teller''s
    check, or certified check that is lost, destroyed, or stolen, the claimant may
    assert rights with respect to the check under either this section or section 1303.38
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.401
- number: '1303.41'
  heading: Signature - UCC 3-401
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A person is not liable on an instrument unless the person signed the
    instrument or the person is represented by an agent or representative who signed
    the instrument and the signature is binding on the represented person pursuant
    to section 1303.42 of the Revised Code.

    (B) A signature may be made manually or by means of a device or machine and by
    the use of any name, including a trade or assumed name, or by a word, mark, or
    symbol executed or adopted by a person with present intention to authenticate
    a writing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.41
- number: '1303.42'
  heading: Signature by representative - UCC 3-402
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) If a person acting, or purporting to act, as a representative signs an
    instrument by signing either the name of the represented person or the name of
    the signer, the represented person is bound by the signature to the same extent
    the represented person would be bound if the signature were on a simple contract.
    If the represented person is so bound, the signature of the representative is
    the "authorized signature of the represented person" and the represented person
    is liable on the instrument, whether or not identified in the instrument.

    (B) If a representative signs the name of the representative to an instrument
    and the signature is an authorized signature of the represented person under division
    (A) of this section, all of the following rules apply:

    (1) If the form of the signature shows unambiguously that the signature is made
    on behalf of the represented person who is identified in the instrument, the representative
    is not liable on the instrument.

    (2) Subject to division (C) of this section, if the form of the signature does
    not show unambiguously that the signature is made in a representative capacity
    or if the represented person is not identified in the instrument, the representative
    is liable on the instrument to a holder in due course that took the instrument
    without notice that the representative was not intended to be liable on the instrument.
    With respect to any other person, the representative is liable on the instrument
    unless the representative proves that the original parties did not intend the
    representative to be liable on the instrument.

    (C) If a representative signs the name of the representative as drawer of a check
    without indication of the representative status and the check is payable from
    an account of the represented person who is identified on the check, the signer
    is not liable on the check if the signature is an authorized signature of the
    represented person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.42
- number: '1303.43'
  heading: Unauthorized signature - UCC 3-403
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Unless otherwise provided in this chapter or sections 1304.01 to 1304.40
    of the Revised Code, an unauthorized signature is ineffective except as the signature
    of the unauthorized signer in favor of a person who in good faith pays the instrument
    or takes it for value. An unauthorized signature may be ratified for all purposes
    of this chapter.

    (B) If the signature of more than one person is required to constitute the authorized
    signature of an organization, the signature of the organization is unauthorized
    if one of the required signatures is lacking.

    (C) The civil or criminal liability of a person who makes an unauthorized signature
    is not affected by any provision of this chapter that makes the unauthorized signature
    effective for the purposes of this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.43
- number: '1303.44'
  heading: Impostors - fictitious payees - UCC 3-404
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) If an impostor, by use of the mails or otherwise, induces the issuer
    of an instrument to issue the instrument to the impostor, or to a person acting
    in concert with the impostor, by impersonating the payee of the instrument or
    a person authorized to act for the payee, an indorsement of the instrument by
    any person in the name of the payee is effective as the indorsement of the payee
    in favor of a person who, in good faith, pays the instrument or takes it for value
    or for collection.

    (B) If a person whose intent determines to whom an instrument is payable under
    division (A) or (B) of section 1303.08 of the Revised Code does not intend the
    person identified as payee to have any interest in the instrument or if the person
    identified as payee of an instrument is a fictitious person, the following rules
    apply until the instrument is negotiated by special indorsement:

    (1) Any person in possession of the instrument is its holder.

    (2) An indorsement by any person in the name of the payee stated in the instrument
    is effective as the indorsement of the payee in favor of a person who, in good
    faith, pays the instrument or takes it for value or for collection.

    (C) Under division (A) or (B) of this section, an indorsement is made in the name
    of a payee if it is made in a name substantially similar to that of the payee
    or if the instrument, whether or not indorsed, is deposited in a depositary bank
    to an account in a name substantially similar to that of the payee.

    (D) With respect to an instrument to which division (A) or (B) of this section
    applies, if a person paying the instrument or taking it for value or for collection
    fails to exercise ordinary care in paying or taking the instrument and that failure
    substantially contributes to loss resulting from payment of the instrument, the
    person bearing the loss may recover from the person failing to exercise ordinary
    care to the extent the failure to exercise ordinary care contributed to the loss.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.44
- number: '1303.45'
  heading: Drawee not liable on unaccepted draft - UCC 3-408
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: A check or other draft does not of itself operate as an assignment of any
    funds in the hands of the drawee available for its payment, and the drawee is
    not liable on the instrument until he accepts it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.45
- number: '1303.46'
  heading: Acceptance of draft - certified check - UCC 3-409
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) "Acceptance" means the drawee''s signed agreement to pay the draft as
    presented. It must be written on the draft, and may consist of his signature alone.
    Acceptance may be made at any time and becomes effective when notification is
    given pursuant to instructions or the accepted draft is delivered for the purpose
    of giving rights on the acceptance to any person.

    (B) A draft may be accepted although it has not been signed by the drawer or is
    otherwise incomplete, is overdue, or has been dishonored.

    (C) If a draft is payable at a fixed period after sight and the acceptor fails
    to date his acceptance, the holder may complete the acceptance by supplying a
    date in good faith.

    (D) "Certified check" means a check accepted by the bank on which it is drawn.
    Acceptance may be made as described in division (A) of this section or by a writing
    on the check that indicates that the check is certified. The drawee of a check
    has no obligation to certify the check, and the drawee''s refusal to certify is
    not dishonor of the check.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.46
- number: '1303.47'
  heading: Employer's responsibility for fraudulent indorsement by employee - UCC
    3-405
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) As used in this section:

    (1) "Employee" includes an independent contractor and an employee of an independent
    contractor retained by the employer.

    (2) "Fraudulent indorsement" means either of the following:

    (a) In the case of an instrument payable to the employer, a forged indorsement
    purporting to be that of the employer;

    (b) In the case of an instrument with respect to which the employer is the issuer,
    a forged indorsement purporting to be that of the person identified as payee.

    (3) "Responsibility" with respect to instruments means authority to do any of
    the following:

    (a) To sign or indorse instruments on behalf of the employer;

    (b) To process instruments received by the employer for bookkeeping purposes,
    for deposit to an account, or for other disposition;

    (c) To prepare or process instruments for issue in the name of the employer;

    (d) To supply information determining the names or addresses of payees of instruments
    to be issued in the name of the employer;

    (e) To control the disposition of instruments to be issued in the name of the
    employer;

    (f) To act otherwise with respect to instruments in a responsible capacity.

    "Responsibility" with respect to instruments does not include authority that merely
    allows an employee to have access to instruments or blank or incomplete instrument
    forms that are being stored or transported or are part of incoming or outgoing
    mail, or similar access.

    (B) For the purpose of determining the rights and liabilities of a person who,
    in good faith, pays an instrument or takes it for value or for collection, if
    an employer entrusted an employee with responsibility with respect to the instrument
    and the employee or a person acting in concert with the employee makes a fraudulent
    indorsement of the instrument, the indorsement is effective as the indorsement
    of the person to whom the instrument is payable if it is made in the name of that
    person. If the person paying the instrument or taking it for value or for collection
    fails to exercise ordinary care in paying or taking the instrument and that failure
    substantially contributes to loss resulting from the fraud, the person bearing
    the loss may recover from the person failing to exercise ordinary care to the
    extent the failure to exercise ordinary care contributed to the loss.

    (C) Under division (B) of this section, an indorsement is made in the name of
    the person to whom an instrument is payable if it is made in a name substantially
    similar to the name of that person or if the instrument, whether or not indorsed,
    is deposited in a depositary bank to an account in a name substantially similar
    to the name of that person.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.47
- number: '1303.48'
  heading: Acceptance varying draft - UCC 3-410
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) If the terms of a drawee''s acceptance vary from the terms of the draft
    as presented, the holder may refuse the acceptance and treat the draft as dishonored
    in which case the drawee is entitled to cancel his acceptance.

    (B) The terms of the draft are not varied by an acceptance to pay at any particular
    bank or place in the United States, unless the acceptance states that the draft
    is to be paid only at such bank or place.

    (C) If the holder assents to an acceptance varying the terms of the draft, the
    obligation of each drawer and indorser that does not expressly assent to the acceptance
    is discharged.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.48
- number: '1303.49'
  heading: Negligence contributing to forged signature or alteration of instrument
    - UCC 3-406
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A person whose failure to exercise ordinary care substantially contributes
    to an alteration of an instrument or to the making of a forged signature on an
    instrument is precluded from asserting the alteration or the forgery against a
    person who, in good faith, pays the instrument or takes it for value or for collection.

    (B) Under division (A) of this section, if the person asserting the preclusion
    fails to exercise ordinary care in paying or taking the instrument and that failure
    substantially contributes to loss, the loss is allocated between the person precluded
    under division (A) of this section from asserting an alteration or forgery and
    the person asserting the preclusion according to the extent to which the failure
    of each to exercise ordinary care contributed to the loss.

    (C) Under division (A) of this section, the burden of proving that a failure to
    exercise ordinary care contributed to an alteration of an instrument or to the
    making of a forged signature on an instrument is on the person asserting the preclusion.
    Under division (B) of this section, the burden of proving that a failure to exercise
    ordinary care in paying or taking an instrument substantially contributed to loss
    is on the person precluded.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.49
- number: '1303.50'
  heading: Alteration - UCC 3-407
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) "Alteration" means either of the following:

    (1) An unauthorized change in an instrument that purports to modify in any respect
    the obligation of a party.

    (2) An unauthorized addition of words or numbers or other change to an incomplete
    instrument relating to the obligation of a party.

    (B) Except as provided in division (C) of this section, an alteration fraudulently
    made discharges a party whose obligation is affected by the alteration unless
    that party assents or is precluded from asserting the alteration. No other alteration
    discharges a party, and the instrument may be enforced according to its original
    terms.

    (C) A payor bank or drawee paying a fraudulently altered instrument or a person
    taking it for value, in good faith and without notice of the alteration, may enforce
    rights with respect to the instrument according to its original terms or, if the
    incomplete instrument was altered by unauthorized completion, according to its
    terms as completed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.50
- number: '1303.51'
  heading: Refusal to pay cashier's checks, teller's checks and certified checks -
    UCC 3-411
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) As used in this section, "obligated bank" means the acceptor of a certified
    check or the issuer of a cashier''s check or teller''s check bought from the issuer.

    (B) If the obligated bank wrongfully refuses to pay a cashier''s check or certified
    check, wrongfully stops payment of a teller''s check, or wrongfully refuses to
    pay a dishonored teller''s check, the person asserting the right to enforce the
    check is entitled to compensation for expenses and loss of interest resulting
    from the nonpayment and may recover consequential damages if the obligated bank
    refuses to pay after receiving notice of particular circumstances giving rise
    to the damages.

    (C) Expenses or consequential damages otherwise recoverable under division (B)
    of this section are not recoverable if the refusal of the obligated bank to pay
    occurs because of any of the following:

    (1) The bank suspends payments.

    (2) The obligated bank asserts a claim or defense of the bank that it has reasonable
    grounds to believe is available against the person entitled to enforce the instrument.

    (3) The obligated bank has a reasonable doubt whether the person demanding payment
    is the person entitled to enforce the instrument.

    (4) Payment is prohibited by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.51
- number: '1303.52'
  heading: Obligation of issuer of note or cashier's check - UCC 3-412
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: 'The issuer of a notice or cashier''s check or other draft drawn on the drawer
    is obliged to pay the instrument in accordance with either of the following:

    (A) According to its terms at the time it was issued or, if not issued, at the
    time it first came into possession of a holder;

    (B) If the issuer signed an incomplete instrument, according to its terms when
    completed in accordance with sections 1303.11 and 1303.50 of the Revised Code.
    The obligation is owed to a person entitled to enforce the instrument or to an
    indorser who paid the instrument under section 1303.55 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.52
- number: '1303.53'
  heading: Obligation of acceptor - UCC 3-413
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) The acceptor of a draft is obliged to pay the draft in accordance with
    one of the following:

    (1) According to its terms at the time it was accepted, even though the acceptance
    states that the draft is payable "as originally drawn" or equivalent terms;

    (2) If the acceptance varies the terms of the draft, according to the terms of
    the draft as varied;

    (3) If the acceptance is of a draft that is an incomplete instrument, according
    to its terms when completed, to the extent required by sections 1303.11 and 1303.50
    of the Revised Code. The obligation is owed to a person entitled to enforce the
    draft or to the drawer or an indorser who paid the draft pursuant to section 1303.54
    or 1303.55 of the Revised Code.

    (B) If the certification of a check or other acceptance of a draft states the
    amount certified or accepted, the obligation of the acceptor is that amount. The
    obligation of the acceptor is the amount of the instrument at the time it was
    taken by the holder in due course if all of the following apply:

    (1) The certification or acceptance does not state an amount.

    (2) The amount of the instrument is subsequently raised.

    (3) After the amount of the instrument is subsequently raised, the instrument
    is negotiated to a holder in due course.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.53
- number: '1303.54'
  heading: Obligation of drawer - UCC 3-414
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) This section does not apply to cashier''s checks or other drafts drawn
    on the drawer.

    (B) If an unaccepted draft is dishonored, the drawer is obliged to pay the draft
    in accordance with either of the following:

    (1) According to its terms at the time it was issued or, if not issued, at the
    time it first came into possession of a holder;

    (2) If the drawer signed an incomplete instrument, according to its terms when
    completed, to the extent required by sections 1303.11 and 1303.50 of the Revised
    Code.

    The obligation is owed to a person entitled to enforce the draft or to an indorser
    who paid the draft under section 1303.55 of the Revised Code.

    (C) If a draft is accepted by a bank, the drawer is discharged, regardless of
    when or by whom acceptance was obtained.

    (D) If a draft is accepted and the acceptor is not a bank, the obligation of the
    drawer to pay the draft if the draft is dishonored by the acceptor is the same
    as the obligation of an indorser under division (A) and (C) of section 1303.55
    of the Revised Code.

    (E) If a draft states that it is drawn "without recourse" or otherwise disclaims
    liability of the drawer to pay the draft and the draft is not a check, the drawer
    is not liable under division (B) of this section to pay the draft. A disclaimer
    of the liability stated in division (B) of this section is not effective if the
    draft is a check.

    (F) If a check is not presented for payment or given to a depositary bank for
    collection within thirty days after its date, the drawee suspends payments after
    expiration of the thirty-day period without paying the check, and, because of
    the suspension of payments, the drawer is deprived of funds maintained with the
    drawee to cover payment of the check, the drawer to the extent deprived of funds
    may discharge its obligation to pay the check by assigning to the person entitled
    to enforce the check the rights of the drawer against the drawee with respect
    to the funds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.54
- number: '1303.55'
  heading: Obligation of indorser - UCC 3-415
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) Subject to divisions (B), (C), (D), and (E) of this section and to division
    (D) of section 1303.59 of the Revised Code, if an instrument is dishonored, an
    indorser is obliged to pay the amount due on the instrument according to the terms
    of the instrument at the time it was indorsed, or, if the indorser indorsed an
    incomplete instrument, according to its terms when completed, to the extent required
    by sections 1303.11 and 1303.50 of the Revised Code. The obligation of the indorser
    is owed to a person entitled to enforce the instrument or to a subsequent indorser
    who paid the instrument under this section.

    (B) If an indorsement states that it is made "without recourse" or otherwise disclaims
    liability of the indorser, the indorser is not liable under division (A) of this
    section to pay the instrument.

    (C) If notice of dishonor of an instrument is required by section 1303.63 of the
    Revised Code and notice of dishonor complying with that section is not given to
    an indorser, the liability of the indorser under division (A) of this section
    is discharged.

    (D) If a draft is accepted by a bank after an indorsement is made, the liability
    of the indorser under division (A) of this section is discharged.

    (E) If an indorser of a check is liable under division (A) of this section and
    the check is not presented for payment, or given to a depositary bank for collection,
    within thirty days after the day the indorsement was made, the liability of the
    indorser under division (A) of this section is discharged.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1303.55
- number: '1303.56'
  heading: Transfer warranties - UCC 3-416
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1303'
    name: Commercial Paper
  text: '(A) A person who transfers an instrument for consideration warrants all of
    the following to the transferee and, if the transfer is by indorsement, to any
    subsequent transferee:

    (1) The warrantor is a person entitled to enforce the instrument.

    (2) All signatures on the instrument are authentic and authorized.

    (3) The instrument has not been altered.

    (4) The instrument is not subject to a defense or claim in recoupment of any party
    which can be asserted against the warrantor.

    (5) The warrantor has no knowledge of any insolvency proceeding commenced with
    respect to the maker or acceptor or, in the case of an unaccepted draft, the drawer.

    (6) With respect to a remotely created consumer item, the person on whose account
    the item is drawn authorized the issuance of the item in the amount for which
    the item is drawn.

    (B) A person to whom the warranties set forth in division (A) of this section
    are made and who took the instrument in good faith may recover from the warrantor
    as damages for breach of warranty an amount equal to the loss suffered as a result
    of the breach, but not more than the amount of the instrument plus expenses and
    loss of interest incurred as a result of the breach.

    (C) The warranties set forth in division (A) of this section cannot be disclaimed
    with respect to checks. Unless notice of a claim for breach of warranty is given
    to the warrantor within thirty days after the claimant has reason to know of the
    breach and the identity of the warrantor, the liability of the warrantor under
    division (B) of this section is discharged to the extent of any loss caused by
    the delay in giving notice of the claim.

    (D) A cause of action for breach of warranty under this section accrues when the
    claimant has reason to know of the breach.'
  history: null
