- number: '1329.56'
  heading: Application for registration
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: '(A) Subject to the limitations set forth in sections 1329.54 to 1329.67 of
    the Revised Code, any person who adopts and uses a trademark or service mark in
    this state may file in the office of the secretary of state, on a form to be prescribed
    by the secretary of state, an application for registration of that trademark or
    service mark that sets forth, but is not limited to, the following information:

    (1) The name and business address of the person applying for the registration;
    if the person is a corporation, the state of its incorporation; if the person
    is a partnership or limited liability partnership, the state in which the partnership
    is organized and the names of the general partners; and, if the person is a limited
    liability company, the state of its organization;

    (2) The goods or services on or in connection with which the mark is used, the
    mode or manner in which the mark is used on or in connection with the goods or
    services, and the class in which the goods or services fall;

    (3) The date when the mark was first used anywhere and the date when it was first
    used in this state by the applicant or the applicant''s predecessor in interest;

    (4) A statement that the applicant is the owner of the mark, that the mark is
    in use, and that, to the knowledge of the person verifying the application, no
    other person has the right to use the mark in the state either in the identical
    form of the mark, or in near resemblance to the mark, as to be likely, when used
    on or in connection with the goods or services of another person, to cause confusion
    or mistake or to deceive;

    (5) A statement that, to the knowledge of the person verifying the application,
    no other person has a registration or a pending intent to use application of the
    same or a confusingly similar mark in the United States patent and trademark office
    for the same or similar goods or services or a statement that the applicant is
    the owner of a concurrent registration in the United States patent and trademark
    office of the applicant''s mark covering an area including this state.

    (B) The application shall be signed and verified by the applicant, by an authorized
    representative, or by an officer of the firm, limited liability company, limited
    liability partnership, general partnership, or limited partnership, corporation,
    union, association, or other organization that is the applicant.

    (C) The application shall be accompanied by a specimen of the mark as actually
    used and shall contain a brief description of the mark as it appears on the specimen.

    (D) The application shall be accompanied by the filing fee specified in division
    (U)(1) of section 111.16 of the Revised Code, payable to the secretary of state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.56
- number: '1329.57'
  heading: Certificate of registration
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'Upon compliance by the applicant with the requirements of sections 1329.54
    to 1329.67 of the Revised Code, the secretary of state shall cause a certificate
    of registration to be issued and delivered to the applicant. The certificate of
    registration shall be issued under the signature and seal of the secretary of
    state, and it shall show the name and business address and, if a corporation,
    the state of incorporation, or, if a partnership or limited liability partnership,
    the state in which the partnership is organized and the names of the general partners,
    or, if a limited liability company, the state of organization, of the person claiming
    ownership of the trademark or service mark, the date claimed for the first use
    of the trademark or service mark anywhere, the date claimed for the first use
    of the trademark or service mark in this state, the class of goods or services
    and the description of the goods or services on or in connection with which the
    trademark or service mark is used, the registration date, and the term of the
    registration. One specimen or facsimile of the trademark or service mark supplied
    under section 1329.56 of the Revised Code shall be attached to and made a part
    of the certificate of registration.

    Any certificate of registration issued by the secretary of state or a copy of
    the certificate duly certified by the secretary of state shall be admissible in
    evidence in any action or proceeding in any court of record in this state as competent
    and sufficient proof of the registration of the trademark or service mark.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.57
- number: '1329.58'
  heading: Term registration effective - renewal application
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: Registration of a trademark or service mark under sections 1329.54 to 1329.67
    of the Revised Code shall be effective for a term of ten years from the date of
    registration. Upon the filing of an application within six months prior to the
    expiration of that term on a form furnished by the secretary of state, the registrant
    may renew the registration at the end of each ten-year period for a similar term.
    The renewal fee specified in division (U)(2) of section 111.16 of the Revised
    Code, payable to the secretary of state, shall accompany the renewal application.
    The renewal application shall require the applicant to state that the mark still
    is in use in this state. The renewal application shall be accompanied by a specimen
    of the mark as actually used and shall contain a brief description of the mark
    as it appears on the specimen.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.58
- number: '1329.60'
  heading: Assignment of trademark or service mark and registration
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: Any trademark or service mark and its registration shall be assignable with
    the good will of the business in which the trademark or service mark is used,
    or with that part of the good will of the business connected with the use of and
    symbolized by the trademark or service mark. Assignment shall be by instruments
    in writing duly executed and may be recorded with the secretary of state upon
    the payment of the fee specified in division (U)(2) of section 111.16 of the Revised
    Code, payable to the secretary of state, who, after recording the assignment,
    shall issue in the name of the assignee a new certificate for the remainder of
    the term of the registration or of the last renewal thereof. The instrument shall
    be on a form prescribed by the secretary of state. An assignment of any registration
    shall be void as against any subsequent purchaser for valuable consideration without
    notice unless it is recorded with the secretary of state within three months after
    the date thereof or prior to such subsequent purchase.
