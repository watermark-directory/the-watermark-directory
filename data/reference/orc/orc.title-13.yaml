- number: '1319.16'
  heading: Check collection charges
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1319'
    name: Miscellaneous Credit Transactions
  text: '(A) If a collection agency has been designated to collect on a check, negotiable
    order of withdrawal, share draft, or other negotiable instrument that has been
    returned or dishonored for any reason, the collection agency may charge and receive
    check collection charges of not more than thirty dollars or ten per cent of the
    face amount of the instrument, whichever is greater, and may charge and receive
    any charge imposed by a financial institution upon the holder of the check, negotiable
    order of withdrawal, share draft, or other negotiable instrument that has been
    returned or dishonored for any reason.

    (B) A collection agency that imposes a check collection charge pursuant to division
    (A) of this section shall send written notice by regular mail to the debtor at
    the debtor''s last known address or at the address shown on the check or other
    instrument. The notice shall provide the amount of the check collection charge
    that has been imposed, and shall state that the debtor is responsible for paying
    the check collection charge as well as the value of the check or other instrument.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1319.16
- number: '1319.17'
  heading: Commercial credit reports
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1319'
    name: Miscellaneous Credit Transactions
  text: '(A) As used in this section:

    (1) "Business" means a sole proprietorship, partnership, corporation, limited
    liability company, or other commercial entity, whether for profit or not for profit.

    (2) "Commercial credit report" means any report provided to a business for a legitimate
    business purpose, relating to the financial status or payment habits of a business
    that is the subject of the report. "Commercial credit report" does not include
    any of the following:

    (a) A report prepared for commercial insurance underwriting, claims, or auditing
    purposes;

    (b) A report containing information related to transactions or experiences between
    the subject and the person making the report;

    (c) An authorization or approval of a specific extension of credit directly or
    indirectly by the issuer of a credit card or similar device;

    (d) Any report in which a person that has been requested by a third party to make
    a specific extension of credit directly or indirectly to the subject conveys its
    decision with respect to that request.

    (3) "Commercial credit reporting agency" means any person or entity that regularly
    engages in the practice of compiling and maintaining commercial credit reports
    on a business operating in this state for the purpose of providing commercial
    credit reports and, for monetary fees, dues, or on a cooperative nonprofit basis,
    provides such commercial credit reports on a business operating in this state
    to third parties.

    "Commercial credit reporting agency" does not include a person or entity that
    does not maintain a database of commercial credit reports from which new commercial
    credit reports are produced.

    (4) "Subject" means the business operating in this state about which a commercial
    credit report has been compiled.

    (B) Upon the request of a representative of the subject of a commercial credit
    report, a commercial credit reporting agency shall provide the subject''s commercial
    credit report. The report shall be provided to the subject at a cost not greater
    than what is charged to third parties and may be printed or in electronic form.
    The report shall be in a format routinely made available to third parties. A commercial
    credit reporting agency may protect the identity of sources of information to
    be used in commercial credit reports.

    (C) Within thirty days after receipt of a commercial credit report, a representative
    of the subject of the report may file with the commercial credit reporting agency
    a written summary statement identifying each particular statement in the report
    that the subject of the report believes contains an inaccurate statement of fact
    and indicating the nature of the disagreement with the statement. Within thirty
    days after receipt of a subject''s summary statement of disagreement, the commercial
    credit reporting agency at no cost to the subject shall do either of the following:

    (1) Delete the disputed statement of fact from the report and, thereafter, block
    any repeat reporting of that disputed statement unless its accuracy has been verified;

    (2) Include in the report a notice of the subject''s assertion that the statement
    of fact is inaccurate.

    (D) Nothing in this section shall be construed to provide a private right of action,
    including a class action, with respect to any act or practice regulated under
    this section.'
