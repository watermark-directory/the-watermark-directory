  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.65
- number: '1345.66'
  heading: Remedies
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Any customer who is injured by a violation of sections 1345.61 to 1345.67
    of the Revised Code has an action at law as provided by this section.

    (B) A customer has a cause of action pursuant to this division to remedy any injury
    caused by the invention developer arising from:

    (1) A violation of sections 1345.61 to 1345.67 of the Revised Code, or

    (2) The customer''s acceptance of the invention development services contract
    in reliance upon any fraudulent misrepresentation or omission of material fact.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.66
- number: '1345.67'
  heading: Maintaining bond
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Every invention developer rendering or offering to render invention development
    services in this state shall maintain a bond in the amount of ten thousand dollars
    issued by a surety company that is authorized to do business in this state. The
    invention developer shall file a copy of the bond with the secretary of state
    prior to the time the invention developer first commences business in this state.

    (B) The bond required by division (A) of this section shall be payable in favor
    of the state for the benefit of any person who, after entering into a contract
    for invention development services with an invention developer, is damaged by
    fraud, dishonesty, or the failure of the invention developer to provide the invention
    development services required in performance of the contract. Any person claiming
    against the bond may maintain an action against the invention developer and the
    surety. The aggregate liability of the surety to all persons for all breaches
    of conditions of the bond provided in this section shall not exceed the amount
    of the bond.

    (C) In lieu of furnishing the bond as required by this section, the invention
    developer may deposit with the secretary of state a deposit in an amount equal
    to the required amount of the bond. The deposit may be satisfied by any of the
    following:

    (1) Certificates of deposit payable to the secretary of state issued by banks
    doing business in this state and insured by the federal deposit insurance corporation;

    (2) Investment certificates of share accounts assigned to the secretary of state
    and issued by a savings and loan association doing business in this state and
    insured by the federal savings and loan insurance corporation;

    (3) Cash.

    (D) The bond or deposit required by this section shall be canceled or returned
    to the invention developer two years after he ceases doing business in this state
    so long as no lawsuits by Ohio customers are pending against it at the time. The
    secretary of state shall cancel or return the bond or deposit as required by this
    section no later than sixty days after the invention developer gives notice of
    his eligibility for the cancellation and return of the bond or deposit.'
