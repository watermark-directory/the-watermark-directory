  url: https://codes.ohio.gov/ohio-revised-code/section-1345.20
- number: '1345.21'
  heading: Home solicitation sale definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: 'As used in sections 1345.21 to 1345.28 of the Revised Code:

    (A) "Home solicitation sale" means a sale of consumer goods or services in which
    the seller or a person acting for the seller engages in a personal solicitation
    of the sale at a residence of the buyer, including solicitations in response to
    or following an invitation by the buyer, and the buyer''s agreement or offer to
    purchase is there given to the seller or a person acting for the seller, or in
    which the buyer''s agreement or offer to purchase is made at a place other than
    the seller''s place of business. It does not include a transaction or transactions
    in which:

    (1) The total purchase price to be paid by the buyer, whether under single or
    multiple contracts, is less than twenty-five dollars;

    (2) The transaction was conducted and consummated entirely by mail or by telephone
    if initiated by the buyer, and without any other contact between the seller or
    the seller''s representative prior to the delivery of goods or performance of
    the service;

    (3) The final agreement is made pursuant to prior negotiations in the course of
    a visit by the buyer to a retail business establishment having a fixed permanent
    location where the goods are exhibited or the services are offered for sale on
    a continuing basis;

    (4) The buyer initiates the contact between the parties for the purpose of negotiating
    a purchase and the seller has a business establishment at a fixed location in
    this state where the goods or services involved in the transaction are regularly
    offered or exhibited for sale.

    Advertisements by such a seller in newspapers, magazines, catalogues, radio, or
    television do not constitute the seller initiation of the contact.

    (5) The buyer initiates the contact between the parties, the goods or services
    are needed to meet a bona fide immediate personal emergency of the buyer which
    will jeopardize the welfare, health, or safety of natural persons, or endanger
    property which the buyer owns or for which the buyer is responsible, and the buyer
    furnishes the seller with a separate, dated, and signed statement in the buyer''s
    handwriting describing the situation requiring immediate remedy and expressly
    acknowledging and waiving the right to cancel the sale within three business days;

    (6) The buyer has initiated the contact between the parties and specifically requested
    the seller to visit the buyer''s home for the purpose of repairing or performing
    maintenance upon the buyer''s personal property. If, in the course of such a visit,
    the seller sells the buyer additional services or goods other than replacement
    parts necessarily used in performing the maintenance or in making the repairs,
    the sale of those additional goods or services does not fall within this exclusion.

    (7) The buyer is accorded the right of rescission by the "Consumer Credit Protection
    Act," (1968) 82 Stat. 152, 15 U.S.C. 1635, or regulations adopted pursuant to
    it.

    (B) "Sale" includes a lease or rental.

    (C) "Seller" includes a lessor or anyone offering goods for rent.

    (D) "Buyer" includes a lessee or anyone who gives a consideration for the privilege
    of using goods.

    (E) "Consumer goods or services" means goods or services purchased, leased, or
    rented primarily for personal, family, or household purposes, including courses
    or instruction or training regardless of the purpose for which they are taken.

    (F) "Consumer goods or services" does not include goods or services pertaining
    to any of the following:

    (1) Sales or rentals of real property by a real estate broker or salesperson,
    or by a foreign real estate dealer or salesperson, who is licensed by the Ohio
    real estate commission under Chapter 4735. of the Revised Code;

    (2) The sale of securities or commodities by a broker-dealer registered with the
    securities and exchange commission;

    (3) The sale of securities or commodities by a securities dealer or salesperson
    licensed by the division of securities under Chapter 1707. of the Revised Code;

    (4) The sale of insurance by a person licensed by the superintendent of insurance;

    (5) Goods sold or services provided by automobile dealers and salespersons licensed
    by the registrar of motor vehicles under Chapter 4517. of the Revised Code;

    (6) The sale of property at an auction by an auctioneer licensed by the department
    of agriculture under Chapter 4707. of the Revised Code.

    (G) "Purchase price" means the total cumulative price of the consumer goods or
    services, including all interest and service charges.

    (H) "Place of business" means the main office, or a permanent branch office or
    permanent local address of a seller.

    (I) "Business day" means any calendar day except Sunday, or the following business
    holidays: New Year''s day, Martin Luther King day, Presidents'' day, Memorial
    day, Juneteenth day, Independence day, Labor day, Columbus day, Veterans day,
    Thanksgiving day, and Christmas day.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.21
- number: '1345.22'
  heading: Right of buyer to cancel
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) In addition to any right otherwise to revoke an offer, the buyer has
    the right to cancel a home solicitation sale until midnight of the third business
    day after the day on which the buyer signs an agreement or offer to purchase.
    Cancellation is evidenced by the buyer giving written notice of cancellation to
    the seller at the seller''s address, electronic mail address, or facsimile number
    stated in the agreement or offer to purchase. The buyer shall deliver the notice
    by certified mail delivery, return receipt requested, manual delivery, personal
    delivery, facsimile transmission, or electronic mail. Notice of cancellation by
    certified mail shall be effective upon the date of post marking. Manual delivery
    or other personal delivery is effective when delivered to the seller or to the
    seller''s address, whichever comes first. Facsimile delivery is effective when
    the facsimile transmission has been transmitted to the seller''s facsimile number
    and the consumer has received confirmation of the facsimile transmission. Electronic
    mail delivery is effective when the electronic mail has been sent to the seller''s
    electronic mail address. Notice of cancellation need not take a particular form
    and is sufficient if it indicates, by any form of written expression, the intention
    of the buyer not to be bound by the home solicitation sale. Notice of buyer''s
    right to cancel must appear on all notes or other evidence of indebtedness given
    pursuant to any home solicitation sale.

    (B) Except as provided in division (C) of this section, where a home solicitation
    sale requires a seller to provide services, the seller shall not commence performance
    of such services during the time in which the buyer may cancel.

    (C)(1) Where a home solicitation sale involving the sale and installation of home
    security and automation systems and related security and monitoring services requires
    the seller to provide services, the seller shall not commence performance of such
    services during the time in which the buyer may cancel the sale unless the seller
    does all of the following:

    (a) In addition to the notices required by section 1345.23 of the Revised Code,
    the seller informs the buyer in writing that the buyer''s right to cancel under
    this section is not affected by commencing services and the buyer acknowledges
    in writing the buyer''s understanding of this right.

    (b) The seller does not make a substantial change in the condition of the property
    in question.

    (c) The seller does not receive any compensation for the services performed if
    the buyer timely cancels the agreement or offer under this section.

    (2) With respect to a home solicitation sale involving the sale and installation
    of home security and automation systems and related security and monitoring services,
    if the seller commences services during the time in which the buyer may cancel,
    in accordance with division (C)(1) of this section, and those services result
    in the alteration of the buyer''s property, and the buyer exercises the buyer''s
    right to cancel, the seller shall restore the property within fourteen calendar
    days from cancellation to substantially the same condition as it was at the time
    the services were rendered.

    (D) As used in this section, "substantial change" means any change that requires
    repair of a significant nature, necessitating significant expense, time, or inconvenience
    to repair for the buyer. Substantial change also includes a change that is incapable
    of being returned to its original condition.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.22
- number: '1345.23'
  heading: Written agreement or offer to purchase
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Every home solicitation sale shall be evidenced by a written agreement
    or offer to purchase in the same language as that principally used in the oral
    sales presentation and shall contain the name and address of the seller. The seller
    shall present the writing to the buyer and obtain the buyer''s signature to it.
    The writing shall state the date on which the buyer actually signs. The seller
    shall leave with the buyer a copy of the writing which has been signed by the
    seller and complies with division (B) of this section.

    (B) In connection with every home solicitation sale:

    (1) The following statement shall appear clearly and conspicuously on the copy
    of the contract left with the buyer in bold-face type of the minimum size of ten
    points, in substantially the following form and in immediate proximity to the
    space reserved in the contract for the signature of the buyer: "You, the buyer,
    may cancel this transaction at any time prior to midnight of the third business
    day after the date of this transaction. See the attached notice of cancellation
    for an explanation of this right."

    (2) A completed form, in duplicate, captioned "notice of cancellation", shall
    be attached to the contract signed by the buyer and be easily detachable, and
    shall contain in ten-point, bold-face type, the following information and statements
    in the same language as that used in the contract:

    NOTICE OF CANCELLATION

    (enter date of transaction)

    ___________________________

    (Date)

    You may cancel this transaction, without any penalty or obligation, within three
    business days from the above date.

    If you cancel, any property traded in, any payments made by you under the contract
    or sale, and any negotiable instrument executed by you will be returned within
    ten business days following receipt by the seller of your cancellation notice,
    and any security interest arising out of the transaction will be cancelled.

    If you cancel, you must make available to the seller at your residence, in substantially
    as good condition as when received, any goods delivered to you under this contract
    or sale; or you may if you wish, comply with the instructions of the seller regarding
    the return shipment of the goods at the seller''s expense and risk.

    If you do make the goods available to the seller and the seller does not pick
    them up within twenty days of the date of your notice of cancellation, you may
    retain or dispose of the goods without any further obligation. If you fail to
    make the goods available to the seller, or if you agree to return the goods to
    the seller and fail to do so, then you remain liable for performance of all obligations
    under the contract.

    To cancel this transaction, mail, with return receipt requested, or deliver, in
    person or manually, a signed and dated copy of this cancellation notice or any
    other written notice of cancellation, or send notice by facsimile transmission
    or electronic mail, to _______________ (Name of seller), at _______________ (address,
    electronic mail address, or facsimile number of seller''s place of business) not
    later than midnight of ________ (Date)

    I hereby cancel this transaction.

    _______________

    Date

    (Buyer''s signature)

    ______________________________

    (3) Before furnishing copies of the notice of cancellation to the buyer, the seller
    shall complete both copies by entering the name of the seller, the address, electronic
    mail address, or facsimile number of the seller''s place of business, the date
    of the transaction which is the date the buyer signed the contract and the date,
    not earlier than the third business day following the date of the transaction,
    by which the buyer may give notice of cancellation.

    (4) A home solicitation sales contract which contains the notice of buyer''s right
    to cancel and notice of cancellation in the form and language provided in the
    federal trade commission''s trade regulation rule providing a cooling-off period
    for door-to-door sales shall be deemed to comply with the requirements of divisions
    (B)(1), (2), and (3) of this section with respect to the form and language of
    such notices so long as the federal trade commission language provides at least
    equal information to the consumer concerning the consumer''s right to cancel as
    is required by divisions (B)(1), (2), and (3) of this section.

    (C) Until the seller has complied with divisions (A) and (B) of this section the
    buyer may cancel the home solicitation sale by delivering to the seller by certified
    mail, return receipt requested, personal or manual delivery, facsimile transmission,
    or electronic mail, written notice to the seller of the buyer''s intention to
    cancel. The three-day period prescribed by section 1345.22 of the Revised Code
    begins to run from the time the seller complies with divisions (A) and (B) of
    this section.

    (D) In connection with any home solicitation sale, no seller shall:

    (1) Include in any home solicitation sales contract, any confession of judgment
    or any waiver of any rights to which the buyer is entitled under this section,
    including specifically the buyer''s right to cancel the sale in accordance with
    this section.

    (2) Fail to inform each buyer orally, at the time of signing the contract for
    the goods or services, of the buyer''s right to cancel.

    (3) Misrepresent in any manner the buyer''s right to cancel.

    (4) Fail or refuse to honor any valid notice of cancellation by a buyer and within
    ten business days after receipt of such notice to:

    (a) Refund all payments made under the contract or sale;

    (b) Return any goods or property traded in, in substantially as good condition
    as when received by the seller;

    (c) Cancel and return any note, negotiable instrument, or other evidence of indebtedness
    executed by the buyer in connection with the contract or sale and take any action
    necessary or appropriate to reflect the termination of any security interest or
    lien created under the sale or offer to purchase.

    (5) Negotiate, transfer, sell, or assign any note or other evidence of indebtedness
    to a finance company or other third party prior to midnight of the fifth business
    day following the day the contract for the goods or services was signed.

    (6) Fail to notify the buyer, within ten business days of receipt of the buyer''s
    notice of cancellation, whether the seller intends to repossess or abandon any
    shipped or delivered goods.'
