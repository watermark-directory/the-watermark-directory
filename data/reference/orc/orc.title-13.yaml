- number: '1310.02'
  heading: Provisions apply to all transactions creating lease - application of other
    laws - UCC 2A-104
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Sections 1310.01 to 1310.78 of the Revised Code apply to any transaction,
    regardless of form, that creates a lease.

    (B)(1) A lease, although subject to sections 1310.01 to 1310.78 of the Revised
    Code, is also subject to Chapter 1548., 4505., or 4585. of the Revised Code, any
    applicable certificate of title statute of another jurisdiction as provided in
    section 1310.03 of the Revised Code, and Chapter 1345., 1349., or 1351. of the
    Revised Code.

    (2) If there is a conflict between the provisions of sections 1310.01 to 1310.78
    of the Revised Code, other than section 1310.03, division (C) of section 1310.32,
    and division (C) of section 1310.33 of the Revised Code, and any statute referred
    to in division (B)(1) of this section, the provisions of that statute control.

    (3) A failure to comply with any applicable statute has only the effect specified
    in that statute.'
