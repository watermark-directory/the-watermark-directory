- number: '1321.42'
  heading: Enforcement actions relating to short-term loan license
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) The superintendent of financial institutions shall, in accordance with
    Chapter 119. of the Revised Code, suspend or revoke a license issued pursuant
    to sections 1321.35 to 1321.48 of the Revised Code, if the superintendent determines
    that either of the following applies:

    (1) The licensee has failed to comply with any order issued by the superintendent
    pursuant to section 1321.43 of the Revised Code.

    (2) Any fact or condition exists that if it had existed or had been known to exist
    at the time of original or renewal licensure pursuant to sections 1321.35 to 1321.48
    of the Revised Code, the fact or condition clearly would have warranted the superintendent
    to refuse to issue a license pursuant to those sections.

    (B) The superintendent may make any investigation and conduct any hearing the
    superintendent considers necessary to determine whether any person has violated
    sections 1321.35 to 1321.48 of the Revised Code, or any rule or order adopted
    or issued under section 1321.43 of the Revised Code, or has otherwise engaged
    in conduct that would justify the suspension, revocation, or refusal of an original
    or renewal license or the imposition of a fine.

    The superintendent may impose a monetary fine of not more than one thousand dollars
    for each such violation.

    (C) In making any investigation or conducting any hearing pursuant to this section,
    the superintendent, or any person designated by the superintendent, at any time
    may compel by subpoena witnesses, may take depositions of witnesses residing without
    the state in the manner provided for in civil actions, pay any witnesses the fees
    and mileage for their attendance provided under section 119.094 of the Revised
    Code, and administer oaths. The superintendent also may compel by order or subpoena
    duces tecum the production of, and examine, all relevant books, records, accounts,
    and other documents. If a person does not comply with a subpoena or subpoena duces
    tecum, the superintendent may apply to the court of common pleas of Franklin county
    for an order compelling the person to comply with the subpoena or subpoena duces
    tecum or, for failure to do so, an order to be held in contempt of court.

    (D) In connection with any investigation under this section, the superintendent
    may file an action in the court of common pleas of Franklin county or the court
    of common pleas of the county in which the person who is the subject of the investigation
    resides, or is engaging in or proposing to engage in actions in violation of sections
    1321.35 to 1321.48 of the Revised Code, to obtain an injunction, temporary restraining
    order, or other appropriate relief.'
