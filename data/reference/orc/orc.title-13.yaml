- number: '1315.28'
  heading: Prohibited acts - damages for violation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) No check-cashing business shall knowingly make any incorrect statement
    of a material fact or omit to state a material fact in any application made, investigation
    conducted, or hearing held pursuant to sections 1315.22 to 1315.24 of the Revised
    Code.

    (B) No person shall:

    (1) Obstruct or refuse to permit any lawful investigation by the superintendent
    of financial institutions, a person acting on behalf of an agency of the state
    or a political subdivision, or a law enforcement officer;

    (2) Fail to comply with division (A) of section 1315.22 of the Revised Code;

    (3) Violate or participate in the violation of sections 1315.21 to 1315.28 of
    the Revised Code or the rules adopted thereunder.

    (C) Any person that knowingly violates any provision of sections 1315.21 to 1315.28
    of the Revised Code shall forfeit to the injured party an amount equal to twice
    the actual damages suffered by the injured party by reason of the violation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.28
- number: '1315.30'
  heading: State to solely regulate check-cashing business
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: 'The state, through the superintendent of financial institutions and in accordance
    with sections 1315.21 to 1315.30 of the Revised Code, shall solely regulate persons
    engaged in the check-cashing business and the manner in which any such business
    is conducted.

    By the enactment of sections 1315.21 to 1315.30 of the Revised Code, it is the
    intent of the general assembly to preempt municipal corporations and other political
    subdivisions from the regulation and licensing of check-cashing businesses.'
