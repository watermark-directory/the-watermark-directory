- number: '1309.401'
  heading: Alienability of debtor's rights - UCC 9-401
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as provided in division (B) of this section and sections 1309.406,
    1309.407, 1309.408, and 1309.409 of the Revised Code, whether a debtor''s rights
    in collateral may be voluntarily or involuntarily transferred is governed by law
    other than this chapter.

    (B) An agreement between the debtor and secured party that prohibits a transfer
    of the debtor''s rights in collateral or makes the transfer a default does not
    prevent the transfer from taking effect.'
