  heading: Prohibited acts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: No person dealing in goods, wares, and merchandise made by prisoners in a
    correctional institution shall knowingly have them in possession for the purpose
    of sale or offer them for sale without the brand, label, or mark required by section
    1329.31 of the Revised Code or remove, conceal, or deface the brand, mark, or
    label.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.33
- number: '1329.41'
  heading: Filing trade names, marks and devices definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'As used in sections 1329.41 to 1329.53, inclusive, of the Revised Code:

    (A) "Name, mark, or device" means any word, name, symbol, picture, design or device,
    or any combination thereof, produced upon, and used by a person to indicate ownership
    of articles and supplies referred to herein.

    (B) "Person" means any individual, firm, partnership, corporation, association
    or union of workingmen or other organization.

    (C) "Produced upon" means branded, stamped, stenciled, engraved, etched, blown,
    embossed, impressed, embroidered, sewn or otherwise permanently placed upon any
    articles or supplies referred to herein.

    (D) "Articles or supplies" means any item which is designed and intended for re-use
    in the normal course of trade by the person filing hereunder and includes towels,
    coats, aprons, toilet devices and accessories therefor supplied for hire or compensation,
    and vessels, receptacles and utensils used as packages or containers in the sale
    and distribution of any natural or processed product, compound, mixture, or substance,
    or any combination thereof, and parts and accessories for such vessels, receptacles
    and utensils.

    (E) For purposes of sections 1329.41 to 1329.53, inclusive, of the Revised Code,
    a name, mark or device is "used in this state" when it is produced upon the articles
    or supplies and they are placed in the channels of trade.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.41
- number: '1329.42'
  heading: Verified statement may be filed in office of secretary of state - expiration,
    renewal of registration
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'A person who uses in this state a name, mark, or device to indicate ownership
    of articles or supplies may file in the office of the secretary of state, on a
    form to be prescribed by the secretary of state, a verified statement setting
    forth, but not limited to, the following information:

    (A) The name and business address of the person filing the statement; and, if
    a corporation, the state of incorporation;

    (B) The nature of the business of the applicant;

    (C) The type of articles or supplies in connection with which the name, mark,
    or device is used.

    The statement shall include or be accompanied by a specimen evidencing actual
    use of the name, mark, or device, together with the filing fee specified in division
    (U)(1) of section 111.16 of the Revised Code. The registration of a name, mark,
    or device pursuant to this section is effective for a ten-year period beginning
    on the date of registration. If an application for renewal is filed within six
    months prior to the expiration of the ten-year period on a form prescribed by
    the secretary of state, the registration may be renewed at the end of each ten-year
    period for an additional ten-year period. The renewal fee specified in division
    (U)(2) of section 111.16 of the Revised Code shall accompany the application for
    renewal. The secretary of state shall notify a registrant within the six months
    next preceding the expiration of ten years from the date of registration of the
    necessity of renewal by ordinary or electronic mail to the last known physical
    or electronic mail address of the registrant.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.42
