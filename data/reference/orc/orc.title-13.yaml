- number: '1309.601'
  heading: Rights after default - judicial enforcement - consignor or buyer of accounts,
    chattel paper, payment intangibles, or promissory notes - UCC 9-601
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) After default, a secured party has the rights provided in sections 1309.601
    to 1309.628 of the Revised Code and, except as otherwise provided in section 1309.602
    of the Revised Code, those provided by agreement of the parties. A secured party:

    (1) May reduce a claim to judgment, foreclose, or otherwise enforce the claim,
    security interest, or agricultural lien by any available judicial procedure; and

    (2) If the collateral is documents, proceed either as to the documents or as to
    the goods they cover.

    (B) A secured party in possession of collateral or control of collateral under
    section 1307.106, 1309.104, 1309.105, 1309.106, or 1309.107 of the Revised Code
    has the rights and duties provided in section 1309.207 of the Revised Code.

    (C) The rights under divisions (A) and (B) of this section are cumulative and
    may be exercised simultaneously.

    (D) Except as otherwise provided in division (G) of this section and section 1309.605
    of the Revised Code, after default, a debtor and an obligor have the rights provided
    in sections 1309.601 to 1309.628 of the Revised Code and by agreement of the parties.

    (E) If a secured party has reduced its claim to judgment, the lien of any levy
    that may be made upon the collateral by virtue of an execution based upon the
    judgment relates back to the earliest of:

    (1) The date of perfection of the security interest or agricultural lien in the
    collateral;

    (2) The date of filing a financing statement covering the collateral; or

    (3) Any date specified in a statute under which the agricultural lien was created.

    (F) A sale pursuant to an execution is a foreclosure of the security interest
    or agricultural lien by judicial procedure within the meaning of this section.
    A secured party may purchase at the sale and after the sale may hold the collateral
    free of any other requirements of this chapter.

    (G) Except as provided in division (C) of section 1309.607 of the Revised Code,
    sections 1309.601 to 1309.628 of the Revised Code do not impose any duties upon
    a secured party who is a consignor or a buyer of accounts, chattel paper, payment
    intangibles, or promissory notes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.601
- number: '1309.602'
  heading: Waiver and variance of rights and duties - UCC 9-602
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'Except as otherwise provided in section 1309.624 of the Revised Code, to
    the extent that they give rights to a debtor or obligor and impose duties on a
    secured party, the debtor or obligor may not waive or vary the following provisions
    of the Revised Code;

    (A) Division (B)(4)(c) of section 1309.207 of the Revised Code, which relates
    to the use and operation of the collateral by the secured party;

    (B) Section 1309.210 of the Revised Code, which relates to requests for an accounting
    and requests concerning a list of collateral and statement of account;

    (C) Division (C) of section 1309.607 of the Revised Code, which relates to the
    collection and enforcement of collateral;

    (D) Division (A) of section 1309.608 and division (C) of section 1309.615 of the
    Revised Code to the extent that they relate to the application or payment of noncash
    proceeds of collection, enforcement, or disposition;

    (E) Division (A) of section 1309.608 and division (D) of section 1309.615 of the
    Revised Code to the extent that they require accounting for or payment of surplus
    proceeds of collateral;

    (F) Section 1309.609 of the Revised Code to the extent that it imposes upon a
    secured party who takes possession of collateral without judicial process the
    duty to do so without breach of the peace;

    (G) Division (B) of section 1309.610 and sections 1309.611, 1309.613, and 1309.614
    of the Revised Code, which relate to the disposition of collateral;

    (H) Division (F) of section 1309.615, which relates to the calculation of a deficiency
    or surplus when a disposition is made to the secured party, a person related to
    the secured party, or a secondary obligor;

    (I) Section 1309.616 of the Revised Code, which relates to the explanation of
    the calculation of a surplus or deficiency;

    (J) Sections 1309.620, 1309.621, and 1309.622 of the Revised Code, which relate
    to the acceptance of collateral in satisfaction of obligation;

    (K) Section 1309.623 of the Revised Code, which relates to redemption of collateral;

    (L) Section 1309.624 of the Revised Code, which relates to permissible waivers;
    and

    (M) Sections 1309.625 and 1309.626 of the Revised Code, which relate to the secured
    party''s liability for failure to comply with this chapter.'
