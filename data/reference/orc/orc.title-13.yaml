- number: '1322.30'
  heading: Interest
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: A registrant or entity holding a letter of exemption under this chapter may
    contract for and receive interest at any rate or rates agreed upon or consented
    to by the parties to the residential mortgage loan, but not exceeding an annual
    percentage rate of twenty-five per cent.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.30
- number: '1322.32'
  heading: Corporate surety bond; notice of action or judgment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A)(1) No registrant shall conduct business in this state, unless the registrant
    has obtained and maintains in effect at all times a corporate surety bond issued
    by a bonding company or insurance company authorized to do business in this state.
    The bond shall be in favor of the superintendent of financial institutions and
    in the penal sum of one-half per cent of the aggregate loan amount of residential
    mortgage loans originated in the immediately preceding calendar year, but not
    exceeding one hundred fifty thousand dollars. Under no circumstances, however,
    shall the bond for mortgage lenders and mortgage brokers be less than fifty thousand
    dollars and an additional penal sum of ten thousand dollars for each location,
    in excess of one, at which the registrant conducts business. The bond amount for
    registrants that engage exclusively in the business of mortgage servicing shall
    be a minimum of one hundred fifty thousand dollars. The term of the bond shall
    coincide with the term of registration. A copy of the bond shall be filed with
    the superintendent. The bond shall be for the exclusive benefit of any buyer injured
    by a violation by an employee of the registrant, mortgage loan originator employed
    by or associated with the registrant, or registrant of any provision of this chapter
    or any rule adopted thereunder. The aggregate liability of the corporate surety
    for any and all breaches of the conditions of the bond shall not exceed the penal
    sum of the bond.

    (2)(a) No licensee who is employed by or associated with a person or entity holding
    a valid letter of exemption under division (B)(1) of section 1322.05 of the Revised
    Code shall conduct business in this state, unless either the licensee or the person
    or entity on the licensee''s behalf has obtained and maintains in effect at all
    times a corporate surety bond issued by a bonding company or insurance company
    authorized to do business in this state. The bond shall be in favor of the superintendent
    of financial institutions and in the penal sum of one-half per cent of the aggregate
    loan amount of residential mortgage loans originated in the immediately preceding
    calendar year, but not exceeding one hundred thousand dollars. Under no circumstances,
    however, shall the bond be less than fifty thousand dollars. The term of the bond
    shall coincide with the term of licensure. A copy of the bond shall be filed with
    the superintendent. The bond shall be for the exclusive benefit of any buyer injured
    by a violation by the licensee of any provision of this chapter or any rule adopted
    thereunder. The aggregate liability of the corporate surety for any and all breaches
    of the conditions of the bond shall not exceed the penal sum of the bond.

    (b) Licensees covered by a corporate surety bond obtained by a registrant, or
    by a person or entity holding a valid letter of exemption under division (B)(1)
    of section 1322.05 of the Revised Code, they are employed by or associated with
    shall not be required to obtain an individual bond.

    (B)(1)(a) The registrant shall give notice to the superintendent by certified
    mail of any action that is brought by a buyer against the registrant, mortgage
    loan originator, or employee alleging injury by a violation of any provision of
    this chapter or any rule adopted thereunder, and of any judgment that is entered
    against the registrant, mortgage loan originator, or employee by a buyer injured
    by a violation of any provision of this chapter or any rule adopted thereunder.
    The notice shall provide details sufficient to identify the action or judgment,
    and shall be filed with the superintendent within ten days after the commencement
    of the action or notice to the registrant of entry of a judgment.

    (b) The licensee shall give notice to the superintendent by certified mail of
    any action that is brought by a buyer against the licensee alleging injury by
    a violation of any provision of this chapter or any rule adopted thereunder, and
    of any judgment that is entered against the licensee by a buyer injured by a violation
    of any provision of this chapter or any rule adopted thereunder. The notice shall
    provide details sufficient to identify the action or judgment, and shall be filed
    with the superintendent within ten days after the commencement of the action or
    notice to the licensee of entry of a judgment. A person or entity holding a valid
    letter of exemption under division (B)(1) of section 1322.05 of the Revised Code
    that secures bonding for the licensees employed by or associated with the person
    or entity shall report such actions or judgments in the same manner as is required
    of registrants.

    (2) A corporate surety, within ten days after it pays any claim or judgment, shall
    give notice to the superintendent by certified mail of the payment, with details
    sufficient to identify the person and the claim or judgment paid.

    (C) Whenever the penal sum of the corporate surety bond is reduced by one or more
    recoveries or payments, the registrant or licensee shall furnish a new or additional
    bond under this section, so that the total or aggregate penal sum of the bond
    or bonds equals the sum required by this section, or shall furnish an endorsement
    executed by the corporate surety reinstating the bond to the required penal sum
    of it.

    (D) The liability of the corporate surety on the bond to the superintendent and
    to any buyer injured by a violation of any provision of this chapter or any rule
    adopted thereunder shall not be affected in any way by any misrepresentation,
    breach of warranty, or failure to pay the premium, by any act or omission upon
    the part of the registrant or licensee, by the insolvency or bankruptcy of the
    registrant or licensee, or by the insolvency of the registrant''s or licensee''s
    estate. The liability for any act or omission that occurs during the term of the
    corporate surety bond shall be maintained and in effect for at least two years
    after the date on which the corporate surety bond is terminated or canceled.

    (E) The corporate surety bond shall not be canceled by the registrant, the licensee,
    or the corporate surety except upon notice to the superintendent by certified
    mail, return receipt requested. The cancellation shall not be effective prior
    to thirty days after the superintendent receives the notice.

    (F) No registrant or licensee employed by or associated with a person or entity
    holding a valid letter of exemption under division (B)(1) of section 1322.05 of
    the Revised Code shall fail to comply with this section. Any registrant or licensee
    that fails to comply with this section shall cease all mortgage lender, mortgage
    broker, mortgage servicer, or mortgage loan originator activity in this state
    until the registrant or licensee complies with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.32
- number: '1322.34'
  heading: Examination and maintenance of records; reports to NMLS
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) As often as the superintendent of financial institutions considers it
    necessary, the superintendent may examine the records of a registrant or licensee
    or holder of a letter of exemption issued under this chapter, including all records
    created or processed by a licensee, pertaining to business transacted pursuant
    to this chapter.

    (B) A registrant or licensee shall maintain records pertaining to business transacted
    pursuant to this chapter for four years. For purposes of this division, "registrant
    or licensee" includes any person whose certificate of registration or license
    is cancelled, surrendered, or revoked or who otherwise ceases to engage in business
    as a mortgage lender, mortgage servicer, mortgage broker, or mortgage loan originator.

    No registrant or licensee shall fail to comply with this division.

    (C) Each registrant, licensee, and entity holding a valid letter of exemption
    issued under this chapter shall submit to the nationwide mortgage licensing system
    and registry call reports or other reports of condition, which reports shall be
    in such form and shall contain such information as the nationwide mortgage licensing
    system and registry may require. Each registrant and entity holding a valid letter
    of exemption under this chapter shall ensure that all residential mortgage loans
    that are consummated as a result of a mortgage loan originator''s loan origination
    activities or serviced by the registrant or entity holding a valid exemption are
    included in the report of condition submitted to the nationwide mortgage licensing
    system and registry.

    (D) Any document or record that is required to be signed and that is filed in
    this state as an electronic record through the nationwide mortgage licensing system
    and registry, and any other electronic record filed through the nationwide mortgage
    licensing system and registry, shall be considered a valid original document upon
    reproduction to paper form by the division of financial institutions.

    (E) In the event electronic records, books, records, data, and documents of a
    registrant or holder of a letter of exemption issued under this chapter are located
    outside of this state and the superintendent determines that an in-person examination
    is necessary, the registrant or holder of a letter of exemption shall, upon the
    request of the superintendent, pay the estimated costs of the examination, including
    the proportionate cost of the salaries of division of financial institutions employees
    who conduct the examination.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.34
- number: '1322.35'
  heading: Obstructing examination or investigation by superintendent of financial
    institutions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: 'No person, in connection with any examination or investigation conducted
    by the superintendent of financial institutions under this chapter, shall knowingly
    do any of the following:

    (A) Circumvent, interfere with, obstruct, or fail to cooperate, including making
    a false or misleading statement, failing to produce records, or intimidating or
    suborning any witness;

    (B) Tamper with, alter, or manufacture any evidence;

    (C) Withhold, abstract, remove, mutilate, destroy, or secrete any books, records,
    computer records, or other information.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.35
- number: '1322.36'
  heading: Public records and privileged and confidential information; reports by
    superintendent to NMLS
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A)(1) The following information is confidential:

    (a) Examination information, and any information leading to or arising from an
    examination;

    (b) Investigation information, and any information arising from or leading to
    an investigation.

    (2) The information described in division (A)(1) of this section shall remain
    confidential for all purposes except when it is necessary for the superintendent
    of financial institutions to take official action regarding the affairs of a registrant
    or licensee, or in connection with criminal or civil proceedings to be initiated
    by a prosecuting attorney or the attorney general. This information may also be
    introduced into evidence or disclosed when and in the manner authorized by section
    1181.25 of the Revised Code.

    (B) All application information, except social security numbers, employer identification
    numbers, financial account numbers, the identity of the institution where financial
    accounts are maintained, personal financial information, fingerprint cards and
    the information contained on such cards, and criminal background information,
    is a public record as defined in section 149.43 of the Revised Code.

    (C) This section does not prevent the division of financial institutions from
    releasing to or exchanging with other financial institution regulatory authorities
    information relating to registrants and licensees. For this purpose, a "financial
    institution regulatory authority" includes a regulator of a business activity
    in which a registrant or licensee is engaged, or has applied to engage in, to
    the extent that the regulator has jurisdiction over a registrant or licensee engaged
    in that business activity. A registrant or licensee is engaged in a business activity,
    and a regulator of that business activity has jurisdiction over the registrant
    or licensee, whether the registrant or licensee conducts the activity directly
    or a subsidiary or affiliate of the registrant or licensee conducts the activity.

    (D) The superintendent shall, on a regular basis, report violations of any provision
    of this chapter, as well as enforcement actions and other relevant information,
    to the nationwide mortgage licensing system and registry.

    (E)(1) Any confidentiality or privilege arising under federal or state law with
    respect to any information or material provided to the nationwide mortgage licensing
    system and registry shall continue to apply to the information or material after
    the information or material is provided to the nationwide mortgage licensing system
    and registry. The information and material so provided may be released to any
    state or federal regulatory official with mortgage industry oversight authority
    without the loss of confidentiality or privilege protections provided by federal
    law or the law of any state. Information or material described in division (E)(1)
    of this section to which confidentiality or privilege applies shall not be subject
    to any of the following:

    (a) Disclosure under any federal or state law governing disclosure to the public
    of information held by an officer or an agency of the federal government or of
    the respective state;

    (b) Subpoena or discovery, or admission into evidence, in any private civil action
    or administrative process, unless the person to whom such information or material
    pertains waives, in whole or in part and at the discretion of the person, any
    privilege held by the nationwide mortgage licensing system and registry with respect
    to that information or material.

    (2) The superintendent, in order to promote more effective regulation and reduce
    regulatory burden through supervisory information sharing, may enter into sharing
    arrangements with other governmental agencies, the conference of state bank supervisors,
    and the American association of residential mortgage regulators.

    (3) Any state law, including section 149.43 of the Revised Code, relating to the
    disclosure of confidential supervisory information or any information or material
    described in division (A)(1) or (E)(1) of this section that is inconsistent with
    this section shall be superseded by the requirements of this section.

    (F) This section shall not apply with respect to information or material relating
    to the employment history of, and publicly adjudicated disciplinary and enforcement
    actions against, mortgage loan originators that is included in the nationwide
    mortgage licensing system and registry for access by the public.

    (G) This section does not prevent the division from releasing information relating
    to registrants and licensees to the attorney general, to the superintendent of
    real estate and professional licensing for purposes relating to the administration
    of Chapters 4735. and 4763. of the Revised Code, to the superintendent of insurance
    for purposes relating to the administration of Chapter 3953. of the Revised Code,
    to the commissioner of securities for purposes relating to the administration
    of Chapter 1707. of the Revised Code, or to local law enforcement agencies and
    local prosecutors. Information the division releases pursuant to this section
    remains confidential.

    (H) The superintendent of financial institutions shall, by rule adopted in accordance
    with Chapter 119. of the Revised Code, establish a process by which mortgage loan
    originators may challenge any information provided to the nationwide mortgage
    licensing system and registry by the superintendent.'
