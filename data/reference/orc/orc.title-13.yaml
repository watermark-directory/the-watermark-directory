- number: '1337.22'
  heading: Definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'As used in sections 1337.21 to 1337.64 of the Revised Code:

    (A) "Agent" means a person granted authority to act for a principal under a power
    of attorney, whether denominated an agent, attorney in fact, or otherwise. "Agent"
    includes an original agent, coagent, successor agent, and a person to which an
    agent''s authority is delegated.

    (B) "Durable," with respect to a power of attorney, means not terminated by the
    principal''s incapacity.

    (C) "Electronic" means relating to technology having electrical, digital, magnetic,
    wireless, optical, electromagnetic, or similar capabilities.

    (D) "Good faith" means honesty in fact.

    (E) "Incapacity" means inability of an individual to manage property or business
    affairs for either of the following reasons:

    (1) The individual has an impairment in the ability to receive and evaluate information
    or make or communicate decisions even with the use of technological assistance.

    (2) The individual is any of the following:

    (a) Missing;

    (b) Detained, including incarcerated in a penal system;

    (c) Outside the United States and unable to return.

    (F) "Person" means an individual, corporation, business trust, estate, trust,
    partnership, limited liability company, association, joint venture, public corporation,
    government or governmental subdivision, agency, or instrumentality, or any other
    legal or commercial entity.

    (G) "Power of attorney" means a writing or other record that grants authority
    to an agent to act in the place of the principal, whether or not the term power
    of attorney is used.

    (H) "Presently exercisable general power of appointment," with respect to property
    or a property interest subject to a power of appointment, means power exercisable
    at the time in question to vest absolute ownership in the principal individually,
    the principal''s estate, the principal''s creditors, or the creditors of the principal''s
    estate. The term includes a power of appointment not exercisable until the occurrence
    of a specified event, the satisfaction of an ascertainable standard, or the passage
    of a specified period only after the occurrence of the specified event, the satisfaction
    of the ascertainable standard, or the passage of the specified period. The term
    does not include a power exercisable in a fiduciary capacity or only by will.

    (I) "Principal" means an individual who grants authority to an agent in a power
    of attorney.

    (J) "Property" means anything that may be the subject of ownership, whether real
    or personal, or legal or equitable, or any interest or right therein.

    (K) "Record" means information that is inscribed on a tangible medium or that
    is stored in an electronic or other medium and is retrievable in perceivable form.

    (L) "Sign" means, with present intent to authenticate or adopt a record, to execute
    or adopt a tangible symbol or to attach to or logically associate with the record
    an electronic sound, symbol, or process.

    (M) "State" means a state of the United States, the District of Columbia, Puerto
    Rico, the United States Virgin Islands, or any territory or insular possession
    subject to the jurisdiction of the United States.

    (N) "Stocks and bonds" means stocks, bonds, mutual funds, and all other types
    of securities and financial instruments, whether held directly, indirectly, or
    in any other manner, but does not include commodity futures contracts or call
    or put options on stocks or stock indexes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.22
- number: '1337.23'
  heading: Applicability
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Sections 1337.21 to 1337.64 of the Revised Code apply to all powers of attorney
    except the following:

    (A) A power to the extent it is coupled with an interest in the subject of the
    power, including a power given to or for the benefit of a creditor in connection
    with a credit transaction;

    (B) A power to make health-care decisions;

    (C) A proxy or other delegation to exercise voting rights or management rights
    with respect to an entity;

    (D) A power created on a form prescribed by a government or governmental subdivision,
    agency, or instrumentality for a governmental purpose.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.23
- number: '1337.24'
  heading: Power of attorney is durable
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: A power of attorney created under sections 1337.21 to 1337.64 of the Revised
    Code is durable unless it expressly provides that it is terminated by the incapacity
    of the principal.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.24
- number: '1337.25'
  heading: Execution of power of attorney
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: A power of attorney must be signed by the principal or in the principal's
    conscious presence by another individual directed by the principal to sign the
    principal's name on the power of attorney. A signature on a power of attorney
    is presumed to be genuine if the principal acknowledges the signature before a
    notary public or other individual authorized by law to take acknowledgments.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.25
- number: '1337.26'
  heading: Validity of power of attorney
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) A power of attorney executed in this state on or after the effective
    date of this section is valid if its execution complies with section 1337.25 of
    the Revised Code.

    (B) A power of attorney executed in this state before the effective date of this
    section is valid if its execution complied with the law of this state as it existed
    at the time of execution.

    (C) A power of attorney executed other than in this state is valid in this state
    if, when the power of attorney was executed, the execution complied with the law
    of the jurisdiction that determines the meaning and effect of the power of attorney
    pursuant to section 1337.27 of the Revised Code or with the requirements for a
    military power of attorney pursuant to 10 U.S.C. 1044b.

    (D) Except as otherwise provided by statute other than sections 1337.21 to 1337.64
    of the Revised Code, a photocopy or electronically transmitted copy of an original
    power of attorney has the same effect as the original.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.26
- number: '1337.27'
  heading: Meaning and effect of power of attorney
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: The meaning and effect of a power of attorney is determined by the law of
    the jurisdiction indicated in the power of attorney and, in the absence of an
    indication of jurisdiction, by the law of the jurisdiction in which the power
    of attorney was executed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.27
- number: '1337.28'
  heading: Nomination of guardian; relation of agent to court-appointed fiduciary
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) In a power of attorney, a principal may nominate a guardian of the principal''s
    person, estate, or both and may nominate a guardian of the person, the estate,
    or both of one or more of the principal''s minor children or incompetent adult
    children, whether born at the time of the execution of the power of attorney or
    afterward. The nomination is for consideration by a court if proceedings for the
    appointment of a guardian for the principal''s person, estate, or both or if proceedings
    for the appointment of a guardian of the person, the estate, or both of one or
    more of the principal''s minor children or incompetent adult children are commenced
    at a later time. The principal may authorize the person nominated as guardian
    or the agent to nominate a successor guardian for consideration by a court. The
    principal''s nomination of a guardian of the principal''s person, estate, or both
    or the principal''s nomination of a guardian of the person, the estate, or both
    of one or more of the principal''s minor children or incompetent adult children
    is revoked by the principal''s subsequent nomination of a guardian of the principal''s
    person, estate, or both or the principal''s subsequent nomination of a guardian
    of the person, the estate, or both of one or more of the principal''s minor children
    or incompetent adult children, and, except for good cause shown or disqualification,
    the court shall make its appointment in accordance with the principal''s most
    recent nomination. Nomination of a person as a guardian or successor guardian
    of the person, the estate, or both of one or more of the principal''s minor children
    or incompetent adult children under this division, and any subsequent appointment
    of the guardian or successor guardian as guardian under section 2111.02 of the
    Revised Code, does not vacate the jurisdiction of any other court that previously
    may have exercised jurisdiction over the person of the minor or incompetent adult
    child.

    (B) The principal may direct that bond be waived for a person nominated as guardian
    or as a successor guardian.

    (C) If, after a principal executes a power of attorney, a court appoints a guardian
    of the principal''s estate or other fiduciary charged with the management of some
    or all of the principal''s property, the agent is accountable to the fiduciary
    as well as to the principal. The power of attorney is not terminated and the agent''s
    authority continues unless limited, suspended, or terminated by the court after
    notice to the agent and upon a finding that the limitation, suspension, or termination
    would be in the best interest of the principal.

    (D) A power of attorney that contains the nomination of a person to be the guardian
    of the person, the estate, or both of one or more of the principal''s minor children
    or incompetent adult children under this division may be filed with the probate
    court for safekeeping, and the probate court shall designate the nomination as
    the nomination of a standby guardian.

    (E) As used in this section, "incompetent" has the same meaning as in section
    2111.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.28
- number: '1337.29'
  heading: When power of attorney effective
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) A power of attorney is effective when executed unless the principal provides
    in the power of attorney that it becomes effective at a future date or upon the
    occurrence of a future event or contingency.

    (B) If a power of attorney becomes effective upon the occurrence of a future event
    or contingency, the principal, in the power of attorney, may authorize one or
    more persons to determine in a writing or other record that the event or contingency
    has occurred.

    (C) If a power of attorney becomes effective upon the principal''s incapacity
    and the principal has not authorized a person to determine whether the principal
    is incapacitated, or the person authorized is unable or unwilling to make the
    determination, the power of attorney becomes effective upon one of the following
    determinations made in a writing or other record:

    (1) A determination by a physician who has examined the principal or a licensed
    psychologist who has evaluated the principal that the principal is incapacitated
    within the meaning of division (E)(1) of section 1337.22 of the Revised Code;

    (2) A determination by an attorney at law, a judge, or an appropriate governmental
    official that the principal is incapacitated within the meaning of division (E)(2)
    of section 1337.22 of the Revised Code.

    (D) A person authorized by the principal in the power of attorney to determine
    that the principal is incapacitated may act as the principal''s personal representative
    pursuant to 42 U.S.C. 1320d to 1320d-8, and applicable regulations, to obtain
    access to the principal''s health-care information and communicate with the principal''s
    health-care provider.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.29
- number: '1337.30'
  heading: Termination of power of attorney or agent's authority
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) A power of attorney terminates when any of the following occurs:

    (1) The principal dies;

    (2) The principal becomes incapacitated, if the power of attorney is not durable;

    (3) The principal revokes the power of attorney;

    (4) The power of attorney provides that it terminates;

    (5) The purpose of the power of attorney is accomplished;

    (6) The principal revokes the agent''s authority or the agent dies, becomes incapacitated,
    or resigns, and the power of attorney does not provide for another agent to act
    under the power of attorney.

    (B) An agent''s authority terminates when any of the following occurs:

    (1) The principal revokes the authority;

    (2) The agent dies, becomes incapacitated, or resigns;

    (3) An action is filed for the divorce, dissolution, or annulment of the agent''s
    marriage to the principal or their legal separation, unless the power of attorney
    otherwise provides;

    (4) The power of attorney terminates.

    (C) Unless the power of attorney otherwise provides, an agent''s authority is
    exercisable until the authority terminates under division (B) of this section,
    notwithstanding a lapse of time since the execution of the power of attorney.

    (D) Termination of an agent''s authority or of a power of attorney is not effective
    as to the agent or another person that, without actual knowledge of the termination,
    acts in good faith under the power of attorney. An act so performed, unless otherwise
    invalid or unenforceable, binds the principal and the principal''s successors
    in interest.

    (E) Incapacity of the principal of a power of attorney that is not durable does
    not revoke or terminate the power of attorney as to an agent or other person that,
    without actual knowledge of the incapacity, acts in good faith under the power
    of attorney. An act so performed, unless otherwise invalid or unenforceable, binds
    the principal and the principal''s successors in interest.

    (F) The execution of a power of attorney does not revoke a power of attorney previously
    executed by the principal unless the subsequent power of attorney provides that
    the previous power of attorney is revoked or that all other powers of attorney
    are revoked.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.30
- number: '1337.31'
  heading: Coagents and successor agents
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) A principal may designate two or more persons to act as coagents. Unless
    the power of attorney otherwise provides, each coagent may exercise its authority
    independently.

    (B) A principal may designate one or more successor agents to act if an agent
    resigns, dies, becomes incapacitated, is not qualified to serve, or declines to
    serve. A principal may grant authority to designate one or more successor agents
    to an agent or other person designated by name, office, or function. Unless the
    power of attorney otherwise provides, a successor agent has the same authority
    as that granted to the original agent and may not act until all predecessor agents
    have resigned, died, become incapacitated, are no longer qualified to serve, or
    have declined to serve.

    (C) Except as otherwise provided in the power of attorney and division (D) of
    this section, an agent that does not participate in or conceal a breach of fiduciary
    duty committed by another agent, including a predecessor agent, is not liable
    for the actions of the other agent.

    (D) An agent that has actual knowledge of a breach or imminent breach of fiduciary
    duty by another agent shall notify the principal and, if the principal is incapacitated,
    take any action reasonably appropriate in the circumstances to safeguard the principal''s
    best interest. An agent that fails to notify the principal or take action as required
    by this division is liable for the reasonably foreseeable damages that could have
    been avoided if the agent had notified the principal or taken action as required
    by this division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.31
- number: '1337.32'
  heading: Reimbursement and compensation of agent
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: Unless the power of attorney otherwise provides, an agent is entitled to reimbursement
    of expenses reasonably incurred on behalf of the principal and to compensation
    that is reasonable under the circumstances.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.32
- number: '1337.33'
  heading: Agent's acceptance
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: Except as otherwise provided in the power of attorney, a person accepts appointment
    as an agent under a power of attorney by exercising authority or performing duties
    as an agent or by any other assertion or conduct indicating acceptance.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.33
- number: '1337.34'
  heading: Agent's duties
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) Notwithstanding provisions in the power of attorney, an agent that has
    accepted appointment shall do all of the following:

    (1) Act in accordance with the principal''s reasonable expectations to the extent
    actually known by the agent and, otherwise, in the principal''s best interest;

    (2) Act in good faith;

    (3) Act only within the scope of authority granted in the power of attorney;

    (4) Attempt to preserve the principal''s estate plan to the extent actually known
    by the agent if preserving the plan is consistent with the principal''s best interest
    based on all relevant factors, including all of the following:

    (a) The value and nature of the principal''s property;

    (b) The principal''s foreseeable obligations and need for maintenance;

    (c) Minimization of taxes, including income, estate, inheritance, generation-skipping
    transfer, and gift taxes;

    (d) Eligibility for a benefit, a program, or assistance under a statute or regulation.

    (B) Except as otherwise provided in the power of attorney, an agent that has accepted
    appointment shall do all of the following:

    (1) Act loyally for the principal''s benefit;

    (2) Act so as not to create a conflict of interest that impairs the agent''s ability
    to act impartially in the principal''s best interest;

    (3) Act with the care, competence, and diligence ordinarily exercised by agents
    in similar circumstances;

    (4) Keep a record of all receipts, disbursements, and transactions made on behalf
    of the principal;

    (5) Cooperate with a person that has authority to make health-care decisions for
    the principal to carry out the principal''s reasonable expectations to the extent
    actually known by the agent and, otherwise, act in the principal''s best interest.

    (C) An agent that acts in good faith is not liable to any beneficiary of the principal''s
    estate plan for failure to preserve the plan.

    (D) An agent that acts with care, competence, and diligence for the best interest
    of the principal is not liable solely because the agent also benefits from the
    act or has an individual or conflicting interest in relation to the property or
    affairs of the principal.

    (E) If an agent is selected by the principal because of special skills or expertise
    possessed by the agent or in reliance on the agent''s representation that the
    agent has special skills or expertise, the special skills or expertise must be
    considered in determining whether the agent has acted with care, competence, and
    diligence under the circumstances.

    (F) Absent a breach of duty to the principal, an agent is not liable if the value
    of the principal''s property declines.

    (G) An agent that exercises authority to delegate to another person the authority
    granted by the principal or that engages another person on behalf of the principal
    is not liable for an act, error of judgment, or default of that person if the
    agent exercises care, competence, and diligence in selecting and monitoring the
    person.

    (H) Except as otherwise provided in the power of attorney, an agent is not required
    to disclose receipts, disbursements, or transactions conducted on behalf of the
    principal unless ordered by a court or requested by the principal, a guardian,
    a conservator, another fiduciary acting for the principal, a governmental agency
    having authority to protect the welfare of the principal, or, upon the death of
    the principal, by the personal representative or successor in interest of the
    principal''s estate. If so requested, within thirty days the agent shall comply
    with the request or provide a writing or other record substantiating why additional
    time is needed and shall comply with the request within an additional thirty days.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.34
- number: '1337.35'
  heading: Exoneration of agent
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'A provision in a power of attorney relieving an agent of liability for breach
    of duty is binding on the principal and the principal''s successors in interest
    except to the extent that either of the following applies:

    (A) The provision relieves the agent of liability for breach of duty committed
    dishonestly, with an improper motive, or with reckless indifference to the purposes
    of the power of attorney or the best interest of the principal.

    (B) The provision was inserted as a result of an abuse of a confidential or fiduciary
    relationship with the principal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.35
- number: '1337.36'
  heading: Judicial relief
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) Any of the following persons may petition a court to construe a power
    of attorney or review the agent''s conduct and grant appropriate relief:

    (1) The principal or the agent;

    (2) A guardian, conservator, or other fiduciary acting for the principal, including
    an executor or administrator of the estate of a deceased principal;

    (3) A person authorized to make health-care decisions for the principal;

    (4) The principal''s spouse, parent, or descendant;

    (5) An individual who would qualify as a presumptive heir of the principal;

    (6) A person named as a beneficiary to receive any property, benefit, or contractual
    right on the principal''s death or as a beneficiary of a trust created by or for
    the principal that has a financial interest in the principal''s estate;

    (7) A governmental agency having regulatory authority to protect the welfare of
    the principal;

    (8) The principal''s caregiver or another person that demonstrates sufficient
    interest in the principal''s welfare;

    (9) A person asked to accept the power of attorney.

    (B) Upon motion by the principal, the court shall dismiss a petition filed under
    this section, unless the court finds that the principal lacks capacity to revoke
    the agent''s authority or the power of attorney.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.36
- number: '1337.37'
  heading: Agent's liability
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: An agent that violates sections 1337.21 to 1337.64 of the Revised Code is
    liable to the principal or the principal's successors in interest for the amount
    required to restore the value of the principal's property to what it would have
    been had the violation not occurred and the amount required to reimburse the principal
    or the principal's successors in interest for the attorney's fees and costs paid
    on the agent's behalf.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.37
- number: '1337.38'
  heading: Agent's resignation; notice
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney provides a different method for an agent''s
    resignation, an agent may resign by giving notice to the principal and, if the
    principal is incapacitated, to whichever of the following applies:

    (A) The guardian, if one has been appointed for the principal, and any coagent
    or successor agent;

    (B) If there is no person described in division (A) of this section, to any of
    the following:

    (1) The principal''s caregiver;

    (2) Another person reasonably believed by the agent to have sufficient interest
    in the principal''s welfare;

    (3) A governmental agency having authority to protect the welfare of the principal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.38
- number: '1337.39'
  heading: Principles of law and equity
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: Unless displaced by a provision of sections 1337.21 to 1337.64 of the Revised
    Code, the principles of law and equity supplement those sections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.39
- number: '1337.40'
  heading: Conflict of laws
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: In the event of a conflict between any provision of sections 1337.21 to 1337.64
    of the Revised Code and any other provision of law applicable to financial institutions
    or other entities, the other provision of law controls.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.40
- number: '1337.41'
  heading: Remedies under other law
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: The remedies provided under sections 1337.21 to 1337.64 of the Revised Code
    are not exclusive and do not abrogate any right or remedy under any other provision
    of law of this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.41
- number: '1337.42'
  heading: Authority that requires specific grant; grant of general authority
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) An agent under a power of attorney may do any of the following on behalf
    of the principal or with the principal''s property only if the power of attorney
    expressly grants the agent the authority and if exercise of the authority is not
    otherwise prohibited by another agreement or instrument to which the authority
    or property is subject, and, with respect to a revocable trust of which the principal
    was the settlor, if the trust agreement expressly authorizes the agent to exercise
    the principal''s powers with respect to the revocation, amendment, or distribution:

    (1) Create, amend, revoke, or terminate an inter vivos trust to the extent permitted
    by section 5801.05 of the Revised Code or any other provision of Title LVIII of
    the Revised Code;

    (2) Make a gift;

    (3) Create or change rights of survivorship;

    (4) Create or change a beneficiary designation;

    (5) Delegate authority granted under the power of attorney;

    (6) Waive the principal''s right to be a beneficiary of a joint and survivor annuity,
    including a survivor benefit under a retirement plan;

    (7) Exercise fiduciary powers that the principal has authority to delegate.

    (B) Notwithstanding a grant of authority to do an act described in division (A)
    of this section, unless the power of attorney otherwise provides, an agent that
    is not an ancestor, spouse, or descendant of the principal may not exercise authority
    under a power of attorney to create in the agent, or in an individual to whom
    the agent owes a legal obligation of support, an interest in the principal''s
    property, whether by gift, right of survivorship, beneficiary designation, disclaimer,
    or otherwise.

    (C) Subject to divisions (A), (B), (D), and (E) of this section, if a power of
    attorney grants to an agent authority to do all acts that a principal could do,
    the agent has the general authority described in sections 1337.45 to 1337.57 of
    the Revised Code.

    (D) Unless the power of attorney otherwise provides, a grant of authority to make
    a gift is subject to section 1337.58 of the Revised Code.

    (E) Subject to divisions (A), (B), and (D) of this section, if the subjects over
    which authority is granted in a power of attorney are similar or overlap, the
    broadest authority controls.

    (F) Authority granted in a power of attorney is exercisable with respect to property
    that the principal has when the power of attorney is executed or acquires later,
    whether or not the property is located in this state and whether or not the authority
    is exercised or the power of attorney is executed in this state.

    (G) An act performed by an agent pursuant to a power of attorney has the same
    effect and inures to the benefit of and binds the principal and the principal''s
    successors in interest as if the principal had performed the act.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.42
- number: '1337.43'
  heading: Incorporation of authority
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) An agent has authority described in sections 1337.42 to 1337.58 of the
    Revised Code if the power of attorney refers to general authority with respect
    to the descriptive term for the subjects stated in sections 1337.45 to 1337.58
    of the Revised Code or cites the section of the Revised Code in which the authority
    is described.

    (B) A reference in a power of attorney to general authority with respect to the
    descriptive term for a subject in sections 1337.45 to 1337.58 of the Revised Code
    or a citation to any of those sections incorporates the entire section as if it
    were set out in full in the power of attorney.

    (C) A principal may modify authority incorporated by reference.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.43
- number: '1337.44'
  heading: Construction of authority generally
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Except as otherwise provided in the power of attorney, by executing a power
    of attorney that incorporates by reference a subject described in sections 1337.45
    to 1337.58 of the Revised Code or that grants to an agent authority to do all
    acts that a principal could do pursuant to division (C) of section 1337.42 of
    the Revised Code, a principal authorizes the agent, with respect to that subject,
    to do all of the following:

    (A) Demand, receive, and obtain by litigation or otherwise, money or another thing
    of value to which the principal is, may become, or claims to be entitled, and
    conserve, invest, disburse, or use anything so received or obtained for the purposes
    intended;

    (B) Contract in any manner with any person, on terms agreeable to the agent, to
    accomplish a purpose of a transaction and perform, rescind, cancel, terminate,
    reform, restate, release, or modify the contract or another contract made by or
    on behalf of the principal;

    (C) Execute, acknowledge, seal, deliver, file, or record any instrument or communication
    the agent considers desirable to accomplish a purpose of a transaction, including
    creating at any time a schedule listing some or all of the principal''s property
    and attaching it to the power of attorney;

    (D) Initiate, participate in, submit to alternative dispute resolution, settle,
    oppose, or propose or accept a compromise with respect to a claim existing in
    favor of or against the principal or intervene in litigation relating to the claim;

    (E) Seek on the principal''s behalf the assistance of a court or other governmental
    agency to carry out an act authorized in the power of attorney;

    (F) Engage, compensate, and discharge an attorney, accountant, discretionary investment
    manager, expert witness, or other advisor;

    (G) Prepare, execute, and file a record, report, or other document to safeguard
    or promote the principal''s interest under a statute or regulation;

    (H) Communicate with any representative or employee of a government or governmental
    subdivision, agency, or instrumentality, on behalf of the principal;

    (I) Access communications intended for, and communicate on behalf of the principal,
    whether by mail, electronic transmission, telephone, or other means;

    (J) Do any lawful act with respect to the subject and all property related to
    the subject.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.44
- number: '1337.45'
  heading: Real property
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to real property authorizes the agent
    to do all of the following:

    (A) Demand, buy, lease, receive, accept as a gift or as security for an extension
    of credit, or otherwise acquire or reject an interest in real property or a right
    incident to real property;

    (B) Sell; exchange; convey with or without covenants, representations, or warranties;
    quitclaim; release; surrender; retain title for security; encumber; partition;
    consent to partitioning; subject to an easement or covenant; subdivide; apply
    for zoning or other governmental permits; plat or consent to platting; develop;
    grant an option concerning; lease; sublease; contribute to an entity in exchange
    for an interest in that entity; or otherwise grant or dispose of an interest in
    real property or a right incident to real property;

    (C) Pledge or mortgage an interest in real property or right incident to real
    property as security to borrow money or pay, renew, or extend the time of payment
    of a debt of the principal or a debt guaranteed by the principal;

    (D) Release, assign, satisfy, or enforce by litigation or otherwise a mortgage,
    deed of trust, conditional sale contract, encumbrance, lien, or other claim to
    real property that exists or is asserted;

    (E) Manage or conserve an interest in real property or a right incident to real
    property owned or claimed to be owned by the principal, including all of the following:

    (1) Insure against liability or casualty or other loss;

    (2) Obtain or regain possession of or protect the interest or right by litigation
    or otherwise;

    (3) Pay, assess, compromise, or contest taxes or assessments or apply for and
    receive refunds in connection with taxes;

    (4) Purchase supplies, hire assistance or labor, and make repairs or alterations
    to the real property.

    (F) Use, develop, alter, replace, remove, erect, or install structures or other
    improvements upon real property in or incident to which the principal has, or
    claims to have, an interest or right;

    (G) Participate in a reorganization with respect to real property or an entity
    that owns an interest in or right incident to real property and receive, and hold,
    and act with respect to stocks and bonds or other property received in a plan
    of reorganization, including all of the following:

    (1) Sell or otherwise dispose of them;

    (2) Exercise or sell an option, right of conversion, or similar right with respect
    to them;

    (3) Exercise any voting rights in person or by proxy.

    (H) Change the form of title of an interest in or right incident to real property;

    (I) Dedicate to public use, with or without consideration, easements or other
    real property in which the principal has, or claims to have, an interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.45
- number: '1337.46'
  heading: Tangible personal property
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to tangible personal property authorizes
    the agent to do all of the following:

    (A) Demand, buy, receive, accept as a gift or as security for an extension of
    credit, or otherwise acquire or reject ownership or possession of tangible personal
    property or an interest in tangible personal property;

    (B) Sell; exchange; convey with or without covenants, representations, or warranties;
    quitclaim; release; surrender; create a security interest in; grant options concerning;
    lease; sublease; or otherwise dispose of tangible personal property or an interest
    in tangible personal property;

    (C) Grant a security interest in tangible personal property or an interest in
    tangible personal property as security to borrow money or pay, renew, or extend
    the time of payment of a debt of the principal or a debt guaranteed by the principal;

    (D) Release, assign, satisfy, or enforce by litigation or otherwise a security
    interest, lien, or other claim on behalf of the principal with respect to tangible
    personal property or an interest in tangible personal property;

    (E) Manage or conserve tangible personal property or an interest in tangible personal
    property on behalf of the principal, including all of the following:

    (1) Insure against liability or casualty or other loss;

    (2) Obtain or regain possession of or protect the property or interest by litigation
    or otherwise;

    (3) Pay, assess, compromise, or contest taxes or assessments or apply for and
    receive refunds in connection with taxes or assessments;

    (4) Move the property from place to place;

    (5) Store the property for hire or on a gratuitous bailment;

    (6) Use and make repairs, alterations, or improvements to the property.

    (F) Change the form of title of an interest in tangible personal property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.46
- number: '1337.47'
  heading: Stocks and bonds
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to stocks and bonds authorizes the agent
    to do all of the following:

    (A) Buy, sell, and exchange stocks and bonds;

    (B) Establish, continue, modify, or terminate an account with respect to stocks
    and bonds;

    (C) Pledge stocks and bonds as security to borrow, pay, renew, or extend the time
    of payment of a debt of the principal;

    (D) Receive certificates and other evidences of ownership with respect to stocks
    and bonds;

    (E) Exercise voting rights with respect to stocks and bonds in person or by proxy,
    enter into voting trusts, and consent to limitations on the right to vote.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.47
- number: '1337.48'
  heading: Commodities and options
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to commodities and options authorizes
    the agent to do both of the following:

    (A) Buy, sell, exchange, assign, settle, and exercise commodity futures contracts
    and call or put options on stocks or stock indexes traded on a regulated option
    exchange;

    (B) Establish, continue, modify, and terminate option accounts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.48
- number: '1337.49'
  heading: Banks and other financial institutions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to banks and other financial institutions
    authorizes the agent to do all of the following:

    (A) Continue, modify, and terminate an account or other banking arrangement made
    by or on behalf of the principal;

    (B) Establish, modify, and terminate an account or other banking arrangement with
    a bank, trust company, savings and loan association, credit union, thrift company,
    brokerage firm, or other financial institution selected by the agent;

    (C) Contract for services available from a financial institution, including renting
    a safe deposit box or space in a vault;

    (D) Withdraw, by check, order, electronic funds transfer, or otherwise, money
    or property of the principal deposited with or left in the custody of a financial
    institution;

    (E) Receive statements of account, vouchers, notices, and similar documents from
    a financial institution and act with respect to them;

    (F) Enter a safe deposit box or vault and withdraw or add to the contents;

    (G) Borrow money and pledge as security personal property of the principal necessary
    to borrow money or pay, renew, or extend the time of payment of a debt of the
    principal or a debt guaranteed by the principal;

    (H) Make, assign, draw, endorse, discount, guarantee, and negotiate promissory
    notes, checks, drafts, and other negotiable or nonnegotiable paper of the principal
    or payable to the principal or the principal''s order, transfer money, receive
    the cash or other proceeds of those transactions, and accept a draft drawn by
    a person upon the principal and pay it when due;

    (I) Receive for the principal and act upon a sight draft, warehouse receipt, or
    other document of title whether tangible or electronic, or other negotiable or
    nonnegotiable instrument;

    (J) Apply for, receive, and use letters of credit, credit and debit cards, electronic
    transaction authorizations, and traveler''s checks from a financial institution
    and give an indemnity or other agreement in connection with letters of credit;

    (K) Consent to an extension of the time of payment with respect to commercial
    paper or a financial transaction with a financial institution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.49
- number: '1337.50'
  heading: Operation of entity or business
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Subject to the terms of a document or an agreement governing an entity or
    an entity ownership interest, and unless the power of attorney otherwise provides,
    language in a power of attorney granting general authority with respect to the
    operation of an entity or business authorizes the agent to do all of the following:

    (A) Operate, buy, sell, enlarge, reduce, or terminate an ownership interest;

    (B) Perform a duty or discharge a liability and exercise in person or by proxy
    a right, power, privilege, or option that the principal has, may have, or claims
    to have;

    (C) Enforce the terms of an ownership agreement;

    (D) Initiate, participate in, submit to alternative dispute resolution, settle,
    oppose, or propose or accept a compromise with respect to litigation to which
    the principal is a party because of an ownership interest;

    (E) Exercise in person or by proxy, or enforce by litigation or otherwise, a right,
    power, privilege, or option the principal has or claims to have as the holder
    of stocks and bonds;

    (F) Initiate, participate in, submit to alternative dispute resolution, settle,
    oppose, or propose or accept a compromise with respect to litigation to which
    the principal is a party concerning stocks and bonds;

    (G) With respect to an entity or business owned solely by the principal, do all
    of the following:

    (1) Continue, modify, renegotiate, extend, and terminate a contract made by or
    on behalf of the principal with respect to the entity or business before execution
    of the power of attorney;

    (2) Determine all of the following:

    (a) The location of its operation;

    (b) The nature and extent of its business;

    (c) The methods of manufacturing, selling, merchandising, financing, accounting,
    and advertising employed in its operation;

    (d) The amount and types of insurance carried;

    (e) The mode of engaging, compensating, and dealing with its employees and accountants,
    attorneys, or other advisors.

    (3) Change the name or form of organization under which the entity or business
    is operated and enter into an ownership agreement with other persons to take over
    all or part of the operation of the entity or business;

    (4) Demand and receive money due or claimed by the principal or on the principal''s
    behalf in the operation of the entity or business and control and disburse the
    money in the operation of the entity or business.

    (H) Put additional capital into an entity or business in which the principal has
    an interest;

    (I) Join in a plan of reorganization, consolidation, conversion, domestication,
    or merger of the entity or business;

    (J) Sell or liquidate all or part of an entity or business;

    (K) Establish the value of an entity or business under a buy-out agreement to
    which the principal is a party;

    (L) Prepare, sign, file, and deliver reports, compilations of information, returns,
    or other papers with respect to an entity or business and make related payments;

    (M) Pay, compromise, or contest taxes, assessments, fines, or penalties and perform
    any other act to protect the principal from illegal or unnecessary taxation, assessments,
    fines, or penalties, with respect to an entity or business, including attempts
    to recover, in any manner permitted by law, money paid before or after the execution
    of the power of attorney.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.50
- number: '1337.51'
  heading: Insurance and annuities
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to insurance and annuities authorizes
    the agent to do all of the following:

    (A) Continue, pay the premium or make a contribution on, modify, exchange, rescind,
    release, or terminate a contract procured by or on behalf of the principal that
    insures or provides an annuity to either the principal or another person, whether
    or not the principal is a beneficiary under the contract;

    (B) Procure new, different, and additional contracts of insurance and annuities
    for the principal and the principal''s spouse, children, and other dependents
    and select the amount, type of insurance or annuity, and mode of payment;

    (C) Pay the premium or make a contribution on, modify, exchange, rescind, release,
    or terminate a contract of insurance or annuity procured by the agent;

    (D) Apply for and receive a loan secured by a contract of insurance or annuity;

    (E) Surrender and receive the cash surrender value on a contract of insurance
    or annuity;

    (F) Exercise an election;

    (G) Exercise investment powers available under a contract of insurance or annuity;

    (H) Change the manner of paying premiums on a contract of insurance or annuity;

    (I) Change or convert the type of insurance or annuity with respect to which the
    principal has or claims to have authority described in this section;

    (J) Apply for and procure a benefit or assistance under a statute or regulation
    to guarantee or pay premiums of a contract of insurance on the life of the principal;

    (K) Collect, sell, assign, hypothecate, borrow against, or pledge the interest
    of the principal in a contract of insurance or annuity;

    (L) Select the form and timing of the payment of proceeds from a contract of insurance
    or annuity;

    (M) Pay from proceeds or otherwise, compromise or contest, and apply for refunds
    in connection with a tax or assessment levied by a taxing authority with respect
    to a contract of insurance or annuity or its proceeds or liability accruing by
    reason of the tax or assessment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.51
- number: '1337.52'
  heading: Estates, trusts, and other beneficial interests
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) As used in this section, "estate, trust, or other beneficial interest"
    means a trust, probate estate, guardianship, conservatorship, escrow, or custodianship
    or a fund from which the principal is, may become, or claims to be entitled to
    a share or payment.

    (B) Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to estates, trusts, and other beneficial
    interests authorizes the agent to do all of the following:

    (1) Accept, receive, receipt for, sell, assign, pledge, or exchange a share in
    or payment from an estate, trust, or other beneficial interest;

    (2) Demand or obtain money or another thing of value to which the principal is,
    may become, or claims to be entitled by reason of an estate, trust, or other beneficial
    interest, by litigation or otherwise;

    (3) Exercise for the benefit of the principal a presently exercisable general
    power of appointment held by the principal;

    (4) Initiate, participate in, submit to alternative dispute resolution, settle,
    oppose, or propose or accept a compromise with respect to litigation to ascertain
    the meaning, validity, or effect of a deed, will, declaration of trust, or other
    instrument or transaction affecting the interest of the principal;

    (5) Initiate, participate in, submit to alternative dispute resolution, settle,
    oppose, or propose or accept a compromise with respect to litigation to remove,
    substitute, or surcharge a fiduciary;

    (6) Conserve, invest, disburse, or use anything received for an authorized purpose;

    (7) Transfer an interest of the principal in real property, stocks and bonds,
    accounts with financial institutions or securities intermediaries, insurance,
    annuities, and other property to the trustee of a revocable trust created by the
    principal as settlor;

    (8) Reject, renounce, disclaim, release, or consent to a reduction in or modification
    of a share in or payment from an estate, trust, or other beneficial interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.52
- number: '1337.53'
  heading: Claims and litigation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to claims and litigation authorizes the
    agent to do all of the following:

    (A) Assert and maintain before a court or administrative agency a claim, claim
    for relief, cause of action, counterclaim, offset, recoupment, or defense, including
    an action to recover property or other thing of value, recover damages sustained
    by the principal, eliminate or modify tax liability, or seek an injunction, specific
    performance, or other relief;

    (B) Bring an action to determine adverse claims or intervene or otherwise participate
    in litigation;

    (C) Seek an attachment, garnishment, order of arrest, or other preliminary, provisional,
    or intermediate relief and use an available procedure to effect or satisfy a judgment,
    order, or decree;

    (D) Make or accept a tender, offer of judgment, or admission of facts, submit
    a controversy on an agreed statement of facts, consent to examination, and bind
    the principal in litigation;

    (E) Submit to alternative dispute resolution, settle, and propose or accept a
    compromise;

    (F) Waive the issuance and service of process upon the principal, accept service
    of process, appear for the principal, designate persons upon which process directed
    to the principal may be served, execute and file or deliver stipulations on the
    principal''s behalf, verify pleadings, seek appellate review, procure and give
    surety and indemnity bonds, contract and pay for the preparation and printing
    of records and briefs, receive, execute, and file or deliver a consent, waiver,
    release, confession of judgment, satisfaction of judgment, notice, agreement,
    or other instrument in connection with the prosecution, settlement, or defense
    of a claim or litigation;

    (G) Act for the principal with respect to bankruptcy or insolvency, whether voluntary
    or involuntary, concerning the principal or some other person, or with respect
    to a reorganization, receivership, or application for the appointment of a receiver
    or trustee that affects an interest of the principal in property or other thing
    of value;

    (H) Pay a judgment, award, or order against the principal or a settlement made
    in connection with a claim or litigation;

    (I) Receive money or other thing of value paid in settlement of or as proceeds
    of a claim or litigation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.53
- number: '1337.54'
  heading: Personal and family maintenance
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) Unless the power of attorney otherwise provides, language in a power
    of attorney granting general authority with respect to personal and family maintenance
    authorizes the agent to do all of the following:

    (1) Perform the acts necessary to maintain the customary standard of living of
    the principal, the principal''s spouse, and the following individuals, whether
    living when the power of attorney is executed or later born:

    (a) Other individuals legally entitled to be supported by the principal;

    (b) The individuals whom the principal has customarily supported or indicated
    the intent to support.

    (2) Make periodic payments of child support and other family maintenance required
    by a court or governmental agency or an agreement to which the principal is a
    party;

    (3) Provide living quarters for the individuals described in division (A)(1) of
    this section by doing either of the following:

    (a) Purchasing, leasing, or otherwise contracting;

    (b) Paying the operating costs, including interest, amortization payments, repairs,
    improvements, and taxes, for premises owned by the principal or occupied by those
    individuals.

    (4) Provide normal domestic help, usual vacations and travel expenses, and funds
    for shelter, clothing, food, appropriate education, including postsecondary and
    vocational education, and other current living costs for the individuals described
    in division (A)(1) of this section;

    (5) Pay expenses for necessary health care and custodial care on behalf of the
    individuals described in division (A)(1) of this section;

    (6) Act as the principal''s personal representative pursuant to 42 U.S.C. 1320d
    to 1320d-9 and applicable regulations in making decisions related to the past,
    present, or future payment for the provision of health care consented to by the
    principal or anyone authorized under the law of this state to consent to health
    care on behalf of the principal;

    (7) Continue any provision made by the principal for automobiles or other means
    of transportation, including registering, licensing, insuring, and replacing them,
    for the individuals described in division (A)(1) of this section;

    (8) Maintain credit and debit accounts for the convenience of the individuals
    described in division (A)(1) of this section and open new accounts;

    (9) Continue payments incidental to the membership or affiliation of the principal
    in a religious institution, club, society, order, or other organization or to
    continue contributions to those organizations.

    (B) Authority with respect to personal and family maintenance is neither dependent
    upon, nor limited by, authority that an agent may or may not have with respect
    to gifts under sections 1337.21 to 1337.64 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.54
- number: '1337.55'
  heading: Benefits from governmental programs or civil or military service
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) As used in this section, "benefits from governmental programs or civil
    or military service" means any benefit, program, or assistance provided under
    a statute or regulation, including social security, medicare, and medicaid.

    (B) Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to benefits from governmental programs
    or civil or military service authorizes the agent to do all of the following:

    (1) Execute vouchers in the name of the principal for allowances and reimbursements
    payable by the United States or a foreign government or by a state or subdivision
    of a state to the principal, including allowances and reimbursements for transportation
    of the individuals described in division (A)(1) of section 1337.54 of the Revised
    Code, and for shipment of their household effects;

    (2) Take possession and order the removal and shipment of property of the principal
    from a post, warehouse, depot, dock, or other place of storage or safekeeping,
    either governmental or private, and execute and deliver a release, voucher, receipt,
    bill of lading, shipping ticket, certificate, or other instrument for that purpose;

    (3) Enroll in, apply for, select, reject, change, amend, or discontinue, on the
    principal''s behalf, a benefit or program;

    (4) Prepare, file, and maintain a claim of the principal for a benefit or assistance,
    financial or otherwise, to which the principal may be entitled under a statute
    or regulation;

    (5) Initiate, participate in, submit to alternative dispute resolution, settle,
    oppose, or propose or accept a compromise with respect to litigation concerning
    any benefit or assistance the principal may be entitled to receive under a statute
    or regulation;

    (6) Receive the financial proceeds of a claim described in division (B)(4) of
    this section and conserve, invest, disburse, or use for a lawful purpose anything
    so received.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.55
- number: '1337.56'
  heading: Retirement plans
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) As used in this section, "retirement plan" means a plan or account created
    by an employer, the principal, or another individual to provide retirement benefits
    or deferred compensation of which the principal is a participant, beneficiary,
    or owner, including any of the following plans or accounts:

    (1) An individual retirement account under section 408 of the Internal Revenue
    Code of 1986, 26 U.S.C. 408;

    (2) A Roth individual retirement account under section 408A of the Internal Revenue
    Code of 1986, 26 U.S.C. 408A;

    (3) A deemed individual retirement account under section 408(q) of the Internal
    Revenue Code of 1986, 26 U.S.C. 408(q);

    (4) An annuity or mutual fund custodial account under section 403(b) of the Internal
    Revenue Code of 1986, 26 U.S.C. 403(b);

    (5) A pension, profit-sharing, stock bonus, or other retirement plan qualified
    under section 401(a) of the Internal Revenue Code of 1986, 26 U.S.C. 401(a);

    (6) A plan under section 457(b) of the Internal Revenue Code of 1986, 26 U.S.C.
    457(b);

    (7) A nonqualified deferred compensation plan under section 409A of the Internal
    Revenue Code of 1986, 26 U.S.C. 409A.

    (B) Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to retirement plans authorizes the agent
    to do all of the following:

    (1) Select the form and timing of payments under a retirement plan and withdraw
    benefits from a plan;

    (2) Make a rollover, including a direct trustee-to-trustee rollover, of benefits
    from one retirement plan to another;

    (3) Establish a retirement plan in the principal''s name;

    (4) Make contributions to a retirement plan;

    (5) Exercise investment powers available under a retirement plan;

    (6) Borrow from, sell assets to, or purchase assets from a retirement plan.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.56
- number: '1337.57'
  heading: Taxes
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'Unless the power of attorney otherwise provides, language in a power of attorney
    granting general authority with respect to taxes authorizes the agent to do all
    of the following:

    (A) Prepare, sign, and file federal, state, local, and foreign income, gift, payroll,
    property, Federal Insurance Contributions Act, and other tax returns, claims for
    refunds, requests for extension of time, petitions regarding tax matters, and
    any other tax-related documents, including receipts, offers, waivers, consents,
    including consents and agreements under section 2032A of the Internal Revenue
    Code of 1986, 26 U.S.C. 2032A, closing agreements, and any power of attorney required
    by the internal revenue service or other taxing authority with respect to a tax
    year upon which the statute of limitations has not run and the following twenty-five
    tax years;

    (B) Pay taxes due, collect refunds, post bonds, receive confidential information,
    and contest deficiencies determined by the internal revenue service or other taxing
    authority;

    (C) Exercise any election available to the principal under federal, state, local,
    or foreign tax law;

    (D) Act for the principal in all tax matters for all periods before the internal
    revenue service, or other taxing authority.'
