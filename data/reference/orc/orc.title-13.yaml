- number: '1331.17'
  heading: Public disclosure by attorney general
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: In carrying out official duties, the attorney general shall not disclose publicly
    the facts developed in an investigation conducted pursuant to this chapter unless
    the matter has become a matter of public record in enforcement proceedings, in
    public hearings, or other official proceedings, or unless the person from whom
    the information has been obtained consents to the public disclosure.
