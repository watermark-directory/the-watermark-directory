- number: '1301.303'
  heading: Course of performance, course of dealing, and usage of trade - UCC 1-303
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Course of performance, course of dealing, and usage of trade [UCC 1-303]

    (A) A "course of performance" is a sequence of conduct between the parties to
    a particular transaction that exists if:

    (1) The agreement of the parties with respect to the transaction involves repeated
    occasions for performance by a party; and

    (2) The other party, with knowledge of the nature of the performance and opportunity
    for objection to it, accepts the performance or acquiesces in it without objection.

    (B) A "course of dealing" is a sequence of conduct concerning previous transactions
    between the parties to a particular transaction that is fairly to be regarded
    as establishing a common basis of understanding for interpreting their expressions
    and other conduct.

    (C) A "usage of trade" is any practice or method of dealing having such regularity
    of observance in a place, vocation, or trade as to justify an expectation that
    it will be observed with respect to the transaction in question. The existence
    and scope of such a usage must be proved as facts. If it is established that such
    a usage is embodied in a trade code or similar record, the interpretation of the
    record is a question of law.

    (D) A course of performance or course of dealing between the parties or usage
    of trade in the vocation or trade in which they are engaged or of which they are
    or should be aware is relevant in ascertaining the meaning of the parties'' agreement,
    may give particular meaning to specific terms of the agreement, and may supplement
    or qualify the terms of the agreement. A usage of trade applicable in the place
    in which part of the performance under the agreement is to occur may be so utilized
    as to that part of the performance.

    (E) Except as otherwise provided in division (F) of this section, the express
    terms of an agreement and any applicable course of performance, course of dealing,
    or usage of trade must be construed whenever reasonable as consistent with each
    other. If such a construction is unreasonable:

    (1) Express terms prevail over course of performance, course of dealing, and usage
    of trade;

    (2) Course of performance prevails over course of dealing and usage of trade;
    and

    (3) Course of dealing prevails over usage of trade.

    (F) Subject to section 1302.12 of the Revised Code, a course of performance is
    relevant to show a waiver or modification of any term inconsistent with the course
    of performance.

    (G) Evidence of a relevant usage of trade offered by one party is not admissible
    unless that party has given the other party notice that the court finds sufficient
    to prevent unfair surprise to the other party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.303
- number: '1301.304'
  heading: Obligation of good faith - UCC 1-304
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Obligation of good faith [UCC 1-304]

    Every contract or duty within Chapters 1301., 1302., 1303., 1304., 1305., 1307.,
    1308., 1309., and 1310. of the Revised Code imposes an obligation of good faith
    in its performance and enforcement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.304
- number: '1301.305'
  heading: Remedies to be liberally administered - UCC 1-305
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Remedies to be liberally administered [UCC 1-305]

    (A) The remedies provided by Chapters 1301., 1302., 1303., 1304., 1305., 1307.,
    1308., 1309., and 1310. of the Revised Code must be liberally administered to
    the end that the aggrieved party may be put in as good a position as if the other
    party had fully performed but neither consequential or special damages nor penal
    damages may be had except as specifically provided in those chapters or by other
    rule of law.

    (B) Any right or obligation declared by Chapters 1301., 1302., 1303., 1304., 1305.,
    1307., 1308., 1309., and 1310. of the Revised Code is enforceable by action unless
    the provision declaring it specifies a different and limited effect.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.305
- number: '1301.306'
  heading: Waiver or renunciation of claim or right after breach - UCC 1-306
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Waiver or renunciation of claim or right after breach [UCC 1-306]

    A claim or right arising out of an alleged breach may be discharged in whole or
    in part without consideration by agreement of the aggrieved party in an authenticated
    record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.306
- number: '1301.307'
  heading: Prima facie evidence by third-party documents - UCC 1-307
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Prima facie evidence by third-party documents [UCC 1-307]

    A document in due form purporting to be a bill of lading, policy or certificate
    of insurance, official weigher''s or inspector''s certificate, consular invoice,
    or any other document authorized or required by the contract to be issued by a
    third party is prima facie evidence of its own authenticity and genuineness and
    of the facts stated in the document by the third party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.307
- number: '1301.308'
  heading: Performance or acceptance under reservation of rights - UCC 1-308
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Performance or acceptance under reservation of rights [UCC 1-308]

    (A) A party that with explicit reservation of rights performs or promises performance
    or assents to performance in a manner demanded or offered by the other party does
    not thereby prejudice the rights reserved. Such words as "without prejudice,"
    "under protest," or the like are sufficient.

    (B) Division (A) of this section does not apply to an accord and satisfaction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.308
- number: '1301.309'
  heading: Option to accelerate at will - UCC 1-309
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Option to accelerate at will [UCC 1-309]

    A term providing that one party or that party''s successor in interest may accelerate
    payment or performance or require collateral or additional collateral "at will"
    or when the party "deems itself insecure," or in words of similar import, means
    that the party has power to do so only if that party in good faith believes that
    the prospect of payment or performance is impaired. The burden of establishing
    lack of good faith is on the party against which the power has been exercised.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.309
- number: '1301.310'
  heading: Subordinated obligations - UCC 1-310
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Subordinated obligations [UCC 1-310]

    An obligation may be issued as subordinated to performance of another obligation
    of the person obligated, or a creditor may subordinate its right to performance
    of an obligation by agreement with either the person obligated or another creditor
    of the person obligated. Subordination does not create a security interest as
    against either the common debtor or a subordinated creditor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.310
- number: '1301.311'
  heading: Transactions entered into before 7-1-62 - UCC 10-102(2)
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Transactions entered into before 7-1-62 [UCC 10-102(2)]

    Transactions validly entered into before July 1, 1962, and the rights, duties,
    and interests flowing from them remain valid after that date and may be terminated,
    completed, consummated, or enforced as required or permitted by any statute or
    other law amended or repealed by Amended Senate Bill No. 5 of the 104th General
    Assembly as though that repeal or amendment had not occurred.

    Instruments, documents, or notices filed prior to July 1, 1962, in accordance
    with the law at the time of the filings shall be deemed to be filed under Chapters
    1301., 1302., 1304., 1305., 1307., 1308., 1309., and 1310. of the Revised Code
    as of the original date or filing and may be continued or terminated as provided
    in those chapters.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.311
- number: '1301.401'
  heading: Effect of recording documents
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: '(A) For purposes of this section, "public record" means either of the following:

    (1) Any document described or referred to in section 317.08 of the Revised Code;

    (2) Any document the filing or recording of which is required or allowed under
    any provision of Chapter 1309. of the Revised Code.

    (B) The recording with any county recorder of any document described in division
    (A)(1) of this section or the filing or recording with the secretary of state
    of any document described in division (A)(2) of this section shall be constructive
    notice to the whole world of the existence and contents of either document as
    a public record and of any transaction referred to in that public record, including,
    but not limited to, any transfer, conveyance, or assignment reflected in that
    record.

    (C) Any person contesting the validity or effectiveness of any transaction referred
    to in a public record is considered to have discovered that public record and
    any transaction referred to in the record as of the time that the record was first
    filed with the secretary of state or tendered to a county recorder for recording.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.401
- number: '1302.01'
  heading: Definitions - UCC 2-103 to 2-106
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1302'
    name: Sales
  text: '(A) As used in sections 1302.01 to 1302.98 of the Revised Code, unless the
    context otherwise requires:

    (1) "Buyer" means a person who buys or contracts to buy goods.

    (2) "Good faith" has the same meaning as in section 1301.201 of the Revised Code.

    (3) "Receipt" of goods means taking physical possession of them.

    (4) "Seller" means a person who sells or contracts to sell goods.

    (5) "Merchant" means a person who deals in goods of the kind or otherwise by the
    person''s occupation holds the person out as having knowledge or skill peculiar
    to the practices or goods involved in the transaction or to whom such knowledge
    or skill may be attributed by the person''s employment of an agent or broker or
    other intermediary who by the agent''s, broker''s, or other intermediary''s occupation
    holds the person out as having such knowledge or skill.

    (6) "Financing agency" means a bank, finance company, or other person who in the
    ordinary course of business make advances against goods or documents of title
    or who by arrangement with either the seller or the buyer intervenes in ordinary
    course to make or collect payment due or claimed under the contract for sale,
    as by purchasing or paying the seller''s draft or making advances against it or
    by merely taking it for collection whether or not documents of title accompany
    or are associated with the draft. "Financing agency" includes also a bank or other
    person who similarly intervenes between persons who are in the position of seller
    and buyer in respect to the goods under section 1302.81 of the Revised Code.

    (7) "Between merchants" means in any transaction with respect to which both parties
    are chargeable with the knowledge or skill of merchants.

    (8) "Goods" means all things (including specially manufactured goods) which are
    movable at the time of identification to the contract for sale other than the
    money in which the price is to be paid, investment securities, and things in action.
    "Goods" also includes the unborn young of animals and growing crops and other
    identified things attached to realty as described in section 1302.03 of the Revised
    Code.

    Goods must be both existing and identified before any interest in them can pass.
    Goods which are not both existing and identified are "Future" goods. A purported
    present sale of future goods or of any interest therein operates as a contract
    to sell.

    There may be a sale of a part interest in existing identified goods.

    An undivided share in an identified bulk of fungible goods is sufficiently identified
    to be sold although the quantity of the bulk is not determined. Any agreed proportion
    of such a bulk or any quantity thereof agreed upon by number, weight, or other
    measure may to the extent of the seller''s interest in the bulk be sold to the
    buyer who then becomes an owner in common.

    (9) "Lot" means a parcel or a single article which is the subject matter of a
    separate sale or delivery, whether or not it is sufficient to perform the contract.

    (10) "Commercial unit" means such a unit of goods as by commercial usage is a
    single whole for purposes of sale and division of which materially impairs its
    character or value on the market or in use. A commercial unit may be a single
    article (as a machine) or a set of articles (as a suite of furniture or an assortment
    of sizes) or a quantity (as a bale, gross, or carload) or any other unit treated
    in use or in the relevant market as a single whole.

    (11) "Contract" and "agreement" are limited to those relating to the present or
    future sale of goods. "Contract for sale" includes both a present sale of goods
    and a contract to sell goods at a future time. A "sale" consists in the passing
    of title from the seller to the buyer for a price. A "present sale" means a sale
    which is accomplished by the making of the contract.

    (12) Goods or conduct including any part of a performance are "conforming" or
    conform to the contract when they are in accordance with the obligations under
    the contract.

    (13) "Termination" occurs when either party pursuant to a power created by agreement
    or law puts an end to the contract otherwise than for its breach. On "termination"
    all obligations which are still executory on both sides are discharged but any
    right based on prior breach or performance survives.

    (14) "Cancellation" occurs when either party puts an end to the contract for breach
    by the other and its effect is the same as that of "termination" except that the
    cancelling party also retains any remedy for breach of the whole contract or any
    unperformed balance.

    (B) Other definitions applying to sections 1302.01 to 1302.98 of the Revised Code
    are:

    (1) "Acceptance", as defined in section 1302.64 of the Revised Code;

    (2) "Banker''s credit", as defined in section 1302.38 of the Revised Code;

    (3) "Confirmed credit", as defined in section 1302.38 of the Revised Code;

    (4) "Cover", as defined in section 1302.86 of the Revised Code;

    (5) "Entrusting", as defined in section 1302.44 of the Revised Code;

    (6) "Identification", as defined in section 1302.45 of the Revised Code;

    (7) "Installment contract", as defined in section 1302.70 of the Revised Code;

    (8) "Letter of credit", as defined in section 1302.38 of the Revised Code;

    (9) "Overseas", as defined in section 1302.36 of the Revised Code;

    (10) "Person in position of a seller", as defined in section 1302.81 of the Revised
    Code;

    (11) "Sale on approval", as defined in section 1302.39 of the Revised Code;

    (12) "Sale or return", as defined in section 1302.39 of the Revised Code.

    (C) As used in sections 1302.01 to 1302.98 of the Revised Code, "check" and "draft"
    have the meaning set forth in section 1303.03 of the Revised Code, "consignee"
    and "consignor" have the meaning set forth in section 1307.102 of the Revised
    Code, "consumer goods" has the meaning set forth in section 1309.102 of the Revised
    Code, "control" has the same meaning as set forth in section 1307.106 of the Revised
    Code, and "dishonor" has the meaning set forth in section 1303.62 of the Revised
    Code.

    (D) In addition, Chapter 1301. of the Revised Code contains general definitions
    and principles of construction and interpretation applicable throughout this chapter.'
