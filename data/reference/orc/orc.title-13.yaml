  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.13
- number: '1345.18'
  heading: Prior, verified consent required to switch natural gas or public telecommunications
    service provider
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) As used in this section:

    (1) "Consumer," "person," and "supplier" have the same meanings as in section
    1345.01 of the Revised Code.

    (2) "Consumer transaction" has the same meaning as in section 1345.01 of the Revised
    Code except that the sale, lease, assignment, award by chance, or other transfer
    of an item of goods, a service, a franchise, or an intangible, or solicitation
    to supply any of those things, to an individual is for purposes that are primarily
    other than personal, family, or household.

    (3) "Natural gas service" means the sale of natural gas, exclusive of any distribution
    or ancillary service.

    (4) "Public telecommunications service" means the transmission by electromagnetic
    or other means, other than by a telephone company as defined in section 4927.01
    of the Revised Code, of signs, signals, writings, images, sounds, messages, or
    data originating in this state regardless of actual call routing. "Public telecommunications
    service" excludes a system, including its construction, maintenance, or operation,
    for the provision of telecommunications service, or any portion of such service,
    by any entity for the sole and exclusive use of that entity, its parent, a subsidiary,
    or an affiliated entity, and not for resale, directly or indirectly; the provision
    of terminal equipment used to originate telecommunications service; broadcast
    transmission by radio, television, or satellite broadcast stations regulated by
    the federal government; or cable television service.

    (B)(1) No supplier, in connection with a consumer transaction involving natural
    gas service or public telecommunications service to a consumer in this state,
    shall request or submit, or cause to be requested or submitted, a change in the
    consumer''s provider of natural gas service or public telecommunications service,
    without first obtaining, or causing to be obtained, the verified consent of the
    consumer. For the purpose of this division and with respect to public telecommunications
    service only, the procedures necessary for verifying the consent of a consumer
    shall be those prescribed by rule by the public utilities commission for public
    telecommunications service under division (D) of section 4905.72 of the Revised
    Code. Also, for the purpose of this division, the act, omission, or failure of
    any officer, agent, or other individual, acting for or employed by another person,
    while acting within the scope of that authority or employment, is the act or failure
    of that other person.

    (2) Consistent with the exclusion, under 47 C.F.R. 64.1100(a)(3), of commercial
    mobile radio service providers from the verification requirements adopted in 47
    C.F.R. 64.1100, 64.1150, 64.1160, 64.1170, 64.1180, and 64.1190 by the federal
    communications commission, division (B)(1) of this section does not apply to a
    provider of commercial mobile radio service insofar as such provider is engaged
    in the provision of commercial mobile radio service. However, when that exclusion
    no longer is in effect, division (B)(1) of this section shall apply to such a
    provider.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.18
- number: '1345.19'
  heading: Jurisdiction
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) The courts of common pleas, and municipal or county courts within their
    respective jurisdictions, have jurisdiction over any supplier with respect to
    a violation of section 1345.18 of the Revised Code or any claim arising from a
    consumer transaction subject to that section.

    (B) The power, remedies, forfeitures, and penalties provided by sections 1345.18
    to 1345.20 and division (C) of section 1345.99 of the Revised Code are in addition
    to any other power, remedy, forfeiture, or penalty provided by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.19
- number: '1345.20'
  heading: Action by aggrieved consumer for switch in natural gas or public telecommunications
    service providers with consent
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) An aggrieved consumer may bring an action for a declaratory judgment,
    an injunction, or other appropriate relief against a supplier that is violating
    or has violated section 1345.18 of the Revised Code. The court may issue any order
    or enter a judgment as necessary to ensure compliance with section 1345.18 of
    the Revised Code or prevent any act or practice that violates that section. In
    addition, upon a preponderance of the evidence, the court:

    (1) Shall issue an order providing for all of the following:

    (a) Rescinding the aggrieved consumer''s change in service provider;

    (b) Requiring the supplier to absolve the aggrieved consumer of any liability
    for any charges assessed the consumer, or refund to the aggrieved consumer any
    charges collected from the consumer, by the supplier during such period, after
    the violation occurred, that is determined reasonable by the court;

    (c) Requiring the supplier to refund or pay to the aggrieved consumer any fees
    paid or costs incurred by the consumer resulting from the change of the consumer''s
    service provider or providers, or from the resumption of the consumer''s service
    with the service provider or providers from which the consumer was switched;

    (d) Requiring the supplier to make the consumer whole regarding any bonuses or
    benefits, such as airline mileage or product discounts, to which the consumer
    is entitled, by restoring bonuses or benefits the consumer lost as a result of
    the violation and providing bonuses or benefits the consumer would have earned
    if not for the violation, or by providing something of equal value.

    (2) May issue an order providing for any of the following:

    (a) Requiring the supplier to comply or undertake any necessary corrective action;

    (b) Assessing upon the supplier forfeitures of not more than one thousand dollars
    for each day of each violation. However, if the preponderance of the evidence
    shows that the supplier has engaged or is engaging in a pattern or practice of
    committing any such violations, the court may assess upon the supplier forfeitures
    of not more than five thousand dollars for each day of each violation. Upon collection,
    one-half of any such forfeiture assessed under this division shall be paid to
    the treasurer of the county in which the action was brought and one-half shall
    be paid into the state treasury to the credit of the general revenue fund.

    (B) Upon a finding in an action under division (A) of this section that a supplier
    is violating or has violated section 1345.18 of the Revised Code, a service provider
    or providers of natural gas service or public telecommunications service from
    whom the aggrieved consumer was switched may bring an action seeking the relief
    authorized by this division. Upon the filing of such action, the court may issue
    an order providing for either of the following:

    (1) Requiring the supplier to compensate the service provider or providers from
    which the aggrieved consumer was switched in the amount of all charges the consumer
    would have paid that particular service provider for the same or comparable service
    had the violation or failure to comply not occurred;

    (2) Requiring the supplier to compensate the service provider or providers from
    which the aggrieved consumer was switched for any costs that the particular service
    provider incurs as a result of making the consumer whole as provided in division
    (A)(1)(d) of this section or of effecting the resumption of the consumer''s service.

    (C) No action may be brought under division (A) of this section to recover for
    a transaction more than two years after the occurrence of a violation. No action
    may be brought under division (B) of this section more than one year after the
    date on which a ruling in an action brought under division (A) of this section
    was rendered.'
