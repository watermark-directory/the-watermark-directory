- number: '1321.663'
  heading: Consumer Installment Loan Act investigations - prohibited acts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'No person, in connection with any examination or investigation conducted
    by the superintendent of financial institutions under sections 1321.62 to 1321.702
    of the Revised Code shall knowingly do any of the following:

    (A) Circumvent, interfere with, obstruct, or fail to cooperate with the superintendent,
    including making a false or misleading statement, failing to produce records,
    or intimidating or suborning any witness;

    (B) Withhold, abstract, remove, mutilate, destroy, or secrete any books, records,
    computer records, or other information;

    (C) Tamper with, alter, or manufacture any evidence.'
