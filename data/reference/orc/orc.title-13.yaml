- number: '1315.101'
  heading: Approval of application for control acquisition
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) After accepting an application to acquire control of a licensee described
    in section 1315.10 of the Revised Code, the superintendent of financial institutions
    shall examine all of the facts and circumstances relating to the application.

    (B) The superintendent shall approve the application described in division (A)
    of this section if the superintendent determines both of the following:

    (1) The competence and experience of the applicant or applicants seeking to acquire
    control of a licensee and the applicant''s or applicants'' general fitness to
    operate the licensee or person in control of the licensee in a lawful and proper
    manner are acceptable.

    (2) The interests of the public are not jeopardized by the change of control.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.101
- number: '1315.11'
  heading: Conduct of activities through authorized delegate
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) A licensee that chooses to conduct money transmission activities in this
    state through an authorized delegate shall execute an express written contract
    with the authorized delegate that, at a minimum, sets forth all of the following:

    (1) The duties and responsibilities of the authorized delegate regarding money
    or its equivalent received from persons located in this state for transmission
    by the licensee;

    (2) The duties and responsibilities of the authorized delegate regarding instruments,
    devices, or processes used by the licensee to transmit money;

    (3) The duties and responsibilities of the authorized delegate with regard to
    compliance with laws regulating money transmission activities.

    (B) A licensee shall monitor the activities of its authorized delegate with regard
    to money or its equivalent received from persons in this state for transmission
    by the licensee and for compliance with all of the following:

    (1) The written contract between the licensee and the authorized delegate;

    (2) Sections 1315.01 to 1315.18 of the Revised Code;

    (3) Other laws applicable to the business of transmitting money.

    (C) As part of the examination of a licensee authorized by section 1315.12 of
    the Revised Code, the superintendent of financial institutions may examine the
    books and records and policies and procedures of the licensee''s authorized delegate.

    (D)(1) An authorized delegate or other person that receives money or its equivalent
    for transmission by a licensee shall keep it separate and shall not commingle
    it with other money or receipts. All money or its equivalent, less fees, that
    is received by an authorized delegate or by any other person for transmission
    by a licensee, from the time received until remitted to the licensee, shall constitute
    funds owned by and belonging to the licensee and shall be impressed with a trust
    for the benefit of the person from which the money or its equivalent is received.

    (2) If an authorized delegate or other person fails to comply with division (D)(1)
    of this section and commingles any money or its equivalent received for transmission
    by a licensee with any other funds or property owned or controlled by the authorized
    delegate or other person, all commingled proceeds and other property shall be
    impressed with a trust in favor of the licensee in an amount equal to the amount
    due the licensee.

    (E) No licensee shall fail to comply with division (A) or (B) of this section,
    and no authorized delegate or other person that receives money or its equivalent
    for transmission by a licensee shall fail to comply with division (D) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.11
- number: '1315.12'
  heading: Examination of records and affairs of licensee
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) As often as the superintendent of financial institutions considers necessary,
    the superintendent, or any deputy or examiner appointed or any contractor engaged
    by the superintendent for that purpose, thoroughly shall examine the records and
    affairs of each licensee. The examination shall include a review of all of the
    following:

    (1) Compliance with law;

    (2) Safety and soundness;

    (3) Other matters that the superintendent determines.

    (B) The superintendent may conduct all aspects of an examination described in
    division (A) of this section concurrently or may divide the examination into constituent
    parts and conduct them at various times.

    (C)(1) The licensee shall bear the expense of the examination. If the superintendent
    requests, the licensee shall advance to the superintendent the superintendent''s
    estimate of the cost of the examination, with any unconsumed portion to be returned
    to the licensee.

    (2) A licensee shall pay the cost of its examination conducted pursuant to this
    section, or any balance of the cost of its examination in the case of a licensee
    that advanced the estimated cost of its examination, within fourteen days of receiving
    an invoice for payment.

    (D) The superintendent shall preserve the report of each examination conducted
    pursuant to this section, including related correspondence received and copies
    of related correspondence sent, for twenty years after the examination date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.12
- number: '1315.121'
  heading: Administrative powers of superintendent
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) In administering sections 1315.01 to 1315.18 of the Revised Code and
    fulfilling the duties imposed by those sections, including the duty imposed by
    section 1315.12 of the Revised Code, the superintendent of financial institutions
    may do any of the following:

    (1) Participate with financial institution regulatory authorities of this and
    other states, the United States, and other countries in any of the following:

    (a) Programs for alternate examinations of the records and affairs of licensees
    and other money transmitters over which they have concurrent jurisdiction;

    (b) Joint or concurrent examinations of the records and affairs of licensees and
    other money transmitters over which they have concurrent jurisdiction;

    (c) Coordinated examinations of the records and affairs of licensees and other
    money transmitters over which they have collective jurisdiction.

    (2) Conduct, participate in, or coordinate independent, concurrent, joint, or
    coordinated examinations of the records and affairs of licensees and other money
    transmitters and otherwise act on behalf of financial institution regulatory authorities
    of this and other states, the United States, and other countries having jurisdiction
    over the licensees and other money transmitters;

    (3) Rely on information leading to, arising from, or obtained in the course of
    examinations conducted by financial institution regulatory authorities of this
    and other states, the United States, and other countries when both of the following
    apply:

    (a) Pursuant to agreement and applicable law, the superintendent may receive and
    use the information leading to, arising from, or obtained in the course of the
    other regulatory authorities'' examinations in administering sections 1315.01
    to 1315.18 of the Revised Code and acting under the authority of those sections;

    (b) In the superintendent''s judgment the other regulatory authorities'' personnel,
    practices, and authority warrant the superintendent''s reliance.

    (4) Authorize financial institution regulatory authorities of this and other states,
    the United States, and other countries to receive and use information leading
    to, arising from, or obtained in the course of examinations conducted by the division
    of financial institutions in the same manner and for the purposes they could use
    information leading to, arising from, or obtained in the course of their own examinations
    when both of the following apply:

    (a) Pursuant to applicable law, information leading to, arising from, or obtained
    in the course of examinations the other regulatory authorities conduct is protected
    from general disclosure and may only be disclosed for purposes similar to those
    provided in section 1315.122 of the Revised Code, which are principally regulatory
    in nature, for disclosure of information leading to, arising from, or obtained
    in the course of examinations conducted by the division;

    (b) Pursuant to agreement and applicable law, information leading to, arising
    from, or obtained in the course of examinations conducted by the division will,
    in the other regulatory authorities'' possession or the possession of any persons
    to whom the other regulatory authorities disclosed the information as a part of
    examinations of those persons, be protected from disclosure to the same extent
    as information leading to, arising from, or obtained in the course of those regulatory
    authorities'' examinations.

    (5) Rely on the actions of financial institution regulatory authorities of this
    and other states, the United States, or other countries, or participate with them
    jointly, in responding to violations of law, unsafe or unsound practices, breaches
    of fiduciary duty, or other regulatory concerns affecting licensees and other
    money transmitters over which they have concurrent jurisdiction when the other
    regulatory authorities have adequate personnel, practices, and authority to warrant
    the reliance;

    (6) Implement other cooperative arrangements with financial institution regulatory
    authorities of this and other states, the United States, and other countries consistent
    with safety and soundness.

    (B) No person shall use any reliance by the superintendent, in whole or in part,
    on financial institution regulatory authorities of this or other states, the United
    States, or other countries in accordance with division (A) of this section to
    support any assertion of either of the following:

    (1) Failure of the superintendent or division to properly administer sections
    1315.01 to 1315.18 of the Revised Code or fulfill the duties imposed by those
    sections;

    (2) Disagreement by the superintendent or division with any action taken by financial
    institution regulatory authorities of this or other states, the United States,
    or other countries.

    (C) In conducting, participating in, or coordinating independent, concurrent,
    joint, or coordinated examinations of the records and affairs of licensees and
    other money transmitters, the superintendent may purchase services from financial
    institution regulatory authorities of this and other states, the United States,
    and other countries, including services provided by employees of other financial
    institution regulatory authorities in their capacities as employees of other financial
    institution regulatory authorities. The purchase of services from one or more
    financial institution regulatory authorities of this and other states, the United
    States, or other countries is the purchase of services from a sole source provider
    and is not the employment of any financial institution regulatory authority or
    any of its employees.

    The authority to purchase services pursuant to this division does not impair the
    superintendent''s authority to purchase services from any other source.'
