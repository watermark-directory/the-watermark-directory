- number: '1309.706'
  heading: When initial financing statement suffices to continue effectiveness of
    financing statement - UCC 9-706
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) The filing of an initial financing statement in the office specified
    in section 1309.501 of the Revised Code continues the effectiveness of a financing
    statement filed before July 1, 2001, if:

    (1) The filing of an initial financing statement in that office would be effective
    to perfect a security interest under this chapter.

    (2) The financing statement filed before July 1, 2001, was filed in an office
    in another state or another office in this state; and

    (3) The initial financing statement satisfies division (C) of this section.

    (B) The filing of an initial financing statement under division (A) of this section
    continues the effectiveness of the financing statement filed before July 1, 2001:

    (1) If the initial financing statement is filed before July 1, 2001, for the period
    provided in section 1309.40 of the Revised Code, as it existed prior to July 1,
    2001, with respect to a financing statement; and

    (2) If the initial financing statement is filed after July 1, 2001, for the period
    provided in section 1309.515 of the Revised Code, as it exists on July 1, 2001,
    with respect to an initial financing statement.

    (C) To be effective for purposes of division (A) of this section, an initial financing
    statement shall:

    (1) Satisfy the requirements of sections 1309.501 to 1309.527 of the Revised Code,
    as they exist on July 1, 2001, for an initial financing statement;

    (2) Identify the financing statement filed before July 1, 2001, by indicating
    the office in which the financing statement was filed and providing the dates
    of filing and file numbers, if any, of the financing statement and of the most
    recent continuation statement filed with respect to the financing statement; and

    (3) Indicate that the financing statement filed before July 1, 2001, remains effective.'
