- number: '1315.16'
  heading: Enforcement powers of superintendent
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) The superintendent of financial institutions may do both of the following:

    (1) Summon and compel, by order or subpoena, witnesses to appear before the superintendent,
    deputy superintendent, examiner, or attorney examiner, and testify under oath
    regarding the affairs of a licensee or other person;

    (2) Compel, by order or subpoena, the production of any record, book, paper, document,
    item, or other thing pertaining to a licensee or other person.

    (B) The superintendent shall serve an order or subpoena issued pursuant to division
    (A) of this section in any manner provided by section 1315.161 of the Revised
    Code.

    (C) If a person fails to comply with an order or subpoena of the superintendent
    or refuses to testify to any matter regarding which the person is lawfully interrogated
    before the superintendent, on application of the superintendent, the court of
    common pleas of the county in which the person resides or in which the principal
    place of business of the person is located, or a judge of the court, shall compel
    compliance by attachment proceedings as for contempt in the case of noncompliance
    with a subpoena issued from the court or refusal to testify in the court.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1315.16
- number: '1315.161'
  heading: Service of notice, subpoena, or order
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) The superintendent of financial institutions may serve any notice that
    the superintendent is required or authorized to give and any subpoena or order
    that the superintendent is required or authorized to issue pursuant to sections
    1315.01 to 1315.18 of the Revised Code, at the sole discretion of the superintendent,
    by any of the following means:

    (1) In person by the superintendent or an employee or agent of the division of
    financial institutions;

    (2) By regular mail;

    (3) By registered or certified mail;

    (4) By private carrier;

    (5) By any other means permitted by the Rules of Civil Procedure for service of
    process;

    (6) By any other manner the superintendent provides, by rule or otherwise, that
    is reasonably calculated to give notice, including by publication.

    (B) A notice, subpoena, or order served by the superintendent in accordance with
    this section is effective upon delivery with respect to divisions (A)(1) and (4)
    of this section, upon placing in the regular mail with respect to divisions (A)(2)
    and (3) of this section, and upon publication or completion of the act reasonably
    calculated to give notice with respect to division (A)(6) of this section.

    (C) Fees for service of a notice, subpoena, or order described in division (A)
    of this section shall be paid from amounts appropriated to the division of financial
    institutions for that purpose.'
