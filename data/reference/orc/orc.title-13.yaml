- number: '1322.46'
  heading: Disclosures in advertising
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) A registrant or mortgage loan originator shall disclose in any printed,
    televised, broadcast, electronically transmitted, or published advertisement relating
    to the registrant''s or mortgage loan originator''s services, including on any
    electronic site accessible through the internet, the business name of the registrant
    or mortgage loan originator and the unique identifier of the registrant or mortgage
    loan originator.

    (B) In making any advertisement, a registrant shall comply with 12 C.F.R. 226.16,
    as amended.'
