- number: '1301.204'
  heading: Value - UCC 1-204
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Value [UCC 1-204]

    Except as otherwise provided in Chapters 1303., 1304., and 1305. of the Revised
    Code, a person gives value for rights if the person acquires them:

    (A) In return for a binding commitment to extend credit or for the extension of
    immediately available credit, whether or not drawn upon and whether or not a charge-back
    is provided for in the event of difficulties in collection;

    (B) As security for, or in total or partial satisfaction of, a preexisting claim;

    (C) By accepting delivery under a preexisting contract for purchase; or

    (D) In return for any consideration sufficient to support a simple contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.204
- number: '1301.205'
  heading: Reasonable time; Seasonableness [UCC 1-205]
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Reasonable time; Seasonableness [UCC 1-205]

    (A) Whether a time for taking an action required by Chapters 1301., 1302., 1303.,
    1304., 1305., 1307., 1308., 1309., and 1310. of the Revised Code is reasonable
    depends on the nature, purpose, and circumstances of the action.

    (B) An action is taken seasonably if it is taken at or within the time agreed
    or, if no time is agreed, at or within a reasonable time.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.205
- number: '1301.206'
  heading: Presumptions - UCC 1-206
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Presumptions [UCC 1-206]

    Whenever Chapter 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309., or 1310.
    of the Revised Code creates a "presumption" with respect to a fact, or provides
    that a fact is "presumed," the trier of fact must find the existence of the fact
    unless and until evidence is introduced that supports a finding of its nonexistence.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.206
- number: '1301.301'
  heading: Territorial applicability; parties' power to choose applicable law - UCC
    1-301
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Territorial applicability; parties'' power to choose applicable law [UCC
    1-301]

    (A) Except as otherwise provided in this section, when a transaction bears a reasonable
    relation to this state and also to another state or nation the parties may agree
    that the law either of this state or of such other state or nation shall govern
    their rights and duties.

    (B) In the absence of an agreement effective under division (A) of this section,
    and except as provided in division (C) of this section, Chapters 1301., 1302.,
    1303., 1304., 1305., 1307., 1308., 1309., and 1310. of the Revised Code apply
    to transactions bearing an appropriate relation to this state.

    (C) If one of the following provisions of Chapters 1301., 1302., 1303., 1304.,
    1305., 1307., 1308., 1309., and 1310. of the Revised Code specifies the applicable
    law, that provision governs and a contrary agreement is effective only to the
    extent permitted by the law so specified:

    (1) Section 1302.43 of the Revised Code;

    (2) Sections 1310.03 and 1310.04 of the Revised Code;

    (3) Section 1304.02 of the Revised Code;

    (4) Section 1304.85 of the Revised Code;

    (5) Section 1305.15 of the Revised Code;

    (6) Section 1308.05 of the Revised Code;

    (7) Sections 1309.301 to 1309.307 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.301
- number: '1301.302'
  heading: Variation by agreement - UCC 1-302
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Variation by agreement [UCC 1-302]

    (A) Except as otherwise provided in division (B) of this section or elsewhere
    in Chapter 1301., 1303., 1304., 1305., 1307., 1308., 1309., or 1310. of the Revised
    Code, the effect of provisions of Chapters 1301., 1303., 1304., 1305., 1307.,
    1308., 1309., and 1310. of the Revised Code may be varied by agreement.

    (B) The obligations of good faith, diligence, reasonableness, and care prescribed
    by Chapter 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309., or 1310. of
    the Revised Code may not be disclaimed by agreement. The parties, by agreement,
    may determine the standards by which the performance of those obligations is to
    be measured if those standards are not manifestly unreasonable. Whenever Chapter
    1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309., or 1310. of the Revised
    Code requires an action to be taken within a reasonable time, a time that is not
    manifestly unreasonable may be fixed by agreement.

    (C) The presence in certain provisions of Chapter 1301., 1302., 1303., 1304.,
    1305., 1307., 1308., 1309., or 1310. of the Revised Code of the phrase "unless
    otherwise agreed", or words of similar import, does not imply that the effect
    of other provisions may not be varied by agreement under this section.'
