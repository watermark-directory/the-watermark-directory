- number: '1309.407'
  heading: Restriction on creation or enforcement of security interest in leasehold
    interest or in lessor's residual interest - UCC 9-407
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (B) of this section, a term
    in a lease agreement is not effective to the extent that it:

    (1) Prohibits, restricts, or requires the consent of a party to the lease to the
    assignment or transfer of, or the creation, attachment, perfection, or enforcement
    of a security interest in, an interest of a party under the lease contract or
    in the lessor''s residual interest in the goods; or

    (2) Provides that the assignment or transfer or the creation, attachment, perfection,
    or enforcement of the security interest may give rise to a default, breach, right
    of recoupment, claim, defense, termination, right of termination, or remedy under
    the lease.

    (B) Except as otherwise provided in division (G) of section 1310.31 of the Revised
    Code, a term in a lease agreement described in division (A)(2) of this section
    is effective to the extent that there is:

    (1) A transfer by the lessee of the lessee''s right of possession or use of the
    goods in violation of the term; or

    (2) A delegation of a material performance of either party to the lease contract
    in violation of the term.

    (C) The creation, attachment, perfection, or enforcement of a security interest
    in the lessor''s interest under the lease contract or the lessor''s residual interest
    in the goods is not a transfer that materially impairs the lessee''s prospect
    of obtaining return performance or materially changes the duty of or materially
    increases the burden or risk imposed on the lessee within the scope of division
    (D) of section 1310.31 of the Revised Code unless, and then only to the extent
    that, enforcement actually results in a delegation of material performance of
    the lessor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.407
- number: '1309.408'
  heading: Restrictions on assignment of promissory notes, health-care-insurance receivables,
    and certain general intangibles ineffective - UCC 9-408
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (B) of this section, a term
    in a promissory note or in an agreement between an account debtor and a debtor
    that relates to a health-care-insurance receivable or a general intangible, including
    a contract, permit, license, or franchise, and which term prohibits, restricts,
    or requires the consent of the person obligated on the promissory note or the
    account debtor to, the assignment or transfer of, or creation, attachment, or
    perfection of a security interest in, the promissory note, health-care-insurance
    receivable, or general intangible, is not effective to the extent that the term:

    (1) Would impair the creation, attachment, or perfection of a security interest;
    or

    (2) Provides that the assignment or transfer or the creation, attachment, or perfection
    of the security interest may give rise to a default, breach, right of recoupment,
    claim, defense, termination, right of termination, or remedy under the promissory
    note, health-care-insurance receivable, or general intangible.

    (B) Division (A) applies to a security interest in a payment intangible or promissory
    note only if the security interest arises out of a sale of the payment intangible
    or promissory note, other than a sale pursuant to a disposition under section
    1309.610 of the Revised Code or an acceptance of collateral under section 1309.620
    of the Revised Code.

    (C) A rule of law, statute, or regulation that prohibits, restricts, or requires
    the consent of a government, governmental body or official, person obligated on
    a promissory note, or account debtor to the assignment or transfer of, or creation
    of a security interest in, a promissory note, health-care-insurance receivable,
    or general intangible, including a contract, permit, license, or franchise between
    an account debtor and a debtor, is not effective to the extent that the rule of
    law, statute, or regulation:

    (1) Would impair the creation, attachment, or perfection of a security interest;
    or

    (2) Provides that the assignment or transfer or the creation, attachment, or perfection
    of the security interest may give rise to a default, breach, right of recoupment,
    claim, defense, termination, right of termination, or remedy under the promissory
    note, health-care-insurance receivable, or general intangible.

    (D) To the extent that a term in a promissory note or in an agreement between
    an account debtor and a debtor that relates to a health-care-insurance receivable
    or general intangible or a rule of law, statute, or regulation described in division
    (C) of this section would be effective under law other than this chapter but is
    ineffective under division (A) or (C) of this section, the creation, attachment,
    or perfection of a security interest in the promissory note, health-care-insurance
    receivable, or general intangible:

    (1) Is not enforceable against the person obligated on the promissory note or
    the account debtor;

    (2) Does not impose a duty or obligation on the person obligated on the promissory
    note or the account debtor;

    (3) Does not require the person obligated on the promissory note or the account
    debtor to recognize the security interest, pay or render performance to the secured
    party, or accept payment or performance from the secured party;

    (4) Does not entitle the secured party to use or assign the debtor''s rights under
    the promissory note, health-care-insurance receivable, or general intangible,
    including any related information or materials furnished to the debtor in the
    transaction giving rise to the promissory note, health-care-insurance receivable,
    or general intangible;

    (5) Does not entitle the secured party to use, assign, possess, or have access
    to any trade secrets or confidential information of the person obligated on the
    promissory note or the account debtor; and

    (6) Does not entitle the secured party to enforce the security interest in the
    promissory note, health-care-insurance receivable, or general intangible.

    (E) Divisions (A) and (C) of this section do not apply to:

    (1) A claim or right to receive compensation for injuries or sickness as described
    in section 104(a)(1) or (2) of the Internal Revenue Code as amended; or

    (2) A claim or right to receive benefits under a special needs trust as described
    in the "Omnibus Budget Reconciliation Act of 1993," 107 Stat. 312, 42 U.S.C. 1396p(d)(4),
    as amended.

    (F) Divisions (A), (C), and (E) of this section apply only to a security interest
    created on or after July 1, 2001. Nothing in this section shall supersede the
    provisions of sections 2323.58 to 2323.587 of the Revised Code. This section shall
    be interpreted consistently with sections 2323.58 to 2323.587 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.408
- number: '1309.409'
  heading: Restrictions on assignment of letter-of-credit rights ineffective - UCC
    9-409
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A term in a letter of credit or a rule of law, statute, regulation, custom,
    or practice applicable to the letter of credit that prohibits, restricts, or requires
    the consent of an applicant, issuer, or nominated person to a beneficiary''s assignment
    of or creation of a security interest in a letter-of-credit right is not effective
    to the extent that the term or rule or law, statute, regulation, custom, or practice:

    (1) Would impair the creation, attachment, or perfection of a security interest
    in the letter-of-credit right; or

    (2) Provides that the assignment or the creation, attachment, or perfection of
    the security interest may give rise to a default, breach, right of recoupment,
    claim, defense, termination, right of termination, or remedy under the letter-of-credit
    right.

    (B) To the extent that a term in a letter of credit is not effective under division
    (A) of this section but would be effective under law other than this chapter or
    under a custom or practice applicable to the letter of credit, to the transfer
    of a right to draw or otherwise demand performance under the letter of credit,
    or to the assignment of a right to proceeds of the letter of credit, the creation,
    attachment, or perfection of a security interest in the letter-of-credit right:

    (1) Is not enforceable against the applicant, issuer, nominated person, or transferee
    beneficiary;

    (2) Imposes no duties or obligations on the applicant, issuer, nominated person,
    or transferee beneficiary; and

    (3) Does not require the applicant, issuer, nominated person, or transferee beneficiary
    to recognize the security interest, pay or render performance to the secured party,
    or accept payment or other performance from the secured party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.409
- number: '1309.501'
  heading: Filing office - UCC 9-501
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as provided in division (B) of this section, if the local law
    of this state governs perfection of a security interest or agricultural lien,
    the office in which to file a financing statement to perfect the security interest
    or agricultural lien is:

    (1) The office designated for the filing or recording of a record of a mortgage
    on the related real property, if:

    (a) The collateral is as-extracted collateral or timber to be cut; or

    (b) The financing statement is filed as a fixture filing, and the collateral is
    goods that are or are to become fixtures.

    (2) The office of the secretary of state or any office duly authorized by the
    secretary of state, in all other cases, including a case in which the collateral
    is goods that are or are to become fixtures, and the financing statement is not
    filed as a fixture filing.

    (B) The office in which to file a financing statement to perfect a security interest
    in collateral, including fixtures, of a transmitting utility is the office of
    the secretary of state. The financing statement also constitutes a fixture filing
    as to the collateral indicated in the financing statement that is or is to become
    fixtures.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.501
- number: '1309.502'
  heading: Contents of financing statement - record of mortgage as financing statement
    - time of filing financing statement - UCC 9-502
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Subject to division (B) of this section, a financing statement is sufficient
    only if it:

    (1) Provides the name of the debtor;

    (2) Provides the name of the secured party or a representative of the secured
    party; and

    (3) Indicates the collateral covered by the financing statement.

    (B) Except as otherwise provided in division (B) of section 1309.501 of the Revised
    Code, to be sufficient, a financing statement that covers as-extracted collateral
    or timber to be cut, or that is filed as a fixture filing and covers goods that
    are or are to become fixtures, shall satisfy division (A) of this section and
    also:

    (1) Indicate that it covers this type of collateral;

    (2) Indicate that it is to be filed in the real property records;

    (3) Provide a description of the real property to which the collateral is related
    sufficient to give constructive notice of a mortgage under the laws of this state
    if the description were contained in a record of the mortgage of the real property;
    and

    (4) If the debtor does not have an interest of record in the real property, provide
    the name of a record owner.

    (C) A record of a mortgage is effective, from the date of recording, as a financing
    statement filed as a fixture filing or as a financing statement covering as-extracted
    collateral or timber to be cut only if:

    (1) The record indicates the goods or accounts that it covers;

    (2) The goods are or are to become fixtures related to the real property described
    in the record, or the collateral is related to the real property described in
    the record and is as-extracted collateral or timber to be cut;

    (3) The record satisfies the requirements for a financing statement contained
    in this section, but:

    (a) The record need not indicate that it is to be filed in the real property records;
    and

    (b) The record sufficiently provides the name of a debtor who is an individual
    if it provides the individual name of the debtor or the surname and first personal
    name of the debtor, even if the debtor is an individual to whom division (A)(4)
    of section 1309.503 of the Revised Code applies; and

    (4) The record is duly recorded.

    (D) A financing statement may be filed before a security agreement is made or
    a security interest otherwise attaches.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.502
- number: '1309.503'
  heading: Name of debtor and secured party - UCC 9-503
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A financing statement sufficiently provides the name of the debtor:

    (1) Except as otherwise provided in division (A)(3) of this section, if the debtor
    is a registered organization or the collateral is held in a trust that is a registered
    organization, only if the financing statement provides the name that is stated
    to be the registered organization''s name on the public organic record most recently
    filed with or issued or enacted by the registered organization''s jurisdiction
    of organization which purports to state, amend, or restate the registered organization''s
    name;

    (2) Subject to division (F) of this section, if the collateral is being administered
    by the personal representative of a decedent, only if the financing statement
    provides, as the name of the debtor, the name of the decedent and, in a separate
    part of the financing statement, indicates that the collateral is being administered
    by a personal representative;

    (3) If the collateral is held in a trust that is not a registered organization,
    only if the financing statement:

    (a) Provides, as the name of the debtor:

    (i) If the organic record of the trust specifies a name for the trust, the name
    specified; or

    (ii) If the organic record of the trust does not specify a name for the trust,
    the name of the settlor or testator; and

    (b) In a separate part of the financing statement:

    (i) If the name is provided in accordance with division (A)(3)(a)(i) of this section,
    indicates that the collateral is held in a trust; or

    (ii) If the name is provided in accordance with division (A)(3)(a)(ii) of this
    section, provides additional information sufficient to distinguish the trust from
    other trusts having one or more of the same settlors or the same testator and
    indicates that the collateral is held in a trust, unless the additional information
    so indicates.

    (4) Subject to division (G) of this section, if the debtor is an individual to
    whom this state has issued a driver''s license or identification card that has
    not expired, only if the financing statement provides the name of the individual
    that is indicated on the driver''s license or identification card;

    (5) If the debtor is an individual to whom division (A)(4) of this section does
    not apply, only if the financing statement provides the individual name of the
    debtor or the surname and first personal name of the debtor; and

    (6) In other cases:

    (a) If the debtor has a name, only if the financing statement provides the organizational
    name of the debtor; and

    (b) If the debtor does not have a name, only if it provides the names of the partners,
    members, associates, or other persons comprising the debtor, in a manner that
    each name provided would be sufficient if the person named were the debtor.

    (B) A financing statement that provides the name of the debtor in accordance with
    division (A) of this section is not rendered ineffective by the absence of:

    (1) A trade name or other name of the debtor; or

    (2) Unless required under division (A)(6)(b) of this section, names of partners,
    members, associates, or other persons comprising the debtor.

    (C) A financing statement that provides only the debtor''s trade name does not
    sufficiently provide the name of the debtor.

    (D) Failure to indicate the representative capacity of a secured party or representative
    of a secured party does not affect the sufficiency of a financing statement.

    (E) A financing statement may provide the name of more than one debtor and the
    name of more than one secured party.

    (F) The name of the decedent indicated on the order appointing the personal representative
    of the decedent issued by the court having jurisdiction over the collateral is
    sufficient as the "name of the decedent" under division (A)(2) of this section.

    (G) If this state has issued to an individual more than one driver''s license
    or identification card of a kind described in division (A)(4) of this section,
    the one that was issued most recently is the one to which division (A)(4) of this
    section refers.

    (H) As used in this section, "name of the settlor or testator" means:

    (1) If the settlor is a registered organization, the name that is stated to be
    the settlor''s name on the public organic record most recently filed with or issued
    or enacted by the settlor''s jurisdiction of organization that purports to state,
    amend, or restate the settlor''s name; or

    (2) In other cases, the name of the settlor or testator indicated in the trust''s
    organic record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.503
- number: '1309.504'
  heading: Indication of collateral - UCC 9-504
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'A financing statement sufficiently indicates the collateral that it covers
    if the financing statement provides:

    (A) A description of the collateral pursuant to section 1309.108 of the Revised
    Code; or

    (B) An indication that the financing statement covers all assets or all personal
    property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.504
- number: '1309.505'
  heading: Filing and compliance with other statutes and treaties for consignments,
    leases, other bailments, and other transactions - UCC 9-505
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A consignor, lessor, or other bailor of goods, a licensor, or a buyer
    of a payment intangible or promissory note may file a financing statement, or
    may comply with a statute or treaty described in division (A) of section 1309.311
    of the Revised Code, using the terms "consignor," "consignee," "lessor," "lessee,"
    "bailor," "bailee," "licensor," "licensee," "owner," "registered owner," "buyer,"
    "seller," or words of similar import, instead of the terms "secured party" and
    "debtor."

    (B) Sections 1309.501 to 1309.527 of the Revised Code apply to the filing of a
    financing statement under division (A) of this section and, as appropriate, to
    compliance that is equivalent to filing a financing statement under division (B)
    of section 1309.311 of the Revised Code, but the filing or compliance is not of
    itself a factor in determining whether the collateral secures an obligation. If
    it is determined for another reason that the collateral secures an obligation,
    a security interest held by the consignor, lessor, bailor, licensor, owner, or
    buyer that attaches to the collateral is perfected by the filing or compliance.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.505
- number: '1309.506'
  heading: Effect of errors or omissions - UCC 9-506
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A financing statement that substantially satisfies the requirements of
    sections 1309.501 to 1309.527 of the Revised Code is effective, even if it has
    minor errors or omissions, unless the errors or omissions make the financing statement
    seriously misleading.

    (B) Except as otherwise provided in division (C) of this section, a financing
    statement that fails sufficiently to provide the name of the debtor in accordance
    with division (A) of section 1309.503 of the Revised Code is seriously misleading.

    (C) If a search of the records of the filing office under the debtor''s correct
    name, using the filing office''s standard search logic, if any, would disclose
    a financing statement that fails sufficiently to provide the name of the debtor
    in accordance with division (A) of section 1309.503 of the Revised Code, the name
    provided does not make the financing statement seriously misleading.

    (D) For purposes of division (B) of section 1309.508 of the Revised Code, the
    "debtor''s correct name" referred to in division (C) of this section means the
    correct name of the new debtor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.506
- number: '1309.507'
  heading: Effect of certain events on effectiveness of financing statement - UCC
    9-507
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A filed financing statement remains effective with respect to collateral
    that is sold, exchanged, leased, licensed, or otherwise disposed of and in which
    a security interest or agricultural lien continues, even if the secured party
    knows of or consents to the disposition.

    (B) Except as otherwise provided in division (C) of this section and section 1309.508
    of the Revised Code, a financing statement is not rendered ineffective if, after
    the financing statement is filed, the information provided in the financing statement
    becomes seriously misleading under section 1309.506 of the Revised Code.

    (C) If the name that a filed financing statement provides for a debtor becomes
    insufficient as the name of the debtor under division (A) of section 1309.503
    of the Revised Code so that the financing statement becomes seriously misleading
    under section 1309.506 of the Revised Code:

    (1) The financing statement is effective to perfect a security interest in collateral
    acquired by the debtor before, or within four months after, the filed financing
    statement becomes seriously misleading; and

    (2) The financing statement is not effective to perfect a security interest in
    collateral acquired by the debtor more than four months after the filed financing
    statement becomes seriously misleading, unless an amendment to the financing statement
    that renders the financing statement not seriously misleading is filed within
    four months after the financing statement became seriously misleading.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.507
- number: '1309.508'
  heading: Effectiveness of financing statement if new debtor becomes bound by security
    agreement - UCC 9-508
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in this section, a filed financing statement
    naming an original debtor is effective to perfect a security interest in collateral
    in which a new debtor has or acquires rights to the extent that the financing
    statement would have been effective had the original debtor acquired rights in
    the collateral.

    (B) If the difference between the name of the original debtor and that of the
    new debtor causes a filed financing statement that is effective under division
    (A) of this section to be seriously misleading under section 1309.506 of the Revised
    Code:

    (1) The financing statement is effective to perfect a security interest in collateral
    acquired by the new debtor before, and within four months after, the new debtor
    becomes bound under division (D) of section 1309.203 of the Revised Code; and

    (2) The financing statement is not effective to perfect a security interest in
    collateral acquired by the new debtor more than four months after the new debtor
    becomes bound under division (D) of section 1309.203 of the Revised Code unless
    an initial financing statement providing the name of the new debtor is filed before
    the expiration of that time.

    (C) This section does not apply to collateral as to which a filed financing statement
    remains effective against the new debtor under division (A) of section 1309.507
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.508
- number: '1309.509'
  heading: Persons entitled to file a record - UCC 9-509
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A person may file an initial financing statement, amendment that adds
    collateral covered by a financing statement, or amendment that adds a debtor to
    a financing statement only if:

    (1) The debtor authorizes the filing in an authenticated record or pursuant to
    division (B) or (C) of this section; or

    (2) The person holds an agricultural lien that has become effective at the time
    of filing, and the financing statement covers only collateral in which the person
    holds an agricultural lien.

    (B) By authenticating or becoming bound as debtor by a security agreement, a debtor
    or new debtor authorizes the filing of an initial financing statement, and an
    amendment, covering:

    (1) The collateral described in the security agreement; and

    (2) Property that becomes collateral under division (A)(2) of section 1309.315
    of the Revised Code, whether or not the security agreement expressly covers proceeds.

    (C) By acquiring collateral in which a security interest or agricultural lien
    continues under division (A)(1) of section 1309.315 of the Revised Code, a debtor
    authorizes the filing of an initial financing statement, and an amendment, covering
    the collateral and property that becomes collateral under division (A)(2) of section
    1309.315 of the Revised Code.

    (D) A person may file an amendment other than an amendment that adds collateral
    covered by a financing statement or an amendment that adds a debtor to a financing
    statement only if:

    (1) The secured party of record authorizes the filing; or

    (2) The amendment is a termination statement for a financing statement as to which
    the secured party of record has failed to file or send a termination statement
    as required by division (A) or (C) of section 1309.513 of the Revised Code, the
    debtor authorizes the filing, and the termination statement indicates that the
    debtor authorized it to be filed.

    (E) If there is more than one secured party of record for a financing statement,
    each secured party of record may authorize the filing of an amendment under division
    (D) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.509
- number: '1309.510'
  heading: Effectiveness of filed record - UCC 9-510
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A filed record is effective only to the extent that it was filed by a
    person who is permitted to file it under section 1309.509 of the Revised Code.

    (B) A record authorized by one secured party of record does not affect the financing
    statement with respect to another secured party of record.

    (C) A continuation statement that is not filed within the six-month period prescribed
    by division (D) of section 1309.515 of the Revised Code is not effective.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.510
- number: '1309.511'
  heading: Secured party of record - UCC 9-511
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A secured party of record with respect to a financing statement is a
    person whose name is provided as the name of the secured party or a representative
    of the secured party in an initial financing statement that has been filed. If
    an initial financing statement is filed under division (A) of section 1309.514
    of the Revised Code, the assignee named in the initial financing statement is
    the secured party of record with respect to the financing statement.

    (B) If an amendment of a financing statement that provides the name of a person
    as a secured party or a representative of a secured party is filed, the person
    named in the amendment is a secured party of record. If an amendment is filed
    under division (B) of section 1309.514 of the Revised Code, the assignee named
    in the amendment is a secured party of record.

    (C) A person remains a secured party of record until an amendment of the financing
    statement is filed that deletes the person as a secured party of record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.511
- number: '1309.512'
  heading: Amendment of financing statement - UCC 9-512
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Subject to section 1309.509 of the Revised Code, a person may add or
    delete collateral covered by, continue or terminate the effectiveness of, or,
    subject to division (E) of this section, otherwise amend the information provided
    in, a financing statement by filing an amendment that:

    (1) Identifies, by its file number, the initial financing statement to which the
    amendment relates; and

    (2) If the amendment relates to an initial financing statement filed in a filing
    office described in division (A)(1) of section 1309.501 of the Revised Code, provides
    the date and time that the initial financing statement was filed and the information
    specified in division (B) of section 1309.502 of the Revised Code.

    (B) Except as otherwise provided in section 1309.515 of the Revised Code, the
    filing of an amendment does not extend the period of effectiveness of the financing
    statement.

    (C) A financing statement that is amended by an amendment that adds collateral
    is effective as to the added collateral only from the date of the filing of the
    amendment.

    (D) A financing statement that is amended by an amendment that adds a debtor is
    effective as to the added debtor only from the date of the filing of the amendment.

    (E) An amendment is ineffective to the extent it:

    (1) Purports to delete all debtors and fails to provide the name of a debtor to
    be covered by the financing statement; or

    (2) Purports to delete all secured parties of record and fails to provide the
    name of a new secured party of record.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.512
- number: '1309.513'
  heading: Termination statement - UCC 9-513
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A secured party shall cause the secured party of record for a financing
    statement to file a termination statement for the financing statement if the financing
    statement covers consumer goods and:

    (1) There is no obligation secured by the collateral covered by the financing
    statement, and no commitment to make an advance, incur an obligation, or otherwise
    give value; or

    (2) The debtor did not authorize the filing of the initial financing statement.

    (B) To comply with division (A) of this section, a secured party shall cause the
    secured party of record to file the termination statement:

    (1) Within one month after there is no obligation secured by the collateral covered
    by the financing statement and no commitment to make an advance, incur an obligation,
    or otherwise give value; or

    (2) If earlier, within twenty days after the secured party receives an authenticated
    demand from a debtor.

    (C) In cases not governed by division (A) of this section, within twenty days
    after a secured party receives an authenticated demand from a debtor, the secured
    party shall cause the secured party of record for a financing statement to send
    to the debtor a termination statement for the financing statement or file the
    termination statement in the filing office if:

    (1) Except in the case of a financing statement covering accounts or chattel paper
    that has been sold or goods that are the subject of a consignment, there is no
    obligation secured by the collateral covered by the financing statement and no
    commitment to make an advance, incur an obligation, or otherwise give value;

    (2) The financing statement covers accounts or chattel paper that have been sold
    but as to which the account debtor or other person obligated has discharged its
    obligation;

    (3) The financing statement covers goods that were the subject of a consignment
    to the debtor but are not in the debtor''s possession; or

    (4) The debtor did not authorize the filing of the initial financing statement.

    (D) Except as provided in section 1309.510 of the Revised Code, upon the filing
    of a termination statement with the filing office, the financing statement to
    which the termination statement relates ceases to be effective. Except as provided
    in section 1309.510 of the Revised Code, for purposes of division (G) of section
    1309.519, division (A) of section 1309.522, and division (C) of section 1309.523
    of the Revised Code, the filing with the filing office of a termination statement
    relating to a financing statement that indicates that the debtor is a transmitting
    utility also causes the effectiveness of the financing statement to lapse.'
  history: null
