  url: https://codes.ohio.gov/ohio-revised-code/section-1311.12
- number: '1311.13'
  heading: Attaching of liens - continuance and priority
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A)(1) All liens under sections 1311.01 to 1311.22 of the Revised Code for
    labor or work performed or materials furnished to the same improvement prior to
    the recording of the notice of commencement pursuant to section 1311.04 of the
    Revised Code are effective from the date the first visible work or labor is performed
    or the first materials are furnished by the first original contractor, subcontractor,
    material supplier, or laborer to work, labor on, or provide materials to the improvement.

    (2) Except as provided in division (A)(3) of this section, liens under sections
    1311.01 to 1311.22 of the Revised Code for labor or work performed or materials
    furnished after the recording of a notice of commencement pursuant to section
    1311.04 of the Revised Code are effective from the date of the recording of the
    notice of commencement.

    (3) Notwithstanding division (A)(2) of this section, if there is a valid and recorded
    lien with an effective date described in division (A)(1) of this section which
    has not been released at the time a lien is filed by a laborer after the recording
    of the notice of commencement or if a valid lien against the improvement pursuant
    to division (A)(1) of this section is filed subsequent to the filing of a laborer''s
    lien, the lien of the laborer is effective from the date the first visible labor
    or work was performed or materials were furnished by the original contractor,
    subcontractor, material supplier, or laborer at the site of the improvement.

    (B)(1) Except for the liens of laborers as provided in division (B)(2) of this
    section, a lien securing the claim of a claimant who has performed labor or work
    or furnished materials both prior to and after the recording of the notice of
    commencement pursuant to section 1311.04 of the Revised Code has two effective
    dates. That portion of the lien which arises from labor or work performed or materials
    furnished prior to the filing of the notice of commencement has the effective
    date described in division (A)(1) of this section and that portion of the lien
    which arises from labor or work performed or materials furnished on or after the
    filing of the notice of commencement has the effective date described in division
    (A)(2) of this section. Any payment received by the lien claimant both before
    and after the filing of a lien shall be applied first to the labor or work performed
    or materials furnished prior to the filing of the notice of commencement, and
    then to labor or work performed or materials furnished on and after the filing
    of the notice of commencement.

    (2) A lien filed by a laborer for labor or work performed both prior to and after
    the recording of the notice of commencement pursuant to section 1311.04 of the
    Revised Code has one effective date as described in division (A)(1) of this section.

    (C) Liens under sections 1311.01 to 1311.22 of the Revised Code continue in force
    for six years after an affidavit is filed in the office of the county recorder
    under section 1311.06 of the Revised Code. If an action is brought to enforce
    the lien within that time, the lien continues in force until final adjudication
    thereof.

    (D) If several liens are obtained by several persons upon the same improvement
    they have no priority among themselves, except as follows:

    (1) Liens which have an effective date described in division (A)(1) of this section
    have priority over all other liens, except for liens described in divisions (A)(3),
    (B)(2), or (D)(2) of this section, to the extent of the value of the work and
    labor performed and materials furnished prior to the recording of the notice of
    commencement pursuant to section 1311.04 of the Revised Code.

    (2) Liens filed by laborers have priority over all other liens whether the labor
    or work was performed before or after the recording of the notice of commencement
    pursuant to section 1311.04 of the Revised Code.

    (E)(1) Except as provided in division (E)(2) of this section, liens which have
    an effective date described in division (A)(1) of this section shall be preferred
    to the extent of the value of the labor or work performed or materials furnished
    prior to the recording of the notice of commencement, to all other titles, liens,
    or encumbrances which may attach to or upon the improvement or to or upon the
    land upon which it is situated, which either shall be given or recorded subsequent
    to the effective date of the liens described in division (A)(1) of this section.

    (2) Liens recorded by laborers which have an effective date described in division
    (A)(1) or (3) of this section shall be preferred to all other titles, liens, or
    encumbrances which may attach to or upon the improvement or to or upon the land
    upon which it is situated which are given or recorded subsequent to the effective
    date of such laborers'' liens.

    (F) Liens which have an effective date described in division (A)(2) of this section
    shall be preferred to all other titles, liens, or encumbrances which may attach
    to or upon such improvement or to or upon the land upon which it is situated,
    which either are given or recorded subsequent to the recording of the notice of
    commencement.

    (G) Unless otherwise stipulated in a mortgage securing financing for the construction
    of an improvement, if a mortgage securing financing for the construction of an
    improvement and notice of commencement for said improvement are recorded on the
    same day, the mortgage shall be considered recorded before the notice of commencement
    for purposes of priority described in this section.

    (H) The recorder may destroy the record of all mechanics'' liens which have been
    recorded for a period of ten years or longer.'
