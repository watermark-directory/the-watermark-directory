- number: '1315.26'
  heading: Limitations on fees and charges
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) No check-cashing business shall charge check-cashing fees or other check-cashing
    charges in an amount that exceeds three per cent of the face amount of the check
    for cashing checks issued by this state, a state agency, a political subdivision
    of this state, or the United States.

    (B) Each check-cashing business shall conspicuously post and at all times display
    in every business location a schedule of its fees and charges for all services
    permitted under sections 1315.21 to 1315.28 of the Revised Code.'
