- number: '1349.78'
  heading: '[Former R.C. 1349.72, renumbered by H.B. 272, 134th General Assembly,
    effective 7/6/2022] Written notice to debtor'
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) Not less than thirty days prior to a person filing a foreclosure action
    to collect on a debt secured by residential real property, the person shall first
    send a written notice as described in division (B) of this section via United
    States mail to the residential address of the debtor, if both of the following
    apply:

    (1) The debt is secured by a mortgage lien on the debtor''s residential real property
    that is not in the first mortgage position.

    (2) The debt has either been accelerated or is in default in accordance with the
    terms set forth in the promissory note.

    (B) The written notice may be included on, or accompany, any other communication,
    and shall be printed in at least twelve-point type and include the following:

    (1) The name and contact information of the person collecting the debt;

    (2) A statement of the amount of the debt;

    (3) A statement that the debtor has a right to engage an attorney;

    (4) A statement that the debtor may qualify for debt relief under Chapter 7 or
    13 of the United States Bankruptcy Code, 11 U.S.C. Chapter 7 or 13, as amended;

    (5) A statement that a debtor that qualifies under Chapter 13 of the United States
    Bankruptcy Code may be able to protect their residential real property from foreclosure.

    (C) Upon written request of the debtor, the owner of the debt shall provide a
    copy of the note and the loan history to the debtor.

    (D)(1) As used in this division:

    (a) "Bona fide error" means an unintentional clerical, calculation, computer malfunction
    or programming, or printing error.

    (b) "Restitution" means either of the following:

    (i) A waiver of all fees, costs, or expenses proximately associated with the failure
    to provide the notice to the debtor; or

    (ii) Actual damages.

    (2) Any owner of debt subject to divisions (A), (B), and (C) of this section shall
    not be held civilly liable in any action, if all of the following are met:

    (a) The owner of the debt shows by a preponderance of evidence that the compliance
    failure was not intentional and resulted from a bona fide error notwithstanding
    the maintenance of procedures reasonably adapted to avoid any such error.

    (b) Within sixty days after discovering the error, and prior to the initiation
    of any action, the owner of the debt notifies the debtor of the error and the
    manner in which the owner of the debt intends to make full restitution to the
    debtor.

    (c) The owner of the debt promptly makes reasonable restitution to the debtor.

    (3) If, in the event of a compliance failure, the owner of the debt does not meet
    the conditions set forth in division (D)(2) of this section, a debtor injured
    by the error has a cause of action to recover damages. Such an action shall not,
    however, be maintained as a class action.'
