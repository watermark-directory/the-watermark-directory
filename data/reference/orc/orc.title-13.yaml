- number: '1313.58'
  heading: Creditor or assignee to bring suit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Any creditor as to whom any of the acts or things prohibited in sections 1313.56
    and 1313.57 of the Revised Code are void, whether the claim of such creditor has
    matured or will thereafter mature, may commence an action in a court of competent
    jurisdiction to have such acts or things declared void. Such court shall appoint
    a trustee or receiver under sections 1313.01 to 1313.59 of the Revised Code, who,
    upon being duly qualified, must proceed by due course of law to recover possession
    of all property sold, conveyed, transferred, mortgaged, or assigned, and to administer
    it for the equal benefit of all creditors, as in other cases of assignments to
    trustees for the benefit of creditors. An assignee as to whom anything mentioned
    in sections 1313.56 and 1313.57 of the Revised Code is void, likewise must commence
    a suit in a court of competent jurisdiction to recover possession of all property
    sold, conveyed, transferred, mortgaged, or assigned, and if recovered, shall administer
    it for the equal benefit of all creditors as in other cases of assignments to
    trustees for the benefit of creditors.
