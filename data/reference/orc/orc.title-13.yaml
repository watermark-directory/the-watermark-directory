  url: https://codes.ohio.gov/ohio-revised-code/section-1311.18
- number: '1311.19'
  heading: Service
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) Except as otherwise provided in section 1311.11 of the Revised Code and
    division (C) of this section, any notice, affidavit, or other document required
    to be served under this chapter shall be served by one of the following means:

    (1) The sheriff of the county in which the person to be served resides or maintains
    the person''s principal place of business, in one or more of the methods provided
    in the Ohio Rules of Civil Procedure. The sheriff may charge reasonable fees for
    such service.

    (2) Certified or registered mail, overnight delivery service, hand delivery, or
    any other method which includes a written evidence of receipt;

    (3) The means provided in division (H) of section 1701.07 of the Revised Code,
    if the person is a corporation.

    (B) For purposes of this chapter, service is complete upon receipt by the party
    being served except as provided in division (H) of section 1701.07 of the Revised
    Code and except, for the purposes of sections 1311.05 and 1311.261 of the Revised
    Code, if service of a notice of furnishing is made by certified mail, service
    is complete on the date of the mailing. If the service is attempted upon an owner,
    part owner, or lessee, or designee, at the address contained in the notice of
    commencement required by section 1311.04 of the Revised Code, and if the notice,
    affidavit, or other document is returned unclaimed or refused, service is complete
    when first attempted.

    (C) A notice, affidavit, or other document required to be served under this chapter
    is considered served, whether or not the notice, affidavit, or other document
    was served by the means described in divisions (A)(1) to (3) of this section,
    and service is complete on the date the notice, affidavit, or other document is
    received, if either of the following is true regarding the notice, affidavit,
    or other document:

    (1) The person served acknowledges receipt of the notice, affidavit, or other
    document.

    (2) It can be proved by a preponderance of evidence that the person being served
    actually received the notice, affidavit, or other document.

    A notice, affidavit, or other document to which this division applies is presumed
    to have been received three days after the date of the mailing of the notice,
    affidavit, or other document, unless a written acknowledgement, receipt, or other
    evidence provides proof to the contrary.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.19
- number: '1311.20'
  heading: Damages for neglect or refusal to release lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'If, after the amount of his lien has been satisfied or adjudged against him
    in an action thereon, a lienholder fails within thirty days thereafter to cause
    the lien to be released, such lienholder is liable to the owner, part owner, or
    lessee for all damages arising therefrom, not exceeding the amount of the lien
    and costs.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code, the recorder may require that
    release of the lien be by separate instrument with acknowledgment as required
    for the original affidavit. The original instrument bearing the proper endorsement
    thereon may be used as the separate instrument. The separate instrument release
    shall be recorded in the book required by section 1311.06 of the Revised Code.
    The fee for recording shall be that provided by section 317.32 of the Revised
    Code for satisfaction of a mortgage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.20
- number: '1311.21'
  heading: Liens are assignable - lien not defeated by taking note or security - notice
    of claim not yet due - lis pendens
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) All liens or claims for liens which may arise or accrue under sections
    1311.01 to 1311.22 of the Revised Code are assignable. No such lien shall be defeated
    or waived by the taking by the lien claimant from any person of any promissory
    note or of any security for such debt other than upon the real estate itself,
    in the absence of a written agreement that the taking of such note or such security
    is a waiver of the lien.

    (B) Parties entitled to liens under sections 1311.01 to 1311.22 of the Revised
    Code, whose claims are not due and payable, may give notice of their intention
    to claim a lien and may become parties to any suit to enforce a lien, or to institute
    such suit or proceedings themselves. Their claims shall be allowed, subject to
    a reduction of interest, if such claims are not due at the time of the rendition
    of the judgment, but no process shall issue or proceedings be had to enforce a
    judgment for such claim until the same matures.

    (C) The rule of lis pendens does not apply to a mechanics'' lien claimant whose
    lien rights arose or accrued before an action involving the real property which
    is the subject of that lien became pending pursuant to section 2703.26 of the
    Revised Code and whose lien is filed within the statutory period but subsequent
    to the date the action becomes pending pursuant to section 2703.26 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.21
- number: '1311.22'
  heading: Liberal construction
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Sections 1311.01 to 1311.22 of the Revised Code are to be construed liberally
    to secure the beneficial results, intents, and purposes thereof; and a substantial
    compliance with those sections is sufficient for the validity of the liens under
    those sections, provided for and to give jurisdiction to the court to enforce
    the same.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.22
- number: '1311.23'
  heading: Lien upon mines for labor
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: A person who performs labor or work in mining coal or removing it from the
    mines, or other labor or work connected therewith, for a coal or mining company
    or corporation owning, operating, or leasing coal mines within this state, by
    virtue of a contract with the company or corporation or its authorized agent,
    has a lien to secure payment therefor upon the mine thereof, on all its rights
    as the owner or lessee of the mines, and on all its personal property used in
    conducting the business of mining coal, whether located at or near the mines or
    elsewhere.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.23
- number: '1311.25'
  heading: Public improvement definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'As used in sections 1311.25 to 1311.32 of the Revised Code:

    (A) "Public improvement" means any construction, reconstruction, improvement,
    enlargement, alteration, demolition, or repair of a building, highway, drainage
    system, water system, road, street, alley, sewer, ditch, sewage disposal plant,
    water works, and any other structure or work of any nature by a public authority.

    (B) "Public authority" includes the state, and a county, township, municipal corporation,
    school district, or other political subdivision of the state, and any public agency,
    authority, board, commission, instrumentality, or special district of or in the
    state or a county, township, municipal corporation, school district, or other
    political subdivision of the state, and any officer or agent thereof.

    (C) "Material supplier" includes any person by whom any materials are furnished
    in furtherance of a public improvement.

    (D) "Laborer" includes any mechanic, worker, artisan, or other individual who
    performs labor or work in furtherance of any public improvement.

    (E) "Subcontractor" includes any person who undertakes to construct, alter, erect,
    improve, repair, demolish, remove, dig, or drill any part of any public improvement
    under a contract with any person other than the public authority.

    (F) "Principal contractor" includes any person who undertakes to construct, alter,
    erect, improve, repair, demolish, remove, dig, or drill any part of any public
    improvement under a contract with a public authority.

    (G) "Materials" means all products and substances including, without limitation,
    any gasoline, lubricating oil, petroleum products, powder, dynamite, blasting
    supplies and other explosives, tools, equipment, or machinery furnished in furtherance
    of a public improvement.

    (H) "Wages" has the same meaning as "prevailing wage" in division (E) of section
    4115.03 of the Revised Code.

    (I) "Notice of commencement" means the notice specified in section 1311.252 of
    the Revised Code.

    (J) "Notice of furnishing" means the notice specified in section 1311.261 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.25
- number: '1311.251'
  heading: Claim for furnishing materials
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) A claim for furnishing materials arises under sections 1311.25 to 1311.32
    of the Revised Code only if the materials are:

    (1) Furnished with the intent, as evidenced by the contract of sale, the delivery
    order, delivery to the site by the claimant or at the claimant''s direction, or
    by other evidence, that the materials be used in the course of the public improvement
    with which the claim arises;

    (2) Incorporated in the public improvement or consumed as normal wastage in the
    public improvement operations;

    (3) Specifically fabricated for incorporation in the public improvement and not
    readily resalable in the ordinary course of the fabricator''s business even if
    not actually incorporated in the public improvement;

    (4) Used for the public improvement or for the operation of machinery or equipment
    used in the course of the public improvement and not remaining in the public improvement,
    subject to diminution by the salvage of those materials; or

    (5) Tools or machinery used on the particular public improvement, subject to division
    (C) of this section.

    (B) The delivery of materials to the site of the public improvement, whether or
    not by the claimant, creates a conclusive presumption that the materials were
    used in the course of the public improvement or were incorporated into the public
    improvement.

    (C) A claim for furnishing tools or machinery which arises under division (A)(5)
    of this section is limited to either of the following:

    (1) If the tools or machinery are rented, the claim is for the reasonable rental
    value for the period of actual use and any reasonable period of nonuse taken into
    account in the rental contract.

    (2) If the tools or machinery are purchased, the claim is for the price, but the
    claim only arises if the tools or machinery were purchased for use in the course
    of the particular public improvement and have no substantial value to the purchaser
    after the completion of the public improvement on which they were used.

    (D) All of the deliveries or the sales, or both, by a claimant of materials, including
    tools and machinery to or for an improvement, give rise to one claim for the unpaid
    portion of the sales.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.251
- number: '1311.252'
  heading: Notice of commencement - affidavit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) Prior to the performance of any labor or work or the furnishing of any
    materials in furtherance of a public improvement, the public authority shall prepare
    a notice of commencement in substantially the form specified in division (B) of
    this section which shall be made readily available to the public upon request.

    (B) The notice of commencement required under division (A) of this section shall
    contain all of the following information:

    (1) The name, location, and a number, if any, used by the public authority to
    identify the public improvement sufficient to permit the public improvement to
    be identified;

    (2) The name and address of the public authority;

    (3) The name, address, and trade of all principal contractors;

    (4) The date the public authority first executed a contract with a principal contractor
    for the public improvement;

    (5) The name and address of the sureties for all principal contractors;

    (6) The name and address of the representative of the public authority upon whom
    service shall be made for the purposes of serving an affidavit pursuant to section
    1311.26 of the Revised Code.

    (C) If the notice of commencement is not made available to the public prior to
    the commencement of work on the public improvement or if the notice of commencement
    furnished by the public authority contains incorrect information which the claimant
    relies upon to the claimant''s detriment, the unavailability of the notice or
    the incorrect notice shall not adversely affect the rights of any claimant under
    sections 1311.25 to 1311.32 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.252
- number: '1311.26'
  heading: Subcontractor, materialman or laborer may serve affidavit on public authority
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'Any subcontractor, material supplier, or laborer who is performing or has
    performed labor or work or is furnishing or has furnished material for any public
    improvement provided for in a contract between the public authority and a principal
    contractor, and under a contract between the subcontractor, material supplier,
    or laborer and a principal contractor or subcontractor, at any time, not to exceed
    one hundred twenty days from the performance of the last labor or work or furnishing
    of the last material, may serve the public authority an affidavit stating the
    amount due and unpaid for the labor and work performed and material furnished,
    when the last of the labor or work was performed and when the last of the material
    was furnished with all credits and setoffs thereon, and the post-office address
    of the claimant. If a claimant serves an affidavit under this section, the claimant
    shall serve the affidavit to the representative of the public authority named
    in the notice of commencement.

    One or more laborers may authorize an agent to prepare, execute, file, and serve
    the affidavit required by this section. The affidavit may set forth the claims
    of one or more laborers, provided that the affidavit separately itemizes the claim
    of each laborer and may set forth claims for wages that are contractually due
    but are unpaid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.26
- number: '1311.261'
  heading: Notice of furnishing
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A)(1) Every subcontractor and material supplier who wishes to exercise the
    subcontractor''s or material supplier''s rights under sections 1311.25 to 1311.32
    of the Revised Code regarding claims for labor or work performed or materials
    furnished in furtherance of a public improvement shall serve a notice of furnishing,
    in accordance with division (B) of this section, on the principal contractor whose
    contract with the public authority is the contract under which the subcontractor
    or material supplier is performing labor or work or furnishing materials within
    twenty-one days after the date that the subcontractor or material supplier first
    performed labor or work or furnished materials on the site of the public improvement,
    except that no subcontractor or material supplier who is in direct privity of
    contract with the principal contractor need provide the notice.

    (2) A subcontractor or material supplier may serve the principal contractor with
    a notice of furnishing pursuant to this section more than twenty-one days after
    the subcontractor or material supplier first performed labor or work or furnished
    materials on the site of the public improvement. If a subcontractor or material
    supplier serves the notice, the subcontractor or material supplier shall have
    the rights of sections 1311.25 to 1311.32 of the Revised Code with regard to only
    amounts owed for labor and work performed and materials furnished during and after
    the twenty-one days immediately preceding service of the notice of furnishing.

    (B) The notice of furnishing shall be in substantially the following form:

    "Notice of Furnishing

    (For use in connection with public improvements)

    To: ____________________________________________

    (Name of principal contractor)

    ________________________________________________

    Address of principal contractor)

    The undersigned notifies you that the undersigned has furnished or performed or
    will furnish or perform (describe labor, work, or materials) for the improvement
    of real property identified as (property description or address) under order given
    by (name of subcontractor or material supplier). The labor, work, or materials
    were first furnished or performed or will be furnished or performed on (date).

    _______________________________________________________

    (Signature of subcontractor or material supplier)

    _______________________________________________________

    (Address of subcontractor or material supplier)

    _______________________________________________________

    (Date)."

    (C) Each principal contractor and each subcontractor, on the date of entering
    into any agreement with a subcontractor or material supplier, shall provide, in
    writing, to the subcontractor or material supplier, the name and address of the
    public authority.

    (D) Each principal contractor and each subcontractor, on the date of entering
    into any agreement with a subcontractor or material supplier, shall provide, in
    writing, to the subcontractor or material supplier, the name and address of the
    principal contractor.

    (E) If the principal contractor or subcontractor fails to provide the name and
    address of the public authority or the principal contractor to those in direct
    privity of contract and that failure results in the loss of rights under this
    section, the affected person may bring an action in any court of common pleas
    which would otherwise have jurisdiction over the action against the person who
    failed to furnish the information for any damages resulting from the loss of rights
    under this section.

    (F) No laborer must serve a notice in accordance with this section to preserve
    lien rights under sections 1311.25 to 1311.32 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.261
- number: '1311.28'
  heading: Public authority to detain funds upon receipt of affidavit - escrow account
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'Upon receiving the affidavit required by section 1311.26 of the Revised Code,
    the public authority shall detain from the principal contractor or from the balance
    of the funds remaining in the contract with the principal contractor, an amount,
    up to the balance remaining in the contract, that does not in the aggregate exceed
    the claim or claims.

    The public authority shall not detain any amount requested by a claimant who is
    required by section 1311.261 of the Revised Code to serve a notice of furnishing,
    unless the claimant has provided to the public authority a copy of the notice
    of furnishing and a sworn statement as to the date the notice of furnishing was
    served to the principal contractor, or by a claimant who is a laborer, unless
    the laborer serves an affidavit upon the public authority pursuant to section
    1311.26 of the Revised Code.

    The public authority shall place any detained funds in an escrow account as provided
    for under section 153.63 of the Revised Code, to be released at the times, in
    the amounts, and to the persons ordered by a court of competent jurisdiction or
    by agreement of the principal contractor and the subcontractor, material supplier,
    or laborer who filed the affidavit provided for in section 1311.26 of the Revised
    Code or upon a failure to commence suit as provided in section 1311.311 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.28
- number: '1311.29'
  heading: Copy of affidavit to be filed with county recorder to notify other subcontractors,
    materialmen, and laborers - priority of claims
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'A subcontractor, material supplier, laborer, or person who serves the affidavit
    pursuant to section 1311.26 of the Revised Code, in order to notify other subcontractors,
    material suppliers, and laborers, within thirty days thereafter, shall file for
    record a copy of the affidavit with the county recorder of the county where the
    public improvement is situated or with the county recorder of each of the counties
    where the public improvement is situated if the public improvement is situated
    in more than one county. The filing for record of the affidavit with the county
    recorders gives such subcontractor, material supplier, laborer, or person filing
    the affidavit as provided in section 1311.26 of the Revised Code, a preference,
    as to payments subsequently due from the public authority, over such of the other
    subcontractors, material suppliers, and laborers who have failed, prior to the
    date any such payment is due, to file the affidavit provided for in section 1311.26
    of the Revised Code, and to file for record the copy thereof with the county recorders
    as provided in this section. On detained funds, such claimants have no priority
    among themselves, but payment thereon shall be made to them in amounts prorated
    according to the amount of the then-existing valid claim of each. The failure
    of any claimant to file for record a copy of the affidavit with the county recorders
    does not affect the validity of the claimant''s amount claimed with respect to
    persons other than such of the claimant''s other subcontractors, material suppliers,
    and laborers who have filed for record copies of their affidavits with the county
    recorders, and, against detained funds, such claimants who have failed to make
    such filing for record with the county recorders have no priority among themselves,
    but, after all claims having preference over theirs have been paid, payment shall
    be made to them in amounts prorated according to the amount of the then-existing
    valid claim of each.

    The recorder shall endorse upon every affidavit the date and hour of its filing,
    and record every affidavit filed for record. For recording or making a copy of
    the affidavit or certificate of the date of such filing for record, the recorder
    is entitled to the same fees as are provided for in section 317.32 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.29
- number: '1311.31'
  heading: Action by claimant to enforce payment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: The public authority, upon the receipt of the affidavit referred to in section
    1311.26 of the Revised Code shall, or the claimant or his agent, in the name of
    the public authority, may serve the principal contractor with a copy thereof,
    within five days after the public authority receives it, together with a notice
    that the principal contractor must give notice of his intention to dispute the
    claim within twenty days. If the claimant is not in privity of contract with the
    principal contractor, the notice of intention to dispute may state that the claimant
    failed to serve a notice of furnishing as required by division (A)(1) of section
    1311.261 of the Revised Code. If the claimant performed the labor or work or furnished
    the material to a subcontractor of the principal contractor, the claimant shall,
    within twenty days after serving the affidavit to the public authority, furnish
    a copy of it to the subcontractor. If the claimant fails to furnish the copy to
    the subcontractor, the claimant forfeits his rights to a claim under sections
    1311.25 to 1311.32 of the Revised Code. If the principal contractor fails within
    twenty days after receipt of the affidavit to serve to the public authority written
    notice of his intention to dispute the claim, he has assented to its correctness,
    provided that within twenty days after receipt by any subcontractor of a copy
    of the affidavit, the subcontractor may serve the notice of intention to dispute
    on behalf of the principal contractor. Thereupon, provided all affidavits filed
    on the same public improvement have been assented to, the amount detained from
    the principal contractor shall be applied by and payment made by the public authority,
    in the order of preference provided in section 1311.29 of the Revised Code, pro
    rata, upon the claims on which affidavits have been filed. Where more than one
    affidavit has been filed with respect to the same public improvement, and one
    or more of the affidavits has not been assented to, then the amount detained shall
    be applied pro rata among all the claimants in the order of preference prescribed
    in section 1311.29 of the Revised Code, payment being made in the amount of their
    pro rata shares to all claimants whose affidavits have been assented to, and the
    pro rata shares of claimants whose affidavits have not been assented to shall
    be detained by the public authority until the dispute with respect to any affidavit
    has been resolved in any manner provided by law, whereupon payment in whole or
    in part shall be made to claimants in whose favor the dispute is resolved and
    any remaining part of the pro rata shares shall be applied pro rata among and
    payment made to all claimants as provided in this section. Each subsequent payment
    falling due shall be applied among and payment made to the claimants as provided
    in this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.31
- number: '1311.311'
  heading: Notice to commence suit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'Any public authority or any principal contractor or subcontractor who receives
    a copy of the affidavit required by section 1311.26 of the Revised Code, as provided
    in section 1311.31 of the Revised Code, may notify the claimant or his agent,
    to commence suit. Proof that this notice was served in accordance with section
    1311.19 of the Revised Code, may be made by affidavit filed with the public authority
    or clerk or agent thereof. If the claimant fails to commence suit within sixty
    days after the date of the service of the notice, the affidavit filed pursuant
    to section 1311.26 of the Revised Code is void and the funds are to be released
    to the principal contractor. This section does not preclude the collection of
    the claim in any manner in which any claim may otherwise be collected.

    An affidavit filed pursuant to section 1311.26 of the Revised Code is void and
    the funds upon which it is sought to be imposed wholly discharged from the affidavit
    filed pursuant to section 1311.26 of the Revised Code if the principal contractor
    or any subcontractor or interested party acting in his name gives the notice to
    commence suit and files with the public authority, a bond in the amount equal
    to one and one-half of the claim in favor of the claimant, executed by sufficient
    surety, approved in writing by the public authority, and conditioned upon the
    payment of any judgment upon the claim, plus costs.

    If the public authority fails to discharge the affidavit filed pursuant to section
    1311.26 of the Revised Code and make payment, the principal contractor or subcontractor
    may file an action in the court of common pleas of the county in which the property
    is located except that if the action is against a state officer, the principal
    contractor or subcontractor shall file the action in the court of common pleas
    of Franklin county. If the court determines in the action that the public authority
    improperly failed to discharge the affidavit and make payment, the court may award
    reasonable attorney fees.

    The bond is void upon the failure of the claimant to commence suit within sixty
    days after the date of the service of the notice or, if the claimant commences
    suit within the required time period, upon the satisfaction of any judgment that
    is entered in favor of the claimant, upon final judgment against the claimant,
    or upon dismissal of the suit for any reason.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.311
- number: '1311.32'
  heading: Enforcement by civil action
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: The duty to pay to claimants the amounts and in the order of preference, as
    provided in sections 1311.29 and 1311.31 of the Revised Code, may be enforced
    by an action in the court of common pleas or the subcontractor, material supplier,
    or laborer may, when the amounts are due, recover through the public authority
    in the court of common pleas the whole or a pro rata amount of the subcontractor's,
    material supplier's, or laborer's claim or estimate, not exceeding in any case
    the balance due to the principal contractor. Either of these actions shall be
    brought in the county in which the public property involved is situated, except
    that actions against state officers shall be brought only in Franklin county.
    The court shall resolve all disputes concerning whether the affidavit filed pursuant
    to section 1311.26 of the Revised Code has been perfected and concerning priorities,
    that may arise from enforcement of the affidavit or the bond that secures the
    affidavit, pursuant to section 1311.311 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.32
- number: '1311.34'
  heading: Laborers shall have lien upon real property of employer
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'Employees of any person, association of persons, or corporation, whether
    such employment is at agriculture, mining, manufacture, or other manual labor,
    have a lien upon the real property of their employers for their wages. The lien
    is superior to the following liens taken or attaching during the existence of
    the unpaid labor claim:

    (A) Liens of attachment;

    (B) Liens of mortgage that are:

    (1) Given or taken at a time of actual insolvency of the debtor;

    (2) Given with a view of preferring creditors;

    (3) Given to secure a pre-existing debt.

    Liens upon real property of employers for wages are superior to all exemptions.

    If an employer is placed in the hands of an assignee, receiver, or trustee, claims
    due for labor performed within the period of three months prior to the time the
    assignee, receiver, or trustee is appointed, shall first be paid out of the trust
    fund, in preference to all other claims against the employer, except claims for
    taxes and the costs of administering the trust.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.34
- number: '1311.35'
  heading: Waiver of lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: The liens in section 1311.34 of the Revised Code are waived by the employee,
    as to any portion of such labor, unless within thirty days from the expiration
    of three months from the performance thereof, the employee files with the county
    recorder of the county where the labor was performed an itemized statement, verified
    by affidavit, of the amount, kind, and value of the labor performed within such
    period, with all credits and offsets and the amount then due the employee therefor.
    The statement, when filed, shall be recorded in the official records, and becomes
    a lien upon the real property of the employer without any specific description
    thereof, for the period of one year from the filing of the statement.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.35
- number: '1311.36'
  heading: Enforcement and priority of liens
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: If an action is brought to enforce the lien within the time provided in section
    1311.35 of the Revised Code, it continues in force until finally adjudicated.
    The proceedings to enforce it are the same as in other cases of lien, against
    the owner of the property and all other persons interested. If several persons
    have or obtain liens under sections 1311.34 and 1311.35 of the Revised Code, against
    the property of the same employer, they have no priority among themselves, but
    all must be paid pro rata. Such persons do not have priority over those obtaining
    other liens under this chapter but the persons obtaining liens under this chapter
    have priority as provided in this chapter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.36
- number: '1311.37'
  heading: When general employer assumes payment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Sections 1311.34 to 1311.36, inclusive, of the Revised Code apply to and include
    any laborer who indirectly performs labor for a general employer, or the results
    of whose labor is immediately enjoyed by a general employer, when such general
    employer assumes payment of his wages by passing a credit therefor upon his books
    of account or otherwise. All proceedings under this section shall be the same
    as provided by such sections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.37
- number: '1311.38'
  heading: Definition of owner
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: As used in sections 1311.39 to 1311.47, inclusive, of the Revised Code, "owner"
    includes any lessee, receiver, corporation, company, or persons owning, operating,
    or managing any railroad with whom or in whose behalf contracts as provided in
    such sections are made.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.38
- number: '1311.39'
  heading: Liens against a railroad company
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Any person, association of persons, or corporation contracting for the construction
    of a railroad, depot buildings, water tanks, or any part thereof, shall pay to
    each person performing labor or furnishing materials stipulated for in the contract
    with the owner of the railroad, under a contract express or implied with the original
    contractor, or with any subcontractor, for the whole or any part of the work stipulated
    in the original contract with the owner of the railroad.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.39
- number: '1311.40'
  heading: Priority of payment in contracts for railroad work
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'A railroad company shall provide, in its contract with any person, association
    of persons, or corporation for the construction of its road, or any part thereof,
    that payments thereunder shall be made in the following order of priority:

    (A) To the persons performing labor, furnishing materials or boarding, on the
    order of any contractor or subcontractor to persons employed by them, or either
    of them, in furnishing materials or labor for or in the construction of such railroad,
    without preference.

    (B) To any subcontractor, any balance due under his contract after payment of
    his liabilities to persons performing labor or furnishing materials or boarding,
    under his contract.

    (C) To any contractor, or construction company, intervening between a subcontractor
    and the railroad company, in the order of such intervention from such subcontractor
    upward to the owner of the railroad, any balance due after payment by the company,
    of amounts found due in the order of priority provided in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.40
- number: '1311.41'
  heading: Precedence
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: A person who performs labor or furnishes materials for or in construction
    of any railroad, depot buildings, water tanks, or any part thereof, and a person
    who furnishes boarding on the order of any contractor or subcontractor, to persons
    employed by them or either of them, in furnishing materials, or performing labor
    for or in construction of such railroad, depot buildings, water tanks, or any
    part thereof, in addition to his rights under sections 1311.39 and 1311.40 of
    the Revised Code, has a lien for its payment upon such railroad. Such lien has
    precedence over any lien taken, or to be taken, and subsists for one year from
    the date of filing the attested account provided for in section 1311.42 of the
    Revised Code. If an action is brought to enforce the lien within that time, it
    continues in force until finally adjudicated.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.41
- number: '1311.42'
  heading: Perfecting a lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: To perfect a lien referred to in section 1311.41 of the Revised Code, a person
    performing labor, furnishing material, or boarding, within forty days from the
    date that the person ceased performing labor, or furnishing materials, or boarding
    on or for the railroad, shall file with the county recorder of the county where
    the labor was performed, or material or boarding furnished, an affidavit containing
    an itemized statement of the kind and amount of material furnished, or labor performed,
    the time when the contractor or subcontractor for whom, and the section and place
    where, on the line of the road the labor was performed, or material furnished,
    and the amount due therefor, after deducting all payments and setoffs. In case
    of boarding, such affidavit must have attached thereto an itemized account thereof,
    showing the name of the contractor or subcontractor on whose order it was furnished,
    the several persons to whom furnished, the weekly rate of boarding, and the several
    amounts unpaid by each respectively. On filing the affidavit, it shall be recorded
    in the official records of the county recorder, and then it operates as a lien
    on the railroad, in the manner and subject only to the limitations provided in
    sections 1311.39 to 1311.47 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.42
- number: '1311.43'
  heading: Proceeding after filing affidavit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Within ten days after filing his affidavit with the county recorder as provided
    in section 1311.42 of the Revised Code, the claimant shall serve a notice in writing
    upon the secretary or other officer or authorized representative of the railroad
    company, by delivering or leaving a copy thereof at his usual place of residence
    or place of doing business. Such notice shall contain a statement of the facts
    of his filing such affidavit, the county wherein filed, the amount of his claim,
    whether for labor, materials, or boarding furnished, and the contractor or subcontractor
    for whom rendered. When the notice cannot be served in the county where the affidavit
    is filed, it shall be served by the recorder upon the representative of the railroad
    by depositing in the post office a letter containing the notice directed to his
    place of residence, or place of doing business, if known to the recorder. Any
    person failing to file his affidavit, and serve such notice within the time prescribed,
    has waived all claim under this section and sections 1311.41 and 1311.42 of the
    Revised Code, against the railroad company.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.43
- number: '1311.44'
  heading: Proceeding by petition
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: A person obtaining and holding a lien as provided for in sections 1311.41
    to 1311.43, inclusive, of the Revised Code, in addition to his remedies under
    sections 1311.38 to 1311.47, inclusive, of the Revised Code may proceed by petition
    as in other cases of lien, against the owner of and all other persons interested,
    as lienholders or otherwise, in such a railroad, and obtain such judgment as justice
    and equity require. For the purposes of such suit any number of such lienholders
    may join as parties plaintiff by separately stating and numbering their respective
    claims, but if several such liens are obtained by several persons, on the same
    railroad, they have no priority among themselves and payment thereon shall be
    made pro rata.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.44
- number: '1311.45'
  heading: Contractor to be notified of time of payment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Each contractor or subcontractor shall have at least five days' notice, in
    writing, of the time when a lien for labor, boarding, or materials furnished under
    a contract with him will be paid, which notice may be served upon him personally
    or upon his authorized agent or foreman, by the owner of the railroad, or any
    officer or agent thereof, stating therein the time of their payment. On request
    of such contractor or subcontractor he shall be permitted to examine such lien
    claims before they are paid at any time after the notice has been given. If such
    notice cannot be served in the county where the lien is filed, it may be given
    by publication in some newspaper of general circulation therein, for the period
    of two weeks. If such contractor or subcontractor disputes any of the claims,
    the company or owner of the road shall withhold payment of those in dispute until
    they are adjusted.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.45
- number: '1311.46'
  heading: Adjusting disputed claims
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: When a lien claim under section 1311.45 of the Revised Code cannot be adjusted
    between the parties interested, it may be submitted to the arbitration of three
    disinterested persons, one to be chosen by each of the parties, and one by the
    two thus chosen. Their decision, or that of any two of them, in the absence of
    fraud or collusion, is final and conclusive on the parties. If any claim is disputed
    and is not settled or submitted to arbitration, the claimant, in such case, shall
    commence an action on his claim before the proper tribunal, within forty days
    after notice that it has been disputed, and prosecute it to final judgment without
    delay. The amount thus ascertained or adjudicated shall then be paid by the railroad
    owner. After notice given as provided in section 1311.45 of the Revised Code,
    if no objection is filed against such claim within ten days after the expiration
    of the term for service of notice, then the contractor or subcontractor has waived
    all objections to such claim, and, as against such contractor or subcontractor,
    it is correct.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.46
- number: '1311.47'
  heading: Others who may claim liens
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Sections 1311.41 to 1311.46, inclusive, of the Revised Code apply to and include
    any person who furnishes grain, hay, merchandise, tools, or implements, or who
    repairs any tools or implements on the order of any contractor or subcontractor,
    for his own use, or the use of persons employed by him while furnishing materials
    or labor for or in construction of such railroad. The amount of such claim shall
    not exceed the wages of the person performing labor or furnishing materials, to
    whom furnished, or the amount found due such contractor, or subcontractor, under
    sections 1311.38 to 1311.47, inclusive, of the Revised Code. In every such case
    the requirements, as to filing affidavits and giving notices must be strictly
    complied with, and the aggregate of all liens taken and perfected thereunder,
    shall not be in excess of the actual construction contract price of the railroad
    company.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.47
- number: '1311.48'
  heading: Lien for care of animals
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'As used in sections 1311.48 and 1311.49 of the Revised Code "animal" means
    any animal other than man and includes fowl, birds, fish, and reptiles, and "owner"
    means and includes the person who holds legal title to an animal, or any other
    person, having lawful custody of an animal, who contracts for food, board, or
    professional services for such animal.

    Any person who feeds or boards an animal under contract with the owner shall have
    a lien on such animal to secure payment for food and board furnished.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.48
- number: '1311.49'
  heading: Sale of animal to satisfy claim
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: If the owner of an animal, upon written demand by the lienholder, fails to
    satisfy a lien acquired under section 1311.48 of the Revised Code the lienholder
    may sell the animal at public sale to satisfy such lien, provided that before
    the animal is offered for sale the lienholder shall give ten days' notice of the
    time and place of sale in a newspaper of general circulation in the county where
    food or board was furnished. The lienholder, on the day following publication,
    shall mail a copy of the public notice to the owner by registered mail at the
    last known address of such owner. If the animal is sold for a price which exceeds
    the amount of the lien, plus costs incurred by the lienholder, the remaining balance
    shall be paid by the lienholder to the owner or to such other person as may be
    legally entitled to receive same. If the lienholder sells or otherwise disposes
    of any animal without first giving the notice required by this section he shall
    not pursue any deficiency upon such obligation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.49
- number: '1311.50'
  heading: Lien upon get for service
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: The keeper of any stallion, jack, or registered pure-bred bull, has a lien
    upon its get for the period of twelve months after birth thereof, for the payment
    of the service of such stallion, jack, or bull.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.50
- number: '1311.51'
  heading: Enforcement of lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'A keeper or owner of any stallion, jack, or registered pure-bred bull may
    enforce his lien for service by replevin of the property before any county or
    municipal court having territorial jurisdiction where it is found. Upon gaining
    possession thereof, on first giving ten days'' notice to the reputed owner of
    his intention to do so, he may sell it at public sale after two weeks'' notice
    of the time and place of sale by notices posted in five conspicuous and public
    places in the township or municipal corporation where proceedings in replevin
    are had.

    Out of the proceeds of sale such keeper or owner may retain the amount due him
    for such service, with the costs by him incurred in the replevin suit. He must
    account to the owner of the get for any surplus realized by the sale. When payment
    is made to him, or his agent, for any such get, the owner of any such stallion,
    jack, or bull shall deliver to the payee a receipt in full for the amount thereof,
    and stating for what paid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.51
- number: '1311.55'
  heading: Agricultural product lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) As used in this section:

    (1) "Agricultural product" means all fruit and vegetable crops, meat and meat
    products, milk and dairy products, poultry and poultry products, wool, and all
    seeds harvested by a producer for sale, except that it does not include any grain
    crop that is subject to the fee that the director of agriculture may require to
    be remitted under section 926.16 of the Revised Code. "Agricultural product" also
    includes an algacultural product as defined in section 901.511 of the Revised
    Code.

    (2) "Agricultural product handling" means engaging in or participating in the
    business of buying, selling, exchanging, or negotiating or soliciting a purchase,
    sale, resale, exchange, or transfer of an agricultural product.

    (3) "Agricultural product handler" or "handler" means any person who is engaged
    in the business of agricultural product handling, except that a person who sells
    only those agricultural products that the person has produced, or buys agricultural
    products for the person''s own use, is not an agricultural product handler.

    (4) "Agricultural producer" or "producer" means any person who grows, raises,
    or produces an agricultural product on land that the person owns or leases.

    (5) "Proceeds" has the same meaning as in division (A)(64) of section 1309.102
    of the Revised Code.

    (B) An agricultural producer who delivers an agricultural product under an express
    or implied contract to an agricultural product handler, or an agricultural product
    handler who delivers an agricultural product under an express or implied contract
    to another agricultural product handler, has a lien to secure the payment for
    all of the agricultural product delivered under that contract. The lien attaches
    to the product, whether in a raw or processed condition, while in the possession
    of the agricultural product handler, and to the proceeds of the sale of the agricultural
    product. The lien attaches from the date of delivery of the agricultural product
    to the handler, or if there is a series of deliveries under the contract, from
    the date of the first delivery. The lien is contingent until the producer or handler
    complies with section 1311.56 of the Revised Code.

    (C) The lien on an agricultural product covers the contract price agreed upon,
    or when there is no agreed price at the time of delivery, the value of the agricultural
    product as determined by the "market news service" of the Ohio department of agriculture
    on the date the agricultural producer or handler files the affidavit permitted
    under section 1311.56 of the Revised Code.

    (D) Any waiver by a producer or handler of the producer''s or handler''s right
    to an agricultural product lien is void as being contrary to public policy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.55
- number: '1311.56'
  heading: Perfection of producer's or handler's lien - affidavit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) The agricultural producer or handler may perfect the producer''s or handler''s
    lien by recording, in the office of the county recorder in the county where the
    agricultural product was delivered to the agricultural product handler, an affidavit
    that includes the date of delivery, or first delivery if there was a series of
    deliveries under the contract, the name of the agricultural product handler to
    whom the agricultural product was delivered, and the amount owed the lien claimant
    by the handler. If there was no agreed price at the time of delivery or first
    delivery, the lien claimant shall include in the affidavit the pricing method
    which the lien claimant and handler agreed to utilize in their contract to determine
    the amount owed the lien claimant. In such cases, and for informational purposes
    only, the lien claimant shall include in the affidavit an estimate of the amount
    owed the lien claimant by the handler, based upon current market conditions. The
    estimate is not binding upon the lien claimant.

    (B) The affidavit may be verified before any person authorized to administer oaths,
    including an attorney for the agricultural product handler, lien claimant, or
    an interested other party.

    (C) The affidavit may be in the following form:

    "AFFIDAVIT FOR AGRICULTURAL PRODUCT LIEN

    State of Ohio,

    County of _____________, ss:

    A.B. __________ of _________, whose address is __________ being first duly sworn,
    says that such claimant delivered certain agricultural products under a contract
    with C.D., _________, and agricultural product handler, whose address is _____________
    The agricultural product was first delivered on the ________ day of _________,
    ___ and there is justly and truly due claimant therefor from the said C.D., over
    and above all legal setoffs, the sum of _______ dollars, (or estimated sum of
    _______ dollars based upon current market conditions,) for which amount claimant
    claims a lien on the agricultural product and the proceeds of the sale of the
    agricultural product.

    _________________________

    A.B.

    Sworn to before me and subscribed in my presence this __________ day of _________,
    _____

    ______________________________

    ______________________________"

    (D) The lien claimant shall remit to the county recorder the standard fee at the
    time the affidavit is recorded as determined under section 317.32 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.56
- number: '1311.57'
  heading: Priority and duration of lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) An agricultural producer or handler who perfects a lien within sixty
    days after the date of delivery, or first delivery if there was a series of deliveries
    under the contract, of the agricultural product has priority over all liens, claims,
    or encumbrances except wage and salary claims of workers who have no ownership
    interest in the business of the agricultural product handler, warehouse''s liens
    as provided in section 1307.209 of the Revised Code, and amounts owed by the lienholder
    to the handler that are subject to setoff, and except that secured creditors who
    have security interests under Chapter 1309. of the Revised Code have priority
    over liens perfected by agricultural handlers pursuant to section 1311.56 of the
    Revised Code. If several liens are obtained by several persons on the same agricultural
    product, the person who perfects such a lien first has priority over all other
    agricultural product lienholders.

    A producer or handler who does not perfect such a lien within the time period
    defined in this division has the status of an unsecured general creditor.

    (B) The agricultural product lien remains in effect for two years after an affidavit
    is recorded in the office of the county recorder under section 1311.56 of the
    Revised Code, and within that time, until one of the following occurs:

    (1) The lienholder or the lienholder''s secured creditor receives full payment
    from the agricultural product handler;

    (2) At the option of the lienholder or the lienholder''s secured creditor, less
    than full payment is received pursuant to a written agreement with the handler;

    (3) A final judgment is entered by a court having jurisdiction in an action adjudicating
    the status of the agricultural product lien.

    (C) Notwithstanding division (B) of this section, an agricultural product lien
    shall remain in effect throughout any insolvency proceedings involving the agricultural
    product handler named in the affidavit.

    (D) After the amount of the lienholder''s lien has been satisfied, a lienholder
    shall cause the lien to be released within thirty days.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.57
- number: '1311.59'
  heading: Rights of executors, administrators, part owners, and lessees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Executors and administrators of deceased owners, part owners, and lessees
    have the rights and are subject to the liabilities, under this chapter, that such
    owners, part owners, and lessees would enjoy and be subject to, if alive.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.59
- number: '1311.71'
  heading: Aircraft definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'As used in sections 1311.71 to 1311.80 of the Revised Code:

    (A) "Aircraft" has the same meaning as in section 4561.01 of the Revised Code
    and includes any part or equipment of the aircraft. "Aircraft" includes an abandoned
    aircraft, unless otherwise specified.

    (B) "Abandoned aircraft" means an aircraft to which both of the following apply:

    (1) It is located on the premises of a public-use airport.

    (2) The owner or operator has not paid any tie-down, hangar, rent, or storage
    costs for use of the premises for at least ninety consecutive days.

    (C) "Director" means the director or other chief executive officer of a public-use
    airport. "Director" includes the director''s or chief''s designee.

    (D) "Labor" means to repair, service, or maintain an aircraft.

    (E) "Materials" means all products and substances, including gasoline, oil, lubricants,
    accessories, parts, and equipment, that are furnished for an aircraft.

    (F) "Public-use airport" has the same meaning as in section 4563.30 of the Revised
    Code.

    (G) "Stores" means to keep an aircraft on real property owned by a person that
    is not the owner of the aircraft. "Stores" includes any necessary transportation
    of the aircraft to an appropriate location for its storage.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.71
- number: '1311.72'
  heading: Lien for storage, labor, or materials for aircraft
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) Except as provided in division (B) of this section, any person who performs
    labor upon, stores, or furnishes materials for an aircraft has a lien upon the
    aircraft to secure payment for the labor, storage, and materials. Except as provided
    in division (B) of this section, any person who owns or operates an airport or
    repair shop and whose employee performs labor upon, stores, or furnishes materials
    for an aircraft has a lien upon the aircraft to secure payment for the labor,
    storage, and materials.

    (B) Unless the aircraft is an abandoned aircraft, no person shall have a lien
    pursuant to division (A) of this section if the person has possession of the aircraft
    or if the cost of the storage, the labor performed, or the materials furnished
    for the aircraft is greater than or equal to one thousand dollars and the owner
    of the aircraft has not requested or consented to the performance of the storage,
    labor, or furnishing of the materials.

    (C) A lien that arises under this section is valid against any person except a
    purchaser or encumbrancer who in good faith, without notice, and for value acquired
    rights prior to the recording of an affidavit for lien pursuant to section 1311.73
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.72
- number: '1311.721'
  heading: Notice to abandoned aircraft owner
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) Before perfecting a lien that arises under section 1311.72 of the Revised
    Code for an abandoned aircraft, the director of a public-use airport shall search
    the appropriate records of the airport and contact both of the following entities
    to determine the name and address of the last registered owner:

    (1) The federal aviation administration''s aircraft registration branch;

    (2) The office of aviation.

    (B)(1) Within twenty business days after receipt of the information obtained under
    division (A) of this section, the director shall send notice to the owner of the
    abandoned aircraft that was identified in accordance with division (A) of this
    section that includes all of the following information:

    (a) A description of the abandoned aircraft that includes its federal aviation
    administration n-number, manufacturer name, model designation, and serial number;

    (b) The location of the abandoned aircraft on the airport premises;

    (c) The amount of any fees and charges for the use of the airport by the abandoned
    aircraft that have accrued;

    (d) That the airport may seek to perfect a lien in accordance with section 1311.73
    of the Revised Code if, within thirty calendar days after the date of receipt
    of such notice or notification that delivery was not possible, the owner does
    not remove the abandoned aircraft from the airport and pay all accrued fees and
    charges.

    (2) The notice described in division (B)(1) of this section may be sent by any
    of the following methods:

    (a) Certified or express mail with return receipt requested;

    (b) Certified mail with electronic tracking;

    (c) A commercial carrier service utilizing any form of delivery requiring a signed
    receipt;

    (d) Personal service.

    (C) The director may proceed in accordance with section 1311.73 of the Revised
    Code if the owner of the abandoned aircraft does not pay the accrued fees and
    charges in full and does not remove the abandoned aircraft within thirty days
    of the acknowledged receipt, or notification that the delivery was not possible,
    of a notice sent in accordance with division (B) of this section.

    (D) Failure of the owner to receive a notice of removal does not invalidate a
    lien perfected under section 1311.73 of the Revised Code if the director complies
    with division (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.721
- number: '1311.73'
  heading: Lien perfected by filing affidavit with FAA - form of affidavit - time
    period for filing
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A)(1) To perfect a lien that arises under section 1311.72 of the Revised
    Code, the person claiming the lien shall make and file for record with the United
    States federal aviation administration an affidavit verified under oath that includes
    all of the following information:

    (a) The amount owed to the lien claimant for the labor, storage, or materials;

    (b) A description of the aircraft that reasonably identifies it including the
    manufacturer, model, serial number, and registration number of the aircraft;

    (c) The name of the person for whom the labor was performed, the storage was provided,
    or the materials were furnished, if applicable;

    (d) The name of the owner of the aircraft, if known;

    (e) The name and address of the lien claimant;

    (f) The date that the lien claimant or the lien claimant''s employee last performed
    any labor upon, stored, or furnished any materials for the aircraft, or if the
    storage is ongoing;

    (g) The date that the lien claimant surrendered possession of the aircraft, if
    the lien claimant surrendered it;

    (h) The name and address of the person who prepared the affidavit.

    (2) The omission or inaccuracy of any address in the affidavit does not invalidate
    the affidavit. The lien claimant may verify the affidavit before any person authorized
    to administer oaths, including an agent for the owner, the lien claimant, or any
    other interested party. An agent of the lien claimant may sign the affidavit for
    the lien claimant, provided that the agent states the agent''s capacity with respect
    to the lien claimant. A lien claimant is considered to have filed for record with
    the United States federal aviation administration an affidavit upon receipt of
    the affidavit by the United States federal aviation administration as evidenced
    by a certified mail return receipt.

    (B) The affidavit may be in the following form:

    "Affidavit for Lien on Aircraft

    State of Ohio,

    County of_____________________, ss: __________________________,

    ___________________________________ of ________________________ whose address
    is____________________________________________, being first duly sworn, says that
    such lien claimant or such lien claimant''s employee performed labor, repairs,
    services, or maintenance upon, provided storage, or furnished materials, products,
    substances, accessories, parts, or equipment for a certain aircraft or part or
    equipment of a certain aircraft at the request of ______________________, whose
    address is ____________________, and of which ______________________ is the titled
    owner.

    The owner''s address is _____________________________________

    The aircraft upon which labor, repairs, services, or maintenance were performed,
    or storage was provided, or materials, products, substances, accessories, parts,
    or equipment were furnished is identified as follows:

    Manufacturer: ______________________________________________

    Model: _____________________________________________________

    Serial number ______________________________________________

    Registration number ________________________________________

    The last date that labor, repairs, services, or maintenance were performed upon,
    or storage was provided, or materials, products, substances, accessories, parts,
    or equipment were furnished for the aircraft herein identified, including any
    part or equipment of that aircraft, was _______________ ______________, _____________,
    or alternatively, storage is still ongoing as of the following date: _______________
    ______________, _____________

    The lien claimant states there is justly and truly due, over and above all legal
    setoffs, the sum of __________ dollars, for which the lien claimant claims a lien
    on the aircraft identified herein.

    The lien claimant states that the lien claimant is (is not) currently in possession
    of the aircraft. (The lien claimant states that the lien claimant surrendered
    possession of the aircraft on the ________ day of _____________, _________)

    ___________________________

    Lien claimant

    ___________________________

    Capacity with respect to lien

    claimant

    Sworn to before me and subscribed in my presence this ________ day of ____________,
    _____ ___________________

    ____________________________

    Notary public

    This instrument was prepared by ______________________________ whose address is
    ____________________________________________"

    (C) A lien claimant shall file the affidavit within one of the following periods:

    (1) Ninety days after the date on which the lien claimant or the lien claimant''s
    employee last performed labor upon or furnished materials for the aircraft that
    is subject to the lien, if the lien claimant or the lien claimant''s employee
    is in possession of the aircraft at the time of filing;

    (2) Ninety days after the date on which the lien claimant or the lien claimant''s
    employee surrendered possession of the aircraft that is subject to the lien;

    (3) Ninety days after the date by which the owner of an abandoned aircraft that
    is subject to the lien was required to remove the aircraft from the lien claimant''s
    property in accordance with section 1311.721 of the Revised Code.

    (D) Any lien claimant who files an affidavit may file a copy of the affidavit
    in the office of the county recorder in the county in which the labor was performed
    upon or the materials were furnished for the aircraft or where the aircraft was
    stored. The lien claimant shall pay to the county recorder the fee for recording
    an affidavit as determined under section 317.32 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.73
- number: '1311.74'
  heading: Service of copy of affidavit on owner
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) Any lien claimant who files an affidavit pursuant to section 1311.73
    of the Revised Code shall serve to the owner of the aircraft that is subject to
    the lien, or to his agent, a copy of the affidavit within thirty days after filing
    the affidavit with the United States federal aviation administration. The lien
    claimant shall mail the copy of the affidavit by certified mail, or if the copy
    of the affidavit is returned as unclaimed, then by ordinary mail, to the address
    of the owner of the aircraft as last recorded with the United States federal aviation
    administration.

    (B) Failure of the owner to receive a copy of the affidavit shall not invalidate
    the lien if the lien claimant complies with division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.74
- number: '1311.75'
  heading: Priority of liens
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) A lien claimant who perfects a lien in accordance with section 1311.73
    of the Revised Code has priority over all other liens, claims, or encumbrances,
    except wage and salary claims of workers who have no ownership interests in the
    business of the lien claimant and amounts that are owed by the lien claimant to
    the aircraft owner and that are subject to setoff against the amounts due for
    the labor, storage, and materials that are the basis for the lien.

    (B) If more than one lien is perfected by more than one lien claimant in accordance
    with section 1311.73 of the Revised Code on the same aircraft, liens shall be
    ranked in priority in the order of earliest filing with the United States federal
    aviation administration, except as provided in division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.75
- number: '1311.76'
  heading: Enforcement and priority of liens - claimant to give notice of release
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) A lien claimant may enforce a lien that arises under section 1311.72
    of the Revised Code by bringing an action to recover the monetary amount secured
    by the lien in a court having jurisdiction in the county in which either of the
    following occurred:

    (1) The storage took place, the labor that is the basis of the lien was performed,
    or the materials that are the basis of the lien were furnished;

    (2) The county in which the lien claimant''s primary place of business is located,
    if it is located within this state.

    (B) If a lien claimant obtains a judgment or order of a court having jurisdiction
    enforcing a lien that arises under section 1311.72 of the Revised Code, the lien
    claimant shall send a certified copy of the judgment or order to the United States
    federal aviation administration.

    (C) A lien that arises under section 1311.72 of the Revised Code remains in effect
    for six years after the date an affidavit is filed pursuant to section 1311.73
    of the Revised Code, or until one of the following occurs within that six-year
    period:

    (1) The lien claimant receives full payment of the amount due the lien claimant
    as stated in the affidavit filed pursuant to section 1311.73 of the Revised Code
    or in the judgment or order granted pursuant to this section by a court having
    jurisdiction;

    (2) The lien claimant accepts less than the full amount secured by the lien pursuant
    to a written agreement with the owner of the aircraft that is subject to the lien;

    (3) The owner files a bond in accordance with section 1311.77 of the Revised Code;

    (4) A final judgment is entered by a court having jurisdiction in an action releasing
    the lien against the aircraft.

    (D) Within thirty days after a lien has been satisfied or released in accordance
    with division (C) of this section, the lien claimant shall cause the lien to be
    released by notifying the United States federal aviation administration, and by
    notifying the county recorder in whose office the copy of the affidavit or court
    judgment or order was filed, if the lien claimant filed any of those documents
    with the county recorder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.76
- number: '1311.77'
  heading: Owner may obtain release of aircraft by filing surety bond
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'The owner of an aircraft that is subject to a lien that is perfected pursuant
    to section 1311.73 of the Revised Code may release the owner''s aircraft from
    the lien by filing with a court having jurisdiction in the county in which the
    labor that is the basis of the lien was performed, in which the aircraft was stored,
    or in which the materials that are the basis of the lien were furnished, a bond,
    payable to the lien claimant, for the full amount owed to the lien claimant as
    stated in an affidavit filed pursuant to section 1311.73 of the Revised Code for
    the labor or materials, and conditioned for the payment of any judgment that may
    be recovered on the lien, with costs.

    All bonds filed pursuant to this section shall be executed by a corporate surety
    licensed by the state and authorized to execute surety bonds in this state pursuant
    to Chapter 3929. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.77
- number: '1311.78'
  heading: Notifying lien claimant to commence suit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) The owner of an aircraft that is subject to a lien that arises under
    section 1311.72 of the Revised Code may notify the lien claimant who has perfected
    the lien in accordance with section 1311.73 of the Revised Code to commence suit
    on the lien.

    (B)(1) The owner shall serve a written notice to commence suit on the lien claimant
    by certified mail, return receipt requested, at the address of the lien claimant
    or his agent as stated in the lien claimant''s affidavit or at the address of
    the lien claimant as stated in writing in a delivery to the owner subsequent to
    the owner''s receipt of the affidavit. Service of the notice is deemed completed
    when a return receipt is received by the owner indicating delivery of the notice.
    If a return receipt shows a failure or refusal of delivery, service is deemed
    completed after the owner mails a second copy of the notice by ordinary mail,
    provided that the notice is not returned by the postal authorities within fourteen
    days after the date of mailing with an endorsement showing failure of delivery.

    (2) If service of the notice to commence suit cannot be made at the address stated
    on the affidavit or stated in subsequent written notice, and if the owner of the
    aircraft cannot locate the lien claimant or his agent by diligent search, the
    notice may be served by publication once each week for six consecutive weeks in
    a newspaper of general circulation in the county in which the lien claimant''s
    address as stated in the affidavit is located. Service is completed on the date
    of the last publication.

    (C) Within thirty days after service of the notice to commence suit is completed,
    the owner of the aircraft shall do all of the following:

    (1) Execute an affidavit stating the manner in which service of the notice was
    accomplished;

    (2) Attach to the affidavit a copy of the notice with a certified mail return
    receipt indicating the service or attempted service or a certificate of publication
    from the newspaper that published the notice;

    (3) File the affidavit and attachment described in divisions (C)(1) and (2) of
    this section with the United States federal aviation administration.

    (D) If a lien claimant fails to commence suit upon the lien within sixty days
    after completion of service of the notice to commence suit or if the lien claimant
    commences an action to enforce the lien and the action is dismissed with prejudice
    before or after adjudication, the lien is void, and the aircraft is wholly discharged
    from the lien. If a lien is void because of a lien claimant''s failure to commence
    suit on the lien within sixty days after service of a notice to commence suit,
    the claim that is the basis of the lien is not prejudiced by the failure, except
    for the loss of the lien as security for the claim.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.78
- number: '1311.79'
  heading: Maintaining lien after notice to commence suit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) After receipt of a notice to commence suit pursuant to section 1311.78
    of the Revised Code, a lien claimant may maintain a lien that is perfected pursuant
    to section 1311.73 of the Revised Code if, within sixty days after receipt of
    the notice, he complies with division (C) of this section and files for record
    with the United States federal aviation administration an affidavit that contains
    all of the following information:

    (1) The name and address of the lien claimant and the owner of the aircraft that
    is subject to the lien;

    (2) The date the lien claimant commenced an action to enforce the lien;

    (3) The court of record wherein the action was commenced and the address of that
    court;

    (4) The style of the case and the case identification number.

    (B) The lien claimant shall attach to the affidavit a description of the manner
    in which he served a copy of the affidavit upon the owner of the aircraft and
    a certified mail return receipt indicating the service or attempted service of
    the affidavit or a certificate of publication of the affidavit from the newspaper
    that published the affidavit.

    (C) A lien claimant who wishes to maintain a lien pursuant to division (A) of
    this section shall serve a copy of the affidavit required by this section upon
    the owner of the aircraft that is the subject of the lien by certified mail, return
    receipt requested, at the address of the owner as stated in the notice to commence
    suit or as last recorded with the United States federal aviation administration.
    Service of the affidavit is deemed completed when a return receipt is received
    by the lien claimant indicating delivery of the affidavit. If a return receipt
    shows a failure or refusal of delivery, service is deemed completed after the
    lien claimant mails a second copy of the affidavit by ordinary mail, provided
    that the affidavit is not returned by the postal authorities within fourteen days
    after the date of mailing with an endorsement showing failure of delivery.

    (D) If service of the affidavit cannot be made at the address stated in the notice
    or last recorded with the United States federal aviation administration, and if
    the lien claimant cannot locate the owner by diligent search, the affidavit may
    be served by publication once each week for six consecutive weeks in a newspaper
    of general circulation in the county in which the owner''s address as stated in
    the notice is located. Service is complete on the date of the last publication.'
