- number: '1321.19'
  heading: Cancellation or alteration of small loan license does not impact existing
    contracts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: Sections 1321.01 to 1321.19, inclusive, of the Revised Code may be modified,
    amended, or repealed so as to effect a cancellation or alteration of any license
    or right of a licensee, provided that such cancellation or alteration shall not
    impair or affect the obligation of any pre-existing contract between any licensee
    and any borrower, nor the right of the licensee to collect principal, interest,
    and charges as set forth in said obligation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.19
- number: '1321.20'
  heading: Fees - licenses, registration under this chapter and for pawnbrokers and
    precious metals dealers
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Every person licensed or registered under this chapter shall pay to the
    superintendent of financial institutions, prior to the last day of June, an annual
    license or certificate of registration fee. On or about the fifteenth day of April
    of each year, the superintendent shall determine the license or certificate fees
    to be charged, pursuant to sections 1321.03, 1321.05, and 1321.73 of the Revised
    Code. Such determination shall be made by dividing the appropriation for the consumer
    finance section of the division of financial institutions for the current fiscal
    year by the number of licenses and certificates issued as of the date of the computation.
    In no event shall the amount of the fee exceed three hundred dollars, except that
    the maximum fee which may be charged insurance premium finance companies licensed
    under section 1321.73 of the Revised Code shall not exceed three hundred seventy-five
    dollars. Prior to the first day of June of each year, the superintendent shall
    inform each person licensed or registered under this chapter of the amount of
    the license or certificate fee for the succeeding fiscal year as determined by
    this section.

    (B)(1) Each person licensed under Chapter 4727. of the Revised Code who is subject
    to annual license renewal under division (E)(1) of section 4727.03 of the Revised
    Code shall, prior to the last day of June, pay to the superintendent a fee equal
    to twice the amount of the fee determined by the superintendent pursuant to division
    (A) of this section. However, in no event shall the amount of the fee exceed three
    hundred dollars.

    (2) Each person licensed under Chapter 4727. of the Revised Code who is subject
    to biennial license renewal under division (E)(2) of section 4727.03 of the Revised
    Code shall, prior to the date the license expires, pay to the superintendent a
    fee equal to four times the amount of the fee determined by the superintendent
    pursuant to division (A) of this section. However, in no event shall the amount
    of the fee exceed six hundred dollars.

    (C) The fee for a license or certificate issued pursuant to Chapter 4727. or 4728.
    of the Revised Code after the first day of January of the year the license or
    certificate expires shall be equal to one-half the amount determined according
    to divisions (A) and (B) of this section or in accordance with section 4728.03
    of the Revised Code.

    (D) If the renewal fees billed by the superintendent pursuant to divisions (A)
    and (B) of this section are less than the estimated expenditures of the consumer
    finance section of the division of financial institutions, as determined by the
    superintendent, for the following fiscal year, the superintendent may assess each
    person licensed pursuant to section 1321.04 of the Revised Code at a rate sufficient
    to equal in the aggregate the difference between the renewal fees billed and the
    estimated expenditures. Each person shall pay the assessed amount to the superintendent
    prior to the last day of June. In no case shall the assessment exceed ten cents
    per each one hundred dollars of interest (excluding charge-off recoveries), points,
    loan origination charges, and credit line charges collected by that person during
    the previous calendar year. If an assessment is imposed under this division, it
    shall not be less than two hundred fifty dollars per licensee or registrant and
    shall not exceed thirty thousand dollars less the total renewal fees paid pursuant
    to division (A) of this section by each licensee or registrant.'
  history: null
