- number: '1315.25'
  heading: Conditions for deposit of checks into financial institution
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: 'On and after January 1, 1993, no check-cashing business shall deposit, in
    a financial institution, any check cashed by the check-cashing business unless
    both of the following conditions are met:

    (A) The check is indorsed with the name of the check-cashing business that appears
    on its license.

    (B) The words "licensed check-cashing business" are written legibly or stamped
    immediately after or below the name of the indorser.'
