- number: '1311.15'
  heading: Superiority of liens - assignment - direct payment of claim of subcontractor,
    materialman or laborer
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) The lien of a subcontractor is superior to any already taken or to be
    taken by the original contractor in respect of the same labor, work, or material,
    and the liens of laborers, material suppliers, and subcontractors to an original
    contractor or subcontractor, are superior to any lien already taken or to be taken
    by such original contractor or subcontractor indebted to them in respect of such
    labor, work, or material. An assignment or transfer by the original contractor
    or subcontractor, of the contract with the owner or original contractor, as well
    as all proceedings in attachment, or otherwise, against the original contractor
    or subcontractor, to subject or encumber the original contractor''s or subcontractor''s
    interest in such contract, is subject to the claims of every laborer, subcontractor,
    or material supplier who performs any labor or work or furnishes any material
    in furtherance of any improvement in accordance with this chapter.

    (B)(1) An owner, part owner, lessee, or public authority may pay directly the
    claim of any subcontractor or material supplier who serves a notice of furnishing
    pursuant to section 1311.05 or 1311.261 of the Revised Code, or the claim of any
    laborer. If the owner, part owner, lessee, or public authority pays such claim,
    the owner, part owner, lessee, or public authority has a right to a setoff or
    credit, in an amount equal to the amount paid, against the original contractor
    or principal contractor who employed the subcontractor, material supplier, or
    laborer paid by the owner, part owner, lessee, or public authority under division
    (B)(1) of this section.

    (2) A principal contractor, an original contractor, or a subcontractor may pay
    directly the claim of any subcontractor or material supplier who serves a notice
    of furnishing pursuant to section 1311.05 or 1311.261 of the Revised Code, or
    the claim of any laborer. A principal contractor, original contractor, or subcontractor
    who pays such a claim has a right to a setoff or credit, in an amount equal to
    the amount paid, against the subcontractor who employed the subcontractor, material
    supplier, or laborer paid by the principal contractor, original contractor, or
    subcontractor under division (B)(2) of this section.

    (C) The failure of an original or principal contractor, subcontractor, material
    supplier, or laborer to properly exercise the rights provided by this chapter
    does not limit the right to pursue any other legal or equitable remedy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.15
- number: '1311.16'
  heading: Proceeding by person holding mechanic's lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Any person holding a mechanic's lien, in addition to the remedies provided
    for in sections 1311.01 to 1311.22 of the Revised Code, may proceed by petition,
    as in other cases of liens, against the owner and all other persons interested,
    either as lienholders or otherwise, in any improvement, or street, turnpike, road,
    sidewalk, way, drain, ditch, or sewer, as mentioned in section 1311.03 of the
    Revised Code, and the lot or land on which it stands or to which it may be removed,
    and obtain such judgment therein for the rent or sale thereof as justice and equity
    require. When judgment is rendered in the proceeding in favor of the parties succeeding
    therein, the court may allow reasonable attorney fees to be paid out of the fund
    realized for lien claimants.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.16
- number: '1311.17'
  heading: Adjustment of claim when owner fails to perform
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: When the owner, part owner, or lessee fails to perform his part of the contract,
    and by reason thereof the other party without his default, is prevented from completely
    performing his part, he is entitled to a reasonable compensation for as much thereof
    as he has performed in proportion to the price stipulated for the whole, and the
    court shall adjust his claim accordingly.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.17
- number: '1311.18'
  heading: Sale of part of premises
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Under section 1311.16 of the Revised Code, if any part of the premises can
    be separated from the residue and sold without damage to the whole, and if the
    value thereof is sufficient to satisfy all the claims proved in the case, the
    court may order a sale of that part, if it is for the best interest of all parties
    concerned.
