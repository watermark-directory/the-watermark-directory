  url: https://codes.ohio.gov/ohio-revised-code/section-1334.07
- number: '1334.08'
  heading: Attorney general actions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: '(A) If the attorney general, by his own inquiries or as a result of complaints
    has reasonable cause to believe that a person has engaged, is engaging, or threatening
    to engage in an act or practice that violates sections 1334.01 to 1334.15 of the
    Revised Code, he may bring any of the following actions:

    (1) An action to obtain a declaratory judgment that the act or practice violates
    sections 1334.01 to 1334.15 of the Revised Code;

    (2) An action to obtain a temporary restraining order, preliminary injunction,
    or permanent injunction to restrain the act or practice. If the attorney general
    shows by a preponderance of the evidence that a seller or broker has violated,
    is violating, or is threatening to violate sections 1334.01 to 1334.15 of the
    Revised Code, the court may issue a temporary restraining order, preliminary injunction,
    or permanent injunction to restrain the act or practice. On motion of the attorney
    general, or on its own motion, the court may impose a civil penalty of not more
    than ten thousand dollars for each violation of a temporary restraining order,
    preliminary injunction, or permanent injunction issued under this section. The
    civil penalties shall be paid as provided in division (F) of this section.

    (3) A class action under Civil Rule 23, as amended, on behalf of purchasers damaged
    by a violation of sections 1334.01 to 1334.15 of the Revised Code.

    (B) On motion of the attorney general and without bond, in an attorney general''s
    action under this section, the court may make appropriate orders, including appointment
    of a referee or a receiver, for sequestration of assets, to reimburse purchasers
    found to have been damaged, to carry out a transaction in accordance with a purchaser''s
    reasonable expectations, to strike or limit the application of unconscionable
    clauses of agreements so as to avoid an unconscionable result, or to grant other
    appropriate relief. The court may assess the expenses of a referee or receiver
    against the seller or broker found to be in violation.

    (C) Any money or property received by the attorney general in an action under
    this section that cannot with due diligence within five years be restored by a
    referee to purchasers shall be unclaimed funds reported under Chapter 169. of
    the Revised Code.

    (D) In addition to the other remedies provided in this section, the attorney general
    may request and the court may impose a civil penalty of not more than five thousand
    dollars against a seller or broker for each violation found by the court. The
    court shall not impose civil penalties under this division that exceed, in the
    aggregate, one hundred thousand dollars.

    (E) If a court determines that provision has been made for reimbursement or other
    appropriate corrective action, insofar as practicable, with respect to all purchasers
    damaged by a violation, or in any other appropriate case, the attorney general,
    with court approval, may terminate enforcement proceedings brought by him upon
    acceptance of an assurance from a seller or broker of voluntary compliance with
    sections 1334.01 to 1334.15 of the Revised Code, with respect to the alleged violation.
    The assurance shall be filed with the court and entered as a consent judgment.
    Disregard of the terms of a consent judgment entered upon an assurance shall be
    treated as a violation of an injunction issued under this section.

    (F) Civil penalties ordered pursuant to divisions (A) and (D) of this section
    shall be paid as follows: one-fourth of the amount to the treasurer of the county
    in which the action is brought and three-fourths to the treasurer of state to
    the credit of the general revenue fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.08
- number: '1334.09'
  heading: Action for rescission and damages
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: '(A) For a violation of sections 1334.01 to 1334.15 of the Revised Code, a
    purchaser has a cause of action and may seek either or both of the following:

    (1) In an individual action:

    (a) Rescind the agreement by giving written notice to the seller within three
    years of the date of the agreement and recover all sums paid to the seller, less
    the fair market value, at the time of delivery, of any goods supplied by the seller
    that are not returned to the seller;

    (b) If the purchaser is found to have been damaged, recover up to three times
    the amount of actual damages or ten thousand dollars, whichever is greater.

    (2) Recover damages or other appropriate relief in a class action under Civil
    Rule 23, as amended.

    (B) The court may award to the prevailing party a reasonable attorney fee limited
    to the work reasonably performed, if either of the following apply:

    (1) The purchaser complaining of the act or practice that violated sections 1334.01
    to 1334.15 of the Revised Code has brought or maintained an action that is groundless
    and the purchaser brought or maintained the action in bad faith;

    (2) The seller or broker committed an act or practice that violates sections 1334.01
    to 1334.15 of the Revised Code.

    (C) Upon receipt by a purchaser of the consideration paid to a seller, or a seller''s
    affiliates, or both, pursuant to division (A)(1)(a) of this section, the purchaser
    shall make available to the seller, at a reasonable time and place, the goods
    received by the purchaser. However, a purchaser is not entitled to unjust enrichment
    by exercising the rights provided by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.09
- number: '1334.10'
  heading: Jurisdiction
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: '(A) The courts of common pleas, and municipal or county courts within their
    respective monetary jurisdiction, have jurisdiction over any seller or broker
    with respect to any act or practice covered by sections 1334.01 to 1334.15 of
    the Revised Code, or with respect to any claim arising from the sale or lease
    of a business opportunity plan subject to such sections.

    (B) A final judgment against a seller or broker under sections 1334.01 to 1334.15
    of the Revised Code is admissible as prima-facie evidence of the facts upon which
    it is based in subsequent proceedings under sections 1334.01 to 1334.15 of the
    Revised Code against the same seller or broker or their successors or assigns.

    (C) No action under sections 1334.01 to 1334.15 of the Revised Code may be brought
    to recover for a transaction more than five years after either the occurrence
    of the violation or the date on which the parties executed the agreement selling
    or leasing the business opportunity plan, whichever is earlier.

    (D) In any case arising under section 1334.08 or 1334.09 of the Revised Code,
    if a seller or broker shows by a preponderance of the evidence that a violation,
    or failure to meet the requirements of the exemption provided for in section 1334.13
    of the Revised Code, resulted from a bona fide error notwithstanding the maintenance
    of procedures reasonably adopted to avoid the error, no civil penalties shall
    be imposed against the seller or broker under division (D) of section 1334.08
    of the Revised Code, no party shall be awarded attorney''s fees under division
    (B) of section 1334.09 of the Revised Code, and monetary recovery shall not exceed
    the amount of actual damages resulting from the violation. In addition, a purchaser
    may, in an action brought within one year after the date on which the agreement
    selling or leasing the business opportunity plan was executed, recover all sums
    paid to the seller less the fair market value, at the time of delivery, of any
    goods supplied by the seller that are not returned to the seller.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.10
- number: '1334.11'
  heading: Defenses
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: Notwithstanding section 1303.35 of the Revised Code, a purchaser who executes
    an agreement selling or leasing to him a business opportunity plan or a note in
    connection with such an agreement may assert as a defense to a claim by a holder
    in due course, as defined in section 1303.32 of the Revised Code, any defense
    that the purchaser may assert against the seller of the business opportunity plan.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.11
- number: '1334.12'
  heading: Application of chapter
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: 'Sections 1334.01 to 1334.15 of the Revised Code do not apply to:

    (A) The relationship between an employer and an employee, or among general business
    partners;

    (B) Membership in a bona fide cooperative association of producers of agricultural
    products authorized by section 1 of the "Capper-Volstead Act," 42 Stat. 388 (1922),
    7 U.S.C. 291; or an organization, operated on a cooperative basis by and for independent
    retailers, which wholesales goods or furnishes services primarily to its member-retailers;

    (C) An agreement for the use of a trademark, service mark, trade name, seal, advertising,
    or other commercial symbol designating a person who offers a bona fide service
    for the evaluation, testing, or certification of goods, commodities, or services;

    (D) An agreement between a licensor and a single licensee to license a trademark,
    trade name, service mark, advertising, or other commercial symbol where such license
    is the only one of its general nature and type to be granted by the licensor with
    respect to that trademark, trade name, service mark, advertising or other commercial
    symbol;

    (E) The transfer of a registered security, as defined by division (B) of section
    1707.01 of the Revised Code;

    (F) Any transaction in which either the seller or purchaser is licensed pursuant
    to and the transaction is governed by Chapter 4735. of the Revised Code;

    (G) A publisher, broadcaster, printer, or other person engaged in the dissemination
    of information or the reproduction of printed or pictorial matter insofar as the
    information or matter has been disseminated or reproduced on behalf of others
    without knowledge that it violates sections 1334.01 to 1334.15 of the Revised
    Code;

    (H) A license granted by a general merchandise retailer that allows the licensee
    to sell goods or services to the general public under the retailer''s trademark,
    trade name, or service mark, advertising, or other commercial symbol if the general
    merchandise retailer has been doing business in this state continuously for five
    years prior to the granting of the license and the general merchandise retailer
    also sells the same goods or services directly to the general public;

    (I) The sale of a business which for at least six months previous to the sale
    has:

    (1) Been operated from a given specific location;

    (2) Been open for business to the general public;

    (3) Had all equipment and supplies necessary for operating the business located
    at the specific location.

    (J) The sale or lease of goods or services to a purchaser who also offers, sells,
    or distributes other goods or services that are not:

    (1) Supplied by the seller or other person enumerated in division (D)(1) of section
    1334.01 of the Revised Code; or

    (2) Utilized with the goods or services supplied by the seller or other person
    enumerated in division (D)(1) of section 1334.01 of the Revised Code.

    (K) An agreement permitting a person to offer, sell, or distribute goods or services
    on or about premises occupied by a retailer-grantor primarily for the retailer-grantor''s
    own merchandising activities, where the goods or services are not purchased from
    the retailer-grantor or persons with whom the lessee is required or advised to
    do business by the retailer-grantor.

    (L) A seller who has both of the following:

    (1)(a) A net worth on a consolidated basis, according to its most recent audited
    financial statement, of not less than fifteen million dollars;

    (b) A net worth, according to its most recent audited financial statement, of
    not less than one million dollars and the seller is at least eighty per cent owned
    by a corporation which has a net worth on a consolidated basis, according to its
    most recent audited financial statement, of not less than fifteen million dollars;

    (2) Had at least twenty-five purchasers conducting business at all times during
    the five-year period immediately preceding the sale or lease of the business opportunity
    plan, or has conducted the business which is the subject of the business opportunity
    plan continuously for not less than five years preceding the sale or lease of
    the business opportunity plan.

    (M) The sale or lease of goods or services to a purchaser who has for at least
    six months previously, bought goods or services which were sold under the same
    trademark or trade name, or which were produced by the seller and received on
    resale of such goods or services an amount at least equal to the amount of the
    initial payment or promissory note.

    (N) The renewal or extension of an existing business opportunity plan, provided
    the original agreement was for at least one year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.12
- number: '1334.13'
  heading: Certain franchising transactions exempted
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: 'Except for division (H) of section 1334.03 and section 1334.04 of the Revised
    Code, sections 1334.01 to 1334.15 of the Revised Code do not apply to:

    (A) Any transaction that complies in all material respects with the trade regulation
    rule of the federal trade commission, "disclosure requirements and prohibitions
    concerning franchising," 16 C.F.R. 436.1 et seq., as may be amended from time
    to time, that is in effect on the date of the transaction;

    (B) Any transaction that complies in all material respects with the trade regulation
    rule of the federal trade commission, "disclosure requirements and prohibitions
    concerning business opportunities," 16 C.F.R. 437.1 et seq., as may be amended
    from time to time, that is in effect on the date of the transaction.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.13
- number: '1334.14'
  heading: Burden of proof
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: In any case arising under section 1334.08 or 1334.09 of the Revised Code,
    the burden of proving an exemption or exception from section 1334.12 or 1334.13
    of the Revised Code is upon the person who claims the exemption or exception.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1334.14
- number: '1334.15'
  heading: Legislative intent; remedies; waiver
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1334'
    name: Business Opportunity Plans
  text: '(A) The general assembly declares that the offer and sale of business opportunity
    plans is a matter affected with a public interest. The general assembly further
    declares that it is the intent of this chapter to protect prospective purchasers
    of business opportunity plans by requiring that sellers provide the purchasers
    with the information necessary to make an intelligent decision about the business
    opportunity plan being offered, and that this chapter represents a fundamental
    public policy for this state.

    (B) The remedies of sections 1334.01 to 1334.15 of the Revised Code are in addition
    to remedies otherwise available for the same conduct under federal, state, or
    local law. Any waiver by a purchaser of sections 1334.01 to 1334.15 of the Revised
    Code or any venue or choice of law provision that deprives a purchaser who is
    an Ohio resident of the benefit of those sections is contrary to public policy
    and is void and unenforceable.'
