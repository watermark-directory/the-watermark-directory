- number: '1329.31'
  heading: Prisoner-made goods to be branded, labeled, or marked
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: Goods, wares, and merchandise made by prisoners in a correctional institution
    in this or any other state and imported, brought, or introduced into this state
    shall be branded, labeled, or marked as provided in section 1329.32 of the Revised
    Code before being exposed for sale.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.31
- number: '1329.32'
  heading: Requirements for brand, label or mark
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: '(A) The brand, label, or mark required by section 1329.31 of the Revised
    Code for goods, wares, and merchandise made outside the state of Ohio shall contain
    at the head or top of the brand, label, or mark "prison made" followed by the
    year and name of the correctional institution in which it was made, in plain English
    lettering of the style known as greater primer Roman capitals.

    (B) The brand, label, or mark required by section 1329.31 of the Revised Code
    for goods, wares, and merchandise made within the department of rehabilitation
    and correction in the training program of the Ohio penal industries for the employment
    of prisoners shall state "OPI correctional industries."

    (C) The brand or mark required by this section shall be placed upon the product
    if possible or, if branding or marking is impossible, a label shall be placed
    upon the product. A label shall be placed upon each box or crate in which the
    goods, wares, and merchandise are packed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.32
