- number: '1321.131'
  heading: Small loan alternative interest rate
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: As an alternative to the interest permitted in division (A) of section 1321.13
    and in division (B) of section 1321.16 of the Revised Code, a licensee may contract
    for and receive interest at any rate or rates agreed upon or consented to by the
    parties to the loan contract or open-end loan agreement, but not exceeding an
    annual percentage rate of twenty-five per cent.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.131
- number: '1321.14'
  heading: Duties of small loan licensee; prohibited acts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'Licensees under section 1321.01 of the Revised Code shall:

    (A) At the time any interest-bearing or precomputed loan is made, deliver to the
    borrower or, if there are two or more borrowers, to one of them, a statement in
    the English language disclosing in clear and distinct terms the amount and date
    of the loan, a schedule of payments or a description thereof, the type of the
    security, if any, for the loan, the name and address of the licensed office and
    of each borrower, and the agreed rate of interest, or in lieu thereof, a copy
    of the instrument evidencing the debt signed by the borrower;

    (B) For each payment made on account of any such interest-bearing or precomputed
    loan, give to the person making it a receipt if requested;

    (C) Permit payment to be made in advance in any amount on any contract of loan
    at any time, but the licensee may apply the payment first to all interest and
    charges due up to the date of the payment;

    (D) Upon repayment of the loan in full, mark plainly every obligation signed by
    any obligor, or a copy of the signed obligation, "paid" or "canceled" and return
    it and any pledge to the borrower or, if there are two or more borrowers, to one
    of them; provided that a continuing obligation in whole or in part is not repayment
    in full thereof.

    No licensee shall take any note or promise to pay in which blanks are left to
    be filled in after execution.

    Any licensee or other person who willfully violates section 1321.13 of the Revised
    Code shall forfeit to the borrower twice the amount of interest contracted for.
    The maximum rate of interest applicable to any loan transaction that does not
    comply with all provisions of section 1321.13 of the Revised Code shall be the
    rate that would be applicable in the absence of sections 1321.01 to 1321.19 of
    the Revised Code.

    No licensee shall pledge or hypothecate any note or security given by any borrower
    except with a person residing or maintaining a place of business in this state
    or with a bank authorized to transact business in this state, under an agreement
    permitting the division of financial institutions to examine the papers so hypothecated.

    The tender by the borrower, or at the borrower''s request, of an amount equal
    to the unpaid balance less the required rebate on a precomputed loan shall be
    accepted by the licensee in full payment of the loan obligation.

    A licensee shall not, directly or indirectly, make any payment, or cause to be
    made any payment, whether in cash or otherwise, to a dealer in tangible goods
    or services, or to a retail seller as defined in section 1317.01 of the Revised
    Code, in connection with the making of a loan to a customer, patron, or other
    person who has done, or is doing, business with the dealer in tangible goods or
    services, or the retail seller. This section does not prohibit bona fide advertising
    practices involving only the borrowers.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.14
- number: '1321.141'
  heading: Small loan requirements and restrictions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A licensee shall not make a loan under sections 1321.01 to 1321.19 of
    the Revised Code that meets either of the following conditions:

    (1) The amount of the loan is one thousand dollars or less.

    (2) The loan has a duration of one year or less.

    (B) A licensee shall not engage in any act or practice to evade the requirement
    of division (A) of this section, including by assisting a borrower to obtain a
    loan on terms that would be prohibited by that division.

    (C) No licensee shall fail to comply with this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.141
- number: '1321.15'
  heading: Loans designed to circumvent limitations on interest rates, charges, or
    loan amount
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) No licensee shall knowingly induce or permit any person, jointly or severally,
    to be obligated, directly or contingently or both, under more than one contract
    of loan at the same time for the purpose or with the result of obtaining a higher
    rate of interest or greater charges than would otherwise be permitted upon a single
    loan made under sections 1321.01 to 1321.19 of the Revised Code.

    (B) No licensee shall charge, contract for, or receive, directly or indirectly,
    interest and charges greater than such licensee would be permitted to charge,
    contract for, or receive without a license under sections 1321.01 to 1321.19 of
    the Revised Code on any part of an indebtedness for one or more than one loan
    of money if the amount of such indebtedness is in excess of five thousand dollars.

    (C) For the purpose of the limitations set forth in this section, the amount of
    any such indebtedness shall be determined by including the entire obligation of
    any person to the licensee for principal, direct or contingent or both, as borrower,
    indorser, guarantor, surety for, or otherwise, whether incurred or subsisting
    under one or more than one contract of loan, except that any contract of indorsement,
    guaranty, or suretyship that does not obligate the indorser, guarantor, or surety
    for any charges in excess of eight per cent per annum, is not included in such
    entire obligation. If a licensee acquires, directly or indirectly, by purchase
    or discount, bona fide obligations for goods or services owed by the person who
    received such goods or services to the person who provided such goods or services,
    then the amount of such purchased or discounted indebtedness to the licensee shall
    not be included in computing the aggregate indebtedness of such borrower to the
    licensee for the purpose of the prohibitions set forth in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.15
- number: '1321.16'
  heading: Open-end loans by small loan licensee
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A licensee may make open-end loans pursuant to an agreement between the
    licensee and the borrower whereby:

    (1) The licensee may permit the borrower to obtain advances of money from the
    licensee from time to time or the licensee may advance money on behalf of the
    borrower from time to time as directed by the borrower.

    (2) The amount of each advance and permitted interest, charges, and costs are
    debited to the borrower''s account and payments and other credits are credited
    to the same account.

    (3) The interest and charges are computed on the unpaid balance or balances of
    the account from time to time.

    (4) The borrower has the privilege of paying the account in full at any time or,
    if the account is not in default, in monthly installments of fixed or determinable
    amounts as provided in the agreement.

    For open-end loans, "billing cycle" means the time interval between periodic billing
    dates. A billing cycle shall be considered monthly if the closing date of the
    cycle is the same date each month or does not vary by more than four days from
    such date.

    (B) Notwithstanding any other provisions of the Revised Code, a licensee may contract
    for and receive interest for open-end loans at a rate or rates not exceeding those
    provided in division (A) of section 1321.13 of the Revised Code and may compute
    interest in each billing cycle by either of the following methods:

    (1) By multiplying the daily rate or rates by the daily unpaid balance of the
    account, in which case the daily rates are determined by dividing the annual rates
    by three hundred sixty-five;

    (2) By multiplying the monthly rate or rates by the average daily unpaid balance
    of the account in the billing cycle, in which case the average daily unpaid balance
    is the sum of all of the daily unpaid balances each day during the cycle divided
    by the number of days in the cycle. The monthly rates are determined by dividing
    the annual rates by twelve.

    The billing cycle shall be monthly and the unpaid balance on any day shall be
    determined by adding to any balance unpaid as of the beginning of that day all
    advances and permitted interest, charges, and costs and deducting all payments
    and other credits made or received that day.

    (C) In addition to the interest permitted in division (B) of this section, a licensee
    may charge and receive or add to the unpaid balance any or all of the following:

    (1) All charges and costs authorized by divisions (E), (F), (G), (H), and (J)
    of section 1321.13 of the Revised Code;

    (2) An annual credit line charge, for the privilege of maintaining a line of credit,
    for the first year not exceeding the greater of one per cent of the original credit
    line or thirty dollars, and for subsequent years not exceeding twenty dollars;

    (3) A default charge on any required minimum payment not paid in full within ten
    days after its due date. For this purpose, all required minimum payments are considered
    paid in the order in which they become due. The amount of the default charge shall
    not exceed the greater of five per cent of the required minimum payment or five
    dollars.

    (D) The borrower at any time may pay all or any part of the unpaid balance on
    the account or, if the account is not in default, the borrower may pay the unpaid
    balance in installments subject to minimum payment requirements as determined
    by the licensee and set forth in the open-end loan agreement.

    (E) If credit life insurance or credit accident and health insurance is obtained
    by the licensee and if the insured dies or becomes disabled when there is an outstanding
    open-end loan indebtedness, the insurance shall be sufficient to pay the unpaid
    balance on the loan due on the date of the borrower''s death in the case of credit
    life insurance or all minimum payments that become due on the loan during the
    covered period of disability in the case of credit accident and health insurance.
    The additional charge for credit life insurance, credit accident and health insurance,
    or unemployment insurance shall be calculated each billing cycle by applying the
    current monthly premium rate for the insurance, filed by the insurer with the
    superintendent of insurance and not disapproved by the superintendent, to the
    unpaid balances in the borrower''s account, using one of the methods specified
    in division (B) of this section for the calculation of interest. No credit life
    insurance, credit accident and health insurance, or unemployment insurance written
    in connection with an open-end loan shall be canceled by the licensee because
    of delinquency of the borrower in making the required minimum payments on the
    loan unless one or more such payments is past due for a period of thirty days
    or more. The licensee shall advance to the insurer the amounts required to keep
    the insurance in force during such period, which amounts may be debited to the
    borrower''s account.

    (F) Whenever there is no unpaid balance in an open-end loan account, the account
    may be terminated by written notice, by the borrower or the licensee, to the other
    party. If a licensee has taken a security interest in personal property to secure
    the open-end loan, the licensee shall release the security interest and terminate
    any financing statement in accordance with section 1309.513 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.16
- number: '1321.17'
  heading: Out-of-state small loans
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: No loan made outside this state for which a greater rate of interest, consideration,
    or charges than is authorized by sections 1321.01 to 1321.19 of the Revised Code
    has been charged, contracted for, or received is enforceable in this state and
    every person participating therein in this state is subject to sections 1321.01
    to 1321.19 of the Revised Code; provided that this section does not apply to loans
    legally made in any state under and in accordance with a regulatory loan law similar
    in principle to such sections. All loan contracts made with residents of this
    state are considered as made within this state and subject to the laws of this
    state, regardless of any statement in the contract or note to the contrary, except
    as to licensing if the lender is licensed under and in accordance with a regulatory
    loan law similar in principle to such sections. A loan in an amount of five thousand
    dollars or less made to a borrower residing in this state at the time the loan
    is made by a lender whose office is located outside this state and whose primary
    business consists of making loans by mail is not enforceable in this state for
    a greater rate of interest, consideration, or charges than is authorized by sections
    1321.01 to 1321.19 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.17
- number: '1321.18'
  heading: Civil action to reverse, rescind, or modify division order
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'In addition to any other remedy that may be available, any licensee and any
    person alleging to be aggrieved by an order or action of the division of financial
    institutions, within thirty days from the entry of the order complained of, or
    within sixty days of the action complained of if there is no order, may file a
    complaint against the superintendent of financial institutions in the court of
    common pleas of Franklin county. Such complaint may pray for reversal, rescission,
    or modification of the order or action complained of, and for such other relief
    as may be appropriate, and it shall allege the facts relied upon to obtain any
    such relief. When the complaint has been filed, summons forthwith shall be issued
    and shall be served upon the superintendent, either by personal service or by
    certified mail addressed to the superintendent''s office in the department of
    commerce. The summons is returnable within five days from its date and in all
    other respects it is made as in civil actions. All allegations of the complaint
    shall be deemed denied without further pleading, and the court, upon application
    by either party, shall advance the cause and hear it without delay. Mere technical
    irregularities in the procedure had before the division shall be disregarded,
    and the burden of proof is on the complainant to show that the division, in issuing
    the order or in taking the action complained of, exceeded or abused its discretion.
    Any party to the action may summon witnesses and compel their attendance as in
    any criminal action, and may introduce evidence in addition to that relied upon
    by the division.

    An action under this section is a special proceeding and may be appealed by either
    party pursuant to the Rules of Appellate Procedure and, to the extent not in conflict
    with those rules, Chapter 2505. of the Revised Code.'
