  url: https://codes.ohio.gov/ohio-revised-code/section-1321.74
- number: '1321.75'
  heading: Enforcement actions regarding insurance premium finance company license
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) The division of financial institutions may revoke, suspend, or refuse
    to renew a license of any premium finance company if, after investigation, it
    appears to the division that:

    (1) Any license issued to the company was obtained by fraud;

    (2) There was any misrepresentation in the application for the license;

    (3) The holder of the license has otherwise shown himself, herself, or itself
    untrustworthy or incompetent to act as a premium finance company;

    (4) The company has violated sections 1321.71 to 1321.83 of the Revised Code.

    (B) Before the division revokes, suspends, or refuses to renew the license of
    any premium finance company, it shall give to the applicant notice and an opportunity
    for a hearing conducted in accordance with Chapter 119. of the Revised Code. In
    lieu of revoking or suspending the license for any of the causes enumerated in
    this section, after notice and an opportunity for a hearing conducted in accordance
    with Chapter 119. of the Revised Code, the division may subject the company to
    a penalty of not more than five hundred dollars for each offense when, in its
    judgment, it finds that the public interest would not be harmed by the continued
    operations of the company. The amount of any such penalty shall be paid by the
    company through the office of the division to the treasurer of state to the credit
    of the consumer finance fund.

    (C) The superintendent of financial institutions may investigate alleged violations
    of sections 1321.71 to 1321.83 of the Revised Code, or the rules adopted thereunder,
    or complaints concerning any such violation. The superintendent may make application
    to the court of common pleas for an order enjoining any such violation and, upon
    a showing by the superintendent that a person has committed, or is about to commit,
    such a violation, the court shall grant an injunction, restraining order, or other
    appropriate relief.

    (D) In conducting an investigation pursuant to this section, the superintendent
    may compel, by subpoena, witnesses to testify in relation to any matter over which
    the superintendent has jurisdiction, and may require the production or photocopying
    of any book, record, or other document pertaining to such matter. If a person
    fails to file any statement or report, give testimony, produce any book, record,
    or other document as required by such a subpoena, permit photocopying of any book,
    record, or other document subpoenaed, or obey any other order of a subpoena, the
    court of common pleas of any county in this state, upon application made to it
    by the superintendent, shall compel obedience by attachment proceedings for contempt,
    as in the case of disobedience of the requirements of a subpoena issued from the
    court, or a refusal to testify therein.

    (E) If the superintendent determines that a person is engaged in, or is believed
    to be engaged in, activities that may constitute a violation of sections 1321.71
    to 1321.83 of the Revised Code, the superintendent may, after notice and a hearing
    conducted in accordance with Chapter 119. of the Revised Code, issue a cease and
    desist order. Such an order shall be enforceable in the court of common pleas.

    (F) No licensee or other person is in violation of sections 1321.71 to 1321.83
    of the Revised Code for any act taken or omission made in reliance on a written
    notice, interpretation, or examination report from the division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.75
- number: '1321.76'
  heading: Insurance premium finance company licensee recordkeeping; division powers
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Each licensee shall keep records of its insurance premium finance transactions
    conducted under sections 1321.71 to 1321.83 of the Revised Code. Such records
    shall be maintained separately from any records pertaining to transactions that
    are not subject to those sections. Each licensee shall preserve its records pertaining
    to insurance premium finance transactions conducted under sections 1321.71 to
    1321.83 of the Revised Code for at least two years after the final entry on such
    records. Preservation of records by means of accounting systems maintained in
    whole or in part by mechanical or electronic data processing methods constitutes
    compliance with this division.

    The division of financial institutions for purposes of determining whether a licensee
    is complying with sections 1321.71 to 1321.83 of the Revised Code, may make or
    cause to be made an examination of records pertaining to insurance premium finance
    transactions conducted under those sections.

    (B) If a licensee''s books, records, data, and other documents are located outside
    this state, the licensee shall, upon the request of the superintendent of financial
    institutions, deposit with the division an amount equal to the estimated costs,
    as determined by the superintendent, of an examination of the licensee conducted
    outside this state. After the actual costs of the examination have been determined
    and itemized by the division, the division shall return to the licensee any amount
    it had deposited in excess of the actual costs.

    (C) All information obtained by the superintendent or the superintendent''s deputies,
    examiners, assistants, agents, or clerks by reason of their official position,
    including information obtained by such persons in the course of examining a licensee
    or investigating an applicant for a license, is privileged and confidential. All
    such information shall remain privileged and confidential for all purposes except
    when, in the opinion of the superintendent, it is necessary for the superintendent
    and the superintendent''s deputies, examiners, assistants, agents, or clerks to
    take official action in administering and enforcing sections 1321.71 to 1321.83
    of the Revised Code or in connection with criminal proceedings. Such information
    may also be introduced into evidence or disclosed when and in the manner authorized
    in section 1181.25 of the Revised Code.

    (D) This section does not prevent the division from releasing to or exchanging
    with other financial institution regulatory authorities information relating to
    licensees.

    (E) For purposes of this section, "financial institution regulatory authority"
    includes a regulator of a business activity in which a licensee is engaged, or
    has applied to engage in, to the extent that the regulator has jurisdiction over
    a licensee engaged in that business activity. A licensee is engaged in a business
    activity, and a regulator of that business activity has jurisdiction over the
    licensee, whether the licensee conducts the activity directly or a subsidiary
    or affiliate of the licensee conducts the activity.'
