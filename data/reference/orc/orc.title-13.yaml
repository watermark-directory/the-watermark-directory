- number: '1332.21'
  heading: Video service definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: 'As used in sections 1332.21 to 1332.34 of the Revised Code:

    (A) "Access to video service" means the capability of a video service provider
    to provide video service at a household address irrespective of whether a subscriber
    has ordered the service or whether the service is actually provided at that address.

    (B) "Basic local exchange service" has the same meaning as in section 4927.01
    of the Revised Code.

    (C) "Cable operator," "cable service," "cable system," "franchise," and "franchising
    authority" have the same meanings as in the "Cable Communications Policy Act of
    1984," Pub. L. No. 98-549, 98 Stat. 2780, 2781, 47 U.S.C. 522, as amended by the
    "Telecommunications Act of 1996," Pub. L. No. 104-104, 110 Stat. 56.

    (D) "Competitive video service agreement" means any agreement, memorandum of understanding,
    or other document that provides or has the effect of providing, whether or not
    as a franchise, authorization by a municipal corporation or township for the provision
    of video service within its boundaries by a person using telecommunications facilities
    to provide that service.

    (E) "Household" means, consistent with the regulations of the bureau of the census
    of the United States department of commerce, a house, an apartment, a mobile home,
    a group of rooms, or a single room that is intended for occupancy as separate
    living quarters. "Separate living quarters" are those in which the occupants live
    and eat separately from any other persons in the building and that have direct
    access from the outside of the building or through a common hall.

    (F) "Low-income households" means those residential households that are located
    within the video service provider''s video service area and have an average annual
    household income of less than thirty-five thousand dollars based on United States
    census bureau estimates on January 1, 2007.

    (G) "PEG channel" means a channel, for public, educational, and governmental programming,
    made available by a video service provider or cable operator for noncommercial
    use.

    (H) "Telecommunications service" has the same meaning as in the "Telecommunications
    Act of 1996," Pub. L. No. 104-104, Title I, Section 3, 110 Stat. 60, 47 U.S.C.
    153.

    (I) "Video programming" has the same meaning as in the "Cable Communications Policy
    Act of 1984," Pub. L. No. 98-549, 98 Stat. 2781, 47 U.S.C. 522.

    (J) "Video service" means the provision by a video service provider of video programming
    over wires or cables located at least in part in public rights-of-way, regardless
    of the technology used to deliver that programming, including internet protocol
    technology or any other technology. The term includes cable service, but excludes
    the following:

    (1) Video programming provided to persons in their capacity as subscribers to
    commercial mobile service as defined in the "Telecommunications Act of 1996,"
    Pub. L. No. 104-104, Title VII, Sections 704(a) and 705, 110 Stat. 61, 151, 153,
    47 U.S.C. 332;

    (2) Direct-to-home satellite services as defined in 47 U.S.C. 303;

    (3) Video programming accessed via a service that enables users to access content,
    information, electronic mail, or other services offered over the internet, including
    video streaming content;

    (4) Signals distributed by a cable television system to paying subscribers in
    the unincorporated area of a township prior to October 1, 1979, as authorized
    under section 505.91 of the Revised Code as that section existed prior to its
    repeal by S.B. 117 of the 127th general assembly, unless a franchise was subsequently
    issued to the same company as authorized under that section.

    (K) "Video service area" means the service area specified pursuant to divisions
    (A) and (B) of section 1332.25 of the Revised Code.

    (L) "Video service network" means wires or cables and associated facilities or
    components used to deliver video service and includes a cable system.

    (M) "Video service provider" means a person granted a video service authorization
    under sections 1332.21 to 1332.34 of the Revised Code.'
