- number: '1309.525'
  heading: Fees - UCC 9-525
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as provided in division (C) of this section, the fee for filing
    and indexing a record under sections 1309.501 to 1309.527 of the Revised Code
    is twelve dollars.

    (B) The fee for responding to a request for information from the filing office,
    including for communicating whether there is on file any financing statement naming
    a particular debtor is:

    (1) Twenty dollars if the request is communicated in writing, and ;

    (2) Twenty dollars if the request is communicated by another medium authorized
    by the filing office rule.

    However, the fee otherwise required under division (B) of this section is five
    dollars if the request is limited to communicating only whether there is on file
    any financing statement naming a particular debtor and the name of the secured
    party or record relating thereto. Division (B) of this section does not require
    that a fee be charged for remote access searching of the filing office data base.

    (C) This section does not require a fee with respect to a record of a mortgage
    that is effective as a financing statement filed as a fixture filing or as a financing
    statement covering as-extracted collateral or timber to be cut under division
    (C) of section 1309.502 of the Revised Code. However, the recording and satisfaction
    fees that otherwise would be applicable to the record of the mortgage apply.

    (D) Any person may request from the secretary of state a copy of any financing
    statement naming a particular debtor, owner, or lessee, and of any statement of
    assignment of the financing agreement, that is on file with the secretary of state.
    The request shall be made in writing to the secretary of state, and the secretary
    of state shall charge and collect a fee of five dollars for each copy requested.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
