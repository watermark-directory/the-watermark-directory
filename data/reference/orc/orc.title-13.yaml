- number: '1349.76'
  heading: Legislative intent
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: The intent of the general assembly in enacting sections 1349.65 to 1349.76
    of the Revised Code is to establish a statewide, comprehensive enactment that
    applies to all parts of the state, operates uniformly throughout the state, and
    sets forth police regulations. No political subdivision as defined in section
    2744.01 of the Revised Code shall establish, mandate, or otherwise require online
