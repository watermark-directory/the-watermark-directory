  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.39
- number: '1310.40'
  heading: Insecurity - adequate assurance of performance - UCC 2A-401
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A lease contract imposes an obligation on each party that the other party''s
    expectation of receiving due performance will not be impaired.

    (B) If reasonable grounds for insecurity arise with respect to the performance
    of either party, the insecure party may demand in writing adequate assurance of
    due performance. Until the insecure party receives that assurance, if commercially
    reasonable, the insecure party may suspend any performance for which he has not
    already received the agreed return.

    (C) A repudiation of the lease contract occurs if assurance of due performance
    adequate under the circumstances of the particular case is not provided to the
    insecure party within a reasonable time, not to exceed thirty days after receipt
    of a demand by the other party.

    (D) Between merchants, the reasonableness of grounds for insecurity and the adequacy
    of any assurance offered shall be determined according to commercial standards.

    (E) Acceptance of any nonconforming delivery or payment does not prejudice the
    aggrieved party''s right to demand adequate assurance of future performance.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.40
- number: '1310.41'
  heading: Anticipatory repudiation - UCC 2A-402
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: 'If either party repudiates a lease contract with respect to a performance
    not yet due under the lease contract, the loss of which performance will substantially
    impair the value of the lease contract to the other party, the aggrieved party
    may do any of the following:

    (A) For a commercially reasonable time, await retraction of repudiation and performance
    by the repudiating party;

    (B) Make demand pursuant to section 1310.40 of the Revised Code and await assurance
    of future performance adequate under the circumstances of the particular case;

    (C) Resort to any right or remedy upon default under the lease contract or sections
    1310.01 to 1310.78 of the Revised Code, even though the aggrieved party has notified
    the repudiating party that the aggrieved party would await the repudiating party''s
    performance and assurance and has urged retraction. In addition, whether or not
    the aggrieved party is pursuing any of those remedies, the aggrieved party may
    suspend performance or, if the aggrieved party is the lessor, proceed in accordance
    with the provisions of section 1310.70 of the Revised Code pertaining to the lessor''s
    right to identify goods to the lease contract notwithstanding default or to salvage
    unfinished goods.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.41
- number: '1310.42'
  heading: Retraction of anticipatory repudiation - UCC 2A-403
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Until the repudiating party''s next performance is due, the repudiating
    party can retract the repudiation unless, since the repudiation, the aggrieved
    party has canceled the lease contract, materially changed the aggrieved party''s
    position, or otherwise indicated that the aggrieved party considers the repudiation
    final.

    (B) Retraction may be by any method that clearly indicates to the aggrieved party
    that the repudiating party intends to perform under the lease contract and includes
    any assurance demanded under section 1310.40 of the Revised Code.

    (C) Retraction reinstates a repudiating party''s rights under a lease contract
    with due excuse and allowance to the aggrieved party for any delay occasioned
    by the repudiation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.42
- number: '1310.43'
  heading: Substituted performance - UCC 2A-404
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If, without fault of the lessee, the lessor, and the supplier, the agreed
    berthing, loading, or unloading facilities fail, the agreed type of carrier becomes
    unavailable, or the agreed manner of delivery otherwise becomes commercially impracticable,
    but a commercially reasonable substitute is available, the substitute performance
    shall be tendered and accepted.

    (B) If the agreed means or manner of payment fails because of domestic or foreign
    governmental regulation, both of the following apply:

    (1) The lessor may withhold or stop delivery or cause the supplier to withhold
    or stop delivery, unless the lessee provides a means or manner of payment that
    is commercially a substantial equivalent.

    (2) If delivery has already been taken, payment by the means or in the manner
    provided by the regulation discharges the lessee''s obligation, unless the regulation
    is discriminatory, oppressive, or predatory.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.43
- number: '1310.44'
  heading: Excused performance - UCC 2A-405
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: 'Subject to the provisions of section 1310.43 of the Revised Code pertaining
    to substituted performance, the following rules apply:

    (A) A delay in delivery or nondelivery in whole or in part by a lessor or a supplier
    who complies with divisions (B) and (C) of this section is not a default under
    the lease contract if performance as agreed has been made impracticable by the
    occurrence of a contingency, the nonoccurrence of which was a basic assumption
    on which the lease contract was made or by compliance in good faith with any applicable
    foreign or domestic governmental regulation or order, whether or not the regulation
    or order later proves to be invalid.

    (B) If the causes mentioned in division (A) of this section affect only part of
    the lessor''s or the supplier''s capacity to perform, he shall allocate production
    and deliveries among his customers but at his option may include regular customers
    not then under contract for sale or lease as well as his own requirements for
    further manufacture. He may so allocate in any manner that is fair and reasonable.

    (C) The lessor seasonably shall notify the lessee, and, in the case of a finance
    lease, the supplier seasonably shall notify the lessor and the lessee, if known,
    that there will be delay or nondelivery and, if allocation is required under division
    (B) of this section, of the estimated quota thus made available for the lessee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.44
- number: '1310.45'
  heading: Procedure on excused performance - UCC 2A-406
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If the lessee receives notification of a material or indefinite delay
    or of an allocation justified under section 1310.44 of the Revised Code, the lessee,
    by written notification to the lessor as to any goods involved, and with respect
    to all of the goods if under an installment lease contract the value of the whole
    lease contract is substantially impaired as provided in section 1310.56 of the
    Revised Code, may do either of the following:

    (1) Terminate the lease contract, subject to division (B) of section 1310.51 of
    the Revised Code;

    (2) Except in a finance lease that is not a consumer lease, modify the lease contract
    by accepting the available quota in substitution, with due allowance from the
    rent payable for the balance of the lease term for the deficiency but without
    further right against the lessor.

    (B) If, after receipt of a notification from the lessor under division (C) of
    section 1310.44 of the Revised Code, the lessee fails to modify the lease agreement
    in accordance with division (A)(2) of this section within a reasonable time not
    exceeding thirty days, the lease contract lapses with respect to any deliveries
    affected.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.45
- number: '1310.46'
  heading: Irrevocable promises, finance leases - UCC 2A-407
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) In the case of a finance lease that is not a consumer lease, the lessee''s
    promises under the lease contract become irrevocable and independent upon the
    lessee''s acceptance of the goods.

    (B) Both of the following apply to a promise that has become irrevocable and independent
    under division (A) of this section:

    (1) It is effective and enforceable between the parties and by or against third
    parties, including assignees of the parties.

    (2) It is not subject to cancellation, termination, modification, repudiation,
    excuse, or substitution without the consent of the party to whom it runs.

    (C) This section does not affect the validity under any other law of a covenant
    in any lease contract making the lessee''s promises irrevocable and independent
    upon the lessee''s acceptance of the goods.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.46
- number: '1310.47'
  heading: Default, procedure - UCC 2A-501
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Whether the lessor or the lessee is in default under a lease contract
    is determined by the lease agreement and sections 1310.01 to 1310.78 of the Revised
    Code.

    (B) If the lessor or the lessee is in default under the lease contract, the party
    seeking enforcement has rights and remedies as provided in sections 1310.01 to
    1310.78 of the Revised Code and, except as limited by those sections, as provided
    in the lease agreement.

    (C) If the lessor or the lessee is in default under the lease contract, the party
    seeking enforcement may reduce the party''s claim to judgment or otherwise enforce
    the lease contract by self-help or any available judicial procedure or nonjudicial
    procedure, including an administrative proceeding, arbitration, or the like, in
    accordance with sections 1310.01 to 1310.78 of the Revised Code.

    (D) Except as otherwise provided in division (A) of section 1301.305 or sections
    1310.01 to 1310.78 of the Revised Code or the lease agreement, the rights and
    remedies referred to in divisions (B) and (C) of this section are cumulative.

    (E) If the lease agreement covers both real property and goods, the party seeking
    enforcement may proceed under sections 1310.47 to 1310.78 of the Revised Code
    as to the goods or under other applicable law as to both the real property and
    the goods in accordance with that party''s rights and remedies in respect of the
    real property, in which case sections 1310.47 to 1310.78 of the Revised Code does
    not apply.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.47
- number: '1310.48'
  heading: Notice after default - UCC 2A-502
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: Except as otherwise provided in sections 1310.01 to 1310.78 of the Revised
    Code or the lease agreement, the lessor or lessee in default under the lease contract
    is not entitled to notice of default or notice of enforcement from the other party
    to the lease agreement.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.48
- number: '1310.49'
  heading: Modification or impairment of rights and remedies - UCC 2A-503
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Except as otherwise provided in sections 1310.01 to 1310.78 of the Revised
    Code, the lease agreement may include rights and remedies for default in addition
    to or in substitution for those provided in sections 1310.01 to 1310.78 of the
    Revised Code and may limit or alter the measure of damages recoverable under those
    sections.

    (B) Resort to a remedy provided under sections 1310.01 to 1310.78 of the Revised
    Code or in the lease agreement is optional unless the remedy is expressly agreed
    to be exclusive. If circumstances cause an exclusive or limited remedy to fail
    of its essential purpose or if a provision for an exclusive remedy is unconscionable,
    remedy may be had as provided in sections 1310.01 to 1310.78 of the Revised Code.

    (C) Consequential damages may be liquidated under section 1310.50 of the Revised
    Code, or may otherwise be limited, altered, or excluded unless the limitation,
    alteration, or exclusion is unconscionable, limitation, alteration, or exclusion
    of consequential damages for injury to the person in the case of consumer goods
    is prima facie unconscionable, but limitation, alteration, or exclusion of damages,
    if the loss is commercial, is not prima facie unconscionable.

    (D) Rights and remedies on default by the lessor or the lessee with respect to
    any obligation or promise collateral or ancillary to the lease contract are not
    impaired by sections 1310.01 to 1310.78 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.49
- number: '1310.50'
  heading: Liquidation of damages - UCC 2A-504
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Damages payable by either party for default or any other act or omission,
    including indemnity for loss or diminution of anticipated tax benefits or loss
    or damage to lessor''s residual interest, may be liquidated in the lease agreement
    but only at an amount or by a formula that is reasonable in light of the then
    anticipated harm caused by the default or other act or omission.

    (B) If the lease agreement provides for liquidation of damages, and if either
    that provision does not comply with division (A) of this section, or that provision
    is an exclusive or limited remedy that circumstances cause to fail of its essential
    purpose, remedy may be had as provided in sections 1310.01 to 1310.78 of the Revised
    Code.

    (C) If the lessor justifiably withholds or stops delivery of goods because of
    the lessee''s default or insolvency as provided in section 1310.71 or 1310.72
    of the Revised Code, the lessee is entitled to restitution of any amount by which
    the sum of his payments exceeds either of the following:

    (1) The amount to which the lessor is entitled by virtue of terms liquidating
    the lessor''s damages in accordance with division (A) of this section;

    (2) In the absence of those terms, twenty per cent of the then present value of
    the total rent the lessee was obligated to pay for the balance of the lease term
    or, in the case of a consumer lease, the lesser of that amount or five hundred
    dollars.

    (D) A lessee''s right to restitution under division (C) of this section is subject
    to offset to the extent the lessor establishes both of the following:

    (1) A right to recover damages under sections 1310.01 to 1310.78 of the Revised
    Code other than under division (A) of this section;

    (2) The amount or value of any benefits received by the lessee directly or indirectly
    by reason of the lease contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.50
- number: '1310.51'
  heading: Cancellation and termination and effect of cancellation, termination, rescission
    or fraud on rights and remedies - UCC 2A-505
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) On cancellation of the lease contract, all obligations that are still
    executory on all parties are discharged, but any right based on prior default
    or performance survives, and the cancelling party also retains any remedy for
    default of the whole lease contract or any unperformed balance.

    (B) On termination of the lease contract, all obligations that are still executory
    on all parties are discharged, but any right based on prior default or performance
    survives.

    (C) Unless the contrary intention clearly appears, expressions of "cancellation,"
    "rescission," or the like of the lease contract may not be construed as a renunciation
    or discharge of any claim in damages for an antecedent default.

    (D) Rights and remedies for material misrepresentation or fraud include all rights
    and remedies available under sections 1310.01 to 1310.78 of the Revised Code for
    default.

    (E) A rescission of the lease contract, a claim for rescission of the lease contract,
    or a rejection or return of the goods does not bar, and shall not be considered
    inconsistent with, a claim for damages or other right or remedy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.51
- number: '1310.52'
  heading: Statute of limitations - UCC 2A-506
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) An action for default under a lease contract, including an action for
    a breach of warranty or indemnity, shall be commenced within four years after
    the cause of action accrued. By the original lease contract, the parties may reduce
    the period of limitation to not less than one year.

    (B) A cause of action for default accrues when the act or omission on which the
    default or breach of warranty is based is or should have been discovered by the
    aggrieved party or when the default occurs, whichever is later. A cause of action
    for indemnity accrues when the act or omission on which the claim for indemnity
    is based is or should have been discovered by the indemnified party, whichever
    is later.

    (C) If an action commenced within the time limited by division (A) of this section
    is so terminated as to leave available a remedy by another action for the same
    default, breach of warranty, or indemnity, the other action may be commenced after
    the expiration of the time limited and within six months after the termination
    of the first action unless the termination resulted from voluntary discontinuance
    or from dismissal for failure or neglect to prosecute.

    (D) This section does not alter the law on tolling of the statute of limitations
    and does not apply to causes of action that accrued before the effective date
    of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.52
- number: '1310.53'
  heading: Proof of market rent - time and place - UCC 2A-507
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Damages based on market rent as provided in section 1310.65 or 1310.74
    of the Revised Code are determined according to the rent for the use of the goods
    concerned for a lease term identical to the remaining lease term of the original
    lease agreement and prevailing at the times specified in those sections.

    (B) If evidence of rent for the use of the goods concerned for a lease term identical
    to the remaining lease term of the original lease agreement and prevailing at
    the times or places described in sections 1310.01 to 1310.78 of the Revised Code
    is not readily available, the rent prevailing within any reasonable time before
    or after the time described or at any other place or for a different lease term
    that, in commercial judgment or under usage of trade, would serve as a reasonable
    substitute for the one described may be used, making any proper allowance for
    the difference, including the cost of transporting the goods to or from the other
    place.

    (C) Evidence of a relevant rent prevailing at a time or place or for a lease term
    other than the one described in sections 1310.01 to 1310.78 of the Revised Code
    offered by one party is not admissible unless and until he has given the other
    party notice that the court finds sufficient to prevent unfair surprise.

    (D) If the prevailing rent or value of any goods regularly leased in any established
    market is in issue, reports in official publications or trade journals or in newspapers
    or periodicals of general circulation published as the reports of that market
    are admissible in evidence. The circumstances of the preparation of the report
    may be shown to affect its weight but not its admissibility.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.53
- number: '1310.54'
  heading: Lessee's remedies - UCC 2A-508
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If a lessor fails to deliver the goods in conformity to the lease contract
    as provided in section 1310.55 of the Revised Code or repudiates the lease contract
    as provided in section 1310.41 of the Revised Code, or if a lessee rightfully
    rejects the goods as provided in section 1310.55 of the Revised Code or justifiably
    revokes acceptance of the goods as provided in section 1310.63 of the Revised
    Code, then, with respect to any goods involved and with respect to all of the
    goods if under an installment lease contract the value of the whole lease contract
    is substantially impaired as provided in section 1310.56 of the Revised Code,
    the lessor is in default under the lease contract, and the lessee may do one or
    more of the following:

    (1) Cancel the lease contract as provided in division (A) of section 1310.51 of
    the Revised Code;

    (2) Recover so much of the rent and security as has been paid and is just under
    the circumstances;

    (3) Cover and recover damages as to all goods affected, whether or not they have
    been identified to the lease contract, as provided in sections 1310.64 and 1310.66
    of the Revised Code, or recover damages for nondelivery as provided in sections
    1310.65 and 1310.66 of the Revised Code;

    (4) Exercise any other rights or pursue any other remedies provided in the lease
    contract.

    (B) If a lessor fails to deliver the goods in conformity to the lease contract
    or repudiates the lease contract, the lessee also may do one of the following:

    (1) If the goods have been identified, recover them as provided in section 1310.68
    of the Revised Code;

    (2) In a proper case, obtain specific performance or replevy the goods as provided
    in section 1310.67 of the Revised Code.

    (C) If a lessor is otherwise in default under a lease contract, the lessee may
    exercise the rights and pursue the remedies provided in the lease contract, which
    may include a right to cancel the lease, and in division (C) of section 1310.65
    of the Revised Code.

    (D) If a lessor has breached an express or implied warranty, the lessee may recover
    damages as provided in division (D) of section 1310.65 of the Revised Code.

    (E) On rightful rejection or justifiable revocation of acceptance, a lessee has
    a security interest in goods in the lessee''s possession or control for any rent
    and security that has been paid and any expenses reasonably incurred in their
    inspection, receipt, transportation, and care and custody and may hold those goods
    and dispose of them in good faith and in a commercially reasonable manner, subject
    to section 1310.73 of the Revised Code.

    (F) Subject to section 1310.46 of the Revised Code, a lessee, on notifying the
    lessor of the lessee''s intention to do so, may deduct all or any part of the
    damages resulting from any default under the lease contract from any part of the
    rent still due under the same lease contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.54
- number: '1310.55'
  heading: Lessee's rights on improper delivery - rightful rejection - UCC 2A-509
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Subject to the provisions of section 1310.56 of the Revised Code on default
    in installment lease contracts, if the goods or the tender or delivery of the
    goods fail in any respect to conform to the lease contract, the lessee may reject
    or accept the goods or accept any commercial unit or units and reject the rest
    of the goods.

    (B) A rejection of goods is ineffective unless it is within a reasonable time
    after the tender or delivery of the goods, and the lessee seasonably notifies
    the lessor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.55
- number: '1310.56'
  heading: Installment lease contracts - rejection and default - UCC 2A-510
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Under an installment lease contract, a lessee may reject any delivery
    that is nonconforming if the nonconformity substantially impairs the value of
    that delivery and cannot be cured or the nonconformity is a defect in the required
    documents. If the nonconformity does not fall within division (B) of this section,
    and if the lessor or the supplier gives adequate assurance of its cure, the lessee
    must accept that delivery.

    (B) Whenever nonconformity or default with respect to one or more deliveries substantially
    impairs the value of the installment lease contract as a whole, there is a default
    with respect to the whole. The aggrieved party reinstates the installment lease
    contract as a whole if the aggrieved party accepts a nonconforming delivery without
    seasonably notifying of cancellation, brings an action with respect only to past
    deliveries, or demands performance as to future deliveries.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.56
- number: '1310.57'
  heading: Merchant lessee's duties as to rightfully rejected goods - UCC 2A-511
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Subject to any security interest of a lessee as provided in division
    (E) of section 1310.54 of the Revised Code, if a lessor or a supplier has no agent
    or place of business at the market of rejection, a merchant lessee, after rejection
    of goods in his possession or control, shall follow any reasonable instructions
    received from the lessor or the supplier with respect to the goods. In the absence
    of those instructions, a merchant lessee shall make reasonable efforts to sell,
    lease, or otherwise dispose of the goods for the lessor''s account if they threaten
    to decline in value speedily. Instructions are not reasonable if on demand indemnity
    for expenses is not forthcoming.

    (B) If a merchant lessee, as provided in division (A) of this section, or any
    other lessee, as provided in section 1310.58 of the Revised Code, disposes of
    goods, he is entitled to reimbursement either from the lessor or the supplier
    or out of the proceeds for the reasonable expenses of caring for and disposing
    of the goods and, if the expenses include no disposition commission, to the commission
    that is usual in the trade or, if there is none, to a reasonable sum not exceeding
    ten per cent of the gross proceeds.

    (C) In complying with this section or section 1310.58 of the Revised Code, the
    lessee is held only to good faith. Good faith conduct is neither acceptance or
    conversion nor the basis of an action for damages.

    (D) A purchaser who purchases in good faith from a lessee pursuant to this section
    or section 1310.58 of the Revised Code takes the goods free of any rights of the
    lessor and the supplier even though the lessee fails to comply with one or more
    of the requirements of sections 1310.01 to 1310.78 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.57
- number: '1310.58'
  heading: Lessee's duties as to rightfully rejected goods - UCC 2A-512
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Except as otherwise provided in section 1310.57 of the Revised Code with
    respect to goods that threaten to decline in value speedily and subject to any
    security interest of a lessee as provided in division (E) of section 1310.54 of
    the Revised Code, the following apply:

    (1) The lessee, after rejection of goods in the lessee''s possession, shall hold
    them with reasonable care at the lessor''s or supplier''s disposition for a reasonable
    time after the lessee''s seasonable notification of rejection.

    (2) If the lessor or the supplier gives no instructions within a reasonable time
    after notification of rejection, the lessee may store the rejected goods for the
    lessor''s or supplier''s account, ship them to the lessor or supplier, or dispose
    of them for the lessor''s or supplier''s account with reimbursement in the manner
    provided in section 1310.57 of the Revised Code.

    (3) The lessee has no obligations other than those described in divisions (A)(1)
    and (2) of this section with regard to goods rightfully rejected.

    (B) Action by the lessee pursuant to division (A) of this section is not acceptance
    or conversion.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.58
- number: '1310.59'
  heading: Cure by lessor of improper tender or delivery - replacement - UCC 2A-513
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If any tender or delivery by the lessor or supplier is rejected because
    it is nonconforming and if the time for performance has not yet expired, the lessor
    or supplier seasonably may notify the lessee of the lessor''s or supplier''s intention
    to cure and then may make a conforming delivery within the time provided in the
    lease contract.

    (B) If the lessee rejects a nonconforming tender that the lessor or supplier had
    reasonable grounds to believe would be acceptable with or without money allowance,
    the lessor or supplier may have a further reasonable time to substitute a conforming
    tender if he seasonably notifies the lessee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.59
- number: '1310.60'
  heading: Waiver of lessee's objections - UCC 2A-514
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) In rejecting goods, a lessee''s failure to state a particular defect
    that is ascertainable by reasonable inspection precludes the lessee from relying
    on the defect to justify rejection or to establish default if either of the following
    applies:

    (1) The lessor or supplier could have cured the defect as provided in section
    1310.59 of the Revised Code if the defect had been stated seasonably;

    (2) Between merchants, the lessor or supplier, after the rejection of the goods,
    made a request in writing for a full and final written statement of all defects
    on which the lessee proposes to rely.

    (B) A lessee''s failure to reserve rights when paying rent or other consideration
    against documents precludes recovery of the payment for defects apparent in the
    documents.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.60
- number: '1310.61'
  heading: Acceptance of goods - UCC 2A-515
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Acceptance of goods occurs after the lessee has had a reasonable opportunity
    to inspect the goods and one of the following applies:

    (1) The lessee signifies or acts with respect to the goods in a manner that signifies
    to the lessor or supplier that the goods are conforming or that the lessee will
    take or retain them in spite of their nonconformity.

    (2) The lessee fails to make an effective rejection of the goods as provided in
    division (B) of section 1310.55 of the Revised Code.

    (B) Acceptance of a part of any commercial unit is acceptance of that entire unit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.61
- number: '1310.62'
  heading: Effect of acceptance of goods - notice of default - burden of establishing
    default after acceptance - notice of claim or litigation to person answerable
    over - UCC 2A-516
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A lessee shall pay rent for any goods accepted in accordance with the
    lease contract, with due allowance for goods rightfully rejected or not delivered.

    (B) A lessee''s acceptance of goods precludes rejection of the goods accepted.
    In the case of a finance lease, if acceptance is made with knowledge of a nonconformity,
    the acceptance cannot be revoked because of the nonconformity. In any other case,
    if acceptance is made with knowledge of a nonconformity, the acceptance cannot
    be revoked because of the nonconformity, unless the acceptance was on the reasonable
    assumption that the nonconformity would be seasonably cured, acceptance does not
    of itself impair any other remedy for nonconformity provided by sections 1310.01
    to 1310.78 of the Revised Code or the lease agreement.

    (C) If a tender has been accepted, all of the following apply:

    (1) Within a reasonable time after the lessee discovers or should have discovered
    any default, the lessee shall notify the lessor and supplier, if any, or be barred
    from any remedy against the party not notified.

    (2) Except in the case of a consumer lease, within a reasonable time after the
    lessee receives notice of litigation for infringement or the like, as provided
    in section 1310.18 of the Revised Code, the lessee shall notify the lessor or
    be barred from any remedy over for liability established by the litigation.

    (3) The burden is on the lessee to establish any default.

    (D) If a lessee is sued for breach of a warranty or other obligation for which
    a lessor or a supplier is answerable over, both of the following apply:

    (1) The lessee may give the lessor or supplier, or both, written notice of the
    litigation. If the notice states that the person notified may come in and defend
    and that, if the person notified does not do so, that person will be bound in
    any action against that person by the lessee by any determination of fact common
    to the two litigations, then, unless the person notified after seasonable receipt
    of the notice does come in and defend, that person is so bound.

    (2) The lessor or supplier may demand in writing that the lessee turn over control
    of the litigation, including settlement, if the claim is one for infringement
    or the like, as provided in section 1310.18 of the Revised Code, or else be barred
    from any remedy over. If the demand states that the lessor or supplier agrees
    to bear all expense and to satisfy any adverse judgment, then, unless the lessee
    after seasonable receipt of the demand does turn over control, the lessee is so
    barred.

    (E) Divisions (C) and (D) of this section apply to any obligation of a lessee
    to hold the lessor or supplier harmless against infringement or the like as provided
    in section 1310.18 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.62
- number: '1310.63'
  heading: Revocation of acceptance of goods - UCC 2A-517
  title:
    num: '13'
