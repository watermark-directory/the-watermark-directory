  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.339
- number: '1309.340'
  heading: Effectiveness of right of recoupment or set-off against deposit account
    - UCC 9-340
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (C) of this section, a bank
    with which a deposit account is maintained may exercise any right of recoupment
    or set-off against a secured party that holds a security interest in the deposit
    account.

    (B) Except as otherwise provided in division (C) of this section, the application
    of this chapter to a security interest in a deposit account does not affect a
    right of recoupment or set-off of the secured party as to a deposit account maintained
    with the secured party.

    (C) The exercise by a bank of a set-off against a deposit account is ineffective
    against a secured party that holds a security interest in the deposit account
    that is perfected by control under division (A)(3) of section 1309.104 of the
    Revised Code, if the set-off is based on a claim against the debtor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.340
- number: '1309.341'
  heading: Bank's rights and duties with respect to deposit account - UCC 9-341
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'Except as otherwise provided in division (C) of section 1309.340 of the Revised
    Code, and unless the bank otherwise agrees in an authenticated record, a bank''s
    rights and duties with respect to a deposit account maintained with the bank are
    not terminated, suspended, or modified by:

    (A) The creation, attachment, or perfection of a security interest in the deposit
    account;

    (B) The bank''s knowledge of the security interest; or

    (C) The bank''s receipt of instructions from the secured party.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.341
- number: '1309.342'
  heading: Bank's right to refuse to enter into or disclose existence of control agreement
    - UCC 9-342
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: This chapter does not require a bank to enter into an agreement of the kind
    described in division (A)(2) of section 1309.104 of the Revised Code, even if
    its customer so requests or directs. A bank that has entered into an agreement
    of the kind described in division (A)(2) of that section is not required to confirm
    the existence of the agreement to another person unless requested to do so by
    its customer.
