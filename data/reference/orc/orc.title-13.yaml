- number: '1321.69'
  heading: Consumer installment loan licensee prohibitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A licensee shall not permit any borrower to be indebted for a loan made
    under sections 1321.62 to 1321.702 of the Revised Code at any time while the borrower
    is also indebted to an affiliate or agent of the licensee for a loan made under
    sections 1321.01 to 1321.19 or sections 1321.51 to 1321.60 of the Revised Code
    for the purpose or with the result of obtaining greater charges than otherwise
    would be permitted by sections 1321.62 to 1321.702 of the Revised Code.

    (B) A licensee shall not induce or permit any person to become obligated to the
    licensee under sections 1321.62 to 1321.702 of the Revised Code, directly or contingently,
    or both, under more than one contract of loan at the same time for the purpose
    or with the result of obtaining greater charges than would otherwise be permitted
    by sections 1321.62 to 1321.702 of the Revised Code.

    (C) A licensee shall not fail to provide information regarding the amount required
    to pay in full a loan made under sections 1321.62 to 1321.702 of the Revised Code
    within five business days after the receipt of a written request from a borrower
    or by another person designated in writing by the borrower.

    (D) A licensee shall not obtain a license through any false or fraudulent representation
    of a material fact or any omission of a material fact required by state or federal
    law, or make any substantial misrepresentation in the application to engage in
    lending under sections 1321.62 to 1321.702 of the Revised Code.

    (E) A licensee, in connection with the business of making or offering to make
    a loan, shall not knowingly make false or misleading statements of a material
    fact, omissions of statements required by state or federal law, or false promises
    regarding a material fact, through advertising or other means, or knowingly engage
    in a continued course of misrepresentations.

    (F) A licensee, or person making loans without a license in violation of section
    1321.63 of the Revised Code, shall not knowingly engage in conduct, in connection
    with the business of making or offering to make loans under sections 1321.62 to
    1321.702 of the Revised Code, that constitutes improper, fraudulent, or dishonest
    dealings.

    (G) A licensee or applicant for a license shall not fail to notify the division
    of financial institutions within thirty days after having a license, or comparable
    authority, revoked in any governmental jurisdiction.

    (H) A licensee shall not knowingly make, propose, or solicit fraudulent, false,
    or misleading statements on any loan document or on any document related to a
    loan. For purposes of this division, "fraudulent, false, or misleading statements"
    does not include mathematical errors, inadvertent transposition of numbers, typographical
    errors, or any other bona fide error.

    (I) A licensee shall not knowingly instruct, solicit, propose, or otherwise cause
    a borrower to sign in blank a loan- related document in connection with a loan.

    (J) A licensee shall not take any note or other promise to pay that does not set
    forth the entire agreement made with the borrower.

    (K) A licensee shall not take any note or promise to pay in which blanks are left
    to be filled in after execution.

    (L) A licensee shall not charge or collect interest prior to the date of disbursement
    of the loan funds to the borrower.

    (M) A licensee shall not make a new loan for the purpose of paying any part of
    the interest or principal due on an existing loan with the same licensee unless
    the interest and principal balance of the existing loan is paid in full from the
    proceeds of the new loan.

    (N) Notwithstanding any provision of sections 1321.62 to 1321.702 of the Revised
    Code to the contrary, no licensee shall give, or advertise an offer to give, any
    article, merchandise, reward-program benefit, or any other thing of value, as
    inducement to a borrower or prospective borrower to obtain a loan, unless the
    cost of the thing of value is absorbed by the licensee as general overhead, rather
    than directly charged to the borrower who received the thing of value.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.69
- number: '1321.691'
  heading: Employee remote work
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) As used in this section, "remote location" means the home of an employee
    or other location selected by the employee that is not a licensed place of business.

    (B) Notwithstanding any provision of the Revised Code to the contrary, nothing
    in sections 1321.62 to 1321.702 of the Revised Code shall be construed to interfere
    with the ability of a licensee''s employee to work from a remote location, provided
    the licensee does all of the following:

    (1) Ensures that in-person customer interactions are conducted only at a licensed
    place of business;

    (2) Maintains appropriate safeguards for licensee and consumer data, information,
    and records, including the use of secure virtual private networks where appropriate;

    (3) Employs appropriate risk-based monitoring and oversight processes of work
    performed from a remote location and maintains records of such work;

    (4) Ensures consumer information and records are not maintained at a remote location;

    (5) Ensures consumer and licensee information and records remain accessible and
    available for regulatory oversight and exams;

    (6) Provides appropriate employee training to keep all conversations about, and
    with, consumers conducted from a remote location confidential, as if conducted
    from a commercial location, and to ensure remote employees work in an environment
    conducive and appropriate to that confidentiality;

    (7) Keeps a record of all remote locations that are being used, in the form of
    city, state, and type of location, and makes a list of those locations available
    to the superintendent upon request.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.691
- number: '1321.70'
  heading: Enforcement actions for Consumer Installment Loan Act violations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) The division of financial institutions may, upon written notice to the
    licensee stating the contemplated action, the grounds for the action, and the
    licensee''s reasonable opportunity to be heard on the action in accordance with
    Chapter 119. of the Revised Code, revoke, suspend, or refuse to renew any license
    issued under sections 1321.62 to 1321.702 of the Revised Code if it finds a violation
    of or failure to comply with any provision of sections 1321.62 to 1321.702 of
    the Revised Code or the rules adopted thereunder, any federal lending law, or
    any other law applicable to the business conducted under a license.

    (B) In addition to, or in lieu of, any revocation, suspension, or denial, the
    division may impose a monetary fine after administrative hearing or in settlement
    of matters subject to claims under division (A) of this section.

    (C) The revocation, suspension, or refusal to renew shall not impair the obligation
    of any pre-existing lawful contract made under sections 1321.62 to 1321.702 of
    the Revised Code; provided, however, that a prior licensee shall make good faith
    efforts to promptly transfer the licensee''s collection rights to another licensee
    or person exempt from licensing, or be subject to additional monetary fines and
    legal or administrative action by the division. Nothing in this division shall
    limit a court''s ability to impose a cease-and-desist order preventing any further
    business or servicing activity.

    (D)(1) The superintendent of financial institutions may impose a fine for a violation
    of sections 1321.62 to 1321.702 of the Revised Code committed by a licensee. All
    fines collected pursuant to this section shall be paid to the treasurer of state
    to the credit of the consumer finance fund created in section 1321.21 of the Revised
    Code. In determining the amount of a fine to be imposed pursuant to this division,
    the superintendent may consider all of the following to the extent it is known
    to the division:

    (a) The seriousness of the violation;

    (b) The licensee''s good faith efforts to prevent the violation;

    (c) The licensee''s history regarding violations and compliance with division
    orders;

    (d) The licensee''s financial resources;

    (e) Any other matters the superintendent considers appropriate in enforcing sections
    1321.62 to 1321.702 of the Revised Code.

    (2) Monetary fines imposed under division (D)(1) of this section shall not exceed
    twenty-five thousand dollars.

    (E) The superintendent may investigate alleged violations of sections 1321.62
    to 1321.702 of the Revised Code, or the rules adopted thereunder, or complaints
    concerning any such violation. The superintendent may make application to the
    court of common pleas for an order enjoining any violation and, upon a showing
    by the superintendent that a person has committed, or is about to commit, a violation,
    the court shall grant an injunction, restraining order, or other appropriate relief.
    The superintendent, in making application to the court of common pleas for an
    order enjoining a person from acting as a licensee in violation of section 1321.63
    of the Revised Code, may also seek and obtain civil penalties for that unlicensed
    conduct in an amount not to exceed five thousand dollars per violation.

    (F) In conducting an investigation pursuant to this section, the superintendent
    may compel, by subpoena, witnesses to testify in relation to any matter over which
    the superintendent has jurisdiction, and may require the production or photocopying
    of any book, record, or other document pertaining to such matter. If a person
    fails to file any statement or report, obey any subpoena, give testimony, produce
    any book, record, or other document as required by such a subpoena, or permit
    photocopying of any book, record, or other document subpoenaed, the court of common
    pleas of any county in this state, upon application made to it by the superintendent,
    shall compel obedience by attachment proceedings for contempt, as in the case
    of disobedience of the requirements of a subpoena issued from the court, or a
    refusal to testify therein.

    (G) If the superintendent determines that a person is engaged in, or is believed
    to be engaged in, activities that may constitute a violation of sections 1321.62
    to 1321.702 of the Revised Code, the superintendent may, after notice and a hearing
    conducted in accordance with Chapter 119. of the Revised Code, issue a cease-and-desist
    order. The superintendent, in taking administrative action to enjoin a person
    from acting as a licensee in violation of section 1321.63 of the Revised Code,
    may also seek and impose fines for those violations in an amount not to exceed
    five thousand dollars per violation. Such an order shall be enforceable in the
    court of common pleas.

    (H) The superintendent shall regularly report violations of sections 1321.62 to
    1321.702 of the Revised Code, as well as enforcement actions and other relevant
    information, to the NMLSR.

    (I)(1) To protect the public interest, the superintendent may, without a prior
    hearing, do any of the following:

    (a) Suspend the license of a person who is convicted of or pleads guilty or nolo
    contendere to a criminal violation of sections 1321.62 to 1321.702 of the Revised
    Code;

    (b) Suspend any licensee who violates section 1321.65 of the Revised Code;

    (c) Suspend any licensee who fails to comply with a request made by the superintendent
    under this section.

    (2) The superintendent may, in accordance with Chapter 119. of the Revised Code,
    subsequently revoke any license suspended under division (I)(1) of this section.'
