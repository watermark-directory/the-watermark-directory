  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.80
- number: '1311.85'
  heading: Broker's lien on commercial realty definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'As used in sections 1311.85 to 1311.93 of the Revised Code:

    (A) "Broker" means an individual, partnership, corporation, or association licensed
    as a real estate broker pursuant to Chapter 4735. of the Revised Code.

    (B) "Commercial real estate" means any parcel of real estate in this state other
    than real estate containing one to four residential units. "Commercial real estate"
    does not include single-family residential units such as condominiums, townhouses,
    manufactured housing, or homes in a subdivision when sold, leased, or otherwise
    conveyed on a unit-by-unit basis, even though these units may be a part of a larger
    building or parcel of real estate containing more than four residential units.
    "Commercial real estate" also does not include real estate owned by a public authority
    as defined in section 1311.25 of the Revised Code.

    (C) "Lien property" means any interest in commercial real estate against which
    a broker has a lien pursuant to sections 1311.85 to 1311.93 of the Revised Code.

    (D) "Owner" means a person who has a legal or equitable interest in lien property
    and who enters into, or has previously entered into, a written contract with a
    broker for services related to purchasing, selling, leasing, or conveying any
    interest in the lien property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.85
- number: '1311.86'
  heading: Broker's lien on commercial real estate
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) Any broker that enters into a written contract for services related to
    selling, leasing, or conveying any interest in commercial real estate has a lien
    on that commercial real estate. The lien is effective only if the contract for
    services is in writing and is signed by the broker or the broker''s agent and
    the owner of the lien property or the owner''s agent.

    (B) Any broker that enters into a written contract for services related to purchasing
    any interest in commercial real estate has a lien on any real estate purchased
    pursuant to that contract. The lien is effective only if the contract for services
    is in writing and is signed by the broker or the broker''s agent and the owner
    of the lien property or the owner''s agent.

    (C)(1) Only the broker named in the contract has a lien pursuant to this section
    and a lien is not available to any employee or independent contractor of the broker.

    (2) The amount of a lien for services related to selling or conveying any interest
    in commercial real estate is limited to the amount due to the broker pursuant
    to the contract. If the amount due to the broker is payable in installments, a
    portion of which is due after conveyance, the amount of the lien is limited to
    the amount due to the broker prior to or upon conveyance.

    (3) The amount of a lien for services related to leasing any interest in commercial
    real estate is limited to the amount due to the broker pursuant to the contract.
    If the amount due to the broker is payable in installments, the amount of the
    lien is limited to the amount of all installment payments due to the broker over
    the life of the contract, minus the amount of any installment payments made under
    the contract prior to the time of the owner''s default.

    (4) The amount of a lien for services related to purchasing any interest in commercial
    real estate is limited to the amount due to the broker pursuant to the contract.
    If the amount due to the broker is payable in installments, the amount of the
    lien is limited to the amount of all installment payments due to the broker over
    the life of the contract, minus the amount of any installment payments made under
    the contract prior to the time the lien is filed.

    (5) The lien is effective only against the interest in real estate that is the
    subject of the contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.86
- number: '1311.87'
  heading: Perfection of lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A)(1) A lien established pursuant to section 1311.86 of the Revised Code
    is perfected when both of the following have occurred:

    (a) The broker is entitled to a fee or commission under the contract.

    (b) The broker has met the requirements of division (B) of this section.

    (2) The lien is perfected as of the date the requirements of division (A)(1) of
    this section are met and does not relate back to an earlier date.

    (B) To perfect a lien pursuant to division (A)(1) of this section, a broker shall
    comply with all of the following:

    (1) The broker shall record a lien affidavit in the county recorder''s office
    of the county in which the real estate is located. The recorder shall record on
    the affidavit the date and precise time the affidavit was presented for record,
    and shall record the affidavit. The recorder shall charge and collect the fees
    set forth in section 317.32 of the Revised Code for the recorder''s services.

    (2)(a) The lien affidavit shall include the name of the broker who has the lien,
    the name of the owner of the lien property, a legal description of the lien property,
    the amount for which the lien is claimed, the date and a summary of the written
    contract on which the lien is based, and the real estate license number of the
    broker. The lien affidavit shall state that the information contained in the affidavit
    is true and accurate to the knowledge of the signator, be signed by the broker
    or the broker''s agent, and be verified.

    (b) For purposes of division (B)(2)(a) of this section, a description that is
    sufficient to describe the lien property for the purpose of conveyance, or is
    contained in the instrument by which the owner took title, is a legal description.

    (3) A lien affidavit based on the sale of lien property shall be recorded prior
    to the conveyance of the lien property.

    (4) A lien affidavit based on the purchase of lien property shall be recorded
    within ninety days after the conveyance of the lien property.

    (5) A lien affidavit based on a lease of lien property shall be recorded within
    ninety days after a default by the owner in the payment of an amount due under
    a written contract for services related to leasing the lien property.

    (6) Within three days of the recording of the lien affidavit, the broker shall
    provide a copy of the lien affidavit to the owner of the lien property and, where
    a contract for the sale or other conveyance of the lien property has been entered
    into, to the prospective transferee, where known, by personal delivery or by certified
    mail, commercial carrier service, or any other method that includes written evidence
    of receipt.

    (C) Initial leases, lease renewals, and expansions of the space leased shall be
    treated as separate leases for purposes of division (B)(5) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.87
- number: '1311.88'
  heading: Proceedings to enforce lien
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) To commence proceedings to enforce a lien, a broker shall comply with
    all of the following:

    (1) The broker shall file a complaint in the common pleas court in the county
    where the lien property is located.

    (2)(a) The complaint shall be filed within two years following the recording of
    the lien affidavit as provided in division (B) of section 1311.87 of the Revised
    Code.

    (b) Failure to file a complaint within the time specified in this division extinguishes
    the lien, in which case no subsequent lien affidavit may be recorded for the same
    claim and the claim may not be asserted in any proceeding under this section.

    (3) A complaint shall identify the contract upon which the lien is based and the
    date of the contract, describe the services performed by the broker pursuant to
    the contract, specify the unpaid amounts due to the broker pursuant to the contract,
    specify the address of the lien property, and have a copy of the contract attached.

    (4) The broker shall name as defendants in the complaint all parties that have
    a legal or equitable interest in the lien property of whom the broker has knowledge.

    (B)(1) The owner may demand that the broker commence a suit to enforce a broker''s
    lien by serving a written notice of demand on the broker by personal delivery
    or by certified mail, commercial carrier service, or any other method that includes
    written evidence of receipt.

    (2) If the broker does not commence the suit within twenty-eight days after receipt
    of the notice of demand, the lien is extinguished.

    (C) In an action based on a broker''s lien, a court shall assess the nonprevailing
    parties with all costs and reasonable attorney''s fees incurred by the prevailing
    parties. If the broker prevails, the assessed costs and attorney''s fees shall
    include all those incurred by the broker to perfect and enforce the broker lien
    including any litigation costs and any prejudgment interest due. The court shall
    equitably apportion the assessed costs, attorney''s fees, and prejudgment interest
    among all responsible nonprevailing parties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.88
- number: '1311.89'
  heading: Sale of foreclosed property - alternative dispute resolution
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) All liens claimed under sections 1311.85 to 1311.93 of the Revised Code
    shall be subject to section 2323.07 of the Revised Code unless the parties agree
    to proceed pursuant to division (B) of this section.

    (B) If the broker and owner agree to alternative dispute resolution (ADR), the
    claim shall be heard and resolved in the agreed upon ADR forum. The court shall
    retain jurisdiction to enter and enforce the award or other result of ADR on all
    interested parties to the foreclosure.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.89
- number: '1311.90'
  heading: Broker to record release or satisfaction
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) A broker shall record a written release or satisfaction of the broker''s
    lien in the county recorder''s office of the county in which the lien was recorded
    within ten days after any of the following:

    (1) Moneys in an amount sufficient to release the broker''s lien established pursuant
    to section 1311.86 of the Revised Code have been deposited in an escrow account
    established pursuant to section 1311.92 of the Revised Code.

    (2) The owner satisfies the claim upon which the broker''s lien is based.

    (3) The broker fails to file a claim to enforce a lien within the time specified
    in section 1311.88 of the Revised Code.

    (4) The claim upon which the broker''s lien is based has been resolved by a written
    agreement of the broker and owner, by a court, or by any process agreed to by
    the broker and owner.

    (B) Within three days of the recording of the release or satisfaction, the broker
    shall provide the owner with a copy of the release or satisfaction by personal
    delivery or by certified mail, commercial carrier service, or any other method
    that includes written evidence of receipt.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.90
- number: '1311.91'
  heading: Priority of mechanic's liens
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: All valid mechanic's liens, arising pursuant to and perfected in accordance
    with Chapter 1311. of the Revised Code, and all prior recorded liens and mortgages
