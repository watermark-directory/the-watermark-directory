- number: '1305.11'
  heading: Transfer of letter of credit - UCC 5-112
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) Except as otherwise provided in section 1305.12 of the Revised Code,
    unless a letter of credit provides that it is transferable, the right of a beneficiary
    to draw or otherwise demand performance under a letter of credit may not be transferred.

    (B) Even if a letter of credit provides that it is transferable, the issuer may
    refuse to recognize or carry out a transfer if:

    (1) The transfer would violate applicable law; or

    (2) The transferor or transferee has failed to comply with any requirement stated
    in the letter of credit or any other requirement relating to transfer imposed
    by the issuer that is within the standard practice referred to in division (E)
    of section 1305.07 of the Revised Code or is otherwise reasonable under the circumstances.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.11
- number: '1305.12'
  heading: Transfer by operation of law - UCC 5-113
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) A successor of a beneficiary may consent to amendments, sign and present
    documents, and receive payment or other items of value in the name of the beneficiary
    without disclosing its status as a successor.

    (B) A successor of a beneficiary may consent to amendments, sign and present documents,
    and receive payment or other items of value in its own name as the disclosed successor
    of the beneficiary. Except as otherwise provided in division (E) of this section,
    an issuer shall recognize a disclosed successor of a beneficiary as beneficiary
    in full substitution for its predecessor upon compliance with the requirements
    for recognition by the issuer of a transfer of drawing rights by operation of
    law under the standard practice referred to in division (E) of section 1305.07
    of the Revised Code or, in the absence of such a practice, compliance with other
    reasonable procedures sufficient to protect the issuer.

    (C) An issuer is not obliged to determine whether a purported successor is a successor
    of a beneficiary or whether the signature of a purported successor is genuine
    or authorized.

    (D) Honor of a purported successor''s apparently complying presentation under
    division (A) or (B) of this section has the consequences specified in division
    (I) of section 1305.07 of the Revised Code even if the purported successor is
    not the successor of a beneficiary. Documents signed in the name of the beneficiary
    or of a disclosed successor by a person who is neither the beneficiary nor the
    successor of the beneficiary are forged documents for the purposes of section
    1305.08 of the Revised Code.

    (E) An issuer whose rights of reimbursement are not covered by division (D) of
    this section or substantially similar law and any confirmer or nominated person
    may decline to recognize a presentation under division (B) of this section.

    (F) A beneficiary whose name is changed after the issuance of a letter of credit
    has the same rights and obligations as a successor of a beneficiary under this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.12
- number: '1305.13'
  heading: Assignment of proceeds - UCC 5-114
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) As used in this section, "proceeds of a letter of credit" means the cash,
    check, accepted draft, or other item of value paid or delivered upon honor or
    giving of value by the issuer or any nominated person under the letter of credit.
    The term does not include a beneficiary''s drawing rights or documents presented
    by the beneficiary.

    (B) A beneficiary may assign its right to part or all of the proceeds of a letter
    of credit. The beneficiary may do so before presentation as a present assignment
    of its right to receive proceeds contingent upon its compliance with the terms
    and conditions of the letter of credit.

    (C) An issuer or nominated person need not recognize an assignment of proceeds
    of a letter of credit until it consents to the assignment.

    (D) An issuer or nominated person has no obligation to give or withhold its consent
    to an assignment of proceeds of a letter of credit, but consent may not be unreasonably
    withheld if the assignee possesses and exhibits the letter of credit and presentation
    of the letter of credit is a condition to honor.

    (E) Rights of a transferee beneficiary or nominated person are independent of
    the beneficiary''s assignment of the proceeds of a letter of credit and are superior
    to the assignee''s right to the proceeds.

    (F) Neither the rights recognized by this section between an assignee and an issuer,
    transferee beneficiary, or nominated person nor the issuer''s or nominated person''s
    payment of proceeds to an assignee or a third person affect the rights between
    the assignee and any person other than the issuer, transferee beneficiary, or
    nominated person. The mode of creating and perfecting a security interest in or
    granting an assignment of a beneficiary''s rights to proceeds is governed by Chapter
    1309. of the Revised Code or other law. Against persons other than the issuer,
    transferee beneficiary, or nominated person, the rights and obligations arising
    upon the creation of a security interest or other assignment of a beneficiary''s
    right to proceeds and its perfection are governed by Chapter 1309. of the Revised
    Code or other law.'
