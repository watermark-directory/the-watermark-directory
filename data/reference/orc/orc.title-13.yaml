- number: '1322.21'
  heading: Conditions for issuing mortgage loan originator license; renewal
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) Upon the conclusion of the investigation required under division (C)
    of section 1322.20 of the Revised Code, the superintendent of financial institutions
    shall issue a mortgage loan originator license to the applicant if the superintendent
    finds that the following conditions are met:

    (1) The application is accompanied by the application fee and any fee required
    by the nationwide mortgage licensing system and registry.

    (a) If a check or other draft instrument is returned to the superintendent for
    insufficient funds, the superintendent shall notify the applicant by certified
    mail, return receipt requested, that the application will be withdrawn unless
    the applicant, within thirty days after receipt of the notice, submits the application
    fee and a one-hundred-dollar penalty to the superintendent. If the applicant does
    not submit the application fee and penalty within that time period, or if any
    check or other draft instrument used to pay the fee or penalty is returned to
    the superintendent for insufficient funds, the application shall be withdrawn.

    (b) If a check or other draft instrument is returned to the superintendent for
    insufficient funds after the license has been issued, the superintendent shall
    notify the licensee by certified mail, return receipt requested, that the license
    issued in reliance on the check or other draft instrument will be canceled unless
    the licensee, within thirty days after receipt of the notice, submits the application
    fee and a one-hundred-dollar penalty to the superintendent. If the licensee does
    not submit the application fee and penalty within that time period, or if any
    check or other draft instrument used to pay the fee or penalty is returned to
    the superintendent for insufficient funds, the license shall be canceled immediately
    without a hearing, and the licensee shall cease activity as a loan originator.

    (2) The applicant has not made a material misstatement of fact or material omission
    of fact in the application.

    (3) The applicant has not been convicted of or pleaded guilty or nolo contendere
    to a disqualifying offense as determined in accordance with section 9.79 of the
    Revised Code.

    (4) The applicant completed the prelicensing instruction set forth in division
    (B) of section 1322.20 of the Revised Code.

    (5) The applicant''s financial responsibility and general fitness command the
    confidence of the public and warrant the belief that the business will be operated
    honestly and fairly in compliance with the purposes of this chapter. The superintendent
    shall not use a credit score or bankruptcy as the sole basis for a license denial.

    (6) The applicant is in compliance with the surety bond requirements of section
    1322.32 of the Revised Code.

    (7) The applicant has not had a mortgage loan originator license, or comparable
    authority, revoked in any governmental jurisdiction.

    (B) The license issued under division (A) of this section may be renewed annually
    on or before the thirty-first day of December if the superintendent finds that
    all of the following conditions are met:

    (1) The renewal application is accompanied by a nonrefundable renewal fee of two
    hundred dollars and any fee required by the nationwide mortgage licensing system
    and registry. If a check or other draft instrument is returned to the superintendent
    for insufficient funds, the superintendent shall notify the licensee by certified
    mail, return receipt requested, that the license renewed in reliance on the check
    or other draft instrument will be canceled unless the licensee, within thirty
    days after receipt of the notice, submits the renewal fee and a one-hundred-dollar
    penalty to the superintendent. If the licensee does not submit the renewal fee
    and penalty within that time period, or if any check or other draft instrument
    used to pay the fee or penalty is returned to the superintendent for insufficient
    funds, the license shall be canceled immediately without a hearing, and the licensee
    shall cease activity as a loan originator.

    (2) The applicant has completed at least eight hours of continuing education as
    required under section 1322.28 of the Revised Code.

    (3) The applicant meets the conditions set forth in divisions (A)(2), (4), (5),
    (6), and (7) of this section.

    (4) The applicant has not been convicted of or pleaded guilty or nolo contendere
    to any of the following in a domestic, foreign, or military court:

    (a) During the seven-year period immediately preceding the date of the renewal
    application but excluding any time before the license was issued, a misdemeanor
    involving theft or any felony;

    (b) At any time between the date of the original license and the date of the renewal
    application, a felony involving an act of fraud, dishonesty, a breach of trust,
    theft, or money laundering.

    (5) The applicant''s license is not subject to an order of suspension or an unpaid
    and past due fine imposed by the superintendent.

    (C)(1) Subject to division (C)(2) of this section, if a license renewal application
    fee, including any fee required by the nationwide mortgage licensing system and
    registry, is received by the superintendent after the thirty-first day of December,
    the license shall not be considered renewed, and the applicant shall cease activity
    as a mortgage loan originator.

    (2) Division (C)(1) of this section shall not apply if the applicant, not later
    than forty-five days after the renewal deadline, submits the renewal application
    and any other required fees and a one-hundred-fifty-dollar penalty to the superintendent.

    (D) Mortgage originator licenses annually expire on the thirty-first day of December.

    (E) The pardon or expungement of a conviction shall not be considered a conviction
    for purposes of this section. When determining the eligibility of an applicant,
    the superintendent may consider the underlying crime, facts, or circumstances
    connected with a pardoned or expunged conviction.

    (F) Notwithstanding any provision of this chapter to the contrary, the superintendent
    shall issue a mortgage loan originator license in accordance with Chapter 4796.
    of the Revised Code to an applicant if either of the following applies:

    (1) The applicant holds a license in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a mortgage loan originator
    in a state that does not issue that license.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.21
- number: '1322.27'
  heading: Examination for mortgage loan originator license
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: 'Each applicant for a mortgage loan originator license shall submit to a written
    test that is developed and approved by the nationwide mortgage licensing system
    and registry and administered by an approved test provider.

    (A) The test shall adequately measure the applicant''s knowledge and comprehension
    in appropriate subject areas, including ethics, federal and state law related
    to mortgage origination, fraud, consumer protection, and the nontraditional mortgage
    marketplace, and fair lending issues.

    (B) An individual shall not be considered to have passed the written test unless
    the individual answers at least seventy-five per cent of the questions correctly.

    (C) An individual may retake the test three consecutive times provided the period
    between taking the tests is at least thirty days. If an individual fails three
    consecutive tests, the individual shall be required to wait at least six months
    before taking the test again.

    (D) If a mortgage loan originator fails to maintain a valid mortgage loan originator
    license for a period of five years or longer, the individual shall be required
    to retake the test.

    For this purpose, any time during which the individual is a registered mortgage
    loan originator shall not be taken into account.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.27
- number: '1322.28'
  heading: Continuing education for mortgage loan originator
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) Each licensee shall complete at least eight hours of continuing education
    every calendar year. To fulfill this requirement, the eight hours of continuing
    education must be offered in a course or program of study reviewed and approved
    by the superintendent of financial institutions. The course or program of study
    shall include all of the following:

    (1) Three hours of applicable federal law and regulations;

    (2) Two hours of ethics, which shall include instruction on fraud, consumer protection,
    and fair lending issues;

    (3) Two hours of training related to lending standards for non-qualified mortgages,
    as defined in 12 C.F.R. 1026.43, or the nontraditional mortgage product marketplace.

    (B) Continuing education courses shall be reviewed and approved by the nationwide
    mortgage licensing system and registry based upon reasonable standards.

    (C) The following conditions shall apply to the continuing education required
    by this section:

    (1) An individual cannot take the same approved course in the same or successive
    years to meet the annual requirement for continuing education.

    (2) An individual can only receive credit for a continuing education course in
    the year in which the course is taken, unless the individual is making up a deficiency
    in continuing education as permitted by rule or order of the superintendent.

    (3) A licensee who subsequently becomes unlicensed must complete the continuing
    education requirement for the last year in which the license was held prior to
    the issuance of a new or renewed license.

    (4) A licensee who is approved as an instructor of a continuing education course
    receives credit for the licensee''s own annual continuing education requirement
    at the rate of two credit hours for every one hour taught.

    (5) If an individual successfully completed a continuing education course reviewed
    and approved by the nationwide mortgage licensing system and registry as required
    by another state, the individual can receive credit toward completion of the continuing
    education requirement of this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.28
- number: '1322.29'
  heading: Supervision of mortgage loan originator; transfer of license
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) A registrant or entity holding a valid letter of exemption under division
    (B)(1) of section 1322.05 of the Revised Code shall supervise all business of
    a mortgage loan originator conducted at the principal office, any branch office,
    or other location used by the individual mortgage loan originator.

    (B) If a mortgage loan originator''s employment or association is terminated for
    any reason, the licensee may request the transfer of the license to another registrant
    by submitting a transfer application, along with a fifteen-dollar fee and any
    fee required by the national mortgage licensing system and registry, to the superintendent
    of financial institutions or may request the superintendent in writing to hold
    the license in escrow. Any licensee whose license is held in escrow shall cease
    activity as a mortgage loan originator. A licensee whose license is held in escrow
    shall be required to apply for renewal annually and to comply with the annual
    continuing education requirement.

    (C) A registrant may employ or be associated with a mortgage loan originator on
    a temporary basis pending the transfer of the mortgage loan originator''s license
    to the registrant, if the registrant receives written confirmation from the superintendent
    that the mortgage loan originator is licensed under this chapter.

    (D) Notwithstanding divisions (A) to (C) of this section, if a licensee is employed
    by or associated with a person or entity holding a valid letter of exemption under
    division (B)(1) of section 1322.05 of the Revised Code, and if the mortgage loan
    originator''s employment or association is terminated, the mortgage loan originator
    shall notify the superintendent within five business days after termination. The
    licensee may request the transfer of the license to another person or entity holding
    a valid letter of exemption under division (B)(1) of section 1322.05 of the Revised
    Code by submitting a transfer application, along with a fifteen-dollar fee and
    any fee required by the national mortgage licensing system and registry, to the
    superintendent or may request the superintendent in writing to hold the license
    in escrow. A licensee whose license is held in escrow shall cease activity as
    a mortgage loan originator. A licensee whose license is held in escrow shall be
    required to apply for renewal annually and to comply with the annual continuing
    education requirement.

    (E) A licensee may seek to be employed by or associated with a registrant or a
    person or entity holding a valid letter of exemption under division (B)(1) of
    section 1322.05 of the Revised Code, if the registrant receives written confirmation
    from the superintendent that the mortgage loan originator is licensed under this
    chapter.'
