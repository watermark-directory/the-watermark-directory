- number: '1321.541'
  heading: Actions by attorney general, county prosecutor to enforce General Loan
    Law
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) The attorney general may directly bring an action to enjoin a violation
    of sections 1321.51 to 1321.60 of the Revised Code with the same rights, privileges,
    and powers as those described in section 1345.06 of the Revised Code. The prosecuting
    attorney of the county in which the action may be brought may bring an action
    to enjoin a violation of sections 1321.51 to 1321.60 of the Revised Code only
    if the prosecuting attorney first presents any evidence of the violation to the
    attorney general and, within a reasonable period of time, the attorney general
    has not agreed to bring the action.

    (B)(1) The prosecuting attorney of the county in which an alleged offense may
    be prosecuted may initiate criminal proceedings under sections 1321.51 to 1321.60
    of the Revised Code.

    (2) In order to initiate criminal proceedings under sections 1321.51 to 1321.60
    of the Revised Code, the attorney general shall first present any evidence of
    criminal violations to the prosecuting attorney of the county in which the alleged
    offense may be prosecuted. If, within a reasonable period of time, the prosecuting
    attorney has not agreed to prosecute the violations, the attorney general may
    proceed in the prosecution with all the rights, privileges, and powers conferred
    by law on prosecuting attorneys, including the power to appear before grand juries
    and to interrogate witnesses before such grand juries.

    (C) These powers of the attorney general shall be in addition to any other applicable
    powers of the attorney general.'
