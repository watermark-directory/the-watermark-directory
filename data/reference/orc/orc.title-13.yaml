  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1317.031
- number: '1317.032'
  heading: Asserting defenses against holder, assignee, or transferee of purchase
    money loan installment note or retail installment contract
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: '(A) A buyer who is entitled to assert in an action in connection with a consumer
    transaction any of the following defenses against the seller of goods or services
    that are obtained pursuant to a purchase money loan installment note or retail
    installment contract may also assert the defenses against the holder, assignee,
    or transferee of the purchase money loan installment note or retail installment
    contract, whether or not any notice of potential claims and defenses is included
    in the note or contract:

    (1) That the subject of the consumer transaction was not furnished or delivered
    by the seller in accordance with the agreed upon terms of the transaction;

    (2) That, as evidenced by any writing in the consumer transaction, the subject
    of the transaction is not of the particular brand, color, or model that it was
    represented to be;

    (3) That the subject of the consumer transaction is not new or unused, if the
    subject was represented by the seller to be new or unused;

    (4) That the subject of the consumer transaction did not conform to any express
    or implied warranty made by the seller;

    (5) That the consumer transaction was entered into because of a fraudulent act
    or misrepresentation committed or made by the seller.

    (B) If a creditor, in writing, requests a debtor to disclose, in writing, whether
    the proceeds of a loan that he receives or will receive are to be applied to a
    consumer transaction, the debtor shall disclose at that time any such intended
    application. The written request imposes a continuing obligation upon the debtor
    to disclose any application of any part of the proceeds to a consumer transaction.
    If the debtor fails to disclose any application of the proceeds to a consumer
    transaction, the loan shall not be considered a purchase money loan for purposes
    of this chapter.

    (C) A buyer, who has a defense against a seller arising out of a consumer transaction
    that he is entitled to assert as a defense against a holder, assignee, or transferee
    of a purchase money loan installment note or retail installment contract and as
    a cause of action against that seller, may assert the cause of action to recover
    from the holder, assignee, or transferee of the purchase money loan installment
    note or retail installment contract, the amount of any payments made to the holder,
    assignee, or transferee, if all of the following apply:

    (1) The buyer has presented, or has made a reasonable effort to present, his claim
    to the seller, and furnished a copy of the claim to the holder, assignee, or transferee.

    (2) The seller has not settled the claim within thirty days after the request
    if the buyer has presented the claim to the seller.

    (3) The buyer''s action against the holder, assignee, or transferee is brought
    within the earlier of the following dates:

    (a) The date fixed by the note or contract for the last payment due under the
    note or contract;

    (b) Two years after the date on which the note or contract is executed.

    The assertion of such an action against the holder, assignee, or transferee is
    authorized even if the grounds for the cause of action against the seller are
    asserted as a defense in an action by the holder, assignee, or transferee.

    (D)(1) As used in this section, "claim" means only those claims that arise from
    a consumer transaction evidenced by a purchase money loan installment note or
    retail installment contract, that do not involve a claim of personal injury, death,
    or property damage.

    (2) The provisions of this section shall not be construed to limit or otherwise
    affect any other right, claim, or defense that a buyer may assert against a seller
    or any other person in an action relative to a consumer transaction, purchase
    money loan installment note, or retail installment contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1317.032
- number: '1317.04'
  heading: Separate items to be listed in written instrument
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: 'The written instrument evidencing a retail installment sale and required
    by section 1317.02 of the Revised Code shall recite the following:

    (A) The cash price of the specific goods.

    (B) The amount in cash of the retail buyer''s down payment, if any, whether made
    in money or goods or partly in money or partly in goods.

    (C) The unpaid balance of the cash price payable by the retail buyer to the retail
    seller which is the difference between divisions (A) and (B).

    (D) The amount included for any insurance and the types of insurance coverage.

    (E) The principal balance owed on the retail installment contract which is the
    sum total of divisions (C) and (D).

    (F) The amount of the finance charge.

    (G) The time balance or indebtedness owed by the retail buyer to the retail seller
    and the number of installment payments required and the amount and date of each
    payment necessary finally to pay the time balance which is the sum total of divisions
    (E) and (F).

    Divisions (D) and (F) may be added together and stated as one sum in the written
    instrument and if so stated division (E) may be omitted, but in such event the
    retail seller or the retail seller''s successor in interest shall, within twenty-five
    days after the making of the retail installment contract, deliver personally,
    send by mail, or cause to be sent by mail, to the retail buyer at the retail buyer''s
    address as shown on the retail installment contract, a statement reciting the
    separate amounts of divisions (D), (E), and (F). Division (F) may be stated as
    a rate, if said rate does not exceed eight per cent per annum straight interest,
    in which event the time balance provided in division (G) need not be stated.

    The amount and date of each payment need not be separately listed if the payments
    are specified in terms of a series of payments of specified amounts, which amounts
    may state the principal amount plus the finance charge in terms of a rate at specified
    intervals of time from an initial date.

    The initial date for the payment of the first installment may be a calendar date
    or may refer to the time of delivery or installation.

    As used in this section "down payment" means that part of the payment of the cash
    price required by the retail seller as a condition to the delivery of the specific
    goods sold or to be sold or to the extension of credit to the retail buyer for
    any portion of the cash price.'
