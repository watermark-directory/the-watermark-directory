    name: Labels And Marks
  text: No person, other than the owner, shall launder, wash, clean, renovate, or
    cause to be laundered, washed, cleaned, or renovated, any towels, coats, aprons,
    toilet devices, or other supplies used for the purpose of cleanliness and sanitation,
    upon which a name, mark, or device filed under the provisions of sections 1329.41
    to 1329.53, inclusive, of the Revised Code is produced, the possession of which,
    claimed by lease or rental from the owner thereof, except by the written consent
    of the owner thereof. Any person who finds or receives such property in the ordinary
    course of business and under circumstances which gives him knowledge and means
    of inquiring as to the true owner, or who appropriates such articles to his own
    use, or the use of another person, contrary to sections 1329.41 to 1329.53, inclusive,
    of the Revised Code, without having first made reasonable efforts to find the
    owner and restore the property to him, is presumed guilty of traffic in the same,
    contrary to such sections.
