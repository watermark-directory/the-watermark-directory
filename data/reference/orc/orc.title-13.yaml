- number: '1343.02'
  heading: Written stipulations for payment of interest
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1343'
    name: Interest
  text: Upon all judgments, decrees, or orders, rendered on any bond, bill, note,
    or other instrument of writing containing stipulations for the payment of interest
