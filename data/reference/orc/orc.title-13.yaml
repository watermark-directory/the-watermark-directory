  heading: Illegal contract
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: A contract or agreement in violation of sections 1331.01 to 1331.14, inclusive,
    of the Revised Code, is void.
