- number: '1345.48'
  heading: Deceptive acts or practices - damages
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Failure to comply with sections 1345.41 to 1345.50 of the Revised Code
    constitutes a deceptive act or practice in connection with a consumer transaction
    in violation of section 1345.02 of the Revised Code.

    (B) If the seller of a prepaid entertainment contract fails to comply with division
    (D) (4) (a) of section 1345.44 of the Revised Code, the buyer may recover the
    amount of money due to him under that section and, in addition, may recover damages
    in an amount equal to the amount of money due to him and reasonable attorney''s
    fees.'
