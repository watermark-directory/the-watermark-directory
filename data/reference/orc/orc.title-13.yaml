- number: '1332.05'
  heading: Legislation expending public moneys for cable service
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: '(A)(1) In addition to satisfying any other applicable notice and hearing
    requirements, the legislative authority of a political subdivision of this state
    shall provide notice in accordance with division (B) of this section of its consideration
    of an ordinance or resolution that would authorize the expenditure of public money
    for a cable system or the provision of cable service over a cable system, including,
    but not limited to, an ordinance or resolution that would authorize any of the
    following:

    (a) A feasibility study, marketing study, or any cost-benefit analysis concerning
    the establishment, acquisition, construction, improvement, financing, leasing,
    management, or operation of a cable system or the provision of cable service over
    a cable system;

    (b) The acquisition, construction, installation, improvement, financing, lease,
    or agreement for management or operation of facilities capable of providing cable
    service over a cable system;

    (c) An agreement or arrangement for the use of a cable system or for the provision
    of cable service over a cable system;

    (d) Approval of the terms of a franchise agreement for the political subdivision
    as a public cable service provider, if any such agreement exists, or with any
    other public cable service provider to provide cable service over a cable system.

    (2) Any ordinance or resolution enacted by the legislative authority of a political
    subdivision of this state authorizing the formation of a public cable service
    provider by the political subdivision shall include a comprehensible statement
    of the general plan for financing the acquisition, construction, installation,
    improvement, or lease of the cable system. No such ordinance or resolution shall
    be deemed an emergency ordinance or resolution or a measure necessary for the
    immediate preservation of the public peace, health, or safety in the political
    subdivision, and no such ordinance or resolution shall take effect sooner than
    thirty days after its date of enactment. If, within thirty days after such date
    of enactment, a petition signed by ten per cent of the electors of the political
    subdivision, based upon the total number of votes cast at the last preceding general
    election of the political subdivision, shall be filed with the appropriate office
    demanding a referendum on the ordinance or resolution, the ordinance or resolution
    shall not take effect until submitted to the electors and approved by a majority
    of those voting on it.

    (3) Divisions (A)(1) and (2) of this section apply only with respect to the first
    time an ordinance or resolution described, respectively, in division (A)(1) or
    (2) of this section is considered or enacted, respectively, by a legislative authority,
    and a legislative authority need not comply with division (A)(1) or (2) of this
    section regarding any ordinance or resolution that pertains to the same cable
    system and that is considered or enacted, respectively, subsequent to an ordinance
    or resolution that was enacted and that complied with division (A)(1) or (2) of
    this section, respectively.

    (B) Notice under division (A)(1) of this section shall be given at least forty-five
    days prior to the enactment of the ordinance or resolution and shall be given
    to all persons that have filed a pending application with the political subdivision
    to provide within its jurisdiction cable service over a cable system or are providing
    cable service over a cable system pursuant to a franchise granted by the political
    subdivision. The notice shall be in writing, delivered to the address designated
    by the person as the address for receipt of notices or, if no such designation
    has been made, to the operating address of that person as registered with the
    political subdivision. The notice shall be delivered by certified mail, registered
    mail, overnight delivery, or a similar method of receipted delivery.

    (C) No political subdivision shall fail to comply with division (A) of this section.'
