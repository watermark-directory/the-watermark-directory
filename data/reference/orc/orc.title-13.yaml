- number: '1327.291'
  heading: Prohibited agreements to gain competitive advantage in sale of milk or
    milk products
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: No milk dealer shall directly or indirectly through arrangements with other
    persons provide refrigerated bulk milk dispensers or parts or accessories thereof
    to any other person as a means of awarding a premium, rebate, or discount in order
    to gain competitive advantage in the sale of milk or milk products. Whenever any
    such item is provided or sold at less than its prevailing wholesale price, it
    shall be presumed it was provided as a premium, rebate, or discount.
