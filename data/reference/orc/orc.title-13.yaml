- number: '1309.336'
  heading: Commingled goods - UCC 9-336
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) As used in this section, "commingled goods" means goods that are physically
    united with other goods in such a manner that their identity is lost in a product
    or mass.

    (B) A security interest does not exist in commingled goods as such. However, a
    security interest may attach to a product or mass that results when goods become
    commingled goods.

    (C) If collateral becomes commingled goods, a security interest attaches to the
    product or mass.

    (D) If a security interest in collateral is perfected before the collateral becomes
    commingled goods, the security interest that attaches to the product or mass under
    division (C) of this section is perfected.

    (E) Except as otherwise provided in division (F) of this section, the other provisions
    of sections 1309.301 to 1309.342 of the Revised Code determine the priority of
    a security interest that attaches to the product or mass under division (C) of
    this section.

    (F) If more than one security interest attaches to the product or mass under division
    (C) of this section, the following rules determine priority:

    (1) A security interest that is perfected under division (D) of this section has
    priority over a security interest that is unperfected at the time the collateral
    becomes commingled goods.

    (2) If more than one security interest is perfected under division (D) of this
    section, the security interests rank equally in proportion to the value of the
    collateral at the time it became commingled goods.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.336
- number: '1309.337'
  heading: Priority of security interests in goods covered by certificate of title
    - UCC 9-337
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'If, while a security interest in goods is perfected by any method under the
    law of another jurisdiction, this state issues a certificate of title that does
    not show that the goods are subject to the security interest or contain a statement
    that they may be subject to security interests not shown on the certificate:

    (A) A buyer of the goods, other than a person in the business of selling goods
    of that kind, takes free of the security interest if the buyer gives value and
    receives delivery of the goods after issuance of the certificate and without knowledge
    of the security interest; and

    (B) The security interest is subordinate to a conflicting security interest in
    the goods that attaches, and is perfected under division (B) of section 1309.311
    of the Revised Code, after issuance of the certificate and without the conflicting
    secured party''s knowledge of the security interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.337
- number: '1309.338'
  heading: Priority of security interest or agricultural lien perfected by filed financing
    statement providing certain incorrect information - UCC 9-338
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'If a security interest or agricultural lien is perfected by a filed financing
    statement providing information described in division (B)(5) of section 1309.516
    of the Revised Code that is incorrect at the time the financing statement is filed:

    (A) The security interest or agricultural lien is subordinate to a conflicting
    perfected security interest in the collateral to the extent that the holder of
    the conflicting security interest gives value in reasonable reliance upon the
    incorrect information; and

    (B) A purchaser, other than a secured party, of the collateral takes free of the
    security interest or agricultural lien to the extent that, in reasonable reliance
    upon the incorrect information, the purchaser gives value and, in the case of
    tangible chattel paper, tangible documents, goods, instruments, or a security
    certificate, receives delivery of the collateral.'
