- number: '1329.48'
  heading: Requiring, taking, paying or accepting of deposit not deemed a sale
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: The requiring, taking, paying or accepting of any deposit for any purpose
    upon any articles or supplies shall not be deemed to constitute a sale of such
    property, either optional or otherwise, for purposes of sections 1329.41 to 1329.53,
    inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.48
- number: '1329.49'
  heading: Filling or re-filling of receptacle - removal of identity
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: No person shall use, give, buy, take, destroy, sell or otherwise dispose of,
    or traffic in, articles or supplies, fill or re-fill any vessel, receptacle or
    utensil upon which a name, mark, or device filed hereunder is produced, or refuse
    to return such articles or supplies on demand of the owner, or to deface, erase,
    obliterate, cover up or otherwise remove or conceal any such name, mark or device,
    unless consent of the owner is obtained or unless the articles or supplies shall
    have been purchased from the said owner.
  history: null
