- number: '1305.08'
  heading: Fraud and forgery - UCC 5-109
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) If a presentation is made that appears on its face strictly to comply
    with the terms and conditions of the letter of credit, but a required document
    is forged or materially fraudulent, or honor of the presentation would facilitate
    a material fraud by the beneficiary on the issuer or applicant:

    (1) The issuer shall honor the presentation, if honor is demanded by (a) a nominated
    person who has given value in good faith and without notice of forgery or material
    fraud, (b) a confirmer who has honored its confirmation in good faith, (c) a holder
    in due course of a draft drawn under the letter of credit which was taken after
    acceptance by the issuer or nominated person, or (d) an assignee of the issuer''s
    or nominated person''s deferred obligation that was taken for value and without
    notice of forgery or material fraud after the obligation was incurred by the issuer
    or nominated person; and

    (2) The issuer, acting in good faith, may honor or dishonor the presentation in
    any other case.

    (B) If an applicant claims that a required document is forged or materially fraudulent
    or that honor of the presentation would facilitate a material fraud by the beneficiary
    on the issuer or applicant, a court of competent jurisdiction may temporarily
    or permanently enjoin the issuer from honoring a presentation or grant similar
    relief against the issuer or other persons only if the court finds that:

    (1) The relief is not prohibited under the law applicable to an accepted draft
    or deferred obligation incurred by the issuer;

    (2) A beneficiary, issuer, or nominated person who may be adversely affected is
    adequately protected against loss that it may suffer because the relief is granted;

    (3) All of the conditions to entitle a person to the relief under the law of this
    state have been met; and

    (4) On the basis of the information submitted to the court, the applicant is more
    likely than not to succeed under its claim of forgery or material fraud and the
    person demanding honor does not qualify for protection under division (A)(1) of
    this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.08
- number: '1305.09'
  heading: Warranties - UCC 5-110
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) If its presentation is honored, the beneficiary warrants:

    (1) To the issuer, any other person to whom presentation is made, and the applicant
    that there is no fraud or forgery of the kind described in division (A) of section
    1305.08 of the Revised Code; and

    (2) To the applicant that the drawing does not violate any agreement between the
    applicant and beneficiary or any other agreement intended by them to be augmented
    by the letter of credit.

    (B) The warranties in division (A) of this section are in addition to warranties
    arising under Chapters 1303., 1304., 1307., and 1308. of the Revised Code because
    of the presentation or transfer of documents covered by any of those chapters.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.09
- number: '1305.10'
  heading: Remedies - UCC 5-111
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) If an issuer wrongfully dishonors or repudiates its obligation to pay
    money under a letter of credit before presentation, the beneficiary, successor,
    or nominated person presenting on its own behalf may recover from the issuer the
    amount that is the subject of the dishonor or repudiation. If the issuer''s obligation
    under the letter of credit is not for the payment of money, the claimant may obtain
    specific performance or, at the claimant''s election, recover an amount equal
    to the value of performance from the issuer. In either case, the claimant may
    also recover incidental but not consequential damages. The claimant is not obligated
    to take action to avoid damages that might be due from the issuer under this division.
    If, although not obligated to do so, the claimant avoids damages, the claimant''s
    recovery from the issuer must be reduced by the amount of damages avoided. The
    issuer has the burden of proving the amount of damages avoided. In the case of
    repudiation the claimant need not present any document.

    (B) If an issuer wrongfully dishonors a draft or demand presented under a letter
    of credit or honors a draft or demand in breach of its obligation to the applicant,
    the applicant may recover damages resulting from the breach, including incidental
    but not consequential damages, less any amount saved as a result of the breach.

    (C) If an adviser or nominated person other than a confirmer breaches an obligation
    under this chapter or an issuer breaches an obligation not covered in division
    (A) or (B) of this section, a person to whom the obligation is owed may recover
    damages resulting from the breach, including incidental but not consequential
    damages, less any amount saved as a result of the breach. To the extent of the
    confirmation, a confirmer has the liability of an issuer specified in this division
    and division (A) or (B) of this section.

    (D) An issuer, nominated person, or adviser who is found liable under division
    (A), (B), or (C) of this section shall pay interest on the amount owed thereunder
    from the date of wrongful dishonor or other appropriate date.

    (E) Reasonable attorney''s fees and other expenses of litigation must be awarded
    to the prevailing party in an action in which a remedy is sought under this chapter.

    (F) Damages that would otherwise be payable by a party for breach of an obligation
    under this chapter may be liquidated by agreement or undertaking, but only in
    an amount or by a formula that is reasonable in light of the harm anticipated.'
