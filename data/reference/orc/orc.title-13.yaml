  url: https://codes.ohio.gov/ohio-revised-code/section-1315.122
- number: '1315.13'
  heading: Superintendent to establish fees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: 'Annually, the superintendent shall establish both of the following:

    (A) The application fee for an application for a license to transmit money under
    section 1315.03 of the Revised Code;

    (B) An annual fee described in division (E) of section 1315.04 of the Revised
    Code for each licensee to carry on the business of a money transmitter. When establishing
    the annual fee for each licensee, the superintendent may consider the number of
    offices and authorized delegates the licensee has and the volume of business the
    licensee does in this state.'
