- number: '1322.16'
  heading: Transfer of ownership interests; notification
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) A registrant that is a corporation, limited liability company, partnership,
    trust, or other business entity or association shall notify the division of financial
    institutions of every sale, transfer, or hypothecation of any stock, security,
    membership, partnership, or other equitable, beneficial, or ownership interest
    in the entity or association, if the interest represents at least a five per cent
    membership, partnership, or other equitable, beneficial, or ownership interest
    in the entity or association.

    (B) Every person that acquires or otherwise receives an interest described in
    division (A) of this section is subject to this chapter. The division may make
    any investigation necessary to determine whether any fact or condition exists
    that, if it had existed at the time of the original application for a certificate
    of registration, the fact or condition would have warranted the division to deny
    the application under section 1322.10 of the Revised Code. If such a fact or condition
    is found, the division may, in accordance with Chapter 119. of the Revised Code,
    revoke the registrant''s certificate.'
