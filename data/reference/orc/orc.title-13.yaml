  url: https://codes.ohio.gov/ohio-revised-code/section-1345.71
- number: '1345.72'
  heading: Duty to repair - repair unsuccessful
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) If a new motor vehicle does not conform to any applicable express warranty
    and the consumer reports the nonconformity to the manufacturer, its agent, or
    its authorized dealer during the period of one year following the date of original
    delivery or during the first eighteen thousand miles of operation, whichever is
    earlier, the manufacturer, its agent, or its authorized dealer shall make any
    repairs as are necessary to conform the vehicle to such express warranty, notwithstanding
    the fact that the repairs are made after the expiration of the appropriate time
    period.

    (B) If the manufacturer, its agent, or its authorized dealer is unable to conform
    the motor vehicle to any applicable express warranty by repairing or correcting
    any nonconformity after a reasonable number of repair attempts, the manufacturer,
    at the consumer''s option and subject to division (D) of this section, either
    shall replace the motor vehicle with a new motor vehicle acceptable to the consumer
    or shall accept return of the vehicle from the consumer and refund each of the
    following:

    (1) The full purchase price;

    (2) All incidental damages, including, but not limited to, any fees charged by
    the lender or lessor for making or canceling the loan or lease, and any expenses
    incurred by the consumer as a result of the nonconformity, such as charges for
    towing, vehicle rental, meals, and lodging.

    (C) Nothing in this section imposes any liability on a new motor vehicle dealer
    or creates a cause of action by a buyer against a new motor vehicle dealer.

    (D) Sections 1345.71 to 1345.78 of the Revised Code do not affect the obligation
    of a consumer under a loan or retail installment sales contract or the interest
    of any secured party, except as follows:

    (1) If the consumer elects to take a refund, the manufacturer shall forward the
    total sum required under division (B) of this section by an instrument jointly
    payable to the consumer and any lienholder that appears on the face of the certificate
    of title or the lessor. Prior to disbursing the funds to the consumer, the lienholder
    or lessor may deduct the balance owing to it, including any fees charged for canceling
    the loan or the lease and refunded pursuant to division (B) of this section, and
    shall immediately remit the balance if any, to the consumer and cancel the lien
    or the lease.

    (2) If the consumer elects to take a new motor vehicle, the manufacturer shall
    notify any lienholder noted on the certificate of title under section 4505.13
    of the Revised Code or the lessor. If both the lienholder or the lessor and the
    consumer consent to finance or lease the new motor vehicle obtained through the
    exchange in division (B) of this section, the lienholder or the lessor shall release
    the lien on or surrender the title to the nonconforming motor vehicle after it
    has obtained a lien on or title to the new motor vehicle. If the existing lienholder
    or lessor does not finance or lease the new motor vehicle, it has no obligation
    to discharge the note or cancel the lien on or surrender the title to the nonconforming
    motor vehicle until the original indebtedness or the lease terms are satisfied.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.72
- number: '1345.73'
  heading: Presumptions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Except as provided in division (B) of this section, it shall be presumed
    that a reasonable number of attempts have been undertaken by the manufacturer,
    its dealer, or its authorized agent to conform a motor vehicle to any applicable
    express warranty if, during the period of one year following the date of original
    delivery or during the first eighteen thousand miles of operation, whichever is
    earlier, any of the following apply:

    (1) Substantially the same nonconformity has been subject to repair three or more
    times and either continues to exist or recurs;

    (2) The vehicle is out of service by reason of repair for a cumulative total of
    thirty or more calendar days;

    (3) There have been eight or more attempts to repair any nonconformity;

    (4) There has been at least one attempt to repair a nonconformity that results
    in a condition that is likely to cause death or serious bodily injury if the vehicle
    is driven, and the nonconformity either continues to exist or recurs.

    (B)(1) Any period of time described in division (A) of this section shall be extended
    by any period of time during which the vehicle could not be reasonably repaired
    due to war, invasion, civil unrest, strike, fire, flood, or natural disaster.

    (2) If an extension of time is necessitated under division (B)(1) of this section
    due to the conditions described in that division, the manufacturer shall arrange
    for the use of a vehicle for the consumer whose vehicle is out of service at no
    cost to the consumer. If the manufacturer utilizes or contracts with a motor vehicle
    dealer or other third party to provide the vehicle, the manufacturer shall reimburse
    the motor vehicle dealer or other third party at a reasonable rate for the use
    of the vehicle.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.73
- number: '1345.74'
  heading: Providing written statement of rights
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) At the time of purchase, the manufacturer, either directly or through
    its agent or its authorized dealer, shall provide to the consumer a written statement
    on a separate piece of paper, in ten-point type, all capital letters, in substantially
    the following form: IMPORTANT: IF THIS VEHICLE IS DEFECTIVE, YOU MAY BE ENTITLED
    UNDER STATE LAW TO A REPLACEMENT OR TO COMPENSATION.

    In the case of a leased motor vehicle, the written statement described in this
    division shall be provided to the consumer by the manufacturer, either directly
    or through the lessor, at the time of execution of the lease agreement.

    (B) The manufacturer or authorized dealer shall provide to the consumer, each
    time the motor vehicle of the consumer is returned from being serviced or repaired,
    a fully itemized written statement indicating all work performed on the vehicle,
    including, but not limited to, parts and labor as described in the rules adopted
    pursuant to section 1345.77 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.74
- number: '1345.75'
  heading: Civil action for loss
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Any consumer may bring a civil action in a court of common pleas or other
    court of competent jurisdiction against any manufacturer if the manufacturer fails
    to comply with section 1345.72 of the Revised Code and, in addition to the relief
    to which the consumer is entitled under that section, shall be entitled to recover
    reasonable attorney''s fees and all court costs.

    (B) The remedies in sections 1345.71 to 1345.78 of the Revised Code are in addition
    to remedies otherwise available to consumers under law.

    (C) Any action brought under division (A) of this section shall be commenced within
    five years of the date of original delivery of the motor vehicle. Any period of
    limitation of actions under any federal or Ohio laws with respect to any consumer
    shall be tolled for the period that begins on the date that a complaint is filed
    with an informal dispute resolution mechanism established pursuant to section
    1345.77 of the Revised Code and ends on the date of the decision by the informal
    dispute resolution mechanism.

    (D) It is an affirmative defense to any claim under this section that a nonconformity
    is the result of abuse, neglect, or the unauthorized modification or alteration
    of a motor vehicle by anyone other than the manufacturer, its agent, or its authorized
    dealer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.75
- number: '1345.76'
  heading: Resale or lease of buyback conditions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) A buyback may not be resold or leased in this state unless each of the
    following applies:

    (1) The manufacturer provides the same express warranty that was provided to the
    original consumer, except that the term of the warranty shall be the greater of
    either of the following:

    (a) Twelve thousand miles or twelve months after the date of resale, whichever
    is earlier;

    (b) The remaining term of any manufacturer''s original warranty.

    (2) The manufacturer provides to the consumer, either directly or through its
    agent or its authorized dealer, and prior to obtaining the signature of the consumer
    on any document, a written statement on a separate piece of paper, in ten-point
    type, all capital letters, in substantially the following form:

    WARNING: THIS VEHICLE PREVIOUSLY WAS SOLD AS NEW. IT WAS RETURNED TO THE MANUFACTURER
    OR ITS AGENT IN EXCHANGE FOR A REPLACEMENT VEHICLE OR REFUND AS A RESULT OF THE
    FOLLOWING DEFECT(S) OR CONDITION(S):

    1. ______________________________________________________

    2. ______________________________________________________

    3. ______________________________________________________

    4. ______________________________________________________

    5. ______________________________________________________

    ______________ _________________________ DATE BUYER''S SIGNATURE

    The manufacturer shall list each defect or condition on a separate line of the
    written statement provided to the consumer.

    (B) Notwithstanding the provisions of division (A) of this section, if a new motor
    vehicle has been returned under the provisions of section 1345.72 of the Revised
    Code or a similar law of another state because of a nonconformity likely to cause
    death or serious bodily injury if the vehicle is driven, the motor vehicle may
    not be sold, leased, or operated in this state.

    (C) A manufacturer that takes possession of a buyback shall obtain the certificate
    of title for the buyback from the consumer, lienholder, or the lessor. The manufacturer
    and any subsequent transferee, within thirty days and prior to transferring title
    to the buyback, shall deliver the certificate of title to the clerk of the court
    of common pleas and shall make application for a certificate of title for the
    buyback. The clerk shall issue a buyback certificate of title for the vehicle
    on a form, prescribed by the registrar of motor vehicles, that bears or is stamped
    on its face with the words "BUYBACK: This vehicle was returned to the manufacturer
    because it may not have conformed to its warranty." in black boldface letters
    in an appropriate location as determined by the registrar. The buyback certificate
    of title shall be assigned upon transfer of the buyback, for use as evidence of
    ownership of the buyback and is transferable to any person. Every subsequent certificate
    of title, memorandum certificate of title, or duplicate copy of a certificate
    of title or memorandum certificate of title issued for the buyback also shall
    bear or be stamped on its face with the words "BUYBACK: This vehicle was returned
    to the manufacturer because it may not have conformed to its warranty." in black
    boldface letters in the appropriate location.

    The clerk of the court of common pleas shall charge a fee of five dollars for
    each buyback certificate of title, duplicate copy of a buyback certificate of
    title, memorandum buyback certificate of title, and notation of any lien on a
    buyback certificate of title. The clerk shall retain two dollars and twenty-five
    cents of the fee charged for each buyback certificate of title, four dollars and
    seventy-five cents of the fee charged for each duplicate copy of a buyback certificate
    of title, all of the fees charged for each memorandum buyback certificate of title,
    and four dollars and twenty-five cents of the fee charged for each notation of
    a lien.

    The remaining two dollars and seventy-five cents charged for the buyback certificate
    of title, the remaining twenty-five cents charged for the duplicate copy of a
    buyback certificate of title, and the remaining seventy-five cents charged for
    the notation of any lien on a buyback certificate of title shall be paid to the
    registrar in accordance with division (A) of section 4505.09 of the Revised Code,
    who shall deposit it as required by division (B) of that section.

    (D) No manufacturer that applies for a certificate of title for a buyback shall
    fail to clearly and unequivocally inform the clerk of the court of common pleas
    to whom application for a buyback certificate of title for the motor vehicle is
    submitted that the motor vehicle for which application for a buyback certificate
    of title is being made is a buyback and that the manufacturer, its agent, or its
    authorized dealer is applying for a buyback certificate of title for the motor
    vehicle and not a certificate of title.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.76
- number: '1345.77'
  heading: Establishment and qualification of informal dispute resolution mechanism
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) The attorney general shall adopt rules for the establishment and qualification
    of an informal dispute resolution mechanism to provide for the resolution of warranty
    disputes between the consumer and the manufacturer, its agent, or its authorized
    dealer. The mechanism shall be under the supervision of the division of consumer
    protection of the office of the attorney general and shall meet or exceed the
    minimum requirements for an informal dispute resolution mechanism as provided
    by the "Magnuson-Moss Warranty Federal Trade Commission Improvement Act," 88 Stat.
    2183, 15 U.S.C.A. 2301, and regulations adopted thereunder.

    (B) If a qualified informal dispute resolution mechanism exists and the consumer
    receives timely notification, in writing, of the availability of the mechanism
    with a description of its operation and effect, the cause of action under section
    1345.75 of the Revised Code may not be asserted by the consumer until after the
    consumer has initially resorted to the informal dispute resolution mechanism.
    If such a mechanism does not exist, if the consumer is dissatisfied with the decision
    produced by the mechanism, or if the manufacturer, its agents, or its authorized
    dealer fails to promptly fulfill the terms determined by the mechanism, the consumer
    may assert a cause of action under section 1345.75 of the Revised Code.

    (C) Any violation of a rule adopted pursuant to division (A) of this section is
    an unfair and deceptive act or practice as defined by section 1345.02 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.77
- number: '1345.78'
  heading: Buyback violations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Failure to comply with section 1345.76 of the Revised Code, in connection
    with a consumer transaction as defined in division (A) of section 1345.01 of the
    Revised Code, is an unfair and deceptive act or practice in violation of division
    (A) of section 1345.02 of the Revised Code.

    (B) The attorney general shall investigate any alleged violation of division (D)
    of section 1345.76 of the Revised Code and, in an appropriate case, may bring
    an appropriate action in a court of competent jurisdiction, charging a manufacturer
    with a violation of that division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.78
- number: '1345.81'
  heading: Using nonoriginal equipment manufacturer aftermarket crash parts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) As used in this section:

    (1) "Aftermarket crash part" means a replacement for any of the nonmechanical
    sheet metal or plastic parts that generally constitute the exterior of a motor
    vehicle, including inner and outer panels.

    (2) "Nonoriginal equipment manufacturer aftermarket crash part" or "non-OEM aftermarket
    crash part" means any aftermarket crash part that is not made by or for the manufacturer
    of the motor vehicle.

    (3) "Repair facility" means any motor vehicle dealer, garage, body shop, or other
    commercial entity that undertakes the repair or replacement of those parts that
    generally constitute the exterior of a motor vehicle.

    (4) "Installer" means any individual who actually performs the work of replacing
    or repairing parts of a motor vehicle.

    (5) "Insurer" means any individual serving as an agent or authorized representative
    of an insurance company, involved with the coverage for repair of the motor vehicle
    in question.

    (B) Any insurer who provides an estimate for the repair of a motor vehicle based
    in whole or in part upon the use of any non-OEM aftermarket crash part in the
    repair of the motor vehicle and any repair facility or installer who intends to
    use a non-OEM aftermarket crash part in the repair of a motor vehicle shall comply
    with the following provisions, as applicable:

    (1) If the person requesting the repair chooses to receive a written estimate,
    the insurer, repair facility, or installer providing the estimate shall identify,
    clearly in the written estimate, each non-OEM aftermarket crash part and shall
    contain a written notice with the following language in ten-point or larger type:
    "This estimate has been prepared based upon the use of one or more aftermarket
    crash parts supplied by a source other than the manufacturer of your motor vehicle.
    Warranties applicable to these aftermarket crash parts are provided by the parts
    manufacturer or distributor rather than by your own motor vehicle manufacturer."
    Receipt and approval of the written estimate shall be acknowledged by the signature
    of the person requesting the repair at the bottom of the written estimate.

    (2) If the person requesting the repair chooses to receive an oral estimate or
    no estimate at all, the insurer, repair facility, or installer providing the estimate
    or seeking the person''s approval for repair work to commence shall furnish or
    read to the person a written notice as described in division (B)(1) of this section
    at the time that the oral estimate is given or when the person requesting the
    repair gives approval for the repair work to commence. If the person has chosen
    to receive an oral estimate or no estimate, the written notice described in division
    (B)(1) of this section shall be provided with the final invoice for the repair.

    (C) Any non-OEM aftermarket crash part manufactured after October 16, 1990, shall
    have permanently affixed thereto, or inscribed thereon, prior to the installation
    of the part, the business name or logo of the manufacturer.

    Whenever practical, the location of the affixed or inscribed information upon
    the part shall ensure that the information shall be accessible after installation.

    (D) An insurer, repair facility, or installer may use a salvage motor vehicle
    part in the repair of a motor vehicle, if the salvage motor vehicle part is of
    a like kind and quality to the part in need of repair and is sourced from a salvage
    motor vehicle dealer licensed under Chapter 4738. of the Revised Code.

    (E) Any violation of this section in connection with a consumer transaction as
    defined in section 1345.01 of the Revised Code is an unfair and deceptive act
    or practice as defined by section 1345.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.81
- number: '1345.90'
  heading: Defective assistive device definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: 'As used in sections 1345.90 to 1345.95 of the Revised Code:

    (A) "Assistive device" means a product designed and intended to be used to increase,
    maintain, or improve the functional capabilities of an individual with a disability
    in seeing, hearing, speaking, walking, breathing, performing manual tasks, learning,
    working, or self-care. "Assistive device" includes a wheelchair, motorized scooter,
    assistive listening device, voice synthesized computer module, optical scanner,
    talking software, braille printer, environmental control, adaptive transportation
    aid, communication board, or any device that has a function similar to that of
    any of the foregoing devices. "Assistive device" does not include an invasive
    or noninvasive medical device that attempts to treat a medical condition or a
    hearing aid as defined in section 4747.01 of the Revised Code.

    (B) "Consumer" means a person, other than a manufacturer or supplier, who purchases,
    leases, or otherwise acquires a new assistive device or a person who acquires
    an assistive device while the warranty required by section 1345.91 of the Revised
    Code is in effect.

    (C) "Consumer transaction" means a sale, lease, or other transfer of an assistive
    device to a consumer for consideration of five hundred dollars or more.

    (D) "Defect" means a condition that substantially impairs the use, value, or safety
    of an assistive device. "Defect" does not include a condition resulting from abuse,
    misuse for the ordinary purpose or particular purpose, or unauthorized modification
    or alteration of an assistive device by a consumer.

    (E) "Manufacturer" means a person who manufactures, assembles, imports, or distributes
    assistive devices, including an agent of a manufacturer. "Manufacturer" does not
    include a supplier.

    (F) "Supplier" means a seller, lessor, assignor, franchiser, or other person,
    other than a manufacturer, engaged in the business of effecting consumer transactions,
    whether or not the person deals directly with the consumer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.90
- number: '1345.91'
  heading: Express written warranty
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) As used in this section and in section 1345.92 of the Revised Code, "collateral
    costs" mean expenses incurred by a consumer in connection with the repair of a
    defect in an assistive device, including sales tax and the cost of shipping.

    (B) A manufacturer that enters into a consumer transaction, either directly or
    through a supplier, shall provide an express written warranty to the consumer
    covering the full cost of any repair of the assistive device, or the cost, as
    specified in section 1345.92 of the Revised Code, of the replacement of the assistive
    device, necessitated by a defect in the assistive device. The warranty shall also
    cover the consumer''s collateral costs associated with repair or replacement.
    The warranty shall be for a period of not less than one year from the day the
    consumer first possesses the assistive device. The warranty document shall specify
    whether the consumer is to return the assistive device to the manufacturer or
    to the supplier to invoke the warranty. A manufacturer who fails to provide the
    warranty is deemed to have provided it.

    To invoke the warranty, the consumer shall return the assistive device to the
    manufacturer or supplier, as specified in the warranty document, with an explanation
    of the nature of the defect. The warranty shall be honored if the assistive device
    is returned during the warranty period or, if shipping is required, the consumer
    gives notice of the defect to the manufacturer or supplier during the warranty
    period, regardless of when repairs are actually made.

    (C) A manufacturer or supplier that receives an assistive device under the warranty
    required by this section that has a defect shall replace or attempt to repair
    the assistive device. If the manufacturer or supplier chooses to attempt to repair
    the assistive device, it shall lend the consumer a comparable assistive device
    for use during the repair period if either of the following applies:

    (1) The repair period exceeds twenty-one days, including the day the assistive
    device is tendered to the manufacturer or supplier for repair;

    (2) The defect is the same defect for which the assistive device was returned
    to the manufacturer or supplier for repair on three or more previous occasions.

    (D) A manufacturer''s duty to provide a replacement or reimbursement under this
    section remains in effect for the duration of the warranty period.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.91
- number: '1345.92'
  heading: Repair is unsuccessful or untimely
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) As used in this section:

    (1) "Current lease value" means the sum of the following:

    (a) The total amount the consumer was obligated to pay under a lease for the period
    from the date the lease is terminated to the end of the lease period originally
    agreed to;

    (b) The supplier''s expenses incurred in terminating the lease prior to its agreed-to
    expiration and returning the assistive device to the manufacturer, plus any prepayment
    penalties under a financing agreement;

    (c) The value of the assistive device at the lease expiration date if the lease
    sets forth that value.

    (2) "Reasonable allowance for use" means an amount not to exceed the amount obtained
    by multiplying the total purchase or lease price by a fraction, the denominator
    of which is one thousand eight hundred twenty-five and the numerator of which
    is the number of days the consumer used the assistive device before first notifying
    the manufacturer or supplier of the defect.

    (B) For the purpose of this section, any acquisition of an assistive device other
    than pursuant to a lease shall be treated as a purchase.

    (C) If the manufacturer or supplier is unable to repair the defect in an assistive
    device despite three attempts to repair it or the assistive device is in the possession
    of the manufacturer or supplier for a cumulative total of forty-five or more days,
    the manufacturer or supplier, at the consumer''s option, shall do one of the following:

    (1)(a) If the assistive device was purchased, accept return of the device and
    refund to the consumer and to the holder of any perfected security interest in
    the assistive device, as their interest may appear, the full purchase price plus
    any finance charges and collateral costs, less a reasonable allowance for use;

    (b) If the device was leased, accept return of the assistive device and refund
    to the consumer any amount the consumer paid under the lease plus collateral costs,
    less a reasonable allowance for use. The consumer''s return of the assistive device
    to the manufacturer or supplier under this division terminates the lease.

    (2) Replace the assistive device with a comparable new assistive device within
    thirty days after the consumer offers to return the defective assistive device.
    When the manufacturer or supplier provides the new assistive device, the consumer
    shall return the defective assistive device to the manufacturer along with any
    endorsements necessary to transfer legal possession.

    (D) If the supplier attempts to repair an assistive device under the manufacturer''s
    warranty, the manufacturer shall reimburse the supplier any costs reasonably incurred
    by the supplier in making or attempting to make the repair.

    If a consumer receives a refund under division (C)(1)(b) of this section, the
    manufacturer shall refund to the supplier and to the holder of any perfected security
    interest in the assistive device, as their interest may appear, the current value
    of the written lease, less any expenses or obligations the supplier avoids as
    a result of the early termination of the lease.

    If the supplier provides a new assistive device or a refund under division (C)(1)(a)
    of this section to the consumer, the manufacturer shall refund to the supplier
    an amount equal to the supplier''s purchase price and any costs reasonably incurred
    by the supplier in the supplier''s attempt to repair the assistive device. To
    receive the refund, the supplier shall return the defective assistive device to
    the manufacturer. The manufacturer shall provide the refund to the supplier on
    receipt of the assistive device. When the manufacturer provides the refund, the
    supplier shall provide to the manufacturer any endorsements necessary to transfer
    legal possession to the manufacturer.'
