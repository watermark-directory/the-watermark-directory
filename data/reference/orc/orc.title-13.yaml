- number: '1309.102'
  heading: Definitions and index of definitions - UCC 9-102
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) As used in this chapter, unless the context requires otherwise:

    (1) "Accession" means goods that are physically united with other goods in such
    a manner that the identity of the original goods is not lost.

    (2)(a) "Account," except as used in "account for," means a right to payment of
    a monetary obligation, whether or not earned by performance, (i) for property
    that has been or is to be sold, leased, licensed, assigned, or otherwise disposed
    of, (ii) for services rendered or to be rendered, (iii) for a policy of insurance
    issued or to be issued, (iv) for a secondary obligation incurred or to be incurred,
    (v) for energy provided or to be provided, (vi) for the use or hire of a vessel
    under a charter or other contract, (vii) arising out of the use of a credit or
    charge card or information contained on or for use with the card, or (viii) as
    winnings in a lottery or other game of chance operated or sponsored by a state,
    governmental unit of a state, or person licensed or authorized to operate the
    game by a state or governmental unit of a state.

    (b) "Account" includes health-care insurance receivables.

    (c) "Account" does not include (i) rights to payment evidenced by chattel paper
    or an instrument, (ii) commercial tort claims, (iii) deposit accounts, (iv) investment
    property, (v) letter-of-credit rights or letters of credit, or (vi) rights to
    payment for money or funds advanced or sold, other than rights arising out of
    the use of a credit or charge card or information contained on or for use with
    the card.

    (3) "Account debtor" means a person who is obligated on an account, chattel paper,
    or general intangible. "Account debtor" does not include a person who is obligated
    to pay a negotiable instrument, even if the instrument constitutes part of chattel
    paper.

    (4) "Accounting," except as used in "accounting for," means a record:

    (a) Authenticated by a secured party;

    (b) Indicating the aggregate unpaid secured obligations as of a date not more
    than thirty-five days earlier or thirty-five days later than the date of the record;
    and

    (c) Identifying the components of the obligations in reasonable detail.

    (5) "Agricultural lien" means an interest, other than a security interest, in
    farm products:

    (a) That secures payment or performance of an obligation for:

    (i) Goods or services furnished in connection with a debtor''s farming operation;
    or

    (ii) Rent on real property leased by a debtor in connection with its farming operation.

    (b) That is created by statute in favor of a person who:

    (i) In the ordinary course of business, furnished goods or services to a debtor
    in connection with the debtor''s farming operation; or

    (ii) Leased real property to a debtor in connection with the debtor''s farming
    operation; and

    (c) Whose effectiveness does not depend on the person''s possession of the personal
    property.

    (6) "As-extracted collateral" means:

    (a) Oil, gas, or other minerals that are subject to a security interest that:

    (i) Is created by a debtor having an interest in the minerals before extraction;
    and

    (ii) Attaches to the minerals as extracted; or

    (b) Accounts arising out of the sale at the wellhead or minehead of oil, gas,
    or other minerals in which the debtor had an interest before extraction.

    (7) "Authenticate" means:

    (a) To sign; or

    (b) With present intent to adopt or accept a record, to attach to or logically
    associate with the record an electronic sound, symbol, or process.

    (8) "Bank" means an organization that is engaged in the business of banking. "Bank"
    includes savings banks, savings and loan associations, credit unions, and trust
    companies.

    (9) "Cash proceeds" means proceeds that are money, checks, deposit accounts, or
    the like.

    (10) "Certificate of title" means a certificate of title with respect to which
    a statute provides for the security interest in question to be indicated on the
    certificate as a condition or result of the security interest''s obtaining priority
    over the rights of a lien creditor with respect to the collateral. The term includes
    another record maintained as an alternative to a certificate of title by the governmental
    unit that issues certificates of title if a statute permits the security interest
    in question to be indicated on the record as a condition or result of the security
    interest''s obtaining priority over the rights of a lien creditor with respect
    to the collateral.

    (11)(a) "Chattel paper" means a record that evidences both a monetary obligation
    and a security interest in specific goods, a security interest in specific goods
    and software used in the goods, a security interest in specific goods and license
    of software used in the goods, a lease of specific goods, or a lease of specific
    goods and license of software used in the goods.

    As used in division (A)(11)(a) of this section, "monetary obligation" means a
    monetary obligation secured by the goods or owed under a lease of the goods and
    includes a monetary obligation with respect to software used in the goods.

    (b) If a transaction is evidenced by records that include an instrument or series
    of instruments, the group of records taken together constitutes chattel paper.

    (c) "Chattel paper" does not include (i) charters or other contracts involving
    the use or hire of a vessel or (ii) records that evidence a right to payment arising
    out of the use of a credit or charge card or information contained on or for use
    with the card.

    (12) "Collateral" means the property subject to a security interest or agricultural
    lien, including:

    (a) Proceeds to which a security interest attaches;

    (b) Accounts, chattel paper, payment intangibles, and promissory notes that have
    been sold; and

    (c) Goods that are the subject of a consignment.

    (13) "Commercial tort claim" means a claim arising in tort with respect to which:

    (a) The claimant is an organization; or

    (b) The claimant is an individual, and the claim:

    (i) Arose in the course of the claimant''s business or profession; and

    (ii) Does not include damages arising out of personal injury to or the death of
    an individual.

    (14) "Commodity account" means an account maintained by a commodity intermediary
    in which a commodity contract is carried for a commodity customer.

    (15) "Commodity contract" means a commodity futures contract, an option on a commodity
    futures contract, a commodity option, or another contract if the contract or option
    is:

    (a) Traded on or subject to the rules of a board of trade that has been designated
    as a contract market for such a contract pursuant to the federal commodities laws;
    or

    (b) Traded on a foreign commodity board of trade, exchange, or market and is carried
    on the books of a commodity intermediary for a commodity customer.

    (16) "Commodity customer" means a person for whom a commodity intermediary carries
    a commodity contract on its books.

    (17) "Commodity intermediary" means a person that:

    (a) Is registered as a futures commission merchant under the federal commodities
    laws; or

    (b) In the ordinary course of its business provides clearance or settlement services
    for a board of trade that has been designated as a contract market pursuant to
    the federal commodities laws.

    (18) "Communicate" means:

    (a) To send a written or other tangible record;

    (b) To transmit a record by any means agreed upon by the persons sending and receiving
    the record; or

    (c) In the case of transmission of a record to or by a filing office, to transmit
    a record by any means prescribed by filing-office rule.

    (19) "Consignee" means a merchant to whom goods are delivered in a consignment.

    (20) "Consignment" means a transaction, regardless of its form, in which a person
    delivers goods to a merchant for the purpose of sale and:

    (a) The merchant:

    (i) Deals in goods of that kind under a name other than the name of the person
    making delivery;

    (ii) Is not an auctioneer; and

    (iii) Is not generally known by its creditors to be substantially engaged in selling
    the goods of others;

    (b) With respect to each delivery, the aggregate value of the goods is one thousand
    dollars or more at the time of delivery.

    (c) The goods are not consumer goods immediately before delivery; and

    (d) The transaction does not create a security interest that secures an obligation.

    (21) "Consignor" means a person that delivers goods to a consignee in a consignment.

    (22) "Consumer debtor" means a debtor in a consumer transaction.

    (23) "Consumer goods" means goods that are used or bought for use primarily for
    personal, family, or household purposes.

    (24) "Consumer-goods transaction" means a consumer transaction in which:

    (a) An individual incurs an obligation primarily for personal, family, or household
    purposes; and

    (b) A security interest in consumer goods secures the obligation.

    (25) "Consumer obligor" means an obligor who is an individual and who incurred
    the obligation as part of a transaction entered into primarily for personal, family,
    or household purposes.

    (26) "Consumer transaction" means a transaction in which: (a) an individual incurs
    an obligation primarily for personal, family, or household purposes, (b) a security
    interest secures the obligation, and (c) the collateral is held or acquired primarily
    for personal, family, or household purposes. "Consumer transaction" includes consumer-goods
    transactions.

    (27) "Continuation statement" means an amendment of a financing statement that:

    (a) Identifies, by its file number, the initial financing statement to which it
    relates; and

    (b) Indicates that it is a continuation statement for, or that it is filed to
    continue the effectiveness of, the identified financing statement.

    (28) "Debtor" means:

    (a) A person having an interest, other than a security interest or other lien,
    in the collateral, whether or not the person is an obligor;

    (b) A seller of accounts, chattel paper, payment intangibles, or promissory notes;
    or

    (c) A consignee.

    (29) "Deposit account" means a demand, time, savings, passbook, or similar account
    maintained with a bank but does not include investment property or accounts evidenced
    by an instrument.

    (30) "Document" means a document of title or a receipt of the type described in
    division (B) of section 1307.201 of the Revised Code.

    (31) "Electronic chattel paper" means chattel paper evidenced by a record consisting
    of information stored in an electronic medium.

    (32) "Encumbrance" means a right, other than an ownership interest, in real property.
    "Encumbrance" includes mortgages and other liens on real property.

    (33) "Equipment" means goods other than inventory, farm products, or consumer
    goods.

    (34) "Farm products" means goods, other than standing timber, with respect to
    which the debtor is engaged in a farming operation and that are:

    (a) Crops grown, growing, or to be grown, including:

    (i) Crops produced on trees, vines, and bushes;

    (ii) Aquatic goods produced in aquacultural operations;

    (iii) Algacultural products as defined in section 901.511 of the Revised Code
    that are produced as a result of aglaculture meaning the farming of algae.

    (b) Livestock, born or unborn, including aquatic goods produced in aquacultural
    operations;

    (c) Supplies used or produced in a farming operation; or

    (d) Products of crops or livestock in their unmanufactured states.

    (35) "Farming operation" means raising, cultivating, propagating, fattening, grazing,
    or any other farming, livestock, or aquacultural operation.

    (36) "File number" means the number assigned to an initial financing statement
    under division (A) of section 1309.519 of the Revised Code.

    (37) "Filing office" means an office designated in section 1309.501 of the Revised
    Code as the place to file a financing statement.

    (38) "Filing-office rule" means a rule adopted under section 1309.526 of the Revised
    Code.

    (39) "Financing statement" means a record composed of an initial financing statement
    and any filed record or records relating to the initial financing statement. For
    the purposes of this chapter, financing statements filed for recording with the
    secretary of state shall not be required to include social security or employer
    identification numbers.

    (40) "Fixture filing" means the filing of a financing statement covering goods
    that are or are to become fixtures and satisfying divisions (A) and (B) of section
    1309.502 of the Revised Code. "Fixture filing" includes the filing of a financing
    statement covering goods of a transmitting utility that are or are to become fixtures.

    (41) "Fixtures" means goods that have become so related to particular real property
    that an interest in them arises under real property law.

    (42) "General intangible" means any personal property, including things in action,
    other than accounts, chattel paper, commercial tort claims, deposit accounts,
    documents, goods, instruments, investment property, letter-of-credit rights, letters
    of credit, money, and oil, gas, or other minerals before extraction. "General
    intangible" includes payment intangibles and software.

    (43) "Good faith" has the same meaning as in section 1301.201 of the Revised Code.

    (44)(a) "Goods" means all things that are movable when a security interest attaches.
    "Goods" includes (i) fixtures, (ii) standing timber that is to be cut and removed
    under a conveyance or contract for sale, (iii) the unborn young of animals, (iv)
    crops grown, growing, or to be grown, even if the crops are produced on trees,
    vines, or bushes, and (v) manufactured homes.

    (b) "Goods" also includes a computer program embedded in goods and any supporting
    information provided in connection with a transaction relating to the program
    if (i) the program is associated with the goods in such a manner that it customarily
    is considered part of the goods, or (ii) by becoming the owner of the goods, a
    person acquires a right to use the program in connection with the goods.

    (c) "Goods" does not include a computer program embedded in goods that consist
    solely of the medium in which the program is embedded. "Goods" does not include
    accounts, chattel paper, commercial tort claims, deposit accounts, documents,
    general intangibles, instruments, investment property, letter-of-credit rights,
    letters of credit, money, or oil, gas, or other minerals before extraction.

    (45) "Governmental unit" means a subdivision, agency, department, county, parish,
    municipal corporation, or other unit of the government of the United States, a
    state, or a foreign country. "Governmental unit" includes an organization having
    a separate corporate existence if the organization is eligible to issue debt on
    which interest is exempt from income taxation under the laws of the United States.

    (46) "Health-care-insurance receivable" means an interest in or claim under a
    policy of insurance that is a right to payment of a monetary obligation for health-care
    goods or services provided.

    (47)(a) "Instrument" means a negotiable instrument or any other writing that evidences
    a right to the payment of a monetary obligation, is not itself a security agreement
    or lease, and is of a type that in ordinary course of business is transferred
    by delivery with any necessary indorsement or assignment.

    (b) "Instrument" does not include (i) investment property, (ii) letters of credit,
    or (iii) writings that evidence a right to payment arising out of the use of a
    credit or charge card or information contained on or for use with the card.

    (48) "Inventory" means goods, other than farm products, that:

    (a) Are leased by a person as lessor;

    (b) Are held by a person for sale or lease or to be furnished under a contract
    of service;

    (c) Are furnished by a person under a contract of service; or

    (d) Consist of raw materials, work in process, or materials used or consumed in
    a business.

    (49) "Investment property" means a security, whether certificated or uncertificated,
    a security entitlement, a securities account, a commodity contract, or a commodity
    account.

    (50) "Jurisdiction of organization," with respect to a registered organization,
    means the jurisdiction under whose law the organization is formed or organized.

    (51) "Letter-of-credit right" means a right to payment or performance under a
    letter of credit, whether or not the beneficiary has demanded or is at the time
    entitled to demand payment or performance. "Letter-of-credit right" does not include
    the right of a beneficiary to demand payment or performance under a letter of
    credit.

    (52) "Lien creditor" means:

    (a) A creditor who has acquired a lien on the property involved by attachment,
    levy or the like;

    (b) An assignee for benefit of creditors from the time of assignment;

    (c) A trustee in bankruptcy from the date of the filing of the petition; or

    (d) A receiver in equity from the time of appointment.

    (53) "Manufactured home" means a structure, transportable in one or more sections,
    that, in the traveling mode, is eight body feet or more in width or forty body
    feet or more in length, or, when erected on site, is three hundred twenty or more
    square feet, and that is built on a permanent chassis and designed to be used
    as a dwelling with or without a permanent foundation when connected to the required
    utilities, and includes the plumbing, heating, air conditioning, and electrical
    systems contained in the structure. "Manufactured home" includes any structure
    that meets all of the requirements of this paragraph except the size requirements
    and with respect to which the manufacturer voluntarily files a certification required
    by the United States secretary of housing and urban development and complies with
    the standards established under Title 42 of the United States Code.

    (54) "Manufactured-home transaction" means a secured transaction:

    (a) That creates a purchase-money security interest in a manufactured home, other
    than a manufactured home held as inventory; or

    (b) In which a manufactured home, other than a manufactured home held as inventory,
    is the primary collateral.

    (55) "Mortgage" means a consensual interest in real property, including fixtures,
    that secures payment or performance of an obligation.

    (56) "New debtor" means a person that becomes bound as debtor under division (D)
    of section 1309.203 of the Revised Code by a security agreement previously entered
    into by another person.

    (57)(a) "New value" means (i) money, (ii) money''s worth in property, services,
    or new credit, or (iii) release by a transferee of an interest in property previously
    transferred to the transferee.

    (b) "New value" does not include an obligation substituted for another obligation.

    (58) "Noncash proceeds" means proceeds other than cash proceeds.

    (59)(a) "Obligor" means a person who, with respect to an obligation secured by
    a security interest in or an agricultural lien on the collateral, (i) owes payment
    or other performance of the obligation, (ii) has provided property other than
    the collateral to secure payment or other performance of the obligation, or (iii)
    is otherwise accountable in whole or in part for payment or other performance
    of the obligation.

    (b) "Obligor" does not include issuers or nominated persons under a letter of
    credit.

    (60) "Original debtor," except as used in division (C) of section 1309.310 of
    the Revised Code, means a person who, as debtor, entered into a security agreement
    to which a new debtor has become bound under division (D) of section 1309.203
    of the Revised Code.

    (61) "Payment intangible" means a general intangible under which the account debtor''s
    principal obligation is a monetary obligation.

    (62) "Person related to," with respect to an individual, means:

    (a) The spouse of the individual;

    (b) A brother, brother-in-law, sister, or sister-in-law of the individual;

    (c) An ancestor or lineal descendant of the individual or the individual''s spouse;
    or

    (d) Any other relative, by blood or marriage, of the individual or the individual''s
    spouse who shares the same home with the individual.

    (63) "Person related to," with respect to an organization, means:

    (a) A person directly or indirectly controlling, controlled by, or under common
    control with the organization;

    (b) An officer or director of, or a person performing similar functions with respect
    to, the organization;

    (c) An officer or director of, or a person performing similar functions with respect
    to, a person described in division (A)(63)(a) of this section;

    (d) The spouse of an individual described in division (A)(63)(a), (b), or (c)
    of this section; or

    (e) An individual who is related by blood or marriage to an individual described
    in division (A)(63)(a), (b), (c), or (d) of this section and shares the same home
    with the individual.

    (64) "Proceeds," except as used in division (B) of section 1309.609 of the Revised
    Code, means the following property:

    (a) Whatever is acquired upon the sale, lease, license, exchange, or other disposition
    of collateral;

    (b) Whatever is collected on, or distributed on account of, collateral;

    (c) Rights arising out of collateral;

    (d) To the extent of the value of collateral, claims arising out of the loss,
    nonconformity, or interference with the use of, defects or infringement of rights
    in, or damage to the collateral; or

    (e) To the extent of the value of collateral and to the extent payable to the
    debtor or the secured party, insurance payable by reason of the loss or nonconformity
    of, defects or infringement of rights in, or damage to the collateral.

    (65) "Promissory note" means an instrument that evidences a promise to pay a monetary
    obligation, does not evidence an order to pay, and does not contain an acknowledgment
    by a bank that the bank has received for deposit a sum of money or funds.

    (66) "Proposal" means a record authenticated by a secured party that includes
    the terms on which the secured party is willing to accept collateral in full or
    partial satisfaction of the obligation it secures pursuant to sections 1309.620,
    1309.621, and 1309.622 of the Revised Code.

    (67) "Public-finance transaction" means a secured transaction in connection with
    which:

    (a) Debt securities are issued;

    (b) All or a portion of the securities issued have an initial stated maturity
    of at least twenty years; and

    (c) The debtor, obligor, secured party, account debtor or other person obligated
    on collateral, assignor or assignee of a secured obligation, or assignor or assignee
    of a security interest is a state or a governmental unit of a state.

    (68) "Public organic record" means a record that is available to the public for
    inspection and is:

    (a) A record consisting of the record initially filed with or issued by a state
    or the United States to form or organize an organization and any record filed
    with or issued by the state or the United States that amends or restates the initial
    record;

    (b) An organic record of a business trust consisting of the record initially filed
    with a state and any record filed with the state that amends or restates the initial
    record, if a statute of the state governing business trusts requires that the
    record be filed with the state; or

    (c) A record consisting of legislation enacted by the legislature of a state or
    the congress of the United States that forms or organizes an organization, any
    record amending the legislation, and any record filed with or issued by the state
    or the United States that amends or restates the name of the organization.

    (69) "Pursuant to commitment," with respect to an advance made or other value
    given by a secured party, means pursuant to the secured party''s obligation, whether
    or not a subsequent event of default or other event not within the secured party''s
    control has relieved or may relieve the secured party from its obligation.

    (70) "Record," except as used in "for record," "of record," "record or legal title,"
    and "record owner," means information that is inscribed on a tangible medium or
    that is stored in an electronic or other medium and is retrievable in perceivable
    form.

    (71) "Registered organization" means an organization formed or organized solely
    under the law of a single state or the United States by the filing of a public
    organic record with, the issuance of a public organic record by, or the enactment
    of legislation by the state or the United States. The term includes a business
    trust that is formed or organized under the law of a single state if a statute
    of the state governing business trusts requires that the business trust''s organic
    record be filed with the state.

    (72) "Secondary obligor" means an obligor to the extent that:

    (a) The obligor''s obligation is secondary; or

    (b) The obligor has a right of recourse with respect to an obligation secured
    by collateral against the debtor, another obligor, or property of either.

    (73) "Secured party" means:

    (a) A person in whose favor a security interest is created or provided for under
    a security agreement, whether or not any obligation to be secured is outstanding;

    (b) A person that holds an agricultural lien;

    (c) A consignor;

    (d) A person to whom accounts, chattel paper, payment intangibles, or promissory
    notes have been sold;

    (e) A trustee, indenture trustee, agent, collateral agent, or other representative
    in whose favor a security interest or agricultural lien is created or provided
    for; or

    (f) A person who holds a security interest arising under section 1302.42, 1302.49,
    1302.85, 1304.20, 1305.18, or 1310.54 of the Revised Code.

    (74) "Security agreement" means an agreement that creates or provides for a security
    interest.

    (75) "Send," in connection with a record or notification, means:

    (a) To deposit in the mail, deliver for transmission, or transmit by any other
    usual means of communication, with postage or cost of transmission provided for,
    addressed to any address reasonable under the circumstances; or

    (b) To cause the record or notification to be received within the time that it
    would have been received if properly sent under division (A)(74)(a) of this section.

    (76) "Software" means a computer program and any supporting information provided
    in connection with a transaction relating to the program. "Software" does not
    include a computer program that is included in the definition of goods.

    (77) "State" means a state of the United States, the District of Columbia, Puerto
    Rico, the United States Virgin Islands, or any territory or insular possession
    subject to the jurisdiction of the United States.

    (78) "Supporting obligation" means a letter-of-credit right or secondary obligation
    that supports the payment or performance of an account, chattel paper, a document,
    a general intangible, an instrument, or investment property.

    (79) "Tangible chattel paper" means chattel paper evidenced by a record consisting
    of information that is inscribed on a tangible medium.

    (80) "Termination statement" means an amendment of a financing statement that:

    (a) Identifies, by its file number, the initial financing statement to which it
    relates; and

    (b) Indicates either that it is a termination statement or that the identified
    financing statement is no longer effective.

    (81) "Transmitting utility" means a person primarily engaged in the business of:

    (a) Operating a railroad, subway, street railway, or trolley bus;

    (b) Transmitting communications electrically, electromagnetically, or by light;

    (c) Transmitting goods by pipeline or sewer; or

    (d) Transmitting or producing and transmitting electricity, steam, gas, or water.

    (B) Other definitions applying to this chapter are:

    (1) "Applicant" has the same meaning as in section 1305.01 of the Revised Code.

    (2) "Beneficiary" has the same meaning as in section 1305.01 of the Revised Code.

    (3) "Broker" has the same meaning as in section 1308.01 of the Revised Code.

    (4) "Certificated security" has the same meaning as in section 1308.01 of the
    Revised Code.

    (5) "Check" has the same meaning as in section 1303.03 of the Revised Code.

    (6) "Clearing corporation" has the same meaning as in section 1308.01 of the Revised
    Code.

    (7) "Contract for sale" has the same meaning as in section 1302.01 of the Revised
    Code.

    (8) "Control" with respect to a document of title, has the same meaning as in
    section 1307.106 of the Revised Code.

    (9) "Customer" has the same meaning as in section 1304.01 of the Revised Code.

    (10) "Entitlement holder" has the same meaning as in section 1308.01 of the Revised
    Code.

    (11) "Financial asset" has the same meaning as in section 1308.01 of the Revised
    Code.

    (12) "Holder in due course" has the same meaning as in section 1303.32 of the
    Revised Code.

    (13) "Issuer," with respect to a letter of credit or letter-of-credit right, has
    the same meaning as in section 1305.01 of the Revised Code.

    (14) "Issuer," with respect to a security, has the same meaning as in section
    1308.08 of the Revised Code.

    (15) "Issuer," with respect to a document of title, has the same meaning as in
    section 1307.102 of the Revised Code.

    (16) "Lease," "lease agreement," "lease contract," "leasehold interest," "lessee,"
    "lessee in ordinary course of business," "lessor," and "lessor''s residual interest"
    have the same meanings as in section 1310.01 of the Revised Code.

    (17) "Letter of credit" has the same meaning as in section 1305.01 of the Revised
    Code.

    (18) "Merchant" has the same meaning as in section 1302.01 of the Revised Code.

    (19) "Negotiable instrument" has the same meaning as in section 1303.03 of the
    Revised Code.

    (20) "Nominated person" has the same meaning as in section 1305.01 of the Revised
    Code.

    (21) "Note" has the same meaning as in section 1303.03 of the Revised Code.

    (22) "Proceeds of a letter of credit" has the same meaning as in section 1305.13
    of the Revised Code.

    (23) "Prove" has the same meaning as in section 1303.01 of the Revised Code.

    (24) "Sale" has the same meaning as in division (A)(11) of section 1302.01 of
    the Revised Code.

    (25) "Securities account" has the same meaning as in section 1308.51 of the Revised
    Code.

    (26) "Securities intermediary," "security," "security certificate," "security
    entitlement," and "uncertificated security" have the same meanings as in section
    1308.01 of the Revised Code.

    (C) In addition, Chapter 1301. of the Revised Code contains general definitions
    and principles of construction and interpretations applicable throughout this
    chapter.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
