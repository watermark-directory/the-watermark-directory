    name: Fair Competition In Cable Operations
  text: Not later than six months after the effective date of its video service authorization,
    a video service provider shall carry emergency interrupt service announcements
    transmitted by local television broadcasters and shall transmit national, state,
    and local emergency interrupt service announcements as required by 47 C.F.R. 11.11
