- number: '1347.01'
  heading: Personal information systems definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1347'
    name: Personal Information Systems
  text: 'As used in this chapter, except as otherwise provided:

    (A) "State agency" means the office of any elected state officer and any agency,
    board, commission, department, division, or educational institution of the state.

    (B) "Local agency" means any municipal corporation, school district, special purpose
    district, or township of the state or any elected officer or board, bureau, commission,
    department, division, institution, or instrumentality of a county.

    (C) "Special purpose district" means any geographic or political jurisdiction
    that is created by statute to perform a limited and specific function, and includes,
    but is not limited to, library districts, conservancy districts, metropolitan
    housing authorities, park districts, port authorities, regional airport authorities,
    regional transit authorities, regional water and sewer districts, sanitary districts,
    soil and water conservation districts, and regional planning agencies.

    (D) "Maintains" means state or local agency ownership of, control over, responsibility
    for, or accountability for systems and includes, but is not limited to, state
    or local agency depositing of information with a data processing center for storage,
    processing, or dissemination. An agency "maintains" all systems of records that
    are required by law to be kept by the agency.

    (E) "Personal information" means any information that describes anything about
    a person, or that indicates actions done by or to a person, or that indicates
    that a person possesses certain personal characteristics, and that contains, and
    can be retrieved from a system by, a name, identifying number, symbol, or other
    identifier assigned to a person.

    (F) "System" means any collection or group of related records that are kept in
    an organized manner and that are maintained by a state or local agency, and from
    which personal information is retrieved by the name of the person or by some identifying
    number, symbol, or other identifier assigned to the person. "System" includes
    both records that are manually stored and records that are stored using electronic
    data processing equipment. "System" does not include collected archival records
    in the custody of or administered under the authority of the Ohio history connection,
    published directories, reference materials or newsletters, or routine information
    that is maintained for the purpose of internal office administration, the use
    of which would not adversely affect a person.

    (G) "Interconnection of systems" means a linking of systems that belong to more
    than one agency, or to an agency and other organizations, which linking of systems
    results in a system that permits each agency or organization involved in the linking
    to have unrestricted access to the systems of the other agencies and organizations.

    (H) "Combination of systems" means a unification of systems that belong to more
    than one agency, or to an agency and another organization, into a single system
    in which the records that belong to each agency or organization may or may not
    be obtainable by the others.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1347.01
- number: '1347.04'
  heading: Exemptions from chapter
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1347'
    name: Personal Information Systems
  text: '(A)(1) Except as provided in division (A)(2) of this section or division
    (C)(2) of section 1347.08 of the Revised Code, the following are exempt from the
    provisions of this chapter:

    (a) Any state or local agency, or part of a state or local agency, that performs
    as its principal function any activity relating to the enforcement of the criminal
    laws, including police efforts to prevent, control, or reduce crime or to apprehend
    criminals;

    (b) The criminal courts;

    (c) Prosecutors;

    (d) Any state or local agency or part of any state or local agency that is a correction,
    probation, pardon, or parole authority;

    (e) Personal information systems that are comprised of investigatory material
    compiled for law enforcement purposes by agencies that are not described in divisions
    (A)(1)(a) and (d) of this section.

    (2) A part of a state or local agency that does not perform, as its principal
    function, an activity relating to the enforcement of the criminal laws is not
    exempt under this section.

    (B) The provisions of this chapter shall not be construed to prohibit the release
    of public records, or the disclosure of personal information in public records,
    as defined in section 149.43 of the Revised Code, or to authorize a public body
    to hold an executive session for the discussion of personal information if the
    executive session is not authorized under division (G) of section 121.22 of the
    Revised Code.

    The disclosure to members of the general public of personal information contained
    in a public record, as defined in section 149.43 of the Revised Code, is not an
    improper use of personal information under this chapter.

    (C) The provisions of this chapter shall not be construed to prohibit, and do
    not prohibit, compliance with any order issued pursuant to division (D)(1) of
    section 2151.14 of the Revised Code, any request for records that is properly
    made pursuant to division (D)(3)(a) of section 2151.14 or division (A) of section
    2151.141 of the Revised Code, or any determination that is made by a court pursuant
    to division (D)(3)(b) of section 2151.14 or division (B)(1) of section 2151.141
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1347.04
- number: '1347.05'
  heading: Duties of state and local agencies maintaining personal information systems
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1347'
    name: Personal Information Systems
  text: 'Every state or local agency that maintains a personal information system
    shall:

    (A) Appoint one individual to be directly responsible for the system;

    (B) Adopt and implement rules that provide for the operation of the system in
    accordance with the provisions of this chapter that, in the case of state agencies,
    apply to state agencies or, in the case of local agencies, apply to local agencies;

    (C) Inform each of its employees who has any responsibility for the operation
    or maintenance of the system, or for the use of personal information maintained
    in the system, of the applicable provisions of this chapter and of all rules adopted
    in accordance with this section;

    (D) Specify disciplinary measures to be applied to any employee who initiates
    or otherwise contributes to any disciplinary or other punitive action against
    any individual who brings to the attention of appropriate authorities, the press,
    or any member of the public, evidence of unauthorized use of information contained
    in the system;

    (E) Inform a person who is asked to supply personal information for a system whether
    the person is legally required to, or may refuse to, supply the information;

    (F) Develop procedures for purposes of monitoring the accuracy, relevance, timeliness,
    and completeness of the personal information in this system, and, in accordance
    with the procedures, maintain the personal information in the system with the
    accuracy, relevance, timeliness, and completeness that is necessary to assure
    fairness in any determination made with respect to a person on the basis of the
    information;

    (G) Take reasonable precautions to protect personal information in the system
    from unauthorized modification, destruction, use, or disclosure;

    (H) Collect, maintain, and use only personal information that is necessary and
    relevant to the functions that the agency is required or authorized to perform
    by statute, ordinance, code, or rule, and eliminate personal information from
    the system when it is no longer necessary and relevant to those functions.'
  history: null
