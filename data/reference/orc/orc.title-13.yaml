  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.72
- number: '1349.73'
  heading: Penalty for failing to comply with disclosure requirements
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: If a high-volume third-party seller does not comply with the requirements
    to provide and disclose information under sections 1349.70 and 1349.71 of the
    Revised Code, the online marketplace shall, after providing the seller with written
    or electronic notice and an opportunity to provide or disclose such information
    not later than ten days after the issuance of such notice, suspend any future
    sales activity of such seller until the seller complies with such requirements.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.73
- number: '1349.74'
  heading: Unfair or deceptive act under CSPA
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) A violation of sections 1349.66 to 1349.73 of the Revised Code is an
    unfair or deceptive act or practice in violation of section 1345.02 of the Revised
    Code.

    (B)(1) The attorney general shall enforce sections 1349.66 to 1349.73 of the Revised
    Code in the same manner, by the same means, and with the same jurisdiction, powers,
    and duties as though all applicable terms and provisions of sections 1345.01 to
    1345.13 of the Revised Code were incorporated and made part of sections 1349.66
    to 1349.73 of the Revised Code.

    (2) There is no private right of action, pursuant to section 1345.09 of the Revised
    Code, to enforce sections 1349.66 to 1349.73 of the Revised Code.

    (C) The attorney general may adopt rules with respect to the collection, verification,
    or disclosure of information under sections 1349.66, 1349.67, and 1349.70 to 1349.73
    of the Revised Code, provided that such regulations are limited to what is necessary
    to collect, verify, and disclose such information.

    (D) Nothing in sections 1349.66 to 1349.74 of the Revised Code shall be construed
    to limit the authority of the attorney general under any other provision of law.'
