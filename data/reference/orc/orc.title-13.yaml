- number: '1321.551'
  heading: Evading General Loan Law requirements
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: No registrant shall conduct the business of making loans under sections 1321.51
    to 1321.60 of the Revised Code in any office, room, or place of business in which
    any other business is solicited or engaged in, or in association or conjunction
    with any other such business, if the superintendent of financial institutions
    finds, pursuant to a hearing conducted in accordance with Chapter 119. of the
    Revised Code, that the other business is of such a nature that the conduct tends
    to conceal evasion of sections 1321.51 to 1321.60 of the Revised Code or of the
    rules adopted under those sections, and orders the registrant in writing to desist
    from the conduct.
