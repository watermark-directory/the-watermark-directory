- number: '1306.02'
  heading: Scope of chapter - exceptions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) Except as provided in division (B) of this section, sections 1306.01
    to 1306.23 of the Revised Code apply to electronic records and electronic signatures
    relating to a transaction.

    (B) Sections 1306.01 to 1306.23 of the Revised Code do not apply to a transaction
    to the extent it is governed by any of the following:

    (1) A law governing the creation and execution of wills, codicils, or testamentary
    trusts;

    (2) Chapter 1301., except section 1301.306, and Chapters 1303., 1304., 1305.,
    1307., 1308., and 1309. of the Revised Code.'
