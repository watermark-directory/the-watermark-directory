- number: '1345.61'
  heading: Invention development services definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: 'As used in sections 1345.61 to 1345.68 of the Revised Code:

    (A) "Contract for invention development services" means a contract by which an
    invention developer undertakes invention development services for a customer.

    (B) "Customer" means any person who enters into a contract for invention development
    services regarding an invention, except any person, other than an individual,
    who purchases invention development services as an adjunct to the traditional
    commercial enterprises in which it engages as a livelihood. "Customer" does not
    include a corporation.

    (C) "Invention development services" means any act, including the evaluation,
    perfecting, marketing, brokering, or promoting of an invention, that is done by
    or for an invention developer in connection with the procurement or attempted
    procurement by the invention developer of a licensee or buyer of an intellectual
    property right in the invention.

    (D) "Invention developer" means any person who offers to perform or performs for
    a customer any invention development services. "Invention developer" does not
    include any of the following:

    (1) Any department or agency of the federal, state, or a local government;

    (2) Any nonprofit, charitable, scientific, or educational organization that is
    tax exempt under section 501(a) and described in section 501(c)(3), or described
    in section 170(b)(1)(A), of the "Internal Revenue Code of 1954," 68A Stat. 3,
    26 U.S.C. 1, as amended, or any nonprofit, scientific, or educational organization
    qualified under a state nonprofit organization statute;

    (3) Any attorney acting within the scope of the attorney''s professional license;

    (4) Any person duly registered before the United States patent and trademark office
    acting within the scope of that person''s professional license;

    (5) Any person who does not charge a fee for invention development services other
    than any payment made from a portion of the income received by a customer by virtue
    of invention development services performed by the person. For the purposes of
    this division, "fee" includes any payment made by the customer to the person including
    reimbursement for expenditures made or costs incurred by the person.

    (E) "Invention" means a discovery, process, machine, design, formulation, product,
    concept, or idea, or any combination of them, whether patentable or not.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.61
- number: '1345.62'
  heading: Invention development services contracts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Every contract for invention development services shall be in writing
    and is subject to sections 1345.61 to 1345.68 of the Revised Code. The invention
    developer shall give a copy of the written contract to the customer at the time
    the customer signs the contract.

    (B) The invention developer shall provide in writing a description of the services
    to be performed pursuant to each contract. At the time the customer signs the
    contract, it shall state the fees and other consideration, if any, that may be
    required of the customer.

    (C) Any contract for invention development services signed by the invention developer
    and the customer may be revoked by either party prior to the expiration of a four
    working day period commencing on the date on which the customer and the invention
    developer sign the contract.

    (D) The invention developer or the customer may revoke the contract as follows:

    (1) Either the invention developer or the customer may revoke the contract by
    written notice to the other within four working days of the date the contract
    was signed by both. Written notice of revocation is effective upon the date of
    postmarking, if mailed, or upon receipt.

    (2) The invention developer upon revocation shall return to the customer any payment
    made on account of the performance of services specified in the contract and the
    customer shall return all materials and contracts submitted to him by the invention
    developer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.62
- number: '1345.63'
  heading: Conspicuous and legible cover sheet with notice
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Every contract for invention development services shall have a conspicuous
    and legible cover sheet attached to it with the following notice to the customer
    imprinted on the cover sheet in boldface type of not less than ten-point size,
    or in capital letters of a size not less than that used in a standard office typewriter:

    "The purchase of invention development services is a high risk expenditure. The
    performance of the services detailed in the contract provides no guarantee or
    promise of profits, or that your invention or idea will be purchased by a manufacturer.
    Only a very small percentage of inventions have a chance at receiving profits.
    An invention developer can assist you in your efforts."

    (B) The cover sheet notice shall contain the name, home office address, and local
    office address of the invention developer.

    (C) The cover sheet notice shall contain the items required by divisions (A) and
    (B) of this section and shall not contain anything except those items.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.63
