- number: '1309.108'
  heading: Sufficiency of description - UCC 9-108
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as provided in divisions (C), (D), and (E) of this section, any
    description of personal or real property is sufficient whether or not it is specific
    if it reasonably identifies what is described.

    (B) Except as otherwise provided in division (D) of this section, a description
    of collateral reasonably identifies the collateral if it identifies the collateral
    by:

    (1) Specific listing;

    (2) Category;

    (3) Except as otherwise provided in division (E) of this section, a type of collateral
    defined in Chapters 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309., and
    1310. of the Revised Code;

    (4) Quantity;

    (5) Computational or allocational formula or procedure; or

    (6) Except as otherwise provided in division (C) of this section, any other method,
    if the identity of the collateral is objectively determinable.

    (C) A description of collateral as "all the debtor''s assets" or "all the debtor''s
    personal property" or using words of similar import does not reasonably identify
    the collateral.

    (D) Except as otherwise provided in division (E) of this section, a description
    of a security entitlement, securities account, or commodity account is sufficient
    if it describes:

    (1) The collateral by those terms or as investment property; or

    (2) The underlying financial asset or commodity contract.

    (E) A description only by type of collateral defined in Chapters 1301., 1302.,
    1303., 1304., 1305., 1307., 1308., 1309., and 1310. of the Revised Code is an
    insufficient description of:

    (1) A commercial tort claim; or

    (2) In a consumer transaction, consumer goods, a security entitlement, a securities
    account, or a commodity account.'
