- number: '1321.665'
  heading: Preservation of consumer installment loan books and records before ceasing
    business
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: Before ceasing to conduct or discontinuing business as a licensee, the licensee
    shall arrange for and be responsible for the preservation of the books and records
    required to be maintained and preserved under sections 1321.62 to 1321.702 of
    the Revised Code and shall notify the division of financial institutions in writing
    of the exact address where the books and records will be maintained during the
    required period.
