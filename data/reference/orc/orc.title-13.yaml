- number: '1317.09'
  heading: Payment in full before maturity - refund credit
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1317'
    name: Retail Installment Sales
  text: Notwithstanding any retail installment contract to the contrary, any retail
    buyer may satisfy in full at any time before maturity the debt of any retail installment
    contract and in so satisfying such debt shall receive a refund credit thereon
    for such anticipation of payments. The amount of such refund shall represent at
    least as great a proportion of the total finance charge, less an acquisition cost
    of ten dollars, as the sum of the periodical time balances, after the date of
    prepayment, bears to the sum of all the periodical time balances under the schedule
    of payments in the original contract. When the amount of the credit for anticipation
    of payments is less than one dollar, no refund need be made.
