- number: '1321.46'
  heading: Verification of borrower's income before making short-term loan
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Before initiating a short-term loan transaction with a borrower, a licensee
    shall make a reasonable attempt to verify the borrower''s income for purposes
    of division (B)(2) of section 1321.39 and section 1321.391 of the Revised Code.
    At a minimum, the licensee shall obtain from the borrower one or more recent pay
    stubs or other written evidence of recurring income, such as a bank statement.
    The written evidence shall include at least one document that, when presented
    to the licensee, is dated not earlier than forty-five days prior to the borrower''s
    initiation of the short-term loan transaction. If the borrower intends to provide
    a bank statement, the licensee shall permit the borrower to delete from the statement
    the information regarding to whom the debits listed on the statement are payable.

    (B) The superintendent of financial institutions may adopt rules under section
    1321.43 of the Revised Code that set forth any other procedures the superintendent
    considers necessary to ensure accurate verification of borrower income.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.46
- number: '1321.47'
  heading: Duties of short-term loan licensees; civil action by borrower
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A person licensed, and any person required to be licensed under sections
    1321.35 to 1321.48 of the Revised Code, in addition to duties imposed by other
    statutes or common law, shall do all of the following:

    (1) Follow reasonable and lawful instructions from the borrower;

    (2) Act with reasonable skill, care, and diligence;

    (3) Act in good faith and fair dealing in any transaction or practice or course
    of business in connection with a short-term loan.

    (B) The duties and standards of care created in this section may not be waived
    or modified.

    (C) A borrower injured by a violation of this section may bring an action for
    recovery of damages. Damages awarded shall not be less than all compensation paid
    directly or indirectly to a licensee from any source, plus reasonable attorney''s
    fees and court costs. The borrower may be awarded punitive damages.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.47
- number: '1321.48'
  heading: Reports by superintendent; confidentiality of information
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) The superintendent of financial institutions shall report semiannually
    to the governor and the general assembly on the operations of the division of
    financial institutions with respect to the following:

    (1) Enforcement actions instituted by the superintendent for a violation of or
    failure to comply with any provision of sections 1321.35 to 1321.48 of the Revised
    Code, and the final dispositions of each such enforcement action;

    (2) Suspensions, revocations, or refusals to issue or renew licenses under sections
    1321.35 to 1321.48 of the Revised Code.

    (B) The information required under divisions (A)(1) and (2) of this section does
    not include information that, pursuant to division (C) of this section, is confidential.

    (C) The following information is confidential:

    (1) Examination information, and any information leading to or arising from an
    examination;

    (2) Investigation information, and any information arising from or leading to
    an investigation.

    (D) The information described in division (A)(1) of this section shall remain
    confidential for all purposes except when it is necessary for the superintendent
    to take official action regarding the affairs of a licensee, or in connection
    with criminal or civil proceedings to be initiated by a prosecuting attorney or
    the attorney general. This information also may be introduced into evidence or
    disclosed when, and in the manner, authorized by section 1181.25 of the Revised
    Code.

    (E) All application information, except social security numbers, employer identification
    numbers, financial account numbers, the identity of the institution where financial
    accounts are maintained, personal financial information, fingerprint cards and
    the information contained on such cards, and criminal background information,
    is a public record as defined in section 149.43 of the Revised Code.

    (F) This section does not prevent the division from releasing information relating
    to licensees to the attorney general for purposes of that office''s administration
    of Chapter 1345. of the Revised Code. Information the division releases to the
    attorney general pursuant to this section remains privileged and confidential,
    and the attorney general may not disclose the information except by introduction
    into evidence in connection with the attorney general''s administration of Chapter
    1345. of the Revised Code or as authorized by the superintendent.'
