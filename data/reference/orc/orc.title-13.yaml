- number: '1349.22'
  heading: Advancing funds for incidental fees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: Nothing in section 1349.21 of the Revised Code prohibits an escrow or closing
    agent from advancing funds not exceeding one thousand dollars from an escrow account
    or otherwise on behalf of a party to an escrow transaction for the purpose of
    paying incidental fees, such as conveyance and recording fees, in order to effect
    and close the sale, purchase, exchange, transfer, encumbrance, or lease of residential
    real property that is the subject of the escrow transaction.
