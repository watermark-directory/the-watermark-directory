- number: '1349.69'
  heading: Security procedures and practices
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: An online marketplace shall implement and maintain reasonable security procedures
    and practices, including administrative, physical, and technical safeguards, appropriate
    to the nature of the data and the purposes for which the data will be used, to
    protect the data collected to comply with the requirements of this chapter from
    unauthorized use, disclosure, access, destruction, or modification.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.69
- number: '1349.70'
  heading: High-volume seller duty to disclose certain information
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) An online marketplace shall do both of the following:

    (1) Require any high-volume third party seller with an aggregate total of twenty
    thousand dollars or more in annual gross revenues on such online marketplace,
    and that uses such online marketplace''s platform, to provide the information
    described in division (B) of this section to the online marketplace;

    (2) Disclose the information described in division (B) of this section to consumers
    in a clear and conspicuous manner both in:

    (a) The order confirmation message or other document or communication made to
    a consumer after a purchase is finalized;

    (b) The consumer''s account transaction history.

    (B) The information required to be provided and disclosed by division (A) of this
    section is both of the following:

    (1) Except as provided in section 1349.71 of the Revised Code, the identity of
    the high-volume third party seller, including all of the following:

    (a) The full name of the seller, which may include the seller name or seller''s
    company name, or the name by which the seller or company operates on the online
    marketplace;

    (b) The physical address of the seller;

    (c) Contact information for the seller, to allow for the direct, unhindered communication
    with high-volume third party sellers by users of the online marketplace, including
    any of the following:

    (i) A current working telephone number;

    (ii) A current working electronic mail address; or

    (iii) Other means of direct electronic messaging, which may be provided to such
    seller by the online marketplace.

    (2) Whether the high-volume third party seller used a different seller to supply
    the consumer product to the consumer upon purchase, and, upon the request of an
    authenticated purchaser, the information described in division (B)(1) of this
    section relating to any such seller that supplied the consumer product to the
    purchaser, if such seller is different than the high-volume third party seller
    listed on the product listing prior to purchase.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.70
- number: '1349.71'
  heading: Partial disclosure
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) Subject to division (B) of this section, upon the request of a high-volume
    third party seller, an online marketplace may provide for partial disclosure of
    the identity information required under division (B)(1) of section 1349.70 of
    the Revised Code in the following situations:

    (1) If such seller certifies to the online marketplace that the seller does not
    have a business address and only has a residential street address, or has a combined
    business and residential address, the online marketplace may both:

    (a) Disclose only the country and, if applicable, the state in which such seller
    resides;

    (b) Inform consumers that there is no business address available for the seller
    and that consumer inquiries should be submitted to the seller by telephone, electronic
    mail, or other means of electronic messaging provided to such seller by the online
    marketplace.

    (2) If such seller certifies to the online marketplace that the seller is a business
    that has a physical address for product returns, the online marketplace may disclose
    the seller''s physical address for product returns.

    (3) If such seller certifies to the online marketplace that the seller does not
    have a telephone number other than a personal telephone number, the online marketplace
    shall inform consumers that there is no telephone number available for the seller
    and that consumer inquiries should be submitted to the seller''s electronic mail
    address or other means of electronic messaging provided to such seller by the
    online marketplace.

    (B) If an online marketplace becomes aware that a high-volume third party seller
    has made a false representation to the online marketplace in order to justify
    the provision of a partial disclosure under division (A) of this section or that
    a high-volume third party seller who has requested and received a provision for
    a partial disclosure under division (A) of this section has not provided responsive
    answers within a reasonable time frame to consumer inquiries submitted to the
    seller by telephone, electronic mail, or other means of electronic messaging provided
    to such seller by the online marketplace, the online marketplace shall, after
    providing the seller with written or electronic notice and an opportunity to respond
    not later than ten days after the issuance of such notice, suspend any future
    sales activity of such seller unless such seller consents to the disclosure of
    the identity information required under division (B)(1) of section 1349.70 of
    the Revised Code.

    (C) If a high-volume third-party seller is a program participant as defined in
    section 111.41 of the Revised Code, the only address of which the online marketplace
    may require disclosure is the address designated by the secretary of state under
    section 111.42 of the Revised Code.'
  history: null
