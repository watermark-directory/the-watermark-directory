    num: '1308'
    name: Investment Securities
  text: 'A securities intermediary shall exercise rights with respect to a financial
    asset if directed to do so by an entitlement holder. A securities intermediary
    satisfies the duty if:

    (A) The securities intermediary acts with respect to the duty as agreed upon by
    the entitlement holder and the securities intermediary; or

    (B) In the absence of agreement, the securities intermediary either places the
    entitlement holder in a position to exercise the rights directly or exercises
    due care in accordance with reasonable commercial standards to follow the direction
    of the entitlement holder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1308.56
- number: '1308.57'
  heading: Duty of securities intermediary to comply with entitlement holder - UCC
    8-507
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1308'
    name: Investment Securities
  text: '(A) A securities intermediary shall comply with an entitlement order if the
    entitlement order is originated by the appropriate person, the securities intermediary
    has had reasonable opportunity to assure itself that the entitlement order is
    genuine and authorized, and the securities intermediary has had reasonable opportunity
    to comply with the entitlement order. A securities intermediary satisfies the
    duty if:

    (1) The securities intermediary acts with respect to the duty as agreed upon by
    the entitlement holder and the securities intermediary; or

    (2) In the absence of agreement, the securities intermediary exercises due care
    in accordance with reasonable commercial standards to comply with the entitlement
    order.

    (B) If a securities intermediary transfers a financial asset pursuant to an ineffective
    entitlement order, the securities intermediary shall reestablish a security entitlement
    in favor of the person entitled to it, and pay or credit any payments or distributions
    that the person did not receive as a result of the wrongful transfer. If the securities
    intermediary does not reestablish a security entitlement, the securities intermediary
    is liable to the entitlement holder for damages.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1308.57
- number: '1308.58'
  heading: Duty of securities intermediary to change entitlement holder's position
    to other form of security holding - UCC 8-508
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1308'
    name: Investment Securities
  text: 'A securities intermediary shall act at the direction of an entitlement holder
    to change a security entitlement into another available form of holding for which
    the entitlement holder is eligible, or to cause the financial asset to be transferred
    to a securities account of the entitlement holder with another securities intermediary.
    A securities intermediary satisfies the duty if:

    (A) The securities intermediary acts as agreed upon by the entitlement holder
    and the securities intermediary; or

    (B) In the absence of agreement, the securities intermediary exercises due care
    in accordance with reasonable commercial standards to follow the direction of
    the entitlement holder.'
  history: null
