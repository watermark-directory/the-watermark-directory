- number: '1329.04'
  heading: Effective term of registration or report - renewal notice
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'Registration of a trade name or report of a fictitious name, under sections
    1329.01 to 1329.10 of the Revised Code, shall be effective for a term of five
    years from the date of registration or report. Upon application filed within six
    months prior to the expiration of such term, on a form furnished by the secretary
    of state, the registration or report may be renewed at the end of each five-year
    period for a like term, provided that a general partnership shall renew its registration
    or report whenever any partner named on its registration or report ceases to be
    a partner. Such a renewal shall extend the registration or report for five years,
    unless further changes occur in the interim. The renewal fee specified in division
    (S)(3) of section 111.16 of the Revised Code, payable to the secretary of state,
    shall accompany the application for renewal of the registration or report.

    The secretary of state shall notify persons who have registered trade names or
    reported fictitious names, within the six months next preceding the expiration
    of the five years from the date of registration or report, of the necessity of
    renewal by ordinary or electronic mail to the last known physical or electronic
    mail address of such persons.'
