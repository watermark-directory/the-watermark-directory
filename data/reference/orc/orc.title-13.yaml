- number: '1332.08'
  heading: Arbitration of disputes - procedure
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: '(A) A dispute for which a civil action is authorized under section 1332.09
    of the Revised Code may first be submitted to arbitration in accordance with the
    procedures and subject to the conditions set forth in divisions (B) to (D) of
    this section.

    (B) Prior to initiating a civil action under section 1332.09 of the Revised Code,
    a person authorized to bring such an action may provide written notice of proposed
    arbitration under this section to all persons that would be party to the civil
    action. The notice shall describe with reasonable specificity the issues that
    would be the subject of the civil action. The issues shall be submitted to arbitration
    only if each person receiving such a notice of proposed arbitration gives its
    written consent not later than seven days after the date of receipt of the notice.

    (C) Arbitration under this section shall be conducted and decided by a panel of
    three arbitrators in accordance with procedures established by the American arbitration
    association. The persons that would be the complainants in a civil action under
    section 1332.09 of the Revised Code regarding the issues submitted to arbitration
    shall select one of the arbitrators, the persons that would be the respondents
    in the civil action shall select another one of the arbitrators, and the two arbitrators
    so selected shall jointly select the third arbitrator. If the two arbitrators
    selected are unable to agree on a third arbitrator within seven days after the
    latest date either of the two arbitrators was selected, they are removed, and
    the parties to the proposed arbitration shall each select one substitute arbitrator
    in the same manner as previously provided in this division, and the two substitute
    arbitrators so selected shall jointly select the third arbitrator. If the substitute
    arbitrators are unable to agree on a third arbitrator within seven days after
    the latest date either such substitute arbitrator was selected, they are removed,
    and the issues shall not be submitted to arbitration.

    (D) Not more than one hundred twenty days after the date a panel of arbitrators
    is selected under division (C) of this section, the panel shall issue a written
    opinion setting forth findings and decisions respecting the issues submitted to
    arbitration. The findings and decisions of the majority of the arbitrators on
    the panel shall be deemed the findings and decisions of the panel. The findings
    and decisions shall not be binding but shall be admissible into evidence in any
    civil action brought under section 1332.09 of the Revised Code respecting the
    issues submitted to arbitration. The arbitrators shall not have continuing jurisdiction
    after the written opinion required by this division is issued.

    (E) Issues submitted to arbitration under this section may be resolved at any
    time by binding settlement agreement among the parties to the arbitration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1332.08
- number: '1332.09'
  heading: Actions for declaratory or injunctive relief - findings of arbitration
    opinion
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: '(A) A political subdivision subject to division (A), (B), or (C) of section
    1332.04 or division (C) of section 1332.05 of the Revised Code may bring a civil
    action for declaratory relief in the court of common pleas in the county in which
    the political subdivision is located or in any county of this state in which the
    political subdivision is a public cable service provider.

    (B) A person that is or is likely to be adversely affected by a violation of division
    (A), (B), or (C) of section 1332.04 or division (C) of section 1332.05 of the
    Revised Code may bring a civil action for declaratory or injunctive relief in
    such a court of common pleas. Such person that is or is likely to be adversely
    affected includes a person that provides, or has filed a pending application to
    provide, within the jurisdiction of the political subdivision, cable service over
    a cable system, and includes any other political subdivision in which such allegedly
    noncomplying political subdivision is, or has filed a pending application to become,
    a public cable service provider.

    (C)(1) If an arbitration opinion under section 1332.08 of the Revised Code contains
    a finding of a violation by a political subdivision of division (A), (B), or (C)
    of section 1332.04 or division (C) of section 1332.05 of the Revised Code and
    the political subdivision fails to rectify the violation promptly, and any person
    adversely affected by the violation substantially prevails in a subsequent civil
    action against the political subdivision under division (B) of this section regarding
    the violation not promptly rectified, the political subdivision is liable to the
    person for the person''s costs and reasonable attorney''s fees incurred in connection
    with the civil action.

    (2) If an arbitration opinion under section 1332.08 of the Revised Code does not
    contain a finding of a violation by a political subdivision of division (A), (B),
    or (C) of section 1332.04 or division (C) of section 1332.05 of the Revised Code
    and the political subdivision substantially prevails in a subsequent civil action
    brought against it under division (B) of this section respecting an alleged violation,
    the complainants in the civil action are liable to the political subdivision for
    its costs and reasonable attorney''s fees incurred in connection with the civil
    action.

    (3) The court shall exercise its equitable discretion in determining the appropriate
    amount of attorney''s fees to be awarded under division (C)(1) or (2) of this
    section. In exercising that discretion, the court shall consider at least all
    of the following: the degree to which the party partially prevailed, the reasonableness
    of the party''s action, the reasonableness of the arbitrator''s decision, the
    effort or lack of effort of the parties to reach a settlement, and the good faith
    or lack of good faith of the parties.'
