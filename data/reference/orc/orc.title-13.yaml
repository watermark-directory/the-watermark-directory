- number: '1337.092'
  heading: Personal liability
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) If an attorney in fact enters into a contract in the representative capacity
    of the attorney in fact, if the contract is within the authority of the attorney
    in fact, and if the attorney in fact discloses in the contract that it is being
    entered into in the representative capacity of the attorney in fact, the attorney
    in fact is not personally liable on the contract, unless the contract otherwise
    specifies. If the words or initialism "attorney in fact," "as attorney in fact,"
    "AIF," "power of attorney," "POA," or any other word or words or initialism indicating
    representative capacity as an attorney in fact are included in a contract following
    the name or signature of an attorney in fact, the inclusion is sufficient disclosure
    for purposes of this division that the contract is being entered into in the attorney
    in fact''s representative capacity as attorney in fact.

    (B) An attorney in fact is not personally liable for a debt of the attorney in
    fact''s principal, unless one or more of the following applies:

    (1) The attorney in fact agrees to be personally responsible for the debt.

    (2) The debt was incurred for the support of the principal, and the attorney in
    fact is liable for that debt because of another legal relationship that gives
    rise to or results in a duty of support relative to the principal.

    (3) The negligence of the attorney in fact gave rise to or resulted in the debt.

    (4) An act of the attorney in fact that was beyond the attorney in fact''s authority
    gave rise to or resulted in the debt.

    (5) An agreement to assist in the recovery of funds under section 169.13 of the
    Revised Code was the subject of the power of attorney that gave rise to or resulted
    in the debt.

    (C) This section applies but is not limited to, and the terms "power of attorney"
    and "attorney in fact" include but are not limited to, an agency agreement and
    an agent under an agency agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.092
- number: '1337.10'
  heading: Fees of recorder - microfilm process
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: 'The county recorder shall charge the same fee for the recording of a power
    of attorney authorizing the transfer of personal property or the transaction of
    business relating to the transfer of personal property, the indexing of that instrument,
    and for making a certified copy of the record of the instrument, that the recorder
    is allowed by section 317.32 of the Revised Code to charge for similar services
    in regard to other instruments.

    In a county in which the county recorder has determined to use the microfilm process
    as provided by section 9.01 of the Revised Code, the recorder may require that
    all cancellations, releases, or other actions affecting recorded powers of attorney
    be by separate instrument, signed and acknowledged as provided by section 5301.01
    of the Revised Code. The original instrument bearing the proper endorsement may
    be used as that separate instrument. Any cancellations, releases, or other actions
    described in this section shall be recorded in the books in which the powers of
    attorney were recorded. The fee for recordation shall be as set forth in this
    section.'
