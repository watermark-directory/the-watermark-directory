- number: '1322.43'
  heading: Supervision of mortgage loan originator and associated persons; procedures
    to avoid violations; remote work
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) No registrant and entity holding a valid letter of exemption under this
    chapter, through its operations manager or otherwise, shall fail to do either
    of the following:

    (1) Reasonably supervise a mortgage loan originator or any other person associated
    with the registrant or entity;

    (2) Establish reasonable procedures designed to avoid violations of any provision
    of this chapter or the rules adopted under this chapter, or violations of applicable
    state and federal consumer and lending laws or rules, by mortgage loan originators
    or any other person associated with the registrant or entity.

    (B) No registrant or entity holding a letter of exemption issued under this chapter
    shall:

    (1) Receive, directly or indirectly, a premium on the fees charged for services
    performed by a bona fide third party;

    (2) Pay or receive, directly or indirectly, a referral fee or kickback of any
    kind to or from a bona fide third party or other party with a related interest
    in the transaction, including a home improvement builder, real estate developer,
    or real estate broker or agent, for the referral of business.

    (C)(1) Notwithstanding any provision of this chapter to the contrary, a registrant
    or entity holding a letter of exemption under this chapter may allow a mortgage
    loan originator or any other person associated with the registrant or entity to
    transact business on behalf of the registrant or entity from a location other
    than the registrant''s or entity''s principal office or a branch office if all
    of the following apply:

    (a) The registrant or entity has a written policy governing the supervision of
    the mortgage loan originator or other person associated with the registrant or
    entity while the originator or person transacts business on behalf of the registrant
    or entity from such a location.

    (b) Access to the registrant''s or entity''s platform and customer information
    is in accordance with the registrant''s or entity''s written information security
    plan.

    (c) The mortgage loan originator or other person associated with the registrant
    or entity does not interact with a customer at the originator''s or person''s
    residence, unless the residence is the registrant''s or entity''s principal office
    or a branch office.

    (d) Physical records are not maintained at such a location.

    (2) The superintendent of financial institutions may charge a registrant or entity
    an annual fee to cover the costs associated with administering division (C)(1)
    of this section. The fee shall not exceed twenty-five dollars for each location
    at which a mortgage loan originator or any other person associated with the registrant
    or entity transacts business on behalf of the registrant or entity other than
    the registrant''s or entity''s principal office or a branch office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.43
- number: '1322.45'
  heading: Additional duties of registrants and licensees; recovery of damages by
    buyer
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1322'
    name: Ohio Residential Mortgage Lending Act (RMLA)
  text: '(A) A registrant, a licensee, and any person required to be registered or
    licensed under this chapter, in addition to duties imposed by other statutes or
    common law, shall do all of the following:

    (1) Safeguard and account for any money handled for the buyer;

    (2) Follow reasonable and lawful instructions from the buyer;

    (3) Act with reasonable skill, care, and diligence;

    (4) Act in good faith and with fair dealing in any transaction, practice, or course
    of business in connection with the brokering or originating of any residential
    mortgage loan;

    (5) Make reasonable efforts to secure a residential mortgage loan, from lenders
    with whom the registrant, licensee, or person regularly does business, with rates,
    charges, and repayment terms that are advantageous to the buyer.

    (B) Division (A) of this section shall not apply to wholesale lenders. However,
    wholesale lenders are subject to all other requirements applicable to mortgage
    brokers and nonbank mortgage lenders. For purposes of this division, "wholesale
    lender" means a company that has been issued a certificate of registration and
    that enters into transactions with buyers exclusively through unaffiliated third-party
    mortgage brokers.

    (C) The duties and standards of care created in this section cannot be waived
    or modified.

    (D)(1) A buyer injured by a failure to comply with this section may bring an action
    for recovery of damages.

    (2) Damages awarded under division (D)(1) of this section shall not be less than
    all compensation paid directly or indirectly to a mortgage broker from any source,
    plus reasonable attorney''s fees and court costs.

    (3) The buyer may be awarded punitive damages.

    (E) A buyer injured by a failure to comply with this section is precluded from
    recovering any damages, plus reasonable attorney''s fees and costs, if the buyer
    has also recovered any damages in a cause of action initiated under section 1322.52
    of the Revised Code and the recovery of damages for a failure to comply with this
    section is based on the same acts or circumstances as the basis for recovery of
    damages in section 1322.52 of the Revised Code.

    (F) This section shall not be interpreted by the superintendent to require a separate
    account for deposit of buyer funds.'
