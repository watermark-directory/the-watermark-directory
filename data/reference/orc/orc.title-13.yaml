- number: '1309.516'
  heading: What constitutes filing - effectiveness of filing - UCC 9-516
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as provided in division (B) of this section, communication of
    a record to a filing office and tender of the filing fee or acceptance of the
    record by the filing office constitutes filing.

    (B) Filing does not occur with respect to a record that a filing office refuses
    to accept because:

    (1) The record is not communicated by a method or medium of communication authorized
    by the filing office;

    (2) An amount equal to or greater than the applicable filing fee is not tendered;

    (3) The filing office is unable to index the record because:

    (a) In the case of an initial financing statement, the record does not provide
    a name for the debtor;

    (b) In the case of an amendment or information statement, the record:

    (i) Does not identify the initial financing statement as required by section 1309.512
    or 1309.518 of the Revised Code, as applicable; or

    (ii) Identifies an initial financing statement whose effectiveness has lapsed
    under section 1309.515 of the Revised Code.

    (c) In the case of an initial financing statement that provides the name of a
    debtor identified as an individual or an amendment that provides a name of a debtor
    identified as an individual that was not provided previously in the financing
    statement to which the record relates, the record does not identify the debtor''s
    surname; or

    (d) In the case of a record filed in the filing office described in division (A)(1)
    of section 1309.501 of the Revised Code, the record does not provide a sufficient
    description of the real property to which it relates.

    (4) In the case of an initial financing statement or an amendment that adds a
    secured party of record, the record does not provide a name and mailing address
    for the secured party of record;

    (5) In the case of an initial financing statement or an amendment that provides
    a name of a debtor that was not provided previously in the financing statement
    to which the amendment relates, the record does not:

    (a) Provide a mailing address for the debtor; or

    (b) Indicate whether the name provided as the name of the debtor is the name of
    an individual or an organization.

    (6) In the case of an assignment reflected in an initial financing statement under
    division (A) of section 1309.514 of the Revised Code or an amendment filed under
    division (B) of section 1309.514 of the Revised Code, the record does not provide
    a name and mailing address for the assignee.

    (7) In the case of a continuation statement, the record is not filed within the
    six-month period prescribed by division (D) of section 1309.515 of the Revised
    Code; or

    (8) The secretary of state refuses to accept the record for filing or recording
    in compliance with division (A) of section 111.24 of the Revised Code.

    (C) For purposes of division (B) of this section:

    (1) A record does not provide information if the filing office is unable to read
    or decipher the information; and

    (2) A record that does not indicate that it is an amendment or identify an initial
    financing statement to which it relates, as required by section 1309.512, 1309.514,
    or 1309.518 of the Revised Code, is an initial financing statement.

    (D) A record that is communicated to the filing office with tender of the filing
    fee, but that the filing office refuses to accept for a reason other than one
    specified in division (B) of this section, is effective as a filed record except
    as against a purchaser of the collateral that gives value in reasonable reliance
    upon the absence of the record from the files.'
