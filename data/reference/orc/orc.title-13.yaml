- number: '1306.04'
  heading: Applicability - agreements
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) Sections 1306.01 to 1306.23 of the Revised Code do not require a record
    or signature to be created, generated, sent, communicated, received, stored, or
    otherwise processed or used by electronic means or in electronic form.

    (B) Sections 1306.01 to 1306.23 of the Revised Code apply only to transactions
    between parties each of which has agreed to conduct transactions by electronic
    means. Whether the parties agree to conduct a transaction by electronic means
    is determined from the context and surrounding circumstances, including the parties''
    conduct.

    (C) A party that agrees to conduct a transaction by electronic means may refuse
    to conduct other transactions by electronic means. The right granted by this division
    may not be waived by agreement.

    (D) Except as otherwise provided in sections 1306.01 to 1306.23 of the Revised
    Code, any of the provisions of such sections may be varied by agreement. The presence
    in certain provisions of sections 1306.01 to 1306.23 of the Revised Code of the
    words "unless otherwise agreed," or words of similar import, does not imply that
    the effect of other provisions may not be varied by agreement.

    (E) Whether an electronic record or electronic signature has legal consequences
    is determined by sections 1306.01 to 1306.23 of the Revised Code and other applicable
    law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.04
- number: '1306.05'
  heading: Citation, construction and application of chapter
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: 'Sections 1306.01 to 1306.15 of the Revised Code may be known and cited as
    the "uniform electronic transactions act" and shall be construed and applied as
    follows:

    (A) To facilitate electronic transactions consistent with other applicable law;

    (B) To be consistent with reasonable practices concerning electronic transactions
    and with the continued expansion of those practices;

    (C) To effectuate its general purpose to make uniform the law with respect to
    the subject of sections 1306.01 to 1306.15 of the Revised Code among states enacting
    the uniform electronic transactions act.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.05
- number: '1306.06'
  heading: Electronic record or signature satisfies legal requirements
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) A record or signature may not be denied legal effect or enforceability
    solely because it is in electronic form.

    (B) A contract may not be denied legal effect or enforceability solely because
    an electronic record was used in its formation.

    (C) If a law requires a record to be in writing, an electronic record satisfies
    the law.

    (D) If a law requires a signature, an electronic signature satisfies the law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.06
- number: '1306.07'
  heading: Electronic record capable of retention by recipient at time of receipt
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) If the parties have agreed to conduct a transaction by electronic means
    and a law requires a person to provide, send, or deliver information in writing
    to another person, the requirement is satisfied if the information is provided,
    sent, or delivered, as the case may be, in an electronic record capable of retention
    by the recipient at the time of receipt. An electronic record is not capable of
    retention by the recipient if the sender or its information processing system
    inhibits the ability of the recipient to print or store the electronic record.

    (B) If a law other than sections 1306.01 to 1306.23 of the Revised Code requires
    a record to be posted or displayed in a certain manner, to be sent, communicated,
    or transmitted by a specified method, or to contain information that is formatted
    in a certain manner, all of the following apply:

    (1) The record shall be posted or displayed in the manner specified in the other
    law.

    (2) Except as otherwise provided in division (D)(2) of this section, the record
    shall be sent, communicated, or transmitted by the method specified in the other
    law.

    (3) The record shall contain the information formatted in the manner specified
    in the other law.

    (C) If a sender inhibits the ability of a recipient to store or print an electronic
    record, the electronic record is not enforceable against the recipient.

    (D) Divisions (A), (B), and (C) of this section may not be varied by agreement,
    except as follows:

    (1) To the extent a law, other than sections 1306.01 to 1306.23 of the Revised
    Code, requires information to be provided, sent, or delivered in writing but permits
    that requirement to be varied by agreement, the requirement under division (A)
    of this section that the information be in the form of an electronic record capable
    of retention also may be varied by agreement;

    (2) A requirement under a law, other than sections 1306.01 to 1306.23 of the Revised
    Code, to send, communicate, or transmit a record by regular mail may be varied
    by agreement to the extent permitted by the other law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.07
- number: '1306.08'
  heading: When electronic record or signature is attributable to person - effect
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) An electronic record or electronic signature is attributable to a person
    if it was the act of the person. The act of the person may be shown in any manner,
    including a showing of the efficacy of any security procedure applied to determine
    the person to which the electronic record or electronic signature is attributable.

    (B) The effect of an electronic record or electronic signature attributed to a
    person under division (A) of this section shall be determined from the context
    and surrounding circumstances at the time of its creation, execution, or adoption,
    including the parties'' agreement, if any, and otherwise as provided by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.08
- number: '1306.09'
  heading: Effect of change or error in transmission
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) If a change or error in an electronic record occurs in a transmission
    between parties to a transaction, both of the following apply:

    (1) If the parties have agreed to use a security procedure to detect changes or
    errors and one party has conformed to the procedure, but the other party has not,
    and the nonconforming party would have detected the change or error had that party
    also conformed, the conforming party may avoid the effect of the changed or erroneous
    electronic record.

    (2) In an automated transaction involving an individual, the individual may avoid
    the effect of an electronic record that resulted from an error made by the individual
    in dealing with the electronic agent of another person, if the electronic agent
    did not provide an opportunity for the prevention or correction of the error and,
    at the time the individual learns of the error, the individual does all of the
    following:

    (a) The individual promptly notifies the other person of the error and that the
    individual did not intend to be bound by the electronic record received by the
    other person.

    (b) The individual takes reasonable steps, including steps that conform to the
    other person''s reasonable instructions, to return to the other person or, if
    instructed by the other person, to destroy the consideration received, if any,
    as a result of the erroneous electronic record.

    (c) The individual has not used or received any benefit or value from the consideration,
    if any, received from the other person.

    (B) If divisions (A)(1) and (2) of this section do not apply, the change or error
    has the effect provided by other law, including the law of mistake, and the parties''
    contract, if any.

    (C) Divisions (A)(2) and (B) of this section may not be varied by agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.09
- number: '1306.10'
  heading: Notary, acknowledgment, verification or oath requirement
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: If a law requires a signature or record to be notarized, acknowledged, verified,
    or made under oath, the requirement is satisfied if the electronic signature of
    the person authorized to perform those acts, together with all other information
    required to be included by other applicable law, is attached to or logically associated
    with the signature or record.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1306.10
- number: '1306.11'
  heading: Requirement that record be retained - original records
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: '(A) If a law requires that a record be retained, the requirement is satisfied
    by retaining an electronic record of the information in the record if both of
    the following are satisfied:

    (1) The electronic record accurately and completely reflects the information set
    forth in the record after it was first generated in its final form as an electronic
    record or otherwise.

    (2) The electronic record remains accessible for later reference.

    (B) A requirement to retain a record in accordance with division (A) of this section
    does not apply to any information the sole purpose of which is to enable the record
    to be sent, communicated, or received.

    (C) A person satisfies division (A) of this section by using the services of another
    person if the requirements of that division are satisfied.

    (D) If a law requires a record to be presented or retained in its original form,
    or provides consequences if the record is not presented or retained in its original
    form, that law is satisfied by an electronic record retained in accordance with
    division (A) of this section.

    (E) If a law requires retention of a check, that requirement is satisfied by retention
    of an electronic record of the information on the front and back of the check
    in accordance with division (A) of this section.

    (F) A record retained as an electronic record in accordance with division (A)
    of this section satisfies a law requiring a person to retain a record for evidentiary,
    audit, or similar purposes, unless a law enacted after the effective date of this
    section specifically prohibits the use of an electronic record for the specified
    purpose.

    (G) This section does not preclude a governmental agency of this state from specifying
    additional requirements for the retention of a record subject to the agency''s
    jurisdiction.'
