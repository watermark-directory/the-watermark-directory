- number: '1311.07'
  heading: Copy of affidavit to be served on owner or lessee
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Any person filing an affidavit pursuant to section 1311.06 of the Revised
    Code shall serve a copy of the affidavit on the owner, part owner, or lessee of
    the improved property or his designee, within thirty days after filing the affidavit.
    If the affidavit cannot be served in accordance with section 1311.19 of the Revised
    Code, then the person shall serve the copy by posting it in some conspicuous place
    on the premises of the improved property within ten days after the expiration
    of the thirty days.
