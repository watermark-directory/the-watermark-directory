- number: '1343.05'
  heading: Bona fide indorsee of negotiable paper purchased before due
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1343'
    name: Interest
  text: No debtor is deemed a particeps criminis on account of having paid, or agreeing
    to pay, the exorbitant interest mentioned in section 1343.04 of the Revised Code,
    but he shall have like remedy and relief in either case. No bona fide indorsee
    of negotiable paper purchased before due, shall be affected by any usury exacted
    by any former holder of such paper, unless he has actual notice of the usury previous
    to his purchase. In such cases, the amount of such excess, if incorporated into
    negotiable paper, after payment, may be recovered back, by action against the
    party who originally exacted the usuary.
