- number: '1304.04'
  heading: Separate office of bank - UCC 4-107
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: A branch or separate office of a bank is a separate bank for the purpose of
    computing the time within which and determining the place at or to which action
    may be taken or notices or orders shall be given under Chapter 1303. and sections
    1304.01 to 1304.40 of the Revised Code.
  history: null
