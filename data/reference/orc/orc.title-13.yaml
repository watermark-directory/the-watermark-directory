- number: '1311.02'
  heading: Lien of subcontractor, laborer or materialman
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Every person who performs work or labor upon or furnishes material in furtherance
    of any improvement undertaken by virtue of a contract, express or implied, with
    the owner, part owner, or lessee of any interest in real estate, or the owner's,
    part owner's, or lessee's authorized agent, and every person who as a subcontractor,
    laborer, or material supplier, performs any labor or work or furnishes any material
    to an original contractor or any subcontractor, in carrying forward, performing,
    or completing any improvement, has a lien to secure the payment therefor upon
    the improvement and all interests that the owner, part owner, or lessee may have
    or subsequently acquire in the land or leasehold to which the improvement was
    made or removed.
