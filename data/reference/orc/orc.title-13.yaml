- number: '1331.07'
  heading: Compliance by foreign corporations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: 'A foreign corporation or foreign association exercising any of the powers,
    franchises, or functions of a corporation in this state, violating sections 1331.01
    to 1331.14, inclusive, of the Revised Code, shall not do any business in this
    state. The attorney general shall enforce this section by proceedings in quo warranto
    in the supreme court, or the court of appeals of the county in which the defendant
    resides or does business, or by injunction or other proceedings.

    The secretary of state shall revoke the certificate of such corporation or association.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.07
- number: '1331.08'
  heading: Liability for damages
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: In addition to the civil and criminal penalties provided in sections 1331.01
    to 1331.14 of the Revised Code, the person injured in the person's business or
    property by another person by reason of anything forbidden or declared to be unlawful
    in those sections, may sue therefor in any court having jurisdiction and venue
    thereof, without respect to the amount in controversy, and recover treble the
    damages sustained by the person and the person's costs of suit. When it appears
    to the court, before which a proceeding under those sections is pending, that
    the ends of justice require other parties to be brought before the court, the
    court may cause them to be made parties defendant and summoned, whether or not
    they reside in the county where the action is pending.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.08
- number: '1331.09'
  heading: Contents of indictment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: In an indictment for an offense provided for in sections 1331.01 to 1331.14,
    inclusive, of the Revised Code, it is sufficient to state the purpose or effects
    of the trust or combination, and that the accused is a member thereof, or acted
    with or in pursuance of it or aided or assisted in carrying out its purposes,
    without giving its name or description, or how, when, and where it was created.
  history: null
