- number: '1321.99'
  heading: Penalty
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) Whoever violates section 1321.02 of the Revised Code is guilty of a felony
    of the fifth degree.

    (B) Whoever violates section 1321.13 of the Revised Code shall be fined not less
    than one hundred nor more than five hundred dollars or imprisoned not more than
    six months, or both.

    (C) Whoever violates section 1321.14 of the Revised Code shall be fined not less
    than fifty nor more than two hundred dollars for a first offense; for a second
    offense such person shall be fined not less than two hundred nor more than five
    hundred dollars and imprisoned for not more than six months.

    (D) Whoever willfully violates section 1321.57, 1321.58, division (A), (B), or
    (C) of section 1321.59, 1321.591, or 1321.60 of the Revised Code is guilty of
    a minor misdemeanor and shall be fined not less than one nor more than five hundred
    dollars.

    (E)(1) Whoever violates section 1321.63 or division (H), (I), or (K) of section
    1321.69 of the Revised Code is guilty of a felony of the fifth degree.

    (2) A violation of section 1321.63 or division (K) of section 1321.69 of the Revised
    Code is a strict liability offense and section 2901.20 of the Revised Code does
    not apply.

    (F) Whoever violates division (A) of section 1321.73 of the Revised Code shall
    be fined not more than five hundred dollars or imprisoned not more than six months,
    or both.

    (G) Whoever violates section 1321.41 of the Revised Code is guilty of a misdemeanor
    of the first degree.

    (H) Whoever violates section 1321.141 or 1321.592 of the Revised Code is guilty
    of a minor misdemeanor and shall be fined not less than one hundred nor more than
    five hundred dollars.

    (I) The offenses established under sections 1321.141, 1321.41, and 1321.592 of
    the Revised Code are strict liability offenses and section 2901.20 of the Revised
    Code does not apply. The designation of these offenses as strict liability offenses
    shall not be construed to imply that any other offense for which there is no specified
    degree of culpability, whether in this section or another section of the Revised
    Code, is not a strict liability offense.

    (J) The imposition of fines pursuant to this section does not preclude the imposition
    of any administrative fines or civil penalties authorized under section 1321.54
    or any other section of the Revised Code.'
