- number: '1304.05'
  heading: Payable through or payable at bank - UCC 4-106
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If an item states that it is "payable through" a bank identified in the
    item, both of the following apply:

    (1) The item designates the bank as a collecting bank and does not by itself authorize
    the bank to pay the item.

    (2) The item may be presented for payment only by or through the bank.

    (B) If an item states that it is "payable at" a bank identified in the item, the
    item is equivalent to a draft drawn on the bank.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.05
- number: '1304.06'
  heading: Time of receipt of items - UCC 4-108
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) For the purpose of allowing time to process items, prove balances, and
    make the necessary entries on its books to determine its position for the day,
    a bank may fix an afternoon hour of two p.m. or later as a cut-off hour for the
    handling of money and items and the making of entries on its books.

    (B) An item or deposit of money received on any day after a cut-off hour so fixed
    or after the close of the banking day may be treated as being received at the
    opening of the next banking day.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.06
- number: '1304.07'
  heading: Delays - UCC 4-109
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Unless otherwise instructed, a collecting bank in a good faith effort
    to secure payment of a specific item drawn on a payor other than a bank, and with
    or without the approval of any person involved, may waive, modify, or extend time
    limits imposed or permitted by Chapters 1301., 1302., 1303., 1304., 1305., 1307.,
    1308., 1309., and 1310. of the Revised Code for a period not exceeding two additional
    banking days without discharge of drawers or indorsers or liability to its transferor
    or a prior party.

    (B) Delay by a collecting bank or payor bank beyond time limits prescribed or
    permitted by Chapters 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309.,
    and 1310. of the Revised Code or by instructions is excused if the delay is caused
    by interruption of communication or computer facilities, suspension of payments
    by another bank, war, emergency conditions, failure of equipment, or other circumstances
    beyond the control of the bank, and the bank exercises whatever diligence that
    the circumstances require.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.07
- number: '1304.08'
  heading: Electronic presentment - UCC 4-110
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) "Agreement for electronic presentment" means an agreement, clearing house
    rule, or federal reserve regulation or operating circular providing that presentment
    of an item may be made by transmission of an image of an item or information describing
    the item rather than delivery of the item itself. The "agreement for electronic
    presentment" may provide for procedures governing retention, presentment, payment,
    dishonor, and other matters concerning items subject to the agreement.

    (B) Presentment of an item pursuant to an agreement for electronic presentment
    is made when the presentment notice is received.

    (C) If presentment is made by presentment notice, a reference to "item" or "check"
    in sections 1304.01 to 1304.40 of the Revised Code means the presentment notice
    unless the context otherwise indicates.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.08
- number: '1304.09'
  heading: Statute of limitations - UCC 4-111
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: An action to enforce an obligation, duty, or right arising under sections
    1304.01 to 1304.40 of the Revised Code shall be brought within three years after
    the cause of action accrues.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.09
- number: '1304.11'
  heading: Status of collecting bank as agent and provisional status of credits -
    applicability of article - item indorsed pay any bank - UCC 4-201
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Unless a contrary intent clearly appears and prior to the time that a
    settlement given by a collecting bank for an item is or becomes final, the bank
    with respect to the item is an agent or subagent of the owner of the item, and
    any settlement given for the item is provisional. This provision applies regardless
    of the form of indorsement or lack of indorsement and even though credit given
    for the item is subject to immediate withdrawal as of right or is in fact withdrawn.
    The continuance of ownership of an item by its owner and any rights of the owner
    to proceeds of the item are subject to rights of a collecting bank such as those
    resulting from outstanding advances on the item and rights of recoupment or setoff.
    If an item is handled by banks for purposes of presentment, payment, collection,
    or return, the relevant provisions of sections 1304.01 to 1304.40 of the Revised
    Code apply even though action of the parties clearly establishes that particular
    bank has purchased the item and is the owner of it.

    (B) After an item has been indorsed with the words "pay any bank" or the like,
    only a bank may acquire the rights of a holder until one of the following occurs:

    (1) The item has been returned to the customer initiating collection.

    (2) The item has been specially indorsed by a bank to a person who is not a bank.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.11
- number: '1304.12'
  heading: Responsibility for collection or return - when action timely - UCC 4-202
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A collecting bank shall exercise ordinary care in doing all of the following:

    (1) Presenting an item or sending it for presentment;

    (2) Sending notice of dishonor or non-payment or returning an item other than
    a documentary draft to the bank''s transferor after learning that the item has
    not been paid or accepted;

    (3) Settling for an item when the bank receives final settlement;

    (4) Notifying its transferor of any loss or delay in transit within a reasonable
    time after discovery of the loss or delay.

    (B) A collecting bank exercises ordinary care under division (A) of this section
    by taking proper action before its midnight deadline following receipt of an item,
    notice, or settlement. Taking proper action within a reasonably longer time may
    constitute the exercise of ordinary care, but the bank has the burden of establishing
    timeliness.

    (C) Subject to division (A)(1) of this section, a bank is not liable for the insolvency,
    neglect, misconduct, mistake, or default of another bank or person or for loss
    or destruction of an item in the possession of others or in transit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.12
- number: '1304.13'
  heading: Effect of instructions - UCC 4-203
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: Subject to Chapter 1303. of the Revised Code concerning conversion of instruments
    and restrictive indorsements, only a collecting bank's transferor can give instructions
    that affect the bank or constitute notice to it and a collecting bank is not liable
    to prior parties for any action taken pursuant to the instructions or in accordance
    with any agreement with its transferor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.13
- number: '1304.14'
  heading: Methods of sending and presenting - sending directly to payor bank - UCC
    4-204
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A collecting bank shall send items by a reasonably prompt method taking
    into consideration relevant instructions, the nature of the item, the number of
    those items on hand, the cost of collection involved, and the method generally
    used by it or others to present those items.

    (B) A collecting bank may do any of the following:

    (1) Send an item directly to the payor bank;

    (2) Send an item to a non-bank payor if authorized by its transferer;

    (3) Send an item other than documentary drafts to a non-bank payor, if authorized
    by federal reserve regulations or operating circular, clearing house rule, or
    the like.

    (C) Presentment may be made by a presenting bank at a place where the payor bank
    or other payor has requested that presentment be made.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.14
- number: '1304.15'
  heading: Depositary bank holder of unindorsed item - UCC 4-205
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: 'If a customer delivers an item to a depositary bank for collection, both
    of the following apply:

    (A) The depositary bank becomes a holder of the item at the time it receives the
    item for collection if the customer at the time of delivery was a holder of the
    item, whether or not the customer indorses the item, and, if the bank satisfies
    the other requirements of section 1303.32 of the Revised Code, it is a holder
    in due courses.

    (B) The depositary bank warrants to collecting banks, the payor bank or other
    payor, and the drawer that the amount of the item was paid to the customer or
    deposited to the customer''s account.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.15
- number: '1304.16'
  heading: Transfer between banks - UCC 4-206
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: Any agreed method that identifies the transferor bank is sufficient for the
    item's further transfer to another bank.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.16
- number: '1304.17'
  heading: Transfer warranties - UCC 4-207
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A customer or collecting bank that transfers an item and receives a settlement
    or other consideration warrants all of the following to the transferee and to
    any subsequent collecting bank:

    (1) The warrantor is a person entitled to enforce the item.

    (2) All signatures on the item are authentic and authorized.

    (3) The item has not been altered.

    (4) The item is not subject to a defense or claim in recoupment of any party that
    can be asserted against the warrantor.

    (5) The warrantor has no knowledge of any insolvency proceeding commenced with
    respect to the maker, acceptor, or, in the case of an unaccepted draft, the drawer.

    (6) With respect to a remotely created consumer item, the person on whose account
    the item is drawn authorized the issuance of the item in the amount for which
    the item is drawn.

    (B) If an item is dishonored, a customer or collecting bank transferring the item
    and receiving settlement or other consideration is obliged to pay the amount due
    on the item according to the terms of the item at the time it was transferred
    or, if the transfer was of an incomplete item, according to its terms when completed
    pursuant to sections 1303.11 and 1303.50 of the Revised Code. The obligation of
    a transferor is owed to the transferee and to any subsequent collecting bank that
    takes the item in good faith. A transferor cannot disclaim its obligation under
    this division by an indorsement stating that it is made "without recourse" or
    otherwise disclaiming liability.

    (C) A person to whom the warranties under division (A) of this section are made
    and who took the item in good faith may recover from the warrantor as damages
    for breach of warranty an amount equal to the loss suffered as a result of the
    breach, but not more than the amount of the item plus expenses and loss of interest
    incurred as a result of the breach.

    (D) The warranties set forth in division (A) of this section cannot be disclaimed
    with respect to checks. Unless notice of a claim for breach of warranty is given
    to the warrantor within thirty days after the claimant has reason to know of the
    breach and the identity of the warrantor, the warrantor is discharged to the extent
    of any loss caused by the delay in giving notice of the claim.

    (E) A cause of action for breach of warranty under this section accrues when the
    claimant has reason to know of the breach.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.17
- number: '1304.18'
  heading: Presentment warranties - UCC 4-208
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If an unaccepted draft is presented to the drawee for payment or acceptance
    and the drawee pays or accepts the draft, the person obtaining payment or acceptance,
    at the time of presentment, and a previous transferor of the draft, at the time
    of transfer, warrant all of the following to the drawee that pays or accepts the
    draft in good faith:

    (1) The warrantor is, or was, at the time the warrantor transferred the draft,
    a person entitled to enforce the draft or authorized to obtain payment or acceptance
    of the draft on behalf of a person entitled to enforce the draft.

    (2) The draft has not been altered.

    (3) The warrantor has no knowledge that the signature of the purported drawer
    of the draft is unauthorized.

    (4) With respect to a remotely created consumer item, the person on whose account
    the item is drawn authorized the issuance of the item in the amount for which
    the item is drawn.

    (B) A drawee making payment may recover from a warrantor damages for breach of
    warranty equal to the amount paid by the drawee less the amount the drawee received
    or is entitled to receive from the drawer because of the payment. In addition,
    the drawee is entitled to compensation for expenses and loss of interest resulting
    from the breach. The right of the drawee to recover damages under this division
    is not affected by any failure of the drawee to exercise ordinary care in making
    payment. If the drawee accepts the draft, breach of warranty is a defense to the
    obligation of the acceptor, and, if the acceptor makes payment with respect to
    the draft, the acceptor is entitled to recover from a warrantor for breach of
    warranty the amounts stated in this division.

    (C) If a drawee asserts a claim for breach of warranty under division (A) of this
    section based on an unauthorized indorsement of the draft or an alteration of
    the draft, the warrantor may defend by proving that the indorsement is effective
    under section 1303.44 or 1303.47 of the Revised Code or the drawer is precluded
    under section 1303.49 or 1304.35 of the Revised Code from asserting against the
    drawee the unauthorized indorsement or alteration.

    (D) If a dishonored draft is presented for payment to the drawer or an indorser
    or any other item is presented for payment to a party obliged to pay the item
    and if the item is paid, the person obtaining payment and a prior transferor of
    the item warrant to the person making payment in good faith that the warrantor
    is, or was, at the time the warrantor transferred the item, a person entitled
    to enforce the item or authorized to obtain payment on behalf of a person entitled
    to enforce the item. The person making payment may recover from any warrantor
    for breach of warranty an amount equal to the amount paid plus expenses and loss
    of interest resulting from the breach.

    (E) The warranties stated in divisions (A) and (D) of this section cannot be disclaimed
    with respect to checks. Unless notice of a claim for breach of warranty is given
    to the warrantor within thirty days after the claimant has reason to know of the
    breach and the identity of the warrantor, the warrantor is discharged to the extent
    of any loss caused by the delay in giving notice of the claim.

    (F) A cause of action for breach of warranty under this section accrues when the
    claimant has reason to know of the breach.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.18
- number: '1304.19'
  heading: Encoding and retention warranties - UCC 4-209
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A person who encodes information on or with respect to an item after
    issue warrants to any subsequent collecting bank and to the payor bank or other
    payor that the information is correctly encoded. If the customer of a depositary
    bank encodes, that bank also makes the warranty.

    (B) A person who undertakes to retain an item pursuant to an agreement for electronic
    presentment warrants to any subsequent collecting bank and to the payor bank or
    other payor that retention and presentment of the item comply with the agreement.
    If a customer of a depositary bank undertakes to retain an item, that bank also
    makes this warranty.

    (C) A person to whom warranties are made under this section and who took the item
    covered by the warranties in good faith may recover from the warrantor as damages
    for breach of warranty an amount equal to the loss suffered as a result of the
    breach, plus expenses and loss of interest incurred as a result of the breach.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.19
- number: '1304.20'
  heading: Security interest of collecting bank in items, accompanying documents and
    proceeds - UCC 4-210
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A collecting bank has a security interest in an item and any accompanying
    documents or the proceeds of the item or documents in any of the following manners:

    (1) In the case of an item deposited in an account, to the extent to which credit
    given for the item has been withdrawn or applied;

    (2) In the case of an item for which it has given credit available for withdrawal
    as of right, to the extent of the credit given, whether or not the credit is drawn
    upon or there is a right of charge-back;

    (3) If it makes an advance on or against the item.

    (B) If credit given for several items received at one time or pursuant to a single
    agreement is withdrawn or applied in part, the security interest remains upon
    all the items, any accompanying documents, or the proceeds of either. For the
    purpose of this section, credits first given are first withdrawn.

    (C) Receipt by a collecting bank of a final settlement for an item is a realization
    on its security interest in the item, accompanying documents, and proceeds. So
    long as the bank does not receive final settlement for the item or give up possession
    of the item or possession or control of the accompanying documents for purposes
    other than collection, the security interest continues to that extent and is subject
    to Chapter 1309. of the Revised Code, except for all of the following:

    (1) No security agreement is necessary to make the security interest enforceable
    under division (B)(3)(a) of section 1309.203 of the Revised Code.

    (2) No filing is required to perfect the security interest.

    (3) The security interest has priority over conflicting perfected security interests
    in the item, accompanying documents, or proceeds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.20
- number: '1304.21'
  heading: When bank gives value for purposes of holder in due course - UCC 4-211
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: For the purposes of determining its status as a holder in due course, a bank
    has given value to the extent it has a security interest in an item if the bank
    otherwise complies with the requirements of section 1303.32 of the Revised Code
    on what constitutes a holder in due course.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.21
- number: '1304.22'
  heading: Presentment by notice of item not payable by, through, or at bank - liability
    of drawer or indorser - UCC 4-212
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Unless otherwise instructed, a collecting bank may present an item not
    payable by, through, or at a bank by sending to the party to accept or pay a record
    providing notice that the bank holds the item for acceptance or payment. The notice
    must be sent in time to be received on or before the day when presentment is due
    and the bank must meet any requirement of the party to accept or pay under section
    1303.61 of the Revised Code by the close of the bank''s next banking day after
    it knows of the requirement.

    (B) If presentment is made by notice and payment, acceptance, or request for compliance
    with a requirement under section 1303.61 of the Revised Code is received by the
    close of business on the day after maturity or in the case of demand items by
    the close of business on the third banking day after notice was sent, the presenting
    bank may treat the item as dishonored and charge any drawer or indorser by sending
    the drawer or indorser notice of the facts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.22
- number: '1304.23'
  heading: Medium and time of settlement by bank - UCC 4-213
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) With respect to settlement by a bank, the medium and time of settlement
    may be prescribed by federal reserve regulations or circulars, clearing house
    rules, and similar rules and documents, or agreement. In the absence of prescription
    in that manner, both of the following apply:

    (1) The medium of settlement is cash or credit to an account in a federal reserve
    bank of or specified by the person to receive settlement.

    (2) The time of settlement is one of the following:

    (a) With respect to tender of settlement by cash, a cashier''s check, or teller''s
    check, when the cash or check is sent or delivered;

    (b) With respect to tender of settlement by credit in an account in a federal
    reserve bank, when the credit is made;

    (c) With respect to tender of settlement by a credit or debit to an account in
    a bank, when the credit or debit is made or, in the case of tender of settlement
    by authority to charge in account, when the authority is sent or delivered;

    (d) With respect to tender of settlement by a funds transfer, when payment is
    made pursuant to division (A) of section 1304.34 of the Revised Code to the person
    receiving settlement.

    (B) If the tender of settlement is not by a medium authorized by division (A)
    of this section or the time of settlement is not fixed by division (A) of this
    section, no settlement occurs until the tender of settlement is accepted by the
    person receiving settlement.

    (C) If settlement for an item is made by cashier''s check or teller''s check,
    both of the following apply:

    (1) If the person receiving settlement, before its midnight deadline, presents
    or forwards the check for collection, settlement is final when the check is finally
    paid.

    (2) If the person receiving settlement, before its midnight deadline, fails to
    present or forward the check for collection, settlement is final at the midnight
    deadline of the person receiving settlement.

    (D) If settlement for an item is made by giving authority to charge the account
    of the bank giving settlement in the bank receiving settlement, settlement is
    final when the charge is made by the bank receiving settlement if there are funds
    available in the account for the amount of the item.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.23
- number: '1304.24'
  heading: Right of charge-back or refund - liability of collecting bank - return
    of item - UCC 4-214
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If a collecting bank has made provisional settlement with its customer
    for an item and fails by reason of dishonor, suspension of payments by a bank,
    or otherwise to receive settlement for the item which is or becomes final, the
    bank may revoke the settlement given by it, charge back the amount of any credit
    given for the item to its customer''s account, or obtain refund from its customer
    whether or not it is able to return the items if by its midnight deadline or within
    a longer reasonable time after it learns the facts it returns the item or sends
    notification of the facts. If the return or notice is delayed beyond the bank''s
    midnight deadline or a longer reasonable time after it learns the facts, the bank
    may revoke the settlement, charge back the credit, or obtain a refund from its
    customer, but it is liable for any loss resulting from the delay. These rights
    to revoke, charge-back, and obtain refund terminate if and when a settlement for
    the item received by the bank is or becomes final.

    (B) A collecting bank returns an item when it is sent or delivered to the bank''s
    customer or transferor or pursuant to its instructions.

    (C) A depositary bank that is also the payor may charge-back the amount of an
    item to its customer''s account or obtain refund in accordance with section 1304.27
    of the Revised Code governing return of an item received by a payor bank for credit
    on its books.

    (D) The right to charge-back is not affected by either of the following:

    (1) Previous use of a credit given for the item;

    (2) Failure by any bank to exercise ordinary care with respect to the item, but
    a bank so failing remains liable.

    (E) A failure to charge-back or claim refund does not affect other rights of the
    bank against the customer or any other party.

    (F) If credit is given in dollars as the equivalent of the value of an item payable
    in a foreign money, the dollar amount of any charge-back or refund shall be calculated
    on the basis of the bank offered spot rate for the foreign money prevailing on
    the day when the person entitled to the charge-back or refund learns that it will
    not receive payment in ordinary course.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.24
- number: '1304.25'
  heading: Final payment of item by payor bank - when provisional debits and credits
    become final - when certain credits become available for withdrawal - UCC 4-215
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) An item is finally paid by a payor bank when the bank has done any of
    the following:

    (1) Paid the item in cash;

    (2) Settled for the item without having a right to revoke the settlement under
    statute, clearing house rule, or agreement;

    (3) Made a provisional settlement for the item and failed to revoke the settlement
    in the time and manner permitted by statute, clearing house rule, or agreement.

    (B) If a provisional settlement for an item does not become final, the item is
    not finally paid.

    (C) If provisional settlement for an item between the presenting and payor banks
    is made through a clearing house or by debits or credits in an account between
    them, then to the extent that provisional debits or credits for the item are entered
    in accounts between the presenting and payor banks or between the presenting and
    successive prior collecting banks seriatim, they become final upon final payment
    of the item by the payor bank.

    (D) If a collecting bank receives a settlement for an item that is or becomes
    final, the bank is accountable to its customer for the amount of the item and
    any provisional credit given for the item in an account with its customer becomes
    final.

    (E) Subject to applicable law stating a time for availability of funds and any
    right of the bank to apply the credit to an obligation of the customer, credit
    given by a bank for an item in a customer''s account becomes available for withdrawal
    as of right at either of the following times:

    (1) If the bank has received a provisional settlement for the item, when the settlement
    becomes final and the bank has had a reasonable time to receive return of the
    item and the item has not been received within that time;

    (2) If the bank is both the depositary bank and the payor bank and the item is
    finally paid, at the opening of the bank''s second banking day following receipt
    of the item.

    (F) Subject to applicable law stating a time for availability of funds and any
    right of a bank to apply a deposit to an obligation of the depositor, a deposit
    of money becomes available for withdrawal as of right at the opening of the bank''s
    next banking day after receipt of the deposit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.25
- number: '1304.26'
  heading: Insolvency and preference - UCC 4-216
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If an item is in or comes into the possession of a payor or collecting
    bank that suspends payment and the item has not been finally paid, the receiver,
    trustee, or agent in charge of the closed bank shall return the item to the presenting
    bank or the closed bank''s customer.

    (B) If a payor bank finally pays an item and suspends payments without making
    a settlement for the item with its customer or the presenting bank which settlement
    is or becomes final, the owner of the item has a preferred claim against the payor
    bank.

    (C) If a payor bank gives or a collecting bank gives or receives a provisional
    settlement for an item and after the provisional settlement suspends payments,
    the suspension does not prevent or interfere with the settlement becoming final
    if the finality occurs automatically upon the lapse of certain time or the happening
    of certain events.

    (D) If a collecting bank receives from subsequent parties settlement for an item
    which settlement is or becomes final and the bank suspends payments without making
    a settlement for the item with its customer which settlement is or becomes final,
    the owner of the item has a preferred claim against the collecting bank.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.26
- number: '1304.27'
  heading: Deferred posting - recovery of payment by return of items - time of dishonor
    - return of items by payor bank - UCC 4-301
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If a payor bank settles for a demand item other than a documentary draft
    presented otherwise than for immediate payment over the counter before midnight
    of the banking day of receipt, the payor bank may revoke the settlement and recover
    the settlement if before it has made final payment and before its midnight deadline
    it does any of the following:

    (1) It returns the item.

    (2) It returns an image of the item, if the party to which the return is made
    has entered into an agreement to accept an image as a return of the item and the
    image is returned in accordance with that agreement.

    (3) It sends a record providing notice of dishonor or nonpayment if the item is
    unavailable for return.

    (B) If a demand item is received by a payor bank for credit on its books, it may
    return the item or send notice of dishonor and may revoke any credit given or
    recover the amount of any credit withdrawn by its customer, if it acts within
    the time limit and in the manner specified in division (A) of this section.

    (C) Unless previous notice of dishonor has been sent, an item is dishonored at
    the time when for purposes of dishonor it is returned or notice sent in accordance
    with this section.

    (D) An item is returned at either of the following times:

    (1) As to an item presented through a clearing house, when it is delivered to
    the presenting or last collecting bank or to the clearing house or is sent or
    delivered in accordance with its rules;

    (2) In all other cases, when it is sent or delivered to the bank''s customer or
    transferor or pursuant to the customer''s or transferor''s instructions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.27
- number: '1304.28'
  heading: Payor bank's responsibility for late return of item - UCC 4-302
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If an item is presented to and received by a payor bank, the bank is
    accountable for either of the following:

    (1) The amount of a demand item other than a documentary draft whether properly
    payable or not if the bank, in any case in which it is not also the depository
    bank, retains the item beyond midnight of the banking day of receipt without settling
    for it or, regardless of whether or not it is also the depository bank, does not
    pay or return the item or send notice of dishonor until after its midnight deadline;

    (2) The amount of any other properly payable item unless within the time allowed
    for acceptance or payment of that item the bank either accepts or pays the item
    or returns it and accompanying documents.

    (B) The liability of a payor bank to pay an item pursuant to division (A) of this
    section is subject to defenses based on breach of a presentment warranty or proof
    that the person seeking enforcement of the liability presented or transferred
    the item for the purpose of defrauding the payor bank.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.28
- number: '1304.29'
  heading: When items subject to notice, stop-payment order, legal process or setoff
    - order in which items may be charged or certified - UCC 4-303
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Any knowledge, notice, or stop payment order received by, legal process
    served upon or setoff exercised by a payor bank comes too late to terminate, suspend,
    or modify the bank''s right or duty to pay an item or to charge its customer''s
    account for the item if the knowledge, notice, stop payment order, or legal process
    is received or served and a reasonable time for the bank to act on that knowledge,
    notice, order, or process expires or the setoff is exercised after the earliest
    of the following:

    (1) The bank accepts or deposits the item.

    (2) The bank pays the item in cash.

    (3) The bank settles for the item without having a right to revoke the settlement
    under statute, clearing house rule, or agreement.

    (4) The bank becomes accountable for the amount of the item under division (A)(3)
    of section 1304.25 and section 1304.28 of the Revised Code dealing with the payor
    bank''s responsibility for late return of items.

    (5) With respect to checks, a cut off hour no earlier than one hour after the
    opening of the next banking day on which the bank received the check and no later
    than the close of that next banking day or, if no cut off hour is fixed, the close
    of the next banking day on which the bank received the check.

    (B) Subject to division (A) of this section, items may be accepted, paid, certified,
    or charged to the indicated account of its customer in any order.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.29
- number: '1304.30'
  heading: When bank may charge customer's account - UCC 4-401
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A bank may charge against the account of a customer an item that is properly
    payable from that account even though the charge creates an overdraft. An item
    is properly payable if it is authorized by the customer and is in accordance with
    any agreement between the customer and bank.

    (B) A customer is not liable for the amount of an overdraft if the customer neither
    signed the item nor benefited from the proceeds of the item.

    (C) A bank may charge against the account of a customer a check that is otherwise
    properly payable from the account, even though the payment was made before the
    date of the check, unless the customer has given notice to the bank of the postdating
    and describes the check with reasonable certainty. The notice is effective for
    the period stated in division (B) of section 1304.32 of the Revised Code for stop
    payment orders and must be received at a time and in a manner that affords the
    bank a reasonable opportunity to act on it before the bank takes any action with
    respect to the check described in section 1304.29 of the Revised Code. If a bank
    charges against the account of a customer a check before the date stated in the
    notice of postdating, the bank is liable for damages for the loss resulting from
    its act. The loss may include damages for dishonor of subsequent items under section
    1304.31 of the Revised Code.

    (D) A bank that in good faith makes payment to a holder may charge the indicated
    account of its customer according to either of the following:

    (1) Original terms of the altered item;

    (2) The terms of the completed item, even though the bank knows the item has been
    completed unless the bank has notice that the completion was improper.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.30
- number: '1304.31'
  heading: Bank's liability to customer for wrongful dishonor - time of determining
    insufficiency of account - UCC 4-402
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Except as otherwise provided in sections 1304.01 to 1304.40 of the Revised
    Code, a payor bank wrongfully dishonors an item if it dishonors an item that is
    properly payable, but a bank may dishonor an item that would create an overdraft
    unless it has agreed to pay the overdraft.

    (B) A payor bank is liable to its customer for damages proximately caused by the
    wrongful dishonor of an item. Liability is limited to actual damages proved and
    damages may include damages for an arrest or prosecution of the customer or other
    consequential damages. Whether any consequential damages are proximately caused
    by the wrongful dishonor is a question of fact to be determined in each case.

    (C) A payor bank''s determination of the customer''s account balance on which
    a decision to dishonor for insufficiency of available funds is based may be made
    at any time between the time the item is received by the payor bank and the time
    that the payor bank returns the item or gives notice in lieu of return, and no
    more than one determination need be made. If, at the election of the payor bank,
    a subsequent balance determination is made for the purpose of reevaluating the
    bank''s decision to dishonor the item, the account balance at that time is determinative
    of whether a dishonor for insufficiency of available funds is wrongful.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.31
- number: '1304.32'
  heading: Customer's right to stop payment - burden of proof of loss - UCC 4-403
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A customer, or any person authorized to draw on the account if there
    is more than one person, may stop payment of any item drawn on the customer''s
    account or close the account by an order to the bank describing the item or account
    with reasonable certainty received at a time and in a manner that affords the
    bank a reasonable opportunity to act on it before any action by the bank with
    respect to the item described in section 1304.29 of the Revised Code. If the signature
    of more than one person is required to draw on an account, any of these persons
    may stop payment or close the account.

    (B) A stop payment order is effective for six months, but it lapses after fourteen
    calendar days if the original order was oral and was not confirmed in a record
    within that period. A stop payment order may be renewed for additional six- month
    periods by a record given to the bank within a period during which the stop payment
    order is effective.

    (C) The burden of establishing the fact and amount of loss resulting from the
    payment of an item contrary to a stop payment order or order to close an account
    is on the customer. The loss from payment of an item contrary to a stop payment
    order may include damages for dishonor of subsequent items under section 1304.31
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.32
- number: '1304.33'
  heading: Bank not obliged to pay check more than six months old - UCC 4-404
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: A bank is under no obligation to a customer having a checking account to pay
    a check, other than a certified check, that is presented more than six months
    after its date, but it may charge its customer's account for a payment made in
    good faith after its date.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.33
- number: '1304.34'
  heading: Death or incompetence of customer - UCC 4-405
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A payor or collecting bank''s authority to accept, pay, or collect an
    item or to account for proceeds of its collection if otherwise effective is not
    rendered ineffective by incompetence of a customer of either bank existing at
    the time the item is issued or its collection is undertaken if the bank does not
    know of an adjudication of incompetence. Neither death nor incompetence of a customer
    revokes the authority to accept, pay, collect, or account until the bank knows
    of the fact of death or of an adjudication of incompetence and has reasonable
    opportunity to act on it.

    (B) Even with knowledge, a bank may for ten days after the date of death pay or
    certify checks drawn on or before that date unless ordered to stop payment by
    a person claiming an interest in the account.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.34
- number: '1304.35'
  heading: Customer's duty to discover and report unauthorized signature or alteration
    - UCC 4-406
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A bank that sends or makes available to a customer a statement of account
    showing payment of items for the account shall either return or make available
    to the customer the items paid or provide information in the statement of account
    sufficient to allow the customer reasonably to identify the items paid. The statement
    of account provides sufficient information if the item is described by item number,
    amount, and date of payment.

    (B) If the items are not returned to the customer, the person retaining the items
    shall either retain the items or, if the items are destroyed, maintain the capacity
    to furnish legible copies of the items until the expiration of seven years after
    receipt of the items. A customer may request an item from the bank that paid the
    item, and that bank must provide in a reasonable time either the item or, if the
    item has been destroyed or is not otherwise obtainable, a legible copy of the
    item.

    (C) If a bank sends or makes available a statement of account or items pursuant
    to division (A) of this section, the customer must exercise reasonable promptness
    in examining the statement or the items to determine whether any payment was not
    authorized because of an alteration of an item or because a purported signature
    by or on behalf of the customer was not authorized. If, based on the statement
    or items provided, the customer should reasonably have discovered the unauthorized
    payment, the customer must promptly notify the bank of the relevant facts.

    (D) If the bank proves that the customer failed with respect to an item to comply
    with the duties imposed on the customer by division (C) of this section, the customer
    is precluded from asserting either of the following against the bank:

    (1) The customer''s unauthorized signature or any alteration on the item if the
    bank also proves that it suffered a loss by reason of that failure;

    (2) The customer''s unauthorized signature or alteration by the same wrongdoer
    on any other item paid in good faith by the bank if the payment was made before
    the bank received notice from the customer of the unauthorized signature or alteration
    and after the customer had been afforded a reasonable period of time, not exceeding
    thirty days, in which to examine the item or statement of account and notify the
    bank.

    (E) If division (D) of this section applies and the customer proves that the bank
    failed to exercise ordinary care in paying the item and that the bank''s failure
    substantially contributed to the loss, the loss is allocated between the customer
    who is precluded and the bank asserting the preclusion according to the extent
    to which the failure of the customer to comply with division (C) of this section
    and the failure of the bank to exercise ordinary care contributed to the loss.
    If the customer proves that the bank did not pay the item in good faith, the preclusion
    under division (D) of this section does not apply.

    (F) Without regard to care or lack of care of either the customer or the bank,
    a customer who does not within one year after the statement or items are made
    available to the customer discover and report the customer''s unauthorized signature
    on or any alteration on the item is precluded from asserting against the bank
    the unauthorized signature or alteration. If there is a preclusion under this
    division, the payor bank may not recover for breach of warranty under section
    1304.28 of the Revised Code with respect to the unauthorized signature or alteration
    to which the preclusion applies.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.35
- number: '1304.36'
  heading: Payor bank's right to subrogation on improper payment - UCC 4-407
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: 'If a payor bank has paid an item over the order of the drawer or maker to
    stop payment, after an account has been closed, or otherwise under circumstances
    giving a basis for objection by the drawer or maker, to prevent unjust enrichment
    and only to the extent necessary to prevent loss to the bank by reason of its
    payment of the item, the payor bank is subrogated to the rights of all of the
    following:

    (A) Any holder in due course on the item against the drawer or maker;

    (B) The payee or any other holder of the item against the drawer or maker either
    on the item or under the transaction out of which the item arose;

    (C) The drawer or maker against the payee or any other holder of the item with
    respect to the transaction out of which the item arose.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.36
- number: '1304.37'
  heading: Handling of documentary drafts - duty to send for presentment and to notify
    customer of dishonor - UCC 4-501
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: A bank that takes a documenatary draft for collection shall present or send
    the draft and accompanying documents for presentment and upon learning that the
    draft has not been paid or accepted in due course shall seasonably notify its
    customer of the fact even though it may have discounted or bought the draft or
    extended credit available for withdrawal as of right.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.37
- number: '1304.38'
  heading: Presentment of on arrival drafts - UCC 4-502
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: If a draft or the relevant instructions require presentment "on arrival,"
    "when goods arrive," or at a similar time related to the arrival of goods, the
    collecting bank need not present until in its judgment a reasonable time for arrival
    of the goods has expired. Refusal to pay or accept because the goods have not
    arrived is not dishonor. The bank shall notify its transferor of the refusal but
    is not required to present the draft again until it is instructed to do so or
    learns of the arrival of the goods.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.38
- number: '1304.39'
  heading: Responsibility of presenting bank for documents and goods - report of reasons
    for dishonor - referee in case of need - UCC 4-503
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: 'Unless otherwise instructed and except as provided in sections 1305.01 to
    1305.16 of the Revised Code, both of the following apply to a bank presenting
    a documentary draft:

    (A) The bank must deliver the documents to the drawee on acceptance of the draft
    if it is payable more than three days after presentment or only on payment if
    it is not payable more than three days after presentment.

    (B) Upon dishonor, either in the case of presentment for acceptance or presentment
    for payment, the bank may seek and follow instructions from any referee in case
    of need designated in the draft or, if the presenting bank does not choose to
    utilize the referee''s services, it shall use diligence and good faith to ascertain
    the reason for dishonor, shall notify its transferor of the dishonor and of the
    results of its effort to ascertain the reasons for the dishonor, and shall request
    instructions. However, the presenting bank is under no obligation with respect
    to goods represented by the documents except to follow any reasonable instructions
    seasonably received. It has a right to reimbursement for any expense incurred
    in following instructions and to prepayment of or indemnity for those expenses.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.39
- number: '1304.40'
  heading: Privilege of presenting bank to deal with goods - security interest for
    expenses - UCC 4-504
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A presenting bank that, following the dishonor of a documentary draft,
    has seasonably requested instructions but does not receive them within a reasonable
    time may store, sell, or otherwise deal with the goods in any reasonable manner.

    (B) For its reasonable expenses incurred by action under division (A) of this
    section, the presenting bank has a lien upon the goods or their proceeds, which
    may be foreclosed in the same manner as an unpaid seller''s lien.'
  history: null
