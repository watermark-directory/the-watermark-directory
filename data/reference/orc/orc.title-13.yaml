- number: '1309.521'
  heading: Uniform form of written financing statement and amendment - UCC 9-521
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A filing office that accepts written records may not refuse to accept
    a written initial financing statement in the form and format set forth in the
    official text of the 2010 amendments to article 9 of the uniform commercial code
    promulgated by the American law institute and the national conference of commissioners
    on uniform state laws, except for a reason prescribed in division (B) of section
    1309.516 of the Revised Code.

    (B) A filing office that accepts written records may not refuse to accept a written
    record in the form and format set forth as form UCC3 and form UCC3Ad in the final
    official text of the 2010 amendments to article 9 of the uniform commercial code
    promulgated by the American law institute and the national conference of commissioners
    on uniform state laws, except for a reason prescribed in division (B) of section
    1309.516 of the Revised Code.'
