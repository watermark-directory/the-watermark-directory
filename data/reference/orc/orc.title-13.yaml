  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.61
- number: '1329.62'
  heading: Cancellation of registration
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'The secretary of state shall cancel from the register the following types
    of registrations:

    (A) Any registration the secretary of state receives a voluntary request in writing,
    on a form prescribed by the secretary of state, for cancellation of the registration
    from the registrant or the assignee of record;

    (B) Any registration that is granted under sections 1329.54 to 1329.67 of the
    Revised Code and that is not renewed in accordance with those sections;

    (C) Any registration concerning which a court of competent jurisdiction finds
    either of the following applies:

    (1) The registration was granted improperly.

    (2) A trademark or service mark is or has become the generic name for the goods
    or services, or a portion of the goods or services, for which the mark is or has
    been registered.

    (D) Any registration ordered canceled by a court of competent jurisdiction on
    any ground.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.62
- number: '1329.63'
  heading: Classification of goods or services
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: The secretary of state shall establish for convenience of administration a
    classification of goods or services that is in conformity with the classification
    established by the commissioner of patents and trademarks under 15 U.S.C. 1112
    but that does not limit or extend the applicant's or registrant's rights. A single
    application for registration of a trademark or service mark may include any or
    all goods and services comprised in a single class on or in connection with which
    the trademark or service mark is actually being used, but a single application
    shall not include goods or services that fall within different classes on or in
    connection with which the trademark or service mark is being used.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.63
- number: '1329.64'
  heading: Fraudulent filing or registration - damages
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: Any person who shall for himself, or on behalf of any other person, procure
    the filing or registration of any trademark or service mark in the office of the
    secretary of state under sections 1329.54 to 1329.67 of the Revised Code, by knowingly
    making any false or fraudulent representation or declaration in writing, or by
    any other fraudulent means, shall be liable to pay all damages sustained in consequence
    of the filing or registration, to be recovered by or on behalf of the party injured
    thereby in any court of competent jurisdiction.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.64
- number: '1329.65'
  heading: Civil action for unauthorized use or reproduction
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'Except as provided in section 1329.67 of the Revised Code, any person who:

    (A) Uses, without the consent of the registrant, any reproduction, counterfeit,
    copy, or colorable imitation of a trademark or service mark registered under sections
    1329.54 to 1329.67 of the Revised Code, in connection with the sale, offering
    for sale, or advertising of any goods or services on or in connection with which
    such use is likely to cause confusion or mistake or to deceive as to the source
    of origin of such goods or services;

    (B) Reproduces, counterfeits, copies, or colorably imitates any such trademark
    or service mark and applies the reproduction, counterfeit, copy, or colorable
    imitation to labels, signs, prints, packages, wrappers, receptacles, or advertisements
    intended to be used upon or in conjunction with the sale or other distribution
    in this state of such goods or services; shall be liable to a civil action by
    the owner of such registered trademark or service mark for any or all of the remedies
    provided in section 1329.66 of the Revised Code, except under this division the
    registrant shall not be entitled to recover profits or damages unless the acts
    have been committed with knowledge that the trademark or service mark is intended
    to cause confusion or mistake or to deceive.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.65
- number: '1329.66'
  heading: Rights and remedies
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'Any owner of a trademark or service mark registered under the sections 1329.54
    to 1329.67 of the Revised Code, may proceed by suit to enjoin the manufacture,
    use, display, or sale of any counterfeits or imitations of the mark, and any court
    of competent jurisdiction may grant injunctions to restrain such manufacture,
    use, display, or sale as may be by the the court considered just and reasonable,
    and may require the defendants to pay to the owner all profits derived from and
    all damages suffered by reason of the wrongful manufacture, use, display, or sale;
    the court may also order that any such counterfeits or imitations in the possession
    or under the control of any defendant in such case, to be delivered to an officer
    of the court, or to the complainant, to be destroyed.

    If the infringement complained of is contained in or is part of paid advertising
    in a newspaper, magazine, or other periodical, the remedies of the owner of the
    right infringed as against the publisher or distributor of such periodical shall
    be confined to an injunction against the presentation of such advertising matter
    in future issues. These limitations shall apply only to innocent infringers and
    injunctive relief shall not be available to the owner of the right infringed in
    respect of an issue of a periodical containing infringing matter when restraining
    the dissemination of such infringing matter in any particular issue of such periodical
    would delay the delivery of such issue after the regular time therefor, and the
    delay would be due to the method by which publication and distribution of such
    periodical is customarily conducted in accordance with sound business practice,
    and not to any method or device adopted for the evasion of this section or to
    prevent or delay the issuance of an injunction or restraining order with respect
    to such infringing matter.

    The enumeration of any right or remedy herein shall not affect a registrant''s
    right to prosecute under any appropriate penal law of this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.66
- number: '1329.67'
  heading: Rights at common law
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: 'Sections 1329.54 to 1329.67 of the Revised Code do not adversely affect the
    rights or the enforcement of rights in trademarks or service marks acquired in
    good faith at common law prior to any of the following times:

    (A) Prior to another person''s registration in this state of a trademark or service
    mark, with the registrant having a subsequent first use date;

    (B) Prior to another person''s registration in the United States patent and trademark
    office of a trademark or service mark, with the other person having a subsequent
    first use date;

    (C) Prior to another person''s registration in the United States patent and trademark
    office of a trademark or service mark, with the other person having a subsequent
    priority date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.67
- number: '1329.71'
  heading: Suit by financial institution to enjoin use of name or logo - remedies
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: '(A) As used in this section, "financial institution" means any bank, savings
    and loan association, savings bank, or credit union; any affiliate or subsidiary
    of a bank, savings and loan association, savings bank, or credit union; any registrant
    as defined in section 1321.51 of the Revised Code ; or any person registered as
    a mortgage lender under Chapter 1322. of the Revised Code.

    (B) Any financial institution may proceed by suit to enjoin the use of the financial
    institution''s name or logo in connection with the sale, offering for sale, distribution,
    or advertising of any product or service without the express written consent of
    the financial institution, if such use is misleading or deceptive as to the source
    of origin or sponsorship of, or the affiliation with, the product or service.
    Any court of competent jurisdiction may grant injunctions to restrain such use
    as the court considers just and reasonable and may require the defendants to pay
    to the financial institution all profits derived from and all damages suffered
    by reason of the wrongful use of the name or logo.

    (C) Notwithstanding division (B) of this section, the only remedies that are available
    for the wrongful use of a financial institution''s name or logo by a registrant
    or licensee under C hapter 1322. of the Revised Code are those set forth in section
    1322.50 of the Revised Code or otherwise provided by statute or common law.

    (D) The provisions of this section are not intended to be exclusive remedies and
    do not preclude the use of any other remedy provided by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.71
- number: '1329.99'
  heading: Penalty
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: '(A) Whoever violates section 1329.26 or 1329.27 of the Revised Code shall
    be fined not more than one hundred dollars.

    (B) Whoever violates section 1329.29 of the Revised Code shall be fined not less
    than twenty-five nor more than five hundred dollars.

    (C) Whoever violates section 1329.30 of the Revised Code shall be fined not less
    than one nor more than twenty-five dollars.

    (D) Whoever violates section 1329.31, 1329.32, or 1329.33 of the Revised Code
    shall be fined not less than twenty-five nor more than fifty dollars for a first
    offense; for each subsequent offense such person shall be fined not less than
    fifty nor more than two hundred dollars.

    (E) Whoever violates sections 1329.41 to 1329.53, inclusive, of the Revised Code,
    shall be fined not less than ten nor more than fifty dollars or imprisoned not
    less than ten days nor more than one month, or both, for a first offense; for
    each subsequent offense such person shall be fined not less than twenty nor more
    than one hundred dollars, or imprisoned not less than thirty days nor more than
    three months, or both.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1329.99
- number: '1331.01'
  heading: Monopoly definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: 'As used in sections 1331.01 to 1331.14 of the Revised Code:

    (A) "Person" includes corporations, partnerships, and associations existing under
    or authorized by any state or territory of the United States, and solely for the
    purpose of the definition of division (C) of this section, a foreign governmental
    entity.

    (B) "Public office" means any state agency, public institution, political subdivision,
    or other organized body, office, agency, institution, or entity established by
    the laws of this state for the exercise of any function of government. "Public
    office" does not include the nonprofit corporation formed under section 187.01
    of the Revised Code.

    (C)(1) "Trust" is a combination of capital, skill, or acts by two or more persons
    for any of the following purposes:

    (a) To create or carry out restrictions in trade or commerce;

    (b) To limit or reduce the production, or increase or reduce the price of merchandise
    or a commodity;

    (c) To prevent competition in manufacturing, making, transportation, sale, or
    purchase of merchandise, produce, or a commodity;

    (d) To fix at a standard or figure, whereby its price to the public or consumer
    is in any manner controlled or established, an article or commodity of merchandise,
    produce, or commerce intended for sale, barter, use, or consumption in this state;

    (e) To make, enter into, execute, or carry out contracts, obligations, or agreements
    of any kind by which they bind or have bound themselves not to sell, dispose of,
    or transport an article or commodity, or an article of trade, use, merchandise,
    commerce, or consumption below a common standard figure or fixed value, or by
    which they agree in any manner to keep the price of such article, commodity, or
    transportation at a fixed or graduated figure, or by which they shall in any manner
    establish or settle the price of an article, commodity, or transportation between
    them or themselves and others, so as directly or indirectly to preclude a free
    and unrestricted competition among themselves, purchasers, or consumers in the
    sale or transportation of such article or commodity, or by which they agree to
    pool, combine, or directly or indirectly unite any interests which they have connected
    with the sale or transportation of such article or commodity, that its price might
    in any manner be affected;

    (f) To refuse to buy from, sell to, or trade with any person because such person
    appears on a blacklist issued by, or is being boycotted by, any foreign corporate
    or governmental entity.

    (2) "Trust" also means a combination of capital, skill, or acts by two or more
    bidders or potential bidders, or one or more bidders or potential bidders and
    any person affiliated with a public office, to restrain or prevent competition
    in the letting or awarding of any public contract in derogation of any statute,
    ordinance, or rule requiring the use of competitive bidding or selection in the
    letting or awarding of the public contract.

    (3) "Trust," as defined in this section, does not include bargaining by a labor
    organization in negotiating or effecting contracts with an employer or employer
    group with reference to minimum payment to any member of the labor organization
    for any motor vehicles owned, driven, and used exclusively by such member in the
    performance of the member''s duties of employment pursuant to a collective bargaining
    agreement between the labor organization and the employer or employer group.

    (4) A trust as defined in this division is unlawful and void.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.01
- number: '1331.02'
  heading: Prohibition against issuing or owning trust certificates or entering into
    combination, contract, or agreement
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: No person shall issue or own trust certificates, and no person shall enter
    into a combination, contract, or agreement, the purpose and effect of which is
    to place the management or control of such combination, or the product or service
    thereof, in the hands of a trustee with the intent to limit or fix the price or
    lessen the production or sale of an article or service of commerce, use, or consumption,
    to prevent, restrict, or diminish the manufacture or output of such article or
    service, or refuse to buy from, sell to, or trade with any person because such
    person appears on a blacklist issued by, or is being boycotted by, any foreign
    corporate or governmental entity.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.02
- number: '1331.021'
  heading: Control acquisition of Ohio company which substantially lessens competition
    in petroleum products market
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: No person, corporation, partnership, or combination shall acquire control
    of an Ohio corporation or its assets where the effect of such acquisition may
    be to substantially lessen competition in any market for petroleum products in
    Ohio, or to substantially lessen, directly or indirectly, the number of competitors
    in any market for petroleum products in Ohio, or to diminish the availability
    of supply of any petroleum product to persons purchasing such product for resale
    in Ohio. Upon request of the governor or the general assembly, the attorney general
    shall bring an action in the court of common pleas of Franklin county to enjoin
    any actual or threatened violation of this provision. The attorney general shall
    have the sole authority to enforce the provisions of this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.021
- number: '1331.03'
  heading: Forfeiture after notice
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: Whoever violates sections 1331.01 to 1331.14 of the Revised Code, shall forfeit
    to the state, for the use of the general revenue fund, five hundred dollars for
    each day that such violation is committed or continued after due notice is given
    by the attorney general or a prosecuting attorney. Such sum may be recovered in
    the name of the state. The attorney general, or the prosecuting attorney of any
    county upon the order of the attorney general, shall prosecute for the recovery
    thereof. When such action is prosecuted by the attorney general he may begin the
    same in the court of common pleas of Franklin county or of any other county in
    which there is proper venue.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.03
- number: '1331.04'
  heading: Conspiracy against trade prohibited
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: Every combination, contract, or agreement in the form of a trust is declared
    to be a conspiracy against trade and illegal. No person shall engage in such conspiracy
    or take part therein, or aid or advise in its commission, or, as principal, manager,
    director, agent, servant, or employer, or in any other capacity, knowingly carry
    out any of the stipulations, purposes, prices, or rates, or furnish any information
    to assist in carrying out such purposes, or orders thereunder, or in pursuance
    thereof, or in any manner violate sections 1331.01 to 1331.14 of the Revised Code.
    Each day's violation of this section is a separate offense.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.04
