- number: '1304.56'
  heading: Security procedure - UCC 4A-201
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '"Security procedure" means a procedure established by agreement of a customer
    and a receiving bank for the purpose of verifying that a payment order or communication
    amending or cancelling a payment order is that of the customer, or detecting error
    in the transmission or the content of the payment order or communication. A security
    procedure may require the use of algorithms or other codes, identifying words
    or numbers, encryption, callback procedures, or similar security devices. Comparison
    of a signature on a payment order or communication with an authorized specimen
    signature of the customer is not by itself a security procedure.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.56
- number: '1304.57'
  heading: Authorized and verified payment orders - UCC 4A-202
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A payment order received by the receiving bank is the authorized order
    of the person identified as sender if that person authorized the order or is otherwise
    bound by it under the law of agency.

    (B)(1) If a bank and its customer have agreed that the authenticity of payment
    orders issued to the bank in the name of the customer as sender will be verified
    pursuant to a security procedure, a payment order received by the receiving bank
    is effective as the order of the customer, whether or not authorized, if both
    of the following apply:

    (a) The security procedure is a commercially reasonable method of providing security
    against unauthorized payment orders.

    (b) The bank proves that it accepted the payment order in good faith and in compliance
    with the security procedure and any written agreement or instruction of the customer
    restricting acceptance of payment orders issued in the name of the customer.

    (2) The bank is not required to follow an instruction that violates a written
    agreement with the customer or notice of which is not received at a time and in
    a manner affording the bank a reasonable opportunity to act on it before the payment
    order is accepted.

    (C)(1) Commercial reasonableness of a security procedure is a question of law
    to be determined by considering all of the following:

    (a) The wishes of the customer expressed to the bank;

    (b) The circumstances of the customer known to the bank, including the size, type,
    and frequency of payment orders normally issued by the customer to the bank;

    (c) Alternative security procedures offered to the customer;

    (d) Security procedures in general use by customers and receiving banks similarly
    situated.

    (2) A security procedure is deemed to be commercially reasonable if both of the
    following apply:

    (a) The security procedure was chosen by the customer after the bank offered,
    and the customer refused, a security procedure that was commercially reasonable
    for that customer.

    (b) The customer expressly agreed in writing to be bound by any payment order,
    whether or not authorized, issued in its name and accepted by the bank in compliance
    with the security procedure chosen by the customer.

    (D) As used in sections 1304.51 to 1304.85 of the Revised Code, "sender" includes
    the customer in whose name a payment order is issued if the order is the authorized
    order of the customer under division (A) of this section, or is effective as the
    order of the customer under division (B) of this section.

    (E) This section applies to amendments and cancellations of payment orders to
    the same extent it applies to payment orders.

    (F) Except as provided in this section and in division (A)(1) of section 1304.58
    of the Revised Code, rights and obligations arising under this section or section
    1304.58 of the Revised Code may not be varied by agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.57
- number: '1304.58'
  heading: Unenforceability of certain verified payment orders - UCC 4A-203
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If an accepted payment order is not an authorized order of a customer
    identified as sender under division (A) of section 1304.57 of the Revised Code,
    but is effective as an order of the customer under division (B) of that section,
    both of the following apply:

    (1) By express written agreement, the receiving bank may limit the extent to which
    it is entitled to enforce or retain payment of the payment order.

    (2) The receiving bank may not enforce or retain payment of the payment order
    if the customer proves that the order was not caused, directly or indirectly,
    by either of the following:

    (a) A person entrusted at any time with duties to act for the customer with respect
    to payment orders or the security procedure;

    (b) A person who obtained access to transmitting facilities of the customer or
    who obtained, from a source controlled by the customer and without authority of
    the receiving bank, information facilitating breach of the security procedure,
    regardless of how the information was obtained or whether the customer was at
    fault. As used in division (A)(2)(b) of this section, "information" includes any
    access device, computer software, or the like.

    (B) This section applies to amendments of payment orders to the same extent it
    applies to payment orders.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.58
- number: '1304.59'
  heading: Refund of payment and duty of customer to report with respect to unauthorized
    payment order - UCC 4A-204
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If a receiving bank accepts a payment order issued in the name of its
    customer as sender which is not authorized and not effective as the order of the
    customer under section 1304.57 of the Revised Code, or not enforceable, in whole
    or in part, against the customer under section 1304.58 of the Revised Code, the
    bank shall refund any payment of the payment order received from the customer
    to the extent the bank is not entitled to enforce payment and shall pay interest
    on the refundable amount calculated from the date the bank received payment to
    the date of the refund. The customer is not entitled to interest from the bank
    on the amount to be refunded if the customer fails to exercise ordinary care to
    determine that the order was not authorized by the customer and to notify the
    bank of the relevant facts within a reasonable time not exceeding ninety days
    after the date the customer received notification from the bank that the order
    was accepted or that the customer''s account was debited with respect to the order.
    The bank is not entitled to any recovery from the customer on account of a failure
    by the customer to give notification as stated in this section.

    (B) Reasonable time under division (A) of this section may be fixed by agreement
    as provided in division (B) of section 1301.302 of the Revised Code, but the obligation
    of a receiving bank to refund payment as provided in division (A) of this section
    may not otherwise be varied by agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.59
- number: '1304.60'
  heading: Erroneous payment orders - UCC 4A-205
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Division (B) of this section applies if an accepted payment order was
    transmitted pursuant to a security procedure for the detection of error, and any
    of the following applies:

    (1) The payment order erroneously instructed payment to a beneficiary not intended
    by the sender.

    (2) The payment order erroneously instructed payment in an amount greater than
    the amount intended by the sender.

    (3) The payment order was an erroneously transmitted duplicate of a payment order
    previously sent by the sender.

    (B)(1) If the sender proves that the sender or a person acting on behalf of the
    sender pursuant to section 1304.61 of the Revised Code complied with the security
    procedure and that the error would have been detected if the receiving bank had
    also complied, the sender is not obliged to pay the order to the extent provided
    in divisions (B)(2) and (3) of this section.

    (2) If the funds transfer is completed on the basis of an erroneous payment order
    described in division (A)(1) or (3) of this section, the sender is not obliged
    to pay the order and the receiving bank may recover from the beneficiary any amount
    paid to the beneficiary to the extent allowed by the law governing mistake and
    restitution.

    (3) If the funds transfer is completed on the basis of a payment order described
    in division (A)(2) of this section, the sender is not obliged to pay the order
    to the extent the amount received by the beneficiary is greater than the amount
    intended by the sender. In that case, the receiving bank may recover from the
    beneficiary the excess amount received to the extent allowed by the law governing
    mistake and restitution.

    (C) If the sender of an erroneous payment order described in division (A) of this
    section is not obliged to pay all or part of the order, and the sender receives
    notification from the receiving bank that the order was accepted by the bank or
    that the sender''s account was debited with respect to the order, the sender has
    a duty to exercise ordinary care, on the basis of information available to the
    sender, to discover the error with respect to the order and to advise the bank
    of the relevant facts within a reasonable time, not exceeding ninety days, after
    the bank''s notification was received by the sender. If the bank proves that the
    sender failed to perform that duty, the sender is liable to the bank for the loss
    the bank proves it incurred as a result of the failure, provided that the liability
    of the sender may not exceed the amount of the sender''s order.

    (D) This section applies to amendments to payment orders to the same extent it
    applies to payment orders.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.60
- number: '1304.61'
  heading: Transmission of payment order through funds-transfer or other communication
    system - UCC 4A-206
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If a payment order addressed to a receiving bank is transmitted to a
    funds-transfer system or other third-party communication system for transmittal
    to the bank, the system is deemed to be an agent of the sender for the purpose
    of transmitting the payment order to the bank. If there is a discrepancy between
    the terms of the payment order transmitted to the system and the terms of the
    payment order transmitted by the system to the bank, the terms of the payment
    order of the sender are those transmitted by the system.

    (B) This section does not apply to a funds-transfer system of the federal reserve
    banks.

    (C) This section applies to cancellations and amendments of payment orders to
    the same extent it applies to payment orders.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.61
- number: '1304.62'
  heading: Misdescription of beneficiary - UCC 4A-207
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Subject to division (B) of this section, if, in a payment order received
    by the beneficiary''s bank, the name, bank account number, or other identification
    of the beneficiary refers to a nonexistent or unidentifiable person or account,
    no person has rights as a beneficiary of the order and acceptance of the order
    cannot occur.

    (B) If a payment order received by the beneficiary''s bank identifies the beneficiary
    by name and an identifying or bank account number, and the name and number identify
    different persons, both of the following apply:

    (1) Except as otherwise provided in division (C) of this section, if the beneficiary''s
    bank does not know that the name and number refer to different persons, it may
    rely on the number as the proper identification of the beneficiary of the order.
    The beneficiary''s bank need not determine whether the name and number refer to
    the same person.

    (2) If the beneficiary''s bank pays the person identified by name or knows that
    the name and number identify different persons, no person has rights as beneficiary
    except the person paid by the beneficiary''s bank if that person was entitled
    to receive payment from the originator of the funds transfer. If no person has
    rights as beneficiary, acceptance of the order cannot occur.

    (C) If a payment order described in division (B) of this section is accepted,
    the originator''s payment order described the beneficiary inconsistently by name
    and number, and the beneficiary''s bank pays the person identified by number as
    permitted by division (B)(1) of this section, both of the following apply:

    (1) If the originator is a bank, the originator shall pay its order.

    (2) If the originator is not a bank and proves that the person identified by number
    was not entitled to receive payment from the originator, the originator is not
    obliged to pay its order unless the originator''s bank proves that the originator,
    before acceptance of the originator''s order, had notice that payment of a payment
    order issued by the originator might be made by the beneficiary''s bank on the
    basis of an identifying or bank account number even if it identifies a person
    different from the named beneficiary. Proof of notice may be made by any admissible
    evidence. The originator''s bank satisfies the burden of proof if it proves that
    the originator, before the payment order was accepted, signed a writing stating
    the information to which the notice relates.

    (D) In a case governed by division (B)(1) of this section, if the beneficiary''s
    bank rightfully pays the person identified by number and that person was not entitled
    to receive payment from the originator, the amount paid may be recovered from
    that person to the extent allowed by the law governing mistake and restitution
    as follows:

    (1) If the originator is obliged to pay its payment order as stated in division
    (C) of this section, the originator may recover.

    (2) If the originator is not a bank and is not obliged to pay its payment order,
    the originator''s bank may recover.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.62
- number: '1304.63'
  heading: Misdescription of intermediary bank or beneficiary's bank - UCC 4A-208
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A)(1) Divisions (A)(2) and (3) of this section apply to a payment order
    identifying an intermediary bank or the beneficiary''s bank only by an identifying
    number.

    (2) The receiving bank may rely on the number as the proper identification of
    the intermediary or beneficiary''s bank and need not determine whether the number
    identifies a bank.

    (3) The sender shall compensate the receiving bank for any loss and expenses incurred
    by the receiving bank as a result of its reliance on the number in executing or
    attempting to execute the order.

    (B)(1) Divisions (B)(2) to (5) of this section apply to a payment order identifying
    an intermediary bank or the beneficiary''s bank both by name and an identifying
    number if the name and number identify different persons.

    (2) If the sender is a bank, the receiving bank may rely on the number as the
    proper identification of the intermediary or beneficiary''s bank if the receiving
    bank, when it executes the sender''s order, does not know that the name and number
    identify different persons. The receiving bank need not determine whether the
    name and number refer to the same person or whether the number refers to a bank.
    The sender shall compensate the receiving bank for any loss and expenses incurred
    by the receiving bank as a result of its reliance on the number in executing or
    attempting to execute the order.

    (3) If the sender is not a bank, and the receiving bank proves that the sender,
    before the payment order was accepted, had notice that the receiving bank might
    rely on the number as the proper identification of the intermediary or beneficiary''s
    bank even if it identifies a person different from the bank identified by name,
    the rights and obligations of the sender and the receiving bank are governed by
    division (B)(2) of this section, as though the sender were a bank. Proof of notice
    may be made by any admissible evidence. The receiving bank satisfies the burden
    of proof it it proves that the sender, before the payment order was accepted,
    signed a writing stating the information to which the notice relates.

    (4) Regardless of whether the sender is a bank, the receiving bank may rely on
    the name as the proper identification of the intermediary or beneficiary''s bank
    if the receiving bank, at the time it executes the sender''s order, does not know
    that the name and number identify different persons. The receiving bank need not
    determine whether the name and number refer to the same person.

    (5) If the receiving bank knows that the name and number identify different persons,
    reliance on either the name or the number in executing the sender''s payment order
    is a breach of the obligation as provided in division (A)(1) of section 1304.69
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.63
- number: '1304.64'
  heading: Acceptance of payment order - UCC 4A-209
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Subject to division (D) of this section, a receiving bank other than
    the beneficiary''s bank accepts a payment order when it executes the order.

    (B) Subject to divisions (C) and (D) of this section, a beneficiary''s bank accepts
    a payment order at the earliest of the following times:

    (1) When the bank pays the beneficiary as provided in division (A) or (B) of section
    1304.77 of the Revised Code, or notifies the beneficiary of receipt of the order
    or that the account of the beneficiary has been credited with respect to the order,
    unless the notice indicates that the bank is rejecting the order or that funds
    with respect to the order may not be withdrawn or used until receipt of payment
    from the sender of the order;

    (2) When the bank receives payment of the entire amount of the sender''s order
    pursuant to division (A)(1) or (2) of section 1304.75 of the Revised Code;

    (3) The opening of the next funds-transfer business day of the bank following
    the payment date of the order if, at that time, the amount of the sender''s order
    is fully covered by a withdrawable credit balance in an authorized account of
    the sender or the bank has otherwise received full payment from the sender, unless
    the order was rejected before that time or is rejected within one hour after that
    time, or one hour after the opening of the next business day of the sender following
    the payment date if that time is later. If notice of rejection is received by
    the sender after the payment date and the authorized account of the sender does
    not bear interest, the bank shall pay interest to the sender on the amount of
    the order for the number of days elapsing after the payment date to the day the
    sender receives notice or learns that the order was not accepted, counting that
    day as an elapsed day. If the withdrawable credit balance during that period falls
    below the amount of the order, the amount of interest payable is reduced accordingly.

    (C) Acceptance of a payment order cannot occur before the order is received by
    the receiving bank. Acceptance does not occur under division (B)(2) or (3) of
    this section if the beneficiary of the payment order does not have an account
    with the receiving bank, the account has been closed, or the receiving bank is
    not permitted by law to receive credits for the beneficiary''s account.

    (D) A payment order issued to the originator''s bank cannot be accepted until
    the payment date if the bank is the beneficiary''s bank, or the execution date
    if the bank is not the beneficiary''s bank. If the originator''s bank executes
    the originator''s payment order before the execution date or pays the beneficiary
    of the originator''s payment order before the payment date and the payment order
    is subsequently canceled pursuant to division (B) of section 1304.66 of the Revised
    Code, the bank may recover from the beneficiary any payment received to the extent
    allowed by the law governing mistake and restitution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.64
- number: '1304.65'
  heading: Rejection of payment order - UCC 4A-210
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A payment order is rejected by the receiving bank by a notice of rejection
    transmitted to the sender orally, electronically, or in writing. A notice of rejection
    need not use any particular words and is sufficient if it indicates that the receiving
    bank is rejecting the order or will not execute or pay the order. Rejection is
    effective when the notice is given if transmission is by a means that is reasonable
    in the circumstances. If notice of rejection is given by a means that is not reasonable,
    rejection is effective when the notice is received. If an agreement of the sender
    and receiving bank establishes the means to be used to reject a payment order,
    any means complying with the agreement is reasonable, and any means not complying
    is not reasonable unless no significant delay in receipt of the notice resulted
    from the use of the noncomplying means.

    (B) This division applies if a receiving bank other than the beneficiary''s bank
    fails to execute a payment order despite the existence on the execution date of
    a withdrawable credit balance in an authorized account of the sender sufficient
    to cover the order. If the sender does not receive notice of rejection of the
    order on the execution date and the authorized account of the sender does not
    bear interest, the bank shall pay interest to the sender on the amount of the
    order for the number of days elapsing after the execution date to the earlier
    of the day the order is canceled pursuant to division (D) of section 1304.66 of
    the Revised Code or the day the sender receives notice or learns that the order
    was not executed, counting the final day of the period as an elapsed day. If the
    withdrawable credit balance during that period falls below the amount of the order,
    the amount of interest is reduced accordingly.

    (C) If a receiving bank suspends payments, all unaccepted payment orders issued
    to it are deemed rejected at the time the bank suspends payments.

    (D) Acceptance of a payment order precludes a later rejection of the order. Rejection
    of a payment order precludes a later acceptance of the order.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.65
- number: '1304.66'
  heading: Cancellation and amendment of payment order - UCC 4A-211
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A communication of the sender of a payment order canceling or amending
    the order may be transmitted to the receiving bank orally, electronically, or
    in writing. If a security procedure is in effect between the sender and the receiving
    bank, the communication is not effective to cancel or amend the order unless the
    communication is verified pursuant to the security procedure or the bank agrees
    to the cancellation or amendment.

    (B) Subject to division (A) of this section, a communication by the sender canceling
    or amending a payment order is effective to cancel or amend the order if notice
    of the communication is received at a time and in a manner affording the receiving
    bank a reasonable opportunity to act on the communication before the bank accepts
    the payment order.

    (C)(1) After a payment order has been accepted, cancellation or amendment of the
    order is not effective unless the receiving bank agrees or a funds-transfer system
    rule allows cancellation or amendment without agreement of the bank.

    (2) With respect to a payment order accepted by a receiving bank other than the
    beneficiary''s bank, cancellation or amendment is not effective unless a conforming
    cancellation or amendment of the payment order issued by the receiving bank is
    also made.

    (3) With respect to a payment order accepted by the beneficiary''s bank, cancellation
    or amendment is not effective unless the order was issued in execution of an unauthorized
    payment order, or because of a mistake by a sender in the funds transfer that
    resulted in the issuance of a payment order that is a duplicate of a payment order
    previously issued by the sender, that orders payment to a beneficiary not entitled
    to receive payment from the originator, or that orders payment in an amount greater
    than the amount the beneficiary was entitled to receive from the originator. If
    the payment order is canceled or amended, the beneficiary''s bank may recover
    from the beneficiary any amount paid to the beneficiary to the extent allowed
    by the law governing mistake and restitution.

    (D) An unaccepted payment order is canceled by operation of law at the close of
    the fifth funds-transfer business day of the receiving bank after the execution
    date or payment date of the order.

    (E) A canceled payment order cannot be accepted. If an accepted payment order
    is canceled, the acceptance is nullified, and no person has any right or obligation
    based on the acceptance. Amendment of a payment order is deemed to be cancellation
    of the original order at the time of amendment and issue of a new payment order
    in the amended form at the same time.

    (F) Unless otherwise provided in an agreement of the parties or in a funds-transfer
    system rule, if the receiving bank, after accepting a payment order, agrees to
    cancellation or amendment of the order by the sender or is bound by a funds-transfer
    system rule allowing cancellation or amendment without the bank''s agreement,
    the sender, whether or not cancellation or amendment is effective, is liable to
    the bank for any loss and expenses, including reasonable attorney''s fees, incurred
    by the bank as a result of the cancellation, amendment, or attempted cancellation
    or amendment.

    (G) A payment order is not revoked by the death or legal incapacity of the sender
    unless the receiving bank knows of the death or of an adjudication of incapacity
    by a court of competent jurisdiction and has reasonable opportunity to act before
    acceptance of the order.

    (H) A funds-transfer system rule is not effective to the extent it conflicts with
    division (C)(3) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.66
- number: '1304.67'
  heading: Liability and duty of receiving bank regarding unaccepted payment order
    - UCC 4A-212
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: If a receiving bank fails to accept a payment order that it is obliged by
    express agreement to accept, the bank is liable for breach of the agreement to
    the extent provided in the agreement or in sections 1304.51 to 1304.85 of the
    Revised Code, but does not otherwise have any duty to accept a payment order or,
    before acceptance, to take any action, or refrain from taking action, with respect
    to the order except as provided in those sections or by express agreement. Liability
    based on acceptance arises only when acceptance occurs as provided in section
    1304.64 of the Revised Code, and liability is limited to that provided in sections
    1304.51 to 1304.85 of the Revised Code. A receiving bank is not the agent of the
    sender or beneficiary of the payment order it accepts, or of any other party to
    the funds transfer, and the bank owes no duty to any party to the funds transfer
    except as provided in sections 1304.51 to 1304.85 of the Revised Code or by express
    agreement.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.67
- number: '1304.68'
  heading: Execution and execution date - UCC 4A-301
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A payment order is executed by the receiving bank when it issues a payment
    order intended to carry out the payment order received by the bank. A payment
    order received by the beneficiary''s bank can be accepted but cannot be executed.

    (B) "Execution date" of a payment order means the day on which the receiving bank
    may properly issue a payment order in execution of the sender''s order. The execution
    date may be determined by instruction of the sender but cannot be earlier than
    the day the order is received and, unless otherwise determined, is the day the
    order is received. If the sender''s instruction states a payment date, the execution
    date is the payment date or an earlier date on which execution is reasonably necessary
    to allow payment to the beneficiary on the payment date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.68
- number: '1304.69'
  heading: Obligations of receiving bank in execution of payment order - UCC 4A-302
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Except as provided in divisions (B) to (D) of this section, if the receiving
    bank accepts a payment order pursuant to division (A) of section 1304.64 of the
    Revised Code, the bank has the following obligations in executing the order:

    (1) The receiving bank shall issue, on the execution date, a payment order complying
    with the sender''s order and follow the sender''s instructions concerning any
    intermediary bank or funds-transfer system to be used in carrying out the funds
    transer, or the means by which payment orders are to be transmitted in the funds
    transfer. If the originator''s bank issues a payment order to an intermediary
    bank, the originator''s bank shall instruct the intermediary bank according to
    the instruction of the originator. An intermediary bank in the funds transfer
    is similarly bound by an instruction given to it by the sender of the payment
    order it accepts.

    (2) If the sender''s instruction states that the funds transfer is to be carried
    out telephonically or by wire transfer or otherwise indicates that the funds transfer
    is to be carried out by the most expeditious means, the receiving bank shall transmit
    its payment order by the most expeditious available means and instruct any intermediary
    bank accordingly. If a sender''s instruction states a payment date, the receiving
    bank shall transmit its payment order at a time and by means reasonably necessary
    to allow payment to the beneficiary on the payment date or as soon thereafter
    as is feasible.

    (B) Unless otherwise instructed, a receiving bank executing a payment order may
    use any funds-transfer system if use of that system is reasonable in the circumstances,
    and issue a payment order to the beneficiary''s bank or to an intermediary bank
    through which a payment order conforming to the sender''s order can expeditiously
    be issued to the beneficiary''s bank if the receiving bank exercises ordinary
    care in the selection of the intermediary bank. A receiving bank is not required
    to follow an instruction of the sender designating a funds-transfer system to
    be used in carrying out the funds transfer if the receiving bank, in good faith,
    determines that it is not feasible to follow the instruction or that following
    the instruction would unduly delay completion of the funds transfer.

    (C) Unless division (A)(2) of this section applies or the receiving bank is otherwise
    instructed, the bank may execute a payment order by transmitting its payment order
    by first class mail or by any means reasonable in the circumstances. If the receiving
    bank is instructed to execute the sender''s order by transmitting its payment
    order by a particular means, the receiving bank may issue its payment order by
    the means stated or by any means as expeditious as the means stated.

    (D) Unless instructed by the sender, the receiving bank may not obtain payment
    of its charges for services and expenses in connection with the execution of the
    sender''s order by issuing a payment order in an amount equal to the amount of
    the sender''s order less the amount of the charges, and may not instruct a subsequent
    receiving bank to obtain payment of its charges in the same manner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.69
- number: '1304.70'
  heading: Erroneous execution of payment order - UCC 4A-303
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) A receiving bank that executes the payment order of the sender by issuing
    a payment order in an amount greater than the amount of the sender''s order, or
    issues a payment order in execution of the sender''s order and then issues a duplicate
    order, is entitled to payment of the amount of the sender''s order under division
    (C) of section 1304.74 of the Revised Code if that division is otherwise satisfied.
    The bank may recover from the beneficiary of the erroneous order the excess payment
    received to the extent allowed by the law governing mistake and restitution.

    (B) A receiving bank that executes the payment order of the sender by issuing
    a payment order in an amount less than the amount of the sender''s order is entitled
    to payment of the amount of the sender''s order under division (C) of section
    1304.74 of the Revised Code if that division is otherwise satisfied and the bank
    corrects its mistake by issuing an additional payment order for the benefit of
    the beneficiary of the sender''s order. If the error is not corrected, the issuer
    of the erroneous order may receive or retain payment from the sender of the order
    it accepted only to the extent of the amount of the erroneous order. This division
    does not apply if the receiving bank executes the sender''s payment order by issuing
    a payment order in an amount less than the amount of the sender''s order for the
    purpose of obtaining payment of its charges for services and expenses pursuant
    to instruction of the sender.

    (C) If a receiving bank executes the payment order of the sender by issuing a
    payment order to a beneficiary different from the beneficiary of the sender''s
    order and the funds transfer is completed on the basis of that error, the sender
    of the payment order that was erroneously executed and all previous senders in
    the funds transfer are not obliged to pay the payment orders they issued. The
    issuer of the erroneous order may recover from the beneficiary of the order the
    payment received to the extent allowed by the law governing mistake and restitution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.70
- number: '1304.71'
  heading: Duty of sender to report erroneously executed payment order - UCC 4A-304
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: If the sender of a payment order that is erroneously executed as provided
    in section 1304.70 of the Revised Code receives notification from the receiving
    bank that the order was executed or that the sender's account was debited with
    respect to the order, the sender has a duty to exercise ordinary care to determine,
    on the basis of information available to the sender, that the order was erroneously
    executed and to notify the bank of the relevant facts within a reasonable time
    not exceeding ninety days after the notification from the bank was received by
    the sender. If the sender fails to perform that duty, the bank is not obliged
    to pay interest on any amount refundable to the sender under division (D) of section
    1304.74 of the Revised Code for the period before the bank learns of the execution
    error. The bank is not entitled to any recovery from the sender on account of
    a failure by the sender to perform the duty stated in this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.71
- number: '1304.72'
  heading: Liability for late or improper execution or failure to execute payment
    order - UCC 4A-305
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If a funds transfer is completed but execution of a payment order by
    the receiving bank without compliance with section 1304.69 of the Revised Code
    results in delay in payment to the beneficiary, the bank shall pay interest to
    either the originator or the beneficiary of the funds transfer for the period
    of delay caused by the improper execution. Except as provided in division (C)
    of this section, additional damages are not recoverable.

    (B) If execution of a payment order by a receiving bank without compliance with
    section 1304.69 of the Revised Code results in noncompletion of the funds transfer,
    failure to use an intermediary bank designated by the originator, or issuance
    of a payment order that does not comply with the terms of the payment order of
    the originator, the bank is liable to the originator for its expenses in the funds
    transfer and for incidental expenses and interest losses, to the extent not covered
    by division (A) of this section, resulting from the improper execution. Except
    as provided in division (C) of this section, additional damages are not recoverable.

    (C) In addition to the amounts payable under divisions (A) and (B) of this section,
    damages, including consequential damages, are recoverable to the extent provided
    in an express written agreement of the receiving bank.

    (D) If a receiving bank fails to execute a payment order it was obliged by express
    agreement to execute, the receiving bank is liable to the sender for its expenses
    in the transaction and for incidental expenses and interest losses resulting from
    the failure to execute. Additional damages, including consequential damages, are
    recoverable to the extent provided in an express written agreement of the receiving
    bank, but are not otherwise recoverable.

    (E) Reasonable attorney''s fees are recoverable if demand for compensation under
    division (A) or (B) of this section is made and refused before an action is brought
    on the claim. If a claim is made for breach of an agreement under division (D)
    of this section and the agreement does not provide for damages, reasonable attorney''s
    fees are recoverable if demand for compensation under division (D) of this section
    is made and refused before an action is brought on the claim.

    (F) Except as stated in this section, the liability of a receiving bank under
    divisions (A) and (B) of this section may not be varied by agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.72
- number: '1304.73'
  heading: Payment date - UCC 4A-401
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '"Payment date" of a payment order means the day on which the amount of the
    order is payable to the beneficiary by the beneficiary''s bank. The payment date
    may be determined by instruction of the sender but cannot be earlier than the
    day the order is received by the beneficiary''s bank and, unless otherwise determined,
    is the day the order is received by the beneficiary''s bank.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.73
- number: '1304.74'
  heading: Obligation of sender to pay receiving bank - UCC 4A-402
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) This section is subject to sections 1304.60 and 1304.62 of the Revised
    Code.

    (B) With respect to a payment order issued to the beneficiary''s bank, acceptance
    of the order by the bank obliges the sender to pay the bank the amount of the
    order, but payment is not due until the payment date of the order.

    (C) This division is subject to division (E) of this section and to section 1304.70
    of the Revised Code. With respect to a payment order issued to a receiving bank
    other than the beneficiary''s bank, acceptance of the order by the receiving bank
    obliges the sender to pay the bank the amount of the sender''s order. Payment
    by the sender is not due until the execution date of the sender''s order. The
    obligation of that sender to pay its payment order is excused if the funds transfer
    is not completed by acceptance by the beneficiary''s bank of a payment order instructing
    payment to the beneficiary of that sender''s payment order.

    (D) If the sender of a payment order pays the order and was not obliged to pay
    all or part of the amount paid, the bank receiving payment shall refund payment
    to the extent the sender was not obliged to pay. Except as provided in sections
    1304.59 and 1304.71 of the Revised Code, interest is payable on the refundable
    amount from the date of payment.

    (E) If a funds transfer is not completed as stated in division (C) of this section
    and an intermediary bank is obliged to refund payment as stated in division (D)
    of this section but is unable to do so because not permitted by applicable law
    or because the bank suspends payments, a sender in the funds transfer that executed
    a payment order in compliance with an instruction, as provided in division (A)(1)
    of section 1304.69 of the Revised Code, to route the funds transfer through that
    intermediary bank may receive or retain payment from the sender of the payment
    order that it accepted. The first sender in the funds transfer that issued an
    instruction requiring routing through that intermediary bank is subrogated to
    the right of the bank that paid the intermediary bank to refund as provided in
    division (D) of this section.

    (F) The right of the sender of a payment order to be excused from the obligation
    to pay the order as provided in division (C) of this section or to receive refund
    under division (D) of this section may not be varied by agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.74
- number: '1304.75'
  heading: Payment by sender to receiving bank - UCC 4A-403
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Payment of the sender''s obligation under section 1304.74 of the Revised
    Code to pay the receiving bank occurs as follows:

    (1) If the sender is a bank, payment occurs when the receiving bank receives final
    settlement of the obligation through a federal reserve bank or through a funds-transfer
    system.

    (2) If the sender is a bank, and the sender credited an account of the receiving
    bank with the sender or caused an account of the receiving bank in another bank
    to be credited, payment occurs when the credit is withdrawn or, if not withdrawn,
    at midnight of the day on which the credit is withdrawable and the receiving bank
    learns of that fact.

    (3) If the receiving bank debits an account of the sender with the receiving bank,
    payment occurs when the debit is made to the extent the debit is covered by a
    withdrawable credit balance in the account.

    (B)(1) If the sender and receiving bank are members of a funds-transfer system
    that nets obligations multilaterally among participants, the receiving bank receives
    final settlement when settlement is complete in accordance with the rules of the
    system.

    (2) The obligation of the sender to pay the amount of a payment order transmitted
    through the funds-transfer system may be satisfied, to the extent permitted by
    the rules of the system, by setting off and applying against the sender''s obligation
    the right of the sender to receive payment from the receiving bank of the amount
    of any other payment order transmitted to the sender by the receiving bank through
    the funds-transfer system.

    (3) The aggregate balance of obligations owed by each sender to each receiving
    bank in the funds-transfer system may be satisfied, to the extent permitted by
    the rules of the system, by setting off and applying against that balance the
    aggregate balance of obligations owed to the sender by other members of the system.
    The aggregate balance is determined after the right of setoff as provided in division
    (B)(2) of this section has been exercised.

    (C) If two banks transmit payment orders to each other under an agreement that
    settlement of the obligations of each bank to the other under section 1304.74
    of the Revised Code will be made at the end of the day or other period, the total
    amount owed with respect to all orders transmitted by one bank shall be set off
    against the total amount owed with respect to all orders transmitted by the other
    bank. To the extent of the setoff, each bank has made payment to the other.

    (D) In a case not covered by division (A) of this section, the time when payment
    of the sender''s obligation under division (B) or (C) of section 1304.74 of the
    Revised Code occurs is governed by applicable principles of law that determine
    when an obligation is satisfied.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.75
- number: '1304.76'
  heading: Obligation of beneficiary's bank to pay and give notice to beneficiary
    - UCC 4A-404
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Subject to division (E) of section 1304.66 and divisions (D) and (E)
    of section 1304.77 of the Revised Code, if a beneficiary''s bank accepts a payment
    order, the bank shall pay the amount of the order to the beneficiary of the order.
    Payment is due on the payment date of the order, but, if acceptance occurs on
    the payment date after the close of the funds-transfer business day of the bank,
    payment is due on the next funds-transfer business day. If the bank refuses to
    pay after demand by the beneficiary and receipt of notice of particular circumstances
    that will give rise to consequential damages as a result of nonpayment, the beneficiary
    may recover damages resulting from the refusal to pay to the extent the bank had
    notice of the damages, unless the bank proves that it did not pay because of a
    reasonable doubt concerning the right of the beneficiary to payment.

    (B) If a payment order accepted by the beneficiary''s bank instructs payment to
    an account of the beneficiary, the bank shall notify the beneficiary of receipt
    of the order before midnight of the next funds-transfer business day following
    the payment date. If the payment order does not instruct payment to an account
    of the beneficiary, the bank shall notify the beneficiary only if notice is required
    by the order. Notice may be given by first class mail or any other means reasonable
    in the circumstances. If the bank fails to give the required notice, the bank
    shall pay interest to the beneficiary on the amount of the payment order from
    the day notice should have been given until the day the beneficiary learned of
    receipt of the payment order by the bank. No other damages are recoverable. Reasonable
    attorney''s fees are also recoverable if demand for interest is made and refused
    before an action is brought on the claim.

    (C) The right of a beneficiary to receive payment and damages as stated in division
    (A) of this section shall not be varied by agreement or a funds-transfer system
    rule. The right of a beneficiary to be notified as provided in division (B) of
    this section may be varied by agreement of the beneficiary or by a funds-transfer
    system rule if the beneficiary is notified of the rule before initiation of the
    funds transfer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.76
- number: '1304.77'
  heading: Payment by beneficiary's bank to beneficiary - UCC 4A-405
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If the beneficiary''s bank credits an account of the beneficiary of a
    payment order, payment of the bank''s obligation under division (A) of section
    1304.76 of the Revised Code occurs when and to the extent the beneficiary is notified
    of the right to withdraw the credit, the bank lawfully applies the credit to a
    debt of the beneficiary, or funds with respect to the order are otherwise made
    available to the beneficiary by the bank.

    (B) If the beneficiary''s bank does not credit an account of the beneficiary of
    a payment order, the time when payment of the bank''s obligation under division
    (A) of section 1304.76 of the Revised Code occurs is governed by principles of
    law that determine when an obligation is satisfied.

    (C) Except as provided in divisions (D) and (E) of this section, if the beneficiary''s
    bank pays the beneficiary of a payment order under a condition to payment or agreement
    of the beneficiary giving the bank the right to recover payment from the beneficiary
    if the bank does not receive payment of the order, the condition to payment or
    agreement is not enforceable.

    (D) A funds-transfer system rule may provide that payments made to beneficiaries
    of funds transfers made through the system are provisional until receipt of payment
    by the beneficiary''s bank of the payment order it accepted. A beneficiary''s
    bank that makes a payment that is provisional under the rule is entitled to refund
    from the beneficiary if the rule requires that both the beneficiary and the originator
    be given notice of the provisional nature of the payment before the funds transfer
    is initiated; the beneficiary, the beneficiary''s bank, and the originator''s
    bank agreed to be bound by the rule; and the beneficiary''s bank did not receive
    payment of the payment order that it accepted. If the beneficiary is obliged to
    refund payment to the beneficiary''s bank, acceptance of the payment order by
    the beneficiary''s bank is nullified, and no payment by the originator of the
    funds transfer to the beneficiary shall occur under section 1304.78 of the Revised
    Code.

    (E) This division applies to a funds transfer that includes a payment order transmitted
    over a funds-transfer system that nets obligations multilaterally among participants,
    and has in effect a loss-sharing agreement among participants for the purpose
    of providing funds necessary to complete settlement of the obligations of one
    or more participants that do not meet their settlement obligations. If the beneficiary''s
    bank in the funds transfer accepts a payment order and the system fails to complete
    settlement pursuant to its rules with respect to any payment order in the funds
    transfer, all of the following apply:

    (1) The acceptance by the beneficiary''s bank is nullified, and no person has
    any right or obligation based on the acceptance.

    (2) The beneficiary''s bank is entitled to recover payment from the beneficiary.

    (3) No payment by the originator to the beneficiary occurs under section 1304.78
    of the Revised Code.

    (4) Subject to division (E) of section 1304.74 of the Revised Code, each sender
    in the funds transfer is excused from its obligation to pay its payment order
    under division (C) of section 1304.74 of the Revised Code because the funds transfer
    has not been completed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.77
- number: '1304.78'
  heading: Payment by originator to beneficiary - discharge of underlying obligation
    - UCC 4A-406
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) Subject to division (E) of section 1304.66 and divisions (D) and (E)
    of section 1304.77 of the Revised Code, the originator of a funds transfer shall
    pay the beneficiary of the originator''s payment order at the time a payment order
    for the benefit of the beneficiary is accepted by the beneficiary''s bank in the
    funds transfer and in an amount equal to the amount of the order accepted by the
    beneficiary''s bank, but not more than the amount of the originator''s order.

    (B)(1) If payment under division (A) of this section is made to satisfy an obligation,
    the obligation is discharged to the same extent discharge would result from payment
    to the beneficiary of the same amount in money, unless all of the following apply:

    (a) The payment under division (A) of this section was made by a means prohibited
    by the contract of the beneficiary with respect to the obligation.

    (b) The beneficiary, within a reasonable time after receiving notice of receipt
    of the order by the beneficiary''s bank, notified the originator of the beneficiary''s
    refusal of the payment.

    (c) Funds with respect to the order were not withdrawn by the beneficiary or applied
    to a debt of the beneficiary.

    (d) The beneficiary would suffer a loss that could reasonably have been avoided
    if payment had been made by a means complying with the contract.

    (2) If payment by the originator does not result in discharge under this section,
    the originator is subrogated to the rights of the beneficiary to receive payment
    from the beneficiary''s bank under division (A) of section 1304.76 of the Revised
    Code.

    (C) For the purpose of determining whether discharge of an obligation occurs under
    division (B) of this section, if the beneficiary''s bank accepts a payment order
    in an amount equal to the amount of the originator''s payment order less charges
    of one or more receiving banks in the funds transfer, payment to the beneficiary
    is deemed to be in the amount of the originator''s order unless, upon demand by
    the beneficiary, the originator does not pay the beneficiary the amount of the
    deducted charges.

    (D) Rights of the originator or of the beneficiary of a funds transfer under this
    section may be varied only by agreement of the originator and the beneficiary.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.78
- number: '1304.79'
  heading: Variation by agreement and effect of funds-transfer system rule - UCC 4A-501
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) "Funds-transfer system rule" means either of the following:

    (1) A rule of an association of banks that governs transmission of payment orders
    by means of a funds-transfer system of the association or rights and obligations
    with respect to those orders;

    (2) A rule of an association of banks to the extent that it governs rights and
    obligations between banks that are parties to a funds transfer in which a federal
    reserve bank, acting as an intermediary bank, sends a payment order to the beneficiary''s
    bank.

    (B) Except as otherwise provided in sections 1304.51 to 1304.85 of the Revised
    Code, the rights and obligations of a party to a funds transfer may be varied
    by agreement of the affected party.

    (C) Except as otherwise provided in sections 1304.51 to 1304.85 of the Revised
    Code, a funds-transfer system rule governing rights and obligations between participating
    banks using the system may be effective even if the rule conflicts with those
    sections and indirectly affects another party to the funds transfer that does
    not consent to the rule. A funds-transfer system rule may also govern rights and
    obligations of parties other than participating banks using the system to the
    extent provided in division (C) of section 1304.76, division (D) of section 1304.77,
    and division (C) of section 1304.85 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.79
- number: '1304.80'
  heading: Creditor process served on receiving bank - setoff by beneficiary's bank
    - UCC 4A-502
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) As used in this section, "creditor process" means levy, attachment, garnishment,
    notice of lien, sequestration, or similar process issued by or on behalf of a
    creditor or other claimant with respect to an account.

    (B) This division applies to creditor process with respect to an authorized account
    of the sender of a payment order if the creditor process is served on the receiving
    bank. For the purpose of determining rights regarding the creditor process, if
    the receiving bank accepts the payment order, the balance in the authorized account
    is deemed to be reduced by the amount of the payment order to the extent the bank
    did not otherwise receive payment of the order, unless the creditor process is
    served at a time and in a manner affording the bank a reasonable opportunity to
    act on it before the bank accepts the payment order.

    (C) If a beneficiary''s bank has received a payment order for payment to the beneficiary''s
    account in the bank, all of the following apply:

    (1) The bank may credit the beneficiary''s account. The amount credited may be
    set off against an obligation owed by the beneficiary to the bank or may be applied
    to satisfy creditor process served on the bank regarding the account.

    (2) The bank may credit the beneficiary''s account and allow withdrawal of the
    amount credited unless creditor process with respect to the account is served
    at a time and in a manner affording the bank a reasonable opportunity to act to
    prevent withdrawal.

    (3) If creditor process regarding the beneficiary''s account has been served and
    the bank has had a reasonable opportunity to act on it, the bank may reject the
    payment order except for a reason unrelated to the service of process.

    (D) Creditor process regarding a payment by the originator to the beneficiary
    pursuant to a funds transfer may be served only on the beneficiary''s bank regarding
    the debt owed by that bank to the beneficiary. Any other bank served with the
    creditor process is not obliged to act regarding the process.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.80
- number: '1304.81'
  heading: Injunction or restraining order with respect to funds transfer - UCC 4A-503
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: For proper cause and in compliance with applicable law, a court may restrain
    a person from issuing a payment order to initiate a funds transfer, an originator's
    bank from executing the payment order of the originator, or the beneficiary's
    bank from releasing funds to the beneficiary or the beneficiary from withdrawing
    the funds. A court may not otherwise restrain a person from issuing a payment
    order, paying or receiving payment of a payment order, or otherwise acting with
    respect to a funds transfer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.81
- number: '1304.82'
  heading: Order in which items and payment orders may be charged to account - order
    of withdrawals from account - UCC 4A-504
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If a receiving bank has received more than one payment order of the sender
    or one or more payment orders and other items that are payable from the sender''s
    account, the bank may charge the sender''s account with respect to the various
    orders and items in any sequence.

    (B) In determining whether a credit to an account has been withdrawn by the holder
    of the account or applied to a debt of the holder of the account, credits first
    made to the account are first withdrawn or applied.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.82
- number: '1304.83'
  heading: Preclusion of objection to debit of customer's account - UCC 4A-505
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: If a receiving bank has received payment from its customer with respect to
    a payment order issued in the name of the customer as sender and accepted by the
    bank, and the customer received notification reasonably identifying the order,
    the customer is precluded from asserting that the bank is not entitled to retain
    the payment unless the customer notifies the bank of the customer's objection
    to the payment within one year after the notification was received by the customer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.83
- number: '1304.84'
  heading: Rate of interest - UCC 4A-506
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) If, under sections 1304.51 to 1304.85 of the Revised Code, a receiving
    bank is obliged to pay interest with respect to a payment order issued to the
    bank, the amount payable may be determined by agreement of the sender and receiving
    bank, or by a funds-transfer system rule if the payment order is transmitted through
    a funds-transfer system.

    (B) If the amount of interest is not determined by an agreement or rule as provided
    in division (A) of this section, the amount is calculated by multiplying the applicable
    federal funds rate by the amount on which interest is payable, and then multiplying
    the product by the number of days for which interest is payable.

    The applicable federal funds rate is the average of the federal funds rates published
    by the federal reserve bank of New York for each of the days for which interest
    is payable, divided by three hundred sixty. The federal funds rate for any day
    on which a published rate is not available is the same as the published rate for
    the next preceding day for which there is a published rate. If a receiving bank
    that accepted a payment order is required to refund payment to the sender of the
    order because the funds transfer was not completed, but the failure to complete
    was not due to any fault by the bank, the interest payable is reduced by a percentage
    equal to the reserve requirement on deposits of the receiving bank.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1304.84
- number: '1304.85'
  heading: Choice of law - UCC 4A-507
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1304'
    name: Bank Deposits And Collections
  text: '(A) All of the following apply unless the affected parties otherwise agree
    or division (C) of this section applies:

    (1) The rights and obligations between the sender of a payment order and the receiving
    bank are governed by the law of the jurisdiction in which the receiving bank is
    located.

    (2) The rights and obligations between the beneficiary''s bank and the beneficiary
    are governed by the law of the jurisdiction in which the beneficiary''s bank is
    located.

    (3) The issue of when payment is made pursuant to a funds transfer by the originator
    to the beneficiary is governed by the law of the jurisdiction in which the beneficiary''s
    bank is located.

    (B) If the parties described in division (A) of this section have made an agreement
    selecting the law of a particular jurisdiction to govern rights and obligations
    between each other, the law of that jurisdiction governs those rights and obligations,
    whether or not the payment order or the funds transfer bears a reasonable relation
    to that jurisdiction.

    (C)(1) A funds-transfer system rule may select the law of a particular jurisdiction
    to govern either of the following:

    (a) The rights and obligations between participating banks regarding payment orders
    transmitted or processed through the system;

    (b) The rights and obligations of some or all parties to a funds transfer any
    part of which is carried out by means of the system.

    (2) A choice of law made pursuant to division (C)(1)(a) of this section is binding
    on participating banks. A choice of law made pursuant to division (C)(1)(b) of
    this section is binding on the originator, other sender, or a receiving bank having
    notice that the funds-transfer system might be used in the funds transfer and
    of the choice of law by the system when the originator, other sender, or receiving
    bank issued or accepted a payment order. The beneficiary of a funds transfer is
    bound by the choice of law if, when the funds transfer is initiated, the beneficiary
    has notice that the funds-transfer system might be used in the funds transfer
    and of the choice of law by the system. The law of a jurisdiction selected pursuant
    to division (C)(1) of this section may govern, whether or not that law bears a
    reasonable relation to the matter in issue.

    (D) In the event of inconsistency between an agreement under division (B) of this
    section and a choice-of-law rule under division (C) of this section, the agreement
    under division (B) of this section prevails.

    (E) If a funds transfer is made by use of more than one funds-transfer system
    and there is inconsistency between choice-of-law rules of the systems, the matter
    in issue is governed by the law of the selected jurisdiction that has the most
    significant relationship to the matter in issue.'
