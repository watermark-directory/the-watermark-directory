- number: '1349.17'
  heading: Restricting recording credit card, telephone or social security numbers
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) No person shall record or cause to be recorded either of the following:

    (1) A credit card account number of the other party to a transaction, when a check,
    bill of exchange, or other draft is presented for payment;

    (2) The telephone number or social security account number of the other party
    to a transaction, when payment is made by credit card charge agreement, check,
    bill of exchange, or other draft.

    (B) Division (A) of this section does not apply to a transaction, if all of the
    following conditions are met:

    (1) The credit card account number, social security account number, or telephone
    number is recorded for a legitimate business purpose, including collection purposes.

    (2) The other party to the transaction consents to the recording of the credit
    card account number, social security account number, or telephone number.

    (3) The credit card account number, social security account number, or telephone
    number that is recorded during the course of the transaction is not disclosed
    to any third party for any purposes other than collection purposes and is not
    used to market goods or services unrelated to the goods or services purchased
    in the transaction.

    (C) Nothing in this section prohibits the recording of the number of a credit
    card account when given in lieu of a deposit to secure payment in the event of
    default, loss, damage, or other occurrence, or requires a person to accept a check
    presented for payment, if the other party to the transaction refuses to consent
    to the recording of the number of the party''s social security account or license
    to operate a motor vehicle.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.17
- number: '1349.18'
  heading: Printing credit card number and expiration date on receipt
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) No person or limited liability company that accepts credit cards for
    the transaction of business shall print more than the last five digits of the
    credit card account number, or print the expiration date of a credit card, on
    any receipt provided to the cardholder.

    (B) This section applies only to receipts that are electronically printed and
    does not apply to any transaction in which the sole means of recording the cardholder''s
    credit card account number is by handwriting or by an imprint or copy of the credit
    card.

    (C) A violation of this section is deemed an unfair or deceptive act or practice
    in violation of section 1345.02 of the Revised Code. A person injured by a violation
    of this section has a cause of action and is entitled to the same relief available
    to a consumer under section 1345.09 of the Revised Code, and all powers and remedies
    available to the attorney general to enforce sections 1345.01 to 1345.13 of the
    Revised Code are available to the attorney general to enforce this section.

    (D) As used in this section, "credit card" includes, but is not limited to, a
    credit card, charge card, debit card, or other card, code, device, or other means
    of access to a customer''s account for the purpose of obtaining money, property,
    labor, or services on credit, or for initiating an electronic fund transfer at
    a point-of-sale terminal, an automated teller machine, or a cash dispensing machine.'
