  url: https://codes.ohio.gov/ohio-revised-code/section-1305.14
- number: '1305.15'
  heading: Choice of law and forum - UCC 5-116
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) The liability of an issuer, nominated person, or adviser for action or
    omission is governed by the law of the jurisdiction chosen by an agreement in
    the form of a record signed or otherwise authenticated by the affected parties
    in the manner provided in section 1305.03 of the Revised Code or by a provision
    in the person''s letter of credit, confirmation, or other undertaking. The jurisdiction
    whose law is chosen need not bear any relation to the transaction.

    (B) Unless division (A) of this section applies, the liability of an issuer, nominated
    person, or adviser for action or omission is governed by the law of the jurisdiction
    in which the person is located. The person is considered to be located at the
    address indicated in the person''s undertaking. If more than one address is indicated,
    the person is considered to be located at the address from which the person''s
    undertaking was issued. For the purpose of jurisdiction, choice of law, and recognition
    of interbranch letters of credit, but not enforcement of a judgment, all branches
    of a bank are considered separate juridical entities and a bank is considered
    to be located at the place where its relevant branch is considered to be located
    under this division.

    (C) Except as otherwise provided in this division, the liability of an issuer,
    nominated person, or adviser is governed by any rules of custom or practice, such
    as the uniform customs and practice for documentary credits, to which the letter
    of credit, confirmation, or other undertaking is expressly made subject. If (1)
    this chapter would govern the liability of an issuer, nominated person, or adviser
    under division (A) or (B) of this section, (2) the relevant undertaking incorporates
    rules of custom or practice, and (3) there is conflict between this chapter and
    those rules as applied to that undertaking, those rules govern except to the extent
    of any conflict with the nonvariable provisions specified in division (C) of section
    1305.02 of the Revised Code.

    (D) If there is conflict between this chapter and Chapter 1303., 1304., or 1309.
    of the Revised Code, this chapter governs.

    (E) The forum for settling disputes arising out of an undertaking within this
    chapter may be chosen in the manner and with the binding effect that governing
    law may be chosen in accordance with division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.15
- number: '1305.16'
  heading: Subrogation of issuer, applicant, and nominated person - UCC 5-117
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) An issuer that honors a beneficiary''s presentation is subrogated to
    the rights of the beneficiary to the same extent as if the issuer were a secondary
    obligor of the underlying obligation owed to the beneficiary and of the applicant
    to the same extent as if the issuer were the secondary obligor of the underlying
    obligation owed to the applicant.

    (B) An applicant that reimburses an issuer is subrogated to the rights of the
    issuer against any beneficiary, presenter, or nominated person to the same extent
    as if the applicant were the secondary obligor of the obligations owed to the
    issuer and has the rights of subrogation of the issuer to the rights of the beneficiary
    stated in division (A) of this section.

    (C) A nominated person who pays or gives value against a draft or demand presented
    under a letter of credit is subrogated to the rights of:

    (1) The issuer against the applicant to the same extent as if the nominated person
    were a secondary obligor of the obligation owed to the issuer by the applicant;

    (2) The beneficiary to the same extent as if the issuer were a secondary obligor
    of the underlying obligation owed to the beneficiary; and

    (3) The applicant to the same extent as if the nominated person were the secondary
    obligor of the underlying obligation owed to the applicant.

    (D) Notwithstanding any agreement or term to the contrary, the rights of subrogation
    stated in divisions (A) and (B) of this section do not arise until the issuer
    honors the letter of credit or otherwise pays and the rights in division (C) of
    this section do not arise until the nominated person pays or otherwise gives value.
    Until then, the issuer, nominated person, and the applicant do not derive under
    this section present or prospective rights forming the basis of a claim, defense,
    or excuse.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1305.16
- number: '1305.18'
  heading: Security interest of issuer or nominated person - UCC 5-118
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1305'
    name: Letters Of Credit
  text: '(A) An issuer or nominated person has a security interest in a document presented
    under a letter of credit to the extent that the issuer or nominated person honors
    or gives value for the presentation.

    (B) So long as and to the extent that an issuer or nominated person has not been
    reimbursed or has not otherwise recovered the value given with respect to a security
    interest in a document under division (A) of this section, the security interest
    continues and is subject to Chapter 1309. of the Revised Code, but:

    (1) A security agreement is not necessary to make the security interest enforceable
    under division (B)(3) of section 1309.203 of the Revised Code;

    (2) If the document is presented in a medium other than a written or other tangible
    medium, the security interest is perfected; and

    (3) If the document is presented in a written or other tangible medium and is
    not a certificated security, chattel paper, a document of title, an instrument,
    or a letter of credit, the security interest is perfected and has priority over
    a conflicting security interest in the document so long as the debtor does not
    have possession of the document.'
