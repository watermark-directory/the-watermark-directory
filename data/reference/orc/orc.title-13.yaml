- number: '1349.101'
  heading: Internet age verification - civil action
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) The attorney general may bring a civil action against an organization
    that sells, delivers, furnishes, disseminates, provides, exhibits, or presents
    any material or performance that is obscene or harmful to juveniles on the internet
    that fails to comply with the requirements under divisions (B)(1) or (2) or (C)(1)
    or (2) of section 1349.10 of the Revised Code and as a result of that failure
    a minor gains access to the material or performance. Before initiating such an
    enforcement action, the attorney general shall provide written notice to the organization
    identifying and explaining the basis for each instance of alleged violation.

    (B) Except as otherwise provided in division (D) of this section, the attorney
    general shall not commence an enforcement action if the organization, within forty-five
    days after notice of the alleged violation is sent, does both of the following:

    (1) Cures all violations described in the notice :

    (2) Provides the attorney general with a written statement indicating that the
    violations are cured and agreeing to refrain from further noncompliance of the
    requirements under divisions (B)(1) or (2) or (C)(1) or (2) of section 1349.10
    of the Revised Code.

    (C) If the organization does not timely respond or continues to fail to comply
    with the requirements under divisions (B)(1) or (2) or (C)(1) or (2) of section
    1349.10 of the Revised Code after receiving the notice, the attorney general may
    initiate the enforcement action and seek injunctive relief.

    (D) Division (B) of this section does not apply if the organization fails to timely
    comply with all of the requirements described in the notice or commits subsequent
    violations of the same type after curing the initial violation under that division.
    Notwithstanding division (C) of this section, if an organization commits a subsequent
    violation of the same type after reporting that the initial violation is cured,
    the attorney general may bring a civil action at any time after sending notice
    of the violation under division (A) of this section.

    (E) Nothing in this section shall be construed to provide a private right of action.
    The attorney general has the exclusive authority to enforce this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.101
- number: '1349.11'
  heading: Lending institution may not require use or employment of affiliated real
    estate broker
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1349'
    name: Consumer Protection
  text: '(A) No lending institution, as defined in section 175.01 of the Revised Code,
    that is affiliated with or authorized to be affiliated with a real estate broker
    and that provides real estate brokerage services to third parties shall fix or
    vary the terms and conditions on a mortgage loan or the granting of a mortgage
    loan on the condition or requirement that the customer of the lending institution
    use or employ the services of the affiliated real estate broker.

    (B) A lending institution, service corporation, or any person engaged in providing
    real estate brokerage services to third parties at all times shall be identified
    as separate and distinct from any lending institution with which it is affiliated
    or associated and shall hold itself out as separate and distinct by doing both
    of the following:

    (1) Providing full and complete disclosure in writing of its relationship with
    the lending institution to persons who employ it to provide real estate brokerage
    services;

    (2) Separately identifying any office space it uses in any building also used
    by the lending institution.

    (C) No service corporation, real estate broker, or person associated with a lending
    institution shall represent to the public or to any person employing the corporation,
    real estate broker, or person to provide real estate brokerage services that the
    lending institution offers different terms and conditions on mortgage loans to
    those who employ the corporation, real estate broker, or person for real estate
    brokerage services than to persons who do not so employ the corporation, real
    estate broker, or person.

    (D) This section does not apply to real estate owned by lending institutions.

    (E) Subject to division (F) of this section, the director of commerce and appropriate
    division superintendents within the department of commerce shall enforce this
    section.

    (F)(1)(a) The superintendent of real estate shall enforce and administer this
    section insofar as it relates to persons licensed as real estate brokers pursuant
    to Chapter 4735. of the Revised Code. In that enforcement and administration,
    the superintendent possesses and may use the authority conferred by that chapter.

    (b) The director of commerce and the superintendent of any division within the
    department of commerce that has jurisdiction over a particular lending institution
    shall enforce and administer this section insofar as it relates to that lending
    institution. The superintendent of real estate shall not enforce and administer
    this section insofar as it relates to any lending institution.

    (2) Any licensed real estate broker subject to division (B) or (C) of this section
    who fails to comply with either division is guilty of misconduct for purposes
    of division (A)(6) of section 4735.18 of the Revised Code.'
