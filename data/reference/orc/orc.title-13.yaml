- number: '1309.201'
  heading: General effectiveness of security agreement - UCC 9-201
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in Chapters 1301., 1302., 1303., 1304.,
    1305., 1307., 1308., 1309., and 1310. of the Revised Code, a security agreement
    is effective according to its terms between the parties, against purchasers of
    the collateral, and against creditors.

    (B) A transaction, although subject to this chapter, is also subject to any applicable
    law that establishes a different rule for consumers and to Chapter 1317., sections
    1321.01 to 1321.33 and divisions (A), (B), and (C) of section 1321.99 of the Revised
    Code.

    (C) In the event of conflict between the provisions of this chapter and the provisions
    of sections 1317.01 to 1317.99, 1321.01 to 1321.33, and divisions (A), (B), and
    (C) of section 1321.99 of the Revised Code, the provisions of sections 1317.01
    to 1317.99, 1321.01 to 1321.33, and divisions (A), (B), and (C) of section 1321.99
    of the Revised Code shall prevail. Failure to comply with those provisions has
    only the effect provided in those provisions.

    (D) This article does not:

    (1) Validate any rate, charge, agreement, or practice that violates a rule of
    law, statute, or regulation described in division (B) of this section; or

    (2) Extend the application of the rule of law, statute, or regulation to a transaction
    not otherwise subject to it.'
