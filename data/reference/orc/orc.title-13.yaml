- number: '1309.603'
  heading: Agreement on standards concerning rights and duties - UCC 9-603
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) The parties may determine by agreement the standards measuring the fulfillment
    of the rights of a debtor or obligor and the duties of a secured party under section
    1309.602 of the Revised Code if the standards are not manifestly unreasonable.

    (B) Division (A) of this section does not apply to the duty imposed under section
    1309.609 of the Revised Code to refrain from breaching the peace.'
  history: null
