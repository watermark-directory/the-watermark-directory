- number: '1313.56'
  heading: Appointment of receiver
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: A sale, conveyance, transfer, mortgage, or assignment, made in trust or otherwise
    by a debtor, and every judgment suffered by him against himself in contemplation
    of insolvency and with a design to prefer one or more creditors to the exclusion
    in whole or in part of others, and a sale, conveyance, transfer, mortgage, or
    assignment made, or judgment procured by him to be rendered, in any manner, with
    intent to hinder, delay, or defraud creditors, is void as to creditors of such
    debtor at the suit of any creditor. In a suit brought by a creditor of such debtor
    for the purpose of declaring such sale void, a receiver may be appointed who shall
    take charge of all the assets of such debtor, including the property so sold,
    conveyed, transferred, mortgaged, or assigned, and also administer all the assets
    of the debtor for the equal benefit of the creditors of the debtor in proportion
    to the amount of their respective demands, including those which are unmatured.
