- number: '1331.99'
  heading: Violation; penalty
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1331'
    name: Monopolies
  text: '(A) (1) Whoever violates section 1331.04 of the Revised Code is guilty of
    conspiracy against trade. Except as provided in division (A)(2) of this section,
    a conspiracy against trade is a felony of the fifth degree.

    (2) If any of the following conditions apply, the conspiracy against trade is
    a felony of the fourth degree:

    (a) The amount of the contract or the amount of the sale of commodities or services
    involved is seven thousand five hundred dollars or more.

    (b) The conspiracy against trade relates to a contract with or the sale of commodities
    or services to or from a local, state, or federal governmental entity.

    (c) The contract or sale of commodities or services involves, in whole or in part,
    funding to or from a local, state, or federal governmental entity.

    (B) Whoever violates section 1331.02 of the Revised Code is guilty of a felony
    of the fifth degree.

    (C) Whoever violates division (L) of section 1331.16 of the Revised Code is guilty
    of a misdemeanor of the first degree.

    (D) Whoever violates section 1331.15 of the Revised Code is guilty of a misdemeanor
    of the second degree.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1331.99
- number: '1332.01'
  heading: Fair competition in cable operations definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: 'As used in sections 1332.01 to 1332.10 of the Revised Code:

    (A) "Applicable generally accepted accounting principles" means accounting principles
    and standards set forth in all applicable pronouncements of the governmental accounting
    standards board.

    (B) "Cable service," "cable system," "franchise," and "franchising authority"
    have the same meanings as in the "Telecommunications Act of 1996," Pub. L. No.
    104-104, Title III, Sections 301(a) and 302 (b)(2), 110 Stat. 114, 124, 47 U.S.C.A.
    522.

    (C) "Cable service provider" means any person or group of persons that is engaged
    in the provision of cable service over a cable system and directly or indirectly
    owns a significant interest in the cable system, or that through any arrangement
    otherwise controls or is responsible for the management and operation of the cable
    system.

    (D) "Color of office," "public office," and "public official" have the same meanings
    as in section 117.01 of the Revised Code.

    (E) "Direct costs" means all costs, whether capital costs, operating costs, or
    otherwise, that would be eliminated if the service or function to which they relate
    were discontinued.

    (F) "Full cost accounting" means, in accordance with applicable generally accepted
    accounting principles, accounting for all direct and indirect costs, including
    capital costs, that are incurred in the ownership, management, or operation of
    a cable system or provision of cable service over a cable system.

    (G) "Indirect costs" means all costs, whether capital costs, operating costs,
    or otherwise, that are not direct costs. Indirect costs that support multiple
    services or functions shall be allocated among those services and functions in
    proportion to the relative burden each service or function places on the cost
    category and by any reasonable method consistent with applicable generally accepted
    accounting principles.

    (H) "Person" includes any individual, corporation, partnership, limited liability
    company, association, trust, or political subdivision.

    (I) "Private cable service provider" means any cable service provider other than
    a public cable service provider.

    (J) "Private cable service regulation" means any regulation, rule, requirement,
    or restriction of or by a political subdivision of this state that applies, by
    resolution, ordinance, rule, regulation, franchising agreement, or otherwise,
    to the terms and conditions of service, conditions of access to public property,
    permits for pole attachments, or any other matter concerning or affecting the
    provision of cable service over a cable system by a private cable service provider.

    (K) "Public cable service provider" means any cable service provider that is a
    political subdivision of this state.

    (L) "Public cable service recipient" means any household or business that receives
    cable service or benefits from video programming service, transmission service,
    distribution service, repair service, billing service, or customer service that
    is provided by, originates from, or is controlled by a public cable service provider
    of a political subdivision.

    (M) "Public money" means any of the following:

    (1) Any money received, collected by, or due a public official under color of
    office;

    (2) Any money collected by any person on behalf of a public office or as a purported
    representative or agent of the public office;

    (3) Any money received by any person, whether directly or indirectly, from the
    United States, this state, a county, municipal corporation, township, or any other
    public office for the purpose of performing or assisting with a governmental function
    or program authorized by or the responsibility of the United States, this state,
    a county, municipal corporation, township, or any other public office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1332.01
- number: '1332.02'
  heading: Fair competition in cable service operations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: 'It is the public policy of this state under sections 1332.01 to 1332.10 of
    the Revised Code to:

    (A) Ensure fair competition in the provision in this state of cable service over
    a cable system, consistent with the procompetitive policies of the "Telecommunications
    Act of 1996," Pub. L. No. 104-104, 110 Stat. 56, 47 U.S.C.A. 151, for the purposes
    of providing the widest possible diversity of entertainment, information, and
    news sources to the general public; advancing the unfettered exercise of rights
    under the first amendment to the United States Constitution to free speech and
    the free flow of information; enhancing the development and widespread use of
    technological advances in the provision of cable service over a cable system;
    and encouraging improved customer service at competitive rates;

    (B) Ensure that all cable service over a cable system is provided in this state
    within a comprehensive and nondiscriminatory federal, state, and local scheme.'
