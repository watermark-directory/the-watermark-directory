- number: '1337.14'
  heading: Revocation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) A principal who creates a valid durable power of attorney for health
    care may revoke that instrument or the designation of the attorney in fact under
    it.

    The principal may so revoke at any time and in any manner. The revocation shall
    be effective when the principal expresses an intention to so revoke, except that,
    if the principal made the principal''s attending physician aware of the durable
    power of attorney for health care, the revocation shall be effective upon its
    communication to the attending physician by the principal, a witness to the revocation,
    or other health care personnel to whom the revocation is communicated by such
    a witness. Absent actual knowledge to the contrary, the attending physician of
    the principal and other health care personnel who are informed of the revocation
    of a durable power of attorney for health care by an alleged witness may rely
    on the information and act in accordance with the revocation.

    (B) Upon the communication as described in division (A) of this section to the
    attending physician of a principal of the fact that the principal''s durable power
    of attorney for health care has been revoked, the attending physician or other
    health care personnel acting under the direction of the attending physician shall
    make the fact a part of the principal''s medical record.

    (C) Unless the instrument provides otherwise, a valid durable power of attorney
    for health care revokes a prior, valid durable power of attorney for health care.

    (D) Regardless of when the declaration is drafted, the execution of a declaration
    for mental health treatment does not revoke a valid durable power of attorney
    for health care. A declaration for mental health treatment executed in accordance
    with Chapter 2135. of the Revised Code supersedes a valid durable power of attorney
    for health care with regard to mental health treatment and the designation of
    a proxy to make decisions regarding mental health treatment.'
