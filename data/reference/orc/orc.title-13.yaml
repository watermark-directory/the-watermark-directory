- number: '1301.108'
  heading: Relation to Electronic Signatures in Global and National Commerce Act -
    UCC 1-108
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Relation to Electronic Signatures in Global and National Commerce Act [UCC
    1-108]

    This chapter modifies, limits, and supersedes the federal "Electronic Signatures
    in Global and National Commerce Act," 15 U.S.C. section 7001 et seq., except that
    nothing in this chapter modifies, limits, or supersedes section 7001(c) of that
    act or authorizes electronic delivery of any of the notices described in section
    7003(b) of that act.'
