- number: '1306.01'
  heading: Definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1306'
    name: Uniform Electronic Transactions Act
  text: 'As used in sections 1306.01 to 1306.23 of the Revised Code:

    (A) "Agreement" means the bargain of the parties in fact, as found in their language
    or inferred from other circumstances and from rules, regulations, and procedures
    given the effect of agreements under laws otherwise applicable to a particular
    transaction.

    (B) "Automated transaction" means a transaction conducted or performed, in whole
    or in part, by electronic means or electronic records, in which the acts or records
    of one or both parties are not reviewed by an individual in the ordinary course
    in forming a contract, performing under an existing contract, or fulfilling an
    obligation required by the transaction.

    (C) "Computer program" means a set of statements or instructions to be used directly
    or indirectly in an information processing system in order to bring about a certain
    result.

    (D) "Contract" means the total legal obligation resulting from the parties'' agreement
    as affected by sections 1306.01 to 1306.23 of the Revised Code and other applicable
    law.

    (E) "Electronic" means relating to technology having electrical, digital, magnetic,
    wireless, optical, electromagnetic, or similar capabilities.

    (F) "Electronic agent" means a computer program or an electronic or other automated
    means used independently to initiate an action or respond to electronic records
    or performances in whole or in part, without review or action by an individual.

    (G) "Electronic record" means a record created, generated, sent, communicated,
    received, or stored by electronic means. A record or contract that is secured
    through blockchain technology is considered to be in an electronic form and to
    be an electronic record.

    (H) "Electronic signature" means an electronic sound, symbol, or process attached
    to or logically associated with a record and executed or adopted by a person with
    the intent to sign the record. A signature that is secured through blockchain
    technology is considered to be in an electronic form and to be an electronic signature.

    (I) "Governmental agency" means any executive, legislative, or judicial agency,
    department, board, commission, authority, institution, or instrumentality of the
    federal government, of a state, or of a county, municipality, or other political
    subdivision of a state.

    (J) "Information" means data, text, images, sounds, codes, computer programs,
    software, databases, or the like.

    (K) "Information processing system" means an electronic system for creating, generating,
    sending, receiving, storing, displaying, or processing information.

    (L) "Person" means an individual, corporation, business trust, estate, trust,
    partnership, limited liability company, association, joint venture, governmental
    agency, public corporation, or any other legal or commercial entity.

    (M) "Record" means information that is inscribed on a tangible medium or that
    is stored in an electronic or other medium and is retrievable in perceivable form.

    (N) "Security procedure" means a procedure employed for the purpose of verifying
    that an electronic signature, record, or performance is that of a specific person
    or for detecting changes or errors in the information in an electronic record.
    "Security procedure" includes a procedure that requires the use of algorithms
    or other codes, identifying word or numbers, encryption, or callback or other
    acknowledgment procedures.

    (O) "State" means a state of the United States, the District of Columbia, Puerto
    Rico, the United States Virgin Islands, or any territory or insular possession
    subject to the jurisdiction of the United States. "State" includes an Indian tribe
    or band, or Alaskan Native village, that is recognized by federal law or formally
    acknowledged by a state.

    (P) "Transaction" means an action or set of actions occurring between two or more
    persons relating to the conduct of business, commercial, or governmental affairs.'
