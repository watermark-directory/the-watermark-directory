- number: '1327.46'
  heading: Standard provisions definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: 'As used in sections 1327.46 to 1327.61 of the Revised Code:

    (A) "Weights and measures" means all weights and measures of every kind, instruments
    and devices for weighing and measuring, and any appliances and accessories associated
    with any such instruments and devices, except that "weights and measures" shall
    not be construed to include meters for the measurement of electricity, gas, whether
    natural or manufactured, or water when the same are operated in a public utility
    system. Such electricity, gas, and water meters, and appliances or accessories
    associated therewith, are specifically excluded from the purview of the weights
    and measures laws.

    (B) "Intrastate commerce" means all commerce or trade that is begun, carried on,
    and completed wholly within the limits of this state, and "introduced into intrastate
    commerce" defines the time and place in which the first sale and delivery of a
    commodity is made within the state, the delivery being made either directly to
    the purchaser or to a common carrier for shipment to the purchaser.

    (C) "Package" means any commodity put up or packaged in any manner in advance
    of sale in units suitable for either wholesale or retail sale.

    (D) "Consumer package" means a package that is customarily produced or distributed
    for sale through a retail sales agency for consumption by an individual or use
    by an individual.

    (E) "Weight" as used in connection with any commodity means net weight.

    (F) "Correct" as used in connection with weights and measures means conformity
    with all applicable requirements of sections 1327.46 to 1327.61 of the Revised
    Code and rules adopted pursuant to those sections.

    (G) "Reference standards" means the physical standards of the state that serve
    as the legal reference from which all other standards and weights and measures
    are derived.

    (H) "Working standards" means the physical standards that are traceable to the
    reference standards through comparisons, using acceptable laboratory procedures,
    and used in the enforcement of weights and measures laws and rules.

    (I) "Sale from bulk" means the sale of commodities when the quantity is determined
    at the time of sale.

    (J) "Net weight" means the weight of a commodity, excluding any materials, substances,
    or items not considered to be a part of the commodity. Materials, substances,
    or items not considered to be part of the commodity include, but are not limited
    to, containers, conveyances, bags, wrappers, packaging materials, labels, individual
    piece coverings, decorative accompaniments, and coupons.

    (K) "Random weight package" means a package that is one of a lot, shipment, or
    delivery of packages of the same commodity with no fixed pattern of weights.

    (L) "Sold" includes keeping, offering, or exposing for sale.

    (M) "Commercially used weighing and measuring device" means a device described
    in the national institute of standards and technology handbook 44 or its supplements
    and revisions and any other weighing and measuring device designated by rules
    adopted under division (C) of section 1327.50 of the Revised Code. "Commercially
    used weighing and measuring device" includes, but is not limited to, a livestock
    scale, vehicle scale, railway scale, vehicle tank meter, bulk rack meter, and
    LPG meter.

    (N) "Livestock scale" means a scale equipped with stock racks and gates that is
    adapted to weighing livestock standing on the scale platform.

    (O) "Vehicle scale" means a scale that is adapted to weighing highway, farm, or
    other large industrial vehicles other than railroad cars.

    (P) "Railway scale" means a rail scale that is designed to weigh railroad cars.

    (Q) "Vehicle tank meter" means a vehicle mounted device that is designed for the
    measurement and delivery of liquid products from a tank.

    (R) "Bulk rack meter" means a wholesale device, usually mounted on a rack, that
    is designed for the measurement and delivery of liquid products.

    (S) "LPG meter" means a system, including a mechanism or machine of the meter
    type, that is designed to measure and deliver liquefied petroleum gas in the liquid
    state by a definite quantity whether installed in a permanent location or mounted
    on a vehicle.

    (T) "Service person" means an individual who installs, services, repairs, reconditions,
    or places into service a commercially used weighing and measuring device for any
    type of compensation.'
