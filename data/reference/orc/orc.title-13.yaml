    num: '1310'
    name: Leases
  text: '(A) A lessee may revoke acceptance of a lot or commercial unit whose nonconformity
    substantially impairs its value to the lessee if either of the following applies:

    (1) Except in the case of a finance lease, the lessee has accepted it on the reasonable
    assumption that its nonconformity would be cured, and it has not been seasonably
    cured.

    (2) The lessee has accepted it without discovery of the nonconformity, if the
    lessee''s acceptance was reasonably induced either by the lessor''s assurances
    or, except in the case of a finance lease, by the difficulty of discovery before
    acceptance.

    (B) Except in the case of a finance lease that is not a consumer lease, a lessee
    may revoke acceptance of a lot or commercial unit if the lessor defaults under
    the lease contract and the default substantially impairs the value of that lot
    or commercial unit to the lessee.

    (C) If the lease agreement so provides, the lessee may revoke acceptance of a
    lot or commercial unit because of other defaults by the lessor.

    (D) Revocation of acceptance shall occur within a reasonable time after the lessee
    discovers or should have discovered the ground for it and before any substantial
    change in the condition of the goods that is not caused by the nonconformity.
    Revocation is not effective until the lessee notifies the lessor.

    (E) A lessee who so revokes has the same rights and duties with regard to the
    goods involved as if the lessee had rejected them.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.63
- number: '1310.64'
  heading: Cover - substitute goods - UCC 2A-518
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) After a default of the type described in division (A) of section 1310.54
    of the Revised Code by a lessor under a lease contract, the lessee may cover by
    making any purchase or lease of or contract to purchase or lease goods in substitution
    for those due from the lessor.

    (B) Except as otherwise provided in section 1310.50 of the Revised Code with respect
    to damages liquidated in the lease agreement or otherwise determined pursuant
    to agreement of the parties as provided in section 1301.302 and in section 1310.49
    of the Revised Code, if a lessee''s cover is by a lease agreement substantially
    similar to the original lease agreement and the new lease agreement is made in
    good faith and in a commercially reasonable manner, the lessee may recover from
    the lessor as damages both of the following:

    (1) The present value, as of the date of the commencement of the term of the new
    lease agreement, of the rent under the new lease agreement applicable to that
    period of the new lease term that is comparable to the then remaining term of
    the original lease agreement minus the present value, as of the same date, of
    the total rent for the then remaining lease term of the original lease agreement;

    (2) Any incidental or consequential damages, less expenses saved in consequence
    of the lessor''s default.

    (C) If a lessee''s cover is by a lease agreement that for any reason does not
    qualify for treatment under division (B) of this section or is by purchase or
    otherwise, the lessee may recover from the lessor as if the lessee had elected
    not to cover and section 1310.65 of the Revised Code governs.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.64
- number: '1310.65'
  heading: Lessee's damages for non-delivery, repudiation, default and breach of warranty
    in regard to accepted goods - UCC 2A-519
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Except as otherwise provided in section 1310.50 of the Revised Code with
    respect to damages liquidated in the lease agreement or as otherwise determined
    pursuant to the agreement of the parties as provided in section 1301.302 and section
    1310.49 of the Revised Code, if a lessee elects not to cover or a lessee elects
    to cover and the cover is by lease agreement that for any reason does not qualify
    for treatment under division (B) of section 1310.64 of the Revised Code or is
    by purchase or otherwise, the measure of damages for nondelivery or repudiation
    by the lessor or for rejection or revocation of acceptance by the lessee is the
    present value, as of the date of the default, of the then market rent minus the
    present value, as of the same date, of the original rent, computed for the remaining
    lease term of the original lease agreement, together with incidental and consequential
    damages, less expenses saved in consequence of the lessor''s default.

    (B) Market rent is to be determined as of the place for tender or, in cases of
    rejection after arrival or revocation of acceptance, as of the place of arrival.

    (C) Except as otherwise agreed, if the lessee has accepted goods and given notification
    as provided in division (C) of section 1310.62 of the Revised Code, the measure
    of damages for nonconforming tender or delivery or other default by a lessor is
    the loss resulting in the ordinary course of events from the lessor''s default
    as determined in any manner that is reasonable, together with incidental and consequential
    damages, less expenses saved in consequence of the lessor''s default.

    (D) Except as otherwise agreed, the measure of damages for breach of warranty
    is the present value, at the time and place of acceptance, of the difference between
    the value of the use of the goods accepted and that value if they had been as
    warranted for the lease term, unless special circumstances show proximate damages
    of a different amount, together with incidental and consequential damages, less
    expenses saved in consequence of the lessor''s default or breach of warranty.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.65
- number: '1310.66'
  heading: Lessee's incidental and consequential damages - UCC 2A-520
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Incidental damages resulting from a lessor''s default include expenses
    reasonably incurred in inspection, receipt, transportation, and care and custody
    of goods rightfully rejected or goods the acceptance of which is justifiably revoked,
    any commercially reasonable charges, expenses, or commissions in connection with
    effecting cover, and any other reasonable expense incident to the default.

    (B) Consequential damages resulting from a lessor''s default include both of the
    following:

    (1) Any loss resulting from general or particular requirements and needs of which
    the lessor at the time of contracting had reason to know and that could not reasonably
    be prevented by cover or otherwise;

    (2) Injury to person or property proximately resulting from any breach of warranty.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.66
- number: '1310.67'
  heading: Lessee's right to specific performance or replevin - UCC 2A-521
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Specific performance may be decreed if the goods are unique or in other
    proper circumstances.

    (B) A decree for specific performance may include any terms and conditions as
    to payment of the rent, damages, or other relief that the court deems just.

    (C) A lessee has a right of replevin, detinue, sequestration, claim and delivery,
    or the like for goods identified to the lease contract if, after reasonable effort,
    the lessee is unable to effect cover for those goods or the circumstances reasonably
    indicate that the effort will be unavailing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.67
- number: '1310.68'
  heading: Lessee's right to goods on lessor's insolvency - UCC 2A-522
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Subject to division (B) of this section and even though the goods have
    not been shipped, a lessee who has paid a part or all of the rent and security
    for goods identified to a lease contract as provided in section 1310.24 of the
    Revised Code, on making and keeping good a tender of any unpaid portion of the
    rent and security due under the lease contract, may recover the goods identified
    from the lessor if the lessor becomes insolvent within ten days after receipt
    of the first installment of rent and security.

    (B) A lessee acquires the right to recover goods identified to a lease contract
    only if they conform to the lease contract.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.68
- number: '1310.69'
  heading: Lessor's remedies - (UCC 2A-523)
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If a lessee wrongfully rejects or revokes acceptance of goods, fails
    to make a payment when due, or repudiates with respect to a part or the whole,
    then, with respect to any goods involved and with respect to all of the goods
    if under an installment lease contract the value of the whole lease contract is
    substantially impaired as provided in section 1310.56 of the Revised Code, the
    lessee is in default under the lease contract, and the lessor may do one or more
    of the following:

    (1) Cancel the lease contract as provided in division (A) of section 1310.51 of
    the Revised Code;

    (2) Proceed respecting goods not identified to the lease contract as provided
    in section 1310.70 of the Revised Code;

    (3) Withhold delivery of the goods and take possession of goods previously delivered
    as provided in section 1310.71 of the Revised Code;

    (4) Stop delivery of the goods by any bailee as provided in section 1310.72 of
    the Revised Code;

    (5) Dispose of the goods and recover damages as provided in section 1310.73 of
    the Revised Code, retain the goods and recover damages as provided in section
    1310.74 of the Revised Code, or in a proper case recover rent as provided in section
    1310.75 of the Revised Code;

    (6) Exercise any other rights or pursue any other remedies provided in the lease
    contract.

    (B) If a lessor does not fully exercise a right or obtain a remedy to which the
    lessor is entitled under division (A) of this section, the lessor may recover
    the loss resulting in the ordinary course of events from the lessee''s default
    as determined in any reasonable manner, together with incidental damages, less
    expenses saved in consequence of the lessee''s default.

    (C) If a lessee is otherwise in default under a lease contract, the lessor may
    exercise the rights and pursue the remedies provided in the lease contract, which
    may include a right to cancel the lease. In addition, unless otherwise provided
    in the lease contract, either of the following applies:

    (1) If the default substantially impairs the value of the lease contract to the
    lessor, the lessor may exercise the rights and pursue the remedies provided in
    division (A) or (B) of this section.

    (2) If the default does not substantially impair the value of the lease contract
    to the lessor, the lessor may recover as provided in division (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.69
- number: '1310.70'
  heading: Lessor's right to identify goods to lease contract - UCC 2A-524
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) After default by the lessee under a lease contract of the type described
    in division (A) or (C)(1) of section 1310.69 of the Revised Code or, if agreed,
    after other default by the lessee, the lessor may do both of the following:

    (1) Identify to the lease contract conforming goods not already identified if,
    at the time the lessor learned of the default, they were in the lessor''s or the
    supplier''s possession or control.

    (2) Dispose of goods, as provided in division (A) of section 1310.73 of the Revised
    Code, that demonstrably have been intended for the particular lease contract even
    though those goods are unfinished.

    (B) If the goods are unfinished, in the exercise of reasonable commercial judgment
    for the purposes of avoiding loss and of effective realization, an aggrieved lessor
    or the supplier may complete manufacture and wholly identify the goods to the
    lease contract, cease manufacture and lease, sell, or otherwise dispose of the
    goods for scrap or salvage value, or proceed in any other reasonable manner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.70
- number: '1310.71'
  heading: Lessor's right to possession of goods - UCC 2A-525
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If a lessor discovers the lessee to be insolvent, the lessor may refuse
    to deliver the goods.

    (B) After a default of the type described in division (A) or (C)(1) of section
    1310.69 of the Revised Code by the lessee under the lease contract or, if agreed,
    after other default by the lessee, the lessor has the right to take possession
    of the goods. If the lease contract so provides, the lessor may require the lessee
    to assemble the goods and make them available to the lessor at a place to be designated
    by the lessor that is reasonably convenient to both parties. Without removal,
    the lessor may render unusable any goods employed in trade or business and may
    dispose of goods on the lessee''s premises as provided in section 1310.73 of the
    Revised Code.

    (C) The lessor may proceed under division (B) of this section without judicial
    process if it can be done without breach of the peace, or the lessor may proceed
    by action.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.71
- number: '1310.72'
  heading: Lessor's stoppage of delivery in transit or otherwise - UCC 2A-526
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) A lessor may stop delivery of goods in the possession of a carrier or
    other bailee if the lessor discovers the lessee to be insolvent and may stop delivery
    of carload, truckload, planeload, or larger shipments of express or freight if
    the lessee repudiates or fails to make a payment due before delivery, whether
    for rent, security, or otherwise under the lease contract, or for any other reason
    the lessor has a right to withhold or take possession of the goods.

    (B) In pursuing its remedies under division (A) of this section, the lessor may
    stop delivery until one of the following occurs:

    (1) Receipt of the goods by the lessee;

    (2) Acknowledgment to the lessee by any bailee of the goods, except a carrier,
    that the bailee holds the goods for the lessee;

    (3) Such an acknowledgment to the lessee by a carrier via reshipment or as warehouse.

    (C)(1) To stop delivery, a lessor shall so notify as to enable the bailee by reasonable
    diligence to prevent delivery of the goods.

    (2) After notification, the bailee shall hold and deliver the goods according
    to the directions of the lessor, but the lessor is liable to the bailee for any
    ensuing charges or damages.

    (3) A carrier who has issued a nonnegotiable bill of lading is not obliged to
    obey a notification to stop that is received from a person other than the consignor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.72
- number: '1310.73'
  heading: Lessor's rights to dispose of goods - UCC 2A-527
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) After a default of the type described in division (A) or (C)(1) of section
    1310.69 of the Revised Code by a lessee under the lease contract, after the lessor
    refuses to deliver or takes possession of goods as provided in section 1310.71
    or 1310.72 of the Revised Code, or, if agreed, after other default by a lessee,
    the lessor may dispose of the goods concerned or the undelivered balance of the
    goods concerned by lease, sale, or otherwise.

    (B) Except as otherwise provided with respect to damages liquidated in the lease
    agreement pursuant to section 1310.50 of the Revised Code or otherwise determined
    pursuant to agreement of the parties as provided in section 1301.302 and section
    1310.49 of the Revised Code, if the disposition is by lease agreement substantially
    similar to the original lease agreement and the new lease agreement is made in
    good faith and in a commercially reasonable manner, the lessor may recover from
    the lessee as damages all of the following:

    (1) Accrued and unpaid rent as of the date of the commencement of the term of
    the new lease agreement;

    (2) The present value, as of the same date, of the total rent for the then remaining
    lease term of the original lease agreement minus the present value, as of the
    same date, of the rent under the new lease agreement applicable to that period
    of the new lease term that is comparable to the then remaining term of the original
    lease agreement;

    (3) Any incidental damages allowed under section 1310.76 of the Revised Code,
    less expenses saved in consequence of the lessee''s default.

    (C) If the lessor''s disposition of the goods is by a lease agreement that for
    any reason does not qualify for treatment under division (B) of this section,
    or is by sale or otherwise, the lessor may recover from the lessee as if the lessor
    had elected not to dispose of the goods, and section 1310.74 of the Revised Code
    governs.

    (D) A subsequent buyer or lessee who buys or leases from the lessor in good faith
    for value as a result of a disposition of goods under this section takes the goods
    free of the original lease contract and any rights of the original lessee even
    though the lessor fails to comply with one or more of the requirements of sections
    1310.01 to 1310.78 of the Revised Code.

    (E) The lessor is not accountable to the lessee for any profit made on any disposition.
    A lessee who has rightfully rejected or justifiably revoked acceptance and has
    proceeded in accordance with division (E) of section 1310.54 of the Revised Code
    shall account to the lessor for any excess over the amount of the lessee''s security
    interest.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.73
- number: '1310.74'
  heading: Lessor's damages for non-acceptance, failure to pay, repudiation or other
    default - UCC 2A-528
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) Except as otherwise provided with respect to damages liquidated in the
    lease agreement pursuant to section 1310.50 of the Revised Code or otherwise determined
    pursuant to the agreement of the parties as provided in section 1301.302 and section
    1310.49 of the Revised Code, if a lessor elects to retain the goods or a lessor
    elects to dispose of the goods and the disposition is by lease agreement that
    for any reason does not qualify for treatment under division (B) of section 1310.73
    of the Revised Code or is by sale or otherwise, the lessor may recover from the
    lessee as damages for a default of the type described in division (A) or (C)(1)
    of section 1310.69 of the Revised Code or, if agreed, for other default of the
    lessee all of the following:

    (1) Accrued and unpaid rent as of the date of default, if the lessee has never
    taken possession of the goods or, if the lessee has taken possession of the goods,
    as of the date the lessor repossesses the goods or an earlier date on which the
    lessee makes a tender of the goods to the lessor;

    (2) The present value as of the date determined under division (A)(1) of this
    section of the total rent for the then remaining lease term of the original lease
    agreement minus the present value as of the same date of the market rent at the
    place where the goods are located computed for the same lease term;

    (3) Any incidental damages allowed under section 1310.76 of the Revised Code,
    less expenses saved in consequence of the lessee''s default.

    (B) If the measure of damages provided in division (A) of this section is inadequate
    to put a lessor in as good a position as performance would have, the measure of
    damages is the present value of the profit, including reasonable overhead, the
    lessor would have made from full performance by the lessee, together with any
    incidental damages allowed under section 1310.76 of the Revised Code, due allowance
    for costs reasonably incurred, and due credit for payments or proceeds of disposition.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.74
- number: '1310.75'
  heading: Lessor's action for rent - UCC 2A-529
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) After default of the type described in division (A) or (C)(1) of section
    1310.69 of the Revised Code by the lessee under the lease contract or, if agreed,
    after other default by the lessee, if the lessor complies with division (B) of
    this section, the lessor may recover from the lessee as damages the following:

    (1) For goods accepted by the lessee and not repossessed by or tendered to the
    lessor, and for conforming goods lost or damaged within a commercially reasonable
    time after risk of loss passes to the lessee as provided in section 1310.26 of
    the Revised Code, all of the following:

    (a) Accrued and unpaid rent as of the date of entry of judgment in favor of the
    lessor;

    (b) The present value as of the same date of the rent for the then remaining lease
    term of the lease agreement;

    (c) Any incidental damages allowed under section 1310.76 of the Revised Code,
    less expenses saved in consequence of the lessee''s default.

    (2) For goods identified to the lease contract if the lessor is unable after reasonable
    effort to dispose of them at a reasonable price or the circumstances reasonably
    indicate that effort will be unavailing, all of the following:

    (a) Accrued and unpaid rent as of the date of entry of judgment in favor of the
    lessor;

    (b) The present value, as of the same date, of the rent for the then remaining
    lease term of the lease agreement;

    (c) Any incidental damages allowed under section 1310.76 of the Revised Code,
    less expenses saved in consequence of the lessee''s default.

    (B) Except as provided in division (C) of this section, the lessor shall hold
    for the lessee for the remaining lease term of the lease agreement any goods that
    have been identified to the lease contract and that are in the lessor''s control.

    (C) The lessor may dispose of the goods at any time before collection of the judgment
    for damages obtained pursuant to division (A) of this section. If the disposition
    of the goods is before the end of the remaining lease term of the lease agreement,
    the lessor''s recovery against the lessee for damages is governed by section 1310.73
    or 1310.74 of the Revised Code, and the lessor shall cause an appropriate credit
    to be provided against a judgment for damages to the extent that the amount of
    the judgment exceeds the recovery available pursuant to section 1310.73 or 1310.74
    of the Revised Code.

    (D) Payment of a judgment for damages obtained pursuant to division (A) of this
    section entitles the lessee to the use and possession of the goods not then disposed
    of for the remaining lease term of and in accordance with the lease agreement.

    (E) After default of the type described in division (A) or (C)(1) of section 1310.69
    of the Revised Code by the lessee under the lease contract or, if agreed, after
    other default by the lessee, a lessor who is held not entitled to rent under this
    section nevertheless shall be awarded damages for nonacceptance under section
    1310.73 or 1310.74 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.75
- number: '1310.76'
  heading: Lessor's incidental damages - UCC 2A-530
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: Incidental damages to an aggrieved lessor include any commercially reasonable
    charges, expenses, or commissions incurred in stopping delivery, in the transportation,
    care, and custody of goods after the lessee's default, in connection with the
    return or disposition of the goods, or otherwise in connection with the default.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.76
- number: '1310.77'
  heading: Standing to sue third parties for injury to goods - UCC 2A-531
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: '(A) If a third party so deals with goods that have been identified to a lease
    contract as to cause actionable injury to a party to the lease contract, the lessor
    has a right of action against the third party, and the lessee also has a right
    of action against the third party if the lessee has a security interest in the
    goods, has an insurable interest in the goods, or bears the risk of loss under
    the lease contract or has since the injury assumed that risk as against the lessor
    and the goods have been converted or destroyed.

    (B) If, at the time of the injury, the plaintiff did not bear the risk of loss
    as against the other party to the lease contract and there is no arrangement between
    them for disposition of the recovery, his suit or settlement, subject to his own
    interest, is as a fiduciary for the other party to the lease contract.

    (C) Either party with the consent of the other may sue for the benefit of whom
    it may concern.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.77
- number: '1310.78'
  heading: Lessor's rights to residual interest - UCC 2A-532
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: In addition to any other recovery permitted by sections 1310.01 to 1310.78
    of the Revised Code or other law, the lessor may recover from the lessee an amount
    that will fully compensate the lessor for any loss of or damage to the lessor's
    residual interest in the goods caused by the default of the lessee.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.78
- number: '1311.01'
  heading: Lien definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: 'As used in sections 1311.01 to 1311.22 of the Revised Code:

    (A) "Owner," "part owner," or "lessee" includes all the interests either legal
    or equitable, which such person may have in the real estate upon which the improvements
    are made, including the interests held by any person under contracts of purchase,
    whether in writing or otherwise.

    (B) "Material supplier" includes any person by whom any materials are furnished
    in furtherance of an improvement.

    (C) "Laborer" includes any mechanic, worker, artisan, or other individual who
    performs labor or work in furtherance of any improvement.

    (D) "Subcontractor" includes any person who undertakes to construct, alter, erect,
    improve, repair, demolish, remove, dig, or drill any part of any improvement under
    a contract with any person other than the owner, part owner, or lessee.

    (E) "Original contractor," except as otherwise provided in section 1311.011 of
    the Revised Code, includes a construction manager and any person who undertakes
    to construct, alter, erect, improve, repair, demolish, remove, dig, or drill any
    part of any improvement under a contract with an owner, part owner, or lessee.

    (F) "Construction manager" means a person with substantial discretion and authority
    to manage or direct an improvement, provided that the person is in direct privity
    of contract with the owner, part owner, or lessee of the improvement.

    (G) "Notice of commencement" means the notice specified in section 1311.04 of
    the Revised Code.

    (H) "Notice of furnishing" means the notice specified in section 1311.05 of the
    Revised Code.

    (I) "Materials" means all products and substances including, without limitation,
    any gasoline, lubricating oil, petroleum products, powder, dynamite, blasting
    supplies and other explosives, tools, equipment, or machinery furnished in furtherance
    of an improvement.

    (J) "Improvement" means constructing, erecting, altering, repairing, demolishing,
    or removing any building or appurtenance thereto, fixture, bridge, or other structure,
    and any gas pipeline or well including, but not limited to, a well drilled or
    constructed for the production of oil or gas; the furnishing of tile for the drainage
    of any lot or land; the excavation, cleanup, or removal of hazardous material
    or waste from real property; the enhancement or embellishment of real property
    by seeding, sodding, or the planting thereon of any shrubs, trees, plants, vines,
    small fruits, flowers, or nursery stock of any kind; and the grading or filling
    to establish a grade.

    (K) "Wages" means the basic hourly rate of pay and all other contractually owed
    benefits.'
