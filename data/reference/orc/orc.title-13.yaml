- number: '1332.06'
  heading: Special fund for cable system - annual report
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: '(A) A political subdivision of this state that is a public cable service
    provider shall maintain a special fund for its cable system and the provision
    of cable service over that cable system and shall be subject, with respect to
    that special fund, to sections 5705.09, 5705.10, 5705.14, 5705.15, 5705.16, 5705.39,
    5705.40, 5705.41, 5705.44, and 5705.45 and any other applicable provision of Chapter
    5705. of the Revised Code concerning the establishment or maintenance of the special
    fund.

    (B) A political subdivision of this state that is a public cable service provider
    shall prepare and publish, on or before the first day of June of each year for
    the prior calendar year, an annual report on its cable system and the provision
    of cable service over that cable system. The report shall be substantially in
    accordance with full cost accounting and shall include disclosure of the amount,
    source, and cost of working capital utilized for its cable system and the provision
    of cable service over that cable system and estimates of the amount of any franchise
    fee, regulatory fee, occupation tax, pole attachment fee, property tax, or other
    fee or tax that would be applicable to its cable system and the provision of cable
    service over that cable system but for any exemption by reason of its status as
    a political subdivision, which exemption is authorized by law. Nothing in sections
    1332.01 to 1332.10 of the Revised Code requires any elected official of the political
    subdivision to maintain a log or other record of the time the official spends
    on the business of the public cable service provider in the course of official
    duties.

    (C) No political subdivision shall fail to comply with division (A) or (B) of
    this section.'
