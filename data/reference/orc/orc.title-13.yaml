- number: '1309.514'
  heading: Assignment of powers of secured party of record - UCC 9-514
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in division (C) of this section, an initial
    financing statement may reflect an assignment of all of the secured party''s power
    to authorize an amendment to the financing statement by providing the name and
    mailing address of the assignee as the name and address of the secured party.

    (B) Except as provided in division (C) of this section, a secured party of record
    may assign of record all or part of its power to authorize an amendment to a financing
    statement by filing in the filing office an amendment of the financing statement
    that:

    (1) Identifies, by its file number, the initial financing statement to which it
    relates;

    (2) Provides the name of the assignor; and

    (3) Provides the name and mailing address of the assignee.

    (C) An assignment of record of a security interest in a fixture covered by a record
    of a mortgage that is effective as a financing statement filed as a fixture filing
    under division (C) of section 1309.502 of the Revised Code may be made only by
    an assignment of record of the mortgage in the manner provided by the laws of
    this state other than those contained in Chapters 1301. to 1305. and 1307. to
    1310. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.514
- number: '1309.515'
  heading: Duration and effectiveness of financing statement - effect of lapsed financing
    statement - UCC 9-515
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Except as otherwise provided in divisions (B), (E), (F), and (G) of this
    section, a filed financing statement is effective for a period of five years after
    the date of filing.

    (B) Except as otherwise provided in divisions (E), (F), and (G) of this section,
    an initial financing statement filed in connection with a public-finance transaction
    or manufactured-home transaction is effective for a period of thirty years after
    the date of filing if it indicates that it is filed in connection with a public-finance
    transaction or manufactured-home transaction.

    (C) The effectiveness of a filed financing statement lapses on the expiration
    of the period of its effectiveness unless, before the lapse, a continuation statement
    is filed pursuant to division (D) of this section. Upon lapse, a financing statement
    ceases to be effective, and any security interest or agricultural lien that was
    perfected by the financing statement becomes unperfected, unless the security
    interest is perfected otherwise. If the security interest or agricultural lien
    becomes unperfected upon lapse, it is deemed never to have been perfected as against
    a purchaser of the collateral for value.

    (D) A continuation statement may be filed only within six months before the expiration
    of the five-year period specified in division (A) or the thirty-year period specified
    in division (B) of this section, whichever is applicable.

    (E) Except as provided in section 1309.510 of the Revised Code, upon timely filing
    of a continuation statement, the effectiveness of the initial financing statement
    continues for a period of five years commencing on the day on which the financing
    statement would have become ineffective in the absence of the filing. Upon the
    expiration of the five-year period, the financing statement lapses in the same
    manner as provided in division (C) of this section, unless, before the lapse,
    another continuation statement is filed pursuant to division (D) of this section.
    Succeeding continuation statements may be filed in the same manner to continue
    the effectiveness of the initial financing statement.

    (F) If a debtor is a transmitting utility and a filed initial financing statement
    so indicates, the financing statement is effective until a termination statement
    is filed.

    (G) A record of a mortgage that is effective as a financing statement filed as
    a fixture filing under division (C) of section 1309.502 of the Revised Code remains
    effective as a financing statement filed as a fixture filing until the mortgage
    is released or satisfied of record or its effectiveness otherwise terminates as
    to the real property.'
