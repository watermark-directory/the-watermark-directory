  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.402
- number: '1309.403'
  heading: Agreement not to assert defenses against assignee - UCC 9-403
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) As used in this section, "value" has the same meaning as in division
    (A) of section 1303.33 of the Revised Code.

    (B) Except as otherwise provided in this section, an agreement between an account
    debtor and an assignor not to assert against an assignee any claim or defense
    that the account debtor may have against the assignor is enforceable by an assignee
    that takes an assignment:

    (1) For value;

    (2) In good faith;

    (3) Without notice of a claim of a property or possessory right to the property
    assigned; and

    (4) Without notice of a defense or claim in recoupment of the type that may be
    asserted against a person entitled to enforce a negotiable instrument under division
    (A) of section 1303.35 of the Revised Code.

    (C) Division (B) of this section does not apply to defenses of a type that may
    be asserted against a holder in due course of a negotiable instrument under division
    (B) of section 1303.34 of the Revised Code.

    (D) In a consumer transaction, if a record evidences the account debtor''s obligation,
    law other than this chapter requires that the record include a statement to the
    effect that the rights of an assignee are subject to claims or defenses that the
    account debtor could assert against the original obligee, and the record does
    not include the required statement:

    (1) The record has the same effect as if the record included the required statement;
    and

    (2) The account debtor may assert against an assignee those claims and defenses
    that would have been available if the record included the required statement.

    (E) This section is subject to law other than this chapter that establishes a
    different rule for an account debtor who is an individual and who incurred the
    obligation primarily for personal, family, or household purposes.

    (F) Except as otherwise provided in division (D) of this section, this section
    does not displace law other than this chapter that gives effect to an agreement
    by an account debtor not to assert a claim or defense against an assignee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.403
- number: '1309.404'
  heading: Rights acquired by assignee - claims and defenses against assignee - UCC
    9-404
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Unless an account debtor has made an enforceable agreement not to assert
    defenses or claims, and subject to divisions (B) to (E) of this section, the rights
    of an assignee are subject to:

    (1) All terms of the agreement between the account debtor and assignor and any
    defense or claim in recoupment arising from the transaction that gave rise to
    the contract; and

    (2) Any other defense or claim of the account debtor against the assignor that
    accrues before the account debtor receives a notification of the assignment authenticated
    by the assignor or the assignee.

    (B) Subject to division (C) of this section and except as provided in division
    (D) of this section, the claim of an account debtor against an assignor may be
    asserted against an assignee under division (A) of this section only to reduce
    the amount the account debtor owes.

    (C) This section is subject to law other than this chapter that establishes a
    different rule for an account debtor who is an individual and who incurred the
    obligation primarily for personal, family, or household purposes.

    (D) In a consumer transaction, if a record evidences the account debtor''s obligation,
    if law other than this chapter requires that the record include a statement to
    the effect that the account debtor''s recovery against an assignee with respect
    to claims and defenses against the assignor may not exceed amounts paid by the
    account debtor under the record, and if the record does not include the required
    statement, the extent to which a claim of an account debtor against the assignor
    may be asserted against an assignee is determined as if the record included the
    required statement.

    (E) This section does not apply to an assignment of a health-care-insurance receivable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.404
- number: '1309.405'
  heading: Modification of assigned contract - UCC 9-405
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) A modification of or substitution for an assigned contract is effective
    against an assignee if made in good faith. The assignee acquires corresponding
    rights under the modified or substituted contract. The assignment may provide
    that the modification or substitution is a breach of contract by the assignor.
    This division is subject to divisions (B) to (D) of this section.

    (B) Division (A) of this section applies to the extent that:

    (1) The right to payment or a part thereof under an assigned contract has not
    been fully earned by performance; or

    (2) The right to payment or a part thereof has been fully earned by performance,
    and the account debtor has not received notification of the assignment under division
    (A) of section 1309.406 of the Revised Code.

    (C) This section is subject to law other than this chapter that establishes a
    different rule for an account debtor who is an individual and who incurred the
    obligation primarily for personal, family, or household purposes.

    (D) This section does not apply to an assignment of a health-care-insurance receivable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.405
- number: '1309.406'
  heading: Discharge of account debtor - UCC 9-406
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) Subject to divisions (B) to (I) of this section, an account debtor on
    an account, chattel paper, or payment intangible may discharge its obligation
    by paying the assignor until, but not after, the account debtor receives a notification,
    authenticated by the assignor or the assignee, that the amount due or to become
    due has been assigned and that payment is to be made to the assignee. After receipt
    of the notification, the account debtor may discharge its obligation by paying
    the assignee and may not discharge the obligation by paying the assignor.

    (B) Subject to division (H) of this section, notification under division (A) of
    this section is not effective:

    (1) If the notification does not reasonably identify the rights assigned;

    (2) To the extent that an agreement between an account debtor and a seller of
    a payment intangible limits the account debtor''s duty to pay a person other than
    the seller and the limitation is effective under law other than this chapter;
    or

    (3) At the option of an account debtor, if the notification notifies the account
    debtor to make less than the full amount of any installment or other periodic
    payment to the assignee, even if:

    (a) Only a portion of the account, chattel paper, or payment intangible has been
    assigned to that assignee;

    (b) A portion has been assigned to another assignee; or

    (c) The account debtor knows that the assignment to that assignee is limited.

    (C) Subject to division (H) of this section, if requested by the account debtor,
    an assignee shall seasonably furnish reasonable proof that the assignment has
    been made. Unless the assignee complies, the account debtor may discharge its
    obligation by paying the assignor, even if the account debtor has received a notification
    under division (A) of this section.

    (D) Except as otherwise provided in division (E) of this section and sections
    1309.407 and 1310.31 of the Revised Code, and subject to division (H) of this
    section, a term in an agreement between an account debtor and an assignor or in
    a promissory note is ineffective to the extent that it:

    (1) Prohibits, restricts, or requires the consent of the account debtor or person
    obligated on the promissory note to the assignment or transfer of, or the creation,
    attachment, perfection, or enforcement of a security interest in, the account,
    chattel paper, payment intangible, or promissory note; or

    (2) Provides that the assignment or transfer or the creation, attachment, perfection,
    or enforcement of the security interest may give rise to a default, breach, right
    of recoupment, claim, defense, termination, right of termination, or remedy under
    the account, chattel paper, payment intangible, or promissory note.

    (E) Division (D) of this section does not apply to the sale of a payment intangible
    or promissory note, other than a sale pursuant to a disposition under section
    1309.610 of the Revised Code or an acceptance of collateral under section 1309.620
    of the Revised Code.

    (F) Except as provided in sections 1309.407 and 1310.31 of the Revised Code and
    subject to divisions (H) and (I) of this section, a rule of law, statute, or regulation
    that prohibits, restricts, or requires the consent of a government, governmental
    body or official, or account debtor to the assignment or transfer of, or creation
    of a security interest in, an account or chattel paper is not effective to the
    extent that the rule of law, statute, or regulation:

    (1) Prohibits, restricts, or requires the consent of the government, governmental
    body or official, or account debtor to the assignment or transfer of, or the creation,
    attachment, perfection, or enforcement of a security interest in the account or
    chattel paper; or

    (2) Provides that the assignment or transfer or the creation, attachment, perfection,
    or enforcement of the security interest may give rise to a default, breach, right
    of recoupment, claim, defense, termination, right of termination, or remedy under
    the account or chattel paper.

    (G) Subject to division (H) of this section, an account debtor may not waive or
    vary its option under division (B)(3) of this section.

    (H) This section is subject to law other than this chapter that establishes a
    different rule for an account debtor who is an individual and who incurred the
    obligation primarily for personal, family, or household purposes.

    (I) This section does not apply to an assignment of a health-care-insurance receivable.

    (J) Divisions (D) and (F) of this section do not apply to:

    (1) A claim or right to receive compensation for injuries or sickness as described
    in section 104(a)(1) or (2) of the Internal Revenue Code, as amended; or

    (2) A claim or right to receive benefits under a special needs trust as described
    in the "Omnibus Budget Reconciliation Act of 1993," 107 Stat. 312, 42 U.S.C. 1396p(d)(4),
    as amended.

    (K) Divisions (D), (F), and (J) of this section apply only to a security interest
    created on or after July 1, 2001. Nothing in this section shall supersede the
    provisions of sections 2323.58 to 2323.587 of the Revised Code. This section shall
    be interpreted consistently with sections 2323.58 to 2323.587 of the Revised Code.'
