- number: '1309.519'
  heading: Numbering, maintaining, and indexing records - communicating information
    provided in records - UCC 9-519
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) For each record filed in a filing office, the filing office shall:

    (1) Assign an unique number to the filed record;

    (2) Create a record that bears the number assigned to the filed record and the
    date and time of filing;

    (3) Maintain the filed record for public inspection; and

    (4) Index the filed record in accordance with divisions (C), (D), and (E) of this
    section.

    (B) A file number assigned after January 1, 2002, must include a digit that:

    (1) Is mathematically derived from or related to the other digits of the file
    number; and

    (2) Aids the filing office in determining whether a number communicated as the
    file number includes a single-digit or transpositional error.

    (C) Except as provided in divisions (D) and (E) of this section, the filing office
    shall:

    (1) Index an initial financing statement according to the name of the debtor and
    index all filed records relating to the initial financing statement in a manner
    that associates with one another an initial financing statement and all filed
    records relating to the initial financing statement; and

    (2) Index a record that provides a name of a debtor that previously was not provided
    in the financing statement to which the record relates also according to the name
    that previously was not provided.

    (D) If a financing statement is filed as a fixture filing or covers as-extracted
    collateral or timber to be cut, it must be filed for record and the filing office
    shall index it:

    (1) Under the names of the debtor and of each owner of record shown on the financing
    statement as if they were the mortgagors under a mortgage of the real property
    described; and

    (2) To the extent that the laws of this state provide for indexing of records
    of mortgages under the name of the mortgagee, under the name of the secured party
    as if the secured party were the mortgagee under the mortgage, or, if indexing
    is by description, as if the financing statement were a record of a mortgage of
    the real property described.

    (E) If a financing statement is filed as a fixture filing or covers as-extracted
    collateral or timber to be cut, the filing office shall index an assignment filed
    under division (A) of section 1309.514 of the Revised Code or an amendment filed
    under division (B) of that section:

    (1) Under the name of the assignor as grantor; and

    (2) To the extent that the law of this state provides for indexing a record of
    the assignment of a mortgage under the name of the assignee, under the name of
    the assignee.

    (F) The filing office shall maintain a capability:

    (1) To retrieve a record by the name of the debtor and:

    (a) If the filing office is described in division (A)(1) of section 1309.501 of
    the Revised Code, by the file number assigned to the initial financing statement
    to which the record relates and the date and time that the record was filed;

    (b) If the filing office is described in division (A)(2) of section 1309.501 of
    the Revised Code, by the file number assigned to the initial financing statement
    to which the record relates; and

    (2) To associate and retrieve with one another an initial financing statement
    and each filed record relating to the initial financing statement.

    (G) The filing office may not remove a debtor''s name from the index until one
    year after the effectiveness of a financing statement naming the debtor lapses
    under section 1309.515 of the Revised Code with respect to all secured parties
    of record.

    (H) The filing office shall perform the acts required by divisions (A) to (E)
    of this section at the time and in the manner prescribed by the filing-office
    rule.'
