- number: '1343.04'
  heading: Usurious interest
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1343'
    name: Interest
  text: Payments of money or property made by way of usurious interest, whether made
    in advance or not, as to the excess of interest above the rate allowed by law
    at the time of making the contract, shall be taken to be payments made on account
    of principal; and judgment shall be rendered for no more than the balance found
    due, after deducting the excess of interest so paid.
