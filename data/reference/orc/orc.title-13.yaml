- number: '1319.06'
  heading: Husband and wife must join in chattel mortgage on household property
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1319'
    name: Miscellaneous Credit Transactions
  text: 'No husband or wife shall create any lien by chattel mortgage or otherwise
    upon any personal household property owned by either or both of them, without
    the joint consent of both husband and wife. No such mortgage is valid unless executed
    by both husband and wife.

    This section does not apply to any mortgage or lien for the purchase price of
    such property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1319.06
- number: '1319.07'
  heading: Definitions for RC sections 1319.07 to 1319.09
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1319'
    name: Miscellaneous Credit Transactions
  text: 'As used in sections 1319.07 to 1319.09 of the Revised Code:

    (A) "Nonrecourse carveout" means a specific exemption, if any, to the nonrecourse
    provisions set forth in the loan documents for a nonrecourse loan that has the
    effect of creating, if specified events occur, personal liability of the borrower
    or guarantor or other surety of the loan for all or some amounts owed to the lender.

    (B) "Nonrecourse loan" means a commercial loan secured by a mortgage on real property
    located in this state and evidenced by loan documents that meet any of the following:

    (1) Provide that the lender will not enforce the liability or obligation of the
    borrower by an action or proceeding in which a money judgment is sought against
    the borrower;

    (2) Provide that any judgment in any action or proceeding on the loan is enforceable
    against the borrower only to the extent of the borrower''s interest in the mortgaged
    property and other collateral security given for the loan;

    (3) Provide that the lender will not seek a deficiency judgment against the borrower;

    (4) Provide that there is no recourse against the borrower personally for the
    loan;

    (5) Include any combination of divisions (B)(1) to (4) of this section or any
    other provisions to the effect that the loan is without personal liability to
    the borrower beyond the borrower''s interest in the mortgaged property and other
    collateral security given for the loan.

    (C) "Nonrecourse provisions" means one or more of the provisions described in
    divisions (B)(1) to (5) of this section, whether or not the loan is subject to
    a nonrecourse carveout or carveouts.

    (D) "Postclosing solvency covenant" means any provision of the loan documents
    for a nonrecourse loan, whether expressed as a covenant, representation, warranty,
    or default, that relates solely to the solvency of the borrower, including, without
    limitation, a provision requiring that the borrower maintain adequate capital
    or have the ability to pay the borrower''s debts, with respect to any period of
    time after the date the loan is initially funded. "Postclosing solvency covenant"
    does not include a covenant not to file a voluntary bankruptcy or other voluntary
    insolvency proceeding or not to collude in an involuntary proceeding.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1319.07
- number: '1319.08'
  heading: Use of postclosing solvency covenant
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1319'
    name: Miscellaneous Credit Transactions
  text: '(A) A postclosing solvency covenant shall not be used, directly or indirectly,
    as a nonrecourse carveout or as the basis for any claim or action against a borrower
    or any guarantor or other surety on a nonrecourse loan.

    (B) A provision in the documents for a nonrecourse loan that does not comply with
    division (A) of this section is invalid and unenforceable.'
