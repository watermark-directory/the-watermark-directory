- number: '1327.51'
  heading: Entry on premises - orders to prevent violation - seizure of property -
    hearing
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: '(A) When necessary for the enforcement of sections 1327.46 to 1327.61 of
    the Revised Code or rules adopted pursuant thereto, the director of agriculture
    and any weights and measures official acting under the authority of section 1327.52
    of the Revised Code may do any of the following:

    (1) Enter any commercial premises during normal business hours, except that in
    the event such premises are not open to the public, the director or official shall
    first present the director''s or official''s credentials and obtain consent before
    making entry thereto, unless a search warrant previously has been obtained;

    (2) Issue stop-use, hold, and removal orders with respect to any weights and measures
    commercially used, and stop-sale, hold, and removal orders with respect to any
    packaged commodities or bulk commodity observed to be or believed to be sold;

    (3) Seize for use as evidence any incorrect or unapproved weight or measure or
    any package or commodity found to be used, retained, or sold in violation of sections
    1327.46 to 1327.61 of the Revised Code or rules adopted pursuant thereto.

    (B) The director shall afford an opportunity for a hearing in accordance with
    Chapter 119. of the Revised Code to any owner or operator whose property is seized
    by the department of agriculture.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.51
- number: '1327.511'
  heading: Scale certification fund
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: All money collected under sections 1327.50 and 1327.501 of the Revised Code
    from fees and for services rendered by the department of agriculture in operating
    the type evaluation program, a metrology laboratory program, and the device permitting
    program shall be deposited in the state treasury to the credit of the metrology
    and scale certification and device permitting fund, which is hereby created. Money
    credited to the fund shall be used to pay operating costs incurred by the department
    in administering the programs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.511
- number: '1327.52'
  heading: Jurisdiction of county weights and measures official
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: Any weights and measures official elected or appointed for a county or municipality
    shall have the duties enumerated in divisions (I) to (M) of section 1327.50 of
    the Revised Code, and the powers enumerated in section 1327.51 of the Revised
    Code. These powers and duties shall extend to the respective jurisdictions, except
    that the jurisdiction of a county official shall not extend to any municipal corporation
    for which a weights and measures official has been appointed. The director of
    agriculture shall advise and assist these officials.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.52
- number: '1327.53'
  heading: Deceptive sales or buying practices
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: 'No person shall do any of the following:

    (A) Sell, offer, or expose for sale less than the quantity he represents;

    (B) Take any more than the quantity he represents when, as a buyer, he furnishes
    the weight or measure by means of which the quantity is determined;

    (C) Represent the quantity he sells or offers or exposes for sale in any manner
    tending to mislead or in any way to deceive.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.53
- number: '1327.54'
  heading: Misrepresentation of price of commodity or service
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: No person shall misrepresent the price of any commodity or service sold or
    advertised for sale by weight, measure, or count, nor represent the price in any
    manner calculated or tending to mislead or in any way deceive a person.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.54
- number: '1327.55'
  heading: Methods of measuring commodities for sale
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: 'Except as otherwise provided by the director of agriculture or by firmly
    established trade customs and practices, commodities shall be sold as follows:

    (A) Commodities in liquid form shall be sold by liquid measure or by weight;

    (B) Commodities not in liquid form shall be sold only by weight, measure, or county,
    or a combination thereof;

    (C) The method of sale of commodities shall provide accurate quantity information
    that enables the buyer to make price and quantity comparisons.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.55
- number: '1327.56'
  heading: Delivery tickets
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: 'Whenever the quantity is determined by the seller, every bulk sale in excess
    of twenty dollars and every bulk delivery of heating fuel shall be accompanied
    by a delivery ticket containing the following information:

    (A) The name and address of the vendor and purchaser;

    (B) The date delivered;

    (C) The quantity delivered and the quantity upon which the price is based, if
    this differs from the delivered quantity;

    (D) The identity in the most descriptive terms commercially practicable, including
    any quality representation made in connection with the sale;

    (E) The count of individually wrapped packages, if more than one.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.56
- number: '1327.57'
  heading: Package declarations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: '(A) Except as otherwise provided by law, any consumer package or commodity
    in package form introduced or delivered for introduction into or received in intrastate
    commerce or sold in intrastate commerce shall bear on the outside of the package
    a definite, plain, and conspicuous declaration, as may be prescribed by rule adopted
    by the director of agriculture, of any of the following, as applicable:

    (1) The identity of the commodity in the package unless the same can easily be
    identified through the wrapper or container;

    (2) The net quantity of the contents in terms of weight, measure, or count;

    (3) In the case of any package sold at any place other than on the premises where
    packed, the name and place of business of the manufacturer, packer, or distributor.

    This section does not apply to beer or intoxicating liquor as defined in section
    4301.01 of the Revised Code, or packages thereof, or to malt or brewer''s wort,
    or packages thereof.

    (B) Under division (A)(2) of this section, neither the qualifying term "when packed"
    or any words of similar import, nor any term qualifying a unit of weight, measure,
    or count that tends to exaggerate the amount of commodity in a package, shall
    be used.

    (C) In addition to the declarations required by division (A) of this section,
    any package or commodity in package form, if the package is one of a lot containing
    random weights, measures, or counts of the same commodity and bears the total
    selling price of the package, shall bear on the outside of the package a plain
    and conspicuous declaration of the price per single unit of weight, measure, or
    count.

    (D) No package or commodity in package form shall be so wrapped, nor shall it
    be in a container so made, formed, or filled, as to mislead the purchaser as to
    the quantity of the contents of the package, and the contents of a container shall
    not fall below any reasonable standard of fill that may have been prescribed for
    the commodity in question by the director.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.57
- number: '1327.571'
  heading: Declaration of quantity included in advertising - posted prices to include
    fraction
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: '(A) Whenever a package or commodity is advertised in any manner and the retail
    price of the package or commodity is stated in the advertisement, there shall
    be closely and conspicuously associated with the statement of price such a declaration
    of quantity as is required by law or rule to appear on the package or with the
    commodity. Where a dual declaration is required, only the declaration that sets
    forth the quantity in terms of the smaller unit of weight or measure need appear
    in the advertisement.

    (B) Whenever an advertised, posted, or labeled price per unit of weight, measure,
    or count includes a fraction of a cent, all elements of the fraction or decimal
    shall be prominently displayed and the numeral or numerals expressing the fraction
    or decimal shall be immediately adjacent to, of the same general design and style
    as, and at least fifty per cent of the height and width of the numerals representing
    the whole cents.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.571
- number: '1327.58'
  heading: Temporary or permanent injunction
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: Irrespective of whether or not there exists an adequate remedy at law, the
    director of agriculture may apply to any court of competent jurisdiction for a
    temporary or permanent injunction or other appropriate relief restraining any
    person from continued violation of sections 1327.46 to 1327.61 of the Revised
    Code and of regulations promulgated thereunder.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.58
- number: '1327.59'
  heading: Presumptions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: Proof of the existence of a weight or measure or a weighing or measuring device
    in or about any building, enclosure, stand, or vehicle in which or from which
    it is shown that buying or selling is commonly carried on creates a rebuttable
    presumption of the use of such weight or measure or device for commercial purposes
    and of such use by the person in charge of such building, enclosure, stand, or
    vehicle.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.59
- number: '1327.60'
  heading: Prior sections unaffected
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: Enactment of sections 1327.46 to 1327.61 of the Revised Code does not affect
    any regulations promulgated pursuant to the authority of any earlier enabling
    statute unless inconsistent with sections 1327.46 to 1327.61 of the Revised Code
    or modified or revoked by the director of agriculture.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.60
- number: '1327.61'
  heading: Prohibited acts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: 'No person shall do any of the following:

    (A) Use or have in possession for use in commerce any incorrect weight or measure;

    (B) Wrap, package, label, or advertise any product or service contrary to this
    chapter, or any rules adopted under it, or sell, offer, hold, or expose for sale
    any service or product wrapped, packaged, labeled, or offered for sale contrary
    to this chapter or any rules adopted under it, or misrepresent the quantity or
    price or service contrary to this chapter, or any rules adopted under it;

    (C) Remove any tag, seal, or mark from any weight or measure without specific
    written authorization from the proper authority;

    (D) Recklessly install for use, repair, service, or place into service a commercially
    used weighing and measuring device unless the installation, repair, service, or
    placement is performed by one of the following:

    (1) A department of agriculture division of weights and measures inspector;

    (2) A service person registered with the department;

    (3) A county or municipal weights and measures inspector.

    (E) Hinder or obstruct any weights and measures official in the performance of
    official duties;

    (F) Sell or offer for use in commerce any incorrect weight or measure.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.61
- number: '1327.62'
  heading: Civil penalty
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: 'Whenever the director of agriculture, or the director''s designee, has cause
    to believe that any person has violated, or is violating any provision of sections
    1327.46 to 1327.61 of the Revised Code or a rule adopted under them, the director,
    or the director''s designee, may conduct a hearing in accordance with Chapter
    119. of the Revised Code to determine whether a violation has occurred. If the
    director or the director''s designee determines that the person has violated or
    is violating any provision of sections 1327.46 to 1327.61 of the Revised Code
    or a rule adopted under it, the director or the director''s designee may assess
    a civil penalty against the person. The person is liable for a civil penalty of
    not more than five hundred dollars for a first violation; for a second violation
    the person is liable for a civil penalty of not more than two thousand five hundred
    dollars; for each subsequent violation that occurs within five years after the
    second violation, the person is liable for a civil penalty of not more than ten
    thousand dollars.

    Any person assessed a civil penalty under this section shall pay the amount prescribed
    to the department of agriculture. The department shall remit all moneys collected
    under this section to the treasurer of state for deposit in the general revenue
    fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.62
- number: '1327.65'
  heading: Hearing prior to filing criminal charges
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: Prior to filing criminal charges under section 1327.99 of the Revised Code,
    the director of agriculture shall provide the person accused of the violation
    an opportunity for a hearing before the director to discuss the charges and offer
    evidence in mitigation of the charges.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.65
- number: '1327.70'
  heading: Uniform motor fuel quality testing program
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: '(A) As used in this section:

    (1) "Diesel fuel" has the same meaning as in section 5735.01 of the Revised Code.

    (2) "Motor fuel" means gasoline or diesel fuel that is sold by a retailer.

    (B) The director of agriculture may adopt rules in accordance with Chapter 119.
    of the Revised Code establishing a motor fuel quality testing program that is
    uniform throughout the state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.70
- number: '1327.99'
  heading: Penalty
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1327'
    name: Weights And Measures
  text: Whoever violates section 1327.501 or 1327.54 or division (A), (B), (C), (D),
    or (E) of section 1327.61 of the Revised Code or a rule adopted under sections
    1327.46 to 1327.61 of the Revised Code is guilty of a misdemeanor of the second
    degree on a first offense; on each subsequent offense within seven years after
    the first offense, the person is guilty of a misdemeanor of the first degree.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1327.99
- number: '1329.01'
  heading: Registration of trade name definitions - registration of trade name or
    report of fictitious name
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: '(A) As used in sections 1329.01 to 1329.10 of the Revised Code:

    (1) "Trade name" means a name used in business or trade to designate the business
    of the user and to which the user asserts a right to exclusive use.

    (2) "Fictitious name" means a name used in business or trade that is fictitious
    and that the user has not registered or is not entitled to register as a trade
    name. It does not include the name of record of any domestic corporation that
    is formed under Chapter 1701. or 1702. of the Revised Code, any foreign corporation
    that is registered pursuant to Chapter 1703. of the Revised Code, any domestic
    or foreign limited liability company that is formed under or registered pursuant
    to Chapter 1705. or 1706. of the Revised Code, any domestic or foreign limited
    partnership that is formed under or registered pursuant to Chapter 1782. of the
    Revised Code, or any domestic or foreign limited liability partnership that is
    formed under or registered pursuant to Chapter 1775. or 1776. of the Revised Code.

    (3) "Person" includes any individual, general partnership, limited partnership,
    limited liability partnership, corporation, association, professional association,
    limited liability company, society, foundation, federation, or organization formed
    under the laws of this state or any other state.

    (B) Except as provided in section 1701.041 of the Revised Code and subject to
    sections 1329.01 to 1329.10 of the Revised Code, any person may register with
    the secretary of state, on a form prescribed by the secretary of state, any trade
    name under which the person is operating, setting forth all of the following:

    (1) The name and business address of the applicant for registration and any of
    the following that is applicable:

    (a) If the applicant is a general partnership, the name and address of at least
    one partner or the identifying number the secretary of state assigns to the partnership
    pursuant to section 1776.05 of the Revised Code;

    (b) If the applicant is a limited partnership, a corporation, professional association,
    limited liability company, or other entity, the form of the entity and the state
    under the laws of which it was formed.

    (2) The trade name to be registered;

    (3) The general nature of the business conducted by the applicant;

    (4) The length of time during which the trade name has been used by the applicant
    in business operations in this state.

    (C) The trade name application shall be signed by the applicant or by any authorized
    representative of the applicant.

    A single trade name may be registered upon each trade name application submitted
    under sections 1329.01 to 1329.10 of the Revised Code.

    The trade name application shall be accompanied by a filing fee of thirty-nine
    dollars, payable to the secretary of state.

    (D) Any person who does business under a fictitious name and who has not registered
    and does not wish to register the fictitious name as a trade name or who cannot
    do so because the name is not available for registration shall report the use
    of the fictitious name to the secretary of state, on a form prescribed by the
    secretary of state, setting forth all of the following:

    (1) The name and business address of the user and any of the following that is
    applicable:

    (a) If the user is a general partnership, the name and address of at least one
    partner or the identifying number the secretary of state assigns to the partnership
    pursuant to section 1775.105 of the Revised Code;

    (b) If the user is a limited partnership, a corporation, professional association,
    limited liability company, or other entity, the form of the entity and the state
    under whose laws it was formed.

    (2) The fictitious name being used;

    (3) The general nature of the business conducted by the user.

    (E) The report of use of a fictitious name shall be signed by the user or by any
    authorized representative of the user.

    A single fictitious name may be registered upon each fictitious name report submitted
    under sections 1329.01 to 1329.10 of the Revised Code.

    The fictitious name report shall be accompanied by a filing fee of thirty-nine
    dollars, payable to the secretary of state.

    A report under this division shall be made within thirty days after the date of
    the first use of the fictitious name.'
