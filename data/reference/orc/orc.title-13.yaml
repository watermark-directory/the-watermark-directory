    Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.91
- number: '1311.92'
  heading: Transfer of lien property - escrow account
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: '(A) Except as provided in division (D) of this section, to enable a transfer
    of lien property to close when a broker''s perfected lien may otherwise prevent
    the closing, a separate escrow account shall be established by the owner into
    which moneys from the proceeds of the closing shall be deposited in an amount
    sufficient to release the broker''s lien. The moneys shall be held in escrow and
    shall only be released as ordered by a court of competent jurisdiction, or as
    directed by agreement of the broker and owner or by any process agreed to by the
    broker and owner.

    (B) An owner may not refuse to close a transfer of lien property because of the
    requirement to establish an escrow account under division (A) of this section.
    A prospective transferee of lien property shall not refuse to close the transfer
    of the lien property solely because the broker recorded a lien affidavit under
    this section, if all of the following have occurred:

    (1) The owner has established the escrow account required by division (A) of this
    section;

    (2) The prospective transferee has received from the escrow agent for the escrow
    account required by division (A) of this section a verified statement that the
    escrow account has been established.

    (C) When funds have been placed in escrow pursuant to division (A) of this section,
    the broker claiming a broker''s lien under this section has an equitable lien
    on the escrowed funds, and the lien recorded on the lien property shall be extinguished
    as a matter of law.

    (D) The broker and owner are not required to follow the escrow procedures described
    in this section if either of the following applies:

    (1) An alternative procedure is available that would allow the transfer of lien
    property to close and that procedure is acceptable to the broker and prospective
    transferee.

    (2) The proceeds from the transfer of lien property would be insufficient to release
    all liens, including the broker''s lien, that are claimed against the lien property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.92
- number: '1311.93'
  heading: Liability of broker
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1311'
    name: Liens
  text: Any broker that asserts or records a spurious or materially inaccurate broker's
    lien under this section or fails to release or acknowledge release or satisfaction
    of a broker's lien in compliance with this section, is liable for damages incurred
    by any person who has a legal or equitable interest in the lien property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1311.93
- number: '1312.01'
  heading: Definitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: 'As used in this chapter:

    (A) "Construction defect" means a deficiency that arises directly or indirectly
    out of the construction or the substantial rehabilitation of a residential building.
    "Substantial rehabilitation" includes the addition of a room and the removal or
    installation of a wall, partition, or portion of the structural design.

    (B) "Dwelling action" means any civil action in contract or tort for damages or
    indemnity brought against a residential contractor for damages or the loss of
    use of real property caused by a construction defect.

    (C) "Owner" means an owner or a prospective owner of a residential building or
    a dwelling unit in a residential building who enters into a contract with a residential
    contractor for the construction or substantial rehabilitation of that residential
    building or unit.

    (D) "Residential building" means a structure that is a one-family, two-family,
    or three-family dwelling house or a dwelling unit within that structure, any accessory
    structures incidental to that dwelling house, and a unit in a condominium development
    in which the owner holds title to that unit. "Residential building" includes any
    structure that is used as a model to promote the sale of a similar dwelling house.

    (E) "Residential contractor" means a person or entity who, for pay, enters into
    a contract with an owner for the construction or the substantial rehabilitation
    of a residential building and who has primary responsibility for the construction
    or substantial rehabilitation of a residential building.

    (F) "Accessory structure" has the same meaning as in section 3781.06 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.01
- number: '1312.02'
  heading: Application of chapter
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: This chapter applies only to an owner and a residential contractor who enter
    into a contract for the construction or the substantial rehabilitation of a residential
    building.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.02
- number: '1312.03'
  heading: Notice of contractor's right to resolve alleged defects
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: 'Upon entering into a contract for the construction or the substantial rehabilitation
    of a residential building, a residential contractor shall provide the owner with
    notice of the contractor''s right to offer to resolve any alleged construction
    defect before the owner may commence a dwelling action or arbitration proceedings
    against the contractor. The contractor may include the notice in the contract
    or provide the notice as a separate document delivered at the time the owner signs
    the contract. The notice shall be conspicuous and in substantially the following
    form:

    OHIO LAW CONTAINS IMPORTANT REQUIREMENTS YOU MUST FOLLOW BEFORE YOU MAY FILE A
    LAWSUIT OR COMMENCE ARBITRATION PROCEEDINGS FOR DEFECTIVE CONSTRUCTION AGAINST
    THE RESIDENTIAL CONTRACTOR WHO CONSTRUCTED YOUR HOME. AT LEAST SIXTY DAYS BEFORE
    YOU FILE A LAWSUIT OR COMMENCE ARBITRATION PROCEEDINGS, YOU MUST PROVIDE THE CONTRACTOR
    WITH A WRITTEN NOTICE OF THE CONDITIONS YOU ALLEGE ARE DEFECTIVE. UNDER CHAPTER
    1312. OF THE OHIO REVISED CODE, THE CONTRACTOR HAS AN OPPORTUNITY TO OFFER TO
    REPAIR OR PAY FOR THE DEFECTS. YOU ARE NOT OBLIGATED TO ACCEPT ANY OFFER THE CONTRACTOR
    MAKES. THERE ARE STRICT DEADLINES AND PROCEDURES UNDER STATE LAW, AND FAILURE
    TO FOLLOW THEM MAY AFFECT YOUR ABILITY TO FILE A LAWSUIT OR COMMENCE ARBITRATION
    PROCEEDINGS.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.03
- number: '1312.04'
  heading: Notice to contractor of alleged defects prior to action
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: '(A) No owner shall commence arbitration proceedings or file a dwelling action
    against a residential contractor unless, at least sixty days before commencing
    the proceedings or filing the action, the owner provides the contractor with written
    notice of the construction defect that would be the basis of the arbitration proceedings
    or the dwelling action. The notice shall be in writing and mailed, sent by telegram,
    delivered in person, or sent by any means the contractor has indicated communications
    may be sent, including facsimile transmission and electronic mail. The notice
    shall substantially comply with the requirements set forth in division (B) of
    this section.

    (B) Any notice that an owner provides to a contractor pursuant to this section
    shall substantially do all of the following:

    (1) Assert a claim involving a construction defect by itemizing and describing
    those construction defects;

    (2) Include or attach a copy of any documentation concerning the construction
    defects prepared by a person who inspected the residential building for the owner;

    (3) Include the name, address, and telephone number of the owner and the contractor
    and the address of the building that is the subject of the claim.

    (C) After receiving a notice of defects, a contractor may request an owner to
    provide a description of the cause of the defects and the nature and extent of
    repairs necessary to remedy the defects. An owner may provide this information
    if the owner has knowledge of the cause of the defects and the repairs necessary
    to remedy those defects.

    (D) If a contractor files a mechanics lien or commences any type of arbitration
    proceedings or legal action against an owner, this chapter does not apply, and
    the owner immediately may counterclaim, commence arbitration proceedings, or file
    a dwelling action against the contractor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.04
- number: '1312.05'
  heading: Contractor's response to notice of defects - offer to inspect or settle
    claim
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: '(A) A residential contractor shall provide the owner with a good faith written
    response to any notice provided pursuant to section 1312.04 of the Revised Code.
    The response shall be provided within twenty-one days after the owner mailed the
    notice, delivered it by personal delivery, or transmitted it by telegram, facsimile,
    or electronic mail. In the response, the contractor shall offer to take one of
    the following actions:

    (1) Inspect the residential building that is the subject of the claim;

    (2) Compromise and settle the claim without an inspection;

    (3) Dispute the claim.

    (B) If a contractor fails to respond as required by division (A) of this section
    or disputes the claim, an owner is deemed to have complied with this chapter and
    may commence arbitration proceedings or file a dwelling action without further
    notice to the contractor.

    (C)(1) If an owner rejects a contractor''s offer to inspect the property or to
    compromise and settle a claim, the owner shall notify the contractor of that rejection
    within fourteen days after receiving the contractor''s offer. The rejection notice
    shall be in writing and include a reason for the rejection.

    (2) After providing a rejection notice, an owner has complied with this chapter
    and may commence arbitration proceedings or file a dwelling action without further
    notice to the contractor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.05
- number: '1312.06'
  heading: Owner's acceptance of contractor's offer - inspection - action by owner
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: '(A) If an owner accepts a residential contractor''s offer to inspect the
    residential building, the owner shall notify the contractor of that acceptance
    within fourteen days. After accepting the offer to inspect, the owner shall allow
    the contractor reasonable access to the building during normal working hours.
    The contractor shall inspect the building within fourteen days after the owner
    accepts the offer. The contractor shall take reasonable measures to determine
    the nature and cause of the construction defects and the appropriate remedy. The
    measures the contractor takes may include, but are not limited to, testing.

    (B) Within ten days after a residential contractor conducts an inspection as described
    in this section, the contractor shall provide the owner with one of the following:

    (1) A written offer to remedy the defects at no cost to the owner. The offer shall
    be accompanied by an inspection report, a prediction of the additional construction
    work necessary to remedy each defect, and a timetable for completing the work
    necessary to remedy the defects.

    (2) A written offer to settle the claim;

    (3) A written statement asserting that the contractor does not intend to remedy
    the defects.

    (C) An owner has complied with this chapter and may commence arbitration proceedings
    or file a dwelling action without further notice to the contractor if any of the
    following occur:

    (1) The contractor does not inspect the property within fourteen days after the
    owner accepts the offer to inspect.

    (2) Following an inspection, the contractor does not provide a written response.

    (3) The contractor responds that the contractor does not intend to remedy the
    defects.

    (4) The contractor fails to remedy the defects in the manner the contractor describes
    or within the timetable the contractor provides.

    (D) If a residential contractor makes or provides for repairs or replacements
    to remedy a construction defect, the contractor may take reasonable steps to document
    the repair or replacement and to inspect the repair or replacement or have it
    inspected.

    (E) If an owner accepts an offer that a residential contractor makes in compliance
    with this chapter to compromise and settle the claim, to remedy the defects, or
    to settle the claim and the contractor fulfills that offer in compliance with
    this chapter, the owner is barred from bringing a dwelling action or commencing
    arbitration proceedings for the claim.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.06
- number: '1312.07'
  heading: Commencement of arbitration or action by owner
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: Unless otherwise indicated in this chapter, an owner has complied with this
    chapter and may commence arbitration proceedings or file a dwelling action sixty
    days after the owner mails, delivers, sends by facsimile transmission or electronic
    mail, or otherwise provides the residential contractor with a defect notice pursuant
    to division (A) of section 1312.04 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.07
- number: '1312.08'
  heading: Tolling of statutes of limitation and repose - dismissal - application
    of chapter
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1312'
    name: Residential Contractor Right to Cure
  text: '(A) All applicable statutes of limitation or repose are tolled from the time
    the owner sends a notice of defect to a contractor pursuant to section 1312.04
    of the Revised Code until the owner has complied with this chapter.

    (B) If an owner files a dwelling action or commences arbitration proceedings without
    having complied with this chapter, the court or arbitrator shall dismiss that
    action or those proceedings without prejudice. The owner may again file a dwelling
    action or commence arbitration proceedings after complying with this chapter.

    (C) This chapter does not apply to any civil action in tort alleging personal
    injury or wrongful death to a person resulting from a construction defect.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1312.08
- number: '1313.01'
  heading: Assignee's bond
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When a person, partnership, association, or corporation, makes an assignment
    to a trustee of property, money, rights, or credits, in trust for the benefit
    of creditors, within ten days after the delivery of the assignment to him and
    before disposing of any property so assigned, such assignee shall appear before
    the probate judge of the county in which the assignor resided at the time of executing
    the assignment, produce the original assignment, or a copy of it, cause it to
    be filed in the probate court, and enter into a bond, payable to the state, in
    such sum and with such sureties as the court approves, conditioned for the faithful
    performance of his duties. The court may require the assignee, or any trustee
    subsequently appointed, to execute an additional bond whenever the interests of
    the creditors of the assignor demand it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.01
- number: '1313.02'
  heading: Effective time of assignment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: An assignment for the benefit of creditors as provided in section 1313.01
    of the Revised Code is effective only from the time of its delivery to the probate
    judge, and the exact time of such delivery shall be indorsed thereon by the judge,
    who immediately shall note the filing on the journal of the court. Such assignment
    may be delivered by the assignor to the judge either before or after its delivery
    to the assignee.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.02
- number: '1313.03'
  heading: Appointment of a trustee
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: If ten days after the execution of an assignment for the benefit of creditors,
    the original or a copy of it has not been filed in the probate court, or if the
    assignee named thereon fails for that time to give bond, on application of the
    assignor, or any of his creditors, the court shall make an order removing such
    assignee and appoint a trustee in his place. If more than one assignee is named
    in the assignment, and some fail to give bond, the court may permit the assignee
    complying with sections 1313.01 and 1313.02 of the Revised Code to qualify and
    enter upon the discharge of the duties of the trust.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.03
- number: '1313.04'
  heading: Resignation
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: 'An assignee or trustee for the benefit of creditors appointed by the probate
    court, who has qualified, may resign his trust with the consent of the court.
    In case of the death, removal, or resignation of a sole assignee or trustee, the
    court shall appoint one or more trustees in his place.

    If one or more assignees or trustees have not died, resigned, or been removed,
    the court either may fill the vacancy, or allow the remaining assignees or trustees,
    to execute the trust, as it deems best for the trust. At any time, on application
    of a majority of the creditors in amount, the court may appoint an additional
    trustee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.04
- number: '1313.05'
  heading: Election of trustee by creditors
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When a creditor of an assignor provided for in section 1313.01 of the Revised
    Code, files a complaint alleging that the assignees named in the deed of assignment,
    or the trustees appointed by the probate court, for the benefit of creditors are
    not suitable persons to administer the trust, or that their administration thereof
    will not be for the best interests of the creditors and assignor, the court thereupon
    shall issue a citation to such assignees, or trustees, and to the assignor if
    resident within the state, to appear before it at a time to be named in the citation.
    If, on the hearing, it appears to the court that such complaint is true, and a
    petition is filed with the court, signed by creditors of the assignor, who own
    not less than one thousand dollars of debts against him, and their validity is
    shown by the schedule of debts on file or otherwise established to its satisfaction,
    praying for permission to elect trustees, the court by its order shall fix a time
    for such election and cause notices to be sent by mail or otherwise to each creditor
    of the assignor, specifying a time when the creditors shall meet at the courtroom
    for the election of trustees.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.05
- number: '1313.06'
  heading: Proceedings
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: 'At an election under section 1313.05 of the Revised Code creditors representing
    fifty per cent or more of the debts of the assignor, present or represented by
    attorney, may proceed to the election of trustees for the benefit of creditors,
    a majority in value of all the debts represented at such meeting being necessary
    to a choice.

    The proceedings of the meeting showing what creditors were present, the amount
    of the debts held by them respectively, and who cast their several votes must
    be made out and signed by the president and secretary of the meeting and filed
    with the probate court.

    If the court approves the choice, and the trustees elected appear within ten days
    thereafter and give bond, the court shall appoint them as trustees, and remove
    the preceding assignee or trustee.

    The summary determination of the court as to who are creditors and the amount
    of their claims under section 1313.05 of the Revised Code, has no effect as to
    the validity of such claims, except for the purpose of such election.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.06
- number: '1313.07'
  heading: Removal of assignee or trustee
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: The probate court may remove an assignee or trustee for the benefit of creditors,
    specifying in the order the cause of removal.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.07
- number: '1313.08'
  heading: Application for release by surety - hearing
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: A surety of an assignee or trustee for the benefit of creditors, or the executor
    or administrator of such surety, at any time may make application to the probate
    court to be released from the bond of such assignee or trustee, by filing his
    written request therefor with the judge of such court, and giving at least five
    days' notice, in writing, to such assignee or trustee. If, upon the hearing, the
    court is of opinion that there is good reason therefor, it shall release such
    surety. The death of a surety is good cause for release.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.08
- number: '1313.09'
  heading: Application by trustee for release of surety - hearing
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: An assignee or trustee for the benefit of creditors at any time may make application
    to the probate court for the release of his sureties, by filing his written request
    with the judge of such court, and giving at least five days' notice, in writing,
    to such sureties. If, upon the hearing, the court is of opinion that there is
    good reason to release said sureties it shall order said assignee or trustee to
    file an account, as provided by law, and said sureties shall be released upon
    said assignee or trustee filing a new bond and its approval by the court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.09
- number: '1313.10'
  heading: Removal for failure to give new bond
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: If an assignee or trustee for the benefit of creditors fails to give new bond,
    as directed by the probate court, he must be removed and his letters superseded.
    The original sureties shall not be released until the assignee or trustee gives
    new bond, but the original sureties are liable for said assignee or trustee's
    acts only from the time of executing the original bond to the filing and approval
    by the court of the new bond.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.10
- number: '1313.11'
  heading: Trustee to give bond
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When the probate court appoints a trustee for the benefit of creditors, whether
    in place of an assignee or of a trustee previously appointed, such trustee, within
    ten days after his appointment, shall give bond or, failing to do so, he may be
    considered as declining the appointment, and the place shall be filled. When a
    trustee has given bond, he succeeds to all the rights, powers, and privileges
    of the preceding assignee or trustee. The court may make and enforce all orders
    necessary to put him into possession of all property, moneys, books, papers, evidences
    of title, and other effects covered by the assignment, or in any way belonging
    to the trust. By suit in the court of common pleas, or otherwise, such trustee
    may compel the delivery to him of all such property, moneys, books, papers, evidences
    of title, and other effects.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.11
- number: '1313.12'
  heading: Settlement on resignation, removal, or death
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: On the resignation or removal of an assignee or trustee for the benefit of
    creditors, he shall file and settle his account without delay, and on the death
    of such assignee or trustee, his legal representative must file and settle such
    account without delay. Immediately after the settlement, the assignee or trustee,
    or his legal representative, shall pay over to his successor all moneys found
    due from him to the trust. On failure to do so, or to file and settle such account,
    or deliver over to his successor all property, moneys, books, evidences of title,
    papers, and other effects belonging to the trust, such successor may proceed against
    such assignee or trustee by action in the court of common pleas or otherwise,
    on his bond or his legal representative and the sureties in such bond.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.12
- number: '1313.13'
  heading: Appointment and qualification to operate as a conveyance
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When the probate court appoints a trustee for the benefit of creditors to
    act in place of the assignee of a debtor, the appointment and qualification of
    the trustee operates as a conveyance to him of all the property originally assigned
    to such assignee.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.13
- number: '1313.14'
  heading: Notice of appointment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Each assignee or trustee for the benefit of creditors appointed on the failure
    of the assignee of a debtor to qualify, within thirty days after giving bond,
    must give notice of his appointment in some newspaper of general circulation in
    the county, for three successive weeks.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.14
- number: '1313.15'
  heading: Appointment of appraisers
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Immediately upon the assignee of a debtor giving bond, or if said assignee
    fails to give bond, then upon the trustee for the benefit of creditors giving
    bond, the probate court shall appoint three suitable disinterested persons appraisers
    of the property and assets of the assignor. Such assignee or trustee, within thirty
    days after giving bond, unless for good cause the court allows a longer time,
    must make and file therein an inventory, verified by his oath, of all the property,
    moneys, rights, and credits of the assignor included in the assignment, which
    have come to his possession or knowledge, together with an appraisement thereof
    by such appraisers under oath. If any part of the estate or effects is in any
    other county, the assignee or trustee may have appraisers, as to such part of
    the estate and effects, appointed by the probate judge of such county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.15
- number: '1313.16'
  heading: Real property without the state
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: If the assignment for the benefit of creditors, includes real property situated
    without this state, it is not necessary to have it appraised, but the assignee,
    or trustee appointed, shall sell such real property at public or private sale,
    and the sale shall be confirmed, if the court finds that it has been made in good
    faith for a fair price. At the time of filing the inventory as provided in section
    1313.15 of the Revised Code, the assignee or trustee also must file a schedule
    of all the debts and liabilities of the assignor within his knowledge, which shall
    be verified by the oath of the assignee or trustee, and contain the post-office
    address of each of the alleged creditors, so far as this can be given.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.16
- number: '1313.17'
  heading: Exempt property excepted from assignment
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: 'No assignment for the benefit of creditors shall include or cover any property
    exempt from levy or sale on execution, or exempt from being applied to the payment
    of debts by any legal process, unless in the assignment the exemption is expressly
    waived.

    No such assignment shall include any property belonging to the wife of the assignor,
    nor require the assignor to deliver up any of such property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.17
- number: '1313.18'
  heading: Homestead
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Appraisers appointed under section 1313.15 of the Revised Code, shall set
    off in the way that appraisers of property levied on or attached are required
    to do, exempt property that has to be selected by the debtor. If the setting off
    is omitted, at any time after the appraisal and before sale, the court may order
    it to be done by the appraisers.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.18
- number: '1313.19'
  heading: Orders to prevent fraudulent transfer
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: The probate judge, at any time before the final settlement of the accounts
    of an assignee for the benefit of creditors, may require his attendance, or that
    of any other person as a witness, and examine him upon oath, as to all matters
    appertaining to the estate of the assignor or to the administration of the trust,
    and, upon or after such examination, make and enforce any orders upon proper parties,
    which said judge deems necessary to prevent a fraudulent transfer or change in
    the property or effects of the assignor or the allowance or payment of any unjust
    or fraudulent claim out of his estate.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.19
- number: '1313.20'
  heading: Examination of assignor
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: On application of an assignee for the benefit of creditors or of a creditor,
    or without application, the probate judge may require the assignor, upon reasonable
    notice, to attend and submit to an examination on oath as to the disposal of his
    property, his trade and dealings with others, and his accounts concerning them,
    as to all debts due or claimed from him, and to all other matters concerning his
    property and estate, and the due settlement thereof, which examination, at the
    request of any party to the proceeding, may be reduced to writing.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.20
- number: '1313.21'
  heading: Duties of assignee or trustee of insolvent debtor
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: An assignee or trustee for the benefit of creditors shall convert the assets
    received by him into money, and shall sell the real and personal property assigned,
    including stocks and such bonds, notes, and other claims as are not due and which
    probably cannot be collected within a reasonable time, at public auction, either
    for cash or upon such other terms as the probate court orders.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.21
- number: '1313.22'
  heading: Sale of real property
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Notice of the time and place of the sale of real property assigned for the
    benefit of creditors, shall be given by advertisement in some newspaper of general
    circulation in the county where such property is situated, for four consecutive
    weeks. The real property shall not be sold for less than two thirds of the appraised
    value thereof, but shall be subject to reappraisement as upon execution at law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.22
- number: '1313.23'
  heading: Sale of personal property
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Notice of the time and place of the sale of personal property assigned for
    the benefit of creditors, shall be given for at least ten days prior to the day
    of sale, by advertisement in some newspaper of general circulation in the county,
    or by posting written or printed notices thereof in at least fifteen public places
    in the county, not less than five of which must be posted in the township in which
    the sale is to be held.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.23
- number: '1313.24'
  heading: Court may order private sale of property
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When the probate court is satisfied that it would be for the advantage of
    the creditors of the assignor to sell part, or all, of the real or personal property
    in this state assigned for the benefit of creditors at private sale, it may authorize
    the assignee or trustee for the benefit of creditors to sell it either for cash
    or upon such other terms as the court orders. No real property lying in this state
    shall be sold for less than two thirds of its appraised value, nor shall any personal
    property be sold for less than two thirds of its appraisement, unless upon good
    cause shown the court orders the assignee or trustee to sell it for a less amount.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.24
- number: '1313.25'
  heading: Property to be sold at auction if not disposed of privately
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Any property, ordered to be sold by the probate court at private sale under
    section 1313.24 of the Revised Code, not sold within the time prescribed, shall
    be ordered to be sold at public auction, as though a private sale had not been
    ordered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.25
- number: '1313.26'
  heading: Compromise or sale of claims
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: With the approval of the probate court an assignee or trustee for the benefit
    of creditors may compromise or sell any claim or demand, due or owing to the assignor,
    which is desperate or difficult of collection, and also, with like approval, complete
    and enforce all sales of the real property made by the assignor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.26
- number: '1313.27'
  heading: Return and confirmation of sales
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Reports of sales of real property and personal property made under sections
    1313.21 to 1313.31, inclusive, of the Revised Code shall be returned to the probate
    court within the time prescribed. After having carefully examined the return,
    if satisfied that the sale has been legally made, the court shall confirm it and
    order the assignee or trustee to make a deed to the purchaser for the property
    sold. The court also may require in the order that deferred installments of the
    purchase money be secured by mortgage before delivery of such deed. When the buyer
    offers to pay the full amount of the purchase money in cash, if best for the interests
    of the creditors of the assignor, the court may order that it be accepted, and
    direct its distribution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.27
- number: '1313.28'
  heading: Sale of notes
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: If it is for the best interests of the creditors of the assignor, the probate
    court may order the assignee or trustee for the benefit of creditors to sell without
    recourse any notes taken for deferred payments at not less than their face value
    with accrued interest, and direct the distribution of the proceeds.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.28
- number: '1313.29'
  heading: Dower right of spouse
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When real property is to be sold as provided in sections 1313.21 to 1313.31,
    inclusive, of the Revised Code, the husband or wife of the assignor may be made
    a party, and file an answer in the probate court to have such real property sold
    free of his or her contingent right of dower and to allow him or her in lieu thereof,
    out of the proceeds of the sale, such sum of money as the court deems the just
    and reasonable value of the dower interest therein. Such answer has the force
    and effect, in all respects, of a deed releasing such contingent dower interest
    in such real property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.29
- number: '1313.30'
  heading: Court may order sale of mortgaged real property
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When the assignor and his wife jointly have executed a mortgage upon real
    property assigned for the benefit of creditors, or when the assignor alone has
    executed a mortgage upon any of such real property to secure the payment of purchase
    money, or a part thereof, the probate court shall order its sale free from the
    contingent right of dower of such wife, and shall determine the just and reasonable
    value of her dower interests in the proceeds of sale remaining after the payment
    of such encumbrances as preclude her right to dower therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.30
- number: '1313.31'
  heading: Court may order business of assignor carried on
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When satisfied that it would be for the advantage of the creditors of the
    assignor, and on written application therefor by three-fourths in number and amount
    of such creditors, the probate court may order any business carried on by the
    assignor at the time of the assignment, to be continued by the assignee or trustee.
    When the court deems it to the advantage of the creditors to discontinue the business,
    it shall order that to be done, and also allow to the assignee or trustee for
    the benefit of creditors such compensation for conducting it, as may be just,
    in addition to the fees allowed by sections 1313.50 and 1313.51 of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.31
- number: '1313.32'
  heading: Payment of liens
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: The probate court shall order the payment of all encumbrances and liens upon
    any property sold for the benefit of creditors, or rights and credits collected,
    out of the proceeds thereof, according to priority.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.32
- number: '1313.33'
  heading: Questions of title - sale of premises
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: 'When real property to be sold, or which has been contracted to be sold by
    an assignor prior to the assignment for the benefit of creditors, is encumbered
    with liens, or when questions in regard to the title, or the dower estate of the
    wife or widow of the assignor, require a decree to settle them, the assignee may
    commence a civil action therefor in the court of common pleas or probate court
    of the proper county, making all persons in interest, including the wife or widow
    of the assignor, parties.

    Upon hearing, the court shall order a sale of the premises, or the completion
    of such contracts of sale, the payment of encumbrances and the contingent dower
    interest of the wife or widow, subject to section 1313.35 of the Revised Code,
    and determine the questions involved as to title to the property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.33
- number: '1313.34'
  heading: Disposition of proceeds of sale
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: The proceeds of all the real property of the assignor sold by court order
    for the benefit of creditors, after payment of liens, encumbrances and the contingent
    dower rights and interest of his wife or widow, must be reported to the probate
    court by the assignee, and disposed of as provided in sections 1313.01 to 1313.59,
    inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.34
- number: '1313.35'
  heading: Application of sections
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Sections 1313.21 to 1313.31, inclusive, of the Revised Code relating to the
    wife of the assignor as a party to the proceedings thereunder and her rights by
    virtue thereof, and also relating to ordering property sold at private sale, and
    upon terms of credit, apply to proceedings under sections 1313.33 and 1313.34
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.35
- number: '1313.36'
  heading: Homestead exemptions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Sections 1313.21 to 1313.35 of the Revised Code do not impair the right of
    a person to an exemption under division (A)(1) of section 2329.66 of the Revised
    Code, or the mode provided for enforcing the right.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.36
- number: '1313.37'
  heading: Jurisdiction of court in action to foreclose mortgage or quiet title
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Sections 1313.01 to 1313.59, inclusive, of the Revised Code do not take away
    or limit the jurisdiction of any court of record in which an action to foreclose
    a mortgage, to quiet title, or in any way to affect the title to or possession
    of all or part of the real property assigned is pending, at date of an assignment
    for the benefit of creditors. In such action the assignee may be made a party,
    with right to defend, and have such decrees, orders, or judgments, as are necessary
    for the proper administration of his trust, in any surplus after paying liens
    thereon, asserted in the action.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.37
- number: '1313.38'
  heading: Petition to have land laid out into lots
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When an assignee or trustee for the benefit of creditors commences an action,
    in the court of common pleas or probate court of the proper county, to sell real
    property, making all persons in interest parties thereto, and at the time fixed
    for hearing his petition the court is satisfied that all parties in interest have
    been notified of its pendency, and that such land ought to be sold, if the petition
    seeks to have it or any part thereof laid out in lots, and the court finds it
    will be to the advantage of all parties in interest to have this done, it also
    shall authorize the survey and platting of the land. If it approves the survey
    and plat made for that purpose, the court shall authorize the assignee or trustee,
    on behalf of all the parties in interest, to sign, seal, and acknowledge the plat
    in that behalf for record.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.38
- number: '1313.39'
  heading: Presentation of claims
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Creditors must present their claims within six months after publication of
    the notice provided for in section 1313.14 of the Revised Code, unless further
    time is given by the probate court for their allowance. The assignee or trustee
    for the benefit of creditors shall indorse his allowance or rejection thereon.
    Persons whose claims are rejected are required to bring suit against such assignee
    or trustee to enforce such claims within thirty days after they were rejected.
    If a claimant recovers, the judgment shall be against the assignee or trustee,
    that he allow the claim in settlement of his trusts, with or without the costs,
    as the court deems right.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.39
- number: '1313.40'
  heading: Report of claims
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Immediately after the expiration of six months time, within which creditors
    must present their claims, the assignee or trustee for the benefit of creditors
    must file in the probate court a report of all claims presented to him for allowance,
    their several amounts, the date from which, and the rate at which they are entitled
    to interest, specifying claims allowed and those rejected, with the date of allowance
    or rejection, what claims are held under advisement, and the post-office address
    of each creditor whose claim is allowed or rejected.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.40
- number: '1313.41'
  heading: Requisition to have claim disallowed
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: If the assignor or a creditor files in the probate court a written requisition
    on the assignee or trustee for the benefit of creditors to disallow any claims
    presented which he has not reported as disallowed, and enters into bond to said
    assignee or trustee in such amount and with such sureties as the court approves,
    conditioned to pay all the costs and expenses of contesting them by the order
    of the court, such claims shall be disallowed, although theretofore allowed by
    the assignee or trustee. The assignee or trustee must forthwith give written notice
    thereof to the creditors, or their attorneys, whose claims are so disallowed.
    Thereupon the same proceedings shall be had as required in other cases of disallowance
    under sections 1313.39 and 1313.40 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.41
- number: '1313.42'
  heading: Affidavit to be filed with claim
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Each person presenting and filing a claim against the estate of the debtor,
    before it is allowed or any payments made thereon, must make and file an affidavit
    setting forth that the claim is just and lawful, the consideration thereof, and
    what counterclaims exist thereto; what collateral or personal security the claimant
    holds for the claim, or that he has no security. The assignee or trustee for the
    benefit of creditors, or a creditor may examine the claimant under oath touching
    such collateral or other security, or any other matter relating to his claim,
    within such time and under such regulations as are prescribed by the probate judge.
    A surety of, or person jointly liable with, the assignor, may be allowed to present
    and prove the claim on which he is so bound; but the dividend thereon shall be
    payable to the party holding it. If the latter proves such claim, then the allowance
    and dividend on it must be as proved by him.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.42
- number: '1313.43'
  heading: Preferred claims
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Taxes of every description assessed against the assignor upon personal property
    held by him before his assignment for the benefit of creditors must be paid by
    the assignee or trustee out of the proceeds of the property assigned in preference
    to any other claims against the assignor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.43
- number: '1313.44'
  heading: Liens and securities
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Persons who have performed labor in the service of the assignor within twelve
    months next preceding an assignment for the benefit of creditors, are entitled
    to receive out of the trust funds, before the paying of other creditors, the full
    amount of wages due for such labor not exceeding three hundred dollars. This section
    and section 1313.43 of the Revised Code do not prejudice or affect securities
    given, or liens obtained in good faith, for value, but judgments by confession
    on warrants of attorney rendered within two months prior to such assignment, or
    securities given within such time to create a preference among creditors, or to
    secure a pre-existing debt other than upon real property for the purchase money
    thereof, are of no force or validity as against such claims for labor, in case
    of assignment, to the extent provided in this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.44
- number: '1313.45'
  heading: Reports and settlements
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: An assignee or trustee for the benefit of creditors must file an account with
    the probate court at the expiration of eight months from his appointment and qualification,
    and as often thereafter as the court orders. Such account shall contain a full
    exhibit of all his doings as such, up to the time of filing, together with the
    amount of all claims remaining uncollected, and the amount thereof which in his
    opinion may thereafter be collected. Exceptions may be filed to the accounts by
    parties interested, in the manner provided in cases of accounts of administrators
    or executors. Such accounts shall be examined and the exceptions thereto heard
    by the court, in the manner provided for the settlement of the estates of deceased
    persons. Upon the filing of such accounts, the court shall fix a time for the
    hearing, and publish notice thereof as in the case of the filing of the account
    of an executor or administrator.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.45
- number: '1313.46'
  heading: Notice of filing accounts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: The probate judge shall cause notice of the filing of accounts by assignees
    or trustees for the benefit of creditors, and commissioners of insolvents, to
    be published in some newspaper of the county, specifying when such accounts will
    be heard, not less than three weeks after the publication of such notice, at which
    time it shall be competent, for cause, to allow further time to file exceptions
    to such accounts. The costs of such notice, if more than one account is specified
    in the same notice, must be paid in equal proportions by the assignees, trustees,
    or commissioners respectively.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.46
- number: '1313.47'
  heading: Examination of accounts
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: The probate judge may examine under oath, all assignees or trustees for the
    benefit of creditors and commissioners of insolvents, touching their accounts.
    Such judge may reduce such examination to writing, and require such assignee,
    trustee, or commissioner to sign it. Such examination must be filed with the papers
    in the case.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.47
- number: '1313.48'
  heading: Dividends
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: When, on settlement, a balance is shown in the hands of the assignee or trustee
    for the benefit of creditors, subject to distribution among the general creditors,
    a dividend shall be declared by the probate judge, payable therefrom equally among
    all the creditors entitled, in proportion to the amount of their respective claims
    against the assignor, including those disallowed, which the claimant has begun
    suit to establish as required in section 1313.39 of the Revised Code, and claims
    held under advisement. Notice of the making of such dividend, and the time and
    place of its payment, shall be given by advertisement once, in a newspaper published
    and of general circulation in the county in which such trust is administered,
    and in such other way as the court orders. A report must be made within sixty
    days after the date fixed of the dividends paid and of those uncalled for and
    unpaid at that time. The court then shall cause a new notice to be given to the
    owners of unpaid dividends, in such way as it directs. If not demanded within
    twelve months thereafter, such dividends must be divided pro rata among the other
    creditors, until they are paid in full, and any remainder paid to the assignor
    or his legal representatives.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.48
- number: '1313.49'
  heading: Dividends reserved
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Dividends provided for in section 1313.48 of the Revised Code reserved for
    claims disallowed, or held under advisement, when actions to enforce their allowance
    have been commenced, shall be held until the actions terminate, when they shall
    be paid on claims the allowance of which has been ordered. Otherwise, such dividends
    must be distributed pro rata among other creditors not paid in full, or refunded
    to the assignor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.49
- number: '1313.50'
  heading: Commissions of assignees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: 'Before a dividend provided for in section 1313.48 of the Revised Code is
    declared, the assignee or trustee for the benefit of creditors may be allowed
    the following commission upon the amount of the personal estate collected and
    accounted for by him, and of the proceeds of the real property sold under an order
    of court for the payment of debts, which must be received in full compensation
    of all his ordinary services:

    (A) For the first thousand dollars, at the rate of six per cent;

    (B) For all above one thousand dollars and not exceeding five thousand dollars,
    at the rate of four per cent;

    (C) For all above five thousand dollars, at the rate of two per cent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.50
- number: '1313.51'
  heading: Further allowances - counsel fees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: Such allowance shall be made as the probate court considers just for necessary
    expense, extraordinary expenses, extraordinary services not required of an assignee
    for the benefit of creditors in the common course of his duty, and such reasonable
    counsel fees as were necessary for the proper administration of the assignment,
    whether performed by the assignee or trustee as attorney, or such other as he
    employs. No such further allowance, extraordinary expenses or services, or attorney
    fees, shall be made unless a bill of items is filed, showing such actual and necessary
    or extraordinary expenses and services, or attorney fees, together with the affidavit
    of the person incurring such expenses or performing such services, that they were
    done for, and were necessary to, the assignment; that the amount charged therefor
    is reasonable, and not more than is usually paid for such services. When such
    services have been performed by persons other than the assignee or trustee, the
    latter also must file an affidavit, stating that such services were necessary
    for the proper administration of the assignment, that they were performed under
    his direction, that the charges therefor are fair and reasonable, and that the
    full amount thereof has been paid to the party performing such services.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1313.51
- number: '1313.52'
  heading: Fees of probate judge
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1313'
    name: Voluntary Assignments
  text: 'The probate judge shall be entitled to the following fees for service performed
    under sections 1313.01 to 1313.59, inclusive, of the Revised Code:

    (A) For hearing and deciding each application, two dollars;

    (B) For appointing or removing an assignee or trustee, one dollar;

    (C) For filing assignment, inventory, and schedule, each, ten cents;

    (D) For filing other papers, each five cents;

    (E) For other services, the same compensation as for like services, in the settlement
    of the estate of deceased persons.'
