- number: '1315.24'
  heading: Investigation of violations - hearings - injunctive relief
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: '(A) The superintendent of financial institutions may make any investigation
    and conduct any hearing the superintendent considers necessary to determine whether
    any person has violated sections 1315.21 to 1315.28 of the Revised Code, or has
    engaged in conduct that would justify the suspension, revocation, or refusal of
    an original or renewal check-cashing license.

    (B) In making any investigation or conducting any hearing pursuant to this section,
    the superintendent, or any person designated by the superintendent, at any time
    may compel by subpoena witnesses, may take depositions of witnesses residing without
    the state in the manner provided for in civil actions, pay any witnesses the fees
    and mileage for their attendance provided for under section 119.094 of the Revised
    Code, and administer oaths. The superintendent also may compel by order or subpoena
    duces tecum the production of, and examine, all relevant books, records, accounts,
    and other documents. If a person does not comply with a subpoena or subpoena duces
    tecum, the superintendent may apply to the court of common pleas of Franklin county
    for an order compelling the person to comply with the subpoena or subpoena duces
    tecum or, for failure to do so, an order to be held in contempt of court. If the
    person is licensed under section 1315.23 of the Revised Code, the superintendent
    also may suspend, revoke, or refuse an original or renewal license.

    (C) In connection with any investigation under this section, the superintendent
    may file an action in the court of common pleas of Franklin county or the court
    of common pleas of the county in which the person who is the subject of the investigation
    resides, or is engaging in or proposing to engage in actions in violation of sections
    1315.21 to 1315.28 of the Revised Code, to obtain an injunction, temporary restraining
    order, or other appropriate relief.'
