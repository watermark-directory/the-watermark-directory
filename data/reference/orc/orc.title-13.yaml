- number: '1309.524'
  heading: Delay by filing office - UCC 9-524
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'Delay by the filing office beyond a time limit prescribed by sections 1309.501
    to 1309.527 of the Revised Code is excused if:

    (A) The delay is caused by interruption of communication or computer facilities,
    war, emergency conditions, failure of equipment, or other circumstances beyond
    control of the filing office; and

    (B) The filing office exercises reasonable diligence under the circumstances.'
