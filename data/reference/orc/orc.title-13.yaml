- number: '1309.709'
  heading: Priority - UCC 9-709
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) This chapter determines the priority of conflicting claims to collateral.
    However, if the relative priorities of the claims were established before July
    1, 2001, the law in effect at the time the priorities of the claims were established
    determines priority.

    (B) For purposes of division (A) of section 1309.322 of the Revised Code, as it
    exists on July 1, 2001, the priority of a security interest that becomes enforceable
    under section 1309.203 of the Revised Code, as it exists on July 1, 2001, dates
    from July 1, 2001, if the security interest is perfected under this chapter by
    the filing of a financing statement before July 1, 2001, that would not have been
    effective to perfect the security interest under the law in effect at the time
    of the filing. This division does not apply to conflicting security interests
    each of which is perfected by the filing of such a financing statement.'
