- number: '1347.09'
  heading: Disputing information
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1347'
    name: Personal Information Systems
  text: '(A)(1) If any person disputes the accuracy, relevance, timeliness, or completeness
    of personal information that pertains to him and that is maintained by any state
    or local agency in a personal information system, he may request the agency to
    investigate the current status of the information. The agency shall, within a
    reasonable time after, but not later than ninety days after, receiving the request
    from the disputant, make a reasonable investigation to determine whether the disputed
    information is accurate, relevant, timely, and complete, and shall notify the
    disputant of the results of the investigation and of the action that the agency
    plans to take with respect to the disputed information. The agency shall delete
    any information that it cannot verify or that it finds to be inaccurate.

    (2) If after an agency''s determination, the disputant is not satisfied, the agency
    shall do either of the following:

    (a) Permit the disputant to include within the system a brief statement of his
    position on the disputed information. The agency may limit the statement to not
    more than one hundred words if the agency assists the disputant to write a clear
    summary of the dispute.

    (b) Permit the disputant to include within the system a notation that the disputant
    protests that the information is inaccurate, irrelevant, outdated, or incomplete.
    The agency shall maintain a copy of the disputant''s statement of the dispute.
    The agency may limit the statement to not more than one hundred words if the agency
    assists the disputant to write a clear summary of the dispute.

    (3) The agency shall include the statement or notation in any subsequent transfer,
    report, or dissemination of the disputed information and may include with the
    statement or notation of the disputant a statement by the agency that it has reasonable
    grounds to believe that the dispute is frivolous or irrelevant, and of the reasons
    for its belief.

    (B) The presence of contradictory information in the disputant''s file does not
    alone constitute reasonable grounds to believe that the dispute is frivolous or
    irrelevant.

    (C) Following any deletion of information that is found to be inaccurate or the
    accuracy of which can no longer be verified, or if a statement of dispute was
    filed by the disputant, the agency shall, at the written request of the disputant,
    furnish notification that the information has been deleted, or furnish a copy
    of the disputant''s statement of the dispute, to any person specifically designated
    by the person. The agency shall clearly and conspicuously disclose to the disputant
    that he has the right to make such a request to the agency.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1347.09
- number: '1347.10'
  heading: Wrongful disclosure
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1347'
    name: Personal Information Systems
  text: '(A) A person who is harmed by the use of personal information that relates
    to him and that is maintained in a personal information system may recover damages
    in a civil action from any person who directly and proximately caused the harm
    by doing any of the following:

    (1) Intentionally maintaining personal information that he knows, or has reason
    to know, is inaccurate, irrelevant, no longer timely, or incomplete and may result
    in such harm;

    (2) Intentionally using or disclosing the personal information in a manner prohibited
    by law;

    (3) Intentionally supplying personal information for storage in, or using or disclosing
    personal information maintained in, a personal information system, that he knows,
    or has reason to know, is false;

    (4) Intentionally denying to the person the right to inspect and dispute the personal
    information at a time when inspection or correction might have prevented the harm.

    An action under this division shall be brought within two years after the cause
    of action accrued or within six months after the wrongdoing is discovered, whichever
    is later; provided that no action shall be brought later than six years after
    the cause of action accrued. The cause of action accrues at the time that the
    wrongdoing occurs.

    (B) Any person who, or any state or local agency that, violates or proposes to
    violate any provision of this chapter may be enjoined by any court of competent
    jurisdiction. The court may issue an order or enter a judgment that is necessary
    to ensure compliance with the applicable provisions of this chapter or to prevent
    the use of any practice that violates this chapter. An action for an injunction
    may be prosecuted by the person who is the subject of the violation, by the attorney
    general, or by any prosecuting attorney.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1347.10
- number: '1347.12'
  heading: Agency disclosure of security breach of computerized personal information
    data
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1347'
    name: Personal Information Systems
  text: '(A) As used in this section:

    (1) "Agency of a political subdivision" means each organized body, office, or
    agency established by a political subdivision for the exercise of any function
    of the political subdivision, except that "agency of a political subdivision"
    does not include an agency that is a covered entity as defined in 45 C.F.R. 160.103,
    as amended.

    (2)(a) "Breach of the security of the system" means unauthorized access to and
    acquisition of computerized data that compromises the security or confidentiality
    of personal information owned or licensed by a state agency or an agency of a
    political subdivision and that causes, reasonably is believed to have caused,
    or reasonably is believed will cause a material risk of identity theft or other
    fraud to the person or property of a resident of this state.

    (b) For purposes of division (A)(2)(a) of this section:

    (i) Good faith acquisition of personal information by an employee or agent of
    the state agency or agency of the political subdivision for the purposes of the
    agency is not a breach of the security of the system, provided that the personal
    information is not used for an unlawful purpose or subject to further unauthorized
    disclosure.

    (ii) Acquisition of personal information pursuant to a search warrant, subpoena,
    or other court order, or pursuant to a subpoena, order, or duty of a regulatory
    state agency, is not a breach of the security of the system.

    (3) "Consumer reporting agency that compiles and maintains files on consumers
    on a nationwide basis" means a consumer reporting agency that regularly engages
    in the practice of assembling or evaluating, and maintaining, for the purpose
    of furnishing consumer reports to third parties bearing on a consumer''s creditworthiness,
    credit standing, or credit capacity, each of the following regarding consumers
    residing nationwide:

    (a) Public record information;

    (b) Credit account information from persons who furnish that information regularly
    and in the ordinary course of business.

    (4) "Encryption" means the use of an algorithmic process to transform data into
    a form in which there is a low probability of assigning meaning without use of
    a confidential process or key.

    (5) "Individual" means a natural person.

    (6)(a) "Personal information" means, notwithstanding section 1347.01 of the Revised
    Code, an individual''s name, consisting of the individual''s first name or first
    initial and last name, in combination with and linked to any one or more of the
    following data elements, when the data elements are not encrypted, redacted, or
    altered by any method or technology in such a manner that the data elements are
    unreadable:

    (i) Social security number;

    (ii) Driver''s license number or state identification card number;

    (iii) Account number or credit or debit card number, in combination with and linked
    to any required security code, access code, or password that would permit access
    to an individual''s financial account.

    (b) "Personal information" does not include publicly available information that
    is lawfully made available to the general public from federal, state, or local
    government records or any of the following media that are widely distributed:

    (i) Any news, editorial, or advertising statement published in any bona fide newspaper,
    journal, or magazine, or broadcast over radio or television;

    (ii) Any gathering or furnishing of information or news by any bona fide reporter,
    correspondent, or news bureau to news media described in division (A)(6)(b)(i)
    of this section;

    (iii) Any publication designed for and distributed to members of any bona fide
    association or charitable or fraternal nonprofit corporation;

    (iv) Any type of media similar in nature to any item, entity, or activity identified
    in division (A)(6)(b)(i), (ii), or (iii) of this section.

    (7) "Political subdivision" has the same meaning as in section 2744.01 of the
    Revised Code.

    (8) "Record" means any information that is stored in an electronic medium and
    is retrievable in perceivable form. "Record" does not include any publicly available
    directory containing information an individual voluntarily has consented to have
    publicly disseminated or listed, such as name, address, or telephone number.

    (9) "Redacted" means altered or truncated so that no more than the last four digits
    of a social security number, driver''s license number, state identification card
    number, account number, or credit or debit card number is accessible as part of
    the data.

    (10) "State agency" has the same meaning as in section 1.60 of the Revised Code,
    except that "state agency" does not include an agency that is a covered entity
    as defined in 45 C.F.R. 160.103, as amended.

    (11) "System" means, notwithstanding section 1347.01 of the Revised Code, any
    collection or group of related records that are kept in an organized manner, that
    are maintained by a state agency or an agency of a political subdivision, and
    from which personal information is retrieved by the name of the individual or
    by some identifying number, symbol, or other identifier assigned to the individual.
    "System" does not include any collected archival records in the custody of or
    administered under the authority of the Ohio history connection, any published
    directory, any reference material or newsletter, or any routine information that
    is maintained for the purpose of internal office administration of the agency,
    if the use of the directory, material, newsletter, or information would not adversely
    affect an individual and if there has been no unauthorized external breach of
    the directory, material, newsletter, or information.

    (B)(1) Any state agency or agency of a political subdivision that owns or licenses
    computerized data that includes personal information shall disclose any breach
    of the security of the system, following its discovery or notification of the
    breach of the security of the system, to any resident of this state whose personal
    information was, or reasonably is believed to have been, accessed and acquired
    by an unauthorized person if the access and acquisition by the unauthorized person
    causes or reasonably is believed will cause a material risk of identity theft
    or other fraud to the resident. The disclosure described in this division may
    be made pursuant to any provision of a contract entered into by the state agency
    or agency of a political subdivision with any person or another state agency or
    agency of a political subdivision prior to the date the breach of the security
    of the system occurred if that contract does not conflict with any provision of
    this section. For purposes of this section, a resident of this state is an individual
    whose principal mailing address as reflected in the records of the state agency
    or agency of a political subdivision is in this state.

    (2) The state agency or agency of a political subdivision shall make the disclosure
    described in division (B)(1) of this section in the most expedient time possible
    but not later than forty-five days following its discovery or notification of
    the breach in the security of the system, subject to the legitimate needs of law
    enforcement activities described in division (D) of this section and consistent
    with any measures necessary to determine the scope of the breach, including which
    residents'' personal information was accessed and acquired, and to restore the
    reasonable integrity of the data system.

    (C) Any state agency or agency of a political subdivision that, on behalf of or
    at the direction of another state agency or agency of a political subdivision,
    is the custodian of or stores computerized data that includes personal information
    shall notify that other state agency or agency of a political subdivision of any
    breach of the security of the system in an expeditious manner, if the personal
    information was, or reasonably is believed to have been, accessed and acquired
    by an unauthorized person and if the access and acquisition by the unauthorized
    person causes or reasonably is believed will cause a material risk of identity
    theft or other fraud to a resident of this state.

    (D) The state agency or agency of a political subdivision may delay the disclosure
    or notification required by division (B), (C), or (F) of this section if a law
    enforcement agency determines that the disclosure or notification will impede
    a criminal investigation or jeopardize homeland or national security, in which
    case, the state agency or agency of a political subdivision shall make the disclosure
    or notification after the law enforcement agency determines that disclosure or
    notification will not compromise the investigation or jeopardize homeland or national
    security.

    (E) For purposes of this section, a state agency or agency of a political subdivision
    may disclose or make a notification by any of the following methods:

    (1) Written notice;

    (2) Electronic notice, if the state agency''s or agency of a political subdivision''s
    primary method of communication with the resident to whom the disclosure must
    be made is by electronic means;

    (3) Telephone notice;

    (4) Substitute notice in accordance with this division, if the state agency or
    agency of a political subdivision required to disclose demonstrates that the agency
    does not have sufficient contact information to provide notice in a manner described
    in division (E)(1), (2), or (3) of this section, or that the cost of providing
    disclosure or notice to residents to whom disclosure or notification is required
    would exceed two hundred fifty thousand dollars, or that the affected class of
    subject residents to whom disclosure or notification is required exceeds five
    hundred thousand persons. Substitute notice under this division shall consist
    of all of the following:

    (a) Electronic mail notice if the state agency or agency of a political subdivision
    has an electronic mail address for the resident to whom the disclosure must be
    made;

    (b) Conspicuous posting of the disclosure or notice on the state agency''s or
    agency of a political subdivision''s web site, if the agency maintains one;

    (c) Notification to major media outlets, to the extent that the cumulative total
    of the readership, viewing audience, or listening audience of all of the outlets
    so notified equals or exceeds seventy-five per cent of the population of this
    state.

    (5) Substitute notice in accordance with this division, if the state agency or
    agency of a political subdivision required to disclose demonstrates that the agency
    has ten employees or fewer and that the cost of providing the disclosures or notices
    to residents to whom disclosure or notification is required will exceed ten thousand
    dollars. Substitute notice under this division shall consist of all of the following:

    (a) Notification by a paid advertisement in a local newspaper that is distributed
    in the geographic area in which the state agency or agency of a political subdivision
    is located, which advertisement shall be of sufficient size that it covers at
    least one-quarter of a page in the newspaper and shall be published in the newspaper
    at least once a week for three consecutive weeks;

    (b) Conspicuous posting of the disclosure or notice on the state agency''s or
    agency of a political subdivision''s web site, if the agency maintains one;

    (c) Notification to major media outlets in the geographic area in which the state
    agency or agency of a political subdivision is located.

    (F) If a state agency or agency of a political subdivision discovers circumstances
    that require disclosure under this section to more than one thousand residents
    of this state involved in a single occurrence of a breach of the security of the
    system, the state agency or agency of a political subdivision shall notify, without
    unreasonable delay, all consumer reporting agencies that compile and maintain
    files on consumers on a nationwide basis of the timing, distribution, and content
    of the disclosure given by the state agency or agency of a political subdivision
    to the residents of this state. In no case shall a state agency or agency of a
    political subdivision that is required to make a notification required by this
    division delay any disclosure or notification required by division (B) or (C)
    of this section in order to make the notification required by this division.

    (G) The attorney general, pursuant to sections 1349.191 and 1349.192 of the Revised
    Code, may conduct an investigation and bring a civil action upon an alleged failure
    by a state agency or agency of a political subdivision to comply with the requirements
    of this section.'
