- number: '1329.61'
  heading: Public record of registrations and renewals
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1329'
    name: Labels And Marks
  text: The secretary of state shall keep for public examination a record of all trademarks
    and service marks registered or renewed under sections 1329.54 to 1329.67 of the
