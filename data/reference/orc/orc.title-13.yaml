- number: '1309.110'
  heading: Security interests arising under article 2 or 2A - UCC 9-110
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: 'A security interest arising under sections 1302.42 and 1302.49, division
    (C) of section 1302.85, or division (E) of section 1310.54 of the Revised Code
    is subject to this chapter. However, until the debtor obtains possession of the
    goods:

    (A) The security interest is enforceable even if division (B)(3) of section 1309.203
    of the Revised Code has not been satisfied;

    (B) Filing is not required to perfect the security interest;

    (C) The rights of the secured party after default by the debtor are governed by
    Chapter 1302. or 1310. of the Revised Code; and

    (D) The security interest has priority over a conflicting security interest created
    by the debtor.'
