- number: '1337.64'
  heading: Effect on existing powers of attorney
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: '(A) Except as otherwise provided in sections 1337.21 to 1337.64 of the Revised
    Code, on the effective date of this section, those sections apply to all of the
    following:

    (1) A power of attorney created before, on, or after the effective date of this
    section;

    (2) A judicial proceeding concerning a power of attorney commenced on or after
    the effective date of this section;

    (3) A judicial proceeding concerning a power of attorney commenced before the
    effective date of this section, unless the court finds that application of a provision
    of sections 1337.21 to 1337.64 of the Revised Code would substantially interfere
    with the effective conduct of the judicial proceeding or prejudice the rights
    of a party, in which case that provision does not apply and the superseded law
    applies.

    (B) Sections 1337.21 to 1337.64 of the Revised Code do not affect an act done
    before the effective date of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1337.64
- number: '1341.01'
  heading: Qualifications of sureties
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: Sureties must be residents of this state and worth, in the aggregate, double
    the sum to be secured, beyond the amount of their debts, and have property liable
    to execution in this state equal to the sum to be secured.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.01
- number: '1341.02'
  heading: Sureties may be required to testify concerning their sufficiency
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: A court or an officer authorized by law to approve a surety may require such
    person to testify, orally or in writing, touching his sufficiency; but this shall
    not, in itself, exonerate the officer in an action for taking insufficient surety.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.02
- number: '1341.03'
  heading: Certain sureties cannot waive their rights
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: In contracts for the payment of money to banks or bankers, sureties in fact,
    known to the parties to be such at the time such contracts were made, may be proved,
    and shall be considered in all courts, to be sureties, and have all the privileges
    of sureties, anything in the contract expressed to the contrary notwithstanding.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.03
- number: '1341.04'
  heading: Sureties may require creditors to sue
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: A person bound as surety in a written instrument for the payment of money
    or other valuable thing, if a right of action accrued thereon, may require his
    creditor, by notice in writing, to commence an action on such instrument forthwith
    against the principal debtor. Unless the creditor commences such action within
    a reasonable time thereafter, and proceeds with due diligence, in the ordinary
    course of law, to recover judgment against the principal debtor for the money
    or other valuable thing due thereby, and to make by execution the amount thereof,
    the creditor, or the assignee of such instrument, so failing to comply with the
    requisition of such surety, thereby shall forfeit the right which he otherwise
    would have to demand and receive of him the amount due thereon.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.04
- number: '1341.05'
  heading: Representatives of sureties
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: The executor or administrator of a surety bound as provided in section 1341.04
    of the Revised Code, in like manner may make requisition of the creditor, his
    executor, or administrator, as provided in such section. In case of failure of
    the creditor, or his executor, or administrator, to proceed as required, the executor
    or administrator, if he makes the requisition, shall have the same relief as is
    provided for a surety in such section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.05
- number: '1341.06'
  heading: Limitations
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: Sections 1341.04 and 1341.05 of the Revised Code do not affect bonds required
    by law to be given by guardians, executors, administrators, trustees of an express
    trust, public officers, or any bond or undertaking required by law to be given
    in an action or legal proceeding in any court of this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.06
- number: '1341.07'
  heading: Surety on judgment may revive
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: When the surety in a judgment, who is certified therein to be such, or his
    personal representative, pays the judgment, or part thereof, to the extent of
    such payment he shall have all the rights and remedies against the principal debtor
    that the plaintiff had at the time of such payment. Proceedings to revive the
    judgment shall be as provided in cases of dormant unpaid judgments, but in the
    name of such surety or representative. The plaintiff in the original action shall
    not be liable for costs therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.07
- number: '1341.08'
  heading: Sureties of county officers may apply to be discharged
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: A surety of any county officer, except a county commissioner, may notify the
    board of county commissioners by giving at least five days' written notice that
    he is unwilling to continue as surety for such officer, and will at a time to
    be then named make application to such board to be released from further liability
    upon his bond. He also shall give at least three days' written notice to each
    of the officers for whom he is surety of the time and place at which his application
    will be made.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.08
- number: '1341.09'
  heading: Duty of board of county commissioners with reference to release of sureties
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: Upon notice being given, as provided in section 1341.08 of the Revised Code,
    the board of county commissioners shall hear the application, and if in its opinion
    there is good reason therefor, shall require such officer to give a new bond,
    conditioned according to law, to its satisfaction, within such reasonable time
    as it directs. If such officer fails to execute such bond, the office shall be
    deemed vacant, and immediately be filled as other vacancies.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.09
- number: '1341.10'
  heading: Sureties for county officers not released until new bond filed
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: The original sureties of a county officer shall not be released or discharged
    until the filing of a new bond as required by section 1341.09 of the Revised Code,
    or the expiration of the time allowed therefor, but shall be liable only for the
    official acts of such officer from the time of the execution of the original bond
    to the filing of the second bond, or the expiration of the time allowed therefor.
    The cost of the application for release as surety shall be paid by the surety
    who makes it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.10
- number: '1341.11'
  heading: Sureties of constable or marshal may apply to be discharged
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: If a constable, or the marshal of a municipal corporation, on demand made
    for that purpose by a person entitled thereto, his agent, or attorney, neglects
    or refuses to pay all money by him received in his official capacity for the use
    of such person, a surety of such constable or marshal may give notice to the board
    of township trustees of the township, or the legislative authority of the municipal
    corporation in which such constable or marshal resides, of his refusal or neglect
    to pay over money by him collected by virtue of his office, and that he is unwilling
    to continue as his surety.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.11
- number: '1341.12'
  heading: Proceedings by legislative authority or trustees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: Upon notice being given by a surety of his unwillingness to continue as surety
    of a constable or marshal, the board of township trustees or legislative authority
    of the municipal corporation shall immediately inform such constable or marshal,
    in writing, of the refusal of his surety to continue as such, and that he is required
    to give a new bond conditioned according to law. If such constable or marshal
    gives such bond to the satisfaction of the board or legislative authority, within
    ten days after receiving notice, the sureties upon the first bond shall be released
    from further liability thereon. If the constable or marshal fails to give a new
    bond within ten days after receiving such notice, such failure shall be deemed
    a resignation of his office, and the board or legislative authority shall proceed
    to fill such vacancy as in other cases.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1341.12
- number: '1341.13'
  heading: Sureties of treasurer of school fund may apply to be discharged
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1341'
    name: Sureties
  text: A surety of the treasurer of school funds, in any lawfully organized school
    district, may notify the board of education of the district by at least five days'
    notice, in writing, that he is unwilling to continue as surety for such treasurer,
    and at a time therein named, will make application to the board to be released
    from further liability upon his bond. He also shall give at least three days'
    notice in writing to such treasurer of the time and place at which the application
    will be made.
