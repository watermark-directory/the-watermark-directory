  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.95
- number: '1345.99'
  heading: Penalty
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1345'
    name: Consumer Sales Practices
  text: '(A) Whoever violates section 1345.23 or 1345.24 of the Revised Code is guilty
    of a minor misdemeanor.

    (B) Whoever violates division (C) of section 1345.30 or division (D) of section
    1345.76 of the Revised Code shall be fined not more than one thousand dollars.

    (C) Whoever knowingly violates division (E) of section 1345.02 or knowingly violates
    section 1345.18 of the Revised Code is guilty of a misdemeanor of the third degree
    for a first offense and a misdemeanor of the second degree for any subsequent
    offense.

    (D) Whoever recklessly violates section 1345.032 of the Revised Code shall be
    fined the following:

    (1) For the first violation, not more than one hundred dollars for each solicitation
    document distributed;

    (2) For any subsequent violation, not more than two hundred dollars for each solicitation
    document distributed.

    (E) Whoever negligently violates section 1345.022 of the Revised Code shall be
    fined not more than one thousand dollars.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
