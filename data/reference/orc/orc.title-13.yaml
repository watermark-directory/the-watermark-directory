- number: '1337.63'
  heading: Relation to electronic signatures in global and national commerce act
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1337'
    name: Power Of Attorney
  text: Sections 1337.21 to 1337.64 of the Revised Code modify, limit, and supersede
    the "Electronic Signatures in Global and National Commerce Act," 15 U.S.C. 7001
    et seq., with the exception of section 101(c) of that act, 15 U.S.C. 7001(c).
    Sections 1337.21 to 1337.64 of the Revised Code do not authorize electronic delivery
    of any of the notices described in section 103(b) of that act, 15 U.S.C. 7003(b).
  history: null
