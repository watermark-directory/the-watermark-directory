- number: '1310.03'
  heading: Territorial application of provisions to goods covered by certificate of
    title - UCC 2A-105
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: 'Subject to the provisions of division (C) of section 1310.32 and division
    (C) of section 1310.33 of the Revised Code, with respect to goods covered by a
    certificate of title issued under Chapter 1548., 4505., or 4585. of the Revised
    Code or the certificate of title law of another jurisdiction, compliance and the
    effect of compliance or noncompliance with a certificate of title statute shall
    be governed by the law, including the conflict of laws rules, of jurisdiction
    issuing the certificate until the earlier of one of the following:

    (A) The surrender of the certificate;

    (B) Four months after the goods are removed from that jurisdiction and thereafter
    until a new certificate of title is issued by another jurisdiction.'
