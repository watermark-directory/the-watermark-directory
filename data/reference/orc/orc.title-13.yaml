- number: '1321.38'
  heading: Contents of short-term loan license; additional licenses; change of place
    of business
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A license issued by the superintendent of financial institutions pursuant
    to sections 1321.35 to 1321.48 of the Revised Code shall state the address at
    which the business of making loans is to be conducted and shall state the full
    name of the business. Each license issued shall be conspicuously posted in the
    place of business and is not transferable or assignable.

    (B)(1) Not more than one place of business shall be maintained under the same
    license issued under sections 1321.35 to 1321.48 of the Revised Code, but the
    superintendent may issue additional licenses to the same applicant upon compliance
    with those sections.

    (2) No change in the place of business of a licensee to a location outside the
    original municipal corporation shall be permitted under the same license. When
    a licensee wishes to change its place of business within the same municipal corporation,
    written notice thereof shall be given in advance to the superintendent who shall
    provide without cost a license pursuant to sections 1321.35 to 1321.48 of the
    Revised Code for the new address.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.38
- number: '1321.39'
  heading: Short-term loan requirements and restrictions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'A licensee may engage in the business of making loans provided that each
    loan meets all of the following conditions:

    (A) The total amount of the loan does not exceed one thousand dollars.

    (B)(1) Subject to division (B)(2) of this section, the minimum duration of the
    loanis ninety-one days and the maximum duration of the loan is one year.

    (2) The minimum duration of the loan may be less than ninety-one days if the total
    monthly payment on the loan does not exceed an amount that is six per cent of
    the borrower''s verified gross monthly income or seven per cent of the borrower''s
    verified net monthly income, whichever is greater.

    (C) The loan is made pursuant to a written loan contract that sets forth the terms
    and conditions of the loan. A copy of the loan contract shall be provided to the
    borrower. The loan contract shall disclose in a clear and concise manner all of
    the following:

    (1) The total amount of fees and charges the borrower will be required to pay
    in connection with the loan pursuant to the loan contract;

    (2) The total amount of each payment, when each payment is due, and the total
    number of payments that the borrower will be required to make under the loan contract;

    (3) A statement, printed in boldface type of the minimum size of ten points, as
    follows: "WARNING: The cost of this loan is higher than the average cost charged
    by financial institutions, such as banks or credit unions, on substantially similar
    loans. A financial institution may be able to offer you a similar loan at a lower
    cost."

    (4) A statement, printed in a minimum font size of ten points, which informs the
    borrower that complaints regarding the loan or lender may be submitted to the
    department of commerce division of financial institutions and includes the correct
    telephone number and mailing address for the department;

    (5) Any disclosures required under the "Truth in Lending Act," 82 Stat. 146 (1974),
    15 U.S.C. 1601, et seq.;

    (6) The annual percentage rate;

    (7) A statement, printed in a minimum font size of ten points, as follows: "You
    have the right to rescind or cancel this loan by returning the originally contracted
    loan amount by five p.m. of the third business day immediately following the day
    you enter into this contract."

    (8) A statement, printed in a minimum font size of ten points, as follows: "Electronic
    payment is optional. You have the right to revoke or remove your authorization
    for electronic payment at any time."

    (D) The loan is a precomputed loan and is payable in substantially equal installments
    consisting of principal, fees, and interest combined. For purposes of this division,
    "precomputed loan" means a loan in which the debt is a sum comprising the principal
    amount and the amount of fees and interest computed in advance on the assumption
    that all scheduled payments will be made when due.

    (E) The loan may be rescinded or canceled on or before five p.m. of the third
    business day immediately following the day of the loan transaction upon the borrower
    returning the originally contracted loan amount.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.39
- number: '1321.391'
  heading: Short-term loans of longer than 90 days
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: If the duration of a short-term loan is ninety-one days or greater, the licensee
    shall determine the recommended length of a loan based on the borrower's verified
    monthly income as described in division (B)(2) of section 1321.39 of the Revised
    Code. The licensee shall provide the borrower with a written copy of its recommendation,
    which is not binding on the borrower.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.391
- number: '1321.40'
  heading: Maximum interest rate; permissible short-term loan fees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'A licensee may charge, collect, and receive only the following fees and charges
    in connection with a short-term loan:

    (A) Interest not exceeding a rate of twenty-eight per cent per annum;

    (B)(1) Except as otherwise provided in division (B)(2) of this section, a monthly
    maintenance fee that does not exceed the lesser of ten per cent of the originally
    contracted loan amount or thirty dollars, provided the fee is not added to the
    loan balance on which interest is charged;

    (2) A licensee shall not charge, collect, or receive a monthly maintenance fee
    if the borrower is a person on active duty in the armed forces of the United States
    or a dependent of that person.

    (C) If the originally contracted loan amount is five hundred dollars or more,
    a loan origination charge in the amount of two per cent of the originally contracted
    loan amount, provided the loan origination charge is not added to the loan balance
    on which interest is charged;

    (D) One check collection charge per loan not exceeding an amount equal to twenty
    dollars plus any amount passed on from other financial institutions for each check,
    negotiable order of withdrawal, share draft, or other negotiable instrument returned
    or dishonored for any reason, provided that the terms and conditions upon which
    check collection charges will be charged to the borrower are set forth in the
    written loan contract described in division (C) of section 1321.39 of the Revised
    Code;

    (E) If a licensee provides the proceeds of a loan in the form of a check, a fee
    to cash that check in an amount not exceeding ten dollars;

    (F) Damages, costs, and disbursements to which the licensee may become entitled
    to by law in connection with any civil action to collect a loan after default,
    except that the total amount of damages and costs shall not exceed the originally
    contracted loan amount.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.40
- number: '1321.401'
  heading: Refinancing short-term loans
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'A licensee may refinance a short-term loan provided that all of the following
    apply to the refinanced loan:

    (A) The loan is a short-term loan.

    (B) Interest on the loan does not exceed a rate of twenty-eight per cent per annum.

    (C) The licensee does not charge, collect, or receive the monthly maintenance
    fee described in division (B) of section 1321.40 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.401
- number: '1321.402'
  heading: Prepayment or refinancing prior to short-term loan maturity date
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: If a short-term loan is prepaid in full or refinanced prior to the loan's
    maturity date, the licensee shall refund to the borrower a prorated portion of
    the interest, monthly maintenance fees, and all other charges based on a ratio
    of the number of days the loan was outstanding and the number of days for which
    the loan was originally contracted. For purposes of this section, the monthly
    maintenance fee is not considered to be fully earned at the beginning of a month.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.402
- number: '1321.403'
  heading: Short-term loan fee cap; exceptions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'Notwithstanding any provision of sections 1321.35 to 1321.48 of the Revised
    Code to the contrary, a licensee shall not charge, collect, or receive in connection
    with a short-term loan a total amount of fees and charges that exceeds sixty per
    cent of the originally contracted loan amount. For purposes of this section, all
    charges made in connection with the loan shall be included when calculating the
    total loan charges except for all of the following:

    (A) The check collection charge authorized under section 1321.40 of the Revised
    Code;

    (B) The check cashing fee authorized under section 1321.40 of the Revised Code;

    (C) The interest charges on a loan that is refinanced in accordance with section
    1321.401 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.403
- number: '1321.41'
  heading: Short-term loan licensee prohibitions
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'No licensee shall do any of the following:

    (A) Violate section 1321.36 of the Revised Code;

    (B) Make a loan that does not comply with section 1321.39 of the Revised Code;

    (C) Charge, collect, or receive, directly or indirectly, credit insurance premiums,
    charges for any ancillary product sold, or any additional fees, interest, or charges
    in connection with a loan, other than fees and charges permitted by section 1321.40
    of the Revised Code;

    (D) Collect treble damages pursuant to division (A)(1)(b)(ii) of section 2307.61
    of the Revised Code in connection with any civil action to collect a loan after
    a default due to a check, negotiable order of withdrawal, share draft, or other
    negotiable instrument that was returned or dishonored for insufficient funds;

    (E) Except as otherwise provided in section 1321.401 of the Revised Code, make
    a short-term loan to a borrower if there exists an outstanding loan between that
    borrower and any of the following:

    (1) The licensee;

    (2) A person related to the licensee by common ownership or control;

    (3) Any employee or agent of the licensee.

    (F) Bring or threaten to bring an action or complaint against the borrower for
    the borrower''s failure to comply with the terms of the loan contract solely due
    to the check, negotiable order of withdrawal, share draft, or negotiable instrument
    being returned or dishonored for insufficient funds. Nothing herein prohibits
    such conduct, action, or complaint if the borrower has intentionally engaged in
    fraud by, including but not limited to, closing or using any closed or false account
    to evade payment;

    (G) Require the borrower to waive the borrower''s right to legal recourse under
    any otherwise applicable provision of state or federal law;

    (H) Accept the title or registration of a vehicle, real property, physical assets,
    or other collateral as security for the obligation;

    (I) Engage in any device or subterfuge to evade the requirements of sections 1321.35
    to 1321.48 of the Revised Code including assisting a borrower to obtain a loan
    on terms that would be prohibited by sections 1321.35 to 1321.48 of the Revised
    Code, making loans disguised as personal property sales and leaseback transactions,
    or disguising loan proceeds as cash rebates for the pretextual installment sale
    of goods or services;

    (J) Assess or charge a borrower a fee for prepaying the loan in full prior to
    the maturity date;

    (K) Fail to comply with section 1321.45 of the Revised Code;

    (L) Recommend to a borrower that the borrower obtain a loan for a dollar amount
    that is higher than the borrower has requested;

    (M) Draft funds electronically from any depository financial institution in this
    state without written approval of the borrower. Nothing in this division shall
    prohibit the conversion of a negotiable instrument into an electronic form for
    processing through the automated clearing house system.

    (N) Make, publish, or otherwise disseminate, directly or indirectly, any misleading
    or false advertisement, or engage in any other deceptive trade practice;

    (O) Offer any incentive to a borrower in exchange for the borrower taking out
    multiple loans over any period of time, or provide a short-term loan at no charge
    or at a discounted charge as compensation for any previous or future business;

    (P) Present a check, negotiable order of withdrawal, share draft, or other negotiable
    instrument, that has been previously presented by the licensee and subsequently
    returned or dishonored for any reason, without prior written approval from the
    borrower;

    (Q) Change the check number, or in any other way alter a check, negotiable order
    of withdrawal, or share draft, prior to submitting such check, negotiable order
    of withdrawal, or share draft for processing through the automated clearing house
    system, or submit false information about any check, negotiable order of withdrawal,
    or share draft to the automated clearing house system;

    (R) Make a short-term loan to a borrower if the loan will result in a total outstanding
    principal of more than two thousand five hundred dollars in short-term loans made
    by licensees to that borrower at any one time. Prior to making a short-term loan,
    a licensee shall require each borrower to sign a written declaration that, pursuant
    to this division, the borrower is eligible to receive the loan, and shall make
    a concerted effort to verify the borrower''s eligibility.

    (S) Fail to accept cash or a certified check from a third party when submitted
    on behalf of the borrower for repayment of a short-term loan in full or in part;

    (T) Contact a borrower for any reason other than for the borrower''s benefit regarding
    upcoming payments, options for obtaining loans, payment options, payment due dates,
    the effect of default, or, after default, receiving payments or other actions
    permitted by the licensee; to advise the borrower of missed payments or dishonored
    checks; or to assist the transmittal of payments via a third-party mechanism;

    (U) In the event that a short-term loan or its servicing is sold or assigned,
    fail to provide notice and the information needed to make future payments;

    (V) Make a loan to a borrower that includes a demand feature that permits the
    licensee, in the event the borrower fails to meet the repayment terms for any
    outstanding balance, to terminate the loan in advance of the original maturity
    date and to demand repayment of the entire outstanding balance, unless both of
    the following requirements are met:

    (1) Not earlier than ten days after the borrower''s payment was due, the licensee
    provides written notice to the borrower of the termination of the loan.

    (2) In addition to the outstanding balance, the licensee collects only prorated
    interest and the fees earned up to the termination of the loan. For purposes of
    division (V)(2) of this section, the outstanding balance and prorated interest
    and fees shall be calculated as if the borrower had voluntarily prepaid the loan
    in full on the date of termination.'
