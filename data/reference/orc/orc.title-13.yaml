sections:
- number: '1301.101'
  heading: Short titles - UCC 1-101
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Short titles [UCC 1-101]

    (A) Chapters 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309., and 1310.
    of the Revised Code may be cited as the Uniform Commercial Code.

    (B) Sections 1301.101 to 1301.310 of the Revised Code may be cited as Uniform
    Commercial Code - General Provisions.

    (C) This chapter uses the numbering system of the national conference of commissioners
    on uniform state laws. The digits to the right of the decimal point are sequential
    and not supplemental to any preceding Revised Code section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.101
- number: '1301.102'
  heading: Scope of chapter 1301 - UCC 1-102
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Scope of Chapter 1301. [UCC 1-102]

    Sections 1301.101 to 1301.310 of the Revised Code apply to a transaction to the
    extent that it is governed by Chapter 1302., 1303., 1304., 1305., 1307., 1308.,
    1309., or 1310. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.102
- number: '1301.103'
  heading: Construction of Uniform Commercial Code to promote its purposes and policies;
    applicability of supplemental principles of law - UCC 1-103
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Construction of Uniform Commercial Code to promote its purposes and policies;
    applicability of supplemental principles of law [UCC 1-103]

    (A) Chapters 1301., 1302., 1303., 1304, 1305., 1307., 1308., 1309., and 1310.
    of the Revised Code must be liberally construed and applied to promote their underlying
    purposes and policies, which are:

    (1) To simplify, clarify, and modernize the law governing commercial transactions;

    (2) To permit the continued expansion of commercial practices through custom,
    usage, and agreement of the parties; and

    (3) To make uniform the law among the various jurisdictions.

    (B) Unless displaced by the particular provisions of Chapters 1301., 1302., 1303.,
    1304., 1305., 1307., 1308., 1309., and 1310. of the Revised Code, the principles
    of law and equity, including the law merchant and the law relative to capacity
    to contract, principal and agent, estoppel, fraud, misrepresentation, duress,
    coercion, mistake, bankruptcy, and other validating or invalidating cause supplement
    their provisions.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.103
- number: '1301.104'
  heading: Construction against implied repeal - UCC 1-104
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Construction against implied repeal [UCC 1-104]

    Chapters 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309., and 1310. of
    the Revised Code being a general act intended as a unified coverage of its subject
    matter, no part of it shall be deemed to be impliedly repealed by subsequent legislation
    if such construction can reasonably be avoided.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.104
- number: '1301.105'
  heading: Severability - UCC 1-105
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Severability [UCC 1-105]

    If any provision or clause of Chapter 1301., 1302., 1303., 1304., 1305., 1307.,
    1308., 1309., or 1310. of the Revised Code or its application to any person or
    circumstance is held invalid, the invalidity does not affect other provisions
    or applications of Chapter 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309.,
    or 1310. of the Revised Code which can be given effect without the invalid provision
    or application, and to this end the provisions of Chapter 1301., 1302., 1303.,
    1304., 1305., 1307., 1308., 1309., or 1310. of the Revised Code are severable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.105
- number: '1301.106'
  heading: Use of singular and plural; gender - UCC 1-106
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1301'
    name: General Provisions
  text: 'Use of singular and plural; gender [UCC 1-106]

    In Chapters 1301., 1302., 1303., 1304., 1305., 1307., 1308., 1309., and 1310.
    of the Revised Code, unless the statutory context otherwise requires:

    (A) Words in the singular number include the plural, and those in the plural include
    the singular; and

    (B) Words of any gender also refer to any other gender.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1301.106
