- number: '1310.28'
  heading: Casualty to identified goods - UCC 2A-221
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1310'
    name: Leases
  text: 'If a lease contract requires goods to be identified when the lease contract
    is made, and the goods suffer casualty without fault of the lessee, the lessor,
    or the supplier before delivery, or the goods suffer casualty before risk of loss
    passes to the lessee pursuant to the lease agreement or section 1310.26 of the
    Revised Code, both of the following apply:

    (A) If the loss is total, the lease contract is avoided.

    (B) If the loss is partial or the goods have so deteriorated as to no longer conform
    to the lease contract, the lessee may demand inspection and at his option either
    treat the lease contract as avoided or, except in a finance lease that is not
    a consumer lease, accept the goods with due allowance from the rent payable for
    the balance of the lease term for the deterioration or the deficiency in quantity,
    but without further right against the lessor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1310.28
