- number: '1315.05'
  heading: Continuing duties of licensees
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1315'
    name: Transmitters Of Money; Check-cashing Businesses
  text: 'Each licensee, at all times, shall meet both of the following requirements:

    (A) Be a legally established business entity that is capitalized separately and
    distinctly from every other legal entity and qualified to do business in this
    state;

    (B) Have a minimum net worth of not less than five hundred thousand dollars, calculated
    according to generally accepted accounting principles, but excluding any assets
    that the superintendent of financial institutions disqualifies and including any
    off-balance sheet liabilities that the superintendent requires.

    (C) No licensee shall fail to comply with this section.'
