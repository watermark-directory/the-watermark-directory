- number: '1321.63'
  heading: Activities for which consumer installment loan license is required
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A)(1) No person shall do either of the following without first having obtained
    a license from the superintendent of financial institutions under sections 1321.62
    to 1321.702 of the Revised Code:

    (a) Engage in the business of lending money under sections 1321.62 to 1321.702
    of the Revised Code;

    (b) Contract for, or receive, directly or indirectly, on or in connection with
    any such loan, any interest and charges that in the aggregate are greater than
    the interest and charges that the lender would be permitted to charge for a loan
    of money if the lender were not a licensee.

    (2) Division (A)(1) of this section applies to any person, who by any device,
    subterfuge, or pretense, charges, contracts for, or receives greater interest,
    consideration, or charges than that authorized by this section for any such loan,
    or who for a fee or any manner of compensation arranges or offers to find or arrange
    for another person to make any such loan.

    (B) This section does not preclude the acquiring, directly or indirectly, by purchase
    or discount, of a bona fide obligation for goods or services when such obligation
    is payable directly to the person who provided the goods or services.

    (C) Any contract of a loan in the making or collection of which an act is done
    by the lender that violates this section is void and the lender has no right to
    collect, receive, or retain any principal, interest, or charges.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.63
- number: '1321.631'
  heading: Applicability of Consumer Installment Loan Act
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'Sections 1321.62 to 1321.702 of the Revised Code do not apply to any of the
    following:

    (A) Any credit transaction with a loan term of less than six months from the loan
    transaction date;

    (B) Any credit transaction that does not require equal monthly payments, unless
    either of the following applies:

    (1) The credit transaction contains an interest rate that is tied to a published
    and verifiable index and the contractual rate of interest is adjusted in accordance
    with changes in that index.

    (2) The credit transaction provides for an extension of the first monthly installment
    period pursuant to division (C)(2)(a) or (D)(1)(a) of section 1321.68 of the Revised
    Code.

    (C) Any credit transaction with an interest rate in excess of that provided for
    under section 1321.68 of the Revised Code;

    (D) Any credit transaction secured by an interest in the covered borrower''s residential
    mortgage loan, including a transaction to finance the purchase or initial construction
    of a dwelling, any refinance transaction, home equity loan or home equity line
    of credit, or reverse mortgage;

    (E) Any credit transaction that originates as a result, directly or indirectly,
    of a referral from a person registered or acting as a credit services organization
    under sections 4712.01 to 4712.14 of the Revised Code;

    (F) Any credit transaction made by a person licensed as a check-cashing business
    under sections 1315.21 to 1315.30 of the Revised Code;

    (G) Any credit transaction made by a retail seller under Chapter 1317. of the
    Revised Code;

    (H) Any credit transaction made by a person licensed or acting as a pawnbroker
    under Chapter 4727. of the Revised Code;

    (I) Any credit transaction made by a person licensed under sections 1321.35 to
    1321.48 of the Revised Code;

    (J) Any credit transaction made by a collection agency pursuant to section 1319.12
    of the Revised Code;

    (K) Any credit transaction made by a premium finance company licensed under sections
    1321.71 to 1321.83 of the Revised Code;

    (L) Any credit transaction made by a person chartered and lawfully doing business
    under the authority of any law of this state, another state, or the United States
    as a bank, savings bank, trust company, savings and loan association, or credit
    union, or a subsidiary of any such entity, which subsidiary is regulated by a
    federal banking agency and is owned and controlled by such a depository institution;

    (M) Any credit transaction made by a life, property, or casualty insurance company
    licensed to do business in this state or any entity licensed under Title XXXIX
    of the Revised Code that makes advances or loans to any person who is licensed
    to sell insurance pursuant to that title and who is authorized in writing by that
    entity to sell insurance;

    (N) Any licensee doing business under sections 1321.01 to 1321.19 of the Revised
    Code;

    (O) Any registrant doing business under sections 1321.51 to 1321.60 of the Revised
    Code;

    (P) Any person making a business loan described in division (B)(6) of section
    1343.01 of the Revised Code;

    (Q) Any political subdivision, or any governmental or other public entity, corporation,
    instrumentality, or agency, in or of the United States or any state of the United
    States, or any entity mentioned in division (B)(3) of section 1343.01 of the Revised
    Code;

    (R) Any college or university, or controlled entity of a college or university,
    as those terms are defined in section 1713.05 of the Revised Code;

    (S) Any person doing business under and as permitted by any law of this state,
    another state, or the United States relating to banks, savings banks, savings
    societies, trust companies, credit unions, or savings and loan associations substantially
    all the business of which is confined to loans on real estate mortgages and evidences
    of their own indebtedness.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.631
- number: '1321.632'
  heading: Consumer installment loan licensee authority; prohibited activities
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'A licensee may engage in the business of making loans provided the licensee
    does not do any of the following:

    (A) Assess an origination fee pursuant to section 1321.68 of the Revised Code
    more than three times in any twelve-month period;

    (B) Accept a dated instrument from the borrower as security for a loan;

    (C) Hold an instrument for a period of time prior to negotiation or deposit of
    the instrument;

    (D) Pay to a borrower, credit to a borrower''s account, or pay to another person
    on the borrower''s behalf the amount of an instrument, less interest, fees, or
    any other charges permitted by section 1321.68 of the Revised Code;

    (E) Refinance the loan during the first one hundred twenty days of the loan term;

    (F) Except for the deferment charge permitted by section 1321.68 of the Revised
    Code, charge or collect any fee, charge, or remuneration of any sort for renewing,
    amending, or extending a loan beyond its original term.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.632
- number: '1321.64'
  heading: Application for consumer installment loan license; approval procedure
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) An application for a license shall contain an undertaking by the applicant
    to abide by those sections. The application shall be in writing, under oath, and
    in the form prescribed by the superintendent of financial institutions, and shall
    contain any information that the superintendent may require. Applicants that are
    foreign corporations shall obtain and maintain a license pursuant to Chapter 1703.
    of the Revised Code before a license is issued or renewed.

    (B) Upon the filing of the application and the payment by the applicant of a nonrefundable
    investigation fee of two hundred dollars, a nonrefundable annual registration
    fee of three hundred dollars, and any additional fee required by the NMLSR, the
    division of financial institutions shall investigate the relevant facts. If the
    application involves investigation outside this state, the applicant may be required
    by the division to advance sufficient funds to pay any of the actual expenses
    of the investigation when it appears that these expenses will exceed two hundred
    dollars. An itemized statement of any of these expenses which the applicant is
    required to pay shall be furnished to the applicant by the division. A license
    shall not be issued unless all the required fees have been submitted to the division.

    (C)(1) The investigation undertaken upon receipt of an application shall include
    both a civil and criminal records check of any control person.

    (2)(a) Notwithstanding division (L) of section 121.08 of the Revised Code, the
    superintendent shall obtain a criminal records check on each control person and,
    as part of that records check, request that criminal records information from
    the federal bureau of investigation be obtained. To fulfill this requirement,
    the superintendent shall do either of the following:

    (i) Request the superintendent of the bureau of criminal identification and investigation,
    or a vendor approved by the bureau, to conduct a criminal records check based
    on the control person''s fingerprints or, if the fingerprints are unreadable,
    based on the control person''s social security number, in accordance with section
    109.572 of the Revised Code;

    (ii) Authorize the NMLSR to request a criminal records check of the control person.

    (b) Any fee required under division (C)(3) of section 109.572 of the Revised Code
    or by the NMLSR shall be paid by the applicant.

    (D) If an application for a license does not contain all of the information required
    under division (A) of this section, and if such information is not submitted to
    the division or to the NMLSR within ninety days after the superintendent or the
    NMLSR requests the information in writing, including by electronic transmission
    or facsimile, the superintendent may consider the application withdrawn.

    (E) If the superintendent of financial institutions finds that the financial responsibility,
    experience, and general fitness of the applicant command the confidence of the
    public and warrant the belief that the business will be operated honestly and
    fairly in compliance with the purposes of sections 1321.62 to 1321.702 of the
    Revised Code and the rules adopted thereunder, and that the applicant has the
    requisite net worth and assets required under section 1321.65 of the Revised Code,
    the superintendent shall issue a license to the applicant. The license shall be
    valid until the thirty-first day of December of the year in which it is issued.
    A person may be licensed under both sections 1321.51 to 1321.60 and sections 1321.62
    to 1321.702 of the Revised Code.

    (F) If the superintendent finds that the applicant does not meet the conditions
    set forth in this section, the superintendent shall issue a notice of intent to
    deny the application, and promptly notify the applicant of the denial, the grounds
    for the denial, and the applicant''s reasonable opportunity to be heard on the
    action in accordance with Chapter 119. of the Revised Code.

    (G) Notwithstanding any provision of this section to the contrary, the superintendent
    shall issue a license in accordance with Chapter 4796. of the Revised Code to
    an applicant if either of the following applies:

    (1) The applicant holds a license in another state.

    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a consumer installment
    loan lender in a state that does not issue that license.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.64
- number: '1321.641'
  heading: Renewal of consumer installment loan license
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) A license issued under section 1321.64 of the Revised Code may be renewed
    annually on or before the thirty-first day of December by submitting a renewal
    application in the form prescribed by the superintendent of financial institutions.
    The application shall be accompanied by a nonrefundable renewal fee of three hundred
    dollars, any assessment as determined by the superintendent pursuant to division
    (B) of this section, and any additional fee required by the NMLSR. A licensee
    shall not be required to pay any other fee or assessment by the state or any political
    subdivision of the state.

    (B) If the amount of renewal fees collected by the division of financial institutions
    is less than the estimated expenditures of the consumer finance section of the
    division, as determined by the superintendent, for the following fiscal year,
    the superintendent may assess each licensee at a rate sufficient to equal in the
    aggregate the difference between the renewal fees collected and the estimated
    expenditures. Each licensee shall pay the assessed amount to the superintendent
    prior to the last day of June. In no event shall the assessment exceed ten cents
    per each one hundred dollars of interest (excluding charge-off recoveries), loan
    origination charges, and credit line charges collected by that licensee during
    the previous calendar year. If such an assessment is imposed, it shall not be
    less than two hundred fifty dollars per licensee and shall not exceed thirty thousand
    dollars less the total renewal fees paid pursuant to division (A) of this section
    by each licensee.

    (C) If a renewal application does not contain all of the information required,
    and if that information is not submitted to the division or to the NMLSR within
    ninety days after the superintendent or the NMLSR requests the information in
    writing, including by electronic transmission or facsimile, the superintendent
    may consider the renewal application withdrawn.

    (D) An applicant''s license shall not be renewed if it is subject to an order
    of suspension or an unpaid and past due fine imposed by the superintendent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.641
- number: '1321.642'
  heading: Effect of change in ownership of a consumer installment loan licensee;
    notice
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A) If there is a change of five per cent or more in the ownership of a licensee,
    the division of financial institutions may make any investigation necessary to
    determine whether any fact or condition exists that, if it had existed at the
    time of the original application for a license, the fact or condition would have
    warranted the division to deny the application under section 1321.64 of the Revised
    Code.

    (B) A licensee shall give the superintendent of financial institutions sixty days
    prior written notice before there is a change of fifty per cent or more in the
    ownership of the licensee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.642
- number: '1321.643'
  heading: Place of business; additional consumer installment loan licenses; change
    of place of business or name
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '(A)(1) Not more than one place of business shall be maintained under the
    same license, but the superintendent of financial institutions may issue additional
    licenses to the same licensee upon compliance with sections 1321.62 to 1321.702
    of the Revised Code.

    (2) Each licensed place of business shall be located in a state.

    (B)(1) When a licensee wishes to change its place of business, it shall give at
    least fifteen days prior written notice of the change to the division of financial
    institutions. The division shall provide a license for the new address without
    cost.

    (2) If a licensee changes its name, it shall give written notice of the change
    to the division prior to making loans under the new name. The division shall provide
    a license in the new name without cost.

    (C) Each current license shall be kept conspicuously posted in each place of business
    of the licensee and is not transferable or assignable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.643
- number: '1321.644'
  heading: Persons selling tangible goods or services
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: No person engaged in the business of selling tangible goods or services related
    to tangible goods may receive or retain a license under sections 1321.62 to 1321.702
    of the Revised Code for such place of business.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.644
- number: '1321.65'
  heading: Asset requirements of consumer installment loan licensee
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'Each licensee that conducts business under sections 1321.62 to 1321.702 of
    the Revised Code shall maintain both of the following:

    (A) A net worth of at least fifty thousand dollars;

    (B) For each license, assets of at least fifty thousand dollars either in use
    or readily available for use in the conduct of the business.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.65
- number: '1321.651'
  heading: Advertising for consumer installment loans
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: 'All of the following apply to advertising for loans made under sections 1321.62
    to 1321.702 of the Revised Code:

    (A) Every advertisement shall state and clearly indicate the identity of the licensee
    and shall do so in such a manner that prevents confusion with the name of any
    other unrelated licensee. Licensees shall be identified by means of trade names,
    service marks, or business names that are filed with the division of financial
    institutions and the secretary of state.

    (B) Advertising shall not be false, misleading, or deceptive. False, misleading,
    or deceptive advertising includes, but is not limited to, the following:

    (1) Placing, or causing to be placed, any advertisement indicating that special
    terms, reduced rates, guaranteed rates, particular rates, or any other special
    feature of loans is available unless the advertisement clearly states any limitations
    that apply;

    (2) Placing, or causing to be placed, any advertisement containing a rate or special
    fee offer that is not a bona fide available rate or fee.

    (C) A licensee shall comply with 12 C.F.R. 1026.16, as amended, for open-end loans,
    or 12 C.F.R. 1026.24, as amended, for closed-end loans.

    (D) A licensee shall not use loan advertisements that provide only telephone or
    facsimile numbers or newspaper box addresses and that do not clearly indicate
    the identity of the licensee.

    (E) A licensee shall not advertise that loans will be made within a specified
    time after the loan application is received, unless it is the general practice
    of the licensee to make loans within the specified time.

    (F) A licensee shall not advertise special terms, reduced rates, reduced payments,
    or any other special feature of a loan within a specified limited time, unless
    the advertisement clearly states any limitations that apply to the offer.

    (G) A licensee shall not advertise by the use of unqualified superlatives, including,
    but not limited to, "lowest rates," "lowest costs," "lowest payment plan," or
    "cheapest loans," or by making offers that cannot be reasonably fulfilled.

    (H) A licensee shall not advertise the words "new" or "reduced," or words of similar
    import, in connection with rates, costs, payments, or plans, for more than ninety
    days after the rates, costs, payments, or plans have become effective.

    (I) Any licensee specifying in any advertisement charges on loans in dollars shall
    also state the length of time required to repay the loans as well as the method
    of repayment, and shall, when the rate of interest is stated, do so in a manner
    to prevent misunderstanding.

    (J) Any licensee advertising flat or average payments on loans that include principal
    and interest shall specify the number and frequency of payments required to repay
    the loans. Whenever the amounts of periodic payments are advertised, the amounts
    shall include all interest to the borrower, as well as principal. The principal
    payments alone may be shown separately provided the interest charges are also
    clearly stated with equal prominence.

    (K) A licensee shall not advertise rebates, rates, or charges below the maximum
    lawful rate of interest that are conditioned upon prompt payment unless the condition
    is clearly indicated.

    (L) A licensee shall not advertise either of the following:

    (1) Waiver of payments in the event of sickness or disability or other contingency,
    without advertising that the interest and other charges, if assessed, continue
    during the waiver period;

    (2) That the first payment on any loan may be made more than thirty days after
    the date of loan closing, without advertising that the interest and other charges,
    if assessed, will accrue from the date of disbursement of the loan funds until
    the first payment is due.

    (M) A licensee shall not advertise for loans for illegal purposes.

    (N) A licensee shall not advertise the availability of credit-related insurance
    without disclosing the charge, if any, for the insurance.

    (O) Each licensee shall maintain in each licensed office or in a central location
    a file of all advertising for a period of two years from the date disseminated.
    This requirement includes newspaper, magazine, direct mailing, and facsimile advertising
    and solicitations, roadside advertising, internet advertising, and scripts of
    radio and television commercials. The file shall be readily available for inspection
    by the division at all times. Each licensee shall notify the division in writing
    of the location of the file. Each licensee shall, upon the request of the superintendent
    of financial institutions, provide to the division any printed or electronic advertising
    it has used regarding any business conducted under sections 1321.62 to 1321.702
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1321.651
- number: '1321.66'
  heading: Consumer installment loan licensee recordkeeping; examination of records
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1321'
    name: Various Loans
  text: '( A) Records a licensee is required to maintain shall be kept current and
    be available at a licensed location at all times during normal business hours
    for review by the superintendent. Records must be legible and maintained in a
    type size that is clearly readable without magnification and in conformity with
    any specific typeface or font size that may be required by state or federal law.
    Except when otherwise provided by federal or state law, records shall be maintained
    in English. When records are allowed to be in a language other than English, the
    licensee, at its expense, shall be responsible for providing the superintendent
    with a full and accurate translation. For purposes of this section, "current"
    means within thirty days from the date of the occurrence of the event required
    to be recorded. A licensee shall keep and preserve the following records:

    (1) A sortable electronic spreadsheet that discloses the following fields of information:

    (a) Principal borrower''s name;

    (b) Principal borrower''s address or property address;

    (c) Loan or account number;

    (d) Type of the security for the loan;

    (e) Date of loan;

    (f) Amount financed;

    (g) Date finance charges begin to accrue;

    (h) Loan origination charge;

    (i) Itemization of all additional fees or charges;

    (j) Principal amount of the loan;

    (k) Scheduled or precomputed interest;

    (l) Number of payments;

    (m) Contractual rate of interest;

    (n) Federal annual percentage rate;

    (o) Payment amount;

    (p) Types and amounts of credit-related insurance;

    (q) Default charge;

    (r) Check collection charge;

    (s) Any points charged to the borrower;

    (t) Any charges for prepayment of the loan.

    (2) Payment histories for each outstanding loan and each loan paid in full that
    shall disclose all of the following:

    (a) Principal borrower''s name;

    (b) Loan or account number;

    ( c) A chronological entry of all debits, credits, payments, and charges received,
    assessed, or disbursed in connection with the loan, recorded thereon in an identifiable
    manner in order to show the actual date of receipt, assessment, or disbursement
    and the balance due on the loan or account.

    (3) A file for each principal borrower. If there are multiple loan transactions
    with the same borrower, each loan transaction in the file shall have a unique
    loan or account number. The file shall contain copies of all of the following:

    (a) All documents related to the loan transaction from origination through the
    final entry on the record;

    ( b) Copies of the complaints, court orders, settlements, and judgments relating
    to collection litigation;

    (c) In cases of garnishment or attachment in collection litigation, copies of
    all notices served on employers and amounts collected;

    ( d) Copies of all repossession and foreclosure legal documents and other records,
    including bills for all expenses;

    (e) In instances where the security foreclosed upon or repossessed is offered
    for private sale, not less than three bona fide written bids or appraisals in
    order to establish that the terms of the sale were commercially reasonable to
    the borrower;

    (f) A copy of the death certificate and documentation of all funds received or
    paid pursuant to a credit life claim.

    (4) A sortable electronic spreadsheet of all loans in collection litigation that
    shall include all of the following:

    (a) Principal borrower''s name;

    (b) Loan or account number;

    (c) Date litigation proceedings were initiated;

    (d) Name of the court in which proceedings were initiated;

    (e) Indication of whether a final judgment has been entered, and if so, all of
    the following:

    (i) Date of judgment;

    (ii) Amount of judgment;

    (iii) The judgment rate of interest.

    (5) A sortable electronic spreadsheet of all loans in repossession and foreclosure
    that shall include all of the following:

    (a) Principal borrower''s name;

    (b) Loan or account number;

    (c) Type of security foreclosed, attached, replevied, repossessed, or surrendered;

    (d) Date of repossession or foreclosure;

    (e) Date of sale of the security;

    (f) Gross amount received from the sale of the security;

    (g) The amount of money applied to the outstanding loan balance;

    (h) Where the security is offered for private or public sale, evidence that the
    sale was consummated in compliance with the provisions of sections 1309.610, 1309.611,
    1309.615, 1309.617, and 1309.624 of the Revised Code.

    (6) A sortable electronic spreadsheet of all loans upon w hich a credit life claim
    has been paid by the insurer that shall include all of the following:

    (a) Principal borrower''s name;

    (b) Loan or account number;

    (c) Date of death;

    (d) Total amount paid by the insurance claim;

    (e) Amount applied to the principal borrower''s account.

    (7) General business records including, but not limited to, financial statements,
    check registers, bank statements, contracts with third-party vendors relating
    to lending services, policy and procedures manual, and training materials.

    (8) All contracts or agreements relating to business relationships with businesses
    or individuals licensed by the division of financial institutions;

    (9) A file of all advertisements;

    (10) Histories of nonpublished indices used to establish interest rates for variable
    rate loans, which shall be maintained for two years from date of usage;

    (11) Any other records the superintendent may from time to time specify in writing.

    (B) Where electronic records are required, a licensee may retain paper records
    as well. Where electronic records are required, the superintendent may, for good
    cause, allow a licensee to retain paper records in lieu of the electronic records
    required by this section.

    (C)(1) A licensee shall keep and preserve records pertaining to loans made under
    sections 1321.62 to 1321.702 of the Revised Code for at least two years after
    the final entry on the record. The final entry on the record occurs when the loan
    is paid in full, charged off as uncollectible, sold, transferred or assigned to
    another, or discharged or otherwise settled by a final order issued in litigation
    governing the loan transaction.

    (2) Notwithstanding division (C)(1) of this section, a licensee shall keep and
    preserve records pertaining to residential mortgage loans in accordance with 12
    C.F.R. 1026.25(b)(3) as in effect on November 30, 2016.

    (3) A licensee shall keep and preserve records pertaining to an advertisement
    for at least two years after the date the advertisement is published, broadcast,
    or disseminated.

    (D) A licensee shall segregate the records pertaining to business conducted pursuant
    to sections 1321.62 to 1321.702 of the Revised Code from all other business records.

    (E) A licensee shall notify the superintendent via the NMLSR of a change of location
    of its records pertaining to business conducted pursuant to sections 1321.62 to
    1321.702 of the Revised Code not later than five business days after the change.

    (F) Where a licensee maintains electronic records in compliance with this section
    and those records are located outside of this state, the licensee shall make the
    electronic records available to the division of financial institutions upon request,
    within the time frame provided by the division. The electronic records may be
    uploaded to a secure server for the purpose of the division conducting an examination
    of the licensee.

    (G) In the event electronic records, books, records, data, a nd documents of a
    licensee are located outside of this state and the superintendent determines that
    an in-person examination is necessary, the licensee shall, upon the request of
    the superintendent, pay in advance the estimated costs of the examination of the
    licensee outside this state, including the proportionate cost of the salaries
    of division of financial institutions employees who conduct the examination. The
    estimated costs of an out-of-state examination, as determined by the superintendent,
    shall be deposited with the division of financial institutions upon demand. After
    the actual costs of the out-of-state examination have been determined, any funds
    in the deposit account in excess of costs as itemized by the division of financial
    institutions shall be returned to the licensee.

    (H) Any records maintained on an electronic storage media or system shall meet
    all of the following requirements:

    (1) The electronic storage media or system must preserve the records in a nonrewritable,
    nonerasable format.

    (2) The electronic storage media or system must verify automatically the quality
    and accuracy of the storage media recording process.

    (3) The electronic storage media or system must serialize the original and the
    duplicate units of storage media, and affix a date and time for the required period
    of retention on both the original and duplicate.

    (4) The electronic storage media or system must have the capacity to readily download
    indices and records preserved on the electronic storage media or system to any
    medium acceptable to the superintendent.

    ( 5) Acceptable facilities and appropriate equipment must, at all times during
    normal business hours, be available to the superintendent for immediate, easily
    readable projection or production of electronic storage media or system images
    and for producing easily readable images.

    (6) Immediate facsimile enlargement must be available upon the superintendent''s
    request.

    (7) A duplicate copy of the electronic record stored on any electronic media or
    system for the time required must be stored separately from the "original" electronic
    record.

    (8) The electronic storage media or system must organize and index accurately
    all information maintained on both the original and duplicate storage media or
    system.

    (9) At all times, a licensee must be able to have indices of the electronic records
    being stored available for examination by the superintendent.

    (10) Each index must also be duplicated and the duplicate copies must be stored
    separately from the original copy of each index.

    (11) Original and duplicate indices must be preserved for the time required for
    the indexed records.

    (12) An audit system must be in place that does all of the following:

    (a) Provides for accountability regarding inputting of records and inputting any
    changes made to every original and duplicate record maintained and preserved;

    (b) Requires the licensee, at all times, to have the results of the audit system
    available for examination by the s uperintendent;

    (c) Preserves the results of the audit for the time required for the audited records.

    (13) All information necessary to access records and indices stored on the electronic
    storage media or system, a copy of the physical and logical file format of the
    electronic storage media or system, the field format of all different information
    types written on the electronic storage media or system, together with the appropriate
    documentation and information necessary to access records and indices must be
    maintained, kept current, and provided promptly to the superintendent upon request.

    (14) No paper documents produced or reproduced by means of an electronic storage
    media or system may be destroyed until the conditions of division (H) of this
    section have been met with regard to each paper document that is to be destroyed.

    (15) At the request of the division:

    (a) Records must be printed on paper for inspection or examination without cost
    to the division within forty-eight hours of the request. The superintendent may
    grant additional time for good cause shown upon receipt of a request for additional
    time from the licensee.

    (b) The licensee shall provide any court documents in addition to those described
    in division (A)(3) of this section.

    (I) In order to reduce the risk of consumer fraud and related harms, including
    identity theft, licensees shall be required to comply with section 216 of the
    "Fair and Accurate Credit Transactions Act of 2003," 117 Stat. 1952 (amended 2010),
    15 U.S.C. 1681w as in effect on November 30, 2016, section 501 of the "Gramm Leach
    Bliley Act," 113 Stat. 1338 (1999) (amended 2010), 15 U.S.C. 6801 as in effect
    on November 30, 2016, and the rules promulgated pursuant to those federal acts,
    including 16 C.F.R. Part 313 and 16 C.F.R. Part 682, as in effect November 30,
    2016, pertaining to the maintenance, security, and disposal of consumer information
    and records.

    (J) The division shall make or cause to be made an examination of records pertaining
    to loans made under sections 1321.62 to 1321.702 of the Revised Code at least
    once every twenty-four months for the purpose of determining whether the licensee
    is complying with those sections and verifying the licensee''s annual report.'
