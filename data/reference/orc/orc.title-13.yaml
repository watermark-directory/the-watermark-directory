  url: https://codes.ohio.gov/ohio-revised-code/section-1346.01
- number: '1346.02'
  heading: Joining settlement or making deposits into qualified escrow fund
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1346'
    name: Tobacco Product Manufacturer Escrow Accounts
  text: 'Any tobacco product manufacturer selling cigarettes to consumers within the
    state (whether directly or through a distributor, retailer or similar intermediary
    or intermediaries) after June 30, 1999 shall do one of the following:

    (A) Become a participating manufacturer (as that term is defined in section II(jj)
    of the Master Settlement Agreement) and generally perform its financial obligations
    under the Master Settlement Agreement; or

    (B)(1) Place into a qualified escrow fund by April 15 of the year following the
    year in question the following amounts (as such amounts are adjusted for inflation):

    1999: $.0094241 per unit sold after June 30, 1999;

    2000: $.0104712 per unit sold;

    For each of 2001 and 2002: $.0136125 per unit sold;

    For each of 2003 through 2006: $.0167539 per unit sold;

    For each of 2007 and each year thereafter: $.0188482 per unit sold.

    (2) A tobacco product manufacturer that places funds into escrow pursuant to division
    (B)(1) of this section shall receive the interest or other appreciation on such
    funds as earned. Such funds themselves shall be released from escrow only under
    the following circumstances:

    (a) To pay a judgment or settlement on any released claim brought against such
    tobacco product manufacturer by the state or any releasing party located or residing
    in the state. Funds shall be released from escrow under division (B)(2)(a) of
    this section:

    (i) In the order in which they were placed into escrow; and

    (ii) Only to the extent and at the time necessary to make payments required under
    such judgment or settlement.

    (b) To the extent that a tobacco product manufacturer establishes that the amount
    it was required to place into escrow on account of units sold in the state in
    a particular year was greater than the Master Settlement Agreement payments, as
    determined pursuant to section IX(i) of that Agreement including after final determination
    of all adjustments, that such manufacturer would have been required to make on
    account of such units sold had it been a participating manufacturer, the excess
    shall be released from escrow and revert back to such tobacco product manufacturer;
    or

    (c) To the extent not released from escrow under division (B)(2)(a) or (b) of
    this section, funds shall be released from escrow and revert back to such tobacco
    product manufacturer twenty-five years after the date on which they were placed
    into escrow.

    (3) Each tobacco product manufacturer that elects to place funds into escrow pursuant
    to division (B) of this section shall annually certify to the attorney general
    that it is in compliance with division (B) of this section. The attorney general
    may bring a civil action on behalf of the state against any tobacco product manufacturer
    that fails to place into escrow the funds required under this section. Any tobacco
    product manufacturer that fails in any year to place into escrow the funds required
    under this section shall:

    (a) Be required within fifteen days to place such funds into escrow as shall bring
    it into compliance with this section. The court, upon a finding of a violation
    of division (B) of this section, may impose a civil penalty to be paid to the
    general revenue fund of the state in an amount not to exceed five per cent of
    the amount improperly withheld from escrow per day of the violation and in a total
    amount not to exceed one hundred per cent of the original amount improperly withheld
    from escrow;

    (b) In the case of a knowing violation, be required within fifteen days to place
    such funds into escrow as shall bring it into compliance with this section. The
    court, upon a finding of a knowing violation of division (B) of this section,
    may impose a civil penalty to be paid to the general revenue fund of the state
    in an amount not to exceed fifteen per cent of the amount improperly withheld
    from escrow per day of the violation and in a total amount not to exceed three
    hundred per cent of the original amount improperly withheld from escrow; and

    (c) In the case of a second knowing violation, be prohibited from selling cigarettes
    to consumers within the state (whether directly or through a distributor, retailer
    or similar intermediary) for a period not to exceed two years.

    Each failure to make an annual deposit required under this section shall constitute
    a separate violation.'
