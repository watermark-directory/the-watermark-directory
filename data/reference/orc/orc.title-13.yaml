- number: '1332.25'
  heading: Application for video service authorization
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1332'
    name: Fair Competition In Cable Operations
  text: '(A) An application made to the director of commerce for a video service authorization
    under section 1332.24 of the Revised Code shall require and contain only the following:

    (1) Specification of the location of the applicant''s principal place of business
    and the names of the applicant''s principal executive officers;

    (2) Specification of the geographic and political boundaries of the applicant''s
    proposed video service area;

    (3) A general description of the type or types of technologies the applicant will
    use to deliver the video programming, which may include wireline, wireless, or
    any other alternative technology, subject, as applicable, to section 1332.29 of
    the Revised Code;

    (4) An attestation that the applicant has filed or will timely file with the federal
    communications commission all forms required by that agency in advance of offering
    video service in this state;

    (5) An attestation that the applicant will comply with applicable federal, state,
    and local laws;

    (6) An attestation that the applicant is legally, financially, and technically
    qualified to provide video service;

    (7) A description of the applicant''s customer complaint handling process, including
    policies on addressing customer service issues, billing adjustments, and communication
    with government officials regarding customer complaints, and a local or toll-free
    telephone number at which a customer may contact the applicant.

    (B) For the purpose of division (A)(2) of this section:

    (1) The video service areas of video service providers may overlap.

    (2) A specified video service area shall be coextensive with municipal, township
    unincorporated area, or county boundaries, except as authorized under division
    (B)(3) or (4) of this section, but nothing in sections 1332.21 to 1332.34 of the
    Revised Code shall require a video service provider to provide access to video
    service within the entire video service area.

    (3) The specified video service area of a person using telecommunications facilities
    to provide video service on September 24, 2007, or of any other person later so
    using telecommunications facilities shall be the geographic area in which the
    person offered basic local exchange service on September 24, 2007.

    (4) Subject to division (C)(2) of section 1332.27 of the Revised Code, the specified
    video service area of an applicant cable operator that offers service under a
    franchise in effect on September 24, 2007, initially shall be, at minimum, the
    franchise area established under that franchise.

    (C) A video service provider shall immediately file an application to amend its
    video service authorization with the director to reflect any change in the information
    required under division (A)(1), (2), or (3) of this section. An amendment pursuant
    to division (A)(2) of this section shall include any new delivery technology information
    required by division (A)(3) of this section.

    (D) Within thirty days after its filing or within thirty days after the filing
    of supplemental information necessary to make it complete, the director shall
    determine the completeness of an application filed under division (A) or (C) of
    this section relative to the respective requirements of divisions (A), (B), and
    (C) of this section and, as applicable, shall notify the applicant of an incompleteness
    determination, state the bases for that determination, and inform the applicant
    that it may resubmit a corrected application. The director shall issue a video
    service authorization, authorization renewal, or amended authorization within
    fifteen days after the director''s determination that the filed application is
    complete.

    If the director does not notify the applicant regarding the completeness of the
    application within the time period specified in this division or does not issue
    the authorization requested by a completed application within the applicable time
    period, the application shall be deemed complete, and the authorization or amended
    authorization deemed issued on the forty-fifth day after the application''s filing
    date.

    (E) An applicant shall pay a two thousand dollar nonrefundable fee for each application
    filed under division (A) of this section and a one hundred dollar nonrefundable
    fee for each application to amend filed under division (C) of this section. Fees
    collected under this division shall be deposited to the credit of the video service
    authorization fund in the state treasury, which is hereby created, to be used
    by the department of commerce in carrying out its duties under sections 1332.21
    to 1332.34 of the Revised Code.

    (F)(1) No video service provider shall identify or make reference to an application
    fee under division (E) of this section on any subscriber bill or in conjunction
    with charging any fee to the subscriber.

    (2) A video service provider may identify or make reference on a subscriber bill
    to an assessment under section 1332.24 of the Revised Code only if the provider
    opts to pass the cost of the assessment onto subscribers.

    (G) An applicant may identify any information in its application as trade secret
    information, and if, upon its written request to the director, the director reasonably
    affirms all or part of that information as trade secret information, the information
    so affirmed does not constitute a public record for the purpose of section 149.43
    of the Revised Code.'
