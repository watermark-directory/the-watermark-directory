- number: '1309.526'
  heading: Filing-office rules - UCC 9-526
  title:
    num: '13'
    name: Commercial Transactions
  chapter:
    num: '1309'
    name: Secured Transactions
  text: '(A) The secretary of state shall adopt rules to implement this chapter. The
    filing-office rules shall be:

    (1) Consistent with this chapter; and

    (2) Adopted in accordance with Chapter 119. of the Revised Code.

    (B) To keep the filing-office rules and practices of the filing office in harmony
    with the rules and practices of filing offices in other jurisdictions that enact
    substantially sections 1309.501 to 1309.527 of the Revised Code, and to keep the
    technology used by the filing office compatible with the technology used by filing
    offices in other jurisdictions that enact substantially those sections, the secretary
    of state, so far as is consistent with the purposes, policies, and provisions
    of this chapter, shall do all of the following in adopting, amending, and repealing
    filing-office rules:

    (1) Consult with filing offices in other jurisdictions that enact substantially
    sections 1309.501 to 1309.527 of the Revised Code;

    (2) Consult the most recent version of the model rules promulgated by the international
    association of corporate administrators or any successor organization; and

    (3) Take into consideration the rules and practices of, and the technology used
    by, filing offices in other jurisdictions that enact substantially sections 1309.501
    to 1309.527 of the Revised Code.'
