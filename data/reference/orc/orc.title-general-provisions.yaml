- number: '1.61'
  heading: Agriculture defined
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: As used in any statute except section 303.01 or 519.01 of the Revised Code,
    "agriculture" includes farming; ranching; aquaculture; algaculture meaning the
    farming of algae; apiculture and related apicultural activities, production of
    honey, beeswax, honeycomb, and other related products; horticulture; viticulture,
    winemaking, and related activities; animal husbandry, including, but not limited
    to, the care and raising of livestock, equine, and fur-bearing animals; poultry
    husbandry and the production of poultry and poultry products; dairy production;
    the production of field crops, tobacco, fruits, vegetables, nursery stock, ornamental
    shrubs, ornamental trees, flowers, sod, or mushrooms; timber; pasturage; any combination
    of the foregoing; the processing, drying, storage, and marketing of agricultural
    products when those activities are conducted in conjunction with, but are secondary
    to, such husbandry or production; and any additions or modifications to the foregoing
    made by the director of agriculture by rule adopted in accordance with Chapter
    119. of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.61
