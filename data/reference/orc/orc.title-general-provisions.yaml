- number: '9.80'
  heading: Contribution to charity deductions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: The chief officer of any department or division of the state, and the budgeting
    authority of any political subdivision or school district, or any institution
    supported in whole or in part by the state, a county or municipality, may authorize
    a payroll deduction plan for contributions by employees to one or more specified
    charitable agencies which are corporations not for profit, community chests, united
    funds, or other similar united community fund organizations.
