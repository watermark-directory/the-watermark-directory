- number: '9.31'
  heading: Erroneous bids
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'A bidder for a contract with the state or any political subdivision, district,
    institution, or other agency thereof, excluding therefrom the Ohio department
    of transportation, for the construction, demolition, alteration, repair, or reconstruction
    of any public building, structure, highway, or other improvement may withdraw
    his bid from consideration if the price bid was substantially lower than the other
    bids, providing the bid was submitted in good faith, and the reason for the price
    bid being substantially lower was a clerical mistake as opposed to a judgment
    mistake, and was actually due to an unintentional and substantial arithmetic error
    or an unintentional omission of a substantial quantity of work, labor, or material
    made directly in the compilation of the bid. Notice of a claim of right to withdraw
    such bid must be made in writing filed with the contracting authority within two
    business days after the conclusion of the bid opening procedure.

    No bid may be withdrawn under this section when the result would be the awarding
    of the contract on another bid of the same bidder.

    No bidder who is permitted to withdraw a bid shall for compensation supply any
    material or labor to, or perform any subcontract or other work agreement for,
    the person to whom the contract is awarded or otherwise benefit, directly or indirectly,
    from the performance of the project for which the withdrawn bid was submitted,
    without the approval of the contracting authority. The person to whom the contract
    was awarded and the withdrawing bidder are jointly liable to the contracting authority
    in an amount equal to any compensation paid to or for the benefit of the withdrawing
    bidder without such approval, in addition to the penalty provided in section 2913.31
    of the Revised Code.

    If a bid is withdrawn under authority of this section, the contracting authority
    may award the contract to the next lowest bidder or reject all bids and resubmit
    the project for bidding. In the event the contracting authority resubmits the
    project for bidding the withdrawing bidder shall pay the costs, in connection
    with the resubmission, of printing new contract documents, required advertising,
    and printing and mailing notices to prospective bidders, if the contracting authority
    finds that such costs would not have been incurred but for such withdrawal.

    The contracting authority, if it intends to contest the right of a bidder to withdraw
    a bid, shall hold a hearing thereon within ten days after the opening of such
    bids and issue any order allowing or denying the claim of such right within five
    days after such hearing is concluded. The contracting authority shall give to
    the withdrawing bidder timely and reasonable notice of the time and place of any
    such hearing. The contracting authority shall make a stenographic record of all
    testimony, other evidence, and rulings on the admissibility of evidence presented
    at the hearing. Such order may be appealed under section 119.12 of the Revised
    Code. The bidder shall pay the costs of the hearing.

    In the event the contracting authority denies the claim for withdrawal and the
    bidder elects to appeal or otherwise refuses to perform, the contracting authority
    may reject all bids or award to the next lowest bidder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.31
- number: '9.311'
  heading: Bonds accompanying bid to be executed by approved surety
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) A bid for a contract with the state or any political subdivision, district,
    institution, or other agency of the state, for the rendering of services, or the
    supplying of materials, or for the construction, demolition, alteration, repair,
    or reconstruction of any public building, structure, highway, or other improvement
    shall be deemed nonresponsive and shall be rejected if the bidder submits with
    his bid a bid bond, performance bond, payment bond, or combination of those bonds,
    executed by a surety not licensed, or a surplus lines company not approved, by
    the superintendent of insurance to execute such a bond in the state.

    (B) All of those bonds shall affirmatively state on their face that the surety
    is authorized to execute bonds in the state and that the liability incurred is
    within the limits of section 3929.02 of the Revised Code. Failure to include this
    statement shall not cause the bid to be deemed nonresponsive and rejected if the
    surety is in fact authorized to execute bonds in the state and the liability incurred
    is within the limits of section 3929.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.311
- number: '9.312'
  heading: Factors to determine whether bid is responsive and bidder is responsible
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) If a state agency or political subdivision is required by law or by an
    ordinance or resolution adopted under division (C) of this section to award a
    contract to the lowest responsive and responsible bidder, a bidder on the contract
    shall be considered responsive if the bidder''s proposal responds to bid specifications
    in all material respects and contains no irregularities or deviations from the
    specifications which would affect the amount of the bid or otherwise give the
    bidder a competitive advantage. The factors that the state agency or political
    subdivision shall consider in determining whether a bidder on the contract is
    responsible include the experience of the bidder, the bidder''s financial condition,
    conduct and performance on previous contracts, facilities, management skills,
    and ability to execute the contract properly.

    For purposes of this division, the provision of a bid guaranty in accordance with
    divisions (A)(1) and (B) of section 153.54 of the Revised Code issued by a surety
    licensed to do business in this state is evidence of financial responsibility,
    but a state agency or political subdivision may request additional financial information
    for review from an apparent low bidder after it opens all submitted bids. A state
    agency or political subdivision shall keep additional financial information it
    receives pursuant to a request under this division confidential, except under
    proper order of a court. The additional financial information is not a public
    record under section 149.43 of the Revised Code.

    An apparent low bidder found not to be responsive and responsible shall be notified
    by the state agency or political subdivision of that finding and the reasons for
    it. Except for contracts awarded by the department of administrative services
    pursuant to section 125.11 of the Revised Code, the notification shall be given
    in writing by an internet identifier of record associated with the bidder, or
    by certified mail if no internet identifier of record is available. When awarding
    contracts pursuant to section 125.11 of the Revised Code, the department may send
    such notice in writing by first class mail or by electronic means.

    (B) Where a state agency or a political subdivision that has adopted an ordinance
    or resolution under division (C) of this section determines to award a contract
    to a bidder other than the apparent low bidder or bidders for the construction,
    reconstruction, improvement, enlargement, alteration, repair, painting, or decoration
    of a public improvement, it shall meet with the apparent low bidder or bidders
    upon a filing of a timely written protest. The protest must be received within
    five days of the notification required in division (A) of this section. No final
    award shall be made until the state agency or political subdivision either affirms
    or reverses its earlier determination. Notwithstanding any other provisions of
    the Revised Code, the procedure described in this division is not subject to Chapter
    119. of the Revised Code.

    (C) A municipal corporation, township, school district, board of county commissioners,
    any other county board or commission, or any other political subdivision required
    by law to award contracts by competitive bidding may by ordinance or resolution
    adopt a policy of requiring each competitively bid contract it awards to be awarded
    to the lowest responsive and responsible bidder in accordance with this section.

    (D) As used in this section, "internet identifier of record" means an electronic
    mail address, or any other designation used for self-identification or routing
    in internet communication or posting, provided for the purpose of receiving communication.'
