- number: '9.25'
  heading: Purchase of surplus commodities from federal government
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'Whenever the superintendent of purchases and printing or the director of
    transportation finds that personal property can be obtained from the federal government
    at prices less than would be obtained by taking bids as provided by law for the
    purchase from private persons, said superintendent or said director may purchase,
    lease, or obtain the use of said property directly from the federal government
    without the necessity of advertising to obtain bids, without notice, and upon
    such formalities and such terms as are required by the federal government.

    Any political subdivision of the state may likewise purchase such surplus commodities
    from the federal government without the necessity of advertising to obtain bids
    irrespective of the amount of money involved. Such purchase may be made through
    the superintendent or directly from the federal government.'
