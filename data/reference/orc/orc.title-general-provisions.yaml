- number: '9.05'
  heading: Sex recognition policy
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in the Revised Code:

    (1) "Boy" means a juvenile human male.

    (2) "Female" means a person belonging, at conception, to the sex that produces
    the large reproductive cell.

    (3) "Gender identity" means an individual''s internal and subjective sense of
    self, disconnected from biological reality and sex and existing on an infinite
    continuum, that does not provide a meaningful basis for identification and cannot
    be recognized as a replacement for sex.

    (4) "Girl" means a juvenile human female.

    (5) "Male" means an individual belonging, at conception, to the sex that produces
    the small reproductive cell.

    (6) "Man" means an adult human male.

    (7) "Sex" means the biological indication of male and female, including sex chromosomes,
    naturally occurring sex hormones, gonads, and nonambiguous internal and external
    genitalia present at birth, without regard to an individual''s psychological,
    chosen, or subjective experience of gender.

    (8) "Woman" means an adult human female.

    (B) It is the policy of the state of Ohio to recognize two sexes, male and female.
    These sexes are not changeable and are grounded in fundamental and incontrovertible
    reality.'
