  url: https://codes.ohio.gov/ohio-revised-code/section-5.014
- number: '5.015'
  heading: Suggested ceremonial procedure for retirement of state flag
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: '(A) The general assembly recommends the following ceremonial procedure for
    the retirement of the state flag, to be followed, voluntarily, with respect and
    dignity, by civilians and civilian groups or organizations.

    (B) The ceremony shall consist of three parts: a preamble, a pledge, and the retirement
    by burning of the separated parts of the state flag.

    (C) Before the ceremony to retire the state flag, the dedicated parts of the state
    flag shall be separated as specified in division (G) of this section in preparation
    for the ceremony. A written preamble as set forth in division (D) of this section
    shall be provided to all persons upon entering the premises where the ceremony
    will occur along with a copy of the pledge set forth in section 5.013 of the Revised
    Code.

    (D) The preamble to the ceremony shall state the following:

    I am the flag of the state of Ohio.

    My first witness to our country as your state symbol was to the assassination
    of President William McKinley on September 14, 1901.

    Our state went nearly one hundred years without a flag to represent us.

    The spirit of Ohio is within me.

    I represent everything: from the hills and valleys, to the rivers and roadways
    of our great state.

    I call our state great for many reasons.

    Some have called our state the Mother of Presidents.

    Eight of our nation''s presidents have been born among these hills and valleys.

    Know that, in my retirement, my spirit must live on.

    The spirit of Ohio must live on!

    The history of yesterday, the gifts of the present, and the future of tomorrow.

    These principles are woven into me!

    (E) All persons present who are able, should be asked to stand at attention with
    their right hands placed over their hearts or with the appropriate salute during
    the pledge to the flag. A speaker shall lead the group in stating the pledge set
    forth in section 5.013 of the Revised Code.

    (F) After the pledge, the speaker shall ask that the stripes be brought forth,
    stating: "Please bring forth the stripes of our flag. These stripes represent
    the roads and waterways of Ohio. Let them now be retired by fire." The speaker
    shall then ask that the union and stars be brought forth, stating: "Please bring
    forth the blue union and stars of our flag. This union represents the hills and
    valleys of Ohio. These stars represent our joining the Union as the 17th state.
    Now let them be retired by fire. As we continue about our daily lives, keep in
    mind the spirit of the flag and know that it lives on."

    (G) The dedicated parts of the state flag shall be cut in separate parts including
    the triangular blue union with stars as one piece, the three red stripes as three
    separate pieces, and the two white stripes as two additional pieces. The five
    stripes shall be presented upon the request of the speaker. The blue union and
    stars shall be presented as one piece upon the request of the speaker.'
