- number: '9.483'
  heading: Sale and leaseback agreements
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: Notwithstanding limitations imposed by the Revised Code to the contrary, a
    political subdivision may enter into a sale and leaseback agreement under which
    the legislative authority agrees to convey a building owned by the political subdivision
    to a purchaser who is obligated, immediately upon closing, to lease all or portions
    of the building back to the legislative authority. The sale and leaseback agreement
    shall obligate the lessor to make public improvements to all or portions of the
    building subject to the lease, including renovations, energy conservation measures,
    and other measures that are necessary to improve the functionality and reduce
    the operating costs of the portions of the building that are subject to the lease.
