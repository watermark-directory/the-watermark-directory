- number: '9.10'
  heading: Facsimile signature defined
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: As used in sections 9.10 to 9.14, inclusive, of the Revised Code, "facsimile
    signature" includes, but is not limited to, the reproduction of any authorized
    signature by a copper plate or by a photographic, photostatic, or mechanical device,
    but does not authorize the use of a rubber stamp signature by the official or
    authorized employee referred to in section 9.11 of the Revised Code on the face
    of any instrument mentioned in such section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.10
- number: '9.11'
  heading: Public officials using facsimile signature
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: Any elected or appointed public official of this state or of any political
    subdivision or instrumentality thereof, or any member, agent, or employee of any
    board, commission, bureau, or other public body established by law, who is permitted
    or required in the performance of his duties to affix his signature on any check,
    draft, warrant, voucher, or other instrument for the payment of money, may adopt
    a facsimile thereof, in lieu of such manual signature, and affix such facsimile
    to any such instrument. Notice of the adoption of any such facsimile shall be
    given in writing to the depository from which funds are to be withdrawn, which
    notice shall include a description of the device to be used and a specimen of
    such facsimile signature. Prior to use of such facsimile, the written approval
    of such depository must be obtained.
