- number: '9.316'
  heading: Injunctive relief
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) A person that is likely to be damaged by a violation of section 9.315
    of the Revised Code may commence a civil action for injunctive relief against
    the public authority, and the court of common pleas involved in that action may
    grant injunctive relief based on the principles of equity and on the terms that
    the court considers reasonable. Proof of monetary damage or loss of profits is
    not required in a civil action commenced under this division.

    (B) The court may award reasonable attorney''s fees and court costs to the prevailing
    party in a civil action authorized by division (A) of this section.'
