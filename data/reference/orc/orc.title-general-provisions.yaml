- number: '3.30'
  heading: Failure to give bond of office or file oath of office
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'Except as otherwise provided in section 3.061 of the Revised Code, a person
    elected or appointed to an office who is required by law to give a bond or security
    previous to the performance of the duties imposed on the person by the person''s
    office, who refuses or neglects to give such bond or furnish such security within
    the time and in the manner prescribed by law, and in all respects to qualify self
    for the performance of such duties, is deemed to have refused to accept the office
    to which the person was elected or appointed. Such office shall be considered
    vacant and shall be filled as provided by law.

    A person subject to a policy adopted under section 3.061 of the Revised Code,
    when the policy is in effect and becomes applicable to the person upon the beginning
    of the person''s term of office or employment, is deemed to have refused to accept
    the office or employment when the person fails to take, certify, and file the
    oath of office as required by law or fails to document proof of insurance coverage
    as provided in division (D) of section 3.061 of the Revised Code and the office
    shall be considered vacant and shall be filled as provided by law.

    A person who becomes subject to a policy adopted under section 3.061 of the Revised
    Code during the person''s term of office or employment is deemed to have vacated
    the office when the person fails to document proof of insurance coverage as provided
    in division (D) of section 3.061 of the Revised Code and the vacancy shall be
    filled as provided by law.'
