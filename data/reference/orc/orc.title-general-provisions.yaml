- number: '9.56'
  heading: Plans and drawings for public buildings filed with county recorder
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "owner of any public building" means any state
    agency, public institution, political subdivision, or any other organized body,
    office, agency, institution, or entity established by the laws of this state for
    the exercise of any function of government.

    (B) Except as otherwise provided in division (C) of this section, the owner of
    any public building, within thirty days after the completion of the project, shall
    file the plans and drawings representing the building as built for any such public
    building constructed or being constructed after the effective date of this section
    with the county recorder in the county where the building is located. The plans
    and drawings and the paper, inks, and markings used thereon shall be of a quality
    that ensures a legible reproduction.

    (C) No plans and drawings representing the building as built need be filed for
    a building under division (B) of this section if either of the following applies:

    (1) A political subdivision approves the plans and drawings representing the building
    as built for that building and records and maintains the plans and drawings and
    makes them available for public inspection and the plans and drawings and the
    paper, inks, and markings used thereon are of a quality that ensures a legible
    reproduction.

    (2) The building is located in a political subdivision that records and maintains
    the plans and drawings representing the building as built and makes them available
    for public inspection and the plans and drawings and the paper, inks, and markings
    used thereon are of a quality that ensures a legible reproduction.

    (D) No plans and drawings shall be destroyed or transferred without approval by
    the county recorder.'
