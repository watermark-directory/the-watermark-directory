- number: '9.58'
  heading: Court settlements that conflict with the Revised Code
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "public official" means any elected or appointed
    officer, employee, or agent of the state or any political subdivision, board,
    commission, bureau, or other public body established by law.

    (B) In any civil action in a state or federal court, no public official, including
    any attorney representing or acting on behalf of a public official, has any authority
    to compromise or settle the action, consent to any condition, or agree to any
    order in connection therewith if the compromise, settlement, condition, or order
    nullifies, suspends, enjoins, alters, or conflicts with any provision of the Revised
    Code.

    (C) Any compromise, settlement, condition, or order to which a public official
    agrees that conflicts with division (B) of this section is void and has no legal
    effect.

    (D) Nothing in this section shall be construed to limit or otherwise restrict
    any powers granted by Article IV, Ohio Constitution.'
  history: null
