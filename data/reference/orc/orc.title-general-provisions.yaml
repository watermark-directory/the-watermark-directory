- number: '9.237'
  heading: Rules governing terms of disbursement contracts
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'The attorney general shall adopt rules in accordance with Chapter 119. of
    the Revised Code governing the terms of any contract entered into under section
    9.231 of the Revised Code. The rules shall set forth all of the following:

    (A) A definition of permissible components of direct costs, including a list of
    expenditures that may never be included in direct costs and a nonexclusive list
    of expenditures that may be included in direct costs pursuant to agreement of
    the parties;

    (B) Permissible methods by which a recipient may keep records documenting direct
    costs and how long those records must be retained;

    (C) Remedies not inconsistent with section 9.236 of the Revised Code in the event
    of a breach of the contract;

    (D) Terms to be included in contracts between recipients and persons other than
    the governmental entity, including the notice of the remedies available to the
    governmental entity if the money under the contract with the governmental entity
    is not expended on direct costs or retained as allocable nondirect costs or, with
    respect to any contract described in division (A)(3) of section 9.231 of the Revised
    Code, is not earned under the terms of the contract with the governmental entity;

    (E) Any other provisions that the attorney general considers necessary to carry
    out the purposes of sections 9.23 to 9.236 of the Revised Code.'
