- number: '9.22'
  heading: Use of debit card accounts
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'As used in this section, "political subdivision" means a county, township,
    municipal corporation, or any other body corporate and politic that is responsible
    for government activities in a geographic area smaller than that of the state.

    No political subdivision may hold or utilize a debit card account, except for
    law enforcement purposes. Possession or use of a debit card account by a political
    subdivision except for law enforcement purposes is a violation of section 2913.21
    of the Revised Code.

    This section does not apply to debit card accounts related to the receipt of grant
    moneys.'
