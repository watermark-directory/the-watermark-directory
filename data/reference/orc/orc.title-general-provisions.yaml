- number: '5.2267'
  heading: ALS Awareness Month
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'Amyotrophic lateral sclerosis (ALS), commonly known as Lou Gehrig''s disease,
    is a neurodegenerative disease that affects nerve cells in the brain and spinal
    cord causing progressive muscle weakness and paralysis, and eventually death,
    while the patient''s mental capacity and awareness of the disease remain unaffected.
    Because there is no known cause, prevention, or cure for this devastating disease,
    the general assembly finds that it is vitally important that the month of May
    be designated as "ALS Awareness Month."

    The month of May therefore is designated as "ALS Awareness Month" to increase
    public awareness and understanding of amyotrophic lateral sclerosis and to encourage
    efforts in finding treatments and a cure for ALS.'
