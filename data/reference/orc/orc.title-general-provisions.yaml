- number: '9.242'
  heading: Debarred vendors; participation in state contracts
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "State agency" has the meaning defined in section 1.60 of the Revised Code.

    (2) "State contract" means any contract for goods, services, or construction that
    is paid for in whole or in part with state funds. A state contract is considered
    to be awarded when it is entered into or executed, regardless of whether the parties
    to the contract have exchanged any money.

    (3) "Participate" means to respond to any solicitation or procurement issued by
    a state agency or be the recipient of an award of a state contract, or to provide
    any goods or services to any state agency.

    (B) No vendor who has been debarred by any state agency shall participate in any
    state contract during the period of debarment. No vendor who has been prohibited
    under section 102.99 of the Revised Code from participating in a contract with
    a public agency, as defined in section 102.01 of the Revised Code, shall participate
    in any contract with a public agency during the period provided in that section.

    (C) State agencies shall exclude any vendor debarred under section 125.25, 153.02,
    or 5513.06 of the Revised Code, or any other section of the Revised Code from
    participating in state contracts. A public agency, as defined in section 102.01
    of the Revised Code, shall exclude any vendor who is prohibited under section
    102.99 of the Revised Code from participating in a contract with a public agency
    from participating in any contract with the public agency.

    (D) After the debarment period or prohibition period expires, the vendor may be
    eligible to respond to any solicitation or procurement, provide goods or services
    to, and be awarded contracts by state agencies if the vendor is not otherwise
    listed on a list of debarred vendors applicable to state contracts, prohibited
    under section 102.99 of the Revised Code, or otherwise debarred or prohibited
    under any section of the Revised Code.'
