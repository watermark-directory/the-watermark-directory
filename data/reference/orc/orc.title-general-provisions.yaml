- number: '9.94'
  heading: Fractionalized interests in any one or more public obligations
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: Third parties shall not issue and sell to others or publicly underwrite fractionalized
    interests in any one or more public obligations, as defined in division (GG)(2)
    of section 133.01 of the Revised Code, without the knowledge and express written
    approval or authorization of each public issuer that is the obligor on such public
    obligations. Provision to that effect shall be included in each such public obligation
    in which fractionalized interests are not, with the knowledge and authorization
    of that obligor, initially issued.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.94
- number: '9.95'
  heading: Maximum or maximum average annual interest rate on public securities
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: Securities to which this section applies shall bear interest at not to exceed
    the maximum or maximum average annual interest rate per annum determined in or
    pursuant to the proceedings for the securities by the legislative authority, taxing
    authority, subdivision, governing body, officer, or other issuer, board, authority,
