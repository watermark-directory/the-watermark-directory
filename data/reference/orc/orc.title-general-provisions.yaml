- number: '9.12'
  heading: Validity of instrument with facsimile signature
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: Any check, draft, warrant, voucher, or other instrument for the payment of
    money bearing a duly adopted facsimile signature as authorized by section 9.11
    of the Revised Code, even though such facsimile signature was affixed without
    the authority or knowledge of the person whose signature it purports to be, is
    as valid as if the genuine manual signature of such person were affixed thereto
    as to any depository, bank, or other person which gave value for such instrument
    in good faith.
