- number: '9.69'
  heading: Duties and status of law enforcement officer
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "law enforcement officer" means any of the following
    who is employed, commissioned, disposed, appointed, or elected in a capacity specified
    in division (A)(1), (2), or (3) of this section for this state, a political subdivision
    of this state, or an agency, department, or instrumentality of this state or a
    political subdivision of this state:

    (1) Any law enforcement officer, as defined in section 2901.01 of the Revised
    Code;

    (2) Any peace officer, as defined in section 2935.01 of the Revised Code;

    (3) Any person who is employed in this state, who is authorized to carry firearms,
    and who is subject to and in compliance with the requirements of section 109.801
    of the Revised Code.

    (B) For purposes of the Revised Code, both of the following apply regarding a
    law enforcement officer who, by virtue of the officer''s employment, commissioning,
    disposition, appointment, or election as that law enforcement officer, has a responsibility
    to enforce all or certain laws:

    (1) The officer holds public office on a continuing basis and has a continuing
    duty to enforce those laws.

    (2) The officer is always on duty, regardless of whether the officer is, or is
    not, officially within work hours or officially on the clock.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.69
- number: '9.691'
  heading: Security employees of the general assembly and executive department officers
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) The general assembly and executive department officers elected under
    Ohio Constitution, Article III may establish, implement, and fund through public
    resources, security provisions for the protection of the members of the general
    assembly and executive department officers covered under this section.

    (B)(1) The authority to determine and administer appropriate security provisions
    for the general assembly is vested in the presiding officer of each house.

    (2) The authority to determine and administer security provisions for executive
    department officers covered by this section is vested in each respective officer.

    (3) The supreme court has the authority to adopt rules under its general superintending
    power that governs security provisions, including establishing, implementing,
    and funding through public resources, those provisions, for justices, judges,
    and the judiciary as established by Ohio Constitution, Article IV and the laws
    of this state.

    (C)(1) In addition to the sergeant at arms and any assistant sergeants at arms,
    each house of the general assembly may appoint, employ, contract with, and fix
    the compensation of law enforcement officers, as defined in section 9.69 of the
    Revised Code, or other persons to provide or coordinate security for the members
    of the general assembly.

    (2) Each executive department officer covered by this section may appoint, employ,
    contract with, and fix the compensation of law enforcement officers, as defined
    in section 9.69 of the Revised Code, or other persons to provide or coordinate
    security for the officer.

    (3) Any law enforcement officer, as defined in section 9.69 of the Revised Code,
    who is authorized to provide or coordinate security for the general assembly or
    the executive department officers covered by this section has the same arrest
    powers as other peace officers and law enforcement officers to apprehend offenders
    against the criminal laws who endanger or threaten the security of any person
    being protected, no matter where the offense occurs. This jurisdiction is concurrent
    with that of peace officers and law enforcement officers of the county, township,
    or municipal corporation in which the violation occurs and with the state highway
    patrol.

    (D) This section is in addition to, independent of, and operates concurrently
    with, any security provided by the state highway patrol under section 5503.02
    of the Revised Code.'
