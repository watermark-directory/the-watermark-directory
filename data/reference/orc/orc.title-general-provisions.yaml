- number: '9.681'
  heading: Local regulation of tobacco and alternative nicotine products
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "tobacco product" and "alternative nicotine
    product" have the same meanings as in section 2927.02 of the Revised Code.

    (B) The regulation of tobacco products and alternative nicotine products is a
    matter of general statewide concern that requires statewide regulation. The state
    has adopted a comprehensive plan with respect to all aspects of the giveaway,
    sale, purchase, distribution, manufacture, use, possession, licensing, taxation,
    inspection, and marketing of tobacco products and alternative nicotine products.
    No political subdivision may enact, adopt, renew, maintain, enforce, or continue
    in existence any charter provision, ordinance, resolution, rule, or other measure
    that conflicts with or preempts any policy of the state regarding the regulation
    of tobacco products or alternative nicotine products, including, without limitation,
    by:

    (1) Setting or imposing standards, requirements, taxes, fees, assessments, or
    charges of any kind regarding tobacco products or alternative nicotine products
    that are the same as or similar to, that conflict with, that are different from,
    or that are in addition to, any standard, requirement, tax, fee, assessment, or
    other charge established or authorized by state law;

    (2) Lowering or raising an age requirement provided for in state law in connection
    with the giveaway, sale, purchase, distribution, manufacture, use, possession,
    licensing, taxation, inspection, and marketing of tobacco products or alternative
    nicotine products;

    (3) Prohibiting an employee eighteen years of age or older of a manufacturer,
    producer, distributor, wholesaler, or retailer of tobacco products or alternative
    nicotine products from selling tobacco products or alternative nicotine products;

    (4) Prohibiting an employee eighteen years of age or older of a manufacturer,
    producer, distributor, wholesaler, or retailer of tobacco products or alternative
    nicotine products from handling tobacco products or alternative nicotine products
    in sealed containers in connection with manufacturing, storage, warehousing, placement,
    stocking, bagging, loading, or unloading.

    (C) In addition to any other relief provided, the court shall award costs and
    reasonable attorney''s fees to any person, group, or entity that prevails in a
    challenge to an ordinance, resolution, regulation, local law, or other action
    as being in conflict with this section.

    (D) The general assembly finds and declares that this section is part of a statewide
    and comprehensive legislative enactment regulating all aspects of the giveaway,
    sale, purchase, distribution, manufacture, use, possession, licensing, taxation,
    inspection, and marketing of tobacco products and alternative nicotine products.
    The general assembly further finds and declares that the imposition of tobacco
    product and alternative nicotine product regulation by any political subdivision
    is a matter of statewide concern and would be inconsistent with that statewide,
    comprehensive enactment. Therefore, regulation of the giveaway, sale, purchase,
    distribution, manufacture, use, possession, licensing, taxation, inspection, and
    marketing of tobacco products and alternative nicotine products is a matter of
    general statewide concern that requires uniform statewide regulation. By the enactment
    of this section, it is the intent of the general assembly to preempt political
    subdivisions from the regulation of tobacco products and alternative nicotine
    products.

    (E) This section does not prohibit a political subdivision from levying a tax
    expressly authorized by state law, including the taxes authorized under Chapters
    5739. and 5741. or sections 5743.021, 5743.024, 5743.026, 5743.321, 5743.323,
    5743.324, 5743.511, 5743.521, 5743.621, and 5743.631 of the Revised Code.'
