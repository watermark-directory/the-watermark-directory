  url: https://codes.ohio.gov/ohio-revised-code/section-3.08
- number: '3.09'
  heading: Appeal in removal cases on questions of law by court of appeals
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'The decision of the court of common pleas in all cases for the removal of
    officers may be reviewed on appeal on questions of law by the court of appeals.
    The transcript of the record and the notice of appeal shall be filed in the court
    of appeals in not more than thirty days after the decision is rendered and the
    journal entry made by the court of common pleas. Such notice of appeal may be
    filed only after leave has been granted by the court of appeals for good cause
    shown at a hearing of which the attorneys for both the officer and the prosecution
    have been notified. The court of appeals has jurisdiction to hear such case at
    any place in the judicial district in which such court may be sitting, and such
    court shall hear such case in not more than thirty court days after the filing
    of the notice of appeal. The decision of the court of appeals in refusing to allow
    a notice of appeal to be filed, or in the passing upon the merits of the case
    in the appellate proceedings, shall be final. If the court of appeals reviews
    the proceedings provided for in section 3.08 of the Revised Code in any county
    within its judicial district other than the county where the officer complained
    against resides, said court of appeals shall transmit its findings with the reasons
    therefor to the clerk of the court of common pleas of the county where the officer
    complained against resides, with instructions to said clerk to make the findings
    of said court a matter of record upon the journal of said court in the county
    where the officer complained against resides. In all cases involving the removal
    of an officer against whom a complaint has been filed in the court of appeals,
    the officer has the right of review or appeal to the supreme court on leave first
    obtained, and such court shall hear such case in not more than thirty court days
    after leave has been granted. In other respects such hearing shall follow the
    regular procedure in appealable cases which originate in the court of appeals.

    If any officer is removed and the law provides no means for filling the vacancy,
    the board of elections in the county where the removed officer resides shall order
    a special election to fill such vacancy in the unit of government in which such
    officer was elected.'
  history: null
