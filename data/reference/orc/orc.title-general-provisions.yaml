  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The seventh day of October is designated as "Moses Fleetwood Walker Day"
    in honor of the Ohioan who was the first African-American major league baseball
    player under contract.

    In declaring the seventh day of October "Moses Fleetwood Walker Day," the general
    assembly recognizes the contribution that Moses Fleetwood Walker made to the integration
    of professional athletics. Born in Mount Pleasant, Ohio, on October 7, 1856, Moses
    Fleetwood Walker played one season with the Toledo Blue Stockings and died in
    Cleveland, Ohio, in 1924.'
