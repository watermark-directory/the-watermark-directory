- number: '9.65'
  heading: Annuity program for volunteer fire fighters
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) A board of township trustees, a board of fire district trustees of a
    joint fire district, or the legislative authority of a municipal corporation may
    establish, by resolution or ordinance, as appropriate, an annuity program for
    the volunteer fire fighters serving the political subdivision, including those
    affiliated with a private entity that provides fire-fighting or emergency medical
    services. The program may permit the board or the legislative authority to contract
    for, purchase, or otherwise procure from an insurer or insurers licensed to do
    business by this state an annuity for such fire fighters. The program may also
    permit the board or the legislative authority at any time to cancel or otherwise
    terminate an annuity with any particular insurer or insurers. The board or the
    legislative authority may pay all or any portion of the cost, premium, or charge
    of the annuity. The board or the legislative authority may create a fund in the
    treasury of the township, the joint fire district, or the municipal corporation,
    as appropriate, for the annuity program. The resolution or ordinance creating
    the program shall include a plan to assure the proper administration and operation
    of the program. The plan shall include, but not be limited to, all of the following:

    (1) The requirements a person must meet in order to be eligible to participate
    in the program;

    (2) The requirements an eligible person must meet annually in order to participate
    in the program;

    (3) A requirement that an audit of the accounts, financial reports, records, and
    files pertaining to the program be performed in the same manner and with the same
    frequency that an audit of a public office is performed under section 117.11 of
    the Revised Code. The audit required under division (A)(3) of this section shall
    be in addition to and separate from any audit of a township, joint fire district,
    or municipal corporation required under section 117.11 of the Revised Code but
    may be performed at the same time as such an audit.

    (4) Provisions for termination of the program.

    (B) A political subdivision that has established an annuity program under division
    (A) of this section may appropriate general revenue fund moneys of the political
    subdivision not appropriated for any other purpose to the annuity program and
    may use moneys raised under section 505.37, 505.371, or 505.39 or under division
    (I), (U), or (JJ) of section 5705.19 of the Revised Code for the annuity program.
    Income from the investment of moneys in any fund established in the treasury of
    a political subdivision for the annuity program shall be paid into the annuity
    fund.

    (C) As used in this section:

    (1) "Volunteer fire fighter" means a person who performs service as a fire fighter,
    or who performs emergency medical service, on a less than full-time basis for
    a political subdivision.

    (2) "Political subdivision" means a municipal corporation, a township, a township
    fire district, or a joint fire district.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.65
- number: '9.66'
  heading: Indication of outstanding liability owed to state in application for economic
    development assistance
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Economic development assistance" means all of the following:

    (a) The programs and assistance provided or administered by the department of
    development under Chapters 122. and 166. of the Revised Code and any other section
    of the Revised Code under which the department provides or administers economic
    development assistance;

    (b) The programs and assistance provided or administered by a political subdivision
    under Chapters 725. and 1728. and sections 3735.67 to 3735.70, 5709.40 to 5709.43,
    5709.61 to 5709.69, 5709.73 to 5709.75, and 5709.77 to 5709.81 of the Revised
    Code and any other section of the Revised Code under which a political subdivision
    provides economic development assistance;

    (c) Assistance provided under any other section of the Revised Code under which
    the state or a state agency provides or administers economic development assistance;

    (d) The tax credit authorized by section 5725.31, 5729.07, or 5733.42 of the Revised
    Code.

    (2) "Liability" means any of the following:

    (a) Any delinquent tax owed the state or a political subdivision of the state;

    (b) Any moneys owed the state or a state agency for the administration or enforcement
    of the environmental laws of the state;

    (c) Any other moneys owed the state, a state agency, or a political subdivision
    of the state that are past due.

    "Liability" includes any item described in division (A)(2) of this section that
    is being contested in a court of law.

    (3) "Political subdivision" means any county, municipal corporation, or township
    of the state.

    (4) "State agency" means every organized body, office, or agency established by
    the laws of the state for the exercise of any function of state government.

    (B) A person who applies to the state, a state agency, or a political subdivision
    for economic development assistance shall indicate on the application for assistance
    whether the person has any outstanding liabilities owed to the state, a state
    agency, or a political subdivision. Such a person also shall authorize the state,
    state agency, or political subdivision to inspect the personal or corporate financial
    statements of the applicant, including tax records and other similar information
    not open to public inspection.

    (C)(1) Whoever knowingly makes a false statement under division (B) of this section
    concerning an application for economic development assistance or who fails to
    provide any information required by that division is ineligible for the assistance
    applied for and is ineligible for any future economic development assistance from
    the state, a state agency, or a political subdivision.

    (2) Whoever knowingly makes a false statement under division (B) of this section
    concerning an application for economic development assistance or who fails to
    provide any information required by that division shall return any moneys received
    from the state, a state agency, or a political subdivision in connection with
    that application.

    (D) Information submitted to a political subdivision, a port authority created
    under Chapter 4582. of the Revised Code, or a tax incentive review council created
    under section 5709.85 of the Revised Code, from an applicant or recipient of economic
    development assistance, or of any grant, subgrant, exemption, credit, loan, award,
    cooperative agreement, or other similar and related form of financial assistance,
    and any information taken for any purpose from that information, is confidential
    and not a public record under section 149.43 of the Revised Code. However, the
    political subdivision, port authority, or tax incentive review council may use
    that information to the extent required to secure approval of an application and
    to comply with specific mandates imposed under the Revised Code, provided that
    under no circumstance shall the political subdivision, port authority, or tax
    incentive review council publicly disclose information, with respect to an applicant
    or a recipient, whether anonymized or not anonymized, that is not a public record
    open to public inspection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.66
- number: '9.661'
  heading: Liens to secure performance on development loans and property tax incentives
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Borrower" means any person obligated to repay a development loan pursuant
    to a development loan agreement or obligated to repay a loan guaranteed pursuant
    to a loan guarantee agreement.

    (2) "Development inducement agreement" means an agreement making a grant or inducement
    under the authority of Section 13 of Article VIII, Ohio Constitution, including
    an inducement made under section 166.02 of the Revised Code or a grant made under
    section 184.02 of the Revised Code.

    (3) "Development loan" means any loan made under the authority of Section 13 of
    Article VIII, Ohio Constitution, including any loan made under the authority of
    Chapter 122., 165., 166., 184., or 1724. of the Revised Code.

    (4) "Development loan agreement" means an agreement making a development loan.

    (5) "Grantee" means any grantee or other recipient of anything of value under
    a development inducement agreement.

    (6) "Guaranteed loan" means a loan guaranteed by this state, a state agency, or
    a political subdivision under the authority of Section 13 of Article VIII, Ohio
    Constitution, including any loan guarantee authorized under Chapter 166. of the
    Revised Code.

    (7) "Loan guarantee agreement" means an agreement providing for the guarantee
    of a guaranteed loan.

    (8) "Secured party" means the state, a state agency, or a political subdivision
    that enters into a development loan agreement, loan guarantee agreement, or development
    inducement agreement.

    (B) The obligations of a borrower under each development loan agreement or loan
    guarantee agreement may be secured by a lien of the secured party on the borrower''s
    real property and personal property the acquisition of which was funded in whole
    or in part by the proceeds of the loan. Any such lien shall be in an amount not
    exceeding the amount financed under the development loan agreement, or the amount
    guaranteed under the loan guarantee agreement, and used to fund acquisition of
    the property. The lien may be in addition to any other security required by the
    development loan agreement or loan guarantee agreement, but the sum of the lien
    amount and the value of any such other security shall not exceed the amount financed,
    or the amount guaranteed, and used to fund acquisition of the property. Such a
    lien on real property shall attach, and may be perfected, collected, and enforced,
    in the same manner as a mortgage lien on real property, and otherwise shall have
    the same force and effect as a mortgage lien on real property. Such a lien on
    personal property shall attach, and may be perfected, collected, and enforced,
    in the same manner as a security interest in goods under Chapter 1309. of the
    Revised Code, and shall otherwise have the same force and effect as such a security
    interest.

    (C) The obligations of a grantee under each development inducement agreement may
    be secured by a lien of the secured party on the grantee''s real property and
    personal property the acquisition of which was funded in whole or in part by the
    grant or other thing of value. Any such lien shall be in an amount not exceeding
    the amount of the grant or other thing of value granted to the grantee under the
    agreement and used to fund acquisition of the property. The lien may be in addition
    to any other security required by the development inducement agreement, but the
    sum of the lien amount and the value of any such other security shall not exceed
    the amount of the grant, or the value of any other thing of value granted, and
    used to fund acquisition of the property. Such a lien on real property shall attach,
    and may be perfected, collected, and enforced, in the same manner as a mortgage
    lien on real property, and otherwise shall have the same force and effect as a
    mortgage lien on real property. Such a lien on personal property shall attach,
    and may be perfected, collected, and enforced, in the same manner as a security
    interest in goods under Chapter 1309. of the Revised Code, and shall otherwise
    have the same force and effect as such a security interest.

    (D) A secured party may enforce such liens against real property by civil action
    in the court of common pleas of the county where the real property is located
    in the same manner as mortgage liens are enforced. A secured party may enforce
    such liens against personal property in the manner provided for the enforcement
    of security interests under Chapter 1309. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.661
- number: '9.67'
  heading: Restrictions on owner of professional sports team that uses a tax-supported
    facility
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) Subject to division (B) of this section, no owner of a professional sports
    team that uses a tax-supported facility for most of its home games and receives
    financial assistance from the state or a political subdivision thereof shall cease
    playing most of its home games at the tax-supported facility and begin playing
    most of its home games at a facility located outside of the state unless the owner
    does one of the following:

    (1) Enters into an agreement with the political subdivision permitting the team
    to play most of its home games at a facility located outside of the state;

    (2) Gives the political subdivision in which the tax-supported facility is located
    not less than six months'' advance written notice of the owner''s intention to
    cease playing most of its home games at the tax-supported facility and, during
    the six months after such notice, gives the political subdivision or any individual
    or group of individuals who reside in the area the opportunity to purchase the
    team.

    (B)(1) Any lease, operating agreement, management agreement, non-relocation agreement,
    or other similar agreement entered into with the political subdivision before,
    on, or after the effective date of this amendment that expressly obligates the
    professional sports team to play all or most of the professional sports team''s
    regular season home games at the tax-supported facility for the term of the lease
    or agreement, or for a shorter period of time as set forth in the lease or agreement,
    is, upon the expiration of the term of the lease or agreement, or shorter period
    of time as set forth in the lease or agreement, as applicable, deemed an agreement
    with the political subdivision permitting the team to play most of its home games
    at a different facility in satisfaction of division (A)(1) of this section.

    (2) Notwithstanding the expiration of the term of the lease or agreement, or a
    shorter period of time as set forth in the lease or agreement, as applicable,
    any lease or agreement described under division (B)(1) of this section is not
    deemed an agreement with the political subdivision permitting the team to play
    most of its home games at a different facility, in satisfaction of division (A)(1)
    of this section, if the different facility is located outside of the state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.67
- number: '9.68'
  heading: Regulation of arms prohibited - challenging political subdivisions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) The individual right to keep and bear arms, being a fundamental individual
    right that predates the United States Constitution and Ohio Constitution, and
    being a constitutionally protected right in every part of Ohio, the general assembly
    finds the need to provide uniform laws throughout the state regulating the ownership,
    possession, purchase, other acquisition, transport, storage, carrying, sale, other
    transfer, manufacture, taxation, keeping, and reporting of loss or theft of firearms,
    their components, and their ammunition, and knives. The general assembly also
    finds and declares that it is proper for law-abiding people to protect themselves,
    their families, and others from intruders and attackers without fear of prosecution
    or civil action for acting in defense of themselves or others. Except as specifically
    provided by the United States Constitution, Ohio Constitution, state law, or federal
    law, a person, without further license, permission, restriction, delay, or process,
    including by any ordinance, rule, regulation, resolution, practice, or other action
    or any threat of citation, prosecution, or other legal process, may own, possess,
    purchase, acquire, transport, store, carry, sell, transfer, manufacture, or keep
    any firearm, part of a firearm, its components, and its ammunition, and any knife,
    without being required to have firearm liability insurance, and without being
    required to pay a fee for the possession of a firearm, part of a firearm, its
    components, its ammunition, or a knife. Any such further license, permission,
    restriction, delay, or process interferes with the fundamental individual right
    described in this division and unduly inhibits law-abiding people from protecting
    themselves, their families, and others from intruders and attackers and from other
    legitimate uses of constitutionally protected arms, including hunting and sporting
    activities, and the state by this section preempts, supersedes, and declares null
    and void any such further license, permission, restriction, delay, or process.

    (B) A person, group, or entity adversely affected by any manner of ordinance,
    rule, regulation, resolution, practice, or other action enacted or enforced by
    a political subdivision in conflict with division (A) of this section may bring
    a civil action against the political subdivision seeking damages from the political
    subdivision, declaratory relief, injunctive relief, or a combination of those
    remedies. Any damages awarded shall be awarded against, and paid by, the political
    subdivision. In addition to any actual damages awarded against the political subdivision
    and other relief provided with respect to such an action, the court shall award
    reasonable expenses to any person, group, or entity that brings the action, to
    be paid by the political subdivision, if either of the following applies:

    (1) The person, group, or entity prevails in a challenge to the ordinance, rule,
    regulation, resolution, practice, or action as being in conflict with division
    (A) of this section.

    (2) The ordinance, rule, regulation, resolution, practice, or action or the manner
    of its enforcement is repealed or rescinded after the civil action was filed but
    prior to a final court determination of the action.

    (C) As used in this section:

    (1) The possession, transporting, or carrying of firearms, their components, their
    ammunition, or knives include, but are not limited to, the possession, transporting,
    or carrying, openly or concealed on a person''s person or concealed ready at hand,
    of firearms, their components, their ammunition, or knives.

    (2) "Firearm" has the same meaning as in section 2923.11 of the Revised Code.

    (3) "Reasonable expenses" include, but are not limited to, reasonable attorney''s
    fees, court costs, expert witness fees, and compensation for loss of income.

    (4) "Knife" means a cutting instrument and includes a sharpened or pointed blade.

    (5) "Arms" includes firearms and knives.

    (6) "Firearm liability insurance" means a policy of liability insurance covering
    losses resulting from the use of a firearm owned by the person covered by the
    policy.

    (D) This section does not apply to either of the following:

    (1) A zoning ordinance that regulates or prohibits the commercial sale of knives,
    firearms, firearm components, or ammunition for firearms in areas zoned for residential
    or agricultural uses;

    (2) A zoning ordinance that specifies the hours of operation or the geographic
    areas where the commercial sale of knives, firearms, firearm components, or ammunition
    for firearms may occur, provided that the zoning ordinance is consistent with
    zoning ordinances for other retail establishments in the same geographic area
    and does not result in a de facto prohibition of the commercial sale of knives,
    firearms, firearm components, or ammunition for firearms in areas zoned for commercial,
    retail, or industrial uses.'
