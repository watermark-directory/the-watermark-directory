    name: State Insignia; Seals; Holidays
  text: 'The last week of May is designated as "Ohio Turfgrass Week," in order to
    increase awareness of the importance of turfgrass to this state''s economy and
    environment. The General Assembly finds that the turfgrass industry in this state
    employs thousands of people and generates billions of dollars in revenue each
    year. The General Assembly also finds that turfgrass acts as an environmental
    filter absorbing pollutants such as carbon dioxide and sulfur dioxide and prevents
    soil erosion.

    As used in this section, "turfgrass" means a natural sod that has multiple uses.'
