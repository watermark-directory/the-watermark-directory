  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The first Monday in September of each year shall be known as "Labor day"
    and for all purposes shall be considered as the first day of the week.

    The second Monday in October of each year shall be known as "Columbus day" and
    is a legal holiday.

    The eleventh day of November of each year shall be known as "Veterans'' day" and
    is a legal holiday. If said day falls on Sunday, the following Monday is the legal
    holiday.'
