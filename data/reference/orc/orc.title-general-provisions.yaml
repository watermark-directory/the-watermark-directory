- number: '9.332'
  heading: Selection of and contract with construction manager
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'Every public authority planning to contract for construction management services
    with a construction manager shall evaluate the proposals submitted and may hold
    discussions with individual construction managers to explore further their proposals,
    the scope and nature of the services they would provide, and the various technical
    approaches they may take regarding the project. Following this evaluation, the
    public authority shall:

    (A) Select and rank no fewer than three construction managers that it considers
    to be the most qualified to provide the required construction management services,
    except when the public authority determines in writing that fewer than three qualified
    construction managers are available in which case it shall select and rank them;

    (B) Negotiate a contract with the construction manager ranked most qualified to
    perform the required services at a compensation determined in writing to be fair
    and reasonable. Contract negotiations shall be directed toward:

    (1) Ensuring that the construction manager and the public authority have a mutual
    understanding of the essential requirements involved in providing the required
    services;

    (2) Determining that the construction manager will make available the necessary
    personnel, equipment, and facilities to perform the services within the required
    time.

    (C) Upon failure to negotiate a contract with the construction manager ranked
    most qualified, the public authority shall inform the construction manager in
    writing of the termination of negotiations and enter into negotiations with the
    construction manager ranked next most qualified. If negotiations again fail, the
    same procedure may be followed with each next most qualified construction manager
    selected and ranked pursuant to division (A) of this section, in order of ranking,
    until a contract is negotiated.

    (D) If the public authority fails to negotiate a contract with any of the construction
    managers selected pursuant to division (A) of this section, the public authority
    may select and rank additional construction managers, based on their qualifications,
    and negotiations may continue as with the construction managers selected and ranked
    initially until a contract is negotiated.

    (E) Nothing in this section affects a public authority''s right to accept or reject
    any or all proposals in whole or in part.'
