- number: '5.56'
  heading: Lupus awareness month
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The month of May is designated as "Lupus Awareness Month" in recognition
    of the following:

    (A) Systemic lupus erythematosus, or lupus, is a chronic, complex, and often disabling
    autoimmune disorder in which the body''s immune system attacks the body''s own
    cells, tissues, and organs.

    (B) Lupus can affect many parts of the body, including the joints, skin, brain,
    heart, lungs, and kidneys.

    (C) Lupus nephritis is a serious manifestation of lupus that causes inflammation
    of the kidneys.

    (D) Lupus nephritis can lead to irreversible kidney damage or even kidney failure,
    which may require dialysis or a transplant.

    (E) Prompt diagnosis and treatment are crucial for patients with lupus and lupus
    nephritis.

    (F) Lupus and lupus nephritis are more common in and disproportionately impact
    women and patients of color.

    (G) Too many lupus and lupus nephritis patients, and especially marginalized patients,
    in the United States face harmful delays in diagnosis and treatment of these conditions.

    (H) The department of health''s lupus education and awareness program, established
    under section 3701.77 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5.56
