- number: '9.35'
  heading: Contracts for ministerial duties by public officials
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "public official" means an elected or appointed
    officer, employee, or agent of any political subdivision, board, commission, bureau,
    or other public body established by law who is permitted or required in the performance
    of official duties to issue checks, keep books and records, prepare and preserve
    payroll and other employee records, and make reports or perform other similar
    duties.

    (B) Any public official may contract for and engage the services of a financial
    institution, or other person engaged in the business or capable of rendering electronic
    data processing or computer services, to perform the mechanical, clerical, or
    record-keeping services necessary in the performance of official duties. Such
    services may include, but are not limited to, the preparation of payroll and other
    records, the preparation, signing, and issuance of checks, the preparation of
    reports and accounts, and the performance of all similar duties.

    (C) A contract authorized by division (B) of this section may be entered into
    only:

    (1) If the surety bond required of such public official includes within its coverage
    any loss which might occur as the result of such contract;

    (2) Pursuant to a resolution duly adopted by the governing board, commission,
    bureau, or other public body having jurisdiction over such public official authorizing
    a contract for the performance of such services;

    (3) If the contract does not conflict with the accounting requirements prescribed
    by the auditor of state under section 117.43 of the Revised Code or with accounting
    procedures prescribed by the director of budget and management under section 126.21
    of the Revised Code.

    (D) Such services are subject to audit by the auditor of state to the same extent
    as if such services were being performed by the public official.

    (E) A public official, at the request of a person to whom the political subdivision,
    board, commission, bureau, or other public body is indebted and to whom payment
    is to be made, may send a check to a bank representing the amount due such person
    for credit to the person''s account in the bank subject to the following conditions:

    (1) The person to whom payment is to be made provides the public official with
    a written request that designates the bank and contains the endorsement of such
    bank thereon stating its willingness to act in this respect as agent of such person;

    (2) In the event that there are two or more persons who designate the same bank
    and payments are due to such persons on the same regularly recurring dates, the
    public official may draw a single check for the total amount due all such persons
    in favor of the bank for credit to the accounts of the several persons;

    (3) Payment of a check drawn in favor of and properly endorsed by the bank designated
    by a person to whom payment is to be made constitutes a full acquittance to the
    public official for the amount of such payment.

    (F) Nothing contained in this section relieves such public official from the primary
    responsibility for the maintenance of the records and performance of the duties
    of office.'
