  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: Each person chosen or appointed to an office under the constitution or laws
    of this state, and each deputy or clerk of such officer, shall take an oath of
    office before entering upon the discharge of his duties. The failure to take such
    oath shall not affect his liability or the liability of his sureties.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.22
- number: '3.23'
  heading: Contents of oath of office
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'The oath of office of each judge of a court of record shall be to support
    the constitution of the United States and the constitution of this state, to administer
    justice without respect to persons, and faithfully and impartially to discharge
    and perform all the duties incumbent on the person as such judge, according to
    the best of the person''s ability and understanding. The oath of office of every
    other officer, deputy, or clerk shall be to support the constitution of the United
    States and the constitution of this state, and faithfully to discharge the duties
    of the office.

    Except for justices of the supreme court as provided in section 2701.05 of the
    Revised Code, each judge of a court of record shall take the oath of office on
    or before the first day of the judge''s official term. The judge shall transmit
    a certificate of oath, signed by the person administering the oath, to the clerk
    of the respective court and shall transmit a copy of the certificate of oath to
    the supreme court. The certificate of oath shall state the term of office for
    that judge, including the beginning and ending dates of that term. If the certificate
    of oath is not transmitted to the clerk of the court within twenty days from the
    first day of the judge''s official term, the judge is deemed to have refused to
    accept the office, and that office shall be considered vacant. The clerk of the
    court forthwith shall certify that fact to the governor and the governor shall
    fill the vacancy.

    The oath of office of a judge under this section shall be taken in a form that
    is substantially similar to the following:

    "I, (name), do solemnly swear that I will support the Constitution of the United
    States and the Constitution of Ohio, will administer justice without respect to
    persons, and will faithfully and impartially discharge and perform all of the
    duties incumbent upon me as (name of office) according to the best of my ability
    and understanding. [This I do as I shall answer unto God.]"'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.23
- number: '3.24'
  heading: Administration of oaths
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'Every person holding an elected office under the constitution or laws of
    this state may administer oaths of office to persons elected or appointed to offices
    under the constitution or laws of this state if those persons are elected or appointed
    to offices within the geographical limits of the elected officer''s constituency,
    except that members of the general assembly may administer oaths of office to
    persons elected or appointed to any office under the constitution or laws of this
    state. Nothing in this section shall forbid the judge of a court established by
    the constitution of this state or a notary public commissioned in this state from
    administering an oath to any person.

    When an oath of office is required to be certified in writing, the person taking
    the oath shall write the person''s signature immediately under the text of the
    oath. The person administering the oath under authority of this section shall
    then write the administering person''s signature, the title of the elected office
    that the administering person holds, and the date; and shall affix the seal of
    office if a seal is prescribed for, or has been adopted by, the administering
    person''s office.'
