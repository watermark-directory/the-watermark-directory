- number: '3.11'
  heading: Restrictions on holding more than one office
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'No person shall hold at the same time by appointment or election more than
    one of the following offices: sheriff, county auditor, county treasurer, clerk
    of the court of common pleas, county recorder, prosecuting attorney, and probate
    judge.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.11
- number: '3.111'
  heading: Simultaneous service as member or officer of board of convention and visitor's
    bureau
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'An elected officer of a county, township, or municipal corporation that has
    levied an excise lodging tax under section 5739.08 or 5739.09 of the Revised Code,
    or a designee appointed by such elected officer, may simultaneously serve in the
    elected or appointed position and as a member or officer of the board of trustees
    of a convention and visitors'' bureau organized under Chapter 1702. of the Revised
    Code. The simultaneous holding of the two positions shall not constitute the holding
    of incompatible offices or employment, notwithstanding Ohio common law or any
    contrary provision of the Revised Code.

    Nothing in this section prevents a municipal corporation or chartered county from
    adopting a more restrictive policy regarding the simultaneous holding of the positions
    described in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.111
- number: '3.112'
  heading: Simultaneous service as member of board of transportation improvement district
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: An elected officer or an employee of a county, township, or municipal corporation
    may simultaneously serve as a member or officer of the board of trustees of a
    transportation improvement district created under Chapter 5540. of the Revised
    Code. Neither the simultaneous holding of the two positions nor the financial
    or contractual relationship between a county, township, or municipal corporation
    and the transportation improvement district shall constitute the holding of incompatible
    offices or employment and are permissible, notwithstanding Ohio common law or
    any contrary provision of the Revised Code. An elected officer or an employee
    of a county, township, or municipal corporation who serves simultaneously as a
    member or officer of the board of trustees of a transportation improvement district
    does not have an unlawful interest in a public contract under section 2921.42
    of the Revised Code by virtue of a financial or contractual relationship between
    the county, township, or municipal corporation and the transportation improvement
    district.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.112
- number: '3.12'
  heading: Personal liability of officer making contract without authority
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: An officer or agent of the state or of any county, township, or municipal
    corporation who is charged or entrusted with the construction, improvement, or
    keeping in repair of a building or work of any kind, or with the management of
    or providing for a public institution, shall make no contract binding or purporting
    to bind the state, or such county, township, or municipal corporation, to pay
    any sum of money not previously appropriated for the purpose for which such contract
    is made, and remaining unexpended and applicable thereto, unless such officer
    or agent has been authorized to make such contract. If such officer or agent makes
    or participates in making a contract without such appropriation or authority,
    he is personally liable thereon, and the state, county, township, or municipal
    corporation in whose name or behalf the contract was made shall not be liable
    thereon.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.12
- number: '3.13'
  heading: Recovery of illegal loans or deposits
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: The state or a county, township, municipal corporation, or school board shall
    not be precluded by the illegal loan or deposit by an officer or agent of public
    money, funds, bonds, securities, or assets belonging to it from suing for and
    recovering the same. Such suit shall not be held to be an adoption or satisfaction
    of such illegal transaction.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.13
- number: '3.14'
  heading: Plan for the funding or refunding of indebtedness
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: All officers, boards, or commissions created under the constitution or laws
    of this state which have the power to invest funds in their charge or under their
    control in bonds issued by any political subdivision of this state, or which have
    power to sell any such bonds, may, in all cases in which they determine that it
    is in the interest of the state, the funds under their control and the beneficiaries
    thereof, and other persons interested in such funds, consent to any plan for the
    funding or refunding of indebtedness of any such subdivision in whose notes or
    bonds such funds are invested, and to exchange such notes or bonds, whether matured
    or unmatured, for refunding bonds, authorized and to be issued under Chapter 133.
    of the Revised Code, in an amount not less than the principal amount due upon
    the notes or bonds to be exchanged, which bonds need not bear the same rate of
    interest as the notes or bonds exchanged. If such plan provides for the cancellation
    of overdue interest upon notes or bonds to be exchanged, including interest upon
    any overdue interest upon such notes or bonds, whether represented by coupons
    or otherwise, such officers, boards, or commissions may waive such interest pursuant
    to such plan without consideration.
