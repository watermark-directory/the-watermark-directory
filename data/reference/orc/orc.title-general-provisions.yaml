- number: '9.23'
  heading: Disbursements by government entities definitions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'As used in sections 9.23 to 9.238 of the Revised Code:

    (A) "Allocable nondirect costs" means the amount of nondirect costs allocated
    as a result of actual expenditures on direct costs. "Allocable nondirect costs"
    shall be calculated as follows: direct costs actually incurred for the provision
    of services pursuant to a contract entered into under section 9.231 of the Revised
    Code divided by the minimum percentage of money that is to be expended on the
    recipient''s direct costs, as specified in the contract, minus the direct costs
    actually incurred.

    (B) "Contract payment earned" means payment pursuant to a contract entered into
    under section 9.231 of the Revised Code for direct costs actually incurred in
    performing the contract, up to the minimum percentage of money that is to be expended
    on the recipient''s direct costs, as specified in the contract, plus allocable
    nondirect costs associated with those direct costs.

    (C) "Direct costs" means the costs of providing services that directly benefit
    a patient, client, or the public and that are set forth in the contract entered
    into under section 9.231 of the Revised Code. "Direct costs" does not include
    the costs of any financial review or audit required under section 9.234 of the
    Revised Code.

    (D)(1) "Governmental entity" means a state agency or a political subdivision of
    the state.

    (2) "Contracting authority" of a governmental entity means the director or chief
    executive officer, in the case of a state agency, or the legislative authority,
    in the case of a political subdivision.

    (E) "Minimum percentage of money that is to be expended on the recipient''s direct
    costs" means the percentage of the total amount of the contract entered into under
    section 9.231 of the Revised Code that, at a minimum, has to be expended on the
    recipient''s direct costs in performing the contract in order for the recipient
    to earn the total amount of the contract.

    (F) "Political subdivision" means a county, township, municipal corporation, or
    any other body corporate and politic that is responsible for government activities
    in a geographic area smaller than that of the state.

    (G) "Recipient" means a person that enters into a contract with a governmental
    entity under section 9.231 of the Revised Code.

    (H) "State agency" means any organized body, office, agency, institution, or other
    entity established by the laws of the state for the exercise of any function of
    state government.

    (I) A judgment is "uncollectible" if, at least ninety days after the judgment
    is obtained, the full amount of the judgment has not been collected and either
    a settlement agreement between the governmental entity and the recipient has not
    been entered into or a settlement agreement has been entered into but has not
    been materially complied with.'
