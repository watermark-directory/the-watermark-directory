- number: '5.2321'
  heading: Powerboat safety month
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The month of April is designated as "Powerboat Safety Month" to emphasize
    the dangers of carbon monoxide poisoning that can occur on a powerboat. During
    the month of April, or more often as determined by the director of natural resources,
    the department of natural resources shall disseminate information to the public
    about all of the following:

    (A) Carbon monoxide is colorless, odorless, and deadly.

    (B) Gasoline-powered engines on boats, including onboard generators, produce carbon
    monoxide, which may poison or kill a person who breathes in too much of it.

    (C) Symptoms of carbon monoxide poisoning are flu-like, so they often go unheeded
    until it is too late.

    (D) It is advised that a powerboat owner install and maintain a working carbon
    monoxide detector on the owner''s boat.

    (E) A powerboat owner should keep carbon monoxide from accumulating at deadly
    concentrations and make sure that outlets are never blocked.

    (F) A powerboat owner should always dock, beach, or anchor at least twenty feet
    from the nearest boat that is running a generator or engine.

    (G) Open air boating may reduce, but does not eliminate, the risk of carbon monoxide
    poisoning and death.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5.2321
