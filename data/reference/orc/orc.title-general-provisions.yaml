  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The coat of arms of the state shall consist of the following device: a circular
    shield; in the right foreground of the shield a full sheaf of wheat bound and
    standing erect; in the left foreground, a cluster of seventeen arrows bound in
    the center and resembling in form the sheaf of wheat; in the background, a representation
    of Mount Logan, Ross county, as viewed from Adena state memorial; over the mount,
    a rising sun three-quarters exposed and radiating thirteen rays to represent the
    thirteen original colonies shining over the first state in the northwest territory,
    the exterior extremities of which rays form a semicircle; and uniting the background
    and foreground, a representation of the Scioto river and cultivated fields.

    The coat of arms of the state shall correspond substantially with the following
    design:


    When the coat of arms of the state is reproduced in color, the colors used shall
    be substantially the same as the natural color of the terrain and objects shown.'
