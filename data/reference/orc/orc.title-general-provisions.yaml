- number: '5.01'
  heading: Ohio state flag
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: The flag of the state shall be burgee-shaped. It shall have three red and
    two white horizontal stripes that represent the roads and waterways of the state.
    The union of the flag shall be seventeen five-pointed stars, white in a blue triangular
    field that represents the state's hills and valleys, the base of which shall be
    the staff end or vertical edge of the flag, and the apex of which shall be the
    center of the middle red stripe. The stars shall be grouped around a red disc
    superimposed upon a white circular "O." The thirteen stars grouped around the
    "O" represent the original states of the United States and the four stars added
    to the peak of the triangle symbolize that Ohio was the seventeenth state admitted
    to the union. The "O" represents the "O" in "Ohio" and suggests the state's nickname,
    the buckeye state. The proportional dimensions of the flag and of its various
    parts shall be according to the official design on file in the office of the secretary
    of state. One state flag of uniform dimensions shall be furnished to each company
    of the organized militia.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5.01
- number: '5.011'
  heading: Ohio governor's flag
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The flag of the governor of this state will be of scarlet wool bunting, six
    feet eight inches hoist by ten feet six inches fly. In each of the four corners
    will be a white five-pointed star with one point upward. The centers of these
    stars will be twelve inches from the long edges and seventeen inches from the
    short edges of the flag. In the center of the flag will be a reproduction of the
    great seal of Ohio in proper colors, three feet in diameter, surrounded by thirteen
    white stars equally spaced with their centers on an imaginary circle four feet
    three inches in diameter. All stars shall be of such size that their points would
    lie on the circumference of an imaginary circle ten inches in diameter.

    The official colors of the governor of Ohio will be of scarlet silk, four feet
    four inches on the pike by five feet six inches fly, of the same design as the
    flag of the governor of Ohio, with the seal and stars proportionately reduced
    in size and embroidered. The colors will be trimmed on three edges with a knotted
    fringe of yellow silk two and one half inches wide. Attached below the head of
    the pike will be a silk cord of scarlet and white eight feet six inches in length
    with a tassel at each end.

    The naval flag of the governor of Ohio will be of scarlet wool bunting, three
    feet hoist by four feet fly. The design will be the same as the flag of the governor
    of Ohio with the seal and the stars proportionately reduced in size.

    The automobile flag of the governor of Ohio will be of scarlet silk, or wool bunting,
    one foot six inches on the staff by two feet six inches on the fly. The design
    will be the same as the flag of the governor of Ohio with the seal and stars proportionately
    reduced in size. The flag will be trimmed on three edges with a knotted fringe
    of silk or wool one and one half inches wide.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5.011
- number: '5.012'
  heading: Display and maintenance of state flag
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: '(A) Display of the state flag at all state buildings and public institutions,
    such as public school buildings and state parks, is encouraged. If the state flag
    is displayed, it may be flown every day when weather permits and shall be flown
    from sunrise until sunset on all national and state holidays and on any other
    days that the governor proclaims. The state flag may be flown at night when properly
    lighted. When the state flag is displayed outdoors, it shall be flown either from
    a flagpole or a staff. Any staff from which the state flag is flown shall be at
    least two and one-half times as long as the state flag.

    (B) When the state flag and the United States flag are displayed at the same time,
    the state flag shall not be larger than the United States flag. When the state
    flag and the United States flag are displayed together against a wall from crossed
    staffs, the state flag shall be on the left of the United States flag, and the
    staff supporting the state flag shall be behind the staff supporting the United
    States flag. When the state flag is flown from the same halyard as the United
    States flag, the state flag shall be displayed beneath the United States flag.
    When the state flag is carried in a procession in which the United States flag
    is unfurled, the state flag shall be displayed on the marching left of the United
    States flag.

    (C) The state flag shall be washed or dry cleaned when soiled and may be repaired.
    When the state flag is damaged beyond repair, it shall be destroyed privately
    either by cutting it into small pieces and burning it until only ashes remain
    or by sealing it in a plastic bag or box before discarding it in a trash collection.'
