- number: '9.84'
  heading: Witness has right of counsel - participation in hearing limited
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: Except as otherwise provided in this section, any person appearing as a witness
    before any public official, department, board, bureau, commission, or agency,
    or any representative of a public official, department, board, bureau, commission,
    or agency, in any administrative or executive proceeding or investigation, public
    or private, if the witness so requests, shall be permitted to be accompanied,
    represented, and advised by an attorney, whose participation shall be limited
    to the protection of the rights of the witness, and who may not examine or cross-examine
    witnesses. The witness shall be advised of the right to counsel before the witness
    is interrogated. This section does not apply to proceedings before a grand jury
    or to an employee of an appointing authority, as defined in section 124.01 of
    the Revised Code, who appears only as a witness in an employment interview, investigation,
    or proceeding conducted by or for the appointing authority.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.84
- number: '9.85'
  heading: Immunity of public officers and employees definitions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'As used in this section and sections 9.86 and 9.87 of the Revised Code:

    (A) "Officer or employee" has the same meaning as in division (A) of section 109.36
    of the Revised Code.

    (B) "State" has the same meaning as in division (B) of section 109.36 of the Revised
    Code.

    (C) "Political subdivision" has the same meaning as in division (C) of section
    109.36 of the Revised Code.

    (D) "Employer" has the same meaning as in division (D) of section 109.36 of the
    Revised Code.

    (E) "Motor vehicle" includes automobiles, trucks, motor vehicles with auxiliary
    equipment, self-propelling equipment or trailers, aircraft, or watercraft.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.85
- number: '9.86'
  heading: Immunity of public officers and employees
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'Except for civil actions that arise out of the operation of a motor vehicle
    and civil actions in which the state is the plaintiff, no officer or employee
    shall be liable in any civil action that arises under the law of this state for
    damage or injury caused in the performance of his duties, unless the officer''s
    or employee''s actions were manifestly outside the scope of his employment or
    official responsibilities, or unless the officer or employee acted with malicious
    purpose, in bad faith, or in a wanton or reckless manner.

    This section does not eliminate, limit, or reduce any immunity from civil liability
    that is conferred upon an officer or employee by any other provision of the Revised
    Code or by case law. This section does not affect the liability of the state in
    an action filed against the state in the court of claims pursuant to Chapter 2743.
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.86
- number: '9.87'
  heading: Indemnification of public officers and employees
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) The state, except as provided in division (B) of this section, shall
    indemnify an officer or employee from liability incurred in the performance of
    official duties by paying any judgment in, or amount negotiated in settlement
    of, any civil action arising under federal law, the law of another state, or the
    law of a foreign jurisdiction. The reasonableness of the amount of any consent
    judgment or settlement is subject to the review and approval of the attorney general
    and of the director, administrative chief, or governing body of the employer of
    the officer or employee who is to be indemnified. The maximum aggregate amount
    of indemnification paid directly from state funds to or on behalf of any officer
    or employee pursuant to this division shall be one million dollars per occurrence,
    regardless of the number of persons who suffer damage, injury, or death as a result
    of the occurrence.

    (B) The state shall not indemnify an officer or employee under any of the following
    circumstances:

    (1) To the extent the officer or employee is covered by a policy of insurance
    for civil liability purchased by the state;

    (2) When the officer or employee acts manifestly outside the scope of the officer''s
    or employee''s employment or official responsibilities, with malicious purpose,
    in bad faith, or in a wanton or reckless manner, as determined by the employer
    of the officer or employee or by the attorney general.

    (3) For any portion of a judgment that represents punitive or exemplary damages,
    except that this prohibition does not apply if the employer of the officer or
    employee and the attorney general determine that the acts or omissions of the
    officer or employee were not within the terms of division (B)(2) of this section;

    (4) For any portion of a consent judgment or settlement that is unreasonable.

    (C) The director of administrative services may purchase a policy or policies
    of insurance on behalf of officers and employees of the state from an insurer
    or insurers licensed to do business in this state providing coverage for amounts
    in excess of one million dollars per occurrence incurred in connection with any
    civil action, demand, or claim against the officer or employee by reason of an
    act or omission by the officer or employee occurring in the performance of the
    officer''s or employee''s duties and not coming within the terms of division (B)(2)
    of this section.

    (D) This section does not affect any of the following:

    (1) The waiver arising under division (A)(1) of section 2743.02 of the Revised
    Code;

    (2) Any defense that would otherwise be available in an action alleging personal
    liability of an officer or employee;

    (3) The operation of section 9.83 of the Revised Code.

    (E) The indemnification of officers or employees against judgments or settlements
    pursuant to this section shall be accomplished only through the following procedure:

    (1) If the employer of the defendant officer or employee to be indemnified determines
    that the actions or omissions of its officer or employee giving rise to the claim
    were not within the terms of division (B)(2) of this section, an indemnity agreement
    shall be prepared by the attorney general, specifying that the employer will indemnify
    the officer or employee from a particular judgment that has been rendered or a
    particular settlement amount that has been negotiated. The agreement shall name
    the person or entity to whom payment by the state of the judgment or settlement
    amount will be made, and the agreement shall not be effective until it is approved
    by the officer or employee to be indemnified, the director, administrative chief,
    or other governing body of the employer, and by the attorney general. The attorney
    general shall approve the indemnity agreement, unless the attorney general finds
    that division (B) of this section prohibits the state from indemnifying the officer
    or employee, or prohibits the state from indemnifying the officer or employee
    for a portion of a judgment or settlement and the indemnity agreement would indemnify
    the officer or employee for all or a part of that portion.

    (2) The attorney general shall forward a copy of the agreement to the director
    of budget and management.

    (3) Any indemnification paid shall be charged by the director of budget and management
    against available unencumbered moneys in the appropriations of the employer of
    the officer or employee to be indemnified. The director of budget and management
    shall have sole discretion to determine whether or not unencumbered moneys in
    a particular appropriation are available for payment of the indemnification.

    (4) The director of budget and management shall, upon receipt of the agreement
    from the attorney general pursuant to division (E)(2) of this section, provide
    for payment to the person or entity named in the agreement, in the amount specified
    in the agreement.

    (5) If the director of budget and management determines that sufficient unencumbered
    moneys do not exist in the particular appropriations to pay the indemnification,
    the director shall make application for payment of the indemnification out of
    the emergency purposes account or any other appropriation for emergencies or contingencies,
    and payment out of this account or other appropriation shall be authorized if
    there are sufficient moneys greater than the sum total of then pending emergency
    purposes account requests, or requests for releases from the other appropriation.

    (6) If sufficient moneys do not exist in the emergency purposes account or any
    other appropriation for emergencies or contingencies to pay the indemnification,
    the employer named in the agreement shall request the general assembly to make
    an appropriation sufficient to pay the indemnification, and no payment shall be
    made until the appropriation has been made. The employer shall make this appropriation
    request during the current biennium and during each succeeding biennium until
    a sufficient appropriation is made.

    (7) If the indemnification is to be made by an employer whose funds are not handled
    by the director of budget and management, the employer shall pay the person or
    entity named in the agreement.

    If the employer determines that sufficient unencumbered moneys do not exist to
    pay the indemnification, the employer shall make application for payment of the
    indemnification out of the emergency purposes account or any other appropriation
    for emergencies or contingencies, and payment out of this account or other appropriation
    shall be authorized if there are sufficient moneys greater than the sum total
    of then pending emergency purposes account requests, or requests for releases
    from the other appropriation.

    If sufficient moneys do not exist in the emergency purposes account or any other
    appropriation for emergencies or contingencies to pay the indemnification, the
    employer named in the agreement shall request the general assembly to make an
    appropriation sufficient to pay the indemnification, and no payment shall be made
    until such an appropriation has been made. The employer shall make this appropriation
    request during the current biennium and during each succeeding biennium until
    a sufficient appropriation is made.

    (F)(1) Subject to division (F)(2) of this section, if an employer or the attorney
    general fails to approve indemnification or limits indemnification of an officer
    or employee of the employer, the officer or employee may commence an action against
    the employer in the court of claims pursuant to sections 2743.01 to 2743.20 of
    the Revised Code to prove that the officer or employee is entitled to indemnification
    pursuant to division (A) of this section and that division (B) of this section
    does not prohibit or limit the officer''s or employee''s indemnification and seeking
    either a judgment against the employer for a sum of money that the officer or
    employee has paid to satisfy a judgment or settlement or an order directing the
    employer to pay a judgment or settlement against the officer or employee that
    has not been satisfied. Section 109.365 of the Revised Code does not prohibit
    any information obtained by the attorney general in the attorney general''s investigation
    conducted pursuant to division (A) of section 109.362 of the Revised Code to determine
    whether to defend the officer or employee from being admitted as evidence in any
    action brought pursuant to this section.

    An action brought pursuant to division (F)(1) of this section shall be commenced
    no later than two years after the cause of action arising under division (F)(1)
    of this section accrues. A cause of action arising under this section accrues
    upon the entry of a money judgment against the officer or employee if the time
    for filing an appeal in the action lapses without the filing of an appeal, upon
    the conclusion of the final appeal in any action in which a money judgment is
    entered against the officer or employee if an appeal is filed in the action, or
    upon execution of any settlement agreement requiring payment of money by the officer
    or employee.

    (2) Notwithstanding division (F)(1) of this section, an officer or employee may
    not commence an action against the employer in the court of claims or in any other
    court regarding a refusal of the employer or the attorney general to indemnify
    punitive or exemplary damages pursuant to this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.87
- number: '9.871'
  heading: Indemnification of correctional employee
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) If an employee of the department of rehabilitation and correction is
    subject to criminal charges for actions occurring within the scope and in the
    course of the employee''s assigned duties, and if the charges are dismissed or
    the employee is acquitted of any wrongdoing as a result, the employee may be indemnified
    for the reasonable cost of legal representation. An employee shall request indemnification
    by submitting a written request to the director of rehabilitation and correction.
    The director shall determine whether to recommend indemnification and shall transmit
    the recommendation to the attorney general. The attorney general shall review
    the request, the recommendation of the director, and any other information that
    the attorney general may require and shall decide whether or not the employee
    is to be indemnified.

    (B) A decision of the attorney general made under division (A) of this section
    is not subject to appeal or review in any court or other forum. No person has
    a right of action against the department of rehabilitation and correction in the
    court of claims or any other court based on a decision of the attorney general
    made under division (A) of this section.

    (C) The indemnification of an employee of the department of rehabilitation and
    correction pursuant to this section shall be accomplished only through the following
    procedure:

    (1) If the director of rehabilitation and correction determines that the actions
    or omissions of the employee that gave rise to the claim were within the scope
    of the employee''s employment and that the costs of legal representation should
    be indemnified, the attorney general shall prepare an indemnity agreement. The
    indemnity agreement shall specify that the department of rehabilitation and correction
    will indemnify the employee for the expenses of legal representation. The agreement
    shall not be effective until it is approved by the employee, the director, and
    the attorney general.

    (2) The attorney general shall forward a copy of the indemnity agreement to the
    director of budget and management.

    (3) The director of budget and management shall charge any indemnification paid
    pursuant to this section against available unencumbered moneys in the appropriations
    of the department of rehabilitation and correction. The director of budget and
    management shall have sole discretion to determine whether or not unencumbered
    moneys in a particular appropriation are available for payment of the indemnification.

    (4) The director of budget and management shall, upon receipt of the agreement
    from the attorney general pursuant to division (C)(1) of this section, provide
    for payment to the employee in the amount specified in the agreement.

    (5) If the director of budget and management determines that sufficient unencumbered
    moneys do not exist in the particular appropriations to pay the indemnification,
    the director of budget and management shall make application for payment of the
    indemnification out of the emergency purposes account or any other appropriation
    for emergencies or contingencies, and payment out of this account or other appropriation
    shall be authorized if there are sufficient moneys greater than the sum total
    of then pending emergency purposes account requests, or requests for releases
    from the other appropriation.

    (6) If sufficient moneys do not exist in the emergency purposes account or any
    other appropriation for emergencies or contingencies to pay the indemnification,
    the director of rehabilitation and correction shall request the general assembly
    to make an appropriation sufficient to pay the indemnification, and no payment
    shall be made until the appropriation has been made. The department shall make
    the appropriation request during the current biennium and during each succeeding
    biennium until a sufficient appropriation is made.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.871
- number: '9.88'
  heading: Immunity of federal law enforcement officers
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "federal law enforcement officer" means any
    officer of the United States who is authorized by federal law to conduct any investigation
    of, and make any arrest for, any offense against the United States in violation
    of federal law.

    (B) A federal law enforcement officer, while engaged in the performance of his
    official duties, has the same immunity from liability that a state or local law
    enforcement officer has under the laws of this state, in any civil action to recover
    damages for injury, death, or loss to persons or property, under any of the following
    circumstances:

    (1) When the federal law enforcement officer renders assistance to a state or
    local law enforcement officer at the request of the officer or renders assistance
    to a state or local law enforcement officer in the event of an emergency;

    (2) When, during the investigation by the federal law enforcement officer of a
    federal offense over which he has jurisdiction under federal law, a felony under
    the laws of this state is committed in his presence or he has reasonable ground
    to believe that a felony under the laws of this state has been committed, and
    he makes an arrest under section 2935.04 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.88
- number: '9.90'
  heading: Purchase or procurement of insurance for educational employees
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) The board of trustees or other governing body of a state institution
    of higher education, as defined in section 3345.011 of the Revised Code, board
    of education of a school district, or governing board of an educational service
    center may, in addition to all other powers provided in the Revised Code:

    (1) Contract for, purchase, or otherwise procure from an insurer or insurers licensed
    to do business by the state of Ohio for or on behalf of such of its employees
    as it may determine, life insurance, or sickness, accident, annuity, endowment,
    health, medical, hospital, dental, or surgical coverage and benefits, or any combination
    thereof, by means of insurance plans or other types of coverage, family, group
    or otherwise, and may pay from funds under its control and available for such
    purpose all or any portion of the cost, premium, or charge for such insurance,
    coverage, or benefits. However, the governing board, in addition to or as an alternative
    to the authority otherwise granted by division (A)(1) of this section, may elect
    to procure coverage for health care services, for or on behalf of such of its
    employees as it may determine, by means of policies, contracts, certificates,
    or agreements issued by at least two health insuring corporations holding a certificate
    of authority under Chapter 1751. of the Revised Code and may pay from funds under
    the governing board''s control and available for such purpose all or any portion
    of the cost of such coverage.

    (2) Make payments to a custodial account for investment in regulated investment
    company stock that is treated as an annuity under Internal Revenue Code section
    403(b).

    Any income of an employee deferred under divisions (A)(1) and (2) of this section
    in a deferred compensation program eligible for favorable tax treatment under
    the Internal Revenue Code shall continue to be included as regular compensation
    for the purpose of computing the contributions to and benefits from the retirement
    system of such employee. Any sum so deferred shall not be included in the computation
    of any federal and state income taxes withheld on behalf of any such employee.

    (B) All or any portion of the cost, premium, or charge therefor may be paid in
    such other manner or combination of manners as the board or governing body may
    determine, including direct payment by the employee in cases under division (A)(1)
    of this section, and, if authorized in writing by the employee in cases under
    division (A)(1) or (2) of this section, by the board or governing body with moneys
    made available by deduction from or reduction in salary or wages or by the foregoing
    of a salary or wage increase. Nothing in section 3917.01 or section 3917.06 of
    the Revised Code shall prohibit the issuance or purchase of group life insurance
    authorized by this section by reason of payment of premiums therefor by the board
    or governing body from its funds, and such group life insurance may be so issued
    and purchased if otherwise consistent with the provisions of sections 3917.01
    to 3917.07 of the Revised Code.

    (C) The board of education of any school district may exercise any of the powers
    granted to the governing boards of public institutions of higher education under
    divisions (A) and (B) of this section. All health care benefits provided to persons
    employed by the public schools of this state shall be through health care plans
    that contain best practices identified by the department of administrative services
    under section 9.901 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.90
- number: '9.901'
  heading: Design and delivery of health care plans; authority of department of Administrative
    services
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A)(1) Health care plans that provide benefits to persons employed by public
    employers as defined by this section may consider best practices established by
    the former school employees health care board or identified by the department
    of administrative services. All policies or contracts for health care benefits
    that are issued or renewed after the expiration of any applicable collective bargaining
    agreement may consider any best practices identified under this section at the
    time of renewal. Health care plans that contain the best practices may be self-insured.

    (2) As used in this section:

    (a) "Public employer" means political subdivisions, public school districts, or
    state institutions of higher education.

    (b) "Public school district" means a city, local, exempted village, or joint vocational
    school district; a STEM school established under Chapter 3326. of the Revised
    Code; or an educational service center. "Public school district" does not mean
    a community school established under Chapter 3314. of the Revised Code.

    (c) "State institution of higher education" or "state institution" means a state
    institution of higher education as defined in section 3345.011 of the Revised
    Code.

    (d) "Political subdivision" has the same meaning as defined in section 9.833 of
    the Revised Code.

    (e) A "health care plan" includes group policies, contracts, and agreements that
    provide hospital, surgical, or medical expense coverage, including self-insured
    plans. A "health care plan" does not include an individual plan offered to the
    employees of a political subdivision, public school district, or state institution,
    or a plan that provides coverage only for specific disease or accidents, or a
    hospital indemnity, medicare supplement, or other plan that provides only supplemental
    benefits, paid for by the employees of a political subdivision, public school
    district, or state institution.

    (f) A "health plan sponsor" means a political subdivision, public school district,
    a state institution of higher education, a consortium of political subdivisions,
    public school districts, or state institutions, or a council of governments.

    (B) The department of administrative services shall do all of the following:

    (1) Identify strategies to manage health care costs;

    (2) Study the potential benefits of state or regional consortiums of public employers''
    health care plans;

    (3) Study information regarding the health care plans offered by political subdivisions,
    public school districts, state institutions, and existing consortiums;

    (4) Provide representative cost estimates of options for health care plans for
    political subdivisions, public school districts, and state institutions of higher
    education in accordance with division (A) of this section separate from the plans
    for state agencies;

    (5) Study and release standards that may be considered the best practices for
    health care plans offered to employees of political subdivisions, public school
    districts, and state institutions;

    (6) Require that plans the health plan sponsors administer make readily available
    to the public all cost and design elements of the plan;

    (7) Promote cooperation among all organizations affected by this section in identifying
    the elements for successful implementation of this section; and

    (8) Promote cost containment measures aligned with patient, plan, and provider
    management strategies in developing and managing health care plans.

    (C) Any health care plan providing coverage for the employees of political subdivisions,
    public school districts, or state institutions of higher education, or that have
    provided coverage within two years before June 30, 2011, shall provide nonidentifiable
    aggregate claims and administrative data for the coverage provided as required
    by the department, without charge, within thirty days after receiving a written
    request from the department. The claims data shall include data relating to employee
    group benefit sets, demographics, and claims experience.

    (D) The department may work with other state agencies to obtain services as the
    department deems necessary for the implementation and operation of this section,
    based on demonstrated experience and expertise in administration, management,
    data handling, actuarial studies, quality assurance, or for other needed services.

    (E) The department shall hire staff as necessary to provide administrative support
    to the department and the public employee health care plan program established
    by this section.

    (F) Nothing in this section shall be construed as prohibiting political subdivisions,
    public school districts, or state institutions from consulting with and compensating
    insurance agents and brokers for professional services or from establishing a
    self-insurance program.

    (G) Pursuant to Chapter 117. of the Revised Code, the auditor of state shall conduct
    all necessary and required audits of the department. The auditor of state, upon
    request, also shall furnish to the department copies of audits of political subdivisions,
    public school districts, or consortia performed by the auditor of state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.901
- number: '9.91'
  heading: Placement or purchase of tax-sheltered annuity for educational employees
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'If the board of education of a school district procures a tax-sheltered annuity
    for an employee, pursuant to section 9.90 of the Revised Code, that meets the
    requirements of Internal Revenue Code section 403(b), the employee has the right
    to designate the licensed agent, broker, or company through whom the board shall
    arrange for the placement or purchase of the tax-sheltered annuity. In any case
    in which the employee has designated such an agent, broker, or company, the board
    shall comply with the designation, provided that the board may impose either or
    both of the following as conditions to complying with any such designations:

    (A) The designee must execute a reasonable agreement protecting the institution
    or district from any liability attendant to procuring the annuity;

    (B) The designee must be designated by a number of employees equal to at least
    one per cent of the board''s full-time employees or at least five employees, whichever
    is greater, except that the board may not require that the agent, broker, or company
    be designated by more than fifty employees.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.91
- number: '9.911'
  heading: Annuity contracts and custodial accounts
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) An annuity contract or custodial account procured for an employee of
    a public institution of higher education pursuant to section 9.90 of the Revised
    Code shall comply with both of the following:

    (1) The annuity contract or custodial account must meet the requirements of Internal
    Revenue Code section 403(b).

    (2) The institution, in its sole and absolute discretion, shall arrange for the
    procurement of the annuity contract or custodial account by doing one of the following:

    (a) Selecting a minimum of four providers of annuity contracts or custodial accounts
    through a selection process determined by the institution in its sole and absolute
    discretion, except that if fewer than four providers are available the institution
    shall select the number of providers available.

    (b) Subject to division (D) of this section, allowing each eligible employee to
    designate a licensed agent, broker, or company as a provider.

    (B) Division (A)(2)(a) of this section does not require a public institution of
    higher education to select a provider if either of the following is the case:

    (1) The provider is not willing to provide an annuity contract or custodial account
    at that public institution.

    (2) The provider is not willing to agree to the terms and conditions of the agreement
    described in division (E) of this section.

    (C) Designation as a provider under section 9.90 of the Revised Code prior to
    the effective date of this section does not give a licensed agent, broker, or
    company a right to be selected as a provider under this section, but subject to
    division (D) of this section, such a licensed agent, broker, or company shall
    remain a provider until another provider is selected under division (A)(2) of
    this section.

    (D) If an employee designates a provider under division (A)(2)(b) of this section,
    the employing institution shall comply with the designation but may require either
    or both of the following:

    (1) That the provider enter into an agreement with the institution that does either
    or both of the following:

    (a) Prohibits the provider from transferring funds to a third party without the
    express consent of the institution or its authorized representative;

    (b) Includes such other terms and conditions as are established by the institution
    in its sole discretion.

    (2) That the provider be designated by a number of employees equal to at least
    one per cent of the institution''s eligible employees or at least five employees,
    whichever is greater, except that the institution may not require that the provider
    be designated by more than fifty employees.

    (E) An institution may require a provider selected under division (A)(2)(a) of
    this section to enter into an agreement with the institution that does either
    or both of the following:

    (1) Prohibits the provider from transferring funds to a third party without the
    express consent of the institution or its authorized representative;

    (2) Includes such other terms and conditions as are established by the institution
    in its sole discretion.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.911
- number: '9.92'
  heading: Citizens' reward program
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Citizens'' reward program" means any organization that satisfies all of the
    following criteria:

    (a) It is a nonprofit organization;

    (b) It is organized and operated exclusively to offer and pay rewards to citizens
    for volunteering tips and information to law enforcement agencies concerning felonies,
    offenses of violence, or misdemeanors that have been committed;

    (c) It has established a reward fund to be used solely for the payment of rewards
    to citizens for volunteering tips and information to law enforcement agencies
    concerning felonies, offenses of violence, or misdemeanors that have been committed.

    (2) "Detention facility" has the same meaning as in section 2921.01 of the Revised
    Code.

    (B) A citizens'' reward program may apply to the board of county commissioners
    of any county or counties in which it operates for recognition as the official
    reward program for that county or counties. Upon receipt of the application, the
    board of county commissioners shall determine if it is in proper order and the
    information it contains is correct. If the application meets these criteria, the
    board, by resolution, may officially recognize the program. Recognition of a program
    by a county under this division qualifies the program for funding of its reward
    fund under division (F) of section 2981.12 of the Revised Code. No more than one
    such reward program shall be recognized in any county.

    (C)(1) If a board of county commissioners enters into an agreement of affiliation
    with a citizens'' reward program pursuant to division (D) of this section, any
    municipal court, county court, or court of common pleas within the county shall
    impose the sum of one dollar as costs in any case in which a person is convicted
    of or pleads guilty to any offense other than a traffic offense. This one dollar
    additional court costs is in addition to any other court costs that the court
    is required by law to impose upon the offender, and, the court shall impose the
    one dollar additional court costs as long as the agreement of affiliation remains
    in effect, but the court, in the court''s discretion, may remit this one dollar
    additional court costs to the offender. The clerk of each court shall transmit
    all such moneys collected during a month on or before the twentieth day of the
    following month to the affiliated citizens'' reward program.

    (2) No person shall be placed or held in a detention facility for failing to pay
    the additional one dollar court costs that are required to be paid by division
    (C)(1) of this section.

    (3) A citizens'' reward program receiving funds pursuant to division (C)(1) of
    this section may use the funds for any purpose described in division (A)(1)(b)
    or (c) of this section.

    (D)(1) Any citizens'' reward program that is recognized under division (B) of
    this section may enter into a written agreement of affiliation with a board of
    county commissioners in the county in which the program operates. Agreements of
    affiliation executed pursuant to this division shall be valid for two years and
    may be renewed. The agreements shall do all of the following:

    (a) Specify the relationship between the citizens'' reward program, the county,
    and law enforcement agencies in the county;

    (b) Specify that the citizens'' reward program shall account annually to the board
    of county commissioners for all funds raised by the organization from all sources
    and all funds expended by the organization for any purpose;

    (c) Allow the citizens'' reward program to itemize the sources of funds raised
    without referring to the name of the source;

    (d) Prohibit the citizens'' reward program from divulging the identity of any
    person to whom a reward was paid.

    (2) In every county in which the board of county commissioners approves of an
    agreement of affiliation, the board shall notify the clerk of each municipal court,
    county court, and court of common pleas within the county of that agreement of
    affiliation and of the duty to collect the additional court costs imposed pursuant
    to division (C) of this section.

    (E) The recognition of a citizens'' reward program under this section does not
    make it a governmental unit for purposes of section 149.43 of the Revised Code
    and does not subject it to the disclosure provisions of that section. A board
    of county commissioners that recognizes a citizens'' reward program pursuant to
    this section shall require the program to provide the board with an accounting
    of all funds the program receives or disburses subsequent to its recognition in
    order to maintain recognition.

    (F) A board of county commissioners that recognizes a citizens'' reward program
    under this section may by resolution revoke its recognition of the program. The
    board shall send a copy of the resolution, upon adoption, to the program and to
    each appropriate law enforcement agency that has jurisdiction over the territory
    served by the program.

    (G) An application for recognition of a citizens'' reward program shall contain
    all of the following information:

    (1) The name of the program and its mailing address;

    (2) The name and address of each of its officers or officials;

    (3) Information sufficient to establish the intention and ability of the program''s
    officers to implement the program throughout the county;

    (4) The purposes for which the program is organized and operated and the services
    it offers;

    (5) A copy of the articles of incorporation and bylaws of the program, if applicable,
    or a copy of the rules and procedures under which the program is organized and
    operated;

    (6) Any other relevant information that the board of county commissioners requires,
    by resolution.'
