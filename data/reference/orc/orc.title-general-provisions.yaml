- number: '9.36'
  heading: Contract for services of fiscal and management consultants
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: The board of county commissioners of any county or the township trustees of
    any township may contract for the services of fiscal and management consultants
    to aid it in the execution of its powers and duties. Contracts for the services
    of fiscal and management consultants shall be exempt from any competitive bidding
    requirements in the Revised Code.
