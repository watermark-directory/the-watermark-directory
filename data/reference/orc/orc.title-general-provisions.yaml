    name: Definitions; Rules of Construction
  text: As used in the Revised Code, "OSU extension" means the cooperative extension
    service that was established by the "Smith-Lever Act," 38 Stat. 372 (1914), 7
    U.S.C. 341 et seq., and is administered in this state by the Ohio state university.
  history: null
