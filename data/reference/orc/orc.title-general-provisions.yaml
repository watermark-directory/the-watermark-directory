- number: '5.10'
  heading: State seal
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'All official seals shall have engraved thereon the coat of arms of the state,
    as described in section 5.04 of the Revised Code.

    The great seal of the state shall be two and one-half inches in diameter and shall
    consist of the coat of arms of the state within a circle having a diameter of
    one and three-fourths inches, surrounded by the words "THE GREAT SEAL OF THE STATE
    OF OHIO" in news gothic capitals. The great seal of the state shall correspond
    substantially with the following design:


    The design of the great seal shall not be reproduced, except as required by any
    provision of the Ohio Constitution and the Revised Code, unless permission to
    do so is first obtained from the governor. The governor may authorize reproduction
    of the design of the great seal when the purpose is to:

    (A) Permit publication of a reproduction of the great seal of the state of Ohio;

    (B) Aid educational or historical programs;

    (C) Promote the economic or cultural development of the state in a manner deemed
    appropriate by the governor.

    A permanent record shall be kept in the governor''s office of each permit to reproduce
    the design of the great seal.

    No person shall use or permit to be used any reproduction or facsimile of the
    great seal or a counterfeit or nonofficial version of the great seal for any purpose
    not authorized by the governor.

    The seal of the supreme court shall consist of the coat of arms of the state within
    a circle one and one-half inches in diameter and shall be surrounded by the words
    "THE SUPREME COURT OF THE STATE OF OHIO."

    The seal of each court of appeals, court of common pleas, and probate court shall
    consist of the coat of arms of the state within a circle one and one-fourth inches
    in diameter, and each seal shall be surrounded by the words "COURT OF

    APPEALS, ________________ County, Ohio"; "COMMON PLEAS

    COURT, ________________ County, Ohio"; or "PROBATE

    COURT, ________________ County, Ohio."

    (Insert the name of the proper county.)

    The seals of all other courts of record shall be of the same size as the seal
    of the court of common pleas, and each shall be surrounded by the proper name
    of the court.

    The seal of the secretary of state shall consist of the coat of arms of the state
    within a circle one and one-fourth inches in diameter and shall be surrounded
    by the words "THE SEAL OF THE SECRETARY OF STATE OF OHIO."

    The seal of the auditor of state shall consist of the coat of arms of the state
    within a circle of one and one-fourth inches in diameter, and shall be surrounded
    by the words "THE SEAL OF THE AUDITOR OF STATE OF OHIO."

    The seal of the treasurer of state shall consist of the coat of arms of the state
    within a circle one and one-fourth inches in diameter, and shall be surrounded
    by the words "THE SEAL OF THE TREASURER OF STATE OF OHIO."

    The seal of the lieutenant governor shall consist of the coat of arms of the state
    within a circle one and one-fourth inches in diameter and shall be surrounded
    by the words "THE

    SEAL OF THE LIEUTENANT GOVERNOR OF STATE OF OHIO."

    The seal of the attorney general shall consist of the coat of arms of the state
    within a circle one and one-fourth inches in diameter and shall be surrounded
    by the words "THE SEAL OF THE ATTORNEY GENERAL OF STATE OF OHIO."

    The seal of each benevolent institution shall consist of the coat of arms of the
    state within a circle one and one-fourth inches in diameter and shall be surrounded
    by the proper name of the institution.

    The seals of all other state, county, and municipal agencies, divisions, boards
    and commissions shall consist of the coat of arms of the state within a circle
    one and one-fourth inches in diameter and shall be surrounded by the proper name
    of the office.

    All seals mentioned in this section shall contain the words and devices mentioned
    in this section and no other. The official motto of the state, as described in
    section 5.06 of the Revised Code, may be displayed alongside any seal described
    in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5.10
- number: '5.101'
