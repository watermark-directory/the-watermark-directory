  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.70
- number: '9.73'
  heading: Public employer inquiries regarding criminal background
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Public employer" means a state agency or a political subdivision of the state.

    (2) "State agency" means any organized body, office, agency, institution, or other
    entity established by the laws of the state for the exercise of any function of
    government.

    (3) "Political subdivision" means a county, township, municipal corporation, or
    any other body corporate and politic that is responsible for government activities
    in a geographic area smaller than that of the state.

    (B) No public employer shall include on any form for application for employment
    with the public employer any question concerning the criminal background of the
    applicant.

    (C) Nothing in this section prohibits a public employer from including on any
    form for application for employment with the public employer a statement notifying
    an applicant of any provision of the Revised Code or federal law that disqualifies
    an individual with a particular criminal history from employment in a particular
    position.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.73
- number: '9.74'
  heading: Victims of dissemination of image
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "License" means a license, certificate, registration, permit, card, or other
    authority issued or conferred by a licensing authority of which the licensee has
    or claims the privilege to engage in the profession, occupation, or activity,
    or to have control of and operate certain specific equipment, machinery, or premises,
    over which the licensing authority has jurisdiction.

    (2) "Licensing authority" means a public office that issues a license to a person
    or entity.

    (3) "Political subdivision" means a county, township, municipal corporation, or
    any other body corporate and politic that is responsible for government activities
    in a geographic area smaller than that of the state.

    (4) "Public office" means any state agency, public institution, political subdivision,
    other organized body, office, agency, institution, or entity established by the
    laws of this state for the exercise of any function of government. "Public office"
    does not include the nonprofit corporation formed under section 187.01 of the
    Revised Code.

    (5) "Victim" has the same meaning as in section 2930.01 of the Revised Code.

    (B) No licensing authority shall knowingly take any of the following actions against
    a person who is applying for or holds a license solely on the basis that the person
    is a victim of a violation of section 2917.211 of the Revised Code:

    (1) Refuse to issue a license to an applicant;

    (2) Limit, suspend, or revoke a license;

    (3) Refuse to renew a license.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.74
- number: '9.75'
  heading: Requirement for employment of local laborers prohibited
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Construction manager" and "construction manager at risk" have the same meanings
    as in section 9.33 of the Revised Code.

    (2) "Contractor" means a person who undertakes to construct, alter, erect, improve,
    repair, demolish, remove, dig, drill, or provide professional design services
    for any part of a structure or public improvement. "Contractor" may include any
    public or business association and any person or entity that actively participates
    in whole or in part in the actual construction of a public improvement or provision
    of professional design services by itself, through the use of employees, or through
    the use of a construction manager, construction manager at risk, professional
    design firm, design-build firm, general contractor, or subcontractor.

    (3) "Design-build firm" has the same meaning as in section 153.65 of the Revised
    Code.

    (4) "Laborer" means a person who does any of the following in furtherance of a
    public improvement:

    (a) Performs manual labor or labor of a particular occupation, trade, or craft;

    (b) Uses tools or machinery of a particular occupation, trade, or craft;

    (c) Otherwise performs physical work in a particular occupation, trade, or craft.

    (5) "Professional design services" and "professional design firm" have the same
    meanings as in section 153.65 of the Revised Code.

    (6) "Public authority" includes any of the following:

    (a) The state;

    (b) A county, township, municipal corporation, or any other political subdivision
    of the state;

    (c) Any public agency, authority, board, commission, instrumentality, or special
    district of the state, a county, township, municipal corporation, or other political
    subdivision of the state;

    (d) Any officer or agent of one of the entities listed in divisions (A)(6)(a)
    to (c) of this section who is authorized to enter into a contract for the construction
    of a public improvement or to construct a public improvement by the direct employment
    of labor.

    (7) "Public improvement" means any of the following:

    (a) A road, bridge, highway, street, or tunnel;

    (b) A waste water treatment system or water supply system;

    (c) A solid waste disposal facility or a storm water and sanitary collection,
    storage, and treatment facility;

    (d) Any structure or work constructed by a public authority or by another person
    on behalf of a public authority pursuant to a contract with the public authority.

    (B)(1) No public authority shall require a contractor, as part of a prequalification
    process or for the construction of a specific public improvement or the provision
    of professional design services for that public improvement, to employ as laborers
    a certain number or percentage of individuals who reside within the defined geographic
    area or service area of the public authority.

    (2) No public authority shall provide a bid award bonus or preference to a contractor
    as an incentive to employ as laborers a certain number or percentage of individuals
    who reside within the defined geographic area or service area of the public authority.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.75
- number: '9.76'
  heading: Boycott provisions in certain contracts
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Boycott" means engaging in refusals to deal, terminating business activities,
    or other actions that are intended to limit commercial relations with persons
    or entities in a discriminatory manner. "Boycott" does not include:

    (a) Boycotts to which 50 U.S.C. 4607(c) applies;

    (b) A decision based on business or economic reasons, or the specific conduct
    of a targeted person or entity;

    (c) A boycott against a public entity of a foreign state when the boycott is applied
    in a nondiscriminatory manner; and

    (d) Conduct necessary to comply with applicable law in the business''s home jurisdiction.

    (2) "Company" means a sole proprietorship, partnership, corporation, national
    association, societe anonyme, limited liability company, limited partnership,
    limited liability partnership, joint venture, or other business organization,
    including their subsidiaries and affiliates, that operates to earn a profit.

    (3) "Israel" means Israel or Israeli-controlled territories.

    (4) "Jurisdiction with whom this state can enjoy open trade" means any world trade
    organization member and any jurisdiction with which the United States has free
    trade or other agreements aimed at ensuring open and nondiscriminatory trade relations.

    (5) "State agency" means an organized body, office, agency, institution, or other
    entity established by the laws of the state for the exercise of a function of
    state government, and includes a "state institution of higher education" as defined
    in section 3345.011 of the Revised Code.

    (B) A state agency may not enter into or renew a contract with a company for the
    acquisition or provision of supplies, equipment, or services, or for construction
    services, unless the contract declares that the company is not boycotting any
    jurisdiction with whom this state can enjoy open trade, including Israel, and
    will not do so during the contract period.'
