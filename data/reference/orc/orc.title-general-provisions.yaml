- number: '9.983'
  heading: Costs, expenses and fees
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) Provision may be made for costs and expenses of providing credit facilities,
    put arrangements, and interest rate hedges, and for fees and expenses of agents,
    and other fees, costs, and expenses in connection with arrangements under sections
    9.98 to 9.983 of the Revised Code to be paid directly by the absolute obligor,
    or to be included in the principal amount of the bonds, or to be paid from the
    same sources of moneys available for debt service or from funds established under
    the bond proceedings, or otherwise to be provided for. Those costs may be treated
    as other costs of financing of the facilities to be financed by the bonds or as
    costs of issuing the bonds under the law authorizing the issuance of the bonds.

    (B) As additional and alternative authority for issuing bonds to refund bonds
    referred to in division (A) or (B) of section 9.981 of the Revised Code, and without
    need for satisfying any other statutory purposes or conditions for refunding,
    refunding bonds may be issued pursuant to procedures under the applicable provisions
    of law upon a declaration by the issuer that the issuer or the absolute obligor
    under the refunding bonds has determined or expects that the refunding will be
    beneficial by reason of the terms, conditions, covenants, or security pertaining
    to the bonds to be refunded. Refunding bonds issued in reliance on this division
    shall mature not later than forty years after their issuance.'
