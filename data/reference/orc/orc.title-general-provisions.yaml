- number: '3.07'
  heading: Misconduct in office - forfeiture
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: Any person holding office in this state, or in any municipal corporation,
    county, or subdivision thereof, coming within the official classification in Section
    38 of Article II, Ohio Constitution, who willfully and flagrantly exercises authority
    or power not authorized by law, refuses or willfully neglects to enforce the law
    or to perform any official duty imposed upon him by law, or is guilty of gross
    neglect of duty, gross immorality, drunkenness, misfeasance, malfeasance, or nonfeasance
    is guilty of misconduct in office. Upon complaint and hearing in the manner provided
    for in sections 3.07 to 3.10, inclusive, of the Revised Code, such person shall
    have judgment of forfeiture of said office with all its emoluments entered thereon
    against him, creating thereby in said office a vacancy to be filled as prescribed
    by law. The proceedings provided for in such sections are in addition to impeachment
    and other methods of removal authorized by law, and such sections do not divest
    the governor or any other authority of the jurisdiction given in removal proceedings.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.07
- number: '3.08'
  heading: Removal of public officers
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'Proceedings for the removal of public officers on any of the grounds enumerated
    in section 3.07 of the Revised Code shall be commenced by the filing of a written
    or printed complaint specifically setting forth the charge and signed by qualified
    electors of the state or political subdivision whose officer it is sought to remove,
    not less in number than fifteen per cent of the total vote cast for governor at
    the most recent election for the office of governor in the state or political
    subdivision whose officer it is sought to remove, or, if the officer sought to
    be removed is the sheriff or prosecuting attorney of a county or the mayor of
    a municipal corporation, the governor may sign and file such written or printed
    complaint without the signatures of qualified electors. Such complaint shall be
    filed with the court of common pleas of the county where the officer against whom
    the complaint is filed resides, except that when the officer against whom the
    complaint is filed is a judge of the court of common pleas, such complaint shall
    be filed in the court of appeals of the district where such judge resides, and
    all complaints against state officers shall be filed with the court of appeals
    of the district where the officer against whom the complaint is filed resides.
    The judge or clerk of the court shall cause a copy of such complaint to be served
    upon the officer, against whom the complaint has been filed, at least ten days
    before the hearing upon such complaint. Such hearing shall be had within thirty
    days from the date of the filing of the complaint by said electors, or by the
    governor. The court may suspend the officer pending the hearing.

    The removal proceedings filed in the court of common pleas shall be tried by a
    judge unless a jury trial is demanded in writing by the officer against whom the
    complaint has been filed. If a jury is demanded, it shall be composed of twelve
    persons who satisfy the qualifications of a juror specified in section 2313.17
    of the Revised Code. If nine or more persons of that jury find one or more of
    the charges in the complaint are true, such jury shall return a finding for the
    removal of the officer, which finding shall be filed with the clerk of the court
    and be made a matter of public record. If less than nine persons of that jury
    find that the charges on the complaint are true, the jury shall return a finding
    that the complaint be dismissed. The proceedings had by a judge upon such removal
    shall be matters of public record and a full detailed statement of the reasons
    for such removal shall be filed with the clerk of the court and shall be made
    a matter of public record.'
