  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: The repeal of a repealing statute does not revive the statute originally repealed
    nor impair the effect of any saving clause therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.57
- number: '1.58'
  heading: Reenactment, amendment, or repeal of statute
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) The reenactment, amendment, or repeal of a statute does not, except as
    provided in division (B) of this section:

    (1) Affect the prior operation of the statute or any prior action taken thereunder;

    (2) Affect any validation, cure, right, privilege, obligation, or liability previously
    acquired, accrued, accorded, or incurred thereunder;

    (3) Affect any violation thereof or penalty, forfeiture, or punishment incurred
    in respect thereto, prior to the amendment or repeal;

    (4) Affect any investigation, proceeding, or remedy in respect of any such privilege,
    obligation, liability, penalty, forfeiture, or punishment; and the investigation,
    proceeding, or remedy may be instituted, continued, or enforced, and the penalty,
    forfeiture, or punishment imposed, as if the statute had not been repealed or
    amended.

    (B) If the penalty, forfeiture, or punishment for any offense is reduced by a
    reenactment or amendment of a statute, the penalty, forfeiture, or punishment,
    if not already imposed, shall be imposed according to the statute as amended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.58
- number: '1.59'
  heading: Statutory definitions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'As used in any statute, unless another definition is provided in that statute
    or a related statute:

    (A) "Child" includes child by adoption.

    (B) "Oath" includes affirmation, and "swear" includes affirm.

    (C) "Person" includes an individual, corporation, business trust, estate, trust,
    partnership, and association.

    (D) "Population" means that shown by the most recent regular federal census.

    (E) "Property" means real and personal property.

    (F) "Rule" includes regulation.

    (G) "State," when applied to a part of the United States, includes any state,
    district, commonwealth, territory, insular possession thereof, and any area subject
    to the legislative authority of the United States of America. "This state" or
    "the state" means the state of Ohio.

    (H) "United States" includes all the states.

    (I) "Will" includes codicil.

    (J) "Written" or "in writing" includes any representation of words, letters, symbols,
    or figures; this provision does not affect any law relating to signatures.

    (K) "Internet" means the international computer network of both federal and nonfederal
    interoperable packet switched data networks, including the graphical subnetwork
    known as the world wide web.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.59
