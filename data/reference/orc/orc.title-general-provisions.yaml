  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: If the language of the enrolled act deposited with the secretary of state,
    including any code section number designated pursuant to section 103.131 of the
    Revised Code, conflicts with the language of any subsequent printing or reprinting
    of the statute, the language and any such designated section number of the enrolled
    act prevails.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.53
