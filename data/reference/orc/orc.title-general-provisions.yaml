sections:
- number: '1.01'
  heading: Revised Code - citation and designation - General Code
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'All statutes of a permanent and general nature of the state as revised and
    consolidated into general provisions, titles, chapters, and sections shall be
    known and designated as the "Revised Code", for which designation "R.C." may be
    substituted. Except as otherwise provided in section 1301.107 of the Revised Code,
    Title, Chapter, and section headings and marginal General Code section numbers
    do not constitute any part of the law as contained in the "Revised Code".

    The enactment of the Revised Code shall not be construed to affect a right or
    liability accrued or incurred under any section of the General Code prior to the
    effective date of such enactment, or an action or proceeding for the enforcement
    of such right or liability. Such enactment shall not be construed to relieve any
    person from punishment for an act committed in violation of any section of the
    General Code, nor to affect an indictment or prosecution therefor. For such purposes,
    any such section of the General Code shall continue in full force notwithstanding
    its repeal for the purpose of revision.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.01
- number: '1.02'
  heading: Definitions in Revised Code
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'As used in the Revised Code, unless the context otherwise requires:

    (A) "Whoever" includes all persons, natural and artificial; partners; principals,
    agents, and employees; and all officials, public or private.

    (B) "Another," when used to designate the owner of property which is the subject
    of an offense, includes not only natural persons but also every other owner of
    property.

    (C) "Of unsound mind" means that the person lacks the relevant mental capacity.

    (D) "Bond" includes an undertaking.

    (E) "Undertaking" includes a bond.

    (F) "And" may be read "or," and "or" may be read "and" if the sense requires it.

    (G) "Registered mail" includes certified mail and "certified mail" includes registered
    mail.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.02
- number: '1.03'
  heading: Anything of value defined
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'As used in any section of the Revised Code for the violation of which there
    is provided a penalty or forfeiture, unless the context otherwise requires, "anything
    of value" includes:

    (A) Money, bank bills or notes, United States treasury notes, and other bills,
    bonds, or notes issued by lawful authority and intended to pass and circulate
    as money;

    (B) Goods and chattels;

    (C) Promissory notes, bills of exchange, orders, drafts, warrants, checks, or
    bonds given for the payment of money;

    (D) Receipts given for the payment of money or other property;

    (E) Rights in action;

    (F) Things which savor of the realty and are, at the time they are taken, a part
    of the freehold, whether they are of the substance or produce thereof or affixed
    thereto, although there may be no interval between the severing and taking away;

    (G) Any interest in realty, including fee simple and partial interests, present
    and future, contingent or vested interests, beneficial interests, leasehold interests,
    and any other interest in realty;

    (H) Any promise of future employment;

    (I) Every other thing of value.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.03
- number: '1.04'
  heading: Standard time
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'The standard time throughout this state shall be the mean astronomical time
    of the seventy-fifth degree of longitude west from Greenwich. Courts, public offices,
    and official legal proceedings subject to the laws of this state shall be regulated
    thereby. Whenever the time of performance of any act, or the time of accrual or
    determination of any rights, is fixed or governed by the statutes of this state
    or by any resolutions, rules, regulations, or orders in effect under authority
    of such statutes, such time shall be the standard time provided in this section.

    All clocks maintained in or upon public buildings, existing as such under the
    laws of this state, shall be set and run according to this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.04
- number: '1.05'
  heading: Imprisoned or imprisonment defined
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) As used in the Revised Code, unless the context otherwise requires, "imprisoned"
    or "imprisonment" means being imprisoned under a sentence imposed for an offense
    or serving a term of imprisonment, prison term, jail term, term of local incarceration,
    or other term under a sentence imposed for an offense in an institution under
    the control of the department of rehabilitation and correction, a county, multicounty,
    municipal, municipal-county, or multicounty-municipal jail or workhouse, a minimum
    security jail, a community-based correctional facility, or another facility described
    or referred to in section 2929.34 of the Revised Code for the type of criminal
    offense and under the circumstances specified or referred to in that section.

    (B) As used in division (A) of this section, "community-based correctional facility"
    has the same meaning as in section 2929.01 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.05
- number: '1.07'
  heading: Value of evidence of debt or written instrument
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: Except as provided in sections 2909.11 and 2913.61 of the Revised Code, when
    an evidence of debt or a written instrument is the subject of a criminal act,
    the amount of money due on the evidence of debt or the written instrument or secured
    thereby, or the amount of money or the value of property affected thereby, shall
    be deemed the value of the evidence of debt or the written instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.07
- number: '1.08'
  heading: Blighted area defined - excluded considerations
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'As used in the Revised Code:

    (A) "Blighted area" and "slum" mean an area in which at least seventy per cent
    of the parcels are blighted parcels and those blighted parcels substantially impair
    or arrest the sound growth of the state or a political subdivision of the state,
    retard the provision of housing accommodations, constitute an economic or social
    liability, or are a menace to the public health, safety, morals, or welfare in
    their present condition and use.

    (B) "Blighted parcel" means either of the following:

    (1) A parcel that has one or more of the following conditions:

    (a) A structure that is dilapidated, unsanitary, unsafe, or vermin infested and
    that because of its condition has been designated by an agency that is responsible
    for the enforcement of housing, building, or fire codes as unfit for human habitation
    or use;

    (b) The property poses a direct threat to public health or safety in its present
    condition by reason of environmentally hazardous conditions, solid waste pollution,
    or contamination;

    (c) Tax or special assessment delinquencies exceeding the fair value of the land
    that remain unpaid thirty-five days after notice to pay has been mailed.

    (2) A parcel that has two or more of the following conditions that, collectively
    considered, adversely affect surrounding or community property values or entail
    land use relationships that cannot reasonably be corrected through existing zoning
    codes or other land use regulations:

    (a) Dilapidation and deterioration;

    (b) Age and obsolescence;

    (c) Inadequate provision for ventilation, light, air, sanitation, or open spaces;

    (d) Unsafe and unsanitary conditions;

    (e) Hazards that endanger lives or properties by fire or other causes;

    (f) Noncompliance with building, housing, or other codes;

    (g) Nonworking or disconnected utilities;

    (h) Is vacant or contains an abandoned structure;

    (i) Excessive dwelling unit density;

    (j) Is located in an area of defective or inadequate street layout;

    (k) Overcrowding of buildings on the land;

    (l) Faulty lot layout in relation to size, adequacy, accessibility, or usefulness;

    (m) Vermin infestation;

    (n) Extensive damage or destruction caused by a major disaster when the damage
    has not been remediated within a reasonable time;

    (o) Identified hazards to health and safety that are conducive to ill health,
    transmission of disease, juvenile delinquency, or crime;

    (p) Ownership or multiple ownership of a single parcel when the owner, or a majority
    of the owners of a parcel in the case of multiple ownership, cannot be located.

    (C) When determining whether a property is a blighted parcel or whether an area
    is a blighted area or slum for the purposes of this section, no person shall consider
    whether there is a comparatively better use for any premises, property, structure,
    area, or portion of an area, or whether the property could generate more tax revenues
    if put to another use.

    (D)(1) Notwithstanding any other provision of this section, absent any environmental
    or public health hazard that cannot be corrected under its current use or ownership,
    a property is not a blighted parcel because of any condition listed in division
    (B) of this section if the condition is consistent with conditions that are normally
    incident to generally accepted agricultural practices and the land is used for
    agricultural purposes as defined in section 303.01 or 519.01 of the Revised Code,
    or the county auditor of the county in which the land is located has determined
    under section 5713.31 of the Revised Code that the land is "land devoted exclusively
    to agricultural use" as defined in section 5713.30 of the Revised Code.

    (2) A property that under division (D)(1) of this section is not a blighted parcel
    shall not be included in a blighted area or slum.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.08
- number: '1.11'
  heading: Remedial laws liberally construed
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: Remedial laws and all proceedings under them shall be liberally construed
    in order to promote their object and assist the parties in obtaining justice.
    The rule of the common law that statutes in derogation of the common law must
    be strictly construed has no application to remedial laws; but this section does
    not require a liberal construction of laws affecting personal liberty, relating
    to amercement, or of a penal nature.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.11
- number: '1.12'
  heading: Special provision shall govern unless it appears that provisions are cumulative
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: When a special provision is made in a remedial law as to service, pleadings,
    competency of witnesses, or in any other respect inconsistent with the general
    provisions of sections of the Revised Code relating to procedure in the court
    of common pleas and procedure on appeal, the special provision shall govern, unless
    it appears that the provisions are cumulative.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.12
- number: '1.14'
  heading: Excluding first and including last day - legal holidays
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'The time within which an act is required by law to be done shall be computed
    by excluding the first and including the last day; except that, when the last
    day falls on Sunday or a legal holiday, the act may be done on the next succeeding
    day that is not Sunday or a legal holiday.

    When a public office in which an act, required by law, is to be performed is closed
    to the public for the entire day that constitutes the last day for doing the act
    or before its usual closing time on that day, the act may be performed on the
    next succeeding day that is not a Sunday or a legal holiday as defined in this
    section.

    "Legal holiday" as used in this section means the following days:

    (A) The first day of January, known as New Year''s day;

    (B) The third Monday in January, known as Martin Luther King day;

    (C) The third Monday in February, known as Washington-Lincoln day;

    (D) The day designated in the "Act of June 28, 1968," 82 Stat. 250, 5 U.S.C. 6103,
    as amended, for the commemoration of Memorial day;

    (E) The nineteenth day of June, known as Juneteenth day;

    (F) The fourth day of July, known as Independence day;

    (G) The first Monday in September, known as Labor day;

    (H) The second Monday in October, known as Columbus day;

    (I) The eleventh day of November, known as Veterans'' day;

    (J) The fourth Thursday in November, known as Thanksgiving day;

    (K) The twenty-fifth day of December, known as Christmas day;

    (L) Any day appointed and recommended by the governor of this state or the president
    of the United States as a holiday.

    If any day designated in this section as a legal holiday falls on Sunday, the
    next succeeding day is a legal holiday.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.14
- number: '1.15'
  heading: Effective date of acts - priority of legal rights
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: When an act is to take effect or become operative from and after a day named,
    no part of that day shall be included. If priority of legal rights depends upon
    the order of events of the same day, such priority shall be determined by the
    times in the day at which they respectively occurred.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.15
- number: '1.22'
  heading: Judicial construction and adjudication subsequent change not to affect
    prior valid obligations
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: When an officer or board of a county, township, or municipal corporation by
    ordinance, resolution, order, or other proceeding, in pursuance of a statute of
    the state, has authorized or caused the issue and delivery of any bonds, obligations,
    or instruments of such county, township, or municipal corporation, or has caused
    any county, township, or municipal contracts, grants, franchises, rights, or privileges
    to be made or given, which were valid according to judicial construction and adjudication
    at the date of such action or proceeding, and loans or other things of value have
    been effected or acquired or expenditures have been made by other persons in reliance
    upon such construction or adjudication, such bonds, obligations, contracts, grants,
    franchises, rights, and privileges shall be valid and binding, notwithstanding
    subsequent change of such rule of judicial construction and adjudication with
    respect to other similar legislation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.22
- number: '1.23'
  heading: Construction of cross-references
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) Wherever in a penalty section reference is made to a violation of a series
    of sections, or of divisions or subdivisions of a section, such reference shall
    be construed to mean a violation of any section, division, or subdivision included
    in such reference.

    (B) References in the Revised Code to action taken or authorized under designated
    sections of the Revised Code include, in every case, action taken or authorized
    under the applicable section of the General Code which is superseded by the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.23
- number: '1.30'
  heading: Legislation correcting nonsubstantive errors in the Revised Code
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) In enacting any legislation with the stated purpose of correcting nonsubstantive
    errors in the Revised Code, it is the intent of the general assembly not to make
    substantive changes in the law in effect on the date of such enactment. A section
    of the Revised Code affected by any such act shall be construed as a restatement
    and correction of, and substituted in a continuing way for, the corresponding
    statutory provision existing on its date of enactment.

    (B) Acts of the general assembly with the purpose described in division (A) of
    this section include:

    (1) House Bill No. 1 of the 100th general assembly;

    (2) House Bill No. 1 of the 104th general assembly;

    (3) House Bill No. 1 of the 105th general assembly;

    (4) House Bill No. 5 of the 105th general assembly special session;

    (5) House Bill No. 1 of the 107th general assembly;

    (6) House Bill No. 1 of the 108th general assembly;

    (7) House Bill No. 1 of the 109th general assembly;

    (8) House Bill No. 1 of the 110th general assembly;

    (9) House Bill No. 1 of the 111th general assembly;

    (10) House Bill No. 1 of the 112th general assembly;

    (11) House Bill No. 1 of the 113th general assembly;

    (12) House Bill No. 1 of the 114th general assembly;

    (13) House Bill No. 37 of the 115th general assembly;

    (14) House Bill No. 428 of the 116th general assembly;

    (15) House Bill No. 708 of the 117th general assembly.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.30
- number: '1.301'
  heading: Intent of H.B. 339 of the 133rd General Assembly
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: In enacting H.B. 339 of the 133rd general assembly with the stated purpose
    of correcting nonsubstantive errors in the Revised Code, it is the intent of the
    general assembly not to make substantive changes in the law in effect on the date
    of such enactment, except for the changes to sections 167.03, 1317.04, 1317.05,
    3905.85, 3905.87, 3907.15, 3915.13, 3951.06, 4505.11, and 4509.70 of the Revised
    Code. Other than sections 167.03, 1317.04, 1317.05, 3905.85, 3905.87, 3907.15,
    3915.13, 3951.06, 4505.11, and 4509.70 of the Revised Code, a section of the Revised
    Code affected by H.B. 339 of the 133rd general assembly shall be construed as
    a restatement and correction of, and substituted in a continuing way for, the
    corresponding statutory provision existing on its date of enactment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.301
- number: '1.31'
  heading: Gender specific and gender neutral language
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) As used in this section:

    (1) Language is "gender neutral" if it does not expressly or implicitly refer
    to one sex to the real or apparent exclusion of the other and expressly or implicitly
    refers to both sexes without distinguishing between them.

    (2) Language is "gender specific" if it expressly or implicitly refers to one
    sex to the real or apparent exclusion of the other or expressly or implicitly
    refers to both sexes and distinguishes between them.

    (B)(1) Except as otherwise provided in division (B)(2) of this section, in enacting
    an act that replaces gender specific language with gender neutral language, it
    is the intent of the general assembly not to make substantive changes in the statutory
    law in effect on the date of that enactment by the replacement of the gender specific
    language with the gender neutral language. The gender neutral language shall be
    construed as a restatement of, and substituted in a continuing way for, the corresponding
    statutory gender specific language existing on the date of enactment.

    (2) In enacting an act with the stated purpose of making a substantive change
    in a statute by replacing gender specific language with gender neutral language,
    the rule of construction in division (B)(1) of this section does not apply.

    (C) The rule of construction in division (B) of section 1.43 of the Revised Code
    declares that words of one gender include the other genders. The rules of construction
    contained in divisions (B)(1) and (2) of this section do not affect this rule
    of construction with respect to statutes that contain gender specific language.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.31
- number: '1.41'
  heading: Applicability of rules of construction
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: Sections 1.41 to 1.59, inclusive, of the Revised Code apply to all statutes,
    subject to the conditions stated in section 1.51 of the Revised Code, and to rules
    adopted under them.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.41
- number: '1.42'
  heading: Common, technical or particular terms
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: Words and phrases shall be read in context and construed according to the
    rules of grammar and common usage. Words and phrases that have acquired a technical
    or particular meaning, whether by legislative definition or otherwise, shall be
    construed accordingly.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.42
- number: '1.43'
  heading: Singular - plural - gender - tense
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) The singular includes the plural, and the plural includes the singular.

    (B) Words of one gender include the other genders.

    (C) Words in the present tense include the future.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.43
- number: '1.44'
  heading: Week - year
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) "Week" means seven consecutive days.

    (B) "Year" means twelve consecutive months.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.44
- number: '1.45'
  heading: Time computation
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: If a number of months is to be computed by counting the months from a particular
    day, the period ends on the same numerical day in the concluding month as the
    day of the month from which the computation is begun, unless there are not that
    many days in the concluding month, in which case the period ends on the last day
    of that month.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.45
- number: '1.46'
  heading: Conflict between figures and words in expressing number
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: If there is a conflict between figures and words in expressing a number, the
    words govern.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.46
- number: '1.47'
  heading: Presumptions in enactment of statutes
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'In enacting a statute, it is presumed that:

    (A) Compliance with the constitutions of the state and of the United States is
    intended;

    (B) The entire statute is intended to be effective;

    (C) A just and reasonable result is intended;

    (D) A result feasible of execution is intended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.47
- number: '1.471'
  heading: Effective date of act containing appropriation for current expenses
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'As used in this section, "appropriation for current expenses" means an appropriation
    of money for the current expenses of the state government and state institutions
    as contemplated by Ohio Constitution, Article II, Section 1d.

    This section expresses the general assembly''s interpretation of State, ex rel.
    Ohio AFL-CIO, v. Voinovich (1994), 69 Ohio St. 3d 225, 234 to 237, insofar as
    the case holds with respect to the effective date of sections of law contained
    in acts that contain an appropriation for current expenses.

    A codified or uncodified section of law contained in an act that contains an appropriation
    for current expenses is not subject to the referendum and goes into immediate
    effect if any of the following apply:

    (A) The section is an appropriation for current expenses;

    (B) The section is an earmarking of the whole or part of an appropriation for
    current expenses; or

    (C) Implementation of the section depends upon an appropriation for current expenses
    that is contained in the act.

    The general assembly shall determine which sections go into immediate effect.

    A codified or uncodified section of law contained in an act that contains an appropriation
    for current expenses that does not go into immediate effect as contemplated by
    this section is subject to the referendum and goes into effect as provided in
    Ohio Constitution, Article II, Section 1c.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.471
- number: '1.48'
  heading: Presumption that statute is prospective
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: A statute is presumed to be prospective in its operation unless expressly
    made retrospective.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.48
- number: '1.49'
  heading: Determining legislative intent
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'If a statute is ambiguous, the court, in determining the intention of the
    legislature, may consider among other matters:

    (A) The object sought to be attained;

    (B) The circumstances under which the statute was enacted;

    (C) The legislative history;

    (D) The common law or former statutory provisions, including laws upon the same
    or similar subjects;

    (E) The consequences of a particular construction;

    (F) The administrative construction of the statute.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.49
- number: '1.50'
  heading: Severability
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: If any provision of a section of the Revised Code or the application thereof
    to any person or circumstance is held invalid, the invalidity does not affect
    other provisions or applications of the section or related sections which can
    be given effect without the invalid provision or application, and to this end
    the provisions are severable.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.50
- number: '1.51'
  heading: Special or local provision prevails as exception to general provision
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: If a general provision conflicts with a special or local provision, they shall
    be construed, if possible, so that effect is given to both. If the conflict between
    the provisions is irreconcilable, the special or local provision prevails as an
    exception to the general provision, unless the general provision is the later
    adoption and the manifest intent is that the general provision prevail.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.51
- number: '1.52'
  heading: Irreconcilable statutes or amendments - harmonization
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) If statutes enacted at the same or different sessions of the legislature
    are irreconcilable, the statute latest in date of enactment prevails.

    (B) If amendments to the same statute are enacted at the same or different sessions
    of the legislature, one amendment without reference to another, the amendments
    are to be harmonized, if possible, so that effect may be given to each. If the
    amendments are substantively irreconcilable, the latest in date of enactment prevails.
    The fact that a later amendment restates language deleted by an earlier amendment,
    or fails to include language inserted by an earlier amendment, does not of itself
    make the amendments irreconcilable. Amendments are irreconcilable only when changes
    made by each cannot reasonably be put into simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.52
- number: '1.53'
  heading: Language and any designated section number of enrolled act prevails
  title:
    num: null
