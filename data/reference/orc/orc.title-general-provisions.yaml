  url: https://codes.ohio.gov/ohio-revised-code/section-5.013
- number: '5.014'
  heading: Procedure for folding state flag
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The general assembly hereby establishes a recommended procedure for the folding
    of the state flag by two people. The procedure is as follows:

    With the flag unfolded, fold the flag in half lengthwise so that the points of
    the flag are aligned. Fold the flag in half lengthwise a second time to form a
    long strip with the red disc facing the ground. Next, fold the pointed end back
    onto itself to form a rectangle. These steps entail three folds.

    Starting on the end formed by the fold of the pointed end back onto itself, fold
    two inches of the flag onto itself for a flag with a three-foot hoist and a five-foot
    fly, or another appropriate width of fold for a flag of a different size. Repeat
    the folds a total of fourteen times, alternating the folds in a fan-like manner.

    The result is a total of seventeen folds symbolizing that Ohio was the seventeenth
    state admitted to the union. Finally, neatly and snugly wrap the remaining length
    of flag around the fan-folds to form a compact rectangle.'
