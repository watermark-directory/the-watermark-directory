- number: '9.981'
  heading: Applicability
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) Sections 9.98 to 9.983 of the Revised Code are applicable to bonds:

    (1) The payment of the debt service on which is to be provided for directly or
    indirectly by payments contracted to be made in the bond proceedings by the absolute
    obligors, being persons other than the issuer; and

    (2) Which are authorized to be issued under sections 122.39 and 122.41 to 122.62,
    Chapter 165., 902., 3377., 3706., division (A)(4) of section 4582.06, division
    (A)(8) of section 4582.31, section 4582.48, or Chapter 6121. or 6123. of the Revised
    Code, notwithstanding other provisions therein.

    (B) Sections 9.98 to 9.983 of the Revised Code are applicable to bonds issued
    under sections 306.37 and 6119.12 of the Revised Code and Chapters 140., 154.,
    175., and 349. of the Revised Code, and to any bonds authorized under laws which
    expressly make those sections applicable.

    (C) Subject to division (A) of this section, the authority provided in sections
    9.98 to 9.983 of the Revised Code is supplemental to and not in derogation of
    any similar authority provided by, derived from, or implied by, any law, the Ohio
    Constitution, or any charter, resolution, or ordinance, and no inference shall
    be drawn to negate the authority thereunder by reason of the express provisions
    of sections 9.98 to 9.983 of the Revised Code.

    (D) Sections 9.98 to 9.983 of the Revised Code shall be liberally construed to
    permit flexibility in the arrangements therein provided to enhance the issuance
    of such bonds and provide for terms most beneficial and satisfactory to the persons
    which undertake to provide for their payment, security, and liquidity.'
