- number: '3.10'
  heading: Subpoena of witnesses - fees
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: 'In removal proceedings under sections 3.07 to 3.09, inclusive, of the Revised
    Code, the court of common pleas and the court of appeals may subpoena witnesses
    and compel their attendance in the same manner as in civil cases. Process shall
    be served by the sheriff of the county in which the witness resides.

    The witness fees and other fees in connection with the removal proceedings shall
    be the same as in civil cases, and the expenses incurred in any of said removal
    proceeding shall be paid out of the general revenue fund of the county.'
  history: null
