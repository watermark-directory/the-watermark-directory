- number: '5.2245'
  heading: Nurses month
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The month of May is designated as "Nurses Month" in recognition of the hard
    work and dedication of nurses and their significant contributions in improving
    the health care of the citizens of this state.

    In enacting this section, it is the intent of the general assembly to acknowledge
    and celebrate the nurses of this state. Although nurses practice their profession
    in a wide variety of settings, including hospitals, nursing homes, other health
    care facilities, physician''s offices, schools, and even private homes, the contributions
    made by the nursing profession in the improvement of the health care system are
    sometimes overlooked. Therefore, the general assembly feels that it is vitally
    important that a month be formally designated as "Nurses Month" for the purpose
    of increasing public awareness of the role nurses play in the health and well-being
    of all Ohioans.'
