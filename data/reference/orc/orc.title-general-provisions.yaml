- number: '9.232'
  heading: Contract for disbursements
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'A contract entered into under section 9.231 of the Revised Code shall, at
    a minimum, set forth all of the following:

    (A) The minimum percentage of money that is to be expended on the recipient''s
    direct costs;

    (B) The records that a recipient must maintain to document direct costs;

    (C) If some of the recipient''s obligations under the contract involve the performance
    of any of the types of services described in division (B)(2)(a), (c), or (f) of
    section 9.231 of the Revised Code, the name and telephone number of the individual
    designated by the governmental entity as the contact for obtaining approval of
    contract amounts for purposes of division (A)(2)(a)(ii) of section 9.235 of the
    Revised Code;

    (D) The financial review and audit requirements established under section 9.234
    of the Revised Code and by rules of the auditor of state adopted under section
    9.238 of the Revised Code or, with respect to any contract described in division
    (A)(3) of section 9.231 of the Revised Code, any financial compliance requirements
    established for purposes of that contract;

    (E) The provisions established by rules of the attorney general adopted under
    section 9.237 of the Revised Code;

    (F) Permissible dispositions of money received by a recipient in excess of the
    contract payment earned, if the excess is not to be repaid to the governmental
    entity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.232
- number: '9.233'
  heading: Recipient of disbursements entitled only to contract payment earned
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) A recipient shall be entitled to the contract payment earned. In no event
    shall a recipient be entitled to more than the contract payment earned. A recipient
    shall repay any money received in excess of the contract payment earned to the
    governmental entity or, if a different disposition is provided for in the recipient''s
    contract with the governmental entity, dispose of that money in accordance with
    the terms of the contract.

    (B) In order to determine the contract payment earned, all financial books and
    records open to inspection pursuant to section 9.235 of the Revised Code shall
    be held to standards consistent with generally accepted accounting principles.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.233
- number: '9.234'
  heading: Records and reports by recipient - financial review - financial audit
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) Unless otherwise explicitly provided in the Revised Code, a recipient
    shall do all of the following:

    (1) With respect to any money received prior to the performance of the recipient''s
    obligations under the contract entered into under section 9.231 of the Revised
    Code, and any money received in excess of the contract payment earned, keep current
    and accurate records of the receipt and use of the money in a manner consistent
    with the contract;

    (2) With respect to any money received after the recipient has performed its obligations
    under the contract entered into under section 9.231 of the Revised Code, keep
    current and accurate records of the recipient''s expenditures on direct costs;

    (3) Annually provide the contracting authority of the governmental entity with
    a report that includes both of the following:

    (a)(i) Subject to division (A)(3)(a)(ii) of this section, an audit report, if
    a financial audit is required by division (B)(3) of this section; a financial
    review, if a financial review is required by division (B)(2) of this section;
    a financial review, if a financial review is required by division (B)(1) of this
    section and is not waived; or financial statements, major categories of expenditure
    of the money, and a summary of the activities for which the recipient used the
    money.

    (ii) With respect to any contract described in division (A)(3) of section 9.231
    of the Revised Code, an audit report or financial review if the performance of
    a financial audit or review is a compliance requirement established for purposes
    of that contract.

    (b) Any other information that may be required by the contract.

    (B)(1) A recipient that, pursuant to one or more contracts entered into under
    section 9.231 of the Revised Code, receives money totaling at least one hundred
    thousand dollars but less than three hundred thousand dollars in any fiscal year
    shall have a financial review performed for each fiscal year in which it receives
    that amount of money in accordance with the financial review standards of the
    American institute of certified public accountants. The financial review shall
    be performed by an independent public accounting firm. The financial review contract
    between the recipient and the firm shall provide that the state is an intended
    third-party beneficiary of the contract.

    This financial review requirement may be waived, however, if the contracting authority
    of each governmental entity from which the recipient received money that fiscal
    year pursuant to a contract entered into under section 9.231 of the Revised Code
    agrees to the waiver.

    (2) A recipient that, pursuant to one or more contracts entered into under section
    9.231 of the Revised Code, receives money totaling at least three hundred thousand
    dollars but less than five hundred thousand dollars in any fiscal year shall have
    a financial review performed for each fiscal year in which it receives that amount
    of money in accordance with the financial review standards of the American institute
    of certified public accountants. The financial review shall be performed by an
    independent public accounting firm. The financial review contract between the
    recipient and the firm shall provide that the state is an intended third-party
    beneficiary of the contract.

    (3) A recipient that, pursuant to one or more contracts entered into under section
    9.231 of the Revised Code, receives money totaling five hundred thousand dollars
    or more in any fiscal year shall have a financial audit performed for each fiscal
    year in which it receives that amount of money according to generally accepted
    auditing standards by an independent public accounting firm. The engagement letter
    between the recipient and the firm shall provide that the state is an intended
    third-party beneficiary of the contract. The audit shall comply with rules adopted
    by the auditor of state under section 9.238 of the Revised Code. An audit performed
    pursuant to the federal "Single Audit Act of 1984," 98 Stat. 2327, 31 U.S.C. 7501
    et seq., as amended, is sufficient if the state is an intended third-party beneficiary
    of the audit contract.

    (C)(1) An audit conducted by the auditor of state pursuant to any other provision
    of the Revised Code is sufficient for purposes of division (B) of this section.

    (2) A financial audit meeting the requirements of division (B)(3) of this section
    satisfies the financial review requirements of divisions (B)(1) and (2) of this
    section.

    (3) The references in division (B) of this section to fiscal year mean the recipient''s
    fiscal year.

    (D) Nothing in this section shall be construed to limit in any way the authority
    of the auditor of state to conduct audits pursuant to any other provision of the
    Revised Code.'
