- number: '5.013'
  heading: Pledge to the state flag
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: '"I salute the flag of the state of Ohio and pledge to the buckeye state respect
    and loyalty" is hereby adopted as the official pledge to the state flag. The pledge
    shall not replace, preempt, or be recited before the pledge of allegiance to the
    United States flag.'
