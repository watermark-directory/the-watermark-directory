- number: '9.491'
  heading: Definitions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'As used in sections 9.49 to 9.498 of the Revised Code:

    (A) "Legal matter" means any administrative proceeding, case, group of cases,
    or legal issue for which the state requires legal representation or advice.

    (B) "Private attorney" means any attorney in the private practice of law or a
    law firm but does not mean an attorney appointed by the attorney general pursuant
    to section 109.08 of the Revised Code for the purpose of collecting debts certified
    to the attorney general for collection under any law or debts that the attorney
    general is authorized to collect.

    (C) "State" means this state and any officer, department, board, commission, division,
    bureau, council, or unit of organization, however designated, of the executive
    branch of government of this state and any of its agents.

    (D) "Securities class action" means an action brought as a class action that includes
    a violation of the "Securities Act of 1933," 15 U.S.C. 77a and following, or the
    "Securities Exchange Act of 1934," 15 U.S.C. 78a and following.'
