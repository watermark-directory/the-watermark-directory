- number: '9.493'
  heading: Contract with private attorney outside Ohio
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'The state shall not enter into a contract with a private attorney located
    outside this state unless the attorney general determines that at least one of
    the following applies:

    (A) There are no private attorneys with an office in this state that are willing
    to accept the legal representation.

    (B) All private attorneys with offices in this state that possess the necessary
    experience or capability are conflicted and unable to represent the state or the
    attorney general or lack necessary personnel and capacity in the firm to take
    on the engagement.

    (C) The attorney general is prevented from engaging a private attorney with an
    office in this state under the rules of the controlling board regarding waiver
    of competitive selection.

    (D) There are no private attorneys with offices in this state that possess the
    necessary experience, capability, or capacity required by the contemplated engagement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.493
- number: '9.494'
  heading: Publication of contract
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) A copy of the executed contingency fee contract between the state and
    a private attorney pursuant to section 9.492 or 9.493 of the Revised Code and
    any corresponding submission by the attorney general to the controlling board
    pursuant to division (C)(2) of section 9.492 of the Revised Code shall be posted
    on the attorney general''s web site and shall remain posted on the web site for
    the duration of the contract.

    (B) A private attorney under a contingency fee contract to provide services to
    the state pursuant to section 9.492 or 9.493 of the Revised Code shall maintain
    from the inception of the contract until at least three years after the contract
    expires or is terminated detailed current records, including documentation of
    all expenses, disbursements, charges, credits, underlying receipts and invoices,
    and other financial transactions that concern the provision of the attorney services.
    The private attorney shall maintain detailed contemporaneous time records for
    the attorneys and paralegals working on the legal matter and shall promptly provide
    these records to the attorney general upon request.'
