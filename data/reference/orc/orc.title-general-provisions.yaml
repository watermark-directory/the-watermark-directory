- number: '9.24'
  heading: Findings for recovery
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) Except as may be allowed under division (F) of this section, no state
    agency and no political subdivision shall award a contract as described in division
    (G)(1) of this section for goods, services, or construction, paid for in whole
    or in part with state funds, to a person against whom a finding for recovery has
    been issued by the auditor of state on and after January 1, 2001, if the finding
    for recovery is unresolved.

    A contract is considered to be awarded when it is entered into or executed, irrespective
    of whether the parties to the contract have exchanged any money.

    (B) For purposes of this section, a finding for recovery is unresolved unless
    one of the following criteria applies:

    (1) The money identified in the finding for recovery is paid in full to the state
    agency or political subdivision to whom the money was owed;

    (2) The debtor has entered into a repayment plan that is approved by the attorney
    general and the state agency or political subdivision to whom the money identified
    in the finding for recovery is owed. A repayment plan may include a provision
    permitting a state agency or political subdivision to withhold payment to a debtor
    for goods, services, or construction provided to or for the state agency or political
    subdivision pursuant to a contract that is entered into with the debtor after
    the date the finding for recovery was issued.

    (3) The attorney general waives a repayment plan described in division (B)(2)
    of this section for good cause;

    (4) The debtor and state agency or political subdivision to whom the money identified
    in the finding for recovery is owed have agreed to a payment plan established
    through an enforceable settlement agreement.

    (5) The state agency or political subdivision desiring to enter into a contract
    with a debtor certifies, and the attorney general concurs, that all of the following
    are true:

    (a) Essential services the state agency or political subdivision is seeking to
    obtain from the debtor cannot be provided by any other person besides the debtor;

    (b) Awarding a contract to the debtor for the essential services described in
    division (B)(5)(a) of this section is in the best interest of the state;

    (c) Good faith efforts have been made to collect the money identified in the finding
    of recovery.

    (6) The debtor has commenced an action to contest the finding for recovery and
    a final determination on the action has not yet been reached;

    (7) The debt has been discharged in bankruptcy or is no longer owed based on a
    final nonappealable court order.

    (C) The attorney general shall submit an initial report to the auditor of state,
    not later than December 1, 2003, indicating the status of collection for all findings
    for recovery issued by the auditor of state for calendar years 2001, 2002, and
    2003. Beginning on January 1, 2004, the attorney general shall submit to the auditor
    of state, on the first day of every January, April, July, and October, a list
    of all findings for recovery that have been resolved in accordance with division
    (B) of this section during the calendar quarter preceding the submission of the
    list and a description of the means of resolution. The attorney general shall
    notify the auditor of state when a judgment is issued against an entity described
    in division (F)(1) of this section.

    (D) The auditor of state shall maintain a database, accessible to the public,
    listing persons against whom an unresolved finding for recovery has been issued,
    and the amount of the money identified in the unresolved finding for recovery.
    The auditor of state shall have this database operational on or before January
    1, 2004. The initial database shall contain the information required under this
    division for calendar years 2001, 2002, and 2003.

    Beginning January 15, 2004, the auditor of state shall update the database by
    the fifteenth day of every January, April, July, and October to reflect resolved
    findings for recovery that are reported to the auditor of state by the attorney
    general on the first day of the same month pursuant to division (C) of this section.

    (E) Before awarding a contract as described in division (G)(1) of this section
    for goods, services, or construction, paid for in whole or in part with state
    funds, a state agency or political subdivision shall verify that the person to
    whom the state agency or political subdivision plans to award the contract has
    no unresolved finding for recovery issued against the person. A state agency or
    political subdivision shall verify that the person does not appear in the database
    described in division (D) of this section or shall obtain other proof that the
    person has no unresolved finding for recovery issued against the person.

    (F) The prohibition of division (A) of this section and the requirement of division
    (E) of this section do not apply with respect to the companies, payments, or agreements
    described in divisions (F)(1) and (2) of this section, or in the circumstance
    described in division (F)(3) of this section.

    (1) A bonding company or a company authorized to transact the business of insurance
    in this state, a self-insurance pool, joint self-insurance pool, risk management
    program, or joint risk management program, unless a court has entered a final
    judgment against the company and the company has not yet satisfied the final judgment.

    (2) To medicaid provider agreements under the medicaid program.

    (3) When federal law dictates that a specified entity provide the goods, services,
    or construction for which a contract is being awarded, regardless of whether that
    entity would otherwise be prohibited from entering into the contract pursuant
    to this section.

    (G)(1) This section applies only to contracts for goods, services, or construction
    that satisfy the criteria in either division (G)(1)(a) or (b) of this section.
    This section may apply to contracts for goods, services, or construction that
    satisfy the criteria in division (G)(1)(c) of this section, provided that the
    contracts also satisfy the criteria in either division (G)(1)(a) or (b) of this
    section.

    (a) The cost for the goods, services, or construction provided under the contract
    is estimated to exceed twenty-five thousand dollars.

    (b) The aggregate cost for the goods, services, or construction provided under
    multiple contracts entered into by the particular state agency and a single person
    or the particular political subdivision and a single person within the fiscal
    year preceding the fiscal year within which a contract is being entered into by
    that same state agency and the same single person or the same political subdivision
    and the same single person, exceeded fifty thousand dollars.

    (c) The contract is a renewal of a contract previously entered into and renewed
    pursuant to that preceding contract.

    (2) This section does not apply to employment contracts.

    (H) As used in this section:

    (1) "State agency" has the same meaning as in section 9.66 of the Revised Code.

    (2) "Political subdivision" means a political subdivision as defined in section
    9.82 of the Revised Code that has received more than fifty thousand dollars of
    state money in the current fiscal year or the preceding fiscal year.

    (3) "Finding for recovery" means a determination issued by the auditor of state,
    contained in a report the auditor of state gives to the attorney general pursuant
    to section 117.28 of the Revised Code, that public money has been illegally expended,
    public money has been collected but not been accounted for, public money is due
    but has not been collected, or public property has been converted or misappropriated.

    (4) "Debtor" means a person against whom a finding for recovery has been issued.

    (5) "Person" means the person named in the finding for recovery.

    (6) "State money" does not include funds the state receives from another source
    and passes through to a political subdivision.'
