- number: '9.27'
  heading: State contracts - invalid terms and conditions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "state" and "state agency" mean the state of
    Ohio, including the governor, lieutenant governor, secretary of state, auditor
    of state, attorney general, and treasurer of state, and all departments, boards,
    offices, commissions, agencies, institutions, and other instrumentalities of the
    state of Ohio, but not including the general assembly or any legislative agency,
    or any court or judicial agency.

    (B) Except as otherwise required or permitted by state or federal law, a contract
    entered into by the state for the procurement of goods or services shall not include
    any of the following:

    (1) A provision that requires the state to indemnify or hold harmless another
    person.

    (2) A provision by which the state agrees to binding arbitration or any other
    binding extra-judicial dispute resolution process.

    (3) A provision that names a venue for any action or dispute against the state
    other than a court of proper jurisdiction in Franklin county, Ohio.

    (4) A provision that requires the state to agree to limit the liability for any
    direct loss to the state for bodily injury, death, or damage to property of the
    state caused by the negligence, intentional or willful misconduct, fraudulent
    act, recklessness, or other tortious conduct of a person or a person''s employees
    or agents, or a provision that would otherwise impose an indemnification obligation
    on the state.

    (5) A provision that requires the state to be bound by a term or condition that
    is unknown to the state at the time of signing a contract, that is not specifically
    negotiated with the state, that may be unilaterally changed by the other party,
    or that is electronically accepted by a state employee.

    (6) A provision that provides for a person other than the attorney general to
    serve as legal counsel for the state or for any state agency, unless allowed for
    under the process set forth in section 109.07 of the Revised Code.

    (7) A provision that is inconsistent with the state''s obligations under section
    149.43 of the Revised Code.

    (8) A provision for automatic renewal such that state funds are or would be obligated
    in subsequent fiscal years.

    (9) A provision that limits the state''s ability to recover the cost of cover
    for a replacement contractor.

    (10) With respect to a purchase in which a state agency receives a license to
    use a software application designed to run on generally available desktop or server
    hardware or cloud platforms, a requirement that the state agency install or run
    the software on hardware or in a cloud platform dedicated solely to the state
    agency, or a provision that otherwise restricts the state agency from installing
    or running the software on hardware or in a cloud platform of the state agency''s
    choosing.

    (C) If a contract contains a term or condition described in division (B) of this
    section, the term or condition is void ab initio, and the contract containing
    that term or condition otherwise shall be enforceable as if it did not contain
    such term or condition.

    (D) A contract that contains a term or condition described in division (B) of
    this section shall be governed by and construed in accordance with Ohio law notwithstanding
    any term or condition to the contrary in the contract.

    (E) This section does not apply to a contract in effect before September 30, 2021,
    or to the renewal or extension of a contract in effect before that date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.27
- number: '9.28'
  heading: Competitive selection as public record
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Competitive selection" means the procedures for making purchases as defined
    in section 125.01 of the Revised Code.

    (2) "Public office" includes any state agency, public institution, political subdivision,
    or other organized body, office, agency, institution, or entity established by
    the laws of this state for the exercise of any function of government. "Public
    office" does not include the nonprofit corporation formed under section 187.01
    of the Revised Code.

    (3) "State agency" includes every department, bureau, board, commission, office,
    or other organized body established by the constitution and laws of this state
    for the exercise of any function of state government, including any state-supported
    institution of higher education, the general assembly, any legislative agency,
    any court or judicial agency, or any political subdivision or agency of a political
    subdivision. "State agency" does not include the nonprofit corporation formed
    under section 187.01 of the Revised Code.

    (B) Except as provided in division (C) of this section, materials relating to
    a solicitation through competitive selection shall not be considered public records
    under section 149.43 of the Revised Code until after the award of the contract
    based on the competitive selection.

    (C) If a public office rejects all bids or proposals received in response to a
    solicitation through competitive selection and, concurrently with the announcement
    of the rejection gives notice of its intent to reissue the solicitation through
    competitive selection, the materials submitted in response to the original solicitation
    and the materials submitted in response to the reissued solicitation shall not
    be considered public records under section 149.43 of the Revised Code until after
    the award of the contract based on the reissued solicitation through competitive
    selection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.28
- number: '9.29'
  heading: Multi-year asset management professional service contracts
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) The following political subdivisions may enter into, by direct negotiation
    or through the solicitation of requests for proposals or requests for qualifications,
    a multi-year, asset management professional service contract for the engineering,
    repair, sustainability, water quality management, and maintenance of a water storage
    tank and appurtenant facilities owned, controlled, or operated by that political
    subdivision, but only if the contract complies with division (B) of this section:

    (1) A board of county commissioners, board of directors of a conservancy district,
    board of directors of a sanitary district, or board of trustees of a regional
    water and sewer district;

    (2) A municipal corporation through its director of public service, mayor, city
    manager, board of trustees of public affairs, village administrator, or other
    contracting officer, commission, board, or authority as authorized by ordinance
    of the municipal corporation''s legislative authority.

    (B) A contract entered into pursuant to division (A) of this section shall include
    provisions that do all of the following:

    (1) Provide that the contracting political subdivision is not required to make
    total payments in a single year that exceed the excess of (a) the political subdivision''s
    water utility charges over (b) the operating expenses of the water system payable
    from such charges and the principal, interest, and other debt charges, including
    reserves and coverage requirements, for outstanding debt due in that year;

    (2) Require that the work performed be done under the supervision of a professional
    engineer licensed under Chapter 4733. of the Revised Code, who certifies that
    the work will be performed in compliance with all applicable codes and engineering
    standards;

    (3) Provide that if, on the date of commencement of the contract, the water tank
    or appurtenant facilities require engineering, repair, sustainability, water quality
    management, or service in order to bring the tank or facilities into compliance
    with federal, state, or local requirements, the party contracting with the political
    subdivision must provide the engineering, repair, sustainability, water quality
    management, or service. The cost of the work necessary to ensure such compliance
    shall be itemized separately and may be charged to the political subdivision in
    payments spread over a period of not less than three years from the date of commencement
    of the contract. The charges shall be paid after provision is made to pay operating
    expenses and the principal, interest, and other debt service charges, including
    reserves and coverage requirements for outstanding debt due in that year.'
