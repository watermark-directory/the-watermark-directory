- number: '5.09'
  heading: State song
  title:
    num: null
    name: General Provisions
  chapter:
    num: '5'
    name: State Insignia; Seals; Holidays
  text: 'The song, "Beautiful Ohio," is hereby adopted as the official song of the
    state, the lyric being written by Ballard MacDonald, with special lyrics by Wilbert
    B. McBride, and the music being composed by Mary Earl. The special lyrics are
    as follows:

    I sailed away;

    Wandered afar;

    Crossed the mighty restless sea;

    Looked for where I ought to be.

    Cities so grand, mountains above,

    Led to this land I love.

    Chorus

    Beautiful Ohio, where the golden grain

    Dwarf the lovely flowers in the summer rain.

    Cities rising high, silhouette the sky.

    Freedom is supreme in this majestic land;

    Mighty factories seem to hum a tune, so grand.

    Beautiful Ohio, thy wonders are in view,

    Land where my dreams all come true!'
