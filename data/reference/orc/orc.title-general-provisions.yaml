    name: Definitions; Rules of Construction
  text: A statute which is reenacted or amended is intended to be a continuation of
    the prior statute and not a new enactment, so far as it is the same as the prior
    statute.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.54
