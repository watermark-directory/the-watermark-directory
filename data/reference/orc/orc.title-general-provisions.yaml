- number: '9.82'
  heading: Risk management and insurance programs definitions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'As used in sections 9.82 to 9.83 of the Revised Code:

    (A) "State" means the state of Ohio, including, but not limited to, the general
    assembly, the supreme court, the offices of all elected state officers, and all
    departments, boards, offices, commissions, agencies, institutions, and other instrumentalities
    of the state of Ohio. "State" does not include political subdivisions.

    For purposes of the judicial liability program, "state" means the supreme court,
    the courts of appeals, the courts of common pleas and any division of courts of
    common pleas, municipal courts, and county courts.

    (B) "Political subdivision" means a county, city, village, township, park district,
    or school district.

    (C) "Personal property" means tangible personal property owned, leased, controlled,
    or possessed by a state agency and includes, but is not limited to, chattels,
    movable property, merchandise, furniture, goods, livestock, vehicles, watercraft,
    aircraft, movable machinery, movable tools, movable equipment, general operating
    supplies, and media.

    (D) "Media" means all active information processing material, including all forms
    of data, program material, and related engineering specifications employed in
    any state agency''s information processing operation.

    (E) "Property" means real and personal property as defined in divisions (C) and
    (F) of this section and any other property in which the state determines it has
    an insurable interest.

    (F) "Real property" means land or interests in land whose title is vested in the
    state or that is under the control of the state through a lease purchase agreement,
    installment purchase, mortgage, lien, or otherwise, and includes, but is not limited
    to, all buildings, structures, improvements, machinery, equipment, or fixtures
    erected on, above, or under such land.

    (G) "State agency" means every department, bureau, board, commission, office,
    or other organized body established by the constitution or laws of this state
    for the exercise of any function of state government, the general assembly, all
    legislative agencies, the supreme court, and the court of claims. "State agency"
    does not include any state-supported institutions of higher education, the public
    employees retirement system, the Ohio police and fire pension fund, the state
    teachers retirement system, the school employees retirement system, the state
    highway patrol retirement system, or the city of Cincinnati retirement system.'
