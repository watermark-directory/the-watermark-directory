- number: '9.62'
  heading: Purchase of police dog or horse
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Police dog or horse" means a dog or horse that has been trained, and may
    be used, to assist law enforcement officers in the performance of their official
    duties.

    (2) "Law enforcement agency" means an organization or unit made up of law enforcement
    officers as defined in section 2901.01 of the Revised Code.

    (B) Upon the disbanding of the canine or equine unit of a law enforcement agency,
    the agency shall give the law enforcement officer to whom a police dog or horse
    is assigned the first chance to purchase the animal, for one dollar. An officer
    who purchases an animal under this section shall assume all responsibility for
    the animal thereafter.

    (C) If a police dog or horse is injured in the line of duty, becomes disabled
    and is unfit for duty, or grows too old to be fit for duty, the law enforcement
    officer to whom the animal is assigned may purchase the animal, for one dollar.
    If an officer chooses not to purchase an animal as authorized by this division
    or division (B) of this section, the disposition of the animal shall be as otherwise
    provided by law.

    (D) A law enforcement officer who leaves an equine or canine unit of a law enforcement
    agency while the police dog or horse assigned to the officer is still fit for
    duty forfeits the right to purchase the animal under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.62
- number: '9.63'
  heading: Compliance with lawful requests under Patriot Act
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) Notwithstanding any law, ordinance, or collective bargaining contract
    to the contrary, no state or local employee shall unreasonably fail to comply
    with any lawful request for assistance made by any federal authorities carrying
    out the provisions of the USA Patriot Act, any federal immigration or terrorism
    investigation, or any executive order of the president of the United States pertaining
    to homeland security, to the extent that the request is consistent with the doctrine
    of federalism.

    (B) No municipal corporation shall enact an ordinance, policy, directive, rule,
    or resolution that would materially hinder or prevent local employees from complying
    with the USA Patriot Act or any executive order of the president of the United
    States pertaining to homeland security or from cooperating with state or federal
    immigration services and terrorism investigations.

    (C)(1) Any municipal corporation that enacts any ordinance, policy, directive,
    rule, or resolution that division (B) of this section prohibits is ineligible
    to receive any homeland security funding available from the state.

    (2) Whenever the director of public safety determines that a municipal corporation
    has enacted any ordinance, policy, directive, rule, or resolution that division
    (B) of this section prohibits, the director shall certify that the municipal corporation
    is ineligible to receive any homeland security funding from the state and shall
    notify the general assembly of that ineligibility. That municipal corporation
    shall remain ineligible to receive any homeland security funding from the state
    until the director certifies that the ordinance, policy, directive, rule, or resolution
    has been repealed.

    (D)(1) If a state or local employee states disagreement with, or a critical opinion
    of, the USA Patriot Act, any federal immigration or terrorism policy, or any executive
    order of the president of the United States pertaining to homeland security, the
    statement of disagreement with or critical opinion of the act or order is not
    sufficient to qualify for purposes of this section as unreasonable noncompliance
    with a request for assistance of the type division (A) of this section describes.

    (2) Any municipal corporation''s ordinance, policy, directive, rule, or resolution
    that states disagreement with, or a critical opinion of, any state or federal
    immigration or terrorism policy, the USA Patriot Act, or any executive order of
    the president of the United States pertaining to homeland security is not sufficient
    to qualify as a "material hindrance or prevention" of local employees from cooperating
    with federal immigration services and terrorism investigations or from complying
    with the USA Patriot Act or any executive order of the president of the United
    States pertaining to homeland security for purposes of divisions (B), (C), and
    (D) of this section.

    (E) As used in this section, "USA Patriot Act" means the "Uniting and Strengthening
    America by Providing Appropriate Tools Required to Intercept and Obstruct Terrorism
    (USA Patriot Act) Act of 2001," Pub. L. No. 107-056, 115 Stat. 272, as amended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.63
- number: '9.64'
  heading: Political subdivision cybersecurity
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section:

    (1) "Cybersecurity incident" means any of the following:

    (a) A substantial loss of confidentiality, integrity, or availability of a covered
    entity''s information system or network;

    (b) A serious impact on the safety and resiliency of a covered entity''s operational
    systems and processes;

    (c) A disruption of a covered entity''s ability to engage in business or industrial
    operations, or deliver goods or services;

    (d) Unauthorized access to an entity''s information system or network, or nonpublic
    information contained therein, that is facilitated through or is caused by:

    (i) A compromise of a cloud service provider, managed service provider, or other
    third-party data hosting provider; or

    (ii) A supply chain compromise.

    "Cybersecurity incident" does not include mere threats of disruption as extortion;
    events perpetrated in good faith in response to a request by the system owner
    or operator; or lawfully authorized activity of a United States, state, local,
    tribal, or territorial government entity.

    (2) "Political subdivision" means a county, township, municipal corporation, or
    other body corporate and politic responsible for governmental activities in a
    geographic area smaller than that of the state.

    (3) "Ransomware incident" means a malicious cybersecurity incident in which a
    person or entity introduces software that gains unauthorized access to or encrypts,
    modifies, or otherwise renders unavailable a political subdivision''s information
    technology systems or data and thereafter the person or entity demands a ransom
    to prevent the publication of the data, restore access to the data, or otherwise
    remediate the impact of the software.

    (B) A political subdivision experiencing a ransomware incident shall not pay or
    otherwise comply with a ransom demand unless the political subdivision''s legislative
    authority formally approves the payment or compliance with the ransom demand in
    a resolution or ordinance that specifically states why the payment or compliance
    with the ransom demand is in the best interest of the political subdivision.

    (C) The legislative authority of a political subdivision shall adopt a cybersecurity
    program that safeguards the political subdivision''s data, information technology,
    and information technology resources to ensure availability, confidentiality,
    and integrity. The program shall be consistent with generally accepted best practices
    for cybersecurity, such as the national institute of standards and technology
    cybersecurity framework, and the center for internet security cybersecurity best
    practices, and may include, but are not limited to, the following:

    (1) Identify and address the critical functions and cybersecurity risks of the
    political subdivision.

    (2) Identify the potential impacts of a cybersecurity breach.

    (3) Specify mechanisms to detect potential threats and cybersecurity events.

    (4) Specify procedures for the political subdivision to establish communication
    channels, analyze incidents, and take actions to contain cybersecurity incidents.

    (5) Establish procedures for the repair of infrastructure impacted by a cybersecurity
    incident, and the maintenance of security after the incident.

    (6) Establish cybersecurity training requirements for all employees of the political
    subdivision; the frequency, duration, and detail of which shall correspond to
    the duties of each employee. Annual cybersecurity training provided by the state,
    and training provided for local governments by the Ohio persistent cyber initiative
    program of the Ohio cyber range institute, satisfy the requirements of this division.

    (D) The legislative authority of a political subdivision, following each cybersecurity
    incident or ransomware incident, shall notify both of the following:

    (1) The executive director of the division of homeland security within the department
    of public safety, in a manner prescribed by the executive director, as soon as
    possible but not later than seven days after the political subdivision discovers
    the incident;

    (2) The auditor of state, in a manner prescribed by the auditor of state, as soon
    as possible but not later than thirty days after the political subdivision discovers
    the incident.

    (E) Any records, documents, or reports related to the cybersecurity program and
    framework in division (C) of this section, and the reports of a cybersecurity
    incident or ransomware incident under division (D) of this section, are not public
    records under section 149.43 of the Revised Code.

    (F) A record identifying cybersecurity-related software, hardware, goods, and
    services, that are being considered for procurement, have been procured, or are
    being used by a political subdivision, including the vendor name, product name,
    project name, or project description, is a security record under section 149.433
    of the Revised Code.'
