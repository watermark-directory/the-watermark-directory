- number: '9.333'
  heading: Financial assurance to be provided by construction manager
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) No public authority shall enter into a construction management contract
    with a construction manager unless the construction manager provides a letter
    of credit pursuant to Chapter 1305. of the Revised Code, a surety bond pursuant
    to sections 153.54 and 153.57 of the Revised Code, a certified check or cashier''s
    check in an amount equal to the value of the construction management contract
    for the project, or provides other reasonable financial assurance of a nature
    and in an amount satisfactory to the public authority. The public authority may
    waive this requirement for good cause.

    (B) Before construction begins pursuant to a construction management contract
    with a construction manager at risk, the construction manager at risk shall provide
    a surety bond to the public authority in accordance with rules adopted by the
    executive director of the Ohio facilities construction commission under Chapter
    119. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.333
- number: '9.334'
  heading: Evaluation of most qualified proposals; pricing proposals; contract negotiations
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A)(1) Every public authority planning to contract for construction management
    services with a construction manager at risk shall evaluate the proposals submitted
    and select not fewer than three construction managers at risk the public authority
    considers to be the most qualified to provide the required construction management
    services, except that the public authority shall select and rank fewer than three
    when the public authority determines in writing that fewer than three qualified
    construction managers at risk are available.

    (2) For projects valued at less than four million dollars, the public authority
    may require the construction manager at risk to submit a proposal described in
    division (A)(1) of this section along with a pricing proposal described in division
    (C) of this section. The public authority shall provide each construction manager
    at risk who desires to submit a proposal under this division a pre-proposal meeting
    to explore the proposals further, in which the public authority shall provide
    the construction manager at risk with a description of the project, including
    the scope and nature of the proposed services and potential technical approaches.
    The public authority shall proceed with selection and ranking as described in
    division (A)(1) of this section, based only on the proposal submitted under that
    division. Once the construction managers at risk have been selected, the public
    authority shall proceed to evaluate the pricing proposals of each selected construction
    manager at risk as described in division (D) of this section, continuing the selection
    process from there.

    (B) The public authority shall provide each construction manager at risk selected
    under division (A) of this section with a description of the project, including
    a statement of available design detail, a description of how the guaranteed maximum
    price for the project shall be determined, including the estimated level of design
    detail upon which the guaranteed maximum price shall be based, the form of the
    construction management contract, and a request for a pricing proposal.

    (C) The pricing proposal of each construction manager at risk shall include at
    least the following regarding the construction manager at risk:

    (1) A list of key personnel for the project;

    (2) A statement of the general conditions and contingency requirements;

    (3) A fee proposal divided into a preconstruction fee, a construction fee, and
    the portion of the construction fee to be at risk in a guaranteed maximum price.

    (D) The public authority shall evaluate the submitted pricing proposals and may
    hold discussions with individual construction managers at risk to explore their
    proposals further, including the scope and nature of the proposed services and
    potential technical approaches.

    (E) After evaluating the pricing proposals, the public authority shall rank the
    selected construction managers at risk based on its evaluation of the value of
    each pricing proposal, with such evaluation considering the proposed cost and
    qualifications.

    (F) The public authority shall enter into negotiations for a construction management
    contract with the construction manager at risk whose pricing proposal the public
    authority determines to be the best value under division (E) of this section.
    Contract negotiations shall be directed toward:

    (1) Ensuring that the construction manager at risk and the public authority mutually
    understand the essential requirements involved in providing the required construction
    management services, including the provisions for the use of contingency funds
    and the possible distribution of savings in the final costs of the project;

    (2) Ensuring that the construction manager at risk will be able to provide the
    necessary personnel, equipment, and facilities to perform the construction management
    services within the time required by the construction management contract;

    (3) Agreeing upon a procedure and schedule for determining a guaranteed maximum
    price using an open book pricing method that shall represent the total maximum
    amount to be paid by the public authority to the construction manager at risk
    for the project and that shall include the costs of all the work, the cost of
    its general conditions, the contingency, and the fee payable to the construction
    manager at risk.

    (G)(1) If the public authority fails to negotiate a construction management contract
    with the construction manager at risk whose pricing proposal the public authority
    determines to be the best value under division (E) of this section, the public
    authority shall inform the construction manager at risk, in writing, of the termination
    of negotiations.

    (2) Upon terminating negotiations, the public authority may enter into negotiations
    as provided in this section with the construction manager at risk that the public
    authority ranked next highest under division (E) of this section. If negotiations
    fail, the public authority may enter into negotiations as provided in this section
    with the construction manager at risk the public authority ranked next highest
    under division (E) of this section.

    (3) If a public authority fails to negotiate a construction management contract
    with a construction manager at risk whose pricing proposal the public authority
    determines to be the best value under division (E) of this section, the public
    authority may select additional construction managers at risk to provide pricing
    proposals to the public authority pursuant to this section or may select an alternative
    delivery method for the project.

    (H) If the public authority and construction manager at risk fail to agree on
    a guaranteed maximum price, nothing in this section shall prohibit the public
    authority from allowing the construction manager at risk to provide the management
    services that a construction manager is authorized to provide.

    (I) Nothing in this section affects a public authority''s right to accept or reject
    any or all proposals in whole or in part.'
