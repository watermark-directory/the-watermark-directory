- number: '9.20'
  heading: Receipt of gift, devise, or bequest moneys, lands, or other properties
    by public authority
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'The state; a county, a township, or a cemetery association or the commissioners
    or trustees of a county, township, or cemetery association; a municipal corporation
    or the legislative authority, a board, or other officers of a municipal corporation;
    and a benevolent, educational, or correctional institution, wholly or in part
    under the control of the state, or the board of directors, trustees, or other
    officers of the institution may receive by gift, devise, or bequest moneys, lands,
    or other properties, for their benefit or the benefit of any of those under their
    charge and may hold and apply the moneys, lands, or properties according to the
    terms of the gift, devise, or bequest. The gifts or devises of real estate may
    be in fee simple or of any lesser estate and may be subject to any reasonable
    reservation. This section does not affect the statutory provisions as to devises
    or bequests for such purposes.

    Any instrument by which the state or an agency of the state acquires real property
    pursuant to this section shall identify the agency of the state that has the use
    and benefit of the real property as specified in section 5301.012 of the Revised
    Code.'
