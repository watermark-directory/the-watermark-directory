- number: '9.38'
  heading: Deposit of public moneys
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'As used in this section and section 9.39 of the Revised Code:

    (1) "Color of office," "public office," and "public official" have the same meanings
    as in section 117.01 of the Revised Code.

    (2) "Legislative authority" means a board of county commissioners a board of township
    trustees, the legislative authority of a municipal corporation, or the board of
    education of a school district.

    A person who is a state officer, employee, or agent shall pay to the treasurer
    of state all public moneys received by that person as required by rule of the
    treasurer of state adopted pursuant to section 113.09 of the Revised Code. A person
    who is a public official other than a state officer, employee, or agent shall
    deposit all public moneys received by that person with the treasurer of the public
    office or properly designated depository on the business day next following the
    day of receipt, if the total amount of such moneys received exceeds one thousand
    dollars. If the total amount of the public moneys so received does not exceed
    one thousand dollars, the person shall deposit the moneys on the business day
    next following the day of receipt, unless the public office of which that person
    is a public official adopts a policy permitting a different time period, not to
    exceed three business days next following the day of receipt, for making such
    deposits, and the person is able to safeguard the moneys until such time as the
    moneys are deposited. The policy shall include provisions and procedures to safeguard
    the public moneys until they are deposited. If the public office of which the
    person is a public official is governed by a legislative authority, only the legislative
    authority may adopt such a policy; in the case of a board of county commissioners,
    the board may adopt such a policy with respect to public offices under the board''s
    direct supervision and the offices of the prosecuting attorney, sheriff, coroner,
    county engineer, county recorder, county auditor, county treasurer, or clerk of
    the court of common pleas. If a person who is a public official receives public
    moneys for a public office of which that person is not a public official, that
    person shall, during the first business day of the next week, pay to the proper
    public official of the proper public office the moneys so received during the
    current week.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.38
- number: '9.39'
  heading: Liability for public money received or collected - unclaimed money
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: All public officials are liable for all public money received or collected
    by them or by their subordinates under color of office. All money received or
    collected by a public official under color of office and not otherwise paid out
    according to law shall be paid into the treasury of the public office with which
    the public official is connected to the credit of a trust fund and shall be retained
    there until claimed by its lawful owner. If not claimed within a period of five
    years, the money shall revert to the general fund of the public office, except
    for the unclaimed money in the reparations fund created under section 2743.191
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.39
- number: '9.40'
  heading: Payroll deduction for United States savings bonds
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'Any public employee of the state, or any political subdivision thereof, who
    desires to purchase United States savings bonds by the payroll deduction plan
    shall be granted such payroll deduction upon request to the head of the state
    or political subdivision department by whom he is employed.

    As used in this section, "public employee" means any person holding an office,
    not elective, under the state, any county, municipal corporation, park district,
    conservancy district, sanitary district, health district, township, or public
    library, or employed and paid in whole or in part by the state or any of such
    named authorities in any capacity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.40
- number: '9.41'
  heading: Payroll accounts
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'The director of budget and management or any fiscal officer of any county,
    city, city health district, general health district, or city school district thereof,
    or civil service township, shall not draw, sign, issue, or authorize the drawing,
    signing, or issuing of any warrant on the treasurer of state or other disbursing
    officer of the state, or the treasurer or other disbursing officer of any county,
    city, or city school district thereof, or civil service township, to pay any salary
    or other compensation to any officer, clerk, employee, or other person in the
    classified service unless an estimate, payroll, or account for such salary or
    compensation containing the name of each person to be paid, bears the certificate
    of the director of administrative services, or in the case of the service of the
    city or civil service township, the certificate of the civil service commission
    of the city or civil service township, or in the case of the service of the county,
    the certificate of the appointing authority, that the persons named in the estimate,
    payroll, or account have been appointed, promoted, reduced, suspended, or laid
    off, or are being employed in pursuance of Chapter 124. of the Revised Code and
    the rules adopted thereunder.

    Where estimates, payrolls, or accounts are prepared by electronic data processing
    equipment, the director of administrative services or the municipal or civil service
    township civil service commission may develop methods for controlling the input
    or verifying the output of such equipment to ensure compliance with Chapter 124.
    of the Revised Code and the rules adopted thereunder. Any estimates, payrolls,
    or accounts prepared by these methods shall be subject to special audit at any
    time.

    Any sum paid contrary to this section may be recovered from any officer making
    such payment in contravention of law and of the rules made in pursuance of law,
    or from any officer signing, countersigning, or authorizing the signing or countersigning
    of any warrant for the payment of the same, or from the sureties on the officer''s
    official bond, in an action in the courts of the state, maintained by a citizen
    resident therein. All moneys recovered in any action brought under this section
    shall, when collected, be paid into the state treasury or the treasury of the
    appropriate civil division of the state, except that the plaintiff in any action
    shall be entitled to recover the plaintiff''s own taxable costs of such action.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.41
- number: '9.42'
  heading: Municipal income tax deductions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: Notwithstanding section 1321.32 of the Revised Code, the state and any of
    its political subdivisions or instrumentalities shall deduct from the wages or
    salaries of public employees, as defined in section 9.40 of the Revised Code,
    and employees of school districts, the amount of municipal income tax levied upon
    the income of the employee. The director of administrative services shall establish
    by rule procedures for the deduction of municipal income taxes from the wages
    or salaries of employees of the state or its instrumentalities.
  history: null
