- number: '1.62'
  heading: References to officers, authorities and resolutions in county that has
    adopted a charter
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'As used in the Revised Code, unless the context of a section does not permit
    the following or unless expressly provided otherwise in a section:

    (A) References to particular county officers, boards, commissions, and authorities
    mean, in the case of a county that has adopted a charter under Article X, Ohio
    Constitution, the officer, board, commission, or authority of that county designated
    by or pursuant to the charter to exercise the same powers or perform the same
    acts, duties, or functions that are to be exercised or performed under the applicable
    section of the Revised Code by officers, boards, commissions, or authorities of
    counties that have not adopted a charter. If any section of the Revised Code requires
    county representation on a board, commission, or authority by more than one county
    officer, and the charter vests the powers, duties, or functions of each county
    officer representing the county on the board, commission, or authority in fewer
    officers or in only a single county officer, the county officers or officer shall
    succeed to the representation of only one of the county officers on the board,
    commission, or authority. If any vacancy in the representation of the county on
    the board, commission, or authority remains, the taxing authority of the county
    shall adopt a resolution to fill the vacancy.

    (B) References to resolutions mean, in the case of a county that has adopted a
    charter under Article X, Ohio Constitution, the appropriate form of legislation
    permitted by or pursuant to the charter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.62
- number: '1.63'
  heading: Pre-emption by state of certain business practices
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) The state solely shall regulate the business of originating, granting,
    servicing, and collecting loans and other forms of credit in the state and the
    manner in which any such business is conducted, and this regulation shall be in
    lieu of all other regulation of such activities by any municipal corporation or
    other political subdivision.

    (B) Any ordinance, resolution, regulation, or other action by a municipal corporation
    or other political subdivision to regulate, directly or indirectly, the origination,
    granting, servicing, or collection of loans or other forms of credit constitutes
    a conflict with the Revised Code, including, but not limited to, Titles XI, XIII,
    XVII, and XLVII, and with the uniform operation throughout the state of lending
    and other credit provisions, and is preempted.

    (C) Any ordinance, resolution, regulation, or other action by a municipal corporation
    or other political subdivision constitutes a conflict with the Revised Code, including,
    but not limited to, Titles XI, XIII, XVII, and XLVII, and is pre-empted, if the
    ordinance, resolution, regulation, or other action does either of the following:

    (1) Disqualifies a person, or its subsidiaries or affiliates, from doing business
    with such municipal corporation or other political subdivision based upon the
    acts or practices of such person, or its subsidiaries or affiliates, as an originator,
    grantor, servicer, or collector of loans or other forms of credit;

    (2) Imposes reporting requirements or other obligations upon a person, or its
    subsidiaries or affiliates, based upon such person''s, or its subsidiaries'' or
    affiliates'', acts or practices as an originator, grantor, servicer, or collector
    of loans or other forms of credit.

    (D) If any provision of this section, or any application of any provision of this
    section, is for any reason held to be illegal or invalid, the illegality or invalidity
    shall not affect any legal and valid provision or application of this section,
    and the provisions and applications of this section shall be severable.

    (E) Nothing in this section shall be construed to invalidate or prohibit any ordinance,
    resolution, regulation, or other action by a municipal corporation or other political
    subdivision to establish and administer voluntary neighborhood reinvestment programs
    in furtherance of the goals and purposes of the "Community Reinvestment Act of
    1977," 91 Stat. 1147, 12 U.S.C.A. 2901, as amended.

    (F) Nothing in this section shall be construed to invalidate any ordinance, resolution,
    regulation, or other action by a municipal corporation or other political subdivision
    that is required to meet the criteria for adequacy of law established by the United
    States department of housing and urban development in order to obtain certification
    as a fair housing assistance program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.63
- number: '1.64'
  heading: Health care workers definitions
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: 'As used in the Revised Code:

    (A) "Certified nurse-midwife" means an advanced practice registered nurse who
    holds a current, valid license issued under Chapter 4723. of the Revised Code
    and is designated as a certified nurse-midwife in accordance with section 4723.42
    of the Revised Code and rules adopted by the board of nursing.

    (B) "Certified nurse practitioner" means an advanced practice registered nurse
    who holds a current, valid license issued under Chapter 4723. of the Revised Code
    and is designated as a certified nurse practitioner in accordance with section
    4723.42 of the Revised Code and rules adopted by the board of nursing.

    (C) "Clinical nurse specialist" means an advanced practice registered nurse who
    holds a current, valid license issued under Chapter 4723. of the Revised Code
    and is designated as a clinical nurse specialist in accordance with section 4723.42
    of the Revised Code and rules adopted by the board of nursing.

    (D) "Physician assistant" means an individual who is licensed under Chapter 4730.
    of the Revised Code to provide services as a physician assistant to patients under
    the supervision, control, and direction of one or more physicians.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.64
- number: '1.65'
  heading: Insurance rating agencies
  title:
    num: null
    name: General Provisions
  chapter:
    num: '1'
    name: Definitions; Rules of Construction
  text: '(A) As used in the Revised Code, "insurance rating agency" means A.M. Best
    Rating Services, Inc., Demotech, Inc., or a rating agency certified or approved
    by a national entity that engages in an approval process that includes all of
    the following:

    (1) A requirement for the rating agency to register and provide an annual updated
    filing;

    (2) Record retention requirements;

    (3) Financial reporting requirements;

    (4) Policies for the prevention of misuse of material, nonpublic information;

    (5) Management of conflicts of interest, including prohibited conflicts;

    (6) Prohibited acts and practices;

    (7) Disclosure requirements;

    (8) Required policies, practices, and internal controls;

    (9) Standards of training, experience, and competence for credit analysts.

    (B) Any reference in the Revised Code to an entity named in division (A) of this
    section shall be construed as a reference to any insurance rating agency as defined
    in division (A) of this section. Any reference in the Revised Code to a specific
    entity not named in division (A) of this section but otherwise meeting the definition
    of "insurance rating agency" in division (A) of this section shall be construed
    as a reference to an insurance rating agency as defined by division (A) of this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-1.65
- number: '3.01'
  heading: Continuation in office until successor elected or appointed and qualified
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: A person holding an office of public trust shall continue therein until his
    successor is elected or appointed and qualified, unless otherwise provided in
    the constitution or laws of this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.01
- number: '3.02'
  heading: Elective office filled by appointment - term of appointee
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: '(A) When an elective office becomes vacant and is filled by appointment,
    such appointee shall hold the office until the appointee''s successor is elected
    and qualified; and such successor shall be elected for the unexpired term, at
    the first general election for the office which is vacant that occurs more than
    forty days after the vacancy has occurred; provided that when the unexpired term
    ends within one year immediately following the date of such general election,
    an election to fill such unexpired term shall not be held and the appointment
    shall be for such unexpired term.

    (B) When an elective office becomes vacant and is filled by appointment, the appointing
    authority shall, immediately but no later than seven days after making the appointment,
    certify it to the board of elections and to the secretary of state. The board
    of elections or, in the case of an appointment to a statewide office, the secretary
    of state shall issue a certificate of appointment to the appointee. Certificates
    of appointment shall be in such form as the secretary of state shall prescribe.

    (C) When an elected candidate fails to qualify for the office to which the candidate
    has been elected, the office shall be filled as in the case of a vacancy. Until
    so filled, the incumbent officer shall continue to hold office. This section does
    not postpone the time for such election beyond that at which it would have been
    held had no such vacancy occurred, or affect the official term, or the time for
    the commencement thereof, of any person elected to such office before the occurrence
    of such vacancy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.02
- number: '3.03'
  heading: Vacancy in office filled by appointment of governor
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: When a vacancy in an office filled by appointment of the governor, with the
    advice and consent of the senate, occurs by expiration of term or otherwise during
    a regular session of the senate, the governor shall appoint a person to fill such
    vacancy and forthwith report such appointment to the senate. If such vacancy occurs
    when the senate is not in session, and no appointment has been made and confirmed
    in anticipation of such vacancy, the governor shall fill the vacancy and report
    the appointment to the next regular session of the senate, and, if the senate
    advises and consents thereto, such appointee shall hold the office for the full
    term, otherwise a new appointment shall be made. A person appointed by the governor
    when the senate is not in session or on or after the convening of the first regular
    session and more than ten days before the adjournment sine die of the second regular
    session to fill an office for which a fixed term expires or a vacancy otherwise
    occurs is considered qualified to fill such office until the senate before the
    adjournment sine die of its second regular session acts or fails to act upon such
    appointment pursuant to section 21 of Article III, Ohio Constitution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.03
- number: '3.04'
  heading: Removal or suspension of appointee by governor
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: When not otherwise provided by law, an officer who holds his office by appointment
    of the governor with the advice and consent of the senate may be removed from
    office by the governor with the advice and consent of the senate, if it is found
    that such officer is inefficient or derelict in the discharge of his duties, if
    the ethics commission created by section 102.05 of the Revised Code has found,
    based upon a preponderance of the evidence, that the facts alleged in a complaint
    under section 102.06 of the Revised Code alleging a violation by the officer constitutes
    a violation of Chapter 102., section 2921.42, or section 2921.43 of the Revised
    Code, if the officer fails to file or falsely files a statement required by section
    102.02 of the Revised Code, or if it is found that he has used his office corruptly.
    If, in the recess of the senate, the governor is satisfied that such officer is
    inefficient, derelict, committed such violation of Chapter 102., section 2921.42,
    or section 2921.43 of the Revised Code, or corrupt, he may suspend such officer
    from his office and report the facts to the senate at its next session. If in
    such report the senate advises and consents to the removal, such officer shall
    be removed, but otherwise he shall be restored to his office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.04
- number: '3.05'
  heading: Suspension by governor - filling vacancy
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: In case of the suspension of an officer as provided for in section 3.04 of
    the Revised Code, the governor shall designate a person to perform the duties
    of the office during the period of such suspension. The person so designated shall
    give bond and take the oath of office, and during the time he performs the duties
    of the office he shall receive the full emoluments thereof, no part of which shall,
    for such time, go to such suspended officer. If the suspended officer is removed
    or his term expires before the action of the senate, a new appointment shall be
    made.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.05
- number: '3.06'
  heading: Deputies, clerks - blanket bonds
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: '(A) A deputy, when duly qualified, may perform any duties of his principal.
    A deputy or clerk, appointed in pursuance of law, holds the appointment only during
    the pleasure of the officer appointing him. The principal may take from his deputy
    or clerk a bond, with sureties, conditioned as set forth in this section. The
    principal is answerable for the neglect or misconduct in office of his deputy
    or clerk .

    (B) Notwithstanding the provisions of any other law requiring an official bond
    to be conditioned substantially to the effect that an officer, clerk, or employee
    will faithfully perform his duties, in lieu thereof, with the consent and approval
    of the officer or governing body authorized to require the bond, any department
    or instrumentality of the state or any county, township, municipal corporation,
    or other subdivision or board of education or department or instrumentality thereof,
    may procure a blanket bond from any duly authorized corporate surety covering
    officers, clerks, and employees other than:

    (1) Treasurers or tax collectors by whatever title known;

    (2) Any officer, clerk, or employee required by law to execute or file an individual
    official bond to qualify for office or employment.

    (C) Such blanket bond shall indemnify against losses through one of the following
    conditions:

    (1) The failure of the officers, clerks, and employees covered thereunder faithfully
    to perform their duties or to account properly for all moneys or property received
    by virtue of their positions or employment;

    (2) Fraudulent or dishonest acts committed by the officers, clerks, and employees
    covered thereunder.

    Any such blanket bond shall be approved as to its form and sufficiency of the
    surety by the officer or governing body authorized to require it. The premium
    of any such blanket bond shall be paid as provided in section 3929.17 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-3.06
- number: '3.061'
  heading: Dishonesty and faithful performance of duty policy in lieu of bond
  title:
    num: null
    name: General Provisions
  chapter:
    num: '3'
    name: Officer; Oaths; Bonds
  text: '(A) As used in this section:

    (1) "Political subdivision" means a county, township, municipal corporation, school
    district, community school, park district created under Chapter 1545. of the Revised
    Code, library or library district specified in section 3375.32 of the Revised
    Code, juvenile facility district created under section 2151.65 of the Revised
    Code, or detention facility district created under section 2152.41 of the Revised
    Code.

    (2) "Employee dishonesty and faithful performance of duty policy" means a policy
    of insurance, or a coverage document issued by a joint self-insurance pool authorized
    under section 2744.081 of the Revised Code, to protect against losses that would
    otherwise be protected against under a surety bond and to protect against other
    losses as determined by the political subdivision.

    (B) A political subdivision may adopt a policy, by ordinance or resolution, to
    allow for the use of an employee dishonesty and faithful performance of duty policy,
    rather than a surety bond that would otherwise be required by law to be given
    by any of the following:

    (1) The political subdivision;

    (2) An officer, employee, or appointee of the political subdivision;

    (3) Any other entity or individual, if the entity or individual is required by
    law to give a surety bond to the political subdivision.

    The employee dishonesty and faithful performance of duty policy also may cover
    any other entity or individual as determined by the political subdivision.

    (C)(1) Any officer, employee, or appointee otherwise required by law to give an
    individual surety bond to qualify for the office or employment before entering
    upon the discharge of duties imposed by the office or employment shall, before
    entering upon the discharge of duties imposed by the office or employment, either
    give the individual surety bond or be covered under an employee dishonesty and
    faithful performance of duty policy that is in effect and becomes applicable to
    the officer, employee, or appointee upon the beginning of the individual''s term
    of office or employment.

    (2) Any officer, employee, or appointee otherwise required by law to maintain
    an individual surety bond to continue being entitled to discharge the duties of
    the office or employment may, during the individual''s term or employment, become
    covered under an employee dishonesty and faithful performance of duty policy.

    (D) For a political subdivision that has adopted a policy as authorized under
    this section, all of the following apply:

    (1) An officer, employee, or appointee otherwise required by law to give an individual
    surety bond shall not commence or continue the discharge of duties until coverage
    is documented as required by the legislative authority. A lack of coverage on
    the date on which the discharge of duties are commenced or continued by the individual
    shall render the office vacant and it shall be filled as required by law.

    (2) Notwithstanding any section of the Revised Code requiring an officer, employee,
    or appointee of a political subdivision to give bond before being entitled to
    enter upon the duties of the office or employment, an officer, employee, or appointee
    shall be considered qualified to hold the office or employment, without giving
    bond, on the date the oath of office is taken, certified, and filed as required
    by law.

    (3) Notwithstanding any section of the Revised Code requiring an officer, employee,
    or appointee of a political subdivision to maintain bond to continue being entitled
    to discharge the duties of the office or employment, an officer, employee, or
    appointee who becomes covered under an employee dishonesty and faithful performance
    of duty policy during the individual''s term or employment and who remains covered
    under the employee dishonesty and faithful performance of duty policy for the
    duration of the individual''s term or employment shall be considered qualified
    to hold the office or employment, without maintaining bond for the duration of
    the individual''s term or employment as required by law.

    (4) Notwithstanding section 3.30 or any other section of the Revised Code that
    provides an office or employment is vacated upon the failure to file bond, the
    officer, employee, or appointee shall be entitled to enter upon the duties of
    the office or employment when the policy is in effect as provided in division
    (B) of this section and the oath is filed as provided in division (D)(2) of this
    section.

    (5) All officers, employees, or appointees who would otherwise be required to
    file a bond before commencing the discharge of duties shall be covered by and
    are subject to the employee dishonesty and faithful performance of duty policy
    instead of a surety bond requirement.

    (6) The coverage amount for an officer, employee, or appointee under an employee
    dishonesty and faithful performance of duty policy shall be equal to or greater
    than the maximum amount of the bond otherwise required by law. If no amount, or
    only a minimum amount, of coverage is specified in law for the particular officer,
    employee, or appointee, the amount of coverage shall be an amount agreed upon
    by the legislative authority or the authority otherwise designated by law to determine
    the amount of the bond.

    (E) A political subdivision that does not adopt a policy under this section shall
    continue to use the surety bonds as otherwise provided in the Revised Code.

    (F) Nothing in this section relieves an officer, employee, or appointee of other
    applicable requirements to hold the office or employment.'
  history: null
