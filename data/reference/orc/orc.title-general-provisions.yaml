- number: '9.81'
  heading: Payroll deduction plans
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: 'After an authorization adopted under section 9.80 of the Revised Code, any
    public officer or employee of any department or division of the state, any political
    subdivision or school district thereof, or of any institution supported in whole
    or in part by the state, a county, or municipal corporation, who desires to make
    a contribution by the payroll deduction plan to one or more of the specified charitable
    agencies which are corporations not for profit, community chests, united funds,
    or other similar united community fund organizations, may be permitted to have
    such contribution payments deducted from the salary or wages due such public officer
    or employee by filing a written request and authorization signed by such public
    officer or employee and specifying the amount of the deduction in each payroll
    period with the fiscal officer of the state, political subdivision, or school
    district, or institution by which such public officer or employee is employed.
    Such authorization may be withdrawn in writing by such public officer or employee
    at any time. No funds may be withheld from the salary or wages of any such public
    officer or employee for the purposes permitted by sections 9.80 and 9.81 of the
    Revised Code unless the withholding is specifically, freely, and voluntarily authorized
    by that public officer or employee in writing.

    Upon receipt of evidence of such request by the appropriate fiscal officer, or
    upon receipt of a written deduction authorization under division (B)(2) or (C)
    of section 4117.09 of the Revised Code, such fiscal officer shall make such deduction
    and shall, at periodic intervals to the extent of the amount collected, pay the
    designated charitable agencies which are corporations not for profit, community
    chests, united funds, or other similar united community fund organizations, or
    the exclusive representative designated under section 4117.05 of the Revised Code.'
