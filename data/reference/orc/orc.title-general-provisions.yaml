  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.43
- number: '9.44'
  heading: Prior public service counted in computing vacation leave
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) Except as otherwise provided in this section, a person employed, other
    than as an elective officer, by the state or any political subdivision of the
    state, earning vacation credits currently, is entitled to have the employee''s
    prior service with any of these employers counted as service with the state or
    any political subdivision of the state, for the purpose of computing the amount
    of the employee''s vacation leave. The anniversary date of employment for the
    purpose of computing the amount of the employee''s vacation leave, unless deferred
    pursuant to the appropriate law, ordinance, or regulation, is the anniversary
    date of such prior service.

    (B) To determine prior service for the purpose of computing the amount of vacation
    leave for a person initially employed on or after July 5, 1987, by:

    (1) A municipal corporation, the person shall have only prior service within that
    municipal corporation counted;

    (2) A township, the person shall have only prior service with a township counted.

    (C) An employee who has retired in accordance with the provisions of any retirement
    plan offered by the state and who is employed by the state or any political subdivision
    of the state on or after June 24, 1987, shall not have prior service with the
    state, any political subdivision of the state, or a regional council of government
    established in accordance with Chapter 167. of the Revised Code counted for the
    purpose of computing vacation leave.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-9.44
- number: '9.441'
  heading: Continuing rights or benefits for prior service
  title:
    num: null
    name: General Provisions
  chapter:
    num: '9'
    name: Miscellaneous
  text: '(A) As used in this section, "affected employee" means a municipal employee
    who becomes a county employee, or a county employee who becomes a municipal employee,
    as the result of any of the following:

    (1) The merger of a municipal and a county office;

    (2) The merger of municipal and county functions or duties;

    (3) The transfer of functions or duties between a municipal corporation and county.

    (B) The new employer of any affected employee shall treat the employee''s prior
    service with such former employer as if it had been served with the new employer
    for the purpose of compensating the employee or granting him any other employee
    right or benefit which is based upon length of service.

    (C) The new employer shall assign an affected employee to a pay rate that is not
    less than ninety per cent of the pay rate earned by the employee during the year
    concluding with the end of the pay period immediately preceding the effective
    date of the merger or transfer.'
