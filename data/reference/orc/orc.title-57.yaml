- number: '5705.14'
  heading: Transfer of funds
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'No transfer shall be made from one fund of a subdivision to any other fund,
    by order of the court or otherwise, except as follows:

    (A) The unexpended balance in a bond fund that is no longer needed for the purpose
    for which such fund was created shall be transferred to the sinking fund or bond
    retirement fund from which such bonds are payable.

    (B) The unexpended balance in any specific permanent improvement fund, other than
    a bond fund, after the payment of all obligations incurred in the acquisition
    of such improvement, shall be transferred to the sinking fund or bond retirement
    fund of the subdivision; provided that if such money is not required to meet the
    obligations payable from such funds, it may be transferred to a special fund for
    the acquisition of permanent improvements, or, with the approval of the court
    of common pleas of the county in which such subdivision is located, to the general
    fund of the subdivision.

    (C)(1) Except as provided in division (C)(2) of this section, the unexpended balance
    in the sinking fund or bond retirement fund of a subdivision, after all indebtedness,
    interest, and other obligations for the payment of which such fund exists have
    been paid and retired, shall be transferred, in the case of the sinking fund,
    to the bond retirement fund, and in the case of the bond retirement fund, to the
    sinking fund; provided that if such transfer is impossible by reason of the nonexistence
    of the fund to receive the transfer, such unexpended balance, with the approval
    of the court of common pleas of the county in which such division is located,
    may be transferred to any other fund of the subdivision.

    (2) Money in a bond fund or bond retirement fund of a city, local, exempted village,
    cooperative education, or joint vocational school district may be transferred
    to a specific permanent improvement fund provided that the county budget commission
    of the county in which the school district is located approves the transfer upon
    its determination that the money transferred will not be required to meet the
    obligations payable from the bond fund or bond retirement fund. In arriving at
    such a determination, the county budget commission shall consider the balance
    of the bond fund or bond retirement fund, the outstanding obligations payable
    from the fund, and the sources and timing of the fund''s revenue.

    (D) The unexpended balance in any special fund, other than an improvement fund,
    existing in accordance with division (D), (F), or (G) of section 5705.09 or section
    5705.12 of the Revised Code, may be transferred to the general fund or to the
    sinking fund or bond retirement fund after the termination of the activity, service,
    or other undertaking for which such special fund existed, but only after the payment
    of all obligations incurred and payable from such special fund.

    (E) Money may be transferred from the general fund to any other fund of the subdivision.

    (F) Moneys retained or received by a county under section 4501.04 or division
    (A)(2) of section 5735.27 of the Revised Code may be transferred from the fund
    into which they were deposited to the sinking fund or bond retirement fund from
    which any principal, interest, or charges for which such moneys may be used is
    payable.

    (G) Moneys retained or received by a municipal corporation under section 4501.04
    or division (A)(1) of section 5735.27 of the Revised Code may be transferred from
    the fund into which they were deposited to the sinking fund or bond retirement
    fund from which any principal, interest, or charges for which such moneys may
    be used is payable.

    (H)(1) Money may be transferred from the county developmental disabilities general
    fund to the county developmental disabilities capital fund established under section
    5705.091 of the Revised Code or to any other fund created for the purposes of
    the county board of developmental disabilities, so long as money in the fund to
    which the money is transferred can be spent for the particular purpose of the
    transferred money. The county board of developmental disabilities may request,
    by resolution, that the board of county commissioners make the transfer. The county
    board of developmental disabilities shall transmit a certified copy of the resolution
    to the board of county commissioners. Upon receiving the resolution, the board
    of county commissioners may make the transfer. Money transferred to a fund shall
    be credited to an account appropriate to its particular purpose.

    (2) An unexpended balance in an account in the county developmental disabilities
    capital fund or any other fund created for the purposes of the county board of
    developmental disabilities may be transferred back to the county developmental
    disabilities general fund. The transfer may be made if the unexpended balance
    is no longer needed for its particular purpose and all outstanding obligations
    have been paid. Money transferred back to the county developmental disabilities
    general fund shall be credited to an account for current expenses within that
    fund. The county board of developmental disabilities may request, by resolution,
    that the board of county commissioners make the transfer. The county board of
    developmental disabilities shall transmit a certified copy of the resolution to
    the board of county commissioners. Upon receiving the resolution, the board of
    county commissioners may make the transfer.

    (I) Money may be transferred from the public assistance fund established under
    section 5101.161 of the Revised Code to either of the following funds, so long
    as the money to be transferred from the public assistance fund may be spent for
    the purposes for which money in the receiving fund may be used:

    (1) The children services fund established under section 5180.411 of the Revised
    Code;

    (2) The child support enforcement administrative fund established, as authorized
    under rules adopted by the director of job and family services, in the county
    treasury for use by any county family services agency.

    (J) Notwithstanding this section, money in any fund or account of a village dissolved
    in accordance with sections 703.31 to 703.39 of the Revised Code may be transferred
    by the receiver-trustee to a special account for the purpose of paying the debts,
    obligations, and liabilities of the dissolved village or to the general fund of
    any township into which the territory of the village is dissolved for any purpose
    that directly or indirectly benefits the former territory of the dissolved village.

    (K) Except in the case of transfer pursuant to division (E) or (J) of this section,
    transfers authorized by this section shall only be made by resolution of the taxing
    authority passed with the affirmative vote of two-thirds of the members.'
