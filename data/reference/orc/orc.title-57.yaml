- number: '5723.11'
  heading: Payment of excess proceeds of sale to owner - civil action to determine
    owner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: 'If any forfeited lands are sold for a greater sum than the amount of the
    tax, assessment, penalty, interest, and costs of sale, the county auditor shall
    charge the county treasurer separately in each case, in the name of the supposed
    owner, with the excess above such amount. The treasurer shall retain such excess
    in the treasury for the proper owner of the forfeited lands, and upon demand by
    such owner, within one year from the day of sale, shall pay the excess to the
    owner. After that one year, the treasurer shall dispose of any excess according
    to law or, if a county land reutilization corporation organized under Chapter
    1724. of the Revised Code exists in the county, shall pay the amount to the corporation.
    Such money shall be used for the corporation''s public purposes.

    If the treasurer, upon demand, is not fully satisfied as to the right of the person
    demanding to receive such excess sum or if there are several different claimants,
    the treasurer shall commence a civil action by filing a petition of interpleader
    in the court of common pleas of the county where the land was sold, wherein the
    treasurer shall make the person claiming the excess, and the state, defendants,
    and the action shall proceed as other civil actions. The costs of the proceedings
    shall be paid by the person claiming the excess, as the court orders. The prosecuting
    attorney shall prosecute the action, in behalf of the treasurer.'
