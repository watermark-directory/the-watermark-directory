- number: '5707.08'
  heading: Authority to create county, township, or municipal forests - tax levy
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5707'
    name: County Taxes
  text: The governing body of any municipal corporation, township, or county may accept
    donations of land suitable for the growth of timber, which lands shall be known
    as municipal, township, or county forests, and may manage the same on forestry
    principles. The governing body of any municipal corporation, township, or county,
    where funds are available or have been levied therefor, may, when authorized by
    a majority vote of the electorate voting at any general election, purchase or
    obtain by condemnation proceedings any tract of land suitable for a forest which
    is conveniently located for the purpose, and under the direction of the chief
    of the division of forestry of the department of natural resources shall manage
    the same on forestry principles. Such municipal corporation, township, or county
    may levy and collect an annual tax not exceeding three mills on the dollar of
    its assessed real estate valuation, in addition to all other taxes authorized
    or permitted by law, to procure and maintain such forests.
