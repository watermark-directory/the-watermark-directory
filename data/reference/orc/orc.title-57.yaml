  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.41
- number: '5726.42'
  heading: Reinstatement
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A)(1) A person whose document of creation has been canceled by the secretary
    of state pursuant to section 5726.40 the Revised Code shall be reinstated and
    again entitled to exercise its rights, privileges, and franchises in this state
    upon compliance with all of the following:

    (a) Filing with the secretary of state a certificate from the tax commissioner
    that the person has complied with all the requirements of law as to tax reports
    and paid all taxes, fees, or penalties due thereon for every year of delinquency;

    (b) Payment to the secretary of state of any additional fees and penalties required
    to be paid to the secretary of state;

    (c) Payment to the secretary of state of an additional fee of ten dollars.

    Upon the person''s compliance with this division, the secretary of state shall
    cancel the entry of cancellation filed under section 5726.40 of the Revised Code.

    (2) If a reinstatement is not made within one year from the date of cancellation
    of the document of creation, and if it appears that a document of creation has
    been issued to a person of the same or similar name as the applicant for reinstatement,
    the secretary of state shall require, as a condition prerequisite to such reinstatement,
    that the applicant amend its document of creation by changing the applicant''s
    name.

    (B) Any officer, shareholder, creditor, or receiver of a person may at any time
    take all steps required by this section to effect a reinstatement.

    (C) The rights, privileges, and franchises of a person whose document of creation
    has been reinstated in accordance with this section are subject to section 1701.922
    of the Revised Code.

    (D) Notwithstanding a violation of section 5726.41 of the Revised Code, upon reinstatement
    of a person''s document of creation in accordance with this section, neither section
    5726.40 nor section 5726.41 of the Revised Code shall be applied to invalidate
    the exercise or attempt to exercise any right, privilege, or franchise on behalf
    of the person by an officer, agent, or employee of the person after cancellation
    and prior to the reinstatement of the document of creation, if the conditions
    set forth in divisions (B)(1)(a) and (b) of section 1701.922 of the Revised Code
    are met.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.42
- number: '5726.43'
  heading: Quo warranto action
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: If any financial institution fails to make and file any return or report required
    under this chapter, or to pay the penalties provided by law for failure to make
    and file such reports or returns, for a period of ninety days after the time prescribed
    by law, the attorney general, on the request of the tax commissioner, shall commence
    an action in quo warranto in the court of appeals of the county in which the reporting
    person for the financial institution has its principal place of business in this
    state to forfeit and annul the privileges and franchises of each person included
    in the annual report of the financial institution. If the court is satisfied that
    any such financial institution is in default, it shall render judgment ousting
    each person included in the annual report of the financial institution from the
    exercise of its privileges and franchises within this state, and shall otherwise
    proceed as provided in sections 2733.01 to 2733.39 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.43
- number: '5726.50'
  heading: Tax credits for job creation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) A taxpayer may claim a refundable tax credit against the tax imposed
    under this chapter for each person included in the annual report of the taxpayer
    that is granted a credit by the tax credit authority under section 122.17 or former
    division (B)(2) or (3) of section 122.171 of the Revised Code as those divisions
    existed before September 29, 2015. Such a credit shall not be claimed for any
    tax year following the calendar year in which a relocation of employment positions
    occurs in violation of an agreement entered into under section 122.17 or 122.171
    of the Revised Code. For the purpose of making tax payments under this chapter,
    taxes equal to the amount of the refundable credit shall be considered to be paid
    on the first day of the tax year.

    (B) A taxpayer may claim a nonrefundable tax credit against the tax imposed under
    this chapter for each person included in the annual report of the taxpayer that
    is granted a nonrefundable credit by the tax credit authority under division (B)
    of section 122.171 of the Revised Code. A taxpayer may claim against the tax imposed
    by this chapter any unused portion of the credits authorized under division (B)
    of section 5733.0610 of the Revised Code.

    (C) The credits authorized in divisions (A) and (B) of this section shall be claimed
    in the order required under section 5726.98 of the Revised Code. If the amount
    of a credit authorized in division (A) of this section exceeds the tax otherwise
    due under section 5726.02 of the Revised Code after deducting all other credits
    preceding the credit in the order prescribed in section 5726.98 of the Revised
    Code, the excess shall be refunded to the taxpayer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.50
- number: '5726.52'
  heading: Tax credit for historic building rehabilitation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) As used in this section, "certificate owner" has the same meaning as
    in section 149.311 of the Revised Code.

    (B) A taxpayer may claim a refundable credit against the tax imposed by this chapter
    for each person included in the annual report of a taxpayer that is a certificate
    owner of a rehabilitation tax credit certificate issued under section 149.311
    of the Revised Code. The credit shall equal twenty-five per cent of the dollar
    amount indicated on each certificate, but shall not exceed five million dollars
    for each certificate.

    The credit shall be claimed for the calendar year specified in the certificate
    and in the order required under section 5726.98 of the Revised Code. If the credit
    exceeds the amount of tax otherwise due in that year, the excess shall be refunded
    to the taxpayer, provided that, if any amount of the credit is refunded, the sum
    of the amount refunded and the amount applied to reduce the tax otherwise due
    in that year shall not exceed three million dollars. The taxpayer may carry forward
    any balance of the credit in excess of the amount claimed in that year for not
    more than five ensuing years, and shall deduct any amount claimed in any such
    year from the amount claimed in an ensuing year. A taxpayer may claim against
    the tax imposed by this chapter any unused portion of the credit authorized under
    section 5725.151 of the Revised Code, but only to the extent of the five-year
    carry forward period authorized by that section.

    (C) A taxpayer claiming a credit under this section shall retain the rehabilitation
    tax credit certificate for four years following the end of the year to which the
    credit was applied, and shall make the certificate available for inspection by
    the tax commissioner upon the request of the commissioner during that period.'
