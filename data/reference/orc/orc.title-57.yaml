- number: '5707.031'
  heading: Tax credit certificate against tax on intangibles dealer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5707'
    name: County Taxes
  text: 'As used in this section, "qualifying dealer in intangibles" means a dealer
    in intangibles that is a qualifying dealer in intangibles as defined in section
    5733.45 of the Revised Code or a member of a qualifying controlled group, as defined
    in section 5733.04 of the Revised Code, of which an insurance company also is
    a member on the first day of January of the year in and for which the tax imposed
    by section 5707.03 of the Revised Code is required to be paid by the dealer.

    Upon the issuance of a tax credit certificate by the Ohio venture capital authority
    under section 150.07 of the Revised Code, a refundable credit may be claimed against
    the tax imposed on a qualifying dealer in intangibles under section 5707.03 and
    Chapter 5725. of the Revised Code. The credit shall be claimed on a return due
    under section 5725.14 of the Revised Code after the certificate is issued by the
    authority.'
