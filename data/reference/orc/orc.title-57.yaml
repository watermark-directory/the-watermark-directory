- number: '5747.054'
  heading: Tax credit based on federal dependent care credit
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: 'In addition to all other credits allowed by this chapter, a credit shall
    be allowed against a taxpayer''s aggregate tax liability under section 5747.02
    of the Revised Code for taxpayers with modified adjusted gross income of less
    than forty thousand dollars. The amount of the credit shall equal twenty-five
    per cent of the federal dependent care credit for which the taxpayer is eligible
    for the taxable year under section 21 of the Internal Revenue Code, 26 U.S.C.A.
    21; except that the amount of the credit for a taxpayer with modified adjusted
    gross income of less than twenty thousand dollars shall equal the federal credit
    for which the taxpayer is eligible, in any case without regard to any limitation
    imposed by section 26 of the Internal Revenue Code, 26 U.S.C.A. 26.

    The credit allowed by this section shall be claimed in the order required under
    section 5747.98 of the Revised Code.'
