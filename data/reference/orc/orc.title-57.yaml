- number: '5711.18'
  heading: Valuation of accounts and personal property - procedure - income yield
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'In the case of accounts receivable, the book value thereof less book reserves
    shall be listed and shall be taken as the true value thereof unless the assessor
    finds that such net book value is greater or less than the then true value of
    such accounts receivable in money. In the case of personal property used in business,
    the book value thereof less book depreciation at such time shall be listed, and
    such depreciated book value shall be taken as the true value of such property,
    unless the assessor finds that such depreciated book value is greater or less
    than the then true value of such property in money. Claim for any deduction from
    net book value of accounts receivable or depreciated book value of personal property
    must be made in writing by the taxpayer at the time of making the taxpayer''s
    return; and when such return is made to the county auditor who is required by
    sections 5711.01 to 5711.36, inclusive, of the Revised Code, to transmit it to
    the tax commissioner for assessment, the auditor shall, as deputy of the commissioner,
    investigate such claim and shall enter thereon, or attach thereto, in such form
    as the commissioner prescribes, the auditor''s findings and recommendations with
    respect thereto; when such return is made to the commissioner, such claim for
    deduction from depreciated book value of personal property shall be referred to
    the auditor, as such deputy, of each county in which the property affected thereby
    is listed for investigation and report.

    Any change in the method of determining true value, as prescribed by the tax commissioner
    on a prospective basis, shall not be admissible in any judicial or administrative
    action or proceeding as evidence of value with regard to prior years'' taxes.
    Information about the business, property, or transactions of any taxpayer obtained
    by the commissioner for the purpose of adopting or modifying any such method shall
    not be subject to discovery or disclosure.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.18
- number: '5711.19'
  heading: Determination of trust income - cash distribution
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: The net income received by a trustee from the sources mentioned in section
    5701.10 of the Revised Code shall be determined by deducting all expenses attributable
    solely to particular sources of gross non-taxable income from the income from
    such sources, and charging the excess of such expenses over the income from such
    sources, together with all other expenses and charges, to the taxable gross income
    from the sources mentioned in such section, provided that trustee fees shall be
    apportioned between gross taxable and nontaxable sources and charged thereto.
    If net income is accumulated otherwise than under the circumstances mentioned
    in section 5711.29 of the Revised Code, such accumulation, and the cash distribution
    of the remainder of such net income, shall be considered as made pro rata from
    each source of net income, ascertained as required by this section. Income shall
    be considered to be distributed in cash if it is withheld by the trustee contrary
    to the terms of a trust instrument or will or if it is applied by the trustee
    to the use of the taxpayer, or used by the trustee in paying premiums on policies
    of insurance on the taxpayer's life, or of which the taxpayer is a beneficiary.
    Income shall be considered to be distributed in cash, whether such payment or
    distribution is in cash, notes, debentures, bonds, or other property.
  history: null
