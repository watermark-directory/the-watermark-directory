- number: '5703.85'
  heading: Quarterly report by tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'On or before September 1, 2015, and on or before the first day of every third
    month thereafter, the tax commissioner shall prepare a report that includes all
    of the following information:

    (A) The number of inspections and investigations conducted during the preceding
    four months in relation to the enforcement of sections 1333.11 to 1333.21 and
    Chapter 5743. of the Revised Code;

    (B) The number of violations of sections 1333.11 to 1333.21 and Chapter 5743.
    of the Revised Code found during the preceding four months, organized by the type
    of violation;

    (C) The number of prosecutions brought during the preceding four months in relation
    to violations of sections 1333.11 to 1333.21 and Chapter 5743. of the Revised
    Code;

    (D) The number of agents designated for enforcement of sections 1333.11 to 1333.21
    and Chapter 5743. of the Revised Code during the preceding four months.

    The commissioner shall submit the report to the chairperson of the standing committee
    of each house of the general assembly which normally considers tax legislation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.85
- number: '5703.90'
  heading: Assessments for the unpaid taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: If any tax administered by the tax commissioner remains unpaid after the date
    the tax is due, the commissioner may issue an assessment for the unpaid tax, and
    for any related penalties and interest, against any person liable for the amount
    due, including, but not limited to, a person that is jointly and severally liable
    for the amount under Chapter 5726. or 5751. of the Revised Code, a partner liable
    for the tax liability of a partnership, a director liable for the tax liability
    of a dissolved corporation, or any other person liable for the tax liability of
    another person under the Revised Code. The commissioner shall issue the assessment
    in accordance with any other provision of the Revised Code applicable to assessments
    for the tax for which the person to be assessed is liable.
