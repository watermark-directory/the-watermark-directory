- number: '5705.42'
  heading: Grants by United States government
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: When the United States government or the state or any department, division,
    agency, authority, or unit thereof makes a grant or loan of money to any political
    subdivision of this state to aid in paying the cost of any program, activity,
    or function of such subdivision, or enters into an agreement with the subdivision
    for the making of any such grant or loan of money, the amount thereof is deemed
    appropriated for such purpose by the taxing authority of the subdivision as provided
    by law and shall be recorded as such by the fiscal officer of the subdivision,
    and is deemed in process of collection within the meaning of section 5705.41 of
    the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.42
- number: '5705.43'
  heading: Improvements paid by special assessments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: In the case of an improvement, the cost of which is to be paid in whole or
    part by special assessments, a contract may be executed without an appropriation
    or certificate for that portion of the cost derived or to be derived from special
    assessments, provided that a resolution or ordinance authorizing such assessment
    and the bonds or notes to be issued in anticipation thereof has been passed in
    the manner provided by law, or that such contract is for the provision of engineering,
    legal, or other necessary professional services in connection with such improvement.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.43
- number: '5705.44'
  heading: Contracts running beyond fiscal year - certificate not required on contracts
    payable from utility earnings
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'When contracts or leases run beyond the termination of the fiscal year in
    which they are made, the fiscal officer of the taxing authority shall make a certification
    for the amount required to meet the obligation of such contract or lease maturing
    in such fiscal year. The amount of the obligation under such contract or lease
    remaining unfulfilled at the end of a fiscal year, and which will become payable
    during the next fiscal year, shall be included in the annual appropriation measure
    for the next year as a fixed charge.

    The certificate required by section 5705.41 of the Revised Code as to money in
    the treasury shall not be required for contracts on which payments are to be made
    from the earnings of a publicly operated water works or public utility, but in
    the case of any such contract made without such certification, no payment shall
    be made on account thereof, and no claim or demand thereon shall be recoverable,
    except out of such earnings. That certificate also shall not be required if requiring
    the certificate makes it impossible for a county board of developmental disabilities
    to pay the nonfederal share of medicaid expenditures that the county board is
    required by sections 5126.059 and 5126.0510 of the Revised Code to pay.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.44
- number: '5705.45'
  heading: Liability for wrongful payments from public funds - enforcement
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: Any officer, employee, or other person who issues any order contrary to section
    5705.41 of the Revised Code, or who expends or authorizes the expenditure of any
    public funds, or who authorizes or executes any contract contrary to sections
    5705.01 to 5705.47 of the Revised Code, unless payments thereon are subsequently
    ordered as provided in section 5705.41 of the Revised Code, or expends or authorizes
    the expenditure of any public funds on any such void contract, obligation, or
    order, unless subsequently approved as provided in that section, or issues a certificate
    under the provisions thereof which contains any false statements, shall be liable
    to the political subdivision for the full amount paid from the funds of the subdivision
    on any such order, contract, or obligation. Such officer, employee, or other person
    shall be jointly and severally liable in person and upon any official bond that
    he has given to such subdivision, to the extent of any payments of such void claim.
    The prosecuting attorney of the county, the city director of law, or other chief
    law officer of the subdivision shall enforce this liability by civil action brought
    in any court of appropriate jurisdiction in the name of and on behalf of the municipal
    corporation, county, or subdivision. If the prosecuting attorney, city director
    of law, or other chief law officer of the subdivision fails, upon the written
    request of any taxpayer, to institute action for the enforcement of the liability,
    the taxpayer may institute suit in his own name in behalf of the subdivision.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.45
- number: '5705.46'
  heading: Payment of current payrolls
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: Each political subdivision may make expenditures for the payment of current
    payrolls upon the authority of a proper appropriation for such purpose, provided
    that the positions of such employees and their compensation have been determined
    prior thereto by resolution, ordinance, or in the manner provided by law. The
    total expenditures for such purpose during the first half of any fiscal year shall
    not exceed six tenths of the appropriation therefor, unless the taxing authority
    of such subdivision, by a three-fourths vote of all the members, waives such limitation.
    In the resolution waiving such limitation there shall be set forth the reason
    therefor.
  history: null
