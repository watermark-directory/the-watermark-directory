  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.241
- number: '5727.25'
  heading: Quarterly or annual returns filed with tax payment - additional charges,
    penalties, and interest
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Except as provided in division (B) of this section, within forty-five
    days after the last day of March, June, September, and December, each natural
    gas company or combined company subject to the excise tax imposed by section 5727.24
    of the Revised Code shall file a return with the tax commissioner, in such form
    as the commissioner prescribes, and pay the full amount of the tax due on its
    taxable gross receipts for the preceding calendar quarter. All payments made under
    this division shall be made electronically in accordance with section 5727.311
    of the Revised Code.

    (B) Any natural gas company or combined company subject to the excise tax imposed
    by this section that has an annual tax liability for the preceding calendar year
    ending on the thirty-first day of December of less than three hundred twenty-five
    thousand dollars may elect to file an annual return with the tax commissioner,
    in such form as the commissioner prescribes, for the next year. A company that
    elects to file an annual return for the calendar year shall file the return and
    remit the taxes due on its taxable gross receipts within forty-five days after
    the thirty-first day of December. The minimum tax for a natural gas company or
    combined company subject to this division shall be fifty dollars, and the company
    shall not be required to remit the tax due electronically.

    (C) A return required to be filed under division (A) or (B) of this section shall
    show the amount of tax due from the company for the period covered by the return
    and any other information as prescribed by the tax commissioner. A return shall
    be considered filed when received by the commissioner. The commissioner may extend
    the time for making and filing returns and paying the tax.

    (D) Any natural gas company or combined company that fails to file a return or
    pay the full amount of the tax due within the period prescribed under this section
    shall pay an additional charge of fifty dollars or ten per cent of the tax required
    to be paid for the reporting period, whichever is greater. If any tax due is not
    paid timely in accordance with this section, the company liable for the tax shall
    pay interest, calculated at the rate per annum prescribed by section 5703.47 of
    the Revised Code, from the date the tax payment was due to the date of payment
    or to the date an assessment was issued, whichever occurs first. The tax commissioner
    may collect any additional charge or interest imposed by this section by assessment
    in the manner provided in section 5727.26 of the Revised Code. The commissioner
    may abate all or a portion of the additional charge and may adopt rules governing
    such abatements.

    (E) The taxes, additional charges, penalties, and interest collected under sections
    5727.24 to 5727.29 of the Revised Code shall be credited in accordance with section
    5727.45 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.25
- number: '5727.26'
  heading: Assessment for failure to file return or pay amount due - judgment against
    company
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) The tax commissioner may make an assessment, based on any information
    in the commissioner''s possession, against any natural gas company or combined
    company that fails to file a return or pay any tax, interest, or additional charge
    as required by sections 5727.24 to 5727.29 of the Revised Code. The commissioner
    shall give the company assessed written notice of the assessment as provided in
    section 5703.37 of the Revised Code. With the notice, the commissioner shall provide
    instructions on how to petition for reassessment and request a hearing on the
    petition. A penalty of up to fifteen per cent may be added to all amounts assessed
    under this section. The tax commissioner may adopt rules providing for the imposition
    and remission of the penalty.

    (B) Unless the company assessed, within sixty days after service of the notice
    of assessment, files with the tax commissioner a written petition signed by the
    company''s authorized agent having knowledge of the facts, the assessment becomes
    final, and the amount of the assessment is due and payable from the company assessed
    to the commissioner. The petition shall indicate the objections of the company
    assessed, but additional objections may be raised in writing if received by the
    commissioner prior to the date shown on the final determination.

    If a petition for reassessment has been properly filed, the commissioner shall
    proceed under section 5703.60 of the Revised Code.

    (C) After an assessment becomes final, if any portion of the assessment, including
    accrued interest, remains unpaid, a certified copy of the tax commissioner''s
    entry making the assessment final may be filed in the office of the clerk of the
    court of common pleas in the county in which the natural gas company''s or combined
    company''s principal place of business is located, or in the office of the clerk
    of court of common pleas of Franklin county.

    Immediately on the filing of the entry, the clerk shall enter judgment for the
    state against the company assessed in the amount shown on the entry. The judgment
    may be filed by the clerk in a loose-leaf book entitled, "special judgments for
    the public utility excise tax on natural gas and combined companies," and shall
    have the same effect as other judgments. Execution shall issue upon the judgment
    at the request of the tax commissioner, and all laws applicable to sales on execution
    shall apply to sales made under the judgment.

    If the assessment is not paid in its entirety within sixty days after the day
    the assessment was issued, the portion of the assessment consisting of tax due
    shall bear interest at the rate per annum prescribed by section 5703.47 of the
    Revised Code from the day the tax commissioner issues the assessment until it
    is paid or until it is certified to the attorney general for collection under
    section 131.02 of the Revised Code, whichever comes first. If the unpaid portion
    of the assessment is certified to the attorney general for collection, the entire
    unpaid portion of the assessment shall bear interest at the rate per annum prescribed
    by section 5703.47 of the Revised Code from the date of certification until the
    date it is paid in its entirety. Interest shall be paid in the same manner as
    the tax and may be collected by the issuance of an assessment under this section.

    (D) If the tax commissioner believes that collection of the tax will be jeopardized
    unless proceedings to collect or secure collection of the tax are instituted without
    delay, the commissioner may issue a jeopardy assessment against the company liable
    for the tax. Immediately upon the issuance of the jeopardy assessment, the commissioner
    shall file an entry with the clerk of the court of common pleas in the manner
    prescribed by division (C) of this section. Notice of the jeopardy assessment
    shall be served on the company assessed or the company''s authorized agent in
    the manner provided in section 5703.37 of the Revised Code within five days of
    the filing of the entry with the clerk. The total amount assessed is immediately
    due and payable, unless the company assessed files a petition for reassessment
    in accordance with division (B) of this section and provides security in a form
    satisfactory to the commissioner and in an amount sufficient to satisfy the unpaid
    balance of the assessment. Full or partial payment of the assessment does not
    prejudice the commissioner''s consideration of the petition for reassessment.

    (E) The tax commissioner shall immediately forward to the treasurer of state all
    amounts that the tax commissioner receives under this section, and such amounts
    shall be considered revenue arising from the tax imposed by section 5727.24 of
    the Revised Code.

    (F) No assessment shall be made or issued against a natural gas company or combined
    company for the tax imposed by section 5727.24 of the Revised Code more than four
    years after the return date for the period in which the tax was reported, or more
    than four years after the return for the period was filed, whichever is later.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.26
- number: '5727.27'
  heading: Company to keep records - inspection of records
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: Every natural gas company or combined company liable for the tax imposed by
    section 5727.24 of the Revised Code shall keep complete and accurate records as
    prescribed by the tax commissioner. The records shall be preserved for four years
    after the return for the tax to which the records pertain is due or filed, whichever
    is later. The natural gas company or combined company shall make the records available
    for inspection by the commissioner or the commissioner's agent, on the request
    of the commissioner or agent.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.27
- number: '5727.28'
  heading: Refunds
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) The tax commissioner shall refund to a natural gas company or combined
    company subject to the tax imposed by section 5727.24 of the Revised Code amounts
    paid illegally or erroneously, or paid on an illegal or erroneous assessment.
    Applications for a refund shall be filed with the tax commissioner, on a form
    prescribed by the commissioner, within four years of the illegal or erroneous
    payment.

    On the filing of the application, the commissioner shall determine the amount
    of refund to which the applicant is entitled. If the amount is not less than that
    claimed, the commissioner shall issue the refund from the tax refund fund under
    section 5703.052 of the Revised Code. If the amount is less than that claimed,
    the commissioner shall proceed in accordance with section 5703.70 of the Revised
    Code.

    If the application for refund is for payment of an illegal or erroneous assessment,
    the commissioner shall include in the certified amount interest calculated at
    the rate per annum prescribed by section 5703.47 of the Revised Code from the
    date of overpayment to the date of the commissioner''s certification.

    (B) If a natural gas company or combined company entitled to a refund under this
    section, or section 5703.70 of the Revised Code, is indebted to the state for
    any tax or fee administered by the tax commissioner that is paid to the state,
    or any charge, penalty, or interest arising from such a tax or fee, the amount
    refundable may be applied in satisfaction of that debt. If the amount refundable
    is less than the amount of the debt, it may be applied in partial satisfaction
    of the debt. If the amount refundable is greater than the amount of the debt,
    the amount remaining after satisfaction of the debt shall be refunded.

    (C) In lieu of granting a refund under division (A) or (B) of this section, the
    tax commissioner may allow a natural gas company or combined company to claim
    a credit of the amount of the tax refund on the return for the period during which
    the tax became refundable. The commissioner may require the company to submit
    information to support a claim for a credit under this division, and the commissioner
    may disallow the credit if the information is not provided.'
  history: null
