- number: '5703.75'
  heading: Taxes and refunds under one dollar
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: This section applies to any tax, fee, or charge payable to the state and administered
    by the tax commissioner, except the tax administered under sections 718.80 to
    718.95 of the Revised Code. If the total amount of any such tax, fee, or charge
    shown to be due on a return, amended return, or notice does not exceed one dollar,
    the taxpayer or person liable for the tax, fee, or charge shall not be required
    to remit the amount due. If the total amount of an overpayment of any such tax,
    fee, or charge does not exceed one dollar, the tax commissioner shall not be required
    to refund the overpayment.
