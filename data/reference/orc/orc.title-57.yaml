  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.42
- number: '5743.44'
  heading: Informant's share of tax or penalty - sales of forfeited cigarettes, tobacco
    products or vapor products
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: '(A) Any person, other than an employee of the state, who furnishes to the
    department of taxation, attorney general, or any law enforcement agency original
    information concerning any violation of Chapter 5743. of the Revised Code, which
    information results in the collection and recovery of any tax or penalty or leads
    to the forfeiture of any cigarettes, may be awarded and paid by the treasurer
    of state, upon the certification of the tax commissioner, a compensation of not
    more than twenty per cent of the net amount received from the sale of any forfeited
    cigarettes, but not exceeding ten thousand dollars in any case, which shall be
    paid out of the receipts of such sale. If in the opinion of the attorney general
    and the tax commissioner it is necessary to preserve the identity of the person
    furnishing such information, they shall file with the treasurer of state an affidavit
    stating such necessity and a warrant may be issued jointly to the attorney general
    and the tax commissioner. Upon payment of such money to the person furnishing
    the information, the attorney general and the tax commissioner shall file with
    the treasurer of state an affidavit that the money has been paid by them to the
    person entitled thereto.

    (B) Except for the minimum quantity of cigarettes, tobacco products, or vapor
    products needed as evidence to establish a violation under this chapter, all cigarettes,
    tobacco products, or vapor products seized under this chapter shall be within
    the sole control and jurisdiction of the tax commissioner for sale pursuant to
    section 5743.08 or 5743.55 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.44
- number: '5743.45'
  heading: Tax commissioner may delegate investigation powers
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: '(A) As used in this section, "felony" has the same meaning as in section
    109.511 of the Revised Code.

    (B) For purposes of enforcing this chapter and Chapters 5728., 5735., 5739., 5741.,
    and 5747. of the Revised Code and subject to division (C) of this section, the
    tax commissioner, by journal entry, may delegate any investigation powers of the
    commissioner to an employee of the department of taxation who has been certified
    by the Ohio peace officer training commission and who is engaged in the enforcement
    of those chapters. A separate journal entry shall be entered for each employee
    to whom that power is delegated. Each journal entry shall be a matter of public
    record and shall be maintained in an administrative portion of the journal as
    provided for in division (L) of section 5703.05 of the Revised Code. When that
    journal entry is completed, the employee to whom it pertains, while engaged within
    the scope of the employee''s duties in enforcing the provisions of this chapter
    or Chapter 5728., 5735., 5739., 5741., or 5747. of the Revised Code, has the power
    of a police officer to carry concealed weapons, make arrests, and obtain warrants
    for violations of any provision in those chapters. The commissioner, at any time,
    may suspend or revoke the commissioner''s delegation by journal entry. No employee
    of the department shall divulge any information acquired as a result of an investigation
    pursuant to this chapter or Chapter 5728., 5735., 5739., 5741., or 5747. of the
    Revised Code, except as may be required by the commissioner or a court.

    (C)(1) The tax commissioner shall not delegate any investigation powers to an
    employee of the department of taxation pursuant to division (B) of this section
    on a permanent basis, on a temporary basis, for a probationary term, or on other
    than a permanent basis if the employee previously has been convicted of or has
    pleaded guilty to a felony.

    (2)(a) The tax commissioner shall revoke the delegation of investigation powers
    to an employee to whom the delegation was made pursuant to division (B) of this
    section if that employee does either of the following:

    (i) Pleads guilty to a felony;

    (ii) Pleads guilty to a misdemeanor pursuant to a negotiated plea agreement as
    provided in division (D) of section 2929.43 of the Revised Code in which the employee
    agrees to surrender the certificate awarded to that employee under section 109.77
    of the Revised Code.

    (b) The tax commissioner shall suspend the delegation of investigation powers
    to an employee to whom the delegation was made pursuant to division (B) of this
    section if that employee is convicted, after trial, of a felony. If the employee
    files an appeal from that conviction and the conviction is upheld by the highest
    court to which the appeal is taken or if the employee does not file a timely appeal,
    the commissioner shall revoke the delegation of investigation powers to that employee.
    If the employee files an appeal that results in that employee''s acquittal of
    the felony or conviction of a misdemeanor, or in the dismissal of the felony charge
    against that employee, the commissioner shall reinstate the delegation of investigation
    powers to that employee. The suspension, revocation, and reinstatement of the
    delegation of investigation powers to an employee under division (C)(2) of this
    section shall be made by journal entry pursuant to division (B) of this section.
    An employee to whom the delegation of investigation powers is reinstated under
    division (C)(2)(b) of this section shall not receive any back pay for the exercise
    of those investigation powers unless that employee''s conviction of the felony
    was reversed on appeal, or the felony charge was dismissed, because the court
    found insufficient evidence to convict the employee of the felony.

    (3) Division (C) of this section does not apply regarding an offense that was
    committed prior to January 1, 1997.

    (4) The suspension or revocation of the delegation of investigation powers to
    an employee under division (C)(2) of this section shall be in accordance with
    Chapter 119. of the Revised Code.'
