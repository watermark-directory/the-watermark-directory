- number: '5747.112'
  heading: Paying refund of school district income taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: For payment of any refund of school district income taxes illegally, erroneously,
    or excessively paid, the treasurer of state shall place one thousand dollars collected
    in a separate fund in the state treasury for each school district. As required
    by the depletion of each fund, the treasurer of state shall place to the credit
    thereof an amount sufficient to make the total of the school district's fund at
    the time of such credit amount to one thousand dollars.
