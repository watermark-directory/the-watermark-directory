  url: https://codes.ohio.gov/ohio-revised-code/section-5731.39
- number: '5731.40'
  heading: No consent of tax commissioner to transfer of assets of nonresident decedents
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'The consent of the tax commissioner is not required in the case of the issuance,
    transfer, or delivery of any intangible personal property specified in section
    5731.39 of the Revised Code, when the decedent is not domiciled in this state
    or when the intangible personal property is issued, transferred, or delivered
    to the surviving spouse of the decedent.

    In any action brought under section 5731.39 of the Revised Code, it shall be sufficient
    defense that the issuance, transfer, or delivery of the intangible personal property
    was made in good faith and without knowledge or circumstances sufficient to place
    the defendant on inquiry as to the domicile of the decedent or as to the identity
    of the surviving spouse of the decedent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.40
- number: '5731.41'
  heading: Appointment of enforcement agents
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: To enforce section 5731.39 of the Revised Code, and to administer Chapters
    5713. and 4503. of the Revised Code the tax commissioner may appoint agents in
    the unclassified civil service who shall perform such duties as are prescribed
    by the commissioner. Such agents shall, as compensation, receive annually eight
    cents per capita for each full one thousand of the first twenty thousand of the
    population of the county and two cents per capita for each full one thousand over
    twenty thousand of the population of the county, as shown by the 2010 federal
    census, which shall be paid in equal monthly installments from the undivided inheritance
    or estate tax fund in the county treasury on the warrant of the county auditor
    or, if the balance of that fund is not sufficient to make such payments, from
    the county real estate assessment fund pursuant to division (B)(6) of section
    325.31 of the Revised Code, any other provision of law to the contrary notwithstanding.
    The amount paid to any agent in the unclassified service for all of the duties
    performed under this section, as directed by the commissioner, shall not exceed
    three thousand nor be less than twelve hundred dollars in any calendar year.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.41
- number: '5731.42'
  heading: Collecting unpaid tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: If, after the determination of any tax levied under this chapter, such tax
    remains unpaid, the tax commissioner shall notify the attorney general in writing
    of the nonpayment. The attorney general shall obtain from the tax commissioner
    a certified copy of the certificate of determination of the tax. Such certified
    copy of the certificate of determination of the tax shall be filed in the office
    of the clerk of the court of common pleas of the county, and the same proceedings
    shall be had with respect thereto as are provided by section 2329.04 of the Revised
    Code with respect to transcripts of judgments rendered by judges of the county
    courts, except that the attorney general shall not be required to pay the costs
    accruing at the time of filing the certified copy. The same effect shall be given
    to such certified copy of the certificate of determination of the tax for all
    purposes as is given to such transcripts of judgments of judges of the county
    courts filed in like manner. This section does not affect the date of the lien
    of such taxes on the property passing, or divest such lien before the payment
    of such tax in the event of failure to seek out execution within the period prescribed
    by section 2329.07 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.42
- number: '5731.43'
  heading: Representing state, tax commissioner and county auditor
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: Section 5731.43. The attorney general, when requested by the tax commissioner,
    shall represent the state, the tax commissioner, and the county auditor in any
    proceedings under Chapter 5731. of the Revised Code. The tax commissioner, with
    the consent of the attorney general, may designate any attorney assigned to or
    employed by the estate tax division of the Department of Taxation to represent
    the tax commissioner, and no additional compensation shall be paid to any attorney
    so designated for services performed in such capacity.
  history: null
