- number: '5727.03'
  heading: Combined company to file separate report for each listed activity of company
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) A combined company shall file a separate report under section 5727.08
    of the Revised Code for each listed activity of a combined company. The tax commissioner
    shall separately value, apportion, and assess the company''s property. Divisions
    (B)(1), (2), and (3) of this section shall be used to determine the taxable property
    that cannot be directly attributed to providing one of the listed activities of
    a combined company.

    (B)(1) The taxable property to attribute to an electric company or a rural electric
    company activity shall be the taxable cost of the property that cannot be directly
    attributed to a listed activity of a combined company multiplied by a numerator
    that is the taxable cost of property that can be directly attributed to the activity
    of an electric company or a rural electric company and a denominator that is the
    sum of the taxable cost that can be directly attributed to all the listed activities
    of a combined company.

    (2) The taxable property to attribute to a heating company activity shall be the
    taxable cost of the property that cannot be directly attributed to a listed activity
    of a combined company multiplied by a numerator that is the taxable cost of property
    that can be directly attributed to the activity of a heating company and a denominator
    that is the sum of the taxable cost that can be directly attributed to all listed
    activities of a combined company.

    (3) The taxable property to attribute to a natural gas company activity shall
    be the taxable cost of the property that cannot be directly attributed to a listed
    activity of a combined company multiplied by a numerator that is the taxable cost
    of property that can be directly attributed to the activity of a natural gas company
    and a denominator that is the sum of the taxable cost that can be directly attributed
    to all the listed activities of a combined company.

    (C) A combined company shall file a separate report under section 5727.31 of the
    Revised Code for each public utility activity subject to the excise tax imposed
    by section 5727.30 of the Revised Code. The tax commissioner shall exclude from
    the assessment issued by the tax commissioner on or before the first Monday in
    November 2002, and thereafter, the taxable gross receipts directly attributable
    to the activity of an electric company or a rural electric company. In addition,
    the tax commissioner shall exclude the portion of taxable gross receipts that
    cannot be attributed to a listed combined company activity or another public utility
    activity subject to the excise tax imposed by section 5727.30 of the Revised Code
    by multiplying those taxable gross receipts by a numerator that is the taxable
    gross receipts that can be directly attributed to an electric company or a rural
    electric company activity, and a denominator that is the sum of the taxable gross
    receipts that can be directly attributed to a listed combined company activity
    or another public utility activity subject to the excise tax imposed by section
    5727.30 of the Revised Code.

    (D) A combined company subject to the excise tax imposed by section 5727.24 of
    the Revised Code shall file a return under section 5727.25 of the Revised Code.
    The excise tax imposed by section 5727.24 of the Revised Code shall be levied
    only on the following gross receipts of a combined company:

    (1) The taxable gross receipts directly attributed to the activity of a natural
    gas company;

    (2) The portion of taxable gross receipts that cannot be directly attributed to
    a listed combined company activity or another public utility activity subject
    to the excise tax imposed by section 5727.30 of the Revised Code, by multiplying
    those taxable gross receipts by a numerator that is the taxable gross receipts
    that can be directly attributed to a natural gas company activity, and a denominator
    that is the sum of the taxable gross receipts that can be directly attributed
    to a listed combined company activity or another public utility activity subject
    to the excise tax imposed by section 5727.30 of the Revised Code.'
