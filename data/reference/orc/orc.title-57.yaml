- number: '5703.82'
  heading: Tax discovery data system
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Not later than April 1, 2009, the department of taxation shall acquire the
    necessary hardware, software, and services to establish and implement a tax discovery
    data system to increase the efficiency of tax collections in the state. The system
    must be fully integrated and pre-staged for the purposes of assisting in revenue
    analysis, discovering noncompliant taxpayers, and collecting taxes from those
    taxpayers. The system shall consolidate tax data from various mainframe systems
    and operate as a single tax discovery data system. The department shall contract,
    pursuant to a competitive bidding process, for the necessary hardware, software,
    and services to implement the tax discovery data system.
