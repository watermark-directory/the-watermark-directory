    provided by law for separate parcels of land, and such entry shall be a sufficient
    description of such subdivisions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.16
- number: '5713.17'
  heading: Duty to notify county auditor of improvement costing over $2,000 - penalty
    - examination of buildings
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: 'To enable the county auditor to determine the value and location of buildings
    and other improvements, any person, other than a railroad company or a public
    utility whose real property is valued for taxation by the tax commissioner, that
    constructs any building or other improvement costing more than two thousand dollars
    upon any lot or land within a township or municipal corporation not having a system
    of building registration and inspection shall notify the county auditor of the
    county within which such land or lot is located that the building or improvement
    has been completed or is in process of construction. The notice shall be in writing,
    shall contain an estimate of the cost of the building or improvement, shall describe
    the lot or land and its ownership in a manner reasonably calculated to allow the
    county auditor to identify the lot or tract of land on the tax list, and shall
    be served upon the county auditor not later than sixty days after construction
    of the building or improvement has commenced.

    Upon the discovery of a building or improvement that has been constructed but
    of which the county auditor has not been notified as required by this section,
    the county auditor shall appraise it and place it upon the tax list and duplicate
    at its taxable value, together with a penalty equal to fifty per cent of the amount
    of taxes that would have been charged against the building or improvement from
    the date of construction to the date of discovery had the county auditor been
    notified of its construction as required by this section.

    The county auditor, or his deputy, within reasonable hours, may enter and fully
    examine all buildings and improvements that are either liable to or exempt from
    taxation by Title LVII of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.17
- number: '5713.18'
  heading: Plats presented to auditor for assessment and entry
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: When any person lays out a municipal corporation, any addition thereto, or
    any subdivision of any lot or tract of land before the plat thereof is recorded,
    he shall present it to the county auditor, who shall assess and return the taxable
    valuation of each lot or parcel of land described in such plat in the same manner
    as other such lots or parcels are valued. Thereupon such lots or parcels shall
    be entered on the tax list in lieu of the land included therein.
  history: null
