  url: https://codes.ohio.gov/ohio-revised-code/section-5743.53
- number: '5743.54'
  heading: Maintaining records
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: '(A) Each distributor of tobacco products and each vapor distributor of vapor
    products shall maintain complete and accurate records of all purchases and sales
    of tobacco products or vapor products, and shall procure and retain all invoices,
    bills of lading, and other documents relating to the purchases and sales of those
    products. The distributor or vapor distributor shall keep open records and documents
    during business hours for the inspection of the tax commissioner, and shall preserve
    them for a period of three years from the date the return was due or was filed,
    whichever is later, unless the commissioner, in writing, consents to their destruction
    within that period, or orders that they be kept for a longer period of time.

    (B)(1) Each distributor of tobacco products and each vapor distributor of vapor
    products subject to the tax levied by section 5743.51 or 5743.511 of the Revised
    Code shall mark on the invoices of tobacco products or vapor products sold that
    the tax levied by that section has been paid and shall indicate the distributor''s
    or vapor distributor''s account number as assigned by the commissioner.

    (2) Each vapor distributor subject to the tax imposed by section 5743.51 of the
    Revised Code shall mark on all invoices the total weight of the vapor product,
    rounded to the nearest one-tenth of one gram, if the vapor product is not sold
    in liquid form. If the vapor product is sold in liquid form, the invoice shall
    instead indicate the total volume of the vapor product, rounded to the nearest
    one-tenth of one milliliter.

    (C) No person shall make a false entry upon any invoice or record upon which an
    entry is required by this section and no person shall present any false entry
    for the inspection of the commissioner with the intent to evade the tax levied
    under section 5743.51, 5743.511, 5743.62, 5743.621, 5743.63, or 5743.631 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.54
- number: '5743.55'
  heading: Tax evasion
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: Whenever the tax commissioner discovers any tobacco products or vapor products,
    subject to the tax levied under section 5743.51, 5743.511, 5743.62, 5743.621,
    5743.63, or 5743.631 of the Revised Code upon which the tax has not been paid
    or the commissioner has reason to believe the tax is being avoided, the commissioner
    may seize and take possession of the tobacco products or vapor products, which,
    upon seizure, shall be forfeited to the state. Within a reasonable time after
    seizure, the commissioner may sell the forfeited products. From the proceeds of
    this sale, the commissioner shall pay the costs incurred in the seizure and sale,
    and any proceeds remaining after the sale shall be considered as revenue arising
    from the tax. The seizure and sale shall not relieve any person from the fine
    or imprisonment provided for violation of sections 5743.51 to 5743.66 of the Revised
    Code. The commissioner shall make the sale where it is most convenient and economical,
    but may order the destruction of the forfeited products if the quantity or quality
    is not sufficient to warrant their sale.
