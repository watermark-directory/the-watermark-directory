- number: '5727.95'
  heading: Prohibited acts
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) No natural gas distribution company, electric distribution company, or
    self-assessing purchaser shall fail to file any return or report required to be
    filed pursuant to section 5727.82 of the Revised Code, or file or cause to be
    filed any incomplete, false, or fraudulent return, report, or statement, or aid
    or abet another in the filing of any false or fraudulent return, report, or statement.

    (B) No person shall distribute natural gas or electricity to a meter of an end
    user in this state or to an unmetered location in this state without holding a
    valid registration issued under section 5727.93 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.95
- number: '5727.99'
  heading: Penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Whoever violates section 5727.55 of the Revised Code shall be fined not
    less than one hundred nor more than one thousand dollars.

    (B) Whoever violates section 5727.71 of the Revised Code shall be fined not more
    than five hundred dollars and imprisoned not more than thirty days.

    (C) Whoever violates section 5727.72 of the Revised Code shall be fined not more
    than five hundred dollars or imprisoned not more than thirty days, or both.

    (D) Whoever violates sections 5727.80 to 5727.83, or sections 5727.88 to 5727.95
    of the Revised Code or any rule adopted by the tax commissioner under those sections,
    is guilty of a misdemeanor of the first degree on the first offense; on each subsequent
    offense, the person is guilty of a felony of the fourth degree.'
