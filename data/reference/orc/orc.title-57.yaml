- number: '5721.26'
  heading: Redemption where co-owner is not joined
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: When joint tenants pursuant to a joint tenancy created prior to April 4, 1985,
    tenants with a right of survivorship, tenants in common, or coparceners have a
    property right in lands or town lots, or parts of lots described in any delinquent
    land tax certificate or delinquent vacant land tax certificate, and a person having
    such right in that property fails to join in the redemption of such delinquent
    land tax or for any cause cannot be joined in any such redemption, the county
    auditor may entertain the application of so many of such persons as join in the
    application, and may make a certificate releasing such portion of the land or
    lot as the person making such application is entitled to in severalty upon partition,
    upon payment of the amount due under such delinquent land tax certificate or delinquent
    vacant land tax certificate, as is covered by the applicant's portion of the land
    described in such certificate.
  history: null
