- number: '5709.634'
  heading: Waiver of retail facilities exclusion
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: A municipal corporation or county, or a township to which authority has been
    delegated under division (G) of section 5709.63 of the Revised Code, may enter
    an agreement under section 5709.62, 5709.63, or 5709.632 of the Revised Code with
    an enterprise respecting a place of business used primarily for making retail
    sales if the board of education of each city, local, or exempted village school
    district within the territory of which that place of business is located adopts
    a resolution, approved by the majority of the board members, waiving the retail
    facilities exclusion under division (C) of section 5709.61 of the Revised Code
    with respect to that place of business. Unless otherwise provided in its resolution,
    a board of education does not waive its right to approve or reject agreements
    or to receive notice under section 5709.62, 5709.63, or 5709.632 of the Revised
    Code by waiving the retail facilities exclusion under this section.
