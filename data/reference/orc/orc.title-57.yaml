- number: '5703.211'
  heading: Rules for tracking database searches
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) The tax commissioner shall adopt rules under Chapter 119. of the Revised
    Code that, except as otherwise provided in division (B) of this section, require
    that any search of any of the databases of the department of taxation be tracked
    so that administrators of the database or investigators can identify each account
    holder who conducted a search of the database.

    (B) The rules adopted under division (A) of this section shall not require the
    tracking of any search of any of the databases of the department conducted by
    an account holder in any of the following circumstances:

    (1) The search occurs as a result of research performed for official agency purposes,
    routine office procedures, or incidental contact with the information, unless
    the search is specifically directed toward a specifically named individual or
    a group of specifically named individuals.

    (2) The search is for information about an individual, and it is performed as
    a result of a request by that individual for information about that individual.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.211
- number: '5703.22'
  heading: Decisions of department
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: The department of taxation may conduct any number of investigations contemporaneously
    through different agents, and may delegate to any such agent the taking of all
    testimony bearing upon any investigation or hearing. The decision of the department
    shall be based upon its examination of all testimony and records. The recommendations
    made by an agent shall be advisory only, and do not preclude the taking of further
    testimony if the department so orders, or further investigation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.22
- number: '5703.23'
  heading: Attorney general or prosecuting attorney shall aid in investigations or
    hearings
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Upon the request of the department of taxation, the attorney general shall
    aid in any investigation, hearing, or trial had under the laws which the department
    is required to administer, shall institute and prosecute all necessary actions
    for the enforcement of such laws, and for the punishment of all violations thereof.
    The prosecuting attorney of any county shall, upon the request of the department
    and under the direction of the attorney general, perform similar duties as to
    any offense arising within the county in which he was elected.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.23
- number: '5703.24'
  heading: Action for damages by taxpayer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'Each company, firm, corporation, person, association, partnership, or public
    utility shall furnish the tax commissioner in the returns prescribed by him all
    information required by law and all other facts and information which the commissioner
    requires to enable him to carry into effect the laws which he is required to administer,
    and shall make specific answers to all questions submitted by the commissioner.

    The answers to such questions shall be verified by the signature of such person
    or by the president, secretary, superintendent, general manager, principal accounting
    officer, partner, or agent, and returned to the commissioner at his office within
    the period fixed by the commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.24
- number: '5703.25'
  heading: Returns, claims, and reports need not be sworn to - perjury statement
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'All tax returns, claims, or reports with respect to taxes, including accompanying
    schedules and statements, which are required by law to be filed with the department
    of taxation, the treasurer of state, a county auditor, or a county treasurer need
    not be sworn to. Any such return, claim, or report shall have printed on it the
    following statement, which shall be subscribed to by the person signing such return,
    claim, or report: "I declare under penalties of perjury that this return or claim
    (including any accompanying schedules and statements) has been examined by me
    and to the best of my knowledge and belief is a true, correct, and complete return
    and report."'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.25
- number: '5703.26'
  heading: Prohibition against making a false or fraudulent report, return, schedule,
    statement, claim, or document
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'No person shall knowingly make, present, aid, or assist in the preparation
    or presentation of a false or fraudulent report, return, schedule, statement,
    claim, or document authorized or required by law to be filed with the department
    of taxation, the treasurer of state, a county auditor, a county treasurer, or
    a county clerk of courts, or knowingly procure, counsel, or advise the preparation
    or presentation of such report, return, schedule, statement, claim, or document,
    or knowingly change, alter, or amend, or knowingly procure, counsel, or advise
    such change, alteration, or amendment of the records upon which such report, return,
    schedule, statement, claim, or document is based with intent to defraud the state
    or any of its subdivisions.

    If the report, return, schedule, statement, claim, or document involves the application
    for or renewal of a license, such acts or conduct may result in the denial or
    revocation of the license.

    With respect to such acts or conduct, no conviction shall be had under any other
    section of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.26
- number: '5703.261'
  heading: Payment with nonnegotiable or dishonored instrument - penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) As used in this section:

    (1) "Instrument" has the same meaning as in section 1303.03 of the Revised Code.

    (2) "Financial transaction device" has the same meaning as in section 113.40 of
    the Revised Code.

    (B) If a taxpayer or employer required by any tax administered by the department
    of taxation to pay taxes, penalties, interest, or other charges arising from unpaid
    taxes makes payment of the taxes, penalties, interest, or other charges with a
    dishonored instrument, an instrument that is determined to be nonnegotiable, or
    with any financial transaction device that is declined, returned, or dishonored,
    a penalty of fifty dollars shall be added to the amount due. The penalty imposed
    by this section shall be assessed and collected in the same manner as the taxes,
    penalties, interest, or other charges. All or part of any penalty imposed under
    this section may be abated by the tax commissioner. The commissioner may assess
    only one penalty under this section against the same instrument or the same financial
    transaction device for the same payment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.261
- number: '5703.262'
  heading: Commissioner may designate documents that must be signed by preparers -
    penalties
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) As used in this section:

    (1) "Document" means any report, return, schedule, statement, claim, or other
    document intended for submission to any state or county official or department
    concerning any tax administered by the department of taxation.

    (2) "Preparer" means any person who, for compensation, prepares for another, or
    assists another in preparing, any document.

    (B) The tax commissioner may designate documents that must be signed by preparers.
    If a preparer fails to sign a document designated by the commissioner and the
    unsigned document is submitted to the intended state or county official or department,
    a penalty of one hundred dollars shall be imposed upon the preparer who failed
    to sign the document.

    (C) If a false or fraudulent document is prepared by a preparer, who previously
    has been warned, in writing, by the tax commissioner concerning the consequences
    of continuing to file false or fraudulent documents, and the document is submitted
    to the intended state or county official or department, a penalty of one thousand
    dollars shall be imposed upon the preparer who prepared or assisted another in
    preparing the document, knowing it to be false or fraudulent.

    (D) All or part of any penalty imposed under division (B) or (C) of this section
    may be abated by the tax commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.262
- number: '5703.263'
  heading: Prohibited conduct by tax preparer; power of commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A)(1) "Tax return preparer" means any person other than an accountant or
    an attorney that operates a business that prepares, or directly or indirectly
    employs another person to prepare, for a taxpayer a tax return or application
    for refund in exchange for compensation or remuneration from the taxpayer or the
    taxpayer''s related member. The preparation of a substantial portion of a tax
    return or application for refund shall be considered to be the same as the preparation
    of the return or application for refund. "Tax return preparer" does not include
    an individual who performs only one or more of the following activities:

    (a) Furnishes typing, reproducing, or other mechanical assistance;

    (b) Prepares an application for refund or a return on behalf of an employer by
    whom the individual is regularly and continuously employed, or on behalf of an
    officer or employee of that employer;

    (c) Prepares as a fiduciary an application for refund or a return;

    (d) Prepares an application for refund or a return for a taxpayer in response
    to a notice of deficiency issued to the taxpayer or the taxpayer''s related member,
    or in response to a waiver of restriction after the commencement of an audit of
    the taxpayer or the taxpayer''s related member.

    (2) "Related member" has the same meaning as in section 5733.042 of the Revised
    Code.

    (3) "Accountant" means any of the following:

    (a) An individual who holds both a CPA certificate and an Ohio permit or Ohio
    registration issued by the accountancy board under section 4701.10 of the Revised
    Code;

    (b) An individual who holds a foreign certificate;

    (c) An individual who is employed by a public accounting firm with respect to
    any return prepared under the supervision of an individual described in division
    (A)(3)(a) or (b) of this section, regardless of whether the public accounting
    firm is required to register with the accountancy board under section 4701.04
    of the Revised Code.

    (4) "CPA certificate" and "foreign certificate" have the same meanings as in section
    4701.01 of the Revised Code.

    (5) "Attorney" means an individual who has been admitted to the bar by order of
    the supreme court in compliance with its prescribed and published rules, is permitted
    to practice as an attorney and counselor at law in this state under Chapter 4705.
    of the Revised Code, and is not currently suspended or removed from such practice
    under that chapter.

    (6) A tax return preparer engages in "prohibited conduct" if the preparer does
    any of the following:

    (a) Prepares any return or application for refund that includes an understatement
    of a taxpayer''s tax liability due to an unreasonable position or due to willful
    or reckless conduct. For the purposes of this division, "unreasonable position"
    and "willful or reckless conduct" have the meanings as used in section 6694 of
    the Internal Revenue Code.

    (b) When required under any provision of Title LVII of the Revised Code, the preparer
    fails to do any of the following:

    (i) Provide copies of a return or application for refund;

    (ii) Provide the preparer''s signature or federal preparer tax identification
    number on a return or application for refund;

    (iii) Retain copies of the preparer''s records;

    (iv) Provide any information or documents requested by the tax commissioner;

    (v) Act diligently in determining a taxpayer''s eligibility for tax credits, deductions,
    or exemptions.

    (c) Negotiates a check or other negotiable instrument issued to a taxpayer by
    the department of taxation without the permission of the taxpayer;

    (d) Engages in any conduct subject to criminal penalties under Title LVII of the
    Revised Code;

    (e) Misrepresents the preparer''s eligibility to file returns or applications
    for refund on behalf of taxpayers, or otherwise misrepresents the preparer''s
    experience or education;

    (f) Guarantees the payment of any tax refund or the allowance of any tax credit,
    deduction, or exemption;

    (g) Engages in any other fraudulent or deceptive conduct that substantially interferes
    with the proper administration of any provision of Title LVII of the Revised Code.

    (7) "State" means a state of the United States, the District of Columbia, the
    commonwealth of Puerto Rico, or any territory or possession of the United States.

    (B) When a tax return preparer engages in prohibited conduct, the commissioner,
    may do either or both of the following:

    (1) If the commissioner has previously warned the tax return preparer in writing
    of the consequences of continuing to engage in prohibited conduct, impose a penalty
    not exceeding one hundred dollars per instance of prohibited conduct;

    (2) Regardless of whether the commissioner has previously warned the tax return
    preparer, request that the attorney general apply to a court of competent jurisdiction
    for an injunction to restrain the preparer from further engaging in the prohibited
    conduct. The court may take either of the following actions:

    (a) If the court finds that injunctive relief is appropriate to prevent the recurrence
    of the prohibited conduct, the court shall issue an injunction against the preparer
    enjoining the preparer from engaging in such conduct.

    (b) If the court finds that the preparer has continually or repeatedly engaged
    in prohibited conduct, and that enjoining the preparer solely from engaging in
    such conduct would not be sufficient to prevent the preparer''s interference with
    the proper administration of any provision of Title LVII of the Revised Code,
    the court may issue an injunction against the preparer enjoining the preparer
    from acting as a tax return preparer in this state.

    If a tax return preparer has been enjoined from preparing tax returns or applications
    for refunds by a federal court or by another state court in the five years preceding
    the date on which an injunction is requested under this section, that prior injunction
    shall be sufficient to establish a prima facie case for the issuance of an injunction
    under division (B)(2) of this section.

    (C) The commissioner may require a tax return preparer to include the preparer''s
    name and federal preparer tax identification number when filing any return or
    application for refund. If a tax return preparer fails to include this information
    when required to do so by the commissioner, or if the information provided is
    false, inaccurate, or incomplete, the commissioner may impose a penalty of fifty
    dollars for each such failure, provided that the maximum penalty imposed on a
    preparer under this division in a calendar year shall not exceed twenty-five thousand
    dollars.

    (D) The penalties imposed under divisions (B)(1) and (C) of this section may be
    assessed and collected in the same manner as assessments made under Chapter 3769.,
    4305., 5727., 5728., 5733., 5735., 5736., 5739., 5743., 5745., 5747., 5749., 5751.,
    or 5753., section 718.90, or sections 3734.90 to 3734.9014 of the Revised Code.
    The commissioner may abate all or a portion of any penalty imposed under this
    section upon the showing of good cause by the tax return preparer.'
