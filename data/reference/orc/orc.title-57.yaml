    name: Cigarette Tax
  text: '(A) To provide revenue for the general revenue fund of the state, an excise
    tax is hereby levied on the storage, use, or other consumption of tobacco products
    or vapor products at one of the following rates:

    (1) For tobacco products other than little cigars or premium cigars, seventeen
    per cent of the wholesale price of the tobacco product.

