- number: '5703.47'
  heading: Definition of federal short term rate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) As used in this section, "federal short-term rate" means the rate of
    the average market yield on outstanding marketable obligations of the United States
    with remaining periods to maturity of three years or less, as determined under
    section 1274 of the "Internal Revenue Code of 1986," 100 Stat. 2085, 26 U.S.C.A.
    1274, for July of the current year.

    (B) On the fifteenth day of October of each year, the tax commissioner shall determine
    the federal short-term rate. For purposes of any section of the Revised Code requiring
    interest to be computed at the rate per annum required by this section, the rate
    determined by the commissioner under this section, rounded to the nearest whole
    number per cent, plus three per cent, shall be the interest rate per annum used
    in making the computation for interest that accrues during the following calendar
    year. For the purposes of sections 5719.041 and 5731.23 of the Revised Code, references
    to the "federal short-term rate" are references to the federal short-term rate
    as determined by the tax commissioner under this section rounded to the nearest
    whole number per cent.

    (C) Within ten days after the interest rate per annum is determined under this
    section, the tax commissioner shall notify the auditor of each county of that
    rate of interest.'
