  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.53
- number: '5726.54'
  heading: New markets tax credit
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) Any term used in this section has the same meaning as in section 5725.33
    of the Revised Code.

    (B) A taxpayer may claim a nonrefundable credit against the tax imposed by this
    chapter for each person included in the annual report of the taxpayer that holds
    a qualified equity investment on a credit allowance date occurring in the calendar
    year immediately preceding the tax year for which the tax is due. The credit shall
    be computed in the same manner prescribed for the computation of credits allowed
    under section 5725.33 of the Revised Code.

    By claiming a tax credit under this section, a taxpayer waives its rights under
    section 5726.20 of the Revised Code with respect to the time limitation for the
    assessment of taxes as it relates to credits claimed under this section that later
    become subject to recapture under division (D) of this section.

    A taxpayer may claim against the tax imposed by this chapter any unused portion
    of the credits authorized under sections 5725.33 and 5733.58 of the Revised Code,
    but only to the extent of the remaining carry forward period authorized by those
    sections.

    The credit shall be claimed in the order prescribed by section 5726.98 of the
    Revised Code. If the amount of the credit exceeds the amount of tax otherwise
    due after deducting all other credits preceding the credit in the order prescribed
    in section 5726.98 of the Revised Code, the excess may be carried forward for
    not more than four ensuing tax years.

    (C) The total amount of qualified equity investments on the basis of which credits
    may be claimed under this section and sections 5725.33, 5729.16, and 5733.58 of
    the Revised Code is subject to the limitation of division (C) of section 5725.33
    of the Revised Code.

    (D) If any amount of a federal tax credit allowed for a qualified equity investment
    for which a credit was received under this section is recaptured under section
    45D of the Internal Revenue Code, or if the director of development services determines
    that an investment for which a tax credit is claimed under this section is not
    a qualified equity investment or that the proceeds of an investment for which
    a tax credit is claimed under this section are used to make qualified low-income
    community investments other than in a qualified active low-income community business
    in this state, all or a portion of the credit received on account of that investment
    shall be paid by the taxpayer that received the credit to the tax commissioner.
    The amount to be recovered shall be determined by the director pursuant to rules
    adopted under section 5725.33 of the Revised Code. The director shall certify
    any amount due under this division to the tax commissioner, and the commissioner
    shall notify the taxpayer of the amount due. The amount due is payable not later
    than thirty days after the day the commissioner issues the notice. The amount
    due shall be considered to be tax due under section 5726.02 of the Revised Code,
    and may be collected by assessment without regard to the limitations imposed under
    section 5726.20 of the Revised Code for the assessment of taxes by the commissioner.
    All amounts collected under this division shall be credited as revenue from the
    tax levied under section 5726.02 of the Revised Code.'
