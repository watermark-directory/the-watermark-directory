- number: '5733.24'
  heading: Quo warranto proceedings
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: If any corporation fails to make and file the excise or franchise reports
    or returns required by law, or to pay the penalties provided by law for failure
    to make and file such reports or returns for a period of ninety days after the
    time prescribed by law, the attorney general, on the request of the tax commissioner,
    shall commence an action in quo warranto in the court of appeals of the county
    in which such corporation has its principal place of business to forfeit and annul
    its privileges and franchises. If the court is satisfied that any such corporation
    is in default, it shall render judgment ousting such corporation from the exercise
    of its privileges and franchises within this state, and shall otherwise proceed
    as provided in sections 2733.02 to 2733.39, inclusive, of the Revised Code.
