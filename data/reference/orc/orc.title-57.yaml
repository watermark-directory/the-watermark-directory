- number: '5711.24'
  heading: Power of tax commissioner to assess taxable property - assessment certificate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: The tax commissioner shall assess all taxable property, except property listed
    in returns which the county auditor is required to assess as his deputy, and shall
    list and assess all such property which is not returned for taxation, and for
    that purpose shall have and exercise all powers vested in him by law for the purpose
    of administering any law which he is required to administer. The action of the
    assessor in assessing taxable property under sections 5711.01 to 5711.36, inclusive,
    of the Revised Code, shall be taken as to taxable property required to be listed
    in a return, whether listed or not, and whether such return has been made or not.
    Such action shall be evidenced by a preliminary or final assessment certificate
    in such form as the commissioner prescribes, and when issued by the commissioner
    it shall be under his official seal. The filing of a return with the county auditor
    pursuant to sections 5711.01 to 5711.36, inclusive, of the Revised Code, shall
    be deemed to be the preliminary assessment of the taxable property contained therein
    when entered on the proper duplicate by the county auditor. Each such certificate
    shall show in what taxing district in the county such property is assessable,
    as provided in sections 5711.01 to 5711.36, inclusive, of the Revised Code. Neither
    such certificate issued by the commissioner nor his action with respect thereto
    shall be required to be entered on the record of the proceedings of the commissioner,
    nor shall either be open to public inspection.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.24
- number: '5711.25'
  heading: Procedure in dealing with assessment certificates - final certificates
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'On or before the second Monday of August, annually, the tax commissioner
    shall transmit to the county auditor of each county the preliminary assessment
    certificates pertaining to the auditor''s county of taxpayers having taxable property
    in more than one county. The commissioner shall transmit to the auditor any amended
    assessment certificate issued by the commissioner, and the auditor shall transmit
    to the commissioner copies of all amended assessment certificates made and issued
    by the auditor. Each preliminary assessment certificate, and if amended such preliminary
    assessment certificate as last amended, shall become final on the second Monday
    of August of the second year after the filing of a return with the county auditor
    or after the certification of the preliminary assessment certificate, or sixty
    days after the certification of an amended assessment certificate which has been
    issued less than sixty days prior to such second Monday of August; unless prior
    to the expiration of said period or extended period one of the following occurred:

    (A) A final assessment certificate as to the taxpayer represented thereby has
    been issued pursuant to section 5711.26 of the Revised Code;

    (B) Such taxpayer in writing has waived such time limitation and consented to
    the issuance of the taxpayer''s assessment certificate after the expiration of
    such time limitation, in which case the assessment certificate issued after the
    expiration of such time limitation, if an amended preliminary assessment certificate,
    shall become final sixty days after the mailing of the notice of such assessment
    if no petition for reassessment of the assessment has been filed pursuant to section
    5711.31 of the Revised Code;

    (C) A petition for reassessment of the assessment represented thereby has been
    filed pursuant to section 5711.31 of the Revised Code, in which event the filing
    of such petition shall waive such time limitation and be a consent to the issuance
    of the petitioner''s final assessment certificate at the time, under the circumstances,
    and by the authority provided by any law relating to further administrative or
    judicial review of the assessment represented thereby; provided that in the event
    of the dismissal of such petition by the petitioner, the assessment shall become
    final as provided in this section as though no petition for reassessment had been
    filed. This section does not deprive any taxpayer who has not received the notice
    prescribed by section 5711.31 of the Revised Code at least sixty days prior to
    the expiration of such period of limitation of the right to file such petition
    for reassessment. This section shall apply to all assessments made and certified
    under sections 5711.01 to 5711.36, 5725.08, and 5725.16 of the Revised Code.

    The assessment certificates and copies thereof mentioned in this section shall
    not be open to public inspection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.25
- number: '5711.26'
  heading: Commissioner may make certain final assessments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'Except for taxable property concerning the assessment of which an appeal
    has been filed under section 5717.02 of the Revised Code, the tax commissioner
    may, within the time limitation in section 5711.25 of the Revised Code, and shall,
    upon application filed within such time limitation in accordance with the requirements
    of this section, finally assess the taxable property required to be returned by
    any taxpayer, financial institution, dealer in intangibles, or domestic insurance
    company as to which a preliminary or amended assessment has been made by or certified
    to a county auditor or certified to the treasurer of state or as to which the
    preliminary assessment is evidenced by a return filed with a county auditor for
    any prior year; and the commissioner may finally assess the taxable property of
    a taxpayer, financial institution, dealer in intangibles, or domestic insurance
    company who has failed to make a return to a county auditor or to the department
    of taxation in any such year. Application for final assessment shall be filed
    with the tax commissioner in person or by certified mail. If the application is
    filed by certified mail, the date of the United States postmark placed on the
    sender''s receipt by the postal employee to whom the application is presented
    shall be treated as the date of filing. The application shall have attached thereto
    and incorporated therein by reference a true copy of the most recent preliminary
    or amended assessment, whether evidenced by certificate or return, to which correction
    is sought through the issuance of a final assessment certificate. The application
    shall also have attached thereto and incorporated therein by reference evidence
    establishing that the taxes, and any penalties and interest thereon, due on such
    preliminary or amended assessment have been paid. By filing such application within
    the time prescribed by section 5711.25 of the Revised Code, the taxpayer has waived
    such time limitation and consented to the issuance of his assessment certificate
    after the expiration of such time limitation.

    For the purpose of issuing a final assessment the commissioner may utilize all
    facts or information he possesses, and shall certify in the manner prescribed
    by law a final assessment certificate in such form as the case may require, giving
    notice thereof by mail to the taxpayer, financial institution, dealer in intangibles,
    or domestic insurance company. Such final assessment certificate shall set forth,
    as to each year covered, the amount of the final assessment as to each class of
    property and the amount of the corresponding preliminary or last amended assessment.
    If no preliminary or amended assessment was made, the amount listed in the taxpayer''s
    return for each such class of property shall be shown. If the amount of any final
    assessment of any such class for any year exceeds the amount of the preliminary
    or amended assessment of such class for such year, the difference shall be designated
    a "deficiency," and if no preliminary or amended assessment has been made, each
    item in the final assessment certificate shall be so designated. If the final
    assessment of any such class for any such year is less in amount than the preliminary
    or amended assessment thereof for such year, the difference shall be designated
    an "excess." The commissioner shall add to each such deficiency assessment the
    penalty provided by law, computed on the amount of such deficiency.

    A copy of the final assessment certificate shall be transmitted to the treasurer
    of state or the proper county auditor, who shall make any corrections to his records
    and tax lists and duplicates required in accordance therewith and proceed as prescribed
    by section 5711.32 or 5725.22 of the Revised Code.

    An appeal may be taken from any assessment authorized by this section to the board
    of tax appeals as provided by section 5717.02 of the Revised Code. When such an
    appeal is filed and the notice of appeal filed with the commissioner has attached
    thereto and incorporated therein by reference a true copy of any assessment authorized
    by this section as required by section 5717.02 of the Revised Code, the commissioner
    shall notify the treasurer of state or the auditor and treasurer of each county
    having any part of such assessment entered on the tax list or duplicate.

    Upon the final determination of an appeal which may be taken from an assessment
    authorized by this section, the commissioner shall notify the treasurer of state
    or the proper county auditor of such final determination. The notification may
    be in the form of a corrected assessment certificate. Upon receipt of the notification,
    the treasurer of state or the county auditor shall make any corrections to his
    records and tax lists and duplicates required in accordance therewith and proceed
    as prescribed by section 5711.32 or 5725.22 of the Revised Code.

    The assessment certificates mentioned in this section, and the copies thereof,
    shall not be open to public inspection.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.26
- number: '5711.27'
  heading: Penalty assessment for failure to make return or list or disclose all taxable
    property - personal liability of fiduciary
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'No taxpayer shall fail to make a return within the time prescribed by law,
    or as extended pursuant to section 5711.04 of the Revised Code, nor fail to list
    in a return or disclose on an accompanying balance sheet or in other information
    filed with the return any item of taxable property the taxpayer is required to
    list in the return under sections 5711.01 to 5711.36 of the Revised Code.

    If any taxpayer fails to make a timely return, or fails to list or disclose any
    item the taxpayer is required to return, the assessor shall add to the assessment
    of each class or item of taxable property the taxpayer failed to return, list,
    or disclose a penalty of up to fifty per cent of the assessment; but if such taxpayer
    makes, within sixty days after the expiration of the time prescribed by such sections,
    a return or an amended or supplementary return and lists therein or discloses
    on an accompanying balance sheet or in other information filed with the return
    all items of taxable property the taxpayer is required by such sections to list,
    and in all cases in which the taxpayer''s only default is the failure to pay the
    amounts specified in section 5719.02 of the Revised Code within the time therein
    specified, such penalty shall be five per cent of the assessment, and, if the
    assessment certificate has been issued, an amended assessment certificate shall
    be issued and substituted therefor.

    The penalty provided in this section may be abated in whole or in part by the
    assessor when it is shown that such failure is due to reasonable cause. The penalty
    assessment shall be entered on the proper tax list and duplicate, and taxes shall
    be levied thereon the same as on the assessment itself.

    A fiduciary against whom a penalty assessment is made shall be personally liable
    for the amount of taxes levied in respect to such penalty assessment and any additional
    charge, and in case of fraud or intent to evade taxes, such fiduciary shall have
    no right of reimbursement against the property held by the fiduciary as such fiduciary
    nor against the person for whose benefit the same is held.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.27
- number: '5711.28'
  heading: Unreasonable accumulation of profits by corporation - accumulation of trust
    income - assessment by commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'Whenever the assessor imposes a penalty prescribed by section 5711.27 or
    5725.17 of the Revised Code, the assessor shall send notice of such penalty assessment
    to the taxpayer by mail. If the notice also reflects the assessment of any property
    not listed in or omitted from a return, or the assessment of any item or class
    of taxable property listed in a return by the taxpayer in excess of the value
    or amount thereof as so listed, or without allowing a claim duly made for deduction
    from the net book value of accounts receivable, or depreciated book value of personal
    property used in business, so listed, and the taxpayer objects to one or more
    of such corrections in addition to the penalty, the taxpayer shall proceed as
    prescribed by section 5711.31 of the Revised Code, but if no such correction is
    reflected in the notice, or if the taxpayer does not object to any such correction
    made, the taxpayer shall proceed as prescribed herein.

    Within sixty days after the mailing of the notice of a penalty assessment prescribed
    by this section, the taxpayer may file with the tax commissioner, in person or
    by certified mail, a petition for abatement of such penalty assessment. If the
    petition is filed by certified mail, the date of the United States postmark placed
    on the sender''s receipt by the postal employee to whom the petition is presented
    shall be treated as the date of filing. The petition shall have attached thereto
    and incorporated therein by reference a true copy of the notice of assessment
    complained of, but the failure to attach a copy of such notice and incorporate
    it by reference does not invalidate the petition. The petition shall also indicate
    that the taxpayer''s only objection is to the assessed penalty and the reason
    for such objection.

    Upon the filing of a petition for abatement of penalty, the commissioner shall
    notify the treasurer of state or the auditor and treasurer of each county having
    any part of the penalty assessment entered on the tax list or duplicate. The commissioner
    shall review the petition without the need for hearing. If it appears that the
    failure of the taxpayer to timely return or list as required under this chapter,
    or to file a complying report and pay tax under Chapter 5725. of the Revised Code,
    whichever the case may be, was due to reasonable cause and not willful neglect,
    the commissioner may abate in whole or in part the penalty assessment. The commissioner
    shall transmit a certificate of the commissioner''s determination to the taxpayer,
    and if no appeal is taken therefrom as provided by law, or upon the final determination
    of an appeal which may be taken, the commissioner shall notify the treasurer of
    state or the proper county auditor of such final determination. If the final determination
    orders abatement of the penalty assessment, the notification may be in the form
    of an amended assessment certificate. Upon receipt of the notification, the treasurer
    of state or county auditor shall make any corrections to the treasurer''s or auditor''s
    records and tax lists and duplicates required in accordance therewith and proceed
    as prescribed by section 5711.32 or 5725.22 of the Revised Code.

    The decision of the commissioner shall be final with respect to the percentage
    of penalty, if any, the commissioner finds appropriate, but neither the commissioner''s
    decision nor a final judgment of the board of tax appeals or any court to which
    such final determination may be appealed shall finalize the assessment of such
    property.'
