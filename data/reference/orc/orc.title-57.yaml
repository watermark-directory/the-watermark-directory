- number: '5743.025'
  heading: Return for county tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: In addition to the return required by section 5743.03 of the Revised Code,
    each retail dealer of cigarettes in a county in which a tax is levied under section
    5743.021, 5743.024, or 5743.026 of the Revised Code shall, within thirty days
    after the date on which the tax takes effect, make and file a return, on forms
    prescribed by the tax commissioner, showing the total number of cigarettes which
    such retail dealer had on hand as of the beginning of business on the date on
    which the tax takes effect, and such other information as the commissioner deems
    necessary for the administration of section 5743.021, 5743.024, or 5743.026 of
    the Revised Code. Each such retail dealer shall deliver the return together with
    a remittance of the additional amount of tax due on the cigarettes shown on such
    return to the commissioner. Any retail dealer of cigarettes who fails to file
    a return under this section shall, for each day the retail dealer so fails, forfeit
    and pay into the state treasury the sum of one dollar as revenue arising from
    the tax imposed by section 5743.021, 5743.024, or 5743.026 of the Revised Code,
    and such sum may be collected by assessment in the manner provided in section
    5743.081 of the Revised Code. For thirty days after the effective date of a tax
    imposed by section 5743.021, 5743.024, or 5743.026 of the Revised Code, a retail
    dealer may possess for sale or sell in the county in which the tax is levied cigarettes
    not bearing the stamp required by section 5743.03 of the Revised Code to evidence
    payment of the county tax but on which the tax has or will be paid.
