- number: '5713.13'
  heading: Plat and record of tracts of indefinite description
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: When an original survey, section, tract, or lot has become divided into such
    small parcels or fractions so that the description of the several parts thereof
    is indefinite and doubtful, the county auditor when appraising any such survey,
    section, tract, or lot, or part thereof, shall cause the said section, or such
    parts thereof as are necessary, to be accurately platted and laid out into such
    subdivisions as the different titles to the land therein require, and number the
    said fractions or subdivisions as fractions or subdivisions of said section, tract,
    or lot, or part thereof, or the part that is subdivided, and deliver the plat
    so numbered to the county recorder, who shall accurately record it. After such
    record has been made, the numbers given to said subdivisions or fractions shall
    be a sufficient description of land so platted, numbered, and recorded for all
    purposes of taxation and conveyancing.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.13
- number: '5713.14'
  heading: County auditor may require production of title papers and surveys
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: When the assessor has neglected to plat and number the divisions, mentioned
    in section 5713.13 of the Revised Code or the survey, section, tract, lot, or
    part thereof, is subdivided after the assessement and appraisal thereof, and the
    county auditor believes it should be platted and numbered for the purpose of a
    pertinent description thereof upon his duplicate, the auditor may require the
    owner or occupier of such section, tract, lot, or part thereof, to produce to
    him at his office the title papers and surveys of the several subdivisions thereof,
    as well as of the survey, section, tract, lot, or part thereof, subdivided, on
    a day certain, not longer than thirty nor less than ten days from the date of
    the notice.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.14
- number: '5713.15'
  heading: County auditor may require owner to make survey - auditor may make survey
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: If the owner or occupier of a subdivided survey, section, tract, lot, or part
    thereof fails to appear when required, and to produce the title papers, or produces
    them in such manner that the county auditor cannot plat and number said subdivisions
    without a survey, the auditor may require such owner or occupier to cause such
    subdivisions to be surveyed, platted, and numbered within twenty days, and to
    deliver said survey and plat to the county recorder for record. If such survey
    and plat is not made and delivered to the recorder within the time required, or
    the owner or occupier has not appeared when required, the auditor may cause the
    subdivision of such survey, section, tract, lot, or part thereof, to be surveyed,
    platted, and numbered by the county engineer and recorded by the recorder. The
    expense of the survey and record made by the order of the auditor shall be reported
    to him by the engineer and recorder, and the auditor shall add the expense to
    the tax on such subdivisions in proportion to the quantity of land in each. The
    expenses shall be collected as are other taxes against the land, and when collected
    paid over to the parties entitled thereto on the warrant of the auditor.
