- number: '5747.22'
  heading: Apportioning and allocating income and deductions of pass-through entities
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: '(A) This section applies solely for the purposes of computing the credit
    allowed under division (A) of section 5747.05 of the Revised Code and computing
    income taxable in this state under division (D) of section 5747.08 of the Revised
    Code.

    (B) With respect to a pass-through entity, one or more of the pass-through entity
    investors of which are liable for the tax imposed by section 5747.02 of the Revised
    Code, the business income and deductions of the pass-through entity shall be apportioned
    to this state in the hands of the pass-through entity investors pursuant to section
    5747.21 of the Revised Code. The business income and deductions as thus apportioned
    to this state then shall be allocated to the pass-through entity investors in
    proportion to their right to share in that business income.

    (C) With respect to a pass-through entity described in division (B) of this section,
    the nonbusiness income and deductions of the pass-through entity shall be allocated
    to the pass-through entity investors in proportion to their right to share in
    the nonbusiness income, and then the pass-through entity shares shall be allocated
    to this state in the hands of each pass-through entity investor pursuant to section
    5747.20 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5747.22
- number: '5747.221'
  heading: Items of income and deductions not to be allocated or apportioned to Ohio
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: '(A) As used in this section, "investment pass-through entity" has the same
    meaning as in section 5733.401 of the Revised Code.

    (B) Except as provided in division (C) of this section, for the purposes of sections
    5747.20, 5747.21, and 5747.22 of the Revised Code, no item of income or deduction
    shall be allocated or apportioned to this state to the extent that such item represents
    the portion of an adjusted qualifying amount for which the withholding tax is
    not imposed under section 5747.41 of the Revised Code by reason of division (C)
    of section 5733.401 of the Revised Code. This section shall be applied without
    regard to division (I) of section 5733.40 of the Revised Code.

    (C) If a taxpayer has a direct or indirect investment in an investment pass-through
    entity that has a direct or indirect investment in any other pass-through entity,
    division (B) of this section does not apply to any item of income, gain, deduction,
    or loss where, under section 5747.231 of the Revised Code, the item is directly
    or indirectly attributable to either of the following:

    (1) A distributive share of income or gain from a pass-through entity that does
    not qualify as an investment pass-through entity;

    (2) A pass-through entity''s income or gain to which division (C) of section 5733.401
    of the Revised Code does not apply.

    An indirect investment includes any interest that a person constructively owns
    on account of the attribution rules set forth in section 267, 318, or 1563 of
    the Internal Revenue Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5747.221
- number: '5747.23'
  heading: Taxing trust income
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: '(A) With respect to a trust, one or more of the beneficiaries of which are
    liable for the tax imposed by section 5747.02 of the Revised Code, the business
    income and deductions included in the income of such trust shall be allocated
    to this state in the hands of such trust pursuant to section 5747.21 of the Revised
    Code. Such trust business income and deductions shall then be allocated to the
    beneficiaries in proportion to their right to share in the business income of
    such trust to the extent of the distribution made to the beneficiary.

    (B) With respect to a trust described in division (A) of this section, the nonbusiness
    income and deductions included in the income of such trust shall be allocated
    to the beneficiaries in proportion to their right to share in such income and
    deductions of the trust, and then the share of each beneficiary shall be allocated
    to this state in the hands of such beneficiary pursuant to section 5747.20 of
    the Revised Code.'
