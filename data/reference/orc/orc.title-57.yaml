- number: '5709.67'
  heading: Duties of director of development and tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) Except as otherwise provided in sections 5709.61 to 5709.69 of the Revised
    Code, the director of development shall administer those sections and shall adopt
    rules necessary to implement and administer the enterprise zone program. The director
    shall assign to each zone currently certified a unique designation by which the
    zone shall be identified for purposes of administering sections 5709.61 to 5709.69
    of the Revised Code. The tax commissioner shall administer all other tax incentives
    provided under sections 5709.61 to 5709.69 of the Revised Code and shall adopt
    rules necessary to carry out that duty. No tax incentive qualification certificate
    or employee tax credit certificate shall be issued or remain in effect unless
    the enterprise applying for or holding the certificate complies with all such
    rules. The director of job and family services shall administer the incentive
    provided under division (B)(1) of section 5709.66 of the Revised Code and shall
    adopt rules necessary to carry out that duty. No extension of benefits certificate
    shall be issued or remain in effect unless the enterprise applying for or holding
    the certificate complies with all such rules.

    (B) Not later than the first day of August each year, the director of development
    shall report to the general assembly on all of the following for the preceding
    calendar year:

    (1) The cost to the state of the tax and other incentives provided under sections
    5709.61 to 5709.69 of the Revised Code;

    (2) The number of tax incentive qualification certificates, employee tax credit
    certificates, and extension of benefits certificates issued;

    (3) The names of the municipal corporations and counties that have entered agreements
    under sections 5709.62, 5709.63, and 5709.632 of the Revised Code;

    (4) The number of new employees hired as a result of the tax and other incentives
    provided under sections 5709.61 to 5709.69 of the Revised Code;

    (5) Information on agreement terms concerning school district revenue that are
    not provided for in section 5709.631 of the Revised Code and that are forwarded
    to the director under division (H) of section 5709.62, division (H) of section
    5709.63, or division (G) of section 5709.632 of the Revised Code.

    The report shall include a finding by the director as to whether the incentives
    provided under sections 5709.61 to 5709.69 of the Revised Code have resulted in
    the creation of more positions in the state than would have been created without
    the incentives. The director shall send a copy of the report to each member of
    the general assembly and to the director of the legislative service commission.'
