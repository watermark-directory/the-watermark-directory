  url: https://codes.ohio.gov/ohio-revised-code/section-5721.10
- number: '5721.11'
  heading: Notice to purchasers of delinquent lands
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: The county auditor shall enter upon the county auditor's tax list and county
