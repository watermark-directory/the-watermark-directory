  chapter:
    num: '5743'
    name: Cigarette Tax
  text: '(A) A wholesale dealer may affix stamps only to packages of cigarettes that
    the dealer received directly from a manufacturer or importer of cigarettes that
    possesses a valid and current license under section 5743.15 of the Revised Code,
    or to packages of cigarettes that the dealer received from another wholesale dealer
    that possesses a valid and current license under section 5743.15 of the Revised
    Code, provided that the tax commissioner has authorized the sale of the cigarettes
    between those wholesale dealers and that the wholesale dealer that sells the cigarettes
    received them directly from a manufacturer or importer of cigarettes that possesses
    a valid and current license under section 5743.15 of the Revised Code.

    (B) Only a wholesale dealer that possesses a valid and current license under section
    5743.15 of the Revised Code may purchase or obtain tax stamps. A wholesale dealer
    may not sell or provide such stamps to any other wholesale dealer or any other
    person.

    (C) Any person shipping unstamped packages of cigarettes into this state to a
    person other than a wholesale dealer licensed under section 5743.15 of the Revised
    Code shall, before such shipment, file notice of the shipment with the tax commissioner.
    Any person that transports unstamped packages of cigarettes into or within this
    state shall carry in the vehicle used to convey the shipment invoices or equivalent
    documentation of the shipment for all cigarettes in the shipment. The invoices
    or other documentation shall show the true name and address of the consignor or
    seller, the true name and address of the consignee or purchaser, and the quantity
    of the cigarettes being transported. This division does not apply to any for-hire
    motor carrier transporting cigarettes through this state to another location under
    a proper bill of lading or freight bill that states the quantity, source, and
    destination of the cigarettes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.031
- number: '5743.04'
  heading: Powers and duties of tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: The tax commissioner shall design and procure the stamps provided for in section
    5743.03 of the Revised Code and shall enforce and administer sections 5743.01
    to 5743.44 of the Revised Code. With respect to packages containing any number
    of cigarettes other than twenty, if the commissioner finds that it is practicable
    to collect the taxes levied under sections 5743.02, 5743.021, 5743.024, and 5743.026
    of the Revised Code by any method other than that provided in this section and
    section 5743.03 of the Revised Code, the commissioner may by rule prescribe such
    other method for payment of the taxes upon such packages of cigarettes as will
    adequately protect the revenue; provided, that in any case where the commissioner
    prescribes that the taxes upon such packages of cigarettes shall be paid on the
    basis of returns filed by a wholesale or retail dealer, said returns, together
    with a remittance of all taxes due as shown thereon, shall be filed with the commissioner
    not later than the tenth day of the month following the month in which such cigarettes
    are sold in this state. The commissioner may promulgate rules in accordance with
    sections 119.01 to 119.13 of the Revised Code as the commissioner deems necessary
    to carry out sections 5743.01 to 5743.44 of the Revised Code and may adopt different
    detailed rules applicable to diverse methods and conditions of sale of cigarettes,
    prescribing, in each class of cases, upon whom, as between the wholesale dealer
    and the retail dealer, the primary duty of affixing stamps shall rest, and the
    manner in which stamps shall be affixed. A copy of such rules shall be furnished
    to every licensed dealer as provided in sections 119.01 to 119.13 of the Revised
    Code. Any such rule so furnished which excuses a wholesale dealer from affixing
    stamps under the circumstances of the particular case shall be a defense in the
    prosecution of such dealer for violation of section 5743.03 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.04
- number: '5743.05'
  heading: Sale of stamps; delivery; redemption of stamps
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: 'The tax commissioner shall sell all stamps provided for by section 5743.03
    of the Revised Code. The stamps shall be sold at their face value, except the
    commissioner shall, by rule, authorize the sale of stamps to wholesale dealers
    in this state, or to wholesale dealers outside this state, at a discount of not
    less than one and eight-tenths per cent or more than ten per cent of their face
    value, as a commission for affixing and canceling the stamps.

    The commissioner, by rule, shall authorize the delivery of stamps to wholesale
    dealers in this state and to wholesale dealers outside this state on credit. If
    such a dealer has not been in good credit standing with this state for five consecutive
    years preceding the purchase, the commissioner shall require the dealer to file
    with the commissioner a bond to the state in the amount and in the form prescribed
    by the commissioner, with surety to the satisfaction of the commissioner, conditioned
    on payment to the commissioner within thirty days or the following twenty-third
    day of June, whichever comes first for stamps delivered within that time. If such
    a dealer has been in good credit standing with this state for five consecutive
    years preceding the purchase, the commissioner shall not require that the dealer
    file such a bond but shall require payment for the stamps within thirty days after
    purchase of the stamps or the following twenty-third day of June, whichever comes
    first. Stamps sold to a dealer not required to file a bond shall be sold at face
    value. The maximum amount that may be sold on credit to a dealer not required
    to file a bond shall equal one hundred ten per cent of the dealer''s average monthly
    purchases over the preceding calendar year. The maximum amount shall be adjusted
    to reflect any changes in the tax rate and may be adjusted, upon application to
    the commissioner by the dealer, to reflect changes in the business operations
    of the dealer. The maximum amount shall be applicable to the period between the
    first day of July to the following twenty-third day of June. Payment by a dealer
    not required to file a bond shall be remitted by electronic funds transfer as
    prescribed by section 5743.051 of the Revised Code. If a dealer not required to
    file a bond fails to make the payment in full within the required payment period,
    the commissioner shall not thereafter sell stamps to that dealer until the dealer
    pays the outstanding amount, including penalty and interest on that amount as
    prescribed in this chapter, and the commissioner thereafter may require the dealer
    to file a bond until the dealer is restored to good standing. The commissioner
    shall limit delivery of stamps on credit to the period running from the first
    day of July of the fiscal year until the twenty-third day of the following June.
    Any discount allowed as a commission for affixing and canceling stamps shall be
    allowed with respect to sales of stamps on credit.

    The commissioner shall redeem and pay for any destroyed, unused, or spoiled tax
    stamps at their net value, and shall refund to wholesale dealers the net amount
    of state and county taxes paid erroneously or paid on cigarettes that have been
    sold in interstate or foreign commerce or that have become unsalable, and the
    net amount of county taxes that were paid on cigarettes that have been sold at
    retail or for retail sale outside a taxing county.

    An application for a refund of tax shall be filed with the commissioner, on the
    form prescribed by the commissioner for that purpose, within three years from
    the date the tax stamps are destroyed or spoiled, from the date of the erroneous
    payment, or from the date that cigarettes on which taxes have been paid have been
    sold in interstate or foreign commerce or have become unsalable.

    On the filing of the application, the commissioner shall determine the amount
    of refund to which the applicant is entitled, payable from receipts of the state
    tax, and, if applicable, payable from receipts of a county tax. If the amount
    is not less than that claimed, the commissioner shall certify the amount to the
    director of budget and management and treasurer of state for payment from the
    tax refund fund created by section 5703.052 of the Revised Code. If the amount
    is less than that claimed, the commissioner shall proceed in accordance with section
    5703.70 of the Revised Code.

    If a refund is granted for payment of an illegal or erroneous assessment issued
    by the department, the refund shall include interest on the amount of the refund
    from the date of the overpayment. The interest shall be computed at the rate per
    annum prescribed by section 5703.47 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.05
- number: '5743.051'
  heading: Remitting payment for tax stamps by electronic funds transfer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: 'This section applies to any wholesale or retail cigarette dealer required
    by section 5743.05 of the Revised Code to remit payment for tax stamps electronically.
    The tax commissioner shall notify each dealer of the dealer''s obligation to do
    so and shall maintain an updated list of those dealers. Failure by the commissioner
    to notify a dealer subject to this section to remit taxes electronically does
    not relieve the dealer of its obligation to remit taxes in that manner.

    A dealer required to remit payments electronically shall remit such payments to
    the commissioner in the manner approved by the commissioner and within the time
    prescribed for such a dealer by section 5743.05 of the Revised Code.

    A dealer required to remit taxes electronically may apply to the commissioner
    in the manner prescribed by the commissioner to be excused from that requirement.
    The commissioner may excuse the dealer from electronic remittance for good cause
    shown for the period of time requested by the dealer or for a portion of that
    period.

    If a dealer required to remit taxes electronically remits those taxes by some
    other means, and the commissioner determines that such failure was not due to
    reasonable cause or was due to willful neglect, the commissioner may collect an
    additional charge by assessment in the manner prescribed by section 5743.081 of
    the Revised Code. The additional charge shall equal five per cent of the amount
    of the taxes required to be paid electronically but shall not exceed five thousand
    dollars. Any additional charge assessed under this section is in addition to any
    other penalty or charge imposed under this chapter and shall be considered as
    revenue arising from taxes imposed under this chapter. The commissioner may abate
    all or a portion of such a charge and may adopt rules governing such remissions.

    No additional charge shall be assessed under this section against a dealer that
    has been notified of its obligation to remit taxes electronically under this section
    and that remits its first two tax payments after such notification by some other
    means. The additional charge may be assessed upon the remittance of any subsequent
    tax payment that the dealer remits by some means other than electronically.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.051
- number: '5743.071'
  heading: Wholesale and retail dealers to maintain records
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: 'Every person shall maintain complete and accurate records of all purchases
    and sales of cigarettes, and shall procure and retain all invoices, bills of lading,
    and other documents relating to the purchases and sales of cigarettes, except
    that no retail dealer shall be required to issue or maintain invoices relating
    to the retail dealer''s sales of cigarettes. The invoices or documents shall be
    maintained for each place of business and shall show the name and address of the
    other party to the purchase or sale and shall show the quantity of the cigarettes
    so sold or purchased.

    The records and documents shall be open during business hours to the inspection
    of the tax commissioner, and shall be preserved for a period of three years, unless
    the commissioner, in writing, consents to their destruction within that period,
    or by order requires that they be kept for a longer period. With the tax commissioner''s
    consent, a person with multiple places of business may keep centralized records
    but shall transmit duplicates of the invoices or documents to each place of business
    within seventy-two hours after the tax commissioner or the tax commissioner''s
    designee requests access to the records.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.071
