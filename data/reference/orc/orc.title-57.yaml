- number: '5727.38'
  heading: Excise tax on gross receipts of certain public utilities
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: On or before the first Monday of November, annually, the tax commissioner
    may assess an excise tax against a public utility subject to the excise tax under
    section 5727.30 of the Revised Code. The tax shall be computed by multiplying
    the taxable gross receipts as determined by the commissioner under section 5727.33
    of the Revised Code by six and three-fourths per cent in the case of pipe-line
    companies, and four and three-fourths per cent in the case of all other companies.
    The minimum tax for any such company for owning property or doing business in
    this state shall be fifty dollars. The assessment shall be served on the public
    utility in the manner prescribed by section 5703.37 of the Revised Code.
