- number: '5740.03'
  heading: Development of streamlined sales and use tax system
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5740'
    name: Simplified Sales And Use Tax Administration Act
  text: Subject to section 5740.05 of the Revised Code, the tax commissioner may enter
    into the agreement with one or more states. In furtherance of the agreement, the
    commissioner may act jointly with other member states to establish standards for
    certification of service providers and automated systems, establish performance
    standards for multi-state sellers, and procure goods and services. The commissioner
    may take other actions reasonably required to implement this chapter, including
    adopting rules.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5740.03
- number: '5740.04'
  heading: Interstate agreements
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5740'
    name: Simplified Sales And Use Tax Administration Act
  text: '(A) No provision of the agreement, in whole or in part, invalidates or amends
    the law of this state. Adoption of the agreement by this state does not amend
    the law of this state. Implementation in this state of any condition of the agreement,
    whether adopted before, at, or after membership of this state in the agreement,
    must be by the action of this state.

    (B) The agreement is an accord among individual cooperating sovereigns in furtherance
    of their governmental functions. The agreement provides a mechanism among the
    member states to establish and maintain a cooperative, simplified system for the
    application and administration of sales and use taxes under the duly adopted laws
    of each member state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5740.04
- number: '5740.05'
  heading: Effect of interstate agreement on other laws
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5740'
    name: Simplified Sales And Use Tax Administration Act
  text: 'The tax commissioner shall not enter into the agreement unless the agreement
    requires each state to meet the requirements set forth in divisions (A) to (I)
    of this section. The agreement shall:

    (A) Set restrictions to limit over time the number of state sales and use tax
    rates;

    (B) Establish uniform standards for attributing the source of transactions to
    taxing jurisdictions, the administration of exempt sales, and sales and use tax
    returns and remittances;

    (C) Provide a central, electronic registration system that allows a seller to
    register to collect sales and use taxes for, and remit them to, all member states;

    (D) Provide that registration with the central registration system and the collection
    of sales and use taxes in the member states will not be used as a factor in determining
    whether the seller has nexus with a state for any tax;

    (E) Provide for reduction of the burdens of complying with local sales and use
    taxes through the following:

    (1) Restricting variances between the state and local tax bases;

    (2) Requiring states to administer any sales and use taxes levied by local jurisdictions
    within the states so that sellers collecting and remitting those taxes will not
    have to register or file returns with, remit funds to, or be subject to independent
    audits from, local taxing jurisdictions;

    (3) Restricting the frequency of changes in the local sales and use tax rates
    and setting effective dates for the application of local jurisdictional boundary
    changes to local sales and use taxes;

    (4) Providing notice to sellers and certified service providers of changes in
    local sales and use tax rates and in the boundaries of local taxing jurisdictions.

    (F) Outline any monetary allowances that are to be provided by the member states
    to sellers or certified service providers. The agreement must allow for a joint
    public and private sector study of the compliance cost on sellers and certified
    service providers to collect sales and use taxes for state and local governments
    under various levels of complexity.

    (G) Require each state to certify compliance with the terms of the agreement prior
    to becoming a member of the agreement, and to maintain compliance, under the laws
    of the member state, with all provisions of the agreement while a member;

    (H) Require each member state to adopt a uniform policy for certified service
    providers that protects the privacy of consumers and maintains the confidentiality
    of tax information;

    (I) Provide for the appointment of an advisory council of private sector representatives
    and an advisory council of non-member state representatives to consult with in
    the administration of the agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5740.05
- number: '5740.06'
  heading: Requirements for agreement
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5740'
    name: Simplified Sales And Use Tax Administration Act
  text: '(A) The agreement binds and inures only to the benefit of this state and
    the other member states. No person, other than a member state, is an intended
    beneficiary of the agreement. Any benefit to a person other than a state is established
    by the law of this state and the other member states and not by the terms of the
    agreement.

    (B) Consistent with division (A) of this section, no person shall have any cause
    of action or defense under the agreement or by virtue of this state''s approval
    of the agreement. No person may challenge, in any action brought under any provision
    of law, any action or inaction by any department, agency, or other instrumentality
    of this state, or any political subdivision of this state, on the ground that
    the action or inaction is inconsistent with the agreement.

    (C) No law of this state, or the application thereof, may be declared invalid
    as to any person or circumstance on the ground that the law or application of
    it is inconsistent with the agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5740.06
- number: '5740.07'
  heading: Effect of agreement
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5740'
    name: Simplified Sales And Use Tax Administration Act
  text: '(A) A certified service provider is the agent of the seller with whom the
    certified service provider has contracted for the collection and remittance of
    sales and use taxes. As the seller''s agent, the certified service provider is
    liable for sales and use taxes due each member state on all sales transactions
    it processes for the seller, except as provided in this section.

    A seller that contracts with a certified service provider is not liable to the
    state for sales or use taxes due on transactions processed by the certified service
    provider, unless the seller misrepresented the type of tangible personal property
    or services it sells, or committed fraud. In the absence of probable cause to
    believe that the seller made a material misrepresentation or has committed fraud,
    the seller is not subject to audit of the transactions processed by the certified
    service provider. A seller is subject to audit for transactions not processed
    by a certified service provider. The member states acting jointly may perform
    a system check of the seller and review the seller''s procedures to determine
    if the certified service provider''s system is functioning properly and the extent
    to which the seller''s transactions are being processed by the provider.

    (B) A person who provides a certified automated system is responsible for the
    proper functioning of that system and is liable to this state for underpayments
    of the sales and use tax attributable to errors in the functioning of that system.
    A seller that uses a certified automated system remains responsible and is liable
    to this state for reporting and remitting sales and use taxes.

    (C) A seller that has a proprietary system for determining the amount of sales
    or use tax due on transactions and has signed a performance agreement establishing
    tax performance standards for that system is liable for the failure of the system
    to meet the performance standards.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5740.07
- number: '5740.08'
  heading: Certified service providers
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5740'
    name: Simplified Sales And Use Tax Administration Act
  text: '(A) As used in this section:

    (1) "Confidential taxpayer information" means all information that is protected
    under Title LVII of the Revised Code or other applicable law.

    (2) "Personally identifiable information" means information that identifies a
    person.

    (3) "Anonymous data" means information that does not identify a person.

    (B) A certified service provider shall preserve the privacy of consumers who buy,
    lease, or rent tangible personal property or services from sellers with whom the
    provider has contracted for the collection and remittance of sales and use taxes
    to this state. The certified service provider shall protect the personally identifiable
    information of a consumer in the same manner as required of the department of
    taxation for taxpayer information. The certified service provider shall use a
    certified automated system to perform sales and use tax calculations, remittances,
    and reporting that does not retain the personally identifiable information of
    consumers, except as follows:

    (1) To determine whether a consumer''s status or intended use of the goods or
    services purchased is exempt from the sales or use tax;

    (2) To investigate fraud by a consumer or seller;

    (3) To the extent necessary to ensure the reliability of the providers'' technology
    and certified automated system in performing all of a seller''s sales and use
    tax functions.

    The certified service provider shall provide technical, physical, and administrative
    safeguards to protect personally identifiable information from unauthorized access
    and disclosure.

    (C) The tax commissioner shall provide to consumers clear and conspicuous notice
    of the commissioner''s information retention and sharing practices, including
    what personally identifiable information the commissioner collects, how the information
    collected is used, how long the information is retained, and whether the information
    may be disclosed to other states. When the commissioner retains a consumer''s
    personally identifiable information that the commissioner received from a certified
    service provider, the commissioner shall allow the consumer to examine that information
    and correct any inaccurately recorded information.

    (D) If any person, other than a member state or a person otherwise authorized
    by the laws of this state, seeks to discover a consumer''s personally identifiable
    information, the tax commissioner shall make a reasonable and timely effort to
    notify the consumer of such request.

    (E) Notwithstanding this section, the laws of this state regarding the collection,
    use, and maintenance of confidential taxpayer information remain applicable and
    binding. The agreement does not enlarge or limit this state''s authority to do
    any of the following:

    (1) Conduct audits or other reviews as provided under the agreement or state law;

    (2) Provide records pursuant to section 149.43 of the Revised Code or to governmental
    agencies under disclosure laws;

    (3) Prevent the disclosure of confidential taxpayer information in accordance
    with Title LVII of the Revised Code;

    (4) Prevent, consistent with federal law, the disclosure or misuse of federal
    return information obtained under a disclosure agreement with the Internal Revenue
    Service;

    (5) Collect, disclose, disseminate, or otherwise use anonymous data for governmental
    purposes.

    (F) This section does not enlarge or limit the privacy policies of any seller
    that has selected a certified service provider as its agent to perform all of
    the seller''s sales and use tax functions.

    (G) A certified service provider that fails to comply with this section is subject
    to investigation by the tax commissioner or the commissioner''s agents and the
    attorney general, and to prosecution by the attorney general.'
