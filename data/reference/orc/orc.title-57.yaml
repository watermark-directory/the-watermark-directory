    name: Delinquent Lands
  text: '(A) A private selling officer''s fees payable with respect to an action under
    sections 5721.30 to 5721.46 of the Revised Code are subject to both of the following
    conditions:

    (1) The fees must be reasonable.

    (2) Fees exceeding five per cent of the sale price of the property, if such amount
