- number: '5733.41'
  heading: Tax on qualifying pass-through entity having at least one qualifying investor
    that is not individual
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: 'The purpose of the tax imposed by this section is to complement and to reinforce
    the tax imposed under section 5733.06 of the Revised Code.

    For the same purposes for which the tax is levied under section 5733.06 of the
    Revised Code, there is hereby levied a tax on every qualifying pass-through entity
    having at least one qualifying investor that is not an individual. The tax imposed
    by this section is imposed on the sum of the adjusted qualifying amounts of the
    qualifying pass-through entity''s qualifying investors, that are neither individuals
    nor subject to division (G)(2) of section 5733.01 of the Revised Code, at a rate
    equal to the tax rate imposed on taxable business income under division (A)(4)(a)
    of section 5747.02 of the Revised Code.

    The tax imposed by this section applies only if the qualifying entity has nexus
    with this state under the Constitution of the United States for any portion of
    the qualifying entity''s qualifying taxable year, and the sum of the qualifying
    entity''s adjusted qualifying amounts exceeds one thousand dollars for the qualifying
    entity''s qualifying taxable year. This section does not apply to a pass-through
    entity if all of the partners, shareholders, members, or investors of the pass-through
    entity are taxpayers for the purposes of section 5733.04 of the Revised Code without
    regard to section 5733.09 of the Revised Code for the entire qualifying taxable
    year of the pass-through entity.

    If, prior to the due date of the return, a qualifying pass-through entity receives
    from an investor a written representation, under penalties of perjury, that the
    investor is described in division (I)(1), (2), (6), (7), (8), or (9) of section
    5733.40 of the Revised Code for the qualifying pass-through entity''s entire qualifying
    taxable year, the qualifying pass-through entity is not required to withhold or
    pay the taxes or estimated taxes imposed under this section or sections 5747.41
    to 5747.453 of the Revised Code with respect to that investor for that qualifying
    taxable year, and is not subject to any interest or interest penalties for failure
    to withhold or pay those taxes or estimated taxes with respect to that investor
    for that qualifying taxable year.

    If, prior to the due date of the return, a qualifying trust receives from a beneficiary
    of that trust a written representation, under penalties of perjury, that the beneficiary
    is a resident taxpayer for the purposes of Chapter 5747. of the Revised Code for
    the qualifying trust''s entire qualifying taxable year, the qualifying trust is
    not required to withhold or pay the taxes or estimated taxes imposed under this
    section or sections 5747.41 to 5747.453 of the Revised Code with respect to that
    beneficiary for that qualifying taxable year, and is not subject to any interest
    or interest penalties for failure to withhold or pay those taxes or estimated
    taxes with respect to that beneficiary for that qualifying taxable year.

    The tax commissioner may adopt rules for the purpose of the tax levied by this
    section or section 5747.41 of the Revised Code, including a rule defining "qualifying
    investor" or "qualifying beneficiary," and a rule requiring or permitting a qualifying
    entity to combine its income with related members and to pay the tax and estimated
    tax on a combined basis.

    Sections 5747.10 to 5747.19 and 5747.42 to 5747.453 of the Revised Code apply
    to a qualifying entity subject to the tax imposed under this section.

    The levy of the tax under this section does not prevent a municipal corporation
    or a joint economic development district created under section 715.70, 715.71,
    or 715.72 of the Revised Code from levying a tax on income.

    The tax imposed under this section does not apply to a qualifying pass-through
    entity that makes an election under division (C) of section 5747.38 of the Revised
    Code to be subject to the tax levied under that section for the entity''s qualifying
    taxable year.'
