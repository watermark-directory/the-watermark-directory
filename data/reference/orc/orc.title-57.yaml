- number: '5733.14'
  heading: Monthly report by secretary of state - access to records of county auditors
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: The secretary of state shall prepare and keep a correct list of all corporations
    engaged in business within this state and required by law to pay an excise or
    franchise tax or fee. Each month he shall file with the tax commissioner a certified
    report showing all such new corporations, the increase or decrease of the capital
    stock or the dissolution of existing corporations, and such other information
    as the commissioner requires. For the purpose of obtaining the necessary information,
    the secretary of state or the commissioner shall have access to the records of
    the offices of the county auditors of the state. Upon request of the secretary
    of state or the commissioner, any county auditor shall furnish such information
    as is shown by the records of his office concerning corporations located within
    his county and subject to this chapter.
  history: null
