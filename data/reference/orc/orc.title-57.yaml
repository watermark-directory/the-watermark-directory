- number: '5711.06'
  heading: Listing of transferred investments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: A taxpayer who during the calendar year has transferred investments to the
    trustee of a trust fund shall list the investments transferred as to ownership
    and taxing district as of the date of such transfer, and as to valuation or income
    yield as of such first day of January; in listing such income yield, such taxpayers
    may deduct therefrom such portion of the income yield of the equitable interest
    in such trust fund as is represented by the income received during such year by
    such trustee from the investments transferred.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.06
- number: '5711.07'
  heading: Proper taxing district for listing property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'Personal property used in business shall be listed and assessed in the taxing
    district in which such business is carried on. If such business is carried on
    in more than one taxing district in the same county, the return shall set forth
    the amount of the property used therein which is situated in each taxing district
    in such county, and the value of all the personal property used in business shall
    be apportioned to and assessed in each of such taxing districts in proportion
    to the value of the personal property situated therein. Domestic animals not used
    in business shall be listed and assessed in the taxing district where kept. Ships,
    vessels, boats, and aircraft, and shares and interests therein, shall be listed
    and assessed in the taxing district in which the owner resides. All other taxable
    property shall be listed and assessed in the municipal corporation in which the
    owner resides, or, if the owner resides outside a municipal corporation, then
    in the county in which the owner resides except as provided in sections 5711.01
    to 5711.36 of the Revised Code. Whenever, under such sections, taxable property
    required by this section to be listed and assessed in the taxing district or county
    in which the owner resides is required to be listed by a fiduciary, such property
    shall be listed and assessed by such fiduciary in the taxing district or county
    in which such fiduciary resides, or, in the case of joint fiduciaries, in which
    either such fiduciary resides; but such property belonging to the estate of a
    deceased resident of this state shall be listed and assessed in the taxing district
    or county in which the deceased resident resided at the time of death, regardless
    of the residence of the deceased resident''s executors, administrators, or personal
    representatives, and such property belonging to a ward, minor, incompetent person,
    or beneficiary of a trust residing in this state, title, custody, or possession
    of which is vested in a nonresident fiduciary, shall be listed and assessed in
    the taxing district or county in which such ward, minor, incompetent person, or
    beneficiary resides.

    As used in this section, "incompetent person" means a person who is so mentally
    impaired, as a result of a mental or physical illness or disability, as a result
    of an intellectual disability, or as a result of chronic substance abuse, that
    the person is incapable of taking proper care of the person''s self or property
    or fails to provide for the person''s family or other persons for whom the person
    is charged by law to provide.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.07
- number: '5711.09'
  heading: Powers and duties of tax commissioner - contents of return
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'The tax commissioner shall administer sections 5711.01 to 5711.36 of the
    Revised Code, which are laws which he is required to administer within the meaning
    of sections 5703.19 to 5703.37, 5703.39, 5703.41, and 5703.45 of the Revised Code.
    He may adopt and promulgate rules not inconsistent with sections 5711.01 to 5711.36
    of the Revised Code, so that all taxable property shall be listed and assessed
    for taxation. The commissioner shall prescribe the forms of all blank returns
    consistently with such sections, and no return shall be made or accepted except
    on the proper prescribed form. Such rules and the forms prescribed may be varied
    to meet differing local conditions in the counties, but in prescribing such forms
    the commissioner shall be governed by the following requirements:

    (A) No taxpayer shall be required to make more than one return in the same capacity
    in any one county, but the commissioner may authorize any taxpayer or class of
    taxpayers to make separate returns for each taxing district within the county.

    (B) The listing shall be so arranged as to exhibit clearly the property assessable
    in each taxing district, and the property assessable on the general tax list and
    duplicate and on the classified tax list and duplicate.

    (C) Questions shall be included which shall elicit a full disclosure of all taxable
    property of the taxpayer and information relevant to changes in the value of any
    real estate owned or occupied by him.

    (D) All forms of returns required to be made to the county auditor shall have
    printed, stamped, or written thereon the rates of taxation of property on the
    general tax list and duplicate in each taxing district in the county, and the
    day of listing deposits as fixed by the commissioner pursuant to section 5725.05
    of the Revised Code.

    The enumeration in sections 5711.01 to 5711.36 of the Revised Code, of facts required
    to be stated in a return, and questions required to be asked, is not exclusive,
    but the commissioner may propound any other question in the forms of returns prescribed
    by him, the answer to which is relevant and material for the purpose of enabling
    the commissioner, pursuant to Title LVII of the Revised Code, to assess the taxable
    property of the taxpayer making the return, or that of any other taxpayer, or
    to administer any of the laws relating to taxation. Each question so propounded
    shall be answered specifically, and no return shall be accepted by the county
    auditor until full disclosure has been made as required by such blanks.'
