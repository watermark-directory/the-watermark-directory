  heading: Compensation of board members
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Each member of the board of tax appeals shall receive a salary fixed pursuant
    to division (J) of section 124.15 of the Revised Code for each day spent in the
    discharge of his official duties and shall be reimbursed for his actual and necessary
    expenses incurred in the discharge of such duties.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.09
- number: '5703.10'
  heading: Place of office - branch offices
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'The department of taxation shall keep its office in Columbus and shall provide
    suitable rooms, necessary office furniture, supplies, books, periodicals, and
    maps. All necessary expenses shall be audited and paid as are other expenses.
    The department may hold sessions at any place within the state.

    The department may establish as many branch offices in different parts of the
    state as are convenient for the purpose of administering the laws which the department
    is required or authorized to administer. Offices, buildings, and rooms for such
    branch offices shall be rented by the department of administrative services in
    the manner provided by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.10
- number: '5703.11'
  heading: Business hours
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: The department of taxation shall be open for the transaction of business during
    the business hours of every day, except Saturdays, Sundays, and legal holidays.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.11
- number: '5703.12'
  heading: Annual report
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) The tax commissioner shall adopt rules in accordance with the provisions
    of the international registration plan as defined under section 4501.01 of the
    Revised Code for the periodic audit of persons with vehicles registered under
    the international registration plan to determine the authenticity of mileage figures
    derived from operational records and registrations.

    The tax commissioner may exchange with the proper officers of other member jurisdictions
    of the international registration plan information regarding the results of audits
    conducted on persons with vehicles registered under the international registration
    plan. The exchange of information under this section is not a violation of section
    5703.21 or 5715.50 of the Revised Code. For purposes of this section, "proper
    officers of other member jurisdictions" includes officers of any agency, department,
    or instrumentality of another member jurisdiction with authority under the laws
    of that jurisdiction to administer or enforce motor vehicle or taxation laws.

    (B) Money received by the department of taxation from the bureau of motor vehicles
    pursuant to section 4501.044 of the Revised Code for the purpose of paying the
    costs the department incurs in conducting audits of persons who have registered
    motor vehicles under the international registration plan shall be deposited in
    the state treasury to the credit of the international registration plan auditing
    fund, which is hereby created.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.12
- number: '5703.13'
  heading: Quorum - orders
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'A majority of the board of tax appeals shall constitute a quorum to transact
    business, and any vacancy does not impair the right of the remaining members to
    exercise all the powers of the board so long as a majority remains. Any investigation,
    inquiry, or hearing which the board is authorized to hold or undertake may be
    held or undertaken by or before any one member of the board.

    All investigations, inquiries, hearings, and decisions of the board, and every
    order made by a member when approved and confirmed by the board and shown on its
    record of proceedings is deemed the order of the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.13
- number: '5703.14'
  heading: Review of rules
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'Applications for review of any rule adopted and promulgated by the tax commissioner
    may be filed with the board of tax appeals by any person who has been or may be
    injured by the operation of the rule. The appeal may be taken at any time after
    the rule is filed with the secretary of the state, the director of the legislative
    service commission, and, if applicable, the joint committee on agency rule review.
    Failure to file an appeal does not preclude any person from seeking any other
    remedy against the application of the rule to the person. The applications shall
    set forth, or have attached thereto and incorporated by reference, a true copy
    of the rule, and shall allege that the rule complained of is unreasonable and
    shall state the grounds upon which the allegation is based. Upon the filing of
    the application, the board shall notify the commissioner of the filing of the
    application, fix a time for hearing the application, notify the commissioner and
    the applicant of the time for the hearing, and afford both an opportunity to be
    heard. The appellant, the tax commissioner, and any other interested persons that
    the board permits, may introduce evidence. The burden of proof to show that the
    rule is unreasonable shall be upon the appellant. After the hearing, the board
    shall determine whether the rule complained of is reasonable or unreasonable.
    A determination that the rule complained of is unreasonable shall require a majority
    vote of the three members of the board, and the reasons for the determination
    shall be entered on the journal of the board.

    Upon determining that the rule complained of is unreasonable, the board shall
    file copies of its determination as follows:

    (A) The determination shall be filed in electronic form with both the secretary
    of state and the director of the legislative service commission, who shall note
    the date of their receipt of the certified copies conspicuously in their files
    of the rules of the department;

    (B) The determination shall be filed in electronic form with the joint committee
    on agency rule review. Division (C)(2) of this section does not apply to any rule
    to which division (C) of section 119.03 of the Revised Code does not apply.

    On the tenth day after the determination has been received by the secretary of
    state, the director, and, if applicable, the joint committee, the rule referred
    to in the determination shall cease to be in effect. If all filings of the determination
    are not completed on the same day, the rule shall remain in effect until the tenth
    day after the day on which the latest filing is completed. This section does not
    apply to licenses issued under sections 5735.02, 5739.17, and 5743.15 of the Revised
    Code, which shall be governed by sections 119.01 to 119.13 of the Revised Code.

    The board is not required to hear an application for the review of any rule where
    the grounds of the allegation that the rule is unreasonable have been previously
    contained in an application for review and have been previously heard and passed
    upon by the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.14
