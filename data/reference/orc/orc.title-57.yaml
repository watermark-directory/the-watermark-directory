  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.46
- number: '5743.51'
  heading: Tax on tobacco and vapor products received by distributor or sold by manufacturer
    to retail dealer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: '(A) To provide revenue for the general revenue fund of the state, an excise
    tax on tobacco products and vapor products is hereby levied at one of the following
    rates:

    (1) For tobacco products other than little cigars or premium cigars, seventeen
    per cent of the wholesale price of the tobacco product received by a distributor
    or sold by a manufacturer to a retail dealer located in this state.

    (2) Thirty-seven per cent of the wholesale price of little cigars received by
    a distributor or sold by a manufacturer to a retail dealer located in this state.

    (3) For premium cigars received by a distributor or sold by a manufacturer to
    a retail dealer located in this state, the lesser of seventeen per cent of the
    wholesale price of such premium cigars or the maximum tax amount per each such
    premium cigar.

    (4) For vapor products, one cent multiplied by the vapor volume of vapor products
    the first time the products are received by a vapor distributor in this state.

    Each distributor or vapor distributor who brings tobacco products or vapor products,
    or causes tobacco products or vapor products to be brought, into this state for
    distribution within this state, or any out-of-state distributor or vapor distributor
    who sells tobacco products or vapor products to wholesale or retail dealers located
    in this state for resale by those wholesale or retail dealers is liable for the
    tax imposed by this section. Only one sale of the same article shall be used in
    computing the amount of the tax due. If a vapor product is repackaged, reconstituted,
    diluted, or reprocessed, the subsequent sale of that vapor product shall be considered
    another sale of the same article for purposes of computing the amount of tax due.

    (B) The treasurer of state shall place to the credit of the tax refund fund created
    by section 5703.052 of the Revised Code, out of the receipts from the tax levied
    by this section, amounts equal to the refunds certified by the tax commissioner
    pursuant to section 5743.53 of the Revised Code. The balance of the taxes collected
    under this section shall be paid into the general revenue fund.

    (C) The commissioner may adopt rules as are necessary to assist in the enforcement
    and administration of sections 5743.51 to 5743.66 of the Revised Code, including
    rules providing for the remission of penalties imposed.

    (D) A manufacturer is not liable for payment of the tax imposed by this section
    for sales of tobacco products or vapor products to a retail dealer that has filed
    a signed statement with the manufacturer in which the retail dealer agrees to
    pay and be liable for the tax, as long as the manufacturer has provided a copy
    of the statement to the tax commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5743.51
- number: '5743.511'
  heading: County tobacco and vapor products tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: 'The board of county commissioners of a county whose population is greater
    than one million one hundred thousand but less than one million three hundred
    thousand may levy a tax under this section for the purpose of section 307.673
    of the Revised Code regardless of whether or not the cooperative agreement authorized
    under that section has been entered into prior to the day the resolution adopted
    under this section is adopted, for the purpose of reimbursing a county for costs
    incurred in the construction of a sports facility pursuant to an agreement entered
    into by the county under section 307.696 of the Revised Code, or for the purpose
    of paying the costs of constructing, equipping, furnishing, maintaining, renovating,
    improving, or repairing a sports facility. The tax may be levied for any number
    of years or for a continuing period of time.

    The tax may be levied pursuant to a resolution adopted by the board of county
    commissioners and approved by a majority of the electors of the county voting
    on the question of levying the tax. The board of county commissioners shall certify
    a copy of the resolution to the board of elections immediately upon adopting a
    resolution under this section. The election may be held on the date of a general
    or special election held not sooner than ninety days after the date the board
    certifies its resolution to the board of elections. The form of the ballot shall
    be as follows:

    "For the purpose of ______ (state the purpose or purposes), shall an excise tax
    be levied by __________ county at the rate of ______ per cent of the price of
    other tobacco products (aside from little cigars) sold at wholesale in the county,
    _____ per cent of the price of little cigars sold at wholesale in the county,
    and ____ cents per vapor volume of vapor products sold at wholesale in the county,
    for ____ (number of years or a continuing period of time), the tax beginning on
    __________ (the earliest date the tax would take effect)?


    YesNo "

    A board of county commissioners submitting the question of a tax under this section
    may submit the question of a tax under division (E) of section 307.697, division
    (C) of section 4301.421, or division (D) of section 5743.024 of the Revised Code,
    or all, as a single question, provided that each tax is for the same purpose and
    period of time and the form of the ballot states the rate of each of the proposed
    taxes.

    If approved by a majority of electors voting on the question, the tax shall take
    effect on the date specified in the resolution but not sooner than the first day
    of the month that is at least sixty days after the certification of the election
    results by the board of elections.

    The rate of tax levied pursuant to this section shall be imposed as follows:

    (A) At a rate not to exceed eighty-five hundredths per cent of the wholesale price
    of other tobacco products, aside from little cigars, received by a distributor
    in the county, sold by a manufacturer to a retail dealer located in the county,
    or delivered to a consumer in the county for storage, use, or other consumption;

    (B) At a rate not to exceed one and eighty-five hundredths per cent of the wholesale
    price of little cigars received by a distributor in the county, sold by a manufacturer
    to a retail dealer located in the county, or delivered to a consumer in the county
    for storage, use, or other consumption;

    (C) At a rate not to exceed one-twentieth of one cent multiplied by the vapor
    volume of vapor products the first time such products are received by a vapor
    distributor in the county or when vapor products are delivered to a consumer in
    the county for storage, use, or other consumption.

    Only one sale of the same article shall be used in computing, reporting, and paying
    the amount of tax due. The tax levied under this section shall be in addition
    to the tax levied under section 5743.51 of the Revised Code.

    A board of county commissioners adopting a resolution under this section shall
    certify a copy of the resolution to the tax commissioner immediately upon adoption
    of the resolution.'
