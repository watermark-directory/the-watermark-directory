- number: '5703.031'
  heading: Enforcement of board of tax appeals orders
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'In addition to the other remedies provided by law for effectuating compliance
    with or for the prevention and punishment of any violation of the laws which the
    board of tax appeals is required to administer or of the orders of the board,
    the laws and orders, upon application made by or on behalf of the board, may be
    enforced by quo warranto, mandamus, prohibition, procedendo, injunction, contempt,
    or other appropriate proceeding.

    Upon order of the board to either the attorney general or prosecuting attorney
    of any county, that official shall forthwith take action on behalf of the board
    for the enforcement of those laws and orders or for the imposition of sanctions
    for violation of those laws and orders, or both.'
