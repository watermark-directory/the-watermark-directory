- number: '5721.33'
  heading: Negotiating sale of number of tax certificates
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A) A county treasurer may, in the treasurer''s discretion, negotiate the
    sale or transfer of any number of tax certificates with one or more persons, including
    a county land reutilization corporation. Terms that may be negotiated include,
    without limitation, any of the following:

    (1) A premium to be added to or discount to be subtracted from the certificate
    purchase price for the tax certificates;

    (2) Different time frames under which the certificate holder may initiate a foreclosure
    action than are otherwise allowed under sections 5721.30 to 5721.43 of the Revised
    Code, not to exceed six years after the date the tax certificate was sold or transferred;

    (3) The amount to be paid in private attorney''s fees related to tax certificate
    foreclosures, subject to section 5721.371 of the Revised Code;

    (4) Any other terms of the sale or transfer that the county treasurer, in the
    treasurer''s discretion, determines appropriate or necessary for the sale or transfer.

    (B) The sale or transfer of tax certificates under this section shall be governed
    by the criteria established by the county treasurer pursuant to division (E) of
    this section.

    (C) The county treasurer may execute a tax certificate sale/purchase agreement
    and other necessary agreements with a designated purchaser or purchasers to complete
    a negotiated sale or transfer of tax certificates.

    (D) The tax certificate may be sold at a premium to or discount from the certificate
    purchase price. The county treasurer may establish as one of the terms of the
    negotiated sale the portion of the certificate purchase price, plus any applicable
    premium or less any applicable discount, that the purchaser or purchasers shall
    pay in cash on the date the tax certificates are sold and the portion, if any,
    of the certificate purchase price, plus any applicable premium or less any applicable
    discount, that the purchaser or purchasers shall pay in noncash consideration
    and the nature of that consideration.

    The county treasurer shall sell such tax certificates at a certificate purchase
    price, plus any applicable premium and less any applicable discount, and at a
    certificate rate of interest that, in the treasurer''s determination, are in the
    best interests of the county.

    (E)(1) The county treasurer shall adopt rules governing the eligibility of persons
    to purchase tax certificates or to otherwise participate in a negotiated sale
    under this section. The rules may provide for precertification of such persons,
    including a requirement for disclosure of income, assets, and any other financial
    information the county treasurer determines appropriate. The rules also may prohibit
    any person that is delinquent in the payment of any tax to the county or to the
    state, or that is in default in or on any other obligation to the county or to
    the state, from purchasing a tax certificate or otherwise participating in a negotiated
    sale of tax certificates under this section. The rules may also authorize the
    purchase of certificates by a county land reutilization corporation, and authorize
    the county treasurer to receive notes in lieu of cash, with such notes being payable
    to the treasurer upon the receipt or enforcement of such taxes, assessments, charges,
    costs, penalties, and interest, and as otherwise further agreed between the corporation
    and the treasurer. The eligibility information required shall include the tax
    identification number of the purchaser and may include the tax identification
    number of the participant. The county treasurer, upon request, shall provide a
    copy of the rules adopted under this section.

    (2) Any person that intends to purchase a tax certificate in a negotiated sale
    shall submit an affidavit to the county treasurer that establishes compliance
    with the applicable eligibility criteria and includes any other information required
    by the treasurer. Any person that fails to submit such an affidavit is ineligible
    to purchase a tax certificate. Any person that knowingly submits a false or misleading
    affidavit shall forfeit any tax certificate or certificates purchased by the person
    at a sale for which the affidavit was submitted, shall be liable for payment of
    the full certificate purchase price, plus any applicable premium and less any
    applicable discount, of the tax certificate or certificates, and shall be disqualified
    from participating in any tax certificate sale conducted in the county during
    the next five years.

    (3) A tax certificate shall not be sold to the owner of the certificate parcel
    or to any corporation, partnership, or association in which such owner has an
    interest. No person that purchases a tax certificate in a negotiated sale shall
    assign or transfer the tax certificate to the owner of the certificate parcel
    or to any corporation, partnership, or association in which the owner has an interest.
    Any person that knowingly or negligently transfers or assigns a tax certificate
    to the owner of the certificate parcel or to any corporation, partnership, or
    association in which such owner has an interest shall be liable for payment of
    the full certificate purchase price, plus any applicable premium and less any
    applicable discount, and shall not be entitled to a refund of any amount paid.
    Such tax certificate shall be deemed void and the tax lien sold under the tax
    certificate shall revert to the county as if no sale of the tax certificate had
    occurred.

    (F) The purchaser in a negotiated sale under this section shall deliver the certificate
    purchase price or other consideration, plus any applicable premium and less any
    applicable discount and including any noncash consideration, to the county treasurer
    not later than the close of business on the date the tax certificates are delivered
    to the purchaser. The certificate purchase price, less any applicable discount,
    or portion of the price, that is paid in cash shall be deposited in the county''s
    general fund to the credit of the account to which ad valorem real property taxes
    are credited and further credited as provided in division (G) of this section.
    Any applicable premium that is paid shall be, at the discretion of the county
    treasurer, apportioned to and deposited in any authorized county fund. The purchaser
    also shall pay on the date the tax certificates are delivered to the purchaser
    the fee, if any, negotiated under division (J) of this section. If the purchaser
    fails to pay the certificate purchase price, plus any applicable premium and less
    any applicable discount, and any such fee, within the time periods required by
    this section, the county treasurer shall retain the tax certificate and may attempt
    to sell it at any auction or negotiated sale conducted at a later date.

    (G) Upon receipt of the full payment from the purchaser of the certificate purchase
    price or other agreed-upon consideration, plus any applicable premium and less
    any applicable discount, and the negotiated fee, if any, the county treasurer,
    or a qualified trustee whom the treasurer has engaged for such purpose, shall
    issue the tax certificate and record the tax certificate sale by entering into
    a tax certificate register the certificate purchase price, any premium paid or
    discount taken, the certificate rate of interest, the date the certificates were
    sold, the name and address of the certificate holder or, in the case of issuance
    of the tax certificates in a book-entry system, the name and address of the nominee,
    and any other information the county treasurer considers necessary. The county
    treasurer may keep the tax certificate register in a hard-copy format or an electronic
    format. The name and address of the certificate holder or nominee may be, upon
    receipt of instructions from the purchaser, that of the secured party of the actual
    purchaser, or an agent or custodian for the purchaser or secured party. The county
    treasurer also shall transfer the tax certificates to the certificate holder.
    The county treasurer shall apportion the part of the cash proceeds from the sale
    representing taxes, penalties, and interest among the several taxing districts
    in the same proportion that the amount of taxes levied by each district against
    the certificate parcels in the preceding tax year bears to the taxes levied by
    all such districts against the certificate parcels in the preceding tax year,
    and credit the part of the proceeds representing assessments and other charges
    to the items of assessments and charges in the order in which those items became
    due. If the cash proceeds from the sale are not sufficient to fully satisfy the
    items of taxes, assessments, penalties, interest, and charges on the certificate
    parcels against which tax certificates were sold, the county treasurer shall credit
    the cash proceeds to such items pro rata based upon the proportion that each item
    of taxes, assessments, penalties, interest, and charges bears to the aggregate
    of all such items, or by any other method that the county treasurer, in the treasurer''s
    sole discretion, determines is equitable. Upon issuing the tax certificates, the
    delinquent taxes that make up the certificate purchase price are transferred,
    and the superior lien of the state and its taxing districts for those delinquent
    taxes is conveyed intact to the certificate holder or holders.

    (H) If a tax certificate is offered for sale under this section but is not sold,
    the county treasurer may strike the corresponding certificate parcel from the
    list of parcels selected for tax certificate sales. The lien for taxes, assessments,
    charges, penalties, and interest against a parcel stricken from the list thereafter
    may be foreclosed in the manner prescribed by section 323.25, 5721.14, or 5721.18
    of the Revised Code unless, prior to the institution of such proceedings against
    the parcel, the county treasurer restores the parcel to the list of parcels selected
    for tax certificate sales.

    (I) Neither a certificate holder nor its secured party, if any, shall be liable
    for damages arising from a violation of sections 3737.87 to 3737.891 or Chapter
    3704., 3734., 3745., 3746., 3750., 3751., 3752., 6109., or 6111. of the Revised
    Code, or a rule adopted or order, permit, license, variance, or plan approval
    issued under any of those chapters, that is or was committed by another person
    in connection with the parcel for which the tax certificate is held.

    (J) When selling or transferring a tax certificate under this section, the county
    treasurer may negotiate with the purchaser of the certificate for fees paid by
    the purchaser to the county treasurer to reimburse the treasurer for any part
    or all of the treasurer''s costs of preparing for and administering the sale of
    the tax certificate and any fees set forth by the county treasurer in the tax
    certificate sale/purchase agreement. Such fees, if any, shall be added to the
    certificate purchase price and shall be paid by the purchaser on the date of delivery
    of the tax certificate. The county treasurer shall deposit the fees in the county
    treasury to the credit of the tax certificate administration fund.

    (K) After selling tax certificates under this section, the county treasurer shall
    send written notice to the owner of the certificate parcel by either certified
    mail or, if the treasurer has record of an internet identifier of record associated
    with the owner, by ordinary mail and by that internet identifier of record. A
    mailed notice shall be sent to the owner''s last known tax-mailing address. The
    notice shall inform the owner that a tax certificate with respect to such owner''s
    parcel was sold or transferred and shall describe the owner''s options to redeem
    the parcel, including entering into a redemption payment plan under division (C)(2)
    of section 5721.38 of the Revised Code. However, the county treasurer is not required
    to send a notice under this division if the treasurer previously has attempted
    to send a notice to the owner of the parcel at the owner''s last known tax-mailing
    address and the postal service has returned the notice as undeliverable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.33
- number: '5721.34'
  heading: Void certificate where delinquency previously satisfied
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A) A county treasurer shall not sell any tax certificate respecting a parcel
    of delinquent land to which any of divisions (A)(1)(a) to (c) of section 5721.31
    of the Revised Code apply. A certificate sold in violation of this section is
    void.

    (B) If the county treasurer discovers or determines that a certificate is void
    for any reason, the holder of the void certificate is entitled to a refund of
    the certificate purchase price, plus any applicable premium and less any applicable
    discount, and the fee charged by the treasurer under division (H) of section 5721.32
    or division (J) of section 5721.33 of the Revised Code, if any, as applicable.
    If the county treasurer makes the discovery or determination more than ninety
    days after the certificate''s date of sale, the holder also is entitled to interest
    on the certificate purchase price at the rate of five per cent per year. The interest
    shall be calculated from the first day of the month following the month in which
    the certificate was sold, to the first day of the month in which the county treasurer
    makes the discovery or determination. The county treasurer shall notify the certificate
    holder by ordinary first class or certified mail or by binary means that the certificate
    is void and shall issue the refund. The county auditor shall issue a warrant for
    the portion of the refund from the undivided tax fund, which portion consists
    of the certificate purchase price, plus any applicable premium and less any applicable
    discount; the portion of the refund consisting of interest and the treasurer''s
    fee, if any, shall be paid from the tax certificate administration fund.

    (C) With respect to a tax certificate found to be void under division (A) or (B)
    of this section, the county treasurer may, with the approval of the certificate
    holder, substitute for such tax certificate another tax certificate that has a
    certificate purchase price equivalent to the certificate purchase price of the
    tax certificate found to be void. In addition, the substitute tax certificate
    shall be for a parcel concerning which the county treasurer has taken action under
    divisions (A), (B), and (C) of section 5721.31 of the Revised Code, but with respect
    to which a tax certificate has not been sold, and that has a true value, as determined
    by the county auditor, that is equivalent to the true value of the parcel for
    which the tax certificate has been found to be void. Whenever a tax certificate
    is to be substituted for a tax certificate that has been found to be void, the
    county treasurer shall provide notice of the intention to substitute a tax certificate
    to any person required to be notified under division (I) of section 5721.32 or
    division (K) of section 5721.33 of the Revised Code.

    (D) If an application for the exemption from and remission of taxes made under
    section 3735.67 or 5715.27 of the Revised Code, or under any other section of
    the Revised Code under the jurisdiction of the director of environmental protection,
    is granted for a parcel for which a tax certificate has been sold, the county
    treasurer shall refund to the certificate holder, in the manner provided in this
    section, the amount of any taxes exempted or remitted that were included in the
    certificate purchase price. If the whole amount of the taxes included in the certificate
    purchase price are exempted or remitted, the tax certificate is void. If all of
    the taxes that were included in the certificate purchase price are not exempted
    or remitted, the county treasurer shall adjust the tax certificate register to
    reflect the remaining amount of taxes that were not exempted or remitted, and
    notify the certificate holder of the adjustment in writing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.34
- number: '5721.35'
  heading: Tax certificate vests in certificate holder first lien previously held
    by state and its taxing districts
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A) Upon the sale and delivery of a tax certificate, the tax certificate
    vests in the certificate holder the first lien previously held by the state and
    its taxing districts under section 5721.10 of the Revised Code for the amount
    of taxes, assessments, interest, and penalty charged against a certificate parcel,
    superior to all other liens and encumbrances upon the parcel described in the
    tax certificate, in the amount of the certificate redemption price, except liens
    for delinquent taxes that attached to the certificate parcel prior to the attachment
    of the lien being conveyed by the sale of such tax certificate. With respect to
    the priority as among such first liens of the state and its taxing districts for
    different years, the priority shall be determined by the date such first liens
    of the state and its taxing districts attached pursuant to section 323.11 of the
    Revised Code, with first priority to the earliest attached lien and each immediately
    subsequent priority based upon the next earliest attached lien.

    (B)(1) A certificate holder or the county treasurer may record the tax certificate
    or memorandum thereof in the office of the county recorder of the county in which
    the certificate parcel is situated, as a mortgage of land under division (A)(20)
    of section 317.08 of the Revised Code. The county recorder shall index the certificate
    in the indexes provided for under section 317.18 of the Revised Code. If the lien
    is subsequently canceled, the cancellation also shall be recorded by the county
    recorder.

    (2) Notwithstanding Chapter 1309., Title LIII, or any other provision of the Revised
    Code, a secured party holding a security interest in a tax certificate or memorandum
    thereof may perfect that security interest only by one of the following methods:

    (a) Possession;

    (b) Registering the tax certificate with the county treasurer in the name of the
    secured party, or its agent or custodian, as certificate holder;

    (c) Recording the name of the secured party in the tax certificate register in
    the office of the county treasurer of the county in which the certificate parcel
    is situated.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.35
- number: '5721.36'
  heading: Transferring tax certificate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A)(1) Except as otherwise provided in division (A)(2) of this section, the
    purchaser of a tax certificate sold as part of a block sale pursuant to section
    5721.32 of the Revised Code may transfer the certificate to any person, and any
    other purchaser of a tax certificate pursuant to section 5721.32 or 5721.33 of
    the Revised Code may transfer the certificate to any person, except the owner
    of the certificate parcel or any corporation, partnership, or association in which
    such owner has an interest. The transferee of a tax certificate subsequently may
    transfer the certificate to any other person to whom the purchaser could have
    transferred the certificate. The transferor of a tax certificate shall endorse
    the certificate and shall swear to the endorsement before a notary public or other
    officer empowered to administer oaths. The transferee shall present the endorsed
    certificate and a notarized copy of a valid form of identification showing the
    transferee''s taxpayer identification number to the county treasurer of the county
    where the certificate is registered, who shall, upon payment of a fee of twenty
    dollars to cover the costs associated with the transfer of a tax certificate,
    enter upon the register of certificate holders opposite the certificate entry
    the name and address of the transferee, the date of entry, and, upon presentation
    to the treasurer of instructions signed by the transferee, the name and address
    of any secured party of the transferee having an interest in the tax certificate.
    The treasurer shall deposit the fee in the county treasury to the credit of the
    tax certificate administration fund.

    Except as otherwise provided in division (A)(2) of this section, no request for
    foreclosure or notice of intent to foreclose, as the case may be, shall be filed
    by any person other than the person shown on the tax certificate register to be
    the certificate holder or a private attorney for that person properly authorized
    to act in that person''s behalf.

    (2) Upon registration of a security interest with the county treasurer, both of
    the following apply:

    (a) No purchaser or transferee of a tax certificate, other than a county land
    reutilization corporation, may transfer that tax certificate except upon presentation
    to the treasurer of instructions signed by the secured party authorizing such
    action. A county land reutilization corporation may transfer or assign tax certificates
    consistent with its public purposes and plan adopted pursuant to Chapter 1724.
    of the Revised Code.

    (b) Only the secured party may issue a request for foreclosure or notice of intent
    to foreclose concerning that tax certificate.

    (3) If a tax certificate is sold as part of a block sale under section 5721.32
    or 5721.33 of the Revised Code, and if the certificate parcel is abandoned land
    as defined in section 323.65 of the Revised Code, a county, municipal corporation,
    township, or county land reutilization corporation may acquire the tax certificate
    within one year from the date the certificate was sold by providing to the certificate
    holder a written request to purchase the certificate and payment of the actual
    cost the purchaser paid for the certificate. The acquiring subdivision or county
    land reutilization shall pay any costs or fees assessed by the county treasurer
    or auditor in relation to the transfer of the certificate.

    (B)(1) Application may be made to the county treasurer for a duplicate certificate
    if a certificate is alleged by affidavit to have been lost or destroyed. The treasurer
    shall issue a duplicate certificate, upon payment of a fee of twenty dollars to
    cover the costs of issuing the duplicate certificate. The treasurer shall deposit
    the fee in the county treasury to the credit of the tax certificate administration
    fund.

    (2) The duplicate certificate shall be plainly marked or stamped "duplicate."

    (3) The treasurer shall enter the fact of the duplicate in the tax certificate
    register.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.36
- number: '5721.37'
  heading: Filing request for foreclosure
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A)(1) At any time after one year from the date shown on the tax certificate
    as the date the tax certificate was sold, and not later than the end of the certificate
    period, a certificate holder, except for a county land reutilization corporation,
    may file with the county treasurer a request for foreclosure, or a private attorney
    on behalf of the certificate holder may file with the county treasurer a notice
    of intent to foreclose, on a form prescribed by the tax commissioner, provided
    the certificate parcel has not been redeemed under division (A) or (C) of section
    5721.38 of the Revised Code and at least one certificate respecting the certificate
    parcel, held by the certificate holder filing the request for foreclosure or notice
    of intent to foreclose and eligible to be enforced through a foreclosure proceeding,
    has not been voided under section 5721.381 of the Revised Code. If the certificate
    holder is a county land reutilization corporation, the corporation may institute
    a foreclosure action under the statutes pertaining to the foreclosure of mortgages
    or as permitted under sections 323.65 to 323.79 of the Revised Code at any time
    after it acquires the tax certificate.

    (2) If, before the expiration of the certificate period, the owner of the property
    files a petition in bankruptcy, the county treasurer, upon being notified of the
    filing of the petition, shall notify the certificate holder by ordinary first-class
    or certified mail or by binary means of the filing of the petition. It is the
    obligation of the certificate holder to file a proof of claim with the bankruptcy
    court to protect the holder''s interest in the certificate parcel. The last day
    on which the certificate holder may file a request for foreclosure or a notice
    of intent to foreclose is the later of the expiration of the certificate period
    or one hundred eighty days after the certificate parcel is no longer property
    of the bankruptcy estate; however, the certificate period is tolled while the
    property owner''s bankruptcy case remains open. If the certificate holder is a
    county land reutilization corporation, the corporation may institute a foreclosure
    action under the statutes pertaining to the foreclosure of mortgages or as permitted
    under sections 323.65 to 323.79 of the Revised Code at any time after it acquires
    such tax certificate, subject to any restrictions under such bankruptcy law or
    proceeding.

    Interest at the certificate rate of interest continues to accrue during any extension
    of time required by division (A)(2) of this section unless otherwise provided
    under Title 11 of the United States Code.

    (3) If, before the expiration of three years from the date a tax certificate was
    sold, the owner of property for which the certificate was sold applies for an
    exemption under section 3735.67 or 5715.27 of the Revised Code or under any other
    section of the Revised Code under the jurisdiction of the director of environmental
    protection, the county treasurer shall notify the certificate holder by ordinary
    first-class or certified mail or by binary means of the filing of the application.
    Once a determination has been made on the exemption application, the county treasurer
    shall notify the certificate holder of the determination by ordinary first-class
    or certified mail or by binary means. Except with respect to a county land reutilization
    corporation, the last day on which the certificate holder may file a request for
    foreclosure shall be the later of three years from the date the certificate was
    sold or forty-five days after notice of the determination was provided.

    (B) When a request for foreclosure or a notice of intent to foreclose is filed
    under this section, the certificate holder shall submit a payment to the county
    treasurer equal to the sum of the following:

    (1) The certificate redemption prices of all outstanding tax certificates that
    have been sold on the parcel, other than tax certificates held by the person requesting
    foreclosure;

    (2) Any taxes, assessments, penalties, interest, and charges appearing on the
    tax duplicate charged against the certificate parcel that is the subject of the
    foreclosure proceedings and that are not covered by a tax certificate, but such
    amounts are not payable if the certificate holder is a county land reutilization
    corporation;

    (3) If the foreclosure proceedings are filed by the county prosecuting attorney
    pursuant to section 323.25, sections 323.65 to 323.79, or section 5721.14 or 5721.18
    of the Revised Code, a fee in the amount prescribed by the county prosecuting
    attorney to cover the prosecuting attorney''s legal costs incurred in the foreclosure
    proceeding.

    (C)(1) With respect to a certificate purchased under section 5721.32, 5721.33,
    or 5721.42 of the Revised Code, if the certificate parcel has not been redeemed
    and at least one certificate respecting the certificate parcel, held by the certificate
    holder filing the request for foreclosure and eligible to be enforced through
    a foreclosure proceeding, has not been voided under section 5721.381 of the Revised
    Code, the county treasurer, within five days after receiving a foreclosure request
    and the payment required under division (B) of this section, shall certify notice
    to that effect to the county prosecuting attorney and shall provide a copy of
    the foreclosure request. The county treasurer also shall send notice by ordinary
    first class or certified mail to all certificate holders other than the certificate
    holder requesting foreclosure that foreclosure has been requested by a certificate
    holder and that payment for the tax certificates is forthcoming. Within ninety
    days of receiving the copy of the foreclosure request, the prosecuting attorney
    shall commence a foreclosure proceeding in the name of the county treasurer in
    the manner provided under section 323.25, sections 323.65 to 323.79, or section
    5721.14 or 5721.18 of the Revised Code, to enforce the lien vested in the certificate
    holder by the certificate. The prosecuting attorney shall attach to the complaint
    the foreclosure request and the county treasurer''s written certification.

    (2) With respect to a certificate purchased under section 5721.32, 5721.33, or
    5721.42 of the Revised Code, if the certificate parcel has not been redeemed,
    at least one certificate respecting the certificate parcel, held by the certificate
    holder filing the notice of intent to foreclose and eligible to be enforced through
    a foreclosure proceeding, has not been voided under section 5721.381 of the Revised
    Code, a notice of intent to foreclose has been filed, and the payment required
    under division (B) of this section has been made, the county treasurer shall certify
    notice to that effect to the private attorney. The county treasurer also shall
    send notice by ordinary first class or certified mail or by binary means to all
    certificate holders other than the certificate holder represented by the attorney
    that a notice of intent to foreclose has been filed and that payment for the tax
    certificates is forthcoming. After receipt of the treasurer''s certification and
    not later than one hundred twenty days after the filing of the intent to foreclose
    or the number of days specified under the terms of a negotiated sale under section
    5721.33 of the Revised Code, the private attorney shall commence a foreclosure
    proceeding in the name of the certificate holder in the manner provided under
    division (F) of this section to enforce the lien vested in the certificate holder
    by the certificate. The private attorney shall attach to the complaint the notice
    of intent to foreclose and the county treasurer''s written certification.

    (D) The county treasurer shall credit the amount received under division (B)(1)
    of this section to the tax certificate redemption fund. The tax certificates respecting
    the payment shall be paid as provided in division (D) of section 5721.38 of the
    Revised Code. The amount received under division (B)(2) of this section shall
    be distributed to the taxing districts to which the delinquent and unpaid amounts
    are owed. The county treasurer shall deposit the fee received under division (B)(3)
    of this section in the county treasury to the credit of the delinquent tax and
    assessment collection fund.

    (E)(1) Except with respect to a county land reutilization corporation, if the
    certificate holder does not file with the county treasurer a request for foreclosure
    or a notice of intent to foreclose with respect to a certificate parcel with the
    required payment within the certificate period or any extension of that period
    pursuant to division (C)(2) of section 5721.38 of the Revised Code, or within
    the period provided under division (A)(2) of this section, and during that time
    the certificate has not been voided under section 5721.381 of the Revised Code
    and the certificate parcel has not been redeemed or foreclosed upon, the certificate
    holder''s lien against the parcel is canceled and the certificate is voided, subject
    to division (E)(2) of this section.

    (2) In the case of any tax certificate purchased under section 5721.32 of the
    Revised Code or under section 5721.42 of the Revised Code by the holder of a certificate
    issued under section 5721.32 of the Revised Code prior to June 24, 2008, the county
    treasurer, upon application by the certificate holder, may sell to the certificate
    holder a new certificate extending the three-year period prescribed by division
    (E)(1) of this section, as that division existed prior to that date, to six years
    after the date shown on the original certificate as the date it was sold or any
    extension of that date.

    The county treasurer and the certificate holder shall negotiate the premium, in
    cash, to be paid for a new certificate sold under division (E)(2) of this section.
    If the county treasurer and certificate holder do not negotiate a mutually acceptable
    premium, the county treasurer and certificate holder may agree to engage a person
    experienced in the valuation of financial assets to appraise a fair premium for
    the new certificate. The certificate holder has the option to purchase the new
    certificate for the fair premium so appraised. Not less than one-half of the fee
    of the person so engaged shall be paid by the certificate holder requesting the
    new certificate; the remainder of the fee shall be paid from the proceeds of the
    sale of the new certificate. If the certificate holder does not purchase the new
    certificate for the premium so appraised, the certificate holder shall pay the
    entire fee. The county treasurer shall credit the remaining proceeds from the
    sale to the items of taxes, assessments, penalties, interest, and charges in the
    order in which they became due.

    A certificate issued under division (E)(2) of this section vests in the certificate
    holder and its secured party, if any, the same rights, interests, privileges,
    and immunities as are vested by the original certificate under sections 5721.30
    to 5721.43 of the Revised Code. The certificate shall be issued in the same form
    as the form prescribed for the original certificate issued except for any modifications
    necessary, in the county treasurer''s discretion, to reflect the extension under
    this division of the certificate holder''s lien to six years after the date shown
    on the original certificate as the date it was sold or any extension of that date.
    The certificate holder may record a certificate issued under division (E)(2) of
    this section or memorandum thereof as provided in division (B) of section 5721.35
    of the Revised Code, and the county recorder shall index the certificate and record
    any subsequent cancellation of the lien as provided in that section. The sale
    of a certificate extending the lien under division (E)(2) of this section does
    not impair the right of redemption of the owner of record of the certificate parcel
    or of any other person entitled to redeem the property.

    (3) If the holder of a certificate purchased under section 5721.32, 5721.33, or
    5721.42 of the Revised Code submits a notice of intent to foreclose to the county
    treasurer but fails to file a foreclosure action in a court of competent jurisdiction
    within the time specified in division (C)(2) of this section, the liens represented
    by all tax certificates respecting the certificate parcel held by that certificate
    holder, and for which the deadline for filing a notice of intent to foreclose
    has passed, are canceled and the certificates voided, and the certificate holder
    forfeits the payment of the amounts described in division (B)(2) of this section.

    (F) With respect to tax certificates purchased under section 5721.32, 5721.33,
    or 5721.42 of the Revised Code, upon the delivery to the private attorney by the
    county treasurer of the certification provided for under division (C)(2) of this
    section, the private attorney shall institute a foreclosure proceeding under this
    division in the name of the certificate holder to enforce the holder''s lien,
    in any court or board of revision with jurisdiction, unless the certificate redemption
    price is paid prior to the time a complaint is filed. The attorney shall prosecute
    the proceeding to final judgment and satisfaction, whether through sale of the
    property or the vesting of title and possession in the certificate holder or other
    disposition under sections 323.65 to 323.79 of the Revised Code or as may otherwise
    be provided by law.

    The foreclosure proceedings under this division, except as otherwise provided
    in this division, shall be instituted and prosecuted in the same manner as is
    provided by law for the foreclosure of mortgages on land, except that, if service
    by publication is necessary, such publication shall be made once a week for three
    consecutive weeks and the service shall be complete at the expiration of three
    weeks after the date of the first publication.

    Any notice given under this division shall include the name of the owner of the
    parcel as last set forth in the records of the county recorder, the owner''s last
    known mailing address, the address of the subject parcel if different from that
    of the owner, and a complete legal description of the subject parcel. In any county
    that has adopted a permanent parcel number system, such notice may include the
    permanent parcel number in addition to a complete legal description.

    It is sufficient, having been made a proper party to the foreclosure proceeding,
    for the certificate holder to allege in such holder''s complaint that the tax
    certificate has been duly purchased by the certificate holder, that the certificate
    redemption price is due and unpaid, that there is a lien against the property
    described in the tax certificate, and, if applicable, that the certificate holder
    desires to invoke the alternative redemption period prescribed in sections 323.65
    to 323.79 of the Revised Code, without setting forth in such holder''s complaint
    any other special matter relating to the foreclosure proceeding. The complaint
    shall pray for an order directing the sheriff, or the bailiff if the complaint
    is filed in municipal court, to offer the property for sale in the manner provided
    in section 5721.19 of the Revised Code or otherwise transferred according to any
    applicable procedures provided in sections 323.65 to 323.79 of the Revised Code,
    unless the complaint documents that the county auditor has determined that the
    true value of the certificate parcel is less than the certificate purchase price.
    In that case, the prayer of the complaint shall request that fee simple title
    to the property be transferred to and vested in the certificate holder free and
    clear of all subordinate liens.

    In the foreclosure proceeding, the certificate holder may join in one action any
    number of tax certificates relating to the same owner. However, the decree for
    each tax certificate shall be rendered separately and any proceeding may be severed,
    in the discretion of the court or board of revision, for the purpose of trial
    or appeal. Except as may otherwise be provided in sections 323.65 to 323.79 of
    the Revised Code, upon confirmation of sale, the court or board of revision shall
    order payment of all costs related directly or indirectly to the tax certificate,
    including, without limitation, attorney''s fees of the holder''s attorney in accordance
    with section 5721.371 of the Revised Code. The tax certificate purchased by the
    certificate holder is presumptive evidence in all courts and boards of revision
    and in all proceedings, including, without limitation, at the trial of the foreclosure
    action, of the amount and validity of the taxes, assessments, charges, penalties
    by the court and added to such principal amount, and interest appearing due and
    unpaid and of their nonpayment.

    (G) If a parcel is sold under this section, the officer who conducted the sale
    shall collect the recording fee from the purchaser at the time of the sale and,
    following confirmation of the sale, shall prepare and record the deed conveying
    the title to the parcel to the purchaser.'
