- number: '5711.02'
  heading: Annual returns - supplying of blanks
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: Except as otherwise provided by section 5711.13 of the Revised Code, each
    year, beginning in tax year 2004, each taxpayer having taxable personal property
    with an aggregate taxable value in excess of ten thousand dollars shall make a
    return to the county auditor of each county in which any taxable property the
    taxpayer must return is required by this chapter to be listed. The taxpayer shall
    truly and correctly list on the return all taxable property so required to be
    listed, including property exempt under division (C)(3) of section 5709.01 of
    the Revised Code. Such returns shall be made on the blanks prescribed by the tax
    commissioner, which the county auditor shall supply at the auditor's office along
    with blanks of the kind required for the county supplemental return required by
    section 5711.131 of the Revised Code. The county auditor shall mail or distribute
    such blanks prior to the fifteenth day of February to all persons known to the
    auditor to be taxpayers and to all persons to whom the commissioner may direct
    blanks of either type to be mailed or distributed. The county auditor may place
    listing and county supplemental blanks at convenient places in the county. The
    failure of a taxpayer to receive or procure blanks shall not excuse the taxpayer
    from making any return or county supplemental return. The individual required
    to make the return shall furnish all statements and documents, give all information
    required, answer all questions asked on the required blanks, and subscribe to
    the truth and correctness of all matters contained therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.02
- number: '5711.03'
  heading: Listing of taxable property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: Except as provided in sections 5711.01 to 5711.36 of the Revised Code, all
    taxable property shall be listed as to ownership or control, valuation, and taxing
    districts as of the beginning of the first day of January, annually, except that
    taxable personal property and credits used in business shall be listed as of the
    close of business of the last day of December, annually, and deposits not taxed
    at the source shall be listed as of the day fixed by the tax commissioner for
    the listing of deposits taxed at the source pursuant to section 5725.05 of the
    Revised Code. The subsequent transfer of any taxable property shall not authorize
    any taxpayer to omit the same from his return nor the assessor to fail to assess
    the same in the manner required, although such return or assessment is not made
    until after such transfer. When a person or taxpayer engages in business in this
    state on or after the first day of January, in any year, he shall list all his
    taxable property, except inventory, as to value, ownership and taxing districts
    as of the date he engages in business. In listing inventory as to ownership and
    taxing districts he shall list the probable average value intended to be used
    in business from the date he engages in business until the first day of January
    next thereafter. The valuation of all property, including average inventory, to
    be returned for taxation shall be determined by multiplying the value, or average
    value of such property by a fraction whose numerator is the number of full months
    engaged in business during the year of engaging in business, and whose denominator
    is twelve, unless he shows the assessor, under oath, and by producing a copy of
    the return or assessment, that the same property has been listed or assessed for
    taxation for said year in this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.03
- number: '5711.04'
  heading: Time for making returns
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: '(A) Except as otherwise provided in division (B) of the section, returns
    shall be made, annually, between the fifteenth day of February and the thirtieth
    day of April. Upon verified application of any taxpayer, and for good cause shown,
    the county auditor may extend the time within which such taxpayer may make a return
    to the fifteenth day of June. If the county auditor fails to allow, in whole,
    a timely application of the taxpayer for an extension of time for filing a return,
    the taxpayer, upon payment on or before the thirtieth day of April of an amount
    equal to one-half of the taxpayer''s tax for the next preceding year, shall make
    a return on or before the fifteenth day of June.

    (B) When a taxpayer first engages in business in this state after the first day
    of January in any year, the taxpayer shall make a return within ninety days of
    commencing such business. Upon verified application of the taxpayer, and for good
    cause shown, the county auditor may extend the time within which the taxpayer
    may make the return for a further specified period not exceeding forty-five days.

    (C) The county auditor shall certify any extension of time acquired by the taxpayer
    to the tax commissioner, and the commissioner shall have the same power as to
    a taxpayer who is required to make return to the commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.04
- number: '5711.05'
  heading: Returns of taxable property - fiduciary returns
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'As used in this section, "legal disability" has the same meaning as in section
    2131.02 of the Revised Code.

    Each person shall return all the taxable property of which the person is the owner,
    except property required by this section or the regulations of the tax commissioner
    to be returned for the person by a fiduciary; but this section does not authorize
    any person to omit from the person''s return of taxable property the person''s
    interest in investments and other taxable intangible property yielding income
    owned or held for the person''s benefit by a fiduciary and not taxed at the source,
    or other taxable property so owned or held by a nonresident fiduciary. The return
    of all the taxable property of a corporation shall be made by the president, a
    vice-president, or the secretary and by the principal accounting officer, that
    of a partnership, by a partner, and that of an association, by the managing agent
    in this state.

    All taxable property belonging to the persons named or indicated shall be returned
    by the fiduciaries named, as follows:

    (A) That of a ward, by the ward''s guardian;

    (B) That of a person under a legal disability having no guardian, by the person''s
    father, if living, if not, by the person''s mother, if living, and if neither
    father nor mother is living, by the person having such property in charge;

    (C) That of an estate of a deceased person, by the deceased person''s executor,
    administrator, or personal representative;

    (D) That of persons whose assets are in the hands of receivers, assignees for
    the benefit of creditors, trustees in bankruptcy, or official custodians, by such
    receivers, assignees, trustees in bankruptcy, or official custodians.

    Personal property used in business and taxable property of a nonresident used
    in and arising out of a business transacted for the nonresident or on the nonresident''s
    behalf in any of the cases mentioned in section 5709.03 of the Revised Code, in
    the possession or custody of any agent, factor, bailee, or other similar fiduciary,
    shall be returned by such fiduciary, except as is provided by regulation of the
    commissioner; but as to such property in the possession, custody, or legal ownership
    of a trustee the next succeeding paragraph of this section shall be exclusive;
    provided that a warehouseperson shall not be required to return for taxation personal
    property consigned to the warehouseperson for the sole purpose of being stored
    or forwarded, if such warehouseperson has no interest in such property other than
    a warehouseperson''s lien, or any profit to be derived from its sale.

    All the taxable property, except investments and other taxable intangible property
    yielding income, of a person for whose benefit property is held in trust shall
    be returned by the trustee, and if any beneficiary of such a trust is a person
    under a legal disability residing in this state, and for whom there is no other
    fiduciary in this state, the commissioner may require such a trustee to return
    also the investments and other taxable intangible property yielding income held
    for the benefit of any such beneficiary and not taxed at the source.

    All returns made as fiduciaries'' returns shall be separate from the fiduciary''s
    return as an individual, firm, association, or corporation and shall set forth
    the names of all persons toward whom the relation of fiduciary is borne or on
    whose behalf the returns are made, together with the capacity in which the fiduciary
    so acts for each of such persons.

    The commissioner may adopt and promulgate regulations covering the making of returns
    not inconsistent with this section or sections 5711.01 to 5711.36 of the Revised
    Code, so that all property taxable in this state shall be returned for taxation.'
