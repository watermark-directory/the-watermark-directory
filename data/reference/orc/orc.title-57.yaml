    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: The tax commissioner shall prescribe the form that the signature and declaration,
    if any, shall take on any document required to be filed with the commissioner
    and on any document required under Chapter 718., 3734., 3769., 4303., or 4305.
    or Title LVII of the Revised Code to be filed with the treasurer of state. The
    commissioner may authorize an electronic or other alternative form of filing of
    any document required to be filed with the commissioner or the treasurer of state
    under Chapter 3734., 3769., 4303., or 4305. or Title LVII of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.054
- number: '5703.055'
  heading: Rounding fractional parts of dollar
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: A person may, and if required by the tax commissioner shall, round to the
    nearest whole dollar all amounts the person is required to enter on any return,
    report, voucher, or other document. Any fractional part of a dollar that equals
    or exceeds fifty cents shall be rounded to the next whole dollar, and any fractional
    part of a dollar that is less than fifty cents shall be dropped. If a person chooses
    or is required to round amounts entered on the document, the person shall round
    all amounts entered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.055
- number: '5703.056'
  heading: Mailing terms; delivery services; date or receipt
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) As used in any section of the Revised Code that permits the tax commissioner
    to use certified mail or personal service or that requires or permits a payment
    to be made or a document to be submitted to the tax commissioner or the board
    of tax appeals by mail or personal service, and as used in any section of Chapter
    718., 3734., 3769., 4303., or 4305. or Title LVII of the Revised Code that requires
    or permits a payment to be made or a document to be submitted to the treasurer
    of state by mail:

    (1) "Certified mail," "express mail," "United States mail," "United States postal
    service," and similar terms include any delivery service authorized pursuant to
    division (B) of this section.

    (2) "Postmark date," "date of postmark," and similar terms include the date recorded
    and marked in the manner described in division (B)(3) of this section.

    (B) The tax commissioner may authorize the use of a delivery service for the delivery
    of any payment or document described in division (A) of this section if the commissioner
    finds that all of the following apply to the delivery service:

    (1) It is available to the general public.

    (2) It is at least as timely and reliable on a regular basis as the United States
    postal service.

    (3) It meets any other criteria that the tax commissioner may by rule prescribe.

    (C) In any section of the Revised Code referring to the date any payment or document
    is received by the tax commissioner by mail, personal service, or electronically
    or by a person receiving a document or payment from the tax commissioner by mail,
    the payment or document shall be considered to be received on one of the following
    dates, as applicable, except as provided in section 5703.053 or 5703.37 of the
    Revised Code:

    (1) For a document or payment sent by certified mail, express mail, United States
    mail, foreign mail, or a delivery service authorized for use under division (B)
    of this section, the date of the postmark placed by the postal or delivery service
    on the sender''s receipt or, if the sender was not issued a postmarked sender''s
    receipt, the date of the postmark placed by the postal or delivery service on
    the package containing the payment or document.

    (2) For personal service to the tax commissioner, the date the payment or document
    is received in any of the tax commissioner''s offices during business hours.

    (3) For a document filed or sent electronically or a payment made electronically,
    the date on the timestamp assigned by the first electronic system receiving that
    payment or document.

    (D) As used in divisions (A) and (C) of this section "electronically" includes
    by facsimile, if applicable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.056
- number: '5703.057'
  heading: Commissioner may require identifying information
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) For the efficient administration of the taxes and fees administered by
    the tax commissioner, the commissioner may require that any person filing a tax
    document with the department of taxation provide identifying information, which
    may include the person''s social security number, federal employer identification
    number, or other identification number requested by the commissioner. A person
    required by the commissioner to provide identifying information who has experienced
    any change with respect to that information shall notify the commissioner of the
    change prior to, or upon, filing the next tax document requiring such identifying
    information.

    (B) When transmitting or otherwise making use of a tax document that contains
    a person''s social security number, the commissioner shall take all reasonable
    measures necessary to ensure that the number is not capable of being viewed by
    the general public, including, when necessary, masking the number so that it is
    not readily discernible by the general public.

    (C)(1) If the commissioner makes a request for identifying information and the
    commissioner does not receive valid identifying information within thirty days
    of making the request, the commissioner may impose a penalty upon the person to
    whom the request was directed of up to one hundred dollars. If, after the expiration
    of this thirty day period, the commissioner makes one or more subsequent requests
    for identifying information and the person to whom the subsequent request is directed
    fails to provide valid identifying information within thirty days of the commissioner''s
    subsequent request, the commissioner may impose an additional penalty of up to
    two hundred dollars for each subsequent request not complied with in a timely
    fashion.

    (2) If a person required by the commissioner to provide identifying information
    does not notify the commissioner of a change with respect to that information
    as required under division (A) of this section within thirty days after filing
    the next tax document requiring such identifying information, the commissioner
    may impose a penalty of up to fifty dollars.

    (3) The penalties provided for under divisions (C)(1) and (2) of this section
    may be billed and assessed in the same manner as the tax or fee with respect to
    which the identifying information is sought and are in addition to any applicable
    criminal penalties described in division (D) of this section and any other penalties
    that may be imposed by the commissioner by law.

    (D) Section 5703.26 of the Revised Code applies with respect to false or fraudulent
    identifying information provided by a person to the commissioner under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.057
- number: '5703.058'
  heading: Deposit of tax payments within 30 days of receipt
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Before January 1, 2008, the tax commissioner and the treasurer of state shall
    consult and jointly adopt policies and procedures for the processing of payments
    of taxes administered by the tax commissioner such that payments are deposited
    in or credited to the appropriate account or fund within thirty days after receipt
    by the commissioner or treasurer. The policies and procedures shall apply to all
    such payments received on or after January 1, 2008. The policies and procedures
    are supplemental to rules adopted by the treasurer of state under section 113.08
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.058
- number: '5703.059'
  heading: Electronic or telephonic tax filing
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) The tax commissioner may adopt rules requiring returns, including any
    accompanying schedule or statement, for any tax or fee administered by the commissioner
    to be filed electronically using the Ohio business gateway as defined in section
    718.01 of the Revised Code, filed telephonically using the system known as the
    Ohio telefile system, or filed by any other electronic means prescribed by the
    commissioner.

    (B) The commissioner may adopt rules requiring any payment of tax shown on such
    a return to be due to be made electronically in a manner approved by the commissioner.

    (C) A rule adopted under this section does not apply to returns or reports filed
    or payments made before the effective date of the rule. The commissioner shall
    publicize any new electronic filing requirement on the department''s web site.
    The commissioner shall educate the public of the requirement through seminars,
    workshops, conferences, or other outreach activities.

    (D) Any person required to file returns and make payments electronically under
    rules adopted under this section may apply to the commissioner, on a form prescribed
    by the commissioner, to be excused from that requirement. For good cause shown,
    the commissioner may excuse the applicant from the requirement and permit the
    applicant to file the returns or reports or make the payments required under this
    section by nonelectronic means.'
  history: null
