- number: '5736.13'
  heading: Funds for receiving, accounting, and distribution of tax revenue
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) For the purpose of receiving, accounting for, and distributing revenue
    received from the tax imposed by section 5736.02 of the Revised Code, the following
    funds are hereby created in the state treasury:

    (1) The petroleum activity tax fund;

    (2) The petroleum activity tax administration fund. All amounts credited to the
    petroleum activity tax administration fund shall be used solely for the purpose
    of paying the expenses of the department of taxation incident to the administration
    of the tax imposed by section 5736.02 of the Revised Code.

    (3) The petroleum activity tax public highways fund.

    (B) All money collected from the tax imposed by section 5736.02 of the Revised
    Code shall be deposited into the petroleum activity tax fund.

    (C) From the petroleum activity tax fund, the director of budget and management
    shall place to the credit of the tax refund fund established by section 5703.052
    of the Revised Code amounts equal to the refunds certified by the tax commissioner
    pursuant to section 5736.08 of the Revised Code.

    (D) Not later than the last day of March, June, September, and December of each
    year, the director of budget and management shall provide for the transfer of
    the balance of the petroleum activity tax fund as of the last day of the preceding
    month, excluding any amounts required to be transferred as provided in division
    (C) of this section, as follows:

    (1) To the petroleum activity tax administration fund, one per cent;

    (2) To the petroleum activity tax public highways fund, an amount that bears the
    same ratio to the balance in the petroleum activity tax fund, after subtracting
    the amount transferred under division (D)(1) of this section, that (a) the calculated
    gross receipts attributed to motor fuel used for propelling vehicles on public
    highways and waterways as indicated by returns filed by the last day of the preceding
    month, bears to (b) all calculated gross receipts as indicated by those returns;

    (3) To the general revenue fund, the amount remaining after the transfers required
    by divisions (D)(1) and (2) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.13
- number: '5736.14'
  heading: Personal liability
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A)(1) If any person, regardless of organizational form, required to file
    reports and to remit taxes imposed under this chapter fails for any reason to
    file such reports or pay such taxes, any employees of the person having control
    or supervision of, or charged with the responsibility of, filing reports and making
    payments, or any officers or trustees of the person responsible for the execution
    of the person''s fiscal responsibilities, are personally liable for the failure.

    (2) The dissolution, termination, or bankruptcy of a person shall not discharge
    a responsible officer''s, shareholder''s, member''s, manager''s, employee''s,
    or trustee''s liability for failure of the person to file reports or remit taxes.
    The sum due for the liability may be collected by assessment in the manner provided
    in section 5736.09 of the Revised Code.

    (B) If more than one individual is personally liable under this section for the
    unpaid tax of a person, then the liability of all such individuals shall be joint
    and several.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.14
- number: '5736.50'
  heading: Tax credits
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) A taxpayer granted a credit by the tax credit authority under section
    122.17 or former division (B)(2) or (3) of section 122.171 of the Revised Code,
    as those divisions existed before the effective date of the amendment of this
    section by H.B. 64 of the 131st general assembly, may claim a refundable credit
    against the tax imposed under this chapter. For the purpose of making tax payments
    under this chapter, taxes equal to the amount of the refundable credit shall be
    considered to be paid on the first day of the tax period.

    (B) A nonrefundable credit granted by the tax credit authority under division
    (B) of section 122.171 of the Revised Code may be claimed against the tax imposed
    under this chapter.

    (C) Credits authorized in division (A) or (B) of this section shall not be claimed
    for any tax period beginning after the date on which a relocation of employment
    positions occurs in violation of an agreement entered into under section 122.17
    or 122.171 of the Revised Code.

    (D) A taxpayer may claim any unused portion of the credit authorized under division
    (B) of section 5751.50 of the Revised Code against the tax imposed under this
    chapter. No credit shall be allowed under this division if the credit was available
    against the tax imposed under section 5751.02 of the Revised Code except to the
    extent the credit was not applied against that tax.

    (E) The amount of a credit claimed under division (B) or (D) of this section shall
    not exceed the tax otherwise due for the tax period. If the credit allowed under
    division (B) or (D) of this section exceeds the tax otherwise due, the excess
    may be carried forward to the extent authorized by section 122.171 of the Revised
    Code.

    If a taxpayer is authorized to claim credits under division (A) and either or
    both of divisions (B) and (D) of this section for the same tax period, the taxpayer
    shall claim the credit allowed under division (B) or (D) before the credit allowed
    under division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.50
- number: '5736.99'
  heading: Fraudulent claims; violations of chapter
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) Any person that files a fraudulent refund claim under section 5736.08
    of the Revised Code shall be fined the greater of not more than one thousand dollars
    or the amount of the fraudulent refund requested or imprisoned not more than sixty
    days, or both.

    (B) Except as provided in this section, whoever violates any section of this chapter,
    or any rule adopted by the tax commissioner under this chapter, shall be fined
    not more than five hundred dollars or imprisoned not more than thirty days, or
    both.

    (C) Any person that is subject to the tax imposed by this chapter and that is
    found to be engaged in distributing, importing, or causing the importation of
    motor fuel for consumption in this state without a license as required by section
    5736.06 of the Revised Code shall be fined not more than one thousand dollars
    or imprisoned not more than one hundred eighty days, or both.

    (D) The penalties provided in this section are in addition to any penalties imposed
    by the tax commissioner under section 5736.05 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.99
- number: '5737.01'
  heading: Grain handling tax definitions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5737'
    name: Grain Handling Tax
  text: 'As used in sections 5737.01 to 5737.08, inclusive, of the Revised Code:

    (A) "Person" includes individuals, corporations, firms, and associations of whatsoever
    form.

    (B) "Handling" includes the receipt of grain and the purchase of grain in connection
    with or as a part of any business, with the exceptions and exemptions mentioned
    in this section and in section 5737.02 of the Revised Code.

    (C) "Receipt" and "received" mean the acquisition of actual custody or possession
    at or in an elevator, warehouse, store, mill, or other facility for the storage,
    accumulation, sale, or processing of grain for any purpose, but do not include
    transactions for the purpose only of guaranteeing warehouse receipts to be used
    as security.

    (D) "Purchase" and "purchased" mean the acquisition of title without custody or
    possession, but do not include transactions for the purpose only of guaranteeing
    warehouse receipts to be used as security.

    (E) "Grain" includes all commercial field seeds in their natural state, or when
    hulled, cleaned, dried, graded, or polished, but excludes such seeds when otherwise
    processed and the products of such processing.

    (F) "Assessor," "return," "assessment," "general personal duplicate," and "taxing
    district" have the meaning assigned thereto by the laws relating to the taxation
    of personal property.

    (G) "Track buyer" means any person who buys and sells grain of any kind from other
    persons engaged in the elevator and grain business and who does not have actual
    possession of such grain in his own warehouse or on his own premises, but who
    handles commercial paper only and not the actual grain.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5737.01
- number: '5737.02'
  heading: Exemptions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5737'
    name: Grain Handling Tax
  text: Sections 5737.01 to 5737.08, inclusive, of the Revised Code do not apply to
    a public utility, as defined in the taxation laws of this state, nor to a farmer
    as to grain raised and stored, kept, or found on a farm owned or operated by himself.
    Such sections do not exempt any person engaged in any business taxed by such sections
    as to grain which is not otherwise subject to taxation in this state from the
    tax imposed by sections 5737.01 to 5737.08, inclusive, of the Revised Code and
    all such grain shall be included in the statements required and the assessments
    authorized and required by such sections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5737.02
- number: '5737.03'
  heading: Levy of tax - rate - exemption
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5737'
    name: Grain Handling Tax
  text: 'An annual excise tax is hereby levied on the handling of grain, in lieu of
    all taxes on grain as property of any person engaged in such business, for all
    the purposes for which taxes would otherwise be levied on such grain as property
    in the taxing district in which any such business is carried on, measured as follows:

    (A) For the statement due in 2005, one-half mill per bushel upon all wheat and
    flax handled at one or more places in this state in any such business during the
    taxable year, as defined in section 5737.04 of the Revised Code, and one-fourth
    mill per bushel upon all other grain handled.

    (B) For the statement due in 2006, one-fourth mill per bushel upon all wheat and
    flax handled at one or more places in this state in any such business during the
    taxable year, as defined in section 5737.04 of the Revised Code, and one-eighth
    mill per bushel upon all other grain handled.

    (C) No statement or tax is due in 2007 or any year thereafter.

    The tax imposed by this section shall not be paid by a track buyer, who shall
    be liable for the personal property taxes only, as levied by sections 5711.01
    to 5711.36 of the Revised Code.

    All grain included in the statements required by section 5737.04 of the Revised
    Code, upon the handling of which a tax is imposed by this section, is exempt from
    taxation as personal property. Any grain that would be included in such statements
    for taxable year 2007 or any year thereafter is exempt from taxation as personal
    property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5737.03
- number: '5737.04'
  heading: Statement to accompany annual return - contents - form
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5737'
    name: Grain Handling Tax
  text: 'Every person engaged in handling grain shall, at the time when his annual
    return of taxable property is made or required to be made, file a statement setting
    forth:

    (A) The number of bushels of each kind of grain received by him, or purchased
    by him for shipment from a place in this state, at each place where he has carried
    on such business in this state during the year immediately preceding the date
    as of which the taxable personal property of such person is required to be listed,
    or the part thereof during which he was engaged in such business at such place.
    Grain purchased for shipment from a place in this state is deemed purchased at
    the principal place in this state where the purchaser maintains an elevator, warehouse,
    or other like facility; and if there is no such place, at the principal office
    or place of business of such person in this state, which, in the case of an individual
    having no other office or place of business, shall be his actual place of residence.

    (B) The number of bushels of each kind of grain included in the statement required
    by division (A) of this section which has been transferred from one such place
    to another such place.

    A form for making such statement shall be included in the blanks prescribed by
    the tax commissioner for the making of returns of taxable property. Such statement
    shall be filed with such return in the office in which such return is filed, or
    would be required to be filed, as to taxable personal property used in business
    at the place where such occupation is or has been carried on.'
  history: null
