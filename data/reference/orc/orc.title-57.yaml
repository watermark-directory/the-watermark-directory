- number: '5719.01'
  heading: Attaching of lien for taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'As used in this Chapter, "taxes" means all general taxes levied against personal
    property pursuant to section 5709.01 of the Revised Code and all taxes levied
    pursuant to section 5707.04 of the Revised Code.

    All personal property subject to taxation shall be liable to be seized and sold
    for taxes. The personal property of a deceased person in the hands of an executor
    or administrator shall be liable for any tax due on it from the decedent.

    Taxes charged on any tax duplicate, except those upon real estate, shall be a
    lien on real property of the person charged therewith from the date of the filing
    of a notice of such lien as provided by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.01
- number: '5719.02'
  heading: Amounts payable when filing return - manner of payment - advance payments
    - returns by mail
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'Each person presenting a return for filing for taxation with a county auditor
    pursuant to sections 5711.01 to 5711.36 of the Revised Code, shall at the time
    of presenting the same for filing or within ten days of the last date for presentment
    for filing as required by law or as extended under authority of law, pay to the
    county treasurer of the county in which the same is presented for filing, on account
    of taxes assessable on such return, the following amounts:

    (A) As to the taxable property mentioned in section 5709.01 of the Revised Code,
    except real property, one half of the taxes to which the value thereof as listed
    in the return would be subject at the aggregate rate applicable thereto;

    (B) As to all taxable property mentioned in section 5707.04 of the Revised Code
    one half of the taxes to which the value thereof as listed in the return would
    be subject at the rate imposed by law on such property. Unless otherwise prescribed
    for any county by the tax commissioner, such payments shall be made in the manner
    prescribed by this section.

    The auditor, on presentation of the return, shall compute therefrom the amount
    of the advance payment of taxes required by this section and shall issue in duplicate
    a certificate for the payment of the amount computed into the county treasury
    to the credit of the proper undivided tax funds, designating thereon, separately,
    the amount to be credited to each undivided tax fund. One copy of such certificate
    shall be retained by the auditor and the other shall be delivered to the person
    desiring to file a return, who shall deliver the same to the treasurer together
    with the payment required by this section. The treasurer shall retain such copy
    and issue to the person making such payment a receipt in duplicate, one copy of
    which shall be for the use of the person making such payment, and the other the
    treasurer shall deliver to the auditor. Upon receiving such copy, the auditor
    shall attach the same to his copy of the return, which shall thereby be deemed
    filed and made as of the date of such receipt, but if the return is presented
    for filing within the time required by law or as extended under authority of law,
    the completion of the filing thereof as required by this section within ten days
    thereafter shall be considered as within the time allowed, and the penalty prescribed
    by law shall not attach.

    A person desiring to present a return by mail may enclose therewith an addressed
    envelope with sufficient postage, in which event the auditor shall enclose the
    warrant for payment in such envelope and deposit it in the mail. A person desiring
    to make an advance payment by mail may enclose with such payment an addressed
    envelope with sufficient postage, and the treasurer shall enclose such person''s
    copy of the receipt in such envelope and deposit it in the mail. If a person so
    presenting a return by mail tenders with it an advance payment which the auditor
    finds correct in amount, the auditor shall deliver the payment, together with
    his certificate therefor, and the addressed envelope to the treasurer, who shall
    enclose such person''s copy of the receipt in such envelope and deposit it in
    the mail.

    This section does not apply to a taxpayer required by section 5711.13 of the Revised
    Code to make a combined return to the tax commissioner, but each such taxpayer
    shall pay the entire amount of taxes charged against it on the general personal
    property duplicate of such county at the time prescribed by law for the payment
    of taxes so charged.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.02
- number: '5719.021'
  heading: Treasurer's office open to collect taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'The office of the county treasurer shall be kept open for the collection
    of advance payments of taxes during the entire time that the county auditor is
    accepting returns under section 5711.04 of the Revised Code, and for the collection
    of taxes charged on the general personal or classified tax duplicate from the
    time of delivery of the duplicate until the twenty-first day of September.

    When any such tax is paid at the office of the county treasurer, the treasurer
    shall give a receipt to the person paying it. If any such tax is paid to the treasurer
    by mail and the person paying it encloses with the payment an addressed envelope
    with sufficient postage, the treasurer shall enclose a receipt for the taxes in
    such envelope and deposit it in the mail. No receipt given by the treasurer for
    payments made otherwise than in lawful money or the notes specified in section
    321.13 of the Revised Code shall be valid, unless the moneys represented by such
    payment are received into the county treasury or a county depository.

    The tax receipt given by the treasurer shall be a duplicate of the tax bill.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.021
- number: '5719.03'
  heading: Credit of advance payment of taxes - payment date - late payment penalty
    - partial payments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: '(A) The county auditor shall preserve all receipts showing the advance payment
    of taxes. At the time of making up the general personal and the classified tax
    list and duplicate, the auditor shall enter thereon opposite the name of each
    person charged with taxes the amount of the advance payment made, as a credit
    against the amount of taxes charged thereon against such person.

    (B) Each person charged with taxes on a general personal property or a classified
    property tax duplicate shall pay the full amount of such taxes, less the amount
    of advance payment credited on the duplicate, on or before the twentieth day of
    September, or a day as extended pursuant to section 5719.031 of the Revised Code.

    (C) A tax is paid on or before the dates set forth in this section if the tax
    payment is received by the county treasurer on or before the last day for payment
    of such tax, or is received after such date in an envelope that was postmarked
    by the United States postal service on or before the last day for payment of such
    tax. In the event there is more than one date of postmark on the envelope, the
    earliest date imprinted by the United States postal service shall be the date
    of payment. A private meter postmark on an envelope is not a valid postmark for
    purposes of establishing the date of payment of such tax.

    (D) When an installment of taxes is not paid within the time prescribed by this
    section, or within the time so prescribed as extended pursuant to section 5719.031
    of the Revised Code, a penalty of ten per cent of the amount due and unpaid shall
    accrue when the county treasurer closes the treasurer''s office for business on
    the last day so prescribed, but if the taxes are paid within ten days subsequent
    to the last day prescribed, the treasurer shall waive the collection of, and the
    auditor shall remit one-half of, the penalty.

    (E) A county treasurer may accept partial payments of taxes. Any overpayment shall
    be refunded by the treasurer in the manner most convenient to the treasurer. When
    the amount tendered and accepted is less than the amount due, the unpaid balance
    shall be treated as other unpaid taxes and, except when the unpaid amount is the
    penalty, the treasurer shall notify the taxpayer of such deficiency.

    If the taxpayer files with the payment of taxes a copy of an application to the
    county auditor for remission of penalty, or the payment is received within ten
    days after the last day the taxes may be paid without penalty, the county treasurer
    shall accept a partial payment in which the only unpaid amount is the penalty
    for late payment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.03
- number: '5719.031'
  heading: Delay in delivery of general personal or classified property tax duplicate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'When, because of an emergency as defined in section 323.17 of the Revised
    Code or because of a delay in delivery of the preliminary assessment certificates
    pursuant to section 5711.25 of the Revised Code the county auditor determines
    that the general personal or classified property tax duplicate cannot be delivered
    to the county treasurer by the time fixed by section 319.29 or 319.34 of the Revised
    Code, such delivery may be delayed for up to thirty days. Upon making said determination,
    the auditor shall, by written notice, inform the treasurer of the fact and of
    the cause of such delay and of the day upon which such delivery will be made.
    Upon issuance of said notice the time for payment of the taxes charged on the
    duplicate shall be extended for the same period of time after the time fixed for
    payment by division (B) of section 5719.03 of the Revised Code.

    Immediately after delivery to the treasurer of the general personal and classified
    property tax duplicates as prescribed in sections 319.29 and 319.34 of the Revised
    Code or this section, the treasurer shall prepare and mail a tax bill to each
    person in whose name property has been listed and assessed on either duplicate.
    Such tax bill shall be mailed at least twenty days prior to the last day prescribed
    by law for payment of any portion of such taxes without penalty.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.031
- number: '5719.04'
  heading: Tax list and duplicate of delinquent personal and classified property taxes
    - publication - notice of lien - certificate of jeopardy - stay of collection
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: '(A) Immediately after each settlement required by division (D) of section
    321.24 of the Revised Code, the county auditor shall make a tax list and duplicates
    thereof of all general personal and classified property taxes remaining unpaid,
    as shown by the county treasurer''s books and the list of taxes returned as delinquent
    by the treasurer to the auditor at such settlement. The county auditor shall also
    include in such list all taxes assessed by the tax commissioner pursuant to law
    which were not charged upon the tax lists and duplicates on which such settlements
    were made nor previously charged upon a delinquent tax list and duplicates pursuant
    to this section, but the auditor shall not include taxes specifically excepted
    from collection pursuant to section 5711.32 of the Revised Code. Such tax list
    and duplicates shall contain the name of the person charged and the amount of
    such taxes, and the penalty, due and unpaid, and shall set forth separately the
    amount charged or chargeable on the general and on the classified list and duplicate.
    The auditor shall deliver one such duplicate to the treasurer on the first day
    of December, annually. Upon receipt of the duplicate the treasurer may prepare
    and mail tax bills to all persons charged with such delinquent taxes. Each bill
    shall include a notice that the interest charge prescribed by section 5719.041
    of the Revised Code has begun to accrue.

    The auditor shall cause a copy of the delinquent personal and classified property
    tax list and duplicate provided for in this division to be published twice within
    sixty days after delivery of such duplicate to the treasurer in a newspaper of
    general circulation in the county. The newspaper shall meet the requirements of
    section 7.12 of the Revised Code. The auditor may publish the tax list on a preprinted
    insert in the newspaper. The cost of the second publication of the list shall
    not exceed three-fourths of the cost of the first publication of the list.

    Before such publication, the auditor shall cause a display notice of the forthcoming
    publication of such delinquent personal and classified property tax list to be
    inserted once a week for two consecutive weeks in a newspaper of general circulation
    in the county. Copy for such display notice shall be furnished by the auditor
    to the newspaper selected to publish such delinquent tax lists simultaneously
    with the delivery of the duplicate to the treasurer. Publication of the delinquent
    lists may be made by a newspaper in installments, provided that complete publication
    thereof is made twice during said sixty-day period.

    The office of the county treasurer shall be kept open to receive the payment of
    delinquent general and classified property taxes from the day of delivery of the
    duplicate thereof until the final publication of the delinquent tax list. The
    name of any taxpayer who, prior to seven days before either the first or second
    publication of said list, pays such taxes in full or enters into a delinquent
    tax contract to pay such taxes in installments pursuant to section 5719.05 of
    the Revised Code shall be stricken from such list, and the taxpayer''s name shall
    not be included in the list for that publication.

    The other such duplicate, from which shall first be eliminated the names of persons
    whose total liability for taxes and penalty is less than one hundred dollars,
    shall be filed by the auditor on the first day of December, annually, in the office
    of the county recorder, and the same shall constitute a notice of lien and operate
    as of the date of delivery as a lien on the lands and tenements, vested legal
    interests therein, and permanent leasehold estates of each person named therein
    having such real estate in such county. Such notice of lien and such lien shall
    not be valid as against any mortgagee, pledgee, purchaser, or judgment creditor
    whose rights have attached prior to the date of such delivery. Such duplicate
    shall be kept by the county recorder in the official records, and indexed under
    the name of the person charged with such tax. No fee shall be charged by the county
    recorder for the services required under this section.

    The auditor shall add to the tax list made pursuant to this section all such taxes
    omitted in a previous year when assessed by the auditor or finally assessed by
    the tax commissioner pursuant to law, and by proper certificates cause the same
    to be added to the treasurer''s delinquent tax duplicate provided for in this
    section, and, in proper cases, file notice of the lien with the recorder, as provided
    in this section.

    If the authority making any assessment believes that the collection of such taxes
    will be jeopardized by delay, such assessing authority shall so certify on the
    assessment certificate thereof, and the auditor shall include a certificate of
    such jeopardy in the certificate given by the auditor to the treasurer. In such
    event, the treasurer shall proceed immediately to collect such taxes, and to enforce
    the collection thereof by any means provided by law, and the treasurer may not
    accept a tender of any part of such taxes; but the person or the representatives
    of the person against whom such assessment is made may, in the event of an appeal
    to the tax commissioner therefrom, obtain a stay of collection of the whole or
    any part of the amount of such assessment by filing with the treasurer a bond
    in an amount not exceeding double the amount as to which the stay is desired,
    with such surety as the treasurer deems necessary, conditioned upon the payment
    of the amount determined to be due by the decision of the commissioner which has
    become final, and further conditioned that if an appeal is not filed within the
    period provided by law, the amount of collection which is stayed by the bond will
    be paid on notice and demand of the treasurer at any time after the expiration
    of such period. The taxpayer may waive such stay as to the whole or any part of
    the amount covered by the bond, and if as the result of such waiver any part of
    the amount covered by the bond is paid, then the bond shall be proportionately
    reduced on the request of the taxpayer.

    (B) Immediately after each settlement required by division (D) of section 321.24
    of the Revised Code, the auditor shall make a separate list and duplicate, prepared
    as prescribed in division (A) of this section, of all general personal and classified
    property taxes that remain unpaid but are excepted from collection pursuant to
    section 5711.32 of the Revised Code. The duplicate of such list shall be delivered
    to the treasurer at the time of delivery of the delinquent personal and classified
    property tax duplicate.'
