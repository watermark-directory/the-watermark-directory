- number: '5736.06'
  heading: Suppliers license
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) No person subject to the tax imposed by section 5736.02 of the Revised
    Code shall distribute, import, or cause the importation of motor fuel for consumption
    in this state without holding a supplier''s license issued by the tax commissioner
    to engage in such activities.

    (B)(1) Within thirty days after first becoming subject to the tax imposed by section
    5736.02 of the Revised Code, a person shall apply to the tax commissioner for
    a supplier''s license on the form prescribed by the commissioner.

    (2) Each person issued a supplier''s license under division (B)(1) of this section
    shall apply to renew the license on or before the first day of March of each year.

    (3) Each license issued or renewed under division (B)(1) or (2) of this section
    shall be valid from the first day of March through the last day of February or,
    in the case of a new license issued after the first day of March, the date of
    issuance through the last day of February.

    (4) With each license application submitted under division (B)(1) or (2) of this
    section, the applicant shall pay an application fee equal to one of the following
    amounts:

    (a) If the applicant solely imports or causes the importation of motor fuel for
    sale, exchange, or transfer by the person in this state, three hundred dollars;

    (b) If the applicant engages in activities in addition to those described in division
    (B)(4)(a) of this section, one thousand dollars.

    If an applicant timely submits an application under division (B)(1) of this section
    on or after the first day of September of any year, the fee that would apply to
    the applicant under division (B)(4)(a) or (b) of this section shall be reduced
    by one-half.

    (5) The failure to apply to the commissioner for a supplier''s license does not
    relieve a person from the requirement to file returns and pay the tax imposed
    by this chapter.

    (C) The tax commissioner may refuse to issue a license to any applicant under
    this section in the following circumstances:

    (1) The applicant has previously had any license canceled for cause by the commissioner.

    (2) The commissioner believes that the application is not filed in good faith
    or is filed as a subterfuge in an attempt to procure a license for another person.

    (3) The applicant has violated any provision of this chapter.

    (D) If the tax commissioner refuses to issue a license to an applicant under this
    section, the applicant is entitled to a refund of the application fee in accordance
    with section 5736.08 of the Revised Code. All application fees collected under
    this section shall be deposited into the petroleum activity tax administration
    fund created in section 5736.13 of the Revised Code.

    (E) No person shall make a false or fraudulent statement on an application required
    by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.06
- number: '5736.07'
  heading: Revocation of license
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) If a taxpayer files a false return, fails to file a return as required
    by section 5736.04 of the Revised Code, or fails to pay the full amount of tax
    due with a return, the tax commissioner may revoke the supplier''s license issued
    to the taxpayer under section 5736.06 of the Revised Code by notifying the taxpayer
    in writing of such revocation in the manner provided in section 5703.37 of the
    Revised Code.

    (B) Upon the request of a person that is no longer subject to the tax imposed
    by this chapter, the tax commissioner may cancel the supplier''s license issued
    to the person under section 5736.06 of the Revised Code. The cancellation shall
    become effective at the time determined by the commissioner. No license shall
    be canceled upon the request of any person unless, prior to the date of cancellation,
    the person has paid to the state all taxes payable by such person under the laws
    of the state, together with any interest and penalties.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.07
- number: '5736.08'
  heading: Application for refund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) An application for refund to the taxpayer of amounts imposed under this
    chapter that are overpaid, paid illegally or erroneously, or paid on any illegal
    or erroneous assessment shall be filed by the taxpayer with the tax commissioner,
    on the form prescribed by the commissioner, within four years after the date of
    the illegal or erroneous payment, or within any additional period allowed under
    division (F) of section 5736.09 of the Revised Code. The applicant shall provide
    the amount of the requested refund along with the claimed reasons for, and documentation
    to support, the issuance of a refund.

    (B) On the filing of the refund application, the commissioner shall determine
    the amount of refund to which the applicant is entitled. If the amount is not
    less than that claimed, the commissioner shall certify the amount to the director
    of budget and management and treasurer of state for payment from the tax refund
    fund created under section 5703.052 of the Revised Code. If the amount is less
    than that claimed, the commissioner shall proceed in accordance with section 5703.70
    of the Revised Code.

    (C) Interest on a refund applied for under this section, computed at the rate
    provided for in section 5703.47 of the Revised Code, shall be allowed from the
    later of the date the amount was paid or when the payment was due.

    (D) Except as provided in section 5736.081 of the Revised Code, the commissioner
    may provide for the crediting against tax due for a tax period the amount of any
    refund due the taxpayer under this chapter for a preceding tax period.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.08
- number: '5736.081'
  heading: Application of refund to debts to the state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: 'As used in this section, "debt to this state" means unpaid taxes due the
    state, unpaid workers'' compensation premiums due under section 4123.35 of the
    Revised Code, unpaid unemployment compensation contributions due under section
    4141.25 of the Revised Code, unpaid unemployment compensation payment in lieu
    of contribution under section 4141.241 of the Revised Code, unpaid fees payable
    to the state or to the clerk of courts pursuant to section 4505.06 of the Revised
    Code, incorrect payments for medicaid services under the medicaid program, or
    any unpaid charge, penalty, or interest arising from any of the foregoing.

    If a taxpayer entitled to a refund under section 5736.08 of the Revised Code owes
    any debt to this state, the amount refundable may be applied in satisfaction of
    the debt. If the amount refundable is less than the amount of the debt, it may
    be applied in partial satisfaction of the debt. If the amount refundable is greater
    than the amount of the debt, the amount remaining after satisfaction of the debt
    shall be refunded. This section applies only to debts that have become final.
    For the purposes of this section, a debt becomes final when, under the applicable
    law, any time provided for petition for reassessment, request for reconsideration,
    or other appeal of the legality or validity of the amount giving rise to the debt
    expires without an appeal having been filed in the manner provided by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.081
- number: '5736.09'
  heading: Assessments for failure to file return
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) The tax commissioner may make an assessment, based on any information
    in the commissioner''s possession, against any person that fails to file a return
    or pay any amounts as required by this chapter. The commissioner shall give the
    person assessed written notice of the assessment as provided in section 5703.37
    of the Revised Code. With the notice, the commissioner shall provide instructions
    on the manner in which to petition for reassessment and request a hearing with
    respect to the petition.

    (B) Unless the person assessed, within sixty days after service of the notice
    of assessment, files with the commissioner a written petition signed by the person
    or the person''s authorized agent having knowledge of the facts, the assessment
    becomes final, and the amount of the assessment is due and payable from the person
    assessed to the treasurer of state. The petition shall indicate the objections
    of the person assessed, but additional objections may be raised in writing if
    received by the commissioner prior to the date shown on the final determination.

    If a petition for reassessment has been properly filed, the commissioner shall
    proceed under section 5703.60 of the Revised Code.

    (C)(1) After an assessment becomes final, if any portion of the assessment, including
    accrued interest, remains unpaid, a certified copy of the commissioner''s entry
    making the assessment final may be filed in the office of the clerk of the court
    of common pleas in the county in which the person resides or has its principal
    place of business in this state, or in the office of the clerk of court of common
    pleas of Franklin county.

    (2) Immediately upon the filing of the entry, the clerk shall enter judgment for
    the state against the person assessed in the amount shown on the entry. The judgment
    may be filed by the clerk in a loose-leaf book entitled, "special judgments for
    the petroleum activity tax" and shall have the same effect as other judgments.
    Execution shall issue upon the judgment at the request of the commissioner, and
    all laws applicable to sales on execution shall apply to sales made under the
    judgment.

    (3) If the assessment is not paid in its entirety within sixty days after the
    day the assessment was issued, the portion of the assessment consisting of tax
    due shall bear interest at the rate per annum prescribed by section 5703.47 of
    the Revised Code from the day the commissioner issues the assessment until it
    is paid or until it is certified to the attorney general for collection under
    section 131.02 of the Revised Code, whichever comes first. If the unpaid portion
    of the assessment is certified to the attorney general for collection, the entire
    unpaid portion of the assessment shall bear interest at the rate per annum prescribed
    by section 5703.47 of the Revised Code from the date of certification until the
    date it is paid in its entirety. Interest shall be paid in the same manner as
    the tax and may be collected by the issuance of an assessment under this section.

    (D) If the commissioner believes that collection of the tax will be jeopardized
    unless proceedings to collect or secure collection of the tax are instituted without
    delay, the commissioner may issue a jeopardy assessment against the person liable
    for the tax. Immediately upon the issuance of the jeopardy assessment, the commissioner
    shall file an entry with the clerk of the court of common pleas in the manner
    prescribed by division (C) of this section. Notice of the jeopardy assessment
    shall be served on the person assessed or the person''s authorized agent in the
    manner provided in section 5703.37 of the Revised Code within five days of the
    filing of the entry with the clerk. The total amount assessed is immediately due
    and payable, unless the person assessed files a petition for reassessment in accordance
    with division (B) of this section and provides security in a form satisfactory
    to the commissioner and in an amount sufficient to satisfy the unpaid balance
    of the assessment. Full or partial payment of the assessment does not prejudice
    the commissioner''s consideration of the petition for reassessment.

    (E) The commissioner shall immediately forward to the treasurer of state all amounts
    the commissioner receives under this section, and such amounts shall be considered
    as revenue arising from the tax imposed under this chapter.

    (F) Except as otherwise provided in this division, no assessment shall be made
    or issued against a taxpayer for amounts imposed under this chapter more than
    four years after the due date for the filing of the return or application for
    the tax period for which the amount was reported, or more than four years after
    the return or application for the tax period was filed, whichever is later. The
    time limit may be extended if both the taxpayer and the commissioner consent in
    writing to the extension or enter into an agreement waiving or extending the time
    limit. Any such extension shall extend the four-year time limit in division (A)
    of section 5736.08 of the Revised Code for the same period of time. Nothing in
    this division bars an assessment against a taxpayer that fails to file a return
    required by this chapter or that files a fraudulent return.

    (G) If the commissioner possesses information that indicates that the amount of
    tax a taxpayer is required to pay under this chapter exceeds the amount the taxpayer
    paid, the commissioner may audit a sample of the taxpayer''s calculated gross
    receipts over a representative period of time to ascertain the amount of tax due,
    and may issue an assessment based on the audit. The commissioner shall make a
    good faith effort to reach agreement with the taxpayer in selecting a representative
    sample. The commissioner may apply a sampling method only if the commissioner
    has prescribed the method by rule.

    (H) If the whereabouts of a person subject to this chapter is not known to the
    commissioner, the commissioner shall follow the procedures under section 5703.37
    of the Revised Code.'
