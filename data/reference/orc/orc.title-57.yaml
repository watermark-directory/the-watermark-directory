- number: '5753.02'
  heading: Tax levied on casino revenue
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: For the purpose of funding the needs of cities, counties, public school districts,
    law enforcement, and the horse racing industry; funding efforts to alleviate problem
    gambling and substance abuse; defraying Ohio casino control commission operating
    costs; and defraying the costs of administering the tax, a tax is levied on the
    gross casino revenue received by a casino operator of a casino facility at the
    rate of thirty-three per cent of the casino operator's gross casino revenue at
    the casino facility. The tax is in addition to any other taxes or fees imposed
    under the Revised Code or other law and for which the casino operator is liable
    under Section 6(C)(2) of Article XV, Ohio Constitution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5753.02
- number: '5753.021'
  heading: Tax levied on sports gaming
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: 'For the purposes of funding the education needs of this state, funding efforts
    to alleviate problem sports gaming, and defraying the costs of enforcing and administering
    the law governing sports gaming and the tax levied by this section, a tax is hereby
    levied on the sports gaming receipts of a sports gaming proprietor at the rate
    of twenty per cent of the sports gaming receipts received by the proprietor from
    the operation of sports gaming in this state.

    The tax imposed under this section is in addition to any other taxes or fees imposed
    under the Revised Code.'
