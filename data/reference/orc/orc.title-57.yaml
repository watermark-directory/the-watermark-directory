  url: https://codes.ohio.gov/ohio-revised-code/section-5722.03
- number: '5722.031'
  heading: Petition to vacate transfer of delinquent parcel by electing subdivision
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: '(A) If, in any foreclosure proceeding initiated under section 323.25, sections
    323.65 to 323.79, or section 5721.18 of the Revised Code, a county board of revision,
    court of common pleas, or municipal court issues a decree of foreclosure, order
    of sale, order of transfer, or confirmation of sale under section 5722.03 of the
    Revised Code that transfers a delinquent parcel to an electing subdivision, the
    electing subdivision may file a petition with the board or court to vacate the
    decree, order, or confirmation of sale on the basis that such electing subdivision
    does not wish to acquire the parcel. The electing subdivision may file such a
    petition notwithstanding any prior request by the electing subdivision or a party
    acting on behalf of the electing subdivision to acquire the parcel.

    If the electing subdivision files the petition within sixty days after the journalization
    of the decree, order, or confirmation of sale, the board or court shall vacate
    the decree, order, or confirmation of sale. If the electing subdivision files
    the petition more than sixty days after the journalization of the decree, order,
    or confirmation of sale, the board or court may vacate the decree, order, or confirmation
    of sale at its discretion utilizing standards of review prescribed in or consistent
    with Civil Rule 60.

    (B) An electing subdivision that files a petition under division (A) of this section
    shall not be required to intervene in the proceeding to which the petition relates,
    but shall file the petition in the same manner as would a party to the action.
    Upon filing the petition, the electing subdivision shall serve notice of the petition
    upon all parties to the action, except any party that previously failed to answer,
    plead, or appear in the proceeding as required in Civil Rule 12 or that is deemed
    to be in default under division (D) of section 323.69 of the Revised Code.

    (C) Upon the vacation of a decree, order, or confirmation of sale under division
    (A) of this section, the court of common pleas, municipal court, or board of revision
    shall reinstate the proceeding and schedule any further hearing or disposition
    required by law. The court or board shall not issue any further decree, order,
    or confirmation of sale transferring the delinquent parcel to the electing subdivision
    unless the electing subdivision petitions the court or board to acquire the parcel
    under sections 323.28, 323.74, 323.78, 5721.19, or 5722.03 of the Revised Code
    at least seven days before a scheduled final hearing or sale of the parcel pursuant
    to the proceeding. In such a case, the electing subdivision shall not file, and
    the court or board shall not approve, any subsequent petition to vacate a decree,
    order, or confirmation of sale transferring the parcel to the electing subdivision.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.031
- number: '5722.04'
  heading: Selection of forfeited lands that constitute nonproductive lands that subdivision
    wishes to acquire
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: '(A) Upon receipt of an ordinance or resolution adopted pursuant to section
    5722.02 of the Revised Code, the county auditor shall deliver to the electing
    subdivision a list of all delinquent lands within an electing subdivision''s boundaries
    that have been forfeited to the state pursuant to section 5723.01 of the Revised
    Code and thereafter shall notify the electing subdivision of any additions to
    or deletions from such list.

    The electing subdivision shall select from such lists the forfeited lands that
    constitute nonproductive lands that the subdivision wishes to acquire, and shall
    notify the county auditor of its selection prior to the advertisement and sale
    of such lands. Notwithstanding the sales price provisions of division (A)(1) of
    section 5723.06 of the Revised Code, the selected nonproductive lands shall be
    advertised for sale and be sold to the highest bidder for an amount at least sufficient
    to pay the amount determined under division (A)(2) of section 5721.16 of the Revised
    Code. All nonproductive lands forfeited to the state and selected by an electing
    subdivision, when advertised for sale pursuant to the relevant procedures set
    forth in Chapter 5723. of the Revised Code, shall be advertised separately from
    the advertisement applicable to other forfeited lands. The advertisement relating
    to the selected nonproductive lands also shall include a statement that the lands
    have been selected by the electing subdivision as nonproductive lands that it
    wishes to acquire and that, if at the forfeiture sale no bid for the sum of the
    taxes, assessments, charges, penalties, interest, and costs due on the parcel
    as determined under division (A)(1)(a) of section 5723.06 of the Revised Code
    is received, the lands shall be sold to the electing subdivision.

    (B) If any nonproductive land that has been forfeited to the state and selected
    by an electing subdivision is advertised and offered for sale by the auditor pursuant
    to Chapter 5723. of the Revised Code, but no minimum bid is received, the electing
    subdivision shall be deemed to have submitted the winning bid, and the land is
    deemed sold to the electing subdivision for no consideration other than the fee
    charged under division (C) of this section. If both a county and a township in
    that county have adopted a resolution pursuant to section 5722.02 of the Revised
    Code and both subdivisions select the same parcel or parcels of land, the electing
    subdivision deemed to have submitted the winning bid under this division shall
    be determined pursuant to division (D) of section 5722.03 of the Revised Code.

    The auditor shall announce the bid at the sale and shall declare the selected
    nonproductive land to be sold to the electing subdivision. The auditor shall deliver
    to the electing subdivision a certificate of sale.

    (C) On the returning of the certificate of sale to the auditor, the auditor shall
    execute and file for recording a deed conveying title to the selected nonproductive
    land and, once the deed has been recorded, deliver it to the electing subdivision.
    Thereupon, all previous title is extinguished, and the title in the electing subdivision
    is incontestable and free and clear from all liens and encumbrances, except taxes
    and special assessments that are not due at the time of the sale and any easements
    and covenants of record running with the land and created prior to the time at
    which the taxes or assessments, for the nonpayment of which the nonproductive
    land was forfeited, became due and payable.

    When title to a parcel of land upon which a lien has been placed under section
    715.261, 743.04, or 6119.06 of the Revised Code is transferred to a county land
    reutilization corporation under this section, the lien on the parcel shall be
    extinguished if the lien is for costs or charges that were incurred before the
    date of the transfer to the corporation and if the corporation did not incur the
    costs or charges, regardless of whether the lien was attached or the costs or
    charges were certified before the date of transfer. In such a case, the corporation
    and its successors in title shall take title to the property free and clear of
    any such lien and shall be immune from liability in any action to collect such
    costs or charges.

    If a county land reutilization corporation takes title to property before any
    costs or charges have been certified or any lien has been placed with respect
    to the property under section 715.261, 743.04, or 6119.06 of the Revised Code,
    the corporation shall be deemed a bona fide purchaser for value without knowledge
    of such costs or lien, regardless of whether the corporation had actual or constructive
    knowledge of the costs or lien, and any such lien shall be void and unenforceable
    against the corporation and its successors in title.

    At the time of the sale, the auditor shall collect and the electing subdivision
    shall pay the fee required by law for transferring and recording of deeds.

    Upon delivery of a deed conveying any nonproductive land to an electing subdivision,
    the county auditor shall charge all costs incurred in any proceeding instituted
    under section 5721.14 or 5721.18 of the Revised Code or incurred as a result of
    the forfeiture and sale of the nonproductive land to the taxing districts, including
    the electing subdivision, in direct proportion to their interest in the taxes,
    assessments, charges, interest, and penalties on the nonproductive land due and
    payable at the time the land was sold at the forfeiture sale. The interest of
    each taxing district in the taxes, assessments, charges, penalties, and interest
    on the nonproductive land shall bear the same proportion to the amount of those
    taxes, assessments, charges, penalties, and interest that the amount of taxes
    levied by each district against the nonproductive land in the preceding tax year
    bears to the taxes levied by all such districts against the nonproductive land
    in the preceding tax year. If the electing subdivision is a county land reutilization
    corporation and the nonproductive land is sold or transferred to the corporation,
    the corporation shall be deemed to have the proportionate interest of the county
    designating or organizing such corporation in the taxes, assessments, charges,
    penalties, and interest on the nonproductive land in the county. In making a semiannual
    apportionment of funds, the auditor shall retain at the next apportionment the
    amount charged to each such taxing district, except that in the case of nonproductive
    land conveyed to a county land reutilization corporation the auditor shall invoice
    the corporation the amount charged to it.

    (D) If no political subdivision has requested to purchase a parcel of land at
    a foreclosure sale, any lands otherwise forfeited to the state for want of a bid
    at the foreclosure sale may, upon the request of a county land reutilization corporation,
    be transferred directly to the corporation without appraisal or public bidding.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.04
- number: '5722.05'
  heading: Title to land incontestable after one year from filing of deed for record
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: Whenever nonproductive land is sold under section 5722.03 or 5722.04 of the
    Revised Code to an electing subdivision, no action shall be commenced, nor shall
    any defense be asserted, after one year from the date the deed conveying such
    land to the electing subdivision is filed for record, to question the validity
    of the title vested in the electing subdivision by such sale for any irregularity,
    informality, or omission in the proceedings relative to the foreclosure, forfeiture,
    or sale of such nonproductive land to the electing subdivision.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.05
- number: '5722.06'
  heading: Land management in the reutilization program
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: 'An electing subdivision, other than a county land reutilization corporation,
    shall assume possession and control of any nonproductive land acquired by it under
    section 5722.03, 5722.04, or 5722.10 of the Revised Code and any other land it
    acquires as a part of its land reutilization program. The electing subdivision
    shall hold and administer such property in a governmental capacity for the benefit
    of itself and of other taxing districts having an interest in the taxes, assessments,
    charges, interest, and penalties due and owing thereon at the time of the property''s
    acquisition by the electing subdivision. In its administration of such nonproductive
    land as a part of a land reutilization program, the electing subdivision shall:

    (A) Manage, maintain, and protect, or temporarily use for a public purpose such
    land in such manner as it deems appropriate;

    (B) Compile and maintain a written inventory of all such land. The inventory shall
    be available for public inspection and distribution at all times.

    (C) Study, analyze, and evaluate potential, present, and future uses for such
    land which would provide for the effective reutilization of the nonproductive
    land;

    (D) Plan for, and use its best efforts to consummate, the sale or other disposition
    of such land at such times and upon such terms and conditions as it deems appropriate
    to the fulfillment of the purposes and objectives of its land reutilization program;

    (E) Establish and maintain records and accounts reflecting all transactions, expenditures,
    and revenues relating to its land reutilization program, including separate itemizations
    of all transactions, expenditures, and revenues concerning each individual parcel
    of real property acquired as a part of such program.

    A county land reutilization corporation acquiring title to lands under section
    5722.03, 5722.04, or 5722.10 of the Revised Code, and to any other land it acquires
    as a part of its land reutilization program, shall maintain, operate, hold, transact,
    and dispose of such land as provided in its plan and pursuant to its purposes
    under Chapter 1724. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.06
- number: '5722.07'
  heading: Sale of land acquired in land reutilization program
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: 'As used in this section, "fair market value" means the appraised value of
    the nonproductive land made with reference to such redevelopment and reutilization
    restrictions as may be imposed by the electing subdivision as a condition of sale
    or as may be otherwise applicable to such land.

    An electing subdivision may, without competitive bidding, sell any land acquired
    by it as a part of its land reutilization program at such times, to such persons,
    and upon such terms and conditions, and subject to such restrictions and covenants
    as it deems necessary or appropriate to assure the land''s effective reutilization.
    Except with respect to a sale by or to a county land reutilization corporation,
    such land shall be sold at not less than its fair market value. However, except
    with respect to land held by a county land reutilization corporation, upon the
    approval of the legislative authorities of those taxing districts entitled to
    share in the proceeds from the sale thereof, the electing subdivision may either
    retain such land for devotion by it to public use, or sell, lease, or otherwise
    transfer any such land to another political subdivision for the devotion to public
    use by such political subdivision for a consideration less than fair market value.

    Whenever an electing subdivision sells any land acquired as part of its land reutilization
    program for an amount equal to or greater than fair market value, it shall execute
    and deliver all agreements and instruments incident thereto. The electing subdivision
    may execute and deliver all agreements and instruments without procuring any approval,
    consent, conveyance, or other instrument from any other person or entity, including
    the other taxing districts entitled to share in the proceeds from the sale thereof.

    An electing subdivision may, for purposes of land disposition, consolidate, assemble,
    or subdivide individual parcels of land acquired as part of its land reutilization
    program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.07
- number: '5722.08'
  heading: Disposing of proceeds of sale
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: 'When an electing subdivision, other than a county land reutilization corporation,
    sells any land acquired as a part of its land reutilization program, the proceeds
    from such sale shall be applied and distributed in the following order:

    (A) To the electing subdivision in reimbursement of its expenses incurred on account
    of the acquisition, administration, management, maintenance, and disposition of
    such land, and such other expenses of the land reutilization program as the electing
    subdivision may apportion to such land;

    (B) To the county treasurer to reimburse those taxing districts to which the county
    auditor charged the costs of foreclosure pursuant to section 5722.03 of the Revised
    Code, or costs of forfeiture pursuant to section 5722.04 of the Revised Code.
    If the proceeds of the sale of the nonproductive lands, after making the payment
    required under this division, are not sufficient to reimburse the full amounts
    charged to taxing districts as costs under section 5722.03 or 5722.04 of the Revised
    Code, the balance of the proceeds shall be used to reimburse the taxing districts
    in the same proportion as the costs were charged.

    (C) To the county treasurer for distribution to the taxing districts charged costs
    under section 5722.03 or 5722.04 of the Revised Code, in the same proportion as
    they were charged costs by the county auditor, an amount representing both of
    the following:

    (1) The taxes, assessments, charges, penalties, and interest due and owing on
    such land as of the date of acquisition by the electing subdivision;

    (2) The taxes, assessments, charges, penalties, and interest that would have been
    due and payable with respect to such land from such date of acquisition were such
    land not exempt from taxation pursuant to section 5722.11 of the Revised Code.

    (D) The balance, if any, to be retained by the electing subdivision for application
    to the payment of costs and expenses of its land reutilization program.

    All proceeds from the sale of lands held by a county land reutilization corporation
    shall be retained by the county land reutilization corporation for the purposes
    for which it was organized without further reporting or accounting to the taxing
    districts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.08
- number: '5722.09'
  heading: Committee of representatives of taxing districts
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: '(A) An electing subdivision shall keep all taxing districts having an interest
    in the taxes, assessments, charges, interest, and penalties on the real property
    acquired as part of the land reutilization program informed concerning the administration
    of its land reutilization program and may establish a committee comprised of a
    representative of each such taxing district. Each member of the committee shall
    be appointed by, and serve at the pleasure of, the taxing district the member
    represents. A representative may be an employee of the taxing district. All members
    shall serve without compensation. The committee may meet in person or by electronic
    or telephonic means, at the discretion of the electing subdivision, at least annually
    to review the operations of the land reutilization program and to advise the electing
    subdivision concerning any matter relating to such program which comes before
    the committee.

    (B) An electing subdivision, as a part of its land reutilization program, may
    establish separate neighborhood advisory committees consisting of persons living
    or owning property within each neighborhood affected by the program. The electing
    subdivision shall determine the boundaries of each neighborhood and which neighborhoods
    are affected by the program. Each neighborhood advisory committee shall be appointed
    by the chief executive officer of the electing subdivision for two-year overlapping
    terms and shall be composed of at least three persons. The electing subdivision
    shall consult with each neighborhood advisory committee at least annually to review
    the operations of the land reutilization program and to receive the advice of
    the members of the neighborhood advisory committee concerning any matter relating
    to the program which comes before the committees, including a specific interim
    use plan for the land.

    (C) This section does not apply to a county land reutilization corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.09
- number: '5722.10'
  heading: Accepting conveyance in lieu of foreclosure
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: 'An electing subdivision may accept a conveyance in lieu of foreclosure of
    delinquent land from the owners thereof. Such conveyance may only be accepted
    with the consent of the county auditor acting as the agent of the state pursuant
    to section 5721.09 of the Revised Code. If an electing subdivision or county land
    reutilization corporation certifies to the auditor in writing that the delinquent
    land is abandoned land as defined in section 323.65 of the Revised Code, the auditor
    shall consent to the conveyance. If the electing subdivision or county land reutilization
    corporation does not certify to the auditor in writing that the delinquent land
    is abandoned land, the auditor may consent to the conveyance for any reason authorized
    in this chapter. The owners or the electing municipal corporation or township
    shall pay all expenses incurred by the county in connection with any foreclosure
    or foreclosure and forfeiture proceeding filed pursuant to section 323.25, sections
    323.65 to 323.79, or section 5721.18 or 5721.14 of the Revised Code relative to
    such land. When the electing subdivision is the county or county land reutilization
    corporation acting on behalf of a county, it may require the owner to pay the
    expenses. The owner shall present the electing subdivision with evidence satisfactory
    to the subdivision that it will obtain by such conveyance fee simple title to
    such delinquent land. Unless otherwise agreed to by the electing subdivision accepting
    the conveyance, the title shall be free and clear of all liens and encumbrances,
    except such easements and covenants of record running with the land as were created
    prior to the time of the conveyance and delinquent taxes, assessments, penalties,
    interest, and charges, and taxes and special assessments that are a lien on the
    real property at the time of the conveyance. Any costs, charges, or liens that
    have been assessed, certified, or placed under section 715.261, 743.04, or 6119.06
    of the Revised Code with respect to real property acquired by or transferred to
    a county land reutilization corporation under this section shall, at the time
    of the conveyance to the corporation, be extinguished and of no force and effect
    as against the corporation, its successors, or its assignees, provided that the
    lien is for charges or costs that were incurred before the date of transfer to
    the corporation and that were not incurred by the corporation.

    Real property acquired by an electing subdivision under this section shall not
    be subject to foreclosure or forfeiture under Chapter 5721. or 5723. of the Revised
    Code. The sale or other transfer, as authorized by section 5722.07 of the Revised
    Code, of real property acquired under this section shall extinguish the lien on
    the title for all taxes, assessments, penalties, interest, and charges delinquent
    at the time of the conveyance of the delinquent land to the electing subdivision.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.10
- number: '5722.11'
  heading: Tax exemption for lands acquired
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: All lands acquired and held by an electing subdivision pursuant to this chapter
    shall be deemed real property used for a public purpose and, notwithstanding section
    5709.08 of the Revised Code, shall be exempt from taxation until sold.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.11
- number: '5722.12'
  heading: Discontinuing land reutilization program
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: An electing subdivision may discontinue its land reutilization program at
    any time by repealing the ordinance or resolution enacted under section 5722.02
    of the Revised Code, but it shall continue to be governed by the procedures set
    forth in this chapter concerning the administration and disposition of real property
    acquired as a part of its land reutilization program until all such lands have
    been sold or otherwise transferred and the proceeds thereof distributed in compliance
    with this chapter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.12
- number: '5722.13'
  heading: Public auction of land after fifteen years
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: 'Real property acquired and held by an electing subdivision pursuant to this
    chapter that is not sold or otherwise transferred within fifteen years after such
    acquisition shall be offered for sale at public auction during the sixteenth year
    after acquisition. If the real property is not sold at that time, it may be disposed
    of or retained for any lawful purpose without further application of this chapter.

    Notice of the sale shall contain a description of each parcel, the permanent parcel
    number, and the full street address when available. The notice shall be published
    once a week for three consecutive weeks prior to the sale in a newspaper of general
    circulation within the electing subdivision. The newspaper shall meet the requirements
    of section 7.12 of the Revised Code.

    Each parcel subsequent to the fifteenth year after its acquisition as part of
    a land reutilization program shall be sold for an amount equal to not less than
    the greater of:

    (A) Two-thirds of its fair market value;

    (B) The total amount of accrued taxes, assessments, penalties, interest, charges,
    and costs incurred by the electing subdivision in the acquisition, maintenance,
    and disposal of each parcel and the parcel''s share of the costs and expenses
    of the land reutilization program.

    The sale requirements of this section do not apply to real property acquired and
    held by a county land reutilization corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.13
- number: '5722.14'
  heading: Nonproductive land included in impacted cities project
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: 'If nonproductive land is subsequently included within an impacted cities
    project, as defined in section 1728.01 of the Revised Code, taxes on the land
    in the base period of the year immediately preceding the initial acquisition,
    as provided in section 1728.111 of the Revised Code, shall be determined by applying
    the land valuation as it existed in either the year preceding such initial acquisition,
    or in the next succeeding year after such nonproductive land is sold pursuant
    to section 5722.07 or 5722.13 of the Revised Code, whichever valuation is greater.

    This section does not apply to nonproductive land acquired and held by a county
    land reutilization corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.14
- number: '5722.15'
  heading: Removing of unpaid taxes and assessments after purchase
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: '(A) When an electing subdivision purchases nonproductive land under section
    5722.03 or 5722.04 of the Revised Code, the county auditor shall remove from the
    auditor''s tax lists and duplicates all taxes, assessments, charges, penalties,
    and interest that are due and payable on the land at the time of the sale in the
    same manner as if the property had been sold to any other buyer at the foreclosure
    or forfeiture sale.

    (B) The county auditor shall certify to an electing subdivision, other than a
    county land reutilization corporation, that purchases nonproductive land under
    section 5722.03 or 5722.04 of the Revised Code a record of all of the taxes, assessments,
    charges, interest, and penalties that were due on the parcel at the time of the
    sale; the taxing districts to which they were owed; and the proportion of that
    amount that was owed to each taxing district. Except with respect to a county
    land reutilization corporation, the certification shall be used by such an electing
    subdivision in distributing the proceeds of any sale of the land in accordance
    with division (C)(1) of section 5722.08 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.15
- number: '5722.21'
  heading: Acquisition of tax-delinquent real property for redevelopment free from
    lien for delinquent taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: '(A) As used in this section:

    (1) "Eligible delinquent land" means delinquent land or delinquent vacant land,
    as defined in section 5721.01 of the Revised Code, included in a delinquent tax
    list or delinquent vacant land tax list that has been certified delinquent within
    the meaning of section 5721.03 of the Revised Code, excluding any certificate
    parcel as defined in section 5721.30 of the Revised Code.

    (2) "Delinquent taxes" means the cumulative amount of unpaid taxes, assessments,
    recoupment charges, penalties, and interest charged against eligible delinquent
    land that became delinquent before transfer of title to a county, municipal corporation,
    township, or county land reutilization corporation under this section.

    (3) "Foreclosure costs" means the sum of all costs or other charges of publication,
    service of notice, prosecution, or other proceedings against the land under sections
    323.25 to 323.28, 323.65 to 323.79, or Chapter 5721. of the Revised Code as may
    pertain to delinquent land or be fairly apportioned to it by the county treasurer.

    (4) "Tax foreclosure sale" means a sale of delinquent land pursuant to foreclosure
    proceedings under sections 323.25 to 323.28, 323.65 to 323.79, or section 5721.14
    or 5721.18 of the Revised Code.

    (5) "Taxing authority" means the legislative authority of any taxing unit, as
    defined in section 5705.01 of the Revised Code, in which is located a parcel of
    eligible delinquent land acquired or to be acquired by a county, municipal corporation,
    township, or county land reutilization corporation in which a declaration under
    division (B) of this section is in effect.

    (B) The legislative authority of a municipal corporation may declare by ordinance,
    or a board of county commissioners, a board of township trustees, or the board
    of directors of a county land reutilization corporation may declare by resolution,
    that it is in the public interest for the county, municipal corporation, township,
    or county land reutilization corporation to acquire tax-delinquent real property
    within the county, municipal corporation, or township for the public purpose of
    redeveloping the property or otherwise rendering it suitable for productive, tax-paying
    use. In any county, municipal corporation, or township in which such a declaration
    is in effect, the county, municipal corporation, township, or county land reutilization
    corporation may purchase or otherwise acquire title to eligible delinquent land,
    other than by appropriation, and the title shall pass free and clear of the lien
    for delinquent taxes as provided in division (D) of this section. The authority
    granted by this section is supplemental to the authority granted under sections
    5722.01 to 5722.15 of the Revised Code.

    (C) With respect to any parcel of eligible delinquent land purchased or acquired
    by a county, municipal corporation, township, or county land reutilization corporation
    in which a declaration is in effect under this section, the county, municipal
    corporation, or township may obtain the consent of each taxing authority for release
    of any claim on the delinquent taxes and associated costs attaching to that property
    at the time of conveyance to the county, municipal corporation, or township. Consent
    shall be obtained in writing, and shall be certified by the taxing authority granting
    consent or by the fiscal officer or other person authorized by the taxing authority
    to provide such consent. Consent may be obtained before or after title to the
    eligible delinquent land is transferred to the county, municipal corporation,
    or township. A county that has organized and designated a county land reutilization
    corporation for purposes of this chapter is not required to obtain such consent.
    Upon conveyance to a county land reutilization corporation, the consent shall
    be deemed to have been given to the extent that the corporation requires consent.

    The taxing authority of a taxing unit and a county, municipal corporation, or
    township in which a declaration is in effect under this section may enter into
    an agreement whereby the taxing authority consents in advance to release of the
    taxing authority''s claim on delinquent taxes and associated costs with respect
    to all or a specified number of parcels of eligible delinquent land that may be
    purchased or acquired by the county, municipal corporation, or township for the
    purposes of this section. The agreement shall provide for any terms and conditions
    on the release of such claim as are mutually agreeable to the taxing authority
    and county, municipal corporation, or township, including any notice to be provided
    by the county, municipal corporation, or township to the taxing authority of the
    purchase or acquisition of eligible delinquent land situated in the taxing unit;
    any option vesting in the taxing authority to revoke its release with respect
    to any parcel of eligible delinquent land before the release becomes effective;
    and the manner in which notice of such revocation shall be effected. Nothing in
    this section or in such an agreement shall be construed to bar a taxing authority
    from revoking its advance consent with respect to any parcels of eligible delinquent
    land purchased or acquired by the county, municipal corporation, or township before
    the county, municipal corporation, or township enters into a purchase or other
    agreement for acquisition of the parcels.

    A county that has organized and designated a county land reutilization corporation
    is not required to enter into such an agreement with a taxing authority.

    (D) The lien for the delinquent taxes and associated costs for which all of the
    taxing authorities have consented to release their claims under this section is
    hereby extinguished, and the transfer of title to such delinquent land to the
    county, municipal corporation, or township shall be transferred free and clear
    of the lien for such taxes and costs. If a taxing authority does not consent to
    the release of its claim on delinquent taxes and associated costs, the entire
    amount of the lien for such taxes and costs shall continue as otherwise provided
    by law until paid or otherwise discharged according to law. If a county land reutilization
    corporation acquires title to eligible delinquent land under this section, the
    lien for delinquent taxes and costs with respect to land acquired by the corporation
    shall be extinguished simultaneously with the transfer of title to the corporation,
    notwithstanding that the taxing authorities have not consented to release their
    claims under this section.

    (E) All eligible delinquent land acquired by a county, municipal corporation,
    township, or county land reutilization corporation under this section is real
    property held for a public purpose and is exempted from taxation until the county,
    municipal corporation, township, or county land reutilization corporation sells
    or otherwise disposes of property.

    (F) If a county, municipal corporation, township, or county land reutilization
    corporation sells or otherwise disposes of delinquent land it purchased or acquired
    and for which all or a portion of a taxing authority''s claim for delinquent taxes
    was released under this section, whether by consent of the taxing authority or
    pursuant to division (D) of this section, the net proceeds from such sale or disposition
    shall be used for such redevelopment purposes the board of county commissioners,
    the legislative authority of the municipal corporation, the board of township
    trustees, or the board of directors of the county land reutilization corporation
    considers necessary or appropriate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.21
- number: '5722.22'
  heading: Immunity of land reutilization corporation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5722'
    name: Land Reutilization Program
  text: A county land reutilization corporation is not liable for damages, or subject
    to equitable remedies, for breach of a common law duty, or for violation of sections
    3737.87 to 3737.891 of the Revised Code or Chapter 3704., 3734., 3745., 3746.,
    3750., 3751., 3752., 6101., or 6111. of the Revised Code or any rule adopted or
    order, permit, license, variance, or plan approval issued under any of those chapters
    in connection with a parcel of land acquired by the county land reutilization
    corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5722.22
- number: '5723.01'
  heading: Forfeited lands
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: '(A)(1) Every tract of land and town lot, which, pursuant to foreclosure proceedings
    under section 323.25, sections 323.65 to 323.79, or section 5721.18 of the Revised
    Code, has been advertised and offered for sale on two separate occasions, not
    less than two weeks apart, and not sold for want of bidders, shall be forfeited
    to the state or to a political subdivision, school district, or county land reutilization
    corporation pursuant to division (A)(3) of this section.

    (2) The county prosecuting attorney shall certify to the court that such tract
    of land or town lot has been twice offered for sale and not sold for want of a
    bidder. Such forfeiture of lands and town lots shall be effective when the court
    by entry orders such lands and town lots forfeited to the state or to a political
    subdivision, school district, or county land reutilization corporation pursuant
    to division (A)(3) of this section. A copy of such entry shall be certified to
    the county auditor and, after the date of the certification, all the right, title,
    claim, and interest of the former owner is transferred to and vested in the state
    to be disposed of in compliance with this chapter.

    (3) After having been notified pursuant to division (A)(2) of this section that
    the tract of land or town lot has been twice offered for sale and not sold for
    want of bidders, the court shall notify the political subdivision and school district
    in which the property is located, and any county land reutilization corporation
    in the county, and offer to forfeit the property to the political subdivision,
    school district, or corporation, or to an electing subdivision as defined in section
    5722.01 of the Revised Code, upon a petition from the political subdivision, school
    district, or corporation. If no such petition is filed with the court within ten
    days after notification by the court, the court shall forfeit the property to
    the state in accordance with division (A)(2) of this section. If a political subdivision,
    school district, or corporation requests through a petition to receive the property
    through forfeiture, the forfeiture of land and town lots is effective when, by
    entry, the court orders such lands and town lots forfeited to the political subdivision,
    school district, or corporation. The court shall certify a copy of the entry to
    the county auditor and, after the date of certification, all the right, title,
    claim, and interest of the former owner is transferred to and vested in the political
    subdivision, school district, or corporation.

    (4) From and after the date of journalization of the order forfeiting a tract
    of land or a town lot to the state pursuant to division (A)(2) of this section
    and until such forfeited land has been redeemed by the former owner pursuant to
    section 5723.03 of the Revised Code or sold or transferred pursuant to section
    5723.04 of the Revised Code, any political subdivision in which the forfeited
    land is located or the county land reutilization corporation of the county in
    which the forfeited land is located, or an officer, agent, or employee of the
    subdivision or corporation, upon knowledge or belief that the forfeited land is
    unoccupied as defined in section 323.65 of the Revised Code, may enter the forfeited
    lands and any buildings, structures, or other improvements located on that land,
    for any of the following purposes:

    (a) Conducting an appraisal or inspection of the buildings, structures, or other
    improvements located on the forfeited land;

    (b) Conducting a voluntary action as defined in Chapter 3746. of the Revised Code
    or other environment assessment of the forfeited land and any buildings, structures,
    or other improvements located on that land;

    (c) Conducting any other health and safety inspection of the forfeited land and
    any buildings, structures, or other improvements located on that land.

    Unless an action or omission of a political subdivision or county land reutilization
    corporation, or an officer, agent, or employee of the subdivision or corporation,
    by clear and convincing evidence, constitutes willful or wanton misconduct or
    intentionally tortious conduct, the political subdivision or county land reutilization
    corporation, or an officer, agent, or employee of a subdivision or corporation,
    that enters the forfeited land pursuant to this division is not liable in any
    civil or administrative action, including an action in trespass, resulting from
    the entry onto the forfeited land or for any tort action as defined in section
    3746.24 of the Revised Code resulting from the testing for or actual presence
    of hazardous substances or petroleum at, or the release of hazardous substances
    or petroleum from, a property where a voluntary action is being or has been conducted
    pursuant to Chapter 3746. of the Revised Code and the rules adopted under it.
    This immunity is in addition to any immunities from civil liability or defenses
    established by any other section of the Revised Code or available at common law.
    Any entry upon forfeited land and any buildings, structures, or improvements located
    on that land pursuant to division (A)(4) of this section shall not constitute
    the exercise of dominion or control over the land or buildings, structures, or
    improvements on the land when that entry is for the purposes described in divisions
    (A)(4)(a) to (c) of this section.

    (B) Every parcel against which a judgment of foreclosure and forfeiture is made
    in accordance with section 5721.16 of the Revised Code is forfeited to the state
    on the date the court enters a finding under that section. After that date, all
    the right, title, claim, and interest of the former owner is transferred to the
    state to be disposed of in compliance with the relevant provisions of this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5723.01
- number: '5723.02'
  heading: Forfeited property is exempt from taxation until sold or redeemed
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: All real property that has been forfeited to the state is exempt from taxation
    from the date of forfeiture, and shall be removed from the tax lists and duplicates
    until sold or redeemed and placed on the list of exempted property maintained
    pursuant to section 5713.08 of the Revised Code. No taxes or assessments shall
    be assessed against such property from the date the property is forfeited to the
    state to the date the property is sold pursuant to this chapter. The proportionate
    amount of taxes that are a lien but not yet determined, assessed, and levied for
    the year in which the property is forfeited shall be remitted by the county auditor
    for the balance of the year from the date of forfeiture.
