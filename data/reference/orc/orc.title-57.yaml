- number: '5725.13'
  heading: Taxable property of dealers in intangibles
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: 'The following property shall be listed and assessed at its fair value and
    taxed only in the manner prescribed in sections 5725.01 to 5725.26, inclusive,
    of the Revised Code:

    (A) The shares of the stockholders in an incorporated dealer in intangibles having
    an actual place of business in this state, to the extent represented by capital
    employed in this state;

    (B) The shares of the stockholders, partners, or members of an unincorporated
    dealer in intangibles having an actual place of business in this state, the capital
    stock of which is divided into shares held by the owners, to the extent represented
    by capital employed in this state;

    (C) The property representing capital employed in this state by an unincorporated
    dealer in intangibles whose capital stock is not divided into shares, having an
    actual place of business in this state.'
