- number: '5707.03'
  heading: Tax levy on property on intangible property tax list - rates
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5707'
    name: County Taxes
  text: 'Annual taxes are hereby levied on the kinds of intangible property, enumerated
    in this section, on the intangible property tax list in the office of the treasurer
    of state at the following rates:

    (A) On investments, five per cent of income yield or of income as provided by
    section 5711.10 of the Revised Code for the 1983, 1984, and 1985 return years
    and no tax for subsequent return years;

    (B) On unproductive investments, two mills on the dollar for the 1983, 1984, and
    1985 return years and no tax for subsequent return years;

    (C) On deposits, one and three-eighths mills on the dollar for the 1982 and 1983
    return years and no tax for subsequent return years;

    (D) On shares of, and capital employed by, dealers in intangibles, eight mills
    on the dollar for return years prior to 2014 and no tax under this section for
    subsequent return years;

    (E) On money, credits, and all other taxable intangibles, three mills on the dollar
    for the 1983, 1984, and 1985 return years and no tax for subsequent return years.

    The object and distribution of such taxes shall be as provided in section 5725.24
    of the Revised Code.'
