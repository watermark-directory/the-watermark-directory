- number: '5725.15'
  heading: Assessment for shares and capital of dealer in intangibles
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: 'The report required by section 5725.14 of the Revised Code shall include
    as taxable property all the shares of the dealer in intangibles, the capital stock
    of which is divided into shares, representing capital employed in this state,
    and the value of the property representing the capital, not divided into shares,
    employed in this state by such dealer in intangibles, according to the aggregate
    fair value of the capital, surplus, and undivided profits as shown in such report,
    including in the case of an unincorporated dealer, the value of property converted
    into nontaxable bonds or securities within the preceding year, without deduction
    for indebtedness created in the purchase of such nontaxable bonds or securities.

    The filing by a dealer of the report required by section 5725.14 of the Revised
    Code shall be the preliminary assessment of the shares and property listed therein.

    If a dealer has separate offices, whether within this state only or within and
    without this state, the dealer shall list the amount of capital employed in each
    office in this state, which shall bear the same ratio to the entire capital of
    such dealer, wherever employed, as the gross receipts of such office bears to
    the entire gross receipts of such dealer, wherever arising.

    The aggregate book value of the capital, surplus, and undivided profits of a dealer
    in intangibles as shown in such report shall be taken as the fair value thereof
    for the purpose of the assessment required by this section, unless the commissioner
    finds that such book value is greater or less than the then fair value of said
    capital, surplus, and undivided profits. Claim for any deduction from book value
    of capital, surplus, and undivided profits must be made in writing by the dealer
    in intangibles at the time of making the dealer''s return.

    Whenever the commissioner assesses the fair value of the capital, surplus, and
    undivided profits of a dealer in intangibles at an amount in excess of the value
    thereof as listed in the dealer''s report, or assesses the shares or property
    of a dealer that fails to file a return, the commissioner shall give notice and
    proceed as provided in section 5711.31 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5725.15
- number: '5725.151'
  heading: Refundable tax credit for owner of RC 149.311 certificate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: '(A) As used in this section, "certificate owner" has the same meaning as
    in section 149.311 of the Revised Code.

    (B) There is allowed a credit against the tax imposed by section 5707.03 and assessed
    under section 5725.15 of the Revised Code for a dealer in intangibles subject
    to that tax that is a certificate owner of a rehabilitation tax credit certificate
    issued under section 149.311 of the Revised Code. The credit shall equal twenty-five
    per cent of the dollar amount indicated on the certificate, but the amount of
    the credit allowed for any dealer for any year shall not exceed five million dollars.
    The credit shall be claimed in the calendar year specified in the certificate.
    If the credit exceeds the amount of tax otherwise due in that year, the excess
    shall be refunded to the dealer but, if any amount of the credit is refunded,
    the sum of the amount refunded and the amount applied to reduce the tax otherwise
    due in that year shall not exceed three million dollars. The dealer may carry
    forward any balance of the credit in excess of the amount claimed in that year
    for not more than five ensuing years, and shall deduct any amount claimed in any
    such year from the amount claimed in an ensuing year.

    (C) A dealer in intangibles claiming a credit under this section shall retain
    the rehabilitation tax credit certificate for four years following the end of
    the year in which the credit was claimed, and shall make the certificate available
    for inspection by the tax commissioner upon the request of the tax commissioner
    during that period.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5725.151
- number: '5725.16'
  heading: Certificate of assessment of dealers in intangibles; collection of taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: 'On or before the first Monday of May, annually for return years prior to
    2014, the tax commissioner shall certify to the treasurer of state the assessment
    of the shares or property representing capital, or apportionment of either, of
    each dealer in intangibles doing business in the state, showing separately the
    amount representing capital employed in each county.

    The treasurer of state shall place the amounts certified on the intangible property
    tax list in the treasurer of state''s office in the names of the dealers represented
    by those certificates.

    The commissioner shall collect, on behalf of the treasurer, the taxes due on the
    assessments certified pursuant to this section, together with any applicable penalties
    or interest, in the manner prescribed by section 5725.22 of the Revised Code.
    The commissioner shall immediately forward to the treasurer any payments received
    under this section or section 5719.13 of the Revised Code. The treasurer shall
    credit all such payments against the appropriate amounts on the intangible property
    tax list in the treasurer''s office.

    A dealer in intangibles may claim a refund of any overpayment of the tax levied
    under division (D) of section 5707.03 of the Revised Code by filing an application
    for final assessment in accordance with section 5711.26 of the Revised Code.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
