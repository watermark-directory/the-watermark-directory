  url: https://codes.ohio.gov/ohio-revised-code/section-5733.28
- number: '5733.29'
  heading: Underpayment of estimated tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: '(A) In case of any underpayment of the estimated tax provided under section
    5733.021 of the Revised Code, there shall be added to the tax for the tax year
    an amount determined at the rate per annum prescribed by section 5703.47 of the
    Revised Code upon the amount of underpayment for the period of underpayment.

    (B) The amount of the underpayment shall be the excess of:

    (1) The amount of the estimated tax payment which would be required to be paid
    if the total estimated tax were equal to the total tax shown to be due on the
    report required to be filed, or if no report was filed, the tax for such year,
    over

    (2) The amount, if any, of the estimated tax paid on or before the last day prescribed
    for such payment.

    (C) The period of the underpayment shall run from the date the estimated tax payment
    was required to be made to the date on which such payment is made. For purposes
    of this section, a payment of estimated tax on any payment date shall be considered
    a payment of any previous underpayment only to the extent such payment exceeds
    the amount of the payment presently due.'
