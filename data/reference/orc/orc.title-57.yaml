  url: https://codes.ohio.gov/ohio-revised-code/section-5736.01
- number: '5736.02'
  heading: Motor fuel supplier tax; distribution of revenue
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) Beginning with the tax period that commences July 1, 2014, and continuing
    for every tax period thereafter, there is hereby levied an excise tax on each
    supplier measured by the supplier''s calculated gross receipts derived from the
    first sale of motor fuel within this state. The tax due shall be computed by multiplying
    sixty-five one-hundredths of one per cent by the supplier''s calculated gross
    receipts.

    All revenue from the tax shall be distributed as follows:

    (1) All revenue from the tax as measured by calculated gross receipts derived
    from the sale of motor fuel used for propelling vehicles on public highways and
    waterways shall be used for the purposes of maintaining the state highway system,
    funding the enforcement of traffic laws, and covering the costs of hospitalization
    of indigent persons injured in motor vehicle accidents on the public highways.

    (2) All revenue not distributed as required by division (A)(1) of this section
    shall be used for the purpose of funding the needs of this state and its local
    governments.

    (B) The tax imposed by this section is in addition to any other taxes or fees
    imposed under the Revised Code.

    (C) The tax commissioner shall determine and publish, on the web site of the department
    of taxation, the statewide average wholesale prices of a gallon of unleaded regular
    gasoline, of a gallon of propane, and of a gallon of diesel fuel for each calendar
    quarter. The commissioner''s determination is presumed to be correct unless clearly
    erroneous. The figure shall be published at least fifteen days before the beginning
    of the calendar quarter. The commissioner shall base the average price on pricing
    information available from the United States energy information administration
    or, if such information is not available from that agency, from another publicly
    available source selected by the commissioner. The commissioner shall first make
    reasonable efforts to obtain data specific to this state before using national
    data to determine the average wholesale price. The price shall not include any
    federal or state excise taxes on the gasoline or diesel fuel, or the tax imposed
    by this chapter. The price shall be rounded up to the nearest one-tenth of one
    cent.

    (D) Nothing in this chapter prohibits a person from separately or proportionately
    billing or invoicing the tax imposed by this section to a purchaser of motor fuel.

    (E) The tax imposed by this section applies only to suppliers having a substantial
    nexus with this state, as that term is defined in section 5751.01 of the Revised
    Code. A supplier that does not have substantial nexus with the state may voluntarily
    obtain a license from the commissioner under section 5736.06 of the Revised Code.
    A supplier that voluntarily obtains a license from the commissioner is entitled
    to the same benefits and is subject to the same duties and requirements as are
    suppliers required to be licensed with the commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.02
- number: '5736.03'
  heading: Avoidance of tax by receipt of fuel outside of state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) No person shall avoid the tax imposed by this chapter by receiving motor
    fuel outside of this state and transferring the motor fuel into this state within
    one year. Any such person shall be considered to have received the fuel in this
    state and shall include, in the calculation of calculated gross receipts, the
    number of gallons of motor fuel the person transfers into this state within one
    year after the person receives the property outside of this state.

    (B) Any person that knowingly receives motor fuel from a supplier that is not
    licensed as required by section 5736.06 of the Revised Code shall include in the
    calculation of the person''s calculated gross receipts the number of gallons of
    motor fuel the person received in this state or transported into this state from
    the unlicensed supplier.

    (C) The tax commissioner may adopt rules necessary to administer this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.03
- number: '5736.04'
  heading: Tax return; remittance
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: '(A) Not later than the tenth day of the second month after the end of each
    calendar quarter, every taxpayer shall file with the tax commissioner a tax return
    in such form as the commissioner prescribes. The return shall include, but is
    not limited to, the amount of the taxpayer''s calculated gross receipts for the
    calendar quarter and shall indicate the amount of tax due under section 5736.02
    of the Revised Code for the calendar quarter. The taxpayer shall indicate on each
    return the portion of the taxpayer''s gross receipts attributable to motor fuel
    used for propelling vehicles on public highways and waterways and the portion
    of such receipts attributable to motor fuel used for other purposes. For this
    purpose, the sale of gasoline and of diesel fuel that is not dyed diesel fuel
    shall be rebuttably presumed to be distributed or sold for use or used to propel
    vehicles on public highways or waterways. All other sales of motor fuel shall
    be rebuttably presumed not to be distributed or sold for use or used to propel
    vehicles on public highways or waterways.

    (B)(1) The taxpayer shall remit the tax shown to be due on the return, and, if
    required by the tax commissioner, file the return, electronically. The commissioner
    may require taxpayers to use the Ohio business gateway as defined in section 718.01
    of the Revised Code to file return returns and remit the tax, or may provide another
    means for taxpayers to file and remit the tax electronically.

    (2) A person required by this section to remit taxes or file returns electronically
    may apply to the commissioner, on the form prescribed by the commissioner, to
    be excused from that requirement. The commissioner may excuse a person from such
    requirement for good cause.

    (C) The tax rate with respect to calculated gross receipts for a calendar quarter
    is not fixed until the end of the measurement period for each calendar quarter.
    The total amount of calculated gross receipts reported for a given calendar quarter
    shall be subject to the tax rate in effect in that quarter.'
