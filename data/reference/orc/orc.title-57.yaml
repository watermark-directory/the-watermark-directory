- number: '5728.15'
  heading: Law enforcement agency or peace officer - immunity
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5728'
    name: Fuel Use Tax
  text: '(A) As used in this section, "peace officer" has the same meaning as in section
    2935.01 of the Revised Code.

    (B) A peace officer, law enforcement agency employing a peace officer, and the
    state or any political subdivision associated with a peace officer are not liable
    in damages in a civil action for any injury, death, or loss to person or property
    allegedly caused by conduct of a peace officer in the course of his performace
    of any duty required or authorized by this chapter. This section does not affect,
    and shall not be construed as affecting, any immunity or defense that a peace
    officer, law enforcement agency employing a peace officer, and the state or any
    political subdivision associated with a peace officer may be entitled to under
    another section of the Revised Code or the common law of this state, including,
    but not limited to, sections 9.86, 2744.02, and 2744.03 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5728.15
- number: '5728.16'
  heading: Personal liability
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5728'
    name: Fuel Use Tax
  text: '(A)(1) If any person, regardless of organizational form, required to file
    reports and remit taxes imposed under this chapter fails for any reason to file
    such reports or remit such taxes, any employees of the person having control or
    supervision of, or charged with the responsibility of, filing reports and making
    payments, or any officers or trustees of the person responsible for the execution
    of the person''s fiscal responsibilities, shall be personally liable for the failure.

    (2) The dissolution, termination, or bankruptcy of a person shall not discharge
    a responsible officer''s, shareholder''s, member''s, manager''s, employee''s,
    or trustee''s liability for failure of the person to file reports or remit taxes.
    The sum due for the liability may be collected by assessment as provided in section
    5728.10 of the Revised Code.

    (B) If more than one individual is personally liable under this section for the
    unpaid tax of a person, then the liability of all such individuals shall be joint
    and several.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5728.16
- number: '5728.99'
  heading: Penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5728'
    name: Fuel Use Tax
  text: '(A)(1) Except as provided in division (A)(2) of this section, whoever violates
    any provision of sections 5728.01 to 5728.14 of the Revised Code, or any rule
    promulgated by the tax commissioner under the authority of any provision of those
    sections, for the violation of which no penalty is provided elsewhere, shall be
    fined not less than twenty-five nor more than one hundred dollars.

    (2) Division (A)(1) of this section does not apply to the filing of any false
    or fraudulent return, application, or permit under section 5728.02, 5728.03, or
    5728.08 of the Revised Code. The filing of any false or fraudulent return, application,
    or permit under any of those sections is a violation of section 2921.13 of the
    Revised Code.

    (B)(1) Whoever violates division (A)(1) of section 5728.04 of the Revised Code
    is guilty of a misdemeanor of the fourth degree.

    (2) Whoever violates division (A)(2) of section 5728.04 of the Revised Code is
    guilty of a misdemeanor of the first degree.'
  history: null
