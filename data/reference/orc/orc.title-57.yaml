    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: If a county auditor by inadvertence or mistake omits any delinquent lands
    from the delinquent land list, he shall charge the lands and lots with the taxes,
    assessments, interest, and penalty if such taxes, assessments, interest, and penalty
    with which the lands and lots stand charged have not been paid in full before
    the tenth day of August of the next succeeding year. He shall also record and
    certify them as part of the delinquent list.
