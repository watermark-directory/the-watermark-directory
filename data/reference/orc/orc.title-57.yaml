- number: '5711.10'
  heading: Option to file verified federal income tax return
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'If a taxpayer so elects, he may, under uniform regulations prescribed by
    the tax commissioner, in lieu of listing his investments yielding income as prescribed
    in sections 5711.01 to 5711.36, inclusive, of the Revised Code, file with his
    return a verified summary of his federal income tax return for the last preceding
    taxable year, if such taxable year was a full year of twelve months, itemized
    and analyzed in such manner as the commissioner may by such regulations prescribe,
    together with a statement as to the aggregate amount of income received by him
    during such taxable year derived from investments taxable under such sections,
    the income from which is not required to be reported for federal income tax purposes.
    For purposes of this section, income does not include distributions by an investment
    company of a gain it realizes on the sale of real property or investments. In
    such case the aggregate amount of income of the taxpayer from investments of the
    classes taxable under such sections may be included in the taxpayer''s return
    without specification as to the sources thereof, and shall be taken as the assessment
    of his investments yielding income, in lieu of the assessment thereof as otherwise
    prescribed, unless the commissioner finds that such federal income tax return
    or summary thereof has been improperly made out, in which event the commissioner
    shall assess such investments on the basis on which the income therefrom should
    have been reported for federal income purposes, and set forth on the summary thereof,
    or on the basis on which such investments would be required to be listed and assessed
    under such sections if the election authorized by this section were not made.
    If a taxpayer making the election provided in this section is required under section
    5711.22 of the Revised Code to list as unproductive investments shares which were
    not outstanding for the full calendar year next preceding the listing date, he
    shall deduct from the aggregate amount of his income from investments any income
    received by him during such calendar year on such shares and on any investments
    exchanged for or converted to such shares. The commissioner may require that with
    every return listing investments, the taxpayer shall file a copy of his federal
    income tax return for the next preceding taxable year, or portions thereof, showing
    income received by him from investments of the classes taxable under such sections
    during such year either directly or through fiduciaries. No document authorized
    or required by this section to be filed with returns of taxable property shall
    be deemed a public document or record, but shall be a confidential document for
    the use of the department of taxation only in assessing taxable property; and
    to that end all such documents filed by a taxpayer shall be enclosed in a sealed
    envelope or other sealed package addressed to the commissioner which shall not
    be opened by any person other than the commissioner or his authorized agent, assistant,
    or employee. The county auditor shall on demand furnish such envelopes or packages
    of dimensions prescribed by the commissioner.

    The commissioner may adopt regulations to govern the use of the basis of listing
    authorized by this section, but a taxpayer who, after January 1, 1960, avails
    himself of the option authorized by this section shall thereafter use that basis
    for a period of not less than three years in listing his investments yielding
    income. Thereafter, for good cause shown, the commissioner may authorize the substitution
    of the basis otherwise prescribed by sections 5711.01 to 5711.36, inclusive, of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.10
- number: '5711.101'
  heading: Tax commissioner may require financial statement or balance sheet - substitute
    listing date
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'The tax commissioner may require that with every return listing personal
    property used in business or credits, the taxpayer shall file a financial statement
    or balance sheet of such business as of the close of business on the day next
    preceding the date of listing.

    A taxpayer who is required to file a financial statement or balance sheet of his
    business pursuant to this section may be authorized or required by the commissioner
    to list his taxable property as of the close of business at the end of his fiscal
    year, instead of as of the day otherwise prescribed by section 5711.03 of the
    Revised Code. The commissioner may adopt regulations to govern the use of the
    basis of listing authorized by this section, but a taxpayer who is authorized
    or permitted to list taxable property as of a day other than that prescribed by
    section 5711.03 of the Revised Code, shall thereafter use the same basis unless
    the commissioner, for good cause shown, authorizes the substitution of another
    fiscal year, or, unless the commissioner requires or, upon application of the
    taxpayer, authorizes, the substitution of another listing date to insure that
    property subject to taxation under the provisions of section 5709.01 or 5709.02
    of the Revised Code, and acquired by means of purchase, merger, or reorganization,
    involving an entire plant, a facility, or a division, shall not be excluded from
    taxation for a year or taxed more than once in a year. In the case of such acquisition
    the commissioner shall require or authorize a substitute listing date only for
    such acquired property and only for one year.

    No document authorized or required by this section to be filed with returns of
    taxable property shall be deemed a public document or record, but shall be a confidential
    document for the use of the department of taxation only in assessing taxable property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.101
- number: '5711.11'
  heading: Certain returns shall be made in duplicate - county auditor to assess property
    - returns are confidential
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: Returns listing personal property used in business or credits shall be made
    in duplicate. One copy of each return so made shall be retained by the county
    auditor and the other copy shall be for the use of the tax commissioner. As to
    all taxable property shown in all other returns required by sections 5711.01 to
    5711.36 of the Revised Code, to be made to the auditor, the auditor shall, as
    deputy of the commissioner, act as assessor of such taxable property for the purpose
    of the preliminary assessment thereof, but the commissioner may by order require
    the auditor to make and transmit to him a copy of a particularly designated return.
    The auditor shall stamp the date of the making of the return upon each return
    and copy. Neither the returns nor the copies of returns shall be open to public
    inspection. The commissioner may require auditors to furnish such statistics and
    other information as the commissioner may order.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.11
- number: '5711.13'
  heading: Taxpayer shall make combined return - assessment - certification to treasurer
    of state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: Beginning in tax year 2004, each taxpayer having taxable property with an
    aggregate taxable value in excess of ten thousand dollars and required to be listed
    in more than one county shall make a combined return to the tax commissioner listing
    all its taxable property in this state, in conformity with sections 5711.01 to
    5711.36 of the Revised Code, including property exempt under division (C)(3) of
    section 5709.01 of the Revised Code, but the taxpayer shall not assign property
    of the kinds mentioned in section 5709.02 of the Revised Code to any particular
    taxing district or county. The tax commissioner shall assess the personal property
    of such taxpayer in the several taxing districts in which it is required to be
    assessed under sections 5711.01 to 5711.36 of the Revised Code, and shall issue
    assessment certificates therefor to the proper county auditors at the time and
    in the manner required by section 5711.25 of the Revised Code. All other property
    of such taxpayer required to be so listed shall be entered on the intangible property
    tax list in the office of the treasurer of state, and shall be subject to taxation
    under section 5707.03 of the Revised Code. The commissioner shall assess all other
    property of each such taxpayer and, on or before the second Monday of August annually,
    shall certify the total value or amount of each kind thereof to the treasurer
    of state, who shall enter the value or amount on the intangible property tax list
    in the treasurer of state's office in the manner provided in sections 5725.01
    to 5725.26 of the Revised Code. Sections 5711.01 to 5711.36 of the Revised Code
    shall apply to and govern such taxpayer, its proper officers and representatives,
    the commissioner, and the county auditor as to all proceedings in the assessment
    of the property of such taxpayer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.13
- number: '5711.131'
  heading: County supplemental return
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'A taxpayer required under section 5711.13 of the Revised Code to file a combined
    return with the tax commissioner shall, at the time such return is filed, file
    a county supplemental return with the county auditor of each county in which:

    (A) The taxable value of that taxpayer''s tangible personal property within any
    taxing district of the county has increased or decreased in excess of five hundred
    thousand dollars from that reported by that taxpayer in such taxing district for
    the preceding tax year; or

    (B) The taxpayer, with its return, filed a claim for deduction from book value
    as provided by section 5711.18 of the Revised Code that would reduce the taxable
    value in any taxing district in the county by five hundred thousand dollars or
    more.

    The supplemental return shall contain such summary of taxable values as the commissioner
    by rule requires to enable the county auditor to determine by the first day of
    July, the increase or decrease in taxable value in each such taxing district in
    the county for the current tax year. On or before the tenth day of July of each
    year, the county auditor shall certify to the fiscal officer of each taxing district
    for which a supplemental return is filed, the change in taxable value in the district
    in the current tax year as shown on the supplemental returns filed under this
    section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.131
- number: '5711.14'
  heading: Consolidated returns for corporations - joint returns for husband and wife
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'A corporation which owns or controls at least fifty-one percent of the common
    stock of another corporation may, under uniform regulations prescribed by the
    tax commissioner, make a consolidated return for the purpose of sections 5711.01
    to 5711.36, inclusive, of the Revised Code. In such case all the taxable property
    mentioned in section 5709.01 of the Revised Code, belonging to the corporation
    making the return and to each of its subsidiaries shall be listed and assessed
    in the name of the separate owners thereof; but the parent corporation making
    such return shall not be required to list any of its investments in the stocks,
    securities, and other obligations of its subsidiaries, and in computing the amount
    of taxable credits inter-company accounts shall be eliminated. The commissioner
    may adopt regulations to govern the use of consolidated returns authorized by
    this section, but a corporation which avails itself of the option permitted or
    authorized by this section shall thereafter continue to file consolidated returns
    until the parent corporation notifies the commissioner in writing, on or before
    the twentieth day of April of the year in which the return is due, that it does
    not intend to file a consolidated return for such year.

    A husband and wife living together may, under uniform regulations prescribed by
    the commissioner, make a joint return for the purpose of sections 5711.01 to 5711.36,
    inclusive, of the Revised Code. In such case investments of either spouse in the
    obligations of the other shall not be required to be listed therein, and in computing
    the amount of taxable credits such obligations shall be eliminated.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.14
- number: '5711.15'
  heading: Valuation of merchandise offered for sale
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'A merchant in estimating the value of the personal property held for sale
    in the course of his business shall take as the criterion the average value of
    such property, as provided in this section of the Revised Code, which he has had
    in his possession or under his control during the year ending on the day such
    property is listed for taxation, or the part of such year during which he was
    engaged in business. Such average shall be ascertained by taking the amount in
    value on hand, as nearly as possible, in each month of such year in which he has
    been engaged in business, adding together such amounts, and dividing the aggregate
    amount by the number of months that he has been in business during such year.

    As used in this section a "merchant" is a person who owns or has in possession
    or subject to his control personal property within this state with authority to
    sell it, which has been purchased either in or out of this state, with a view
    to being sold at an advanced price or profit, or which has been consigned to him
    from a place out of this state for the purpose of being sold at a place within
    this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5711.15
- number: '5711.16'
  heading: Listing of personal property by manufacturer - average value of articles
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: '(A) As used in this section:

    (1) "Manufacturer" means a person who purchases, receives, or holds personal property
    for the purpose of adding to its value by manufacturing, refining, rectifying,
    or combining different materials with a view of making a gain or profit by so
    doing.

    (2) "Manufacturing equipment" means machinery and equipment, and tools and implements,
    including any associated patterns, jigs, dies, drawings, and business fixtures,
    used at a manufacturing facility by a manufacturer, and includes any such property
    leased to the manufacturer. "Manufacturing equipment" excludes property used for
    general office purposes. Nothing in this division is to be construed to change
    the definition of personal property, as defined in section 5701.03 of the Revised
    Code.

    (3) "Manufacturing facility" means a facility or portion of a facility used for
    manufacturing, mining, refining, rectifying, or combining different materials
    with a view of making a gain or profit by so doing. "Manufacturing facility" includes
    that portion of a facility used to store or transport raw materials, work-in-process,
    or finished goods inventory, for packaging, for research, or to test for quality
    control, as long as manufacturing, mining, refining, rectifying, or combining
    is also performed at the facility. "Manufacturing facility" does not include any
    portion of a facility used primarily for making retail sales.

    (4) "Manufacturing inventory" means all articles purchased, received, or otherwise
    held for the purpose of being used, in whole or in part, in manufacturing, mining,
    combining, rectifying, or refining, and of all articles that were at any time
    manufactured or changed in any way by a manufacturer, either by mining, combining,
    rectifying, refining, or adding thereto.

    (B) When a manufacturer is required to return a statement of the amount of the
    manufacturer''s personal property used in business, the manufacturer shall include
    the average value, estimated as provided in this section, of manufacturing inventory
    that the manufacturer has had on hand during the year ending on the day the property
    is listed for taxation annually, or the part of such year during which the manufacturer
    was engaged in business. The manufacturer shall separately list finished products
    not kept or stored at the place of manufacture or at a warehouse in the same county.

    The average value of such property shall be ascertained by taking the value of
    all property subject to be listed on the average basis, owned by the manufacturer
    on the last business day of each month the manufacturer was engaged in business
    during the year, adding the monthly values together, and dividing the result by
    the number of months the manufacturer was engaged in such business during the
    year. The result shall be the average value to be listed.

    (C) A manufacturer also shall list all manufacturing equipment owned or used by
    the manufacturer.'
