    name: Taxation
  chapter:
    num: '5749'
    name: Severance Tax
  text: 'Any nonresident of this state who accepts the privilege extended by the laws
    of this state to nonresidents severing natural resources in this state, and any
    resident of this state who subsequently becomes a nonresident or conceals the
    resident''s whereabouts, makes the secretary of state of Ohio the person''s agent
    for the service of process or notice in any assessment, action, or proceedings
    instituted in this state against such person under this chapter or for purposes
