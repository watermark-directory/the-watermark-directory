- number: '5731.22'
  heading: Failing to file timely return or underpayment due to fraud
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'If the executor, administrator, or other person required to file a return
    fails to file the return required by this chapter on the date prescribed therefor,
    determined with regard to any extension of time for filing, unless it is shown
    that such failure is due to reasonable cause and not due to willful neglect, there
    shall be added to the amount of tax as finally determined a penalty determined
    by the tax commissioner, in the amount of five per cent of the amount of that
    tax if the failure is not for more than one month, or, if the failure is for more
    than one month, in the amount of five per cent of the amount of that tax plus
    an additional five per cent for each additional month or fraction of a month during
    which the failure continues, not exceeding twenty-five per cent in the aggregate.
    If, due to fraud, there is a failure to file the return or an underpayment of
    tax due under this chapter, there shall be added to the amount of tax as finally
    determined a penalty determined by the tax commissioner, in an amount not to exceed
    ten thousand dollars. The penalties imposed by this section shall be collected
    at the same time and in the same manner as the tax itself.

    The penalties shall be charged against the executor, administrator, or other person
    having custody or control of any property the transfer of which is subject to
    estate tax, and such executor, administrator, or other person is personally liable
    for the penalties. Such penalties shall be divided in the same manner prescribed
    for the division of the tax in sections 5731.50 and 5731.51 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.22
- number: '5731.23'
  heading: Tax due and payable 9 months after date of death - interest
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'Subject to division (A) of section 5731.25 of the Revised Code or any other
    statute extending the time for payment of an estate tax, the tax levied by section
    5731.02 and division (A) of section 5731.19 of the Revised Code shall, without
    notice or demand by the tax commissioner, be due and payable by the person liable
    for it, at the expiration of nine months from the date of the decedent''s death,
    to the treasurer of the county. If any amount of tax levied by section 5731.02
    or division (A) of section 5731.19 of the Revised Code is not paid on or before
    nine months from the date of the decedent''s death, interest on such amount shall
    be paid for the period from such date to the date paid, computed at the federal
    short-term rate determined by the tax commissioner under section 5703.47 of the
    Revised Code. Interest at the same rate shall be paid on any amount of tax determined
    to be due by way of deficiency from nine months from the date of the decedent''s
    death to the date of payment thereof. Such interest shall be charged and collected
    in the same manner as the tax.

    Interest computed at the federal short-term rate determined by the tax commissioner
    under section 5703.47 of the Revised Code shall be allowed and paid upon any overpayment
    of tax levied by section 5731.02 or division (A) of section 5731.19 of the Revised
    Code from nine months from the date of the decedent''s death or the date of payment
    of the tax, whichever is later, to the date such overpayment is repaid.

    At any time after nine months from the date of the decedent''s death, payment
    of an estimated deficiency may be made and shall be credited against any deficiency
    of tax finally determined. Interest on any deficiency ultimately determined to
    be due shall be charged only upon the unpaid portion thereof.'
