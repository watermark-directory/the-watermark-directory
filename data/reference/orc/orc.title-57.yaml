- number: '5709.431'
  heading: '[Former Section 803.210 of H.B. 110, 134th General Assembly, amended by
    S.B. 225, 134th General Assembly, and codified as R.C. 5709.431 pursuant to R.C.
    103.131] Applicability of R.C. 5709.40 and 5709.41'
  title:
