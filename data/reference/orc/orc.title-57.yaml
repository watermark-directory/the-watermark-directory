- number: '5741.15'
  heading: Inspection of records by tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: Every seller having nexus with this state and every person receiving the benefit
    of services in this state or storing, using, or otherwise consuming in this state
    tangible personal property subject to the tax imposed by or pursuant to section
    5741.02, 5741.021, 5741.022, or 5741.023 of the Revised Code shall keep such records,
    receipts, invoices, bills of lading, asset ledgers, depreciation schedules, transfer
    journals, and such primary and secondary records and documents in such form as
    the tax commissioner requires. Such records and other documents shall be open
    during business hours to the inspection of the commissioner, and shall be preserved
    for a period of four years, unless the commissioner consents, in writing, to their
    destruction within such period, or by order requires that they be kept longer.
    Persons refusing to provide such records and documents for inspection by the tax
    commissioner are subject to the penalty imposed under section 5703.19 of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.15
- number: '5741.16'
  heading: Four-year limitation for assessment against seller or consumer - exceptions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) Except as provided in division (B) or (C) of this section, no assessment
    shall be made or issued against a seller or consumer for any tax imposed by or
    pursuant to section 5741.02, 5741.021, 5741.022, or 5741.023 of the Revised Code
    more than four years after the return date for the period in which the sale or
    purchase was made, or more than four years after the return for such period was
    filed, whichever date is later.

    (B) A consumer who provides a fully completed exemption certificate pursuant to
    division (B) of section 5739.03 or division (E) of section 5741.02 of the Revised
    Code may be assessed any tax imposed by or pursuant to section 5741.02, 5741.021,
    5741.022, or 5741.023 of the Revised Code that results from denial of the claimed
    exemption within the later of a period allowed by division (A) of this section
    or one year after the date the certificate was provided.

    (C) This section does not bar an assessment:

    (1) When the tax commissioner has substantial evidence of amounts of taxes collected
    by a seller from consumers on purchases, which were not returned to the state
    by direct remittance;

    (2) When the person assessed failed to file a return as required by section 5741.12
    of the Revised Code;

    (3) When the seller or consumer and the commissioner waive in writing the time
    limitation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.16
- number: '5741.17'
  heading: Registration of sellers with tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A)(1) Except as otherwise provided in divisions (A)(2), (3), and (4) of
    this section, every seller of tangible personal property or services who has substantial
    nexus with this state shall register with the tax commissioner and supply any
    information concerning the seller''s contacts with this state that may be required
    by the commissioner.

    (2) A seller who is licensed as a vendor pursuant to section 5739.17 of the Revised
    Code shall not be required to register with the commissioner pursuant to this
    section if all sales to consumers in this state are made under the authority of
    the seller''s vendor''s license.

    (3) A seller is not required to register under this section if the seller has
    no contact with this state other than an agency relationship with a person engaged
    in the business of telemarketing in this state and engaged by the seller exclusively
    for the purpose of solicitation of customers in other states.

    (4) A seller is not required to register under this section if the seller has
    no contact with this state other than the ownership of property that is located
    at the facility of a printer with which the seller has contracted for printing
    and that consists of the final printed product, property that becomes a part of
    the final printed product, or copy from which the final printed product is produced.

    (B) A seller who does not have substantial nexus with this state may voluntarily
    register with the commissioner. A seller who voluntarily registers with the commissioner
    under this section is entitled to the same benefits and is subject to the same
    duties and requirements as a seller required to be registered with the commissioner
    under this chapter.

    The commissioner shall maintain an alphabetical index of all sellers registered
    under this chapter and records of the use tax reported and paid. Upon request,
    this information shall be made available to the treasurer of state.'
