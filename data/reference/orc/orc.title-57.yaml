- number: '5727.48'
  heading: Extension of time
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: The tax commissioner may extend to a public utility a further specified time,
    not to exceed thirty days, within which to file any report or statement required
    by this chapter to be filed with the commissioner, except reports required by
    sections 5727.24 to 5727.29 of the Revised Code. A public utility shall request
    this extension, in the form and manner prescribed by the commissioner, on or before
    the date that the report or statement is otherwise required to be filed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.48
- number: '5727.49'
  heading: Monthly report of secretary of state - information provided by county auditors
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'The secretary of state shall prepare and keep a correct list of all incorporated
    public utilities engaged in business within this state and required by law to
    pay an excise or franchise tax or fee. Each month he shall file with the tax commissioner
    a certified report showing all such new public utilities, the increase or decrease
    of the capital stock or the dissolution of existing public utilities, and such
    other information as the commissioner requires. For the purpose of obtaining the
    necessary information, the secretary of state or the commissioner shall have access
    to the records of the offices of the county auditors of the state.

    Upon requires of the secretary of state or the commissioner, any county auditor
    shall furnish such information as is shown by the records of his office concerning
    public utilities located within his county and subject to sections 5727.01 to
    5727.62, inclusive, of the Revised Code.'
