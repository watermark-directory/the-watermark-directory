- number: '5723.15'
  heading: Purchasers may have partition
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: Any person claiming any land, inlot, outlot, or part of lot, by virtue of
    a sale made under sections 5723.01 to 5723.19 of the Revised Code, as tenant in
    common with any other person, may apply for a partition in the manner provided
    by law for the partition of real estate. On presenting the county auditor's deed,
    the court, before which application for such partition is made, shall set off
    to such person the land claimed in the deed as his share in the manner prescribed
    by law for the partition of estates in lands, tenements, or hereditaments of joint
    tenants pursuant to a joint tenancy created prior to the effective date of this
    amendment, or of tenants with a right of survivorship, tenants in common, and
    coparceners.
  history: null
