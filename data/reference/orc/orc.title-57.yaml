  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.48
- number: '5715.49'
  heading: Prohibition against former or present official divulging information
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: '(A) Except as provided in division (B) or (C) of this section, no former
    or present county auditor or member of a county board of revision shall divulge,
    except in the performance of official duties or upon the order of the department
    of taxation, or when called upon to testify in any court or proceeding, any information
    acquired in the exercise of the powers vested by the laws relating to taxation,
    or while claiming to exercise any such powers, as to the transactions, property,
    or business of any person, company, firm, corporation, association, or partnership.
    Whoever violates this section shall thereafter be disqualified from acting in
    any official capacity in connection with the assessment or collection of taxes
    or recoupment charges.

    (B) Division (A) of this section does not prohibit a county auditor from divulging
    the name and business address of a vendor, a vendor''s license number, or information
    regarding the active or inactive status of a vendor''s license issued by the county
    auditor pursuant to section 5739.17 of the Revised Code.

    (C) Division (A) of this section does not prohibit a county auditor from divulging
    to the executive director of a convention and visitors'' bureau operating in the
    county the tax return information of a hotel subject to a lodging tax levied by
    the county pursuant to section 5739.09 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.49
- number: '5715.50'
  heading: Prohibition against former or present employee divulging information
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: '(A) Except as provided in division (B) of this section, no former or present
    expert, clerk, or employee of a county auditor, county board of revision, or the
    tax commissioner, and no former or present deputy, assistant, or agent of the
    tax commissioner shall divulge, except in the performance of official duties or
    in any report to the county auditor, the county board of revision, or the tax
    commissioner, or when called upon to testify in any court or proceeding, any information
    acquired in the exercise of the powers vested therein by any law, or while claiming
    to exercise such powers, as to the transactions, property, or business of any
    person, company, firm, corporation, association, or partnership. Whoever violates
    this section shall thereafter be disqualified from acting in any official capacity
    in connection with the assessment or collection of taxes or recoupment charges.

    (B) Division (A) of this section does not prohibit the divulgence of:

    (1) The name and address of the statutory agent in this state and the names of
    officers and directors of any corporation;

    (2) The name and business address of a vendor, vendor''s license number, or information
    regarding the active or inactive status of a vendor''s license issued by the county
    auditor pursuant to section 5739.17 of the Revised Code ;

    (3) The tax return information of a hotel subject to a lodging tax levied by the
    county pursuant to section 5739.09 of the Revised Code when that information is
    provided to the executive director of a convention and visitors'' bureau operating
    in the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.50
- number: '5715.51'
  heading: Prohibition against political activity by certain officials
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: No assistant, expert, clerk, or other employee of a county board of revision
    or the department of taxation shall hold any position on or under any committee
    of a political party, or subscribe or pay any money or other thing of value to
    any person or organization for the purpose of promoting, defeating, or otherwise
    influencing any legislation, or circulate any intitiative or referendum petition.
    Whoever violates this section shall be removed from his office or employment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.51
- number: '5715.70'
  heading: Release of lien on real property situated in county
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: '(A) A county board of revision may release a lien imposed on real property
    situated within the county if all the following apply:

    (1) The lien has been in existence for at least five years.

    (2) The lien is for a debt resulting from the cost of environmental cleanup of
    the property paid from state or local government funds.

    (3) The amount of the lien is equal to or greater than twelve times the fair market
    value of the property.

    (4) The board determines the debt is uncollectible.

    (B) The board shall reduce a release given pursuant to this section to writing
    and the county treasurer shall sign and deliver it to the owner of the property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.70
- number: '5715.701'
  heading: Discharge of lien by county recorder - recording of release
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The county recorder shall discharge a lien described in section 5715.70 of
    the Revised Code when the release described in that section is presented to the
    county recorder. In addition to the discharge on the records by the county recorder,
    the release shall be recorded in the official records kept by the county recorder.
    The county recorder is entitled to the fees for such recording as provided by
    section 317.32 of the Revised Code for recording deeds.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.701
- number: '5715.99'
  heading: Penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: '(A) Whoever violates section 5715.45 of the Revised Code shall be fined not
    more than five dollars for each day that elapses between the date specified by
    law for performance and the date when the duty is actually performed.

    (B) Whoever violates section 5715.46 of the Revised Code shall be fined not less
    than one hundred nor more than one thousand dollars.

    (C) Whoever violates section 5715.48 of the Revised Code shall be fined not less
    than two hundred nor more than one thousand dollars.

    (D) Whoever violates section 5715.49 or 5715.50 of the Revised Code shall be fined
    not less than fifty nor more than one thousand dollars.

    (E) Whoever violates section 5715.51 of the Revised Code shall be fined not more
    than one hundred dollars.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.99
- number: '5717.01'
  heading: Appeal from county board of revision to board of tax appeals - procedure
    - hearing
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5717'
    name: Appeals
  text: 'An appeal from a decision of a county board of revision may be taken to the
    board of tax appeals within thirty days after notice of the decision of the county
    board of revision is mailed as provided in division (A) of section 5715.20 of
    the Revised Code. Such an appeal may be taken by the county auditor, the tax commissioner,
    or any board, legislative authority, public official, or taxpayer authorized by
    section 5715.19 of the Revised Code to file complaints against valuations or assessments
    with the auditor, except that a subdivision or the legislative authority or mayor
    of a subdivision may file such an appeal only if the subdivision owns or leases
    the property that is the subject of the board of revision''s decision, and except
    that no such appeal may be taken by a third party complainant, as defined in that
    section. Such appeal shall be taken by the filing of a notice of appeal, in person
    or by certified mail, express mail, facsimile transmission, electronic transmission,
    or by authorized delivery service, with the board of tax appeals and with the
    county board of revision. If notice of appeal is filed by certified mail, express
    mail, or authorized delivery service as provided in section 5703.056 of the Revised
    Code, the date of the United States postmark placed on the sender''s receipt by
    the postal service or the date of receipt recorded by the authorized delivery
    service shall be treated as the date of filing. If notice of appeal is filed by
    facsimile transmission or electronic transmission, the date and time the notice
    is received by the board shall be the date and time reflected on a timestamp provided
    by the board''s electronic system, and the appeal shall be considered filed with
    the board on the date reflected on that timestamp. Any timestamp provided by another
    computer system or electronic submission device shall not affect the time and
    date the notice is received by the board. Upon receipt of such notice of appeal
    such county board of revision shall notify all persons thereof who were parties
    to the proceeding before such county board of revision by either certified mail
    or, if the board has record of an internet identifier of record associated with
    such a person, by ordinary mail and by that internet identifier of record, and
    shall file proof of such notice or, in the case of ordinary mail, an affidavit
    attesting that the board sent the notice with the board of tax appeals. The county
    board of revision shall thereupon certify to the board of tax appeals a transcript
    of the record of the proceedings of the county board of revision pertaining to
    the original complaint, and all evidence offered in connection therewith. Such
    appeal may be heard by the board of tax appeals at its offices in Columbus or
    in the county where the property is listed for taxation, or the board of tax appeals
    may cause its examiners to conduct such hearing and to report to it their findings
    for affirmation or rejection. An appeal may proceed pursuant to section 5703.021
    of the Revised Code on the small claims docket if the appeal qualifies under that
    section.

    The board of tax appeals may order the appeal to be heard on the record and the
    evidence certified to it by the county board of revision, or it may order the
    hearing of additional evidence, and it may make such investigation concerning
    the appeal as it deems proper.

    As used in this section, "internet identifier of record" has the same meaning
    as in section 9.312 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5717.01
- number: '5717.011'
  heading: Filing of notice of appeal
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5717'
    name: Appeals
  text: '(A) As used in this chapter, "tax administrator" has the same meaning as
    in section 718.01 of the Revised Code.

    (B) Appeals from a final determination of a local board of tax review created
    under section 718.11 of the Revised Code may be taken by the taxpayer or the tax
    administrator to the board of tax appeals or may be taken by the taxpayer or the
    tax administrator to a court of common pleas as otherwise provided by law. If
    the taxpayer or the tax administrator elects to make an appeal to the board of
    tax appeals or court of common pleas, and subject to section 5703.021 of the Revised
    Code with respect to appeals assigned to the small claims docket, the appeal shall
    be taken by the filing of a notice of appeal with the board of tax appeals or
    court of common pleas, the local board of tax review, and the opposing party.
    The notice of appeal shall be filed within sixty days after the day the appellant
    receives notice of the final determination issued under section 718.11 of the
    Revised Code. An appeal filed with a court of common pleas is governed by the
    Rules of Civil Procedure and other rules of practice and procedure applicable
    to civil actions. For an appeal filed with the board of tax appeals, the notice
    of appeal may be filed in person or by certified mail, express mail, facsimile
    transmission, electronic transmission, or by authorized delivery service as provided
    in section 5703.056 of the Revised Code. If the notice of appeal is filed by certified
    mail, express mail, or authorized delivery service as provided in section 5703.056
    of the Revised Code, the date of the United States postmark placed on the sender''s
    receipt by the postal service or the date of receipt recorded by the authorized
    delivery service shall be treated as the date of filing with the board. If notice
    of appeal is filed by facsimile transmission or electronic transmission, the date
    and time the notice is received by the board shall be the date and time reflected
    on a timestamp provided by the board''s electronic system, and the appeal shall
    be considered filed with the board on the date reflected on that timestamp. Any
    timestamp provided by another computer system or electronic submission device
    shall not affect the time and date the notice is received by the board. The notice
    of appeal shall have attached thereto and incorporated therein by reference a
    true copy of the final determination issued under section 718.11 of the Revised
    Code, but failure to attach a copy of such notice and incorporate it by reference
    in the notice of appeal does not invalidate the appeal.

    (C) A notice of appeal for an appeal filed with the board of tax appeals shall
    contain a short and plain statement of the claimed errors in the final determination
    of the local board of tax review showing that the appellant is entitled to relief
    and a demand for the relief to which the appellant claims to be entitled. An appellant
    may amend the notice of appeal once as a matter of course within sixty days after
    the certification of the transcript. Otherwise, an appellant may amend the notice
    of appeal only after receiving leave of the board or the written consent of each
    adverse party. Leave of the board shall be freely given when justice so requires.

    (D) Upon the filing of a notice of appeal with the board of tax appeals, the local
    board of tax review shall certify to the board of tax appeals a transcript of
    the record of the proceedings before it, together with all evidence considered
    by it in connection therewith. Such appeals may be heard by the board at its office
    in Columbus or in the county where the appellant resides, or it may cause its
    examiners to conduct such hearings and to report to it their findings for affirmation
    or rejection. The board may order the appeal to be heard upon the record and the
    evidence certified to it by the tax administrator, but upon the application of
    any interested party the board shall order the hearing of additional evidence,
    and the board may make such investigation concerning the appeal as it considers
    proper. An appeal may proceed pursuant to section 5703.021 of the Revised Code
    on the small claims docket if the appeals qualifies under that section.

    (E) If an issue being appealed under this section is addressed in a municipal
    corporation''s ordinance or regulation, the tax administrator, upon the request
    of the board of tax appeals, shall provide a copy of the ordinance or regulation
    to the board of tax appeals.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5717.011
- number: '5717.02'
  heading: Appeal from final determination by tax commissioner or county auditor -
    procedure - hearing
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5717'
    name: Appeals
  text: '(A) Except as otherwise provided by law, appeals from final determinations
    by the tax commissioner of any preliminary, amended, or final tax assessments,
    reassessments, valuations, determinations, findings, computations, or orders made
    by the commissioner may be taken to the board of tax appeals by the taxpayer,
    by the person to whom notice of the tax assessment, reassessment, valuation, determination,
    finding, computation, or order by the commissioner is required by law to be given,
    by the director of budget and management if the revenues affected by that decision
    would accrue primarily to the state treasury, or by the county auditors of the
    counties to the undivided general tax funds of which the revenues affected by
    that decision would primarily accrue. Appeals from the redetermination by the
    director of development services under division (B) of section 5709.64 or division
    (A) of section 5709.66 of the Revised Code may be taken to the board of tax appeals
    by the enterprise to which notice of the redetermination is required by law to
    be given. Appeals from a decision of the tax commissioner or county auditor concerning
    an application for a property tax exemption may be taken to the board of tax appeals
    by the applicant or by a school district that filed a statement concerning that
    application under division (C) of section 5715.27 of the Revised Code. Appeals
    from a redetermination by the director of job and family services under section
    5733.42 of the Revised Code may be taken by the person to which the notice of
    the redetermination is required by law to be given under that section.

    (B) The appeals shall be taken by the filing of a notice of appeal with the board,
    and with the tax commissioner if the tax commissioner''s action is the subject
    of the appeal, with the county auditor if the county auditor''s action is the
    subject of the appeal, with the director of development services if that director''s
    action is the subject of the appeal, or with the director of job and family services
    if that director''s action is the subject of the appeal. The notice of appeal
    shall be filed within sixty days after service of the notice of the tax assessment,
    reassessment, valuation, determination, finding, computation, or order by the
    commissioner, property tax exemption determination by the commissioner or the
    county auditor, or redetermination by the director has been given as provided
    in section 5703.37, 5709.64, 5709.66, or 5733.42 of the Revised Code. The notice
    of appeal may be filed in person or by certified mail, express mail, facsimile
    transmission, electronic transmission or by authorized delivery service. If the
    notice of appeal is filed by certified mail, express mail, or authorized delivery
    service as provided in section 5703.056 of the Revised Code, the date of the United
    States postmark placed on the sender''s receipt by the postal service or the date
    of receipt recorded by the authorized delivery service shall be treated as the
    date of filing. If notice of appeal is filed by facsimile transmission or electronic
    transmission, the date and time the notice is received by the board shall be the
    date and time reflected on a timestamp provided by the board''s electronic system,
    and the appeal shall be considered filed with the board on the date reflected
    on that timestamp. Any timestamp provided by another computer system or electronic
    submission device shall not affect the time and date the notice is received by
    the board. The notice of appeal shall have attached to it and incorporated in
    it by reference a true copy of the notice sent by the commissioner, county auditor,
    or director to the taxpayer, enterprise, or other person of the final determination
    or redetermination complained of, but failure to attach a copy of that notice
    and to incorporate it by reference in the notice of appeal does not invalidate
    the appeal.

    (C) A notice of appeal shall contain a short and plain statement of the claimed
    errors in the determination or redetermination of the tax commissioner, county
    auditor, or director showing that the appellant is entitled to relief and a demand
    for the relief to which the appellant claims to be entitled. An appellant may
    amend the notice of appeal once as a matter of course within sixty days after
    the certification of the transcript. Otherwise, an appellant may amend the notice
    of appeal only after receiving leave of the board or the written consent of each
    adverse party. Leave of the board shall be freely given when justice so requires.

    (D) Upon the filing of a notice of appeal, the tax commissioner, county auditor,
    or the director, as appropriate, shall certify to the board a transcript of the
    record of the proceedings before the commissioner, auditor, or director, together
    with all evidence considered by the commissioner, auditor, or director in connection
    with the proceedings. Those appeals or applications may be heard by the board
    at its office in Columbus or in the county where the appellant resides, or it
    may cause its examiners to conduct the hearings and to report to it their findings
    for affirmation or rejection.

    (E) The board may order the appeal to be heard upon the record and the evidence
    certified to it by the commissioner, county auditor, or director, but upon the
    application of any interested party the board shall order the hearing of additional
    evidence, and it may make an investigation concerning the appeal that it considers
    proper. An appeal may proceed pursuant to section 5703.021 of the Revised Code
    on the small claims docket if the appeal qualifies under that section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5717.02
- number: '5717.03'
  heading: Decision of board of tax appeals - certification - effect
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5717'
    name: Appeals
  text: '(A) A decision of the board of tax appeals on an appeal filed with it pursuant
    to section 5717.01, 5717.011, or 5717.02 of the Revised Code shall be entered
    of record on the journal together with the date when the order is filed with the
    secretary for journalization.

    (B) In case of an appeal from a decision of a county board of revision, the board
    of tax appeals shall determine the taxable value of the property whose valuation
    or assessment by the county board of revision is complained of, or in the event
    the complaint and appeal is against a discriminatory valuation, shall determine
    a valuation which shall correct such discrimination, and shall determine the liability
    of the property for taxation, if that question is in issue, and the board of tax
    appeals'' decision and the date when it was filed with the secretary for journalization
    shall be sent by the board to all persons who were parties to the appeal before
    the board, to the person in whose name the property is listed, or sought to be
    listed, if such person is not a party to the appeal, to the county auditor of
    the county in which the property involved in the appeal is located, and to the
    tax commissioner.

    In correcting a discriminatory valuation, the board of tax appeals shall increase
    or decrease the value of the property whose valuation or assessment by the county
    board of revision is complained of by a per cent or amount which will cause such
    property to be listed and valued for taxation by an equal and uniform rule.

    (C) In the case of an appeal from a review, redetermination, or correction of
    a tax assessment, valuation, determination, finding, computation, or order of
    the tax commissioner, the order of the board of tax appeals and the date of the
    entry thereof upon its journal shall be sent by the board to all persons who were
    parties to the appeal before the board, the person in whose name the property
    is listed or sought to be listed, if the decision determines the valuation or
    liability of property for taxation and if such person is not a party to the appeal,
    the taxpayer or other person to whom notice of the tax assessment, valuation,
    determination, finding, computation, or order, or correction or redetermination
    thereof, by the tax commissioner was by law required to be given, the director
    of budget and management, if the revenues affected by such decision would accrue
    primarily to the state treasury, and the county auditors of the counties to the
    undivided general tax funds of which the revenues affected by such decision would
    primarily accrue.

    (D) In the case of an appeal from a final determination of a local board of tax
    review created under section 718.11 of the Revised Code, the order of the board
    of tax appeals and the date of the entry thereof upon the board''s journal shall
    be sent by the board to all persons who were parties to the appeal before the
    board.

    (E) In the case of all other appeals or applications filed with and determined
    by the board, the board''s order and the date when the order was filed by the
    secretary for journalization shall be sent by the board to the person who is a
    party to such appeal or application, to such persons as the law requires, and
    to such other persons as the board deems proper.

    (F) The orders of the board may affirm, reverse, vacate, modify, or remand the
    tax assessments, valuations, determinations, findings, computations, or orders
    complained of in the appeals determined by the board, and the board''s decision
    shall become final and conclusive for the current year unless reversed, vacated,
    or modified as provided in section 5717.04 of the Revised Code. When an order
    of the board becomes final the tax commissioner and all officers to whom such
    decision has been sent shall make the changes in their tax lists or other records
    which the decision requires.

    (G) If the board finds that issues not raised on the appeal are important to a
    determination of a controversy, the board may remand the cause for an administrative
    determination and the issuance of a new tax assessment, valuation, determination,
    finding, computation, or order, unless the parties stipulate to the determination
    of such other issues without remand. An order remanding the cause is a final order.
    If the order relates to any issue other than a municipal income tax matter appealed
    under sections 718.11 and 5717.011 of the Revised Code, the order may be appealed
    to the court of appeals in Franklin county. If the order relates to a municipal
    income tax matter appealed under sections 718.11 and 5717.011 of the Revised Code,
    the order may be appealed to the court of appeals for the county in which the
    municipal corporation in which the dispute arose is primarily situated.

    (H) At the request of any person that filed an appeal subject to this section,
    the decision or order of the board of tax appeals issued pursuant to division
    (B), (C), (D), or (E) of this section shall be sent by certified mail at the requestor''s
    expense.'
