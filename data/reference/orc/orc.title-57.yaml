  url: https://codes.ohio.gov/ohio-revised-code/section-5731.18
- number: '5731.181'
  heading: Additional tax on generation-skipping transfer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) For purposes of this section, "generation-skipping transfer," "taxable
    distribution," and "taxable termination" have the same meaning as in Chapter 13
    of subtitle B of the Internal Revenue Code.

    (B) A tax is hereby levied upon every generation-skipping transfer of property
    having a situs in this state, that occurs at the same time as, and as a result
    of, the death of an individual, in an amount equal to the credit allowed by Chapter
    13 of subtitle B of the Internal Revenue Code, for any taxes paid to any state
    in respect of any property included in the generation-skipping transfer.

    For purposes of this division, "property having a situs in this state" includes
    all the following:

    (1) Real property situated in this state;

    (2) Tangible personal property having an actual situs in this state;

    (3) Intangible personal property employed in carrying on a business in this state;

    (4) Intangible personal property owned by a trust, the trustee of which resides
    in or has its principal place of business in this state, or, if there is more
    than one trustee of the trust, the principal place of administration of which
    is in this state.

    (C) The return with respect to the generation-skipping tax levied by division
    (B) of this section shall be filed in the form that the tax commissioner shall
    prescribe, on or before the day prescribed by law, including extensions, for filing
    the generation-skipping transfer tax return under Chapter 13 of subtitle B of
    the Internal Revenue Code, for the same generation-skipping transfer. The return
    shall be filed by the distributee in the case of a taxable distribution and by
    the trustee in the case of a taxable termination.

    (D) The generation-skipping tax levied by division (B) of this section shall be
    paid, without notice or demand by the tax commissioner, with the return, and shall
    be charged, collected, and administered in the same manner as estate taxes levied
    by this chapter. This chapter is generally applicable to, except to the extent
    it is inconsistent with the nature of, the generation-skipping tax.

    (E) If another state levies a generation-skipping tax on a transfer described
    in division (B) of this section, the tax commissioner may enter into a compromise
    of the generation-skipping tax levied by division (B) of this section in the manner
    provided in section 5731.35 of the Revised Code, except that no approval of any
    probate court is required. If such a compromise agreement is made, no interest
    and penalties shall accrue for the period prior to the execution of the agreement
    and for sixty days after its execution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.181
- number: '5731.19'
  heading: Estate tax on nonresidents
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) A tax is hereby levied upon the transfer of so much of the taxable estate
    of every person dying on or after July 1, 1968, and before January 1, 2013, who,
    at the time of death, was not a resident of this state, as consists of real property
    situated in this state, tangible personal property having an actual situs in this
    state, and intangible personal property employed in carrying on a business within
    this state unless exempted from tax under the provisions of section 5731.34 of
    the Revised Code.

    (B) The amount of the tax on such real and tangible personal property shall be
    determined as follows:

    (1) Determine the amount of tax which would be payable under Chapter 5731. of
    the Revised Code if the decedent had died a resident of this state with all the
    decedent''s property situated or located within this state;

    (2) Multiply the tax so determined by a fraction, the denominator of which shall
    be the value of the gross estate wherever situated and the numerator of which
    shall be the said gross estate value of the real property situated and the tangible
    personal property having an actual situs in this state and intangible personal
    property employed in carrying on a business within this state and not exempted
    from tax under section 5731.34 of the Revised Code. The product shall be the amount
    of tax payable to this state.

    (C) In addition to the tax levied by division (A) of this section, an additional
    tax is hereby levied on such real and tangible personal property determined as
    follows:

    (1) Determine the amount of tax which would be payable under division (A) of section
    5731.18 of the Revised Code, if the decedent had died a resident of this state
    with all the decedent''s property situated or located within this state;

    (2) Multiply the tax so determined by a fraction, the denominator of which shall
    be the value of the gross estate wherever situated and the numerator of which
    shall be the said gross estate value of the real property situated and the tangible
    property having an actual situs in this state and intangible personal property
    employed in carrying on a business within this state and not exempted from tax
    under section 5731.34 of the Revised Code. The product so derived shall be credited
    with the amount of the tax determined under division (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.19
- number: '5731.21'
  heading: Filing estate tax return
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A)(1)(a) Except as provided under division (A)(3) of this section, the executor
    or administrator, or, if no executor or administrator has been appointed, another
    person in possession of property the transfer of which is subject to estate taxes
    under section 5731.02 or division (A) of section 5731.19 of the Revised Code,
    shall file an estate tax return, within nine months of the date of the decedent''s
    death, in the form prescribed by the tax commissioner, in duplicate, with the
    probate court of the county. The return shall include all property the transfer
    of which is subject to estate taxes, whether that property is transferred under
    the last will and testament of the decedent or otherwise. The time for filing
    the return may be extended by the tax commissioner.

    (b) The estate tax return described in division (A)(1)(a) of this section shall
    be accompanied by a certificate, in the form prescribed by the tax commissioner,
    that is signed by the executor, administrator, or other person required to file
    the return, and that states all of the following:

    (i) The fact that the return was filed;

    (ii) The date of the filing of the return;

    (iii) The fact that the estate taxes under section 5731.02 or division (A) of
    section 5731.19 of the Revised Code, that are shown to be due in the return, have
    been paid in full;

    (iv) If applicable, the fact that real property listed in the inventory for the
    decedent''s estate is included in the return;

    (v) If applicable, the fact that real property not listed in the inventory for
    the decedent''s estate, including, but not limited to, survivorship tenancy property
    as described in section 5302.17 of the Revised Code or transfer on death property
    as described in sections 5302.22 and 5302.23 of the Revised Code, also is included
    in the return. In this regard, the certificate additionally shall describe that
    real property by the same description used in the return.

    (2) The probate court shall forward one copy of the estate tax return described
    in division (A)(1)(a) of this section to the tax commissioner.

    (3) A person shall not be required to file a return under division (A) of this
    section if the decedent was a resident of this state and the value of the decedent''s
    gross estate is twenty-five thousand dollars or less in the case of a decedent
    dying on or after July 1, 1968, but before January 1, 2001; two hundred thousand
    dollars or less in the case of a decedent dying on or after January 1, 2001, but
    before January 1, 2002; or three hundred thirty-eight thousand three hundred thirty-three
    dollars or less in the case of a decedent dying on or after January 1, 2002. No
    return shall be filed for estates of decedents dying on or after January 1, 2013.

    (4)(a) Upon receipt of the estate tax return described in division (A)(1)(a) of
    this section and the accompanying certificate described in division (A)(1)(b)
    of this section, the probate court promptly shall give notice of the return, by
    a form prescribed by the tax commissioner, to the county auditor. The auditor
    then shall make a charge based upon the notice and shall certify a duplicate of
    the charge to the county treasurer. The treasurer then shall collect, subject
    to division (A) of section 5731.25 of the Revised Code or any other statute extending
    the time for payment of an estate tax, the tax so charged.

    (b) Upon receipt of the return and the accompanying certificate, the probate court
    also shall forward the certificate to the auditor. When satisfied that the estate
    taxes under section 5731.02 or division (A) of section 5731.19 of the Revised
    Code, that are shown to be due in the return, have been paid in full, the auditor
    shall stamp the certificate so forwarded to verify that payment. The auditor then
    shall return the stamped certificate to the probate court.

    (5)(a) The certificate described in division (A)(1)(b) of this section is a public
    record subject to inspection and copying in accordance with section 149.43 of
    the Revised Code. It shall be kept in the records of the probate court pertaining
    to the decedent''s estate and is not subject to the confidentiality provisions
    of section 5731.90 of the Revised Code.

    (b) All persons are entitled to rely on the statements contained in a certificate
    as described in division (A)(1)(b) of this section if it has been filed in accordance
    with that division, forwarded to a county auditor and stamped in accordance with
    division (A)(4) of this section, and placed in the records of the probate court
    pertaining to the decedent''s estate in accordance with division (A)(5)(a) of
    this section. The real property referred to in the certificate shall be free of,
    and may be regarded by all persons as being free of, any lien for estate taxes
    under section 5731.02 and division (A) of section 5731.19 of the Revised Code.

    (B) An estate tax return filed under this section, in the form prescribed by the
    tax commissioner, and showing that no estate tax is due shall result in a determination
    that no estate tax is due, if the tax commissioner within three months after the
    receipt of the return by the department of taxation, fails to file exceptions
    to the return in the probate court of the county in which the return was filed.
    A copy of exceptions to a return of that nature, when the tax commissioner files
    them within that period, shall be sent by ordinary mail to the person who filed
    the return. The tax commissioner is not bound under this division by a determination
    that no estate tax is due, with respect to property not disclosed in the return.

    (C) If the executor, administrator, or other person required to file an estate
    tax return fails to file it within nine months of the date of the decedent''s
    death, the tax commissioner may determine the estate tax in that estate and issue
    a certificate of determination in the same manner as is provided in division (B)
    of section 5731.27 of the Revised Code. A certificate of determination of that
    nature has the same force and effect as though a return had been filed and a certificate
    of determination issued with respect to the return.

    (D) No return shall be filed under this section or section 5731.24 of the Revised
    Code, and no tax shall be due under this chapter, with respect to either of the
    following:

    (1) Property first discovered after December 31, 2021, that would otherwise be
    subject to the tax imposed by this chapter;

    (2) Property first discovered on or before December 31, 2021, but not disclosed
    on a return or included in a certificate of determination issued by the tax commissioner
    on or before December 31, 2021.

    Nothing in this division shall be construed to affect any estate tax liability
    determined by the tax commissioner for returns filed on or before December 31,
    2021, or any tax liability determined under an agreement entered into under division
    (C) of section 5731.26 of the Revised Code. The estate shall pay any such liability.'
