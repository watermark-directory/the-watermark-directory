- number: '5705.20'
  heading: Special levy for tuberculosis treatment or clinics
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'The board of county commissioners of any county, in any year, after providing
    the normal and customary percentage of the total general fund appropriations for
    the support of the tuberculosis treatment specified under section 339.73 of the
    Revised Code or for the support of tuberculosis clinics established pursuant to
    section 339.76 of the Revised Code, by vote of two-thirds of all the members of
    said board may declare by resolution that the amount of taxes which may be raised
    within the ten-mill limitation will be insufficient to provide an adequate amount
    for that support, and that it is necessary to levy a tax in excess of the ten-mill
    limitation to supplement such general fund appropriations for such purpose, but
    the total levy for this purpose shall not exceed sixty-five one hundredths of
    a mill.

    Such resolution shall conform to section 5705.19 of the Revised Code and be certified
    to the board of elections not less than ninety days before the general election
    and submitted in the manner provided in section 5705.25 of the Revised Code.

    If the majority of electors voting on a levy to supplement general fund appropriations
    for the support of the tuberculosis treatment specified under section 339.73 of
    the Revised Code or for the support of tuberculosis clinics established pursuant
    to section 339.76 of the Revised Code, vote in favor thereof, the board of said
    county may levy a tax within such county at the additional rate in excess of the
    ten-mill limitation during the period and for the purpose stated in the resolution
    or at any less rate or for any of said years.

    If a tax was levied under this section for the support of tuberculosis clinics
    before October 10, 2000, the levy may be renewed for that purpose on or after
    October 10, 2000, in accordance with section 5705.25 of the Revised Code.'
