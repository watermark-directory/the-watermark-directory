- number: '5753.031'
  heading: Distribution of sports gaming tax revenue
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: '(A) For the purpose of receiving and distributing, and accounting for, revenue
    received from the tax levied by section 5753.021 of the Revised Code and from
    fines imposed under Chapter 3775. of the Revised Code, the following funds are
    created in the state treasury:

    (1) The sports gaming revenue fund;

    (2) The sports gaming tax administration fund, which the tax commissioner shall
    use to defray the costs incurred in administering the tax levied by section 5753.021
    of the Revised Code;

    (3) The sports gaming profits education fund, which shall be used for the support
    of public and nonpublic education for students in grades kindergarten through
    twelve as determined in appropriations made by the general assembly.

    (4) The problem sports gaming fund.

    (B)(1) All of the following shall be deposited into the sports gaming revenue
    fund:

    (a) All money collected from the tax levied under section 5753.021 of the Revised
    Code;

    (b) The remainder of the fees described in division (G)(2) of section 3775.02
    of the Revised Code, after the Ohio casino control commission deposits the required
    amount in the sports gaming profits veterans fund under that division;

    (c) Unclaimed winnings collected under division (F) of section 3775.10 of the
    Revised Code;

    (d) Any fines collected under Chapter 3775. of the Revised Code.

    (2) All other fees collected under Chapter 3775. of the Revised Code shall be
    deposited into the casino control commission fund created under section 5753.03
    of the Revised Code.

    (C)(1) From the sports gaming revenue fund, the director of budget and management
    shall transfer as needed to the tax refund fund amounts equal to the refunds certified
    by the tax commissioner under section 5753.06 of the Revised Code and attributable
    to the tax levied under section 5753.021 of the Revised Code.

    (2) Not later than the fifteenth day of each month, the director of budget and
    management shall transfer from the sports gaming revenue fund to the sports gaming
    tax administration fund the amount necessary to reimburse the department of taxation''s
    actual expenses incurred in administering the tax levied under section 5753.021
    of the Revised Code.

    (3) Of the amount in the sports gaming revenue fund remaining after making the
    transfers required by divisions (C)(1) and (2) of this section, the director of
    budget and management shall transfer, on or before the fifteenth day of the month
    following the end of each calendar quarter, amounts to each fund as follows:

    (a) Ninety-eight per cent to the sports gaming profits education fund;

    (b) Two per cent to the problem sports gaming fund.

    (D) All interest generated by the funds created under this section shall be credited
    back to them.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5753.031
- number: '5753.04'
  heading: Filing of returns
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: '(A) Each taxpayer shall file returns electronically with the tax commissioner.
    Casino operators shall file returns daily each day banks are open for business,
    not later than noon, and sports gaming proprietors shall file returns on or before
    the fifteenth day of each month, not later than noon. The return shall be in the
    form required by the tax commissioner, and shall reflect the relevant tax period.
    The return shall include, but is not limited to, the amount of the taxpayer''s
    gross casino revenue or sports gaming receipts for the tax period and the amount
    of tax due under section 5753.02 or 5753.021 of the Revised Code for the tax period.
    The taxpayer shall remit electronically with the return the tax due.

    (B) If a casino operator or sports gaming proprietor ceases to be a taxpayer at
    any time, the operator or proprietor shall indicate the last date for which the
    operator or proprietor was liable for the tax. The return shall include a space
    for this purpose.

    (C) Except as otherwise provided in division (A) of section 3775.14 of the Revised
    Code, the information in a return a sports gaming proprietor files with the tax
    commissioner under this section concerning sports gaming receipts is subject to
    disclosure as a public record under section 149.43 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5753.04
- number: '5753.05'
  heading: Penalties
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: '(A)(1) A taxpayer who fails to file a return or to remit the tax due as required
    by section 5753.04 of the Revised Code shall pay a penalty not to exceed the greater
    of five hundred dollars or ten per cent of the tax due.

    (2) If the tax commissioner finds additional tax to be due, the tax commissioner
    may impose an additional penalty of up to fifteen per cent of the additional tax
    found to be due. A delinquent payment of tax made as the result of a notice or
    an audit is subject to the additional penalty imposed by this division.

    (3) If a taxpayer fails to file a return electronically or to remit the tax electronically,
    the tax commissioner may impose an additional penalty of fifty dollars or ten
    per cent of the tax due as shown on the return, whichever is greater.

    (B) If the tax due under section 5753.02 or 5753.021 of the Revised Code is not
    timely paid, the taxpayer shall pay interest at the rate per annum prescribed
    in section 5703.47 of the Revised Code beginning on the day the tax was due through
    the day the tax is paid or an assessment is issued, whichever occurs first.

    (C) The tax commissioner shall collect any penalty or interest as if it were the
    tax levied by section 5753.02 or 5753.021 of the Revised Code, as applicable.
    Penalties and interest shall be treated as if they were revenue arising from the
    applicable tax.

    (D) The tax commissioner may abate all or a portion of any penalty imposed under
    this section and may adopt rules governing abatements.

    (E) If a casino operator or sports gaming proprietor fails to file a return or
    remit the tax due as required by section 5753.04 of the Revised Code within a
    period of one year after the due date for filing the return or remitting the tax,
    the Ohio casino control commission may suspend the operator''s or proprietor''s
    license.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5753.05
- number: '5753.06'
  heading: Application for refund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: '(A) A taxpayer may apply to the tax commissioner for a refund of amounts
    imposed under this chapter that were overpaid, paid illegally or erroneously,
    or paid on an illegal or erroneous assessment. The application shall be on a form
    prescribed by the tax commissioner. The taxpayer shall provide the amount of the
    requested refund along with the claimed reasons for, and documentation to support,
    the issuance of a refund. The taxpayer shall file the application with the tax
    commissioner within four years after the date the payment was made, unless the
    applicant has waived the time limitation under division (D) of section 5753.07
    of the Revised Code. In the latter event, the four-year limitation is extended
    for the same period of time as the waiver.

    (B) Upon the filing of a refund application, the tax commissioner shall determine
    the amount of refund to which the applicant is entitled. If the amount is not
    less than that claimed, the tax commissioner shall certify the amount to the director
    of budget and management and treasurer of state for payment from the tax refund
    fund. If the amount is less than that claimed, the tax commissioner shall proceed
    under section 5703.70 of the Revised Code.

    (C) Interest on a refund applied for under this section, computed at the rate
    provided for in section 5703.47 of the Revised Code, shall be allowed from the
    later of the date the amount was due or the date payment was made. Except as provided
    in section 5753.07 of the Revised Code, the tax commissioner may, with the consent
    of the taxpayer, provide for crediting against the tax due for a tax period, the
    amount of any refund due the taxpayer for a preceding tax period.

    (D) Refunds under this section are subject to offset under section 5753.061 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5753.06
- number: '5753.061'
  heading: Application of refund to debt to the state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: 'As used in this section, "debt to the state" means unpaid taxes that are
    due the state, unpaid workers'' compensation premiums that are due, unpaid unemployment
    compensation contributions that are due, unpaid unemployment compensation payments
    in lieu of contributions that are due, unpaid fees payable to the state or to
    the clerk of courts under section 4505.06 of the Revised Code, incorrect medical
    assistance payments, or any unpaid charge, penalty, or interest arising from any
    of the foregoing. A debt to the state is not a "debt to the state" as used in
    this section unless the liability underlying the debt to the state has become
    incontestable because the time for appealing, reconsidering, reassessing, or otherwise
    questioning the liability has expired or the liability has been finally determined
    to be valid.

    If a taxpayer who is entitled to a refund under section 5753.06 of the Revised
    Code owes a debt to the state, the amount refundable may be applied in satisfaction
    of the debt to the state. If the amount refundable is less than the amount of
    the debt to the state, the amount refundable may be applied in partial satisfaction
    of the debt. If the amount refundable is greater than the amount of the debt,
    the amount refundable remaining after satisfaction of the debt shall be refunded
    to the taxpayer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5753.061
- number: '5753.07'
  heading: Assessment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5753'
    name: Casinos and Sports Gaming
  text: '(A)(1) The tax commissioner may issue an assessment, based on any information
    in the tax commissioner''s possession, against a taxpayer who fails to pay the
    tax levied under section 5753.02 or 5753.021 of the Revised Code or to file a
    return under section 5753.04 of the Revised Code. The tax commissioner shall give
    the taxpayer written notice of the assessment under section 5703.37 of the Revised
    Code. With the notice, the tax commissioner shall include instructions on how
    to petition for reassessment and on how to request a hearing with respect to the
    petition.

    (2) Unless the taxpayer, within sixty days after service of the notice of assessment,
    files with the tax commissioner a written petition signed by the taxpayer, or
    by the taxpayer''s authorized agent who has knowledge of the facts, the assessment
    becomes final, and the amount of the assessment is due and payable from the taxpayer
    to the treasurer of state. The petition shall indicate the taxpayer''s objections
    to the assessment. Additional objections may be raised in writing if they are
    received by the tax commissioner before the date shown on the final determination.

    (3) If a petition for reassessment has been properly filed, the tax commissioner
    shall proceed under section 5703.60 of the Revised Code.

    (4) After an assessment becomes final, if any portion of the assessment, including
    penalties and accrued interest, remains unpaid, the tax commissioner may file
    a certified copy of the entry making the assessment final in the office of the
    clerk of the court of common pleas of Franklin county or in the office of the
    clerk of the court of common pleas of the county in which the taxpayer resides,
    the taxpayer''s casino facility or sports gaming facility is located, or the taxpayer''s
    principal place of business in this state is located. Immediately upon the filing
    of the entry, the clerk shall enter a judgment for the state against the taxpayer
    assessed in the amount shown on the entry. The judgment may be filed by the clerk
    in a loose-leaf book entitled, "special judgments for the gross casino revenue
    tax and sports gaming receipts tax." The judgment has the same effect as other
    judgments. Execution shall issue upon the judgment at the request of the tax commissioner,
    and all laws applicable to sales on execution apply to sales made under the judgment.

    (5) If the assessment is not paid in its entirety within sixty days after the
    day the assessment was issued, the portion of the assessment consisting of tax
    due shall bear interest at the rate per annum prescribed by section 5703.47 of
    the Revised Code from the day the tax commissioner issued the assessment until
    the assessment is paid or until it is certified to the attorney general for collection
    under section 131.02 of the Revised Code, whichever comes first. If the unpaid
    portion of the assessment is certified to the attorney general for collection,
    the entire unpaid portion of the assessment shall bear interest at the rate per
    annum prescribed by section 5703.47 of the Revised Code from the date of certification
    until the date it is paid in its entirety. Interest shall be paid in the same
    manner as the tax levied under section 5753.02 or 5753.021 of the Revised Code,
    as applicable, and may be collected by the issuance of an assessment under this
    section.

    (B) If the tax commissioner believes that collection of the tax levied under section
    5753.02 or 5753.021 of the Revised Code will be jeopardized unless proceedings
    to collect or secure collection of the tax are instituted without delay, the commissioner
    may issue a jeopardy assessment against the taxpayer that is liable for the tax.
    Immediately upon the issuance of a jeopardy assessment, the tax commissioner shall
    file an entry with the clerk of the court of common pleas in the manner prescribed
    by division (A)(4) of this section, and the clerk shall proceed as directed in
    that division. Notice of the jeopardy assessment shall be served on the taxpayer
    or the taxpayer''s authorized agent under section 5703.37 of the Revised Code
    within five days after the filing of the entry with the clerk. The total amount
    assessed is immediately due and payable, unless the taxpayer assessed files a
    petition for reassessment under division (A)(2) of this section and provides security
    in a form satisfactory to the tax commissioner that is in an amount sufficient
    to satisfy the unpaid balance of the assessment. If a petition for reassessment
    has been filed, and if satisfactory security has been provided, the tax commissioner
    shall proceed under division (A)(3) of this section. Full or partial payment of
    the assessment does not prejudice the tax commissioner''s consideration of the
    petition for reassessment.

    (C) The tax commissioner shall immediately forward to the treasurer of state all
    amounts the tax commissioner receives under this section, and the amounts forwarded
    shall be treated as if they were revenue arising from the tax levied under section
    5753.02 or 5753.021 of the Revised Code, as applicable.

    (D) Except as otherwise provided in this division, no assessment shall be issued
    against a taxpayer for the tax levied under section 5753.02 or 5753.021 of the
    Revised Code more than four years after the due date for filing the return for
    the tax period for which the tax was reported, or more than four years after the
    return for the tax period was filed, whichever is later. This division does not
    bar an assessment against a taxpayer who fails to file a return as required by
    section 5753.04 of the Revised Code or who files a fraudulent return, or when
    the taxpayer and the tax commissioner waive in writing the time limitation.

    (E) If the tax commissioner possesses information that indicates that the amount
    of tax a taxpayer is liable to pay under section 5753.02 or 5753.021 of the Revised
    Code exceeds the amount the taxpayer paid, the tax commissioner may audit a sample
    of the taxpayer''s gross casino revenue or sports gaming receipts, as applicable,
    over a representative period of time to ascertain the amount of tax due, and may
    issue an assessment based on the audit. The tax commissioner shall make a good
    faith effort to reach agreement with the taxpayer in selecting a representative
    sample. The tax commissioner may apply a sampling method only if the tax commissioner
    has prescribed the method by rule.

    (F) If the whereabouts of a taxpayer who is liable for the tax levied under section
    5753.02 or 5753.021 of the Revised Code are unknown to the tax commissioner, the
    tax commissioner shall proceed under section 5703.37 of the Revised Code.'
