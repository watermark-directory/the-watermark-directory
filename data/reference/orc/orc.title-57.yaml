- number: '5741.023'
  heading: County use tax for specific purposes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) For the same purposes for which it has imposed a tax under section 5739.026
    of the Revised Code, any county that levies a tax pursuant to such section shall
    levy a tax at the same rate levied pursuant to such section on the storage, use,
    or other consumption in the county of the following:

    (1) Motor vehicles, and watercraft and outboard motors required to be titled in
    the county pursuant to Chapter 1548. of the Revised Code, acquired by a transaction
    subject to the tax imposed by section 5739.02 of the Revised Code;

    (2) In addition to the tax imposed by section 5741.02 of the Revised Code, tangible
    personal property and services subject to the tax levied by this state as provided
    in section 5741.02 of the Revised Code, and tangible personal property and services
    purchased in another county within this state by a transaction subject to the
    tax imposed by section 5739.02 of the Revised Code.

    The tax shall be levied pursuant to a resolution of the board of county commissioners,
    which shall be adopted in the same manner as provided in section 5739.026 of the
    Revised Code. Such resolution shall be adopted and shall become effective on the
    same day as the resolution adopted by the board of county commissioners levying
    a sales tax pursuant to such section and shall remain in effect until such sales
    tax is repealed or expires.

    (B) The tax levied pursuant to this section shall be in addition to the tax levied
    by section 5741.02 of the Revised Code and, except as provided in division (D)
    of this section, any tax levied pursuant to sections 5741.021 and 5741.022 of
    the Revised Code.

    (C) The additional tax levied by the county shall be collected pursuant to section
    5739.025 of the Revised Code.

    (D) The tax levied pursuant to this section shall not be applicable to any benefit
    of a service realized or to any storage, use, or consumption of property not within
    the taxing power of a county under the constitution of the United States or the
    constitution of this state, or to property or services on which tax levied by
    a county or transit authority pursuant to this section or section 5739.021, 5739.023,
    5739.026, 5741.021, or 5741.022 of the Revised Code has been paid, if the sum
    of the taxes paid pursuant to those sections is equal to or greater than the sum
    of the taxes due under this section and sections 5741.021 and 5741.022 of the
    Revised Code. If the sum of the taxes paid is less than the sum of the taxes due
    under this section and sections 5741.021 and 5741.022 of the Revised Code, the
    amount of tax paid shall be credited against the amount of tax due.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.023
- number: '5741.03'
  heading: Use of revenue
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) One hundred per cent of all money deposited into the state treasury under
    sections 5741.01 to 5741.22 of the Revised Code that is not required to be distributed
    as provided in division (B) of this section shall be credited to the general revenue
    fund.

    (B) In any case where any county or transit authority has levied a tax or taxes
    pursuant to section 5741.021, 5741.022, or 5741.023 of the Revised Code, the tax
    commissioner shall, within forty-five days after the end of each month, determine
    and certify to the director of budget and management the amount of the proceeds
    of such tax or taxes from billings and assessments received during that month,
    or shown on tax returns or reports filed during that month, to be returned to
    the county or transit authority levying the tax or taxes, which amounts shall
    be determined in the manner provided in section 5739.21 of the Revised Code. The
    director of budget and management shall transfer, from the general revenue fund,
    to the permissive tax distribution fund created by division (B)(1) of section
    4301.423 of the Revised Code and to the local sales tax administrative fund created
    by division (C) of section 5739.21 of the Revised Code, the amounts certified
    by the tax commissioner. The tax commissioner shall then, on or before the twentieth
    day of the month in which such certification is made, provide for payment of such
    respective amounts to the county treasurer or to the fiscal officer of the transit
    authority levying the tax or taxes. The amount transferred to the local sales
    tax administrative fund is for use by the tax commissioner in defraying costs
    the commissioner incurs in administering such taxes levied by a county or transit
    authority.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.03
- number: '5741.031'
  heading: Deposit and use of funds
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) The funds received by a county levying an additional use tax pursuant
    to section 5741.021 of the Revised Code shall be deposited in the county general
    fund to be expended for any purpose for which general fund moneys of the county
    may be used, including the acquisition or construction of permanent improvements
    or to make payments in accordance with section 333.06 or 333.07 of the Revised
    Code, or in the bond retirement fund for the payment of debt service charges on
    notes or bonds of the county issued for the acquisition or construction of permanent
    improvements. The amounts to be deposited in each of such funds shall be determined
    by the board of county commissioners.

    (B) The moneys received by a county levying an additional use tax pursuant to
    section 5741.023 of the Revised Code shall be deposited in a separate fund, which
    shall be allocated, distributed, and used in accordance with the resolution adopted
    under section 5739.026 of the Revised Code. Moneys allocated for the purpose of
    division (A)(4) of section 5739.026 of the Revised Code shall be transferred to
    and disbursed from the community improvements fund in the county treasury. Notwithstanding
    section 135.351 of the Revised Code, if an allocation of moneys to a convention
    facilities authority or a transit authority is required pursuant to division (C)
    of section 5739.026 of the Revised Code, the county shall pay and distribute each
    authority''s share of any such moneys to its fiscal officer within five business
    days of the date of their receipt by the county. If the moneys allocated under
    such division are not so paid, the county shall pay to such authority any interest
    that the county has received or will receive on such moneys that accrues from
    the date the county received the moneys, together with the principal amount of
    such moneys.

    (C) The funds received by a transit authority levying an additional use tax pursuant
    to section 5741.022 of the Revised Code shall be deposited in such fund or funds
    of the transit authority as determined by the legislative authority of the transit
    authority to be expended for any purpose for which a county transit board or the
    board of county commissioners operating a county transit system, in the case of
    a county, or the board of trustees of a regional transit authority, in the case
    of a regional transit authority, may expend moneys under their control, including
    the purchase, acquisition, construction, replacement, improvement, extension,
    or enlargement of permanent improvements or in the bond retirement fund for the
    payment of debt service charges on notes or bonds of the transit authority.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.031
- number: '5741.04'
  heading: Collection, reporting and remission of tax by seller
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: 'Every seller required to register with the tax commissioner pursuant to section
    5741.17 of the Revised Code who is engaged in the business of selling or facilitating
    the sale of tangible personal property in this state for storage, use, or other
    consumption in this state, to which section 5741.02 of the Revised Code applies,
    or which is subject to a tax levied pursuant to section 5741.021, 5741.022, or
    5741.023 of the Revised Code, shall, and any other seller who is authorized by
    rule of the tax commissioner to do so may, collect from the consumer the full
    and exact amount of the tax payable on each such storage, use, or consumption,
    in the manner and at the times provided as follows:

    (A) If the price is, at or prior to the delivery of possession of the thing sold
    to the consumer, paid in currency passed from hand to hand by the consumer or
    the consumer''s agent, to the seller or the seller''s agent, the seller or the
    seller''s agent shall collect the tax with and at the same time as the price.

    (B) If the price is otherwise paid or to be paid, the seller or the seller''s
    agent shall, at or prior to the delivery of possession of the thing sold to the
    consumer, charge the tax imposed by or pursuant to section 5741.02, 5741.021,
    5741.022, or 5741.023 of the Revised Code to the account of the consumer, which
    amount shall be collected by the seller from the consumer in addition to the price.
    Such transaction shall be reported on the return for the period in which the transaction
    occurred, and the amount of tax applicable to the transaction shall be remitted
    with the return or, if the consumer is subject to section 5741.121 of the Revised
    Code, in the manner prescribed by that section. The amount of the tax shall become
    a legal charge in favor of the seller and against the consumer.

    (C) It shall be the obligation of each consumer, as required by section 5741.12
    of the Revised Code, to report and pay the taxes levied by sections 5741.021,
    5741.022, and 5741.023 of the Revised Code, if applicable, on any storage, use,
    or other consumption of tangible personal property purchased in this state from
    a vendor required to be licensed pursuant to section 5739.17 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.04
- number: '5741.05'
  heading: Seller to determine jurisdiction for which to collect tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: 'As used in this section, "receive" means taking possession of tangible personal
    property or making first use of a service. "Receive" does not include possession
    by a shipping company on behalf of a consumer.

    (A) Except as otherwise provided in division (B) of this section, a seller that
    collects the tax levied by sections 5741.02, 5741.021, 5741.022, or 5741.023 of
    the Revised Code on transactions, other than sales of titled motor vehicles, titled
    watercraft, or titled outboard motors, shall determine under section 5739.033
    or 5739.034 of the Revised Code the jurisdiction for which to collect the tax.

    (B) A marketplace facilitator that collects the tax levied by sections 5741.02,
    5741.021, 5741.022, or 5741.023 of the Revised Code on sales facilitated by the
    marketplace facilitator, other than sales of titled motor vehicles, titled watercraft,
    or titled outboard motors, shall determine the jurisdiction for which to collect
    the tax as follows:

    (1) The location known to the marketplace facilitator where the consumer or the
    donee designated by the consumer receives the tangible personal property or service,
    including the location indicated by instructions for delivery to the consumer
    or the consumer''s donee;

    (2) If division (B)(1) of this section does not apply, the location indicated
    by an address for the consumer that is available from the marketplace facilitator''s
    business records that are maintained in the ordinary course of the marketplace
    facilitator''s business, when use of that address does not constitute bad faith;

    (3) If divisions (B)(1) and (2) of this section do not apply, the location indicated
    by an address for the consumer obtained during the consummation of the sale, including
    the address associated with the consumer''s payment instrument, if no other address
    is available, when use of that address does not constitute bad faith.

    (4) If divisions (B)(1), (2), and (3) of this section do not apply, including
    in the circumstance where the marketplace facilitator is without sufficient information
    to apply any of those divisions, the address from which tangible personal property
    was shipped, or from which the service was provided, disregarding any location
    that merely provided the electronic transfer of the property sold or service provided.

    (C) A vendor or seller of motor vehicles, watercraft, or outboard motors required
    to be titled in this state shall collect the tax levied by section 5739.02 or
    5741.02 of the Revised Code and the additional taxes levied by division (A)(1)
    of section 5741.021, division (A)(1) of section 5741.022, and division (A)(1)
    of section 5741.023 of the Revised Code for the consumer''s county of residence
    as provided in section 1548.06 and division (B) of section 4505.06 of the Revised
    Code.

    (D) A vendor or seller is not responsible for collecting or remitting additional
    tax if a consumer subsequently stores, uses, or consumes the tangible personal
    property or service in another jurisdiction with a rate of tax imposed by sections
    5741.02, 5741.021, 5741.022, or 5741.023 of the Revised Code that is higher than
    the amount collected by the vendor or seller pursuant to Chapter 5739. or 5741.
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.05
- number: '5741.06'
  heading: Powers and duties of tax commissioner - prepayment of tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: The tax commissioner shall enforce and administer sections 5741.01 to 5741.22
    of the Revised Code, which are hereby declared to be laws which he is required
    to administer within the meaning of sections 5703.17 to 5703.39 and 5703.45 of
    the Revised Code. The commissioner may adopt and promulgate such rules as he deems
    necessary to administer sections 5741.01 to 5741.22 of the Revised Code, and may
    authorize a seller to prepay the tax levied by or pursuant to section 5741.02,
    5741.021, 5741.022, or 5741.023 of the Revised Code upon storage, use, or consumption
    of things produced or distributed by such seller, and he may waive the collection
    of the tax from the consumer; but no such authority shall be granted or exercised,
    except upon application to the commissioner and unless he finds, that the conditions
    of the applicant's business are such as to render impracticable the collection
    of the tax by the seller in the manner otherwise provided by such sections; nor
    shall the authority so granted be exercised, nor the seller actually selling such
    products be exempted from sections 5741.01 to 5741.22 of the Revised Code, by
    virtue of such an authorization, unless the person to whom such authority is granted
    prints plainly upon the product sold, or offered for sale, a statement to the
    effect that the tax has been paid in advance, or otherwise conveys said information
    to the consumer by written notice. The commissioner may require security to his
    satisfaction to be filed with him, in such amount as he determines to be sufficient
    to secure the prepayment under the provisions of this section of the taxes levied
    by or pursuant to section 5741.02, 5741.021, 5741.022, or 5741.023 of the Revised
    Code in the manner desired.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.06
- number: '5741.07'
  heading: Rights of marketplace facilitator treated as seller
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: 'Except as otherwise provided in section 5741.11 of the Revised Code, a marketplace
    facilitator that is treated as a seller pursuant to division (E) of section 5741.01
    of the Revised Code has the same rights and obligations under this chapter as
    other sellers. Such obligations include registering with the tax commissioner
    under section 5741.17 of the Revised Code and collecting and remitting the taxes
    levied under this chapter on sales facilitated by the marketplace facilitator
    in accordance with section 5741.04 of the Revised Code. A marketplace facilitator''s
    rights and obligations regarding a sale are not affected by the amount of the
    price paid by the consumer that will accrue to or benefit the marketplace facilitator
    as compared to the marketplace seller for which the sale is facilitated, or by
    whether or not such marketplace seller has substantial nexus with this state,
    registers with the tax commissioner under section 5741.17 of the Revised Code,
    or collects and remits taxes on sales not facilitated by a marketplace facilitator
    in accordance with section 5741.04 of the Revised Code.

    A marketplace seller that is required to collect and remit the taxes levied under
    this chapter shall continue to do so for all sales other than those facilitated
    by a marketplace facilitator that is treated as a seller pursuant to division
    (E) of section 5741.01 of the Revised Code, including sales facilitated before
    the first day of the first month that begins at least thirty days after the marketplace
    facilitator first has substantial nexus with this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.07
- number: '5741.071'
  heading: Waiver for facilitator not to be treated as a seller
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) A marketplace seller may request and shall obtain a waiver from the tax
    commissioner for a marketplace facilitator not to be treated as a seller pursuant
    to division (E) of section 5741.01 of the Revised Code with respect to a specific
    marketplace seller if the following conditions are met:

    (1) The marketplace seller certifies it has annual gross receipts within the United
    States, including the gross receipts of any affiliate, as defined in section 122.15
    of the Revised Code, of at least one billion dollars;

    (2) The marketplace seller or its affiliate, as defined in section 122.15 of the
    Revised Code, is publicly traded on at least one major stock exchange;

    (3) The marketplace seller is current on all taxes, fees, and charges administered
    by the department of taxation that are not subject to a bona fide dispute;

    (4) The marketplace seller has not, within the past twelve months, requested that
    a waiver related to the marketplace facilitator at issue be canceled nor has the
    waiver been revoked by the commissioner; and

    (5) The marketplace seller has not violated division (B) of section 5739.30 of
    the Revised Code.

    (B) A marketplace seller shall request a waiver on the form prescribed by the
    commissioner. A request for a waiver shall contain a signed declaration from the
    marketplace facilitator acquiescing to the request for a waiver. A waiver request
    that is not ruled upon by the commissioner within thirty days of the date it was
    filed is deemed granted. A waiver that is granted by the commissioner or deemed
    to be granted is effective on and after the first day of the first month that
    begins at least thirty days after the commissioner grants the waiver or the waiver
    is deemed granted. The waiver is valid until the first day of the first month
    that begins at least sixty days after it is revoked by the commissioner or cancelled
    by the marketplace seller.

    (C)(1) If a waiver is granted by the commissioner, the commissioner shall notify
    the marketplace seller and the seller shall be considered the vendor pursuant
    to division (C) of section 5739.01 of the Revised Code or a seller pursuant to
    division (E) of section 5741.01 of the Revised Code, as applicable.

    (2) A marketplace seller is required to notify the marketplace facilitator of
    the status of the waiver of the marketplace seller. However, if a waiver is denied
    by the commissioner, a copy of the denial shall be provided to the marketplace
    facilitator.

    (3) A marketplace seller that has been issued a waiver under this section may
    cancel the waiver by sending notice to the commissioner and to the marketplace
    facilitator identified in the waiver application. The commissioner may revoke
    a waiver if the commissioner determines that any of the conditions described in
    divisions (A)(1) to (5) of this section are no longer met by the marketplace seller.
    The commissioner shall notify the marketplace seller and the marketplace facilitator
    upon revoking a waiver.

    (D) Notwithstanding section 5703.21 of the Revised Code, the commissioner may
    divulge information related to the status of the waiver sought by or granted to
    the marketplace seller for a particular marketplace facilitator to either the
    impacted marketplace seller or marketplace facilitator.

    (E) The commissioner may promulgate rules the commissioner deems necessary to
    administer this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.071
- number: '5741.072'
  heading: Delivery network company waiver
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) If all of the following conditions are met, a delivery network company
    that facilitates delivery network services may request a waiver from the requirement
    in division (E) of section 5741.01 of the Revised Code that a marketplace facilitator
    be treated as the seller of goods sold by marketplace sellers through the marketplace
    facilitator:

    (1) The delivery network company is current on all taxes, fees, and charges administered
    by the department of taxation that are not subject to a bona fide dispute.

    (2) The delivery network company has not, within the twelve months preceding the
    request for waiver, requested that a previously granted waiver be canceled or
    had a previously granted waiver revoked by the commissioner.

    (3) The delivery network company has not violated division (B) of section 5739.30
    of the Revised Code.

    A waiver granted under this section does not affect the delivery network company''s
    status as the seller of its delivery network services.

    (B) A delivery network company that requests a waiver pursuant to this section
    shall make the request to the tax commissioner on a form prescribed by the commissioner.
    A waiver that is not affirmatively granted or denied by the commissioner within
    thirty days of the date it was filed with the commissioner is automatically granted.
    A waiver that is granted by the commissioner or granted automatically is effective
    on and after the first day of the first month that begins at least thirty days
    after the commissioner grants the waiver or the waiver is automatically granted.
    The waiver is valid until the first day of the first month that begins at least
    sixty days after it is revoked by the commissioner or canceled by the delivery
    network company.

    (C)(1) When a waiver is granted pursuant to division (B) of this section, the
    commissioner shall notify the delivery network company, which shall then notify
    each local merchant operating on the delivery network company''s physical or electronic
    marketplace that the local merchant shall be considered a vendor pursuant to division
    (C) of section 5739.01 of the Revised Code or a seller pursuant to division (E)
    of section 5741.01 of the Revised Code, as applicable, with respect to the local
    products sold by the seller through the delivery network company''s physical or
    electronic marketplace.

    (2) A delivery network company that has been granted a waiver under this section
    may cancel the waiver by sending notice to the commissioner. The commissioner
    may revoke a waiver if the commissioner determines that any of the conditions
    described in divisions (A)(1) to (3) of this section are no longer met by the
    delivery network company. The commissioner shall notify the delivery network company
    upon revoking a waiver. A delivery network for which a waiver has been canceled
    or revoked shall promptly notify each local merchant operating on the delivery
    network company''s physical or electronic marketplace that its waiver has been
    canceled or revoked.

    (D) Notwithstanding section 5703.21 of the Revised Code, the commissioner may
    divulge information related to the status of a waiver granted to a delivery network
    company if requested by a local merchant operating on the delivery network company''s
    physical or electronic marketplace.

    (E) The commissioner may adopt any rules necessary to administer this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.072
- number: '5741.08'
  heading: Notification of change in county or transit authority boundaries
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: If modification of a county's jurisdictional boundaries or a transit authority's
    territory results in a change in the tax rate levied under section 5741.021, 5741.022,
    or 5741.023 of the Revised Code, the tax commissioner, within thirty days of such
    change, shall notify any seller or the seller's certified service provider, if
    the seller has selected one, of such change. The rate change shall not apply until
    the first day of a calendar quarter following the expiration of sixty days from
    the date of notice by the commissioner.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.08
- number: '5741.10'
  heading: Refunds
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: Refunds of amounts paid pursuant to this chapter by a seller or consumer illegally
