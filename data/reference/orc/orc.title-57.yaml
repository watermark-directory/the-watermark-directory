    name: Tax Levy Law
  text: '(A) As used in this section:

    (1) "Qualifying levy" means any levy in excess of the ten-mill limitation for
    current expenses or current operating expenses.

    (2) "School district" means a city, local, or exempted village school district.

    (B) Notwithstanding anything in the Revised Code to the contrary, any election
    notice and ballot language for qualifying levy submitted to electors by a school
    district shall display the information certified by the county auditor in division
    (B)(2)(f) of section 5705.03 of the Revised Code. The secretary of state shall
    prescribe the form of the notice and ballot to incorporate this information.'
