  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.07
- number: '5705.08'
  heading: Certification by fiscal officer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'On or before the first Monday in May of each year, the fiscal officer of
    each subdivision, except school districts and the city of Cincinnati, shall certify
    to its taxing authority the amount necessary to provide for the payment of final
    judgments against the subdivision, except in condemnation of property cases. The
    taxing authority shall place such certified amount in each budget and in the annual
    appropriation measure for the full amount certified.

    On or before the first Monday in November of each year, the fiscal officer of
    the city of Cincinnati and of each school district shall certify to its taxing
    authority the amount necessary to provide for the payment of final judgments against
    the subdivision, except in condemnation of property cases. The taxing authority
    shall place such certified amount in each budget and in the annual appropriation
    measure for the full amount certified.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.08
- number: '5705.09'
  heading: Establishment of funds
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'Each subdivision shall establish the following funds:

    (A) General fund;

    (B) Sinking fund whenever the subdivision has outstanding bonds other than serial
    bonds;

    (C) Bond retirement fund, for the retirement of serial bonds, notes, or certificates
    of indebtedness;

    (D) A special fund for each special levy;

    (E) A special bond fund for each bond issue;

    (F) A special fund for each class of revenues derived from a source other than
    the general property tax, which the law requires to be used for a particular purpose;

    (G) A special fund for each public utility operated by a subdivision;

    (H) A trust fund for any amount received by a subdivision in trust.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.09
- number: '5705.091'
  heading: County developmental disabilities general fund - capital fund - medicaid
    reserve fund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'The board of county commissioners of each county shall establish a county
    developmental disabilities general fund. Notwithstanding section 5705.10 of the
    Revised Code, proceeds from levies under section 5705.222 and division (L) of
    section 5705.19 of the Revised Code shall be deposited to the credit of the county
    developmental disabilities general fund. Accounts shall be established within
    the county developmental disabilities general fund for each of the several particular
    purposes of the levies as specified in the resolutions under which the levies
    were approved, and proceeds from different levies that were approved for the same
    particular purpose shall be credited to accounts for that purpose. Other money
    received by the county for the purposes of Chapters 3323. and 5126. of the Revised
    Code and not required by state or federal law to be deposited to the credit of
    a different fund shall also be deposited to the credit of the county developmental
    disabilities general fund, in an account appropriate to the particular purpose
    for which the money was received. Unless otherwise provided by law, an unexpended
    balance at the end of a fiscal year in any account in the county developmental
    disabilities general fund shall be appropriated the next fiscal year to the same
    fund.

    A county board of developmental disabilities may request, by resolution, that
    the board of county commissioners establish a county developmental disabilities
    capital fund for money to be used for acquisition, construction, or improvement
    of capital facilities or acquisition of capital equipment used in providing services
    to persons with developmental disabilities. The county board of developmental
    disabilities shall transmit a certified copy of the resolution to the board of
    county commissioners. Upon receiving the resolution, the board of county commissioners
    shall establish a county developmental disabilities capital fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.091
- number: '5705.10'
  heading: Use of revenues
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) All revenue derived from the general levy for current expense within
    the ten-mill limitation, from any general levy for current expense authorized
    by vote in excess of the ten-mill limitation, and from sources other than the
    general property tax, unless its use for a particular purpose is prescribed by
    law, shall be paid into the general fund.

    (B) All revenue derived from general or special levies for debt charges, whether
    within or in excess of the ten-mill limitation, which is levied for the debt charges
    on serial bonds, notes, or certificates of indebtedness having a life less than
    five years, shall be paid into the bond retirement fund; and all such revenue
    which is levied for the debt charges on all other bonds, notes, or certificates
    of indebtedness shall be paid into the sinking fund.

    (C) All revenue derived from a special levy shall be credited to a special fund
    for the purpose for which the levy was made.

    (D) Except as otherwise provided by resolution adopted pursuant to section 3315.01
    of the Revised Code, all revenue derived from a source other than the general
    property tax and which the law prescribes shall be used for a particular purpose,
    shall be paid into a special fund for such purpose. Except as otherwise provided
    by resolution adopted pursuant to section 3315.01 of the Revised Code or as otherwise
    provided by section 3315.40 of the Revised Code, all revenue derived from a source
    other than the general property tax, for which the law does not prescribe use
    for a particular purpose, including interest earned on the principal of any special
    fund, regardless of the source or purpose of the principal, shall be paid into
    the general fund.

    (E) All proceeds from the sale of public obligations or fractionalized interests
    in public obligations as defined in section 133.01 of the Revised Code, except
    premium and accrued interest, shall be paid into a special fund for the purpose
    of such issue, and any interest and other income earned on money in such special
    fund may be used for the purposes for which the indebtedness was authorized or
    may be credited to the general fund or other fund or account as the taxing authority
    authorizes and used for the purposes of that fund or account. The premium and
    accrued interest received from such sale shall be paid into the sinking fund or
    the bond retirement fund of the subdivision.

    (F) Except as provided in divisions (G) and (H) of this section, if a permanent
    improvement of the subdivision is sold, the amount received from the sale shall
    be paid into the sinking fund, the bond retirement fund, or a special fund for
    the construction or acquisition of permanent improvements; provided that the proceeds
    from the sale of a public utility shall be paid into the sinking fund or bond
    retirement fund to the extent necessary to provide for the retirement of the outstanding
    indebtedness incurred in the construction or acquisition of such utility. Proceeds
    from the sale of property other than a permanent improvement shall be paid into
    the fund from which such property was acquired or is maintained or, if there is
    no such fund, into the general fund.

    (G) A township that has a population greater than fifteen thousand according to
    the most recent federal decennial census and that has declared one or more improvements
    in the township to be a public purpose under section 5709.73 of the Revised Code
    may pay proceeds from the sale of a permanent improvement of the township into
    its general fund if both of the following conditions are satisfied:

    (1) The township fiscal officer determines that all foreseeable public infrastructure
    improvements, as defined in section 5709.40 of the Revised Code, to be made in
    the township in the ten years immediately following the date the permanent improvement
    is sold will have been financed through resolutions adopted under section 5709.73
    of the Revised Code on or before the date of the sale. The fiscal officer shall
    provide written certification of this determination for the township''s records.

    (2) The permanent improvement being sold was financed entirely from moneys in
    the township''s general fund.

    (H) If a board of education of a school district disposes of real property under
    section 3313.41, 3313.411, or 3313.413 of the Revised Code, the proceeds received
    on or after September 29, 2013, from the sale shall be used for either of the
    following purposes:

    (1) The retirement of any debt that was incurred by the district with respect
    to that real property. Proceeds in excess of the funds necessary to retire that
    debt may be paid into the school district''s capital and maintenance fund and
    used only to pay for the costs of nonoperating capital expenses related to technology
    infrastructure and equipment to be used for instruction and assessment.

    (2) Payment into a special fund for the construction or acquisition of permanent
    improvements.

    (I) Money paid into any fund shall be used only for the purposes for which such
    fund is established.'
