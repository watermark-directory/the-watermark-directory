- number: '5749.07'
  heading: Failure to file or pay tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5749'
    name: Severance Tax
  text: '(A) If any severer required by this chapter to make and file returns and
    pay the tax levied by section 5749.02 of the Revised Code, or any severer or owner
    liable for the amounts due under section 1509.50 of the Revised Code, fails to
    make such return or pay such tax or amounts, the tax commissioner may make an
    assessment against the severer or owner based upon any information in the commissioner''s
    possession.

    No assessment shall be made or issued against any severer for any tax imposed
    by section 5749.02 of the Revised Code or against any severer or owner for any
    amount due under section 1509.50 of the Revised Code more than four years after
    the return was due or was filed, whichever is later. This section does not bar
    an assessment against a severer or owner who fails to file a return as required
    by this chapter, or who files a fraudulent return.

    The commissioner shall give the party assessed written notice of such assessment
    in the manner provided in section 5703.37 of the Revised Code. With the notice,
    the commissioner shall provide instructions on how to petition for reassessment
    and request a hearing on the petition.

    (B) Unless the party assessed files with the commissioner within sixty days after
    service of the notice of assessment a written petition for reassessment signed
    by the party assessed or that party''s authorized agent having knowledge of the
    facts, the assessment becomes final and the amount of the assessment is due and
    payable from the party assessed to the treasurer of state. The petition shall
    indicate the objections of the party assessed, but additional objections may be
    raised in writing if received by the commissioner prior to the date shown on the
    final determination. If the petition has been properly filed, the commissioner
    shall proceed under section 5703.60 of the Revised Code.

    (C) After an assessment becomes final, if any portion of the assessment remains
    unpaid, including accrued interest, a certified copy of the commissioner''s entry
    making the assessment final may be filed in the office of the clerk of the court
    of common pleas in the county in which the party assessed resides or in which
    the party''s business is conducted. If the party assessed maintains no place of
    business in this state and is not a resident of this state, the certified copy
    of the entry may be filed in the office of the clerk of the court of common pleas
    of Franklin county.

    Immediately upon the filing of such entry, the clerk shall enter a judgment for
    the state against the party assessed in the amount shown on the entry. The judgment
    may be filed by the clerk in a loose-leaf book entitled "special judgments for
    state severance tax," and shall have the same effect as other judgments. Execution
    shall issue upon the judgment upon the request of the commissioner, and all laws
    applicable to sales on execution shall apply to sales made under the judgment.

    If the assessment is not paid in its entirety within sixty days after the day
    the assessment is issued, the portion of the assessment consisting of tax due
    or amounts due under section 1509.50 of the Revised Code shall bear interest at
    the rate per annum prescribed by section 5703.47 of the Revised Code from the
    day the commissioner issues the assessment until it is paid or until it is certified
    to the attorney general for collection under section 131.02 of the Revised Code,
    whichever comes first. If the unpaid portion of the assessment is certified to
    the attorney general for collection, the entire unpaid portion of the assessment
    shall bear interest at the rate per annum prescribed by section 5703.47 of the
    Revised Code from the date of certification until the date it is paid in its entirety.
    Interest shall be paid in the same manner as the tax and may be collected by the
    issuance of an assessment under this section.

    (D) All money collected by the commissioner under this section shall be paid to
    the treasurer of state, and when paid shall be considered as revenue arising from
    the tax imposed by section 5749.02 of the Revised Code and the amount due under
    section 1509.50 of the Revised Code, as applicable.'
