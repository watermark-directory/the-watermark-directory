- number: '5723.18'
  heading: Deduction of costs - distribution of remaining proceeds - deficiency judgment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: '(A) Except as otherwise provided in division (B)(2) of section 5721.17 and
    division (B) of section 319.43 of the Revised Code, the proceeds from a forfeiture
    sale shall be distributed as follows:

    (1) The county auditor shall deduct all costs pertaining to the forfeiture and
    sale of forfeited lands, including costs pertaining to a foreclosure and forfeiture
    proceeding instituted under section 5721.14 of the Revised Code, except those
    paid under section 5721.04 of the Revised Code, from the moneys received from
    the sale of land and town lots forfeited to the state for the nonpayment of taxes,
    and shall pay such costs into the proper fund. In the case of the forfeiture sale
    of a parcel against which a foreclosure and forfeiture proceeding was instituted
    under section 5721.14 of the Revised Code, if the proceeds from the forfeiture
    sale are insufficient to pay the costs pertaining to such proceeding, the county
    auditor, at the next semiannual apportionment of real property taxes, shall reduce
    the amount of real property taxes that the auditor otherwise would distribute
    to each subdivision to which taxes, assessments, charges, penalties, or interest
    charged against the parcel are due. The reduction in each subdivision''s real
    property tax distribution shall equal the amount of the unpaid costs multiplied
    by a fraction, the numerator of which is the amount of taxes, assessments, charges,
    penalties, and interest due the subdivision, and the denominator of which is the
    total amount of taxes, assessments, charges, penalties, and interest due all such
    subdivisions.

    (2) Following the payment required by division (A)(1) of this section, the part
    of the proceeds that is equal to ten per cent of the taxes and assessments due
    shall be deposited in equal shares into each of the delinquent tax and assessment
    collection funds created pursuant to section 321.261 of the Revised Code.

    (3) Following the payment required by division (A)(2) of this section, the remaining
    proceeds shall be distributed by the auditor to the appropriate subdivisions to
    pay the taxes, assessments, charges, penalties, and interest which are due and
    unpaid. If the proceeds available for distribution under this division are insufficient
    to pay the entire amount of those taxes, assessments, charges, penalties, and
    interest, the auditor shall distribute the proceeds available for distribution
    under this division to the appropriate subdivisions in proportion to the amount
    of those taxes, assessments, charges, penalties, and interest that each is due.

    (B) If the proceeds from the sale of forfeited land are insufficient to pay in
    full the amount of the taxes, assessments, charges, penalties, and interest; the
    costs incurred in the proceedings instituted pursuant to this chapter and section
    5721.18 of the Revised Code, or the foreclosure and forfeiture proceeding instituted
    pursuant to section 5721.14 of the Revised Code; and, if division (B)(2) of section
    5721.17 of the Revised Code is applicable, any notes issued by a receiver pursuant
    to division (F) of section 3767.41 of the Revised Code and any receiver''s lien
    as defined in division (C)(4) of section 5721.18 of the Revised Code, the court
    may enter a deficiency judgment against the last owner of record of the land before
    its forfeiture to the state, for the unpaid amount. The court shall enter the
    judgment pursuant to section 5721.192 of the Revised Code. Except as otherwise
    provided in division (B) of section 319.43 of the Revised Code, the proceeds paid
    pursuant to the entry and satisfaction of such a judgment shall be distributed
    as if they had been received as a part of the proceeds from the sale of the land
    to satisfy the amount of the taxes, assessments, charges, penalties, and interest
    which are due and unpaid; the costs incurred in the associated proceedings which
    were due and unpaid; and, if division (B)(2) of section 5721.17 of the Revised
    Code is applicable, any notes issued by a receiver pursuant to division (F) of
    section 3767.41 of the Revised Code and any receiver''s lien as defined in division
    (C)(4) of section 5721.18 of the Revised Code.'
