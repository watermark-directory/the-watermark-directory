- number: '5709.01'
  heading: Taxable property entered on general tax list and duplicate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) All real property in this state is subject to taxation, except only such
    as is expressly exempted therefrom.

    (B) Except as provided by division (C) of this section or otherwise expressly
    exempted from taxation:

    (1) All personal property located and used in business in this state, and all
    domestic animals kept in this state and not used in agriculture are subject to
    taxation, regardless of the residence of the owners thereof.

    (2) All ships, vessels, and boats, and all shares and interests therein, defined
    in section 5701.03 of the Revised Code as personal property and belonging to persons
    residing in this state, and aircraft belonging to persons residing in this state
    and not used in business wholly in another state, other than aircraft licensed
    in accordance with sections 4561.17 to 4561.21 of the Revised Code, are subject
    to taxation.

    (C) The following property of the kinds mentioned in division (B) of this section
    shall be exempt from taxation:

    (1) Unmanufactured tobacco to the extent of the value, or amounts, of any unpaid
    nonrecourse loans thereon granted by the United States government or any agency
    thereof.

    (2) Spirituous liquor, as defined in division (B)(5) of section 4301.01 of the
    Revised Code, that is stored in warehouses in this state pursuant to an agreement
    with the division of liquor control.

    (3) Except as otherwise provided in section 5711.27 of the Revised Code, all other
    such property if the aggregate taxable value thereof required to be listed by
    the taxpayer under Chapter 5711. of the Revised Code does not exceed ten thousand
    dollars.

    (a) If the taxable value of such property exceeds ten thousand dollars only such
    property having an aggregate taxable value of ten thousand dollars shall be exempt.

    (b) If such property is located in more than one taxing district as defined in
    section 5711.01 of the Revised Code, the exemption of ten thousand dollars shall
    be applied as follows:

    (i) The taxable value of such property in the district having the greatest amount
    of such value shall be reduced until the exemption has been fully utilized or
    the value has been reduced to zero, whichever occurs first;

    (ii) If the exemption has not been fully utilized under division (C)(3)(b)(i)
    of this section, the value in the district having the second greatest value shall
    be reduced until the exemption has been fully utilized or the value has been reduced
    to zero, whichever occurs first;

    (iii) If the exemption has not been fully utilized under division (C)(3)(b)(ii)
    of this section, further reductions shall be made, in repeated steps which include
    property in districts having declining values, until the exemption has been fully
    utilized.

    (D) All property mentioned as taxable in this section shall be entered on the
    general tax list and duplicate of taxable property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.01
- number: '5709.02'
  heading: Taxable property to be entered on classified tax list and duplicate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: 'All money, credits, investments, deposits, and other intangible property
    of persons residing in this state shall be subject to taxation, except as provided
    in this section or as otherwise provided or exempted in Title LVII of the Revised
    Code, but the good will, license, or franchise of a business, whether granted
    by governmental authority or otherwise, shall not be considered property separate
    from the other property used in or growing out of such business. Property of the
    kinds mentioned in section 5709.03 of the Revised Code used in and arising out
    of business transacted in this state by or on behalf of a nonresident person,
    other than a foreign insurance company as defined in section 5725.01 of the Revised
    Code, and nonwithdrawable shares of stock of dealers in intangibles located in
    this state shall be subject to taxation; and all such property of persons residing
    in this state used in and arising out of business transacted outside this state
    by or on behalf of such persons shall not be subject to taxation. Such property
    subject to taxation shall be entered on the classified tax list and duplicate
    of taxable property, or on the intangible property tax list in the office of the
    treasurer of state.

    A corporation shall not be required to list any of its investments in the stocks
    of any other corporation or in its own treasury stock.

    Other taxable intangibles and other intangible property, as defined in section
    5701.09 of the Revised Code, arising from a sales agreement for grain or soybeans
    entered into by a person engaged in agriculture are not subject to taxation.

    An unincorporated mutual fund, as defined in section 5711.01 of the Revised Code,
    shall not be required to list any of its investments in the stocks of any corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.02
- number: '5709.03'
  heading: Fixing situs of certain classes of property within or without this state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: 'Property of the kinds mentioned in this section, when used in business, shall
    be considered to arise out of business transacted in a state other than that in
    which the owner resides, under the circumstances following:

    (A) Accounts receivable resulting from the sale of property by an agent having
    an office in such other state or from a stock of goods maintained therein, or
    from services performed by an officer, agent, or employee connected with, sent
    from, or reporting to any officer or at any office located in such other state;

    (B) Prepaid items, when the right acquired thereby relates exclusively to the
    business transacted in such other state, or to property used in such business;

    (C) In the case of accounts payable, the proportion of the entire amount of accounts
    receivable, wherever arising, represented by those arising out of business transacted
    in such other state ascertained as provided in this section, shall be taken to
    represent the proportion of the entire amount of accounts payable arising out
    of the business transacted in such other state;

    (D) Deposits, other than those used in business outside of such other state, when
    withdrawable in the course of such business by an officer or agent having an office
    in such other state; but deposits representing general reserves or balances of
    the owner thereof maintained for the purpose of his entire business wherever transacted,
    shall be considered located in the state in which the owner resides, if an individual,
    or in which its actual principal executive office is situated, if a partnership
    or association, or under whose laws it is organized, if a corporation, by whomsoever
    they may be withdrawable;

    (E) Money kept on hand at an office or place of business in such other state;

    (F) Investments not held in trust, when made, created, or acquired in the course
    of repeated transactions of the same kind, conducted from an office of the owner
    in such other state, when either:

    (1) Such investments represent obligations of persons residing in such other state
    or secured by property located therein;

    (2) An officer or agent of the owner at the owner''s office in such other state
    has authority, in the course of the owner''s business, to receive or collect the
    income thereon, the principal, or both, when due, or to sell and dispose of the
    same.

    This section shall be reciprocally applied, so that all property of the kinds
    mentioned in this section having a business situs in this state shall be taxed
    in this state, and no such property belonging to a person residing in this state
    and having a business situs outside of this state shall be taxed. The assignment
    of a business situs outside of this state to property of a person residing in
    this state, in any case and under any circumstances mentioned in this section,
    is inseparable from the assignment of such situs in this state to property of
    a person residing outside of this state in a like case and under similar circumstances.
    If any provision of this section is held invalid as applied to property of a nonresident
    person, such decision shall be deemed also to affect such provision as applied
    to property of a resident, but shall not affect any other provision hereof.'
