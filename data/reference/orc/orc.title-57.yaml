- number: '5727.58'
  heading: Quo warranto proceedings
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: If any public utility fails to make and file the excise or franchise reports
    or returns required by law, or to pay the penalties provided by law for failure
    to make and file such reports or returns for a period of ninety days after the
    time prescribed by law, the attorney general, on the request of the tax commissioner,
    shall commence an action in quo warranto in the court of appeals of the county
    in which such public utility has its principal place of business to forfeit and
    annul its privileges and franchises. If the court is satisfied that any such public
    utility is in default, it shall render judgment ousting such public utility from
    the exercise of its privileges and franchises within this state, and shall otherwise
    proceed as provided in sections 2733.01 to 2733.39, inclusive, of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.58
- number: '5727.60'
  heading: Penalty for failure to make report
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: If a person fails to file a report within the time prescribed by section 5727.08
    or 5727.31 of the Revised Code, including any extensions of time granted by the
    tax commissioner, a penalty of fifty dollars per month, not to exceed five hundred
    dollars, may be imposed for each month or fraction of a month elapsing between
    the due date of the report, including any extensions, and the date the report
    was filed. The penalty under this section for failing to file a report required
    by section 5727.08 of the Revised Code shall be paid into the state general revenue
    fund. The penalty under this section for failing to file the report required by
    section 5727.31 of the Revised Code shall be deposited into the state treasury
    in the same manner as the tax, and the commissioner may collect the penalty by
    assessment pursuant to section 5727.38 of the Revised Code. The tax commissioner
    may abate this penalty in full or in part.
