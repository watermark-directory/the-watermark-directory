- number: '5709.69'
  heading: Notice of intent to relocate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: 'If an enterprise operating in a county or municipal corporation in this state
    intends to relocate or relocates part or all of its operations to another county
    or municipal corporation in this state and has entered into or intends to enter
    into an agreement under section 5709.62, 5709.63, or 5709.632 of the Revised Code
    with that county or municipal corporation, the legislative authority or an officer
    of the county or municipal corporation to which the enterprise intends to relocate
    or relocates shall serve the legislative authority of the county or municipal
    corporation from which the enterprise intends to relocate or relocates with notice
    of the enterprise''s intention to relocate, accompanied by a copy of the agreement
    to be entered into or entered into pursuant to section 5709.62, 5709.63, or 5709.632
    of the Revised Code and a statement of the enterprise''s reasons for relocation.
    The legislative authority or officer also shall serve such notice upon the director
    of development. In both cases, service shall be by personal service or certified
    mail, return receipt requested, not later than thirty days prior to the day of
    the first public meeting at which the agreement is deliberated by the legislative
    authority of the county or municipal corporation to which the enterprise intends
    to relocate or relocates. With the approval of the director of development, service
    shall be not later than fifteen days prior to the day of the first public meeting
    of the legislative authority at which the agreement is deliberated. The legislative
    authority or officer required to serve notice shall seek such approval by applying
    to the director at the earliest possible time prior to that meeting. The director
    may approve the later service if the director determines that earlier notice is
    not possible or would be likely to jeopardize realization of the project. If approval
    for a later notice is applied for, the legislative authority or officer need not
    serve notice to the director as otherwise required by this section.

    If the legislative authority or officer required to serve such notices fails to
    do so as prescribed by this section, the legislative authority shall not enter
    into an agreement under those sections with that enterprise.

    This section applies only to relocations of operations that result or would result
    in the reduction of employment or the cessation of operations at a place of business
    in this state.'
