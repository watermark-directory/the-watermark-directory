- number: '5736.10'
  heading: Effect of disposal of business; liability of purchaser
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: 'If any person liable for the tax imposed under this chapter sells the trade
    or business, disposes in any manner other than in the regular course of business
    at least seventy-five per cent of assets of the trade or business, or quits the
    trade or business, any tax owed by such person shall become due and payable immediately,
    and the person shall pay the tax under this section, including any applicable
    penalties and interest, within forty-five days after the date of selling or quitting
    the trade or business. The person''s successor shall withhold a sufficient amount
    of the purchase money to cover the amount due and unpaid until the former owner
    produces a receipt from the tax commissioner showing that the amounts are paid
    or a certificate indicating that no taxes are due. If a purchaser fails to withhold
    purchase money, that person is personally liable up to the purchase money amount,
    for such amounts that are unpaid during the operation of the business by the former
    owner.

    The commissioner may adopt rules regarding the issuance of certificates under
    this section, including the waiver of the need for a certificate if certain criteria
    are met.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5736.10
- number: '5736.11'
  heading: Action by attorney general
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5736'
    name: Motor Fuel Supplier Tax
  text: If any person subject to this chapter fails to report or pay the tax as required
    under this chapter, or fails to pay any penalty imposed under this chapter within
    ninety days after the time prescribed for payment of the penalty, the attorney
    general, on the request of the tax commissioner, shall commence an action in quo
    warranto in the court of appeals of the county in which the person has its principal
    place of business to forfeit and annul its privileges or franchise within this
    state. If the court finds that the person is in default for the amount claimed,
    it shall render judgment revoking the person's privileges or franchise within
    this state and shall otherwise proceed as provided in Chapter 2733. of the Revised
    Code.
  history: null
