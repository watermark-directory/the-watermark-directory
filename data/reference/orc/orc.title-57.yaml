    to a tax credit certificate issued under section 122.09 of the Revised Code. The
    credit shall equal the dollar amount indicated on the certificate. The credit
    shall be claimed in the calendar year specified in the certificate or the ensuing
    calendar year and in the order required under section 5725.98 of the Revised Code.
    If the credit exceeds the amount of tax otherwise due in that year, the company
    may carry forward the excess for not more than five ensuing years, but the amount
    of the excess credit claimed against the tax for any year shall be deducted from
    the balance carried forward to the next year.

    No credit shall be claimed under this section to the extent the certificate was
    used to claim a credit under section 5726.62, 5729.18, or 5747.87 of the Revised
    Code.'
