  url: https://codes.ohio.gov/ohio-revised-code/section-5749.08
- number: '5749.09'
  heading: Deducting taxpayer's indebtedness to state from refund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5749'
    name: Severance Tax
  text: If any person who is entitled to a refund under section 5749.08 of the Revised
    Code is indebted to the state for any tax, the balance allowable on, the refund
    application shall be applied in satisfaction of the amount due the state. If the
    amount refundable is less than the amount due the state, it shall be applied in
    partial satisfaction of the amount due the state.
