- number: '5747.031'
  heading: Separate reporting of business and nonbusiness income tax revenues
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: 'For annual returns filed for taxable years beginning on or after January
    1, 2017, the department of taxation shall determine and provide to the office
    of budget and management a report of the tax liability, before the application
    of any credits, under section 5747.02 of the Revised Code that arises from taxable
    business income, the tax liability, before the application of any credits, that
    arises from income, other than taxable business income, as measured and taxed
    under divisions(A)(1), (2), or (3) of that section, and the total amount of credits
    claimed against the tax levied under that section.

    In providing actual and estimates of revenue pursuant to Chapter 126. of the Revised
    Code, the office of budget and management shall separately list the tax liability,
    before the application of any credits, under section 5747.02 of the Revised Code
    that arises from taxable business income, the tax liability, before the application
    of any credits, that arises from income, other than taxable business income, as
    measured and taxed under divisions (A)(1), (2), or (3) of that section, and the
    total amount of credits claimed against the tax levied under that section.'
