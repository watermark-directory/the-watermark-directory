- number: '5747.15'
  heading: Failure to file or remit tax - filing frivolous, dilatory or fraudulent
    claim
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: '(A) In addition to any other penalty imposed by this chapter or Chapter 5703.
    of the Revised Code, the following penalties shall apply:

    (1) If a taxpayer, a qualifying entity, an electing pass-through entity, or an
    employer required to file any report or return, including an informational notice,
    report, or return, under this chapter fails to make and file the report or return
    within the time prescribed, including any extensions of time granted by the tax
    commissioner, a penalty may be imposed not exceeding the greater of fifty dollars
    per month or fraction of a month, not to exceed five hundred dollars, or five
    per cent per month or fraction of a month, not to exceed fifty per cent, of the
    sum of the taxes required to be shown on the report or return, for each month
    or fraction of a month elapsing between the due date, including extensions of
    the due date, and the date on which filed.

    (2) If a taxpayer fails to pay any amount of tax required to be paid under section
    5733.41 or Chapters 5747. or 5748. of the Revised Code, except estimated tax under
    section 5747.09 or 5747.43 of the Revised Code, by the dates prescribed for payment,
    a penalty may be imposed not exceeding twice the applicable interest charged under
    division (G) of section 5747.08 of the Revised Code for the delinquent payment.

    (3)(a) If an employer fails to pay any amount of tax imposed by section 5747.02
    of the Revised Code and required to be paid under this chapter by the dates prescribed
    for payment, a penalty may be imposed not exceeding the sum of ten per cent of
    the delinquent payment plus twice the interest charged under division (F)(5) of
    section 5747.07 of the Revised Code for the delinquent payment.

    (b) If a qualifying entity or an electing pass-through entity fails to pay any
    amount of tax imposed by section 5733.41, 5747.38, or 5747.41 of the Revised Code
    and required to be paid under this chapter by the dates prescribed for payment,
    a penalty may be imposed not exceeding the sum of ten per cent of the delinquent
    payment plus twice the applicable interest charged under division (G) of section
    5747.08 of the Revised Code for the delinquent payment.

    (4)(a) If an employer withholds from employees the tax imposed by section 5747.02
    of the Revised Code and fails to remit the tax withheld to the state as required
    by this chapter on or before the dates prescribed for payment, a penalty may be
    imposed not exceeding fifty per cent of the delinquent payment.

    (b) If a qualifying entity withholds any amount of tax imposed under section 5747.41
    of the Revised Code from an individual''s qualifying amount and fails to remit
    that amount to the state as required by sections 5747.42 to 5747.453 of the Revised
    Code on or before the dates prescribed for payment, a penalty may be imposed not
    exceeding fifty per cent of the delinquent payment.

    (5) If a taxpayer, a qualifying entity, an electing pass-through entity, or an
    employer files what purports to be a return required by this chapter that does
    not contain information upon which the substantial correctness of the return may
    be judged or contains information that on its face indicates that the return is
    substantially incorrect, and the filing of the return in that manner is due to
    a position that is frivolous or a desire that is apparent from the return to delay
    or impede the administration of the tax levied by section 5733.41, 5747.02, 5747.38,
    or 5747.41, or Chapter 5748. of the Revised Code, a penalty of up to five hundred
    dollars may be imposed.

    (6) If a taxpayer, a qualifying entity, or an electing pass-through entity makes
    a fraudulent attempt to evade the reporting or payment of the tax required to
    be shown on any return required under this chapter, a penalty may be imposed not
    exceeding the greater of one thousand dollars or one hundred per cent of the tax
    required to be shown on the return.

    (7) If any person makes a false or fraudulent claim for a refund under this chapter,
    a penalty may be imposed not exceeding the greater of one thousand dollars or
    one hundred per cent of the claim. The penalty imposed under division (A)(7) of
    this section, any refund issued on the claim, and interest on any refund from
    the date of the refund, may be assessed under section 5747.13 of the Revised Code
    as tax, penalty, or interest imposed under section 5733.41, 5747.02, 5747.38,
    or 5747.41 of the Revised Code, without regard to whether the person making the
    claim is otherwise subject to the provisions of this chapter or Chapter 5733.
    of the Revised Code, and without regard to any time limitation for the assessment
    imposed by division (A) of section 5747.13 of the Revised Code.

    (B) For purposes of this section, the taxes required to be shown on the return
    shall be reduced by the amount of any part of the taxes paid on or before the
    date, including any extensions of the date, prescribed for filing the return.

    (C) Any penalty imposed under this section shall be in addition to all other penalties
    imposed under this section. All or part of any penalty imposed under this section
    may be abated by the commissioner. All or part of any penalty imposed under this
    section may be abated by the commissioner if the taxpayer, qualifying entity,
    electing pass-through entity, or employer shows that the failure to comply with
    the provisions of this chapter is due to reasonable cause and not willful neglect.'
