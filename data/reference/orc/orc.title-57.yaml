- number: '5731.10'
  heading: Value of gross estate includes joint and survivorship property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) The value of the gross estate shall include the value of all property,
    to the extent of the interest therein held by the decedent and any person jointly,
    so that upon the death of one of them, the survivor has or the survivors have
    a right to the immediate ownership or possession or enjoyment of the whole property,
    except such part thereof as may be shown to have originally belonged to such other
    person or persons and never to have been received or acquired by the latter from
    the decedent for less than an adequate and full consideration in money or money''s
    worth.

    (B) When the person holding property jointly are a husband and wife, the amount
    includible in the gross estate shall be one-half the value of said property. When
    the property has been acquired by gift, bequest, devise, or inheritance by the
    decedent and any other person or persons as joint owners and their interests are
    not otherwise specified or fixed by law, the amount includible in the gross estate
    shall be the value of a fractional part of said property determined by dividing
    the value of the property by the number of joint owners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.10
- number: '5731.11'
  heading: Value of gross estate includes interests subject to general power of appointment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) The value of the gross estate shall include the value of all property,
    to the extent of any interest with respect to which the decedent has on the date
    of the decedent''s death a general power of appointment, or with respect to which
    the decedent has at any time exercised or released such a power of appointment
    by a disposition which is of such nature that if it were a transfer of property
    owned by the decedent, such property would be includible in the decedent''s gross
    estate under sections 5731.05 to 5731.08, inclusive, of the Revised Code. A disclaimer
    or renunciation of such power of appointment shall not be deemed an exercise or
    a release of such power.

    (B) For purposes of this section, "general power of appointment" means a power
    which is exercisable in favor of the decedent, his estate, his creditors, or the
    creditors of his estate.

    (C) For the purposes of this section, if a general power of appointment created
    on or before October 21, 1942, has been partially or completely released so that
    it is no longer a general power of appointment, any such release of such power
    is neither the release nor the exercise of a general power of appointment if such
    release occurred before November 1, 1951, or the donee of such power was under
    a legal disability to release such power on October 21, 1942, and such release
    occurred not later than six months after the termination of such legal disability.'
