    maximum share allowable to county_____18. After any adjustments necessary to comply
    with statutory minimum share allowable to townships_____19. After any adjustments
    necessary to comply with minimum guarantee in division (I) of section 5747.51
    of the Revised Code_____20. Proportionate share of subdivision (line 16, 17, 18,
    or 19, whichever is appropriate)_____'
