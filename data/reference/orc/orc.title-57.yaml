- number: '5723.19'
  heading: Issuance of deed when certificate lost
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: If a certificate issued to a purchaser of lands sold at a county auditor's
    sale has been mislaid, destroyed, or lost, and that fact is shown to the auditor,
    and no deed is executed therefor, the auditor being fully satisfied from evidence
    of the existence and loss of such certificate, on application for that purpose,
    shall make and execute to such purchaser a good and sufficient deed of conveyance
    for such tract of land. Such deed shall be valid to all intents and purposes as
    if such certificate had not been mislaid, destroyed, or lost.
