- number: '5715.16'
  heading: County board of revision to make necessary corrections in assessments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: 'On the second Monday of May, annually, the county auditor shall lay before
    the county board of revision and the tax commissioner the returns of the auditor''s
    assessment of real property for the current year, and such board shall forthwith
    proceed to revise the assessment and returns of such real property. If the board
    finds that any tract, lot, or parcel of land, or any buildings, structures, or
    improvements thereon, or any minerals therein, or rights thereto have been improperly
    listed either as to the name of the owner or the description or quantity thereof,
    or have been incorrectly valued, or have been omitted and not yet valued, it shall
    make the necessary corrections and give to each such incorrectly valued or omitted
    tract, lot, or parcel of land, or any buildings, structures, or improvements thereon,
    or any minerals therein or rights thereto, their corrected taxable value.

    The auditor shall not make up the auditor''s tax list and duplicate nor advertise
    as provided in section 5715.17 of the Revised Code until the board has completed
    its work under this section and returned to the auditor all the returns laid before
    it with the revisions thereof.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.16
- number: '5715.17'
  heading: Notice that work of equalization completed - county auditor to furnish
    certificates and notice
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: 'When the county board of revision has completed its work of equalization
    and transmitted the returns to the county auditor, the auditor shall give notice
    by advertising in a newspaper of general circulation throughout the county that
    the tax returns for the current year have been revised and the valuations have
    been completed and are open for public inspection in the auditor''s office, and
    that complaints against any valuation or assessment, except the valuations fixed
    and assessments made by the department of taxation, will be heard by the board,
    stating in the notice the time and place of the meeting of the board. The advertisement
    shall be inserted in a conspicuous place in the newspaper and be published once
    per week for two consecutive weeks or as provided in section 7.16 of the Revised
    Code.

    The auditor shall, upon request, furnish to any person a certificate setting forth
    the assessment and valuation of any tract, lot, or parcel of real estate or any
    specific personal property, and mail the same when requested to do so upon receipt
    of sufficient postage.

    The auditor shall furnish notice to boards of education of school districts within
    the county of all hearings, and the results of such hearings, held in regard to
    the reduction or increasing of tax valuations in excess of one hundred thousand
    dollars directly affecting the revenue of such district.'
