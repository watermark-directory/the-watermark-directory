- number: '5725.12'
  heading: Failure to make return - false statement - forfeiture
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: An officer, manager, or owner of a financial institution who fails to make
    out and furnish to the tax commissioner the return required by section 5725.02
    of the Revised Code, or willfully makes a false statement in such return shall
    forfeit not more than one hundred dollars, together with the costs and other expenses
    incurred by the commissioner in obtaining such statement.
