- number: '5715.44'
  heading: Prosecuting attorney is legal adviser in matters of taxation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The prosecuting attorney shall be the legal adviser of the county auditor
    in all matters relating to property taxation and shall prosecute and defend all
    actions and proceedings in any court in connection therewith to which the auditor
    or the county board of revision is a party, and in all respects act as the attorney
    of the auditor or the board. The prosecuting attorney shall, upon the request
    of the auditor or board, appear in any investigation or examination which either
    of them may make in such matters and examine the witnesses and aid the auditor
    or board in any other manner in such investigation or examination. The attorney
    general, on the request of the tax commissioner, shall assist the prosecuting
    attorney in the performance of any duties required of him by this section.
  history: null
