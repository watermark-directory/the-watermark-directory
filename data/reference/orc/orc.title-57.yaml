  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.51
- number: '5727.53'
  heading: Action to recover taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: The taxes, fees, and penalties provided by this chapter that are remitted
    to the tax commissioner may be recovered by an action brought in the name of the
    state in the court of common pleas of Franklin county, or of any county in which
    such public utility is doing business, or in which the line of any railroad company
    is located, and such court of common pleas shall have jurisdiction of the action
    regardless of the amount involved. The attorney general, on request of the tax
    commissioner, shall institute such action in the court of common pleas of Franklin
    county or of any of such counties the commissioner directs. Sums recovered in
    any such action shall be paid into the state treasury in the same manner as the
    tax.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.53
- number: '5727.54'
  heading: Cancellation of articles of incorporation or certificate of authority for
    failure to report or pay taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: If a corporation, wherever organized, required by law to file any report or
    return or to pay any tax or fee as a public utility fails to make such report
    or return or to pay any such tax or fee for ninety days after the time prescribed
    by law for making such report or return or paying such tax or fee, the tax commissioner
    shall certify such fact to the secretary of state. The secretary of state shall
    thereupon cancel the articles of incorporation of any such public utility which
    is organized under the laws of this state by appropriate entry upon the margin
    of the record thereof, or cancel by proper entry the certificate of authority
    of any such foreign public utility to do business in this state. Thereupon all
    the powers, privileges, and franchises conferred upon such public utility by such
    articles of incorporation or by such certificate of authority shall cease, subject
    to section 1701.88 of the Revised Code. The secretary of state shall immediately
    notify such domestic or foreign public utility of the action taken by him, and
    shall also forward for filing a certificate of the action so taken to the county
    recorder of the county in which the principal place of business of the public
    utility in this state is located, for which filing no fee shall be charged.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.54
- number: '5727.55'
  heading: Prohibition against doing business after cancellation of articles or certificate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: No person shall exercise or attempt to exercise any powers, privileges, or
    franchises under articles of incorporation or certificate of authority after the
    same is canceled, as provided by section 5727.54 of the Revised Code, for failure
    to make a report or return or to pay any tax or fee.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.55
- number: '5727.56'
  heading: Reinstatement of public utility - conditions - designation of agent
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'Any public utility whose articles of incorporation or license certificate
    to do or transact business in this state has expired or has been canceled or revoked
    by the secretary of state, as provided by law for failure to make any report or
    return or to pay any tax or fee, upon payment to the secretary of state of any
    additional fees and penalties required to be paid to the secretary of state, and
    upon the filing with the secretary of state of a certificate from the tax commissioner
    that it has complied with all the requirements of law as to franchise or excise
    tax reports and paid all franchise or excise taxes, fees, or penalties due thereon
    for every year of its delinquency, and upon the payment to the secretary of state
    of an additional fee of ten dollars, shall be reinstated and again entitled to
    exercise its rights, privileges, and franchises in this state, and the secretary
    of state shall cancel the entry of cancellation or expiration to exercise its
    rights, privileges, and franchises. If the reinstatement is not made within one
    year from the date of the cancellation of its articles of incorporation or date
    of the cancellation or expiration of its license to do business, and it appears
    that articles of incorporation or license certificate have been issued to a corporation
    of the same or similar name, the applicant for reinstatement shall be required
    by the secretary of state, as a condition prerequisite to such reinstatement,
    to amend its articles by changing its name. A certificate of reinstatement may
    be filed in the county recorder''s office of any county in the state, for which
    the recorder shall charge and collect a base fee of three dollars for services
    and a housing trust fund fee of three dollars pursuant to section 317.36 of the
    Revised Code.

    If a domestic public utility applying for reinstatement has not previously designated
    an agent upon whom process may be served as required by section 1701.07 of the
    Revised Code, such public utility shall at the time of reinstatement and as a
    prerequisite thereto designate an agent in accordance with such section.

    Any officer, shareholder, creditor, or receiver of any such public utility may
    at any time take all steps required by this section to effect such reinstatement,
    and in such case the designation of an agent upon whom process may be served shall
    not be a prerequisite to the reinstatement of the public utility.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.56
- number: '5727.57'
  heading: Petition for judgment for taxes - injunction - procedure - evidence
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'In addition to all other remedies for the collection of any taxes or penalties
    due under law, whenever any taxes, fees, or penalties due from any public utility
    have remained unpaid for a period of ninety days, or whenever any public utility
    has failed for a period of ninety days to make any report or return required by
    law, or to pay any penalty for failure to make or file such report or return,
    the attorney general, upon the request of the tax commissioner, shall file a petition
    in the court of common pleas in the county of the state in which such public utility
    has its principal place of business for a judgment for the amount of the taxes
    and penalties appearing to be due, the enforcement of any lien in favor of the
    state, and an injunction to restrain such public utility and its officers, directors,
    and managing agents from the transaction of any business within this state, other
    than such acts as are incidental to liquidation or winding up, until the payment
    of such taxes, fees, penalties, and the costs of the proceeding, which shall be
    fixed by the court, or the making and filing of such report or return.

    Such petition shall be in the name of the state. All or any of the public utilities
    having their principal places of business in the county may be joined in one suit.
    On the motion of the attorney general, the court of common pleas shall enter an
    order requiring all defendants to answer by a day certain, and may appoint a special
    master commissioner to take testimony, with such other power and authority as
    the court confers, and permit process to be served by certified mail and by publication
    in a newspaper of general circulation in the county, which publication need not
    be made more than once, setting forth the name of each delinquent public utility,
    the matter in which such public utility is delinquent, the names of its officers,
    directors, and managing agents, if set forth in the petition, and the amount of
    any taxes, fees, or penalties claimed to be owing by said public utility.

    All of the officers, directors, shareholders, or managing agents of any public
    utility may be joined as defendants with such public utility.

    If it appears to the court upon hearing that any public utility which is a party
    to such proceeding is indebted to the state for taxes, fees, or penalties, judgment
    shall be entered therefor with interest, which shall be computed at the rate per
    annum prescribed by section 5703.47 of the Revised Code; and if it appears that
    any public utility has failed to make or file any report or return, a mandatory
    injunction may be issued against such public utility, its officers, directors,
    and managing agents, as such enjoining them from the transaction of any business
    within this state, other than acts incidental to liquidation or winding up, until
    the making and filing of all proper reports or returns and the payment in full
    of all taxes, fees, and penalties.

    If the officers, directors, shareholders, or managing agents of a public utility
    are not made parties in the first instance, and a judgment or an injunction is
    rendered or issued against such public utility, such officers, directors, shareholders,
    or managing agents, or any of them, may be made parties to such proceedings upon
    the motion of the attorney general, and, upon notice to them of the form and terms
    of such injunction, they shall be bound thereby as fully as if they had been made
    parties in the first instance.

    In any action authorized by this section, a statement of the commissioner or the
    secretary of state, when duly certified shall be prima-facie evidence of the amount
    of taxes, fees, or penalties due from any public utility, or of the failure of
    any public utility to file with the commissioner or the secretary of state any
    report required by law, and any such certificate of the commissioner or the secretary
    of state may be required in evidence in any such proceeding.

    On the application of any defendant and for good cause shown, the court may order
    a separate hearing of the issues as to any defendant.

    The costs of the proceeding shall be apportioned among the parties as the court
    deems proper.

    The court in such proceeding may make, enter, and enforce such other judgments
    and orders and grant such other relief as is necessary or incidental to the enforcement
    of the claims and lien of the state.

    In the performance of the duties enjoined by this section the attorney general
    may direct any prosecuting attorney to bring an action, as authorized by this
    section, in the name of the state with respect to any delinquent public utilities
    within the prosecuting attorney''s county, and like proceedings and orders shall
    be had as if such action were instituted by the attorney general.'
