- number: '5723.14'
  heading: Sale void if taxes are paid
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: The sale of any tract or lot of land under sections 5723.01 to 5723.19, inclusive,
    of the Revised Code, on which the taxes and assessments have been regularly paid
    previous to such sale, is void, and the purchaser, his heirs, or assigns, on producing
    the certificate of sale to the county auditor shall have his money refunded from
    the county treasury.
