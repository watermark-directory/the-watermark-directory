    improvement, and for gas, water, sewer, and electric public utilities, from all
    other sources except those from additional taxes or service charges voted by electorate
    as defined in division (E)(4) of section 5747.51 of the Revised Code, and except
    revenue from special assessment and revenue bond collections_____13. Total_____Calculation
    of subdivision share 14. Relative need of subdivision (line 3 less line 13)_____15.
    Relative need factor for county (total estimate of undivided local government
