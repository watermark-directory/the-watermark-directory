- number: '5705.2111'
  heading: Proposal for levy in excess of limitation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) If the board of directors of a regional student education district created
    under section 3313.83 of the Revised Code desires to levy a tax in excess of the
    ten-mill limitation throughout the district for the purpose of funding the services
    to be provided by the district to students enrolled in the school districts of
    which the district is composed and their immediate family members, the board shall
    propose the levy to each of the boards of education of those school districts.
    The proposal shall specify the rate or amount of the tax, the number of years
    the tax will be levied or that it will be levied for a continuing period of time,
    and that the aggregate rate of the tax shall not exceed three mills per dollar
    of taxable value in the regional student education district.

    (B)(1) If a majority of the boards of education of the school districts of which
    the regional student education district is composed approves the proposal for
    the tax levy, the board of directors of the regional student education district
    may adopt a resolution approved by a majority of the board''s full membership
    declaring the necessity of levying the proposed tax in excess of the ten-mill
    limitation throughout the district for the purpose of funding the services to
    be provided by the district to students enrolled in the school districts of which
    the district is composed and their immediate family members. The resolution shall
    provide for the question of the tax to be submitted to the electors of the district
    at a general, primary, or special election on a day to be specified in the resolution
    that is consistent with the requirements of section 3501.01 of the Revised Code
    and that occurs at least ninety days after the resolution is certified to the
    board of elections. The resolution shall specify the rate or amount of the tax
    and the number of years the tax will be levied or that the tax will be levied
    for a continuing period of time. The aggregate rate of tax levied by a regional
    student education district under this section at any time shall not exceed three
    mills per dollar of taxable value in the district. A tax levied under this section
    may be renewed subject to section 5705.25 of the Revised Code.

    (2) The resolution shall take effect immediately upon passage, and no publication
    of the resolution is necessary other than that provided in the notice of election.
    The resolution shall be certified and submitted in the manner provided under section
    5705.25 of the Revised Code, and that section governs the arrangements governing
    submission of the question and other matters concerning the election.'
