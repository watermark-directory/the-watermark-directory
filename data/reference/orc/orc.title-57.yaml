- number: '5703.92'
  heading: Exercising powers after articles of incorporation or certificate of authority
    canceled; penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: No person shall exercise or attempt to exercise any powers, privileges, or
    franchises under the articles of incorporation or certificate of authority of
    a corporation after the articles or certificate has been canceled as provided
    in section 5703.91 of the Revised Code. A penalty of one hundred dollars shall
    be imposed for each day a violation of this section occurs, up to a maximum of
    five thousand dollars.
