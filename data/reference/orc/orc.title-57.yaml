  text: If the tax commissioner increases or decreases the aggregate value of the
    real property or any class thereof on the tax list or agricultural land tax list
    in any taxing district or subdivision of the state under section 5715.24 of the
    Revised Code, he shall transmit to each county auditor a statement which specifies
