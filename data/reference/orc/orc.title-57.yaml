- number: '5743.31'
  heading: Cigarette use and storage tax definitions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: 'As used in sections 5743.31 to 5743.35, inclusive, of the Revised Code:

    (A) "Person" includes individuals, firms, partnerships, associations, joint stock
    companies, corporations, and combinations of individuals of whatever form.

    (B) "Storage" includes any keeping or retention of cigarettes for use or consumption
    in this state.

    (C) "Use" includes the exercise of any right or power incidental to the ownership
    of cigarettes.

    (D) "Consumer" means any person who has title to, or possession of, cigarettes
    in storage, for use or other consumption in this state.'
