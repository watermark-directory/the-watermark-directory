- number: '5715.012'
  heading: Sales assessment ratio studies
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: 'The tax commissioner shall make sales-assessment ratio studies of sales and
    assessments of real property for the purpose of determining the common level of
    assessment of real property within the counties pursuant to section 5715.19 of
    the Revised Code and for the purpose of equalization. Such studies shall be based
    solely on a representative sampling of sales provided to the commissioner by the
    county auditor. That sample shall include only open market arms'' length sales
    occurring during the three years prior to the tax year to which the sample is
    applied between a willing seller to a willing buyer for a current like use within
    the class or classes of real property sampled. Where there are not sufficient
    arms'' length sales to constitute a representative sampling for such studies within
    a class, the auditor may also conduct appraisals of real property in that class,
    which shall be a part of such studies.

    Such studies and other information of the commissioner may be used by the commissioner
    as guidelines, where applicable, in the equalization of a class or classes of
    real property. Such studies or other information of the commissioner shall not
    be applied by the commissioner on a taxing district, countywide, or statewide
    basis for the purpose of equalization unless the auditor first finds there are
    sufficient arms'' length sales for a like use included in the sample in a class,
    or arms'' length sales and appraisals conducted by the auditor for a like use
    included in the sample in a class, to provide an indication that said sales or
    sales and appraisals in the class are representative of all parcels in the class.

    In addition, the commissioner shall make other studies of the value of real property
    within the counties which may be used as guidelines, where applicable, in the
    equalization of a class or classes of real property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.012
- number: '5715.02'
  heading: Members of county board of revision - hearing board - quorum - power to
    administer oaths
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: 'The county treasurer, county auditor, and a member of the board of county
    commissioners selected by the board of county commissioners shall constitute the
    county board of revision, or they may provide for one or more hearing boards when
    they deem the creation of such to be necessary to the expeditious hearing of valuation
    complaints. Each such official may appoint one qualified employee from the official''s
    office to serve in the official''s place and stead on each such board for the
    purpose of hearing complaints as to the value of real property only, each such
    hearing board has the same authority to hear and decide complaints and sign the
    journal as the board of revision, and shall proceed in the manner provided for
    the board of revision by sections 5715.08 to 5715.20 of the Revised Code. Any
    decision by a hearing board shall be the decision of the board of revision.

    A majority of a county board of revision or hearing board shall constitute a quorum
    to hear and determine any complaint, and any vacancy shall not impair the right
    of the remaining members of such board, whether elected officials or appointees,
    to exercise all the powers thereof so long as a majority remains.

    Each member of a county board of revision or hearing board may administer oaths.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.02
- number: '5715.03'
  heading: Payment of compensation and expenses
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The compensation of the experts, clerks, and other employees of the county
    boards of revision shall be paid monthly upon the certificate of the county auditor
    or board. The contingent expenses of the auditor and board, including postage
    and express charges, their actual and necessary traveling expenses, and those
    of their deputies, experts, clerks, or employees on official business outside
    of the county, when required by orders issued by the department of taxation, shall
    be allowed and paid as are other claims against the county. The compensation and
    expenses may be paid from the real estate assessment fund pursuant to section
    325.31 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.03
- number: '5715.04'
  heading: Office hours - conditions of employment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: County boards of revision shall, during the time fixed for their sessions,
    keep their offices open during the business hours on each business day, and their
    experts, clerks, and other employees shall devote their entire time to their respective
    duties during their term of office or period of service or employment; provided
    that boards may, with the approval of the tax commissioner, employ experts, clerks,
    or other employees with the understanding that such employed persons shall devote
    only a part of their entire time to their respective employments.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.04
- number: '5715.05'
  heading: Offices, equipment, and supplies
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The board of county commissioners shall furnish to the county board of revision
    and its experts, clerks, and employees suitable office rooms at the county seat,
    and shall furnish the county auditor for his own office and the county board of
    revision all maps, plats, stationery, blank forms, books, supplies, furniture,
    and other equipment necessary for the proper discharge of their duties and the
    preservation of their books, records, and files. The maps, plats, stationery,
    blank forms, and other supplies and equipment used by the auditor shall, so far
    as practicable, be used also by the county board of revision.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.05
- number: '5715.06'
  heading: Number of experts - compensation - civil service
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: 'Each county board of revision shall appoint the number of experts, clerks,
    and employees that is prescribed for it by the tax commissioner. Such experts,
    clerks, and employees shall hold their employment for the time that is prescribed
    by the commissioner. The compensation of such experts, clerks, and employees shall
    be fixed by the board of county commissioners.

    No expert, assistant, clerk, employee, or assistant assessor shall be subject
    to any civil service law or regulation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.06
- number: '5715.07'
  heading: Public inspection of documents relating to assessments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: All files, statements, returns, reports, papers, or documents of any kind
    relating to the assessment of real property which are in the office of a county
    auditor or county board of revision or in the official custody or possession of
    such officer or board shall be open to public inspection.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.07
- number: '5715.08'
  heading: Minutes of meetings - preservation of minutes and evidence
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The county board of revision shall take full minutes of all evidence given
    before the board, and it may cause the same to be taken in shorthand and extended
    in typewritten form. The secretary of the board shall preserve in his office separate
    records of all minutes and documentary evidence offered on each complaint.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.08
- number: '5715.09'
  heading: Organization of county board of revision - meetings - record
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: Each county board of revision shall organize annually on the second Monday
    in January by the election of a chairman for the ensuing year. The county auditor
    shall be the secretary of the board. He shall call the board together as often
    as necessary during any year, keep an accurate record of the proceedings of the
    board in a book kept for the purpose, and perform such other duties as are incidental
    to the position.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.09
- number: '5715.10'
  heading: Valuation of real property - county board of revision may summon and examine
    persons as to property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: 'The county board of revision shall be governed by the laws concerning the
    valuation of real property and shall make no change of any valuation except in
    accordance with such laws.

    The board may call persons before it and examine them under oath as to their own
    or another''s real property to be placed on the tax list and duplicate for taxation,
    or the value thereof. If a person notified to appear before the board refuses
    or neglects to appear at the time required, or appearing, refuses to be sworn
    or answer any question put to him by the board or by its order, the chairman of
    the board shall make a complaint thereof in writing to the probate judge of the
    county, who shall proceed against such person in the same manner as provided in
    section 5711.37 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.10
- number: '5715.11'
  heading: Duty of county board of revision to hear complaints
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The county board of revision shall hear complaints relating to the valuation
    or assessment of real property as the same appears upon the tax duplicate of the
    then current year. The board shall investigate all such complaints and may increase
    or decrease any such valuation or correct any assessment complained of, or it
    may order a reassessment by the original assessing officer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.11
- number: '5715.12'
  heading: Duty to give notice before increasing valuation - service
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The county board of revision shall not increase any valuation without giving
    notice to the person in whose name the property affected thereby is listed and
    affording him an opportunity to be heard. Such notice shall describe the real
    property, the tax value of which is to be acted upon, by the description thereof
    as carried on the tax list of the current year, and shall state the name in which
    it is listed; such notice shall be served by delivering a copy thereof to the
    person interested, by leaving a copy at the usual place of residence or business
    of such person, or by sending the same by registered letter mailed to the address
    of such person. If no such place of residence or business is found in the county,
    then such copies shall be delivered or mailed to the agent in charge of such property.
    If no such agent is found in the county, such notice shall be served by an advertisement
    thereof inserted once in a newspaper of general circulation in the county in which
    the property is situated. Notices to the respective persons interested in different
    properties may be united in one advertisement under the same general heading.
    Notices served in accordance with this section shall be sufficient.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.12
- number: '5715.13'
  heading: Application for decrease in valuation; electronic complaint and application
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: '(A) Except as provided in division (B) of this section, the county board
    of revision shall not decrease any valuation unless a party affected thereby or
    who is authorized to file a complaint under section 5715.19 of the Revised Code
    makes and files with the board a written application therefor, verified by oath
    and signature, showing the facts upon which it is claimed such decrease should
    be made.

    (B) The county board of revision may authorize a policy for the filing of an electronic
    complaint under section 5715.19 of the Revised Code and the filing of an electronic
    application therefor under this section, subject to the approval of the tax commissioner.
    An electronic complaint need not be sworn to, but shall contain an electronic
    verification and shall be subscribed to by the person filing the complaint: "I
    declare under penalties of perjury that this complaint has been examined by me
    and to the best of my knowledge and belief is true, correct, and complete."'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.13
- number: '5715.14'
  heading: Action certified to auditor - correction of tax lists
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The county board of revision shall certify its action to the county auditor,
    who shall correct the tax list and duplicate according to the deductions and additions
    ordered by the board in the manner provided by law for making corrections thereof.
    If the tax duplicate has been delivered to the county treasurer, the auditor shall
    certify such corrections to the treasurer, who shall enter such corrections on
    his tax duplicate.
