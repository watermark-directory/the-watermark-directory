- number: '5705.33'
  heading: Reduction of operating levy
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: In the case of any subdivision which issued refunding bonds as provided in
    volume 116, Part 2, Ohio Laws, page 57, sections 1 to 14, inclusive, whereby such
    subdivision has reduced the amount of the levy required to service its debt charges,
    the budget commission shall not, when acting under section 5705.32 of the Revised
    Code, reduce the operating levy of such subdivision below the amount which such
    subdivision has reduced its debt levy.
