- number: '5705.198'
  heading: Tax levy by joint recreation district
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: The taxing authority of a joint recreation district may levy a tax approved
    by the electors for the purpose stated in division (H) of section 5705.19 of the
    Revised Code and for a continuing period of time, and in accordance with that
    section. After the approval at any time of a levy for that purpose by vote, the
    taxing authority of a joint recreation district may anticipate a fraction of the
    proceeds of that levy and, from time to time during the life of the levy, issue
    anticipation notes. The aggregate principal payments on all such anticipation
    notes to be made in any calendar year shall not exceed fifty per cent of the anticipated
    proceeds from the levy for that year, and no anticipation note shall mature later
    than the thirty-first day of December of the fifth calendar year following the
    calendar year in which that note is issued. Such notes shall be issued as provided
    in section 133.24 of the Revised Code.
