- number: '5705.60'
  heading: Fixed-sum levy rate adjustment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) As used in this section, "qualifying fixed-sum levy" means a tax levied
    on property at whatever rate is required to produce a specified amount of tax
    money, including a tax levied under section 5705.199 of the Revised Code, but
    not including a tax levied in excess of the ten-mill limitation to pay debt charges.

    (B) Each year, the tax commissioner shall determine by what amount, if any, the
    rate of a qualifying fixed sum levy must be changed for the levy to produce the
    levy''s specified amount of money for the current tax year. The tax commissioner
    shall certify the amount determined for each fixed-sum levy to the appropriate
    county auditor by the first day of September.

    (C) Each county auditor to whom a rate change is certified under division (B)
    of this section shall apply the adjusted rate for the current tax year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.60
- number: '5705.61'
  heading: Tax on use, lease or occupancy of public real property not used for public
    purpose
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'As used in this section:

    (A) "Effective tax rate" means that quotient obtained by dividing the taxes charged
    and payable on one thousand dollars of taxable value of real property, after making
    the reduction required by section 319.301 of the Revised Code, by one thousand.

    (B) "Taxable value of the interest" means the amount obtained as follows:

    (1) Divide the true value of the property in which the interest is held by the
    term of years for which the interest is held. In the case of a life estate, the
    term of years shall be calculated on the basis of standard actuarial tables.

    (2) Multiply the quotient obtained in division (B)(1) of this section by the number
    of years remaining in the term.

    (3) Multiply the result obtained in division (B)(2) of this section by thirty-five
    per cent.

    Any interest whereby a privilege exists to use, lease, or occupy real property
    not otherwise subject to taxation and belonging to the state, a political subdivision,
    or the United States by virtue of a conveyance from the holder of the interest
    and used, leased, or occupied for other than a public purpose, or other than incidental
    to a public purpose, as defined under sections 717.051, 725.02, 1728.10, 3735.67,
    5709.08, 5709.121, 5709.41, and 5722.11 of the Revised Code, or by other statute,
    is subject to an annual tax, payable by the holder of the interest, for the privilege
    of so using, leasing, or occupying such property. Such tax is for the purpose
    of supplementing the general revenue funds of the taxing districts in which the
    real property is located. The tax imposed by this section does not apply to any
    interest whereby a contractor or agent has the privilege of using, leasing, or
    occupying the real property for the purpose of fulfilling an obligation imposed
    subsequent to the conveyance under a contract with the state, a political subdivision,
    the United States, or an instrumentality of the state, a political subdivision,
    or the United States.

    The year for which the tax is levied commences on the first day of January and
    ends on the following thirty-first day of December. The tax shall be assessed
    by the county auditor of the county containing the taxing districts wherein the
    real property is located and computed by multiplying the taxable value of the
    interest therein by the effective tax rate of each taxing district in which the
    real property is located. The tax shall equal the sum of the products thus obtained.

    Easements, grants, licenses, or rights-of-way of public utility companies are
    not subject to this section.

    The amount of taxes due under this section shall be reduced by the amount of any
    payment in lieu of real property taxes made by the owner of the property in which
    the taxable interest is held.

    An interest in real property whereby a person sixty-four years of age or older
    on the first day of January of the tax year retains the privilege to occupy such
    property as his homestead shall be exempt from the tax imposed by this section
    for such year. An owner includes one or more tenants with a right of survivorship
    and tenants in common.'
