- number: '5728.11'
  heading: Suspending permit
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5728'
    name: Fuel Use Tax
  text: '(A) Sixty days after service of an assessment under section 5728.10 of the
    Revised Code, or when the tax commissioner files a certified copy of an entry
    making an assessment as provided in that section, the commissioner shall suspend
    all fuel use permits issued to the person against whom the assessment was made,
    provided that no fuel use permit shall be suspended while an appeal is pending,
    except in those cases in which no return has been filed, or where it is alleged
    a fraudulent return has been filed.

    Upon suspension of a fuel use permit, the commissioner may require that the permit
    holder surrender to the commissioner the permit and identification device.

    Upon payment in full of the assessment and interest, the commissioner shall immediately
    reinstate all fuel use permits issued to the person against whom the assessment
    was made which have been suspended.

    (B) If no returns have been filed within the time prescribed for the filing of
    returns, or within any extension of time for filing as the tax commissioner may
    grant in accordance with section 5728.14 of the Revised Code, the commissioner,
    after giving written notice of the commissioner''s intention so to do, immediately
    may suspend all fuel use permits held by the person failing to file a return.
    The notice shall be sent to the last known address of the person. No permit which
    has been suspended for failure to file a return shall be reinstated until the
    person files complete and correct returns for all periods in which no return has
    been filed and paid the full amount of the tax, interest, and additional charges
    due.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5728.11
- number: '5728.12'
  heading: Secretary of state agent for service on non-resident
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5728'
    name: Fuel Use Tax
  text: 'Any non-resident of this state who accepts the privilege extended by the
    laws of this state to non-residents of operating a commercial car or commercial
    tractor, which is subject to the tax levied in section 5728.06 of the Revised
    Code, or of having the same operated within this state, and any resident of this
    state who operates a commercial car or commercial tractor, which is subject to
    the tax levied in section 5728.06 of the Revised Code, or has the same operated
    within this state and subsequently becomes a non-resident or conceals the person''s
    whereabouts, makes the secretary of state of the state of Ohio the person''s agent
    for the service of process or notice in any assessment, action or proceeding instituted
    in this state against such person out of the failure to pay the taxes imposed
    by the provisions of section 5728.06 of the Revised Code.

    Such process or notice shall be served as provided under section 5703.37 of the
    Revised Code.'
