- number: '5703.06'
  heading: Claims - compromise or installment payment agreement - innocent spouse
    relief
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) As used in this section, "claim" means a claim for an amount payable
    to this state that arises under a statute administered by the tax commissioner
    and that has been certified to the attorney general for collection under section
    131.02 of the Revised Code.

    (B) The tax commissioner and the attorney general shall consider the following
    standards when ascertaining with respect to a claim whether a compromise or payment-over-time
    agreement is in the best interests of the state under division (E) of section
    131.02 of the Revised Code:

    (1) There exists a doubt as to whether the claim can be collected.

    (2) There exists a substantial probability that, upon payment of the claim and
    submission of a timely application for refund with respect to that payment, the
    commissioner would refund an amount that was illegally or erroneously paid.

    (3) There exists an economic hardship such that a compromise or agreement would
    facilitate effective tax administration.

    (4) There exists a joint assessment of spouses, one of whom is an innocent spouse,
    provided that any relief under this standard shall only affect the claim as to
    the innocent spouse. A spouse granted relief under 6015 of the Internal Revenue
    Code with regard to any income item is rebuttably presumed to be an innocent spouse
    with regard to that income item to the extent that income item is included in
    or otherwise affects the computation of the tax imposed under section 5747.02
    of the Revised Code or any penalty or interest on that tax.

    (5) Any other standard to which the commissioner and attorney general jointly
    agree.

    (C) The rejection of a compromise or payment-over-time agreement proposed by a
    taxpayer with respect to a claim shall not be appealable.

    (D) A compromise or payment-over-time agreement with respect to a claim shall
    be binding upon and shall inure to the benefit of only the parties to the compromise
    or agreement, and shall not extinguish or otherwise affect the liability of any
    other person or governmental entity.

    (E) A compromise or payment-over-time agreement with respect to a claim shall
    be void if the taxpayer defaults under the compromise or agreement or if the compromise
    or agreement was obtained by fraud or by misrepresentation of a material fact.
    Any amount that was due prior to the compromise or agreement and is unpaid shall
    remain due, and any interest that would have accrued in the absence of the compromise
    or agreement shall continue to accrue and be due.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.06
- number: '5703.061'
  heading: Cancellation of debts under $50
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Except as otherwise provided in this section, the tax commissioner may cancel
    a debt owed to the state arising from any tax administered by the commissioner
    if the total amount of the debt does not exceed fifty dollars and if the debt
    consists only of unpaid taxes due for a single reporting period and of any penalty,
    interest, assessment, or other charge arising from such unpaid taxes. The commissioner
    shall not cancel any debt that has been certified to the attorney general under
    section 131.02 of the Revised Code or that is subject to an appeal filed with
    the board of tax appeals.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.061
- number: '5703.07'
  heading: Bond of tax commissioner - duty to devote entire time to office
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: The tax commissioner shall give bond, conditioned according to law, payable
    to the state, in such penal sum as is fixed by the governor, with surety to be
    approved by the governor. Such bond and oath of office shall be filed in the office
    of the secretary of state. Except as otherwise authorized in section 108.05 of
    the Revised Code, the tax commissioner and each employee of the department of
    taxation shall devote his entire time to the duties of his office, and shall not
    hold any position of trust or profit or engage in any occupation, employment,
    or business interfering with or inconsistent with his duty as commissioner or
    an employee, or serve on or under any committee of any political party.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.07
- number: '5703.08'
  heading: Employee's bonds
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'The tax commissioner may require any employee employed by him to furnish
    bond to the state in such amount as he prescribes, with surety to the satisfaction
    of the treasurer of state, conditioned on the faithful performance of the duties
    of the employee and compliance to all the laws of the state and rules, regulations,
    and orders of the commissioner.

    Bonds authorized under this section shall be filed with the treasurer of state
    and may be individual, schedule, or blanket bonds, and the premiums thereon may
    be paid from the appropriation of the department of taxation. A schedule bond
    shall designate the name or position of each employee covered by the bond.

    The commissioner shall by rule provide for canceling, renewing, and increasing
    the bond authorized by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.08
- number: '5703.081'
  heading: Discipline of department employee failing to comply with tax laws
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: The tax commissioner may discipline or dismiss any employee of the department
    of taxation who fails to timely file an annual return required under section 5747.08
    of the Revised Code for any taxable year during which the employee is employed
    by the department. The commissioner may condition employment or continued employment
    with the department upon timely compliance with any other requirement of the laws,
    rules, or ordinances of federal, state, or local taxing authorities and may discipline
    or dismiss any employee of the department who fails to timely comply with any
    other requirement of those laws, rules, or ordinances.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.081
