    (B) "Business income" means income, including gain or loss, arising from transactions,
    activities, and sources in the regular course of a trade or business and includes
    income, gain, or loss from real property, tangible property, and intangible property
    if the acquisition, rental, management, and disposition of the property constitute
    integral parts of the regular course of a trade or business operation. "Business
    income" includes income, including gain or loss, from a partial or complete liquidation
    of a business, including, but not limited to, gain or loss from the sale or other
    disposition of goodwill or the sale of an equity or ownership interest in a business.

    As used in this division, the "sale of an equity or ownership interest in a business"
    means sales to which either or both of the following apply:

    (1) The sale is treated for federal income tax purposes as the sale of assets.

    (2) The seller materially participated, as described in 26 C.F.R. 1.469-5T, in
    the activities of the business during the taxable year in which the sale occurs
    or during any of the five preceding taxable years.

    (C) "Nonbusiness income" means all income other than business income and may include,
    but is not limited to, compensation, rents and royalties from real or tangible
    personal property, capital gains, interest, dividends and distributions, patent
    or copyright royalties, or lottery winnings, prizes, and awards.

    (D) "Compensation" means any form of remuneration paid to an employee for personal
    services.

    (E) "Fiduciary" means a guardian, trustee, executor, administrator, receiver,
    conservator, or any other person acting in any fiduciary capacity for any individual,
    trust, or estate.

    (F) "Fiscal year" means an accounting period of twelve months ending on the last
    day of any month other than December.

    (G) "Individual" means any natural person.

    (H) "Internal Revenue Code" means the "Internal Revenue Code of 1986," 100 Stat.
    2085, 26 U.S.C.A. 1, as amended.

    (I) "Resident" means any of the following:

    (1) An individual who is domiciled in this state, subject to section 5747.24 of
    the Revised Code;

    (2) The estate of a decedent who at the time of death was domiciled in this state.
    The domicile tests of section 5747.24 of the Revised Code are not controlling
    for purposes of division (I)(2) of this section.

    (3) A trust that, in whole or part, resides in this state. If only part of a trust
    resides in this state, the trust is a resident only with respect to that part.

    For the purposes of division (I)(3) of this section:

    (a) A trust resides in this state for the trust''s current taxable year to the
    extent, as described in division (I)(3)(d) of this section, that the trust consists
    directly or indirectly, in whole or in part, of assets, net of any related liabilities,
    that were transferred, or caused to be transferred, directly or indirectly, to
    the trust by any of the following:

    (i) A person, a court, or a governmental entity or instrumentality on account
    of the death of a decedent, but only if the trust is described in division (I)(3)(e)(i)
    or (ii) of this section;

    (ii) A person who was domiciled in this state for the purposes of this chapter
    when the person directly or indirectly transferred assets to an irrevocable trust,
    but only if at least one of the trust''s qualifying beneficiaries is domiciled
    in this state for the purposes of this chapter during all or some portion of the
    trust''s current taxable year;

    (iii) A person who was domiciled in this state for the purposes of this chapter
    when the trust document or instrument or part of the trust document or instrument
    became irrevocable, but only if at least one of the trust''s qualifying beneficiaries
    is a resident domiciled in this state for the purposes of this chapter during
    all or some portion of the trust''s current taxable year. If a trust document
    or instrument became irrevocable upon the death of a person who at the time of
    death was domiciled in this state for purposes of this chapter, that person is
    a person described in division (I)(3)(a)(iii) of this section.

    (b) A trust is irrevocable to the extent that the transferor is not considered
    to be the owner of the net assets of the trust under sections 671 to 678 of the
    Internal Revenue Code.

    (c) With respect to a trust other than a charitable lead trust, "qualifying beneficiary"
    has the same meaning as "potential current beneficiary" as defined in section
    1361(e)(2) of the Internal Revenue Code, and with respect to a charitable lead
    trust "qualifying beneficiary" is any current, future, or contingent beneficiary,
    but with respect to any trust "qualifying beneficiary" excludes a person or a
    governmental entity or instrumentality to any of which a contribution would qualify
    for the charitable deduction under section 170 of the Internal Revenue Code.

    (d) For the purposes of division (I)(3)(a) of this section, the extent to which
    a trust consists directly or indirectly, in whole or in part, of assets, net of
    any related liabilities, that were transferred directly or indirectly, in whole
    or part, to the trust by any of the sources enumerated in that division shall
    be ascertained by multiplying the fair market value of the trust''s assets, net
    of related liabilities, by the qualifying ratio, which shall be computed as follows:

    (i) The first time the trust receives assets, the numerator of the qualifying
    ratio is the fair market value of those assets at that time, net of any related
    liabilities, from sources enumerated in division (I)(3)(a) of this section. The
    denominator of the qualifying ratio is the fair market value of all the trust''s
    assets at that time, net of any related liabilities.

    (ii) Each subsequent time the trust receives assets, a revised qualifying ratio
    shall be computed. The numerator of the revised qualifying ratio is the sum of
    (1) the fair market value of the trust''s assets immediately prior to the subsequent
    transfer, net of any related liabilities, multiplied by the qualifying ratio last
    computed without regard to the subsequent transfer, and (2) the fair market value
    of the subsequently transferred assets at the time transferred, net of any related
    liabilities, from sources enumerated in division (I)(3)(a) of this section. The
    denominator of the revised qualifying ratio is the fair market value of all the
    trust''s assets immediately after the subsequent transfer, net of any related
    liabilities.

    (iii) Whether a transfer to the trust is by or from any of the sources enumerated
    in division (I)(3)(a) of this section shall be ascertained without regard to the
    domicile of the trust''s beneficiaries.

    (e) For the purposes of division (I)(3)(a)(i) of this section:

    (i) A trust is described in division (I)(3)(e)(i) of this section if the trust
    is a testamentary trust and the testator of that testamentary trust was domiciled
    in this state at the time of the testator''s death for purposes of the taxes levied
    under Chapter 5731. of the Revised Code.

    (ii) A trust is described in division (I)(3)(e)(ii) of this section if the transfer
    is a qualifying transfer described in any of divisions (I)(3)(f)(i) to (vi) of
    this section, the trust is an irrevocable inter vivos trust, and at least one
    of the trust''s qualifying beneficiaries is domiciled in this state for purposes
    of this chapter during all or some portion of the trust''s current taxable year.

    (f) For the purposes of division (I)(3)(e)(ii) of this section, a "qualifying
    transfer" is a transfer of assets, net of any related liabilities, directly or
    indirectly to a trust, if the transfer is described in any of the following:

    (i) The transfer is made to a trust, created by the decedent before the decedent''s
    death and while the decedent was domiciled in this state for the purposes of this
    chapter, and, prior to the death of the decedent, the trust became irrevocable
    while the decedent was domiciled in this state for the purposes of this chapter.

    (ii) The transfer is made to a trust to which the decedent, prior to the decedent''s
    death, had directly or indirectly transferred assets, net of any related liabilities,
    while the decedent was domiciled in this state for the purposes of this chapter,
    and prior to the death of the decedent the trust became irrevocable while the
    decedent was domiciled in this state for the purposes of this chapter.

    (iii) The transfer is made on account of a contractual relationship existing directly
    or indirectly between the transferor and either the decedent or the estate of
    the decedent at any time prior to the date of the decedent''s death, and the decedent
    was domiciled in this state at the time of death for purposes of the taxes levied
    under Chapter 5731. of the Revised Code.

    (iv) The transfer is made to a trust on account of a contractual relationship
    existing directly or indirectly between the transferor and another person who
    at the time of the decedent''s death was domiciled in this state for purposes
    of this chapter.

    (v) The transfer is made to a trust on account of the will of a testator who was
    domiciled in this state at the time of the testator''s death for purposes of the
    taxes levied under Chapter 5731. of the Revised Code.

    (vi) The transfer is made to a trust created by or caused to be created by a court,
    and the trust was directly or indirectly created in connection with or as a result
    of the death of an individual who, for purposes of the taxes levied under Chapter
    5731. of the Revised Code, was domiciled in this state at the time of the individual''s
    death.

    (g) The tax commissioner may adopt rules to ascertain the part of a trust residing
    in this state.

    (J) "Nonresident" means an individual or estate that is not a resident. An individual
    who is a resident for only part of a taxable year is a nonresident for the remainder
    of that taxable year.

    (K) "Pass-through entity" has the same meaning as in section 5733.04 of the Revised
    Code.

    (L) "Return" means the notifications and reports required to be filed pursuant
    to this chapter for the purpose of reporting the tax due and includes declarations
    of estimated tax when so required.

    (M) "Taxable year" means the calendar year or the taxpayer''s fiscal year ending
    during the calendar year, or fractional part thereof, upon which the adjusted
    gross income is calculated pursuant to this chapter.

    (N) "Taxpayer" means any person subject to the tax imposed by section 5747.02
    of the Revised Code or any pass-through entity that makes the election under division
    (D) of section 5747.08 of the Revised Code.

    (O) "Dependents" means dependents as defined in the Internal Revenue Code.

    (P) "Principal county of employment" means, in the case of a nonresident, the
    county within the state in which a taxpayer performs services for an employer
    or, if those services are performed in more than one county, the county in which
    the major portion of the services are performed.

    (Q) As used in sections 5747.50 to 5747.55 of the Revised Code:

    (1) "Subdivision" means any county, municipal corporation, park district, or township.

    (2) "Essential local government purposes" includes all functions that any subdivision
    is required by general law to exercise, including like functions that are exercised
    under a charter adopted pursuant to the Ohio Constitution.

    (R) "Overpayment" means any amount already paid that exceeds the figure determined
    to be the correct amount of the tax.

    (S) "Taxable income" or "Ohio taxable income" applies only to estates and trusts,
    and means federal taxable income, as defined and used in the Internal Revenue
    Code, adjusted as follows:

    (1) Add interest or dividends, net of ordinary, necessary, and reasonable expenses
    not deducted in computing federal taxable income, on obligations or securities
    of any state or of any political subdivision or authority of any state, other
    than this state and its subdivisions and authorities, but only to the extent that
    such net amount is not otherwise includible in Ohio taxable income and is described
    in either division (S)(1)(a) or (b) of this section:

    (a) The net amount is not attributable to the S portion of an electing small business
    trust and has not been distributed to beneficiaries for the taxable year;

    (b) The net amount is attributable to the S portion of an electing small business
    trust for the taxable year.

    (2) Add interest or dividends, net of ordinary, necessary, and reasonable expenses
    not deducted in computing federal taxable income, on obligations of any authority,
    commission, instrumentality, territory, or possession of the United States to
    the extent that the interest or dividends are exempt from federal income taxes
    but not from state income taxes, but only to the extent that such net amount is
    not otherwise includible in Ohio taxable income and is described in either division
    (S)(1)(a) or (b) of this section;

    (3) Add the amount of personal exemption allowed to the estate pursuant to section
    642(b) of the Internal Revenue Code;

    (4) Deduct interest or dividends, net of related expenses deducted in computing
    federal taxable income, on obligations of the United States and its territories
    and possessions or of any authority, commission, or instrumentality of the United
    States to the extent that the interest or dividends are exempt from state taxes
    under the laws of the United States, but only to the extent that such amount is
    included in federal taxable income and is described in either division (S)(1)(a)
    or (b) of this section;

    (5) Deduct the amount of wages and salaries, if any, not otherwise allowable as
    a deduction but that would have been allowable as a deduction in computing federal
    taxable income for the taxable year, had the work opportunity tax credit allowed
    under sections 38, 51, and 52 of the Internal Revenue Code not been in effect,
    but only to the extent such amount relates either to income included in federal
    taxable income for the taxable year or to income of the S portion of an electing
    small business trust for the taxable year;

    (6) Deduct any interest or interest equivalent, net of related expenses deducted
    in computing federal taxable income, on public obligations and purchase obligations,
    but only to the extent that such net amount relates either to income included
    in federal taxable income for the taxable year or to income of the S portion of
    an electing small business trust for the taxable year;

    (7) Add any loss or deduct any gain resulting from sale, exchange, or other disposition
    of public obligations to the extent that such loss has been deducted or such gain
    has been included in computing either federal taxable income or income of the
    S portion of an electing small business trust for the taxable year;

    (8) Except in the case of the final return of an estate, add any amount deducted
    by the taxpayer on both its Ohio estate tax return pursuant to section 5731.14
    of the Revised Code, and on its federal income tax return in determining federal
    taxable income;

    (9)(a) Deduct any amount included in federal taxable income solely because the
    amount represents a reimbursement or refund of expenses that in a previous year
    the decedent had deducted as an itemized deduction pursuant to section 63 of the
    Internal Revenue Code and applicable treasury regulations. The deduction otherwise
    allowed under division (S)(9)(a) of this section shall be reduced to the extent
    the reimbursement is attributable to an amount the taxpayer or decedent deducted
    under this section in any taxable year.

    (b) Add any amount not otherwise included in Ohio taxable income for any taxable
    year to the extent that the amount is attributable to the recovery during the
    taxable year of any amount deducted or excluded in computing federal or Ohio taxable
    income in any taxable year, but only to the extent such amount has not been distributed
    to beneficiaries for the taxable year.

    (10) Deduct any portion of the deduction described in section 1341(a)(2) of the
    Internal Revenue Code, for repaying previously reported income received under
    a claim of right, that meets both of the following requirements:

    (a) It is allowable for repayment of an item that was included in the taxpayer''s
    taxable income or the decedent''s adjusted gross income for a prior taxable year
    and did not qualify for a credit under division (A) or (B) of section 5747.05
    of the Revised Code for that year.

    (b) It does not otherwise reduce the taxpayer''s taxable income or the decedent''s
    adjusted gross income for the current or any other taxable year.

    (11) Add any amount claimed as a credit under section 5747.059 of the Revised
    Code to the extent that the amount satisfies either of the following:

    (a) The amount was deducted or excluded from the computation of the taxpayer''s
    federal taxable income as required to be reported for the taxpayer''s taxable
    year under the Internal Revenue Code;

    (b) The amount resulted in a reduction in the taxpayer''s federal taxable income
    as required to be reported for any of the taxpayer''s taxable years under the
    Internal Revenue Code.

    (12) Deduct any amount, net of related expenses deducted in computing federal
    taxable income, that a trust is required to report as farm income on its federal
    income tax return, but only if the assets of the trust include at least ten acres
    of land satisfying the definition of "land devoted exclusively to agricultural
    use" under section 5713.30 of the Revised Code, regardless of whether the land
    is valued for tax purposes as such land under sections 5713.30 to 5713.38 of the
    Revised Code. If the trust is a pass-through entity investor, section 5747.231
    of the Revised Code applies in ascertaining if the trust is eligible to claim
    the deduction provided by division (S)(12) of this section in connection with
    the pass-through entity''s farm income.

    Except for farm income attributable to the S portion of an electing small business
    trust, the deduction provided by division (S)(12) of this section is allowed only
    to the extent that the trust has not distributed such farm income.

    (13) Add the net amount of income described in section 641(c) of the Internal
    Revenue Code to the extent that amount is not included in federal taxable income.

    (14) Add or deduct the amount the taxpayer would be required to add or deduct
    under division (A)(17) or (18) of this section if the taxpayer''s Ohio taxable
    income was computed in the same manner as an individual''s Ohio adjusted gross
    income is computed under this section.

    (15) Add, to the extent not otherwise included in computing taxable income or
    Ohio taxable income for any taxable year, the taxpayer''s proportionate share
    of the amount of the tax levied under section 5747.38 of the Revised Code and
    paid by an electing pass-through entity for the taxable year.

    (16) Add any income taxes deducted in computing federal taxable income or Ohio
    taxable income to the extent the income taxes were derived from income subject
    to a tax levied in another state or the District of Columbia when such tax was
    enacted for purposes of complying with internal revenue service notice 2020-75.

    (T) "School district income" and "school district income tax" have the same meanings
    as in section 5748.01 of the Revised Code.

    (U) As used in divisions (A)(7), (A)(8), (S)(6), and (S)(7) of this section, "public
    obligations," "purchase obligations," and "interest or interest equivalent" have
    the same meanings as in section 5709.76 of the Revised Code.

    (V) "Limited liability company" means any limited liability company formed under
    former Chapter 1705. of the Revised Code as that chapter existed prior to February
    11, 2022, Chapter 1706. of the Revised Code, or the laws of any other state.

    (W) "Pass-through entity investor" means any person who, during any portion of
    a taxable year of a pass-through entity, is a partner, member, shareholder, or
    equity investor in that pass-through entity.

    (X) "Banking day" has the same meaning as in section 1304.01 of the Revised Code.

    (Y) "Month" means a calendar month.

    (Z) "Quarter" means the first three months, the second three months, the third
    three months, or the last three months of the taxpayer''s taxable year.

    (AA)(1) "Modified business income" means the business income included in a trust''s
    Ohio taxable income after such taxable income is first reduced by the qualifying
    trust amount, if any.

    (2) "Qualifying trust amount" of a trust means capital gains and losses from the
    sale, exchange, or other disposition of equity or ownership interests in, or debt
    obligations of, a qualifying investee to the extent included in the trust''s Ohio
    taxable income, but only if the following requirements are satisfied:

    (a) The book value of the qualifying investee''s physical assets in this state
    and everywhere, as of the last day of the qualifying investee''s fiscal or calendar
    year ending immediately prior to the date on which the trust recognizes the gain
    or loss, is available to the trust.

    (b) The requirements of section 5747.011 of the Revised Code are satisfied for
    the trust''s taxable year in which the trust recognizes the gain or loss.

    Any gain or loss that is not a qualifying trust amount is modified business income,
    qualifying investment income, or modified nonbusiness income, as the case may
    be.

    (3) "Modified nonbusiness income" means a trust''s Ohio taxable income other than
    modified business income, other than the qualifying trust amount, and other than
    qualifying investment income, as defined in section 5747.012 of the Revised Code,
    to the extent such qualifying investment income is not otherwise part of modified
    business income.

    (4) "Modified Ohio taxable income" applies only to trusts, and means the sum of
    the amounts described in divisions (AA)(4)(a) to (c) of this section:

    (a) The fraction, calculated under section 5747.013, and applying section 5747.231
    of the Revised Code, multiplied by the sum of the following amounts:

    (i) The trust''s modified business income;

    (ii) The trust''s qualifying investment income, as defined in section 5747.012
    of the Revised Code, but only to the extent the qualifying investment income does
    not otherwise constitute modified business income and does not otherwise constitute
    a qualifying trust amount.

    (b) The qualifying trust amount multiplied by a fraction, the numerator of which
    is the sum of the book value of the qualifying investee''s physical assets in
    this state on the last day of the qualifying investee''s fiscal or calendar year
    ending immediately prior to the day on which the trust recognizes the qualifying
    trust amount, and the denominator of which is the sum of the book value of the
    qualifying investee''s total physical assets everywhere on the last day of the
    qualifying investee''s fiscal or calendar year ending immediately prior to the
    day on which the trust recognizes the qualifying trust amount. If, for a taxable
    year, the trust recognizes a qualifying trust amount with respect to more than
    one qualifying investee, the amount described in division (AA)(4)(b) of this section
    shall equal the sum of the products so computed for each such qualifying investee.

    (c)(i) With respect to a trust or portion of a trust that is a resident as ascertained
    in accordance with division (I)(3)(d) of this section, its modified nonbusiness
    income.

    (ii) With respect to a trust or portion of a trust that is not a resident as ascertained
    in accordance with division (I)(3)(d) of this section, the amount of its modified
    nonbusiness income satisfying the descriptions in divisions (B)(2) to (5) of section
    5747.20 of the Revised Code, except as otherwise provided in division (AA)(4)(c)(ii)
    of this section. With respect to a trust or portion of a trust that is not a resident
    as ascertained in accordance with division (I)(3)(d) of this section, the trust''s
    portion of modified nonbusiness income recognized from the sale, exchange, or
    other disposition of a debt interest in or equity interest in a section 5747.212
    entity, as defined in section 5747.212 of the Revised Code, without regard to
    division (A) of that section, shall not be allocated to this state in accordance
    with section 5747.20 of the Revised Code but shall be apportioned to this state
    in accordance with division (B) of section 5747.212 of the Revised Code without
    regard to division (A) of that section.

    If the allocation and apportionment of a trust''s income under divisions (AA)(4)(a)
    and (c) of this section do not fairly represent the modified Ohio taxable income
    of the trust in this state, the alternative methods described in division (C)
    of section 5747.21 of the Revised Code may be applied in the manner and to the
    same extent provided in that section.

    (5)(a) Except as set forth in division (AA)(5)(b) of this section, "qualifying
    investee" means a person in which a trust has an equity or ownership interest,
    or a person or unit of government the debt obligations of either of which are
    owned by a trust. For the purposes of division (AA)(2)(a) of this section and
    for the purpose of computing the fraction described in division (AA)(4)(b) of
    this section, all of the following apply:

    (i) If the qualifying investee is a member of a qualifying controlled group on
    the last day of the qualifying investee''s fiscal or calendar year ending immediately
    prior to the date on which the trust recognizes the gain or loss, then "qualifying
    investee" includes all persons in the qualifying controlled group on such last
    day.

    (ii) If the qualifying investee, or if the qualifying investee and any members
    of the qualifying controlled group of which the qualifying investee is a member
    on the last day of the qualifying investee''s fiscal or calendar year ending immediately
    prior to the date on which the trust recognizes the gain or loss, separately or
    cumulatively own, directly or indirectly, on the last day of the qualifying investee''s
    fiscal or calendar year ending immediately prior to the date on which the trust
    recognizes the qualifying trust amount, more than fifty per cent of the equity
    of a pass-through entity, then the qualifying investee and the other members are
    deemed to own the proportionate share of the pass-through entity''s physical assets
    which the pass-through entity directly or indirectly owns on the last day of the
    pass-through entity''s calendar or fiscal year ending within or with the last
    day of the qualifying investee''s fiscal or calendar year ending immediately prior
    to the date on which the trust recognizes the qualifying trust amount.

    (iii) For the purposes of division (AA)(5)(a)(iii) of this section, "upper level
    pass-through entity" means a pass-through entity directly or indirectly owning
    any equity of another pass-through entity, and "lower level pass-through entity"
    means that other pass-through entity.

    An upper level pass-through entity, whether or not it is also a qualifying investee,
    is deemed to own, on the last day of the upper level pass-through entity''s calendar
    or fiscal year, the proportionate share of the lower level pass-through entity''s
    physical assets that the lower level pass-through entity directly or indirectly
    owns on the last day of the lower level pass-through entity''s calendar or fiscal
    year ending within or with the last day of the upper level pass-through entity''s
    fiscal or calendar year. If the upper level pass-through entity directly and indirectly
    owns less than fifty per cent of the equity of the lower level pass-through entity
    on each day of the upper level pass-through entity''s calendar or fiscal year
    in which or with which ends the calendar or fiscal year of the lower level pass-through
    entity and if, based upon clear and convincing evidence, complete information
    about the location and cost of the physical assets of the lower pass-through entity
    is not available to the upper level pass-through entity, then solely for purposes
    of ascertaining if a gain or loss constitutes a qualifying trust amount, the upper
    level pass-through entity shall be deemed as owning no equity of the lower level
    pass-through entity for each day during the upper level pass-through entity''s
    calendar or fiscal year in which or with which ends the lower level pass-through
    entity''s calendar or fiscal year. Nothing in division (AA)(5)(a)(iii) of this
    section shall be construed to provide for any deduction or exclusion in computing
    any trust''s Ohio taxable income.

    (b) With respect to a trust that is not a resident for the taxable year and with
    respect to a part of a trust that is not a resident for the taxable year, "qualifying
    investee" for that taxable year does not include a C corporation if both of the
    following apply:

    (i) During the taxable year the trust or part of the trust recognizes a gain or
    loss from the sale, exchange, or other disposition of equity or ownership interests
    in, or debt obligations of, the C corporation.

    (ii) Such gain or loss constitutes nonbusiness income.

    (6) "Available" means information is such that a person is able to learn of the
    information by the due date plus extensions, if any, for filing the return for
    the taxable year in which the trust recognizes the gain or loss.

    (BB) "Qualifying controlled group" has the same meaning as in section 5733.04
    of the Revised Code.

    (CC) "Related member" has the same meaning as in section 5733.042 of the Revised
    Code.

    (DD)(1) For the purposes of division (DD) of this section:

    (a) "Qualifying person" means any person other than a qualifying corporation.

    (b) "Qualifying corporation" means any person classified for federal income tax
    purposes as an association taxable as a corporation, except either of the following:

    (i) A corporation that has made an election under subchapter S, chapter one, subtitle
    A, of the Internal Revenue Code for its taxable year ending within, or on the
    last day of, the investor''s taxable year;

    (ii) A subsidiary that is wholly owned by any corporation that has made an election
    under subchapter S, chapter one, subtitle A of the Internal Revenue Code for its
    taxable year ending within, or on the last day of, the investor''s taxable year.

    (2) For the purposes of this chapter, unless expressly stated otherwise, no qualifying
    person indirectly owns any asset directly or indirectly owned by any qualifying
    corporation.

    (EE) For purposes of this chapter and Chapter 5751. of the Revised Code:

    (1) "Trust" does not include a qualified pre-income tax trust.

    (2) A "qualified pre-income tax trust" is any pre-income tax trust that makes
    a qualifying pre-income tax trust election as described in division (EE)(3) of
    this section.

    (3) A "qualifying pre-income tax trust election" is an election by a pre-income
    tax trust to subject to the tax imposed by section 5751.02 of the Revised Code
    the pre-income tax trust and all pass-through entities of which the trust owns
    or controls, directly, indirectly, or constructively through related interests,
    five per cent or more of the ownership or equity interests. The trustee shall
    notify the tax commissioner in writing of the election on or before April 15,
    2006. The election, if timely made, shall be effective on and after January 1,
    2006, and shall apply for all tax periods and tax years until revoked by the trustee
    of the trust.

    (4) A "pre-income tax trust" is a trust that satisfies all of the following requirements:

    (a) The document or instrument creating the trust was executed by the grantor
    before January 1, 1972;

    (b) The trust became irrevocable upon the creation of the trust; and

    (c) The grantor was domiciled in this state at the time the trust was created.

    (FF) "Uniformed services" means all of the following:

    (1) "Armed forces of the United States" as defined in section 5907.01 of the Revised
    Code;

    (2) The commissioned corps of the national oceanic and atmospheric administration;

    (3) The commissioned corps of the public health service.

    (GG) "Taxable business income" means the amount by which an individual''s business
    income that is included in federal adjusted gross income exceeds the amount of
    business income the individual is authorized to deduct under division (A)(28)
    of this section for the taxable year.

    (HH) "Employer" does not include a franchisor with respect to the franchisor''s
    relationship with a franchisee or an employee of a franchisee, unless the franchisor
    agrees to assume that role in writing or a court of competent jurisdiction determines
    that the franchisor exercises a type or degree of control over the franchisee
    or the franchisee''s employees that is not customarily exercised by a franchisor
    for the purpose of protecting the franchisor''s trademark, brand, or both. For
    purposes of this division, "franchisor" and "franchisee" have the same meanings
    as in 16 C.F.R. 436.1.

    (II) "Modified adjusted gross income" means Ohio adjusted gross income plus any
    amount deducted under divisions (A)(28) and (34) of this section for the taxable
    year.

    (JJ) "Qualifying Ohio educator" means an individual who, for a taxable year, qualifies
    as an eligible educator, as that term is defined in section 62 of the Internal
    Revenue Code, and who holds a certificate, license, or permit described in Chapter
    3319. or section 3301.071 of the Revised Code.

    (KK) "Professional employer organization," "professional employer organization
    agreement," and "professional employer organization reporting entity" have the
    same meanings as in section 4125.01 of the Revised Code.

    (LL) "Alternate employer organization" and "alternate employer organization agreement"
    have the same meanings as in section 4133.01 of the Revised Code.

    (MM) "Casino gaming" has the same meaning as in section 3772.01 of the Revised
    Code, "lottery sports gaming" has the same meaning as in section 3770.23 of the
    Revised Code, "sports gaming" has the same meaning as in section 3775.01 of the
    Revised Code, and "video lottery terminal" has the same meaning as in section
    3770.21 of the Revised Code.'
