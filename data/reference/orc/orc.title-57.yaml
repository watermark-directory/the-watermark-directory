- number: '5703.27'
  heading: Duty to answer questions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Any company, firm, corporation, person, association, partnership, or public
    utility which receives from the tax commissioner any blanks with directions to
    fill them out shall fill them out so as to answer fully and correctly each question
    therein propounded, and if it is unable to answer any question, it shall in writing
    give a good reason for such failure.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.27
- number: '5703.28'
  heading: Contempt proceedings for disobedience
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: In case of disobedience by any person to an order or subpoena of the department
    of taxation, or on the refusal of a witness to testify to any matter regarding
    which he is lawfully interrogated before the department, the court of common pleas
    of the county in which such person resides, or a judge thereof, on application
    of the department, shall compel obedience by attachment proceedings as for contempt
    in the case of disobedience of a subpoena issued from such court or a refusal
    to testify therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.28
- number: '5703.29'
  heading: Fees of officers and witnesses
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Each officer who serves a summons or subpoena shall receive the same fees
    as a sheriff, and each witness who appears before the department of taxation by
    its order shall receive for the witness's attendance the fees and mileage provided
    for under section 119.094 of the Revised Code, which shall be audited and paid
    by the state in the same manner as other expenses, upon the presentation of proper
    vouchers approved by the department. A witness subpoenaed at the instance of parties
    other than the department shall not be entitled to compensation from the state
    for attendance or travel unless the department certifies that the testimony of
    the witness was material to the matter investigated.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.29
- number: '5703.30'
  heading: Payment of expenses and witness fees
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: A person who appears before the department of taxation or the board of tax
    appeals by its order in relation to the appraisal of property in any taxing district
    shall be allowed and paid out of the treasury of the proper county, if that person
    is an officer of any such taxing district or a member of any county board of revision,
    his actual and necessary traveling expenses. The expenses shall be itemized and
    sworn to by the person who incurred the expense. If such person is not a member
    of the county board of revision, he shall receive for his attendance the fees
    and mileage provided in section 5703.29 of the Revised Code. Such traveling expenses
    and witness fees shall be audited and paid out of the treasury of the proper county
    in the same manner as other expenses, upon the presentation of a certificate from
    the department or board certifying to the fact of such attendance.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.30
- number: '5703.31'
  heading: Appearance of officers - payment of expenses
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: The department of taxation may order any officer in whom any powers are vested
    or upon whom any duties are imposed by any laws which the department is required
    to administer to appear before it for conference concerning the administration
    of such laws. Except as provided in section 5703.30 of the Revised Code, the department
    shall allow and pay from any appropriation to the department available for such
    purpose the actual and necessary traveling expenses of each officer so appearing.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.31
- number: '5703.32'
  heading: Depositions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: In an investigation the department of taxation or any party may cause depositions
    of witnesses residing within or without the state to be taken in the manner prescribed
    by law for like depositions in civil actions in courts of common pleas.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.32
- number: '5703.33'
  heading: Copy of testimony to be received in evidence
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: A transcribed copy of the evidence and proceedings, or any specific part thereof,
    of any investigation which is taken by a stenographer appointed by the department
    of taxation and which is certified by such stenographer to be a true and correct
    transcript of all the testimony in the investigation, or of a particular witness,
    or of a specific part thereof, carefully compared by him with his original notes,
    and stated to be a correct statement of the evidence and proceedings had on such
    investigations shall be received in evidence with the same effect as if such reporter
    were present and testified to the facts so certified. A copy of such transcript
    shall be furnished on demand to any party upon the payment of the fee therefor,
    as provided for transcripts in courts of common pleas.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.33
- number: '5703.34'
  heading: Compulsory testimony - privilege against prosecution
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: Whenever a taxpayer or other person refuses, on the basis of his privilege
    against self-incrimination, to testify or provide other information in an examination
    or proceeding before the tax commissioner, and the commissioner communicates to
    the taxpayer or other person an order issued under this section, the taxpayer
    or other person may not refuse to comply with the order on the basis of his privilege
    against self-incrimination; but no testimony or other information compelled under
    the order, or any information directly or indirectly derived from such testimony
    or other information, may be used against the taxpayer or person in any criminal
    case, except a prosecution for perjury or falsification of testimony or other
    information compelled under the order, or for otherwise failing to comply with
    the order.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.34
- number: '5703.35'
  heading: Furnishing of blanks - extension of time for filing reports
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'The department of taxation shall cause to be prepared suitable blanks for
    carrying out the purposes of the laws which it is required to administer, and,
    on application, shall furnish such blanks to each company, firm, corporation,
    person, association, partnership, or public utility subject to such laws.

    The tax commissioner, when he deems it advisable, may extend to any company, firm,
    corporation, person, association, partnership, or public utility a further specified
    time, not to exceed forty-five days, within which to file any report required
    by law to be filed with the commissioner, in which event the attaching of any
    penalty for failure to file such report or pay any tax or fee shall be extended
    accordingly.'
