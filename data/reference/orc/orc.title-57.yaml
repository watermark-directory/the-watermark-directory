- number: '5747.16'
  heading: Secretary of state agent for service of process on nonresidents
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: Any nonresident who accepts the privileges extended by the laws of this state
    to nonresidents earning or receiving income in this state, and any resident who
    becomes a nonresident or conceals the person's whereabouts thereby makes the secretary
    of state the person's agent for the service of process or notice in any assessment,
    action, or proceedings instituted in this state against such person under this
    chapter, such process or notice shall be served as provided under section 5703.37
    of the Revised Code.
