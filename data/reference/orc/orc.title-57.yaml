  url: https://codes.ohio.gov/ohio-revised-code/section-5726.06
- number: '5726.07'
  heading: Underpayment of estimated taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) In the case of an underpayment of estimated taxes required to be paid
    under section 5726.06 of the Revised Code, interest upon the amount of underpayment,
    calculated at the rate per annum prescribed by section 5703.47 of the Revised
    Code for the period of underpayment, shall be added to the tax due for the tax
    year for which the estimated tax is paid.

    (B) The amount of underpayment upon which such interest is computed equals the
    amount by which division (B)(1) of this section exceeds division (B)(2) of this
    section.

    (1) The amount of the estimated tax payment that would be required to be paid
    if the total estimated tax due were equal to the amount of tax shown to be due
    on the annual report filed for the tax year or, if no report was filed, the total
    amount of tax due for the tax year;

    (2) The amount, if any, of the estimated tax that has been paid on or before the
    last day prescribed for such payment.

    (C) The period of underpayment for which such interest is computed shall run from
    the date the estimated tax payment was required to be made to the date the payment
    is made.

    For purposes of this section, a payment of estimated tax on any payment date shall
    be considered a payment of any previous underpayment only to the extent that such
    payment exceeds the amount of payment currently due.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.07
- number: '5726.10'
  heading: Enforcement of chapter
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: 'The tax commissioner shall enforce and administer this chapter. In addition
    to any other powers conferred upon the commissioner by law, the commissioner may
    do any of the following:

    (A) Prescribe all forms required to be filed pursuant to this chapter;

    (B) Promulgate such rules and regulations as the commissioner finds necessary
    to carry out this chapter;

    (C) Appoint and employ such personnel as are necessary to carry out the duties
    imposed upon the commissioner by this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.10
- number: '5726.20'
  heading: Assessments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) The tax commissioner may make an assessment, based on any information
    in the commissioner''s possession, against any person that fails to file a return
    or report or pay any tax as required by this chapter. The reporting person for
    a taxpayer shall file the annual report required under section 5726.03 of the
    Revised Code and remit the tax imposed by this chapter. Each person included in
    the annual report of the taxpayer is jointly and severally liable for the tax
    imposed by this chapter and any penalties and interest thereon. If the reporting
    person fails, for any reason, to file and remit any tax, the amount due may be
    collected by assessment against the reporting person and against any or all other
    persons required to be included in the annual report of the taxpayer as provided
    in section 5703.90 of the Revised Code. The commissioner shall make the assessment
    in the manner provided in this section. The commissioner shall give the person
    assessed written notice of the assessment as provided in section 5703.37 of the
    Revised Code. With the notice, the commissioner shall provide instructions on
    the manner in which to petition for reassessment and request a hearing with respect
    to the petition.

    (B) No assessment shall be made or issued against a person under this section
    more than four years after the later of the final date the report subject to assessment
    was required to be filed or the date such report was filed. Such time limit may
    be extended if both the person and the commissioner consent in writing to the
    extension or if an agreement waiving or extending the time limit has been entered
    into pursuant to section 122.171 of the Revised Code. Any such extension shall
    extend the four-year time limit prescribed in division (A) of section 5726.30
    of the Revised Code for the same period of time. There shall be no bar or limit
    to an assessment against a person that fails to file a report subject to assessment
    as required by this chapter, or that files a fraudulent report.

    (C) Unless the person assessed, within sixty days after service of the notice
    of assessment, files with the tax commissioner a written petition for reassessment
    signed by the person or the person''s authorized agent having knowledge of the
    facts, the assessment shall become final, and the amount of the assessment is
    due and payable from the person assessed to the treasurer of state. A petition
    shall indicate the objections of the person assessed, but additional objections
    may be raised in writing if received by the commissioner prior to the date shown
    on the final determination. If a petition for reassessment has been properly filed,
    the commissioner shall proceed under section 5703.60 of the Revised Code.

    (D)(1) After an assessment becomes final, if any portion of the assessment, including
    any accrued interest, remains unpaid, a certified copy of the tax commissioner''s
    entry making the assessment final may be filed in the office of the clerk of the
    court of common pleas in the county in which the person resides or has its principal
    place of business in this state, or in the office of the clerk of court of common
    pleas of Franklin county.

    (2) Immediately upon the filing of the entry, the clerk shall enter judgment for
    the state against the person assessed in the amount shown on the entry. The judgment
    may be filed by the clerk in a loose-leaf book entitled, "special judgments for
    the financial institution tax" and shall have the same effect as other judgments.
    Execution shall issue upon the judgment at the request of the tax commissioner,
    and all laws applicable to sales on execution shall apply to sales made under
    the judgment.

    (3) If the assessment is not paid in its entirety within sixty days after the
    day the assessment was issued, the portion of the assessment consisting of tax
    due shall bear interest at the rate per annum prescribed by section 5703.47 of
    the Revised Code from the date the tax commissioner issues the assessment until
    the date the assessment is paid or until it is certified to the attorney general
    for collection under section 131.02 of the Revised Code, whichever comes first.
    If the unpaid portion of the assessment is certified to the attorney general for
    collection, the entire unpaid portion of the assessment shall bear interest at
    the rate per annum prescribed by section 5703.47 of the Revised Code from the
    date of certification until the date it is paid in its entirety. Interest shall
    be paid in the same manner as the tax and may be collected by the issuance of
    an assessment under this section.

    (E) If the tax commissioner believes that collection of the tax imposed by this
    chapter will be jeopardized unless proceedings to collect or secure collection
    of the tax are instituted without delay, the commissioner may issue a jeopardy
    assessment against the person liable for the tax. Immediately upon the issuance
    of the jeopardy assessment, the commissioner shall file an entry with the clerk
    of the court of common pleas in the manner prescribed by division (D) of this
    section. Notice of the jeopardy assessment shall be served on the person assessed
    or the person''s authorized agent in the manner provided in section 5703.37 of
    the Revised Code within five days of the filing of the entry with the clerk. The
    total amount assessed shall be immediately due and payable, unless the person
    assessed files a petition for reassessment in accordance with division (C) of
    this section and provides security in a form satisfactory to the commissioner
    and in an amount sufficient to satisfy the unpaid balance of the assessment. Full
    or partial payment of the assessment shall not prejudice the commissioner''s consideration
    of the petition for reassessment.

    (F) The tax commissioner shall immediately forward to the treasurer of state all
    amounts the commissioner receives under this section. Such amounts shall be considered
    as revenue arising from the tax imposed by this chapter.

    (G) If the tax commissioner possesses information indicating that the amount of
    tax a taxpayer is required to pay under this chapter exceeds the amount the reporting
    person for the taxpayer paid, the tax commissioner may audit a sample of the taxpayer''s
    gross receipts over a representative period of time to ascertain the amount of
    tax due, and may issue an assessment based on the audit. The tax commissioner
    shall make a good faith effort to reach agreement with the taxpayer in selecting
    a representative sample. The tax commissioner may apply a sampling method only
    if the commissioner has prescribed the method by rule.

    (H) If the whereabouts of a person subject to this chapter is not known to the
    tax commissioner, the secretary of state is hereby deemed to be that person''s
    agent for purposes of service of process or notice of any assessment, action,
    or proceedings instituted in this state against the person under this chapter.
    Such process or notice shall be served on such person by the commissioner or by
    an agent of the commissioner by leaving a true and attested copy of the process
    or notice at the office of the secretary of state at least fifteen days before
    the return day of such process or notice, and by sending a copy of the process
    or notice to such person by ordinary mail, with an endorsement thereon of the
    service upon the secretary of state, addressed to such person at the person''s
    last known address.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.20
- number: '5726.21'
  heading: Penalties
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) In addition to any other penalty imposed by this chapter or Chapter 5703.
    of the Revised Code, the following penalties shall apply:

    (1) If a taxpayer required to file any report under this chapter fails to make
    and file the report within the time prescribed, a penalty may be imposed not exceeding
    the greater of fifty dollars per month or fraction of a month, not to exceed five
    hundred dollars, or five per cent per month or fraction of a month, not to exceed
    fifty per cent of the tax required to be shown on the report, for each month or
    fraction of a month elapsing between the due date and the date on which the report
    is filed.

    (2) If a taxpayer fails to pay the amount of tax required to be paid under this
    chapter, except for estimated tax under section 5726.06 of the Revised Code, by
    the dates prescribed in this chapter for payment, a penalty may be imposed not
    exceeding fifteen per cent of the delinquent payment.

    (3) If a taxpayer files what purports to be a report required by this chapter
    that does not contain information upon which the substantial correctness of the
    report may be judged or contains information that on its face indicates that the
    report is substantially incorrect, and the filing of the report in that manner
    is due to a position that is frivolous or a desire that is apparent from the report
    to delay or impede the administration of the tax levied under this chapter, a
    penalty of up to five hundred dollars may be imposed.

    (4) If a taxpayer makes a fraudulent attempt to evade the reporting or payment
    of the tax required to be shown on any report required under this chapter, a penalty
    may be imposed not exceeding the greater of one thousand dollars or one hundred
    per cent of the tax required to be shown on the report.

    (5) If a taxpayer makes a false or fraudulent claim for a refund under this chapter,
    a penalty may be imposed not exceeding the greater of one thousand dollars or
    one hundred per cent of the claim.

    (B) The tax commissioner may collect any penalty imposed by this section in the
    same manner as the tax levied under this chapter. Penalties so collected shall
    be considered as revenue arising from the tax levied under this chapter.

    (C) For purposes of this section, the tax required to be shown on the report shall
    be reduced by the amount of any part of the tax paid on or before the date prescribed
    for filing the report.

    (D) The tax commissioner may abate all or a portion of any penalties imposed under
    this section and may adopt rules governing such abatements.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.21
- number: '5726.30'
  heading: Refunds
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) The tax commissioner shall refund amounts imposed under this chapter
    that a person overpaid, paid illegally or erroneously, or paid on an illegal or
    erroneous assessment. The person shall file an application for refund with the
    tax commissioner, on the form prescribed by the commissioner, within four years
    after the date of the illegal or erroneous payment, or within any additional period
    allowed under division (B) of section 5726.20 of the Revised Code. The applicant
    shall provide the amount of the requested refund along with the claimed reasons
    for, and documentation to support, the issuance of a refund.

    For purposes of this division, a payment that an applicant made before the due
    date for filing the report to which the payment relates shall be deemed to have
    been made on the due date of the report.

    (B) Upon the filing of a refund application, the tax commissioner shall determine
    the amount of refund to which the applicant is entitled. If the amount is not
    less than that claimed, the commissioner shall certify the amount to the director
    of budget and management and treasurer of state for payment from the tax refund
    fund created under section 5703.052 of the Revised Code. If the amount is less
    than that claimed, the commissioner shall proceed in accordance with section 5703.70
    of the Revised Code.

    (C)(1) Except as provided in division (C)(2) of this section, interest on a refund
    applied for under this section, computed at the rate provided for in section 5703.47
    of the Revised Code, shall be allowed from the later of the date the amount was
    paid or the date the payment was due until the refund is paid.

    (2) No interest shall be allowed under this section on an amount refunded to a
    person to the extent that the refund results from the allowance of a refundable
    credit against the tax imposed by section 5726.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.30
- number: '5726.31'
  heading: Application of refund to debt to the state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: 'As used in this section, "debt to this state" means unpaid taxes due the
    state, unpaid workers'' compensation premiums due under section 4123.35 of the
    Revised Code, unpaid unemployment compensation contributions due under section
    4141.25 of the Revised Code, unpaid unemployment compensation payments in lieu
    of contributions due under section 4141.241 of the Revised Code, unpaid claims
    certified under section 131.02 or 131.021 of the Revised Code, unpaid fees payable
    to the state or to the clerk of courts pursuant to section 4505.06 of the Revised
    Code or any unpaid charge, penalty, or interest arising from any of the foregoing.

    If a person entitled to a refund under section 5726.30 of the Revised Code owes
    any debt to this state, the amount refundable may be applied in satisfaction of
    the debt. If the amount refundable is less than the amount of the debt, it may
    be applied in partial satisfaction of the debt. If the amount refundable is greater
    than the amount of the debt, the amount remaining after satisfaction of the debt
    shall be refunded. If the taxpayer has more than one such debt, any debt subject
    to section 5739.33 or division (G) of section 5747.07 of the Revised Code shall
    be satisfied first.

    Except as provided in section 131.021 of the Revised Code, this section applies
    only to debts that have become final. For the purposes of this section, a debt
    becomes final when, under the applicable law, any time provided for petition for
    reassessment, request for reconsideration, or other appeal of the legality or
    validity of the amount giving rise to the debt expires without an appeal having
    been filed in the manner provided by law.

    The tax commissioner may charge each respective agency of the state for the commissioner''s
    cost in applying refunds to debts due to the state and may charge the attorney
    general for the commissioner''s cost in applying refunds to certified claims.
    The commissioner may promulgate rules to implement this section.

    The commissioner may, with the consent of the reporting person for a taxpayer,
    provide for the crediting of the amount of any refund due to the taxpayer under
    this chapter for a tax year against the tax due for any succeeding tax year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.31
- number: '5726.32'
  heading: Interest on unpaid taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: If any tax due under this chapter is not paid on or before the date prescribed
    for its payment, interest shall be assessed, collected, and paid, in the same
    manner as the tax, upon such unpaid amount at the rate per annum prescribed by
    section 5703.47 of the Revised Code from the date prescribed for the payment of
