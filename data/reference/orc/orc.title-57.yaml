  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.10
- number: '5741.101'
  heading: Refund may be applied in satisfaction of debt due state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: The amount of any refund to be certified to the treasurer of state and the
    director of budget and management pursuant to section 5741.10 of the Revised Code
    may be reduced by the amount the person claiming the refund is indebted to the
    state for any tax or fee administered by the tax commissioner that is paid to
    the state or to the clerk of courts pursuant to section 4505.06 of the Revised
    Code, or any charge, penalty, or interest arising from such a tax or fee. If the
    amount refundable is less than the amount of the debt, it may be applied in partial
    satisfaction of the debt. If the amount refundable is greater than the amount
    of the debt, the amount remaining after satisfaction of the debt shall be refunded.
    If the person has more than one such debt, any debt subject to section 5739.33
    or division (G) of section 5747.07 of the Revised Code shall be satisfied first.
    This section applies only to debts that have become final.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.101
- number: '5741.11'
  heading: Liability of seller for failure to collect and remit tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) Except as otherwise provided in divisions (B) and (C) of this section,
    if any seller who is required or authorized to collect the tax imposed by or pursuant
    to section 5741.02, 5741.021, 5741.022, or 5741.023 of the Revised Code fails
    to do so, the seller shall be liable personally for such amount as the seller
    failed to collect. If any seller collects the tax imposed by or pursuant to any
    such section and fails to remit the same to the state as prescribed, the seller
    shall be personally liable for any amount collected that the seller failed to
    remit. The tax commissioner may make an assessment against such seller, based
    upon any information within the commissioner''s possession. The commissioner shall
    give to the seller written notice of such assessment. Such notice shall be served
    upon the seller in the manner provided in section 5703.37 of the Revised Code.

    (B) A marketplace facilitator is relieved of all liability under division (A)
    of this section for failure to collect the tax imposed by or pursuant to section
    5741.02, 5741.021, 5741.022, or 5741.023 of the Revised Code on a sale facilitated
    by the marketplace facilitator on behalf of an unaffiliated marketplace seller
    if it is demonstrated to the satisfaction of the commissioner that the marketplace
    facilitator made a reasonable effort to obtain sufficient and accurate information
    about the sale from the marketplace seller and that the marketplace facilitator
    failed to collect the correct amount of tax because of insufficient or incorrect
    information provided by the marketplace seller.

    If a marketplace facilitator is relieved of liability under this division, the
    marketplace seller for which the sale was facilitated and the purchaser are personally
    liable for any amount of tax that is not properly collected, paid, or remitted.

    (C) Division (B) of this section does not absolve a marketplace facilitator, marketplace
    seller, or any other person from personal liability for collecting but failing
    to remit the tax imposed by or pursuant to section 5741.02, 5741.021, 5741.022,
    or 5741.023 of the Revised Code.

    (D) No class action may be brought against a marketplace facilitator in any court
    of this state on behalf of consumers arising from or in any way related to an
    overpayment of the tax imposed by or pursuant to section 5741.02, 5741.021, 5741.022,
    or 5741.023 of the Revised Code on sales facilitated by the marketplace facilitator,
    regardless of whether the claim is characterized as a tax refund claim.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.11
- number: '5741.12'
  heading: Return required by seller or user - payment of tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) Each seller required by section 5741.17 of the Revised Code to register
    with the tax commissioner, and any seller authorized by the commissioner to collect
    the tax imposed by or pursuant to section 5741.02, 5741.021, 5741.022, or 5741.023
    of the Revised Code is subject to the same requirements and entitled to the same
    deductions and discount for prompt payments as are vendors under section 5739.12
    of the Revised Code, and the same monetary allowances as are vendors under section
    5739.06 of the Revised Code. The powers and duties of the commissioner with respect
    to returns and tax remittances under this section shall be identical with those
    prescribed in section 5739.12 of the Revised Code.

    (B) Every person storing, using, or consuming tangible personal property or receiving
    the benefit of a service, the storage, use, consumption, or receipt of which is
    subject to the tax imposed by or pursuant to section 5741.02, 5741.021, 5741.022,
    or 5741.023 of the Revised Code, when such tax was not paid to a seller, shall,
    on or before the twenty-third day of each month, file with the tax commissioner
    a return for the preceding month in such form as is prescribed by the commissioner,
    showing such information as the commissioner deems necessary, and shall pay the
    tax shown on the return to be due. Remittance shall be made payable to the treasurer
    of state. The commissioner may require consumers to file returns and pay the tax
    at other than monthly intervals, if the commissioner determines that such filing
    is necessary for the efficient administration of the tax. If the commissioner
    determines that a consumer''s tax liability is not such as to merit monthly filing,
    the commissioner may authorize the consumer to file returns and pay tax at less
    frequent intervals.

    Any consumer required to file a return and pay the tax under this section whose
    payment for any year equals or exceeds the amount shown in division (A) of section
    5741.121 of the Revised Code is subject to the accelerated tax payment requirements
    in divisions (B) and (C) of that section.

    (C) Every person storing, using, or consuming a motor vehicle, watercraft, or
    outboard motor, the ownership of which must be evidenced by certificate of title,
    shall file the return required by this section and pay the tax due at or prior
    to the time of filing an application for certificate of title.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.12
- number: '5741.121'
  heading: Tax payments by electronic funds transfer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) If the total amount of tax required to be paid by a seller or consumer
    under section 5741.12 of the Revised Code for any year equals or exceeds seventy-five
    thousand dollars, the seller or consumer shall remit each monthly tax payment
    in the second ensuing and each succeeding year on an accelerated basis as prescribed
    by division (B) of this section.

    If a seller''s or consumer''s tax payment for each of two consecutive years is
    less than seventy-five thousand dollars, the seller or consumer is relieved of
    the requirement to remit taxes on an accelerated basis for the year that next
    follows the second of the consecutive years in which the tax payment is less than
    that amount, and is relieved of that requirement for each succeeding year, unless
    the tax payment in a subsequent year equals or exceeds seventy-five thousand dollars.

    The tax commissioner shall notify each seller or consumer required to make accelerated
    tax payments of the seller''s or consumer''s obligation to do so and shall maintain
    an updated list of those sellers and consumers. Failure by the tax commissioner
    to notify a seller or consumer subject to this section to remit taxes on an accelerated
    basis does not relieve the seller or consumer of the obligation to remit taxes
    as provided under division (B) of this section.

    (B) Sellers and consumers required by division (A) of this section to make accelerated
    tax payments shall electronically remit such payments to the tax commissioner,
    in a manner approved by the commissioner, as follows:

    (1) On or before the twenty-third day of each month, a seller or consumer shall
    remit an amount equal to seventy-five per cent of the anticipated tax liability
    for that month.

    (2) On or before the twenty-third day of each month, a seller shall report the
    taxes collected and a consumer shall report the taxes due for the previous month
    and shall remit that amount, less any amounts paid for that month as required
    by division (B)(1) of this section.

    The payment of taxes on an accelerated basis under this section does not affect
    a seller''s or consumer''s obligation to file returns and pay the tax shown on
    the returns to be due as required under section 5741.12 of the Revised Code.

    (C) A seller or consumer required by this section to remit taxes on an accelerated
    basis may apply to the tax commissioner in the manner prescribed by the commissioner
    to be excused from that requirement. The commissioner may excuse the seller or
    consumer from remittance on an accelerated basis for good cause shown for the
    period of time requested by the seller or consumer or for a portion of that period.

    (D)(1)(a) If a seller or consumer that is required to remit payments under division
    (B) of this section fails to make a payment required under division (B)(1) of
    this section, or makes a payment under division (B)(1) of this section that is
    less than seventy-five per cent of the actual liability for that month, the commissioner
    may impose an additional charge not to exceed five per cent of that unpaid amount.

    (b) Division (D)(1)(a) of this section does not apply if the seller''s or consumer''s
    payment under division (B)(1) of this section is equal to or greater than seventy-five
    per cent of the seller''s or consumer''s reported liability for the same month
    in the immediately preceding calendar year.

    (2) Any additional charge imposed under division (D)(1) of this section is in
    addition to any other penalty or charge imposed under this chapter, and shall
    be considered as revenue arising from taxes imposed under this chapter. An additional
    charge may be collected by assessment in the manner prescribed by section 5741.13
    of the Revised Code. The tax commissioner may waive all or a portion of such a
    charge and may adopt rules governing such waiver.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.121
- number: '5741.122'
  heading: Returns of taxpayers using electronic funds transfer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) If required by the tax commissioner, a person required to make payments
    under section 5741.121 of the Revised Code shall file all returns and reports
    electronically. The commissioner may require the person to use the Ohio business
    gateway, as defined in section 718.01 of the Revised Code, or any other electronic
    means approved by the commissioner, to file the returns and reports, or to remit
    the tax, in lieu of the manner prescribed under section 5741.121 of the Revised
    Code.

    (B) A person required under this section to file reports and returns electronically
    may apply to the tax commissioner to be excused from that requirement. Applications
    shall be made on a form prescribed by the commissioner. The commissioner may approve
    the application for good cause.

    (C)(1) If a person required to file a report or return electronically under this
    section fails to do so, the tax commissioner may impose an additional charge not
    to exceed the following:

    (a) For each of the first two failures, five per cent of the amount required to
    be reported on the report or return;

    (b) For the third and any subsequent failure, ten per cent of the amount required
    to be reported on the report or return.

    (2) The charges authorized under division (C)(1) of this section are in addition
    to any other charge or penalty authorized under this chapter, and shall be considered
    as revenue arising from taxes imposed under this chapter. An additional charge
    may be collected by assessment in the manner prescribed by section 5741.13 of
    the Revised Code. The commissioner may waive all or a portion of such a charge
    and may adopt rules governing such waiver.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.122
- number: '5741.13'
  heading: Assessment for failure to make return or pay tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) Except as provided in division (B) of this section:

    (1) If any person required by section 5741.12 of the Revised Code to make a return
    to the tax commissioner fails to make such return at the time required by or under
    authority of such section, the commissioner may make an assessment against such
    person, based upon any information within the commissioner''s possession. The
    commissioner shall give to such person written notice of the assessment as provided
    in section 5703.37 of the Revised Code.

    (2) If information in the possession of the commissioner indicates that the tax
    paid by any consumer is less than that due, the commissioner may audit a representative
    sample of that consumer''s purchases and may issue an assessment based thereon.
    The commissioner shall make a good faith effort to reach agreement with the consumer
    on selecting a representative sample.

    (3) If information in the possession of the commissioner indicates that the amount
    required to be collected or paid under this chapter is greater than the amount
    remitted by the seller, the commissioner may audit a representative sample of
    the seller''s sales to determine the per cent of exempt or taxable transactions
    or the effective tax rate and may issue an assessment based on the audit. The
    commissioner shall make a good faith effort to reach agreement with the seller
    in selecting a representative sample.

    (B) The commissioner may audit only the marketplace facilitator for sales with
    respect to which the marketplace facilitator is treated as the seller pursuant
    to division (E) of section 5741.01 of the Revised Code and may not audit the marketplace
    seller on behalf of which the sale was facilitated. This division does not absolve
    a marketplace seller or the purchaser from personal liability under division (B)
    of section 5741.11 of the Revised Code for taxes that are not properly collected,
    paid, or remitted due to the inability of the marketplace facilitator to obtain
    accurate information about the sale from the marketplace seller.'
