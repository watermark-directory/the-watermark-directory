- number: '5727.031'
  heading: Report by entity incidentally supplying electricity
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) A person that is engaged in some other primary business to which the
    supplying of electricity to others is incidental shall file a report under section
    5727.08 of the Revised Code as an electric company but shall only report therein
    as taxable property the amounts required in divisions (B) and (C) of this section.
    All time limits and other procedural requirements of this chapter for the reporting
    and assessment of property of electric companies apply to persons required to
    file a report under this section. For the purposes of this section, "the supplying
    of electricity to others" shall not include donating all of the electricity a
    person generates to a political subdivision of the state.

    (B) A person subject to this section shall report the true value of the boilers,
    machinery, equipment, and any personal property used to supply electricity to
    others, which shall be the sum of the following:

    (1) The true value of the property that is production equipment as it would be
    determined for an electric company under section 5727.11 of the Revised Code multiplied
    by the per cent of the electricity generated in the preceding calendar year that
    was not used by the person who generated it; plus

    (2) The true value of the property that is not production equipment as it would
    be determined for an electric company under section 5727.11 of the Revised Code
    multiplied by the per cent of the electricity generated in the preceding calendar
    year that was not used by the person who generated it.

    (C) The property reported under division (B) of this section shall be listed and
    assessed at an amount equal to the sum of the products determined under divisions
    (C)(1) and (2) of this section.

    (1) Multiply the portion of the true value determined under division (B)(1) of
    this section by the assessment rate in section 5727.111 of the Revised Code that
    is applicable to the production equipment of an electric company;

    (2) Multiply the portion of the true value determined under division (B)(2) of
    this section by the assessment rate in section 5727.111 of the Revised Code that
    is applicable to the property of an electric company that is not production equipment.'
