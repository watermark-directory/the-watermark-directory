    name: Taxable Property - Exemptions
  text: The legislative authority of a county, township, or municipal corporation
    that grants an exemption from taxation under Chapter 725. or 1728. or section
    3735.67, 5709.40, 5709.41, 5709.45, 5709.62, 5709.63, 5709.632, 5709.73, or 5709.78
    of the Revised Code shall develop policies to ensure that the recipient of the
    exemption practices nondiscriminatory hiring in its operations. As used in this
    section, "nondiscriminatory hiring" means that no individual may be denied employment
