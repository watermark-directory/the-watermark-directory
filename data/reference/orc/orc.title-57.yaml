- number: '5713.031'
  heading: Federally subsidized residential rental property reporting
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: '(A) As used in this section, "federally subsidized residential rental property"
    means property to which one or more of the following apply:

    (1) It is part of a qualified low-income housing project, through its compliance
    and extended use period, as those terms are defined in section 42 of the Internal
    Revenue Code, or any other period during which it is similarly restricted under
    section 42 of the Internal Revenue Code.

    (2) It receives assistance pursuant to section 202 of the "Housing Act of 1959,"
    12 U.S.C. 1701q, and remains restricted pursuant to that section.

    (3) Property that receives assistance pursuant to Section 811 of the "Cranston-Gonzalez
    National Affordable Housing Act," 42 U.S.C. 8013, and remains restricted pursuant
    to that section;

    (4) Property that receives project-based assistance pursuant to section 8 of the
    "United States Housing Act of 1937," 42 U.S.C. 1437f, and remains restricted pursuant
    to that section;

    (5) Property that receives assistance pursuant to section 515 of the "Housing
    Act of 1949," 42 U.S.C. 1485, and remains restricted pursuant to that section;

    (6) Property that receives assistance pursuant to section 538 of the "Housing
    Act of 1949," 42 U.S.C. 1490p-2, and remains restricted pursuant to that section;

    (7) Property that receives assistance pursuant to section 521 of the "Housing
    Act of 1949," 42 U.S.C. 1490a, and remains restricted pursuant to that section.

    (B) An owner of federally subsidized residential rental property shall file with
    the county auditor of the county in which the property is located the following
    information from the preceding calendar year or up to three preceding calendar
    years, as applicable:

    (1) The operating income of the property which shall include gross potential rent,
    any forgiveness of or allowance received for losses due to vacancy or unpaid rent,
    and any income derived from other sources;

    (2) The operating expenses of the property including all non-capitalized expenses
    related to staffing, utilities, repairs, supplies, telecommunication, management
    fees, audits, legal and contract services, and any other expense a prospective
    buyer might consider in purchasing the property. Real property taxes, depreciation,
    and amortization expenses and replacement of short-term capitalized assets shall
    be excluded from operating expenses.

    (3) The annual amount of contribution to replacement reserve funds or accounts
    related to the property.

    (C)(1) The information required under division (B) of this section shall be filed
    by the owner both before the property is placed in service and after the commencement
    of the property''s operations, and each following year to which section 5715.24
    of the Revised Code applies in the county, on or before the first day of March.
    Each such filing in a reappraisal or update year shall report the information
    required under division (B) of this section for the preceding three calendar years
    or for the period of time the property has been in operation, if less than three
    years.

    (2) Information filed under this section shall have first been audited by an independent
    public accountant or auditor or a certified public accountant prior to filing.
    If such an audit is not completed by the first day of March, the owner of the
    property shall file updated records within thirty days after the completion of
    such an audit.

    (3) If a property owner fails to timely submit the information required under
    division (B) of this section, the county auditor is not required to value the
    property in accordance with division (A)(4) of section 5715.01 of the Revised
    Code for any applicable tax year to which that division would have applied and
    shall otherwise proceed under section 5713.01 of the Revised Code to value the
    property in compliance with Ohio Constitution, Article XII, Section 2 for that
    tax year.

    (D) The county auditor shall use the information submitted under this section
    to determine the valuation of the property pursuant to rules adopted under division
    (A)(4) of section 5715.01 of the Revised Code.

    (E) Any information submitted under this section is not a public record for purposes
    of section 149.43 of the Revised Code.'
