  heading: Duties of county treasurer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'The tax commissioner may designate such of his examiners, experts, accountants,
    and other assistants as he deems necessary for the purpose of aiding in the administration
    of taxes levied under Chapter 5731. of the Revised Code; and the provisions of
    Chapter 5731. of the Revised Code shall be deemed a law which the tax commissioner
    is required to administer for the purposes of sections 5703.17 to 5703.37, inclusive,
    5703.39, and 5703.41 of the Revised Code. The tax commissioner shall in the administration
    of the taxes levied under Chapter 5731. of the Revised Code see that the proceedings
    are instituted and carried to determination in all cases in which a tax is due.

    The tax commissioner may adopt and promulgate regulations not inconsistent with
    sections 5731.01 to 5731.52, inclusive, of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.45
- number: '5731.46'
  heading: Fees of sheriff and other officers
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: The county treasurer shall keep an account showing the amount of all taxes
    and interest received by the treasurer under Chapter 5731. of the Revised Code.
    On the twenty-fifth day of February of each year, the treasurer shall settle with
    the county auditor for all such taxes and interest so received in the preceding
    calendar year and not included in any prior settlement, showing for what estate,
    by whom, and when paid. At each such settlement the auditor shall allow to the
    treasurer and to the auditor, on the money so collected and accounted for by the
    auditor, their respective fees under section 319.54 or 321.27 of the Revised Code.
    The correctness thereof, together with a statement of the fees allowed at such
    settlement, and the fees and expenses allowed to the officers shall be certified
    by the auditor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.46
- number: '5731.47'
  heading: Payment of fees of officers and expenses of county auditor
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: The fees of the sheriff or other officers for services performed under this
    chapter and the expenses of the county auditor shall be certified by the county
    auditor by a report filed with the tax commissioner. If the tax commissioner finds
    that those fees and expenses are correct and reasonable in amount, the tax commissioner
    shall indicate approval of the fees and expenses in writing to the county auditor.
    The county auditor shall pay those fees and expenses out of the undivided estate
    tax fund. The county auditor then shall deduct, from the amount required to be
    credited to each of the funds or boards of education listed or referred to in
    division (A) of section 5731.48 of the Revised Code, a pro rata share of the amount
    so paid. The pro rata share shall be computed on the basis of the proportions
    of the gross taxes levied and paid under this chapter that are required to be
    credited to the funds or boards of education listed or referred to under that
    section. The county auditor shall draw warrants payable from those taxes on the
    county treasurer in favor of the fee funds or officers personally entitled to
    the fees and expenses.
