- number: '5747.48'
  heading: Distribution of county library and local government support fund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: 'On the fifteenth day of each month, the county treasurer shall distribute
    the balance in the county public library fund among the county, boards of public
    library trustees, municipal corporations, and boards of township park commissioners
    for which the county budget commission has fixed an allocation from the fund in
    that year in accordance with section 5705.32 of the Revised Code in the same proportions
    that each such entity''s allocation as fixed by the commission is of the total
    of all such allocations in that year.

    All money received into the treasury of a municipal corporation or county shall
    be credited to the general fund therein, provided that in a municipal corporation
    there shall be credited to the funds established under division (D) of section
    5705.09 of the Revised Code a portion of the total amount to be credited to funds
    of the municipal corporation, which portion shall be determined by multiplying
    the total amount to be credited by the percentage that the funds credited under
    division (D) of said section in 1938 bore to all the funds credited under said
    section in 1938. If a municipal corporation is in default with respect to the
    principal or interest of any outstanding notes or bonds, the moneys distributed
    under this section shall be credited to the funds established under divisions
    (A), (B), (C), and (D) of section 5705.09 of the Revised Code, in the same proportion
    in which the funds derived from the levy for the previous year on the general
    tax list and duplicate are divided.'
