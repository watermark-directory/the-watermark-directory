- number: '5747.01'
  heading: Definitions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: 'Except as otherwise expressly provided or clearly appearing from the context,
    any term used in this chapter that is not otherwise defined in this section has
    the same meaning as when used in a comparable context in the laws of the United
    States relating to federal income taxes or if not used in a comparable context
    in those laws, has the same meaning as in section 5733.40 of the Revised Code.
    Any reference in this chapter to the Internal Revenue Code includes other laws
    of the United States relating to federal income taxes.

    As used in this chapter:

    (A) "Adjusted gross income" or "Ohio adjusted gross income" means federal adjusted
    gross income, as defined and used in the Internal Revenue Code, adjusted as provided
    in this section:

    (1) Add interest or dividends on obligations or securities of any state or of
    any political subdivision or authority of any state, other than this state and
    its subdivisions and authorities.

    (2) Add interest or dividends on obligations of any authority, commission, instrumentality,
    territory, or possession of the United States to the extent that the interest
    or dividends are exempt from federal income taxes but not from state income taxes.

    (3) Deduct interest or dividends on obligations of the United States and its territories
    and possessions or of any authority, commission, or instrumentality of the United
    States to the extent that the interest or dividends are included in federal adjusted
    gross income but exempt from state income taxes under the laws of the United States.

    (4) Deduct disability and survivor''s benefits to the extent included in federal
    adjusted gross income.

    (5) Deduct the following, to the extent not otherwise deducted or excluded in
    computing federal or Ohio adjusted gross income:

    (a) Benefits under Title II of the Social Security Act and tier 1 railroad retirement;

    (b) Railroad retirement benefits, other than tier 1 railroad retirement benefits,
    to the extent such amounts are exempt from state taxation under federal law.

    (6) Deduct the amount of wages and salaries, if any, not otherwise allowable as
    a deduction but that would have been allowable as a deduction in computing federal
    adjusted gross income for the taxable year, had the work opportunity tax credit
    allowed and determined under sections 38, 51, and 52 of the Internal Revenue Code
    not been in effect.

    (7) Deduct any interest or interest equivalent on public obligations and purchase
    obligations to the extent that the interest or interest equivalent is included
    in federal adjusted gross income.

    (8) Add any loss or deduct any gain resulting from the sale, exchange, or other
    disposition of public obligations to the extent that the loss has been deducted
    or the gain has been included in computing federal adjusted gross income.

    (9) Deduct or add amounts, as provided under section 5747.70 of the Revised Code,
    related to contributions made to or tuition units purchased under a qualified
    tuition program established pursuant to section 529 of the Internal Revenue Code.

    (10)(a) Deduct, to the extent not otherwise allowable as a deduction or exclusion
    in computing federal or Ohio adjusted gross income for the taxable year, the amount
    the taxpayer paid during the taxable year for medical care insurance and qualified
    long-term care insurance for the taxpayer, the taxpayer''s spouse, and dependents.
    No deduction for medical care insurance under division (A)(10)(a) of this section
    shall be allowed either to any taxpayer who is eligible to participate in any
    subsidized health plan maintained by any employer of the taxpayer or of the taxpayer''s
    spouse, or to any taxpayer who is entitled to, or on application would be entitled
    to, benefits under part A of Title XVIII of the "Social Security Act," 49 Stat.
    620 (1935), 42 U.S.C. 301, as amended. For the purposes of division (A)(10)(a)
    of this section, "subsidized health plan" means a health plan for which the employer
