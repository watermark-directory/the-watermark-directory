- number: '5727.08'
  heading: Annual report
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'On or before the first day of March, annually, each public utility and interexchange
    telecommunications company, and, for tax years 2009 and thereafter, each public
    utility property lessor, shall file a report with the tax commissioner, on a form
    prescribed by the tax commissioner. The report shall include such information
    as the tax commissioner requires to enable the tax commissioner to make any assessment
    or apportionment required under this chapter.

    The report shall be signed by either the owner of the public utility, interexchange
    telecommunications company, or public utility property lessor or the president,
    secretary, treasurer, or another duly authorized person.

    If such a public utility, interexchange telecommunications company, or lessor
    fails to file the report on or before the first day of March, or the date it is
    due under an extension allowed pursuant to section 5727.48 of the Revised Code,
    or fails to accurately report all taxable property, the tax commissioner may impose
    a penalty of up to fifty per cent of the taxable value of the property that was
    not timely or accurately reported. However, if such a public utility, company,
    or lessor files, within sixty days after the first day of March or the extended
    due date, the report or an amended report and discloses all items of taxable property
    that are required by this chapter to be reported, the penalty shall not be more
    than five per cent of the taxable value that was not timely or accurately reported.
    The penalty shall be added to and considered a part of the total taxable value
    of the property that was not timely or accurately reported, and may be abated
    in whole or in part by the tax commissioner pursuant to a petition for reassessment
    filed under section 5727.47 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.08
- number: '5727.10'
  heading: Assessment - hearing - correction
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'Annually, the tax commissioner shall determine, in accordance with section
    5727.11 of the Revised Code, the true value in money of all taxable property,
    except property of a railroad company, required by section 5727.06 of the Revised
    Code to be assessed by the commissioner. The commissioner also shall determine
    the total taxable value of such property based on the percentages of true value
    at which the property is required to be assessed by section 5727.111 of the Revised
    Code.

    The commissioner shall be guided by the information contained in the report filed
    by the public utility and such other evidence and rules as will enable the commissioner
    to make these determinations.

    Before issuing the preliminary assessment under section 5727.23 of the Revised
    Code, the commissioner shall notify each public utility of the proposed total
    taxable value of its taxable property, including any proposed penalty. After receiving
    such notice, a public utility may, upon written application, within the time prescribed
    by the commissioner, appear before the commissioner and be heard in the matter
    of the proposal. The commissioner may, on the application of a public utility,
    or on the commissioner''s own motion, correct the proposal.'
