    shall be considered as revenue arising from the tax imposed by this chapter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.32
- number: '5726.33'
  heading: Interest or penalty on qualifying refund overpayment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) As used in this section, "qualifying refund overpayment" means an amount
    received by a taxpayer in excess of a refund claimed or a request for payment
    made by the reporting person for the taxpayer on a return, report, or other document
    filed with the tax commissioner.

    (B) A taxpayer is not liable for any interest or penalty with respect to the repayment
    of a qualifying refund overpayment if the reporting person for the taxpayer pays
    the entire amount of the qualifying refund overpayment to the commissioner not
    later than thirty days after the taxpayer receives an assessment for the amount.
    If the reporting person does not pay the entire amount of the overpayment to the
    commissioner within the time prescribed by this section, interest shall accrue
    on the amount of the deficiency pursuant to section 5726.32 of the Revised Code
    from the date the commissioner issues the assessment until the date the deficiency
    is paid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.33
- number: '5726.36'
  heading: Notification of changes in ownership or applicability of chapter
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: '(A) A person shall notify the tax commissioner when the person is no longer
    subject to the tax imposed by this chapter.

    (B) If the ownership structure of a financial institution changes such that a
    person is no longer includable in the annual report of the financial institution,
    the reporting person for the financial institution shall notify the commissioner
    of the change when the reporting person files its next annual report or in writing
    prior to the due date of that report.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.36
- number: '5726.40'
  heading: Cancellation of authority to to business in Ohio
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: If a person, wherever organized, doing business in this state or owning or
    issuing all or part of the entity's capital or property in this state, and required
    by law to file any report or return or to pay any tax or fee under Title LVII
    of the Revised Code, fails or neglects to make such report or return or to pay
    any such tax or fee for ninety days after the time prescribed by law for making
    such report or return or for paying such tax or fee, the tax commissioner shall
    certify such fact to the secretary of state. The secretary of state shall thereupon
    cancel the document of creation authorizing the person to do business in this
    state. Upon such cancellation, all of the powers, privileges, and franchises conferred
    upon that person by its document of creation shall cease, subject to section 1701.88
    of the Revised Code. The secretary of state shall immediately notify the person
    of the action taken by the secretary, and shall also forward for filing a certificate
    of the action so taken to the county recorder of the county in which the principal
    place of business of the person in this state is located. No fee shall be charged
    for the filing.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5726.40
- number: '5726.41'
  heading: Penalty for continuing after cancellation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5726'
    name: Financial Institutions Tax
  text: No person shall exercise, or attempt to exercise, any powers, privileges,
    or franchises under the person's document of creation after the document is canceled
    pursuant to section 5726.40 of the Revised Code. A penalty of one hundred dollars
