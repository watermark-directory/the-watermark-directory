- number: '5713.22'
  heading: Taxation of forest lands - forest land defined
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: As used in sections 5713.22 to 5713.26 of the Revised Code, "forest land"
    consists of any land bearing a stand of trees which the chief of the division
    of forestry determines is suitable for classification under such sections.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.22
- number: '5713.23'
  heading: Taxation of forest lands - rate - method of determining forest land subject
    to tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: 'Forest land which the owner thereof declares is devoted exclusively to forestry
    or timber growing under the rules prescribed under the authority of section 5713.24
    of the Revised Code, shall be taxed annually at fifty per cent of the local tax
    rate upon its value as determined under sections 5701.02 and 5713.04 of the Revised
    Code.

    The method of determining forest lands or land bearing forest growth which is
    subject to this section, and the manner in which an owner of forest lands may
    declare that such lands are devoted to timber growing shall be prescribed under
    such rules, but in no case shall areas devoted to forestry be considered subject
    to this section until the fee established in accordance with section 5713.24 of
    the Revised Code is paid and such declarations of the owners have been approved
    and certified by the chief of the division of forestry, and copies of the declarations
    have been filed by the chief with the county auditor of the county in which such
    lands are located.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.23
- number: '5713.24'
  heading: Rules, forms, tax blanks - application fee
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: All rules, forms, and tax blanks that are used in the administration of sections
    5713.22 to 5713.26 of the Revised Code shall be prepared by the chief of the division
    of forestry and become effective when approved by the tax commissioner. The chief
    also shall determine the amount of a fee, payable to the division of forestry,
    that shall be submitted with each application seeking a determination of forest
    lands or land bearing forest growth as provided in section 5713.23 of the Revised
    Code. The chief shall establish the fee by rule in accordance with Chapter 119.
    of the Revised Code and each such fee received by him shall be paid into the state
    treasury to the credit of the state forest fund created by section 1503.05 of
    the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.24
- number: '5713.25'
  heading: Withdrawal of forest lands from classification
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: Forest lands which have been listed for taxation in accordance with section
    5713.23 of the Revised Code may be withdrawn from such class upon certification
    to the chief of the division of forestry of such intention by the owner thereof.
    The chief shall send a copy of said certification to the county auditor of the
    county in which such lands are located, who shall thereupon tax such land at the
    full rate thereafter.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5713.25
- number: '5713.26'
  heading: Failure to conform to rules - posting of notice
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: 'Any owner of forest land taxed in accordance with section 5713.23 of the
    Revised Code who in the opinion of the chief of the division of forestry has not
    exercised reasonable care in the protection and maintenance of the forest or who
    has violated the rules of the chief as to the care and management of such lands
    shall receive notice in writing of such violation from the chief. The owner shall
    be granted, upon his written application for the same, six months in which to
    correct said violations, and failure to correct the violations within this period
    voids his declaration filed with the chief in accordance with such section, and
    the county auditor shall be notified to tax those lands at the full rate thereafter.

    Owners of forest land taxed in accordance with such section shall post in prominent
    locations on the borders of each parcel of said forest and maintain in legible
    condition at least two metal signs similar to those obtainable from the chief
    stating the rules applying to said forest.'
