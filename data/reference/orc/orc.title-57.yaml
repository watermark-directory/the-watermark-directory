  url: https://codes.ohio.gov/ohio-revised-code/section-5721.021
- number: '5721.03'
  heading: County auditor to compile delinquent tax list and delinquent vacant land
    tax list - publication
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A) At the time of making the delinquent land list, as provided in section
    5721.011 of the Revised Code, the county auditor shall compile a delinquent tax
    list consisting of all lands on the delinquent land list on which taxes have become
    delinquent at the close of the collection period immediately preceding the making
    of the delinquent land list. The auditor shall also compile a delinquent vacant
    land tax list of all delinquent vacant lands prior to the institution of any foreclosure
    and forfeiture actions against delinquent vacant lands under section 5721.14 of
    the Revised Code or any foreclosure actions against delinquent vacant lands under
    section 5721.18 of the Revised Code.

    The delinquent tax list, and the delinquent vacant land tax list if one is compiled,
    shall contain all of the information included on the delinquent land list, except
    that, if the auditor''s records show that the name of the person in whose name
    the property currently is listed is not the name that appears on the delinquent
    land list, the name used in the delinquent tax list or the delinquent vacant land
    tax list shall be the name of the person the auditor''s records show as the person
    in whose name the property currently is listed.

    Lands that have been included in a previously published delinquent tax list shall
    not be included in the delinquent tax list so long as taxes have remained delinquent
    on such lands for the entire intervening time.

    In either list, there may be included lands that have been omitted in error from
    a prior list and lands with respect to which the auditor has received a certification
    that a delinquent tax contract has become void since the publication of the last
    previously published list, provided the name of the owner was stricken from a
    prior list under section 5721.02 of the Revised Code.

    (B)(1) The auditor shall cause the delinquent tax list and the delinquent vacant
    land tax list, if one is compiled, to be published twice within sixty days after
    the delivery of the delinquent land duplicate to the county treasurer. The first
    publication shall be made in a newspaper of general circulation in the county.
    The second publication may be made either in a newspaper of general circulation
    in the county or on a web site maintained or approved by the county. If the second
    publication is made on such a web site, the auditor shall remove or cause to be
    removed the list or lists from that web site two weeks after publication.

    (2) When publication is made in a newspaper of general circulation in the county,
    the auditor shall comply with the following requirements:

    (a) The newspaper shall meet the requirements of section 7.12 of the Revised Code.
    The auditor may publish the list or lists on a preprinted insert in the newspaper.
    The cost of the second newspaper publication, if applicable, shall not exceed
    three-fourths of the cost of the first publication of the list or lists.

    (b) The auditor shall insert display notices of the forthcoming publication of
    the delinquent tax list and, if it is to be published, the delinquent vacant land
    tax list once a week for two consecutive weeks in the newspaper. The display notices
    shall contain the times and methods of payment of taxes provided by law, including
    information concerning installment payments made in accordance with a written
    delinquent tax contract. The display notice for the delinquent tax list also shall
    include a notice that an interest charge will accrue on accounts remaining unpaid
    after the last day of November unless the taxpayer enters into a written delinquent
    tax contract to pay such taxes in installments. The display notice for the delinquent
    vacant land tax list, if it is to be published, also shall include a notice that
    delinquent vacant lands in the list are lands on which taxes have remained unpaid
    for one year after being certified delinquent, and that they are subject to foreclosure
    proceedings as provided in section 323.25, sections 323.65 to 323.79, or section
    5721.18 of the Revised Code, or foreclosure and forfeiture proceedings as provided
    in section 5721.14 of the Revised Code. Each display notice also shall state that
    the lands are subject to a tax certificate sale under section 5721.32 or 5721.33
    of the Revised Code or assignment to a county land reutilization corporation,
    as the case may be, and shall include any other information that the auditor considers
    pertinent to the purpose of the notice. The display notices shall be furnished
    by the auditor to the newspaper selected to publish the lists at least ten days
    before their first publication.

    (c) Publication of the list or lists may be made by a newspaper in installments,
    provided the complete publication of each list is made twice during the sixty-day
    period as provided in division (B)(1) of this section.

    (3) The delinquent tax list shall be accompanied by a notice that the delinquent
    lands will be certified for foreclosure by the auditor unless the taxes, assessments,
    interest, and penalties due and owing on them are paid. If a delinquent vacant
    land tax list is to be published, it shall be accompanied by a notice that delinquent
    vacant lands will be certified for foreclosure or foreclosure and forfeiture by
    the auditor unless the taxes, assessments, interest, and penalties due and owing
    on them are paid within twenty-eight days after the final publication of the notice.

    (4) The auditor shall review the first publication of each list for accuracy and
    completeness and may correct any errors appearing in the list in the second publication.

    (5) Nothing in this section prohibits a foreclosure action from being brought
    against a parcel of land under section 323.25, sections 323.65 to 323.79, or section
    5721.18 of the Revised Code before the delinquent tax list or delinquent vacant
    land tax list that includes the parcel is published pursuant to division (B)(1)
    of this section if the list is not published within the time prescribed by that
    division.

    (C) For the purposes of section 5721.18 of the Revised Code, land is first certified
    delinquent on the date of the certification of the delinquent land list containing
    that land.'
