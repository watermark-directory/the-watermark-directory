    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: The levy of any excise, income, or property tax by the state or by any political
    subdivision thereof shall not be construed as preempting the power of a county
    or transit authority to levy an additional use tax pursuant to section 5741.021,
    5741.022, or 5741.023 of the Revised Code. No tax levied by a board of county
