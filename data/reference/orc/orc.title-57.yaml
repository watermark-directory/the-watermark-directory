- number: '5705.197'
  heading: 'Fixed-sum levy: form of ballot'
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) The form of the ballot to be used at the election provided for in section
    5705.195 of the Revised Code shall be as follows:

    "Shall a fixed-sum levy be imposed by the _____________ (here insert name of school
    district) for the purpose of paying the current operating expenses of the district
    in the sum of $__________ (here insert annual amount the levy is to produce) and
    a levy of taxes to be made outside of the ten-mill limitation estimated by the
    county auditor to average __________ mills for each $1 of taxable value, which
    amounts to $__________ for each $100,000 of the county auditor''s market value,
    for a period of __________ (here insert the number of years the millage is to
    be imposed) years?


    FOR THE TAX LEVYAGAINST THE TAX LEVY "

    If the tax is to be placed on the current tax list, the form of the ballot shall
    be modified by adding, after "years," the phrase ", commencing in __________ (first
    year the tax is to be levied), first due in calendar year __________ (first calendar
    year in which the tax shall be due)."

    If the levy submitted is a proposal to renew all or a portion of an existing tax
    adopted under division (C) or (D) of section 5705.194 of the Revised Code, the
    form of the ballot specified in this section must be changed by adding the following
    at the beginning of the form, after the first instance of the term "levy":

    (A) "Renewing an existing levy" in the case of a proposal to renew an existing
    tax in the same amount;

    (B) "Renewing part of an existing levy, being a reduction of $______" in the case
    of a renewal of only part of an existing tax.'
