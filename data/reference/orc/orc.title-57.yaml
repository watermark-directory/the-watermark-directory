  heading: Designation of actions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: All actions of the tax commissioner or of the privileges, powers, duties,
    obligations, immunities, and liabilities of other persons or officers shall be
