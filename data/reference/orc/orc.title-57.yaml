- number: '5733.02'
  heading: Annual taxpayer report and remittance - report on dissolution or withdrawal
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: 'Annually, for tax years prior to tax year 2014, between the first day of
    January and the thirty-first day of March or on or before the date as extended
    under section 5733.13 of the Revised Code, each taxpayer shall make a report in
    writing to the tax commissioner in such form as the tax commissioner prescribes,
    and shall remit to the commissioner, with the remittance made payable to the treasurer
    of state, the amount of the tax as shown to be due by such report less the amount
    paid for the year on a declaration of estimated tax report filed by the taxpayer
    as provided by section 5733.021 of the Revised Code. Remittance shall be made
    in the form prescribed by the commissioner, including electronic funds transfer
    if required by section 5733.022 of the Revised Code.

    The commissioner shall furnish corporations, on request, copies of the forms prescribed
    by the commissioner for the purpose of making such report. A domestic corporation
    shall not dissolve, and a foreign corporation shall not withdraw or retire from
    business in Ohio, on or after the first day of January in any year prior to 2014
    without making a franchise tax report to the commissioner and paying or securing
    the tax charged for the year in which such dissolution or withdrawal occurs.

    The annual corporation report shall be signed by the president, vice-president,
    secretary, treasurer, general manager, superintendent, or managing agent in this
    state of such corporation. If a domestic corporation has not completed its organization,
    its annual report shall be signed by one of its incorporators.

    The report shall contain the facts, figures, computations, and attachments that
    result in the tax charged by this chapter and determined in the manner provided
    within the chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5733.02
- number: '5733.021'
  heading: Declaration of estimated tax report
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: '(A) Each taxpayer that does not in January of any year prior to 2014 file
    the report and make the payment required by section 5733.02 of the Revised Code
    shall make and file a declaration of estimated tax report for the tax year.

    The declaration of estimated tax report shall be filed with the tax commissioner
    on or before the last day of January in such form as prescribed by the tax commissioner,
    and shall reflect an estimate of the total amount due under this chapter for the
    tax year.

    (B) A taxpayer required to file a declaration of estimated tax report shall make
    remittance of such estimated tax to the tax commissioner as follows:

    (1) The entire estimated tax at the time of filing the declaration of estimated
    tax report, if such estimated tax is not in excess of the minimum tax as provided
    in section 5733.06 of the Revised Code;

    (2) If the estimated tax is in excess of the minimum tax:

    (a) One-third of the estimated tax at the time of filing the declaration of estimated
    tax report;

    (b) Two-thirds of the estimated tax on or before the last day of March of the
    tax year, if the report required by section 5733.02 of the Revised Code is filed
    on or before the last day of March of the tax year.

    (3) If the estimated tax is in excess of the minimum tax, and an extension of
    time for filing the report required by section 5733.02 of the Revised Code has
    been granted pursuant to section 5733.13 of the Revised Code:

    (a) One-third of the estimated tax at the time of filing the declaration of estimated
    tax report;

    (b) One-third of the estimated tax on or before the last day of March of the tax
    year;

    (c) One-third of the estimated tax on or before the last day of May of the tax
    year.

    Remittance of the estimated tax shall be made payable to the treasurer of state
    and shall be made in the form prescribed by the tax commissioner, including electronic
    funds transfer if required by section 5733.022 of the Revised Code.

    The tax commissioner shall immediately forward to the treasurer of state all amounts
    received under this section, and the treasurer of state shall credit all payments
    of such estimated tax as provided in section 5733.12 of the Revised Code.

    (C)(1)(a) For any period of delinquency ending prior to the first day of June
    of the tax year, the penalty under division (A)(2) of section 5733.28 of the Revised
    Code may be imposed only on the delinquent portion of the estimated tax required
    to be paid under divisions (B)(2)(a) and (b) and (B)(3)(a) and (b) of this section.

    (b) If the taxpayer was not subject to tax for the immediately preceding tax year,
    "estimated tax" for purposes of division (C)(1) of this section is ninety per
    cent of the qualifying net tax for the tax year. If the taxpayer was subject to
    the tax for the immediately preceding tax year, "estimated tax" for purposes of
    division (C)(1) of this section is the lesser of one hundred per cent of the qualifying
    net tax for the immediately preceding tax year or ninety per cent of the qualifying
    net tax for the tax year.

    (2)(a) For any period of delinquency commencing the first day of June of the tax
    year and concluding on the extended due date pursuant to section 5733.13 of the
    Revised Code, the penalty under division (A)(2) of section 5733.28 of the Revised
    Code may be imposed only on the delinquent portion of the estimated tax required
    to be paid under division (B)(3)(c) of this section.

    (b) For purposes of division (C)(2) of this section, "estimated tax" is ninety
    per cent of the qualifying net tax for the tax year.

    (3) If the taxpayer did not file a report under section 5733.02 of the Revised
    Code for the tax year or failed to prepare and file the report in good faith for
    the tax year, "qualifying net tax" as used in division (C) of this section for
    that tax year means the amount described in division (C)(3)(a) of this section.
    Otherwise, "qualifying net tax" as used in division (C) of this section for that
    tax year means the lesser of the amount described in division (C)(3)(a) or (b)
    of this section:

    (a) The tax imposed by sections 5733.06, 5733.065, and 5733.066 of the Revised
    Code for that tax year reduced by the credits listed in section 5733.98 of the
    Revised Code. If the credits exceed the total tax, the qualifying net tax is the
    minimum tax.

    (b) The lesser of the tax shown on the report, prepared and filed in good faith,
    reduced by the credits shown on that report, or the tax shown on an amended report,
    prepared and filed in good faith, reduced by the credits shown on that amended
    report. If the credits shown exceed the total tax shown, the qualifying net tax
    is the minimum tax.'
