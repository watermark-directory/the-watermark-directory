- number: '5701.14'
  heading: Entity operating with nonprofit purpose defined - single member LLC
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5701'
    name: Definitions
  text: 'For purposes of Title LVII of the Revised Code:

    (A) In order to determine a limited liability company''s nonprofit status, an
    entity is operating with a nonprofit purpose under section 1705.02 of the Revised
    Code or carrying on any nonprofit activity under section 1706.05 of the Revised
    Code if that entity is organized other than for the pecuniary gain or profit of,
    and its net earnings or any part of its net earnings are not distributable to,
    its members, its directors, its officers, or other private persons, except that
    the payment of reasonable compensation for services rendered, payments and distributions
    in furtherance of its nonprofit purpose, and the distribution of assets on dissolution
    permitted by section 1702.49 of the Revised Code are not pecuniary gain or profit
    or distribution of net earnings. In no event shall payments and distributions
    in furtherance of an entity''s nonprofit purpose deprive the entity of its nonprofit
    status as long as all of the members of that entity are operating with a nonprofit
    purpose.

    (B) A single member limited liability company that operates with a nonprofit purpose,
    as described in division (A) of this section, shall be treated as part of the
    same legal entity as its nonprofit member, and all assets and liabilities of that
    single member limited liability company shall be considered to be that of the
    nonprofit member. Filings or applications for exemptions or other tax purposes
    may be made either by the single member limited liability company or its nonprofit
    member.'
