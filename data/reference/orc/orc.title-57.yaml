- number: '5709.87'
  heading: Exempting increase in assessed value of realty cleaned of contamination
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) As used in this section:

    (1) "Improvement," "building," "fixture," and "structure" have the same meanings
    as in section 5701.02 of the Revised Code.

    (2) "Property," "remedy," and "remedial activities" have the same meanings as
    in section 3746.01 of the Revised Code.

    (B) The director of environmental protection, after issuing a covenant not to
    sue for property under section 3746.12 of the Revised Code and determining that
    remedies or remedial activities have commenced or been completed at that property
    to the satisfaction of the director, shall certify to the tax commissioner and
    to the director of development services that such a covenant has been issued,
    that such remedies or remedial activities have occurred at that property, and
    the date on which those remedial activities began. The certification shall be
    in such form as is agreed upon by the directors of environmental protection and
    development services and the tax commissioner and shall include a description
    of the property in sufficient detail for the tax commissioner and director of
    development services to determine the boundaries of the property entitled to exemption
    from taxation under this section.

    (C)(1)(a) Upon receipt by the tax commissioner of a certification for property
    under division (B) of this section, the commissioner shall issue an order granting
    an exemption from real property taxation of the increase in the assessed value
    of land constituting property that is described in the certification and of the
    increase in the assessed value of improvements, buildings, fixtures, and structures
    that are situated on that land on the tax lien date of the year in which the remedial
    activities began. For each tax year of the exemption allowed under this section,
    this increase in assessed value shall equal the amount by which the assessed value
    of that land or those improvements, buildings, fixtures, or structures on the
    tax lien date of that year as indicated on the tax list for that year exceeds
    the assessed value of that land or those improvements, buildings, fixtures, or
    structures on the tax lien date of the year in which the remedial activities began
    as indicated on the tax list for that year. The exemption shall commence on the
    first day of the tax year including the day on which the order is issued and shall
    end on the last day of the tenth tax year after issuance of the order. The order
    shall include a description of the property and the tax years for which the property
    is to be exempted from taxation. The commissioner shall send copies of the exemption
    order to the owner of record of the property to which the exemption applies and
    to the county auditor of each county in which any portion of that property is
    located.

    (b) Within sixty days after receiving the commissioner''s order, the owner of
    record of the property may notify the commissioner in writing that the owner does
    not want the exemption from real property taxation provided under division (C)(1)
    of this section to apply. Upon receiving such a notification from the property
    owner of record, the commissioner shall issue a subsequent order rescinding the
    previously granted exemption.

    (2) The director of development services shall maintain a record of certifications
    received under this section for purposes of section 5709.88 of the Revised Code.

    (D) Any sale or other transfer of the property does not affect an exemption granted
    under division (C) of this section. The exemption shall continue in effect thereafter
    for the full period stated in the exemption order.

    (E) If at any time the director revokes a covenant not to sue under Chapter 3746.
    of the Revised Code and rules adopted under it for property concerning which the
    commissioner has issued an exemption order under division (C) of this section,
    the director shall so notify the commissioner and the legislative authority of
    the municipal corporation and county in which the property is located. The commissioner
    immediately shall rescind the exemption order and shall so notify the owner of
    record of the property and the county auditor of each county in which any portion
    of the property is located.

    Upon revocation of the covenant not to sue, the owner of record shall pay the
    amount of taxes that would have been charged against the property had the property
    not been exempted from taxation for the period beginning with commencement of
    the exemption and ending with the date of revocation of the covenant not to sue.
    The county auditor shall return the property to the tax list and enter on the
    tax list the amount so payable as current taxes charged against the property.
    Taxes required to be paid pursuant to this section are payable in full on the
    first succeeding day on which the first one-half of taxes is required to be paid
    under section 323.12 of the Revised Code. If such taxes are not paid in full when
    due, a penalty shall be charged, and interest shall accrue on those taxes, as
    provided in section 323.121 of the Revised Code. In cases of underpayment or nonpayment,
    the deficiency shall be collected as otherwise provided for the collection of
    delinquent real property taxes.'
