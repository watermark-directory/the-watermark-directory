- number: '5701.11'
  heading: References to Internal Revenue Code - election of taxable year
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5701'
    name: Definitions
  text: 'The effective date to which this section refers is the effective date of
    this section as amended by S.B. 9 of the 136th general assembly.

    (A)(1) Except as provided under division (A)(2) or (B) of this section, any reference
    in Title LVII or section 149.311, 3123.90, 3770.07, 3770.071, 3770.072, 3770.073,
    3772.37, or 3775.16 of the Revised Code to the Internal Revenue Code, to the Internal
    Revenue Code "as amended," to other laws of the United States, or to other laws
    of the United States, "as amended," means the Internal Revenue Code or other laws
    of the United States as they exist on the effective date.

    (2) This section does not apply to any reference in Title LVII of the Revised
    Code to the Internal Revenue Code as of a date certain specifying the day, month,
    and year, or to other laws of the United States as of a date certain specifying
    the day, month, and year.

    (B)(1) For purposes of applying section 5733.04, 5745.01, or 5747.01 of the Revised
    Code to a taxpayer''s taxable year ending after March 7, 2025, and before the
    effective date, a taxpayer may irrevocably elect to incorporate the provisions
    of the Internal Revenue Code or other laws of the United States that are in effect
    for federal income tax purposes for that taxable year if those provisions differ
    from the provisions that, under division (A) of this section, would otherwise
    apply. The filing by the taxpayer for that taxable year of a report or return
    that incorporates the provisions of the Internal Revenue Code or other laws of
    the United States applicable for federal income tax purposes for that taxable
    year, and that does not include any adjustments to reverse the effects of any
    differences between those provisions and the provisions that would otherwise apply,
    constitutes the making of an irrevocable election under this division for that
    taxable year.

    (2) Elections under prior versions of division (B)(1) of this section remain in
    effect for the taxable years to which they apply.'
  history: null
