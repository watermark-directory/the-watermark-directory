- number: '5709.48'
  heading: Transportation financing districts; creation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) As used in this section and sections 5709.481, 5709.49, and 5709.50 of
    the Revised Code:

    (1) "Regional transportation improvement project" has the same meaning as in section
    5595.01 of the Revised Code.

    (2) "Improvements" means the increase in the assessed value of any real property
    that would first appear on the tax list and duplicate of real and public utility
    property after the effective date of the resolution adopted under this section
    were it not for the exemption granted by that resolution.

    (B) For the purposes described in division (A) of section 5595.06 of the Revised
    Code, the governing board of a regional transportation improvement project that
    was undertaken pursuant to section 5595.02 of the Revised Code before March 23,
    2018, may, by resolution, create a transportation financing district and declare
    improvements to parcels within the district to be a public purpose and exempt
    from taxation.

    (C) A transportation financing district shall consist of all territory of all
    counties that are participants in the regional transportation improvement project
    funded by the district, except that the district shall not include parcels used
    primarily for residential purposes, parcels that are currently exempt from taxation
    under this section or section 5709.40, 5709.41, 5709.45, 5709.73, or 5709.77 of
    the Revised Code, or parcels excluded from the district under division (G) of
    this section.

    (D) A resolution creating a transportation financing district shall specify all
    of the following:

    (1) The county treasurer''s permanent parcel number associated with each parcel
    included in the district;

    (2)(a) The percentage of improvements to be exempted from taxation and the duration
    of the exemption.

    (b) Except as provided in division (E) of this section, the percentage of improvements
    to be exempted shall not exceed seventy-five per cent, and the duration of the
    exemption shall not exceed ten years.

    (c) In no case may the life of the exemption exceed the remaining number of years
    the cooperative agreement for the regional transportation improvement district,
    described under section 5595.03 of the Revised Code, is in effect.

    (3) A plan for the district that describes the principal purposes and goals to
    be served by the district and explains how the use of service payments provided
    for by section 5709.49 of the Revised Code will economically benefit owners of
    property within the district.

    (E) Subject to division (D)(2)(c) of this section, improvements to parcels located
    in a transportation financing district may be exempted from taxation for up to
    thirty years, and the percentage of improvements that may be exempted may equal
    up to one hundred per cent, if either of the following apply:

    (1) The governing board, before adopting a resolution under division (B) of this
    section, obtains the approval under division (F) of section of the board of education
    of each city, local, and exempted village school district within the territory
    of the proposed transportation financing district.

    (2) In the resolution creating the transportation financing district, the governing
    board agrees to compensate each city, local, or exempted village, and joint vocational
    school district or districts in which the transportation financing district is
    located for the full amount of taxes that would have been payable to the school
    district or districts if the improvements had not been exempted from taxation.

    (F)(1) A governing board seeking the approval of a school district for the purpose
    of division (E)(1) of this section shall send notice of the proposed resolution
    to the school district not later than forty-five business days before it intends
    to adopt the resolution. The notice shall include a copy of the proposed resolution
    and shall indicate the date on which the governing board intends to adopt the
    resolution.

    The board of education, by resolution adopted by a majority of the board, may
    approve the exemption for the period or for the exemption percentage specified
    in the notice; may disapprove the exemption for the number of years in excess
    of ten, may disapprove the exemption for the percentage of the improvements to
    be exempted in excess of seventy-five per cent, or both; or may approve the exemption
    on the condition that the governing board and the board of education negotiate
    an agreement providing for compensation equal in value to a percentage of the
    amount of taxes exempted or some other mutually agreeable compensation. If a mutually
    acceptable compensation agreement is negotiated between the governing board and
    the board of education, the governing board shall compensate the joint vocational
    school district within which the district is located at the same rate and under
    the same terms received by the city, local, or exempted village school district.

    (2) The board of education shall certify a resolution adopted under division (F)(1)
    of this section to the governing board not later than fourteen days before the
    date the governing board intends to adopt the resolution as indicated in the notice.
    If the board of education approves the ordinance or negotiates a mutually acceptable
    compensation agreement, the governing board may enact the resolution in its current
    form. If the board of education disapproves of the ordinance and fails to negotiate
    a mutually acceptable compensation agreement, the resolution is subject to the
    limitations prescribed by divisions (D)(2)(b) and (c) of this section. If the
    board of education fails to certify a resolution within the time prescribed by
    this division, the governing board may adopt the resolution and declare the improvements
    a public purpose for the period of time specified in the resolution, or, in the
    case of exemption percentages proposed in excess of seventy-five per cent, for
    the exemption percentage specified in the resolution.

    The governing board may adopt the resolution at any time after the board of education
    certifies its resolution approving the exemption, or, if the board of education
    approves the exemption on the condition that a mutually acceptable compensation
    agreement be negotiated, at any time after the compensation agreement is agreed
    to by the board of education and the governing board.

    (3) A board of education may adopt a resolution waiving its right to approve or
    receive notice of transportation financing districts proposed under this section.
    If a board of education has adopted such a resolution, the terms of that resolution
    supersede the requirements of division (F)(1) of this section. The governing board
    may negotiate an agreement with a board of education providing for some mutually
    agreeable compensation in exchange for the board of education adopting such a
    resolution. If a board of education has adopted such an ordinance or resolution,
    it shall certify a copy to the governing board. If the board of education rescinds
    such a resolution, it shall certify notice of the rescission to the governing
    board.

    (4) If the governing board is not required by division (F) of this section to
    notify the board of education of the governing board''s intent to create a transportation
    financing district, the governing board shall comply with the notice requirements
    imposed under section 5709.83 of the Revised Code, unless the board of education
    has adopted a resolution under that section waiving its right to receive such
    a notice.

    (G) The governing board shall notify and obtain the approval of every real property
    owner whose property is included in the proposed transportation financing district.
    The approval shall include a signed agreement between the property owner and the
    governing board that specifies the projects and purposes for which the service
    payments made by the owner under section 5709.49 of the Revised Code will be used.
    Such an agreement does not supersede any compensation agreement between the governing
    board and a school district under division (F) of this section. If the property
    owner and the governing board do not reach an agreement under this division, the
    parcel shall be excluded from the district.

    (H)(1) Upon adopting a resolution creating a transportation financing district,
    the governing board shall send a copy of the resolution and documentation sufficient
    to prove that the requirements of divisions (F) and (G) of this section have been
    met to the director of development. The director shall evaluate the resolution
    and documentation to determine if the governing board has fully complied with
    the requirements of this section. If the director approves the resolution, the
    director shall send notice of approval to the governing board. If the director
    does not approve the resolution, the director shall send a notice of denial to
    the governing board that includes the reason or reasons for the denial. If the
    director does not make a determination within ninety days after receiving a resolution
    under this section, the director is deemed to have approved the resolution. No
    resolution creating a transportation financing district is effective without actual
    or constructive approval by the director under this section.

    (2) An exemption from taxation granted under this section commences with the tax
    year specified in the resolution so long as the year specified in the resolution
    commences after the effective date of the resolution. If the resolution specifies
    a year commencing before the effective date of the resolution or specifies no
    year whatsoever, the exemption commences with the tax year in which an exempted
    improvement first appears on the tax list and that commences after the effective
    date of the resolution.

    (3) Except as otherwise provided in this division, the exemption ends on the date
    specified in the resolution as the date the improvement ceases to be a public
    purpose or the regional transportation improvement project funded by the service
    payments dissolves under section 5595.13 of the Revised Code, whichever occurs
    first. Exemptions shall be claimed and allowed in the same manner as in the case
    of other real property exemptions. If an exemption status changes during a year,
    the procedure for the apportionment of the taxes for that year is the same as
    in the case of other changes in tax exemption status during the year.

    (I) The resolution creating a transportation financing district may be amended
    at any time by majority vote of the governing board and with the approval of the
    director of development obtained in the same manner as approval of the original
    resolution. Such an amendment may include adding a parcel to the district that
    was previously excluded under division (G) of this section, so long as the governing
    board and the owner of the parcel reach an agreement on the use of service payments
    as provided under that division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.48
- number: '5709.481'
  heading: Voluntary assessments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) The governing board of a regional transportation improvement project
    may negotiate and enter into a voluntary agreement with the owner or owners of
    any parcel located in a transportation financing district created by the board
    whereby the owner or owners agree to subject the parcel to an assessment levied
    by the governing board and the governing board agrees to use the proceeds of that
    assessment for the purposes described in division (A) of section 5595.06 of the
    Revised Code.

    (B) The agreement shall specify the amount and duration of the assessment. The
    assessment may not be collected after the dissolution of the associated regional
    transportation improvement project under section 5595.13 of the Revised Code.

    (C) The governing board shall annually compute the amount of each assessment imposed
    by an agreement under this section and certify the amount to the owner or owners
    of the parcel and to the county auditor of the county in which the parcel is located.
    The county auditor shall enter the assessment on the tax list of real property
    opposite against which it is charged, and certify the assessment to the county
    treasurer. The assessment shall be charged and collected in the same manner as
    real property taxes and shall be treated in the same manner as real property taxes
    for all purposes of the lien described in section 323.11 of the Revised Code,
    including the priority and enforcement of the lien. Money collected from the assessment
    shall be paid immediately to the governing board. The county treasurer shall maintain
    a record of all payments of assessments under this section.

    (D) The governing board may negotiate and enter into as many agreements under
    this section as are necessary or useful in serving the principal purposes and
    goals described in the resolution creating the district. One agreement may impose
    an assessment on more than one parcel only if the owner or owners of all such
    parcels have approved the agreement.

    (E) An agreement may be amended for the purposes of subjecting additional parcels
    to the assessment by resolution adopted by the governing board and approved by
    the owner or owners of the additional parcels. An agreement may be rescinded or
    may be amended for any purpose other than subjecting additional parcels to the
    assessment by resolution adopted by the governing board and approved by the owner
    or owners of every parcel that is subject to the assessment imposed under the
    agreement.

    (F) An agreement under this section is hereby deemed to be a covenant running
    with each parcel of land that is subject to the agreement. The covenant is fully
    binding on behalf of and enforceable by the governing board against any person
    who subsequently acquires an interest in the land and all of that person''s successors
    and assigns. No purchase agreement for real estate or any interest in real estate
    that is subject to such an agreement shall be enforceable by the seller or binding
    upon the purchaser unless the purchase agreement specifically refers to the agreement.
    If a conveyance of such real estate or interest in such real estate is made pursuant
    to a purchase agreement that does not make such a reference, the agreement shall
    continue to be a covenant running with the land fully binding on behalf of and
    enforceable by the governing board against the person accepting the conveyance
    pursuant to the purchase agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.481
- number: '5709.49'
  heading: Service payments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) The governing board of a regional transportation improvement project
    that has declared an improvement to be a public purpose under section 5709.48
    of the Revised Code shall require the owner of any parcel located in the transportation
    financing district to make annual service payments in lieu of taxes to the county
    treasurer on or before the final dates for payment of real property taxes. Each
    such payment shall be charged and collected in the same manner and in the same
    amount as the real property taxes that would have been charged and payable against
    the improvement if it were not exempt from taxation. If any reduction in the levies
    otherwise applicable to such exempt property is made by the county budget commission
    under section 5705.31 of the Revised Code, the amount of the service payment in
    lieu of taxes shall be calculated as if such reduction in levies had not been
    made.

    (B) Moneys collected as service payments in lieu of taxes from a parcel shall
    be distributed at the same time and in the same manner as real property tax payments.
    If a resolution adopted under section 5709.48 of the Revised Code specifies that
    service payments shall be paid to any city, local, or exempted village, and joint
    vocational school district or districts in which the parcel is located, the county
    treasurer shall distribute the portion of the service payments to the district
    or districts in an amount equal to the property tax payments each such district
    would have received from the portion of the parcel''s improvement exempted from
    taxation had the improvement not been exempted, or some other amount as directed
    in the resolution. The treasurer shall maintain a record of the service payments
    in lieu of taxes made from property in each transportation financing district.

    (C) Nothing in this section or section 5709.48 of the Revised Code affects the
    taxes levied against that portion of the value of any parcel of property that
    is not exempt from taxation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.49
- number: '5709.50'
  heading: Regional transportation improvement project fund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) The governing board of a regional transportation improvement project
    that grants a tax exemption under section 5709.48 of the Revised Code or enters
    into one or more voluntary agreements imposing assessments under section 5709.481
    of the Revised Code shall establish a regional transportation improvement project
    fund into which shall be deposited service payments in lieu of taxes distributed
    under section 5709.49 of the Revised Code and assessments collected pursuant to
    such agreements. Money in the regional transportation improvement project fund
    shall be used by the governing board for the purposes described in division (A)
    of section 5595.06 of the Revised Code and in accordance with the agreements between
    the governing board and property owners under division (G) of section 5709.48
    of the Revised Code. Money in the regional transportation improvement project
    fund shall be administered by the governing board in accordance with the requirements
    of section 5595.08 of the Revised Code and may be invested as provided in section
    5595.09 of the Revised Code.

    (B) The regional transportation improvement project fund is dissolved by operation
    of law upon the dissolution of the associated regional transportation improvement
    project under section 5595.13 of the Revised Code. Any incidental surplus remaining
    in the fund, to the extent unencumbered, shall be divided and distributed by the
    county treasurer of the most populous county in which the district is located
    as follows:

    (1) To the general funds of the subdivisions and taxing units in which the district
    is located, an amount equal to the surplus revenue multiplied by a fraction, the
    numerator of which is the amount of service payment revenue deposited to the fund
    after the most recent collection of property taxes and payments in lieu of taxes,
    and the denominator of which is the total amount deposited to the fund after the
    most recent collection of property taxes and payments in lieu of taxes. This amount
    shall be divided proportionally based on the property tax levy revenue foregone
    by each such subdivision and taxing unit due to the exemption of improvements
    to property within the district at the most recent collection of service payments
    in lieu of taxes. The division of revenue shall account for amounts returned to
    city, local, or exempted village, and joint vocational school districts through
    compensation arrangements entered into under division (E) of section 5709.48 of
    the Revised Code. The amount distributed to each subdivision or taxing unit shall
    be apportioned among its funds as if that amount had been levied and collected
    as taxes and distributed in the most recent settlement of taxes.

    (2) To the owners of parcels subject to a special assessment under section 5709.481
    of the Revised Code, all remaining surplus revenue. This amount shall be divided
    proportionally based on the amount of the assessment levied against each such
    parcel at the most recent collection of such assessments. Owners of parcels that
    are delinquent in paying an assessment imposed by an agreement under section 5709.481
    of the Revised Code may not receive surplus revenue under this division. The share
    of surplus revenue that such owner or owners would have otherwise received shall
    be divided proportionally among the owners of nondelinquent parcels.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.50
- number: '5709.51'
  heading: Extension of exemption from taxation of improvements
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) The legislative authority of a municipal corporation, a board of township
    trustees, or a board of county commissioners may amend or provide in an ordinance
    or resolution adopted in accordance with division (B) of section 5709.40, section
    5709.41, division (B) of section 5709.73, or division (A) of section 5709.78 of
    the Revised Code, as applicable, to extend the exemption from taxation of improvements
    to the parcel or parcels designated in the ordinance or resolution for an additional
    period of not more than thirty years if all of the following conditions are met:

    (1) Either (a) the service payments made pursuant to section 5709.42, 5709.74,
    or 5709.79 of the Revised Code by the owner or owners of the parcel or parcels
    designated in the ordinance or resolution exceeded one million five hundred thousand
    dollars in the calendar year preceding the adoption of the amendment or (b) the
    legislative authority of the municipal corporation, a board of township trustees,
    or a board of county commissioners determines that the service payments to be
    made pursuant to section 5709.42, 5709.74, or 5709.79 of the Revised Code by the
    owner or owners of the parcel or parcels designated in the ordinance or resolution
    will exceed one million five hundred thousand dollars in any future year.

    (2) The service payments described in division (A)(1) of this section did not
    exceed one million five hundred thousand dollars in any calendar year before the
    calendar year immediately preceding the adoption of the amendment. This condition
    applies only to amendments adopted under this section on or after January 1, 2024.

    (3) The amendment extending or the ordinance or resolution approving the exemption
    provides for compensation to the city, local, or exempted village school district
    in which the parcel or parcels are located equal in value to the amount of taxes
    that would be payable to the school district if the improvements had not been
    exempted from taxation for the additional period.

    (B) Not later than fifteen days after adopting or amending an ordinance or resolution
    under this section, the legislative authority of the municipal corporation, board
    of township trustees, or board of county commissioners shall send a copy of the
    amendment to the director of development.

    (C) The amendment to this section by H.B. 33 of the 135th general assembly applies
    to any proceedings commenced after the effective date of that amendment , and,
    insofar as the amendment supports the actions taken, also applies to proceedings
    that, on that date, are pending, in progress, or completed, notwithstanding the
    applicable law previously in effect or any provision to the contrary in a prior
    resolution, ordinance, order, advertisement, notice, or other proceeding. Any
    proceedings pending or in progress on the effective date of that amendment , shall
    be deemed to have been taken in conformity with that amendment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.51
- number: '5709.511'
  heading: Expiring tax increment financing extension
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) As used in this section, "multinational for-profit entity" means an entity
    that is organized for profit, headquartered in Ohio, and has business operations
    in both the United States and other countries.

    (B) The legislative authority of a municipal corporation, a board of township
    trustees, or a board of county commissioners may amend, or provide in, an ordinance
    or resolution adopted in accordance with division (B) of section 5709.40, section
    5709.41, division (B) of section 5709.73, or division (A) of section 5709.78 of
    the Revised Code, as applicable, to extend the exemption from taxation of improvements
    to the parcel or parcels designated in the ordinance or resolution for an additional
    period of not more than thirty years if all of the following conditions are met:

    (1) The buildings and structures on the parcels are owned by a multinational for-profit
    entity.

    (2) The multinational for-profit entity has maintained a presence on the site
    for more than twenty-five years.

    (3) The multinational for-profit entity will commit to investing at least one
    hundred million dollars at the location over the period of the extended exemption
    authorized by this section.

    (4) The multinational for-profit entity will commit to retaining at least one
    thousand jobs related to the parcels over the period of the extended exemption
    authorized by this section.

    (5) The improvements were previously subject to an exemption from taxation pursuant
    to an ordinance or resolution adopted in accordance with division (B) of section
    5709.40, section 5709.41, division (B) of section 5709.73, or division (A) of
    section 5709.78 of the Revised Code and that exemption expired after tax year
    2024.

    (C) Not later than fifteen days after adopting or amending an ordinance or resolution
    under this section, the legislative authority of the municipal corporation, board
    of township trustees, or board of county commissioners shall send a copy of the
    amendment to the director of development.

    (D) The extension of a tax exemption under division (B) of this section may, as
    provided in the ordinance or resolution authorizing the extension, commence in
    tax year 2025 or any succeeding tax year and apply as applicable to succeeding
    tax years regardless of the effective date of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5709.511
- number: '5709.52'
  heading: Exemption from taxation for increase in value for newly developable or
    redevelopment property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) As used in this section:

    (1) "Newly developable property" means a parcel of real property on which no commercial,
    agricultural, or industrial operations are currently being conducted and on which
    construction of one or more commercial or industrial buildings or structures is
    planned but for which a certificate of occupancy has not yet been issued.

    (2) "Redevelopment property" means a parcel of real property on which one or more
    commercial or industrial buildings or structures are or were situated, no commercial,
    agricultural, or industrial operations are currently being conducted, and construction
    or reconstruction of new commercial or industrial buildings or structures is planned
    but for which a certificate of occupancy following completion of the construction
    or reconstruction has not yet been issued.

    (3) "Commercial or industrial building or structure" means a building or structure
    classified as to use for tax purposes as commercial or industrial that, prior
    to its use or occupation, requires a certificate of occupancy. "Commercial or
    industrial building or structure" does not include a building or structure any
    part of which is to be used as a dwelling.

    (4) "Remnant parcel" means a parcel resulting from a subdividing plat that includes
    original property.

    (5) "Original property" means newly developable property or redevelopment property
    subject to an exemption under division (C) of this section for a tax year.

    (6) "Unexempted value" means the taxable value of original property for the tax
    year preceding the first tax year for which the property is subject to an exemption
    under division (C) of this section.

    (7) "Subdividing plat" means a plat subdividing land that is approved by the board
    of county commissioners, municipal corporation legislative authority, or municipal,
    county, or regional planning or platting commission having authority to approve
    plats in the territory in which newly developable property or redevelopment property
    is situated.

    (8) "Certificate of occupancy" means a valid certificate of occupancy issued for
    a commercial or industrial building or structure by the building official having
    jurisdiction over that building or structure.

    (9) "Increase in the taxable value" or "increase in value" means the amount by
    which the taxable value of a parcel as it would have appeared on the tax list
    and duplicate of real and public utility property for a tax year exceeds the unexempted
    value of that parcel.

    (10) "Political subdivision" means a municipal corporation, township, or county.

    (11) "Legislative body" means the legislative authority of a municipal corporation,
    a board of township trustees, or a board of county commissioners.

    (B)(1)(a) The owner of newly developable property or redevelopment property may
    submit an application to exempt the increase in value of such property from taxation
    under this section to one of the following:

    (i) Except as provided in division (B)(1)(a)(iii) of this section, if the property
    is located in a municipal corporation, to the municipal corporation;

    (ii) Except as provided in division (B)(1)(a)(iii) of this section, if the property
    is located in the unincorporated area of a township, to the township or the county;

    (iii) If any portion of the value of the property is exempted from taxation under
    section 5709.40, 5709.41, 5709.73, or 5709.78 of the Revised Code, to the municipal
    corporation, township, or county that authorized that exemption.

    (b) An application filed under division (B)(1) of this section shall include both
    of the following:

    (i) A statement attesting to each of the following:

    (I) That the parcel is newly developable property or redevelopment property;

    (II) If the parcel is newly developable property, that either the parcel is zoned
    to permit construction of a new commercial or industrial building or structure
    or no applicable zoning regulation prohibits construction of a new commercial
    or industrial building or structure on that parcel;

    (III) If the parcel is redevelopment property, that either the property is zoned
    to permit construction or reconstruction of a new commercial or industrial building
    or structure or no applicable zoning regulation prohibits construction or reconstruction
    of a new commercial or industrial building or structure on that parcel.

    (ii) A certificate obtained from the county treasurer stating that there are no
    outstanding real property taxes, assessments, penalties, or charges that are due
    and unpaid with respect to the property on the date the certificate is issued.
    For the purposes of this division, taxes and assessments are due and unpaid if
    they remain unpaid on the date they are required to be paid as prescribed by section
    323.12 of the Revised Code.

    (2) If an application submitted under division (B)(1) of this section is complete,
    the legislative body of a political subdivision receiving the application, by
    resolution or ordinance, may declare that the development or redevelopment of
    a parcel that is the subject of the application is a public purpose and that increases
    in the taxable value of the parcel shall be exempted from taxation as provided
    in this section. A board of township trustees or board of county commissioners
    shall not adopt a resolution under this section with respect to a parcel that
    is the subject of a resolution that has been adopted by a board of county commissioners
    or board of township trustees, respectively, under division (B)(2) of this section.
    A resolution or ordinance adopted under division (B)(2) of this section shall
    specify the tax year for which the exemption from taxation shall commence, which
    shall be the tax year in which the application is filed or the ensuing tax year,
    and the term of the exemption, which shall be for six tax years except as provided
    in division (C) of this section.

    Before adopting an ordinance or resolution under division (B)(2) of this section,
    a legislative body shall do both of the following:

    (a) Notify the board of education of each city, local, exempted village, or joint
    vocational school district in which the parcel is located of the legislative body''s
    intent to adopt such an ordinance or resolution with respect to that parcel;

    (b) If the legislative body is a board of township trustees or board of county
    commissioners, notify the board of commissioners of the county or the board of
    trustees of the township, respectively, in which the parcel is located of the
    legislative body''s intent to adopt such a resolution with respect to that parcel.

    (C) Any increase in the taxable value of newly developable property or redevelopment
    property is exempted from taxation beginning with the tax year specified in the
    ordinance or resolution adopted under division (B)(2) of this section and for
    the five ensuing tax years, except that the exemption shall not apply to any tax
    year in which one of the following occurs or any ensuing year:

    (1) The owner obtains a certificate of occupancy for a commercial or industrial
    building or structure located on the property.

    (2) The owner transfers title to the property to another person.

    (3) Applicable zoning regulations change in such a manner that construction of
    a new commercial or industrial building or structure is no longer permitted.

    (4) Subject to division (D) of this section, a subdividing plat that includes
    the property is presented to the county auditor under section 5713.18 of the Revised
    Code.

    (5) Any commercial, agricultural, or industrial operations are conducted on the
    property.

    (D)(1) If the event described in division (C)(4) of this section occurs, any increase
    in the taxable value of remnant parcels is exempted from taxation beginning with
    the tax year in which the subdividing plat is presented to the county auditor.
    The taxable value of each remnant parcel for that tax year shall equal the same
    proportion of the unexempted value that the true value in money of the remnant
    parcel for that tax year bears to the aggregate true value in money of all remnant
    parcels for that tax year. Remnant parcels remain subject to the exemption authorized
    under division (D) of this section until the earlier of the last tax year for
    which the exemption applies or the tax year immediately preceding the tax year
    in which one of the events described in divisions (C)(1) to (5) of this section
    occurs with respect to any remnant parcel, subject to division (D)(2) of this
    section.

    (2) If the event described in division (C)(4) of this section occurs with respect
    to a remnant parcel for which a portion of the remnant parcel''s value is exempted
    for the preceding tax year under this section, the taxable value of each parcel
    resulting from the subdivision of the remnant parcel for the tax year in which
    the subdividing plat is presented to the county auditor shall equal the same proportion
    of the taxable value attributable to the remnant parcel under division (D)(1)
    of this section that the true value in money of the resultant parcel for that
    tax year bears to the aggregate true value in money of all such resultant parcels
    for that tax year.

    (3) Nothing in division (D) of this section authorizes an exemption from taxation
    for parcels that do not include original property.

    (E) No exemption from taxation is authorized under this section for the increase
    in value of newly developable property or redevelopment property unless the owner
    of the property files an application for exemption as required by section 5715.27
    of the Revised Code.

    (F) A recoupment charge shall be levied on a parcel the increase in value of which
    was exempted from taxation under this section if either of the following events
    occurs:

    (1) The owner transfers title to the parcel to another person, provided that owner
    made no improvements to the parcel from the date the owner filed an application
    under division (B) of this section to the date of that transfer.

    (2) Commercial, agricultural, or industrial operations are conducted on the parcel
    before the owner obtains a certificate of occupancy for the commercial or industrial
    building or structure located on the parcel.

    The charge shall equal the difference between the amount of real property taxes
    paid with respect to the parcel for the three tax years immediately preceding
    the year in which the event occurs and the amount of such taxes that would have
    been due for those three years if no portion of the value of the parcel was exempted
    under this section for those years.

    The county auditor shall place the charge as a separate item on the tax list for
    the tax year in which the event occurs or the occurrence of the event is discovered.
    The charge shall constitute a lien of the state upon the parcel as of the first
    day of January of the tax year in which the charge is levied and shall continue
    until discharged. The charge shall be collected by the county treasurer in the
    same manner and at the same time as real property taxes levied against the parcel.

    Upon the collection of any charge levied under this division and any penalties
    and interest arising thereon, the auditor, after deducting all fees allowed on
    the collection of money on the tax list and duplicate, shall distribute the full
    amount thereof among taxing units in proportion to the per cent of the total real
    property taxes levied upon the parcel in the preceding tax year by each taxing
    unit. Money distributed under this division to a taxing unit shall be allocated
    among its various funds in the same proportion that the real property taxes levied
    during the preceding tax year that are required to be paid into each fund bear
    to the total real property taxes levied during that year.'
