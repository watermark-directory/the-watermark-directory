- number: '5721.01'
  heading: Delinquent lands definitions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A) As used in this chapter:

    (1) "Delinquent lands" means all lands, including lands that are unimproved by
    any dwelling, upon which delinquent taxes, as defined in section 323.01 of the
    Revised Code, remain unpaid at the time a settlement is made between the county
    treasurer and auditor pursuant to division (C) of section 321.24 of the Revised
    Code.

    (2) "Delinquent vacant lands" means all lands that have been delinquent lands
    for at least one year and that are unimproved by any dwelling.

    (3) "County land reutilization corporation" means a county land reutilization
    corporation organized under Chapter 1724. of the Revised Code.

    (B) As used in sections 5719.04, 5721.03, and 5721.31 of the Revised Code and
    in any other sections of the Revised Code to which those sections are applicable,
    a "newspaper" or "newspaper of general circulation" has the same meaning as in
    section 7.12 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.01
- number: '5721.011'
  heading: County auditor to compile list and duplicate of delinquent lands
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: Immediately after each settlement required by division (C) of section 321.24
    of the Revised Code, each county auditor shall compile, in substantially the same
    form as the list and duplicate prepared pursuant to section 319.28 of the Revised
    Code, a list and duplicate of all delinquent lands in the auditor's county. In
    any such list there may be included lands that have been omitted from a prior
    list. Lands on which the only unpaid taxes are amounts claimed in good faith not
    to be due in complaints pending under section 5715.19 of the Revised Code and
    lands that are the subject of an application for exemption from taxation under
    section 5715.27 of the Revised Code shall not be included in the list. The delinquent
    land list and duplicate shall contain the description of the property and the
    name of the person in whose name it is listed as they appear on the tax list of
    the previous tax year and the total amount of all taxes, assessments, recoupment
    charges, penalties, and interest due and unpaid against the entry at the settlement
    and shall set forth as separate items any interest required to be so entered under
    divisions (B)(1), (2), and (3) of section 323.121 of the Revised Code. The original
    list shall be kept in the office of the auditor, and the duplicate shall be certified
    and delivered to the county treasurer within thirty days after the settlement
    required by division (C) of section 321.24 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.011
- number: '5721.02'
  heading: Collection of delinquent taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: The office of the county treasurer shall be kept open to receive the payment
    of delinquent real property taxes, from the date of the delivery of the delinquent
    land duplicate provided for in section 5721.011 of the Revised Code, until the
    final publication of the delinquent tax list and the delinquent vacant land tax
    list as provided in section 5721.03 of the Revised Code, in order that the name
    of any taxpayer appearing on either list, who prior to seven days before the first
    publication of that list pays the delinquent taxes in full, may be stricken from
    that list and in order that the name of each person appearing on either list,
    who prior to seven days before the publication of that list enters into a delinquent
    tax contract under section 323.31 of the Revised Code to pay the delinquent taxes
    in installments, may be stricken from that list or an asterisk may be entered
    in the margin next to the person's name. If payment in full is made subsequent
    to the first publication and prior to seven days before the second publication
    of either list, the name of the taxpayer shall be eliminated from the second publication.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.02
- number: '5721.021'
  heading: Employing collectors to collect delinquent taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: If the board of county commissioners serving a county with a population of
    at least two hundred thousand deems it necessary, it may, with the consent of
    the prosecuting attorney, authorize the county treasurer to employ collectors
    to collect the delinquent taxes on the list mentioned in section 5721.011 of the
    Revised Code, or part thereof, and fix the compensation of such collectors, and
    provide for the reasonable and necessary expenses of such collectors in the pursuit
    of their duties, which shall be paid out of the county treasury. All such compensation
    and expenses shall be apportioned ratably by the county auditor among all the
    funds entitled to share in the distribution of the taxes. As used in this section,
    "delinquent taxes" has the same meaning as under division (E) of section 323.01
    of the Revised Code.
