- number: '5747.46'
  heading: Library and local government support fund definitions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: 'As used in sections 5747.46 and 5747.47 of the Revised Code:

    (A) "Year''s fund balance" means the amount credited to the public library fund
    during a calendar year.

    (B) "Distribution year" means the calendar year during which a year''s fund balance
    is distributed under section 5747.47 of the Revised Code.

    (C) "CPI" means the consumer price index for all urban consumers (United States
    city average, all items), prepared by the United States department of labor, bureau
    of labor statistics.

    (D) "Inflation factor" means the quotient obtained by dividing the CPI for May
    of the year preceding the distribution year by the CPI for May of the second preceding
    year. If the quotient so obtained is less than one, the inflation factor shall
    equal one.

    (E) "Population" means whichever of the following has most recently been issued,
    as of the first day of June preceding the distribution year:

    (1) The most recent decennial census figures that include population figures for
    each county in the state;

    (2) The most current issue of "Current Population Reports: Local Population Estimates"
    issued by the United States bureau of the census that contains population estimates
    for each county in the state and the state.

    (F) "County''s equalization ratio for a distribution year" means a percentage
    computed for that county as follows:

    (1) Square the per cent that the county''s population is of the state''s population;

    (2) Divide the product so obtained by the per cent that the county''s total entitlement
    for the preceding year is of all counties'' total entitlements for the preceding
    year;

    (3) Divide the quotient so obtained by the sum of the quotients so obtained for
    all counties.

    (G) "Total entitlement" means, with respect to a distribution year, the sum of
    a county''s guaranteed share plus its share of the excess. For the 2012 distribution
    year, "total entitlement" equals the sum of payments made to a county public library
    fund during that year.

    (1) "Guaranteed share" means, for a distribution year, the product obtained by
    multiplying a county''s total entitlement for the preceding distribution year
    by the inflation factor. If the sum of the guaranteed shares for all counties
    exceeds the year''s fund balance, the guaranteed shares of all counties shall
    be reduced by a percentage that will result in the sum of such guaranteed shares
    being equal to the year''s fund balance.

    (2) "Share of excess" means, for a distribution year, the product obtained by
    multiplying a county''s equalization ratio by the difference between the year''s
    fund balance and the sum of the guaranteed shares for all counties. If the sum
    of the guaranteed shares for all counties exceeds the year''s fund balance the
    share of the excess for all counties is zero.

    (H) "Net distribution" means the sum of the payments made to a county''s public
    library fund during a distribution year, adjusted as follows:

    (1) If the county received an overpayment during the preceding distribution year,
    add the amount of the overpayment;

    (2) If the county received an underpayment during the preceding distribution year,
    deduct the amount of the underpayment.

    (I) "Overpayment" or "underpayment" for a distribution year means the amount by
    which the net distribution to a county''s public library fund during that distribution
    year exceeded or was less than the county''s total entitlement for that year.

    All computations made under this section shall be rounded to the nearest one-hundredth
    of one per cent.'
