- number: '5727.29'
  heading: Refundable credit calculation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Natural gas companies and combined companies shall be entitled to a refundable
    credit equal to the following:

    (1) For natural gas companies, the sum of the three payments of the excise tax
    on gross receipts made pursuant to section 5727.31 of the Revised Code on or before
    October 15, 1999, and on or before the first day of March and June 2000;

    (2) For combined companies, the sum of the three estimated payments of the excise
    tax on gross receipts made pursuant to section 5727.31 of the Revised Code on
    or before October 15, 1999, and on or before the first day of March and June 2000,
    multiplied by a numerator that is the taxable gross receipts from operating as
    a natural gas company as determined under division (D) of section 5727.03 of the
    Revised Code, and a denominator that is the entire taxable gross receipts for
    the combined company, for the period ending April 30, 2000. To calculate the credit
    allowed under division (A)(2) of this section, each combined company shall file
    a separate report as prescribed by the tax commissioner segregating gross receipts
    from operating as an electric company and gross receipts from operating as a natural
    gas company, for the period ending April 30, 2000.

    (B) Natural gas companies and combined companies shall claim one-sixtieth of the
    credit calculated under division (A) of this section on each return filed under
    division (A) of section 5727.25 of the Revised Code until the full amount of the
    credit is claimed. The credit first may be claimed on the return filed on or before
    November 15, 2001, pursuant to division (A) of section 5727.25 of the Revised
    Code. If the credit allowed under this section exceeds the total taxes due for
    any quarter, the tax commissioner shall refund or credit the excess in accordance
    with section 5727.28 of the Revised Code. In the event a natural gas company or
    combined company entitled to the credit sells or transfers all or a majority of
    its natural gas assets, any such unused credit shall transfer to the new owner
    of those assets. If the sale or transfer takes place after April 30, 2000, the
    credit for the tax period in which all or a majority of the assets are sold shall
    be split proportionally between the natural gas company or combined company and
    the new owner, based on a ratio that is the number of days in the tax period that
    the assets were owned by the company as compared to the new owner.

    (C) If the excise tax imposed by section 5727.24 of the Revised Code is repealed
    or amended after the effective date of this amendment, natural gas companies and
    combined companies and their successors and assigns shall be allowed to apply
    the credit allowed under this section to any other tax, additional charge, penalty,
    interest, or fee administered by the tax commissioner. Under no circumstances
    shall payment of the refundable credit granted by this section be accelerated.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.29
- number: '5727.30'
  heading: Public utilities subject to annual excise tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Except as provided in divisions (B), (C), (D), and (E) of this section,
    each public utility, except railroad companies, shall be subject to an annual
    excise tax, as provided by sections 5727.31 to 5727.62 of the Revised Code, for
    the privilege of owning property in this state or doing business in this state
    during the twelve-month period next succeeding the period upon which the tax is
    based. The tax shall be imposed against each such public utility that, on the
    first day of such twelve-month period, owns property in this state or is doing
    business in this state, and the lien for the tax, including any penalties and
    interest accruing thereon, shall attach on such day to the property of the public
    utility in this state.

    (B) Gross receipts of an electric company, rural electric company, or energy company
    received after April 30, 2001, are not subject to the annual excise tax imposed
    by this section.

    (C) A natural gas company''s gross receipts received after April 30, 2000, are
    not subject to the annual excise tax imposed by this section.

    (D) A telephone company''s gross receipts derived from amounts billed to customers
    after June 30, 2004, are not subject to the annual excise tax imposed by this
    section. Notwithstanding any other provision of law, gross receipts derived from
    amounts billed by a telephone company to customers prior to July 1, 2004, shall
    be included in the telephone company''s annual statement filed on or before August
    1, 2004, which shall be the last statement or report filed under section 5727.31
    of the Revised Code by a telephone company. A telephone company shall not deduct
    from its gross receipts included in that last statement any receipts it was unable
    to collect from its customers for the period of July 1, 2003, to June 30, 2004.

    (E) A heating company''s gross receipts, and the gross receipts of a combined
    company from operating as a heating company, are not subject to the annual excise
    tax imposed by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.30
- number: '5727.31'
  heading: Annual statement of public utility - reports
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Each public utility subject to the excise tax imposed by section 5727.30
    of the Revised Code, annually, on or before the first day of August, shall file
    with the tax commissioner a statement in such form as the commissioner prescribes
    and shall pay any amount due.

    (B)(1) Annually, on or before the fifteenth day of October of the current year,
    each public utility whose estimated excise taxes for the current year as based
    upon the statement required to be filed in that year by division (A) of this section
    are one thousand dollars or more shall file with the commissioner a report, in
    such form as the commissioner prescribes, showing the amount of excise tax estimated
    to be charged or levied pursuant to law for the current year upon the basis of
    such annual statement, and shall remit a portion of the estimated excise taxes
    shown to be due by the report. The portion of the estimated excise taxes due at
    the time the report is filed shall be one-third of its total excise taxes estimated
    to be charged or levied for the current year based upon the annual statement filed
    under division (A) of this section.

    (2) Annually, on or before the first day of March and June, each public utility
    whose excise taxes as based upon its last preceding annual statement filed under
    division (A) of this section prior to the first day of January were one thousand
    dollars or more shall file with the commissioner a report, in such form as the
    commissioner prescribes, showing the amount of excise tax charged or levied pursuant
    to law upon the basis of such annual statement, and shall remit a portion of the
    excise taxes shown to be due by each such report. The portion of the excise taxes
    due at the time each such report is filed shall be one-third of its total excise
    taxes so charged or levied based upon such annual statement.

    (C) Any public utility subject to the excise taxes imposed by section 5727.30
    of the Revised Code whose tax as certified under section 5727.38 of the Revised
    Code in a year equals or exceeds the amount specified for that year in section
    5727.311 of the Revised Code shall make the payments required under this section
    in the second ensuing and each succeeding year in the manner prescribed by section
    5727.311 of the Revised Code, except as otherwise prescribed by that section.

    (D)(1) For purposes of this section, a report required to be filed under division
    (B) of this section is considered filed when it is received by the tax commissioner.

    (2) For purposes of this section and sections 5727.311 and 5727.42 of the Revised
    Code, remittance of an excise tax required to be made under this section is considered
    to be made when the remittance is received by the tax commissioner, or when credited
    to an account designated by the treasurer of state for the receipt of tax remittances.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.31
- number: '5727.311'
  heading: Tax payments by electronic funds transfer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Any public utility subject to an excise tax imposed by section 5727.30
    of the Revised Code whose tax equals or exceeds fifty thousand dollars shall make
    each payment required under division (B) of section 5727.31 of the Revised Code
    for the second ensuing and each succeeding year electronically as prescribed by
    division (C) of this section.

    If the tax in each of two consecutive years is less than fifty thousand dollars,
    the public utility is relieved of the requirement to remit taxes electronically
    for the year that next follows the second of the consecutive years in which the
    tax certified is less than fifty thousand dollars, and is relieved of that requirement
    for each succeeding year unless the tax in a subsequent year equals or exceeds
    fifty thousand dollars.

    (B) The tax commissioner shall notify each public utility required by this section
    or section 5727.25 of the Revised Code to remit taxes electronically of the public
    utility''s obligation to do so. Failure by the commissioner to notify a public
    utility subject to this section to remit taxes electronically does not relieve
    the public utility of its obligation to remit taxes in that manner.

    (C) Public utilities required by this section or section 5727.25 of the Revised
    Code to remit periodic payments electronically shall remit such payments in the
    manner prescribed by the tax commissioner. The electronic payment of public utility
    excise taxes does not affect a public utility''s obligation to file the annual
    statement and periodic reports in the manner and at the times prescribed by section
    5727.31 of the Revised Code.

    A public utility required by this section or section 5727.25 of the Revised Code
    to remit taxes electronically may apply to the commissioner in the manner prescribed
    by the commissioner to be excused from that requirement. The commissioner may
    excuse the public utility from electronic remittance for good cause shown for
    the period of time requested by the public utility or for a portion of that period.
    The commissioner shall notify the public utility of the commissioner''s decision
    as soon as is practicable.

    (D) If a public utility required by this section or section 5727.25 of the Revised
    Code to remit taxes electronically remits those taxes by some means other than
    electronically as prescribed by this section, and the tax commissioner determines
    that the failure to remit taxes as required was not due to reasonable cause or
    was due to willful neglect, the commissioner may impose an additional charge on
    the public utility equal to five per cent of the amount of the taxes required
    to be paid electronically, but not to exceed five thousand dollars. Any additional
    charge imposed under this section is in addition to any other penalty or charge
    imposed under this chapter, and shall be considered as revenue arising from excise
    taxes imposed by this chapter.

    No additional charge shall be assessed under this division against a public utility
    that has been notified of its obligation to remit taxes electronically under this
    section and that remits its first two tax payments after such notification by
    some other means. The additional charge may be assessed upon the remittance of
    any subsequent tax payment that the public utility remits by some means other
    than electronically.'
