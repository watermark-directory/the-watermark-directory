- number: '5747.71'
  heading: Earned income tax credit
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: 'There is hereby allowed a nonrefundable credit against a taxpayer''s aggregate
    tax liability under section 5747.02 of the Revised Code for a taxpayer who is
    an "eligible individual" as defined in section 32 of the Internal Revenue Code.
    The credit shall equal thirty per cent of the federal credit allowed for the taxable
    year. The credit shall not exceed the aggregate amount of tax otherwise due under
    section 5747.02 of the Revised Code after deducting any other nonrefundable credits
    that precede the credit allowed under this section in the order prescribed by
    section 5747.98 of the Revised Code.

    The credit shall be claimed in the order prescribed by section 5747.98 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5747.71
- number: '5747.72'
  heading: Credit for home instruction expenses
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: '(A) As used in this section:

    (1) "Qualifying taxpayer" means a taxpayer that is an individual with a dependent
    who is a qualifying student.

    (2) "Qualifying student" means a student who is exempt from the compulsory attendance
    law for the purpose of home education under section 3321.042 of the Revised Code
    for the school year.

    (3) "Education expenses" means expenses or fees for any of the following items
    used directly for home education of a qualifying student: books, supplementary
    materials, supplies, computer software, applications, or subscriptions. "Education
    expenses" does not include expenses or fees for computers or similar electronic
    devices or accessories thereto.

    (B) There is hereby allowed a nonrefundable credit against a qualifying taxpayer''s
    aggregate tax liability under section 5747.02 of the Revised Code equal to the
    lesser of two hundred fifty dollars multiplied by the number of the taxpayer''s
    qualifying students or the amount of education expenses incurred by the taxpayer
    in the taxable year for the benefit of one or more of the taxpayer''s qualifying
    students. The credit shall be claimed in the order required under section 5747.98
    of the Revised Code.

    The tax commissioner may request that a qualifying taxpayer claiming a credit
    under this section furnish information as is necessary to support the claim for
    the credit under this section, and no credit shall be allowed unless the requested
    information is provided.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5747.72
- number: '5747.73'
  heading: Credit for donations to scholarship organizations
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: '(A) As used in this section, "scholarship granting organization" means an
    entity that is certified as such by the attorney general under division (C) of
    this section.

    (B) There is hereby allowed a nonrefundable credit against a taxpayer''s aggregate
    tax liability under section 5747.02 of the Revised Code for a taxpayer that donates
    cash to scholarship granting organizations during the taxable year or on or before
    the due date, unextended under division (G) of section 5747.08 of the Revised
    Code, for filing the tax return for the taxable year as described in that division.
    A credit may not be claimed for two taxable years on the basis of the same contribution.
    The credit shall equal the amount of cash donations made by the taxpayer and,
    if filing a joint return, the taxpayer''s spouse, except that the credit shall
    not exceed, for any taxable year, one thousand five hundred dollars for spouses
    filing a joint return or seven hundred fifty dollars for all other taxpayers.
    If a taxpayer files a joint return, the credit amount attributable to donations
    made by each spouse shall not exceed seven hundred fifty dollars. The credit shall
    be claimed in the order required under section 5747.98 of the Revised Code.

    If the taxpayer is a direct or indirect investor in a pass-through entity that
    donates cash to scholarship granting organizations during the taxable year, the
    taxpayer may claim its proportionate or distributive share of the credit allowed
    under this section, except that the share that may be claimed by all such investors
    may not exceed seven hundred fifty dollars for any taxable year.

    The credit authorized by this section is not allowed unless the taxpayer claiming
    the credit provides to the tax commissioner, in the form and manner required by
    the commissioner, a copy of a receipt or other document issued by the scholarship
    granting organization acknowledging the taxpayer''s contribution to the organization
    and the amount of the contribution. The commissioner may require a taxpayer to
    furnish any other information necessary to support a claim for the credit. No
    credit shall be allowed unless a copy of such document or other required information
    is provided.

    (C) An entity may apply to the attorney general, on forms and in the manner prescribed
    by the attorney general, to be certified so that contributions to the entity qualify
    for the tax credit authorized under this section. The attorney general shall certify
    an entity as a scholarship granting organization if the entity submits information
    and documentation, to the attorney general''s satisfaction, establishing that
    the entity satisfies the following:

    (1) It is a religious or nonreligious nonprofit organization exempt from federal
    taxation under section 501(a) of the Internal Revenue Code as an organization
    described in section 501(c)(3) of the Internal Revenue Code.

    (2) It primarily awards academic scholarships for primary and secondary school
    students.

    (3) It prioritizes awarding its scholarships to low-income primary and secondary
    school students.

    The attorney general shall notify the applicant of the attorney general''s determination
    within thirty days after the attorney general receives the application. The attorney
    general shall maintain a list of all scholarship granting organizations. As soon
    as is practicable after compiling or updating this list, the attorney general
    shall furnish the list to the tax commissioner, who shall post the list or updated
    list to the department of taxation''s web site.

    The attorney general shall adopt rules necessary to determine eligibility for
    and administer the credit authorized under this section.'
