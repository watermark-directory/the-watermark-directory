    name: Taxable Property - Exemptions
  text: 'The amendment by this act of section 5709.91 of the Revised Code applies
    to any proceedings commenced or instruments recorded after the amendment''s effective
    date, and, so far as the amendment supports the actions taken, also applies to
    proceedings that on its effective date are pending, in progress, or completed,
    or instruments that have previously been recorded, notwithstanding the applicable
    law previously in effect or any provision to the contrary in a prior resolution,
    ordinance, order, advertisement, notice, instrument, or other proceeding. Any
    proceedings pending or in progress on the effective date of the amendment shall
    be deemed to have been taken in conformity with the amendment.

    The authority provided in the amendment by this act of section 5709.91 of the
    Revised Code provides additional and supplemental provisions for the subject matter
    that may also be the subject of other laws, and is supplemental to and not in
    derogation of any similar authority provided by, derived from, or implied by the
    Ohio Constitution, or any other law, including laws amended by this act , or any
    charter, order, resolution, or ordinance, and no inference shall be drawn to negate
    the authority thereunder by reason of express provisions contained in the amendment
    by this act of section 5709.91 of the Revised Code.'
