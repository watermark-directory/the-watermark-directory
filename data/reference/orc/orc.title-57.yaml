  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.16
- number: '5703.17'
  heading: Appointment and powers of agent, tax auditor agent, or tax auditor agent
    manager
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) In making an investigation as to any company, firm, corporation, person,
    association, partnership, or public utility subject to the laws that the tax commissioner
    is required to administer, the commissioner may appoint by an order in writing
    an agent, a tax auditor agent, or a tax auditor agent manager, whose duties shall
    be prescribed in the order.

    In the discharge of such an agent''s duties, the agent shall have every power
    of an inquisitorial nature granted by law to the commissioner and the same powers
    as a notary public as to the taking of depositions. All powers given by law to
    a notary public relative to depositions are hereby given to such an agent.

    (B) No person shall be appointed as a tax auditor agent or a tax auditor agent
    manager, unless that person meets one of the following requirements:

    (1) The person holds from an accredited college or university a baccalaureate
    or higher degree in accounting, business, business administration, public administration,
    management, or other business-related field that is acceptable to the tax commissioner,
    a doctoral degree in law, a bachelor of laws degree, or a master of laws degree
    in taxation.

    (2) The person possesses a current certified public accountant, certified managerial
    accountant, or certified internal auditor certificate; a professional tax designation
    issued by the institute for professionals in taxation or the international association
    of assessing officers; or a designation as an enrolled agent of the Internal Revenue
    Service.

    (3) The person has accounting, auditing, or taxation experience as defined in
    the classification specifications for the positions of tax auditor agent or tax
    auditor agent manager established by the director of administrative services pursuant
    to division (A)(1) of section 124.14 of the Revised Code.

    (4) The person has experience as a tax commissioner agent, tax auditor agent,
    or supervisor of tax agents that is acceptable to the department of taxation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.17
- number: '5703.18'
  heading: Procedural powers of commissioner and agents
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: The tax commissioner and every agent provided for in section 5703.17 of the
    Revised Code may, for the purposes of the laws relating to taxation, administer
    oaths, certify to official acts, issue subpoenas, compel the attendance of witnesses,
    and the production of books, accounts, papers, records, documents, and testimony.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.18
- number: '5703.19'
  heading: Right of tax commissioner to inspect books of taxpayer - penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) To carry out the purposes of the laws that the tax commissioner is required
    to administer, the commissioner or any person employed by the commissioner for
    that purpose, upon demand, may inspect books, accounts, records, and memoranda
    of any person or public utility subject to those laws, and may examine under oath
    any officer, agent, or employee of that person or public utility. If such books,
    accounts, records, or memoranda are kept electronically or available in an electronic
    format, the person or public utility shall provide such records to the commissioner
    electronically or in an electronic format at the commissioner''s request. Any
    person other than the commissioner who makes a demand pursuant to this section
    shall produce the person''s authority to make the inspection.

    (B) If a person or public utility receives at least ten days'' written notice
    of a demand made under division (A) of this section and refuses to comply with
    that demand, a penalty of five hundred dollars shall be imposed upon the person
    or public utility for each day the person or public utility refuses to comply
    with the demand. Penalties imposed under this division may be assessed and collected
    in the same manner as assessments made under Chapter 3769., 4305., 5727., 5728.,
    5733., 5735., 5736., 5739., 5743., 5745., 5747., 5749., 5751., or 5753., or sections
    718.90, 3734.90 to 3734.9014, of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.19
- number: '5703.20'
  heading: Power to require production of books by order or subpoena
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'The tax commissioner may require, by order or subpoena served on any company,
    firm, corporation, person, association, partnership, limited liability company,
    or public utility in the same manner that a summons is served in a civil action
    in the court of common pleas, the production within this state, at the time and
    place the commissioner designates, of any books, accounts, papers, or records
    kept by that company, firm, corporation, person, association, partnership, limited
    liability company, or public utility in any office or place within or without
    the state, or verified copies in lieu of the books, accounts, papers, or records
    if the commissioner so orders, so that an examination of the books, accounts,
    papers, or records may be made by the commissioner.

    No such company, firm, corporation, person, association, partnership, limited
    liability company, or public utility shall fail to comply with any order or subpoena
    issued pursuant to this section; for each day it so fails, it shall pay into the
    state treasury a sum of not less than fifty nor more than five hundred dollars.'
  history: null
