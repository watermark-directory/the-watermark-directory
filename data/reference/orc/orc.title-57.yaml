- number: '5705.322'
  heading: Reducing taxing authority of counties in connection with developmental
    disabilities general fund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'In determining whether to reduce the taxing authority of a county under section
    5705.32 of the Revised Code in connection with the balance of a county developmental
    disabilities general fund, the county budget commission shall take into consideration
    the five-year projection of revenues and expenditures prepared by the county board
    of developmental disabilities pursuant to section 5126.053 of the Revised Code.

    Before making such a determination, the commission shall hold a hearing solely
    on the question of whether to reduce the taxing authority of the county in connection
    with the balance of that fund. The commission shall publish notice of the hearing
    in a newspaper of general circulation in the county once a week for two consecutive
    weeks or as provided in section 7.16 of the Revised Code. The second publication
    shall be not less than ten nor more than thirty days before the date of the hearing,
    and the notice shall include the date, time, place, and subject of the hearing,
    and a statement that a determination to reduce the taxing authority of the county
    may result in a decrease in revenue available to the county board of developmental
    disabilities.

    Upon publishing the notice, the commission shall notify the board of county commissioners
    or board of developmental disabilities of the date, time, place, and subject of
    the hearing. Any board entitled to notice under this division may designate an
    officer or employee of such board to whom the commission shall deliver the notice.

    The commission shall permit representatives of the county that established the
    fund to appear at such hearing and explain the financial needs of the county board
    of developmental disabilities.'
