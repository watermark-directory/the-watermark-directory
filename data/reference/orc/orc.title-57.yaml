- number: '5709.882'
  heading: Report of local agreements
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) On or before the thirty-first day of March each year, a municipal corporation
    or county that has entered into an agreement with an enterprise under section
    5709.88 of the Revised Code shall submit to the directors of development services
    and environmental protection and the board of education of each school district
    of which a municipal corporation or county to which such an agreement applies
    is a part a report on all such agreements in effect during the preceding calendar
    year. The report shall include all of the following information:

    (1) The number of enterprises that are subject to such agreements and the number
    of full-time employees subject to those agreements in the county or municipal
    corporation;

    (2) The number of agreements approved and executed during the calendar year for
    which the report is submitted, the total number of agreements in effect on the
    thirty-first day of December of the preceding calendar year, the number of agreements
    that expired during the calendar year for which the report is submitted, and the
    number of agreements scheduled to expire during the calendar year in which the
    report is submitted. For each agreement that expired during the calendar year
    for which the report is submitted, the municipal corporation or county shall include
    the amount of taxes exempted and the estimated dollar value of any other incentives
    provided under the agreement.

    (3) The number of agreements receiving compliance reviews by the tax incentive
    review council in the municipal corporation or county under section 5709.883 of
    the Revised Code during the calendar year for which the report is submitted, including
    all of the following information:

    (a) The number of agreements the terms of which an enterprise has complied with,
    indicating separately for each such agreement the value of the real and personal
    property exempted pursuant to the agreement and a comparison of the stipulated
    and actual schedules for hiring new employees, for retaining existing employees,
    for the amount of payroll of the enterprise attributable to these employees, and
    for remediating and investing in establishing, expanding, renovating, or occupying
    a facility;

    (b) The number of agreements the terms of which an enterprise has failed to comply
    with, indicating separately for each such agreement the value of the real and
    personal property exempted pursuant to the agreement and a comparison of the stipulated
    and actual schedules for hiring new employees, for retaining existing employees,
    for the amount of payroll of the enterprise attributable to these employees, and
    for remediating and investing in establishing, expanding, renovating, or occupying
    a facility;

    (c) The number of agreements about which the tax incentive review council made
    recommendations to the legislative authority of the municipal corporation or county,
    and the number of such recommendations that have not been followed;

    (d) The number of agreements rescinded during the calendar year for which the
    report is submitted.

    (4) The number of enterprises that are subject to agreements and the number of
    new employees hired and existing employees retained by each such enterprise;

    (5)(a) The number of enterprises that are subject to agreements and that closed
    or reduced employment at any place of business within the state for the primary
    purpose of remediating and establishing, expanding, renovating, or occupying a
    facility, indicating separately for each such enterprise the political subdivision
    in which the enterprise closed or reduced employment at a place of business and
    the number of full-time employees transferred and retained by each such place
    of business;

    (b) The number of enterprises that are subject to agreements and that closed or
    reduced employment at any place of business outside the state for the primary
    purpose of remediating and establishing, expanding, renovating, or occupying a
    facility.

    (B) Upon the failure of a municipal corporation or county to comply with division
    (A) of this section, both of the following apply:

    (1) Beginning on the first day of April of the calendar year in which the municipal
    corporation or county fails to comply with that division, the municipal corporation
    or county shall not enter into any agreements with an enterprise under section
    5709.88 of the Revised Code until the municipal corporation or county has complied
    with division (A) of this section;

    (2) On the first day of each ensuing calendar month until the municipal corporation
    or county complies with that division, the director of development services shall
    either order the proper county auditor to deduct from the next succeeding payment
    of taxes to the municipal corporation or county under section 321.31, 321.32,
    321.33, or 321.34 of the Revised Code an amount equal to five hundred dollars
    for each calendar month the municipal corporation or county fails to comply with
    that division, or order the county auditor to deduct such an amount from the next
    succeeding payment to the municipal corporation or county from the undivided local
    government fund under section 5747.51 of the Revised Code. At the time such a
    payment is made, the county auditor shall comply with the director''s order by
    issuing a warrant, drawn on the fund from which such money would have been paid,
    to the director of development services, who shall deposit the warrant into the
    contaminated sites development program administration fund created in division
    (C) of this section.

    (C) The director, by rule, shall establish the state''s application fee for applications
    submitted to a municipal corporation or county to enter into an agreement under
    section 5709.88 of the Revised Code. In establishing the amount of the fee, the
    director shall consider the state''s cost of administering this section and section
    5709.88 of the Revised Code. The director may change the amount of the fee at
    such times and in such increments as the director considers necessary. Any municipal
    corporation or county that receives an application shall collect the application
    fee and remit the fee for deposit in the state treasury to the credit of the contaminated
    sites development program administration fund, which is hereby created. Money
    credited to the fund shall be used by the development services agency to pay the
    costs of administering this section and section 5709.88 of the Revised Code.'
