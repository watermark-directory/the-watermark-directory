    name: Public Utilities
  text: 'No determinations, computations, certifications, or payments shall be made
    under this section after June 30, 2015.

    (A) As used in this section and sections 5727.85 and 5727.86 of the Revised Code:

    (1) "School district" means a city, local, or exempted village school district.

    (2) "Joint vocational school district" means a joint vocational school district
    created under section 3311.16 of the Revised Code, and includes a cooperative
    education school district created under section 3311.52 or 3311.521 of the Revised
    Code and a county school financing district created under section 3311.50 of the
    Revised Code.

    (3) "Local taxing unit" means a subdivision or taxing unit, as defined in section
    5705.01 of the Revised Code, a park district created under Chapter 1545. of the
    Revised Code, or a township park district established under section 511.23 of
    the Revised Code, but excludes school districts and joint vocational school districts.

    (4) "State education aid," for a school district, means the following:

    (a) For fiscal years prior to fiscal year 2010, the sum of state aid amounts computed
    for the district under former sections 3317.029, 3317.052, and 3317.053 of the
    Revised Code and the following provisions, as they existed for the applicable
    fiscal year: divisions (A), (C)(1), (C)(4), (D), (E), and (F) of section 3317.022;
    divisions (B), (C), and (D) of section 3317.023; divisions (G), (L), and (N) of
    section 3317.024; and sections 3317.0216, 3317.0217, 3317.04, and 3317.05 of the
    Revised Code; and the adjustments required by: division (C) of section 3310.08;
    division (C)(2) of section 3310.41; division (C) of section 3314.08; division
    (D)(2) of section 3314.091; division (D) of former section 3314.13; divisions
    (E), (K), (L), (M), and (N) of section 3317.023; division (C) of section 3317.20;
    and sections 3313.979 and 3313.981 of the Revised Code. However, when calculating
    state education aid for a school district for fiscal years 2008 and 2009, include
    the amount computed for the district under Section 269.20.80 of H.B. 119 of the
    127th general assembly, as subsequently amended, instead of division (D) of section
    3317.022 of the Revised Code; and include amounts calculated under Section 269.30.80
    of H.B. 119 of the 127th general assembly, as subsequently amended.

    (b) For fiscal years 2010 and 2011, the sum of the amounts computed for the district
    under former sections 3306.052, 3306.12, 3306.13, 3306.19, 3306.191, 3306.192,
    3317.052, and 3317.053 of the Revised Code and the following provisions, as they
    existed for the applicable fiscal year: division (G) of section 3317.024; section
    3317.05 of the Revised Code; and the adjustments required by division (C) of section
    3310.08; division (C)(2) of section 3310.41; division (C) of section 3314.08;
    division (D)(2) of section 3314.091; division (D) of former section 3314.13; divisions
    (E), (K), (L), (M), and (N) of section 3317.023; division (C) of section 3317.20;
    and sections 3313.979, 3313.981, and 3326.33 of the Revised Code.

    (c) For fiscal years 2012 and 2013, the amount paid in accordance with the section
    of H.B. 153 of the 129th general assembly entitled "FUNDING FOR CITY, EXEMPTED
    VILLAGE, AND LOCAL SCHOOL DISTRICTS" and the adjustments required by division
    (C) of section 3310.08; division (C)(2) of section 3310.41; section 3310.55; division
    (C) of section 3314.08; division (D)(2) of section 3314.091; division (D) of former
    section 3314.13; divisions (B), (H), (I), (J), and (K) of section 3317.023; division
    (C) of section 3317.20; and sections 3313.979 and 3313.981 of the Revised Code;

    (d) For fiscal year 2014 and each fiscal year thereafter, the sum of amounts computed
    for and paid to the district under section 3317.022 of the Revised Code; and the
    adjustments required by division (C) of section 3310.08, division (C)(2) of section
    3310.41, section 3310.55, division (C) of section 3314.08, division (D)(2) of
    section 3314.091, divisions (B), (H), (J), and (K) of section 3317.023, and sections
    3313.978, 3313.981, 3317.0212, 3317.0213, 3317.0214, and 3326.33 of the Revised
    Code. However, for fiscal years 2014 and 2015, the amount computed for the district
    under the section of this act entitled "TRANSITIONAL AID FOR CITY, LOCAL, AND
    EXEMPTED VILLAGE SCHOOL DISTRICTS" also shall be included.

    (5) "State education aid," for a joint vocational school district, means the following:

    (a) For fiscal years prior to fiscal year 2010, the sum of the state aid amounts
    computed for the district under division (N) of section 3317.024 and section 3317.16
    of the Revised Code. However, when calculating state education aid for a joint
    vocational school district for fiscal years 2008 and 2009, include the amount
    computed for the district under Section 269.30.90 of H.B. 119 of the 127th general
    assembly, as subsequently amended.

    (b) For fiscal years 2010 and 2011, the amount computed for the district in accordance
    with the section of H.B. 1 of the 128th general assembly entitled "FUNDING FOR
    JOINT VOCATIONAL SCHOOL DISTRICTS."

    (c) For fiscal years 2012 and 2013, the amount paid in accordance with the section
    of H.B. 153 of the 129th general assembly entitled "FUNDING FOR JOINT VOCATIONAL
    SCHOOL DISTRICTS."

    (d) For fiscal year 2014 and each fiscal year thereafter, the amount computed
    for the district under section 3317.16 of the Revised Code; except that, for fiscal
    years 2014 and 2015, the amount computed for the district under the section of
    this act entitled "TRANSITIONAL AID FOR JOINT VOCATIONAL SCHOOL DISTRICTS" shall
    be included.

    (6) "State education aid offset" means the amount determined for each school district
    or joint vocational school district under division (A)(1) of section 5727.85 of
    the Revised Code.

    (7) "Recognized valuation" means the amount computed for a school district pursuant
    to section 3317.015 of the Revised Code.

    (8) "Electric company tax value loss" means the amount determined under division
    (D) of this section.

    (9) "Natural gas company tax value loss" means the amount determined under division
    (E) of this section.

    (10) "Tax value loss" means the sum of the electric company tax value loss and
    the natural gas company tax value loss.

    (11) "Fixed-rate levy" means any tax levied on property other than a fixed-sum
    levy.

    (12) "Fixed-rate levy loss" means the amount determined under division (G) of
    this section.

    (13) "Fixed-sum levy" means a tax levied on property at whatever rate is required
    to produce a specified amount of tax money or levied in excess of the ten-mill
    limitation to pay debt charges, and includes school district emergency levies
    charged and payable pursuant to section 5705.194 of the Revised Code.

    (14) "Fixed-sum levy loss" means the amount determined under division (H) of this
    section.

    (15) "Consumer price index" means the consumer price index (all items, all urban
    consumers) prepared by the bureau of labor statistics of the United States department
    of labor.

    (16) "Total resources" and "total library resources" have the same meanings as
    in section 5751.20 of the Revised Code.

    (17) "2011 current expense S.B. 3 allocation" means the sum of payments received
    by a school district or joint vocational school district in fiscal year 2011 for
    current expense levy losses pursuant to division (C)(2) of section 5727.85 of
    the Revised Code. If a fixed-rate levy eligible for reimbursement is not charged
    and payable in any year after tax year 2010, "2011 current expense S.B. 3 allocation"
    used to compute payments to be made under division (C)(3) of section 5727.85 of
    the Revised Code in the tax years following the last year the levy is charged
    and payable shall be reduced to the extent that those payments are attributable
    to the fixed-rate levy loss of that levy.

    (18) "2010 current expense S.B. 3 allocation" means the sum of payments received
    by a municipal corporation in calendar year 2010 for current expense levy losses
    pursuant to division (A)(1) of section 5727.86 of the Revised Code, excluding
    any such payments received for current expense levy losses attributable to a tax
    levied under section 5705.23 of the Revised Code. If a fixed-rate levy eligible
    for reimbursement is not charged and payable in any year after tax year 2010,
    "2010 current expense S.B. 3 allocation" used to compute payments to be made under
    division (A)(1)(d) or (e) of section 5727.86 of the Revised Code in the tax years
    following the last year the levy is charged and payable shall be reduced to the
    extent that those payments are attributable to the fixed-rate levy loss of that
    levy.

    (19) "2010 S.B. 3 allocation" means the sum of payments received by a local taxing
    unit during calendar year 2010 pursuant to division (A)(1) of section 5727.86
    of the Revised Code, excluding any such payments received for fixed-rate levy
    losses attributable to a tax levied under section 5705.23 of the Revised Code.
    If a fixed-rate levy eligible for reimbursement is not charged and payable in
    any year after tax year 2010, "2010 S.B. 3 allocation" used to compute payments
    to be made under division (A)(1)(d) or (e) of section 5727.86 of the Revised Code
    in the tax years following the last year the levy is charged and payable shall
    be reduced to the extent that those payments are attributable to the fixed-rate
    levy loss of that levy.

    (20) "Total S.B. 3 allocation" means, in the case of a school district or joint
    vocational school district, the sum of the payments received in fiscal year 2011
    pursuant to divisions (C)(2) and (D) of section 5727.85 of the Revised Code. In
    the case of a local taxing unit, "total S.B. 3 allocation" means the sum of payments
    received by the unit in calendar year 2010 pursuant to divisions (A)(1) and (4)
    of section 5727.86 of the Revised Code, excluding any such payments received for
    fixed-rate levy losses attributable to a tax levied under section 5705.23 of the
    Revised Code. If a fixed-rate levy eligible for reimbursement is not charged and
    payable in any year after tax year 2010, "total S.B. 3 allocation" used to compute
    payments to be made under division (C)(3) of section 5727.85 or division (A)(1)(d)
    or (e) of section 5727.86 of the Revised Code in the tax years following the last
    year the levy is charged and payable shall be reduced to the extent that those
    payments are attributable to the fixed-rate levy loss of that levy as would be
    computed under division (C)(2) of section 5727.85 or division (A)(1)(b) of section
    5727.86 of the Revised Code.

    (21) "2011 non-current expense S.B. 3 allocation" means the difference of a school
    district''s or joint vocational school district''s total S.B. 3 allocation minus
    the sum of the school district''s 2011 current expense S.B. 3 allocation and the
    portion of the school district''s total S.B. 3 allocation constituting reimbursement
    for debt levies pursuant to division (D) of section 5727.85 of the Revised Code.

    (22) "2010 non-current expense S.B. 3 allocation" means the difference of a municipal
    corporation''s total S.B. 3 allocation minus the sum of its 2010 current expense
    S.B. 3 allocation and the portion of its total S.B. 3 allocation constituting
    reimbursement for debt levies pursuant to division (A)(4) of section 5727.86 of
    the Revised Code.

    (23) "S.B. 3 allocation for library purposes" means, in the case of a county,
    municipal corporation, school district, or township public library that receives
    the proceeds of a tax levied under section 5705.23 of the Revised Code, the sum
    of the payments received by the public library in calendar year 2010 pursuant
    to section 5727.86 of the Revised Code for fixed-rate levy losses attributable
    to a tax levied under section 5705.23 of the Revised Code. If a fixed-rate levy
    authorized under section 5705.23 of the Revised Code that is eligible for reimbursement
    is not charged and payable in any year after tax year 2010, "S.B. 3 allocation
    for library purposes" used to compute payments to be made under division (A)(1)(f)
    of section 5727.86 of the Revised Code in the tax years following the last year
    the levy is charged and payable shall be reduced to the extent that those payments
    are attributable to the fixed-rate levy loss of that levy as would be computed
    under division (A)(1)(b) of section 5727.86 of the Revised Code.

    (24) "Threshold per cent" means, in the case of a school district or joint vocational
    school district, two per cent for fiscal year 2012 and four per cent for fiscal
    years 2013 and thereafter. In the case of a local taxing unit or public library
    that receives the proceeds of a tax levied under section 5705.23 of the Revised
    Code, "threshold per cent" means two per cent for calendar year 2011, four per
    cent for calendar year 2012, and six per cent for calendar years 2013 and thereafter.

    (B) The kilowatt-hour tax receipts fund is hereby created in the state treasury
    and shall consist of money arising from the tax imposed by section 5727.81 of
    the Revised Code. All money in the kilowatt-hour tax receipts fund shall be credited
    as follows:


    Fiscal YearGeneral Revenue FundSchool District Property Tax Replacement FundLocal
    Government Property Tax Replacement Fund2001-201163.0%25.4%11.6%2012-201588.0%9.0%3.0%

    (C) The natural gas tax receipts fund is hereby created in the state treasury
    and shall consist of money arising from the tax imposed by section 5727.811 of
    the Revised Code. All money in the fund shall be credited as follows for fiscal
    years before fiscal year 2012:

    (1) Sixty-eight and seven-tenths per cent shall be credited to the school district
    property tax replacement fund for the purpose of making the payments described
    in section 5727.85 of the Revised Code.

    (2) Thirty-one and three-tenths per cent shall be credited to the local government
    property tax replacement fund for the purpose of making the payments described
    in section 5727.86 of the Revised Code.

    (D) Not later than January 1, 2002, the tax commissioner shall determine for each
    taxing district its electric company tax value loss, which is the sum of the applicable
    amounts described in divisions (D)(1) to (4) of this section:

    (1) The difference obtained by subtracting the amount described in division (D)(1)(b)
    from the amount described in division (D)(1)(a) of this section.

    (a) The value of electric company and rural electric company tangible personal
    property as assessed by the tax commissioner for tax year 1998 on a preliminary
    assessment, or an amended preliminary assessment if issued prior to March 1, 1999,
    and as apportioned to the taxing district for tax year 1998;

    (b) The value of electric company and rural electric company tangible personal
    property as assessed by the tax commissioner for tax year 1998 had the property
    been apportioned to the taxing district for tax year 2001, and assessed at the
    rates in effect for tax year 2001.

    (2) The difference obtained by subtracting the amount described in division (D)(2)(b)
    from the amount described in division (D)(2)(a) of this section.

    (a) The three-year average for tax years 1996, 1997, and 1998 of the assessed
    value from nuclear fuel materials and assemblies assessed against a person under
    Chapter 5711. of the Revised Code from the leasing of them to an electric company
    for those respective tax years, as reflected in the preliminary assessments;

    (b) The three-year average assessed value from nuclear fuel materials and assemblies
    assessed under division (D)(2)(a) of this section for tax years 1996, 1997, and
    1998, as reflected in the preliminary assessments, using an assessment rate of
    twenty-five per cent.

    (3) In the case of a taxing district having a nuclear power plant within its territory,
    any amount, resulting in an electric company tax value loss, obtained by subtracting
    the amount described in division (D)(1) of this section from the difference obtained
    by subtracting the amount described in division (D)(3)(b) of this section from
    the amount described in division (D)(3)(a) of this section.

    (a) The value of electric company tangible personal property as assessed by the
    tax commissioner for tax year 2000 on a preliminary assessment, or an amended
    preliminary assessment if issued prior to March 1, 2001, and as apportioned to
    the taxing district for tax year 2000;

    (b) The value of electric company tangible personal property as assessed by the
    tax commissioner for tax year 2001 on a preliminary assessment, or an amended
    preliminary assessment if issued prior to March 1, 2002, and as apportioned to
    the taxing district for tax year 2001.

    (4) In the case of a taxing district having a nuclear power plant within its territory,
    the difference obtained by subtracting the amount described in division (D)(4)(b)
    of this section from the amount described in division (D)(4)(a) of this section,
    provided that such difference is greater than ten per cent of the amount described
    in division (D)(4)(a) of this section.

    (a) The value of electric company tangible personal property as assessed by the
    tax commissioner for tax year 2005 on a preliminary assessment, or an amended
    preliminary assessment if issued prior to March 1, 2006, and as apportioned to
    the taxing district for tax year 2005;

    (b) The value of electric company tangible personal property as assessed by the
    tax commissioner for tax year 2006 on a preliminary assessment, or an amended
    preliminary assessment if issued prior to March 1, 2007, and as apportioned to
    the taxing district for tax year 2006.

    (E) Not later than January 1, 2002, the tax commissioner shall determine for each
    taxing district its natural gas company tax value loss, which is the sum of the
    amounts described in divisions (E)(1) and (2) of this section:

    (1) The difference obtained by subtracting the amount described in division (E)(1)(b)
    from the amount described in division (E)(1)(a) of this section.

    (a) The value of all natural gas company tangible personal property, other than
    property described in division (E)(2) of this section, as assessed by the tax
    commissioner for tax year 1999 on a preliminary assessment, or an amended preliminary
    assessment if issued prior to March 1, 2000, and apportioned to the taxing district
    for tax year 1999;

    (b) The value of all natural gas company tangible personal property, other than
    property described in division (E)(2) of this section, as assessed by the tax
    commissioner for tax year 1999 had the property been apportioned to the taxing
    district for tax year 2001, and assessed at the rates in effect for tax year 2001.

    (2) The difference in the value of current gas obtained by subtracting the amount
    described in division (E)(2)(b) from the amount described in division (E)(2)(a)
    of this section.

    (a) The three-year average assessed value of current gas as assessed by the tax
    commissioner for tax years 1997, 1998, and 1999 on a preliminary assessment, or
    an amended preliminary assessment if issued prior to March 1, 2001, and as apportioned
    in the taxing district for those respective years;

    (b) The three-year average assessed value from current gas under division (E)(2)(a)
    of this section for tax years 1997, 1998, and 1999, as reflected in the preliminary
    assessment, using an assessment rate of twenty-five per cent.

    (F) The tax commissioner may request that natural gas companies, electric companies,
    and rural electric companies file a report to help determine the tax value loss
    under divisions (D) and (E) of this section. The report shall be filed within
    thirty days of the commissioner''s request. A company that fails to file the report
    or does not timely file the report is subject to the penalty in section 5727.60
    of the Revised Code.

    (G) Not later than January 1, 2002, the tax commissioner shall determine for each
    school district, joint vocational school district, and local taxing unit its fixed-rate
    levy loss, which is the sum of its electric company tax value loss multiplied
    by the tax rate in effect in tax year 1998 for fixed-rate levies and its natural
    gas company tax value loss multiplied by the tax rate in effect in tax year 1999
    for fixed-rate levies.

    (H) Not later than January 1, 2002, the tax commissioner shall determine for each
    school district, joint vocational school district, and local taxing unit its fixed-sum
    levy loss, which is the amount obtained by subtracting the amount described in
    division (H)(2) of this section from the amount described in division (H)(1) of
    this section:

    (1) The sum of the electric company tax value loss multiplied by the tax rate
    in effect in tax year 1998, and the natural gas company tax value loss multiplied
    by the tax rate in effect in tax year 1999, for fixed-sum levies for all taxing
    districts within each school district, joint vocational school district, and local
    taxing unit. For the years 2002 through 2006, this computation shall include school
    district emergency levies that existed in 1998 in the case of the electric company
    tax value loss, and 1999 in the case of the natural gas company tax value loss,
    and all other fixed-sum levies that existed in 1998 in the case of the electric
    company tax value loss and 1999 in the case of the natural gas company tax value
    loss and continue to be charged in the tax year preceding the distribution year.
    For the years 2007 through 2016 in the case of school district emergency levies,
    and for all years after 2006 in the case of all other fixed-sum levies, this computation
    shall exclude all fixed-sum levies that existed in 1998 in the case of the electric
    company tax value loss and 1999 in the case of the natural gas company tax value
    loss, but are no longer in effect in the tax year preceding the distribution year.
    For the purposes of this section, an emergency levy that existed in 1998 in the
    case of the electric company tax value loss, and 1999 in the case of the natural
    gas company tax value loss, continues to exist in a year beginning on or after
    January 1, 2007, but before January 1, 2017, if, in that year, the board of education
    levies a school district emergency levy for an annual sum at least equal to the
    annual sum levied by the board in tax year 1998 or 1999, respectively, less the
    amount of the payment certified under this division for 2002.

    (2) The total taxable value in tax year 1999 less the tax value loss in each school
    district, joint vocational school district, and local taxing unit multiplied by
    one-fourth of one mill.

    If the amount computed under division (H) of this section for any school district,
    joint vocational school district, or local taxing unit is greater than zero, that
    amount shall equal the fixed-sum levy loss reimbursed pursuant to division (F)
    of section 5727.85 of the Revised Code or division (A)(2) of section 5727.86 of
    the Revised Code, and the one-fourth of one mill that is subtracted under division
    (H)(2) of this section shall be apportioned among all contributing fixed-sum levies
    in the proportion of each levy to the sum of all fixed-sum levies within each
    school district, joint vocational school district, or local taxing unit.

    (I) Notwithstanding divisions (D), (E), (G), and (H) of this section, in computing
    the tax value loss, fixed-rate levy loss, and fixed-sum levy loss, the tax commissioner
    shall use the greater of the 1998 tax rate or the 1999 tax rate in the case of
    levy losses associated with the electric company tax value loss, but the 1999
    tax rate shall not include for this purpose any tax levy approved by the voters
    after June 30, 1999, and the tax commissioner shall use the greater of the 1999
    or the 2000 tax rate in the case of levy losses associated with the natural gas
    company tax value loss.

    (J) Not later than January 1, 2002, the tax commissioner shall certify to the
    department of education the tax value loss determined under divisions (D) and
    (E) of this section for each taxing district, the fixed-rate levy loss calculated
    under division (G) of this section, and the fixed-sum levy loss calculated under
    division (H) of this section. The calculations under divisions (G) and (H) of
    this section shall separately display the levy loss for each levy eligible for
    reimbursement.

    (K) Not later than September 1, 2001, the tax commissioner shall certify the amount
    of the fixed-sum levy loss to the county auditor of each county in which a school
    district with a fixed-sum levy loss has territory.'
