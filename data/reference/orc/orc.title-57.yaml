- number: '5705.26'
  heading: Majority vote necessary for levies
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: Except as otherwise provided in section 5705.191 of the Revised Code, if the
    majority of the electors voting on a levy authorized by sections 5705.19 to 5705.25
    of the Revised Code vote in favor of such levy at such election, the taxing authority
    of the subdivision may levy a tax within the subdivision or, in the case of a
    qualifying library levy, within the library district or association library district,
    at the additional rate in excess of the ten-mill limitation during the period
    and for the purpose stated in the resolution, or at any less rate, or for any
    of said years or purposes; provided that levies for payment of debt charges shall
    not exceed the amount necessary for such charges on the indebtedness mentioned
    in the resolution. If such levy is for the payment of charges on debts incurred
    prior to January 1, 1935, in excess of the ten-mill limitation but within the
    fifteen-mill limitation, the taxing authority of said subdivision shall levy in
    excess of the ten-mill limitation such tax if a majority of the electors voting
    on the levy vote in favor thereof.
