    name: Income Tax
  text: 'The form used by the county budget commission to calculate subdivision shares
    of the undivided local government fund as apportioned pursuant to section 5747.51
    of the Revised Code shall be as follows:

    Calculation of (name of subdivision) share of undivided local government fund
    for (name of county) county


