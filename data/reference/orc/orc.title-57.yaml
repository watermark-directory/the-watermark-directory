  url: https://codes.ohio.gov/ohio-revised-code/section-5705.281
- number: '5705.29'
  heading: Contents of tax budget - contingency reserve balance - spending reserve
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'This section does not apply to a subdivision or taxing unit for which the
    county budget commission has waived the requirement to adopt a tax budget pursuant
    to section 5705.281 of the Revised Code. The tax budget shall present the following
    information:

    (A)(1) A statement of the necessary current operating expenses for the ensuing
    fiscal year for each department and division of the subdivision, classified as
    to personal services and other expenses, and the fund from which such expenditures
    are to be made. Except in the case of a school district, this estimate may include
    a contingent expense not designated for any particular purpose, and not to exceed
    three per cent of the total amount of appropriations for current expenses. In
    the case of a school district, this estimate may include a contingent expense
    not designated for any particular purpose and not to exceed thirteen per cent
    of the total amount of appropriations for current expenses.

    (2) A statement of the expenditures for the ensuing fiscal year necessary for
    permanent improvements, exclusive of any expense to be paid from bond issues,
    classified as to the improvements contemplated by the subdivision and the fund
    from which such expenditures are to be made;

    (3) The amounts required for the payment of final judgments;

    (4) A statement of expenditures for the ensuing fiscal year necessary for any
    purpose for which a special levy is authorized, and the fund from which such expenditures
    are to be made;

    (5) Comparative statements, so far as possible, in parallel columns of corresponding
    items of expenditures for the current fiscal year, including a statement of estimated
    expenses to the end of that fiscal year, and the two preceding fiscal years.

    (B)(1) An estimate of receipts from other sources than the general property tax
    during the ensuing fiscal year, which shall include an estimate of unencumbered
    balances at the end of the current fiscal year, and the funds to which such estimated
    receipts are credited;

    (2) The amount each fund requires from the general property tax, which shall be
    the difference between the contemplated expenditure from the fund and the estimated
    receipts, as provided in this section. The section of the Revised Code under which
    the tax is authorized shall be set forth.

    (3) Comparative statements, so far as possible, in parallel columns of taxes and
    other revenues for the current fiscal year and the two preceding fiscal years;

    (4) Comparative statements, so far as possible, in parallel columns of all funds
    in control of the subdivision for the current fiscal year and the two preceding
    fiscal years not already included in the tax budget pursuant to divisions (B)(1)
    to (3) of this section.

    (C)(1) The amount required for debt charges;

    (2) The estimated receipts from sources other than the tax levy for payment of
    such debt charges, including the proceeds of refunding bonds to be issued to refund
    bonds maturing in the next succeeding fiscal year;

    (3) The net amount for which a tax levy shall be made, classified as to bonds
    authorized and issued prior to January 1, 1922, and those authorized and issued
    subsequent to such date, and as to what portion of the levy will be within and
    what in excess of the ten-mill limitation.

    (D) An estimate of amounts from taxes authorized to be levied in excess of the
    ten-mill limitation on the tax rate, and the fund to which such amounts will be
    credited, together with the sections of the Revised Code under which each such
    tax is exempted from all limitations on the tax rate.

    (E) If the taxing unit estimates that it will collect more revenue in the succeeding
    fiscal year than in the current fiscal year from any tax levied within the ten-mill
    limitation or due to the operation of division (E) of section 319.301 of the Revised
    Code, a declaration of the taxing unit''s intent to collect the additional revenue
    or to forgo all or a portion of the additional revenue.

    (F)(1) A board of education may include in its budget for the fiscal year in which
    a levy proposed under section 5705.194, 5705.199, 5705.21, 5705.213, or 5705.219,
    a property tax levy proposed under section 5748.09, or the original levy under
    section 5705.212 of the Revised Code is first extended on the tax list and duplicate
    an estimate of expenditures to be known as a voluntary contingency reserve balance,
    which shall not be greater than twenty-five per cent of the total amount of the
    levy estimated to be available for appropriation in such year.

    (2) A board of education may include in its budget for the fiscal year following
    the year in which a levy proposed under section 5705.194, 5705.199, 5705.21, 5705.213,
    or 5705.219, a property tax levy proposed under section 5748.09, or the original
    levy under section 5705.212 of the Revised Code is first extended on the tax list
    and duplicate an estimate of expenditures to be known as a voluntary contingency
    reserve balance, which shall not be greater than twenty per cent of the amount
    of the levy estimated to be available for appropriation in such year.

    (3) Except as provided in division (F)(4) of this section, the full amount of
    any reserve balance the board includes in its budget shall be retained by the
    county auditor and county treasurer out of the first semiannual settlement of
    taxes until the beginning of the next succeeding fiscal year, and thereupon, with
    the depository interest apportioned thereto, it shall be turned over to the board
    of education, to be used for the purposes of such fiscal year.

    (4) A board of education, by a two-thirds vote of all members of the board, may
    appropriate any amount withheld as a voluntary contingency reserve balance during
    the fiscal year for any lawful purpose, provided that prior to such appropriation
    the board of education has authorized the expenditure of all amounts appropriated
    for contingencies under section 5705.40 of the Revised Code. Upon request by the
    board of education, the county auditor shall draw a warrant on the district''s
    account in the county treasury payable to the district in the amount requested.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.29
- number: '5705.30'
  heading: Public inspection of budget - hearing - notice - submission to county auditor
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'This section does not apply to a subdivision for which the county budget
    commission has waived the requirement to adopt a tax budget under section 5705.281
    of the Revised Code.

    At least two copies of the budget shall be filed in the office of the fiscal officer
    of the subdivision for public inspection not less than ten days before its adoption
    by the taxing authority, and such taxing authority shall hold at least one public
    hearing thereon, of which public notice shall be given by at least one publication
    not less than ten days prior to the date of hearing in the official publication
    of such subdivision, or in a newspaper having general circulation in the subdivision.
    The budget, after adoption, shall be submitted to the county auditor on or before
    the twentieth day of July, or in the case of a school district or the city of
    Cincinnati, by the twentieth day of January. The tax commissioner may prescribe
    a later date for the submission of a subdivision''s tax budget. Any subdivision
    that fails to submit its budget to the county auditor on or before the date prescribed
    by this section or a later date prescribed by the commissioner shall not receive
    an apportionment from the undivided local government fund distribution for the
    ensuing calendar year unless the commissioner determines that the budget was adopted
    by the subdivision on or before the fifth day before the date prescribed by this
    section for submitting the budget, but was not submitted by the date so prescribed
    or the later time prescribed by the commissioner because of ministerial error
    by the subdivision or its officers, employees, or other representatives.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.30
- number: '5705.31'
  heading: Approval of levies by budget commission - minimum levy
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'The county auditor shall present to the county budget commission the annual
    tax budgets submitted under sections 5705.01 to 5705.47 of the Revised Code, together
    with an estimate prepared by the auditor of the amount of any state levy, the
    rate of any school tax levy as previously determined, the tax commissioner''s
    estimate of the amount to be received in the county public library fund, the tax
    rates provided under section 5705.281 of the Revised Code if adoption of the tax
    budget was waived under that section, and such other information as the commission
    requests or the tax commissioner prescribes.

    The budget commission shall examine such budget and, if the taxing authority is
    a board of education that has elected to include projections pursuant to division
    (E) of section 5705.391 of the Revised Code, shall examine such projections. Using
    the budget and, if applicable, included projections, the budget commission shall
    ascertain the total amount proposed to be raised in the county for the purposes
    of each subdivision and other taxing units in the county and the need for those
    amounts. Except as otherwise provided in this section, the county budget commission
    may reduce the amount to be raised by any levy pursuant to section 5705.32 of
    the Revised Code.

    The commission shall ascertain that the following levies have been properly authorized
    and, if so authorized, shall approve them without modification:

    (A) All levies in excess of the ten-mill limitation in the first year they are
    levied, unless the levy is the renewal of an existing tax or the subdivision or
    taxing unit requests an amount requiring a lower rate for the succeeding fiscal
    year. Such a request for an amount requiring a lower rate applies only to the
    succeeding fiscal year unless the subdivision or taxing unit expressly states
    that the request is permanent.

    (B) All levies for unsatisfied debt charges, including levies that remain necessary
    to pay notes issued for emergency purposes;

    (C) The levies prescribed by division (B) of sections 742.33 and 742.34 of the
    Revised Code;

    (D) Except as otherwise provided in this division, a minimum levy within the ten-mill
    limitation for the current expense and debt service of each subdivision or taxing
    unit, which shall equal two-thirds of the average levy for current expenses and
    debt service allotted within the fifteen-mill limitation to such subdivision or
    taxing unit during the last five years the fifteen-mill limitation was in effect
    unless such subdivision or taxing unit requests an amount requiring a lower rate
    for the succeeding fiscal year, or if it expressed its intent to forgo collections
    from such a levy under division (E) of section 5705.29 of the Revised Code. Such
    a request for an amount requiring a lower rate applies only to the succeeding
    fiscal year unless the subdivision or taxing unit expressly states that the request
    is permanent.

    Except as provided in section 5705.312 of the Revised Code, if the levies required
    in divisions (B) and (C) of this section for the subdivision or taxing unit equal
    or exceed the entire minimum levy of the subdivision as fixed, the minimum levies
    of the other subdivisions or taxing units shall be reduced by the commission to
    provide for the levies and an operating levy for the subdivision. Such additional
    levy shall be deducted from the minimum levies of each of the other subdivisions
    or taxing units, but the operating levy for a school district shall not be reduced
    below a figure equivalent to forty-five per cent of the millage available within
    the ten-mill limitation after all the levies in divisions (B) and (C) of this
    section have been provided for.

    If a municipal corporation and a township have entered into an annexation agreement
    under section 709.192 of the Revised Code in which they agree to reallocate their
    shares of the minimum levies established under this division and if that annexation
    agreement is submitted along with the annual tax budget of both the township and
    the municipal corporation, then, when determining the minimum levy under this
    division, the auditor shall allocate, to the extent possible, the minimum levy
    for that municipal corporation and township in accordance with their annexation
    agreement.

    Divisions (A) to (D) of this section are mandatory, and commissions shall be without
    discretion to reduce such minimum levies except as provided in such divisions
    or as required in section 5705.316 of the Revised Code.

    If any debt charge is omitted from the budget, the commission shall include it
    therein.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.31
- number: '5705.311'
  heading: Application of levy to annexed territory
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'During any tax year or years within which any territory annexed to a city
    or a village is not a part of the city school district or a school district of
    which such village is a part, the minimum levy for such city or village under
    section 5705.31 of the Revised Code shall not be diminished except that in such
    annexed territory and only during said tax year or years, and in order to preserve
    the minimum levies of overlapping subdivisions under said section so that the
    full amount of taxes within the ten-mill limitation may be levied to the extent
    possible, the minimum levy of said city or village shall be the lowest of the
    following amounts: an amount which when added to the minimum levies of the other
    overlapping subdivisions equals ten mills, or an amount equal to the minimum levy
    of such city or village, or an amount equal to the minimum levy theretofore made
    in said area for township or municipal purposes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.311
- number: '5705.312'
  heading: Increasing minimum levy to pay debt service
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'The county budget commission shall not increase the minimum levy of a municipal
    corporation pursuant to division (D) of section 5705.31 of the Revised Code to
    pay debt service unless moneys available to pay such debt service are insufficient
    after applying divisions (A) to (C) of this section:

    (A) The amount of debt service on unvoted general obligations of the municipal
    corporation, not otherwise provided for, shall be charged against the minimum
    levy of the municipal corporation pursuant to division (D) of section 5705.31
    of the Revised Code to the full extent of such levy that may lawfully be used
    for such purpose, if necessary, without preserving to the municipal corporation
    any operating levy within the ten-mill limitation.

    (B) The amount of debt service on unvoted general obligations of the municipal
    corporation, not otherwise provided for, after application of division (A) of
    this section shall be paid from receipts of any income tax levied by the municipal
    corporation that may lawfully be used for such purpose.

    (C) The amount of debt service on unvoted general obligations of the municipal
    corporation, not otherwise provided for, after application of divisions (A) and
    (B) of this section shall be paid from the receipts of any levy in excess of the
    ten-mill limitation available for current expenses of the municipal corporation
    that may lawfully be used for such purpose.

    Moneys produced by the application of divisions (A) to (C) of this section shall
    be placed in the bond retirement fund of the municipal corporation by the county
    auditor or the officer of the municipal corporation collecting such taxes, as
    appropriate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.312
- number: '5705.313'
  heading: Permitting property tax rate reduction when county sales tax increased
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A)(1) Whenever a board of county commissioners adopts a resolution pursuant
    to section 5739.021 or 5739.026 of the Revised Code to levy or increase the rate
    of a sales tax, the board may adopt an accompanying resolution reducing the rate
    of any property tax the county currently is levying for current expenses within
    the ten-mill limitation or amending a previously adopted accompanying resolution
    increasing the amount of an existing reduction made under this division.

    (2) At any time after a board of county commissioners has adopted a resolution
    pursuant to section 5739.021 or 5739.026 of the Revised Code to levy or increase
    the rate of the sales tax, the board may adopt another resolution reducing the
    rate of any property tax the county currently is levying for current expenses
    within the ten-mill limitation or amending a previously adopted accompanying resolution
    increasing the amount of an existing reduction made under this division. This
    resolution may be adopted at any time during which the county is levying the sales
    tax under section 5739.021 or 5739.026 of the Revised Code.

    The rate reduction under division (A)(1) or (2) of this section may be any amount,
    provided it does not reduce the annual property tax revenue for current expenses
    within the ten-mill limitation by more than the amount of annual revenue the commissioners
    estimate the sales tax levy to generate. The resolution shall set forth the current
    millage rate for current expenses of the county within the ten-mill limitation;
    the number of such mills not currently levied under this division, if any; the
    number of such mills currently levied that will not be levied until a resolution
    is adopted under division (C) of this section or the expiration of the specified
    number of years the rate is not to be levied, and the tax year in which the rate
    reduction shall first apply. The resolution may state that the property tax rate
    reduction will be for a specified number of years. A copy of the resolution shall
    be certified to the county auditor.

    (B) Notwithstanding any other provision of law, whenever a board of county commissioners
    adopts a resolution under division (A) of this section, no other taxing unit may
    levy any portion of the rate the county does not levy until the expiration of
    the specified number of years that such portion of the rate reduction is in effect
    as set forth in the resolution, except as may be required by the county budget
    commission pursuant to division (D) of section 5705.31 of the Revised Code to
    provide for the levies required in division (B) of that section for debt charges
    of a subdivision or taxing unit.

    (C) At any time a rate reduction is in effect the board of county commissioners
    may, by two-thirds vote of its members, adopt a resolution increasing the rate
    of the levy by any amount up to the rate at which it was levied prior to its rate
    reduction under this section. The board shall then immediately certify its action
    to the county auditor. If the commissioners increase the rate to the full rate
    at which it was levied prior to its rate reduction under this section, this section
    shall thereupon cease to apply to that county until another resolution is adopted
    pursuant to division (A)(1) or (2) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.313
- number: '5705.314'
  heading: Conducting public hearing on proposed school levy
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) If the board of education of a city, local, or exempted village school
    district proposes to change its levy within the ten-mill limitation in a manner
    that will result in an increase in the amount of real property taxes levied by
    the board in the tax year the change takes effect, the board shall hold a public
    hearing solely on the proposal and obtain approval from the county budget commission
    of each county in which the district has territory before adopting a resolution
    to implement the proposal.

    (B) Before holding the board of education hearing required by division (A) of
    this section, the board shall publish notice of the hearing in a newspaper of
    general circulation in the school district once a week for two consecutive weeks
    or as provided in section 7.16 of the Revised Code. The second publication shall
    be not less than ten nor more than thirty days before the date of the hearing,
    and the notice shall include the date, time, place, and subject of the hearing,
    and a statement that the change proposed by the board may result in an increase
    in the amount of real property taxes levied by the board. At the time the board
    submits the notice for publication, the board shall send a copy of the notice
    to the auditor of the county where the school district is located or, if the school
    district is located in more than one county, to the auditor of each of those counties.
    Upon receipt of the notice, the county auditor shall certify a copy of the notice
    to the county budget commission.

    (C) Upon certification of a notice to a county budget commission pursuant to division
    (B) of this section, the county budget commission shall schedule a hearing for
    a date that is not less than ten and not more than thirty days after the date
    of certification.

    The hearing shall not be held on the same day as the hearing required by division
    (A) of this section, and if more than one county budget commission is required
    under this division to hold a hearing on the proposed levy, the county budget
    commission hearings shall not be held on the same day. Each commission shall publish
    the date, time, location, and purpose of the meeting on the county auditor''s
    web site. The school district shall publish that information on the school''s
    web site.

    During the hearing before each commission, the school district shall present evidence
    demonstrating the need to change the levy to the county budget commission. The
    district shall not change the levy unless, by majority vote, the county budget
    commission approves the need to change the levy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.314
- number: '5705.315'
  heading: Effect of annexation on minimum municipal and township levies
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'With respect to annexations granted on or after March 27, 2002, and during
    any tax year or years within which any territory annexed to a municipal corporation
    is part of a township, the minimum levy for the municipal corporation and township
    under section 5705.31 of the Revised Code shall not be diminished, except that
    in the annexed territory and only during those tax year or years, and in order
    to preserve the minimum levies of overlapping subdivisions under section 5705.31
    of the Revised Code so that the full amount of taxes within the ten-mill limitation
    may be levied to the extent possible, the minimum levy of the municipal corporation
    or township shall be the lowest of the following amounts:

    (A) An amount that when added to the minimum levies of the other overlapping subdivisions
    equals ten mills;

    (B) An amount equal to the minimum levy of the municipal corporation or township,
    provided the total minimum levy does not exceed ten mills.

    The municipal corporation and the township may enter into an agreement to determine
    the municipal corporation''s and the township''s minimum levy under this section.
    If it cannot be determined what minimum levy is available to each and no agreement
    has been entered into by the municipal corporation and township, the municipal
    corporation and township shall each receive one-half of the millage available
    for use within the portion of the territory annexed to the municipal corporation
    that remains part of the township.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.315
- number: '5705.316'
  heading: Inflation limitation on levies within the ten-mill limitation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) As used in this section:

    (1) "Taxes charged and payable" means real property taxes, or manufactured home
    taxes assessed pursuant to section 4503.06 of the Revised Code, that are charged
    and payable after reductions required by sections 319.301, 319.302, 323.152, 323.158,
    319.304, 4503.065, and 4503.0610 of the Revised Code.

    (2) "Current taxes charged and payable" means, for a levy, the taxes charged and
    payable for the current tax year, in the case of real property, or the following
    tax year, in the case of manufactured or mobile homes on the manufactured home
    tax list, excluding any taxes charged and payable against property, or any portion
    of property, that was not taxed by the taxing district in the most recent tax
    year to which section 5715.24 of the Revised Code applied in the county, in the
    case of real property, or in the following tax year, in the case of manufactured
    or mobile homes on the manufactured home tax list.

    (3) "Base taxes charged and payable" means, for a levy, the taxes charged and
    payable for the tax year immediately preceding the current tax year, in the case
    of real property, or the current tax year, in the case of manufactured or mobile
    homes on the manufactured home tax list, excluding any taxes charged and payable
    against property, or any portion of property, that was not taxed by the taxing
    district in the most recent tax year to which section 5715.24 of the Revised Code
    applied in the county, in the case of real property, or in the following tax year,
    in the case of manufactured or mobile homes on the manufactured home tax list.

    (4) "County budget commission" means a joint budget commission in the context
    of a taxing unit with territory located in two or more counties.

    (5) "Inflation factor" means, for a tax year, the greater of zero per cent or
    the percentage change in the gross domestic product deflator computed over the
    three preceding tax years, as determined under division (F) of this section.

    (6) "Reappraisal or triennial update" means a tax year in which section 5715.24
    of the Revised Code applies in the county.

    (B) Notwithstanding division (D) of section 133.25 of the Revised Code and except
    as provided in division (D) of this section, in September of each tax year in
    which a county undergoes a reappraisal or triennial update, the county budget
    commission shall adjust the rate of any levy within the ten-mill limitation so
    that the increase in current taxes charged and payable for that levy over the
    base taxes charged and payable for that levy do not exceed the product of the
    base taxes charged and payable and the inflation factor certified under division
    (F) of this section for that tax year, rounded to the nearest multiple of one
    hundred dollars.

    (C) The commission shall certify each rate reduced under division (A) of this
    section to the county auditor not later than the first day of December. In the
    case of property on the real property tax list, the adjusted rates shall apply
    to the tax year in which the adjusted rates are certified and to each ensuing
    tax year, until the next tax year in which adjusted rates are certified under
    this section. In the case of manufactured or mobile homes on the manufactured
    home tax list, the adjusted rates shall apply to the tax year following the year
    in which the adjusted rates are certified and to each ensuing tax year, until
    the tax year following the next year in which adjusted rates are certified under
    this section. Notwithstanding any other section of the Revised Code to the contrary,
    a county budget commission shall not reallocate mills reduced pursuant to this
    section to any other taxing unit.

    (D) For a taxing unit that elects to forgo revenue from or otherwise voluntarily
    reduce the rate of a levy within the ten-mill limitation for one or more tax years,
    beyond which would be required under division (B) of this section, the calculation
    of the limit under division (B) of this section in subsequent tax years shall
    be based on the taxes charged and payable for the tax year preceding such voluntary
    reduction. Nothing in this section requires increasing the rate of a levy above
    what it was before the operation of this section.

    (E) If the current taxes charged and payable for a levy within the ten-mill limitation
    do not increase for a tax year to which section 5715.24 of the Revised Code applies
    in the county compared to the base taxes charged and payable, then the county
    auditor, in September of that year, shall calculate the increased rate of the
    levy that would cause the levy''s current taxes charged and payable to be the
    same as the levy''s base taxes charged and payable, rounded to the nearest one
    hundredths of one mill, and shall certify to the applicable taxing unit the increased
    rate. A taxing unit, not later than the first day of November, may adopt and certify
    to the county auditor a resolution or ordinance requesting that the levy be levied
    up to the rate certified by the county auditor under this division. The resolution
    or ordinance shall also be accompanied by information demonstrating the taxing
    unit''s need for the higher rate. The county auditor, upon receipt of this certification,
    shall convene the county budget commission, which shall decide whether to approve,
    partially approve, or deny the taxing unit''s request for an increased rate based
    on its evaluation of the taxing unit''s need for the increase. If it wholly or
    partially approves the increase, the commission shall certify the amount of the
    rate of increase to the county auditor not later than the first day of December.
    The increased rate shall apply to the current tax year, or the ensuing tax year
    for manufactured or mobile homes on the manufactured home tax list, and each ensuing
    year until the next tax year in which an adjusted rate for the levy is certified
    under this section. Nothing in this division allows a county budget commission
    or taxing unit to exceed the ten-mill limitation.

    (F) The tax commissioner shall annually determine the percentage change in the
    gross domestic product deflator determined by the bureau of economic analysis
    of the United States department of commerce from the first day of January of the
    third preceding calendar year to the last day of December of the preceding calendar
    year. The commissioner shall certify the resulting amount to each county auditor
    whose county undergoes a reappraisal or triennial update not later than the first
    day of September of each year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.316
- number: '5705.32'
  heading: Budget commission to adjust amounts required - revision of estimate - distribution
    - hearing
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) As used in this section:

    (1) "Unnecessary collections" mean collections from a tax beyond the reasonably
    anticipated financial needs of the taxing authority for the specific purposes
    of the tax after accounting for current fund balances, projected expenditures,
    and other available funding sources.

    (2) "Excessive collections" mean collections from a tax in an amount or at a rate
    that exceeds what is required to provide services at a level that is consistent
    with statutory obligations.

    (B) The county budget commission shall adjust the estimated amounts required from
    the general property tax for each fund, as shown by the tax budgets or other information
    required to be provided under section 5705.281 of the Revised Code, so as to bring
    the tax levies required therefor within the limitations specified in sections
    5705.01 to 5705.47 of the Revised Code, for such levies. The commission may revise
    and adjust the estimate of balances and receipts from all sources for each fund
    and shall determine the total appropriations that may be made therefrom.

    If a taxing unit declared its intent to forgo all or a portion of collections
    under division (E) of section 5705.29 of the Revised Code, the commission shall
    adjust the rate of each levy as required to result in that reduction in collections.

    (C) Except as otherwise provided in section 5705.31 of the Revised Code, the county
    budget commission may adjust the estimated amounts required from the general property
    tax for each fund, as shown by the tax budgets or other information required to
    be provided under section 5705.281 of the Revised Code, so as to bring the tax
    levies required therefor within levels the commission finds reasonable and prudent
    to avoid unnecessary or excessive collections. Before reducing the amount or rate
    of any tax pursuant to this division, the commission shall provide the taxing
    authority of the levying taxing unit and the levying taxing unit an opportunity
    to present, at a public hearing, information either considers relevant to the
    questions of if and to what extent the levy should be reduced.

    If the county budget commission adjusts amounts from any tax levied by a taxing
    unit that is not a qualifying subdivision, the adjustment shall be subject to
    both of the following:

    (1) No levy shall be reduced below the level that would cause it to collect less
    than what the levy collected in the preceding year, unless funds are available
    from reserve balance accounts, nonexpendable trust funds, or carryover amounts
    to offset a reduction below that level, and the budget commission shall consider
    reserve balance accounts, nonexpendable trust funds, and carryover amounts for
    that purpose;

    (2) No levy may be reduced under division (B) of this section to a level that
    would cause a school district subject to division (A) of section 3317.01 of the
    Revised Code to levy less than twenty mills for current operating expenses as
    required by that division.

    (D) The commission shall fix the amount of the county public library fund to be
    distributed to each board of public library trustees that has qualified under
    section 5705.28 of the Revised Code for participation in the proceeds of such
    fund. The amount paid to all libraries in the county from such fund shall never
    be a smaller per cent of the fund than the average of the percentages of the county''s
    classified taxes that were distributed to libraries in 1982, 1983, and 1984, as
    determined by the county auditor. The commission shall base the amount for distribution
    on the needs of such library for the construction of new library buildings, parts
    of buildings, improvements, operation, maintenance, or other expenses. In determining
    the needs of each library board of trustees, and in calculating the amount to
    be distributed to any library board of trustees on the basis of its needs, the
    commission shall make no reduction in its allocation from the fund on account
    of additional revenues realized by a library from increased taxes or service charges
    voted by its electorate, from revenues received through federal or state grants,
    projects, or programs, or from grants from private sources.

    (E) Notwithstanding the fact that alternative methods of financing such needs
    are available, after fixing the amount to be distributed to libraries, the commission
    shall fix the amount, if any, of the county public library fund to be distributed
    to each board of township park commissioners, the county, and each municipal corporation
    in accordance with the following:

    (1) Each municipal corporation in the county shall receive a per cent of the remainder
    that equals the per cent that the county auditor determines the classified property
    taxes originating in such municipal corporation in 1984 were of the total of all
    of the county''s classified property taxes in 1984. The commission may deduct
    from this amount any amount that the budget commission allows to the board of
    township park commissioners of a township park district, the boundaries of which
    are coextensive with or contained within the boundaries of the municipal corporation.

    (2) The county shall receive a per cent of the remainder that equals the per cent
    that the county auditor determines the classified property taxes originating outside
    of the boundaries of municipal corporations in the county in 1984 were of the
    total of all of the county''s classified property taxes in 1984. The commission
    may deduct from this amount any amount that the budget commission allows to the
    board of township park commissioners of a township park district, the boundaries
    of which are not coextensive with or contained within those of any municipal corporation
    in the county.

    (F) The commission shall separately set forth the amounts fixed and determined
    under divisions (D) and (E) of this section in the "official certificate of estimated
    resources," as provided in section 5705.35 of the Revised Code, and separately
    certify such amount to the county auditor who shall be guided thereby in the distribution
    of the county public library fund for and during the fiscal year. In determining
    such amounts, the commission shall be guided by the estimate certified by the
    tax commissioner and presented by the auditor under section 5705.31 of the Revised
    Code, as to the total amount of revenue to be received in the county public library
    fund during such fiscal year.

    (G)(1) At least five days before the date of any meeting at which the budget commission
    plans to discuss the distribution of the county public library fund, it shall
    notify each legislative authority and board of public library trustees, county
    commissioners, and township park commissioners eligible to participate in the
    distribution of the fund of the date, time, place, and agenda for the meeting.
    Any legislative authority or board entitled to notice under this division may
    designate an officer or employee of such legislative authority or board to whom
    the commission shall deliver the notice.

    (2) Before the final determination of the amount to be allotted to each subdivision
    from any source, the commission shall permit representatives of each subdivision
    and of each board of public library trustees to appear before it to explain its
    financial needs.

    (H) If any public library receives and expends any funds allocated to it under
    this section for the construction of new library buildings or parts of buildings,
    such library shall be free and open to the inhabitants of the county in which
    it is located. Any board of library trustees that receives funds under this section
    and section 5747.48 of the Revised Code shall have its financial records open
    for public inspection at all reasonable times.'
