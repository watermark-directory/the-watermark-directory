- number: '5709.92'
  heading: Ranking of school districts by capacity
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) As used in this section:

    (1) "School district" means a city, local, or exempted village school district.

    (2) "Joint vocational school district" means a joint vocational school district
    created under section 3311.16 of the Revised Code, and includes a cooperative
    education school district created under section 3311.52 or 3311.521 of the Revised
    Code and a county school financing district created under section 3311.50 of the
    Revised Code.

    (3) "Total resources" means the sum of the amounts described in divisions (A)(3)(a)
    to (g) of this section less any reduction required under division (C)(3)(a) of
    this section.

    (a) The state education aid for fiscal year 2015;

    (b) The sum of the payments received in fiscal year 2015 for current expense levy
    losses under division (C)(3) of section 5727.85 and division (C)(12) of section
    5751.21 of the Revised Code, as they existed at that time, excluding the portion
    of such payments attributable to levies for joint vocational school district purposes;

    (c) The sum of fixed-sum levy loss payments received by the school district in
    fiscal year 2015 under division (F)(1) of section 5727.85 and division (E)(1)
    of section 5751.21 of the Revised Code, as they existed at that time, for fixed-sum
    levies charged and payable for a purpose other than paying debt charges;

    (d) The district''s taxes charged and payable against all property on the tax
    list of real and public utility property for current expense purposes for tax
    year 2014, including taxes charged and payable from levies charged and payable
    under section 5705.194 of the Revised Code, excluding taxes levied for joint vocational
    school district purposes or levied under section 5705.23 of the Revised Code;

    (e) The amount certified for fiscal year 2015 under division (A)(2) of section
    3317.08 of the Revised Code;

    (f) Distributions received during calendar year 2014 from taxes levied under section
    718.09 of the Revised Code;

    (g) Distributions received during fiscal year 2015 from the gross casino revenue
    county student fund.

    (4)(a) "State education aid" for a school district means the sum of state amounts
    computed for the district under sections 3317.022 and 3317.0212 of the Revised
    Code after any amounts are added or subtracted under Section 263.240 of Am. Sub.
    H.B. 59 of the 130th general assembly, entitled "TRANSITIONAL AID FOR CITY, LOCAL,
    AND EXEMPTED VILLAGE SCHOOL DISTRICTS."

    (b) "State education aid" for a joint vocational district means the amount computed
    for the district under section 3317.16 of the Revised Code after any amounts are
    added or subtracted under Section 263.250 of Am. Sub. H.B. 59 of the 130th general
    assembly, entitled "TRANSITIONAL AID FOR JOINT VOCATIONAL SCHOOL DISTRICTS."

    (5) "Taxes charged and payable" means taxes charged and payable after the reduction
    required by section 319.301 of the Revised Code but before the reductions required
    by sections 319.302 and 323.152 of the Revised Code.

    (6) "Capacity quintile" means the capacity measure quintiles determined under
    division (B) of this section.

    (7) "Threshold per cent" means the following:

    (a) For a school district in the lowest capacity quintile, one per cent for fiscal
    year 2016 and two per cent for fiscal year 2017.

    (b) For a school district in the second lowest capacity quintile, one and one-fourth
    per cent for fiscal year 2016 and two and one-half per cent for fiscal year 2017.

    (c) For a school district in the third lowest capacity quintile, one and one-half
    per cent for fiscal year 2016 and three per cent for fiscal year 2017.

    (d) For a school district in the second highest capacity quintile, one and three-fourths
    per cent for fiscal year 2016 and three and one-half per cent for fiscal year
    2017.

    (e) For a school district in the highest capacity quintile, two per cent for fiscal
    year 2016 and four per cent for fiscal year 2017.

    (f) For a joint vocational school district, two per cent for fiscal year 2016
    and four per cent for fiscal year 2017.

    (8) "Current expense allocation" means the sum of the payments received by a school
    district or joint vocational school district in fiscal year 2015 for current expense
    levy losses under division (C)(3) of section 5727.85 and division (C)(12) of section
    5751.21 of the Revised Code as they existed at that time, less any reduction required
    under division (C)(3)(b) of this section.

    (9) "Non-current expense allocation" means the sum of the payments received by
    a school district or joint vocational school district in fiscal year 2015 for
    levy losses under division (C)(3)(c) of section 5727.85 and division (C)(12)(c)
    of section 5751.21 of the Revised Code, as they existed at that time, and levy
    losses in fiscal year 2015 under division (H) of section 5727.84 of the Revised
    Code as that section existed at that time attributable to levies for and payments
    received for losses on levies intended to generate money for maintenance of classroom
    facilities.

    (10) "Operating TPP fixed-sum levy losses" means the sum of payments received
    by a school district in fiscal year 2015 for levy losses under division (E) of
    section 5751.21 of the Revised Code, excluding levy losses for debt purposes.

    (11) "Operating S.B. 3 fixed-sum levy losses" means the sum of payments received
    by the school district in fiscal year 2015 for levy losses under division (H)
    of section 5727.84 of the Revised Code, excluding levy losses for debt purposes.

    (12) "TPP fixed-sum debt levy losses" means the sum of payments received by a
    school district in fiscal year 2015 for levy losses under division (E) of section
    5751.21 of the Revised Code for debt purposes.

    (13) "S.B. 3 fixed-sum debt levy losses" means the sum of payments received by
    the school district in fiscal year 2015 for levy losses under division (H) of
    section 5727.84 of the Revised Code for debt purposes.

    (14) "Qualifying levies" means qualifying levies described in section 5751.20
    of the Revised Code as that section was in effect before July 1, 2015.

    (15) "Total taxable value" has the same meaning as in section 3317.02 of the Revised
    Code.

    (B) The department of education and workforce shall rank all school districts
    in the order of districts'' capacity measures determined under former section
    3317.018 of the Revised Code from lowest to highest, and divide such ranking into
    quintiles, with the first quintile containing the twenty per cent of school districts
    having the lowest capacity measure and the fifth quintile containing the twenty
    per cent of school districts having the highest capacity measure. This calculation
    and ranking shall be performed once, in fiscal year 2016.

    (C)(1) In fiscal year 2016, payments shall be made to school districts and joint
    vocational school districts equal to the sum of the amounts described in divisions
    (C)(1)(a) or (b) and (C)(1)(c) of this section. In fiscal year 2017, payments
    shall be made to school districts and joint vocational school districts equal
    to the amount described in division (C)(1)(a) or (b) of this section.

    (a) If the ratio of the current expense allocation to total resources is equal
    to or less than the district''s threshold percent, zero;

    (b) If the ratio of the current expense allocation to total resources is greater
    than the district''s threshold per cent, the difference between the current expense
    allocation and the product of the threshold percentage and total resources;

    (c) For fiscal year 2016, the product of the non-current expense allocation multiplied
    by fifty per cent.

    (2) In fiscal year 2018 and subsequent fiscal years, payments shall be made to
    school districts and joint vocational school districts equal to the difference
    obtained by subtracting the amount described in division (C)(2)(b) of this section
    from the amount described in division (C)(2)(a) of this section, provided that
    such amount is greater than zero.

    (a) The sum of the payments received by the district under division (C)(1)(b)
    or (C)(2) of this section for the immediately preceding fiscal year;

    (b) One-sixteenth of one per cent of the average of the total taxable value of
    the district for tax years 2014, 2015, and 2016.

    (3)(a) "Total resources" used to compute payments under division (C)(1) of this
    section shall be reduced to the extent that payments distributed in fiscal year
    2015 were attributable to levies no longer charged and payable for tax year 2014.

    (b) "Current expense allocation" used to compute payments under division (C)(1)
    of this section shall be reduced to the extent that the payments distributed in
    fiscal year 2015 were attributable to levies no longer charged and payable for
    tax year 2014.

    (4) The department of education and workforce shall report to each school district
    and joint vocational school district the apportionment of the payments under division
    (C)(1) of this section among the district''s funds based on qualifying levies.

    (D)(1) Payments in the following amounts shall be made to school districts and
    joint vocational school districts in tax years 2016 through 2021:

    (a) In tax year 2016, the sum of the district''s operating TPP fixed-sum levy
    losses and operating S.B. 3 fixed-sum levy losses.

    (b) In tax year 2017, the sum of the district''s operating TPP fixed-sum levy
    losses and eighty per cent of operating S.B. 3 fixed-sum levy losses.

    (c) In tax year 2018, the sum of eighty per cent of the district''s operating
    TPP fixed-sum levy losses and sixty per cent of its operating S.B. 3 fixed-sum
    levy losses.

    (d) In tax year 2019, the sum of sixty per cent of the district''s operating TPP
    fixed-sum levy losses and forty per cent of its operating S.B. 3 fixed-sum levy
    losses.

    (e) In tax year 2020, the sum of forty per cent of the district''s operating TPP
    fixed-sum levy losses and twenty per cent of its operating S.B. 3 fixed-sum levy
    losses.

    (f) In tax year 2021, twenty per cent of the district''s operating TPP fixed-sum
    levy losses.

    No payment shall be made under division (D)(1) of this section after tax year
    2021.

    (2) Amounts are payable under division (D) of this section for fixed-sum levy
    losses only to the extent of such losses for qualifying levies that remain in
    effect for the current tax year. For this purpose, a qualifying levy levied under
    section 5705.194 or 5705.213 of the Revised Code remains in effect for the current
    tax year only if a tax levied under either of those sections is charged and payable
    for the current tax year for an annual sum at least equal to the annual sum levied
    by the board of education for tax year 2004 under those sections less the amount
    of the payment under this division.

    (E)(1) For fixed-sum levies for debt purposes, payments shall be made to school
    districts and joint vocational school districts equal to one hundred per cent
    of the district''s fixed-sum levy loss determined under division (E) of section
    5751.20 and division (H) of section 5727.84 of the Revised Code as in effect before
    July 1, 2015, and paid in tax year 2014. No payment shall be made for qualifying
    levies that are no longer charged and payable.

    (2) Beginning in 2016, by the thirty-first day of January of each year, the tax
    commissioner shall review the calculation of fixed-sum levy loss for debt purposes
    determined under division (E) of section 5751.20 and division (H) of section 5727.84
    of the Revised Code as in effect before July 1, 2015. If the commissioner determines
    that a fixed-sum levy that had been scheduled to be reimbursed in the current
    year is no longer charged and payable, a revised calculation for that year and
    all subsequent years shall be made.

    (F)(1) For taxes levied within the ten-mill limitation for debt purposes in tax
    year 1998 in the case of electric company tax value losses, and in tax year 1999
    in the case of natural gas company tax value losses, payments shall be made to
    school districts and joint vocational school districts equal to one hundred per
    cent of the loss computed under division (D) of section 5727.85 of the Revised
    Code as in effect before July 1, 2015, as if the tax were a fixed-rate levy, but
    those payments shall extend through fiscal year 2016.

    (2) For taxes levied within the ten-mill limitation for debt purposes in tax year
    2005, payments shall be made to school districts and joint vocational school districts
    equal to one hundred per cent of the loss computed under division (D) of section
    5751.21 of the Revised Code as in effect before July 1, 2015, as if the tax were
    a fixed-rate levy, but those payments shall extend through fiscal year 2018.

    (G) If all the territory of a school district or joint vocational school district
    is merged with another district, or if a part of the territory of a school district
    or joint vocational school district is transferred to an existing or newly created
    district, the department of education and workforce, in consultation with the
    tax commissioner, shall adjust the payments made under this section as follows:

    (1) For a merger of two or more districts, fixed-sum levy losses, total resources,
    current expense allocation, and non-current expense allocation of the successor
    district shall be the sum of such items for each of the districts involved in
    the merger.

    (2) If property is transferred from one district to a previously existing district,
    the amount of the total resources, current expense allocation, and non-current
    expense allocation that shall be transferred to the recipient district shall be
    an amount equal to the total resources, current expense allocation, and non-current
    expense allocation of the transferor district times a fraction, the numerator
    of which is the number of pupils being transferred to the recipient district,
    measured, in the case of a school district, by formula ADM as defined in section
    3317.02of the Revised Code or, in the case of a joint vocational school district,
    by formula ADM as defined for a joint vocational school district in that section,
    and the denominator of which is the formula ADM of the transferor district.

    (3) After December 31, 2010, if property is transferred from one or more districts
    to a district that is newly created out of the transferred property, the newly
    created district shall be deemed not to have any total resources, current expense
    allocation, total allocation, or non-current expense allocation.

    (4) If the recipient district under division (G)(2) of this section or the newly
    created district under division (G)(3) of this section is assuming debt from one
    or more of the districts from which the property was transferred and any of the
    districts losing the property had fixed-sum levy losses, the department of education
    and workforce, in consultation with the tax commissioner, shall make an equitable
    division of the reimbursements for those losses.

    (H) The payments required by divisions (C), (D), (E), (F), and (I) of this section
    shall be distributed periodically to each school and joint vocational school district
    by the department of education and workforce unless otherwise provided for. Except
    as provided in division (D) of this section, if a levy that is a qualifying levy
    is not charged and payable in any year after 2014, payments to the school district
    or joint vocational school district shall be reduced to the extent that the payments
    distributed in fiscal year 2015 were attributable to the levy loss of that levy.

    (I) For fiscal years 2022 through 2026, if the total amount to be received under
    divisions (C) and (E) of this section by any school district that has a nuclear
    power plant located within its territory is less than the amount the district
    received under this section in fiscal year 2017, the district shall receive a
    supplemental payment equal to the difference between the amount to be received
    under those divisions for the fiscal year and the amount received under this section
    in fiscal year 2017.'
