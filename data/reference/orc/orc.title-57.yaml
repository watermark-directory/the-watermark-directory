    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: Works, machinery, pipe lines, and fixtures belonging to a municipal corporation
    and used exclusively for conveying water to it, or for heating or lighting it,
    shall be exempt from taxation.
  history: null
