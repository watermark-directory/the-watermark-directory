- number: '5748.022'
  heading: Resolution reducing tax rate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5748'
    name: School District Income Tax
  text: 'A majority of the members of a board of education of a school district levying
    a tax under section 5748.02 of the Revised Code may adopt a resolution reducing
    the rate of the tax by a multiple of one-fourth of one per cent.

    The resolution shall set forth the current rate of the tax, the reduced rate of
    tax that results from adoption of the resolution, the purpose or purposes for
    which the tax is levied, the remaining number of years the tax will be levied
    or that it is levied for a continuing period of time, and the date on which the
    reduced tax rate shall take effect, which shall be the ensuing first day of January
    occurring at least forty-five days after a copy of the resolution is certified
    to the tax commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5748.022
- number: '5748.03'
  heading: Ballot form
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5748'
    name: School District Income Tax
  text: '(A) The form of the ballot on a question submitted to the electors under
    section 5748.02 of the Revised Code shall be as follows:

    "Shall an annual income tax of _______ (state the proposed rate of tax) on the
    school district income of individuals be imposed by _______ (state the name of
    the school district), for _______ (state the number of years the tax would be
    levied, or that it would be levied for a continuing period of time), beginning
    _______ (state the date the tax would first take effect), for the purpose of ______
    (state the purpose of the tax)?


    FOR THE TAXAGAINST THE TAX "

    (B)(1) If the question submitted to electors proposes a school district income
    tax only on taxable income as defined in division (E)(2) of section 5748.01 of
    the Revised Code, the form of the ballot shall be modified by stating that the
    tax is to be levied on the "earned income of individuals residing in the school
    district" in lieu of the "school district income of individuals."

    (2) If the question submitted to electors proposes to renew one or more expiring
    income tax levies, the ballot shall be modified by adding the following language
    immediately after the name of the school district that would impose the tax: "to
    renew an income tax (or income taxes) expiring at the end of ________ (state the
    last year the existing income tax or taxes may be levied)."

    (3) If the question includes a proposal under division (B)(2) of section 5748.02
    of the Revised Code to reduce the rate of one or more school district property
    taxes, the ballot shall state that the purpose of the school district income tax
    is for current expenses, and the form of the ballot shall be modified by adding
    the following language immediately after the statement of the purpose of the proposed
    income tax: ", and shall the rate of an existing tax on property, currently levied
    for the purpose of current expenses at the rate of _______ mills, be REDUCED to
    _______ mills for each $1 of taxable value, which amounts to a reduction from
    $_______ (effective rate) to $_______ (effective rate) for each $100,000 of the
    county auditor''s market value, that the county auditor estimates will collect
    $_____ annually, the reduction continuing until any such time as the income tax
    is repealed." In lieu of "for the tax" and "against the tax," the phrases "for
    the issue" and "against the issue," respectively, shall be used. If a board of
    education proposes a reduction in the rates of more than one tax, the ballot language
    shall be modified accordingly to express the rates at which those taxes currently
    are levied and the rates to which the taxes will be reduced.

    (C) The board of elections shall certify the results of the election to the board
    of education and to the tax commissioner. If a majority of the electors voting
    on the question vote in favor of it, the income tax, the applicable provisions
    of Chapter 5747. of the Revised Code, and the reduction in the rate or rates of
    existing property taxes if the question included such a reduction shall take effect
    on the date specified in the resolution. If the question approved by the voters
    includes a reduction in the rate of a school district property tax, the board
    of education shall not levy the tax at a rate greater than the rate to which the
    tax is reduced, unless the school district income tax is repealed in an election
    under section 5748.04 of the Revised Code.

    (D) If the rate at which a property tax is levied and collected is reduced pursuant
    to a question approved under this section, the tax commissioner shall compute
    the percentage required to be computed for that tax under division (D) of section
    319.301 of the Revised Code each year the rate is reduced as if the tax had been
    levied in the preceding year at the rate at which it has been reduced. If the
    rate of a property tax increases due to the repeal of the school district income
    tax pursuant to section 5748.04 of the Revised Code, the tax commissioner, for
    the first year for which the rate increases, shall compute the percentage as if
    the tax in the preceding year had been levied at the rate at which the tax was
    authorized to be levied prior to any rate reduction.'
