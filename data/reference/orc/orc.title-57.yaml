- number: '5703.051'
  heading: Procedure for certificate of abatement
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: 'The tax commissioner may pay to the payee or transferee of a certificate
    of abatement, issued pursuant to division (B) of section 5703.05 of the Revised
    Code, the face amount of such certificate or, in the event such certificate is
    tendered in payment of other taxes pursuant to section 5703.05, 5725.08, or 5725.16
    of the Revised Code, the tax commissioner may refund to such person an amount
    equal to the difference between the tax due and the face amount of the certificate.
    The tax commissioner shall certify the amount to be refunded to the director of
    budget and management and treasurer of state for payment from the tax refund fund
    created by section 5703.052 of the Revised Code.

    If a certificate of abatement for a tax which by law is payable into a specified
    fund, is to be applied to a tax which by law is to be paid into another fund,
    the tax commissioner shall certify to the director for transfer from the tax refund
    fund to the fund accepting the certificate of abatement an amount sufficient to
    cover the amount of current tax reduction represented by the certificate of abatement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5703.051
- number: '5703.0510'
  heading: Claiming tax credits; required documentation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5703'
    name: Department Of Taxation
  text: '(A) Notwithstanding any other provision of the Revised Code that requires
    a taxpayer to provide a tax credit certificate to the tax commissioner upon the
    commissioner''s request, any person claiming a credit against a tax or fee administered
    by the commissioner shall provide a copy of any accompanying certificate issued
    by the director of development services or by another state agency, if applicable,
    demonstrating the person''s eligibility for the credit claimed.

    (B) If the commissioner prescribes a form for the purpose of tracking the credits
    claimed by a person against any tax or fee administered by the commissioner, the
    person shall provide the completed form and a copy of any certificate described
    in division (A) of this section on or before the due date of the return, report,
    or schedule for the tax or fee against which the credit is claimed.

    (C) If a person fails to provide a certificate or form as required under this
    section, the commissioner shall deny the credit claimed by the person until such
    certificate or form is provided to the commissioner. Any amount denied under this
    section may be assessed in the same manner as the underlying tax or fee.'
