- number: '5741.24'
  heading: Commissioner may delegate investigation powers - cooperation in investigations
    and prosecutions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: 'For purposes of enforcing this chapter, the tax commissioner, in accordance
    with section 5743.45 of the Revised Code, may delegate any investigation powers
    of the commissioner to any employee of the department of taxation who has been
    certified by the Ohio peace officer training commission and who is engaged in
    the enforcement of this chapter. Upon such a delegation in accordance with that
    section, the provisions of that section relative to the powers and authority of
    the employee and the suspension or revocation of the delegation apply. No employee
    of the department shall divulge any information acquired as a result of any investigation
    pursuant to this chapter, except as may be required by the commissioner or a court.

    The department shall cooperate with the attorney general, local law enforcement
    officials, and the appropriate agencies of the federal government and other states
    in the investigation and prosecution of violations of this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.24
- number: '5741.25'
  heading: Failure to file or make payment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: If any corporation, limited liability company, or business trust registered
    or required to be registered under section 5741.17 of the Revised Code and required
    to file returns and remit tax due to the state under this chapter fails for any
    reason to make the filing or payment, any of its employees having control or supervision
    of or charged with the responsibility of filing returns and making payments, or
    any of its officers, members, managers, or trustees who are responsible for the
    execution of the corporation's, limited liability company's, or business trust's
    fiscal responsibilities, shall be personally liable for the failure. The dissolution,
    termination, or bankruptcy of a corporation, limited liability company, or business
    trust shall not discharge a responsible officer's, member's, manager's, employee's,
    or trustee's liability for a failure of the corporation, limited liability company,
    or business trust to file returns or remit tax due. The sum due for the liability
    may be collected by assessment in the manner provided in section 5741.11 or 5741.13
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.25
- number: '5741.99'
  heading: Penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5741'
    name: Use Tax; Storage Tax
  text: '(A) Whoever violates section 5741.19 or 5741.21 of the Revised Code shall
    be fined not less than twenty-five nor more than one hundred dollars for a first
    offense; for each subsequent offense such person shall, if a corporation, be fined
    not less than one hundred nor more than five hundred dollars, or if an individual,
    or a member of a partnership, firm, or association, be fined not less than twenty-five
    nor more than one hundred dollars, or imprisoned not more than sixty days, or
    both.

    (B) Whoever violates section 5741.22 of the Revised Code shall be fined not more
    than five hundred dollars.

    (C) Whoever violates sections 5741.01 to 5741.22, inclusive, of the Revised Code,
    or any lawful rule or regulation promulgated by the department of taxation under
    authority of said sections, for the violation of which no penalty is provided
    elsewhere, shall be fined not less than twenty-five nor more than one hundred
    dollars.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5741.99
- number: '5743.01'
  heading: Cigarette tax definitions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: 'As used in this chapter:

    (A) "Person" includes individuals, firms, partnerships, associations, joint-stock
    companies, corporations, combinations of individuals of any form, and the state
    and any of its political subdivisions.

    (B) "Wholesale dealer" includes only those persons:

    (1) Who bring in or cause to be brought into this state unstamped cigarettes purchased
    directly from the manufacturer, producer, or importer of cigarettes for sale in
    this state but does not include persons who bring in or cause to be brought into
    this state cigarettes with respect to which no evidence of tax payment is required
    thereon as provided in section 5743.04 of the Revised Code; or

    (2) Who are engaged in the business of selling cigarettes, tobacco products, or
    vapor products to others for the purpose of resale.

    "Wholesale dealer" does not include any cigarette manufacturer, export warehouse
    proprietor, or importer with a valid permit under 26 U.S.C. 5713 if that person
    sells cigarettes in this state only to wholesale dealers holding valid and current
    licenses under section 5743.15 of the Revised Code or to an export warehouse proprietor
    or another manufacturer.

    (C) "Retail dealer" includes:

    (1) In reference to dealers in cigarettes, every person other than a wholesale
    dealer engaged in the business of selling cigarettes in this state, regardless
    of whether the person is located in this state or elsewhere, and regardless of
    quantity, amount, or number of sales;

    (2) In reference to dealers in tobacco products, any person in this state engaged
    in the business of selling tobacco products to ultimate consumers in this state,
    regardless of quantity, amount, or number of sales;

    (3) In reference to dealers in vapor products, any person in this state engaged
    in the business of selling vapor products to ultimate consumers in this state,
    regardless of quantity, amount, or number of sales.

    (D) "Sale" includes exchange, barter, gift, offer for sale, and distribution,
    and includes transactions in interstate or foreign commerce.

    (E) "Cigarettes" includes any roll for smoking made wholly or in part of tobacco,
    irrespective of size or shape, and whether or not such tobacco is flavored, adulterated,
    or mixed with any other ingredient, the wrapper or cover of which is made of paper,
    reconstituted cigarette tobacco, homogenized cigarette tobacco, cigarette tobacco
    sheet, or any similar materials other than cigar tobacco.

    (F) "Package" means the individual package, box, or other container in or from
    which retail sales of cigarettes are normally made or intended to be made.

    (G) "Storage" includes any keeping or retention of cigarettes, tobacco products,
    or vapor products for use or consumption in this state.

    (H) "Use" includes the exercise of any right or power incidental to the ownership
    of cigarettes, tobacco products, or vapor products.

    (I) "Tobacco product" or "other tobacco product" means any product made from tobacco,
    other than cigarettes, that is made for smoking or chewing, or both, and snuff.

    (J) "Wholesale price" means the invoice price, including all federal excise taxes,
    at which the manufacturer of the tobacco product sells the tobacco product to
    unaffiliated distributors, excluding any discounts based on the method of payment
    of the invoice or on time of payment of the invoice. If the taxpayer buys from
    other than a manufacturer, "wholesale price" means the invoice price, including
    all federal excise taxes and excluding any discounts based on the method of payment
    of the invoice or on time of payment of the invoice.

    (K) "Distributor" means:

    (1) Any manufacturer who sells, barters, exchanges, or distributes tobacco products
    to a retail dealer in the state, except when selling to a retail dealer that has
    filed with the manufacturer a signed statement agreeing to pay and be liable for
    the tax imposed by section 5743.51 of the Revised Code;

    (2) Any wholesale dealer located in the state who receives tobacco products from
    a manufacturer, or who receives tobacco products on which the tax imposed by this
    chapter has not been paid;

    (3) Any wholesale dealer located outside the state who sells, barters, exchanges,
    or distributes tobacco products to a wholesale or retail dealer in the state;
    or

    (4) Any retail dealer who receives tobacco products on which the tax has not or
    will not be paid by another distributor, including a retail dealer that has filed
    a signed statement with a manufacturer in which the retail dealer agrees to pay
    and be liable for the tax that would otherwise be imposed on the manufacturer
    by section 5743.51 of the Revised Code.

    (L) "Taxpayer" means any person liable for the tax imposed by section 5743.51,
    5743.62, or 5743.63 of the Revised Code.

    (M) "Seller" means any person located outside this state engaged in the business
    of selling tobacco products or vapor products to consumers for storage, use, or
    other consumption in this state.

    (N) "Manufacturer" means any person who manufactures and sells cigarettes, tobacco
    products, or vapor products.

    (O) "Importer" means any person that is authorized, under a valid permit issued
    under Section 5713 of the Internal Revenue Code, to import finished cigarettes
    into the United States, either directly or indirectly.

    (P) "Little cigar" means any roll for smoking, other than cigarettes, made wholly
    or in part of tobacco that uses an integrated cellulose acetate filter or other
    filter and is wrapped in any substance containing tobacco, other than natural
    leaf tobacco.

    (Q) "Premium cigar" means any roll for smoking, other than cigarettes and little
    cigars, that is made wholly or in part of tobacco and that has all of the following
    characteristics:

    (1) The binder and wrapper of the roll consist entirely of leaf tobacco.

    (2) The roll contains no filter or tip, nor any mouthpiece consisting of a material
    other than tobacco.

    (3) The weight of one thousand such rolls is at least six pounds.

    (R) "Maximum tax amount" means fifty cents plus the tax adjustment factor computed
    under this division.

    In April of each year beginning in 2018, the tax commissioner shall compute a
    tax adjustment factor by multiplying fifty cents by the cumulative percentage
    increase in the consumer price index (all items, all urban consumers) prepared
    by the bureau of labor statistics of the United States department of labor from
    January 1, 2017, to the last day of December of the preceding year and rounding
    the resulting product to the nearest one cent; provided, that the tax adjustment
    factor for any year shall not be less than that for the immediately preceding
    year. The maximum tax amount resulting from the computation of the tax adjustment
    factor applies on and after the ensuing first day of July through the thirtieth
    day of June thereafter.

    (S) "Secondary manufacturer" means any person in this state engaged in the business
    of repackaging, reconstituting, diluting, or reprocessing a vapor product for
    resale to consumers.

    (T) "Vapor product" means any liquid solution or other substance that (1) contains
    nicotine and (2) is depleted as it is used in an electronic smoking product. "Vapor
    product" does not include any solution or substance regulated as a drug, device,
    or combination product under Chapter V of the "Federal Food, Drug, and Cosmetic
    Act," 21 U.S.C. 301, et seq.

    (U) "Electronic smoking product" means any noncombustible product, other than
    a cigarette or tobacco product, that (1) contains or is designed to use vapor
    products and (2) employs a heating element, power source, electronic circuit,
    or other electronic, chemical, or mechanical means, regardless of shape or size,
    that can be used to produce vapor from the vapor product. "Electronic smoking
    product" includes, but is not limited to, an electronic cigarette, electronic
    cigar, electronic cigarillo, electronic pipe, electronic hookah, vape pen, vaporizer,
    or similar product or device, but does not include any product regulated as a
    drug, device, or combination product under Chapter V of the "Federal Food, Drug,
    and Cosmetic Act," 21 U.S.C. 301, et seq.

    (V) "Vapor distributor" means any person that:

    (1) Sells vapor products to a retail dealer;

    (2) Is a retail dealer that receives vapor products with respect to which the
    tax imposed by this chapter has not or will not be paid by another person that
    is a vapor distributor;

    (3) Is a secondary manufacturer;

    (4) Is a wholesale dealer located in this state that receives vapor products from
    a manufacturer, or receives vapor products on which the tax imposed by this chapter
    has not been paid;

    (5) Is a wholesale dealer located outside this state that sells vapor products
    to a wholesale dealer in this state.

    (W) "Vapor volume" means one of the following, as applicable:

    (1) If a vapor product is sold in liquid form, one-tenth of one milliliter of
    vapor product;

    (2) If the vapor product is sold in a nonliquid form, one-tenth of one gram of
    vapor product.'
