- number: '5727.86'
  heading: Payments from local government property tax replacement fund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'No determinations, computations, certifications, or payments shall be made
    under this section after June 30, 2015.

    (A) The tax commissioner shall compute the payments to be made to each local taxing
    unit, and to each public library that receives the proceeds of a tax levied under
    section 5705.23 of the Revised Code, for each year according to divisions (A)(1),
    (2), (3), and (4) and division (E) of this section, and shall distribute the payments
    in the manner prescribed by division (C) of this section. The calculation of the
    fixed-sum levy loss shall cover a time period sufficient to include all fixed-sum
    levies for which the tax commissioner determined, pursuant to division (H) of
    section 5727.84 of the Revised Code, that a fixed-sum levy loss is to be reimbursed.

    (1) Except as provided in divisions (A)(3) and (4) of this section, the following
    amounts shall be paid on or before the thirty-first day of August and the twenty-eighth
    day of February:

    (a) For years 2002 through 2006, fifty per cent of the fixed-rate levy loss computed
    under division (G) of section 5727.84 of the Revised Code;

    (b) For years 2007 through 2010, forty per cent of the fixed-rate levy loss computed
    under division (G) of section 5727.84 of the Revised Code;

    (c) For the payment in 2011 to be made on or before the twentieth day of February,
    the amount required to be paid in 2010 on or before the twentieth day of February;

    (d) For the payment in 2011 to be made on or before the thirty-first day of August,
    the sum of the amounts in divisions (A)(1)(d)(i) or (ii) and (iii) of this section:

    (i) If the ratio of fifty per cent of the taxing unit''s 2010 S.B. 3 allocation
    to its total resources is equal to or less than the threshold per cent, zero;

    (ii) If the ratio of fifty per cent of the taxing unit''s 2010 S.B. 3 allocation
    to its total resources is greater than the threshold per cent, the difference
    of fifty per cent of the 2010 S.B. 3 allocation minus the product of total resources
    multiplied by the threshold per cent;

    (iii) In the case of a municipal corporation, fifty per cent of the product of
    its 2010 non-current expense S.B. 3 allocation multiplied by seventy-five per
    cent.

    (e) For 2012 and each year thereafter, the sum of the amounts in divisions (A)(1)(e)(i)
    or (ii) and (iii) of this section:

    (i) If the ratio of the taxing unit''s 2010 S.B. 3 allocation to its total resources
    is equal to or less than the threshold per cent, zero;

    (ii) If the ratio of the taxing unit''s 2010 S.B. 3 allocation to its total resources
    is greater than the threshold per cent, fifty per cent of the difference of the
    2010 S.B. 3 allocation minus the product of total resources multiplied by the
    threshold per cent;

    (iii) In the case of a municipal corporation, fifty per cent of the product of
    its 2010 non-current expense S.B. 3 allocation multiplied by fifty per cent for
    year 2012 and by twenty-five per cent for years 2013 and thereafter.

    (f) For the payment in 2012 to be made to a public library on or before the thirty-first
    day of August and for all such payments to be made in 2013 and thereafter, the
    amount in division (A)(1)(f)(i) or (ii) of this section:

    (i) If the ratio of S.B. 3 allocation for library purposes to total library resources
    is equal to or less than the threshold per cent, zero;

    (ii) If the ratio of S.B. 3 allocation for library purposes to total library resources
    is greater than the threshold per cent, fifty per cent of the difference of the
    S.B. 3 allocation for library purposes minus the product of total library resources
    multiplied by the threshold per cent.

    (2) For fixed-sum levy losses determined under division (H) of section 5727.84
    of the Revised Code, payments shall be made in the amount of one hundred per cent
    of the fixed-sum levy loss for payments required to be made in 2002 and thereafter.

    (3) A local taxing unit in a county of less than two hundred fifty square miles
    that receives eighty per cent or more of its combined general fund and bond retirement
    fund revenues from property taxes and rollbacks based on 1997 actual revenues
    as presented in its 1999 tax budget, and in which electric companies and rural
    electric companies comprise over twenty per cent of its property valuation, shall
    receive one hundred per cent of its fixed-rate levy losses from electric company
    tax value losses certified under division (A) of this section in years 2002 to
    2010. Beginning in 2011, payments for such local taxing units shall be determined
    under division (A)(1) of this section.

    (4) For taxes levied within the ten-mill limitation or pursuant to a municipal
    charter for debt purposes in tax year 1998 in the case of electric company tax
    value losses, and in tax year 1999 in the case of natural gas company tax value
    losses, payments shall be made equal to one hundred per cent of the loss computed
    as if the tax were a fixed-rate levy, but those payments shall extend from 2011
    through 2016 if the levy was charged and payable for debt purposes in tax year
    2010. If the levy is not charged and payable for debt purposes in tax year 2010
    or any following tax year before tax year 2016, payments for that levy shall be
    made under division (A)(1) of this section beginning with the first year after
    the year the levy is charged and payable for a purpose other than debt. For the
    purposes of this division, taxes levied pursuant to a municipal charter refer
    to taxes levied pursuant to a provision of a municipal charter that permits the
    tax to be levied without prior voter approval.

    (B) Beginning in 2003, by the thirty-first day of January of each year, the tax
    commissioner shall review the calculation originally made under division (A) of
    this section of the fixed-sum levy loss determined under division (H) of section
    5727.84 of the Revised Code. If the commissioner determines that a fixed-sum levy
    that had been scheduled to be reimbursed in the current year has expired, a revised
    calculation for that and all subsequent years shall be made.

    (C) Payments to local taxing units and public libraries required to be made under
    divisions (A) and (E) of this section shall be paid from the local government
    property tax replacement fund to the county undivided income tax fund in the proper
    county treasury. The county treasurer shall distribute amounts paid under division
    (A) of this section to the proper local taxing unit or public library as if they
    had been levied and collected as taxes, and the local taxing unit or public library
    shall apportion the amounts so received among its funds in the same proportions
    as if those amounts had been levied and collected as taxes. Except in the case
    of amounts distributed to the county as a local taxing unit, amounts distributed
    under division (E)(2) of this section shall be credited to the general fund of
    the local taxing unit that receives them. Amounts distributed to each county as
    a local taxing unit under division (E)(2) of this section shall be credited in
    the proportion that the current taxes charged and payable from each levy of or
    by the county bears to the total current taxes charged and payable from all levies
    of or by the county.

    (D) By February 5, 2002, the tax commissioner shall estimate the amount of money
    in the local government property tax replacement fund in excess of the amount
    necessary to make payments in that month under division (C) of this section. Notwithstanding
    division (A) of this section, the tax commissioner may pay any local taxing unit,
    from those excess funds, nine and four-tenths times the amount computed for 2002
    under division (A)(1) of this section. A payment made under this division shall
    be in lieu of the payment to be made in February 2002 under division (A)(1) of
    this section. A local taxing unit receiving a payment under this division will
    no longer be entitled to any further payments under division (A)(1) of this section.
    A payment made under this division shall be paid from the local government property
    tax replacement fund to the county undivided income tax fund in the proper county
    treasury. The county treasurer shall distribute the payment to the proper local
    taxing unit as if it had been levied and collected as taxes, and the local taxing
    unit shall apportion the amounts so received among its funds in the same proportions
    as if those amounts had been levied and collected as taxes.

    (E)(1) On the thirty-first day of July of 2002, 2003, 2004, 2005, and 2006, and
    on the thirty-first day of January and July of 2007 through January 2011, if the
    amount credited to the local government property tax replacement fund exceeds
    the amount needed to be distributed from the fund under division (A) of this section
    in the following month, the tax commissioner shall distribute the excess to each
    county as follows:

    (a) One-half shall be distributed to each county in proportion to each county''s
    population.

    (b) One-half shall be distributed to each county in the proportion that the amounts
    determined under divisions (G) and (H) of section 5727.84 of the Revised Code
    for all local taxing units in the county is of the total amounts so determined
    for all local taxing units in the state.

    (2) The amounts distributed to each county under division (E) of this section
    shall be distributed by the county auditor to each local taxing unit in the county
    in the proportion that the unit''s current taxes charged and payable are of the
    total current taxes charged and payable of all the local taxing units in the county.
    If the amount that the county auditor determines to be distributed to a local
    taxing unit is less than five dollars, that amount shall not be distributed, and
    the amount not distributed shall remain credited to the county undivided income
    tax fund. At the time of the next distribution under division (E)(2) of this section,
    any amount that had not been distributed in the prior distribution shall be added
    to the amount available for the next distribution prior to calculation of the
    amount to be distributed. As used in this division, "current taxes charged and
    payable" means the taxes charged and payable as most recently determined for local
    taxing units in the county.

    After January 2011, any amount that exceeds the amount needed to be distributed
    from the fund under division (A) of this section in the following month shall
    be transferred to the general revenue fund.

    (F) If the total amount in the local government property tax replacement fund
    is insufficient to make all payments under division (C) of this section at the
    times the payments are to be made, the director of budget and management shall
    transfer from the general revenue fund to the local government property tax replacement
    fund the difference between the total amount to be paid and the amount in the
    local government property tax replacement fund, except that no transfer shall
    be made by reason of a deficiency to the extent that it results from the amendment
    of section 5727.84 of the Revised Code by Amended Substitute House Bill 95 of
    the 125th general assembly.

    (G) If all or a part of the territories of two or more local taxing units are
    merged, or unincorporated territory of a township is annexed by a municipal corporation,
    the tax commissioner shall adjust the payments made under this section to each
    of the local taxing units in proportion to the square mileage apportioned to the
    merged or annexed territory, or as otherwise provided by a written agreement between
    the legislative authorities of the local taxing units certified to the tax commissioner
    not later than the first day of June of the calendar year in which the payment
    is to be made.'
