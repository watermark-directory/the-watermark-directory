- number: '5705.37'
  heading: Appeal to board of tax appeals
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'The taxing authority of any subdivision, or the board of trustees of any
    public library, nonprofit corporation, or library association maintaining a free
    public library that has adopted and certified rules under section 5705.28 of the
    Revised Code, that is dissatisfied with any action of the county budget commission
    may, through its fiscal officer, appeal to the board of tax appeals within thirty
    days after the receipt by the subdivision of the official certificate or notice
    of the commission''s action. In like manner, but through its clerk, any park district
    may appeal to the board of tax appeals. An appeal under this section shall be
    taken by the filing of a notice of appeal, either in person or by certified mail,
    express mail, or authorized delivery service as provided in section 5703.056 of
    the Revised Code, with the board and with the commission. If notice of appeal
    is filed by certified mail, express mail, or authorized delivery service, date
    of the United States postmark placed on the sender''s receipt by the postal service
    or the date of receipt recorded by the authorized delivery service shall be treated
    as the date of filing. Upon receipt of the notice of appeal, the commission, by
    certified mail, shall notify all persons who were parties to the proceeding before
    the commission of the filing of the notice of appeal and shall file proof of notice
    with the board of tax appeals. The secretary of the commission shall forthwith
    certify to the board a transcript of the full and accurate record of all proceedings
    before the commission, together with all evidence presented in the proceedings
    or considered by the commission, pertaining to the action from which the appeal
    is taken. The secretary of the commission also shall certify to the board any
    additional information that the board may request.

    The board of tax appeals, in a de novo proceeding, shall forthwith consider the
    matter presented to the commission, and may modify any action of the commission
    with reference to the budget, the estimate of revenues and balances, the allocation
    of the public library fund, or the fixing of tax rates. If the appeal is taken
    in response to the fixing of tax rates through a reduction made by the county
    budget commission, the burden of proof is on the appellant to show the need for
    a different rate or amount to meet expenses in the ensuing fiscal year.

    The finding of the board of tax appeals shall be substituted for the findings
    of the commission, and shall be sent to the tax commissioner, the county auditor,
    and the taxing authority of the subdivision affected, or to the board of public
    library trustees affected, as the action of the commission under sections 5705.01
    to 5705.47 of the Revised Code. At the request of the taxing authority, board
    of trustees, or park district that appealed an action of the county budget commission
    under this section, the findings of the board of tax appeals shall be sent by
    certified mail at the requestor''s expense.

    This section does not give the board of tax appeals any authority to place any
    tax levy authorized by law within the ten-mill limitation outside of that limitation,
    or to reduce any levy below any minimum fixed by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.37
- number: '5705.38'
  heading: Annual appropriation measures - classification
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) This division does not apply to school district appropriation measures.
    On or about the first day of each fiscal year, the taxing authority of each subdivision
    or other taxing unit shall pass an appropriation measure, and thereafter during
    the year it may pass any supplemental appropriation measures as it finds necessary,
    based on the revised tax budget or the official certificate of estimated resources
    or amendments of the certificate. If it desires to postpone the passage of the
    annual appropriation measure until an amended certificate is received based on
    the actual balances, it may pass a temporary appropriation measure for meeting
    the ordinary expenses of the taxing unit until no later than the first day of
    April or, in the case of the city of Cincinnati, the first day of October, of
    the current year, and the appropriations made in the temporary measure shall be
    chargeable to the appropriations in the annual appropriation measure for that
    fiscal year when passed.

    (B) A board of education shall pass its annual appropriation measure by the first
    day of October. If, by the first day of October, a board has not received either
    the amended certificates of estimated resources required by division (B) of section
    5705.36 of the Revised Code or certifications that no amended certificates need
    be issued, the adoption of the annual appropriation measure shall be delayed until
    the amended certificates or certifications are received. Prior to the passage
    of the annual appropriation measure, the board may pass a temporary appropriation
    measure for meeting the ordinary expenses of the district until it passes an annual
    appropriation measure, and appropriations made in the temporary measure shall
    be chargeable to the appropriations in the annual appropriation measure for that
    fiscal year when passed. During the fiscal year and after the passage of the annual
    appropriation measure, a district may pass any supplemental appropriation measures
    as it finds necessary, based on the revised tax budget or the official certificate
    of estimated resources or amendments of the certificate.

    (C) Appropriation measures shall be classified so as to set forth separately the
    amounts appropriated for each office, department, and division, and, within each,
    the amount appropriated for personal services. In the case of a municipal university,
    the board of directors of which have assumed, in the manner provided by law, custody
    and control of the funds of the university, funds shall be appropriated as a lump
    sum for the use of the university.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.38
- number: '5705.39'
  heading: Appropriations limited by estimated revenue
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: The total appropriations from each fund shall not exceed the total of the
    estimated revenue available for expenditure therefrom, as certified by the budget
    commission, or in case of appeal, by the board of tax appeals. No appropriation
    measure shall become effective until the county auditor files with the appropriating
    authority a certificate that the total appropriations from each fund, taken together
    with all other outstanding appropriations, do not exceed such official estimate
    or amended official estimate. When the appropriation does not exceed such official
    estimate, the county auditor shall give such certificate forthwith upon receiving
    from the appropriating authority a certified copy of the appropriation measure.
    Appropriations shall be made from each fund only for the purposes for which such
    fund is established.
