- number: '5725.38'
  heading: Opportunity zone investment tax credit
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: 'Terms used in this section have the same meanings as in section 122.84 of
    the Revised Code.

    There is allowed a nonrefundable credit against the tax imposed by section 5725.18
    of the Revised Code for a domestic insurance company that is issued, or to which
    is transferred, a tax credit certificate under section 122.84 of the Revised Code.
    The credit equals the amount stated on the certificate and may be claimed for
    the calendar year that includes the investment period that was the subject of
    the application for the certificate under that section or for the ensuing calendar
    year. For a credit issued during the July application round each year, the credit
    may also be claimed for the preceding calendar year. A taxpayer applying a credit
    for the preceding calendar year shall file an amended return or apply that amendment
    on the taxpayer''s original return, for that year.

    The credit authorized in this section shall be claimed in the order required under
    section 5725.98 of the Revised Code. If the amount of a credit exceeds the tax
    otherwise due under section 5725.18 of the Revised Code after deducting all other
    credits preceding the credit in that order, the excess may be carried forward
    for not more than five ensuing calendar years. The amount of the excess credit
    claimed in any such year shall be deducted from the balance carried forward to
    the next calendar year.

    No credit shall be claimed under this section to the extent the credit was claimed
    under section 5726.61, 5729.21, or 5747.86 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5725.38
- number: '5725.98'
  heading: Order of claims for tax credits and offsets
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: '(A) To provide a uniform procedure for calculating the amount of tax imposed
    by section 5725.18 of the Revised Code that is due under this chapter, a taxpayer
    shall claim any credits and offsets against tax liability to which it is entitled
    in the following order:

    The credit for an insurance company or insurance company group under section 5729.031
    of the Revised Code;

    The credit for eligible employee training costs under section 5725.31 of the Revised
    Code;

    The credit for purchasers of qualified low-income community investments under
    section 5725.33 of the Revised Code;

    The nonrefundable job retention credit under division (B) of section 122.171 of
    the Revised Code;

    The nonrefundable credit for investments in rural business growth funds under
    section 122.152 of the Revised Code;

    The nonrefundable Ohio low-income housing tax credit under section 5725.36 of
    the Revised Code;

    The nonrefundable affordable single-family home credit under section 5725.37 of
    the Revised Code;

    The nonrefundable credit for contributing capital to a transformational mixed
    use development project under section 5725.35 of the Revised Code;

    The nonrefundable opportunity zone investment credit under section 5725.38 of
    the Revised Code;

    The offset of assessments by the Ohio life and health insurance guaranty association
    permitted by section 3956.20 of the Revised Code;

    The refundable credit for rehabilitating a historic building under section 5725.34
    of the Revised Code;

    The refundable credit for Ohio job retention under former division (B)(2) or (3)
    of section 122.171 of the Revised Code as those divisions existed before September
    29, 2015, the effective date of the amendment of this section by H.B. 64 of the
    131st general assembly;

    The refundable credit for Ohio job creation under section 5725.32 of the Revised
    Code;

    The refundable credit under section 5725.19 of the Revised Code for losses on
    loans made under the Ohio venture capital program under sections 150.01 to 150.10
    of the Revised Code.

    (B) For any credit except the refundable credits enumerated in this section, the
    amount of the credit for a taxable year shall not exceed the tax due after allowing
    for any other credit that precedes it in the order required under this section.
    Any excess amount of a particular credit may be carried forward if authorized
    under the section creating that credit. Nothing in this chapter shall be construed
    to allow a taxpayer to claim, directly or indirectly, a credit more than once
    for a taxable year.'
