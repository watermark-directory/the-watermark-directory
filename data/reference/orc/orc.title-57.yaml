- number: '5733.98'
  heading: Order of claiming credits
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: '(A) To provide a uniform procedure for calculating the amount of tax imposed
    by section 5733.06 of the Revised Code that is due under this chapter, a taxpayer
    shall claim any credits to which it is entitled in the following order, except
    as otherwise provided in section 5733.058 of the Revised Code:

    For tax year 2005, the credit for taxes paid by a qualifying pass-through entity
