- number: '5731.49'
  heading: Determining tax revenues due political subdivisions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'At each annual settlement provided for by section 5731.46 of the Revised
    Code, the county auditor shall certify to the county auditor of any other county
    in which is located in whole or in part any municipal corporation or township
    to which any of the taxes collected under this chapter and not previously accounted
    for, is due, a statement of the amount of such taxes due to each corporation or
    township in such county entitled to share in the distribution thereof. The amount
    due upon such settlement to each such municipal corporation or township, and to
    each municipal corporation and township in the county in which the taxes are collected,
    shall be paid upon the warrant of the county auditor to the county treasurer or
    other proper officer of such municipal corporation or township. The amount of
    any refund chargeable against any such municipal corporation or township at the
    time of making such settlement shall be adjusted in determining the amount due
    to such municipal corporation or township at such settlement; provided that if
    the municipal corporation or township against which such refund is chargeable
    is not entitled to share in the fund to be distributed at such settlement, the
    auditor shall draw a warrant for the amount in favor of the treasurer payable
    from any undivided general taxes in the possession of such treasurer, unless such
    municipal corporation or township is located in another county, in which event
    the auditor shall issue a certificate for such amount to the auditor of the proper
    county, who shall draw a like warrant therefor payable from any undivided general
    taxes in the possession of the treasurer of such county. In either case at the
    next semiannual settlement of such undivided general taxes, the amount of such
    warrant shall be deducted from the distribution of taxes of such municipal corporation
    or township and charged against the proceeds of levies for the general fund of
    such municipal corporation or township, and a similar deduction shall be made
    at each next semiannual settlement of such undivided general taxes until such
    warrant has been satisfied in full.

    If it is discovered that an amount of taxes collected under this chapter has been
    paid in error to a township or municipal corporation to which the taxes are not
    due under this chapter, the township or municipal corporation to which the amount
    was erroneously paid, when repaying that amount to any subdivision to which the
    taxes were due, shall not be required to pay interest on that amount.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.49
- number: '5731.50'
  heading: Determining origin of tax on transfer of realty and tangible personalty
    located in state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: When the property transferred is real estate or tangible personal property
    within this state, the tax on the transfer thereof shall be deemed to have originated
    in the municipal corporation or township in which such property is physically
    located. In case of real estate located in more than one municipal corporation
    or township, the tax on the transfer thereof, or of any interest therein, shall
    be apportioned between the municipal corporation or townships in which it is located
    in the proportions in which the tract is assessed for general property taxation
    in such townships or municipal corporations.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.50
- number: '5731.51'
  heading: Determining origin of tax on transfer of personalty not located in state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'The tax on the transfer of intangible property or tangible personal property
    not within this state from a resident of this state shall be deemed to have originated
    in the municipal corporation or township in which the decedent was domiciled.

    The municipal corporation or township in which the tax on the transfer of the
    intangible property of a nonresident accruing under Chapter 5731. of the Revised
    Code shall be deemed to have originated, shall be determined as follows:

    (A) As to bonds, notes, or other securities or assets, in the possession or in
    the control or custody of a corporation, institution, or person in this state,
    such tax shall be deemed to have originated in the municipal corporation or township
    in which such corporation, institution, or person had the same in possession,
    control, or custody at the time of the transfer.

    (B) As to money on deposit with any corporation, bank, institution, or person,
    such tax shall be deemed to have originated in the municipal corporation or township
    in which such corporation, bank or other institution had its principal place of
    business, or in which such person resided at the time of such succession.'
