- number: '5705.391'
  heading: Board of education revenues and expenditures report
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) Not later than the thirty-first day of August of each fiscal year, each
    school district board of education shall submit to the department of education
    and workforce appropriations, revenue, and fund balance assumptions contained
    in the budget adopted by the board for that fiscal year and projections of expenditures,
    revenues, and fund balance for the three succeeding fiscal years.

    Not later than the last day of February of each fiscal year, each school district
    board of education shall submit updated appropriations, revenue, and fund balance
    information for the budget adopted for the fiscal year and updated projections
    of expenditures, revenues, and fund balance for the three succeeding fiscal years.

    The department of education and workforce and the auditor of state shall jointly
    adopt rules governing the submission of current budget information and three-year
    projections of operational revenues and expenditures by boards of education. The
    rules shall specify the information required for current budget information and
    three-year forecast submissions and any additional school district financial and
    operating information necessary for the audits and analyses conducted by the auditor
    of state or the department, including special and federal funds expenditures,
    revenues, and balances. The rules shall provide for the auditor of state or the
    department to examine the current budget information and three-year projections
    and to determine whether any further fiscal analysis is needed to ascertain whether
    a district has the potential to incur a deficit during the first two years of
    the three-year period.

    The auditor of state or the department may conduct any further audits or analyses
    necessary to assess any district''s fiscal condition. If further audits or analyses
    are conducted by the auditor of state, the auditor of state shall notify the department
    of the district''s fiscal condition, and the department shall immediately notify
    the district of any potential to incur a deficit in the current fiscal year or
    of any strong indications that a deficit will be incurred in either of the ensuing
    two years. If such audits or analyses are conducted by the department, the department
    shall immediately notify the district and the auditor of state of such potential
    deficit or strong indications thereof.

    A district notified under this section shall take immediate steps to eliminate
    any deficit in the current fiscal year and shall begin to plan to avoid the projected
    future deficits.

    (B) The state board of education, in accordance with sections 3319.31 and 3319.311
    of the Revised Code, may limit, suspend, or revoke a license as defined under
    section 3319.31 of the Revised Code that has been issued to any school employee
    found to have willfully contributed erroneous, inaccurate, or incomplete data
    required for the submission of the current budget information and three-year projection
    required by this section.

    (C) Beginning with submissions required for fiscal year 2026 and for each fiscal
    year in which a submission is required under this section thereafter, the department
    and the auditor shall label the projections regarding property tax allocation
    in the projection as " state reimbursement for property tax credits.

    (D) A school district may submit to the county budget commission the most recent
    projection prepared pursuant to this section with its tax budget as required by
    section 5705.28 of the Revised Code or other information as allowed by section
    5705.281 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.391
- number: '5705.392'
  heading: County spending plan
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) A board of county commissioners may adopt as a part of its annual appropriation
    measure a spending plan, or in the case of an amended appropriation measure, an
    amended spending plan, setting forth a quarterly schedule of expenses and expenditures
    of all appropriations for the fiscal year from the county general fund. The spending
    plan shall be classified to set forth separately a quarterly schedule of expenses
    and expenditures for each office, department, and division, and within each, the
    amount appropriated for personal services. Each office, department, and division
    shall be limited in its expenses and expenditures of moneys appropriated from
    the general fund during any quarter by the schedule established in the spending
    plan. The schedule established in the spending plan shall serve as a limitation
    during a quarter on the making of contracts and giving of orders involving the
    expenditure of money during that quarter for purposes of division (D) of section
    5705.41 of the Revised Code.

    (B)(1) A board of county commissioners, by resolution, may adopt a spending plan
    or an amended spending plan setting forth separately a quarterly schedule of expenses
    and expenditures of appropriations from any county fund, except as provided in
    division (C) of this section, for the second half of a fiscal year and any subsequent
    fiscal year, for any county office, department, or division that has spent or
    encumbered more than six-tenths of the amount appropriated for personal services
    and payrolls during the first half of any fiscal year.

    (2) During any fiscal year, a board of county commissioners, by resolution, may
    adopt a spending plan or an amended spending plan setting forth separately a quarterly
    schedule of expenses and expenditures of appropriations from any county fund,
    except as provided in division (C) of this section, for any county office, department,
    or division that, during the previous fiscal year, spent one hundred ten per cent
    or more of the total amount appropriated for personal services and payrolls by
    the board in its annual appropriation measure required by section 5705.38 of the
    Revised Code. The spending plan or amended spending plan shall remain in effect
    for not more than two fiscal years. But if the administrative officer of the office,
    department, or division for which the plan was adopted is an elected official,
    the spending plan shall not be in effect during a fiscal year in which that elected
    official is no longer the administrative officer of that office, department, or
    division.

    (3) At least thirty days before adopting a resolution under division (B)(1) or
    (2) of this section, the board of county commissioners shall provide written notice
    to each county office, department, or division for which it intends to adopt a
    spending plan or an amended spending plan. The notice shall be sent by regular
    first class mail or provided by personal service, and shall include a copy of
    the proposed spending plan or proposed amended spending plan. The county office,
    department, or division may meet with the board at any regular session of the
    board to comment on the notice, or to express concerns or ask questions about
    the proposed spending plan or proposed amended spending plan.

    (C) Division (B) of this section shall not apply to any fund that is subject to
    rules adopted by the tax commissioner under division (O) of section 5703.05 of
    the Revised Code.'
