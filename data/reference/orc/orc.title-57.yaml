    fund_____2. Estimated expenditures from special funds other than those established
    for road and bridge, street construction, maintenance, and state highway improvement,
    and for gas, water, sewer, and electric public utilities_____3. Total_____Deductions
    from authorized expenditures 4. Expenditures for permanent improvements_____5.
    Transfers to road and bridge fund (counties and townships only)_____6. Transfers
    to street construction, maintenance, and repair, and state highway improvements
    funds_____7. Expenditures for the payment of debt charges_____8. Expenditures
    for the payment of judgments_____9. Taxes levied inside the "ten-mill limitation"_____10.
    Budget commission allocation of estimated county public library fund revenues_____11.
