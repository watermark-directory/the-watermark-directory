- number: '5747.331'
  heading: Nonrefundable credit equal to borrower's qualified research and development
    loan payments
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: '(A) As used in this section:

    (1) "Borrower" means any person that receives a loan from the director of development
    under section 166.21 of the Revised Code, regardless of whether the borrower is
    subject to the tax imposed by section 5747.02 of the Revised Code.

    (2) "Related member" has the same meaning as in section 5733.042 of the Revised
    Code.

    (3) "Qualified research and development loan payments" has the same meaning as
    in section 166.21 of the Revised Code.

    (B) Beginning with taxable years beginning in 2003, a nonrefundable credit is
    allowed against a taxpayer''s aggregate tax liability under section 5747.02 of
    the Revised Code equal to a borrower''s qualified research and development loan
    payments made during the calendar year that includes the last day of the taxable
    year for which the credit is claimed. The amount of the credit for a taxable year
    shall not exceed one hundred fifty thousand dollars. No taxpayer is entitled to
    claim a credit under this section unless it has obtained a certificate issued
    by the director of development under division (D) of section 166.21 of the Revised
    Code and submits a copy of the certificate with its report for the taxable year.
    Failure to submit a copy of the certificate with the report does not invalidate
    a claim for a credit if the taxpayer submits a copy of the certificate within
    sixty days after the tax commissioner requests it. The credit shall be claimed
    in the order required under section 5747.98 of the Revised Code. No credit shall
    be allowed under this section if the credit was available against the tax imposed
    by Chapter 5751. of the Revised Code except to the extent the credit was not applied
    against that tax. The credit, to the extent it exceeds the taxpayer''s aggregate
    tax liability for the taxable year after allowance for any other credits that
    precede the credit under this section in that order, shall be carried forward
    to the next succeeding taxable year or years until fully used.

    (C) A borrower entitled to a credit under this section may assign the credit,
    or a portion thereof, to any of the following:

    (1) A related member of that borrower;

    (2) The owner or lessee of the eligible research and development project;

    (3) A related member of the owner or lessee of the eligible research and development
    project.

    A borrower making an assignment under this division shall provide written notice
    of the assignment to the tax commissioner and the director of development, in
    such form as the tax commissioner prescribes, before the credit that was assigned
    is used. The assignor may not claim the credit to the extent it was assigned to
    an assignee. The assignee may claim the credit only to the extent the assignor
    has not claimed it.

    (D) If any taxpayer is a shareholder in an S corporation, a partner in a partnership,
    or a member in a limited liability company treated as a partnership for federal
    income tax purposes, the taxpayer shall be allowed the taxpayer''s distributive
    or proportionate share of the credit available through the S corporation, partnership,
    or limited liability company.

    (E) The aggregate credit against the taxes imposed by section 5747.02 and Chapter
    5751. of the Revised Code that may be claimed under this section and section 5751.52
    of the Revised Code by a borrower as a result of qualified research and development
    loan payments attributable during a calendar year to any one loan shall not exceed
    one hundred fifty thousand dollars.'
