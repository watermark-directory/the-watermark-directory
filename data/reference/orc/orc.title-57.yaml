- number: '5743.99'
  heading: Penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: '(A)(1) Except as provided in division (A)(2) of this section, whoever violates
    section 5743.10, 5743.11, or 5743.12 or division (C) of section 5743.54 of the
    Revised Code is guilty of a misdemeanor of the first degree. If the offender has
    been previously convicted of an offense under this division, violation is a felony
    of the fourth degree.

    (2) Unless the total number of cigarettes exceeds one thousand two hundred, an
    individual who violates section 5743.10 of the Revised Code is guilty of a minor
    misdemeanor. If the offender has been previously convicted of an offense under
    this division, violation is a misdemeanor of the first degree.

    (B) Whoever violates section 5743.111, 5743.112, 5743.13, 5743.14, 5743.59, or
    5743.60 of the Revised Code is guilty of a felony of the fourth degree. If the
    offender has been previously convicted of an offense under this division, violation
    is a felony of the second degree.

    (C) Whoever violates section 5743.41 or 5743.42 of the Revised Code is guilty
    of a misdemeanor of the fourth degree. If the offender has been previously convicted
    of an offense under this division, violation is a misdemeanor of the third degree.

    (D) Whoever violates section 5743.21 of the Revised Code is guilty of a misdemeanor
    of the first degree. If the offender has been previously convicted of an offense
    under this division, violation is a felony of the fifth degree.

    (E) Whoever violates division (F) of section 5743.03 of the Revised Code is guilty
    of a misdemeanor of the fourth degree.

    (F) Whoever violates any provision of this chapter, or any rule promulgated by
    the tax commissioner under authority of this chapter, for the violation of which
    no penalty is provided elsewhere, is guilty of a misdemeanor of the fourth degree.

    (G) In addition to any other penalty imposed upon a person convicted of a violation
    of section 5743.112 or 5743.60 of the Revised Code who was the operator of a motor
    vehicle used in the violation, the court may suspend for not less than thirty
    days or more than three years the offender''s driver''s license, commercial driver''s
    license, temporary instruction permit, probationary license, or nonresident operating
    privilege. If the court imposes such a suspension, the court shall send a copy
    of its suspension order and determination to the registrar of motor vehicles,
    and the registrar, pursuant to the order and determination, shall impose a suspension
    of the same duration. No judge shall suspend the first thirty days of suspension
    of an offender''s license, permit, or privilege required by this division. The
    court, in lieu of suspending the offender''s driver''s or commercial driver''s
    license or permit or nonresident operating privilege, instead may require the
    offender to perform community service for a number of hours determined by the
    court.'
