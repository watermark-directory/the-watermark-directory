- number: '5727.47'
  heading: Notice of assessment - petition for reassessment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Notice of each assessment certified or issued pursuant to section 5727.23
    or 5727.38 of the Revised Code shall be served on the public utility or public
    utility property lessor in the manner prescribed by section 5703.37 of the Revised
    Code. With the notice, the tax commissioner shall provide instructions on how
    to petition for reassessment and request a hearing on the petition. If a public
    utility objects to such an assessment, it may file with the commissioner within
    sixty days after the mailing of the notice of assessment a written petition for
    reassessment signed by the utility''s authorized agent having knowledge of the
    facts. The date the commissioner receives the petition shall be considered the
    date of filing. The petition shall indicate the utility''s objections, but additional
    objections may be raised in writing if received by the commissioner prior to the
    date shown on the final determination.

    In the case of a petition seeking a reduction in taxable value filed with respect
    to an assessment certified under section 5727.23 of the Revised Code, the petitioner
    shall state in the petition the total amount of reduction in taxable value sought
    by the petitioner. If the petitioner objects to the percentage of true value at
    which taxable property is assessed by the commissioner, the petitioner shall state
    in the petition the total amount of reduction in taxable value sought both with
    and without regard to the objection pertaining to the percentage of true value
    at which its taxable property is assessed. If a petitioner objects to the commissioner''s
    apportionment of the taxable value of the petitioner''s taxable property, the
    petitioner shall distinctly state in the petition that the petitioner objects
    to the commissioner''s apportionment, and, within forty-five days after filing
    the petition for reassessment, shall submit the petitioner''s proposed apportionment
    of the taxable value of its taxable property among taxing districts. If a petitioner
    that objects to the commissioner''s apportionment fails to state its objections
    to that apportionment in its petition for reassessment or fails to submit its
    proposed apportionment within forty-five days after filing the petition for reassessment,
    the commissioner shall dismiss the petitioner''s objection to the commissioner''s
    apportionment, and the taxable value of the petitioner''s taxable property, subject
    to any adjustment to taxable value pursuant to the petition or appeal, shall be
    apportioned in the manner used by the commissioner in the preliminary or amended
    preliminary assessment certified under section 5727.23 of the Revised Code.

    If an additional objection seeking a reduction in taxable value in excess of the
    reduction stated in the original petition is properly and timely raised with respect
    to an assessment issued under section 5727.23 of the Revised Code, the petitioner
    shall state the total amount of the reduction in taxable value sought in the additional
    objection both with and without regard to any reduction in taxable value pertaining
    to the percentage of true value at which taxable property is assessed. If a petitioner
    fails to state the reduction in taxable value sought in the original petition
    or in additional objections properly raised after the petition is filed, the commissioner
    shall notify the petitioner of the failure in the manner provided in section 5703.37
    of the Revised Code. If the petitioner fails to notify the commissioner in writing
    of the reduction in taxable value sought in the petition or in an additional objection
    within thirty days after receiving the commissioner''s notice, the commissioner
    shall dismiss the petition or the additional objection in which that reduction
    is sought.

    (B)(1) Subject to divisions (B)(2) and (3) of this section, a public utility filing
    a petition for reassessment regarding an assessment certified or issued under
    section 5727.23 or 5727.38 of the Revised Code shall pay the tax with respect
    to the assessment objected to as required by law. The acceptance of any tax payment
    by the tax commissioner or any county treasurer shall not prejudice any claim
    for taxes on final determination by the commissioner or final decision by the
    board of tax appeals or any court.

    (2) If a public utility properly and timely files a petition for reassessment
    regarding an assessment certified under section 5727.23 of the Revised Code, the
    petitioner shall pay the tax as prescribed by divisions (B)(2)(a), (b), and (c)
    of this section:

    (a) If the petitioner does not object to the commissioner''s apportionment of
    the taxable value of the petitioner''s taxable property, the petitioner is not
    required to pay the part of the tax otherwise due on the taxable value that the
    petitioner seeks to have reduced, subject to division (B)(2)(c) of this section.

    (b) If the petitioner objects to the commissioner''s apportionment of the taxable
    value of the petitioner''s taxable property, the petitioner is not required to
    pay the tax otherwise due on the part of the taxable value apportioned to any
    taxing district that the petitioner objects to, subject to division (B)(2)(c)
    of this section. If, pursuant to division (A) of this section, the petitioner
    has, in a proper and timely manner, apportioned taxable value to a taxing district
    to which the commissioner did not apportion the petitioner''s taxable value, the
    petitioner shall pay the tax due on the taxable value that the petitioner has
    apportioned to the taxing district, subject to division (B)(2)(c) of this section.

    (c) If a petitioner objects to the percentage of true value at which taxable property
    is assessed by the commissioner, the petitioner shall pay the tax due on the basis
    of the percentage of true value at which the public utility''s taxable property
    is assessed by the commissioner. In any case, the petitioner''s payment of tax
    shall not be less than the amount of tax due based on the taxable value reflected
    on the last appeal notice issued by the commissioner under division (C) of this
    section. Until the county auditor receives notification under division (E) of
    this section and proceeds under section 5727.471 of the Revised Code to issue
    any refund that is found to be due, the county auditor shall not issue a refund
    for any increase in the reduction in taxable value that is sought by a petitioner
    later than forty-five days after the petitioner files the original petition as
    required under division (A) of this section.

    (3) Any part of the tax that, under division (B)(2)(a) or (b) of this section,
    is not paid shall be collected upon receipt of the notification as provided in
    section 5727.471 of the Revised Code with interest thereon computed in the same
    manner as interest is computed under division (E) of section 5715.19 of the Revised
    Code, subject to any correction of the assessment by the commissioner under division
    (E) of this section or the final judgment of the board of tax appeals or a court
    to which the board''s final judgment is appealed. The penalty imposed under section
    323.121 of the Revised Code shall apply only to the unpaid portion of the tax
    if the petitioner''s tax payment is less than the amount of tax due based on the
    taxable value reflected on the last appeal notice issued by the commissioner under
    division (C) of this section.

    (C) Upon receipt of a properly filed petition for reassessment with respect to
    an assessment certified under section 5727.23 of the Revised Code, the tax commissioner
    shall notify the treasurer of state or the auditor of each county to which the
    assessment objected to has been certified. In the case of a petition with respect
    to an assessment certified under section 5727.23 of the Revised Code, the commissioner
    shall issue an appeal notice within thirty days after receiving the amount of
    the taxable value reduction and apportionment changes sought by the petitioner
    in the original petition or in any additional objections properly and timely raised
    by the petitioner. The appeal notice shall indicate the amount of the reduction
    in taxable value sought in the petition or in the additional objections and the
    extent to which the reduction in taxable value and any change in apportionment
    requested by the petitioner would affect the commissioner''s apportionment of
    the taxable value among taxing districts in the county as shown in the assessment.
    If a petitioner is seeking a reduction in taxable value on the basis of a lower
    percentage of true value than the percentage at which the commissioner assessed
    the petitioner''s taxable property, the appeal notice shall indicate the reduction
    in taxable value sought by the petitioner without regard to the reduction sought
    on the basis of the lower percentage and shall indicate that the petitioner is
    required to pay tax on the reduced taxable value determined without regard to
    the reduction sought on the basis of a lower percentage of true value, as provided
    under division (B)(2)(c) of this section. The appeal notice shall include a statement
    that the reduced taxable value and the apportionment indicated in the notice are
    not final and are subject to adjustment by the commissioner or by the board of
    tax appeals or a court on appeal. If the commissioner finds an error in the appeal
    notice, the commissioner may amend the notice, but the notice is only for informational
    and tax payment purposes; the notice is not subject to appeal by any person. The
    commissioner also shall provide a copy of the appeal notice to the petitioner.
    Upon the request of a taxing authority, the county auditor may disclose to the
    taxing authority the extent to which a reduction in taxable value sought by a
    petitioner would affect the apportionment of taxable value to the taxing district
    or districts under the taxing authority''s jurisdiction, but such a disclosure
    does not constitute a notice required by law to be given for the purpose of section
    5717.02 of the Revised Code.

    (D) If the petitioner requests a hearing on the petition, the tax commissioner
    shall assign a time and place for the hearing on the petition and notify the petitioner
    of such time and place, but the commissioner may continue the hearing from time
    to time as necessary.

    (E) The tax commissioner may make corrections to the assessment as the commissioner
    finds proper. The commissioner shall serve a copy of the commissioner''s final
    determination on the petitioner in the manner provided in section 5703.37 of the
    Revised Code. The commissioner''s decision in the matter shall be final, subject
    to appeal under section 5717.02 of the Revised Code. With respect to a final determination
    issued for an assessment certified under section 5727.23 of the Revised Code,
    the commissioner also shall transmit a copy of the final determination to the
    applicable county auditor. In the absence of any further appeal, or when a decision
    of the board of tax appeals or of any court to which the decision has been appealed
    becomes final, the commissioner shall notify the public utility and, as appropriate,
    shall proceed under section 5727.42 of the Revised Code, or notify the applicable
    county auditor, who shall proceed under section 5727.471 of the Revised Code.

    The notification made under this division is not subject to further appeal.

    (F) On appeal, no adjustment shall be made in the tax commissioner''s assessment
    certified under section 5727.23 of the Revised Code that reduces the taxable value
    of a petitioner''s taxable property by an amount that exceeds the reduction sought
    by the petitioner in its petition for reassessment or in any additional objections
    properly and timely raised after the petition is filed with the commissioner.'
