  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.14
- number: '5731.15'
  heading: General deductions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'For purposes of the tax levied by section 5731.02 of the Revised Code, the
    value of the taxable estate shall be determined by deducting from the value of
    the gross estate:

    (A) If the decedent dies on or after July 1, 1993 and is survived by a spouse,
    a marital deduction which shall be allowed in an amount equal to the value of
    any interest in property that passes or has passed from the decedent to the surviving
    spouse, but only to the extent the interest is included in the value of the gross
    estate. For purposes of the marital deduction, an interest in property shall be
    considered as passing or as having passed from the decedent to the surviving spouse
    only if one or more of the following apply:

    (1) The interest was bequeathed or devised to the surviving spouse in the will
    of the decedent;

    (2) The interest was inherited by the surviving spouse through intestate succession
    from the decedent;

    (3) The interest is a dower interest of the surviving spouse, or the interest
    is an estate of the surviving spouse that is authorized by the Revised Code and
    that is in lieu of dower;

    (4) The decedent transferred the interest to the surviving spouse at any time;

    (5) At the time of the death of the decedent, the interest was held by the decedent
    and the surviving spouse, or by the decedent, the surviving spouse, and one or
    more other persons, in any form of joint ownership with a right of survivorship;

    (6) The decedent, alone or in conjunction with any other person, had a power to
    appoint the interest and the interest was so appointed to the surviving spouse,
    or the surviving spouse acquired the interest as a result of the release or the
    nonexercise of the power.

    (B)(1) In addition to the marital deduction provided by division (A) of this section,
    if an election is made in accordance with division (B)(2) of this section and
    the decedent dies on or after July 1, 1993, a qualified terminable interest property
    deduction. This deduction shall be allowed in an amount equal to all or any specific
    portion of qualified terminable interest property treated as separate property,
    but only to the extent that the property is included in the value of the gross
    estate.

    (2) An election to have property treated as qualified terminable interest property
    for purposes of the deduction provided by division (B)(1) of this section shall
    be made by the person filing the estate tax return under this chapter, in writing,
    on or before the date by which the return is required to be filed, determined
    with regard to any extension of time granted for the filing of the return. The
    election shall specify whether all or only a specific portion of qualified terminable
    interest property treated as separate property shall be taken into account in
    determining the deduction. If an election as provided in this division is made,
    the election is irrevocable.

    (3) As used in divisions (B)(1) and (2) of this section, "qualified terminable
    interest property" means property that satisfies all of the following:

    (a) It is included in the value of the gross estate;

    (b) It passes from the decedent to the surviving spouse of the decedent;

    (c) It is property in which the surviving spouse of the decedent has a qualifying
    interest for life. For purposes of this division, the surviving spouse has a qualifying
    interest for life if both of the following apply:

    (i) The surviving spouse is entitled to all income from the property, which income
    is payable annually or at more frequent intervals.

    (ii) No person has a power to appoint any part of the property to any person other
    than the surviving spouse. This division shall not apply to a power that is exercisable
    only at or after the death of the surviving spouse.

    (C) The pay and allowances determined by the United States to be due to a member
    of the armed forces for active duty in Vietnam service for the period between
    the date declared by the United States as the beginning of his missing in action
    status to the date of his death as determined by the United States. As used in
    this division, "Vietnam service" means military service within the Republic of
    Vietnam during the period between February 28, 1961, to July 1, 1973, or military
    service in southeast Asia for which hostile fire pay was awarded pursuant to 37
    U.S.C. 310, during the period February 28, 1961, to July 1, 1973.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.15
- number: '5731.16'
  heading: Deductions - funeral and administration expenses, and debts
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) For purposes of the tax levied by section 5731.02 of the Revised Code,
    the value of the taxable estate shall be determined by deducting from the value
    of the gross estate amounts for the following:

    (1) Funeral expenses;

    (2) Administration expenses, excluding the value of any money or property set
    off and allowed under section 2106.13 of the Revised Code, to the extent that
    such expenses have been or will be actually paid;

    (3) Claims against the estate that are outstanding and unpaid as of the date of
    decedent''s death;

    (4) Unpaid mortgages on, or any indebtedness in respect of, property if the value
    of the decedent''s interest in the property, undiminished by the mortgage or indebtedness,
    is included in the value of the gross estate, as are allowable by the laws of
    this state.

    (B) There shall be deducted in determining the taxable estate amounts representing
    expenses incurred in administering property not subject to claims which is included
    in the gross estate, to the same extent such amounts would be allowable as a deduction
    under division (A) of this section if such property were subject to claims and
    such amounts are paid before the expiration of the period of limitations provided
    for in section 5731.38 of the Revised Code.

    (C) The deduction allowed by this section in the case of claims against the estate,
    unpaid mortgages, or any indebtedness, when founded on a promise or agreement,
    is limited to the extent that they were contracted bona fide and for an adequate
    and full consideration in money or money''s worth, except that in any case in
    which any such claim is founded on a promise or agreement of the decedent to make
    a contribution or gift to or for the use of any donee described in section 5731.17
    of the Revised Code for the purposes specified in that section, the deduction
    is not so limited, but is limited to the extent that it would be allowable as
    a deduction under section 5731.17 of the Revised Code if the promise or agreement
    constituted a bequest.

    (D) Any income taxes on income received after the death of the decedent, or property
    taxes not accrued before his death , or any estate, succession, legacy, or inheritance
    taxes, shall not be deductible under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.16
- number: '5731.161'
  heading: Deductions - estate of transferee spouse
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) As used in this section:

    (1) "General power of appointment" has the same meaning as in division (B) of
    section 5731.11 of the Revised Code.

    (2) "Property" means any beneficial interest in property, whether in trust or
    otherwise, other than a life estate, an estate for a term of years, an annuity,
    or other similar interest. "Property" includes property passing as a result of
    the exercise or failure to exercise a power of appointment and also includes a
    general power of appointment.

    (3) "Spousal exemption" means the exemption that was allowed to a transferor spouse''s
    estate and that was equal to the value of any interest in property included in
    the value of the transferor''s gross estate and transferred to or for the benefit
    of, and vested in, the transferee spouse, but not to exceed either sixty thousand
    dollars or thirty thousand dollars, whichever amount was applicable.

    (4) "Transferee spouse" means the spouse who died on or after July 1, 1983, but
    prior to July 1, 1986, and within three years of the transferor spouse''s death.

    (5) "Transferor spouse" means the spouse who died prior to July 1, 1983, and within
    three years of the transferee spouse''s death.

    (B) For purposes of the tax levied by section 5731.02 of the Revised Code, the
    value of the taxable estate of the transferee spouse shall be determined by deducting
    from the value of the gross estate the value, as specified in this division, of
    property that was transferred to the transferee spouse by the transferor spouse
    and that, because of the transfer, was taxed in the estate of the transferor spouse
    under this chapter. The value of the property for purposes of the deduction shall
    be the net value of the property actually transferred, as determined and taxed
    in the estate of the transferor spouse, reduced by the amount of the spousal exemption
    with respect to the transferee spouse that was allowed in the estate of the transferor
    spouse, but, in any event, the value of the property for purposes of the deduction
    shall not exceed the greater of the following:

    (1) Five hundred thousand dollars;

    (2) One-half of the difference between the value of the gross estate of the transferor
    spouse and the deductions allowed in the estate of the transferor spouse under
    section 5731.16 of the Revised Code.

    The deduction otherwise allowable under this section shall be reduced by the amount
    of the marital deduction allowed in the estate of the transferee spouse under
    section 5731.15 of the Revised Code.

    In determining the value of the property, the value of any remainder interest,
    power of appointment, or similar interest shall not be reduced by the value of
    any intervening interest that is not considered as property for purposes of this
    section.'
