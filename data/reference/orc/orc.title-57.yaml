- number: '5705.15'
  heading: Transfer of public funds - exceptions
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: In addition to the transfers authorized in section 5705.14 of the Revised
    Code, the taxing authority of any political subdivision may, in the manner provided
    in this section and section 5705.16 of the Revised Code, transfer from one fund
    to another any public funds under its supervision, except the proceeds or balances
    of loans, bond issues, special levies for the payment of loans or bond issues,
    the proceeds or balances of funds derived from any excise tax levied by law for
    a specified purpose, and the proceeds or balances of any license fees imposed
    by law for a specified purpose.
