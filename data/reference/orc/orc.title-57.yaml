- number: '5705.48'
  heading: Joint budget commission - adjustment of tax rate
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: Whenever a taxing district is located in two or more counties, the budget
    commission of the counties in which such district is located shall meet in joint
    session at the call of the chairman of the commission of the county in which the
    greatest value of taxable property of such taxing district is located, and adjust
    the rates of taxation for the purpose of such district so as to enforce the limitations
    on the tax rate prescribed by law and to produce uniform rates throughout the
    district. The levies for such taxing district purposes shall not be reduced by
    such joint budget commission below what would be required to enforce such limitation
    in the part of such district in which the least reduction of such levies is necessary
    to enforce such limitation, and such levies so fixed shall be applied uniformly
    throughout such district.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.48
- number: '5705.49'
  heading: Subdivision's power to tax - limitation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: Wherever in the Revised Code the taxing authority of any subdivision is authorized
    to levy taxes on the taxable property within a subdivision, or, in the case of
    a qualifying library levy, within a library district or association library district,
    such authority shall extend only to the levy of taxes on the taxable real and
    public utility property listed on general tax lists and duplicates provided for
    by section 319.28 of the Revised Code. Where the amount of indebtedness of any
    subdivision is limited by law with reference to the tax valuation or aggregate
    value of the property on the tax list and duplicate of such subdivision, such
    limitation shall be measured by the property listed on such general tax lists
    and duplicates in such subdivision.
