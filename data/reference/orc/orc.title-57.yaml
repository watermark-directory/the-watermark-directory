    may also be claimed for the preceding taxable year. A taxpayer applying a credit
    for the preceding taxable year shall file an amended report or apply that amendment
    on the taxpayer''s original report, for that year.

    The credit authorized in this section shall be claimed in the order required under
    section 5726.98 of the Revised Code. If the amount of a credit exceeds the tax
    otherwise due under section 5726.02 of the Revised Code after deducting all other
    credits preceding the credit in that order, the excess may be carried forward
    for not more than five ensuing taxable years. The amount of the excess credit
    claimed in any such year shall be deducted from the balance carried forward to
    the next taxable year.

    No credit shall be claimed under this section to the extent the credit was claimed
    under section 5725.38, 5729.21, or 5747.86 of the Revised Code.'
