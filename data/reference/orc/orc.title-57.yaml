- number: '5731.28'
  heading: Claims for refund
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: If any debts deductible under section 5731.16 of the Revised Code are proved
    against the gross estate after the tax levied by section 5731.02 or division (A)
    of section 5731.19 of the Revised Code has been determined, or if the determination
    of taxes so made is erroneous due to a mistake of fact or law, a claim for refund
    of tax may be filed by an executor, administrator, trustee, person in possession
    of property subject to tax, or any transferee thereof, within three years from
    the time the return was required to be filed (determined without regard to any
    extension of time for filing) or before January 1, 2022, whichever is earlier,
    in the form prescribed by the tax commissioner. The claim for refund shall be
    filed in the same manner as is prescribed for the filing of a return in section
    5731.21 of the Revised Code and the determination of its correctness shall be
    made in the same manner as is provided for in the case of the return itself.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.28
- number: '5731.30'
  heading: Filing exceptions to tax commissioner's final determination of taxes with
    probate court
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'The tax commissioner, the person required to file the return, or any interested
    party may file exceptions in writing to the tax commissioner''s final determination
    of taxes, with the probate court of the county. Exceptions shall be filed within
    sixty days from the receipt of the certificate of determination issued by the
    tax commissioner, stating the grounds upon which such exceptions are taken. The
    court shall, by order, fix a time, not less than ten days thereafter, for the
    hearing of such exceptions, and shall give such notice of that hearing as it considers
    necessary, provided, that a copy of such notice and of such exceptions shall be
    forthwith mailed to the tax commissioner. Upon the hearing of such exceptions,
    the court may make a just and proper order. No costs shall be allowed by the court
    on such exceptions.

    In a like manner, exceptions may be filed to the disallowance or partial disallowance
    of any claim for refund of taxes filed pursuant to section 5731.28 of the Revised
    Code.

    Upon redetermination of taxes pursuant to this section, if no appeal is taken
    from the redetermination, the tax commissioner shall issue his certificate of
    determination of taxes reflecting the corrected determination in the same manner
    as is provided in section 5731.27 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.30
- number: '5731.31'
  heading: Probate court jurisdiction
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: The probate court of the county has jurisdiction to determine all questions
    concerning the administration of the taxes levied by this chapter, and all questions
    concerning the proper determination of the amount of such taxes or penalties upon
    exceptions filed as provided in section 5731.30 of the Revised Code. Such jurisdiction
    shall exist not only as to the transfer of property which would otherwise invoke
    the jurisdiction of such court, but shall extend to all cases covered by this
    chapter, so that all transfers, taxable under this chapter, whether made under
    the last will and testament of the decedent or otherwise, shall be within such
    jurisdiction.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.31
- number: '5731.32'
  heading: Appeal from final order of probate court
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'An appeal may be taken by any party, including the tax commissioner, from
    the final order of the probate court under section 5731.30 of the Revised Code
    in the manner provided by law for appeals from orders of the probate court in
    other cases. An appeal by the tax commissioner may be perfected in the manner
    provided by law.

    Upon redetermination of taxes pursuant to this section, the tax commissioner shall
    issue his certificate of determination of taxes reflecting the corrected determination
    thereof in the same manner as is provided in section 5731.27 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.32
- number: '5731.33'
  heading: Receipt for payment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A)(1) Upon the payment of TO the county treasurer of any tax due under this
    chapter, the treasurer shall issue a receipt for the payment in triplicate. He
    shall deliver one copy to the person paying the taxes, and he immediately shall
    send the original receipt to the tax commissioner, who shall certify the original
    receipt and immediately transmit it to the probate court for the county in which
    the return has been filed if there is an administration of or other proceedings
    in the decedent''s estate.

    (2) Upon the payment to a county treasurer of all estate taxes due under section
    5731.02 or division (A) of section 5731.19 of the Revised Code with respect to
    a particular decedent''s estate, the treasurer, in order to assist the county
    auditor in performing his responsibility under division (A)(4)(b) of section 5731.21
    of the Revised Code, also shall notify the auditor, in writing, of the full payment
    of those taxes.

    (B) An executor, administrator, or testamentary trustee is not entitled to credits
    in his accounts and is not entitled to be discharged from liability for taxes
    due under this chapter, and the estate under his control shall not be distributed,
    unless a certified receipt has been filed with the probate court as described
    in division (A)(1) of this section.

    (C) Any person, upon the payment of one dollar to a county treasurer issuing a
    receipt as described in division (A)(1) of this section, shall be entitled to
    a duplicate receipt, executed in the same manner as the original receipt.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.33
- number: '5731.34'
  heading: Transfers of intangible personal property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: No estate or additional tax shall be imposed upon any transfer of intangible
    personal property by or from a person who was not legally domiciled in this state
    at the time of his death, or by reason of the death of such a person, whether
    such person was the legal or the beneficial owner of such property, and whether
    or not such property was held for him in this state or elsewhere by another, in
    trust or otherwise, unless such property was employed by such nonresident in carrying
    on business within this state. No estate or additional tax shall be imposed upon
    the transfer of intangible personal property in any case if the laws of the state,
    territory, or country of domicile of the transferor at the time of his death contained
    a reciprocal exemption provision under which nonresidents were exempted from transfer
    or death taxes of every character on personal property, except tangible personal
    property having an actual situs therein, if the state, territory, or country of
    domicile of such nonresident allowed a similar exemption to residents of the state,
    territory, or country of domicile of such transferor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.34
- number: '5731.35'
  heading: Foreign estate tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: When a probate court or the tax commissioner determines or claims that a decedent
    was domiciled in this state at the date of decedent's death, and when the taxing
    authorities of another state, territory, or possession of the United States, or
    the District of Columbia, make a like claim on behalf of their state, territory,
    or possession of the United States, or the District of Columbia, the tax commissioner,
    with the approval of the probate court having jurisdiction of the estate, may
    enter into a written agreement or compromise with the taxing authorities of such
    other state, territory, or possession of the United States, or the District of
    Columbia, and the executor, administrator, or personal representatives of the
    estate, that a certain amount may be accepted in full satisfaction of any and
    all estate and additional taxes imposed under Chapter 5731. of the Revised Code,
    including any interest or penalties accruing to the date of the signing of the
    agreement. The agreement shall also fix the amount to be accepted by the taxing
    authorities of such other state, territory, or possession of the United States,
    or the District of Columbia, in full satisfaction of their inheritance, succession,
    and estate taxes. Unless the amount of the tax, so agreed upon, is paid within
    sixty days after the date of execution of the agreement, interest and penalties,
    as provided under Chapter 5731. of the Revised Code, shall thereafter accrue upon
    the amount fixed in the agreement, but the time between fifteen months from the
    date of decedent's death and the signing of such agreement, shall not be included
    in computing interest or penalties.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.35
- number: '5731.36'
  heading: Enforcing claims for foreign estate taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) The official or body charged with the administration of the estate of
    other death tax laws of the domiciliary state of a nonresident decedent is deemed
    a creditor of the decedent and may sue in the courts of this state and enforce
    any claim for taxes, penalties, and interest due to that state or a political
    subdivision of that state. This section applies to the estate of a decedent not
    domiciled in this state only if the laws of his domicile state contain a provision,
    of any nature, by which this state is given reasonable assurance of the collection
    of its estate and other death taxes, interest, and penalties from the estates
    of decedents dying domiciled in this state.

    (B) This section does not apply to the generation-skipping tax levied by division
    (B) of section 5731.181 of the Revised Code.

    (C) This section shall be liberally construed in order to ensure that the state
    of domicile of a decedent receives any estate or other death taxes, interest,
    and penalties due it from the decedent''s estate.

    (D) As used in this section, "state" includes any state or territory of the United
    States, the District of Columbia, and Canada or any province of Canada.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.36
- number: '5731.37'
  heading: Taxes are lien on property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: '(A) Taxes levied by this chapter shall be, until restricted, transferred,
    or discharged pursuant to this division, until paid, or unless division (A)(5)(b)
    of section 5731.21 of the Revised Code applies to them, a lien upon all property
    subject to the taxes. This lien:

    (1) Is discharged, as to property applied to costs and expenses of administration,
    property constituting the allowance made to the surviving spouse, minor children,
    or surviving spouse and minor children of the decedent under section 2106.13 of
    the Revised Code for their support, and all of the property of a decedent that
    is subject to inclusion in the gross estate and that has been disclosed to the
    tax commissioner by the time a certificate of discharge is issued;

    (2) Is transferred, to the extent of any such property sold by the executor, administrator,
    or trustee for the purpose of paying debts, administration expenses, or taxes
    of the estate, or for any purpose to a bona fide purchaser for an adequate and
    full consideration in money or money''s worth, to the money or other property
    received from the purchaser. Knowledge that the property is being sold by a fiduciary
    and that it otherwise would be subject to the estate tax lien does not preclude
    the purchaser from being classified as a bona fide purchaser.

    (3) May be, by written authorization of the tax commissioner, restricted to all
    property that is subject to such taxes, and not specifically released, transferred
    to other property on conditions acceptable to the tax commissioner, or fully discharged,
    each upon conditions, including payment of a reasonable fee, prescribed by rules
    adopted under section 5703.14 of the Revised Code, when he determines that any
    of these actions will not jeopardize the collection of the taxes;

    (4) Shall be restricted, transferred, or discharged, as authorized in division
    (A)(3) of this section, by the tax commissioner, upon order of the probate court
    after notice to the commissioner and any other person whose substantial rights
    may reasonably be affected by the lien and hearing on an application of the executor,
    administrator, trustee, or the owner of an interest in any property subject, or
    reasonably the object of a claim to be subject, to the lien, and proof that the
    collection of the taxes will not be jeopardized by the action, and that the tax
    commissioner failed to grant a reasonable request for the action within sixty
    days of his receipt of a written request.

    (B) The executor, administrator, trustee, or other person in possession of property,
    the transfer of which is subject to the taxes, or any transferee of the property,
    except a bona fide purchaser for an adequate and full consideration in money or
    money''s worth, is personally liable for all the taxes to the extent that their
    collection is reduced by his omission to perform a statutory duty, with interest
    as provided in section 5731.23 of the Revised Code, until they have been paid.
    An administrator, executor, or trustee of any property, the transfer of which
    is subject to the taxes shall deduct the taxes from the property, or collect them
    from any person entitled to the property. He shall not deliver or be compelled
    to deliver any property, the transfer of which is subject to the taxes, to any
    person, until the taxes on it have been collected, and on any other property of
    the same decedent that has been, or is to be, transferred to the person or his
    spouse or minor child. He may sell so much of the estate of the decedent as will
    enable him to pay the taxes in the same manner as for the payment of the debts
    of the decedent. Knowledge that the property is being sold by a fiduciary and
    that it otherwise would be subject to the estate tax lien does not preclude the
    purchaser from being classified as a bona fide purchaser.

    (C) If an election is made, pursuant to division (B)(1)(b) or (c) of section 5731.011
    of the Revised Code to have qualified farm property valued at its value for actual
    qualified use, an amount equivalent to the estate tax savings realized in the
    decedent''s estate by valuating the property at its value for its actual qualified
    use, instead of at its fair market value pursuant to division (B) of section 5731.01
    of the Revised Code, shall be a lien in favor of this state on the property for
    four years after the decedent''s death, unless it is earlier discharged. The tax
    commissioner may issue a certificate of subordination of any lien imposed by this
    division upon any part of the property subject to the lien, if the tax commissioner
    determines that the state will be adequately secured after the subordination.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.37
- number: '5731.38'
  heading: Statute of limitations
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'No liability for the payment of taxes levied under Chapter 5731. of the Revised
    Code, including all interest and penalties thereon, may be determined as to the
    return required to be filed under section 5731.21 of the Revised Code, subsequent
    to three years after such return is filed, and as to the return required to be
    filed under section 5731.24 of the Revised Code, subsequent to three years after
    such return is filed. Any lien in realty created under Chapter 5731. of the Revised
    Code shall become void upon the expiration of ten years after the date of decedent''s
    death.

    In the event there is litigation pending at the expiration of such three-year
    period for the determination or collection of any such tax, including interest
    or penalties thereon, the liability for the payment thereof continues until the
    expiration of one year after final determination of such litigation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5731.38
- number: '5731.39'
  heading: Written consent of tax commissioner to transfer of assets
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5731'
    name: Estate Tax
  text: 'This section does not apply to, and the written permission of the tax commissioner
    is not required for asset transfers with respect to, decedents dying on or after
    January 1, 2013.

    (A) No corporation organized or existing under the laws of this state shall transfer
    on its books or issue a new certificate for any share of its capital stock registered
    in the name of a decedent, or in trust for a decedent, or in the name of a decedent
    and another person or persons, without the written consent of the tax commissioner.

    (B) No safe deposit company, trust company, financial institution as defined in
    division (A) of section 5725.01 of the Revised Code, or other corporation or person,
    having in possession, control, or custody a deposit standing in the name of a
    decedent, or in trust for a decedent, or in the name of a decedent and another
    person or persons, shall deliver or transfer an amount in excess of three-fourths
    of the total value of such deposit, including accrued interest and dividends,
    as of the date of decedent''s death, without the written consent of the tax commissioner.
    The written consent of the tax commissioner need not be obtained prior to the
    delivery or transfer of amounts having a value of three-fourths or less of said
    total value.

    (C) No life insurance company shall pay the proceeds of an annuity or matured
    endowment contract, or of a life insurance contract payable to the estate of a
    decedent, or of any other insurance contract taxable under Chapter 5731. of the
    Revised Code, without the written consent of the tax commissioner. Any life insurance
    company may pay the proceeds of any insurance contract not specified in this division
    (C) without the written consent of the tax commissioner.

    (D) No trust company or other corporation or person shall pay the proceeds of
    any death benefit, retirement, pension, or profit-sharing plan in excess of two
    thousand dollars, without the written consent of the tax commissioner. Such trust
    company or other corporation or person, however, may pay the proceeds of any death
    benefit, retirement, pension, or profit-sharing plan which consists of insurance
    on the life of the decedent payable to a beneficiary other than the estate of
    the insured without the written consent of the tax commissioner.

    (E) No safe deposit company, trust company, financial institution as defined in
    division (A) of section 5725.01 of the Revised Code, or other corporation or person,
    having in possession, control, or custody securities, assets, or other property
    (including the shares of the capital stock of, or other interest in, such safe
    deposit company, trust company, financial institution as defined in division (A)
    of section 5725.01 of the Revised Code, or other corporation), standing in the
    name of a decedent, or in trust for a decedent, or in the name of a decedent and
    another person or persons, and the transfer of which is taxable under Chapter
    5731. of the Revised Code, shall deliver or transfer any such securities, assets,
    or other property which have a value as of the date of decedent''s death in excess
    of three-fourths of the total value thereof, without the written consent of the
    tax commissioner. The written consent of the tax commissioner need not be obtained
    prior to the delivery or transfer of any such securities, assets, or other property
    having a value of three-fourths or less of said total value.

    (F) No safe deposit company, financial institution as defined in division (A)
    of section 5725.01 of the Revised Code, or other corporation or person having
    possession or control of a safe deposit box or similar receptacle standing in
    the name of a decedent or in the name of the decedent and another person or persons,
    or to which the decedent had a right of access, except when such safe deposit
    box or other receptacle stands in the name of a corporation or partnership, or
    in the name of the decedent as guardian or executor, shall deliver any of the
    contents thereof unless the safe deposit box or similar receptacle has been opened
    and inventoried in the presence of the tax commissioner or the commissioner''s
    agent, and a written consent to transfer issued; provided, however, that a safe
    deposit company, financial institution, or other corporation or person having
    possession or control of a safe deposit box may deliver wills, deeds to burial
    lots, and insurance policies to a representative of the decedent, but that a representative
    of the safe deposit company, financial institution, or other corporation or person
    must supervise the opening of the box and make a written record of the wills,
    deeds, and policies removed. Such written record shall be included in the tax
    commissioner''s inventory records.

    (G) Notwithstanding any provision of this section:

    (1) The tax commissioner may authorize any delivery or transfer or waive any of
    the foregoing requirements under such terms and conditions as the commissioner
    may prescribe;

    (2) A home, as defined in section 3721.10 of the Revised Code, or a residential
    facility licensed under section 5119.34 of the Revised Code that provides accommodations,
    supervision, and personal care services for three to sixteen unrelated adults,
    may transfer or use the money in a personal needs allowance account in accordance
    with section 5162.22 of the Revised Code without the written consent of the tax
    commissioner, and without the account having been opened and inventoried in the
    presence of the commissioner or the commissioner''s agent.

    Failure to comply with this section shall render such safe deposit company, trust
    company, life insurance company, financial institution as defined in division
    (A) of section 5725.01 of the Revised Code, or other corporation or person liable
    for the amount of the taxes and interest due under the provisions of Chapter 5731.
    of the Revised Code on the transfer of such stock, deposit, proceeds of an annuity
    or matured endowment contract or of a life insurance contract payable to the estate
    of a decedent, or other insurance contract taxable under Chapter 5731. of the
    Revised Code, proceeds of any death benefit, retirement, pension, or profit-sharing
    plan in excess of two thousand dollars, or securities, assets, or other property
    of any resident decedent, and in addition thereto, to a penalty of not less than
    five hundred or more than five thousand dollars.'
