- number: '5725.31'
  heading: Eligible employee training costs tax credit
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: '(A) As used in this section:

    (1) "Eligible employee" and "eligible training costs" have the same meanings as
    in section 5733.42 of the Revised Code.

    (2) "Tax assessed under this chapter" means, in the case of a dealer in intangibles,
    the tax assessed under sections 5725.13 to 5725.17 of the Revised Code and, in
    the case of a domestic insurance company, the taxes assessed under sections 5725.18
    to 5725.26 of the Revised Code.

    (3) "Taxpayer" means a dealer in intangibles or a domestic insurance company subject
    to a tax assessed under this chapter.

    (4) "Credit period" means, in the case of a dealer in intangibles, the calendar
    year ending on the thirty-first day of December next preceding the day the report
    is required to be returned under section 5725.14 of the Revised Code and, in the
    case of a domestic insurance company, the calendar year ending on the thirty-first
    day of December next preceding the day the annual statement is required to be
    returned under section 5725.18 or 5725.181 of the Revised Code.

    (B) There is hereby allowed a nonrefundable credit against the tax imposed under
    this chapter for a taxpayer for which a tax credit certificate is issued under
    section 5733.42 of the Revised Code. The credit may be claimed for credit periods
    beginning on or after January 1, 2003, and ending on or before December 31, 2007.
    The amount of the credit for the credit period beginning on January 1, 2003, shall
    equal one-half of the average of the eligible training costs paid or incurred
    by the taxpayer during calendar years 1998, 1999, and 2000, not to exceed one
    thousand dollars for each eligible employee on account of whom eligible training
    costs were paid or incurred by the taxpayer. The amount of the credit for the
    credit period beginning on January 1, 2004, shall equal one-half of the average
    of the eligible training costs paid or incurred by the taxpayer during calendar
    years 2002, 2003, and 2004, not to exceed one thousand dollars for each eligible
    employee on account of whom eligible training costs were paid or incurred by the
    taxpayer. The amount of the credit for the credit period beginning on January
    1, 2005, shall equal one-half of the average of the eligible training costs paid
    or incurred by the taxpayer during calendar years 2003, 2004, and 2005, not to
    exceed one thousand dollars for each eligible employee on account of whom eligible
    training costs were paid or incurred by the taxpayer. The amount of the credit
    for the credit period beginning on January 1, 2006, shall equal one-half of the
    average of the eligible training costs paid or incurred by the taxpayer during
    calendar years 2004, 2005, and 2006, not to exceed one thousand dollars for each
    eligible employee on account of whom eligible training costs were paid or incurred
    by the taxpayer. The amount of the credit for the credit period beginning on January
    1, 2007, shall equal one-half of the average of the eligible training costs paid
    or incurred by the taxpayer during calendar years 2005, 2006, and 2007, not to
    exceed one thousand dollars for each eligible employee on account of whom eligible
    training costs were paid or incurred by the taxpayer.

    The credit claimed by a taxpayer each credit period shall not exceed one hundred
    thousand dollars.

    A taxpayer shall apply to the director of job and family services for a tax credit
    certificate in the manner prescribed by division (C) of section 5733.42 of the
    Revised Code. Divisions (C) to (H) of that section govern the tax credit allowed
    by this section, except that "credit period" shall be substituted for "tax year
    with respect to a calendar year" wherever that phrase appears in those divisions
    and that a taxpayer under this section shall be considered a taxpayer for the
    purposes of that section.

    A taxpayer may carry forward the credit allowed under this section to the extent
    that the credit exceeds the taxpayer''s tax due for the credit period. The taxpayer
    may carry the excess credit forward for three credit periods following the credit
    period for which the credit is first claimed under this section. The credit allowed
    by this section is in addition to any credit allowed under section 5729.031 of
    the Revised Code.'
