    be claimed for any taxable years ending with or following the calendar year in
    which a relocation of employment positions occurs in violation of an agreement
    entered into under section 122.17 or 122.171 of the Revised Code.

    (B) A nonrefundable income tax credit granted by the tax credit authority under
