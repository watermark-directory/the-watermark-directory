- number: '5711.30'
  heading: Penalty assessment for declaring a nominal dividend or to evade taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: If any corporation, incorporated under the laws of this state or authorized
    to do business in this state, declares a nominal dividend or distribution for
    the purpose of enabling its shareholders residing in this state to return its
    shares as productive investments, the tax commissioner, upon finding such to be
    the fact, shall assess against such corporation a penalty equal to a tax of two
    mills on the dollar of the true value in money of its share of stock owned by
    shareholders residing in this state. Such penalty shall be collected and distributed
    in the same manner as taxes levied by section 5707.03 of the Revised Code.
  history: null
