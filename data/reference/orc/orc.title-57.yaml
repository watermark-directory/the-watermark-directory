- number: '5723.17'
  heading: Refund if sale is invalid
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5723'
    name: Forfeited Lands
  text: When the claimant of any lands sold for the nonpayment of taxes, assessments,
    penalties, interest, and costs, or his heirs or assigns, recovers the land sold,
    by reason of the invalidity of such sale, such claimant, or his heirs or assigns,
    shall refund to the purchaser, or his heirs or assigns, the amount of the purchase
    price, with all other taxes, assessments, penalties, interest, and costs paid
    by such purchaser, or his heirs or assigns to the time of such recovery. Such
    sum shall be paid to such purchaser entitled thereto, before he is evicted by
    any claimant so recovering such land. This section does not prevent a purchaser
    from obtaining the value of any improvements made upon said land under sections
    5303.07 to 5303.17 of the Revised Code.
