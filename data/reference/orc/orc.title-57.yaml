  chapter:
    num: '5743'
    name: Cigarette Tax
  text: No person engaged in the business of trafficking in cigarettes or in the business
    of distributing tobacco products, vapor products, or both shall fail to post and
    keep constantly displayed in a conspicuous place in the building where such business
    is carried on the license required by section 5743.15 or 5743.61 of the Revised
