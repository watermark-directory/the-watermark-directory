    name: Severance Tax
  text: The tax commissioner may prescribe requirements as to the keeping of records
    and other pertinent documents and the filing of copies of federal income tax returns
    and determinations. The commissioner may require any person, by rule or by notice
    served on that person, to keep such records as the commissioner considers necessary
    to show whether that person is liable, and the extent of liability, for the tax
    imposed under this chapter and the amount due under section 1509.50 of the Revised
    Code. Such records and other documents shall be open during business hours to
