- number: '5733.064'
  heading: Credit for recycling and litter prevention program donations
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5733'
    name: Corporation Franchise Tax
  text: 'There is hereby allowed a credit against the tax imposed under sections 5733.06,
    5733.065, and 5733.066 of the Revised Code. The credit shall equal the lesser
    of fifty per cent of any cash donations made during the taxable year by the taxpayer
    to an Ohio corporation organized prior to January 1, 1987, whose sole purpose
    is to promote and encourage recycling and that has been determined by the internal
    revenue service to be a nonprofit corporation regardless of whether the nonprofit
    corporation received a grant under section 3736.05 of the Revised Code, or to
    municipal corporations, counties, townships, park districts, and boards of education
    that received grants pursuant to that section, or one-half of the amount of the
    taxpayer''s additional tax liability for the tax year resulting from the additional
    rates imposed by sections 5733.065 and 5733.066 of the Revised Code to provide
    funding for recycling and litter prevention under Chapter 3736. of the Revised
    Code. The taxpayer shall claim the nonrefundable credit in the order required
    under section 5733.98 of the Revised Code.

    The tax commissioner may require the taxpayer to furnish such information as is
    necessary to support a claim for a credit under this section, and no credit shall
    be allowed unless the information is provided.'
