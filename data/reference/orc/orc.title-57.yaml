- number: '5743.66'
  heading: Manufacturer or importer of tobacco or vapor products to register with
    tax commissioner - monthly reports
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5743'
    name: Cigarette Tax
  text: '(A) Each manufacturer or importer of tobacco products or vapor products shall
    register with the tax commissioner before it sells or distributes tobacco products
