  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5725.24
- number: '5725.25'
  heading: Tax on real estate of domestic insurance company
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: '(A) The real estate of a domestic insurance company shall be taxed in the
    place where it is located, the same as the real estate of other persons is taxed,
    but the tax provided for by sections 5725.01 to 5725.26 of the Revised Code, shall
    be in lieu of all other taxes on the other property and assets of such domestic
    insurance company, except as provided in division (B) of this section, and of
    all other taxes, charges, and excises on such domestic insurance companies, and
    all other taxes on the stockholders, members, or policyholders of such company
    by reason of their stock or other interest in such insurance company, except as
    to annuities or the right to receive the proceeds of a policy payable after its
    maturity in installments, or left with the company at interest. Sections 5725.01
    to 5725.26 of the Revised Code do not assess any tax on any foreign insurance
    company or affect any tax on a foreign insurance company under any laws of this
    state.

    (B) Tangible personal property taxable under Chapter 5711. of the Revised Code
    shall be subject to taxation if it is owned by a domestic insurance company and
    leased or held for the purpose of leasing to a person other than an insurance
    company for use in business.

    (C) For reports required to be filed under section 5725.14 of the Revised Code
    in 2003 and thereafter, nothing in this section shall be construed to exempt the
    property of any dealer in intangibles under section 5725.13 of the Revised Code
    from the tax imposed under section 5707.03 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5725.25
- number: '5725.26'
  heading: Tax on real estate of financial institutions and dealers in intangibles
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: 'The real estate of a financial institution or dealer in intangibles shall
    be taxed in the place where it is located, the same as the real estate of persons
    is taxed, but the taxes provided for in Chapters 5725., 5726., 5733., and 5751.
    of the Revised Code shall be in lieu of all other taxes on the other property
    and assets of such institution or dealer, except personal property taxable under
    Chapter 5711. of the Revised Code and leased, or held for the purpose of leasing,
    to others if the owner or lessor of the property acquired it for the sole purpose
    of leasing it to others.

    For reports required to be filed under section 5725.14 of the Revised Code in
    2003 and thereafter, nothing in this section shall be construed to exempt the
    property of any dealer in intangibles under section 5725.13 of the Revised Code
    from the tax imposed under section 5707.03 of the Revised Code.'
  history: null
