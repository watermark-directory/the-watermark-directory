  heading: Recording of plat
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: When the title papers are produced to the county auditor, he may plat, allot,
    and number said subdivisions. The plat made by the auditor shall be recorded upon
    the records of deeds of the county. After it has been platted and numbered by
    the auditor, or by the county engineer, it shall be sufficient for all purposes
