- number: '5711.341'
  heading: List of investors in money market investment to be filed with tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: 'Each trust or other unincorporated issuer of a money market investment sold
    to residents of this state in the preceding calendar year shall file a list of
    all its investors in the same manner as required by section 5711.34 of the Revised
    Code.

    No issuer of a money market investment, whether incorporated or unincorporated,
    that fails to comply with the requirements of this section or section 5711.34
    of the Revised Code may be authorized to register, or continue the registration
    of, any security for sale in this state, from the time that the tax commissioner
    certifies to the division of securities that such issuer is not in compliance
    with either of such sections.

    As used in this section, "money market investment" means any investment sold under
    that name or a variant thereof, and any pool of interest-bearing securities in
    which rights of participation in the distribution of such interest on a pro rata
    basis are sold by whatever name is used with a promise that they will be repurchased
    or their principal value otherwise redeemed, with or without the deduction of
    a fee, by the seller or a contractually specified person, without the requirement
    of a waiting period other than a reasonable time for the transfer of such funds.'
