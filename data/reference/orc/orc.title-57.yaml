- number: '5721.24'
  heading: Entry marked redeemed made upon tax duplicate and delinquent tax list
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: The county treasurer shall, upon receipt by him of all moneys due him for
    delinquent taxes, assessments, interest, and penalty on any tract of land, or
    city or town lot, enter upon the tax duplicate and upon his copy of the delinquent
    land list "redeemed," and the county auditor shall, after each settlement period,
    revise the list of delinquent lands, or city or town lots, by writing "redeemed"
    in the margin provided for that purpose on all such tracts of land, or city or
    town lots entered "redeemed" upon the treasurer's duplicate, and he shall make
    a like entry on his tax list.
