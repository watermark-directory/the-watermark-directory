- number: '5721.42'
  heading: Issuing additional tax certificate upon satisfaction of subsequent delinquency
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: After the settlement required under division (C) of section 321.24 of the
    Revised Code, the county treasurer shall notify the certificate holder of the
    most recently issued tax certificate, by ordinary first class or certified mail
    or by binary means, that the certificate holder may purchase a subsequent tax
    certificate by paying all delinquent taxes on the related certificate parcel the
    lien against which has not been transferred by the sale of a tax certificate.
    During the thirty days after receiving the notice, the certificate holder possesses
    the exclusive right to purchase the subsequent tax certificate by paying those
    amounts to the county treasurer. The amount of the payment shall constitute a
    separate lien against the certificate parcel that shall be evidenced by the issuance
    by the treasurer to the certificate holder of an additional tax certificate with
    respect to the delinquent taxes so paid on the related certificate parcel. The
    amount of the payment as set forth in the tax certificate shall earn interest
    at the rate of eighteen per cent per year. The certificate period of each subsequent
    tax certificate shall terminate on the expiration date of the certificate period
    of the most recent tax certificate for the same certificate parcel.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.42
- number: '5721.43'
  heading: Prohibiting demand for payment of tax certificate during year following
    purchase
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5721'
    name: Delinquent Lands
  text: '(A) Without the prior written consent of the county treasurer, no person
    shall directly, through an agent, or otherwise, initiate contact with the owner
    of a parcel with respect to which the person holds a tax certificate to encourage
    or demand payment before one month has elapsed following the purchase of the certificate.
    This division does not apply if the certificate holder is a county land reutilization
    corporation.

    (B) A county treasurer may bar any person who violates division (A) of this section
    from bidding at a tax certificate sale conducted by the treasurer.

    (C)(1) The attorney general or county prosecuting attorney, upon written request
    of a county treasurer, shall bring an action for an injunction against any person
    who has violated, is violating, or is threatening to violate division (A) of this
    section.

    (2) Any person who violates division (A) of this section shall be assessed a civil
    penalty of not more than five thousand dollars for each offense to be paid into
    the state treasury to the credit of the general revenue fund. Upon written request
    of a county treasurer, the attorney general or county prosecuting attorney shall
    commence an action against any such violator. Any action under this division is
    a civil action, governed by the Rules of Civil Procedure and other rules of practice
    and procedure applicable to civil actions.'
