- number: '5725.07'
  heading: Assessments by tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5725'
    name: Financial Institutions; Dealers In Intangibles; Insurance Companies
  text: Upon receiving the report required from a financial institution by section
    5725.02 of the Revised Code, the tax commissioner shall ascertain and assess the
    amount of taxable deposits of such institution in each county in which the institution
    maintained an office for the receipt of deposits. Such amounts shall be assessed
    in the name of such financial institution except that the amounts of the taxable
    deposits wholly withdrawn from each such institution within the times mentioned
    in section 5725.02 of the Revised Code, and separately set forth in such report,
    shall be subtracted from the amount of taxable deposits so assessed, and separately
    assessed in the names of such respective depositors.
