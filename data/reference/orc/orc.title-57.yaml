  url: https://codes.ohio.gov/ohio-revised-code/section-5727.10
- number: '5727.11'
  heading: Method of valuation
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: '(A) Except as otherwise provided in this section, the true value of all taxable
    property, except property of a railroad company, required by section 5727.06 of
    the Revised Code to be assessed by the tax commissioner shall be determined by
    a method of valuation using cost as capitalized on the public utility''s books
    and records less composite annual allowances as prescribed by the commissioner.
    If the commissioner finds that application of this method will not result in the
    determination of true value of the public utility''s taxable property, the commissioner
    may use another method of valuation.

    (B)(1) Except as provided in division (B)(2) of this section, the true value of
    current gas stored underground is the cost of that gas shown on the books and
    records of the public utility on the thirty-first day of December of the preceding
    year.

    (2) For tax year 2001 and thereafter, the true value of current gas stored underground
    is the quotient obtained by dividing (a) the average value of the current gas
    stored underground, which shall be determined by adding the value of the gas on
    hand at the end of each calendar month in the calendar year preceding the tax
    year, or, if applicable, the last day of business of each month for a partial
    month, divided by (b) the total number of months the natural gas company was in
    business during the calendar year prior to the beginning of the tax year. With
    the approval of the tax commissioner, a natural gas company may use a date other
    than the end of a calendar month to value its current gas stored underground.

    (C) The true value of noncurrent gas stored underground is thirty-five per cent
    of the cost of that gas shown on the books and records of the public utility on
    the thirty-first day of December of the preceding year.

    (D)(1) Except as provided in division (D)(2) of this section, the true value of
    the production equipment of an electric company and the true value of all taxable
    property of a rural electric company is the equipment''s or property''s cost as
    capitalized on the company''s books and records less fifty per cent of that cost
    as an allowance for depreciation and obsolescence.

    (2) The true value of the production equipment or energy conversion equipment
    of an electric company, rural electric company, or energy company purchased, transferred,
    or placed into service after October 5, 1999, is the purchase price of the equipment
    as capitalized on the company''s books and records less composite annual allowances
    as prescribed by the tax commissioner.

    (E) The true value of taxable property, except property of a railroad company,
    required by section 5727.06 of the Revised Code to be assessed by the tax commissioner
    shall not include the allowance for funds used during construction or interest
    during construction that has been capitalized on the public utility''s books and
    records as part of the total cost of the taxable property. This division shall
    not apply to the taxable property of an electric company or a rural electric company,
    excluding transmission and distribution property, first placed into service after
    December 31, 2000, or to the taxable property a person purchases, which includes
    transfers, if that property was used in business by the seller prior to the purchase.

    (F) The true value of watercraft owned or operated by a water transportation company
    shall be determined by multiplying the true value of the watercraft as determined
    under division (A) of this section by a fraction, the numerator of which is the
    number of revenue-earning miles traveled by the watercraft in the waters of this
    state and the denominator of which is the number of revenue-earning miles traveled
    by the watercraft in all waters.

    (G) The cost of property subject to a sale and leaseback transaction is the cost
    of the property as capitalized on the books and records of the public utility
    owning the property immediately prior to the sale and leaseback transaction.

    (H) The cost as capitalized on the books and records of a public utility includes
    amounts capitalized that represent regulatory assets, if such amounts previously
    were included on the company''s books and records as capitalized costs of taxable
    personal property.

    (I) Any change in the composite annual allowances as prescribed by the commissioner
    on a prospective basis shall not be admissible in any judicial or administrative
    action or proceeding as evidence of value with regard to prior years'' taxes.
    Information about the business, property, or transactions of any taxpayer obtained
    by the commissioner for the purpose of adopting or modifying the composite annual
    allowances shall not be subject to discovery or disclosure.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.11
- number: '5727.111'
  heading: Assessing at percentages of true value
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'As used in this section, "convert" means to switch fuel input from one energy
    source to another and "repower" means to replace enough of the original taxable
    production equipment to make an original production facility equivalent to a new
    facility, such that at least eighty per cent of the true value of the taxable
    production equipment is derived from new taxable production equipment installed
    as part of the replacement project. The taxable property of each public utility,
    except a railroad company, and of each interexchange telecommunications company
    shall be assessed at the following percentages of true value:

    (A) In the case of a rural electric company, one of the following:

    (1) Fifty per cent in the case of its taxable transmission and distribution property
    or energy conversion equipment first subject to taxation in this state before
    tax year 2027;

    (2) Seven per cent in the case of its taxable production and energy conversion
    equipment first subject to taxation in this state for tax year 2027 and thereafter
    or any other taxable production equipment that is either converted or repowered;

    (3) Twenty-five per cent in the case of all its other taxable property.

    (B) In the case of a telephone or telegraph company, twenty-five per cent for
    taxable property first subject to taxation in this state for tax year 1995 or
    thereafter for tax years before tax year 2007, and pursuant to division (H) of
    section 5711.22 of the Revised Code for tax year 2007 and thereafter, and the
    following for all other taxable property:

    (1) For tax years prior to 2005, eighty-eight per cent;

    (2) For tax year 2005, sixty-seven per cent;

    (3) For tax year 2006, forty-six per cent;

    (4) For tax year 2007 and thereafter, pursuant to division (H) of section 5711.22
    of the Revised Code.

    (C) Twenty-five per cent in the case of (1) a natural gas company or (2) a water-works
    company for taxable property first subject to taxation in this state for tax year
    2017 and thereafter.

    (D) Eighty-eight per cent in the case of a water-works company for taxable property
    first subject to taxation in this state before tax year 2017, or a heating company.

    (E) In the case of an electric company, one of the following:

    (1) Eighty-five per cent in the case of its taxable transmission and distribution
    property and energy conversion equipment first subject to taxation in this state
    before tax year 2027;

    (2) Twenty-five per cent in the case of its other taxable transmission and distribution
    property;

    (3) Seven per cent in the case of its taxable production and energy conversion
    equipment first subject to taxation in this state for tax year 2027 and thereafter
    or any other taxable production equipment that is either converted or repowered;

    (4) Twenty-four per cent in the case of all its other taxable property.

    (F)(1) Twenty-five per cent in the case of an interexchange telecommunications
    company for tax years before tax year 2007;

    (2) Pursuant to division (H) of section 5711.22 of the Revised Code for tax year
    2007 and thereafter.

    (G) Twenty-five per cent in the case of a water transportation company.

    (H) In the case of an energy company, one of the following:

    (1) Eighty-five per cent in the case of its taxable transmission and distribution
    property first subject to taxation in this state before tax year 2027;

    (2) Twenty-five per cent in the case of its other taxable transmission and distribution
    property;

    (3) Seven per cent in the case of its taxable production and energy conversion
    equipment first subject to taxation in this state for tax year 2027 and thereafter
    or any other taxable production equipment that is either converted or repowered;

    (4) Twenty-four per cent in the case of its other taxable production equipment;

    (5) Eighty-five per cent in the case of all its other taxable property.

    (I) In the case of a pipeline company, one of the following:

    (1) Eighty-eight per cent of its taxable property first subject to taxation in
    this state before tax year 2027;

    (2) Twenty-five per cent in the case of all its other taxable property.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.111
- number: '5727.12'
  heading: Valuation and assessment of railroad properties
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'As used in this chapter, "property used in railroad operations" means property
    used in or determined by the tax commissioner to be held by a railroad for use
    in railroad operations. In determining the true value of all real and personal
    property owned or leased by each railroad company and used in railroad operations,
    the commissioner shall use the unitary method and value all of the property of
    the company''s railroad system as a whole, considering the factors generally used
    in that method, and weighing each factor appropriately. The true value of the
    property used in railroad operations shall be apportioned to this state as provided
    in section 5727.14 of the Revised Code. For tax year 2006 and each tax year thereafter,
    the county auditor shall value and assess the real property owned by the company
    that the commissioner determines is not used in railroad operations.

    All property of a railroad shall be assessed for taxation at the same percentage
    of true value at which all other real property in this state is assessed, in the
    case of real property, and at the percentage of true value provided under divisions
    (E), (F), and (G) of section 5711.22 of the Revised Code, in the case of personal
    property.

    A determination of the value of each item of personal property not used in railroad
    operations shall be considered a separate determination with respect to which
    a separate petition for reassessment may be filed under section 5727.47 of the
    Revised Code.

    Where a line of railroad is subsidized under the terms of the federal regional
    rail reorganization act or the federal rail revitalization and regulatory reform
    act, the real and other fixed property shall be assessed solely in the name of
    its owner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.12
- number: '5727.14'
  heading: Apportionment of value of property of interstate railroad
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: When a railroad company has part of its road in this state and part in another
    state, the tax commissioner shall take the entire value of the property of such
    public utility, determined in accordance with sections 5727.01 to 5727.62 of the
    Revised Code, and apportion it to this state in the proportion that the length
    of the road in this state bears to the whole length of road. As used in this section,
    "length of road" means the miles of single or first main track, measured by the
    distance between termini, over which railroad transportation service is performed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.14
- number: '5727.15'
  heading: Apportionment of value of taxable property of public utilities
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'When all the taxable property of a public utility is located in one taxing
    district, the tax commissioner shall apportion the total taxable value thereof
    to that taxing district.

    When taxable property of a public utility is located in more than one taxing district,
    the commissioner shall apportion the total taxable value thereof among the taxing
    districts as follows:

    (A)(1) In the case of a telegraph, interexchange telecommunications, or telephone
    company that owns miles of wire in this state, the value apportioned to each taxing
    district shall be the same percentage of the total value apportioned to all taxing
    districts as the miles of wire owned by the company within the taxing district
    are to the total miles of wire owned by the company within this state;

    (2) In the case of a telegraph, interexchange telecommunications, or telephone
    company that does not own miles of wire in this state, the value apportioned to
    each taxing district shall be the same percentage of the total value apportioned
    to all taxing districts as the cost of the taxable property physically located
    in the taxing district is of the total cost of all taxable property physically
    located in this state.

    (B) In the case of a railroad company:

    (1) The taxable value of real and personal property not used in railroad operations
    shall be apportioned according to its situs;

    (2) The taxable value of personal property used in railroad operations shall be
    apportioned to each taxing district in proportion to the miles of track and trackage
    rights, weighted to reflect the relative use of such personal property in each
    taxing district;

    (3) The taxable value of real property used in railroad operations shall be apportioned
    to each taxing district in proportion to its relative value in each taxing district.

    (C)(1) Prior to tax year 2001, in the case of an electric company:

    (a) Seventy per cent of the taxable value of all production equipment and of all
    station equipment that is not production equipment shall be apportioned to the
    taxing district in which such property is physically located; and

    (b) The remaining value of such property, together with the value of all other
    taxable personal property, shall be apportioned to each taxing district in the
    per cent that the cost of all transmission and distribution property physically
    located in the taxing district is of the total cost of all transmission and distribution
    property physically located in this state.

    (c) If an electric company''s taxable value for the current year includes the
    value of any production equipment at a plant at which the initial cost of the
    plant''s production equipment exceeded one billion dollars, then prior to making
    the apportionments required for that company by division (C)(1)(a) and (b) of
    this section, the tax commissioner shall do the following:

    (i) Subtract four hundred twenty million dollars from the total taxable value
    of the production equipment at that plant for the current tax year.

    (ii) Multiply the difference thus obtained by a fraction, the numerator of which
    is the portion of the taxable value of that plant''s production equipment included
    in the company''s total value for the current tax year, and the denominator of
    which is the total taxable value of such equipment included in the total taxable
    value of all electric companies for such year;

    (iii) Apportion the product thus obtained to taxing districts in the manner prescribed
    in division (C)(1)(b) of this section.

    (iv) Deduct the amounts so apportioned from the taxable value of the company''s
    production equipment at the plant, prior to making the apportionments required
    by divisions (C)(1)(a) and (b) of this section.

    For purposes of division (C)(1)(c) of this section, "initial cost" applies only
    to production equipment of plants placed in commercial operation on or after January
    1, 1987, and means the cost of all production equipment at a plant for the first
    year the plant''s equipment was subject to taxation.

    (2) For tax year 2001 and thereafter, in the case of an electric company:

    (a) The taxable value of all production equipment shall be apportioned to the
    taxing district in which such property is physically located; and

    (b) The value of taxable personal property, including energy conversion equipment
    but excluding production equipment, shall be apportioned to each taxing district
    in the proportion that the cost of such other taxable personal property physically
    located in each taxing district is of the total cost of such other taxable personal
    property physically located in this state.

    (D) For tax year 2011 and thereafter, in the case of the taxable property of an
    energy company:

    (1) The taxable value of all production equipment shall be apportioned to the
    taxing district in which such property is physically located.

    (2) The taxable value of all other taxable property, including energy conversion
    equipment, shall be apportioned to each taxing district in the proportion that
    the cost of such other taxable property physically located in each taxing district
    is of the total cost of such other taxable property physically located in this
    state.

    (E) In the case of all other public utilities, the taxable value of the property
    to be apportioned shall be apportioned to each taxing district in proportion to
    the entire cost of such property within this state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.15
- number: '5727.23'
  heading: Preliminary or amended assessment - petition for reassessment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: 'On or before the first Monday in October, annually, the tax commissioner
    shall assess the taxable property of each public utility and interexchange telecommunications
    company, and for tax year 2009 and thereafter of each public utility property
    lessor. If the taxpayer failed to file its annual report required by section 5727.08
    of the Revised Code at least sixty days prior to the first Monday of October,
    the commissioner may make the assessment under this section within sixty days
    after the taxpayer files the report, but this does not preclude the commissioner
    from making an assessment without receiving the report.

    The action of the tax commissioner shall be evidenced by a preliminary assessment
    that reflects the taxable value apportioned to each county and each taxing district
    in the county. The commissioner may amend the preliminary assessment as provided
    in this section. Each preliminary assessment and amended preliminary assessment
    shall be certified to the public utility, interexchange telecommunications company,
    or public utility property lessor, and to the auditor of each county to which
    taxable value has been apportioned.

    The county auditor shall place the apportioned taxable value on the general tax
    list and duplicate of real and public utility property, and taxes shall be levied
    and collected thereon at the same rates and in the same manner as taxes are levied
    and collected on real property in the taxing district in question.

    Unless a petition for reassessment of an assessment has been properly filed pursuant
    to section 5727.47 of the Revised Code, each preliminary assessment and, if amended,
    each preliminary assessment as last amended shall become final ninety days after
    certification of the preliminary assessment or thirty days after certification
    of the amended preliminary assessment, whichever is later. If a petition for reassessment
    is properly filed, the assessment shall become final when the tax commissioner
    issues a final determination.

    Neither the certification of any preliminary or amended assessment nor the expiration
    of the period of time that makes any assessment final constitutes a final determination,
    assessment, reassessment, valuation, finding, computation, or order of the commissioner
    that is appealable under section 5717.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5727.23
- number: '5727.24'
  heading: Tax on gross receipts of natural gas company or combined electric and gas
    company
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5727'
    name: Public Utilities
  text: For the purpose of providing revenue to meet the needs of the state, on and
    after May 1, 2000, an excise tax is hereby levied on the gross receipts of a natural
    gas company and on the gross receipts of a combined company from operating as
    a natural gas company. The tax shall be computed by multiplying the taxable gross
    receipts as determined under section 5727.33 of the Revised Code by four and three-fourths
    per cent. A combined company shall be subject to this tax on any gross receipts
    derived from operating as a natural gas company, as determined under division
    (D) of section 5727.03 of the Revised Code, and, if applicable, shall be subject
    to the tax imposed by section 5727.30 of the Revised Code for all other gross
    receipts.
