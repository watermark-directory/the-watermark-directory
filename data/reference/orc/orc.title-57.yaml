  url: https://codes.ohio.gov/ohio-revised-code/section-5705.15
- number: '5705.16'
  heading: Resolution for transfer of funds; petition; approval or disapproval by
    tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'A resolution of the taxing authority of any political subdivision shall be
    passed by a majority of all the members thereof, declaring the necessity for the
    transfer of funds authorized by section 5705.15 of the Revised Code, and such
    taxing authority shall submit to the tax commissioner a petition that includes
    the name and amount of the fund, the fund to which it is desired to be transferred,
    a copy of such resolution with a full statement of the proceedings pertaining
    to its passage, and the reason or necessity for the transfer. The commissioner
    shall approve the transfer of such funds upon determining each of the following:

    (A) The petition states sufficient facts;

    (B) That there are good reasons, or that a necessity exists, for the transfer;

    (C) No injury will result from the transfer of such funds.

    If the petition is disapproved by the commissioner, it shall be returned within
    thirty days of its receipt to the officers who submitted it, with a memorandum
    of the commissioner''s objections, and the taxing authority shall not transfer
    the funds as requested by the petition. This disapproval shall not prejudice a
    later application for approval. If the petition is approved by the commissioner,
    it shall be returned within thirty days of its receipt to the officers who submitted
    it, and the taxing authority may transfer the funds as requested by the petition.'
