- number: '5709.79'
  heading: Annual service payments in lieu of taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: '(A) A board of county commissioners that adopts a resolution under section
    5709.78 of the Revised Code shall in the resolution require that the owner of
    the improvement make annual service payments in lieu of taxes to the county treasurer
    on or before the final dates for payment of real property taxes. Each such payment
    shall be charged and collected in the same manner and in the same amount as the
    real property taxes that would have been charged and payable against the improvement
    if its value were not exempt from taxation. If any reduction in the levies otherwise
    applicable to the improvement is made by the county budget commission under section
    5705.31 of the Revised Code, the amount of the service payment in lieu of taxes
    shall be calculated as if the reduction in levies had not been made.

    (B) The county shall not require the owner to make annual service payments in
    lieu of taxes pursuant to this section after the date on which one of the following
    occurs:

    (1) If bonds or notes were not issued under section 307.082 or 5709.81 of the
    Revised Code for any public infrastructure improvements benefiting the parcel
    on which the improvement is located, or for any housing renovations within an
    incentive district, and if service payments were not pledged pursuant to division
    (B) of section 5709.81 of the Revised Code, the date the county has collected
    sufficient money in the applicable account of the redevelopment tax equivalent
    fund to pay the cost of constructing or repairing the public infrastructure improvements
    designated in, or the housing renovations authorized by, the resolution adopted
    under section 5709.78 of the Revised Code;

    (2) If service payments were pledged under division (B) of section 5709.81 of
    the Revised Code to secure payment of any obligation issued to finance the public
    infrastructure improvement and housing renovations, the date the purposes for
    which the payments were pledged are paid in full;

    (3) If bonds or notes were issued under section 307.082 or 5709.81 of the Revised
    Code, the date the interest on and principal of such bonds and notes have been
    paid in full.

    (C) Money collected as service payments in lieu of taxes shall be distributed
    at the same time and in the same manner as real property tax payments. However,
    subject to division (D) of this section or section 5709.914 of the Revised Code,
    the entire amount so collected shall be distributed to the county in which the
    parcel is located. The county treasurer shall maintain a record of the service
    payments in lieu of taxes made for each parcel. If a parcel upon which moneys
    are collected as service payments in lieu of taxes is annexed to a municipal corporation,
    the service payments shall continue to be collected and distributed to the county
    until the date described in division (B)(1), (2), or (3) of this section.

    (D) The county treasurer shall distribute to the appropriate taxing authorities
    the portion of the annual service payments in lieu of taxes that represents payments
    required under division (E) of section 5709.78 of the Revised Code.

    (E) Nothing in this section or section 5709.78 of the Revised Code affects the
    taxes levied against that portion of the value of any parcel that is not exempt
    from taxation.'
