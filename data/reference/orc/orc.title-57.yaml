- number: '5715.21'
  heading: Payment of tax shall not abate complaint or appeal
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: Payment of the whole or any part of any real property tax or assessment for
    any year or any recoupment charge as to which a complaint or appeal is pending
    shall not abate the complaint or appeal or in any way affect the hearing and determination
    thereof.
