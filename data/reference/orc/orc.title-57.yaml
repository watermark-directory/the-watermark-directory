- number: '5719.041'
  heading: Interest charge for late payment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'If the payment of a general personal property or classified property tax
    is not made on or before the last day prescribed by section 5719.03 or 5719.031
    of the Revised Code, an interest charge shall begin to accrue and shall continue
    until all charges are paid, except that no interest charge shall accrue for or
    in the month in which such payment was due under such section or under the circumstances
    and for the period described in division (A)(2) of section 5711.33 of the Revised
    Code or upon delinquent taxes that are the subject of a delinquent tax contract
    entered into pursuant to section 5719.05 of the Revised Code.

    The interest charge shall accrue against the balance of such taxes and any penalty
    thereon outstanding that remains unpaid on the last day of each month and shall
    be at the rate per calendar month, rounded to the nearest one-hundredth of one
    per cent, equal to one-twelfth of the federal short-term rate determined by the
    tax commissioner under section 5703.47 of the Revised Code for the calendar year
    that includes the month for which the charge accrues. The charge is payable in
    addition to the unpaid balance of taxes and penalties on the day the charge accrues,
    unless the entire balance is sooner paid.

    If a delinquent tax contract becomes void, interest shall be charged on the day
    on which the contract becomes void in the amount that would have been charged
    had the delinquent tax contract not been entered into and shall thereafter accrue
    as provided in this section.

    Interest shall be allowed, at the same rate per calendar month as is applicable
    that month for underpayments, on any overpayment of the tax charged on a general
    personal property or a classified property tax duplicate, from the first day of
    the month following the date of the overpayment until the last day of the month
    preceding the date of the refund of the overpayment. The interest shall be paid
    from the fund or funds to which the overpayment was credited.

    When the county treasurer makes the treasurer''s annual settlement with the county
    auditor under division (D) of section 321.24 of the Revised Code, the treasurer
    shall certify to the auditor a list of all entries on the cumulative delinquent
    tax duplicate that are at that time in the process of being paid in installments
    under a valid delinquent tax contract. For each entry that appears on the duplicate
    that is not on the certified list, the auditor shall compute the full amount of
    interest charges which have accrued against such entry since the preceding such
    settlement was made and shall include such charges through the last day of the
    month preceding the current settlement. The auditor shall include such amounts
    on the tax list and duplicates prepared by the auditor as prescribed in section
    5719.04 of the Revised Code unless the interest is less than one dollar, in which
    case it shall not be added to such tax lists and duplicates.

    Before the county treasurer accepts any payment of taxes against which there are
    accrued interest charges that do not appear on the delinquent tax duplicate, the
    treasurer shall notify the auditor who shall issue a certificate to the treasurer
    showing the amount of such interest charges, and the treasurer shall collect the
    amount shown on such certificate at the time of accepting payment of such taxes.
    If the amount of such interest charges is less than one dollar, no such certificate
    shall be issued. In the case of delinquent personal property taxes, the interest
    shown on such certificate shall be credited to the undivided general tax fund,
    and distributed in the same manner as the delinquent taxes upon which the interest
    charges accrued. In the case of delinquent classified property taxes, the interest
    shown on such certificate shall be credited to the county public library fund
    and distributed in accordance with section 5747.48 of the Revised Code. When the
    payment of delinquent taxes is credited on the tax duplicate the treasurer shall
    make a separate notation thereon indicating the amount collected and the index
    number of the auditor''s certificate herein prescribed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.041
- number: '5719.042'
  heading: Successful contractors to submit sworn statement of no tax liability
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'After the award by a taxing district of any contract let by competitive bid
    and prior to the time the contract is entered into, the person making a bid shall
    submit to the district''s fiscal officer a statement affirmed under oath that
    the person with whom the contract is to be made was not charged at the time the
    bid was submitted with any delinquent personal property taxes on the general tax
    list of personal property of any county in which the taxing district has territory
    or that such person was charged with delinquent personal property taxes on any
    such tax list, in which case the statement shall also set forth the amount of
    such due and unpaid delinquent taxes and any due and unpaid penalties and interest
    thereon.

    If the statement indicates that the taxpayer was charged with any such taxes,
    all of the following apply:

    (A) The fiscal officer shall transmit a copy of the statement to the county treasurer
    within thirty days of the date it is submitted.

    (B) A copy of that statement shall be incorporated into the contract.

    (C) No payment shall be made with respect to any contract to which this section
    applies unless that statement has been incorporated as required under division
    (B) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.042
- number: '5719.05'
  heading: Collection of taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'The county treasurer shall forthwith collect the taxes and penalty on the
    duplicate delivered to the treasurer by the auditor pursuant to section 5719.04
    of the Revised Code and any interest thereon by any of the means provided by law.

    In addition to any other means provided by law, the treasurer may, after finding
    that the treasurer is unable to collect the full amount of delinquent taxes, interest,
    and penalties charged against an entry on the cumulative delinquent tax duplicate
    in a single payment, enter into a written delinquent tax contract, with the person
    so charged, for payment of the full amount in installments. The terms of the delinquent
    tax contract shall include the amount payable and the due date of each installment
    including the final payment date, which shall be not more than five years after
    the date of the first payment. The treasurer shall enter upon the margin of the
    duplicate a notation indicating that the agreement for installment payment has
    been undertaken. A receipt shall be issued for each payment, and the payment shall
    be credited on the duplicate on the date paid. Each payment shall be apportioned
    among the several taxing districts in the same proportion that the amount of taxes
    levied by each district against the entry in the preceding tax year bears to the
    taxes levied by all such districts against the entry in the preceding tax year.
    The payment shall be apportioned among the taxing district''s various funds for
    which the taxes were levied. When a payment is not tendered as agreed upon, the
    delinquent tax contract may be declared void by the treasurer, and the treasurer
    may proceed to collect the unpaid balance by any means provided by law. The treasurer
    may permit a new agreement to be undertaken, under the same terms and conditions,
    but there shall be no requirement that the treasurer do so.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.05
- number: '5719.051'
  heading: Employment of collectors
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: If the board of county commissioners deems it necessary, it may authorize
    the county treasurer to employ collectors to collect the taxes mentioned in section
    5719.05 of the Revised Code or part thereof, and fix the compensation of such
    collectors, and provide for the reasonable and necessary expenses of such collectors
    in the pursuit of their duties, which shall be paid out of the county treasury.
    All such compensation and expenses shall be apportioned ratably by the county
    auditor among all the funds entitled to share in the distribution of the taxes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.051
- number: '5719.06'
  heading: Delinquent tax list and duplicate to be cumulatively kept - uncollectible
    items
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: The county auditor's delinquent tax list and the county treasurer's delinquent
    tax duplicate provided for in section 5719.04 of the Revised Code shall be cumulatively
    kept so that the amount of delinquent taxes and penalties charged against each
    person may be shown on the latest delinquent list and duplicate. Whenever the
    treasurer shall, by means of the remedies provided by law or otherwise, determine
    that any item which has appeared on the cumulative tax list and duplicate of taxes
    provided for in this section for a period of five years is uncollectible, he shall
    forthwith certify such determination, together with his reasons therefor, to the
    county board of revision and the prosecuting attorney. If such board and the prosecuting
    attorney determine any such item is uncollectible, they shall certify such finding
    to the auditor who shall cause said item to be stricken from the cumulative tax
    list and duplicate.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.06
- number: '5719.07'
  heading: Certificate of release of lien - partial discharge
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: Subject to the rules prescribed by the tax commissioner, a county treasurer
    charged with the collection of delinquent taxes may issue a certificate of release
    of the lien provided for in section 5719.04 of the Revised Code if the amount
    secured thereby has been paid or omitted from the delinquent tax list and duplicate
    pursuant to section 5719.06 of the Revised Code. The treasurer shall issue a certificate
    of partial discharge of any part of the real property subject to the lien after
    finding that the value of the part of the property remaining subject to the lien
    is at least double the amount of the delinquent taxes and all prior liens upon
    such real property. Such certificate shall be filed and recorded with the county
    recorder of the county in which the notice of lien has been filed, for which recording
    the recorder shall charge a base fee of two dollars for services and a housing
    trust fund fee of two dollars pursuant to section 317.36 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.07
- number: '5719.08'
  heading: Civil action to enforce collection of taxes - judgment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'When taxes stand charged against a person and are not paid within the time
    prescribed by law for their payment, the county treasurer, in addition to any
    other remedy provided by law for the collection of taxes, shall enforce the collection
    of the taxes by a civil action in the name of the treasurer against the person
    for the recovery of the unpaid taxes. If the proper parties are before the court,
    it shall be sufficient for the treasurer to allege in his complaint that the taxes
    stand charged upon the duplicate of the county against the person, that they are
    due and unpaid, and that the person is indebted in the amount appearing to be
    due on the duplicate, and the treasurer need not set forth any further special
    matter relating thereto. The tax duplicate shall be prima-facie evidence on the
    trial of the action of the amount and validity of the taxes appearing due and
    unpaid on the duplicate and of the nonpayment of the taxes, without setting forth
    in the complaint any further special matter relating to the taxes.

    If it is found on the trial of the action that the person is indebted to the state,
    judgment shall be rendered in favor of the treasurer prosecuting the action, as
    in other cases. The judgment debtor shall not be entitled to the benefit of the
    laws for stay of execution or the exemption of property from levy or sale on execution
    in the enforcement of the judgment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.08
- number: '5719.081'
  heading: Distraint of goods and chattels for collection of taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'When taxes are past due and unpaid, the county treasurer may distrain sufficient
    goods and chattels belonging to the person charged with such taxes, if such goods
    and chattels are found within the county, to pay the taxes remaining due, any
    penalty and interest thereon, and the costs that have accrued. Such treasurer
    shall immediately advertise in three public places in the township where the property
    was taken the time and the place it will be sold. If the taxes, penalty, interest,
    and costs accrued on the property are not paid before the day appointed for such
    sale, which shall be not less than ten days after the taking of the property,
    the treasurer shall sell it at public vendue or so much of the property as will
    pay such taxes, penalty, interest, and costs.

    For making distress and sale for the payment of taxes, the treasurer shall be
    allowed the same fees as are allowed to constables for making levy and sale of
    property on execution. Traveling fees shall be computed from the county seat to
    the place of making the distress.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.081
- number: '5719.082'
  heading: Inability to collect tax by distress
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: If the county treasurer is unable to collect by distress taxes assessed upon
    a person, corporation, executor, administrator, guardian, receiver, accounting
    officer, agent, or factor, he shall apply to the clerk of the court of common
    pleas in his county at any time after the semiannual settlement of the treasurer
    with the county auditor, and the clerk shall cause notice to be served upon such
    corporation, executor, administrator, guardian, receiver, accounting officer,
    agent, or factor, requiring him to show cause why he should not pay such taxes
    and any penalty and interest thereon. If he fails to show sufficient cause, the
    court of common pleas, at the term to which such notice is returnable, shall enter
    a rule against him for such payment and the costs of the proceedings, which rule
    shall have the same force and effect as a judgment and shall be enforced by attachment
    or execution or such process as the court directs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.082
- number: '5719.083'
  heading: Relocation of delinquent tax payer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'In making return of the delinquent list of personal property to the county
    auditor, the county treasurer shall note on the margin of such list the county
    and state to which the delinquent taxpayer has removed, or in which he resides,
    with the date of his removal, if such treasurer is able to ascertain such fact.

    Immediately after the settlement with the auditor, the treasurer shall make and
    forward to the treasurer of the county to which a delinquent taxpayer has removed,
    or in which he resides, a statement of taxes assessed and not paid, specifying
    the value of the property on which levied and the amount levied, plus any penalty
    and interest thereon, to which he shall add twenty-five per cent of the tax so
    levied if such taxpayer left the county in which the taxes were levied after the
    time required by section 319.29 of the Revised Code for the auditor to deliver
    the tax duplicate to the treasurer. If he left the county previous to such time,
    the treasurer shall not add the twenty-five per cent.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.083
- number: '5719.084'
  heading: Collecting nonresident delinquent taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: Immediately on the receipt of the statement required by section 5719.083 of
    the Revised Code, the county treasurer shall collect such taxes and per cent,
    plus any penalty and interest thereon, from the person so charged, for which services
    he shall be allowed the same fees as treasurers receive for collecting delinquent
    taxes by process, to be collected from the person against whom such taxes are
    charged.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.084
- number: '5719.085'
  heading: Return of statement of taxes collected
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: For the collection of all taxes, penalties, interest, and costs mentioned
    in section 5719.084 of the Revised Code, the county treasurers shall have the
    same powers given by any law for the collection of taxes. All moneys collected
    by any treasurer pursuant to such section shall be by him transmitted, in the
    safest and most convenient way, to the treasurer of the county to which such moneys
    belong. At the same time, he shall forward a statement to the county auditor of
    such county of the amount collected and from whom. If the treasurer is unable
    to collect such taxes he shall return the original statement to the auditor of
    the county from which it was sent, with his official certificate why they could
    not be collected.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.085
- number: '5719.086'
  heading: Delinquent tax charged to treasurer
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: If a county treasurer, on making settlement with the county auditor, stands
    charged with any tax which remains unpaid, and receives no credit for the tax
    in such settlement, the treasurer may collect such tax, for his own use, at any
    time within one year after the settlement, either by distress and sale or by action
    in his own name, before any court having jurisdiction of such action.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.086
- number: '5719.087'
  heading: Procedure where delinquent taxpayer has property within state
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: If a person charged with a tax has not sufficient property which the county
    treasurer can find to distrain to pay such tax, but has money or credit due or
    coming due him from any person within the state, known to the treasurer, or if
    such taxpayer has removed from the state or county, and has property, moneys,
    or credits due or coming due him in the state, known to the treasurer, in every
    such case, the treasurer shall collect such tax and any penalty and interest thereon
    by distress, attachment, or other process. He may make affidavit that the residence
    of such taxpayer is unknown to him, or that such taxpayer is not a resident of
    the county where such property is found or where such debtor resides, or that
    such taxpayer has not property in the county sufficient to distrain to pay such
    tax. Thereupon an attachment, with garnishee process, shall be issued and such
    proceedings had, and such judgment rendered for taxes, penalty, interest, and
    costs as are lawful in other cases of attachments. If the treasurer serves upon
    any person indebted to such taxpayer a written notice, stating the amount of delinquent
    tax, penalty, and interest due, such debtor may, after the service of such notice,
    pay such amount to the treasurer, whose receipt shall be a full discharge of so
    much of the indebtedness as equals the amount paid.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.087
- number: '5719.11'
  heading: Tax lien on deposits and stock of a financial institution - penalty
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: Taxes assessed on deposits in a financial institution shall be a lien on the
    deposit of each person as of the day fixed by the tax commissioner for the listing
    of such deposits. Taxes assessed on the shares of stock of an institution whose
    shares are withdrawable and defined as deposits in sections 5725.01 to 5725.26
    of the Revised Code, shall be a lien on such shares as of the day fixed. Every
    financial institution shall pay to the treasurer of state the taxes on the amount
    of such deposits and withdrawable shares assessed in its name and any such institution
    which fails to pay such taxes as provided in this section shall be liable, as
    a penalty, for the gross amount of the taxes due on its deposits and withdrawable
    shares assessed in its name, and for an additional amount of one hundred dollars
    for every day of delay in the payment of such taxes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.11
- number: '5719.13'
  heading: Tax lien on stock of a dealer in intangibles - penalty - deduction of taxes
    from dividend or distribution
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: 'Taxes assessed on the shares of stock of a dealer in intangibles shall be
    a lien on such shares from the first day of January in each year until they are
    paid. Each dealer in intangibles shall collect the taxes due from the owners of
    such shares and remit the same to the tax commissioner, who shall accept the remittance
    on behalf of the treasurer of state. The remittance shall be made payable to the
    treasurer of state and shall be made in the form prescribed by the commissioner.
    Any dealer in intangibles who fails to pay said taxes as provided in this section
    shall be liable by way of penalty for the gross amount of the taxes due from all
    the owners of shares, and for an additional amount of one hundred dollars for
    each day of delay in the payment of said taxes.

    A dealer in intangibles who pays the taxes assessed upon its shares in the hands
    of its shareholders, as provided in this section, may deduct the amount thereof
    from dividends or distributions that are due or thereafter become due on such
    shares, and shall have a lien on the shares of stock and all funds belonging to
    such shareholders in its possession, or which come into its possession, for reimbursement
    of such tax paid on account of the shareholders, with legal interest. Such lien
    may be enforced in any appropriate manner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5719.13
- number: '5719.14'
  heading: Fiduciary's lien upon property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5719'
    name: Personal Property Tax Collection
  text: A person against whom taxes are assessed as fiduciary for another person or
    an estate shall, upon payment of such taxes, have a claim against such person
    or estate for reimbursement of the taxes paid, with legal interest, and a lien
    upon all funds and property of such person or estate in his possession or which
    come into his possession. Such lien may be enforced in any appropriate manner.
