- number: '5715.271'
  heading: Burden of proof of entitlement to exemption on property owner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: In any consideration concerning the exemption from taxation of any property,
    the burden of proof shall be placed on the property owner to show that the property
    is entitled to exemption. The fact that property has previously been granted an
    exemption is not evidence that it is entitled to continued exemption.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.271
- number: '5715.28'
  heading: Decisions by department of taxation shall be binding
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The tax commissioner shall decide all questions that arise as to the construction
    of any statute affecting the assessment, levy, or collection of real property
    taxes, in accordance with the advice and opinion of the attorney general. Such
    opinion and the rules, orders, and instructions of the commissioner prescribed
    and issued in conformity therewith shall be binding upon all officers, who shall
    observe such rules and obey such orders and instructions, unless the same are
    reversed, annulled, or modified by a court of competent jurisdiction.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.28
- number: '5715.29'
  heading: Rules, orders and instructions of tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The tax commissioner shall prescribe such general and uniform rules and issue
    such orders and instructions, not inconsistent with law, as he deems necessary,
    as to the exercise of the powers and the discharge of the duties of all officers
    which relate to the assessment of property and the levy and collection of taxes.
    The commissioner shall cause the rules prescribed by him to be observed, the orders
    and instructions issued by him to be obeyed, and the forms prescribed by him to
    be observed and used.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.29
- number: '5715.30'
  heading: Tax commissioner shall furnish forms
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The tax commissioner shall prescribe for and furnish to all county boards
    of revision, county auditors, and county treasurers blank forms for all oaths
    of office, statements, returns, reports, tax lists and duplicates, abstracts,
    records of proceedings, complaints, notices of appeal, tax bills, receipts, and
    all other documents, files, and records authorized or required by any law which
    relates to the assessment, levy, or collection of taxes or the reduction of taxes
    or by any rules, orders, or instructions of the commissioner. The commissioner
    shall prescribe a form for tax lists and duplicates to insure proper administration
    of sections 319.301, 319.302, and 323.151 to 323.159 of the Revised Code. The
    commissioner shall prescribe and furnish blank forms of records and papers for
    all proceedings and official actions authorized or required by any law which relates
    to the assessment, levy, or collection of taxes or by any rules, orders, or instruction
    of the commissioner. Auditors, treasurers, all other officers, and all persons
    required to list property for taxation shall use true copies of such blank forms.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.30
- number: '5715.31'
  heading: Power of tax commissioner to compel obedience to orders
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: To enforce his rules, orders, and instructions and compel the observance and
    use of the forms prescribed by him, the tax commissioner may institute or cause
    to be instituted any civil or criminal proceedings provided by law as a punishment
    for the failure to obey any lawful requirement or order made by the commissioner
    or as a means of preventing the violation or disobedience of such orders or compelling
    their enforcement. All such provisions of law shall be deemed to apply to the
    enforcement of the rules, orders, and instructions of the commissioner prescribed
    or issued under section 5715.29 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.31
- number: '5715.32'
  heading: Power to require conferences
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The tax commissioner may require county auditors, assessors, and members of
    county boards of revision to meet and confer with other county auditors, assessors,
    members of county boards of revision, or with the commissioner on any matter relating
    to the assessment and valuation of property for taxation at such times and places
