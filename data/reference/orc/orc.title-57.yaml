  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.32
- number: '5715.33'
  heading: Sexennial reappraisal - reassessment of improperly assessed property
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The tax commissioner shall order a reappraisal of all real property in each
    county once in each six-year period. The commissioner may order the commencement
    of any sexennial reappraisal in sufficient time for the county auditor to complete
    the reappraisal as required by section 5713.01 of the Revised Code. The commissioner
    may order a reassessment of the real property or any class thereof in any taxing
    district or subdivision thereof in the third calendar year following the year
    in which a sexennial reappraisal is completed if in his opinion such property
    has been unequally or improperly assessed, so that all classes of property in
    such district shall be assessed in compliance with law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.33
- number: '5715.34'
  heading: Duty of county auditor to make reassessment
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: '(A) When a reassessment of all real property, or any class of property, situated
    in the county, township, municipal corporation, or other taxing district is ordered
    by the tax commissioner, the county auditor, within sixty days of the receipt
    of such order, shall commence the reassessment in the manner provided by law and
    by rules prescribed and issued by the commissioner.

    (B) If a county auditor determines to reassess all real property situated in the
    county prior to the time the auditor is ordered to do so in compliance with section
    5713.01 of the Revised Code and division (A) of this section, certifies to the
    tax commissioner that the auditor has sufficient moneys available to do so, and
    requests the commissioner to order the reassessment at a date earlier than would
    otherwise be required, the commissioner shall issue an order to the auditor to
    do so. The auditor shall commence the reassessment in the manner provided by law
    and by rules adopted by the commissioner, within sixty days after receiving the
    order.

    (C) If the county auditor refuses, neglects, or fails to commence a reassessment
    within sixty days after receiving such order, or refuses, neglects, or fails to
    complete the reassessment within the time limit prescribed and set forth in such
    order, the tax commissioner shall withhold from such county its share in the distribution
    of state revenue to local government pursuant to section 5747.50 of the Revised
    Code and shall direct the department of education and workforce to withhold therefrom
    its share in the distribution of state revenue to school districts pursuant to
    Title XXXIII of the Revised Code. The commissioner shall withhold the distribution
    of such funds until such county auditor has complied with all the provisions of
    this section, and the department shall withhold the distribution of such funds
    until the commissioner has notified the department that such auditor has complied
    with all of the provisions of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.34
- number: '5715.35'
  heading: Compilation, publication, and distribution of tax laws by tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: The tax commissioner shall, as changes in the law require, compile the laws
    relating to the assessment of property for taxation and the levy and collection
    of taxes, with such annotations, instructions, and references to court decisions
    concerning the same as the commissioner deems proper. The commissioner shall cause
    a sufficient number of copies of the same to be distributed to county auditors
    and such other public officers or employees as the commissioner deems proper.
    A charge shall be made for copies distributed other than as provided in this section,
    but such charge shall not exceed the total cost of the copies distributed. Money
    realized from the sale of such copies shall be placed in the general revenue fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.35
- number: '5715.36'
  heading: County to pay assessment and hearing expenses of tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: '(A) Any expense incurred by the tax commissioner as to the annual assessment
    of real property in any taxing district shall be paid out of the treasury of the
    county in which such district is located upon presentation of the order of the
    commissioner certifying the amount thereof to the county auditor, who shall thereupon
    issue a warrant therefor upon the general fund of the county and direct the warrant
    to the county treasurer, who shall pay the same. All money paid out of the county
    treasury under authority of this division and section 5703.30 of the Revised Code
    shall be charged against the proper district, and amounts paid by the county shall
    be retained by the auditor from funds due such district at the time of making
    the semiannual distribution of taxes.

    (B) Any expense incurred by the board of tax appeals as to the hearing of any
    appeal from a county budget commission with respect to the allocation of the local
    government fund or the county public library fund shall be paid out of the treasury
    of the county involved upon presentation of the order of the board certifying
    the amount thereof to the county auditor, who shall thereupon issue a warrant
    therefor upon the general fund of the county and direct the warrant to the county
    treasurer, who shall pay the same. At the time the local government fund or the
    county public library fund is distributed, all money which had been paid out of
    the county treasury for such expenses shall be deducted by the county auditor
    from the fund involved in the appeal. The amount so deducted by the county auditor
    shall be forthwith returned to the general fund of the county.

    (C) An amount equal to the sum of the expenses incurred by the board of tax appeals
    as to any of the following shall be paid out of the general fund of the county
    in which such property is located upon presentation of the order of the board
    certifying the amount thereof to the county auditor, who shall thereupon issue
    a warrant therefor upon the general fund of the county and direct the warrant
    to the county treasurer, who shall pay the same:

    (1) The hearing of any appeal from a county board of revision under section 5717.01
    of the Revised Code;

    (2) An appeal from any finding, computation, determination, or order of the tax
    commissioner made with respect to the assessment or exemption of real property
    under section 5717.02 of the Revised Code. At the time of each settlement of taxes
    under divisions (A) and (C) of section 321.24 of the Revised Code, there shall
    be deducted from the taxes included in such settlement and paid into the county
    general fund in the same manner as the fees allowed the county treasurer on amounts
    included in such settlement, the amounts paid out under this division since the
    preceding settlement. Each deduction shall be apportioned among the taxing districts
    within which the property that was the subject of the appeal is located in proportion
    to their relative shares of their respective taxes included in the settlement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.36
- number: '5715.37'
  heading: Tax commissioner to appear in court cases involving valuations
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5715'
    name: Boards Of Revision; Equalization Of Assessments
  text: To protect the public interests, the tax commissioner may appear and upon
    his application be heard in any court or tribunal in any proceeding involving
    the appraisal, valuation, or equalization of real property for the purpose of
    taxation, or the assessment or collection of taxes. The clerk of any court of
    record shall immediately transmit to the commissioner by certified mail a copy
    of the petition filed in any such action, and charge the fee therefor in the costs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5715.37
