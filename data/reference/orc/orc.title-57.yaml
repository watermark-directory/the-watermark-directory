- number: '5713.011'
  heading: Notice that applicant may apply for reduction in taxes
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5713'
    name: Assessing Real Estate
  text: If the county auditor determines under section 5713.01 of the Revised Code
    that the construction of a dwelling on a previously vacant parcel of land is now
    available for use or that an additional dwelling is constructed on a parcel of
    land and is now available for use, the county auditor, by ordinary mail, shall
    send to the owner of the dwelling a notice that the applicant may apply for a
    reduction in taxes under division (A)(2) of section 323.153 of the Revised Code.
    The notice shall be substantially in the form of the notice prescribed under division
    (A)(3)(b) of section 323.131 of the Revised Code.
