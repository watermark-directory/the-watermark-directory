  url: https://codes.ohio.gov/ohio-revised-code/section-5711.21
- number: '5711.22'
  heading: Listing and rates of personal property tax
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5711'
    name: Listing Personal Property
  text: '(A) Deposits not taxed at the source shall be listed and assessed at their
    amount in dollars on the day they are required to be listed. Moneys shall be listed
    and assessed at the amount thereof in dollars on hand on the day that they are
    required to be listed. In listing investments, the amount of the income yield
    of each for the calendar year next preceding the date of listing shall, except
    as otherwise provided in this chapter, be stated in dollars and cents and the
    assessment thereof shall be at the amount of such income yield; but any property
    defined as investments in either division (A) or (B) of section 5701.06 of the
    Revised Code that has not been outstanding for the full calendar year next preceding
    the date of listing, except shares of stock of like kind as other shares of the
    same corporation outstanding for the full calendar year next preceding the date
    of listing, or which has yielded no income during such calendar year shall be
    listed and assessed as unproductive investments, at their true value in money
    on the day that such investments are required to be listed.

    Credits and other taxable intangibles shall be listed and assessed at their true
    value in money on the day as of which the same are required to be listed.

    Shares of stock of a bank holding company, as defined in Title 12 U.S.C.A., section
    1841, that are required to be listed for taxation under this division and upon
    which dividends were paid during the year of their issuance, which dividends are
    subject to taxation under the provisions of Chapter 5747. of the Revised Code,
    shall be exempt from the intangibles tax for the year immediately succeeding their
    issuance. If such shares bear dividends the first calendar year after their issuance,
    which dividends are subject to taxation under the provisions of Chapter 5747.
    of the Revised Code, it shall be deemed that the nondelinquent intangible property
    tax pursuant to division (A) of section 5707.04 of the Revised Code was paid on
    those dividends paid that first calendar year after the issuance of the shares.

    (B) For tax years before tax year 2009, boilers, machinery, equipment, and personal
    property the true value of which is determined under division (B) of section 5711.21
    of the Revised Code shall be listed and assessed at an amount equal to the sum
    of the products determined under divisions (B)(1), (2), and (3) of this section:

    (1) Multiply the portion of the true value determined under division (B)(1) of
    section 5711.21 of the Revised Code by the assessment rate for the tax year in
    division (G) of this section;

    (2) Multiply the portion of the true value determined under division (B)(2) of
    section 5711.21 of the Revised Code by the assessment rate in section 5727.111
    of the Revised Code that is applicable to the production equipment of an electric
    company;

    (3) Multiply the portion of the true value determined under division (B)(3) of
    section 5711.21 of the Revised Code by the assessment rate in section 5727.111
    of the Revised Code that is applicable to the property of an electric company
    that is not production equipment.

    (C) For tax years before tax year 2009, personal property leased to a public utility
    or interexchange telecommunications company as defined in section 5727.01 of the
    Revised Code and used directly in the rendition of a public utility service as
    defined in division (P) of section 5739.01 of the Revised Code shall be listed
    and assessed at the same percentage of true value in money that such property
    is required to be assessed by section 5727.111 of the Revised Code if owned by
    the public utility or interexchange telecommunications company.

    (D)(1) Merchandise or an agricultural product shipped from outside this state
    and held in this state in a warehouse or a place of storage without further manufacturing
    or processing and for storage only and for shipment outside this state, but that
    does not qualify as "not used in business in this state" under division (B)(1)
    or (2) of section 5701.08 of the Revised Code, is nevertheless not used in business
    in this state for property tax purposes.

    (2) Merchandise or an agricultural product owned by a qualified out-of-state person
    shipped from outside this state and held in this state in a public warehouse without
    further manufacturing or processing and for temporary storage only and for shipment
    inside this state, but that does not qualify as "not used in business in this
    state" under division (B)(1) or (2) of section 5701.08 of the Revised Code, is
    nevertheless not used in business in this state for property tax purposes.

    (3) As used in division (D)(2) of this section:

    (a) "Qualified out-of-state person" means a person that does not own, lease, or
    use property, other than merchandise or an agricultural product described in this
    division, in this state, and does not have employees, agents, or representatives
    in this state;

    (b) "Public warehouse" means a warehouse in this state that is not subject to
    the control of or under the supervision of the owner of the merchandise or agricultural
    product stored in it, or staffed by the owner''s employees, and from which the
    property is to be shipped inside this state.

    (E) Personal property valued pursuant to section 5711.15 of the Revised Code and
    personal property required to be listed on the average basis by division (B) of
    section 5711.16 of the Revised Code, except property described in division (D)
    of this section, business fixtures, and furniture not held for sale in the course
    of business, shall be listed and assessed at twenty-three per cent of its true
    value in money for tax year 2005 and at the percentage of such true value specified
    in division (G) of this section for tax year 2006 and each tax year thereafter.

    (F) All manufacturing equipment as defined in section 5711.16 of the Revised Code
    shall be listed and assessed at the following percentage of its true value in
    money:

    (1) For all such property not previously used in business in this state by the
    owner thereof, or by related member or predecessor of the owner, other than as
    inventory, before January 1, 2005, zero per cent of true value;

    (2) For all other such property, at the percentage of true value specified in
    division (G) of this section for tax year 2005 and each tax year thereafter.

    (G) Unless otherwise provided by law, all other personal property used in business
    that has not been legally regarded as an improvement on land and considered in
    arriving at the value of the real property assessed for taxation shall be listed
    and assessed at the following percentages of true value in money:

    (1) For tax year 2005, twenty-five per cent of true value;

    (2) For tax year 2006, eighteen and three-fourths per cent of true value;

    (3) For tax year 2007, twelve and one-half per cent of true value;

    (4) For tax year 2008, six and one-fourth per cent of true value;

    (5) For tax year 2009 and each tax year thereafter, zero per cent of true value.

    (H)(1) For tax year 2007 and thereafter, all personal property used by a telephone
    company, telegraph company, or interexchange telecommunications company shall
    be listed as provided in this chapter and assessed at the following percentages
    of true value in money:

    (a) For tax year 2007, twenty per cent of true value;

    (b) For tax year 2008, fifteen per cent of true value;

    (c) For tax year 2009, ten per cent of true value;

    (d) For tax year 2010, five per cent of true value;

    (e) For tax year 2011 and each tax year thereafter, zero per cent of true value.

    (2) The property owned by a telephone, telegraph, or telecommunications company
    shall be apportioned to each appropriate taxing district as provided in section
    5727.15 of the Revised Code.

    (I) During and after the tax year in which the assessment rate equals zero per
    cent, the property described in division (E), (F), (G), or (H) of this section
    shall not be listed for taxation.

    (J) Divisions (E), (F), (G), and (H) of this section apply to the property of
    a person described in divisions (E)(3), (4), and (5) of section 5751.01 of the
    Revised Code. Division (J) of this section does not prevent the application of
    the exemption of property from taxation under section 5725.25 or 5725.26 of the
    Revised Code.'
