    name: Taxation
  chapter:
    num: '5709'
    name: Taxable Property - Exemptions
  text: The amendment by H.B. 110 of the 134th General Assembly of section 5709.40
    of the Revised Code applies to any projects commenced or completed, or ordinances
    adopted, on, before, or after September 30, 2021, provided that, with respect
    to projects commenced or completed, or ordinances adopted, before September 30,
    2021, the legislative authority of the municipal corporation adopts an ordinance
    after September 30, 2021, to confirm the applicability of the amendment to the
    project or ordinance. The amendment by that act of section 5709.41 of the Revised
    Code applies to ordinances adopted after September 30, 2021, and also to ordinances
    adopted on or before that date if, and to the extent that, the ordinance either
    specifies the tax year in which the exemption commences, provides that the exemption
    commences in the tax year in which the value of an improvement exceeds a specified
    amount or in which the construction of one or more improvements is completed,
    or allows for the exemption to commence in different tax years on a parcel-by-parcel
    basis.
