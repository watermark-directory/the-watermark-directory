- number: '5705.281'
  heading: Waiving requirement of adoption of tax budget
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: '(A) Notwithstanding section 5705.28 of the Revised Code, the county budget
    commission, by an affirmative vote of a majority of the commission, including
    an affirmative vote by the county auditor, may waive the requirement that the
    taxing authority of a subdivision or other taxing unit adopt a tax budget as provided
    under section 5705.28 of the Revised Code, but shall require such a taxing authority
    to provide such information to the commission as may be required by the commission
    to perform its duties under this chapter, including dividing the rates of each
    of the subdivision''s or taxing unit''s tax levies as provided under section 5705.04
    of the Revised Code.

    (B)(1) Notwithstanding divisions (B)(1) and (D) of section 5705.28 of the Revised
    Code, the county budget commission, by an affirmative vote of a majority of the
    commission, including an affirmative vote by the county auditor, may waive any
    or all of the following requirements:

    (a) The requirement that the board of trustees of a school library district entitled
    to participate in any appropriation or revenue of a school district or to have
    a tax proposed by the board of education of a school district file with the board
    of education of the school district a tax budget, and the requirement that the
    board of education adopt the tax budget on behalf of the library district, as
    provided in division (B)(1) of section 5705.28 of the Revised Code;

    (b) The requirement that the board of trustees of a public library desiring to
    participate in the distribution of the county public library fund certify to the
    taxing authority its estimate of contemplated revenue and expenditures, and the
    requirement that the taxing authority include in its budget of receipts and budget
    of expenditures the full amounts specified or requested by the board of trustees,
    as provided in division (D) of section 5705.28 of the Revised Code.

    (2) If a county budget commission waives the requirements described in division
    (B)(1)(a) or (b) of this section, the commission shall require the board of trustees
    of the school library district or the board of trustees of the public library
    desiring to participate in the distribution of the county public library fund
    to provide to the commission any information the commission may require from the
    board in order for the commission to perform its duties under this chapter.'
