- number: '5747.18'
  heading: Powers of tax commissioner
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5747'
    name: Income Tax
  text: 'The tax commissioner shall enforce and administer this chapter. In addition
    to any other powers conferred upon the commissioner by law, the commissioner may:

    (A) Prescribe all forms required to be filed pursuant to this chapter;

    (B) Adopt such rules as the commissioner finds necessary to carry out this chapter;

    (C) Appoint and employ such personnel as are necessary to carry out the duties
    imposed upon the commissioner by this chapter.

    Any information gained as the result of returns, investigations, hearings, or
    verifications required or authorized by this chapter is confidential, and no person
    shall disclose such information, except for official purposes, or as provided
    by section 3125.43, 4123.271, 4123.591, 4141.163, 4141.28, 4507.023, 5101.182,
    or 5703.21 of the Revised Code, or in accordance with a proper judicial order.
    The tax commissioner may furnish the internal revenue service with copies of returns
    or reports filed and may furnish the officer of a municipal corporation charged
    with the duty of enforcing a tax subject to Chapter 718. of the Revised Code with
    the names, addresses, and identification numbers of taxpayers who may be subject
    to such tax. A municipal corporation shall use this information for tax collection
    purposes only. This section does not prohibit the publication of statistics in
    a form which does not disclose information with respect to individual taxpayers.'
  history: null
