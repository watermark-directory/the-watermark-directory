    name: Taxable Property - Exemptions
  text: 'Real and personal property comprising a project undertaken, financed, operated,
    or maintained by an eligible county under section 307.695 of the Revised Code
    is exempt from taxation so long as the project remains owned by the eligible county.

    As used in this section, "eligible county" and "project" have the same meanings
