- number: '5705.34'
  heading: Certification of tax levy - revision of budget
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'When the budget commission has completed its work with respect to a tax budget
    or other information required to be provided under section 5705.281 of the Revised
    Code, it shall certify its action to the taxing authority, together with an estimate
    by the county auditor of the rate of each tax necessary to be levied by the taxing
    authority within its subdivision, taxing unit, or, in the case of a qualifying
    library levy, within the library district or association library district, and
    what part thereof is in excess of, and what part within, the ten-mill tax limitation.
    The certification shall also indicate the date on which each tax levied by the
    taxing authority will expire.

    If a taxing authority levies a tax for a fixed sum of money or to pay debt charges
    for the tax year for which the tax budget is prepared, and a payment on account
    of that tax is payable to the taxing authority for the tax year under section
    5709.92 or 5709.93 of the Revised Code, the county auditor, when estimating the
    rate at which the tax shall be levied in the current year, shall estimate the
    rate necessary to raise the required sum less the estimated amount of any such
    payments made for the tax year to a taxing unit for fixed-sum levies under those
    sections. The estimated rate shall be the rate of the levy that the budget commission
    certifies with its action under this section.

    Each taxing authority, by ordinance or resolution, shall authorize the necessary
    tax levies and certify them to the county auditor before the first day of October
    in each year, or at such later date as is approved by the tax commissioner, except
    that the certification by the legislative authority of the city of Cincinnati
    or by a board of education shall be made by the first day of April or at such
    later date as is approved by the commissioner, and except that a township board
    of park commissioners that is appointed by the board of township trustees and
    oversees a township park district that contains only unincorporated territory
    shall authorize only those taxes approved by, and only at the rate approved by,
    the board of township trustees as required by division (C) of section 511.27 of
    the Revised Code. If the levying of a tax to be placed on the duplicate of the
    current year is approved by electors under sections 5705.01 to 5705.47 of the
    Revised Code; if the rate of a school district tax is increased due to the repeal
    of a school district income tax and property tax rate reduction at an election
    held pursuant to section 5748.04 of the Revised Code; or if refunding bonds to
    refund all or a part of the principal of bonds payable from a tax levy for the
    ensuing fiscal year are issued or sold and in the process of delivery, the budget
    commission shall reconsider and revise its action on the budget of the subdivision
    or school library district for whose benefit the tax is to be levied after the
    returns of such election are fully canvassed, or after the issuance or sale of
    such refunding bonds is certified to it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-5705.34
- number: '5705.341'
  heading: Right of appeal
  title:
    num: '57'
    name: Taxation
  chapter:
    num: '5705'
    name: Tax Levy Law
  text: 'Any person required to pay taxes on real, public utility, or tangible personal
    property in any taxing district or other political subdivision of this state may
    appeal to the board of tax appeals from the action of the county budget commission
    of any county which relates to the fixing of uniform rates of taxation and the
    rate necessary to be levied by each taxing authority within a subdivision, taxing
    unit, library district, or association library district and which action has been
    certified by the county budget commission to the taxing authority of any political
    subdivision or other taxing district within the county.

    Such appeal shall be in writing and shall set forth the tax rate complained of
    and the reason that such a tax rate is not necessary to produce the revenue needed
    by the taxing district or political subdivision for the ensuing fiscal year as
    those needs are set out in the tax budget of said taxing unit or, if adoption
    of a tax budget was waived under section 5705.281 of the Revised Code, as set
    out in such other information the district or subdivision was required to provide
    under that section, or that the action of the budget commission appealed from
    does not otherwise comply with sections 5705.01 to 5705.47 of the Revised Code.
    The notice of appeal shall be filed with the board of tax appeals, and a true
    copy thereof shall be filed with the tax commissioner, the county auditor, and
    with the fiscal officer of each taxing district or political subdivision authorized
    to levy the tax complained of, and such notice of appeal and copies thereof must
    be filed within thirty days after the budget commission has certified its action
    as provided by section 5705.34 of the Revised Code. Such notice of appeal and
    the copies thereof may be filed either in person or by certified mail. If filed
    by certified mail, the date of the United States postmark placed on the sender''s
    receipt by the postal employee to whom the notice of appeal is presented shall
    be treated as the date of filing.

    Prior to filing the appeal provided by this section, the appellant shall deposit
    with the county auditor of the county or, in the event the appeal concerns joint
    taxing districts in two or more counties, with the county auditor of the county
    with the greatest valuation of taxable property the sum of five hundred dollars
    to cover the costs of the proceeding. The county auditor shall forthwith issue
    a pay-in order and pay such money into the county treasury to the credit of the
    general fund. The appellant shall produce the receipt of the county treasurer
    for such deposit and shall file such receipt with the notice of appeal.

    The board of tax appeals shall forthwith consider the matter presented on appeal
    from the action of the county budget commission and may modify any action of the
    commission with reference to the fixing of tax rates, to the end that no tax rate
    shall be levied above that necessary to produce the revenue needed by the taxing
    district or political subdivision for the ensuing fiscal year and to the end that
    the action of the budget commission appealed from shall otherwise be in conformity
    with sections 5705.01 to 5705.47 of the Revised Code. The findings of the board
    of tax appeals shall be substituted for the findings of the budget commission
    and shall be sent to the county auditor and the taxing authority of the taxing
    district or political subdivision affected as the action of such budget commission
    under sections 5705.01 to 5705.47 of the Revised Code and to the tax commissioner.
    At the request of an appellant, the findings of the board of tax appeals shall
    be sent by certified mail at the appellant''s expense.

    The board of tax appeals shall promptly prepare a cost bill listing the expenses
    incurred by the board in conducting any hearing on the appeal and certify the
    cost bill to the county auditor of the county receiving the deposit for costs,
    who shall forthwith draw a warrant on the general fund of the county in favor
    of the person or persons named in the bill of costs certified by the board of
    tax appeals.

    In the event the appellant prevails, the board of tax appeals promptly shall direct
    the county auditor to refund the deposit to the appellant and the costs shall
    be taxed to the taxing district or political subdivision involved in the appeal.
    The county auditor shall withhold from any funds then or thereafter in the auditor''s
    possession belonging to the taxing district or political subdivision named in
    the order of the board of tax appeals and shall reimburse the general fund of
    the county.

    If the appellant fails, the costs shall be deducted from the deposit provided
    for in this section and any balance which remains shall be refunded promptly to
    the appellant by warrant of the county auditor drawn on the general fund of the
    county.

    Nothing in this section or any section of the Revised Code shall permit or require
    the levying of any rate of taxation, whether within the ten-mill limitation or
    whether the levy has been approved by the electors of a taxing district, political
    subdivision, library district, or association library district, or by the charter
    of a municipal corporation in excess of such ten-mill limitation, unless such
    rate of taxation for the ensuing fiscal year is clearly required by a budget of
    the taxing district or political subdivision properly and lawfully adopted under
    this chapter, or by other information that must be provided under section 5705.281
    of the Revised Code if a tax budget was waived.

    In the event more than one appeal is filed involving the same taxing district
    or political subdivision, all such appeals may be consolidated by the board of
    tax appeals and heard at the same time.

    Nothing herein contained shall be construed to bar or prohibit the tax commissioner
    from initiating an investigation or hearing on the commissioner''s own motion.

    The tax commissioner shall adopt and issue such orders, rules, and instructions,
    not inconsistent with law, as the commissioner deems necessary, as to the exercise
    of the powers and the discharge of the duties of any particular county budget
    commission, county auditor, or other officer which relate to the budget, the assessment
    of property, or the levy and collection of taxes. The commissioner shall cause
    the orders and instructions issued by the commissioner to be obeyed.'
