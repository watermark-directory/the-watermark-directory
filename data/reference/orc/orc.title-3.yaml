- number: '345.01'
  heading: Soldiers' memorial tax levy - resolution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: '(A) As used in this chapter, "the county auditor''s market value" has the
    same meaning as in section 5705.01 of the Revised Code.

    (B) The taxing authority of any municipal corporation, township, or county, at
    any time not less than one hundred days prior to a general election in any year,
    by a vote of two-thirds of all members of the taxing authority, may, and upon
    presentation to the clerk or fiscal officer, as the case may be, of the taxing
    authority of a petition signed by not less than two per cent of the electors of
    the political subdivision, as shown at the preceding general election held in
    the subdivision, shall, declare by resolution that the amount of taxes which may
    be raised within the ten-mill limitation will be insufficient to provide an adequate
    amount for the necessary requirements of the subdivision, and that it is necessary
    to levy taxes in excess of the limitation for either or both of the following
    purposes:

    (1) For purchasing a site, and for erecting, equipping, and furnishing, or for
    establishing a memorial to commemorate the services of all members and veterans
    of the armed forces of the United States;

    (2) For the operation and maintenance of a memorial, and for the functions related
    to it.

    The resolution shall be confined to the purposes set forth in this section, and
    shall specify the amount of increase in rate which it is necessary to levy, expressed
    both in mills for each one dollar of taxable value and in dollars for each one
    hundred thousand dollars of the county auditor''s market value, the purpose of
    the rate increase, and the number of years during which the increase shall be
    in effect. The increase may include a levy upon the tax duplicate of the current
    year. The number of years shall be any number not exceeding ten. The question
    of an increase in tax rate under divisions (B)(1) and (2) of this section may
    be submitted to the electors on one ballot.

    The total tax for the purposes included in this section shall not, in any year,
    exceed one mill of each dollar of taxable value.

    The resolution shall go into immediate effect upon its passage, and no publication
    of the resolution, other than that provided for in the notice of election, shall
    be necessary.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.01
- number: '345.02'
  heading: Bond issue for soldiers' memorial
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: The taxing authority of any municipal corporation, township, or county may
    issue the bonds of such subdivision for the purpose of purchasing a site, and
    for erecting, equipping, and furnishing, or for establishing a memorial to commemorate
    the services of all members and veterans of the armed forces of the United States.
    Any such taxing authority may determine to submit to the electors of the subdivision
    the question of issuing such bonds make the declarations and statements required
    by section 133.18 of the Revised Code. The county auditor and taxing authority
    shall thereupon proceed as set forth in divisions (C) and (D) of such section.
    The election on the question of issuing such bonds shall be held under divisions
    (E), (F), and (G) of section 133.18 of the Revised Code. Such bond issue shall
    require the affirmative vote of sixty per cent of those electors voting upon the
    proposition.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.02
- number: '345.03'
  heading: Tax levy resolution certified to board of elections - notice of election
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'A copy of any resolution adopted under section 345.01 of the Revised Code
    shall be certified within five days by the taxing authority and not later than
    four p.m. of the ninetieth day before the day of the election, to the county board
    of elections, and such board shall submit the proposal to the electors of the
    subdivision at the succeeding general election. The board shall make the necessary
    arrangements for the submission of such question to the electors of the subdivision,
    and the election shall be conducted, canvassed, and certified in like manner as
    regular elections in such subdivision.

    Notice of the election shall be published once not less than two weeks prior to
    such election using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation within
    the county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.

    The notice shall set out the purpose of the proposed increase in rate, the levy''s
    estimated annual collections, the amount of the increase expressed in dollars
    for each one hundred thousand dollars of the county auditor''s market value as
    well as in mills for each one dollar of taxable value, the number of years during
    which such increase will be in effect, and the time and place of holding such
    election.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.03
- number: '345.04'
  heading: Form of ballot for tax levy
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'The form of the ballot cast at a general election, as provided by sections
    345.01 to 345.03 of the Revised Code, shall be: "An additional tax for the benefit
    of (name of subdivision) for the purpose of (state purpose stated in the resolution),
    that the county auditor estimates will collect $_____ annually, at a rate not
    exceeding _____ mills for each $1 of taxable value, which amounts to $_____ for
    each $100,000 of the county auditor''s market value, for (the number of years
    the levy is to run).


    For the Tax LevyAgainst the Tax Levy "

    If the tax is to be placed on the current tax list, the form of the ballot shall
    be modified by adding, after the statement of the number of years the levy is
    to run, the phrase ", commencing in __________ (first year the tax is to be levied),
    first due in calendar year __________ (first calendar year in which the tax shall
    be due)."

    The question covered by the resolution shall be submitted to the electors as a
    separate proposition, but it may be printed on the same ballot with any other
    proposition submitted at the same election other than the election of officers.
    More than one such question may be submitted at the same election.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.04
- number: '345.05'
  heading: Majority vote required for approval of tax levy
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: If a majority of the electors voting on the tax levy provided for in section
    345.01 of the Revised Code, vote in favor thereof, the taxing authority of a political
    subdivision, as provided by such section, may levy a tax within such subdivision,
    at the additional rate outside of the ten-mill limitation, during the period and
    for the purpose stated in the resolution, or at any lesser rate, or for any of
    such years or purposes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.05
- number: '345.06'
  heading: Appointment of board of trustees prior to vote of electors
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'Prior to the vote of the electors authorizing bonds, or an additional tax
    levy as provided for in sections 345.02 to 345.05, inclusive, of the Revised Code,
    the taxing authority of the township or county or the mayor of the municipal corporation
    may, regardless of whether funds are presently available to complete the project,
    appoint a board of trustees, as provided by section 345.08 of the Revised Code,
    to determine and recommend to the taxing authority of the appointing subdivision
    the nature, extent, and estimated cost of an appropriate war memorial.

    Such board shall formulate specific plans for the erection of such war memorial,
    or alternate plans, and obtain estimates of the cost of the completed project
    and all other information and data reasonably necessary to advise the residents
    of the appropriate subdivision as to the proposals of the board, either as an
    incident to an election for the voting of a tax levy or authorizing a bond issue,
    or both, for the purpose of erecting such memorial, or for the information of
    the appropriating authority in the event that the funds are available without
    a bond issue or additional tax levy.

    Such board may call upon county engineers, city engineers, and other agencies
    of the appropriate subdivision to assist such board in preparing its proposals
    for such war memorial.

    The taxing authority of the township, county, or municipal corporation may appropriate
    such amounts as are reasonably necessary to defray the preliminary expenses of
    such board incurred in hiring architects, engineers, and other persons or organizations
    to assist in preparing plans and estimates of the cost of a war memorial.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.06
- number: '345.07'
  heading: Certification of tax levy voted outside ten-mill limitation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: A tax levy voted outside the ten-mill limitation under sections 345.03 to
    345.05 of the Revised Code, shall be certified to the taxing authority of the
    political subdivision in the first year of such levy. The levy shall be extended
    on the tax lists after the February settlement succeeding such election. If such
    additional tax is to be placed on the tax list of the current year, as specified
    in the resolution providing for the submission thereof, the result of the election
    shall be certified, immediately after the canvass by the board of elections, to
    the taxing authority, which shall forthwith make the necessary levy and certify
    it to the county auditor, who shall extend it on the tax list for collection.
    Such levy shall, in all years after the first year, be included in the annual
    tax budget that is certified to the county budget commission.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.07
- number: '345.08'
  heading: Board of trustees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: Within five days after the certification to the taxing authority of the result
    of an election held under sections 345.02 to 345.05 of the Revised Code, provided
    a majority of the votes cast on the proposal submitted are in favor of such proposal,
    or within five days after adoption by the taxing authority of an ordinance or
    resolution to authorize the issuance of any such bonds without a vote of the electors,
    the taxing authority of the township or county, or the mayor of the municipal
    corporation shall appoint a board of trustees, consisting of at least five but
    not more than eleven members, which shall, at all times, be so constituted that
    at least a majority of its members are honorably discharged veterans of the armed
    forces of the United States. A majority of such trustees shall be appointed for
    three years and the remaining trustees shall be appointed for five years, and
    thereafter, on the expiration of the original term, appointments shall be made
    for terms of five years. Appointments to fill vacancies shall be for the unexpired
    term.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.08
- number: '345.09'
  heading: Meetings of board of trustees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'The appointing authority of the board of trustees provided by section 345.08
    of the Revised Code, in making the appointments, shall fix a time and place for
    the first meeting of the board and shall give the trustees notice of such meeting.
    The time of such first meeting shall be not more than fifteen days after the date
    of their appointment. The board shall meet at the time and place appointed, and
    shall organize by the selection of a president, a vice-president, and a secretary,
    who need not be a member of the board, but who shall be a veteran, or the surviving
    spouse or parent of a deceased veteran who served in the armed forces of the United
    States in time of war. The compensation of such secretary shall be fixed by the
    board.

    The trustees shall serve without compensation, but shall be allowed traveling
    and other expenses, which, with the compensation of the secretary and other necessary
    expenses of the board, shall be paid from the fund provided by section 345.11
    of the Revised Code, on the order of the president and secretary, after being
    allowed and approved by the board at an authorized meeting.

    Vacancies in the office of trustee shall be filled in the manner provided by section
    345.08 of the Revised Code. The board shall hold regular meetings at such time
    and place as it agrees upon, and special meetings shall be held under such regulations
    as it prescribes. The board shall keep a full record of its proceedings.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.09
- number: '345.10'
  heading: Bond of trustees - employment of superintendents and architects
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'Before making any expenditures from the memorial fund, the trustees appointed
    under section 345.08 of the Revised Code shall give bond to the state in such
    sum as the appointing authority fixes, and to the approval of such authority.
    Premium payments for such bond shall be an authorized expenditure by the board
    of trustees.

    The board may appoint and employ such superintendents, architects, clerks, laborers,
    and other employees as are necessary, and fix their compensation. Whenever qualified
    veterans are available such appointees shall be veterans of the armed forces of
    the United States. Any such person may be removed at any time by a majority of
    the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.10
- number: '345.11'
  heading: The memorial fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: The fund arising from a tax levy, or the proceeds from the sale of bonds authorized
    to be issued under sections 345.01 to 345.17, inclusive, of the Revised Code,
    shall be placed in the treasury of the subdivision to the credit of a fund to
    be known as "The Memorial Fund." Such fund shall be paid out on the order of the
    board of trustees, certified by the president and secretary of such board.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.11
- number: '345.12'
  heading: Establishment of memorial - acquisition of site - donations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: The board of trustees may provide for the establishment, arrangement, plans,
    and design of the soldiers' memorial provided by section 345.01 of the Revised
    Code; it may provide for the maintenance of such memorial; it may make such contracts,
    and such purchases of supplies and materials as are necessary. The board may acquire
    by purchase, condemnation, or otherwise, any necessary site for such memorial.
    Before acquiring any site or making any contract for construction of a memorial,
    the board shall secure the approval of such site and the design of the memorial
    from the taxing authority of the appointing subdivision. If it is necessary to
    condemn property for such purpose, the site fixed by the board shall be appropriated
    as provided for the appropriation of lands by the subdivision by which said board
    was appointed, and all purchases and contracts shall be made pursuant to the applicable
    laws of such subdivision. The board may accept donations of personal or real property
    or money, and all donations of money by gift, bequest, or otherwise shall be placed
    to the credit of the memorial fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-345.12
- number: '345.13'
  heading: Purpose of soldiers' memorial
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'A soldiers'' memorial, provided for by section 345.01 of the Revised Code,
    shall be maintained so as to commemorate the services of all members and veterans
    of the armed forces of the United States. The board of trustees shall make rules
    and regulations for the use, administration, and maintenance of such memorial
    as is fitting and necessary to carry out the purposes thereof. The board of trustees
    may make rules and regulations for entertainment, retail, educational, sporting,
    social, cultural, or arts opportunities at the memorial.

    When such memorial is a building, it shall provide suitable apartments of sufficient
    dimensions to commemorate the soldiers, sailors, marines, and all members of the
    armed forces of the United States, so designated by congress, who have lost their
    lives while in the service of the country. Suitable tablets shall be maintained
    with the names of such soldiers, sailors, and marines inscribed thereon. The building
    may include a public auditorium, music hall, and recreational facilities.

    The board may establish rental fees and other charges for the use of the memorial,
    and it may waive any portion of such charges.

    With the approval of the board of county commissioners, the board of trustees
    may enter into contracts with political subdivisions or nonprofit organizations
    for the use of other facilities separate and apart from the memorial, and to provide
    other services. Such use shall adhere to the rules and regulations established
    by the board of trustees to carry out the purposes of the memorial.'
