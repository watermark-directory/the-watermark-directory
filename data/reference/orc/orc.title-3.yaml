    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: No person shall locate, erect, construct, reconstruct, enlarge, or structurally
    alter any building or structure within the territory included in a zoning resolution
    without obtaining a zoning certificate, if required under section 303.16 of the
    Revised Code, and no such zoning certificate shall be issued unless the plans
    for the proposed building or structure fully comply with the zoning regulations
    then in effect.
