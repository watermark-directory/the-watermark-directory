- number: '307.80'
  heading: Establishing county microfilming board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The board of county commissioners of any county may, by resolution, establish
    a county microfilming board. The county microfilming board shall consist of the
    county treasurer or the treasurer''s representative, the county auditor or the
    auditor''s representative, the clerk of the court of common pleas or the clerk''s
    representative, a member or representative of the board of county commissioners
    chosen by the board of county commissioners, and the county recorder or the recorder''s
    representative who shall serve as secretary.

    After the initial meeting of the county microfilming board, no county office shall
    purchase, lease, operate, or contract for the use of any microfilming or other
    image processing equipment, software, or services without prior approval of the
    board.

    As used in sections 307.80 to 307.806 of the Revised Code, "county office" means
    any officer, department, board, commission, agency, court, or other office of
    the county and the court of common pleas. The county hospital shall not be considered
    a "county office" when the county hospital uses microfilming to record and store
    for future access physical and psychiatric examinations or treatment records of
    its patients. The county hospital shall participate, at the request of the county
    microfilming board, in purchasing film and equipment and in entering into contracts
    for services for microfilming.'
