- number: '317.09'
  heading: Recording and filing notices of federal tax liens - certificate of discharge
    or release - fee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A)(1) Notices of liens for internal revenue taxes, of liens arising under
    section 107 of the "Comprehensive Environmental Response, Compensation, and Liability
    Act of 1980," 94 Stat. 2781, 42 U.S.C.A. 9607, as amended, and of any other lien
    in favor of the United States, as provided in the statutes of the United States
    or in any regulation adopted under those statutes, certificates discharging the
    liens, and certificates of release of the liens shall be filed for record, by
    mail or otherwise, in the office of the county recorder of the county in which
    the property subject to the lien is situated. If a duplicate copy of a notice
    of a lien or a certificate of discharge or release of a lien is provided, the
    county recorder shall endorse on the copy the date and hour that the notice or
    certificate was received for filing and recording and shall return the copy, by
    mail or otherwise, to the district director of the internal revenue service of
    the Ohio district from which the notice or certificate originated, the regional
    administrator of the region of the United States environmental protection agency
    from which the notice or certificate originated, or the other official of the
    United States who originated the notice or certificate, whichever is applicable.

    (2) When a notice of a lien in favor of the United States is filed, the county
    recorder shall record the lien in the official records provided for in section
    317.08 of the Revised Code and shall index the lien in the indexes provided for
    under section 317.18 of the Revised Code. The county recorder shall file and keep
    all original notices of liens in numerical order. When a certificate of discharge
    or release of any lien in favor of the United States is issued by the proper official
    of the United States or the official''s delegate and is filed for record in the
    office of the county recorder in which the original notice of the lien is filed,
    the county recorder shall record the certificate in the official records provided
    for in section 317.08 of the Revised Code and shall index the certificate of discharge
    or release in the indexes provided for in section 317.18 of the Revised Code.

    (B) A county recorder may use any nonpaper electronic or magnetic medium specified
    in section 9.01 of the Revised Code to record the notices of liens and the certificates
    of discharge or release of liens covered by this section. If the county recorder
    wishes to dispose of paper versions of the notices and certificates covered by
    this section because they are no longer needed in that format, the county recorder
    shall request the county records commission to revise the county''s schedule of
    records retention and disposal in accordance with section 149.38 of the Revised
    Code to provide for the disposal of those paper records.

    (C) The county recorder shall receive a fee of five dollars for filing and indexing
    each notice of a lien filed pursuant to this section and shall receive a fee of
    three dollars for filing and indexing a certificate of discharge or release of
    the lien. The fees provided for in this division shall be collected at the time
    that the notice or certificate is presented in the office of the county recorder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.09
- number: '317.10'
  heading: County recorder shall record certified copy of matter in bankruptcy - fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: The county recorder shall record any certified copy of any matter in reference
    to bankruptcy, which any act of congress provides for, as being necessary to be
    filed in the county wherein lands of the bankrupt are situated, in order to be
    notice of such bankruptcy. Such a certified copy shall be recorded in the official
    records and indexed in the same manner as deeds, in the name of the bankrupt as
    grantor, and in the name of the trustee in bankruptcy, or receiver, as grantee.
    The county recorder shall be paid the same fees for recording such a certified
    copy as is provided in section 317.32 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.10
- number: '317.11'
  heading: Names printed or typed on instruments before recording when signatures
    illegible
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: 'No instrument by which the title to real estate or personal property or any
    interest therein or lien thereon, is conveyed, created, encumbered, assigned,
    discharged, canceled or otherwise disposed of, shall be received for record or
    filing by the county recorder, if the signatures of the persons signing such instrument
    are illegibly written, unless the name of each person who in any capacity signed
    such instrument, and whose written signature is illegible, is legibly printed,
    typewritten, or stamped upon such instrument immediately beneath the signature
    of such person. The recorder shall receive any such instrument for record or filing,
    although it does not comply with this paragraph, if the name of each such person
    appears elsewhere in the instrument legibly printed, typewritten, or stamped,
    or if there is written on or attached to the instrument, for record, an affidavit
    of some person having personal knowledge of the facts, which affidavit states
    the correct name of the person whose signature was illegibly written and whose
    name was not printed, typewritten, or stamped thereon.

    Whenever, in this section it is required that the name of a person be printed,
    typewritten, or stamped upon such instrument immediately beneath the signature
    of such person, such signature shall be written upon the instrument directly preceding
    or above the printed, typewritten, or stamped name. Such printed, typewritten,
    or stamped name shall not be superimposed upon the signature so as to render either
    illegible. Any such instrument shall be entitled to be received for record or
    filing if the printed, typewritten, or stamped name and signature are deemed by
    the recorder to be so placed upon such instrument as to render the connection
    between the two apparent. Any instrument received and recorded or filed by a recorder
    is conclusively presumed to comply with the requirements of this section, which
    shall be in addition to the requirements imposed by any other law relating to
    the recording of instruments.

    This section does not apply to any instrument executed prior to October 11, 1945,
    nor to the following: Any decree, order, judgment, or writ of any court; any will,
    or death certificate; any instrument executed or acknowledged outside this state.
    This section does not apply to any instrument upon which the signature itself
    is printed, typewritten, or stamped.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.11
- number: '317.111'
  heading: Name of preparer to appear on instrument
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: 'No instrument by which the title to real estate or personal property, or
    any interest therein or lien thereon, is conveyed, created, encumbered, assigned,
    or otherwise disposed of, shall be received for record or filing by the county
    recorder unless the name of the person who, and governmental agency, if any, that
    prepared the instrument appears upon the instrument, and the name is either printed,
    typewritten, stamped, or signed in a legible manner. An instrument is in compliance
    with this section if it contains a statement in the following form: "This instrument
    was prepared by (name)."

    This section does not apply to any instrument executed prior to October 5, 1955,
    nor to the following: any decree, order, judgment, or writ of any court; any will
    or death certificate; any instrument executed or acknowledged outside of this
    state.'
  history: null
