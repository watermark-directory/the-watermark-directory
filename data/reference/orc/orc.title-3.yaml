- number: '341.23'
  heading: Confinement of county or municipal prisoners in county jail
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) The board of county commissioners of any county or the legislative authority
    of any municipal corporation in which there is no workhouse may agree with the
    legislative authority of any municipal corporation or other authority having control
    of the workhouse of any other city, or with the directors of any district of a
    joint city and county workhouse or county workhouse, upon terms on which persons
    convicted of a misdemeanor by any court or magistrate of a county or municipal
    corporation having no workhouse, may be received into that workhouse, under sentence
    of the court or magistrate. The board or legislative authority may pay the expenses
    incurred under the agreement out of the general fund of that county or municipal
    corporation, upon the certificate of the proper officer of the workhouse.

    (B) The sheriff or other officer transporting any person to the workhouse described
    in division (A) of this section shall receive six cents per mile for the sheriff
    or officer, going and returning, five cents per mile for transporting the convict,
    and five cents per mile, going and coming, for the service of each deputy, to
    be allowed as in cases in which a person is transported to a state correctional
    institution. The number of miles shall be computed by the usual routes of travel
    and, in state cases, shall be paid out of the general fund of the county, on the
    allowance of the board, and for the violation of the ordinances of any municipal
    corporation, shall be paid by that municipal corporation on the order of its legislative
    authority.

    (C) Pursuant to section 2929.37 of the Revised Code, the board of county commissioners,
    the directors of the district of a joint city and county workhouse or county workhouse,
    or the legislative authority of the municipal corporation may require a person
    who was convicted of an offense and who is confined in a workhouse as provided
    in division (A) of this section, to reimburse the county, district, or municipal
    corporation, as the case may be, for its expenses incurred by reason of the person''s
    confinement.

    (D) Notwithstanding any contrary provision in this section or section 2929.18,
    2929.28, or 2929.37 of the Revised Code, the appropriate board of county commissioners
    and legislative authorities may include in their agreement entered into under
    division (A) of this section a policy that complies with section 2929.38 of the
    Revised Code and that requires any person who is not indigent and who is confined
    in the county, city, district, or joint city and county workhouse under this section
    to pay a reception fee, a fee for any medical treatment or service requested by
    and provided to that person, or the fee for a random drug test assessed under
    division (E) of section 341.26 of the Revised Code.

    (E) If a person who has been convicted of or pleaded guilty to an offense is incarcerated
    in the workhouse as provided in division (A) of this section, at the time of reception
    and at other times the person in charge of the operation of the workhouse determines
    to be appropriate, the person in charge of the operation of the workhouse may
    cause the convicted offender to be examined and tested for tuberculosis, HIV infection,
    hepatitis, including but not limited to hepatitis A, B, and C, and other contagious
    diseases. The person in charge of the operation of the workhouse may cause a convicted
    offender in the workhouse who refuses to be tested or treated for tuberculosis,
    HIV infection, hepatitis, including but not limited to hepatitis A, B, and C,
    or another contagious disease to be tested and treated involuntarily.'
