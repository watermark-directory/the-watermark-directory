  chapter:
    num: '341'
    name: Jails
  text: In addition to its other powers, the board of county commissioners of any
    county may construct, maintain, equip, furnish, appoint the necessary personnel
    of, and supervise the operation of county rehabilitation work camps for the purpose
    of the rehabilitation of persons who have been sentenced to imprisonment for a
    misdemeanor.
  history: null
