- number: '353.07'
  heading: Transfer of property for benefit of wetlands, wildlife, or sporting activities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: The director of natural resources may transfer real property owned by the
    state to a lake facilities authority for the purpose of promoting wetland banking,
    wildlife, or sporting activities. The division of wildlife within the department
    of natural resources may enter into an agreement with a lake facilities authority
    to establish wetland or natural areas to benefit wildlife or sporting activities.
    The agreement may be entered as part of, or in conjunction with, a mitigation
    banking program.
