- number: '302.08'
  heading: Electing of county commissioners at large in alternative form
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: '(A) Under all alternative forms of county government whereby the entire board
    of county commissioners is elected at large there shall be a board of county commissioners
    who shall have the qualifications and shall be nominated and elected as provided
    by general law, except as otherwise provided for in this section.

    (B) The board shall consist of such number of members as shall be determined by
    inclusion of one of the following optional provisions in the alternative form
    adopted pursuant to section 302.03 of the Revised Code:

    Option A. Three members.

    Option B. Five members.

    Option C. Seven members.

    Option D. Nine members.

    If the electors of a county approve a proposition to adopt an alternative form
    of county government under section 302.06 of the Revised Code, and thereby adopt
    a different size of the board of county commissioners, the change in membership
    shall be effected as follows:

    (1) Whenever the number of members of the board is increased, there shall be elected
    at the regular state election next following the adoptions of such provision,
    a sufficient number of county commissioners to bring the total membership of the
    board up to the number fixed. County commissioners shall serve a term of four
    years, except the candidates first elected under the provisions of this section.

    (2) Whenever the number of members of the board is decreased, the optional provision
    adopted under division (B) of this section shall be effective as to half the number
    by which the size of the board is decreased on the first Monday in January following
    the next regular state election and as to the other half on the first Monday in
    January two years later.

    (C) The term of office of county commissioners shall be for four years, except
    as provided in division (C) of this section. If the alternative form as adopted
    provides for no change in size of the board of county commissioners, county commissioners
    shall continue to be elected for four-year terms.

    If the alternative form as adopted provides for an increased membership on the
    board of county commissioners as provided by one of the optional provisions B,
    C, or D of division (B) of this section, the additional members shall be elected
    to the board at the first regular state election subsequent to the adoption of
    the alternative form.

    If the first election under an alternative form of county government provided
    for in sections 302.01 to 302.24, inclusive, of the Revised Code, occurs in a
    year in which one county commissioner is to be elected under section 305.01 of
    the Revised Code, and the alternative form as adopted provides for an expansion
    of the board to five, seven, or nine commissioners, the required number of vacancies
    shall be filled as follows:

    (1) If the new board is to be a five-man board, three commissioners shall be elected
    for four-year terms.

    (2) If the new board is to be a seven-man board, five commissioners shall be elected,
    four commissioners for four-year terms and one commissioner for a two-year term;
    the four candidates receiving the most votes being awarded the four-year terms
    and the fifth candidate in terms of votes received being assigned the two-year
    term.

    (3) If the new board is to be a nine-man board seven commissioners shall be elected,
    five commissioners for four-year terms and two commissioners for two-year terms;
    the five candidates receiving the most votes being awarded the four-year terms
    and the two-year terms being assigned to the next two candidates in terms of votes
    received. If the first election under an alternative form of county government
    provided for in sections 302.01 to 302.24, inclusive, of the Revised Code, occurs
    in a year in which two county commissioners are to be elected under section 305.01
    of the Revised Code, and the alternative form as adopted provides for an expansion
    of the board to five, seven, or nine commissioners, the required number of vacancies
    shall be filled as follows:

    (a) If the new board is to be a five-man board, four commissioners shall be elected,
    three commissioners for four-year terms and one commissioner for a two-year term;
    the three candidates receiving the most votes being awarded the four-year terms
    and the fourth candidate in terms of votes received being assigned the two-year
    term.

    (b) If the new board is to be a seven-man board, six commissioners shall be elected,
    four commissioners for four-year terms and two commissioners for two-year terms;
    the four candidates receiving the most votes being awarded the four-year terms
    and the two-year terms being assigned to the next two candidates in terms of votes
    received.

    (c) If the new board is to be a nine-man board, eight commissioners shall be elected,
    five commissioners for four-year terms and three commissioners for two-year terms;
    the five candidates receiving the most votes being awarded the four-year terms
    and the two-year terms being assigned to the next three candidates in terms of
    votes received.

    At all succeeding elections, after the first regular state election subsequent
    to adoption of an alternative form, all members of the board of county commissioners
    shall continue to be elected for four-year terms.'
