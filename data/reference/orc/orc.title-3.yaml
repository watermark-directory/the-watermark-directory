- number: '305.14'
  heading: Employment of legal counsel
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) The court of common pleas, upon the application of the prosecuting attorney
    and the board of county commissioners, may authorize the board to employ legal
    counsel to assist the prosecuting attorney, the board, or any other county officer
    in any matter of public business coming before such board or officer, and in the
    prosecution or defense of any action or proceeding in which such board or officer
    is a party or has an interest, in its official capacity.

    (B) The board of county commissioners may also employ legal counsel, as provided
    in section 309.09 of the Revised Code, to represent it in any matter of public
    business coming before such board, and in the prosecution or defense of any action
    or proceeding in which such board is a party or has an interest, in its official
    capacity.

    (C) Notwithstanding division (A) of this section and except as provided in division
    (D) of this section, a county board of developmental disabilities or a public
    children services agency may, without the authorization of the court of common
    pleas, employ legal counsel to advise it or to represent it or any of its members
    or employees in any matter of public business coming before the board or agency
    or in the prosecution or defense of any action or proceeding in which the board
    or agency in its official capacity, or a board or agency member or employee in
    the member''s or employee''s official capacity, is a party or has an interest.

    (D)(1) In any legal proceeding in which the prosecuting attorney is fully able
    to perform the prosecuting attorney''s statutory duty to represent the county
    board of developmental disabilities or public children services agency without
    conflict of interest, the board or agency shall employ other counsel only with
    the written consent of the prosecuting attorney. In any legal proceeding in which
    the prosecuting attorney is unable, for any reason, to represent the board or
    agency, the prosecuting attorney shall so notify the board or agency, and, except
    as provided in division (D)(2) of this section, the board or agency may then employ
    counsel for the proceeding without further permission from any authority.

    (2) A public children services agency that receives money from the county general
    revenue fund must obtain the permission of the board of county commissioners of
    the county served by the agency before employing counsel under division (C) of
    this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.14
- number: '305.15'
  heading: Employment of engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: When the services of an engineer are required with respect to roads, turnpikes,
    ditches, bridges, or any other matter, and when, on account of the amount of work
    to be performed, the board of county commissioners deems it necessary, upon the
    written request of the county engineer, the board may employ a registered professional
    engineer and as many assistant engineers, rodmen, and inspectors as are needed,
    and may also enter into contracts with any person, firm, partnership, association,
    or corporation qualified to perform engineering services in the state for this
    purpose and fix the compensation therefor. In awarding such contracts the board
    shall not be required to comply with sections 153.40 and 5555.61 of the Revised
    Code. If no such contract is entered into, the board shall furnish suitable offices,
    necessary books, stationery, instruments, and implements for the proper performance
    of the duties imposed on the engineer, assistant engineers, rodmen, and inspectors
    by such board.
  history: null
