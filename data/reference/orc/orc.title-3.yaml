- number: '319.39'
  heading: Record of additions and deductions - certificate of correction
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor shall keep books or other records of "additions and deductions,"
    in which he shall enter all corrections of the general duplicates and of the classified
    duplicate respectively, made after delivery of such duplicates to the county treasurer,
    which either increase or diminish the amount of a tax or assessment, as stated
    in such duplicates. In addition to the marginal corrections provided for in section
    319.35 of the Revised Code, he shall in each case give the treasurer a certificate
    of the correction.
