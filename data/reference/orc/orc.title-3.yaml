- number: '340.07'
  heading: Appropriating money in accordance with board of alcohol, drug addiction,
    and mental health services budget
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: The board of county commissioners of any county participating in an alcohol,
    drug addiction, and mental health service district or joint-county district, upon
    receipt from the board of alcohol, drug addiction, and mental health services
    of a resolution so requesting, may appropriate money to such board for the operation,
    lease, acquisition, construction, renovation, and maintenance of community addiction
    services providers, community mental health services providers, and facilities
    in accordance with the budget required by section 340.08 of the Revised Code and
    approved by the department of behavioral health pursuant to section 5119.22 of
    the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-340.07
- number: '340.08'
  heading: Duties of boards of alcohol, drug addiction, and mental health services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: 'In accordance with rules or guidelines issued by the director of behavioral
    health, each board of alcohol, drug addiction, and mental health services shall
    do all of the following:

    (A) Submit to the department of behavioral health a proposed budget of receipts
    and expenditures for all federal, state, and local moneys the board expects to
    receive.

    (1) The proposed budget shall identify funds the board has available for included
    opioid and co-occurring drug addiction services and recovery supports.

    (2) The proposed budget shall identify funds the board and public children services
    agencies in the board''s service district have available to fund jointly the services
    described in section 340.15 of the Revised Code.

    (3) The board''s proposed budget for expenditures of state and federal funds distributed
    to the board by the department shall be deemed an application for funds, and the
    director shall approve or disapprove the budget for these expenditures in whole
    or in part in accordance with division (H) of section 5119.22 of the Revised Code.

    If a board determines that it is necessary to amend an approved budget, the board
    shall submit a proposed amendment to the director. The director shall approve
    or disapprove all or part of the amendment in accordance with division (I) of
    section 5119.22 of the Revised Code.

    (B) Submit to the department a proposed list of addiction services, mental health
    services, and recovery supports the board intends to make available. The board
    shall include the services and supports required by section 340.032 of the Revised
    Code to be included in the community-based continuum of care and the services
    required by section 340.15 of the Revised Code. The board shall explain the manner
    in which the board intends to make such services and supports available. The list
    shall be compatible with the budget submitted pursuant to division (A) of this
    section. The director shall approve or disapprove the list in whole or in part
    in accordance with division (H) of section 5119.22 of the Revised Code.

    If a board determines that it is necessary to amend an approved list, the board
    shall submit a proposed amendment to the director. The director shall approve
    or disapprove all or part of the amendment in accordance with division (I) of
    section 5119.22 of the Revised Code.

    (C) Enter into a continuity of care agreement with the state institution operated
    by the department of behavioral health and designated as the institution serving
    the district encompassing the board''s service district. The continuity of care
    agreement shall outline the department''s and the board''s responsibilities to
    plan for and coordinate with each other to address the needs of board residents
    who are patients in the institution, with an emphasis on managing appropriate
    hospital bed day use and discharge planning. The continuity of care agreement
    shall not require the board to provide addiction services, mental health services,
    or recovery supports other than those on the list of services and supports submitted
    by the board pursuant to division (B) of this section and approved by the director
    in accordance with division (H) of section 5119.22 of the Revised Code.

    (D) In conjunction with the department, operate a coordinated system for tracking
    and monitoring persons found not guilty by reason of insanity and committed pursuant
    to section 2945.40 of the Revised Code who have been granted a conditional release
    and persons found incompetent to stand trial and committed pursuant to section
    2945.39 of the Revised Code who have been granted a conditional release. The system
    shall do all of the following:

    (1) Centralize responsibility for the tracking of those persons;

    (2) Provide for uniformity in monitoring those persons;

    (3) Provide a mechanism to allow prompt rehospitalization, reinstitutionalization,
    or detention when a violation of the conditional release or decompensation occurs.

    (E) To ensure the safety of persons seeking or receiving addiction services, mental
    health services, or recovery supports, submit to the department a report summarizing
    all of the following:

    (1) Complaints and grievances received by the board concerning the rights of persons
    seeking or receiving addiction services, mental health services, or recovery supports;

    (2) Investigations of the complaints and grievances;

    (3) Outcomes of the investigations.

    (F) Provide to the department information to be submitted to the community behavioral
    health information system or systems established by the department under Chapter
    5119. of the Revised Code.

    (G) Annually, and upon any change in membership, submit to the department a list
    of all current members of the board of alcohol, drug addiction, and mental health
    services, including the appointing authority for each member, and the member''s
    specific qualification for appointment pursuant to section 340.02 or 340.021 of
    the Revised Code, if applicable.

    (H) Submit to the department other information as is reasonably required for purposes
    of the department''s operations, service evaluation, reporting activities, research,
    system administration, and oversight.

    (I) Annually update and publish on the board''s web site a list of all opioid
    treatment programs licensed under section 5119.37 of the Revised Code that are
    operating within the board''s district, based on information obtained from any
    of the following:

    (1) The federal substance abuse and mental health services administration''s opioid
    treatment program directory;

    (2) A resource directory created by the department of behavioral health;

    (3) The list maintained by the department of behavioral health pursuant to division
    (P) of section 5119.37 of the Revised Code.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
