- number: '349.02'
  heading: Orderly development of new communities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '349'
    name: New Community Organization
  text: This chapter is enacted for the purposes of encouraging the orderly development
    of well-planned, diversified, and economically sound new communities and of encouraging
    the initiative and participation of private enterprise in such undertakings; and
    encouraging cooperation between the developer and the community authority to carry
    out a new community development program.
