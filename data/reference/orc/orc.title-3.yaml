  heading: Bequests for educational purposes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners may receive bequests, donations, and gifts
    of real and personal property and money to promote and advance the cause of education
    in the county. All property and money so received by the board, or which has been
    bequeathed and bestowed upon such board and remains undisposed of, may be paid
    to any incorporated institution of learning in the county, or a part may be used
