- number: '323.157'
  heading: Employees - adoption of rules
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: Each county treasurer and county auditor shall employ the assistants, clerks,
    and other employees necessary to carry out the duties imposed by sections 323.151
    to 323.159 of the Revised Code. The tax commissioner shall promulgate rules necessary
    to facilitate the reduction of taxes on homesteads, reimbursement by the state,
    the determination of "total income," and the administration of sections 323.151
    to 323.159 of the Revised Code.
