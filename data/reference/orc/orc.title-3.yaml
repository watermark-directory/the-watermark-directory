    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: 'The array of addiction services and recovery supports for all levels of opioid
    and co-occurring drug addiction required by section 340.032 of the Revised Code
    to be included in a community-based continuum of care established under that section
    shall include at least ambulatory and sub-acute detoxification, non-intensive
    and intensive outpatient services, medication-assisted treatment, peer support,
    residential services, recovery housing residences pursuant to section 340.034
    of the Revised Code, and multiple paths to recovery such as twelve-step approaches.
    The services and supports shall be made available in the service district of each
    board of alcohol, drug addiction, and mental health services, except as provided
    by either of the following:

    (A) Sub-acute detoxification and residential services may be made available through
    a contract with one or more providers of sub-acute detoxification or residential
    services located in other service districts.

    (B) To the extent authorized by a time-limited waiver issued under section 5119.221
    of the Revised Code, ambulatory detoxification and medication-assisted treatment
    may be made available through a contract with one or more community addiction
    services providers located not more than thirty miles beyond the borders of the
    board''s service district.

    The services and supports shall be made available in a manner that ensures that
    recipients are able to access the services and supports they need for opioid and
    co-occurring drug addiction in an integrated manner and in accordance with their
    assessed needs when changing or obtaining additional addiction services or recovery
    supports for such addiction. An individual seeking a service or support for opioid
    and co-occurring drug addiction included in a community-based continuum of care
    shall not be denied the service or support on the basis of the individual''s prior
    experience with the service or support.'
  history: null
