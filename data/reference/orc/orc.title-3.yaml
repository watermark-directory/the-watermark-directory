- number: '311.25'
  heading: County sheriffs' standard car-marking and uniform commission
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: A commission is hereby established to be known as the county sheriffs' standard
    car-marking and uniform commission. It shall consist of three members, not more
    than two of whom shall be members of the same political party. To be eligible
    for appointment a person shall be an elected and acting county sheriff. Each member
    shall be appointed by the governor, with the advice and consent of the senate,
    and shall serve at the pleasure of the governor.
  history: null
