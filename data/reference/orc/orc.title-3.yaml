- number: '311.20'
  heading: Allowance for prisoners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: 'On or before the twenty-first day of June of each year, the sheriff shall
    prepare and submit to the board of county commissioners a budget estimating the
    cost of operating the jail and feeding its inmates for the ensuing fiscal year.

    On the fifth day of each month the sheriff shall render to the board an itemized
    and accurate account, with all bills attached, showing the actual cost of keeping
    and feeding prisoners and other persons placed in his charge and the number of
    meals served to each such prisoner or other person during the preceding month.
    The number of days for which allowance shall be made shall be computed on the
    basis of one day for each three meals actually served.'
