- number: '307.78'
  heading: Making contributions to community improvement corporations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The board of county commissioners of any county may make contributions
    of moneys, supplies, equipment, office facilities, and other personal property
    or services to any community improvement corporation organized pursuant to Chapter
    1724. of the Revised Code to defray the expenses of the corporation. The community
    improvement corporation may use the board''s contributions for any of its functions
    under Chapter 1724. of the Revised Code.

    (B) Any moneys contributed by the board for such purposes shall be drawn from
    the general fund of the county not otherwise appropriated. The board may anticipate
    the contributions of money for such purposes and enter the amount of such contributions
    in its annual statement to the county budget commission for inclusion in the budget
    upon which rates of taxation are based.

    (C) The board of county commissioners of any county may pledge, as security for
    the repayment of moneys borrowed by a community improvement corporation under
    division (A)(1) of section 1724.02 of the Revised Code, revenue appropriated to
    a county treasurer under section 321.261 of the Revised Code, subject to annual
    appropriation of specific amounts of such revenues, and any other specified revenue
    lawfully available for the purposes for which such a corporation is organized.'
