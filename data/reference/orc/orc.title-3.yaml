- number: '306.10'
  heading: Issuing refunding bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'The county transit board or a board of county commissioners operating a transit
    system may issue refunding bonds of the county to refund any bonds previously
    issued under division (B) of section 306.09 of the Revised Code for any of the
    following purposes:

    (A) Refunding bonds which have matured or are about to mature when the rentals,
    revenues, and other income, charges, and moneys pledged for the payment of such
    bonds are insufficient to pay bonds which have matured or are about to mature
    or to make payments to other funds required by the bond proceedings;

    (B) Refunding any bonds as an incidence to providing funds for reconstructing,
    enlarging, improving and equipping the county transit system;

    (C) Refunding all of the outstanding bonds of any issue both matured and unmatured
    when the rates, revenues, or other income, charges, or moneys pledged for the
    payment of such bonds are insufficient to pay bonds which have matured or are
    about to mature or to make payments to other funds required by the bond proceedings,
    if such outstanding bonds can be retired by call, at maturity, or with the consent
    of the holders thereof, whether from the proceeds of the sale of the refunding
    bonds or by exchange for the refunding bonds, provided that the principal amount
    of the refunding bonds shall not exceed the aggregate of the par value of the
    bonds to be retired, any redemption premium, past-due and future interest to the
    date of maturity or proposed redemption that cannot otherwise be paid, and funds,
    if any, to reconstruct, enlarge, improve, and equip, or any combination thereof,
    the county transit system;

    (D) Refunding any bonds of any issue previously issued and outstanding when the
    refunding bonds will bear interest at a lower rate than the bonds to be refunded
    or when the interest cost of the refunding bonds computed to the absolute maturity
    will be less than the interest of the bonds to be refunded.

    Except as provided in this section the terms of the issuance and sale of refunding
    bonds shall be as provided in sections 306.01 to 306.11 of the Revised Code, for
    an original issue of bonds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.10
- number: '306.11'
  heading: Control over county transit system's revenue and funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: In counties that have a county transit board, that transit board shall have
    exclusive control over the county transit system's budgets, appropriations, collections,
    custody, and application of its revenues or other funds received by it and shall
    have jurisdiction of all purchases and contracts entered into in connection with
    the county transit system pursuant to sections 307.86 to 307.92 of the Revised
    Code. In those counties, the officers and employees of the county transit system
    shall be under the sole control of the county transit board and are not subject
    to supervision of other county officers.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.11
- number: '306.12'
  heading: Acquiring publicly or privately owned transit system - employee rights
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'Any board of county commissioners operating a transit system or any county
    transit board shall, if it acquires any existing transit system, assume all the
    employer''s obligations under any existing labor contract between the employees
    and management of the system. The board shall, if it acquires, constructs, controls,
    or operates any such facilities, negotiate arrangements to protect the interests
    of employees affected by such acquisition, construction, control, or operation.
    Such arrangements shall include, but are not limited to:

    (A) The preservation of rights, privileges, and benefits under existing collective
    bargaining agreements or otherwise, the preservation of rights and benefits under
    any existing pension plans covering prior service, and continued participation
    in social security, in addition to participation in the public employees retirement
    system as required in Chapter 145. of the Revised Code;

    (B) The continuation of collective bargaining rights;

    (C) The protection of individual employees against a worsening of their positions
    with respect to their employment;

    (D) Assurances of employment to employees of such transit systems and priority
    of re-employment of employees terminated or laid off;

    (E) Paid training or retraining programs;

    (F) Signed written labor agreements.

    Such arrangements may include provisions for the submission of labor disputes
    to final and binding arbitration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.12
- number: '306.13'
  heading: Exempting real and personal property from taxation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: A board of county commissioners operating a transit system or a county transit
    board created under sections 306.01 to 306.13 of the Revised Code shall be exempt
    from and shall not be required to pay any taxes on property, both real and personal,
    belonging to the board, which is used exclusively for any public purpose; provided,
    such exemption shall not apply to any property belonging to the board while a
    private enterprise is a lessee of such property under written lease providing
    tenancy for longer than one year.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.13
- number: '306.14'
  heading: Report on franchise agreements
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) If a board of county commissioners awards a franchise to a franchisee
    on behalf of a county transit board, the county transit board shall submit an
    annual written report to the board of county commissioners not later than a date
    designated by the board of county commissioners and in a form prescribed by that
    board. The board of county commissioners shall make the report available on the
    general web site of the county. The county transit board shall include in the
    report a description in detail of the effects the franchise agreement had during
    the prior year on all of the following as they relate to the operation of a public
    transit system by the franchisee in that county:

    (1) Cost savings to the county;

    (2) Efficiency;

    (3) Safety and security of the traveling public and franchise employees;

    (4) Service to the traveling public;

    (5) Return on investment by the county;

    (6) Any other aspects the board of county commissioners determines should be included
    in the report.

    (B) A franchisee that is awarded a franchise by a board of county commissioners
    on behalf of a county transit board shall submit an annual written report to the
    board of county commissioners or county transit board not later than a date designated
    by the board of county commissioners and in a form prescribed by that board. The
    board of county commissioners also shall direct the franchisee to submit the report
    to the board of county commissioners, the county transit board, or both. The board
    of county commissioners shall establish the issues to be addressed in the report
    with respect to the public transit system that the franchisee operated during
    the prior year. The board of county commissioners shall make the report available
    on the general web site of the county.

    (C) A board of county commissioners that awards a franchise to a franchisee on
    behalf of a county transit board shall conduct an annual review of the performance
    of the franchisee. The board of county commissioners shall include in the review
    a determination of the number of performance targets the franchisee met during
    the prior year and an evaluation of the franchisee''s compliance with the other
    terms and conditions of the franchise, including any breaches of the franchise
    by the franchisee. The board shall issue a written report, and shall make the
    report available on the general web site of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.14
- number: '306.30'
  heading: Regional transit authority definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) Except as provided in division (B) of this section and as used in sections
    306.30 to 306.53 of the Revised Code, "transit facility" means any:

    (1) Street railway, motor bus, tramline, subway, monorail, rapid transit vehicle,
    aeroplane, helicopter, ferry, or other ground or water transportation system having
    as its primary purpose the regularly scheduled mass movement of passengers between
    locations within the territorial boundaries of a regional transit authority, including
    all rights-of-way, power lines, rolling stock, equipment, machinery, terminals,
    buildings, administration and maintenance and repair facilities, and supporting
    parking facilities, and franchise rights attendant thereto, but excluding therefrom
    trucks and facilities designed for use in the movement of property by truck;

    (2) Docks, wharves, warehouses, piers, and other port, terminal, or transportation
    facilities and marinas;

    (3) Facilities used, available for use, or designed for use to aid in the safe
    taking off or landing of aircraft, for the safety, storage, and maintenance of
    aircraft, for the comfort and accommodation of users of air transportation, including
    persons, property, and mail, or for the safe and efficient operation and maintenance
    of an airport; and buildings and facilities as are reasonably necessary for the
    comfort and accommodation of the users of transit facilities; or

    (4) Any combination of the foregoing.

    (B) In a county with a population between one million two hundred thousand and
    one million three hundred thousand according the most recent federal decennial
    census, as used in sections 306.30 to 306.53 of the Revised Code, "transit facility"
    means any:

    (1) Street railway, motor bus, tramline, subway, monorail, paratransit vehicle,
    rapid transit vehicle, railcar, aeroplane, helicopter, ferry, or other ground
    or water transportation system having as its primary purpose either the regularly
    scheduled mass movement of passengers or the corresponding paratransit service
    between locations within the territorial boundaries of a regional transit authority,
    including all rights-of-way, routes, transit zones, bus lanes, bus layover areas,
    bus loops, transit centers, bus shelters, bus stops, rail stations, rail lines,
    power lines, rolling stock, equipment, machinery, terminals, buildings, administration
    and maintenance and repair facilities, vehicles for maintenance and support, and
    supporting parking facilities, and franchise rights attendant thereto, but excluding
    therefrom trucks and facilities designed for use in the movement of property by
    truck;

    (2) Docks, wharves, warehouses, piers, and other port, terminal, or transportation
    facilities and marinas;

    (3) Facilities used, available for use, or designed for use to aid in the safe
    taking off or landing of aircraft, for the safety, storage, and maintenance of
    aircraft, for the comfort and accommodation of users of air transportation, including
    persons, property, and mail, or for the safe and efficient operation and maintenance
    of an airport; and buildings and facilities as are reasonably necessary for the
    comfort and accommodation of the users of transit facilities;

    (4) Any combination of the foregoing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.30
- number: '306.301'
  heading: Resolution designating part of township member of regional transit authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) As used in sections 306.30 to 306.71 of the Revised Code, "township"
    means either of the following:

    (1) An entire township;

    (2) Township territory that is designated as a township under division (B) of
    this section for the purpose of joining a regional transit authority.

    (B) A board of township trustees may adopt a resolution designating as a township,
    for the purpose of joining a regional transit authority, territory consisting
    of contiguous whole election precincts that make up less than the entire unincorporated
    area of the township, provided that none of the territory is already part of a
    regional transit authority. The resolution shall specify the precinct numbers
    of the precincts that make up the territory. Upon adopting such a resolution,
    the board of township trustees shall take appropriate action under section 306.32
    or 306.321 of the Revised Code to enable the territory consisting of those precincts
    to become part of a contiguous regional transit authority.

    (C) The right to initiate proceedings to join a regional transit authority in
    accordance with this section shall terminate after June 30, 1986, except that
    nothing in this section shall be construed to deprive any portion of a township
    that has acted under this section prior to that date of the power to take any
    action necessary to continue in the regional transit authority.'
