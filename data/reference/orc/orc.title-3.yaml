- number: '323.29'
  heading: Partial payment of delinquent taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: The partial payment of delinquent taxes charged on the tax duplicate against
    any entry of real property, as authorized by section 323.133 or 323.31 of the
    Revised Code, shall not prevent such real property from being certified as delinquent;
    however, partial payment of such taxes under section 323.133 of the Revised Code
    shall preclude the commencement of foreclosure proceedings unless the tax commissioner
    subsequently certifies to the county auditor that partial payment under such section
    is no longer authorized. Partial payment of delinquent taxes in accordance with
    the terms of a delinquent tax contract under section 323.31 of the Revised Code
    shall preclude the commencement of foreclosure proceedings unless the county treasurer
    subsequently certifies to the county auditor that the delinquent tax contract
    has become void.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.29
- number: '323.30'
  heading: Receipt for installment payment - contents - entry by county treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: When any part of the delinquent taxes charged on the tax duplicate is paid
    as an installment under section 323.31 of the Revised Code, the county treasurer
    shall enter the amount of such payment on the tax duplicate, crediting it as required
    by such section, an shall give a receipt for the amount paid to the person paying
    it. Such receipt shall show the application of the payment made and the amount
    of delinquent taxes remaining unpaid.
