- number: '307.058'
  heading: Joint ambulance district or county may join joint emergency medical services
    district
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Once a joint emergency medical services district is formed, any joint
    ambulance district located in a county that is a participant in the joint emergency
    medical services district may join that joint emergency medical services district
    by adopting a resolution requesting inclusion and presenting it to the board of
    trustees of the joint emergency medical services district. Upon the board''s approval
    of this request, the joint ambulance district shall become a part of the joint
    emergency medical services district and the joint ambulance district shall be
    considered to have ceased to exist by operation of law for purposes of section
    505.72 of the Revised Code.

    (B) Any county may join an existing joint emergency medical services district
    by adopting a resolution requesting such membership and upon approval of the board
    of trustees of the district. Any county may withdraw from a district by adopting
    a resolution ordering withdrawal and giving written notice of the resolution to
    the district on or before the first day of September of the year preceding the
    year in which the withdrawal is to become effective. On or after the first day
    of January of the year following the adoption of the resolution of withdrawal,
    the withdrawing county ceases to be a part of that district and the power of the
    district to levy a tax on taxable property in the withdrawing county terminates,
    except that the district shall continue to levy and collect taxes for the payment
    of indebtedness within the territory of the district as it existed at the time
    the indebtedness was incurred.

    (C) Upon the withdrawal of any county from a district, the board of trustees shall
    ascertain, apportion, and order a division of the funds on hand, credits, moneys
    and taxes in the process of collection, except for taxes levied for the payment
    of indebtedness, and real and personal property, either in money or in kind, between
    the district and the withdrawing county on any equitable basis consistent with
    the joint resolution creating the district and any agreements between the withdrawing
    county and the district, taking into consideration the prior contributions of
    the withdrawing county.

    (D) The district may dissolve upon the adoption by the board of trustees of a
    resolution to dissolve. Such a dissolution shall be effective on the first day
    of January of the year following the adoption of the resolution.

    Whenever the withdrawal of one or more counties would leave only one county participating
    in a joint district, the district shall be dissolved and the board of trustees
    shall ascertain, apportion, and order a final division of the funds on hand, credits,
    and real and personal property of the joint district consistent with the provisions
    regarding dissolution of the district in the joint resolution creating the district.
    On the first day of January of the year following the adoption of the latest resolution
    or resolutions ordering withdrawal that would leave only one county in the district,
    the joint district shall be dissolved.

    Whenever a joint district is dissolved and an indebtedness remains unpaid, the
    boards of county commissioners shall continue to levy and collect taxes for the
    payment of the indebtedness in support of the joint district in the amounts established
    by the agreement at the time the indebtedness was incurred.'
