- number: '340.12'
  heading: Discrimination prohibited - affirmative action program
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: 'As used in this section, "disability" has the same meaning as in section
    4112.01 of the Revised Code.

    No board of alcohol, drug addiction, and mental health services or any community
    addiction services provider or community mental health services provider under
    contract with such a board shall discriminate in the provision of addiction services,
    mental health services, or recovery supports under its authority, in employment,
    or under a contract on the basis of race, color, religion, ancestry, military
    status, sex, age, national origin, or disability.

    Each board, community addiction services provider, and community mental health
    services provider shall have a written affirmative action program. The affirmative
    action program shall include goals for the employment and effective utilization
    of, including contracts with, members of economically disadvantaged groups as
    defined in division (E)(1) of section 122.71 of the Revised Code in percentages
    reflecting as nearly as possible the composition of the alcohol, drug addiction,
    and mental health service district served by the board. Each board and provider
    shall file a description of the affirmative action program and a progress report
    on its implementation with the department of behavioral health.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-340.12
- number: '340.13'
  heading: Setting aside contracts for bidding by minority business enterprises only
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: '(A) As used in this section:

    (1) "Minority business enterprise" has the same meaning as in section 122.71 of
    the Revised Code.

    (2) "EDGE business enterprise" has the same meaning as in section 122.922 of the
    Revised Code.

    (B) Any minority business enterprise that desires to bid on a contract under division
    (C) of this section shall first apply to the department of development for certification
    as a minority business enterprise. Any EDGE business enterprise that desires to
    bid on a contract under division (D) of this section shall first apply to the
    department of development for certification as an EDGE business enterprise. The
    director of development shall approve the application of any minority business
    enterprise or EDGE business enterprise that complies with the rules adopted under
    section 122.71 or 122.922 of the Revised Code, respectively. The director shall
    prepare and maintain a list of minority business enterprises and EDGE business
    enterprises certified under those sections.

    (C) From the contracts to be awarded for the purchases of equipment, materials,
    supplies, or services, other than contracts entered into under section 340.036
    of the Revised Code, each board of alcohol, drug addiction, and mental health
    services shall select a number of contracts with an aggregate value of approximately
    fifteen per cent of the total estimated value of contracts to be awarded in the
    current fiscal year. The board shall set aside the contracts so selected for bidding
    by minority business enterprises only. The bidding procedures for such contracts
    shall be the same as for all other contracts awarded under section 307.86 of the
    Revised Code, except that only minority business enterprises certified and listed
    pursuant to division (B) of this section shall be qualified to submit bids.

    (D) To the extent that a board is authorized to enter into contracts for construction,
    the board shall strive to attain a yearly contract dollar procurement goal the
    aggregate value of which equals approximately five per cent of the aggregate value
    of construction contracts for the current fiscal year for EDGE business enterprises
    only.

    (E)(1) In the case of contracts set aside under division (C) of this section,
    if no bid is submitted by a minority business enterprise, the contract shall be
    awarded according to normal bidding procedures. The board shall from time to time
    set aside such additional contracts as are necessary to replace those contracts
    previously set aside on which no minority business enterprise bid.

    (2) If a board, after having made a good faith effort, is unable to comply with
    the goal of procurement for contracting with EDGE business enterprises pursuant
    to division (D) of this section, the board may apply in writing, on a form prescribed
    by the department of administrative services, to the director of behavioral health
    for a waiver or modification of the goal.

    (F) This section does not preclude any minority business enterprise or EDGE business
    enterprise from bidding on any other contract not specifically set aside for minority
    business enterprises or subject to procurement goals for EDGE business enterprises.

    (G) Within ninety days after the beginning of each fiscal year, each board shall
    file a report with the department of behavioral health that shows for that fiscal
    year the name of each minority business enterprise and EDGE business enterprise
    with which the board entered into a contract, the value and type of each such
    contract, the total value of contracts awarded under divisions (C) and (D) of
    this section, the total value of contracts awarded for the purchases of equipment,
    materials, supplies, or services, other than contracts entered into under section
    340.036 of the Revised Code, and the total value of contracts entered into for
    construction.

    (H) Any person who intentionally misrepresents self as owning, controlling, operating,
    or participating in a minority business enterprise or an EDGE business enterprise
    for the purpose of obtaining contracts or any other benefits under this section
    shall be guilty of theft by deception as provided for in section 2913.02 of the
    Revised Code.'
  history: null
