  url: https://codes.ohio.gov/ohio-revised-code/section-308.24
- number: '308.25'
  heading: Airport development districts - dissolution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: '(A) An airport development district exists until it is dissolved under this
    section. The process for dissolving an airport development district or repealing
    a development plan may be initiated by a petition filed with the board of directors
    of the district and signed by the owners of at least twenty per cent of the collective
    number of parcels of real property and businesses that are subject to development
    charge agreements.

    (B) The board of directors of the district shall organize and hold a meeting to
    consider the petition not later than forty-five days after it is filed. The board
    shall notify each owner of property or a business that is subject to a development
    charge agreement of the time, place, and subject of the meeting at least two weeks
    before the meeting is held. Upon the affirmative vote of the owners of at least
    fifty per cent of the collective number of parcels and businesses subject to a
    development charge agreement, the district shall be dissolved, or the plan shall
    be repealed, as applicable. The dissolution of a district shall not be finalized
    until all debts and obligations of the district are paid in full.

    (C) No rights or obligations of any person under any contract shall be affected
    by the dissolution of the district or the repeal of a development plan, except
    with the consent of that person or by order of a court with jurisdiction over
    the matter. Upon dissolution of a district, any assets or rights of the district,
    after payment of all obligations of the district, shall be returned to the property
    and business owners, prorated to reflect the amount of development charges collected
    on the owner''s property in the preceding twelve months.

    (D) Once the property and business owners have approved the repeal of a development
    plan, all obligations of the district associated with the plan shall be paid.
    Thereafter, the plan shall be repealed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-308.25
- number: '309.01'
  heading: Election of prosecuting attorney
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: There shall be elected quadrennially in each county, a prosecuting attorney,
    who shall hold his office for four years, beginning on the first Monday of January
    next after his election.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.01
- number: '309.02'
  heading: Qualifications of candidate for prosecuting attorney
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: No person shall be eligible as a candidate for the office of prosecuting attorney,
    or shall be elected to such office, who is not an attorney at law licensed to
    practice law in this state. No prosecuting attorney shall be a member of the general
    assembly of this state or mayor of a municipal corporation.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.02
- number: '309.03'
  heading: Bond of prosecuting attorney - oath
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: Except as otherwise provided in section 3.061 of the Revised Code, before
    entering upon the discharge of the official duties of the prosecuting attorney,
    the prosecuting attorney shall give a bond, signed by a bonding or surety company
    approved by the court of common pleas or the probate court and authorized to do
    business in this state, or, at the prosecuting attorney's option, signed by two
    or more freeholders having real estate in the value of double the amount of the
    bond over and above all encumbrances to the state. Such bond shall be in a sum
    not less than one thousand dollars, to be fixed by the court of common pleas or
    the probate court and conditioned that such prosecuting attorney will faithfully
    discharge all the duties enjoined upon the prosecuting attorney by law, and pay
    over all moneys received in the prosecuting attorney's official capacity. The
    expense or premium for such bond shall be paid by the board of county commissioners,
    and shall be charged to the general fund of the county. Such bond, with the approval
    of such court and the oath of office required by sections 3.22 and 3.23 of the
    Revised Code indorsed thereon, shall be deposited with the county treasurer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.03
- number: '309.05'
  heading: Removal of prosecuting attorney for neglect or misconduct
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: 'On complaint, in writing, signed by one or more taxpayers, containing distinct
    charges and specifications of wanton and willful neglect of duty or gross misconduct
    in office by the prosecuting attorney, supported by affidavit and filed in the
    court of common pleas, the court shall assign the complaint for hearing and shall
    cause reasonable notice of the hearing to be given to the prosecuting attorney
    of the time fixed by the court for the hearing. At the time so fixed, or to which
    the court adjourns the hearing, the court shall hear the evidence adduced by the
    complainants and the prosecuting attorney. The court may consider motions for
    judgment on the pleadings made pursuant to Civil Rule 12, motions to dismiss made
    pursuant to Civil Rule 41, and motions for summary judgment made pursuant to Civil
    Rule 56 that are filed before the hearing. If it appears that the prosecuting
    attorney has willfully and wantonly neglected to perform the prosecuting attorney''s
    duties, or has been guilty of gross misconduct in office, the court shall remove
    the prosecuting attorney from office and declare the office vacant. Otherwise
    the complaint shall be dismissed, and the court shall render judgment against
    the losing party for costs.

    If a complaint to remove a prosecuting attorney is dismissed because the complainant
    or complainants failed to file an affidavit in support of the complaint, the dismissal
    shall be without prejudice.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.05
- number: '309.06'
  heading: Assistant prosecuting attorneys - clerks - stenographers
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: '(A) On or before the first Monday in January of each year, the judge of the
    court of common pleas or, if there is more than one judge, the judges of the court
    of common pleas in joint session may fix an aggregate sum to be expended for the
    incoming year for the compensation of assistants, clerks, and stenographers of
    the prosecuting attorney''s office.

    The prosecuting attorney may appoint any assistants, clerks, and stenographers
    who are necessary for the proper performance of the duties of his office and fix
    their compensation, not to exceed, in the aggregate, the amount fixed by the judges
    of the court of common pleas. The compensation, after being so fixed, shall be
    paid to the assistants, clerks, and stenographers biweekly from the general fund
    of the county treasury, upon the warrant of the county auditor.

    (B) Subject to section 2921.421 of the Revised Code, a prosecuting attorney may
    appoint, as an assistant prosecuting attorney, clerk, stenographer, or other employee,
    a person who is an associate or partner of, or who is employed by, the prosecuting
    attorney or an assistant prosecuting attorney in the private practice of law in
    a partnership, professional association, or other law business arrangement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.06
- number: '309.07'
  heading: Appointment of secret service officer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: The prosecuting attorney may appoint secret service officers whose duty it
    shall be to aid him in the collection and discovery of evidence to be used in
    the trial of criminal cases and matters of a criminal nature. Such appointment
    shall be made for such term as the prosecuting attorney deems advisable, and subject
    to termination at any time by such prosecuting attorney. The compensation of said
    officers shall be fixed by the judge of the court of common pleas, or, if there
    is more than one judge, such compensation shall be fixed by the judges of such
    court in joint session, and shall not be less than one hundred twenty-five dollars
    per month for the time actually occupied in such service nor more than seventy-five
    per cent of the salary of the prosecuting attorney for a year. Such salary shall
    be payable monthly, out of the county fund, upon the warrant of the county auditor.
