  url: https://codes.ohio.gov/ohio-revised-code/section-325.18
- number: '325.19'
  heading: Vacation leave - holiday pay
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: '(A)(1) The granting of vacation leave under division (A)(1) of this section
    is subject to divisions (A)(2) and (3) of this section. Each full-time employee
    in the several offices and departments of the county service, including full-time
    hourly rate employees, after service of one year with the county or any political
    subdivision of the state, shall have earned and will be due upon the attainment
    of the first year of employment, and annually thereafter, eighty hours of vacation
    leave with full pay. One year of service shall be computed on the basis of twenty-six
    biweekly pay periods. A full-time county employee with eight or more years of
    service with the county or any political subdivision of the state shall have earned
    and is entitled to one hundred twenty hours of vacation leave with full pay. A
    full-time county employee with fifteen or more years of service with the county
    or any political subdivision of the state shall have earned and is entitled to
    one hundred sixty hours of vacation leave with full pay. A full-time county employee
    with twenty-five years of service with the county or any political subdivision
    of the state shall have earned and is entitled to two hundred hours of vacation
    leave with full pay. Such vacation leave shall accrue to the employee at the rate
    of three and one-tenth hours each biweekly period for those entitled to eighty
    hours per year; four and six-tenths hours each biweekly period for those entitled
    to one hundred twenty hours per year; six and two-tenths hours each biweekly period
    for those entitled to one hundred sixty hours per year; and seven and seven-tenths
    hours each biweekly period for those entitled to two hundred hours per year.

    The appointing authorities of the offices and departments of the county service
    may permit all or any part of a person''s prior service with any regional council
    of government established in accordance with Chapter 167. of the Revised Code
    to be considered service with the county or a political subdivision of the state
    for the purpose of determining years of service under this division.

    (2) Full-time employees granted vacation leave under division (A)(1) of this section
    who render any standard of service other than forty hours per week as described
    in division (K) of this section and who are in active pay status in a biweekly
    pay period, shall accrue a number of hours of vacation leave during each such
    pay period that bears the same ratio to the number of hours specified in division
    (A)(1) of this section as their number of hours which are accepted as full-time
    in active pay status, excluding overtime hours, bears to eighty hours.

    (3) Full-time employees granted vacation leave under division (A)(1) of this section
    who are in active pay status in a biweekly pay period for less than eighty hours
    or the number of hours of service otherwise accepted as full-time by their employing
    office or department shall accrue a number of hours of vacation leave during that
    pay period that bears the same ratio to the number of hours specified in division
    (A)(1) of this section as their number of hours in active pay status, excluding
    overtime hours, bears to eighty or the number of hours of service accepted as
    full-time, whichever is applicable.

    (B) A board of county commissioners, by resolution, may grant vacation leave with
    full pay to part-time county employees. A part-time county employee shall be eligible
    for vacation leave with full pay upon the attainment of the first year of employment,
    and annually thereafter. The ratio between the hours worked and the vacation hours
    awarded to a part-time employee shall be the same as the ratio between the hours
    worked and the vacation hours earned by a full-time employee as provided for in
    this section.

    (C) Days specified as holidays in section 124.19 of the Revised Code shall not
    be charged to an employee''s vacation leave. Vacation leave shall be taken by
    the employee during the year in which it accrued and prior to the next recurrence
    of the anniversary date of the employee''s employment, provided that the appointing
    authority may, in special and meritorious cases, permit such employee to accumulate
    and carry over the employee''s vacation leave to the following year. No vacation
    leave shall be carried over for more than three years. An employee is entitled
    to compensation, at the employee''s current rate of pay, for the prorated portion
    of any earned but unused vacation leave for the current year to the employee''s
    credit at time of separation, and in addition shall be compensated for any unused
    vacation leave accrued to the employee''s credit, with the permission of the appointing
    authority, for the three years immediately preceding the last anniversary date
    of employment.

    (D)(1) In addition to vacation leave, a full-time county employee is entitled
    to eight hours of holiday pay for New Year''s day, Martin Luther King day, Washington-Lincoln
    day, Memorial day, Juneteenth day, Independence day, Labor day, Columbus day,
    Veterans'' day, Thanksgiving day, and Christmas day, of each year. Except as provided
    in division (D)(2) of this section, holidays shall occur on the days specified
    in section 1.14 of the Revised Code. If any of those holidays fall on Saturday,
    the Friday immediately preceding shall be observed as the holiday. If any of those
    holidays fall on Sunday, the Monday immediately succeeding shall be observed as
    the holiday. If an employee''s work schedule is other than Monday through Friday,
    the employee is entitled to holiday pay for holidays observed on the employee''s
    day off regardless of the day of the week on which they are observed.

    (2)(a) When a classified employee of a county board of developmental disabilities
    works at a site maintained by a government entity other than the board, such as
    a public school, the board may adjust the employee''s holiday schedule to conform
    to the schedule adopted by the government entity. Under an adjusted holiday schedule,
    an employee shall receive the number of hours of holiday pay granted under division
    (D)(1) of this section.

    (b) Pursuant to division (J)(6) of section 339.06 of the Revised Code, a county
    hospital may observe Martin Luther King day, Washington-Lincoln day, Columbus
    day, and Veterans'' day on days other than those specified in section 1.14 of
    the Revised Code.

    (E) In the case of the death of a county employee, the unused vacation leave and
    unpaid overtime to the credit of the employee shall be paid in accordance with
    section 2113.04 of the Revised Code, or to the employee''s estate.

    (F) Notwithstanding this section or any other section of the Revised Code, any
    appointing authority of a county office, department, commission, board, or body
    may, upon notification to the board of county commissioners, establish alternative
    schedules of vacation leave and holidays for employees of the appointing authority
    for whom the state employment relations board has not established an appropriate
    bargaining unit pursuant to section 4117.06 of the Revised Code, as long as the
    alternative schedules are not inconsistent with the provisions of at least one
    collective bargaining agreement covering other employees of that appointing authority,
    if such an agreement exists. If no such collective bargaining agreement exists,
    an appointing authority, upon notification to the board of county commissioners,
    may establish an alternative schedule of vacation leave and holidays for its employees
    that does not diminish the vacation leave and holiday benefits granted by this
    section.

    (G) The employees of a county children services board that establishes vacation
    benefits under section 5153.12 of the Revised Code are exempt from division (A)
    of this section.

    (H) The provisions of this section do not apply to superintendents and management
    employees of county boards of developmental disabilities.

    (I) Division (A) of this section does not apply to an employee of a county board
    of developmental disabilities who works at, or provides transportation services
    to pupils of, a special education program provided by the county board pursuant
    to division (A)(4) of section 5126.05 of the Revised Code, if the employee''s
    employment is based on a school year and the employee is not subject to a contract
    with the county board that provides for division (A) of this section to apply
    to the employee.

    (J) Notwithstanding division (C) of this section or any other section of the Revised
    Code, if a separation from county service occurs in connection with the lease,
    sale, or other transfer of all or substantially all the business and assets of
    a county hospital organized under Chapter 339. of the Revised Code to a private
    corporation or other entity, the appointing authority shall have no obligation
    to pay any compensation with respect to unused vacation leave accrued to the credit
    of an employee who accepts employment with the acquiring corporation or other
    entity, if at the effective time of separation the acquiring corporation or other
    entity expressly assumes such unused vacation leave accrued to the employee''s
    credit.

    (K) As used in this section:

    (1) "Full-time employee" means an employee whose regular hours of service for
    a county total forty hours per week, or who renders any other standard of service
    accepted as full-time by an office, department, or agency of county service.

    (2) "Part-time employee" means an employee whose regular hours of service for
    a county total less than forty hours per week, or who renders any other standard
    of service accepted as part-time by an office, department, or agency of county
    service, and whose hours of county service total at least five hundred twenty
    hours annually.

    (3) "Management employee" has the same meaning as in section 5126.20 of the Revised
    Code.'
