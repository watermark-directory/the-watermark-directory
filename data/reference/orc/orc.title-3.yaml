  url: https://codes.ohio.gov/ohio-revised-code/section-323.61
- number: '323.611'
  heading: Contracting with financial institution to process payments, checks and
    fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) At the request of the county treasurer, a board of county commissioners
    may enter into a contract with any financial institution under which the financial
    institution, in accordance with the terms of the contract, receives real property
    and manufactured home tax payments at a post office box, opens the mail delivered
    to that box, processes the checks and other payments received in such mail and
    deposits them into the treasurer''s account, and provides the county treasurer
    daily receipt information with respect to such payments. The contract shall not
    be entered into unless:

    (1) The contract is awarded in accordance with sections 307.86 to 307.92 of the
    Revised Code;

    (2) The treasurer''s surety bond includes within its coverage any loss that might
    occur as the result of the contract;

    (3) The provisions of the contract do not conflict with accounting and reporting
    requirements prescribed by the auditor of state.

    (B) The records of the financial institution are subject to examination by the
    auditor of state to the same extent as if the services that the financial institution
    has agreed to perform were being performed by the treasurer of state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.611
- number: '323.62'
  heading: Notice to taxpayer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'The county treasurer may fix the time and place at which taxes will be received,
    as provided in section 323.61 of the Revised Code. Notice of such time and place
    shall be given by publication using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation in the
    municipal corporation within which the tax receiving office is located or, if
    no such newspaper exists, in a newspaper of general circulation within the county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.62
- number: '323.63'
  heading: Depositing money received in payment of taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: The county treasurer may deposit in any bank of deposit located at a place
    of collection any money received in the payment of taxes, as provided by section
    323.61 of the Revised Code. A bank receiving any such deposits shall deposit with
    or pledge to the treasurer such securities as he deems sufficient to meet the
    requirements of section 135.37 of the Revised Code. The liability of the treasurer
    for any losses of money so collected or deposited shall be the same as provided
    in section 135.39 of the Revised Code.
