  chapter:
    num: '317'
    name: Recorder
  text: When any instrument or record mentioned in section 317.30 of the Revised Code
    is presented to the county recorder or other proper custodian of such records,
    the county recorder or other custodian shall forthwith record and index it in
    the same manner as provided for in the original recording. A competent person
    shall compare such record with the instrument so recorded, and, if correctly recorded,
    certify on the margin of the page upon which the record has been made the correctness
