- number: '313.132'
  heading: Screening for presence of buprenorphine, naltrexone, and methadone
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: If an autopsy includes a toxicological analysis, the coroner, deputy coroner,
    or pathologist shall screen for the presence of buprenorphine, naltrexone, and
    methadone.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.132
- number: '313.14'
  heading: Notice to relatives - disposition of property
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A)(1) The coroner shall make a reasonable effort to notify any known relatives
    of a deceased person who meets death in the manner described by section 313.12
    of the Revised Code by letter or otherwise. The coroner shall also make a reasonable
    effort to determine the identity of the person who has been assigned the rights
    of disposition for the deceased person under sections 2108.70 to 2108.90 of the
    Revised Code and shall notify that person. After the coroner has completed the
    performance of the coroner''s legal duties with respect to the body of the deceased
    person, the coroner shall return the body to that person.

    (2) The coroner shall take charge and possession of all moneys, clothing, and
    other valuable personal effects of the deceased person, found in connection with
    or pertaining to the body, and shall store the possessions in the county coroner''s
    office or such other suitable place as is provided for that storage by the board
    of county commissioners. If the coroner considers it advisable, the coroner may,
    after taking adequate precautions for the security of those possessions, store
    the possessions where the coroner finds them until other storage space becomes
    available. The person who has been assigned the rights of disposition for the
    deceased person under sections 2108.70 to 2108.90 of the Revised Code may request
    the coroner to give those possessions to that person. After the person who has
    been assigned the rights of disposition for the deceased person under sections
    2108.70 to 2108.90 of the Revised Code, upon the person''s request under this
    division, receives the possessions of the deceased person from the coroner, that
    person shall deliver the possessions to the executor or administrator of the estate
    of the deceased person or to any other person who is legally entitled to any of
    those possessions.

    (B) In cases in which the cost of the burial is paid by the county, after using
    such of the clothing as is necessary in the burial of the body, the coroner shall
    sell at public auction the valuable personal effects of the deceased persons,
    found in connection with or pertaining to the unclaimed dead body, except firearms,
    which shall be disposed of as provided in division (C) of this section. The coroner
    shall make a verified inventory of the effects and they shall be sold within eighteen
    months after burial, or after delivery of the body in accordance with section
    1713.34 of the Revised Code. All moneys derived from the sale shall be deposited
    in the county treasury. A notice of the sale shall be given for five days in succession,
    and the sale shall be held immediately thereafter.

    The notice shall be made using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    The cost of such advertisement and notices shall be paid by the board upon the
    submission of a verified statement for that cost, certified to the coroner.

    (C) If a firearm is included in the personal effects of a deceased person who
    meets death in the manner described by section 313.12 of the Revised Code, the
    coroner shall deliver the firearm to the chief of police of the municipal corporation
    within which the body is found, or to the sheriff of the county if the body is
    not found within a municipal corporation. Upon delivery of the firearm to the
    chief of police or the sheriff, the chief of police or sheriff shall give the
    coroner a receipt for the firearm that states the date of delivery and an accurate
    description of the firearm. The firearm shall be used for evidentiary purposes
    only.

    The person who has been assigned the rights of disposition for the deceased person
    under sections 2108.70 to 2108.90 of the Revised Code may request that the firearm
    be given to that person once the firearm is no longer needed for evidentiary purposes.
    The chief of police or the sheriff shall give the firearm to that person who requested
    the firearm only if the person may lawfully possess the firearm under applicable
    law of this state or the United States. The chief of police or the sheriff shall
    keep a record identifying the person to whom the firearm is given, the date the
    firearm was given to that person, and an accurate description of the firearm.
    The person to whom the firearm is given upon the person''s request under this
    division shall deliver the firearm to the executor or administrator of the estate
    of the deceased person or to any other person who is legally entitled to the firearm.

    If the person who has been assigned the rights of disposition for the deceased
    person under sections 2108.70 to 2108.90 of the Revised Code does not request
    the firearm or is not entitled to possess the firearm, the firearm shall be used
    at the discretion of the chief of police or the sheriff.

    (D) This section does not invalidate section 1713.34 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.14
- number: '313.15'
  heading: Determination of responsibility for death
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: All dead bodies in the custody of the coroner shall be held until such time
    as the coroner, after consultation with the prosecuting attorney, or with the
    police department of a municipal corporation, if the death occurred in a municipal
    corporation, or with the sheriff, has decided that it is no longer necessary to
    hold such body to enable him to decide on a diagnosis giving a reasonable and
    true cause of death, or to decide that such body is no longer necessary to assist
    any of such officials in his duties.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.15
- number: '313.16'
  heading: Laboratory examinations by coroner of another county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: In counties where no coroner's laboratory has been established or where the
    coroner's laboratory does not have the equipment or personnel to follow the protocol
    established in rules adopted by the director of health under section 313.122 of
    the Revised Code, the coroner may request a coroner of a county in which such
    a laboratory is established or that has a laboratory able to follow the director's
    protocol to perform necessary laboratory examinations, the cost of which shall
    be no greater than the actual value of the services of technicians and the materials
    used in performing such examination. Money derived from the fees paid for these
    examinations shall be kept in a special fund, for the use of the coroner's laboratory,
    from which fund replacements can be made. Such funds shall be used to purchase
    necessary supplies and equipment for the laboratory and to pay any associated
    costs incurred in the administration of this section at the coroner's discretion.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.16
- number: '313.161'
  heading: Cost of autopsy when death occurred in another county; death of inmate
    of correctional facility
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) Whenever an autopsy is performed, including any individual component
    of an autopsy as defined in section 313.123 of the Revised Code, and the injury
    causing death occurred within the boundaries of a county other than the one in
    which the autopsy was performed, such other county shall pay the costs of the
    autopsy, including associated transportation costs. The cost of such autopsy shall
    be no greater than the actual value of the transportation of the body, services
    of the technicians, and materials used. Money derived from the fees paid for such
    autopsies shall be credited to the coroner''s laboratory fund created in section
    313.16 of the Revised Code.

    (B)(1) Whenever an autopsy is performed, including any individual component of
    an autopsy as defined in section 313.123 of the Revised Code, and the person who
    died was an inmate of a state correctional facility, the department of rehabilitation
    and correction or the department of youth services, as appropriate, shall pay
    the costs of the autopsy, including associated transportation costs. The costs
    of the autopsy shall be no greater than the actual value of the transportation
    of the body, services of the technicians, and the facilities and materials used.
    Money derived from the fees paid for such autopsies shall be credited to the coroner''s
    laboratory fund created in section 313.16 of the Revised Code.

    (2) As used in this division, "state correctional facility" means a "state correctional
    institution," as defined in section 2967.01 of the Revised Code, a state correctional
    institution that is privately operated and managed pursuant to section 9.06 of
    the Revised Code, and an "institution," as defined in section 5139.01 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.161
- number: '313.17'
  heading: Subpoenas - oath and testimony of witnesses
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: The coroner or deputy coroner may issue subpoenas for such witnesses as are
    necessary, administer to such witnesses the usual oath, and proceed to inquire
    how the deceased came to his death, whether by violence to self or from any other
    persons, by whom, whether as principals or accessories before or after the fact,
    and all circumstances relating thereto. The testimony of such witnesses shall
    be reduced to writing and subscribed to by them, and with the findings and recognizances
    mentioned in this section, shall be kept on file in the coroner's office, unless
    the county fails to provide such an office, in which event all such records, findings
    and recognizances shall be kept on file in the office of the clerk of the court
    of common pleas. The coroner may cause such witnesses to enter into recognizance,
    in such sum as is proper, for their appearance to give testimony concerning the
    matter. He may require any such witnesses to give security for their attendance,
    and, if any of them fails to comply with his requirements he shall commit such
    person to the county jail until discharged by due course of law. In case of the
    failure of any person to comply with such subpoena, or on the refusal of a witness
    to testify to any matter regarding which he may lawfully be interrogated, the
    probate judge, or a judge of the court of common pleas, on application of the
    coroner, shall compel obedience to such subpoena by attachment proceedings as
    for contempt. A report shall be made from the personal observation by the coroner
    or his deputy of the corpse, from the statements of relatives or other persons
    having any knowledge of the facts, and from such other sources of information
    as are available, or from the autopsy.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.17
- number: '313.18'
  heading: Disinterment of body
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: The prosecuting attorney or coroner may order the disinterment of any dead
    body, under the direction and supervision of the coroner, and may authorize the
    removal of such body by the coroner to the quarters established for the use of
    such coroner, for the purpose of examination and autopsy.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.18
- number: '313.19'
  heading: Coroner's verdict the legally accepted cause of death
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: The cause of death and the manner and mode in which the death occurred, as
    delivered by the coroner and incorporated in the coroner's verdict and in the
    death certificate filed with the division of vital statistics, shall be the legally
    accepted manner and mode in which such death occurred, and the legally accepted
    cause of death, unless the court of common pleas of the county in which the death
    occurred, after a hearing, directs the coroner to change his decision as to such
    cause and manner and mode of death.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.19
- number: '313.20'
  heading: Coroner's writs
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: The coroner may issue any writ required by sections 313.01 to 313.22 of the
    Revised Code, to any constable of the county in which a body is found as described
    in section 313.12 of the Revised Code, or if the emergency so requires, to any
    discreet person of the county, and such person is entitled to receive for the
    services rendered the same fees as elected constables. Every constable, or other
    person so appointed, who fails to execute any warrant directed to him, shall forfeit
    and pay twenty-five dollars, which amount shall be recovered upon the complaint
    of the coroner, before any court having jurisdiction thereof. All such forfeitures
    shall be for the use of the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.20
- number: '313.21'
  heading: Tests for emergency involving suspected toxic substances or for law enforcement-related
    testing
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) The coroner may use or may allow the use of the coroner''s laboratory
    and facilities for tests in an emergency involving suspected toxic substances
    or for law enforcement-related testing, and may direct his assistants and other
    personnel to perform such testing in addition to testing performed in execution
    of their duties as set forth in sections 313.01 to 313.22 of the Revised Code.
    Nothing in this division shall permit such testing except in compliance with state
    and federal quality assurance requirements for medical laboratories.

    (B) The coroner shall keep a complete record of all chemical tests and other tests
    performed each fiscal year pursuant to division (A) of this section, the public
    agency, hospital, or person for whom the test was performed, and the cost incurred
    for each test. This record shall be kept in the office of the coroner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.21
- number: '313.211'
  heading: Powers of coroner regarding dangerous drugs
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: The coroner may secure, catalog, record, and, with the approval of the prosecuting
    attorney, destroy any dangerous drugs found at the scene of an investigation the
    coroner conducts, if the dangerous drugs are no longer needed for investigative
    or scientific purposes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.211
- number: '313.212'
  heading: Notice of death by overdose
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: If the coroner determines that a drug overdose is the cause of death of a
    person, the coroner may provide a notice of the death to the state medical board,
    board of nursing, or state dental board. The coroner may include in the notice
    any information relating to the drug that resulted in the overdose, including
    whether it was obtained by prescription and, if so, the name of the individual
    who prescribed it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.212
- number: '313.22'
  heading: Rights of administrator or executor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: Sections 311.01 to 311.21, inclusive, of the Revised Code do not interfere
    with the rights of any appointed and qualified administrator or executor, but
    moneys and effects taken by the coroner shall be delivered to such administrator
    or executor, whether before or after return thereof to the probate court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.22
- number: '313.23'
  heading: View of autopsy by interested person
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) As used in this section:

    (1) "Interested person" means an employee of the coroner''s office, a physician,
    dentist, nurse, professor at a medical school, medical student, medical resident,
    nursing student, an employee of a procurement organization, a member of a law
    enforcement agency, or any other person the coroner, in the coroner''s discretion,
    determines is appropriate.

    (2) "Procurement organization" has the same meaning as in section 2108.01 of the
    Revised Code.

    (B) The coroner may allow an interested person to view an autopsy of a decedent
    without the interested person receiving permission to view the decedent''s autopsy
    from the decedent''s next of kin.

    (C) No person who is under eighteen years of age and who is not an interested
    person may view an autopsy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.23
- number: '313.30'
  heading: Coroner to designate eye or tissue bank - immunity
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: A coroner acting in good faith is not liable in damages for injury resulting
    from acting or attempting to act in accordance with sections 2108.01 to 2108.29
    of the Revised Code regarding an anatomical gift.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.30
- number: '315.01'
  heading: Election and term of office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: There shall be elected quadrennially in each county a county engineer who
    shall assume office on the first Monday in January next after his election and
    shall hold such office for four years.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.01
- number: '315.02'
  heading: Eligibility for office of county engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: No person holding the office of clerk of the court of common pleas, sheriff,
    county treasurer, or county recorder is eligible to hold the office of county
    engineer. No person is eligible in any county as a candidate for such office or
    shall be elected or appointed thereto unless he is a registered professional engineer
    and a registered surveyor, licensed to practice in this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.02
- number: '315.03'
  heading: Bond of county engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'Except as provided in section 3.061 of the Revised Code, the county engineer,
    before entering upon the duties of the office of county engineer, shall give bond,
    signed by a bonding or surety company authorized to do business in this state,
    or, at the engineer''s option, signed by two or more freeholders having real estate
    in the value of double the amount of the bond, over and above all encumbrances
    to the state, in the sum of not less than two thousand nor more than ten thousand
    dollars as fixed by the board of county commissioners. Such surety company shall
    be approved by the board and the bond shall be conditioned for the faithful performance
    of such engineer''s official duties.

    The expense or premium for such bond shall be paid by the board and charged to
    the general fund of the county. Such bond, with the oath of office required by
    sections 3.22 and 3.23 of the Revised Code and Section 7 of Article XV, Ohio Constitution,
    and the approval of the board indorsed thereon, shall be deposited with the county
    treasurer and kept in the treasurer''s office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.03
- number: '315.05'
  heading: Delivery of effects to successor in office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'On leaving office, the county engineer shall deliver to his successor all
    books, papers, and other property and effects belonging to such office. In case
    of the failure of such engineer to do so, an action may be brought by his successor
    for the delivery of such property and effects, and for a forfeiture of five hundred
    dollars.

    If the successor to such engineer recovers in such action, he shall have judgment
    for the articles so withheld, or for their value, and for any sum not more than
    five hundred dollars that the jury or the court assesses as a forfeiture.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.05
- number: '315.06'
  heading: Removal of engineer by civil action
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: Any person may bring a civil action in the court of common pleas against the
    county engineer, alleging such engineer's incapacity, misconduct in office, or
    neglect of duty. A copy of the petition with the summons shall be served on such
    engineer. Such cause shall have precedence over other business, and, if upon trial
    thereof, the court finds an engineer guilty of any of the charges, by the judgment
    of the court he shall be removed from office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.06
- number: '315.07'
  heading: Action on engineer's bond
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: Any person injured by the misconduct or neglect of the county engineer or
    his deputy may bring an action on the official bond of such engineer or deputy
    and recover judgment for any loss or damage sustained by reason of such misconduct
    or neglect.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.07
- number: '315.08'
  heading: Duties of county engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: The county engineer shall perform for the county all duties authorized or
    declared by law to be done by a registered professional engineer or registered
    surveyor, except those duties described in sections 307.37 and 307.38 and Chapters
    343., 6103., and 6117. of the Revised Code. The engineer shall prepare all plans,
    specifications, details, estimates of cost, and submit forms of contracts for
    the construction, maintenance, and repair of all bridges, culverts, roads, drains,
    ditches, roads on county fairgrounds, and other public improvements, except buildings,
    constructed under the authority of any board within and for the county. The engineer
    shall not be required to prepare plans, specifications, details, estimates of
    costs, or forms of contracts for emergency repairs authorized under section 315.13
    of the Revised Code, unless the engineer determines them necessary.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.08
- number: '315.10'
  heading: County maintenance engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'The county engineer may designate one of his deputies as county maintenance
    engineer. Such deputy shall be a person experienced in the maintenance and repair
    of roads, and he shall, acting under the general direction and supervision of
    the engineer, have charge of all road maintenance and repair work carried forward
    under the supervision of the engineer.

    The engineer, when authorized by the board of county commissioners, shall appoint
    maintenance supervisors to have charge of the maintenance of improved highways
    within districts established by the board and engineer and containing not less
    than ten miles of improved county roads. The supervisor shall act under the direction
    of the engineer, and the engineer, when authorized by the board, shall establish
    a patrol or gang system of maintenance under the direct charge of such supervisors.
    The compensation of such supervisors shall be fixed upon a per diem basis by the
    board, and shall be paid out of the road repair or county road fund, upon the
    approval of the engineer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.10
- number: '315.11'
  heading: Office of county engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: '(A) The county engineer shall keep the engineer''s office in the county seat,
    or at another location as provided in division (B) of this section, in such rooms
    as are provided by the board of county commissioners, and which shall be furnished
    with all necessary cases and other suitable articles at the expense of the county.
    Such office shall also be furnished with all tools, instruments, books, blanks,
    and stationery necessary for the proper discharge of the official duties of such
    engineer. The cost and expense of such equipment shall be allowed and paid from
    the general fund of the county upon the approval of the board. The engineer and
    each assistant and deputy of such engineer shall be allowed reasonable and necessary
    expenses, incurred in the performance of official duties.

    (B) With the consent of the county engineer, the board of county commissioners
    may provide by resolution for establishment of the primary office of the county
    engineer at a location outside the county seat. The adoption of the resolution
    and the location of the engineer''s primary office shall be entered on the journal
    of the board. The board shall give reasonable public notice of its action taken
    pursuant to this division in accordance with division (F) of section 121.22 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.11
- number: '315.12'
  heading: Office to be maintained partially from motor vehicle taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: '(A) Two thirds of the cost of operation of the office of county engineer,
    including the salaries of all of the employees and the cost of the maintenance
    of such office as provided by the annual appropriation made by the board of county
    commissioners for such purpose, shall be paid out of the county''s share of the
    fund derived from the receipts from motor vehicle licenses, as distributed under
    section 4501.04 of the Revised Code, and from the county''s share of the fund
    derived from the motor vehicle fuel tax as distributed under section 5735.27 of
    the Revised Code.

    (B) Where employees of the county engineer are temporarily assigned to perform
    engineering and plan preparation work on a bond-financed project, their salaries
    and expenses for such work may be paid from the proceeds from the sale of such
    bonds, instead of from the fund as provided in division (A) of this section, from
    whence their salaries and expenses are ordinarily paid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.12
- number: '315.13'
  heading: Emergency repairs - county engineer's emergency repair fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'The county engineer shall make all emergency repairs on all roads, bridges,
    and culverts in the county, including state highways, and shall keep on hand at
    all times a supply of material for the purposes of making such repairs. Upon report
    to the engineer of any road or bridge in the county needing immediate attention,
    such engineer shall, if he deems it an emergency repair, proceed at once to make
    such repair by force account, without preparing plans, specifications, estimates
    of cost, or forms of contract.

    The board of county commissioners may appropriate a sum of money each year sufficient
    to enable the county engineer to carry out this section. Such sum shall constitute
    the "county engineer''s emergency repair fund." All expenses incurred in employing
    extra help or in purchasing materials used in such repairs shall be paid from
    such fund on vouchers signed by the engineer.

    Necessary repairs, the total cost of which is not more than five thousand dollars,
    shall be deemed as necessary for emergency repairs.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.13
- number: '315.14'
  heading: Inspection - records - surveys
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: The county engineer shall be responsible for the inspection of all public
    improvements made under authority of the board of county commissioners. The engineer
    shall keep in suitable books a complete record of all estimates and summaries
    of bids received and contracts for the various improvements, together with the
    record of all estimates made for payments on that work. The engineer shall make
    all surveys required by law, shall perform all necessary services to be performed
    by a registered surveyor or registered professional engineer in connection with
    the construction, repair, or opening of all county roads or ditches constructed
    under the authority of the board, and shall perform other duties as the board
    requires, provided that the duties described in sections 307.37 and 307.38 and
    Chapters 343., 6103., and 6117. of the Revised Code shall be performed only pursuant
    to an agreement between the county engineer and the board. An agreement of that
    type may provide for the county engineer's performance of duties described in
    one or more of those sections or chapters, and may provide for the county engineer's
    performance of all duties imposed upon a county sanitary engineer under Chapters
    6103. and 6117. of the Revised Code or only the duties imposed upon a county sanitary
    engineer under Chapter 6117. of the Revised Code in relation to drainage. The
    board shall determine the compensation for performance of the relevant duties
    described in sections 307.37 and 307.38 and Chapters 343., 6103., and 6117. of
    the Revised Code and shall pay the county engineer from funds available under
    the applicable section or chapter or from the general fund of the county. The
    performance of the relevant duties described in sections 307.37 and 307.38 and
    Chapters 343., 6103., and 6117. of the Revised Code shall not constitute engaging
    in the private practice of engineering or surveying.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.14
- number: '315.15'
  heading: Examination of witnesses
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: When a county engineer or his deputy is called upon to make a survey to be
    offered as evidence, the adverse party having notice of the time of the making
    of such survey, the county engineer or deputy, upon application of either party
    to the cause of action, shall administer an oath to any witness brought to prove
    any corner or line of such survey, or the existence of any natural or artificial
    object or mark which is necessary to identify any corner or line of such survey.
    Such testimony shall be reduced to writing, subscribed by the witnesses, and return
    thereof made to the court with the return of the survey.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.15
- number: '315.16'
  heading: Calculation of contents of tract of land
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: When a survey or calculation is to be used as evidence, all calculations,
    by the county engineer or other person, to ascertain the contents of a tract of
    land shall be made by latitude and departure. On such plat, the person making
    such survey or calculation shall note the variation of the magnetic needle from
    the original course of such survey.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.16
- number: '315.17'
  heading: Survey of land in two counties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: When a tract of land is situated in two or more counties, or when the beginning
    of the entry or survey on which such tract of land depends is in a different county
    from that in which part of such tracts of land are, the court of common pleas,
    in either of such counties, may issue an order of survey to the county engineer
    of either of such counties, who shall survey such tract of land and run and lay
    down the entry or survey lines necessary to establish it.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.17
- number: '315.18'
  heading: Survey of lands sold for taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: On the application of any person producing to the county engineer a certificate
    from the proper officer, the engineer or the engineer's deputy may survey all
    lands that have been sold for taxes, which lie within the engineer's county. When
    a portion of any land or lot has been sold for taxes, and, after the sale and
    before a survey of the land or lot, the land or lot is set off to another county
    by the erection of a new county or change of county lines, the engineer of the
    county in which the sale was made may make the survey, and the county auditor
    of the same county shall make the deed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.18
- number: '315.21'
  heading: Court may appoint a person to resurvey lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: When it appears that the county engineer is interested in a survey, the title
    of which is disputed before the court of common pleas, or if such engineer is
    not commissioned and qualified, the court shall direct the resurvey to be made
    by a capable disinterested person, who shall return such resurvey to the court,
    on oath.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.21
- number: '315.22'
  heading: Survey as evidence
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: No survey made by the county engineer or his deputy, unless made by an order
    of the court of common pleas, or made in accordance with sections 315.15 to 315.18
    of the Revised Code, shall be considered evidence.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.22
- number: '315.23'
  heading: Acknowledgments by engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: The county engineer shall have the same power as judges of county courts to
    take and certify the acknowledgments of deeds, mortgages, powers of attorney,
    and other instruments affecting real estate, to administer oaths, and to take
    and certify affidavits and depositions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.23
- number: '315.24'
  heading: Field notes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'When so directed by the board of county commissioners, the county engineer
    shall procure from any office in this state where it may be procured, a certified
    plat, together with the field notes of the corners and bearing trees to each section,
    quarter section, lot, or original survey in his county, and cause it to be preserved
    in a book provided by him for that purpose, which book shall be deposited in the
    office of the engineer for the use of the landholders in such county. A certified
    copy from such book by the engineer shall be received as prima-facie evidence
    in all cases in which the original would be received.

    The expenses incurred by reason of this section shall be paid from the county
    treasury on the warrant of the county auditor.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.24
- number: '315.25'
  heading: Record to be kept by county engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: '(A) The county engineer shall make and keep, in a book provided for that
    purpose, an accurate record of all surveys made by the engineer or the engineer''s
    deputies for the purpose of locating any land or road lines, or fixing any corner
    or monument by which it may be determined, whether official or otherwise. Such
    surveys shall include corners, distances, azimuths, angles, calculations, plats,
    and a description of the monuments set up, with such references thereto as will
    aid in finding the names of the parties for whom the surveys are made, and the
    date of making such surveys. Such book shall be kept as a public record by the
    engineer at the engineer''s office, and it shall be at all proper times open to
    inspection and examination by all persons interested therein. Any other surveys
    made in the county by competent surveyors, certified by such surveyor to be correct
    and deemed worthy of preservation, may, by order of the board of county commissioners,
    be recorded by the engineer.

    (B) The county engineer shall keep confidential information that is subject to
    a real property confidentiality notice under section 111.431 of the Revised Code,
    in accordance with that section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.25
- number: '315.251'
  heading: Minimum standards for boundary surveys
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'If a deed conveying title to real property is presented to the county auditor
    for transfer, and the deed contains a legal description for land that is a cut-up
    or split of the grantor''s one or more existing parcels of land as shown in the
    county auditor''s records, or if the legal description of the land conveyed in
    the deed is different from the legal description shown in the prior deed to the
    grantor, a boundary survey plat in conformity with the new description shall be
    submitted with the deed. The survey plat and description shall satisfy the minimum
    standards for boundary surveys promulgated by the board of registration for professional
    engineers and surveyors pursuant to Chapter 4733. of the Revised Code. If, in
    the opinion of the county engineer, the survey plat and description satisfy those
    standards, the county auditor shall accept the deed for transfer and a copy of
    the survey plat shall be filed in the county engineer''s survey file for public
    inspection.

    This section applies only if the requirements of this section are included in
    the standards governing conveyances of real property in the county adopted under
    section 319.203 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.251
- number: '315.26'
  heading: Engineer to transcribe records
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: When ordered to do so by the board of county commissioners, the county engineer
    shall transcribe any dilapidated maps and the records of plats and field notes
    of surveys from the records of the court of common pleas, probate court, or any
    other court, or from the office of the county auditor, county recorder, or other
    office in the state where they may be procured, into suitable books, which shall
    be placed among the records of the engineer's office and made a part of such records,
    and they shall have the same validity and legal effect as similar records in his
    office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.26
- number: '315.27'
  heading: Indexes to records of county engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: Unless otherwise ordered by the board of county commissioners, the county
    engineer shall make and keep up, in a manner convenient for reference, complete
    indexes to all the records in his office, alphabetically arranged by townships.
    Such indexes shall contain in their several columns the number or name of the
    original survey, section, tract, or lot in which such survey is located, the date
    of the execution thereof, the name of the surveyor making it, and the name of
    the party for whom the survey was made. The board may at any time during the progress
    of the work provided for in this section discontinue such work.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.27
- number: '315.28'
  heading: Survey of corners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'Any person who owns or is interested in a tract of land within this state,
    any corner or line of which has become lost or uncertain, or is in danger of becoming
    lost or uncertain by the removal, destruction, defacement, or perishing condition
    of any corner, witness or line tree, monument, or other cause, may call on the
    county engineer of the county in which the land lies to make a survey of such
    land, and may cause to be planted at any corner, or at proper places in any line
    thereof, a stone or post, noting particularly the situation and condition of the
    original corner trees or monuments called for in the original survey, if found,
    and of all other trees or monuments which it may be important or advisable to
    note, and of all the places of notoriety over or by which the lines of such survey
    pass.

    If it is a single tract divided by a county line, such person may call on the
    engineer of any county in which a part of such tract lies. The engineer shall
    make out a plat and certificate of such survey, under his hand, noting the names
    of the chainmen, markers, and other assistants in such survey, and of all other
    persons present at the planting of any stone or post. The engineer shall also
    note the variation of the compass from the original calls at the time of making
    such survey.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.28
- number: '315.29'
  heading: Establishment of corners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: When the corners of a survey as provided in section 315.28 of the Revised
    Code have been destroyed, the owner of such survey or of other lands, the title
    of which is affected by the loss of any such corner, may call on the engineer
    of the county in which the land is situated, who shall attend on the ground where
    it is intended to establish such corners, at such time as the applicant appoints.
    The engineer shall issue a subpoena, directed to any constable or other person
    fit to execute it, to cause such witnesses, from outside as well as within his
    county, as the person demanding such warrant or other interested person requires,
    to come before him. The engineer shall examine such witnesses on oath, touching
    the existence and situation of such corners, or any other matter in relation to
    the entry or survey of such land, and he shall take the testimony in writing which
    shall be signed by the witnesses and certified and signed by the engineer. In
    making a survey of the land and planting stones or posts at the corners, as provided
    in section 315.28 of the Revised Code, the engineer shall have reference to and
    be governed by the depositions so taken, and shall specify them in his certificate
    of survey, in which shall also be mentioned the names of the persons present at
    the planting of any cornerstone or post. No person who resides outside the county
    where such depositions are to be taken shall be bound to attend unless traveling
    fees, both going and returning, and for one day's attendance, have been tendered
    him. No witness attending from outside the county shall be obliged to attend more
    than one day unless additional fees for such attendance are tendered.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.29
- number: '315.30'
  heading: Notice of taking depositions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: Previous to taking depositions as provided by section 315.29 of the Revised
    Code, at least twenty days' notice shall be given to the owner, his agent or attorney,
    if known, who has adjoining lands. If such owner, agent, or attorney is not known,
    or resides out of this state, the applicant shall give notice of his intention
    to take depositions at a certain time and place, by advertisement for six consecutive
    weeks, in a public newspaper published in the county where the land lies. The
    last insertion of such notice shall be twenty days previous to the time of taking
    such depositions. In the notice a description of the adjoining lands shall be
    given. Evidence of the notice shall be furnished the engineer prior to his taking
    any deposition. With his proceedings, which shall be in writing, the engineer
    shall return the original notices with the evidence of their having been served,
    and a copy of the advertisement with evidence of publication. Such advertisement
    and evidence of publication shall be recorded with the survey and depositions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.30
- number: '315.31'
  heading: Record of plat
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: Any county engineer making surveys under sections 315.28 to 315.30, inclusive,
    of the Revised Code, shall record the plat and certificate of such surveys in
    a book kept by him for that purpose, together with the depositions, notices, advertisements,
    and the evidence in relation to such depositions, notices, and advertisements,
    and shall, on demand, deliver the original plat and certificate of the survey
    to the person at whose instance such survey was made or depositions taken.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.31
- number: '315.32'
  heading: Plat or certified copy and deposition evidence - exception
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: The plat and certificate made by any county engineer, or the depositions taken
    by such engineer, as provided by sections 315.28 to 315.31, inclusive, of the
    Revised Code, or a certified copy of such plat, certificate, or depositions from
    the engineer's office shall be evidence in any court in any cause in which the
    title of any land to which they apply is affected, but the depositions of witnesses
    so recorded shall only be received when such witnesses are dead or outside the
    jurisdiction of the court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.32
- number: '315.33'
  heading: Fees of engineer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: County engineers, chainmen, and markers shall receive a fee for services rendered
    under sections 315.28 to 315.32 of the Revised Code, but the fee shall not exceed
    the actual cost incurred by the county for labor, equipment, and materials. Witnesses
    shall receive the same fees and mileage as allowed by section 2335.06 of the Revised
    Code. All such expenses shall be paid by the persons applying for a survey and
    depositions, who may recover, from the persons owning the adjoining lands that
    are benefited by the perpetuation of such testimony, their equal proportion of
    the expense incurred in obtaining such evidence.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.33
- number: '315.34'
  heading: Establishment of surveyed or agreed corners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: 'Within his own county, a county engineer may call before him, examine on
    oath, and take in writing the testimony of any witnesses for the establishment
    of any surveyed or agreed corner of the lands of any person who applies to him,
    after notice has been given to the person holding adjoining lands, as required
    in taking testimony for the establishment of old or decayed corners of land by
    section 315.30 of the Revised Code. The taking of testimony under this section
    shall be under the same regulations and restrictions and in the same manner as
    provided by sections 315.28 to 315.33, inclusive, of the Revised Code.

    Testimony taken under this section shall have the same effect in law as evidence
    taken to perpetuate old or decayed corners under such sections. The engineer,
    other officers, and witnesses are entitled to demand and receive from the persons
    interested in the surveys and establishment of corners, under this section, the
    same fees as are allowed by section 315.33 of the Revised Code for similar services.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.34
- number: '315.35'
  heading: Dilapidated records may be transcribed
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: The county engineer may transcribe any dilapidated maps, records of plats,
    and field notes of surveys in his office if such work is directed by the board
    of county commissioners, into suitable books, provided by him for that purpose
    and paid for from the county treasury, which shall be placed among the records
    in his office, made a part of such records, and have the same validity and legal
    effect as other similar records in his office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.35
- number: '315.36'
  heading: Copies of transcribed records as evidence
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: After dilapidated maps, records of plats, and field notes or surveys have
    been transcribed and placed among the other records, as provided in section 315.35
    of the Revised Code, copies thereof, certified by the county engineer, shall be
    received in evidence in the same manner, and shall have the same force and effect
    as is given to copies of other records of maps, records of plats, and field notes
    of surveys.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.36
- number: '315.37'
  heading: Report of trespasses on public lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: When it comes to the knowledge of a county engineer that a trespass has been
    committed on any canal lands or on any lands appropriated by congress for the
    support of schools or for ministerial purposes of this state, he shall immediately
    ascertain the extent of such trespass, the names of the trespassers and of witnesses
    to such trespass, and report them to the prosecuting attorney. For such services
    the engineer shall be paid such compensation as the court allows from fines collected
    for such trespass and from the proceeds of sales of timber seized by the prosecuting
    attorney.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.37
- number: '315.39'
  heading: Damages for interference
  title:
    num: '3'
    name: Counties
  chapter:
    num: '315'
    name: Engineer
  text: Any person violating section 2921.31 of the Revised Code shall be liable for
    all damages sustained by any other person by the hindrance of the county engineer
    or his deputy, and all expenses and costs that accrue in consequence of the attendance
    of the sheriff, who, upon the call of such engineer or deputy, shall accompany
    and protect him.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-315.39
- number: '317.01'
  heading: County recorder - election and term
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: There shall be elected quadrennially in each county a county recorder, who
    shall assume office on the first Monday in January next after his election and
    shall hold such office for a period of four years.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.01
- number: '317.02'
  heading: Bond of county recorder - oath
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: Except as otherwise provided in section 3.061 of the Revised Code, before
    entering upon the duties of office, the county recorder shall give a bond, conditioned
    for the faithful discharge of the duties, signed by a bonding or surety company
    authorized to do business in this state, or, at the recorder's option, by two
    or more freeholders having real estate in the value of double the amount of the
    bond over and above all encumbrances to the state in the sum of not less than
    ten thousand dollars, the surety company and the amount of the bond to be approved
    by the board of county commissioners. The expense or premium for the bond shall
    be paid by the board and charged to the general fund of the county. The bond,
    with the oath of office required by sections 3.22 and 3.23 of the Revised Code,
    and by Section 7 of Article XV, Ohio Constitution, and the approval of the board
    indorsed thereon, shall be deposited with the county treasurer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.02
- number: '317.03'
  heading: Location of office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: The office of the county recorder shall be kept in such rooms at the county
    seat as the board of county commissioners provides.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.03
- number: '317.04'
  heading: Official seal
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: The county recorder shall keep a seal of office, to be procured at the expense
    of the county, which the county recorder shall affix to all certificates attached
    to copies of records.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.04
- number: '317.05'
  heading: Deputies
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: The county recorder may appoint deputies to aid in the performance of the
    county recorder's duties. Such an appointment or removal shall be in writing and
    filed with the county treasurer. The county recorder and the recorder's sureties
    shall be responsible for the deputies' neglect of duty or misconduct in office.
    Before entering upon the discharge of their duties, the deputies shall take the
    oath of office as prescribed in section 317.02 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.05
- number: '317.06'
  heading: Continuing education
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) Each county recorder who is newly elected to a full term of office shall
    attend and successfully complete at least fifteen hours of continuing education
    courses during the first year of the recorder''s term of office and complete at
    least another eight hours of such courses each year of the remaining term. Each
    county recorder who is elected to a subsequent term of office shall attend and
    successfully complete at least eight hours of such courses in each year of any
    subsequent term of office. To be counted toward the continuing education hours
    required by this section, a course must be approved by the Ohio recorders'' association.
    Any county recorder who teaches an approved course shall be entitled to credit
    for the course in the same manner as if the county recorder had attended the course.

    The Ohio recorders'' association shall record and, upon request, verify the completion
    of required course work for each county recorder and issue a statement to each
    county recorder of the number of hours of continuing education the county recorder
    has successfully completed. Each year the association shall send a list of the
    continuing education courses, and the number of hours each county recorder has
    successfully completed, to the auditor of state and shall provide a copy of this
    list to any other individual who requests it.

    The association shall issue a "failure to complete notice" to any county recorder
    required to complete continuing education courses under this section who fails
    to successfully complete at least fifteen hours of continuing education courses
    during the first year of the county recorder''s first term of office or to complete
    a total of at least thirty-nine hours of such courses, including the fifteen hours
    completed in the first year of the first term, by the end of that term. The association
    shall issue a "failure to complete notice" to any county recorder required to
    complete continuing education courses under this section who fails to successfully
    complete at least eight hours of continuing education courses each year of any
    subsequent term of office or to complete a total of at least thirty-two hours
    of such courses, by the end of that subsequent term. The notice is for informational
    purposes only and does not affect any individual''s ability to hold the office
    of county recorder.

    (B) The costs the county recorder must incur to meet the requirements of division
    (A) of this section, including registration fees, lodging and meal expenses, and
    travel expenses shall be paid from the county recorder''s technology fund, if
    such a fund has been established under section 317.321 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.06
- number: '317.07'
  heading: Delivery of seal, books, and records to successor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: Upon leaving office, each county recorder shall deliver to the county recorder's
    successor, the seal of office, all books, records, and other instruments of writing
    belonging to the office, and take the successor's receipt for them. In case of
    the county recorder's death, the county recorder's personal representatives shall
    deliver the seal, books, records, and instruments to the successor in office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.07
- number: '317.08'
  heading: Records to be kept by county recorder
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) The county recorder shall record all instruments in one general record
    series to be known as the "official records." The county recorder shall record
    in the official records all of the following instruments that are presented for
    recording, upon payment of the fees prescribed by law:

    (1) Deeds and other instruments of writing for the absolute and unconditional
    sale or conveyance of lands, tenements, and hereditaments;

    (2) Notices as provided in sections 5301.47 to 5301.56 of the Revised Code;

    (3) Judgments or decrees in actions brought under section 5303.01 of the Revised
    Code;

    (4) Declarations and bylaws, and all amendments to declarations and bylaws, as
    provided in Chapter 5311. of the Revised Code;

    (5) Affidavits as provided in sections 5301.252 and 5301.56 of the Revised Code;

    (6) Certificates as provided in section 5311.17 of the Revised Code;

    (7) Articles dedicating archaeological preserves accepted by the director of the
    Ohio history connection under section 149.52 of the Revised Code;

    (8) Articles dedicating nature preserves accepted by the director of natural resources
    under section 1517.05 of the Revised Code;

    (9) Conveyances of conservation easements and agricultural easements under section
    5301.68 of the Revised Code;

    (10) Instruments extinguishing agricultural easements under section 901.21 or
    5301.691 of the Revised Code or pursuant to the terms of such an easement granted
    to a charitable organization under section 5301.68 of the Revised Code;

    (11) Instruments or orders described in division (B)(2)(b) of section 5301.56
    of the Revised Code;

    (12) No further action letters issued under section 3746.11 of the Revised Code;

    (13) Covenants not to sue issued under section 3746.12 of the Revised Code;

    (14) Restrictions on the use of property contained in a deed or other instrument
    as provided in division (E) or (F) of section 3737.882 of the Revised Code;

    (15) Any easement executed or granted under section 3734.22, 3734.24, 3734.25,
    or 3734.26 of the Revised Code;

    (16) Any environmental covenant entered into in accordance with sections 5301.80
    to 5301.92 of the Revised Code;

    (17) Memoranda of trust, as described in division (A) of section 5301.255 of the
    Revised Code, that describe specific real property;

    (18) Agreements entered into under section 1506.44 of the Revised Code;

    (19) Mortgages, including amendments, supplements, modifications, and extensions
    of mortgages, or other instruments of writing by which lands, tenements, or hereditaments
    are or may be mortgaged or otherwise conditionally sold, conveyed, affected, or
    encumbered;

    (20) Executory installment contracts for the sale of land executed after September
    29, 1961, that by their terms are not required to be fully performed by one or
    more of the parties to them within one year of the date of the contracts;

    (21) Options to purchase real estate, including supplements, modifications, and
    amendments of the options, but no option of that nature shall be recorded if it
    does not state a specific day and year of expiration of its validity;

    (22) Any tax certificate sold under section 5721.33 of the Revised Code, or memorandum
    of it, that is presented for filing of record;

    (23) Powers of attorney, including all memoranda of trust, as described in division
    (A) of section 5301.255 of the Revised Code, that do not describe specific real
    property;

    (24) Plats and maps of town lots, of the subdivision of town lots, and of other
    divisions or surveys of lands, any center line survey of a highway located within
    the county, the plat of which shall be furnished by the director of transportation
    or county engineer, and all drawings and amendments to drawings, as provided in
    Chapter 5311. of the Revised Code;

    (25) Leases, memoranda of leases, and supplements, modifications, and amendments
    of leases and memoranda of leases, including a lease described in section 5301.09
    of the Revised Code;

    (26) Declarations executed pursuant to section 2133.02 of the Revised Code and
    durable powers of attorney for health care executed pursuant to section 1337.12
    of the Revised Code;

    (27) Unemployment compensation liens, internal revenue tax liens, and other liens
    in favor of the United States as described in division (A) of section 317.09 of
    the Revised Code, personal tax liens, mechanic''s liens, agricultural product
    liens, notices of liens, certificates of satisfaction or partial release of estate
    tax liens, discharges of recognizances, excise and franchise tax liens on corporations,
    broker''s liens, and liens provided for in section 1513.33, 1513.37, 3752.13,
    4141.23, 5164.56, or 5311.18 of the Revised Code;

    (28) Corrupt activity lien notices filed pursuant to section 2923.36 of the Revised
    Code and medicaid fraud lien notices filed pursuant to section 2933.75 of the
    Revised Code;

    (29) Deeds for the purchase of burial lots or other interment rights under section
    517.07 of the Revised Code.

    (B) All instruments or memoranda of instruments entitled to record shall be recorded
    in the order in which they are presented for recording.

    The recording of an option to purchase real estate, including any supplement,
    modification, and amendment of the option, under this section shall serve as notice
    to any purchaser of an interest in the real estate covered by the option only
    during the period of the validity of the option as stated in the option.

    (C) In addition to the official records, a county recorder may elect to keep a
    separate set of records that contain the instruments listed in division (A)(24)
    of this section.

    (D) As part of the official records, the county recorder shall keep a separate
    set of records containing all transfers, conveyances, or assignments of any type
    of tangible or intangible personal property or any rights or interests in that
    property if and to the extent that any person wishes to record that personal property
    transaction and if the applicable instrument is acknowledged before a notary public.
    If the transferor is a natural person, the notice of personal property transfer
    shall be recorded in the county in this state in which the transferor maintains
    the transferor''s principal residence. If the transferor is not a natural person,
    the notice of personal property transfer shall be recorded in the county in this
    state in which the transferor maintains its principal place of business. If the
    transferor does not maintain a principal residence or a principal place of business
    in this state and the transfer is to a trustee of a legacy trust formed pursuant
    to Chapter 5816. of the Revised Code, the notice of personal property transfer
    shall be recorded in the county in this state where that trustee maintains a principal
    residence or principal place of business. In all other instances, the notice of
    personal property transfer shall be recorded in the county in this state where
    the property described in the notice is located.'
