  url: https://codes.ohio.gov/ohio-revised-code/section-323.151
- number: '323.152'
  heading: Reductions in taxable value
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'In addition to the reduction in taxes required under sections 319.302, 319.303,
    and 319.304 of the Revised Code, taxes shall be reduced as provided in divisions
    (A) and (B) of this section.

    (A)(1)(a) Division (A)(1) of this section applies to any of the following persons:

    (i) A person who is permanently and totally disabled;

    (ii) A person who is sixty-five years of age or older;

    (iii) A person who is the surviving spouse of a deceased person who was permanently
    and totally disabled or sixty-five years of age or older and who applied and qualified
    for a reduction in taxes under this division in the year of death, provided the
    surviving spouse is at least fifty-nine but not sixty-five or more years of age
    on the date the deceased spouse dies.

    (b) Real property taxes on a homestead owned and occupied, or a homestead in a
    housing cooperative occupied, by a person to whom division (A)(1) of this section
    applies shall be reduced for each year for which an application for the reduction
    has been approved. The reduction shall equal one of the following amounts, as
    applicable to the person:

    (i) If the person received a reduction under division (A)(1) of this section for
    tax year 2006, the greater of the reduction for that tax year or the amount computed
    under division (A)(1)(c) of this section;

    (ii) If the person received, for any homestead, a reduction under division (A)(1)
    of this section for tax year 2013 or under division (A) of section 4503.065 of
    the Revised Code for tax year 2014 or the person is the surviving spouse of such
    a person and the surviving spouse is at least fifty-nine years of age on the date
    the deceased spouse dies, the amount computed under division (A)(1)(c) of this
    section.

    (iii) If the person is not described in division (A)(1)(b)(i) or (ii) of this
    section and the person''s total income does not exceed thirty thousand dollars,
    as adjusted under division (A)(1)(d) of this section, the amount computed under
    division (A)(1)(c) of this section.

    (c) The amount of the reduction under division (A)(1)(c) of this section equals
    the product of the following:

    (i) Twenty-five thousand dollars of the true value of the property in money, as
    adjusted under division (A)(1)(d) of this section;

    (ii) The assessment percentage established by the tax commissioner under division
    (B) of section 5715.01 of the Revised Code, not to exceed thirty-five per cent;

    (iii) The effective tax rate used to calculate the taxes charged against the property
    for the current year, where "effective tax rate" is defined as in section 323.08
    of the Revised Code;

    (iv) The quantity equal to one minus the sum of the percentage reductions in taxes
    received by the property for the current tax year under sections 319.302 and 319.303
    of the Revised Code and division (B) of section 323.152 of the Revised Code.

    (d) The tax commissioner shall adjust the total income threshold described in
    division (A)(1)(b)(iii) and the reduction amounts described in divisions (A)(1)(c)(i),
    (A)(2), and (A)(3) of this section by completing the following calculations in
    September of each year:

    (i) Determine the percentage increase in the gross domestic product deflator determined
    by the bureau of economic analysis of the United States department of commerce
    from the first day of January of the preceding calendar year to the last day of
    December of the preceding calendar year;

    (ii) Multiply that percentage increase by the total income threshold or reduction
    amount for the current tax year, as applicable;

    (iii) Add the resulting product to the total income threshold or the reduction
    amount, as applicable, for the current tax year;

    (iv) Round the resulting sum to the nearest multiple of one hundred dollars.

    The commissioner shall certify the amount resulting from each adjustment to each
    county auditor not later than the first day of December each year. The certified
    total income threshold amount applies to the following tax year for persons described
    in division (A)(1)(b)(iii) of this section. The certified reduction amount applies
    to the following tax year. The commissioner shall not make the applicable adjustment
    in any calendar year in which the amount resulting from the adjustment would be
    less than the total income threshold or the reduction amount for the current tax
    year.

    (2)(a) Real property taxes on a homestead owned and occupied, or a homestead in
    a housing cooperative occupied, by a disabled veteran shall be reduced for each
    year for which an application for the reduction has been approved. The reduction
    shall equal the product obtained by multiplying fifty thousand dollars of the
    true value of the property in money, as adjusted under division (A)(1)(d) of this
    section, by the amounts described in divisions (A)(1)(c)(ii) to (iv) of this section.
    The reduction is in lieu of any reduction under section 323.158 of the Revised
    Code or division (A)(1), (2)(b), or (3) of this section. The reduction applies
    to only one homestead owned and occupied by a disabled veteran.

    (b) Real property taxes on a homestead owned and occupied, or a homestead in a
    housing cooperative occupied, by the surviving spouse of a disabled veteran shall
    be reduced for each year an application for exemption is approved. The reduction
    shall equal to the amount of the reduction authorized under division (A)(2)(a)
    of this section.

    The reduction is in lieu of any reduction under section 323.158 of the Revised
    Code or division (A)(1), (2)(a), or (3) of this section. The reduction applies
    to only one homestead owned and occupied by the surviving spouse of a disabled
    veteran. A homestead qualifies for a reduction in taxes under division (A)(2)(b)
    of this section beginning in one of the following tax years:

    (i) For a surviving spouse described in division (L)(1) of section 323.151 of
    the Revised Code, the year the disabled veteran dies;

    (ii) For a surviving spouse described in division (L)(2) of section 323.151 of
    the Revised Code, the first year on the first day of January of which the total
    disability rating described in division (F) of that section has been received
    for the deceased spouse.

    In either case, the reduction shall continue through the tax year in which the
    surviving spouse dies or remarries.

    (3) Real property taxes on a homestead owned and occupied, or a homestead in a
    housing cooperative occupied, by the surviving spouse of a public service officer
    killed in the line of duty shall be reduced for each year for which an application
    for the reduction has been approved. The reduction shall equal the product obtained
    by multiplying fifty thousand dollars of the true value of the property in money,
    as adjusted under division (A)(1)(d) of this section, by the amounts described
    in divisions (A)(1)(c)(ii) to (iv) of this section. The reduction is in lieu of
    any reduction under section 323.158 of the Revised Code or division (A)(1) or
    (2) of this section. The reduction applies to only one homestead owned and occupied
    by such a surviving spouse. A homestead qualifies for a reduction in taxes under
    division (A)(3) of this section for the tax year in which the public service officer
    dies through the tax year in which the surviving spouse dies or remarries.

    (B)(1) As used in division (B) of this section, "qualifying levy" has the same
    meaning as in section 319.302 of the Revised Code.

    (2) To provide a partial exemption, real property taxes on any homestead, and
    manufactured home taxes on any manufactured or mobile home on which a manufactured
    home tax is assessed pursuant to division (D)(2) of section 4503.06 of the Revised
    Code, shall be reduced for each year for which an application for the reduction
    has been approved. The amount of the reduction shall equal one of the following
    percentages of the amount of taxes to be levied by qualifying levies on the homestead
    or the manufactured or mobile home after applying section 319.301 of the Revised
    Code:

    (a) For the first tax year to which this amendment applies, 5.70%;

    (b) For the following tax year, 8.92%;

    (c) For the second following tax year, 12.15%;

    (d) For the third following tax year and every year thereafter, 15.38%.

    (3) A board of county commissioners, by resolution, may authorize a partial exemption
    from the real property taxes or manufactured home taxes on any property or manufactured
    or mobile home that receives the partial exemption under division (B)(2) of this
    section. The resolution shall specify the amount of the partial exemption, which
    may equal up to two and one-half per cent of the amount of taxes to be levied
    by qualifying levies on the property or home after applying section 319.301 of
    the Revised Code. The partial exemption shall be applied concurrently with the
    partial exemption under division (B)(2) of this section, and no application shall
    be required under section 323.153 of the Revised Code to obtain the partial exemption
    authorized pursuant to this section.

    The board shall certify a copy of the resolution, or a copy of any resolution
    repealing or modifying the partial exemption''s authorization, to the county auditor
    and tax commissioner within thirty days after its adoption. If the resolution
    is adopted on or before the first day of July of a tax year, the partial exemption
    shall first apply or cease to apply, in the case of real property taxes, to that
    tax year or, in the case of manufactured home taxes, the following tax year. If
    the resolution is adopted after the first day of July of a tax year, the partial
    exemption shall first apply or cease to apply, in the case of real property taxes,
    to the following tax year or, in the case of manufactured home taxes, the second
    succeeding tax year.

    (C) The reductions granted by this section do not apply to special assessments
    or respread of assessments levied against the homestead, and if there is a transfer
    of ownership subsequent to the filing of an application for a reduction in taxes,
    such reductions are not forfeited for such year by virtue of such transfer.

    (D) The reductions in taxable value referred to in this section shall be applied
    solely as a factor for the purpose of computing the reduction of taxes under this
    section and shall not affect the total value of property in any subdivision or
    taxing district as listed and assessed for taxation on the tax lists and duplicates,
    or any direct or indirect limitations on indebtedness of a subdivision or taxing
    district. If after application of sections 5705.31 and 5705.32 of the Revised
    Code, including the allocation of all levies within the ten-mill limitation to
    debt charges to the extent therein provided, there would be insufficient funds
    for payment of debt charges not provided for by levies in excess of the ten-mill
    limitation, the reduction of taxes provided for in sections 323.151 to 323.159
    of the Revised Code shall be proportionately adjusted to the extent necessary
    to provide such funds from levies within the ten-mill limitation.

    (E) No reduction shall be made on the taxes due on the homestead of any person
    convicted of violating division (D) or (E) of section 323.153 of the Revised Code
    for a period of three years following the conviction.'
