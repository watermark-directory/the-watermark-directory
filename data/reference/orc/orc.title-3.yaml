- number: '323.51'
  heading: Prosecuting attorney shall represent county treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: The prosecuting attorney shall represent the county treasurer in all proceedings
    authorized by sections 323.49 and 323.50 of the Revised Code. Upon motion of the
    prosecuting attorney, any such proceeding shall be taken out of its order upon
    the docket and assigned for trial at the earliest practicable day. Neither the
    treasurer nor the prosecuting attorney shall be entitled to any additional compensation
    for the services performed under said sections.
