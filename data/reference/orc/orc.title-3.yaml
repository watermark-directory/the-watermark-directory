- number: '308.20'
  heading: Airport development districts - definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'As used in sections 308.20 to 308.25 of the Revised Code:

    (A) "Qualifying airport" means an airport and any contiguous airport facilities
    owned, operated, or maintained by any of the following:

    (1) A regional airport authority under this chapter, provided the airport and
    facilities include territory located in two counties, one of which has a population
    greater than five hundred thousand but less than eight hundred thousand based
    on the most recent federal decennial census;

    (2) A port authority created under Chapter 4582. of the Revised Code by two counties,
    each of which having a population greater than two hundred thousand but less than
    two hundred fifty thousand;

    (3) A municipal corporation that is the most populous municipal corporation in
    a county having a population greater than five hundred thousand but less than
    eight hundred forty thousand. The airport and facilities owned, operated, or maintained
    by such a municipal corporation may include territory located in two counties.

    (B) "Property owner" or "owner of property" means the person or persons in whose
    name a parcel is listed on the tax list or exempt list compiled by the county
    auditor under section 319.28 or 5713.08 of the Revised Code.

    (C) "Business owner" or "owner of business" means a partner of a partnership,
    a member of a limited liability company, a majority shareholder of an S corporation,
    a person with a majority ownership interest in any other kind of pass-through
    entity, or any officer, employee, or agent with authority to make decisions legally
    binding upon a business.

    (D) "Development charge agreement" means a voluntary agreement entered into under
    section 308.23 of the Revised Code.'
