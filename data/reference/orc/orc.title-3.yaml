- number: '340.021'
  heading: County alternatives for providing alcohol and drug addiction services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: '(A) In an alcohol, drug addiction, and mental health service district where
    the board of county commissioners has established an alcohol and drug addiction
    services board, the community mental health board established under former section
    340.02 of the Revised Code shall serve as the entity responsible for providing
    mental health services in the county. A community mental health board has all
    the powers, duties, and obligations of a board of alcohol, drug addiction, and
    mental health services with regard to mental health services. An alcohol and drug
    addiction services board has all the powers, duties, and obligations of a board
    of alcohol, drug addiction, and mental health services with regard to addiction
    services. Any provision of the Revised Code that refers to a board of alcohol,
    drug addiction, and mental health services with regard to mental health services
    also refers to a community mental health board and any provision that refers to
    a board of alcohol, drug addiction, and mental health services with regard to
    alcohol and drug addiction services also refers to an alcohol and drug addiction
    services board.

    An alcohol and drug addiction services board shall consist of eighteen members
    or fourteen members, at the election of the board. Not later than January 1, 2014,
    each alcohol and drug addiction services board shall notify the department of
    behavioral health of its election to operate as an eighteen-member board or to
    operate as a fourteen-member board. The election shall be final. Failure to provide
    notice of its election to the department on or before January 1, 2014, shall constitute
    an election to continue to operate as an eighteen-member board. If an existing
    board provides timely notice of its election to operate as a fourteen-member board,
    the number of board members may decline from eighteen to fourteen by attrition
    as current members'' terms expire. However, the composition of the board must
    reflect the requirements set forth in this section and in applicable provisions
    of section 340.02 of the Revised Code for fourteen-member boards. For boards operating
    as eighteen-member boards, six members shall be appointed by the director of behavioral
    health and twelve members shall be appointed by the board of county commissioners.
    The director of behavioral health shall ensure that at least one member of the
    board is a person who has received or is receiving services for alcohol, drug,
    or gambling addiction, at least one member is a parent or relative of such a person,
    and at least one member is a clinician with experience in the delivery of addiction
    services. The membership of the board shall, as nearly as possible, reflect the
    composition of the population of the service district as to race and sex. Members
    shall be residents of the service district and shall be interested in alcohol,
    drug, or gambling addiction services. Requirements for membership, including prohibitions
    against certain family and business relationships, and terms of office shall be
    the same as those for members of boards of alcohol, drug addiction, and mental
    health services.

    A community mental health board shall consist of eighteen members or fourteen
    members, at the election of the board. Not later than January 1, 2014, each community
    mental health board shall notify the department of behavioral health of its election
    to operate as an eighteen-member board or to operate as a fourteen-member board.
    The election shall be final. Failure to provide notice of its election to the
    department on or before January 1, 2014, shall constitute an election to continue
    to operate as an eighteen-member board. If an existing board provides timely notice
    of its election to operate as a fourteen-member board, the number of board members
    may decline from eighteen to fourteen by attrition as current members'' terms
    expire. However, the composition of the board must reflect the requirements set
    forth in this section and in applicable provisions of section 340.02 of the Revised
    Code for fourteen-member boards. For boards operating as eighteen-member boards,
    six members shall be appointed by the director of behavioral health and twelve
    members shall be appointed by the board of county commissioners. The director
    of behavioral health shall ensure that at least one member of the board is a person
    who has received or is receiving mental health services, at least one member is
    a parent or relative of such a person, and at least one member is a clinician
    with experience in the delivery of mental health services. The membership of the
    board as nearly as possible shall reflect the composition of the population of
    the service district as to race and sex. Members shall be residents of the service
    district and shall be interested in mental health services. Requirements for membership,
    including prohibitions against certain family and business relationships, and
    terms of office shall be the same as those for members of boards of alcohol, drug
    addiction, and mental health services.

    (B)(1) If a board of county commissioners subject to division (A) of this section
    did not adopt a final resolution providing for a board of alcohol, drug addiction,
    and mental health services on or before July 1, 2007, the board of county commissioners
    may establish a board of alcohol, drug addiction, and mental health services on
    or after September 23, 2008. To establish the board, the board of county commissioners
    shall adopt a resolution providing for the board''s establishment. The composition
    of the board, the procedures for appointing members, and all other matters related
    to the board and its members are subject to section 340.02 of the Revised Code,
    with the following exceptions:

    (a) For initial appointments to the board, the county''s community mental health
    board and alcohol and drug addiction services board shall jointly recommend members
    of those boards for reappointment and shall submit the recommendations to the
    board of county commissioners and the director of behavioral health.

    (b) The appointing authorities shall appoint the initial members from among the
    members jointly recommended under division (B)(1)(a) of this section unless the
    appointment is otherwise prohibited by law.

    (2) If a board of alcohol, drug addiction, and mental health services is established
    pursuant to division (B)(1) of this section, the board has the same rights, privileges,
    immunities, powers, and duties that were possessed by the county''s community
    mental health board and alcohol and drug addiction services board. When the board
    is established, all property and obligations of the community mental health board
    and alcohol and drug addiction services board shall be transferred to the board
    of alcohol, drug addiction, and mental health services.'
