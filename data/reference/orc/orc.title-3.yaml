- number: '319.40'
  heading: Omitted taxes shall be charged
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: When the county auditor is satisfied that lots or lands on the tax list or
    duplicate have not been charged with either the county, township, municipal corporation,
    or school district tax, he shall charge against it all such omitted tax for the
    preceding years, not exceeding five years, unless in the meantime such lands or
    lots have changed ownership, in which case only the taxes chargeable since the
    last change of ownership shall be so charged.
