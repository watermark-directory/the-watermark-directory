  url: https://codes.ohio.gov/ohio-revised-code/section-340.022
- number: '340.03'
  heading: Boards of alcohol, drug addiction, and mental health services; powers and
    duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: '(A) Subject to rules issued by the director of behavioral health after consultation
    with relevant constituencies as required by division (A)(10) of section 5119.21
    of the Revised Code, each board of alcohol, drug addiction, and mental health
    services shall:

    (1) Serve as the community addiction and mental health planning agency for the
    county or counties under its jurisdiction, and in so doing it shall:

    (a) Evaluate the need for facility services, addiction services, mental health
    services, and recovery supports;

    (b) In cooperation with other local and regional planning and funding bodies and
    with relevant ethnic organizations, evaluate strengths and challenges and set
    priorities for addiction services, mental health services, and recovery supports.
    With respect to setting priorities, all of the following apply:

    (i) A board shall include treatment and prevention services when setting priorities
    for addiction services and mental health services.

    (ii) When a board sets priorities for addiction services, the board shall consult
    with the county commissioners of the counties in the board''s service district
    regarding the services described in section 340.15 of the Revised Code and shall
    give priority to those services, except that those services shall not have a priority
    over services provided to pregnant women under programs developed in relation
    to the mandate established in section 5119.17 of the Revised Code.

    (iii) As part of setting priorities through its community addiction and mental
    health plan, a board may consider any local mechanisms that have been established
    for determining eligibility for services and supports.

    (c) In accordance with guidelines issued by the director of behavioral health
    under division (G) of section 5119.22 of the Revised Code, annually develop and
    submit to the department of behavioral health a community addiction and mental
    health plan that addresses both of the following:

    (i) The needs of all residents of the service district currently receiving inpatient
    services in state-operated hospitals, the needs of other populations as required
    by state or federal law or programs, and the needs of all children subject to
    a determination made pursuant to section 121.38 of the Revised Code;

    (ii) The department''s priorities for facility services, addiction services, mental
    health services, and recovery supports during the period for which the plan will
    be in effect. The department shall inform all of the boards of the department''s
    priorities in a timely manner that enables the boards to know the department''s
    priorities before the boards develop and submit the plans.

    In alcohol, drug addiction, and mental health service districts that have separate
    alcohol and drug addiction services and community mental health boards, the alcohol
    and drug addiction services board shall submit a community addiction plan and
    the community mental health board shall submit a community mental health plan.
    Each board shall consult with its counterpart in developing its plan and address
    the interaction between the local addiction and mental health systems and populations
    with regard to needs and priorities in developing its plan.

    The director shall approve or disapprove the plan, in whole or in part, in accordance
    with division (H) of section 5119.22 of the Revised Code. Eligibility for state
    and federal funding shall be contingent upon an approved plan or relevant part
    of a plan.

    If a board determines that it is necessary to amend an approved plan, the board
    shall submit a proposed amendment to the director. The director shall approve
    or disapprove all or part of the amendment in accordance with division (I) of
    section 5119.22 of the Revised Code.

    The board shall operate in accordance with the plan approved by the director.

    (d) Promote, arrange, and implement working agreements with social service agencies,
    both public and private, and with judicial agencies.

    (2) Investigate, or request another agency to investigate, any complaint alleging
    abuse or neglect of any person receiving addiction services, mental health services,
    or recovery supports from a community addiction services provider or community
    mental health services provider or alleging abuse or neglect of a resident receiving
    addiction services or with mental illness or severe mental disability residing
    in a residential facility licensed under section 5119.34 of the Revised Code.
    If the person is a resident of a service district other than the district represented
    by the board that received the complaint, the board that received the complaint
    shall refer the complaint to the board of the district where the residential facility
    is located for that board to investigate the complaint.

    If a board''s investigation substantiates the charge of abuse or neglect, the
    board shall take whatever action it determines is necessary to correct the situation,
    including notification of the appropriate authorities. Upon request, the board
    shall provide information about such investigations to the department.

    (3) For the purpose of section 5119.36 of the Revised Code, cooperate with the
    director of behavioral health in visiting and evaluating whether the certifiable
    services and supports of a community addiction services provider or community
    mental health services provider satisfy the certification standards established
    by rules adopted under that section. In addition, a board may provide input and
    recommendations to the department when an application for certification or the
    renewal of a certification has been submitted by a provider or when a provider
    is being investigated by the department, if the board, in either of those circumstances,
    is aware of information that would be beneficial to the department''s consideration
    of the matter.

    (4) In accordance with criteria established under division (D)(1) of section 5119.22
    of the Revised Code, conduct program audits that review and evaluate the quality,
    effectiveness, and efficiency of addiction services, mental health services, and
    recovery supports provided by community addiction services providers and community
    mental health services providers under contract with the board and submit the
    board''s findings and recommendations to the department of behavioral health;

    (5) In accordance with section 5119.34 of the Revised Code, review an application
    for a residential facility license and provide to the department of behavioral
    health any information about the applicant or facility that the board would like
    the department to consider in reviewing the application;

    (6) In accordance with guidelines issued under division (E) of section 5119.22
    of the Revised Code and any related rules adopted under that section, review any
    annual financial audit reports that have been submitted to the board regarding
    each community addiction services provider and community mental health services
    provider with which the board has contracted under section 340.036 of the Revised
    Code to provide services and supports certified under section 5119.36 of the Revised
    Code;

    (7) Recruit and promote local financial support for addiction services, mental
    health services, and recovery supports from private and public sources;

    (8) In accordance with guidelines issued by the department as necessary to comply
    with state and federal laws pertaining to financial assistance, approve fee schedules
    and related charges or adopt a unit cost schedule or other methods of payment
    for addiction services, mental health services, and recovery supports provided
    by community addiction services providers and community mental health services
    providers that have contracted with the board under section 340.036 of the Revised
    Code;

    (9) Submit to the director and the county commissioners of the county or counties
    served by the board, and make available to the public, an annual report of the
    addiction services, mental health services, and recovery supports under the jurisdiction
    of the board, including a fiscal accounting;

    (10) Establish a method for evaluating referrals for court-ordered treatment and
    affidavits filed pursuant to section 5122.11 of the Revised Code in order to assist
    the probate division of the court of common pleas in determining whether there
    is probable cause that a respondent is subject to court-ordered treatment and
    whether alternatives to hospitalization are available and appropriate;

    (11) Designate the treatment services, provider, facility, or other placement
    for each person involuntarily committed to the board pursuant to Chapter 5122.
    of the Revised Code. The board shall provide the least restrictive and most appropriate
    alternative that is available for any person involuntarily committed to it and
    shall assure that the list of addiction services, mental health services, and
    recovery supports submitted and approved in accordance with division (B) of section
    340.08 of the Revised Code are available to persons with severe mental disabilities
    residing within its service district. The board shall establish the procedure
    for authorizing payment for the services and supports, which may include prior
    authorization in appropriate circumstances. In accordance with section 340.037
    of the Revised Code, the board may provide addiction services and mental health
    services directly to a person with a severe mental disability when life or safety
    is endangered and when no community addiction services provider or community mental
    health services provider is available to provide the service.

    (12) Ensure that housing built, subsidized, renovated, rented, owned, or leased
    by the board or a community addiction services provider or community mental health
    services provider has been approved as meeting minimum fire safety standards and
    that persons residing in the housing have access to appropriate and necessary
    services, including culturally relevant services, from a community addiction services
    provider or community mental health services provider. This division does not
    apply to residential facilities licensed pursuant to section 5119.34 of the Revised
    Code.

    (13) Establish a mechanism for obtaining advice and involvement of persons receiving
    addiction services, mental health services, or recovery supports on matters pertaining
    to services and supports in the alcohol, drug addiction, and mental health service
    district;

    (14) Perform the duties required by rules adopted under section 5119.22 of the
    Revised Code regarding referrals by the board or community mental health services
    providers under contract with the board of individuals with mental illness or
    severe mental disability to class two residential facilities licensed under section
    5119.34 of the Revised Code and effective arrangements for ongoing mental health
    services for the individuals. The board is accountable in the manner specified
    in the rules for ensuring that the ongoing mental health services are effectively
    arranged for the individuals.

    (15) Perform the duties required by section 9.21 of the Revised Code regarding
    credit card accounts, including the requirement to adopt a written policy before
    first holding a credit card account.

    (B) Each board of alcohol, drug addiction, and mental health services shall establish
    such rules, operating procedures, standards, and bylaws, and shall perform such
    other duties, as may be necessary or proper to carry out the purposes of this
    chapter.

    (C) A board of alcohol, drug addiction, and mental health services may receive
    by gift, grant, devise, or bequest any moneys, lands, or property for the benefit
    of the purposes for which the board is established, and may hold and apply it
    according to the terms of the gift, grant, or bequest. All money received, including
    accrued interest, by gift, grant, or bequest shall be deposited in the treasury
    of the county, the treasurer of which is custodian of the alcohol, drug addiction,
    and mental health services funds, to the credit of the board. The money shall
    be made available for use by the board for purposes stated by the donor or grantor.

    (D) No member or employee of a board of alcohol, drug addiction, and mental health
    services shall be liable for injury or damages caused by any action or inaction
    taken within the scope of the member''s official duties or the employee''s employment,
    whether or not such action or inaction is expressly authorized by this section
    or any other section of the Revised Code, unless such action or inaction constitutes
    willful or wanton misconduct. Chapter 2744. of the Revised Code applies to any
    action or inaction by a member or employee of a board taken within the scope of
    the member''s official duties or employee''s employment. For the purposes of this
    division, the conduct of a member or employee shall not be considered willful
    or wanton misconduct if the member or employee acted in good faith and in a manner
    that the member or employee reasonably believed was in or was not opposed to the
    best interests of the board and, with respect to any criminal action or proceeding,
    had no reasonable cause to believe the conduct was unlawful.

    (E) The meetings held by any committee established by a board of alcohol, drug
    addiction, and mental health services shall be considered to be meetings of a
    public body subject to section 121.22 of the Revised Code.

    (F)(1) A board of alcohol, drug addiction, and mental health services may establish
    a rule, operating procedure, standard, or bylaw to allow the executive director
    of the board to execute both of the following types of contracts valued at twenty-five
    thousand dollars or less, as determined by the board, on behalf of the board without
    the board''s prior approval:

    (a) Emergency contracts for clinical services or recovery support services;

    (b) Standard service contracts pertaining to the board''s operations.

    (2) If a board establishes a rule, operating procedure, standard, or bylaw under
    division (F)(1) of this section, both of the following shall be the case:

    (a) The board shall define the scope of contracts described in divisions (F)(1)(a)
    and (b) of this section in that rule, operating procedure, standard, or bylaw.

    (b) The board shall disclose the existence of a contract executed pursuant to
    the rule, operating procedure, standard, or bylaw at the first board meeting that
    occurs after the contract was executed and ensure that a record of that disclosure
    is included in the written minutes of that meeting.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
