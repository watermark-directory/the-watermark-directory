- number: '303.25'
  heading: Repeal of county zoning plan by township
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'In any township in which there is in force a plan of county zoning, the plan
    may be repealed by the board of county commissioners, as to such township, in
    the following manner:

    (A) The board may adopt a resolution upon its own initiative.

    (B) The board shall adopt a resolution, if there is presented to it a petition,
    similar in all relevant aspects to that prescribed in section 303.12 of the Revised
    Code, signed by a number of qualified voters residing in the unincorporated area
    of such township included in the zoning plan equal to not less than eight per
    cent of the total vote cast for all candidates for governor in such area at the
    most recent general election at which a governor was elected, requesting the question
    of whether or not the plan of zoning in effect in such township shall be repealed,
    to be submitted to the electors residing in the unincorporated area of the township
    included in the zoning plan at a special election to be held on the day of the
    next primary or general election. The resolution adopted by the board of county
    commissioners to cause such question to be submitted to the electors shall be
    certified to the board of elections not later than ninety days prior to the day
    of election at which the question is to be voted upon. In the event a majority
    of the vote cast on such question in the township is in favor of repeal of zoning,
    then such regulations shall no longer be of any effect. Not more than one such
    election shall be held in any two calendar years.'
