- number: '345.16'
  heading: Employment of veterans
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'The board of trustees, for soldiers'' memorials under its control, shall
    employ only honorably discharged soldiers, sailors, and marines, both men and
    women, of the armed forces of the United States, if available, as caretakers,
    janitors, or employees.

    Employment of any person who is not such an honorably discharged soldier, sailor,
    or marine, without a showing on the journal of the board that none of the latter
    were available, shall be void, and it shall be unlawful to pay any money out of
    any fund to such person.'
