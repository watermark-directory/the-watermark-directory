- number: '325.111'
  heading: Compensation for prosecuting attorneys electing not to engage in private
    practice
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: If the prosecuting attorney in a county with a population of less than seventy
    thousand one elects not to engage in the private practice of law, forty per cent
    of the difference between the compensation as a prosecuting attorney who elects
    not to engage in the private practice of law and the compensation for a prosecuting
    attorney in a county included in the same population class who engages in the
    private practice of law shall be paid to the general fund of the county from the
    state treasury from funds appropriated to the attorney general for the purpose
    of reimbursing the county for a part of the cost of paying the compensation to
    the prosecuting attorney electing not to engage in the private practice of law.
    If adequate funds have been appropriated by the general assembly for the purposes
    of this section, not later than the fifteenth day of March and September of each
    year, the attorney general shall reimburse the fiscal officer of the county the
    amount of compensation paid under this section, the related amount of employer
    contributions made under Chapter 145. of the Revised Code as required by the public
    employees retirement board, and the related amount of the payments to the social
    security administration for employer contributions for Medicare part A. The fiscal
    officer shall deposit the revenue in the county treasury.
