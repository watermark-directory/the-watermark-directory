- number: '308.06'
  heading: Regional airport authority - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'Upon the creation of a regional airport authority as provided by section
    308.03 of the Revised Code, and upon the qualifying of its board of trustees and
    the election of a president and a vice-president, the authority shall exercise
    in its own name all the rights, powers, and duties vested in and conferred upon
    it by sections 308.01 to 308.17 of the Revised Code and, subject to such reservations,
    limitations, and qualifications as are set forth therein:

    (A) May sue or be sued in its corporate name;

    (B) May make contracts in the exercise of the rights, powers, and duties conferred
    upon it;

    (C) May adopt and at will alter a seal and use such seal by causing it to be impressed,
    affixed, reproduced, or otherwise used, but failure to affix the seal shall not
    affect the validity of any instrument;

    (D) May make, adopt, amend, and repeal bylaws for the administration of its affairs
    and rules for the control of the administration and operation of airports and
    airport facilities under its jurisdiction, and for the exercise of all of its
    rights of ownership therein;

    (E) May fix, alter, and collect rates and rentals and other charges for the use
    of airports and airport facilities under its jurisdiction to be determined exclusively
    by it for the purpose of providing for the payment of the expenses of the regional
    airport authority, the construction, improvement, extension, repair, maintenance,
    and operation of airports and airport facilities under its jurisdiction, the payment
    of principal and interest on its obligations, and to fulfill the terms of any
    agreements made with the purchasers or holders of any such obligations, or with
    any person or political subdivision;

    (F) Shall have jurisdiction, control, possession, and supervision of all property,
    rights, easements, licenses, moneys, contracts, accounts, liens, books, records,
    maps, or other property rights and interests conveyed, delivered, transferred,
    or assigned to it;

    (G) May acquire, construct, lease, operate, maintain, or manage airports and airport
    facilities within or without its territorial boundaries, considered necessary
    to accomplish the purposes of its organization;

    (H) May hold, encumber, control, acquire by donation, purchase, or condemnation,
    construct, own, lease as lessee or lessor, use, and sell real and personal property,
    or any interest or right therein, within or without its territorial boundaries,
    for the location or protection of airports and airport facilities and improvements
    and access thereto, the relocation of buildings, structures, and improvements
    situated on lands acquired by the regional airport authority, or for any other
    necessary purpose, or for obtaining or storing materials to be used in constructing,
    maintaining, and improving airports and airport facilities under its jurisdiction;

    (I) May exercise the power of eminent domain to acquire property or any interest
    therein, within or without its territorial boundaries, which is necessary or proper
    for the construction or efficient operation of any airport or airport facility
    or access thereto under its jurisdiction in accordance with the provisions of
    section 308.07 of the Revised Code;

    (J) May provide by agreement with any county, including the counties within its
    territorial boundaries, or any municipal corporation or any combination thereof
    for the making of necessary surveys, appraisals, and examinations preliminary
    to the acquisition or construction of any airport or airport facility and the
    amount of the expense thereof to be paid by each such county or municipal corporation;

    (K) May provide by agreement with any county, including the counties within its
    territorial boundaries, or any municipal corporation or any combination thereof
    for the acquisition, construction, maintenance, or operation of any airport or
    airport facility owned or to be owned and operated by it or owned or to be owned
    and operated by any such county or municipal corporation and the terms on which
    it shall be acquired, constructed, maintained, or operated, and the amount of
    the cost and expense thereof to be paid by each such county or municipal corporation;
    and any such county or municipal corporation may issue bonds in accordance with
    Chapter 133. of the Revised Code for the purpose of paying all or part of the
    cost assumed by it for the acquisition or construction of an airport or airport
    facilities pursuant to such agreement and may pay the proceeds of such bonds to
    the regional airport authority upon the finding and determination by its legislative
    authority that the benefits that will be derived from such airport or airport
    facilities by such county or municipal corporation and the taxpayers thereof are
    at least equal to its share of the cost thereof;

    (L) May issue revenue bonds for the purpose of acquiring or constructing any facility
    or permanent improvement which it is authorized to acquire or construct, including
    all costs in connection with and incidental to such acquisition or construction,
    and the financing thereof, as provided by section 308.08 of the Revised Code;

    (M) May employ and fix the compensation of consulting engineers, superintendents,
    managers, and such other engineering, construction, and accounting experts, attorneys,
    and other employees and agents necessary for the accomplishment of its purposes;

    (N) May procure insurance insuring it or its officers, employees, and agents against
    such losses, risks, and liabilities arising from the construction, operation,
    or ownership of airports and airport facilities under its jurisdiction as it deems
    necessary or desirable;

    (O) May maintain such funds as it considers necessary for the efficient performance
    of its duties;

    (P) May direct its agents or employees, when properly identified in writing, after
    at least five days'' written notice, to enter upon lands within or without its
    territorial boundaries in order to make surveys and examinations preliminary to
    the location and construction of airports or airport facilities, without liability
    to it or its agents or employees except for actual damage done;

    (Q) May, on its own motion, request the appropriate zoning board, as defined in
    section 4563.03 of the Revised Code, to establish and enforce zoning regulations
    pertaining to any airport or airport facility under its jurisdiction in the manner
    prescribed by sections 4563.01 to 4563.21 of the Revised Code.'
