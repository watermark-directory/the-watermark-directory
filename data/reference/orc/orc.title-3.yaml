- number: '306.54'
  heading: Dissolution or modification in membership
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: Subject to making due provisions for the payment and performance of its obligations,
    the resolution or ordinance creating the regional transit authority may provide
    for its dissolution or modification in membership under circumstances described
    therein, or a regional transit authority may be dissolved or its membership modified
    by its board of trustees with the consent of the subdivision or subdivisions creating
    such regional transit authority. In the event of dissolution the properties of
    the regional transit authority shall be transferred to the subdivision creating
    it, or if created by more than one subdivision, to the subdivisions creating it
    in such manner as may be agreed upon by such subdivisions.
