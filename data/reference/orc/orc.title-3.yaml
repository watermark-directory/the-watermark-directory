- number: '317.14'
  heading: Copy of record in one county may be recorded in another county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: When a deed, mortgage, power of attorney, or other instrument of writing,
    for the sale, conveyance, or encumbrance of lands, tenements, or hereditaments,
    situated in two or more counties in this state, has been recorded in one of such
    counties, or when a new county is organized and such lands, tenements, or hereditaments
    are situated within the new county, and the instrument has been recorded in the
    county from which the new county was taken, or when, by change of county lines,
    lands are transferred from one county to another and such instrument has been
    recorded in the county from which the lands were transferred, any person interested
    in such lands may procure from the county recorder a certified copy of the record
    and cause it to be recorded in any other county containing such lands, tenements,
    or hereditaments, in the same manner as the original instrument is required to
    be recorded. In making the record, such certificate shall be recorded with the
    copy, and the record of the copy and certificate shall have the same validity
    and legal effect as the record of the original instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.14
- number: '317.15'
  heading: Copy of record in other cases
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: When a deed or other instrument of writing for the sale, conveyance, or encumbrance
    of lands, tenements, or hereditaments, situated within this state, has been recorded
    in the official records of a county of the state, other than the county in which
    they are situated, whether or not the county in which the instrument is recorded
    ever comprised a part of the territory in which the lands, tenements, and hereditaments
    are situated, any person interested therein may procure, from the official records
    of the county in which the instrument is recorded, a certified copy of the record
    from the county recorder, with the seal of office affixed thereto, and cause it
    to be recorded in the county where such lands, tenements, or hereditaments lie,
    in the manner provided by section 5301.25 of the Revised Code. In making such
    a record, the certificate shall have the same validity and legal effect as the
    record of other deeds and instruments of writing.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.15
- number: '317.16'
  heading: Force and effect of certified copies
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: After copies of records have been recorded, as provided in sections 317.14
    and 317.15 of the Revised Code, in the county in which such lands, tenements,
    or hereditaments lie, a copy of such record, certified by the county recorder
    of the county in which the premises are situated, shall be received in evidence
    in the same manner and have the same force and effect as if the record were of
    the original instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.16
- number: '317.17'
  heading: Transcription of records of other counties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: When directed by the board of county commissioners to do so, the county recorder
    may transcribe in the official records provided for that purpose, from the records
    of other counties, all deeds, mortgages, powers of attorney, and other instruments
    of writing, for the sale, conveyance, or encumbrance of lands, tenements, or hereditaments
    situated within the county recorder's county. When transcribed, those records
    shall be part of the records of the county and have the same legal effect as other
    records of instruments of like kind recorded originally in the county recorder's
    office. Copies of those records shall be received in evidence in the same manner
    and with the same effect as original records of like instruments.
