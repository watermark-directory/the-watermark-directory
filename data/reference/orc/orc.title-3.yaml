- number: '307.77'
  heading: Giving aid to units of government for water management
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The board of county commissioners of any county may give aid to any of the
    units of government set forth in division (A) of this section by the appropriation
    of money or by the issuance of bonds and payment of proceeds as provided by section
    307.771 of the Revised Code for a public improvement whenever:

    (A) The public improvement is authorized to be constructed, acquired, maintained,
    or operated by or under the management and control of a department or agency of
    the United States, or of this state, or of any state adjoining this state, or
    of one or more counties of this state, or of any municipal corporation or political
    subdivision of this or an adjoining state, either separately or jointly or co-operatively;
    and

    (B) The public improvement is authorized to be constructed, acquired, maintained,
    or operated:

    (1) To alleviate and reduce damage from floods; regulate stream channels by changing,
    widening, and deepening the same; or to impound water in a reservoir and regulate
    the release thereof for the purpose or purposes of lessening the flow of a stream
    in times of floods, or augmenting the flow of a stream in times of below average
    runoff, or providing a supply of water for domestic, commercial, industrial, agricultural,
    recreational, conservational, or other public uses, not including commercial water
    transportation; or

    (2) To provide dams, ditches, or other facilities for a water supply system, or
    for the removal and disposition of surplus water, or for abatement or alleviation
    of pollution, or for betterment of sanitary conditions; and

    (C) The board of county commissioners finds that the public improvement will serve
    one or more of the purposes set forth in division (B)(1) and (2) of this section
    in such a manner and by such method that it will be for the general public benefit
    of the county in an amount corresponding with or greater than the amount of aid
    which the county will contribute.'
