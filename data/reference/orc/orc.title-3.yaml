- number: '303.023'
  heading: Prior planned-unit developments continue to be governed by regulations
    in effect at time of approval or modification
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Any planned-unit development regulations adopted in accordance with section
    303.12 of the Revised Code, or any planned-unit developments constructed or approved
    in a preliminary or final form, under the provisions of a zoning resolution adopted
    prior to the effective date of this section, if otherwise lawful had they originated
    on that date, shall be deemed to have been lawful from their origin and the developments
    shall continue to be governed by regulations in effect at the time of approval,
    or as modified.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.023
- number: '303.03'
  heading: Adoption of resolution of intention to proceed with county rural zoning
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'Before availing itself of the powers conferred in section 303.02 of the Revised
    Code, the board of county commissioners shall pass a resolution declaring its
    intention to proceed under sections 303.01 to 303.25 of the Revised Code. The
    board may act in the following manner:

    (A) It may adopt such a resolution upon its own initiative.

    (B) It shall adopt such a resolution if there is presented to it a petition, signed
    by a number of qualified voters residing in the unincorporated area of each township
    or part of that unincorporated area to be included in the zoning plan equal to
    not less than eight per cent of the total vote cast for all candidates for governor
    in such area at the most recent general election at which a governor was elected,
    requesting the board to proceed with county rural zoning under such sections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.03
- number: '303.04'
  heading: County rural zoning commission
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: The board of county commissioners of any county proceeding under sections
    303.01 to 303.25 of the Revised Code, shall create and establish a county rural
    zoning commission. The commission shall be composed of five members who reside
    in the unincorporated area of the county to be zoned, to be appointed by the board.
    The board of county commissioners may appoint two alternate members to the county
    rural zoning commission, for terms to be determined by the board of county commissioners.
    An alternate member shall take the place of an absent regular member at any meeting
    of the county rural zoning commission, according to procedures prescribed by resolution
    by the board of county commissioners. An alternate member shall meet the same
    appointment criteria as a regular member. When attending a meeting on behalf of
    an absent member, the alternate member may vote on any matter on which the absent
    member is authorized to vote. The terms of the regular members shall be of such
    length and so arranged that the term of one member will expire each year. Where
    there is a county or regional planning commission the board of county commissioners
    may appoint qualified members of such commission who reside in the unincorporated
    area of the county to serve on the county rural zoning commission. Each regular
    or alternate member shall serve until the member's successor is appointed and
    qualified. Members of the zoning commission shall be removable for nonperformance
    of duty, misconduct in office, or other cause by the board, upon written charges
    being filed with the board, after a public hearing has been held regarding such
    charges, and after a copy of the charges has been served upon the member so charged
    at least ten days prior to the hearing, either personally, by registered mail,
    or by leaving such copy at the member's usual place of residence. The member shall
    be given an opportunity to be heard and answer such charges. Vacancies shall be
    filled by the board and shall be for the unexpired term.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.04
- number: '303.05'
  heading: Recommendations of county rural zoning commission - powers and duties of
    commission
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'The county rural zoning commission shall submit a plan, including both text
    and maps, representing the recommendations of the zoning commission for the carrying
    out by the board of county commissioners of the powers, purposes, and provisions
    set forth in sections 303.01 to 303.99, inclusive, of the Revised Code, including
    additions to territory in which a county zoning plan is in effect.

    The zoning commission may, within the limits of the moneys appropriated by the
    board for the purpose, employ or contract with such planning consultants and executive
    and other assistants as it deems necessary except that where a county or regional
    planning commission is established, the zoning commission shall use the same planning
    consultants and executive and other assistants as provided for such county or
    regional planning commission if so ordered by the board. The zoning commission
    shall organize, adopt rules for the transaction of its business, and keep a record
    of its actions and determinations. Members of the zoning commission may be allowed
    their expenses, or such compensation, or both, as the board may approve and provide.
    No county commissioner shall be employed by the zoning commission of his county.

    The zoning commission shall make use of such information and counsel as is available
    from appropriate public officials, departments, and agencies and such officials,
    departments, and agencies having information, maps, and data pertinent to county
    rural zoning shall make them available for the use of the zoning commission.

    In any county where there is a county or regional planning commission, the zoning
    commission shall request such planning commission to prepare or make available
    to the zoning commission a zoning plan, including text and maps, for the unincorporated
    area of the county or any portion of the same.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.05
- number: '303.06'
  heading: Public hearing on recommendations - notice
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'Before certifying its recommendations of a zoning plan to the board of county
    commissioners, the county rural zoning commission shall hold at least one public
    hearing in each township affected by the proposed zoning plan, notice of which
    shall be given by one publication at least thirty days before the date of such
    hearing using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation in the
    township;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.

    The notice shall state the place and time at which the text and maps of the proposed
    zoning resolution may be examined.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.06
- number: '303.07'
  heading: Submission of proposed zoning resolution to county or regional planning
    commission
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'Following the hearing provided for in section 303.06 of the Revised Code,
    the county rural zoning commission shall submit the proposed zoning resolution,
    including text and maps, to the county or regional planning commission of the
    county or district in which the county is located, if there is such a commission,
    for approval, disapproval, or suggestions.

    The approval of the planning commission shall be conclusively presumed unless,
    within twenty days after receiving the proposed zoning resolution, it notifies
    the zoning commission to the contrary.

    In the event the planning commission disapproves of the proposed zoning resolution
    or suggests any material change, the zoning commission shall hold a public hearing
    on the resolution in each township affected by the proposed changes, due notice
    of which shall be given as provided in section 303.06 of the Revised Code. When
    the zoning commission has completed its recommendations for a zoning plan it shall
    certify the plan to the board of county commissioners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.07
- number: '303.08'
  heading: Public hearing on zoning plan
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'After receiving the certification of a zoning plan from the county rural
    zoning commission, and before adoption of any such zoning resolution, the board
    of county commissioners shall hold a public hearing on the resolution. The board
    shall provide at least thirty days'' notice of the time and place of the hearing
    by one publication using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation in the
    county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.08
- number: '303.09'
  heading: Changes in text or maps - second public hearing
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'No change in or departure from the text or maps as certified by the county
    rural zoning commission, shall be made by the board of county commissioners unless
    it is first resubmitted to the county rural zoning commission for approval, disapproval,
    or suggestions. Upon receipt of the recommendations of the county rural zoning
    commission regarding the proposed changes, the board of county commissioners shall
    hold a second public hearing, at least ten days notice of the time and place of
    which shall be given by one publication using at least one of the following methods:

    (A) In the print or digital edition of one or more newspapers of general circulation
    in the townships affected;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.

    If such changes are disapproved by the zoning commission, the provision so disapproved
    must receive the favorable vote of the entire membership of the board of county
    commissioners in order to be adopted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.09
- number: '303.10'
  heading: County commissioners to vote upon adoption of resolution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: After receiving the recommended zoning plan from the county rural zoning commission
    and holding the public hearing provided for by section 303.08 of the Revised Code,
    the board of county commissioners shall consider such recommendations and vote
    upon the adoption of the zoning resolution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.10
- number: '303.11'
  heading: Zoning plan to be submitted to electors
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'If the zoning resolution is adopted by the board of county commissioners,
    such board shall cause the question of whether or not the proposed plan of zoning
    shall be put into effect to be submitted to the electors residing in the unincorporated
    area of the county included in the proposed plan of zoning for their approval
    or rejection at the next primary or general election, or a special election may
    be called for this purpose. Such resolution shall be filed with the board of elections
    not later than four p.m. on the ninetieth day before the day of the election.
    No zoning regulations shall be put into effect in any township, unless a majority
    of the vote cast on the issue in that township is in favor of the proposed plan
    of zoning. Upon certification by the board of elections the resolution shall take
    immediate effect in all townships which voted approval, eliminating from the plan
    any township which did not vote approval.

    Within five working days after the resolution''s effective date, the board of
    county commissioners shall file it, including text and maps, in the office of
    the county recorder. The board shall also file duplicates of the same documents
    with the regional or county planning commission, if one exists, within the same
    period.

    The board shall file all resolutions, including text and maps, that are in effect
    on January 1, 1992, in the office of the county recorder within thirty working
    days after that date. The board shall also file duplicates of the same documents
    with the regional or county planning commission, if one exists, within the same
    period.

    The failure to file a resolution, or any text and maps, or duplicates of any of
    these documents, with the office of the county recorder or the county or regional
    planning commission as required by this section does not invalidate the resolution
    and is not grounds for an appeal of any decision of the board of zoning appeals.'
