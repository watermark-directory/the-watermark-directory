- number: '311.06'
  heading: Location of sheriff's office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) The sheriff''s office shall be maintained at the county seat of justice,
    or at another location as provided in division (B) of this section, in such rooms
    as the board of county commissioners provides for that purpose. Such office shall
    be furnished with all necessary furniture, blankbooks, stationery, and blanks
    at the expense of the county.

    (B) With the consent of the sheriff, the board of county commissioners may provide
    by resolution for establishment of the primary office of the sheriff at a location
    outside the county seat of justice. The adoption of the resolution and the location
    of the sheriff''s primary office shall be entered on the journal of the board.
    The board shall give reasonable public notice of its action taken pursuant to
    this division in accordance with division (F) of section 121.22 of the Revised
    Code.'
