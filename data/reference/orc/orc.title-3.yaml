- number: '306.38'
  heading: Trust agreement may secure revenue bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'At the discretion of the board of trustees of a regional transit authority,
    the revenue bonds of the regional transit authority may be secured by a trust
    agreement between the board of trustees on behalf of the regional transit authority
    and a corporate trustee, which trustee may be any trust company or bank having
    powers of a trust company, within or without the state.

    Such trust agreement may provide for the pledge or assignment of the revenues
    to be received, shall not pledge the general credit of the regional transit authority,
    but may include a mortgage on any real property or interests therein acquired
    from the proceeds of such revenue bonds. The trust agreement or the resolution
    providing for the issuance of revenue bonds may set forth the rights and remedies
    of the bond holders and trustees, including, in the event of a default, appointment
    of a receiver to administer and operate transit facilities, and may contain such
    other provisions for protecting and enforcing their rights and remedies as are,
    in the discretion of the board of trustees, reasonable and proper. Such agreement
    or resolution may provide for the custody, investment, and disbursement of all
    moneys derived from the sale of such bonds or from the revenues of the regional
    transit authority pledged to pay the interest and principal on such bonds and
    may provide for the deposit of such funds without regard to section 306.42 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.38
- number: '306.39'
  heading: Interest and maturity of revenue bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'Revenue bonds issued by a regional transit authority shall bear interest
    at the rate or rates approved by the board of trustees, shall mature within forty
    years following the date of issuance, and in such amount, at such times, and in
    such number of installments as may be provided in the resolution authorizing their
    issuance. Such resolution shall also provide for the execution and sealing of
    the bonds and the use of facsimile signatures and facsimile of the seal, the manner
    of sale of the bonds, and such other terms and conditions relative to the issuance,
    sale, and retirement of said bonds as the board of trustees in their discretion
    believe reasonable and proper.

    If such bonds are callable, bonds called may be refunded. If revenues prove insufficient
    to pay maturing bonds, bonds which have matured or are about to mature may be
    refunded.'
