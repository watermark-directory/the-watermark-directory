- number: '307.08'
  heading: Appropriation of lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Except as provided in division (B) of this section, when, in the opinion
    of the board of county commissioners, it is necessary to procure real estate,
    a right-of-way, or an easement for a courthouse, a jail, or public offices, for
    a bridge and the approaches to it, or for another structure, public market place,
    or market house, proceedings shall be had in accordance with sections 163.01 to
    163.22 of the Revised Code.

    (B)(1) For the purposes of division (B) of this section, either of the following
    constitutes a public exigency:

    (a) A finding by the director of environmental protection that a public health
    nuisance caused by an occasion of unavoidable urgency and suddenness due to unsanitary
    conditions compels the immediate construction of sewers for the protection of
    the public health and welfare;

    (b) The issuance of an order by the board of health of a health district to mitigate
    or abate a public health nuisance that is caused by an occasion of unavoidable
    urgency and suddenness due to unsanitary conditions and compels the immediate
    construction of sewers for the protection of the public health and welfare.

    (2) If the board of county commissioners is unable to purchase property for the
    purpose of the construction of sewers to mitigate or abate the public health nuisance
    that is the subject of a finding of the director or an order of the board of health,
    the board of county commissioners may adopt a resolution finding that it is necessary
    for the protection of the public health and welfare to appropriate property that
    the board of county commissioners considers needed for that purpose. The resolution
    shall contain a definite, accurate, and detailed description of the property and
    the name and place of residence, if known or with reasonable diligence ascertainable,
    of the owners of the property to be appropriated.

    The board of county commissioners shall fix in its resolution what it considers
    to be the value of the property to be appropriated, which shall be the board''s
    determination of the compensation for the property and shall be supported by an
    independent appraisal, together with any damages to the residue. The board shall
    deposit the compensation so determined, together with an amount for the damages
    to the residue, with the probate court or the court of common pleas of the county
    in which the property, or a part of it, is situated. Except as otherwise provided
    in this division, the power to appropriate property for the purposes of this division
    shall be exercised in the manner provided in sections 163.01 to 163.22 of the
    Revised Code for an appropriation in time of public exigency. The board''s resolution
    and a written copy of the independent appraisal shall accompany the petition filed
    under section 163.05 of the Revised Code.'
