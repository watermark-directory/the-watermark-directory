- number: '303.22'
  heading: Township zoning regulations to take precedence
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Where the people of any township or part thereof have approved township zoning
    regulations in accordance with sections 519.02 to 519.25, inclusive, of the Revised
    Code, prior to the adoption of a county rural zoning resolution by the board of
    county commissioners, and the county plan includes any area covered by the township
    zoning plan, the zoning resolution adopted by the board of township trustees shall
    take precedence over the zoning resolution adopted by the board of county commissioners,
    unless a majority of the voters in such zoned area of the township voting on the
    issue have voted to have the township plan of zoning replaced with the plan of
    county rural zoning.
