- number: '317.25'
  heading: Records of soldiers' graves
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: 'The county recorder shall be the custodian of all records which are provided
    for the county and furnished under the laws of this state, providing for the registration
    of the graves of all persons who served in any war in which the United States
    had a part and who were honorably discharged from the United States army, navy,
    or marine or nurse corps. The recorder shall provide the necessary and proper
    equipment to preserve and protect such records and they shall be available for
    public examination at all times.

    On proper request from any duly constituted and authorized veterans'' organization,
    providing such request is made at least thirty days prior to Memorial day of each
    year, the recorder shall furnish such organization a list of all veterans'' grave
    locations within the county, giving the name, section, lot, and grave number or
    location in the cemetery, as designated by the request.'
