- number: '311.28'
  heading: Duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: 'The county sheriffs'' standard car-marking and uniform commission shall prescribe
    a uniform of standard design and color for the use of all county sheriffs and
    shall prescribe a standard color and design of car-marking for all motor vehicles
    used by county sheriffs.

    On and after January 1, 1961, the standard uniform shall be worn by the county
    sheriffs and their deputies and the standard car-markings shall be used on all
    cars operated by the county sheriffs and their deputies while in the performance
    of their duties.'
  history: null
