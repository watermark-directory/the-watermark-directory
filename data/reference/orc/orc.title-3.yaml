- number: '317.242'
  heading: Material and design standards for Ohio veterans identification cards
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: 'The Ohio recorders association, in consultation with the county commissioners''
    association of Ohio and Ohio state association of county veteran service officers,
    shall establish material and design standards for Ohio veterans identification
    cards that may be issued by county recorders or county veterans service offices.

    The material and design standards shall require that an Ohio identification card
    include the name of this state, a distinguishing number assigned to the cardholder,
    a color photograph of the cardholder, the cardholder''s name and residence address,
    the cardholder''s branch of service, dates of service, and date of discharge,
    the name of the issuing county, the indexing number that has been assigned to
    the veteran''s record of discharge, and the date of the card''s issuance and expiration.

    An Ohio veterans identification card shall not display the cardholder''s social
    security number unless federal law requires the cardholder''s social security
    number to be displayed on a veterans identification card.'
