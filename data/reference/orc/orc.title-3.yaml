- number: '303.27'
  heading: Rehabilitation or redevelopment of county renewal area by private enterprise
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: The board of county commissioners, to the greatest extent it determines to
    be feasible in carrying out the provisions of sections 303.26 to 303.56, inclusive,
    of the Revised Code, shall afford maximum opportunity, consistent with the sound
    needs of the county, to the rehabilitation or redevelopment of the county renewal
    area by private enterprise. The board shall give consideration to this objective
    in exercising its powers under sections 303.26 to 303.56, inclusive, of the Revised
    Code, including the formulation of a workable program, the approval of county
    renewal plans, consistent with the general plan of the county, the exercise of
    its zoning powers, the enforcement of other laws, codes, and regulations relating
    to the use of land and the use and occupancy of buildings and improvements, the
    disposition of any property acquired, and the provisions of necessary public improvements.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.27
- number: '303.28'
  heading: Workable program to control spread of slums and blight
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'The board of county commissioners, for the purposes of sections 303.26 to
    303.56, inclusive, of the Revised Code, may formulate for the county a workable
    program for utilizing appropriate private and public resources to eliminate, and
    prevent the development or spread of, slums and blight, to encourage needed county
    rehabilitation, to provide for the redevelopment of slum and blighted areas, or
    to undertake such of the aforesaid activities or other feasible county activities
    as may be suitably employed to achieve the objectives of such workable program.
    The workable program may include, without limitation, provision for: the prevention
    of the spread of blight into areas of the county which are free from blight through
    diligent enforcement of housing, zoning, and occupancy controls and standards;
    the rehabilitation or conservation of slums and blighted areas or portions thereof
    by replanning, removing congestion, providing parks, playgrounds, and other public
    improvements, by encouraging voluntary rehabilitation, and by compelling the repair
    and rehabilitation of deteriorated or deteriorating structures; and the clearance
    and redevelopment of slum and blighted areas or portions thereof.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.28
- number: '303.29'
  heading: Adoption of resolution of necessity
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: No board of county commissioners shall exercise the authority conferred upon
    counties by sections 303.26 to 303.56, inclusive, of the Revised Code, until after
    it has adopted a resolution finding that one or more slum or blighted areas exist
    in the county; and the rehabilitation, conservation, redevelopment, or combination
    thereof, of such slum or blighted area or areas is necessary in the interest of
    the public health, safety, morals, or welfare of the residents of such county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.29
- number: '303.30'
  heading: Prerequisites for approval county renewal project for county renewal area
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: A board of county commissioners shall not approve a county renewal project
    for a county renewal area unless it has, by resolution, determined such area to
    be a slum area or a blighted area or a combination thereof and designated such
    area as appropriate for a county renewal project. The board shall not approve
    a county renewal plan until a general plan for the county has been prepared by
    the planning commission of the county. A board shall not acquire real property
    for a county renewal project unless it has approved the county renewal project
    in accordance with section 303.33 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.30
- number: '303.31'
  heading: Preparing county renewal plan
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: A board of county commissioners may itself prepare or cause to be prepared
    a county renewal plan, or any person or agency, public or private, may submit
    such a plan to the county. Prior to its approval of a county renewal project,
    the board shall submit such plan to the planning commission of the county for
    review and recommendations as to its conformity with the general plan for the
    development of the county. The planning commission shall submit its written recommendations
    with respect to the proposed county renewal plan to the board within thirty days
    after receipt of the plan for review. Upon receipt of the recommendations of the
    planning commission or, if no recommendations are received within thirty days,
    then without such recommendations, the board may proceed with the hearing on the
    proposed county renewal project.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.31
- number: '303.32'
  heading: Public hearing on county renewal project
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'The board of county commissioners shall hold a public hearing on a county
    renewal project. Publication of the hearing shall be made on at least two successive
    days by the board at least fifteen days before the scheduled hearing date, using
    at least one of the following methods:

    (A) In the print or digital edition of a newspaper having general circulation
    in the county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.

    The notice shall describe the time, date, place, and purpose of the hearing; shall
    generally identify the county renewal area covered by the county renewal plan;
    and shall outline the general scope of the county renewal project under consideration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.32
- number: '303.33'
  heading: Approving county renewal project for county renewal area
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Following the public hearing required by section 303.32 of the Revised Code,
    the board of county commissioners may approve a county renewal project for the
    county renewal area if it finds that a feasible method exists for the location
    of families who will be displaced from the county renewal area in decent, safe,
    and sanitary dwelling accommodations within their means and without undue hardship
    to such families; the county renewal plan conforms to the general plan of the
    county; and the county renewal plan will afford maximum opportunity, consistent
    with the sound needs of the county, for the rehabilitation or redevelopment of
    the county renewal area by private enterprise. If the county renewal area consists
    of an area of open land to be acquired by the county, such area shall not be so
    acquired unless, if it is to be redeveloped for residential uses, the board determines
    that a shortage of housing of sound standards and design which is decent, safe,
    and sanitary exists in the county; that the need of housing accommodations has
    been or will be increased as a result of the clearance of slums in other areas,
    including other portions of the county renewal area; that the conditions of blight
    in the area and the shortage of decent, safe, and sanitary housing cause or contributed
    to an increase in and spread of disease and crime and constitute a menace to the
    public health, safety, morals, or welfare; and that the acquisition of the area
    for residential uses is an integral part of and essential to the program of the
    county, or, if it is to be developed for nonresidential uses, the board determines
    that such nonresidential uses are necessary and appropriate to facilitate the
    proper growth and development of the county in accordance with sound planning
    standards and county objectives, which acquisition may require the exercise of
    governmental action, as provided in sections 303.26 to 303.56, inclusive, of the
    Revised Code, because of defective or unusual conditions of title, diversity of
    ownership, tax delinquency, improper subdivisions, outmoded street patterns, deterioration
    of site, economic disuse, unsuitable topography, or faulty lot layouts, the need
    for the correlation of the area with other areas of the county by streets and
    modern traffic requirements, or any combination of such factors or other conditions
    which retard development of the area.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.33
- number: '303.34'
  heading: Modifying county renewal plan
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: A county renewal plan may be modified at any time. If such a plan is modified
    after the lease or sale by the county of real property in the county renewal area,
    such modification may be conditioned upon such approval of the owner, lessee,
    or successor in interest as the board of county commissioners may deem advisable,
    and in any event shall be subject to such rights at law or in equity as a lessee
    or purchaser, or his successor or successors in interest, may be entitled to assert.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.34
- number: '303.35'
  heading: Plan or modification to be in full force and effect upon approval
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Upon the approval by the board of county commissioners of a county renewal
    plan or any modification thereof, such plan or modification shall be in full force
    and effect for the respective county renewal area and the board may then cause
    such plan or modification to be carried out in accordance with its terms.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.35
- number: '303.36'
  heading: Redeveloping or rehabilitating disaster areas
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Where the board of county commissioners certifies that an area in the county,
    but outside the corporate limits of any city or other incorporated municipality,
    is in need of redevelopment or rehabilitation as a result of a flood, fire, hurricane,
    earthquake, storm, or other catastrophe respecting which the governor has certified
    the need for disaster assistance under public law 875, eighty-first congress,
    or other federal law, it may approve a county renewal plan and a county renewal
    project with respect to such area without regard to the provisions of section
    303.33 of the Revised Code and the provisions of sections 303.30 and 303.32 of
    the Revised Code requiring a general plan for the county and a public hearing
    on the county renewal project.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.36
- number: '303.37'
  heading: Board of county commissioners - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'Every board of county commissioners shall have all the powers, and the right
    to exercise such powers, necessary or convenient to carry out sections 303.26
    to 303.56, inclusive, of the Revised Code, including the following powers granted
    in addition to those specifically authorized by sections 303.26 to 303.56, inclusive,
    of the Revised Code:

    (A) To undertake and carry out county renewal projects within the county but outside
    the corporate limits of cities and other incorporated municipalities, to make
    and execute contracts and other instruments necessary or convenient to the exercise
    of its powers under sections 303.26 to 303.56, inclusive, of the Revised Code,
    and to disseminate slum clearance and county renewal information;

    (B) To provide, arrange, or contract for the furnishing or repair by any person
    or agency, public or private, of services, privileges, works, streets, roads,
    public utilities, or other facilities for or in connection with a county renewal
    project; to install, construct, and reconstruct streets, utilities, parks, playgrounds,
    and other public improvements; and to agree to any conditions that it determines
    reasonable and appropriate attached to federal financial assistance and imposed
    pursuant to federal law relating to the determination of prevailing salaries or
    wages or compliance with labor standards, in the planning, undertaking, or carrying
    out of a county renewal project, and to include in any contract let in connection
    with such a project, provisions to fulfill such of said conditions as it determines
    reasonable and appropriate;

    (C) To enter into any building or property in any county renewal area of the county
    in order to make inspections, surveys, appraisals, soundings, or test borings,
    and to obtain an order for this purpose from a court of competent jurisdiction
    in the event entry is denied or resisted; to acquire by purchase, lease, option,
    gift, grant, bequest, devise, eminent domain, or otherwise, any real property,
    or personal property for its administrative purposes, together with any improvements
    thereon; to hold, improve, clear, or prepare for redevelopment any such property;
    to mortgage, pledge, hypothecate, or otherwise encumber or dispose of any real
    property; to insure or provide for the insurance of any real or personal property
    or operations of the county against any risks or hazards, including the power
    to pay premiums on any such insurance; and to enter into any contracts or agreements
    necessary to effectuate the purposes of sections 303.26 to 303.56, inclusive,
    of the Revised Code. No statutory provision with respect to the acquisition, clearance,
    or disposition of property by public bodies shall restrict a board of county commissioners
    or other public body exercising any powers under sections 303.26 to 303.56, inclusive,
    of the Revised Code, in the exercise of such functions with respect to a county
    renewal project, unless the general assembly shall specifically so state;

    (D) To invest any county renewal project funds held in reserves or sinking funds
    or any such funds not required for immediate disbursement, in property or securities
    in which savings banks may legally invest funds subject to their control; to redeem
    such bonds as have been issued pursuant to section 303.46 of the Revised Code
    at the redemption price established therein or to purchase such bonds at less
    than redemption price, all such bonds so redeemed or purchased to be cancelled;

    (E) To borrow money and to apply for and accept advances, loans, grants, contributions,
    and any other form of financial assistance from the federal government, this state,
    or any other public body, or from any sources, public or private, for the purposes
    of sections 303.26 to 303.56, inclusive, of the Revised Code, and to give such
    security as may be required and to enter into and carry out contracts or agreements
    in connection therewith; and to include in any contract or agreement for financial
    assistance with the federal government for or with respect to a county renewal
    project such conditions imposed pursuant to federal laws as the board determines
    reasonable and appropriate and which are not inconsistent with the purposes of
    sections 303.26 to 303.56, inclusive, of the Revised Code;

    (F) Within the county but outside the corporate limits of cities and other incorporated
    municipalities, to make or have made all surveys and plans necessary to carry
    out the purposes of sections 303.26 to 303.56, inclusive, of the Revised Code,
    and to contract with any person, public or private, in making and carrying out
    such plans, and to adopt or approve, modify, and amend such plans, which plans
    may include, without limitation: a general plan for the county; county renewal
    plans; preliminary plans outlining county renewal activities for county communities
    or neighborhoods to embrace two or more county renewal areas; plans for carrying
    out a program of voluntary or compulsory repair and rehabilitation of buildings
    and improvements; plans for the enforcement of state and local laws, codes, and
    regulations relating to the use of land and the use and occupancy of buildings
    and improvements and to the compulsory repair, rehabilitation, demolition, or
    removal of buildings and improvements; and appraisals, title searches, surveys,
    studies, and other plans and work necessary to prepare for the undertaking of
    county renewal projects; and, to develop, test, and report methods and techniques,
    and carry out demonstrations and other activities, for the prevention and the
    elimination of county area slums and blight, and to apply for, accept, and utilize
    grants of funds from the federal government for such purposes;

    (G) To prepare plans for the relocation of persons, including families, business
    concerns, and others, displaced by a county renewal project, and to make relocation
    payments to or with respect to such persons for moving expenses and losses of
    property for which reimbursement or compensation is not otherwise made, including
    the making of such payments financed by the federal government.

    (H) To appropriate such funds and make such expenditures as may be necessary to
    carry out the purposes of sections 303.26 to 303.56, inclusive, of the Revised
    Code, and to levy taxes and assessments for such purposes; to zone or rezone any
    part of the county other than areas within the corporate limits of cities and
    other incorporated municipalities or make exceptions from building regulations
    of the county;

    (I) To close, vacate, plan, or replan streets, roads, sidewalks, ways, or other
    places; and to plan or replan any part of a county area outside the corporate
    limits of cities and other incorporated municipalities;

    (J) To organize, coordinate, and direct the administration of the provisions of
    sections 303.26 to 303.56, inclusive, of the Revised Code, as they apply to the
    area of the county outside the corporate limits of cities and other incorporated
    municipalities in order that the objective of remedying county slum and blighted
    areas and preventing the causes thereof within the county''s unincorporated areas
    may be most effectively promoted and achieved, and to establish such new office
    or offices of the county or such new department or departments or commissions
    thereof in order to carry out most effectively the purposes and objectives of
    sections 303.26 to 303.56, inclusive, of the Revised Code.'
