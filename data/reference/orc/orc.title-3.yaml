    name: Compensation
  text: '(A) Each county engineer shall be classified, for salary purposes, according
    to the population of the county. All county engineers shall receive annual compensation
    in accordance with the following schedule and in accordance with section 325.18
    of the Revised Code:

    CLASSIFICATION AND COMPENSATION SCHEDULE

    FOR CALENDAR YEAR 2020 FOR COUNTY ENGINEERS


    ClassPopulation RangeCompensation11 - 55,000$103,749255,001 - 95,000109,607395,001
    - 200,000115,7074200,001 - 400,000120,5895400,001 - 1,000,000126,69361,000,001
    or more130,493

    Such salary may be paid monthly out of the general county fund or out of the county''s
    share of the fund derived from the receipts from motor vehicle licenses, as distributed
    by section 4501.04 of the Revised Code, and the county''s share of the fund derived
    from the motor vehicle fuel tax, as distributed by section 5735.27 of the Revised
    Code, as the board of county commissioners directs, upon the warrant of the county
    auditor and shall be in lieu of all fees, costs, per diem or other allowances,
    and other perquisites, of whatever kind, which any engineer collects and receives.
    The engineer shall be the county tax map draftperson, but shall receive no additional
    compensation for performing the duties of that position. When the engineer performs
    service in connection with ditches or drainage works, the engineer shall charge
    and collect the per diem allowances or other fees provided by law and shall pay
    all of those allowances and fees, monthly, into the county treasury to the credit
    of the general county fund. The engineer shall pay into the county treasury all
    allowances and fees collected when the engineer performs services under sections
    315.28 to 315.34 of the Revised Code.

    (B) A county engineer may elect to engage or not to engage in the private practice
    of engineering or surveying. A county engineer, including an acting county engineer
    described in section 305.021 of the Revised Code, shall not perform any private
    engineering or surveying work that would go before the office of the county engineer
    of any county in which the person serves as the county engineer or acting county
    engineer.'
