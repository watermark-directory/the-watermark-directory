- number: '343.013'
  heading: Continuation of resource recovery facilities and recycling activities while
    public debt outstanding
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: '(A) The designations under the initial solid waste management plan of a county
    or joint solid waste management district approved under section 3734.55 of the
    Revised Code of solid waste disposal, transfer, and resource recovery facilities
    and recycling activities that are owned by a municipal corporation, county, county
    or joint solid waste management district, township, or township waste disposal
    district created under section 505.28 of the Revised Code and are financed in
    whole or part by debt issued under Chapter 133., 343., or 6123. of the Revised
    Code shall continue until they are terminated by the board of county commissioners
    or directors of the district or they end pursuant to division (C) of this section.

    (B) The board of county commissioners or directors of a district, at any time
    and by resolution, may designate additional solid waste disposal, transfer, or
    resource recovery facilities or recycling activities that are owned by a municipal
    corporation, county, county or joint solid waste management district, township,
    or township waste disposal district created under section 505.28 of the Revised
    Code, and that are financed in whole or in part by debt issued under Chapter 133.,
    343., or 6123. of the Revised Code, where solid wastes generated within or transported
    into the district shall be taken for disposal, transfer, resource recovery, or
    recycling.

    (C) The designation of a facility or activity under division (A) or (B) of this
    section shall not continue beyond the time that all such debt issued to finance
    the facility or activity has been retired. The board, at any time and by resolution,
    may terminate the designation of any such facility or activity.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-343.013
- number: '343.014'
  heading: Designating solid waste facilities and recycling activities where no outstanding
    public debt
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: '(A) If the provision authorized under division (E)(2)(b) or (c) of section
    3734.53 of the Revised Code to be included in the initial solid waste management
    plan of a county or joint solid waste management district approved under section
    3734.55 of the Revised Code, the provision required under division (E)(1) of section
    3734.53 of the Revised Code to be included in the initial or an amended solid
    waste management plan of a county or joint solid waste management district approved
    under section 3734.521 or 3734.56 of the Revised Code, or an amendment to the
    plan or amended plan adopted and ratified under division (F) of section 3734.56
    of the Revised Code, explicitly authorizes the board of county commissioners or
    directors of the district to designate solid waste facilities and recycling activities
    pursuant to this section, the board of county commissioners or board of directors
    of the district, at any time after the approval of the initial or amended plan
    or the amendment to the plan and in accordance with this section, may designate
    solid waste disposal, transfer, or resource recovery facilities or recycling activities
    that are owned by persons, or that are owned by a municipal corporation, county,
    county or joint solid waste management district, township, or township waste disposal
    district created under section 505.28 of the Revised Code for which no debt has
    been issued or is outstanding under Chapter 133., 343., or 6123. of the Revised
    Code, where solid wastes generated within or transported into the district shall
    be taken for disposal, transfer, resource recovery, or recycling.

    (B) The board of county commissioners or directors of a district that wishes to
    designate solid waste disposal, transfer, or resource recovery facilities or recycling
    activities, as described in division (A) of this section, where wastes generated
    within or transported into the district shall be taken for disposal, transfer,
    resource recovery, or recycling shall initiate the proceedings to do so by adopting
    a resolution expressing the intent of the board to so designate any such facilities
    and activities for the receipt of wastes generated within and transported into
    the district.

    (C) After adopting a resolution of intent to designate under division (B) of this
    section, the board of county commissioners or directors shall do all of the following:

    (1) Hold a public hearing on the proposed designation;

    (2) Publish notice of the adoption of the resolution and of the date, time, and
    location of the public hearing, and a description of the types and scope of the
    services subject to the proposed designation, in at least one newspaper of general
    circulation in the district;

    (3) Mail notice of the adoption of the resolution and of the date, time, and location
    of the public hearing, and a description of the types and scope of the services
    subject to the proposed designation, to the fifty industrial, commercial, and
    institutional generators of solid wastes within the district that generate the
    largest quantities of solid wastes, as determined by the board, and to their local
    trade associations. The board shall make good faith efforts to identify those
    generators within the district and their local trade associations, but the nonprovision
    of notice under division (C)(3) of this section to a particular generator or local
    trade association does not invalidate the proceedings under this section.

    (4) Mail notice of the adoption of the resolution and of the date, time, and location
    of the public hearing, and a description of the types and scope of the services
    subject to the proposed designation, to the legislative authority of each municipal
    corporation, county, and township located in the district;

    (5) Mail notice of the adoption of the resolution and of the date, time, and location
    of the public hearing, and a description of the types and scope of the services
    subject to the proposed designation, to the director of environmental protection.

    (D) After holding the public hearing required under division (C) of this section
    and considering the comments received at the hearing, the board shall decide whether
    to proceed with the proposed designation. If the board decides to proceed, it
    shall adopt a resolution of preliminary designation. The resolution of preliminary
    designation may include criteria or procedures for selecting the solid waste disposal,
    transfer, or resource recovery facilities or recycling activities, as described
    in division (A) of this section, that are to receive wastes generated within and
    transported into the district.

    (E) If, after compiling a list of the solid waste disposal, transfer, or resource
    recovery facilities or recycling facilities, as described in division (A) of this
    section, that the board proposes to so designate, the board wishes to proceed
    with the designation, it shall adopt a resolution declaring its intent to establish
    designation. The resolution shall contain the list of the facilities and activities
    that the board proposes to so designate.

    (F) After adopting the resolution of intent to establish designation under division
    (E) of this section, the board shall do all of the following:

    (1) Establish a reasonable period for receiving comments from the public concerning
    the proposed designation;

    (2) Publish in at least one newspaper of general circulation in the district notice
    of the adoption of the resolution, the location where it is available for review,
    and the dates when the comment period begins and ends;

    (3) Mail notice of the adoption of the resolution and the dates when the comment
    period begins and ends, and the list of the facilities and activities contained
    in the resolution, to the fifty industrial, commercial, and institutional generators
    of solid wastes within the district that generate the largest quantities of solid
    wastes, as determined by the board, and to their local trade associations. The
    board shall make good faith efforts to identify those generators and their local
    trade associations, but the nonprovision of notice under division (F)(3) of this
    section to a particular generator or local trade association does not invalidate
    the proceedings under this section.

    (4) Mail notice of the adoption of the resolution and the dates when the comment
    period begins and ends, and the list of facilities and activities contained in
    the resolution, to the legislative authority of each municipal corporation, county,
    and township located in the district;

    (5) Mail notice of the adoption of the resolution and the list of facilities and
    activities contained in the resolution to the director.

    (G) After considering the comments submitted by the public during the comment
    period provided under division (F) of this section, the board may revise the list
    of solid waste disposal, transfer, or resource recovery facilities or recycling
    activities to be so designated. After considering the comments received by the
    public during the comment period and making any revisions to the list of proposed
    facilities and activities, the board may adopt a resolution of final designation.
    The resolution shall contain a list of the designated solid waste disposal, transfer,
    or resource recovery facilities or recycling activities, as described in division
    (A) of this section, where wastes generated within or transported into the district
    shall be taken for disposal, transfer, resource recovery, or recycling. The designations
    contained in the resolution become effective for the purposes of division (I)(2)
    of section 343.01 of the Revised Code sixty days after the adoption of the resolution
    of final designation.

    (H) The board of county commissioners or directors of a district, in accordance
    with divisions (D) to (G) of this section, may alter the list of designated facilities
    contained in a resolution of final designation adopted under division (G) of this
    section or an amended resolution of final designation adopted pursuant to this
    division. The designations contained in an amended resolution of final designation
    become effective for the purposes of division (I)(2) of section 343.01 of the
    Revised Code sixty days after the adoption of the amended resolution.

    (I) If designations or amended designations of solid waste facilities or recycling
    activities are in effect under this section or section 343.015 of the Revised
    Code when an approved amended plan of the county or joint district takes effect
    pursuant to sections 343.012 and 3734.521, or section 3734.56, of the Revised
    Code, or an amendment to the initial or an amended plan of the district approved
    under section 3734.521, 3734.55, or 3734.56 of the Revised Code takes effect under
    division (F) of section 3734.56 of the Revised Code, and if the provision included
    in the approved amended plan pursuant to division (E)(1) of section 3734.53 of
    the Revised Code precludes, or the amendment to the plan alters the provision
    of the approved initial or amended plan to preclude, the board of county commissioners
    or directors from designating solid waste facilities or recycling activities,
    the existing designations shall cease to be effective for the purposes of division
    (I)(2) of section 343.01 of the Revised Code sixty days after the amended plan
    takes effect under sections 343.012 and 3734.521, or section 3734.56, of the Revised
    Code or the amendment to the plan adopted and ratified under division (F) of section
    3734.56 of the Revised Code, takes effect, as appropriate.

    (J) Notwithstanding any provision of Chapter 343. or 3734. of the Revised Code
    or a resolution or amended resolution adopted under this section or section 343.013
    of the Revised Code, if a county or joint solid waste management district, prior
    to October 29, 1993, has entered into a contract or agreement to designate a solid
    waste disposal, transfer, or resource recovery facility or recycling activity
    owned by a person, or by a municipal corporation, county, county or joint solid
    waste management district, township, or township waste disposal district created
    under section 505.28 of the Revised Code, where solid wastes generated within
    or transported into the district shall be taken for disposal, transfer, resource
    recovery, or recycling, that designation shall be effective for the purposes of
    division (I)(2) of section 343.01 of the Revised Code and shall remain in effect
    in accordance with the terms of the contract or agreement.'
