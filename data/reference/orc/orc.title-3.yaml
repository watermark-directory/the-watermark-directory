- number: '325.071'
  heading: Allowance for expenses that sheriff incurs in performance of sheriff's
    official duties and in furtherance of justice
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: 'There shall be allowed annually to the sheriff, in addition to all salary
    and allowances otherwise provided by law, an amount equal to one-half of the official
    salary allowed under division (A) of section 325.06 and section 325.18 of the
    Revised Code, to provide for expenses that the sheriff incurs in the performance
    of the sheriff''s official duties and in the furtherance of justice. Upon the
    order of the sheriff, the county auditor shall draw the auditor''s warrant on
    the county treasurer, payable to the sheriff or any other person as the order
    designates, for the amount the order requires. The amounts the order requires,
    not exceeding the amount provided by this section, shall be paid out of the general
    fund of the county.

    Nothing shall be paid under this section until the sheriff, except as otherwise
    provided in section 3.061 of the Revised Code, gives bond to the state in an amount
    not less than the sheriff''s official salary, to be fixed by the court of common
    pleas or the probate court, with sureties to be approved by either of those courts.
    The bond shall be conditioned that the sheriff will faithfully discharge all the
    duties enjoined upon the sheriff, and pay over all moneys the sheriff receives
    in an official capacity. The bond, with the approval of the court of common pleas
    or the probate court of the amount of the bond and the sureties on the bond, shall
    be deposited with the county treasurer.

    The sheriff annually, before the first Monday of January, shall file with the
    county auditor an itemized statement, verified by the sheriff, as to the manner
    in which the fund provided by this section has been expended during the current
    year, and, if any part of that fund remains in the sheriff''s hands unexpended,
    forthwith shall pay the remainder into the county treasury.'
