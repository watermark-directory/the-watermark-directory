- number: '307.38'
  heading: County building inspector - duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) To administer and enforce any local building regulations or existing
    structures code the board of county commissioners adopts under section 307.37
    of the Revised Code and the state residential and nonresidential building codes
    the board of building standards establishes pursuant to Chapter 3781. of the Revised
    Code, the board of county commissioners may create, establish, fill, and fix the
    compensation of the position of county building inspector in the unclassified
    service. In lieu of creating that position, the board may assign the duties of
    the office to an existing county officer who is certified pursuant to section
    3781.10 of the Revised Code.

    (B) The board and a municipal corporation may enter into a contract under which
    one entity enforces for the other entity any local building regulations, existing
    structures code, or, if certified pursuant to section 3781.10 of the Revised Code,
    the state residential and nonresidential building codes in the other entity''s
    jurisdiction.

    (C) Pursuant to a contract authorizing such action, the board may contract on
    behalf of one or more municipal corporations for another county or another municipal
    corporation to administer and enforce the state residential and nonresidential
    building codes, any local residential building regulations, and any existing structures
    code within the municipal corporations seeking those services. The contract the
    board enters into on behalf of these municipal corporations shall specify which
    county or municipal corporation is responsible for administering and enforcing
    the codes and regulations and obtaining the appropriate certification pursuant
    to division (E) of section 3781.10 of the Revised Code.

    (D) In any county that has a building department certified pursuant to section
    3781.10 of the Revised Code and that has a board of building appeals certified
    pursuant to section 3781.20 of the Revised Code, any contract the board enters
    into with a municipal corporation or another county to administer and enforce
    the state residential and nonresidential building codes shall require the board
    of building appeals in the certified county to hear appeals from adjudication
    orders pertaining to the enforcement of Chapters 3781. and 3791. of the Revised
    Code and any rules adopted pursuant to those chapters within the municipal corporation
    or county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.38
- number: '307.381'
  heading: Establishing county board of building appeals
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The board of county commissioners of any county that has a building department
    certified pursuant to section 3781.10 of the Revised Code may by resolution establish
    a county board of building appeals, make appointments to the board, and fix the
    compensation, if any, of the board members.

    (B) Upon certification under section 3781.20 of the Revised Code, the county board
    of building appeals shall hear and decide appeals from adjudication orders of
    the county building inspector or other officer assigned to perform the building
    official''s duties pertaining to the enforcement within the jurisdiction of Chapters
    3781. and 3791. of the Revised Code and any rules adopted pursuant to those chapters.'
