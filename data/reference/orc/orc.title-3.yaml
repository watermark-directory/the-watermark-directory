  text: '(A) As used in this section:

    "Designated public service worker" has the meaning defined in division (A)(7)
    of section 149.43 of the Revised Code.

    "Qualifying former designated public service worker" has the meaning defined in
    section 149.45 of the Revised Code.

    (B) Except as otherwise provided in division (C) of this section, on or before
    the first Monday of August, annually, the county auditor shall compile and make
    up a general tax list of real and public utility property in the county, either
    in tabular form and alphabetical order, or, with the consent of the county treasurer,
    by listing all parcels in a permanent parcel number sequence to which a separate
    alphabetical index is keyed, containing the names of the several persons, companies,
    firms, partnerships, associations, and corporations in whose names real property
    has been listed in each township, municipal corporation, special district, or
    separate school district, or part of either in the auditor''s county, placing
    separately, in appropriate columns opposite each name, the description of each
    tract, lot, or parcel of real estate, the value of each tract, lot, or parcel,
    the value of the improvements thereon, and of the names of the several public
    utilities whose property, subject to taxation on the general tax list and duplicate,
    has been apportioned by the department of taxation to the county, and the amount
    so apportioned to each township, municipal corporation, special district, or separate
    school district or part of either in the auditor''s county, as shown by the certificates
    of apportionment of public utility property. If the name of the owner of any tract,
    lot, or parcel of real estate is unknown to the auditor, "unknown" shall be entered
    in the column of names opposite said tract, lot, or parcel. Such lists shall be
    prepared in duplicate. On or before the first Monday of September in each year,
    the auditor shall correct such lists in accordance with the additions and deductions
    ordered by the tax commissioner and by the county board of revision, and shall
    certify and on the first day of October deliver one copy thereof to the county
    treasurer. The copies prepared by the auditor shall constitute the auditor''s
    general tax list and treasurer''s general duplicate of real and public utility
    property for the current year.

    Once a permanent parcel numbering system has been established in any county as
    provided by the preceding paragraph, such system shall remain in effect until
    otherwise agreed upon by the county auditor and county treasurer.

    (C)(1) A designated public service worker under division (A)(7) of section 149.43
    of the Revised Code, a qualifying former designated public service worker under
    division (A)(3) of section 149.45 of the Revised Code, or the spouse of either
    individual, may submit an affidavit to the county auditor requesting the county
    auditor to remove the name of the individual filing the affidavit from any record
    made available to the general public on the internet or a publicly accessible
    database, and from the general tax list and duplicate of real and public utility
    property, and to instead insert the individual''s initials on any such record,
    and on the general tax list and duplicate of real and public utility property
    as the name of the individual that appears on the deed. A qualifying former designated
    public service worker shall provide, with the affidavit, a confirmation letter
    from each employer at which the worker accumulated service confirming the years
    of service and that the worker departed service in good standing.

    (2) Upon receiving an affidavit, and confirmation letter if applicable, described
    in division (C)(1) of this section, the county auditor shall act within five business
    days in accordance with the request to remove the individual''s name from any
    record made available to the general public on the internet or a publicly accessible
    database, and from the general tax list and duplicate of real and public utility
    property and insert the individual''s initials on any such record and on the general
    tax list and duplicate of real and public utility property, if practicable. If
    the removal and insertion is not practicable, the county auditor shall verbally
    or in writing within five business days after receiving the affidavit explain
    to the individual why the removal and insertion is impracticable.

    (D) The county auditor shall keep confidential information that is subject to
    a real property confidentiality notice under section 111.431 of the Revised Code,
    in accordance with that section. An affidavit or confirmation letter submitted
    under division (C)(1) of this section is not a public record under division (A)(1)(ww)
    of section 149.43 of the Revised Code.'
  history: null
