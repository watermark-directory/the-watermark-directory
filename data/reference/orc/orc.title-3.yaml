  heading: Expenses of arrest - payment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: When a recognizance, given in a case of felony, is collected, in addition
    to the fees allowed by law, the board of county commissioners may pay the expenses
    incurred by a person in procuring the arrest of the accused from the amount so
    collected and paid into the county treasury.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.46
- number: '307.47'
  heading: Relief for persons injured in automobiles commandeered by police officer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners shall provide for the relief, out of the
    general funds of the county, of any person temporarily or permanently disabled
    by reason of his automobile being commandeered by any police officer of the county
    or other political subdivision in the discharge of his duty. Such board shall
    pay, out of the general funds of the county, to the husband or wife or other dependents
    of any person whose death is caused by reason of his automobile being commandeered
    by any police officer of the county or other political subdivision in the discharge
    of his duty, the sum not to exceed five thousand dollars.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.47
- number: '307.48'
  heading: Proof of validity of claim
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners may require such proof as it deems necessary
    to establish the validity of any claim under section 307.47 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.48
- number: '307.49'
  heading: Reward for apprehension of criminals
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners may offer such rewards as the nature of
    the case requires, for the detection or apprehension of any person charged with
    or convicted of felony, and on the conviction of such person, pay it from the
    county treasury, together with all other necessary expenses, not otherwise provided
    for by law, incurred in making such detection or apprehension. The board may,
    on the collection of a recognizance given and forfeited by such person, pay the
    reward so offered, or any part thereof, together with all other necessary expenses
    so incurred and not otherwise provided for by law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.49
- number: '307.50'
  heading: Expenses of pursuit and return of felon
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: When any person charged with a felony has fled to any other state, territory,
    or country, and the governor has issued a requisition for such person or requested
    the president of the United States to issue extradition papers, or the prosecuting
    attorney of any county in the state seeking the return of a felon has received
    notice of waiver of extradition, the board of county commissioners may pay, from
    the county treasury to the agent designated in such requisition, request to the
    president, or order by the prosecuting attorney seeking return, all necessary
    expenses of pursuing and returning the person so charged, or so much of such expenses
    as seem just.
