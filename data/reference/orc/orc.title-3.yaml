- number: '325.22'
  heading: No reduction of compensation due to decline of population
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: Notwithstanding anything to the contrary in this chapter, the compensation
    payable to a county auditor, county treasurer, county sheriff, clerk of the court
    of common pleas, county recorder, county commissioner, prosecuting attorney, county
    engineer, or county coroner shall not be reduced during the remainder of his term
    of office on account of a decline in the population of the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-325.22
- number: '325.23'
  heading: No reduction of compensation due to decline of population in 1993
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: '(A) As used in this section, "county office" means the office of county auditor,
    county treasurer, county sheriff, clerk of the court of common pleas, county recorder,
    county commissioner, prosecuting attorney, county engineer, or county coroner.

    (B) Notwithstanding anything to the contrary in this chapter, the annual compensation
    of a person holding any county office on December 31, 1992, who commences a new
    term of office in that same county office during calendar year 1993 shall not
    be reduced during that new term of office, because of a decline in the population
    of the county, from the amount of annual compensation he was receiving on December
    31, 1992.'
