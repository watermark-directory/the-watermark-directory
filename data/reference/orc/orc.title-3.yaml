- number: '319.541'
  heading: County to pay damages of suit against officials
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: When an action has been commenced against the county treasurer, county auditor,
    or other county officer for performing or attempting to perform a duty authorized
    or directed by statute for the collection of the public revenue, the amount of
    damages and cost adjudged against such treasurer, auditor, or other officer shall
    be apportioned ratably by the auditor among all the parties entitled to share
    the revenue collected, and be deducted by the auditor from the shares of revenue
    payable to each, including as one of the parties, the state itself, as well as
    the counties, townships, municipal corporations, school districts, and organizations
    entitled thereto.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.541
- number: '319.55'
  heading: County sealer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor shall be county sealer of weights and measures and shall
    be responsible for the preservation of the copies of all standards in his possession.
    He shall submit such standards to the state sealer at such times as may be required
    by regulation of the director of agriculture. The auditor shall see that all state
    laws relating to weights and measures are strictly enforced throughout his county,
    and shall assist generally in the prosecution of all violations of such laws.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.55
- number: '319.57'
  heading: County sealer shall deliver copies to successor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: 'When a county sealer resigns, is removed from office, or removes from the
    county, he shall deliver to his successor in office the standards, beams, weights,
    measures, and records in his possession. In case of the death of a county sealer,
    his representatives, in like manner, shall deliver to his successor in office
    such beams, weights, measures, and records.

    In case of neglect or refusal to deliver such standards and records entire and
    complete, the successor in office may maintain a civil action against the person
    so refusing or neglecting, and recover double the value of such standards as have
    not been delivered, with costs of suit, which shall be appropriated by such successor
    to the purchase of such standards as are required in his office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.57
- number: '319.58'
  heading: Use of false weights and measures
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: If any person uses any weights, measures, or beams, in weighing or measuring,
    which do not conform to the standards of the state, or any other measures established
    by law, whereby a dealer in, purchaser of, or seller of any commodity or article
    of traffic is injured or defrauded, such dealer, purchaser, or seller may maintain
    a civil action against the offender, and if judgment is rendered him, he shall
    receive double damages and costs of suit.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.58
- number: '319.59'
  heading: Appointment of inspectors - salary
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: Each county sealer of weights and measures shall appoint, by writing under
    his hand and seal, one or more inspectors, who shall compare weights and measures
    whereever they are used or maintained for use within his county, or which are
    brought to the office of the county sealer for that purpose, with the copies of
    the standards in the possession of the county sealer. Such inspectors shall receive
    a salary fixed by the county sealer, to be paid by the county, which shall be
    instead of all fees or charges otherwise allowed by law. Such inspectors shall
    also be employed by the county sealer to assist in the prosecution of all violations
    of law relating to weights and measures.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.59
- number: '319.60'
  heading: Injunctions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county sealer or his inspector may apply to any court of competent jurisdiction
    for a temporary or permanent injunction restraining any person from violating
    any provisions of the weights and measures laws or regulations issued by the director
    of agriculture pursuant thereto.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.60
- number: '319.61'
  heading: Notice of intention to proceed with public improvement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) When a political subdivision of this state authorized to undertake public
    improvements has determined to construct or make such an improvement and to levy
    special assessments or charges to pay all or a part of the cost thereof, the authority
    of such subdivision empowered to levy such special assessments or charges shall,
    within the time limitations prescribed by this section, cause notice of intention
    to proceed with such improvement to be filed with the auditor of each county in
    which any property to be specially assessed or charged is located and shall, within
    the time limitations prescribed by this section, cause notice of the levy of such
    assessments or charges for such improvement to be filed with the auditor of each
    county in which any property specially assessed or charged is located.

    The filing of the notice of intention to proceed with the improvement shall take
    place within fifteen days after the earliest of the following actions: the adoption
    of an ordinance or resolution determining to proceed with the improvement; the
    adoption of an ordinance or resolution directing that the improvement be made
    by force account or authorizing or directing entry into a contract for the making
    of the improvement; or the written or verbal order that the improvement be made
    by force account or authorizing or directing entry into a contract for the improvement;
    provided, that if any of these actions occur prior to September 1, 1961, such
    notice shall be filed within six months following such date.

    The filing of the notice of the levy of special assessments or charges shall take
    place within twenty days after the earliest of the following actions: the adoption
    of an ordinance or resolution levying such assessments or charges; the adoption
    of an ordinance or resolution certifying the same to the auditor; the determination
    by the officer empowered to establish the amount to be assessed or charged of
    the amounts of such assessments or charges; provided, that if any of these actions
    occur prior to September 1, 1961, such notice shall be filed within six months
    following such date.

    (B) The failure to file with the auditor either the notice of intention to proceed
    or the notice of the levy of special assessments or charges, in the manner and
    within the times prescribed in this section, shall not impair the validity of
    the assessments or charges, and, subject to section 727.34 of the Revised Code,
    the lien of such assessments or charges shall be and remain prior to any and all
    liens obtained by any private person, firm, partnership, or corporation irrespective
    of the date thereof except the lien of a mortgage obtained by a bona fide mortgagee
    and duly filed for record after either:

    (1) The expiration of the period prescribed in this section for the filing of
    the notice of intention to proceed and prior to the filing of such notice; or

    (2) The expiration of the period prescribed in this section for the filing of
    the notice of the levy of special assessments or charges and prior to the filing
    of such notice; provided, that if the notice of intention to proceed has not been
    filed but the notice of the levy of special assessments or charges has been filed,
    then no private person, firm, partnership, or corporation shall obtain any lien
    prior to the lien of such assessments or charges except pursuant to division (B)(1)
    of this section; and provided, that if on September 1, 1961 any assessments or
    charges have been certified to the auditor or bonds have been issued in anticipation
    of the collection thereof, the lien of such assessments shall be and remain prior
    to any and all liens obtained by any private person, firm, or corporation whether
    or not the notices required in this section are filed in the manner and within
    the times prescribed in this section.

    (C) As used in this section:

    (1) "Political subdivision" means the city health district; general health district;
    municipal corporation; board of park commissioners of a city, county, township,
    park district, conservancy district; sanitary district; regional sewer and water
    district; and any other political subdivision of this state which is empowered
    to levy special assessments or charges.

    (2) "Notice of intention to proceed" means a copy, certified as true and accurate
    by the custodian of the records of the political subdivision, of an ordinance
    or resolution determining to proceed with such an improvement; a copy, certified
    as true and accurate by the custodian of the records of the political subdivision,
    of an ordinance, resolution, entry, or order that the work be done by force account
    or authorizing or directing the entry into a contract for such work; or certificate
    of the officer having supervision of the improvement reciting that the improvement
    is to be made and that all or a portion of the cost thereof will be assessed or
    charged against designated property.

    (3) "Notice of the levy of special assessments or charges" means a copy, certified
    as true and accurate by the custodian of the records of the political subdivision,
    of an ordinance or resolution levying the assessments for such improvement; a
    copy, certified as true and accurate by the custodian of the records of the political
    subdivision, of an ordinance or resolution certifying the assessments or charges
    to the auditor; or certificate of the officer empowered to establish the amounts
    to be assessed or charged that such amounts have been determined.

    (4) "Special assessments or charges" means special assessments or charges excluding
    charges for utility services.

    The auditor of each such county shall charge and collect a fee of one dollar for
    each copy of any such resolution, ordinance, entry, order, or certificate filed
    in his office pursuant to this section. The auditor, upon receiving for filing
    any of the foregoing items, shall endorse thereon the time of its filing and its
    consecutive filing number and shall enter in a book or on cards, which shall be
    known as the special assessment record, and which shall be alphabetically arranged
    as between political subdivisions, the filing number, the number, if any, set
    forth on any ordinance or resolution, the date of its enactment or of the entry,
    order, or certificate, the date upon which it was received, and an abbreviated
    description of the improvement for which the assessments or charges are to be
    levied or are levied as disclosed by such items. The auditor shall also file each
    such item received in his office to be kept for inspection of all persons interested
    therein.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.61
- number: '319.63'
  heading: Payment to treasurer of housing trust fund fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) During the first thirty days of each calendar quarter, the county auditor
    shall pay to the treasurer of state all amounts that the county recorder collected
    as housing trust fund fees pursuant to section 317.36 of the Revised Code during
    the previous calendar quarter. If payment is made to the treasurer of state within
    the first thirty days of the quarter, the county auditor may retain an administrative
    fee of one per cent of the amount of the trust fund fees collected during the
    previous calendar quarter.

    (B) The treasurer of state shall deposit the housing trust fund fees received
    each year pursuant to this section into the low- and moderate-income housing trust
    fund created under section 174.02 of the Revised Code.

    (C) The county auditor shall deposit the administrative fee that the auditor is
    permitted to retain pursuant to division (A) of this section into the county general
    fund for the county recorder to use in administering the trust fund fee.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.63
- number: '319.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) Whoever violates section 319.53 of the Revised Code is guilty of a minor
    misdemeanor.

    (B) Whoever violates section 319.202 of the Revised Code is guilty of a misdemeanor
    of the first degree.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.99
- number: '321.01'
  heading: County treasurer - election and term
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: A county treasurer shall be elected quadrennially in each county, who shall
    hold his office for four years from the first Monday of September next after his
    election.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.01
- number: '321.02'
  heading: Bond of county treasurer - oath
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: 'Except as otherwise provided in section 3.061 of the Revised Code, before
    entering upon the duties of office, the county treasurer shall give bond to the
    state in such sum as the board of county commissioners directs, with a company
    authorized to conduct a surety business in this state as surety, to be approved
    by the board and conditioned for the payment of all moneys which come into the
    treasurer''s hands for state, county, township, or other purposes. The expense
    or premium for such bond shall be paid by the board and charged to the general
    fund of the county. Such bond, with the oath of office required by Section 7 of
    Article XV, Ohio Constitution, and sections 3.22 and 3.23 of the Revised Code
    and the approval of the board indorsed on it, shall be deposited with the county
    auditor and carefully preserved in the auditor''s office. Such bond shall be entered
    in full on the record of the proceedings of the board on the day when accepted
    and approved by it.

    Except as otherwise provided in section 3.061 of the Revised Code, when, in the
    opinion of a majority of the members of the board, the surety has become insufficient,
    such board may require the treasurer to give additional sureties on the treasurer''s
    previously accepted bond. Except as otherwise provided in section 3.061 of the
    Revised Code, when in its opinion more money has passed or is about to pass into
    the hands of the treasurer than is or would be covered by the treasurer''s bond,
    the board may demand and receive from such treasurer an additional bond, payable
    and conditioned as required for the original bond, with such sureties and in such
    sum as it directs. If a treasurer fails or refuses to give such additional sureties
    or bond for ten days from the day on which the board so requires, the treasurer''s
    office shall be vacant and another treasurer appointed as in other cases of vacancy.

    If a person elected to the office of treasurer fails to give bond as provided
    in this section, on or before the day of the commencement of the treasurer''s
    official term, the office shall become vacant.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.02
- number: '321.03'
  heading: Contracting with financial institution to process payments, checks and
    fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: '(A) At the request of the county treasurer, a board of county commissioners
    may enter into a contract with any financial institution under which the financial
    institution, in accordance with the terms of the contract, receives at a post
    office box any type of payment or fee owed or payable to the county, opens the
    mail delivered to that box, processes the checks and other payments received in
    such mail and deposits them into the treasurer''s account, and provides the county
    treasurer daily receipt information with respect to such payments. The contract
    may provide for the financial institution to receive at the post office box those
    payments and fees specifically named in the contract or all payments and fees
    payable to the county, including, but not limited to, utility, sewer, water, refuse
    collection, waste disposal, and airport fees, but in any case excluding taxes.
    The contract shall not be entered into unless:

    (1) The contract is awarded in accordance with sections 307.86 to 307.92 of the
    Revised Code.

    (2) The treasurer''s surety bond includes within its coverage any loss that might
    occur as the result of the contract.

    (3) The provisions of the contract do not conflict with accounting and reporting
    requirements prescribed by the auditor of state.

    (B) The records of the financial institution are subject to examination by the
    auditor of state to the same extent as if the services that the financial institution
    has agreed to perform were being performed by the treasurer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.03
- number: '321.04'
  heading: Deputies
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: Each county treasurer may appoint one or more deputies, and he shall be liable
    and accountable for their proceedings and misconduct in office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.04
- number: '321.05'
  heading: Place of treasurer's office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: The county treasurer shall keep his office at the county seat, in rooms provided
    for that purpose by the board of county commissioners, which shall constitute
    the county treasury. Except as otherwise specifically provided by law, all public
    moneys and property in his possession shall be at all times kept in the county
    treasury.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.05
- number: '321.06'
  heading: Transfer of property to successor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: At the expiration of the county treasurer's term of office or on the treasurer's
    resignation or removal from office, the treasurer shall deliver to the treasurer's
    successor all moneys, books, papers, and other property in the treasurer's possession
    as treasurer. In case of the death or incapacity of the treasurer, they shall
    be delivered over by the treasurer's legal representatives. The county treasurer
    shall include an inventory of the items delivered in accordance with this section
    in a certificate of transition under section 117.171 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.06
- number: '321.07'
  heading: Content of accounts
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: The county treasurer shall keep an accurate account of all moneys received
    by him, showing the amount, the time, from what source received, and of all disbursements
    made by him, showing the amount, the time, and for what purpose paid. He shall
    so arrange his accounts that the amount received and paid on account of each separate
    and distinct fund shall be exhibited in a separate and distinct account.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.07
- number: '321.08'
  heading: Method of entering tax receipts
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: 'The county treasurer shall enter on the treasurer''s account each day the
    money received for advance payments of taxes and taxes charged on the general
    and special duplicates of the current year in the following manner:

    (A) Collections of estate tax to be credited to the "undivided estate tax fund;"

    (B) Collections of classified property taxes, including interest and penalties
    thereon, shall be credited to the county public library fund and distributed in
    accordance with section 5747.48 of the Revised Code;

    (C) Collections of other taxes and assessments of whatever kind to be credited
    to the undivided general tax fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.08
- number: '321.09'
  heading: Daily statement to county auditor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: Each business day, the county treasurer shall make a statement to the county
    auditor for the preceding day, showing the amount of taxes received and credited
    to the various undivided tax funds, the amount received on auditor's draft, the
    amount received from all other sources, the total amount deposited in the depository,
    the total amount paid by check on the depository, the total amount paid out in
    cash, the balance in the depository, and the balance in the county treasury.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.09
- number: '321.10'
  heading: County treasurer's statement to county auditor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: 'At the time of closing the books at the end of each collection of taxes,
    the county treasurer shall make to the county auditor a statement showing the
    amount of taxes received in each taxing district in the county since the last
    settlement, under the following heads: Inheritance tax, estate tax, dog tax, general
    tax, and classified tax.

    The treasurer shall keep such accounts, in books provided for that purpose, as
    will enable him to make the statements required by sections 321.07 to 321.10,
    inclusive, of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.10
- number: '321.11'
  heading: Inspection of books
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: The books, accounts, and vouchers of the county treasurer, and all moneys
    remaining in the county treasury, shall be subject at all times to the inspection
    and examination of the board of county commissioners.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.11
- number: '321.12'
  heading: Payments into county treasury
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: 'Except for payments of taxes charged on any current or delinquent tax duplicate
    and advance payments of taxes pursuant to section 5719.02 of the Revised Code,
    all payments of money into the county treasury shall be on the draft of the county
    auditor, in favor of the county treasurer.

    The county auditor shall preserve a duplicate copy of each such draft, and he
    and the county treasurer shall each keep an accurate record of each draft and
    of the fund in favor of which it is drawn.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.12
- number: '321.13'
  heading: Currency received and disbursed
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: Notes of the United States, notes of solvent national banks organized under
    an act of congress, notes of federal reserve banks, and silver certificates of
    the United States shall be received by county treasurers and the treasurer of
    state, and by them disbursed in payment of legal demands on the state and county
    treasuries.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.13
- number: '321.14'
  heading: Duplicate receipts shall be given
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: When money is paid to the county treasurer, except on account of taxes charged
    on the duplicate, he shall give to the person paying duplicate receipts, one of
    which such person shall deposit with the county auditor, who shall charge the
    treasurer with the amount of such receipt.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.14
- number: '321.15'
  heading: Payment of money from county treasury
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: No money shall be paid from the county treasury, or transferred to any person
    for disbursement, except on the warrant of the county auditor, including an electronic
    warrant authorizing direct deposit, in accordance with division (F) of section
    9.37 of the Revised Code, for payment of county obligations.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.15
- number: '321.16'
  heading: Redemption of county warrants
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: '(A) When a warrant drawn on the county treasurer by the county auditor is
    presented for payment, if there is money in the county treasury or depository
    to the credit of the fund on which it is drawn, and the warrant is endorsed by
    the payee thereof, the treasurer shall redeem it by payment of cash or by check
    on the depository.

    (B) The warrant, and all information related to the presentment of the warrant,
    may be provided electronically to the county treasurer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.16
- number: '321.17'
  heading: Indorsement and interest on warrants not paid
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: When a warrant is presented to the county treasurer for payment, and is not
    paid, for want of money belonging to the particular fund on which it is drawn,
    the treasurer shall record the warrant as not paid for want of funds. The warrant
    shall thereafter bear interest at the rate of six per cent per year. A memorandum
    of all such warrants shall be kept by the treasurer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.17
- number: '321.18'
  heading: Termination of interest on warrants
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: 'As soon as sufficient funds are in the county treasury to redeem the warrants
    drawn on the treasury, and on which interest is accruing, the county treasurer
    shall give notice that the treasurer is ready to redeem such warrants, and from
    the date of the notice the interest on such warrants shall cease. The notice shall
    be given using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation in the
    county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.18
- number: '321.19'
  heading: Account of interest
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: When the county treasurer redeems a warrant on which interest is due, he shall
    note on the warrant the amount of interest paid by him, and shall enter in his
    account the amount of such interest, separate from the principal.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.19
- number: '321.20'
  heading: Deposit of warrants with the auditor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: On the first day of each month in each year, the county treasurer shall deposit
    with the county auditor all warrants the treasurer has redeemed and take the auditor's
    receipt for them.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.20
- number: '321.21'
  heading: County treasurer shall not purchase county warrants
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: No county treasurer shall contract for or purchase, directly or indirectly,
    any warrant issued by the county of which he is treasurer, at a discount upon
    the sum due on such warrant. If he contracts for or purchases any such warrant,
    he shall not be allowed, the amount of the warrant, or any part of it, on settlement,
    and shall forfeit the whole amount due, to be recovered in an action in the name
    of the state, for the use of the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.21
- number: '321.22'
  heading: Failure to note interest on warrants
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: In any settlement the county treasurer shall not be credited with any sum
    for interest paid by him on any warrant, unless, at the time of redeeming such
    warrant, he noted on it the amount of interest paid.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.22
- number: '321.23'
  heading: County money shall not be loaned
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: A county treasurer who loans money belonging to the county, with or without
    interest, or uses such money for his own individual purpose, shall forfeit and
    pay, for each such offense, not less than one hundred nor more than five hundred
    dollars, to be recovered in an action in the name of the state, for the use of
    the county.
