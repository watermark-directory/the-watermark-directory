  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.23
- number: '303.24'
  heading: Actions instituted to prevent violation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: In case any building is or is proposed to be located, erected, constructed,
    reconstructed, enlarged, changed, maintained, or used, or any land is or is proposed
    to be used in violation of sections 303.01 to 303.25, inclusive, of the Revised
    Code, or of any regulation or provision adopted by any board of county commissioners
    under such sections, such board, the prosecuting attorney of the county, the county
    zoning inspector, the county building inspector, or any adjacent or neighboring
    property owner who would be specially damaged by such violation, in addition to
    other remedies provided by law, may institute injunction, mandamus, abatement,
    or any other appropriate action or proceeding to prevent, enjoin, abate, or remove
    such unlawful location, erection, construction, reconstruction, enlargement, change,
    maintenance, or use.
  history: null
