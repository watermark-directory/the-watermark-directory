- number: '341.01'
  heading: Sheriff to have charge of jail
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: 'The sheriff shall have charge of the county jail and all persons confined
    therein. He shall keep such persons safely, attend to the jail, and govern and
    regulate the jail according to the minimum standards for jails in Ohio promulgated
    by the department of rehabilitation and correction.

    The sheriff''s responsibilities under this section do not extend to a jail or
    workhouse that is the subject of a contract entered into under section 9.06 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.01
- number: '341.011'
  heading: Notice of escape and apprehension of escaped person
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) If a person who was convicted of or pleaded guilty to an offense or was
    indicted or otherwise charged with the commission of an offense escapes from a
    county jail or workhouse or otherwise escapes from the custody of a sheriff, the
    sheriff immediately after the escape shall report the escape, by telephone and
    in writing, to all local law enforcement agencies with jurisdiction over the place
    where the person escaped from custody, to the state highway patrol, to the department
    of rehabilitation and correction if the escaped person is a prisoner under the
    custody of the department who is in the jail or workhouse, to the prosecuting
    attorney of the county, and to a newspaper of general circulation in the county.
    The written notice may be by either facsimile transmission or mail. A failure
    to comply with this requirement is a violation of section 2921.22 of the Revised
    Code.

    (B) Upon the apprehension of the escaped person, the sheriff shall give notice
    of the apprehension of the escaped person by telephone and in writing to the persons
    notified under division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.011
- number: '341.02'
  heading: Jail register - operational policies and procedures - prisoner rules of
    conduct
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: 'The sheriff shall make the following entries in a suitable book, which shall
    be known as the "jail register," kept in the office of the jailer, and delivered
    to the successor in office of such jailer:

    (A) The name of each prisoner, and the date and cause of his commitment;

    (B) The date and manner of his discharge.

    The sheriff or jail administrator shall prepare written operational policies and
    procedures and prisoner rules of conduct, and maintain the records prescribed
    by these policies and procedures in accordance with the minimum standards for
    jails in Ohio promulgated by the department of rehabilitation and correction.

    The court of common pleas shall review the jail''s operational policies and procedures
    and prisoner rules of conduct. If the court approves the policies, procedures,
    and rules of conduct, they shall be adopted.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.02
- number: '341.04'
  heading: Sheriff shall visit jail
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: The sheriff shall visit the county jail and examine the condition of each
    prisoner, at least once during each month.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.04
- number: '341.05'
  heading: Staff assignment and compensation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) The sheriff shall assign sufficient staff to ensure the safe and secure
    operation of the county jail, but staff shall be assigned only to the extent such
    staff can be provided with funds appropriated to the sheriff at the discretion
    of the board of county commissioners. The staff may include any of the following:

    (1) An administrator for the jail;

    (2) Jail officers, including civilian jail officers who are not sheriff''s deputies,
    to conduct security duties;

    (3) Other necessary employees to assist in the operation of the county jail.

    (B) The sheriff shall employ a sufficient number of female staff to be available
    to perform all reception and release procedures for female prisoners. These female
    employees shall be on duty for the duration of the confinement of the female prisoners.

    (C) The jail administrator and civilian jail officers appointed by the sheriff
    shall have all the powers of police officers on the jail grounds as are necessary
    for the proper performance of the duties relating to their positions at the jail
    and as are consistent with their level of training.

    (D) The sheriff may authorize civilian jail officers to wear a standard uniform
    consistent with their prescribed authority, in accordance with section 311.281
    of the Revised Code. Civilian jail officer uniforms shall be differentiated clearly
    from the uniforms worn by sheriff''s deputies.

    (E) Except as provided in division (B) of section 341.25 of the Revised Code,
    the compensation of jail staff shall be payable from the general fund of the county,
    upon the warrant of the auditor, in accordance with standard county payroll procedures.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.05
- number: '341.07'
  heading: Copies of minimum standards for jails to be furnished - prisoner rules
    of conduct
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: 'The department of rehabilitation and correction shall provide a copy of the
    minimum standards for jails in Ohio to the board of county commissioners, the
    common pleas court, and the sheriff.

    The sheriff shall ensure that the prisoner rules of conduct are placed in a conspicuous
    location within each jail confinement area or are given to each prisoner in written
    form.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.07
- number: '341.08'
  heading: Minimum standards may be revised, altered or amended - distribution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: The department of rehabilitation and correction may, by rule, revise, alter,
    or amend the minimum standards for jails in Ohio to reflect changes in case law
    or public policy. Such revised, altered, or amended standards shall be printed
    and distributed to the board of county commissioners, the court of common pleas,
    and the sheriff in the manner directed by section 341.07 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.08
- number: '341.09'
  heading: Separation of prisoners in county jails
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: 'When the design of a county jail will permit, the separation of prisoners
    shall be as required in the minimum standards for jails in Ohio.

    The department of rehabilitation and correction shall, when necessary, initiate
    appropriate judicial proceedings for the enforcement of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.09
- number: '341.10'
  heading: Separate confinement in new county jails
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: County officers having charge of the construction of a new jail shall provide
    for the separate confinement of prisoners, as required by section 341.09 of the
    Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.10
- number: '341.11'
  heading: Confinement of minors
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: 'Except as provided in division (C) of section 2151.311 of the Revised Code,
    no child taken into custody shall be held in a county, multicounty, or municipal
    jail or workhouse or other place for the confinement of adults convicted of crime,
    under arrest, or charged with crime.

    Except as provided in division (C) of section 2151.311 of the Revised Code, a
    child confined pursuant to section 2151.311 of the Revised Code shall be held
    in a room or cell totally separate and removed by sight and sound from all adult
    prisoners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.11
- number: '341.12'
  heading: Confinement of persons in custody in jail of another county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: 'In a county not having a sufficient jail or staff, the sheriff shall convey
    any person charged with the commission of an offense, sentenced to imprisonment
    in the county jail, or in custody upon civil process to a jail in any county the
    sheriff considers most convenient and secure. As used in this paragraph, any county
    includes a contiguous county in an adjoining state.

    The sheriff may call such aid as is necessary in guarding, transporting, or returning
    such person. Whoever neglects or refuses to render such aid, when so called upon,
    shall forfeit and pay the sum of ten dollars, to be recovered by an action in
    the name and for the use of the county.

    Such sheriff and the sheriff''s assistants shall receive such compensation for
    their services as the county auditor of the county from which such person was
    removed considers reasonable. The compensation shall be paid from the county treasury
    on the warrant of the auditor.

    The receiving sheriff shall not, pursuant to this section, convey the person received
    to any county other than the one from which the person was removed.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.12
- number: '341.13'
  heading: Sheriffs of adjoining counties to receive prisoners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: The sheriff of a county in this state to which a prisoner has been removed
    as provided by section 341.12 of the Revised Code shall, on being furnished a
    copy of the process or commitment, receive the prisoner into custody. The sheriff
    of a contiguous county of an adjoining state to which a prisoner has been removed
    as provided in section 341.12 of the Revised Code may, on being furnished a copy
    of the commitment, receive the prisoner into the sheriff's custody. Each receiving
    sheriff shall be liable for escapes or other neglect of duty in relation to the
    prisoner, as in other cases, and neither the conveying sheriff nor any county
    commissioner of the county that employs the conveying sheriff is liable in damages
    in a civil action for any injury, death, or loss to person or property suffered
    or caused by the prisoner while the prisoner is in the custody of the receiving
    sheriff. Each receiving sheriff shall receive from the treasury of the county
    from which the prisoner was removed, such fees as are allowed in other cases.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.13
- number: '341.14'
  heading: Weekly advance deposit of prisoner costs
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) The sheriff of an adjoining county in this state shall not receive prisoners
    as provided by section 341.12 of the Revised Code unless there is deposited weekly
    with the sheriff an amount equal to the actual cost of keeping and feeding each
    prisoner so committed for the use of the jail of that county, and the same amount
    for a period of time less than one week. If a prisoner is discharged before the
    expiration of the term for which the prisoner was committed, the excess of the
    amount advanced shall be refunded.

    (B) Pursuant to section 2929.37 of the Revised Code, the board of county commissioners
    of the county of this state that receives pursuant to section 341.12 of the Revised
    Code for confinement in its jail, a prisoner who was convicted of an offense,
    may require the prisoner to reimburse the county for its expenses incurred by
    reason of the prisoner''s confinement.

    (C) Notwithstanding any contrary provision in this section or section 2929.18,
    2929.28, or 2929.37 of the Revised Code, the board of county commissioners in
    this state may establish a policy that complies with section 2929.38 of the Revised
    Code and that requires any prisoner who is not indigent and who is confined in
    the county''s jail under this section to pay a reception fee, a fee for medical
    treatment or service requested by and provided to that prisoner, or the fee for
    a random drug test assessed under division (E) of section 341.26 of the Revised
    Code.

    (D) If a county in this state receives pursuant to section 341.12 of the Revised
    Code for confinement in its jail a person who has been convicted of or pleaded
    guilty to an offense and has been sentenced to a term in a jail or a person who
    has been arrested for an offense, who has been denied bail or has had bail set
    and has not been released on bail, and who is confined in jail pending trial,
    at the time of reception and at other times the sheriff or other person in charge
    of the operation of the jail determines to be appropriate, the sheriff or other
    person in charge of the operation of the jail may cause the convicted or accused
    offender to be examined and tested for tuberculosis, HIV infection, hepatitis,
    including but not limited to hepatitis A, B, and C, and other contagious diseases.
    The sheriff or other person in charge of the operation of the jail may cause a
    convicted or accused offender in the jail who refuses to be tested or treated
    for tuberculosis, HIV infection, hepatitis, including but not limited to hepatitis
    A, B, and C, or another contagious disease to be tested and treated involuntarily.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.14
- number: '341.141'
  heading: Interstate prisoner transfer under RC 341.12
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) The sheriff of a county in this state shall not transfer a prisoner to
    a contiguous county in an adjoining state as provided in section 341.12 of the
    Revised Code unless there is deposited weekly with the sheriff of the contiguous
    county an amount equal to the actual cost of keeping and feeding each prisoner
    committed to the custody of that sheriff for the use of the jail of that county,
    and the same amount for a period of time less than one week. If a prisoner is
    discharged before the expiration of a week for which the cost of keeping and feeding
    the prisoner has been deposited, the excess of the amount shall be refunded.

    (B) The minimum standards for jails that are applicable for jails in the adjoining
    state shall apply to a jail in that adjoining state that receives prisoners as
    provided in section 341.13 of the Revised Code.

    (C) All other terms of the transfer of a prisoner from a county in this state
    to a contiguous county in an adjoining state shall be as agreed upon by the board
    of county commissioners, any applicable governmental entity in the receiving county,
    and the sheriffs involved in the transfer.

    (D) If a prisoner is transferred to a contiguous county of an adjoining state
    as provided in section 341.12 of the Revised Code, jurisdiction over the transferred
    prisoner shall remain with the Ohio governmental agencies and entities that would
    have jurisdiction over the prisoner if the prisoner had not been so transferred,
    including the Ohio court to which the prisoner''s case is assigned.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.141
- number: '341.15'
  heading: Quarterly account of fees of sheriff
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: At the end of each quarter of each calendar year, a sheriff in this state
    shall account for and pay to the county treasurer all money received by the sheriff
    as provided by sections 341.13 and 341.14 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.15
- number: '341.16'
  heading: Process for the return of prisoner
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: The prosecuting attorney of the county from which a person charged with the
    commission of an offense has been removed for safekeeping, may file a praecipe
    with the clerk of the court of common pleas thereof, directing that a warrant
    be issued to the sheriff having the custody of such person, and commanding him
    to deliver the prisoner to the sheriff of the county from which the prisoner was
    removed, or to the sheriff of the county in which the trial is to take place upon
    change of venue.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.16
- number: '341.17'
  heading: Payment of costs of habeas corpus
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: When a writ of habeas corpus is issued for a person removed and confined in
    a county jail as provided by section 341.12 of the Revised Code, the county from
    which such person was sent shall pay all the costs of such proceeding. Upon the
    presentation of the certificate of the clerk of the court of common pleas, showing
    the amount of such costs, to the county auditor of the county from which such
    person was sent, the auditor shall draw his order for such costs on the county
    treasurer in favor of such clerk, or in favor of such person as the clerk orders,
    and the clerk shall pay such costs to the persons entitled to them.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.17
- number: '341.18'
  heading: County using jail of another county liable for damages
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: The county in which a prisoner was confined as provided by sections 341.12
    and 341.13 of the Revised Code, shall have a right of action against the county
    from which such prisoner was sent, for damages done by him to the jail or other
    property of the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.18
- number: '341.19'
  heading: Reimbursing county for its expenses incurred by reason of person's confinement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) Pursuant to section 2929.37 of the Revised Code, the board of county
    commissioners may require a person who was convicted of an offense and who is
    confined in the county jail to reimburse the county for its expenses incurred
    by reason of the person''s confinement.

    (B) Notwithstanding any contrary provision in this section or section 2929.18,
    2929.28, or 2929.37 of the Revised Code, the board of county commissioners may
    establish a policy that complies with section 2929.38 of the Revised Code and
    that requires any prisoner who is not indigent and who is confined in the county''s
    jail under this section to pay a reception fee, a fee for any medical treatment
    or service requested by and provided to that prisoner, or the fee for a random
    drug test assessed under division (E) of section 341.26 of the Revised Code.

    (C) If a person who is convicted of or pleads guilty to an offense is sentenced
    to a term in a jail, or if a person who has been arrested for an offense, and
    who has been denied bail or has had bail set and has not been released on bail
    is confined in jail pending trial, at the time of reception and at other times
    the sheriff or other person in charge of the operation of the jail determines
    to be appropriate, the sheriff or other person in charge of the operation of the
    jail may cause the convicted or accused offender to be examined and tested for
    tuberculosis, HIV infection, hepatitis, including but not limited to hepatitis
    A, B, and C, and other contagious diseases. The sheriff or other person in charge
    of the operation of the jail may cause a convicted or accused offender in the
    jail who refuses to be tested or treated for tuberculosis, HIV infection, hepatitis,
    including but not limited to hepatitis A, B, and C, or another contagious disease
    to be tested and treated involuntarily.'
  history: null
