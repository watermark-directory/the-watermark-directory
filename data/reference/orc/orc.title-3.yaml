- number: '307.863'
  heading: Bidding process for franchises
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Notwithstanding section 307.86 of the Revised Code, a board of county
    commissioners that awards a franchise to a franchisee on behalf of a county transit
    board pursuant to section 306.04 of the Revised Code to operate a public transit
    system shall award the franchise through competitive bidding as prescribed in
    this section. The board shall solicit bids that are not sealed, and shall ensure
    that all bids the board receives are open for public inspection. The board shall
    consider all bids that are timely received.

    (B) The fact that a bid proposes to be the most beneficial to the county monetarily
    in and of itself does not confer best bid status on that bid.

    (C) In awarding a franchise to a bidder to operate a public transit system, the
    board may consider all of the following:

    (1) The proposed monetary benefit to the county;

    (2) The bidder''s ownership of, or access to, transportation facilities or transportation
    equipment such as vehicles, automated transit systems, or any other applicable
    equipment;

    (3) The bidder''s experience in operating public transit systems;

    (4) If the bidder has experience in operating public transit systems, the record
    of the bidder in relation to all aspects of operating a public transit system,
    including cost savings to a political subdivision, gains in efficiency, the safety
    and security of the traveling public and employees, service to the traveling public,
    return on any investments made by a political subdivision, and any other aspects
    the board includes for consideration.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.863
- number: '307.87'
  heading: Notice of competitive bidding
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'Where competitive bidding is required by section 307.86 of the Revised Code,
    notice thereof shall be given in the following manner:

    (A) Notice shall be published once a week for not less than two consecutive weeks
    preceding the day of the opening of bids for any purchase, lease, lease with option
    or agreement to purchase, or construction contract in excess of the amount specified
    in section 9.17 of the Revised Code, using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    (B) Notices shall state all of the following:

    (1) A general description of the subject of the proposed contract and the time
    and place where the plans and specifications or itemized list of supplies, facilities,
    or equipment and estimated quantities can be obtained or examined;

    (2) The time and place where bids will be opened;

    (3) The time and place for filing bids;

    (4) The terms of the proposed purchase;

    (5) Conditions under which bids will be received.

    (C) The contracting authority shall also maintain in a public place in its office
    or other suitable public place a bulletin board upon which it shall post and maintain
    a copy of such notice for at least two weeks preceding the day of the opening
    of the bids.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.87
- number: '307.88'
  heading: Bid contents
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Bids submitted pursuant to sections 307.86 to 307.92 of the Revised Code
    shall be in a form prescribed by the contracting authority and filed in the manner
    and at the time and place mentioned in the notice. The bids received shall be
    opened and tabulated at the time stated in the notice. Each bid shall contain
    the full name of each person submitting the bid. If the bid is in excess of the
    amount specified in section 9.17 of the Revised Code and for a contract for the
    construction, demolition, alteration, repair, or reconstruction of an improvement,
    it shall meet the requirements of section 153.54 of the Revised Code. If the bid
    is in excess of the amount specified in section 9.17 of the Revised Code and for
    any other contract authorized by sections 307.86 to 307.92 of the Revised Code,
    it may be accompanied by a bond or certified check, cashier''s check, or money
    order on a solvent bank or savings and loan association in a reasonable amount
    stated in the notice but not to exceed five per cent of the bid, conditioned that
    the bidder, if the bidder''s bid is accepted, shall execute a contract in conformity
    to the invitation and the bid.

    (B) The board of county commissioners, by a unanimous vote of the entire board,
    may permit a contracting authority to exempt a bid from any or all of the requirements
    of section 153.54 of the Revised Code if the estimated cost is one hundred thousand
    dollars or less. If the board exempts a bid from any but not all of those requirements,
    the bid notice published pursuant to section 307.87 of the Revised Code shall
    state the specific bid guaranty requirements that apply. If the board exempts
    a bid from all requirements of section 153.54 of the Revised Code, the notice
    shall state that none of the requirements of that section apply.'
  history: null
