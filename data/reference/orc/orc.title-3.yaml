- number: '307.641'
  heading: Establishing suicide fatality review committee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) A board of county commissioners may appoint a health commissioner of
    the board of health of a city or general health district that is entirely or partially
    located in the county in which the board of county commissioners is located to
    establish a suicide fatality review committee to review deaths by suicide occurring
    in the county.

    (B) The boards of county commissioners of two or more counties may, by adopting
    a joint resolution passed by a majority of the members of each participating board
    of county commissioners, create a regional suicide fatality review committee to
    serve all participating counties. The joint resolution shall appoint, for each
    county participating as part of the regional review committee, one health commissioner
    from a board of health of a city or general health district located at least in
    part in each county. The health commissioners appointed shall select one of their
    number as the health commissioner to establish the regional review committee.

    (C) In any county that, on the effective date of this section, has a body that
    is acting as a suicide fatality review committee and is comprised of the members
    described in divisions (A)(1) and (B)(1) of section 307.642 of the Revised Code,
    including a public health official or designee, that body shall continue to function
    as the suicide fatality review committee for the county. The body shall have the
    same duties, obligations, and protections as a suicide fatality review committee
    appointed by a health commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.641
- number: '307.6410'
  heading: Hybrid review committee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: A board of county commissioners may appoint a health commissioner of the board
    of health of a city or general health district that is entirely or partially located
    in the county in which the board of county commissioners is located to establish
    a hybrid drug overdose fatality and suicide fatality review committee to review
    drug overdose deaths, opioid-involved deaths, and deaths by suicide occurring
    in the county. In such case, the board and hybrid committee shall follow the procedures
    described in sections 307.631 to 307.639 and 307.641 to 307.649 of the Revised
    Code. Any reference to a drug overdose fatality review committee or suicide fatality
    review committee shall be construed to include a hybrid committee described in
    this section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.6410
- number: '307.642'
  heading: Members of suicide fatality review committee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A)(1) If a health commissioner is appointed under division (A) of section
    307.641 of the Revised Code to establish a suicide fatality review committee,
    the commissioner shall select four members to serve on the review committee along
    with the commissioner. The review committee shall consist of the following:

    (a) The chief of police of a police department in the county or region or the
    county sheriff or a designee of the chief or sheriff;

    (b) A public health official or the official''s designee;

    (c) The executive director of a board of alcohol, drug addiction, and mental health
    services or the executive director''s designee;

    (d) A physician authorized under Chapter 4731. of the Revised Code to practice
    medicine and surgery or osteopathic medicine and surgery.

    (2) If a health commissioner is appointed under division (B) of section 307.641
    of the Revised Code to establish a suicide fatality review committee, the commissioner
    shall select four members to serve on the review committee along with the commissioner.
    The review committee shall consist of the following:

    (a) The chief of police of a police department or sheriff or a designee of the
    chief or sheriff;

    (b) A public health official or the official''s designee;

    (c) The executive director of a board of alcohol, drug addiction, and mental health
    services or the executive director''s designee;

    (d) A physician authorized under Chapter 4731. of the Revised Code to practice
    medicine and surgery or osteopathic medicine and surgery.

    The members described in divisions (A)(2)(a) to (c) of this section shall be representatives
    from the most populous county served by the committee.

    (B)(1) The review committee shall invite the county coroner or, in the case of
    a regional review committee, the county coroner from the most populous county,
    to serve on the committee. The review committee shall extend the invitation each
    time a county coroner assumes the office. The coroner shall not be required to
    accept the invitation. If the coroner accepts the invitation, the coroner shall
    have the same authority, duties, and responsibilities as members described in
    division (A) of this section.

    (2) The majority of the members of a review committee may invite additional members
    to serve on the committee. The additional members shall serve for a period of
    time determined by a majority of the members described in division (A) of this
    section. An additional member has the same authority, duties, and responsibilities
    as members described in division (A) of this section.

    (C) A vacancy in a suicide fatality review committee shall be filled in the same
    manner as the original appointment.

    (D) A suicide fatality review committee member shall not receive any compensation
    for, and shall not be paid for any expenses incurred pursuant to, fulfilling the
    member''s duties on the committee unless compensation for, or payment for expenses
    incurred pursuant to, those duties is received pursuant to a member''s regular
    employment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.642
- number: '307.643'
  heading: Purpose of suicide fatality review committee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The purpose of a suicide fatality review committee is to decrease the incidence
    of preventable suicide deaths by doing all of the following:

    (A) Promoting cooperation, collaboration, and communication between all groups,
    professions, agencies, or entities engaged in suicide prevention, education, or
    mental health treatment efforts;

    (B) Maintaining a comprehensive database of all suicide deaths that occur in the
    county or region served by the review committee in order to develop an understanding
    of the causes and incidence of those deaths;

    (C) Recommending and developing plans for implementing local service and program
    changes and changes to the groups, professions, agencies, or entities that serve
    local residents that might prevent suicide deaths;

    (D) Advising the department of health of aggregate data, trends, and patterns
    concerning suicide deaths.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.643
- number: '307.644'
  heading: Chairperson of suicide fatality review committee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: If a suicide fatality review committee is established under division (A) or
    (B) of section 307.641 of the Revised Code, the board of county commissioners,
    or if a regional suicide fatality review committee is established, the group of
    health commissioners appointed to select the health commissioner to establish
    the regional review committee, shall designate either the health commissioner
    that establishes the review committee or a representative of the health commissioner
    to convene meetings and be the chairperson of the review committee. If a regional
    review committee includes a county with more than one health district, the regional
    review committee meeting shall be convened in that county. If more than one of
    the counties participating on the regional review committee has more than one
    health district, the person convening the meeting shall select one of the counties
    with more than one health district as the county in which to convene the meeting.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.644
- number: '307.645'
  heading: No review while investigation or prosecution pending
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: A suicide fatality review committee may not conduct a review of a death while
    an investigation of the death or prosecution of a person for causing the death
    is pending unless the prosecuting attorney agrees to allow the review. The law
    enforcement agency conducting the criminal investigation, on the conclusion of
    the investigation, and the prosecuting attorney prosecuting the case, on the conclusion
    of the prosecution, shall notify the chairperson of the review committee of the
    conclusion.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.645
- number: '307.646'
  heading: Collecting and maintaining information; annual report
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) A suicide fatality review committee shall establish a system for collecting
    and maintaining information necessary for the review of suicide deaths in the
    county or region. In an effort to ensure confidentiality, each committee shall
    do all of the following:

    (1) Maintain all records in a secure location;

    (2) Develop security measures to prevent unauthorized access to records containing
    information that could reasonably identify any person;

    (3) Develop a system for storing, processing, indexing, retrieving, and destroying
    information obtained in the course of reviewing a death resulting from suicide.

    (B) For each death resulting from suicide reviewed by a committee, the committee
    shall collect all of the following:

    (1) Demographic information of the deceased, including age, sex, race, and ethnicity;

    (2) The year in which the death occurred;

    (3) The geographic location of the death;

    (4) The cause of death;

    (5) Any factors contributing to the death;

    (6) Any other information the committee considers relevant.

    (C) By the first day of April of each year, the person convening a suicide fatality
    review committee shall prepare and submit to the Ohio department of health a report
    that summarizes the following information about suicide deaths reviewed by the
    committee in the previous calendar year:

    (1) The cause of death;

    (2) Factors contributing to death;

    (3) Age;

    (4) Sex;

    (5) Race;

    (6) The geographic location of death;

    (7) The year of death.

    The report shall specify the number of suicide deaths that were not reviewed during
    the previous calendar year.

    The report may include recommendations for actions that might prevent other suicide
    deaths, as well as any other information the review committee determines should
    be included.

    (D) Reports prepared under division (C) of this section are public records under
    section 149.43 of the Revised Code.'
