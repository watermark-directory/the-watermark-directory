- number: '319.281'
  heading: Unpaid operation permit or inspection fee for household sewage disposal
    system
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor shall place on the general tax list and duplicate compiled
    in accordance with section 319.28 of the Revised Code the amount certified by
    the health commissioner of a city or general health district pursuant to section
    3709.091 of the Revised Code of any unpaid operation permit or inspection fee
    for a household sewage treatment system or a small flow on-site sewage treatment
    system or any other unpaid fee levied under Chapter 3718. of the Revised Code
    and any accrued late payment penalties, together with any fee charged by the county
    auditor for placing the amount on the general tax list and duplicate and for the
    expenses of its collection. The amount placed on the general tax list and duplicate
    shall be a lien on the real property on which the household sewage treatment system
    or small flow on-site sewage treatment system is located from the date the amount
    was placed on the tax list and duplicate, and shall be charged and collected in
    the same manner as taxes on the list.
