- number: '307.89'
  heading: Accepting bids
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: When a bid is accepted for a contract other than for the construction, demolition,
    alteration, repair, or reconstruction of an improvement, the contracting authority
    shall, as a condition to entering a contract with the successful bidder, require
    faithful performance of all things to be done under the contract and may require,
    as a condition to entering a purchase contract, lease, or lease with option or
    agreement to purchase, the bond provided for by section 153.57 of the Revised
    Code, with good and sufficient surety in an amount not to exceed the amount of
    the bid.
