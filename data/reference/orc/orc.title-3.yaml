- number: '321.27'
  heading: Fees on estate tax duplicates and cigarette license moneys
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: '(A) On settlement annually with the county auditor, the county treasurer
    shall be allowed as fees on all moneys collected by the treasurer on estate tax
    duplicates two per cent of the amount collected and reported that year in excess
    of refunds distributed, for the use of the general fund of the county.

    (B) On settlement semiannually with the county auditor, the county treasurer shall
    be allowed as fees on all cigarette license moneys collected by the treasurer
    one-half per cent on the amount received, to be paid upon the warrant of the auditor
    and apportioned ratably and deducted from the shares of revenue payable to the
    county and subdivisions of the county under section 5743.15 of the Revised Code,
    for the use of the general fund of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.27
- number: '321.28'
  heading: Allowing or receiving illegal fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: A county auditor or county commissioner who makes, orders, or pays to the
    county treasurer, or any such treasurer who receives, from funds in the treasury
    of his county, any other allowance or compensation as fees, for clerk hire, or
    otherwise, than is specially provided by law, shall be liable upon his bond. The
    prosecuting attorney of the county shall bring action on such bond, for the use
    of the county, in double the amount paid, ordered to be paid, or received.
