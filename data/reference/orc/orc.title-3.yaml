- number: '307.512'
  heading: Law library resources board meetings
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Within fifteen days after July 1, 2009, the county law library resources board
    shall hold its initial meeting at the office of the board of county commissioners
    at a time that the chairperson of the county law library resources board determines.
    Thereafter, the board shall meet at least four times a year, as determined by
    the chairperson or at any other time as determined by a majority of the board.
    A majority of the members of the county law library resources board constitutes
    a quorum at any regular or special meeting.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.512
- number: '307.513'
  heading: Annual board budget - appropriations from general fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The county law library resources board shall prepare an annual estimate
    of the revenue and expenditures of the board for the calendar year commencing
    January 1, 2010, and for each year thereafter, and shall submit that estimate
    to the board of county commissioners as provided in section 5705.28 of the Revised
    Code. The estimate of expenses shall be sufficient to provide for the operation
    of the county law library resources board. The estimate of revenue shall clearly
    specify the source of the revenue and shall include a specific request for monies
    to be appropriated to the county law library resources fund established pursuant
    to section 307.514 of the Revised Code from the county general fund for the ensuing
    fiscal year.

    (B) The board of county commissioners may appropriate funds from the county general
    fund for the use of the county law library resources board. Within fifteen days
    after the adoption of the annual appropriation measure pursuant to section 5705.38
    of the Revised Code, the board of county commissioners shall transfer fifty per
    cent of the annual general fund appropriation to the county law library resources
    fund and shall transfer the remaining fifty per cent of the annual general fund
    appropriation not later than July 15 of each year. The funds appropriated by the
    board of county commissioners from the county law library resources fund shall
    be disbursed by the county auditor''s warrant drawn on the county treasury five
    days after receipt of a voucher approved by the county law librarian pursuant
    to procedures established by the county law library resources board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.513
- number: '307.514'
  heading: County law library resources fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: There is hereby created in each county treasury a county law library resources
    fund, effective January 1, 2010. The fund shall receive all revenue that is required
    to be deposited into the fund pursuant to division (D)(1) of section 307.51 and
    section 307.515 of the Revised Code, appropriated to the fund from the general
    fund by the board of county commissioners pursuant to section 307.513 of the Revised
    Code, or designated for deposit into the fund by gift or bequest from any person,
    firm, or corporation. Expenditures from the fund shall be made pursuant to the
    annual appropriation measure adopted by the board of county commissioners under
    section 5705.38 of the Revised Code.
