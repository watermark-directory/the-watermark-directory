- number: '317.18'
  heading: Direct and reverse indexes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: 'The county recorder shall make and keep up direct and reverse indexes of
    all the names of both parties to all instruments previously received for record
    by the county recorder. The indexes shall show the kind of instrument, the range,
    township, and section or the survey number and number of acres, or the permanent
    parcel number provided for under section 319.28 of the Revised Code, or the lot
    and sublot number and the part thereof, all as the case requires, of each tract,
    parcel, or lot of land described in any such instrument. The name of each grantor
    shall be entered in the direct index, and the name of each grantee shall be entered
    in the reverse index. After a village dissolution under sections 703.31 to 703.39
    of the Revised Code, the county recorder may continue to utilize the lot and sublot
    number previously assigned to a tract, parcel, or lot of land.

    As to notices of claims filed in accordance with sections 5301.51, 5301.52, and
    5301.56 of the Revised Code, there shall be entered in the reverse index the name
    of each claimant, followed by the name of the present owner of title against whom
    the claim is asserted, if the notice contains the name of the present owner; or,
    if the notice contains the names of more than one such owner, there shall be entered
    the name of the first owner followed by "and others" or its equivalent.

    In all cases of deeds, mortgages, or other instruments made by any sheriff, master
    commissioner, marshal, auditor, executor, administrator, trustee, or other officer,
    for the sale, conveyance, or encumbrance of any lands, tenements, or hereditaments,
    and recorded in the recorder''s office, the recorder shall index the parties to
    such instrument under their appropriate letters, respectively, as follows:

    (A) The names of the persons represented by such officer as owners of the lands,
    tenements, or hereditaments described in any such instruments;

    (B) The official designation of the officer by whom such instrument was made;

    (C) The individual names of the officers by whom such instrument was made.

    Whenever, in the opinion of the board of county commissioners, it becomes necessary
    to transcribe, on account of its worn out or incomplete condition, any volume
    of an index in use, such volume shall be revised and transcribed to conform with
    this section; except that in counties having a sectional index in conformity with
    section 317.20 of the Revised Code, such transcript shall be only a copy of the
    original.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.18
- number: '317.19'
  heading: Daily registers of deeds and mortgages
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: The county recorder shall keep a daily register of deeds and mortgages, in
    which shall be noted, as soon as filed, in alphabetical order according to the
    names of the grantors, respectively, all deeds and mortgages affecting real estate,
    filed in the county recorder's office. The county recorder shall keep the register
    in the county recorder's office, and it shall be open to the inspection of the
    public during business hours. The county recorder may destroy the daily register
    after the expiration of a period of ten years from the date of the last entry
    in the register.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.19
- number: '317.20'
  heading: Sectional indexes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) When, in the opinion of the board of county commissioners, sectional
    indexes are needed and it so directs, in addition to the indexes provided for
    in section 317.18 of the Revised Code, the board may provide for making, in books
    prepared for that purpose, sectional indexes to the records of all real estate
    in the county beginning with some designated year and continuing through the period
    of years that the board specifies. The sectional indexes shall place under the
    heads of the original surveyed sections or surveys, parts of a section or survey,
    squares, subdivisions, permanent parcel numbers provided for under section 319.28
    of the Revised Code, or lots, on the left-hand page or on the upper portion of
    that page of the index book, the name of the grantor, then the name of the grantee,
    then the number and page of the record in which the instrument is found recorded,
    then the character of the instrument, and then a pertinent description of the
    interest in property conveyed by the deed, lease, or assignment of lease, and
    shall place under similar headings on the right-hand page or on the lower portion
    of that page of the index book, beginning at the bottom, all the mortgages, liens,
    notices provided for in sections 5301.51, 5301.52, and 5301.56 of the Revised
    Code, or other encumbrances affecting the real estate.

    (B) The compensation for the services rendered under this section shall be paid
    from the general revenue fund of the county, and no additional levy shall be made
    in consequence of the services.

    (C) If the board of county commissioners decides to have sectional indexes made,
    it shall advertise for three consecutive weeks for sealed proposals to do the
    work provided for in this section, using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    The board shall contract with the lowest and best bidder, and shall require the
    successful bidder to give a bond for the faithful performance of the contract
    in the sum that the board fixes. The board may reject any and all bids for the
    work, provided that no more than five cents shall be paid for each entry of each
    tract or lot of land.

    (D) When the sectional indexes are brought up and completed, the county recorder
    shall maintain the indexes and comply with division (E) of this section in connection
    with registered land.

    (E)(1) As used in division (E) of this section, "housing accommodations" and "restrictive
    covenant" have the same meanings as in section 4112.01 of the Revised Code.

    (2) In connection with any transfer of registered land that occurs on and after
    March 30, 1999, in accordance with Chapters 5309. and 5310. of the Revised Code,
    the county recorder shall delete from the sectional indexes maintained under this
    section all references to any restrictive covenant that appears to apply to the
    transferred registered land, if any inclusion of the restrictive covenant in a
    transfer, rental, or lease of housing accommodations, any honoring or exercising
    of the restrictive covenant, or any attempt to honor or exercise the restrictive
    covenant constitutes an unlawful discriminatory practice under division (H)(9)
    of section 4112.02 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.20
- number: '317.21'
  heading: Plats, records, and documents for use of county and municipal authorities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: Whenever the county recorder, county auditor, and county treasurer, or a majority
    of them, determines to provide, for the convenience of the various county officials
    and the more efficient performance of their duties, including those prescribed
    by sections 5309.01 to 5309.98 and 5310.01 to 5310.21, inclusive, of the Revised
    Code, plats, records, abstracts, books, copies of records, abstracts of records,
    existing or destroyed by fire or otherwise, or other documents or instruments
    affecting the title of any lands, tenements, or hereditaments within the county,
    they may acquire the same by purchase, lease, or rental. When acquired, such property
    shall be kept up and maintained in the office of the recorder or auditor, as such
    officials determine, and shall be at all times subject to the use, examination,
    and inspection of the public, and all officials of the county and the municipal
    corporations therein.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.21
- number: '317.22'
  heading: Prerequisites to recording
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: 'No deed of absolute conveyance of land or any conveyance, absolute or otherwise,
    of minerals or mineral rights shall be recorded by the county recorder until:

    (A) The conveyance presented to the county recorder bears the stamp of the county
    auditor stating the conveyance has been examined and the grantor has complied
    with section 319.202 of the Revised Code;

    (B) Such conveyance has been presented to the county auditor, and by the county
    auditor indorsed "transferred," or "transfer not necessary."

    Before any real estate, the title to which has passed under the laws of descent,
    is transferred from the name of the ancestor to the heir at law or next of kin
    of such ancestor, or to any grantee of such heir or next of kin; and before any
    deed or conveyance of real estate made by any such heir or next of kin is presented
    to or filed for record by the recorder, the heir or next of kin, or that person''s
    grantee, agent, or attorney shall present to the auditor the affidavit of such
    heir or next of kin, or of two persons resident of this state, each of whom has
    personal knowledge of the facts. Such affidavit shall set forth the date of the
    ancestor''s death, and the place of residence at the time of death; the fact that
    the ancestor died intestate; the names, ages, and addresses, so far as known and
    can be ascertained, of each of such ancestor''s heirs at law and next of kin,
    who, by the ancestor''s death, inherited such real estate, the relationship of
    each to the ancestor, and the part or portion of such real estate inherited by
    each. Such transfers shall be made by the auditor in accordance with the statement
    contained in the affidavit, and the auditor shall indorse upon the deed or conveyance
    the fact that such transfer was made by affidavit. The affidavit shall be filed
    with the county recorder of the county in which such real estate is situated,
    at or before the time such deed or conveyance is filed with the county recorder,
    and shall be recorded by the county recorder of the county in the official records
    and indexed in the direct and reverse indexes in the county recorder''s office,
    in the name of such ancestor as grantor and of each such heir or next of kin as
    grantee, in the same manner as if such names occurred in a deed of conveyance
    from the ancestor to such heirs at law. The county recorder shall receive the
    same fees for such indexing and recording as provided by section 317.32 of the
    Revised Code.

    (C) The record of such affidavit shall, in the trial of any cause, so far as competent,
    be prima-facie evidence.

    (D) No county recorder shall record a conveyance if the indorsement, indorsements,
    or stamps of indorsement of a county auditor indicating compliance with section
    319.202 of the Revised Code on the conveyance are in whole or in part defaced,
    illegible, or incomplete.'
