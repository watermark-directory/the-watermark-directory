- number: '303.14'
  heading: County board of zoning appeals - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'The county board of zoning appeals may:

    (A) Hear and decide appeals where it is alleged there is error in any order, requirement,
    decision, or determination made by an administrative official in the enforcement
    of sections 303.01 to 303.25 of the Revised Code, or of any resolution adopted
    pursuant thereto;

    (B) Authorize upon appeal, in specific cases, such variance from the terms of
    the zoning resolution as will not be contrary to the public interest, where, owing
    to special conditions, a literal enforcement of the resolution will result in
    unnecessary hardship, and so that the spirit of the resolution shall be observed
    and substantial justice done;

    (C) Grant conditional zoning certificates for the use of land, buildings, or other
    structures if such certificates for specific uses are provided for in the zoning
    resolution. If the board considers conditional zoning certificates for activities
    that are permitted and regulated under Chapter 1514. of the Revised Code or activities
    that are related to making finished aggregate products, the board shall proceed
    in accordance with section 303.141. of the Revised Code.

    (D) Revoke an authorized variance or conditional zoning certificate granted for
    the extraction of minerals, if any condition of the variance or certificate is
    violated.

    The board shall notify the holder of the variance or certificate e ither by certified
    mail o r, if the board has record of an internet identifier of record associated
    with the holder, by ordinary mail and by that internet identifier of record of
    its intent to revoke the variance or certificate under division (D) of this section
    and of the holder''s right to a hearing before the board within thirty days of
    the mailing of the notice if the holder so requests. If the holder requests a
    hearing, the board shall set a time and place for the hearing and notify the holder.
    At the hearing, the holder may appear in person, by attorney, or by other representative,
    or the holder may present the holder''s position in writing. The holder may present
    evidence and examine witnesses appearing for or against the holder. If no hearing
    is requested, the board may revoke the variance or certificate without a hearing.
    The authority to revoke a variance or certificate is in addition to any other
    means of zoning enforcement provided by law.

    In exercising the above-mentioned powers, the board may, in conformity with such
    sections, reverse or affirm, wholly or partly, or modify the order, requirement,
    decision, or determination appealed from and may make such order, requirement,
    decision, or determination as ought to be made, and to that end has all powers
    of the officer from whom the appeal is taken.

    As used in this section, "internet identifier of record" has the same meaning
    as in section 9.312 of the Revised Code.'
