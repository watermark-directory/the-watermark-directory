- number: '307.055'
  heading: Furnishing ambulance and emergency medical services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Subject to the terms and conditions of the joint resolution creating
    it, each joint emergency medical services district may furnish ambulance services
    and emergency medical services by one of the following methods:

    (1) By operating an emergency medical service organization as defined in section
    4765.01 of the Revised Code;

    (2) By contracting for the operation of one or more facilities pursuant to division
    (C) or (D) of this section;

    (3) By providing necessary services and equipment to the district either directly
    or under a contract entered into pursuant to division (B) of this section;

    (4) By providing service through any combination of methods described in divisions
    (A)(1) to (3) of this section.

    (B) In order to obtain ambulance service, to obtain additional ambulance service
    in times of emergency, or to obtain emergency medical services, a joint emergency
    medical services district may enter into a contract, for a period not to exceed
    three years, with one or more counties, townships, municipal corporations, joint
    fire districts, other governmental units that provide ambulance service or emergency
    medical services, nonprofit corporations, or private ambulance owners, regardless
    of whether the entities contracted with are located within or outside this state,
    upon such terms as are agreed to, to furnish or receive ambulance services or
    the interchange of ambulance services or emergency medical services within the
    several territories of the contracting subdivisions, if the contract is first
    authorized by all boards of trustees and legislative authorities in the territories
    to be served.

    Such a contract may provide for a fixed annual charge to be paid at the times
    agreed upon and stipulated in the contract; or for compensation based on a stipulated
    price for each run, call, or emergency or based on the elapsed time of service
    required for each run, call, or emergency, or based on any combination of these.

    Expenditures of a district for ambulance service or emergency medical service,
    whether pursuant to contract or otherwise, are lawful expenditures, regardless
    of whether the district or the party with which it contracts charges an additional
    fee to users of the service.

    (C) The board of trustees may enter into a contract with any person, municipal
    corporation, township, or other political subdivision, and any political subdivision
    may contract with the board, for the operation and maintenance of emergency medical
    services facilities regardless of whether the facilities used are owned or leased
    by the district, by another political subdivision, or by the contractor.

    (D) The district may purchase, lease, and maintain all materials, buildings, land,
    and equipment, including vehicles, the board considers necessary for the district.

    When the board finds, by resolution, that the district has personal property that
    is not needed for public use, or is obsolete or unfit for the use for which it
    was acquired, the board may dispose of the property in the same manner as provided
    in section 307.12 of the Revised Code.

    (E) Except in the case of a contract with a board of county commissioners for
    the provision of services of an emergency medical service organization, any contract
    entered into by a joint emergency medical services district shall conform to the
    same bidding requirements that apply to county contracts under sections 307.86
    to 307.92 of the Revised Code.

    (F) A county participating in a joint district may contribute any of its rights
    or interests in real or personal property, including money, and may contribute
    services to the district. Any such contributions shall be made by a written agreement
    between the contributing county and the district, specifying the contribution
    as well as the rights of the participating counties in the contributed property.
    Written agreements shall also be prepared specifying the rights of participating
    counties in property acquired by the district other than by contribution of a
    participating county. Written agreements required by this division may be amended
    only by written agreement of all parties to the original agreement.

    (G) A district''s board of trustees, by adoption of an appropriate resolution,
    may choose to have the state board of emergency medical, fire, and transportation
    services license any emergency medical service organization the district operates.
    If a board adopts such a resolution, Chapter 4766. of the Revised Code, except
    for sections 4766.06 and 4766.99 of the Revised Code, applies to the district
    emergency medical service organization. All rules adopted under the applicable
    sections of that chapter also apply to the organization. A board, by adoption
    of an appropriate resolution, may remove the district emergency medical service
    organization from the jurisdiction of the state board of emergency medical, fire,
    and transportation services.'
