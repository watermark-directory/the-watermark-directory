- number: '303.161'
  heading: Architectural review board authorized - standards and procedures
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'The board of county commissioners may create an architectural review board
    to enforce compliance with any zoning standards it may adopt pertaining to landscaping
    or architectural elements. The board of county commissioners shall adopt the standards
    and procedures for the architectural review board to use in reviewing zoning permit
    applications for compliance with those landscaping or architectural standards.
    If the board of county commissioners does not create an architectural review board,
    it may delegate this enforcement authority to the zoning inspector or the zoning
    commission.

    An architectural review board shall consist of no more than five residents of
    the county. At least one member shall be a licensed architect or engineer.'
