- number: '308.12'
  heading: Duties of fiscal officer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'The secretary-treasurer of the regional airport authority shall be the fiscal
    officer of the regional airport authority and the custodian of its funds and records
    and shall assist the board of directors in such particulars as it directs in the
    performance of its duties.

    Before receiving any moneys, the sercretary-treasurer shall furnish bond in such
    amount as is determined by the board of trustees of the regional airport authority
    with surety satisfactory to it, and all funds coming into the hands of the secretary-treasurer
    shall be deposited by him to the account of the regional airport authority in
    one or more such depositories as are qualified to receive deposits of county funds,
    which deposits shall be secured in the same manner as county funds are required
    to be secured. No disbursements shall be made from such funds except in accordance
    with rules and regulations adopted by the board of trustees of the regional airport
    authority.'
