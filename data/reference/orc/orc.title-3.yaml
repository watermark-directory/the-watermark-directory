  url: https://codes.ohio.gov/ohio-revised-code/section-323.75
- number: '323.76'
  heading: Termination of right of redemption on sale or transfer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'Upon the sale of abandoned land at public auction pursuant to section 323.73
    or 323.74 of the Revised Code, or upon the county board of revision''s order to
    the sheriff to transfer abandoned land to a community development organization,
    school district, municipal corporation, county, or township under section 323.74
    of the Revised Code, any common law or statutory right of redemption shall forever
    terminate upon the occurrence of whichever of the following is applicable:

    (A) In the case of a sale of the land at public auction, upon the order of confirmation
    of the sale by the county board of revision and the filing of such order with
    the clerk of court, who shall enter it upon the journal of the court or a separate
    journal;

    (B) In the case of a transfer of the land to a community development organization,
    school district, municipal corporation, county, or township under section 323.74
    of the Revised Code, upon the filing with the clerk of court an order to transfer
    the parcel based on the adjudication of foreclosure by the county board of revision
    ordering the sheriff to transfer the land in fee simple to the community development
    organization, school district, municipal corporation, county, or township pursuant
    to such adjudication, which the clerk shall enter upon the journal of the court
    or a separate journal;

    (C)(1) In the case of a transfer of the land to a certificate holder or county
    land reutilization corporation pursuant to division (G) of section 323.73 of the
    Revised Code, upon the filing with the clerk of court the county board of revision''s
    order to the sheriff to execute a deed to the certificate holder or corporation
    based on the adjudication of foreclosure, which the clerk shall enter upon the
    journal of the court or a separate journal;

    (2) In the case of an adjudication of foreclosure in which a court or board of
    revision has included in its adjudication decree that the alternative redemption
    period authorized in section 323.78 of the Revised Code applies, then upon the
    expiration of such alternative redemption period.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.76
- number: '323.77'
  heading: Notice by electing subdivision of desire to acquire land
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) As used in this section, "electing subdivision" has the same meaning
    as in section 5722.01 of the Revised Code.

    (B) At any time from the date the complaint for foreclosure is filed under section
    323.69 of the Revised Code, but not later than sixty days after the date on which
    the land was first offered for sale, an electing subdivision or a county land
    reutilization corporation may give the county treasurer, prosecuting attorney,
    or board of revision notice in writing that it seeks to acquire any parcel of
    abandoned land, identified by parcel number, from the abandoned land list. If
    any such parcel of abandoned land identified under this section is offered for
    sale pursuant to section 323.73 of the Revised Code, but is not sold for want
    of a minimum bid, the electing subdivision or a county land reutilization corporation
    that identified that parcel of abandoned land shall be deemed to have appeared
    at the sale and submitted the winning bid at the auction, and the parcel of abandoned
    land shall be sold to the electing subdivision or corporation for no consideration
    other than the costs prescribed in section 323.75 of the Revised Code or those
    costs to which the electing subdivision or corporation and the county treasurer
    mutually agree. The conveyance shall be confirmed, and any common law or statutory
    right of redemption forever terminated, upon the filing with the clerk of court
    the order of confirmation based on the adjudication of foreclosure by the county
    board of revision, which the clerk shall enter upon the journal of the court or
    a separate journal.

    If a county land reutilization corporation and an electing subdivision both request
    to acquire the parcel, the electing subdivision shall have priority to acquire
    the parcel. Notwithstanding its prior notice to the county treasurer under this
    section that it seeks to acquire the parcel of abandoned land, if a county land
    reutilization corporation has also requested to acquire the parcel, the electing
    subdivision may withdraw the notice before confirmation of the conveyance, in
    which case the parcel shall be conveyed to the county land reutilization corporation.'
