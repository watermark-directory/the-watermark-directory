- number: '307.654'
  heading: Domestic violence fatality review board - purpose and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The purpose of a domestic violence fatality review board established under
    section 307.651 of the Revised Code is to decrease the incidence of deaths occurring
    as a result of domestic violence by doing all of the following:

    (A) Promoting cooperation, collaboration, and communication between all groups,
    professions, agencies, or entities engaged in the prevention of, and education
    about, domestic violence;

    (B) Maintaining a comprehensive database of all deaths by domestic violence that
    occur in the county or region served by the review board in order to develop an
    understanding of the causes and incidence of those deaths;

    (C) Recommending and developing plans for implementing local service and program
    changes and changes to the groups, professions, agencies, or entities that serve
    local residents that might prevent deaths by domestic violence;

    (D) Providing the department of health with aggregate data, trends, and patterns
    concerning deaths by domestic violence.'
