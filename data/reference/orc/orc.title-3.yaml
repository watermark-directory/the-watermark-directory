- number: '307.44'
  heading: Liability insurance for motor vehicles owned by county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners may procure policies of insurance insuring
    officers and employees of the county against liability on account of damage or
    injury to persons and property, including liability on account of death by wrongful
    act, occasioned by the operation of a motor vehicle, motor vehicles with auxiliary
    equipment, or all self-propelling equipment or trailers owned or operated by the
    county. Whenever the board deems it necessary to procure such insurance, it shall
    adopt a resolution setting forth the necessity therefor, together with a statement
    of the estimated premium cost, and upon adoption of the resolution the board may
    purchase such insurance. The premium for such insurance or any other insurance
    covering county vehicular equipment may be paid out of the county road fund.
