- number: '307.18'
  heading: Transfer of property to county commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'Any agreement entered into under sections 307.14 to 307.19, inclusive, of
    the Revised Code, may provide for the transfer to the board of county commissioners
    of any property, real or personal, used or useful, in the performance of functions
    or the rendering of services under such agreement. Such transfer may include the
    proceeds of bonds issued or to be issued by the contracting subdivision, appropriate
    to the powers, functions, or services under the agreement, such proceeds to be
    expended by the board subject to the same conditions as would govern the contracting
    subdivision. Such transfer may convey the absolute title to such property, subject,
    in the case of the disposal or encumbrance of such real property by the board,
    to the consent of the legislative authority of the contracting subdivision; or
    may convey its use only, or any estate or title less than absolute; may limit
    the power of the board to dispose of such property; and may provide for its return,
    disposition, division, or distribution, in the event of the rescission or expiration
    of the agreement.

    Any such agreement may provide for transfer to the legislative authority of the
    municipal corporation of any property, real or personal, used or useful, in the
    performance of functions or the rendering of services under such agreement. Such
    transfer may include the proceeds of bonds issued or to be issued by the county,
    appropriate to the powers, functions, or services under the agreement, such proceeds
    to be expended by the legislative authority of the municipal corporation subject
    to the same conditions as would govern the county. Such transfer may convey the
    absolute title to such property, subject, in the case of the disposal or encumbrance
    of such real property by the legislative authority, to the consent of the board;
    or may convey its use only, or any estate or title less than absolute; may limit
    the power of the legislative authority of the municipal corporation to dispose
    of such property; and may provide for its return, disposition, division, or distribution,
    in the event of the rescission or expiration of the agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.18
- number: '307.19'
  heading: Application of sections
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Sections 307.14 to 307.19, inclusive, of the Revised Code, do not repeal or
    abrogate other sections of the Revised Code authorizing contracts or agreements
    among particular classes of subdivisions, or modify or impair the force of such
    sections in respect of contracts or agreements entered into under such sections.
    Nor shall such other sections control or limit the making of agreements under
    sections 307.14 to 307.19, inclusive, of the Revised Code; it being intended that
    such sections shall be applied as fully as though such other sections did not
    exist.
  history: null
