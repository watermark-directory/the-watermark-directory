- number: '323.65'
  heading: Expedited foreclosure on unoccupied land definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'As used in sections 323.65 to 323.79 of the Revised Code:

    (A) "Abandoned land" means delinquent lands or delinquent vacant lands, including
    any improvements on the lands, that are unoccupied and that first appeared on
    the list compiled under division (C) of section 323.67 of the Revised Code, or
    the delinquent tax list or delinquent vacant land tax list compiled under section
    5721.03 of the Revised Code, at whichever of the following times is applicable:

    (1) In the case of lands other than agricultural lands, at any time after the
    county auditor makes the certification of the delinquent land list under section
    5721.011 of the Revised Code;

    (2) In the case of agricultural lands, at any time after two years after the county
    auditor makes the certification of the delinquent land list under section 5721.011
    of the Revised Code.

    (B) "Agricultural land" means lands on the agricultural land tax list maintained
    under section 5713.33 of the Revised Code.

    (C) "Clerk of court" means the clerk of the court of common pleas of the county
    in which specified abandoned land is located.

    (D) "Delinquent lands" and "delinquent vacant lands" have the same meanings as
    in section 5721.01 of the Revised Code.

    (E) "Impositions" means delinquent taxes, assessments, penalties, interest, costs,
    reasonable attorney''s fees of a certificate holder, applicable and permissible
    costs of the prosecuting attorney of a county, and other permissible charges against
    abandoned land.

    (F)(1) "Unoccupied," with respect to a parcel of land, means any of the following:

    (a) No building, structure, land, or other improvement that is subject to taxation
    and that is located on the parcel is physically inhabited as a dwelling;

    (b) No trade or business is actively being conducted on the parcel by the owner,
    a tenant, or another party occupying the parcel pursuant to a lease or other legal
    authority, or in a building, structure, or other improvement that is subject to
    taxation and that is located on the parcel;

    (c) The parcel is uninhabited and there are no signs that it is undergoing a change
    in tenancy and remains legally habitable, or that it is undergoing improvements,
    as indicated by an application for a building permit or other facts indicating
    that the parcel is experiencing ongoing improvements.

    (2) For purposes of division (F)(1) of this section, it is prima-facie evidence
    and a rebuttable presumption that may be rebutted to the county board of revision
    that a parcel of land is unoccupied if, at the time the county auditor makes the
    certification under section 5721.011 of the Revised Code, the parcel is not agricultural
    land, and two or more of the following apply:

    (a) At the time of the inspection of the parcel by a county, municipal corporation,
    or township in which the parcel is located, no person, trade, or business inhabits,
    or is visibly present from an exterior inspection of, the parcel.

    (b) No utility connections, including, but not limited to, water, sewer, natural
    gas, or electric connections, service the parcel, or no such utility connections
    are actively being billed by any utility provider regarding the parcel.

    (c) The parcel or any improvement thereon is boarded up or otherwise sealed because,
    immediately prior to being boarded up or sealed, it was deemed by a political
    subdivision pursuant to its municipal, county, state, or federal authority to
    be open, vacant, or vandalized.

    (d) The parcel or any improvement thereon is, upon visible inspection, insecure,
    vacant, or vandalized.

    (G) "Community development organization" means a nonprofit corporation that is
    formed or organized under Chapter 1702. or 1724. of the Revised Code and to which
    both of the following apply:

    (1) The organization is in good standing under law at the time the county auditor
    makes the certification under section 5721.011 of the Revised Code and has remained
    in good standing uninterrupted for at least the two years immediately preceding
    the time of that certification or, in the case of a county land reutilization
    corporation, has remained so from the date of organization if less than two years.

    (2) As of the time the county auditor makes the certification under section 5721.011
    of the Revised Code, the organization has received from the county, municipal
    corporation, or township in which abandoned land is located official authority
    or agreement by a duly authorized officer of that county, municipal corporation,
    or township to accept the owner''s fee simple interest in the abandoned land and
    to the abandoned land being foreclosed, and that official authority or agreement
    had been delivered to the county treasurer or county board of revision in a form
    that will reasonably confirm the county''s, municipal corporation''s, or township''s
    assent to transfer the land to that community development organization under section
    323.74 of the Revised Code. No such official authority or agreement by a duly
    authorized officer of a county, municipal corporation, or township must be received
    if a county land reutilization corporation is authorized to receive tax-foreclosed
    property under its articles of incorporation, regulations, or Chapter 1724. of
    the Revised Code.

    (H) "Certificate holder" has the same meaning as in section 5721.30 of the Revised
    Code.

    (I) "Abandoned land list" means the list of abandoned lands compiled under division
    (A) of section 323.67 of the Revised Code.

    (J) "Alternative redemption period," in any action to foreclose the state''s lien
    for unpaid delinquent taxes, assessments, charges, penalties, interest, and costs
    on a parcel of real property pursuant to section 323.25, sections 323.65 to 323.79,
    or section 5721.18 of the Revised Code, means twenty-eight days after an adjudication
    of foreclosure of the parcel is journalized by a court or county board of revision
    having jurisdiction over the foreclosure proceedings. Upon the expiration of the
    alternative redemption period, the right and equity of redemption of any owner
    or party shall terminate without further order of the court or board of revision.
    As used in any section of the Revised Code and for any proceeding under this chapter
    or section 5721.18 of the Revised Code, for purposes of determining the alternative
    redemption period, the period commences on the day immediately following the journalization
    of the adjudication of foreclosure and ends on and includes the twenty-eighth
    day thereafter.

    (K) "County land reutilization corporation" means a corporation organized under
    Chapter 1724. of the Revised Code.'
