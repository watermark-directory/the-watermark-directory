- number: '313.11'
  heading: Unlawfully disturbing a body
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) No person, without an order from the coroner, any deputy coroner, or
    an investigator or other person designated by the coroner as having authority
    to issue an order under this section, shall purposely remove or disturb the body
    of any person who has died in the manner described in section 313.12 of the Revised
    Code, or purposely and without such an order disturb the clothing or any article
    upon or near such a body or any of the possessions that the coroner has a duty
    to store under section 313.14 of the Revised Code.

    (B) It is an affirmative defense to a charge under this section that the offender
    attempted in good faith to rescue or administer life-preserving assistance to
    the deceased person, even though it is established he was dead at the time of
    the attempted rescue or assistance.

    (C) Whoever violates this section is guilty of unlawfully disturbing a body, a
    misdemeanor of the fourth degree.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.11
- number: '313.12'
  heading: Notice to coroner of violent, suspicious, unusual or sudden death
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A)(1) When any person dies in circumstances as described in division (A)(2)
    of this section, the physician, certified nurse-midwife, clinical nurse specialist,
    or certified nurse practitioner called in attendance and any of the following
    who obtains knowledge thereof arising from the person''s duties, shall immediately
    notify the office of the coroner of the known facts concerning the time, place,
    manner, and circumstances of the death, and any other information that is required
    pursuant to sections 313.01 to 313.22 of the Revised Code:

    (a) A health care worker caring for the person;

    (b) Any member of an ambulance service or emergency squad;

    (c) A law enforcement agency.

    (2) The notification required by division (A)(1) of this section applies in all
    of the following circumstances:

    (a) When any person dies as a result of criminal or other violent means, by casualty,
    by suicide, or in any suspicious or unusual manner;

    (b) When any person, including a child under two years of age, dies suddenly when
    in apparent good health;

    (c) When any person with a developmental disability dies regardless of the circumstances.

    (3) In the case of a death in circumstances as described in division (A)(2) of
    this section, if a request is made for cremation, the funeral director called
    in attendance shall immediately notify the coroner.

    (B) As used in this section:

    (1) "Developmental disability" has the same meaning as in section 5123.01 of the
    Revised Code.

    (2) "Health care worker" means any individual licensed or otherwise authorized
    by the state to practice a health care profession and any other individual who
    provides health-related services in any setting as part of the individual''s employment
    or otherwise for remuneration.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.12
- number: '313.121'
  heading: Autopsy of child in apparent good health who dies suddenly
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) As used in this section, "parent" means either parent, except that if
    one parent has been designated the residential parent and legal custodian of the
    child, "parent" means the designated residential parent and legal custodian, and
    if a person other than a parent is the child''s legal guardian, "parent" means
    the legal guardian.

    (B) If a child under two years of age dies suddenly when in apparent good health,
    the death shall be reported immediately to the coroner of the county in which
    the death occurred, as required by section 313.12 of the Revised Code. Except
    as provided in division (C) of this section, the coroner or deputy coroner shall
    perform an autopsy on the child. The autopsy shall be performed in accordance
    with rules adopted by the director of health under section 313.122 of the Revised
    Code. The coroner or deputy coroner may perform research procedures and tests
    when performing the autopsy.

    If the child was one year of age or younger at the time of death and the death
    occurred suddenly and unexpectedly, the cause of which is not immediately obvious
    prior to investigation, the coroner, deputy coroner, or other individual who has
    been designated to investigate the child''s death shall complete a sudden unexplained
    infant death investigation reporting form (SUIDI reporting form) developed by
    the United States centers for disease control and prevention or an alternative
    reporting form. The director of health may develop an alternative reporting form
    in consultation with the Ohio state coroners association. The individual who completes
    the reporting form shall retain the form and send a copy of it to the appropriate
    child fatality review board or regional child fatality review board established
    under section 307.621 of the Revised Code. If a coroner or deputy coroner completes
    the reporting form, a copy of the coroner''s report described in section 313.09
    of the Revised Code shall also be sent to the board.

    A completed reporting form and copies of completed reporting forms are not public
    records under section 149.43 of the Revised Code.

    (C) A coroner or deputy coroner is not required to perform an autopsy if the coroner
    of the county in which the death occurred or a court with jurisdiction over the
    deceased body determines under section 313.131 of the Revised Code that an autopsy
    is contrary to the religious beliefs of the child. If the coroner or the court
    makes such a determination, the coroner shall notify the health district or department
    of health with jurisdiction in the area in which the child''s parent resides.
    For purposes of this division, the religious beliefs of the parents of a child
    shall be considered to be the religious beliefs of the child.

    (D) If the child''s parent makes a written or verbal request for the preliminary
    results of the autopsy after the results are available, the coroner, or a person
    designated by the coroner, shall give the parent an oral statement of the preliminary
    results.

    The coroner, within a reasonable time after the final results of the autopsy are
    reported, shall send written notice of the results to the state department of
    health, the health district or department with jurisdiction in the area in which
    the child''s parent resides, and, upon the request of a parent of the child, to
    the child''s attending physician. Upon the written request of a parent of the
    child and the payment of the transcript fee required by section 313.10 of the
    Revised Code, the coroner shall send written notice of the final results to that
    parent. The notice sent to the state department of health shall include all of
    the information specified in rules adopted under section 313.122 of the Revised
    Code.

    (E) On the occurrence of any of the following, the health district or department
    with jurisdiction in the area in which the child''s parent resides shall offer
    the parent any counseling or other supportive services it has available:

    (1) When it learns through any source that an autopsy is being performed on a
    child under two years of age who died suddenly when in apparent good health;

    (2) When it receives notice that the final result of an autopsy performed pursuant
    to this section concluded that the child died of sudden infant death syndrome;

    (3) When it is notified by the coroner that, pursuant to division (C) of this
    section, an autopsy was not performed.

    (F) When a health district or department receives notice that the final result
    of an autopsy performed pursuant to this section concluded that the child died
    of sudden infant death syndrome or that, pursuant to division (C) of this section,
    an autopsy was not performed but sudden infant death syndrome may have been the
    cause of death, it shall offer the child''s parent information about sudden infant
    death syndrome. The state department of health shall ensure that current information
    on sudden infant death syndrome is available for distribution by health districts
    and departments.'
