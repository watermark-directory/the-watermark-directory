- number: '323.155'
  heading: Tax bill to reflect reductions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'The tax bill prescribed under section 323.131 of the Revised Code shall indicate
    the net amount of taxes due following the reductions in taxes under sections 319.301,
    319.302, 319.303, 319.304, 323.152, and 323.16 of the Revised Code.

    Any reduction in taxes under section 323.152 of the Revised Code shall be disregarded
    as income or resources in determining eligibility for any program or calculating
    any payment under Title LI of the Revised Code.'
