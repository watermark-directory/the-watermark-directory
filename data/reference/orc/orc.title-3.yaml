- number: '322.03'
  heading: Allocating and disbursing tax proceeds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '322'
    name: Real Property and Manufactured Home Transfer Taxes
  text: 'The funds collected by a county levying a real property transfer tax or a
    manufactured home transfer tax pursuant to sections 322.01 to 322.07 of the Revised
    Code shall be allocated and disbursed as follows:

    (A) First, for payment of the costs incurred by the county in the administration
    and enforcement of the tax;

    (B) The balance remaining after payment of the expenses referred to in division
    (A) of this section shall be deposited in the county general fund to be expended
    for any purpose for which general fund moneys of the county may be used, including
    the acquisition or construction of permanent improvements, or in the bond retirement
    fund for the payment of debt service charges on notes or bonds of the county issued
    for the acquisition or construction of permanent improvements. The amounts to
    be deposited in each of the funds shall be determined by the board of county commissioners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-322.03
- number: '322.04'
  heading: Instituting actions to recover taxes and penalty due
  title:
    num: '3'
    name: Counties
  chapter:
    num: '322'
    name: Real Property and Manufactured Home Transfer Taxes
  text: A county levying a real property transfer tax, by proper suit, action, or
    proceeding in any court of competent jurisdiction, may recover the amount of such
    taxes due the county and not paid to the county at the time specified in section
    322.02 of the Revised Code, together with a penalty of ten per cent of the amount
    of such tax.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-322.04
- number: '322.05'
  heading: No preemption of county power to tax
  title:
    num: '3'
    name: Counties
  chapter:
    num: '322'
    name: Real Property and Manufactured Home Transfer Taxes
  text: The levy of any excise, income, property, real property, or manufactured home
    transfer tax or fee by the state or by any political subdivision of the state
    shall not be construed as preempting the power of a county to levy a real property
    or manufactured home transfer tax pursuant to sections 322.01 to 322.07 of the
    Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-322.05
- number: '322.06'
  heading: Manufactured home transfer tax
  title:
    num: '3'
    name: Counties
  chapter:
    num: '322'
    name: Real Property and Manufactured Home Transfer Taxes
  text: '(A) For the purpose of paying the costs of enforcing and administering the
    tax and providing additional general revenue for the county, any county may levy
    and collect a tax to be known as the manufactured home transfer tax on each certificate
    of title that conveys, by resale on or after January 1, 2000, a used manufactured
    home or used mobile home, as defined in division (A)(6) of section 5739.0210 of
    the Revised Code, located wholly or partially within the boundaries of the county.

    (B) The tax shall be assessed at a rate equal to the real property transfer tax
    rate of the county as adopted and levied by the county pursuant to section 322.02
    of the Revised Code.

    (C) Except as provided in division (B) of section 322.07 of the Revised Code,
    the manufactured home transfer tax shall be levied at a uniform rate. The tax
    shall be levied pursuant to a resolution adopted by the board of county commissioners
    of the county in the manner prescribed by division (A) of section 322.02 of the
    Revised Code.

    (D) The tax shall be levied upon the grantor named on the certificate of title
    and paid to the auditor of the county in which the home is located at the time
    of the delivery of the certificate of title and shall be for the use of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-322.06
- number: '322.07'
  heading: Rate for owners receiving homestead exemption
  title:
    num: '3'
    name: Counties
  chapter:
    num: '322'
    name: Real Property and Manufactured Home Transfer Taxes
  text: '(A) By resolution the board of county commissioners may prescribe a lower
    rate for the real property transfer tax levied under section 322.02 of the Revised
    Code than the uniform rate that is otherwise levied. The lower rate shall apply
    to any deed conveying a homestead receiving a reduction in taxes under division
    (A) of section 323.152 of the Revised Code.

    (B) A board of county commissioners that prescribes a lower real property transfer
    tax rate under division (A) of this section shall prescribe the same lower rate
    for the manufactured home transfer tax if it levies a manufactured home transfer
    tax under section 322.06 of the Revised Code. The lower manufactured home transfer
    tax rate shall apply to any certificate of title conveying a used manufactured
    or used mobile home receiving a reduction in assessable value under section 4503.065
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-322.07
- number: '322.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '322'
    name: Real Property and Manufactured Home Transfer Taxes
  text: Whoever violates section 322.02 or 322.06 of the Revised Code shall be fined
    not less than one hundred nor more than one thousand dollars, or imprisoned not
    more than six months, or both.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-322.99
- number: '323.01'
  heading: Collection of taxes definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'Except as otherwise provided, as used in Chapter 323. of the Revised Code:

    (A) "Subdivision" means any county, township, school district, or municipal corporation.

    (B) "Municipal corporation" includes charter municipalities.

    (C) "Taxes" means the total amount of all charges against an entry appearing on
    a tax list and the duplicate thereof that was prepared and certified in accordance
    with section 319.28 of the Revised Code, including taxes levied against real estate;
    taxes on property whose value is certified pursuant to section 5727.23 of the
    Revised Code; recoupment charges applied pursuant to section 5713.35 of the Revised
    Code; all assessments; penalties and interest charged pursuant to section 323.121
    of the Revised Code; charges added pursuant to section 319.35 of the Revised Code;
    and all of such charges which remain unpaid from any previous tax year.

    (D) "Current taxes" means all taxes charged against an entry on the general tax
    list and duplicate of real and public utility property that have not appeared
    on such list and duplicate for any prior tax year and any penalty thereon charged
    by division (A) of section 323.121 of the Revised Code. Current taxes, whether
    or not they have been certified delinquent, become delinquent taxes if they remain
    unpaid after the last day prescribed for payment of the second installment of
    current taxes without penalty.

    (E) "Delinquent taxes" means:

    (1) Any taxes charged against an entry on the general tax list and duplicate of
    real and public utility property that were charged against an entry on such list
    and duplicate for a prior tax year and any penalties and interest charged against
    such taxes.

    (2) Any current taxes charged on the general tax list and duplicate of real and
    public utility property that remain unpaid after the last day prescribed for payment
    of the second installment of such taxes without penalty, whether or not they have
    been certified delinquent, and any penalties and interest charged against such
    taxes.

    (F) "Current tax year" means, with respect to particular taxes, the calendar year
    in which the first installment of taxes is due prior to any extension granted
    under section 323.17 of the Revised Code.

    (G) "Liquidated claim" means:

    (1) Any sum of money due and payable, upon a written contractual obligation executed
    between the subdivision and the taxpayer, but excluding any amount due on general
    and special assessment bonds and notes;

    (2) Any sum of money advanced and paid to or received and used by a subdivision,
    pursuant to a resolution or ordinance of such subdivision or its predecessor in
    interest, and the moral obligation to repay which sum, when in funds, shall be
    recognized by resolution or ordinance by the subdivision.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.01
- number: '323.011'
  heading: Taxes defined for certain sections
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: As used in sections 323.02 to 323.05 of the Revised Code, "taxes" means taxes
    levied against real estate and general taxes levied against tangible personal
    property and all delinquencies.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.011
- number: '323.02'
  heading: Acceptance of claim by county treasurer - certificates - assignment of
    certificate
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'The county treasurer shall, upon submission of evidence of a liquidated claim
    by a taxpayer, accept it in full or partial payment of those taxes which are to
    be allocated to the subdivision against which the claim exists.

    Before any such liquidated claim is used, it shall first be presented by the taxpayer
    to the fiscal officer of the subdivision for verification. If such fiscal officer,
    upon examination, determines that the liquidated claim can be used for the payment
    of taxes as provided in sections 323.01 to 323.05, inclusive, of the Revised Code,
    he shall, in writing, certify to such fact in duplicate, and such duplicate certificate
    shall be given to the taxpayer as evidence of his liquidated claim.

    If, of the total amount due from the taxpayer, the portion which is to be allocated
    to the indebted subdivision exceeds the amount of the liquidated claim evidenced
    by the certificate which the taxpayer wishes to use in payment of that portion
    of his taxes, the treasurer shall accept the total claim as part payment of such
    taxes, and shall distribute the canceled receipted certificate, along with such
    other canceled certificates and cash as are due it, to the subdivision in the
    same manner as though it were cash.

    The treasurer shall receipt upon the duplicate certificate the amount credited
    for taxes as provided in this section. If the amount of the claim, as evidenced
    by the certificate, is greater than the portion of the taxes to be paid by the
    taxpayer which will be allocated to the subdivision, the treasurer shall indorse
    on such certificate the amount that is accepted in payment of taxes, and a similar
    indorsement shall be made upon the duplicate certificate, which shall be retained
    by the taxpayer. This certificate, to the extent of the sum receipted for taxes,
    shall be allocated to the indebted subdivision in lieu of cash. If there is a
    balance due on such certificate, the fiscal officer shall, upon its surrender,
    issue to the taxpayer a new certificate, in duplicate, setting forth the amount
    due, which certificate may be used by the taxpayer for tax payments at subsequent
    collections in the manner provided in this section. Such new certificate, if founded
    upon a liquidated claim for money advanced and paid out, received and used by
    a subdivision as provided in division (D)(3) of section 323.01 of the Revised
    Code, may be assigned by the taxpayer, and the assignee thereof shall have the
    same right as the original owner of such certificate to use the claim evidenced
    by it in the payment of such assignee''s taxes which are to be allocated to the
    subdivision against which the claim exists, and the treasurer shall have the same
    duty with reference to such certificate as is imposed upon him by this section
    with reference to certificates that have not been assigned. The assignment of
    any such certificate is an assignment of the claim evidenced by it.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.02
- number: '323.03'
  heading: Certificates to be dated
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: Each certificate furnished as provided in sections 323.02 to 323.05, inclusive,
    of the Revised Code, shall be dated and used by the taxpayer for the payment of
    taxes as provided by such sections within six months from its date; otherwise
    it shall be void for the payment of taxes. This shall in no manner impair the
    validity of the claim on which the certificate is based. Such certificates shall
    only be used for the payment of taxes on the 1933 and subsequent duplicates, including
    delinquencies.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.03
- number: '323.04'
  heading: Payment of taxes with liquidated claims
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: A taxpayer may, subject to sections 323.01 to 323.05, inclusive, of the Revised
    Code, use in the payment of his taxes any liquidated claim which such taxpayer,
    or the husband or wife of such taxpayer, has against any subdivision which is
    to derive benefit from the tax collection.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.04
- number: '323.05'
  heading: Claims and certificates nonnegotiable - exception
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'The liquidated claims and certificates described in sections 323.01 to 323.04,
    inclusive, of the Revised Code, shall be nonnegotiable for the purposes of such
    sections, except that where the tax is for property owned jointly by a husband
    and wife or by either of them when the other is the owner of a liquidated claim,
    such liquidated claim and certificate shall be accepted by the county treasurer
    in the manner provided by section 323.02 of the Revised Code in payment of taxes
    levied against the property owned by both or either of them. Such certificates
    shall only be used when a taxpayer or the husband or wife of such taxpayer holds
    a liquidated claim of record against the subdivision.

    The use of such certificates constitutes a reduction of the indebtedness of the
    subdivision to the taxpayer holding such certificates to the extent of the taxes
    credited on them.

    Any certificate issued under section 323.02 of the Revised Code may be used for
    any of the purposes of sections 323.01 to 323.05, inclusive, of the Revised Code,
    and failure of any fiscal officer of any subdivision to give a certificate may
    be enforced by mandamus. All certificates shall be subject to sections 323.03
    and 323.04 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.05
- number: '323.06'
  heading: Payment of special assessments with assessment bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'Where improvements have been made for which special assessments have been
    levied and bonds have been issued, in anticipation of the collection of such special
    assessments, under section 133.17 of the Revised Code, a person chargeable by
    law with the payment of such special assessments may purchase and acquire such
    special assessment bonds and use them at their full face value plus any accrued
    interest in the payment of past due assessments, current assessments, or future
    assessments, plus any penalties or interest accrued at the time of such payment.

    This section does not permit the offering of a special assessment bond in payment
    of special assessments other than in the case of a bond issued in anticipation
    of any special assessments of that political subdivision.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.06
- number: '323.07'
  heading: County treasurer authorized to accept bonds - no cash refunds - distribution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'The county treasurer may accept special assessment bonds as provided in section
    323.06 of the Revised Code when offered in an amount equal or greater than the
    amount of the assessment owing, in full payment of such special assessment. The
    treasurer shall not refund in cash or in any other form to the special assessment
    taxpayer the difference between the value of the bonds offered and the amount
    of the special assessment for which payment is made, but a group of special assessment
    taxpayers may purchase one or more bonds and the treasurer shall accept them in
    payment of the special assessments owing in such instance.

    The treasurer, at the time for distributing special assessment taxes, shall distribute
    to the proper subdivision the bonds received by the treasurer under this section
    and section 323.06 of the Revised Code. The distribution so made shall be a full
    or partial discharge of the special assessment taxes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.07
- number: '323.071'
  heading: Advance payment of installments of special assessment - cancellation of
    installments - use of money
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'The taxing authority of any political subdivision which levies any special
    assessment or reassessment payable in installments over a period of more than
    one year may by resolution authorize its fiscal officer to accept payment in cash
    of all of the installments of such assessments or reassessments charged against
    any lot or parcel of land and not due at the time such resolution is adopted.
    Such taxing authority may waive the payment of interest included in such installments,
    except that if such installments are pledged to the payment of outstanding bonds
    or notes, interest upon such installments must be collected at the rate borne
    by such bonds or notes up to the time when an amount of such bonds or notes, not
    less than the amount of such installments, can be paid, redeemed, or purchased
    according to their terms or by agreement with their holders.

    If such installments have been certified to the county auditor for collection,
    the fiscal officer of the subdivision shall, upon the payment of such installments,
    certify the fact of payment to said auditor, who shall thereupon cancel such installments
    upon his records.

    If any bonds or notes issued in anticipation of the levy or collection of such
    installments are outstanding, the money derived from such payments shall be used
    only for the payment, redemption, or purchase of, and the payment of interest
    on, such bonds or notes, and if the subdivision has no such bonds or notes outstanding,
    such money shall be used for the payment of any other funded debt of the subdivision.
    If the subdivision has no funded debt, such money shall be credited to its general
    fund and used for the purposes thereof.

    Any assessment in the amount of twenty-five dollars or less, or any unpaid balance
    of twenty-five dollars or less, shall be paid in full, and not in installments,
    at the time the first or next installment would otherwise become due and payable.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.071
- number: '323.08'
  heading: Publishing schedule of tax rates and effective rates
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) After certifying the tax list and duplicate pursuant to section 319.28
    of the Revised Code, the county auditor shall deliver a list of the tax rates,
    tax reduction factors, and effective tax rates assessed and applied against each
    of the two classes of property of the county to the county treasurer, who shall
    immediately cause a schedule of such tax rates and effective rates to be published
    using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation in the
    county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    Alternatively, in lieu of such publication, the county treasurer may insert a
    copy of such schedule with each tax bill mailed. Such schedule shall specify particularly
    the rates and effective rates of taxation levied for all purposes on the tax list
    and duplicate for the support of the various taxing units within the county, expressed
    in dollars and cents for each one thousand dollars of valuation. The effective
    tax rates shall be printed in boldface type.

    (B) The county treasurer shall publish notice of the date of the last date for
    payment of each installment of taxes once a week for two successive weeks before
    such date using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    The notice shall contain notice that any taxes paid after such date will accrue
    a penalty and interest and that failure to receive a tax bill will not avoid such
    penalty and interest. The notice shall contain a telephone number that may be
    called by taxpayers who have not received tax bills.

    (C) As used in this section and section 323.131 of the Revised Code, "effective
    tax rate" means the effective rate after making the reduction required by section
    319.301, but before making the reduction required by section 319.302 or, if applicable,
    319.303 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.08
- number: '323.09'
  heading: Office of county treasurer open for collection of taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: The office of the county treasurer shall be kept open for the collection of
    taxes from the time of delivery of the duplicate to the treasurer until the twentieth
    day of June, except during such time as it may be necessary to close the office
    for the purpose of the February settlement of such taxes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.09
- number: '323.11'
  heading: State's lien for taxes attaches and continues until paid
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'The lien of the state for taxes levied for all purposes on the real and public
    utility tax list and duplicate for each year shall attach to all real property
    subject to such taxes on the first day of January, annually, or as provided in
    section 5727.06 of the Revised Code, and continue until such taxes, including
    any penalties, interest, or other charges accruing thereon, are paid.

    Taxes may be apportioned in case of transfer of a part of any tract or lot of
    real estate, in which case the lien of such taxes shall extend to the transferred
    part and the remaining parts only to the extent of the amounts allocated to such
    respective parts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.11
- number: '323.12'
  heading: Payment of taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) Each person charged with taxes shall pay to the county treasurer the
    full amount of such taxes on or before the thirty-first day of December, or shall
    pay one-half of the current taxes together with the full amount of any delinquent
    taxes before such date, and the remaining half on or before the twentieth day
    of June next ensuing.

    When taxes are paid by installments, each payment shall be apportioned among the
    several funds for which taxes have been assessed.

    (B) A tax is paid on or before the dates set forth in this section if the tax
    payment is received by the county treasurer or if prepayments are applied by the
    treasurer toward the payment of taxes as provided by section 321.45 of the Revised
    Code on or before the last day for payment of such tax, or if the tax payment
    is received after such date in an envelope that was postmarked by the United States
    postal service on or before the last day for payment of such tax. In the event
    there is more than one date of postmark on the envelope, the earliest date imprinted
    by the United States postal service shall be the date of payment. A private meter
    postmark on an envelope is not a valid postmark for purposes of establishing the
    date of payment of such tax.

    (C) The treasurer may delay the closing of the treasurer''s books for any collection
    period for the purpose of receiving and processing such payments.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.12
- number: '323.121'
  heading: Penalty and interest for failure to pay real estate taxes and installments
    when due
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A)(1) Except as otherwise provided in division (A)(2) of this section, if
    one-half of the current taxes charged against an entry of real estate together
    with the full amount of any delinquent taxes are not paid on or before the thirty-first
    day of December in that year or on or before the last day for payment as extended
    pursuant to section 323.17 of the Revised Code, a penalty of ten per cent shall
    be charged against the unpaid balance of such half of the current taxes on the
    duplicate. If the total amount of all the taxes is not paid on or before the twentieth
    day of June, next thereafter, or on or before the last day for payment as extended
    pursuant to section 323.17 of the Revised Code, a like penalty shall be charged
    on the balance of the total amount of such unpaid current taxes.

    (2) After a valid delinquent or omitted tax contract that includes unpaid current
    taxes from a first-half collection period described in section 323.12 of the Revised
    Code has been entered into under section 323.31 or 5713.20 of the Revised Code,
    no ten per cent penalty shall be charged against such taxes after the second-half
    collection period while the delinquent or omitted tax contract remains in effect.
    On the day a delinquent or omitted tax contract becomes void, the ten per cent
    penalty shall be charged against such taxes and shall equal the amount of penalty
    that would have been charged against unpaid current taxes outstanding on the date
    on which the second-half penalty would have been charged thereon under division
    (A)(1) of this section if the contract had not been in effect.

    (B)(1) On the first day of the month following the last day the second installment
    of taxes may be paid without penalty, interest shall be charged against and computed
    on all delinquent taxes other than the current taxes that became delinquent taxes
    at the close of the last day such second installment could be paid without penalty.
    The charge shall be for interest that accrued during the period that began on
    the preceding first day of December and ended on the last day of the month that
    included the last date such second installment could be paid without penalty.
    The interest shall be computed at the rate per annum prescribed by section 5703.47
    of the Revised Code and shall be entered as a separate item on the tax list and
    duplicate compiled under section 319.28 or 5721.011 of the Revised Code, whichever
    list and duplicate are first compiled after the date on which the interest is
    computed and charged. However, for tracts and lots on the real property tax suspension
    list under section 319.48 of the Revised Code, the interest shall not be entered
    on the tax list and duplicate compiled under section 319.28 of the Revised Code,
    but shall be entered on the first tax list and duplicate compiled under section
    5721.011 of the Revised Code after the date on which the interest is computed
    and charged.

    (2) In a county on behalf of which a county land reutilization corporation has
    been organized under Chapter 1724. of the Revised Code, upon the written order
    of the county treasurer, interest shall be charged against and computed on delinquent
    taxes as provided in division (B)(2)(a) or (b) of this section, as prescribed
    in the order:

    (a) In the manner provided under divisions (B)(1) and (B)(3) of this section,
    except that the interest shall be computed at the rate of twelve per cent per
    annum; or

    (b) On the first day of the month following the month in which interest otherwise
    would be charged in accordance with division (B)(1) of this section as specified
    in the order, and each subsequent month, interest shall be charged against and
    computed on all delinquent taxes remaining delinquent on the last day of the preceding
    month at a rate of one per cent per month.

    The county treasurer shall file a copy of the order directing the rate and manner
    of charging interest under this division with the county treasurer and the tax
    commissioner. If interest is charged under division (B)(2) of this section, interest
    shall not be charged under division (B)(1) or (3) of this section.

    (3) On the first day of December, the interest shall be charged against and computed
    on all delinquent taxes. The charge shall be for interest that accrued during
    the period that began on the first day of the month following the last date prescribed
    for the payment of the second installment of taxes in the current year and ended
    on the immediately preceding last day of November. The interest shall be computed
    at the rate per annum prescribed by section 5703.47 of the Revised Code and shall
    be entered as a separate item on the tax list and duplicate compiled under section
    319.28 or 5721.011 of the Revised Code, whichever list and duplicate are first
    compiled after the date on which the interest is computed and charged. However,
    for tracts and lots on the real property tax suspension list under section 319.48
    of the Revised Code, the interest shall not be entered on the tax list and duplicate
    compiled under section 319.28 of the Revised Code, but shall be entered on the
    first tax list and duplicate compiled under section 5721.011 of the Revised Code
    after the date on which the interest is computed and charged.

    (4) After a valid delinquent tax contract has been entered into for the payment
    of any delinquent taxes, no interest shall be charged against such delinquent
    taxes while the delinquent tax contract remains in effect in compliance with section
    323.31 of the Revised Code. If a valid delinquent tax contract becomes void, interest
    shall be charged against the delinquent taxes for the periods that interest was
    not permitted to be charged while the delinquent tax contract was in effect. The
    interest shall be charged on the day the delinquent tax contract becomes void
    and shall equal the amount of interest that would have been charged against the
    unpaid delinquent taxes outstanding on the dates on which interest would have
    been charged thereon under divisions (B)(1), (2), and (3) of this section had
    the delinquent tax contract not been in effect.

    (C) If the full amount of the taxes due at either of the times prescribed by division
    (A) of this section is paid within ten days after such time, the county treasurer
    shall waive the collection of and the county auditor shall remit one-half of the
    penalty provided for in that division for failure to make that payment by the
    prescribed time.

    (D) The county treasurer shall compile and deliver to the county auditor a list
    of all tax payments the treasurer has received as provided in division (C) of
    this section. The list shall include any information required by the auditor for
    the remission of the penalties waived by the treasurer. The taxes so collected
    shall be included in the settlement next succeeding the settlement then in process.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.121
- number: '323.122'
  heading: Extension for payment of real property tax for members of armed forces
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) As used in this section:

    (1) "Active duty" has the same meaning as in division (F) of section 5919.34 of
    the Revised Code.

    (2) "Dependent parent" means a parent who, at the time the member was activated,
    received from the member at least half of the dependent parent''s support, including
    food, shelter, clothing, and medical and dental care.

    (B) This section applies to any real property or manufactured or mobile home that
    is:

    (1) Owned by a member of the national guard or a member of a reserve component
    of the armed forces of the United States who is called to active duty;

    (2) Owned by the spouse of such a member;

    (3) Owned jointly by such a member and that member''s spouse or dependent parent;
    or

    (4) Owned by the dependent parent of such a member who dies during such duty or
    as the result of wounds or illness incurred during such duty.

    (C) The member, the member''s spouse, or the member''s parent, as applicable,
    may apply to the county treasurer for an extension for the payment of taxes and
    assessments charged against the real property or manufactured or mobile home and
    payable during the period of the member''s duty service and the six months ensuing
    termination thereof. Additionally, application may be made on behalf of a member
    under a power of attorney granted by the member. Application shall be made not
    later than the last day of the sixth month after the month in which the member''s
    duty terminates. The applicant shall provide evidence satisfactory to the county
    treasurer to demonstrate eligibility for the extension as described in division
    (B) of this section.

    If the county treasurer determines that the applicant qualifies for an extension
    under this section, the county treasurer shall enter into a contract with the
    applicant for payment of the taxes and assessments in installments in the same
    manner as, and subject to the same terms and conditions of, contracts for the
    payment of delinquent taxes pursuant to section 323.31 of the Revised Code, except
    that the contract shall specify that payments shall begin in the seventh month
    after the member''s duty terminates. Notwithstanding sections 319.49, 323.01,
    323.121, 323.132, 4503.06, 5721.01, and 5721.011 of the Revised Code, taxes and
    assessments, payment of which has been extended under this section, do not constitute
    delinquent taxes and shall not be placed on the delinquent land list or delinquent
    manufactured home tax list unless the contract becomes void, and a new contract
    is not entered into, pursuant to section 323.31 of the Revised Code.

    (D) If a member, a member''s spouse, or a member''s parent qualifies for the extension
    provided in this section, and that member, spouse, or parent has designated an
    agent for the payment of taxes and assessments the payment of which is so extended,
    that agent shall not require the member, spouse, or parent to pay to the agent
    any such taxes and assessments for the period for which payment is extended under
    division (C) of this section. If such taxes or assessments are paid by the member,
    spouse, or parent to an agent as part of a mortgage loan installment payment,
    the agent shall deduct the portion of the payment that represents such taxes and
    assessments from the amount of each such payment payable during the period of
    extension prescribed by division (C) of this section.

    (E) If the member, the member''s spouse, or the member''s parent has entered into
    a contract pursuant to this section before the first day of the seventh month
    after the month in which the member''s duty terminates, the county auditor and
    treasurer shall remove from the tax list and duplicate, respectively, any penalties
    and interest that were charged under section 323.121 or 4503.06 of the Revised
    Code during the member''s duty and before the first day of the seventh month after
    the month in which the member''s duty terminates.

    (F) Notwithstanding section 323.131 of the Revised Code, a county treasurer shall
    include a notice of, and information about, the extension provided in this section
    on or with tax bills mailed or delivered under section 323.13 or 4503.06 of the
    Revised Code or by providing such notice and information using at least one of
    the following methods when tax bills are mailed or delivered under those sections:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.122
- number: '323.13'
  heading: Tax bill mailed or delivered - failure to receive bill
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A)(1) Except as provided in section 323.134 of the Revised Code, immediately
    upon receipt of any tax duplicate from the county auditor, but not less than twenty
    days prior to the last date on which the first one-half taxes may be paid without
    penalty as prescribed in section 323.12 or 323.17 of the Revised Code, the county
    treasurer shall cause to be prepared and mailed or delivered to each person charged
    on such duplicate with taxes or to an agent designated by such person, the tax
    bill prescribed by the commissioner of tax equalization under section 323.131
    of the Revised Code. When taxes are paid by installments, the county treasurer
    shall mail or deliver to each person charged on such duplicate or the agent designated
    by such person, a second tax bill showing the amount due at the time of the second
    tax collection. The second-half tax bill shall be mailed or delivered at least
    twenty days prior to the close of the second-half tax collection period. The treasurer
    shall maintain a record of the person or agent to whom each bill is mailed or
    delivered.

    (2) A county treasurer may adopt a policy authorizing persons required to receive
    a tax bill under division (A)(1) of this section to request to receive the bill
    at an electronic mail address or telephone number capable of receiving the bill.

    A person who has made such a request may, at any time, rescind that request by
    providing the county treasurer with written notice of that rescission and a current
    mailing address to which the tax bill may be delivered. The request shall terminate
    upon a change in the name of the person charged with the taxes pursuant to section
    319.20 of the Revised Code.

    A county treasurer may rescind a policy adopted under division (A)(2) of this
    section by providing notice to all persons who requested to receive electronic
    delivery of tax bills under division (A)(2) of this section or division (D)(6)(a)
    of section 4503.06 of the Revised Code not later than thirty days before that
    rescission. Such notice shall be sent to the electronic mail address or telephone
    number provided by each person and shall inform the person that future tax bills
    will be mailed or delivered to the mailing address on file with the county treasurer
    and that the person may update that mailing address with written notice to the
    treasurer.

    Electronic mail addresses and telephone numbers submitted to the county treasurer
    pursuant to division (A)(2) of this section or division (D)(6)(a) of section 4503.06
    of the Revised Code are not public records for purposes of section 149.43 of the
    Revised Code.

    Nothing in division (A)(2) of this section or division (D)(6)(a) of section 4503.06
    of the Revised Code authorizes a county treasurer to impose a fee or charge to
    receive a tax bill by mail against a person that does not make an electronic delivery
    request under either of those divisions.

    (B) After delivery of the delinquent land duplicate as prescribed in section 5721.011
    of the Revised Code, the county treasurer may prepare and mail to each person
    in whose name property therein is listed an additional tax bill showing the total
    amount of delinquent taxes appearing on such duplicate against such property.
    The tax bill shall include a notice that the interest charge prescribed by division
    (B) of section 323.121 of the Revised Code has begun to accrue.

    (C) A change in the mailing address, electronic mail address, or telephone number
    of any tax bill shall be made in writing to the county treasurer.

    (D) Upon certification by the county auditor of the apportionment of taxes following
    the transfer of a part of a tract or lot of real estate, and upon request by the
    owner of any transferred or remaining part of such tract or parcel, the treasurer
    shall cause to be prepared and mailed or delivered to such owner a tax bill for
    the taxes allocated to the owner''s part, together with the penalties, interest,
    and other charges.

    (E) Failure to receive any bill required by this section does not excuse failure
    or delay to pay any taxes shown on such bill or, except as provided in division
    (B)(1) of section 5715.39 of the Revised Code, avoid any penalty, interest, or
    charge for such delay.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.13
- number: '323.131'
  heading: Form and contents of tax bill
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) Each tax bill prepared and mailed or delivered under section 323.13 of
    the Revised Code shall be in the form and contain the information required by
    the tax commissioner. The commissioner may prescribe different forms for each
    county and may authorize the county auditor to make up tax bills and tax receipts
    to be used by the county treasurer. For any county in which the board of county
    commissioners has granted a partial property tax exemption on homesteads under
    section 323.158 of the Revised Code, the commissioner shall require that the tax
    bills for those homesteads include a notice of the amount of the tax reduction
    that results from the partial exemption. In addition to the information required
    by the commissioner, each tax bill shall contain the following information:

    (1) The taxes levied and the taxes charged and payable against the property;

    (2) The effective tax rate. The words "effective tax rate" shall appear in boldface
    type.

    (3) The following notices:

    (a) "Notice: If the taxes are not paid within sixty days from the date they are
    certified delinquent, the property is subject to foreclosure for tax delinquency."
    Failure to provide such notice has no effect upon the validity of any tax foreclosure
    to which a property is subjected.

    (b) "Notice: If the taxes charged against this parcel have been reduced by the
    2-1/2 per cent tax reduction for residences occupied by the owner but the property
    is not a residence occupied by the owner, the owner must notify the county auditor''s
    office not later than March 31 of the year following the year for which the taxes
    are due. Failure to do so may result in the owner being convicted of a fourth
    degree misdemeanor, which is punishable by imprisonment up to 30 days, a fine
    up to $250, or both, and in the owner having to repay the amount by which the
    taxes were erroneously or illegally reduced, plus any interest that may apply.

    If the taxes charged against this parcel have not been reduced by the 2-1/2 per
    cent tax reduction and the parcel includes a residence occupied by the owner,
    the parcel may qualify for the tax reduction. To obtain an application for the
    tax reduction or further information, the owner may contact the county auditor''s
    office at __________ (insert the address and telephone number of the county auditor''s
    office)."

    (4) For a tract or lot on the real property tax suspension list under section
    319.48 of the Revised Code, the following notice: "Notice: The taxes shown due
    on this bill are for the current year only. Delinquent taxes, penalties, and interest
    also are due on this property. Contact the county treasurer to learn the total
    amount due."

    The tax bill shall not contain or be mailed or delivered with any information
    or material that is not required by this section or that is not authorized by
    section 321.45 of the Revised Code or by the tax commissioner.

    (B) If the property is residential rental property, the tax bill shall contain
    a statement that the owner of the residential rental property shall file with
    the county auditor the information required under division (A) or (C) of section
    5323.02 of the Revised Code.

    (C) Each county auditor and treasurer shall post on their respective web sites,
    or on the county''s web site, the percentage of property taxes charged by each
    taxing unit and, in the case of the county as a taxing unit, the percentage of
    taxes charged by the county for each of the county purposes for which taxes are
    charged.

    (D) As used in this section, "residential rental property" has the same meaning
    as in section 5323.01 of the Revised Code.'
