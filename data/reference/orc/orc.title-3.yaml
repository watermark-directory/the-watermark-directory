sections:
- number: '301.01'
  heading: Petition relating to new county or county seat
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: When a petition, memorial, or remonstrance is presented to the general assembly
    for or against the erection of a new county, or for the location or relocation
    of a county seat, the petitioners must be eighteen years of age and resident taxpayers
    or voters within the several townships in which they reside. The petition shall
    set forth the name of the township and county in which the petitioners reside,
    and that their residence is within or out of the bounds of the proposed new county,
    as the case may be. The foregoing requirements shall be proven by the certificate
    of a township fiscal officer or by the oath of a respectable freeholder or voter,
    certified by a person authorized to administer oaths. The certificate or oath
    shall specify on the petition, memorial, or remonstrance the number of signers
    there were to the paper at the time of the certifying or oath.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.01
- number: '301.02'
  heading: Notice of intention to present petition
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: 'Previous to the presentation of a petition to the general assembly praying
    that a new county be erected, or for the location or relocation of a county seat,
    notice of the intention to present such petition shall be given, at least thirty
    days before the ensuing session of the general assembly, using at least one of
    the following methods:

    (A) By advertisement in the print or digital edition of a newspaper of general
    circulation in each county from which such new county is intended to be taken;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of each county from which such new
    county is intended to be taken.

    The notice shall set forth the boundary lines of the new county, or the place
    where it is proposed to locate such county seat.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.02
- number: '301.03'
  heading: Maximum circulation time for petition
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: 'No petition, memorial, or remonstrance, relative to the erection of a new
    county, or the change of a county seat, that has been in circulation a longer
    time than six months previous to the beginning of the session at which it is presented
    shall be received by the general assembly, nor shall any names of petitioners
    be written on a separate paper or sheet and attached to such petition, memorial,
    or remonstrance.

    At the time such petition or memorial is presented, the speaker of the house of
    representatives or president of the senate, to which it is offered, shall inquire
    whether notice has been given as required by section 301.02 of the Revised Code,
    and whether such petition or memorial has been a longer time in circulation than
    is allowed by this section. If satisfactory proof of such requirements is produced,
    the petition or memorial shall be received, and not otherwise.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.03
- number: '301.04'
  heading: Petition must show desired location of seat of justice
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: All persons petitioning the general assembly for the erection of a new county,
    or a review or removal of a seat of justice, shall, in their petition, identify
    the place where they wish the seat of justice to be fixed, and present therewith
    the notice required by section 301.02 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.04
- number: '301.05'
  heading: Division of funds with new county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: When a new county is created and organized, the money remaining in the county
    treasuries of the counties from which the new county is taken, after deducting
    all just debts and demands due or owing at the time of setting off the new county,
    except debts contracted for public buildings in the old county, shall be divided
    according the land and other taxable property within the new county, and within
    the counties from which the new county was taken, from which the tax was paid.
    The county treasurers of the old counties shall pay over such money to the treasurer
    of the new county. Moneys donated to such county by individuals for erection of
    public buildings or other purposes, or received as clear profit on the sale of
    county town lots, the property of such old counties, shall not be subject to division.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.05
- number: '301.06'
  heading: Settlement between boards of county commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: The board of county commissioners of a new county, created and organized from
    one or more counties, shall call on the boards of the counties from which such
    new county was taken for a settlement of the money which remains in the county
    treasuries of such counties. The boards of such old counties, when called on by
    the board of the new county, shall settle with it within three months thereafter,
    and give orders on the old county treasurers, in favor of the new county treasurer,
    for the amount due such new county, as provided in section 301.05 of the Revised
    Code, and the old treasurers shall pay such amount to the treasurer of the newly
    erected county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.06
- number: '301.07'
  heading: Enforcing settlement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: 'If the board of county commissioners of an old county refuses or neglects,
    when called on, to settle with the board of a new county, and to give such board
    an order on its county treasurer for the amount found due such new county, the
    court of common pleas of the old county shall, upon the application of the board
    of the new county, proceed in a summary manner, upon notice, to compel the board
    of such old county to make settlement and give such order. Such court shall enforce
    any order it makes in the premises by attaching the persons of the commissioners
    of the old county until such order is complied with and the costs of the application
    are paid.

    If there is no money in the county treasury of the old county to pay such order
    when presented, the treasurer of the old county shall pay the order from the first
    money received by him for county purposes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.07
- number: '301.08'
  heading: Representation of new counties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: A new county shall be represented in the house of representatives of the state,
    during the decennial period in which it is created, in the same manner as if the
    law creating it had not been passed.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.08
- number: '301.13'
  heading: Forfeiture for delinquency of duty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: 'An officer who neglects or refuses to perform a duty charged under sections
    301.05 to 301.08 of the Revised Code, relating to funds, shall forfeit and pay
    a sum not exceeding one hundred fifty dollars, at the discretion of the court
    of common pleas.

    All forfeitures imposed by this section shall be recovered, with costs of suit,
    in a civil action in the name of the state for the use of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.13
- number: '301.14'
  heading: Appointment of commissioners to establish seat of justice
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: When a new county is established, the governor, with the advice and consent
    of the senate, shall appoint three commissioners to fix and establish a seat of
    justice for such county. No person residing within or holding any real estate
    in the new county shall be appointed commissioner.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.14
- number: '301.15'
  heading: Selection of seat of justice
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: 'Within sixty days after their appointment, the commissioners provided for
    by section 301.14 of the Revised Code, or any two of them, shall assemble at some
    convenient place in the new county. Twenty days'' notice of the time, place, and
    purpose of such meeting shall be given using at least one of the following methods:

    (A) By publication in the print or digital edition of a newspaper of general circulation
    in the county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.

    When assembled, after having taken the oath of office prescribed by sections 3.22
    and 3.23 of the Revised Code, such commissioners shall proceed to examine and
    select the most proper place as a seat of justice, as near the center of the county
    as possible, having regard to the situation, extent of population, quality of
    land, and the convenience and interest of the inhabitants.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.15
- number: '301.16'
  heading: Report of commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: After having agreed upon the place for the seat of justic as provided in section
    301.15 of the Revised Code, the commissioners, provided for by section 301.14
    of the Revised Code, shall make a report to the next court of common pleas to
    be held in such county, if it has been organized. If the county has not been organized,
    such report shall be made to the court of common pleas of any county to which
    such new county, or any part thereof, is attached for judicial purposes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.16
- number: '301.19'
  heading: Commissioners may select another site
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: If the land agreed on by the commissioners, appointed as provided by section
    301.14 of the Revised Code, cannot be purchased at the price limited, or if a
    good title in fee simple cannot be obtained, the commissioners shall select the
    next most eligible place for the seat of justice.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.19
- number: '301.20'
  heading: Bribery of commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: Any commissioner, appointed as provided by section 301.14 of the Revised Code,
    who receives money or any property as a bribe, either directly or indirectly,
    in the execution of his office , shall forfeit and pay a sum not less than three
    hundred nor more than one thousand dollars, for the use of the county, with costs
    of suit.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.20
- number: '301.21'
  heading: Compensation of commissioner
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: Each commissioner, appointed as provided by section 301.14 of the Revised
    Code, shall receive three dollars for each day he is employed in discharging the
    duties required of him by sections 301.14, 301.15, 301.16, 301.19, 301.20, and
    301.22 of the Revised Code, and his actual expenses while engaged in such duties,
    to be paid from the county treasury of the county where such proceedings are returned,
    and to which the new county is attached, the amount of which, with the interest
    thereon, shall be refunded by the new county as soon as it is organized.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.21
- number: '301.22'
  heading: County declared body politic and corporate
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: Every county adopting a charter or an alternative form of government is a
    body politic and corporate for the purpose of enjoying and exercising the rights
    and privileges conveyed under it by the constitution and the laws of this state.
    Such county is capable of suing and being sued, pleading and being impleaded.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.22
- number: '301.221'
  heading: Liability for loss of public funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: The treasurer, auditor, or other officer having the duties of a county treasurer
    or a county auditor, for a county that has adopted a charter under Article X,
    Ohio Constitution, shall not be held liable for a loss of public funds when the
    officer has performed all official duties required of the office with reasonable
    care, but shall be liable only when a loss of public funds results from the officer's
    negligence or other wrongful act.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.221
- number: '301.23'
  heading: County civil service commission
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: The electors of any county may establish, by charter provision, a county civil
    service commission, personnel office, or personnel department. In any county which,
    by its charter, creates such a commission, office, or department, and provides
    a system for appointment to the county service on the basis of merit and fitness,
    as ascertained by competitive examination, Chapter 124. of the Revised Code is
    not operative; but the director of administrative services has the same powers
    and duties with respect to all county civil service commissions, personnel offices,
    and personnel departments as it possesses with reference to municipal civil service
    commissions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.23
- number: '301.24'
  heading: County health department or agency
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: The electors of any county may establish, by charter provision, a county department
    or agency for the administration of public health services. The authorities provided
    in accordance with the county charter shall exercise all the powers and perform
    all the duties which are vested in or imposed upon the authorities of city or
    general health districts. All health districts shall thereupon by abolished within
    the county, and the county shall succeed to the property, rights, and obligations
    of such districts. The department of health shall have the same powers with respect
    to a county health department or agency as it possesses with reference to a general
    health district. A county health department or agency may participate in any state
    grants for the expenses of local health administration on the same basis and to
    the same degree as a general health district.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.24
- number: '301.25'
  heading: Noninstitutional relief for needy persons
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: In addition to other powers vested in it, the board of county commissioners
    of any county may provide for needy persons in the county, whose condition requires
    it, such noninstitutional support, care, assistance, or relief as they are entitled
    to received at public expense, and establish a suitable office or agency for its
    administration.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.25
- number: '301.26'
  heading: Acquisition, maintenance, and operation of county parks by board of county
    commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: 'The board of county commissioners of any county may acquire, construct, improve,
    maintain, operate, and protect parks, parkways, and forests, and provide an agency
    for their administration. For such purposes the board may acquire real estate
    in fee or a lesser interest, and may receive and execute the terms of gifts and
    bequests of money, lands, or other properties.

    This section does not authorize a county to appropriate any property acquired
    by a park district pursuant to section 1545.11 of the Revised Code. The board
    may make contributions to a park district pursuant to section 307.281 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.26
- number: '301.27'
  heading: Use of county credit cards
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: '(A) As used in this section:

    (1) "Credit card" includes gasoline and telephone credit cards but excludes any
    procurement card authorized under section 301.29 of the Revised Code.

    (2) "Officer" includes an individual who also is an appointing authority.

    (B) A board of county commissioners, in consultation with the county auditor,
    shall adopt a policy by resolution regarding the use of county credit cards by
    the board of county commissioners, by the office of any other county appointing
    authority, or by an officer or employee of the board or any other appointing authority.
    The board shall deliver a copy of the policy to the county auditor. The policy
    shall include all of the following:

    (1) The procedure for submitting itemized receipts for purchases to the county
    auditor;

    (2) Any other provision regarding the use of county credit cards so long as the
    provision does not conflict with this section.

    (C) A county credit card shall be used in accordance with this section and in
    accordance with the policy adopted under division (B) of this section.

    (D) A county appointing authority shall apply to the board of county commissioners
    for authorization to have an officer or employee of the appointing authority use
    a county credit card. The authorization request shall state whether the card is
    to be issued in the name of the office of the appointing authority in the name
    of an officer or employee. A county appointing authority shall notify, and update
    as necessary, the county auditor and the board of county commissioners regarding
    in whose name a county credit card is issued.

    (E)(1) A county credit card shall be used only for purchases that satisfy all
    of the following:

    (a) The purchase is for a work-related expense.

    (b) The purchase serves a public purpose.

    (c) The debt incurred as a result of the purchase is payable with available moneys
    appropriated to a specific appropriation line item that is appropriate for the
    purchase.

    (d) The purchase complies with this section and with the policy adopted by the
    board of county commissioners under division (B) of this section.

    (2) An officer, employee, or appointing authority is liable in the manner prescribed
    under division (H) of this section for the following, unless approved by the board
    of county commissioners:

    (a) Finance charges;

    (b) Late fees or late penalties;

    (c) Sales tax.

    (F)(1) Except as otherwise provided in division (F)(2) of this section, every
    officer or employee authorized to use a county credit card shall submit to the
    board by the first day of each month an estimate of the officer''s or employee''s
    work-related expenses along with the specific appropriation line items from which
    those expenditures are to be made, unless the board authorizes, by resolution,
    the officer or employee to submit to the board such an estimate for a period longer
    than one month. The board may revise the estimate and determine the amount it
    approves, if any, not to exceed the estimated amount. The board shall certify
    the amount of its determination to the county auditor along with the specific
    appropriation line items from which the expenditures are to be made. After receiving
    certification from the county auditor that the determined sum of money is in the
    treasury or in the process of collection to the credit of the specific appropriation
    line items for which the credit card is approved for use, and is free from previous
    and then-outstanding obligations or certifications, the board shall authorize
    the officer or employee to incur debt for the expenses against the county''s credit
    up to the authorized amount.

    (2) In lieu of following the procedure set forth in division (F)(1) of this section,
    a board of county commissioners may adopt a resolution authorizing an officer
    or employee of an appointing authority to use a county credit card to pay for
    specific work-related expenses, or use a specific credit card for work-related
    expenses, without submitting an estimate of those expenses to the board as required
    by division (F)(1) of this section. Before adopting the resolution, the board
    shall notify the county auditor. The resolution shall specify whether the officer''s
    or employee''s exemption extends to the use of a specific credit card or to one
    or more specific work-related uses. A new resolution is not necessary when a new
    credit card number is issued due to fraudulent use of the specified credit card.
    Before any credit card exempted for specific uses may be used to make purchases
    for uses other than those specific uses listed in the resolution, the procedures
    outlined in division (F)(1) of this section must be followed or the use shall
    be considered an unauthorized use. Use of any credit card under division (F)(2)
    of this section shall be limited to the amount appropriated and encumbered in
    a specific appropriation line item for the permitted use or uses designated in
    the authorizing resolution, or, in the case of a resolution that authorizes use
    of a specific credit card, for each of the permitted uses listed in the resolution,
    but only to the extent the moneys in those specific appropriation line items are
    not otherwise encumbered.

    (3) Any time a county credit card approved for use for an authorized amount under
    division (F)(1) of this section is used for more than that authorized amount,
    any time a county credit card approved for specific work-related expenses under
    division (F)(2) of this section is used for other uses, or any time an officer
    or employee has authority to use a specific card under division (F)(2) of this
    section but uses a different county credit card, the appointing authority may
    request the board of county commissioners to authorize after the fact the unauthorized
    expenditure if, upon the board''s request, the county auditor certifies that sum
    of money is in the treasury or in the process of collection to the credit of the
    appropriate appropriation line item for which the credit card was used, and is
    free from previous and then-outstanding obligations or certifications. If for
    any reason that expenditure is not authorized after the fact, the county treasury
    shall be reimbursed as provided in division (H) of this section.

    (G) After making a credit card purchase, the officer or employee shall provide
    to the county auditor an itemized receipt, in accordance with the policy adopted
    by the board of county commissioners under division (B) of this section.

    (H) Any time a county credit card is used in a manner that is not in accordance
    with this section or with the policy adopted under division (B) of this section,
    the county treasury shall be reimbursed for the amount spent not in accordance
    with this section or with the policy adopted under division (B) of this section,
    as follows:

    (1) If the card is issued in the name of a specific officer or employee, that
    officer or employee is liable in person and upon any official bond the officer
    or employee has given to the county for reimbursing the county treasury.

    (2) If the card is issued in the name of the office of the appointing authority,
    the appointing authority is liable in person and upon any official bond the appointing
    authority has given to the county for reimbursing the county treasury.

    (I) Whenever any officer or employee who is authorized to use a credit card suspects
    the loss, theft, or possibility of unauthorized use of the card, the officer or
    employee shall notify the county auditor and either the officer''s or employee''s
    appointing authority or the board immediately and in writing.

    (J) If the county auditor determines a credit card has been used in a manner that
    is not in accordance with this section or the policy adopted under division (B)
    of this section, the auditor immediately shall notify the board of county commissioners.
    If the board determines, on its own or after notification from the county auditor,
    that the county treasury should be reimbursed for as provided in division (H)
    of this section, the board shall give written notice to the county auditor and
    to the officer or employee or appointing authority liable to the treasury as provided
    in that division. If, within thirty days after issuance of the written notice,
    the county treasury is not reimbursed for the amount shown on the written notice,
    the prosecuting attorney of the county shall recover that amount from the officer
    or employee or appointing authority who is liable under this section by civil
    action in any court of appropriate jurisdiction.

    (K) Use of a county credit card in a manner that is not in accordance with this
    section or with the policy adopted under division (B) of this section is a violation
    of section 2913.21 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-301.27
- number: '301.28'
  heading: Resolution authorizing acceptance of payments by financial transaction
    devices for county expenses
  title:
    num: '3'
    name: Counties
  chapter:
    num: '301'
    name: Organization
  text: '(A) As used in this section:

    (1) "Financial transaction device" includes a credit card, debit card, charge
    card, or prepaid or stored value card, or automated clearinghouse network credit,
    debit, or e-check entry that includes, but is not limited to, accounts receivable
    and internet-initiated, point of purchase, and telephone-initiated applications
    or any other device or method for making an electronic payment or transfer of
    funds.

    (2) "County expenses" includes fees, costs, taxes, assessments, fines, penalties,
    payments, or any other expense a person owes or otherwise pays to a county office
    under the authority of a county official, other than dog registration and kennel
    fees required to be paid under Chapter 955. of the Revised Code. "County expenses"
    includes payment to a county office of money confiscated during the commitment
    of an individual to a county jail, of bail, of money for a prisoner''s inmate
    account, and of money for goods and services obtained by or for the use of an
    individual incarcerated by a county sheriff. "County expenses" includes online
    financial transaction device payments made through the official public sheriff
    sale web site pursuant to section 2329.153 of the Revised Code.

    (3) "County official" includes the county auditor, county treasurer, county engineer,
    county recorder, county prosecuting attorney, county sheriff, county coroner,
    county park district and board of county commissioners, the clerk of the probate
    court, the clerk of the juvenile court, the clerks of court for all divisions
    of the courts of common pleas, and the clerk of the court of common pleas, the
    clerk of a county-operated municipal court, and the clerk of a county court.

    The term "county expenses" includes county expenses owed to the board of health
    of the general health district or a combined health district in the county. If
    the board of county commissioners authorizes county expenses to be paid by financial
    transaction devices under this section, then the board of health and the general
    health district and the combined health district may accept payments by financial
    transaction devices under this section as if the board were a "county official"
    and the district were a county office. However, in the case of a general health
    district formed by unification of general health districts under section 3709.10
    of the Revised Code, this entitlement applies only if all the boards of county
    commissioners of all counties in the district have authorized payments to be accepted
    by financial transaction devices.

    The term "county expenses" also includes fees for services and the receipt of
    gifts to the county law library resources fund authorized by rules adopted by
    the county law library resources board under division (D) of section 307.51 of
    the Revised Code. If the board of county commissioners authorizes county expenses
    to be paid by financial transaction devices under this section, then the county
    law library resources board may accept payments by financial transaction devices
    under this section as if the board were a "county official."

    The term "county expenses" also includes fees, costs, assessments, fines, penalties,
    payments, or any other expense issued by a court of common pleas that a person
    owes or otherwise pays to a county department of probation established under section
    2301.27 of the Revised Code. If the board of county commissioners authorizes county
    expenses to be paid by financial transaction devices under this section, then
    the county department of probation may accept payments by financial transaction
    devices under this section as if the chief probation officer or chief probation
    officer''s designee was a "county official" and the department was a "county office."
    However, in the case of a multicounty department of probation, this entitlement
    applies only if all the boards of county commissioners of all counties in the
    multicounty department have authorized payments to be accepted by financial transaction
    devices. A clerk of the court of common pleas may continue accepting payments
    by financial transaction devices for a county department of probation as authorized
    under this section.

    (B) Notwithstanding any other section of the Revised Code and except as provided
    in division (D) of this section, a board of county commissioners may adopt a resolution
    authorizing the acceptance of payments by financial transaction devices for county
    expenses. The resolution shall include the following:

    (1) A specification of those county officials who, and of the county offices under
    those county officials that, are authorized to accept payments by financial transaction
    devices;

    (2) A list of county expenses that may be paid for through the use of a financial
    transaction device;

    (3) Specific identification of financial transaction devices that the board authorizes
    as acceptable means of payment for county expenses. Uniform acceptance of financial
    transaction devices among different types of county expenses is not required.

    (4) The amount, if any, authorized as a surcharge or convenience fee under division
    (E) of this section for persons using a financial transaction device. Uniform
    application of surcharges or convenience fees among different types of county
    expenses is not required.

    (5) A specific provision as provided in division (G) of this section requiring
    the payment of a penalty if a payment made by means of a financial transaction
    device is returned or dishonored for any reason.

    The board''s resolution shall also designate the county treasurer as an administrative
    agent to solicit proposals, within guidelines established by the board in the
    resolution and in compliance with the procedures provided in division (C) of this
    section, from financial institutions, issuers of financial transaction devices,
    and processors of financial transaction devices, to make recommendations about
    those proposals to the board, and to assist county offices in implementing the
    county''s financial transaction devices program. The county treasurer may decline
    this responsibility within thirty days after receiving a copy of the board''s
    resolution by notifying the board in writing within that period. If the treasurer
    so notifies the board, the board shall perform the duties of the administrative
    agent.

    If the county treasurer is the administrative agent and fails to administer the
    county financial transaction devices program in accordance with the guidelines
    in the board''s resolution, the board shall notify the treasurer in writing of
    the board''s findings, explain the failures, and give the treasurer six months
    to correct the failures. If the treasurer fails to make the appropriate corrections
    within that six-month period, the board may pass a resolution declaring the board
    to be the administrative agent. The board may later rescind that resolution at
    its discretion.

    (C) The county shall follow the procedures provided in this division whenever
    it plans to contract with financial institutions, issuers of financial transaction
    devices, or processors of financial transaction devices for the purposes of this
    section. The administrative agent shall request proposals from at least three
    financial institutions, issuers of financial transaction devices, or processors
    of financial transaction devices, as appropriate in accordance with the resolution
    adopted under division (B) of this section. Prior to sending any financial institution,
    issuer, or processor a copy of any such request, the county shall advertise its
    intent to request proposals once a week for two consecutive weeks using at least
    one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation in the
    county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    The notice shall state that the county intends to request proposals; specify the
    purpose of the request; indicate the date, which shall be at least ten days after
    the second publication, on which the request for proposals will be mailed to financial
    institutions, issuers, or processors; and require that any financial institution,
    issuer, or processor, whichever is appropriate, interested in receiving the request
    for proposals submit written notice of this interest to the county not later than
    noon of the day on which the request for proposals will be mailed.

    Upon receiving the proposals, the administrative agent shall review them and make
    a recommendation to the board of county commissioners on which proposals to accept.
    The board of county commissioners shall consider the agent''s recommendation and
    review all proposals submitted, and then may choose to contract with any or all
    of the entities submitting proposals, as appropriate. The board shall provide
    any financial institution, issuer, or processor that submitted a proposal, but
    with which the board does not enter into a contract, notice that its proposal
    is rejected. The notice shall state the reasons for the rejection, indicate whose
    proposals were accepted, and provide a copy of the terms and conditions of the
    successful bids.

    (D) A board of county commissioners adopting a resolution under this section shall
    send a copy of the resolution to each county official in the county who is authorized
    by the resolution to accept payments by financial transaction devices. After receiving
    the resolution and before accepting payments by financial transaction devices,
    a county official shall provide written notification to the board of county commissioners
    of the official''s intent to implement the resolution within the official''s office.
    Each county office subject to the board''s resolution adopted under division (B)
    of this section may use only the financial institutions, issuers of financial
    transaction devices, and processors of financial transaction devices with which
    the board of county commissioners contracts, and each such office is subject to
    the terms of those contracts.

    If a county office under the authority of a county official is directly responsible
    for collecting one or more county expenses and the county official determines
    not to accept payments by financial transaction devices for one or more of those
    expenses, the office shall not be required to accept payments by financial transaction
    devices, notwithstanding the adoption of a resolution by the board of county commissioners
    under this section.

    Any office of a clerk of the court of common pleas that accepts financial transaction
    devices on or before July 1, 1999, and any other county office that accepted such
    devices before January 1, 1998, may continue to accept such devices without being
    subject to any resolution passed by the board of county commissioners under division
    (B) of this section, or any other oversight by the board of the office''s financial
    transaction devices program. Any such office may use surcharges or convenience
    fees in any manner the county official in charge of the office determines to be
    appropriate, and, if the county treasurer consents, may appoint the county treasurer
    to be the office''s administrative agent for purposes of accepting financial transaction
    devices. In order not to be subject to the resolution of the board of county commissioners
    adopted under division (B) of this section, a county office shall notify the board
    in writing within thirty days after March 30, 1999, that it accepted financial
    transaction devices prior to January 1, 1998, or, in the case of the office of
    a clerk of the court of common pleas, the clerk has accepted or will accept such
    devices on or before July 1, 1999. Each such notification shall explain how processing
    costs associated with financial transaction devices are being paid and shall indicate
    whether surcharge or convenience fees are being passed on to consumers.

    (E) A board of county commissioners may establish a surcharge or convenience fee
    that may be imposed upon a person making payment by a financial transaction device.
    The surcharge or convenience fee shall not be imposed unless authorized or otherwise
    permitted by the rules prescribed by an agreement governing the use and acceptance
    of the financial transaction device.

    If a surcharge or convenience fee is imposed, every county office accepting payment
    by a financial transaction device, regardless of whether that office is subject
    to a resolution adopted by a board of county commissioners, shall clearly post
    a notice in that office and shall notify each person making a payment by such
    a device about the surcharge or fee. Notice to each person making a payment shall
    be provided regardless of the medium used to make the payment and in a manner
    appropriate to that medium. Each notice shall include all of the following:

    (1) A statement that there is a surcharge or convenience fee for using a financial
    transaction device;

    (2) The total amount of the charge or fee expressed in dollars and cents for each
    transaction, or the rate of the charge or fee expressed as a percentage of the
    total amount of the transaction, whichever is applicable;

    (3) A clear statement that the surcharge or convenience fee is nonrefundable.

    (F) If a person elects to make a payment to the county by a financial transaction
    device and a surcharge or convenience fee is imposed, the payment of the surcharge
    or fee shall be considered voluntary and the surcharge or fee is not refundable.

    (G) If a person makes payment by financial transaction device and the payment
    is returned or dishonored for any reason, the person is liable to the county for
    payment of a penalty over and above the amount of the expense due. The board of
    county commissioners shall determine the amount of the penalty, which may be either
    a fee not to exceed twenty dollars or payment of the amount necessary to reimburse
    the county for banking charges, legal fees, or other expenses incurred by the
    county in collecting the returned or dishonored payment. The remedies and procedures
    provided in this section are in addition to any other available civil or criminal
    remedies provided by law.

    (H) No person making any payment by financial transaction device to a county office
    shall be relieved from liability for the underlying obligation except to the extent
    that the county realizes final payment of the underlying obligation in cash or
    its equivalent. If final payment is not made by the financial transaction device
    issuer or other guarantor of payment in the transaction, the underlying obligation
    shall survive and the county shall retain all remedies for enforcement that would
    have applied if the transaction had not occurred.

    (I) A county official or employee who accepts a financial transaction device payment
    in accordance with this section and any applicable state or local policies or
    rules is immune from personal liability for the final collection of such payments.'
