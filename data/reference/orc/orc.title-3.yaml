- number: '311.02'
  heading: Bond
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: 'Except as otherwise provided in section 3.061 of the Revised Code, the sheriff
    shall, within ten days after receiving the sheriff''s commission and before the
    first Monday of January next after being elected, give a bond, signed by a bonding
    or surety company authorized to do business in this state and to be approved by
    the board of county commissioners, or, at the option of such sheriff, signed by
    two or more freeholders having real estate in the value of double the amount of
    the bond, over and above all encumbrances to the state, and in a sum not less
    than five thousand nor more than fifty thousand dollars, which sum shall be fixed
    by the board. The bond shall be conditioned for the faithful performance of the
    duties of the office of sheriff. The expense or premium for such bond shall be
    paid by the board and charged to the general fund of the county. Such bonds, with
    the approval of the board and the oath of office required by sections 3.22 and
    3.23 of the Revised Code, and Section 7 of Article XV, Ohio Constitution, indorsed
    thereon, shall be filed with the county auditor and kept in the auditor''s office.

    The board may require the sheriff, at any time during the sheriff''s term of office,
    to give additional sureties on the sheriff''s bond, or to give a new bond, except
    as otherwise provided in section 3.061 of the Revised Code.

    No judge or clerk of any court or attorney at law shall be received as surety
    on such bond.

    If the sheriff fails to give a bond within the time required, or fails to give
    additional sureties on such bond or a new bond within ten days after receiving
    written notice that the board so requires, the board shall declare the office
    of such sheriff vacant.'
