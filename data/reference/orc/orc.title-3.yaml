- number: '303.23'
  heading: Violation of resolution and regulations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: No person shall locate, erect, construct, reconstruct, enlarge, change, maintain,
    or use any building or use any land in violation of a resolution, or amendment
    or supplement to such resolution, adopted by any board of county commissioners
    under sections 303.01 to 303.25, inclusive, of the Revised Code. Each day's continuation
