- number: '329.051'
  heading: Making voter registration applications available
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'The county department of job and family services shall make voter registration
    applications as prescribed by the secretary of state under section 3503.10 of
    the Revised Code available to persons who are applying for, receiving assistance
    from, or participating in any of the following:

    (A) The medicaid program;

    (B) The Ohio works first program established under Chapter 5107. of the Revised
    Code;

    (C) The prevention, retention, and contingency program established under Chapter
    5108. of the Revised Code.'
