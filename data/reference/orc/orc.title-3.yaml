- number: '307.55'
  heading: Allowance and payment of claims against county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) No claims against the county shall be paid otherwise than upon the allowance
    of the board of county commissioners, upon the warrant, including an electronic
    warrant authorizing direct deposit for payment of a county obligation in accordance
    with division (F) of section 9.37 of the Revised Code, of the county auditor,
    except in those cases in which the amount due is fixed by law or is authorized
    to be fixed by some other person or tribunal, in which case it shall be paid upon
    the warrant of the auditor upon the proper certificate of the person or tribunal
    allowing the claim.

    (B) No public money shall be disbursed by the board or any of its members, but
    shall be disbursed by the county treasurer, upon the warrant, including an electronic
    warrant authorizing direct deposit for payment of a county obligation in accordance
    with division (F) of section 9.37 of the Revised Code, of the auditor specifying
    the name of the party entitled to such money, on what account, and upon whose
    allowance, if not fixed by law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.55
- number: '307.56'
  heading: Appeal from decision of board of county commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'A person aggrieved by the decision of the board of county commissioners may
    appeal to the court of common pleas, as provided by and under the authority of
    Chapter 2506. of the Revised Code. The court shall advance such appeal when perfected
    for immediate trial.

    Where a board of county commissioners has adopted administrative regulations pursuant
    to various enabling sections of the Revised Code, such regulations may provide
    for an appeal or variance therefrom to a higher administrative authority, or board
    of appeals or variances, which authority or board is appointed by the board of
    county commissioners. The decisions of such higher authority or board of appeals
    or variances shall be considered, a "final order" as described in section 2506.01
    of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.56
- number: '307.561'
  heading: Settlement may include rezoning agreement or development plan approval
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Notwithstanding any contrary provision in another section of the Revised
    Code, section 303.12 of the Revised Code, or any vote of the electors on a petition
    for zoning referendum, a county may settle any court action by a consent decree
    or court-approved settlement agreement which may include an agreement to rezone
    any property involved in the action as provided in the decree or court-approved
    settlement agreement without following the procedures in section 303.12 of the
    Revised Code and also may include county approval of a development plan for any
    property involved in the action as provided in the decree or court-approved settlement
    agreement, provided that the court makes specific findings of fact that notice
    has been properly made pursuant to this section and the consent decree or court-approved
    settlement agreement is fair and reasonable.

    (B) If the subject of the consent decree or court-approved settlement agreement
    involves a zoning issue subject to referendum under section 303.12 of the Revised
    Code, the board of county commissioners shall publish notice of their intent to
    meet and consider and take action on the decree or court-approved settlement agreement
    and the date and time of the meeting at least fifteen days before the meeting,
    using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    (C) The board shall permit members of the public to express their objections to
    the consent decree or court-approved settlement agreement at the meeting. Copies
    of the proposed consent decree or court-approved settlement agreement shall be
    available to the public at the board''s office during normal business hours.

    (D) At least ten days before the submission of a proposed consent decree or settlement
    agreement to the court for its review and consideration, the plaintiff in the
    action involving the consent decree or settlement agreement shall publish a notice
    that shall include the caption of the case, the case number, and the court in
    which the consent decree or settlement agreement will be filed, the intention
    of the parties in the action to file a consent decree or settlement agreement,
    and, when applicable, a description of the real property involved and the proposed
    change in zoning or permitted use, using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation in the
    county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.'
