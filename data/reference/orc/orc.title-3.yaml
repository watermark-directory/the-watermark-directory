- number: '307.081'
  heading: Purchase or appropriation of real property for redevelopment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'A board of county commissioners may purchase or appropriate real property
    in the unincorporated territory of the county in order to do all of the following:

    (A) Sell or lease the property;

    (B) After the property is leased or purchased from the county, exempt from real
    property taxes under section 5709.78 of the Revised Code part or all of an improvement
    to the property;

    (C) Once an improvement to the property is exempted from taxation under section
    5709.78 of the Revised Code, charge the owner of the improvement a service payment
    under section 5709.79 of the Revised Code;

    (D) Use the money collected from the service payments to finance the construction
    or repair of public infrastructure improvements that benefit the property and
    that are designated in the resolution adopted under section 5709.78 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.081
- number: '307.082'
  heading: Agreements to provide for construction or repair of public infrastructure
    improvements
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The board of county commissioners may, by resolution, enter into agreements
    to provide for the construction or repair of public infrastructure improvements
    that benefit a tract on which an improvement for which the county has granted
    an exemption from real property taxes under section 5709.78 of the Revised Code
    is located and that are designated in the resolution adopted under that section.

    (B) The board may, by resolution, authorize the issuance of notes of the county
    to finance all costs pertaining to public infrastructure improvements to be made
    under division (A) of this section and division (D) of section 307.081 of the
    Revised Code. The notes shall be signed by the board, shall be attested by the
    signature of the clerk of the board, and shall bear interest in accordance with
    section 9.95 of the Revised Code. The notes are not subject to Chapter 133. of
    the Revised Code. The resolution authorizing the issuance of the notes shall pledge
    the appropriate account of the county''s redevelopment tax equivalent fund to
    pay the interest on and principal of the notes. The resolution may also pledge
    other available funds of the county for this purpose; the resolution, however,
    shall not pledge to levy or collect an ad valorem property tax to pay the interest
    on and principal of the notes. The notes may contain a clause permitting prepayment
    at the option of the board and shall have such other terms as are set forth in
    the resolution authorizing their issuance. The notes shall be offered at public
    or private sale as directed in the resolution.'
