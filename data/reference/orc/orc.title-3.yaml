- number: '311.03'
  heading: Absence, sickness, or other disability
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: When the sheriff, by reason of absence, sickness, or other disability, is
    incapable of serving any process required to be served, or by reason of interest
    is incompetent to serve it, the court of common pleas, if in session, or, if not
    in session, a judge of such court may appoint a suitable person to serve such
    process or to perform the duties of sheriff during the continuance of such disability.
    Such appointee shall give such bond as the court or judge requires, conditioned
    for the faithful performance of his duties, and take the oath of office.
