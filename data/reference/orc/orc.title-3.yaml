- number: '307.98'
  heading: Written partnership agreement with director of job and family services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'As used in this section, "county grantee" has the same meaning as in section
    5101.21 of the Revised Code.

    Each board of county commissioners and each other county grantee of the county
    shall jointly enter into one or more written grant agreements with the director
    of job and family services or the director of children and youth in accordance
    with section 5101.21 of the Revised Code. The board of county commissioners shall
    enter into the agreement on behalf of the county family services agencies, other
    than a county family services agency that is a county grantee.'
