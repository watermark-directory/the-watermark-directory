- number: '307.982'
  heading: Contracts to perform family services duty or workforce development activity
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) To the extent permitted by federal law, including subpart F of 5 C.F.R.
    part 900, and subject to any limitations established by the Revised Code, including
    division (B) of this section, a board of county commissioners may enter into a
    written contract with a private or government entity, including a public or private
    college or university, for the entity to perform a family services duty or workforce
    development activity on behalf of a county family services agency or workforce
    development agency. The entity with which a board contracts is not required to
    be located in the county the board serves.

    A family services duty or workforce development activity includes transportation
    services provided by a county transit board. A board of county commissioners may
    delegate to a county transit board the authority to solicit bids and award and
    execute contracts for such transportation services on behalf of the board of county
    commissioners.

    (B) A board of county commissioners may not enter into a contract under division
    (A) of this section regarding a family services duty of a public children services
    agency if a county children services board appointed under section 5153.03 of
    the Revised Code serves as the public children services agency for the county.
    The county children services board may enter into contracts regarding its duties
    in accordance with division (C)(2) of section 5153.16 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.982
- number: '307.983'
  heading: Plan of cooperation to enhance administration of Ohio works first program,
    prevention, retention, and contingency program, and other family services duties
    and workforce development activities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Each board of county commissioners shall enter into a written plan of cooperation
    with the county family services agencies and workforce development agency serving
    the county to enhance the administration of the Ohio works first program established
    under Chapter 5107. of the Revised Code; the prevention, retention, and contingency
    program established under Chapter 5108. of the Revised Code; and other family
    services duties and workforce development activities the board and agencies agree
    to include in the plan. Other government entities may be included in a plan of
    cooperation. The plan shall specify how the county family services agencies, workforce
    development agency, and other government entities included in the plan are to
    exchange information and coordinate and enhance services and assistance to individuals
    and families.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.983
- number: '307.984'
  heading: Regional plans of cooperation to enhance the administration, delivery,
    and effectiveness of family services duties and workforce development activities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) To enhance the administration, delivery, and effectiveness of family
    services duties and workforce development activities, a board of county commissioners
    may enter into one or more regional plans of cooperation with the following:

    (1) One or more other boards of county commissioners;

    (2) The chief elected official or officials of one or more municipal corporations
    that are local areas as defined in section 6301.01 of the Revised Code;

    (3) Both boards of county commissioners and such chief elected officials.

    (B) A regional plan of cooperation must specify how the private and government
    entities included in the plan will coordinate and enhance the administration,
    delivery, and effectiveness of family services duties and workforce development
    activities.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.984
- number: '307.985'
  heading: Transportation work plan regarding the transportation needs of low income
    residents
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'Each board of county commissioners shall develop a written transportation
    work plan that establishes policies regarding the transportation needs of low
    income residents of the county seeking or striving to retain employment. In developing
    the transportation work plan, the board shall consult with all of the following:

    (A) The county department of job and family services;

    (B) If a regional transit authority created under section 306.32 of the Revised
    Code serves the county, the regional transit authority;

    (C) If a community action agency, as defined in section 5101.311 of the Revised
    Code, serves the county, the community action agency;

    (D) As designated by the board of county commissioners, representatives of private
    nonprofit and government entities that work with issues related to economic development,
    employment, and persons with physical disabilities;

    (E) Other individuals designated by the board of county commissioners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.985
- number: '307.986'
  heading: Procedures for providing services to children whose families relocate frequently
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Each board of county commissioners shall establish procedures for providing
    services to children in the county whose families relocate frequently, causing
    the children to transfer to different schools throughout the year. The board shall
    establish the procedures with the county department of job and family services
    and either each board of education of school districts with territory in the county
    or the education service center or joint educational service center serving the
    county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.986
- number: '307.987'
  heading: Permitting exchange of information needed to improve services and assistance
    to individuals and families and the protection of children
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'To the extent federal and state law permit, a contract entered into under
    section 307.981 or 307.982, a plan of cooperation entered into under section 307.983,
    a regional plan of cooperation entered into under section 307.984, a transportation
    work plan developed under section 307.985, and procedures established under section
    307.986 of the Revised Code shall permit the exchange of information needed to
    improve services and assistance to individuals and families and the protection
    of children. A private or government entity that receives information pursuant
    to a contract, plan, or procedures is bound by the same standards of confidentiality
    as the entity that provides the information.

    A contract, plan, or procedures shall:

    (A) Be coordinated and not conflict with another contract, plan, or procedures
    or an agreement entered into under section 329.05 of the Revised Code;

    (B) Prohibit discrimination in hiring and promotion against applicants for and
    participants of the Ohio works first program established under Chapter 5107. of
    the Revised Code and the prevention, retention, and contingency program established
    under Chapter 5108. of the Revised Code;

    (C) Comply with federal and state law;

    (D) Be adopted by resolution of a board of county commissioners;

    (E) Specify how the contract, plan, or procedures may be amended.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.987
