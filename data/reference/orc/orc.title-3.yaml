- number: '323.33'
  heading: Delinquent amounts most likely uncollectible except through foreclosure
    or through foreclosure and forfeiture
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: If a county treasurer determines, for a tract or lot of real property on the
    delinquent land list and duplicate on which no taxes have been paid for at least
    five years, that the delinquent amounts are most likely uncollectible except through
    foreclosure or through foreclosure and forfeiture, he may certify that determination
    together with his reasons for it to the county board of revision and the prosecuting
    attorney. If the board of revision and the prosecuting attorney determine that
    the delinquent amounts are most likely uncollectible except through foreclosure
    or through foreclosure and forfeiture, they shall certify that determination to
    the county auditor. Upon receipt of the determination, the county auditor shall
    place the tract or lot on the real property tax suspension list maintained under
    section 319.48 of the Revised Code.
