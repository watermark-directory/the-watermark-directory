- number: '345.15'
  heading: Interest in contract
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: No trustee, officer, or employee of the board of trustees of a soldiers' memorial
    shall be interested in any contract entered into by the board, nor shall a trustee,
    officer, or employee of the board be individually liable to any contractor upon
    any contract made under sections 345.01 to 345.17, inclusive, of the Revised Code,
    or to any person on any claim occasioned by any act or default of a contractor,
    or any one employed by such contractor.
