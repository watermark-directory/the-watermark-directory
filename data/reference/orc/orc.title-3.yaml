- number: '341.191'
  heading: Health insurance claims for jail inmates
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) For each person who is confined in a county jail, the county may make
    a determination as to whether the person is covered under a health insurance or
    health care policy, contract, or plan and, if the person has such coverage, what
    terms and conditions are imposed by it for the filing and payment of claims.

    (B) If, pursuant to division (A) of this section, it is determined that the person
    is covered under a policy, contract, or plan and, while that coverage is in force,
    the county jail renders or arranges for the rendering of health care services
    to the person in accordance with the terms and conditions of the policy, contract,
    or plan, then the person, county, or provider of the health care services, as
    appropriate under the terms and conditions of the policy, contract, or plan, shall
    promptly submit a claim for payment for the health care services to the appropriate
    third-party payer and shall designate, or make any other arrangement necessary
    to ensure, that payment of any amount due on the claim be made to the county or
    the provider, as the case may be.

    (C) Any payment made to the county pursuant to division (B) of this section shall
    be paid into the county treasury.

    (D) This section also applies to any person who is under the custody of a law
    enforcement officer, as defined in section 2901.01 of the Revised Code, prior
    to the person''s confinement in the county jail.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.191
- number: '341.192'
  heading: Payment of outside medical provider for necessary care
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) As used in this section:

    (1) "Jail" means a county jail, or a multicounty, municipal-county, or multicounty-municipal
    correctional center.

    (2) "Medical provider" means a physician, hospital, laboratory, pharmacist, pharmacy,
    or other health care provider that is not employed by or under contract to a county,
    municipal corporation, township, the department of youth services, or the department
    of rehabilitation and correction to provide medical services to persons confined
    in a jail or state correctional institution, or is in the custody of a law enforcement
    officer.

    (3) "Necessary care" means medical care of a nonelective nature that cannot be
    postponed until after the period of confinement of a person who is confined in
    a jail or state correctional institution, or is in the custody of a law enforcement
    officer without endangering the life or health of the person.

    (B) If a physician employed by or under contract to a county, municipal corporation,
    township, the department of youth services, or the department of rehabilitation
    and correction to provide medical services to persons confined in a jail or state
    correctional institution determines that a person who is confined in the jail
    or state correctional institution or who is in the custody of a law enforcement
    officer prior to the person''s confinement in a jail or state correctional institution
    requires necessary care that the physician cannot provide, the necessary care
    shall be provided by a medical provider. The county, municipal corporation, township,
    the department of youth services, or the department of rehabilitation and correction
    shall pay a medical provider for necessary care an amount not exceeding the authorized
    reimbursement rate for the same service established by the department of medicaid
    under the medicaid program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-341.192
- number: '341.20'
  heading: Contracts with commercial providers for food, medical, other services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: 'The board of county commissioners, with the consent of the sheriff, may contract
    with commercial providers for the provision to prisoners and other persons of
    food services, medical services, and other programs and services necessary for
    the care and welfare of prisoners and other persons placed in the sheriff''s charge.

    In the absence of a commercial food service contract, the sheriff shall appoint
    a cook who shall have charge over the preparation of food for the feeding of prisoners
    and other persons placed in the sheriff''s charge. The cook need not, but may
    be, required to perform other staff duties provided for in this section. The compensation
    of the cook shall be payable semimonthly from the general fund of the county,
    upon the warrant of the county auditor.'
