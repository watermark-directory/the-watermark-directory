- number: '307.96'
  heading: Charter or amendment effective date
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'Except as provided by Section 3 of Article X, Ohio Constitution, a county
    charter or amendment shall become effective if it has been approved by the majority
    of the electors voting thereon. The charter or amendment shall take effect on
    the thirtieth day after approval unless another date is fixed in the charter or
    amendment.

    No charter or amendment adopted by the electors of any county shall be held ineffective
    or void on account of the insufficiency of the petitions by which such submission
    of the resolution was procured, nor shall the rejection of any charter or amendment
    submitted to the electors of such county, be held invalid for such insufficiency.

    Any charter or charter amendment proposal that is submitted to the electors of
    the county shall be posted in each polling place in some location that is easily
    accessible to the electors.'
