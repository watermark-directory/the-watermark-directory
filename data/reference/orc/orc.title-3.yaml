- number: '340.11'
  heading: Liability insurance
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: 'A board of alcohol, drug addiction, and mental health services may procure
    a policy or policies of insurance insuring board members or employees of the board
    or providers with which the board contracts against liability arising from the
    performance of their official duties. If the liability insurance is unavailable
    or the amount a board has procured or is able to procure is insufficient to cover
    the amount of a claim, the board may indemnify a board member or employee as follows:

    (A) For any action or inaction in the capacity of board member or employee or
    at the request of the board, whether or not the action or inaction is expressly
    authorized by this or any other section of the Revised Code, if both of the following
    apply:

    (1) The board member or employee acted in good faith and in a manner that the
    board member or employee reasonably believed was in or was not opposed to the
    best interests of the board;

    (2) With respect to any criminal action or proceeding, the board member or employee
    had no reason to believe the board member''s or employee''s conduct was unlawful.

    (B) Against any expenses, including attorneys'' fees, the board member or employee
    actually and reasonably incurs as a result of a suit or other proceeding involving
    the defense of any action or inaction in the capacity of board member or employee
    or at the request of the board, or in defense of any claim, issue, or matter raised
    in connection with the defense of such an action or inaction, to the extent that
    the board member or employee is successful on the merits or otherwise.'
  history: null
