- number: '309.15'
  heading: Annual report to attorney general
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: 'On or before the first day of September in each year, if so required by the
    attorney general by a written notice given on or before the first day of August,
    the prosecuting attorney shall transmit to the attorney general a report of all
    crimes prosecuted by indictment or information in his county for the year ending
    the first day of July, specifying:

    (A) Under the head of felonies:

    (1) The number convicted;

    (2) The number acquitted;

    (3) The amount of costs incurred;

    (4) The amount of costs collected.

    (B) Under the head of misdemeanors:

    (1) The number convicted;

    (2) The number acquitted;

    (3) The amount of fines imposed;

    (4) The amount of fines collected;

    (5) The amount of costs incurred;

    (6) The amount of costs collected.

    (C) Such other information as the attorney general requires.

    The attorney general may prepare and forward to the prosecuting attorney the necessary
    blanks and instructions for such annual reports. Prosecuting attorneys shall furnish
    to the attorney general any information he requires in the execution of his office,
    whenever such information is requested by him.'
