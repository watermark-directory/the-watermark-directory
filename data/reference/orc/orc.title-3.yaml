- number: '349.14'
  heading: Election on question of dissolution of authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '349'
    name: New Community Organization
  text: 'Except as provided in section 349.03 of the Revised Code, or as otherwise
    provided in a resolution adopted by the organizational board of commissioners
    of a new community authority, a new community authority organized under this chapter
    may be dissolved only on the vote of a majority of the voters of the new community
    district at a special election called by the board of trustees on the question
    of dissolution. Such an election may be called only after the board has determined
    that the new community development program has been completed, when no community
    authority bonds or notes are outstanding, and other legal indebtedness of the
    authority has been discharged or provided for, and only after there has been filed
    with the board of trustees a petition requesting such election, signed by a number
    of qualified electors residing in the new community district equal to not less
    than eight per cent of the total vote cast for all candidates for governor in
    the new community district at the most recent general election at which a governor
    was elected. If a majority of the votes cast favor dissolution, the board of trustees
    shall, by resolution, declare the authority dissolved and thereupon the community
    authority shall be dissolved. A certified copy of the resolution shall, within
    fifteen days after its adoption, be filed with the clerk of the organizational
    board of commissioners.

    Upon dissolution of a new community authority, the powers thereof shall cease
    to exist. Any property of the new community authority shall vest with a municipal
    corporation, county, or township in which that property is located or with the
    developer of the new community authority or the developer''s designee, all as
    provided in a resolution adopted by the organizational board of commissioners.
    Any vesting of property in a municipal corporation, township, or county shall
    be subject to acceptance of the property by resolution of the legislative authority
    of the municipal corporation, board of township trustees, or board of county commissioners,
    as applicable. If the legislative authority of a municipal corporation, board
    of township trustees, or board of county commissioners declines to accept the
    property, the property vests with the developer or the developer''s designee.
    Any funds of the community authority at the time of dissolution shall be transferred
    to the municipal corporation and county or township, as provided in a resolution,
    in which the new community district is located in the proportion to the assessed
    valuation of taxable real property of the new community authority within such
    municipal corporation and township or county as said valuation appears on the
    current assessment rolls.'
