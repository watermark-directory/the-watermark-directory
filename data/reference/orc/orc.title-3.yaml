- number: '307.511'
  heading: Law library resources board members
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The five members of the county law library resources board shall be residents
    of the county and shall be appointed as follows:

    (1) The prosecuting attorney of the county shall appoint one member whose initial
    term shall expire on December 31, 2010.

    (2) The administrative judges or presiding judges of all municipal courts and
    county courts within the county shall meet to appoint one member who is an attorney
    licensed to practice law in the state and in good standing before the supreme
    court of Ohio and whose initial term shall expire on December 31, 2011.

    (3) The administrative judge or presiding judge of the court of common pleas of
    the county shall appoint one member who is an attorney licensed to practice law
    in the state and in good standing before the supreme court of Ohio and whose initial
    term shall expire on December 31, 2012.

    (4) The board of county commissioners shall appoint one member whose initial term
    shall expire on December 31, 2013.

    (5) The board of county commissioners shall appoint one member whose initial term
    shall expire on December 31, 2014.

    (B) The member appointed pursuant to division (A)(5) of this section shall serve
    as the chairperson of the county law library resources board until December 31,
    2010. After that date, the board shall select a chairperson from among the members
    of the board.

    (C) During the period of July 1, 2009, through December 31, 2010, the county law
    library resources board shall consist of seven members and shall include members
    appointed pursuant to division (A) of this section and two members who are residents
    of the county appointed for this period by the board of trustees of the law library
    association within the county that, prior to the effective date of this section,
    receives fines, penalties, and moneys arising from forfeited bail pursuant to
    sections 3375.50 to 3375.53 of the Revised Code, as amended and repealed by this
    act.

    (D) The initial appointments to the county law library resources board as provided
    in divisions (A) and (B) of this section shall be made on or before July 1, 2009,
    and for the term specified. Thereafter, terms for all members appointed pursuant
    to division (A) of this section shall be for five years, with each term ending
    on the same day of the same month as did the term that it succeeds.

    (E) Each member of the board shall hold office from the date of the member''s
    appointment until the end of the term for which the member was appointed. Vacancies
    shall be filled within sixty days after the vacancy occurs and shall be filled
    in the manner provided for original appointments. Any member appointed to fill
    a vacancy occurring prior to the expiration date of the term for which the member''s
    predecessor was appointed shall hold office as a member for the remainder of that
    term. A member shall continue in office subsequent to the expiration date of the
    member''s term until the member''s successor takes office or until a period of
    sixty days has elapsed, whichever occurs first.

    (F) A member of the board of trustees of a law library association may serve as
    a member of a county law library resources board if the member discloses each
    membership to the board of trustees of the law library association and the county
    law library resources board.'
