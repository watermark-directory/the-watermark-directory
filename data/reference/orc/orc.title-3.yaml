    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners of any county, pursuant to a favorable vote
    of the electors, may, subject to the conditions prescribed in section 307.77 of
    the Revised Code, issue bonds for the purpose of assisting the construction, acquisition,
    maintenance, or operation of a public improvement of a kind set forth in division
    (B)(1) or (2) of section 307.77 of the Revised Code. The proceedings for the authorization
    and sale of such bonds shall, in other respects, be governed by Chapter 133. of
    the Revised Code, and the board may pay the proceeds to the United States, the
    state, county, or other public authority or subdivision which is constructing,
    acquiring, maintaining, or operating the improvement.
