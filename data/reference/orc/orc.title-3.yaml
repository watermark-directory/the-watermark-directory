    name: Sheriff
  text: 'The sheriff shall be allowed fees as follows for service relating to dower:
    For summoning and swearing the board of county commissioners, traveling fees,
    to be computed from the place of return of his proceedings to the place where
    the land lies in which dower is to be assigned, at the rate of ten cents per mile.'
