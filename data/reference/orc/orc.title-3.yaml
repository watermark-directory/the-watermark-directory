  heading: Bonds are lawful investments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: Bonds of a regional transit commission are lawful investments of banks, savings
    banks, mutual savings banks, trust companies, savings and loan associations, deposit
    guaranty associations, bond retirement funds or sinking funds of municipal corporations,
    boards of education, regional transit commissions, counties, the administrator
    of workers' compensation, state teachers retirement system, school employees retirement
    system, public employees retirement system, Ohio police and fire pension fund,
    and domestic insurance companies for life and other than life, and are acceptable
    as security for the deposit of public moneys.
