- number: '340.10'
  heading: County auditor is auditor and fiscal officer of alcohol, drug addiction,
    and mental health service district or joint-county district
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: The county auditor or, in a joint-county alcohol, drug addiction, and mental
    health service district, the auditor of the county, the treasurer of which has
    been designated in the agreement between the counties of the district as custodian
    of the funds for addiction services, mental health services, and recovery supports,
    is hereby designated as the auditor and fiscal officer of an alcohol, drug addiction,
    and mental health service district or joint-county district. State funds allocated
    for the support of a service district shall be paid to the county treasurer or,
    in a joint-county district, to the treasurer of that county designated in the
    agreement as custodian of the funds for addiction services, mental health services,
    and recovery supports and authorized to make payments from such funds on order
    of the county auditor and on recommendation of the board of alcohol, drug addiction,
    and mental health services, or the executive director of the board when authorized
    by the board. The auditor shall submit to the board a detailed monthly statement
    of all receipts, disbursements, and ending balances for the funds for addiction
    services, mental health services, and recovery supports.
