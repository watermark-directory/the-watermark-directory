- number: '311.42'
  heading: Sheriff's concealed handgun license issuance expense fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) Each county shall establish in the county treasury a sheriff''s concealed
    handgun license issuance expense fund. The sheriff of that county shall deposit
    into that fund all fees paid by applicants for the issuance or renewal of a concealed
    handgun license or duplicate concealed handgun license under section 2923.125
    of the Revised Code and all fees paid by the person seeking a concealed handgun
    license on a temporary emergency basis under section 2923.1213 of the Revised
    Code. The county shall distribute all fees deposited into the fund except forty
    dollars of each fee paid by an applicant under division (B) of section 2923.125
    of the Revised Code, fifteen dollars of each fee paid under section 2923.1213
    of the Revised Code, and thirty-five dollars of each fee paid under division (F)
    of section 2923.125 of the Revised Code to the attorney general to be used to
    pay the cost of background checks performed by the bureau of criminal identification
    and investigation and the federal bureau of investigation and to cover administrative
    costs associated with issuing the license.

    (B) The sheriff, with the approval of the board of county commissioners, may expend
    any county portion of the fees deposited into the sheriff''s concealed handgun
    license issuance expense fund for any of the following:

    (1) Any costs incurred by the sheriff in connection with performing any administrative
    functions related to the issuance of concealed handgun licenses under section
    2923.125 or 2923.1213 of the Revised Code, including, but not limited to, personnel
    expenses and any costs associated with a firearm safety education program, or
    a firearm training or qualification program that the sheriff chooses to fund;

    (2) Ammunition and firearms to be used by the sheriff and the sheriff''s employees;

    (3) Any costs incurred in constructing, maintaining, or renovating a shooting
    range to be used by the sheriff or the sheriff''s employees, including costs incurred
    for equipment associated with the shooting range.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.42
- number: '311.43'
  heading: Certification by a chief law enforcement officer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) As used in this section:

    (1) "Certification" means the participation and assent of the chief law enforcement
    officer necessary under federal law for the approval of an application to make
    or transfer a firearm.

    (2) "Chief law enforcement officer" means any official the bureau of alcohol,
    tobacco, firearms, and explosives, or any successor agency, identifies by regulation
    or otherwise as eligible to provide any required certification for the making
    or transfer of a firearm.

    (3) "Concealed handgun license" has the same meaning as in section 2923.11 of
    the Revised Code.

    (B) A resident of this state may submit to the sheriff of the county in which
    the resident resides or to the sheriff of any county adjacent to the county in
    which the resident resides any federal form that requires a law enforcement certification
    by a chief law enforcement officer.

    (C) The sheriff shall accept and process the certification in the same manner
    as an application for a concealed handgun license is processed under section 2923.125
    of the Revised Code, including the requirement for a background check, except
    as follows:

    (1) If a resident of this state submits one or more federal forms, the sheriff
    shall charge the resident no more than the applicable fee described in division
    (B)(1)(a) of section 2923.125 of the Revised Code, without regard to how many
    federal forms are submitted at the same time.

    (2) If a resident of this state submits one or more federal forms and currently
    has a concealed handgun license or the sheriff has previously approved a federal
    form for that resident, the sheriff shall charge the resident no more than the
    applicable fee described in division (F)(4) of section 2923.125 of the Revised
    Code, without regard to how many federal forms are submitted at the same time.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.43
- number: '311.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) Whoever violates section 311.13 of the Revised Code shall be fined not
    more than one thousand dollars and imprisoned in the county jail not less than
    thirty days or more than two years.

    (B) Whoever violates division (A) or (C) of section 311.37 of the Revised Code
    is guilty of failure to file a transient vendor''s information or bond, a minor
    misdemeanor. If the offender previously has been convicted of a violation of division
    (A) of section 311.37 of the Revised Code, failure to file a transient vendor''s
    information or bond is a misdemeanor of the second degree. If the offender previously
    has been convicted of two or more violations of division (A) of section 311.37
    of the Revised Code, failure to file a transient vendor''s information or bond
    is a misdemeanor of the first degree. A sheriff or police officer in a municipal
    corporation may enforce this division. The prosecuting attorney of a county shall
    inform the tax commissioner of any instance when a complaint is brought against
    a transient vendor pursuant to this division.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.99
- number: '313.01'
  heading: Elected - term
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) A coroner shall be elected quadrennially in each county, who shall hold
    office for a term of four years, beginning on the first Monday of January next
    after election.

    (B) As used in the Revised Code, unless the context otherwise requires :

    (1) "Coroner" means the coroner or medical examiner of the county in which death
    occurs or the dead human body is found.

    (2) "Deputy coroner" means the deputy coroner or deputy medical examiner of the
    county in which death occurs or the dead human body is found.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.01
- number: '313.02'
  heading: Qualifications for coroner - continuing education
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A)(1) Except as provided in division (A)(2) of this section, to be eligible
    to the office of coroner, a person shall be a physician who is licensed under
    Chapter 4731. of the Revised Code to practice medicine and surgery or osteopathic
    medicine and surgery, and who is in good standing in the person''s profession.
    For a county other than a charter county, the person also shall have been licensed
    under Chapter 4731. of the Revised Code to practice medicine and surgery or osteopathic
    medicine and surgery for a period of at least two years immediately preceding
    election or appointment as coroner.

    (2) Division (A)(1) of this section does not prohibit a person elected to the
    office of coroner who holds that office on the effective date of this amendment,
    but who does not meet the eligibility conditions described in that division, from
    doing any of the following after that date:

    (a) Continuing to hold the office of coroner of that county until the person''s
    term of office expires;

    (b) Seeking reelection as coroner of that county for one or more subsequent terms
    of office and, if reelected, continuing to hold the office for the duration of
    any subsequent term.

    (B)(1) Beginning in calendar year 2000 and in each fourth year thereafter, each
    newly elected coroner, after the general election but prior to commencing the
    term of office to which elected, shall attend and successfully complete sixteen
    hours of continuing education at programs sponsored by the Ohio state coroners
    association. Within ninety days after appointment to the office of coroner under
    section 305.02 of the Revised Code, the newly appointed coroner shall attend and
    successfully complete sixteen hours of continuing education at programs sponsored
    by the association. Hours of continuing education completed under the requirement
    described in division (B)(1) of this section shall not be counted toward fulfilling
    the continuing education requirement described in division (B)(2) of this section.

    As used in division (B)(1) of this section, "newly elected coroner" means a person
    who did not hold the office of coroner on the date the person was elected coroner.

    (2) Except as otherwise provided in division (B)(2) of this section, beginning
    in calendar year 2001, each coroner, during the coroner''s four-year term, shall
    attend and successfully complete thirty-two hours of continuing education at programs
    sponsored by the Ohio state coroners association. Except as otherwise provided
    in division (B)(2) of this section, each coroner shall attend and successfully
    complete twenty-four of these thirty-two hours at statewide meetings, and eight
    of these thirty-two hours at regional meetings, sponsored by the association.
    The association may approve attendance at continuing education programs it does
    not sponsor but, if attendance is approved, successful completion of hours at
    these programs shall be counted toward fulfilling only the twenty-four-hour requirement
    described in division (B)(2) of this section.

    (3) Upon successful completion of a continuing education program required by division
    (B)(1) or (2) of this section, the person who successfully completes the program
    shall receive from the association or the sponsoring organization a certificate
    indicating that the person successfully completed the program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.02
- number: '313.03'
  heading: Bond
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: 'Except as otherwise provided in section 3.061 of the Revised Code, the coroner
    shall give a bond, signed by a bonding or surety company authorized to do business
    in this state and to be approved by the board of county commissioners, or, at
    the option of such coroner, signed by two or more freeholders having real estate
    in the value of double the amount of the bond, over and above all encumbrances
    to the state, in a sum not less than five thousand nor more than fifty thousand
    dollars, fixed by the board. The bond shall be conditioned for the faithful performance
    of the duties of the office of coroner. The expense or premium for such bond shall
    be paid by the board and charged to the general fund of the county. Such bonds,
    with the approval of the board and the oath of office required by sections 3.22
    and 3.23 of the Revised Code, indorsed thereon, shall be filed with the county
    auditor and kept in the county auditor''s office.

    The board may require the coroner, at any time during employment as coroner, to
    give additional sureties on the coroner''s bond, or to give a new bond, except
    as otherwise provided in section 3.061 of the Revised Code.

    No judge or clerk or any court or attorney at law shall be received as surety
    on such bond.

    If the coroner fails to give a bond within the time required, or fails to give
    additional sureties on such bond or a new bond within ten days after receiving
    written notice that the board so requires, the board shall declare the office
    of such coroner vacant.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.03
- number: '313.04'
  heading: Absence, service, disability, or vacancy
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: 'When the coroner is absent temporarily from the county, or when on duty with
    the armed services of the United States, the state militia, or the American red
    cross, or when unable to discharge the duties of the office of coroner, such coroner
    may appoint a person with the necessary qualifications to act as coroner during
    such absence, service, or disability.

    When there is a vacancy in the coroner''s office as a result of death or resignation
    and the vacancy cannot be filled by election or appointment as provided in section
    305.02 of the Revised Code, or if no one runs for the office of coroner and, for
    that reason, the office is vacant, the board of county commissioners may contract
    with another county''s coroner to exercise the powers and perform the acts, duties,
    or functions of the coroner. In addition to the applicable amounts of compensation
    specified in sections 325.15 and 325.18 of the Revised Code, the coroner with
    whom the board contracts may receive a supplemental payment for services rendered.
    The duration of the contract shall not extend beyond the last day of the term
    for which there was a vacancy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.04
- number: '313.05'
  heading: Appointment of deputy coroners and other personnel
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A)(1) The coroner may appoint, in writing, deputy coroners, who shall be
    licensed physicians of good standing in their profession, one of whom may be designated
    as the chief deputy coroner. The coroner also may appoint pathologists as deputy
    coroners, who may perform autopsies, make pathological and chemical examinations,
    and perform other duties as directed by the coroner or recommended by the prosecuting
    attorney. The coroner may appoint any necessary technicians.

    The coroner may contract for the services of deputy coroners to aid the coroner
    in the execution of the coroner''s powers and duties. Contracts for the services
    of deputy coroners are exempt from any competitive bidding requirements of the
    Revised Code.

    (2) The coroner may appoint, in writing, one or more secretaries and an official
    stenographer, who shall record the testimony of witnesses in attendance upon the
    coroner''s inquest, preserve and file properly indexed records of all official
    reports, acts, and communications of the office, and perform other services as
    required by the coroner.

    (3) The coroner may appoint clerks, stenographers, custodians, and investigators
    and shall define their duties.

    (4) For the performance of their duties, deputy coroners, pathologists serving
    as deputy coroners, and technicians, stenographers, secretaries, clerks, custodians,
    and investigators shall receive salaries fixed by the coroner and payable from
    the county treasury upon the warrant of the county auditor. The compensation shall
    not exceed, in the aggregate, the amount fixed by the board of county commissioners
    for the coroner''s office.

    (B)(1) A coroner may appoint, as a deputy coroner, as a pathologist serving as
    a deputy coroner, or as a technician, stenographer, secretary, clerk, custodian,
    investigator, or other employee a person who is an associate of, or who is employed
    by, the coroner or a deputy coroner in the private practice of medicine in a partnership,
    professional association, or other medical business arrangement.

    (2) A coroner may appoint, as an investigator, a deputy sheriff within the county
    or a law enforcement officer of a political subdivision located within the county.
    The deputy sheriff or law enforcement officer appointed as an investigator may
    receive compensation for services performed as an investigator in addition to
    any other compensation allowed by law.'
