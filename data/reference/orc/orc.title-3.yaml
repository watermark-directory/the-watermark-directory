- number: '317.112'
  heading: Further requirements for instruments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) Each instrument and its contents by which the title to real estate or
    personal property, or by which any interest in or lien on real estate or personal
    property, is conveyed, created, encumbered, assigned, discharged, canceled, or
    otherwise disposed of, and that is presented to the county recorder for recording
    or filing shall be of a quality that permits the legible reproduction of the instrument,
    and the contents of the instrument shall be sufficiently legible to permit their
    reproduction by photographic or microphotographic processes.

    (B)(1) If an instrument that is described in division (A) of this section and
    that is presented for recording or filing does not satisfy the requirements of
    that division, the county recorder, prior to recording or filing the instrument,
    may require the person who presented the instrument for recording or filing to
    do either of the following:

    (a) If the instrument presented was a copy of an original document, to substitute
    the original document for recording or filing if it satisfies the requirements
    of division (A) of this section; or

    (b) To prepare or cause to be prepared, and present for recording or filing a
    true copy of the instrument, which true copy shall be handwritten or typewritten,
    satisfy the requirements of division (A) of this section, and contain a certification
    of the person who prepared the true copy that it is a true copy of the instrument.

    (2) The county recorder shall attach a true copy of an instrument that is presented
    for recording or filing pursuant to division (B)(1)(b) of this section to the
    instrument that was presented for recording or filing.

    (3) The notice that is imparted by the recording or filing of an instrument is
    not affected if the county recorder accepts an instrument for recording or filing
    that subsequently is found not to satisfy the requirements of division (A) of
    this section.

    (C) This section does not apply to wills or death certificates.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.112
- number: '317.113'
  heading: Certified complete English translation to accompany instrument
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: 'The county recorder shall not accept for recording a deed or other instrument
    in writing that is executed or certified in whole or in part in a language other
    than the English language unless it complies with the requirements of sections
    317.11, 317.111, and 317.112 of the Revised Code and is accompanied by a complete
    English translation certified as provided in this section. The translator of the
    deed or other instrument in writing shall certify that the translation is accurate
    and that the translator is competent to perform the translation. The translator
    shall sign and acknowledge the translation of the deed or other instrument in
    writing before a judge of a court of record in this state, a clerk of a court
    of record in this state, a county auditor, a county engineer, or a notary public.

    A certificate of the translator that is substantially in the following form satisfies
    the requirements of this section:

    "CERTIFICATE OF TRANSLATOR

    The undersigned, __________________________, hereby certifies that the document
    attached to this certificate and made a part of this certificate has been translated
    into English by the undersigned; that the translation is accurate; and that the
    undersigned is competent to perform the translation.

    ______________________________

    (Signature of Translator)

    SSN: _________________________

    State of _________________________

    County of ________________________

    The foregoing certificate of translator has been acknowledged before me this _____
    day of __________, ______

    _____________________________

    (Signature of Judge or Officer

    Taking the Acknowledgment)"

    This section does not apply to a deed or other instrument in writing executed
    or certified prior to August 20, 1996.'
