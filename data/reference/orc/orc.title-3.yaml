- number: '353.02'
  heading: Creation of lake facilities authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: 'A lake facilities authority may be created by the board of county commissioners
    of a county that contains all of the territory of an impacted watershed. If the
    territory of an impacted watershed is contained within more than one county, a
    joint facilities lake authority may be created by resolution of the board of commissioners
    of each county in which the impacted watershed is located. A resolution creating
    a lake facilities authority must include a finding that the watershed sought to
    be improved or remediated pursuant to this chapter is an impacted watershed.

    A lake facilities authority created pursuant to this section is a body corporate
    and politic which may sue and be sued, plead and be impleaded, and has the powers
    and jurisdiction enumerated in this chapter. The exercise by an authority of the
    powers conferred upon it shall be deemed to be essential governmental functions
    of this state.

    Within sixty days after the creation of a lake facilities authority, the county
    engineer of each county with territory in the impacted watershed shall prepare
    a survey denoting the boundaries of the impacted watershed in the county. The
    survey shall include references to the county auditor''s permanent parcel number
    designations as those parcel number designations correspond to the boundaries
    of the impacted watershed. If requested by the county engineer of each county
    with territory in the impacted watershed, the cost of such surveys shall be paid
    from the funds of the lake facilities authority pursuant to an agreement between
    the lake facilities authority and the county engineer of each county. Such funds
    may be advanced by the board of county commissioners of any county with territory
    in the impacted watershed.

    The county auditor of the county with the greatest amount of territory in the
    impacted watershed shall be the fiscal officer for the lake facilities authority.
    The county prosecutor of the county with the greatest amount of territory in the
    impacted watershed shall be the legal advisor of the lake facilities authority
    and shall prosecute and defend all suits and actions that the lake facilities
    authority directs or to which it is a party.

    Upon the creation of a lake facilities authority, no authority that is granted
    by law any powers or duties that are substantially the same as the powers and
    duties of a lake facilities authority may be created if its territorial jurisdiction
    includes any territory within the impacted lake district.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-353.02
- number: '353.03'
  heading: Powers of authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: 'A lake facilities authority may do all of the following:

    (A) Acquire by purchase, lease, gift, or otherwise, on such terms and in such
    manner as it considers proper, real and personal property necessary for an authorized
    purpose or any estate, interest, or right therein, within or without the impacted
    lake district;

    (B) Improve, remediate, maintain, sell, lease, or otherwise dispose of real and
    personal property on such terms and in such manner as it considers proper;

    (C) Request that the department of natural resources, the environmental protection
    agency, or the department of agriculture adopt, modify, and enforce reasonable
    rules and regulations governing impacted watersheds;

    (D) Employ such managers, administrative officers, agents, engineers, architects,
    attorneys, contractors, subcontractors, and employees as may be appropriate in
    the exercise of the rights, powers, and duties conferred on it, prescribe the
    duties and compensation for such persons, require bonds to be given by any such
    persons and by officers of the authority for the faithful performance of their
    duties, and fix the amount and surety therefor, and pay the surety;

    (E) Sue and be sued in its corporate name;

    (F)(1) Make and enter into all contracts and agreements and execute all instruments
    relating to the provisions of this chapter;

    (2) Except as provided otherwise under divisions (F)(2) and (3) of this section,
    when the cost of a contract for the construction of any building, structure, or
    other improvement undertaken by a lake facilities authority involves an expenditure
    exceeding fifty thousand dollars, and the lake facilities authority is the contracting
    authority, the lake facilities authority shall make a written contract after notice
    calling for bids for the award of the contract has been given by publication twice,
    with at least seven days between publications, in a newspaper of general circulation
    in the impacted lake district. Each such contract shall be awarded to the lowest
    responsive and responsible bidder in accordance with section 9.312 of the Revised
    Code. The board of directors by rule may provide criteria for the negotiation
    and award without competitive bidding of any contract as to which the lake facilities
    authority is the contracting authority for the construction of any building or
    structure or other improvement under any of the following circumstances:

    (a) There exists a real and present emergency that threatens damage to property
    or injury to persons of the lake facilities authority or other persons, provided
    that a statement specifying the nature of the emergency that is the basis for
    the negotiation and award of a contract without competitive bidding shall be signed
    at the time of the contract''s execution by the officer of the lake facilities
    authority that executes the contract and shall be attached to the contract.

    (b) A commonly recognized industry or other standard or specification does not
    exist and cannot objectively be articulated for the improvement.

    (c) The contract is for any energy conservation measure as defined in section
    307.041 of the Revised Code.

    (d) With respect to material to be incorporated into the improvement, only a single
    source or supplier exists for the material.

    (e) A single bid is received by the lake facilities authority after complying
    with the above provisions.

    (3) In addition to the exceptions to competitive bidding requirements under division
    (F)(2) of this section, a lake facilities authority may contract for the acquisition
    or construction of any property for an authorized purpose and for the leasing,
    subleasing, sale, or other disposition of the property in a manner determined
    by the lake facilities authority in its sole discretion, without necessity for
    competitive bidding or performance bonds.

    (4) With respect to any public improvement undertaken by, or under contract for,
    the lake facilities authority, the authority may elect to apply sections 4115.03
    to 4115.21 of the Revised Code.

    (G) Accept aid or contributions from any source of money, property, labor, or
    other things of value, to be held, used, and applied only for the purposes for
    which the grants and contributions are made;

    (H) Apply for and accept grants, loans, or commitments of guarantee or insurance,
    including any guarantees of lake facilities authority bonds and notes, from the
    United States, the state, or other public body or other sources, and provide any
    consideration which may be required in order to obtain such grants, loans, or
    contracts of guarantee or insurance;

    (I) Procure insurance against loss to the lake facilities authority by reason
    of damage to its properties resulting from fire, theft, accident, or other casualties,
    or by reason of its liability for any damages to persons or property occurring
    in the construction or operation of facilities or areas under its jurisdiction
    or the conduct of its activities;

    (J) Maintain such funds or reserves as it considers necessary for the efficient
    performance of its duties;

    (K) Enforce any covenants, of which the lake facilities authority is the beneficiary,
    running with the land.

    (L) Issue securities for the remediation of an impacted watershed and directly
    related permanent improvements in compliance with Chapter 133. of the Revised
    Code, except that such bonds or notes may be issued only pursuant to a vote of
    the electors residing within the impacted lake district. The net indebtedness
    incurred by a lake facilities authority pursuant to this division may not exceed
    one-tenth of one per cent of the total value of all property within the territory
    comprising the impacted lake district as listed and assessed for taxation.

    (M) Issue lake facilities authority revenue bonds beyond the limit of bonded indebtedness
    provided by law, payable solely from revenues as provided in section 353.09 of
    the Revised Code for the purpose of providing funds to pay costs of any facility
    or facilities or parts thereof;

    (N) Advise and provide input to political subdivisions within the impacted lake
    district with respect to zoning and land use planning within the impacted lake
    district;

    (O) Enter into agreements for the management, ownership, possession, or control
    of lands or property to be used for wetland mitigation banking;

    (P) Adopt and modify rules and regulations to carry out the authority granted
    to the lake facilities authority under this section.'
