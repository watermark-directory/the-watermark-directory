- number: '321.39'
  heading: Report of treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: 'At the time of making his annual settlement with the board of county commissioners,
    the county treasurer shall furnish a certified statement of all moneys received
    by him as fees or for official services, during the year next preceding the time
    of making such statement, designating the several sources and the amount from
    each.

    If such treasurer fails to make reports at the time and in the manner required
    by this section, he shall forfeit and pay not less than fifty nor more than one
    hundred dollars, to be recovered in a civil action in the name of the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.39
- number: '321.40'
  heading: Powers of inspectors of county treasuries
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: A person appointed, in pursuance of any law of this state, to examine or inspect
    a county treasury or perform any other duty, may exercise all authority to issue
    subpoena and compulsory process and direct their service by any constable or sheriff,
    compel the attendance of witnesses and the production of books and papers before
    him at any designated place, administer oaths, and punish for disobedience of
    subpoena or for refusal to be sworn or answer as a witness, which is conferred
    upon courts or officers authorized to take depositions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.40
- number: '321.41'
  heading: Examination of county treasury on application of taxpayers - fees and costs
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: 'On the written application of at least twenty taxpayers of a county, the
    court of common pleas shall appoint a committee of three persons to examine the
    books and papers belonging to the offices of the county auditor or county treasurer,
    and make report of their proceedings and the result of their examination. Before
    such committee is appointed, one or more of such taxpayers shall enter into bond
    to the state, in a sum and with sureties to the satisfaction of the court, conditioned
    that the obligors will pay all the costs and expenses of such examination if the
    court does not, on such report, certify that there was reasonable ground for the
    application. Before entering upon his duties, each member of such committee shall
    take an oath to perform his duties faithfully, and in the discharge thereof shall
    have all the powers given in section 321.40 of the Revised Code to examiners of
    the county treasury.

    Each member of such committee shall be entitled to receive three dollars for each
    day occupied in the discharge of his duties, which, with all other costs and expenses
    of such examination, upon approval by the court, shall be paid from the county
    treasury.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.41
- number: '321.42'
  heading: Duty of prosecuting attorney
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: On the presentation of the report of an examining committee as provided in
    section 321.41 of the Revised Code, if a breach of the bond of either the county
    auditor or county treasurer is shown, the prosecuting attorney shall commence
    an action on the bond of the delinquent officer. If no breach is reported, he
    shall commence an action on the bond of the applicants, unless they pay to the
    county the costs, or the court certifies that there was reasonable grounds for
    the application.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.42
- number: '321.43'
  heading: Employment of night watchman
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: If the county treasurer, county auditor, and probate judge notify the board
    of county commissioners, in writing, that, in their opinion, the safety of the
    public money in the county treasury requires it, the board shall immediately authorize
    the treasurer to employ a night watchman. The board shall fix the compensation
    of such watchman, to be paid in biweekly installments. The employment shall continue
    until the treasurer, auditor, and judge certify that it may be discontinued. This
    section does not affect the liability of the county treasurer or his sureties.
  history: null
