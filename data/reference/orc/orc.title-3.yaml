- number: '303.213'
  heading: Small wind farms zoning regulations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: '(A) As used in this section:

    (1) "Small wind farm" means wind turbines and associated facilities that are not
    subject to the jurisdiction of the power siting board under sections 4906.20 and
    4906.201 of the Revised Code.

    (2) "Small solar facility" means solar panels and associated facilities with a
    single interconnection to the electrical grid and designed for, or capable of,
    operation at an aggregate capacity of less than fifty megawatts.

    (B) Notwithstanding division (A) of section 303.211 of the Revised Code, sections
    303.01 to 303.25 of the Revised Code confer power on a board of county commissioners
    or board of zoning appeals to adopt zoning regulations governing the location,
    erection, construction, reconstruction, change, alteration, maintenance, removal,
    use, or enlargement of any small wind farm or small solar facility, whether publicly
    or privately owned, or the use of land for that purpose. With regard to a small
    wind farm, the regulations may be more strict than the regulations prescribed
    in rules adopted under division (B)(2) of section 4906.20 of the Revised Code.

    (C) The designation under this section of a small wind farm or a small solar facility
    as a public utility for purposes of sections 303.01 to 303.25 of the Revised Code
    shall not affect the classification of a small wind farm or a small solar facility
    for purposes of state or local taxation.

    (D) Nothing in division (C) of this section shall be construed as affecting the
    classification of a telecommunications tower as defined in division (B) or (E)
    of section 303.211 of the Revised Code or any other public utility for purposes
    of state and local taxation.'
