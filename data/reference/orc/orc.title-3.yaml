- number: '307.637'
  heading: Providing information to drug overdose fatality review committee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A)(1) Notwithstanding section 3701.17 and any other section of the Revised
    Code pertaining to confidentiality, any individual, law enforcement agency, or
    other public or private entity that provided services to a person whose death
    is being reviewed by a drug overdose fatality review committee, on the request
    of the review committee, shall submit to the review committee a summary sheet
    of information.

    (a) With respect to a request made to a health care entity, the summary sheet
    shall contain only information available and reasonably drawn from the person''s
    medical record created by the health care entity.

    (b) With respect to a request made to any other individual or entity, the summary
    sheet shall contain only information available and reasonably drawn from any record
    involving the person to which the individual or entity has access.

    (c) On the request of the review committee, an individual or entity may, at the
    individual or entity''s discretion, make any additional information, documents,
    or reports available to the review committee.

    (2) On the request of the review committee, a county coroner shall make available
    to the review committee the coroner''s full and complete record as described in
    section 313.10 of the Revised Code that relates to the person whose death is being
    reviewed by the committee.

    (B) Notwithstanding division (A) of this section, no person, entity, law enforcement
    agency, or prosecuting attorney shall provide any information regarding the death
    of a person to a drug overdose fatality review committee while an investigation
    of the death or prosecution of a person for causing the death is pending unless
    the prosecuting attorney has agreed pursuant to section 307.635 of the Revised
    Code to allow review of the death.'
