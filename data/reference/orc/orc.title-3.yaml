- number: '307.083'
  heading: Method for purchasing real estate at public auction
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: A board of county commissioners may purchase real estate at public auction
    by designating an individual to represent the board and tender bids at the auction,
    subject to a maximum purchase amount established by the board or an appraisal
    obtained prior to sale. A purchase made under this section is subject to division
    (D) of section 5705.41 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.083
- number: '307.084'
  heading: Purchase or appropriation of real property for state or federal correctional
    facility
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'When the board of county commissioners determines that it serves the interests
    of the county, the board may procure real estate within the county by purchase
    or by appropriation under sections 163.01 to 163.22 of the Revised Code and donate
    it to the state, the department of rehabilitation and correction, or the United
    States bureau of prisons for the construction of a state correctional institution
    or a federal correctional facility or complex.

    The board shall attempt to obtain the best possible terms and conditions in relation
    to the donation, such as priority over courts or law enforcement agencies of other
    jurisdictions in placement in the institution, facility, or complex of nonstate
    or nonfederal prisoners, or an option for the county to repurchase the property
    on reasonable terms should it no longer be used as a state correctional institution
    or federal correctional facility or complex.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.084
- number: '307.09'
  heading: Sale, lease, or rent of county real estate - proceeds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) If the interests of the county so require, the board of county commissioners
    may sell any real property belonging to the county and not needed for public use,
    including all or portions of buildings acquired by the board to house county offices,
    or may lease or rent the same, but no such lease shall be for a longer term than
    five years, unless such lease is part of a lease-purchase agreement, in which
    case the lease may be for a period not exceeding twenty-five years, or unless
    the lease is to a commercial tenant who uses the property as a retail store room,
    office, or restaurant, and the leased property is located in a building initially
    acquired to house county offices or in a parking facility constructed or acquired
    to serve a building that houses county offices, in which case the lease may be
    for a period not exceeding twenty years, and may include provision for one or
    more renewals for lesser periods. In the case of real property used or to be used
    for the purpose of airports, landing fields, or air navigational facilities, including
    restaurants, parking lots, motels, gasoline service stations, public recreation
    facilities, public parks, office buildings, retail stores for merchandising or
    services, and industrial uses located or to be located thereon, or parts thereof,
    belonging to the county, the primary term of such lease shall not exceed twenty-five
    years and the board of county commissioners may renew such leases for one or more
    periods of years. The total of such renewal periods, when added to the primary
    term of such lease, shall not exceed sixty years.

    (B) The board may grant leases, rights, and easements to the United States government,
    to the state or any department or agency thereof, or to municipal corporations
    or other governmental subdivisions of the state for public purposes, or to privately
    owned electric light and power companies, or natural gas companies, or telephone
    or telegraph companies for purposes of rendering their several public utilities
    services, or to corporations not for profit for hospital, charitable, water, sewer,
    any of the purposes specified in section 1724.01 of the Revised Code, or recreational
    purposes, including among other such purposes memorial structures, parks, golf
    courses, and underground structures, poles, piers, towers, wires, pipelines, underground
    cables, and manholes, on or in lands owned by the county where such lease, right,
    or easement is not deemed by the board to be inconsistent with the need of such
    land for public use by the county. Any such lease, right, or easement granted
    to the United States government, to the state or any department or agency thereof,
    or to a municipal corporation or other governmental subdivision of the state,
    or to privately owned electric light and power companies, or natural gas companies,
    or telephone or telegraph companies for purposes of rendering their several public
    utilities services, or to corporations not for profit for hospital, charitable,
    water, sewer, or recreational purposes, may be for such length of time, upon such
    terms, for such purposes, and may provide for such renewals thereof as the board
    deems for the best interests of the county.

    (C) In case of the sale of such real property not used for county purposes, and
    in case of a lease of real property used or to be used for the purpose of airports,
    landing fields, or air navigational facilities, including restaurants, parking
    lots, motels, gasoline service stations, public recreation facilities, public
    parks, office buildings, retail stores for merchandising or services, and industrial
    uses, and in case of such a grant of lease, right, or easement to the United States
    government, to the state or any department or agency thereof or to a municipal
    corporation or other governmental subdivision of the state, or to privately owned
    electric light and power companies, or natural gas companies, or telephone or
    telegraph companies for purposes of rendering their several public utilities services,
    or to corporations not for profit for hospital, charitable, water, sewer, or recreational
    purposes, all or such part of the proceeds thereof as the board designates may
    be placed by the board in a separate fund to be used only for construction, equipment,
    furnishing, maintenance, or repair of the county buildings and the acquisition
    of sites therefor, or for the payment of principal of or interest on bonds of
    the county issued for any county building.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.09
- number: '307.091'
  heading: Sale of county medical facility to state medical school or college
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners may sell, lease, or transfer all or any
    part of the property and assets of a hospital or medical and health care facility
    or institution owned by the county to a medical school or college established
    and supported by this state, upon such terms and conditions as may be agreed by
    the board of county commissioners and the board of trustees governing such medical
    school or college and subject to the approval of the Ohio board of regents.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.091
- number: '307.092'
  heading: Sale, lease, or transfer of county property to nonprofit senior citizens
    organizations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Notwithstanding section 307.09 of the Revised Code, the board of county commissioners
    may sell, lease, or transfer any real property belonging to the county and not
    needed for public use to a nonprofit senior citizens' organization to be used
    for public purposes involving the provision of housing, health, social services,
    or recreational activities for the benefit of older persons, upon such terms and
    conditions as may be agreed upon by the board of county commissioners and the
    organization. The nonprofit senior citizens' organization shall report annually
    to the board of county commissioners on the nature of the activities for which
    the property is being used and shall provide such other information regarding
    the property that the board may require. Any deed conveying real property under
    this section may state that if the real property is used at any time for purposes
    other than those enumerated in this section, all right, title, and interest in
    the property shall revert to the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.092
- number: '307.10'
  heading: Procedure for sale, lease, transfer or granting of rights in real property
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) No sale of real property, or lease of real property used or to be used
    for the purpose of airports, landing fields, or air navigational facilities, or
    parts thereof, as provided by section 307.09 of the Revised Code shall be made
    unless it is authorized by a resolution adopted by a majority of the board of
    county commissioners. When a sale of real property as provided by section 307.09
    of the Revised Code is authorized, the board may either deed the property to the
    highest responsible bidder after advertisement once a week for four consecutive
    weeks, or offer the real property for sale at a public auction after giving at
    least thirty days'' notice of the auction. The advertisement or notice shall be
    published using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    The board may reject any and all bids. The board may, as it considers best, sell
    real property pursuant to this section as an entire tract or in parcels. The board,
    by resolution adopted by a majority of the board, may lease real property, in
    accordance with division (A) of section 307.09 of the Revised Code, without advertising
    for bids.

    (B) The board, by resolution, may transfer real property in fee simple belonging
    to the county and not needed for public use to the United States government, to
    the state or any department or agency thereof, to municipal corporations or other
    political subdivisions of the state, to the county board of developmental disabilities,
    or to a county land reutilization corporation organized under Chapter 1724. of
    the Revised Code for public purposes upon the terms and in the manner that it
    may determine to be in the best interests of the county, without advertising for
    bids. The board shall execute a deed or other proper instrument when such a transfer
    is approved.

    (C) The board, by resolution adopted by a majority of the board, may grant leases,
    rights, or easements to the United States government, to the state or any department
    or agency thereof, or to municipal corporations and other political subdivisions
    of the state, or to privately owned electric light and power companies, natural
    gas companies, or telephone or telegraph companies for purposes of rendering their
    several public utilities services, in accordance with division (B) of section
    307.09 of the Revised Code, without advertising for bids. When such grant of lease,
    right, or easement is authorized, a deed or other proper instrument therefor shall
    be executed by the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.10
- number: '307.11'
  heading: Board of county commissioners may execute leases of mineral lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'When the county would be benefited, the board of county commissioners may
    make, execute, and deliver contracts or leases to mine iron ore, stone, coal,
    petroleum, gas, salt, and other minerals upon lands owned by such county, to any
    person complying with the terms prescribed by the board as to consideration, rights
    of way, and occupancy of ground for necessary purposes. All other matters of contract
    shall be such as the board deems most advantageous to the county.

    Such contracts or leases shall be forfeited to the county for noncompliance with
    any of the terms of the contract, and shall not operate as a conveyance of the
    fee of any part of the realty. No contract or lease for the drilling or operation
    of a petroleum or gas well shall be valid for a longer term than forty years from
    the date of the contract or lease, and no contract or lease for the mining of
    iron ore, stone, coal, salt, or other minerals shall be valid for a longer term
    than fifteen years from such date. The consideration of such contracts and leases
    shall be a rental or royalty, payable at least once in each year to the county
    treasurer, who shall give a receipt for such amount, and be charged with it by
    the county auditor, with whom such receipts, contracts, and leases shall be deposited.
    The fund created by such payments shall be held and used for county purposes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.11
- number: '307.12'
  heading: Resolution for disposal of unneeded, obsolete or unfit personal property
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Except as otherwise provided in divisions (D), (E), and (G) of this section,
    when the board of county commissioners finds, by resolution, that the county has
    personal property, including motor vehicles acquired for the use of county officers
    and departments, and road machinery, equipment, tools, or supplies, that is not
    needed for public use, is obsolete, or is unfit for the use for which it was acquired,
    and when the fair market value of the property to be sold or donated under this
    division is, in the opinion of the board, in excess of five thousand dollars,
    the board may do either of the following:

    (1) Sell the property at public auction or by sealed bid to the highest bidder.
    Notice of the time, place, and manner of the sale shall be published at least
    ten days prior to the sale, using at least one of the following methods:

    (a) In the print or digital edition of a newspaper of general circulation within
    the county;

    (b) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (c) On the web site and social media account of the county.

    If a board conducts a sale of property by sealed bid, the form of the bid shall
    be as prescribed by the board, and each bid shall contain the name of the person
    submitting it. Bids received shall be opened and tabulated at the time stated
    in the notice. The property shall be sold to the highest bidder, except that the
    board may reject all bids and hold another sale, by public auction or sealed bid,
    in the manner prescribed by this section.

    (2) Donate any motor vehicle that does not exceed four thousand five hundred dollars
    in value to a nonprofit organization exempt from federal income taxation pursuant
    to 26 U.S.C. 501(a) and (c)(3) for the purpose of meeting the transportation needs
    of participants in the Ohio works first program established under Chapter 5107.
    of the Revised Code and participants in the prevention, retention, and contingency
    program established under Chapter 5108. of the Revised Code.

    (B) When the board of county commissioners finds, by resolution, that the county
    has personal property, including motor vehicles acquired for the use of county
    officers and departments, and road machinery, equipment, tools, or supplies, that
    is not needed for public use, is obsolete, or is unfit for the use for which it
    was acquired, and when the fair market value of the property to be sold or donated
    under this division is, in the opinion of the board, five thousand dollars or
    less, the board may do either of the following:

    (1) Sell the property by private sale, without advertisement or public notification;

    (2) Donate the property to an eligible nonprofit organization that is located
    in this state and is exempt from federal income taxation pursuant to 26 U.S.C.
    501(a) and (c)(3). Before donating property, the nonprofit organization shall
    provide the board evidence that the organization is located in this state and
    is exempt from federal income taxation pursuant to 26 U.S.C. 501(a) and (c)(3).

    (C) Members of the board of county commissioners shall consult with the Ohio ethics
    commission, and comply with the provisions of Chapters 102. and 2921. of the Revised
    Code, with respect to any sale or donation under division (A) or (B) of this section
    to a nonprofit organization of which a county commissioner, any member of the
    county commissioner''s family, or any business associate of the county commissioner
    is a trustee, officer, board member, or employee.

    (D) Notwithstanding anything to the contrary in division (A), (B), or (E) of this
    section and regardless of the property''s value, the board of county commissioners
    may sell or donate county personal property, including motor vehicles, to the
    federal government, the state, any political subdivision of the state, or a county
    land reutilization corporation without advertisement or public notification.

    (E) Notwithstanding anything to the contrary in division (A), (B), or (G) of this
    section and regardless of the property''s value, the board of county commissioners
    may sell personal property, including motor vehicles acquired for the use of county
    officers and departments, and road machinery, equipment, tools, or supplies, that
    is not needed for public use, is obsolete, or is unfit for the use for which it
    was acquired, by internet auction. The board shall adopt a resolution expressing
    its intent to sell property by internet auction. The resolution shall include
    a description of how the internet auctions will be conducted and shall specify
    the number of days for bidding on the property, which shall be no less than ten
    days, including Saturdays, Sundays, and legal holidays. The resolution shall indicate
    whether the county will conduct the internet auctions or the board will contract
    with a representative to conduct the internet auctions and shall establish the
    general terms and conditions of sale. If a representative is known when the resolution
    is adopted, the resolution shall provide contact information such as the representative''s
    name, address, and telephone number.

    After adoption of the resolution, the board shall publish, in a newspaper of general
    circulation in the county, notice of its intent to sell unneeded, obsolete, or
    unfit-for-use county personal property by internet auction. The notice shall include
    a summary of the information provided in the resolution and shall be published
    twice or as provided in section 7.16 of the Revised Code. The second and any subsequent
    notice shall be published not less than ten nor more than twenty days after the
    previous notice. A similar notice also shall be posted continually in a conspicuous
    place in the offices of the county auditor and the board of county commissioners.
    If the county maintains a web site on the internet, the notice shall be posted
    continually at that web site.

    When property is to be sold by internet auction, the board or its representative
    may establish a minimum price that will be accepted for specific items and may
    establish any other terms and conditions for a particular sale, including requirements
    for pick-up or delivery, method of payment, and sales tax. This type of information
    shall be provided on the internet at the time of the auction and may be provided
    before that time upon request after the terms and conditions have been determined
    by the board or its representative.

    (F) When a county officer or department head determines that county-owned personal
    property under the jurisdiction of the officer or department head, including motor
    vehicles, road machinery, equipment, tools, or supplies, is not of immediate need,
    the county officer or department head may notify the board of county commissioners,
    and the board may lease that personal property to any municipal corporation, township,
    other political subdivision of the state, or to a county land reutilization corporation.
    The lease shall require the county to be reimbursed under terms, conditions, and
    fees established by the board, or under contracts executed by the board.

    (G) If the board of county commissioners finds, by resolution, that the county
    has vehicles, equipment, or machinery that is not needed, or is unfit for public
    use, and the board desires to sell the vehicles, equipment, or machinery to the
    person or firm from which it proposes to purchase other vehicles, equipment, or
    machinery, the board may offer to sell the vehicles, equipment, or machinery to
    that person or firm, and to have the selling price credited to the person or firm
    against the purchase price of other vehicles, equipment, or machinery.

    (H) If the board of county commissioners advertises for bids for the sale of new
    vehicles, equipment, or machinery to the county, it may include in the same advertisement
    a notice of the willingness of the board to accept bids for the purchase of county-owned
    vehicles, equipment, or machinery that is obsolete or not needed for public use,
    and to have the amount of those bids subtracted from the selling price of the
    other vehicles, equipment, or machinery as a means of determining the lowest responsible
    bidder.

    (I) If a board of county commissioners determines that county personal property
    is not needed for public use, or is obsolete or unfit for the use for which it
    was acquired, and that the property has no value, the board may discard or salvage
    that property.

    (J) A county engineer, in the engineer''s discretion, may dispose of scrap construction
    materials on such terms as the engineer determines reasonable, including disposal
    without recovery of costs, if the total value of the materials does not exceed
    twenty-five thousand dollars. The engineer shall maintain records of all dispositions
    made under this division, including identification of the origin of the materials,
    the final disposition, and copies of all receipts resulting from the dispositions.

    As used in division (J) of this section, "scrap construction materials" means
    construction materials that result from a road or bridge improvement, remain after
    the improvement is completed, and are not reusable. Construction material that
    is metal and that results from a road or bridge improvement and remains after
    the improvement is completed is scrap construction material only if it cannot
    be used in any other road or bridge improvement or other project in its current
    state.'
