- number: '343.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: Whoever violates division (G)(2) or (3) or (I)(1) or (2) of section 343.01
    of the Revised Code shall be fined not more than five thousand dollars. Each day
    of each violation is a separate offense. Notwithstanding any other section of
    the Revised Code relating to the distribution or crediting of fines for violations
    of the Revised Code, all fines imposed under this section shall be deposited into
    the special fund, created in accordance with division (G) of section 3734.57 of
    the Revised Code, of the county or joint county solid waste management district
    where the violation occurred.
