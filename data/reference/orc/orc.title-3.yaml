- number: '327.01'
  heading: County board of trustees of sinking fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: In each county owing a bonded debt, there shall be a board, designated as
    the trustees of the sinking fund, composed of the prosecuting attorney, the county
    auditor, and the county treasurer. The prosecuting attorney shall be the president
    of such board and the county auditor shall be its secretary.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.01
- number: '327.02'
  heading: Duties of board of trustees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: The board of trustees of the sinking fund shall provide for the payment of
    all bonds issued by the county and the interest maturing thereon. All taxes, assessments,
    and other moneys collected for such purposes, or held in the county treasury to
    the credit of the sinking fund, shall be subject to investment and disbursement
    by such board. For the satisfaction of any obligation under its supervision, the
    board may sell or use any of the securities in its possession or disburse any
    of the money under its control.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.02
- number: '327.03'
  heading: Report by auditor to trustees semiannually
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: Immediately after each semiannual settlement of taxes and assessments, the
    county auditor shall report to the board of trustees of the sinking fund the amount
    in the county treasury to the credit of the sinking fund.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.03
- number: '327.04'
  heading: Investment of funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: The board of trustees of the sinking fund shall invest all moneys subject
    to its control in bonds of the United States, of this state, or of a municipal
    corporation, school district, township, or county of the state, and shall hold
    in reserve in cash only such sums as may be needed for effecting the purposes
    of sections 327.01 to 327.08, inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.04
- number: '327.05'
  heading: Meetings - decision of questions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: The meetings of the board of trustees of the sinking fund shall be open to
    the public, and all questions relating to the purchase or sale of securities or
    the payment of bonds or interest shall be decided by a yea and nay vote, which
    vote shall be recorded on the journal of such board.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.05
- number: '327.06'
  heading: How moneys shall be drawn from and paid into treasury
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: Money shall be drawn from the county treasury for investment or disbursement
    by the board of trustees of the sinking fund by the issuance of a voucher, signed
    by all the members of the board and directed to the county auditor, on which a
    warrant shall be drawn on the county treasurer, payable from the proper fund.
    All moneys received by such board shall be paid into the county treasury to the
    credit of the proper fund, on the certificate of the auditor. All securities held
    by such board shall be deposited with the treasurer. When securities are so deposited
    they shall be withdrawn only upon the written application of all the members of
    the board and in the presence of two of them.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.06
- number: '327.07'
  heading: Record of proceedings and transactions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: The board of trustees of the sinking fund shall keep a full and complete record
    of its transactions, a complete record of the funded debt of the county specifying
    the dates, purposes, amounts, numbers, maturities, and rates, and maturities of
    interest installments on such debt, where such installments are payable, and an
    account exhibiting the amount held in the sinking fund for the payment thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.07
- number: '327.08'
  heading: When tax rate certified
  title:
    num: '3'
    name: Counties
  chapter:
    num: '327'
    name: County Board of Trustees of Sinking Fund
  text: On or before the first Monday in May of each year, the board of trustees of
    the sinking fund shall certify to the board of county commissioners the rate of
    tax necessary to provide a sinking fund for the payment, at maturity, of bonds
    issued by the county prior to August 17, 1921, and for the payment of interest
    on said bonded indebtedness. The amount so certified shall be set forth in the
    annual budget of the board of county commissioners, without diminution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-327.08
