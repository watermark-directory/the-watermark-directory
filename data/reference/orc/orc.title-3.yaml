- number: '306.33'
  heading: Appointment of board of trustees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'Within sixty days after a regional transit authority has been created under
    section 306.32 of the Revised Code, the board of trustees for such regional transit
    authority shall be appointed as provided in this section.

    Members of a board of trustees of an authority created by the exclusive action
    of a county shall be appointed by the county commissioners of such county. A board
    of trustees of an authority created by two or more political subdivisions shall
    consist of such number of members, who shall have such qualifications and who
    shall be appointed by such public officers as shall be provided in the resolutions
    or ordinances creating such authority or any amendments thereto. If the resolutions
    or ordinances creating such authority, or any amendments thereto, so provide,
    then the governor shall appoint such members of the board of a regional transit
    authority as provided in such resolutions and ordinances. The appointing authority
    may at any time remove a trustee for misfeasance, nonfeasance, or malfeasance
    in office.

    The trustees of any authority first appointed shall serve staggered terms. Thereafter
    each successor shall serve terms of three years, except that any person appointed
    to fill a vacancy shall be appointed to only the unexpired term. Any appointed
    trustee is eligible for reappointment.

    A majority of the board of trustees constitute a quorum, the affirmative vote
    of which is necessary for any action taken by the authority. No vacancy in the
    board shall impair the rights of a quorum to exercise all rights and perform all
    the duties of the authority.

    Each member of the board of trustees, before entering upon his official duties,
    shall take and subscribe to an oath or affirmation that he will honestly, faithfully,
    and impartially perform the duties of his office, and that he will not be personally
    interested directly or indirectly in any contract let by the regional transit
    authority.

    After each member of the board has taken the oath as prescribed by this section
    the board shall meet and organize by electing one of its members as president
    and another as vice-president, who shall hold their respective offices until the
    next annual meeting of the board as provided in its bylaws. At each annual meeting
    thereafter the board shall elect from its membership a president and a vice-president
    who shall serve for a term of one year.

    The board shall appoint and fix the compensation of a secretary-treasurer, who
    shall be the fiscal officer and shall not be a member of the board and who shall
    serve at the pleasure of the board. Each member of the board of trustees is entitled
    to receive from the regional transit authority reimbursement for his reasonable
    expenses in the performance of his duties.'
