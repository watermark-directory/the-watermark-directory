- number: '307.72'
  heading: Appropriating funds for police training
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners may appropriate funds to pay the reasonable
    expenses of the sheriff or deputy sheriffs while going to, attending, and returning
    from any police training school, whether within or without the state.
  history: null
