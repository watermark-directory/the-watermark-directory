- number: '319.41'
  heading: Liability for loss of public funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: A county auditor shall not be held liable for a loss of public funds when
    the county auditor has performed all official duties required of the county auditor
    with reasonable care, but shall be liable only when a loss of public funds results
    from the county auditor's negligence or other wrongful act.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.41
- number: '319.42'
  heading: Apportionment of unpaid special assessments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: Whenever a portion of a tract or parcel of real estate is conveyed to another
    owner, and such tract or parcel bears unpaid special assessments, the authority
    certifying such assessments shall, on request of the county auditor, furnish the
    auditor with the proportionate amounts of the assessments to be allocated to the
    portion of the original tract or parcel so conveyed to another owner, and the
    lien of the assessments, as levied against the original tract or parcel, shall
    extend to the portion conveyed only to the extent of the amount so allocated to
    the portion by the certifying authority. This section does not change the total
    amount of the assessments as originally levied, or the total amount of the balances
    due.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.42
- number: '319.43'
  heading: Settlement for real and public utility property taxes - certification of
    delinquent list
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) On or before the fifteenth day of February and on or before the tenth
    day of August of each year, the county auditor shall attend at the auditor''s
    office to make settlement with the county treasurer and ascertain the amount of
    real property taxes and assessments and public utility property taxes with which
    such treasurer is to stand charged. At each August settlement the auditor shall
    take from the duplicate previously put into the hands of the treasurer for collection
    a list of all such taxes and assessments as the treasurer has been unable to collect,
    describing in such list the property on which the delinquent taxes and assessments
    are charged as described on the duplicate, and note on the list, in a marginal
    column, the several reasons assigned by the treasurer why such taxes and assessments
    should not be collected. Such list shall be signed by the treasurer, who shall
    testify to its correctness, under oath to be administered by the auditor.

    (B) When making a settlement required by this section, if the county treasurer,
    under division (A) or (B) of section 321.341 of the Revised Code, has made advance
    payments to the several taxing districts of the current year unpaid taxes or current
    year delinquent taxes by means of a current unpaid or delinquent tax line of credit
    or by means of any other type of borrowing, the county auditor shall not apportion
    the current year unpaid taxes or current year delinquent taxes thereafter collected
    if the distribution of the taxes and assessments was made by means of such borrowing.
    The county treasurer shall apply the current year unpaid taxes or current year
    delinquent taxes, as applicable and upon collection, to repayment or reimbursement
    of the source from which the money to make the advance payments was borrowed.
    The county auditor shall not apportion the penalties and interest on such current
    year unpaid taxes and current year delinquent taxes collected thereafter to the
    several subdivisions. The county treasurer shall retain the penalties and interest
    in the county treasury and shall credit the penalties and interest to the county
    land reutilization corporation fund established under section 321.263 of the Revised
    Code pending appropriation to and for the benefit of a county land reutilization
    corporation organized under Chapter 1724. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.43
- number: '319.44'
  heading: Proceedings as to delinquent list
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: In making a list as provided by section 319.43 of the Revised Code, the delinquencies
    of each township shall be kept separate. After deducting the amount of taxes as
    returned delinquent and the collection fees allowed the county treasurer from
    the several taxes charged on the duplicate, in a just and ratable proportion,
    the treasurer shall be held liable for the balance of such taxes. After first
    correcting any error which may have occurred in the apportionment of taxes at
    any previous settlement, the county auditor shall certify the balance due the
    state, the balance due the county, the balance due for road purposes, and the
    balance due the township, and shall record such list of delinquencies in his office
    forthwith.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.44
- number: '319.45'
  heading: Certificate to treasurer as to moneys collected
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) In making the settlement required by sections 319.43 and 319.44 of the
    Revised Code, the county auditor shall carefully examine the tax duplicate and
    ascertain, from the entries of taxes, interest, and penalty paid in whole or in
    part, and from such other sources of information as are within the auditor''s
    reach, the true amount collected by the county treasurer on account of each of
    the several taxes charged on such duplicate, the amount remaining in the hands
    of the treasurer payable to each fund, and shall give to the treasurer separate
    certificates, in duplicate, of the separate sums found to have been collected
    by the treasurer.

    (B) In making each of those settlements, the county auditor, except as provided
    in division (B) of section 319.43 of the Revised Code, shall apportion any delinquent
    taxes, penalties, and interest among the several taxing districts in the same
    proportions that the amount of real and public utility property taxes levied by
    each district in the preceding tax year bears to the amount of real and public
    utility property taxes levied by all such districts in the preceding tax year.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.45
- number: '319.451'
  heading: Auditor shall ascertain net amount of taxes collected
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor shall ascertain the net amount of taxes collected for each
    particular purpose.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.451
- number: '319.46'
  heading: Certificate to treasurer as to taxes charged
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor shall make and deliver to the county treasurer a certificate
    specifying the amount charged on the tax duplicate of the county for each of the
    several purposes for which taxes have been levied, and also a certificate or an
    abstract of the taxes which have become due and payable and which remain unpaid.
    In making the settlement in February of each year as required by section 319.43
    of the Revised Code, the auditor may ascertain the amount of taxes collected from
    the statements required by sections 321.09 and 321.10 of the Revised Code to be
    made to him by the treasurer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.46
- number: '319.47'
  heading: Duplicate of certificates and abstracts to tax commissioner
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: Within ten days after he has made each semiannual settlement with the county
    treasurer, the county auditor shall transmit to the tax commissioner a duplicate
    of each of the several certificates and abstracts required to be made in the settlements.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.47
- number: '319.48'
  heading: Real property tax suspension list of taxes uncollectible except through
    foreclosure or through foreclosure and forfeiture
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) The county auditor shall maintain a real property tax suspension list
    of tracts and lots certified to him under section 323.33 of the Revised Code as
    being charged with delinquent amounts most likely uncollectible except through
    foreclosure or through foreclosure and forfeiture. Tracts and lots on the list
    shall be listed in the same form and order or sequence as on the general tax list
    of real and public utility property. The list also shall include a description
    of the tract or lot and the name of the person under whom it is listed.

    (B) When the county auditor enters current taxes and delinquent amounts on the
    general tax list and duplicate of real and public utility property under section
    319.30 of the Revised Code, he shall enter against a tract or lot that is on the
    suspension list only the current taxes levied against the tract or lot; he shall
    not enter on the general tax list and duplicate the delinquent taxes, penalties,
    and interest charged against the tract or lot. Instead, he shall indicate on the
    general tax list and duplicate with an asterisk or other marking that the tract
    or lot appears on the real property tax suspension list, that delinquent taxes,
    penalties, and interest stand charged against it, and that the amount of the delinquency
    may be obtained through the county auditor or treasurer.

    (C) If a tract or lot is foreclosed upon or foreclosed upon and forfeited for
    payment of delinquent taxes, penalties, and interest or is redeemed by the owner
    or another authorized taxpayer, the county auditor shall immediately strike the
    tract or lot from the real property tax suspension list.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.48
- number: '319.49'
  heading: Settlement by auditor with treasurer for taxes - certification of delinquent
    tax and assessment list by treasurer - liability of treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: On or before the thirtieth day of June and on or before the thirty-first day
    of October of each year the county auditor shall attend at his office to make
    settlement with the county treasurer and ascertain the amount of general personal
    and classified property taxes with which such treasurer is to stand charged. At
    each October settlement, the auditor shall take from the duplicates previously
    put into the hands of the treasurer for collection a list of all such taxes as
    the treasurer has been unable to collect, describing in such list the assessments
    on which such delinquent taxes are charged, as described on the duplicates, and
    note on the list, in a marginal column, the several reasons assigned by the treasurer
    why such taxes could not be collected. Such list shall be signed by the treasurer,
    who shall testify to the correctness of the list, under oath to be administered
    by the auditor. After deducting the amount of such taxes as returned delinquent
    and the collection fees allowed the treasurer from the several taxes charged on
    the duplicates in a just and ratable proportion, the treasurer shall be held liable
    for the balance of such taxes. After first correcting any error which may have
    occurred in the apportionment of taxes at any previous settlement, the auditor
    shall certify the balance due the state, the balance due the county, and the balance
    due each other taxing district, and shall record such list of delinquencies in
    his office forthwith.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.49
- number: '319.50'
  heading: Certificates issued to treasurer by auditor - duplicates to tax commissioner
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) In making each June settlement required by section 319.49 of the Revised
    Code, the county auditor shall carefully examine the duplicate certificates and
    receipts for the advance payment of taxes and ascertain from such certificates
    and receipts, and from such other sources of information as are within the auditor''s
    reach, the true amount collected by the county treasurer on account of each of
    the several taxes reported thereby, and the amount remaining in the hands of the
    treasurer payable to each fund, and shall give the treasurer separate certificates,
    in duplicate, of the separate sums found to have been received by the treasurer.

    (B) In making each October settlement required by such section, the auditor shall
    carefully examine and ascertain from the entries of taxes, interest, and penalties
    paid in part, and from such other sources of information as are within the auditor''s
    reach, the true amount collected by the treasurer on account of each of the several
    taxes charged on the duplicates, and the amount remaining in the hands of the
    treasurer payable to each fund, and shall give the treasurer separate certificates,
    in duplicate, of the separate sums found to have been collected by the treasurer.

    (C) In making either settlement required under section 319.49 of the Revised Code,
    the county auditor shall apportion delinquent taxes, penalties, and interest among
    the several taxing districts in the same proportion that the amount of taxes levied
    by the district against the delinquent property in the preceding tax year bears
    to the taxes levied by all such districts against the property in the preceding
    tax year, and shall apportion assessments and other charges among the taxing districts
    in the order in which they became due.

    (D) Within ten days after making each settlement provided for in this section,
    the auditor shall transmit to the tax commissioner a duplicate of each of the
    several certificates and abstracts required to be made in such settlements.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.50
- number: '319.51'
  heading: Account with new township
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: On the erection of a new township in the county, the county auditor shall
    open an account with it and, at the auditor's next semiannual settlement, credit
    it with all moneys for taxes collected in or distributable to the territory included
    in the new township, making corresponding deductions from the townships from which
    it was taken. The moneys so credited shall be drawn by warrants in favor of the
    fiscal officer of the new township.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.51
- number: '319.52'
  heading: Abstract of delinquent tax and assessment list
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The delinquent tax and assessment list shall not be returned to the tax commissioner
    but shall be recorded by the county auditor immediately after his semiannual settlement
    with the county treasurer, an abstract of which, in such forms as the tax commissioner
    prescribes, shall be sent to the tax commissioner in August, with the settlement
    sheet of the county treasurer. No taxes returned delinquent shall be paid into
    the state treasury except by the county treasurers. In making out the duplicate
    of each year all tracts of land and lots returned delinquent shall be again entered
    on the duplicate, and the taxes on such tract or lot including the taxes of the
    current year, shall be charged on the tract or lot, together with the penalty
    and interest imposed by section 323.121 of the Revised Code, except as provided
    under section 319.48 of the Revised Code for tracts and lots on the real property
    tax suspension list and under section 5723.02 of the Revised Code for real property
    forfeited to the state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.52
