- number: '302.081'
  heading: Alternative form of county government must include board of county commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: An alternative form of county government shall include a board of county commissioners,
    elected either at large as provided in sections 302.04 and 302.08 of the Revised
    Code, or by districts as provided in sections 302.041 and 302.082 of the Revised
    Code, and in all those provisions of sections 302.01 to 302.24 of the Revised
    Code, which have not been specifically designated as applicable only in the case
    whereby the entire board is elected at large, or in the case whereby any of the
    members are elected by districts.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.081
- number: '302.082'
  heading: Electing of county commissioners by districts in alternative form
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: '(A) Under all alternative forms of county government whereby any members
    of the board of county commissioners are elected by districts there shall be a
    board of county commissioners who shall have the qualifications and shall be nominated
    and elected as provided by general law, except as otherwise provided for in this
    section.

    (B) The board shall consist of such odd number of members, not less than three
    nor more than twenty-one members, as is provided in the proposition for the alternative
    form that has been adopted. If the proposition provides for seven or more members,
    no more than half shall be elected at large.

    Any or all districts for county commissioners may be multi-member districts, but
    the division of the county into districts for county commissioners shall conform
    to the constitutional standards for division of the state into districts for election
    of members of the general assembly. If the proposition for the alternative form
    adopted provides that any county commissioners shall be elected by districts,
    the board of county commissioners shall, every ten years, commencing in 1971 and
    every ten years thereafter, divide the county into county commissioner districts,
    using the most recent decennial federal census.

    (C) The term of office of county commissioners shall be four years, except as
    provided in division (C) of this section. If the proposition for the alternative
    form adopted changes the number of county commissioners, or changes the number
    of commissioners who are elected by districts, the total number of commissioners
    shall be elected at the first regular state election following the adoption of
    the alternative form. The board of elections shall assign a number to each county
    commissioner position established by the provisions of the alternative form. Candidates
    shall file for and be elected to a specifically numbered position. The odd-numbered
    positions shall be filled for a term of four years, and the even-numbered positions
    shall be filled for a term of two years at the first election and for four years
    thereafter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.082
- number: '302.09'
  heading: Vacancy in office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: When a vacancy occurs in the board of county commissioners or in the office
    of county auditor, county treasurer, prosecuting attorney, clerk of the court
    of common pleas, sheriff, county recorder, county engineer, or coroner more than
    forty days before the next general election for state and county officers, the
    vacancy shall be filled as provided for in divisions (A) and (B) of section 305.02
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.09
- number: '302.10'
  heading: Board rules, records and voting
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: The board of county commissioners shall determine its own rules and order
    of business and cause a journal of its proceedings to be kept. A majority of the
    members elected to the board shall constitute a quorum to do business. No action
    of the board shall be valid or binding unless adopted by the affirmative vote
    of a majority of the members elected to the board.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.10
- number: '302.11'
  heading: Board organization
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'The board of county commissioners shall organize on the first Monday of each
    year, by the election of one of its members as president and one other member
    as vice-president for terms of one year. The president shall preside at all regular
    and special sessions of the board.

    Notwithstanding section 305.05 of the Revised Code, when the president of the
    board is absent from the county or unable to perform his duties , or in case of
    death, resignation, or removal, the vice-president shall act as president pending
    any future meeting of the board at which it may select one of its members to become
    the president.

    Except as provided by sections 302.01 to 302.24, inclusive, of the Revised Code,
    the president of the board shall have all powers and duties vested in or imposed
    upon the president of the board by general law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.11
- number: '302.12'
  heading: Board to be policy-determining body - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: The board of county commissioners is the policy-determining body of the county.
    Except as otherwise provided by sections 302.01 to 302.24, inclusive, of the Revised
    Code, it has all the powers and duties vested by law in boards of county commissioners.
    All powers and duties which may be vested by law in counties or in county officers
    or agencies, or which may be transferred to the county by action of a township
    or municipality under authority of Section 1 of Article X, Ohio Constitution,
    and which are not assigned by law to any department, office, or body existing
    under the alternative form of government in force, shall be exercised or performed
    by the board or by the department, office, or body designated by resolution of
    the board.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.12
- number: '302.13'
  heading: Specific powers of board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'Pursuant to and in conformity with the Constitution of Ohio and without limiting
    the powers and duties otherwise vested in the board of county commissioners, the
    board may:

    (A) Establish a department of finance, a department of human services, a department
    of health which shall exercise the powers and perform the duties of the general
    health district according to policies established by the board of county commissioners
    notwithstanding Chapter 3709. of the Revised Code, a purchasing department, a
    department of public works, a department of law, a department of personnel, a
    department of detention and correction, a department of water and sewers, and
    such other departments, divisions, and sections under the supervision of the county
    executive, as it determines to be necessary for the efficient administration of
    the county''s business, and may provide for the merger of such departments, divisions,
    and sections;

    (B) Determine the compensation of appointive heads of departments and divisions
    under the supervision of the board of county commissioners and adopt by resolution
    a classification plan and schedule fixing the rates of compensation of all classes
    and grades in the county service. Such schedule shall provide uniform compensation
    for like service, and may establish minimum and maximum rates for any grade of
    position within which the compensation shall be fixed by the appointing authority.

    (C) Determine what officers and employees shall file bond, and fix the amount
    and form thereof and approve the surety of the bond given;

    (D) Provide for the borrowing of money in anticipation of the collection of taxes
    and revenues for the current fiscal year;

    (E) Acquire, construct, maintain, administer, rent, and lease property including
    buildings and other public improvements as provided by law;

    (F) Cooperate or join by contract pursuant to section 302.21 of the Revised Code
    with any city, county, state, or political subdivision or agency thereof, or with
    the United States or any agency thereof, for the planning, development, construction,
    acquisition, or operation of any public improvement or facility, or for a common
    service; and may provide the terms upon which the county shall perform any of
    the services and functions of any municipality or political subdivision in the
    county;

    (G) Accept, in the name of the county, gifts, devises, bequests, and grants-in-aid
    from any person, firm, corporation, city, county, state, or political subdivision
    or agency thereof, or from the United States or any agency thereof;

    (H) Request periodic or special reports by the county executive, elected officers,
    and administrative officers and bodies, and may require their attendance upon
    its meetings;

    (I) Designate the maximum number of assistants, deputies, clerks, and other persons
    that may be employed in each of the offices and departments of the county;

    (J) Authorize the county executive to employ experts and consultants in connection
    with the administration of the affairs of the county;

    (K) Establish procedures governing the making of county contracts and the purchasing
    of county supplies and equipment by competitive bidding;

    (L) Exercise control over expenditures by all county officials and promulgate
    and execute an allotment schedule allocating annual appropriations for any county
    government purpose by item on either a monthly or quarterly basis;

    (M) By ordinance or resolution make any rule, or act in any matter not specifically
    prohibited by general law; provided that, in the case of conflict between the
    exercise of powers pursuant to this division and the exercise of powers by a municipality
    or township, the exercise of power by the municipality or township shall prevail,
    and further provided that the board may levy only taxes authorized by general
    law.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.13
- number: '302.14'
  heading: County executive
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'There shall be a county executive, who shall be the chief executive officer
    of the county. He shall be either an elective county executive as provided for
    in section 302.15 of the Revised Code, or an appointive county executive as provided
    for in section 302.16 of the Revised Code.

    In case of the absence or disability of the county executive as determined by
    the board of county commissioners, his duties shall be performed during his absence
    or disability by whomsoever the board of county commissioners designates by resolution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.14
- number: '302.15'
  heading: Elective executive plan
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'In a county adopting the elective executive plan the chief executive officer
    shall be known as the county executive. The county executive shall be elected
    at the first regular county general election following the adoption of the alternative
    form and shall hold his office for a term of four years. Only an elector of the
    county shall be eligible for election as county executive and shall be nominated
    and elected in the manner provided by general law for county officers.

    In case the office of county executive is or becomes vacant by reason of death,
    resignation, or removal, it shall be filled by the board of county commissioners
    for the unexpired term.

    In the elective executive plan, the salary of the first county executive, for
    his first term, shall be one hundred and sixty per cent of that established by
    section 325.10 of the Revised Code for a member of the board of county commissioners
    in the county. For all subsequent county executives and terms, the salary shall
    be fixed by the board of county commissioners one year prior to the county executive''s
    term of office.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.15
- number: '302.16'
  heading: Appointive executive plan
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'In a county adopting the appointive executive plan, the county executive
    shall be an elector of the county and appointed by the board of county commissioners.
    No persons elected to membership on the board of county commissioners shall thereafter
    be eligible for appointment as county executive until the conclusion of one year
    after the expiration of the term for which he was elected.

    The county executive shall be appointed for an indefinite term, but may be removed
    by the board of county commissioners.

    In the appointive executive plan, the salary of the county executive shall be
    fixed by the board of county commissioners.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.16
- number: '302.17'
  heading: County executive responsibilities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: The county executive shall be responsible for the proper administration of
    the affairs of the county placed in his charge, and, by resolution of the board
    of county commissioners, may serve as the head of any county department created
    by the board pursuant to sections 302.01 to 302.24, inclusive, of the Revised
    Code, provided he has the qualifications required by law.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.17
- number: '302.18'
  heading: County executive - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: '(A) The county executive shall be the administrative head of the county and
    shall have all powers and shall perform all duties of an administrative or executive
    nature vested in or imposed upon the board of county commissioners by general
    law or by agreement with any municipality or other subdivision of government of
    Ohio and such additional powers as are granted and imposed by the board, and the
    county executive shall administer the resolutions of the board of county commissioners
    and the laws of the state relating to or required to be enforced by the county
    executive''s office. The county executive shall supervise the departments established
    pursuant to division (A) of section 302.13 of the Revised Code. All authority
    of the board of county commissioners under general law with respect to the adoption
    of the county budget and the submission of any matter to the electors shall be
    exercised by the board of county commissioners provided for under Chapter 302.
    of the Revised Code. Contracts between the county and other agencies of government
    shall be approved or authorized by the board of county commissioners.

    (B) The county executive, under the elective executive plan, shall exercise all
    authority of the board of county commissioners to appoint, suspend, and remove
    all county personnel whose appointment, suspension, and removal was a function
    of the board of county commissioners under general law, except for the clerk of
    the board of county commissioners, the clerk''s clerical assistants, and the appointments
    listed in division (C) of section 302.18 of the Revised Code. Under the appointive
    executive plan, the board of county commissioners shall have the power to appoint,
    suspend, and remove all county personnel whose appointment, suspension, and removal
    was a function of the board under general law, upon the recommendation of the
    county executive.

    (C) Appointment of officers, which by general law in sections 303.04, 303.13,
    305.29, 306.01, 306.02, 329.01, 329.06, 5153.39, and 5155.03 of the Revised Code
    is required to be made by the board of county commissioners, shall be made by
    the county executive, under either plan, with advice and consent of the board
    of county commissioners. The county executive, under either plan, also shall appoint
    with the advice and consent of the board of county commissioners, all officers
    and members of boards and commissions, other than officers of a court or employees
    or other persons advisory to or subject to the supervision of a court or judge
    thereof, which by general law in sections 331.01, 339.02, 1545.02, 1545.03, 1545.04,
    and 1545.05 of the Revised Code are to be appointed by a judge or judges of the
    probate or common pleas court of the county.

    (D) The county executive, under the elective executive plan, shall have the power
    to veto any ordinance or resolution adopted by the board of county commissioners.
    A veto by the county executive may apply to all or any items of an ordinance appropriating
    money. Certification of a veto must be made by the county executive within ten
    days of its adoption by the board of county commissioners, and the board of county
    commissioners may override the veto by a two-thirds vote of all its members. Under
    the elective executive plan an ordinance or resolution shall become effective
    upon approval by the county executive, expiration of such ten days without approval
    or veto, or overriding of a veto.

    (E) The county executive shall promote the coordination of all county functions
    and for this purpose shall make an annual public report on the state of the county.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.18
- number: '302.19'
  heading: Additional duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'In addition to other powers and duties provided in sections 302.01 to 302.24,
    inclusive, of the Revised Code, the county executive shall:

    (A) Prepare and recommend to the board of county commissioners the annual tax
    budget and county appropriation resolution;

    (B) Keep the board advised of the financial condition and future needs of the
    county;

    (C) Prepare and submit to the board such measures as he deems necessary for the
    conduct of the county''s business;

    (D) Attend meetings of the board of county commissioners and take part in the
    discussion of all matters before the board;

    (E) Prepare and submit to the board of county commissioners such reports on the
    operations of any departments, offices, and bodies under his control as may be
    required by the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.19
- number: '302.20'
  heading: County department of finance - duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'If established under this chapter, the department of finance shall:

    (A) Maintain a complete system of accounts of the financial transactions of the
    county and of the department and shall determine the form of the financial records
    and accounts to be kept by a county department, office, or agency. The accounting
    system shall be so designed as to avoid the keeping of duplicate records of tax
    and other financial transactions insofar as is consistent with proper accounting
    control.

    (B) Examine and determine the regularity, legality, and correctness of each expenditure,
    claim, voucher, or payroll against the county, and the county auditor shall draw
    warrants on the county treasurer for the payment of such expenditure, claim, voucher,
    or payroll when approved by the department of finance and only when so approved.

    (C) Transfer temporarily deputies or employees from one office or department of
    the county to another to promote efficiency and economy, except that any transfers
    of employees of an elected officer shall be made only with the consent of such
    officer, and except that no persons appointed by the sheriff may at any time be
    so transferred.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.20
- number: '302.201'
  heading: Department of law - duties of director of law
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: If established under the provisions of Chapter 302. of the Revised Code, the
    department of law shall be administered by a director of law who shall be an attorney-at-law
    admitted to the practice of law in this state. The director of law shall serve
    as legal advisor to the board of county commissioners, the county executive, and
    the county departments, offices, and agencies responsible to the board and the
    county executive. The director of law shall give written opinions as to the law
    when specifically requested so to do by the board or the county executive, act
    as counsel for the board and the county executive in any proceeding instituted
    by or against the board or the county executive, and perform any other legal duties
    assigned by the board of county commissioners or the county executive.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.201
- number: '302.202'
  heading: Department of personnel - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'If established under this chapter, the department of personnel shall make
    and promulgate personnel rules that, when adopted by the board of county commissioners
    after public hearing, shall be the sole basis for determining the provisions and
    procedures of the county personnel system.

    Notwithstanding the provisions of Chapter 124. of the Revised Code, personnel
    rules adopted by the board of county commissioners pursuant to this section, may
    provide for, but need not be limited to, the following:

    (A) Classification of all county positions, which classification shall be based
    on the duties, authority, and responsibility of each position;

    (B) A pay plan for all county positions, which pay plan may include fringe benefits
    as may be determined by the board of county commissioners, in addition to salary;

    (C) Certification of payrolls as to compliance with the pay plan and the personnel
    rules;

    (D) The method of holding competitive tests for determining the merit and fitness
    of candidates for appointment and promotion;

    (E) The establishment, maintenance, and certification of eligible lists for filling
    vacancies;

    (F) The order and manner in which lay-offs may be effected;

    (G) The procedure for suspension and removal of employees, which procedure shall
    include provisions for appeals from orders of suspension or removal or other disciplinary
    action;

    (H) The hours of work, the attendance regulations, and the provisions for sick
    and vacation leave;

    (I) Other practices and procedures necessary to the administration of the county
    personnel system.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.202
- number: '302.203'
  heading: Department of detention and correction - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: If established under the provisions of Chapter 302. of the Revised Code, the
    department of detention and correction shall assume all of the responsibility
    for the establishment, maintenance, and operation of an adult detention and correction
    administration for the county. Notwithstanding the provisions of Chapter 341.
    of the Revised Code, the department of detention and correction shall assume all
    responsibility for county jails assigned by that chapter to the county sheriff
    and shall make and promulgate rules and regulations for the care and custody of
    prisoners and the maintenance and operation of the county jail. Such rules and
    regulations shall be subject to approval of the joint session of the court of
    common pleas.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.203
- number: '302.204'
  heading: Department of water and sewers - duties and functions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: If established under the provisions of Chapter 302. of the Revised Code, the
    department of water and sewers shall assume all duties and perform all functions
    related to the operation of the county's sewer and water systems. The board of
    county commissioners may create a board of trustees to serve at its pleasure and
    may assign to such board such functions and responsibilities as are by law delegated
    to the board of county commissioners in Chapters 6117. and 6103. of the Revised
    Code as they pertain to the operation of a county sewer system and a county water
    system.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.204
- number: '302.21'
  heading: Agreements with other political subdivisions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'The board of county commissioners as provided in section 302.22 of the Revised
    Code may enter into an agreement with the legislative authority of any municipal
    corporation, township, port authority, water or sewer district, school district,
    library district, health district, park district, soil and water conservation
    district, water conservancy district, or other taxing district, or with the board
    of any other county, and such legislative authorities may enter into agreements
    with the board, whereby such board undertakes, and is authorized by the contracting
    subdivision, to exercise any power, perform any function, or render any service,
    in behalf of the contracting subdivision or its legislative authority, which such
    subdivision or legislative authority may exercise, perform, or render.

    Upon the execution of such agreement and within the limitations prescribed by
    it, the board may exercise the same powers as the contracting subdivision possesses
    with respect to the performance of any function or the rendering of any service,
    which, by such agreement, it undertakes to perform or render, and all powers necessary
    or incidental thereto, as amply as such powers are possessed and exercised by
    the contracting subdivision directly. In the absence in such agreement of provisions
    determining by what officer, office, department, agency, or authority, the powers
    and duties of the board shall be exercised or performed, the board shall, within
    the limits of this section, determine and assign such powers and duties to any
    officer or officers of county government including the auditor, treasurer, engineer,
    recorder, coroner, sheriff, and prosecuting attorney. Any agreement authorized
    by this section shall not suspend the possession by a contracting subdivision
    of any power or function exercised or performed by the board in pursuance of such
    agreement. Nor shall the board, by virtue of any agreement entered into under
    this section, acquire any power to levy taxes within and in behalf of a contracting
    subdivision unless approved by a majority of the electors of the contracting subdivision.

    The boards of county commissioners of any two or more counties may contract with
    each other or by contract create any joint agency to exercise any power, perform
    any function, or render any service which any board of county commissioners may
    exercise, perform, or render.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.21
- number: '302.22'
  heading: Agreements with other political subdivisions to provide for payment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'Every agreement entered into under sections 302.21 to 302.24, inclusive,
    of the Revised Code, shall provide, either in specific terms or by prescribing
    a method for determining the amounts, for any payments to be made by the contracting
    subdivision into the county treasury, in consideration of the performance of the
    agreement. In cases where it is deemed practicable, the agreement may provide
    that payment shall be made by the retention in the treasury of the amounts due
    from taxes collected for the contracting subdivision and the county auditor and
    county treasurer shall be governed by any such provision in settling the accounts
    for such taxes.

    Any agreement entered into by and between two or more boards of county commissioners
    shall specify the method of payment for the joint exercise of any power, the joint
    performing of any function, or the joint rendering of any service, which method
    of payment shall be authorized and binding on the counties so long as the agreement
    is in effect.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.22
- number: '302.23'
  heading: Rescinding agreements with other political subdivisions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: In the absence from an agreement entered into under sections 302.21 to 302.24,
    inclusive, of the Revised Code, of a specification of its own duration, such agreement
    shall continue in effect until it is rescinded. Every such agreement, whether
    for a definite term or of indefinite duration, may provide for its own rescission.
    In the absence of any such provision, such agreement may, at any time, be rescinded
    by the agreement of both parties, and may at any time be rescinded by resolution
    of either party to the agreement, effective at the end of the fiscal year.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.23
- number: '302.24'
  heading: Agreements with other political subdivisions transferring property
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: Any agreement entered into under sections 302.21 to 302.24, inclusive, of
    the Revised Code, may provide for the transfer to the board of county commissioners
    of any property, real or personal, used or useful, in the performance of functions
    or the rendering of services under such agreement. Such transfer may include the
    proceeds of bonds issued or to be issued by the contracting subdivision, appropriate
    to the powers, functions, or services under the agreement, such proceeds to be
    expended by the board subject to the same conditions as would govern the contracting
    subdivision. Such transfer may convey the absolute title to such property, subject,
    in the case of the disposal or encumbrance of such real property by the board,
    to the consent of the legislative authority of the contracting subdivision; or
    may convey its use only, or any estate or title less than absolute; may limit
    the power of the board to dispose of such property; and may provide for its return,
    disposition, division, or distribution, in the event of the rescission or expiration
    of the agreement.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.24
- number: '303.01'
  heading: County rural zoning - agriculture defined
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: As used in sections 303.02 to 303.25 of the Revised Code, "agriculture" includes
    farming; ranching; algaculture meaning the farming of algae; aquaculture; apiculture;
    horticulture; viticulture; animal husbandry, including, but not limited to, the
    care and raising of livestock, equine, and fur-bearing animals; poultry husbandry
    and the production of poultry and poultry products; dairy production; the production
    of field crops, tobacco, fruits, vegetables, nursery stock, ornamental shrubs,
    ornamental trees, flowers, sod, or mushrooms; timber; pasturage; any combination
    of the foregoing; and the processing, drying, storage, and marketing of agricultural
    products when those activities are conducted in conjunction with, but are secondary
    to, such husbandry or production.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.01
- number: '303.02'
  heading: County commissioners may regulate building and land use in unincorporated
    territory
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: '(A) Except as otherwise provided in this section, in the interest of the
    public health and safety, the board of county commissioners may regulate by resolution,
    in accordance with a comprehensive plan, the location, height, bulk, number of
    stories, and size of buildings and other structures, including tents, cabins,
    and trailer coaches, percentages of lot areas that may be occupied, set back building
    lines, sizes of yards, courts, and other open spaces, the density of population,
    the uses of buildings and other structures, including tents, cabins, and trailer
    coaches, and the uses of land for trade, industry, residence, recreation, or other
    purposes in the unincorporated territory of the county. Except as otherwise provided
    in this section, in the interest of the public convenience, comfort, prosperity,
    or general welfare, the board, by resolution, in accordance with a comprehensive
    plan, may regulate the location of, set back lines for, and the uses of buildings
    and other structures, including tents, cabins, and trailer coaches, and the uses
    of land for trade, industry, residence, recreation, or other purposes in the unincorporated
    territory of the county, and may establish reasonable landscaping standards and
    architectural standards excluding exterior building materials in the unincorporated
    territory of the county. Except as otherwise provided in this section, in the
    interest of the public convenience, comfort, prosperity, or general welfare, the
    board may regulate by resolution, in accordance with a comprehensive plan, for
    nonresidential property only, the height, bulk, number of stories, and size of
    buildings and other structures, including tents, cabins, and trailer coaches,
    percentages of lot areas that may be occupied, sizes of yards, courts, and other
    open spaces, and the density of population in the unincorporated territory of
    the county. For all these purposes, the board may divide all or any part of the
    unincorporated territory of the county into districts or zones of such number,
    shape, and area as the board determines. All such regulations shall be uniform
    for each class or kind of building or other structure or use throughout any district
    or zone, but the regulations in one district or zone may differ from those in
    other districts or zones.

    For any activities permitted and regulated under Chapter 1513. or 1514. of the
    Revised Code and any related processing activities, the board of county commissioners
    may regulate under the authority conferred by this section only in the interest
    of public health or safety. A zoning resolution authorized under this section
    shall provide for the activities that are permitted and regulated under Chapter
    1514. of the Revised Code, and any related processing activities, as either a
    permitted use or a conditional use through the board of zoning appeals in any
    district or zone when such activities are to be added to an existing permit issued
    under Chapter 1514. of the Revised Code.

    (B) A board of county commissioners that pursuant to this chapter regulates adult
    entertainment establishments, as defined in section 2907.39 of the Revised Code,
    may modify its administrative zoning procedures with regard to adult entertainment
    establishments as the board determines necessary to ensure that the procedures
    comply with all applicable constitutional requirements.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.02
- number: '303.021'
  heading: Designating street names and assigning numbers to buildings
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: The board of county commissioners may designate street names and assign numbers
    to buildings along streets in unincorporated areas. The owners of such buildings
    shall number or renumber such buildings in accordance with the numbers assigned
    by the county commissioners.
