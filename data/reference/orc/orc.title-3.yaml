- number: '307.65'
  heading: Harbor improvements
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners of any county bordering Lake Erie may construct,
    open, enlarge, excavate, improve, deepen, straighten, or extend any harbor located
    in whole or in part within such county, and within the corporate limits of a municipal
    corporation having an aggregate tax duplicate of less than five hundred million
    dollars, and any such work shall be a permanent improvement within section 133.15
    of the Revised Code. Such authority shall not be exercised, nor shall any proceeding
    for the submission of the question of issuing bonds for the work be taken, until
    the legislative authority of such municipal corporation, by resolution, has consented
    thereto.
