- number: '307.691'
  heading: County or municipal assistance to nonprofit corporations engaged in certain
    activities benefiting public
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The board of county commissioners of any county or the legislative authority
    of a municipal corporation may cooperate with, give financial assistance to, and
    provide equipment to any nonprofit corporation engaged in promoting safety in
    this state, to any nonprofit corporation that provides ambulance service, emergency
    medical services, or nonemergency patient transport services in this state, to
    any nonprofit corporation engaged in this state in the development of public interest
    and understanding of the economic benefits resulting from the building of the
    Great Lakes-St. Lawrence Seaway, and to any nonprofit ombudsman corporation engaged
    in this state in assisting citizens in dealing with governments, including political
    subdivisions, governmental agencies and instrumentalities, and public officials
    through the investigation of citizen complaints concerning government services
    and operations.

    The nonprofit corporation shall be required to make an audited account at least
    once every year of any funds received, and a report of the use and disposition
    of any equipment received, from the board of county commissioners or the legislative
    authority of any municipal corporation, to the board of county commissioners or
    the legislative authority of any municipal corporation from which the funds or
    equipment is received.'
