- number: '307.672'
  heading: Cooperative agreement for sales tax levy and bond issuance with nonprofit
    corporation for municipal education and cultural facility
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) As used in this section:

    (1) "Bonds" means general obligation bonds, or notes in anticipation thereof,
    of the county described in division (B)(1)(b) of this section, and general obligation
    bonds, or notes in anticipation thereof, of the host municipal corporation described
    in division (B)(2)(a) of this section.

    (2) "Corporation" means a nonprofit corporation that is organized under the laws
    of this state and that includes within the purposes for which it is incorporated
    the authorization to lease and operate facilities such as a municipal educational
    and cultural facility.

    (3) "Debt service charges" means, for any period or payable at any time, the principal
    of and interest and any premium due on bonds for that period or payable at that
    time whether due at maturity or upon mandatory redemption, together with any required
    deposits to reserves for the payment of principal of and interest on such bonds.

    (4) "Host municipal corporation" means the municipal corporation within the boundaries
    of which a municipal educational and cultural facility is or will be located.

    (5) "Municipal educational and cultural facility" means a facility that may consist
    of a museum, archives, library, hall of fame, center for contemporary music, or
    other facilities necessary to provide programs of an educational, recreational,
    and cultural nature, together with all parking facilities, walkways, and other
    auxiliary facilities, real and personal property, property rights, easements,
    and interests that may be appropriate for, or used in connection with, the operation
    of the facility.

    (B) The legislative authorities of a county and a host municipal corporation may
    enter into a cooperative agreement with a corporation, under which:

    (1) The legislative authority of the county agrees to:

    (a) Levy a tax under division (O) of section 5739.09 of the Revised Code, for
    a period not to exceed fifteen years unless extended under that division for an
    additional period of time, to pay the costs of acquiring, constructing, equipping,
    and improving a municipal educational and cultural facility, including the debt
    service charges on bonds;

    (b) Issue bonds of the county pursuant to Chapter 133. of the Revised Code for
    the purpose of acquiring, constructing, equipping, and improving a municipal educational
    and cultural facility;

    (c) Contribute revenue from the tax and the proceeds from the bonds described
    in divisions (B)(1)(a) and (b) of this section to the host municipal corporation
    for the purpose of acquiring, constructing, equipping, and improving a municipal
    educational and cultural facility;

    (2) The host municipal corporation agrees to:

    (a) Issue bonds of the host municipal corporation pursuant to Chapter 133. of
    the Revised Code for the purpose of acquiring, constructing, equipping, and improving
    a municipal educational and cultural facility;

    (b) Acquire, construct, equip, and improve a municipal educational and cultural
    facility;

    (c) Accept from the county pursuant to the cooperative agreement the revenues
    of the tax and the proceeds of the bonds described in divisions (B)(1)(a) and
    (b) of this section;

    (d) Lease a municipal educational and cultural facility to the corporation, or
    contract with the corporation for the operation and maintenance of the facility;

    (e) To the extent provided for in the cooperative agreement or the lease or contract
    with the corporation, authorize the corporation to administer on behalf of the
    host municipal corporation the contracts for acquiring, constructing, equipping,
    and improving a municipal educational and cultural facility.

    (3) The corporation agrees to:

    (a) Either lease the municipal educational and cultural facility from the host
    municipal corporation and operate and maintain the facility pursuant to the lease,
    or enter into a contract with the host municipal corporation pursuant to which
    the corporation shall operate and maintain the facility on behalf of the host
    municipal corporation;

    (b) To the extent provided for in the cooperative agreement or the lease or contract
    with the host municipal corporation, administer on behalf of the host municipal
    corporation the contracts for acquiring, constructing, equipping, or improving
    a municipal educational and cultural facility.

    (C) A tax levied pursuant to division (O) of section 5739.09 of the Revised Code,
    the revenue from which is to be used to pay debt service charges on bonds described
    in division (B)(1) or (2) of this section is not subject to diminution by initiative
    or referendum or diminution by statute, unless provision is made therein for an
    adequate substitute therefor reasonably satisfactory to the legislative authorities
    of the host municipal corporation and the county.

    (D) The legislative authorities of a county and a host municipal corporation that
    have entered into a cooperative agreement with a corporation pursuant to division
    (B) of this section may amend that cooperative agreement, with the participation
    of the corporation and a port authority as defined in section 307.674 of the Revised
    Code, to provide also for a port authority educational and cultural performing
    arts facility in accordance with section 307.674 of the Revised Code. Such an
    amendment shall become effective only to the extent that the tax levied under
    division (O) of section 5739.09 of the Revised Code is not needed for the duration
    of the original tax to pay costs of the municipal educational and cultural facility,
    including debt service charges on related bonds, as determined by the parties
    to the amendment. The tax may be pledged and paid by the parties to the amendment
    for the balance of the duration of the tax to a port authority educational and
    cultural performing arts facility.'
