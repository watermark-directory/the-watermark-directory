    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: For the purposes of facilitating any project set forth in section 307.77 of
    the Revised Code and safeguarding the respective interests of the contributing
    counties, the respective boards of county commissioners may enter into such agreements
    with any public authority empowered to act with respect to any public improvement
