- number: '307.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Whoever violates section 307.42 of the Revised Code shall be fined not
    less than twenty-five nor more than one hundred dollars for each offense.

    (B) Whoever violates section 307.43 of the Revised Code shall be fined not less
    than twenty-five nor more than two hundred dollars, and imprisoned not less than
    ten nor more than sixty days.

    (C) Whoever violates section 307.37 of the Revised Code, shall be fined not more
    than three hundred dollars.

    (D) Whoever violates division (C)(5) of section 307.97 of the Revised Code shall
    be fined not less than one hundred nor more than five hundred dollars.

    (E) Whoever violates any other subdivision of division (C) of section 307.97 of
    the Revised Code shall be imprisoned not more than six months or fined not more
    than one thousand dollars, or both.

    (F) Whoever violates division (F) of section 307.652 of the Revised Code or division
    (B) of section 307.659 of the Revised Code is guilty of a misdemeanor of the first
    degree.'
