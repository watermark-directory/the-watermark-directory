- number: '329.022'
  heading: Employees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: Within the appropriation for personal services, each county department of
    job and family services may employ the necessary employees who, except for the
    county director of job and family services as provided in section 329.02 of the
    Revised Code, shall be in the classified service. Compensation for positions in
    each service, group, or grade established by the director of administrative services
    shall not be less than the minimum nor more than the maximum rates established
    by the director for such positions. The department of job and family services
    shall cooperate with the director in establishing the qualifications of persons
    to be employed and the classification and rates of compensation of county department
    employees.
