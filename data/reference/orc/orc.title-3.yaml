- number: '307.81'
  heading: Vacating unused parks and park lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Where lands have been dedicated to or for the use of the public for parks
    or park lands, and where such lands have remained unimproved and unused by the
    public and there appears to be little or no possibility that such lands will be
    improved and used by the public, the board of county commissioners of the county
    in which the lands are located may, by resolution, declare such parks or park
    lands vacated upon the petition of a majority of the abutting freeholders. No
    such parks or park lands shall be vacated unless notice of the pendency and prayer
    of the petition is given for three consecutive weeks preceding action on such
    petition using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    No such lands shall be vacated before a public hearing had thereon.

    (B) Before the board of county commissioners may act on a petition to vacate unimproved
    and unused parks or park lands under division (A) of this section, the board shall
    offer such parks or park lands to all political subdivisions described in division
    (C) of this section. The board shall give notice to those political subdivisions
    by first class mail that the parks or park lands may be declared vacated unless
    the board of county commissioners accepts an offer from another political subdivision
    to buy or lease the lands. The failure of delivery of any such notice does not
    invalidate any proceedings for the disposition of parks or park lands under this
    division. Any such political subdivision that wishes to buy or lease the parks
    or park lands shall make an offer for the lands to the board in writing not later
    than ninety days after receiving the notice. The board may reject any offer, except
    that if it receives an offer in which the political subdivision agrees to use
    the lands for park purposes and in which the board finds all of the other terms
    acceptable, the board shall accept that offer. No offer shall be accepted until
    notice of the offer is published for three consecutive weeks and a public hearing
    is held. The notice shall be published using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    Proceeds from the sale or lease of the lands shall be placed in the general fund
    of the county and be disbursed as prescribed in section 307.82 of the Revised
    Code. Any deed conveying the lands shall be executed as provided in that section.

    (C) In order to receive a notice or to make an offer regarding parks or park lands
    under division (B) of this section, a political subdivision must meet both of
    the following conditions:

    (1) Have the authority to acquire, develop, and maintain public parks or recreation
    areas;

    (2) Contain the parks or park lands in question within its boundaries, or adjoin
    a political subdivision that contains those parks or park lands within its boundaries.'
