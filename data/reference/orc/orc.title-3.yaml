- number: '321.49'
  heading: Contracts for treasurer to provide services to county land reutilization
    corporation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: The county treasurer may enter into a contract with a county land reutilization
    corporation organized under Chapter 1724. of the Revised Code to provide employees
    of the treasurer to provide services to the corporation. An employee of the treasurer
    who provides services to a county land reutilization corporation under such a
    contract shall not be considered an employee of the corporation during the provision
    of services, but shall remain an employee of the county during provision of services
    pursuant to the contract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-321.49
- number: '321.50'
  heading: Liability for loss of public funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: A county treasurer shall not be held liable for a loss of public funds when
    the county treasurer has performed all official duties required of the county
    treasurer with reasonable care, but shall be liable only when a loss of public
    funds results from the county treasurer's negligence or other wrongful act.
