  heading: Decree as to taxes collected
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The court of common pleas of the county in which an action is brought, as
    provided in section 307.34 of the Revised Code, may make such decree, as to taxes
    previously collected by either county within the true boundary of the territory
    actually in the other, as is just.
  history: null
