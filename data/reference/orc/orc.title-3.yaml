- number: '307.151'
  heading: Agreement with municipalities for control of air and water pollution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners may enter into an agreement with the legislative
    authority of any municipal corporation, and such legislative authority may enter
    into agreements with the board, whereby the legislative authority undertakes,
    and is authorized by the board of county commissioners to provide for facilities,
    personnel, and equipment for the control of air and water pollution, and to render
    such other services for such board of county commissioners as provided in the
    agreement. The contracting parties shall be bound by the terms, conditions, and
    stipulations as contained in the agreement. The municipal corporation may exercise
    any power, perform any function, or render any service on behalf of the board
    of county commissioners in carrying out the provisions of this section that the
    board of county commissioners may exercise, perform, or render.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.151
- number: '307.152'
  heading: Agreements with planning commission for comprehensive transportation and
    land use studies
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'A board of county commissioners may enter into an agreement with a county,
    municipal, or regional planning commission, or county engineer for the preparation
    in whole or in part of comprehensive transportation and land use studies and major
    thoroughfare reports, upon such terms as are mutually agreed upon.

    Any agreement with a county, municipal, or regional planning commission may provide
    that contributions of county funds shall be credited to a separate fund of the
    planning commission from which expenditures for fulfilling the agreement are made.
    Any moneys contributed to a county, municipal, or regional planning commission
    for preparation of such plans may be credited to the county''s portion of the
    cost of the preparation of such plans. The agreement may provide that county funds
    appropriated for the county''s portion of such plans or in excess of the county''s
    portion of the cost of such plans shall be refunded to the county fund out of
    which the contribution was originally appropriated, when the county, municipal,
    or regional planning commission receives federal or other funds in payment for
    such projects. The agreement may provide that only allowable reimbursable expenses
    shall be included in calculating the county''s portion of the costs. The terms
    of the agreement may include other provisions mutually agreed upon.

    The board of county commissioners may pay the costs of the agreement for the planning
    necessary to satisfy the continuing comprehensive transportation planning process
    from revenues derived from the motor vehicle license tax, the motor fuel excise
    tax levied by section 5735.05 of the Revised Code, the county general fund, or
    any other county fund which may be expended for planning purposes and may also
    pay costs for other planning from the county general fund or any other county
    fund which may be expended for planning purposes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.152
- number: '307.153'
  heading: Agreements with board of health
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'A board of health of a city or general health district may enter into an
    agreement with the board of county commissioners of the county in which the health
    district is totally or partially located, and the board of county commissioners
    may enter into an agreement with the board of health, whereby the board of health
    undertakes, and is authorized by the board of county commissioners, to exercise
    any power, perform any function, or render any service, in behalf of the county
    commissioners, which the board of county commissioners may exercise, perform,
    or render.

    Upon the execution of the agreement and within the limitations prescribed by it,
    the board of health may exercise the same powers as the board of county commissioners
    possesses with respect to the performance of any function or the rendering of
    any service, which, by such agreement, it undertakes to perform or render, and
    all powers necessary or incidental thereto, as amply as the powers are possessed
    and exercised by the board of county commissioners directly. Any agreement authorized
    by this section does not suspend the possession by the board of county commissioners
    of any power or function exercised or performed by the board of health in pursuance
    of the agreement. Nor shall the board of health, by virtue of any agreement entered
    into under this section, acquire any power to levy taxes in behalf of the board
    of county commissioners unless approved by a majority of the electors of the county.

    Every agreement entered into under this section shall provide, either in specific
    terms or by prescribing a method for determining the amounts, for any payments
    to be made by the county commissioners into the health fund of the health district,
    in consideration of the performance of the agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.153
- number: '307.16'
  heading: Agreement to provide method of payment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'Every agreement entered into under sections 307.14 to 307.19, inclusive,
    of the Revised Code, shall provide, either in specific terms or by prescribing
    a method for determining the amounts, for any payments to be made by the contracting
    subdivision into the county treasury, or by the county to the municipal corporation,
    in consideration of the performance of the agreement. In cases where it is deemed
    practicable, the agreement may provide that payment shall be made by the retention
    in the treasury of the amounts due from taxes collected for the contracting subdivision
    and the county auditor and county treasurer shall be governed by any such provision
    in settling the accounts for such taxes.

    Any agreement entered into by and between two or more boards of county commissioners
    shall specify the method of payment for the joint exercise of any power, the joint
    performing of any function, or the joint rendering of any service which method
    of payment shall be authorized and binding on the counties so long as the agreement
    is in effect.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.16
- number: '307.17'
  heading: Duration of agreement - rescission
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: In the absence from an agreement entered into under sections 307.14 to 307.19,
    inclusive, of the Revised Code, of a specification of its own duration, such agreement
    shall continue in effect until it is rescinded. Every such agreement, whether
    for a definite term or of indefinite duration, may provide for its own rescission
    and the method of rescission. In the absence of any such provision, such agreement
    may, at any time, be rescinded by the agreement of both parties, and an agreement
    of indefinite duration may at any time be rescinded by resolution of either party
    to the agreement, effective at the end of the fiscal year, not sooner than six
    months after such rescinding resolution has been certified and delivered to the
    clerk or secretary of the other party.
