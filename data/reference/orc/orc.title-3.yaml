- number: '325.13'
  heading: Additional funds for investigating and prosecuting crimes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: When, in the opinion of the prosecuting attorney, an emergency exists by reason
    of the unusual prevalence of crime or when it appears to be probable that criminal
    efforts are being made to obstruct the due administration of justice, if the funds
    available to such prosecuting attorney under section 325.12 of the Revised Code
    are insufficient for the purposes of the necessary investigation and prosecution
    of such activities and offenses, he may make application to the court of common
    pleas for additional funds. Such court, if satisfied that the expenditure of additional
    funds will be for the public benefit and will promote the administration of justice,
    may, by an order entered in its journal allow such prosecuting attorney additional
    funds not in excess of ten thousand dollars in any one year. This fund shall be
    expended upon the order of the prosecuting attorney in the manner prescribed by
    section 325.12 of the Revised Code.
