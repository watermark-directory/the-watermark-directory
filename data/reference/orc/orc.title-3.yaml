- number: '340.038'
  heading: Data sharing and integration plan
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: The department of mental health and addiction services, in collaboration with
    boards of alcohol, drug addiction, and mental health services and other stakeholders,
    shall develop a data sharing and integration plan. The plan shall specify data
    sharing and integration procedures that the department and the boards shall use
    to improve the management and administration of programs offering addiction or
    mental health services and to ensure that the essential elements of a board's
    continuum of care are available, as appropriate, to persons seeking or receiving
    addiction or mental health services.
