- number: '325.18'
  heading: Salary increases for elected county officials
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: '(A) The salary amounts under sections 325.06 and 325.11 of the Revised Code
    shall be increased as follows:

    (1) Beginning in calendar year 2020 and in each calendar year thereafter through
    calendar year 2025, by one and three-quarters per cent;

    (2) Beginning in calendar year 2026 and in each calendar year thereafter through
    calendar year 2029, by five per cent.

    (B) The salary amounts under sections 325.03, 325.04, 325.08, 325.09, 325.10,
    325.14, and 325.15 of the Revised Code shall be increased as follows:

    (1) Beginning in calendar year 2021 and in each calendar year thereafter through
    calendar year 2025, by one and three-quarters per cent;

    (2) Beginning in calendar year 2026 and in each calendar year thereafter through
    calendar year 2029, by five per cent.

    (C) Notwithstanding this section and sections 325.06, 325.11, 325.14, and 325.15
    of the Revised Code, when computing a salary for any elected county officer under
    any of those sections, if the population range for the class under which the officer
    is to be compensated is not the same as the population range for that class for
    any other such elected county office, the class at which the officer''s salary
    is determined shall be the highest class at which any officer from that same county
    is compensated under the population range applicable to that officer.'
