- number: '307.021'
  heading: Public purpose and function to provide capital facilities for jails, workhouses
    or community-based corrections
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) It is hereby declared to be a public purpose and function of the state,
    and a matter of urgent necessity, that the state acquire, construct, or renovate
    capital facilities for use as county, multicounty, municipal-county, and multicounty-municipal
    jail facilities or workhouses, as single-county or district community-based correctional
    facilities authorized under section 2301.51 of the Revised Code, as minimum security
    misdemeanant jails under sections 341.34 and 753.21 of the Revised Code, and as
    single-county or joint-county juvenile facilities authorized under section 2151.65
    of the Revised Code in order to comply with constitutional standards and laws
    for the incarceration of alleged and convicted offenders against state and local
    laws, and for use as county family court centers. For these purposes, counties
    and municipal corporations are designated as state agencies to perform duties
    of the state in relation to such facilities, workhouses, jails, and centers, and
    such facilities, workhouses, jails, and centers are designated as state capital
    facilities. The treasurer of state is authorized to issue revenue obligations
    under Chapter 154. of the Revised Code to pay all or part of the cost of such
    state capital facilities as are designated by law.

    The office of the sheriff, due to its responsibilities concerning alleged and
    convicted offenders against state laws, is designated as the state agency having
    jurisdiction over such jail, workhouse, community-based correctional, or county
    minimum security misdemeanant jail capital facilities in any one county or over
    any district community-based correctional facilities. The corrections commission,
    due to its responsibilities in relation to such offenders, is designated as the
    state agency having jurisdiction over any such multicounty, municipal-county,
    or multicounty-municipal jail, workhouse, or correctional capital facilities.
    The office of the chief of police or marshal of a municipal corporation, due to
    its responsibilities concerning certain alleged and convicted criminal offenders,
    is designated as the state agency having jurisdiction over any such municipal
    corporation minimum security misdemeanant jail capital facilities in the municipal
    corporation. The juvenile court, as defined in section 2151.011 of the Revised
    Code, is designated as the branch of state government having jurisdiction over
    any such family court center or single-county or joint-county juvenile capital
    facilities. It is hereby determined and declared that such capital facilities
    are for the purpose of housing such state agencies, their functions, equipment,
    and personnel.

    (B) The capital facilities provided for in this section may be included in capital
    facilities in which one or more governmental entities are participating or in
    which other facilities of the county or counties, or any municipal corporations,
    are included pursuant to division (B) of section 154.24 of the Revised Code or
    in an agreement between any county or counties and any municipal corporation or
    municipal corporations for participating in the joint construction, acquisition,
    or improvement of public works, public buildings, or improvements benefiting the
    parties in the same manner as set forth in section 153.61 of the Revised Code.

    (C) A county or counties or a municipal corporation or municipal corporations
    may contribute to the cost of capital facilities authorized under this section.

    (D) A county or counties, and any municipal corporations, shall lease capital
    facilities described in this section that are constructed, reconstructed, or otherwise
    improved, which facilities are financed by the treasurer of state pursuant to
    Chapter 154. of the Revised Code, for the use of the county or counties and any
    municipal corporations, and may enter into other agreements ancillary to the construction,
    reconstruction, improvement, financing, leasing, or operation of such capital
    facilities, including, but not limited to, any agreements required by the applicable
    bond proceedings authorized by Chapter 154. of the Revised Code.

    Such lease may obligate the county or counties and any municipal corporation,
    as using state agencies under Chapter 154. of the Revised Code, to occupy and
    operate such capital facilities for such period of time as may be specified by
    law and to pay such rent as the treasurer of state determines to be appropriate.
    Notwithstanding any other section of the Revised Code, any county or counties
    or municipal corporation may enter into such a lease, and any such lease is legally
    sufficient to obligate the political subdivision for the term stated in the lease.
    Any such lease constitutes an agreement described in division (D) of section 154.06
    of the Revised Code.

    (E) If rental payments required from the county or counties or municipal corporation
    by a lease established pursuant to this section are not paid in accordance with
    such lease, the funds which otherwise would be apportioned to the lessees from
    the county undivided local government fund, pursuant to sections 5747.51 to 5747.53
    of the Revised Code, shall be reduced by the amount of rent owed. The county treasurer
    immediately shall pay the amount of such reductions to the treasurer of state.

    (F) Any lease of capital facilities authorized by this section, the rentals of
    which are payable in whole or in part from appropriations made by the general
    assembly, is governed by Chapter 154. of the Revised Code. Such rentals constitute
    available receipts as defined in section 154.24 of the Revised Code and may be
    pledged for the payment of bond service charges as provided in that section.

    (G) Any provision of section 123.01 of the Revised Code that applies to buildings
    and facilities also applies to the buildings and facilities described in this
    section, unless it is inconsistent with this section.'
