- number: '307.60'
  heading: Appropriation for compensation or recruitment of physicians or other medical
    personnel
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The board of county commissioners may allow a physician or surgeon making
    a post mortem examination at the instance of the coroner or other officer such
    compensation as it deems proper.

    (B) A board of county commissioners may appropriate annually an amount to any
    municipal corporation within the county to be used to compensate or recruit physicians
    or other medical personnel who provide medical services for residents of the municipal
    corporation. Before making such an appropriation, the board shall obtain a resolution
    from the legislative authority of the municipal corporation certifying that the
    appropriation is necessary to attract physicians and other medical personnel to
    provide services within the municipal corporation.'
