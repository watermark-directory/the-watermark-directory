- number: '307.656'
  heading: Annual report
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) A domestic violence fatality review board shall establish a system for
    collecting and maintaining information necessary for the review of deaths by domestic
    violence in the county or region. In an effort to ensure confidentiality, each
    board shall do all of the following:

    (1) Maintain all records in a secure location;

    (2) Develop security measures to prevent unauthorized access to records containing
    information that could reasonably identify any person;

    (3) Develop a system for storing, processing, indexing, retrieving, and destroying
    information obtained in the course of reviewing a death.

    (B) For each death reviewed by a board, the board shall collect all of the following:

    (1) Demographic information of the deceased and perpetrator, including age, sex,
    race, and ethnicity;

    (2) The year in which the death occurred;

    (3) The geographic location of the death;

    (4) The cause of death;

    (5) Any factors contributing to the death;

    (6) Any other information the board considers relevant.

    (C) By the first day of April of each year, the person convening a domestic violence
    fatality review board shall prepare and submit to the department of health in
    the manner and format prescribed by the department a report that includes all
    of the following information for the previous calendar year:

    (1) The total number of deaths by domestic violence in the county or region;

    (2) The total number of deaths by domestic violence reviewed by the board;

    (3) A summary of demographic information for the deaths reviewed, including age,
    sex, race, and ethnicity of both deceased and perpetrators;

    (4) A summary of any trends or patterns identified by the board.

    The report shall specify the number of deaths by domestic violence that were not
    reviewed during the previous calendar year.

    The report shall include recommendations for actions that might prevent other
    deaths, as well as any other information the review board determines should be
    included.

    (D) Reports prepared under division (C) of this section shall be considered public
    records under section 149.43 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.656
- number: '307.657'
  heading: Accessing confidential information
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A)(1) Notwithstanding section 3701.17 and any other section of the Revised
    Code pertaining to confidentiality, on the request of the domestic violence fatality
    review board, any individual, law enforcement agency, or other public or private
    entity that provided services to any of the following shall submit to the review
    board a summary sheet of information:

    (a) A person whose death is being reviewed by a domestic violence fatality review
    board;

    (b) A person who caused the death of a person whose death is being reviewed by
    a domestic violence fatality review board;

    (c) A child of a person whose death is being reviewed by a domestic violence fatality
    review board.

    (2) With respect to a request made to a health care entity, the summary sheet
    shall contain only information available and reasonably drawn from the person''s
    or child''s medical record created by the health care entity.

    (3) With respect to a request made to any other individual or entity, the summary
    sheet shall contain only information available and reasonably drawn from any record
    involving the person or child to which the individual or entity has access.

    (4) On the request of the review board, an individual or entity may, at the individual
    or entity''s discretion, make any additional information, documents, or reports
    available to the review board.

    (B) Notwithstanding division (A) of this section, no person, entity, law enforcement
    agency, or prosecuting attorney shall provide any information to a domestic violence
    fatality review board while an investigation of the death or prosecution of a
    person for causing the death is pending unless the prosecuting attorney has agreed
    pursuant to section 307.655 of the Revised Code to allow review of the death.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.657
- number: '307.658'
  heading: Immunity
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Except as provided in division (B) of this section, members of a domestic
    violence fatality review board and their agents or employees, if any, are immune
    from claims and are not subject to any suits, liability, damages, or any other
    recourse, civil or criminal, arising from any act, proceeding, decision, or determination
    undertaken or performed or recommendation made by the review board.

    No organization, institution, or person furnishing information, data, testimony,
    reports, or records to the domestic violence fatality review board is civilly
    or criminally liable or subject to any other recourse for providing the information.

    (B) The immunity from criminal liability granted by this section does not extend
    to violations of division (F) of section 307.652 of the Revised Code or division
    (B) of section 307.659 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.658
- number: '307.659'
  heading: Unauthorized dissemination of confidential information
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Any information, document, or report presented to a domestic violence
    fatality review board, all statements made by review board members during meetings
    of the review board, all work products of the review board, and data submitted
    by the review board to the department of health, other than the report prepared
    pursuant to section 307.656 of the Revised Code, are confidential, are not public
    records open to public inspection and copying under section 149.43 of the Revised
    Code, and shall be used by the review board, its members, and the department of
    health only in the exercise of the proper functions of the review board and the
    department.

    (B) No member of a domestic violence fatality review board shall disclose any
    of the following, except in the exercise of the proper functions of the review
    board:

    (1) Information, documents, or reports presented to the board;

    (2) Work products of the review board or data submitted to the department of health
    other than reports prepared pursuant to division (C) of section 307.656 of the
    Revised Code.

    (C) A review board may disclose the confidential information described in division
    (A) of this section to a child fatality review board established under section
    307.621 of the Revised Code in the same county or region, and otherwise collaborate
    with a child fatality review board, if the person whose death is being reviewed
    as a domestic violence fatality was a child.'
