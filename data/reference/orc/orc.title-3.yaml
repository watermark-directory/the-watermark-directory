- number: '307.056'
  heading: Powers of board of trustees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'In addition to exercising its powers granted by section 307.055 of the Revised
    Code, the board of trustees of a joint emergency medical services district may
    do any of the following:

    (A) Maintain an office and such other facilities as may be necessary for the operation
    and maintenance of emergency medical services;

    (B) Pay all or any part of the cost of group hospitalization, surgical, major
    medical, and sickness and accident insurance and group life insurance for its
    employees;

    (C) Procure insurance against loss to the district from damage to its properties
    resulting from fire, theft, accident, or other casualty, or its liability for
    injury to persons or property occurring in the construction or operation of facilities
    under its jurisdiction or resulting from the conduct of its activities;

    (D) Procure policies insuring members of the board of trustees against liability
    on account of damages or injury to persons and property resulting from any act
    or omission of a member in his official capacity as a member of the board or resulting
    solely from his membership on the board;

    (E) Sue or be sued;

    (F) Make contracts in the exercise of the district''s rights, powers, and duties;

    (G) Accept gifts, devises, and bequests for the district;

    (H) Employ an attorney to serve as the district''s legal advisor;

    (I) Do all acts necessary or proper to carry out the duties and responsibilities
    imposed on or powers granted to the board to provide emergency medical services,
    and to control and manage the district under this chapter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.056
- number: '307.057'
  heading: Levying taxes - issuing bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Upon notification by the board of trustees of a joint emergency medical services
    district to the board of county commissioners of each county located in whole
    or in part within the district that taxes need to be levied pursuant to Chapter
    5705. of the Revised Code or that bonds or other evidences of indebtedness need
    to be issued pursuant to Chapter 133. of the Revised Code in order to provide
    the services and equipment necessary for the operation of the district, the boards
    of county commissioners of those counties may form themselves into a joint board
    for the purposes of levying taxes under Chapter 5705. of the Revised Code as the
    taxing authority of the district or issuing bonds or other evidences of indebtedness
    pursuant to Chapter 133. of the Revised Code as the bond issuing authority for
    the district, for those taxes or indebtedness the joint board finds to be necessary
    for those district purposes.
