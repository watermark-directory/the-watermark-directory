  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: 'A board of alcohol, drug addiction, and mental health services may:

    (A) Inspect any residential facility licensed under section 5119.34 of the Revised
    Code and located in its service district;

    (B) Acquire, convey, lease, or enter into a contract to purchase, lease, or sell
