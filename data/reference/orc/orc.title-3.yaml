    (B) A prosecuting attorney shall not engage in the private practice of law unless
    before taking office the prosecuting attorney notifies the board of county commissioners
    of the intention to engage in the private practice of law.

    A prosecuting attorney may elect to engage or not to engage in the private practice
    of law before the commencement of each new term of office, and a prosecuting attorney
    who engages in the private practice of law who intends not to engage in the private
    practice of law during the prosecuting attorney''s next term of office shall so
    notify the board of county commissioners. A prosecuting attorney who elects not
    to engage in the private practice of law may, for a period of six months after
    taking office, engage in the private practice of law for the purpose of concluding
    the affairs of private practice of law without any diminution of salary as provided
    for in division (A) of this section and in section 325.18 of the Revised Code.

    (C) As used in this section, "salary" does not include any portion of the cost,
    premium, or charge for health, medical, hospital, dental, or surgical benefits,
    or any combination of those benefits, covering the prosecuting attorney and paid
    on that person''s behalf by a governmental entity.'
