- number: '340.022'
  heading: Board size after withdrawing from a joint-county district
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: 'Notwithstanding the procedures established by section 340.02 of the Revised
    Code for determining the size of a board of alcohol, drug addiction, and mental
    health services, the size of a board shall be determined in accordance with this
    section in both of the following circumstances:

    (A)(1) If the director of behavioral health during the period beginning January
    1, 2021, and ending December 31, 2022, grants approval to a board of county commissioners
    of a county with a population of at least seventy thousand but not more than eighty
    thousand, according to data from the 2010 federal census, to withdraw from a joint-county
    alcohol, drug addiction, and mental health service district pursuant to section
    340.01 of the Revised Code, the size of the board shall be determined by the board
    of county commissioners representing the county that constitutes the single-county
    alcohol, drug addiction, and mental health service district created as a result
    of the withdrawal. The determination shall be made from among the options that
    may be selected under division (A)(2) of this section. Once an option is selected,
    the board of county commissioners shall adopt a resolution specifying the selection
    that has been made and shall notify the department of behavioral health. After
    the resolution is adopted and the department is notified, the determination of
    size is final.

    (2) In the case of a board of alcohol, drug addiction, and mental health services
    that is established on or after the date the director grants the approval to withdraw
    described in division (A)(1) of this section, either of the following options
    may be selected by the board of county commissioners when making the determination
    required under that division:

    (a) To establish the board as an eighteen-member board;

    (b) To establish the board as a fourteen-member board.

    (3) When a board is established on or after September 30, 2021, the initial appointments
    shall be staggered among the members as equally as possible with terms of two
    years, three years, and four years.

    (B)(1) If a county with a population of at least thirty-five thousand but not
    more than forty-five thousand, according to data from the 2010 federal census,
    joins an existing alcohol, drug addiction, and mental health service district
    during the period beginning on June 30, 2021, and ending June 30, 2023, the existing
    board of alcohol, drug addiction, and mental health services serving that district
    may elect to expand its membership to eighteen members if the existing board has
    fourteen members.

    (2) The option to expand the board, as provided in division (B)(1) of this section,
    is available only during the twelve-month period beginning on the date the county
    with a population of at least thirty-five thousand but not more than forty-five
    thousand joins the alcohol, drug addiction, and mental health service district
    served by the board. The additional members shall be appointed in the manner specified
    in section 340.02 of the Revised Code.'
