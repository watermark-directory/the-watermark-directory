- number: '353.09'
  heading: Lake facilities authority revenue bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: 'A lake facilities authority at any time may issue lake facilities authority
    revenue bonds in such principal amounts as, in the opinion of the lake facilities
    authority, are necessary for the purpose of paying the cost of one or more lake
    facilities authority facilities or parts thereof. A lake facilities authority
    at any time may issue renewal notes, issue bonds to retire its notes and, whenever
    it considers refunding expedient, refund any bonds by the issuance of lake facilities
    authority revenue refunding bonds, whether the bonds to be refunded have or have
    not matured, and issue lake facilities authority revenue bonds partly to refund
    outstanding bonds and partly for any other authorized purpose. The lake facilities
    authority revenue refunding bonds shall be sold and the proceeds applied to the
    purchase, redemption, or payment of the bonds to be refunded. Lake facilities
    authority revenue bonds shall be special obligations of the lake facilities authority
    payable out of the revenues of the lake facilities authority that are pledged
    for such payment. The pledge shall be valid and binding from the time the pledge
    is made and the revenues so pledged and thereafter received by the lake facilities
    authority immediately shall be subject to the lien of the pledge without any physical
    delivery thereof or further act, and the lien of the pledge is valid and binding
    as against all parties having claims of any kind in tort, contract, or otherwise
    against the lake facilities authority, irrespective of whether those parties have
    notice thereof. Neither the resolution nor any trust agreement by which a pledge
    is created need be filed or recorded except in the records of the lake facilities
    authority.

    Whether or not the lake facilities authority revenue bonds are of such form and
    character as to be negotiable instruments, the lake facilities authority revenue
    bonds shall have all the qualities and incidents of negotiable instruments, subject
    only to the provisions of the bonds for registration.

    The lake facilities authority revenue bonds shall be authorized by resolution
    of the lake facilities authority, and shall bear interest at such rate or rates,
    shall bear such date or dates, and shall mature at such time or times, and in
    such number of installments as may be provided in or pursuant to that resolution.
    The final maturity of any lake facilities authority revenue bond in the form of
    a note and any renewals thereof shall not exceed five years from the date of issue
    of the original note. The final maturity of any issue of lake facilities authority
    revenue bonds shall not be later than forty-five years from the date of issue
    of the original issue of bonds. Any such bonds or notes shall be executed in a
    manner as the resolution or resolutions may provide. The lake facilities authority
    revenue bonds shall be in such denominations, be in such form, either coupon or
    registered, carry such registration privileges, be payable in such medium of payment,
    at such place or places, and be subject to such terms of redemption as may be
    provided in or pursuant to the resolution authorizing their issuance. Lake facilities
    authority revenue bonds of the lake facilities authority may be sold by the lake
    facilities authority, at public or private sale, at or at not less than a price
    or prices as the lake facilities authority determines. In case any officer whose
    signature or a facsimile of whose signature appears on any bonds, notes, or coupons,
    ceases to be such officer before delivery of bonds or notes, the signature or
    facsimile shall nevertheless be sufficient for all purposes the same as if the
    officer had remained in office until such delivery, and in case the seal of the
    lake facilities authority has been changed after a facsimile has been imprinted
    on such bonds or notes, the facsimile seal will continue to be sufficient for
    all purposes.

    Any resolution or resolutions authorizing any lake facilities authority revenue
    bonds or any issue of bonds may contain provisions, subject to any agreements
    with bondholders as may then exist, which provisions shall be a part of the contract
    with the holders of bonds, as to the pledging of all or any part of the revenues
    of the lake facilities authority to secure the payment of the lake facilities
    authority bonds or of any issue of the bonds; the use and disposition of revenues
    of the lake facilities authority; a covenant to fix, alter, and collect rentals
    and other charges so that pledged revenues will be sufficient to pay costs of
    operation, maintenance, and repairs, pay principal of and interest on bonds secured
    by the pledge of such revenues, and provide any reserves that may be required
    by the applicable resolution or trust agreement; the setting aside of reserve
    funds, sinking funds, or replacement and improvement funds and the regulation
    and disposition thereof; the crediting of the proceeds of the sale of bonds to
    and among the funds referred to or provided for in or pursuant to the resolution
    authorizing the issuance of the bonds or notes; the use, lease, sale, or other
    disposition of any lake facilities authority facility or any other assets of the
    lake facilities authority; limitations on the purpose to which the proceeds of
    sale of bonds may be applied and the pledging of those proceeds to secure the
    payment of the bonds or of any issue of the bonds; as to notes issued in anticipation
    of the issuance of bonds, the agreement of the lake facilities authority to do
    all things necessary for the authorization, issuance, and sale of the bonds in
    amounts that may be necessary for the timely retirement of the notes; limitations
    on the issuance of additional bonds; the terms upon which additional bonds may
    be issued and secured; the refunding of outstanding bonds; the procedure, if any,
    by which the terms of any contract with bondholders may be amended or abrogated,
    the amount of bonds the holders of which must consent thereto, and the manner
    in which such consent may be given; limitations on the amount of moneys to be
    expended by the lake facilities authority for operating, administrative, or other
    expenses of the lake facilities authority; securing any bonds or notes by a trust
    agreement; and any other matters, of like or different character, that in any
    way affect the security or protection of the bonds or notes.

    Neither the board of directors of the lake facilities authority nor any person
    executing the bonds shall be liable personally on the bonds or be subject to any
    personal liability or accountability by reason of the issuance thereof.

    The issuance of lake facilities authority revenue bonds under this section need
    not comply with any other law applicable to the issuance of bonds or notes.'
