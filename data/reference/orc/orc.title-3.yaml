- number: '323.158'
  heading: Partial real property tax exemption
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) As used in this section, "qualifying county" means a county to which
    both of the following apply:

    (1) At least one major league professional athletic team plays its home schedule
    in the county for the season beginning in 1996;

    (2) The majority of the electors of the county, voting at an election held in
    1996, approved a referendum on a resolution of the board of county commissioners
    levying a sales and use tax under sections 5739.026 and 5741.023 of the Revised
    Code.

    (B) On or before December 31, 1996, the board of county commissioners of a qualifying
    county may adopt a resolution under this section. The resolution shall grant a
    partial real property tax exemption to each homestead in the county that also
    receives the tax reduction under division (B)(2) of section 323.152 of the Revised
    Code. The partial exemption shall take the form of the reduction by a specified
    percentage each year of the real property taxes on the homestead. The resolution
    shall specify the percentage, which may be any amount. The board may include in
    the resolution a condition that the partial exemption will apply only upon the
    receipt by the county of additional revenue from a source specified in the resolution.
    The resolution shall specify the tax year in which the partial exemption first
    applies, which may be the tax year in which the resolution takes effect as long
    as the resolution takes effect before the county auditor certifies the tax duplicate
    of real and public utility property for that tax year to the county treasurer.
    Upon adopting the resolution, the board shall certify copies of it to the county
    auditor and the tax commissioner.

    (C) After complying with sections 319.301, 319.302, 319.303, 319.304, and 323.152
    of the Revised Code, the county auditor shall reduce the remaining sum to be levied
    against a homestead by the percentage called for in the resolution adopted under
    division (B) of this section. The auditor shall certify the amount of taxes remaining
    after the reduction to the county treasurer for collection as the real property
    taxes charged and payable on the homestead.

    (D) For each tax year, the county auditor shall certify to the board of county
    commissioners the total amount by which real property taxes were reduced under
    this section. At the time of each semi-annual settlement of real property taxes
    between the county auditor and county treasurer, the board of county commissioners
    shall pay to the auditor one-half of that total amount. Upon receipt of the payment,
    the county auditor shall distribute it among the various taxing districts in the
    county as if it had been levied, collected, and settled as real property taxes.
    The board of county commissioners shall make the payment from the county general
    fund or from any other county revenue that may be used for that purpose. In making
    the payment, the board may use revenue from taxes levied by the county to provide
    additional general revenue under sections 5739.021 and 5741.021 of the Revised
    Code or to provide additional revenue for the county general fund under sections
    5739.026 and 5741.023 of the Revised Code.

    (E) The partial exemption under this section shall not directly or indirectly
    affect the determination of the principal amount of notes that may be issued in
    anticipation of a tax levy or the amount of securities that may be issued for
    any permanent improvements authorized in conjunction with a tax levy.

    (F) At any time, the board of county commissioners may adopt a resolution amending
    or repealing the partial exemption granted under this section. Upon adopting a
    resolution amending or repealing the partial exemption, the board shall certify
    copies of it to the county auditor and the tax commissioner. The resolution shall
    specify the tax year in which the amendment or repeal first applies, which may
    be the tax year in which the resolution takes effect as long as the resolution
    takes effect before the county auditor certifies the tax duplicate of real and
    public utility property for that tax year to the county treasurer.

    (G) If a person files a late application for a tax reduction under division (B)(2)
    of section 323.152 of the Revised Code for the preceding year, and is granted
    the reduction, the person also shall receive the reduction under this section
    for the preceding year. The county auditor shall credit the amount of the reduction
    against the person''s current year taxes, and shall include the amount of the
    reduction in the amount certified to the board of county commissioners under division
    (D) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.158
- number: '323.159'
  heading: Applying homestead exemption to nonprofit corporation that owns and operates
    housing cooperatives
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) As used in this section:

    (1) "Applicant" means the person who occupies a homestead in a housing cooperative.

    (2) "Homestead" has the same meaning as in division (A)(1)(b) of section 323.151
    of the Revised Code.

    (B) Not later than the first day of May each year, any nonprofit corporation that
    owns and operates a housing cooperative shall determine the amount of property
    taxes it paid for the housing cooperative for the preceding tax year and shall
    attribute to each homestead in the housing cooperative a portion of the total
    property taxes as if the homestead''s occupant paid the taxes. The taxes attributed
    to each homestead shall be based on the percentage that the square footage of
    the homestead is of the total square footage of the housing cooperative and on
    other reasonable factors that reflect the value of the homestead. Not later than
    the fifteenth day of May each year, the corporation shall file this information
    with the county auditor, along with any applications submitted to it under division
    (A) of section 323.153 of the Revised Code. No nonprofit corporation that owns
    and operates a housing cooperative shall fail to file with the county auditor
    the information required by this division and division (A) of section 323.153
    of the Revised Code.

    (C) The county auditor shall approve or deny an application for reduction under
    division (A) of section 323.152 of the Revised Code and, not later than the first
    Monday in October, shall so notify the applicant and the nonprofit corporation
    that owns and operates the housing cooperative. Notification shall be provided
    on a form prescribed by the tax commissioner. If the application is approved,
    upon issuance of the notification the county auditor shall record the amount of
    reduction in taxes in the appropriate column on the general tax list and duplicate
    of real and public utility property.

    (D) On receipt of the notice from the county auditor under division (C) of this
    section, the nonprofit corporation that owns and operates the housing cooperative
    shall reduce the monthly maintenance fee for each homestead for which an application
    for reduction was approved for the year following the year for which the application
    was approved. The reduction in the monthly maintenance fee shall equal one-twelfth
    of the reduction in taxes attributed to the homestead by the county auditor under
    division (C) of this section.

    (E) If an application, late application, or continuing application is not approved,
    or if the county auditor otherwise determines that a homestead does not qualify
    for a reduction in taxes under division (A) of section 323.152 of the Revised
    Code, the auditor shall notify the applicant, and the nonprofit corporation that
    owns and operates the housing cooperative, of the reasons for denial not later
    than the first Monday in October. If the applicant believes that the application
    for reduction has been improperly denied, or the nonprofit corporation that owns
    and operates the housing cooperative believes that the reduction is for less than
    that to which the housing cooperative is entitled, the applicant or housing cooperative,
    respectively, may file an appeal with the county board of revision not later than
    the date of closing of the collection for the first half of real and public utility
    property taxes. The appeal shall be treated in the same manner as a complaint
    relating to the valuation or assessment of real property under Chapter 5715. of
    the Revised Code.'
