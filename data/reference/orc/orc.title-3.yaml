- number: '353.11'
  heading: Security for bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: 'In the discretion of the lake facilities authority, any lake facilities authority
    revenue bonds issued under this chapter may be secured by a trust agreement between
    the lake facilities authority and a corporate trustee that may be any trust company
    or bank having the powers of a trust company within or without the state.

    The trust agreement may pledge or assign revenues of the lake facilities authority
    to be received and may convey or mortgage any facility or any part thereof. The
    trust agreement or any resolution providing for the issuance of such bonds may
    contain any provisions for protecting and enforcing the rights and remedies of
    the bondholders as are reasonable and proper and not in violation of law, including
    covenants setting forth the duties of the lake facilities authority in relation
    to the acquisition of property, the construction, improvement, maintenance, repair,
    operation, and insurance of the facility in connection with which the bonds are
    authorized, the rentals or other charges to be imposed for the use or services
    of any facility, the custody, safeguarding, and application of all moneys, and
    provisions for the employment of consulting engineers in connection with the construction
    or operation of the facility.

    Any bank or trust company incorporated under the laws of this state that may act
    as depository of the proceeds of bonds or of revenues may furnish any indemnifying
    bonds or may pledge any securities that are required by the lake facilities authority.
    The trust agreement may set forth the rights and remedies of the bondholders and
    of the trustee, and may restrict the individual right of action by bondholders
    as is customary in trust agreements or trust indentures securing similar bonds.
    The trust agreement may contain any other provisions that the lake facilities
    authority determines reasonable and proper for the security of the bondholders.
    All expenses incurred in carrying out the provisions of the trust agreement may
    be treated as a part of the cost of the operation of the facility.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-353.11
- number: '353.12'
  heading: Enforcement of rights
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: Any holder of lake facilities authority revenue bonds issued under sections
    353.09 to 353.15 of the Revised Code, or any of the coupons pertaining to those
    bonds, and the trustee under any trust agreement, except to the extent the rights
    given by those sections may be restricted by the applicable resolution or that
    trust agreement, may by suit, action, mandamus, or other proceedings, protect
    and enforce any rights under the laws of the state or granted under those sections,
    the trust agreement, or the resolution authorizing the issuance of the bonds,
    and may enforce and compel the performance of all duties required by those sections,
    or by the trust agreement or resolution, to be performed by the lake facilities
    authority or any officer of the lake facilities authority, including the fixing,
    charging, and collecting of rentals or other charges.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-353.12
- number: '353.13'
  heading: Nature of revenue bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: Lake facilities authority revenue bonds issued under sections 353.09 to 353.15
    of the Revised Code do not constitute a debt, or a pledge of the faith and credit,
    of the state or any political subdivision of the state. The holders or owners
    of the bonds have no right to have taxes levied by the general assembly or taxing
    authority of any political subdivision of the state for the payment of the principal
    of or interest on the bonds. The bonds are payable solely from the revenues and
    funds pledged for their payment as authorized by this chapter, unless the revenue
    bonds are notes issued in anticipation of the issuance of the bonds, or the revenue
    bonds are refunded by refunding bonds issued under section 353.09 of the Revised
    Code, provided that the refunding bonds shall be payable solely from revenues
    and funds pledged for their payment as authorized by that section. All bonds shall
    contain on the face thereof a statement to the effect that the bonds, as to both
    principal and interest, are not debts of the state or any political subdivision
    of the state, but are payable solely from revenues and funds pledged for their
    payment.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-353.13
- number: '353.14'
  heading: Authority moneys, funds, property and assets
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: All moneys, funds, properties, and assets acquired by the lake facilities
    authority under this chapter, whether as proceeds from the sale of lake facilities
    authority revenue bonds or as revenues, or otherwise, shall be held by it in trust
    for the purposes of carrying out its powers and duties, shall be used and reused
    as provided in this chapter, and shall at no time be part of other public funds.
    Such funds, except as otherwise provided in any resolution authorizing its lake
    facilities authority revenue bonds or in any trust agreement securing those bonds,
    or except when invested pursuant to section 353.15 of the Revised Code, shall
    be kept in depositories selected by the lake facilities authority in the manner
    provided in Chapter 135. of the Revised Code for the selection of eligible public
    depositories, and the deposits shall be secured as provided in that chapter. The
    resolution authorizing the issuance of such bonds or the trust agreement securing
    the bonds shall provide that any officer to whom, or any bank or trust company
    to which, such money is paid shall act as trustee of the money and hold and apply
    the money for the purposes for which the bonds are issued, subject to such conditions
    as Chapter 135. of the Revised Code and such resolutions or trust agreement provide.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-353.14
- number: '353.15'
  heading: Investments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: Except as otherwise provided in any resolution authorizing the issuance of
    its lake facilities authority revenue bonds or in any trust agreement securing
    the bonds, moneys in the funds of the lake facilities authority in excess of current
    needs may be invested as permitted by sections 135.01 to 135.21 of the Revised
    Code or invested in linked deposit programs established by resolution of the board
    of directors in accordance with section 135.80 of the Revised Code. Income from
    all investments of moneys in any fund shall be credited to funds as the lake facilities
    authority determines, subject to the provisions of any such resolution or trust
    agreement, and the investments may be sold at any time the lake facilities authority
    determines.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-353.15
- number: '353.16'
  heading: Bonds as lawful investments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: Bonds of a lake facilities authority and lake facilities authority revenue
    bonds are lawful investments of banks, societies for savings, trust companies,
    savings and loan associations, deposit guaranty associations, trustees, fiduciaries,
    trustees or other officers having charge of the bond retirement funds or sinking
    funds of port authorities and political subdivisions, and taxing districts of
    this state, the commissioners of the sinking fund of this state, the administrator
    of workers' compensation, the state teachers retirement system, the school employees
    retirement system, the public employees retirement system, the Ohio police and
    fire pension fund, and insurance companies, including domestic life insurance
    companies and domestic insurance companies other than life, and are acceptable
    as security for the deposit of public moneys.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-353.16
- number: '355.01'
  heading: Definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '355'
    name: County Healthier Buckeye Councils
  text: 'As used in this chapter:

    "Care coordination" means assisting an individual to access available physical
    health, behavioral health, social, employment, education, and housing services
    the individual needs.

    "Political subdivision" has the same meaning as in section 2744.01 of the Revised
    Code.

    "Publicly funded assistance programs" include physical health, behavioral health,
    social, employment, education, and housing programs funded or provided by the
    state or a political subdivision of the state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-355.01
- number: '355.02'
  heading: Local healthier buckeye council
  title:
    num: '3'
    name: Counties
  chapter:
    num: '355'
    name: County Healthier Buckeye Councils
  text: '(A) Each board of county commissioners may adopt a resolution to establish
    a local healthier buckeye council. If a local council is established, the resolution
    shall specify the organization of the council and shall designate a member to
    serve as a staffing agent and, if the board determines necessary, a member to
    serve as a fiscal agent. The board may revise the council''s organization as necessary
    by adopting a resolution.

    (B)(1) The board may invite any person or entity to become a member of the council,
    including any of the following:

    (a) Individuals with community leadership experience;

    (b) Individuals with experience leading others;

    (c) Individuals likely to receive healthier buckeye services and participate in
    healthier buckeye programs;

    (d) Representatives from public and private entities, including any of the following:

    (i) Employers;

    (ii) Municipal corporations, counties, and townships;

    (iii) Courts, including those with specialized court programs certified by the
    Ohio supreme court;

    (iv) Law enforcement;

    (v) Faith-based social services organizations;

    (vi) Foundations;

    (vii) Public health, including free clinics;

    (viii) Child support enforcement agencies;

    (ix) Children services agencies;

    (x) Child care providers;

    (xi) Preschool programs;

    (xii) Primary and secondary schools;

    (xiii) Colleges and universities;

    (xiv) Mental health and addiction services providers;

    (xv) Medicaid care coordinators or service providers;

    (xvi) Emergency or urgent care services providers;

    (xvii) Transportation providers;

    (xviii) Housing providers;

    (xix) The boy scouts of America, 4-H clubs, boys and girls clubs of America, and
    other similar organizations.

    (2) The board may form a multi-county council in accordance with division (C)
    of this section.

    (C)(1) The boards of county commissioners of any two or more counties, by entering
    into a written agreement, may form a joint local healthier buckeye council. The
    agreement shall be ratified by resolution of the board of county commissioners
    of each county that entered into the agreement.

    (2) An agreement to establish a joint local healthier buckeye council may set
    forth procedures or standards necessary for the joint local healthier buckeye
    council to perform its duties and operate efficiently.

    (3) Costs incurred in operating a joint local healthier buckeye council shall
    be paid from a joint general fund created by the council, except as may be otherwise
    provided in the agreement.

    (4) If a joint local healthier buckeye council is established, all references
    in the Revised Code to a local healthier buckeye council shall apply to the joint
    local council.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-355.02
- number: '355.03'
  heading: Powers
  title:
    num: '3'
    name: Counties
  chapter:
    num: '355'
    name: County Healthier Buckeye Councils
  text: '(A) A local healthier buckeye council shall promote all of the following:

    (1) A cooperative and effective environment in all communities to maximize opportunities
    for individuals and families to achieve and maintain optimal health in all aspects,
    thereby achieving greater productivity and reducing reliance on publicly funded
    assistance programs;

    (2) Means by which council members or the entities the members represent may reduce
    the reliance of individuals and families on publicly funded assistance programs
    using both of the following:

    (a) Programs that have been demonstrated to be effective and have one or more
    of the following features:

    (i) Low costs;

    (ii) Use volunteer workers;

    (iii) Use incentives to encourage designated behaviors;

    (iv) Are led by peers.

    (b) Practices that identify and seek to eliminate barriers to achieving greater
    financial independence for individuals and families who receive services from
    or participate in programs operated by council members or the entities the members
    represent.

    (3) Care coordination among physical health, behavioral health, social, employment,
    education, and housing service providers within the county.

    (B) A local healthier buckeye council shall develop a healthier buckeye plan that
    promotes the objectives set forth in division (A) of this section and submit the
    council''s healthier buckeye plan to the board of county commissioners that created
    the council.

    (C) A local healthier buckeye council shall convene at least once per year.

    (D) A local healthier buckeye council shall organize itself in accordance with
    section 355.02 of the Revised Code and any other applicable provisions of law.

    (E) A local healthier buckeye council shall collect and analyze data regarding
    individuals or families who receive services from or participate in programs operated
    by council members or the entities the members represent.

    (F) Beginning one year after September 29, 2015, each local healthier buckeye
    council shall submit an annual report of the council''s performance to the Ohio
    healthier buckeye council.

    (G) A local healthier buckeye council may apply for, receive, and oversee the
    administration of grants.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-355.03
- number: '355.04'
  heading: Report to LSC
  title:
    num: '3'
    name: Counties
  chapter:
    num: '355'
    name: County Healthier Buckeye Councils
  text: 'A local healthier buckeye council shall report the following information
    to the legislative service commission:

    (A) Notification that the local council has been established and information regarding
    the council''s organization, plan, and activities;

    (B) Information regarding enrollment or outcome data collected under division
    (E) of section 355.03 of the Revised Code;

    (C) Recommendations regarding the best practices for the administration and delivery
    of publicly funded assistance programs or other services or programs provided
    by council members or the entities the members represent;

    (D) Recommendations regarding the best practices in care coordination.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-355.04
