- number: '345.14'
  heading: Powers of board of trustees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '345'
    name: Memorial Buildings
  text: 'The board of trustees, established by section 345.08 of the Revised Code,
    in addition to its usual powers shall:

    (A) Conduct, maintain, and operate a soldiers'' memorial, for the benefit of the
    entire county, for community, civic, and patriotic purposes;

    (B) Provide, with or without cost, suitable and convenient county headquarters
    for all nationally organized veterans'' organizations, chartered by congress;

    (C) Use, rent, and lease office space in such memorial buildings to agencies of
    the United States and of this state or any of their political subdivisions engaged
    in any activity for the benefit of the men and women of the armed forces of the
    United States and the honorably discharged veterans thereof, and all earnings
    or receipts shall be used for the maintenance thereof;

    (D) Co-ordinate and assemble within a county, as nearly as possible, in a one-stop
    information or service center in such memorial, all governmental agencies operated
    for the benefit of the honorably discharged veterans of the armed forces of the
    United States.

    (E) Deposit in a bank or trust company, subject to the provisions of sections
    135.01 to 135.21, inclusive, of the Revised Code, all moneys, gifts and rentals
    excepting funds arising from the proceeds of the sale of bonds coming into the
    possession of said board of trustees by virtue of its operation. Thereupon, such
    funds may be disbursed by the board of trustees for the uses and purposes of such
    memorials and shall be accounted for as provided by law.'
