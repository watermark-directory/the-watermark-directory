- number: '307.45'
  heading: Using property tax levied for criminal justice services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) A board of county commissioners shall use money raised by a property
    tax levied for criminal justice services under division (LL) of section 5705.19
    of the Revised Code to provide financial support for any of the following:

    (1) The county sheriff or the police department of a municipal corporation or
    township in the county;

    (2) The court of common pleas, any municipal court having jurisdiction throughout
    the county, or any county court;

    (3) The county prosecuting attorney, any municipal attorney in the county, and
    any public defender agency or appointed counsel;

    (4) Any county or municipal jail or other detention facility as defined in section
    2921.01 of the Revised Code;

    (5) The clerk of the court of common pleas, any clerk of a municipal court having
    jurisdiction throughout the county, or the clerk of any county court of all powers
    and duties vested in the clerk by law except, in the case of the clerk of the
    court of common pleas, the titling of motor vehicles or watercraft pursuant to
    Chapter 1548. or 4505. of the Revised Code;

    (6) The county coroner;

    (7) Any other public agency or private, nonprofit agency, the purposes of which
    in the county include the diversion, adjudication, detention, or rehabilitation
    of criminals or juvenile offenders.

    (B) Before a private, nonprofit agency receives financial support from the board
    of county commissioners under this section, it shall enter into an agreement with
    the county providing for all of the following:

    (1) That the agency shall keep current and accurate accounts of its uses of the
    money, shall conduct a financial audit of those uses at least annually, and shall
    provide a copy of each audit report to the board of county commissioners;

    (2) That the agency is liable to repay to the county any money that is improperly
    used;

    (3) Any other terms and conditions specified by the board of county commissioners.

    (C) If the board of county commissioners discovers that a private, nonprofit agency
    has improperly used financial support provided under this section, it shall adopt
    and certify to the agency a resolution demanding that the agency repay the improperly
    used money. If the agency does not repay the money within a reasonable period
    of time, the board shall adopt a resolution directing the prosecuting attorney
    to bring a civil action to recover the money.'
