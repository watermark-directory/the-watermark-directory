- number: '306.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) No person shall violate any rule or regulation adopted pursuant to division
    (N) of section 306.04 of the Revised Code and whoever violates such a rule or
    regulation shall be fined not more than one thousand dollars or imprisoned not
    more than ninety days or both.

    (B) Whoever violates division (D)(4) of section 306.35 of the Revised Code shall
    be fined not more than one hundred dollars on a first offense and not more than
    five hundred dollars on each subsequent offense.

    Fines levied and collected for such violations shall be paid into the treasury
    of the regional transit authority. The regional transit authority may use such
    fine money for any purpose that is not inconsistent with sections 306.30 to 306.54
    of the Revised Code.'
