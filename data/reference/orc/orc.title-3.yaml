- number: '307.85'
  heading: Cooperation with other agencies in operating federal programs
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The board of county commissioners of any county may participate in, give
    financial assistance to, and cooperate with other agencies or organizations, either
    private or governmental, in establishing and operating any federal program enacted
    by the congress of the United States, or with any such agency or organization
    that is receiving federal funds pursuant to a federal program, and for such purpose
    may adopt any procedures and take any action not prohibited by the constitution
    of Ohio nor in conflict with the laws of this state.

    (B) The board may participate in, give financial assistance to, and cooperate
    with public and nonprofit private agencies and organizations in establishing and
    operating programs to provide necessary social services to meet the needs of older
    persons or to provide emergency food to needy persons, in addition to those agencies
    and organizations receiving federal funds for this purpose. For the purpose of
    this division, payments to the county under the "State and Local Fiscal Assistance
    Act of 1972," 86 Stat. 919, 31 U.S.C.A. 1221, as amended, shall be considered
    to be county general funds. If the board finds that any agency or organization
    receiving funds pursuant to this division uses them for any purpose not clearly
    a public purpose authorized by this division and by the board or fails to comply
    with accounting and reporting requirements under Chapter 117. of the Revised Code,
    the board shall withhold further payments of such funds to such agency or organization.'
