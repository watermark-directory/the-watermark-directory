- number: '317.321'
  heading: Acquisition or maintenance of imaging and other technological equipment
    and contract services therefor; proposal to reserve funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) Not later than the first day of October of any year, the county recorder
    may submit to the board of county commissioners a proposal for funding any of
    the following:

    (1) The acquisition and maintenance of imaging and other technological equipment
    and contract services therefor;

    (2) To reserve funds for the office''s future technology needs if the county recorder
    has no immediate plans for the acquisition of imaging and other technological
    equipment or contract services, or to use the county recorder''s technology fund
    as a dedicated revenue source to repay debt to purchase any imaging and other
    technological equipment before the accumulation of adequate resources to purchase
    the equipment with cash.

    (3) Subject to division (G) of this section, for other expenses associated with
    the acquisition and maintenance of imaging and other technological equipment and
    contract services.

    (B) The proposal shall be in writing and shall include at least the following:

    (1) A request that an amount not to exceed eight dollars of the total base fees
    collected for filing or recording a document for which a fee is charged as required
    by division (A)(1) of section 317.32 or by section 1309.525 or 5310.15 of the
    Revised Code be placed in the county treasury to the credit of the county recorder''s
    technology fund;

    (2) Except as provided in division (E)(3) of this section, the number of years,
    not to exceed five, for which the county recorder requests that the amount requested
    under division (A)(1) of this section be given the designation specified in that
    division;

    (3) An estimate of the total amount of fees that will be generated for filing
    or recording a document for which a fee is charged as required by division (A)(1)
    or (2) of section 317.32 of the Revised Code or by section 1309.525 or 5310.15
    of the Revised Code;

    (4) An estimate of the total amount of fees for filing or recording a document
    for which a fee is charged as required by division (A)(1) or (2) of section 317.32
    or by section 1309.525 or 5310.15 of the Revised Code that will be credited to
    the county recorder''s technology fund if the request submitted under division
    (B)(1) of this section is approved by the board of county commissioners.

    (C) A proposal for the purposes of division (A)(1) of this section shall include
    a description or summary of the imaging and other technological equipment that
    the county recorder proposes to acquire and maintain, and the nature of contract
    services that the county recorder proposes to utilize, if the proposal is for
    those purposes. A proposal for the purposes of division (A)(2) of this section
    shall explain the general future technology needs of the office for imaging and
    other technological equipment, or for revenue to repay debt, if the proposal is
    for those purposes. A proposal for the purposes of division (A)(3) of this section
    shall identify the other expenses associated with the acquisition and maintenance
    of imaging and other technological equipment and contract services that the county
    recorder proposes to pay with moneys in the county recorder''s technology fund,
    if the proposal is for those purposes.

    (D) The board of county commissioners shall receive a proposal and the clerk shall
    enter it on the journal. At the same time, the board shall establish a date, not
    sooner than fifteen or later than thirty days after the board receives the proposal,
    on which to meet with the recorder to review the proposal.

    (E)(1) Except as provided in division (E)(3) of this section, not later than the
    fifteenth day of December of any year in which a proposal is submitted under division
    (A) of this section, the board of county commissioners shall approve, reject,
    or modify the proposal and notify the county recorder of its action on the proposal.
    If the board rejects or modifies the proposal, it shall make a written finding
    that the request is for a purpose other than for a purpose in division (A) of
    this section, or that the amount requested is excessive as determined by the board.

    (2) A proposal submitted under division (A) of this section that was approved
    by the board of county commissioners before, and is in effect on the effective
    date of this amendment, shall continue in effect until January 1, 2030, notwithstanding
    the number of years of funding specified in the approved proposal.

    (3) A proposal submitted under division (A) of this section between October 1,
    2019, and October 1, 2028, may request that an amount that does not exceed three
    dollars be credited to the county recorder''s technology fund, in addition to
    the amount previously approved by the board of county commissioners in a proposal
    described in division (E)(2) of this section. The proposal may be submitted each
    year during that time period, but shall be limited to funding in the following
    fiscal year. If the total of the amount under division (E)(2) of this section
    and the amount requested under this division does not exceed eight dollars, the
    board shall approve the proposal and notify the county recorder of its approval.

    (4) If the total amount of fees provided for in divisions (B), (E)(2), and (E)(3)
    of this section is less than eight dollars, a proposal requesting additional fees
    may be submitted to the board of county commissioners under division (E)(1) of
    this section, as long as the total amount of the fees in divisions (B) and (E)(2),
    (3), and (4) of this section that are to be credited to the county recorder''s
    technology fund does not exceed eight dollars, and the proposal is for a number
    of years, not to exceed five.

    (5) When a proposal is approved by the board of county commissioners under division
    (E) of this section, the county recorder''s technology fund is established in
    the county treasury, and, beginning on the following first day of January, the
    fees approved shall be deposited in that fund.

    (F) The acquisition and maintenance of imaging and other technological equipment,
    and other associated expenses and contract services therefor, shall be specifically
    governed by sections 307.80 to 307.806, 307.84 to 307.846, 307.86 to 307.92, and
    5705.38, and by division (D) of section 5705.41 of the Revised Code.

    (G) If the use of the county recorder''s technology fund for the purposes of division
    (A)(3) of this section includes associated expenses for personnel, the use of
    the fund for personnel shall be strictly confined to personnel directly related
    to imaging and other technological equipment, and any compensation increases for
    those personnel shall not exceed the average of the annual aggregate percentage
    increase or decrease in the compensation fixed by the board of county commissioners
    for their employees, and for the officers in section 325.27 of the Revised Code.
    Use of the fund for compensation bonuses, or for recognizing outstanding employee
    performance in a manner described in section 325.25 of the Revised Code, is prohibited.

    (H) If a county is under a fiscal caution under section 118.025 of the Revised
    Code, or is under a fiscal watch or fiscal emergency as defined in section 118.01
    of the Revised Code, the board of county commissioners, notwithstanding sections
    5705.14 to 5705.16 of the Revised Code, may transfer from the county recorder''s
    technology fund any moneys the board deems necessary.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.321
- number: '317.322'
  heading: Recording fee not charged for military power of attorney
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: Notwithstanding any contrary provision of section 317.32 or Chapter 1337.
    of the Revised Code, the county recorder shall not charge a fee to any member
    of the armed forces of the United States who presents for recording a military
    power of attorney executed pursuant to section 574(a) of the "National Defense
    Authorization Act for Fiscal Year 1994," 107 Stat. 1674 (1993), 10 U.S.C. 1044b.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.322
- number: '317.33'
  heading: Suit on bond of county recorder
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) Except as otherwise provided in division (B) of this section, if a county
    recorder refuses to accept a deed or other instrument of writing presented to
    the recorder for recording, the legal fee for recording it being paid or tendered;
    or refuses to give a receipt therefor, when required; or fails to number consecutively
    all deeds or other instruments of writing upon receipt; or fails to index a deed
    or other instrument of writing, by the morning of the day next after it is filed
    for record; or neglects, without reasonable cause, to record a deed or other instrument
    of writing within twenty days after it is received for record; or demands and
    receives a greater fee for the recorder''s services than that allowed by law;
    or knowingly endorses on a deed or other instrument of writing a different date
    from that on which it was presented for record, or a different date from that
    on which it was recorded; or refuses to make out and certify a copy of any record
    in the recorder''s office, when demanded, the recorder''s legal fee for the copy
    being paid or tendered; or purposely destroys, defaces, or injures any book, record,
    or seal belonging to the recorder''s office, or any deed or other instrument of
    writing deposited in the recorder''s office for record, or negligently suffers
    it to be destroyed, defaced, or injured; or does or omits any other act, contrary
    to sections 317.01 to 317.33 of the Revised Code, the recorder shall be liable
    solely on the recorder''s bond to any party harmed by the improper conduct.

    (B) If a county recorder, acting under division (B) of section 317.13 of the Revised
    Code, improperly refuses to record an instrument of writing in a manner that is
    not described in division (A)(6)(b) of section 2744.03 of the Revised Code, the
    recorder shall not be personally liable on account of the improper refusal and
    the surety that issued the recorder''s bond shall not have a right of subrogation
    against the recorder on account of a claim made on the recorder''s bond as a result
    of the improper refusal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.33
- number: '317.34'
  heading: Recording without approval
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: No county recorder shall record a map or plan of a subdivision of a lot or
    ground without the approval or certification of such map or plan by the planning
    commission, platting commissioner, legislative authority, engineer, or other board
    or officer.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.34
- number: '317.35'
  heading: Record of plans and drawings of public buildings
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) The county recorder shall record the plans and drawings filed under section
    9.56 of the Revised Code and shall make them available for public inspection.

    (B) For services provided, the county recorder shall charge for photocopying ten
    dollars for the first two pages and two dollars for each page thereafter.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.35
- number: '317.36'
  heading: Collection and amount of low- and moderate-income housing trust fund fee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) The county recorder shall collect the low- and moderate-income housing
    trust fund fee as specified in sections 317.114, 317.32, 1563.42, 1702.59, 2505.13,
    4141.23, 4509.60, 5164.56, 5310.15, 5703.93, 5719.07, 5727.56, 5733.22, 6101.09,
    and 6115.09 of the Revised Code. The amount of any housing trust fund fee the
    recorder is authorized to collect is equal to the amount of any base fee the recorder
    is authorized to collect for services. The housing trust fund fee shall be collected
    in addition to the base fee.

    (B) The recorder shall certify the amounts collected as housing trust fund fees
    pursuant to division (A) of this section into the county treasury as housing trust
    fund fees to be paid to the treasurer of state pursuant to section 319.63 of the
    Revised Code.

    (C) The document preservation surcharge collected under section 317.32 of the
    Revised Code is not a base fee under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.36
- number: '317.37'
  heading: Separate instrument under RC 5301.28 et seq. defined
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: As used in sections 5301.28 to 5301.35 of the Revised Code, "separate instrument"
    means either the recording of an entirely new instrument or a written and signed
    entry on the margin of the original instrument bearing the proper endorsement
    that is recorded distinct and apart from the original instrument of record. For
    instruments that convey or affect an interest in crude oil or natural gas, such
    as a lease, assignment, easement, lien, or right-of-way, in a county in which
    the county recorder requires an assignment, release, partial release, satisfaction,
    cancellation, or waiver of priority to be made by separate instrument, the county
    recorder does not have the power to limit the number of assignments, releases,
    partial releases, satisfactions, cancellations, or waivers of priority that may
    be executed and recorded by means of a single instrument.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.37
- number: '317.41'
  heading: Distribution of forms for durable power of attorney for health care and
    declaration governing use or continuation, or withholding or withdrawal, of life-sustaining
    treatment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: A county recorder, upon request, may distribute to any person free of charge
    a copy of the printed form of the declaration described in section 2133.07 of
    the Revised Code and a copy of the printed form of the durable power of attorney
    for health care described in section 1337.17 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.41
- number: '317.42'
  heading: Posting warning of public record character of recorded documents
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: '(A) The county recorder shall display at all times, in a conspicuous place
    in the office of the recorder, a printed card that shall read substantially as
    follows:

    "WARNING

    Documents recorded in the recorder''s office generally are considered to be public
    records. Other persons have access to the information contained in recorded documents."

    (B) If the county recorder fails to post a card in accordance with division (A)
    of this section, the county recorder is not liable in a civil action for injury,
    death, or loss to person or property that allegedly results from that failure.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.42
- number: '317.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: Whoever violates section 317.34 of the Revised Code shall be fined not less
    than one hundred nor more than five hundred dollars.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.99
- number: '319.01'
  heading: County auditor - term of office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: A county auditor shall be chosen quadrennially in each county, who shall hold
    his office for four years, commencing on the second Monday in March next after
    his election.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.01
- number: '319.02'
  heading: Bond of county auditor - oath of office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: 'Except as otherwise provided in section 3.061 of the Revised Code, before
    entering upon the discharge of the duties of office, the county auditor shall
    give a bond signed by a bonding or surety company authorized to do business in
    this state and to be approved by the board of county commissioners, or, at the
    auditor''s option, by two or more freeholders having real estate in the value
    of double the amount of the bond over and above all encumbrances to the state,
    in a sum of not less than five thousand nor more than twenty thousand dollars,
    as the board requires, conditioned for the faithful discharge of the duties of
    office. The expense or premium for such bond shall be paid by the board and charged
    to the general fund of the county. Such bond, with the oath of office required
    by sections 3.22 and 3.23 of the General Code, and Section 7 of Article XV, Ohio
    Constitution, and the approval of the board indorsed upon it shall be deposited
    by such board with the county treasurer, who shall record and carefully preserve
    it.

    If an auditor-elect fails to give bond and take the oath of office, as required
    by this section, on or before the day on which the auditor is required to take
    office, such office shall become vacant.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.02
- number: '319.03'
  heading: Location of office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The office of the county auditor shall be at the county seat, in such rooms
    as the board of county commissioners provides.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.03
- number: '319.04'
  heading: Continuing education courses
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) Each county auditor who is elected to a full term of office shall attend
    and successfully complete at least sixteen hours of continuing education courses
    during the first year of the auditor''s term of office, and complete at least
    another eight hours of such courses by the end of that term. Each such county
    auditor shall include at least two hours of ethics and substance-abuse training
    in the total twenty-four hours of required courses. To be counted toward the twenty-four
    hours required by this section, a course must be approved by the county auditors
    association of Ohio. Any county auditor who teaches an approved course shall be
    entitled to credit for the course in the same manner as if the county auditor
    had attended the course.

    That association shall record and, upon request, verify the completion of required
    course work for each county auditor, and issue a statement to each county auditor
    of the number of hours of continuing education the county auditor has successfully
    completed. Each year the association shall send a list of the continuing education
    courses, and the number of hours each county auditor has successfully completed,
    to the auditor of state and the tax commissioner, and shall provide a copy of
    this list to any other individual who requests it.

    The association shall issue a notice of "failure to complete" to any county auditor
    required to complete continuing education courses under this section who fails
    to successfully complete at least sixteen hours of continuing education courses
    during the first year of the county auditor''s term of office or to complete a
    total of at least twenty-four hours of such courses by the end of that term. This
    notice is for informational purposes only and does not affect any individual''s
    ability to hold the office of county auditor.

    The county auditor shall retain the documentation of any initial or continuing
    education courses completed. The auditor of state shall audit for compliance with
    this section.

    (B) Each board of county commissioners shall approve, from money appropriated
    to the county auditor, a reasonable amount requested by the county auditor of
    its county to cover the costs the county auditor must incur to meet the requirements
    of division (A) of this section, including registration fees, lodging and meal
    expenses, and travel expenses.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.04
- number: '319.05'
  heading: Deputies
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor may appoint one or more deputies to aid the auditor in
    the performance of official duties. The auditor and the auditor's sureties shall
    be liable for the acts and conduct of such deputies.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.05
- number: '319.06'
  heading: Oaths
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor and his deputies may administer any oath necessary in the
    discharge of the duties of their respective offices, or proper in the authentication
    of any return, voucher, or document to be filed in the auditor's office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.06
- number: '319.07'
  heading: Certain officials ineligible to office of auditor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: No judge or clerk of a court, county commissioner, county recorder, county
    engineer, county treasurer, or sheriff shall be eligible to the office of county
    auditor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.07
- number: '319.08'
  heading: Secretary of board of county commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: If the board of county commissioners has not appointed a full-time clerk pursuant
    to section 305.13 of the Revised Code, the county auditor, by virtue of his office
    , shall be the secretary of the board. When requested, he shall aid the board
    in the performance of its duties. He shall keep an accurate record of its proceedings,
    and carefully preserve all documents, books, records, maps, and papers required
    to be deposited and kept in his office.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.08
- number: '319.09'
  heading: County auditor as fiscal auditor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor, if authorized by a resolution of the board of county commissioners,
    may serve as the fiscal officer of any department, office, or agency of the county,
    except that the county auditor may not serve as the fiscal officer for the office
    of any county elected officer or any agency governed by an appointed board or
    commission without the written agreement of that elected officer or agency.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.09
- number: '319.10'
  heading: Contracts for auditor to provide services to county land reutilization
    corporation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The county auditor may enter into a contract with a county land reutilization
    corporation organized under Chapter 1724. of the Revised Code to provide employees
    of the auditor to provide services to the corporation. An employee of the auditor
    who provides services to a county land reutilization corporation under such a
    contract shall not be considered an employee of the corporation during the provision
    of services, but shall remain an employee of the county during provision of services
    pursuant to the contract.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.10
- number: '319.11'
  heading: Annual county financial report
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: 'The county auditor shall prepare a financial report of the county for the
    preceding fiscal year in such form as prescribed by the auditor of state and by
    such date as required under section 117.38 of the Revised Code. Upon completing
    the report, the county auditor shall publish notice that the report has been completed
    and is available for public inspection at the office of the county auditor. The
    notice shall be published once using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation in the
    county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.

    The report shall contain at least the information required by section 117.38 of
    the Revised Code, and a copy shall be filed with the auditor of state.

    No county auditor shall fail or neglect to prepare the report or publish notice
    of completion of the report as required by this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.11
- number: '319.12'
  heading: Annual report expenses
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: The proper and necessary expenses of publishing the notice of completion of
    the annual report, as required by section 319.11 of the Revised Code, shall be
    paid from the county treasury as county expenses are paid, and the board of county
    commissioners shall make the necessary appropriation for that expense. If the
    board fails to make the appropriation, or if the appropriation is insufficient
    to meet that expense, any person interested may apply to the court of common pleas
    within the county for an allowance to cover the expense, and the court shall issue
    an order instructing the county auditor to issue a warrant upon the county treasurer
    for the amount deemed necessary, and the order by the court shall be final.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.12
- number: '319.13'
  heading: Money to be certified into treasury
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: Except as to moneys collected on the tax duplicate, the county auditor shall
    certify all moneys into the county treasury, specifying by whom to be paid, what
    fund to be credited, charge the treasurer with such moneys, and preserve a duplicate
    of the certificate in his office. Costs collected in felony cases that have been
    or are to be paid by the state shall be certified into the treasury as belonging
    to the state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.13
- number: '319.14'
  heading: Account current with county treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: 'The county auditor shall keep an accurate account current with the county
    treasurer, showing all moneys paid into the treasury, the amount of such moneys,
    the time when, by whom, from what source, and to what fund paid, and showing all
    moneys paid out, the amount of such moneys, the time when, to whom, for what purpose,
    and from what fund paid. Upon the receipt of the daily statement of the county
    treasurer required by section 321.09 of the Revised Code, the auditor shall enter
    on his account current, as a charge to the treasurer, the amount of tax collected
    as shown by such statement, in the following manner:

    (A) Collections of estate tax to be credited to the undivided estate tax fund;

    (B) Collections of other taxes and assessments of whatever kind to be credited
    to the undivided general tax fund.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.14
- number: '319.15'
  heading: Monthly statement of county finances
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: On the first business day of each month, the county auditor shall prepare
    in duplicate a statement of the finances of the county for the preceding month,
    showing the amount of money received to the credit of each fund and account, the
    amount disbursed from each, the balance remaining to the credit of each, and the
    balance of money in the treasury and depository. After careful comparison with
    the county treasurer's balances, he shall submit such statement to the board of
    county commissioners, which shall place it on file and post one copy in the auditor's
    office, such copy to remain posted for at least thirty days for the inspection
    of the public.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.15
- number: '319.16'
  heading: Issuing and recording warrants
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) The county auditor shall issue warrants, including electronic warrants
    authorizing direct deposit for payment of county obligations in accordance with
    division (F) of section 9.37 of the Revised Code, on the county treasurer for
    all moneys payable from the county treasury, upon presentation of either of the
    following:

    (1) Any proper order or voucher and evidentiary matter;

    (2) Any proper court order for expenses of any court funded through the county
    treasury and, upon request of the county auditor, legible copies of any court-approved
    invoice, bill, receipt, check, or contract related to the order, redacted as required
    by law, to the extent those documents exist.

    (B) When a court order described in division (A)(2) of this section is presented,
    the auditor shall have no liability for that expenditure and the court issuing
    the order shall assume the financial liability, if any, for that expenditure.
    The county auditor shall keep a record of all such warrants showing the number,
    date of issue, amount for which drawn, in whose favor, for what purpose, and on
    what fund.

    (C) The auditor shall not issue a warrant for the payment of any claim against
    the county, unless it is allowed by the board of county commissioners, except
    where the amount due is fixed by law or is allowed by an officer or tribunal,
    including a county board of mental health or county board of developmental disabilities,
    so authorized by law.

    (D) If the auditor questions the validity of an expenditure under division (A)(2)
    of this section that is within available appropriations, the auditor shall notify
    the court that presented the documents, shall issue the warrant under protest,
    and shall notify the auditor of state of the protest. When a warrant is issued
    under division (D) of this section, the auditor has no liability for that expenditure.
    If the auditor refuses to issue the warrant, a writ of mandamus may be sought.
    The court shall issue a writ of mandamus for issuance of the warrant if the court
    determines that the claim is valid.

    (E) If the auditor questions the validity of an expenditure presented under division
    (A)(1) of this section that is within available appropriations, the auditor shall
    notify the board, officer, or tribunal who presented the documents. If the board,
    officer, or tribunal determines that the expenditure is valid and the auditor
    refuses to issue the appropriate warrant on the county treasury, a writ of mandamus
    may be sought. The court shall issue a writ of mandamus for issuance of the warrant
    if the court determines that the claim is valid.

    Evidentiary matter includes original invoices, receipts, bills and checks, and
    legible copies of contracts.'
