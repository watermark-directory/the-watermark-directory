- number: '319.37'
  heading: Settlements with tax commissioner and county treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: 'After the refunding of taxes as prescribed by section 319.36 of the Revised
    Code:

    (A) At the next settlement with the tax commissioner, the county auditor shall
    deduct from the amount of taxes due the state at such settlement the amount of
    such taxes that have been paid into the state treasury.

    (B) At the next settlement with the county treasurer, the amount of each such
    refund apportioned among the various subdivision accounts shall be subtracted
    by the auditor from those accounts.'
