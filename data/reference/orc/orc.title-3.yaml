    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: All the power and authority granted to a regional transit authority shall
    be vested in and exercised by its board of trustees which shall manage and conduct
    its affairs. The board shall, within the limitations of sections 306.30 to 306.47,
    inclusive, of the Revised Code, by its rules and regulations provide the procedure
    for its actions, the manner of selection of its president, vice-president, secretary-treasurer,
    and other officers and employees, their titles, terms of office, compensation,
    duties, number, and qualifications, and any other lawful subject necessary to
    the operation of the regional transit authority and the exercise of the powers
    granted to it.
