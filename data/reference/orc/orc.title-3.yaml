- number: '353.04'
  heading: Board of directors
  title:
    num: '3'
    name: Counties
  chapter:
    num: '353'
    name: Lake Facilities Authorities
  text: '(A) Upon the creation of a lake facilities authority under section 353.02
    of the Revised Code, a board of directors consisting of the county commissioners
    of each county with territory in the impacted lake district shall be created.
    Membership on the board is not a direct or indirect interest in a contract or
    expenditure of money by the county. Notwithstanding any provision of law to the
    contrary, no member of the board shall be disqualified from holding any public
    office or employment by reason of membership on the board. The board is a public
    body for the purposes of section 121.22 of the Revised Code and a public office
    for the purposes of section 149.43 of the Revised Code. Notwithstanding those
    sections, the board may hold closed meetings and protect the confidentiality of
    information under the same circumstances as authorized for a community improvement
    corporation under section 1724.11 of the Revised Code. Chapter 2744. of the Revised
    Code applies to the board. Each year, the board shall prepare an annual report
    of its activities and make it available to the public.

    (B) A board of directors shall consult with the advisory council created under
    this division in performing the remediation and other activities authorized by
    this chapter.

    Not later than sixty days after the creation of the board of directors, the board
    shall provide written notice of its creation to the legislative authority of each
    political subdivision with territory in the impacted lake district. The notice
    shall describe the process for the appointment of an advisory council. Upon receipt
    of such notice, the legislative authority of each political subdivision with territory
    in the impacted lake district shall appoint one representative each to serve on
    the advisory council. The representative need not be an elected or appointed official
    of the political subdivision.'
