- number: '311.281'
  heading: Use of sheriff's uniform and vehicle markings prohibited
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) No person, except a county sheriff or the deputies of a county sheriff,
    shall wear the badge, the standard uniform, or any distinctive part of the standard
    uniform prescribed for county sheriffs and their deputies by the county sheriffs''
    standard car-marking and uniform commission.

    (B) No person, except a county sheriff or the deputies of a county sheriff, shall
    mark a motor vehicle in a manner similar to that prescribed for county sheriffs
    and their deputies by the county sheriffs'' standard car-marking and uniform commission.

    (C) Whoever violates division (A) of this section is guilty of a violation of
    section 2921.51 of the Revised Code. Whoever violates division (B) of this section
    is guilty of a violation of section 2913.441 of the Revised Code.'
