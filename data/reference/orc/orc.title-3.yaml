    (B)(1) A coroner in a county with a population of one hundred seventy-five thousand
    one or more shall not engage in the private practice of medicine unless, before
    taking office, the coroner notifies the board of county commissioners of the intention
    to engage in that private practice. A coroner in such a county shall elect to
    engage or not to engage in the private practice of medicine before the commencement
    of each new term of office. A coroner in such a county who engages in the private
    practice of medicine, but who intends not to engage in the private practice of
    medicine during the coroner''s next term of office, shall so notify the board
    of county commissioners as specified in this division. For a period of six months
    after taking office, a coroner who elects not to engage in the private practice
    of medicine may engage in the private practice of medicine, without any reduction
    of compensation as provided in division (A) of this section and in section 325.18
    of the Revised Code, for the purpose of concluding the affairs of the coroner''s
    private practice of medicine.

    (2) A coroner in a county with a population of one hundred seventy-five thousand
    one or more who elects not to engage in the private practice of medicine under
    division (B)(1) of this section may, during the coroner''s term of office, elect
    to engage in the private practice of medicine by notifying the board in writing
    of the intention to so engage. The notice shall state the date on which the coroner
    will commence the private practice of medicine and shall be given to the board
    at least thirty days before that date. On the date stated in the notice, the coroner''s
    compensation shall be reduced as provided in division (A) of this section and
    in section 325.18 of the Revised Code for coroners with a private practice.

    (C) Each coroner who is the coroner in a county with a population of one hundred
    seventy-five thousand one or more and who is without a private practice of medicine
    shall receive supplemental compensation of an additional fifty per cent of the
    annual compensation calculated under division (A) of this section and section
    325.18 of the Revised Code in each calendar year in which the office of the coroner
    satisfies all of the following:

    (1) The office operates as a regional forensic pathology examination referral
    center, and the operation generates coroner''s laboratory fund income, for purposes
    of section 313.16 of the Revised Code, that is in excess of the fund''s expenses
    and is sufficient to provide the supplemental compensation specified in division
    (C) of this section;

    (2) The coroner is a forensic pathologist certified by the American board of pathology;
    and

    (3) The coroner performs a minimum of seventy-five post mortem examinations annually.

    (D) Each coroner who is the coroner in a county with a population of one hundred
    seventy-five thousand one or more and who is without a private practice of medicine
    and does not operate a regional forensic pathology examination referral center
    may, on approval of the board of county commissioners, receive supplemental compensation
    of up to an additional twenty-five per cent of the annual compensation calculated
    under division (A) of this section and section 325.18 of the Revised Code in each
    calendar year in which the coroner is a forensic pathologist certified by the
    American board of pathology and is performing the forensic examinations of the
    county.

    (E) As used in this section, "private practice of medicine" includes both of the
    following:

    (1) The provision of services for the diagnosis, prevention, treatment, cure,
    or relief of a health condition, illness, injury, or disease for remuneration;

    (2) The performance of an autopsy at the request of another person, including
    another coroner, a hospital, a business entity, an institution of higher education,
    or any other person.

    "Private practice" refers to the private practice of medicine, as described in
    this division.'
