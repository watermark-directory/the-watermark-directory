- number: '307.651'
  heading: Establishing domestic violence fatality review board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) A board of county commissioners may appoint a health commissioner of
    the board of health of a city or general health district that is entirely or partially
    located in the county in which the board of county commissioners is located to
    establish a domestic violence fatality review board to review the deaths of individuals
    over eighteen years of age by domestic violence that occurred in the county.

    (B) The boards of county commissioners of two or more counties may, by adopting
    a joint resolution passed by a majority of the members of each participating board
    of county commissioners, create a regional domestic violence fatality review board
    to review the deaths of individuals over eighteen years of age by domestic violence
    that occurred in the participating counties. The joint resolution shall appoint,
    for each county participating as part of the regional review board, one health
    commissioner from a board of health of a city or general health district located
    at least in part in that county. The health commissioners appointed shall select
    one of their number as the health commissioner to establish the regional review
    board.

    (C) In any county that, on the effective date of this section, has a body that
    is acting as a domestic violence fatality review board and is comprised of the
    members described in division (A)(1) of section 307.652 of the Revised Code, including
    a public health official or designee, the board of county commissioners of that
    county, in lieu of having a health commissioner establish a domestic violence
    fatality review board, may appoint that body to function as the domestic violence
    fatality review board for the county. The body shall have the same duties, obligations,
    and protections as a domestic violence fatality review board appointed by a health
    commissioner.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.651
- number: '307.652'
  heading: Members of domestic violence fatality review board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A)(1) If a health commissioner establishes a domestic violence fatality
    review board as described in division (A) of section 307.651 of the Revised Code,
    the commissioner shall select the following to serve on the review board:

    (a) The county coroner or designee;

    (b) The chief of police of a police department in the county or the county sheriff
    or a designee of the chief or sheriff;

    (c) A public health official or designee;

    (d) The county prosecutor or designee;

    (e) The executive director of a public children services agency or designee;

    (f) A physician authorized under Chapter 4731. of the Revised Code to practice
    medicine and surgery or osteopathic medicine and surgery with expertise in domestic
    violence;

    (g) An individual representing a domestic violence shelter or with expertise advocating
    for domestic violence victims;

    (h) An individual representing a domestic violence perpetrator treatment program;

    (i) A county corrections official or designee;

    (j) An individual representing school teachers, guidance counselors, or student
    health services staff;

    (k) An individual representing judges or court administrators.

    (2) If a health commissioner establishes a domestic violence fatality review board
    as described in division (B) of section 307.651 of the Revised Code, the commissioner
    shall select the following to serve on the review board:

    (a) A county coroner or designee;

    (b) The chief of police of a police department or a sheriff or a designee of the
    chief or sheriff;

    (c) A public health official or designee;

    (d) A county prosecutor or designee;

    (e) The executive director of a public children services agency or designee;

    (f) A physician authorized under Chapter 4731. of the Revised Code to practice
    medicine and surgery or osteopathic medicine and surgery with expertise in domestic
    violence;

    (g) An individual representing a domestic violence shelter or with experience
    advocating for domestic violence victims;

    (h) An individual representing a domestic violence perpetrator treatment program;

    (i) A county corrections official or designee;

    (j) An individual representing school teachers, guidance counselors, or student
    health services staff;

    (k) An individual representing judges or court administrators.

    The members described in divisions (A)(2)(a), (b), (c), (d), (i), and (k) of this
    section shall be representatives from the most populous county served by the board.

    (B) The majority of the members of a review board may invite additional members
    to serve on the board. The additional members invited under this division shall
    serve for a period of time determined by a majority of the members described in
    division (A) of this section. Each additional member shall have the same authority,
    duties, and responsibilities as members described in division (A) of this section.

    (C) If a member of a review board has a conflict of interest regarding a specific
    domestic violence fatality, the chairperson of the review board selected pursuant
    to section 307.653 of the Revised Code may select a substitute member to serve
    only during the review of that fatality. While serving, the substitute member
    shall have the same authority, duties, and responsibilities as members described
    in division (A) of this section.

    (D) A vacancy in a domestic violence review board shall be filled in the same
    manner as the original appointment. If the health commissioner who made the original
    appointment as described in division (A) of this section is no longer serving
    in that capacity, a successor of the commissioner shall fill the vacancy.

    (E) A domestic violence fatality review board member shall not receive any compensation
    for, and shall not be paid for any expenses incurred pursuant to, fulfilling the
    member''s duties on the board unless compensation for, or payment for expenses
    incurred pursuant to, those duties is received pursuant to a member''s regular
    employment.

    (F) No person shall serve as a member of a domestic violence fatality review board
    without signing a statement acknowledging the provisions of section 307.659 of
    the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.652
- number: '307.653'
  heading: Chairperson of domestic violence fatality review board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) If a domestic violence fatality review board is established under section
    307.651 of the Revised Code, the board members shall select, by majority vote,
    a member of the board to serve as the chairperson of the review board.

    (B) The chairperson of the review board shall be responsible for all of the following:

    (1) Convening board meetings;

    (2) Notifying members of board meetings;

    (3) Providing members with a list of fatalities to be reviewed during a board
    meeting;

    (4) Ensuring that the review board complies with the procedure for conducting
    reviews of deaths established in rules adopted under section 3701.0412 of the
    Revised Code.'
