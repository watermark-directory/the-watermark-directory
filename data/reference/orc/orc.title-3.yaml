    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: A regional transit commission authorized under sections 306.80 to 306.90,
    inclusive, of the Revised Code, is exempt from and is not required to pay any
    taxes on property, both real and personal, belonging to such commission, which
    is used exclusively for any public purpose; provided, such exemption does not
