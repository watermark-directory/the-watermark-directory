- number: '302.01'
  heading: Electors may adopt alternative form of county government
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: The electors of any county may adopt an alternative form of county government
    authorized by the provisions of sections 302.01 to 302.24, inclusive, of the Revised
    Code. Upon adoption as provided by such sections, said alternative form of government
    shall take the place of the form of government then existing in such county and
    the provisions of sections 302.01 to 302.24, inclusive, of the Revised Code, applicable
    to the adopted alternative form of government shall be controlling in such county
    as to all matters to which they relate, and other provisions of the general laws
    of the state shall be operative therein only insofar as they are not inconsistent
    with the aforesaid provisions.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.01
- number: '302.02'
  heading: County executive in alternative form of county government
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'An alternative form of county government shall include either an elective
    county executive as provided for by section 302.15 of the Revised Code or an appointive
    county executive as provided by section 302.16 of the Revised Code, and all those
    provisions of sections 302.01 to 302.24, inclusive, of the Revised Code, which
    have not been specifically designated as applicable only to the elective county
    executive plan or the appointive county executive plan.

    The alternative form of county government providing for the office of the elective
    county executive shall be known as the elective executive plan, and the alternative
    form providing for the office of appointive county executive shall be known as
    the appointive executive plan.'
