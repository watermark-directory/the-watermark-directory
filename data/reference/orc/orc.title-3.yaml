    name: Recorder
  text: After a village dissolution under sections 703.31 to 703.39 of the Revised
    Code, an instrument related to a tract, parcel, or lot of land located within
    what was previously the territory of the dissolved village may utilize the lot
    and sublot number previously assigned to the tract, parcel, or lot of land.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-317.115
- number: '317.12'
  heading: Indorsement on and receipt for deed - recording
  title:
    num: '3'
    name: Counties
  chapter:
    num: '317'
    name: Recorder
  text: Upon the presentation of a deed or other instrument of writing for record,
    the county recorder shall indorse thereon the date, the precise time of its presentation,
    and a file number. The file numbering shall be consecutive and in the order in
    which the instrument of writing is received for record, except financing statements,
    which may have a separate series of file numbers and may be filed separately,
    as provided by sections 1309.501 to 1309.527 of the Revised Code. The recorder
    shall, without fee, give to the person presenting such instrument a receipt naming
    the parties thereto and the date thereof. When a deed or other instrument is recorded,
    the county recorder shall indorse on it the time when recorded, and the number
    or letter and page of the official records in which it is recorded.
