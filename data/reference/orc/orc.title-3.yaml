- number: '321.48'
  heading: Bad check fee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: A county treasurer may assess a fee not exceeding an amount equal to five
    dollars plus any amount passed on from a financial institution on a drawer or
    indorser for each check, draft, or money order returned or dishonored, or automatic
    bank transfer declined, due to insufficient funds or for any other reason. The
    county treasurer shall deposit in the general fund of the county any fee collected
    under this section.
