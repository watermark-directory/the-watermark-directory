- number: '305.36'
  heading: Circulator of referendum petition to file statement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) The circulator of a referendum petition, or his agent, shall, within
    five days after such petition is filed with the county auditor, file a statement,
    made under penalty of election falsification, showing in detail:

    (1) All moneys or things of value paid, given, or promised for circulating such
    petition;

    (2) Full names and addresses of all persons to whom such payments or promises
    were made;

    (3) Full names and addresses of all persons who contributed anything of value
    to be used in circulating such petitions;

    (4) Time spent and salaries earned while circulating or soliciting signatures
    to petitions by persons who were regular salaried employees of some person who
    authorized them to solicit signatures for or circulate the petition as a part
    of their regular duties.

    (B) The statement provided for in division (A) of this section is not required
    from persons who take no other part in circulating a petition other than signing
    declarations to parts of the petition and soliciting signatures to them.

    (C) Such statement shall be open to public inspection for a period of one year.'
