  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.06
- number: '313.07'
  heading: Coroner's office, laboratory, and county morgue
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) There may be established in the county seat of justice, or at another
    location as provided in division (B) of this section, suitable quarters, laboratories,
    and equipment necessary for the proper performance of the duties of the coroner.
    Such quarters shall be known as the coroner''s office, laboratory, and county
    morgue.

    (B) With the consent of the coroner, the board of county commissioners may provide
    by resolution for establishment of the primary quarters, laboratory, and equipment
    of the coroner at a location outside the county seat of justice. The adoption
    of the resolution and the location of the coroner''s primary quarters, laboratory,
    and equipment shall be entered on the journal of the board. The board shall give
    reasonable public notice of its action taken pursuant to this division in accordance
    with division (F) of section 121.22 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.07
- number: '313.08'
  heading: Coroner custodian of morgue - duties where decedent not identified
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A) In counties in which a county morgue is maintained, the coroner shall
    be the official custodian of the morgue.

    In all cases of the finding of the body or remains of a deceased person within
    a county in which a county morgue is maintained, when the identity of the deceased
    person is unknown, or the deceased person''s relatives or other persons entitled
    to the custody of the body or remains of the deceased person are unknown or not
    present, the body or remains shall be removed to the county morgue, where it shall
    be held for identification and disposal.

    (B) The coroner shall make a reasonable attempt to promptly identify the body
    or remains of a deceased person. The coroner may use any means available in attempting
    to identify the body or remains.

    (C) If the coroner is unable to identify the body or remains of a deceased person
    within thirty days after the body or remains of the deceased person are delivered
    to the coroner, the coroner shall notify the bureau of criminal identification
    and investigation that the body or remains are located in the county morgue or
    are in the custody of the coroner and forward a DNA specimen from the body or
    remains of the deceased person to the bureau.

    (D) If a body or remains are discovered and delivered to the coroner and the coroner
    is unable to determine whether or not the body or remains that are discovered
    are the body or remains of a deceased person, the coroner shall notify the bureau
    of criminal identification and investigation of the existence of a possible body
    or remains of a deceased person and forward a DNA specimen from the body or remains
    to the bureau.

    (E) If the body or remains of a deceased person are not identified, in addition
    to providing the notice required under division (C) of this section, a coroner
    shall do all of the following prior to disposing of the body or remains:

    (1) Take the fingerprints of the body or remains of the deceased person, or cause
    the same to be taken, according to the fingerprint system of identification on
    the forms furnished by the superintendent of the bureau of criminal identification
    and investigation;

    (2) Take or cause to be taken one or more photographs of the body or remains of
    the deceased person;

    (3) Collect in a medically approved manner a DNA specimen from the body or remains
    of the deceased person;

    (4) Promptly cause the fingerprints, the photographs, and the DNA specimen to
    be forwarded to the bureau of criminal identification and investigation for inclusion
    in the unidentified person database in accordance with procedures established
    by the superintendent of the bureau under division (H) of section 109.573 of the
    Revised Code.

    (F) The bureau of criminal identification and investigation shall cause the fingerprints,
    the photographs, and the DNA specimen forwarded by the coroner to the bureau pursuant
    to division (E)(4) of this section to be forwarded to the national crime information
    center and the national DNA index system within ten days after the bureau completes
    the DNA analysis of the forwarded DNA specimen.

    (G) The bureau shall provide the fingerprint forms, specimen vials, mailing tubes,
    labels, postage, and instruction needed for the collection and forwarding to the
    bureau pursuant to division (E)(4) of this section of the fingerprints and the
    DNA specimen and for the forwarding pursuant to division (E)(4) of this section
    to the bureau of the photographs.

    (H) Upon the request of a coroner who has the duty to take, or cause the taking
    of, fingerprints and photographs under divisions (E)(1) and (2) of this section,
    the bureau of criminal identification and investigation shall take, or assist
    in the taking of, the required fingerprints and photographs.

    (I) The coroner may submit any evidence gathered in the investigation of a death
    to the bureau of criminal identification and investigation for assistance in determining
    whether the death resulted from criminal activity. The bureau shall assist in
    the evaluation of evidence submitted under this division.

    (J) As used in this section, "DNA analysis," "DNA specimen," and "unidentified
    person database" have the same meanings as in section 109.573 of the Revised Code.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.08
- number: '313.09'
  heading: Records
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: The coroner shall keep a complete record of and shall fill in the cause of
    death on the death certificate, in all cases coming under his jurisdiction. All
    records shall be kept in the office of the coroner, but, if no such office is
    maintained, then such records shall be kept in the office of the clerk of the
    court of common pleas. Such records shall be properly indexed, and shall state
    the name, if known, of every deceased person as described in section 313.12 of
    the Revised Code, the place where the body was found, date of death, cause of
    death, and all other available information. The report of the coroner and the
    detailed findings of the autopsy shall be attached to the report of each case.
    The coroner shall promptly deliver, to the prosecuting attorney of the county
    in which such death occurred, copies of all necessary records relating to every
    death in which, in the judgment of the coroner or prosecuting attorney, further
    investigation is advisable. The sheriff of the county, the police of the city,
    the constable of the township, or marshal of the village in which the death occurred
    may be requested to furnish more information or make further investigation when
    requested by the coroner or his deputy. The prosecuting attorney may obtain copies
    of records and such other information as is necessary from the office of the coroner.
    All records of the coroner are the property of the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.09
- number: '313.091'
  heading: Request for decedent's medical and psychiatric records
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: 'In connection with the performance of duties under this chapter, a coroner,
    deputy coroner, or representative of a coroner or deputy coroner may request,
    in writing, to inspect and receive a copy of the deceased person''s medical and
    psychiatric records. The person to whom the request is delivered shall make such
    records in the person''s custody available during normal business hours to the
    coroner, deputy coroner, or representative for purposes of inspection and copying.
    A person who provides copies of medical or psychiatric records pursuant to a request
    made under this section may request, in writing, reimbursement in a specified
    amount for the necessary and reasonable costs of copying the records, in which
    case the coroner, deputy coroner, or representative shall remit that amount to
    the person upon receipt of the copies.

    Any medical or psychiatric record provided to a coroner, deputy coroner, or representative
    of a coroner or deputy coroner under this section is not a public record subject
    to section 149.43 of the Revised Code. The release of a deceased person''s medical
    or psychiatric records to a coroner, deputy coroner, or representative of a coroner
    or deputy coroner in accordance with this section does not violate division (B)(4)
    of section 4731.22 or section 5122.31 of the Revised Code.

    As used in this section and section 313.10 of the Revised Code, "medical record"
    has the same meaning as in division (A)(3) of section 149.43 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-313.091
- number: '313.10'
  heading: Records to be public - certified copies as evidence
  title:
    num: '3'
    name: Counties
  chapter:
    num: '313'
    name: Coroner
  text: '(A)(1) Except as otherwise provided in this section, the records of the coroner
    who has jurisdiction over the case, including, but not limited to, the detailed
    descriptions of the observations written during the progress of an autopsy and
    the conclusions drawn from those observations filed in the office of the coroner
    under division (A) of section 313.13 of the Revised Code, made personally by the
    coroner or by anyone acting under the coroner''s direction or supervision, are
    public records. Those records, or transcripts or photostatic copies of them, certified
    by the coroner shall be received as evidence in any criminal or civil action or
    proceeding in a court in this state, as to the facts contained in those records.
    The coroner of the county where the death was pronounced shall be responsible
    for the release of all public records relating to that death.

    (2) Except as otherwise provided in division (D) or (E) of this section, the following
    records in a coroner''s office are not public records:

    (a) Preliminary autopsy and investigative notes and findings made by the coroner
    or by anyone acting under the coroner''s direction or supervision;

    (b) Photographs of a decedent made by the coroner or by anyone acting under the
    coroner''s direction or supervision;

    (c) Suicide notes;

    (d) Medical and psychiatric records provided to the coroner, a deputy coroner,
    or a representative of the coroner or a deputy coroner under section 313.091 of
    the Revised Code;

    (e) Records of a deceased individual that are confidential law enforcement investigatory
    records as defined in section 149.43 of the Revised Code;

    (f) Laboratory reports generated from the analysis of physical evidence by the
    coroner''s laboratory that is discoverable under Criminal Rule 16.

    (3) In the coroner''s discretion, photographs of a decedent may be used for medical,
    legal, or educational purposes.

    (B) All records in the coroner''s office that are public records are open to inspection
    by the public, and any person may receive a copy of any such record or part of
    it upon demand in writing, accompanied by payment of a record retrieval and copying
    fee, at the rate of twenty-five cents per page or a minimum fee of one dollar.

    (C)(1) The coroner shall provide a copy of the full and complete records of the
    coroner with respect to a decedent to a person who makes a written request as
    the next of kin of the decedent. The following persons may make a request pursuant
    to this division as the next of kin of a decedent:

    (a) The surviving spouse of the decedent;

    (b) If there is no surviving spouse, or if the surviving spouse has died without
    having made a request pursuant to this division, any child of the decedent over
    eighteen years of age, with each child over eighteen years of age having an independent
    right to make a request pursuant to this division;

    (c) If there is no surviving spouse or child over eighteen years of age, or if
    the surviving spouse and all children over eighteen years of age have died without
    having made a request pursuant to this division, the parents of the decedent,
    with each parent having an independent right to make a request pursuant to this
    division;

    (d) If there is no surviving spouse, child over eighteen years of age, or parents
    of the decedent, or if all have died without having made a request pursuant to
    this division, the brothers and sisters of the decedent, whether of the whole
    or the half blood, with each having an independent right to make a request pursuant
    to this division.

    (2) If there is no surviving person who may make a written request as next of
    kin for a copy of the full and complete records of the coroner pursuant to division
    (C)(1) of this section, or if all next of kin of the decedent have died without
    having made a request pursuant to that division, the coroner shall provide a copy
    of the full and complete records of the coroner with respect to a decedent to
    the representative of the estate of the decedent who is the subject of the records
    upon written request made by the representative.

    (D) A journalist may submit to the coroner a written request to view suicide notes,
    photographs of the decedent made by the coroner or by anyone acting under the
    coroner''s discretion or supervision, or preliminary autopsy and investigative
    notes and findings but not records of a deceased individual that are confidential
    law enforcement investigatory records as defined in section 149.43 of the Revised
    Code. The request shall include the journalist''s name and title and the name
    and address of the journalist''s employer and state that the granting of the request
    would be in the best interest of the public. If a journalist submits a written
    request to the coroner to view the records described in this division and the
    final autopsy is not yet completed, the coroner may grant the journalist''s request.
    After the final autopsy report and final death certification are complete, if
    a journalist submits a written request to the coroner to view the records described
    in this division, the coroner shall grant the journalist''s request.

    A journalist shall not copy the preliminary autopsy and investigative notes and
    findings, suicide notes, or photographs of the decedent.

    (E)(1) An insurer may submit to the coroner a written request to obtain a copy
    of the full and complete records of the coroner with respect to a deceased person.
    The request shall include the name of the deceased person, the type of policy
    to which the written request relates, and the name and address of the insurer.

    (2) If an insurer submits a written request to the coroner to obtain a copy of
    records pursuant to division (E)(1) of this section, the coroner shall grant that
    request.

    (3) Upon the granting of a written request to obtain a copy of records by the
    coroner, the insurer may utilize the records for the following purposes:

    (a) To investigate any first party claim or third party claim asserted under a
    policy of insurance issued by the insurer that arises from the death of the deceased
    person;

    (b) To determine coverage for any first party claim or third party claim asserted
    under a policy of insurance issued by the insurer that arises from the death of
    the deceased person;

    (c) To determine the insurer''s liability for any first party claim or third party
    claim asserted under a policy of insurance issued by the insurer that arises from
    the death of the deceased person.

    (4) Prior to the delivery of records that are the subject of a request made pursuant
    to division (E)(1) of this section, the coroner may require the insurer who submitted
    the written request for the records to provide a payment to the coroner of a record
    retrieval and copying fee at the rate of twenty-five cents per page or a minimum
    fee of one dollar.

    (5) Any records produced by the coroner in response to a written request under
    division (E)(1) of this section shall remain in the care, custody, and control
    of the insurer and its employees or representatives at all times. The insurer
    may not release or disclose the records to any other person unless any of the
    following apply:

    (a) The release of the records is reasonably necessary to further a purpose described
    in division (E)(3) of this section.

    (b) A court of competent jurisdiction orders the insurer to produce the records.

    (c) The insurer is required to produce the records in response to a civil or criminal
    subpoena.

    (d) The insurer is responding to a request for the records from a law enforcement
    agency, the department of insurance or a department of insurance from another
    state, or another governmental authority.

    (F) The coroner may contact the decedent''s next of kin to inform the next of
    kin that a journalist or an insurer has submitted a written request pursuant to
    division (D) or (E) of this section and whether the coroner has granted the journalist''s
    or the insurer''s request.

    (G) As used in this section:

    (1) "Full and complete records of the coroner" includes, but is not limited to,
    the following:

    (a) The detailed descriptions of the observations written by the coroner or by
    anyone acting under the coroner''s direction or supervision during the progress
    of an autopsy and the conclusions drawn from those observations that are filed
    in the office of the coroner under division (A) of section 313.13 of the Revised
    Code;

    (b) Preliminary autopsy and investigative notes and findings made by the coroner
    or by anyone acting under the coroner''s direction or supervision;

    (c) Photographs of a decedent made by the coroner or by anyone acting under the
    coroner''s direction or supervision;

    (d) Suicide notes;

    (e) Medical and psychiatric records provided to the coroner, a deputy coroner,
    or a representative of the coroner or a deputy coroner under section 313.091 of
    the Revised Code;

    (f) Records of a deceased individual that are confidential law enforcement investigatory
    records as defined in section 149.43 of the Revised Code;

    (g) Laboratory reports generated from the analysis of physical evidence by the
    coroner''s laboratory that is discoverable under Criminal Rule 16.

    (2) "Insurer" has the same meaning as in section 3901.07 of the Revised Code.

    (3) "Journalist" has the same meaning as in section 149.43 of the Revised Code.'
