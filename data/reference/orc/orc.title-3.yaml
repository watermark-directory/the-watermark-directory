- number: '303.212'
  heading: Limitations on powers - permanently sited manufactured homes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: '(A) Except as provided in division (B) of this section, sections 303.01 to
    303.25 of the Revised Code do not confer on any county rural zoning commission,
    board of county commissioners, or board of zoning appeals the authority to prohibit
    or restrict the location of a permanently sited manufactured home, as defined
    in division (C)(6) of section 3781.06 of the Revised Code, in any district or
    zone in which a single-family home is permitted.

    (B) Division (A) of this section does not limit the authority of a county rural
    zoning commission, board of county commissioners, or board of zoning appeals to
    do either of the following:

    (1) Require that a permanently sited manufactured home comply with all zoning
    requirements that are uniformly imposed on all single-family residences in the
    district or zone in which the permanently sited manufactured home is or is to
    be located, except requirements that specify a minimum roof pitch and requirements
    that do not comply with the standards established pursuant to the "Manufactured
    Housing Construction and Safety Standards Act of 1974," 88 Stat. 700, 42 U.S.C.A.
    5401;

    (2) Prohibit from any residential district or zone, travel trailers, park trailers,
    and mobile homes, as these terms are defined in section 4501.01 of the Revised
    Code, and manufactured homes that do not qualify as permanently sited manufactured
    homes.

    (C) This section does not prohibit a private landowner from incorporating a restrictive
    covenant in a deed, prohibiting the inclusion on the conveyed land of manufactured
    homes, as defined in division (C)(4) or (6) of section 3781.06 of the Revised
    Code, or of travel trailers, park trailers, and mobile homes, as defined in section
    4501.01 of the Revised Code. This division does not create a new cause of action
    or substantive legal right for a private landowner to incorporate such a restrictive
    covenant in a deed.'
