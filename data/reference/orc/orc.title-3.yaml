- number: '325.191'
  heading: Establishing programs for staff development and continuing education
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: '(A) The board of county commissioners, by an affirmative vote of at least
    two members, may authorize each of the several offices, departments, and agencies
    of the county service to establish programs for staff development and continuing
    education, to assist employees to more adequately and effectively carry out current
    job assignments and to prepare for promotional advancements. Each full-time employee
    in an office, department, or agency adopting such a program shall be entitled
    to participate pursuant to the rules established by the office, department, or
    agency for administration of the program.

    (B) Expenditures on behalf of staff development and continuing education shall
    only be made to further the interests of the participating office, department,
    or agency of the county. Any plan adopted pursuant to this section may include
    programs for employee orientation, on-the-job training, tuition reimbursement,
    educational material reimbursement, and educational leaves of absence, and may
    include the expenditure of training funds for special teachers, consultants and
    educational facilities necessary to implement the program.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-325.191
- number: '325.20'
  heading: County officer may attend convention at county expense
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: '(A) Except as otherwise provided by law, no elected county officer and no
    deputy or employee of the county shall attend, at county expense, any association
    meeting, convention, or training sessions conducted pursuant to section 901.10
    of the Revised Code, unless authorized by the board of county commissioners. Before
    such allowance may be made, the head of the county office desiring it shall apply
    to the board in writing showing the necessity of such attendance and the probable
    costs to the county. If a majority of the members of the board approves the application,
    such expenses shall be paid from the moneys appropriated to such office for traveling
    expenses.

    (B) The board of county commissioners shall approve or disapprove any travel outside
    this state if the travel expenses will or may be in excess of one hundred dollars
    and will or may be paid for from funds in either of the delinquent tax and assessment
    collection funds created in section 321.261 of the Revised Code or the real estate
    assessment fund created in section 325.31 of the Revised Code. The head of the
    county office seeking approval shall apply to the board in writing showing the
    necessity of the travel and the probable costs to the county from either delinquent
    tax and assessment collection fund or from the real estate assessment fund. If
    the travel is requested by a county auditor, and the board does not approve the
    travel, the auditor may not apply to the tax commissioner pursuant to section
    5713.01 of the Revised Code for an additional allowance for such travel.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-325.20
- number: '325.21'
  heading: Authority to join association or non-profit organization formed for improvement
    of county government
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: 'A board of county commissioners may authorize the county to join an association
    or non-profit organization formed for the improvement of county government. Such
    board shall have the authority to appropriate from its general fund an amount
    sufficient to pay the dues, subscription costs, or membership charges of such
    association or non-profit organization.

    The board may also authorize any elected county official to join an association
    related to county affairs, at county expense. The board shall have the authority
    to appropriate an amount sufficient to pay the dues, subscription costs, and membership
    charges of such association. Before such expenses may be paid, the official''s
    office shall make application to the board in writing showing the probable costs.
    If the board approves the application, such expenses shall be paid from moneys
    appropriated to such office. The amount appropriated for such expenses shall not
    exceed five cents per person for the county''s population as determined by the
    latest federal census.'
