- number: '307.051'
  heading: County emergency medical, fire and transportation service organization
    regulated by state board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'As used in this section, "emergency medical service organization" has the
    same meaning as in section 4766.01 of the Revised Code.

    A board of county commissioners, by adoption of an appropriate resolution, may
    choose to have the state board of emergency medical, fire, and transportation
    services license any emergency medical service organization it operates. If a
    board adopts such a resolution, Chapter 4766. of the Revised Code, except for
    sections 4766.06 and 4766.99 of the Revised Code, applies to the county emergency
    medical service organization. All rules adopted under the applicable sections
    of that chapter also apply to the organization. A board, by adoption of an appropriate
    resolution, may remove its emergency medical service organization from the jurisdiction
    of the state board of emergency medical, fire, and transportation services.'
