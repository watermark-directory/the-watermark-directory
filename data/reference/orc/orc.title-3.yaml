- number: '311.172'
  heading: Fees for sexual offender registration
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) The sheriff shall charge a one-time fee of one hundred dollars when a
    person who, on or after the effective date of this section, is convicted of an
    offense for which registration is required under section 2950.04 or 2950.041 of
    the Revised Code registers for the first time. The fee shall be in addition to
    any fee that may be charged under section 311.171 of the Revised Code.

    (B) The sheriff shall not refuse to register a person who does not pay the fee
    required by this section. At the end of each calendar year, the sheriff shall
    report to the attorney general all fees that have been due and unpaid for more
    than one year and that the sheriff has not previously reported. The attorney general
    may recover those fees in a civil action.

    (C) The sheriff shall transmit on or before the twentieth day of the following
    month all money collected during a month under this section to the county treasurer.
    Within sixty days after receipt, the county treasurer shall transmit the money
    to the treasurer of state to be credited to the rape crisis program trust fund
    created by section 109.921 of the Revised Code.'
