- number: '307.441'
  heading: Errors and omissions insurance for officers, employees and judges
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The board of county commissioners of each county may procure a policy
    or policies of insurance insuring the county recorder and the clerk of the court
    of common pleas and their deputies against liability on account of errors or omissions
    unknowingly made by them and for which they may be held liable.

    The policy or policies of insurance shall be in an amount of not less than fifty
    thousand dollars.

    (B) The board of county commissioners of each county may procure a policy or policies
    of insurance insuring the sheriff and his deputies against liability arising from
    the performance of their official duties.

    (C) The board of county commissioners of each county may procure a policy or policies
    of insurance insuring the prosecuting attorney and assistant prosecuting attorneys
    against liability arising from the performance of their official duties.

    (D) The board of county commissioners of each county may procure a policy or policies
    of insurance insuring the coroner, county engineer, county auditor, each county
    commissioner, and the county treasurer and their assistants against liability
    arising from the performance of their official duties.

    (E) The board of county commissioners of each county may procure a policy or policies
    of insurance insuring any county employee against liability arising from the performance
    of the county employee''s official duties.

    (F) If the board of county commissioners of any county procures a policy or policies
    of insurance insuring any county official against liability arising from the performance
    of the county official''s official duties as provided by divisions (A) to (D)
    of this section, it shall not refuse to procure a policy or policies of insurance
    insuring any other county official as authorized in those divisions, if such policy
    or policies are reasonably available.

    (G) The board of county commissioners of any county may procure a policy or policies
    of insurance insuring the county director of job and family services, county department
    of job and family services employees, or foster caregivers associated with the
    county department of job and family services, against liability arising from the
    performance of their official duties.

    (H) The board of county commissioners of each county may procure a policy or policies
    of insurance insuring the county public defender and the members of the county
    public defender commission against liability arising from the performance of their
    official duties. A joint board of county commissioners formed pursuant to section
    120.23 of the Revised Code may, in accordance with the agreement of the participating
    boards of county commissioners, procure a policy or policies of insurance insuring
    the joint county public defender and the members of the joint county public defender
    commission against liability arising from the performance of their official duties.

    (I) The board of county commissioners of each county may procure a policy or policies
    of insurance insuring the judges of the court of common pleas and any county court
    in the county, and the employees of those courts, against liability arising from
    the performance of their official duties.'
