- number: '311.23'
  heading: Adjournment of court
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: If the judge of the court of common pleas, or a quorum of the judges of the
    court of appeals, fails to attend at the time and place appointed for holding
    such court, or if, after the calling of the court, the judge of the court of common
    pleas or a quorum of the judges of the court of appeals is unable, on account
    of sickness or from any other cause, to attend the daily sessions of such court,
    the sheriff shall adjourn the court from day to day, until such judge attends
