- number: '307.861'
  heading: Renewing leases for electronic data processing equipment, services, or
    systems, or radio communications system
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The county or contracting authority, as defined in section 307.92 of the
    Revised Code, may renew a lease which has been entered into for electronic data
    processing equipment, services, or systems, or a radio communications system at
    a cost in excess of the amount specified in section 9.17 of the Revised Code as
    follows:

    (A) The lessor shall submit a written bid to the county or contracting authority
    that is the lessee under the lease, stating the terms under which the lease would
    be renewed, including the length of the renewal lease, and the cost of the renewal
    lease to the county or contracting authority. The county or contracting authority
    may require the lessor to submit a bond with the bid.

    (B) The county or contracting authority shall advertise for and receive competitive
    bids, as provided in sections 307.87 to 307.90 of the Revised Code, for a lease
    under the same terms and for the same period as provided in the bid of the lessor
    submitted under division (A) of this section.

    (C) The county or contracting authority may renew the lease with the lessor only
    if the bid submitted by the lessor under division (A) of this section is an amount
    less than the lowest and best bid submitted pursuant to competitive bidding under
    division (B) of this section.'
