- number: '306.331'
  heading: Board of trustees for joint county and municipal authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'Notwithstanding section 306.33 of the Revised Code, the board of trustees
    of any regional transit authority created by one county and two municipal corporations,
    with the county having a population of at least five hundred thousand according
    to the most recent federal census, shall be appointed and governed as provided
    in this section.

    The board of trustees of such a regional transit authority shall consist of nine
    members, six of whom shall be appointed by the board of county commissioners,
    two of whom shall be appointed by the most populous municipal corporation that
    is included in the regional transit authority, and one of whom shall be appointed
    by the second most populous municipal corporation in the county, regardless of
    whether the second most populous municipal corporation in the county is a member
    of the regional transit authority. A trustee appointed under this section shall
    serve at the pleasure of the appointing authority.

    The trustees of any authority first appointed under this section shall serve staggered
    terms. Thereafter each successor shall serve a term of three years, except that
    any person appointed to fill a vacancy shall be appointed to only the unexpired
    term. The resolutions or ordinances creating the regional transit authority may
    determine whether an appointed trustee is eligible for reappointment.

    A majority of the board of trustees constitutes a quorum, the affirmative vote
    of which is necessary for any action taken by the authority. No vacancy in the
    board shall impair the rights of a quorum to exercise all rights and perform all
    the duties of the authority.

    Each member of the board of trustees, before entering upon the trustee''s official
    duties, shall take and subscribe to an oath or affirmation that the trustee will
    honestly, faithfully, and impartially perform the duties of office and that the
    trustee will not be personally interested directly or indirectly in any contract
    let by the regional transit authority.

    After each member of the board has taken the oath as prescribed by this section,
    the board shall meet and organize by electing one of its members as president
    and another as vice-president, who shall hold their respective offices until the
    next annual meeting of the board as provided in its bylaws. At each annual meeting
    thereafter, the board shall elect from its membership a president and a vice-president
    who shall serve for a term of one year. The board shall hold regular and special
    meetings in a time, place, and manner established in its bylaws, provided that
    all meetings shall be open to the public except executive sessions as set forth
    in section 122.22 of the Revised Code.

    The board shall appoint and fix the compensation of a secretary-treasurer, who
    shall be the fiscal officer. The secretary-treasurer shall not be a member of
    the board and shall serve at the pleasure of the board. Each member of the board
    of trustees is entitled to receive from the regional transit authority reimbursement
    for reasonable expenses in the performance of the trustee''s duties.'
