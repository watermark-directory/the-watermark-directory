- number: '341.32'
  heading: Agreement for work camp services with other counties and municipal corporations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: The board of county commissioners of any county not having a county rehabilitation
    work camp or the legislative authority of any municipal corporation may agree
    upon the terms on which persons convicted of a misdemeanor by any court or magistrate
    of such county or municipal corporation may be received into a county rehabilitation
    work camp under sentence of such court or magistrate. Such board or legislative
    authority may pay the expenses, including the cost of transportation of prisoners,
    incurred under such agreement out of the general fund of such county or municipal
    corporation, upon the certificate of the proper officer of such county work rehabilitation
    camp.
