- number: '308.061'
  heading: Contract with prosecuting attorney
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: The board of trustees of a regional airport authority may contract with the
    prosecuting attorney of a county, as provided in section 309.09 of the Revised
    Code, to obtain legal services from the prosecuting attorney.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-308.061
- number: '308.07'
  heading: Eminent domain powers
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: '(A) The board of trustees of a regional airport authority may exercise the
    power of eminent domain to appropriate any land, rights, rights of way, franchises,
    easements, or other property, within or without the territorial boundaries of
    the regional airport authority, necessary or proper for the construction or efficient
    operation of any airport or airport facility or access thereto under its jurisdiction
    pursuant to the procedure provided in sections 163.01 to 163.22, inclusive, of
    the Revised Code, and subject to division (B) of this section.

    (B) No regional airport authority shall exercise the right of eminent domain to
    take or disturb property or facilities belonging to any political subdivision,
    public corporation, public utility, or common carrier, which property or facility
    is necessary and convenient in the operation of such political subdivision, public
    corporation, public utility, or common carrier unless provision is made for the
    restoration, relocation, or duplication of such property or facility, or upon
    the election of such political subdivision, public corporation, public utility,
    or common carrier, for the payment of compensation, if any, at the sole cost of
    the regional airport authority, provided:

    (1) If any restoration or duplication of any property or facility proposed to
    be made under this division involves a relocation of such property or facility
    the new facility and location thereof shall be of at least comparable utilitarian
    value and effectiveness and such relocation shall not impair the ability of the
    public utility or common carrier to compete in its original area of operation.

    (2) If any restoration or duplication of any property or facility proposed to
    be made under this division involves a relocation of such property or facility,
    the regional airport authority shall acquire no interest or right in or to the
    appropriated property or facility until the relocated property or facility is
    available for use and until marketable title thereto has been transferred to the
    public utility or common carrier.'
