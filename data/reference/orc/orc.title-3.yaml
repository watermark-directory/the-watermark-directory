- number: '307.39'
  heading: Publication of building regulations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'Building regulations, as adopted, amended, or changed by the board of county
    commissioners, shall be made available to the public at the office of the board,
    and the section numbers and a notice of the availability of such regulations shall
    be published within ten days after their adoption, amendment, or change, using
    at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation within
    the county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.'
