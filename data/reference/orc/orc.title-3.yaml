- number: '307.41'
  heading: Purchase or lease of motor vehicles
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Whenever the board of county commissioners deems it necessary to purchase
    or lease motor vehicles for its use, or for the use of any department, commission,
    board, office, or agency under its direct supervision, or for the use of any elected
    county official or his employees, it shall adopt a resolution setting forth the
    necessity for such purchase or lease, together with a statement of the kind and
    number of vehicles required and the estimated cost of purchasing or leasing each.
    Upon adoption of the resolution the board may purchase or lease such vehicles,
    subject to sections 307.86 to 307.92 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.41
- number: '307.42'
  heading: Use of vehicles to be regulated
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Motor vehicles purchased or leased as provided by section 307.41 of the Revised
    Code shall be for the use of the county commissioners or other county officials,
    their use to be subject to the regulation of the board of county commissioners.
    Vehicles shall be used by the officials, deputies, and employees in lieu of hiring
    vehicles unless the county vehicles are not available for such use. When vehicles
    are so purchased or leased, the board may purchase or lease supplies as are necessary.
    All vehicles shall be plainly and conspicuously lettered as the property of the
    county. No official or employee shall use or permit the use of any vehicle or
    any supplies for it, except in the transaction of public business or work of the
    county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.42
- number: '307.43'
  heading: Use of county vehicle except for official business prohibited
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: No person shall use or drive any automobile, motorcycle, or other conveyance
    owned, hired, or leased by the board of county commissioners for the use of any
    county official or employee, for any purpose other than the transaction of official
    business or in a ridesharing arrangement established in accordance with section
    1551.25 of the Revised Code.
