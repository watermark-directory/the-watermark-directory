- number: '308.24'
  heading: Airport development districts - expenditures
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: '(A) The expenditures of an airport development district may include the following:

    (1) The cost of creating and operating the district under this chapter, including
    creating and operating a nonprofit organization organized under this chapter,
    hiring employees and professional services, contracting for insurance, and purchasing
    or leasing office space or office equipment;

    (2) The cost of planning, designing, and implementing public infrastructure improvements
    that benefit the qualifying airport, including payment of architectural, engineering,
    legal, appraisal, insurance, consulting, energy auditing, and planning fees and
    expenses, and, for public services, the management, protection, and maintenance
    costs of public or private facilities;

    (3) The cost of airport advertising, airline recruitment, market research, ticket
    purchase guarantees, and incentives designed to attract or retain airlines, increase
    the number of scheduled flights to and from the qualifying airport, or increase
    use of the airport by aircraft having greater passenger capacity or greater first-class
    seating availability;

    (4) Any court costs incurred by the district in implementing the plan outlined
    in the articles of incorporation; and

    (5) Any damages resulting from implementing that plan.

    (B) The expenditures of an airport development district shall not include financing,
    in whole or in part, the acquisition of any interest in property by a regional
    airport authority, port authority, or municipal corporation using the power of
    condemnation or eminent domain pursuant to Section 19 of Article I, Ohio Constitution,
    or any costs associated with such an acquisition.

    (C) The board of directors of an airport development district is subject to the
    same competitive bidding and prevailing wage rules and procedures that apply to
    the board of trustees of the regional airport authority, the board of directors
    of the port authority, or the legislative authority of the municipal corporation
    that owns, operates, or maintains the qualifying airport.'
