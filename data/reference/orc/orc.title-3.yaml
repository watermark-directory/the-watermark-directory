- number: '323.42'
  heading: Recovering advances or expenses
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: Each attorney, agent, guardian, or executor seized or having the care of lands
    who is subjected to any trouble or expense in paying the taxes thereon, or advances
    his own money for listing or paying the taxes thereon, shall be allowed a reasonable
    compensation for the time spent, the expenses incurred, and the money advanced,
    which shall be a just charge against the person for whose benefit it was advanced.
