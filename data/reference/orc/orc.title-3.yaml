- number: '303.13'
  heading: County board of zoning appeals - term - compensation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'In any county which adopts zoning regulations the board of county commissioners
    shall appoint a county board of zoning appeals composed of five members who shall
    be residents of the unincorporated territory in the county included in the area
    zoned, not more than two of whom shall be from any one township if the area zoned
    includes three or more townships. The board of county commissioners may appoint
    two alternate members to the county board of zoning appeals, for terms to be determined
    by the board of county commissioners. An alternate member shall take the place
    of an absent regular member at any meeting of the board of zoning appeals, according
    to procedures prescribed by resolution by the board of county commissioners. An
    alternate member shall meet the same appointment criteria as a regular member.
    When attending a meeting on behalf of an absent member, the alternate member may
    vote on any matter on which the absent member is authorized to vote. The terms
    of all regular members shall be of such length and so arranged that the term of
    one member will expire each year. Each regular or alternate member shall serve
    until the member''s successor is appointed and qualified. Members may be removed
    for the same causes and in the same manner as provided by section 303.04 of the
    Revised Code. Vacancies shall be filled by the board of county commissioners and
    shall be for the unexpired term. The members may be allowed their expenses, or
    such compensation, or both, as the board of county commissioners may approve and
    provide.

    The board of zoning appeals may, within the limits of the moneys appropriated
    by the board of county commissioners for the purpose, employ such executive, professional,
    technical, and other assistants as it considers necessary.'
