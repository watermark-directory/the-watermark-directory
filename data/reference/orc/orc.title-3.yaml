  url: https://codes.ohio.gov/ohio-revised-code/section-340.04
- number: '340.041'
  heading: Executive director powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: 'In addition to such other duties as may be lawfully imposed, the executive
    director of a board of alcohol, drug addiction, and mental health services shall:

    (A) Serve as executive officer of the board and, subject to the prior approval
    of the board for each contract, except contracts, if any, to which division (F)
    of section 340.03 of the Revised Code applies, execute contracts on its behalf;

    (B) Supervise addiction services, mental health services, recovery supports, and
    facilities provided, operated, contracted, or supported by the board to the extent
    of determining that services, supports, and facilities are being administered
    in conformity with this chapter and rules of the director of behavioral health;

    (C) Provide consultation to community addiction services providers and community
    mental health services providers;

    (D) Recommend to the board the changes necessary to increase the effectiveness
    of addiction services, mental health services, and recovery supports and other
    matters necessary or desirable to carry out this chapter;

    (E) Employ and remove from office such employees and consultants in the classified
    civil service and, subject to the approval of the board, employ and remove from
    office such other employees and consultants as may be necessary for the work of
    the board, and fix their compensation and reimbursement within the limits set
    by the salary schedule and the budget approved by the board;

    (F) Encourage the development and expansion of preventive, treatment, and consultative
    services, as well as recovery supports, in the fields of addiction services and
    mental health services with emphasis on continuity of care;

    (G) Prepare for board approval an annual report of the addiction services, mental
    health services, recovery supports, and facilities under the jurisdiction of the
    board, including a fiscal accounting of all services and supports;

    (H) Conduct such studies and activities as may be necessary and practicable for
    the promotion of mental health, the promotion of addiction services, and the prevention
    of mental illness, emotional disorders, and addiction, including developing and
    disseminating informational materials to educate the public about mental illness
    and addiction treatment and prevention and the availability of services and supports;

    (I) Authorize the county auditor, or in a joint-county district the county auditor
    designated as the auditor for the district, to issue warrants for the payment
    of board obligations approved by the board, provided that all payments from funds
    distributed to the board by the department of behavioral health are in accordance
    with the budget submitted pursuant to section 340.08 of the Revised Code, as approved
    by the department of behavioral health.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
