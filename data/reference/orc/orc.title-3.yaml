- number: '305.32'
  heading: Separate petition papers
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: 'Any referendum petition may be presented in separate petition papers, but
    each petition paper shall contain a full and correct copy of the title and text
    of the resolution or rule sought to be referred. Referendum petitions shall be
    governed by the rules of section 3501.38 of the Revised Code. In determining the
    validity of any such petition, all signatures which are found to be irregular
    shall be rejected, but no petition shall be declared invalid in its entirety when
    one or more signatures are found to be invalid except when the number of valid
    signatures is found to be less than the total number required by section 305.31
    of the Revised Code.

    The petitions and signatures upon such petitions shall be prima-facie presumed
    to be in all respects sufficient. No resolution submitted to the electors of any
    county, and receiving an affirmative majority of the votes cast thereon, shall
    be held ineffective or void on account of the insufficiency of the petitions by
    which such submission of the resolution was procured, nor shall the rejection,
    by a majority of the votes cast thereon, of any resolution submitted to the electors
    of such county, be held invalid for such insufficiency. No rule submitted to the
    electors of the county, and receiving a majority of the votes cast against repeal,
    shall be held invalid or void on account of the insufficiency of the petitions
    by which such submission was procured, nor shall the repeal, by approval of a
    majority voting for repeal, be held invalid for such insufficiency.

    Resolutions receiving an affirmative majority of the votes cast thereon, shall
    become effective on the first day of the month following certification by the
    board of elections of the official vote on such question.'
