- number: '306.37'
  heading: Issuing revenue bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'A regional transit authority which proposes to acquire by purchase or otherwise,
    or proposes to construct, replace, improve, extend, enlarge, maintain, or operate
    any transit facility, and desires to raise money for any one or more of such purposes
    or for the purpose of repaying or refunding any outstanding issue of bonds of
    the regional transit authority or pay any obligation assumed by it or of repaying
    or refunding any outstanding issue of bonds or notes of any political subdivision
    issued to acquire, construct, replace, improve, extend, enlarge, or maintain any
    transit facility acquired by the regional transit authority or repay any advances
    or loans made to the regional transit authority by any person or political subdivision,
    may issue revenue bonds therefor which bonds shall not be secured by the general
    credit of the regional transit authority or by the general credit of the state
    or any political subdivision.

    Such revenue bonds shall have all the qualities of negotiable instruments and
    shall be secured only by a pledge of and a lien on the revenues of the regional
    transit authority derived from rentals, fees, rates, charges, the authority''s
    allocation of a tax levied under section 5739.026 of the Revised Code, all or
    any portion of a tax levied under section 5739.023 of the Revised Code by the
    authority, or other revenues from any transit facility of the regional transit
    authority as are designated in said resolution, including but not limited to the
    transit facility to be acquired, constructed, replaced, improved, extended, enlarged,
    or maintained with the proceeds of said bond issue, after provision only for the
    reasonable cost of operating and maintaining the transit facility of the regional
    transit authority so designated.

    Said bonds shall further be secured by the covenant of the regional transit authority
    to maintain such rentals, fees, rates, charges, or other revenues as will produce
    revenues sufficient to meet costs of operating and maintaining such transit facility,
    to meet the interest, principal, and other requirements of such bonds, and to
    establish and maintain reserves for the foregoing purposes, and may be secured
    by a mortgage on any real property or interests therein acquired from the proceeds
    of such revenue bonds. The authority may not repeal, rescind, or reduce any portion
    of a sales tax levied under section 5739.023 of the Revised Code pledged to the
    payment of debt charges on such bonds while such bonds remain outstanding, and
    no portion of the tax pledged to the payment of debt charges on such bonds is
    subject to repeal or reduction by the electors of the authority or by the authority
    while such bonds are outstanding.'
