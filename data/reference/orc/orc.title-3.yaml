    name: Board of County Commissioners - Powers
  text: The award of all contracts subject to sections 307.86 to 307.92 of the Revised
    Code shall be made to the lowest and best bidder. The bond or bid guaranty of
    all unsuccessful bidders shall be returned to them by the contracting authority
    immediately upon awarding the contract or rejection of all bids. The contracting
    authority may reject all bids.
