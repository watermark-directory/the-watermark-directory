- number: '306.354'
  heading: Scope of activities for certain regional transit authorities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) As used in this section, "metropolitan planning organization" has the
    same meaning as in section 5552.01 of the Revised Code.

    (B) This section applies to a regional transit authority the territory of which
    includes a county having a population of more than one million three hundred thousand.

    (C) A regional transit authority to which this section applies may do any of the
    following:

    (1) In addition to the purposes specified in division (J) of section 306.35 of
    the Revised Code, conduct the activities authorized in that division in furtherance
    of transit-oriented development activities that enhance, foster, aid, provide,
    or promote transportation, economic development, housing, recreation, education,
    governmental operations, culture, or research within the jurisdiction of the regional
    transit authority;

    (2) Use the proceeds of a tax levied under section 5739.023 of the Revised Code
    for the general construction or maintenance of roads, bridges, greenways, pathways,
    bikeways, or pedestrian underpasses or overpasses related to the provision of
    service by the regional transit authority that do not otherwise constitute a transit
    facility;

    (3) Use the proceeds of a tax levied under section 5739.023 of the Revised Code
    or any other revenue of the regional transit authority for either or both of the
    following:

    (a) Demand responsive transportation or subscription services, right of way improvements,
    utilities, and communication infrastructure that do not otherwise constitute a
    transit facility;

    (b) Improvements or facilities that do not otherwise constitute a transit facility
    and for which the regional transit authority has received financing or aid under
    any federal or state program.

    (D) Prior to funding projects described in division (C)(2) of this section, a
    regional transit authority shall enter into agreements with the applicable counties,
    municipal corporations, and townships located within the regional transit authority''s
    territorial boundaries to fund such projects.

    (1) The regional transit authority shall submit each agreement for approval to
    the governing board of the applicable designated metropolitan planning organization.

    (2) The metropolitan planning organization shall, on at least an annual basis,
    review and approve or deny any agreement submitted to it by an affirmative vote
    of its governing board and shall notify the regional transit authority of the
    approval or denial.

    (3) The regional transit authority shall expend funds only as authorized in an
    approved agreement.'
