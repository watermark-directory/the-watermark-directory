- number: '311.29'
  heading: Contracts for police services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) As used in this section:

    (1) "Chartered nonpublic school" has the same meaning defined in section 3310.01
    of the Revised Code.

    (2) "Chautauqua assembly" has the same meaning as in section 4511.90 of the Revised
    Code.

    (3) "Community preventative education program" has the meaning defined in division
    (D) of section 2981.13 of the Revised Code.

    (4) "Community school" means a community school established under Chapter 3314.
    of the Revised Code.

    (B) The sheriff may, from time to time, enter into contracts with any municipal
    corporation, township, township police district, joint police district, metropolitan
    housing authority, port authority, water or sewer district, school district, community
    school governing authority, library district, health district, park district created
    pursuant to section 511.18 or 1545.01 of the Revised Code, soil and water conservation
    district, water conservancy district, or other taxing district or with the board
    of county commissioners of any contiguous county with the concurrence of the sheriff
    of the other county, and such subdivisions, authorities, and counties may enter
    into agreements with the sheriff pursuant to which the sheriff undertakes and
    is authorized by the contracting subdivision, authority, or county to perform
    any police function, exercise any police power, or render any police service in
    behalf of the contracting subdivision, authority, or county, or its legislative
    authority, that the subdivision, authority, or county, or its legislative authority,
    may perform, exercise, or render.

    Upon the execution of an agreement under this division and within the limitations
    prescribed by it, the sheriff may exercise the same powers as the contracting
    subdivision, authority, or county possesses with respect to such policing that
    by the agreement the sheriff undertakes to perform or render, and all powers necessary
    or incidental thereto, as amply as such powers are possessed and exercised by
    the contracting subdivision, authority, or county directly.

    Any agreement authorized by division (A), (B), or (C) of this section shall not
    suspend the possession by a contracting subdivision, authority, or county of any
    police power performed or exercised or police service rendered in pursuance to
    the agreement nor limit the authority of the sheriff.

    (C) The sheriff may enter into contracts with any Chautauqua assembly that has
    grounds located within the county, and the Chautauqua assembly may enter into
    agreements with the sheriff pursuant to which the sheriff undertakes to perform
    any police function, exercise any police power, or render any police service upon
    the grounds of the Chautauqua assembly that the sheriff is authorized by law to
    perform, exercise, or render in any other part of the county within the sheriff''s
    territorial jurisdiction. Upon the execution of an agreement under this division,
    the sheriff may, within the limitations prescribed by the agreement, exercise
    such powers with respect to such policing upon the grounds of the Chautauqua assembly,
    provided that any limitation contained in the agreement shall not be construed
    to limit the authority of the sheriff.

    (D) Contracts entered into under division (A), (B), (C), or (F) of this section
    shall provide for the reimbursement of the county for the costs incurred by the
    sheriff for such policing including, but not limited to, the salaries of deputy
    sheriffs assigned to such policing, the current costs of funding retirement pensions
    and of providing workers'' compensation, the cost of training, and the cost of
    equipment and supplies used in such policing, to the extent that such equipment
    and supplies are not directly furnished by the contracting subdivision, authority,
    county, or Chautauqua assembly. Each such contract shall provide for the ascertainment
    of such costs and shall be of any duration, not in excess of four years, and may
    contain any other terms that may be agreed upon. All payments pursuant to any
    such contract in reimbursement of the costs of such policing shall be made to
    the treasurer of the county to be credited to a special fund to be known as the
    "sheriff''s policing revolving fund," hereby created. Any moneys coming into the
    fund shall be used for the purposes provided in divisions (A) to (D) and (F) of
    this section and paid out on vouchers by the county commissioners as other funds
    coming into their possession. Any moneys credited to the fund and not obligated
    at the termination of the contract shall be credited to the county general fund.

    The sheriff shall assign the number of deputies as may be provided for in any
    contract made pursuant to division (A), (B), (C), or (F) of this section. The
    number of deputies regularly assigned to such policing shall be in addition to
    and an enlargement of the sheriff''s regular number of deputies. Nothing in divisions
    (A) to (D) or (F) of this section shall preclude the sheriff from temporarily
    increasing or decreasing the deputies so assigned as emergencies indicate a need
    for shifting assignments to the extent provided by the contracts.

    All such deputies shall have the same powers and duties, the same qualifications,
    and be appointed and paid and receive the same benefits and provisions and be
    governed by the same laws as all other deputy sheriffs.

    Contracts under division (A), (B), (C), or (F) of this section may be entered
    into jointly with the board of county commissioners, and sections 307.14 to 307.19
    of the Revised Code apply to this section insofar as they may be applicable.

    (E)(1) As used in division (E) of this section:

    (a) "Ohio prisoner" has the same meaning as in section 5120.64 of the Revised
    Code.

    (b) "Out-of-state prisoner" and "private contractor" have the same meanings as
    in section 9.07 of the Revised Code.

    (2) The sheriff may enter into a contract with a private person or entity for
    the return of Ohio prisoners who are the responsibility of the sheriff from outside
    of this state to a location in this state specified by the sheriff, if there are
    adequate funds appropriated by the board of county commissioners and there is
    a certification pursuant to division (D) of section 5705.41 of the Revised Code
    that the funds are available for this purpose. A contract entered into under this
    division is within the coverage of section 325.07 of the Revised Code. If a sheriff
    enters into a contract as described in this division, subject to division (E)(3)
    of this section, the private person or entity in accordance with the contract
    may return Ohio prisoners from outside of this state to locations in this state
    specified by the sheriff. A contract entered into under this division shall include
    all of the following:

    (a) Specific provisions that assign the responsibility for costs related to medical
    care of prisoners while they are being returned that is not covered by insurance
    of the private person or entity;

    (b) Specific provisions that set forth the number of days, not exceeding ten,
    within which the private person or entity, after it receives the prisoner in the
    other state, must deliver the prisoner to the location in this state specified
    by the sheriff, subject to the exceptions adopted as described in division (E)(2)(c)
    of this section;

    (c) Any exceptions to the specified number of days for delivery specified as described
    in division (E)(2)(b) of this section;

    (d) A requirement that the private person or entity immediately report all escapes
    of prisoners who are being returned to this state, and the apprehension of all
    prisoners who are being returned and who have escaped, to the sheriff and to the
    local law enforcement agency of this state or another state that has jurisdiction
    over the place at which the escape occurs;

    (e) A schedule of fines that the sheriff shall impose upon the private person
    or entity if the private person or entity fails to perform its contractual duties,
    and a requirement that, if the private person or entity fails to perform its contractual
    duties, the sheriff shall impose a fine on the private person or entity from the
    schedule of fines and, in addition, may exercise any other rights the sheriff
    has under the contract.

    (f) If the contract is entered into on or after the effective date of the rules
    adopted by the department of rehabilitation and correction under section 5120.64
    of the Revised Code, specific provisions that comport with all applicable standards
    that are contained in those rules.

    (3) If the private person or entity that enters into the contract fails to perform
    its contractual duties, the sheriff shall impose upon the private person or entity
    a fine from the schedule, the money paid in satisfaction of the fine shall be
    paid into the county treasury, and the sheriff may exercise any other rights the
    sheriff has under the contract. If a fine is imposed under this division, the
    sheriff may reduce the payment owed to the private person or entity pursuant to
    any invoice in the amount of the fine.

    (4) Upon the effective date of the rules adopted by the department of rehabilitation
    and correction under section 5120.64 of the Revised Code, notwithstanding the
    existence of a contract entered into under division (E)(2) of this section, in
    no case shall the private person or entity that is a party to the contract return
    Ohio prisoners from outside of this state into this state for a sheriff unless
    the private person or entity complies with all applicable standards that are contained
    in the rules.

    (5) Divisions (E)(1) to (4) of this section do not apply regarding any out-of-state
    prisoner who is brought into this state to be housed pursuant to section 9.07
    of the Revised Code in a correctional facility in this state that is managed and
    operated by a private contractor.

    (F)(1) A sheriff may enter into contracts with a chartered nonpublic school, located
    in the sheriff''s territorial jurisdiction, to provide community preventive education
    programs.

    (2) A sheriff may enter into contracts with a private institution of higher education,
    located in the sheriff''s territorial jurisdiction, to provide police services.

    Under these contracts, the sheriff may undertake to perform any police function,
    exercise any police power, or render any police service upon the grounds of the
    chartered nonpublic school or private institution of higher education that the
    sheriff is authorized by law to perform, exercise, or render in any other part
    of the county within the sheriff''s territorial jurisdiction. Upon the execution
    of a contract under this division, the sheriff may, within the limitations prescribed
    by the contract, exercise such powers with respect to such policing provided that
    any limitation contained in the contract shall not be construed to limit the authority
    of the sheriff.

    (G) A sheriff may enter into contracts with a county court or a municipal court
    located in the sheriff''s territorial jurisdiction for the transportation of persons
    between the county jail and a county court or municipal court. Each contract shall
    provide for the costs of providing transportation services from the county jail
    to the court and shall not apply to a period in excess of four years.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.29
- number: '311.30'
  heading: Parking enforcement unit
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) The board of county commissioners may establish, by resolution, a parking
    enforcement unit within the office of the sheriff to operate in the unincorporated
    areas of the county, and may provide for the regulation of parking enforcement
    officers. The sheriff shall be the executive head of the parking enforcement unit,
    shall make all appointments and removals of parking enforcement officers, subject
    to any general rules prescribed by the board of county commissioners by resolution,
    and shall prescribe rules for the organization, training, administration, control,
    and conduct of the parking enforcement unit. The sheriff may appoint parking enforcement
    officers who agree to serve for nominal compensation, and persons with physical
    disabilities may receive appointments as parking enforcement officers.

    (B) The authority of the parking enforcement officers shall be limited to the
    enforcement of section 4511.69 of the Revised Code and any other parking laws
    specified in the resolution creating the parking enforcement unit. Parking enforcement
    officers shall have no other powers.

    (C) The training the parking enforcement officers shall receive shall include
    instruction in general administrative rules and procedures governing the parking
    enforcement unit, the role of the judicial system as it relates to parking regulation
    and enforcement, proper techniques and methods relating to the enforcement of
    parking laws, human interaction skills, and first aid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.30
- number: '311.31'
  heading: Voluntary motor vehicle decal registration program
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) The board of county commissioners of a county may establish, by resolution,
    a voluntary motor vehicle decal registration program to be controlled and conducted
    by the sheriff within the unincorporated areas of the county. The board may establish
    a fee for participation in the program in an amount sufficient to cover the cost
    of administering the program and the cost of the decals. The board shall coordinate
    its program with any pre-existing program established by a township located within
    the county under section 505.67 of the Revised Code.

    (B) Any resident of the county may enroll a motor vehicle that the resident owns
    in the program by signing a consent form, displaying the decal issued under this
    section, and paying the prescribed fee. The motor vehicle owner shall remove the
    decal to withdraw from the program and also prior to the sale or transfer of ownership
    of the vehicle. Any law enforcement officer may conduct, at any place within this
    state at which the officer would be permitted to arrest the person operating the
    vehicle, an investigatory stop of any motor vehicle displaying a decal issued
    under this section when the vehicle is being driven between the hours of one a.m.
    and five a.m. A law enforcement officer may conduct an investigatory stop under
    this division regardless of whether the officer observes a violation of law involving
    the vehicle or whether the officer has probable cause to believe that any violation
    of law involving the vehicle has occurred.

    (C) The consent form required under division (B) of this section shall:

    (1) Describe the conditions for participation in the program, including a description
    of an investigatory stop and a statement that any law enforcement officer may
    conduct, at any place within this state at which the officer would be permitted
    to arrest the person operating the vehicle, an investigatory stop of the motor
    vehicle when it is being driven between the hours of one a.m. and five a.m.

    (2) Contain other information identifying the vehicle and owner as the sheriff
    considers necessary.

    (D) The state director of public safety, in accordance with Chapter 119. of the
    Revised Code, shall adopt rules governing the color, size, and design of decals
    issued under this section and the location where the decals shall be displayed
    on vehicles that are enrolled in the program.

    (E) Divisions (A) to (D) of this section do not require a law enforcement officer
    to conduct an investigatory stop of a vehicle displaying a decal issued under
    this section.

    (F) As used in this section:

    (1) "Investigatory stop" means a temporary stop of a motor vehicle and its operator
    and occupants for purposes of determining the identity of the person who is operating
    the vehicle and, if the person who is operating it is not its owner, whether any
    violation of law has occurred or is occurring. An "investigatory stop" is not
    an arrest, but, if an officer who conducts an investigatory stop determines that
    illegal conduct has occurred or is occurring, an "investigatory stop" may be the
    basis for an arrest.

    (2) "Law enforcement officer" means a sheriff, deputy sheriff, constable, police
    officer of a township or joint police district, marshal, deputy marshal, municipal
    police officer, or state highway patrol trooper.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.31
- number: '311.37'
  heading: Regulation of transient vendors
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: '(A) No transient vendor, as defined in section 5739.17 of the Revised Code,
    who obtains a transient vendor''s license pursuant to section 5739.17 of the Revised
    Code, intending to provide goods and services of a retail value of more than five
    hundred dollars, shall negligently fail to file with the county sheriff all of
    the following before doing business as a transient vendor anywhere in that county:

    (1) Proof of the transient vendor''s identity and proof that a transient vendor''s
    license has been obtained in this state;

    (2) A statement describing the goods or services to be provided by the transient
    vendor and an estimate of the amount of the goods or services that the vendor
    expects to sell in that county, as documented by invoices indicating the wholesale
    value of goods to be sold;

    (3) The transient vendor''s permanent business address;

    (4) The times and days during which, and the temporary places of business, as
    defined in section 5739.17 of the Revised Code, at which the transient vendor
    plans to do business in that county.

    (B) The sheriff shall maintain a record of the information required under division
    (A) of this section for a period of two years, which shall be open to the inspection
    of any person. The sheriff shall be allowed a fee of up to one hundred dollars
    for collection of the bond required by this section. The bond shall be fifty per
    cent of the wholesale value of the goods and services provided, but in no case
    shall the bond exceed ten thousand dollars. The bond shall be in a form approved
    by the attorney general. The bond shall remain in effect for two years after the
    transient vendor last does business in that county.

    (C) No transient vendor, as defined in section 5739.17 of the Revised Code, intending
    to provide goods and services of a retail value of more than five hundred dollars,
    shall negligently fail to file a bond within ten days before doing business as
    a transient vendor anywhere in that county.

    (D) The bond filed by any transient vendor pursuant to this section shall be given
    to the attorney general by the county sheriff within ten working days after a
    transient vendor ceases to do business in that county, and shall be in favor of
    the state for the benefit of any person who suffers loss or damage as a result
    of the purchase of goods from the transient vendor or as the result of the negligent
    or intentionally tortious acts of the transient vendor in the conduct of business
    in the county. The bond may be used to compensate any state or local agency for
    damages caused by the transient vendor, for costs incurred by the agency for the
    illegal acts of the transient vendor, or for failure to pay any amount owed by
    the transient vendor to the state or local agency. The bond also may be used to
    compensate the state for any sales tax not paid by the transient vendor. Except
    for the amount of unpaid sales taxes to be deducted from the bond, if any, the
    attorney general shall pay any portion of the bond to any person or agency in
    accordance with the order of a court without making an independent finding as
    to the amount of the bond that is payable to that person or agency.

    (E) This section does not apply to any of the following:

    (1) A transient vendor making retail sales at a temporary exhibition, show, fair,
    world trade center, flea market, or similar event, as permitted by section 5739.17
    of the Revised Code;

    (2) Any nonprofit corporation, community chest, fund, or foundation organized
    and operated exclusively for religious, charitable, scientific, literary, or educational
    purposes when no part of the entity''s earnings benefit any private shareholder
    or individual;

    (3) Any person who operates a permanent business in this state, occupies temporary
    premises, and prominently displays the permanent business'' name and permanent
    address while business is conducted from the temporary premises.

    (4) Any person who sells goods by sample, brochure, or catalog for future delivery
    or any person who makes sales as the result of the invitation of an owner or occupant
    of a residence to the person.

    (5) Any person who sells handmade or handcrafted items, or who sells fresh farm
    produce.

    Nothing in this section shall prohibit the legislative authority of a municipal
    corporation from adopting an ordinance regulating transient vendors, as defined
    in section 5739.17 of the Revised Code, except that a municipal corporation may
    not require a transient vendor who obtains a bond in compliance with this section
    to obtain or pay for any additional bond or require that persons exempt pursuant
    to division (E) of this section obtain a bond. A municipal corporation may require
    that a transient vendor exhibit the transient vendor''s license and any proof
    of bond required to such officer or employee of the municipal corporation as the
    municipal corporation designates by ordinance.'
