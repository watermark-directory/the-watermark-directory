- number: '305.26'
  heading: May release or compound claims
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: The board of county commissioners may compound or release, in whole or in
    part, a debt, judgment, fine, or amercement due the county and for the use thereof,
    except where it or any of its members is personally interested. In such case the
    board shall enter upon its journal a statement of the facts in the case and the
    reasons for such release or composition.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.26
- number: '305.27'
  heading: Interest in county contracts prohibited - exception
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: 'No county commissioner shall be concerned, directly or indirectly, in any
    contract for work to be done or material to be furnished for the county. For a
    violation of this section, a commissioner shall forfeit not less than two hundred
    nor more than two thousand dollars, to be recovered by a civil action, in the
    name of the state, for use of the county. Such commissioner shall also forfeit,
    in like manner, any compensation he may have received on such contract.

    This section does not apply where a commissioner, being a shareholder of a corporation
    but not an officer or director, owns not in excess of five per cent of the stock
    of such corporation and the value of the stock so owned does not exceed five hundred
    dollars. If a stockholder desires to avail himself of the exception provided in
    this section, before entering upon such contract he shall first file with the
    clerk of the board of commissioners an affidavit stating his exact status and
    connection with such corporation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.27
- number: '305.28'
  heading: Criminal justice regional information fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: If a board of county commissioners by resolution elects to participate in
    a criminal justice regional information system as provided in section 2949.093
    of the Revised Code, the board also shall create in its county treasury a criminal
    justice regional information fund. All money deposited into the fund shall be
    used only as provided in that section.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.28
- number: '305.29'
  heading: County administrator - appointment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: 'The board of county commissioners may appoint a county administrator, who
    shall be the administrative head of the county under the direction and supervision
    of the board and who shall hold office at the pleasure of the board.

    In the event that the county administrator is absent from his office by reason
    of illness, death, vacation, resignation, or removal, the chairman of the board
    or a qualified person designated by him with the approval of the board shall act
    as county administrator and perform all duties of such office, until such time
    as the county administrator returns to his duties or the board appoints a new
    county administrator to fill the vacancy.

    The board shall fix the salary of the county administrator and cause the same
    to be paid.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.29
- number: '305.30'
  heading: County administrator - powers and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: 'The county administrator, under the direction of the board of county commissioners,
    shall do the following:

    (A) Assist in the administration, enforcement, and execution of the policies and
    resolutions of the board;

    (B) Supervise and direct the activities of the affairs of the divisions of county
    government under the control or jurisdiction of the board;

    (C) Attend all meetings of the board at which the administrator''s attendance
    is required by that body;

    (D) Recommend measures for adoption to the board;

    (E) Prepare and submit to the board reports required by that body, or reports
    that it considers advisable;

    (F) Keep the board fully advised on the financial conditions of the county, preparing
    and submitting a budget for the next fiscal year;

    (G) Contract on behalf of the board within limits provided by a resolution of
    the board, provided that the resolution authorizing such actions shall also specify
    the types of contracts upon which the administrator may act without further resolution
    of the board;

    (H) Allow and pay claims for goods received and services rendered within limits
    provided by a resolution of the board, provided that the county department receiving
    those goods and services certifies their receipt before the administrator allows
    the claim;

    (I) Perform any or all personnel functions otherwise conferred or incumbent upon
    the board of county commissioners under Chapter 124. or any other chapter or section
    of the Revised Code, provided that the board, by resolution, has delegated the
    specific functions to the administrator;

    (J) Perform any or all functions conferred or incumbent upon the board of county
    commissioners in the case of a disaster or emergency, provided that the board,
    by resolution, has delegated the specific functions or all of the functions to
    the administrator. As used in this division, "disaster" and "emergency" have the
    same meanings as in divisions (E) and (F) of section 5502.21 of the Revised Code.

    (K) Perform such additional duties as the board may determine by resolution.

    The board of county commissioners may assign to such county administrator any
    office, position, or duties under its control, such office, position, and duties
    to be performed under the direction and supervision of the board and to be in
    addition to those set forth in this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.30
- number: '305.31'
  heading: Procedure for submitting to referendum resolution on additional tax
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: 'The procedure for submitting to a referendum a resolution adopted by a board
    of county commissioners under division (H) of section 307.695 of the Revised Code
    that is not submitted to the electors of the county for their approval or disapproval;
    any resolution adopted by a board of county commissioners pursuant to division
    (D)(1) of section 307.697, section 322.02, or 322.06, sections 940.32 and 940.35,
    division (B)(1) of section 4301.421, section 4504.02, 5739.021, or 5739.026, division
    (F), (J), or (U) of section 5739.09, section 5741.021 or 5741.023, or division
    (C)(1) of section 5743.024 of the Revised Code; or a rule adopted pursuant to
    section 307.79 of the Revised Code shall be as prescribed by this section.

    Except as otherwise provided in this paragraph, when a petition, signed by ten
    per cent of the number of electors who voted for governor at the most recent general
    election for the office of governor in the county, is filed with the county auditor
    within thirty days after the date the resolution is passed or rule is adopted
    by the board of county commissioners, or is filed within forty-five days after
    the resolution is passed, in the case of a resolution adopted pursuant to section
    5739.021 of the Revised Code that is passed within one year after a resolution
    adopted pursuant to that section has been rejected or repealed by the electors,
    requesting that the resolution be submitted to the electors of the county for
    their approval or rejection, the county auditor shall, after ten days following
    the filing of the petition, and not later than four p.m. of the ninetieth day
    before the day of election, transmit a certified copy of the text of the resolution
    or rule to the board of elections. In the case of a petition requesting that a
    resolution adopted under division (D)(1) of section 307.697, division (B)(1) of
    section 4301.421, or division (C)(1) of section 5743.024 of the Revised Code be
    submitted to electors for their approval or rejection, the petition shall be signed
    by seven per cent of the number of electors who voted for governor at the most
    recent election for the office of governor in the county. The county auditor shall
    transmit the petition to the board together with the certified copy of the resolution
    or rule. The board shall examine all signatures on the petition to determine the
    number of electors of the county who signed the petition. The board shall return
    the petition to the auditor within ten days after receiving it, together with
    a statement attesting to the number of such electors who signed the petition.
    The board shall submit the resolution or rule to the electors of the county, for
    their approval or rejection, at the succeeding general election held in the county
    in any year, or on the day of the succeeding primary election held in the county
    in even-numbered years, occurring subsequent to ninety days after the auditor
    certifies the sufficiency and validity of the petition to the board of elections.

    No resolution shall go into effect until approved by the majority of those voting
    upon it. However, a rule shall take effect and remain in effect unless and until
    a majority of the electors voting on the question of repeal approve the repeal.
    Sections 305.31 to 305.41 of the Revised Code do not prevent a county, after the
    passage of any resolution or adoption of any rule, from proceeding at once to
    give any notice or make any publication required by the resolution or rule.

    The board of county commissioners shall make available to any person, upon request,
    a certified copy of any resolution or rule subject to the procedure for submitting
    a referendum under sections 305.31 to 305.42 of the Revised Code beginning on
    the date the resolution or rule is adopted by the board. The board may charge
    a fee for the cost of copying the resolution or rule.

    As used in this section, "certified copy" means a copy containing a written statement
    attesting that it is a true and exact reproduction of the original resolution
    or rule.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
