- number: '340.011'
  heading: Interpretation and construction
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: '(A) This chapter shall be interpreted to accomplish all of the following:

    (1) Establish a unified system of treatment and supports for persons with mental
    illnesses and persons with addictions;

    (2) Establish a community prevention, treatment, and support system that is available
    for use in every alcohol, drug addiction, and mental health service district;

    (3) Protect the personal liberty of persons with mental illnesses and persons
    with addictions so that they may be treated in the least restrictive environment;

    (4) Encourage the development of high-quality, cost-effective, and comprehensive
    services, including culturally sensitive services;

    (5) Foster the development of comprehensive community addiction and mental health
    services and supports, based on recognized local needs, especially for persons
    with severe addictions and severe mental illnesses;

    (6) Ensure that services provided meet minimum standards established by the director
    of behavioral health;

    (7) Promote the delivery of high-quality and cost-effective addiction and mental
    health services;

    (8) Promote the participation of persons receiving mental health services and
    addiction services in the planning, delivery, and evaluation of these services.

    (B) Nothing in Chapter 340., 5119., or 5122. of the Revised Code shall be construed
    as requiring a board of county commissioners to provide resources beyond the total
    amount set forth in a budget and list of addiction services, mental health services,
    and recovery supports required by section 340.08 of the Revised Code and approved
    by the department of behavioral health under section 5119.22 of the Revised Code.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
