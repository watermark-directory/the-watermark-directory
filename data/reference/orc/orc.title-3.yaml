- number: '329.40'
  heading: Formation of joint county department of job and family services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A)(1) The boards of county commissioners of any two or more counties, by
    entering into a written agreement, may form a joint county department of job and
    family services to perform the duties, provide the services, and operate the programs
    required under this chapter. The agreement shall be ratified by resolution of
    the board of county commissioners of each county that entered into the agreement.
    Each board of county commissioners that enters into an agreement shall give notice
    of the agreement to the Ohio department of job and family services at least ninety
    days before the agreement''s effective date. The agreement shall take effect not
    earlier than the first day of the calendar quarter following the ninety-day notice
    period. The director of job and family services shall adopt, as an internal management
    rule under section 111.15 of the Revised Code, the form in which the notice shall
    be given.

    (2) The boards of county commissioners of the counties forming a joint county
    department shall constitute, collectively, the board of directors of the joint
    county department of job and family services. On the effective date of the agreement,
    the board of directors shall take control of and manage the joint county department
    subject to this chapter and all other sections of the Revised Code that govern
    the authority and responsibilities of a single board of county commissioners in
    the operation of a single county department of job and family services.

    (B)(1) An agreement to establish a joint county department shall specify all of
    the following:

    (a) The obligations of each board of county commissioners in operating the joint
    county department, including requiring each board to provide state, federal, and
    county funds to the operation of the joint county department and the schedule
    for provision of those funds;

    (b) How and which facilities, equipment, and personnel will be shared;

    (c) Procedures for the division of resources and obligations if one or more counties
    withdraw from the joint county department or the department ceases to exist;

    (d) Any contributions of participating counties establishing the joint county
    department and the rights of those counties in lands or personal property, or
    rights or interests therein, contributed to or otherwise acquired by the joint
    county department.

    (2) An agreement to establish a joint county department may set forth any or all
    of the following:

    (a) Quality, timeliness, and other standards to be met by each county;

    (b) Which family service programs and functions are to be included in the joint
    county department;

    (c) Procedures for the operation of the board of directors, including procedures
    governing the frequency of meetings and the number of members of the board required
    to constitute a quorum to take action;

    (d) Any other procedures or standards necessary for the joint county department
    to perform its duties and operate efficiently.

    (C) An agreement may be amended by a majority vote of the board of directors of
    the joint county department, but no amendment shall divest a participating county
    of any right or interest in lands or personal property without its consent.

    (D) Costs incurred in operating a joint county department shall be paid from a
    joint general fund created by the board of directors, except as may be otherwise
    provided in the agreement.

    (E) A joint county department established under this section is a public office
    as defined in section 117.01 of the Revised Code.


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.40
- number: '329.41'
  heading: Director; administrators; employees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) The board of directors of a joint county department of job and family
    services formed under section 329.40 of the Revised Code shall appoint and fix
    the compensation of the director of the department. The director shall serve at
    the pleasure of the board of directors. Under the direction and control of the
    board, the director shall have full charge of the department as set forth in section
    329.02 of the Revised Code for the director of a single county department of job
    and family services.

    (B) The board of directors may appoint up to three administrators to oversee services
    provided by the joint county department. Administrators shall be in the unclassified
    service.

    (C) Employees of a joint county department of job and family services shall be
    appointed by the director of the joint county department and, except as provided
    in this section, shall be in the classified service. The employees of a joint
    county department shall be considered county employees for the purposes of Chapter
    124. of the Revised Code and other provisions of state law applicable to county
    employees. Instead of or in addition to appointing these employees, a board of
    directors may agree to use the employees of one or more of the counties that formed
    a joint county department in the service of the joint county department and to
    share in their compensation in any manner that may be agreed upon.

    (D) Notwithstanding any other section of the Revised Code, if an employee''s separation
    from county service occurs in connection with a county joining or withdrawing
    from a joint county department of job and family services, the board of county
    commissioners that initially appointed the employee shall have no obligation to
    pay any compensation with respect to unused vacation or sick leave accrued to
    the credit of the employee if the employee accepts employment with the joint county
    department or a withdrawing county. At the effective time of separation from county
    service, the joint county department or the withdrawing county, as the case may
    be, shall assume such unused vacation and sick leave accrued to the employee''s
    credit.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.41
- number: '329.42'
  heading: Fiscal officer; treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: The county auditor of the county with the largest population that formed a
    joint county department of job and family services under section 329.40 of the
    Revised Code shall serve as the fiscal officer of the joint county department,
    and the county treasurer of that county shall serve as the treasurer of the joint
    county department, unless the counties that formed the joint county department
    agree to appoint the county auditor and county treasurer of another county that
    formed the department. In either case, these county officers shall perform any
    applicable duties for the joint county department as each typically performs for
    the county of which the individual is an officer. The board of directors of the
    joint county department may pay to that county any amount agreed upon by the board
    of directors and the board of county commissioners of that county to reimburse
    the county for the costs that are properly allocable to the service of its officers
    as fiscal officer and treasurer of the joint county department.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.42
- number: '329.43'
  heading: Legal advisor; other legal counsel
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) The prosecuting attorney of the county with the largest population that
    formed a joint county department of job and family services under section 329.40
    of the Revised Code shall serve as the legal advisor of the board of directors
    of the joint county department, unless the counties that formed the joint county
    department agree to appoint the prosecuting attorney of another county that formed
    the joint county department as legal advisor of the board. The board of directors
    may pay to the county of the prosecuting attorney who is the legal advisor of
    the board any amount agreed upon by the board of directors and the board of county
    commissioners of that county to reimburse that county for the costs that are properly
    allocable to the service of its prosecuting attorney as the legal advisor of the
    board of directors.

    (B) The prosecuting attorney shall provide such services to the board of directors
    as are required or authorized to be provided to other county boards under Chapter
    309. of the Revised Code.

    (C)(1) If the board of directors of a joint county department wishes to employ
    other legal counsel on an annual basis to serve as the board''s legal advisor
    in place of the prosecuting attorney, the board may do so with the agreement of
    the prosecuting attorney. If the prosecuting attorney does not agree, the board
    of directors may apply to the court of common pleas of the county with the largest
    population that formed the joint county department for authority to employ other
    legal counsel on an annual basis.

    (2) If the board of directors of a joint county department wishes to employ other
    legal counsel to represent or advise the board on a particular matter in place
    of the prosecuting attorney, the board may do so with the agreement of the prosecuting
    attorney. If the prosecuting attorney does not agree, the board of directors may
    apply to the court of common pleas of the county with the largest population that
    formed the joint county department for authority to employ other legal counsel
    for that particular matter.

    (3) The prosecuting attorney who is the legal advisor of the board of directors
    shall be given notice of an application filed under division (C)(1) or (2) of
    this section and shall be afforded an opportunity to be heard. After the hearing,
    the court may authorize the board of directors to employ other legal counsel on
    an annual basis or for a particular matter only if it finds that the prosecuting
    attorney refuses or is unable to provide the legal services that the board requires.
    If the board of directors employs other legal counsel on an annual basis or for
    a particular matter, the board may not require the prosecuting attorney to provide
    legal advice, opinions, or other legal services during the period or to the extent
    that the board employs the other legal counsel.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.43
- number: '329.44'
  heading: Rights and powers of board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) The board of directors of a joint county department of job and family
    services formed under section 329.40 of the Revised Code may acquire, by purchase
    or lease, real property, equipment, and systems to improve, maintain, or operate
    family service programs within the territory served by the joint county department.
    A board of county commissioners may acquire, within its county, real property
    or any estate, interest, or right therein, by appropriation or any other method,
    for use by the joint county department in connection with its provision of services.
    Appropriation proceedings shall be conducted in accordance with Chapter 163. of
    the Revised Code.

    (B) A board of county commissioners that formed a joint county department may
    contribute lands or rights or interests therein, money, other personal property
    or rights or interests therein, or services to the joint county department. The
    board of county commissioners may issue bonds or bond anticipation notes of the
    county to pay the cost of acquiring real property and of constructing, modifying,
    or upgrading a facility to house employees of the joint county department. The
    board of directors of a joint county department may reimburse the county for the
    use of such a facility if it is required to do so under the agreement entered
    into under section 329.40 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.44
- number: '329.45'
  heading: Withdrawal from agreement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A)(1) A board of county commissioners that has entered into an agreement
    under section 329.40 of the Revised Code establishing a joint county department
    of job and family services may adopt a resolution requesting to withdraw from
    the agreement. Upon adopting such a resolution, the board of county commissioners
    shall deliver a copy of the resolution to the board of directors of the joint
    county department. Upon receiving the resolution, the board of directors shall
    deliver written notice of the requested withdrawal to the boards of county commissioners
    of the other county or counties that formed the joint county department. Not later
    than thirty days after receiving the notice, each of those boards of county commissioners
    shall adopt a resolution either accepting the withdrawal or objecting to the withdrawal,
    and shall deliver a copy of the resolution to the board of directors.

    (2) If any of the boards of county commissioners that formed a joint county department
    adopts a resolution objecting to the requested withdrawal, the board of directors
    shall deliver written notice of the objection to each other board of county commissioners
    of the counties that formed the joint county department, including the board of
    county commissioners of the county proposing withdrawal. Not later than thirty
    days after sending the notice, the board of directors shall hold a meeting to
    discuss the objection. After the meeting, the board of directors shall determine
    whether the county requesting withdrawal desires to proceed with the withdrawal
    and, if the county does, the board of directors shall accept the withdrawal. Not
    later than thirty days after the determination was made, the board of directors
    shall deliver written notice of the withdrawal to the boards of county commissioners
    that formed the joint county department and to the board of county commissioners
    that requested withdrawal, and shall commence the withdrawal process under this
    section.

    (3) If all of the boards of county commissioners that formed a joint county department,
    except for the board of county commissioners requesting the withdrawal, each adopt
    a resolution accepting the withdrawal, the board of directors shall declare the
    withdrawal to be accepted. Not later than thirty days after the declaration, the
    board of directors shall deliver written notice of the withdrawal to all of the
    boards of county commissioners that formed the joint county department, including
    the board of county commissioners of the county requesting withdrawal, and shall
    commence the withdrawal process under this section.

    (4) The board of directors shall give notice to the Ohio department of job and
    family services of the withdrawal of a county under this section at least ninety
    days before the withdrawal becomes final. The director of job and family services
    shall adopt, as an internal management rule under section 111.15 of the Revised
    Code, the form in which the notice shall be given.

    (5) If a county requesting to withdraw decides to remain as a party to the agreement
    establishing a joint county department, the board of county commissioners of that
    county shall rescind its original resolution requesting withdrawal and shall deliver
    a copy of the rescission to the board of directors of the joint county department
    not later than thirty days after adopting the rescission.

    (B) If a county withdraws from an agreement under this section, the board of directors
    shall ascertain, apportion, and order a division of the funds on hand, credits,
    and real and personal property of the joint county department, either in money
    or in kind, on an equitable basis between the joint county department and the
    withdrawing county according to the agreement entered into under section 329.40
    of the Revised Code and consistent with any prior contributions of the withdrawing
    county to the joint county department. Any debt incurred individually shall remain
    the responsibility of that county, unless otherwise specified in the agreement
    establishing the joint county department.

    (C) A withdrawal becomes final not earlier than the first day of the calendar
    quarter following the ninety-day notice period required by division (A)(4) of
    this section. On and after that day, the withdrawing county ceases to be a part
    of the joint county department, and its members of the board of directors shall
    cease to be members of that board.

    (D) If the withdrawal of one or more counties would leave only one county participating
    in a joint county department, the board of directors shall ascertain, apportion,
    and order a final division of the funds on hand, credits, and real and personal
    property of the joint county department. On and after the day on which the latest
    withdrawal of a county becomes final, the joint county department is dissolved.
    When a joint county department is dissolved and any indebtedness remains unpaid,
    the boards of county commissioners that formed the joint county department shall
    pay the indebtedness of the joint county department in the amounts established
    by the agreement at the time the indebtedness was incurred.'
