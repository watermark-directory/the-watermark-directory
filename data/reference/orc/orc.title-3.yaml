  url: https://codes.ohio.gov/ohio-revised-code/section-306.32
- number: '306.321'
  heading: Inclusion of additional counties, municipal corporations, or townships
    in regional transit authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'The resolution or ordinance creating a regional transit authority may be
    amended to include additional counties, municipal corporations, or townships by
    the adoption of an amendment by the board of county commissioners of each county,
    the legislative authority of each municipal corporation, and the board of township
    trustees of each township which has created or, prior to the adoption of the amendment,
    joined or proposes to join the regional transit authority.

    After each county, municipal corporation, and township which has created or, prior
    to the adoption of the amendment, joined or proposes to join the regional transit
    authority has adopted its resolution or ordinance approving inclusion of additional
    counties, municipal corporations, or townships in the regional transit authority,
    a copy of each resolution or ordinance shall be filed with the clerk of the board
    of the county commissioners of each county, the clerk of the legislative authority
    of each municipal corporation, and the fiscal officer of the board of trustees
    of each township proposed to be included in the regional transit authority.

    Any ordinances or resolutions adopted pursuant to this section approving inclusion
    of additional counties, municipal corporations, or townships in the regional transit
    authority shall provide that the board of trustees of the regional transit authority
    must, not later than the tenth day following the day on which the filing of the
    ordinances or resolutions, as required by the immediately preceding paragraph,
    is completed, adopt its resolution providing for submission to the electors of
    the regional transit authority as enlarged, of the question pursuant to section
    306.49 of the Revised Code, of the renewal, the renewal and increase, or the increase
    of, or the imposition of an additional, ad valorem tax, or of the question pursuant
    to section 306.70 of the Revised Code, of the renewal, the renewal and increase,
    or the increase of, or the imposition of an additional, sales and use tax. The
    resolution submitting the question of the tax shall specify the date of the election,
    which shall be not less than ninety days after certification of the resolution
    to the board of elections and which shall be consistent with the requirements
    of section 3501.01 of the Revised Code. The inclusion of the territory of the
    additional counties, municipal corporations, or townships in the regional transit
    authority shall be effective as of the date on which the resolution of the board
    of trustees of the regional transit authority is adopted submitting the question
    to the electors, provided that until the question is approved, existing contracts
    providing payment for transit services within the added territory shall remain
    in effect and transit services shall not be affected by the inclusion of the additional
    territory. The resolution shall be certified to the board of elections and the
    election shall be held, canvassed, and certified as provided in section 306.49
    of the Revised Code in the case of an ad valorem tax or in section 306.70 of the
    Revised Code in the case of a sales and use tax.

    If the question of the tax which is submitted is not approved by a majority of
    the electors of the enlarged regional transit authority voting on the question,
    as of the day following the day on which the results of the election become conclusive,
    the additional counties, municipal corporations, or townships, which had been
    included in the regional transit authority as of the date of the adoption of the
    resolution submitting to the electors the question, shall be removed from the
    territory of the regional transit authority and shall no longer be a part of that
    authority without any further action by either the political subdivisions which
    were included in the authority prior to the adoption of the resolution submitting
    the question to the electors or of the political subdivisions added to the authority
    as a result of the adoption of the resolution. The regional transit authority
    reduced to its territory as it existed prior to the inclusion of the additional
    counties, municipal corporations, or townships, shall be entitled to levy and
    collect any ad valorem or sales and use taxes which it was authorized to levy
    and collect prior to the enlargement of its territory and for which authorization
    has not expired, as if the enlargement had not occurred.

    If the question of the tax which is submitted provides for a sales and use tax
    to be imposed and the question is approved, and the regional transit authority
    had previously been authorized pursuant to section 306.49 of the Revised Code
    to levy an ad valorem tax, the regional transit authority shall appropriate from
    the first moneys received from the sales and use tax in each year, the full amount
    required in order to pay the principal of and interest on any notes of the regional
    transit authority issued pursuant to section 306.49 of the Revised Code, in anticipation
    of the collection of the ad valorem tax; and shall not thereafter levy and collect
    the ad valorem tax previously approved unless the levy and collection is necessary
    to pay the principal of and interest on notes issued in anticipation of the tax
    in order to avoid impairing the obligation of the contract between the regional
    transit authority and the note holders.

    If the question of the additional or renewal tax levy is approved, the tax may
    be levied and collected as is otherwise provided for an ad valorem tax or a sales
    and use tax imposed by a regional transit authority, provided that if a question
    relating to an ad valorem tax is approved at the general election or at a special
    election occurring prior to a general election, but after the fifteenth day of
    July, the regional transit authority may amend its budget for its next fiscal
    year and its resolution adopted pursuant to section 5705.34 of the Revised Code
    or adopt such resolution, and the levy shall be placed on the current tax list
    and duplicate and collected as all other taxes are collected from all taxable
    property within the enlarged territory of the regional transit authority including
    the territory within each political subdivision which has been added to the regional
    transit authority pursuant to this section, provided further that if a question
    relating to sales and use tax is approved after the fifteenth day of July in any
    calendar year, the regional transit authority may amend its budget for the current
    and next fiscal year and any resolution adopted pursuant to section 5705.34 of
    the Revised Code, to reflect the imposition of the sales and use tax and shall
    amend its budget for the next fiscal year and any resolution adopted pursuant
    to section 5705.34 of the Revised Code to comply with the immediately preceding
    paragraph. If the budget of the regional transit authority is amended pursuant
    to this paragraph, the county auditor shall prepare and deliver an amended certificate
    of estimated resources to reflect the change in anticipated revenues of the regional
    transit authority.

    The procedures of this section are in addition to and an alternative to those
    established in section 306.32 of the Revised Code for joining to a regional transit
    authority additional counties, municipal corporations, or townships.'
