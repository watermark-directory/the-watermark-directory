- number: '307.202'
  heading: Development of rail property and rail service
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'As used in this section, "rail property" and "rail service" have the same
    meanings as in section 4981.01 of the Revised Code.

    The board of county commissioners may acquire, rehabilitate, and develop rail
    property and rail service, and may enter into agreements with the Ohio rail development
    commission, boards of township trustees, legislative authorities of municipal
    corporations, other boards of county commissioners, with other governmental agencies
    or organizations, and with private agencies or organizations in order to achieve
    those purposes.'
