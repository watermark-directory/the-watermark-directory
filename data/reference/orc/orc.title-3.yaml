- number: '323.75'
  heading: Apportionment of costs of sale at auction
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) The county treasurer or county prosecuting attorney shall apportion the
    costs of the proceedings with respect to abandoned lands offered for sale at a
    public auction held pursuant to section 323.73 or 323.74 of the Revised Code among
    those lands according to actual identified costs, equally, or in proportion to
    the fair market values of the lands. The costs of the proceedings include the
    costs of conducting the title search, notifying record owners or other persons
    required to be notified of the pending sale, advertising the sale, and any other
    costs incurred by the county board of revision, county treasurer, county auditor,
    clerk of court, prosecuting attorney, or county sheriff in performing their duties
    under sections 323.65 to 323.79 of the Revised Code.

    (B) All costs assessed in connection with proceedings under sections 323.65 to
    323.79 of the Revised Code may be paid after they are incurred, as follows:

    (1) If the abandoned land in question is purchased at public auction, from the
    purchaser of the abandoned land;

    (2) In the case of abandoned land transferred to a community development organization,
    school district, municipal corporation, county, or township under section 323.74
    of the Revised Code, from either of the following:

    (a) At the discretion of the county treasurer, in whole or in part from the delinquent
    tax and assessment collection funds created under section 321.261 of the Revised
    Code, allocated equally among the respective funds of the county treasurer and
    of the prosecuting attorney;

    (b) From the community development organization, school district, municipal corporation,
    county, or township, whichever is applicable.

    (3) If the abandoned land in question is transferred to a certificate holder,
    from the certificate holder.

    (C) If a parcel of abandoned land is sold or otherwise transferred pursuant to
    sections 323.65 to 323.79 of the Revised Code, the officer who conducted the sale
    or made the transfer, the prosecuting attorney, or the county treasurer may collect
    a recording fee from the purchaser or transferee of the parcel at the time of
    the sale or transfer and shall prepare the deed conveying title to the parcel
    or execute the deed prepared by the board for that purpose. That officer or the
    prosecuting attorney or treasurer is authorized to record on behalf of that purchaser
    or transferee the deed conveying title to the parcel, notwithstanding that the
    deed may not actually have been delivered to the purchaser or transferee prior
    to the recording of the deed. Receiving title to a parcel under sections 323.65
    to 323.79 of the Revised Code constitutes the transferee''s consent to an officer,
    prosecuting attorney, or county treasurer to file the deed to the parcel for recording.
    Nothing in this division shall be construed to require an officer, prosecuting
    attorney, or treasurer to file a deed or to relieve a transferee''s obligation
    to file a deed. Upon confirmation of that sale or transfer, the deed shall be
    deemed delivered to the purchaser or transferee of the parcel.'
