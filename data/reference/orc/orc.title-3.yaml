    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: The board of county commissioners of any county included within a regional
    transit authority may appropriate annually, from moneys to the credit of the general
    fund of the county and not otherwise appropriated, that portion of the expense
    of the regional transit authority to be paid by such county as provided in the
    resolution creating or enlarging the regional transit authority adopted under
    section 306.32 or 306.321 of the Revised Code, or by any amendment thereto.
