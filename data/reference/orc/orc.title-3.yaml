- number: '307.931'
  heading: Submitting health insurance claims for inmates of correctional center
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) For each person who is confined in a multicounty, municipal-county, or
    multicounty-municipal correctional center as provided in section 307.93 of the
    Revised Code, the applicable county or municipal corporation may make a determination
    as to whether the person is covered under a health insurance or health care policy,
    contract, or plan and, if the person has such coverage, what terms and conditions
    are imposed by it for the filing and payment of claims.

    (B) If, pursuant to division (A) of this section, it is determined that the person
    is covered under a policy, contract, or plan and, while that coverage is in force,
    the correctional center renders or arranges for the rendering of health care services
    to the person in accordance with the terms and conditions of the policy, contract,
    or plan, then the person, county, municipal corporation, or provider of the health
    care services, as appropriate under the terms and conditions of the policy, contract,
    or plan, shall promptly submit a claim for payment for the health care services
    to the appropriate third-party payer and shall designate, or make any other arrangement
    necessary to ensure, that payment of any amount due on the claim be made to the
    county, municipal corporation, or provider, as the case may be.

    (C) Any payment made to the county or municipal corporation pursuant to division
    (B) of this section shall be paid into the treasury of the governmental entity
    that incurred the expenses.

    (D) This section also applies to any person who is under the custody of a law
    enforcement officer, as defined in section 2901.01 of the Revised Code, prior
    to the person''s confinement in the correctional center.'
