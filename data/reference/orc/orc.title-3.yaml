- number: '329.10'
  heading: Property and records transferred to county department of job and family
    services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: All the property, records, files, and other documents and papers used in and
    necessary for the performance of the functions belonging to or in the possession
    of any board, agency, or department, the powers and duties of which are transferred
    to the county department of job and family services, and the proceeds of all tax
    levies in process of collection for the use of such boards, agencies, or departments
    shall be transferred to the county department of job and family services, when
    established. At the time the exercise of any powers and duties of any other board,
    agency, or department are transferred to the county department of job and family
    services, or to any other board, agency, or department, all the property, records,
    files, and other documents and papers, the unexpended balances of all current
    appropriations, and the unappropriated proceeds of all tax levies then in process
    of collection for the use of such board, agency, or department shall be deemed
    transferred to the board, agency, or department to which such duties have been
    transferred.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.10
- number: '329.11'
  heading: Individual development account definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'As used in sections 329.11 to 329.14 of the Revised Code:

    (A) "Eligible education institution" means an institution described in 20 U.S.C.
    1088(a)(1) or 1141(a), as amended, or an area vocational education school as defined
    in 20 U.S.C. 2471(4), as amended.

    (B) "Federal poverty line" has the same meaning as in section 5104.01 of the Revised
    Code.

    (C) "Fiduciary organization" means a nonprofit fundraising organization exempt
    from federal income taxation pursuant to 26 U.S.C. 501 (a) and (c)(3).

    (D) "Financial institution" includes a bank, trust company, savings and loan association,
    savings bank, or credit union authorized to do business under federal law or the
    laws of this state.

    (E) "Funds available" means the amount available to a fiduciary organization for
    the purpose of matching funds deposited by program participants.

    (F) "Individual development account" means a trust created or organized in the
    United States pursuant to an individual development account program established
    under section 329.12 of the Revised Code to enable an individual eligible to participate
    in the program to accumulate funds for the purposes specified in section 329.14
    of the Revised Code.

    (G) "Nonprofit microenterprise program" means a program under which loans and
    assistance are provided to low-income persons for the purpose of starting or operating
    a small business.

    (H) "Postsecondary educational expenses" means both of the following:

    (1) Tuition and fees required for the enrollment or attendance of a student at
    an eligible education institution;

    (2) Fees, books, supplies, and equipment required for courses of instruction at
    an eligible education institution.

    (I) "Qualified acquisition costs" means the costs associated with acquiring, constructing,
    or reconstructing a residence, including any ordinary or reasonable settlement,
    financing, or other closing costs.

    (J) "Qualified business" means any business formed for a purpose for which persons
    lawfully may associate themselves.

    (K) "Qualified business plan" means a plan that includes a description of services
    or goods to be sold, a marketing plan, and projected financial statements.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.11
- number: '329.12'
  heading: Establishing individual development account program
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) A county department of job and family services may establish an individual
    development account program for residents of the county. The program shall provide
    for establishment of accounts for participants and acceptance of contributions
    from individuals and entities, including the county department, to be used as
    matching funds for deposit in the accounts.

    (B) A county department shall select a fiduciary organization to administer its
    individual development account program. In selecting a fiduciary organization,
    the department shall consider all of the following regarding the organization:

    (1) Its ability to market the program to potential participants and matching fund
    contributors;

    (2) Its ability to invest money in the accounts in a way that provides for return
    with minimal risk of loss;

    (3) Its overall administrative capacity, including the ability to verify eligibility
    of individuals for participation in the program, prevent unauthorized use of matching
    contributions, and enforce any penalties for unauthorized uses that may be provided
    for by rule adopted by the director of job and family services under section 5101.971
    of the Revised Code;

    (4) Its ability to provide financial counseling to participants;

    (5) Its affiliation with other activities designed to increase the independence
    of individuals and families through postsecondary education, home ownership, and
    business development;

    (6) Any other factor the county department considers appropriate.

    (C) At the time it commences the program and on the first day of each subsequent
    program year, the county department may make a grant to the fiduciary organization
    to pay all or part of the administrative costs of the program.

    (D) The county department shall require the fiduciary organization to collect
    and maintain information regarding the program, including all of the following:

    (1) The number of accounts established;

    (2) The amount deposited by each participant and the amount matched by contributions;

    (3) The uses of funds withdrawn from the account, including the number of participants
    who used funds for postsecondary educational expenses and the institutions attended,
    the number of personal residences purchased, and the number of participants who
    used funds for business capitalization;

    (4) The demographics of program participants;

    (5) The number of participants who withdrew from the program and the reasons for
    withdrawal.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.12
- number: '329.13'
  heading: Establishing individual development account
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'A fiduciary organization may establish an individual development account
    only in a financial institution insured by the federal deposit insurance corporation
    or in accordance with section 1733.041 of the Revised Code.

    Not later than the thirtieth day of January of each year, a fiduciary organization
    shall determine whether the amount it deposited into individual development accounts
    from contributions made by individuals or entities that are not corporations during
    the previous calendar year was less than fifty per cent of the funds available
    from contributions made by individuals or entities that are not corporations for
    that year. A fiduciary organization may not accept any additional contributions
    from individuals or entities that are not corporations for the purpose of matching
    funds deposited by program participants until it has deposited at least fifty
    per cent of the funds available from contributions made by individuals or entities
    that are not corporations for the previous calendar year into individual development
    accounts. Not later than the thirtieth day of January of the year following each
    fifth year after the effective date of this section, a fiduciary organization
    shall determine whether the amount it deposited into individual development accounts
    from contributions made by corporations during the previous five-year period was
    less than fifty per cent of the funds available from contributions made by corporations
    during that period. A fiduciary organization may not accept any additional contributions
    from corporations for the purpose of matching funds deposited by program participants
    until it has deposited at least fifty per cent of the funds available from contributions
    made by corporations for the previous five-year period into individual development
    accounts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.13
- number: '329.14'
  heading: Eligibility to participate in individual development account program
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) An individual whose household income does not exceed two hundred per
    cent of the federal poverty line is eligible to participate in an individual development
    account program established by the county department of job and family services
    of the county in which the individual resides. An eligible individual seeking
    to be a participant in the program shall enter into an agreement with the fiduciary
    organization administering the program. The agreement shall specify the terms
    and conditions of uses of funds deposited, financial documentation required to
    be maintained by the participant, expectations and responsibilities of the participant,
    and services to be provided by the fiduciary organization.

    (B) A participant may deposit earned income, as defined in 26 U.S.C. 911(d)(2),
    as amended, into the account. The fiduciary organization may deposit into the
    account an amount not exceeding four times the amount deposited by the participant
    except that a fiduciary organization may not, pursuant to an agreement with an
    employer, deposit an amount into an account held by a participant who is employed
    by the employer. An account may have no more than ten thousand dollars in it at
    any time.

    (C) Notwithstanding eligibility requirements established in or pursuant to Chapter
    5107. or 5108. of the Revised Code, to the extent permitted by federal statutes
    and regulations, money in an individual development account, including interest,
    is exempt from consideration in determining whether the participant or a member
    of the participant''s assistance group is eligible for assistance under Chapter
    5107. or 5108. of the Revised Code and the amount of assistance the participant
    or assistance group is eligible to receive.

    (D)(1) Except as provided in division (D)(2) of this section, an individual development
    account program participant may use money in the account only for the following
    purposes:

    (a) Postsecondary educational expenses paid directly from the account to an eligible
    education institution or vendor;

    (b) Qualified acquisition expenses of a principal residence, as defined in 26
    U.S.C. 1034, as amended, paid directly from the account to the person or government
    entity to which the expenses are due;

    (c) Qualified business capitalization expenses made in accordance with a qualified
    business plan that has been approved by a financial institution or by a nonprofit
    microenterprise program having demonstrated business expertise and paid directly
    from the account to the person to whom the expenses are due.

    (2) A fiduciary organization shall permit a participant to withdraw money deposited
    by the participant if it is needed to deal with a personal emergency of the participant
    or a member of the participant''s family or household. Withdrawal shall result
    in the loss of any matching funds in an amount equal to the amount of the withdrawal.

    (3) Regardless of the reason for the withdrawal, a withdrawal from an individual
    development account may be made only with the approval of the fiduciary organization.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.14
- number: '329.19'
  heading: Identification card for assistance program administered by county department
    of job and family services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'Upon determining that a person or persons are eligible for benefits or services
    under any assistance program administered by the county department of job and
    family services, the county department may issue an identification card to the
    person or persons. The county department shall determine the card''s material,
    design, and informational content, which may include a photograph, social security
    number, name, and signature, and shall prescribe the procedure by which it is
    issued.

    In issuing identification cards under this section, the county department shall
    comply with any state or federal laws governing the issuance of the cards. All
    expenses incurred in issuing the cards shall be paid from funds available to the
    county department for administrative expenses.'
