  url: https://codes.ohio.gov/ohio-revised-code/section-323.131
- number: '323.132'
  heading: Paying delinquent taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'If one-half of the current taxes charged against an entry of real estate
    is not paid on or before the thirty-first day of December of the year for which
    they are charged or on or before the last day for such payment as extended pursuant
    to section 323.17 of the Revised Code, that amount, together with the penalty
    charged under division (A)(1) of section 323.121 of the Revised Code and all delinquent
    taxes or installment thereof charged against such entry may be paid at any time
    prior to the date on which tax bills for the second half collection are mailed
    and delivered, without at the same time requiring payment of the second half of
    such taxes.

    If the total amount of such current taxes, delinquent taxes, and all installment
    payments due under section 323.31 of the Revised Code are not paid on or before
    the twentieth day of June, next thereafter, or on or before the last day for that
    payment as extended pursuant to section 323.17 of the Revised Code, the balance
    of the amount of such taxes, plus all penalties and interest imposed by section
    323.121 of the Revised Code, constitutes the delinquent taxes on such entry, which
    shall be placed on the delinquent land list and duplicate pursuant to section
    5721.011 of the Revised Code and shall be collected in the manner prescribed by
    law, unless the property against which such taxes are charged is the subject of
    an application for exemption from taxation pursuant to section 5715.27 of the
    Revised Code.

    A taxpayer may tender, and the treasurer shall accept, the full amount of delinquent
    taxes charged against an entry of real estate without having to tender at the
    same time the payment of any current taxes that are due and payable.

    A county treasurer may accept partial payments of taxes. Any overpayment shall
    be refunded by the treasurer in the manner most convenient to the treasurer. When
    the amount tendered and accepted is less than the amount due, the unpaid balance
    shall be treated as other unpaid taxes, and, except when the unpaid amount is
    the penalty or interest and charges on the unpaid taxes, the treasurer shall notify
    the taxpayer of such deficiency.

    If the taxpayer files with the payment of taxes a copy of an application to the
    tax commissioner for remission of penalty, or the payment is received within ten
    days after the last day the taxes may be paid without penalty, the county treasurer
    shall accept a partial payment in which the only unpaid amount is the penalty
    for late payment.

    If, at any time, and having been provided such documentation as may be found acceptable
    by the county treasurer, the county treasurer determines that due to a clerical
    error, a taxpayer has overpaid either the first one-half or second one-half payment
    of current taxes as charged on the tax list and duplicate, the treasurer may refund
    the amount of the overpayment to the taxpayer in the manner most convenient to
    the treasurer.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.132
- number: '323.133'
  heading: Payment of portion of taxes where application for exemption is pending
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) A taxpayer may tender, and the county treasurer shall accept, payment
    of a portion of any taxes charged against real property that is the subject of
    an application for exemption from taxation under section 5715.27 of the Revised
    Code that is pending before the tax commissioner. The treasurer shall issue a
    receipt to the taxpayer, and credit such payment against any unpaid taxes, penalties,
    and interest charged against the property. The treasurer shall enter any such
    payment on the treasurer''s tax duplicate and apportion the payment among the
    several funds for which taxes have been assessed and applied to the items of taxes
    charged in the order in which they became due. This division does not authorize
    the commissioner to accept an application for exemption for property against which
    delinquent taxes are outstanding at the time of application, except as provided
    in section 5713.081 of the Revised Code.

    (B) Upon receipt of the tax commissioner''s final determination concerning an
    application for exemption, the county auditor shall correct the tax lists for
    the years covered in the application and any other year that elapsed while the
    application was under review or appeal. For each such year, the auditor shall
    compute the amount of any unpaid taxes and any penalties and interest thereon
    that were charged against the property. If the auditor determines that in any
    such year an overpayment of taxes was made, the auditor shall treat the amount
    as an overpayment of real property taxes as provided in section 5715.22 of the
    Revised Code, except that no application need be made by the person who overpaid
    the taxes in order for the auditor to issue a refund. If the auditor determines
    that an unpaid balance remains after crediting any overpayments, or if no overpayment
    was made and there are unpaid taxes and penalties or interest on such taxes, he
    shall certify the amount of the unpaid balance to the county treasurer, who shall
    collect such amount in the manner prescribed by law for the collection of delinquent
    taxes.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.133
- number: '323.134'
  heading: Agreements for information exchanges limited exclusively to purpose of
    real property tax billing and payment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'As used in this section, "financial institution" means a bank as defined
    in section 1101.01 of the Revised Code or any other person regularly engaging
    in the business of making or brokering residential mortgage loans on security
    located in this state.

    The county treasurer may request any financial institution to enter into an agreement
    with the treasurer for information exchanges limited exclusively to the purpose
    of real property tax billing and payment, including, but not limited to, the sharing
    of information that is part of a data processing system. With the approval of
    the county automatic data processing board or if the county has no board, with
    the approval of the county auditor, the county treasurer may enter such an agreement
    with any consenting financial institution. Where such an agreement enables the
    treasurer to collect the proper amounts of such taxes due without preparing and
    sending the tax bills required by section 323.13 of the Revised Code, the treasurer
    need not prepare and send such bills for any entries of real property upon which
    taxes are properly computed and paid by the use of such information exchange.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.134
- number: '323.14'
  heading: Receipt for payment of taxes - form
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'When any tax is paid at the office of the county treasurer or at any tax
    receiving office, the treasurer shall give a receipt to the person paying it.
    If any such tax is paid to the treasurer by mail and the person paying it encloses
    with the payment an addressed envelope with sufficient postage, the treasurer
    shall enclose a receipt for the taxes in such envelope and deposit it in the mail.
    No receipt given by the treasurer for payments made otherwise than in lawful money
    or the notes specified in section 321.13 of the Revised Code shall be valid, unless
    the moneys represented by such payment are received into the county treasury or
    a county depository.

    The tax receipt given by the treasurer shall be a duplicate of the tax bill unless
    the treasurer prescribes a different form, approved by the tax commissioner, to
    be used as a receipt when the tax is paid by the treasurer''s application of prepayments
    pursuant to section 321.45 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.14
- number: '323.15'
  heading: Payment of less than full amount due - payment by owner of undivided interest
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: The county treasurer may accept payment of less than the full amount of taxes
    charged and payable for all purposes on real estate at the times provided by sections
    323.12 and 323.17 of the Revised Code in such amounts as the county treasurer
    considers reasonable. Except as otherwise provided by sections 323.133, 323.31,
    and 5715.19 of the Revised Code, and when the collection of a particular tax is
    legally enjoined, interest and penalties shall accrue on the unpaid amount as
    prescribed by section 323.121 of the Revised Code. A person claiming to be the
    owner of an undivided interest in any real estate may present to the county auditor
    the recorded evidence of the existence and fractional extent of such interest;
    and the auditor may note the existence and extent of such interest, as ascertained
    by the auditor, on the margin of the tax list in the name of such person and give
    a certificate of the interest to the county treasurer, who shall enter it on the
    margin of the tax duplicate. Any person claiming to be entitled to or in any way
    interested in such interest may pay, and the treasurer may receive that proportion
    of the full amount of the taxes charged and payable for all purposes on the real
    estate affected, which is represented by the fraction expressing the extent of
    such interest. The payment so made and received shall be entered on the duplicate,
    shall be credited by the treasurer at the time of the next succeeding settlement
    of real estate taxes, and shall have the effect of relieving the undivided interest
    in such real estate, so entered on the margin of the tax list and duplicate, from
    the lien of the taxes charged on such duplicate against the real estate. Thereafter,
    in making up the tax list and duplicate, the auditor shall enter such interest
    and the proportional value of it separately from the other interests in such land,
    and shall adjust the value of the latter accordingly.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.15
- number: '323.151'
  heading: Valuation of homestead property definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'As used in sections 323.151 to 323.159 of the Revised Code:

    (A)(1) "Homestead" means either of the following:

    (a) A dwelling, including a unit in a multiple-unit dwelling and a manufactured
    home or mobile home taxed as real property pursuant to division (B) of section
    4503.06 of the Revised Code, owned and occupied as a home by an individual whose
    domicile is in this state and who has not acquired ownership from a person, other
    than the individual''s spouse, related by consanguinity or affinity for the purpose
    of qualifying for the real property tax reduction provided in section 323.152
    of the Revised Code.

    (b) A unit in a housing cooperative that is occupied as a home, but not owned,
    by an individual whose domicile is in this state.

    (2) The homestead shall include so much of the land surrounding it, not exceeding
    one acre, as is reasonably necessary for the use of the dwelling or unit as a
    home. An owner includes a holder of one of the several estates in fee, a vendee
    in possession under a purchase agreement or a land contract, a mortgagor, a life
    tenant, one or more tenants with a right of survivorship, tenants in common, and
    a settlor of a revocable or irrevocable inter vivos trust holding the title to
    a homestead occupied by the settlor as of right under the trust. The tax commissioner
    shall adopt rules for the uniform classification and valuation of real property
    or portions of real property as homesteads.

    (B) "Sixty-five years of age or older" means a person who has attained age sixty-four
    prior to the first day of January of the year of application for reduction in
    real estate taxes.

    (C) "Total income" means modified adjusted gross income, as that term is defined
    in section 5747.01 of the Revised Code, of the owner and the owner''s spouse for
    the year preceding the year in which application for a reduction in taxes is made.

    (D) "Permanently and totally disabled" means that a person other than a disabled
    veteran has, on the first day of January of the year of application for reduction
    in real estate taxes, some impairment in body or mind that makes the person unable
    to work at any substantially remunerative employment that the person is reasonably
    able to perform and that will, with reasonable probability, continue for an indefinite
    period of at least twelve months without any present indication of recovery therefrom
    or has been certified as permanently and totally disabled by a state or federal
    agency having the function of so classifying persons.

    (E) "Housing cooperative" means a housing complex of at least two units that is
    owned and operated by a nonprofit corporation that issues a share of the corporation''s
    stock to an individual, entitling the individual to live in a unit of the complex,
    and collects a monthly maintenance fee from the individual to maintain, operate,
    and pay the taxes of the complex.

    (F) "Disabled veteran" means a person who is a veteran of the armed forces of
    the United States, including reserve components thereof, or of the national guard,
    who has been discharged or released from active duty in the armed forces under
    honorable conditions, and who has received a total disability rating or a total
    disability rating for compensation based on individual unemployability for a service-connected
    disability or combination of service-connected disabilities as prescribed in Title
    38, Part 4 of the Code of Federal Regulations, as amended.

    (G) "Public service officer" means a peace officer, firefighter, first responder,
    EMT-basic, EMT-I, or paramedic, or an individual holding any equivalent position
    in another state.

    (H) "Killed in the line of duty" means either of the following:

    (1) Death in the line of duty;

    (2) Death from injury sustained in the line of duty, including heart attack or
    other fatal injury or illness caused while in the line of duty.

    (I) "Peace officer" has the same meaning as in section 2935.01 of the Revised
    Code.

    (J) "Firefighter" means a firefighter, whether paid or volunteer, of a lawfully
    constituted fire department.

    (K) "First responder," "EMT-basic," "EMT-I," and "paramedic" have the same meanings
    as in section 4765.01 of the Revised Code.

    (L) "Surviving spouse of a disabled veteran" means either of the following:

    (1) The spouse of a disabled veteran who occupied the homestead when the disabled
    veteran died and who acquires ownership of the homestead or, in the case of a
    homestead that is a unit in a housing cooperative, continues to occupy the homestead;

    (2) The surviving spouse of an individual to which all of the following apply,
    provided the surviving spouse occupies the homestead when that individual dies
    and who, following that individual''s death, acquires ownership of the homestead
    or, in the case of a homestead that is a unit in a housing cooperative, continues
    to occupy the homestead:

    (a) The individual dies before receiving a total disability rating described in
    division (F) of this section.

    (b) The individual otherwise qualifies as a disabled veteran.

    (c) The individual owns and occupies a homestead or, in the case of a homestead
    that is a unit in a housing cooperative, occupies the homestead.'
