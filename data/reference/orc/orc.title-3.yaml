    name: Sheriff
  text: There shall be kept in the office of the sheriff a cashbook, to be furnished
    by the county, in which, on receipt by him of any money in his official capacity,
    the sheriff shall make an entry of the date, the amount thereof, the title of
    the cause, and the name and number of the writ or process on which such money
    was received. If such money is received on the sale of real estate, in partition
    or otherwise, where the sale has been for part cash and other evidences of indebtedness
    are taken for part of the purchase money, such sheriff shall make an entry on
    such book of the date, number, and amount of such evidences of indebtedness.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.11
- number: '311.12'
  heading: Inspection of books - certified copy of entry - fee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: The books required to be kept by sections 311.01 to 311.23 of the Revised
    Code, shall be open to the search and inspection of all persons. The sheriff shall
    furnish a certified copy of any entry in such books upon request and shall charge
    and collect a fee of twenty-five cents for each such certification or copy thereof.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.12
- number: '311.13'
  heading: Books to be delivered to successor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: The books required to be kept by sections 311.01 to 311.23 of the Revised
    Code, shall not be removed from the sheriff's office. Such books shall be delivered
    over, without mutilation, as public property to each succeeding sheriff. No sheriff
    shall willfully fail to comply with this section or section 311.11 of the Revised
    Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.13
- number: '311.14'
  heading: Moneys, books, and papers to be delivered to successor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: Upon retiring from office, the sheriff shall pay over to the sheriff's successor
    in office all moneys received by such sheriff and remaining in the sheriff's hands.
    The sheriff shall deliver to the sheriff's successor all evidences of indebtedness
    and all books, blanks, and stationery belonging to the sheriff's office. Each
    sheriff shall demand and receive such books and papers from the sheriff's predecessor.
    Before leaving office, the sheriff shall prepare a certificate of transition for
    the successor sheriff in the form and substance prescribed by the auditor of state.
    The certificate shall contain an inventory of items delivered in accordance with
    this section, sections 311.13 and 311.15 of the Revised Code, and other information
    prescribed by the auditor of state. Before prescribing the inventory of items,
    accounts, and other information to be contained in the certificate of transition,
    the auditor of state shall solicit input from county sheriffs.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.14
- number: '311.15'
  heading: Process, goods, and prisoners to be delivered to successor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: When the term of office for which a sheriff has been elected expires, or he
    resigns or moves outside the county, such sheriff shall deliver all writs of execution
    and all other processes, of whatever description, whether executed or not, and
    all goods and chattels taken by him, in execution or on attachment, which remain
    in his hands, together with all bonds, to the person elected or appointed and
    qualified to discharge the duties of sheriff, and he shall make the necessary
    and proper return upon each such writ or other process so far as executed. Such
    sheriff shall also deliver to his successor all prisoners in the county jail or
    otherwise in his custody, with all bail bonds taken by him and remaining in his
    possession. The new sheriff shall receive all such prisoners, writs, or other
    processes, and he shall execute such writs and processes as remain unexecuted
    in whole or in part as if they had been directed to him originally. No process
    shall be directed to or executed by a sheriff whose term of office has expired.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.15
- number: '311.16'
  heading: Annual report of sheriff
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: 'On the first Monday in September of each year, the sheriff shall make a certified
    statement to the board of county commissioners of all fines and costs in criminal
    prosecutions collected by him, on execution or otherwise, during the year next
    preceding such date, and he shall also report in such statement the amount of
    fines and costs so collected and paid over to the clerk of the court of common
    pleas or to the county treasurer.

    If the sheriff fails to make reports at the time and in the manner required by
    this section, he shall forfeit and pay not less than fifty nor more than one hundred
    dollars, to be recovered in a civil action in the name of the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-311.16
- number: '311.17'
  heading: Fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '311'
    name: Sheriff
  text: 'Except as provided in a contract entered into under division (A) of section
    3125.141 of the Revised Code, for the services specified in this section, the
    sheriff shall charge the following fees, which the court or its clerk shall tax
    in the bill of costs against the judgment debtor or those legally liable therefor
    for the judgment:

    (A) For the service and return of the following writs and orders:

    (1) Execution:

    (a) When money is paid without levy or when no property is found, thirty dollars;

    (b) When levy is made on real property, for the first tract, twenty-five dollars,
    and for each additional tract, ten dollars;

    (c) When levy is made on goods and chattels, including inventory, fifty dollars.

    (2) Writ of attachment of property, except for purpose of garnishment, forty dollars;

    (3) Writ of attachment for the purpose of garnishment, ten dollars;

    (4) Writ of replevin, forty dollars;

    (5) Warrant to arrest, for each person named in the writ, twenty dollars;

    (6) Attachment for contempt, for each person named in the writ, six dollars;

    (7) Writ of possession or restitution, sixty dollars;

    (8) Subpoena, for each person named in the writ, in either a civil or criminal
    case, ten dollars;

    (9) Summoning each juror, six dollars;

    (10) Writ of partition, twenty-five dollars;

    (11) Order of sale on partition, for the first tract, fifty dollars, and for each
    additional tract, twenty-five dollars;

    (12) Other order of sale of real property, for the first tract, fifty dollars,
    and for each additional tract, twenty-five dollars;

    (13) Administering oath to appraisers, three dollars each;

    (14) Furnishing copies for advertisements, one dollar for each hundred words;

    (15) Copy of indictment, for each defendant, five dollars;

    (16) All summons, writs, orders, or notices, for the first name, six dollars,
    and for each additional name, one dollar.

    (B) In addition to the fee for service and return:

    (1) On each summons, writ, order, or notice, a fee of two dollars per mile for
    the first mile, and one dollar per mile for each additional mile, going and returning,
    actual mileage to be charged on each additional name;

    (2) Taking bail bond, three dollars;

    (3) Jail fees, as follows:

    (a) For receiving a prisoner, five dollars each time a prisoner is received, and
    for discharging or surrendering a prisoner, five dollars each time a prisoner
    is discharged or surrendered. The departure or return of a prisoner from or to
    a jail in connection with a program established under section 5147.28 of the Revised
    Code is not a receipt, discharge, or surrender of the prisoner for purposes of
    this division.

    (b) Taking a prisoner before a judge or court, per day, five dollars;

    (c) Calling action, one dollar;

    (d) Calling jury, three dollars;

    (e) Calling each witness, three dollars;

    (f) Bringing prisoner before court on habeas corpus, six dollars.

    (4) Poundage on all moneys actually made and paid to the sheriff on execution,
    decree, or sale of real estate, one and one-half per cent;

    (5) Making and executing a deed of land sold on execution, decree, or order of
    the court, to be paid by the purchaser, fifty dollars.

    When any of the services described in division (A) or (B) of this section are
    rendered by an officer or employee, whose salary or per diem compensation is paid
    by the county, the applicable legal fees and any other extraordinary expenses,
    including overtime, provided for the service shall be taxed in the costs in the
    case and, when collected, shall be paid into the general fund of the county.

    The sheriff shall charge the same fees for the execution of process issued in
    any other state as the sheriff charges for the execution of process of a substantively
    similar nature that is issued in this state.'
