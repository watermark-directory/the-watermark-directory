- number: '306.84'
  heading: No property to be included in more than one regional commission
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: No property within this state shall be included within the territorial boundaries
    of more than one regional transit commission, nor shall any regional transit authority
    be created pursuant to sections 306.30 to 306.53, inclusive, of the Revised Code,
    which includes any territory within the territorial boundaries of a regional transit
    commission. No regional transit commission shall be created which includes territory
    theretofore included within the territorial boundaries of a regional transit authority
    unless all of the territory within the territorial boundaries of such regional
    transit authority is included within the territorial boundaries of the regional
    transit commission, in which event, to the extent lawful, the regional transit
    authority shall be merged into the regional transit commission, and the regional
    transit commission shall assume and perform all of the obligations of such regional
    transit authority.
  history: null
