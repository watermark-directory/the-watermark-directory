  heading: Federal requirements for contracts with religious organization
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: If a board of county commissioners contracts with a religious organization
    under section 307.981 or 307.982 of the Revised Code, the religious organization
    shall comply with section 104 of the Personal Responsibility and Work Opportunity
    and Reconciliation Act of 1996 (P.L. 104-193).
  history: null
