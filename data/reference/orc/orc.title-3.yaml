  text: Sections 345.01 to 345.17, inclusive, of the Revised Code apply exclusively
    to memorials erected, equipped, furnished, and maintained or established by any
    political subdivisions of the state. All sections of the Revised Code, inconsistent
    with or prohibiting the exercise of the authority conferred by sections 345.01
