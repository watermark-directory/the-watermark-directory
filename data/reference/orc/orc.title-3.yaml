- number: '341.25'
  heading: Establishing commissary and commissary fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '341'
    name: Jails
  text: '(A) The sheriff may establish a commissary for the jail. The commissary may
    be established either in-house or by another arrangement. If a commissary is established,
    all persons incarcerated in the jail shall receive commissary privileges. A person''s
    purchases from the commissary shall be deducted from the person''s account record
    in the jail''s business office. The commissary shall provide for the distribution
    to indigent persons incarcerated in the jail necessary hygiene articles and writing
    materials.

    (B)(1) If a commissary is established, the sheriff shall establish a commissary
    fund for the jail. The management of funds in the commissary fund shall be strictly
    controlled in accordance with procedures adopted by the auditor of state.

    (2) Commissary fund revenue over and above operating costs and reserve shall be
    considered profits.

    (3) All profits from the commissary fund shall be used for the following:

    (a) To purchase supplies and equipment, and to provide life skills training and
    education or treatment services, or both, for the benefit of persons incarcerated
    in the jail;

    (b) To pay salary and benefits for employees of the sheriff who work in or are
    employed for the purpose of providing service to the commissary;

    (c) To purchase technology designed to prevent contraband from entering the jail;

    (d) To pay for construction or renovation of a jail facility to provide medical
    or mental health services.

    (4) The sheriff shall adopt rules for the operation of any commissary fund the
    sheriff establishes.'
