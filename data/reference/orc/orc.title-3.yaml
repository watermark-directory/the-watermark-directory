  url: https://codes.ohio.gov/ohio-revised-code/section-343.014
- number: '343.015'
  heading: Resolution of intent to continue designations after 1-1-94
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: 'The designations of solid waste disposal, transfer, or resource recovery
    facilities or recycling activities contained in an initial solid waste management
    plan of a county or joint solid waste management district approved under section
    3734.55 of the Revised Code that does not include the provision authorized under
    division (E)(2)(b) or (c) of section 3734.53 of the Revised Code are void on and
    after January 1, 1994, for the purposes of division (I)(2) of section 343.01 of
    the Revised Code unless the board of county commissioners or directors of the
    district acts in accordance with this section to continue the designations. In
    order to continue the designations, the board shall adopt a resolution of intent
    to designate under division (B) of section 343.014 of the Revised Code not later
    than January 1, 1994. For the purposes of proceedings initiated under this section,
    the board shall complete the actions required under divisions (C) to (G) of that
    section within one hundred eighty days after the adoption of the resolution of
    intent under division (B) of that section. If the district fails to so complete
    those actions, the designations contained in the district''s initial plan become
    void on the one hundred eightieth day after the adoption of the resolution of
    intent to designate.

    Nothing in this section precludes the board from altering the list of designated
    facilities contained in the district''s approved initial plan in connection with
    the proceedings initiated under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-343.015
- number: '343.02'
  heading: Contracts for solid waste collection, storage, transfer, disposal, recycling,
    processing, or resource recovery services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: 'A board of county commissioners or board of directors of a county or joint
    solid waste management district may contract with any person, municipal corporation,
    township, or other political subdivision located within or outside its district
    for the furnishing to the district or joint district of solid waste collection,
    storage, transfer, disposal, recycling, processing, or resource recovery services.

    When consistent with the solid waste management plans approved under section 3734.55
    of the Revised Code or amended solid waste management plan approved under section
    3734.56 of the Revised Code, the board of county commissioners or directors of
    a county or joint district may enter into an agreement with the board of county
    commissioners or directors of another county or joint district authorizing the
    joint use of facilities within the districts. To the extent consistent with the
    plans or amended plans of the districts involved, the boards of county commissioners
    or directors of the districts may enter into a joint use agreement upon such terms
    and for such lengths of time as the boards consider appropriate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-343.02
- number: '343.022'
  heading: Contracts to establish and collect on behalf of the district generation
    or disposal fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: '(A) The board of county commissioners of a county solid waste management
    district or the board of directors of a joint solid waste management district
    may enter into a contract or agreement with the owner or operator of a solid waste
    facility, or with persons collecting or transporting solid wastes, to establish
    and collect on behalf of the district generation or disposal fees to be used by
    the district for the purposes set forth in division (G) of section 3734.57 of
    the Revised Code or to provide other remuneration or services to or on behalf
    of the district or its residents.

    (B) The authority provided by division (A) of this section is cumulative and concurrent
    with the authority of the board of county commissioners or directors to enter
    into contracts or agreements under other sections of this chapter. The existence
    or exercise of one such authority does not prevent the exercise of the other.

    (C) The authority provided by division (A) of this section pertaining to disposal
    or generation fees is cumulative and concurrent with the authority of the board
    of county commissioners or directors to levy disposal or generation fees under
    section 3734.57, 3734.571, 3734.572, 3734.573, or 3734.574 of the Revised Code.
    The exercise of the authority provided in any of those sections does not prevent
    the exercise of the authority provided by division (A) of this section, and the
    authority provided by division (A) of this section does not prevent the exercise
    of the authority provided in any of those sections.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-343.022
- number: '343.03'
  heading: Prosecuting attorney to prosecute to termination or bring civil action
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: The prosecuting attorney of the county where a violation of division (G)(2)
    or (3) or (I)(1) or (2) of section 343.01 of the Revised Code has occurred, is
    occurring, or may occur, upon the request of the board of county commissioners
    of the county district or the board of directors of the joint solid waste management
    district having jurisdiction, shall prosecute to termination or bring a civil
    action for appropriate relief against any person, municipal corporation, township,
    or other political subdivision that has violated, is violating, or is threatening
    to violate any of those divisions. The court of common pleas in which the civil
    action is filed has jurisdiction to and shall grant appropriate relief, including
    a temporary restraining order or a preliminary or permanent injunction, upon a
    showing that the person, municipal corporation, township, or other political subdivision
    against whom the action is brought has violated, is violating, or is threatening
    to violate any of those divisions. The court shall give precedence to such an
    action over all other cases.
