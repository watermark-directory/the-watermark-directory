- number: '303.121'
  heading: Ratifying amendments to zoning resolution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: All amendments or supplements to a county rural zoning plan adopted by a board
    of county commissioners prior to the effective date of this act, except those
    amendments or supplements which a court of competent jurisdiction has declared
    unlawful or unreasonable or which are the subject of an action now pending in
    such a court, are hereby ratified and shall be valid amendments or supplements
    to such rural zoning plan regardless of the procedure followed with respect to
    such amendments or supplements prior to their adoption by a board of county commissioners,
    except that no right of appeal on the issue of the unlawful or unreasonable character
    of an amendment or supplement shall be lost by the provisions of this section.
