- number: '307.851'
  heading: Contracting with corporation or association, profit or nonprofit, to provide
    health and human services or social services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Notwithstanding anything to the contrary in the Revised Code, a board
    of county commissioners of a county that has enacted a tax levy under section
    5705.191 of the Revised Code, in addition to exercising the other powers granted
    to a board of county commissioners, may enter into a contract with any corporation
    or association, whether the corporation or association is for profit or nonprofit,
    for that corporation or association to provide the services described in this
    section and for the county to pay for those contracted services with the proceeds
    of that tax levy, if the proceeds from that tax levy are used only for the purpose
    or purposes for which the tax was levied. Services for which a contract may be
    entered into under this section are any or all health and human services or social
    services provided to the residents of the county.

    (B) Before entering into a contract as provided in division (A) of this section,
    the board of county commissioners first shall notify, in writing, the particular
    county agency, board, department, or other entity that is required to provide,
    oversee, or acquire related mandated or essential services, as appropriate for
    the services to be provided under the contract, of the board of county commissioner''s
    intention to enter into a contract with a corporation or association to provide
    the health and human services or social services to the residents of the county.
    The notice shall identify the particular services to be so provided, identify
    the corporation or association with which the board proposes to contract, and
    indicate the amount proposed to be paid to the corporation or association for
    performing those services. The notified agency, board, department, or other entity
    has thirty days in which to inform the board of county commissioners of its intention
    to provide the services itself or authorize the board of county commissioners
    to contract with the proposed corporation or association to provide the services.
    If the board of county commissioners receives no response from a notified agency,
    board, department, or other entity within the thirty-day period, the notified
    agency, board, department, or other entity shall be deemed to have authorized
    the proposed contract. Once the contract is authorized by each notified agency,
    board, department, or other entity, the board of county commissioners may enter
    into a contract with the corporation or association, as proposed.

    (C) In addition to any other terms that the board of county commissioners finds
    appropriate, any agreement entered into under division (A) of this section shall
    provide all the following:

    (1) That the corporation or association shall keep current and accurate accounts
    of its use of the moneys it receives from the county;

    (2) That the corporation or association, at least annually, shall have an audit
    performed in accordance with rules adopted by the auditor of state under section
    117.20 of the Revised Code, of any services it has performed with county moneys.
    A copy of the fiscal audit report shall be provided to the board of county commissioners,
    the county auditor, and the auditor of state.

    (3) That the corporation or association is liable to repay to the county any county
    moneys it receives that are improperly used;

    (4) That the corporation or association shall repay to the board of county commissioners
    all county moneys remaining unused at the end of the fiscal year or other accounting
    period for which the board paid the moneys, except that, when the recipient is
    to receive county moneys in the next succeeding fiscal year or other accounting
    period following the fiscal year or other accounting period for which the board
    paid the moneys, the recipient need not repay the county moneys remaining unused;

    (5) That the corporation or association shall provide the board of county commissioners
    annually a summary of the service activities it has performed with county moneys.'
