- number: '309.08'
  heading: Powers and duties of prosecuting attorney - rewards for information as
    to drug-related offenses
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: '(A) The prosecuting attorney may inquire into the commission of crimes within
    the county. The prosecuting attorney shall prosecute, on behalf of the state,
    all complaints, suits, and controversies in which the state is a party, except
    for those required to be prosecuted by a special prosecutor pursuant to section
    177.03 of the Revised Code or by the attorney general pursuant to section 109.83
    of the Revised Code, and other suits, matters, and controversies that the prosecuting
    attorney is required to prosecute within or outside the county, in the probate
    court, court of common pleas, and court of appeals. In conjunction with the attorney
    general, the prosecuting attorney shall prosecute in the supreme court cases arising
    in the prosecuting attorney''s county, except for those cases required to be prosecuted
    by a special prosecutor pursuant to section 177.03 of the Revised Code or by the
    attorney general pursuant to section 109.83 of the Revised Code.

    In every case of conviction, the prosecuting attorney forthwith shall cause execution
    to be issued for the fine and costs, or costs only, as the case may be, and faithfully
    shall urge the collection until it is effected or found to be impracticable to
    collect. The prosecuting attorney forthwith shall pay to the county treasurer
    all moneys belonging to the state or county which come into the prosecuting attorney''s
    possession.

    The prosecuting attorney or an assistant prosecuting attorney of a county may
    participate, as a member of the investigatory staff of an organized crime task
    force established under section 177.02 of the Revised Code that has jurisdiction
    in that county, in an investigation of organized criminal activity under sections
    177.01 to 177.03 of the Revised Code.

    (B) The prosecuting attorney may pay a reward to a person who has volunteered
    any tip or information to a law enforcement agency in the county concerning a
    drug-related offense that is planned to occur, is occurring, or has occurred,
    in whole or in part, in the county. The prosecuting attorney may provide for the
    payment, out of the following sources, of rewards to a person who has volunteered
    tips and information to a law enforcement agency in the county concerning a drug-related
    offense that is planned to occur, is occurring, or has occurred, in whole or in
    part, in the county:

    (1) The law enforcement trust fund established by the prosecuting attorney pursuant
    to division (C)(1) of section 2981.13 of the Revised Code;

    (2) The portion of any mandatory fines imposed pursuant to divisions (B)(1) and
    (2) of section 2929.18 or Chapter 2925. of the Revised Code that is paid to the
    prosecuting attorney pursuant to that division or chapter, the portion of any
    additional fines imposed under division (A) of section 2929.18 of the Revised
    Code that is paid to the prosecuting attorney pursuant to that division, or the
    portion of any fines imposed pursuant to division (A) of section 2925.42 of the
    Revised Code that is paid to the prosecuting attorney pursuant to division (B)
    of that section;

    (3) The furtherance of justice fund allowed to the prosecuting attorney under
    section 325.12 of the Revised Code or any additional funds allowed to the prosecuting
    attorney under section 325.13 of the Revised Code;

    (4) Any other moneys lawfully in the possession or control of the prosecuting
    attorney.

    (C) As used in division (B) of this section, "drug-related offense" means any
    violation of Chapter 2925. or 3719. of the Revised Code or any violation of a
    municipal ordinance that is substantially equivalent to any section in either
    of those chapters.'
