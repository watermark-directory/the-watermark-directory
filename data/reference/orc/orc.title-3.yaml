- number: '329.06'
  heading: County family services planning committee
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) Except as provided in division (C) of this section, the board of county
    commissioners shall establish a county family services planning committee. The
    board shall appoint a member to represent the county department of job and family
    services; an employee in the classified civil service of the county department
    of job and family services, if there are any such employees; and a member to represent
    the public. The board shall appoint other individuals to the committee in such
    a manner that the committee''s membership is broadly representative of the groups
    of individuals and the public and private entities that have an interest in the
    family services provided in the county. The board shall make appointments in a
    manner that reflects the ethnic and racial composition of the county. The following
    groups and entities may be represented on the committee:

    (1) Consumers of family services;

    (2) The public children services agency;

    (3) The child support enforcement agency;

    (4) The county family and children first council;

    (5) Public and private colleges and universities;

    (6) Public entities that provide family services, including boards of health,
    boards of education, the county board of developmental disabilities, and the board
    of alcohol, drug addiction, and mental health services that serves the county;

    (7) Private nonprofit and for-profit entities that provide family services in
    the county or that advocate for consumers of family services in the county, including
    entities that provide services to or advocate for victims of domestic violence;

    (8) Labor organizations;

    (9) Any other group or entity that has an interest in the family services provided
    in the county, including groups or entities that represent any of the county''s
    business, urban, and rural sectors.

    (B) The county family services planning committee shall do all of the following:

    (1) Serve as an advisory body to the board of county commissioners with regard
    to the family services provided in the county, including assistance under Chapters
    5107. and 5108. of the Revised Code, publicly funded child care under Chapter
    5104. of the Revised Code, and social services provided under section 5101.46
    of the Revised Code;

    (2) At least once a year, review and analyze the county department of job and
    family services'' implementation of the programs established under Chapters 5107.
    and 5108. of the Revised Code. In its review, the committee shall use information
    available to it to examine all of the following:

    (a) Return of assistance groups to participation in either program after ceasing
    to participate;

    (b) Teen pregnancy rates among the programs'' participants;

    (c) The other types of assistance the programs'' participants receive, including
    medicaid, publicly funded child care under Chapter 5104. of the Revised Code,
    supplemental nutrition assistance program benefits under section 5101.54 of the
    Revised Code, and energy assistance under Chapter 5117. of the Revised Code;

    (d) Other issues the committee considers appropriate.

    The committee shall make recommendations to the board of county commissioners
    and county department of job and family services regarding the committee''s findings.

    (3) Conduct public hearings on proposed county profiles for the provision of social
    services under section 5101.46 of the Revised Code;

    (4) At the request of the board, make recommendations and provide assistance regarding
    the family services provided in the county;

    (5) At any other time the committee considers appropriate, consult with the board
    and make recommendations regarding the family services provided in the county.
    The committee''s recommendations may address the following:

    (a) Implementation and administration of family service programs;

    (b) Use of federal, state, and local funds available for family service programs;

    (c) Establishment of goals to be achieved by family service programs;

    (d) Evaluation of the outcomes of family service programs;

    (e) Any other matter the board considers relevant to the provision of family services.

    (C) If there is a committee in existence in a county on October 1, 1997, that
    the board of county commissioners determines is capable of fulfilling the responsibilities
    of a county family services planning committee, the board may designate the committee
    as the county''s family services planning committee and the committee shall serve
    in that capacity.'
