- number: '307.692'
  heading: Expending funds for encouraging economic development of the county or area
    through promotion of tourism
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The legislative authority of a county may appropriate moneys from its general
    fund to be expended by the county or by joint agreement with one or more other
    political subdivisions or by private, nonprofit organizations for the public purpose
    of encouraging economic development of the county or area through promotion of
    tourism.

    Semiannual reports on the use of the expenditures shall be made to the legislative
    authority by the chief officer implementing the joint agreement, or the chief
    officer or board of directors of the private nonprofit organizations.

    As used in this section, "promotion of tourism" is the encouragement through advertising,
    educational and informational means, and public relations, both within the state
    and outside of it, of travel by persons away from their homes for pleasure, personal
    reasons, or other purposes, except to work, to the county, or to the local area.'
