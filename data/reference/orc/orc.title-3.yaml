- number: '321.24'
  heading: Settlement by county treasurer with county auditor - allowance of fees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: '(A) On or before the fifteenth day of February, in each year, the county
    treasurer shall settle with the county auditor for all taxes and assessments that
    the treasurer has collected on the general duplicate of real and public utility
    property at the time of making the settlement. If the county treasurer has made
    or will make advance payments to the several taxing districts of current year
    unpaid taxes under section 321.341 of the Revised Code before collecting them,
    the county treasurer shall take the advance payments into account for purposes
    of the settlement with the county auditor under this division.

    (B) On or before the thirtieth day of June, in each year, the treasurer shall
    settle with the auditor for all advance payments of general personal and classified
    property taxes that the treasurer has received at the time of making the settlement.

    (C) On or before the tenth day of August, in each year, the treasurer shall settle
    with the auditor for all taxes and assessments that the treasurer has collected
    on the general duplicates of real and public utility property at the time of making
    such settlement, not included in the preceding February settlement. If the county
    treasurer has made or will make advance payments to the several taxing districts
    of the current year delinquent taxes under section 321.341 of the Revised Code
    before collecting them, the county treasurer shall take the advance payments into
    account for purposes of the settlement with the county auditor under this division.

    (D) On or before the thirty-first day of October, in each year, the treasurer
    shall settle with the auditor for all taxes that the treasurer has collected on
    the general personal and classified property duplicates, and for all advance payments
    of general personal and classified property taxes, not included in the preceding
    June settlement, that the treasurer has received at the time of making such settlement.

    (E) In the event the time for the payment of taxes is extended, pursuant to section
    323.17 of the Revised Code, the date on or before which settlement for the taxes
    so extended must be made, as herein prescribed, shall be deemed to be extended
    for a like period of time. At each such settlement, the auditor shall allow to
    the treasurer, on the moneys received or collected and accounted for by the treasurer,
    the treasurer''s fees, at the rate or percentage allowed by law, at a full settlement
    of the treasurer.

    (F) Within thirty days after the day of each settlement of taxes required under
    divisions (A) and (C) of this section, the treasurer shall certify to the tax
    commissioner any adjustments that have been made to the amount certified previously
    pursuant to section 319.302 of the Revised Code and that the settlement has been
    completed. Upon receipt of such certification, the commissioner shall provide
    for payment to the county treasurer from the general revenue fund of an amount
    equal to one-half of the amount certified by the treasurer in the preceding tax
    year under section 319.302 of the Revised Code, less the sum of (1) one-half of
    the amount computed for all taxing districts in that county for the current fiscal
    year under section 5703.80 of the Revised Code for crediting to the property tax
    administration fund and (2) any reduction required by the commissioner under division
    (D) of section 718.83 of the Revised Code. Such payment shall be credited upon
    receipt to the county''s undivided income tax fund. The county auditor shall distribute
    the amount among the various taxing districts in the county as if it had been
    levied, collected, and settled as real property taxes. The amount distributed
    to each taxing district shall be reduced by the total of the amounts computed
    for the district under section 5703.80 of the Revised Code, but the reduction
    shall not exceed the amount that otherwise would be distributed to the taxing
    district under this division. The amount distributed to a taxing district shall
    account for any reduction required by the commissioner under division (D) of section
    718.83 of the Revised Code. The tax commissioner shall make available to taxing
    districts such information as is sufficient for a taxing district to be able to
    determine the amount of the reduction in its distribution under this section.

    (G)(1) Within thirty days after the day of the settlement required in division
    (D) of this section, the county treasurer shall notify the tax commissioner that
    the settlement has been completed. Upon receipt of that notification, the commissioner
    shall provide for payment to the county treasurer from the general revenue fund
    of an amount equal to the amount certified under former section 319.311 of the
    Revised Code and paid in the state''s fiscal year 2003 multiplied by the percentage
    specified in division (G)(2) of this section. The payment shall be credited upon
    receipt to the county''s undivided income tax fund, and the county auditor shall
    distribute the amount thereof among the various taxing districts of the county
    as if it had been levied, collected, and settled as personal property taxes. The
    amount received by a taxing district under this division shall be apportioned
    among its funds in the same proportion as the current year''s personal property
    taxes are apportioned.

    (2) Payments required under division (G)(1) of this section shall be made at the
    following percentages of the amount certified under former section 319.311 of
    the Revised Code and paid under division (G)(1) of this section in the state''s
    fiscal year 2003:

    (a) In fiscal year 2004, ninety per cent;

    (b) In fiscal year 2005, eighty per cent;

    (c) In fiscal year 2006, sixty-four per cent;

    (d) In fiscal year 2007, forty per cent;

    (e) In fiscal year 2008, thirty-two per cent;

    (f) In fiscal year 2009, sixteen per cent.

    After fiscal year 2009, no payments shall be made under division (G)(1) of this
    section.

    (H)(1) On or before the fifteenth day of April each year, the county treasurer
    shall settle with the county auditor for all manufactured home taxes that the
    county treasurer has collected on the manufactured home tax duplicate at the time
    of making the settlement.

    (2) On or before the fifteenth day of September each year, the county treasurer
    shall settle with the county auditor for all remaining manufactured home taxes
    that the county treasurer has collected on the manufactured home tax duplicate
    at the time of making the settlement.

    (3) If the time for payment of such taxes is extended under section 4503.06 of
    the Revised Code, the time for making the settlement as prescribed by divisions
    (H)(1) and (2) of this section is extended for a like period of time.

    (I) On or before the second Monday in September of each year, the county treasurer
    shall certify to the tax commissioner the total amount by which the manufactured
    home taxes levied in that year were reduced pursuant to section 319.302 of the
    Revised Code. Within ninety days after the receipt of such certification, the
    commissioner shall provide for payment to the county treasurer from the general
    revenue fund of an amount equal to the amount certified by the treasurer. Such
    payment shall be credited upon receipt to the county''s undivided income tax fund.
    The county auditor shall distribute the amount among the various taxing districts
    in the county as if it had been levied, collected, and settled as manufactured
    home taxes.'
