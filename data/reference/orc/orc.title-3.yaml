- number: '307.282'
  heading: Creating community improvements board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'A board of county commissioners of any county that intends to adopt a resolution
    levying a tax under section 5739.026 of the Revised Code, any part of which is
    to be used to provide revenues for distribution through a community improvements
    board, shall adopt a resolution creating such a board.

    A community improvements board shall consist of nine members. The mayor of the
    municipal corporation with the greatest population residing in the county, with
    the approval of that municipal corporation''s legislative authority, shall appoint
    three members, not more than two of whom shall be members of the same political
    party. The board of county commissioners shall appoint six members, not more than
    three of whom shall be members of the same political party. Of the appointments
    made by the board of county commissioners, one member shall be the chief executive
    of a municipal corporation in the county that is not the municipal corporation
    with the greatest population residing in the county, one member shall be a trustee
    of a township in the county, and one member shall be appointed from among the
    following: a chief executive of a municipal corporation in the county that is
    not the municipal corporation with the greatest population residing in the county,
    a trustee of a township in the county, a representative of a major business trade
    association located in the county, or a representative of a labor organization
    located in the county. Members of a community improvements board may hold other
    elective or appointive public office. Terms shall be for three years. The first
    terms of all members appointed to the original board shall begin on the date of
    the appointment of the final member to that board. Vacancies shall be filled for
    the remainder of the unexpired terms in the same manner as the original appointments.
    A vacancy in the membership of the board shall not impair the rights of a quorum
    to exercise all of the rights and perform all of the duties of a board.

    Original appointments to the board shall be made within fifteen days after the
    board of county commissioners adopts the resolution to levy a tax under section
    5739.026 of the Revised Code for the purpose of division (A)(4) of such section.

    A majority of the membership of the board constitutes a quorum, and no action
    shall be taken without the affirmative vote of a majority of the members.

    The members shall elect one member as chairman and one member as secretary for
    terms of one year. The office of the chairman shall alternate between a member
    appointed by the county commissioners and a member appointed by the mayor.

    If a tax proposed under section 5739.026 of the Revised Code is disapproved by
    the electors, the board is dissolved upon the certification of the results of
    the election by the board of elections.

    The community improvements board shall meet within ten days after the date of
    the appointment of the final member of the board.'
