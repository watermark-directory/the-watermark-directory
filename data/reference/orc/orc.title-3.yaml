- number: '307.53'
  heading: Procedure when county auditor unable to sign bonds due to absence or disability
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Whenever, in the issuing of bonds by the board of county commissioners or
    by the board of township trustees, the signature of the county auditor is necessary,
    either to such bonds or to any documents or certificates in connection therewith,
    and by reason of the absence or disability of the auditor it is impossible to
    obtain his signature, on application by the board of county commissioners or by
    the board of township trustees to the court of common pleas of the county, such
    court shall designate a deputy to the auditor, or if there is no such deputy available,
    some other suitable person, to sign the name of such auditor and, if necessary,
    to affix his seal to such bonds, documents, or certificates, in such case such
    deputy or other person shall sign his own name beneath that of the auditor, and
    his signature shall be preceded by the words "Signed by" and followed by the words
    "Pursuant to order of the court of common pleas of _______________ county." All
    bonds, documents, or certificates so signed shall have the same validity, force,
    and effect as though signed personally by the auditor.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.53
- number: '307.54'
  heading: Registry and redemption of bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: All bonds issued by the board of county commissioners shall be correctly numbered
    in the order in which issued, and registered by the county auditor in a book provided
    by him and kept in his office. All warrants drawn upon the county treasurer for
    the payment of the principal and interest on such bonds shall specify the fund
    on which they are drawn. Upon delivering to the holder of any such bond a warrant
    upon the treasurer for its redemption, the auditor shall receive the bond and
    write across the face of it, in red ink, the word "Redeemed," with the proper
    date, and sign his name. Upon receiving the warrant which contains the number
    of the bond for the redemption of which it is drawn, the treasurer shall proceed
    to the office of the auditor, and there, in the presence of the auditor, write,
    in red ink, across the registry of the bond, the word "Redeemed," with the proper
    date, and sign his name. The auditor shall then deliver to the treasurer the original
    bond, for which he shall be credited in his semiannual settlements with the auditor
    and board of county commissioners.
