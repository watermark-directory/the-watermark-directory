- number: '343.04'
  heading: Preparation of general facilities plan
  title:
    num: '3'
    name: Counties
  chapter:
    num: '343'
    name: Solid Waste Management Districts
  text: A board of county commissioners or board of directors of a county or joint
    solid waste management district, after the establishment of the district, may
    have a general plan of solid waste facilities for the district prepared by the
    county sanitary engineer of a county district or, in the case of a joint district,
    by a county sanitary engineer of one of the counties participating in the joint
    district as determined by the board of directors. The general facilities plan
    shall be consistent with the solid waste management plan of the county or joint
    district approved or ordered to be implemented under section 3734.521 or 3734.55
    of the Revised Code and the most current amended plan of the district approved
    or ordered to be implemented under section 3734.521 or 3734.56 of the Revised
    Code, if any. After the general facilities plan has been approved by the board,
    the board may acquire, construct, improve, enlarge, equip, maintain, and operate,
    and may enter into agreements determined by the board to be necessary for the
    acquisition, construction, improvement, enlargement, equipment, maintenance, or
    operation of, any solid waste facilities included in the general facilities plan.
    Such agreements may include provisions concerning at least the ownership and control
    of the facilities by the district or by any other party to the agreement as designated
    in the agreement; the operation, leasing, or subleasing of the facilities by the
    district or by any other such party; and the final sale or other disposition of
    the facilities to the district or to any other such party.
  history: null
