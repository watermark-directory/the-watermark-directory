- number: '349.10'
  heading: Bonds secured by trust agreement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '349'
    name: New Community Organization
  text: 'In the discretion of the board of trustees, any community authority bonds
    or notes or new community authority refunding bonds or notes issued under Chapter
    349. of the Revised Code may be secured by a trust agreement or indenture of mortgage
    between the authority and a corporate trustee, which trustee may be any trust
    company or bank having the powers of a trust company within or without the state.

    Any such trust agreement or indenture of mortgage may pledge or assign the income
    source of the authority to be received. Any such indenture of mortgage may include
    a mortgage of the land, and community facilities acquired or constructed with
    the proceeds of the bonds or notes secured thereby. Any such trust agreement or
    indenture of mortgage or any resolution providing for the issuance of such bonds
    or notes or any other related agreement may contain such provisions for protecting
    and enforcing the rights and remedies of the bondholders, noteholders, or guarantors
    as are reasonable and proper and not in violation of law, including covenants
    setting forth the duties of the authority in relation to land acquisition, land
    development and the construction, improvement, maintenance, repair, operation,
    planning and insurance of the community facilities in connection with which such
    bonds or notes are authorized, the rentals, user fees, or other charges to be
    imposed for the use or services of any community facilities, the custody, safeguarding
    and application of all moneys, and provisions for the employment of consultants
    in connection with the construction or operation of any such community facilities.
    Any bank or trust company incorporated under the laws of this state which may
    act as depository of the proceeds of the bonds or notes or of income source may
    furnish such indemnifying bond or may pledge such securities as are required by
    the authority. Such trust agreement or indenture of mortgage or related agreement
    may set forth the rights and remedies of the bondholders, noteholders, guarantors,
    and of the trustee, and may restrict the individual right of action by bondholders,
    noteholders, and guarantors as is customary in trust agreements or trust indentures
    securing similar bonds or notes. Such trust agreement or indenture of mortgage
    or related agreement may contain such other provisions as the authority considers
    reasonable and proper for the security of the bondholders, noteholders, or guarantors.
    All expenses incurred in carrying out the provisions of any such trust agreement
    or indenture of mortgage or related agreement may be treated as a part of the
    cost of community facilities. Any such trust agreement or indenture of mortgage
    or resolution or related agreement may provide the method whereby the general
    administrative overhead expenses of the authority shall be allocated among the
    several facilities acquired or constructed by it as a factor of the operational
    expense of each such facility.'
  history: null
