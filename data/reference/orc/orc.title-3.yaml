- number: '308.01'
  heading: Airport authorities definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'As used in sections 308.01 to 308.17, inclusive, of the Revised Code:

    (A) "Airport" means any location either on land or water which is used for the
    landing or taking off of aircraft.

    (B) "Airport facility" means any facility used, available for use, or designed
    for use to aid in the safe taking off and landing of aircraft, for the safety,
    storage, and maintenance of aircraft, for the comfort and accommodation of the
    users of air transportation of persons, property, and mail, or for the safe and
    efficient operation and maintenance of an airport, and any combination of such
    facilities.

    (C) "Bonds" or "revenue bonds" includes bonds, notes, bond anticipation notes,
    or other written instruments evidencing indebtedness.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-308.01
- number: '308.02'
  heading: Method of creating regional airport authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: A regional airport authority may be created in the manner provided in section
    308.03 of the Revised Code, for the purpose of acquiring, constructing, operating,
    and maintaining airports and airport facilities.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-308.02
- number: '308.03'
  heading: Resolution creating regional airport authority
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'Any two or more contiguous counties or any single county may create a regional
    airport authority by the adoption of a resolution by the board of county commissioners
    of each county to be included in the regional airport authority. Such resolution
    shall state:

    (A) The necessity for the creation of the regional airport authority;

    (B) The counties to be included within the regional airport authority;

    (C) The official name by which the regional airport authority shall be known;

    (D) The place in which the principal office of the regional airport authority
    will be located or the manner in which it may be selected;

    (E) The number, term, compensation if any, and manner of selecting the members
    of the board of trustees of the regional airport authority;

    (F) The manner in which vacancies on the board of trustees of the regional airport
    authority shall be filled;

    (G) The manner and to what extent the expenses of the regional airport authority
    shall be apportioned among the counties creating it.

    The regional airport authority provided for in such resolution shall be deemed
    to be created upon the adoption of such resolution by the board of county commissioners
    of each county enumerated in the resolution.

    The resolution creating a regional airport authority may be amended to include
    additional counties or for any other purpose, by the adoption of such amendment
    by the board of county commissioners of each county included or to be included
    in the regional airport authority.

    The territorial boundaries of a regional airport authority shall be coextensive
    with the territorial boundaries of the counties included within the regional airport
    authority.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-308.03
- number: '308.04'
  heading: Appointment and organization of board of trustees
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'Within sixty days after a regional airport authority has been created under
    section 308.03 of the Revised Code, the board of trustees for such regional airport
    authority shall be appointed as provided in the resolution creating it.

    Each member of the board of trustees, before entering upon the member''s official
    duties, shall take and subscribe to an oath or affirmation that the member will
    honestly, faithfully, and impartially perform the duties of office, and that the
    member will not be interested directly or indirectly in any contract let by the
    regional airport authority. Any contract let by the regional airport authority
    in which a member of the board of trustees is directly or indirectly interested
    is void and unenforceable, unless a member with an interest in a contract first
    discloses the member''s interest in writing to the remaining members of the board
    and the member with the interest refrains from any participation in the matter.

    After each member of the board has taken the oath as prescribed by this section
    the board shall meet and organize by electing one of its members as president
    and another as vice-president, who shall hold their respective offices until the
    next annual meeting of the board as provided in its bylaws. At each annual meeting
    thereafter the board shall elect from its membership a president and a vice-president
    who shall serve for a term of one year.

    The board shall appoint and fix the compensation of a secretary-treasurer, who
    shall not be a member of the board and who shall serve at the pleasure of the
    board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-308.04
- number: '308.05'
  heading: Procedural rules and regulations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'All the power and authority granted to a regional airport authority shall
    be vested in and exercised by its board of trustees which shall manage and conduct
    its affairs.

    The board shall, within the limitations of sections 308.01 to 308.17, inclusive,
    of the Revised Code, by its rules and regulations provide the procedure for its
    actions, the manner of selection of its president, vice-president, secretary-treasurer,
    and other officers and employees, their titles, terms of office, compensation,
    duties, number, and qualifications, and any other lawful subject necessary to
    the operation of the regional airport authority and the exercise of the powers
    granted to it.'
