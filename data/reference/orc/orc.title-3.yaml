- number: '321.341'
  heading: Advance payment of unpaid taxes to taxing districts
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: '(A) Within one hundred twenty days after the last day on which the first
    installment of current taxes may be paid without penalty, the county treasurer
    of a county in which a county land reutilization corporation is organized under
    Chapter 1724. of the Revised Code, in the treasurer''s sole discretion, may advance
    the payment of current year unpaid taxes that are due and payable to any of the
    taxing districts, upon presentation of the warrant by the county auditor. The
    treasurer may make advance payment of the current year unpaid taxes from one or
    more of the following:

    (1) Collections of taxes and assessments during the one-hundred-twenty-day period;

    (2) A line of credit established under section 307.781 or sections 135.341 and
    321.36 of the Revised Code, or both;

    (3) Proceeds from the issuance of notes under section 133.082 of the Revised Code;

    (4) Any other source of funds lawfully available for that purpose.

    (B) Within one hundred twenty days after the last day on which the second installment
    of current taxes may be paid without penalty, the county treasurer, in the treasurer''s
    sole discretion, may advance the payment of current year delinquent taxes to any
    of the taxing districts, upon presentation of the warrant by the county auditor.
    The treasurer may make advance payment of the current year delinquent taxes from
    one or more of the following:

    (1) Collections of taxes and assessments during the one-hundred-twenty-day period;

    (2) A line of credit established under section 307.781 or sections 135.341 and
    321.36 of the Revised Code, or both;

    (3) Proceeds from the issuance of notes under section 133.082 of the Revised Code;

    (4) Any other source of funds lawfully available for that purpose.

    (C) All advance payments made under this section shall be made in the same manner
    provided for advance payments under section 321.34 of the Revised Code. The county
    treasurer shall give notice by electronic or other means to a taxing district
    any time an advance payment is made to the district under this section. Upon the
    collection of the current year unpaid taxes and current year delinquent taxes
    upon which advances were made under this section from sources other than their
    collection, the treasurer shall deposit those current year unpaid taxes and current
    year delinquent taxes into a special account and shall apply them to the repayment
    of any moneys borrowed for the purpose of making those advance payments, including,
    but not limited to, delinquent tax anticipation notes issued under section 133.082
    of the Revised Code, including the interest thereon; or the reimbursement of draws
    under a line of credit and the payment of the interest due thereon, that funded
    the advance payment in either or both cases. The treasurer shall be entitled to
    retain, upon collection, any penalty and interest that was or will be charged
    on the current year unpaid taxes and the current year delinquent taxes advanced
    under this section. The treasurer shall deposit all such penalties and interest
    collected in the county land reutilization corporation fund established under
    section 321.263 of the Revised Code. No taxing district receiving advance payment
    under division (A) or (B) of this section shall be entitled to receive payment
    of penalties or interest when penalties or interest are collected by the treasurer
    on those current year unpaid taxes and current year delinquent taxes so advanced.

    (D) As used in the section:

    (1) "Current taxes" has the same meaning as in section 323.01 of the Revised Code.

    (2) "Current year unpaid taxes" means the aggregate amount of the first installment
    of current taxes that remain unpaid after the last day on which the first installment
    of such taxes may be paid without penalty.

    (3) "Current year delinquent taxes" means the aggregate amount of current taxes
    that remain unpaid after the last day on which the second installment of such
    taxes may be paid without penalty.'
