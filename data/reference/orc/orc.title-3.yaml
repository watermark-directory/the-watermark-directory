- number: '321.29'
  heading: Certification of county treasurer as to correctness of settlement - oath
    - record
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: At each settlement with the county auditor, the county treasurer shall certify
    at the foot of such settlement, next after the certificate of the auditor, that
    the fees and per cent allowed him in such settlement, together with any other
    fees allowed him by or in pursuance of law, specifying each item in such certificate,
    are all the fees allowed, paid to, or received by him since the last preceding
    settlement, and he shall testify to the correctness of the settlement under oath,
    administered by the auditor, and such oath and certificate shall be recorded by
    the auditor, in the same manner as the certificate of such auditor is recorded.
