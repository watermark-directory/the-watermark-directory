  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'In each county, except as provided in section 329.40 of the Revised Code,
    there shall be a county department of job and family services which, when so established,
    shall be governed by this chapter. The department shall consist of a county director
    of job and family services appointed by the board of county commissioners, and
    such assistants and other employees as are necessary for the efficient performance
    of the functions of the county department. Except as otherwise provided in section
    3.061 of the Revised Code, before entering upon the discharge of the director''s
    official duties, the director shall give a bond, conditioned for the faithful
    performance of those official duties, in such sum as fixed by the board. The director
    may require any assistant or employee under the director''s jurisdiction to give
    a bond in such sum as determined by the board. All bonds given under this section
    shall be with a surety or bonding company authorized to do business in this state,
    conditioned for the faithful performance of the duties of such director, assistant,
    or employee. The expense or premium for any bond required by this section shall
    be paid from the appropriation for administrative expenses of the department.
    Such bond shall be deposited with the county treasurer and kept in the treasurer''s
    office.

    As used in the Revised Code:

    (A) "County department of job and family services" means the county department
    of job and family services established under this section, including an entity
    designated a county department of job and family services under section 307.981
    of the Revised Code, or a joint county department of job and family services established
    under section 329.40 of the Revised Code.

    (B) "County director of job and family services" means the county director of
    job and family services appointed under this section or under section 329.41 of
    the Revised Code.'
