- number: '307.70'
  heading: County charter commissions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'In any county electing a county charter commission, the board of county commissioners
    shall appropriate money for the expenses of such commission in the preparation
    of a county charter, or charter amendment, and the study of problems involved.
    No appropriation shall be made for the compensation of members of the commission
    for their services. The board shall appropriate money for the printing and mailing
    or otherwise distributing to each elector in the county, as far as may be reasonably
    possible, a copy of a charter submitted to the electors of the county by a charter
    commission or by the board pursuant to petition as provided by Section 4 of Article
    X, Ohio Constitution. The copy of the charter shall be mailed or otherwise distributed
    at least thirty days prior to the election. The board shall appropriate money
    for the printing and distribution or publication of proposed amendments to a charter
    submitted by a charter commission pursuant to Section 4 of Article X, Ohio Constitution.
    Notice of amendments to a county charter shall be given by mailing or otherwise
    distributing a copy of each proposed amendment to each elector in the county,
    as far as may be reasonably possible, at least thirty days prior to the election
    or, if the board so determines, by publishing the full text of the proposed amendments
    once a week for at least two consecutive weeks using at least one of the following
    methods:

    (A) In the print or digital edition of a newspaper of general circulation within
    the county;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county.

    No public officer is precluded, because of being a public officer, from also holding
    office as a member of a county charter commission, except that not more than four
    officeholders may be elected to a county charter commission at the same time.
    No member of a county charter commission, because of charter commission membership,
    is precluded from seeking or holding other public office.'
