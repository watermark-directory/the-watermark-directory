  url: https://codes.ohio.gov/ohio-revised-code/section-307.31
- number: '307.32'
  heading: Notice to board of county commissioners of county affected
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners of a county where the county lines are to
    be run, shall give notice to the board of each county affected, declaring its
    intention of running the lines of such county. The board receiving the notice
    shall order the county engineer to run such lines with the engineers of the adjoining
