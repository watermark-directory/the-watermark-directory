- number: '340.30'
  heading: County hub program to combat opioid addiction
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: '(A) There is hereby created the county hub program to combat opioid addiction.
    The purposes of the program are as follows:

    (1) To strengthen county and community efforts to prevent and treat opioid addiction;

    (2) To educate youth and adults about the dangers of opioid addiction and the
    negative effects it has on society;

    (3) To promote family building and workforce development as ways of combating
    opioid addiction in communities;

    (4) To encourage community engagement in efforts to address the purposes specified
    in divisions (A)(1) to (3) of this section.

    (B) The program shall be administered by each board of alcohol, drug addiction,
    and mental health services. If the service district a board represents consists
    of more than one county, the board shall administer the program in each county.'
  history: null
