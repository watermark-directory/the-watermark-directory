- number: '325.33'
  heading: Certificate of title administration fund
  title:
    num: '3'
    name: Counties
  chapter:
    num: '325'
    name: Compensation
  text: '(A) Notwithstanding sections 325.27 and 325.31 of the Revised Code, all fees
    retained by the clerk of courts under Chapters 1548., 4505., and 4519. of the
    Revised Code, all fees the clerk of courts receives as a third-party administrator
    of the motor vehicle skills test under section 4507.112 of the Revised Code, and
    all fees the clerk of courts receives in the capacity of deputy registrar under
    section 4503.03 of the Revised Code shall be paid into the county treasury to
    the credit of the certificate of title administration fund, which is hereby created.
    Fees credited to the fund shall be used as follows:

    (1) To pay the costs incurred by the clerk of courts in processing titles under
    Chapters 1548., 4505., and 4519. of the Revised Code;

    (2) To pay the clerk of courts an eight thousand dollar annual pay supplement
    for performing the duties of a deputy registrar if the clerk is not a limited
    authority deputy registrar, as described in section 4501:1-6-04 of the Ohio Administrative
    Code.

    (B) If the board of county commissioners and the clerk of courts agree that the
    money in the fund exceeds what is needed to pay the costs specified in division
    (A) of this section, the excess may be transferred to the county general fund
    and used for other county purposes. If the board of county commissioners and the
    clerk of courts are unable to agree on the amount of any such excess, the county
    budget commission shall determine the amount that will be transferred to the county
    general fund.'
