- number: '306.80'
  heading: Agreement for regional system between governmental instrumentalities of
    adjacent states
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: One or more contiguous counties of this state, or one or more municipal corporations
    which are in the same county or in contiguous counties, any one of which is adjacent
    to another state, may enter into an agreement, to the extent and in the manner
    authorized by the laws of the United States, with entities or instrumentalities
    of government of other states or of the United States, to provide for the creation
    of a regional transit commission which will provide services and facilities for
    a service area within this state and within one or more states adjacent to this
    state, for the transportation of persons in a manner that will be in the best
    public interest in view of the geographic, economic, population, and other factors
    influencing the needs and development of such service area. The exercise by a
    regional transit commission of the powers and duties conferred upon it shall be
    deemed to be the exercise of essential governmental functions of the states having
    territory included within the territorial boundaries of the regional transit commission.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.80
- number: '306.81'
  heading: Adjacent states definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'As used in sections 306.80 to 306.90, inclusive, of the Revised Code:

    (A) "Public agency" means this state or any adjacent state, or any political subdivision,
    taxing district, or board, commission, or authority of either, or the United States
    or any department, agency, board, commission, authority, or corporation thereof.

    (B) "Regional transit commission" means a body politic and corporate created pursuant
    to sections 306.80 to 306.90, inclusive, of the Revised Code, and having territorial
    boundaries which include the territory of all counties of this state which enter
    into the agreement creating a regional transit commission, or thereafter join
    a regional transit commission, and the territory within one or more other states
    which has been included in a regional transit commission pursuant to such agreement
    or subsequent joinder.

    (C) "Transit facility" means any street railway, motor bus, tramline, subway,
    monorail, rapid transit, aeroplane, helicopter, ferry, or other ground or water
    transportation system having as its primary purpose the regularly scheduled mass
    movement of passengers between locations within the territorial boundaries of
    a regional transit commission, including all rights-of-way, power lines, rolling
    stock, equipment, machinery, terminals, buildings, administration and maintenance
    and repair facilities, and supporting parking facilities, and franchise rights
    attendant thereto, but excluding therefrom trucks and facilities designed for
    use in the movement of property by truck; docks, wharves, warehouses, piers, and
    other port, terminal, or transportation facilities and marinas; facilities used,
    available for use, or designed for use to aid in the safe taking off or landing
    of aircraft, for the safety, storage, and maintenance of aircraft, for the comfort
    and accommodation of users of air transportation of persons, property, and mail,
    or for the safe and efficient operation and maintenance of an airport; and buildings
    and facilities as are reasonably necessary for the comfort and accommodation of
    the users of transit facilities; or any combination of the foregoing.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.81
- number: '306.82'
  heading: Provisions to include in agreement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'An agreement entered into pursuant to section 306.80 of the Revised Code
    may, with respect to a regional transit commission created by such agreement,
    provide for the following:

    (A) Acquisition, by purchase or donation, or by the exercise of the power of eminent
    domain, construction, improvement, extension, enlargement, repair, lease as lessee
    or lessor, sale, operation, maintenance, and management of transit facilities
    within or without the territorial boundaries of such commission, together with
    any other powers and duties provided by sections 306.30 to 306.53 of the Revised
    Code, to a regional transit authority, and by Chapter 308. of the Revised Code
    to a regional airport authority;

    (B) Adoption of rules, including the imposition of rates or charges, respecting
    the ownership, operation, and use of transit facilities subject to the jurisdiction
    of the regional transit commission;

    (C) Petitioning, intervening, and appearing before the interstate commerce commission
    or any other federal, state, or local authority for the adoption, alteration,
    enforcement, or execution of any physical improvement, or tariffs, rates, or charges
    for the use of, or rules concerning, transit facilities;

    (D) Initiating or intervening in any legal proceeding affecting the regional transit
    commission;

    (E) Contracting with persons, corporations, partnerships, associations, or public
    agencies to provide or operate transit facilities;

    (F) Establishing procedure for issuance and securing of revenue bonds of the commission,
    which shall be negotiable instruments, for the purpose of acquiring, constructing,
    improving, extending, or enlarging any one or more transit facilities, including
    all costs incidental thereto and in connection therewith, including the financing
    thereof. Such procedure may provide for securing such revenue bonds by the pledge
    of net revenues of the regional transit commission and by mortgaging any real
    property acquired from the proceeds of such revenue bonds.

    (G) Establishing procedures for the issuance of general obligation bonds of the
    commission pursuant to the procedure set forth in the agreement, for which the
    full faith and credit of the commission shall be pledged. The principal of, and
    any premium and interest on, such bonds shall be paid from the proceeds of ad
    valorem taxes levied on all taxable property within the territorial boundaries
    of the commission, provided that such procedure complies with all requirements
    of the constitutions of all states having territory included within the territorial
    boundaries of the commission, and that the net indebtedness, as defined for a
    municipal corporation in section 133.05 of the Revised Code, incurred by a regional
    transit commission, shall never exceed three per cent of the total value of all
    property within the territorial boundaries of the regional transit commission
    as listed and assessed for taxation. Such procedure shall also include submission
    to the electors within the territorial boundaries of the regional transit commission
    of the question of issuing the bonds of such commission and the levy of such tax
    for the payment of the principal of, and any premium and interest on, such bonds.
    The secretary of state and each board of elections of this state within the territorial
    boundaries of the regional transit commission shall follow the procedure established
    by the agreement for submitting the question of the issuance of such bonds to
    the electors of a regional transit commission. Each auditor and treasurer of any
    county of this state which is included within the territorial boundaries of a
    regional transit commission, shall extend on the tax list and duplicate of all
    taxable property included within the territorial boundaries of a regional transit
    commission, any tax which is to be levied pursuant to provisions of such agreement
    included therein under authority of this division.

    (H) Designation of the official name by which the regional transit commission
    shall be known;

    (I) Establishing the number, term of office, and compensation, which shall not
    exceed fifty dollars for each board or committee meeting attended, of the members
    of the governing board of the regional transit commission and the procedures for
    the appointment of such members and the filling of vacancies;

    (J) Establishing procedure for submitting to the electors of the territory included
    in a regional transit commission, the question of the levy, for a period not exceeding
    ten years, on all taxable property within the territorial boundaries of the regional
    transit commission of an ad valorem tax, not to exceed one mill for each dollar
    of assessed valuation, for the purposes of the regional transit commission. Such
    procedure shall comply with all requirements of the constitutions of all states
    having territory included within the territorial boundaries of the commission.
    Each auditor and treasurer of any county of this state which is included within
    the territorial boundaries of a regional transit commission shall extend on the
    tax list and duplicate of all taxable property included within the territorial
    boundaries of a regional transit commission, any tax which is authorized pursuant
    to this division.

    (K) Exercising the power of eminent domain within the states which have territory
    included within the territorial boundaries of the regional transit commission,
    provided that such power, when exercised within this state, shall be exercised
    in the manner and to the extent it is authorized to be exercised by a regional
    transit authority pursuant to section 306.36 of the Revised Code;

    (L) Establishing procedure for adding to the regional transit commission additional
    areas within a state which has territory included within the territorial boundaries
    of the regional transit commission, provided that such procedure for adding territory
    within this state shall be substantially the same as that provided for adding
    territory to a regional transit authority as provided in division (G) of section
    306.32 of the Revised Code;

    (M) Organizing the governing board of the regional transit commission, and employing
    and compensating employees of and consultants for such commission;

    (N) Suing or being sued in the corporate name of the regional transit commission;

    (O) Establishing procedure for competitive bidding in the sale or lease by a regional
    transit commission of real and personal property and for the acquisition, except
    for real property or interests therein, construction, or improvement of transit
    facilities, and providing reasonable exemptions from such requirement;

    (P) Providing for employee relations in the same manner as is provided by division
    (X) of section 306.35 of the Revised Code for a regional transit authority;

    (Q) Providing for the duration of the agreement and the termination thereof, and
    the procedure for admitting to the regional transit commission territory within
    a state not having territory included within the territorial boundaries of the
    regional transit commission;

    (R) Providing a system of pension benefits for employees of a regional transit
    commission, including an opportunity to employees resident of this state to participate
    in the public employees retirement system pursuant to Chapter 145. of the Revised
    Code;

    (S) Providing for the performance of all functions necessary and incidental to
    a regional transit commission.'
