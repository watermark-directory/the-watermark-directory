- number: '329.07'
  heading: Duties and qualifications of Ohio works first ombudsperson
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'As used in this section, "Ohio works first" and, "Title IV-A" have the same
    meanings as in section 5107.02 of the Revised Code.

    Each county department of job and family services shall have at least one Ohio
    works first ombudsperson. A county department may provide for an Ohio works first
    participant who resides in the county the county department serves and is qualified
    to perform the duties of an ombudsperson to be an ombudsperson. If no Ohio works
    first participant residing in the county the county department serves is qualified
    to perform the duties of an ombudsperson, the county department shall provide
    for one or more employees of the county department to be ombudspersons or contract
    with a person or government entity for the person or entity to perform the duties
    of an ombudsperson for the county department. To the extent permitted by federal
    law, the county department may use funds available under Title IV-A to provide
    for county department employees or a person or government entity under contract
    with the county department to perform the duties of an ombudsperson.

    An Ohio works first ombudsperson shall help Ohio works first applicants and participants
    resolve complaints the applicants and participants have about the administration
    of Ohio works first.

    The department of job and family services shall maintain a toll-free telephone
    number an Ohio works first assistance group may call to obtain the telephone number
    of an Ohio works first ombudsperson.'
