- number: '340.01'
  heading: Alcohol, drug addiction, and mental health service district
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: '(A) As used in this chapter:

    (1) "Addiction," "addiction services," "alcohol and drug addiction services,"
    "alcohol use disorder," "certifiable services and supports," "community addiction
    services provider," "community mental health services provider," "drug addiction,"
    "gambling addiction services," "included opioid and co-occurring drug addiction
    services and recovery supports," "mental health services," "mental illness," "recovery
    housing residence," and "recovery supports" have the same meanings as in section
    5119.01 of the Revised Code.

    (2) "Medication-assisted treatment" means alcohol and drug addiction services
    that are accompanied by medication approved by the United States food and drug
    administration for the treatment of alcohol use disorder or drug addiction, prevention
    of relapse, or both.

    (B) An alcohol, drug addiction, and mental health service district shall be established
    in any county or combination of counties having a population of at least fifty
    thousand. With the approval of the director of behavioral health, any county or
    combination of counties having a population of less than fifty thousand may establish
    such a district. Districts comprising more than one county shall be known as joint-county
    districts.

    The board of county commissioners of any county participating in a joint-county
    district may submit a resolution requesting withdrawal from the district together
    with a comprehensive plan or plans that are in compliance with rules adopted by
    the director of behavioral health under section 5119.22 of the Revised Code to
    the board of alcohol, drug addiction, and mental health services, to the boards
    of county commissioners of each county in the district, and to the director. The
    plan or plans shall include all of the following: proposed bylaws for the operation
    of the newly established district; a list of potential board members; a list of
    the behavioral health services available in the newly established district, including
    inpatient, outpatient, prevention, and housing services; equitable adjustment
    and division of all services, assets, property, debts, and obligations of the
    former joint-county district; a plan ensuring no disruption in behavioral health
    services in the newly established district; and provision for the employment of
    an executive director of the newly established district.

    The director shall approve the plan not later than one year after the date the
    resolution was adopted by the board of county commissioners. No county participating
    in a joint-county district may withdraw from the district without the consent
    of the director of behavioral health nor earlier than one year after the submission
    of such resolution unless all of the participating counties agree to an earlier
    withdrawal.

    Any county withdrawing from a joint-county district shall continue to have levied
    against its tax list and duplicate any tax levied by the district during the period
    in which the county was a member of the district until such time as the levy expires
    or is renewed or replaced.

    (C) For any tax levied under section 5705.19 of the Revised Code by a board of
    a joint-county district formed on or after April 3, 2023, revenue from the tax
    shall only be expended for the benefit of the residents of the county from which
    the revenue is derived. For the purpose of this division, a joint-county district
    is not formed by virtue of a county joining or withdrawing from a district or
    if a joint-county service district merges with another joint-county district.'
