- number: '319.29'
  heading: General tax list and general duplicate of personal property compiled
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: On or before the first Monday of August, annually, the county auditor shall
    compile and make up, in tabular form and alphabetical order, separate lists of
    the names of the several persons, companies, firms, partnerships, associations,
    and corporations in whose names personal property required to be entered on the
    general tax list and duplicate has been listed and assessed as shown on the returns
    and in the preliminary and final assessment certificates in the hands of the auditor
    pursuant to sections 5711.01 to 5711.36 and 5727.29 of the Revised Code, in each
    township, municipal corporation, special district, or separate school district
    or part of either in his county. He shall place in an appropriate column opposite
    each name, the aggregate value of such personal property as listed and assessed
    in such lists. On or before the third Monday of August in each year the auditor
    shall correct such lists in accordance with the additions and deductions ordered
    by the department of taxation, and shall certify and deliver one copy of such
    corrected lists to the county treasurer. The copies prepared by the auditor shall
    constitute the auditor's general tax list and treasurer's general duplicate of
    personal property for the current year.
