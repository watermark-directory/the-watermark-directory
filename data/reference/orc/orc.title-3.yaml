- number: '307.57'
  heading: May execute bonds of indemnity
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: If the county owns any securities of the United States, or any other securities,
    and they have been lost, destroyed, or stolen, the board of county commissioners,
    if necessary for the procuring of duplicates or for the recovery of the amount
    of such certificates, may execute and deliver on behalf of the county bonds of
    indemnity to the United States, or other person, corporation, or municipal corporation
    bound to pay such securities, against all loss or liability for or on account
    of the securities so lost, destroyed, or stolen.
