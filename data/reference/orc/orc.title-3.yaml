- number: '333.01'
  heading: Impact facilities definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '333'
    name: Impact Facilities
  text: 'As used in this chapter:

    (A) "County sales and use tax" means the tax levied by a county under division
    (A) of section 5739.021 or division (A) of section 5741.021 of the Revised Code
    that is returned or distributed to the county under section 5739.21 or 5741.03
    of the Revised Code.

    (B) "Impact facility" means a permanent structure, including all interior or exterior
    square footage used for educational or exhibition activities, that meets all of
    the following criteria:

    (1) It is used for the sale of tangible personal property or services;

    (2) At least ten per cent of the facility''s total square footage is dedicated
    to educational or exhibition activities;

    (3) At least thirty million dollars is invested in land, buildings, infrastructure,
    and equipment for the facility at the site of the facility over a period of not
    more than two years;

    (4) An annualized average of at least one hundred fifty new full-time equivalent
    positions will be created and maintained at the facility;

    (5) More than fifty per cent of the visitors to the facility are reasonably anticipated
    to live at least fifty miles from the facility.

    (C) "Qualifying investment" means a person''s investment in land, buildings, infrastructure,
    and equipment for creating an impact facility.

    (D) "Full-time equivalent positions" means the total number of hours worked at
    a facility in a work week, divided by forty hours per week.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-333.01
- number: '333.02'
  heading: Agreement with proposed builder for tax revenue sharing
  title:
    num: '3'
    name: Counties
  chapter:
    num: '333'
    name: Impact Facilities
  text: Before June 1, 2015, a board of county commissioners of a county that levies
    a county sales and use tax may enter into an agreement with any person that proposes
    to construct an impact facility in the county to provide payments to that person
    of up to seventy-five per cent of the county sales and use tax collected on each
    retail sale made by that person at the facility, for a term of up to ten years,
    or until the person's qualifying investment in the impact facility has been realized
    through the payments, whichever occurs first.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-333.02
- number: '333.03'
  heading: Application to build facility - certification of compliance
  title:
    num: '3'
    name: Counties
  chapter:
    num: '333'
    name: Impact Facilities
  text: '(A) A person seeking to enter into an agreement and obtain payments under
    section 333.02 of the Revised Code shall provide both of the following to the
    board of county commissioners:

    (1) A certification by the person''s chief financial officer, or the equivalent
    if that position does not exist, that the criteria listed in division (B) of section
    333.01 of the Revised Code will be met; and

    (2) An application on a form or in a format acceptable to the board that describes
    the proposed impact facility, including the projected level of investment in and
    new jobs to be created at the facility, the rationale used for determining that
    more than fifty per cent of the facility''s visitors live at least fifty miles
    from the facility, the types of activities to be conducted at the facility, the
    projected levels of sales to occur at the facility, a calculation of the facility''s
    square footage that will be dedicated to educational or exhibition activities,
    and any other information the board of county commissioners reasonably requests
    about the expected operations of the facility.

    (B) The board of county commissioners shall request the director of development
    services to certify that the proposed facility meets the criteria for an impact
    facility listed in division (B) of section 333.01 of the Revised Code. The board
    of county commissioners may, but need not, make findings of fact that a proposed
    facility meets the criteria for an impact facility listed in division (B) of section
    333.01 of the Revised Code before or after requesting the certification. If the
    director of development services certifies a proposed facility as an impact facility
    under this section, and if the board makes such findings, the findings and certification
    are conclusive and not subject to reopening at any time.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-333.03
- number: '333.04'
  heading: Review of application - agreement with builder
  title:
    num: '3'
    name: Counties
  chapter:
    num: '333'
    name: Impact Facilities
  text: '(A) After review of the items submitted under division (A) of section 333.03
    of the Revised Code, and after receipt of the certification from the director
    of development services under division (B) of that section, a board of county
    commissioners, before June 1, 2015, may enter into an agreement under section
    333.02 of the Revised Code, provided that the board has determined all of the
    following:

    (1) The proposed impact facility is economically sound;

    (2) Construction of the proposed impact facility has not begun prior to the day
    the agreement is entered into;

    (3) The impact facility will benefit the county by increasing employment opportunities
    and strengthening the local and regional economy; and

    (4) Receiving payments from the board of county commissioners is a major factor
    in the person''s decision to go forward with construction of the impact facility.

    (B) An agreement entered into under this section shall include all of the following:

    (1) A description of the impact facility that is the subject of the agreement,
    including the existing investment level, if any, the proposed amount of investments,
    the scheduled starting and completion dates for the facility, and the number and
    type of full-time equivalent positions to be created at the facility;

    (2) The percentage of the county sales and use tax collected at the impact facility
    that will be used to make payments to the person entering into the agreement;

    (3) The term of the payments and the first calendar quarter in which the person
    may apply for a payment under section 333.06 of the Revised Code;

    (4) A requirement that the amount of payments made to the person during the term
    established under division (B)(3) of this section shall not exceed the person''s
    qualifying investment, and that all payments cease when that amount is reached;

    (5) A requirement that the person maintain operations at the impact facility for
    at least the term established under division (B)(3) of this section;

    (6) A requirement that the person annually certify to the board of county commissioners,
    on or before a date established by the board in the agreement, the level of investment
    in, the number of employees and type of full-time equivalent positions at, and
    the amount of county sales and use tax collected and remitted to the tax commissioner
    or treasurer of state from sales made at, the facility;

    (7) A provision stating that the creation of the proposed impact facility does
    not involve the relocation of any full-time equivalent positions or any tangible
    personal property to the impact facility from another facility owned by the person,
    or a related member of the person, that is located in another political subdivision
    of this state, other than the political subdivision in which the impact facility
    is or will be located;

    (8) A detailed explanation of how the person determined that more than fifty per
    cent of the visitors to the facility live at least fifty miles from the facility.

    (C) No payment may be made under this chapter to a person that is found to be
    in violation of the provision described in division (B)(7) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-333.04
- number: '333.05'
  heading: Reduction of payments for noncompliance with agreement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '333'
    name: Impact Facilities
  text: '(A) Except as otherwise provided in this division, if a person fails to meet
    or comply with any provision of an agreement entered into under section 333.02
    of the Revised Code, the board of county commissioners may amend the agreement
    to reduce the percentage or term, or both, of the payments the person is entitled
    to receive under the agreement. The reduction shall commence in the calendar quarter
    immediately following the calendar quarter in which the board amends the agreement.
    If a person fails to comply with the provision described in division (B)(7) of
    section 333.04 of the Revised Code, no payments may be made under this chapter
    to that person after the person is found to be in violation.

    (B) A board of county commissioners shall submit to the department of development
    and to the tax commissioner a copy of each agreement entered into under section
    333.02 of the Revised Code and any modifications to an agreement within thirty
    days after finalization or modification of the agreement.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-333.05
- number: '333.06'
  heading: Application of builder for payment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '333'
    name: Impact Facilities
  text: '(A) A person who has entered into an agreement with a board of county commissioners
    under section 333.02 of the Revised Code shall apply for payment with the county
    auditor on a form prescribed by the tax commissioner within sixty days after the
    end of each calendar quarter during which the agreement is in effect. Upon request
    of the county auditor, the tax commissioner shall provide to the county auditor
    the applicant''s sales or use tax return information or any sales or use tax audit
    information, including information regarding state refunds of sales or use taxes,
    that the county auditor needs to determine the amount of the payment that should
    be made to the applicant.

    (B) On receipt of an application for payment under this section and review of
    the applicant''s agreement with the board of county commissioners, the county
    auditor shall determine the amount of the payment the applicant shall receive
    as follows:

    (1) If the amount of the payment is not less than that claimed on the application,
    the county auditor shall certify the amount to the county treasurer, who shall
    make a payment to the applicant from the county sales and use tax revenues returned
    or distributed to the county under sections 5739.21 and 5741.03 of the Revised
    Code. Upon request of the board of county commissioners or the tax commissioner,
    the county auditor shall notify the board or the commissioner, or both, of the
    amount certified and the date the payment will be made.

    (2) If the amount of the payment is less than that claimed on the application,
    the county auditor shall notify the applicant and provide to the applicant the
    reasons why the payment is less than that claimed. If the applicant disagrees
    with the amount of the payment, the applicant may file an appeal with the tax
    commissioner pursuant to, and within the time prescribed by, section 333.07 of
    the Revised Code. To assist in reviewing the amount under appeal, the county auditor
    shall provide to the tax commissioner any information the commissioner requests.

    (C) A payment made under this section or under section 333.07 of the Revised Code
    shall not include interest. The amount of the payment shall be subject to adjustment
    by the county auditor, based on any refunds of the county sales and use tax that
    were made to the person arising from retail sales at the impact facility, including
    for calendar quarters in which such sales were made before the calendar quarter
    for which the person is requesting a payment under this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-333.06
- number: '333.07'
  heading: Appeal of reduced payment by builder to tax commissioner
  title:
    num: '3'
    name: Counties
  chapter:
    num: '333'
    name: Impact Facilities
  text: '(A) An applicant who intends to file an appeal with the tax commissioner
    under division (B)(2) of section 333.06 of the Revised Code shall have sixty days
    from the date the county auditor mails the notice under that section, as shown
    by the United States postal service postmark, to file with the commissioner a
    notice of objection and to request a hearing. The notice of objection shall state
    the reasons why the applicant objects to the amount of the payment to be paid
    to the applicant by the county auditor.

    (B)(1) If an applicant who files an appeal with the tax commissioner under division
    (B)(2) of section 333.06 of the Revised Code does not file a notice of objection
    within the time limit prescribed under division (A) of this section, the tax commissioner
    shall take no further action and the county auditor''s determination under section
    333.06 of the Revised Code is final.

    (2)(a) If the applicant files a notice of objection and requests a hearing within
    the time limit prescribed by division (A) of this section, the tax commissioner
    shall assign a time and place for the hearing and notify the applicant of the
    time and place, but the commissioner may continue the hearing from time to time
    as necessary. After the hearing, the commissioner may make adjustments to the
    payment as the commissioner finds proper, and shall issue a final determination
    thereon.

    (b) If the applicant files a notice of objection within the time limit prescribed
    by division (A) of this section and does not request a hearing, but provides additional
    information within the time limit prescribed by division (A) of this section,
    the tax commissioner shall review the information, may make adjustments to the
    payment as the commissioner finds proper, and shall issue a final determination
    thereon.

    (C) The tax commissioner shall serve a copy of the commissioner''s final determination
    under this section on the applicant that filed the appeal and on the county auditor,
    in the manner provided in section 5703.37 of the Revised Code. The final determination
    may be appealed by the applicant under section 5717.02 of the Revised Code.

    (D) If applicable, the county auditor shall certify to the county treasurer any
    payment due to a person pursuant to the tax commissioner''s final determination
    under this section, adjusted for any changes that were made to the amount of the
    payment as the result of the appeal.'
