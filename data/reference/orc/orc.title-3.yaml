- number: '321.47'
  heading: Notice of continuing education of county treasurer
  title:
    num: '3'
    name: Counties
  chapter:
    num: '321'
    name: Treasurer
  text: '(A) By the fifteenth day of January following completion of each biennial
    cycle described in division (B)(3)(a) of section 321.46 of the Revised Code, the
    auditor of state shall notify the treasurer of state of the continuing education
    hours completed under the auditor of state''s supervision by each county treasurer
    for that biennial cycle pursuant to section 321.46 of the Revised Code.

    (B) By the thirty-first day of January following completion of each biennial cycle
    described in division (B)(3)(a) of section 321.46 of the Revised Code, the treasurer
    of state shall determine whether any county treasurer has failed to comply with
    the county treasurer''s continuing education requirements pursuant to section
    321.46 of the Revised Code and, by certified mail, shall notify any county treasurer
    who has not complied with the requirements. The notice shall contain all of the
    following:

    (1) Notification that the county treasurer is deficient in continuing education
    hours;

    (2) Notification that if the county treasurer believes the treasurer of state''s
    records are in error, the county treasurer has one month to submit proof to the
    treasurer of state that the county treasurer is in compliance with the continuing
    education requirements;

    (3) Notification that completion of the continuing education requirements also
    may be obtained by attending courses approved by the auditor of state or the treasurer
    of state, but that the county treasurer must comply fully with the continuing
    education requirements and that the treasurer of state must have proof of full
    compliance by the last day of April following completion of each biennial cycle;

    (4) Notification that if the county treasurer has failed to comply fully with
    the continuing education requirements by the last day of April following completion
    of each biennial cycle, the treasurer of state will notify the prosecuting attorney
    of that treasurer''s county of that fact immediately.

    (C)(1) Upon receipt of the notice described in division (B)(4) of this section,
    the prosecuting attorney shall petition the court of common pleas of that county
    for an order suspending the county treasurer''s authority to invest county funds
    and to manage the county investment portfolio. The petition shall contain a brief
    statement of the facts and shall show that the county treasurer has failed to
    comply with the continuing education requirements of section 321.46 of the Revised
    Code. Before or simultaneously with the filing of the petition, the prosecuting
    attorney shall serve a copy of the petition upon the county treasurer personally
    or by certified mail, together with a copy of this section. Upon the filing of
    the petition, the court, on the motion of the prosecuting attorney, shall enter
    an order fixing a date for hearing not later than two weeks after the date of
    filing and shall require that a copy of the order be given to the county treasurer
    in the manner in which a summons is required to be served or substituted service
    is required to be made in other cases.

    (2) On the date fixed for the hearing described in division (C)(1) of this section,
    or any adjournment of it, the court shall determine from the petition and evidence
    submitted by either party whether the county treasurer has met the continuing
    education requirements of section 321.46 of the Revised Code for the preceding
    biennial cycle described in division (B)(3)(a) of section 321.46 of the Revised
    Code. If the court finds that the county treasurer has failed to meet these continuing
    education requirements, it shall enter an order transferring the county treasurer''s
    authority to invest county funds and to manage the county portfolio to the county''s
    investment advisory committee until such time as the county treasurer complies
    fully with the continuing education requirements.

    (3) The costs of the proceeding shall be assessed or apportioned as the court
    considers equitable.

    (D) Upon receiving proof of completion of continuing education requirements for
    the preceding biennial cycle described in division (B)(3)(a) of section 321.46
    of the Revised Code, the treasurer of state shall notify the prosecuting attorney
    that the county treasurer has complied fully with the continuing education requirements.
    The prosecuting attorney shall submit this information to the court, and the court
    shall enter an order terminating the authority of the county''s investment advisory
    committee to invest county funds and to manage the county portfolio and restoring
    such authority to the county treasurer.

    (E) The proceedings described in divisions (C) and (D) of this section are special
    proceedings, and final orders in the proceedings may be reviewed and affirmed,
    modified, or reversed on appeal pursuant to the Rules of Appellate Procedure and,
    to the extent not in conflict with those rules, pursuant to Chapter 2505. of the
    Revised Code.'
