  url: https://codes.ohio.gov/ohio-revised-code/section-319.301
- number: '319.302'
  heading: Reduction of remaining taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) For purposes of this section:

    (1) "Farming activity" means farming, leasing property for farming, or holding
    vacant land that the county auditor determines will be used for farming.

    (2) "Residential activity" means occupying or holding property improved with single-family,
    two-family, or three-family dwellings; leasing property improved with single-family,
    two-family, or three-family dwellings; or holding vacant land that the county
    auditor determines will be used to develop single-family, two-family, or three-family
    dwellings.

    (3) "Farming" does not include land used for the commercial production of timber
    that is receiving the tax benefit under section 5713.23 or 5713.31 of the Revised
    Code and all improvements connected with such commercial production of timber.

    (4) "Qualifying levy" means a levy approved at an election held before September
    29, 2013; a levy within the ten-mill limitation; a levy provided for by the charter
    of a municipal corporation that was levied on the tax list for tax year 2013;
    a subsequent renewal of any such levy; or a subsequent substitute for such a levy
    under section 5705.199 of the Revised Code. "Qualifying levy" does not include
    any replacement imposed under section 5705.192 of the Revised Code, as it existed
    before January 1, 2026, of any levy described in division (B)(1) of this section.

    (B)(1) Real property that is intended primarily for use in farming activity or
    residential activity shall qualify for a partial exemption from real property
    taxation.

    (2) Each year, the county auditor shall review each parcel of real property to
    determine whether it qualifies for the partial exemption provided for by this
    section as of the first day of January of the current tax year.

    (C) After complying with section 319.301 of the Revised Code, the county auditor
    shall reduce the remaining sums to be levied by qualifying levies against each
    parcel of real property that is listed on the general tax list and duplicate of
    real and public utility property for the current tax year and that qualifies for
    partial exemption under division (A) of this section, and against each manufactured
    and mobile home that is taxed pursuant to division (D)(2) of section 4503.06 of
    the Revised Code and that is on the manufactured home tax list for the current
    tax year, by the following applicable amount, to provide a partial exemption for
    that parcel or home:

    (1) For property intended primarily for use in a farming activity, ten per cent;

    (2) For property intended primarily for use in a residential activity, seven and
    one-half per cent for the first tax year to which this amendment applies; an additional,
    cumulative reduction of two and one-half percentage points for each of the following
    two tax years; and zero per cent for and after the third following tax year.

    (D) Except as otherwise provided in sections 323.152, 323.158, 323.16, 505.06,
    and 715.263 of the Revised Code, the amount of the taxes remaining after any such
    reduction shall be the real and public utility property taxes charged and payable
    on each parcel of real property, including property that does not qualify for
    partial exemption under division (B) of this section, and the manufactured home
    tax charged and payable on each manufactured or mobile home, and shall be the
    amounts certified to the county treasurer for collection. Upon receipt of the
    real and public utility property tax duplicate, the treasurer shall certify to
    the tax commissioner the total amount by which the real property taxes were reduced
    under this section, as shown on the duplicate. Such reduction shall not directly
    or indirectly affect the determination of the principal amount of notes that may
    be issued in anticipation of any tax levies or the amount of bonds or notes for
    any planned improvements. If after application of sections 5705.31 and 5705.32
    of the Revised Code and other applicable provisions of law, including divisions
    (F) and (I) of section 321.24 of the Revised Code, there would be insufficient
    funds for payment of debt charges on bonds or notes payable from taxes reduced
    by this section, the reduction of taxes provided for in this section shall be
    adjusted to the extent necessary to provide funds from such taxes.

    (E) The tax commissioner may adopt rules governing the administration of the partial
    exemption provided for by this section.

    (F) The determination of whether property qualifies for partial exemption under
    division (B) of this section is solely for the purpose of allowing the partial
    exemption under division (C) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-319.302
- number: '319.303'
  heading: Property tax credit for school districts on a millage floor
  title:
    num: '3'
    name: Counties
  chapter:
    num: '319'
    name: Auditor
  text: '(A) As used in this section:

    (1) "Qualifying nonbusiness property" means real property or a manufactured or
    mobile home that meets all of the following requirements:

    (a) The property is either of the following:

    (i) Real property that is classified as to use as residential/agricultural property
    pursuant to section 5713.041 of the Revised Code, but is not classified as a pond
    or lake;

    (ii) A manufactured or mobile home on which a manufactured home tax is assessed
    pursuant to division (D)(2) of section 4503.06 of the Revised Code.

    (b) The property is located in a county that, for the tax year, is undergoing
    a reappraisal or triennial update.

    (c) The property is located in a school district or joint vocational school district
    that meets either of the following requirements for the tax year:

    (i) The district is subject to an adjustment under division (E) of section 319.301
    of the Revised Code with respect to property classified as to use as residential/agricultural
    property pursuant to section 5713.041 of the Revised Code;

    (ii) The aggregate rate of the district''s taxes for current expenses on such
    property equals less than twenty mills, in the case of a school district, or less
    than two mills, in the case of a joint vocational school district, excluding the
    rate of any tax not subject to division (E) of section 319.301 of the Revised
    Code.

    (d) The property was subject to taxation by that district for the tax year in
    which the immediately preceding reappraisal or triennial update occurred.

    (2) "Qualifying business property" means real property that meets all of the following
    requirements:

    (a) The property is classified as to use as nonresidential/agricultural property
    pursuant to section 5713.041 of the Revised Code, but is not classified as vacant
    property within this class.

    (b) The property is located in a county that, for the tax year, is undergoing
    a reappraisal or triennial update.

    (c) The property is located in a school district or joint vocational school district
    that meets either of the following requirements for the tax year:

    (i) The district is subject to an adjustment under division (E) of section 319.301
    of the Revised Code with respect to property classified as to use as nonresidential/agricultural
    property pursuant to section 5713.041 of the Revised Code;

    (ii) The aggregate rate of the district''s taxes for current expenses on such
    property equals less than twenty mills, in the case of a school district, or less
    than two mills, in the case of a joint vocational school district, excluding the
    rate of any tax not subject to division (E) of section 319.301 of the Revised
    Code.

    (d) The property was subject to taxation by that district for the tax year in
    which the immediately preceding reappraisal or triennial update occurred.

    (3) "Taxes charged and payable" means real property taxes, and manufactured or
    mobile home taxes assessed pursuant to division (D)(2) of section 4503.06 of the
    Revised Code, that are charged and payable after the reduction required by section
    319.301 of the Revised Code but before the reductions required under this section
    or sections 319.302, 3 23.152, 323.158, 319.304, 4503.065, and 4503.0610 of the
    Revised Code, and disregarding a reduction in any levy made by the school district,
    joint vocational school district, or county budget commission under Chapter 5705.
    of the Revised Code.

    (4) "Reappraisal or triennial update" means a tax year in which section 5715.24
    of the Revised Code applies in the county.

    (5) "Indexed property tax revenue" for qualifying nonbusiness property or qualifying
    business property means the sum of the following, as applicable:

    (a) The taxes charged and payable within the ten-mill limitation, and in excess
    of that limitation with respect to any levy not subject to division (E) of section
    319.301 of the Revised Code, for a school district or joint vocational school
    district, as applicable, against qualifying business property or qualifying nonbusiness
    property other than property described in division (A)(1)(a)(ii) of this section
    for the tax year or, in the case of property described in division (A)(1)(a)(ii)
    of this section, for the following tax year;

    (b) The taxes charged and payable in excess of the ten-mill limitation, other
    than those described in division (A)(5)(a) of this section, for the school district
    or joint vocational school district, as applicable, against qualifying business
    property or qualifying nonbusiness property other than property described in division
    (A)(1)(a)(ii) of this section for the immediately preceding tax year or, in the
    case of property described in division (A)(1)(a)(ii) of this section, for the
    current tax year, less any reductions required by this section or Section 4 of
    H.B. 186 of the 136th general assembly for the applicable year;

    (c) The product obtained by multiplying the amount computed with respect to the
    qualifying nonbusiness property or qualifying business property of a school district
    or joint vocational school district under division (A)(5)(b) of this section,
    as applicable, by the greater of zero per cent or the percentage change in the
    gross domestic product deflator computed over the three preceding tax years, as
    determined under division (E) of this section.

    (6) "Floor tax revenue" means the taxes charged and payable for a school district
    or joint vocational school district, as applicable, against qualifying business
    property or qualifying nonbusiness property other than property described in division
    (A)(1)(a)(ii) of this section for the tax year or, in the case of property described
    in division (A)(1)(a)(ii) of this section, for the following tax year.

    (7) "Credit factor" means one minus the quotient obtained by dividing the applicable
    indexed property tax revenue by the applicable floor tax revenue.

    (8) "Effective tax rate" means the effective rate levied by a school district
    or joint vocational school district after making the reduction required by section
    319.301 of the Revised Code, but before making any reduction under this section.

    (B) Qualifying nonbusiness property qualifies for a reduction in the real property
    taxes or manufactured home taxes levied by a school district or joint vocational
    school district as follows:

    (1) If, for a tax year in which a county undergoes a reappraisal or triennial
    update, a school district is described in division (A)(1)(c) of this section and
    its floor tax revenue for qualifying nonbusiness property exceeds its indexed
    property tax revenue for such property, qualifying nonbusiness property located
    in that district shall qualify for a reduction under this division for that tax
    year and for the following two tax years, in the case of property other than that
    described in division (A)(1)(a)(ii) of this section, or for the three following
    tax years, in the case of property described in division (A)(1)(a)(ii) of this
    section. For each such year, the reduction shall equal the result obtained by
    multiplying the taxes charged and payable against the property for the tax year
    by the credit factor computed for the district''s qualifying nonbusiness property
    for the tax year in which the county underwent the reappraisal or triennial update.

    (2) If, for a tax year in which a county undergoes a reappraisal or triennial
    update, a joint vocational school district is described in division (A)(1)(c)
    of this section and its floor tax revenue for qualifying nonbusiness property
    exceeds its indexed property tax revenue for such property, qualifying nonbusiness
    property located in that district shall qualify for a reduction under this division
    for that tax year and for the following two tax years, in the case of property
    other than that described in division (A)(1)(a)(ii) of this section, or for the
    three following tax years, in the case of property described in division (A)(1)(a)(ii)
    of this section. For each such year, the reduction shall equal the result obtained
    by multiplying the taxes charged and payable against the property for the tax
    year by the credit factor computed for the district''s qualifying nonbusiness
    property for the tax year in which the county underwent the reappraisal or triennial
    update.

    (C) Qualifying business property qualifies for a reduction in the real property
    taxes levied by a school district or joint vocational school district as follows:

    (1) If, for a tax year in which a county undergoes a reappraisal or triennial
    update, a school district is described in division (A)(2)(c) of this section and
    its floor tax revenue for qualifying business property exceeds its indexed property
    tax revenue for such property, qualifying business property located in that district
    shall qualify for a reduction under this division for that tax year and for the
    following two tax years. For each such year, the reduction shall equal the result
    obtained by multiplying the taxes charged and payable against the property for
    the tax year by the credit factor computed for the district''s qualifying business
    property for the tax year in which the county underwent the reappraisal or triennial
    update.

    (2) If, for a tax year in which a county undergoes a reappraisal or triennial
    update, a joint vocational school district is described in division (A)(2)(c)
    of this section and its floor tax revenue for qualifying business property exceeds
    its indexed property tax revenue for such property, qualifying business property
    located in that district shall qualify for a reduction under this division for
    that tax year and for the following two tax years. For each such year, the reduction
    shall equal the result obtained by multiplying the taxes charged and payable against
    the property for the tax year by the credit factor computed for the district''s
    qualifying business property for the tax year in which the county underwent the
    reappraisal or triennial update.

    (D) A reduction applied under this section shall reduce only the taxes charged
    and payable of taxes whose effective tax rate is adjusted by operation of division
    (E) of section 319.301 of the Revised Code, in proportion to the extent to which
    each effective tax rate is so adjusted. The county auditor and county treasurer,
    when settling tax collections under section 321.24 of the Revised Code, shall
    compute the amount by which collections of each such tax are to be reduced, and
    the county treasurer shall certify that information to each affected school district
    upon making a payment of such collections to the school district.

    (E) For the purpose of division (A)(5)(c) of this section, the tax commissioner
    shall annually determine the percentage change in the gross domestic product deflator
    determined by the bureau of economic analysis of the United States department
    of commerce from the first day of January of the third preceding calendar year
    to the last day of December of the preceding calendar year. The commissioner shall
    certify the resulting amount to each county auditor whose county undergoes a reappraisal
    or triennial update, not later than the first day of December of each year.

    (F)(1) Division (F) of this section applies to any school district or joint vocational
    school district that reduces one or more of its levies under Chapter 5705. of
    the Revised Code in a tax year, or for which a county budget commission reduces
    one or more levies under that chapter in a tax year. For purposes of division
    (F) of this section, the total amount of such reductions made for that tax year,
    in the case of property other than that described in division (A)(1)(a)(ii) of
    this section, and for the following tax year, in the case of property described
    in division (A)(1)(a)(ii) of this section, are referred to as the "district reduction."

    (2) Notwithstanding divisions (A), (B), and (C) of this section, if division (F)
    of this section applies to a school district or joint vocational school district
    in a tax year, including any tax year in which the county in which the district
    is located does not undergo a reappraisal or triennial update, the tax credit
    factor applicable to that tax year, in the case of property other than that described
    in division (A)(1)(a)(ii) of this section, or to the following tax year, in the
    case of property described in division (A)(1)(a)(ii) of this section, shall be
    adjusted as follows:

    (a) If the amount of the district reduction applicable to qualifying nonbusiness
    property or qualifying business property is less than the total amount of credits
    that would otherwise be allowed under division (B) or (C) of this section for
    such property for the applicable year, multiply the tax credit factor otherwise
    computed under division (A)(7) of this section for such property by a fraction,
    the denominator of which is the total amount of credits that would otherwise be
    allowed under division (B) or (C) of this section, as applicable, and the numerator
    of which is the difference between that total credit amount and the district reduction
    applicable to such property;

    (b) If the amount of the district reduction applicable to qualifying nonbusiness
    property or qualifying business property is equal to or greater than the total
    amount of credits that would otherwise be allowed under division (B) or (C) of
    this section for such property, the tax credit factor for the applicable tax year
    shall be zero.

    (G) The county treasurer shall identify the reduction authorized under this section
    on each tax bill delivered under section 323.13 or 4503.06 of the Revised Code
    as the "Inflation Cap Credit."'
