- number: '305.18'
  heading: Annual inventory
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: Each county officer or department head shall make an inventory, on the second
    Monday in January of each year, of all the materials, machinery, tools, and other
    county supplies under the jurisdiction of such county officer or department head.
    Such inventory shall be a public record, made in duplicate, and one copy shall
    be filed with the clerk of the board of county commissioners and one copy with
    the county auditor.
