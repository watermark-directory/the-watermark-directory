- number: '303.38'
  heading: Acquiring real property by right of eminent domain
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Every board of county commissioners may acquire by eminent domain any interest
    in real property, whether owned privately or publicly, including a fee simple
    title thereto, which it determines necessary for or in connection with a county
    renewal project within the county, and this power may be exercised in the manner
    provided in section 307.08 of the Revised Code, or it may be exercised in the
    manner now or which may be hereafter provided by any other statutory provisions
    for the exercise of the power of eminent domain by boards of county commissioners.
    Real property belonging to the United States, the state of Ohio, or any political
    subdivision of the state, or municipalities shall not be acquired under this section
    without its consent.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.38
- number: '303.39'
  heading: Disposing of real property
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'Notwithstanding any of the provisions of sections 303.07 to 303.10, inclusive,
    of the Revised Code, a county which acquires any real property, or any interest
    therein, in a county renewal area for or in connection with a county renewal project
    thereof for such area may dispose of any of such real property or interest therein
    as follows:

    (A) The board of county commissioners may sell, lease, or otherwise transfer real
    property or any interest therein acquired by it, and may enter into contracts
    with respect thereto, in a county renewal area for residential, recreational,
    commercial, industrial, or other uses or for public use, or may retain such property
    or interest for public use, in accordance with the county renewal plan for such
    county renewal area, subject to such covenants, conditions, and restrictions,
    including covenants running with the land, as it determines to be necessary or
    desirable to assist in preventing the development or spread of future slums or
    blighted areas or to otherwise carry out the purposes of sections 303.26 to 303.56,
    inclusive, of the Revised Code. Such sale, lease, or other transfer, or retention,
    and any agreement relating thereto, may be made only after the approval of the
    county renewal plan by the board. The purchasers or lessees and their successors
    and assigns shall be obligated to devote such real property only to the uses specified
    in the county renewal plan, and may be obligated to comply with such other requirements
    as the county may determine to be in the public interest, including the obligation
    to begin within a reasonable time any improvements on such real property required
    by the county renewal plan. Such real property or interest shall be sold, leased,
    otherwise transferred, or retained at not less than its fair value for uses in
    accordance with the county renewal plan. In determining the fair value of real
    property for uses in accordance with the county renewal plan, the board shall
    take into account and give consideration to the uses provided in such plan; the
    restrictions upon, and the covenants, conditions, and obligations assumed by the
    purchaser or lessee or by the county retaining the property; and the objectives
    of such county renewal plan for the prevention of the recurrence of slum or blighted
    areas. The board in any instrument of conveyance to a private purchaser or lessee
    may provide that such purchaser or lessee shall be without power to sell, lease,
    or otherwise transfer the real property without the prior written consent of the
    board until he has completed the construction of any or all improvements which
    he has obligated himself to construct thereon. Real property acquired under the
    provisions of sections 303.26 to 303.56, inclusive, of the Revised Code, by the
    county which, in accordance with the provisions of the county renewal plan, is
    to be transferred, shall be transferred as rapidly as feasible in the public interest
    consistent with the carrying out of the provisions of the county renewal plan.
    Any contract for such transfer and the county renewal plan, or such part or parts
    of such contract or plan as the board may determine, shall be recorded in the
    land records of the county in such manner as to afford actual or constructive
    notice thereof.

    (B) The board of county commissioners may by resolution authorize the sale, lease,
    transfer, or conveyance of any real property or any interest therein acquired
    by it in accordance with and for the purposes of the county renewal plan either
    with or without competitive bidding therefor upon such lawful terms and conditions
    and in such manner as are prescribed in such resolution by the board of county
    commissioners.

    (C) The board of county commissioners may for a period not to exceed three years
    operate and maintain any real property or interest therein acquired by it in a
    county renewal area for or in connection with a county renewal project of such
    county pending the disposition of the property as authorized in sections 303.26
    to 303.56, inclusive, of the Revised Code, without regard to the provisions of
    division (A) of this section, for such uses and purposes as it determines desirable
    even though not in conformity with the pertinent county renewal plan.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.39
- number: '303.40'
  heading: Cost of street maintenance within a county renewal area
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Costs of maintaining, repairing, constructing, relocating, paving, and repairing
    of public streets, alleys, curbs, and gutters within a county renewal area may
    be paid out of moneys distributed to counties under sections 5735.27 and 4501.04
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.40
- number: '303.41'
  heading: Special assessments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: A board of county commissioners may levy assessments against specially benefited
    lots or lands within a county renewal area or areas for any purpose within or
    without such area or areas for which special assessments may be levied by a county.
    In the exercise of such power to levy special assessments, the provisions of,
    including but not limited to Chapters 5555., 5559., 6103., and 6117. of the Revised
    Code, shall control. A board may include among such specially benefited lots or
    lands any or all lots or lands then or thereafter owned by the county, provided
    that the specially benefited lots or lands may consist entirely of county-owned
    property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.41
- number: '303.42'
  heading: Method of making a special assessment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: In making a special assessment by percentage of the tax value or by the front
    foot on lots or lands not subdivided into lots, on county-owned, or other, lots
    or lands within a county renewal area or areas, when such lots or lands are not
    assessed for taxation, the board of county commissioners shall fix, for the purpose
    of such assessment the value of such lots as they stand and of such land at what
    the board considers a fair average depth for lots in the neighborhood, so that
    it will be a fair average of the assessed value of other lots in the neighborhood,
    if there be such lots.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.42
- number: '303.43'
  heading: Waiving right to collect assessments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: In the event a board of county commissioners instituted assessment proceedings
    affecting lots or lands within a county renewal area, and then or thereafter eminent
    domain proceedings arising under sections 303.26 to 303.56, inclusive, of the
    Revised Code, are pending or contemplated against such lots or lands, the board
    may, by proper entry in such eminent domain proceedings, or by release in the
    event eminent domain proceedings are never brought, waive its right to collection
    out of the compensation awarded for such taking of the amounts levied or to be
    levied in such assessment proceedings. In the event of such waiver, the said assessment
    proceedings and the property liens resulting therefrom shall not be affected by
    the acquisition by the board of any or all of such lots or lands.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.43
- number: '303.44'
  heading: Paying assessments on county owned lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: In the event of the levy of special assessments against lots or lands within
    a county renewal area which lots or lands are or become county-owned, the board
    of county commissioners may authorize the amount of the assessments thereon, or
    the amounts of the respective unpaid installments of such assessments, to be certified
    by the clerk of the board of county commissioners to the county auditor, entered
    upon the tax list of all taxable real and personal property in the county, and
    collected as other taxes, provided that such certification for payment by the
    county at large shall cease upon sale of such lots or lands by the county. The
    unpaid portion of such assessments on lots and lands so sold shall continue as
    liens against the lots and lands in the hands of such purchasers, as other assessments,
    and shall be collected as other taxes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.44
- number: '303.45'
  heading: Funds for planning or county renewal project functions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'In addition to all other powers of boards of county commissioners provided
    by any other laws, any board, in order to provide funds for or in connection with
    its planning or county renewal project functions, under sections 303.26 to 303.56
    of the Revised Code, or for the exercise of any of the powers granted by those
    sections, may:

    (A) Use its general tax revenues;

    (B) Issue and sell its bonds, and its notes in anticipation of such bonds, pursuant
    to Chapter 133. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.45
- number: '303.46'
  heading: Bonds for county renewal project
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: In addition to all other powers of boards of county commissioners provided
    by any other laws, any board may issue bonds from time to time to finance its
    undertaking and carrying out of any county renewal project of such county, including,
    without limiting the generality thereof, the payment of principal and interest
    upon any advances for surveys and plans for or in connection with any such county
    renewal project, and may also issue refunding bonds for the payment or retirement
    of such bonds previously issued by it pursuant to this section. The bonds covered
    by this section shall be payable, as to both principal and interest, solely from
    the county renewal project income, proceeds, revenues, and funds of the county
    derived by it from its undertaking and carrying out of the county renewal project
    with respect to which such bonds are issued. Such bonds, both as to principal
    and interest, may be made payable or additionally payable from or secured by a
    pledge of any loan, grant, gift, or contribution from the federal government or
    any other source, in aid of such county renewal project. Bonds issued under this
    section shall not constitute a part of the net indebtedness of the county. Bonds
    issued under this section shall not constitute general obligations of the county,
    and the general credit or taxing power of the county shall not be pledged for
    the payment of any part of the principal of or interest on such bonds. Bonds issued
    under this section shall be authorized by resolution of the board of county commissioners
    and may be authorized, issued, and sold without a vote of the electors of the
    county. Bonds issued under this section shall bear interest at such rate or rates,
    not exceeding the rate determined as provided in section 9.95 of the Revised Code,
    as may be provided by such resolution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.46
- number: '303.47'
  heading: Validity of signatures of public officials
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: In case any of the public officials whose signatures appear on any bonds or
    coupons issued under any of the provisions of sections 303.26 to 303.56, inclusive,
    of the Revised Code, cease to be such officials before the delivery of such bonds,
    such signatures shall, nevertheless, be valid and sufficient for all purposes,
    the same as if such officials had remained in office until such delivery. Any
    bonds issued under any of the provisions of sections 303.26 to 303.56, inclusive,
    of the Revised Code shall be fully negotiable.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.47
- number: '303.48'
  heading: Validity or enforcement of bond
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: In any suit, action, or proceeding involving the validity or enforcement of
    any bond issued under any of the provisions of sections 303.26 to 303.56, inclusive,
    of the Revised Code, or the security therefor, any such bond reciting in substance
    that it has been issued by the county in connection with county renewal project
    of such county shall be considered to have been issued for such purpose, and such
    project shall be considered to have been planned, located, and undertaken or carried
    out in accordance with the provisions of sections 303.26 to 303.56, inclusive,
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.48
- number: '303.49'
  heading: Bond interest and income exempted from taxes
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Bonds issued under any of the provisions of sections 303.26 to 303.56, inclusive,
    of the Revised Code, are declared to be issued for an essential public and governmental
    purpose and, together with interest thereon and income therefrom, shall be exempted
    from all taxes.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.49
- number: '303.50'
  heading: Bonds are lawful investments
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: All banks, trust companies, bankers, savings banks, and institutions, building
    and loan associations, savings and loan associations, investment companies, and
    other persons carrying on a banking or investment business; all insurance companies,
    insurance associations, and other persons carrying on an insurance business; and
    all executors, administrators, curators, trustees, and other fiduciaries, may
    legally invest any sinking funds, moneys, or other funds belonging to them or
    within their control in any bonds issued by a county pursuant to section 303.46
    of the Revised Code. Such bonds shall be secured by an agreement between the issuer
    and the federal government in which the issuer agrees to borrow from the federal
    government and the federal government agrees to lend to the issuers, prior to
    the maturity of such bonds, moneys in an amount which, together with any other
    moneys irrevocably committed to the payment of principal and interest on such
    bonds, will suffice to pay the principal of such bonds with interest to maturity
    thereon, which moneys under the terms of said agreement are required to be used
    for the purpose of paying the principal of and the interest on such bonds at their
    maturity. Such bonds shall be authorized security for all public deposits. Under
    the provisions of this section any persons, political subdivisions, and officers,
    public or private, are authorized to use any funds owned or controlled by them
    for the purchase of any bonds. Nothing contained in this section with regard to
    legal investments shall be construed as relieving any person of any duty of exercising
    reasonable care in selecting securities.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.50
- number: '303.51'
  heading: Property exempt from levy and sale by virtue of execution
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: All property of a county, including funds owned or held by it for the purposes
    of sections 303.26 to 303.56, inclusive, of the Revised Code, shall be exempt
    from levy and sale by virtue of an execution, and no execution or other judicial
    process shall issue against the same, nor shall judgment against a county be a
    charge or lien upon such property. The provisions of this section shall not apply
    to or limit the right of obligees to pursue any remedies for the enforcement of
    any pledge or lien given pursuant to sections 303.26 to 303.56, inclusive, of
    the Revised Code by a county on rents, fees, grants, or revenues from any county
    renewal project.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.51
- number: '303.52'
  heading: Property exempt from taxation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: The property of a county, acquired or held for the purposes of sections 303.26
    to 303.56, inclusive, of the Revised Code, is declared to be public property used
    for essential public and governmental purposes and such property shall be exempt
    from all taxes of the county, any municipality, the state, or any political subdivision
    thereof. The tax exemption provided for in this section shall terminate when the
    county sells, leases, or otherwise disposes of such property in a county renewal
    area to a purchaser or lessee which is not a public body entitled to tax exemption
    with respect to such property.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.52
- number: '303.53'
  heading: Transfer of property to county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'Any public body, for the purpose of aiding in the planning, undertaking,
    or carrying out of a county renewal project located within an area in which such
    public body is authorized to act, may, upon such terms, with or without consideration
    as it may determine: dedicate, sell, convey, or lease any of such public body''s
    interest in any property or grant easements, licenses, or other rights or privileges
    therein to a county; incur the entire expense of any public improvements made
    by such public body in exercising the powers granted in this section; do any and
    all things necessary to aid or cooperate in the planning or carrying out of a
    county renewal plan; lend, grant, or contribute funds to a county; enter into
    agreements, which may extend over any period, notwithstanding any provision or
    rule of law to the contrary, with a board of county commissioners respecting action
    to be taken pursuant to any of the powers granted by sections 303.26 to 303.56
    of the Revised Code, including the furnishing of funds or other assistance in
    connection with a county renewal project; and cause public buildings and public
    facilities, including parks, playgrounds, recreational, community, educational,
    water, sewer, or drainage facilities, or any other works, which it is otherwise
    empowered to undertake to be furnished, furnish, dedicate, close, vacate, pave,
    install, grade, regrade, plan, or replan streets, roads, sidewalks, ways, or other
    places; plan or replan, zone or rezone any part of the public body or make exceptions
    from building regulations; and cause administrative and other services to be furnished
    to the county. Any sale, conveyance, lease, or agreement provided for in this
    section may be made by a public body without appraisal, public notice, advertisement,
    or public bidding. For the purpose of aiding in the planning, undertaking, or
    carrying out of a county renewal project of a county, any affected municipality
    or any affected county or other public entity may, in addition to its other powers
    and upon such terms, with or without consideration, as it may determine, perform
    any or all of the actions or things which, by the foregoing provisions of this
    section, a public body is authorized to perform, including the furnishing of financial
    or other assistance. For the purpose of this section, or for the purpose of aiding
    in the planning, undertaking, or carrying out of a county renewal project of a
    county, any affected county, municipality, or other public entity may issue and
    sell its general obligation bonds. Any such bonds issued by such affected county,
    municipality, or other public entity shall be issued in the manner and within
    the limitations prescribed by Chapter 133. of the Revised Code. Nothing in this
    section shall limit, restrict, or otherwise affect adversely any of the other
    powers authorized by sections 303.26 to 303.56 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.53
- number: '303.54'
  heading: Presumption of compliance
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Any instrument executed by a county respecting a county renewal project thereof
    and purporting to convey any right, title, or interest in any property under sections
    303.26 to 303.56, inclusive, of the Revised Code, shall be conclusively presumed
    to have been executed in compliance with the applicable provisions of said sections
    insofar as title or other interest of any bona fide purchasers, lessees, or transferees
    of such property is concerned.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.54
- number: '303.55'
  heading: Establishing and maintaining records and funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Any board of county commissioners, in carrying out its operations and activities
    under sections 303.26 to 303.56, inclusive, of the Revised Code, with respect
    to any county renewal project or projects, may set up, establish, and maintain,
    for and on behalf of the county or any affected office, department, board, or
    commission thereof, such books, records, budgets, and accounts, and such general,
    separate, special, or specific funds, including, without limiting the generality
    of the foregoing, such revolving funds, general expense funds, planning funds,
    county renewal project funds, bond and interest retirement funds, and other funds,
    pertaining to said operations and activities, as the board determines to be necessary
    or appropriate for the purposes of these sections; and deposit or cause to be
    deposited in or to the credit of or transferred to any such fund any or all of
    such advances, donations, grants, gifts, contributions, appropriations, rentals,
    bond proceeds, proceeds from the sale, leasing, or other disposition of any of
    its county renewal project property, or other income, revenues, receipts, or profits
    derived by it from its undertaking of any county renewal project, as become available
    to the county in connection with its planning or project activities under the
    provisions of sections 303.26 to 303.56, inclusive, of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.55
- number: '303.56'
  heading: Rules and regulations
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Any county availing itself of any of the provisions of sections 303.26 to
    303.56, inclusive, of the Revised Code, in order to fully effectuate the purposes
    and objectives of said sections in respect of any planning or project activities
    thereunder by such county, may, by its board of county commissioners, prescribe
    such reasonable rules and regulations not inconsistent with said sections, as
    such board of county commissioners determines to be necessary or appropriate.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.56
- number: '303.57'
  heading: County wind and solar generation restriction definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'As used in this section and sections 303.58 to 303.62 of the Revised Code:

    (A) "Economically significant wind farm" has the same meaning as in section 4906.13
    of the Revised Code.

    (B) "Large wind farm" and "large solar facility" have the same meanings as in
    section 4906.01 of the Revised Code.

    (C)(1) "Material amendment" means an amendment to an existing power siting board
    certificate for the construction, operation, or maintenance of a utility facility
    that does any of the following:

    (a) For utility facilities:

    (i) Changes the facility''s generation type from one type of utility facility
    to another;

    (ii) Increases the facility''s nameplate capacity;

    (iii) Changes the boundaries of the facility, unless the new boundaries of the
    facility are completely within the previous boundaries of the facility or the
    facility components outside of the previous boundary are underground.

    (b) For large wind farms and economically significant wind farms:

    (i) Increases the number of wind turbines;

    (ii) Increases the height of a wind turbine.

    (2) Material amendments do not include the addition of a battery storage system
    to a utility facility.

    (D) "Utility facility" means an economically significant wind farm, a large wind
    farm, or a large solar facility.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.57
- number: '303.58'
  heading: Restricted area resolution by county commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: '(A) The board of county commissioners may adopt a resolution designating
    all or part of the unincorporated area of a county as a restricted area, prohibiting
    the construction of any or all of the following:

    (1) An economically significant wind farm;

    (2) A large wind farm;

    (3) A large solar facility.

    (B) A resolution described in division (A) of this section may designate one or
    more restricted areas and shall fix restricted area boundaries within the unincorporated
    area of the county.

    (C)(1) The board may adopt a resolution designating a restricted area at a regular
    meeting of the board or at a special meeting called for the purpose of discussing
    such a resolution.

    (2) At least thirty days prior to the meeting at which a resolution to designate
    a restricted area will be discussed, the board shall do all of the following:

    (a) Provide public notice of the date and time of the meeting by one publication
    using at least one of the following methods:

    (i) In the print or digital edition of a newspaper of general circulation within
    the county;

    (ii) On the official public notice web site established under section 125.182
    of the Revised Code;

    (iii) On the web site and social media account of the county.

    (b) Publicly post a map showing the boundaries of the proposed restricted area
    at all public libraries within the county;

    (c) Provide written notice of the meeting, by first class mail, to all school
    districts, municipal corporations, and boards of township trustees located in
    whole, or in part, within the boundaries of the proposed restricted area.

    (3) The board shall comply with the requirements of divisions (C)(1) and (2) of
    this section before the board modifies a resolution it previously adopted under
    this section.

    (D) Any resolution designating a restricted area shall include a map of the restricted
    area, as well as texts sufficient to identify all boundaries of the restricted
    area. A copy of the resolution and any accompanying texts and maps shall be filed
    with the office of the county recorder of the county.

    (E) A resolution adopted under this section shall not affect the construction
    of a utility facility that was presented to the board of county commissioners
    under section 303.61 of the Revised Code, and the board did not adopt a resolution
    prohibiting the facility within the time required under section 303.62 of the
    Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.58
- number: '303.59'
  heading: Restricted area resolution effective date; referendum
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'A resolution designating a restricted area prohibiting the construction of
    utility facilities, if adopted by the board of county commissioners, becomes effective
    thirty days after the date of its adoption, unless, within thirty days after the
    adoption, there is presented to the board of county commissioners a petition,
    signed by a number of registered electors residing in the county equal to not
    less than eight per cent of the total vote cast for all candidates for governor
    in that county at the most recent general election at which a governor was elected,
    requesting the board of county commissioners to submit the resolution to the electors
    of that county for approval or rejection at a special election to be held on the
    day of the next primary or general election that occurs at least one hundred twenty
    days after the petition is filed. Each part petition shall contain the number
    and the full and correct title, if any, of the resolution, motion, or application,
    furnishing the name by which the resolution is known and a brief summary of its
    contents. In addition to meeting the requirements of this section, each petition
    shall be governed by the rules specified in section 3501.38 of the Revised Code.

    The form of a petition calling for a referendum on the designation of a restricted
    area and the statement of the circulator shall be substantially as follows:

    "PETITION FOR REFERENDUM ON THE DESIGNATION OF A RESTRICTED AREA PROHIBITING THE
    CONSTRUCTION OF UTILITY FACILITIES

    (if the proposal is identified by a particular name or number, or both, these
    should be inserted here)__________

    A proposal to designate a restricted area prohibiting the construction of utility
    facilities in the unincorporated area of __________ county, Ohio, adopted __________(date)
    (followed by brief summary of the resolution).

    To the board of county commissioners of __________ county, Ohio:

    We, the undersigned, being electors residing in __________county, equal to not
    less than eight per cent of the total vote cast for all candidates for governor
    in the county at the preceding general election at which a governor was elected,
    request the board of county commissioners to submit this designation of a restricted
    area to the electors of __________ county, for approval or rejection at a special
    election to be held on the day of the primary or general election to be held on
    __________ (date), pursuant to section 303.59 of the Revised Code.

    __________ Signature

    __________ Residence address

    __________ Date of signing

    STATEMENT OF CIRCULATOR

    I, __________ (name of circulator), declare under penalty of election falsification
    that I reside at the address appearing below my signature; that I am the circulator
    of the foregoing part petition containing __________ (number) signatures; that
    I have witnessed the affixing of every signature; that all signers were to the
    best of my knowledge and belief qualified to sign; and that every signature is
    to the best of my knowledge and belief the signature of the person whose signature
    it purports to be or of an attorney in fact acting pursuant to section 3501.382
    of the Revised Code.

    __________ (Signature of circulator)

    __________ (Circulator''s residence address)

    WHOEVER COMMITS ELECTION FALSIFICATION IS GUILTY OF A FELONY OF THE FIFTH DEGREE."

    The petition shall be filed with the board of county commissioners. Within two
    weeks after receiving a petition filed under this section, the board of county
    commissioners shall certify the petition to the board of elections. A petition
    filed under this section shall be certified to the board of elections not less
    than ninety days prior to the election at which the question is to be voted upon.

    The board of elections shall determine the sufficiency and validity of each petition
    certified to it by a board of county commissioners under this section. If the
    board of elections determines that a petition is sufficient and valid, the question
    shall be voted upon at a special election to be held on the day of the next primary
    or general election that occurs at least one hundred twenty days after the date
    the petition is filed with the board of county commissioners, regardless of whether
    any election will be held to nominate or elect candidates on that day.

    No resolution designating a restricted area for which such a referendum vote has
    been requested shall be put into effect unless a majority of the vote cast on
    the issue is in favor of the resolution. Upon certification by the board of elections
    that the resolution has been approved by the voters, it shall take immediate effect.

    Within five working days after the resolution''s effective date, the board of
    county commissioners shall file the text of the resolution and maps of the restricted
    area in the office of the county recorder and with the county or regional planning
    commission, if one exists.

    The failure to file any resolution, or any text and maps, or duplicates of any
    of these documents, with the office of the county recorder as required by this
    section does not invalidate the resolution.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.59
- number: '303.60'
  heading: Power siting board certificate or amendment prohibited in restricted area
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: If a resolution described in this section is adopted and becomes effective
    under sections 303.58 and 303.59 of the Revised Code, no person shall file, and
    the power siting board shall not accept, an application for a certificate, or
    a material amendment to an existing certificate, to construct, operate, or maintain
    a utility facility in a restricted area where the construction of such a utility
    facility is prohibited by the resolution.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.60
- number: '303.61'
  heading: Public meeting before power siting board application for certificate or
    amendment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: '(A) At least ninety days, but not more than three hundred days, prior to
    applying for a certificate from the power siting board, or a material amendment
    to an existing certificate, for a utility facility, to be located in whole or
    in part in the unincorporated area of a county, the person intending to apply
    shall hold a public meeting in each county where the utility facility is to be
    located.

    (B) The applicant shall provide written notice of the public meeting to the board
    of county commissioners of the county, as well as the boards of trustees of every
    township in which the utility facility is to be located within that county. Notice
    shall be provided at least fourteen days prior to the meeting.

    (C) At the public meeting, the applicant shall provide the following information:

    (1) The person intending to apply for a certificate shall provide the following
    information to the board of county commissioners:

    (a) Whether the utility facility will be:

    (i) A large wind farm;

    (ii) An economically significant wind farm; or

    (iii) A large solar facility.

    (b) The maximum nameplate capacity of the utility facility;

    (c) A map of the proposed geographic boundaries of the project within that county.

    (2) The person intending to apply for a material amendment that makes any change
    or modification to an existing certificate shall comply with the requirements
    of this section when providing information regarding that change or modification
    to the board of county commissioners.

    (3) All of the information described in divisions (C)(1) and (2) of this section
    shall be submitted to the board of county commissioners in written form.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.61
- number: '303.62'
  heading: County commissioner prohibition or limitation resolution after public meeting
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: '(A) Not later than ninety days after the public meeting described in section
    303.61 of the Revised Code regarding an application for a certificate, or a material
    amendment to an existing certificate, for a utility facility, the board of county
    commissioners may adopt a resolution that does either of the following:

    (1) Prohibits the construction of the utility facility that is the subject of
    the certificate;

    (2) Limits the boundaries of the proposed utility facility to a smaller geographic
    area of the county, completely within what was proposed by the applicant.

    (B) If no resolution is adopted within the time required under this section, the
    application may proceed as filed with the power siting board.

    (C) No resolution adopted under this section shall prevent an applicant from filing
    another proposal for consideration by the board of county commissioners at a later
    date.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.62
- number: '303.65'
  heading: Claim preclusion and zoning appeals
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: 'A final judgment on the merits issued by a court of competent jurisdiction
    pursuant to its power of review under Chapter 2506. of the Revised Code, on claims
    brought under this chapter, does not preclude later claims for damages, including
    claims brought under 42 U.S.C. 1983, even if the common law doctrine of res judicata
    would otherwise bar the claim.

    The general assembly intends that this section be construed to override the federal
    sixth circuit court of appeals''s decision in the case Lavon Moore v. Hiram Twp.,
    988 F.3d 353 (6th Cir. 2021).


    The Legislative Service Commission presents the text of this section as a composite
    of the section as amended by multiple acts of the General Assembly. This presentation
    recognizes the principle stated in R.C. 1.52(B) that amendments are to be harmonized
    if reasonably capable of simultaneous operation.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.65
- number: '303.99'
  heading: Penalty
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: Whoever violates sections 303.01 to 303.25 of the Revised Code shall be fined
    not more than five hundred dollars for each offense.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-303.99
- number: '304.01'
  heading: Definitions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '304'
    name: Electronic Records and Signatures
  text: 'As used in this chapter:

    (A) "Agreement" means the bargain of the parties in fact, as found in their language
    or inferred from other circumstances and from rules, regulations, and procedures
    given the effect of agreements under laws otherwise applicable to a particular
    transaction.

    (B) "County office" means any officer, department, board, commission, agency,
    court, or other instrumentality of a county.

    (C) "Electronic" means relating to technology having electrical, digital, magnetic,
    wireless, optical, electromagnetic, or similar capabilities.

    (D) "Electronic record" means a record created, generated, sent, communicated,
    received, or stored by electronic means.

    (E) "Electronic signature" means an electronic sound, symbol, or process attached
    to or logically associated with a record and executed or adopted by a person with
    the intent to sign the record.

    (F) "Information" means data, text, images, sounds, codes, computer programs,
    software, databases, or the like.

    (G) "Person" means an individual, corporation, business trust, estate, trust,
    partnership, limited liability company, association, joint venture, governmental
    agency, public corporation, or other legal or commercial entity.

    (H) "Record" means information that is inscribed on a tangible medium or that
    is stored in an electronic or other medium and is retrievable in perceivable form.

    (I) "Transaction" means an action or set of actions occurring between two or more
    persons relating to the conduct of business, commercial, or governmental affairs.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-304.01
- number: '304.02'
  heading: County office to adopt security procedure prior to use
  title:
    num: '3'
    name: Counties
  chapter:
    num: '304'
    name: Electronic Records and Signatures
  text: Prior to the use of electronic records and electronic signatures by a county
    office under Chapter 1306. of the Revised Code, and except as otherwise provided
    in section 955.023 of the Revised Code, a county office shall adopt, in writing,
    a security procedure for the purpose of verifying that an electronic signature,
    record, or performance is that of a specific person or for detecting changes or
    errors in the information in an electronic record. A security procedure includes,
    but is not limited to, a procedure that requires the use of algorithms or other
    codes, identifying words or numbers, encryption, or callback or other acknowledgment
    procedures.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-304.02
- number: '304.03'
  heading: Authorized electronic filing to have same effect as paper filing
  title:
    num: '3'
    name: Counties
  chapter:
    num: '304'
    name: Electronic Records and Signatures
  text: '(A) Whenever any rule or law requires or authorizes the filing of any information,
    notice, lien, or other document or record with any county office, a filing made
    by an electronic record shall have the same force and effect as a filing made
    on paper in all cases where the county office has authorized or agreed to the
    electronic filing and the filing is made in accordance with applicable rules or
    an applicable agreement.

    (B) Nothing in this section authorizes or shall be construed to authorize the
    use of a financial transaction device in an electronic transaction for the acceptance
    of payments for county expenses, except pursuant to section 301.28 or 955.023
    of the Revised Code.

    (C) As used in this section, "financial transaction device" and "county expenses"
    have the same meanings as in section 301.28 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-304.03
- number: '304.04'
  heading: Use not required
  title:
    num: '3'
    name: Counties
  chapter:
    num: '304'
    name: Electronic Records and Signatures
  text: Nothing in this chapter or Chapter 1306. of the Revised Code requires or shall
    be construed to require any county office to use or permit the use of electronic
    records and electronic signatures.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-304.04
- number: '305.01'
  heading: Board of county commissioners - election, term
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: 'The board of county commissioners shall consist of three persons who shall
    be elected as follows:

    (A) In November, 1974, and quadrennially thereafter, one county commissioner shall
    be elected to take office on the first day of January following.

    (B) In November, 1972, and quadrennially thereafter, two commissioners shall be
    elected. The term of one of such commissioners shall commence on the second day
    of January next after his election, and the term of the other commissioner shall
    commence on the third day of January next after his election.

    (C) Thereafter such officers shall hold office for the term of four years and
    until their successors are elected and qualified.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.01
- number: '305.02'
  heading: Vacancy in county offices filled by election or appointment
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) If a vacancy in the office of county commissioner, prosecuting attorney,
    county auditor, county treasurer, clerk of the court of common pleas, sheriff,
    county recorder, county engineer, or coroner occurs more than forty days before
    the next general election for state and county officers, a successor shall be
    elected at such election for the unexpired term unless such term expires within
    one year immediately following the date of such general election.

    In either event, the vacancy shall be filled as provided in this section and the
    appointee shall hold office until a successor is elected and qualified.

    (B) If a vacancy occurs from any cause in any of the offices named in division
    (A) of this section, then not later than forty-five days after the vacancy occurs,
    a person shall be appointed to hold the office and to perform the duties thereof
    until a successor is elected and has qualified. The appointment shall be made
    as follows:

    (1) If the last occupant of the office was elected as a partisan candidate, the
    county central committee of the political party that nominated the last occupant
    of the office for the current term shall make the appointment. However, if such
    vacancy occurs because of the death, resignation, or inability to take the office
    of an officer-elect whose term has not yet begun, and the officer-elect was elected
    as a partisan candidate, an appointment to take such office at the beginning of
    the term shall be made by the central committee of the political party that nominated
    the officer-elect as a candidate for that office for that term.

    A county central committee that makes an appointment under division (B)(1) of
    this section shall meet for that purpose not less than five nor more than forty-five
    days after the vacancy occurs. Not less than four days before the date of such
    meeting the chairperson or secretary of such central committee shall send by first
    class mail to every member of such central committee a written notice which shall
    state the time and place of such meeting and the purpose thereof. A majority of
    the members of the central committee present at such meeting may make the appointment.

    (2) If the last occupant of the office or the officer-elect was elected to serve
    the current term as an independent candidate, the board of county commissioners
    shall make the appointment, except where the vacancy is in the office of county
    commissioner, in which case the prosecuting attorney and the remaining commissioners
    or a majority of them shall make the appointment.

    (C) Appointments made under this section shall be certified by the appointing
    county central committee or by the board of county commissioners to the county
    board of elections and to the secretary of state, and the persons so appointed
    and certified shall be entitled to all remuneration provided by law for the offices
    to which they are appointed.

    (D) The board of county commissioners may appoint a person to hold any of the
    offices named in division (A) of this section as an acting officer and to perform
    the duties thereof between the occurrence of the vacancy and the time when the
    officer appointed under division (B) of this section qualifies and takes the office.

    (E) A person appointed prosecuting attorney or assistant prosecuting attorney
    shall give bond and take the oath of office prescribed by section 309.03 of the
    Revised Code for the prosecuting attorney.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.02
- number: '305.021'
  heading: County engineer vacancy
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) When there is a vacancy in the county engineer''s office as a result
    of death or resignation and the vacancy cannot be filled by election or appointment
    as provided in section 305.02 of the Revised Code, or if no one runs for the office
    of county engineer and, for that reason, the office is vacant, the board of county
    commissioners may contract with another county''s county engineer to exercise
    the powers and perform the acts, duties, or functions of the county engineer.
    Notwithstanding any contrary provision of the Revised Code or the common law,
    the same person may serve as the county engineer of more than one county, including
    adjacent counties, under this section.

    (B) A county engineer with whom the board contracts shall receive supplemental
    compensation for services rendered under the contract in an amount that is not
    less than eighty per cent nor more than one hundred per cent of the compensation
    specified in sections 325.14 and 325.18 of the Revised Code for the population
    range of the county in which the engineer is contracted to perform services, prorated
    for the duration of the contract. The supplemental compensation shall have no
    effect on the compensation a county engineer receives for serving as county engineer
    in the county in which the engineer holds office. The duration of the contract
    shall not extend beyond the last day of the term for which there was a vacancy.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.021
- number: '305.03'
  heading: Absence of certain county officers; office deemed vacant
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) Whenever any county officer fails to perform the duties of office for
    thirty consecutive days, except in case of sickness or injury as provided in divisions
    (B) and (C) of this section, the office shall be deemed vacant. Performing the
    duties of office includes a county officer appearing in person at the officer''s
    principal office location on at least one out of thirty consecutive days.

    (B) Whenever any county officer is absent because of sickness or injury, the officer
    shall cause to be filed with the board of county commissioners a certificate from
    a physician, certified nurse-midwife, clinical nurse specialist, or certified
    nurse practitioner of the officer''s sickness or injury. If the certificate is
    not filed with the board within ten days after the expiration of thirty consecutive
    days, the office shall be deemed vacant.

    (C) Whenever a county officer files a certificate under division (B) of this section,
    but continues to be absent for an additional thirty days commencing immediately
    after the last day on which this certificate may be filed under division (B) of
    this section, the office shall be deemed vacant.

    (D) If at any time two county commissioners in a county are absent and have filed
    a certificate under division (B) of this section, the county coroner, in addition
    to performing the duties of coroner, shall serve as county commissioner until
    at least one of the absent commissioners returns to office or until the office
    of at least one of the absent commissioners is deemed vacant under this section
    and the vacancy is filled. If the coroner so requests, the coroner shall be paid
    a per diem rate for the coroner''s service as a commissioner. That per diem rate
    shall be the annual salary specified by law for a county commissioner of that
    county whose term of office began in the same year as the coroner''s term of office
    began, divided by the number of days in the year.

    While the coroner is serving as a county commissioner, the coroner shall be considered
    an acting county commissioner and shall perform the duties of the office of county
    commissioner until at least one of the absent commissioners returns to office
    or until the office of at least one of the absent commissioners is deemed vacant.
    Before assuming the office of acting county commissioner, the coroner shall take
    an oath of office as provided in sections 3.22 and 3.23 of the Revised Code. The
    coroner''s service as an acting county commissioner does not constitute the holding
    of an incompatible public office or employment in violation of any statutory or
    common law prohibition against the simultaneous holding of more than one public
    office or employment.

    The coroner shall give a new bond in the same amount and signed and approved as
    provided in section 305.04 of the Revised Code. The bond shall be conditioned
    for the faithful discharge of the coroner''s duties as acting county commissioner
    and for the payment of any loss or damage that the county may sustain by reason
    of the coroner''s failure in those duties. The bond, along with the oath of office
    and approval of the probate judge indorsed on it, shall be deposited and paid
    for as provided for the bonds in section 305.04 of the Revised Code.

    (E) Any vacancy declared under this section shall be filled in the manner provided
    by section 305.02 of the Revised Code.

    (F) This section shall not apply to a county officer while in the active military
    service of the United States.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.03
- number: '305.04'
  heading: Bond of county commissioners - oath of office
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: Before entering upon the discharge of official duties, each county commissioner,
    except as otherwise provided in section 3.061 of the Revised Code, shall give
    bond, signed by a bonding or surety company authorized to do business in this
    state, or, at the county commissioner's option, by two or more freeholders having
    real estate in the value of double the amount of the bond over and above all encumbrances
    to the state, in a sum not less than five thousand dollars, and the surety company
    to be approved by the probate judge of the county. The bond shall be conditioned
    for the faithful discharge of the commissioner's official duties, and for the
    payment of any loss or damage that the county may sustain by reason of the commissioner's
    failure in such duties. Such bond, with the oath of office and approval of the
    probate judge indorsed thereon, shall be deposited with the county treasurer and
    kept in the treasurer's office. The expense or premium for such bond shall be
    paid by the board of county commissioners and charged to the general fund of the
    county. Such surety may be discharged in the manner provided by section 2109.18
    of the Revised Code for the release of sureties of guardians.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.04
- number: '305.05'
  heading: Organization; election of president
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: The board of county commissioners shall organize not later than the second
    Monday of January of each year, by the election of one of its members as president
    for a term of one year. The member so elected shall preside at all regular and
    special sessions of the board. If the position of president becomes vacant during
    the year, the board shall select one of its members to preside.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.05
- number: '305.06'
  heading: Regular sessions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) The board of county commissioners shall conduct at least fifty regular
    sessions each year, at an office provided for the board in the county seat or
    at another location as provided in division (B) of this section. Each of these
    sessions shall be conducted at a specific time fixed in advance. At each meeting
    the board shall transact such business as it considers necessary or as required
    by law.

    (B) The board of county commissioners may provide by resolution for the holding
    of any or all regular sessions of the board at a location in the county other
    than the office provided for the board in the county seat. The adoption of the
    resolution and the location where the session or sessions will be held shall be
    entered on the journal of the board. The board shall give reasonable public notice
    of its action taken pursuant to this division, in accordance with division (F)
    of section 121.22 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.06
- number: '305.07'
  heading: Special sessions
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) Special sessions of the board of county commissioners may be held as
    often as the commissioners deem it necessary. At a regular or special session,
    the board may make any necessary order or contract in relation to the building,
    furnishing, repairing, or insuring of public buildings or bridges; the employment
    of janitors; the improvements or enclosure of public grounds; the maintenance
    or support of persons with developmental disabilities or persons with mental illnesses;
    the expenditure of any fund; or the board may provide for the reconstruction or
    repair of any bridge destroyed by fire, flood, or otherwise. The board shall comply
    with division (F) of section 121.22 of the Revised Code. The board may do any
    other official act not, by law, restricted to a particular regular session.

    (B) The board of county commissioners may provide by resolution for the holding
    of special sessions of the board at a location in the county other than the usual
    office of the board at the county seat. The adoption of the resolution and the
    location where the sessions will be held shall be entered on the journal of the
    board. The board shall give reasonable public notice of its action taken pursuant
    to this division, in accordance with division (F) of section 121.22 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.07
- number: '305.08'
  heading: Quorum
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: A majority of the board shall constitute a quorum at any regular or special
    meeting.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.08
- number: '305.09'
  heading: Proceedings of board of county commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: 'All the proceedings of the board of county commissioners shall be public,
    at the office provided for the board in the county seat, or at another location,
    as provided in division (B) of section 305.06 or division (B) of section 305.07
    of the Revised Code, and, as far as possible, shall be in conformity with the
    rules of parliamentary law.

    If the clerk of the board maintains the full record of the proceedings by electronic
    means, the chairperson of the board, prior to complying with section 305.11 of
    the Revised Code, shall announce that the record is being maintained in such a
    manner and, during the proceedings, shall ensure that each person self-identifies
    prior to speaking during the proceedings.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.09
- number: '305.10'
  heading: Written or electronic record and index of proceedings
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: '(A) Except as otherwise provided in division (B) of this section, the clerk
    of the board of county commissioners shall keep a full written record of the proceedings
    of the board, and a written general index of those proceedings, entering each
    motion with the name of the person making it on the record. The clerk shall call
    and record the yeas and nays on each motion. The clerk shall state fully and clearly
    in the record any question relating to the powers and duties of the board which
    is raised for its consideration by any person having an interest therein, together
    with the decision on such question, and shall call and record the yeas and nays
    by which the decision is made. When requested by a party interested in the proceedings
    or by a party''s counsel, the clerk shall record any legal proposition decided
    by the board, the decision thereon, and the votes by which the decision is reached.
    If either party, in person or by counsel, takes exception to such decision, the
    clerk shall record the exceptions with the record of the decision.

    (B) A board of county commissioners may elect to maintain a full record of its
    proceedings by electronic means, including, but not limited to, those listed in
    section 9.01 of the Revised Code, by adopting a resolution that directs the clerk
    to maintain a full record of the proceedings by electronic means. The clerk also
    shall maintain a general index of the electronic record in either a written form
    or by electronic means, as determined by the board in its resolution. The board''s
    resolution also may authorize the clerk to maintain a written summary of the record
    of the proceedings, provided that the summary shall include a notation that the
    full record of proceedings is maintained by electronic means. If the electronic
    means malfunctions, the clerk shall create the full written record of the proceedings
    as described in division (A) of this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.10
- number: '305.11'
  heading: Signing of record
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: Immediately upon the opening of each day's session of the board of county
    commissioners, the records of the proceedings of the session of the previous day
    shall be read, or provided to each commissioner in written form, by the clerk
    of the board and, if correct, approved and signed by the commissioners. In the
    alternative, if the clerk maintains the full record of the proceedings by electronic
    means as authorized by division (B) of section 305.10 of the Revised Code, the
    board shall orally approve the electronic record of proceedings at the previous
    meeting after the clerk certifies that the entire record of the proceedings at
    that meeting is completely and accurately captured in the electronic record of
    those proceedings. When the board is not in session, the record of proceedings
    shall be kept in the county auditor's office or, if the county has a full-time
    clerk, in the county commissioners' office, open at all proper times to public
    inspection. It shall be certified by the president and clerk of the board and
    shall be received as evidence in every court in the state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.11
- number: '305.12'
  heading: Liability of commissioners
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: The board of county commissioners may sue and be sued, and plead and be impleaded,
    in any court. It may bring, maintain, and defend suits involving an injury to
    any public, state, or county road, bridge, ditch, drain, or watercourse in the
    county with respect to which the county has the primary responsibility to keep
    in proper repair, and for the prevention of injury to them. The board shall demand
    and receive, by suit or otherwise, any real estate or interest in real estate,
    legal or equitable, belonging to the county, or any money or other property due
    the county. The money so recovered shall be paid into the county treasury, and
    the board shall take the county treasurer's receipt for it and file it with the
    county auditor. The board of county commissioners may enter into contracts with
    municipal corporations and townships pursuant to division (D) of section 715.72
    of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-305.12
- number: '305.13'
  heading: Appointment of clerk
  title:
    num: '3'
    name: Counties
  chapter:
    num: '305'
    name: Board of County Commissioners - Generally
  text: If the board of county commissioners finds it necessary for the clerk of the
    board to devote his entire time to the discharge of the duties of such position,
    it may appoint a full time clerk, in place of the county auditor, and such necessary
    assistants to the clerk as the board deems necessary. Such clerk shall perform
    the duties required by sections 305.10 and 305.11 of the Revised Code and by the
    board.
