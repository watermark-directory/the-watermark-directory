- number: '308.08'
  heading: Issuing revenue bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'A regional airport authority which proposes to acquire by purchase or otherwise,
    or proposes to construct, replace, extend, enlarge, maintain, or operate any airport
    or airport facility, and desires to raise money for any of such purposes or for
    the purpose of repaying or refunding any outstanding issue of bonds of the regional
    airport authority or pay any obligation assumed by it or of repaying or refunding
    any outstanding issue of bonds or notes of any political subdivision issued to
    acquire, construct, replace, extend, enlarge, or maintain any airport or airport
    facility acquired by the regional airport authority or repay any advances or loans
    made to the regional airport authority by any person or political subdivision,
    may issue revenue bonds therefor which bonds shall not be secured by the general
    credit of the regional airport authority or by the general credit of the state
    or any political subdivision.

    Such revenue bonds shall have all the qualities of negotiable instruments and
    shall be secured by a pledge of and a lien on the revenues of the regional airport
    authority derived from rentals, fees, charges, or other revenues from any airport
    or airport facility of the regional airport authority as are designated in said
    resolution, including but not limited to the airport or airport facility to be
    acquired, constructed, replaced, extended, enlarged, or maintained with the proceeds
    of said bond issue, after provision only for the reasonable cost of operating,
    maintaining, and repairing the airport or airport facility of the regional airport
    authority so designated, and revenue bonds may be secured otherwise or additionally
    by a pledge of and a lien on such pledges of gifts and receipts from sources other
    than taxation as may be provided in the resolution authorizing such bonds, the
    use of which is not otherwise obligated.

    Said bonds may further be secured by the covenant of the regional airport authority
    to maintain such rates or charges as will produce revenues sufficient to meet
    costs of operating, maintaining, and repairing such airport and airport facility,
    to meet the interest and principal requirements of such bonds and to establish
    and maintain reserves for the foregoing purposes.

    The board of trustees of the regional airport authority may, by resolution, provide
    for the issuance of additional revenue bonds from time to time, such bonds to
    be secured equally and ratably, without preference, priority, or distinction,
    with outstanding revenue bonds, but subject to the terms and limitations of any
    trust agreement entered into under section 308.09 of the Revised Code, and of
    any resolution authorizing bonds then outstanding.

    The board may designate additional airports and airport facilities of the regional
    airport authority, the revenues of which shall be pledged and be subject to a
    lien for service of the principal and interest requirements of revenue bonds theretofore
    authorized, to the same extent as the revenues above described.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-308.08
- number: '308.09'
  heading: Bonds secured by trust agreement
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: 'At the discretion of the board of trustees of a regional airport authority,
    the revenue bonds of the regional airport authority may be secured by a trust
    agreement between the board of trustees on behalf of the regional airport authority
    and a corporate trustee, which trustee may be any trust company or bank having
    powers of a trust company, within or without the state.

    Such trust agreement may provide for the pledge or assignment of the revenues
    to be received, but shall not convey or mortgage any property under the jurisdiction
    of the regional airport authority nor pledge the general credit of the regional
    airport authority. The trust agreement or the resolution providing for the issuance
    of revenue bonds may set forth the rights and remedies of the bond holders and
    trustee, and may contain such other provisions for protecting and enforcing their
    rights and remedies as are, in the discretion of the board of trustees, reasonable
    and proper. Such agreement or resolution may provide for the custody, investment,
    and disbursement of all moneys derived from the sale of such bonds or from the
    revenues of the regional airport authority pledged to pay the interest and principal
    on such bonds and may provide for the deposit of such funds without regard to
    the provisions of section 308.12 of the Revised Code.'
  history: null
