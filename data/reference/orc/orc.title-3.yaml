- number: '302.03'
  heading: Petition on question of adopting one of the alternative forms of county
    government
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: '(A) The board of county commissioners of any county may, by a two-thirds
    vote of the board, or shall, upon petition by three per cent of the electors of
    the county as determined by the number of votes cast therein for the office of
    governor at the most recent gubernatorial election, by resolution, cause the board
    of elections in the county to submit to the electors of the county the question
    of adopting one of the alternative forms of county government authorized by sections
    302.01 to 302.24 of the Revised Code. The question shall be voted upon at the
    next general election occurring not less than ninety days after the certification
    of the resolution to the board of elections.

    (B) If, in any county, a resolution is adopted by the board of county commissioners
    requiring that the question of choosing a commission to frame a county charter
    be submitted to the electors thereof prior to the resolution provided for in this
    section, the proposition to adopt an alternative form of county government provided
    in sections 302.01 to 302.24 of the Revised Code, shall not be submitted in that
    county as long as the question of choosing such commission or of adopting a charter
    framed by such commission is pending therein.

    (C) Any proposition for an alternative form of county government shall specify
    the number of members of the board of county commissioners, how many shall be
    elected at large, or how many shall be elected by districts.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.03
- number: '302.04'
  heading: Ballot language commissioners elected at large
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'In submitting to the electors of any county the question of adopting an alternative
    form of county government whereby the entire board of county commissioners are
    elected at large, the board of elections shall submit the question in language
    substantially as follows:

    "Shall the county of ___________________ adopt the form of county government known
    as the county (name of plan) plan with a board of (number) county commissioners
    elected as provided for in sections 302.01 to 302.24, inclusive, of the Revised
    Code?

    ( ) For adoption of the county (name of plan) plan.

    ( ) Against adoption of the county (name of plan) plan."

    At least forty-five days prior to the election thereon the board of county commissioners
    shall cause a copy of the alternative form to be distributed to each elector of
    the county so far as may be reasonably possible. Immediately following said election
    the board of elections shall file a certificate of the results thereof with the
    secretary of state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.04
- number: '302.041'
  heading: Ballot language commissioners elected by district
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'In submitting to the electors of any county the question of adopting an alternative
    form of county government whereby any members of the board of county commissioners
    are elected by district, the board of elections shall submit the question in language
    substantially as follows:

    "Shall the county of ____________________ adopt the form of county government
    known as the county (name of plan) plan with a board of (number) county commissioners,
    of which (number) shall be elected at large and (number) shall be elected by districts,
    as provided for in sections 302.01 to 302.24, inclusive, of the Revised Code,
    under which form each county commissioner shall receive annual compensation equal
    to (number) per cent of that provided in section 325.10 of the Revised Code?

    ( ) For adoption of the county (name of plan) plan.

    ( ) Against adoption of the county (name of plan) plan."

    The proposition for such alternative form shall establish the percentage of the
    annual compensation provided in section 325.10 of the Revised Code which each
    county commissioner shall receive as annual compensation in lieu of the amount
    provided in section 325.10 of the Revised Code.

    If the proposition for the alternative form fails to divide the county into county
    commissioner districts, the board of elections shall divide the county into such
    districts in the manner provided in section 302.082 of the Revised Code, within
    forty-five days prior to the election on the question of adopting an alternative
    form.

    At least forty-five days prior to the election thereon the board of county commissioners
    shall cause a copy of the alternative form to be distributed to each elector of
    the county so far as may be reasonably possible. The board of elections shall
    display a map indicating the boundaries of each county commissioner district,
    in a conspicuous place at each polling place at such election. Immediately following
    such election the board of elections shall file a certificate of the results thereof
    with the secretary of state.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.041
- number: '302.05'
  heading: Process when alternative form adopted
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'If a majority of the votes cast on the proposition of adopting an alternative
    form of county government is in the affirmative, then such form shall thereby
    be adopted and become the form of government of the county. If more than one alternative
    form receives a majority of votes cast on the proposition in an election, the
    form receiving the largest number of votes shall be adopted. The provisions of
    sections 302.01 to 302.24, inclusive, of the Revised Code, as they apply to the
    nomination and election of county officers, shall be in effect immediately. All
    other provisions of sections 302.01 to 302.24, inclusive, of the Revised Code,
    shall take effect on the first Monday in January following the next regular state
    election.

    Under an alternative form whereby any members of the board of county commissioners
    are elected by districts, each county commissioner shall receive, in lieu of the
    annual compensation provided by section 325.10 of the Revised Code, the percentage
    thereof specified in the adopted plan.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.05
- number: '302.06'
  heading: Proposition to discontinue an alternative form of county government
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: A proposition to discontinue an alternative form of county government under
    sections 302.01 to 302.24, inclusive, of the Revised Code, or to adopt another
    alternative form of county government pursuant to sections 302.01 to 302.24, inclusive,
    of the Revised Code, may be submitted to the electors of the county at any general
    election in the manner provided for the submission of an alternative form of county
    government pursuant to section 302.03 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-302.06
- number: '302.07'
  heading: Adoption or discontinuance of alternative form of county government not
    to affect present acts
  title:
    num: '3'
    name: Counties
  chapter:
    num: '302'
    name: Alternative Form of County Government
  text: 'The adoption or discontinuance of an alternative form of county government
    in any county as provided in sections 302.01 to 302.24, inclusive, of the Revised
    Code, shall not affect any act done, ratified, or affirmed, or any contract or
    other right or obligation other than contracts for personal services, accrued
    or established, or any action, prosecution, or proceeding, civil or criminal,
    pending at the time such change in form of government takes effect; nor shall
    the adoption or discontinuance of such form of government affect causes of such
    action, prosecutions, or proceedings existing at the time it takes effect; but
    such rights shall attach to, and actions, prosecutions, or proceedings may be
    prosecuted and continued, or instituted and prosecuted against, by, or before
    the department having jurisdiction or power of the subject matter to which such
    action, prosecution, or proceedings pertains. All rules, regulations, and orders
    lawfully promulgated prior to such adoption shall continue in force and effect
    until amended or rescinded in accordance with sections 302.01 to 302.24, inclusive,
    of the Revised Code.

    On the effective date of the adoption or discontinuance of an alternative form
    of county government causing a transfer of rights, duties, and powers from one
    department or office to another, all books, records, papers, documents, property,
    real and personal, funds, appropriations and balances of appropriations, and pending
    business in any way pertaining to such rights, powers, and duties shall be similarly
    transferred.'
  history: null
