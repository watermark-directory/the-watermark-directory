- number: '331.01'
  heading: County facilities review board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '331'
    name: County Facilities Review Board
  text: 'In each county there may be a county facilities review board. Each such board
    shall consist of six persons, not more than three of whom shall have the same
    political affiliations, appointed for the inspection of all charitable and correctional
    institutions supported in whole or in part from county or municipal corporation
    funds. Three of such appointees shall be women. If the judge of the probate court
    chooses to appoint a county facilities review board, he shall initially appoint
    six persons, two of whom shall be appointed for terms of three years, two for
    terms of two years, and two for terms of one year. The terms of office shall commence
    on the first day of May. Thereafter, within thirty days prior to the first day
    of May of each year, the judge shall appoint two persons for a term of three years,
    beginning upon the first day of May. The judge of the probate court may terminate
    or reconstitute the county facilities review board by an appropriate journal entry.

    All vacancies in the board shall be filled in the manner provided by the original
    appointment, for the unexpired term only.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-331.01
- number: '331.02'
  heading: Appointment to board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '331'
    name: County Facilities Review Board
  text: A certificate of appointment to the county facilities review board shall be
    issued to the persons appointed under section 331.01 of the Revised Code, and
    a copy, giving full names and addresses, shall be sent to the central office of
    the department of job and family services. No person shall be qualified to serve
    on the board who is in any manner officially connected with any charitable or
    correctional institution within the county supported wholly or partly at public
    expense.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-331.02
- number: '331.03'
  heading: Expenses of board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '331'
    name: County Facilities Review Board
  text: The county facilities review board shall serve without compensation, but actual
    expenses incurred in the discharge of its duties, including the costs of printing
    its annual report required by division (A) of section 331.06 of the Revised Code,
    and actual necessary expense incurred by any member, to be selected by such board,
    in visiting any other charitable or correctional institution for the purpose of
    information, and in attendance upon any convention or meeting held within this
    state in the interest of and to deliberate upon charitable or correctional methods
    and work, to an amount not to exceed one thousand dollars in any year, shall be
    allowed by the board of county commissioners. The county auditor shall issue a
    warrant for such expense which shall be paid by the county treasurer, provided
    the judge of the probate court has issued a certificate that the members of the
    county facilities review board have satisfactorily performed their duties, as
    provided in sections 331.04 to 331.06 of the Revised Code.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-331.03
- number: '331.04'
  heading: Duties of board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '331'
    name: County Facilities Review Board
  text: The county facilities review board, by personal visitation or otherwise, shall
    keep fully advised of the condition and management of all charitable or correctional
    institutions supported in whole or in part by county or municipal taxation, or
    which are under county or municipal control, and especially the county home, county
    jail, municipal prisons, and children's home. From time to time the county facilities
    review board shall recommend to the board of county commissioners and to other
    officials responsible for such institutions, such changes and additional provisions
    as the county facilities review board considers essential for the economical and
    efficient administration of the institutions. At least once in every three months
    each of such institutions shall be visited by the county facilities review board
    or a committee of its members. Failure in the performance of these duties on the
    part of any member of the county facilities review board for one year shall be
    sufficient cause for his removal by the judge of the probate court.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-331.04
- number: '331.05'
  heading: Judge may notify board before committing child to department of youth services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '331'
    name: County Facilities Review Board
  text: The juvenile judge, whenever proceedings are instituted before him to commit
    a child to the department of youth services, may notify the county facilities
    review board of the pendency of such proceedings and such board shall thereupon
    attend and protect the interests of such child.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-331.05
- number: '331.06'
  heading: Annual report
  title:
    num: '3'
    name: Counties
  chapter:
    num: '331'
    name: County Facilities Review Board
  text: '(A) Each year the county facilities review board shall prepare a full report
    of its proceedings during the year, with such recommendations as it considers
    advisable, file such report with the probate judge and the prosecuting attorney
    between the fifteenth day of November and the fifteenth day of December, forward
    a copy thereof to the central office of the department of job and family services,
    and send a copy of that part of the report concerning correctional institutions
    to the department of rehabilitation and correction.

    (B) The probate judge may, in that judge''s discretion, order the publication
    of a summary of the annual report using at least one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    The cost, if any, of such publication shall be paid by the county.'
