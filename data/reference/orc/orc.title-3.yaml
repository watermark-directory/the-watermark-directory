  url: https://codes.ohio.gov/ohio-revised-code/section-322.01
- number: '322.02'
  heading: Real property transfer tax
  title:
    num: '3'
    name: Counties
  chapter:
    num: '322'
    name: Real Property and Manufactured Home Transfer Taxes
  text: '(A) For the purpose of paying the costs of enforcing and administering the
    tax and providing additional general revenue for the county, any county may levy
    and collect a tax to be known as the real property transfer tax on each deed conveying
    real property or any interest in real property located wholly or partially within
    the boundaries of the county at a rate not to exceed thirty cents per hundred
    dollars for each one hundred dollars or fraction thereof of the value of the real
    property or interest in real property located within the boundaries of the county
    granted, assigned, transferred, or otherwise conveyed by the deed. The tax shall
    be levied pursuant to a resolution adopted by the board of county commissioners
    of the county and, except as provided in division (A) of section 322.07 of the
    Revised Code, shall be levied at a uniform rate upon all deeds as defined in division
    (D) of section 322.01 of the Revised Code. Prior to the adoption of any such resolution,
    the board of county commissioners shall conduct two public hearings thereon, the
    second hearing to be not less than three nor more than ten days after the first.
    Notice of the date, time, and place of the hearings shall be given by publication
    once a week on the same day of the week for two consecutive weeks using at least
    one of the following methods:

    (1) In the print or digital edition of a newspaper of general circulation within
    the county;

    (2) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (3) On the web site and social media account of the county.

    The second publication shall be not less than ten nor more than thirty days before
    the first hearing. The tax shall be levied upon the grantor named in the deed
    and shall be paid by the grantor for the use of the county to the county auditor
    at the time of the delivery of the deed as provided in section 319.202 of the
    Revised Code and prior to the presentation of the deed to the recorder of the
    county for recording.

    (B) No resolution levying a real property transfer tax pursuant to this section
    or a manufactured home transfer tax pursuant to section 322.06 of the Revised
    Code shall be effective sooner than thirty days following its adoption. Such a
    resolution is subject to a referendum as provided in sections 305.31 to 305.41
    of the Revised Code, unless the resolution is adopted as an emergency measure
    necessary for the immediate preservation of the public peace, health, or safety,
    in which case it shall go into immediate effect. An emergency measure must receive
    an affirmative vote of all of the members of the board of commissioners, and shall
    state the reasons for the necessity. A resolution may direct the board of elections
    to submit the question of levying the tax to the electors of the county at the
    next primary or general election in the county occurring not less than ninety
    days after the resolution is certified to the board. No such resolution shall
    go into effect unless approved by a majority of those voting upon it.'
