- number: '307.62'
  heading: Crime victim assistance program - appropriating moneys
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) As used in this section:

    (1) "County agency" includes any department, authority, commission, office, or
    board of the county.

    (2) "Crisis intervention services" means short-term emotional or psychological
    aid provided in the form of counseling or referral for crime victims.

    (3) "Emergency services" means the provision of aid including temporary shelter
    for victims who cannot safely remain in their current lodgings, repair of locks
    or boarding up of windows to prevent the immediate reburglarization of a home
    or an apartment, or provision of petty cash for meeting immediate needs related
    to transportation, food, shelter, and other necessities.

    (4) "Support services" includes follow-up counseling, guidance for resolution
    of problems caused by the crime, and assistance in obtaining aid and services
    from social service agencies, criminal justice agencies, and the police.

    (5) "Court-related services" means services calculated to assist crime victims
    in participating in criminal justice proceedings involving crimes committed against
    such victims, including transportation to court, child care while in court or
    at a court-related proceeding, escort services, and the filing of requests for
    restraining orders. "Court-related services" does not include the provision of
    an attorney to represent the crime victim in any criminal prosecution based upon
    the crime committed against such victim.

    (6) "Crime prevention services" means educational programs and materials to help
    avoid and prevent the commission of criminal acts in the future.

    (7) "Victim and offender mediation services" means services designed to provide
    victims the opportunity for a meeting to ask questions, express feelings, or discuss
    restitution agreements with the convicted offenders or delinquent juveniles involved
    in the crimes against such victims.

    (B) In addition to any money from another source appropriated for the same purpose,
    the board of county commissioners of any county may appropriate to a county agency,
    or grant to a private, nonprofit corporation or association, the money derived
    from a tax levied pursuant to division (II) of section 5705.19 of the Revised
    Code, for the public purpose of providing and maintaining in the county a crime
    victim assistance program offering crisis intervention services, emergency services,
    support services, court-related services, crime prevention services, or victim
    and offender mediation services. Money appropriated or granted under this section
    may be used to pay the salaries of employees of the county agency or of the private,
    nonprofit corporation or association who provide those services to clients of
    the agency, corporation, or association, but shall not be used to pay the fees
    of attorneys, doctors, mental health counselors, or other professionals who are
    not employees of the agency, corporation, or association.

    All or some of the money may be given by the board in the form of a grant to a
    private, nonprofit corporation or association, if such corporation or association
    applies, on an application form prescribed by the board, for a grant to provide
    and maintain a crime victim assistance program. The board shall evaluate the application,
    and if such application is approved, the board shall enter into an agreement with
    the corporation or association granting all or some of the money. The agreement
    shall specify the following conditions for use of the money granted:

    (1) That the recipient of the grant money shall keep current and accurate accounts
    of its use of the grant money;

    (2) That, in accordance with rules adopted by the auditor of state pursuant to
    section 117.20 of the Revised Code, at least annually the recipient shall audit
    its crime victim assistance program. The recipient may contract with private auditors
    for performance of these audits. The cost of the audits shall be paid out of the
    grant money, except that no more than ten thousand dollars of the grant money
    may be expended per year on audits. A copy of the fiscal audit report shall be
    provided to the director of the recipient providing the crime victim assistance
    program, the board, the auditor of state, and the county auditor.

    (3) That the recipient is liable to repay to the board any grant money that is
    improperly used;

    (4) That the recipient shall repay to the board all grant money remaining unused
    at the end of the fiscal year or other accounting period for which the board granted
    the money. However, when the recipient is to receive grant money in the next succeeding
    fiscal year or other accounting period following the fiscal year or other accounting
    period for which the board granted the money, the recipient need not repay the
    grant money remaining unused.

    (5) That a summary of program activities offered under the recipient crime victim
    assistance program annually be provided to the board.

    The board shall not expend any money granted under this section until it has received
    a written agreement, signed by an officer or agent of the recipient authorized
    to legally bind the recipient, embodying all conditions stated in division (B)
    of this section and any other conditions specified in the agreement, regarding
    the use of the money granted by the board.

    Upon discovering that money granted under this section is being or has been improperly
    used, the board, by resolution, shall demand that the recipient repay the improperly
    used money and shall transmit a certified copy of the resolution to the recipient.
    If the recipient does not repay the improperly used money within a reasonable
    period of time, the board shall direct the prosecuting attorney to bring a civil
    action to recover the improperly used money.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.62
- number: '307.621'
  heading: Establishing child fatality review board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'A board of county commissioners shall appoint a health commissioner of the
    board of health of a city or general health district that is entirely or partially
    located in the county in which the board of county commissioners is located to
    establish a child fatality review board to review the deaths of children under
    eighteen years of age. The boards of county commissioners of two or more counties
    may, by adopting a joint resolution passed by a majority of the members of each
    participating board of county commissioners, create a regional child fatality
    review board to serve all participating counties. The joint resolution shall appoint,
    for each county participating as part of the regional review board, one health
    commissioner from a board of health of a city or general health district located
    at least in part in each county. The health commissioners appointed shall select
    one of their number as the health commissioner to establish the regional review
    board. The regional review board shall be established in the same manner as provided
    for single county review boards.

    In any county that has a body acting as a child fatality review board on the effective
    date of this section, the board of county commissioners of that county, in lieu
    of having a health commissioner establish a child fatality review board, shall
    appoint that body to function as the child fatality review board for the county.
    The body shall have the same duties, obligations, and protections as a child fatality
    review board appointed by a health commissioner. The board of county commissioners
    or an individual designated by the board shall convene the body as required by
    section 307.624 of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.621
- number: '307.622'
  heading: Members of child fatality review board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) The health commissioner of the board of health of a city or a general
    health district who is appointed under section 307.621 of the Revised Code to
    establish the child fatality review board shall select six members to serve on
    the child fatality review board along with the commissioner. The review board
    shall consist of the following:

    (1) A county coroner or designee;

    (2) The chief of police of a police department or the sheriff that serves the
    greatest population in the county or region or a designee of the chief or sheriff;

    (3) The executive director of a public children services agency or designee;

    (4) A public health official or designee;

    (5) The executive director of a board of alcohol, drug addiction, and mental health
    services or designee;

    (6) A physician who holds a license issued pursuant to Chapter 4731. of the Revised
    Code authorizing the practice of medicine and surgery or osteopathic medicine
    and surgery, specializes in pediatric or family medicine, and currently practices
    pediatric or family medicine.

    (B) The majority of the members of a review board may invite additional members
    to serve on the board. The additional members invited under this division shall
    serve for a period of time determined by a majority of the members described in
    division (A) of this section. An additional member shall have the same authority,
    duties, and responsibilities as members described in division (A) of this section.

    (C) A vacancy in a child fatality review board shall be filled in the same manner
    as the original appointment.

    (D) A child fatality review board member shall not receive any compensation for,
    and shall not be paid for any expenses incurred pursuant to, fulfilling the member''s
    duties on the board unless compensation for, or payment for expenses incurred
    pursuant to, those duties is received pursuant to a member''s regular employment.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.622
- number: '307.623'
  heading: Child fatality review board - purpose and duties
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The purpose of the child fatality review board is to decrease the incidence
    of preventable child deaths by doing all of the following:

    (A) Promoting cooperation, collaboration, and communication between all groups,
    professions, agencies, or entities that serve families and children;

    (B) Maintaining a comprehensive database of all child deaths that occur in the
    county or region served by the child fatality review board in order to develop
    an understanding of the causes and incidence of those deaths;

    (C) Recommending and developing plans for implementing local service and program
    changes and changes to the groups, professions, agencies, or entities that serve
    families and children that might prevent child deaths;

    (D) Advising the department of health of aggregate data, trends, and patterns
    concerning child deaths.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.623
- number: '307.624'
  heading: Organization of child fatality review board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: The board of county commissioners, or if a regional child fatality review
    board is established, the group of health commissioners appointed to select the
    health commissioner to establish the regional review board, shall designate either
    the health commissioner that establishes the review board or a representative
    of the health commissioner to convene meetings and be the chairperson of the review
    board. If a regional review board includes a county with more than one health
    district, the regional review board meeting shall be convened in that county.
    If more than one of the counties participating on the regional review board has
    more than one health district, the person convening the meeting shall select one
    of the counties with more than one health district as the county in which to convene
    the meeting. The person designated to convene the review board shall convene it
    at least once a year to review, in accordance with this section and the rules
    adopted by the department of health under section 3701.045 of the Revised Code,
    the deaths of all children under eighteen years of age who, at the time of death,
    were residents of the county or, if a regional review board, one of the participating
    counties.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.624
- number: '307.625'
  heading: No review while investigation pending
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: A child fatality review board may not conduct a review of the death of a child
    described in section 307.624 of the Revised Code while an investigation of the
    death or prosecution of a person for causing the death is pending unless the prosecuting
    attorney agrees to allow the review. The law enforcement agency conducting the
    criminal investigation, on the conclusion of the investigation, and the prosecuting
    attorney prosecuting the case, on the conclusion of the prosecution, shall notify
    the chairperson of the review board of the conclusion.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.625
- number: '307.626'
  heading: Annual report
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) By the first day of April of each year, the person convening the child
    fatality review board shall prepare and submit to the Ohio department of health
    a report that summarizes the following information with respect to the child deaths
    that were reviewed by the review board in the previous calendar year:

    (1) The cause of death;

    (2) Factors contributing to death;

    (3) Age;

    (4) Sex;

    (5) Race;

    (6) The geographic location of death;

    (7) The year of death.

    The report shall specify the number of child deaths that were not reviewed during
    the previous calendar year.

    The report may include recommendations for actions that might prevent other deaths,
    as well as any other information the review board determines should be included.

    (B) Reports prepared under division (A) of this section shall be considered public
    records under section 149.43 of the Revised Code.

    (C) The child fatality review board shall submit individual data with respect
    to each child death review into the Ohio department of health child death review
    database or the national child death review database. The individual data shall
    include the information specified in division (A) of this section and any other
    information the board considers relevant to the review. Individual data related
    to a child death review that is contained in the Ohio department of health child
    death review database is not a public record under section 149.43 of the Revised
    Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.626
- number: '307.627'
  heading: Accessing confidential information
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A)(1) Notwithstanding section 3701.243 and any other section of the Revised
    Code pertaining to confidentiality, any individual; public children services agency,
    private child placing agency, or agency that provides services specifically to
    individuals or families; law enforcement agency; or other public or private entity
    that provided services to a child whose death is being reviewed by a child fatality
    review board, on the request of the review board, shall submit to the review board
    a summary sheet of information.

    (a) With respect to a request made to a health care entity, the summary sheet
    shall contain only information available and reasonably drawn from the child''s
    medical record created by the health care entity.

    (b) With respect to a request made to any other individual or entity, the summary
    shall contain only information available and reasonably drawn from any record
    involving the child that the individual or entity develops in the normal course
    of business.

    (c) On the request of the review board, an individual or entity may, at the individual
    or entity''s discretion, make any additional information, documents, or reports
    available to the review board.

    (2) Notwithstanding section 3701.243 and any other section of the Revised Code
    pertaining to confidentiality, in the case of a child one year of age or younger
    whose death is being reviewed by a child fatality review board, on the request
    of the review board, a health care entity that provided services to the child''s
    mother shall submit to the review board a summary sheet of information available
    and reasonably drawn from the mother''s medical record created by the health care
    entity. Before submitting the summary sheet, the health care entity shall attempt
    to obtain the mother''s consent to do so, but lack of consent shall not preclude
    the entity from submitting the summary sheet.

    (3) For purposes of the review, the review board shall have access to confidential
    information provided to the review board under this section or division (I)(4)
    of section 2151.421 of the Revised Code, and each member of the review board shall
    preserve the confidentiality of that information.

    (B) Notwithstanding division (A) of this section, no person, entity, law enforcement
    agency, or prosecuting attorney shall provide any information regarding the death
    of a child to a child fatality review board while an investigation of the death
    or prosecution of a person for causing the death is pending unless the prosecuting
    attorney has agreed pursuant to section 307.625 of the Revised Code to allow review
    of the death.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.627
- number: '307.628'
  heading: Immunity
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) An individual or public or private entity providing information, documents,
    or reports to a child fatality review board is immune from any civil liability
    for injury, death, or loss to person or property that otherwise might be incurred
    or imposed as a result of providing the information, documents, or reports to
    the review board.

    (B) Each member of a review board is immune from any civil liability for injury,
    death, or loss to person or property that might otherwise be incurred or imposed
    as a result of the member''s participation on the review board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.628
- number: '307.629'
  heading: Unauthorized dissemination of confidential information
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A) Except as provided in divisions (B) and (C) of this section and sections
    5153.171 to 5153.173 of the Revised Code, any information, document, or report
    presented to a child fatality review board, all statements made by review board
    members during meetings of the review board, all work products of the review board,
    and child fatality review data submitted by the child fatality review board to
    the department of health or a national child death review database, other than
    the report prepared pursuant to division (A) of section 307.626 of the Revised
    Code, are confidential and shall be used by the review board, its members, and
    the department of health only in the exercise of the proper functions of the review
    board and the department.

    (B) A review board may disclose the confidential information described in division
    (A) of this section to a fetal and infant mortality review team.

    (C) A review board may disclose the confidential information described in division
    (A) of this section to a domestic violence fatality review board established under
    section 307.651 of the Revised Code in the same county or region, and otherwise
    collaborate with a domestic violence fatality review board, if the child whose
    death is being reviewed died as a result of domestic violence.

    (D) No person shall permit or encourage the unauthorized dissemination of the
    confidential information described in division (A) of this section.

    (E) Whoever violates division (D) of this section is guilty of a misdemeanor of
    the second degree.'
