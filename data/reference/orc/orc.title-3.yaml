- number: '309.17'
  heading: Action to reclaim property
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: When the prosecuting attorney of a county is informed that a person has in
    his possession money or other property belonging to a person found dead within
    such county, upon whose estate no letters of administration have been issued,
    the prosecuting attorney, by notice in writing, shall require the person having
    such money or other property to deposit it with the probate court. If within fifteen
    days such person does not comply with such requirement, the prosecuting attorney
    shall bring suit in the court of common pleas, in the name of the state, for the
    recovery thereof, and, when recovered, it shall be at the disposition of the probate
    court.
