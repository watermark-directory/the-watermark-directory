- number: '307.655'
  heading: No review while investigation or prosecution pending
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: A domestic violence fatality review board may not conduct a review of a death
    while an investigation of the death or prosecution of a person for causing the
    death is pending unless the prosecuting attorney agrees to allow the review. The
    law enforcement agency conducting the criminal investigation, on the conclusion
    of the investigation, and the prosecuting attorney prosecuting the case, on the
    conclusion of the prosecution, shall notify the chairperson of the review board
    of the conclusion.
  history: null
