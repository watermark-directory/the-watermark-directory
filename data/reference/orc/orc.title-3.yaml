- number: '306.90'
  heading: Severability
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: Each agreement made pursuant to sections 306.80 to 306.90, inclusive, of the
    Revised Code, shall be entered into and become effective in accordance with the
    applicable provisions of the constitution and statutes of this state, the other
    states having territory included within the territorial boundaries of the regional
    transit commission, and the United States. If any such agreement or any law pursuant
    to which such an agreement is entered into or any part of such an agreement or
    law is held unconstitutional, void, or ineffective for any cause, such holding
    shall not affect the validity or constitutionality of any other law or agreement
    or any other part of such agreement.
