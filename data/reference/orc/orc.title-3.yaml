- number: '329.041'
  heading: Meetings with transit representatives to discuss transportation needs of
    Ohio works first participants
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: In each county in which there is a county transit board established by section
    306.01 of the Revised Code, a county transit system operated under that section,
    or a regional transit authority created under section 306.32 of the Revised Code,
    the county department of job and family services shall meet not less than once
    each calendar quarter with transit representatives of the board, system, or authority.
    The department and transit representatives shall discuss the transportation needs
    of the county's Ohio works first participants, review existing efforts and develop
    new options to meet those needs, and measure the accomplishments of those efforts.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.041
- number: '329.042'
  heading: Participation in federal food stamp program
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'Each county department of job and family services shall certify eligible
    public assistance and nonpublic assistance households for the supplemental nutrition
    assistance program in accordance with federal and state law to enable low-income
    households to participate in the supplemental nutrition assistance program and
    thereby to purchase foods having a greater monetary value than is possible under
    public assistance standard allowances or other low-income budgets.

    Each county department of job and family services shall administer the distribution
    of supplemental nutrition assistance program benefits under the supervision of
    the department of job and family services. The benefits shall be distributed by
    a method approved by the department of job and family services in accordance with
    the Food and Nutrition Act of 2008 (7 U.S.C. 2011 et seq.) and regulations issued
    thereunder.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-329.042
- number: '329.05'
  heading: Administering other state or local family services activity
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: 'The county department of job and family services may administer or assist
    in administering any state or local family services duty in addition to those
    mentioned in section 329.04 of the Revised Code, supported wholly or in part by
    public funds from any source provided by agreement between the board of county
    commissioners and the officer, department, board, or agency in which the administration
    of such activity is vested. Such officer, department, board, or agency may enter
    into such agreement and confer upon the county department of job and family services,
    to the extent and in particulars specified in the agreement, the performance of
    any duties and the exercise of any powers imposed upon or vested in such officer,
    board, department, or agency, with respect to the administration of such activity.
    Such agreement shall be in the form of a resolution of the board of county commissioners,
    accepted in writing by the other party to the agreement, and filed in the office
    of the county auditor, and when so filed, shall have the effect of transferring
    the exercise of the powers and duties to which the agreement relates and shall
    exempt the other party from all further responsibility for the exercise of the
    powers and duties so transferred, during the life of the agreement.

    Such agreement shall be coordinated and not conflict with a grant agreement entered
    into under sections 307.98 and 5101.21, a contract entered into under section
    307.981 or 307.982, a plan of cooperation entered into under section 307.983,
    a regional plan of cooperation entered into under section 307.984, a transportation
    work plan developed under section 307.985, or procedures for providing services
    to children whose families relocate frequently established under section 307.986
    of the Revised Code. It may be revoked at the option of either party, by a resolution
    or order of the revoking party filed in the office of the auditor. Such revocation
    shall become effective at the end of the fiscal year occurring at least six months
    following the filing of the resolution or order. In the absence of such an express
    revocation so filed, the agreement shall continue indefinitely.

    This section does not permit a county department of job and family services to
    manage or control hospitals, humane societies, detention facilities, jails or
    probation departments of courts, or veterans service commissions.'
