- number: '306.01'
  heading: Establishing county transit system
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) Whenever the county commissioners of any county declare, by resolution,
    that it is essential to the best interests of the county that a county transit
    system be established, the commissioners shall either appoint a county transit
    board, with powers and duties as specified by sections 306.01 to 306.13 and section
    306.99 of the Revised Code, or state in the resolution that the board of county
    commissioners itself shall operate the county transit system and assume all the
    powers and duties assigned to a board of county commissioners in sections 306.04,
    306.06, 306.08, 306.09, 306.10, 306.12, and 306.13 of the Revised Code; except
    that no county transit board shall be appointed nor any county transit system
    established in any county which is included in whole or in part in a regional
    transit authority established pursuant to sections 306.30 to 306.53 of the Revised
    Code.

    (B) Once a county transit system has been established, the board of county commissioners
    may, by resolution, change the governing board for the system from the board of
    county commissioners to a county transit board, or from a county transit board
    to the board of county commissioners. If the resolution transfers the governing
    authority from the county transit board to the board of county commissioners,
    the transfer shall not occur for six months after the date of the resolution.
    On the date of transfer, the transit board shall be dissolved, the board of county
    commissioners shall assume all contracts, property, and debts of the transit board,
    and all transit employees shall be transferred to the control of the board of
    county commissioners. The board of county commissioners shall collect all taxes
    levied by the transit board for the county transit system.

    If the resolution transfers the governing authority to a county transit board,
    the board of county commissioners shall appoint a board under section 306.02 of
    the Revised Code. All transit employees except the executive director of the system
    shall be transferred to the control of the county transit board. The board of
    county commissioners shall transfer to the transit board, and the transit board
    shall assume, all contracts, property, and debts of the county relative to the
    transit system. The county shall continue to collect any taxes it levies for the
    transit system, but the proceeds shall be deposited in the funds of the transit
    board for the transit purposes for which they were levied.

    (C) Any county that has a county transit system operated by the board of county
    commissioners shall create within the county general fund an account for the county
    transit system.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.01
- number: '306.02'
  heading: Members of board, qualifications, terms
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'A county transit board authorized by section 306.01 of the Revised Code shall
    consist of seven members. All members shall be electors of the county, shall be
    appointed by the board of county commissioners, and shall have such qualifications
    as the board of county commissioners may establish in its resolution under section
    306.01 of the Revised Code. The appointments shall be for overlapping three-year
    terms, provided that of the initial terms, two shall be for one year, two for
    two years, and three for three years. Appointments thereafter shall be for the
    full term of three years except that any vacancy which occurs during a term shall
    be filled for the unexpired term. The county commissioners shall fill any vacancy
    which occurs in the board within ninety days after the occurrence of the vacancy.

    The members of the board shall not be interested financially in any contract,
    work, or service for the county.

    The county commissioners shall designate a chairman for the term of his office
    or for the term of three years, whichever is shorter and shall fill any vacancy
    in such position. The compensation of the members of the board shall be determined
    by the county commissioners. The county commissioners may fix the chairman''s
    salary above those of the other board members. No more than four members of the
    board shall belong to the same political party.

    A member of the board may be removed for cause by the county commissioners, but
    only after opportunity has been afforded for a public hearing before the county
    commissioners within ten days after written charges have been given such member.
    Such member shall be heard in person or by counsel and action by the county commissioners
    shall be final.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.02
- number: '306.03'
  heading: Organization of county transit board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'As soon as possible after the appointment of the initial members, a county
    transit board shall organize for the transaction of business, elect a vice-chairman
    and secretary and prescribe their duties, designate a fiscal officer who need
    not be a member of the board, and adopt bylaws, rules, and regulations to govern
    its proceedings. Thereafter the board shall hold regular meetings at least once
    every month. Special meetings may be called by the chairman, or at the request
    of any two members. All meetings shall be open to the public and the board shall
    keep full and accurate minutes of its proceedings, and minutes of its proceedings
    shall be maintained as a public record.

    A majority of the board shall constitute a quorum for the contract of business
    at its meetings. The board shall act by resolution and a concurrence of four members
    shall be sufficient for action by the board.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.03
- number: '306.04'
  heading: Powers and duties of board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) Except as otherwise provided in division (B) of this section, employees
    of a county transit board or a board of county commissioners operating a transit
    system are employees of the county. If the system is operated by the board of
    county commissioners, the board shall appoint an executive director, who shall
    be in the unclassified service.

    (B) Any county transit board that established its own civil service organization
    and procedure prior to October 25, 1995, shall continue to operate under that
    organization. Appointments and promotions in that system shall be made, as far
    as practicable, by competitive examination.

    A board that established its own civil service organization prior to October 25,
    1995, shall establish by rule the seniority provisions relating to street railway
    and motor bus employees in effect at the time of the acquisition of the transit
    system by the county. The vacation, holiday, and sick leave privileges shall not
    be regulated by other provisions of law relating to public employees of the state
    or county, except that the transit board, its officers and employees, shall be
    subject to the public employees retirement system of the state and the transit
    board shall assume any pension obligations which have been assumed by any publicly
    owned transit system which the county may acquire.

    (C) A county transit board or board of county commissioners operating a transit
    system may:

    (1) Acquire in its name by gift, grant, purchase, or condemnation and hold and
    operate real estate and interests therein and personal property suitable for its
    purposes;

    (2) In its name purchase, acquire, construct, enlarge, improve, equip, repair,
    maintain, sell, exchange, lease as lessee or lessor, receive a right of use of,
    and manage, control, and operate, in or out of the county, a county transit system
    consisting of all real estate and interests therein, personal property, and a
    combination thereof, for or related to the movement of persons including but not
    limited to street railway, tramline, subways, rapid transits, monorails, and passenger
    bus systems but excluding therefrom trucks, the movement of property by truck,
    and facilities designed for use in the movement of property by truck for hire;

    (3) Issue, with the approval of the county commissioners when the issuance is
    made by the transit board, revenue bonds of the county as provided in division
    (B) of section 306.09 of the Revised Code, to secure funds to accomplish its purposes.
    The principal of and interest on such bonds, together with all other payments
    required to be made by the trust agreement or indenture securing such bonds, shall
    be paid solely from revenues or other income accruing to the board from facilities
    of the county transit system designated in said agreement or indenture.

    (4) Enter into contracts in the exercise of the rights, powers, and duties conferred
    upon it, and execute all instruments necessary in the conduct of its business;

    (5) Fix, alter, and charge rates and other charges for the use of its real estate
    and interests therein, personal property, and combinations thereof;

    (6) Employ such financial consultants, accountants, appraisers, consulting engineers,
    architects, construction experts, attorneys-at-law, managers and other supervisory
    personnel, and other officers, employees, and agents as it determines necessary
    to conduct its business, and fix their compensation and duties;

    (7) Pledge, hypothecate, or otherwise encumber its revenues and other income as
    security for its obligations and enter into trust agreements or indentures for
    the benefit of revenue bondholders;

    (8) Borrow money or accept or contract to accept advances, loans, gifts, grants,
    devises, or bequests from and enter into contracts or agreements with any federal,
    state, or other governmental or private source and hold and apply advances, loans,
    gifts, grants, devises, or bequests according to the terms thereof including provisions
    which are required by such federal, state, or other governmental or private source
    to protect the interest of employees affected by such advances, loans, gifts,
    grants, devises, or bequests. Such advances, loans, gifts, grants, or devises
    may be subject to any reasonable reservation and any gift, grant, or devise or
    real estate may be in fee simple or any lesser estate. Any advances or loans received
    from any federal, state, or other governmental or private source may be repaid
    in accordance with the terms of such advance or loan. A loan accepted by a county
    transit board shall not, in any way, obligate the general fund of a county or
    a board of county commissioners.

    (9) Conduct investigations and surveys into the needs of the public within or
    without the county for transportation services to provide for the movement of
    persons within, into, or from the area serviced or to be serviced by the county
    transit system;

    (10) Enter into lawful arrangements with the appropriate federal or state department
    or agency, county, township, municipal corporation, or other political subdivision
    or public agency for the planning and installation of any public facilities which
    are determined necessary in the conduct of its business;

    (11) Purchase fire, extended coverage, and liability insurance for the real estate
    and interests therein, personal property and any combination thereof, used by
    or in connection with the county transit system and insurance covering the board
    and the county transit system and its officers and employees for liability for
    damage or injury to persons or property;

    (12) Procure and pay all or any part of the cost of group hospitalization, surgical,
    major medical, or sickness and accident insurance, or a combination thereof, for
    the officers and employees of the county transit system and their immediate dependents,
    issued by an insurance company, duly authorized to do business in this state;

    (13) Sell, lease, release, or otherwise dispose of real estate or interests therein
    or personal property owned by it and grant such easements across its real estate
    and interests therein as will not interfere with its use by the county transit
    system;

    (14) Establish rules for the use and operation of the county transit system including
    the real estate or interests therein, personal property or a combination of the
    foregoing used by or in connection with such system;

    (15) Exercise the power of eminent domain to appropriate any real estate or interests
    therein, personal property, franchises, or any combination thereof, within or
    without the county, necessary or proper in the exercise of its powers provided
    in sections 306.01 to 306.13 of the Revised Code, as provided in sections 163.01
    to 163.22 of the Revised Code, and subject to divisions (15)(a), (b), and (c)
    of this section, provided that a county transit board or a board of county commissioners
    operating a transit system shall not proceed to so appropriate real property outside
    its territorial boundaries, until it has served at the office of the county commissioners
    of the county in which it is proposed to appropriate real property, a notice describing
    the real property to be taken and the purpose for which it is proposed to be taken,
    and such county commissioners have entered on their journal within thirty days
    after such service a resolution approving such appropriation.

    (a) Nothing contained in this division authorizes a county transit board or a
    board of county commissioners to appropriate any land, rights, rights-of-way,
    franchises, or easements belonging to the state or to a municipal corporation
    without the consent of the state or of the municipal corporation, and no county
    transit board or board of county commissioners shall exercise the right of eminent
    domain to acquire any certificate of public convenience and necessity, or any
    part thereof, issued to a for-hire motor carrier by the public utilities commission
    of Ohio or by the federal motor carrier safety administration of the United States,
    or to take or disturb other real estate or interests therein, personal property,
    or any combination thereof belonging to any municipal corporation without the
    consent of the legislative authority of such municipal corporation, or take or
    disturb real estate or interests therein, personal property, or any combination
    thereof belonging to any other political subdivision, public corporation, public
    utility, or common carrier, which is necessary and convenient in the operation
    of such political subdivision, public corporation, public utility, or common carrier
    unless provision is made for the restoration, relocation, or duplication of that
    taken or upon the election of such political subdivision, public corporation,
    public utility, or common carrier for the payment of compensation, if any, at
    the sole cost of the county transit system.

    (b) If any restoration or duplication proposed to be made under this division
    involves a relocation, the new location shall have at least comparable utilitarian
    value and effectiveness, and such relocation shall not impair the ability of the
    public utility or common carrier to compete in its original area of operation.

    (c) If such restoration or duplication proposed to be made under this division
    involves a relocation, the county transit board or board of county commissioners
    shall acquire no interest or right in or to the appropriated property or facility
    until the relocated property or facility is available for use and until marketable
    title thereto has been transferred to the political subdivision, public corporation,
    public utility, or common carrier. Nothing in this division shall require any
    board of county commissioners or county transit board operating a county transit
    system to so restore, relocate, or duplicate, if all of the real estate and interests
    therein, personal property, and any combination of the foregoing which is owned
    by a public utility or common carrier and used by it or in connection with the
    movement of persons, is acquired by exercise of the power of eminent domain.

    (16) When real property is acquired that is located outside the county and is
    removed from the tax duplicate, the county transit board or board of county commissioners
    operating a transit system shall pay annually to the county treasurer of the county
    in which that property is located, commencing with the first tax year in which
    that property is removed from the tax duplicate, an amount of money in lieu of
    taxes equal to the smaller of the following:

    (a) The last annual installment of taxes due from the acquired property before
    removal from the tax duplicate;

    (b) An amount equal to the difference between the combined revenue from real estate
    taxes of all the taxing districts in which the property is located in the tax
    year immediately prior to the removal of the acquired property from the tax duplicate,
    and either:

    (i) The total revenue which would be produced by the tax rate of each such taxing
    district in the tax year immediately prior to the removal of the acquired property
    from the tax duplicate, applied to the real estate tax duplicate of each of such
    taxing districts in each tax year subsequent to the year of removal; or

    (ii) The combined revenue from real estate taxes of all such taxing districts
    in each tax year subsequent to the year of removal, whichever is the greater.

    The county transit board or board of county commissioners may be exempted from
    such payment by agreement of the affected taxing district or districts in the
    county in which the property is located.

    The county auditor of the county in which that property is located shall apportion
    each such annual payment to each taxing district as if the annual payment had
    been levied and collected as a tax.

    Those annual payments shall never again be made after they have ceased.

    (17) Sue or be sued, plead or be impleaded, and be held liable in any court of
    proper jurisdiction for damages received by reason of negligence, in the same
    manner and to the same extent as if the county transit system were privately operated,
    provided, that no funds of a county other than those of the county transit board
    or, if the transit system is operated by the board of county commissioners, other
    than those in the account for the county transit system created under division
    (C) of section 306.01 of the Revised Code, shall be available for the satisfaction
    of judgments rendered against that system;

    (18) Annually prepare and make available for public inspection a report in condensed
    form showing the financial results of the operation of the county transit system.
    For systems operated by a county transit board, copies of this report shall be
    furnished to the county commissioners as well as a monthly summary statement of
    revenues and expenses for the preceding month sufficient to show the exact financial
    condition of the county transit system as of the last day of the preceding month.

    (19) With the approval of the county commissioners when the action is taken by
    the transit board, and without competitive bidding, sell, lease, or grant the
    right of use of all or a portion of the county transit system to any other political
    subdivision, taxing district, or other public body or agency having the power
    to operate a transit system.

    (D)(1) As used in this division:

    (a) "Applicant" means any person who responds to a request for proposals and submits
    an application for a franchise to operate a public transit system or portion of
    a public transit system;

    (b) "Application for certification" means the documents that are required to be
    filed by a franchisee to initiate the proceedings required for certification;

    (c) "Application for a franchise" means the documents that are required to be
    filed in response to a request for proposals and that initiate the proceedings
    required for the award of a franchise;

    (d) "Certification" means the order issued by a board of county commissioners,
    after submission of an application for certification, that approves the operation
    of a public transit system, or a portion of a public transit system, by a franchisee,
    subject to terms and conditions imposed by the board.

    (e) "Franchise" means the document and all accompanying rights approved by the
    board of county commissioners that provides the franchisee with the exclusive
    right to establish a public transit system and, subject to certification, the
    right to operate a public transit system. A franchise may include the right of
    a franchisee to provide transportation services for a county department of job
    and family services.

    (f) "Franchisee" means the individual, corporation, or other entity awarded a
    franchise.

    (2) A board of county commissioners, on behalf of a county transit board, may
    award a franchise to an applicant subject to such terms and conditions as the
    board of county commissioners considers appropriate and consistent with applicable
    laws. Subsequent to awarding the franchise, the board of county commissioners
    may issue a certification and, until such issuance, the franchisee has no right
    to operate a public transit system or part of such a system. The board of county
    commissioners shall not delete, alter, or amend the terms and conditions of the
    certification after its issuance. The board shall include in the certification
    performance targets related to the operation of a public transit system by the
    franchisee, including cost savings to the county, gains in efficiency, the safety
    and security of the traveling public and franchise employees, service to the traveling
    public, return on any investments made by the county, and any other performance
    targets as determined by the board. All terms and conditions of the order of certification
    are terms and conditions of the franchise. Unless expressly exempted or granted
    a waiver in the certification, the franchisee shall comply with all applicable
    rules, regulations, orders, and ordinances.

    (3) The award of a franchise by a board of county commissioners to an applicant
    is the sole license and authority for the franchisee to establish a public transit
    system and, subject to certification, operate a public transit system.

    (4) A board of county commissioners shall award a franchise for a period of not
    less than ten years, as provided in the franchise.

    (5) A franchise shall not prohibit the franchisee from implementing new or improved
    services during the term of the franchise.

    (6) A franchisee shall coordinate its services, as specified in the franchise,
    with public transit providers to make effective transportation services available
    to the public and provide access to and from the public transit system.

    (7) A board of county commissioners shall provide terms and conditions in a franchise
    to ensure that the franchisee will continue operation of the public transit system
    for the duration of the term of the franchise or, if the franchise is revoked,
    suspended, or abandoned, that financial and other necessary resources are available
    to continue the operation of the system until another franchisee is selected or
    until the board of county commissioners determines to cease the transit operations
    governed by the franchise. The franchise shall specifically provide that the board
    shall have the right to terminate the franchise if the board determines that the
    franchisee has materially breached the franchise in any manner. The franchisee
    may appeal such a termination to the board, and, if the board upholds the termination,
    to the proper court of common pleas.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.04
- number: '306.05'
  heading: Advancement of funds for county transit system
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: The county commissioners may advance funds from any available fund of the
    county for purchase or acquisition of a transit system, surveys, planning, and
    mass transportation studies. The amount advanced may be reimbursed from any funds
    of the county transit board including the proceeds of the sale of bonds for the
    purchase, acquisition, construction, enlargement, improvement, or equipment of
    the county transit system.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.05
- number: '306.051'
  heading: Use of funds expended for social services as local match to obtain funds
    for transit system
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) As used in this section, "social services" includes all of the following:

    (1) Services for senior citizens;

    (2) Services for persons with developmental disabilities;

    (3) Services funded in whole or in part with federal funds provided for social
    services programs, including the community development block grant program established
    under Title I of the "Housing and Community Development Act of 1974," 42 U.S.C.
    5301 et seq.;

    (4) Other services that have the purpose of assisting the overall social well
    being of individuals, families, and communities.

    (B) Subject to division (C) of this section and regardless of whether a county
    transit system is operated by a county transit board or board of county commissioners,
    funds that are appropriated by a board of county commissioners and expended for
    social services in the county served by the board may be used as the local match
    needed to obtain state or federal funds available for the county transit system.

    (C) Funds raised by a county tax levy may be used as local matching funds under
    division (B) of this section only to the extent that such use of the funds is
    consistent with the purpose for which the tax was levied. Funds may be used as
    local matching funds under division (B) of this section only to the extent that
    such use of the funds does not jeopardize the state''s or county''s eligibility
    to receive federal funds for one or more purposes. Prior to the use of funds raised
    by a county tax levy being used for purposes of division (B) of this section,
    the county transit system shall enter into an agreement with the local government
    department, agency, board, or commission responsible for administering those funds.
    The agreement shall establish the terms and conditions of the use of the funds
    by the county transit system as local matching funds.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.051
- number: '306.06'
  heading: Agreements to provide transportation service
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'The county transit board or board of county commissioners operating a transit
    system may enter into an agreement with any municipal corporation, township, or
    other county, whereby the board undertakes to provide transportation service for
    the movement of persons within, from, or to that municipal corporation, township,
    or county, to make payments or transfer real estate or interests therein or a
    combination thereof, as therein provided, in consideration of the board providing
    those transportation services. Any moneys so paid to the board shall be received
    by it and used solely for the purposes specified in the agreement. Moneys so paid
    may include all or a part of the cost of permanent improvements to be used by
    the county transit system under the agreement and to that extent may include the
    proceeds of bonds issued in accordance with Chapter 133. of the Revised Code,
    by such municipal corporation, township, or county for the purpose of paying all
    or a part of the cost of those permanent improvements.

    Any municipal corporation, county, township, school district, or other political
    subdivision or taxing district may convey or lease to or exchange with any county
    transit board or board of county commissioners operating a transit system and
    any county transit board or board of county commissioners operating a transit
    system may convey or lease to or exchange with any state, municipal corporation,
    county, township, school district, or other political subdivision or taxing district
    without competitive bidding and on mutually agreeable terms any personal property,
    real estate, or interests therein.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.06
- number: '306.07'
  heading: Exempting revenue and income from taxation
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: The operations, revenues, and property of the county transit system and all
    obligations secured by the real estate or interests therein or revenues of the
    system, or the income derived therefrom, are exempt from the levy of any excise
    or other tax by the county or any political subdivision of the state, unless and
    to the extent such exemption is prohibited by the constitution or other laws of
    this state.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.07
- number: '306.08'
  heading: Acquiring publicly or privately owned transit system
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: 'Any county transit board or board of county commissioners operating a transit
    system, that acquires, leases as lessee, or receives a right to use a publicly
    or privately owned transit system may enter into an agreement with the operator
    thereof transferring that transit system, and that operator may enter into an
    agreement with the county transit board or board of county commissioners operating
    a transit system providing for the transfer or grant of the use to the county
    transit board or board of county commissioners of all or any part of the real
    estate or interests therein, personal property, or any combination thereof, and
    of the funds under the control of or held for the use or benefit of the transit
    system being transferred, whether held in trust or otherwise, and any such agreement
    may make further provision for any one or more of the following:

    (A) Continuation of any transportation services then provided by that operator;

    (B) Contribution to the county transit board or board of county commissioners
    of moneys or other real state or interests therein, personal property, and any
    combination thereof, by a municipal corporation or county which was the operator,
    to assist in the payment of costs of providing transportation services for the
    movement of persons within, from, or to such municipal corporation or county;

    (C) Assumption, funding, or refunding of outstanding revenue bonds of a municipal
    corporation or county issued in connection with the transit system being transferred
    or provision for making payment of the principal and interest as well as other
    charges in connection with the revenue bonds of such municipal corporation or
    county;

    (D) Assumption by the county transit board or board of county commissioners of
    any contractual obligations, trusts, commitments and duties incurred or assumed
    by such operator, provided that no contract not specifically assumed by the board
    in the agreement or in a separate agreement with a contracting party shall be
    binding on the board;

    (E) Continuation and the assignment and assumption of obligations, including,
    but not limited to, existing pension rights, plans, and benefits, under contracts
    or other agreements of the operator, provided that such assignment of any such
    obligation is not binding upon the other party to the contract or agreement with
    that operator unless so provided in the contract or agreement or duly approved
    by that party;

    (F) Continuation of, including modification or expansion of the scope of, any
    contracts or other agreements of the operator providing for transportation services;

    (G) Retention by the county transit board or board of county commissioners of
    the status and salaries of officers and employees of the transit system being
    transferred;

    (H) The same or similar terms and conditions of employment as were provided by
    the operator under section 306.12 of the Revised Code;

    (I) The time when such agreement or parts thereof are to take effect and the period
    during which they are to remain in effect;

    (J) Procedures for the amendment of the agreement, including designation of parties
    to execute or approve such amendments;

    (K) Such other provisions as may be determined necessary or appropriate.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-306.08
- number: '306.09'
  heading: Issuing bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '306'
    name: County Transit System; Regional Transit Authority; Regional Transit Commission
  text: '(A) The board of county commissioners, on its own initiative if it operates
    a county transit system or at the request of the county transit board if one is
    appointed, may issue bonds of the county pursuant to Chapter 133. of the Revised
    Code, for the purpose of purchasing, acquiring, constructing, enlarging, and improving
    the county transit system.

    (B) The board of county commissioners operating a transit system or a county transit
    board, with the approval of the county commissioners, may issue revenue bonds
    of the county for the purpose of purchasing, acquiring, constructing, enlarging,
    and improving the county transit system. The issuing board shall provide by resolution
    for the issuance of such bonds. The principal, interest, and all other payments
    required to be made by any trust agreement or indenture securing such bonds shall
    be payable, as provided in such resolution, solely from the revenues or other
    income of the county transit system. Bonds may be issued at one time or from time
    to time and each issue shall be dated, bear interest, mature at such time or times
    not exceeding forty years from the date of issue, and be redeemable before maturity
    at the option of the board at such price or prices and under such terms and conditions
    as may be provided by the board in its resolution. The board shall determine the
    form of the bonds and any coupons pertaining thereto, fix their denominations,
    and establish within or without this state the place or places of payment of principal
    and interest. The resolution shall determine the method of execution of such bonds,
    provide for sale of the bonds at public or private sale as the board determines
    most advantageous and for such prices, above or below the par value thereof, as
    the board determines or within such limit or limits as it may fix.

    Where a transit board is appointed, if any member of the county transit board
    or officer of the county transit system who has signed bonds or coupons pertaining
    thereto or caused the member''s or officer''s facsimile signature to be affixed
    thereto ceases to be a member or officer before such bonds or coupons have been
    delivered, such bonds or coupons may be issued and delivered as though the person
    who had signed the bonds or coupons or caused the person''s facsimile signature
    to be affixed thereto had not ceased to be a member or officer. Bonds or coupons
    may be executed on behalf of the county by a member of the county transit board
    or officer of the county transit system who is a member or officer on the date
    of execution, although such person was not a member or officer on the date of
    such bonds or coupons.

    All bonds issued under authority of this section have all qualities and incidents
    of negotiable instruments, subject to provisions for registration, and may be
    issued in coupon or fully registered form, or both, as the board provides. Provision
    may be made for the registration of any coupon bonds as to principal alone or
    as to both principal and interest and for the conversion into fully registered
    bonds of coupon bonds, and into coupon bonds of any fully registered bond or bonds
    registered as to both principal and interest.

    (C) The proceedings authorizing issuance of revenue bonds pursuant to division
    (B) of this section may contain provisions that shall be a part of the contract
    with the bondholders as to:

    (1) Pledging the rates, revenues, and other income, charges, and moneys therein
    designated for the payment of the principal of and interest on the bonds and all
    other payments required to be made by the bond proceedings;

    (2) Provisions regarding the purposes to which the proceeds of the bonds may be
    applied;

    (3) Terms of the bonds;

    (4) Maintenance, collection, use, and disposition of rates, revenues, and other
    income, charges, and moneys received from the operation or disposition of the
    county transit system;

    (5) Terms and conditions under which additional bonds may be issued secured by
    a pledge of rates, revenues, and other income, charges, and moneys received from
    the operation or disposition of the county transit system;

    (6) Terms of any trust agreement or indenture of mortgage securing the bonds,
    including authorization for the county transit board to enter into such agreement
    or indenture on behalf of the county and with a corporate trustee which may be
    any trust company or bank having the powers of a trust company within or without
    this state;

    (7) The deposit, application, safeguarding, and investment of funds of the county
    transit board or board of county commissioners received or held under such trust
    agreement or indenture to which the provisions of Chapters 131. and 135. of the
    Revised Code are not applicable;

    (8) Any other appropriate agreements with the bondholders with respect to the
    rates, revenues, and other income, charges, and moneys received from the operation
    or disposition of the county transit system;

    (9) Other provisions that are customary or appropriate in an agreement or indenture
    of such type, including but not limited to:

    (a) Mortgage or any real estate or interest therein acquired from the proceeds
    of such bonds;

    (b) Covenant to maintain each pledge, trust agreement, and indenture of mortgage
    made for the security of any bonds until the principal of and interest on the
    bonds has been fully paid, or provision therefor has been made, for the security
    of which the pledge has been made and the trust agreement or the indenture of
    mortgage has been given;

    (c) In the event of default in any payments required to be made or any other agreement
    made as a part of the contract under which the bonds are issued, enforcement of
    such payments or agreement by mandamus, the appointment of a receiver in equity,
    or, if a mortgage has been given, the foreclosure of such mortgage, or any combination
    of the foregoing;

    (d) The rights and remedies of the bondholders and of the trustee and provisions
    for protecting and enforcing them, including limitations on rights of individual
    bondholders;

    (e) Such other provisions as the trustee, the original purchaser of the bonds,
    and the board of county commissioners or county transit board agree upon.

    (D) Any holder of bonds issued pursuant to division (B) of this section or a trustee
    under a trust agreement or indenture of mortgage entered into pursuant to division
    (C)(6) of this section, except to the extent that their rights are restricted
    by the bond proceedings or the terms of the bonds, may by any suitable form of
    legal proceedings, protect and enforce any rights under the laws of this state
    or granted by the bond proceedings. Such rights include the right:

    (1) To compel the performance of all duties of the county transit board or board
    of county commissioners required by sections 306.01 to 306.13 of the Revised Code,
    or the bond proceedings;

    (2) To enjoin unlawful activities;

    (3) In the event of default in the payment of any principal or interest on any
    bond or in the performance of any covenant or agreement on the part of the county
    transit board or board of county commissioners in the resolution, trust agreement,
    or indenture, to apply to a court to appoint a receiver to administer and operate
    the county transit system, the rates, revenues, and other income, charges, and
    moneys of which are pledged to the payment of and interest on such bonds, or which
    are the subject of the covenant or agreement, with full power to pay and to provide
    for payment of principal and interest on such bonds, and with such powers subject
    to the direction of the court as are accorded receivers in general equity cases,
    excluding any power to pledge additional rates, revenues, or other income, charges,
    or moneys of the county, including those derived from taxation, to the payment
    of such principal and interest;

    (4) To foreclose the mortgage on any real estate or interest therein which has
    been mortgaged, in the same manner as real estate of private corporations.

    (E) Bonds issued pursuant to division (B) of section 306.09 and to section 306.10
    of the Revised Code are lawful investments of banks, societies for savings, savings
    and loan associations, deposit guaranty associations, trust companies, trustees,
    fiduciaries, insurance companies, including domestic for life and domestic not
    for life, trustees or other officers having charge of sinking and bond retirement
    or other special funds of political subdivisions and taxing districts of this
    state, the commissioners of the sinking fund of the state, the administrator of
    workers'' compensation, the state teachers retirement system, the public employees
    retirement system, the school employees retirement system, and the Ohio police
    and fire pension fund, and are acceptable as security for the deposit of public
    moneys.'
