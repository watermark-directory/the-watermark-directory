    name: Board of County Commissioners - Powers
  text: 'Within ninety days after a county microfilming board has been established,
    it shall hold its initial meeting at such time as the secretary of the board determines.
    Thereafter, the board shall meet annually on the second Monday in January and
    at such other times and places as the secretary determines. The secretary shall,
    within five days after receiving a written request from any other member of the
    board, call the board together for a meeting. A majority of the board constitutes
    a quorum at any regular or special meeting.

    The board may, by unanimous consent, adopt such rules as it considers necessary
    for its operation, but no rule of the board shall derogate the authority or responsibility
    of any elected official.'
