- number: '303.215'
  heading: County zoning regulations for home education learning pods
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: '(A) Except as provided in this section, sections 303.01 to 303.25 of the
    Revised Code do not confer on any county rural zoning commission, board of county
    commissioners, or board of zoning appeals the authority to prohibit or restrict
    the location of a home education learning pod, as defined in section 5104.01 of
    the Revised Code, in any district or zone in the county.

    (B) A county rural zoning commission, board of county commissioners, or board
    of zoning appeals shall not impose additional or more stringent regulations on
    a building or residence based solely on its association with or use by a home
    education learning pod.

    (C) This section does not limit the authority of a county rural zoning commission,
    board of county commissioners, or board of zoning appeals to require that a building
    or residence used by a home education learning pod comply with zoning requirements
    that would otherwise apply to the building or residence if it was not associated
    with or used by a home education learning pod.'
