- number: '349.11'
  heading: Bondholder rights
  title:
    num: '3'
    name: Counties
  chapter:
    num: '349'
    name: New Community Organization
  text: Any holder or guarantor of new community authority bonds or notes issued under
    Chapter 349. of the Revised Code, or any of the coupons appertaining thereto,
    and the trustee under any trust agreement or indenture of mortgage except to the
    extent the rights given by such chapter may be restricted by the applicable resolution,
    trust agreement or indenture of mortgage or related agreement, may, by suit, action,
    mandamus or other proceeding protect and enforce any rights under the laws of
    the state or granted under such chapter, trust agreement, indenture of mortgage
    or the resolution authorizing the issuance of such bonds or notes, or related
    agreement, and may enforce and compel the performance of all duties required by
    such chapter, or by the trust agreement, indenture of mortgage or resolution,
    or related agreement, to be performed by the new community authority or any officer
    thereof including the fixing, charging, and collection of rentals, user fees or
    other charges.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-349.11
- number: '349.12'
  heading: Investing funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '349'
    name: New Community Organization
  text: Moneys in the funds of the new community authority, except as otherwise provided
    in any resolution authorizing the issuance of its community authority bonds or
    in any trust agreement or indenture of mortgage securing the same, or related
    agreement, in excess of current needs, may be invested in notes, bonds, or other
    obligations of the United States, or of any agency or instrumentality thereof,
    or in obligations of this state or any political subdivision thereof. If the law
    or the instrument creating a trust pursuant to section 349.10 of the Revised Code
    expressly permits investment in direct obligations of the United States or an
    agency thereof, unless expressly prohibited by the instrument, such moneys also
    may be invested in no front end load money market mutual funds consisting exclusively
    of obligations of the United States or an agency thereof and in repurchase agreements,
    including those issued by the fiduciary itself, secured by obligations of the
    United States or an agency thereof; and in collective investment funds established
    in accordance with section 1111.14 of the Revised Code and consisting exclusively
    of any such securities, notwithstanding division (A)(1)(c) of that section. Income
    from all such investments of moneys in any fund shall be credited to such funds
    as the authority determines, subject to the provisions of any such resolution
    or trust agreement or indenture of mortgage, or related agreement, and such investments
    may be sold at such times as the authority determines.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-349.12
- number: '349.13'
  heading: Agreements with other governmental entity or agencies
  title:
    num: '3'
    name: Counties
  chapter:
    num: '349'
    name: New Community Organization
  text: Any governmental entity or agency may, notwithstanding any contrary provision
    of law, lease, lend, grant, or convey to the new community authority at the authority's
    request, or lease, borrow, accept, or receive from the authority upon such terms
    as the proper authorities of such governmental entity or agency deem reasonable
    and fair and without the necessity for and advertisement, auction, order of court,
    or other action or formality other than the regular and formal action of the governmental
    agency concerned, any real property or interests therein including improvements
    thereto or personal property which is necessary or convenient to the carrying
    out of the new community development program, including public roads, community
    facilities and other real property or interests therein, including improvements
    thereto, or personal property already devoted to public use; and provided further
    that, where any such governmental entity is the developer, it may enter into any
    and all contracts and agreements with the new community authority for the provision
    by the new community authority of coordination and management service, for all
    or any portion of the activities and other matters relating to carrying forward
    the new community development program.
