- number: '303.19'
  heading: Nonconforming use of buildings and land not affected by zoning
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: The lawful use of any dwelling, building, or structure and of any land or
    premises, as existing and lawful at the time of enactment of a zoning resolution
    or amendment thereto, may be continued, although such use does not conform with
    the provisions of such resolution or amendment, but if any such nonconforming
    use is voluntarily discontinued for two years or more, any future use of such
    land shall be in conformity with sections 303.01 to 303.25, inclusive, of the
    Revised Code. The board of county commissioners shall provide in any zoning resolution
    for the completion, restoration, reconstruction, extension, or substitution of
    nonconforming uses upon such reasonable terms as are set forth in the zoning resolution.
