- number: '307.40'
  heading: Injunction
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: '(A)(1) No person shall erect, construct, alter, repair, or maintain any residential
    building as defined in section 3781.06 of the Revised Code, within the unincorporated
    portion of any county in which the board of county commissioners has created a
    building department to administer and enforce local building regulations or an
    existing structures code unless that person fully complies with the local building
    regulations and existing structures code.

    (2) No person shall erect, construct, alter, repair, or maintain any residential
    building as defined in section 3781.06 of the Revised Code within the unincorporated
    portion of any county in which a certified building department has jurisdiction
    to enforce the state residential building code unless that person fully complies
    with the state residential building code.

    (B) In addition to any remedies provided by law, if any building is being erected,
    constructed, altered, repaired, or maintained in violation of the local building
    regulations, the existing structures code, or the state residential building code
    in a county in which a certified building department enforces the state code,
    the board, the prosecuting attorney, the county building inspector, or any owner
    of an adjacent, contiguous, or neighboring property who would be especially damaged
    by that violation may institute a suit for injunction, abatement, or other appropriate
    action to prevent the violation.

    (C) Sections 307.37 to 307.40 of the Revised Code do not confer any power on any
    board of county commissioners with respect to the location, erection, construction,
    reconstruction, change, alteration, maintenance, removal, use, or enlargement
    of any buildings or structures of any public utility or railroad, whether publicly
    or privately owned, or the use of land by any public utility or railroad for the
    operation of its business.'
  history: null
