- number: '329.021'
  heading: Administrators to oversee services provided by county department of job
    and family services
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) The board of county commissioners may, in addition to the county director
    of job and family services, appoint administrators to oversee services provided
    by the county department of job and family services, subject to the following
    limitations:

    (1) If the county has a population of five hundred thousand or more, the board
    may appoint up to five administrators.

    (2) If the county has a population of two hundred and fifty thousand or more,
    but less than five hundred thousand, the board may appoint up to four administrators.

    (3) If the county has a population of one hundred thousand or more, but less than
    two hundred and fifty thousand, the board may appoint up to three administrators.

    (4) If the county has a population of forty thousand or more, but less than one
    hundred thousand, the board may appoint up to two administrators.

    (5) If the county has a population of less than forty thousand, the board may
    appoint one administrator.

    (B) The administrators appointed by the board of county commissioners under this
    section shall be in the unclassified civil service and serve at the pleasure of
    the board. However, no administrator position that is filled by a person serving
    in the classified service on July 1, 2007, shall be placed in the unclassified
    civil service until that person vacates the position.

    (C) The board of county commissioners may appoint a person who holds a certified
    position in the classified service within the county department of job and family
    services to the position of administrator. A person appointed to the position
    of administrator pursuant to this division and later removed by the board retains
    the right to resume the position in the classified service held by that person
    immediately prior to being appointed to the position of administrator, except
    that a person first appointed to a classified position in the department on or
    after July 1, 2007, shall retain the right to resume the position in the classified
    service for only six months after being appointed to the position of administrator.
    An employee forfeits the right to resume a position in the classified service
    when the employee is removed from the position of administrator due to incompetence,
    inefficiency, dishonesty, drunkenness, immoral conduct, insubordination, discourteous
    treatment of the public, neglect of duty, violation of any policy or work rule
    of the board or department, violation of Chapter 124. of the Revised Code or the
    rules of the director of administrative services, any other failure of good behavior,
    any other acts of misfeasance, malfeasance, or nonfeasance in office, or conviction
    of a felony while employed in the civil service. If the position the person previously
    held in the classified service no longer exists or has been placed in the unclassified
    service, the person shall be appointed to a position in the classified service
    of the department that is equivalent to the classified position the person previously
    held, as determined by the board with the approval of the director of administrative
    services.

    (D) As used in this section, "administrator" means assistant director, fiscal
    officer or director, personnel officer or director, social services administrator,
    income maintenance administrator, child support administrator in a combined agency,
    children services administrator in a combined agency, and workforce development
    administrator in a combined agency.'
