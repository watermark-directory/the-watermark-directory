- number: '307.20'
  heading: Powers over air navigation facilities
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The board of county commissioners, in addition to its other powers, shall
    have the same authority, subject to the same limitations, with respect to airports,
    landing fields, and other air navigation facilities as is conferred upon municipal
    corporations by sections 717.01 and 719.01 of the Revised Code and may operate
    thereon public recreation facilities and public parks. The board of county commissioners
    may contract with any person, firm, or corporation to operate restaurants, parking
    lots, motels, gasoline service stations, public parks, office buildings, retail
    stores for merchandising or services, and industrial uses on airports, landing
    fields, and other air navigation facilities.

    "Airport," "landing field," and "air navigation facility," as defined in section
    4561.01 of the Revised Code, apply to this section.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.20
- number: '307.201'
  heading: Acquisition and operation of subway transportation system
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The board of county commissioners, in addition to its other powers, shall
    have the authority to acquire, construct, own, lease, and operate subways for
    transportation systems not owned by the county, and may issue revenue bonds therefor
    under section 133.08 of the Revised Code or general obligation bonds to be paid
    in part or in whole by general tax revenues, if fifty-five per cent of those voting
    upon the proposition vote in favor thereof. The taxing authority of subdivisions
    shall have authority to proceed with the issue of such bonds and the levy of a
    tax outside the ten-mill limitation sufficient in amount to pay the interest on
    and retire such bonds at maturity. The purposes for which such bonds are issued
    shall include any costs resulting from restoration, relocation, or duplication
    elsewhere of existing publicly or privately owned public utility facilities occupying
    streets and highways.

    The board of county commissioners may, by agreement with the city council or the
    proper municipal officer or board charged with operation of a municipally owned
    transportation system, acquire, construct, own, lease, or operate a transportation
    system or part thereof, and may, both within or without municipal corporations,
    acquire, construct, own, lease, maintain, and operate subways for transportation
    systems not owned by the county.

    All rentals, payments, and fees of every description and all other income, earnings,
    or revenues, received from all persons, firms, corporations, and municipal corporations
    for the use of subways constructed by a county for transportation systems not
    owned by the county with moneys acquired by the issuance of general obligation
    bonds shall be paid into a sinking fund of the county for the payment of interest
    on and the redemption of these bonds at maturity. To the extent that these funds
    are not sufficient for the payment of interest on the bonds and for the accumulation
    of a sinking fund sufficient for payment thereof at maturity issued for the construction
    of subways within and without municipal corporations, the county shall annually
    levy a tax sufficient for such purposes. The taxes for bonds authorized by a vote
    of the electors in the county shall not be considered in computing the debt limitation
    set forth in section 133.07 of the Revised Code, but the aggregate of such bonds
    outstanding shall in no event at any time exceed one per cent of the total value
    of all property in such county as listed and assessed for taxation.'
