- number: '307.84'
  heading: Establishing automatic data processing board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'The board of county commissioners of any county may, by resolution, establish
    a county automatic data processing board. The board shall consist of the county
    treasurer or the county treasurer''s representative, the county recorder or the
    county recorder''s representative, the clerk of the court of common pleas or the
    clerk''s representative, a member or representative of the board of county commissioners
    chosen by the board, two members or representatives of the board of elections
    chosen by the board of elections one of whom shall be a member of the political
    party receiving the greatest number of votes at the most recent general election
    for the office of governor and one of whom shall be a member of the political
    party receiving the second greatest number of votes at such an election, if the
    board of elections desires to participate, and the county auditor or the county
    auditor''s representative who shall serve as secretary. The members of the county
    automatic data processing board may by majority vote add to the board any additional
    members whose officers use the facilities of the board.

    After the initial meeting of the county automatic data processing board, no county
    office shall purchase, lease, operate, or contract for the use of any automatic
    or electronic data processing or record-keeping equipment, software, or services
    without prior approval of the board.

    As used in sections 307.84 to 307.846 of the Revised Code, "county office" means
    any officer, department, board, commission, agency, court, or other office of
    the county, other than a board of county hospital trustees.'
