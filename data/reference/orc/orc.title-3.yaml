- number: '340.16'
  heading: Rules for children referred by public children services agency to board
  title:
    num: '3'
    name: Counties
  chapter:
    num: '340'
    name: Alcohol, Drug Addiction, and Mental Health Services
  text: The department of behavioral health and the department of medicaid shall adopt
    rules that establish requirements and procedures for prior notification and service
    coordination between public children services agencies and boards of alcohol,
    drug addiction, and mental health services when a public children services agency
    refers a child in its custody to a board for services funded by the board. The
    rules shall be adopted in accordance with Chapter 119. of the Revised Code.
  history: null
