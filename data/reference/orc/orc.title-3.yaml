  url: https://codes.ohio.gov/ohio-revised-code/section-323.159
- number: '323.16'
  heading: Partial real property tax exemption for child care center
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: '(A) As used in this section:

    (1) "Qualifying child care center" means real property on which a licensed child
    care program operates. For purposes of this division, "licensed child care program"
    means a licensed child care program, as defined in section 5104.01 of the Revised
    Code, that meets all of the following requirements:

    (a) The program only serves children under six years of age;

    (b) At least twenty-five per cent of the children in the program reside in a household
    that receives public assistance;

    (c) The program is not operated from the permanent residence of the licensee or
    administrator or from a location that is also used for a separate commercial purpose.

    (2) "Public assistance" means benefits or assistance provided under any of the
    following government programs:

    (a) The publicly funded child care program authorized by Chapter 5104. of the
    Revised Code;

    (b) Medicaid.

    (3) The Ohio works first program established by Chapter 5107. of the Revised Code;

    (4) The supplemental nutrition assistance program administered by the department
    of job and family services under section 5101.54 of the Revised Code;

    (5) The special supplemental nutrition program for women, infants, and children
    administered by the department of health under section 3701.132 of the Revised
    Code.

    (B) A partial real property tax exemption is allowed to a qualifying child care
    center for each tax year for which an application for the partial exemption has
    been approved. The partial exemption shall take the form of a percentage reduction
    in the real property taxes levied on the qualifying child care center. That percentage
    shall equal one of the following:

    (1) Twenty-five per cent, if at least twenty-five per cent, but less than fifty
    per cent, of the children that attend the qualifying child care center reside
    in a household that receives public assistance;

    (2) Seventy-five per cent, if at least fifty per cent of the children that attend
    the qualifying child care center reside in a household that receives public assistance.

    After complying with section 319.301 of the Revised Code, the county auditor shall
    reduce the remaining sum to be levied against a qualifying child care center by
    the applicable percentage. The auditor shall certify the amount of taxes remaining
    after the reduction to the county treasurer for collection as the real property
    taxes charged and payable on the qualifying child care center.

    (C)(1) To obtain the partial exemption, the owner of a qualifying child care center
    shall file an application each year with the county auditor of the county in which
    the center is located. The application shall be filed on or before the thirty-first
    day of December of the year for which the partial exemption is sought. The tax
    commissioner shall prescribe the form of the application, which shall contain
    a statement that conviction of willfully falsifying information to obtain the
    partial exemption results in the revocation of the right to the partial exemption
    for a period of three years.

    (2) The county auditor shall approve or deny an application for the partial exemption
    within thirty days after receiving the application. Notification shall be provided
    on a form prescribed by the tax commissioner. If the application is approved,
    upon issuance of the notification the county auditor shall record the partial
    exemption in the appropriate column on the general tax list and duplicate of real
    and public utility property. If the application is denied, the notification shall
    inform the applicant of the reasons for the denial.

    If an applicant believes that the application for the partial exemption has been
    improperly denied for a tax year, the applicant may file an appeal with the county
    board of revision on or before the last day of March of the ensuing tax year.
    The appeal shall be treated in the same manner as a complaint relating to the
    valuation or assessment of real property under Chapter 5715. of the Revised Code.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-323.16
- number: '323.17'
  heading: Extending time for delivery of tax duplicate
  title:
    num: '3'
    name: Counties
  chapter:
    num: '323'
    name: Collection of Taxes
  text: 'When any taxing authority in the county has certified to the board of elections
    a resolution that would serve to place upon the ballot at a general election or
    at any special election held prior to the general election but subsequent to the
    first Tuesday after the first Monday in May the question of a tax to be levied
    on the current tax list and duplicate for any purpose, or if the auditor has not
    received the certified reduction factors as required by division (D)(2) of section
    319.301 of the Revised Code, the time for delivery of the tax duplicate of the
    county treasurer by the county auditor as provided in section 319.28 of the Revised
    Code shall be extended to the first Monday in December. When delivery of the tax
    duplicate has been so delayed, the times for payment of taxes as fixed by section
    323.12 of the Revised Code may be extended to the thirty-first day of January
    and the twentieth day of July. In case of emergency the tax commissioner may,
    by journal entry, extend the times for delivery of the duplicate in any county
    for an additional fifteen days upon receipt of a written application from the
    county auditor, in the case of a delay in the delivery of the tax duplicate, or
    from the treasurer regarding an extension of the time for the billing and collection
    of taxes.

    When a delay in the closing of a tax collection period becomes unavoidable, the
    tax commissioner, upon application of the county auditor and county treasurer,
    may extend the time for payment of taxes if the commissioner determines that penalties
    have accrued or would otherwise accrue for reasons beyond the control of the taxpayers
    of the county. The order so issued by the commissioner shall prescribe the final
    extended date for the payment of taxes for that collection period.

    "Emergency," as used in this section, includes death or serious illness, any organized
    work stoppage, mechanical failure of office equipment or machinery, or a delay
    in complying with section 5715.24 or 5715.26 of the Revised Code which will cause
    an unavoidable delay in the delivery of duplicates or in the billing or collection
    of taxes. Such application shall contain a statement describing the emergency
    that will cause the unavoidable delay. Any application from the county auditor
    for an extension of time for delivery of the duplicate due to an emergency must
    be received by the tax commissioner on or before the last day of the month preceding
    the date required for such delivery. When an extension of time for delivery of
    the duplicate is so granted, the time for payment of taxes shall be extended for
    a like period of time.

    Whenever taxable real property has been destroyed or damaged by fire, flood, tornado,
    or otherwise, in an amount not less than twenty-five per cent of the value as
    listed and assessed for taxation but in no event less than two thousand dollars
    of taxable value, the county board of revision, by resolution, may extend the
    time for payment of taxes on such property not more than one year after the time
    fixed by section 323.12 of the Revised Code. The board shall file a copy of such
    resolution with the county auditor and county treasurer, stating the name of the
    owner and description as it appears on the tax list, the taxing district, the
    type and kind of property destroyed or damaged, and the board''s estimate of the
    amount of such destruction or damage.'
