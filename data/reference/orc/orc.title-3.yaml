- number: '303.16'
  heading: Enforcement of zoning regulations - county zoning inspector
  title:
    num: '3'
    name: Counties
  chapter:
    num: '303'
    name: County Zoning; Renewal; Wind and Solar Generation Restrictions
  text: For the purpose of enforcing the zoning regulations, the board of county commissioners
    may provide for a system of zoning certificates, and for this purpose may establish
    and fill the position of county zoning inspector, together with such assistants
    as the board considers necessary, fix the compensation for such positions, and
    make disbursements for them. In any county in which a county building inspector
    has been appointed in accordance with section 307.38 of the Revised Code, the
    board of county commissioners may designate such official to serve, in addition,
    as the county zoning inspector for the purposes of sections 303.01 to 303.25 of
    the Revised Code.
  history: null
