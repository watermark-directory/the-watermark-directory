- number: '309.10'
  heading: Provisions for other counsel
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: 'Sections 309.08 and 309.09 of the Revised Code do not prevent a school board
    from employing counsel to represent it, but when counsel is employed, the counsel
    shall be paid by the school board from the school fund. Sections 309.08 and 309.09
    of the Revised Code do not prevent a county board of developmental disabilities
    from employing counsel to represent it, but that counsel shall be employed in
    accordance with division (C) of section 305.14 and paid in accordance with division
    (A)(7) of section 5126.05 of the Revised Code.

    Sections 309.08 and 309.09 of the Revised Code do not prevent a board of county
    hospital trustees from employing counsel with the approval of the county commissioners
    to bring legal action for the collection of delinquent accounts of the hospital,
    but when counsel is employed, the counsel shall be paid from the hospital''s funds.
    Sections 309.08 and 309.09 of the Revised Code do not prevent a board of library
    trustees from employing counsel to represent it, but when counsel is employed,
    the counsel shall be paid from the library''s funds. Sections 309.08 and 309.09
    of the Revised Code do not prevent the appointment and employment of assistants,
    clerks, and stenographers to assist the prosecuting attorney as provided in sections
    309.01 to 309.15 of the Revised Code, or the appointment by the court of common
    pleas or the court of appeals of an attorney to assist the prosecuting attorney
    in the trial of a criminal cause pending in that court, or the board of county
    commissioners from paying for those services.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.10
- number: '309.11'
  heading: Official bonds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: The prosecuting attorney shall prepare, in legal form, the official bonds
    for all county officers, and shall see that the acceptance of such bonds by the
    proper authorities, the signing thereof, and all the indorsements thereon, are
    in conformity to law, and that they are deposited with the proper officer. No
    bond shall be accepted or approved for any county officer by the person or tribunal
    authorized to approve it, until the prosecuting attorney has inspected it, and
    certified thereon that such bond is sufficient. In case of a vacancy in the office
    of prosecuting attorney or of the absence or disability of the prosecuting attorney,
    such duties shall be discharged by the probate judge.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.11
- number: '309.12'
  heading: Protection of public funds
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: Upon being satisfied that funds of the county, or public moneys in the hands
    of the county treasurer or belonging to the county, are about to be or have been
    misapplied, or that any such public moneys have been illegally drawn or withheld
    from the county treasury, or that a contract, in contravention of law, has been
    executed or is about to be entered into, or that such a contract was procured
    by fraud or corruption, or that any property, real or personal, belonging to the
    county is being illegally used or occupied, or that such property is being used
    or occupied in violation of contract, or that the terms of a contract made by
    or on behalf of the county are being or have been violated, or that money is due
    the county, the prosecuting attorney may, by civil action in the name of the state,
    apply to a court of competent jurisdiction, to restrain such contemplated misapplication
    of funds, or the completion of such illegal contract, or to recover, for the use
    of the county, all public moneys so misapplied or illegally drawn or withheld
    from the county treasury, or to recover damages, for the benefit of the county,
    resulting from the execution of such illegal contract, or to recover, for the
    benefit of the county, such real or personal property so used or occupied, or
    to recover for the benefit of the county, damages resulting from the nonperformance
    of the terms of such contract, or to otherwise enforce it, or to recover such
    money as is due the county.
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.12
- number: '309.13'
  heading: Taxpayer's suit
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: 'If the prosecuting attorney fails, upon the written request of a taxpayer
    of the county, to make the application or institute the civil action contemplated
    in section 309.12 of the Revised Code, the taxpayer may make such application
    or institute such civil action in the name of the state, or, in any case wherein
    the prosecuting attorney is authorized to make such application, such taxpayer
    may bring any suit or institute any such proceedings against any county officer
    or person who holds or has held a county office, for misconduct in office or neglect
    of his duty, to recover money illegally drawn or illegally withheld from the county
    treasury, and to recover damages resulting from the execution of such illegal
    contract.

    If such prosecuting attorney fails upon the written request of a taxpayer of the
    county, to bring such suit or institute such proceedings, or if for any reason
    the proseucting attorney cannot bring such action, or if he has received and unlawfully
    withheld moneys belonging to the county, or has received or drawn public moneys
    out of the county treasury which he is not lawfully entitled to demand and receive,
    a taxpayer, upon securing the costs, may bring such suit or institute such proceedings,
    in the name of the state. Such action shall be for the benefit of the county,
    as if brought by the prosecuting attorney.

    If the court hearing such case is satisfied that such taxpayer is entitled to
    the relief prayed for in his petition, and judgment is ordered in his favor, he
    shall be allowed his costs, including a reasonable compensation to his attorney.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-309.13
- number: '309.14'
  heading: Injuries to timber
  title:
    num: '3'
    name: Counties
  chapter:
    num: '309'
    name: Prosecuting Attorney
  text: When trees standing or growing on any land belonging to the state, or to any
    school district, are, without lawful authority, cut down, or in any way injured,
    the prosecuting attorney shall prosecute the wrongdoer, and shall seize all timber
    so cut down, if it can be found, and sell it at public vendue, on five days' notice.
    The prosecuting attorney shall pay the proceeds of such sale into the state treasury
    to the credit of the general revenue fund, or into the county treasury to the
    credit of the school district, as the case may be.
