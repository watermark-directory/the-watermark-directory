- number: '349.09'
  heading: Issuance of new community authority bonds and notes exempt from bond laws
  title:
    num: '3'
    name: Counties
  chapter:
    num: '349'
    name: New Community Organization
  text: The issuance of new community authority bonds and notes or new community authority
    refunding bonds under this chapter need not comply with any other law applicable
    to the issuance of bonds or notes; however, sections 9.98 and 9.981 to 9.983 of
    the Revised Code apply to such bonds and notes.
