    name: Board of County Commissioners - Powers
  text: The board of county commissioners may, provide for the organization and maintenance
    of civic and social centers throughout the county, employ an expert director who
    shall superintend and administer the centers, and levy a tax and create a fund
    for the payment of all expenses involved in the social and educational work contemplated
