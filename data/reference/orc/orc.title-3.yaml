- number: '307.82'
  heading: Selling unused parks and park lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'Upon the vacation of parks or park lands, the board of county commissioners
    shall offer such lands for sale at a public auction at the courthouse of the county
    in which such lands are situated. No lands shall be sold until the board gives
    notice of intention to sell such lands. Such notice shall be published once a
    week for four consecutive weeks using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation in the
    county in which sale is to be had;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county in which sale is to
    be had.

    The board shall sell such lands to the highest and best bidder, provided, the
    board may reject any and all bids made hereunder.

    When such sale is made, the auditor of the county in which sale is had and in
    which such lands are located, shall enter into a deed, conveying said lands to
    the purchaser thereof. At the time of sale, the auditor shall place the lands
    sold hereunder on the tax duplicate of the county at a value to be established
    by the auditor as in cases where the auditor re-enters property which has been
    tax exempt on the taxable list of the county.

    The proceeds from the sale of lands sold pursuant to this section shall be placed
    in the general fund of the county in which such lands are located and may be disbursed
    as other general fund moneys.'
  history: null
  url: https://codes.ohio.gov/ohio-revised-code/section-307.82
- number: '307.83'
  heading: Reversionary interest in parks and park lands
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: 'When real estate which has been dedicated to or for the use of the public
    for parks or park lands is vacated by the board of county commissioners pursuant
    to division (A) of section 307.81 of the Revised Code or is to be sold or leased
    for nonpark use under division (B) of that section, and where reversionary interests
    have been set up in the event of the non-use of such lands for the dedicated purpose,
    such reversionary interests shall accelerate and vest in the holders thereof upon
    such vacation, or prior to the acceptance of an offer to buy or lease the land.
    Thereupon the auditor of the county shall place the lands on the tax duplicate
    of the county in the names of such reversioners as are known to the board of county
    commissioners. If the board is unable to establish the names of such reversioners,
    it shall fix a date on or before which claims to such real estate may be asserted
    and after which such real estate shall be sold or leased. The board shall give
    notice of such date and of the sale or lease to be held thereafter, once each
    week for four consecutive weeks using at least one of the following methods:

    (A) In the print or digital edition of a newspaper of general circulation in the
    county wherein such lands are located;

    (B) On the official public notice web site established under section 125.182 of
    the Revised Code;

    (C) On the web site and social media account of the county wherein such lands
    are located.

    In the event that no claims to such lands are asserted or found to be valid, the
    lands shall be sold pursuant to section 307.82 of the Revised Code in the case
    of a vacation of the lands pursuant to division (A) of section 307.81 of the Revised
    Code, or be sold or leased pursuant to division (B) of section 307.81 of the Revised
    Code if an agreement with a political subdivision is entered into under that division,
    and the title of any holders of reversionary interests shall be extinguished.'
