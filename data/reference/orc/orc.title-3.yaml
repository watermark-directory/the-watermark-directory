  heading: Institutions subject to inspection of commissioners or board of health
  title:
    num: '3'
    name: Counties
  chapter:
    num: '307'
    name: Board of County Commissioners - Powers
  text: Each public or private hospital, reformatory home, house of detention, private
    asylum, and correctional institution shall be open at all times to the inspection
    of the board of county commissioners or the board of health of the general health
    district or the city health district in which the institution is situated.
