- number: '308.051'
  heading: Meeting by interactive video conference or teleconference
  title:
    num: '3'
    name: Counties
  chapter:
    num: '308'
    name: Airport Authorities
  text: '(A) The requirement in division (C) of section 121.22 of the Revised Code
    that a member of a public body be present in person at a meeting open to the public
    in order to be part of a quorum or to vote does not apply to the board of trustees
    of a regional airport authority if the board holds the meeting by interactive
    video conference or by teleconference in the following manner:

    (1) The board establishes a primary meeting location that is open and accessible
    to the public;

    (2) Meeting-related materials that are available before the meeting are sent via
    electronic mail, facsimile, hand-delivery, or United States postal service to
    each board member;

    (3) In the case of an interactive video conference, the board causes a clear video
    and audio connection to be established that enables all meeting participants at
    the primary meeting location to see and hear each board member;

    (4) In the case of a teleconference, the board causes a clear audio connection
    to be established that enables all meeting participants at the primary meeting
    location to hear each board member;

    (5) All board members have the capability to receive meeting-related materials
    that are distributed during a board meeting;

    (6) A roll call voice vote is recorded for each vote taken; and

    (7) The minutes of the board meeting identify which board members remotely attended
    the meeting by interactive video c onference or teleconference.

    If the board proceeds under this division, use of an interactive video conference
    is preferred, but nothing in this section prohibits the board from conducting
    its meetings by teleconference or by a combination of interactive video conference
    and teleconference at the same meeting.

    (B) A regional airport authority board of trustees shall adopt rules necessary
    to implement this section. At a minimum, the rules shall do all of the following:

    (1) Authorize board members to remotely attend a board meeting by interactive
    video conference or teleconference, or by a combination thereof, in lieu of attending
    the meeting in person;

    (2) Establish a minimum number of board members that must be physically present
    in person at the primary meeting location if the board conducts a meeting by interactive
    video conference or teleconference;

    (3) Require that not more than one board member remotely attending a board meeting
    by teleconference is permitted to be physically present at the same remote location;

    (4) Establish geographic restrictions for participation in meetings by interactive
    video conference and by teleconference;

    (5) Establish a policy for distributing and circulating meeting-related materials
    to board members, the public, and the media in advance of or during a meeting
    at which board members are permitted to attend by interactive video conference
    or teleconference; and

    (6) Establish a method for verifying the identity of a b oard member who remotely
    attends a meeting by teleconference.'
