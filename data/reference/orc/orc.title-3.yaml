- number: '329.46'
  heading: Proposal for removal of another county
  title:
    num: '3'
    name: Counties
  chapter:
    num: '329'
    name: County Department of Job and Family Services
  text: '(A) A board of county commissioners that formed a joint county department
    of job and family services under section 329.40 of the Revised Code, by adopting
    a resolution, may propose the removal of another county that formed the joint
    county department. The board of county commissioners shall send a copy of such
    a resolution to the board of directors of the joint county department. Not later
    than ten days after receiving the copy of the resolution, the board of directors
    shall send a copy of the resolution to each board of county commissioners that
    formed the joint county department, except the board of county commissioners proposing
    removal. Not later than thirty days after sending a copy of the resolution, the
    board of directors shall hold a hearing at which any county commissioner whose
    county formed the joint county department may present arguments for or against
    the removal. At the hearing, approval or disapproval of the removal shall be determined
    by a two-thirds vote of the county commissioners of the counties that formed the
    joint county department, with the exception of the county commissioners of the
    county proposed for removal.

    (B) The board of directors of a joint county department of job and family services,
    by adopting a resolution by a majority vote of the members of the board, may propose
    removal of a county that formed the joint county department. Not later than ten
    days after adopting such a resolution, the board of directors shall send a copy
    of the resolution to the board of county commissioners of each county that formed
    the joint county department, including the board of county commissioners of the
    county proposed for removal. Not later than thirty days after sending the copy
    of the resolution, the board of directors shall hold a hearing at which any member
    of the board may present arguments for or against the removal. At this hearing,
    approval or disapproval of the resolution proposing removal shall be determined
    by a two-thirds vote of the members of the board of directors, with the exception
    of the board members who represent the county proposed for removal.

    (C) If removal of a county is approved under this section, the board of directors
    shall give written notice of the approval to the Ohio department of job and family
    services at least ninety days before the removal takes effect. The director of
    job and family services shall adopt, as an internal management rule under section
    111.15 of the Revised Code, the form in which the notice shall be given.

    (D) Removal of a county under this section shall take effect not earlier than
    the first day of the calendar quarter following the ninety-day notice period required
    by division (C) of this section.

    (E) If, at any time, the county proposed for removal under division (A) or (B)
    of this section notifies the board of directors, by a majority vote of that county''s
    board of county commissioners, that it chooses to withdraw from the joint county
    department, the withdrawal procedure established under section 329.45 of the Revised
    Code shall be put immediately into motion.'
