# Cited receiving-stream design low flows (7Q10) from Ohio EPA NPDES fact sheets.
#
# The 7Q10 — the lowest 7-day average streamflow expected once in 10 years — is the
# design low flow Ohio EPA uses to set chronic water-quality-based effluent limits
# (the denominator of assimilative capacity). Every value here is read directly from
# an Ohio EPA NPDES fact sheet in our own corpus (data/documents/oepa/*) and tagged
# `source: document`. Streams we cannot yet cite are OMITTED, not guessed — the
# assimilative check reports them as "no cited 7Q10" rather than invent a number.
#
# Key insight these numbers carry: the plants on tiny tributaries discharge MORE than
# the streams' entire 7Q10 low flow — at design low flow the effluent is effectively
# undiluted. The fact sheets say so themselves (American II's stated acute dilution
# ratio is 1.3 to 1; Van Wert's is 1.02 to 1 — more extreme).
#
# Basin-wide companion: `low-flow-7q10.derived.yaml` holds DERIVED (LP3, source=derived)
# 7Q10s for the major USGS-gaged Maumee mainstems, used by `bosc basin-screen` to extend
# this screen beyond Lima. Those are screening proxies (gage value, not the discharge
# reach), never a substitute for a cited fact-sheet 7Q10 here.

streams:
  dug run:
    seven_q10_cfs: 0.78
    source: document
    citation: "Ohio EPA NPDES fact sheet 2PH00006 (American II WWTP), Stream Flows table — USGS Station 04187500"
    confidence: high
    context:
      one_q10_cfs: 0.6
      thirty_q10_summer_cfs: 0.96
      harmonic_mean_cfs: 1.79
      mixing_pct_avg: 25
      designated_use: "Warmwater Habitat; impaired (aquatic life, recreation)"

  pike run:
    seven_q10_cfs: 0.03
    source: document
    citation: "Ohio EPA NPDES fact sheet 2PH00007 (American Bath WWTP), Stream Flows table — USGS Gauge 04186500 adjusted for drainage area"
    confidence: high
    context:
      one_q10_cfs: 0.016
      thirty_q10_summer_cfs: 0.06
      harmonic_mean_cfs: 0.367
      mixing_pct_avg: 25
      note: "summer/winter 7Q10 reported as 0 cfs — intermittent at low flow"

  ottawa river:
    seven_q10_cfs: 0.2
    source: document
    citation: "Ohio EPA NPDES fact sheet 2IG00001 (Lima Refining Co.), Stream Flows table — Ottawa River at Lima, USGS gage 04187100, 1989-2021"
    confidence: high
    context:
      one_q10_cfs: 0.0
      thirty_q10_summer_cfs: 1.6
      ninety_q10_cfs: 4.6
      harmonic_mean_cfs: 4.8
      mixing_pct_avg: 25
      note: "Ottawa mainstem at Lima nearly dries at design low flow (1Q10 = 0 cfs) — heavily abstracted upstream for Lima's water supply"

  town creek:
    seven_q10_cfs: 0.16
    source: document
    citation: "Ohio EPA NPDES fact sheet 2PD00006 (Van Wert WWTP), Table 12 — USGS 04191500 (Auglaize River Near Defiance, 1915-2003) drainage area ratio applied to Town Creek"
    confidence: high
    context:
      one_q10_cfs: 0.1
      seven_q10_summer_cfs: 0.0
      seven_q10_winter_cfs: 0.0
      thirty_q10_summer_cfs: 0.29
      thirty_q10_winter_cfs: 0.29
      ninety_q10_cfs: 0.66
      harmonic_mean_cfs: 1.62
      mixing_pct_avg: 25
      design_flow_cfs: 6.1889
      acute_dilution_ratio: 1.02
      note: "summer and winter 7Q10 = 0 cfs (intermittent at design low flow); Van Wert WWTP design flow 4.0 MGD (6.1889 cfs) overwhelms the 7Q10 by 39x — most extreme effluent-dominance case in the Maumee network"
