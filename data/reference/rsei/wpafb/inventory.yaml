  caveats:
  - Pounds are summed from reported `release` rows; Score/Cancer/NonCancer/Hazard from EPA's modeled `elements`
    rows. Nothing is estimated by BOSC.
  - Score is EPA's modeled, population-weighted Risk-Screening Score (unitless, comparative only — NOT
    a risk or a concentration). Hazard = pounds x toxicity weight (no exposure/population term).
  - A facility with reported pounds but a zero Score released only non-modeled media/chemicals in the
    modeled years — faithful to the data, not a gap.
  - RSEI tracks TRI reporters; small/unpermitted sources and non-TRI chemicals are out of scope by construction.
