note: Federal backdrop (#98), the top of the grid stack. The policy levers map the
  IRA section 45/48 (and tech-neutral 45Y/48E) clean-generation credits, section 45V/45X,
  and DOE LPO / grid-resilience programs to what they apply to and their direction
  on cost; the output figures are transcribed EIA national + LBNL/DOE data-center
  statistics. The campus-vs-national shares size the campus against the US data-center
  demand wave - the backdrop the consumer-cost thread (#91) reads against. Nothing
  here is a facility disclosure.
caveats:
- Policy applicability depends on the campus's (undisclosed) generation / procurement
  choices - whether it self-generates, co-sites, or PPAs clean power. The levers are
  mapped to a load/generation of this profile, not asserted as claimed by this facility.
- 'Cost direction is direction-of-cost only, NOT a quantified offset: a credit lowers
  the cost of clean generation the campus could buy, but the dollar value depends
  on undisclosed contracting.'
- National projections (the ~6.7-12% data-center share by 2028) are scenario-dependent.
  The US output / price figures are transcribed published values flagged for verification,
  regenerable via EIA.
