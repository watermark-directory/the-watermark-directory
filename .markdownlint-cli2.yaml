# Repo-wide Markdown lint/format (markdownlint-cli2). Run via `mise run check` (lint)
# and `mise run fmt` (--fix). The Astro public site under frontend/ has its OWN
# toolchain and is excluded here.
# Respect .gitignore — drops .venv/, web/ (generated SSG), data/site/bundle/, .claude/,
# node_modules/, etc. without enumerating them here.
gitignore: true

globs:
  - "**/*.md"

# Hand-authored docs only. Excludes:
#  - frontend/**  — Astro/MDX, its own toolchain
#  - notebooks/** — marimo authoring artifacts (like ruff's extend-exclude)
#  - web/**       — generated SSG output (git-ignored anyway)
#  - .claude/**   — ephemeral agent worktrees
#  - the two bosc-GENERATED docs (regenerated by bosc.hydrology / bosc.facility);
#    fix their generators, not the output.
ignores:
  - "frontend/**"
  - "notebooks/**"
  - "web/**"
  - ".claude/**"
  - "**/node_modules/**"
  - "docs/HYDROLOGY.md"
  - "docs/COMPUTE.md"

config:
  default: true
  MD013: false   # line length — prose/evidence docs aren't wrapped
  MD041: false   # first line need not be an H1 (frontmatter / lead paragraphs)
  MD033: false   # inline HTML is used intentionally in a few docs
  MD040: false   # not every fenced block has a meaningful language
  MD036: false   # bold used as a label/lead-in, not a faux heading
  MD018: false   # "#" with no space — these docs open prose lines with issue refs like "#133"; the
                 # autofix would (mis)read them as headings and mangle the paragraph. Not a real heading risk here.
  MD029: false   # ordered-list numbering style — stylistic; avoid auto-renumber churn
  MD028: false   # blank line inside a blockquote — often intentional; not auto-fixable
  MD001: false   # heading-level increments — structural/intentional here; not auto-fixable
  MD024:
    siblings_only: true   # repeated section names (Notes, Context) under different parents are fine
