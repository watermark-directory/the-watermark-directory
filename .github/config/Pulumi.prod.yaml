# Committed stack config — NON-SECRET values only.
# The GitHub token is supplied out of band via the GITHUB_TOKEN env var (a PAT or
# App token with Administration: write); never add it here.
config:
  github:owner: watermark-directory
  watermark-repo-config:repo: "the-watermark-directory"
  # Branch-protection policy (tunable without touching code):
  watermark-repo-config:requiredApprovals: "1"             # approving reviews required on main
  watermark-repo-config:requireCodeOwnerReviews: "true"    # require a CODEOWNERS review too
  watermark-repo-config:enforceAdmins: "false"             # also apply protection to admins
  watermark-repo-config:requireUpToDate: "true"            # branch must be current before merge
