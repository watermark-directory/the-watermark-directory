# Scheduled live faithfulness eval for the /api/ask endpoint (#330).
#
# Calls the real model daily to assert grounded answers cite their sources and
# hallucination-bait that retrieves corpus vocabulary is still refused. Complements
# the deterministic fixture tier (askEval.test.ts) that always runs in ci.yml.
#
# The ANTHROPIC_API_KEY secret must be provisioned; if it is absent the
# describe.skipIf guard in askEval.live.test.ts skips all tests gracefully.

name: Ask faithfulness (live)

on:
  schedule:
    - cron: "23 6 * * *" # daily 06:23 UTC
  workflow_dispatch:
    inputs:
      model:
        description: "Eval model override (default claude-opus-4-8)"
        required: false

defaults:
  run:
    working-directory: web

jobs:
  ask-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Live faithfulness eval
        run: npm test -- src/lib/askEval.live.test.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASK_EVAL_MODEL: ${{ inputs.model || 'claude-opus-4-8' }}
