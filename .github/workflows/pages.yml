# Build & deploy the BOSC site to Cloudflare Pages — MANUAL ONLY.
#
# Phase 1 of the host migration (Epic #56): the redesigned Astro site (frontend/) and
# its Pages Functions (frontend/functions/ — the submissions endpoint, #74) deploy
# together to Cloudflare Pages, one origin for static assets + serverless. This
# supersedes the never-flipped GitHub Pages deploy. (The legacy Python SSG was retired at
# the parity cutover; this Astro frontend is now the only site.)
#
# Still MANUAL and build-only by default: `workflow_dispatch` with a `deploy` toggle
# that defaults to false, so a run only *builds* unless you tick the box. Recommended
# first run: build-only, then a browser visual pass on the deck.gl maps (WebGL isn't
# covered by `astro check`) before deploying.
#
# Cloudflare's own Git build is NOT used — the content bundle is produced by `bosc
# export` (Python) before `npm run build`, so the build runs here and Wrangler does a
# direct upload. Pages config lives in `frontend/wrangler.toml`.
#
# One-time setup before the first deploy (see docs/submissions-api.md):
#   - Create the Cloudflare Pages project `bosc` (production branch: main).
#   - Repo secrets: CLOUDFLARE_API_TOKEN (token with "Cloudflare Pages: Edit") and
#     CLOUDFLARE_ACCOUNT_ID.
#   - Repo var PUBLIC_TURNSTILE_SITE_KEY (public; from `pulumi stack output
#     turnstileSiteKey`) — flips the /submit form from disabled-placeholder to live.
#   - Optional repo vars PAGES_SITE_URL / PAGES_BASE_PATH for the custom subdomain (the
#     Pulumi-managed Route53 CNAME → bosc.pages.dev); defaults target bosc.pages.dev at
#     the root (no base path).

name: Pages (manual)

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Cloudflare Pages after building (else build-only)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # *.pages.dev serves at the domain root, so no base path (handled via withBase()).
    # For a custom domain, set the PAGES_SITE_URL / PAGES_BASE_PATH repo variables — no
    # code change needed.
    env:
      SITE_URL: ${{ vars.PAGES_SITE_URL || 'https://bosc.pages.dev' }}
      BASE_PATH: ${{ vars.PAGES_BASE_PATH || '' }}
      # The Turnstile site key is read at *build* time (import.meta.env in submit.astro),
      # so it must be present here, not just as a Function secret. It's public (a repo
      # variable, from `pulumi stack output turnstileSiteKey`); until it's set the form
      # renders its disabled placeholder. Setting it flips the form live.
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4
        # No LFS: the site builds from the JSON bundle (`bosc export`) and never serves
        # source bytes, so the ~5.4 GB corpus isn't pulled.

      # 1. Generate the real content bundle the frontend reads.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync
      - name: Export the content bundle (-> data/site/bundle)
        run: uv run watermark export

      # 2. Build the Astro site over that bundle.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build the site (-> frontend/dist)
        working-directory: frontend
        run: npm run build

      # Hand the built assets to the deploy job (Functions come from source at checkout).
      - name: Upload the build
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: frontend/dist
          retention-days: 1

  deploy:
    # Only deploys when you tick the "deploy" input; otherwise the run is build-only.
    if: ${{ inputs.deploy }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      # Source restores frontend/functions/ + frontend/wrangler.toml; the artifact
      # restores the built frontend/dist/. Wrangler then uploads dist + compiles
      # functions/ (per wrangler.toml `pages_build_output_dir`).
      - uses: actions/checkout@v4
      - name: Download the build
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: frontend/dist
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy --branch=main
