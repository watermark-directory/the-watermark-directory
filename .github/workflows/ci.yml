name: CI

on:
  push:
    # `epic/*` integration branches run CI on push too, so the accumulated state is
    # checked as sub-PRs merge in — not just at the final epic -> main PR. PRs into any
    # base already run via the unfiltered `pull_request` trigger below.
    branches: [main, 'epic/*']
  pull_request:

# Path filtering is done at the JOB level (the `changes` gate below), NOT with a
# trigger-level `paths:` filter — deliberately. The `check` job is a REQUIRED
# status check on `main` (see .github/config/index.ts `requiredChecks`). A
# trigger-level `paths:` filter would skip the whole workflow on, say, a
# frontend-only PR, leaving that required check stuck "pending" and blocking the
# PR forever. A job skipped by an `if:` condition instead reports as success, so
# the gate is satisfied. Net effect: each job (`check` = Python backend, `frontend`
# = Astro site, `markdown` = repo-wide Markdown lint) is skipped when its tree is
# untouched, and required-check semantics still hold. `check` and `markdown` are the
# required checks (see .github/config/index.ts `requiredChecks`).

jobs:
  # Detect which half of the repo a push/PR touched. Cheap: no LFS, no deps —
  # dorny/paths-filter just diffs the changed file paths.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'data/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            markdown:
              - '**/*.md'
              - '.markdownlint-cli2.yaml'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  check:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      # Persist incremental tool caches across runs. mypy is the big win (it only
      # re-checks changed files on a warm cache); ruff/pytest caches are cheap extras.
      # github.sha in the key means every run saves a fresh cache; restore-keys fall
      # back to the most recent prior one. Cache dirs are set in pyproject.toml.
      - name: Cache mypy / ruff / pytest
        uses: actions/cache@v4
        with:
          path: |
            .cache/mypy
            .cache/ruff
            .cache/pytest
          key: toolcache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-${{ github.sha }}
          restore-keys: |
            toolcache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-
            toolcache-${{ runner.os }}-py311-

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      # Data-catalog gate (#631): schema · missing · orphan · checksum drift. Hermetic and
      # LFS-aware — the runner checks out without LFS bytes, so unmaterialized pointers are
      # an informational note, never a failure.
      - name: Catalog check
        run: uv run bosc catalog check

      - name: Test
        run: uv run pytest -n auto   # pytest-xdist: parallelize across the runner's cores

  # Build the Astro/MDX frontend (Epic #54). Decoupled from the Python job: it
  # builds against the committed frontend/sample-bundle/ fixture, so no uv/LFS
  # and no `bosc export` are needed here. The parity-gated Pages cutover (which
  # builds against the real `bosc export` bundle) is intentionally NOT wired yet.
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint + format (Biome)
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check internal links
        run: npm run check:links

  # Repo-wide Markdown lint (markdownlint-cli2). Node, but separate from the Astro
  # frontend job — it lints hand-authored docs across the repo (data/, docs/, root, …),
  # not the site. Config + ignores (generated docs, frontend, notebooks) live in
  # .markdownlint-cli2.yaml, which also sets gitignore:true.
  markdown:
    needs: changes
    if: ${{ needs.changes.outputs.markdown == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint
        run: npx markdownlint-cli2
