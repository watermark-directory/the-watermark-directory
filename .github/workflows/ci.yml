name: CI

on:
  push:
    # `epic/*` integration branches run CI on push too, so the accumulated state is
    # checked as sub-PRs merge in — not just at the final epic -> main PR. PRs into any
    # base already run via the unfiltered `pull_request` trigger below.
    branches: [main, 'epic/*']
  pull_request:

# Path filtering is done at the JOB level (the `changes` gate below), NOT with a
# trigger-level `paths:` filter — deliberately. The `check` job is a REQUIRED
# status check on `main` (see .github/config/index.ts `requiredChecks`). A
# trigger-level `paths:` filter would skip the whole workflow on, say, a
# frontend-only PR, leaving that required check stuck "pending" and blocking the
# PR forever. A job skipped by an `if:` condition instead reports as success, so
# the gate is satisfied. Net effect: the backend / `frontend` / `markdown` work is
# skipped when its tree is untouched, and required-check semantics still hold.
# `check` and `markdown` are the required checks (see .github/config/index.ts
# `requiredChecks`).
#
# The backend `check` is split into three PARALLEL legs — `lint`, `types`, `test` —
# rolled up by a thin `check` aggregator (#682). Wall-clock is the slowest leg, not the
# sum, and a fast formatting nit no longer waits behind pytest. `check` keeps its name
# and required-status semantics: it `needs:` the three legs, runs with `if: always()` so
# it always reports a status (never stuck pending), and passes only when each leg
# succeeded or was skipped (backend untouched ⇒ all three skip ⇒ `check` is green).
#
# Data-only commits (#861): `data/**` is split from `src/**` so permit ingest /
# catalog-entry PRs skip lint + types + test (irrelevant gates) and run only
# `catalog`.  `code` = Python source; `data` = corpus / catalog; both together
# constitute the old `backend` union.

jobs:
  # Detect which part of the repo a push/PR touched. Uses tj-actions/changed-files
  # (#861) to distinguish pure-data from code changes so lint/types/test are skipped
  # on permit-ingest and catalog PRs.
  # NOTE: in tj-actions/changed-files v40+, files_yaml groups output booleans as
  # `<group>_any_changed`, NOT `<group>` (which returns the file list). The job
  # outputs must use `_any_changed` so the downstream `== 'true'` checks work.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code_any_changed }}
      data: ${{ steps.filter.outputs.data_any_changed }}
      frontend: ${{ steps.filter.outputs.frontend_any_changed }}
      markdown: ${{ steps.filter.outputs.markdown_any_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: tj-actions/changed-files@v47.0.6
        id: filter
        with:
          files_yaml: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            data:
              - 'data/**'
            frontend:
              - 'web/**'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            markdown:
              - '**/*.md'
              - '.markdownlint-cli2.yaml'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  # --- Backend legs (#682) -------------------------------------------------------------
  # Three parallel legs, each gated on the backend filter, rolled up by `check` below.
  # Lint/types need no git history, so they take the default shallow checkout; only the
  # `test` leg fetches history (for the producer-drift merge-base). Each leg carries only
  # the incremental tool cache it uses (ruff / mypy / pytest), keyed per-leg so they don't
  # clobber each other. github.sha in the key saves a fresh cache each run; restore-keys
  # fall back to the most recent prior one. Cache dirs are set in pyproject.toml.
  lint:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: .cache/ruff
          key: ruffcache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-${{ github.sha }}
          restore-keys: |
            ruffcache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-
            ruffcache-${{ runner.os }}-py311-
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .

  types:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      # mypy is the big cache win — on a warm cache it only re-checks changed files.
      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .cache/mypy
          key: mypycache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-${{ github.sha }}
          restore-keys: |
            mypycache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-
            mypycache-${{ runner.os }}-py311-
      - name: Type check
        run: uv run mypy

  # The two data-catalog gates (#631) run ONCE, in their own job — not duplicated per
  # test shard. The producer-drift gate is the only leg that needs the full commit graph
  # (to merge-base against origin/main), so this is the one job paying for fetch-depth: 0.
  catalog:
    needs: changes
    if: ${{ needs.changes.outputs.data == 'true' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives the full commit graph the producer-drift gate needs to
      # merge-base against origin/main; filter: blob:none makes it a blobless partial
      # clone, so the ~5.4 GB LFS-history repo doesn't pull historical file blobs — the
      # missing blobs are fetched lazily only if a diff actually needs them (#682).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-python-env
      # Data-catalog gate (#631): schema · missing · orphan · checksum drift. Hermetic and
      # LFS-aware — the runner checks out without LFS bytes, so unmaterialized pointers are
      # an informational note, never a failure.
      - name: Catalog check
        run: uv run watermark catalog check
      # Sites-registry gate (#1027): YAML identity ↔ Python SITES ↔ sites-registry.json in sync.
      - name: Sites registry check
        run: uv run watermark sites check
      # Producer→entry drift gate (#629): a changed connector without its catalog entry fails.
      # Resolves origin/main from the full-history checkout; skips cleanly if it can't, so it
      # never false-fails. Bypass with a `[catalog-waiver: <reason>]` commit token.
      - name: Catalog producer-drift gate
        run: |
          git fetch --no-tags --quiet origin main || true
          uv run watermark catalog producer-check --base origin/main

  # Pytest, sharded across runners. pytest-split partitions the suite into `total-splits`
  # duration-balanced groups (from the committed .test_durations); each shard ALSO runs
  # -n auto for intra-runner core parallelism. A shallow checkout is enough — the suite is
  # hermetic over committed fixtures + data/extracted (no LFS bytes, no full history).
  # Regenerate .test_durations with `uv run pytest -n0 --store-durations` when it drifts.
  test:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: .cache/pytest
          key: pytestcache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-g${{ matrix.group }}-${{ github.sha }}
          restore-keys: |
            pytestcache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-g${{ matrix.group }}-
            pytestcache-${{ runner.os }}-py311-${{ hashFiles('uv.lock') }}-
      - name: Test (shard ${{ matrix.group }}/4)
        run: uv run pytest -n auto --splits 4 --group ${{ matrix.group }}

  # The required backend status check (#682): a thin aggregator over the three legs above.
  # It keeps the job name `check` (the gate keys on it — see .github/config/index.ts
  # `requiredChecks`) and `if: always()` so it ALWAYS reports a status, never stuck
  # pending. It passes only when each leg succeeded or was skipped — so a backend-untouched
  # PR (all legs skipped) is green, and any leg failing fails `check`. `test` is a matrix
  # (4 shards), so its rolled-up result is success only when every shard passed.
  check:
    needs: [changes, lint, types, catalog, test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Roll up backend legs
        run: |
          echo "changes=${{ needs.changes.result }} lint=${{ needs.lint.result }} types=${{ needs.types.result }} catalog=${{ needs.catalog.result }} test=${{ needs.test.result }}"
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::the changes filter job did not succeed (result: ${{ needs.changes.result }})"
            exit 1
          fi
          for r in "${{ needs.lint.result }}" "${{ needs.types.result }}" "${{ needs.catalog.result }}" "${{ needs.test.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a backend check leg did not pass (result: $r)"; exit 1 ;;
            esac
          done
          echo "All backend legs passed or were skipped."

  # Build the Astro/MDX site (Epic #54). Decoupled from the Python job: it
  # builds against the committed web/sample-bundle/ fixture, so no uv/LFS
  # and no `bosc export` are needed here. The parity-gated Pages cutover (which
  # builds against the real `bosc export` bundle) is intentionally NOT wired yet.
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint + format (Biome)
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check internal links
        run: npm run check:links

  # Repo-wide Markdown lint (markdownlint-cli2). Node, but separate from the Astro
  # frontend job — it lints hand-authored docs across the repo (data/, docs/, root, …),
  # not the site. Config + ignores (generated docs, frontend, notebooks) live in
  # .markdownlint-cli2.yaml, which also sets gitignore:true.
  markdown:
    needs: changes
    if: ${{ needs.changes.outputs.markdown == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint
        run: npx markdownlint-cli2
