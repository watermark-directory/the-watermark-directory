          - PRR production (2026-06-05): data/extracted/legal/prr-mandamus/bosc-prr-production-2026-06-05.analysis.md
          - Corpus completeness audit: data/extracted/legal/corpus-completeness-audit.md
      - Select Committee on Data Centers (2026):
          - Written testimony (2026-06-01): data/extracted/legal/select-committee-2026/relator-testimony/bosc-written-testimony-2026-06-01.md
          - Testimony deck: data/extracted/legal/select-committee-2026/relator-testimony/bosc-testimony-deck-2026-06-01.md
          - Data appendix (cloud/hardware/resource economics): data/extracted/legal/select-committee-2026/relator-testimony/bosc-data-appendix-2026-06-01.md
          - Committee testimony (2026-06-04): data/extracted/legal/select-committee-2026/hearings-audio/bosc-committee-testimony-2026-06-04.transcript.md
          - Hearing — morning: data/extracted/legal/select-committee-2026/hearings-audio/bosc-committee-hearing-2026-06-04-am.transcript.md
          - Hearing — afternoon: data/extracted/legal/select-committee-2026/hearings-audio/bosc-committee-hearing-2026-06-04-pm.transcript.md
          - Hearing — afternoon (cont.): data/extracted/legal/select-committee-2026/hearings-audio/bosc-committee-hearing-2026-06-04-pm2.transcript.md
      - Web-vendor audit:
