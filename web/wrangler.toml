# Cloudflare Pages config for the BOSC site (Epic #56, Phase 1 — host migration).
#
# The static Astro build (frontend/dist) and the Pages Functions (frontend/functions/,
# the submissions endpoint #74) deploy together to one origin. The deploy runs from the
# Actions workflow (.github/workflows/pages.yml) via Wrangler direct-upload — Cloudflare's
# own Git build is NOT used, because the content bundle is produced by `watermark export`
# (Python) before `npm run build`, which that build can't run.
#
# Secrets (TIPS_APP_ID, TIPS_APP_PRIVATE_KEY, TURNSTILE_SECRET_KEY, ANTHROPIC_API_KEY)
# and the kill switches (SUBMISSIONS_ENABLED, ASK_ENABLED, DOCS_ENABLED) are set in the
# Cloudflare dashboard, NOT here: secrets never go in wrangler.toml, and the kill switches
# must stay operator-flippable without a redeploy. See docs/submissions-api.md,
# docs/ask-api.md, and docs/object-store.md.

name = "the-watermark-directory"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"

# Non-secret, stable config for the submissions Function. (The Function also defaults
# these in code, so this is belt-and-suspenders + documentation.)
[vars]
GITHUB_OWNER = "watermark-directory"
GITHUB_REPO = "the-watermark-directory"
# Optional rate-limit knobs (defaults in code: 5 / 3600s). Uncomment to override.
# RATE_LIMIT_MAX = "5"
# RATE_LIMIT_WINDOW_SEC = "3600"

# Per-IP rate limiting (Phase 5) is opt-in: the Function degrades gracefully until a KV
# namespace is bound here as RATE_LIMIT. Create one and fill in the printed id:
#   npx wrangler kv namespace create RATE_LIMIT
# then uncomment:
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<namespace-id>"

# --- Submissions: file attachments (#243) -----------------------------------------
# R2 bucket for pre-uploaded submission attachments (/api/attach → /api/submit).
# Missing → /api/attach returns 503; /api/submit silently drops any attachment_keys.
# SUBMISSION_ATTACHMENTS is separate from DOCS to keep evidence-chain isolation intact.
#   npx wrangler r2 bucket create watermark-submission-attachments
#   npx wrangler r2 bucket create watermark-submission-attachments-dev
# [[r2_buckets]]
# binding = "SUBMISSION_ATTACHMENTS"
# bucket_name = "watermark-submission-attachments"
# preview_bucket_name = "watermark-submission-attachments-dev"
#
# Optional size cap (default 10 MB):
# ATTACH_MAX_BYTES = "10485760"

# --- Submissions: notify-on-submit (#244) -----------------------------------------
# Comma-separated GitHub logins to assign on every new submission issue (not dedupe
# hits). Assignees receive GitHub's standard notification email. Set in the dashboard:
#   NOTIFY_GITHUB_USERS = "goedelsoup"
# (Comma-separate for multiple: "goedelsoup,other-maintainer")

# --- Ask the corpus (/api/ask, Epic #207) -----------------------------------------
# Non-secret knobs for the ask endpoint. The model + caps also default in code, so this
# is documentation + override. ASK_ENABLED (kill switch) and the ANTHROPIC_API_KEY /
# TURNSTILE_SECRET_KEY secrets are set in the dashboard, not here. See docs/ask-api.md.
# ASK_MODEL = "claude-opus-4-8"
# ASK_MAX_TOKENS = "1024"          # hard answer-length cap (cost guard)
# ASK_TOP_K = "6"                  # retrieval depth over the ask-index
# ASK_RATE_LIMIT_MAX = "10"        # per-IP questions per window ("0" = block all)
# ASK_RATE_LIMIT_WINDOW_SEC = "3600"
# ASK_DAILY_TOKEN_BUDGET = "200000"  # account-wide daily total-token cap, input+output ("0" = hard stop)

# The ask endpoint is FAIL-CLOSED (#587): with ASK_ENABLED="true" but no budget KV bound it
# returns 503 rather than allow unbounded paid model spend behind Turnstile alone. Bind a KV
# (below) before go-live, OR set ASK_ALLOW_UNCAPPED = "true" to deliberately run uncapped.
# The per-IP rate limit reads ASK_RATE_LIMIT; the daily budget reads ASK_BUDGET and falls back
# to ASK_RATE_LIMIT, so binding the one namespace below enforces both.
#   npx wrangler kv namespace create ASK_RATE_LIMIT
# [[kv_namespaces]]
# binding = "ASK_RATE_LIMIT"
# id = "<namespace-id>"
# Optional: a distinct budget counter (enables the daily cap without per-IP limiting):
# [[kv_namespaces]]
# binding = "ASK_BUDGET"
# id = "<namespace-id>"

# --- MCP Streamable HTTP transport (/api/mcp, Epic #910) --------------------------
# Session storage for the MCP endpoint (#911). Ships dark (MCP_ENABLED kill switch
# unset/"false" → 503). Create the KV namespace and fill in the id, then flip
# MCP_ENABLED="true" in the dashboard when ready:
#   npx wrangler kv namespace create MCP_SESSIONS
# then uncomment:
# [[kv_namespaces]]
# binding = "MCP_SESSIONS"
# id = "<namespace-id>"
# Optional per-IP rate-limit for the MCP endpoint:
# [[kv_namespaces]]
# binding = "MCP_RATE_LIMIT"
# id = "<namespace-id>"
#
# Bearer-key registry (#916): hashed API keys → {owner, tier, created_at, revoked}.
# Missing → all Bearer tokens fall through as public (no KV = no key management yet).
#   npx wrangler kv namespace create MCP_KEYS
# [[kv_namespaces]]
# binding = "MCP_KEYS"
# id = "<namespace-id>"
#
# Daily output-token budget (#912). MCP_BUDGET_ENABLED="true" activates enforcement;
# with it set but no KV bound the endpoint fails closed. MCP_ALLOW_UNCAPPED="true" bypasses
# for local dev. Public cap defaults to 100k tokens/day; keyed cap defaults to 500k/day.
# Set in the dashboard (not here — kill switch must be operator-flippable without redeploy):
#   MCP_BUDGET_ENABLED = "true"
#   MCP_BUDGET_PUBLIC_DAILY = "100000"
#   MCP_BUDGET_KEY_DAILY = "500000"
#   MCP_ALLOW_UNCAPPED = "true"   # local dev only
#   npx wrangler kv namespace create MCP_BUDGET
# [[kv_namespaces]]
# binding = "MCP_BUDGET"
# id = "<namespace-id>"

# --- Cognito auth (Epic #919) -----------------------------------------------------
# Kill switch + non-secret config. AUTH_ENABLED (unset/"false" → 503), COGNITO_DOMAIN,
# COGNITO_CLIENT_ID, COGNITO_REGION, COGNITO_USER_POOL_ID, and APP_BASE_URL can live
# in [vars] below once provisioned. Secret: COGNITO_CLIENT_SECRET → dashboard only.
# Secrets never go in wrangler.toml. See docs/auth.md for the full runbook.
#
# Uncomment and fill in after running `mise run bosc-auth-provision` (or manual setup):
# [vars]
# AUTH_ENABLED = "false"                            # flip to "true" to go live
# COGNITO_REGION = "us-east-1"
# COGNITO_USER_POOL_ID = "us-east-1_XXXXXXXXX"
# COGNITO_CLIENT_ID = "<app-client-id>"             # public — safe to commit
# COGNITO_DOMAIN = "auth.watermarkdirectory.org"    # or <prefix>.auth.<region>.amazoncognito.com
# APP_BASE_URL = "https://watermarkdirectory.org"
#
# Also set in the CI build environment (not secrets — public Cognito identifiers):
# PUBLIC_COGNITO_DOMAIN = "auth.watermarkdirectory.org"
# PUBLIC_COGNITO_CLIENT_ID = "<app-client-id>"
#
# JWKS_CACHE KV: caches Cognito's public-key document (1-hour TTL) to avoid a cold
# fetch on every JWT verification. Create once, then uncomment:
#   npx wrangler kv namespace create JWKS_CACHE
# [[kv_namespaces]]
# binding = "JWKS_CACHE"
# id = "<namespace-id>"
#
# AUTH_PREFS KV: per-user profile + notification prefs, keyed by Cognito sub (Epic #921).
# Create once, then uncomment:
#   npx wrangler kv namespace create AUTH_PREFS
# [[kv_namespaces]]
# binding = "AUTH_PREFS"
# id = "<namespace-id>"

# --- Browser RUM (#961) ----------------------------------------------------------
# Two kill switches must both be on for events to reach Honeycomb:
#   RUM_ENABLED (dashboard var)          — controls the /api/rum beacon server-side
#   PUBLIC_RUM_ENABLED (Pages build env) — controls script injection at build time
# Flipping either off stops collection without a code deploy.
#
# /api/rum always returns 204; upstream errors and rate-limit blocks are absorbed —
# the browser must not retry on a non-2xx.
#
# Rate limiting (per-IP, 60 events / 60 s). Create the KV once, then uncomment:
#   npx wrangler kv namespace create RUM_RATE_LIMIT
# [[kv_namespaces]]
# binding = "RUM_RATE_LIMIT"
# id = "<namespace-id>"
#
# HONEYCOMB_API_KEY is shared with the backend OTel setup (#959); no new credential.
# Dataset defaults to "watermark-browser"; override in the dashboard if needed:
#   RUM_HONEYCOMB_DATASET = "watermark-browser"

# --- Source documents object store (/api/doc, Epic #274) --------------------------
# R2 bucket holding the corpus bytes that the /api/doc Pages Function (#278) streams.
# Populated by `watermark objectstore sync` (#279). The DOCS_ENABLED kill switch lives in the
# dashboard (ships dark — unset/"false" → /api/doc returns 503), mirroring the other
# endpoints. Create the buckets once (prod + a distinct dev bucket for wrangler preview):
#   npx wrangler r2 bucket create watermark-documents
#   npx wrangler r2 bucket create watermark-documents-dev
# See docs/object-store.md for the full runbook (S3 credentials, the sync tool, dev loop).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "watermark-documents"
preview_bucket_name = "watermark-documents-dev"
