# mise tasks for the `frontend` project (the Astro site) — part of the BOSC monorepo
# (root mise.toml declares `[monorepo] config_roots = ["frontend"]`). It's pure Node:
# no uv/LFS, builds against the committed sample-bundle/ offline.
#
# Run from inside frontend/ with a bare name (`mise run dev`), or from anywhere with the
# project path (`mise run //frontend:dev`). The node version is inherited from the root
# [tools]. These wrap the package.json scripts so backend and frontend share one verb set.

[tasks.install]
description = "Install frontend deps (clean, lockfile-exact)"
run = "npm ci"

[tasks.dev]
description = "Run the Astro dev server (hot reload) — static pages only, no Pages Functions"
run = "npm run dev"

[tasks."dev:stack"]
description = "Full local stack: astro build + wrangler pages dev (runs /api/submit·ask·doc) with mocked externals"
run = "npm run dev:stack"

[tasks.check]
description = "Frontend gate (CI parity): Biome lint + astro/tsc types + vitest + build + link check"
run = [
  "npm run lint",        # Biome (format + lint) — the gate CI runs that `npm run check` omits
  "npm run check",       # astro check + tsc (functions)
  "npm test",            # vitest
  "npm run build",       # astro build against sample-bundle/
  "npm run check:links", # internal-link check over the build
]

[tasks.test]
description = "Frontend tests only (vitest)"
run = "npm test"

[tasks.lint]
description = "Frontend lint only (Biome ci — format + lint gate)"
run = "npm run lint"

[tasks.types]
description = "Frontend type-check only (astro check + tsc)"
run = "npm run check"

[tasks.build]
description = "Build the static site (astro build → dist/)"
run = "npm run build"

[tasks.links]
description = "Check internal links over the build"
run = "npm run check:links"

[tasks.fmt]
description = "Auto-fix the frontend with Biome (format + safe lint fixes)"
run = "npm run format"

[tasks.preview]
description = "Serve the built site locally (astro preview)"
run = "npm run preview"
