# Cloudflare Pages config for the BOSC site (Epic #56, Phase 1 — host migration).
#
# The static Astro build (frontend/dist) and the Pages Functions (frontend/functions/,
# the submissions endpoint #74) deploy together to one origin. The deploy runs from the
# Actions workflow (.github/workflows/pages.yml) via Wrangler direct-upload — Cloudflare's
# own Git build is NOT used, because the content bundle is produced by `watermark export`
# (Python) before `npm run build`, which that build can't run.
#
# Secrets (TIPS_APP_ID, TIPS_APP_PRIVATE_KEY, TURNSTILE_SECRET_KEY, ANTHROPIC_API_KEY)
# and the kill switches (SUBMISSIONS_ENABLED, ASK_ENABLED, DOCS_ENABLED) are set in the
# Cloudflare dashboard, NOT here: secrets never go in wrangler.toml, and the kill switches
# must stay operator-flippable without a redeploy. See docs/submissions-api.md,
# docs/ask-api.md, and docs/object-store.md.

name = "the-watermark-directory"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"

# Non-secret, stable config for the submissions Function. (The Function also defaults
# these in code, so this is belt-and-suspenders + documentation.)
[vars]
GITHUB_OWNER = "watermark-directory"
GITHUB_REPO = "the-watermark-directory"
# Optional rate-limit knobs (defaults in code: 5 / 3600s). Uncomment to override.
# RATE_LIMIT_MAX = "5"
# RATE_LIMIT_WINDOW_SEC = "3600"

# Per-IP rate limiting (Phase 5) is opt-in: the Function degrades gracefully until a KV
# namespace is bound here as RATE_LIMIT. Create one and fill in the printed id:
#   npx wrangler kv namespace create RATE_LIMIT
# then uncomment:
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<namespace-id>"

# --- Ask the corpus (/api/ask, Epic #207) -----------------------------------------
# Non-secret knobs for the ask endpoint. The model + caps also default in code, so this
# is documentation + override. ASK_ENABLED (kill switch) and the ANTHROPIC_API_KEY /
# TURNSTILE_SECRET_KEY secrets are set in the dashboard, not here. See docs/ask-api.md.
# ASK_MODEL = "claude-opus-4-8"
# ASK_MAX_TOKENS = "1024"          # hard answer-length cap (cost guard)
# ASK_TOP_K = "6"                  # retrieval depth over the ask-index
# ASK_RATE_LIMIT_MAX = "10"        # per-IP questions per window ("0" = block all)
# ASK_RATE_LIMIT_WINDOW_SEC = "3600"
# ASK_DAILY_TOKEN_BUDGET = "200000"  # account-wide daily output-token cap ("0" = hard stop)

# The ask endpoint is FAIL-CLOSED (#587): with ASK_ENABLED="true" but no budget KV bound it
# returns 503 rather than allow unbounded paid model spend behind Turnstile alone. Bind a KV
# (below) before go-live, OR set ASK_ALLOW_UNCAPPED = "true" to deliberately run uncapped.
# The per-IP rate limit reads ASK_RATE_LIMIT; the daily budget reads ASK_BUDGET and falls back
# to ASK_RATE_LIMIT, so binding the one namespace below enforces both.
#   npx wrangler kv namespace create ASK_RATE_LIMIT
# [[kv_namespaces]]
# binding = "ASK_RATE_LIMIT"
# id = "<namespace-id>"
# Optional: a distinct budget counter (enables the daily cap without per-IP limiting):
# [[kv_namespaces]]
# binding = "ASK_BUDGET"
# id = "<namespace-id>"

# --- Source documents object store (/api/doc, Epic #274) --------------------------
# R2 bucket holding the corpus bytes that the /api/doc Pages Function (#278) streams.
# Populated by `watermark objectstore sync` (#279). The DOCS_ENABLED kill switch lives in the
# dashboard (ships dark — unset/"false" → /api/doc returns 503), mirroring the other
# endpoints. Create the buckets once (prod + a distinct dev bucket for wrangler preview):
#   npx wrangler r2 bucket create watermark-documents
#   npx wrangler r2 bucket create watermark-documents-dev
# See docs/object-store.md for the full runbook (S3 credentials, the sync tool, dev loop).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "watermark-documents"
preview_bucket_name = "watermark-documents-dev"
