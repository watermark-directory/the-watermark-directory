<!-- @dsCard group="Components" viewport="760x560" name="Icon set — the record grammar" subtitle="One stroke family · 24px grid · 1.7 stroke · currentColor · semantic icons carry the evidence palette" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:22px 24px; display:flex; flex-direction:column; gap:18px; }
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-faint); margin-bottom:13px; }
  .grp { background:var(--surface-card); border:1px solid var(--border-card); padding:18px 20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:13px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .well { width:100%; height:58px; background:var(--surface-sunk); border:1px solid var(--border-card); display:flex; align-items:center; justify-content:center; color:var(--ink); }
  .nm { font-size:11px; color:var(--ink-faint); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon } = window.WatermarkDesignSystem_dbe30a;
const NAV = ["search","menu","home","chevron","dropdown","arrow","verify-link","close","email","notify","locked","secure"];
const REC = ["document","scan","corpus","archive","citation","link","pages","repo"];
const ENT = ["entity","person","place","watershed","timeline","concept","map"];
const ACT = ["download","attach","send","correction","filter","copy","submit"];
const DATA = ["chart","trend","measure","cost","power","discharge"];
const EV = ["verified","inference","open","scope-gap","excerpt","key-figure","redaction"];
function Section({title, names, sub}) {
  return (
    <div className="grp">
      <div className="lbl">{title}</div>
      {sub ? <div style={{fontSize:12, color:'var(--ink-faint)', marginTop:-8, marginBottom:13}}>{sub}</div> : null}
      <div className="grid">
        {names.map(n => (
          <div className="cell" key={n}>
            <div className="well"><Icon name={n} size={26}/></div>
            <div className="nm">{n}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
function Demo() {
  return (
    <div className="wrap">
      <Section title="Navigation & chrome" names={NAV}/>
      <Section title="Records & sources" names={REC}/>
      <Section title="Entities & places" names={ENT}/>
      <Section title="Actions" names={ACT}/>
      <Section title="Data & figures" names={DATA}/>
      <Section title="Evidence & provenance" sub="These carry the semantic palette wherever they appear — never recolored to ink." names={EV}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
