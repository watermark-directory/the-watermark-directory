<!-- @dsCard group="Colors" viewport="700x150" name="Ink — text & frame" subtitle="One ink, five steps down. Carries every headline, rule, and label; never pure black." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bone-surface); font-family:var(--font-sans); color:var(--ink); }
  .wrap { padding:20px 22px; display:flex; gap:12px; flex-wrap:wrap; }
  .sw { flex:1 1 110px; }
  .chip { height:62px; border:1px solid var(--line-hair); display:flex; align-items:flex-end; padding:7px; }
  .chip span { font-family:var(--font-mono); font-size:10px; }
  .name { font-size:13px; font-weight:700; margin-top:8px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-top:2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--ink)"><span style="color:#fff">Aa</span></div><div class="name">Ink</div><div class="hex">#16201a</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-prose)"><span style="color:#fff">Aa</span></div><div class="name">Prose</div><div class="hex">#3a4036</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-muted)"><span style="color:#fff">Aa</span></div><div class="name">Muted</div><div class="hex">#566159</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-faint)"><span style="color:#fff">Aa</span></div><div class="name">Faint</div><div class="hex">#8c9389</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-ghost)"><span style="color:#fff">Aa</span></div><div class="name">Ghost</div><div class="hex">#a8a596</div></div>
</div>
</body>
</html>
