<!-- @dsCard group="Colors" viewport="700x160" name="Forest — the one signal" subtitle="The single accent. Live, verified, links, the accent rail. Used sparingly — it means something." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bone-surface); font-family:var(--font-sans); color:var(--ink); }
  .wrap { padding:20px 22px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  .sw { flex:1 1 110px; }
  .chip { height:62px; border:1px solid var(--line-hair); }
  .name { font-size:13px; font-weight:700; margin-top:8px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-top:2px; }
  .role { font-size:11px; color:var(--ink-muted); margin-top:1px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--forest)"></div><div class="name">Forest · signal</div><div class="hex">#1f6f4a</div><div class="role">--forest</div></div>
  <div class="sw"><div class="chip" style="background:var(--forest-bright)"></div><div class="name">Bright</div><div class="hex">#3d8f63</div><div class="role">wordmark period</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink)"><div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--forest-on-ink);font-weight:800;font-size:20px;">w.</div></div><div class="name">On-ink</div><div class="hex">#7fb89a</div><div class="role">forest on the bar</div></div>
  <div class="sw"><div class="chip" style="background:var(--forest-tint)"></div><div class="name">Tint</div><div class="hex">#e4ece4</div><div class="role">verified chip fill</div></div>
  <div class="sw"><div class="chip" style="background:var(--forest-line)"></div><div class="name">Line</div><div class="hex">#bcd2c4</div><div class="role">verified chip border</div></div>
</div>
</body>
</html>
