<!-- @dsCard group="Components" viewport="700x560" name="Forms — fields, checkbox, radio cards" subtitle="The flat, square form controls that build the Submit-a-Lead flow" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans); color:var(--ink); }
  .wrap { padding:24px; display:flex; flex-direction:column; gap:20px; max-width:560px; }
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TextField, Checkbox, RadioCard, Button } = window.WatermarkDesignSystem_dbe30a;
function Demo() {
  const [sel, setSel] = React.useState("correction");
  const [credit, setCredit] = React.useState(true);
  const types = [
    ["correction", "Correction", "A figure or fact in the record is wrong."],
    ["source", "New source", "A document we don't have yet."],
    ["answer", "Answer a question", "Resolve an open lead or unknown."],
    ["tip", "Tip / signal", "Something to look into — no source yet."],
  ];
  return (
    <div className="wrap">
      <div>
        <div className="lbl">Radio cards — what kind of lead?</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:9}}>
          {types.map(([k,t,d]) => <RadioCard key={k} title={t} desc={d} selected={sel===k} onSelect={()=>setSel(k)} />)}
        </div>
      </div>
      <TextField label="2 · What's the claim or correction?" multiline placeholder='e.g. "Parcel 4’s price wasn’t blank — the auditor lists it at $1.95M."' hint="Be specific. One checkable claim per lead works best." />
      <TextField label="4 · Your contact" optional="if you're open to follow-up" placeholder="email or Signal…" />
      <Checkbox checked={credit} onChange={setCredit}>Credit me as a contributor (a handle, not your name)</Checkbox>
      <div style={{display:'flex', gap:12, alignItems:'center'}}>
        <Button variant="forest">Send to the record team →</Button>
        <span style={{fontSize:12, color:'var(--ink-faint)'}}>No account needed.</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
