<!-- @dsCard group="Components" viewport="860x720" name="Chart set — figures in the record grammar" subtitle="Six primitives, one palette. Forest carries the data; the evidence colors stay reserved for evidence. Every figure is mono." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:22px 24px; display:flex; flex-direction:column; gap:18px; }
  .row { display:grid; gap:18px; }
  .panel { background:var(--surface-card); border:1px solid var(--border-card); padding:20px 22px; }
  .ey { font-family:var(--font-mono); font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-faint); }
  .ti { font-size:16px; font-weight:700; letter-spacing:-0.2px; margin:3px 0 16px; }
  .lg { display:flex; align-items:center; gap:8px; margin-top:8px; font-size:12px; color:var(--ink-faint); }
  .sw { width:10px; height:10px; flex:0 0 auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { BarChart, LineChart, Donut, BulletBar, StackedBar, Sparkline } = window.WatermarkDesignSystem_dbe30a;

function Demo() {
  return (
    <div className="wrap">
      <div className="row" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="panel">
          <div className="ey">Bar · categorical</div>
          <div className="ti">Records added per year</div>
          <BarChart data={[
            {label:"'19",value:6},{label:"'20",value:9},{label:"'21",value:14},{label:"'22",value:11},
            {label:"'23",value:19},{label:"'24",value:24},{label:"'25",value:31,highlight:true},{label:"'26",value:13}]}/>
          <div className="lg"><span className="sw" style={{background:'var(--data-1)'}}></span>peak intake · 2025 surge after the rezoning</div>
        </div>
        <div className="panel">
          <div className="ey">Bar · ranked</div>
          <div className="ti">Acquired parcels, by acreage</div>
          <BarChart orientation="horizontal" unit="ac" data={[
            {label:"Parcel 2",value:92},{label:"Parcel 5",value:78},{label:"Parcel 3",value:64},
            {label:"Parcel 4",value:55},{label:"Parcel 6",value:46},{label:"Parcel 1",value:5,muted:true}]}/>
          <div className="lg" style={{gap:14, flexWrap:'wrap'}}>
            <span style={{display:'inline-flex',alignItems:'center',gap:7}}><span className="sw" style={{background:'var(--data-1)'}}></span>price disclosed</span>
            <span style={{display:'inline-flex',alignItems:'center',gap:7}}><span className="sw" style={{background:'var(--data-withheld)',border:'1px solid var(--forest-line)'}}></span>price withheld</span>
          </div>
        </div>
      </div>

      <div className="row" style={{gridTemplateColumns:'1.35fr 1fr'}}>
        <div className="panel">
          <div className="ey">Line · time series</div>
          <div className="ti">Cumulative acreage assembled</div>
          <LineChart lastLabel="340.2 ac" data={[
            {label:"'19",value:5},{label:"'20",value:5},{label:"'21",value:60},{label:"'22",value:152},
            {label:"'23",value:241},{label:"'24",value:300},{label:"'25",value:335},{label:"'26",value:340.2}]}/>
          <div className="lg">Seven shell purchases over 18 months · <span style={{color:'var(--forest)',fontWeight:600,marginLeft:4}}>[verified]</span></div>
        </div>
        <div className="panel">
          <div className="ey">Donut · composition</div>
          <div className="ti">The corpus by source</div>
          <Donut center="318" data={[
            {label:"Emails · FOIA",value:96},{label:"Permits & filings",value:78},{label:"Other records",value:58},
            {label:"Deeds & instruments",value:52},{label:"Dated aerials",value:34}]}/>
        </div>
      </div>

      <div className="panel">
        <div className="ey">Bullet · measure vs limit</div>
        <div className="ti">Ottawa River — cooling draw against the design low flow</div>
        <BulletBar max={5} unit="cfs" rows={[
          {label:"Design low flow · 7Q10", note:"[verified] · USGS", noteColor:"var(--ev-verified-fg)", value:0.2},
          {label:"Cooling draw · modeled", note:"[inference] · permit calc", noteColor:"var(--ev-inference-fg)", value:4.85, color:"var(--ev-inference-fg)", marker:0.2}]}/>
        <div className="lg" style={{marginTop:14, color:'var(--ink-muted)'}}><span style={{width:2,height:14,background:'var(--ev-gap-fg)',marginRight:9}}></span>The red mark is the available low flow — the modeled draw is roughly 24× larger.</div>
      </div>

      <div className="panel">
        <div className="ey">Stacked · proportion</div>
        <div className="ti">Evidence status across 318 records</div>
        <StackedBar segments={[
          {value:196,label:"verified",kind:"verified"},
          {value:78,label:"inference",kind:"inference"},
          {value:44,label:"open",kind:"open"}]}/>
      </div>

      <div className="panel">
        <div className="ey">Sparkline · inline</div>
        <div className="ti">A trend small enough to sit in a record row</div>
        <div style={{border:'1px solid var(--border-card)', maxWidth:520}}>
          <div style={{display:'flex',alignItems:'center',gap:14,padding:'13px 16px',borderBottom:'1px solid var(--line-faint)'}}>
            <div style={{flex:'1 1 auto'}}><div style={{fontSize:13.5,fontWeight:600}}>FOIA requests filed</div><div style={{fontSize:11,color:'var(--ink-faint)',fontFamily:'var(--font-mono)'}}>monthly · 2025</div></div>
            <Sparkline data={[2,3,3,5,4,6,8,7,9,12,10,14]}/>
            <div style={{flex:'0 0 auto',fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700}}>14</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14,padding:'13px 16px'}}>
            <div style={{flex:'1 1 auto'}}><div style={{fontSize:13.5,fontWeight:600}}>Documents released</div><div style={{fontSize:11,color:'var(--ink-faint)',fontFamily:'var(--font-mono)'}}>monthly · 2025</div></div>
            <Sparkline color="var(--data-3)" data={[4,9,12,20,31,44,60,88,119,150,182,209]}/>
            <div style={{flex:'0 0 auto',fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700}}>209</div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
