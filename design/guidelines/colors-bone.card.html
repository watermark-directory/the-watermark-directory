<!-- @dsCard group="Colors" viewport="700x150" name="Bone — the paper" subtitle="The warm documentary paper field. Surfaces sit on a darker page; depth is hairlines, not shadow." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans); color:var(--ink); }
  .wrap { padding:20px 22px; display:flex; gap:12px; flex-wrap:wrap; }
  .sw { flex:1 1 120px; }
  .chip { height:62px; border:1px solid var(--line-hair); }
  .name { font-size:13px; font-weight:700; margin-top:8px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-top:2px; }
  .role { font-size:11px; color:var(--ink-muted); margin-top:1px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--bone-page)"></div><div class="name">Page</div><div class="hex">#e9e6dc</div><div class="role">--bone-page</div></div>
  <div class="sw"><div class="chip" style="background:var(--bone-surface)"></div><div class="name">Surface</div><div class="hex">#f5f2ea</div><div class="role">--bone-surface</div></div>
  <div class="sw"><div class="chip" style="background:var(--bone-raised)"></div><div class="name">Raised</div><div class="hex">#faf8f1</div><div class="role">--bone-raised</div></div>
  <div class="sw"><div class="chip" style="background:var(--bone-sunk)"></div><div class="name">Sunk</div><div class="hex">#efece2</div><div class="role">--bone-sunk</div></div>
  <div class="sw"><div class="chip" style="background:var(--bone-band)"></div><div class="name">Band</div><div class="hex">#ece8dc</div><div class="role">--bone-band</div></div>
</div>
</body>
</html>
