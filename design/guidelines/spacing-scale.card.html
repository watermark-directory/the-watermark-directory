<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px base" subtitle="A 4px-based rhythm. Generous panel padding (24px); tight chip padding; consistent grid gaps." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bone-surface); font-family:var(--font-sans); color:var(--ink); }
  .wrap { padding:22px 24px; display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
  .item { text-align:center; }
  .bar { background:var(--forest); height:18px; }
  .cap { font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); margin-top:7px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="bar" style="width:4px"></div><div class="cap">4 · sp-1</div></div>
  <div class="item"><div class="bar" style="width:8px"></div><div class="cap">8 · sp-2</div></div>
  <div class="item"><div class="bar" style="width:12px"></div><div class="cap">12 · sp-3</div></div>
  <div class="item"><div class="bar" style="width:16px"></div><div class="cap">16 · sp-4</div></div>
  <div class="item"><div class="bar" style="width:20px"></div><div class="cap">20 · sp-5</div></div>
  <div class="item"><div class="bar" style="width:24px"></div><div class="cap">24 · sp-6</div></div>
  <div class="item"><div class="bar" style="width:32px"></div><div class="cap">32 · sp-8</div></div>
  <div class="item"><div class="bar" style="width:48px"></div><div class="cap">48 · sp-12</div></div>
</div>
</body>
</html>
