<!-- @dsCard group="Colors" viewport="700x190" name="Evidence palette — the trust grammar" subtitle="Five fixed semantic colors. Every figure wears one; they are never recolored." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bone-surface); font-family:var(--font-sans); color:var(--ink); }
  .wrap { padding:20px 22px; display:flex; gap:12px; flex-wrap:wrap; }
  .sw { flex:1 1 120px; }
  .chip { height:54px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
  .name { font-size:12.5px; font-weight:700; margin-top:8px; }
  .hex { font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); margin-top:2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="color:var(--ev-verified-fg);background:var(--ev-verified-bg);border:1px solid var(--ev-verified-border)">verified</div><div class="name">Verified</div><div class="hex">#1f6f4a / #e4ece4</div></div>
  <div class="sw"><div class="chip" style="color:var(--ev-inference-fg);background:var(--ev-inference-bg);border:1px solid var(--ev-inference-border)">inference</div><div class="name">Inference</div><div class="hex">#9a6a14 / #efe6d0</div></div>
  <div class="sw"><div class="chip" style="color:var(--ev-open-fg);background:var(--ev-open-bg);border:1px solid var(--ev-open-border)">open</div><div class="name">Open</div><div class="hex">#566159 / #e8e4d8</div></div>
  <div class="sw"><div class="chip" style="color:var(--ev-gap-fg);background:var(--ev-gap-bg);border:1px solid var(--ev-gap-border)">scope gap</div><div class="name">Scope gap</div><div class="hex">#7a2230 / #f3e6e2</div></div>
  <div class="sw"><div class="chip" style="color:var(--ev-key-fg);background:var(--ev-key-bg);border:1px solid var(--ev-key-border)">key figure</div><div class="name">Key figure</div><div class="hex">#6a5524 / #f3e7c4</div></div>
</div>
</body>
</html>
