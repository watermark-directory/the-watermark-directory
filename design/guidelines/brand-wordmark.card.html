<!-- @dsCard group="Brand" viewport="700x230" name="The wordmark" subtitle="No logo — just the word, set in Archivo 800 with the forest period. The mark is type." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink); font-family:var(--font-sans); color:var(--bone-surface); }
  .wrap { padding:30px 28px; }
  .mark { font-size:74px; font-weight:800; letter-spacing:-3px; line-height:0.9; color:var(--bone-surface); }
  .mark .dot { color:var(--forest-bright); }
  .sub { display:flex; align-items:center; gap:11px; margin-top:10px; }
  .rule { height:1px; width:34px; background:var(--forest-bright); }
  .tag { font-family:var(--font-mono); font-size:13px; letter-spacing:1px; color:#9aa89a; text-transform:uppercase; }
  .alts { display:flex; gap:34px; margin-top:24px; flex-wrap:wrap; }
  .alt small { font-family:var(--font-mono); font-size:9.5px; letter-spacing:1px; color:#7f8a82; text-transform:uppercase; display:block; margin-bottom:6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">Watermark<span class="dot">.</span></div>
  <div class="sub"><div class="rule"></div><span class="tag">A public record of Lima</span></div>
  <div class="alts">
    <div class="alt"><small>All-caps · tracked</small><span style="font-weight:700;font-size:18px;letter-spacing:4.5px;">WATERMARK</span></div>
    <div class="alt"><small>Mono · utility</small><span style="font-family:var(--font-mono);font-weight:600;font-size:17px;">watermark<span style="color:var(--forest-on-ink)">.</span>directory</span></div>
  </div>
</div>
</body>
</html>
