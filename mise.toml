# mise — dev toolchain for Project BOSC, configured as a monorepo.
#
# Two projects share one toolchain:
#   • backend (this root): the Python `bosc` package + corpus — tasks `mise run <task>`
#   • web (web/): the Astro site — tasks `mise run //web:<task>`
#
# A bare task name runs the project you're standing in: `mise run test` is the backend's
# pytest at the repo root and the web's vitest inside web/. Target a project
# explicitly from anywhere with the `//project:task` path (`mise run //web:test`).
#
#   mise install            # install pinned tools (python, uv, node, git-lfs)
#   mise run setup          # bootstrap BOTH projects (deps, Git LFS, Claude Code CLI)
#   mise run check          # backend gate (lint + format + markdown + types + tests)
#   mise run //web:check    # web gate (lint + types + tests + build + links)
#   mise run ci             # the whole-repo gate — both of the above
#   mise tasks --all        # list every task across both projects
#
# CI (.github/workflows/ci.yml) calls the underlying commands directly, not these tasks,
# so editing a task never changes CI. Not using mise? See Brewfile for the Homebrew fallback.

monorepo_root = true

[settings]
experimental = true   # required for the monorepo task paths (`//project:task`)

[monorepo]
config_roots = ["web"]   # subprojects with their own mise.toml

[tools]
python = "3.11"
uv = "latest"
node = "24"        # pinned LTS for the Astro web/ build (CI uses the same major)
git-lfs = "latest"
pulumi = "latest"  # deploy/ stack — `cd deploy && pulumi up` (see deploy/README.md)

[env]
# Keep uv's managed virtualenv in-project so mise and uv agree on the interpreter.
UV_PROJECT_ENVIRONMENT = ".venv"

# === cross-cutting (both projects) ==========================================
[tasks.setup]
description = "Bootstrap both projects: Python + web deps, Git LFS, Claude Code CLI"
depends = ["//web:install"]
run = [
  "uv sync --extra dev",
  "npm install",   # root dev tooling (markdownlint-cli2); the Astro site installs via //web:install
  "git lfs install --local",
  "npm install -g @anthropic-ai/claude-code",
]

[tasks.ci]
description = "The whole-repo gate — backend `check` + web `check` (mirrors the CI jobs)"
depends = ["check", "//web:check"]

[tasks.clean]
description = "Remove regenerable caches/outputs (connector cache, Astro cache, dist)"
run = "rm -rf data/cache web/node_modules/.astro web/dist"

# === backend (the Python `watermark` package) ====================================
[tasks.dev]
description = "Run the watermark CLI — pass args after `--`, e.g. `mise run dev -- export`"
run = "uv run watermark"

[tasks.check]
description = "Backend gate: ruff + format-check + Markdown lint + mypy + catalog gate + pytest"
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
  "node_modules/.bin/markdownlint-cli2",   # repo-wide Markdown (config: .markdownlint-cli2.yaml)
  "uv run mypy",
  "uv run watermark catalog check",   # data-catalog gate: schema · missing · orphan · drift (#631)
  "uv run pytest -n auto",   # pytest-xdist: parallelize across cores (override with `-n0` to debug)
]

[tasks.test]
description = "Backend tests only (pytest)"
run = "uv run pytest -n auto"

[tasks."test:v"]
description = "Backend tests, verbose (test names + full tracebacks)"
run = "uv run pytest -v --tb=long -m 'not network'"

[tasks.lint]
description = "Backend lint only (ruff check)"
run = "uv run ruff check ."

[tasks.types]
description = "Backend type-check only (mypy strict)"
run = "uv run mypy"

[tasks.fmt]
description = "Auto-fix the backend: ruff lint --fix + ruff format + Markdown"
run = [
  "uv run ruff check --fix .",
  "uv run ruff format .",
  "node_modules/.bin/markdownlint-cli2 --fix",
]

[tasks.export]
description = "Regenerate the content bundle the web site reads (watermark export → data/site/bundle/)"
run = "uv run watermark export"

[tasks.onboard-site]
description = "Onboard a site to the research platform"
usage = '''
arg "<site>" help="Target site slug"
'''
run = '''
watermark --site "${usage_site}" research run --recipe site-onboard
'''

[tasks.oepa-permit]
description = "Fetch, ingest, and extract one OEPA/DAM permit end-to-end"
usage = '''
arg "<permit_id>" help="NPDES permit ID, e.g. 2PD00006"
arg "<site>" help="Site slug, e.g. van-wert"
arg "[kind]" help="Document kind for extract (default: npdes)" default="npdes"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
permit_id="${usage_permit_id}"
site="${usage_site}"
kind="${usage_kind:-npdes}"

uv run watermark --site "${site}" oepa fetch --permit-id "${permit_id}"
uv run watermark ingest

# _doc_id mirrors watermark.pipeline.ingest._doc_id: sha256(str(absolute_path))[:8]
doc_id=$(uv run python -c "
import hashlib
from watermark.config import get_settings
p = get_settings().documents_dir / 'oepa' / '${site}' / '${permit_id}.pdf'
print('${permit_id}-' + hashlib.sha256(str(p).encode()).hexdigest()[:8])
")

uv run watermark --site "${site}" extract "${doc_id}" --kind "${kind}" --write

# Keep _observed.yaml in sync so catalog check passes without a manual reconcile step.
uv run watermark catalog reconcile
uv run watermark catalog audit --apply
'''
