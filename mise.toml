# mise — dev toolchain for Project BOSC, configured as a monorepo.
#
# Two projects share one toolchain:
#   • backend (this root): the Python `bosc` package + corpus — tasks `mise run <task>`
#   • frontend (frontend/): the Astro site — tasks `mise run //frontend:<task>`
#
# A bare task name runs the project you're standing in: `mise run test` is the backend's
# pytest at the repo root and the frontend's vitest inside frontend/. Target a project
# explicitly from anywhere with the `//project:task` path (`mise run //frontend:test`).
#
#   mise install            # install pinned tools (python, uv, node, git-lfs)
#   mise run setup          # bootstrap BOTH projects (deps, Git LFS, Claude Code CLI)
#   mise run check          # backend gate (lint + format + markdown + types + tests)
#   mise run //frontend:check  # frontend gate (lint + types + tests + build + links)
#   mise run ci             # the whole-repo gate — both of the above
#   mise tasks --all        # list every task across both projects
#
# CI (.github/workflows/ci.yml) calls the underlying commands directly, not these tasks,
# so editing a task never changes CI. Not using mise? See Brewfile for the Homebrew fallback.

monorepo_root = true

[settings]
experimental = true   # required for the monorepo task paths (`//project:task`)

[monorepo]
config_roots = ["frontend"]   # subprojects with their own mise.toml

[tools]
python = "3.11"
uv = "latest"
node = "24"        # pinned LTS for the Astro frontend/ build (CI uses the same major)
git-lfs = "latest"

[env]
# Keep uv's managed virtualenv in-project so mise and uv agree on the interpreter.
UV_PROJECT_ENVIRONMENT = ".venv"

# === cross-cutting (both projects) ==========================================
[tasks.setup]
description = "Bootstrap both projects: Python + frontend deps, Git LFS, Claude Code CLI"
depends = ["//frontend:install"]
run = [
  "uv sync --extra dev",
  "npm install",   # root dev tooling (markdownlint-cli2); the Astro site installs via //frontend:install
  "git lfs install --local",
  "npm install -g @anthropic-ai/claude-code",
]

[tasks.ci]
description = "The whole-repo gate — backend `check` + frontend `check` (mirrors the CI jobs)"
depends = ["check", "//frontend:check"]

[tasks.clean]
description = "Remove regenerable caches/outputs (connector cache, Astro cache, dist)"
run = "rm -rf data/cache frontend/node_modules/.astro frontend/dist"

# === backend (the Python `bosc` package) ====================================
[tasks.dev]
description = "Run the bosc CLI — pass args after `--`, e.g. `mise run dev -- export`"
run = "uv run bosc"

[tasks.check]
description = "Backend gate: ruff + format-check + Markdown lint + mypy + catalog gate + pytest"
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
  "node_modules/.bin/markdownlint-cli2",   # repo-wide Markdown (config: .markdownlint-cli2.yaml)
  "uv run mypy",
  "uv run bosc catalog check",   # data-catalog gate: schema · missing · orphan · drift (#631)
  "uv run pytest -n auto",   # pytest-xdist: parallelize across cores (override with `-n0` to debug)
]

[tasks.test]
description = "Backend tests only (pytest)"
run = "uv run pytest -n auto"

[tasks.lint]
description = "Backend lint only (ruff check)"
run = "uv run ruff check ."

[tasks.types]
description = "Backend type-check only (mypy strict)"
run = "uv run mypy"

[tasks.fmt]
description = "Auto-fix the backend: ruff lint --fix + ruff format + Markdown"
run = [
  "uv run ruff check --fix .",
  "uv run ruff format .",
  "node_modules/.bin/markdownlint-cli2 --fix",
]

[tasks.export]
description = "Regenerate the content bundle the frontend reads (bosc export → data/site/bundle/)"
run = "uv run bosc export"
