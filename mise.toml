# mise — dev toolchain for Project BOSC.
#   mise install        # install pinned tools (python, uv, node, git-lfs)
#   mise run setup      # bootstrap: deps, Git LFS, Claude Code CLI
#   mise run check      # lint + format + types + tests
#
# Not using mise? See Brewfile for the Homebrew fallback.

[tools]
python = "3.11"
uv = "latest"
node = "24"        # pinned LTS for the Astro frontend/ build (CI uses the same major)
git-lfs = "latest"

[env]
# Keep uv's managed virtualenv in-project so mise and uv agree on the interpreter.
UV_PROJECT_ENVIRONMENT = ".venv"

[tasks.setup]
description = "Install Python deps, initialize Git LFS, install the Claude Code CLI"
run = [
  "uv sync --extra dev",
  "npm install",   # root dev tooling (markdownlint-cli2); the Astro site installs under frontend/
  "git lfs install --local",
  "npm install -g @anthropic-ai/claude-code",
]

[tasks.check]
description = "Lint, format-check, type-check, and test"
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
  "node_modules/.bin/markdownlint-cli2",   # Markdown lint (config: .markdownlint-cli2.yaml); needs `mise run setup`
  "uv run mypy",
  "uv run pytest -n auto",   # pytest-xdist: parallelize across cores (override with `-n0` when debugging)
]

[tasks.fmt]
description = "Auto-fix lint issues and format"
run = [
  "uv run ruff check --fix .",
  "uv run ruff format .",
  "node_modules/.bin/markdownlint-cli2 --fix",   # auto-fix Markdown
]

[tasks.frontend]
description = "Type-check and build the Astro frontend (reads the content bundle)"
dir = "frontend"
run = [
  "npm ci",
  "npm run check",
  "npm run build",
]
