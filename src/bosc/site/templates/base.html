<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if not is_home %}{{ page_title }} · {% endif %}{{ site_name }}</title>
  <meta name="description" content="{{ site_description }}" />
  <link rel="stylesheet" href="{{ root }}assets/site.css" />
  <link rel="stylesheet" href="{{ root }}assets/extra.css" />
  <link rel="stylesheet" href="{{ root }}assets/pygments.css" />
</head>
<body data-root="{{ root }}">
  <input type="checkbox" id="bosc-nav-toggle" class="nav-toggle" hidden />
  <header class="topbar">
    <label for="bosc-nav-toggle" class="nav-burger" aria-label="Toggle navigation">☰</label>
    <a class="brand" href="{{ root }}index.html">{{ site_name }}</a>
    <div class="search">
      <input type="search" id="bosc-search" placeholder="Search…" autocomplete="off"
             aria-label="Search the site" spellcheck="false" />
      <div id="bosc-search-results" class="search-results" hidden></div>
    </div>
  </header>
  <div class="layout">
    <nav class="sidebar" aria-label="Site navigation">
      {{ nav_html }}
    </nav>
    <main class="content">
      <article class="md-typeset">
        {{ content }}
      </article>
      {% if prev_page or next_page %}
      <nav class="page-nav" aria-label="Previous and next pages">
        {% if prev_page %}
        <a class="page-nav-prev" href="{{ prev_page.href }}">
          <span class="page-nav-dir">← Previous</span>
          <span class="page-nav-title">{{ prev_page.title }}</span>
        </a>
        {% else %}<span></span>{% endif %}
        {% if next_page %}
        <a class="page-nav-next" href="{{ next_page.href }}">
          <span class="page-nav-dir">Next →</span>
          <span class="page-nav-title">{{ next_page.title }}</span>
        </a>
        {% endif %}
      </nav>
      {% endif %}
    </main>
    {% if toc and toc.strip() %}
    <aside class="toc" aria-label="On this page">
      <div class="toc-title">On this page</div>
      {{ toc }}
    </aside>
    {% endif %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="{{ root }}assets/mermaid-init.js"></script>
  <script src="{{ root }}assets/search.js" defer></script>
  <script src="{{ root }}assets/toc.js" defer></script>
</body>
</html>
