# Navigation + site metadata for the BOSC public-records site.
#
# Single source of truth for the sidebar nav (was the `nav:` block of the old
# mkdocs.yml). `bosc.site.nav.load_nav` reads it; `bosc.site.render` turns it into
# the sidebar on every page. Targets are repo-root-relative `*.md` paths into the
# generated `web/` tree — the renderer rewrites `.md` -> `.html` (and the landing
# page `home.md` -> `index.html`) and prefixes each with the page's path-to-root.
#
# The nav is hand-maintained while build scripts reorganize the corpus, so a
# moved/renamed extraction silently orphans a link; `tests/test_site_nav.py`
# guards that every target here resolves in the built site.

site_name: Project BOSC — the public record
site_description: >-
  A browsable, citable view of the BOSC public-records corpus: primary documents
  read from scans into structured data, plus the cross-document analysis.

nav:
